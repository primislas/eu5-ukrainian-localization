l_english:
 
 loan_icon: "Loan Icon"
 loan_icon_desc: "Loan one [ShowWorkOfArtTypeName('icon')] to another [country|e] for a period of #Y 10#! years, and a fee depending on their [income|e] and the [art_quality|e] of the [work_of_art|e]. It will also improve [opinion|e] and [trust|e] between the two countries."
 loan_icon_tt_no_target: "We will send an offer of lending one of our [works_of_art|e] to the target [country|e] in exchange for [gold|e]"
 loan_icon_tt: "They will get our offer of lending them [SCOPE.sWorkOfArt('target').GetName] in exchange for [SCOPE.GetValue('icon_price_value')|2][gold_i]"
 loan_icon_bad_economy_tt: "They seem to be in a bad economic situation, so #R they may not agree#! if they do not have enough good [opinion|e] of us"
 loan_icon_choose_icon: "Choose [ShowWorkOfArtTypeName('icon')] to lend"
 not_already_receiving_icon_tt: "They must not have already been lent an [ShowWorkOfArtTypeName('icon')]"

 mend_schism: "Mend the Schism"
 mend_schism_desc: "For so many centuries has [ShowReligionGroupName('christian')] been divided. With all the seats of the Pentarchy under our control, it is time we exert our influence towards mending that scar and reconciling the Churches."
 restore_rome_primacy: "Restore [ShowLocationNameWithNoTooltip('rome')] Primacy"
 restore_rome_primacy_desc: "[ShowLocationName('rome')] was the first capital of the Empire, and even with the split between East and West, it continued to be an important city up until the fall of the Western part. Now, with the Eternal City once again under our control, we can return it to its primacy as the original capital."
 patriarch_not_in_rome_tt: "Our [GetInternationalOrganizationType('autocephalous_patriarchate').GetName] must not be already based in [ShowLocationName('rome')]"
 reestablish_hellenism: "Reestablish [ShowReligionNameWithNoTooltip('hellenism_religion')]"
 reestablish_hellenism_desc: "The ancient religion of our people seduces the crown with its traditions and mystery. We can restore it to its former glory and make it a major religion once again."

 add_omen: "Add Omen"
 add_omen_god: "Choose God for Omen Guidance"
 select_omen: "Invoke Omen"
 select_omen_desc: "Our ruler will invoke an omen."
 select_omen_tt: "We will gain a temporary bonus for our [country|e]. The power depends on the relevant [ability|e] of our [ruler|e]."
 select_omen_god_is_active_tt: "[target.GetName] is already busy with another [omen|e]."
 select_omen_god: "Select Omen"
 select_omen_god_desc: "Our ruler will choose a god for guidance on choosing an [omen|e]."
 select_omen_god_tt: "Choose a god for guidance on choosing an [omen|e]."

 
 host_olympiad: "Host Olympiad"
 host_olympiad_desc: "Our ruler will host a tournament of games at a [ShowReligionAdjective('hellenism_religion')] [holy_site|e] honoring the gods."
 host_olympiad_location_tt: "Chosen [location|e] gains [ShowModifier('host_olympiad_location_modifier')] for the duration of the Olympiad event."
 host_olympiad_effect_tt_location: "Effects will be increased relative to [target.GetName]'s [holy_site_importance_short|e] of [target.GetImportance]."
 host_olympiad_effect_tt_no_location: "Effects be increased relative to the [holy_site_importance_short|e] of the [holy_site|e] selected."
 
 sponsor_troop_feast: "Sponsor a Feast for the Troops"
 sponsor_troop_feast_desc: "By organizing a feast for our armies, we will keep the men in prime condition and morale, ensuring that they are eager to serve our country."


 roman_festivals: "Organize a Roman Festival"
 roman_festivals_desc: "Each calendar month has many festivals in honor of our many Gods, but on this occasion, we will use the power of the state to organize a splendid ceremony."
 explanation_roman_festivals_tt: "[ShowReligionAdjective('hellenism_religion')] people celebrate many festivities dedicated to  their deities. Each month, the celebrations differ, and we will receive different effects depending on how they are carried out."
 compitalia_tt: "The Compitalia Festival is held in honor of the #italic Lares Compitales#!, household deities of the crossroads."
 lupercalia_tt: "The Lupercalia Festival revolves around health and fertility, and the purification of the city."
 quinquatria_tt: "The Quinquatria is a festival in honor of the Goddess [ShowGodName('athena_god')]."
 fordicidia_tt: "Fordicidia is a festival that revolves around fertility, farming, and animal husbandry. During this event, the celebrants sacrifice a pregnant cow to the goddess of the earth, #italic Tellus#!."
 mercuralia_tt: "The Mercuralia is a festival in honor of the messenger God, [ShowGodName('hermes_god')]."
 vestalia_tt: "Vestalia is a festival in honor of the goddess of the hearth, #italic Vesta#!."
 neptunalia_tt: "The Neptunalia is a festival in honor of the God [ShowGodName('poseidon_god')]."
 vinalia_rustica_tt: "The Vinalia Rustica Festival revolves around the grape harvest, vegetable growth, and fertility. It is held in honor of both [ShowGodName('zeus_god')] and [ShowGodName('aphrodite_god')]."
 ludi_romani_tt: "The Ludi Romani Festival features a set of games and entertainments in honor of [ShowGodName('zeus_god')]."
 equus_october_tt: "The Equus October consists of horse-racing festivals and a horse sacrifice in honor of [ShowGodName('ares_god')], coinciding with the end of the agricultural and military campaigning season."
 ludi_plebeii_tt: "The Ludi Plebeii is a festival that consists of multiple theatrical performances and athletic competitions revolving around the common people."
 saturnalia_tt: "The Saturnalia is a festival in honor of the god of time, #italic Saturn#!."

 greek_festivals: "Revitalize an Ancient Greek Festival"
 greek_festivals_desc: "Each region in our territory has a special festival in honor of one or more of our many Gods. We will make use of the power of the state to support every region, and reinforce their efforts to create the grandest ceremony ever known."
 greek_festivals_tt: "We own a location in at least one of the following provinces: [ShowProvinceDefinitionName('laconia_province')], [ShowProvinceDefinitionName('achaea_province')], [ShowProvinceDefinitionName('arcadia_province')], [ShowProvinceDefinitionName('attica_province')], [ShowProvinceDefinitionName('smyrna_province')], [ShowProvinceDefinitionName('central_macedonia_province')], [ShowProvinceDefinitionName('lower_macedonia_province')], [ShowProvinceDefinitionName('aetolia_province')], [ShowProvinceDefinitionName('rodos_province')], [ShowProvinceDefinitionName('messenia_province')], [ShowProvinceDefinitionName('aydin_province')]."
 gymnopaedia_tt: "The Gymnopaedia Festival is celebrated in #italic Sparta#! in honor of the god #italic Apollo#!."
 gymnopaedia_tt_mod: "We will receive [ShowModifier('gymnopaedia_modifier')]."
 laphria_tt: "The Laphria Festival is celebrated in [ShowProvinceDefinitionName('achaea_province')] in honor of the goddess #italic Artemis#!."
 laphria_tt_mod: "We will receive [ShowModifier('laphria_modifier')]."
 lykaia_tt: "The Lykaia Festival is celebrated in [ShowProvinceDefinitionName('arcadia_province')] as a rite of passage for adolescent youths and as a ward against the threat of werewolves."
 lykaia_tt_mod: "We will receive [ShowModifier('lykaia_modifier')]."
 panathenaic_games_tt: "The Panathenaic Games are celebrated in [ShowProvinceDefinitionName('attica_province')] in honor of the Goddess [ShowGodName('athena_god')]."
 panathenaic_games_tt_mod: "We will receive [ShowModifier('panathenaic_games_modifier')]."
 apaturia_tt: "The Apaturia Festival are celebrated in [ShowProvinceDefinitionName('smyrna_province')] in honor of the gods [ShowGodName('zeus_god')] and [ShowGodName('athena_god')]."
 apaturia_tt_mod: "We will receive [ShowModifier('apaturia_modifier')]."
 hetairideia_tt: "The Hetairideia Festival is celebrated in [ShowProvinceDefinitionName('central_macedonia_province')] in honor of the god  [ShowGodName('zeus_god')]."
 hetairideia_tt_mod: "We will receive [ShowModifier('hetairideia_modifier')]."
 apellai_tt: "The Apellai Festival are celebrated in [ShowProvinceDefinitionName('aetolia_province')] in honor of the god #italic Apollo#!."
 apellai_tt_mod: "We will receive [ShowModifier('apellai_modifier')]."
 halieia_tt: "The Halieia Festival are celebrated in [ShowProvinceDefinitionName('rodos_province')] in honor of the god #italic Helios#!."
 halieia_tt_mod: "We will receive [ShowModifier('halieia_modifier')]."
 heraclean_games_tt: "The Heraclean Games are celebrated in [ShowProvinceDefinitionName('lower_macedonia_province')] in honor of the hero and god #italic Heracles#!."
 heraclean_games_tt_mod: "We will receive [ShowModifier('heraclean_games_modifier')]."
 carneia_tt: "The Carneia Festival is celebrated in [ShowProvinceDefinitionName('messenia_province')] in honor of the god #italic Apollo#!."
 carneia_tt_mod: "We will receive [ShowModifier('carneia_modifier')]."
 panionia_tt: "The Panionia Festival is celebrated in [ShowProvinceDefinitionName('aydin_province')] in honor of the god [ShowGodName('poseidon_god')]."
 panionia_tt_mod: "We will receive [ShowModifier('panionia_modifier')]."


 hire_advisor_eunuch_chance_tt: "10–100% chance to hire an [ShowTraitName('eunuch')] [character|e] with higher average [abilities|e], scaled by [ShowBureaucracyTypeName('court_eunuchs_bureaucracy')] entrenchment and [ShowModifierTypeName('eunuch_power')]."

 grant_a_triumph: "Grant a Triumph"
 grant_a_triumph_desc: "Successes ought to be celebrated. A capable leader of armies should be thus presented to the populace as a victor in a spectacular triumphal parade."
 grant_a_triumph_tt: "We have won a war in the last 5 years."



 