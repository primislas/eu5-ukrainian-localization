l_english:
 
 d008_orthodox_events.1.title: "An Offer from [actor.GetNameWithNoTooltip]"
 d008_orthodox_events.1.desc: "A delegation from the [actor.GetLongName] has approached our [ROOT.GetCountry.GetGovernment.GetCourtTitle], with an offer to lend us one of their magnificent pieces of religious iconography, [target.GetName]. Of course, this will not be completely free of charge, but it will also serve to bring both our countries closer together."
 d008_orthodox_events.1.a: "We gladly accept."
 d008_orthodox_events.1.b: "Tell them we already have one."

 d008_orthodox_events.2.title: "Offer Accepted"
 d008_orthodox_events.2.desc: "The glorious [target_country.GetLongName] have decided to accept our magnanimous offer of lending them [target.GetName]. They have already sent us the monetary compensation, and this will surely bring our countries together. Let us just hope that they return the icon when the time comes."
 d008_orthodox_events.2.a: "Take good care of it in the meantime."

 d008_orthodox_events.3.title: "Offer Refused"
 d008_orthodox_events.3.desc: "The impious fools of [target_country.GetName] have refused our offer to lend them [target.GetName]. We made that offer in good faith, but by refusing it, they have proven that they have nor faith nor goodness in them. Only someone who rejects [ROOT.GetCountry.GetReligion.GetName] itself could dare refuse an [ShowWorkOfArtTypeName('icon')]."
 d008_orthodox_events.3.a: "Damn them to Hell!"

 d008_orthodox_events.4.title: "Loan of [target_art.GetNameWithNoTooltip] Expired"
 d008_orthodox_events.4.desc: "The [ShowWorkOfArtTypeName('icon')] that we were lent by [origin_country.GetName] has come to the end of the prescribed loan period. It is thus time for us to return [target_art.GetName] to its original owner, and they are obviously expecting us to do so. However, we could claim that we may have 'misplaced' it, and thus not follow through on returning it."
 d008_orthodox_events.4.desc_no_country: "[target_art.GetName] has been in our possession for some time now. It was originally loaned to us, but since the original owner no longer exists as an independent nation, we find ourselves in no need to return it to anyone."
 d008_orthodox_events.4.a: "Return it as it is due."
 d008_orthodox_events.4.b: "It is ours now!"

 d008_orthodox_events.5.title: "$d008_orthodox_events.4.title$"
 d008_orthodox_events.5.desc: "The loan of [target_art.GetName] to the [target_country.GetLongName] has come to its end. Consequently, they have returned it to us with the appropriate ceremony, properly fulfilling the terms of our agreement."
 d008_orthodox_events.5.a: "It is what a proper [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] country should do."

 d008_orthodox_events.6.title: "$d008_orthodox_events.4.title$"
 d008_orthodox_events.6.desc: "The loan of [target_art.GetName] to the [target_country.GetLongName] has come to its end. However, the swine of [target_country.GetName] have refused to return it to us, presenting only poor excuses for such refusal."
 d008_orthodox_events.6.a: "They will pay for such insult!"

 d008_orthodox_events.7.title: "The Seat of [target_pentarchy.GetNameWithNoTooltip]"
 d008_orthodox_events.7.desc: "[target_pentarchy.GetName], one of the seats of the Pentarchy, the great centers of [ShowReligionGroupName('christian')], has come into our hands. [target_patriarch.GetName] will now occupy its seat, and we will herald the glory of the [ShowReligionAdjective('orthodox')] faith."
 d008_orthodox_events.7.a: "The Pentarchy will be ours!"

 d008_orthodox_events.8.title: "The Loss of [target_pentarchy.GetNameWithNoTooltip]"
 d008_orthodox_events.8.desc: "[target_pentarchy.GetName] has been taken from us, and with it the power and respect it conveys. Has God abandoned us? The [ShowReligionAdjective('orthodox')] Church of [ROOT.GetCountry.GetName] will surely be damaged by this loss."
 d008_orthodox_events.8.desc_all_pentarchy: "With the loss of [target_pentarchy.GetName], the Pentarchy has been broken, as we no longer control all its seats. If we are to ensure the strength of the faith, we must secure all five seats once again under our banner."
 d008_orthodox_events.8.a: "We will have to recover it!"
 downgrade_pentarchy_modifier_tt: "We will no longer get increased effects from the controlled Pentarchy seats"

 d008_orthodox_events.9.title: "Pentarchy Restored"
 d008_orthodox_events.9.desc: "With [target_pentarchy.GetName] in our hands, all five seats of the Pentarchy are under our control. What was once a disjointed relationship between the different seats is now united under our authority. Even those which had fallen to heathen and heretic hands have been returned to the fold by our grace. The Church will be once more united, and our Patriarchs will be the ones to lead its course."
 d008_orthodox_events.9.a: "The Church shall be united once more."
 upgrade_pentarchy_modifier_tt: "The effects of the controlled Pentarchy seats will be increased"
 pentarchy_unlocked_abilities_tt: "Gains access to the [ShowGenericActionName('mend_schism')] and [ShowGenericActionName('restore_rome_primacy')] [actions|e]"

 d008_orthodox_events.10.title: "Mending of the Schism"
 d008_orthodox_events.10.desc: "A damaging Schism has been festering at the heart of [ShowReligionGroupName('christian')] for centuries, since the split between the Patriarchs of [ShowLocationName('rome')] and [ShowLocationName('constantinople')]. The split of the Western Church only served to pervert the word of Christ, from which only the Devil Himself rejoiced.\n\nNow, with all five seats of the Pentarchy under our authority, the Eastern and Western Patriarchs are once again united in the same Church, and with the same views. Although there are still many heretics who refuse to acknowledge the certainty of the True Church, it is but a matter of time for all the sheep to come back to their real shepherd."
 d008_orthodox_events.10.a: "There is but one [ShowReligionGroupAdjectiveWithNoTooltip('christian')] Church."

 d008_orthodox_events.11.title: "Restoring the Primacy of [ShowLocationNameWithNoTooltip('rome')]"
 d008_orthodox_events.11.desc: "The origin and cradle of the Empire, the beacon of culture and civilization of antiquity; long has the Eternal City laid under the cover of darkness due to heresy and barbarism. Now, in our righteous hands once again, its glory will be restored and its place as the center of the world reestablished.\n\nFrom this new [ROOT.GetCountry.GetGovernment.GetAdjective] capital, the power of our [ROOT.GetCountry.GetFlavorRank] will radiate far and wide, and from all corners of the world will people feel our presence. Glory to [ShowLocationName('rome')]! Glory to the [ROOT.GetCountry.GetLongName]!"
 d008_orthodox_events.11.a: "#italic Urbs aeterna restituta!#!"
 patriarchate_will_relocate_to_rome_tt: "The Patriarch of [ShowLocationName('rome')] will now be the head of our [GetInternationalOrganizationType('autocephalous_patriarchate').GetName]"

 d008_orthodox_events.12.title: "The Schism Is Claimed Mended"
 d008_orthodox_events.12.desc: "[scope:actor.GetName] claims to have healed the Great Schism, uniting Christendom under Constantinople."
 d008_orthodox_events.12.a: "Join the Orthodox faith."
 d008_orthodox_events.12.b: "Rome is our shepherd."

 d008_orthodox_events.13.title: "The Schism Is Claimed Mended"
 d008_orthodox_events.13.desc: "[scope:actor.GetName] presumes to declare the Schism healed on their own terms."
 d008_orthodox_events.13.a: "An outrage."

 d008_orthodox_events.14.title: "The Patriarch Moves to Rome"
 d008_orthodox_events.14.desc: "[scope:actor.GetName] has moved the Ecumenical Patriarch to Rome, making a direct claim on Our city."
 d008_orthodox_events.14.a: "We will never yield Rome."