 pronoia: "Prónoia"
 pronoia_desc: "A crucial component of the administrative organization of [GetCountry('BYZ').GetName], Prónoiai were originally temporarily appointed fiscal collectors. However, the change in times forced them to change their obligations too. Turned now into hereditary posts that provide military assistance as well as extracting money from the territory, they continue to serve as an extension of the will of the Emperor."
