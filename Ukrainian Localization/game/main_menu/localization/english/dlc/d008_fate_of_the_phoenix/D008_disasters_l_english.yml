l_english:

#Fate of the Phoenix
 fate_of_the_phoenix: "Fate of the Phoenix"
 fate_of_the_phoenix_desc: "The recent centuries have witnessed the slow decay of our glorious [GetCountry('BYZ').GetFlavorRank]. Constant infighting, internal instability and the ongoing [ShowSituationName('rise_of_the_ottomans')] spell doom for us and our people, all while [GetCountry('SER').GetName] and [GetCountry('BUL').GetName] encroach on our northern border. Through sheer might and tenacity, we must put an end to corruption and restore the authority of the crown, before it is too late..."
 remember_no_turk_tt: "No other [country|e] with its [capital|e] in [ShowRegionName('anatolia_region')], besides us, owns more than #Y 100#! [locations|e] including their [subjects|e] and is either [ShowCultureName('turkish_culture')] or [ShowCultureName('turkoman_culture')], or has the [ShowGovernmentReformName('anatolian_beylik')] [government_reform|e]"

#Fate of the Phoenix Events (to be moved)

 fate_of_the_phoenix.1.title: "The Fate of the Phoenix"
 fate_of_the_phoenix.1.desc_a: "Once, the walls of [ShowLocationName('constantinople')] marked the center of the world. From there flowed law, faith, and imperial order, truly a legacy claimed from $ROM$ herself. Now, that inheritance weighs heavily upon us.\n\nYears of intrigue, hollow victories, and fraying authority have left the [ROOT.GetCountry.GetFlavorRank] diminished in spirit if not yet in name. Beyond our borders, new powers gather with patience and hunger, while within them old offices rot from neglect. Our people deserve a better way, to match the splendor and affluence of our glorious ancestors!"
 fate_of_the_phoenix.1.desc_b: "Word has arrived from [ShowLocationName('constantinople')]. It appears that the ancient Imperial seat is troubled, its authority fraying under the weight of discord and decline. For generations, the fate of the [target_location.GetRank.GetName] has shaped the order of the [ShowReligionGroupAdjective('christian')] lands of the [ShowRegionName('balkan_region')], binding our histories through faith, each sword keeping the other in the sheathe, for the most part.\n\nNow, as its grip weakens, the balance that once governed our borders grows wearily uncertain. Some among our influential families urge caution, warning that the fall of such a pillar would unsettle all who share its rite. Others speak more bluntly: that old guarantees are fading, and that what was once settled by tradition may soon be decided by force. In these uneasy times, the course we choose will echo far beyond our own [ROOT.GetCountry.GetFlavorRank]."
 fate_of_the_phoenix.1.desc_c: "Imperial weakness rarely announces itself with ceremony. The consecutive displays of weakness, inability to guard their borders and a loss of prestige in the [GetCountry('BYZ').GetLongName] is a sign that their time in the sun is drawing to a rigid and sudden end. Thus, the situation to the west no longer demands reverence or caution — only calculation. It shall be us who feast on their remains and ascend to take their place."
 fate_of_the_phoenix.1.a: "Hope is not yet lost."
 fate_of_the_phoenix.1.b: "Change is a cruel mistress..."
 fop_parameters_a_tt: "The outcome of this disaster will determine our fate. During this turbulent time, we will gain access to unique [actions|e] via the [disaster|e] panel"
 fop_parameters_b_tt: "Should we end the [disaster|e] by successfully reverting the decay, this may send ripples across the history books, heralding a second golden age for our people"
 fop_paramenters_bul_tur_ser_tt: "While the [GetCountry('BYZ').GetLongName] undergoes the [ShowDisasterName('fate_of_the_phoenix')] [disaster|e], we will be given opportunities to capitalize on their weakness"
 fop_parameters_c_tt: "Lastly, if we emerge victorious before the [ShowInstitutionName('renaissance')|U] spawns, our [capital|e] will be eligible as its birthplace"

 fate_of_the_phoenix.2.title: "[target_location.GetName] Reclaimed!"
 fate_of_the_phoenix.2.desc: "The banners of the [ROOT.GetCountry.GetFlavorRank] once more fly above [target_location.GetName]. Long contested by [ShowCultureName('turkish_culture')] warlords, pirates, and rival powers, this vital Aegean port now returns to [ROOT.GetCountry.GetAdjective] hands. Its harbors and markets lie battered, yet full of promise. How we choose to restore our new possessions will shape our presence in the eastern seas for generations to come."
 fate_of_the_phoenix.2.a: "Rebuild the port."
 fate_of_the_phoenix.2.b: "Restore the markets and warehouses, instead."
 building_set_to_max_level_tt: "The [building|e] will be set to its maximum level"

 fate_of_the_phoenix.3.title: "$fate_of_the_phoenix.2.title$"
 fate_of_the_phoenix.3.desc: "[target_location.GetName], once the refuge of emperors and the seat of Imperial continuity after the calamity of 1204, has returned to our dominion. From these walls, the [ROOT.GetCountry.GetFlavorRank] endured exile, guarded its laws, and preserved its claim to universal rule. Its restoration is more than a territorial gain. Truly, it is a reckoning with the path the [ROOT.GetCountry.GetFlavorRank] shall now follow."

 fate_of_the_phoenix.3.a: "[ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetNameWithNoTooltip] will personally oversee this project!"
 fate_of_the_phoenix.3.b: "A sign of our returning imperial splendor!"
 fate_of_the_phoenix.3.c: "It is time to restore the administration of [ShowRegionNameWithNoTooltip('anatolia_region')]!"

 fate_of_the_phoenix.4.title: "$fate_of_the_phoenix.2.title$"
 fate_of_the_phoenix.4.desc: "[target_location.GetName], the former cradle of [GetCountry('TUR').GetAdjective] power, has fallen to Imperial arms. From this [target_location.GetRank.GetName], the beyliks once drew strength, ambition, and tribute. Its capture sends a clear message across [ShowRegionName('anatolia_region')]: the tide has turned, and the [ROOT.GetCountry.GetFlavorRank] no longer stands on the defensive."
 fate_of_the_phoenix.4.a: "We are the masters of [ShowRegionNameWithNoTooltip('anatolia_region')]!"
 unlocks_demand_beylik_tribute_disaster_action_tt: "Grants access to the [ShowGenericActionName('demand_beylik_tribute')] [action|e] for the duration of this [disaster|e]"

 fate_of_the_phoenix.5.title: "Victory Against [loser.GetNameWithNoTooltip]"
 fate_of_the_phoenix.5.desc: "The growing instability caused by the warring Beyliks culminated into the rise of the [loser.GetLongName]. Through might and competent diplomacy, they came to pose a constant threat to the independence of our [ROOT.GetCountry.GetFlavorRank]. However, recent victories against them have served as a reminder that we are the heralds of $ROM$, and despite the turbulent era, we still fight like lions. Let this moment mark the turning point, a new era to undo the decay of past years!"
 fate_of_the_phoenix.5.a: "The tide is turning!"
 high_legitimacy_grants_extra_benefits_tt: "For #Y 30#! years, maintaining more than #Y 50#! [legitimacy|e] will significantly increase our [assimilation|e] and [integration|e] of [locations|e]"

 fate_of_the_phoenix.6.title: "[target_province.GetNameWithNoTooltip] Resists Our Authority"
 fate_of_the_phoenix.6.desc: "[target_province.GetName] has refused to cooperate during this turbulent period. Should their demands for autonomy remain unmet, open rebellion may follow. Our advisors urge concessions, yet yielding now would further erode the authority of the [ROOT.GetCountry.GetFlavorRank]."
 fate_of_the_phoenix.6.a: "The phoenix does not concern itself with trivial complaints."
 fate_of_the_phoenix.6.b: "Perhaps [target_character.GetShortNameWithNoTooltip] can handle this?"
 fate_of_the_phoenix.6.c: "We should listen to the people!"
 target_character_goes_to_target_province_to_restore_order_tt: "[target_character.GetName] will oversee the restoration of order in [target_province.GetName]. [target_character.GetSheHe|U] will be unavailable for #Y 2#! years"

 fate_of_the_phoenix.7.title: "The Weakness of [target_country.GetNameWithNoTooltip]"
 fate_of_the_phoenix.7.desc: "[target_country.GetName] shows clear signs of weakness, and our proximity presents a rare opportunity. If we are to press our claims, we must act soon, before [target_character.GetName] can restore order and strength."
 fate_of_the_phoenix.7.a: "Our time has come."
 fate_of_the_phoenix.7.b: "The balance of power must be preserved!"
 we_may_have_another_chance_soon_tt: "#italic We may have another chance to gain these claims in the future...#!"

 fate_of_the_phoenix.8.title: "The Wars of [actor.GetNameWithNoTooltip]"
 fate_of_the_phoenix.8.desc: "[actor.GetName] are presently engaged in war against those they proclaim enemies of the True Faith. As fellow members of the [GetInternationalOrganizationType('autocephalous_patriarchate').GetNameWithNoTooltip], they now demand that we take up arms alongside them against this alleged common foe. Should we refuse, they threaten exclusion from the Patriarchate itself, a grave spiritual affront that would also cast a long shadow over relations between our realms."
 fate_of_the_phoenix.8.a: "To war!"
 fate_of_the_phoenix.8.b: "This is not worth our time."

 fate_of_the_phoenix.9.title: "Deserters in the [target_army.GetNameWithNoTooltip]"
 fate_of_the_phoenix.9.desc: "Reports from the [target_army.GetName] are deeply troubling. Under the command of [target_character.GetName], morale has collapsed and desertions are mounting. Such failures reflect poorly on our [ROOT.GetCountry.GetFlavorRank] and embolden our enemies."
 fate_of_the_phoenix.9.a: "Cowards! All of them!"
 target_army_suffers_losses_tt: "[target_army.GetName] loses #R [ROOT.GetVariable('visual_strength_loss_variable').GetValue|V2]%#! [strength|e] to desertions"

 fate_of_the_phoenix.10.title: "Emergence of a Loyal Strategos"
 fate_of_the_phoenix.10.desc: "For decades, [target_character.GetName], commander of the [target_unit.GetName], has served with distinction. Through loyalty and repeated victories, [target_character.GetSheHe] has become a symbol to the men, an embodiment of discipline and resolve in a time of uncertainty."
 fate_of_the_phoenix.10.a: "[target_character.GetShortNameWithNoTooltip] will lead us to victory!"
 major_victories_enhance_stats_tt: "If [target_character.GetName] wins major [battles|e], [target_character.GetHerHis] [abilities|e] may improve" 
 
 fate_of_the_phoenix.11.title: "[target_character.GetNameWithNoTooltip] Achieves Great Victory"
 fate_of_the_phoenix.11.desc: "Our [target_unit.GetName] has achieved a great victory over an army led by [target_losing_country.GetName], at [target_location.GetName]. News of the triumph spreads swiftly, renewing confidence that the Phoenix yet endures. [target_character.GetShortName] is well on [target_character.GetHerHis] way to become a legendary figure."
 fate_of_the_phoenix.11.a: "May [target_character.GetSheHe] lead our armies forever!"

 fate_of_the_phoenix.12.title: "[target_character.GetNameWithNoTooltip] Suffers a Defeat"
 fate_of_the_phoenix.12.desc: "A black day full of putrid omens! [target_character.GetName] has suffered a grave defeat against an army commanded by [target_character_2.GetName], at [target_location.GetName]. The loss is severe, and rivals will surely watch closely for further signs of weakness. Is this a sign of the tide turning against us? Let us hope for the best as we strive to win the ongoing war."
 fate_of_the_phoenix.12.a: "Shameful display!"

 fate_of_the_phoenix.13.title: "The Administration of [target_character.GetNameWithNoTooltip]"
 fate_of_the_phoenix.13.desc: "This moment may yet prove decisive for the [ROOT.GetCountry.GetFlavorRank]. Long have we endured decline, as internal discord, foreign encroachment, and the slow erosion of authority have weighed upon our people. Through new cabinet initiatives, we may at last impose order upon disorder, restoring discipline to our institutions and purpose to the governance of the land.\n\nSuch reforms will demand resolve and sacrifice, for the habits of decay are deeply rooted and resistance is inevitable. Yet if we commit ourselves fully, these measures may halt the long retreat of the [ROOT.GetCountry.GetFlavorRank] and lay the foundations for renewal, lest hesitation consign us to further fragmentation and irrelevance."
 fate_of_the_phoenix.13.a: "The return of a glorious sun demands sacrifice."
 enable_unlock_spread_philhellenism_and_encourage_latin_militarism_tt: "We will unlock the [ShowCabinetActionName('spread_philhellenism')] and [ShowCabinetActionName('encourage_latin_militarism')] [cabinet_actions|e] for the duration of the [ShowDisasterName('fate_of_the_phoenix')] [disaster|e]\n\nShould we conclude the disaster victoriously, we will gain access to these cabinet actions #Y permanently#!"
 
 fate_of_the_phoenix.14.title: "Resurgence of the Phoenix"
 fate_of_the_phoenix.14.desc: "Territory once lost has been reclaimed, and the age of decay draws to a close. [ROOT.GetCountry.GetName] stands restored as a proper [ROOT.GetCountry.GetFlavorRank], ready to confront its enemies once more. Now, [ShowLocationName('rome')] awaits."
 fate_of_the_phoenix.14.a: "There will be no marbled [ROOT.GetCountry.GetGovernment.GetRulerTitle] under our watch!"
 maintain_cabinet_actions_tt: "Our victorious resurgence through the [disaster|e] has allowed us to maintain access to both [ShowCabinetActionName('spread_philhellenism')] and [ShowCabinetActionName('encourage_latin_militarism')] [cabinet_actions|e]"
 because_we_made_military_reforms_tt: "Due to us enacting one or more military reforms via the [ShowGenericActionName('reform_imperial_armies')] [action|e]:"
 num_of_reforms_desc: "Number of reforms"
 unlock_allelengyon_bureaucracy_kephalai_bureaucracy_tt: "Unlocks the $allelengyon_bureaucracy$ and $kephalai_bureaucracy$ [bureaucracies|e]"
 unlock_kritai_katholikoi_reformed_extra_effect: "The [ShowModifierTypeName('country_cabinet_efficiency')] effect of the [ShowGovernmentReformName('kritai_katholikoi_reformed')] [government_reform|e] will become permanent"

 fate_of_the_phoenix.15.title: "Era of Decay"
 fate_of_the_phoenix.15.desc: "Despite our efforts, the lands recently lost could not be reclaimed. The resurgence of neighboring Beyliks, alongside hostile powers beyond our [ShowRegionName('balkan_region')] borders, has made reversal impossible. The long decay endures, and the future of the [ROOT.GetCountry.GetFlavorRank] is cast in uncertainty."
 fate_of_the_phoenix.15.a: "Our future is clad in shadows and uncertainty."
 no_longer_access_to_the_cabinet_actions_tt: "We will no longer have access to the [ShowCabinetActionName('spread_philhellenism')] and [ShowCabinetActionName('encourage_latin_militarism')] [cabinet_actions|e]"
 
 fate_of_the_phoenix.16.title: "[actor.GetNameWithNoTooltip] Requests a Donation"
 fate_of_the_phoenix.16.desc: "We have received word of the turmoil consuming [actor.GetName]. As a last resort, they have dispatched envoys to beg for monetary assistance. In return, they promise to open their [actor.GetFlavorRank] to the spread of our norms and customs. Such a gesture is quite unprecedented and may be telling of the dire situation in [actor.GetCapital.GetName]."
 fate_of_the_phoenix.16.a: "A small token of symbolic assistance is in order."
 fate_of_the_phoenix.16.b: "We have to support the shield against the hordes of [ShowRegionNameWithNoTooltip('anatolia_region')]."
 fate_of_the_phoenix.16.c: "No coin for heretics!"
 no_money_for_byz_tt: "We will send no help to an ailing [actor.GetName]"

 fate_of_the_phoenix.17.title: "[actor.GetNameWithNoTooltip] Offer Trade Privileges"
 fate_of_the_phoenix.17.desc: "We already do business in [ShowLocationName('constantinople')], but now [actor.GetName] have approached us with an offer, to supply them with construction material for their fleet in exchange for preferential privileges across the markets of their capital."
 fate_of_the_phoenix.17.a: "[target_country.GetGovernment.GetRulerOrRegent.GetShortNameWithNoTooltip] is a businessman, doing business!"
 fate_of_the_phoenix.17.b: "Forget about it."
 selected_republic_may_donate_ships_to_our_cause_tt: "The selected $merchant_republic$ may donate galley [ships|e] and [sailors|e] in exchange for [merchant_power|e] in [ShowLocationName('constantinople')]"
 byzantines_left_fend_themselves_tt: "The [actor.GetLongName] is left to fend for itself"
 latin_merchant_privileges_key: "$italian_group$ Merchant Privileges"

 fate_of_the_phoenix.18.title: "[target_character.GetNameWithNoTooltip] Arrives in [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
 fate_of_the_phoenix.18.desc: "Sent at the recommendation of our trusted friends in [target_country.GetName], [target_character.GetName] has arrived from the [target_location.GetRank.GetName] of [target_location.GetName], bearing with [target_character.GetHerHim] the skills and learning for which the [target_culture.GetName] lands are renowned. Seasoned by foreign courts and disciplined by the methods of the peninsula, [target_character.GetSheHe] now offers [target_character.GetHerHis] services to our [ROOT.GetCountry.GetFlavorRank], a kind and warm gesture.\n\nSuch an arrival not only promises practical benefit, but also deepens the bonds that tie us to our [ShowCultureGroupName('italian_group')] brethren, whose knowledge and ingenuity continue to shape the affairs of princes and emperors alike."
 fate_of_the_phoenix.18.a: "We will watch [target_character.GetHerHis] career with great interest!"

 fate_of_the_phoenix.19.title: "[actor.GetNameWithNoTooltip] Demands Tribute"
 fate_of_the_phoenix.19.desc: "With the fall of [ShowLocationName('bursa')] into the hands of [actor.GetName], the authority of [target_character_1.GetName] stands renewed and unchallenged. From [target_location_1.GetName], envoys arrive bearing demands rather than pleasantries. They claim tribute as the price of our so-called heathen ways, and their words are sharpened by the unspoken threat of force. Whether through gold, blood, or defiance, a response is expected and its consequences will be felt well beyond our borders."
 fate_of_the_phoenix.19.a: "We have no choice but to part with our coin."
 fate_of_the_phoenix.19.b: "Send them able-bodied men, instead."
 fate_of_the_phoenix.19.c: "They will receive nothing!"

 fate_of_the_phoenix.20.title: "Reformation of the [actor.GetAdjectiveWithNoTooltip] Military"
 fate_of_the_phoenix.20.desc_a: "Years of neglect and fiscal strain have left the armies of the [ROOT.GetCountry.GetFlavorRank] ill-prepared for the trials ahead. Under the authority of [target_character.GetName], new regulations can be issued to restore discipline, reorganize command, and revive the traditions that once made the armies of [ROOT.GetCountry.GetCapital.GetName] feared across land and frontier. Though costly, such reforms may yet arrest the long decay of our military strength."
 fate_of_the_phoenix.20.desc_b: "The seas have long been both shield and lifeline of the [ROOT.GetCountry.GetFlavorRank], yet our fleets now suffer from outdated practices and waning expertise. Under the guise of [target_character.GetName], efforts could be made to renew naval command, improve training, and modernize the institutions that sustain our maritime power. If successful, the [ROOT.GetCountry.GetAdjective] navy may again secure our coasts and commerce against all rivals."
 fate_of_the_phoenix.20.a: "A necessary step to fight the decay."
 fate_of_the_phoenix.20.b: "Maybe not quite yet."
 reformation_of_the_school_of_admirals_better_stats_tt: "As long as this [modifier|e] is active, using the [ShowGenericActionName('train_admiral')] [action|e] will yield [characters|e] with better overall [abilities|e]"
 better_stats_because_reformation_of_the_school_of_admirals_modifier_tt: "The [abilities|e] of this [admiral|e] have been enchanced by #G +10#! due to the [ShowModifier('reformation_of_the_school_of_admirals_modifier')] [modifier|e] being active"
 because_we_reformed_our_navy_in_DHE_desc: "Due to us reforming our [navy|e] in the $flavor_byz.15.title$ [event|e]"
 target_character_total_abilities: "[abilities|e] of [target_character.GetName]"
 
# Actions for Fate of the Phoenix Disaster

 selected_country_will_send_us_engineer_character_tt: "The selected [country|e] will send us one of their finest [characters|e]"
 target_country_forced_to_give_tribute_tt: "The selected [country|e] may be persuaded to give us [gold|e] or [manpower|e]"
 at_war_with_heathens_or_heretics_tt: "We are currently leading a [war|e] against a [country|e] that is NOT following [actor.GetReligion.GetName]"
 selected_country_may_join_every_ongoing_war_against_heathen_and_heretics_tt: "The selected [country|e] may join our ongoing [wars|e] whose [war_leaders|e] are either [heathens|e] or [heretics|e]"
 pops_in_capital_province_convert_catholic_tt: "Some of our [pops|e] that follow [actor.GetReligion.GetName] in [actor.GetCapital.GetProvince.GetName] will embrace [ShowReligionName('catholic')]"
 fate_of_phoenix_actions_price: "$fate_of_the_phoenix$ Actions Price"

 request_papal_donation: "Request $PAP_ADJ$ Donation"
 request_papal_donation_desc: "With the [actor.GetFlavorRank] strained and its coffers thin, envoys could be sent to the $PAP$ to appeal for aid in the name of [ShowReligionGroupName('christian')]. Though such requests are rarely made without consequence, their gold may yet buy us time in our hour of need."
 grant_latin_merchants_privileges: "Grant [ShowCultureGroupNameWithNoTooltip('italian_group')] Merchants Privileges"
 grant_latin_merchants_privileges_desc: "By extending special rights to [ShowCultureGroupName('italian_group')] merchant republics, we hope to revive trade and secure naval support. These concessions may strengthen commerce in [actor.GetCapital.GetName], though they risk deepening foreign influence within the [actor.GetCapital.GetRank.GetName]."
 accept_catholic_delegation: "Accept [ShowReligionAdjectiveWithNoTooltip('catholic')] Delegation"
 accept_catholic_delegation_desc: "Delegates from the [GetUniqueInternationalOrganization('catholic_church').GetName] may be invited to [actor.GetCapital.GetName], bearing words of unity and quiet expectations of compromise. According to many of our advisors, hosting these delegates may improve relations with the [ShowReligionAdjective('catholic')] world, but such gestures are not without domestic tension."
 attract_italian_engineer: "Attract [ShowCultureGroupNameWithNoTooltip('italian_group')] Engineer"
 attract_italian_engineer_desc: "Renowned [ShowCultureGroupName('italian_group')] engineers are sought to improve our fortifications and military works. Their expertise promises modern solutions to ancient problems, perhaps at the cost of binding us to Western methods and influence."
 demand_beylik_tribute: "Demand Beylik Tribute"
 demand_beylik_tribute_desc: "With our authority reasserted in [ShowRegionName('anatolia_region')], we may once again compel the nearby beyliks to acknowledge [actor.GetAdjective] supremacy. Tribute extracted now could weaken future rivals and restore confidence in the strength of the [actor.GetFlavorRank]."
 summon_patriarchate_member: "Summon Patriarchate Member"
 summon_patriarchate_member_desc: "As leader of our [GetInternationalOrganizationType('autocephalous_patriarchate').GetNameWithNoTooltip], we may call upon fellow [ShowReligionAdjective('orthodox')] leaders to aid us against enemies of the faith. Such appeals rely on shared belief rather than obligation, and may yet rally swords to our cause."
 reform_imperial_armies: "Reform the [GetCountry('BYZ').GetAdjectiveWithNoTooltip] Military"
 reform_imperial_armies_desc: "The armed forces of the [actor.GetFlavorRank] have suffered from decades of neglect and improvisation. A comprehensive reform promises renewed discipline and structure, though it demands stability, silver, and the will to change entrenched habits."
 patronize_orthodox_monastery: "Patronize $orthodox_monastery$"
 patronize_orthodox_monastery_desc: "By granting patronage to a local [ShowBuildingTypeName('orthodox_monastery')], we reaffirm our devotion and strengthen local religious life. Such generosity will surely improve the local quality of life, reminding the faithful that the [actor.GetLongName] still stands as protector of the true faith."
 reform_armed_forces_tt: "We will be able to reform our [army|e] or [navy|e], undoing the decay of the past centuries"
 has_not_completed_all_six_reforms_tt: "We have not completed all #Y 6#! available reforms"
 patronize_orth_monastery_tt: "The selected [location|e] will receive the [ShowModifier('patronize_orthodox_monastery_modifier')] [modifier|e] while many of our [ShowReligionAdjective('orthodox')] [pops|e] will receive [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e]"

