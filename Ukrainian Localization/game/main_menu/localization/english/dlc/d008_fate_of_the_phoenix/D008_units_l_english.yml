l_english:

 a_legionaries_1: "Early Legionaries"
 a_legionaries_1_desc: "The $a_legionaries_1$ uphold the oldest traditions of drill and discipline. Spears, broad shields, and firm cohesion let them stand fast even as the battle twists around them."
 a_legionaries_2: "Legionaries"
 a_legionaries_2_desc: "Legionaries trained in the refined arts of close combat, carrying throwing spears and short swords. Their strength lies in steady formations and a military culture of relentless practice."
 a_legionaries_3: "Reformed Legionaries"
 a_legionaries_3_desc: "The $a_legionaries_3$ are hardened infantrymen, equipped with the best armor and weapons, who form the core of our armies."
 a_legionaries_4: "Heavy Legionaries"
 a_legionaries_4_desc: "The $a_legionaries_4$ are elite infantrymen, equipped with the finest armor and weapons. Like the heavy armored legions of ancient Rome, these troops will be the hammer with which we will smite our enemies."
 a_legionaries_5: "Guard Legionaries"
 a_legionaries_5_desc: "The $a_legionaries_5$ embody the highest standard of soldiering within the legions. Selected from the finest cohorts, they are trusted with critical missions and the protection of the state's highest institutions."
 a_legionaries_6: "Imperial Legionaries"
 a_legionaries_6_desc: "These $a_legionaries_6$ stand at the apex of centuries of military evolution. Masters of equipment and doctrine alike, they serve the lifeguard whose presence alone can steady wavering lines."

 a_byzantine_cataphracts_2: "Late Medieval Cataphracts"
 a_byzantine_cataphracts_2_desc: "The $a_byzantine_cataphracts_2$ are mail-clad riders and horses alike, thundering into battle behind long lances and dense shields. Their shock charges and iron discipline are a frightening sight for our foes."
 a_byzantine_cataphracts_3: "Reformed Cataphracts"
 a_byzantine_cataphracts_3_desc: "These $a_byzantine_cataphracts_3$ blend old Imperial drills with newer tactics, combining lances with bows and sidearms. They fight as a flexible heavy cavalry corps, able to harass at range and then finish off their foes in close combat."
 a_byzantine_cataphracts_4: "Heavy Cataphracts"
 a_byzantine_cataphracts_4_desc: "The $a_byzantine_cataphracts_4$ ride in layered armor that deflects most missiles and blades. Organized into wedges of elite fighters, they break enemy lines with repeated charges that few formations can withstand."
 a_byzantine_cataphracts_5: "Guard Cataphracts"
 a_byzantine_cataphracts_5_desc: "Chosen from the finest lancers, the $a_byzantine_cataphracts_5$ serve as the mounted guard of the throne and our capital. Their presence in every battle is both a weapon and a symbol, rallying our troops and terrifying our foes."
 a_byzantine_cataphracts_6: "Imperial Cataphracts"
 a_byzantine_cataphracts_6_desc: "The $a_byzantine_cataphracts_6$ are the culmination of centuries of cavalry tradition: armored veterans, superbly mounted and drilled to perfection. They serve as the Emperor's personal guard, able to decide campaigns with a single, well-timed charge."

 n_greek_fire_galley_renaissance: "Siphōnes"
 n_greek_fire_galley_renaissance_desc: "Equipped with the special tubes to deploy the Greek fire, these vessels unfold an inferno of flames onto the enemy ships, turning them to cinder in no time. At close range, they herald only but destruction."
 n_greek_fire_galley_discovery: "Advanced Siphōnes"
 n_greek_fire_galley_discovery_desc: "The adapting of the Greek Fire deployment system to the newer types of ships allows it to continue reducing our enemy's boats to ashes, and it remains as a symbol of our navy as a whole."
 a_greek_fire_renaissance_infantry: "Cheirosiphōnes"
 a_greek_fire_renaissance_infantry_desc: "Not only ships can benefit from the Greek Fire, but also our land troops can be equipped with hand-held devices to spew the flaming substance onto our enemies. Fire and destruction will cleave the enemy's ranks and pave a way to our advance."
 a_greek_fire_discovery_infantry: "Advanced Cheirosiphōnes"
 a_greek_fire_discovery_infantry_desc: "Armies and troops change, but covering your enemies with flames and setting them ablaze continues to be an effective method of combat. As such, Greek Fire keeps having its presence among our armies, and it keeps being feared by our adversaries."