l_english:

 contact_patriarch_of_constantinople: "Contact the Patriarch of Constantinople"
 contact_patriarch_of_constantinople_desc: "Dispatch Melanchthon to Constantinople bearing our Confession of Faith, opening a channel of dialogue with the [ShowReligionAdjective('orthodox')] Patriarchate."

 reformation.17.title: "[GetCharacter('reformer_philip_melanchton').GetLastNameWithNoTooltip]'s Letter to Constantinople"
 reformation.17.desc: "[melanchthon.GetName], the foremost theologian in our realm, has proposed a bold course: dispatching an envoy to the Patriarch of Constantinople bearing our Confession of Faith. While the [ShowReligionAdjective('orthodox')] and [ShowReligionAdjective('lutheran')] faiths remain divided on many matters, they share a common rejection of Papal supremacy. Perhaps the Patriarch would welcome an overture from fellow opponents of Rome."
 reformation.17.a: "Dispatch [GetCharacter('reformer_philip_melanchton').GetLastNameWithNoTooltip] with our Confession of Faith."
 reformation.17.b: "This is not the moment for such overtures."
 reformation.17.historical_info: "Philipp Melanchthon (1497–1560), Luther's closest collaborator and author of the Augsburg Confession (1530), held a deep interest in the Eastern Church as a potential ally against Rome. His correspondence with Greek scholars laid the groundwork for later Lutheran overtures to Constantinople. In 1573, theologians from Tübingen sent a Greek translation of the Augsburg Confession to Patriarch Jeremias II, initiating one of the most sustained theological exchanges between Lutheranism and Orthodoxy in the Reformation era."

 reformation.18.title: "A Letter from the Lutheran Reformers"
 reformation.18.desc: "A delegation from [lutheran_country.GetLongName] has arrived in Constantinople bearing a theological treatise — the Confession of their faith. The [ShowReligionAdjective('lutheran')] reformers appear to seek dialogue with our Patriarchate, citing our shared opposition to the Bishop of Rome. Whether their intentions are genuine or self-serving remains to be seen."
 reformation.18.a: "Engage these reformers in cautious theological dialogue."
 reformation.18.b: "They are heretics. Send them away."
 reformation.18.historical_info: "The Ecumenical Patriarchate of Constantinople continued to exercise spiritual authority over Orthodox Christians even after the Ottoman conquest of 1453. Patriarch Jeremias II (r. 1572–1595) was known for his theological learning and engaged seriously with the Tübingen theologians' letters, producing three detailed responses between 1576 and 1581. He rejected Lutheran doctrine on justification, free will, and the filioque, while acknowledging the sincerity of the inquiry — a posture that distinguished his replies from simple dismissal."

 reformation.19.title: "The Patriarch Responds with Interest"
 reformation.19.desc: "The Patriarch has responded with measured curiosity to our envoy's visit. While no doctrinal agreement was reached, the exchange has opened a channel between Constantinople and our State Church — a small but meaningful step toward understanding between [ShowReligionAdjective('lutheran')] and [ShowReligionAdjective('orthodox')] Christendom."
 reformation.19.a: "A bridge, however narrow, is better than none."
 reformation.19.historical_info: "The Tübingen correspondence is considered a landmark in early ecumenical dialogue. Patriarch Jeremias II's three responses (1576, 1579, 1581) engaged seriously with Lutheran theology even while rejecting its core claims. He addressed points on sola fide, free will, and the filioque with detailed patristic argument — a level of engagement that demonstrated the intellectual vitality of the Patriarchate under Ottoman rule. Both sides preserved the correspondence carefully."

 reformation.20.title: "The Patriarch Dismisses the Delegation"
 reformation.20.desc: "Our delegation was received coldly in Constantinople. The Patriarch dismissed our Confession as another form of heresy, and our envoy was returned without ceremony. It is a reminder that [ShowReligionName('lutheran')] stands apart — from Rome and from Constantinople alike."
 reformation.20.a: "Our faith needs no approval from any patriarchate."
 reformation.20.historical_info: "The Tübingen correspondence ultimately failed to produce doctrinal agreement: Patriarch Jeremias II's three responses (1576, 1579, 1581) rejected Lutheran positions on sola fide, sola scriptura, and the filioque, insisting that Orthodoxy could not accept what it viewed as innovations. The Lutherans eventually concluded that further correspondence would be fruitless and ended the exchange in 1581."

 reformation.21.title: "An Orthodox Scholar Arrives"
 reformation.21.desc: "Word of our correspondence with Constantinople has borne unexpected fruit. An [ShowReligionAdjective('orthodox')] scholar, [orthodox_scholar.GetName], has arrived at our court seeking to continue the theological exchange begun by our envoy. The visit is delicate — too warm a reception may provoke our own clergy, while a dismissal could undo the goodwill earned in Constantinople."
 reformation.21.a: "Arrange an extended academic exchange."
 reformation.21.b: "Thank them graciously, but decline further exchange."
 reformation.21.historical_info: "Despite the failure of the Tübingen correspondence to achieve doctrinal union, it generated significant scholarly interest on both sides. Greek Orthodox intellectuals became better acquainted with Lutheran theology, while Lutheran scholars gained deeper knowledge of the Church Fathers and Eastern Christian tradition. This cross-confessional exchange contributed to a broader European humanism that approached ancient Greek Christianity as a resource independent of Rome."
