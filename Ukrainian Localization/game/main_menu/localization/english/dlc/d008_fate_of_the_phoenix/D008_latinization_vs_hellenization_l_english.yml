l_english:

 latinization_vs_hellenization.1.title: "Echoes of [ShowCultureGroupNameWithNoTooltip('greek_group')] Wisdom"
 latinization_vs_hellenization.1.desc: "In the monasteries and lecture halls of [target_location.GetName], collections of theological writings and the works of the Church Fathers circulate among the faithful and the learned alike. Sermons and commentaries draw on the deep wells of Orthodox learning, and copies of these texts begin to find their way into the hands of non-Greek notables, to the growing unease of those at court who see the future in closer ties with the Latin West."
 latinization_vs_hellenization.1.a: "Let their insights enrich our land."
 latinization_vs_hellenization.1.b: "This fascination with old scrolls has gone far enough."
 target_character_disappears_tt: "[target_character.GetName] will disappear"

 latinization_vs_hellenization.2.title: "Growing Favor for [ShowLanguageNameWithNoTooltip('latin_language')]"
 latinization_vs_hellenization.2.desc: "Across the salons and estates of [ROOT.GetCountry.GetName], a subtle but growing current favors [ShowLanguageName('latin_language')] customs, law, and ceremony. Young nobles sprinkle their speech with foreign phrases, correspond with [ShowLanguageNameWithNoTooltip('latin_language')] courts, and call for reforms that would draw our [ROOT.GetCountry.GetFlavorRank] closer to the fashions of the West, even as others grow uneasy at how quickly old certainties slip away."
 latinization_vs_hellenization.2.a: "No ill can come from this."
 latinization_vs_hellenization.2.b: "Reverse course, now!"
 stability_scales_with_current_latinization_hellenization: "The [stability|e] change will depend on our current value of [ShowSocietyDirectionName('latinization')] or [ShowSocietyDirectionName('hellenization')]"
 while_this_modifier_active_reduced_latinization_gain_from_events_tt: "While this [country_modifier|e] is active, subsequent [events|e] that strengthen [ShowSocietyDirectionName('latinization')] are significantly weakened, reducing their bonuses"
 bonus_weakened_because_of_suppressing_latinization_modifier: "The benefits of this choice are reduced because of [ShowModifier('suppressing_latinization_modifier')]"

 latinization_vs_hellenization.3.title: "[ShowSocietyDirectionNameWithNoTooltip('latinization')] Flourishes"
 latinization_vs_hellenization.3.desc: "Merchants, jurists, and scholars report that the recent turn toward [ShowLanguageName('latin_language')] forms is beginning to bear fruit. Contracts are drafted more clearly, foreign partners find our practices familiar, and the energy of reform seems to quicken the life of [ROOT.GetCountry.GetName], though some whisper that these gains rest on foundations that could yet be shaken."
 latinization_vs_hellenization.3.a: "It is time to reap the benefits of our good policies."
 latinization_vs_hellenization.3.b: "A wise man would opt to correct the errors of the past!"

 latinization_vs_hellenization.4.title: "Glory to the [target_unit.GetNameWithNoTooltip]"
 latinization_vs_hellenization.4.desc: "Reports have reached the [ROOT.GetCountry.GetGovernment.GetCourtTitle] of the exemplary discipline and courage shown by the [target_unit.GetName] in recent campaigns. Their ranks hold firm on the march and in drill alike, and tales of their conduct have begun to circulate among both common soldiers and the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], who look to them as a model for the legions of [ROOT.GetCountry.GetName]."
 latinization_vs_hellenization.4.a: "Their service is near and dear to us."
 target_character_will_receive_a_nickname_tt: "[target_character.GetName] will be honored with a fitting nickname to mark [target_character.GetHerHis] exemplary service"


 latinization_vs_hellenization.5.title: "Clash Over the Curriculum in [target_location.GetNameWithNoTooltip]"
 latinization_vs_hellenization.5.desc: "At the [ShowBuildingTypeName('university')] of [target_location.GetName], scholars quarrel over the proper language of higher learning. Some insist that only [ShowLanguageName('latin_language')] can place our [ROOT.GetCountry.GetFlavorRank] among the great powers, while others insist that scholarship in the tradition of Constantinople and the Church must be preserved."
 latinization_vs_hellenization.5.a: "The university shall teach in [ShowLanguageNameWithNoTooltip('latin_language')]."
 latinization_vs_hellenization.5.b: "The tradition of our Church and Empire shall not be surrendered."
 pops_in_target_province_mild_bonus_satisfaction: "Our [pops|e] in [target_province.GetName] will gain [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e]"
 pops_in_target_province_mild_penalty_satisfaction: "Our [pops|e] in [target_province.GetName] will suffer [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [pop_satisfaction|e]"

 latinization_vs_hellenization.6.title: "A Warning from the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
 latinization_vs_hellenization.6.desc: "An esteemed member of the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [target_character.GetName], has come before the [ROOT.GetCountry.GetGovernment.GetCourtTitle] with grave concerns. [target_character.GetSheHe|U] warns that [ShowLanguageName('latin_language')] fashions in doctrine and custom are eroding the foundations of our faith and will one day imperil both altar and throne."
 latinization_vs_hellenization.6.a: "We would be wise to heed [target_character.GetHerHis] counsel."
 latinization_vs_hellenization.6.b: "We will not let timid souls govern our policies."

 latinization_vs_hellenization.7.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Sampling Foreign Customs"
 latinization_vs_hellenization.7.desc: "From the halls of [target_location.GetName] to distant estates, our [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] eagerly imitate the manners, fashions, and language of [target_culture.GetName]. Some celebrate this as refinement while others whisper that our aristocracy is forgetting what it means to be [ROOT.GetCountry.GetAdjective]."
 latinization_vs_hellenization.7.a: "Let them take what is useful from the ways of the [target_culture.GetNameWithNoTooltip] culture."
 latinization_vs_hellenization.7.b: "This foreign infatuation has gone far enough."
 destabilize_our_realm: "Our defensive stance towards these trends destabilizes our [ROOT.GetCountry.GetFlavorRank]"
 perceived_as_weakness: "Forbidding the sampling of foreign customs is seen as weakness"

 latinization_vs_hellenization.8.title: "Reordering the Provinces"
 latinization_vs_hellenization.8.desc: "Officials in [ROOT.GetCountry.GetCapital.GetName] have stepped forward to propose a comprehensive reorganization of provinces such as [target_province.GetName], aligning jurisdictions and administration more closely with our cultural and political center. The plan promises greater control, but risks disturbing long-established local balances."
 latinization_vs_hellenization.8.a: "Impose the new order, whatever the cost."
 latinization_vs_hellenization.8.b: "Respect local arrangements and ease their concerns."
 pops_in_selected_provinces_will_gain_mild_bonus_satisfaction_tt: "Our [pops|e] in the affected [provinces|e] will gain [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"

 latinization_vs_hellenization.9.title: "The Education of [target_character.GetShortNameWithNoTooltip]"
 latinization_vs_hellenization.9.desc: "As [target_character.GetName] comes of age, tutors and courtiers clash over the proper course of [target_character.GetHerHis] studies. Every choice of language, text, and mentor threatens to become a proxy battle over the future soul of [ROOT.GetCountry.GetName]."
 latinization_vs_hellenization.9.a: "[target_character.GetHerHis|U] education must follow a clear, deliberate course."
 latinization_vs_hellenization.9.b: "We will not politicize the upbringing of [target_character.GetShortNameWithNoTooltip]."
 refusal_to_politicize_tt: "Our refusal to meddle overtly in the education of [target_character.GetName] may be seen as weakness by some at the [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
 court_does_not_react: "The [ROOT.GetCountry.GetGovernment.GetCourtTitle] does not react"

 latinization_vs_hellenization.10.title: "Restoring [ShowCultureNameWithNoTooltip('roman_culture')] Grandeur"
 latinization_vs_hellenization.10.desc: "Architects familiar with the new methods flourishing in the cities of Italy propose reshaping [target_province.GetName] in the Renaissance manner: broad avenues, orderly grids, and public works that echo the grandeur of Rome as reimagined by the masters of the Latin West. Those who admire such lofty plans see a rebirth of dignity. Perhaps this is the kind of renewal only openness to the West can bring."
 latinization_vs_hellenization.10.a: "Let [target_province.GetNameWithNoTooltip] rise anew."
 latinization_vs_hellenization.10.b: "Let the settlements prosper naturally."
 target_character_artist_skill: "[target_character.GetName] [artistic_skill|e]"

 latinization_vs_hellenization.11.title: "Building in the Imperial Tradition for [target_province.GetNameWithNoTooltip]"
 latinization_vs_hellenization.11.desc: "Patrons of the arts and local guilds lobby for a renovation of [target_province.GetName] drawing on the great tradition of our imperial cities: the arcaded streets, open forums, and stonework that have distinguished Constantinople and the enduring cities of the Roman East. Many of our advisors believe that restoring such forms speaks powerfully to the dignity of our unbroken Roman inheritance."
 latinization_vs_hellenization.11.a: "Such grace suits our [ROOT.GetCountry.GetFlavorRank] well."
 latinization_vs_hellenization.11.b: "$latinization_vs_hellenization.10.b$"

 latinization_vs_hellenization.12.title: "Debate Over New Taxation System"
 latinization_vs_hellenization.12.desc: "Financial officials have presented a sweeping overhaul of our tax codes, borrowing from foreign models to tighten assessment and collection. This radical proposal promises greater order and revenue, but also threatens to unsettle vested interests across the [ROOT.GetCountry.GetFlavorRank]."
 latinization_vs_hellenization.12.a: "Implement the new system."
 latinization_vs_hellenization.12.b: "Abandon these ideas for now."
 proposed_taxation_upsets_estates_tt: "The proposed taxation scheme will disturb the established privileges of several [estates|e]"
 new_tax_code_will_destabilize_the_realm: "The revised taxation system will destabilize our [ROOT.GetCountry.GetFlavorRank]"

 latinization_vs_hellenization.13.title: "[target_location.GetNameWithNoTooltip] Demands Its Own Council"
 latinization_vs_hellenization.13.desc: "The notables of [target_location.GetName] have stepped forth with a petition to the [ROOT.GetCountry.GetGovernment.GetCourtTitle] for an autonomous municipal council, citing the example of the self-governing communes of the Italian cities as proof that local rule brings prosperity. Granting their wish would weaken central control and nudge the [ROOT.GetCountry.GetFlavorRank] toward Latin models of governance, but refusing may embitter influential elites who look westward for inspiration."
 latinization_vs_hellenization.13.a: "Grant them their council."
 latinization_vs_hellenization.13.b: "They will remain under our direct gaze."
 upper_class_pops_in_these_cities_angry: "Our [upper_class|e] [pops|e] in the affected [locations|e] will grow displeased with our refusal and suffer [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [pop_satisfaction|e]"

 latinization_vs_hellenization.14.title: "Grand Festival in [target_province.GetNameWithNoTooltip]"
 latinization_vs_hellenization.14.desc: "Local leaders in [target_province.GetName] wish to hold a grand festival, a thanksgiving to the customs and bounty of the land. While such revelry could ease tensions and reinforce a shared identity, it would require an investment both from the province and our treasury, to the dismay of our financial advisors."
 latinization_vs_hellenization.14.a: "A celebration for [target_province.GetNameWithNoTooltip] alone."
 latinization_vs_hellenization.14.b: "Let neighboring provinces join in the festivities!"
 latinization_vs_hellenization.14.c: "If they have time to idle, they have time to work."
 pops_are_happier_tt: "Our [pops|e] that are NOT considered part of the [upper_class|e] in this [province|e] will gain [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e] because of the ongoing festivals"

 latinization_vs_hellenization.15.title: "A Manual of the Latin Method"
 latinization_vs_hellenization.15.desc: "A meticulous manual of drills and battlefield maneuvers, drawn from the methods of the mercenary captains and military orders of the Latin West, has begun to circulate among our officers. Its diagrams and commands promise to bring order and uniformity to our ranks, assuming we are willing to adopt it as official doctrine."
 latinization_vs_hellenization.15.a: "Distribute it!"
 latinization_vs_hellenization.15.b: "We need no such influences."

 latinization_vs_hellenization.16.title: "[target_character.GetShortNameWithNoTooltip] Clashes with the [target_estate.GetNameWithNoTooltip]"
 latinization_vs_hellenization.16.desc: "Alas! A bitter quarrel has erupted between [target_character.GetName] and leading figures of the [target_estate.GetName], each accusing the other of overstepping their bounds. The dispute threatens to sour relations between the officer corps and the greater interests of our [ROOT.GetCountry.GetFlavorRank]."
 latinization_vs_hellenization.16.a: "They are correct to reprimand [target_character.GetHerHim]."
 latinization_vs_hellenization.16.b: "The [target_estate.GetNameWithNoTooltip] do not dictate military matters!"
 court_faction_increases_influence: "An opposing [ROOT.GetCountry.GetGovernment.GetCourtTitle] faction will increase its influence"
 our_authority_will_suffer_penalty: "Our authority will suffer"

 latinization_vs_hellenization.17.title: "[target_character.GetShortNameWithNoTooltip] Volunteers to Serve"
 latinization_vs_hellenization.17.desc: "Through our ties with [target_country.GetName], a seasoned warrior of [target_culture.GetName] stock has expressed a desire to serve under our banner, drawn by the growing bonds between our courts. [target_character.GetSheHe|U] brings with [target_character.GetHerHim] the military knowledge of the Latin West and offers [target_character.GetHerHis] expertise to our cause."
 latinization_vs_hellenization.17.a: "Every [target_culture.GetNameWithNoTooltip] leader is welcome!"

 latinization_vs_hellenization.18.title: "Disagreement Between Leaders"
 latinization_vs_hellenization.18.desc: "Two of our commanders, [target_character_1.GetName] and [target_character_2.GetName], have fallen into open disagreement over tactics and training. Their rivalry risks dividing the officer corps and confusing the soldiers on campaign. Is this rift but the latest symptom of a divided military? Whatever the case may be, we would best end these quarrels in the interest of our national security."
 latinization_vs_hellenization.18.a: "Heed the advice of [target_character_1.GetShortNameWithNoTooltip]."
 latinization_vs_hellenization.18.b: "[target_character_2.GetNameWithNoTooltip] is in the right!"

 latinization_vs_hellenization.19.title: "[target_province_destination.GetNameWithNoTooltip] Attracts Migrants"
 latinization_vs_hellenization.19.desc: "The splendor and good name of [target_province_destination.GetName] have led people from [target_province_origin.GetName] to embark on a journey to our lands. If they come from the Latin West, their settlement will deepen our connections there; if they are Orthodox neighbors, their arrival will strengthen the ancient character of the province."
 latinization_vs_hellenization.19.a: "They will enrich our society!"
 latinization_vs_hellenization.19.b: "They are not welcome."

 latinization_vs_hellenization.20.title: "The Loyalty of [target_character.GetNameWithNoTooltip]"
 latinization_vs_hellenization.20.desc: "Rumors swirl that [target_character.GetName] has been meeting with envoys and agents whose loyalties lie elsewhere. Whether born of malice or misinterpretation, such whispers gnaw at the trust within our command. While our spies report of distrust, it would be wise to weigh the situation carefully."
 latinization_vs_hellenization.20.a: "[target_character.GetSheHe|U] has earned [target_character.GetHerselfHimself] some vacation..."
 latinization_vs_hellenization.20.b: "We cannot listen to this idle chatter!"
 target_character_spills_the_beans: "[target_character.GetShortName] divulges our secrets to our [rivals|e] and [rival_enemies|e]"
 target_character_lips_shut: "[target_character.GetHerHis|U] lips remain shut"

 latinization_vs_hellenization.21.title: "Inflationary Policies"
 latinization_vs_hellenization.21.desc: "An influx of debased and counterfeit coins has begun to distort prices throughout [ROOT.GetCountry.GetName]. Some of our advisors at the [ROOT.GetCountry.GetGovernment.GetCourtTitle] urge immediate intervention, while others argue that the cure may prove as painful as the ailment."
 latinization_vs_hellenization.21.a: "Tighten our control over the currency."
 latinization_vs_hellenization.21.b: "Let the market sort itself out."
 inflation_creeping_in_tt: "If left unchecked, [inflation|e] may cause major issues in the future"
 burghers_pleased: "The [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] are pleased with our restraint"
 burghers_upset: "Our inaction upsets the [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]"
 inflation_causes_instability: "Rampant [inflation|e] impacts our [stability|e] negatively"

 latinization_vs_hellenization.22.title: "The Tutor-Friend of [target_character_1.GetShortNameWithNoTooltip]"
 latinization_vs_hellenization.22.desc: "[target_character_1.GetName] has grown particularly close to [target_character_2.GetName], whose lessons now extend beyond simple letters and sums. Some say this friendship broadens [target_character_1.GetHerHis] horizons, while others fear undue influence over the future of our [ROOT.GetCountry.GetFlavorRank]."
 latinization_vs_hellenization.22.a: "Only the best for our little [target_character_1.GetShortNameWithNoTooltip]!"
 latinization_vs_hellenization.22.b: "[target_character_1.GetSheHe|U] was born to lead, not to read!"
 heir_will_receive_more_tutoring_tt: "Our beloved [target_character_1.GetShortName] will receive supplementary tutorship, potentially enhancing [target_character_1.GetHerHis] [abilities|e]. This may impact [target_character_1.GetHerHis] policy-making should [target_character_1.GetSheHe] ascend the throne."

 latinization_vs_hellenization.23.title: "A [target_character.GetWomanMan|U] of Letters"
 latinization_vs_hellenization.23.desc: "A wandering [target_culture.GetName] scholar, trained in the humanist traditions of the Italian cities, has arrived at our [ROOT.GetCountry.GetGovernment.GetCourtTitle], bearing Latin manuscripts, philosophical commentaries, and ideas drawn from the flourishing learning of the West. Such a figure could be a valuable conduit to the intellectual currents of the Latin world. However, we ought to be wary of the foreign sympathies [target_character.GetSheHe] may bring with [target_character.GetHerHim]."
 latinization_vs_hellenization.23.a: "Stay with us for a while, weary traveller."
 latinization_vs_hellenization.23.b: "We care not for the musings of roaming beggars."

 latinization_vs_hellenization.24.title: "A Knowledgeable Traveler"
 latinization_vs_hellenization.24.desc: "A learned [target_character.GetWomanMan] versed in the writings of the Church Fathers and the commentaries of the great Orthodox theologians has requested the right to reside at our [ROOT.GetCountry.GetGovernment.GetCourtTitle], offering to share manuscripts gathered from the monasteries of the East and a deep knowledge of imperial law and Orthodox doctrine. Whether this wisdom strengthens our traditions or merely adds another voice to a crowded court is up to us."
 latinization_vs_hellenization.24.a: "Very well, [target_character.GetShortNameWithNoTooltip] may stay."
 latinization_vs_hellenization.24.b: "Nothing special, [target_character.GetSheHe] is just another brick in the wall."

 latinization_vs_hellenization.25.title: "Cultural Decay"
 latinization_vs_hellenization.25.desc: "Chroniclers lament that the cultural vigor of [ROOT.GetCountry.GetName] is ebbing away. Patronage falters, traditions are neglected, and the works that once inspired our people now gather dust in libraries and vaults. Are we, as heralds of a great culture, out of touch?"
 latinization_vs_hellenization.25.a: "We must accept that our legacy has dimmed."
 latinization_vs_hellenization.25.b: "No, it is everyone else that is wrong!"

 latinization_vs_hellenization.26.title: "Eastern Fashions at the [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
 latinization_vs_hellenization.26.desc: "Silks, perfumes, and customs carried by merchants and envoys from the courts of the East have captured the imagination of our [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Some regard this as natural for an empire that has long stood between East and West, while others argue that our future lies with the Latin powers and that an eastward-looking court will only drive our Western allies away."
 latinization_vs_hellenization.26.a: "The East has always been part of our world."
 latinization_vs_hellenization.26.b: "We must look to the West, not the East."

 latinization_vs_hellenization.27.title: "[ShowSocietyDirectionNameWithNoTooltip('hellenization')] Policies Pay Off"
 latinization_vs_hellenization.27.desc: "The cultural policies we have embraced are finally bearing fruit. Scholars praise renewed clarity, admirals speak of restored confidence, and the people sense that our path, however contested, leads somewhere purposeful."
 latinization_vs_hellenization.27.a: "Smile, we make our ancestors proud."
 strength_of_hellenization_desc: "Strength of our [ShowModifierTypeName('monthly_towards_hellenization')] [country_modifier|e]"

 latinization_vs_hellenization.28.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Resist Current Trends"
 latinization_vs_hellenization.28.desc: "Leading families within the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] complain that the [ROOT.GetCountry.GetFlavorRank] is drifting too far, too fast in its cultural policies. They insist that only their steady hand can keep [ROOT.GetCountry.GetName] from losing its character entirely."
 latinization_vs_hellenization.28.a: "Concede to their demands."
 latinization_vs_hellenization.28.b: "We will not change course."

 latinization_vs_hellenization.29.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] Resist Current Trends"
 latinization_vs_hellenization.29.desc: "To our dismay, the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] have recently started speaking uneasily about our cultural direction. Some see these drifts as corruptive or even dangerous, but all agree that the faith must be safeguarded from such malicious trends."
 latinization_vs_hellenization.29.a: "Heed their warnings."
 latinization_vs_hellenization.29.b: "Doctrine must not rule policy."
 refusal_leads_instability: "Our refusal to comply leads to instability"
 situation_dissipates: "The heated exchange does not escalate"

 latinization_vs_hellenization.30.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Resist Current Trends"
 latinization_vs_hellenization.30.desc: "Among the fields and villages of [ROOT.GetCountry.GetName], many members of the lower class grumble that distant debates over chasing grandeur and custom bring them only new obligations and strange officials. Their quiet resistance could grow louder if left unanswered."
 latinization_vs_hellenization.30.a: "Appease the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
 latinization_vs_hellenization.30.b: "Force compliance with the current trend."
