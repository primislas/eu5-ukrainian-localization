l_english:

 spread_philhellenism: "Spread Philhellenism"
 spread_philhellenism_desc: "By elevating [ShowCultureGroupName('greek_group')] learning, art, and philosophy, we seek to shape how our realm is perceived both at home and abroad. Scholars, artists, and admirers of [ShowCultureName('greek_culture')] culture are drawn to us, strengthening our splendor and influence through admiration rather than force."
 spread_philhellenism_action: "$spread_philhellenism$"
 spread_philhellenism_active: "Spreading Philhellenic Policy"
 spread_philhellenism_action_progress: "[SCOPE.sCountry('actor').GetModifierValue('research_speed_modifier')]"
 spread_philhellenism_action_progress_wordier: "[SCOPE.sCountry('actor').GetModifierValue('research_speed_modifier')]"
 spread_philhellenism_action_progress_tooltip: "[research_progress|e]: [SCOPE.sCountry('actor').GetModifierValue('research_speed_modifier')] \n\n[cultural_influence|e]: [SCOPE.sCountry('actor').GetModifierValue('cultural_influence_modifier')]"
spread_philhellenism_action_progress_long_wordier: "@research_progress! [SCOPE.sCountry('actor').GetModifierValue('research_speed_modifier')] \n\n@cultural_influence! [SCOPE.sCountry('actor').GetModifierValue('cultural_influence_modifier')]"

 encourage_latin_militarism: "Encourage [ShowLanguageNameWithNoTooltip('latin_language')] Militarism"
 encourage_latin_militarism_desc: "We shall bind our realm to the [ShowLanguageName('latin_language')] ideal of ordered war: contracts enforced, drills standardized, and the burden of arms made routine. Such discipline will surely reduce the cost of keeping soldiers in the field and foster a professional tradition of service."
 encourage_latin_militarism_action: "Encourage Latin Militarism"
encourage_latin_militarism_active: "Encouraging Latin Militarism"
encourage_latin_militarism_action_progress: "[SCOPE.sCountry('actor').GetModifierValue('army_maintenance_efficiency')]"
encourage_latin_militarism_action_progress_wordier: "[army_maintenance|e]: [SCOPE.sCountry('actor').GetModifierValue('army_maintenance_efficiency')]"
encourage_latin_militarism_action_progress_long_wordier: "@army_maintenance! [SCOPE.sCountry('actor').GetModifierValue('army_maintenance_efficiency')] \n\n@army_tradition! [SCOPE.sCountry('actor').GetModifierValue('monthly_army_tradition')]"
encourage_latin_militarism_action_progress_tooltip: "[army_maintenance|e]: [SCOPE.sCountry('actor').GetModifierValue('army_maintenance_efficiency')] \n\n[army_tradition|e]: [SCOPE.sCountry('actor').GetModifierValue('monthly_army_tradition')]"

 AUTO_MODIFIER_NAME_bureaucracy_nomos_empsychos_high_legitimacy: "$nomos_empsychos_bureaucracy$"
 AUTO_MODIFIER_NAME_bureaucracy_nomos_empsychos_low_legitimacy: "$nomos_empsychos_bureaucracy$"

 cb_restore_roman_borders: "Restore $ROM_ADJ$ Borders"
 cb_restore_roman_borders_desc: "The splendor of the old Empire calls to us. It is time for the phoenix to spread its wings, dooming all those who dare stand between us and our ambition to restore the [ShowScriptedGeographyName('roman_borders_geography')] of old."
 roman_borders_geography: "$ROM_ADJ$ Borders"

 epic_hellenic_history: "Epic of Hellenic History"
 epic_hellenic_history_desc: "A retelling of the illustrious history of the ancient Greek world, composed on gold-leaf pages and adorned with calligraphy. This work of art is a testament to our affluence and the great personalities we are lucky to call our ancestors. This chronicle contains a collection of stories such as the destruction of Troy, where the great Achilles met his demise, the journeys of the legendary Odysseus, and the voyages of Jason and his Argonauts, among others."

 nomos_empsychos_bureaucracy: "Nómos Émpsychos"
 nomos_empsychos_bureaucracy_desc: "Deriving from the concept of living law (#italic Nómos Émpsychos#!), the Emperor forms a fundamental cornerstone of our administration and embodies sovereign authority itself. First articulated under Justinian, this principle binds legislation, justice, and command to the imperial person, placing the ruler at the very core of the Roman state."


 
 honorary_titles_bureaucracy: "Honorary Titles"
 honorary_titles_bureaucracy_desc: "From the #italic Patrikios#! and #italic Anthypatos#! to the #italic Magistros#! and #italic Kouropalatēs#!, our court governs ambition through dignity rather than command.\n\nThis intricate system, revolving around the bestowing of ranked honors, silks, and privileges, allows the Emperor to bind generals, senators, and provincial elites to the throne by rewarding loyalty, defusing rivalry, and turning prestige itself into an instrument of rule."

 
 court_eunuchs_bureaucracy: "Court Eunuchs"
 court_eunuchs_bureaucracy_desc: "Educated, loyal, and excluded from dynastic ambition, court eunuchs form a trusted administrative cadre. Their proximity to the Emperor and insulation from familial power make them ideal stewards of palace governance, finance, and imperial correspondence."

 
 ritualistic_court_bureaucracy: "Ritualistic Court"
 ritualistic_court_bureaucracy_desc: "Ceremony is governance made visible. Through regulated ritual, precedence, and spectacle, the imperial court transforms authority into sacred theatre, ordering hierarchy at home while overwhelming foreign envoys with the majesty of our great capital, the perceived center of the civilized world."



 sixty_books_of_the_basilika_bureaucracy: "Books of the Basiliká"
 HAS_SIXTY_BOOKS_OF_THE_BASILIKA_TRIGGER: "Has the $sixty_books_of_the_basilika_bureaucracy$"
 THIRD_HAS_SIXTY_BOOKS_OF_THE_BASILIKA_TRIGGER: "Has the $sixty_books_of_the_basilika_bureaucracy$"
 FATE_OF_THE_PHOENIX_DISASTER_ACTIVE_TRIGGER: "The $fate_of_the_phoenix$ [disaster|e] is active"
 THIRD_FATE_OF_THE_PHOENIX_DISASTER_ACTIVE_TRIGGER: "The $fate_of_the_phoenix$ [disaster|e] is active"
 sixty_books_basilika_satisfaction_scale_tt: "The Peasants [estate_satisfaction|e] penalty scales with the $sixty_books_of_the_basilika_bureaucracy$ maintenance slider. (#R -5%#! at full maintenance and #R -20%#! at no maintenance)"
 sixty_books_of_the_basilika_bureaucracy_desc: "Building upon Justinian's #italic Corpus Juris Civilis#!, the $sixty_books_of_the_basilika_bureaucracy$ reorganize Roman law into a coherent [ShowLanguageName('greek_language')] legal corpus. By clarifying, standardizing, and harmonizing centuries of jurisprudence, they render the Emperor's law undisputed, authoritative, and universal."


 romanitas_bureaucracy: "Romanitas"
 romanitas_bureaucracy_desc: "$romanitas_bureaucracy$ affirms uninterrupted Roman statehood. The Emperor rules not by conquest or ethnicity, but as the lawful inheritor of authority, law, and tradition that dates back over a millennium. This identity binds empire and faith together, presenting Roman rule as divinely sanctioned and morally supreme."



 imperial_senate_bureaucracy: "Imperial Senate"
 imperial_senate_bureaucracy_desc: "Composed of senior dignitaries appointed by imperial authority, the Senate serves as a body of acclamation and counsel. Its assent legitimizes reigns, successions, and major acts, preserving Roman continuity while ensuring that sovereignty remains firmly imperial."


 kephalai_bureaucracy: "Kephalai"
 kephalai_bureaucracy_desc: "The #italic Kephalai#! are administrative and legal compendia designed to render imperial governance practicable. Replacing older regional arrangements such as the #italic Katepaníkion#!, they distill law, taxation, and military obligations into standardized directives, ensuring uniform rule across the provinces."
 won_fate_of_the_phoenix_disaster_tt: "We have emerged victorious through the [ShowDisasterName('fate_of_the_phoenix')] [disaster|e]"
 fop_renaissance_latin_merchants_tt: "We have granted privileges to [ShowCultureGroupName('latin_group')] merchants"


 magister_militum_bureaucracy: "Strategarchia"
 magister_militum_bureaucracy_desc: "The #italic Strategarchia#! embodies the institutional command of the imperial army. Generals are appointed, rotated, and restrained by bureaucracy, ensuring that military power serves the state rather than personal ambition. Warfare is thus rendered an administrative function, governed by hierarchy rather than fealty, while ensuring only the best rise to the top."


 has_unlocked_bureaucracy_via_flavor_byz_31_tt: "We have unlocked this [bureaucracy|e] through the $flavor_byz.31.title$ [event|e] which may occur after the year #Y 1400#!"

 themata_bureaucracy: "Thémata"
 themata_bureaucracy_desc: "Formed in response to existential pressure, the #italic Thémata#! divide the empire into provincial military-administrative districts. Each of these divisions is governed by a #italic Strategós#! who unites civil and military authority, enabling rapid local defense while remaining formally subordinate to the imperial hierarchy."


 allelengyon_bureaucracy: "Allelengyon"
 allelengyon_bureaucracy_desc: "Originally conceived under Emperor Basil II (commonly known by his nickname #italic the Bulgar-Slayer#!) and deriving from the [ShowLanguageName('greek_language')] word #italic allilengýi#! (solidarity), the #italic $allelengyon_bureaucracy$#! was a tax obligation designed to redistribute fiscal burden. When smallholders fail to meet their dues, responsibility is legally transferred to wealthier landowners of the district, ensuring imperial revenue while preventing the ruin and absorption of peasant lands. In this way, fiscal solidarity becomes a lever of stability and control."

 katepanata: "Katepanáta"
 katepanata_desc: "The answer to warmongering neighbors is the consolidation of newly conquered territory through resolute military authority. Originating from the word #italic katepánō#! — the one placed at the top — the $katepanata$ stand above the ordinary themes, grouping provinces beneath a single commander invested with both civil and martial power. First employed with prominence in the 10th and 11th centuries, from [ShowRegionName('italy_region')] with its seat at [ShowLocationName('bari')] to the volatile frontiers of [ShowAreaNameWithNoTooltip('armenia_area')] under emperors such as Basil II, these great districts ensured that distant and contested lands were not left to fragmented rule. Let these bastions of our willpower serve as a banner against all those who seek to take our crown from us!"
 has_completed_fate_of_the_phoenix_disaster: "We have completed the [ShowDisasterName('fate_of_the_phoenix')] [disaster|e] victoriously"


