l_english:

 d008_flavor_byz.1.title: "Alchemical Promises"
 d008_flavor_byz.1.entry: "$d008_flavor_byz.1.title$"
 d008_flavor_byz.1.desc: "In the past, Greek Fire was known across the whole of the Mediterranean and even further beyond, and feared among all navies of our enemies to the point of turning it legendary. Its potential for burning hotter than any flame even on water, and its impossibility to be extinguished through normal means meant that it could turn any vessel into ashes in almost an instant. Its production had always been a close-guarded secret in our country, but alas time has made this knowledge lost to us too, and we find ourselves unable to produce it as before.\n\nNow, one of our most prominent alchemists, [target_artist.GetName], assures us that [target_artist.GetSheHe] is capable of recovering the lost formula, and replicate it. If that is indeed true, we could be able to arm our fleets once more with the deadly fire. Both our [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] and our [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] are excited by this news, although to actually develop it, [target_artist.GetNameWithNoTooltip] requires from us some money for [target_artist.GetHerHis] experiments."
 d008_flavor_byz.1.a: "[target_artist.GetSheHe|U] shall have whatever [target_artist.GetSheHe] needs!"
 d008_flavor_byz.1.b: "Our navy is already strong enough without need of past fantasies."
 d008_flavor_byz.1.a.tt: "[target_artist.GetName] will conduct experiments in search of the formula of the Greek Fire"

 d008_flavor_byz.2.title: "The Quest for Fire"
 d008_flavor_byz.2.desc: "It has a while since [target_artist.GetName] secluded [target_artist.GetHerselfHimself] in [target_artist.GetHerHis] laboratory in search for the formula of Greek Fire, but until now the only results [target_artist.GetSheHe] has been able to yield are a series of nocturnal explosions and a couple of burned eyebrows. [target_artist.GetHerHis|U] apparent ineptitude is already making many doubt whether [target_artist.GetSheHe] will be actually able to be successful in [target_artist.GetHerHis] endeavor, while [target_artist.GetSheHe] assures us [target_artist.GetSheHe] is on the cusp of a breakthrough, and that only a little bit more time and money are needed for it."
 d008_flavor_byz.2.a: "Very well, provide [target_artist.GetHerHim] with extra funds."
 d008_flavor_byz.2.b: "We have had enough of such fantasies."
 d008_flavor_byz.2.a.tt: "[target_artist.GetName] will continue [target_artist.GetHerHis] search of the formula of the Greek Fire"

 d008_flavor_byz.3.title: "Greek Fire"
 d008_flavor_byz.3.desc: "Many nights were the people of [ROOT.GetCountry.GetCapital.GetName] disturbed in their sleep due to the explosions caused by the experiments of [target_artist.GetName]. Many times was [target_artist.GetHerselfHimself] burned during them, but all those hardships have born fruit. After many trials and errors, [target_artist.GetSheHe] has managed to reliably replicate Greek Fire like it is described in the historical records. Now we can expand its production, and equip our vessels with it. Although we will still keep its exact formula and manufacture a secret, we will have to ensure that we ourselves do not again forget how to make it this time."
 d008_flavor_byz.3.a: "Once again, the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] navy will set the sea ablaze!"
 unlocked_greek_fire_tt: "We gain access to the [ShowUnitDefinitionName('n_greek_fire_galley_renaissance')], [ShowUnitDefinitionName('n_greek_fire_galley_discovery')], [ShowUnitDefinitionName('a_greek_fire_renaissance_infantry')], and [ShowUnitDefinitionName('a_greek_fire_discovery_infantry')] [unit_types|e]"
 
 d008_flavor_byz.4.title: "[target.GetNameWithNoTooltip]'s Search Comes to an End"
 d008_flavor_byz.4.desc: "The untimely demise of [target.GetName] has unfortunately resulted in [target.GetHerHis] search for the Greek Fire becoming unconcluded. [target.GetHerHis|U] disciples and other prominent alchemists have taken a look at [target.GetHerHis] notes to see if [target.GetHerHis] research can be salvaged and continued, but alas [target.GetHerHis] experiments seem to have been going in circles without anything concrete to grasp on. Greek Fire will thus be forever more a mystery sealed in history."
 d008_flavor_byz.4.a: "Oh... well, anyway..."