l_english:

 # Hellenism

 #Religious Aspects
 civic_religion_aspect: "Civic Religion"
 civic_religion_aspect_desc: "Honoring the gods is the same as maintaining the well-being of the state. Therefore, religious practices and ceremonies are a civic duty that we must uphold to ensure the prosperity of our polis."

 hero_cult_aspect: "Heroic Cults"
 hero_cult_aspect_desc: "Our history is full of powerful figures who shaped our society and our character. These were the mortal sons of the gods, humans with extraordinary abilities who often met tragic fates, and who protected and led our ancestors into founding the great nation that we are today. It is now our duty to worship them and learn their lessons."

 dionysian_mysteries_aspect: "Dionysian Mysteries"
 dionysian_mysteries_aspect_desc: "The rituals, dance, and music of those initiated into the mysteries of Dionysus provide liberation and release to its members, without distinction of social classes. The death and rebirth of the god are mirrored by the cycle of the grape vine, growing from the earth, becoming wine, and finally being drunk by the acolytes in glory of Dionysus."

 eleusinian_mysteries_aspect: "Eleusinian Mysteries"
 eleusinian_mysteries_aspect_desc: "The acolytes of the Eleusinian mysteries follow the myth of the abduction of Persephone from her mother, Demeter, by the king of the underworld, Hades, and her subsequent release and deception. To the initiated, this myth represents the cycle of growth and rebirth of all plant life and the eternity of life as it flows from one generation to the next."

 samothracian_mysteries_aspect: "Samothracian Mysteries"
 samothracian_mysteries_aspect_desc: "On the island of Samothrace, a mystery cult thrived during the height of Hellenism; it famously accepted anybody who wanted to join, no matter their social class. It is said that many mythological heroes, like Heracles, Jason, and Orpheus, were initiated at Samothrace. We can collect and reconstruct these mysteries from the remains and ruins, and bring this cult back to its former glory."

 olympiad_aspect: "Olympic Games"
 olympiad_aspect_desc: "The Olympic Games are a celebration of the gods and a demonstration of our country's strength and unity. Participation in the games is a civic duty that brings honor to our athletes."

 mithraic_mysteries_aspect: "Mithraic Mysteries"
 mithraic_mysteries_aspect_desc: "The initiates in the Mithraic mysteries who call themselves Syndexioi enjoyed a great deal of popularity in Rome and the Western Roman Empire during the height of the Empire. Their rituals, gatherings, and feasts took place in secret underground temples, but we can bring them back to the light, and revive their traditions for the benefit of our people."
 
 imperial_cult_aspect: "Imperial Cult"
 imperial_cult_aspect_desc: "As the ancient emperors of Rome were once regarded as divine by the people and Senate, our ruler and their dynasty are also to be considered as such. Their greatness, majesty, and authority clearly mark them as not only divinely sanctioned, but as gods themselves."

 dii_familiares_aspect: "Dii Familiares"
 dii_familiares_aspect_desc: "The domestic and familiar gods play a very important role for the people of our country. They protect and influence everything that happens in a person's domain, which commonly entails a household, but could also encompass roadways, neighborhoods, or even entire cities."

 mos_maiorum_aspect: "Mos Maiorum"
 mos_maiorum_aspect_desc: "The unwritten code that ruled the lives of Romans from antiquity to the height of the Empire, the 'Way of the Ancestors.' This set of traditions and practices has defined what it means to be a Roman and how to behave both inside the household and in public."

 monism_aspect: "Monism"
 monism_aspect_desc: "The philosophers of our revival hold that all existence flows from The One — a single transcendent principle from which all gods and all things emanate. The traditional pantheon becomes allegory; the gods are aspects of The One. Omens lose their particular force, but faith in The One suffuses every act of governance."

#Omens

 #Zeus
 the_thunderer_omen: "The Thunderer"
 the_thunderer_omen_desc: "The skies rise in anger with lighting and thunder, and any who opposes us will cower in fear."
 supreme_of_gods_omen: "Supreme of Gods"
 supreme_of_gods_omen_desc: "The blazing sun signals that we have the favor of the mightiest of all gods. No one will doubt our glory!"
 monarch_of_the_sky_omen: "Monarch of the Sky"
 monarch_of_the_sky_omen_desc: "A flock of birds takes flight, answering to [ShowGodName('zeus_god')] and carrying his will."
 omnipotence_of_heaven_omen: "Omnipotence of Heaven"
 omnipotence_of_heaven_omen_desc: "We are truly in the presence of [ShowGodName('zeus_god')], one can feel his power, and how nothing is impossible for him."
 the_liberator_omen: "The Liberator"
 the_liberator_omen_desc: "The power of [ShowGodName('zeus_god')] helped our ancestors against the oppression of Persia; he will free us from our shackles."
 the_bountiful_one_omen: "The Bountiful One"
 the_bountiful_one_omen_desc: "All who turn their gaze up to [ShowGodName('zeus_god')] will share in his power, and receive in turn from his abundance."
 the_holy_omen: "The Holy"
 the_holy_omen_desc: "There is nothing more sacred than being in the presence of the highest of the divines, and having his favor."
 king_of_all_omen: "King of All"
 king_of_all_omen_desc: "[ShowGodName('zeus_god')] is the highest authority among the divine, as our ruler is above our people."
 immortal_omen: "Immortal"
 immortal_omen_desc: "How can a god be killed? With [ShowGodName('zeus_god')]'s protection, how can our troops fail?"
 splendor_omen: "The Splendor"
 splendor_omen_desc: "The clear sky demonstrates how the glory of [ShowGodName('zeus_god')] is unquestionable. The favor he shows us shall be seen all over the world."

 #Aphrodite
 mother_of_love_omen: "Mother of Love"
 mother_of_love_omen_desc: "Love overflows from [ShowGodName('aphrodite_god')], and our populace will bask in that same love."
 the_foam_born_omen: "The Foam-Born"
 the_foam_born_omen_desc: "The sea foam from where [ShowGodName('aphrodite_god')] was born washes against our coasts, and she is always there to lovingly carry our ships through it."
 the_seductress_omen: "The Seductress"
 the_seductress_omen_desc: "Love and seduction are the realms of [ShowGodName('aphrodite_god')], and her arts and favor will turn many towards us."
 giver_of_joy_omen: "Giver of Joy"
 giver_of_joy_omen_desc: "Nothing can be more blissful than being in the presence of the goddess of beauty, and having her favor."
 nurturer_of_children_omen: "Nurturer of Children"
 nurturer_of_children_omen_desc: "There is no further expression of the goddess's love than that towards children, and her motherly love extends to all of us."
 the_beautiful_omen: "The Beautiful"
 the_beautiful_omen_desc: "As the fairest goddess, [ShowGodName('aphrodite_god')] gathers many sympathizers, and so will we with her favor."
 the_secretive_omen: "The Secretive"
 the_secretive_omen_desc: "Not all love shall be public. Discretion and secrecy are also tools of the goddess."
 the_harmonizer_omen: "The Harmonizer"
 the_harmonizer_omen_desc: "[ShowGodName('aphrodite_god')]'s love is equally shared with all, and so be shall our love for our people."
 the_lover_of_laughter_omen: "The Lover of Laughter"
 the_lover_of_laughter_omen_desc: "[ShowGodName('aphrodite_god')]'s visage is always smiling; so shall ours be."
 the_desired_omen: "The Desired"
 the_desired_omen_desc: "Being the most beautiful goddess, [ShowGodName('aphrodite_god')] sparks desire among all. Having her favor will therefore attract others."

 #Poseidon
 tempest_omen: "The Tempest"
 tempest_omen_desc: "Godly fury stirs the waters, unleashing storms that challenge even the bravest seafarers."
 lord_of_the_sea_omen: "Lord of the Sea"
 lord_of_the_sea_omen_desc: "Rule over the seas means dominion of the world."
 protector_of_horses_omen: "Protector of Horses"
 protector_of_horses_omen_desc: "With the favor of the divine father of all horses, our own mounts will thrive and grow strong."
 wielder_of_the_trident_omen: "Wielder of the Trident"
 wielder_of_the_trident_omen_desc: "There is no more iconic weapon than that of the sea god; it proves that a multiple-prong attack is the best option."
 earth_shaker_omen: "Earth-Shaker"
 earth_shaker_omen_desc: "As he struck the earth to create a spring, so will enemies who tread on our soil be struck."
 leader_of_the_nymphs_omen: "Leader of the Nymphs"
 leader_of_the_nymphs_omen_desc: "The favor of [ShowGodName('poseidon_god')] also brings with it the favor of his nymphs, who will bless all our waters and springs."
 the_watcher_omen: "The Watcher"
 the_watcher_omen_desc: "The sight of [ShowGodName('poseidon_god')] is everywhere, over all seas and waters, and nothing escapes his gaze."
 the_graceful_omen: "The Graceful"
 the_graceful_omen_desc: "There is beauty in the sea and waves, and properly contemplating them gives beauty to the heart."
 master_of_the_waves_omen: "Master of the Waves"
 master_of_the_waves_omen_desc: "None shall sail the sea without [ShowGodName('poseidon_god')]'s permission."
 dark_blue_haired_omen: "Dark Blue-Haired"
 dark_blue_haired_omen_desc: "The waves are the blue hair of the god himself, and our vessels will swiftly sail them with his favor."
 #Hermes
 messenger_omen: "The Messenger"
 messenger_omen_desc: "The winged heels always deliver any message swiftly and safely."
 golden_wand_omen: "Of the Golden Wand"
 golden_wand_omen_desc: "The Caduceus was used to separate two snakes, but what separates also connects."
 god_of_travelers_omen: "God of Travelers"
 god_of_travelers_omen_desc: "All travelers and wandering merchants turn to [ShowGodName('hermes_god')] for safety and protection."
 protector_of_merchants_omen: "Protector of Merchants"
 protector_of_merchants_omen_desc: "Under the attentive gaze of [ShowGodName('hermes_god')], merchants will travel safely and bountifully through our land."
 wing_footed_omen: "The Wing-Footed"
 wing_footed_omen_desc: "The favor of [ShowGodName('hermes_god')] shall allow our troops to move as swiftly as the god himself."
 trickster_omen: "The Trickster"
 trickster_omen_desc: "The changing of the winds shows how even [ShowGodName('hermes_god')] has a fickle nature, and that all things are subject to change and deceit."
 patron_of_thieves_omen: "Patron of Thieves"
 patron_of_thieves_omen_desc: "Swiftness can be used to do good or ill, but either way, it is a good quality to have."
 president_of_games_omen: "President of Games"
 president_of_games_omen_desc: "The favor of [ShowGodName('hermes_god')] falls upon the athletic games, which provide us with both entertainment and a healthy activity."
 guardian_of_the_gates_omen: "Guardian of the Gates"
 guardian_of_the_gates_omen_desc: "All roads and travelers will sooner or later go through a gate, which will either allow their passage or block it."
 giver_of_wealth_omen: "Giver of Wealth"
 giver_of_wealth_omen_desc: "Under the auspices of [ShowGodName('hermes_god')], trade is not just for the movement of goods, but also for that of wealth."
 #Ares
 throng_of_battle_omen: "The Throng of Battle"
 throng_of_battle_omen_desc: "In every conflict, in any strife, [ShowGodName('ares_god')] dwells, and it is his will which determines its outcome."
 insatiable_at_war_omen: "Insatiable in War"
 insatiable_at_war_omen_desc: "[ShowGodName('ares_god')] revels in battle, and the longer and bloodier it is, the better to gain his favor."
 slayer_of_men_omen: "Slayer of Men"
 slayer_of_men_omen_desc: "The fury of [ShowGodName('ares_god')] will accompany our men in battle, and his might will be in their arms."
 plague_of_mankind_omen: "Plague of Mankind"
 plague_of_mankind_omen_desc: "None can dare face the god of war and dream to live another day."
 warrior_omen: "The Warrior"
 warrior_omen_desc: "Simple slaughter will not be enough to satisfy the warrior god, only glorious combat."
 audacious_omen: "The Audacious"
 audacious_omen_desc: "Rushing towards combat to inflict damage to our enemies is sure to secure the favor of [ShowGodName('ares_god')] and win his grace."
 blood_soaked_omen: "Blood-Soaked"
 blood_soaked_omen_desc: "The blood of our enemies shall be spilled and offered to the god that demands it." #Blood for the Blood God!
 malignant_omen: "Malignant"
 malignant_omen_desc: "No strategy is too underhanded if it is to secure the destruction of our enemies."
 indestructible_omen: "The Indestructible"
 indestructible_omen_desc: "[ShowGodName('ares_god')] holds not only a spear to attack the enemy, but also a shield to protect himself."
 fickle_lord_of_war_omen: "The Fickle Lord of War"
 fickle_lord_of_war_omen_desc: "War and battles can turn at any point, but the favor of [ShowGodName('ares_god')] shall ensure they turn in our favor."
 #Athena
 unseen_hand_omen: "Unseen Hand"
 unseen_hand_omen_desc: "No plan fails by chance alone; the heavens inspire invading commanders towards poor decisions. Patrols are led into ambush, supply lines disrupted, and captains gravely misled."
 unwavering_omen: "The Unwavering"
 unwavering_omen_desc: "As [ShowGodName('athena_god')] stands proud and unmovable, so shall we be unfazed from any weariness."
 she_who_fights_in_front_omen: "She Who Fights in Front"
 she_who_fights_in_front_omen_desc: "To swiftly go to the encounter with the enemy and face them is the quickest way to dispose of them."
 the_industrious_omen: "The Industrious"
 the_industrious_omen_desc: "Diligence and application to one's work is the best way to obtain profit and positive results."
 the_judge_omen: "The Judge"
 the_judge_omen_desc: "Under the attentive sight and wisdom of [ShowGodName('athena_god')] no crime will go unpunished and no innocent will be unjustly harmed."
 the_chieftain_of_war_omen: "The Chieftain of War"
 the_chieftain_of_war_omen_desc: "As ants will wander aimlessly without a line to follow, so will armies scatter without proper leadership and guidance."
 teacher_of_the_waves_omen: "Teacher of the Waves"
 teacher_of_the_waves_omen_desc: "[ShowGodName('poseidon_god')] may rule the waves, but [ShowGodName('athena_god')] tamed them with ships."
 protector_of_the_anchorage_omen: "Protector of the Anchorage"
 protector_of_the_anchorage_omen_desc: "As a master of ship-building, how could our vessels not be safe under [ShowGodName('athena_god')]'s favor?"
 the_bright_eyed_omen: "The Bright-Eyed"
 the_bright_eyed_omen_desc: "Being under the symbol of the owl, we are truly recipients of [ShowGodName('athena_god')]'s favor and wisdom."
 the_armed_one_omen: "The Armed One"
 the_armed_one_omen_desc: "Armed ever since her birth, [ShowGodName('athena_god')] shows us that always being prepared for battle is the best strategy."
 
 hellenism_religion.1.title: "[target_god.GetNameWithNoTooltip] Smiles Upon Us"
 hellenism_religion.1.desc: "In these calm days, the gods have not turned their gaze from us. Signs appear in strange coincidences, in sudden strokes of fortune, and in the routine that spreads through the [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nThe priests proclaim that [target_god.GetName] smiles upon our [ROOT.GetCountry.GetFlavorRank] and our beloved [target_character.GetNameWithNoTooltip]. Indeed, it appears our luck is turning and the sacrifices we have dedicated have finally made an impact on our fortune!"
 hellenism_religion.1.a: "We accept the blessing."
 fertile_ruler_and_family_tt: "[target_character.GetName] and the [consort|e] will have their [fertility|e] increased"

 hellenism_religion.2.title: "The Eagle of [target_character.GetNameWithNoTooltip]"
 hellenism_religion.2.desc: "What can be said about [target_character.GetName], whose tactical prowess is a shining example of the military traditions espoused by the forefathers of our [ROOT.GetCountry.GetFlavorRank]? Few can stand next to the likes of Odysseus, Jason, or Ajax in terms of cunning, tenacity, and bravery.\n\nHowever, [target_character.GetShortNameWithNoTooltip] is a proud product of our devotion to our [ShowReligionAdjective('hellenism_religion')] roots, a true eagle of the battlefield!"
 hellenism_religion.2.a: "Will [target_character.GetSheHe] fight in the shade?"
 hellenism_religion.2.b: "Send [target_character.GetHerHim] to teach at the academy!"

 hellenism_religion.3.title: "The Philosophical Wing of [target_location.GetNameWithNoTooltip]"
 hellenism_religion.3.desc: "From whence came the human soul? What awaits us after death? Would life be better as a featherless biped? Such burning questions occupy the overstuffed minds of intellectuals and philosophers of the [ShowBuildingTypeName('university')] of [target_location.GetName].\n\nRecently, the faculty has come under the wing of a rich local benefactor, who now petitions for increased funding, alleging that the premises can genuinely help spread innovative and cutting-edge ideas."
 hellenism_religion.3.a: "As long as they do not teach any Diogenes..."
 hellenism_religion.3.b: "Can they not simply imagine having the funds?"

 hellenism_religion.4.title: "A Talisman for [target_character_2.GetNameWithNoTooltip]"
 hellenism_religion.4.desc: "Foes and enemies alike scheme day and night to bring about our downfall. However, the succession is safe as long as [target_character_2.GetName] lives. The child holds the future of our entire [ROOT.GetCountry.GetFlavorRank] in [target_character_2.GetHerHis] delicate hands.\n\nImbued with the glow of the gods of Olympus, [target_character_2.GetShortNameWithNoTooltip] is destined for greatness, of that we are certain. One of our courtiers, a mystic [target_character_3.GetWomanMan] by the name of [target_character_3.GetName], has offered to part ways with a protective talisman. It is said to hold a single drop of divine essence, capable of warding off evils until little [target_character_2.GetShortNameWithNoTooltip] reaches adulthood."
 hellenism_religion.4.a: "Thank [target_character_3.GetShortNameWithNoTooltip] on behalf of [target_character_2.GetShortNameWithNoTooltip]."
 hellenism_religion.4.b: "We care not for such superstitions!"
 talisman_tt: "The talisman given to little [target_character_2.GetName] #italic may#! protect [target_character_2.GetHerHim] from illness-related [events|e] and hunting accidents"
 target_character_3_is_declined_tt: "The offer of [target_character_3.GetName] is politely declined"

 hellenism_religion.5.title: "[target_province.GetNameWithNoTooltip] Celebrates [target_god.GetNameWithNoTooltip]"
 hellenism_religion.5.desc: "Joyful news comes from [target_province.GetName], where the people have taken to the streets in celebration of [target_god.GetName]. In an unprecedented pious move, the locals have organized their own festivals, eager to praise their latest good fortunes.\n\nFor a day, even the burdens of rule feel lighter. The gods are honored, the crowds are loud, and devotion spreads through the province like ambrosia on Mount Olympus."
 hellenism_religion.5.a: "Let the province celebrate."
 every_pop_in_target_province_gains_10_satisfaction_tt: "Our [pops|e] in [target_province.GetName] will gain [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e]"

 hellenism_religion.6.title: "In Brightest Day"
 hellenism_religion.6.desc: "The rule of [target_character.GetName] has reached unprecedented heights under the pious guidance of the Olympian gods. Good policies, sharing of wealth, and a generally stable and peaceful period are but some of the boons granted to us by the gods. Truly, this is a golden era enjoyed by our people as they chant the name of [target_character.GetShortNameWithNoTooltip], immortalizing [target_character.GetHerHim] alongside other legendary figures like Heracles and Pericles."
 hellenism_religion.6.a: "Focus our prosperity on the administration!"
 hellenism_religion.6.b: "Let our diplomatic gravitas rule the world."
 hellenism_religion.6.c: "Our enemies will be crushed!"

 hellenism_religion.7.title: "The Avatar of [ShowGodNameWithNoTooltip('ares_god')]"
 hellenism_religion.7.desc: "Fire, brimstone, and the daunting sound of bloodied cries follow [target_character.GetName] on [target_character.GetHerHis] path. Known since childhood to be a capable warrior, this [target_character.GetWomanMan] has time and again shown an aptitude for ending the lives of [target_character.GetHerHis] enemies.\n\nNow, branded as the avatar of [ShowGodName('ares_god')] by the troops, [target_character.GetSheHe] is destined to roam the land, wrecking havoc in the name of our [ROOT.GetCountry.GetFlavorRank]."
 hellenism_religion.7.a: "[target_character.GetSheHe|U] knows that victors are those who sacrifice everything."
 hellenism_religion.7.b: "We cannot risk unleashing such a catastrophic force..."

 hellenism_religion.8.title: "Epics of [ShowCultureNameWithNoTooltip('greek_culture')] History"
 hellenism_religion.8.desc: "The epics of Homer have long since been guiding principles for the growth of culture and literacy, serving as preserved gems of our tradition.\n\nIn honor of such legacy, [target_character.GetName] has stepped forth, proposing a sponsorship in order to publish studies and works on the Iliad and the Odyssey. [target_character.GetSheHe|U] wishes to honor our glorious past in exchange for permission to take a closer look at the legendary pages."
 hellenism_religion.8.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
 hellenism_religion.8.b: "$jurchen_confederation_events.3.b$"

 hellenism_religion.9.title: "[target_province.GetNameWithNoTooltip] of Plenty"
 hellenism_religion.9.desc: "It is abundantly clear that [target_province.GetName] enjoys the favor of the gods, as is evident from the growing prosperity across the entire province. Recently, prospectors and local developers have approached us with plans to concentrate that wealth in the province's urban centers, at the expense of surrounding villages. Such a gesture would boost the urbanization efforts, but deprive the locals of the excess benefits."
 hellenism_religion.9.a: "Wealth for the people!"
 hellenism_religion.9.b: "Let us concentrate our efforts."
 pops_in_aforementioned_provinces_weak_satisfaction_tt: "Our [pops|e] in the aforementioned [provinces|e] will gain [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [pop_satisfaction|e]"

 hellenism_religion.10.title: "The Blessing of [ROOT.GetCountry.Custom('GetDemeterMomName')]"
 hellenism_religion.10.desc: "For quite some time, the grain storages across the [target_market.GetName] have enjoyed abundance. This is surely a sign that [ROOT.GetCountry.Custom('GetDemeterMomName')], the goddess of harvest, smiles upon us. Our newfound prosperity is the latest indication of divine favor. Locals have come to petition the distribution of the excess sustenance, while priests suggest an additional tribute is in line."
 hellenism_religion.10.a: "Give it to the people."
 hellenism_religion.10.b: "The gods shall have it."
 Demeter_latin_name: "Ceres"
 Demeter_base_name: "Demeter"

 hellenism_religion.11.title: "[target_god.GetNameWithNoTooltip] is Displeased"
 hellenism_religion.11.desc: "By the merciless gaze of the divine, it appears [target_god.GetName] is severely displeased with us! Late-night dark omens, lingering shadows, and an ever-increasing feeling of doom are spreading among our people. We know not what we have done to upset such a powerful deity, and the only path to regaining their pious favor is to humbly bow our heads in reverence to the divine."
 hellenism_religion.11.a: "Such is life."
 hellenism_religion.11.b: "Organize an extensive tribute immediately."

 hellenism_religion.12.title: "Monstrous Birth"
 hellenism_religion.12.desc: "A hush has fallen over the [ROOT.GetCountry.GetGovernment.GetCourtTitle]. In the nurseries within the walls of the [ROOT.GetCountry.GetGovernment.GetAdjective] residence, a child of [target_character_1.GetName] has been born amid panicked prayers and nightless nights, a child that brings with [target_character_2.GetHerHim] ill fate itself.\n\nThe [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] call it an omen. The servants call it a curse. Our rivals will call it weakness. Yet [target_character_2.GetShortName] still draws breath, and the fate of such a spawn may yet determine our lineage..."
 hellenism_religion.12.a: "Fools! [target_character_2.GetShortNameWithNoTooltip] is but a child!"
 hellenism_religion.12.b: "We cannot risk divine wrath."

 hellenism_religion.13.title: "Corrupt Priest"
 hellenism_religion.13.desc: "The gods may be eternal, but their servants are made of flesh. Reports have reached us that [target_character.GetName] has been using [target_character.GetHerHis] sacred office as a private purse, collecting favors and coin where only offerings should pass.\n\nIf we intervene, the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] will howl about insult and humiliation. If we look away, we teach every schemer in our [ROOT.GetCountry.GetFlavorRank] that piety is merely another trade, risking to insult even the gods themselves."
 hellenism_religion.13.a: "[target_character.GetHerHis|U] greed will doom us all!"
 hellenism_religion.13.b: "Look away."

 hellenism_religion.14.title: "[target_province.GetNameWithNoTooltip] Neglects [target_god.GetNameWithNoTooltip]"
 hellenism_religion.14.desc: "Word from [target_province.GetName] is troubling. The rites of [target_god.GetNameWithNoTooltip] are being neglected, offerings are delayed, and the faithful grumble that the temple doors no longer open as they should.\n\nWhether this is laziness, poverty, or quiet defiance hardly matters. When a god is said to be ignored, every misfortune soon finds a divine culprit. The priests demand action, and [target_province.GetNameWithNoTooltip] awaits our judgment."
 hellenism_religion.14.a: "Collect their devotion by force."
 hellenism_religion.14.b: "We will not rule by the lash."
 pops_in_target_province_mild_pop_satisfaction_malus_tt: "Our [pops|e] in [target_province.GetName] will gain [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [pop_satisfaction|e]"

 riots_destroy_temple_desc: "The crowd turns violent, and the temple becomes a target. By dawn, only charred stone remains."
 riots_cause_minimal_damage_desc: "There is unrest and shouting in the streets, but the worst is avoided."

 hellenism_religion.15.title: "Disputed Augury"
 hellenism_religion.15.desc: "By the mighty beard of [ShowGodName('zeus_god')], the augurs are at each other's throats! Two readings of the same signs, two wildly different warnings, and both delivered with the same certainty.\n\nThe [ROOT.GetCountry.GetGovernment.GetCourtTitle] is left with a dilemma. What must people think, for our [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] to be so distinctly divided? Have we lost our ways? Regardless of the interpretation of these signs, it is certain we will suffer their outcomes..."
 hellenism_religion.15.a: "We tire of the rumblings of old men!"

 hellenism_religion.16.title: "Wrath of the Gods"
 hellenism_religion.16.desc: "A quarrel has erupted within our halls, and the priests insist the gods are watching. They point to our scattered lands, our thin grasp over distant places, and they mutter that pride invites divine correction.\n\nIf the gods mean to remind us of our fragility, they will not send a polite letter. They will send weather, fire, and terror, and they will choose where it hurts most."
 hellenism_religion.16.a: "May the storm pass quickly."

 hellenism_religion.17.title: "Pandora's Box"
 hellenism_religion.17.desc: "A strange curiosity has reached [target_province.GetName], passed from hand to hand with knowing smiles and foolish dares. Some swear it is harmless. Others insist it is ill-starred, a thing that tempts the unwary and punishes the proud.\n\nWhether it is truly cursed or merely a spark for panic, misfortune has a way of becoming real once enough people believe in it. Some of the local priests even reported the box bears a strange face-like visage in terrible pain and covered in blood red."
 hellenism_religion.17.a: "We care not for supersititions."
 hellenism_religion.17.b: "Pay to have it sealed away."
 locations_and_pops_in_target_province_suffer_minimal_damage_tt: "[target_province.GetName] and the locals will be spared divine punishment"

 hellenism_religion.18.title: "In Darkest Night"
 hellenism_religion.18.desc: "The night feels longer than it should. In every corner of our [ROOT.GetCountry.GetFlavorRank], people speak of ruin, of hunger, of defeat, and of the gods turning their faces away. It is evident we are in a turbulent period, be it due to our own shortcomings or due to angering the gods of Olympus.\n\n[ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] cannot escape these whispers. When our foundation is shaken, even the strongest crown feels heavy."
 hellenism_religion.18.a: "We are lost to despair."
 hellenism_religion.18.b: "A sacrifice, then. May the gods listen."

 hellenism_religion.19.title: "Fear and Hunger"
 hellenism_religion.19.desc: "Panic spreads faster than any plague. A poor harvest here, a freak misfortune there, and suddenly every neighbor is an augur with a grim tale to tell. Despite our best efforts to calm the locals, it appears a tally of perceived bad signs are enough to throw entire communities into panic.\n\nThe priests argue that fear must be guided, lest it grow into defiance. The people of [target_province.GetName] look to us for certainty, even if certainty must be bought."
 hellenism_religion.19.a: "Let the land bear the burden."
 hellenism_religion.19.b: "Offer appeasement, and soften the blow."

 sacrifice_to_the_gods: "Appeasement of the Gods"

 hellenism_religion.20.title: "Gods Disapprove of War"
 hellenism_religion.20.desc: "Not all gods delight in bloodshed. As [target_war.GetName] drags on, priests warn that the heavens grow cold toward our cause. Unlike [ShowGodName('ares_god')], other gods do not condone every conflict, regardless of justification.\n\nThe soldiers may cheer our banners, but the people are weary, and every hardship is now blamed on divine displeasure. In such times, even victory can feel like a punishment, a long and uncertain destination..."
 hellenism_religion.20.a: "We will endure their disfavor."

 hellenism_religion.21.title: "[target_location.GetNameWithNoTooltip] Neglects Rites"
 hellenism_religion.21.desc: "It is understandable for people to forget their responsibilities towards the gods, especially during periods of tranquility or prosperity. In [target_location.GetName], the rites grow thin and half-hearted. Processions are smaller, offerings fewer, and the old songs are sung without conviction.\n\nThe priests demand we make an example of someone. If the city will not honor the gods willingly, then perhaps fear will teach devotion. One way or another, we cannot allow our faith to atrophy."
 hellenism_religion.21.a: "Make the common folk remember."
 hellenism_religion.21.b: "The elite have grown too comfortable."
 hellenism_religion.21.c: "Let them be, and accept the risk."
 pops_go_unpunished_gods_angry_tt: "Lack of punishment is surely to anger the gods"

 hellenism_religion.22.title: "Ornithomantic Practices in the Capital"
 hellenism_religion.22.desc: "[target_character.GetName] has become the talk of the capital. Despite [target_character.GetHerHis] eccentric outfit, [target_character.GetSheHe] touts a profound ability to read the future. Indeed, with birds, bones, and breathless certainty, [target_character.GetSheHe] claims to read the will of the gods, for better or worse.\n\nSome at [ROOT.GetCountry.GetGovernment.GetCourtTitle] laugh. Others pay, quietly, hoping that even a foolish omen might still be useful, a profoundly interesting new curiosity."
 hellenism_religion.22.a: "Squawk away, [target_character.GetShortNameWithNoTooltip]!"
 hellenism_religion.22.b: "This is an embarrassment."

 birds_divinations_come_true_desc: "The signs align, and fortune follows. The [ROOT.GetCountry.GetGovernment.GetCourtTitle] calls it proof."
 the_divinations_lie_desc: "Nothing comes of it. The birds remain birds, and the [ROOT.GetCountry.GetGovernment.GetCourtTitle] remains irritated."

 hellenism_religion.23.title: "Expansion of Religious Grounds"
 hellenism_religion.23.desc: "The priests have come forth with an ambitious proposal, one that would reshape sacred ground itself. Temples, such as the one in [target_location.GetName], are to be expanded, their halls widened and courtyards adorned, so that the faithful may once again feel the grandeur of the gods upon their shoulders.\n\nYet stone does not move itself and artisans do not work for prayers alone. Whether we fund this expansion with coin or compel the people to provide, the cost will be felt, and the gods will surely notice the manner in which we pay it."
 hellenism_religion.23.a: "Fund the expansion properly."
 hellenism_religion.23.b: "Let the people carry the burden."

 hellenism_religion.24.title: "Deisidaimonia"
 hellenism_religion.24.desc: "A growing unease has settled within the [ROOT.GetCountry.GetGovernment.GetCourtTitle], and it clings closely to [target_character.GetName] most of all. Small omens become great ones, dreams become warnings, and even harmless coincidences are treated as messages from above.\n\nSuch fear can be useful when it breeds caution, but it can also rot the will to act. If [target_character.GetShortNameWithNoTooltip] cannot shake these thoughts, our rule may soon be guided more by superstition than by reason."
 hellenism_religion.24.a: "Better cautious than careless."
 hellenism_religion.24.b: "We must think beyond superstition."

 hellenism_religion.25.title: "Sacrifices for the War"
 hellenism_religion.25.desc: "War has a way of consuming everything, and even the most hardened soldiers begin to look to the heavens when fate turns uncertain. The priests insist that our struggle in the [target_war.GetName] will not be decided by steel alone, and that the gods must be honored if we are to endure what lies ahead.\n\nA costly sacrifice is proposed, one meant to impress the divine and strengthen the spirit of our people. If we refuse, we may save our coin, but we risk letting doubt fester within the ranks, and letting the gods hear only our silence."
 hellenism_religion.25.a: "Spare no expense."
 hellenism_religion.25.b: "We will win without their theatrics."
 we_will_win_the_ongoing_conflict_without_gods_tt: "We will not rely on divine superstition to win the ongoing conflict"

 hellenism_religion.26.title: "[target_god.GetNameWithNoTooltip] Hear Our Plea"
 hellenism_religion.26.desc: "The incense has been thick, the hymns loud, and the altars have not lacked for offerings. The priests claim that our devotion has reached the ears of Olympus, and that the gods now linger close enough to answer, thanks to these efforts.\n\nYet divinity is never generous without condition. If we ask for a blessing now, we must accept that [target_god.GetName] may demand a price, and that an answer may change the course of our [ROOT.GetCountry.GetFlavorRank] in ways we cannot foresee."
 hellenism_religion.26.a: "Let [target_god.GetNameWithNoTooltip] answer."
 hellenism_religion.26.b: "We will not invite their judgment."
 gods_reward_our_piety_tt: "[target_god.GetName] rewards our piety with [gold|e]"
 gods_imbue_stability_tt: "The favors of [target_god.GetName] increase our [stability|e]"
 gods_sent_capable_character_tt: "Through [target_character_2.GetName], [target_god.GetName] will manifest"

 hellenism_religion.27.title: "A Philosopher's Paradox"
 hellenism_religion.27.desc: "A sharp-tongued philosopher by the name of [target_character.GetName] has taken to speaking within the [ROOT.GetCountry.GetGovernment.GetCourtTitle], turning certainty into doubt with every sentence. Courtiers gather to listen, half entertained and half unsettled, as even simple truths are pulled apart like threads from a robe.\n\nWisdom can be a gift, but it can also be a nuisance when it refuses to bow. If we indulge this thinker, the [ROOT.GetCountry.GetGovernment.GetCourtTitle] may grow wiser, or it may grow restless, for ideas have a habit of spreading beyond the halls that first contain them."
 hellenism_religion.27.a: "Let the discourse continue."
 hellenism_religion.27.b: "Enough riddles. Send [target_character.GetHerHim] away."

 hellenism_religion.28.title: "The Wisdom of [ShowGodNameWithNoTooltip('athena_god')]"
 hellenism_religion.28.desc: "In times of peace, ambition quiets and prudence rises, and the priests speak often of [ShowGodName('athena_god')]. They insist that wisdom is not merely a virtue, but a weapon, one best forged when the [ROOT.GetCountry.GetFlavorRank] is not distracted by war.\n\nA proposal is set before us, costly but sensible, and it promises order where there is waste, and clarity where there is doubt. If we refuse, we may keep our coin, but the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] will not forget that we turned away from the counsel of a goddess."
 hellenism_religion.28.a: "Pay the cost of wisdom."
 hellenism_religion.28.b: "We need no goddess to think for us."
 because_athena_omen_active_desc: "Due to an [omen|e] of [ShowGodName('athena_god')] currently being active, scaled with our [religious_unity|e]"
 if_athena_omen_was_active_tt: "If an [omen|e] of [ShowGodName('athena_god')] was currently active, the bonus of this [event_option|e] would be stronger"
 our_denial_angers_the_clergy_tt: "Our denial will surely anger the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"

 hellenism_religion.29.title: "[target_god.GetNameWithNoTooltip] Demands Sacrifice"
 hellenism_religion.29.desc: "The priests arrive with grave faces and urgent voices, insisting that divine displeasure hangs over our [ROOT.GetCountry.GetFlavorRank]. They claim the signs are clear, and that only sacrifices to [target_god.GetName] can restore favor before misfortune becomes disaster.\n\nGold is the simplest offering, and it can be given without hesitation, yet Olympus is rarely satisfied by coin alone. If we choose a more expensive sacrifice, we may gain greater favor, but we will also leave scars upon the land, and the people will remember who ordered it."
 hellenism_religion.29.a: "Offer gold upon the altar."
 hellenism_religion.29.b: "Let the land itself suffer the burden."
 hellenism_religion.29.c: "We refuse this demand."

 hellenism_religion.30.title: "The Cult of a Mercenary"
 hellenism_religion.30.desc: "Strange whispers rise from [target_province.GetName], carried by travelers and repeated by nervous locals. A cult has formed in the shadows, devoted to a mercenary ideal, praising strength above all, and gathering followers through secret rites and promises of protection. One of their leading figures, [target_character.GetName], has stepped forward, eager to enter the political scene in our [ROOT.GetCountry.GetFlavorRank] and speak on their behalf as a former mysthios, claiming their devotion can be turned to our advantage.\n\nHowever, whispers in the shadows betray the cult's secret agenda of domination, an insatiable hunger for power. If we welcome them, we may gain influence where faith is weak, but we may also invite a hidden rot into the heart of our [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
 hellenism_religion.30.a: "Let them in, and watch them closely."
 hellenism_religion.30.b: "Drive them into the shadows."
 cult_operates_shadows_tt: "The cult will continue to operate from the shadows..."
 hellenism_religion.empty: ""

 # Neoplatonism Events

 hellenism_religion.32.title: "The Fount of All Being"
 hellenism_religion.32.desc: "A philosopher at [ROOT.GetCountry.GetGovernment.GetCourtTitle] has completed a work of singular ambition. In measured and relentless prose, [target_character.GetSheHe] argues that the first principle — the source from which all gods and all creation flow outward, like light from an inexhaustible sun — is not a god among gods but the ground of divinity itself. The traditional pantheon remains real, [target_character.GetSheHe] insists, but each god is an aspect, an emanation of that single ineffable source: order flowing into intelligence, intelligence into soul, soul into matter.\n\nThe treatise is already being copied throughout the [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Its ideas are alive, and they will spread whether we act or not."
 hellenism_religion.32.a: "Commission copies and distribute them widely."
 hellenism_religion.32.b: "Let the idea stand on its own merits."

 hellenism_religion.33.title: "The Christian Question"
 hellenism_religion.33.desc: "A bishop of considerable learning arrives at [ROOT.GetCountry.GetGovernment.GetCourtTitle], bearing neither sword nor grievance — only questions. [target_character.GetName] has devoted [target_character.GetHerHis] life to Platonic philosophy and argues with quiet conviction that the God of the Christians and the first principle of the philosophers are one and the same. The Trinity, [target_character.GetSheHe] contends, is simply the triad of The One, Nous, and Soul, clothed in different words.\n\nThe argument is not without force, and [target_character.GetSheHe] speaks with the careful calm of one who has heard every counterargument before. Whether we engage or refuse, [target_character.GetHerHis] visit will not pass unnoticed, in [ROOT.GetCountry.GetCapitalName] or beyond."
 hellenism_religion.33.a: "Welcome the dialogue. Ideas are not contagion."
 hellenism_religion.33.b: "Reject the equation. The first principle is not their God."

 hellenism_religion.34.title: "The World Soul"
 hellenism_religion.34.desc: "The philosophers of [ROOT.GetCountry.GetGovernment.GetCourtTitle] have been speaking of the World Soul — that emanation of the first principle which flows through all living creation, animating field and river, body and breath. Two of the great gods, they argue, are best understood not as rulers of sea and sky but as the paired aspects of this Soul: the force that moves through all things and returns, always, to its source.\n\nIn [target_province.GetName], where the seasons have been kind, the people seem to feel this argument in their bones. The land is generous, and the philosophers say this is Providence made visible — the World Soul in harmony with The One."
 hellenism_religion.34.a: "Commission works of stewardship. To tend the land is to tend the Soul."
 hellenism_religion.34.b: "Publish a theological declaration. Let the doctrine be written down."
 hellenism_religion_34_work_of_art: "Psyche Kosmou"
 hellenism_religion_34_work_of_art_desc: "A theological study on platonic philosophy, which argues that the World Soul is the animating force of all living things, flowing through nature and returning to its source in The One."

 hellenism_religion.35.title: "The Ascending Soul"
 hellenism_religion.35.desc: "Word reaches [ROOT.GetCountry.GetGovernment.GetCourtTitle] that [target_character.GetName], the philosopher whose work has quietly shaped the thinking of a generation, is dying. In the final weeks, [target_character.GetSheHe] has been teaching without pause — not from books but from direct contemplation, describing in careful language the three stages of ascent: first the turning of the soul from matter, then the alignment of the rational faculty with Nous, and finally — and here [target_character.GetHerHis] voice drops to near silence — the moment of union with The One itself, beyond all thought, beyond all being.\n\nThe ruler has been invited to witness. [target_character.GetName] has asked only that the teaching not be lost."
 hellenism_religion.35.a: "Record and distribute [target_character.GetHerHis] final words."
 hellenism_religion.35.b: "Establish a school in [target_character.GetHerHis] name."
 target_character_ascends_to_the_one_tt: "[target_character.GetName] passes peacefully, having spoken everything that could be said."

 hellenism_religion.36.title: "The Olympian Restorationists"
 hellenism_religion.36.desc: "Not everyone in [ROOT.GetCountry.GetFlavorRank] has made peace with the new theology. A faction among the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] — led in public by [target_character.GetName] — is growing louder in its objections. Their argument is simple and felt in the gut rather than the mind: the people need Zeus, Athena, Ares, and Poseidon. Not symbols. Not emanations. Not aspects of an ineffable principle that cannot be named or petitioned or pleased. They need the gods of Olympus, with their faces, their temples, their hunger for sacrifice.\n\nThe abstract One, [target_character.GetSheHe] declares, cannot hear us. The old gods could. [target_character.GetName] petitions openly for the removal of the Monist doctrine and a return to traditional worship."
 hellenism_religion.36.a: "Defend the doctrine. Silence the faction."
 hellenism_religion.36.b: "Allow a formal disputation. Let both sides speak."
 hellenism_religion.36.c: "Remove the Monist doctrine. Return to the Olympian faith."
