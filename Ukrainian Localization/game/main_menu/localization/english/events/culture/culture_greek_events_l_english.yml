l_english:
 culture_greek.1.title: "Dispute With [target_character.GetNameWithNoTooltip]"
 culture_greek.1.desc: "Although our stance as a proud [ROOT.GetCountry.GetReligion.GetAdjective] nation is clear to many of our neighbors, it seems that there are some internal issues within our Patriarchy.\n\n[target_character.GetName] has noticed the negligence of [target_character2.GetName] when it comes to [target_character2.GetHerHis] religious duties. [target_character.GetSheHe|U] cites the mistreatment of the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], misconduct during religious ceremonies, and an overall lack of respect for the [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] religious culture of our nation.\n\nAlthough many believe these claims are exaggerated, the people are still well aware of the negligence of [target_character2.GetNameWithNoTooltip], and of how [target_character2.GetSheHe] considers [target_character2.GetHerselfHimself] above any religious institution. It is this that has led some of our [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] citizens to see [target_character2.GetHerHim] as illegitimate, and unworthy of the title of [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
 culture_greek.1.a: "The [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] do not know what they are talking about!"
 culture_greek.1.b: "Perhaps we should restrict [target_character2.GetNameWithNoTooltip] more."
 culture_greek.1.c: "Nobody shall question the legitimacy of [target_character2.GetNameWithNoTooltip]!"
 culture_greek.1.d: "A speech will surely calm their suspicions."


 culture_greek.2.title: "Patriarch Blesses [target_character2.GetNameWithNoTooltip]"
 culture_greek.2.desc: "The elegance and order of [ROOT.GetCountry.GetName] have made [target_character.GetName] interested in [target_character2.GetName]'s approach to rulership. Upon first arriving in [target_capital.GetName], [target_character.GetSheHe] was impressed by how much attention to detail was put into preserving the religious pillars of [ROOT.GetCountry.GetReligion.GetName]. The monasteries are well maintained, and adorned with whatever riches the [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] could muster; the citizens admire the marble kandylakia along the roads, recalling tales of lost loved ones, or the miracles that helped them survive moments of crisis.\n\nIn the [ROOT.GetCountry.GetGovernment.GetCourtTitle], many members recite the Bible, and can be found praying before icons of the Messiah Himself. The smell of incense fills the air as [target_character.GetNameWithNoTooltip] approaches the chamber where [target_character2.GetNameWithNoTooltip] discusses politics."
 culture_greek.2.a: "The blessing of the Patriarch is guaranteed."
 culture_greek.2.b: "A blessing is not enough. We need to put more effort into [target_capital.GetNameWithNoTooltip]."
 
 culture_greek.3.title: "The Reformation in [target_country.GetNameWithNoTooltip]"
 culture_greek.3.desc: "With the wave of the Reformation sweeping across [ShowContinentName('europe')], people such as [target_character.GetName] have taken an interest in establishing diplomatic relations with reformers like [target_country.GetName], who stand against the Papal institution.\n\nAfter some discussion, it is clear to us that we do have a common enemy: They also wish to rid themselves of the corrupt ways of [papal_capital.GetName], and to reclaim the autonomy of the [target_country.GetGovernment.GetEstateName('crown_estate')]. However, there are still differences that our [ROOT.GetCountry.GetGovernment.GetCourtTitle] can not abide by; the marks that [ShowReligionName('catholic')] has left on their lands."
 culture_greek.3.a: "The enemy of my enemy is my friend."
 culture_greek.3.b: "We do not need the help of heretics."
 culture_greek.3.c: "[target_character2.GetShortNameWithNoTooltip] has made us look like fools!"

 culture_greek.4.title: "The Question of '[ShowCultureNameWithNoTooltip('greek_culture')]'"
 culture_greek.4.desc: "The rise of absolutism and the concept of the state and its people are shaping how our current population thinks. Previously, such matters would not be openly considered, as religion primarily shaped the culture. But now, with great thinkers coming from the lower strata, many within our educational institutions have been asking one question: What is [ShowCultureNameWithNoTooltip('greek_culture')]?\n\nSome people claim that the diglossia present in the language of [ROOT.GetCountry.GetName] preserves a divide, wherein the bureaucrats and [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] are separate in almost every way from the [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] due to having entirely different manners and speaking different dialects.\n\nThis situation has slowly radicalized many, who have been calling for a change to mend this division and truly unify the nation."
 culture_greek.4.a: "Slowly but surely, we can unite the people."
 culture_greek.4.b: "Making such changes would destabilize our current power structure."
 culture_greek.4.c: "There are no cultural differences, just different variants of the same culture."
 greek_culture_greek_peasants_will_gain_satisfaction: "Every [ShowCultureGroupName('greek_group')] [culture|e] [pops|e] in non-[rural_locations|e] that are either [ShowPopTypeName('peasants')] or [ShowPopTypeName('laborers')] will gain [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e]"

 culture_greek.5.title: "The Rise of [target_character.GetNameWithNoTooltip]"
 culture_greek.5.desc: "Having achieved many victories, such as in [victory_location1.GetName] or [victory_location2.GetName], the people have started to revere [target_character.GetHerHim] as a brilliant strategos, one who vanquishes the foes of [ROOT.GetCountry.GetName] by the sword, shedding their blood in the name of the Lord and [target_character2.GetName].\n\nAfter talking with many influential members of the [ROOT.GetCountry.GetGovernment.GetCourtTitle], they seem to also respect [target_character.GetHerHim], and are intrigued by [target_character.GetHerHis] tales about the Battle of [victory_location3.GetName] — the latest story that everyone is discussing. [target_character2.GetNameWithNoTooltip] feels somewhat threatened by this fame, as [target_character2.GetSheHe] feels that [ROOT.GetCountry.GetGovernment.GetCourtTitle] influence is shifting towards this strategos. Perhaps, though, it can be used to further strengthen [target_character2.GetDynasty.GetName] rule over [ROOT.GetCountry.GetNameWithNoTooltip]."
 culture_greek.5.a: "Let us celebrate heroes like that."
 culture_greek.5.b: "We should restrict [target_character.GetShortNameWithNoTooltip]'s influence."
 culture_greek.5.c: "Keep [target_character.GetHerHim] #italic just#! close enough to us, but as far away from politics as possible."
 greek_culture_strategos_will_never_be_able_to_influence_politics: "By denying [target_character.GetName] the ability to influence the [courtiers|e], we will ensure that [target_character.GetSheHe] will not bring a coup against us in the future"
 greek_culture_strategos_will_never_get_the_opportunity_to_coup: "[target_character.GetName] will never get the opportunity to influence the [courtiers|e], meaning [target_character.GetSheHe] will never be able to launch a coup against us"

 culture_greek.6.title: "Strategos of the People"
 culture_greek.6.desc: "As the famed strategos [target_character.GetName] walks down the streets of [target_capital.GetName] with [target_character.GetHerHis] personal guard, crowds gather to witness this strategic mind in person.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], and [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] alike raise their voices in a unifying chant, crying out [target_character.GetHerHis] name, '[target_character.GetShortNameWithNoTooltip]!'. Some quieter voices are also murmuring in the crowd, saying that [target_character.GetSheHe] would make for a less corrupt ruler, one that would actually listen to the people. Rumors of this talk have reached the [ROOT.GetCountry.GetGovernment.GetCourtTitle], a hallmark of the gravitas this individual has acquired."
 culture_greek.6.a: "Respect should be shown to this strategos, even from [target_character.GetHerHis] rivals."
 culture_greek.6.b: "Try to silence the crowd before anyone gets ideas."
 greek_culture_all_capital_pops_gain_pop_satisfaction: "All [pops|e] in [target_capital.GetName] will gain [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e]"
 greek_culture_prevent_coup_for_two_year: "If [target_character.GetName] was planning a coup, [target_character.GetHerHis] efforts will be stalled for #y 2#! Years"

 culture_greek.7.title: "The Coup of [target_character.GetNameWithNoTooltip]"
 culture_greek.7.desc: "After months of scheming, gathering support, reducing the influence of opponents, and mustering troops, [target_character.GetName] is now in a position to overthrow [target_character2.GetName].\n\nBelieving [target_character.GetHerselfHimself] to be the rightful ruler of [ROOT.GetCountry.GetName], and a far more benevolent, as well as competent ruler, [target_character.GetSheHe] is now outside [ROOT.GetCountry.GetCapital.GetName], demanding that [target_character2.GetShortName] abdicate the throne of [ROOT.GetCountry.GetNameWithNoTooltip]."
 culture_greek.7.a: "New leadership is needed to rid us of decadence."
 culture_greek.7.b: "[target_character2.GetShortNameWithNoTooltip] will not abdicate this easily!"
 culture_greek.7.c: "What does [target_character.GetShortNameWithNoTooltip] know of legitimacy?"
 culture_greek.7.d: "Banish [target_character.GetHerHim] for trying to overthrow us."
 greek_culture_weaker_due_to_righteous_trait: "The [rebels|e] will be much weaker."

 culture_greek.8.title: "Spies in [target_location.GetNameWithNoTooltip]"
 culture_greek.8.desc: "The guards of [target_location.GetName] have recently discovered a group of spies trying to infiltrate the greatest secrets of  [ROOT.GetCountry.GetName] — secrets like Greek Fire, and other technological advancements we have made which they would want for their realm.\n\nWhile they have not confessed who they work for, they have told us that they have been assigned here for months, and have gone from inn to inn and church to church trying to find any clues as to where they can dig up our secrets. Perhaps those spies could have better uses than to sit in our dungeons, rotting away, hoping that their master finds out what has happened. Perhaps they could serve us."
 culture_greek.8.a: "Those spies are of more use to our [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
 culture_greek.8.b: "Let them rot, and uncover any other spy networks infiltrating [target_location.GetNameWithNoTooltip]!"
 culture_greek.8.c: "Perhaps they can help us find other spy networks hiding within our [target_location.GetRank.GetNameWithNoTooltip]."
 every_country_with_spy_network_on_us_will_lose_25_network: "Every known [country|e] that has a [spy_network|e] of at least #Y 15#! in our [target_location.GetRank.GetNameWithNoTooltip] will lose #R -25#! [spy_network|e]"

 culture_greek.9.title: "The Chrysobull of [target_location.GetNameWithNoTooltip]"
 culture_greek.9.desc: "The [ShowCultureGroupName('italian_group')] influence within the [target_location.GetRank.GetName] of [target_location.GetName] has started to dominate local trade. The only merchants people want to trade with are ones who have their headquarters back in [ShowRegionName('italy_region')], leading to much of our riches slipping from our grasp, as we cannot properly exploit this wealth. However, these practices do have some benefits, mainly the ability for the nation to sell its riches, albeit not at ideal prices. But such transactions could also lead to a decline in the authority that [target_character.GetName] holds, perhaps leading to increased reliance on these [ShowCultureGroupNameWithNoTooltip('italian_group')] merchants."
 culture_greek.9.a: "Let them enjoy more privileges, as long as it brings us wealth."
 culture_greek.9.b: "If they want to rid the [target_location.GetRank.GetNameWithNoTooltip] of its wealth, they have to pay an extra fee."
 culture_greek.9.c: "Let us give them some privileges — ones that will provide no real benefits."
 culture_greek.9.d: "If we are to draft laws for their protection, we need to be efficient about it."
 all_italian_pops_become_happier: "All [ShowCultureGroupName('italian_group')] [ShowPopTypeName('burghers')] [pops|e] will gain [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e]"
 all_italian_pops_become_angrier: "All [ShowCultureGroupName('italian_group')] [ShowPopTypeName('burghers')] [pops|e] will lose [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [pop_satisfaction|e]"

 culture_greek.10.title: "New Generation in [target_location.GetNameWithNoTooltip]"
 culture_greek.10.desc: "With the current bureaucracies entrenched and corruption rising among those who manage them, many prominent young students are emerging, wishing to eradicate this corruption by replacing the outdated methods of the old guard with more progressive ones. One of these new people is [target_character.GetName], a member of the [target_estate.GetName], who was born in [target_location2.GetName] to a simple family, but over the years has shown capacity to improve our bureaucracy using radical methods. These new methods promise to reshape the current rigid bureaucratic structure into something that will benefit the state and its people.\n\nWhile this would surely improve our administration's efficiency, many in already-established positions fear that they will be dismissed, and are fighting against this new generation by suppressing their voices and even bribing certain individuals to 'keep them quiet'."
 culture_greek.10.a: "These young men are the future."
 culture_greek.10.b: "We stand with the old guard on such matters."

 culture_greek.11.title: "A Foreign Phrase"
 culture_greek.11.desc: "Although the influence of the Roman language has been waning from the [ROOT.GetCountry.GetGovernment.GetCourtTitle] of the East, we have tried to maintain an identity as proud [ShowCultureGroupName('greek_group')] people. Still, some [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] seem knowledgeable enough to recite phrases of [ShowLanguageName('latin_language')].\n\n'Pro bono', [target_character.GetName] says to the courtiers. Everyone is confused before [target_character.GetSheHe] explains its origin and its meaning. Some are entirely conservative, and mock [target_character.GetHerHim] for using such strange language, while others are intrigued and wish to learn more about [ShowLanguageNameWithNoTooltip('latin_language')]. With people like that in the [ROOT.GetCountry.GetGovernment.GetCourtTitle], there are murmurs about adopting this style of speech, and integrating that within the administration. A return to old Roman traditions of sorts, trying to maintain the ways of Rome within [ROOT.GetCountry.GetNameWithNoTooltip]."
 culture_greek.11.a: "There is no reason to abandon our [ShowCultureNameWithNoTooltip('greek_culture')] character."
 culture_greek.11.b: "[ShowLanguageName('latin_language')] speech should be encouraged."
 culture_greek.11.c: "A [ROOT.GetCountry.GetGovernment.GetCourtTitle] should respect all languages."

 culture_greek.12.title: "Glimpse of Corruption"
 culture_greek.12.desc: "Although many important positions in [ROOT.GetCountry.GetName] are occupied by capable men, some cogs in the system seem to be underperforming.\n\nThe recent inspection of our administration has produced a rather interesting result: Rumors have it that [target_character.GetName] has been giving away jobs to relatives, friends, and even people who can make [target_character.GetHerHim] rich. When this news reached the [ROOT.GetCountry.GetGovernment.GetCourtTitle], and more importantly [target_character2.GetName], some were fast to dismiss it as merely a rivalry between the inspectors and [target_character.GetNameWithNoTooltip].\n\nPerhaps more direct intervention is needed, to show those who think our administration is a way to increase their wealth that there are consequences for every action taken."
 culture_greek.12.a: "If we purge every corrupt member, then we will have no members."
 culture_greek.12.b: "[target_character.GetShortNameWithNoTooltip] made a choice, and will face the consequences."
 culture_greek.12.c: "All corruption shall be purged!"
 culture_greek.12.d: "Perhaps... arrangements can be made."

 culture_greek.13.title: "Failing Kephalē"
 culture_greek.13.desc: "The Kephalē of [target_area.GetName] has been experiencing a decline ever since its establishment. Its governor, who resides in [target_location.GetName], has failed to meet expectations, but this failure has also been ignored by many within our bureaucracy. This has allowed the locals there to avoid paying their taxes, and for some nobles to take over lands in the area, exploiting the peasants and their potential wealth. When these reports reached the [ROOT.GetCountry.GetGovernment.GetCourtTitle] of [target_character.GetName], like vultures on carrion, many suggested replacing the governor either with themselves or a relative, claiming they would be a better job of keeping the region secure. While such actions seem drastic, it might not be a bad idea for the management there to change. Or, perhaps, it is our fault for neglecting the local leadership there, and we should send them more resources to assist with reining in unruly [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] and demanding obedience from proud commoners."
 culture_greek.13.a: "Let us replace the governor with someone else."
 culture_greek.13.b: "It is negligence that has allowed the failure of [target_area.GetNameWithNoTooltip]. Let us give them support."
 culture_greek.13.c: "Only time can heal this wound. No need for new management there."
 all_pops_in_kephale_area_lose_satisfaction: "All [pops|e] in [target_area.GetName] will lose [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [pop_satisfaction|e]"
 gain_extra_control_in_the_area: "Every [location|e] we own in [target_area.GetName] will gain [ShowNamedValue('control_mild_bonus')|+=2%] [control|e] and the [modifier|e] [ShowModifier('increased_kephale_support')] for #Y 10#! years"
 lose_extra_control_in_the_area: "Every [location|e] we own in [target_area.GetName] will lose [ShowNamedValue('control_mild_penalty')|+=2%] [control|e]"

 culture_greek.14.title: "Not of Purple"
 culture_greek.14.desc: "Although [target_character.GetName] has claimed the throne of [ROOT.GetCountry.GetName] for [target_character.GetHerselfHimself], there is a lack of prestige within [target_character.GetHerHim]. Without [target_character.GetNameWithNoTooltip] being born in purple, there are many who believe that this lack of reputation leaves the [ROOT.GetCountry.GetGovernment.GetCourtTitle] in a weak position. There are already rumors about the lack of dignity within this [target_character.GetWomanMan], one that carries characteristics of a conqueror rather than a ruler. Some are even thinking of plans to 'reshape' the administration in ways that would be seen as luxurious for many that are close to [target_character.GetNameWithNoTooltip]."
 culture_greek.14.a: "Money should be spent to improve the status of [target_character.GetNameWithNoTooltip]."
 culture_greek.14.b: "When has prestige maintained a realm alone?"
 culture_greek.14.c: "If they wish to know about dignity, they will experience it."

 culture_greek.15.title: "$STATIC_MODIFIER_NAME_despot_modifier$ at Odds"
 culture_greek.15.desc: "Although the [target_character.GetDynasty.GetName] family has always been unified in their cause to administer [ROOT.GetCountry.GetName], there have been some schisms as to how it should be handled. [target_character.GetName] and [target_character2.GetName] have been at odds over how the [ROOT.GetCountry.GetGovernment.GetCourtTitle] should function in relation to the family. [target_character.GetShortNameWithNoTooltip] prefers it to be closer to our rulership, where we can more easily control any subject. [target_character2.GetShortNameWithNoTooltip] argues for the opposite, that permitting autonomy for our subjects can allow for a greater realm, where we can maintain small patches of influence on a vast amount of land."
 culture_greek.15.a: "The ideas of [target_character.GetShortNameWithNoTooltip] should be favored."
 culture_greek.15.b: "The promises of [target_character2.GetShortNameWithNoTooltip] seem tempting..."
 culture_greek.15.c: "Remind them who rules [ROOT.GetCountry.GetNameWithNoTooltip]."
 culture_greek.15.d: "Perhaps they could both learn from [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip]."

 culture_greek.16.title: "[target_character.GetNameWithNoTooltip] Speaks in [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
 culture_greek.16.desc: "Word of the exploits of [target_character.GetName] have been spreading throughout [ROOT.GetCountry.GetName] and [ROOT.GetCountry.GetCapital.GetName]. Many courtiers wish to see the legend that has been carved in the history of our nation, and have sent word to [target_character.GetHerHim] in order to summon [target_character.GetHerHim] to the [ROOT.GetCountry.GetGovernment.GetCourtTitle], and give [target_character.GetHerHim] a chance to indulge with other influential members.\n\nSome of [target_character.GetHerHis] rivals are not exactly too fond of this idea, and some believe that this will give [target_character.GetHerHim] ideas, some of which may lead to [target_character.GetHerHim] wishing to usurp [target_character2.GetName]'s position and claim [ROOT.GetCountry.GetNameWithNoTooltip] for [target_character.GetHerselfHimself]."
 culture_greek.16.a: "Who are we to deny a [target_character.GetWomanMan] the right to speak in [ROOT.GetCountry.GetGovernment.GetCourtTitle]?"
 culture_greek.16.b: "A chance in the [ROOT.GetCountry.GetGovernment.GetCourtTitle]? We will not allow it."

 culture_greek.17.title: "Expansion of Trade in [target_location.GetNameWithNoTooltip]"
 culture_greek.17.desc: "Our maritime expertise has allowed for the development of new ports and trade routes in [ROOT.GetCountry.GetName]. One of these new entrepots is [target_location.GetName], a [target_location.GetRank.GetName] to which many of the [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] have flocked, due to being granted privileges in order to further strengthen their positions.\n\nThe new infrastructure created by the locals has attracted more and more people from across [ROOT.GetCountry.GetNameWithNoTooltip], leading to an even greater need for marketplaces, ships, and housing. These demands have reached the ears of [target_character.GetName], who has summoned the [ROOT.GetCountry.GetGovernment.GetCourtTitle] to determine how to resolve this situation."
 culture_greek.17.a: "Let us promote trade in [target_location.GetNameWithNoTooltip]"
 culture_greek.17.b: "We will help them, as long as they are willing to be indebted to us."
 culture_greek.17.c: "We should share the costs instead."

 culture_greek.18.title: "Negligence of $a_akritai$ in [target_location.GetNameWithNoTooltip]"
 culture_greek.18.desc: "Leaders of the border [target_location.GetRank.GetName] of [target_location.GetName] have neglected their duties as guardians of the front by slackening their daily drills, and have therefore become susceptible to raids as well as invasions from our enemies.\n\nA recent inspection has provided us with more information on the situation: Their commander seems to be a creature of nepotism, having inherited the position through family rather than merit. The troops have also been enjoying the funds that [ROOT.GetCountry.GetName] has given them, drinking and boasting of deeds that do not match their actual competence. Rather than accepting this situation and risking a breach on the border of [target_area.GetName], we must instead enforce discipline within these $a_akritai$. Perhaps [target_character.GetName] should be more proactive in this matter."
 culture_greek.18.a: "We do not have the funds to spare for this."
 culture_greek.18.b: "Protecting the border is their duty, and they shall be reminded of it."
 all_pop_in_location_lose_satisfaction: "All [pops|e] in [target_location.GetName] will lose [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [pop_satisfaction|e]"

 culture_greek.19.title: "Tales of the $a_akritai$ in [target_location.GetNameWithNoTooltip]"
 culture_greek.19.desc: "Although many tales of the $a_akritai$ are exaggerated in order to spread the prestige of [ROOT.GetCountry.GetName] far and wide, there are also the unvarnished stories of those in [target_location.GetName], who guard the border in [target_area.GetName]. Their diligence has ensured that enemies are kept at bay, and that the name of [target_character.GetName] commands respect in these lands. Some people have their doubts about the legitimacy of these $a_akritai$, but within the [ROOT.GetCountry.GetGovernment.GetCourtTitle] there are also those who wish to further aid them and strengthen the legend they are trying to build, even if it is only for the benefit of [ROOT.GetCountry.GetNameWithNoTooltip]. Perhaps [target_character.GetNameWithNoTooltip] can also try and provide some assistance, creating a local legend for the people of [target_location.GetNameWithNoTooltip]."
 culture_greek.19.a: "If the deeds of the $a_akritai$ spread with this, then we shall promote their stories."
 culture_greek.19.b: "Service alone is enough to ensure a tale for the ages."

 culture_greek.20.title: "$a_akritai$ in [target_location.GetNameWithNoTooltip] Ask for Help"
 culture_greek.20.desc: "As [ROOT.GetCountry.GetName] is a vast [ROOT.GetCountry.GetFlavorRank], there is always bound to be negligence in certain areas. Although it is most often not done deliberately, it leaves a sour taste in the mouths of the locals. This negligence has led to the people of [target_area.GetName] feeling threatened, as the border is not as secure as they would like. They have asked the local garrison at [target_location.GetName] to further strengthen their efforts and increase their vigilance, but in order to properly guard against a raid or invasion, they will also need the support of the [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nTheir messengers have arrived in [target_capital.GetName], seeking an audience with [target_character.GetName]. They have requested we send them money to fund the expansion of fortifications in [target_location.GetNameWithNoTooltip], as well as more men to either stand as garrison, or to serve as instructors for the soldiers in their daily drills."
 culture_greek.20.a: "We shall ensure that every corner stays protected."
 culture_greek.20.b: "We are unable to spare these resources."

 culture_greek.21.title: "Decline of Mediterranean Trade in [target_location.GetNameWithNoTooltip]"
 culture_greek.21.desc: "The discovery of the New World has led to new trade routes being created. Many of these are contributing to the reduced significance of Mediterranean trade, which we have tried to utilize to our advantage. Having already gained expertise in this sea, many among the [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] are stubborn and unwilling to abandon their current maritime networks. Instead, they believe that it is not a change in tradition that will help them, but rather funding from the [ROOT.GetCountry.GetGovernment.GetCourtTitle] and constant promotion of their preferred trade centers.\n\nOne of these centers requesting such aid is the [target_location.GetRank.GetName] of [target_location.GetName], which has been suffering from the global shift in trade routes. They request that we grant them funding in order to allow their merchants to import new goods, creating more business and potentially reviving the importance that [target_location.GetNameWithNoTooltip] once held."
 culture_greek.21.a: "Let us grant them these funds."
 culture_greek.21.b: "If they want to be successful merchants, they should learn to better manage what they already have."
 culture_greek.21.c: "Nothing that shrewdness cannot fix."
 burghers_in_location_lose_satisfaction: "All [ShowPopTypeName('burghers')] [pops|e] in [target_location.GetName] will lose [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [pop_satisfaction|e]"
 burghers_in_location_gains_satisfaction: "All [ShowPopTypeName('burghers')] [pops|e] in [target_location.GetName] will gain [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [pop_satisfaction|e]"

 culture_greek.22.title: "Festival of the Theotokos in [target_location.GetNameWithNoTooltip]"
 culture_greek.22.desc: "The birth of Jesus is regarded as a monumental event for any devout [ShowReligionAdjective('orthodox')] follower, and for that reason many hold festivals in the name of His mother, Mary, who is often called #italic Theotokos#!, the Mother of God.\n\nNone are as fervent in these celebrations as the people of [target_location.GetName]. They are organizing a festival within the [target_location.GetRank.GetName] and its surrounding areas, hoping to truly rest for an entire day and to spread their joy to everyone who wishes to join them. Indeed, some members of the [ROOT.GetCountry.GetGovernment.GetCourtTitle] are already travelling there to watch the spectacle unfold, although the more spiritual among them also wish to enrich this holy day for the people."
 culture_greek.22.a: "A great occasion indeed."
 culture_greek.22.b: "We will celebrate alongside them."
 culture_greek.22.c: "Although we do not share their faith, we can at the very least respect it."
 culture_greek.22.d: "No [ShowReligionAdjectiveWithNoTooltip('orthodox')] traditions will spread in [target_location.GetNameWithNoTooltip]."
 all_pops_in_location_gain_satisfaction: "All [pops|e] will gain [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [pop_satisfaction|e]"
 all_orthodox_pops_in_location_lose_satisfaction: "All [ShowReligionAdjective('orthodox')] [pops|e] will lose [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [pop_satisfaction|e]"

 culture_greek.23.title: "The Influence of [target_location.GetNameWithNoTooltip]"
 culture_greek.23.desc: "The influence that [target_location.GetName] holds in [ROOT.GetCountry.GetName] is becoming more apparent to everybody, especially officials residing in [target_capital.GetName]. They are quite interested as to how this [target_location.GetRank.GetName] in [target_area.GetName] has risen in prominence, mainly due to patronage from the [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] and various individuals of the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Minor bureaucrats and wealthy members of the [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] alike benefit from the opportunities that this [target_location.GetRank.GetNameWithNoTooltip] provides them, and the local [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] there enjoy a life of luxury.\n\nWhile all of this has made some people happy, it has also led to a rise in the region's influence, which diminishes the power of those in [target_capital.GetName] and elsewhere, upsetting the balance of power of the whole country."
 culture_greek.23.a: "Why punish a place for attracting new people and new wealth?"
 culture_greek.23.b: "The other cities have valid concerns. Perhaps we should restrict the growth of [target_location.GetNameWithNoTooltip]."
 all_pops_with_influential_polis_modifier_lose_satisfaction: "All [pops|e] in [locations|e] with the [ShowModifier('greek_culture_influential_polis')] [modifier|e] will lose [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [pop_satisfaction|e]"
 all_pops_in_location_lose_satisfaction: "All [pops|e] in [target_location.GetName] will lose [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [pop_satisfaction|e]"

 culture_greek.24.title: "Claims of the Rhōmaîoi"
 culture_greek.24.desc: "The influences of the Roman Empire still linger in the lands of [ROOT.GetCountry.GetName]. Although the title $BYZ$ is not ours to claim, the people still associate themselves with the old Empire, claiming that [target_character.GetName] should pursue a more aggressive agenda towards claiming parts of the Roman Empire. Rather than reclaim only its territories, some populists within the [ROOT.GetCountry.GetGovernment.GetCourtTitle] believe that we should start styling ourselves as the emperors of legend once did. [target_capital.GetName] should also reflect that style, employing aesthetics that would lend us the necessary legitimacy and prestige to make stronger claims about our old territories."
 culture_greek.24.a: "These 'Rhōmaîoi' can forget about their fantasies."
 culture_greek.24.b: "Such actions could be beneficial; perhaps we can implement them."

 culture_greek.25.title: "[ShowLocationNameWithNoTooltip('mystras')] Scholarship"
 culture_greek.25.desc: "The famed [ShowLocationName('mystras')] way of philosophy has been spreading its influence through the [ShowRegionName('balkan_region')], [ShowAreaName('west_anatolia_area')], and [ShowRegionName('italy_region')].\n\nMany places, poor and rich, have been visited by scholars. One of these places is [target_location.GetName], located within [target_area.GetName]. Minor scholars who have set out to explore the lands beyond have made a stop there, sharing their philosophical, cultural, and rhetorical ideas with the people. Many of these locals have taken an interest in such ideas, especially more educated folk who wish to expand their views. These teachings have also attracted the attention of the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], which has more extreme views on such matter. Some wish to suppress any ideas and teachings that might seem dangerous, especially the ones that might pose a risk to the identity of [ROOT.GetCountry.GetNameWithNoTooltip], while some of lower status wish to allow the ideas to spread, as they provide great opportunity for our people to learn."
 culture_greek.25.a: "Their teachings are not dangerous. Let them spread their knowledge."
 culture_greek.25.b: "Why should we risk [target_location.GetNameWithNoTooltip] forming some radical ideas?"
 event_will_only_fire_for_locations_within_mystras_scholarship_geography: "This [event|e] can only fire for [locations|e] within [ShowScriptedGeographyName('mystras_scholarship_geography')]"

 culture_greek.26.title: "New [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Rhetoric"
 culture_greek.26.desc: "There were innumerable pieces of work produced during the Roman era, all written in [ShowLanguageName('latin_language')], a language that some people in [ROOT.GetCountry.GetName] are reluctant to learn. This has led our more intellectual scholars to translate them into [ROOT.GetCountry.GetCommonLanguage.GetName], the common language that the everyday citizen speaks in.\n\nThe elite have taken note of this, feeling threatened by the idea that the lower orders could have access to the same texts that the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] have spent years studying and perfecting. As such, they have spoken in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] about this matter, urging a ban on such translated works throughout the [ROOT.GetCountry.GetFlavorRank] in order to maintain the integrity and prestige of the elite."
 culture_greek.26.a: "The common folk have the right to learn, too."
 culture_greek.26.b: "Anything to preserve the superiority of the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] elite."

 culture_greek.27.title: "[target_character.GetNameWithNoTooltip] Demands a Triumph"
 culture_greek.27.desc: "[target_character.GetName] has returned from yet another magnificent victory, walking through the streets of [target_capital.GetName] with a crowd cheering [target_character.GetHerHim] on, and surrounded by a sizeable bodyguard of [target_character.GetHerHis] most loyal soldiers, protecting [target_character.GetHerHim] from any harm that may come [target_character.GetHerHis] way.\n\nAfter reaching the [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetSheHe] demanded an audience, which was reluctantly granted. Whether friend or foe, [target_character.GetSheHe] ignored every other courtier, and instead looked directly at [target_character2.GetName] while demanding that an old-style triumph be held in [target_character.GetHerHis] honor. [target_character.GetSheHe|U] insists that everybody must know of [target_character.GetHerHis] achievements in order to bolster morale and strike fear to any who might dare oppose [ROOT.GetCountry.GetName] militarily."
 culture_greek.27.a: "A triumph? How noisy. We reject these demands."
 culture_greek.27.b: "If it is for the glory of [ROOT.GetCountry.GetNameWithNoTooltip], we will gladly hold one."
 greek_culture_strategos_will_not_use_triumph_for_popularity: "By not holding a triumph for [target_character.GetName], [target_character.GetSheHe] will not gain progress to any coup attempts planned"
 greek_culture_progress_coup_attempt_if_strategos_is_disloyal: "By holding a triumph for [target_character.GetName], [target_character.GetSheHe] will be able to use [target_character.GetHerHis] popularity to accelerate any coup attempts"

 culture_greek.28.title: "Flight of Scholars"
 culture_greek.28.desc_common: "The instability in [ROOT.GetCountry.GetName] has caused many educated people to seek better lives, far away from our troubled [ROOT.GetCountry.GetFlavorRank]."
 culture_greek.28.desc.a: "$culture_greek.28.desc_common$\n\n They wish to live a more stable life, one which allows them to pursue their ideas in philosophy, law, and religion; one that will not be snatched from them at a moment's notice by war, famine, or death. It is why many speak longingly of [target_country.GetName], a more prestigious and stable [target_country.GetFlavorRank], one that can provide them the comfort they so desire. Many have already started to migrate to [target_destination.GetName], a fact that worries the more sophisticated members of our [ROOT.GetCountry.GetGovernment.GetCourtTitle]. They believe that such migrations are a wound to the prestige of [ROOT.GetCountry.GetNameWithNoTooltip], as it shows our inability to protect those who are cannot weather our current state of crisis, but are nonetheless valuable members of society."
 culture_greek.28.desc.b: "$culture_greek.28.desc_common$\n\n Although there are no suitable lands for such flight, they speak of the glories of distant realms they have read about: how the common folk in [scholar_country.1.GetName] live in luxury, in contrast to life here; how the rulers of [scholar_country2.GetName] do not mistreat their subjects, instead respecting their rights as people; and how in [scholar_country3.GetName] it is not tradition that keeps everything going, but innovation.\n\nAlthough harmless at first, these voices have spread to every corner of our [ROOT.GetCountry.GetFlavorRank], creating civil unrest, something that our [ROOT.GetCountry.GetGovernment.GetCourtTitle] is deeply concerned about."
 culture_greek.28.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 culture_greek.28.b: "Let us stop them, before any more try and leave."
 culture_greek.28.c: "Their words are causing even more instability."
 culture_greek.28.d: "Perhaps we can put some funding in preventing more unrest."
 greek_culture_migration_largely_prevented: "Most [migration|e] will be mitigated"

 culture_greek.29.title: "[ShowBuildingTypeNameWithNoTooltip('orthodox_monastery')] Asks for Help"
 culture_greek.29.desc: "The people of [target_location.GetName] are devout followers of [ROOT.GetCountry.GetReligion.GetName], praying to [ROOT.GetCountry.GetReligion.GetGodName] every day. However, due to a lack of support from [ROOT.GetCountry.GetName] and its government, the local [ShowBuildingTypeName('orthodox_monastery')] in [target_location.GetRank.GetName] is sorely in need of new ornamentation to properly reflect its holy status. For this reason, the priests there have sent word to our [ROOT.GetCountry.GetGovernment.GetCourtTitle], urging [target_character.GetName] to send money to properly decorate both the exterior and the interior of this sacred place. Granting a favor such as this would not go unnoticed, demonstrating to all how dedicated we are to any [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] cause within our [ROOT.GetCountry.GetFlavorRank]."
 culture_greek.29.a: "They will have their gold for decoration."
 culture_greek.29.b: "[target_character.GetNameWithNoTooltip] should not spare money for every holy site."
 culture_greek.29.c: "In the name of [ShowReligionNameWithNoTooltip('orthodox')], we shall spare no funds on this."
 all_orthodox_pops_gain_satisfaction_in_location: "All [ShowReligionAdjective('orthodox')] [pops|e] will gain [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [pop_satisfaction|e]"

 culture_greek.30.title: "Legacy of the Empire"
 culture_greek.30.desc: "The light of the Eastern Roman Empire has been extinguished. Despite this, many of our citizens call themselves Rhōmaîoi, and parts of our [ROOT.GetCountry.GetGovernment.GetCourtTitle] seem to have taken the customs of the old Empire. This in return has given us some legitimacy to reclaim parts of this ancient realm under the pretense of being its rightful successors. Many in [ROOT.GetCountry.GetCapital.GetName] are aware of our border at [target_province.GetName], and advocate for its reclamation from [target_country.GetName], who have no right to call themselves heirs of Rome. The military seems to agree with this sentiment and, along with the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], are encouraging the populace to go to war and reclaim what rightfully belongs to [ROOT.GetCountry.GetName]."
 culture_greek.30.a: "The borders of Rome will be reclaimed!"
 culture_greek.30.b: "There is no need for war."