l_english:

 town_rights_events.1.title: "The Staple Port of [target_location.GetNameWithNoTooltip]"
 town_rights_events.1.desc: "Our attention to the development of [target_location.GetName] has resulted in the [target_location.GetRank.GetName] attracting lucrative commercial opportunities. Officials in charge of [target_province.GetName] have approached us requesting guidance on how to best utilize this newfound wealth."
 town_rights_events.1.a: "Let the entire province benefit!"
 town_rights_events.1.b: "Increase the development of the port."
 town_rights_events.1.c: "Spread the wealth across the location!"
 every_location_in_province_dev_and_prosperity_tt: "Every [location|e] in [target_province.GetName] will gain [ShowNamedValue('development_weak_bonus')|+] [development|e] and [ShowNamedValue('prosperity_mild_bonus')|+=2%] [prosperity|e]"


 town_rights_events.2.title: "Commercial Stagnation in [target_location.GetNameWithNoTooltip]"
 town_rights_events.2.desc: "Despite our best efforts to develop the [target_location.GetRank.GetName] of [target_location.GetName], sea-faring merchants seem to avoid conducting their business here, much to our dismay. Let us hope this stagnation is only temporary and not indicative of a spiraling trend."
 town_rights_events.2.a: "This is not a problem for [target_character.GetShortNameWithNoTooltip]!"
 town_rights_events.2.b: "Alas, that is the nature of unprofitable business."
 town_rights_events.2.c: "This matter is beneath us."
 administrative_expertise_of_ruler_mitigates_situation_tt: "The administrative [abilities|e] of [target_character.GetName] can easily mitigate the situation"
 
 town_rights_events.3.title: "The Bountiful Granaries of [target_location.GetNameWithNoTooltip]"
 town_rights_events.3.desc: "The peasants and workhands residing in [target_province.GetName] report that the [target_location.GetRank.GetName] of [target_location.GetName] is experiencing an upswing in the quality and amount of food-goods produced and stored. Such a positive development should be taken advantage of immediately."
 town_rights_events.3.a: "Let the entire province of [target_province.GetNameWithNoTooltip] benefit!"
 town_rights_events.3.b: "Sell it before it goes bad."
 town_rights_events.3.c: "Distribute it among the people in [target_location.GetNameWithNoTooltip]."
 every_location_gains_mild_prosperity: "Every [location|e] in [target_province.GetName] will gain [ShowNamedValue('prosperity_mild_bonus')|+=2%] [prosperity|e]"
 every_pop_in_target_location_mild_satisfaction_tt: "Our [pops|e] in [target_location.GetName] will gain [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e]"
 income_gained_depends_on_crown_estate_power_tt: "The [gold|e] gained greatly depends on our [crown_power|e]" 

  town_rights_events.4.title: "The Granaries of [target_location.GetNameWithNoTooltip] Run Thin"
 town_rights_events.4.desc: "Ill news arrives from the granary [target_location.GetRank.GetName] of [target_location.GetName]. Spoilage, mismanagement, or some cruel turn of season has left its stores diminished when they were most needed. The people of [target_province.GetName] now look to us for relief, lest scarcity spreads across the countryside."
 town_rights_events.4.a: "We shall open the treasury and feed them."
 town_rights_events.4.b: "The people will have to endure the shortage."
 town_rights_events.4.c: "A greater effort is needed before this becomes famine."
 every_pop_in_target_location_mild_satisfaction_malus_tt: "Every [pop|e] in [target_location.GetName] will lose [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [pop_satisfaction|e]"
 relief_effort_tt: "Relief efforts lessen the severity of the famine"

 town_rights_events.5.title: "New Toolmaking Methods in [target_location.GetNameWithNoTooltip]"
 town_rights_events.5.desc: "The workshops of [target_location.GetName] have become a center of experimentation and technical refinement. Many craftsmen report that improved methods and better instruments are increasing both output and work quality. The question before us is whether these gains should serve innovation, local prosperity, or the wider market."
 town_rights_events.5.a: "Encourage these new techniques."
 town_rights_events.5.b: "Let [target_location.GetNameWithNoTooltip] itself reap the rewards."
 town_rights_events.5.c: "Flood the market with fresh tools."

 town_rights_events.6.title: "Inferior Tools from [target_location.GetNameWithNoTooltip]"
 town_rights_events.6.desc: "A wave of complaints has begun to follow the wares produced under the tooling rights of [target_location.GetName]. Handles split, edges dull quickly, and fittings fail under strain. Whether this decline stems from haste or greed, confidence in local production has plainly suffered. Local complaints have begun eroding the good name of the [target_location.GetRank.GetName]!"
 town_rights_events.6.a: "We can mediate and preserve the workshops."
 town_rights_events.6.b: "This negligence must be answered locally."
 town_rights_events.6.c: "This embarrassment reflects upon the [ROOT.GetCountry.GetFlavorRank]."
 our_innovative_nature_finds_compromise_tt: "Our pioneering outlook, be it due to strong [ShowSocietyDirectionName('innovative')] [societal_values|e] leanings or a relevant [trait|e] of [target_character.GetName], helps us find a workable compromise this time"

 town_rights_events.7.title: "Jewelers of [target_location.GetNameWithNoTooltip] Perfect Their Art"
 town_rights_events.7.desc: "The jewelers working under [ROOT.GetCountry.GetGovernment.GetAdjective|U] privilege in [target_location.GetName] have further refined their craft. Various new methods have made their ornaments more brilliant than before, drawing admiration from many locals as well as traveling merchants. This achievement is a major step towards our ascension."
 town_rights_events.7.a: "Let these techniques elevate the whole province."
 town_rights_events.7.b: "Make [target_location.GetNameWithNoTooltip] famous for its workmanship."
 town_rights_events.7.c: "A splendid display will serve the [ROOT.GetCountry.GetFlavorRank] well."
 nobles_appreciate_jewellery_displays: "#italic The [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] admire these magnificent displays#!"
 jewellery_display_reinforces_authority: "#italic Allow the collection to strengthen our rule#!"

 town_rights_events.8.title: "A Great Fire in [target_location.GetNameWithNoTooltip]"
 town_rights_events.8.desc: "Disaster has struck [target_location.GetName]. Flames have leapt from house to house, and the jewelers' quarter now stands blackened by smoke and mayhem. Unless the blaze is contained and relief swiftly organized, the damage may spread beyond the [target_location.GetRank.GetName] itself."
 town_rights_events.8.a: "[target_character.GetShortNameWithNoTooltip] will see to the victims' compensation personally."
 town_rights_events.8.b: "The flame devours all!"
 town_rights_events.8.c: "Send aid, and prevent the worst."
 nature_of_target_character_assists_the_locals: "The disposition of [target_character.GetName] helps reassure and assist the locals"
 chance_the_fire_spreads_neighboring_locations_tt: "There is a high chance the fire's effects spread to neighboring [locations|e]"
 relief_effort_prevents_spread_of_fire_tt: "Relief efforts prevent the fire from spreading further"

 town_rights_events.9.title: "A Surge in Ship Construction at [target_location.GetNameWithNoTooltip]"
 town_rights_events.9.desc: "The shipyards and timber-yards favored by the naval rights of [target_location.GetName] are busier than ever. Tar pits worked by our laborers are fiery around the clock, and every merchant and mariner speaks of expansion. Business is on an upswing! This sudden vigor may shape not only the [target_location.GetRank.GetName], but our wider priorities as a [ROOT.GetCountry.GetFlavorRank]."
 town_rights_events.9.a: "Let this momentum expand our naval ambitions."
 town_rights_events.9.b: "Strengthen the maritime trade of [target_location.GetNameWithNoTooltip]."
 town_rights_events.9.c: "A reminder that our future lies on the water."

 town_rights_events.10.title: "Shortages and Unrest in [target_location.GetNameWithNoTooltip]"
 town_rights_events.10.desc: "The demands of shipbuilding around [target_location.GetName] have stripped nearby woodlands and unsettled those who depend upon them. Locals grumble, while protest and resentment grow against a once-booming local industry. This fleeting prosperity now risks breeding disorder across the entire [target_location.GetRank.GetName]."
 town_rights_events.10.a: "Revoke the rights and calm the people."
 town_rights_events.10.b: "Compensate the losses and keep production going."
 town_rights_events.10.c: "The locals must bear the burden."
 cooldown_10_years: "This [town_rights|e] cannot be forcibly revoked again for #v 10 years#!"
 laborers_and_peasants_happy_tt: "[Laborers|E] and [peasants|e] in [target_location.GetName] gain [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [pop_satisfaction|e]"

 town_rights_events.11.title: "The Fashion of [target_location.GetNameWithNoTooltip]"
 town_rights_events.11.desc: "Tailors, dyers, and cloth merchants in [target_location.GetName] have set new standards in attire! The well-tailored outfits of many denizens have become a most interesting topic to gossip about! Every new collection becomes a staple of style and fashion across the [ROOT.GetCountry.GetFlavorRank]. Indeed, their fabrics and cuts are now imitated beyond [target_province.GetName], and the name of the [target_location.GetRank.GetName] is increasingly spoken with admiration in polite circles. After all, people will stare. Make it worth their while!"
 town_rights_events.11.a: "[target_character.GetShortNameWithNoTooltip] looks positively fabulous!"
 town_rights_events.11.b: "Its fame will bring us prestige."
 town_rights_events.11.c: "Its refinement will dignify our [ROOT.GetCountry.GetGovernment.GetAdjective] seat."

 town_rights_events.12.title: "Textile Monopolies Tighten Their Grip in [target_location.GetNameWithNoTooltip]"
 town_rights_events.12.desc: "The privileges granted in [target_location.GetName] have allowed a few powerful interests to dominate local textile production. Smaller producers complain of exclusion, while prices are manipulated and resentment grows among those shut out of the trade. Wealth remains, but in ever fewer hands..."
 town_rights_events.12.a: "[target_character.GetShortNameWithNoTooltip] #italic IS#! the textile industry!"
 town_rights_events.12.b: "Monopoly has its uses."
 town_rights_events.12.c: "Let the local interests quarrel among themselves."
 ruler_regent_finds_good_middle_ground_tt: "[target_character.GetName] finds a workable middle ground between profit and resentment through sheer force of authority"
 local_textile_barons_are_unhappy_tt: "#italic [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] engaged in the textile business may resent this instability#!"
 destabilization_spreads_across_the_country: "#italic The dispute spirals and deepens instability across the entire [ROOT.GetCountry.GetFlavorRank]#!"

 town_rights_events.13.title: "Superior Arms from [target_location.GetNameWithNoTooltip]"
 town_rights_events.13.desc: "[ShowGoodsName('weaponry')] forged under [ROOT.GetCountry.GetGovernment.GetAdjective|U] privilege in [target_location.GetName] have won the praise of local captains. Their balance, durability, and workmanship are said to surpass the ordinary standard, and soldiers now seek them with uncommon eagerness. Such excellence can only be the result of our timeless tradition and attention to detail."
 town_rights_events.13.a: "Set this as the standard for our armies."
 town_rights_events.13.b: "Use it to bolster recruitment in the province."
 town_rights_events.13.c: "Let our officers learn from such quality."

 town_rights_events.14.title: "[ShowGoodsNameWithNoTooltip('weaponry')] from [target_location.GetNameWithNoTooltip] Fuel Disorder"
 town_rights_events.14.desc: "The proliferation of arms in and around [target_location.GetName] has brought an unwelcome side effect. More [ShowGoodsName('weaponry')] now passes into reckless hands, emboldening criminals and sharpening local tensions. A privilege meant to strengthen the [ROOT.GetCountry.GetFlavorRank] now threatens to unsettle it. Forsooth, what a most grievous and disheartening spectacle!"
 town_rights_events.14.a: "[target_character.GetShortNameWithNoTooltip] will restore order."
 town_rights_events.14.b: "Suppress the disorder where it has taken root."
 town_rights_events.14.c: "Nothing a bit of brute force cannot fix."
 kind_martial_nature_of_ruler_helps_tt: "The martial discipline and character of [target_character.GetName] help contain the disorder"

 town_rights_events.15.title: "A Beacon of Learning in [target_location.GetNameWithNoTooltip]"
 town_rights_events.15.desc: "Scholars and book merchants alike have transformed [target_location.GetName] into a place of congregated learning. Texts travel farther and faster from the workshops of the [target_location.GetRank.GetName], and the exchange of ideas has begun to enrich the province well beyond simple trade. Regardless of how we choose to channel such enlightenment, the opportunity is plain."
 town_rights_events.15.a: "Let knowledge hasten our advance."
 town_rights_events.15.b: "Make this a true center of learning."
 town_rights_events.15.c: "See that [target_character.GetShortNameWithNoTooltip] benefits from these books."

 town_rights_events.16.title: "Controversial Texts from [target_location.GetNameWithNoTooltip]"
 town_rights_events.16.desc: "Not all books spread wisdom without consequence. Certain texts now circulating through [target_location.GetName] have stirred argument among scholars and common readers alike. Some praise their boldness, while others condemn them as dangerous and unsettling. What was printed for profit may yet test our authority!"
 town_rights_events.16.a: "Our [ROOT.GetCountry.GetFlavorRank] is above such petty criticisms."
 town_rights_events.16.b: "Such writings will trouble every literate mind."
 town_rights_events.16.c: "Suppress it, and accept the cost."
 pops_in_target_province_mild_penalty_according_to_literacy_tt: "[pops|e] in [target_province.GetName] will lose [pop_satisfaction|e] in proportion to their [literacy|e]"

 town_rights_events.17.title: "Renowned Craftsmanship in [target_location.GetNameWithNoTooltip]"
 town_rights_events.17.desc: "The artisans of [target_location.GetName] have earned a reputation for excellence that reaches far beyond the province. Their wares are praised not merely as useful, but as objects worthy of admiration. Such renown reflects upon the whole [ROOT.GetCountry.GetFlavorRank], should we choose to cultivate it."
 town_rights_events.17.a: "Make their excellence a matter of [ROOT.GetCountry.GetGovernment.GetAdjective] policy."
 town_rights_events.17.b: "Preserve these standards locally."
 town_rights_events.17.c: "Their fame alone honors us."

 town_rights_events.18.title: "The Masters of [target_location.GetNameWithNoTooltip] Grow Old"
 town_rights_events.18.desc: "Many of the most respected artisans of [target_location.GetName] are laying down their tools. Few apprentices possess their skill, and fewer still command their reputation. Unless talent is drawn in or losses are accepted, the [target_location.GetRank.GetName] may soon feel the absence of these experienced hands."
 town_rights_events.18.a: "Spend what is needed to attract migrants."
 town_rights_events.18.b: "Our treasury can sustain this burden for now."
 town_rights_events.18.c: "The province must endure the decline."

 town_rights_events.19.title: "Brewing Standards Established in [target_location.GetNameWithNoTooltip]"
 town_rights_events.19.desc: "The brewers of [target_location.GetName] have agreed upon firmer practices in the making, storage, and sale of drink. Taverns praise the improved consistency, merchants welcome the reliability, and the reputation of the [target_location.GetRank.GetName] grows accordingly. A modest craft may yet prove a useful instrument of prosperity and order."
 town_rights_events.19.a: "Let these standards shape brewing across the [ROOT.GetCountry.GetFlavorRank]."
 town_rights_events.19.b: "Foster a local boom in [target_location.GetNameWithNoTooltip]."
 town_rights_events.19.c: "Our [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] will appreciate this success."

 town_rights_events.20.title: "Grain Diverted to Brewing in [target_location.GetNameWithNoTooltip]"
 town_rights_events.20.desc: "What fills cups does not fill granaries. In [target_location.GetName], too much grain is now being diverted into brewing, and concern spreads that common needs are being sacrificed for private gain. The issue is not merely one of trade, but of priorities. Locals complain of empty storehouses, alleging a plot to drive profits for the local breweries at the expense of the common farmer."
 town_rights_events.20.a: "Compensate the shortage before it worsens."
 town_rights_events.20.b: "The people will grumble, but the trade continues."
 town_rights_events.20.c: "This mismanagement tarnishes both [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] and our [ROOT.GetCountry.GetFlavorRank]."

 town_rights_events.21.title: "New [ShowGoodsNameWithNoTooltip('masonry')] Techniques in [target_location.GetNameWithNoTooltip]"
 town_rights_events.21.desc: "Builders and stoneworkers in [target_location.GetName] have introduced improved methods of quality [ShowGoodsName('masonry')]. Their efforts promise sturdier works, quicker construction, and a visible transformation of the surrounding province of [target_province.GetName]. Such advances may herald a new era of superior architecture across our [ROOT.GetCountry.GetFlavorRank] with [target_location.GetNameWithNoTooltip] taking charge."
 town_rights_events.21.a: "Let these methods spread throughout the [ROOT.GetCountry.GetFlavorRank]."
 town_rights_events.21.b: "Turn [target_province.GetNameWithNoTooltip] into a center of construction."
 town_rights_events.21.c: "Invest directly in the [target_location.GetRank.GetName] itself."

 town_rights_events.22.title: "Quarrying Strains [target_location.GetNameWithNoTooltip]"
 town_rights_events.22.desc: "The same [ShowGoodsName('stone')] that builds walls and markets is won only through hard labor. Around [target_location.GetName], quarrying has become increasingly burdensome, and the workers pressed into that toil grow exhausted and resentful. Productivity remains, but the human cost is becoming impossible to ignore, threatening to stall the entire local operation!"
 town_rights_events.22.a: "Ease their burden with relief and oversight."
 town_rights_events.22.b: "Push on, despite local complaints."
 town_rights_events.22.c: "The whole province will feel this strain."
 relief_effort_reduces_strain_on_the_workforce_tt: "The [gold|e] provided will act as relief and temporarily reduce the strain placed upon the workforce"