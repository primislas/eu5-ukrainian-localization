l_english:
 
 ap_falls_desc_key: "After a turbulent siege and a valiant defense of the resident garrison, [target_location.GetName] has fallen to the might of our great armies."
 ap_diplomatic_desc_key: "With the incorporation of [target_location.GetName] into the [scope:winner.GetFlavorRank] of [scope:winner.GetName],"
 ap_falls_desc_key_2: "Within its walls resides a powerful religious authority, as the [target_location.GetRank.GetNameWithNoTooltip] once hosted dignitaries of the [ShowReligionAdjective('orthodox')] faith. The question remains yet, should we abolish this kindred institution or adopt it under our protection?"
 autocephalous_patriarchates.1.title: "Autocephalous Patriarchate Seat Falls!"
 autocephalous_patriarchates.1.desc: "$ap_falls_desc_key$ It was the seat of the [target_ap.GetName], and now it comes to us to decide what to do with this Patriarchal authority."
 autocephalous_patriarchates.1.desc_diplomatic: "$ap_diplomatic_desc_key$ the seat of the [target_ap.GetName] now falls under our authority. It comes to us to decide what to do with this Patriarchal institution."
 autocephalous_patriarchates.1.a: "There is no need for their Patriarchate when we have ours."
 autocephalous_patriarchates.1.b: "We will not interfere with the authority of the Patriarch."
 autocephalous_patriarchates.1.c: "Now we will be the ones to deal with the Patriarch."
 every_member_of_scopeloser_ap_loses_opinion_of_scopewinner_tt: "Every member of the [target_ap.GetName] will lose [ShowBiasValue('destroyed_my_autocephalous_patriarchate')|+=0] opinion of us"
 every_member_of_winner_ap_gains_opinion_of_scopewinner_tt: "Every member of the [target_winner_ap.GetName] will gain [ShowBiasValue('destroyed_another_autocephalous_patriarchate')|+=0] opinion of us"

 autocephalous_patriarchates.2.title: "Autocephalous Patriarchate Seat Falls!"
 autocephalous_patriarchates.2.desc: "$ap_falls_desc_key$ $ap_falls_desc_key_2$"
 autocephalous_patriarchates.2.desc_diplomatic: "$ap_diplomatic_desc_key$ $ap_falls_desc_key_2$"
 autocephalous_patriarchates.2.a: "Dissolve the Patriarchate."
 autocephalous_patriarchates.2.b: "Keep it."

 autocephalous_patriarchates.3.title: "Restoration of the Patriarchate of [target_location.GetNameWithNoTooltip]"
 autocephalous_patriarchates.3.desc: "With the relocation of the [recipient.GetName] to [target_location.GetName], the glory of the [target.GetType.GetName] has been restored. From now on, the Patriarchate will lead the matters of the faith with the majesty and reverence that befits such lofty seat."
 autocephalous_patriarchates.3.a: "For the greater glory of [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip]!"