l_english:
 flavor_hun_ven.1.title: "The [ShowCultureNameWithNoTooltip('dalmatian')|U] Settlement"
 flavor_hun_ven.1.entry: "Treaty of Zadar - Hungarian Event"
 flavor_hun_ven.1.desc: "For years, the [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] has dreamed of breaking free from the confines of the interior and claiming a window onto the [ShowAreaName('adriatic_sea_area')]. As our agents bring news of [GetCountry('VEN').GetAdjective] decline, some at [ROOT.GetCountry.GetGovernment.GetCourtTitle] suggest that this is the opportunity we have been waiting for. Rather than rushing headlong into war, it has been proposed that we pressure [GetCountry('VEN').GetNameWithNoTooltip] into making concessions diplomatically."
 flavor_hun_ven.1.a: "Negotiation is a waste of time."
 flavor_hun_ven.1.b: "Try applying diplomatic pressure."
 flavor_hun_ven.1.historical_info: "During the reign of Louis I, Hungary sought to expand its access to the Adriatic and weaken Venetian dominance along the Dalmatian coast. Louis launched an offense against Venice in 1356 and quickly captured many important Dalmatian towns. By 1358, Venice had suffered a series of major defeats and was strained by internal troubles, and so the Republic agreed to negotiate. Under the resulting Treaty of Zadar, Venice relinquished control of Dalmatia, which enabled the rise of the Republic of Ragusa as a semi-independent subject of Hungary."
 
 flavor_hun_ven.2.title: "The [ShowCultureNameWithNoTooltip('dalmatian')|U] Settlement"
 flavor_hun_ven.2.desc: "The internal suffering of the [ROOT.GetCountry.GetFlavorRank] has not gone unnoticed. [GetCountry('HUN').GetName] has proposed a meeting of delegations to negotiate the surrender of our [ShowCultureName('dalmatian')|U] possessions in favor of [GetCountry('HUN').GetNameWithNoTooltip]. The [ROOT.GetCountry.GetGovernment.GetCourtTitle] is divided on the matter. Many denounce the proposal as a humiliating blow to our honor and strength. Others urge caution, arguing that rejecting their terms might provoke a war where we could lose much more than just Dalmatia."
 flavor_hun_ven.2.a: "This proposal is as foolish as their [GetCountry('HUN').GetGovernment.GetRulerTitle]!"
 flavor_hun_ven.2.a.entry: "This proposal is as foolish as their ruler!"
 flavor_hun_ven.2.b: "We have little choice but to accept."