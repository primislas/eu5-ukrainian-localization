l_english:
 flavor_ach.1.title: "Flight of the [target_country.GetAdjectiveWithNoTooltip] [target_country.GetGovernment.GetRulerTitle]"
 flavor_ach.1.entry: "Flight of the Epirote Heir"
 flavor_ach.1.desc: "Following the [target_country2.GetAdjective] invasion of [target_country.GetName], the rightful heir of [target_character.GetFather.GetName], [target_character.GetShortName], was ousted by [GetCharacter('byz_andronikos_iii_palaiologos').GetName] and replaced by the current [target_country2.GetAdjectiveWithNoTooltip] governor, [GetCharacter('epi_theodoros_synadenos').GetName]. Thankfully, [target_character.GetShortNameWithNoTooltip] was smuggled out of the country by the anti-[target_country2.GetAdjectiveWithNoTooltip] faction and brought before [target_character2.GetName]."
 flavor_ach.1.a: "The [target_country.GetAdjectiveWithNoTooltip] domain belongs to [target_character.GetNameWithNoTooltip]!"
 flavor_ach.1.a.entry: "Their domain belongs to him!"
 flavor_ach.1.b: "[target_country.GetNameWithNoTooltip] are a lost cause."
 flavor_ach.1.b.entry: "They are a lost cause."

 flavor_ach.2.title: "[target_country.GetAdjectiveWithNoTooltip] Pretender Supported"
 flavor_ach.2.desc: "The last Latin monarch of [target_country.GetName], the young [target_character.GetName], has been smuggled out of the country to [target_country3.GetName], where the [target_country3.GetGovernment.GetRulerTitle] has been swayed to [target_character.GetHerHis] cause. There is no doubt about this — the [target_country3.GetLongName] will seek the restoration of the ousted heir.\n\nWe must beware of any invasion, for [target_character2.GetName] might strike in our moment of weakness."
 flavor_ach.2.a: "Let them try!"

 flavor_ach.3.title: "Waning Latin Influence"
 flavor_ach.3.desc: "While nominally under the rule of the Latin [target_character.GetDynasty.GetName], the influence of this ruling dynasty has been in continuous decline for many years now. The [ROOT.GetCountry.GetCulture.GetName] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] are often seen as absent and deaf to the plight of the [ShowCultureName('greek_culture')] commoners. Common folk from all walks of life have hence turned towards supporting [target_character2.GetName], a Hellenic pretender who could free [ROOT.GetCountry.GetName] from the Frankish yoke."
 flavor_ach.3.a: "Down with the [target_character.GetDynasty.GetNameWithNoTooltip]!"
 flavor_ach.3.a.entry: "Down with the dynasty!"
 flavor_ach.3.b: "Put this movement down!"

 flavor_ach.4.title: "Influence of The Latin Empress in [ShowScriptedGeographyNameWithNoTooltip('greece_geography')]"
 flavor_ach.4.entry: "$flavor_ach.4.title$"
 flavor_ach.4.desc: "Despite the fall of the [ShowFormableCountryName('LAT_f')] in 1261, its legacy lives on under the continuous line of titular Emperors up to the current Empress — [target_character.GetName]. Though merely titular, the [target_character.GetDynasty.GetName] still command much respect among the Latin states and still rule the [ROOT.GetCountry.GetLongName] — one of the most powerful remnants of the Empire."
 flavor_ach.4.a: "The [ShowFormableCountryNameWithNoTooltip('LAT_f')] will be restored!"

 flavor_ach.5.title: "The Titular [GetCountry('LAT').GetFlavorRank]"
 flavor_ach.5.entry: "The Titular Empire"
 flavor_ach.5.desc: "Having retained the title of [GetCountry('LAT').GetAdjectiveWithNoTooltip] [GetCountry('LAT').GetGovernment.GetRulerTitle] of the [GetCountry('LAT').GetLongName], even if only titular, [scope_ruler.GetName] has maintained considerable influence with the remaining [GetCountry('LAT').GetAdjectiveWithNoTooltip] elite in [ShowScriptedGeographyName('greece_geography')], along with [scope_ruler.GetHisHer] connections in [naples_country.GetName]. Although the ploys and maneuvers of [scope_philip_latin_emperor.GetName] were intended to muster a force capable of reclaiming the empire, these plans have been abandoned since his death.\n\nHaving forged an agreement with [scope_alb_king.GetName], the rights to [albania_country.GetName] have since been sold to [scope_alb_king.GetShortNameWithNoTooltip], and the lands of [ROOT.GetCountry.GetName] bestowed upon [ach_heir.GetName], over which [scope_ruler.GetShortNameWithNoTooltip] has continued to rule in an official capacity.\n\nWith the [ShowCultureName('catalan')] Company in [ath_country.GetName], and rumors of instability within the [byz_country.GetGovernment.GetCourtTitle] of [byz_country.GetName], advisors close to [scope_ruler.GetNameWithNoTooltip] have suggested that an opportunity may soon emerge to restore the [GetCountry('LAT').GetLongNameWithNoTooltip] as [scope_philip_latin_emperor.GetShortNameWithNoTooltip] had envisioned."
 flavor_ach.5.a: "Let us focus on securing the local elite."
 flavor_ach.5.b: "Garner diplomatic support across [ShowScriptedGeographyNameWithNoTooltip('greece_geography')]."
 flavor_ach.5.c: "The [ROOT.GetCountry.GetGovernment.GetCourtTitle] should begin laying the groundwork for restoration."
 flavor_ach.5.c.entry: "The court should begin laying the groundwork for restoration."

 flavor_ach.6.title: "Ties to the [naples_country.GetGovernment.GetCourtTitle] of [naples_country.GetNameWithNoTooltip]"
 flavor_ach.6.entry: "Ties to the Naples Court"
 flavor_ach.6.desc: "Although [scope_ruler.GetName] has assumed the responsibility of managing [ROOT.GetCountry.GetName], [scope_ruler.GetHeShe] has maintained considerable influence within the [naples_country.GetGovernment.GetCourtTitle] of [naples_country.GetNameWithNoTooltip], as well as a close relationship with [nap_ruler.GetName]. Seeking to further strengthen [scope_ruler.GetDynasty.GetName] rule in [ShowScriptedGeographyName('greece_geography')], some advisors have suggested [scope_ruler.GetShortNameWithNoTooltip] use [scope_ruler.GetHisHer] influence to garner support amongst the wealthy [naples_country.GetAdjectiveWithNoTooltip] elite."
 flavor_ach.6.a: "[scope_ruler.GetShortNameWithNoTooltip] should curry favor with the [naples_country.GetAdjectiveWithNoTooltip] [naples_country.GetGovernment.GetCourtTitle]."
 flavor_ach.6.a.entry: "The ruler should curry favor with the $NAP_ADJ$ court."
 flavor_ach.6.b: "Use [scope_ruler.GetShortNameWithNoTooltip]'s influence to gain monetary support."
 flavor_ach.6.b.entry: "Use his influence to gain monetary support."
 flavor_ach.6.c: "[scope_ruler.GetShortNameWithNoTooltip]'s reputation would be better used to bolster the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
 flavor_ach.6.c.entry: "His reputation would be better used to bolster our court."

 flavor_ach.7.title: "[nikephoros_ii_orsini.GetNameWithNoTooltip] and the [epirus_country.GetLongNameWithNoTooltip]"
 flavor_ach.7.entry: "Secession in Epirus"
 flavor_ach.7.desc: "Having remained in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] of [ROOT.GetCountry.GetName] for some time since his exile, [nikephoros_ii_orsini.GetName] has proven to be a valuable political asset to [scope_ruler.GetName] against the [byz_country.GetAdjective] elite. However, words have reached the [ROOT.GetCountry.GetGovernment.GetCourtTitle] that the moment to restore [nikephoros_ii_orsini.GetLastNameWithNoTooltip]'s rule may be upon us, as several [epirus_country.GetAdjective] [epirus_country.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] have garnered enough support to launch an uprising against the [byz_country.GetAdjectiveWithNoTooltip] governor.\n\nSeeing this as an opportunity to sow further divisions within [byz_country.GetNameWithNoTooltip], many in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have urged [scope_ruler.GetNameWithNoTooltip] to take this opportunity to allow [nikephoros_ii_orsini.GetLastNameWithNoTooltip] to return to [epirus_country.GetNameWithNoTooltip]."
 flavor_ach.7.a: "Allow [nikephoros_ii_orsini.GetLastNameWithNoTooltip] to return to [epirus_country.GetNameWithNoTooltip] with our backing."
 flavor_ach.7.a.entry: "Allow $Orsini$ to return to $EPI$ with our backing."
 flavor_ach.7.b: "Offer to press the claim to [epirus_country.GetNameWithNoTooltip] for [nikephoros_ii_orsini.GetShortNameWithNoTooltip] instead."
 flavor_ach.7.b.entry: "Offer to press the claim to $EPI$ for $name_nikephoros.greek_language$ instead."
 flavor_ach.7.c: "It is too risky for now."
 nikephoros_ii_orsini_revolt: "Orsini Revolt"

 flavor_ach.8.title: "[nikephoros_ii_orsini.GetNameWithNoTooltip] Reclaims [epirus_country.GetNameWithNoTooltip]!"
 flavor_ach.8.entry: "$name_nikephoros.greek_language$ $Orsini$ Reclaims $EPI$!"
 flavor_ach.8.desc: "News has arrived at the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] that [nikephoros_ii_orsini.GetLastNameWithNoTooltip]'s supporters have successfully reclaimed his seat in [epirus_country.GetName], and have taken the opportunity to sever [epirus_country.GetNameWithNoTooltip] from [byz_country.GetName]! While this is no doubt a major victory for [scope_ruler.GetName] towards weakening the [byz_country.GetAdjectiveWithNoTooltip] [byz_country.GetGovernment.GetCourtTitle], some in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have urged [scope_ruler.GetShortNameWithNoTooltip] to seize [epirus_country.GetNameWithNoTooltip] before [nikephoros_ii_orsini.GetShortNameWithNoTooltip] can consolidate his base of power."
 flavor_ach.8.a: "Let us establish a formal alliance with [epirus_country.GetNameWithNoTooltip] instead."
 flavor_ach.8.a.entry: "Let us establish a formal alliance with $EPI$ instead."
 flavor_ach.8.b: "We shall only maintain close relations with [nikephoros_ii_orsini.GetLastNameWithNoTooltip]."
 flavor_ach.8.b.entry: "We shall only maintain close relations with $Orsini$."
 flavor_ach.8.c: "Now is our chance to attack!"

 flavor_ach.9.title: "Revolt in [epirus_country.GetNameWithNoTooltip]"
 flavor_ach.9.desc: "Horrible news! [epirus_country.GetAdjective] [epirus_country.GetGovernment.GetEstateName('nobles_estate')] with the backing of [ach_scope_ruler.GetName] have launched a revolt aiming to seize [epirus_country.GetName] for [nikephoros_ii_orsini.GetName]. [epi_scope_ruler.GetName] has requested [ROOT.GetCountry.GetName] intervene immediately to put down the revolt."
 flavor_ach.9.a: "Assist the [epirus_country.GetAdjectiveWithNoTooltip] governor!"
 flavor_ach.9.a.entry: "Assist the $EPI_ADJ$ governor!"
 flavor_ach.9.b: "This is not our concern."
 flavor_ach_9_tt: "Should [nikephoros_ii_orsini.GetName] win, [epirus_country.GetName] will become independent"

 flavor_ach.10.title: "Reconquest of the Peloponnese"
 flavor_ach.10.entry: "$flavor_ach.10.title$"
 flavor_ach.10.desc: "Following the success of the Fourth Crusade in 1204, [ShowAreaName('morea_area')] became one of the many regions that would be conquered by the crusaders in the aftermath of the collapse of [byz_country.GetName]. However, in recent decades, the [byz_country.GetAdjectiveWithNoTooltip] elite have retaken portions of the region, although most of it still remains under [ROOT.GetCountry.GetAdjective] control.\n\nWith rumors of instability gripping the [byz_country.GetAdjectiveWithNoTooltip] [byz_country.GetGovernment.GetCourtTitle], several advisors within the [ROOT.GetCountry.GetGovernment.GetCourtTitle] believe now would be an opportune time to launch a campaign to reclaim the lost territories and expel [byz_country.GetAdjectiveWithNoTooltip] influence from [ShowAreaNameWithNoTooltip('morea_area')] for good."
 flavor_ach.10.a: "Now is the time to drive back the [byz_country.GetLongNameWithNoTooltip]!"
 flavor_ach.10.a.entry: "Now is the time to drive back $BYZ$!"
 flavor_ach.10.b: "Wait to see if rumors of [byz_country.GetAdjectiveWithNoTooltip] instability bear fruit."
 flavor_ach.10.b.entry: "Wait to see if rumors of $BYZ_ADJ$ instability bear fruit."

 flavor_ach.11.title: "Widespread Instability within [byz_country.GetNameWithNoTooltip]"
 flavor_ach.11.entry: "Exploit the Byzantine Civil war"
 flavor_ach.11.desc: "Although [ROOT.GetCountry.GetAdjective] spies in the [byz_country.GetGovernment.GetCourtTitle] of [byz_country.GetName] have brought back rumors of political instability for some time now, recent reports speculate that [byz_country.GetAdjectiveWithNoTooltip] [byz_country.GetGovernment.GetEstateName('nobles_estate')] have grown infuriated with the ruling [byz_ruler.GetDynasty.GetName], and are now plotting a coup.\n\nSeeing this as a prelude to a potential civil war within [byz_country.GetNameWithNoTooltip], some have urged [scope_ruler.GetName] to make preparations to exploit the situation."
 flavor_ach.11.a: "Now is the time to crush the Phoenix!"
 flavor_ach.11.b: "Let us avoid involving ourselves in [byz_country.GetAdjectiveWithNoTooltip] internal affairs."
 flavor_ach.11.b.entry: "Let us avoid involving ourselves in $BYZ_ADJ$ internal affairs."

 flavor_ach.12.title: "Appeasing the [ShowCultureNameWithNoTooltip('greek_culture')] Elite"
 flavor_ach.12.entry: "The Greek Populace of Achaea"
 flavor_ach.12.desc: "Although [GetCountry('LAT').GetAdjective] rule over [ShowScriptedGeographyName('greece_geography')] has seen a decline of the former [ShowCultureName('greek_culture')] elite, in some areas of [ROOT.GetCountry.GetName], members of older [ShowCultureNameWithNoTooltip('greek_culture')] families have maintained a grip on power by compromising with [ROOT.GetCountry.GetCulture.GetName] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. However, since the fall of the [GetCountry('LAT').GetLongNameWithNoTooltip], members of the [ShowCultureNameWithNoTooltip('greek_culture')] populace have grown more resistant to [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] rule.\n\nSeeking a more stable reign, [scope_ruler.GetNameWithNoTooltip] has invited members of remaining [ShowCultureNameWithNoTooltip('greek_culture')] families in [ROOT.GetCountry.GetNameWithNoTooltip] to the [ROOT.GetCountry.GetGovernment.GetCourtTitle] to work out a compromise. However, some [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] have instead pushed for further expansion of their rights over the [ShowCultureNameWithNoTooltip('greek_culture')] populace, arguing that a stronger [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] elite would clamp down on [ShowCultureNameWithNoTooltip('greek_culture')] unrest."
 flavor_ach.12.a: "Maintain the current status quo."
 flavor_ach.12.b: "Side with the [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
 flavor_ach.12.b.entry: "Side with our $nobles_estate$."
 flavor_ach.12.c: "Strive for a compromise with the [ShowCultureNameWithNoTooltip('greek_culture')] families."

 flavor_ach.13.title: "The Threat of [athens_country.GetNameWithNoTooltip]"
 flavor_ach.13.entry: "Catalan Rule over Athens"
 flavor_ach.13.desc: "Although many of the [GetCountry('LAT').GetAdjective] lords in [ShowScriptedGeographyName('greece_geography')] have offered support for [scope_ruler.GetName] and [scope_ruler.GetHisHer] claim to the [GetCountry('LAT').GetLongNameWithNoTooltip], the [athens_country.GetLongName] in recent years has grown increasingly hostile, bolstered by the backing of the [ShowCultureName('catalan')] Company. However, several discontent [athens_country.GetAdjectiveWithNoTooltip] [athens_country.GetGovernment.GetEstateName('nobles_estate')] have reached out to the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] in hopes of garnering support to expel the [ShowCultureNameWithNoTooltip('catalan')] Company from [athens_country.GetNameWithNoTooltip], and in return would offer fealty to [ROOT.GetCountry.GetNameWithNoTooltip]."
 flavor_ach.13.a: "We should instead befriend the [ShowCultureNameWithNoTooltip('catalan')] [athens_country.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] in [athens_country.GetNameWithNoTooltip]."
 flavor_ach.13.a.entry: "We should instead befriend the [ShowCultureNameWithNoTooltip('catalan')] $nobles_estate$ in $ATH$."
 flavor_ach.13.b: "We should honor their request to expel the [ShowCultureNameWithNoTooltip('catalan')] Company from [athens_country.GetNameWithNoTooltip]."
 flavor_ach.13.b.entry: "We should honor their request to expel the [ShowCultureNameWithNoTooltip('catalan')] Company from $ATH$."
 flavor_ach.13.c: "Use the opportunity to instead conquer the [athens_country.GetFlavorRank]."
 flavor_ach.13.c.entry: "Use the opportunity to instead conquer the realm."
 ach_vassalize_athens_for_reward: "Should we succeed in subjugating [athens_country.GetName], we will be able to install a new ruler favorable to [ROOT.GetCountry.GetName]"


 flavor_ach.14.title: "The [ShowCultureNameWithNoTooltip('catalan')] Company Exiled from [athens_country.GetNameWithNoTooltip]"
 flavor_ach.14.entry: "French rule restored over Athens"
 flavor_ach.14.desc: "Having successfully bested the [ShowCultureName('catalan')] Company and exiled them from [athens_country.GetName], many of the [athens_country.GetAdjectiveWithNoTooltip] elite have pledged their full fealty to [scope_ruler.GetName]. With the former ruler of the [athens_country.GetFlavorRank] now in exile, many in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have put forth the idea of restoring a [ShowCultureNameWithNoTooltip('french')] family to rule [athens_country.GetNameWithNoTooltip], although others have suggested we take the opportunity to build relations with the [ShowCultureNameWithNoTooltip('greek_culture')] people and elevate a member of the local [athens_country.GetGovernment.GetEstateName('nobles_estate')] to serve instead."
 flavor_ach.14.a: "Install a member of the [ShowCultureNameWithNoTooltip('french')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] to serve as the new [athens_country.GetGovernment.GetRulerTitle]."
 flavor_ach.14.a.entry: "Install a member of the [ShowCultureNameWithNoTooltip('french')] $nobles_estate$ to serve as the new ruler."
 flavor_ach.14.b: "Appoint a member of the [ShowCultureNameWithNoTooltip('french')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], but enforce privileges for the [ShowCultureNameWithNoTooltip('greek_culture')] people in [athens_country.GetNameWithNoTooltip]."
 flavor_ach.14.b.entry: "Appoint a member of the [ShowCultureNameWithNoTooltip('french')] $nobles_estate$, but enforce privileges for the [ShowCultureNameWithNoTooltip('greek_culture')] people in $ATH$."
 flavor_ach.14.c: "Appoint some [ShowCultureNameWithNoTooltip('greek_culture')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] to take the reins of [athens_country.GetNameWithNoTooltip]."
 flavor_ach.14.c.entry: "Appoint some [ShowCultureNameWithNoTooltip('greek_culture')] $nobles_estate$ to take the reins of $ATH$."

 flavor_ach.15.title: "Ascension of [scope_ruler.GetNameWithNoTooltip]"
 flavor_ach.15.entry: "The Passing of the Latin Emperorship"
 flavor_ach.15.desc: "With the passing of [latin_empress_catherine_valois.GetName], [scope_ruler.GetName] has inherited the titular claim to the [GetCountry('LAT').GetLongNameWithNoTooltip], and has arranged a ceremony in [ROOT.GetCountry.GetCapital.GetName] to mark the occasion. Although [latin_empress_catherine_valois.GetShortNameWithNoTooltip] and [scope_philip_latin_emperor.GetName] took major steps to reinforce the nature of the title, many of the [GetCountry('LAT').GetAdjectiveWithNoTooltip] lords throughout [ShowScriptedGeographyName('greece_geography')] have declined to recognize the [scope_ruler.GetDynasty.GetName] claim to the [GetCountry('LAT').GetLongNameWithNoTooltip].\n\nUrging [scope_ruler.GetNameWithNoTooltip] to continue building off [scope_ruler.GetHisHer] parents' legacy, some members of the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have requested [scope_ruler.GetHeShe] use the ceremony to leverage renewed efforts to restore the empire."
 flavor_ach.15.a: "Keep the coronation purely ceremonial."
 flavor_ach.15.b: "Use the ceremony to bolster efforts to restore the empire."
 flavor_ach.15.c: "Leverage the coronation for political favor amongst the loyal lords."

 flavor_ach.16.title: "[the_pope.GetNameWithNoTooltip] Offers Support to Restore the [GetCountry('LAT').GetLongNameWithNoTooltip]"
 flavor_ach.16.entry: "Pope Takes Interest in restoration of the Latin empire"
 flavor_ach.16.desc: "Having taken notice of our campaigns in [ShowScriptedGeographyName('greece_geography')], [the_pope.GetName] has sent an emissary from [scope_papal_states.GetName] offering a proposal to aid us.\n\nRecognizing our claim of [ShowGovernmentReformName('ach_heirs_of_the_latin_empire')], the [the_pope.GetShortNameWithNoTooltip] has offered the financial and political backing of [scope_papal_states.GetNameWithNoTooltip] should we agree to aid the [scope_papal_states.GetGovernment.GetRulerTitle] in [the_pope.GetHisHer] efforts to mend relations between the [ShowReligionAdjective('catholic')] and [ShowReligionAdjective('orthodox')] Churches.\n\n[the_pope.GetNameWithNoTooltip] has also urged that should [constantinople_location.GetName] be reclaimed, the tragedy the Fourth Crusade brought upon the [constantinople_location.GetRank.GetName] must not be repeated."
 flavor_ach.16.a: "Agree to the demands of the [scope_papal_states.GetAdjectiveWithNoTooltip] emissary in return for their support."
 flavor_ach.16.a.entry: "Agree to the demands of the $PAP_ADJ$ emissary in return for their support."
 flavor_ach.16.b: "We do not need [the_pope.GetShortNameWithNoTooltip] to retake [constantinople_location.GetNameWithNoTooltip]."
 flavor_ach.16.b.entry: "We do not need him to retake [ShowLocationNameWithNoTooltip('constantinople')]."
 lat_aggressive_conversion_policies_tt: "[the_pope.GetName] may request we adopt harsh conversion policies should we establish the [GetCountry('LAT').GetLongName], in return for earning [the_pope.GetHisHer] support"

 flavor_ach.17.title: "[constantinople_location.GetNameWithNoTooltip] Reclaimed!"
 flavor_ach.17.entry: "Constantinople reclaimed!"
 flavor_ach.17.desc: "What was once seen as an impossible task has finally been accomplished: [constantinople_location.GetName] has finally been reclaimed! While much of the [constantinople_location.GetRank.GetName] has yet to recover, [scope_ruler.GetName] has urged [ROOT.GetCountry.GetAdjective] soldiers to be cautious while retaking [constantinople_location.GetNameWithNoTooltip] to avoid further destabilization of the populace.\n\nWith much of [constantinople_location.GetNameWithNoTooltip] secured and the Imperial palace of Blachernae abandoned, [scope_ruler.GetNameWithNoTooltip] has requested the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] elite to quickly proclaim the restoration of the [GetCountry('LAT').GetLongName], although cautious members of the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have urged us to first secure our foothold."
 flavor_ach.17.a: "It is time we reestablish our rule over [constantinople_location.GetNameWithNoTooltip]."
 flavor_ach.17.a.entry: "It is time we reestablish our rule over [ShowLocationNameWithNoTooltip('constantinople')]."
 flavor_ach.17.b: "We should strengthen our position before formally restoring the empire."
 flavor_ach.17.c: "Sack [constantinople_location.GetNameWithNoTooltip] for all of its remaining riches!" 
 flavor_ach.17.c.entry: "Sack [ShowLocationNameWithNoTooltip('constantinople')] for all of its remaining riches!"

 
