l_english:
 flavor_byz_ven.1.title: "In Dire Straits"
 flavor_byz_ven.1.entry: "$flavor_byz_ven.1.title$"
 flavor_byz_ven.1.desc: "As the [ShowDisasterName('byzantine_succession_crisis')] rages on, our treasury is being drained, making our position more and more untenable as the conflicts continue. Should our internal turmoil persist, the very existence of the [origin_country.GetLongName] will be in jeopardy.\n\nIn such dire circumstances, a once-unbelievable idea is being floated around — pawning the [target_woa.GetName] as collateral for a loan from one of the merchant republics."
 flavor_byz_ven.1.a: "Desperate times call for equally desperate measures."
 flavor_byz_ven.1.b: "That is preposterous."

 BYZ_crown_jewels_tt: "If [THIS.GetCountry.GetName] accept, they will [loan|e] us [SCOPE.GetLocalVariable('loan_size').GetValue|+=] [gold_i|e] and we will suffer from [ShowModifier('BYZ_lacking_jewels')] until the [work_of_art|e] of [target_woa.GetName] is returned"

 flavor_byz_ven.2.title: "Pawning the [origin_country.GetAdjectiveWithNoTooltip] Crown Jewels"
 flavor_byz_ven.2.entry: "Pawning the $BYZ_ADJ$ Crown Jewels"
 flavor_byz_ven.2.desc: "The [origin_country.GetLongName] is in the most dire of straits. Suffering from the [ShowDisasterName('byzantine_succession_crisis')], they are actively burning through their war chest, and are in critical need of additional funds. Their situation seems so terrible, in fact, that they have made us a most surprising offer: a request for a loan, offering the [target_woa.GetName] as collateral. This may be considered a sign of trust by some... or an act of desperation by others."
 flavor_byz_ven.2.a: "It will make a fine addition to our collection."
 flavor_byz_ven.2.b: "Let the wicked [origin_country.GetFlavorRank] fall."
 flavor_byz_ven.2.b.entry: "Let the wicked realm fall."

 pawning_of_crown_jewels: "Pawning the Crown Jewels"
 LOAN_SHORT_NAME_pawning_of_crown_jewels_L: "$pawning_of_crown_jewels$"
 LOAN_SHORT_NAME_pawning_of_crown_jewels_B: "$pawning_of_crown_jewels$"
 LOAN_TOOLTIP_pawning_of_crown_jewels: "A mutual agreement has been reached wherein the lender grants a loan to the borrower against the possession of $byzantine_crown_jewels$. When the loan is repaid, the pawned jewels should be returned as well — at least, in theory."
 LOAN_TITLE_pawning_of_crown_jewels: "$pawning_of_crown_jewels$"
 LOAN_NAME_pawning_of_crown_jewels_L: "$pawning_of_crown_jewels$"
 LOAN_NAME_pawning_of_crown_jewels_B: "$pawning_of_crown_jewels$"

 flavor_byz_ven.3.title: "Loan Repaid"
 flavor_byz_ven.3.entry: "$flavor_byz_ven.3.title$"
 flavor_byz_ven.3.desc: "The [origin_country.GetLongName] has just repaid the loan we granted them, and are now demanding that the [target_woa.GetName] be restored to their possession. According to our agreement, we must oblige — but doing so would make us lose what leverage we have on them.\n\nSurely, should we not return the jewels, nothing significant will happen..."
 flavor_byz_ven.3.a: "We cannot risk such a mark on our reputation."
 flavor_byz_ven.3.b: "After all, why not? Why should we not keep it?"

 flavor_byz_ven.4.title: "Crown Jewels Returned"
 flavor_byz_ven.4.desc: "Per our agreement, we have repaid our loan to the [target_country.GetLongName] and the [target_woa.GetName] was subsequently returned, restored to [origin_country.GetAdjective] possession in [target_location.GetName].\n\nIt was a pleasure doing business with the most serene [ShowGovernmentReformName('merchant_republic')] of all."
 flavor_byz_ven.4.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
 flavor_byz_ven.4.a.entry: "$common_string_brilliant$"

 flavor_byz_ven.5.title: "Agreement Broken"
 flavor_byz_ven.5.desc: "Despite repaying our loan per the agreement we made, the [target_country.GetAdjective] side has ignored our request to return the [target_woa.GetName]. There is only one way we can interpret this — a grand theft!\n\nThey will face the wrath of the [origin_country.GetLongName]..."
 flavor_byz_ven.5.a: "We should not have dealt with the Devil."

 flavor_byz_ven.6.title: "$flavor_byz_ven.4.title$"
 flavor_byz_ven.6.desc: "The [target_army.GetName] has finally returned the [target_woa.GetName] to our possession. Our property has been brought back to [target.GetName], where it was warmly received by the [ROOT.GetCountry.GetGovernment.GetCourtTitle]. No longer can our enemies use these jewels to leverage their will upon us!"
 flavor_byz_ven.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
 flavor_byz_ven.6.a.entry: "$common_string_brilliant$"

 flavor_byz_ven.7.title: "[target_woa.GetNameWithNoTooltip]"
 flavor_byz_ven.7.desc: "The recent takeover of [location.GetName] has been a great success for [ROOT.GetCountry.GetName]. Our forces, [target_army.GetName], have conducted a comprehensive 'survey' of the land, acquiring the [target_woa.GetName] in the process, an important asset to our allies in [origin_country.GetName]. We could return it to them... but do we not deserve an equal share of the spoils of war?"
 flavor_byz_ven.7.a: "We shall return them to our dear allies."
 flavor_byz_ven.7.b: "But it is rightfully ours by theft!"

 flavor_byz_ven.8.title: "Jewels Stolen!"
 flavor_byz_ven.8.desc: "Reports have reached us of our lenders' utter incompetence! Having loaned us gold with the venerable [target_woa.GetName] as collateral, they have managed to get those same jewels stolen right from under their noses. We devoutly hope they will recover our goods. If not, we will have to take them back them from [target.GetName] ourselves..."
 flavor_byz_ven.8.a: "Is there anything they can do right, besides hoarding gold?"

 byz_woa_was_moved: "[target_woa.GetName] was moved to [target.GetName]"