l_english:

 flavor_tre.1.title: "The Citadel of [target_location.GetNameWithNoTooltip]"
 flavor_tre.1.entry: "The Citadel of Trebizond"
 flavor_tre.1.desc: "Standing proudly for centuries, the [target_location.GetRank.GetName] of [target_location.GetName] is a symbol of royal authority deep in the heartlands of [ShowRegionName('anatolia_region')]. Serving as a lighthouse of our cultural traditions, our great capital has flourished greatly, largely due to its magnificent harbor and geographical location.\n\nEquipped with many urban establishments such as merchant quarters, markets, and aqueducts, it has come to be the symbol of our authority, our pride and jewel. Recent population growth has deemed the necessity to expand the borders of the [target_location.GetRank.GetNameWithNoTooltip], in order to accommodate more households behind our sturdy walls."
 flavor_tre.1.historical_info: "Founded in 756 BCE, Trebizond has a long history as a stronghold of Christianity and Greek culture. As far back as the Roman times, the city served as a crucial legionary base in Pontos Polemoniakos. Later on, during Justinian's reign, several Armenian campaigns used Trebizond as the rally and launching point.\n\nThe city evolved into an archbishopric in the 8th century and a metropolis in the early 10th century. The Empire of Trebizond, founded in 1204 by Alexios I Komnenos and David Komnenos, lasted until 1461, fortified by the Pontic Mountains, strong city defenses, and strategic marital alliances. Though small, with about 4,000 inhabitants in 1438, it was well-defended and featured significant monuments such as the monastery of Hagia Sophia and the Cathedral of Panagia Chrysokephalos. Trebizond was the last Byzantine outpost to fall to the Ottomans, maintaining its cultural and historical significance until 1461."
 flavor_tre.1.a: "Fund the expansion!"
 flavor_tre.1.b: "Let them starve outside the walls..."

 flavor_tre.2.title: "Insubordination of the Scholarioi"
 flavor_tre.2.entry: "$flavor_tre.2.title$"
 flavor_tre.2.desc: "Motivated by the waning of central authority and urged on by their insatiable greed, many members of the local noble militias have come to control large swaths of the political scene in [target_location.GetName]. While they were always happy to receive a new office, privileges, and valuable estates, many members of the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] have crossed the line... Should we not act decisively against them, their tendency for corruption may throw the entire country in the jaws of civil war!"
 flavor_tre.2.a: "Leash these rabid dogs!"
 flavor_tre.2.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 flavor_tre.2.b.entry: "$common_string_nothing_we_can_do_about_it$"
 flavor_tre.2.historical_info: "The Scholarioi were influential #italic άρχοντες#! (nobles), and one of the most powerful families in Trebizond. They were originally formed as a royal militia unit tasked with protecting the city. They soon became corrupt and disputed the authority of the sitting Emperess Irene, in 1340. Their audacity and thirst for control led them to veto the ascension of Irene, throwing the entire country into civil war, while at the same time, Trebizond's southern border was harassed by Turkmen raids. This culminated in the raiders seizing the city, setting fire to it and introducing an epidemic, which arose from the foul stench of rotting corpses - men and horses alike."

 flavor_tre.3.title: "The Poisoning of [target_character1.GetNameWithNoTooltip]"
 flavor_tre.3.entry: "Poisoning of Basil Megas Komnenos"
 flavor_tre.3.desc: "In a desperate move of passionate hate and jealousy, [target_character2.GetName] went through with poisoning and sealing the fate of [target_character1.GetShortName]. Exacerbated by [target_character1.GetShortNameWithNoTooltip] seeming cold feelings towards her and the existence of many mistresses and lovers..."
 flavor_tre.3.a: "Everything is permitted in love and war."
 flavor_tre.3.b: "We will not stand for this!"
 flavor_tre.3.historical_info: "The marriage between Irene and Basil was naught but a way for the Komnenoi dynasty to secure an alliance with the Emperor of Byzantium, as Irene was the illegitimate daughter of Emperor Andronikos III Palaiologos. There was no affection between the two; Irene produced no children, while Basil found refuge in the arms of a courtier mistress. The resentment between the royal couple eventually led to the assassination of Basil and the beginning of the reign of Irene, a turbulent period for Trebizond."

 flavor_tre.4.title: "The Legacy of [target_character_2.GetNameWithNoTooltip]"
 flavor_tre.4.entry: "The Reign of Alexios II"
 flavor_tre.4.desc: "The reign of [target_character_1.GetName] marks the continuation of a great era for our [ROOT.GetCountry.GetFlavorRank]. Having inherited the throne from [target_character_2.GetName], the new [ROOT.GetCountry.GetGovernment.GetRulerTitle] must now govern in a political landscape shaped by dynastic tradition, local aristocracy, and foreign interests along the [ShowAreaName('black_sea_area')] coast.\n\nHow this reign will be remembered depends not only on deeds yet to come, but on how firmly the legacy of his predecessors is upheld or reshaped."
 flavor_TRE_4_historical_info: "Alexios II Megas Komnenos was one of the longest-reigning emperors of Trebizond, ruling during a period when the empire relied heavily on diplomacy, trade, and dynastic continuity rather than territorial expansion. His death marked a transition in which the authority of the ruling house continued, but the underlying balance between court factions and foreign merchants remained delicate."
 flavor_tre.4.a: "Rest now, great [ROOT.GetCountry.GetGovernment.GetRulerTitle]..."
 flavor_tre.4.a.entry: "Rest now, great ruler..."

 flavor_tre.5.title: "Motherland of Cherries"
 flavor_tre.5.entry: "$flavor_tre.5.title$"
 flavor_tre.5.desc: "The [target_location.GetRank.GetName] of [ShowLocationName('giresun')] has long served as a modest yet important port along the southern [ShowAreaName('black_sea_area')]. Its harbor links the inland routes of the [ROOT.GetCountry.GetAdjective] mountains with maritime trade, offering opportunities for growth if properly encouraged.\n\nWhether through direct investment or patient governance, the future of [target_location.GetNameWithNoTooltip] will influence both local prosperity and the wider commercial standing of [ROOT.GetCountry.GetNameWithNoTooltip]."
 flavor_TRE_5_historical_info: "Kerasous, known today as Giresun, was an established settlement in the Pontus region with strategic value as a coastal port. For the Empire of Trebizond, such towns provided access to Black Sea commerce and acted as intermediaries between mountain economies and international trade networks. It is said that the name #italic Kerasous#! would eventually be used to describe a local sweet fruit, the cherry."
 flavor_tre.5.a: "A wise investment."
 flavor_tre.5.b: "Let it prosper naturally."

 flavor_tre.6.title: "Growing Influence of the [ShowCultureGroupNameWithNoTooltip('italian_group')] Merchants"
 flavor_tre.6.entry: "Tax the Venetians and Genoese"
 flavor_tre.6.desc: "[ShowCultureGroupName('italian_group')] merchants from [GetCountry('VEN').GetName] and [GetCountry('GEN').GetName] have long enjoyed extensive privileges within our ports, exemptions secured through treaties and mutual necessity. Their ships bring wealth and goods, but their autonomy increasingly draws criticism from local [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] and officials alike.\n\nTo impose new taxes would assert sovereignty and strengthen the treasury, yet doing so risks diplomatic fallout with powerful maritime republics whose influence extends far beyond the [ShowAreaName('black_sea_area')], infringing on decade-long trade deals already in place."
 flavor_tre.6.a: "Impose new taxes."
 flavor_tre.6.b: "Let us not antagonize them."

 flavor_tre.7.title: "The Aspron"
 flavor_tre.7.entry: "$flavor_tre.7.title$"
 flavor_tre.7.desc: "[ShowGoodsName('silver')] extracted from the lands around [ShowLocationName('gumushane')] offers more than material wealth. Indeed, it underpins confidence in coinage and authority of the [ROOT.GetCountry.GetGovernment.GetRulerTitle] alike. By expanding mining and minting activity in the [target_location.GetRank.GetName], the [ROOT.GetCountry.GetFlavorRank] may reinforce its monetary system and stimulate local development.\n\nYet such efforts require firm administration and immediate expense, and the strain of intensified extraction may unsettle both land and people if pushed too far."
 flavor_tre.7.a: "Focus on expanded extraction!"
 flavor_tre.7.b: "Such greed is unwise."