l_english:
 flavor_bos.1.title: "Aspiration for Independence"
 flavor_bos.1.entry: "$flavor_bos.1.title$"
 flavor_bos.1.desc: "The death of [hun_robert.GetName] has opened an opportunity never before seen. With [GetCountry('HUN').GetName] weakened and distracted, [target_ruler.GetName] began to envision [ROOT.GetCountry.GetName] free from [GetCountry('HUN').GetAdjectiveWithNoTooltip] rule. Instead of engaging in an open rebellion, it has been suggested that we should start to quietly undermine their rule and engage in diplomacy with their enemies, who may prove useful in our pursuit of freedom."
 flavor_bos.1.a: "We must make use of this opportunity."
 flavor_bos.1.b: "We shall remain loyal to the [GetCountry('HUN').GetAdjectiveWithNoTooltip] [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
 flavor_bos.1.b.entry: "We shall remain loyal to the $HUN_ADJ$ $crown_estate$."
 flavor_bos.1.a.tt: "Continued undermining of [GetCountry('HUN').GetAdjectiveWithNoTooltip] authority, such as improving relations with their rivals and decreasing our loyalty, might force [GetCountry('HUN').GetNameWithNoTooltip] to reconsider our status as their subject."
 flavor_bos.1.historical_info: "The reign of Stephen II was marked by significant efforts to free Bosnia from Hungarian rule by playing Hungary against its rivals. After the deaths of key Hungarian allies, such as King Charles Robert and Mikac of Slavonia, Stephen started exploiting Hungary's wars with Venice through bribes, withheld loyalty, and even leaked military positions. These actions earned Stephen the nickname 'Devil's Student', and made the new Hungarian king distrust him, but the exhausted crown lacked the strength and will to remove him. By the end of his reign, the Hungarian authority over Bosnia became purely nominal." 
 
 flavor_bos.2.title: "The Decline of [GetCountry('SER').GetNameWithNoTooltip]"
 flavor_bos.2.entry: "The Decline of Serbia"
 flavor_bos.2.desc: "Following the passing of [ser_dusan.GetName], [GetCountry('SER').GetName] has been facing years of internal struggle. The declining ruling authority has caused several local lords to fight for power, though none of them possesses the dynastic legitimacy or authority to claim the throne. Since our rulers have had dynastic ties to the [ser_dusan.GetDynasty.GetName] ruling family, we can legitimately lay claim to their crown."
 flavor_bos.2.a: "Use their fragmentation to expand our influence."
 flavor_bos.2.b: "Let us focus on our internal matters."
 flavor_bos.2.historical_info: "The extinction of the Nemanjić dynasty left the Serbian throne effectively vacant, with local houses ruling fragmented parts of the former Empire. Tvrtko I exploited this vacuum of power, and through his Nemanjić ancestry from his paternal grandmother, laid claim to the Serbian crown and sought to expand Bosnia's influence eastwards."
 
 flavor_bos.3.title: "The First King of [ROOT.GetCountry.GetNameWithNoTooltip]"
 flavor_bos.3.entry: "$flavor_bos.3.title$"
 flavor_bos.3.desc: "Our successful campaign has delivered into our hands vast swathes of the former [GetCountry('SER').GetAdjective] lands. This triumph has emboldened [target_ruler.GetName] to come forth with a daring suggestion. [target_ruler.GetSheHe|U] not only wishes to officially assume the kingship of [GetCountry('SER').GetNameWithNoTooltip], but to also raise [ROOT.GetCountry.GetName] to royal status, becoming the first king our country has ever had."
 flavor_bos.3.a: "Our nation needs a king."
 flavor_bos.3.b: "The crown is more trouble than power."
 flavor_bos.3.historical_info: "By the early 1370s, the former Serbian Empire had disintegrated and was divided between many local lords, including Tvrtko of Bosnia. Tvrtko's position was, however, fundamentally different. He already ruled an independent nation which included significant lands of the Serbian Empire. More importantly, he claimed dynastic descent from the Nemanjić family, giving him the legitimacy that no other Serbian lord had. Based on these rights, his court articulated the foundation of his coronation and his right to a double crown, which resulted in Tvrtko being crowned the King of Serbs and of Bosnia in the autumn of 1377."
 
 flavor_bos.4.title: "The Council of the Strojnici Convenes"
 flavor_bos.4.entry: "$flavor_bos.4.title$"
 flavor_bos.4.desc: "Strojnici, the senior elders of the [ROOT.GetCountry.GetAdjective] Church, have assembled to discuss the future course of our faith. Long-standing disputes, questions of doctrine, and many other issues are laid bare before the council."
 flavor_bos.4.a: "The church requires stability over all."
 flavor_bos.4.b: "We should work on clarifying our teachings."
 flavor_bos.4.c: "Focus on resolving internal disputes."
 flavor_bos.4.d: "Let us tend to the property of the church."
 
 flavor_bos.5.title: "Fate of the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Church"
 flavor_bos.5.entry: "$flavor_bos.5.title$"
 flavor_bos.5.desc: "The mounting pressure of the [GetUniqueInternationalOrganization('catholic_church').GetName] upon our [ROOT.GetCountry.GetFlavorRank] is becoming increasingly difficult to bear. Reports have reached us that [target_pope.GetName] is once again contemplating a crusade against [ROOT.GetCountry.GetName], accusing us of harboring dangerous heresies. For generations, we have defended the survival of our native church, but perhaps the time has come to submit and secure our place among the nations of the [ShowReligionAdjective('catholic')] world."
 flavor_bos.5.a: "Our church shall endure!"
 flavor_bos.5.b: "Let us join the [ShowReligionAdjectiveWithNoTooltip('catholic')] world."
 flavor_bos.5.c: "We shall turn to [ShowLocationNameWithNoTooltip('constantinople')] instead."
 flavor_bos.5_catholic_unhappy: "All [ShowReligionAdjective('catholic')] [pops|e] lose [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [pop_satisfaction|e]"
 flavor_bos.5_krstjani_unhappy: "All [ShowReligionAdjective('bosnian_church')] [pops|e] lose [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [pop_satisfaction|e]"
 flavor_bos.5_orthodox_unhappy: "All [ShowReligionAdjective('orthodox')] [pops|e] lose [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [pop_satisfaction|e]"
 flavor_bos.5.historical_info: "The Bosnian Church became a persistent target of criticism and intervention by the Papacy, as it was frequently accused of harboring heretical beliefs. In 1203, the representatives of the Church signed the Abjuration of Bilno Polje, in which they agreed to abandon practices deemed heretical and conform to the Catholic doctrine. Despite that, many continued to maintain their traditional practices in secret. In 1337, Pope Benedict XII called for another crusade, but the efforts ultimately failed. The Bosnian Church survived up until the Ottoman takeover of the region."