l_english:
 flavor_sie.1.title: "Banca Monte dei Paschi"
 flavor_sie.1.desc: "Mounts of Piety, or #italic Monte di Pietà#! are becoming increasingly common in our country and around us. They are charitable institutions, using funds from donors to allow less fortunate people access to low-interest loans. Funding one of such organizations in [monte_paschi_bank_hq.GetName] will serve to increase the wealth and general prosperity of our [ROOT.GetCountry.GetFlavorRank], and serve as our national bank."
 flavor_sie.1.a: "The money will flow."
 flavor_sie.1.b: "A pious organization indeed!"
 flavor_sie.1.historical_info: "#italic La Banca Monte dei Paschi di Siena#! was born in the Republic of Siena in 1472, and it has the status of being the oldest bank in the world in continuous operation. Starting as a Mount of Piety, it got its modern form with the Grand Duchy of Tuscany, and after the unification of Italy it expanded its presence for the whole of the peninsula."

 flavor_sie.2.title: "$flavor_sie.1.title$"
 flavor_sie.2.desc: "Mounts of Piety are charitable organizations intended to help the less favored. However, that our origins are those does not mean that we cannot expect to profit from such and other operations, and enrich ourselves in the process."
 flavor_sie.2.a: "Money shall be ours!"
