l_english:
 flavor_cro.1000.title: "The Unification of [ShowAreaNameWithNoTooltip('croatia_area')] and [ShowAreaNameWithNoTooltip('slavonia_area')]"
 flavor_cro.1000.entry: "The Unification of Croatia and Slavonia - Croatia"
 flavor_cro.1000.desc: "The relentless expansion of [GetCountry('TUR').GetName] poses a grave danger to our [ROOT.GetCountry.GetFlavorRank], and the division of the lands governed by the [GetCountry('HUN').GetAdjectiveWithNoTooltip] [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] might create a weak spot our foes could exploit. Due to this situation, our [ROOT.GetCountry.GetGovernment.GetCourtTitle] suggests proposing that [GetCountry('HUN').GetNameWithNoTooltip] put the regions of [ShowAreaName('croatia_area')] and [ShowAreaName('slavonia_area')] under one authority. They argue that this would significantly increase our defensive capabilities and ease administrative strain."
 flavor_cro.1000.a: "Proceed with the proposal."
 flavor_cro.1001.a.tt: "Every owned [location|e] that is either a [core|e] of $SVN$ or is in [ShowAreaName('slavonia_area')] will be transferred to [GetCountry('CRO').GetName]"
 flavor_cro.1000.b: "This would be a burden for our administration."
 flavor_cro.1000.historical_info: "Historically, Slavonia was administratively separated from Croatia, and was governed by its own Ban who was subordinate to the Hungarian crown. However, the advance of the Ottoman Empire reshaped the region's political landscape, and the devastation caused by the war forced people to flee northwards. In 1476, King Matthias I merged the offices of the Ban of Croatia and Dalmatia and the Ban of Slavonia, seeking to coordinate defense more effectively against Ottoman incursions. The merge was effectively finished in 1558, when the parliaments of Croatia and Slavonia were politically integrated and unified."
 
 flavor_cro.1001.title: "$flavor_cro.1000.title$"
 flavor_cro.1001.desc: "Messengers from our subjects in [GetCountry('CRO').GetName] have arrived at the [ROOT.GetCountry.GetGovernment.GetCourtTitle] with a suggestion to unite the offices of the Ban of [ShowAreaName('croatia_area')] and the Ban of [ShowAreaName('slavonia_area')]. They claim that a unified command would strengthen the defenses and ease the burden of administration in the face of the [GetCountry('TUR').GetAdjective] threat."
 flavor_cro.1001.a: "A unified frontier will enhance our defenses."
 flavor_cro.1001.b: "[ShowAreaNameWithNoTooltip('slavonia_area')] belongs to the [GetCountry('HUN').GetAdjectiveWithNoTooltip] [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
 flavor_cro.1001.b.entry: "[ShowAreaNameWithNoTooltip('slavonia_area')] belongs to the $HUN_ADJ$ $crown_estate$."
 
 flavor_cro.1100.title: "The Dominion of [target_character.GetNameWithNoTooltip]"
 flavor_cro.1100.entry: "The Dominion of Ivan Nelipic"
 flavor_cro.1100.desc: "A powerful magnate named [target_character.GetName] is gaining increasing influence over the matters in [ROOT.GetCountry.GetName]. In his home region, he has managed to eliminate many of his foes, and also loosened the grip of the [GetCountry('HUN').GetAdjective] [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] over regional affairs. Although many came to accept this arrangement as a beneficial one, others fear that [GetCountry('HUN').GetNameWithNoTooltip] may at any moment seek to reassert its authority. To resolve this situation, it has been proposed that if [target_character.GetNameWithNoTooltip] were to recognize the authority of the [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], then [GetCountry('HUN').GetNameWithNoTooltip] should in return recognize his rule over [ROOT.GetCountry.GetNameWithNoTooltip]."
 flavor_cro.1100.a: "Do not meddle with the [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
 flavor_cro.1100.a.entry: "Do not meddle with the $crown_estate$."
 flavor_cro.1100.b: "Send the offer."
 flavor_cro.1100.historical_info: "Ivan Nelipić was a Croatian noble who effectively took control of most of Croatia in 1322, after having previously deposted Ban Mladen II Šubić. During his rule, the title of Ban of Croatia was vacant, and Croatia almost completely slipped out of the Hungarian authority. Numerous attempts were made, either by the Hungarian crown or the Ban of Slavonia, to depose Nelipić, but ultimately all of them failed. Hungary only managed to reassert royal authority over Croatia in 1345 after Ivan Nelipić had died."
 
 flavor_cro.1101.title: "[GetCountry('CRO').GetNameWithNoTooltip] Seeks Compromise"
 flavor_cro.1101.desc: "Ever since the victory of [ShowCultureNameWithNoTooltip('dalmatian')|U] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] in the Battle of Bliska of 1322, [GetCountry('CRO').GetName] has been dominated by the powerful magnate [target_character.GetName], who has steadily undermined the authority of the [GetCountry('HUN').GetAdjective] [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] there. Surprisingly, [target_character.GetLastNameWithNoTooltip] has sent an envoy to the [ROOT.GetCountry.GetGovernment.GetCourtTitle] with an offer of a compromise. [target_character.GetSheHe|U] is prepared to formally acknowledge the authority of the [GetCountry('HUN').GetAdjective] [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] and pledge loyalty to the throne. In return, [target_character.GetSheHe] requests that we recognize [target_character.GetHerHim] as the rightful ruler of [GetCountry('CRO').GetNameWithNoTooltip]." 
 flavor_cro.1101.a: "The union will stay intact."
 flavor_cro.1101.b: "Legitimize [target_character.GetHerHim]."
 flavor_cro.1101.b.entry: "Legitimize him."
 
 flavor_cro.1102.title: "[GetCountry('HUN').GetNameWithNoTooltip] Dismisses Our Claim"
 flavor_cro.1102.desc: "Our envoy has returned with troubling news. The [GetCountry('HUN').GetAdjective] [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] has rejected our proposal to recognize [target_character.GetName] as the ruler of [GetCountry('CRO').GetName], insisting that our [ROOT.GetCountry.GetFlavorRank] is an integral part of the union. While the general consensus at the [ROOT.GetCountry.GetGovernment.GetCourtTitle] is that not much can be done about it, some suggest extreme measures: terminating the Pacta Conventa that binds our throne to [GetCountry('HUN').GetNameWithNoTooltip], and crowning [target_character.GetLastNameWithNoTooltip] as the first native king of [GetCountry('CRO').GetNameWithNoTooltip] in more than two centuries."
 flavor_cro.1102.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 flavor_cro.1102.a.entry: "$common_string_nothing_we_can_do_about_it$"
 flavor_cro.1102.b: "Terminate the Pacta Conventa and crown [target_character.GetLastNameWithNoTooltip]!"
 flavor_cro.1102.b.entry: "Terminate the Pacta Conventa and crown him!"
 
 flavor_cro.1103.title: "[GetCountry('CRO').GetNameWithNoTooltip] Terminates the Pacta Conventa"
 flavor_cro.1103.desc: "Following our refusal to recognize the authority of [target_character.GetName], [GetCountry('CRO').GetName] has decided to take a far more drastic step than anyone had anticipated. They have declared the Pacta Conventa, an agreement that binds them to our [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], null and void. Additionally, [target_character.GetLastNameWithNoTooltip] has been proclaimed their new [GetCountry('CRO').GetGovernment.GetRulerTitle]."
 flavor_cro.1103.a: "This rebellion cannot stand!"
 flavor_cro.1103.b: "We will not interfere."