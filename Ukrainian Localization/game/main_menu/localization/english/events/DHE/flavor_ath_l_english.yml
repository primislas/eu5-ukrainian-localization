l_english:
 flavor_ath.1.title: "Recent [target_country.GetAdjectiveWithNoTooltip] Raids"
 flavor_ath.1.entry: "Recent Aydinid Raids"
 flavor_ath.1.desc: "Our lands on the [ShowAreaName('aegean_sea_area')] coast have, in recent years, suffered many devastating raids at the hands of the [target_country.GetAdjective] Turks. As these raids were conducted by [target_character.GetName], we thought that his fortunate death would bring us reprieve; yet his successor's recent raid in [ShowAreaName('thrace_area')] leaves no doubt about his intentions — [target_character2.GetName] will return to [ShowScriptedGeographyName('greece_geography')] to plunder once more. We must deal with this threat before it can sow more misery in our cities — a counterraid or a [GetInternationalOrganizationType('crusade').GetName] would be in order."
 flavor_ath.1.a: "Give them a taste of their own medicine!"

 flavor_ath.2.title: "Sudden Death of [scope_ruler.GetShortNameWithNoTooltip]"
 flavor_ath.2.entry: "Sudden Death of the Duke Guillem II"
 flavor_ath.2.desc: "Tragedy! After contracting a sudden illness, [scope_ruler.GetName] has been declared deceased by [regent_of_athens.GetName], who has taken to forming a temporary regency while affairs related to the succession are handled. While [scope_ruler.GetShortNameWithNoTooltip] designated [scope_heir.GetName] as [scope_ruler.GetHisHer] successor, [scope_heir.GetHeShe] currently resides in [sic_country.GetName], meaning it will be some time before [scope_ruler.GetHeShe] can arrive.\n\nWith a power vacuum now looming over [ROOT.GetCountry.GetName], some within the [ROOT.GetCountry.GetGovernment.GetCourtTitle] who hold grievances towards the [ShowCultureName('catalan')] Company have pleaded with [regent_of_athens.GetShortNameWithNoTooltip] to invite [arg_ruler.GetName] to rule [ROOT.GetCountry.GetNameWithNoTooltip] instead, seeing the opportunity as a way to restore [arg_ruler.GetDynasty.GetName] rule to [ROOT.GetCountry.GetNameWithNoTooltip]. However, such an action would be seen as an act of rebellion, which may lead to [sic_country.GetNameWithNoTooltip] clamping down on the autonomy of the [ROOT.GetCountry.GetFlavorRank]. The [ShowCultureNameWithNoTooltip('catalan')] Company would also need to be convinced to accept [arg_ruler.GetShortNameWithNoTooltip]'s takeover, should [arg_ruler.GetHeShe] choose to accept the offer."
 flavor_ath.2.a: "Allow [scope_heir.GetNameWithNoTooltip] to succeed [scope_ruler.GetShortNameWithNoTooltip]."
 flavor_ath.2.a.entry: "Allow the heir to succeed the ruler."
 flavor_ath.2.b: "Offer the [ROOT.GetCountry.GetFlavorRank] to [arg_ruler.GetShortNameWithNoTooltip]."
 flavor_ath.2.b.entry: "Offer the realm to him."
 ath_sicily_may_declare_war: "[sic_country.GetName] will gain a [ShowCasusBelliName('cb_subject_broke_free')] [casus_belli|e] against [ROOT.GetCountry.GetName], should [arg_ruler.GetName] become the new ruler of [ROOT.GetCountry.GetNameWithNoTooltip]"

 flavor_ath.3.title: "[scope_athens.GetAdjectiveWithNoTooltip] [scope_athens.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Offer the [scope_athens.GetLongNameWithNoTooltip]"
 flavor_ath.3.desc: "A diplomat from [scope_athens.GetName] has arrived to the [ROOT.GetCountry.GetGovernment.GetCourtTitle] with a promising, yet treacherous offer. He comes bringing news that [scope_ath_william.GetName] of [scope_athens.GetNameWithNoTooltip] has suddenly passed after a short period of illness, and his death has left the [ROOT.GetCountry.GetFlavorRank] without a ruler. While many of the [scope_athens.GetGovernment.GetEstateName('nobles_estate')] of [scope_athens.GetNameWithNoTooltip] await [scope_ath_william.GetShortNameWithNoTooltip]'s successor, the acting regent [regent_of_athens.GetShortName] has arranged an agreement with other [scope_athens.GetAdjectiveWithNoTooltip] [scope_athens.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] who retain loyalty to the [arg_ruler.GetDynasty.GetName], and would prefer to see [arg_ruler.GetName] enthroned as its new ruler. \n\n[regent_of_athens.GetShortNameWithNoTooltip] has noted that the [ShowCultureName('catalan')] Company has expressed discontent with the [scope_ath_william.GetDynasty.GetName], and while the histories between [arg_ruler.GetShortNameWithNoTooltip] and the company are tense due to the overthrow of [scope_slained_brienne.GetName], with enough maneuvering, its leadership can be convinced to support the [arg_ruler.GetDynasty.GetNameWithNoTooltip] restoration to the [scope_athens.GetFlavorRank]. Should their support be secured, the [scope_sic_country.GetAdjective] [scope_sic_country.GetGovernment.GetCourtTitle] may be willing to allow [scope_athens.GetNameWithNoTooltip] to slip from their grasp without conflict."
 flavor_ath.3.a: "Accept the [scope_athens.GetAdjectiveWithNoTooltip] offer."
 flavor_ath.3.a.entry: "Accept the $ATH_ADJ$ offer."
 flavor_ath.3.b: "Decline the offer; this is too great a risk."
 flavor_ath.3_become_athens: "[ROOT.GetCountry.GetName] will be merged into the [scope_athens.GetLongName], gaining [cores|e] in all [scope_athens.GetAdjectiveWithNoTooltip] [core|e] [locations|e]"
 ath_arg_sicily_may_declare_war: "[scope_athens.GetName] will become independent but [scope_sic_country.GetName] will gain a [ShowCasusBelliName('cb_subject_broke_free')] [casus_belli|e] against [scope_athens.GetNameWithNoTooltip]"

 flavor_ath.4.title: "[arg_ruler.GetNameWithNoTooltip] Accepts!"
 flavor_ath.4.desc: "Following [regent_of_athens.GetShortName]'s secret dispatchment to [arg_country_scope.GetName], [arg_ruler.GetNameWithNoTooltip] has accepted our proposal and will assume rule over the [ROOT.GetCountry.GetLongName]. With news of [scope_ath_william.GetName]'s death spreading, the [sic_country_scope.GetAdjective] [sic_country_scope.GetGovernment.GetCourtTitle] will soon become aware of [regent_of_athens.GetNameWithNoTooltip]'s coup.\n\nWhile the [ShowCultureName('catalan')] Company conquered the [ROOT.GetCountry.GetFlavorRank] from [scope_slained_brienne.GetName] in 1311, they have become increasingly dissatisfied with the [sic_country_scope.GetAdjectiveWithNoTooltip] [sic_country_scope.GetGovernment.GetCourtTitle], and are open to accepting [arg_ruler.GetShortNameWithNoTooltip]'s rule over the [ROOT.GetCountry.GetFlavorRank] should a compromise be reached."
 flavor_ath.4.a: "The [ShowCultureNameWithNoTooltip('catalan')] Company will now need to be negotiated with."

 flavor_ath.5.title: "Appeasement of the [ShowCultureNameWithNoTooltip('catalan')] Company"
 flavor_ath.5.desc: "While the [scope_ath_william.GetDynasty.GetName] have held onto the ducal title of [ROOT.GetCountry.GetName] since 1312, the [ShowCultureName('catalan')] Company has been the driving force in exercising [sic_country_scope.GetAdjectiveWithNoTooltip] authority throughout the [ROOT.GetCountry.GetFlavorRank]. Following the underhanded tactics of [regent_of_athens.GetName], many of the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] of [ROOT.GetCountry.GetNameWithNoTooltip] have come to favor supporting the [scope_ruler.GetDynasty.GetName] claim to [ROOT.GetCountry.GetNameWithNoTooltip].\n\nWhile some within the [ShowCultureNameWithNoTooltip('catalan')] Company have grown discontent with the [sic_country_scope.GetAdjectiveWithNoTooltip] [sic_country_scope.GetGovernment.GetCourtTitle], many have offered to betray their vassal oath to [sic_country_scope.GetNameWithNoTooltip], should members of the Company be properly compensated."
 flavor_ath.5.a: "Allocate a portion of the [ROOT.GetCountry.GetFlavorRank] revenue to the Company."
 flavor_ath.5.a.entry: "Allocate a portion of the realm revenue to the Company."
 flavor_ath.5.b: "Grant additional privileges and land rights to the Company."
 flavor_ath.5.c: "Forcefully exile the Company from the [ROOT.GetCountry.GetFlavorRank]."
 flavor_ath.5.c.entry: "Forcefully exile the Company from the realm."

 flavor_ath.6.title: "[scope_athens.GetNameWithNoTooltip] Overthrows [ShowDynastyNameWithNoTooltip('barcelona_dynasty')] Rule"
 flavor_ath.6.desc: "Horrible news has arrived at the [ROOT.GetCountry.GetGovernment.GetCourtTitle]! [scope_ath_william.GetName] has passed from a sudden illness, and in the power vacuum caused by his death, the [scope_athens.GetAdjective] elite have given the [scope_athens.GetFlavorRank] to [arg_ruler.GetName], who has abandoned [arg_ruler.GetHisHer] obligation to [scope_ruler.GetName] as a vassal."
 flavor_ath.6.a: "[scope_athens.GetNameWithNoTooltip] must be reclaimed!"
 flavor_ath.6.a.entry: "$ATH$ must be reclaimed!"

 flavor_ath.7.title: "[arg_ruler.GetNameWithNoTooltip] Declines!"
 flavor_ath.7.entry: "Duke of Argos declines"
 flavor_ath.7.desc: "Our secret dispatchment to [arg_country.GetName] has returned with regrettable news that [arg_ruler.GetName] has refused our proposal to reinstate [arg_ruler.GetHimHer] as the ruler of [ROOT.GetCountry.GetName]. Quick to salvage the situation, [regent_of_athens.GetName] has imprisoned many of the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] involved in the plot, although other members of the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have suggested [regent_of_athens.GetHeShe] be imprisoned along with them before [scope_heir.GetName] arrives in [ROOT.GetCountry.GetNameWithNoTooltip]."
 flavor_ath.7.a: "Spare [regent_of_athens.GetShortNameWithNoTooltip] for now."
 flavor_ath.7.a.entry: "Spare him for now."
 flavor_ath.7.b: "Imprison [regent_of_athens.GetShortNameWithNoTooltip]!"
 flavor_ath.7.b.entry: "Imprison him!"

 flavor_ath.8.title: "Rule of the [ShowCultureNameWithNoTooltip('catalan')] Company"
 flavor_ath.8.entry: "Rule of the Catalan Company"
 flavor_ath.8.desc: "Ever since the conquest of the [ROOT.GetCountry.GetLongName] in 1311 by the [ShowCultureName('catalan')] Company, and subsequent fealty to the [sic_country.GetLongName], the [scope_ruler.GetDynasty.GetName] have ruled the [ROOT.GetCountry.GetLongNameWithNoTooltip]. Although while [scope_ruler.GetName] remains the current [ROOT.GetCountry.GetGovernment.GetRulerTitle], most of the power in [ROOT.GetCountry.GetNameWithNoTooltip] is maintained by the [ShowCultureNameWithNoTooltip('catalan')] Company and their military backing preventing the claimant [arg_ruler.GetName] from reclaiming the [ROOT.GetCountry.GetFlavorRank].\n\nAlthough the [ShowCultureNameWithNoTooltip('catalan')] Company have remained loyal to the [sic_country.GetAdjectiveWithNoTooltip] [sic_country.GetGovernment.GetCourtTitle], some local [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] suspect members of the Company are increasingly growing discontent with the ruling [scope_ruler.GetDynasty.GetNameWithNoTooltip]."
 flavor_ath.8.a: "Continue trusting the [ShowCultureNameWithNoTooltip('catalan')] Company to safeguard [ROOT.GetCountry.GetNameWithNoTooltip]."
 flavor_ath.8.a.entry: "Continue trusting the [ShowCultureNameWithNoTooltip('catalan')] Company to safeguard us."
 flavor_ath.8.b: "Remain wary of the rumors of [ShowCultureNameWithNoTooltip('catalan')] disloyalty."

 flavor_ath.9.title: "[byz_country.GetAdjectiveWithNoTooltip] Internal Strife"
 flavor_ath.9.entry: "Byzantium Internal Strife"
 flavor_ath.9.desc: "News has reached the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] that [byz_country.GetName] has lost a great deal of control over its border regions with [ROOT.GetCountry.GetNameWithNoTooltip], resulting in them posting smaller garrisons. With the [byz_country.GetAdjectiveWithNoTooltip] [byz_country.GetGovernment.GetCourtTitle] also in disarray due to dynastic squabbles, as well as their attention being divided among the [ShowCultureName('turkish_culture')] Beyliks in [ShowRegionName('anatolia_region')], some members of the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle] feel now is the time to strike the [byz_country.GetLongNameWithNoTooltip], and expand our gains in [ShowProvinceDefinitionName('thessaly_province')].\n\nAlternatively, some within the [ShowCultureNameWithNoTooltip('catalan')] Company have offered to launch raids into [byz_country.GetAdjectiveWithNoTooltip] [ShowAreaName('northern_greece_area')] in order to fill the [ROOT.GetCountry.GetFlavorRank]'s coffers."
 flavor_ath.9.a: "Now is the time to strike further into [ShowProvinceDefinitionNameWithNoTooltip('thessaly_province')]!"
 flavor_ath.9.b: "Dispatch the [ShowCultureNameWithNoTooltip('catalan')] Company to raid [ShowAreaNameWithNoTooltip('northern_greece_area')]."
 flavor_ath.9.c: "We shall bide our time for now."

 flavor_ath.10.title: "The [ShowCultureNameWithNoTooltip('greek_culture')] Populace of [ROOT.GetCountry.GetNameWithNoTooltip]"
 flavor_ath.10.entry: "Rule in Greece"
 flavor_ath.10.desc: "Ever since the days of [GetCountry('LAT').GetAdjective] rule over [ShowScriptedGeographyName('greece_geography')], much of the [ShowCultureName('greek_culture')] elite have seen their titles revoked and bestowed to members of the [GetCountry('LAT').GetAdjectiveWithNoTooltip] Crusader elite. While the Empire's fall in 1261 saw the fracturing of Crusader dominance over [ShowScriptedGeographyNameWithNoTooltip('greece_geography')], many of its legacies are still felt throughout the [ROOT.GetCountry.GetLongName].\n\nSeeking further land rights, many in the [ROOT.GetCountry.GetCulture.GetName] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] have petitioned the [ROOT.GetCountry.GetGovernment.GetCourtTitle] in hopes to acquire more [ShowCultureNameWithNoTooltip('greek_culture')] lands throughout [ROOT.GetCountry.GetNameWithNoTooltip]. However, some feel this would be an opportunity to win some favor with [ShowCultureNameWithNoTooltip('greek_culture')] populace."
 flavor_ath.10.a: "Support the expansion of [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] land rights."
 flavor_ath.10.a.entry: "Support the expansion of $nobles_estate$ land rights."
 flavor_ath.10.b: "Placate the [ShowCultureNameWithNoTooltip('greek_culture')] populace."
 flavor_ath.10.c: "Divert some of the land rights to the [ShowCultureNameWithNoTooltip('catalan')] Company."
 flavor_ath.10.d: "Maintain the current status quo."
 ath_greek_pops_lose_mild_satisfaction: "All of our [ShowCultureName('greek_culture')] [pops|e] will lose [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [pop_satisfaction|e]"
 ath_greek_pops_gain_severe_satisfaction: "All of our [ShowCultureName('greek_culture')] [pops|e] will gain [ShowNamedValue('estate_satisfaction_severe_bonus')|+=2%] [pop_satisfaction|e]"
 ath_greek_pops_lose_severe_satisfaction: "All of our [ShowCultureName('greek_culture')] [pops|e] will lose [ShowNamedValue('estate_satisfaction_severe_penalty')|+=2%] [pop_satisfaction|e]"

 flavor_ath.11.title: "[ShowCultureNameWithNoTooltip('catalan')] Company Versus [ShowCultureNameWithNoTooltip('greek_culture')] Populace of [target_conflict_location.GetNameWithNoTooltip]"
 flavor_ath.11.entry: "Conflict between the Catalan Company and the Greek Populace"
 flavor_ath.11.desc: "Having enjoyed privileges granted to them by the [ROOT.GetCountry.GetGovernment.GetCourtTitle] of [ROOT.GetCountry.GetName], the [ShowCultureName('catalan')] Company has caused a major uproar with the [ShowCultureName('greek_culture')] populace of [target_conflict_location.GetName], who accuse them of illegal land seizure. While some in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have been aware of the [ShowCultureNameWithNoTooltip('catalan')] interests in [target_conflict_location.GetNameWithNoTooltip] for some time now, others fear that this incident could spread to nearby provinces and spark a major [ShowCultureNameWithNoTooltip('greek_culture')] uprising, and have requested [scope_ruler.GetName]'s intervention in the matter."
 flavor_ath.11.a: "Support the land seizure."
 flavor_ath.11.b: "Reprimand the [ShowCultureNameWithNoTooltip('catalan')] Company."
 flavor_ath.11.c: "Use the opportunity to expel the [ShowCultureNameWithNoTooltip('catalan')] Company from [ROOT.GetCountry.GetNameWithNoTooltip]!"
 flavor_ath.11.c.entry: "Use the opportunity to expel the [ShowCultureNameWithNoTooltip('catalan')] Company from us!"

 flavor_ath.12.title: "The Shifting Capitals of [thebes_location.GetNameWithNoTooltip] and [athens_location.GetNameWithNoTooltip]"
 flavor_ath.12.entry: "The Shifting Capitals"
 flavor_ath.12.desc: "While the [athens_location.GetRank.GetName] of [athens_location.GetName] has long been one of the most crucial settlements in the [ROOT.GetCountry.GetFlavorRank], past administrations — from the old [GetCountry('LAT').GetAdjective] successors to the more recent [ShowCultureNameWithNoTooltip('catalan')] Company — established themselves in [thebes_location.GetName] instead, due to its more strategic position. Despite the rise of [thebes_location.GetNameWithNoTooltip], [athens_location.GetNameWithNoTooltip] has remained a prominent [athens_location.GetRank.GetNameWithNoTooltip], with a large portion of the [ROOT.GetCountry.GetFlavorRank] bureaucracy still housed there.\n\nWhile both locations have proven valuable, the [ROOT.GetCountry.GetGovernment.GetCourtTitle] has requested [scope_ruler.GetName] to formalize a consensus on the matter, and formally decide which should be the designated capital of [ROOT.GetCountry.GetName]."
 flavor_ath.12.a: "Maintain the existing structure, with both locations having importance."
 flavor_ath.12.b: "We should return to [athens_location.GetNameWithNoTooltip] and make it the capital once more."
 flavor_ath.12.b.entry: "We should return to [ShowLocationNameWithNoTooltip('athens')] and make it the capital once more."
 flavor_ath.12.c: "Declare [thebes_location.GetNameWithNoTooltip] the formal capital of the [ROOT.GetCountry.GetFlavorRank]."
 flavor_ath.12.c.entry: "Declare [ShowLocationNameWithNoTooltip('thebes')] the formal capital of the realm."

 flavor_ath.13.title: "[scope_epi_ruler.GetNameWithNoTooltip] Seizes Power in [epi_country.GetNameWithNoTooltip]"
 flavor_ath.13.entry: "Secession in Epirus"
 flavor_ath.13.desc: "Coming under the rule of [scope_epi_governor.GetName] in 1337, [epi_country.GetName] had returned to the fold of [byz_country.GetName]. However, supporters of [scope_epi_ruler.GetName] have since launched a successful revolt against the [byz_country.GetAdjectiveWithNoTooltip] governor, overthrowing the administration and restoring [scope_epi_ruler.GetLastNameWithNoTooltip] to the [epi_country.GetFlavorRank]. While [byz_country.GetNameWithNoTooltip] has yet to act, some within the [ROOT.GetCountry.GetLongName] have suggested we take the opportunity to seize [epi_country.GetNameWithNoTooltip] while there is still a power vacuum."
 flavor_ath.13.a: "We shall claim the [epi_country.GetLongNameWithNoTooltip]."
 flavor_ath.13.a.entry: "We shall claim $EPI$."
 flavor_ath.13.b: "We should instead seek to support [scope_epi_ruler.GetNameWithNoTooltip]."
 flavor_ath.13.b.entry: "We should instead seek to support him."
 flavor_ath.13.c: "[epi_country.GetAdjectiveWithNoTooltip] affairs are not our concern."
 flavor_ath.13.c.entry: "$EPI_ADJ$ affairs are not our concern."

 flavor_ath.14.title: "The Titular [GetCountry('LAT').GetAdjectiveWithNoTooltip] Rulers of [scope_ach_country.GetNameWithNoTooltip]"
 flavor_ath.14.entry: "The Titular Emperor in Achaea"
 flavor_ath.14.desc: "Although they have enjoyed the protection of [scope_nap_country.GetName] for some time, the [scope_ach_country.GetLongNameWithNoTooltip] has increasingly been garnering influence amongst many of the [GetCountry('LAT').GetAdjective] states in [ShowScriptedGeographyName('greece_geography')], with [scope_ach_ruler.GetName] leveraging [scope_ach_ruler.GetHisHer] claim as ruler of the [GetCountry('LAT').GetLongNameWithNoTooltip]. While the title lost most of its power with the fall of the [GetCountry('LAT').GetLongNameWithNoTooltip] in 1261, many of the [GetCountry('LAT').GetAdjectiveWithNoTooltip] rulers throughout [ShowScriptedGeographyNameWithNoTooltip('greece_geography')] have continued to offer support towards [scope_ach_ruler.GetShortNameWithNoTooltip].\n\nWith [ROOT.GetCountry.GetName]'s power base growing stronger amongst the remaining [GetCountry('LAT').GetAdjectiveWithNoTooltip] states, some in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] feel it is time we strike against [scope_ach_country.GetNameWithNoTooltip] to put an end to their claims to the [GetCountry('LAT').GetLongNameWithNoTooltip] for good."
 flavor_ath.14.a: "We should invade [scope_ach_country.GetNameWithNoTooltip] and further weaken their claim."
 flavor_ath.14.a.entry: "We should invade $ACH$ and further weaken their claim."
 flavor_ath.14.b: "We should instead seek to curry relations with the [scope_ach_ruler.GetShortNameWithNoTooltip]."
 flavor_ath.14.b.entry: "We should instead seek to curry relations with him."
 flavor_ath.14.c: "The affairs of [scope_ach_ruler.GetShortNameWithNoTooltip] do not concern [ROOT.GetCountry.GetNameWithNoTooltip]."
 flavor_ath.14.c.entry: "The affairs of the ruler do not concern us."
 

 flavor_ath.15.title: "[the_pope.GetNameWithNoTooltip] Seeks [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Support to Restore the [GetCountry('LAT').GetLongNameWithNoTooltip]"
 flavor_ath.15.entry: "Pope Proposes Restoring the Latin empire"
 flavor_ath.15.desc: "A diplomat has arrived at the [ROOT.GetCountry.GetGovernment.GetCourtTitle] of [ROOT.GetCountry.GetName] from the [scope_papal_states.GetLongName] with an ambitious proposal. [the_pope.GetNameWithNoTooltip] has taken notice of the rising power of [ROOT.GetCountry.GetNameWithNoTooltip], along with the decaying influence of [scope_byz.GetName], and now sees us as a contender to which the [GetCountry('LAT').GetLongName] can be restored in [constantinople_location.GetName].\n\nShould we agree to some of their requests and should the [GetCountry('LAT').GetLongNameWithNoTooltip] be restored, [the_pope.GetShortNameWithNoTooltip] will offer the full backing of the [scope_papal_states.GetLongNameWithNoTooltip] and recognize [scope_ruler.GetName] as the legitimate ruler of [constantinople_location.GetNameWithNoTooltip]."
 flavor_ath.15.a: "Accept [the_pope.GetShortNameWithNoTooltip]'s request to restore the [GetCountry('LAT').GetLongNameWithNoTooltip]."
 flavor_ath.15.a.entry: "Accept his request to restore $LAT$."
 flavor_ath.15.b: "We will not be beholden to the ambitions of [the_pope.GetShortNameWithNoTooltip]."
 flavor_ath.15.b.entry: "We will not be beholden to the ambitions of the Pope."

 flavor_ath.16.title: "The Claims of the [GetCountry('THE').GetLongNameWithNoTooltip]"
 flavor_ath.16.entry: "Reclamation of Thessalonican lands"
 flavor_ath.16.desc: "Although a short-lived [GetCountry('THE').GetFlavorRank] and vassal state of the old [GetCountry('LAT').GetLongName], the rulers of [GetCountry('THE').GetName] wielded strong political power within the [GetCountry('LAT').GetLongNameWithNoTooltip] before it was destroyed by [scope_theodoros_doukas.GetName] in 1224.\n\nAlthough ceremonial claims to the title have continued under the [achaea_country.GetLongName], recent conquest of the territory belonging to the old [GetCountry('THE').GetFlavorRank] by [ROOT.GetCountry.GetName] have left some in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] feeling that we should instead claim this title for ourselves to further strengthen our claim as successors to the [GetCountry('LAT').GetLongNameWithNoTooltip]."
 flavor_ath.16.a: "Claim the [GetCountry('THE').GetLongNameWithNoTooltip]!"
 flavor_ath.16.a.entry: "Claim $THE$!"
 flavor_ath.16.b: "Proclaim a new [GetCountry('THE').GetFlavorRank] in its place."
 flavor_ath.16.b.entry: "Proclaim a new realm in its place."
 flavor_ath.16.c: "We should not lay claim to contested titles of the past."
 may_form_thessalonica: "Reduces the number of [locations|e] needed within [ShowScriptedGeographyName('claims_of_thessalonica_geography')] to form the [GetCountry('THE').GetLongNameWithNoTooltip] by #L 30.00%#!"

 flavor_ath.17.title: "Reconquest of [constantinople_location.GetNameWithNoTooltip]"
 flavor_ath.17.entry: "Constantinople Conquered!"
 flavor_ath.17.desc: "The soldiers of [ROOT.GetCountry.GetName] have done the impossible, and have conquered [constantinople_location.GetName]! Having learned from the lessons of the past, [scope_ruler.GetName] has called for a pause on looting in the [constantinople_location.GetRank.GetName], hoping to avoid a repeat of the consequences brought forth by the Fourth Crusade. With much of the old [ShowCultureNameWithNoTooltip('greek_culture')] elite once again routed, [scope_ruler.GetShortNameWithNoTooltip] has laid forth a proposal to the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle] for reestablishing the [GetCountry('LAT').GetLongName], although some feel we should avoid the mistake of the original [GetCountry('LAT').GetFlavorRank] and move to reassert our control over [ShowScriptedGeographyName('greece_geography')] first."
 flavor_ath.17.a: "Proclaim the Restoration of the [GetCountry('LAT').GetLongNameWithNoTooltip]!"
 flavor_ath.17.a.entry: "Proclaim the Restoration of $LAT$!"
 flavor_ath.17.b: "Aim to stabilize our position in [ShowScriptedGeographyNameWithNoTooltip('greece_geography')] first."
 flavor_ath.17.c: "Let us instead continue to rule as the [ROOT.GetCountry.GetLongNameWithNoTooltip]."
 flavor_ath.17.c.entry: "Let us instead continue to rule as ourselves."
 latin_empire_reformation_conditions_unchanged_tt: "Reduces the number of [locations|e] needed within [ShowScriptedGeographyName('frankokratia_geography')] to form the [GetCountry('LAT').GetLongNameWithNoTooltip] to #L 33.00%#!"
