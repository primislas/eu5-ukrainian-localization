l_english:
 flavor_byz_ser.1.title: "A Powerful Despot"
 flavor_byz_ser.1.entry: "$flavor_byz_ser.1.title$"
 flavor_byz_ser.1.desc: "Much of the [ROOT.GetCountry.GetAdjective] [ShowProvinceDefinitionName('vardar_province')] is ruled by [target_character.GetName], a powerful magnate of much renown who wields vast influence and is almost independent. Though [target_character.GetSheHe] is currently loyal to the [ROOT.GetCountry.GetFlavorRank], sovereigns of such wealth and authority rarely respect the rule of their overlords for long.\n\nRumors are that [target_character.GetNameWithNoTooltip] is considering renouncing [target_character.GetHerHis] vassalage in favor of titles in the [target_country2.GetLongName], or perhaps even in the [target_country3.GetLongName]."
 flavor_byz_ser.1.a: "Such dissidence is why we need more power in the hands of the [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
 flavor_byz_ser.1.a.entry: "Such dissidence is why we need more power in the hands of the ruler."
 flavor_byz_ser.1.b: "We must secure [target_character.GetHerHis] loyalty."
 flavor_byz_ser.1.b.entry: "We must secure his loyalty."

 flavor_byz_ser.2.title: "$flavor_byz_ser.1.title$"
 flavor_byz_ser.2.entry: "$flavor_byz_ser.2.title$"
 flavor_byz_ser.2.desc: "The region of [ShowProvinceDefinitionName('vardar_province')], once owned by the mighty [ROOT.GetCountry.GetLongName], has long since fallen to barbarians. Now, after many decades, we might have the chance to return it to our fold through an unlikely ally.\n\n[target_character.GetName], a [target_country.GetAdjective] magnate ruling [origin_country.GetName], seems to have [target_character.GetHerHis] priorities in order. While nominally loyal to the [target_country.GetLongNameWithNoTooltip], our spies report that [target_character.GetHerHis] allegiance is fickle and that [target_character.GetSheHe] could be swayed towards us via the use of some underhanded tactics."
 flavor_byz_ser.2.a: "Shower [target_character.GetHerHim] with gold!"
 flavor_byz_ser.2.a.entry: "Shower him with gold!"

 flavor_byz_ser.3.title: "$flavor_byz_ser.1.title$"
 flavor_byz_ser.3.entry: "$flavor_byz_ser.3.title$"
 flavor_byz_ser.3.desc: "[target_character.GetName], having distinguished [target_character.GetHerselfHimself] previously in a bloody [target_country2.GetAdjective] civil war, has come to wield much power and influence in the [ROOT.GetCountry.GetAdjective] [ShowProvinceDefinitionName('vardar_province')]. Despite being a [ShowSubjectTypeName('vassal')] of [target_country.GetName], [target_character.GetHerHis] rule is practically independent due to the [ShowSocietyDirectionName('decentralization')] of [target_country.GetNameWithNoTooltip]. [target_character.GetSheHe] is poised to be the king-maker in the area."
 flavor_byz_ser.3.a: "Power tends to corrupt, and despotic power corrupts despotically."

 SER_threat_of_secession: "If [origin_country.GetName] have less than #Y 50.0%#! [subject_loyalty|e] at the beginning of #W 1341#!, they will change allegiances and become a [ShowSubjectTypeName('vassal')] of [target_country2.GetName]"
 SMC_player: "Because [origin_country.GetName] is a human player, the final decision is entirely dependant on their choice in the respective [event|e]"
 BYZ_threat_of_secession: "If [origin_country.GetName] have less than #Y 50.0%#! [subject_loyalty|e] at the beginning of #W 1341#!, they will change allegiances and become a [ShowSubjectTypeName('vassal')] of [ROOT.GetCountry.GetName]"
 SMC_threat_of_secession: "In #W 1341#!, we will be able to choose to become a [ShowSubjectTypeName('vassal')] of [target_country2.GetName]. Depending on our [subject_loyalty|e], choosing one over the other might cost [stability|e]"

 flavor_byz_ser.4.title: "Time of Reckoning"
 flavor_byz_ser.4.entry: "$flavor_byz_ser.4.title$"
 flavor_byz_ser.4.desc: "Years have passed and the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] has been visited by [target_country2.GetAdjective] envoys many a time. Their goal — push us away from [target_country.GetName] and towards the [target_country2.GetFlavorRank] to our south. We can, however, see through their meddling and we will not be swayed by their lip service that easily. This is ultimately our decision, and no matter which state we side with, this will have effect on the region of [ShowRegionName('balkan_region')] for the decades to come."
 flavor_byz_ser.4.a: "Our loyalty will not be questioned."
 flavor_byz_ser.4.b: "A change is in order."

 flavor_byz_ser.5.title: "Fate of the [origin_country.GetLongNameWithNoTooltip]"
 flavor_byz_ser.5.desc: "Despite all the rumors about [origin_country.GetAdjective] disloyalty, it turns out that the [ShowCultureName('serbian_culture')] bond that flows between the magnates and the [target_country.GetAdjective] state runs deeper than their greed... Even with [target_country2.GetAdjective] meddling, the [origin_country.GetGovernment.GetRulerTitle] of [origin_country.GetNameWithNoTooltip] has remained unswayed — [origin_country.GetNameWithNoTooltip] will remain a part of the [target_country.GetLongNameWithNoTooltip]."
 flavor_byz_ser.5.byz: "Alas, one day we will reconquer it..."
 flavor_byz_ser.5.ser: "As expected."


 flavor_byz_ser.6.title: "$flavor_byz_ser.5.title$"
 flavor_byz_ser.6.desc: "A diplomatic conflict has occured between [target_country.GetName] and the [target_country2.GetLongName], and a truly unusual event has happened! The lords of [origin_country.GetName] have taken the side of [target_country2.GetNameWithNoTooltip], in turn swearing fealty to the foes of their former masters. Rarely do magnates have the gall to betray their suzerains!\n\nThe [origin_country.GetGovernment.GetRulerTitle] of [origin_country.GetNameWithNoTooltip] has decided the fate of [ShowProvinceDefinitionName('vardar_province')] — no more will [origin_country.GetNameWithNoTooltip] bow to [target_country.GetNameWithNoTooltip], for their future lies with [target_country2.GetNameWithNoTooltip]."
 flavor_byz_ser.6.byz: "They have chosen wisely."
 flavor_byz_ser.6.ser: "Heads will roll for this!"

 SMC_remains_vassal_of_serbia: "[origin_country.GetName] remains a [ShowSubjectTypeName('vassal')] of [target_country.GetName]"