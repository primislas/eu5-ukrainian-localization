l_english:
 flavor_bul.1.title: "The [GetCountry('KVN').GetLongNameWithNoTooltip]"
 flavor_bul.1.entry: "Principality of Dobruja"
 flavor_bul.1.desc: "In recent years, the weakening central authority of the [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] has led to a significant increase of the influence of our [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Nowhere is this more apparent than in [ShowProvinceDefinitionName('north_dobruja_province')] and [ShowProvinceDefinitionName('south_dobruja_province')], where [target_character.GetName] rules as almost an independent lord, commanding local fortresses, fleets, and trade. While many believe that we should formally accept them as our vassals and grant them autonomy to prevent secession, others push us to reassert our fleeting authority over the province."
 flavor_bul.1.a: "Recognize their autonomy."
 dobrujan_revolt: "Dobrujan Revolt"
 flavor_bul.1.b: "They are an integral part of the realm."
 flavor_bul.1.b.tt: "All [pops|e] in owned locations with a core of $KVN$ will lose [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [pop_satisfaction|e] and join the rebellion"
 flavor_bul.1.c: "Take up the mantle of [GetCountry('KVN').GetNameWithNoTooltip]."
 flavor_bul.1.c.entry: "Take up the mantle of $KVN$."
 flavor_bul.1.historical_info: "During the 14th century, the Despotate of Karvuna emerged as a result of the gradual collapse of central authority in Bulgaria. While likely initially functioning as a semi-independent vassal, it eventually became de facto independent, as it minted its own coins, conduced diplomacy, and engaged in wars independently of Tarnovo."
 
 flavor_bul.2.title: "Troubled Succession"
 flavor_bul.2.entry: "$flavor_bul.2.title$"
 flavor_bul.2.desc: "As [target_ruler.GetName] grows older, [target_ruler.GetHisHer] thoughts turn increasingly to the fate of [ROOT.GetCountry.GetName] after [target_ruler.GetHisHer] death. The [ROOT.GetCountry.GetGovernment.GetRulerTitle] has expressed grave concern that once [target_ruler.GetSheHe] is gone, rivalry between [target_ruler.GetHisHer] sons may plunge the [ROOT.GetCountry.GetFlavorRank] into civil war. To prevent this, it has been suggested that that the northwestern lands around [ShowLocationName('vidin')] be entrusted to [targer_brother.GetName], while [target_heir.GetName] is confirmed as [ROOT.GetCountry.GetGovernment.GetHeirTitle] to the throne in [ROOT.GetCountry.GetCapital.GetName]."
 flavor_bul.2.a: "Let each son rule in peace."
 flavor_bul.2.b: "There shall be only one throne."
 flavor_bul.2.c: "We shall rule from [ShowLocationNameWithNoTooltip('vidin')]."
 flavor_bul.2.historical_info: "The fragmentation of Bulgaria during the reign of Ivan Alexander was primarily caused by the unexpected death of his son, co-emperor, and successor Michael Asen IV, who perished in a battle against the Ottomans. Likely fearing a civil war after his death, Ivan Alexander decided to grant the title of Tsar and the rule over Vidin to his son Ivan Sratsimir, while his other son Ivan Shishman inerited the throne in Tarnovo."
 
 flavor_bul.3.title: "The Second Golden Age of [ROOT.GetCountry.GetNameWithNoTooltip]"
 flavor_bul.3.entry: "$flavor_bul.3.title$"
 flavor_bul.3.desc: "[target_ruler.GetName] has come forth with an ambition to restore the glorious days of Simeon the Great's reign, a time when [ROOT.GetCountry.GetName] was a center of learning and culture. [target_ruler.GetSheHe|U] wishes to commission the revival of our spiritual and artistic legacies, fund the restoration of monasteries, and grant significant funds to monastic communities. Many fear that the cost of this ambition would be immense, but the [ROOT.GetCountry.GetGovernment.GetRulerTitle] believes that this will greatly benefit the [ROOT.GetCountry.GetFlavorRank] in the long term."
 flavor_bul.3.a: "Approve the idea."
 flavor_bul.3.b: "This would drain our treasury."
 flavor_bul.3.historical_info: "Unlike the later years of Ivan Alexander's reign which were marked by fragmentation and decline, his early reign saw a monumental revival of Bulgarian culture, sometimes even referred to as the 'Second Golden Age of Bulgaria'. Ivan Alexander supported construction and restoration of monasteries, took interest in religious matters, and sought to strengthen the Bulgarian Orthodox Church. Bulgaria also experienced an increase in literary activity which led to the production of numerous manuscripts and chronicles."
 
 flavor_bul.4.title: "The Gospels of Tsar Ivan Alexander"
 flavor_bul.4.entry: "$flavor_bul.4.title$"
 flavor_bul.4.desc: "The decison of our [ROOT.GetCountry.GetGovernment.GetRulerTitle] to support the cultural revival of [ROOT.GetCountry.GetName] is already bearing fruit. An illuminated Gospel book, dedicated to [bul_ivan.GetName], was created in [ShowLocationName('tarnovo')] by a monk called [target_artist.GetShortName] under direct [ROOT.GetCountry.GetGovernment.GetAdjective] commission. It is a clear proof that despite everything, we are still able to produce art worthy of comparison with [ShowLocationName('constantinople')] itself."
 flavor_bul.4.a: "Magnificent!" 
 flavor_bul.4.historical_info: "'The Gospels of Tsar Ivan Alexander' is likely the most important surviving work from the Second Bulgarian Empire, and is one of the finest works produced during the so-called 'Second Golden Age'. The manuscript contains the full text of the Gospels, accompanied by 366 richly detailed miniatures."
 
 flavor_bul.5.title: "The [ROOT.GetCountry.GetAdjectiveWithNoTooltip]-[GetCountry('TUR').GetAdjectiveWithNoTooltip] Wars"
 flavor_bul.5.entry: "Bulgarian-Ottoman Wars"
 flavor_bul.5.desc_common: "Our forces have clashed with the [GetCountry('TUR').GetAdjective] army at [target_location.GetName] for the first time in history."
 flavor_bul.5.desc_victory: "$flavor_bul.5.desc_common$ Though the battle ended in our favor, few among our commanders believe this victory marks the end of the struggle. They are a formidable foe, emboldened by their military triumphs elsewhere. If anything, today's battle may prove to be only the first of many."
 flavor_bul.5.desc_defeat: "$flavor_bul.5.desc_common$ The grim outcome of this battle has proved that we face a disciplined and determined foe. If we are to preserve our [ROOT.GetCountry.GetFlavorRank], we must prepare for a long and bitter struggle against an adversary whose ambitions reach ever further."
 flavor_bul.5.a: "Steel ourselves for the storm ahead."
 flavor_bul.5.b: "The initiative must be ours."
 flavor_bul.5.historical_info: "The Bulgarian–Ottoman Wars marked a turning point in the history of Bulgaria. As the Ottomans expanded into the Balkans during the fourteenth century, Bulgaria, already internally weakened and fragmented, found itself on the front line of a rising great power. Though Bulgarian forces were at times able to resist the Ottoman advance and fought several indecisive battles, they eventually fell to the superior Ottoman armies. The fall of Vidin in 1396 brought the last remnants of Bulgarian independence to an end and marked the beginning of nearly half a millenium of Ottoman rule over Bulgarian lands."
 
 flavor_bul.6.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Divorce"
 flavor_bul.6.entry: "$flavor_bul.6.title$"
 flavor_bul.6.desc: "The [ROOT.GetCountry.GetGovernment.GetCourtTitle] has been shaken by the recent proclamation of [target_ruler.GetName], who has announced that he wishes to divorce his wife [target_oldwife.GetName], and instead marry a lowborn [ShowCultureGroupName('jewish_group')] convert named [target_newwife.GetShortName]. Many fear that this decision would only further destabilize the [ROOT.GetCountry.GetFlavorRank], and may eventually complicate the matter of succession by sowing discord among the princes of the [ROOT.GetCountry.GetFlavorRank]. Despite that, few dare challenge the will of the [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
 flavor_bul.6.a: "Let us proceed with the marriage."
 flavor_bul.6.b: "The interests of the [ROOT.GetCountry.GetFlavorRank] come first."
 flavor_bul.6.b.entry: "The interests of the realm come first."
 flavor_bul.6.historical_info: "The marriage between Ivan Alexander and his new wife Theodora produced six children, among them Ivan Shishman, who suceeded his father as ruler in Tarnovo. Theodora is believed to have strongly advocated for her son to inherit the principal throne, which disinherited Ivan Sratsimir, who was the eldest child and the last surviving son of Ivan's former wife, Theodora of Wallachia. This marriage played a major role in the partition of Bulgaria between Tarnovo and Vidin."
 
 flavor_bul.1000.title: "The Dawn of a New Empire"
 flavor_bul.1000.entry: "$flavor_bul.1000.title$"
 flavor_bul.1000.desc: "At long last, the walls of [ShowLocationName('constantinople')] have fallen before the might of [ROOT.GetCountry.GetName]. The once-mighty city shall now usher in a new era, nothing like the past centuries which had brought only decline, humiliation, and weakness upon the [ShowReligionAdjective('orthodox')] world. The Phoenix has been reduced to ashes, and from this day onward, [target_ruler.GetName] shall be remembered as the $STATIC_MODIFIER_NAME_bul_conqueror_of_constantinople$."
 flavor_bul.1000.a: "Proclaim the birth of a new empire!"
 flavor_bul.1000.a.tt: "All neighbouring [countries|e] that do not have an [alliance|e] with us or are not our [subject|e] countries, as well as each of our [rivals|e], will gain [ShowBiasValue('opinion_bul_proclaimed_an_empire')|+=] [opinion|e] of us."
 flavor_bul.1000.b: "Our victory needs no grand titles."
 
 flavor_bul.1001.title: "The City of Emperors"
 flavor_bul.1001.desc: "Our rise to imperial stature has transformed [ROOT.GetCountry.GetName]'s place in the world. With this newfound prestige, many among the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have begun to question whether [ROOT.GetCountry.GetCapital.GetName] truly reflects the glory and authority of the [ROOT.GetCountry.GetLongNameWithNoTooltip]. They suggest the transfer of capital to [ShowLocationName('constantinople')], which has for centuries stood as the political and spiritual heart of the [ShowReligionAdjective('orthodox')] world."
 flavor_bul.1001.a: "We need a capital worthy of an empire!"
 flavor_bul.1001.b: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] serves us well."
 flavor_bul.1001.b.entry: "The capital serves us well."
 flavor_bul.1001.historical_info: "Historically, many powers coveted Constantinople, and Bulgaria was no exception. Over the centuries, several Bulgarian rulers attempted to bring the great city under their control, yet none succeeded. The most notable effort came during the reign of Simeon the Great. Though the city itself remained unconquered, the war nevertheless ended in a profound Byzantine humiliation. The empire was compelled to recognize Simeon’s imperial title, acknowledging him as Tsar and effectively elevating Bulgaria to the rank of a great power in the Balkans."
