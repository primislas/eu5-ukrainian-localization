l_english:

 flavor_tri.1.title: "#italic Codex Balduini Trevirensis#!"
 flavor_tri.1.desc: "We have been gifted a beautiful chronicle depicting a fateful moment in our dynastic history! Detailing the Italian campaign of [GetCharacter('lux_henry_vii_luxembourg').GetName], the first Emperor of our dynasty, it highlights the lofty position of our family and their rightful claim to the Imperial throne. While the artist wishes to remain unknown, their portrayals of the coronations of [GetCharacter('lux_henry_vii_luxembourg').GetNameWithNoTooltip] and the College of Electors solidify our position within the [GetInternationalOrganization('hre').GetName]."
 flavor_tri.1.a: "It will decorate our [ROOT.GetCountry.GetGovernment.GetCourtTitle] in [target_location.GetNameWithNoTooltip]."
 flavor_tri.1.b: "Gift it to the [GetInternationalOrganization('hre').GetLeaderTitle]."