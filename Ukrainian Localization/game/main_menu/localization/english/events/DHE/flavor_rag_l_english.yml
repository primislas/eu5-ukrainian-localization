l_english:
 flavor_rag.1000.title: "Enemy at the Gates"
 flavor_rag.1000.entry: "$flavor_rag.1000.title$"
 flavor_rag.1000.desc: "Grim news has arrived at our [ROOT.GetCountry.GetGovernment.GetCourtTitle]: The mighty [GetCountry('TUR').GetAdjective] armies have finally reached our borders. It is painfully clear that our [ROOT.GetCountry.GetFlavorRank] could never hope to resist them by force of arms, and so some of our patricians have come forth with a bold proposal. They argue that the interests of [GetCountry('TUR').GetNameWithNoTooltip] and [ROOT.GetCountry.GetName] do not fundamentally clash, and that offering them recognition of their supremacy and an annual tribute in exchange for protection and freedom could be a way for us to survive."
 flavor_rag.1000.a: "Send an envoy to negotiate with the [GetCountry('TUR').GetGovernment.GetRulerTitle]."
 flavor_rag.1000.a.entry: "Send an envoy to negotiate with him."
 flavor_rag.1000.b: "We will defend our independence at all costs!"
 flavor_rag.1000.historical_info: "In 1458, the Republic of Ragusa formally entered a tributary relationship with the Ottomans. Although the agreement forced Ragusa to pay an annual tribute of roughly 12,500 gold ducats, it retained remarkable autonomy and was able keep its merchant fleet and conduct foreign diplomacy. The mutually beneficial relationship endured for centuries, with Ragusa remaining an Ottoman tributary until the Republic was abolished in 1808 during the Napoleonic Wars."
 
 flavor_rag.1001.title: "An Offer from [GetCountry('RAG').GetNameWithNoTooltip]"
 flavor_rag.1001.desc: "An envoy from [GetCountry('RAG').GetName] has arrived at the [ROOT.GetCountry.GetGovernment.GetCourtTitle] with a humble proposal to present to the [ROOT.GetCountry.GetGovernment.GetRulerTitle]. The [GetCountry('RAG').GetAdjectiveWithNoTooltip] envoy admits that their [GetCountry('RAG').GetFlavorRank] cannot hope to resist our might, and instead seeks a pragmatic arrangement. They offer to recognize our supremacy and deliver an annual tribute in exchange for our protection and the freedom to conduct trade. While some believe this to be a fair agreement which would benefit our sphere of influence, others argue that such a weak state should be conquered outright."
 flavor_rag.1001.a: "Accept their tribute."
 flavor_rag.1001.b: "Why bargain when we can conquer?"