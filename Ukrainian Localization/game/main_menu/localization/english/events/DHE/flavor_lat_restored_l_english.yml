l_english:
 flavor_lat.1.title: "Building a New [latin_country.GetAdjectiveWithNoTooltip] Bureaucracy"
 flavor_lat.1.entry: "The New Latin Bureaucracy"
 flavor_lat.1.desc: "With our rule over [constantinople_location.GetName] now restored, many of the [latin_country.GetAdjective] elite are now laying the foundations for a new bureaucracy to replace the decayed [GetCountry('BYZ').GetAdjectiveWithNoTooltip] system. One shortfall of the original [ROOT.GetCountry.GetLongNameWithNoTooltip] was that regional pressures of the time prevented the [ROOT.GetCountry.GetFlavorRank] from forming a cohesive ruling structure.\n\nUnder the leadership of [scope_ruler.GetName], the [ROOT.GetCountry.GetFlavorRank] could take a different path, and form a cohesive [ROOT.GetCountry.GetCulture.GetName] bureaucracy."
 flavor_lat.1.a: "Form a new distinct [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] bureaucracy."
 flavor_lat.1.a.entry: "Form a new distinct bureaucracy."
 flavor_lat.1.b: "Model the new bureaucracy around the old Crusader states."
 flavor_lat.1.c: "Adopt aspects of the [GetCountry('BYZ').GetAdjectiveWithNoTooltip] bureaucracy."
 flavor_lat.1.c.entry: "Adopt aspects of the $BYZ_ADJ$ bureaucracy."
 flavor_lat.1.d: "Implement a [ShowCultureNameWithNoTooltip('catalan')]-inspired bureaucracy."
 flavor_lat.1.e: "Implement a [ShowCultureNameWithNoTooltip('neapolitan')]-inspired bureaucracy."

 flavor_lat.2.title: "The Rising [ShowCultureNameWithNoTooltip('turkish_culture')] Threat in [ShowRegionNameWithNoTooltip('anatolia_region')]"
 flavor_lat.2.entry: "The Rising Turkish Threat in Anatolia"
 flavor_lat.2.desc: "Even before our retaking of [constantinople_location.GetName], the [GetCountry('BYZ').GetAdjectiveWithNoTooltip] holdings within [ShowRegionName('anatolia_region')] faced major threats from the [ShowCultureName('turkish_culture')] people there. Among these [ShowCultureNameWithNoTooltip('turkish_culture')] warlords, [rising_turkish_country_ruler.GetName] have proven to be one of the strongest at consolidating lands within [ShowRegionNameWithNoTooltip('anatolia_region')], and many in the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] fear that they may seek to exploit our retaking of [constantinople_location.GetNameWithNoTooltip] to launch their own invasion into [ShowScriptedGeographyName('greece_geography')]. Others in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] have instead suggested to [scope_ruler.GetName] that we press our advantage, and launch an invasion into [ShowRegionNameWithNoTooltip('anatolia_region')] to weaken the [ShowCultureNameWithNoTooltip('turkish_culture')] [rising_turkish_country.GetFlavorRank]."
 flavor_lat.2.a: "We shall drive back the [rising_turkish_country.GetFlavorRank]!"
 flavor_lat.2.a.entry: "We shall drive back the realm!"
 flavor_lat.2.b: "We should remain cautious, and take a more defensive approach."


 flavor_lat.3.title: "The Greater Claims of [ROOT.GetCountry.GetLongNameWithNoTooltip]"
 flavor_lat.3.entry: "$flavor_lat.3.title$"
 flavor_lat.3.desc: "After the fall of [constantinople_location.GetName] in 1204, the old [ROOT.GetCountry.GetAdjective] elite moved quickly to consolidate control over [GetCountry('BYZ').GetAdjective] holdings throughout [ShowScriptedGeographyName('greece_geography')], as well as to claim overlordship of the [ShowRegionNameWithNoTooltip('balkan_region')]. However, at the time, [serbia_country.GetName] and [bul_country.GetName] proved to be major rivals to [ROOT.GetCountry.GetNameWithNoTooltip], with [bul_country.GetNameWithNoTooltip] ultimately playing a major role in the collapse of the original [ROOT.GetCountry.GetFlavorRank] with their constant military campaigns into [ROOT.GetCountry.GetNameWithNoTooltip] lands.\n\nNow with the [ROOT.GetCountry.GetLongNameWithNoTooltip] restored under [scope_ruler.GetName], we may be able to claim dominion of these lands, and accomplish what the old [ROOT.GetCountry.GetFlavorRank] could not."
 flavor_lat.3.a: "We shall press to expand the [ROOT.GetCountry.GetFlavorRank] into these old rivals."
 flavor_lat.3.a.entry: "We shall press to expand the realm into these old rivals."
 flavor_lat.3.b: "Let us avoid repeating the mistakes of the past."

 flavor_lat.4.title: "Restoration of the Holy Patriarchate of [constantinople_location.GetName]"
 flavor_lat.4.entry: "Restoration of the Holy Patriarchate of Constantinople"
 flavor_lat.4.desc: "While the initial sack of [constantinople_location.GetName] in 1204 saw opposition from the [pap_country.GetGovernment.GetRulerTitle], the opportunity of [constantinople_location.GetNameWithNoTooltip] being seized by [ShowReligionAdjective('catholic')] crusaders allowed for the opportunity for the Patriarchate to be restored, elevating [pap_country.GetAdjective] authority. However, the retaking of [constantinople_location.GetNameWithNoTooltip] in 1261 by [scope_michael_palaiologos.GetName] saw the title become defunct once again.\n\nNow with [ROOT.GetCountry.GetAdjective] rule once again restored over [constantinople_location.GetNameWithNoTooltip], many within the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] have urged us to restore the Patriarchate."
 flavor_lat.4.a: "Allow the restoration of the Patriarchate."
 flavor_lat.4.b: "Pledge to ensure the protection of the restored Patriarchate!"
 flavor_lat.4.c: "Leverage the restored Patriarchate for influence."
 flavor_lat.4.d: "Refuse to restore the Patriarchate."
 latin_patriarchate_of_constantinople: "Patriarchate of [ShowLocationNameWithNoTooltip('constantinople')]"

 flavor_lat.5.title: "Control of [ShowRegionNameWithNoTooltip('anatolia_region')] Reasserted"
 flavor_lat.5.entry: "Control of Anatolia Reasserted"
 flavor_lat.5.desc: "While initially seen as a daunting task for the restored [ROOT.GetCountry.GetLongName], our soldiers have made great strides in asserting dominance over [ShowRegionName('anatolia_region')]. While there still remain several [ShowCultureName('turkish_culture')] states within [ShowRegionNameWithNoTooltip('anatolia_region')], they should no longer pose a serious threat to [ROOT.GetCountry.GetNameWithNoTooltip]."
 flavor_lat.5.a: "Glory to the [ROOT.GetCountry.GetLongNameWithNoTooltip]!"
 flavor_lat.5.a.entry: "Glory to us!"
 flavor_lat_anatolia_secured: "Every [location|e] in [ShowRegionName('anatolia_region')] owned by [ROOT.GetCountry.GetName] or our [subjects|e] will get the [ShowModifier('lat_improved_location_integration')] [modifier|e] for #Y 15#! years" 

 flavor_lat.6.title: "Campaigns into [target_country.GetNameWithNoTooltip] Successful"
 flavor_lat.6.entry: "Bulgaria Crushed"
 flavor_lat.6.desc: "Once a major threat to the original [ROOT.GetCountry.GetLongName], the [target_country.GetLongName] has been significantly weakened, with many of their former territories now under [ROOT.GetCountry.GetAdjective] control. It is unlikely that the [target_country.GetAdjectiveWithNoTooltip] elite will be able to recover and pose a threat to the [ROOT.GetCountry.GetFlavorRank] again."
 flavor_lat.6.a: "We should move to integrate the former [target_country.GetAdjectiveWithNoTooltip] provinces."
 flavor_lat.6.a.entry: "We should move to integrate their former provinces."
 flavor_lat_balkan_rival_lands_secured: "Every [location|e] in [ShowRegionName('balkan_region')] that is a [core|e] of [target_country.GetName] and is owned by [ROOT.GetCountry.GetName] or our [subjects|e] will get the [ShowModifier('lat_improved_location_integration')] [modifier|e] for #Y 15#! years" 

 flavor_lat.7.title: "[target_country.GetAdjectiveWithNoTooltip] Ambitions Crushed"
 flavor_lat.7.entry: "Serbia Ambitions Defeated"
 flavor_lat.7.desc: "Although they have been a power on the rise for a while, [target_country.GetAdjective] ambitions have been broken by [ROOT.GetCountry.GetAdjective] soldiers, with our campaigns into [target_country.GetNameWithNoTooltip] weakening them. With [target_country.GetAdjectiveWithNoTooltip] status in the [ShowRegionName('balkan_region')] relegated to that of a minor power, their ambitions should no longer concern us."
 flavor_lat.7.a: "Move to quickly stabilize the provinces reconquered from [target_country.GetNameWithNoTooltip]."
 flavor_lat.7.a.entry: "Move to quickly stabilize the provinces reconquered from them."

 flavor_lat.8.title: "The Old [GetCountry('BYZ').GetAdjectiveWithNoTooltip] Elite"
 flavor_lat.8.entry: "Old Byzantine Elite"
 flavor_lat.8.desc: "When [constantinople_location.GetName] was once again recaptured, it not only allowed for the restoration of the [ROOT.GetCountry.GetLongName], but it also brought an end to any hopes of continued resurgence for the old [GetCountry('BYZ').GetLongName], with many of the old [GetCountry('BYZ').GetAdjectiveWithNoTooltip] elite now begrudgingly swearing fealty to [ROOT.GetCountry.GetNameWithNoTooltip].\n\nMany within the [ROOT.GetCountry.GetGovernment.GetCourtTitle] feel the chapter has finally closed on the [GetCountry('BYZ').GetLongNameWithNoTooltip], and that it is time for the [ROOT.GetCountry.GetLongNameWithNoTooltip] to formally take its place on the world stage and form a distinct identity of its own."
 flavor_lat.8.a: "It is time to lay the old [GetCountry('BYZ').GetAdjectiveWithNoTooltip] culture to rest."
 flavor_lat.8.a.entry: "It is time to lay the old $BYZ_ADJ$ culture to rest."
 flavor_lat.8.b: "We should preserve the [GetCountry('BYZ').GetAdjectiveWithNoTooltip] legacy in the new [ROOT.GetCountry.GetFlavorRank]."
 flavor_lat.8.b.entry: "We should preserve the $BYZ_ADJ$ legacy in the new realm."

 flavor_lat.9.title: "[pap_country.GetAdjectiveWithNoTooltip] Request for Conversion of [ShowReligionAdjectiveWithNoTooltip('orthodox')] Lands"
 flavor_lat.9.entry: "Papal Request Conversion of Byzantine Lands"
 flavor_lat.9.desc: "In return for [pap_country.GetAdjective] support in restoring the [ROOT.GetCountry.GetLongName], the [pap_country.GetGovernment.GetRulerTitle] requested that when [constantinople_location.GetName] was finally reclaimed that the new [ROOT.GetCountry.GetAdjectiveWithNoTooltip] elite would enact policies to weaken [ShowReligionAdjective('orthodox')] influence and strengthen the [ShowReligionAdjective('catholic')] faith. Now that [constantinople_location.GetNameWithNoTooltip] is once again ours and the [ROOT.GetCountry.GetLongNameWithNoTooltip] restored, [scope_pope_ruler.GetName] has requested that we honor our agreement and begin enacting these policies."
 flavor_lat.9.a: "Honor our agreement with [scope_pope_ruler.GetShortNameWithNoTooltip]."
 flavor_lat.9.a.entry: "Honor our agreement with him."
 flavor_lat.9.b: "Allow the policies to take effect, but relax enforcing them."
 flavor_lat.9.c: "Break the agreement and favor a policy of tolerance towards the [ShowReligionAdjectiveWithNoTooltip('orthodox')] populace."
 lat_accepted_pope_latin_empire_proposal_tt: "Has accepted the Pope offer to restore the Latin empire"
