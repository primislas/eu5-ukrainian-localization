l_english:
 movements.10.title: "Latinitas"
 movements.10.desc: "In celebration of returning to the great Roman Empire, the loyal [ShowLanguageFamilyName('romance_language_family')]-speaking citizens of [target_location.GetName] have become reinvigorated with the ideas of the [ShowLanguageName('latin_language')] language and ancient [ShowCultureName('roman_culture')] culture.\n\nThese new Romans seek to restore the glory of the Roman Empire. They are proud of their heritage and are eager to spread their culture and influence across the world."
 movements.10.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
 movements.10.b: "We too are [ShowCultureNameWithNoTooltip('roman_culture')]!"
 movements.10.tt: "[ShowMovementDefinitionName('roman_culture_movement')] appears in [target_location.GetName]"

 movements.20.title: "The Emanation of the One"
 movements.20.desc: "A circle of scholars and philosophers of the [ShowMovementDefinitionName('hellenism_religion_movement')] have begun to teach that the highest truth lies not in scripture but in reason: all existence flows from the One, through emanations of divine intellect, down into our material world.\n\nDrawing on Plato, Plotinus, and Proclus, these thinkers are careful to note the parallels with [ShowReligionGroupName('christian')]. The One, they say, is not so different from God: eternal, beyond all predication, the source of all being.\n\nYet the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] grow wary, decrying it as base [ShowReligionAdjective('hellenism_religion')] paganism.\n\nWill we permit this philosophical revival to flourish, or move to extinguish it?"
 movements.20.a: "The search for the One leads to truth."
 movements.20.b: "This philosophy leads souls astray."
 movements.20.tt: "[ShowMovementDefinitionName('hellenism_religion_movement')] spreads in [ROOT.GetCountry.GetCapital.GetName]"
