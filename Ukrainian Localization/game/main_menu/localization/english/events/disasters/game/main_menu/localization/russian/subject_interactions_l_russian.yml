l_russian:
 colonial_nation: "Колониальная нация"
 colonial_nation_desc: "$colonial_nation$ — это [Concept('subject', 'ленник')|e], чьей основной задачей является управление [Concept('overseas', 'заморскими')|e] [Concept('colonies', 'колониями')|e] от имени [Concept('overlord', 'сюзерена')|e]. У колониальных держав повышен #TOOLTIP:MODIFIER_TYPE,global_population_capacity_modifier,X #P #V предел населения#!#!, а также есть возможность привлекать #TOOLTIP:POPTYPE,slaves,X #L рабов#!#! к [Concept('rgo', 'добыче ресурсов')|e]. Колониальные державы улучшают [Concept('merchant_power', 'торговое преимущество')|e] своих [Concept('overlord', 'сюзеренов')|e], а помимо [Concept('gold', 'дукатов')|e] предоставляют также [Concept('manpower', 'рекрутов')|e] и [Concept('sailors', 'моряков')|e]."
 dominion: "Доминион"
 dominion_desc: "$dominion$ — это [Concept('subject', 'ленник')|e] с самоуправлением и относительной автономией. Такой тип ленника доступен только #TOOLTIP:GOVTYPE,monarchy,X #L монархиям#!#! той же [Concept('religion_group', 'религиозной группы')|e], что и их [Concept('overlord', 'сюзерен')|e]. Чтобы создать доминион, обе державы должны состоять в [Concept('union', 'унии')|e] либо державой-сюзереном должны быть $ENG$ или $GBR$. #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V Эффективность в нашем совете#!#! у доминионов выше, чем у простых #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалов#!#!."
 fiefdom: "Феод"
 fiefdom_desc: "$fiefdom$ — младший титул, личное владение [Concept('ruler', 'правителя')|e] державы-[Concept('overlord', 'сюзерена')|e]. Этот тип ленника доступен только #TOOLTIP:GOVTYPE,monarchy,X #L монархиям#!#! той же [Concept('religion_group', 'религиозной группы')|e], что и их сюзерен. #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V Эффективность в нашем совете#!#! у феодов выше, но правит ими непосредственно [Concept('monarch', 'монарх')|e] сюзерена."
 march: "Марка"
 march_desc: "$march$ — держава-[Concept('subject', 'ленник')|e], которая защищает владения своего [Concept('overlord', 'сюзерена')|e] от внешних угроз. У марок лучше #TOOLTIP:MODIFIER_TYPE,discipline,X #P #V дисциплина#!#! и #TOOLTIP:MODIFIER_TYPE,global_defensive,X #P #V оборона крепости#!#!, а затраты на #TOOLTIP:MODIFIER_TYPE,fort_maintenance_cost,X #P #V содержание укреплений#!#! уменьшены. Кроме того, платёжные обязательства перед сюзереном у марок меньше, чем у обычных #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалов#!#!."
 hanseatic_member: "Ганзейский город"
 hanseatic_member_desc: "Ганзейский союз — это конфедерация торговых городов, созданная ради обороны и торговли. Возглавляет её $HSA$. У [Concept('subject', 'ленника')|e] в союзе выше #TOOLTIP:MODIFIER_TYPE,trade_efficiency,X #P #V торговая эффективность#!#! и #TOOLTIP:MODIFIER_TYPE,loyalty_to_overlord,X #P #V лояльность к сюзерену#!#!, а затраты на #TOOLTIP:MODIFIER_TYPE,merchant_maintenance_cost,X #P #V содержание торговли#!#! уменьшены. У [Concept('overlord', 'сюзерена')|e] (им может быть только $HSA$) увеличен #TOOLTIP:MODIFIER_TYPE,global_merchant_capacity_modifier,X #P #V торговый потенциал#!#!. Кроме того, он получает отсюда больше выплат в виде [Concept('manpower', 'рекрутов')|e] и [Concept('sailors', 'моряков')|e], но меньше [Concept('gold', 'дукатов')|e], чем от обычных #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалов#!#!."
 state_bank: "Государственный банк"
 state_bank_desc: "Этот тип [Concept('subject', 'ленника')|e] представляет собой особенную разновидность вассальной зависимости. [Concept('overlord', 'Сюзереном')|e] этой компании может быть только держава, принявшая [Concept('government_reform', 'государственный принцип')|e] #TOOLTIP:GOVERNMENT_REFORM,banking_country,X #L «Династия банкиров»#!#!. У банка лучше #TOOLTIP:MODIFIER_TYPE,diplomatic_reputation,X #P #V дипломатическая репутация#!#!, а сюзерен может брать средства под меньший #TOOLTIP:MODIFIER_TYPE,bank_interest,X #P #V процент#!#!. Кроме того, он может забрать половину казны государственного банка с помощью [Concept('country_interaction', 'взаимодействия с державой')|e] #TOOLTIP:COUNTRY_INTERACTION,siphon_income,X #L «Присвоение доходов»#!#!, получив больше средств, чем обычно."
 secessionists: "Сецессионисты"
 secessionists_desc: "Этот [Concept('subject', 'ленник')|e] схож со своим [Concept('overlord', 'сюзереном')|e] во многих аспектах управления и стремится к политическому объединению с ним, поэтому его сравнительно легко можно [Concept('annexed', 'присоединить')|e]. У сецессионистов повышены #TOOLTIP:MODIFIER_TYPE,loyalty_to_overlord,X #P #V лояльность к сюзерену#!#! и #TOOLTIP:MODIFIER_TYPE,annexation_speed,X #P #V скорость присоединения#!#!."
 trade_company: "Торговая компания"
 trade_company_desc: "$trade_company$ — это инвестиционный конгломерат, который стремится получать прибыль для себя и своего [Concept('overlord', 'сюзерена')|e]. Любая торговая компания всегда #TOOLTIP:GOVTYPE,republic,X #L республика#!#!. У них выше #TOOLTIP:MODIFIER_TYPE,trade_efficiency,X #P #V торговая эффективность#!#!, а платёжные обязательства этого ленника перед сюзереном больше, чем у обычных #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалов#!#!."
 vassal: "Вассал"
 vassal_desc: "Это самая распространённая разновидность [Concept('subject', 'ленника')|e]. $vassal$ контролирует земли, платит дань и участвует в военных походах своего [Concept('overlord', 'сюзерена')|e]. За счёт этого у вассала эффективнее действует модификатор #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V «Эффективность в нашем совете»#!#!, а у сюзерена — #TOOLTIP:MODIFIER_TYPE,monthly_prestige,X #P #V «Престиж за месяц»#!#!. Кроме того, у обеих стран быстрее распространяются [Concept('institutions', 'институты')|e]."
 conquistador: "Конкистадор"
 conquistador_desc: "Конкистадор — это предводитель частной армии, подписавший с [Concept('rulers', 'правителем')|e] контракт об исследовании и завоевании определённых территорий. За это он получает титул губернатора, а также долю в новых землях и трофеях. Этот уникальный [Concept('subject_types', 'тип ленника')|e] может появляться только с помощью [Concept('action', 'действия')|e] #TOOLTIP:GENERIC_ACTION,create_conquistador,X #L Отправка конкистадора#!#!. Это всегда [Concept('army_based', 'стратократическая держава')|e], которая получает повышенные модификаторы #TOOLTIP:MODIFIER_TYPE,military_tactics,X #P #V «Военная тактика»#!#!, #TOOLTIP:MODIFIER_TYPE,global_max_control,X #P #V «Максимальный контроль»#!#! и #TOOLTIP:MODIFIER_TYPE,wrong_culture_levy_size,X #P #V «Размер ополчения чужой культуры»#!#!."
 appanage: "Апанаж"
 appanage_desc: "Апанаж — это [Concept('subject', 'ленник')|e], которым управляет младшая ветвь правящей династии. У него повышается #TOOLTIP:MODIFIER_TYPE,monthly_prestige,X #P #V престиж за месяц#!#!, #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V эффективность в нашем совете#!#! и #TOOLTIP:MODIFIER_TYPE,global_max_control,X #P #V максимальный контроль#!#!, а также увеличивается #TOOLTIP:MODIFIER_TYPE,global_manpower_modifier,X #P #V число рекрутов#!#!. У [Concept('overlord', 'сюзерена')|e] повышается #TOOLTIP:MODIFIER_TYPE,monthly_legitimacy,X #P #V легитимность за месяц#!#!, но при этом сильнее #TOOLTIP:MODIFIER_TYPE,stability_decay,X #P #V снижается стабильность#!#! и ослабевает #TOOLTIP:MODIFIER_TYPE,global_crown_estate_power,X #P #V сила короны#!#!."
 samanta: "Саманта"
 samanta_desc: "$samanta$ — тип [Concept('subject', 'ленника')|e], доступный только державам с [Concept('advance', 'улучшением')|e] #TOOLTIP:ADVANCE_DEFINITION,samanta_advance,X #L «Саманта»#!#!, специфичным для #TOOLTIP:CULTUREGROUP,indian_group,X #L индийской культуры#!#!. Саманты во многом схожи с обычными #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалами#!#!, однако платёжные обязательства такого ленника меньше, а также его нельзя [Concept('annexed', 'присоединить')|e], пока связи саманты с [Concept('overlord', 'сюзереном')|e] не станут более тесными — в этом случае он получит название #TOOLTIP:SUBJECT_TYPE,maha_samanta,X #L «Махасаманта»#!#!. Для этого необходимо воспользоваться [Concept('country_interaction', 'взаимодействием с державой')|e] #TOOLTIP:COUNTRY_INTERACTION,upgrade_to_maha_samanta,X #L «Повышение до махасаманты»#!#!."
 maha_samanta: "Махасаманта"
 maha_samanta_desc: "Получив статус махасаманты, [ShowSubjectTypeName('samanta')|l] начинает платить увеличенную дань, а [Concept('overlord', 'сюзерен')|e] получает возможность [Concept('annexed', 'присоединить')|e] эту державу к своим владениям быстрее, чем если бы она была обычным #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалом#!#!. С другой стороны, если махасаманта пользуется доверием [Concept('overlord', 'сюзерена')|e], тот может воспользоваться [Concept('country_interaction', 'взаимодействием с державой')|e] #TOOLTIP:COUNTRY_INTERACTION,upgrade_to_pradhana_maha_samanta,X #L «Повышение до прадхана-махасаманты»#!#! и дать ей #TOOLTIP:SUBJECT_TYPE,pradhana_maha_samanta,X #L соответствующий#!#! статус, предполагающий повышенную степень автономии."
 pradhana_maha_samanta: "Прадхана-махасаманта"
 pradhana_maha_samanta_desc: "Это высшая форма #TOOLTIP:SUBJECT_TYPE,maha_samanta,X #L махасаманты#!#! и вернейший из [Concept('subjects', 'ленников')|e]. $pradhana_maha_samanta$ не подлежит [Concept('annexed', 'присоединению')|e]; кроме того, у него улучшаются #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V эффективность в совете#!#!, #TOOLTIP:MODIFIER_TYPE,discipline,X #P #V дисциплина#!#! и #TOOLTIP:MODIFIER_TYPE,global_defensive,X #P #V оборона крепости#!#!, а #TOOLTIP:MODIFIER_TYPE,fort_maintenance_cost,X #P #V содержание укреплений#!#! обходится дешевле. Прадхана-махасаманта отдаёт своему [Concept('overlord', 'сюзерену')|e] больше [Concept('gold', 'дукатов')|e], [Concept('manpower', 'рекрутов')|e] и [Concept('sailors', 'моряков')|e]."
 tusi: "Тусы"
 tusi_desc: "Это особый тип администрации в #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Срединном государстве#!#! — наследные губернаторы племенных земель, управляющие ими от имени императорского трона. Тусы нельзя присоединить, зато там быстрее происходит #TOOLTIP:MODIFIER_TYPE,monthly_towards_sinicized,X #P #V движение к китаизации за месяц#!#!. Также они вынуждены пользоваться [Concept('court_language', 'придворным языком')|e] своего [Concept('overlord', 'сюзерена')|e] и тратят меньше [Concept('diplomatic_capacity', 'дипломатического потенциала')|e]."
 uc_bey: "Удж-бей"
 uc_bey_desc: "$uc_bey$ — пограничная [Concept('army_based', 'стратократическая держава')|e] — это правитель, подчиняющийся могучему тюркскому владыке. Таким полуавтономным правителям поручено защищать границы, устраивать налёты и расширять территории. Под их началом находятся верные гази, которыми движут религиозное рвение, жажда наживы и земель. Они играют важную роль в обеспечении стабильности приграничья и экспансии. Создать удж-бей можно только с помощью #TOOLTIP:GENERIC_ACTION,create_uc_bey,X #L соответствующего#!#! [Concept('action', 'действия')|e]. Им всегда доступны [Concept('reform', 'принцип')|e] #TOOLTIP:GOVERNMENT_REFORM,uc_bey_reform,X #L «Правительство удж-бея»#!#! и #TOOLTIP:MODIFIER_TYPE,always_allow_army_levies,X #P #V ополчение#!#!, а платёжные обязательства гораздо меньше, чем у обычных #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалов#!#!. При этом удж-беи тратят больше [Concept('diplomatic_capacity', 'дипломатического потенциала')|e] и усиливают у сюзерена #TOOLTIP:MODIFIER_TYPE,monthly_towards_decentralization,X #P #V смещение к децентрализации за месяц#!#!."
 imperial_free_city: "Вольный имперский город"
 imperial_free_city_desc: "$imperial_free_city$ — особый тип ленника, подчиняющийся [Concept('hre_emperor', 'императору')|e]. Этот статус сохраняется, пока ленник является #TOOLTIP:SPECIAL_STATUS,free_city,X #L вольным имперским городом#!#! и #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священная Римская Империя#!#! признаёт его в своём составе. Подобных ленников нельзя присоединять, они не предоставляют своему [Concept('overlord', 'сюзерену')|e] никаких преимуществ и не могут участвовать в его войнах, но при этом не тратят [Concept('diplomatic_capacity', 'дипломатический потенциал')|e]. Их можно превращать в #TOOLTIP:POLICY,direct_imperial_cities_policy,X #L имперские города прямого подчинения#!#! с помощью #TOOLTIP:POLICY,direct_imperial_cities_policy,X #L соответствующей#!#! [Concept('policy', 'политики')|e]."
 direct_imperial_free_city: "Вольный имперский город прямого подчинения"
 direct_imperial_free_city_desc: "$direct_imperial_free_city$ — особый тип ленника, подчиняющийся [Concept('hre_emperor', 'императору')|e] в рамках [Concept('policy', 'политики')|e] #TOOLTIP:POLICY,direct_imperial_cities_policy,X #L «Имперские города прямого подчинения»#!#!. Этот статус сохраняется, пока ленник является #TOOLTIP:SPECIAL_STATUS,free_city,X #L вольным имперским городом#!#! и #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священная Римская Империя#!#! признаёт его в своём составе. Подобные ленники ничем не отличаются от обычных #TOOLTIP:SUBJECT_TYPE,imperial_free_city,X #L вольных имперских городов#!#!, кроме сниженной автономии, — это означает, что их можно присоединять, причём быстрее, чем обычных #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалов#!#!."
 tributary: "Данник"
 tributary_desc: "Данник — держава, вынужденная периодически платить дань своему [Concept('overlord', 'сюзерену')|e] в виде [Concept('gold', 'дукатов')|e], [Concept('manpower', 'рекрутов')|e] и [Concept('sailors', 'моряков')|e]. Этот тип данника доступен только при определённых формах правления. В отличие от обычных #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалов#!#! данники могут самостоятельно объявлять войны (в том числе друг другу), но не будут автоматически вступать в войны своих сюзеренов."
 tributary_join_defensive_wars_always_tt: "Ленник атакован другой державой, которая не является данником того же сюзерена."
 BUILDING_COUNTRY_NAME: "$ADJ$ий $REGION$"
 PLAY_AS_RELEASED_SUBJECT: "Играть за освобождённого ленника"
 SELECT_SUBJECT_TYPE_CLICK: "Выбрать этот [Concept('subject_type', 'тип ленника')|e]"
 SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_ALWAYS_IF: "[COUNTRY.GetName] буд[COUNTRY.Custom('end_etut')] присоединяться к наступательным войнам #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!, если:"
 SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_AUTOCALL_IF: "[COUNTRY.GetName] буд[COUNTRY.Custom('end_etut')] автоматически призываться на наступательные войны #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!, если:"
 SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_CANCALL_IF: "[COUNTRY.GetName] может быть призван[COUNTRY.Custom('end_fem')] на наступательные войны #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!, если:"
 SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_NEVER_IF: "[COUNTRY.GetName] НЕ буд[COUNTRY.Custom('end_etut')] присоединяться к наступательным войнам #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!."
 SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_ALWAYS_IF: "[COUNTRY.GetName] буд[COUNTRY.Custom('end_etut')] присоединяться к оборонительным войнам #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!, если:"
 SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_AUTOCALL_IF: "[COUNTRY.GetName] буд[COUNTRY.Custom('end_etut')] автоматически призываться на оборонительные войны #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!, если:"
 SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_CANCALL_IF: "[COUNTRY.GetName] может быть призван[COUNTRY.Custom('end_fem')] на оборонительные войны #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#! если:"
