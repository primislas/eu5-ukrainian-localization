 #Revolutionary Chaos
 #Disaster
 revolutionary_chaos: "Хаос революции"
 revolutionary_chaos_desc: "Старому порядку пришёл конец! Мы свергли угнетателей и захватили власть. Однако между фракциями идёт ожесточённая борьба за ведущую роль в правительстве, и наше молодое государство находится в крайне уязвимом положении. Перед лицом внешних угроз необходимо устранить внутренние конфликты…"
 #Sinicization Disaster
 #Disaster
 sinicization_disaster: "Китайское влияние"
 sinicization_disaster_desc: "Влияние #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#! принесло нашему народу немалые блага. К несчастью, оно также вызвало разложение традиционного жизненного уклада, а теперь и вовсе угрожает независимости державы. Если мы хотим сохранить самобытную культуру, необходимо положить конец разрушительному воздействию чужеземных соблазнов. Вместе с тем, более тесные связи могут оказаться полезными…"
 has_opted_to_side_with_china_in_events_tt: "Успешное #G продвижение#! #L [GetCountry('CHI').GetAdjective|l]ого#! влияния при нашем дворе в ходе [Concept('events', 'событий')|e]"
 has_opted_to_stay_sovereign_from_china_in_events_tt: "Успешное #G ограничение#! #L [GetCountry('CHI').GetAdjective|l]ого#! влияния при нашем дворе в ходе [Concept('events', 'событий')|e]"
 #Crisis of the Chinese Dynasty
 #Disaster
 crisis_of_the_chinese_dynasty: "Кризис в [GetCountry('CHI').Custom('longname_ru_wntt_PREP')]"
 crisis_of_the_chinese_dynasty_desc: "Небеса потемнели. Мы вот-вот утратим божественную благодать! Внутреннее и внешнее давление усиливаются, бюрократия деградирует, а неудачи в сельском хозяйстве только множатся — всё складывается против нас. Народ больше не признаёт нас законными правителями [GetCountry('CHI').Custom('rank_ru_GEN')|l]."
 ccd_celestial_authority_trigger: "Наш [Concept('celestial_authority_gc', 'небесный авторитет')|e] составляет не ниже #Y 90#! (сейчас: #Y [GetUniqueInternationalOrganization('middle_kingdom').MakeScope.GetVariable('celestial_authority').GetValue|V1]#!)"
 #Triggers
 cmd_has_reformed_cabinet_tt: "Применено [Concept('action', 'действие')|e] «[ShowGenericActionName('cmd_reform_the_cabinet')]»"
 cmd_has_restored_stability_tt: "Применено [Concept('action', 'действие')|e] «[ShowGenericActionName('cmd_restore_stability')]»"
 cmd_has_strenthened_crown_tt: "Применено [Concept('action', 'действие')|e] «[ShowGenericActionName('cmd_strengthen_crown')]»"
 #Monthly Pulse
 fire_event_4_tt: "Может произойти [Concept('event', 'событие')|e], в результате которого [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] откажутся платить налоги"
 fire_event_5_tt: "Может произойти [Concept('event', 'событие')|e], связанное с падением [Concept('prosperity', 'процветания')|e] в наших [Concept('provinces', 'провинциях')|e]"
 # Decline of Majapahit
 #Disaster
 decline_of_majapahit: "Упадок Маджапахита"
 decline_of_majapahit_desc: "Эпоха процветания [GetCountry('MAJ').Custom('rank_ru_GEN')|l] осталась в прошлом. Нас разрывает династический конфликт, и многочисленные соперники ждут возможности пересечь наши границы. А в свете распространения #TOOLTIP:RELIGIONGROUP,muslim,X #L ислама#!#! в #TOOLTIP:REGION,indonesia_region,X #L Индонезии#!#! мы рискуем утратить остатки влияния и исчезнуть, подобно другим некогда великим империям…"
 demak_progress: "[ShowReligionAdjectiveWithNoTooltip('sunni')]ое господство"
 SUNNI_POPS: "Суннитские группы населения"
 HINDU_POPS: "Индуистские группы населения"
 SUNNI_DOMINANCE_MAJAPAHIT: "$demak_progress$"
 DEMAK_PROGRESS_GROWTH_TOOLTIP_TITLE: "Рост [ShowReligionAdjectiveWithNoTooltip('sunni')|l]ого господства"
 DEMAK_PROGRESS_GROWTH_TITLE: "$demak_progress$"
 DEMAK_MONTHLY_CHANGE_HEADER: "[ShowReligionAdjectiveWithNoTooltip('sunni')]ое господство каждый месяц изменяется на [Country.MakeScope.GetVariable('demak_progress_growth').GetValue|-=2%]"
 DEMAK_MONTHLY_CHANGE_POP_SHARE: "Доля #TOOLTIP:RELIGION,$sunni_tt$,X #L суннитов#!#! в сравнении с #TOOLTIP:RELIGION,$hindu_tt$,X #L индуистами#!#!: [Country.MakeScope.GetVariable('maj_sunni_percentage').GetValue|-=2%]"
 DEMAK_MONTHLY_CHANGE_STABILITY_IMPACT: "[Concept('stability', 'Стабильность')]: [Country.MakeScope.GetVariable('maj_stability_impact').GetValue|-=2%]"
 DEMAK_MONTHLY_CHANGE_LEGITIMACY_IMPACT: "[Concept('legitimacy', 'Легитимность')]: [Country.MakeScope.GetVariable('maj_legitimacy_impact').GetValue|-=2%]"
