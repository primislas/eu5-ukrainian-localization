 DEMAK_PROGRESS_GROWTH_HEADER: "$demak_progress$"
 DEMAK_PROGRESS_GROWTH_TOOLTIP: "[ShowReligionAdjectiveWithNoTooltip('sunni')]ое господство — это показатель распространённости #TOOLTIP:RELIGION,$sunni_tt$,X #L суннитской#!#! [Concept('religion', 'религии')|e] в [Country.Custom('rank_ru_PREP')|l]. Рост [ShowReligionAdjectiveWithNoTooltip('sunni')|l]ого господства увеличивается в зависимости от доли #TOOLTIP:RELIGION,$sunni_tt$,X #L суннитских#!#! [Concept('pops', 'групп населения')|e], и при достижении #y 100,0%#! все наши [Concept('locations', 'районы')|e] с [Concept('dominant_religion', 'доминирующей')|e] #TOOLTIP:RELIGION,$sunni_tt$,X #L суннитской#!#! религией отделятся и создадут Демак."
 #Court and Country
 #Disaster
 court_and_country: "Держава и двор"
 court_and_country_desc: "Сопротивление росту централизации в нашей державе вызвало повсеместный кризис и конфликт между державой и двором. Если мы выстоим, то сможем стать сильнее, но всё будет зависеть от того, как мы справимся с этими смутными временами."
 court_and_country_tips_header: "Совет для державы и двора"
 court_and_country_tips_tt: "Мы можем увеличить [Concept('crown_power', 'власть правителя')|e] следующим образом:\n$BULLET_WITH_TAB$Отменить [Concept('privileges', 'привилегии')|e]\n$BULLET_WITH_TAB$Усилить [Concept('control', 'контроль')|e] над нашими [Concept('locations', 'районами')|e]\n$BULLET_WITH_TAB$Построить #TOOLTIP:BUILDING_TYPE,counting_house,X #L контору#!#!\n$BULLET_WITH_TAB$Укрепить [Concept('legitimacy', 'легитимность')|e]\n$BULLET_WITH_TAB$Принять определённые [Concept('policies', 'политики')|e]"
 french_wars_religion_breakdown_tt: "Доля подходящих #TOOLTIP:RELIGIONGROUP,christian,X #L христианских#!#! [Concept('religions', 'религий')|e] в нашей [Concept('country', 'державе')|e]\n#TOOLTIP:RELIGION,$catholic_tt$,X #L Католичество#!#!:"
 x_catholic: "[GetCountry('FRA').GetReligionPercentage(GetReligionByKey('catholic'))|%2] [Concept('catholic', 'католических')|e] [Concept('pops', 'групп населения')|e]"
 court_and_country_7_tt: "В результате [Concept('event', 'события')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] могут отказаться платить налоги"
 court_and_country_8_tt: "В результате [Concept('event', 'события')|e] нестабильность может вызвать мятежи среди местного населения"
 court_and_country_9_tt: "В результате [Concept('event', 'события')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] могут организовать восстание и потребовать возвращения своих прежних привилегий"
 court_and_country_10_tt: "В результате [Concept('event', 'события')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] могут восстать против нашего правления"
 court_and_country_11_tt: "В результате [Concept('event', 'события')|e] лояльность наших армейских офицеров может быть поставлена под сомнение"
 court_and_country_12_tt: "В результате [Concept('event', 'события')|e] мы можем найти сторонников в армии и правительстве"
 #Aspiration for Liberty Disaster
 #Disaster
 aspiration_for_liberty: "Жажда свободы"
 aspiration_for_liberty_desc: "Стремление к свободе и желание народа воплотить в жизнь идеалы Просвещения могут привести к восстанию, которое теперь кажется почти неизбежным. Всеобщее возмущение нашим неумелым правлением грозит перерасти в революцию! Это серьёзно осложнит наши дела в будущем…"
 battles_on_foreign_grounds_tt: "В результате [Concept('event', 'события')|e] ведение внешних войн может стать ещё более дорогим удовольствием"
 governmental_incompetence_event_tt: "В результате [Concept('event', 'события')|e] некомпетентность нашего правительства может спровоцировать восстание населения"
 #Reform Society
 #Disaster
 reform_society: "Общественная реформа"
 reform_society_desc: "Политическая система, выстроенная вокруг #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L альтепетлей#!#! — городов-государств, — долгие годы поддерживала в державе мир и вела её к процветанию. К несчастью, отсутствие эффективных рычагов влияния на политику подчинённых городов привело к росту недовольства нашим правлением. Если мы хотим удержать власть и сохранить величие, необходимо провести реформы по централизации."
 #Rise of the Szlachta
 #Disaster
 rise_of_the_szlachta: "Усиление шляхты"
 rise_of_the_szlachta_desc: "Влияние благородного сословия при дворе растёт: шляхтичи постоянно требуют новых вольностей и привилегий. Они плетут политические интриги и напоминают стаю волков, выжидающих удобного случая, чтобы вцепиться жертве в глотку. Без сомнения, шляхтичи бросят нам вызов при первой же возможности!"
 #Actions
 pw_push_for_aristocracy: "Продвигать [ShowSocietyDirectionNameWithNoTooltip('aristocracy')|l]"
 pw_push_for_aristocracy_desc: "[SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] должны сохранять и преумножать свои привилегии и места в традиционной иерархии — на этих принципах всё и основано. Место человека в обществе определяется мечом и родословной, поэтому старинным семействам нужно крепко держаться за власть. Но у такой консолидации есть и свои риски. Например [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')|l] могут быть очень недовольны."
 pw_push_for_plutocracy: "Продвигать [ShowSocietyDirectionNameWithNoTooltip('plutocracy')|l]"
 pw_push_for_plutocracy_desc: "Богатство, а не наследие, определяет, насколько влиятелен человек. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')], финансисты и элита предпринимательства, должны быть впереди всех, чтобы формировать общество, которое ценит торговлю и прибыль. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')], конечно же, будут очень не рады такому решению."
 #Tooltips
 given_more_estate_power_nobles_estate_power_tt: "Мы предоставили больше [Concept('estate_power', 'власти')|e] [Concept('estate', 'сословию')|e] «[GetCountry('POL').GetGovernment.GetEstateName('nobles_estate')]»"
 given_more_estate_power_burghers_estate_power_tt: "Мы предоставили больше [Concept('estate_power', 'власти')|e] [Concept('estate', 'сословию')|e] «[GetCountry('POL').GetGovernment.GetEstateName('burghers_estate')]»"
 given_more_estate_power_crown_estate_power_tt: "Мы обеспечили больше [Concept('estate_power', 'власти')|e] [Concept('estate', 'сословию')|e] «[GetCountry('POL').GetGovernment.GetEstateName('crown_estate')]»"
 #Death of Hayam Wuruk
 #Disaster
 death_of_hayan_wuruk: "[GetCharacter('maj_hayam_wuruk').GetNameWithNoTooltip] и [Select_CString(GetCharacter('maj_hayam_wuruk').IsFemale,'её', 'его')] смерть"
 death_of_hayan_wuruk_desc: "[GetCharacter('maj_hayam_wuruk').GetName] [Select_CString(GetCharacter('maj_hayam_wuruk').IsFemale,'скончалась. Её', 'скончался. Его')] смерть привела к тому, что [GetCountry('MAJ').Custom('endrank_predlog_vvo')] [GetCountry('MAJ').Custom('rank_ru_PREP')|l] началась страшная смута. Этот неспокойный период может затянуться на многие годы, и те, кто когда-то подчинялся нам, будут оспаривать наше право на власть. Если мы хотим выжить, необходимо срочно решить вопросы наследования и укрепить #L [GetCountry('MAJ').GetAdjective|l]ую#! власть."
 hayan_wuruk_has_passed_tt: "[GetCharacter('maj_hayam_wuruk').GetName] [Select_CString(GetCharacter('maj_hayam_wuruk').IsFemale, 'умерла', 'умер' )] в течение последних #Y 10#! лет"
 #Curse of Stefan Uros III
 #Disaster
 curse_of_stefan_uros_iii: "[GetCharacter('ser_stefan_decanski').GetNameWithNoTooltip] и [Select_CString(GetCharacter('ser_stefan_decanski').IsFemale,'её', 'его')] проклятие"
 curse_of_stefan_uros_iii_desc: "Никто не посмеет усомниться в том, что [GetCharacter('ser_stefan_dusan').GetName] — [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'женщина', 'человек')] во всех отношениях [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'выдающаяся', 'выдающийся')], а также искусный полководец с безупречными манерами. [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'Она получила', 'Он получил')] прекрасное образование и [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'подняла', 'поднял')] нашу державу к недосягаемым прежде высотам. Тем не менее, как это нередко бывает, в [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'её', 'его')] жизни нашлось место и подлости, и страданиям, и убийствам. Самым страшным преступлением [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'царицы', 'царя')] было убийство собственного отца. Умирая, [GetCharacter('ser_stefan_decanski').GetName] проклял весь свой род, напророчив потомкам упадок и бесславный конец. Теперь суеверные придворные шепчутся, что призрак старого короля вернулся, знаменуя скорую гибель державы…"
 #English Civil War Disaster
 #Disaster
 english_civil_war: "Английская гражданская война"
 english_civil_war_desc: "Растущее противостояние между короной и парламентом по вопросам власти и управления может охватить всю страну. Вера [Select_CString(SCOPE.sCountry('actor').GetGovernment.GetRuler.IsFemale, 'нашей правительницы', 'нашего правителя')] в своё божественное право, [Select_CString(SCOPE.sCountry('actor').GetGovernment.GetRuler.IsFemale, 'её', 'его')] явное незнание порядка введения налогов и религиозная политика вызвали недовольство среди членов парламента. Если решение не будет найдено в кратчайшие сроки, ситуация перерастёт в гражданскую войну…"
 lost_civil_war_tt: "#Y Парламентарии#! победили в [Concept('civil_war', 'гражданской войне')|e]"
 won_civil_war_tt: "#Y Роялисты#! победили в [Concept('civil_war', 'гражданской войне')|e]"
 parliamentarist_rebels: "Парламентарии"
 complete_the_ecw_and_lose_tt: "#TOOLTIP:DISASTER_TYPE,english_civil_war,X #L Английская гражданская война#!#! завершится"
 #French Wars of Religion Disaster
 #Disaster
 french_wars_religion: "Религиозные войны во Франции"
 french_wars_religion_desc: "Возникновение новых ответвлений #TOOLTIP:RELIGIONGROUP,christian,X #L христианской#!#! веры по всей #TOOLTIP:CONTINENT,europe,X #L Европе#!#! привело к тому, что религиозные трения в нашем обществе достигли пика. Теперь вооружённые фанатики, еретики и защитники истинной веры грозят втянуть всю страну в жестокую гражданскую войну."
 had_fwr_before_definitive_ending_tt: "Это [Concept('disaster', 'бедствие')|e] не завершилось достижением [Concept('religious_unity', 'религиозного единства')|e] или подписанием [Concept('policy', 'политики')|e] в форме #TOOLTIP:POLICY,edict_of_nantes,X #L Нантского эдикта#!#!"
 lutheran_huguenots: "Лютеранские гугеноты"
 calvinist_huguenots: "Кальвинистские гугеноты"
 catholic_huguenots: "$catholic_ADJ$ие гугеноты"
 #Actions
 reach_compromise_with_huguenots: "Компромисс с гугенотами"
 reach_compromise_with_huguenots_desc: "Время раздоров на наших землях подошло к концу. Нам нужен компромисс и единство — это единственный путь к выходу из сложившейся катастрофы."
 #Time of Troubles Disaster
 #Disaster
 time_of_troubles: "Смутное время"
 time_of_troubles_desc: "Наш народ переживает тяжёлый период социальных и экономических трудностей — голод и войну. В довесок, [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')|l] и [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')|l] также не пользуются особой любовью среди населения. Враги окружают нас со всех сторон! [Country.GetFlavorRank|l] вот-вот падёт…"
 #Decline of the Empire
 #Disaster
 decline_of_empire: "Почивание на лаврах"
 decline_of_empire_desc: "Наша власть, некогда могущественная и твёрдая, оказалась на грани краха. Наши институты разрушает взяточничество, население провинций бунтует, брошенное на произвол судьбы, а державы-соперницы кружат над нами, словно стервятники, в надежде урвать кусок покрупнее. Золотой век давно миновал, с каждым днём всё шире трещины в нашем фундаменте. Если нам не удастся быстро остановить разложение и вернуть контроль над империей, она рассыпется в прах, оставив после себя лишь руины, сожаления и тени былого величия…"
 has_not_had_decline_of_empire_last_25_years: "Это [Concept('disaster', 'бедствие')|e] не происходило в последние #Y 25#! лет"
 not_recently_become_empire_tt: "Имеет [Concept('country_rank', 'ранг')|e] #TOOLTIP:COUNTRY_RANK,rank_empire,X #L империии#!#! хотя бы #Y 15#! лет"
 complacent_decline_actions_price: "Стоимость действий в ситуации «$decline_of_empire$»"
 cd_inspect_area: "Инспекция области"
 cd_inspect_area_desc: "Почивая на лаврах, мы позволили себе расслабиться, и вскоре наша гордыня принесла свои горькие плоды. Пришло время подавить мятежные настроения подданных [actor.Custom('rank_ru_GEN')|l] и напомнить им, что мы по-прежнему твёрдо контролируем свои земли."
 selected_area_inspected_tt: "В выбранной [Concept('area', 'области')|e] будет проведена инспекция. Это снизит [Concept('pop_satisfaction', 'довольство')|e] и уменьшит [Concept('complacency', 'праздность')|e] населения, но повысит наш [Concept('control', 'контроль')|e] над ключевыми [Concept('provinces', 'провинциями')|e] этой области.\n#italic Эффективность инспекции главным образом зависит от [Concept('population', 'населения')|e] [Concept('area', 'области')|e] и нашей #TOOLTIP:MODIFIER_TYPE,legislative_efficiency,X #L законодательной эффективности#!#!#!"
 cd_purge_cabinet_member: "Изгнание члена совета"
 cd_purge_cabinet_member_desc: "Полнота власти полностью развращает людей, и члены нашего совета — не исключение. Мы должны положить конец этому моральному разложению, и для этого нам необходимо провести чистку в правительстве."
 selected_character_banned_or_executed_tt: "Выбранный [Concept('character', 'персонаж')|e] будет исключён из [Concept('cabinet', 'совета')|e] любым доступным способом"
 #Decline of Mali
 #Disaster
 decline_of_mali: "Упадок Мали"
 decline_of_mali_desc: "Слабая власть, гражданские войны, усиление внешних врагов, внутренняя стагнация и прочие испытания вставали перед [GetCountry('MAL').Custom('longname_ru_INST')] в последние годы. Стабильность и безопасность этой державы под угрозой. Лишь сильная рука способна отвратить грядущую погибель и вернуть стране былое величие."
 #Coup Attempt
 #Disaster
 coup_attempt: "Попытка переворота"
 coup_attempt_desc: "Зловещие тени кружат над нами, как стервятники, выжидающие подходящего момента для нападения! Это тени приближённых, жаждущих избавиться от нашего правителя и посадить на трон свою марионетку."
 recently_had_coup_attempt_inconclusive_tt: "За последние #Y 5#! лет здесь не было ни провальных, ни удачных попыток переворота."
 conspirators_murdered_ruler_tt: "Заговорщикам удалось убить нашего правителя"
 #Byzantine Civil War
 #Disaster
 byzantine_succession_crisis: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip]ий кризис наследования"
 byzantine_succession_crisis_desc: "Претенденты-заговорщики и влиятельные теневые политики плетут интриги, чтобы свергнуть правящую #L [GetCountry('BYZ').GetAdjective|l]ую#! династию. Двор охвачен смутой, авторитетные генералы и чужеземцы стремятся повлиять на исход этого неспокойного периода. Ослабление нашего контроля над #TOOLTIP:REGION,balkan_region,X #L Балканами#!#! ставит под вопрос будущее последнего легитимного оплота Рима."
 #Castilian Civil War
 #Disaster
 castilian_civil_war: "[GetCountry('CAS').GetAdjectiveWithNoTooltip]ая гражданская война"
 castilian_civil_war_desc: "Враги неустанно ищут способы вмешаться в нашу политику, подогревая нестабильность или поддерживая претендентов на наш трон. Те, кто желает покончить с нашим правлением и вычеркнуть наше имя из исторических книг, наверняка не останутся в стороне в этот неспокойный период. Богатства #TOOLTIP:REGION,iberia_region,X #L Иберии#!#! всегда привлекали алчных недругов на наших границах, но мы не позволим им пировать за наш счёт!"
 #Turmoil in Brandenburg
 turmoil_in_brandenburg: "[GetCountry('BRA').GetAdjectiveWithNoTooltip]ая смута"
 turmoil_in_brandenburg_desc: "[GetCountry('BRA').GetLongName] наход[GetCountry('BRA').Custom('endlong_ityat')]ся в тяжёлой ситуации с тех самых пор, как династия #TOOLTIP:DYNASTY,$askanier_dynasty_tt$,X #L Асканиев#!#! утратила влияние и власть над маркграфством перешла к #TOOLTIP:DYNASTY,$wittelsbach_dynasty_tt$,X #L Виттельсбахам#!#!. Пока последние уделяют своё внимание другим территориям, [Select_CString(GetCountry('BRA').GetGovernment.GetRuler.IsFemale, 'юная', 'юный' )] [GetCountry('BRA').GetGovernment.GetRuler.GetName] [Select_CString(GetCountry('BRA').GetGovernment.GetRuler.IsFemale, 'вынуждена', 'вынужден' )] собственными силами возвращать территории марки под контроль центральной власти. Эта и без того непростая задача осложняется разгулом баронов-разбойников, неповиновением сословий и недовольством простого народа, который с тоской вспоминает о временах правления Асканиев.\n\nКроме того, пока правительство #ONCLICK:COUNTRY,[GetCountry('BRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRA').Custom('CL_tt')],X [GetCountry('BRA').Custom('CL_GEN')|L]#!#! занято внутренними вопросами, другие династии могут попытаться прибрать к рукам этот проблемный, но крайне престижный титул #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#!…"
 turmoil_in_brandenburg_investment_tt: "Если значение показателя «$bra_wittelsbacher_investment_var$» достигнет 100 ед., наша текущая [Concept('dynasty', 'династия')|e] сохранит власть."
 turmoil_in_brandenburg_neglect_tt: "Если значение показателя «$bra_wittelsbacher_neglect_var$» достигнет 100 ед., власть перейдёт к другой [Concept('dynasty', 'династии')|e]."
 turmoil_in_brandenburg_dynastic_struggle_resolved_tt: "Мы урегулировали династическую борьбу за наш престол"
 robber_barons_resolved_tt: "Мы решили проблему с баронами-разбойниками"
 wittelsbacher_event_occurs_tt: "Произошло событие, связанное с правительством Виттельсбахов"
 robber_barons_when_tt: "После 1365 г. могут произойти события, связанные с баронами-разбойниками"
 robber_barons_spread_tt: "Бароны-разбойники расширяют своё влияние"
 robber_barons_stay_put_tt: "Бароны-разбойники бездействуют"
 TURMOIL_IN_BRANDENBURG_DISASTERS_MODIFIERS_TT_LIST: "Пока длится [Concept('disaster', 'бедствие')|e], держава получает эти модификаторы:"
