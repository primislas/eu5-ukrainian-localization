 MusicPlayer_sol_chinese_Ambush_from_Ten_Sides_The_Complete_Epos_flavour: "A masterpiece in Chinese classical music, typically played by virtuosos. Written in martial style and depicting the Battle of Gaixia in 202 B.C.E., where General Xiang Yu was defeated by Liu Bang."
