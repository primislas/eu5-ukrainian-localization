 #### CONTRIBUTING COMPOSERS, PERFORMERS AND SOLOISTS ####
 Mattias_Henndlund: "Mattias Henndlund"

 Hakan_Glante: "Håkan Glänte"
 Hakan_Glante_and_Bach: "Håkan Glänte, J.S. Bach"
 Norrkoping_Symphony_Orchestra: "Norrköping Symphony Orchestra"
 Yingying_Herrdahl: "Yingying Herrdahl (pipa)"
 Yingying_Herrdahl_facts: "Ying Ying Herrdahl is a virtuoso pipa player currently living in Sweden."
 Pipa_facts: "The Chinese pipa is a stringed instrument with a pear shaped form plucked with fingernails or historically also with a plectrum. Its origins date back almost two thousand years and it's one of the most popular Chinese instruments."
 Martin_Ostergren: "Martin Östergren (organ)"
 Feras_Charestan: "Feras Charestan (qanun)"
 Feras_Charestan_facts: "Feras Charestan is from the city of Al-Hasakeh, in the northeast of Syria, and studied qanun at the High Institute of Music in Damascus."
 Qanun_facts: "The qanun, or kanun, is a stringed instrument in the zither family possibly originating from ancient Mesopotamia, although its origins are uncertain."
 Ilona_Danho: "Ilona Danho (vocals)"
 Feras_Charestan_and_Ilona_Danho: "$Feras_Charestan$, $Ilona_Danho$"
 
 Dan_Cecil_Hill: "Dan Cecil Hill (flutes)"
 Dan_Cecil_Hill_facts: "Dan Cecil Hill (Cayuga Nation, Heron Clan) is a Haudensaunee (Iroquois) artist and musician specializing in traditional native silversmithing and flute making. An artist, performer, and cultural leader for most of his life, he has worked to preserve and share all aspects of his people’s history going back to US pre-colonial times and earlier."
 Pierre_Harmon: "Pierre Harmon"
 Pierre_Harmon_facts: "Pierre Harmon is a well known flute player and renowned expert in Pre-Columbian music. Known worldwide for his valuable musicology research, especially in Aztec music, he also owns one of the largest collections of ancient instruments, which he has spent his career mastering."
