 Jacob_Regnart: "Jacob Regnart (1540s-1599)"
 Jacob_Regnart_facts: "Regnart is a Flemish Renaissance composer, born in Douai and wrote both sacred and secular music. Throughout his life he was active in Austria and Bohemia, among other capacities as Kapellmeister under Archduke Ferdinand in Innsbruck in the 1580s."
 Martin_Rinckart: "Martin Rinckart (1586-1649)"
 Martin_Rinckart_facts: "Martin Rinckart was a Lutheran clergyman and hymnist, active as archdeacon in Eilenburg in Nordsachsen, where he was born and died."
 Joachim_Neander: "Joachim Neander (1650-1680)"
 Joachim_Neander_facts: "Born In Bremen, Joachim Neander was a Reformed (Calvinist) Church hymnwriter, theologian and teacher. He is considered the foremost hymnwriter of the Reformed Church, writing about 60 hymns."
 Dietrich_Buxtehude: "Dietrich Buxtehude (1637-1707)"
 Dietrich_Buxtehude_facts: "Born Dietrich Hansen Buxtehude in Helsingborg in the province of Scania in 1637. Buxtehude is considered one of the most important composers of the 17th century and greatly influenced later composers such as Bach and Handel."
