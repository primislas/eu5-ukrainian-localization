#### TRACK NAMES AND FLAVOUR TEXT ####

 MusicPlayer_01_Overture_I_Genesis: "01 - Overture I Genesis"
 MusicPlayer_01_Overture_I_Genesis_flavour: "'The world awakens, sunlight revealing its countenance piece by piece.'"
 MusicPlayer_02_Overture_II_The_Odyssey: "02 - Overture II Odyssey"
 MusicPlayer_02_Overture_II_The_Odyssey_flavour: "'The overture of our story, in which we are introduced to its character and themes.'"
 MusicPlayer_03_Royal_Court_Invitation: "03 - Royal Court Invitation"
 MusicPlayer_03_Royal_Court_Invitation_flavour: "Haprsichord, heard in this piece, is a keyboard instrument prevalent in Renaissance and Baroque music. It produces sound by mechanically plucking a set of strings mounted on a soundboard by depressing a key that in turn moves a quill plectrum plucking a single string."
 MusicPlayer_25_The_Noble_Art_of_Diplomacy: "25 - The Noble Art of Diplomacy"
 MusicPlayer_25_The_Noble_Art_of_Diplomacy_flavour: "The lute family of instruments have a long history in many regions of the world and periods of history and the European lute is the dominant instrument in Renaissance secular music in Europe."
 MusicPlayer_21_Conquer_or_Fall: "21 - Conquer or Fall" 
 MusicPlayer_21_Conquer_or_Fall_flavour: "An epic composition including horns, strings and choir. Presents a inspiring variation on one of the main melodic themes of the music in Europa Universalis V."
 MusicPlayer_07_For_the_Lost_Ones: "07 - For the Lost Ones"
 MusicPlayer_07_For_the_Lost_Ones_flavour: "A lamenting and billowing composition, echoing themes and motifs from other compositions in Europa Universalis V."
 MusicPlayer_12_Jester_Speaks_the_Truth: "12 - Jester Speaks the Truth"
 MusicPlayer_12_Jester_Speaks_the_Truth_flavour: "A composition inspired by early renaissance music, revolving around variation on the main melodic motif of the music in Europa Universalis V."
 MusicPlayer_05_The_Rise_of_an_Empire: "05 - The Rise of an Empire"
 MusicPlayer_05_The_Rise_of_an_Empire_flavour: "Leading with the main motif of Europa Universalis V, this composition is a driving representation of the core emotion of the experience."
 MusicPlayer_20_Thirty_Years: "20 - Thirty Years"
 MusicPlayer_20_Thirty_Years_flavour: "The Thirty Year's War (1618-1648) is one of the most decimating conflicts in European history, resulting in the death of between 4.5 to 8 million people. It was sparked by the 16th century Reformation and further fueled by external conflicts of interest and old rivalries."
 MusicPlayer_24_The_Black_Death: "24 - The Black Death"
 MusicPlayer_24_The_Black_Death_flavour: "Decimating Europe's 14th century population by half, The Black Death is one of the most deadly pandemics in human history."
 MusicPlayer_10_Gloria_Patri: "10 - Gloria Patri"
 MusicPlayer_10_Gloria_Patri_flavour: "A vocal variation over Bach's Cello Suite No.1 in G major, BWV 1007: I.Prélude."
 MusicPlayer_14_Lux_aeterna: "14 - Lux Aeterna"
 MusicPlayer_14_Lux_aeterna_flavour: "Lux aeterna is a text commonly set to music as part of the Requiem Mass in the Catholic Church. It speaks of the grace of God and His eternal light shining on the departed."
 MusicPlayer_18_Falalalan: "18 - Falalalan"
 MusicPlayer_18_Falalalan_flavour: "History is always present in music, sometimes in more ways than one."
 MusicPlayer_22_A_Message_to_The_King: "22 - A Message to the King"
 MusicPlayer_22_A_Message_to_The_King_flavour: "A composition filled with urgency and fervor, conveying a feeling that haste is of utmost importance."
 MusicPlayer_08_No_Fear_No_Mercy: "08 - No Fear, No Mercy"
 MusicPlayer_08_No_Fear_No_Mercy_flavour: "A triumphant composition, remeniscent of the calm before a battle, and the hearts of combatants beating in their chests in anticipation."
 MusicPlayer_06_Pain_is_Salvation: "06 - Pain is Salvation"
 MusicPlayer_06_Pain_is_Salvation_flavour: "The lyrics blend English, Old German and Latin and speaks of suffering on the path to salvation."
 MusicPlayer_04_In_Your_Honor: "04 - In Your Honor"
 MusicPlayer_04_In_Your_Honor_flavour: "A sweeping piece remeniscent of green pastures, and the awe of God and Nature."
 MusicPlayer_15_A_Bargain_with_Beelzebub: "15 - A Bargain with Beelzebub"
 MusicPlayer_15_A_Bargain_with_Beelzebub_flavour: "Religion and war, and wars over religion. Piety and bloodthirst intermingling. The centuries depicted here are centuries of sharp contrasts interjected by shades of gray."
 MusicPlayer_16_The_Path_to_Potsdam: "16 - The Path to Potsdam"
 MusicPlayer_16_The_Path_to_Potsdam_flavour: "The city of Potsdam lost nearly half its population during the Thirty Years' War."
 MusicPlayer_11_Maiden_Voyage: "11 - Maiden Voyage"
 MusicPlayer_11_Maiden_Voyage_flavour: "A composition in dance rhythm, like the rolling of waves when heading out on unknown seas."
 MusicPlayer_17_The_Coronation_of_a_Naked_Emperor: "17 - The Coronation of a Naked Emperor"
 MusicPlayer_17_The_Coronation_of_a_Naked_Emperor_flavour: "A piece in secular Baroque style, featuring strings and harpsichord."
 MusicPlayer_13_Battle_of_Lutzen: "13 - Battle of Lützen"
 MusicPlayer_13_Battle_of_Lutzen_flavour: "The Battle of Lützen was fought on November 16th 1632 by the Swedish army supported by troops from Saxony and Hesse-Kassel against the Imperial Army of the Holy Roman Emperor and is one of the most important battles of the Thirty Years' War. Following the death of King Gustavus Adolphus of Sweden during the battle, the Heilbronn League was established."
 MusicPlayer_26_Peace_of_Westphalia: "26 - Peace of Westphalia"
 MusicPlayer_26_Peace_of_Westphalia_flavour: "The Peace of Westphalia is the collective name for two separate peace treaties signed in Osnabrück and Münster in 1648, bringing an end to the Thirty Years' War and Peace to the Holy Roman Empire."
 MusicPlayer_23_The_Flagellant: "23 - The Flagellant"
 MusicPlayer_23_The_Flagellant_flavour: "Flagellation is the act of whipping oneself as repentance of sins and sharing the Passion of Jesus, present in many Christian traditions. Flagellantism was a 14th century movement in Western Christianity that began as a response to war, famine and plague."
 MusicPlayer_19_O_quam_gloriosum: "19 - O quam gloriosum"
 MusicPlayer_19_O_quam_gloriosum_flavour: "This composition is based on a text written by Tomás Luis de Victoria (1548-1611) for his 'Missa O quam gloriosum'."
 MusicPlayer_09_Libera_me_Domine: "09 - Libera me Domine"
 MusicPlayer_09_Libera_me_Domine_flavour: "This composition combines the texts 'Pie Jesu' and 'Libera me' that are commonly set to music as part of the Requiem Mass in the Catholic Church. They ask for the departed to have the mercy of Jesus grant them rest, and deliverance on the day of judgement."
 MusicPlayer_sol_ashanti_Aho: "Ashanti - Aho"
 MusicPlayer_sol_ashanti_Aho_flavour: "Nana Osei Twum Barima is a master of all the instruments used in Ashanti music and ceremony, inclduing the seperewa, traditional horns and percussion instruments. He is also a successor of the Emperor and creator of the Ashanti Kingdom. The title of the song translates to 'War Chant'."
 MusicPlayer_sol_ashanti_Asanteman_Yenim_Ko: "Ashanti - Asanteman Yenim Ko"
 MusicPlayer_sol_ashanti_Asanteman_Yenim_Ko_flavour: "The beginning of the lyrics of the song roughly translates to 'Ashantis know how to fight but not how to run', and it goes on to proclaim the superiority of Ashanti warriors."
 MusicPlayer_sol_ashanti_Seperewa_Akasa: "Ashanti - Seperewa Akasa"
 MusicPlayer_sol_ashanti_Seperewa_Akasa_flavour: "The title of the song translates to 'Seperewa Has Spoken'. The seperewa is an instrument of the harp-lute family, with a box shaped resonator and 10-14 strings connected to the neck of the instrument by winding them directly on the neck. It originates from West Africa, and it's said that King Osei Tutu, the founder of the Asante/Ashanti empire loved it so much that a replica was made in gold for his royal paraphernalia."
