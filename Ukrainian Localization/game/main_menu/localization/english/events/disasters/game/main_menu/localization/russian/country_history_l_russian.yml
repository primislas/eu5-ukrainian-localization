l_russian:
 # Tag specific. Please keep alphabetical order
 country_history_ARA: "[GetCountry('ARA').GetLongName] — одна из наиболее могущественных держав на западе Средиземноморья. Она добилась этого благодаря флоту, дипломатическому влиянию и развитым торговым сетям.\n\nУкрепление власти в #TOOLTIP:LOCATION,valencia,X #L Валенсии#!#! и завоевание недавно созданного Сардинского королевства могут надолго обеспечить нам господство на море, однако, несмотря на относительную стабильность, на горизонте начинают сгущаться тучи. [GetCountry('MLL').GetLongName] на востоке пережива[GetCountry('MLL').Custom('endlong_etyut')] экономические трудности, и враждебность местных правителей к арагонскому королю может привести к конфликту. При этом #italic Реконкиста#! подходит к своему завершению. [GetCountry('CAS').GetLongName] станов[GetCountry('CAS').Custom('endlong_ityat')]ся всё более грозной силой на Пиренейском полуострове. На севере леж[GetCountry('FRA').Custom('endlong_itat')] [GetCountry('FRA').GetLongName], где за последний век укрепилась власть над регионом [ShowAreaName('languedoc_area')], поэтому эта держава тоже остаётся потенциальным противником.\n\nКак же [Select_CString(GetCountry('ARA').GetGovernment.GetRuler.IsFemale, 'юная', 'юный')] [GetCountry('ARA').GetGovernment.GetRuler.GetShortName|l] преодолеет грядущие испытания? [Select_CString(GetCountry('ARA').GetGovernment.GetRuler.IsFemale, 'Она', 'Он')] может обратить взор к Средиземному морю, чтобы установить свою власть над водами от #TOOLTIP:LOCATION,barcelona,X #L Барселоны#!#! до Святой земли, или же попытаться добиться господства на самом полуострове. И, конечно, всегда можно взять реванш за битву при Мюре и вернуть давно утраченные владения к северу от Пиренеев…"
 country_history_AZT: "За последние два столетия многие #TOOLTIP:CULTURE,$nahua_culture_tt$,X #L науа#!#!, потомки чичимеков, переселились в центр Мексики из своей мифической прародины — Ацтлана. Среди этих переселенцев был и наш народ.\n\nКак и многие другие науа, мы основали собственный #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L альтепетль#!#!, который получил название #TOOLTIP:LOCATION,tenochtitlan,X #L Теночтитлан#!#!. Он расположен на искусственном острове посреди #TOOLTIP:LOCATION,texcoco_lake,X #L озера Тескоко#!#!.\n\nПри этом наши правители оказались под сильным влиянием #TOOLTIP:CULTURE,$toltec_culture_tt$,X #L тольтекской#!#! культуры, что способствовало развитию нашей озёрной цивилизации. Вскоре соседи также признали нас искусными воинами, и наше мастерство превратило армии [GetCountry('AZT').Custom('longname_ru_GEN')] в грозную силу…\n\nСейчас мы являемся вассалами альтепетля #ONCLICK:COUNTRY,[GetCountry('TEP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TEP').Custom('CL_tt')],X [GetCountry('TEP').Custom('CL_GEN')|L]#!#!, а потому наши возможности для расширения ограничены его окрестными территориями. В такой ситуации только мудрый и способный правитель сможет привести [GetCountry('AZT').Custom('CL_ACC')] к покорению долины Мехико и земель за её пределами. Может, [Select_CString(GetCountry('AZT').GetGovernment.GetRuler.IsFemale, 'ей', 'им' )] окажется [GetCountry('AZT').GetGovernment.GetRuler.GetShortName|l]?"
 country_history_BOH: "Населённые #TOOLTIP:CULTUREGROUP,slavic_group,X #L славянами#!#! земли [GetCountry('BOH').Custom('CL_GEN')] находятся в самом сердце германской #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#!. Долгое время этими территориями правили #TOOLTIP:DYNASTY,$premyslid_dynasty_tt$,X #L Пржемысловичи#!#!, но теперь к власти пришла династия #TOOLTIP:DYNASTY,$luxembourg_dynasty_tt$,X #L Люксембургов#!#!, которая может ещё более тесно связать страну с Империей. Впрочем, [GetCountry('BOH').GetGovernment.GetRuler.GetName|l] скорее #TOOLTIP:CULTURE,$french_tt$,X #L французского#!#! происхождения, нежели #TOOLTIP:CULTUREGROUP,german_group,X #L немецкого#!#!, благодаря воспитанию при королевском дворе в #TOOLTIP:LOCATION,paris,X #L Париже#!#!… Так или иначе, [GetCountry('BOH').GetGovernment.GetRulerTitle|l] родом из чужих земель решает сложнейшую задачу: держать в узде и аристократов, и простой народ, одновременно пытаясь разобраться в хитросплетениях имперской политики. Конечно, [GetCountry('BOH').GetNameWithNoTooltip] — весьма могучая держава, но удастся ли её правителям осуществить свои амбициозные планы?"
 country_history_BYZ: "Когда-то [GetCountry('BYZ').GetName] простирал[GetCountry('BYZ').Custom('endrank_assya')] от #TOOLTIP:REGION,egypt_region,X #L Египта#!#! и #TOOLTIP:AREA,levant_area,X #L Леванта#!#! до #TOOLTIP:REGION,iberia_region,X #L Иберии#!#! и #TOOLTIP:REGION,italy_region,X #L Италии#!#!, но теперь это государство в упадке. Причиной этому стал Четвёртый крестовый поход, и даже то, что династия [GetCountry('BYZ').GetGovernment.GetRuler.GetDynasty.GetName] вернула #TOOLTIP:LOCATION,constantinople,X #L Константинополь#!#! под контроль державы, не исправило положение. [GetCharacter('byz_andronikos_ii_palaiologos').GetName] во время своего правления отчаянно [Select_CString(GetCharacter('byz_andronikos_ii_palaiologos').IsFemale, 'пыталась', 'пытался' )] решить экономические проблемы, и с этой целью даже [Select_CString(GetCharacter('byz_andronikos_ii_palaiologos').IsFemale, 'распустила', 'распустил' )] имперский флот. Тем не менее [GetCountry('BYZ').GetFlavorRank|l] продолжал[GetCountry('BYZ').Custom('endrank_fem')] терять территории, из-за чего #TOOLTIP:GOVERNMENT_REFORM,theme_system,X #L фемная система#!#! там пострадала и фактически перестала работать.\n\n[GetCharacter('byz_andronikos_iii_palaiologos').GetName] теперь [Select_CString(GetCharacter('byz_andronikos_iii_palaiologos').IsFemale, 'должна', 'должен' )] приложить все усилия, чтобы по крайней мере сохранить то, что осталось от нашей империи, однако добиться этого будет непросто. На востоке огромное войско #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_GEN')|L]#!#! намеревается стереть с лица земли последние византийские владения в #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#! и переправиться через проливы. [GetCharacter('ser_stefan_dusan').GetName] в то же время помышляет о захвате #TOOLTIP:LOCATION,thessaloniki,X #L Фессалоник#!#! и #TOOLTIP:PROVINCE_DEFINITION,north_epirus_province,X #L Северного Эпира#!#!. Между тем наша казна практически опустошена, а императорская родня и [GetCountry('BYZ').GetGovernment.GetEstateName('nobles_estate')|l] явно затевают какой-то заговор, из-за чего страну в любой момент может захлестнуть гражданская война. Сможет ли [GetCountry('BYZ').GetGovernment.GetRulerTitle|l] поднять некогда великую державу из руин?"
 country_history_CAS: "Образованию [GetCountry('CAS').Custom('longname_ru_GEN')] поспособствовала уния [GetCountry('CAS').Custom('CL_GEN')] и [GetCountry('LON').Custom('longname_ru_GEN')]. В 1230 году [GetCharacter('cas_fernando_iii_burgundy').GetName] [Select_CString(GetCharacter('cas_fernando_iii_burgundy').IsFemale, 'унаследовала', 'унаследовал' )] их, воссоединив эти королевства. Спустя сто лет [GetCharacter('cas_alfonso_xi_burgundy').GetName] успешно правит державой, практически не встречая политических оппонентов, хотя начало его правления было непростым, до него длился долгий период регентства, когда у власти находилась его бабушка [GetCharacter('cas_maria_molina').GetName].\n\nСумев обуздать аристократию, во главе которой стоял его родственник [GetCharacter('cas_juan_manuel').GetName], и укрепив положение страны, [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip] обратил внимание на южную границу. От эмирата [GetCountry('GRA').GetLongName], получившего независимость сотню лет назад, по-прежнему исходит угроза при влиятельной поддержке [GetCountry('MOR').Custom('longname_ru_GEN')] — эта держава владеет землями в Иберии через подчинённое ей королевство, чьи владения располагаются у #TOOLTIP:LOCATION,algeciras,X #L Альхесираса#!#! и #TOOLTIP:LOCATION,ronda,X #L Ронды#!#!. Правит там [GetCharacter('mor_abu_malik_abd_al_wahid').GetName], чьим отцом является [GetCharacter('mor_abu_al_hasan_ali').GetName].\n\nОднако это не все проблемы, с которыми сталкивается [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip]. Его возлюбленная [GetCharacter('cas_leonor_guzman').GetName] родила ему нескольких детей, и это накалило отношения в семье. [GetCountry('CAS').GetGovernment.GetRulerTitle] и его законная супруга [GetCharacter('cas_maria_portugal').GetName] живут отдельно, и на фоне этого раскола в правящей семье вопрос престолонаследия актуален как никогда.\n\nСмогут ли [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip] и его наследники справиться с внутренними и внешними угрозами, встающими перед [GetCountry('CAS').Custom('longname_ru_nott_INST')]?"
 country_history_CHA: "[GetCountry('CHA').GetName] — это группа разрозненных, полуавтономных тямских княжеств, объединившихся [GetCountry('CHA').Custom('endrank_predlog_vvo')] [GetCountry('CHA').Custom('rank_ru_ACC')|l]. [GetCountry('CHA').GetLongNameWithNoTooltip] — единственная #TOOLTIP:RELIGION,$hindu_tt$,X #L индуистская#!#! держава в #TOOLTIP:REGION,indochina_region,X #L Индокитае#!#!, поэтому ей постоянно угрожают коварные и агрессивные враги: [GetCountry('KHM').GetLongName] на западе и [GetCountry('DAI').GetLongName] на севере. Однако, несмотря на внешние опасности, [GetCountry('CHA').GetAdjectiveWithNoTooltip|l]ий народ смог нажить огромные богатства, используя свой флот как для торговли, так и для пиратских налётов в морях #TOOLTIP:REGION,indonesia_region,X #L Индонезии#!#!.\n\nНекогда это был союз разрозненных племён, но теперь [GetCountry('CHA').GetName] — это мощная сила, с которой придётся считаться. Сможет ли эта страна занять место во главе всех держав?"
 country_history_CHI: "[GetCharacter('kublai_khan').GetName] [Select_CString(GetCharacter('kublai_khan').IsFemale, 'основала', 'основал' )] [GetCountry('CHI').Custom('longname_ru_ACC')], а сегодня его необъятная империя уже простирается до самого горизонта. Под властью своего легендарного правителя она подчинила себе весь Китай, а также достигла невероятных высот славы и великолепия.\n\nОднако в последнее время её влияние в регионе ослабевает, а на смену процветанию пришли междоусобицы, бунты и культурные разногласия. Враги вокруг набирают силы, чтобы низвергнуть державу и присвоить её мандат себе. С помощью заговоров и происков [GetCountry('CHI').Custom('end_predlog_vvo')] [GetCountry('CHI').Custom('CL_PREP')] эти предатели стремятся отыскать у империи слабое место, чтобы урвать себе крупицу власти и хотя бы одну строчку на страницах истории. Но сколько бы таких выскочек не пытались добиться славы, восседать на Троне Дракона и исполнять волю Небес может лишь один правитель."
 country_history_CHK: "Город #TOOLTIP:LOCATION,cahokia,X #L Кахокия#!#! стоит на месте слияния священных рек, окружённый плодородными землями, и по мере его роста в нём сформировалось развитое общество. Жители #TOOLTIP:LOCATION,cahokia,X #L Кахокии#!#! возделывают земли окружающей долины и выращивают там «три сестры»: кукурузу, фасоль и тыкву. Власть в городе удерживают [GetCountry('CHK').GetGovernment.GetEstateName('clergy_estate')|l], которые активно строят здесь храмы. #TOOLTIP:CULTURE,$cahokia_culture_tt$,X #L Кахокийская#!#! культура распространяется на окрестные земли и формирует обширную сферу влияния, а также привлекает в город новых жителей со всего региона.\n\nНаше строго организованное общество и влиятельная культура позволили нам подняться на высоты, о которых другие народы могут только мечтать. Однако мы ещё можем столкнуться с колоссальными, непредвиденными трудностями. Сумеем ли мы дальше строить и развивать своё общество, или все наши достижения будут разрушены и позабыты навсегда?"
 country_history_CSU: "Наш первый вождь, ведомый богом солнца Инти, основал #TOOLTIP:LOCATION,qusqu,X #L Куску#!#! в том самом месте, где коснулся земли его золотой посох. После многих столетий соседства с другими племенами #TOOLTIP:CULTURE,$inca_culture_tt$,X #L инки#!#! наконец-то взяли верх над ними и завоевали право называться сынами этих чудесных мест. Огромные вулканы и бурные реки Анд скрывают и питают Священную долину инков, где мы, сыны Солнца, живём в ожидании обещанного светлого будущего в нашем величественном городе. Нас окружают непреодолимые стены гор и плодородные террасные поля, а другие народы с завистью взирают на наши богатства.\n\nМы долгие годы набирали силу и укрепляли свою власть, и теперь пришло время сокрушить соседей, чтобы расширить свои владения за пределы долины и отправиться вдоль гор для порабощения всего мира. Вопрос лишь в том, сможем ли мы осилить этот великий поход, или враги уничтожат нас прежде, чем мы достигнем могущества?"
 country_history_DAI: "[GetCountry('DAI').GetLongName] образовал[GetCountry('DAI').Custom('endlong_assya')] в 968 году в результате гражданской войны династии Нго. С тех самых пор мы упорно ведём борьбу против растущего влияния Китайской Империи на севере страны. Когда-то эти территории принадлежали #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединному Государству#!#!, поэтому #L [GetCountry('DAI').GetCulture.GetName|l]ому#! народу издавна приходится защищать свою землю от #L [GetCountry('CHI').GetCulture.GetName|l]их#! набегов, это порождает глубокие и давние обиды.\n\nПомимо внешних угроз, наша держава страдает от чрезмерной раздробленности: #TOOLTIP:ESTATE_PRIVILEGE,peasants_autonomous_villages,X #L независимые деревни#!#! фактически живут по своим законам, а при дворе не утихает борьба за власть.\n\nТем не менее сейчас перед нами открывается много возможностей. [GetCountry('CHA').Custom('longname_ru_ACC')] со всех сторон окружают враги, а [GetCountry('KHM').GetName] пережива[GetCountry('KHM').Custom('end_etyut')] упадок. Это значит, что у нас появляется возможность обрести статус господствующей империи #TOOLTIP:REGION,indochina_region,X #L Индокитая#!#!."
 country_history_DAN: "[GetCountry('DAN').GetLongName] когда-то бы[GetCountry('DAN').Custom('endlong_fem')] важной фигурой, а теперь пережива[GetCountry('DAN').Custom('endlong_etyut')] непростые времена. Предыдущий король [GetCharacter('dan_chistopher_ii').GetName], стремясь исправить экономическое положение, заложил обширные территории влиятельным #TOOLTIP:CULTURE,$danish_tt$,X #L датским#!#! и #TOOLTIP:CULTUREGROUP,german_group,X #L германским#!#! #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#!. [GetCountry('SLV').Custom('longname_ru_ACC')] оттеснили от королевских земель, и даже территории #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#! пришлось продать [GetCountry('SWE').Custom('longname_ru_DAT')]. И без того непростая ситуация стала ещё тяжелее, когда неудачливого короля сверг [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetName] и усадил на его место своего племянника по имени [GetCharacter('dan_valdemar_iii').GetName]. Вскоре [GetCharacter('dan_chistopher_ii').GetNameWithNoTooltip] снова занял престол, но в роли марионеточного правителя. После его смерти [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetShortNameWithNoTooltip] стал де-факто правителем [GetCountry('DAN').Custom('CL_GEN')].\n\nВыбраться из сложившегося положения будет непросто, но #L [GetCountry('DAN').GetAdjective|l]ий!#! народ отличается упорством и решимостью, а [GetCharacter('dan_valdemar_atterdag').GetName], сын почившего короля, уже готовит план вернуть [GetCountry('DAN').Custom('rank_ru_DAT')|l] былое величие. Получится ли это у него? Время покажет."
 country_history_DHM: "[GetCountry('DHM').GetLongName] — это не просто манор, а [GetCountry('DHM').GetFlavorRank|l] под властью [GetCountry('ENG').Custom('longname_ru_GEN')], и местный [GetCountry('DHM').GetGovernment.GetRulerTitle|l] обладает там практически королевской властью. Епископ #TOOLTIP:LOCATION,durham,X #L Дарема#!#! вправе собирать армии, чеканить монету и вершить правосудие, он играет роль светского правителя #TOOLTIP:AREA,northumbria_area,X #L Нортумбрии#!#!.\n\nМногие века подобная уникальная автономия позволяла епископам оберегать северную границу от #L [GetCountry('SCO').GetAdjective|l]их#! набегов, а укрепления Дарема являются оплотом верности монарху в пограничных землях.\n\nОднако в смутные времена на границе становится неспокойно, отношение #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#! остаётся враждебным, и даже [GetCountry('DHM').GetGovernment.GetEstateName('clergy_estate')|l] заговорили о реформах и амбициях. [GetCountry('DHM').GetFlavorRank] #TOOLTIP:LOCATION,durham,X #L Дарема#!#! носит церковное одеяние, но по сути является политическим образованием и ещё может сыграть более значимую роль в делах державы.\n\nОстанется ли [GetCountry('DHM').GetFlavorRank|l] тихим уголком на службе короля или станет независимой державой и непризнанным великим северным королевством?"
 country_history_DLH: "Череда стремительных и решающих завоеваний минувшего столетия породила нашу великую державу — [GetCountry('DLH').GetLongName] — которая простирается от #TOOLTIP:REGION,deccan_region,X #L Декана#!#! до плодородных земель #TOOLTIP:LOCATION,lahore,X #L Лахора#!#!. Ни одно другое государство не может сравниться с нашим могуществом и славой.\n\nОднако ныне власть [GetCountry('DLH').Custom('rank_ru_GEN')|l] распространилась на столь обширные территории, что управлять ими всё сложнее. Нас окружают многочисленные враги, жаждущие уничтожить наше великое наследие и развитую культуру. На востоке наши подданные в #TOOLTIP:AREA,bengal_area,X #L Бенгалии#!#! начали сомневаться в своих правителях, а южные провинции уже давно оспаривают нашу власть. #TOOLTIP:RELIGION,$hindu_tt$,X #L Индуистские#!#! державы на юге Индии, ведомые #ONCLICK:COUNTRY,[GetCountry('VIJ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('VIJ').Custom('CL_tt')],X [GetCountry('VIJ').Custom('CL_INST')|L]#!#!, могут усилить сопротивление нашему правлению.\n\n[GetCharacter('dlh_muhammad_bin_tughluq').GetName] своим мудрым руководством и зорким взглядом убережёт наши земли от бед и предотвратит крах державы. Мы в это верим…"
 country_history_DMS: "[GetCountry('DMS').GetLongName] находится в труднодоступном регионе на юго-западной окраине Ирландии. Несмотря на отдалённость от #TOOLTIP:LOCATION,dublin,X #L Дублина#!#!, эти земли сложно назвать глухим захолустьем. Ими правит [GetCharacter('dms_maurice_fitzgerald').GetName] — 1-й граф Десмонд, глава южной ветви могущественной династии #TOOLTIP:DYNASTY,$fitzgerald_dynasty_tt$,X #L Фицджеральдов#!#! и один из самых влиятельных лордов #TOOLTIP:REGION,ireland_region,X #L Ирландии#!#!.\n\nВ 1329 году Морис получил титул графа и быстро вырвал своё королевство из лап гэльских вождей #ONCLICK:COUNTRY,[GetCountry('THO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('THO').Custom('CL_tt')],X [GetCountry('THO').Custom('CL_GEN')|L]#!#! и английских властей #ONCLICK:COUNTRY,[GetCountry('PLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PLE').Custom('CL_tt')],X [GetCountry('PLE').Custom('CL_GEN')|L]#!#!.\n\nСмена союзников, напряжённость в отношениях с Дублином и Лондоном и постоянная борьба пограничных баронов — вот главные особенности политического ландшафта Десмонда. Власть Англии на западе слабеет. Как мы поступим? Попробуем добиться независимости, натравим гэльские кланы друг на друга или заявим свои права на престол?\n\nСтанет ли Десмонд оплотом гиберно-нормандского возрождения? Или же погрязнет в войнах и междуусобицах?"
 country_history_ENG: "#L [GetCountry('ENG').GetAdjective]ая#! корона до сих пор оправляется от коварного мятежа. [GetCharacter('eng_edward_ii').GetShortName] был в результате убит десять лет назад. Главных зачинщиков казнили, но некоторых соучастников всё же помиловали ради сохранения стабильности — очень хрупкой стабильности.\n\n[GetCharacter('eng_edward_iii').GetShortName], его сын, в свою очередь, уже проявил себя как способный правитель. Ныне он открыто заявляет о своих правах на #L [GetCountry('FRA').GetAdjective|l]ий#! престол, утверждая, что он — внук правителя из династии #TOOLTIP:DYNASTY,$capet_dynasty_tt$,X #L Капетингов#!#!, а значит, является его законным наследником.\n\nНа севере наш #L [GetCountry('SBL').GetAdjective|l]ий#! ставленник безуспешно борется за #L [GetCountry('SCO').GetAdjective|l]ую#! корону, в то время как наши верные вассалы удерживают контроль над #ONCLICK:COUNTRY,[GetCountry('WLS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('WLS').Custom('CL_tt')],X [GetCountry('WLS').Custom('CL_INST')|L]#!#!, #ONCLICK:COUNTRY,[GetCountry('PLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PLE').Custom('CL_tt')],X [GetCountry('PLE').Custom('CL_INST')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('AQN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('AQN').Custom('CL_tt')],X [GetCountry('AQN').Custom('CL_INST')|L]#!#!.\n\nЯсно одно: нас ждут неспокойные времена. Стоит ли нам устремиться через Ла-Манш, чтобы покорить Францию и стать континентальной державой, или же лучше направить усилия на обеспечение нашего господства на море?"
 country_history_ERE: "Этот бейлик основал [GetCharacter('ere_eretna').GetName] — офицер Ильханидов #TOOLTIP:CULTURE,$uyghur_culture_tt$,X #L уйгурского#!#! происхождения, — после победы над #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольскими#!#! вождями в битве при Каранбюке. Провозгласив независимость от своих бывших сюзеренов, [GetCharacter('ere_eretna').GetNameWithNoTooltip] стал султаном и даже получил прозвище #italic «безбородый пророк»#! за своё мудрое правление. $anatolia_desc$"
 country_history_ETH: "[GetCountry('ETH').GetLongName] — древнее государство с богатой историей и традициями. Оно расположено на Африканском Роге среди открытых всем ветрам нагорий и равнин. Мало что может сравниться с его Великой рифтовой долиной и Сыменскими горами, когда их озаряет солнце. Это зрелище поражает всякого, кто оказывается здесь впервые.\n\n[GetCountry('ETH').Custom('CL_ACC')] населяет великое множество разных народов, в том числе #TOOLTIP:CULTURE,$amhara_tt$,X #L амхара#!#!, #TOOLTIP:CULTURE,$afar_culture_tt$,X #L афар#!#!, #TOOLTIP:CULTURE,$tigre_tt$,X #L тигре#!#! и другие. Вместе они пережили много трудностей, что лишь сильнее сплотило их вопреки религиозным и культурным различиям.\n\nЖители [GetCountry('ETH').Custom('CL_GEN')] гордятся легендами о своих корнях: считается, что члены правящей династии #TOOLTIP:DYNASTY,$solomonid_dynasty_tt$,X #L Соломонидов#!#! происходят от Менелика I — сына царицы Савской и библейского царя Соломона. Таким образом, этот миф связывает народ Эфиопии с древними евреями.\n\nЗа свою долгую историю наша держава преодолела множество испытаний, но им так и не удалось сломить наш дух.\n\nОднако в последние годы над нами вновь нависает угроза: мы окружены врагами, которые выжидают подходящий момент для удара. Выдержать их натиск — само по себе подвиг, однако мы намерены не просто выжить, а обеспечить своей стране процветание на долгие века."
 country_history_EWY: "[GetCountry('EWY').GetLongName] располага[GetCountry('EWY').Custom('endlong_etyut')]ся на стратегически важных пограничных землях между #TOOLTIP:AREA,wales_area,X #L Уэльсом#!#! и [GetCountry('ENG').Custom('longname_ru_INST')], а также отвеча[GetCountry('EWY').Custom('endlong_etyut')] за защиту западных границ.\n\nСейчас там правит [GetCharacter('eng_bartholomew_burghersh_the_elder').GetName], верный слуга короны, опытный воин и придворный. [GetCharacter('eng_edward_iii').GetShortName] доверяет ему, и он достойно проявил себя не только на полях сражений, но и в качестве представителя короля, а также в роли констебля #TOOLTIP:LOCATION,dover,X #L Дувра#!#! и лорда-смотрителя Пяти портов. Владения в пограничье сделали его богатым и влиятельным, но он никогда не забывает о том, что верность в этом регионе переменчива, а у его соседей хватает амбиций.\n\nСумеет ли род [ShowDynastyName('burghersh_dynasty')] сохранить расположение Плантагенетов и с честью оберегать пограничье? Или же круговорот политики, войн и наследования сметёт этот пограничный оплот?"
 country_history_FLO: "#L [GetCountry('FLO').GetAdjective]ая#! республика стоит на пороге новой эпохи! За последние столетия наша держава столкнулась со множеством испытаний, но благодаря своему упорству мы смогли преодолеть их и занять весьма выгодное положение, которое позволяет нам извлекать прибыль из богатых земель региона. Впрочем, наши соседи тоже не сидят сложа руки и неустанно размышляют о том, как расширить свои #TOOLTIP:REGION,italy_region,X #L итальянские#!#! владения.\n\nОднако немногие могут похвастаться такими достижениями в науке и культуре, какие есть [GetCountry('FLO').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('FLO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FLO').Custom('CL_tt')],X [GetCountry('FLO').Custom('CL_PREP')|L]#!#!. Под руководством талантливых правителей наш народ будет и впредь создавать потрясающие произведения искусства и изобретения, которые непременно приведут нашу державу в золотой век. При должном старании, конечно…"
 country_history_FRA: "[GetCharacter('fra_charles_iv_capet').GetShortName] умер в 1328 году, не оставив наследника мужского пола, и так закончилось правление #TOOLTIP:DYNASTY,$capet_dynasty_tt$,X #L Капетингов#!#! [GetCountry('FRA').Custom('endlong_predlog_vvo')] [GetCountry('FRA').Custom('longname_ru_PREP')]. Следующим корону получил [GetCharacter('fra_philip_vi_valois').GetName], родич покойного короля из младшей ветви династии. Однако [GetCharacter('eng_edward_iii').GetName] из #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! оспаривает его власть, утверждая, что #TOOLTIP:HEIRSELECTION,salic_law,X #L Салический закон#!#! хоть и отстраняет самих женщин от престолонаследия, но не отменяет право на корону по женской линии. [GetCharacter('eng_isabella_of_france').GetName], последняя из живых сестёр предыдущего короля, приходится ему матерью, поэтому он решил заявить о своих законных притязаниях на [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий трон.\n\n[GetCharacter('sco_david_ii').GetName], юный правитель #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#!, недавно попросил у нас убежища, это усугубляет и без того сложные отношения между нашими королевствами. Предоставив ему защиту, мы вызвали гнев [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ого двора, который поддерживает #ONCLICK:COUNTRY,[GetCountry('SBL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SBL').Custom('CL_tt')],X [GetCountry('SBL').Custom('CL_ACC')|L]#!#! — ещё одного претендента на [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ую корону. [GetCharacter('eng_robert_iii_artois').GetName], осуждённый в #TOOLTIP:LOCATION,paris,X #L Париже#!#! за притязания на [GetCountry('ARS').Custom('longname_ru_ACC')], в то же время бежал в Англию, где его тепло принял [GetCharacter('eng_edward_iii').GetShortNameWithNoTooltip]. По слухам, [GetCharacter('eng_robert_iii_artois').GetShortNameWithNoTooltip] подстрекает своего гостеприимного хозяина захватить [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий престол силой…\n\nЕсли отношения продолжат накаляться, [GetCharacter('fra_philip_vi_valois').GetShortNameWithNoTooltip] будет вынужден обратиться за помощью к своим ленникам. Однако многие амбициозные #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанажи#!#!, образованные ещё старой королевской династией, могут воспользоваться тяжёлым положением короны и потребовать новых привилегий за свою помощь, что рискует стать большей угрозой, чем наличие внешнего врага. Так или иначе, судьба [GetCountry('FRA').Custom('CL_GEN')] определится в ближайшие годы. Нам предстоит одновременно решать вопрос и с внешней [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ой угрозой, и с дерзкой [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ой знатью. Удастся ли [GetCountry('FRA').Custom('CL_DAT')] выстоять перед лицом трудностей и стать главной силой #TOOLTIP:CONTINENT,europe,X #L Европы#!#!?"
 country_history_GEN: "Город #TOOLTIP:LOCATION,genoa,X #L Генуя#!#! — важнейший торговый порт #TOOLTIP:AREA,western_mediterranean_sea_area,X #L Западного Средиземноморья#!#!, который сумел далеко распространить своё влияние торговыми и военными методами.\n\nРазгромив [GetCountry('PIS').Custom('longname_ru_ACC')], мы заняли Корсику и укрепились на #TOOLTIP:AREA,sardinia_area,X #L Сардинии#!#!, но эти земли могут принести нам больше проблем, чем выгод, поскольку многие местные жители выступают против нашей власти. [GetCharacter('ara_peter_iv_arago').GetName] недавно и вовсе [Select_CString(GetCharacter('ara_peter_iv_arago').IsFemale, 'провозгласила', 'провозгласила' )] себя королём обоих островов, поэтому наверняка попытается взять их под свой контроль.\n\nДругая угроза может возникнуть на востоке, где мы стали главной торговой силой #TOOLTIP:AREA,black_sea_area,X #L Чёрного моря#!#!, опираясь на восточные колонии с центром в #TOOLTIP:LOCATION,kaffa,X #L Кафе#!#!. Однако [GetCountry('VEN').GetName], [GetCountry('BYZ').GetName] и [GetCountry('GLH').GetLongName] представляют большую угрозу для наших владений в этом регионе.\n\nУдастся ли [GetCountry('GEN').Custom('CL_DAT')] решить все насущные проблемы, положившись на многочисленные #TOOLTIP:BUILDING_TYPE,fondaco,X #L фондако#!#! и богатых банкиров?"
 country_history_GRM: "После распада Сельджукской империи племя Гермиян под предводительством Якуба I прочно закрепилось на её бывших землях. Наш народ поднял восстание против сельджуков в 1283 году, и к 1314 году наконец обрёл долгожданную независимость, вместе с тем завоевав обширные территории, включая #TOOLTIP:LOCATION,ankara,X #L Анкару#!#!. $anatolia_desc$"
 country_history_HUN: "[GetCountry('HUN').GetLongName] уже многие века охраня[GetCountry('HUN').Custom('endlong_etyut')] рубежи #TOOLTIP:RELIGION,$catholic_tt$,X #L католического#!#! мира от язычников и нехристей. Своими недавними мятежами [GetCountry('HUN').GetGovernment.GetEstateName('nobles_estate')|l] поставили эту важную миссию под угрозу, однако [GetCountry('HUN').GetGovernment.GetRuler.GetName|l] [Select_CString(GetCountry('HUN').GetGovernment.GetRuler.IsFemale, 'смогла', 'смог' )] усмирить бунтовщиков и вновь утвердить роль нашей державы как христианского оплота.\n\nНо расслабляться рано, ибо на юго-востоке зреет новая угроза, которая испытает #italic Regnum Marianum#! на прочность.\n\nВремя покажет, какая судьба ждёт [GetCountry('HUN').Custom('CL_ACC')] — падёт эта держава перед натиском иноверцев, или же уверенно выдержит все грядущие испытания?"
 country_history_JAP_common: "После долгих лет мира, установленного Камакурским сёгунатом, японские острова вновь погрузились в пучину войны во время #L [GetCountry('MGE').GetAdjective|l]их#! нашествий. Эти события подорвали авторитет сёгуна настолько, что [GetCountry('STC').GetGovernment.GetRuler.GetName] [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'сумела', 'сумел')] вырвать власть из его рук. Однако [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'её', 'его')] мечты о восстановлении императорского правления так и не осуществились — бывший союзник [GetCountry('JAP').GetGovernment.GetRuler.GetName] основал новый #TOOLTIP:INTERNATIONAL_ORGANIZATION,$japanese_shogunate_tt$,X #L Японский сёгунат#!#!, утвердив свою власть над державой."
 country_history_JAP: "$country_history_JAP_common$\n\nТеперь [GetCountry('JAP').GetGovernment.GetRuler.GetNameWithNoTooltip|l] правит державой после того, как [GetCountry('STC').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'бежала', 'бежал')] из столицы и [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'закрепилась', 'закрепился')] в столичном городе [GetCountry('STC').GetCapital.GetName]. Однако борьба между центральным правительством и главой государства в бегах ещё далека от завершения."
 country_history_NTC: "$country_history_JAP_common$\n\nТеперь [GetCountry('JAP').GetGovernment.GetRuler.GetNameWithNoTooltip|l] [Select_CString(GetCountry('JAP').GetGovernment.GetRuler.IsFemale, 'возвела', 'возвёл')] на престол нового императора, которым [Select_CString(GetCountry('NTC').GetGovernment.GetRulerOrHeirIfRegent.IsFemale, 'стала', 'стал' )] [GetCountry('NTC').GetGovernment.GetRulerOrHeirIfRegent.GetName|l] в столичном городе [GetCountry('NTC').GetCapital.GetName], но и [Select_CString(GetCountry('NTC').GetGovernment.GetRulerOrRegent.IsFemale, 'она', 'он' )] остаётся лишь марионеткой — верховной властью обладает [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle|l]."
 country_history_STC: "$country_history_JAP_common$\n\nФактически оказавшись в изгнании, [GetCountry('STC').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'вынуждена', 'вынужден')] искать сторонников, если хочет выжить и бросить вызов власти, которую пытается навязать [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle|l]. Пришло время возвыситься — или упасть."
 country_history_japanese_clan_common: "$country_history_JAP_common$\n\nРазрозненные кланы теперь должны выбирать, какой стороне сохранить верность."
 country_history_japanese_clan_north: "$country_history_japanese_clan_common$ [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] и [GetCountry('NTC').GetLongName] видят в этом клане преданных сторонников, поэтому клан отвергает притязания на Хризантемовый трон, которые пытается навязать [GetCountry('STC').GetGovernment.GetRuler.GetNameWithNoTooltip|l]."
 country_history_japanese_clan_south: "$country_history_japanese_clan_common$ [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'Изгнанная', 'Изгнанный')] [GetCountry('STC').GetGovernment.GetRuler.GetNameWithNoTooltip|l] видит в этом клане преданных сторонников, поэтому клан поддерживает [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'её', 'его')] законные права на Хризантемовый трон и выступает против власти, которую пытается навязать [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle|l]."
 country_history_KAR: "Будучи крупнейшим субъектом некогда великой империи, мы оказались в самой гуще борьбы за власть в регионе. У нас на глазах образуются новые бейлики, каждый из которых стремится объединить разобщённые народы, оставшиеся после распада Румского султаната. Наладив дипломатические и торговые связи с правителями #TOOLTIP:LOCATION,cairo,X #L Каира#!#!, нам удалось пополнить казну и узаконить свою власть, а также укрепить контроль над богатыми городами вроде #TOOLTIP:LOCATION,konya,X #L Коньи#!#! и #TOOLTIP:LOCATION,ermenek,X #L Эрменека#!#!. $anatolia_desc$"
 country_history_KBO: "На заре XIV века представители правящей династии #TOOLTIP:DYNASTY,$sayfawa_dynasty_tt$,X #L Сайфава#!#! отчаянно борются друг с другом за власть.\n\n[GetCharacter('kbo_salmama').GetShortName] изо всех сил пытается сохранить единство нашего народа вопреки коварным планам внутренних и внешних врагов. Каждому ясно, что для державы настали тяжёлые времена, которые либо закалят нас, либо окончательно разобщат и отправят страну на свалку истории."
 country_history_KHM: "[GetCountry('KHM').GetLongName] — великая держава, которую веками все признавали центром #TOOLTIP:REGION,indochina_region,X #L Индокитая#!#!. Однако после обращения в #TOOLTIP:RELIGION,$theravada_tt$,X #L тхераваду#!#! она постепенно утратила абсолютное господство в регионе. Растущие державы к западу и востоку от древней столицы #TOOLTIP:LOCATION,angkor,X #L Ангкора#!#! угрожают нарушить сложившийся баланс сил.\n\nНарод [GetCountry('KHM').Custom('CL_GEN')], обременённый трудностями содержания ирригационных систем и грандиозных храмовых комплексов, теперь защищается ещё и от внешних вторжений, чтобы выжить и вернуть себе доминирующее положение в Индокитае."
 country_history_KNI: "После падения Акры в 1291 году [GetCountry('KNI').GetName] захватил[GetCountry('KNI').Custom('end_fem')] остров #TOOLTIP:LOCATION,rodos,X #L Родос#!#! в начале XIV века, чтобы возвести там мощную крепость для защиты #TOOLTIP:RELIGIONGROUP,christian,X #L христианских#!#! паломников. С тех пор этот живописный уголок #TOOLTIP:AREA,aegean_sea_area,X #L Эгейского моря#!#! служит главным плацдармом нашего #TOOLTIP:GOVERNMENT_REFORM,military_order_reform,X #L ордена#!#! в регионе и оживлённым торговым узлом. Процветанию острова мешают лишь постоянные нападения #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульман#!#!, но мы не уступаем врагу и каждый раз доблестно отражаем его бессмысленные атаки.\n\nТем не менее будущее ордена стоит под вопросом: противник набирает силы, а #TOOLTIP:RELIGION,$catholic_tt$,X #L католические#!#! державы разобщены и не готовы объединяться против общей угрозы. С каждым днём освобождение Святой земли становится всё менее вероятным, однако мы не сдадимся и будем сражаться до последнего воина!"
 country_history_KOR: "Образование [GetCountry('KOR').Custom('longname_ru_GEN')] под властью одноимённой династии ознаменовало новую эпоху в истории нашего народа. Это было время процветания искусства, литературы, дипломатии и веры, навсегда изменившее культурные традиции #TOOLTIP:REGION,korea_region,X #L Кореи#!#!.\n\n[GetCharacter('kublai_khan').GetName] [Select_CString(GetCharacter('kublai_khan').IsFemale, 'вынудила', 'вынудил' )] наших правителей подчиниться себе, но [GetCountry('KOR').Custom('CL_DAT')] по-прежнему удаётся быть весьма влиятельной державой благодаря своему мощному флоту и образованному населению.\n\nОднако в воздухе витает ветер перемен: с упадком #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддийских#!#! традиций и распространением будоражащих, революционных идей неоконфуцианства сознание людей начинает меняться… Смо[GetCountry('KOR').Custom('end_gegu')]т ли [GetCountry('KOR').GetNameWithNoTooltip] воспользоваться этой ситуацией, чтобы вновь обрести независимость? Или же страна останется верным вассалом #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#!?"
 country_history_LIT: "[GetCountry('LIT').GetLongName], находясь между #ONCLICK:COUNTRY,[GetCountry('POL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POL').Custom('CL_tt')],X [GetCountry('POL').Custom('CL_GEN')|L]#!#! и могущественной #ONCLICK:COUNTRY,[GetCountry('GLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GLH').Custom('CL_tt')],X [GetCountry('GLH').Custom('CL_GEN')|L]#!#!, гордится своим статусом последнего оплота язычества. Правящая династия #TOOLTIP:DYNASTY,$gediminid_dynasty_tt$,X #L Гедиминовичей#!#! уже добилась немалых успехов, расширив свои владения за счёт земель Киевской Руси. Однако растущее давление и непрекращающийся крестовый поход, который возглавляют [GetCountry('TEU').GetLongName], [GetCountry('LIV').GetLongName] и [GetCountry('BOH').GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!, служат грозным напоминанием: религиозные разногласия могут стать нашей погибелью. Многочисленные попытки принять #TOOLTIP:RELIGION,$catholic_tt$,X #L католическую#!#! веру пока не увенчались успехом, а нарастающая напряжённость на границах угрожает стабильности государства."
 country_history_MAC: "[GetCountry('MAC').Custom('longname_ru_INST')] управляет амбициозная династия #TOOLTIP:DYNASTY,$mortimer_dynasty_tt$,X #L Мортимеров#!#! — это одна из наиболее влиятельных марок на границе между #TOOLTIP:AREA,wales_area,X #L Уэльсом#!#! и [GetCountry('ENG').Custom('longname_ru_INST')].\n\nОбладавший почти королевской властью покойный [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetName] держал [GetCountry('ENG').Custom('CL_ACC')] в своих руках после того, как по его приказу был коварно убит [GetCharacter('eng_edward_ii').GetShortName], и благодаря этому [GetCountry('ENG').GetGovernment.GetActiveRegentTitle|l] обрёл необычайное влияние. Однако такие амбиции стали смертельными — в 1330 году его свергли и казнили, а на имя Мортимеров легло несмываемое пятно узурпаторов и предателей.\n\n[Select_CString(GetCharacter('eng_roger_mortimer_2nd_earl_of_march').IsFemale, 'Молодая', 'Молодой' )] [GetCharacter('eng_roger_mortimer_2nd_earl_of_march').GetName] [Select_CString(GetCharacter('eng_roger_mortimer_2nd_earl_of_march').IsFemale, 'унаследовала', 'унаследовал' )] не только обширные поместья и престиж лорда марки, но и бремя опозоренного рода. И хотя сейчас молодость [Select_CString(GetCharacter('eng_roger_mortimer_2nd_earl_of_march').IsFemale, 'её', 'его' )] хранит, английская корона пристально наблюдает за [Select_CString(GetCharacter('eng_roger_mortimer_2nd_earl_of_march').IsFemale, 'юной наследницей', 'юным наследником' )].\n\nСтанут ли [ShowDynastyNameWithNoTooltip('mortimer_dynasty')] просто ещё одним благородным родом, канув в безвестие, или же им удастся вернуть себе былое влияние по обе стороны от марки?"
 country_history_MAJ: "[GetCharacter('maj_raden_wijaya').GetName] [Select_CString(GetCharacter('maj_raden_wijaya').IsFemale, 'создала', 'создал' )] [GetCountry('MAJ').Custom('longname_ru_ACC')] — могущественную державу вдоль берегов #TOOLTIP:REGION,indonesia_region,X #L Индонезии#!#!. Однако после [Select_CString(GetCharacter('maj_raden_wijaya').IsFemale, 'её', 'его' )] смерти, на престол [Select_CString(GetCharacter('maj_jayanagara').IsFemale, 'взошла', 'взошёл' )] [GetCharacter('maj_jayanagara').GetName], [Select_CString(GetCharacter('maj_jayanagara').IsFemale, 'проявившая', 'проявивший' )] себя куда хуже: [Select_CString(GetCharacter('maj_jayanagara').IsFemale, 'её', 'его' )] правление было отмечено внутренними и внешними неурядицами, а также открытыми восстаниями против верховной власти.\n\nВ 1328 году [GetCharacter('maj_jayanagara').GetShortNameWithNoTooltip] [Select_CString(GetCharacter('maj_jayanagara').IsFemale, 'была наконец убита', 'был наконец убит' )] в результате покушения, и власть в стране [Select_CString(GetCharacter('maj_tribhuwana').IsFemale, 'сосредоточила', 'сосредоточил' )] в своих руках [GetCharacter('maj_tribhuwana').GetName], [GetCountry('MAJ').GetGovernment.GetActiveRegentTitle|l] при своём сыне по имени [GetCharacter('maj_hayam_wuruk').GetName]. Начало [Select_CString(GetCharacter('maj_tribhuwana').IsFemale, 'её', 'его' )] регентства ознаменовало новую эпоху для [GetCountry('MAJ').Custom('CL_GEN')], причём державу всячески поддерживает [GetCharacter('maj_gajah_mada').GetName] — сейчас это #italic махапати#!, вице-[GetCountry('ENG').GetGovernment.GetActiveRegentTitle|l].\n\nБез сомнения, под чутким надзором столь выдающихся государственных деятелей [GetCountry('MAJ').Custom('CL_ACC')] ждёт золотой век!"
 country_history_MAL: "[GetCharacter('mal_musa_keita').GetName] из #ONCLICK:COUNTRY,[GetCountry('MAL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MAL').Custom('CL_tt')],X [GetCountry('MAL').Custom('CL_GEN')|L]#!#! тринадцать лет назад потряс весь мир, когда совершил #italic хадж#! в Мекку. По пути он щедро тратил золото на благо веры: строил молельные дома и привлекал в свою свиту талантливых людей. Менестрели прославляли его как богатейшего человека во всём мире, а летописцы в красках описывали, какой щедрый #italic закят#! (милостыню) он раздаёт везде, где проходит его длинный и роскошный караван.\n\nПодобная демонстрация щедрости безусловно отражала невероятное богатство [GetCountry('MAL').Custom('CL_GEN')], чьи земли значительно расширились и объединились под властью династии [GetCountry('MAL').GetGovernment.GetRuler.GetDynasty.GetName] в результате налаженной и обширной сети торговых путей. Впрочем, когда [GetCharacter('mal_musa_keita').GetShortNameWithNoTooltip] покинет этот мир, его наследникам будет непросто удержать в руках его несметные богатства и населённые столь разными народами владения…"
 country_history_MAM: "Мамлюкская держава, выкованная в огне переворота и поддержанная мечами воинов-рабов с #TOOLTIP:REGION,caucasus_region,X #L Кавказа#!#!, была рождена после падения #ONCLICK:COUNTRY,[GetCountry('HSN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HSN').Custom('CL_tt')],X [GetCountry('HSN').Custom('CL_GEN')|L]#!#!. Под управлением таких прославленных правителей, как [GetCharacter('mam_baybars_ii').GetName], мамлюки остановили #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольское#!#! нашествие у города #TOOLTIP:LOCATION,nablus,X #L Наблус#!#! в битве при Айн-Джалуте и сокрушили последний оплот крестоносцев — [GetCountry('KOJ').Custom('longname_ru_ACC')]. Теперь [GetCountry('MAM').GetLongName] стал[GetCountry('MAM').Custom('endlong_fem')] доминирующей #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманской#!#! силой всего Восточного Средиземноморья, управляя #TOOLTIP:REGION,egypt_region,X #L Египтом#!#! и #TOOLTIP:AREA,levant_area,X #L Левантом#!#! из своей блистательной столицы — #TOOLTIP:LOCATION,cairo,X #L Каира#!#!.\n\nПолучив легитимность благодаря этим победам, авторитету марионеточного халифа, обосновавшегося в Каире, а также статусу хранителей #TOOLTIP:LOCATION,mecca,X #L Мекки#!#! и #TOOLTIP:LOCATION,medina,X #L Медины#!#!, [GetCharacter('mam_an_nasir_bahri').GetName] [Select_CString(GetCharacter('mam_an_nasir_bahri').IsFemale, 'сумела', 'сумел' )] добиться редкой стабильности в стране, разбогатевшей на торговле. Однако выживание [GetCountry('MAM').Custom('rank_ru_GEN')|l] зависит от лояльности разрозненной военной элиты, и неизбежные кризисы наследования постоянно угрожают разрушить это могущественное государство."
 country_history_MLO: "Политические хитросплетения на Итальянском полуострове не так-то просто разобрать. Враги и друзья, союзники и противники — это лишь ярлыки, которые меняются, словно маски, и [GetCountry('MLO').GetName] не исключение. Опираясь на развитый город #TOOLTIP:LOCATION,milano,X #L Милан#!#!, мы можем распространять своё влияние на недавно завоёванные земли, одновременно защищаясь от вторжений с востока и запада. В то же время другие города нашей державы также начинают обретать всё больше могущества и автономии, что может привести к раздробленности и ослаблению нашей власти. Словом, опасности подстерегают нас, будто острые кинжалы в тёмном переулке.\n\nОднако даже в такой недружелюбной ситуации #TOOLTIP:LOCATION,milano,X #L Милан#!#! занимает весьма выгодное положение. И если нам удастся устранить все внутренние и внешние угрозы, мы обретём невероятное богатство, славу и престиж."
 country_history_MOR: "Магриб видел взлёты и падения многих династий — от Идрисидов до Альморавидов и Альмохадов — одна за другой сменялись могущественные #L [GetCountry('MOR').GetAdjective|l]ие#! державы. Эпоха нестабильности и неуверенности завершилась, когда к власти пришла династия #TOOLTIP:DYNASTY,$marinid_dynasty_tt$,X #L Маринидов#!#! и [GetCharacter('mor_abu_al_hasan_ali').GetName]. Благодаря искусному сочетанию военной силы и дипломатической хитрости нам удалось укрепить власть в своих землях.\n\nТеперь наши устремления обращены на восток, где мы бросим вызов #TOOLTIP:DYNASTY,$zayyanid_dynasty_tt$,X #L зайянидскому#!#! господству #ONCLICK:COUNTRY,[GetCountry('TLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TLE').Custom('CL_tt')],X [GetCountry('TLE').Custom('CL_GEN')|L]#!#!. А на севере, от #TOOLTIP:LOCATION,algeciras,X #L Альхесираса#!#! до #TOOLTIP:LOCATION,ronda,X #L Ронды#!#!, мы удерживаем стратегический плацдарм по ту сторону #TOOLTIP:LOCATION,strait_of_gibraltar,X #L Гибралтарского пролива#!#!, выступая в союзе со своими братьями по вере — мусульманами из #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_GEN')|L]#!#! — в общей борьбе против христианских правителей Иберии. Наш путь не будет простым, но нам хватит сил и решимости преодолеть все преграды на пути к цели."
 country_history_MOS: "[GetCountry('MOS').Custom('longname_ru_ACC')] терзают политические интриги, экономические трудности под татарским игом и непрекращающаяся борьба за власть между русскими княжествами, каждое из которых стремится к господству над раздробленными землями Руси. Татарское нашествие по-прежнему нависает тенью над всем регионом, власти [GetCountry('MOS').Custom('CL_GEN')], как и другие русские княжества, остаются данниками #ONCLICK:COUNTRY,[GetCountry('GLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GLH').Custom('CL_tt')],X [GetCountry('GLH').Custom('CL_GEN')|L]#!#!.\n\nЧерез все эти сложности [GetCountry('MOS').Custom('CL_ACC')] ведёт [GetCountry('MOS').GetGovernment.GetRuler.GetName|l] — [Select_CString(GetCountry('MOS').GetGovernment.GetRuler.IsFemale, 'которая хорошо понимает', 'который хорошо понимает')], насколько тонка грань, по которой мы вынуждены ходить ради выживания под властью татар. Благодаря дипломатической хитрости и стратегическим союзам [Select_CString(GetCountry('MOS').GetGovernment.GetRuler.IsFemale, 'она', 'он')] умело управляет делами княжества, а теперь ещё стремится укрепить свою власть и повысить статус [GetCountry('MOS').Custom('CL_GEN')] в составе ига, потому что мечтает объединить русские земли под одним знаменем."
 country_history_NAP: "История [GetCountry('NAP').Custom('longname_ru_GEN')] полна взлётов и падений, и сейчас мы вновь на перепутье. [GetCountry('NAP').Custom('CL_ACC')] основали амбициозные правители из влиятельных династий, которые стремились подчинить себе земли на юге Италии. Сегодня этот город является важнейшим культурным центром, где сохранились следы самых разных народов и цивилизаций, начиная от древних греков и римлян, заканчивая готвильскими, #TOOLTIP:DYNASTY,$hohenstaufen_dynasty_tt$,X #L гогенштауфенскими#!#! и #TOOLTIP:DYNASTY,$anjou_dynasty_tt$,X #L анжуйскими#!#! династиями.\n\nВ 1337 году нашим королевством правит [GetCountry('NAP').GetGovernment.GetRuler.GetName|l] — [Select_CString(GetCountry('NAP').GetGovernment.GetRuler.IsFemale, 'мудрая и справедливая правительница', 'мудрый и справедливый монарх' )] с острым умом и тонким политическим чутьём. Благодаря [Select_CString(GetCountry('NAP').GetGovernment.GetRuler.IsFemale, 'ей', 'ему' )] наше государство переживает период относительного спокойствия после череды тяжёлых испытаний.\n\nНо что ждёт [GetCountry('NAP').GetAdjectiveWithNoTooltip|l]ие земли, когда [Select_CString(GetCountry('NAP').GetGovernment.GetRuler.IsFemale, 'правительницы', 'правителя' )] не станет? Сможет ли [Select_CString(GetCountry('NAP').GetGovernment.GetRuler.IsFemale, 'её', 'его' )] преемник дать отпор врагам, которые только и ждут, чтобы прибрать к рукам нашу страну? История нашей державы ещё далека от завершения…"
 country_history_NAV: "[GetCountry('NAV').GetLongName], или #italic Королевство Памплона#!, как его [Select_CString(GetCharacter('nav_inigo_arista').IsFemale, 'назвала', 'назвал' )] [GetCharacter('nav_inigo_arista').GetName] после основания державы вокруг #TOOLTIP:LOCATION,pamplona,X #L одноимённого города#!#!, ныне пережива[GetCountry('NAV').Custom('endlong_etyut')] упадок. Страна зажата между землями более крупных соседей, с жадностью глядящих на её земли. Она появилась на свет в качестве #TOOLTIP:CULTURE,$basque_tt$,X #L баскской#!#! марки Каролингской империи, пережила как восход и падение местных династий, так и их замену #TOOLTIP:CULTURE,$french_tt$,X #L французами#!#!, в результате чего начала политически тяготеть в сторону [GetCountry('FRA').Custom('longname_ru_GEN')].\n\nСмо[GetCountry('NAV').Custom('endlong_gegu')] ли [GetCountry('NAV').GetLongNameWithNoTooltip] вернуть былую славу и сопротивляться воле более могущественных соседей, когда все пути для расширения закрыты, а культурное давление лишь растёт?"
 country_history_NOV: "#TOOLTIP:LOCATION,novgorod,X #L Новгород#!#! был основан #TOOLTIP:CULTUREGROUP,slavic_group,X #L славянами#!#! и скандинавами под именем #italic Хольмгард#!, а сегодня является главным политическим и торговым центром на севере #TOOLTIP:CULTUREGROUP,russian_group,X #L восточнославянских#!#! земель. Формально им управляет [GetCountry('NOV').GetGovernment.GetRulerTitle|l] после победы на выборах из числа правителей соседних держав, однако истинной властью здесь обладает [GetCountry('NOV').GetGovernment.GetParliament.GetName|l]. А благодаря торговым путям, которые связывают богатые ресурсами #L [GetCountry('NOV').GetAdjective|l]ие#! районы с Балтикой и Белым морем, наше государство процветает.\n\nТем не менее последние десятилетия нашей истории омрачены постоянными конфликтами [GetCountry('SWE').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_INST')|L]#!#!, и лишь создание крепости на территории #ONCLICK:COUNTRY,[GetCountry('ORE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ORE').Custom('CL_tt')],X [GetCountry('ORE').Custom('CL_GEN')|L]#!#! в качестве приграничного плацдарма обеспечило нам относительное затишье. Тем временем на юге набира[GetCountry('MOS').Custom('end_etyut')] мощь [GetCountry('MOS').GetName], а за этой державой сто[GetCountry('GLH').Custom('endlong_ityat')] [GetCountry('GLH').GetLongName]. По всей видимости, в ближайшие годы гордые и независимые новгородцы окажутся на перепутье и будут принимать нелёгкие, но всё же необходимые, решения для защиты своих земель."
 country_history_PAL: "$country_history_german_group$\n\n[GetCountry('PAL').GetLongName], получив по Павийскому договору независимость и статус курфюршества, теперь сто[GetCountry('PAL').Custom('endlong_ityat')] перед важной задачей объединения разрозненных владений. [GetCharacter('pal_rudolf_ii_wittelsbach').GetName] [Select_CString(GetCharacter('pal_rudolf_ii_wittelsbach'.IsFemale, 'должна', 'должен' )] сосредоточиться на укреплении державы. На берегах Рейна расположен политический и экономический центр #ONCLICK:COUNTRY,[GetCountry('PAL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAL').Custom('CL_tt')],X [GetCountry('PAL').Custom('CL_GEN')|L]#!#! с плодородными землями и оживлёнными торговыми путями. В то же время #italic Верхний Пфальц#! сохраняет тесную связь с баварскими корнями правящей династии [GetCountry('PAL').GetGovernment.GetRuler.GetDynasty.GetName].\n\nКаким бы курсом ни пошла страна, [GetCountry('PAL').Custom('CL_DAT')] предстоит преодолеть сопротивление региональных соперников, чтобы не оказаться под угрозой поглощения более сильными соседями."
 country_history_PAP: "С тех самых времён, как святой Пётр основал католическую церковь, её служители ревностно занимаются спасением человеческих душ под чутким руководством Епископа #TOOLTIP:LOCATION,rome,X #L Римского#!#!, которого называют «[GetCountry('PAP').GetGovernment.GetRulerTitle]».#italic Пипинов дар#! стал основанием для создания #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_GEN')|L]#!#! — настоящего оплота веры, который призван помогать людям и наставлять их на верный путь.\n\nОднако в последние десятилетия мы столкнулись со множеством испытаний. Когда скончался [GetCharacter('pap_boniface_viii').GetName], наше правительство было вынуждено переместиться в #TOOLTIP:LOCATION,avignon,X #L Авиньон#!#!, где на него начал оказывать влияние [GetCharacter('fra_philippe_iv_capet').GetName]. Кроме того, наши #TOOLTIP:REGION,italy_region,X #L итальянские#!#! владения оказались в руках враждующих династий.\n\nВоистину, [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale,'Наместница', 'Наместник')] Христа [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'оказалась', 'оказался' )] в тяжёлом положении. Станет ли [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'она', 'он' )] марионеткой [GetCountry('FRA').Custom('longname_ru_GEN')], позволит ли светской власти возвыситься над духовной? Или же [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'ей', 'ему' )] удастся вырваться из-под иностранного влияния и вновь занять уготованное [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'ей', 'ему' )] Богом место во главе церкви?"
 country_history_POL: "[GetCountry('POL').GetLongName] веками страда[GetCountry('POL').Custom('endlong_etyut')] от войн, династических распрей и переменчивых границ. Нынешний правитель [GetCharacter('pol_casimir_iii_piast').GetName] начал своё энергичное правление в 1333 году, но несмотря на все его усилия по объединению державы, многие [GetCountry('POL').GetAdjectiveWithNoTooltip|l]ие ленники продолжают отстаивать свои традиционные свободы в противовес дипломатическим устремлениям, которые лелеет [GetCountry('POL').GetGovernment.GetRulerTitle|l]. Тем не менее, желая изменить жизнь и законы в стране, [GetCharacter('pol_casimir_iii_piast').GetShortNameWithNoTooltip] уже [Select_CString(GetCharacter('pol_casimir_iii_piast').IsFemale, 'закрепила', 'закрепил' )] некоторые права за #TOOLTIP:RELIGION,$judaism_tt$,X #L иудейским#!#! меньшинством страны, как и за [GetCountry('POL').GetAdjectiveWithNoTooltip|l]ими крестьянами, заслужив себе прозвище «[GetCountry('POL').GetGovernment.GetRulerTitle] холопов».\n\nОднако не стихает война против [GetCountry('TEU').Custom('longname_ru_GEN')], в которой [GetCharacter('pol_casimir_iii_piast').GetShortNameWithNoTooltip] и [GetCharacter('lit_gediminas_gediminids').GetName] сражаются плечом к плечу против общего врага, надеясь вернуть занятые им земли.\n\nСможет ли [GetCountry('POL').GetGovernment.GetRuler.GetName|l] установить прочный мир [GetCountry('TEU').Custom('endlong_predlog_sso')] [GetCountry('TEU').Custom('longname_ru_INST')] и продолжить свои внутренние реформы, или война будет и дальше разорять [GetCountry('POL').GetAdjectiveWithNoTooltip|l]ие земли?"
 country_history_PLE: "[GetCountry('PLE').GetName|U] (от англ. pale, букв. «граница, ограда, застава») — последний оплот [GetCountry('ENG').Custom('CL_GEN')] в #TOOLTIP:REGION,ireland_region,X #L Ирландии#!#!. Именно здесь находится #TOOLTIP:LOCATION,dublin,X #L Дублинский#!#! замок. Земли Пейла примыкают к восточному побережью, а его границы укреплены рвами и изгородями.\n\nОстальной частью Ирландии управляют #TOOLTIP:CULTURE,$anglo_irish_tt$,X #L англо-ирландские#!#! графы, чьи владения входят в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$lordship_of_ireland_tt$,X #L манор Ирландия#!#!. За годы жизни в гэльских диких землях они сблизились с местными #TOOLTIP:CULTURE,$irish_tt$,X #L ирландскими#!#! лордами и растеряли прежние связи.\n\nТем не менее Дублин остаётся политическим, правовым и торговым центром #TOOLTIP:CULTURE,$english_tt$,X #L английской#!#! колонии в Ирландии. Пока королевские наместники пытаются укрепить власть короны, слабый ирландский парламент принимает законы, которые никто не собирается исполнять.\n\nУдастся ли манору Ирландия вернуть утраченные территории? Или же он продолжит терять земли и влияние, пока гэльские лорды и пограничные графы делят Изумрудный остров между собой?"
 country_history_POR: "[GetCountry('POR').GetLongName] получил[GetCountry('POR').Custom('endlong_fem')] независимость после долгой и напряжённой борьбы как с #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманскими#!#!, так и с #TOOLTIP:RELIGIONGROUP,christian,X #L христианскими#!#! правителями #TOOLTIP:REGION,iberia_region,X #L Иберии#!#!. После того, как [GetCharacter('por_dinis_i_portugal').GetShortName] провёл важные социальные, экономические и культурные реформы, его сын и наследник [GetCharacter('por_afonso_iv_portugal').GetName], а также весь #TOOLTIP:CULTURE,$portuguese_tt$,X #L португальский#!#! народ теперь стоят перед новыми задачами и возможностями.\n\nНа западе и юге простирается бескрайний #TOOLTIP:REGION,north_atlantic_ocean_region,X #L Северный Атлантический океан#!#!, благодаря чему мы можем торговать с дальними землями. На востоке лежит могущественная держава — [GetCountry('CAS').GetLongName] — которая связана [GetCountry('POR').Custom('endlong_predlog_sso')] [GetCountry('POR').Custom('CL_INST')] тесными династическими узами. Она может стать как помешать, так и помочь объединению Иберии под португальским началом.\n\nКак бы то ни было, [GetCountry('POR').Custom('CL_DAT')] предстоит укрепить позиции, чтобы гарантировать себе независимость в будущем."
 country_history_SCO: "Над #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_INST')|L]#!#! вновь нависает угроза!\n\n[GetCharacter('sco_robert_the_bruce').GetName], наш бывший король, а также доблестный рыцарь Уильям Уоллес совсем недавно освободили страну от #L [GetCountry('ENG').GetAdjective|l]ого#! гнёта.\n\n[GetCharacter('sco_david_ii').GetName], юный наследник короля, теперь вынужден искать убежища [GetCountry('FRA').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#!, пока шотландская знать борется против #ONCLICK:COUNTRY,[GetCountry('SBL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SBL').Custom('CL_tt')],X [GetCountry('SBL').Custom('CL_GEN')|L]#!#! — [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ого прихвостня, претендующего на [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ий престол.\n\nСейчас народ един в своём стремлении освободиться, но эта сплочённость может рухнуть в любой момент, поскольку в королевстве уже давно назрел конфликт между зажиточными англоязычными шотландцами из низин и независимыми кланами с Северо-Шотландского нагорья.\n\nКогда-то римские захватчики построили вокруг нас стену в страхе перед [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ой жестокостью. Возможно, как раз пришла пора проявить её…"
 country_history_SBL: "Над #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_INST')|L]#!#! сгущаются тучи.\n\n[GetCharacter('sco_robert_the_bruce').GetName] всего пару десятилетий назад самовольно присвоил шотландскую корону и изгнал #L [GetCountry('ENG').GetAdjective|l]ие#! войска из страны.\n\n[GetCharacter('sco_edward_balliol').GetName], его [Select_CString(GetCharacter('sco_edward_balliol').IsFemale, 'дочь', 'сын' )], по логике вещей является [Select_CString(GetCharacter('sco_edward_balliol').IsFemale, 'наследницей', 'наследником' )] и решает исправить эту несправедливость, заявив о правах на [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ий престол. Заручившись поддержкой [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]их приспешников, [Select_CString(GetCharacter('sco_edward_balliol').IsFemale, 'она готова', 'он готов' )] бросить вызов узурпатору, чтобы вернуть себе [GetCountry('SCO').Custom('CL_ACC')]. Но это будет непросто…"
 country_history_SER: "[GetCountry('SER').GetName] занима[GetCountry('SER').Custom('end_etyut')] плодородные низменности и равнины севера, изрезанные течением могучих рек Дунай и Сава. К югу ландшафт сменяется суровыми лесистыми землями, которые переходят в неприступные Динарские Альпы.\n\n[GetCountry('SER').GetNameWithNoTooltip] стал[GetCountry('SER').Custom('end_fem')] значимой силой в регионе за время правления династии #TOOLTIP:DYNASTY,$nemanjic_dynasty_tt$,X #L Неманичей#!#!. Эта королевская династия, основанная Стефаном Неманей в XII веке, заложила основы единого [GetCountry('SER').GetAdjectiveWithNoTooltip|l]ого государства, укрепила его #TOOLTIP:RELIGION,$orthodox_tt$,X #L православную#!#! идентичность и добилась церковной самостоятельности. В 1219 году эти усилия увенчались успехом: [GetCountry('SER').GetAdjectiveWithNoTooltip]ая православная церковь получила независимость.\n\nПри Стефане Первовенчанном началось стремительное расширение границ. Захват прибрежных земель на #TOOLTIP:PROVINCE_DEFINITION,adriatic_sea_province,X #L Адриатике#!#! открыл державе доступ к морской торговле и привнёс западное влияние. Сын правителя, король Радослав, поощрял развитие культуры, поддерживая образование и искусство. Монастыри — такие как Студеница и Жича — стали центрами просвещения, в которых хранятся бесценные рукописи и фрески.\n\nОднако, несмотря на расцвет, [GetCountry('SER').GetNameWithNoTooltip] столкнул[GetCountry('SER').Custom('end_assya')] с внешними угрозами и внутренними распрями. #L [GetCountry('MGE').GetAdjective]ое#! вторжение в XIII веке нанесло стране тяжёлый урон, а также спровоцировало конфликты внутри династии Неманичей. [GetCharacter('ser_stefan_milutin').GetName] и [GetCharacter('ser_stefan_dragutin').GetName], король и его брат, окончательно подорвали в своей борьбе единство государства. Хотя теперь всё может измениться, ведь [GetCharacter('ser_stefan_dusan').GetName] твёрдо держит власть в своих руках, получив шанс переломить ход истории."
 country_history_SWE: "[GetCountry('SWE').GetLongName] — это [GetCountry('SWE').GetFlavorRank|l] в своей феодальной эпохе. [GetCharacter('swe_magnus_eriksson').GetName] правит не только этой державой, но и #ONCLICK:COUNTRY,[GetCountry('NOR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NOR').Custom('CL_tt')],X [GetCountry('NOR').Custom('CL_INST')|L]#!#!. Всего несколько лет назад мы выкупили у обедневших датчан [GetCountry('SKE').Custom('longname_ru_ACC')]. Наша страна огромна, но слабо заселена и в основном покрыта густыми лесами. Однако в недрах под ними лежат #TOOLTIP:GOODS,iron,X железные#! и #TOOLTIP:GOODS,copper,X медные#! руды, и их добыча может обогатить нашу державу.\n\nПеред нами стоят трудные задачи: [GetCountry('NOV').GetLongName] оспарива[GetCountry('NOV').Custom('endlong_etyut')] наш контроль над Ингрией, а [GetCountry('DAN').GetLongName] и [GetCountry('TEU').GetLongName] контролируют обширные земли к югу — эти земли могли бы пригодиться нашей стране.\n\nУ [GetCountry('SWE').Custom('CL_GEN')] есть шанс стать одной из величайших держав мира. Сможем ли мы преодолеть все преграды, приобрести заслуженное могущество и достичь #italic Dominium Maris Baltici#! — владычества над Балтийским морем?"
 country_history_TEU: "Славный #italic Орден братьев Немецкого дома Святой Марии в Иерусалиме#!, более известный как [GetCountry('TEU').GetLongName], продолжает расширять свои владения на суровых берегах Балтийского моря. Хотя изначально орден был основан для защиты #TOOLTIP:RELIGIONGROUP,christian,X #L христианских#!#! паломников на Святой земле, сегодня мы ставим своей целью распространение христианства среди языческих племён #TOOLTIP:AREA,prussia_area,X #L Пруссии#!#! и #TOOLTIP:AREA,baltic_area,X #L Балтики#!#!. Именно для исполнения столь важной миссии и было решено создать здесь новое государство.\n\n[GetCharacter('teu_werner_von_orseln').GetName], предыдущий Великий магистр, [Select_CString(GetCharacter('teu_werner_von_orseln').IsFemale, 'смогла', 'смог' )] присоединить к ордену значительные территории, но это привело к неприятным последствиям: язычники объединились против нас, поэтому теперь нам противостоит гораздо более грозный противник — [GetCountry('LIT').GetLongName]. Хуже того, они смогли привлечь на свою сторону [GetCountry('POL').Custom('longname_ru_ACC')], чьи #TOOLTIP:RELIGION,$catholic_tt$,X #L католические#!#! правители охотно забыли о своём христианском долге ради возможной выгоды.\n\nПришло время доказать, что мы достойны призвания, которое было послано нам свыше. Пусть враги окружают нас со всех сторон, мы всё равно не отречёмся от своей веры!"
 country_history_THO: "[GetCharacter('mcm_brian_boruma').GetName], великий верховный король Ирландии, был родоначальником клана [ShowDynastyName('o_brien_dynasty')]. Некогда наши предки твёрдой рукой правили #ONCLICK:COUNTRY,[GetCountry('MCM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MCM').Custom('CL_tt')],X [GetCountry('MCM').Custom('CL_INST')|L]#!#!, чья территория занимала пятую часть всего острова. Однако коварный клан [ShowDynastyName('mac_carthaigh_dynasty')] отнял наши земли и вытеснил нас на север.\n\nС тех пор мы обосновались возле устья реки Шаннон, где и основали #ONCLICK:COUNTRY,[GetCountry('THO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('THO').Custom('CL_tt')],X [GetCountry('THO').Custom('CL_ACC')|L]#!#!. Здесь мы окружены могущественными #TOOLTIP:CULTURE,$irish_tt$,X #L ирландскими#!#! королевствами и #TOOLTIP:CULTURE,$anglo_irish_tt$,X #L англо-ирландскими#!#! графствами, между которыми сохраняются напряжённые отношения.\n\nНесмотря на все трудности, сегодня перед нами открывается множество дорог. Мы можем попытаться вернуть себе контроль над [GetCountry('MCM').Custom('CL_INST')], или пойти ещё дальше и вновь объединить Верховное Королевство под знаменем династии [ShowDynastyNameWithNoTooltip('o_brien_dynasty')]."
 country_history_TRE: "[GetCountry('TRE').GetLongName] — последний оплот некогда могущественной династии [GetCountry('TRE').GetGovernment.GetRuler.GetDynasty.GetName]. Эта держава на берегу Чёрного моря стала свидетелем взлёта и падения Никейской империи. Чтобы пережить бурю во время тюркских набегов, опустошающих Анатолию, [GetCharacter('tre_basil_komnenos').GetName] [Select_CString(GetCharacter('tre_basil_komnenos').IsFemale, 'вынуждена', 'вынужден' )] полагаться на шаткий союз [GetCountry('BYZ').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_INST')|L]#!#!. Тем временем #L [GetCountry('GEN').GetAdjective|l]ие#! купцы практически монополизировали торговые потоки через Крым и Чёрное море, лишив [GetCountry('TRE').Custom('CL_ACC')] значительной части доходов. [GetCharacter('byz_andronikos_iii_palaiologos').GetName] [Select_CString(GetCharacter('byz_andronikos_iii_palaiologos').IsFemale, 'выдала', 'выдал' )] замуж свою внебрачную дочь, но этот союз не оправдал надежд. А ситуация в столице всё ухудшается из-за набегов с юга и внутренних конфликтов со схолариями…\n\nЧтобы сохранить то, за что мы боролись, мы должны всеми силами держаться за власть, не брезгуя ни коварством, ни золотом, ни силой."
 country_history_TUR: "[GetCountry('TUR').Custom('longname_ru_ACC')] [Select_CString(GetCharacter('tur_osman').IsFemale, 'основала', 'основал' )] примерно в 1299 году вождь племени Каи из огузских тюрок по имени [GetCharacter('tur_osman').GetName]. Первоначально это был всего один из многих бейликов на северо-западном побережье #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#!, которые занимали пограничные земли некогда могущественного Румского султаната. При власти этого вождя османы укрепили и значительно расширили свои владения, захватив стратегически важные земли вдоль #TOOLTIP:LOCATION,bosphorus,X #L Босфора#!#!. Благодаря успешным набегам, военным победам и искусной дипломатии они превратились в один из самых могущественных бейликов региона, стремительно набирающий силу. Наш народ находчив и открыт всему новому, мы терпимы к неверным и готовы принимать порабощённые народы вместе с их традициями и обычаями. Вот почему наше общество — уникальный сплав всего лучшего, что есть в людях.\n\n[GetCountry('TUR').GetLongNameWithNoTooltip] — уникальный пример утончённой цивилизации, но это не значит, что мы не знаем бед. Наши дни омрачают распри между независимыми племенами и бесконечные кризисы престолонаследования, а также постоянная угроза со стороны соседних #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#! и Ильханата, не говоря уже о других бейликах.\n\nНо несмотря на этих собак, кусающих нас за ноги, мы смело шагаем в будущее. Станем ли мы завоевателями, дипломатами, торговцами или творцами, покажет время."
 country_history_ULS: "Некогда могущественное графство [GetCountry('ULS').GetLongName] ныне лежит в руинах. [GetCharacter('uls_william_donn_de_burgh_3rd_earl_ulster').GetName] был предательски убит в 1333 году. [GetCharacter('uls_elizabeth_de_burgh_4th_countess_ulster').GetShortName] [Select_CString(GetCharacter('uls_elizabeth_de_burgh_4th_countess_ulster').IsFemale, 'осталась его единственной годовалой наследницей', 'остался его единственным годовалым наследником' )]. Из-за ослабления нашей власти младшие ветви рода де Бург, а именно их державы [GetCountry('CLR').GetName], [GetCountry('MYO').GetName] и [GetCountry('CWM').GetName], начали бороться между собой за контроль над родовыми землями.\n\nТем временем враждующие представители рода #TOOLTIP:DYNASTY,$o_neill_dynasty_tt$,X #L О’Нилл#!#!, под управлением которых находятся [GetCountry('TYR').GetName] и [GetCountry('CLA').GetName], тоже пользуются нашим бедственным положением и безнаказанно опустошают наши законные владения.\n\nВ свою очередь королевская администрация, управляющая #ONCLICK:COUNTRY,[GetCountry('PLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PLE').Custom('CL_tt')],X [GetCountry('PLE').Custom('CL_INST')|L]#!#!, тоже переживает кризис, а потому не в состоянии вмешаться и усмирить разбойников. В связи с этим нам остаётся лишь выжидать за стенами своего неприступного замка #TOOLTIP:LOCATION,carrickfergus,X #L Каррикфергус#!#!. Но что нас ждёт в будущем? Канем ли мы в безвестность, или всё-таки сможем вернуть себе статус влиятельной #TOOLTIP:CULTURE,$anglo_irish_tt$,X #L англо-ирландской#!#! державы?"
 country_history_VEN: "[GetCountry('VEN').GetLongName] — важнейшая и самая могущественная из торговых республик на Средиземном море. Она контролирует ключевые торговые порты и острова, которые называются #italic Stado do Mar#!, а также многие внутренние районы на севере #TOOLTIP:REGION,italy_region,X #L Италии#!#!, или #italic Domini di Terraferma#!. Процветая благодаря развитой торговле, [GetCountry('VEN').GetNameWithNoTooltip] стал[GetCountry('VEN').Custom('end_fem')] образцом богатства и культуры, настоящей жемчужиной #TOOLTIP:AREA,adriatic_sea_area,X #L Адриатики#!#!.\n\nИ всё же, городу в лагуне не следует почивать на лаврах: вокруг появляются новые угрозы. На востоке [GetCountry('BYZ').GetLongName] ещё нескоро забуд[GetCountry('BYZ').Custom('endlong_etut')] Четвёртый крестовый поход и [GetCountry('VEN').GetAdjectiveWithNoTooltip|l]ую роль в тех событиях. На западе расширяют влияние [GetCountry('GEN').GetLongName] и [GetCountry('ARA').GetLongName], захватывая новые земли и торговые пути. Наконец, [GetCountry('VER').GetLongName] станов[GetCountry('VER').Custom('endlong_ityat')]ся всё более ощутимой угрозой для #italic Террафермы#!.\n\nЧто сулит [GetCountry('VEN').Custom('rank_ru_DAT')|l] будущее? Падение от рук недругов или вознесение на вершины, к полному и бесспорному контролю над #italic Mare Nostrum#!?"
 country_history_VIJ: "[GetCountry('VIJ').GetLongName] — это недавно основанное государство укрепило свои позиции после решительного разгрома #L [GetCountry('DLH').GetAdjective|l]их#! войск в #TOOLTIP:REGION,deccan_region,X #L Декане#!#!. Во главе борьбы против #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманских#!#! правителей Индии стоят [GetCharacter('vij_harihara_sangama').GetName] и его брат [GetCharacter('vij_bukka_raya_sangama').GetName].\n\nХотя [GetCountry('VIJ').GetAdjectiveWithNoTooltip|l]ая власть установилась лишь недавно, текущая ситуация в Декане открывает перед нами возможности для стремительного возвышения. Грамотно воспользовавшись моментом, мы сможем установить контроль над важными торговыми путями между Китаем и #TOOLTIP:CONTINENT,europe,X #L Европой#!#!, а также извлечь выгоду из экспорта ценных товаров с наших богатых ресурсами земель.\n\n[GetCountry('VIJ').GetNameWithNoTooltip] сейчас на пороге великих перемен. Осмелимся ли мы перешагнуть этот порог и громко заявить о себе?"
 country_history_WLS: "#L [GetCountry('WLS').GetAdjective]ий#! народ является потомком древних кельтских племён Британии. Когда-то наши владения простирались от туманных северных нагорий до суровых меловых утёсов на юге. Земля фей и поэтов, дождей и моря, [GetCountry('WLS').GetName] был[GetCountry('SUK').Custom('endlong_fem')] ни на что непохожим краем. Но этот народ не смог удержать власть над своей родиной.\n\nСначала пришли англосаксонские завоеватели, которые фактически заняли место павшей Римской империи, и оттеснили нас к скалистым окраинам острова. Затем явились норманнские рыцари, которые окончательно заняли наши земли и отобрали у наших принцев наследных прав.\n\nНынешние правители Уэльса подчиняются #L [GetCountry('ENG').GetAdjective|l]ой#! короне. По её мандату они управляют как англо-норманнскими марками в южных долинах, так и [GetCountry('WLS').GetAdjectiveWithNoTooltip|l]ими землями в северных горах.\n\nОднако за песнями наших музыкантов и мерным шумом дождя слышен тихий мятежный ропот. Это станет началом освобождения наших родных земель, или #TOOLTIP:DYNASTY,$plantagenet_dynasty_tt$,X #L Плантагенеты#!#! всегда будут властвовать над [GetCountry('WLS').Custom('CL_INST')]?"
 country_history_ZAN: "[GetCountry('ZAN').GetLongName] управля[GetCountry('ZAN').Custom('endlong_etyut')] обширной сетью торговых путей #TOOLTIP:REGION,indian_ocean_region,X #L Индийского океана#!#! и облада[GetCountry('ZAN').Custom('endlong_etyut')] прочным положением могущественной морской державы на #TOOLTIP:REGION,swahili_coast_region,X #L Суахильском побережье#!#!. Более века правители [GetCountry('ZAN').Custom('CL_GEN')] использовали своё стратегическое положение, чтобы контролировать прибыльные маршруты, связывающие #TOOLTIP:CONTINENT,africa,X #L Африку#!#!, #TOOLTIP:REGION,arabia_region,X #L Аравию#!#!, Индию и даже Китай.\n\nИх богатство строилось на обмене золота из глубинных районов Африки, #TOOLTIP:GOODS,ivory,X #L поделочной кости#!#!, #TOOLTIP:POPTYPE,slaves,X #L рабов#!#! и других местных товаров на роскошные изделия — #TOOLTIP:CULTURE,$farsi_culture_tt$,X #L персидские#!#! шёлковые ткани, #TOOLTIP:CULTUREGROUP,indian_group,X #L индийские#!#! текстильные изделия и #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайский#!#! фарфор. Процветание [GetCountry('ZAN').Custom('CL_GEN')] отражалось в великолепной архитектуре, олицетворявшей величие и утончённость.\n\nВремя покажет, какое будущее уготовано [GetCountry('ZAN').Custom('CL_DAT')]. [GetCountry('ZMW').GetName] укрепля[GetCountry('ZMW').Custom('end_etyut')] свою власть на юго-западе, а конкуренция на зарубежных рынках становится всё более ожесточённой.\n\nКакие тайны ждут впереди? Время покажет."
 country_history_ZMW: "Благодаря контролю над богатствами Юго-Восточной Африки [GetCountry('ZMW').GetLongName] пережива[GetCountry('ZMW').Custom('endlong_etyut')] период стабильности и процветания. Оживлённая торговля с купцами #TOOLTIP:REGION,swahili_coast_region,X #L Суахильского побережья#!#! обеспечивает постоянный приток экзотических товаров из далёких Индии и Китая, а рудники в глубине континента кажутся неиссякаемым источником сокровищ. Наша столица, крупнейший город в окрестности, знаменита своими могучими каменными постройками, которые много веков будут свидетельствами #L [GetCountry('ZMW').GetAdjective|l]их#! достижений.\n\nНо несмотря на всё это, нашей славной державе угрожает опасность. Мы не сможем вечно надеяться на бесконечные ресурсы, а засушливый климат часто приводит к неурожаям. Наше население немногочисленно. И хотя мы считаемся могучей торговой державой, торговый баланс по нашей неосторожности любой момент сместиться в чужую пользу. Кроме того, с нас не сводят глаз алчные соседи.\n\nКакое будущее уготовано [GetCountry('ZMW').Custom('CL_GEN')]? Сможет ли наша держава преодолеть многочисленные препятствия и реализовать свой потенциал, став главной на всём Суахильском побережье? Или её разорвут на части шакалы внутренних и внешних конфликтов?"
 # Please keep geographical order from here
 # Generic Cultures
 # America
 country_history_haudenosaunee: "Предки смотрят на нас с одобрением. Основатели нашего славного народа — Великий Миротворец, Гайавата и Джигонсасе — показали нам, что сотрудничество и мир между племенами куда лучше бесконечных распрей прошлого. Благодаря этому мы достигли невиданного прежде процветания. Наш общий Великий закон мира помог собрать вместе наши разрозненные племена и дал нам способ разрешать конфликты и вместе принимать решения. Этот закон поощряет мирное соседство и помогает подавлять междоусобные раздоры. Организованные поселения позволили нам создать грозное войско, а благодаря системе записи сообщений на шнурах-вампумах наши дипломатические связи распространяются на невиданные доселе расстояния.\n\nОднако наши соседи не разделяют этого взгляда на мир и при первой же возможности попытаются нас уничтожить. Мы должны убедить их жить с нами в гармонии — если потребуется, то и силой."
 country_history_puebloan: "Когда-то мы возводили дома на ветреных горных склонах и орошали сады с помощью развитых систем ирригации. Мы проводили сложные ритуалы, воздавая почести великому кругу жизни. В те времена мы были знаменитыми торговцами, а сфера нашего влияния простиралась на все эти засушливые земли.\n\nОднако слава народа #TOOLTIP:CULTUREGROUP,puebloan_group,X #L пуэбло#!#! осталась в прошлом. Наши некогда процветающие и шумные города теперь не более чем тень себя прежних. Сама земля будто предала нас. Почва, которая была когда-то плодородной, стала сухой и твёрдой как камень. Наши крестьяне больше не могут прокормить всю страну.\n\nМожет, нашей культуре скоро придёт конец? Обратимся ли мы в прах, оставшись лишь в воспоминаниях, или же обретём нового вождя, способного объединить наш народ и вернуть ему былое величие?"
 country_history_nahua: "За последние два века многие группы #TOOLTIP:CULTURE,$nahua_culture_tt$,X #L науаских#!#!, народов, ведущих своё происхождение от чичимеков, переселились в Центральную Мексику из Ацтлана, своей легендарной прародины. Вместе с ними пришли сюда и наши предки.\n\nКак и многие другие науа, мы основали свой #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L альтепетль#!#!. Тем самым мы заложили основу своей собственной самобытной цивилизации, независимой от окружающих нас городов и владений, ведь в каждом альтепетле обряды и власть устроены по-своему.\n\nНаш прекрасный город украшают в плавучие сады, хитроумные зелёные террасы и драгоценные камни, которые везут к нам торговцы из далёких земель. Мы довольны своей долей на этом свете, но это не значит, что у нас нет врагов. Многие вокруг зарятся на наши ресурсы, да и природа в этом жарком месте бывает немилосердна.\n\nГотовы ли мы проложить себе путь в будущее и стать творцами своей судьбы, или же падём жертвами интриг и интересов наших соперников, а то и вообще исчезнем со страниц истории?"
 country_history_mayan: "С тех самых пор, как его прародители были вылеплены из маисового теста, народ #TOOLTIP:CULTUREGROUP,maya_group,X #L майя#!#! жил в джунглях #TOOLTIP:AREA,mayaab_area,X #L Маяаба#!#!, славя богов и следуя их мудрости. Наши предки основали множество богатых городов, своей сетью покрывших земли от океана до самых глухих чащоб. Наши мудрецы разгадали тайны Солнца, Луны и бесчисленных звезд, создав календари, в точности описывающие их таинственное движение по небосводу.\n\nУвы, сейчас построенные нами центры торговли и культуры, некогда полные жизни, стоят заброшенными, их колодцы пересохли, улицы зарастают деревьями, а те, кто когда-то поддерживал пламя, живут в тени былой славы.\n\nНеужели нашему народу суждено стать холодным пеплом, скрытым под зеленым пологом джунглей? Или нам всё-таки удастся изменить судьбу и возвратить свой ушедший золотой век?"
 country_history_tonal: "Наш народ, рождённый под мудрым надзором Крылатого Змея #TOOLTIP:GOD,quetzalcoatl_god,X #L Кетцалькоатля#!#!, создал собственную цивилизацию на плодородных землях #TOOLTIP:REGION,mesoamerica_region,X #L Мезоамерики#!#!. Мы верим в свою связь с животным миром: день и час рождения каждого из нас связан с определённым зверем, чьи свойства определяют характер человека. Наша вера имеет большой вес в этом регионе, и мы уверены, что люди будут чтить её ещё не одну сотню лет.\n\nНо несмотря на славное будущее, на горизонте сгущаются тучи: безграничные амбиции наших соседей угрожают повергнуть весь регион в хаос, и этот пожар погубит нас, если мы не сделаем всё, чтобы защитить свой образ жизни."
 country_history_andean: "Священные горы #TOOLTIP:REGION,andes_region,X #L Анд#!#! взирали на наших предков с начала времён. Местный суровый климат и крутые долины воспитали сильных и находчивых людей, способных не только выживать, но и процветать на этих неприветливых землях с высокими горами, узким побережьем и дремучими джунглями. В таких суровых местах мы строим прочные каменные здания, которые легко выдерживают частые подземные сотрясения. Несмотря на эти непростые условия, мы научились заниматься промыслами, почитать богов и хорошо ткать.\n\nОднако не каждый год приносит нам богатые урожаи, да и соседи не всегда приветливы. Благословит ли судьба наш народ, или же мы дрогнем под её ударами?"
 # Europe
 country_history_low_countries_common: "Народами Нидерландов с момента возникновения этого государства помыкали то [GetCountry('FRA').GetLongName], то #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священная Римская Империя#!#!. Нидерланды — словно ценный приз, ожидающий своего победителя. Это один из богатейших регионов #TOOLTIP:CONTINENT,europe,X #L Европы#!#!, и сейчас страны на его территории находятся перед выбором: стать частью других держав или же отчаянно защищать свою независимость."
 country_history_low_countries_minors: "$country_history_low_countries_common$\n\nСамые крошечные государства этого региона ежедневно борются за сохранение независимости от более крупных и алчных соседей."
 country_history_BRB: "$country_history_low_countries_common$\n\nБудучи самым крупным и густонаселённым государством Нидерландов, мы лучше всего подходим для объединения соседей под нашей властью — особенно учитывая нынешнюю слабость [GetCountry('FLA').Custom('longname_ru_GEN')]. Нанеся удар в нужный момент, мы сможем заслуженно занять наивысшие позиции."
 country_history_FLA: "$country_history_low_countries_common$\n\nФранко-фламандская война (1297–1305) нанесла [GetCountry('FLA').Custom('longname_ru_DAT')] серьёзный удар. Страна сохранила независимость, но была вынуждена уступить #TOOLTIP:PROVINCE_DEFINITION,roman_flanders_province,X #L Римскую Фландрию#!#!. Теперь эта провинция принадлежит [GetCountry('FRA').Custom('longname_ru_DAT')].\n\nОднако за последние годы [GetCountry('FLA').Custom('CL_DAT')], как одному из богатейших государств региона, удалось восстановить силы. Теперь страна сможет вернуть то, что по праву принадлежит ей."
 country_history_FRI: "$country_history_low_countries_common$\n\nНаше государство окружено феодальными властителями и разрывается между сторонниками сохранения независимости и теми, кто постепенно прибирает к рукам власть по чужеземному образцу соседних государств. [GetCountry('FRI').GetLongName] сто[GetCountry('FRI').Custom('endlong_ityat')] на перепутье, помня о былой славе нашего народа. Готовы ли мы наконец сделать шаг вперёд и решить, какой уклад подходит нам больше?"
 country_history_GEL: "$country_history_low_countries_common$\n\n[GetCountry('GEL').GetLongName], самое воинственное государство региона, одинаково успешно как в дипломатии, так и в войне. Мы ведём экспансию не только мечом, но и золотом. Такое прекрасное сочетание даёт нам возможность возвыситься над нашими жалкими соседями."
 country_history_HAI: "$country_history_low_countries_common$\n\nБлагодаря мудрой матримониальной политике [GetCountry('HAI').GetName], [GetCountry('HOL').GetName] и [GetCountry('ZEE').GetName] оказались под властью династии #TOOLTIP:DYNASTY,$avesnes_dynasty_tt$,X #L Авенов#!#!. Теперь [GetCountry('HAI').GetLongNameWithNoTooltip] мо[GetCountry('HAI').Custom('endlong_gegu')] продолжить объединение региона под своим началом. Однако это будет непростая задача…"
 country_history_HOL: "$country_history_low_countries_common$\n\nНаша держава зародилась на жалких болотах, но постепенно [GetCountry('HOL').GetLongName] превратил[GetCountry('HOL').Custom('endlong_assya')] в серьёзного претендента на региональное господство. Появление династии #TOOLTIP:DYNASTY,$avesnes_dynasty_tt$,X #L Авенов#!#! выгодно сблизило нас [GetCountry('HAI').Custom('endlong_predlog_sso')] [GetCountry('HAI').Custom('longname_ru_INST')], и мы уже направили взор на [GetCountry('FRI').Custom('longname_ru_ACC')], планируя расширить владения. Однако наши [GetCountry('HOL').GetGovernment.GetEstateName('nobles_estate')|l] и [GetCountry('HOL').GetGovernment.GetEstateName('burghers_estate')|l] вновь грызутся между собой, что всегда пагубно сказывается на делах…"
 country_history_LIE: "$country_history_low_countries_common$\n\n[GetCountry('LIE').GetLongName] — родина множества религиозных лидеров и духовный ориентир для всех Нидерландов. Наше государство — неоспоримый центр просвещения, а потому мы обладаем значительным влиянием на соседей. Подобное влияние обеспечит нам великое будущее, если мы воспользуемся им мудро."
 country_history_LUX: "$country_history_low_countries_common$\n\n[GetCountry('LUX').GetLongName], родовое гнездо династии #TOOLTIP:DYNASTY,$luxembourg_dynasty_tt$,X #L Люксембургов#!#!, — лишь бледная тень владений, подконтрольных самым могущественным ветвям нашей династии. Однако, принимая во внимание престиж, который снискали наши сородичи, мы всё же можем установить контроль над регионом и объединить его под нашей властью."
 country_history_UTR: "$country_history_low_countries_common$\n\nСлишком долго [GetCountry('GEL').GetLongName] и [GetCountry('HOL').GetLongName] притесняли своего соседа, поэтому [GetCountry('UTR').GetLongName] стрем[GetCountry('UTR').Custom('endlong_ityat')]ся избавиться от их влияния и объединить Нидерланды под своим духовным предводительством. Шумный #TOOLTIP:LOCATION,utrecht,X #L Утрехт#!#! — центр культуры и искусства — мог бы стать прекрасной столицей для единого региона. Будем надеяться, что остальные с этим согласятся… и не будут сильно сопротивляться."
 country_history_swiss_group: "$country_history_german_group$\n\nНа западе Альп #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарцы#!#! яростно сопротивляются попыткам #ONCLICK:COUNTRY,[GetCountry('HAB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HAB').Custom('CL_tt')],X [GetCountry('HAB').Custom('CL_GEN')|L]#!#! подчинить их земли. После победы в битве при Моргартене кантоны #TOOLTIP:AREA,eastern_switzerland_area,X #L Восточной Швейцарии#!#! сплотились в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарскую Конфедерацию#!#!, к которой присоединяются всё новые земли. Однако их старый враг, династия #TOOLTIP:DYNASTY,$habsburg_dynasty_tt$,X #L Габсбургов#!#!, копит силы. [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName] поддерживает их в стремлении окончательно подчинить свободолюбивых жителей #ONCLICK:COUNTRY,[GetCountry('SWI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWI').Custom('CL_tt')],X [GetCountry('SWI').Custom('CL_GEN')|L]#!#!. Мы должны дать серьёзный отпор этой угрозе. Судьба родины зависит от нас!"
 country_history_baltic_german: "Вместе [GetCountry('TEU').Custom('endlong_predlog_sso')] [GetCountry('TEU').Custom('longname_ru_INST')], нашими братьями по оружию, мы готовы выполнить священную миссию — привести Северную #TOOLTIP:CONTINENT,europe,X #L Европу#!#! к свету христианства. При поддержке #TOOLTIP:CULTUREGROUP,german_group,X #L немецких#!#! рыцарей и аристократов наша держава должна не только обратить язычников к свету истинной веры, но и защитить тех, кто уже принял #TOOLTIP:RELIGION,$catholic_tt$,X #L католичество#!#!. К сожалению, #L [GetCountry('LIT').GetAdjective|l]ое#! сопротивление всё ещё сильно, а другие страны, например, [GetCountry('DAN').GetLongName], легко могут использовать наше противостояние в собственных алчных целях.\n\nНаше будущее неразрывно связано с христианской проповедью, однако нам также стоит думать и о других материях помимо обращения язычников. Должны ли мы обратить свои усилия против #TOOLTIP:RELIGION,$orthodox_tt$,X #L православных#!#! схизматиков, или же наше государство следует реформировать?"
 country_history_german_group: "Сердце #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской империи#!#!, пережив долгий период Великого междуцарствия, с тревогой смотрит в будущее. [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName] уже в преклонном возрасте, и правящие династии — [GetCountry('UBV').GetGovernment.GetRuler.GetDynasty.GetName], [GetCountry('BOH').GetGovernment.GetRuler.GetDynasty.GetName] и [GetCountry('HAB').GetGovernment.GetRuler.GetDynasty.GetName] — вновь готовятся к борьбе за императорскую корону. Пока имперская власть к югу от Альп ослабевает, #TOOLTIP:CULTUREGROUP,german_group,X #L немецкие#!#! купцы спешно укрепляют свои торговые пути в #TOOLTIP:REGION,italy_region,X #L Италии#!#!, а [GetCountry('HSA').GetLongName] упрочивает господство над #TOOLTIP:REGION,north_german_region,X #L Северной Германией#!#!."
 country_history_BAV: "$country_history_german_group$\n\nКогда [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName] [Select_CString(GetCharacter('ubv_ludwig_iv_wittelsbach').IsFemale, 'пришла', 'пришёл' )] к власти, Бавария достигла вершины своего могущества. Поскольку [Select_CString(GetCharacter('ubv_ludwig_iv_wittelsbach').IsFemale, 'она', 'он' )] правит всей #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империей#!#!, [GetCountry('UBV').GetLongName] пользу[GetCountry('UBV').Custom('endlong_etyut')]ся особым уважением и авторитетом среди имперских правителей. Во главе [GetCountry('LBV').Custom('longname_ru_GEN')] сейчас стоит [GetCharacter('lbv_heinrich_xiv_wittelsbach').GetName], но [Select_CString(GetCharacter('lbv_heinrich_xiv_wittelsbach').IsFemale, 'её', 'его')] здоровье неуклонно ухудшается из-за проказы, и скорая смерть может привести к воссоединению Баварии.\n\nУ династии [GetCountry('UBV').GetGovernment.GetRuler.GetDynasty.GetName] есть прочные связи с правящими домами #TOOLTIP:CONTINENT,europe,X #L Европы#!#!, поэтому Бавария готова отстаивать свою власть в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#! и распространять влияние в Центральной Европе, бросив вызов давним соперникам — #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_DAT')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('HAB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HAB').Custom('CL_tt')],X [GetCountry('HAB').Custom('CL_DAT')|L]#!#!."
 country_history_BRA: "$country_history_german_group$\n\n[GetCountry('BRA').Custom('longname_ru_ACC')] основали как #italic Северную марку#! на землях славян-вендов — где встречаются суглинистые возвышенности и влажные низины, сосновые леса и вересковые пустоши. Земля здесь преимущественно сухая и песчаная, но пригодная для земледелия, за что регион прозвали «песочницей #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#!».\n\n[GetCharacter('bra_albrecht_i_askanier').GetName], отвоевав эти земли у Яксы из Копаницы, в 1157 году официально принял титул, и теперь он [GetCountry('BRA').GetGovernment.GetRulerTitle|l]. Первоначально владения ограничивались Хафельландом и Цаухе, но он активно поощрял распространение #italic Ostsiedlung#! (германизации) в сторону Ноймарка к востоку от Одера, постепенно включая эти территории в свои владения. Колонисты из Фландрии и Рейнской области получали приглашение селиться здесь и попутно укрепляли свои поселения.\n\nПосле его смерти в 1170 году династия #TOOLTIP:DYNASTY,$askanier_dynasty_tt$,X #L Асканиев#!#! продолжала экспансию более 150 лет, присоединив соседние регионы, такие как #TOOLTIP:PROVINCE_DEFINITION,stettin_province,X #L Лагуна Одера#!#! и #TOOLTIP:PROVINCE_DEFINITION,uckermark_province,X #L Уккермарк#!#!, что расширило влияние династии до Балтийского моря, но привело к конфликтам [GetCountry('DAN').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_INST')|L]#!#!. [GetCharacter('bra_heinrich_ii_askanier').GetShortName], последний Асканий, умер в 1320 году, не оставив прямого наследника.\n\nТеперь у власти династия #TOOLTIP:DYNASTY,$wittelsbach_dynasty_tt$,X #L Виттельсбахов#!#!, но их слабый интерес к управлению этими землями оставляет будущее [GetCountry('BRA').Custom('longname_ru_nott_GEN')] под вопросом."
 country_history_MEI: "$country_history_german_group$\n\n[GetCountry('MEI').GetLongName], владение влиятельной династии [GetCountry('MEI').GetGovernment.GetRuler.GetDynasty.GetName], изначально был[GetCountry('MEI').Custom('endlong_fem')] восточной маркой #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#! на землях лужичан и других славянских народов, которые постепенно подверглись германизации. Эти земли, некогда покрытые густыми лесами, оказались невероятно плодородными, а мягкий климат вблизи Эльбы даже позволил местным саксонцам заниматься #TOOLTIP:GOODS,wine,X #L виноделием#!#!.\n\nРудные горы, отделяющие державу от #L [GetCountry('BOH').GetAdjective|l]их#! владений, богаты разными полезными ископаемыми, в особенности #TOOLTIP:GOODS,silver,X #L серебром#!#!, за счёт которого развивается экономика [GetCountry('MEI').Custom('rank_ru_GEN')|l]. Однако эти богатства ещё могут сыграть с нами злую шутку, так как наши соседи вполне могут попытаться их захватить. Тем не менее, несмотря на угрозы, [GetCountry('MEI').GetNameWithNoTooltip] процвета[GetCountry('MEI').Custom('end_etyut')] и по-прежнему явля[GetCountry('MEI').Custom('end_etyut')]ся одним из важнейших имперских владений в #TOOLTIP:AREA,upper_saxony_area,X #L Верхней Саксонии#!#! даже с учётом нестабильности, вызванной Великим междуцарствием. Между тем в сельских районах #ONCLICK:COUNTRY,[GetCountry('THU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('THU').Custom('CL_tt')],X [GetCountry('THU').Custom('CL_GEN')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('BRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRA').Custom('CL_tt')],X [GetCountry('BRA').Custom('CL_GEN')|L]#!#! заметно ослабла местная власть. #TOOLTIP:DYNASTY,$wettin_dynasty_tt$,X #L Веттины#!#! могут воспользоваться этой ситуацией и присоединить эти территории к своим владениям, чтобы уже наверняка стать господствующей державой на востоке империи…\n\nВпрочем, благодаря своим плодородным землям, богатым недрам и выгодному расположению мы уже сейчас считаемся одним из ключевых субъектов империи, что вызывает у соседних держав восхищение и зависть."
 country_history_HAB: "$country_history_german_group$\n\n[GetCharacter('hab_albrecht_ii_habsburg').GetName] и его предки упрочили власть #ONCLICK:COUNTRY,[GetCountry('HAB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HAB').Custom('CL_tt')],X [GetCountry('HAB').Custom('CL_GEN')|L]#!#!, расширив её границы до земель #TOOLTIP:AREA,austria_area,X #L Нижней Австрии#!#!, #TOOLTIP:AREA,styria_area,X #L Штирии#!#! и #TOOLTIP:AREA,carinthia_area,X #L Каринтии#!#!. Теперь, когда юго-восточные рубежи Священной Римской империи надёжно защищены, [GetCountry('HAB').GetNameWithNoTooltip] может сосредоточиться на главной цели династии #TOOLTIP:DYNASTY,$habsburg_dynasty_tt$,X #L Габсбургов#!#! — возвращении императорской короны."
 country_history_irish_minors: "Гэльские вожди правят #TOOLTIP:REGION,ireland_region,X #L Ирландией#!#! — древние традиции на этих землях столь же крепки, как узы между правителем и народом. Хотя титул Верховного короля Ирландии теперь лишь смутное воспоминание, мечта об объединении острова всё ещё живёт в сердцах честолюбивых вождей. Ирландские кланы гордо хранят независимость, черпая силу в своих воинах и многовековых обычаях. Однако раздробленность делает их уязвимыми — как перед внешними угрозами, так и перед междоусобицами.\n\nНа востоке гиберно-нормандские графы постепенно захватывают гэльские земли, а за морем короли #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#! не скрывают интереса к ирландским берегам. Однако Ирландия не впервые сталкивается с чужеземными притязаниями — её народ не раз доказывал, что умеет сопротивляться и может постоять за себя. Если найдётся вождь, способный сплотить кланы и возродить древние традиции королевской власти, остров восстанет из пепла раздробленности — уже не как лоскутное одеяло враждующих кланов, а как единое королевство."
 country_history_anglo_irish_minors: "Великие графства за [GetCountry('PLE').Custom('longname_ru_INST')] — наследники норманнского завоевания, но они уже тесно вплетены в ткань ирландской жизни. Через 150 лет после высадки Стронгбоу гиберно-нормандские лорды правят обширными землями. Они возводят каменные замки там, где прежде стояли лишь кольцевые форты, и командуют дружинами, не уступающими в свирепости войскам гэльских вождей. Однако под именами знатных родов #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!, #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('WLS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('WLS').Custom('CL_tt')],X [GetCountry('WLS').Custom('CL_GEN')|L]#!#!, они стали всё же особенным народом — уже не совсем чужеземцами, но ещё и не ирландцами.\n\nИх стены крепки, но положение шатко. Власть [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ой короны в Ирландии слаба, и лорды давно привыкли править по собственному усмотрению, их связывают больше местные союзы и распри, чем верность королю, сидящему где-то за тридевять земель. А тем временем гэльские вожди на западе набираются смелости, отвоёвывают утраченные земли и бросают вызов норманнскому господству.\n\nБез твёрдой руки эти лорды могут погрязнуть в тех же междоусобицах, что некогда раскололи остров. Но если найдётся тот, кто сумеет воспользоваться моментом — восстановить сильную власть или даже объединить Ирландию под своим знаменем, — то будущее будет решать именно он, а не [GetCountry('ENG').GetGovernment.GetRulerTitle|l] Англии и мятежные гэлы."
 country_history_finnic: "На севере Европы, среди хвойных лесов, обитают #TOOLTIP:CULTUREGROUP,finnic_group,X #L финские#!#! народы. Мы — самобытные племена, и чтобы выжить в суровом краю, полагаемся на смекалку и знания. Мы возделываем землю, но также и живём дарами леса; мы строим дома и бани из дерева, которое щедро дарит нам лес, но можем и перенести своё поселение, следуя за лучшей долей, когда времена года сменяют друг друга. Жизнь наша нелегка, но полна достатка, и мы преуспели в своём укладе.\n\nОднако борьбу за выживание отягощают враги, которые обступили нас со всех сторон. #TOOLTIP:CULTUREGROUP,german_group,X #L Немцы#!#! с юга, #TOOLTIP:CULTURE,$swedish_tt$,X #L шведы#!#! с запада и #TOOLTIP:CULTUREGROUP,russian_group,X #L восточнославянские#!#! народы с востока — все они угрожают нам, желая вернуть земли, которые считают наследием предков. Что ещё хуже, наши древние верования вытесняются #TOOLTIP:RELIGIONGROUP,christian,X #L христианскими#!#! обычаями, а наши собственные боги уходят в забвение.\n\nСумеет ли могущественный вождь подняться и утвердить власть финнов над этим регионом? Или же узурпаторы со всех сторон в конце концов сотрут с лица земли наше живое наследие?"
 country_history_italian: "Со времён падения #TOOLTIP:FORMABLE_COUNTRY,ROM_f,X #L старой Римской империи#!#! #TOOLTIP:REGION,italy_region,X #L Италия#!#! оставалась разобщённой и ждала сильного правителя, который сможет объединить её вновь. Однако такая раздробленность породила острое соперничество между странами полуострова, не говоря уже о яростном соперничестве в культурной сфере. Нет такой #TOOLTIP:CULTUREGROUP,italian_group,X #L итальянской#!#! державы, где не жил бы известный художник, или не появилось бы изобретение, изменившее мировую историю. Вот почему Италия — сердце #TOOLTIP:CONTINENT,europe,X #L Европы#!#! и бриллиант в её короне. Все вокруг нам завидуют — это и выгодное, и невероятно опасное положение одновременно."
 country_history_polish: "На берегах Вислы #TOOLTIP:CULTUREGROUP,polish_group,X #L польский#!#! народ изо всех сил пытается сохранить свою державу. Раз за разом хрупкий союз распадался на множество мелких государств, отчаянно сражающихся между собой за шанс править #TOOLTIP:CULTUREGROUP,polish_group,X #L польским#!#! народом.\n\nОднако сколь бы ни была безумной эта борьба за власть, она происходила не в отрыве от остального мира, и соседи давно приметили, как часто мы заняты междоусобицами. Пока #TOOLTIP:CULTUREGROUP,polish_group,X #L польские#!#! княжества сражаются между собой, будущие завоеватели строят коварные планы, чтобы забрать себе куски их земель.\n\nТолько сильный правитель сможет объединить эти земли и построить крепкую державу, способную не просто выстоять перед захватчиками, но и окончательно сокрушить их. Иначе польский народ может попросту исчезнуть с лица земли, рассеянный ветрами перемен."
 country_history_bohemian: "Веками наши земли находились в сфере влияния #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!, ими часто правили князья из богемских правящих родов. Династия, к которой причисляет себя [GetCountry('BOH').GetGovernment.GetRuler.GetName|l], поддерживала эту традицию [GetCountry('MVA').Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('MVA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MVA').Custom('CL_tt')],X [GetCountry('MVA').Custom('CL_PREP')|L]#!#! после коронации, однако земли #TOOLTIP:PROVINCE_DEFINITION,niederlausitz_province,X #L Нижней Лужицы#!#! были потеряны в пользу [GetCountry('BRA').Custom('longname_ru_GEN')], а эта держава изо всех сил стремится укрепить своё влияние [GetCountry('SOR').Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('SOR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SOR').Custom('CL_tt')],X [GetCountry('SOR').Custom('CL_PREP')|L]#!#!.\n\nДальнейший приток #TOOLTIP:CULTUREGROUP,german_group,X #L немецких#!#! поселенцев может привести больше людей в наши земли, но если правителям не удастся сохранить свой суверенитет, в недалёком будущем это может поставить их власть под угрозу."
 country_history_east_slavic: "Восточные княжества, покорённые в ходе #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольского#!#! вторжения, находятся в непростых отношениях со своими предполагаемыми владыками из [GetCountry('GLH').Custom('longname_ru_GEN')]. Многие князья продолжают выплачивать дань, которую собира[GetCountry('MOS').Custom('end_etyut')] [GetCountry('MOS').GetName], чьи правители носят титул #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L великих князей владимирских#!#!, однако другие уже сбросили с себя #TOOLTIP:INTERNATIONAL_ORGANIZATION,$tatar_yoke_tt$,X #L татарское иго#!#!.\n\nЛавируя между извечной угрозой со стороны #TOOLTIP:CULTUREGROUP,mongolian_group,X #L татаро-монголов#!#! и растущей мощью [GetCountry('MOS').Custom('longname_ru_GEN')], наша держава должна приложить немалые дипломатические усилия, чтобы достичь процветания. Однако именно мы, добившись успеха в этих стремлениях, сможем претендовать на наследие древней Киевской Руси."
 country_history_iberian: "Древняя Испания видела взлёты и падения #TOOLTIP:RELIGIONGROUP,christian,X #L христианства#!#! и #TOOLTIP:RELIGIONGROUP,muslim,X #L ислама#!#!, чьи последователи неустанно сражаются за власть над полуостровом и по сей день. Ныне удача на стороне первой религии, в то время как вторая едва удерживает контроль над своими сильно сократившимися владениями. Однако всё ещё может измениться: исламские державы едины в борьбе, тогда как христианские государства разрознены и погрязли в междоусобицах.\n\nСтанет ли это беспокойное время моментом, когда мусульмане окончательно будут вытеснены из #TOOLTIP:REGION,iberia_region,X #L Иберии#!#!, или же им удастся вернуть потерянные земли Аль-Андалуса?"
 # Africa
 # Asia
 country_history_georgian: "#TOOLTIP:CULTURE,$georgian_culture_tt$,X #L Грузинский#!#! народ гордится своей гордой и древней историей — его предки жили у подножий #TOOLTIP:REGION,caucasus_region,X #L Кавказа#!#! ещё до возникновения первых великих империй древности. Грузины одними из первых приняли #TOOLTIP:RELIGIONGROUP,christian,X #L христианство#!#! и построили своё общество на его основе. Даже после #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманской#!#! экспансии, оказавшись в окружении языческих народов, они сохранили веру, став оплотом христианства на границе между Востоком и Западом.\n\nНи #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольским#!#! ордам, ни $genghis_khan_name$у не удалось полностью сломить этот народ — как только власть захватчиков ослабла, грузины вновь воспряли духом и бросили вызов поработителям.\n\nОднажды они уже были объединены в великое царство и способны вновь достичь небывалых высот."
 country_history_GEO: "$country_history_georgian$\n\nМы достигли пика своей славы, когда нашей державой правили [GetCharacter('geo_david_iv').GetName] и [GetCharacter('geo_tamar_the_great').GetName]. Теперь [GetCountry('GEO').GetLongName] после долгого периода раздробленности вновь объединя[GetCountry('GEO').Custom('endlong_etyut')]ся. [GetCharacter('geo_george_v').GetName] [Select_CString(GetCharacter('geo_george_v').IsFemale, 'покорила', 'покорил')] запад [GetCountry('GEO').Custom('CL_GEN')] и [Select_CString(GetCharacter('geo_george_v').IsFemale, 'восстановила', 'восстановил')] контроль над всеми грузинскими землями. Даже [GetCountry('ARM').GetName] склонил[GetCountry('ARM').Custom('end_assya')] перед могуществом [GetCountry('GEO').Custom('CL_GEN')].\n\nФормально держава остаётся вассалом #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L Государства Хулагуидов#!#!, однако само оно сильно разобщено, и сейчас [GetCountry('GEO').GetNameWithNoTooltip] застыл[GetCountry('GEO').Custom('end_fem')] в ожидании великого правителя, который поднимется и возьмёт власть в свои руки. Разве может народ [GetCountry('GEO').Custom('CL_GEN')] не воспрянуть с новой силой в таких условиях?"
 country_history_armenian: "#TOOLTIP:CULTURE,$armenian_culture_tt$,X #L Армянский#!#! народ населяет эти земли с древнейших времён, а начало его государственности зародилось у подножия горы Арарат. Этот народ не только от всей души гордится своим статусом первой #TOOLTIP:RELIGIONGROUP,christian,X #L христианской#!#! державы, но и пережил вторжения #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульман#!#!, #TOOLTIP:REGION,persia_region,X #L персов#!#! и #TOOLTIP:CULTUREGROUP,turkic_group,X #L тюркских#!#! племён, хотя оказался разделён на мелкие царства, а слава великой Армении прошлого осталась лишь в памяти людей.\n\nОднако армяне проявили невероятную стойкость — они выдержали даже недавние #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольские#!#! завоевания и теперь ждут часа, чтобы вновь заявить о себе."
 country_history_ARM: "$country_history_armenian$ [GetCountry('ARM').GetLongName], хоть и находится под сюзеренитетом #ONCLICK:COUNTRY,[GetCountry('GEO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GEO').Custom('CL_tt')],X [GetCountry('GEO').Custom('CL_GEN')|L]#!#! и #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L государства Хулагуидов#!#!, сохраняет достаточную автономию для самостоятельных действий. Пусть от былого величия сегодня осталась лишь тень, но правящая династия #TOOLTIP:DYNASTY,$zakarid_dynasty_tt$,X #L Закарянов#!#! сумела укрепить свою власть и продолжает гордо нести армянское знамя среди других народов мира."
 country_history_persian: "Земли #TOOLTIP:REGION,persia_region,X #L Персии#!#! испокон веков занимали особое положение, служа мостом между Западом и Востоком, а также перекрёстком, где сходятся важнейшие торговые пути. Персия дала жизнь великим империям прошлого: от Ахеменидов до Сасанидов. Наши земли стали центром, где смешивались идеи, культуры и религии — #TOOLTIP:RELIGION,$zoroastrian_tt$,X #L зороастризм#!#!, #TOOLTIP:RELIGIONGROUP,muslim,X #L ислам#!#!, #TOOLTIP:RELIGIONGROUP,christian,X #L христианство#!#! и даже #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизм#!#! находили здесь своих последователей. Поэтому #TOOLTIP:RELIGIONGROUP,iranian_group,X #L иранские#!#! народы — это люди, открытые всему миру.\n\nВ результате #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольского#!#! нашествия и воцарения #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L Государства Хулагуидов#!#! персам навязали чужеземное господство, но они готовы подняться и вернуть себе былое величие."
 country_history_indian: "Индия поражает воображение своим разнообразием и отличается очень древней и богатой историей. Если верить древним #TOOLTIP:RELIGION,$hindu_tt$,X #L индуистским#!#! эпосам, таким как #TOOLTIP:ADVANCE_DEFINITION,mahabarata,X #L «Махабхарата»#!#! и #TOOLTIP:ADVANCE_DEFINITION,ramayana,X #L «Рамаяна»#!#!, #TOOLTIP:CULTUREGROUP,indian_group,X #L индийской#!#! культуре уже тысяча лет. Огромные земли и неисчислимые богатства этой страны всегда привлекали местных и чужих завоевателей, которые стремились присвоить всё это себе. Однако Индия всегда оставалась непоколебимой перед лицом жадных захватчиков.\n\nС недавних пор на наши владения положил глаз новый завоеватель, в этот раз из числа #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульман#!#!. Религия [GetCountry('DLH').Custom('longname_ru_GEN')] распространилась на значительную часть Индии, хотя многие индуистские державы на субконтиненте остаются верными себе. Остальные индийские религии, #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизм#!#! и #TOOLTIP:RELIGION,$jain_tt$,X #L джайнизм#!#!, кое-где ещё сохранились, хотя распространены далеко не так, как раньше.\n\nТеперь будущее, вера и самоопределение Индии зависят от того, куда склонится чаша весов, и лишь время покажет, чем кончится эта борьба."
 country_history_thai: "#TOOLTIP:CULTURE,$thai_culture_tt$,X #L Тайские#!#! народы переселились из #TOOLTIP:REGION,south_china_region,X #L Южного Китая#!#! в #TOOLTIP:REGION,indochina_region,X #L Индокитай#!#! столетия назад, оказавшись на перекрёстке торговых путей, а также культурного влияния Индии и Китая. Впитав черты обеих цивилизаций, а также #TOOLTIP:RELIGION,$hindu_tt$,X #L индуизма#!#! и #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизма#!#!, они сформировали уникальную идентичность. Возникшие тайские государства бросили вызов доминированию #TOOLTIP:CULTURE,$mon_culture_tt$,X #L монских#!#! народов, чьи территории сократились, а древние царства уступили место тайским. [GetCountry('KHM').GetLongName] — эта держава также давно в упадке, от её былого влияния не осталось и следа. Каких высот достигнут тайцы — покажет лишь время."
 country_history_LAV: "$country_history_thai$\n\n[GetCountry('LAV').GetName] стал[GetCountry('LAV').Custom('end_fem')] одним из монских царств, потерпевших крах — эти земли не только были завоёваны тайцами, но и разделились на тайские царства [GetCountry('SPN').GetName] и [GetCountry('LAV').GetNameWithNoTooltip]. Последнее, хоть и сохранило прежнее название, оказалось под властью тайцев, вынужденных признать сюзеренитет [GetCountry('KHM').Custom('longname_ru_nott_GEN')].\n\nОднако в последние годы [GetCountry('KHM').GetAdjectiveWithNoTooltip|l]ая мощь заметно поубавилась, благодаря чему [GetCountry('SUK').GetLongName] сформировал[GetCountry('SUK').Custom('endlong_fem')] независимое государство, а [GetCountry('LAV').GetNameWithNoTooltip] окончательно сбросил[GetCountry('LAV').Custom('end_fem')] оковы. Среди молодых независимых государств растущее поселение [ShowLocationName('ayodhya')] тоже демонстрирует потенциал к расширению. У нас наконец-то появилась возможность для великих перемен."
 country_history_SUK: "$country_history_thai$\n\nОдно из таких новых государств, [GetCountry('SUK').GetLongName], добилось независимости от своего бывшего сюзерена #ONCLICK:COUNTRY,[GetCountry('LAV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LAV').Custom('CL_tt')],X [GetCountry('LAV').Custom('CL_GEN')|L]#!#!, который сам угодил в подданство [GetCountry('KHM').Custom('longname_ru_nott_DAT')]. [GetCharacter('suk_ram_khamhaeng').GetName] [Select_CString(GetCharacter('suk_ram_khamhaeng').IsFemale, 'провела', 'провёл' )] ряд блестящих завоеваний, после чего [GetCountry('SUK').GetNameWithNoTooltip] стал[GetCountry('SUK').Custom('end_fem')] безоговорочным лидером региона, расширив своё влияние дальше, чем любое другое тайское государство до этого. Мы должны сделать всё возможное, чтобы сохранить превосходство и расширять своё влияние дальше…"
 country_history_tibet: "#TOOLTIP:CULTUREGROUP,tibetan_group,X #L Тибетцы#!#!, живущие у самой вершины мира, всегда находились в относительной изоляции у подножья гор. Хотя #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддийская#!#! вера проникла туда из Индии, она также приобрела особенную местную форму. Исконная религия #TOOLTIP:REGION,tibet_region,X #L Тибета#!#! под названием #TOOLTIP:RELIGION,$bon_tt$,X #L «бон»#!#! также приняла в себя новые буддийские элементы, причём до такой степени, что сейчас эти религии почти неотличимы друг от друга для внешнего наблюдателя. Всё это сделало тибетское самоопределение довольно особенным, и лишь немногим внешним завоевателям удавалось подчинить себе этот край. Древняя Тибетская империя исчезла много веков назад, но кто сказал, что она не может возродиться?"
 country_history_jurchen: "#TOOLTIP:CULTUREGROUP,jurchen_group,X #L Чжурчжэни#!#! населяют #TOOLTIP:REGION,manchuria_region,X #L Маньчжурию#!#! и подразделяются на цзяньчжоуских, хайсийских и диких чжурчжэней, которые ведут разный образ жизни. Одни из них остаются охотниками-собирателями, другие — скотоводами, но большинство перешло к оседлому земледелию.\n\n#TOOLTIP:CULTUREGROUP,chinese_group,X #L Китайские#!#! чиновники классифицировали чжурчжэней по степени близости к границам и особенностям быта. Цзяньчжоуские чжурчжэни, обитающие у реки Муданьцзян, переняли китайские обычаи. Хайсийские чжурчжэни — это кочевые и оседлые племена, живущие вдоль реки Хайси. Ежэнь (дикие чжурчжэни) на малонаселённом севере Маньчжурии добывают пропитание охотой и примитивным земледелием.\n\nИспытывая влияние соседних династий, чжурчжэни сохраняют систему, при которой их вожди, платя дань, получают номинальные должности командиров пограничных гарнизонов. Однако в душе наш народ стремится к гораздо большему…"
 country_history_mongolian_group: "Великий $genghis_khan_name$ выковал могучую империю, объединив все #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольские#!#! народы и покорив огромные территории от #TOOLTIP:CONTINENT,europe,X #L Европы#!#! до Китая. Эта империя не знала себе равных ни по силе, ни по грандиозности планов. Народы по всему свету научились страшиться топота копыт монгольской конницы и мощи Великого хана.\n\nМы — продолжатели этого наследия, а потому в наших сердцах горит мечта о возрождении величайшей монгольской орды."
 country_history_CHG: "$country_history_mongolian_group$\n\n[GetCharacter('chagatai_khan').GetName] был сыном $genghis_khan_name_no_tooltip$а, а значит — прямым наследником его империи.\n\nРасположение #ONCLICK:COUNTRY,[GetCountry('CHG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHG').Custom('CL_tt')],X [GetCountry('CHG').Custom('CL_GEN')|L]#!#! в центре монгольских государств имеет ключевое значение — через эти земли проходит Великий шёлковый путь, что позволяет контролировать многие из его важнейших городов. Это ставит [GetCountry('CHG').Custom('CL_ACC')] в наилучшее положение для управления торговлей и связями между другими наследниками Великого хана. И если кто-то из них выступит против нас, мы дадим им решительный отпор…"
 country_history_GLH: "$country_history_mongolian_group$ [GetCharacter('jochi_borjigin').GetName], сын $genghis_khan_name_no_tooltip$а, и его сын [GetCharacter('batu_borjigin').GetName] продолжили дело Великого хана, основав [GetCountry('GLH').Custom('longname_ru_ACC')].\n\nМы контролируем бескрайние степи западных пределов империи, а многие #TOOLTIP:CONTINENT,europe,X #L европейские#!#! государства служат нам, страшась нашего легендарного могущества. Так и должно быть…"
 # Generic Regional
 # America
 # Europe
 country_history_scandinavia: "В последние десятилетия #TOOLTIP:REGION,scandinavian_region,X #L Скандинавия#!#! и #TOOLTIP:REGION,north_atlantic_islands_region,X #L Северо-Атлантические острова#!#! под её влиянием жили благополучно. #TOOLTIP:GOODS,fish,X Рыбные#! рынки и морская торговля #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('NOR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NOR').Custom('CL_tt')],X [GetCountry('NOR').Custom('CL_GEN')|L]#!#! процветают, жители #TOOLTIP:REGION,north_atlantic_islands_region,X #L Северо-Атлантических островов#!#! наслаждаются автономией и независимостью от любого прямого влияния монарха.\n \n Однако этот золотой век под угрозой. Растущее влияние #ONCLICK:COUNTRY,[GetCountry('HSA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HSA').Custom('CL_tt')],X [GetCountry('HSA').Custom('CL_GEN')|L]#!#! создаёт конкуренцию для местных торговцев, а дрейфующие льды, которые всё чаще встречаются морякам в последнее время, угрожают столь важной для нас связи [GetCountry('GRL').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('GRL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRL').Custom('CL_tt')],X [GetCountry('GRL').Custom('CL_INST')|L]#!#!. Невзгоды ширятся как изнутри, так и снаружи, и лишь сильный лидер сможет гарантировать нам выживание."
 country_history_ruthenia: "[GetCharacter('kie_rurik').GetName] заложил основы управления русскими землями из #TOOLTIP:LOCATION,kyiv,X #L Киева#!#! — города, который позже пал под натиском #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольских#!#! кочевников. Хотя великая Киевская Русь канула в Лету, её наследие живёт в нас, а воинская кровь предков продолжает течь в наших жилах. Ныне, раздробленные на множество мелких княжеств, русские земли вновь будут объединены под #TOOLTIP:CULTURE,$ruthenian_tt$,X #L русинским#!#! знаменем.\n\nОднако на этом пути нас ждут грозные испытания. Другие #TOOLTIP:CULTUREGROUP,russian_group,X #L русские#!#! княжества также претендуют на роль объединителя, а [GetCountry('GLH').GetName] нависает постоянной угрозой на наших границах. #TOOLTIP:RELIGION,$catholic_tt$,X #L Католическая#!#! [ShowContinentName('europe')] на западе тоже не останется в стороне, и молодые #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецкие#!#! государства #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#! вряд ли станут засиживаться на задворках континента. Чтобы вновь объединить Русь, предстоит преодолеть все эти преграды."
 country_history_france: "Два великих королевства борются за #TOOLTIP:REGION,france_region,X #L Францию#!#!. На протяжении десятилетий #L [GetCountry('FRA').GetAdjective|l]ая#! корона пыталась утвердить свою власть над могущественными вассалами. В это же время по другую сторону Ла-Манша #L [GetCountry('ENG').GetAdjective|l]ие#! короли угрожали целостности [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их земель. Угли старых войн могут разгореться ярче прежнего, на горизонте нависает тень эпохи невзгод.\n\nГрядущие десятилетия станут проверкой на прочность, когда [GetCharacter('eng_edward_iii').GetShortName] направит [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ие армии [GetCountry('FRA').Custom('end_predlog_vvo')] [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ие земли. Союзы ненадёжны, и великие дома #TOOLTIP:DYNASTY,$valois_dynasty_tt$,X #L Валуа#!#! разрываются между верностью и амбициями."
 country_history_britain: "#TOOLTIP:REGION,great_britain_region,X #L Британия#!#! разделена между правителями и кланами, единство этого региона представляется скорее мечтой, чем реальностью. #L [GetCountry('ENG').GetAdjective]ие#! короли правят на юге, их власть сдерживается усилиями беспокойных баронов и неуёмными амбициями старых династий. На севере [GetCountry('SCO').GetFlavorRank|l] [GetCountry('SCO').GetName] сто[GetCountry('SCO').Custom('end_ityat')] вопреки всему, хотя там бушует кровавая гражданская война против #ONCLICK:COUNTRY,[GetCountry('SBL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SBL').Custom('CL_tt')],X [GetCountry('SBL').Custom('CL_GEN')|L]#!#!.\n\n[GetCharacter('eng_edward_iii').GetShortName] видит в происходящем и возможности, и угрозы. Пограничные войны и непрекращающееся соперничество между [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ой и [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ой коронами в конце концов определят, объединится ли остров под одним знаменем, или ему будет суждено оставаться вечным полем боя между двумя державами."
 country_history_balkan: "На #TOOLTIP:REGION,balkan_region,X #L Балканах#!#! сталкиваются империи, религии и культуры. Слабеющая власть #L [GetCountry('BYZ').GetAdjective|l]их#! императоров поставила регион под угрозу, и новые державы набирают силы, чтобы занять его разобщённые земли. Местные владыки, амбициозные князья и чужеземцы-гази из #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#! видят возможности в этом царящем хаосе.\n\n#TOOLTIP:CULTUREGROUP,turkic_group,X #L Тюркские#!#! народы подбираются всё ближе, и предстоящие десятилетия определят, сохранится [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ое наследие или будет сметено под натиском соперничающих соседей."
 # Africa
 country_history_maghreb: "В #TOOLTIP:REGION,maghreb_region,X #L Магрибе#!#! самыми влиятельными считаются культуры #TOOLTIP:CULTUREGROUP,amazigh_group,X #L амазигов#!#! и #TOOLTIP:CULTUREGROUP,arabic_group,X #L арабов#!#!, которые населяли эти земли и постоянно враждовали со времён завоеваний VII века. Династии из обоих народов, а порой и смешанного происхождения, раз за разом приходили к власти и терпели крах в этом регионе #TOOLTIP:SUB_CONTINENT,north_africa,X #L Северной Африки#!#!.\n\nИ вновь раскол среди различных держав сделал их потенциальными жертвами более сильных стран. Вернётся ли единство на эти земли?"
 country_history_sahel: "#TOOLTIP:REGION,sahel_region,X #L Сахель#!#! и #TOOLTIP:REGION,guinea_region,X #L Гвинея#!#! отражают постепенный переход от пустыни Сахара к берегам #TOOLTIP:AREA,gulf_of_guinea_area,X #L Гвинейского залива#!#!, проходя через саванны Сахеля и джунгли Нижнего Нигера. Империи [GetCountry('MAL').GetName] и [GetCountry('KBO').GetName] владеют обширными территориями на этих землях и контролируют торговые пути через Сахару, тогда как другие народы, например, #TOOLTIP:CULTURE,$mossi_tt$,X #L мосси#!#!, #TOOLTIP:CULTURE,$hausa_tt$,X #L хауса#!#! и #TOOLTIP:CULTURE,$yoruba_tt$,X #L йоруба#!#!, выжидают момента, чтобы объединить свои земли и расшириться за счёт соседей."
 country_history_kongo: "#TOOLTIP:REGION,kongo_region,X #L Конго#!#! — это земля речных королевств и густых лесов, где кланы и вожди заключают союзы при помощи крови, торговли и войн. В последние десятилетия амбициозные правители начали объединять эти земли в более крупные державы, стремясь установить контроль над плодородными долинами и торговлей на великой реке.\n\nРавновесие сил остаётся хрупким, и в предстоящие десятилетия сильный правитель может объединить [GetCountry('KON').GetAdjectiveWithNoTooltip|l]ие народы или ввергнуть их в эпоху бесконечного соперничества. Чужеземцы не преминут воспользоваться этой слабостью."
 country_history_east_africa: "От плодородных пойм Нила до живописных берегов #TOOLTIP:REGION,madagascar_region,X #L Мадагаскара#!#!, от древних портов #TOOLTIP:REGION,somalia_region,X #L Сомали#!#! до разношёрстных поселений #TOOLTIP:REGION,swahili_coast_region,X #L Суахильского побережья#!#! многие народы сражались с беспощадной природой и захватчиками, посягающими на их земли, но всё же выстояли. Эта земля возможностей таит в себе несметные богатства, которые так и ждут, чтобы лечь в основу сильной империи, чьё влияние распространится даже за океан."
 # Asia
 country_history_anatolia: "Наш народ сформировался в регионе, который не понаслышке знаком с войнами и постоянным перераспределением сил. Враждебность соседей закалила нас, а распад старых империй и султанатов оставил после себя неопределённость во власти — и теперь множество бейликов вокруг нас готовы заполнить эту пустоту. $anatolia_desc$"
 anatolia_desc: "Однако теперь в этом и без того нестабильном регионе начинают разгораться новые войны, и вся #TOOLTIP:REGION,anatolia_region,X #L Анатолия#!#! находится на грани масштабного конфликта…"
 country_history_caucasus: "#TOOLTIP:REGION,caucasus_region,X #L Кавказ#!#! всегда был особенной территорией. Многие империи пытались завоевать его — и многие потерпели неудачу. Даже когда им удавалось одержать победу, они не могли искоренить традиции и верования местных народов, упрямых и непокорных, как сами горы, где они обитают.\n\nПоследними, кто попытался захватить этот регион, были #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монголы#!#!, $genghis_khan_name$ и их наследники — #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L Государство Хулагуидов#!#! и [GetCountry('GLH').GetLongName]. Им удалось покорить нас, но власть их над самыми отдалёнными землями слаба. Многие из нас или вообще не думали покоряться, или уже сбросили оковы и действуют самостоятельно. Возможно, пришла пора явить нашу силу во всей полноте…"
 country_history_middle_east: "На землях #TOOLTIP:REGION,egypt_region,X #L Египта#!#!, #TOOLTIP:REGION,crescent_region,X #L Плодородного полумесяца#!#! и #TOOLTIP:REGION,arabia_region,X #L Аравии#!#! неоспоримо господству[GetCountry('MAM').Custom('endlong_etyut')] [GetCountry('MAM').GetLongName], способствуя торговле между Средиземным и Красным морями и защищая паломников, которые стекаются к святыням #TOOLTIP:LOCATION,jerusalem,X #L Иерусалима#!#!, #TOOLTIP:LOCATION,mecca,X #L Мекки#!#! и #TOOLTIP:LOCATION,medina,X #L Медины#!#!. Однако культурные различия этих земель и внешние угрозы могут подорвать это господство и открыть дорогу другим игрокам, которые своего не упустят."
 country_history_china: "Земли Китая испокон веков почитались средоточием мировой культуры. Его называют #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединным Государством#!#! — эта империя много веков служит прочим народам образцом для подражания. О его влиянии на веру и культуру соседних держав, равно как и о богатстве его двора, давно слагают легенды. Путешественники и купцы прибывают со всего света, чтобы воочию узреть великолепие Трона Дракона, и многие завистливые державы пытались обустроить свои дворы по его образу и подобию.\n\nНо есть немало и тех, кто хочет присвоить себе эти богатства. Ныне Трон Дракона находится под властью [GetCountry('CHI').Custom('longname_ru_GEN')] после завоеваний великого $genghis_khan_name$а. Однако лишь Небесам ведомо, какое будущее уготовано этому дракону."
 country_history_indonesia: "#TOOLTIP:REGION,indonesia_region,X #L Индонезия#!#! всегда была разобщена — такова природа архипелага. Однако это не мешало местным народам развиваться и процветать. Купцы и торговцы всех мастей пересекают эти воды, направляясь из #TOOLTIP:SUB_CONTINENT,east_asia,X #L Восточной Азии#!#! в Индию и обратно, что способствует постоянному культурному обмену. Чужеземные религии также не обошли стороной эти народы. Уникальное индонезийское смешение #TOOLTIP:RELIGION,$hindu_tt$,X #L индуизма#!#! и #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизма#!#! породило могучие индуистско-буддистские царства, такие как Шривиджая и Сингасари.\n\nМногие державы, в том числе [GetCountry('MAJ').GetLongName] и [GetCountry('JMB').GetLongName], борются за власть над этими водами, но только время покажет, кто возьмёт верх."
 country_history_indochina: "#TOOLTIP:REGION,indochina_region,X #L Индокитай#!#! расположен между Индией и Китаем, поэтому пребывал под влиянием обеих держав. С древних времён здесь существовали могущественные царства и империи, в их числе [GetCountry('PEG').GetLongName], [GetCountry('KHM').GetLongName] и [GetCountry('DAI').GetLongName]. В недавнем прошлом группа #TOOLTIP:CULTUREGROUP,thai_group,X #L тайских#!#! народов пришла сюда с севера и создала собственные общины. Индокитай — разнообразный и разобщённый регион, погружённый в нескончаемую борьбу за власть."
 # Generic Continental
 # America
 country_history_america: "Наш народ жил и процветал задолго до того, как появились первые мифы и легенды. Духи защищали нас, а древние традиции не давали сбиться с пути. Мы пережили много трудностей, но они не сломили нас. Останемся ли мы хранителями мудрости предков или рискнём шагнуть в неизведанное?"
 # Europe
 country_history_europe: "С наступлением эпохи Возрождения наша держава оказалась на перепутье. Новый всплеск интереса к искусствам и новшествам бросает вызов старым устоям и сулит культурное обновление. Однако развитие военных технологий открывает и другой путь — путь к военному превосходству.\n\nНам предстоит сделать выбор: поспособствовать культурно-интеллектуальной революции или направить силы на укрепление военной мощи. Решения, принятые сейчас, определят нашу судьбу на века — станем ли мы светочем просвещения или символом военной мощи?"
 # Africa
 country_history_africa: "Земли #TOOLTIP:CONTINENT,africa,X #L Африки#!#! столь же многообразны и самобытны, сколь и народы, их населяющие. Пустыни и джунгли, горы и болота, саванны и речные дельты — всё это многообразие ландшафтов сформировало также и различия между нашими обществами, породив земледельцев, скотоводов и охотников-собирателей. Неисчислимое множество культурных, языковых и религиозных традиций делает африканские народы одними из самых разносторонних на свете."
 # Asia
 country_history_asia: "Земли #TOOLTIP:CONTINENT,asia,X #L Азии#!#! всегда были богаты своими ресурсами и культурой. Между тысячелетним Китаем и богатой древними верованиями Индией пролегли бесчисленные торговые пути, такие как Великий шёлковый путь, которые способствуют обмену не только богатствами, но также идеями и верованиями. Все азиатские государства черпают силы из этих многовековых связей, и впереди нас ждёт ещё немало свершений."
 # Fallback
 country_history_fallback: "В этот переломный момент наша держава стоит перед новыми возможностями и испытаниями. С расширением мировых торговых путей к нам приходят новые идеи, товары и культурные веяния. Однако сохранение традиций и суверенитета в условиях этих перемен остаётся важнейшей задачей.\n\nНам предстоит сделать выбор: развивать культурное наследие или же укреплять военную мощь? От этого решения зависит наше будущее в стремительно меняющемся мире."
