 turmoil_in_brandenburg.1301.title: "Robber Barons in [robber_baron_province.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1301.desc: "The plague of Robber Barons has spread to the province of [robber_baron_province.GetName]. Their displays of criminality and arrogance are tantamount to spitting in our faces. Time to teach them a lesson — and to restore central authority in the country."
 turmoil_in_brandenburg.1301.a: "We will deal with them in due time."

 turmoil_in_brandenburg.1302.title: "The von Quitzow"
 turmoil_in_brandenburg.1302.desc: "Amongst all of the Robber Barons, there are few whose influence can compare to that of the von Quitzow family. Their possessions are plentiful throughout the [ShowProvinceDefinitionName('mittelmark_province')] area, and they hold vast estates. Yet, despite all of this wealth, they still turned to a life of crime. We will stomp down on them, and vanquish their holdings before they cause utter chaos."
 turmoil_in_brandenburg.1302.a: "We must deal with them!"
 turmoil_in_brandenburg.1302.b: "We had better take a careful approach."
 turmoil_in_brandenburg.1302.historical_info: "The von Quitzow family was the most influential noble family in early 15th century Brandenburg. During the centralization of the Mark by Frederick I von Hohenzollern between 1411 and 1415, the famous Robber Baron brothers Hans and Dietrich were targeted by the new elector, who conquered their castles and ended the era of von Quitzow supremacy in Brandenburg."
 STATIC_MODIFIER_NAME_PRU_quitzow_modifier: "Influence of von Quitzow"
 STATIC_MODIFIER_NAME_PRU_quitzow_repressed_modifier: "Repressing the von Quitzow"
 bra_quitzow_revolt: "Quitzow Revolt"

 turmoil_in_brandenburg.1303.title: "Ending Robber Baron Rule"
 turmoil_in_brandenburg.1303.desc: "Though it took many years and campaigns, we have finally managed to rein in the uppity [ShowEstateTypeName('nobles_estate')]. As of now, all trade routes in the country are safe from robbers of noble origin, and no common man has anything to fear. Moreover, most peasants will no longer be obliged to pay protection money to the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
 turmoil_in_brandenburg.1303.a: "The [ROOT.GetCountry.GetFlavorRank] is whole again."
 STATIC_MODIFIER_NAME_PRU_end_of_robber_barons: "End of the Robber Baron Era"
 
 turmoil_in_brandenburg.1304.title: "Punishing the Robber Barons"
 turmoil_in_brandenburg.1304.desc: "Though we have managed to prevail in our struggle against the rebelling [ShowEstateTypeName('nobles_estate')], many at the [ROOT.GetCountry.GetGovernment.GetCourtTitle] believe that simply defeating them achieves nothing, and that the [ROOT.GetCountry.GetGovernment.GetRulerTitle] should make them pay for their treachery. While many support this incentive, others believe that further alienation is not necessary, especially since we have already reasserted our control."
 turmoil_in_brandenburg.1304.a: "They shall pay for their treachery!"
 turmoil_in_brandenburg.1304.b: "Punish them mildly."
 turmoil_in_brandenburg.1304.c: "There is no need for further punishment."

