l_english:
 #Loc macros
 bra_hre_hyperlink: "[GetUniqueInternationalOrganization('hre').GetName]"
 bra_hre_hyperlink_no_tt: "[GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
 bra_hre_emperor_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
 bra_hre_emperor_country_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]"
 bra_wittelsbach_hyperlink: "[ShowDynastyName('wittelsbach_dynasty')]"
 bra_wittelsbach_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('wittelsbach_dynasty')]"
 bra_askanier_hyperlink: "[ShowDynastyName('askanier_dynasty')]"
 bra_askanier_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('askanier_dynasty')]"
 bra_variable_counter: "#Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_investment_var').GetValue]#!"
 bra_neglect_variable_counter: "#Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_neglect_var').GetValue]#!"
 bra_wittelsbacher_investment_var: "#Y Wittelsbacher Investment#!"
 bra_wittelsbacher_neglect_var: "#Y Wittelsbacher Neglect#!"

 bra_change_investment_score_add: "We gain $VALUE|G0$ $bra_wittelsbacher_investment_var$ $bra_variable_counter$"
 bra_change_investment_score_subtract: "We lose $VALUE|R0$ $bra_wittelsbacher_investment_var$ $bra_variable_counter$"

 bra_change_neglect_score_add: "We gain $VALUE|G0$ $bra_wittelsbacher_neglect_var$ $bra_neglect_variable_counter$"
 bra_change_neglect_score_subtract: "We lose $VALUE|R0$ $bra_wittelsbacher_neglect_var$ $bra_neglect_variable_counter$"

 PRU_DEAL_WITH_ROBBER_BARONS_TOOLTIP_IN_PROGRESS: "Progress: $PROGRESS$%\n$DAYS$, $DATE$"

 #Events
 turmoil_in_brandenburg.1.title: "The [root_dynasty.GetNameWithNoTooltip] of [ROOT.GetCountry.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1.desc.start: "With the death of the last member of the $bra_askanier_hyperlink$ of [ROOT.GetCountry.GetName], [GetCharacter('bra_heinrich_ii_askanier').GetName], in 1320, the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] lands fell in the hands of [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName], the elected Emperor of the $bra_hre_hyperlink$. In order to keep the northern [ShowCultureGroupName('german_group')] territory administrated, [GetCharacter('ubv_ludwig_iv_wittelsbach').GetShortNameWithNoTooltip] assigned the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] March to [GetCharacter('ubv_ludwig_iv_wittelsbach').GetHisHer] [GetCharacter('bra_ludwig_v_wittelsbach').GetDaughterSon], [GetCharacter('bra_ludwig_v_wittelsbach').GetName]."
 turmoil_in_brandenburg.1.desc: "$turmoil_in_brandenburg.1.desc.start$\n\nThis is the start of the $bra_wittelsbach_hyperlink$ era of [ROOT.GetCountry.GetNameWithNoTooltip]. It is a time of troubles, as the [ROOT.GetCountry.GetGovernment.GetRulerTitle] was placed as ruler at a young age, leaving much of the government in the hands of [GetCharacter('hnb_berthold_iv_henneberg_schleusingen').GetName]. Robber barons, economic issues and a general discontent of the population towards their [ROOT.GetCountry.GetGovernment.GetRulerTitle] plague the rulership of [GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip], and the $bra_wittelsbach_hyperlink_no_tt$ seem to care little for their possessions in the north..."
 turmoil_in_brandenburg.1.desc.fallback: "$turmoil_in_brandenburg.1.desc.start$\n\nThe rule of [GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip], however, was short-lived, and [root_ruler.GetName] has assumed control over [ROOT.GetCountry.GetNameWithNoTooltip]. Still, the economic issues as well as the Robber Barons stain the authority of the [ROOT.GetCountry.GetGovernment.GetRulerTitle] nonetheless, and the $bra_wittelsbach_hyperlink$ show little interest in changing the current status of the under-developed march..."
 turmoil_in_brandenburg.1.a: "[ROOT.GetCountry.GetNameWithNoTooltip] will prevail!"
 turmoil_in_brandenburg.1.a.at: "The [control|e] over our country will decline!"
 turmoil_in_brandenburg.1.a.bt: "In order to resolve this disaster, we must also resolve the dynastic crisis and the disorder caused by the rampant Robber Barons."

 turmoil_in_brandenburg.2.title: "The End of the $bra_wittelsbach_hyperlink_no_tt$ Period"
 turmoil_in_brandenburg.2.desc: "As no member of the $bra_wittelsbach_hyperlink$ dynasty holds any monarchistic power over [ROOT.GetCountry.GetName], the era of economic stagnation and constant neglect has finally found its end. It is now in the hands of the new rulers to bring a time of prosperity to our people."
 turmoil_in_brandenburg.2.a: "May this be the start of a Golden Age."
 turmoil_in_brandenburg.2.a.tt: "The $bra_wittelsbacher_investment_var$ and $bra_wittelsbacher_neglect_var$ will be disabled."

 turmoil_in_brandenburg.3.title: "The False $name_waldemar$"
 turmoil_in_brandenburg.3.desc: "At first, [target_character.GetHisHer] story sounded realistic, if a bit strange: a ruler who staged [target_character.GetHisHer] own funeral in order to go on a pilgrimage undisturbed, then returned. But as [target_character.GetHisHer] new campaign for the throne continued, [target_character.GetHisHer] tale started to show cracks. Those who knew [GetCharacter('bra_waldemar_askanier').GetName] before 1320 also noted [target_character.GetHisHer] unexplainable personality changes...\n\nBut to the shock of all, it has now finally been revealed that [target_character.GetName] is nothing but a mere imposter posing as the most honored Margrave!\n\nIn an instance, any form of support the pretender owned has vanished, and the rule of [ROOT.GetCountry.GetGovernment.GetRuler.GetName] is once again undisputed."
 turmoil_in_brandenburg.3.a: "An imposter among us... who could have known?"

 turmoil_in_brandenburg.4.title: "Robber Baron Tyranny"
 turmoil_in_brandenburg.4.desc: "Protected by their fief's legal status, the Robber Barons of [ROOT.GetCountry.GetName] are members of the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] who impose crippling tolls and taxes on the local population. Though their reasons for this may be desperation, their actions hinder the development of the [ROOT.GetCountry.GetAdjectiveWithNoTooltip] lands if we let this continue to happen..."
 turmoil_in_brandenburg.4.a: "Combat the Robber Barons."
 turmoil_in_brandenburg.4.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 bra_peasants_revolt: "Peasants Revolt"

 turmoil_in_brandenburg.5.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Revolt"
 turmoil_in_brandenburg.5.desc: "The economic downward spiral of [ROOT.GetCountry.GetName] has left many members of the [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] bitter and upset. They refuse to work the fields unless their demands for an improvement of their situation under the tyranny of self-serving robber knights are met..."
 turmoil_in_brandenburg.5.a: "Improve their situation."
 turmoil_in_brandenburg.5.b: "These are just peasants. They will not cause any trouble."

 turmoil_in_brandenburg.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] Assume Control"
 turmoil_in_brandenburg.6.desc: "While the authority of the $bra_wittelsbach_hyperlink$ is present on paper, actual authority over the people lies in the hands of those the masses choose to follow. In rural settlements, that would be the [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. If we want to hold any authority within our own land, we must revoke the power of the clerics..."
 turmoil_in_brandenburg.6.a: "Revoke their power."
 turmoil_in_brandenburg.6.b: "We should not interfere with the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."

 turmoil_in_brandenburg.7.title: "City Taxes Refused"
 turmoil_in_brandenburg.7.desc: "[ROOT.GetCountry.GetName|U] is in poor condition. Its lands are sparsely populated, and even less developed. Most of the improvements made to [ROOT.GetCountry.GetAdjectiveWithNoTooltip] institutions are paid for with the taxes levied on towns and cities. However, the [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] refuse to pay their part, as they see little reason to acknowledge $bra_wittelsbach_hyperlink$ as their sovereign..."
 turmoil_in_brandenburg.7.a: "Reign in the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
 turmoil_in_brandenburg.7.b: "$common_string_leave_them_be$"

 turmoil_in_brandenburg.8.title: "The Private Domain of [target_character.GetShortNameWithNoTooltip]"
 turmoil_in_brandenburg.8.desc: "Reports from [target_location.GetName] speak of [target_character.GetName] ruling [target_character.GetHisHer] estates as if they were a [ROOT.GetCountry.GetFlavorRank] unto themselves. Castle walls grow higher, ditches wider, and men-at-arms answer only to [target_character.GetHerHim]. Petitions that ought to be heard at the [ROOT.GetCountry.GetGovernment.GetCourtTitle] are decided in [target_character.GetHisHer] hall, and tolls and dues once paid to the [ROOT.GetCountry.GetGovernment.GetRulerTitle] now fill [target_character.GetHerHis] coffers instead. For many, the distinction between the lands of [ROOT.GetCountry.GetName] and the private domain of [target_character.GetShortNameWithNoTooltip] is becoming alarmingly blurred…"
 turmoil_in_brandenburg.8.a: "We will tolerate this for now."
 turmoil_in_brandenburg.8.b: "No lord stands above the [ROOT.GetCountry.GetGovernment.GetRulerTitle]."

 tib_outcome_8_1_tt: "Our agents will see to it that [target_character.GetShortNameWithNoTooltip] troubles us no more"
 tib_outcome_8_2_tt: "The [ShowEstateTypeName('nobles_estate')] of [target_location.GetName] will seethe at our intervention"
 tib_outcome_8_3_tt: "Our decision will sour relations with the [ShowEstateTypeName('nobles_estate')] across the realm"

 turmoil_in_brandenburg.9.title: "The [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] League of [target_province.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.9.desc: "Across the countryside of [target_province.GetName], a number of great families have bound themselves together in a formal league. They swear mutual defense, hold joint courts, and agree to resist any further intrusion of royal officials into their affairs.\n\nTo many locals, it is clear that real authority in [target_province.GetNameWithNoTooltip] now lies with this circle of [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] rather than with the [ROOT.GetCountry.GetGovernment.GetRulerTitle] in [ROOT.GetCountry.GetCapital.GetName]. Some at the [ROOT.GetCountry.GetGovernment.GetCourtTitle] whisper that tolerating such unions will only hasten the decay of central power."
 turmoil_in_brandenburg.9.a: "Recognize the league and win their favor."
 turmoil_in_brandenburg.9.b: "Break this cabal and restore our authority."
 
 nobles_in_target_province_gain_pop_satisfaction_extreme_bonus_tt: "[pops|e] that belong to the [ShowEstateTypeName('nobles_estate')] under our rule in [target_province.GetName] will be greatly heartened by our recognition of their league, gaining [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [pop_satisfaction|e]"
 lower_class_pop_satisfaction_weak_penalty_tt: "The [lower_class|e] of [target_province.GetName] will resent the unchecked power of their lords, thus suffering [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [pop_satisfaction|e]"
 nobles_in_target_province_may_agitate_locals_to_rebel_tt: "The humbled [ShowEstateTypeName('nobles_estate')] of [target_province.GetName] may seek to stir unrest among their dependents in response to our hard line"

 turmoil_in_brandenburg.10.title: "Illegal Tolls in [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.10.desc: "Merchants complain that the roads and bridges around [target_location.GetName] are now choked with new toll-gates, raised without royal warrant by enterprising members of the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Wagons are stopped, goods are counted, and coin is demanded in the name of #italic local protection#!.\n\nEvery cart that yields to these imposts robs the [ROOT.GetCountry.GetGovernment.GetRulerTitle] of dues and weakens the sense that law flows from the [ROOT.GetCountry.GetGovernment.GetCourtTitle], not from the nearest castle tower."
 turmoil_in_brandenburg.10.a: "Turn a blind eye to their tolls."
 turmoil_in_brandenburg.10.b: "Tear down the gates and assert our rights."

 turmoil_in_brandenburg.11.title: "The House of [target_dynasty_1.GetNameWithNoTooltip] Challenges the [target_dynasty_2.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.11.desc: "Tension has erupted between the [target_dynasty_1.GetName] and our own house of [target_dynasty_2.GetName]. At feasts, during hunts, and now in councils, their leading scions question the judgment and lineage of the [ROOT.GetCountry.GetGovernment.GetRulerTitle], hinting that their own blood is no less suited to rule [ROOT.GetCountry.GetName].\n\nWhat began as murmured slights has hardened into an open contest for prestige, clients, and influence at court. If we do not take a firm stance, lesser lords may conclude that our dynasty is just one noble family among many."
 turmoil_in_brandenburg.11.a: "Stand firmly behind our [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
 turmoil_in_brandenburg.11.b: "Buy peace with concessions to the [target_dynasty_1.GetNameWithNoTooltip]."

 target_character_2_will_challenge_the_power_nobles_tt: "[target_character_2.GetName] will confront the [ShowEstateTypeName('nobles_estate')] directly over their claims to power."

 turmoil_in_brandenburg.12.title: "Investment in [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.12.desc: "Advisors present a plan to pour royal funds into [target_location.GetName] and the surrounding lands of [target_province.GetName]. New roads, markets, and offices would carry the presence of the [ROOT.GetCountry.GetGovernment.GetRulerTitle] deeper into the countryside, loosening the grip of local magnates on trade and justice.\n\nYet the [ShowEstateTypeName('nobles_estate')] argue that such improvements should pass through their hands, not ours, warning that central meddling in their domains will only provoke resistance."
 turmoil_in_brandenburg.12.a: "Invest crown resources and tighten our grip."
 turmoil_in_brandenburg.12.b: "This matter is beneath us, anyway."

 turmoil_in_brandenburg.13.title: "The Growth of [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.13.desc: "Notables from [target_location.GetName] have stepped forth to petition the [ROOT.GetCountry.GetGovernment.GetCourtTitle] for an investment. They argue that new streets, guildhalls, and public works would bind the settlements of [target_province.GetName] more closely to [ROOT.GetCountry.GetName], calming discontent among the locals.\n\nOur treasurers warn, however, that such largesse will strain the coffers and may be seen as indulgence by other provinces still waiting their turn."
 turmoil_in_brandenburg.13.a: "Spread investment across all of [target_province.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.13.b: "Concentrate our efforts on [target_location.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.13.c: "We cannot afford such generosity."
 
 every_location_in_target_province_gains_center_of_urbanization_modifier_tt: "Every [location|e] in [target_province.GetName] will receive the [GetModifier('center_of_urbanization_modifier').GetNameWithTooltip] [modifier|e]"
 every_location_in_target_province_gains_flourishing_capital_modifier: "Every [location|e] in [target_province.GetName] will receive the [GetModifier('flourishing_capital_modifier').GetNameWithTooltip] [modifier|e]"
 every_location_in_target_province_gains_development_mild_bonus: "Every [location|e] in [target_province.GetName] will gain [ShowNamedValue('development_weak_bonus')|+=] [development|e]"
 every_location_in_target_province_gains_prosperity_extreme_bonus: "Every [location|e] in [target_province.GetName] will gain [ShowNamedValue('prosperity_severe_bonus')|+=2%] [prosperity|e]."


 turmoil_in_brandenburg.100.title: "The $bra_wittelsbach_hyperlink_no_tt$ Vitalize [ROOT.GetCountry.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.100.desc: "After years of poverty and devastation, of autonomous estates and Robber Baron tyranny, of challenges and pretenders, the House of $bra_wittelsbach_hyperlink$ has at long last prevailed, and the [ROOT.GetCountry.GetFlavorRank] of [ROOT.GetCountry.GetName] has become a jewel in [ShowRegionName('north_german_region')]. Long shall live the rule of [target_character.GetName]!"
 turmoil_in_brandenburg.100.a: "[ROOT.GetCountry.GetNameWithNoTooltip] shall become the pride of the $bra_wittelsbach_hyperlink_no_tt$."

 turmoil_in_brandenburg.200.title: "The Mystery of [target_character.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.200.desc: "[target_character.GetHisHer|U] death was swift and unexpected, yet [target_character.GetHisHer] legacy still haunts [ROOT.GetCountry.GetName]. [target_character.GetName], the supposed $bra_askanier_hyperlink$ who ruled over our [ROOT.GetCountry.GetFlavorRank] until 1320, turned out to be the most deceptive imposter and schemer in [ROOT.GetCountry.GetAdjectiveWithNoTooltip] history!\n\nAt [target_character.GetHisHer] funeral, [target_character.GetHisHer] old grave was dug up so [target_character.GetHeShe] could rest for good. However, the ceremony came to a premature end as the skeleton of [GetCharacter('bra_waldemar_askanier').GetName] - the #italic $name_waldemar$#! - was discovered within!\n\nThis naturally brought a great deal of shame to [ROOT.GetCountry.GetNameWithNoTooltip], as a mere individual managed to fool the entire country..."
 turmoil_in_brandenburg.200.a: "How could this happen? We are smarter than this..."

 turmoil_in_brandenburg.300.title: "A Long Fought Battle Ends"
 turmoil_in_brandenburg.300.desc: "After decades, our struggle to tame and subjugate the [ROOT.GetCountry.GetLongName] has finally come to an end. The competing dynasties for our seat have been fought of and the last strongholds of the Robber Barons have been razed to the ground. Our decisive action has granted us the opportunity to shape this state to our benefit, building an administration which will withstand such woes more easily in the future."
 turmoil_in_brandenburg.300.a: "Peace at last."

 turmoil_in_brandenburg.1000.title: "The Return of [target_character.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1000.desc: "As no emperor of the $bra_hre_hyperlink$ is connected to the ruling $bra_wittelsbach_hyperlink$ anymore, the legitimacy of [bra_ruler.GetName] is once again in question. The people of [ROOT.GetCountry.GetName] yearn for the years of $bra_askanier_hyperlink$ rule.\n\nBut, as fate wills, the presumed-to-be-dead [target_character.GetName] has made a public resurrection! Claiming that [target_character.GetHisHer] funeral was staged in order to facilitate [target_character.GetHisHer] pilgrimage to the Holy Land, [target_character.GetShortNameWithNoTooltip] has returned to claim the [ROOT.GetCountry.GetAdjective] throne from [bra_ruler.GetShortNameWithNoTooltip]."
 turmoil_in_brandenburg.1000.desc.emperor_supports: "$turmoil_in_brandenburg.1000.desc$\n\nFortunately, the relations between [emperor_ruler.GetName] and [bra_ruler.GetShortNameWithNoTooltip] are benevolent. As such, the $bra_hre_emperor_hyperlink$ supports the house of $bra_wittelsbach_hyperlink_no_tt$ against the pretender."
 turmoil_in_brandenburg.1000.desc.emperor_rejects: "$turmoil_in_brandenburg.1000.desc$\n\nUnfortunately, the $bra_hre_emperor_hyperlink$ favors the house of $bra_askanier_hyperlink_no_tt$ over $bra_wittelsbach_hyperlink_no_tt$. As such, [emperor_ruler.GetName] has granted the right to rule over [bra_country.GetNameWithNoTooltip] to [target_character.GetShortNameWithNoTooltip] Only striking  a deal with [emperor_ruler.GetNameWithNoTooltip] could resolve the threat of [target_character.GetShortNameWithNoTooltip]..."
 turmoil_in_brandenburg.1000.a: "Contact the $bra_hre_emperor_hyperlink$!"
 turmoil_in_brandenburg.1000.a.at: "Every country which has a member of the $bra_wittelsbach_hyperlink$ dynasty as their ruler gains [ShowBiasValue('opinion_support_our_dynasty_member')|+0] [opinion|e] of [ROOT.GetCountry.GetName]"
 turmoil_in_brandenburg.1000.a.tt: "We will turn to [emperor_country.GetName] and request their aid to deal with the pretender. This will take us #Y 2 years#! to complete, and we will be forced to comply with the conditions of the $bra_hre_emperor_hyperlink$ unless their [opinion|e] of us is above #Y 100#!"
 turmoil_in_brandenburg.1000.b: "Execute the pretender ourselves!"
 turmoil_in_brandenburg.1000.b.tt: "We will try to execute [target_character.GetName]. If it succeeds, the legitimacy of [bra_ruler.GetName] is restored and we receive #Y +5#! bonus to our $bra_wittelsbacher_investment_var$ $bra_variable_counter$.\nShould this fail, a [civil_war|e] will erupt"
 turmoil_in_brandenburg.1000.c: "Abdicate to the true ruler of [ROOT.GetCountry.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.1000.c.at: "Every country which has a member of the $bra_wittelsbach_hyperlink$ dynasty as their ruler gains [ShowBiasValue('opinion_ousted_our_dynasty_member')|+0] [opinion|e] of [ROOT.GetCountry.GetName]"
 turmoil_in_brandenburg.false_waldemar_rebel.tt: "The [ShowPopTypeName('nobles')] and [ShowPopTypeName('peasants')] of up to #Y 4#! of most populous, owned locations gain the following effects:\n- Loses [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [pop_satisfaction|e]\n- Joins [false_waldemar_rebel.GetName]"

 turmoil_in_brandenburg.1001.title: "Rise of [target_character.GetShortNameWithNoTooltip] in [bra_country.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1001.desc.imposter_revealed: "An ambassador from [bra_country.GetName] has arrived at our grand court to request our support against a rising pretender and rival to [bra_ruler.GetName]. Apparently, this self-proclaimed '[target_character.GetName]' claims to have returned from a pilgrimage to the Holy Land, and now demands the [bra_country.GetAdjectiveWithNoTooltip] throne.\n\nHowever, news of deceit has reached us, as this '$name_waldemar$' is a mere pretender!"
 turmoil_in_brandenburg.1001.desc: "An ambassador from [bra_country.GetName] has arrived at our court to request our support in a dynastic conflict. The former ruler of [bra_country.GetNameWithNoTooltip], [target_character.GetName] has returned from a long pilgrimage to the Holy Land, and now reclaims the [bra_country.GetAdjective] throne for himself once more. [bra_ruler.GetName] finds little support from [bra_ruler.GetHisHer] subjects, and has expressed [bra_ruler.GetHisHer] willingness to negotiate with us in exchange for our support against the pretender."
 turmoil_in_brandenburg.1001.help.tt: "[target_character.GetName] will be banished from [bra_country.GetName], and the [modifier|e] [ShowModifier('bra_waldemar_rallies_nobility')] will be removed from them"
 turmoil_in_brandenburg.1001.a: "We shall support their cause in exchange for gold."
 turmoil_in_brandenburg.1001.a.tt: "We will receive [ROOT.GetVariable('bra_gold_tooltip_var').GetValue|+=2] [gold|e] from [bra_country.GetName] in #Y 1 year#!"
 turmoil_in_brandenburg.1001.b: "One hand washes the other. Help them!"
 turmoil_in_brandenburg.1001.b.tt: "[bra_country.GetName] will vote for us in #Y 1 year#!"
 turmoil_in_brandenburg.1001.c: "We shall help the $bra_wittelsbach_hyperlink_no_tt$ in exchange for their political support."
 turmoil_in_brandenburg.1001.c.tt: "We will receive [ShowBiasValue('opinion_supported_the_wittelsbacher')|+=0] [opinion|e] with all [countries|e] who have the $bra_wittelsbach_hyperlink$ [dynasty|e] in power in #Y 1 year#!"
 turmoil_in_brandenburg.1001.d: "The $bra_wittelsbach_hyperlink_no_tt$ shall be supported."
 turmoil_in_brandenburg.1001.d.tt: "We will ask nothing in return"
 turmoil_in_brandenburg.1001.e: "We have nothing to gain from helping the $bra_wittelsbach_hyperlink_no_tt$."
 turmoil_in_brandenburg.1001.e.tt: "We will reject supporting the $bra_wittelsbach_hyperlink$, reducing the [opinion|e] of all [countries|e] with the $bra_wittelsbach_hyperlink_no_tt$ as their ruling [dynasty|e] by [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0], but improving the opinion of all countries with the $bra_askanier_hyperlink$ dynasty by [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] in #Y 1 year#!"
 turmoil_in_brandenburg.1001.zzz: "[bra_ruler.GetShortNameWithNoTooltip] shall be allowed to exercise justice as [bra_ruler.GetHeShe] sees fit."
 turmoil_in_brandenburg.1001.zzz.tt: "[bra_country.GetName] will be allowed to handle [target_character.GetName] as they see fit"

 turmoil_in_brandenburg.1002.title: "Support from the $bra_hre_emperor_hyperlink$"
 turmoil_in_brandenburg.1002.desc: "Terrific news has reached our court! The $bra_hre_emperor_hyperlink$, [emperor_ruler.GetName] of [emperor_country.GetName], has expressed their genuine support for [bra_ruler.GetName] in [bra_ruler.GetHisHer] fight against the pretender [target_character.GetName]!"
 turmoil_in_brandenburg.1002.desc.gold: "$turmoil_in_brandenburg.1002.desc$\n\nNaturally, such support does not come free. [emperor_ruler.GetShortNameWithNoTooltip] has denoted the financial burden [emperor_ruler.GetHisHer] support would impose on [emperor_ruler.GetHisHer] treasury. As such, [emperor_ruler.GetHeShe] demands a tribute of [ROOT.GetVariable('bra_owes_gold').GetValue|V2] gold in exchange."
 turmoil_in_brandenburg.1002.desc.loyalty: "$turmoil_in_brandenburg.1002.desc$\n\nNaturally, such support does not come free. [emperor_ruler.GetShortNameWithNoTooltip] is concerned for [emperor_ruler.GetHisHer] succession in the $bra_hre_hyperlink$, and requires our full loyalty to [emperor_ruler.GetHisHer] family's cause to secure the Imperial Throne."
 turmoil_in_brandenburg.1002.desc.relations: "$turmoil_in_brandenburg.1002.desc$\n\nNaturally, such support does not come free. [emperor_ruler.GetShortNameWithNoTooltip] wishes us to act as their herald within the $bra_wittelsbach_hyperlink$, showcasing the glory of [emperor_country.GetNameWithNoTooltip] to every member of the dynasty."
 turmoil_in_brandenburg.1002.desc.free: "$turmoil_in_brandenburg.1002.desc$\n\nTo our surprise, the $bra_hre_emperor_hyperlink$ made no request in exchange. Their help comes from good faith, and without any strings attached."
 turmoil_in_brandenburg.1002.a: "Finally, the authority of the $bra_wittelsbach_hyperlink_no_tt$ is restored!"
 turmoil_in_brandenburg.1002.a.tt: "Every [country|e] with the $bra_wittelsbach_hyperlink$ as their ruling [dynasty|e] gains [ShowBiasValue('opinion_supported_the_wittelsbacher')|0] [opinion|e] of [emperor_country.GetName]"

 turmoil_in_brandenburg.1003.title: "Emperor Refuses to Give Support"
 turmoil_in_brandenburg.1003.desc.dead: "News from the $bra_hre_emperor_hyperlink$ has reached us. While [emperor_ruler.GetName] took an antagonistic stance towards our interests during [emperor_ruler.GetHisHer] lifetime, [emperor_ruler.GetHisHer] reasons remain unknown to anyone but [emperor_ruler.GetHerselfHimself]. Therefore, [target_character.GetName] remains uncontested..."
 turmoil_in_brandenburg.1003.desc.wittelsbach: "Terrible news has reached our court! While the chaos caused by [target_character.GetName] grows in intensity, the $bra_hre_emperor_hyperlink$ has finally revealed the [emperor_country.GetAdjective] position on the matter. Despite [emperor_ruler.GetHisHer] connection to the bloodline, [emperor_ruler.GetName] refuses to support [bra_ruler.GetName], and openly opposes [emperor_ruler.GetHisHer] very own dynasty!"
 turmoil_in_brandenburg.1003.desc: "Terrible news has reached our court! While the chaos caused by [target_character.GetName] grows in intensity, the $bra_hre_emperor_hyperlink$ has finally revealed the [emperor_country.GetAdjective] position on the matter: [emperor_ruler.GetName] refuses to support [bra_ruler.GetName], and openly opposes the $bra_wittelsbach_hyperlink_no_tt$!"
 turmoil_in_brandenburg.1003.a: "What a horrible day to be the [ROOT.GetCountry.GetGovernment.GetRulerTitle]..."
 turmoil_in_brandenburg.1003.a.tt: "Every [country|e] with the $bra_wittelsbach_hyperlink$ as ruling [dynasty|e] loses [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0] [opinion|e] of [emperor_country.GetName], while every country with the $bra_askanier_hyperlink$ ruling dynasty gains [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] opinion of them"

 turmoil_in_brandenburg.1004.title: "Unconditional Support from the $bra_hre_emperor_hyperlink$"
 turmoil_in_brandenburg.1004.desc: "News from the $bra_hre_emperor_country_hyperlink$ has reached our court. Due to the dishonorable actions of [target_character.GetName], the $bra_hre_emperor_hyperlink$ has granted us the unconditional right to deal with the imposter as we see fit."
 turmoil_in_brandenburg.1004.a: "Banish [target_character.GetHimHer]."
 turmoil_in_brandenburg.1004.b: "Execute [target_character.GetHimHer]."
 turmoil_in_brandenburg.1004.c: "[target_character.GetHisHer|U] abilities might actually come in handy for us..."
 turmoil_in_brandenburg.1004.c.tt: "[target_character.GetName] receives another chance and shall now become available to our cabinet"

 turmoil_in_brandenburg.1005.title: "Questionable Authenticity"
 turmoil_in_brandenburg.1005.desc: "The rule of the $bra_wittelsbach_hyperlink$ has ended, and the glorious $bra_askanier_hyperlink$ have returned to [bra_country.GetName] at last. Yet, suspicion falls on the newly crowned [ROOT.GetCountry.GetGovernment.GetRulerTitle]. [target_character.GetName] fails to recall achievements of [target_character.GetHisHer] time before [target_character.GetHisHer] apparent-staged funeral, members of the $bra_askanier_hyperlink_no_tt$ note unexplainable visual changes to their beloved family member, and even [target_character.GetHisHer] style of rulership is notoriously unlike [target_character.GetHimHer]. [target_character.GetShortNameWithNoTooltip] blames these inconsistencies on the experiences [target_character.GetHeShe] had while on [target_character.GetHisHer] pilgrimage to the Holy Land..."
 turmoil_in_brandenburg.1005.a: "Start an investigation into [target_character.GetHisHer] story."
 turmoil_in_brandenburg.1005.a.tt: "An investigation against the story of [target_character.GetName] starts, revealing [target_character.GetHisHer] true connection to the $bra_askanier_hyperlink$..."
 turmoil_in_brandenburg.1005.b: "These are just unverified rumors..."

 turmoil_in_brandenburg.1006.title: "Investigations Against [target_character.GetShortNameWithNoTooltip]"
 turmoil_in_brandenburg.1006.desc: "After two years of research, investigation, and comparing documents, the case of the authenticity of [target_character.GetName], current [ROOT.GetCountry.GetGovernment.GetRulerTitle], has finally found its end."
 turmoil_in_brandenburg.1006.desc.true_askanier: "$turmoil_in_brandenburg.1006.desc$\n\nAccording to the investigations, [target_character.GetName] is indeed a member of the $bra_askanier_hyperlink$, although not the real [GetCharacter('bra_waldemar_askanier').GetName] [target_character.GetHeShe] claimed to be. [target_character.GetHeShe] shares the same name as our deceased Margrave, but it turns out that [target_character.GetHisHer] was accidentally confused for the wrong $name_waldemar$."
 turmoil_in_brandenburg.1006.desc.false_askanier: "$turmoil_in_brandenburg.1006.desc$\n\nDespite [target_character.GetHisHer] best efforts to pretend, [target_character.GetHisHer] charade finally shattered as [target_character.GetHeShe] was confronted with facts. [target_character.GetShortNameWithNoTooltip] is nothing but an imposter, having deceived everyone in the court and even the members of the $bra_askanier_hyperlink$ into thinking that [GetCharacter('bra_waldemar_askanier').GetName] was alive and well again. As such, outcry in the [bra_country.GetAdjectiveWithNoTooltip] court is rather loud, and many parts of the government demand a resolution."
 turmoil_in_brandenburg.1006.a: "The similarities were just that striking!"
 turmoil_in_brandenburg.1006.a.tt: "[target_character.GetName] and every descendant will change their [dynasty|e] to $bra_askanier_hyperlink$"
 turmoil_in_brandenburg.1006.b: "At least [target_character.GetHeShe] is not a $bra_wittelsbach_hyperlink_no_tt$..."
 turmoil_in_brandenburg.1006.b.tt: "[target_character.GetName] and every descendant will change their [dynasty|e] to [target_dynasty.GetName]"
 turmoil_in_brandenburg.1006.c: "Remove the imposter!"

 turmoil_in_brandenburg.1007.title: "Execution of the False [target_character.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1007.desc.successful_execution: "[target_character.GetName] has been successfully captured and imprisoned by those loyal to [bra_ruler.GetName]. As it turns out, [target_character.GetShortNameWithNoTooltip] is no $bra_askanier_hyperlink$ - not even a member of our prestigious [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]! [target_character.GetSheHe|U] was accused of imposing, treason and threatening the stability of [bra_country.GetName], and was found guilty..."
 turmoil_in_brandenburg.1007.desc.failed_execution: "In the middle of the night, [target_character.GetName] was captured and imprisoned in [bra_country.GetCapital.GetName] to await [target_character.GetHisHer] supposed execution at first daylight. However, [target_character.GetShortNameWithNoTooltip] has proven [target_character.GetHerselfHimself] crafty, having anticipated our every move. Following the abduction, a great group of nobles - members of our [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] - assaulted the palace dungeons and freed the pretender.\n\nNow, [bra_country.GetName] now faces a civil war of unforeseeable dimensions..."
 turmoil_in_brandenburg.1007.a: "Another crisis well averted."
 turmoil_in_brandenburg.1007.b: "To arms!"
 bra_true_waldemar_identity_reveal_tt: "#italic The true identity of [target_character.GetName] will be revealed...#!"
 turmoil_in_brandenburg.false_waldemar_big_rebel.tt: "The [ShowPopTypeName('nobles')] and [ShowPopTypeName('peasants')] of up to #Y 16#! of most populous, owned locations gain the following effects:\n- Loses [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [pop_satisfaction|e]\n- Joins [false_waldemar_rebel.GetName]"
 false_waldemar_rebel: "Supporters of $name_waldemar$"

 turmoil_in_brandenburg.1100.title: "The Neglect of [root_country.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1100.desc: "The lands of [root_country.GetName] have always been rather underdeveloped. Yet, even at its worst, [root_country.GetNameWithNoTooltip] has never been as run down as it was under the hands of the $bra_wittelsbach_hyperlink$.\n\nNews of this bad situation has reached the $bra_hre_emperor_hyperlink$. The fate of [root_ruler.GetName] and [root_ruler.GetHisHer] rule over these lands hang in the balance..."
 turmoil_in_brandenburg.1100.a: "Certainly, the $bra_hre_emperor_hyperlink$ will understand our situation."
 turmoil_in_brandenburg.1100.a.tt: "The $bra_hre_emperor_hyperlink$ will decide our fate. The $bra_hre_emperor_hyperlink$ could decide to appoint a new ruler from another dynasty for us."
 turmoil_in_brandenburg.1101.title: "The $bra_wittelsbach_hyperlink_no_tt$ fail the $bra_hre_hyperlink_no_tt$"
 turmoil_in_brandenburg.1101.desc: "The situation in one of our electors, the [root_country.GetFlavorRank] of [root_country.GetName], has revealed itself as quite grim. The tyranny of local Robber Barons, a completely collapsing economy, and a neglectful [root_country.GetGovernment.GetRulerTitle], [root_ruler.GetName], plague the land, making it an eyesore within the $bra_hre_hyperlink$. It is our duty as the $bra_hre_emperor_hyperlink$ of the $bra_hre_hyperlink_no_tt$ to not allow such grave mismanagement to continue."
 turmoil_in_brandenburg.1101.a: "Assume direct control over the [root_country.GetFlavorRank]."
 turmoil_in_brandenburg.1101.a.tt: "We will place [emperor_ruler.GetName] as the new [ruler|e] of [root_country.GetName], forming a [union|e] with them"
 turmoil_in_brandenburg.1101.b: "Let [dynasty_character.GetNameWithNoTooltip] rule over [root_country.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.1101.b.tt: "We will place [dynasty_character.GetName] as the new [ruler|e] of [root_country.GetName]"
 turmoil_in_brandenburg.1101.c: "[cabinet_character.GetNameWithNoTooltip] shall rule over it in our name."
 turmoil_in_brandenburg.1101.c.tt: "We will place [cabinet_character.GetName] as the new [ruler|e] of [root_country.GetName], turning them into our [ShowSubjectTypeName('vassal')] but causing [ShowBiasValue('subjugated_elector_antagonism')|-=0] [antagonism|e] with every member of the [GetUniqueInternationalOrganization('hre').GetName]"
 subjugated_elector_antagonism: "Subjugated Elector"
 turmoil_in_brandenburg.1101.d: "One of our court advisors will fix the [root_country.GetAdjectiveWithNoTooltip] situation."
 turmoil_in_brandenburg.1101.d.tt: "We will place a local advisor from our court as the new [ruler|e] of [root_country.GetName]"
 turmoil_in_brandenburg.1101.e: "Let $bra_wittelsbach_hyperlink_no_tt$ be, they can restore it."
 turmoil_in_brandenburg.1101.e.tt: "We will leave the $bra_wittelsbach_hyperlink$ alone, letting them continue to rule over [root_country.GetName]"

 turmoil_in_brandenburg.1102.title: "The $bra_hre_emperor_hyperlink$'s Reply"
 turmoil_in_brandenburg.1102.desc.wittelsbach: "An ambassador from [emperor_country.GetName] has arrived at our court. He proclaims that the lands of [root_country.GetName] shall be united with those of [emperor_country.GetNameWithNoTooltip], with [emperor_ruler.GetName] as the common ruler."
 turmoil_in_brandenburg.1102.desc: "An ambassador from [emperor_country.GetName] has arrived at our court. He proclaims that the $bra_wittelsbach_hyperlink$ are no longer in power from this day onwards. The lands of [root_country.GetName] fall in the direct hands of [emperor_ruler.GetName], forcing us into a personal union with [emperor_country.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.1102.a: "Long live the $bra_hre_emperor_hyperlink$!"
 turmoil_in_brandenburg.1102.b: "Hopefully this time, the [root_country.GetLongNameWithNoTooltip] can keep it together."

 turmoil_in_brandenburg.1103.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1103.desc.wittelsbach: "An ambassador from [emperor_country.GetName] has arrived at our court. He proclaims that the lands of [root_country.GetName] be ruled by [dynasty_character.GetName]."
 turmoil_in_brandenburg.1103.desc: "An ambassador from [emperor_country.GetName] has arrived at our court. He proclaims that the $bra_wittelsbach_hyperlink$ are no longer in power from this day onwards. The lands of [root_country.GetName] fall directly into the hands of [dynasty_character.GetName]."
 turmoil_in_brandenburg.1103.a: "May [dynasty_character.GetShortNameWithNoTooltip] rule with strength."
 turmoil_in_brandenburg.1103.b: "A new chance for the [root_country.GetLongNameWithNoTooltip], it seems."

 turmoil_in_brandenburg.1104.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1104.desc.wittelsbach: "An ambassador from [emperor_country.GetName] has arrived at our court. He proclaims that the lands shall be ruled by a new member of the $bra_wittelsbach_hyperlink$ dynasty - one who has proven [cabinet_character.GetHerselfHimself] as reliable in the past already. [root_country.GetName] is now under the care of [cabinet_character.GetName], the most loyal of the [emperor_country.GetAdjectiveWithNoTooltip] vassals."
 turmoil_in_brandenburg.1104.desc: "An ambassador from [emperor_country.GetName] has arrived at our court. He proclaims that the $bra_wittelsbach_hyperlink$ are no longer in power from this day onwards. The lands of [root_country.GetName] fall directly into the hands of [cabinet_character.GetName], the most loyal of the [emperor_country.GetAdjectiveWithNoTooltip] vassals."
 turmoil_in_brandenburg.1104.a: "At least it is not a $bra_wittelsbach_hyperlink_no_tt$."
 turmoil_in_brandenburg.1104.b: "Oh, great... the $bra_wittelsbach_hyperlink_no_tt$ are back..."
 turmoil_in_brandenburg.1104.c: "We will not bend our knee to [emperor_country.GetNameWithNoTooltip]!"

 turmoil_in_brandenburg.1105.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1105.desc: "An ambassador from [emperor_country.GetName] has arrived at our court. He proclaims that the $bra_wittelsbach_hyperlink$ are no longer in power from this day onwards. The lands of [root_country.GetName] fall directly into the hands of [hohenzollern_character.GetName], a trusted advisor to the $bra_wittelsbach_hyperlink_no_tt$."
 turmoil_in_brandenburg.1105.a: "May [hohenzollern_character.GetHeShe] rule with wisdom."

 turmoil_in_brandenburg.1106.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1106.desc: "An ambassador from [emperor_country.GetName] has arrived at our court. He proclaims that the $bra_wittelsbach_hyperlink$ rulers shall receive an imperial warning, but are to keep the [root_country.GetFlavorRank]."
 turmoil_in_brandenburg.1106.a: "[root_country.GetNameWithNoTooltip] will forever remain property of the $bra_wittelsbach_hyperlink_no_tt$..."

 turmoil_in_brandenburg.1107.title: "The Resistance of [root_country.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1107.desc: "The stubborn failure of a state, [root_country.GetName], refuses to bow before us and our dominion. It is more than apparent that their incompetent leadership lacks vision, and as such, we have more than enough reason to subdue them by force."
 turmoil_in_brandenburg.1107.a: "We have no tolerance for traitors!"

 turmoil_in_brandenburg.1200.title: "The [bra_country.GetAdjectiveWithNoTooltip] Burden"
 turmoil_in_brandenburg.1200.desc: "After years of $bra_wittelsbach_hyperlink$ mismanagement, the house of [emperor_dynasty.GetName] has taken over the administration of [bra_country.GetName]. Although our intentions for the [bra_country.GetFlavorRank] are genuine and in their best interests, it is obvious that our efforts are not sufficient to undo the damage caused by the neglect of the $bra_wittelsbach_hyperlink_no_tt$.\n\nOne of our court advisors, [hohenzollern_character.GetName], has shown great competence in the matters of administration and diplomacy. Placing [hohenzollern_character.GetHimHer] in charge of [bra_country.GetNameWithNoTooltip] and granting [hohenzollern_character.GetHimHer] the necessary autonomy might help [bra_country.GetNameWithNoTooltip] to recover."
 turmoil_in_brandenburg.1200.a: "We shall entrust [hohenzollern_character.GetShortNameWithNoTooltip] with the [bra_country.GetFlavorRank]."
 turmoil_in_brandenburg.1200.a.tt: "The [ruler|e] of [bra_country.GetName] will be replaced with [hohenzollern_character.GetName]"
 turmoil_in_brandenburg.1200.b: "Nonsense. We can still lead [bra_country.GetNameWithNoTooltip] ourselves."

 turmoil_in_brandenburg.1201.title: "[hohenzollern_character.GetNameWithNoTooltip] - The New Ruler of [bra_country.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1201.desc: "After years of $bra_wittelsbach_hyperlink$ mismanagement, the lords of [emperor_country.GetName] have taken over [bra_country.GetName]. While their intentions are in our best interests, their duties towards the $bra_hre_hyperlink$ have made it impossible for them to rule over our lands with any more engagement than the most enthusiastic member of the $bra_wittelsbach_hyperlink_no_tt$ dynasty.\n\nFortunately for us, [emperor_ruler.GetName] is aware of the situation and has sent [emperor_ruler.GetHisHer] most talented advisor, [hohenzollern_character.GetName], to manage [bra_country.GetNameWithNoTooltip] autonomously."
 turmoil_in_brandenburg.1201.a: "May [hohenzollern_character.GetHeShe] rule with wisdom and strength."

 turmoil_in_brandenburg.1300.title: "Rise of Robber Barons"
 turmoil_in_brandenburg.1300.desc: "Weak control over [ROOT.GetCountry.GetGovernment.GetRulerTitle] and general lawlessness has led to the rise of the Robber Barons - nobles who live off lawlessness and lead a life of crime. Their presence only serves to weaken our control and undermine the authority of [target_ruler.GetName]. Currently, their hold is the strongest in [robber_baron_province.GetName]."
 turmoil_in_brandenburg.1300.a: "We will deal with them in due time."
 STATIC_MODIFIER_NAME_PRU_robber_barons: "Robber Barons"
