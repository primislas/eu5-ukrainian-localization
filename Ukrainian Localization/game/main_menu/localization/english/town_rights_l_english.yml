l_english:

 revoke_town_rights: "Revoke Urban Rights"
 revoke_town_rights_desc: ""
 REVOKE_TOWN_RIGHTS_FROM: "Revoke [town_rights|E] from [TownRightsItem.GetFirstLocationName]"


#######################################
#   Non-production Rights    ##########
#######################################
 staple_port: "Staple Port"
 staple_port_desc: "This [location|e] has been granted legal privileges giving the [ShowEstateTypeName('burghers_estate')] more rights over the local [trade|e]."
 granary_town: "Granary Town"
 granary_town_desc: "This [location|e] has been granted legal privileges and regulations to increase its production and storage of [food|e]."


 
#######################################
#   Production Rights    ##############
#######################################

 royal_tooling_rights: "Tooling Rights"
 royal_tooling_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('tools')], conferring a significant competitive advantage."

 royal_jewelry_rights: "Jewelry Rights"
 royal_jewelry_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('jewelry')], conferring a significant competitive advantage."

 royal_weaponry_rights: "Weaponry Rights"
 royal_weaponry_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('weaponry')], [ShowGoodsName('firearms')], and [ShowGoodsName('cannons')], conferring a significant competitive advantage."

 royal_book_rights: "Printing Rights"
 royal_book_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('paper')], [ShowGoodsName('books')], and [ShowGoodsName('dyes')], conferring a significant competitive advantage."
 
 royal_artisan_rights: "Artisan Rights"
 royal_artisan_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('leather')], [ShowGoodsName('pottery')], and [ShowGoodsName('furniture')], conferring a significant competitive advantage."

 royal_brewing_rights: "Spirituous Rights"
 royal_brewing_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('liquor')], [ShowGoodsName('beer')], and [ShowGoodsName('wine')], conferring a significant competitive advantage."
 
 royal_textile_rights: "Textile Rights"
 royal_textile_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('cloth')] and [ShowGoodsName('fine_cloth')], conferring a significant competitive advantage."
 
 royal_naval_rights: "Naval Supplies Rights"
 royal_naval_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('naval_supplies')] and [ShowGoodsName('tar')], conferring a significant competitive advantage."
 not_forcefully_revoked_last_10_years_tt: "Urban rights have not been forcefully revoked in the last 10 years."
 
 royal_masonry_rights: "Masonry Rights"
 royal_masonry_rights_desc: "This [location|e] has been granted legal privileges over the production and distribution of [ShowGoodsName('masonry')] and [ShowGoodsName('glass')], conferring a significant competitive advantage."
 
 
 
 
 #######################################
 #   Historic Rights    ################
 #######################################
 
 magdeburg_rights_town_rights: "$magdeburg_rights$"
 magdeburg_rights_town_rights_desc: "$magdeburg_rights_desc$"
 unlock_mageburg_town_rights_tt: "Unlocks the [ShowTownRightsName('magdeburg_rights_town_rights')] and [ShowTownRightsName('nuremberg_rights_town_rights')] [town_rights]"
 
 lubeck_town_rights: "[ShowLocationNameWithNoTooltip('lubeck')] Rights"
 lubeck_town_rights_desc: "Regulating the laws and privileges within our urban settlements according to those of [ShowLocationName('lubeck')] itself will grant our merchants more power. While the benefits for our traders will assist their abilities to conduct trade, the guild members within the city will be unhappy about this preferential treatment and obstruct us in their own ways."

 town_rights_marketplace: "Marketplace Town Rights"
 
 nuremberg_rights_town_rights: "[ShowLocationNameWithNoTooltip('nuremberg')] Rights"
 nuremberg_rights_town_rights_desc: "$magdeburg_rights_town_rights_desc$"
 
 upper_bergregal: "Upper Bergregal"
 upper_bergregal_desc: "Ceding the right to conduct mining operations to the government of the town will increase the funds available to prospect for more minerals, and increase the appeal to potential new settlers. Unfortunately, this comes at the cost of sharper restrictions on the local commoners and their ability to benefit from the mines themselves."
 unlock_bergregal_rights_tt: "Unlocks the [ShowTownRightsName ('upper_bergregal')] and [ShowTownRightsName('lower_bergregal')] [town_rights]"
 
 lower_bergregal: "Lower Bergregal"
 lower_bergregal_desc: "$upper_bergregal_desc$"
 
 stapelrecht_town_rights: "[ShowSpecialStatusNameWithNoTooltip('free_city')] Staple Rights"
 stapelrecht_town_rights_desc: "The title of a [ShowSpecialStatusName('free_city')] granted to us by the [ShowSpecialStatusName('emperor')] grants us the freedom to enact certain privileges within our cities, benefiting the local merchants and forcing more foreign merchants to trade through our lands."
 
 kulm_town_rights: "Kulm Rights"
 kulm_town_rights_desc: "$kulm_law_desc$"
 unlock_kulm_town_rights_tt: "Unlocks the [ShowTownRightsName('kulm_town_rights')] [town_rights]"
 
 novi_fori_town_rights: "$novi_fori$ Rights"
 novi_fori_town_rights_desc: "$novi_fori_desc$"
 unlock_novi_fori_rights_tt: "Unlocks the [ShowTownRightsName('novi_fori_town_rights')] [town_rights]"
 
 royal_free_cities_town_rights: "Royal Free City Rights"
 royal_free_cities_town_rights_desc: "By declaring our urban centers as Royal and Free Cities we can prevent our [ShowEstateTypeName('nobles_estate')] from accumulating power within their bounds."
 
 bohemian_royal_cities_town_rights: "Royal City Rights"
 bohemian_royal_cities_town_rights_desc: "Granting cities the privilege of being declared direct property of our ruler will weaken the [ShowEstateTypeName('nobles_estate')], and could help our state extract more value from them directly."
 
 swedish_city_rights: "Stadsrättigheter Rights"
 swedish_city_rights_desc: "The merchants of this location will receive extended privileges to conduct their trade free of foreign competition."
 
 norwegian_city_rights: "Kjøpstad Rights"
 norwegian_city_rights_desc: "Granting privileges to the merchants of this location and giving them preferential treatment will bolster our own trading routes, while disfavoring foreign merchants."
 
 borough_customals: "Borough Custumals"
 borough_customals_desc: "The locations bestowed with these rights will be able to administrate their own growth and serve as free havens from noble oppression."

 manorial_customals: "Manorial Custumals"
 manorial_customals_desc: "Granting the manorial landholders more executive power over this location will increase the exploitation of the land and keep the unruly peasantry in check."
 
 foros_extensos_town_rights: "Foros Extensos"
 foros_extensos_town_rights_desc: "Since its inception, $POR$ has been a borderland, populated by renowned men such as Geraldo sem Pavor. Its rulers encourage this bravery and indomitability by granting wide concessions usually known as $foros_extensos_town_rights$."
 
 fuero_juzgo_town_rights: "Fuero Juzgo"
 fuero_juzgo_town_rights_desc: "The $fuero_juzgo_town_rights$ is based on the ancient Visigothic code, the #italic Liber Iudiciorum#!. As such, it regulates many aspects of daily life, making it especially appropriate for newly colonized lands."
 
 fuero_real_town_rights: "Fuero Real"
 fuero_real_town_rights_desc: "The $fuero_real_town_rights$ is a code devised by King Alfonso X of Castile to extend royal power throughout the municipalities of $CAS$."
 
 fuero_general_town_rights: "Fuero General"
 fuero_general_town_rights_desc: "The $fuero_general_town_rights$ of $NAV$ is the compilation of customs and laws that govern the different estates of the territory, in agreement with its ruler."
 
 fuero_de_aragon_town_rights: "Fueros de Aragón"
 fuero_de_aragon_town_rights_desc: "The $fuero_de_aragon_town_rights$ compiled the various municipal rights that spread throughout $aragon_area$ during its expansion. Therefore, they are rigorously defended by both the $nobles_estate$ and the $peasants_estate$."
 
 usatges_de_barcelona_town_rights: "Usatges de Barcelona"
 usatges_de_barcelona_town_rights_desc: "The $usatges_de_barcelona_town_rights$ are the customs and traditions that govern the $catalan$ territories, promulgated and granted originally by the Counts of $barcelona$."

 furs_de_valencia_town_rights: "Furs de Valencia"
 furs_de_valencia_town_rights_desc: "The $furs_de_valencia_town_rights$ were granted to the kingdom of the same name by King James I of Aragon after its conquest. Their main difference from the old customs of $aragon_area$ and $catalonia_area$ lay in their focus on regulating coexistence with the $muslim_ADJ$ population, which is the majority in some areas."

 flemish_cloth_industries_right: "Flemish Cloth Industry"
 flemish_cloth_industries_right_desc: "The Late Middle Ages saw the birth of a powerful textile industry in the Low Countries. Manufactured from imported $ENG_ADJ$ and $CAS_ADJ$ wool, fabric of the highest quality were exported to all of $europe$."

 ville_franche_town_rights: "Ville Franche Rights"
 ville_franche_town_rights_desc: "$villes_franches_desc$"
 unlock_ville_franche_town_rights_tt: "Unlocks the [ShowTownRightsName('ville_franche_town_rights')] [town_rights]"

 borgo_franco_town_rights: "Borgo Franco Rights"
 borgo_franco_town_rights_desc: "The spread of communes throughout $italy_region$ is a reality, forming the backbone of the region. These are often considered #italic Borgo Franco#! (free towns) and enjoy many special privileges compared to the countryside."

 #######################################
 #   Scandinavian Rights    ############
 #######################################

 scandinavian_fishing_privileges: "Fiskeriprivilegier"
 scandinavian_fishing_privileges_desc: "This [location|e] has been granted exclusive rights over nearby fishing grounds and the trade in dried and salted fish. Norwegian coastal towns organized around these privileges supplied [ShowGoodsName('fish')] across Northern Europe."

 scandinavian_bergslag_privileges: "Bergslagsprivilegier"
 scandinavian_bergslag_privileges_desc: "The Crown has recognized this [location|e] as a mining community (bergslag), granting it collective rights over local ore extraction, its own court, and freedom from military conscription. The [ShowEstateTypeName('peasants_estate')] of the mines hold a stronger legal standing than in ordinary towns."

 scandinavian_tar_privileges: "Tjärprivilegier"
 scandinavian_tar_privileges_desc: "This [location|e] has been granted rights to harvest and export [ShowGoodsName('tar')] and [ShowGoodsName('naval_supplies')] from Crown forests. These forest industries are the backbone of Baltic shipbuilding supply chains."

 scandinavian_thing_rights: "Tingsrätt"
 scandinavian_thing_rights_desc: "This [location|e] has been granted formal assembly rights (tingsrätt), giving its inhabitants a recognized legal forum for governance and justice. Royal authority is curtailed in exchange for a more orderly and loyal population."

 #Byzantine / Greek / Roman

 imperial_breadbasket_rights: "Imperial Breadbasket"
 imperial_breadbasket_rights_granary_tt: "Has a [ShowBuildingTypeName('granary')] at maximum level."
 imperial_breadbasket_rights_desc: "This [location|e] has been entrusted with provisioning the wider realm, its granaries expanded to account for our ambitious plans. Grain flows inward and outward under imperial supervision, sustaining the citizens and army alike with abundance."

 constantinopolitan_silk_monopoly_rights: "Silk Monopoly of [ShowLocationNameWithNoTooltip('constantinople')]"
 constantinopolitan_silk_monopoly_rights_desc: "Within [ShowLocationName('constantinople')], the production of [ShowGoodsName('silk')] is held to a high standard, a long tradition that spans generations. Workshops flourish under imperial oversight, though all production dances to the tune of monopoly."

 scholai_literacy_rights: "Scholai Privileges"
 scholai_literacy_rights_desc: "This [location|e] is recognized as a center of learning, where letters are fostered under official patronage. Knowledge spreads swiftly, though such pursuits rarely enrich the treasury. Idle minds are the devil's playthings."

 municipia_privilegia: "Municipia Privileges"
 municipia_privilegia_desc: "This [location|e] has been elevated to the status of municipium, its citizens granted rights under our law. Local elites wield greater influence, binding the land closer to the traditions of [ShowSocietyDirectionName('latinization')]."