l_english:
 # AI Personality names (used as PdxDataLocalize(GetKey()) in CAiPersonality::GetName)
 ai_aggressive: "Aggressive"
 ai_expansionist: "Expansionist"
 ai_defensive: "Defensive"
 ai_cautious: "Cautious"
 ai_opportunistic: "Opportunistic"
 ai_isolationist: "Isolationist"
 ai_friendly: "Friendly"

 # AI Personality descriptions (key + "_desc")
 ai_aggressive_desc: "This nation pursues power through force. It is quick to initiate wars, demands harsh peace terms, and views neighboring powers as obstacles to be overcome rather than partners to be cultivated."
 ai_expansionist_desc: "This nation seeks to expand its borders and influence. It favors territorial growth, pursues claims actively, and tends toward subjugation rather than outright annexation when the opportunity presents itself."
 ai_defensive_desc: "This nation is primarily concerned with protecting what it has. It prefers to avoid unnecessary conflicts, builds strength at home, and responds to threats rather than creating them."
 ai_cautious_desc: "This nation is risk-averse and patient. It seeks diplomatic solutions first, avoids wars it cannot win decisively, and places a high value on stability over adventurism."
 ai_opportunistic_desc: "This nation is calculating and pragmatic. It watches for weakness in others and exploits advantageous moments, but avoids committing to conflicts when the outcome is uncertain."
 ai_isolationist_desc: "This nation focuses inward, prioritizing internal development and resisting foreign entanglement. It maintains a strong preference for neutrality and views diplomatic obligations with suspicion."
 ai_friendly_desc: "This nation values alliances, goodwill, and fair dealings. It invests heavily in diplomacy, accepts reasonable peace terms, and tends to accumulate reliable partners over time."

 # Diplomacy filter category header
 CUSTOM_SEARCH_FILTER_AI_PERSONALITY_CATEGORY_NAME: "Country Personality"

 # Tooltip section header
 AI_PERSONALITY_MODIFIERS: "Behavioral Modifiers"

 # AI disposition labels (how this country sees the player)
 AI_DISPOSITION_ALARMED: "Alarmed"
 AI_DISPOSITION_WARY: "Wary"
 AI_DISPOSITION_PLANNING_WAR: "Planning War"
 AI_DISPOSITION_COVETS: "Covets Your Land"
 AI_DISPOSITION_RIVALS: "Rivals"
 AI_DISPOSITION_INDIFFERENT: "Indifferent"

 # AI disposition descriptions (tooltip body for each disposition)
 AI_DISPOSITION_ALARMED_DESC: "This [country_disposition|e] means they see you as an existential threat and are likely to seek defensive alliances or take pre-emptive action against you."
 AI_DISPOSITION_WARY_DESC: "This [country_disposition|e] means they are cautious around you and will be reluctant to make concessions or lower their guard."
 AI_DISPOSITION_PLANNING_WAR_DESC: "This [country_disposition|e] means they have an active claim or grievance and are preparing to press it by force."
 AI_DISPOSITION_COVETS_DESC: "This [country_disposition|e] means they see your lands as an attractive target and may seek to conquer or subjugate you when the opportunity arises."
 AI_DISPOSITION_RIVALS_DESC: "This [country_disposition|e] means they regard you as a rival and will oppose your interests where they can, including supporting your enemies."
 AI_DISPOSITION_INDIFFERENT_DESC: "This [country_disposition|e] indicates they have no strong feelings toward you at this time."

