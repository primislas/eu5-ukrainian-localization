 OBJECTIVE_SUBJUGATE_TARGET: "• Seeks to make [COUNTRY.GetLongName] a vassal"
 OBJECTIVE_DEFEND_AGAINST: "• Seeking to contain [COUNTRY.GetLongName]"
 OBJECTIVE_BUILD_OPINION: "• Building friendship with [COUNTRY.GetLongName]"
