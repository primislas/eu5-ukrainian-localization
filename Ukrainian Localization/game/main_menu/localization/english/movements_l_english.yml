l_english:
 roman_culture_movement: "Latin Revival"
 hellenism_religion_movement: "Platonic Revival"
 hellenism_religion_movement_allow_tt: "[GetCountry('BYZ').GetName] must do this through the [ShowGenericActionName('reestablish_hellenism')] action or the Gemistos Plethon [events|e]."
 roman_culture_movement_allow_tt: "[GetCountry('BYZ').GetName] must be leaning towards [ShowSocietyDirectionName('latinization')] and own an [urban_location|e] with a [ShowLanguageFamilyName('romance_language_family')] [dominant_language|e] that has [average_satisfaction|e] over 50%"
 hellenism_religion_movement_desc: "Among the Greek and Roman Christian peoples, a movement stirs — a yearning to reclaim the ancient ways and wisdom of their Hellenic forebears."
 hellenism_religion_movement_location_modifier: "$hellenism_religion_movement$ Modifier"
 roman_culture_movement_desc: "The renaissance of the Latin ways within the rebirthed Roman Empire."
 roman_culture_movement_location_modifier: "$roman_culture_movement$ Modifier"
 MOVEMENT_SPREAD: "Movement Spread"
 MOVEMENT_SPREAD_CULTURE: "$MOVEMENT$ is a movement that is spreading $CULTURE$ culture in our country. We currently have $AMOUNT$ of our population assimilated to this culture which is the $PERCENTAGE|%2$ of our population."
 MOVEMENT_SPREAD_RELIGION: "$MOVEMENT$ is a movement that is spreading $RELIGION$ religion in our country. We currently have $AMOUNT$ of our population converted to this religion which is the $PERCENTAGE|%2$ of our population."
 MOVEMENT_SUBJECT_RELIGION: "[religion|e]: $NAME$"
 MOVEMENT_SUBJECT_CULTURE: "[culture|e]: $NAME$"
 MOVEMENT_SPREADER_TT_TITLE: "Spreads differently through [pops|e]:"
