 SPREAD_RELIGION_ENTRY: "$RELIGION$ [religion|e] gets $AMOUNT|%0$ faster"
 SPREAD_RELIGION_GROUP_ENTRY: "$RELIGION_GROUP$ [religion_group|e] gets $AMOUNT|%0$ faster"
 SPREAD_CULTURE_ENTRY: "$CULTURE$ [culture|e] gets $AMOUNT|%0$ faster"
 SPREAD_LANGUAGE_FAMILY_ENTRY: "$LANGUAGE_FAMILY$ [language_family|e] gets $AMOUNT|%0$ faster"
 SPREAD_LANGUAGE_ENTRY: "$LANGUAGE$ [language|e] gets $AMOUNT|%0$ faster"
 MOVEMENT_POTENTIAL_TOOLTIP_HEADING: "Triggers required to start:"
 SPREADABLE_REQUIRED_TOOLTIP_HEADING: "[pops|e] must belong to the following to be affected:"
 SPREADABLE_REQUIRED_TOOLTIP_CULTURE: "[cultures|e]: $LIST$"
