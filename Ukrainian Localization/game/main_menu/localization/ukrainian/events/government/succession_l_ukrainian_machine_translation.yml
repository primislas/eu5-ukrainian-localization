l_english:
  succession_desc_key: "Традиція нашого народу вимагає, щоб лише найдостойніші та найздібніші сходили на престол, незалежно від того, яким чином вони цього досягають. Це зазвичай означає, що сини старого [ROOT.GetCountry.GetGovernment.GetRulerTitle] вбиватимуть один одного, доки не залишиться лише один, щоб правити безперешкодно."
  succession.1.title: "Винищення синів [old_ruler.GetNameWithNoTooltip]"
  succession.1.title_fallback: "Винищення синів"
  succession_desc_murder_key: "\n\nДо нас доходять вісті, що [killer_scope.GetName] вдалося усунути [victim_scope.GetName], наказавши своїм людям задушити його, таким чином він дотримався традиції та усунув небезпечного суперника, не проливши крові родича."
  succession.1.desc.a: "$succession_desc_key$$succession_desc_murder_key$"
  succession.1.desc.b: "$succession_desc_key$$succession_desc_murder_key$\n\nНарешті [killer_scope.GetName] став останнім нащадком [old_ruler.GetName] і збирається повернути контроль над [ROOT.GetCountry.GetName]."
  succession.1.desc.c: "$succession_desc_key$\n\nАле через примхи долі всі сини [old_ruler.GetName], що залишилися, є неповнолітніми та непридатними для правління."
  succession.1.a: "[killer_scope.GetNameWithNoTooltip] отримав прихильність."
  succession.1.a.tt: "Винищення триватиме, доки не залишиться лише один гідний син."
  succession.1.b: "Слава [killer_scope.GetNameWithNoTooltip]!"
  succession.1.c: "Покласти край цій ситуації, підтримати [killer_scope.GetShortNameWithNoTooltip]."
  succession.1.c.tt: "Кожен брат [Concept('killer_scope.GetName] гине. За кожного вбитого [character', 'CONCEPT_PLACEHOLDER')|e] відбудеться наступне:"
  succession.1.d: "Традицію слід підтримувати, ми зачекаємо."
  succession.1.e: "Це нісенітниця, підійде інший член [old_ruler.GetDynasty.GetNameWithNoTooltip]."
  succession.2.title: "Могутній радник"
  succession.2.desc: "Зішестя нашого нового [new_ruler.GetName] після смерті [old_ruler.GetName] вкинуло [ROOT.GetCountry.GetGovernment.GetCourtTitle] у безлад. Різні фракції країни намагаються здобути прихильність нового [ROOT.GetCountry.GetGovernment.GetRulerTitle], водночас підриваючи або знищуючи інші фракції, що швидко занурило уряд у хаос.\n\nНа щастя для [ROOT.GetCountry.GetName], шанований [usurper_scope.GetName] має достатньо влади, щоб приборкати незадоволені фракції та стати опорою, яка тримає їх разом, поки [new_ruler.GetShortNameWithNoTooltip] зростає у [new_ruler.GetHisHer] ролі, хоча дехто побоюється, що [usurper_scope.GetShortNameWithNoTooltip] не відмовиться від [usurper_scope.GetHisHer] нової влади добровільно, коли прийде час."
  succession.2.a: "[new_ruler.GetNameWithNoTooltip] стає номінальним правителем."
  succession.3.title: "Гідна заміна"
  succession.3.desc.partial: "Після смерті [old_ruler.GetName] всі [old_ruler.GetHerHis] діти, що залишилися, надто молоді або іншим чином непридатні для правління над [ROOT.GetCountry.GetName]. Щоб уникнути занурення країни в хаос через відсутність сильного та шанованого лідера, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] згуртувалися навколо постаті [dynasty_member_scope.GetName], відомого та здібного члена династії [old_ruler.GetDynasty.GetName]."
  succession.3.desc.a: "$succession.3.desc.partial$"
  succession.3.desc.b: "$succession.3.desc.partial$\n\nАле доля мінлива, і [dynasty_member_scope.GetName] знайшов [dynasty_member_scope.GetHerHis] загибель, перш ніж зійти на престол, змусивши [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] розпочати пошук гідного кандидата заново."
  succession.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  succession.3.b: "[ROOT.GetCountry.Custom('common_string_negative')]"
  succession.4.title: "Нова династія сходить"
  succession.4.desc.default: "Смерть [old_ruler.GetName] без гідного спадкоємця означає кінець династії [old_ruler.GetDynasty.GetName]. Наш народ оплакує втрату правлячої родини, але [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] має рухатися далі, і новий лідер відгукнувся на заклик народу."
  succession.4.desc: "$succession.4.desc.default$\n\n[new_leader.GetName] з [new_leader.GetDynasty.GetName] династії зійшов з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] як найвпливовіший та наймогутніший серед них, приборкуючи будь-які незадоволені фракції та запобігаючи падінню країни в хаос."
  succession.4.a: "Нова кров"
  succession.5.title.new_ruler_son: "Сходження [new_ruler_son.GetNameWithNoTooltip]"
  succession.5.title.new_ruler_regent: "[new_ruler_regent.GetNameWithNoTooltip] узурпує Престол"
  succession.5.title.no_ruler: "Наступництво [ROOT.GetCountry.GetNameWithNoTooltip]"
  succession.5.desc.new_ruler_son: "Нарешті, [new_ruler_son.GetName], [new_ruler_son.GetDaugtherSon] [old_ruler.GetName], досяг повноліття і має право зайняти престол [ROOT.GetCountry.GetName]. Як [new_ruler_son.GetHerHis] перший акт, загрози [new_ruler_son.GetHerHis] сходженню на престол мають бути усунені, поки [new_ruler_son.GetHerHis] величність консолідує владу в [ROOT.GetCountry.GetCapital.GetName]."
  succession.5.desc.new_ruler_regent: "$succession.4.desc.default$\n\n[new_ruler_regent.GetName] з [new_ruler_regent.GetDynasty.GetName] династії зійшов з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] як найвпливовіший та наймогутніший серед них, приборкуючи будь-які незадоволені фракції та запобігаючи падінню країни в хаос."
  succession.5.desc.no_ruler: "$succession.4.desc.default$"
  succession.5.a: "[new_ruler_son.GetDynasty.GetNameWithNoTooltip] переможе!"
  succession.5.a.tt: "Кожен брат [Concept('new_ruler_son.GetName] гине. За кожного вбитого [character', 'CONCEPT_PLACEHOLDER')|e] станеться наступне:"
  succession.100.title: "Новий [ROOT.GetCountry.GetGovernment.GetRulerTitle] з [ROOT.GetCountry.GetNameWithNoTooltip]"
  succession.100.desc.a: "Дотримуючись традиції нашого народу, після смерті [old_ruler.GetName], [old_ruler.GetHisHer] первісток отримує левову частку титулів та спадщини, стаючи нашим новим [ROOT.GetCountry.GetGovernment.GetRulerTitle], але за тим же законом кожен чоловічий нащадок має право на частину земель свого батька, щоб правити ними самостійно без втручання головного спадкоємця.\n\nЦе зменшує контроль, який [new_ruler.GetName] здатен здійснювати в цих провінціях, можливо, до точки, де він близький до нуля. Водночас, Поділ [ROOT.GetCountry.GetFlavorRank] також забезпечує мир та стабільність, оскільки немає збіднілих синів, які шукають землі свого батька."
  succession.100.desc.b: "[old_ruler.GetName] відійшов у потойбіччя, на щастя, [new_ruler.GetName] залишається і цього дня стає нашим новим [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Оскільки [new_ruler.GetHeShe] не має відповідних братів, поділу титулів [old_ruler.GetNameWithNoTooltip] не буде."
  succession.100.desc.c: "Наступництва ніколи не бувають гладким процесом. Іноді брати й сестри борються за престол. Іноді немає спадкоємця для престолу. А іноді старий правитель і новий [ROOT.GetCountry.GetGovernment.GetRulerTitle] є однією і тією ж особою, проте двір поводиться так, ніби наступництво відбулося в першу чергу.\n\nТак сталося з [new_ruler.GetName], який успадкував престол [ROOT.GetCountry.GetName] вже досить давно. [ROOT.GetCountry.GetAdjectiveWithNoTooltip] закони про наступництво є безладом, якщо така плутанина може статися всередині держави..."
  succession.100.a: "Ми розділимо [ROOT.GetCountry.GetNameWithNoTooltip]."
  succession.100.b: "Брати правитимуть як одне ціле."
  succession.100.b.tt: "Брати продовжать правити [ROOT.GetCountry.GetFlavorRank] разом."
  succession.100.c: "[ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip] не буде розділено!"
  succession.100.d: "[new_ruler.GetNameWithNoTooltip] нестиме тягар сам."
  succession.100.e: "Позбудьмося цих законів..."
  succession.100.f: "Наступництво було безладом у минулому. Давайте позбудемося цієї системи."
  succession.101.title: "Унія Корон"
  succession.101.desc: "Наш попередній монарх уклав угоду з Короною [union_partner.GetName]: той, хто переживе іншого монарха, успадкує престол свого договірного партнера. Таким чином, великий [new_ruler.GetName] буде відомий як суверен [junior_partner.GetAdjective] Корони."
  succession.101.a: "Хай живе [junior_partner.GetGovernment.GetRulerTitle]!"
  succession.102.desc: "Корона [Concept('union_partner.GetName] колись уклала пакт з Короною [junior_partner.GetName]: чий монарх переживе іншого, успадкує його престол, об'єднавши обидві нації в одну [union', 'CONCEPT_PLACEHOLDER')|e]. Як виявилося, попередній [ROOT.GetCountry.GetGovernment.GetRulerTitle] [junior_partner.GetNameWithNoTooltip] був забраний Смертю, і тепер [junior_partner.GetAdjectiveWithNoTooltip] престол належить єдиному справжньому [new_ruler.GetName]."
  succession.102.a: "Нехай [new_ruler.GetHerHis] правління розпочне еру процвітання для Унії."
  joint_ruling.100.title.a: "Термін дії закінчився"
  joint_ruling.100.title.b: "Долина Сліз"
  joint_ruling.100.desc.a: "Згідно із законом та угодою між Спільними Правителями [ROOT.GetCountry.GetName], настав час для [ROOT.GetCountry.GetGovernment.GetRuler.GetName] відступити, а для [pretender_brother.GetName] зійти на престол. Добре ім'я [ROOT.GetCountry.GetNameWithNoTooltip] та династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] залежить від мирної передачі влади."
  joint_ruling.100.desc.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] не має жодних підходящих братів, щоб розділити з ними трон, залишаючи нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] єдиним правителем [ROOT.GetCountry.GetName]."
  joint_ruling.100.a: "Повстань, мій [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  joint_ruling.100.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] є єдиним законним [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  joint_ruling.100.c: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] правитиме сам."
  rebellious_prince_name: "Бунтівні Принци"
  joint_ruling.101.title: "Заздрісний Брат"
  joint_ruling.101.desc: "[jealous_brother.GetName], найжорстокіший і найгнівніший зі Спільних Правителів [ROOT.GetCountry.GetName], знову приніс конфлікт у серце уряду. Цього разу, поскаржившись на управлінські здібності нашого нинішнього [ROOT.GetCountry.GetGovernment.GetRulerTitle] та поганий стан [ROOT.GetCountry.GetNameWithNoTooltip], він вимагає негайної передачі влади престолу йому. Якщо ми цього не зробимо, він погрожує зібрати своїх послідовників і підняти свій регіон у відкрите повстання проти нинішнього [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  joint_ruling.101.a: "Ми уникнемо безглуздого кровопролиття."
  joint_ruling.101.b: "Нехай робить найгірше, ми готові."
  joint_ruling.101.c: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] не терпить погроз миру, навіть від родичів. Схопіть його."