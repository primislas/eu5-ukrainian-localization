l_english:
  theocratic_flavor.1.title: "Все, що блищить, не золото"
  theocratic_flavor.1.desc: "Емісар прибуває до нашого двору, тримаючи стару книгу. Він стверджує, що історія світу написана в книзі із золотими пластинами. Це заборонене знання потрапило до рук нашого великого правителя, чий проникливий погляд розплутує безліч таємниць. Чи дозволимо ми [ROOT.GetCountry.GetGovernment.GetRuler.GetName] прочитати ці прокляті сторінки?"
  theocratic_flavor.1.a: "Це золото."
  theocratic_flavor.1.b: "Це не так."
  STATIC_MODIFIER_NAME_its_not_gold: "Це не золото"
  STATIC_MODIFIER_DESC_its_not_gold: "Розсудливість – це рішення, яке цінують наші місіонери."
  theocratic_flavor.2.title: "Правління Боже"
  theocratic_flavor.2.desc: "Бути керованим смертним, благословенним божественністю, – це перевага, якою мало хто має честь володіти. Ті, хто знає, що таке буття, охоче допоможуть нам проти наших зіпсованих ворогів."
  theocratic_flavor.2.a: "Святий є закон."
  STATIC_MODIFIER_NAME_the_rule_of_god: "Правління Боже"
  STATIC_MODIFIER_DESC_the_rule_of_god: "Моральний дух наших армій зростає при вигляді нашого благословенного лідера."
  theocratic_flavor.3.title: "Влада"
  theocratic_flavor.3.desc: "Високий статус [target_ruler.GetName] не залишився непоміченим нашим народом. [target_ruler.GetHerHis] влада зрівняється лише з найбільшими героями нашого минулого, [target_ruler.GetHerHis] догматичні очі лежать на тілах наших ворогів, як дві стріли помсти, [target_ruler.GetHerHis] безжальний голос – невпинний грім. Рішучість [target_ruler.GetNameWithNoTooltip] стане джерелом натхнення для наших військ."
  theocratic_flavor.3.a: "Наша армія знає, як з цим впоратися."
  theocratic_flavor.4.title: "Відверни свої смертні очі"
  theocratic_flavor.4.desc: "Видіння зійшло на нашу землю. Палаючі очі падають з небес, як смертоносні зірки, розплавляючи плоть ворогів до кісток. Наших генералів та радників заохотили переконатися, що це видіння стане правдою, а найкращих артилерійських експертів нашої нації закликали зосередитися на тому, щоб дивитися на наші війська було так само небезпечно, як дивитися прямо на сонце."
  theocratic_flavor.4.a: "Вони не дивитимуться на нас."
  STATIC_MODIFIER_NAME_avert_thy_mortal_eyes: "Відверни свої смертні очі"
  STATIC_MODIFIER_DESC_avert_thy_mortal_eyes: "Військові технології були зосереджені на втіленні видінь нашого правителя."
  theocratic_flavor.5.title: "Згасання світла"
  theocratic_flavor.5.desc: "Дні завжди стають коротшими на війні. Заплутані промені світла падають перпендикулярно на купи мертвих тіл. Важко розгледіти небо з цього шаленого поля битви. Ця патина трохи побитого сонячного світла, ці хмари пилу, що приховують його від роздратованих очей наших військ. Дні тепер лише тіні."
  theocratic_flavor.5.a: "Лютуй, лютуй проти цього."
  STATIC_MODIFIER_NAME_the_dying_of_the_light: "Згасання світла"
  STATIC_MODIFIER_DESC_the_dying_of_the_light: "Наші війська почуваються пригніченими через брак сонячного світла."
  theocratic_flavor.6.title: "Підозрюй своїх старійшин"
  theocratic_flavor.6.desc: "Зі зростанням впливу наших релігійних служителів поширилися чутки про шпигунів, посланих до покоїв [ROOT.GetCountry.GetGovernment.GetRuler.GetName] з убивчими намірами. Шанований радник запропонував створити контррозвідувальну мережу проти нашого власного народу. В інші часи це було б немислимо, але зараз це здається єдиним логічним варіантом."
  theocratic_flavor.6.a: "Ми будемо стежити за ними."
  theocratic_flavor.7.title: "Око за око"
  theocratic_flavor.7.desc: "Ця війна виснажила наших солдатів, і наші резерви військової сили почали повільно зменшуватися. Ворожий генерал скористався цим і спробував набрати нових найманців, щоб позбавити [ROOT.GetCountry.GetName] нових військ. Однак його голос не був почутий, оскільки престиж нашого правителя і страх перед нашим богом більші, ніж його жалюгідні наміри... І так само наші гроші."
  theocratic_flavor.7.a: "Зуб за зуб."
  theocratic_flavor.8.title: "Земля обітована"
  theocratic_flavor.8.desc: "Місто вічного життя буде фортецею віри, неприступною для злісних сил. Ми повинні відобразити цей зразок на землі і переконатися, що наш народ добре захищений товстими стінами, які не дозволять шкідливим переконанням наших ворогів проникнути в наші домівки."
  theocratic_flavor.8.a: "Вище і вище!"
  STATIC_MODIFIER_NAME_promised_land: "Земля обітована"
  STATIC_MODIFIER_DESC_promised_land: "Ми приділяємо пильну увагу обороноздатності наших міст."
  theocratic_flavor.9.title: "Світло світу"
  theocratic_flavor.9.desc: "Божественність — це маяк, що веде нас до процвітання. Її земне представництво приходить з нашим зразковим правителем [ROOT.GetCountry.GetGovernment.GetRuler.GetName], чиє життя було присвячене розширенню нашої віри. Завдяки [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] наполегливим зусиллям, люди по всьому світу залишають свої сумнівні та помилкові вірування у пошуках світла."
  theocratic_flavor.9.a: "Нехай прийдуть до нас."
  theocratic_flavor.10.title: "Ось і диво"
  theocratic_flavor.10.desc: "Деякі члени нашого [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] почали виступати за більше розширення нашої нації, оскільки божественність завжди на боці нашого уряду. Наш правитель [ROOT.GetCountry.GetGovernment.GetRuler.GetName], незважаючи на те, що в минулому був стриманим щодо прийняття радикальних рішень, досить довго слухав їх, і його воля починає змінюватися.\nНаші генерали були повідомлені про ці нові та амбітні погляди і вирішили слідувати їм, навіть якщо це означає інвестування в нові війська."
  theocratic_flavor.10.a: "Ми повинні підготуватися!"
  STATIC_MODIFIER_NAME_lo_and_behold: "Ось і диво"
  STATIC_MODIFIER_DESC_lo_and_behold: "Велика відданість нашого генерала нашій справі зменшила вартість наших військ."