l_english:
  military_order_events.1.title: "Прохання до [GetCountry('PAP').GetGovernment.GetRulerTitle]"
  military_order_events.1.desc: "У нашій боротьбі за захист нашої віри від невірних, єретиків та язичників ми не самотні. Люди істинної віри стікаються під наш прапор, відповідаючи на вищий заклик до зброї проти тиранії та руйнування, спричинених нашими релігійними ворогами. У часи війни та потреби ми звернемося до наших [ShowReligionAdjective('catholic')] братів та [GetCountry('PAP').GetGovernment.GetRulerTitle] за допомогою у нашій справі."
  military_order_events.1.a: "Нам потрібна допомога з нашою інфраструктурою."
  military_order_events.1.b: "Кличте прапороносців, нам потрібні люди для нашої святої боротьби!"
  military_order_events.1.c: "Нам потрібна допомога у наповненні наших скарбниць."
  gain_a_tt: "Якщо Святий Отець погодиться, ми отримаємо [ShowModifier('infrastructure_funds_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"
  gain_b_tt: "Якщо Святий Отець погодиться, ми отримаємо [ShowModifier('warrior_banners_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"
  gain_c_tt: "Якщо Святий Отець погодиться, ми отримаємо [ShowModifier('foreign_donations_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"
  military_order_events.2.title: "Лист від [target_order.GetNameWithNoTooltip]"
  military_order_events.2.title_fallback: "Лист від Святого Ордену"
  military_order_events.2.desc: "До нашої уваги дійшло, що [target_order.GetName] став оплотом нашої віри та сяючим символом незламної сили [ShowReligionName('catholic')]. У своїх зусиллях захистити вірних вони запросили допомоги з наших скарбниць."
  military_order_events.2.a: "Схвалити запит."
  military_order_events.2.b: "Вони самі по собі..."
  military_order_events.3.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] Схвалює наш Запит"
  military_order_events.3.desc: "Посланець передає нашим радникам лист від [GetCountry('PAP').GetGovernment.GetRulerTitle]. За словами Святого Отця, наша боротьба визнана і правдива, сяючий символ стійкості, виявленої нашим народом. Він погодився пожертвувати на нашу справу!"
  military_order_events.3.a: "Радійте!"
  military_order_events.4.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] Відхиляє наш Запит"
  military_order_events.4.desc: "Настрій у наших залах псується і сіріє, коли посланець вигукує відмову Святого Отця у допомозі нашій справі. Здається, ми залишилися самі проти натиску ненажерливих ворогів біля наших воріт. Святий Престол відхилив наше прохання про допомогу і вирішив не захищати віру, яку вони стверджують, що представляють, жалюгідний стан справ..."
  military_order_events.4.a: "Боже, допоможи нам..."
  military_order_events.5.title: "Завоювання [ShowLocationNameWithNoTooltip('antioch')]"
  military_order_events.5.desc: "Так давно хрестоносці не ступали на Святу Землю. Наші лицарі, рішучі та непохитні, завершили найпрестижнішу кампанію – повернення стародавнього міста [ShowLocationName('antioch')]. Це славетне місто, розташоване на берегах Середземного моря, є свідченням століть різноманітних культур та бурхливої історії. Його вузькі, звивисті вулиці шепочуть розповіді про імперії, що поставали та падали, від Селевкідів до Візантійців. Стратегічне значення [ShowLocationNameWithNoTooltip('antioch')] непохитне, оскільки воно охороняє східні ворота до Середземномор'я та є життєво важливим центром для торгівлі та військового контролю.\n\nЯк Військовий Орден, ми керуємося нашою невпинною відданістю захисту християнства, сповнені рішучості повернути місто до його законних рук. У теперішній момент, під ясним сирійським небом, наші люди йдуть вперед, їхні малинові хрестові прапори майорять на вітрі, рішучі у своєму прагненні повернути решту Святої Землі з лап часу, язичників та заворушень."
  military_order_events.5.a: "Наші прапори знову майорять над містом."
  military_order_events.6.title: "Завоювання [ShowLocationNameWithNoTooltip('urfa')]"
  military_order_events.6.desc: "Наші старійшини не пам'ятають, коли востаннє бачили таке прекрасне місто. [ShowLocationName('urfa')], під командуванням хрестоносців, втілює запал і стійкість нашого ордену. Розташоване серед посушливих рівнин Месопотамії, воно має багату історію, що відгукується відлунням Першого хрестового походу, як перша хрестоносна держава, заснована на Сході. Наші попередники укріпили його стіни та вплели гобелен християнської відданості в саму тканину цієї стародавньої землі. Його вулиці несуть шрами незліченних битв, проте вони залишаються свідченням незламного духу наших предків.\n\nСьогодні ми стоїмо об'єднані, керовані нашою непохитною відданістю захисту міста від наступаючих сил, що загрожують нашим християнським братам. Під палючим сонцем наші малинові хрестові прапори високо піднімаються, коли ми просуваємося, сповнені рішучості повернути весь регіон на його законне місце в анналах історії хрестових походів."
  military_order_events.6.a: "Нехай воно знову не впаде в руки язичників!"
  military_order_events.7.title: "Завоювання [ShowLocationNameWithNoTooltip('damascus')]"
  military_order_events.7.desc: "Одне з найцінніших міст Леванту, [ShowLocationName('damascus')], тепер перебуває під командуванням хрестоносців, стоячи, як коштовність у серці Святої Землі. Його стародавні стіни та гамірні базари відображають спадщину як ісламського, так і християнського правління. Під нашим пильним оком [ShowLocationNameWithNoTooltip('damascus')] процвітатиме як маяк нашої великої перемоги та милосердя, де християнські та мусульманські громади співіснують у відносній гармонії.\n\nПроти тих, хто бажає бачити місто в руках невірних, ми піднімемо наш меч і захистимо його та його мешканців, щоб вони не заплямували спадщину цього чудового поселення. Наша рішучість непохитна, наша віра стійка, коли ми йдемо вперед з багряними хрестами, викарбуваними на наших обладунках, сповнені рішучості захистити цей бастіон християнського впливу та забезпечити, щоб яскрава історія [ShowLocationNameWithNoTooltip('damascus')] продовжувала процвітати під владою хрестоносців."
  military_order_events.7.a: "Важлива віха в наших військових кампаніях."
  military_order_events.8.title: "Завоювання [ShowLocationNameWithNoTooltip('jerusalem')]"
  military_order_events.8.desc: "Багато хто в залах [ShowReligionName('catholic')] націй висловлював занепокоєння щодо нашої здатності відвоювати найцінніше місто Святої Землі, [ShowLocationName('jerusalem')]. Нехай наша перемога заглушить усі ці голоси, оскільки грандіозне завдання повернення цього шанованого міста проголошено абсолютним успіхом. Під нашим командуванням місто розквітне як свідчення християнської відданості, місце, де історія та віра переплітаються. Його величні вали оточують місто, просякнуте священним значенням, де відлуння кроків Христа відлунює бруківкою.\n\nУ цих стародавніх стінах велич Храму Гробу Господнього стоїть як маяк непохитної віри, приваблюючи паломників з усіх куточків світу. Проте велика небезпека ніколи не припиняється, оскільки ворожі сили прагнуть знищити християнську присутність у цих заповітних межах. З непохитною рішучістю та емблематичним багряним хрестом, викарбуваним на наших обладунках, ми просуваємося, пов'язані урочистим обов'язком захищати серце християнства та забезпечити, щоб [ShowLocationNameWithNoTooltip('jerusalem')] залишався вічним символом християнської шани для майбутніх поколінь."
  military_order_events.8.a: "Нехай це буде наша нова столиця!"
  military_order_events.8.b: "Радійте!"
  military_order_events.9.title: "Прапори Замор'я"
  military_order_events.9.desc: "Королівство Замор'я, під пильним командуванням хрестоносців, є бастіоном християнського впливу на Сході. Його жваві міста, такі як [ShowLocationName('jerusalem')] та [ShowLocationName('antioch')], процвітають як гамірні центри торгівлі та культури, де співіснують різноманітні громади, створюючи унікальний гобелен релігійної толерантності. У цих стінах собори та фортеці свідчать про нашу незмінну віру, де кожен камінь є свідченням нашої непохитної відданості.\n\nОднак привид лиха нависає, оскільки ворожі сили загрожують зруйнувати саму тканину того, чого ми досягли. Наші послідовні перемоги по всьому Леванту залишили багатьох невірних заціпенілими від жаху, коли наші прапори наближаються до їхніх кордонів, прагнучи відновити те, що по праву належить нам."
  military_order_events.9.a: "Ми перемогли!"
  forming_koj_easier_tt: "Формування Єрусалимського королівства збільшить нашу [Concept('stability', 'CONCEPT_PLACEHOLDER')|e], [Concept('government_power', 'CONCEPT_PLACEHOLDER')|e] та надасть нам [ShowModifier('jerusalem_resurgent_modifier')] на #Y 20#! років"
  military_order_events.9.b: "Земля належить нашому Ордену!"
  military_order_events.9.c: "Відновити території [ShowLocationName('jerusalem')] законному власнику."
  because_we_opted_inwards_tt: "Оскільки ми обрали '#italic Загляньмо всередину, ми повинні розвивати нашу твердиню.#!' у події '#Y Наслідки епохи хрестових походів#!', цей варіант було посилено"