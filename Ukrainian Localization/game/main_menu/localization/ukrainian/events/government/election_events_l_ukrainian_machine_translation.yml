l_english:
  election.1.title: "Вибори у [ROOT.GetCountry.GetNameWithNoTooltip]"
  election.1.desc: "Термін правління нашого попереднього глави держави добіг кінця. Відтак, настав час для поновленого виборчого процесу в наших володіннях. Голосування є лише вінцем на чолі нашого славетного [ROOT.GetCountry.GetFlavorRank], адже ми пишаємося процедурами, що існують у нашій бюрократичній царині, однією з яких є призначення лідера на основі меритократії та процедурної прозорості."
  election.1.a: "Обрати [candidate_a.GetNameWithNoTooltip] правителем."
  election.1.b: "Обрати [candidate_b.GetNameWithNoTooltip] правителем."
  election.1.c: "Обрати [candidate_c.GetNameWithNoTooltip] правителем."
  election.1.d: "Обрати [candidate_d.GetNameWithNoTooltip] правителем."
  election.1.e: "Обрати [candidate_e.GetNameWithNoTooltip] правителем."
  election.2.title: "Вибори за жеребом у [ROOT.GetCountry.GetNameWithNoTooltip]"
  election.2.desc: "Нещаслива кончина нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] змушує нас провести вибори. Однак вибори більшістю голосів схильні до корупції або, що гірше, до популізму. Після кількох раундів таємного жеребкування ми визначили, хто очолить [ROOT.GetCountry.GetLongName], обравши майже випадковим чином."
  election.2.a: "Жереб вибрав [candidate_a.GetNameWithNoTooltip] як [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  election.3.title: "Вибори Capitano del Popolo"
  election.3.desc: "Попередній [ROOT.GetCountry.GetGovernment.GetRulerTitle] більше не має права правити [ROOT.GetCountry.GetName]. Відтак, були запропоновані потенційні кандидати для заповнення вакууму влади. Один з них представлятиме [ROOT.GetCountry.GetFlavorRank]. Питання в тому: хто це буде?"
  election.4.title: "Співправитель Capitano del Popolo"
  election.4.desc: "Основного Capitano del Popolo обрано. Однак наша держава потребує того, хто наглядатиме за нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle]. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] зібралися, щоб обговорити це питання..."
  election.4.a: "Обрати [candidate_a.GetNameWithNoTooltip] співправителем"
  election.4.b: "Обрати [candidate_b.GetNameWithNoTooltip] співправителем"
  election.4.c: "Обрати [candidate_c.GetNameWithNoTooltip] співправителем"
  election.4.d: "Обрати [candidate_d.GetNameWithNoTooltip] співправителем"
  election.4.e: "Обрати [candidate_e.GetNameWithNoTooltip] співправителем"
  SET_CORULER_TT: "[THIS.GetCharacter.GetName] стає #Y Співправителем#!.\nСпівправитель має додаткові #G +200#! балів для обрання наступним правителем."
  election.5.title: "Вибори нового [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  election.5.desc: "Зі смертю нашого попереднього [ROOT.GetCountry.GetGovernment.GetRulerTitle] настав час для [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] зібратися та проголосувати за нового [ROOT.GetCountry.GetGovernment.GetRulerTitle], щоб правити [ROOT.GetCountry.GetName].\n\nПісля кількох днів обговорень виборці прийняли своє рішення: [candidate_a.GetName] стане новим [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetLongNameWithNoTooltip]."
  election.5.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] мертвий! Хай живе [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  election.6.title: "Династичні вибори у [ROOT.GetCountry.GetNameWithNoTooltip]"
  election.6.desc.a: "Зі смертю [old_ruler.GetName], [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] зібралися в [capital_scope.GetName], щоб обрати нового [ROOT.GetCountry.GetGovernment.GetRulerTitle] для правління [ROOT.GetCountry.GetName].\n\nПісля кількох днів обговорень виборці прийняли своє рішення."
  election.6.desc.b: "Зі смертю [old_ruler.GetName] династія [old_ruler.GetDynasty.GetName] добігла кінця.\n\nНастав час для [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] знайти нову родину, яка зможе вести [ROOT.GetCountry.GetName] у майбутнє.\n\nПісля кількох днів обговорень виборці прийняли своє рішення."
  election.6.a: "Обрати [candidate_a.GetNameWithNoTooltip] правителем."
  election.6.b: "Обрати [candidate_b.GetNameWithNoTooltip] правителем."
  election.6.c: "Обрати [candidate_c.GetNameWithNoTooltip] правителем."
  election.6.d: "Обрати [candidate_d.GetNameWithNoTooltip] правителем."
  election.6.e: "Обрати [candidate_e.GetNameWithNoTooltip] правителем."