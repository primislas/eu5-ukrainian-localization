l_english:
  laws.0001.t: "Критичне мистецтво"
  laws.0001.desc: "Грубий і вкрай неприємний художник на ім'я [critical_artist.GetName] заплямував репутацію нашої країни, створивши нищівну художню критику [ROOT.GetCountry.GetFlavorRank]!\n\nУ своєму так званому трактаті під назвою #italic [critical_art.GetName]#! [critical_artist.GetSheHe] стверджує, що незадоволений управлінням країною та станом справ, висловлюючи такі безглузді фрази, як «імпотентна армія», «слабкодуха економічна політика» та «суспільний занепад». Наше суспільство може бути вільним, але дозволяти відомому художнику критикувати [ROOT.GetCountry.GetFlavorRank] у такий спосіб, безперечно, призведе до небезпечного шляху заворушень та бродяжництва!"
  laws.0001.a: "[ROOT.GetCountry.GetFlavorRank] може витримати невелику критику."
  laws.0001.b: "Стратити [critical_artist.GetHerHim] негайно!"
  laws.0002.t: "Свобода та мистецтво"
  laws.0002.desc: "На превеликий жаль певних урядових та суспільних елементів, наш нинішній [ROOT.GetCountry.GetFlavorRank] користується великою свободою у сферах віри та мистецтва. Останнім часом наша відданість вільному мистецтву призвела до створення трактату, що вихваляє переваги будь-якого [ROOT.GetCountry.GetFlavorRank], вільного від цензури, оскільки така держава плекає та живить компетентну теологічну думку та мистецькі починання.\n\nТрактат #italic [non_critical_art.GetName]#! від [non_critical_artist.GetName], безсумнівно, буде прочитаний багатьма по всій нашій землі, що призведе до підвищення обізнаності та підтримки ідеалів художньої свободи, а отже, і свободи в інших елементах [ROOT.GetCountry.GetFlavorRank]."
  laws.0002.a: "Свободу слід святкувати!"
  laws.0002.b: "Жахливо! Знищити трактат!"
  laws.0003.t: "Вихід зі свободи"
  laws.0003.desc: "Позиція нашого [ROOT.GetCountry.GetFlavorRank] проти цензури дозволила багатьом менш відомим художникам більше експериментувати та розширювати межі мистецтва. В результаті, один з багатьох початківців, нічим не примітних художників сьогодні став впізнаваним ім'ям та справжньою місцевою знаменитістю в колах молодих митців. Ми можемо багато чого очікувати від [new_artist.GetName]."
  laws.0003.a: "Ще один художник до лав."
  laws.0004.t: "Вільне мислення призводить до теологічного розколу"
  laws.0004.desc: "Досі наші релігійні установи досить мовчали про своє бажання посилити релігійну цензуру. Однак нещодавня серія невеликих сутичок у різних місцях через прості, але життєво важливі теологічні розбіжності призвела до сплеску запитів як від окремих осіб, так і від організацій щодо запровадження суворішого контролю над релігійним наративом.\n\nЗдорово для віри розмірковувати над собою та шукати відповіді на питання, які можуть наблизити її вірян до божественного, але нездорово, коли один священик б'є іншого каструлею через релігійну доктрину."
  laws.0004.a: "Ми візьмемо їхні скарги до уваги."
  laws.0004.b: "Ми знайдемо та покараємо тих, хто виходить за межі дозволеного."
  laws.0005.t: "Вільні дискусії призводять до прориву"
  laws.0005.desc: "Нарешті, постійні філософські дебати та нестерпна балаканина інтелектуалів та філософів, дозволені нашою відсутністю законів про цензуру, насправді призвели до наукового прориву в областях, які ми зараз досліджуємо!"
  laws.0005.a: "Нестримний розум мислить найкраще."
  laws.0005.b: "Ми повинні фінансувати цих вільнодумців!"
  laws.0006.t: "Художник-самовигнанець"
  laws.0006.desc: "Наша політика релігійної цензури призвела до того, що відомий художник [artist_to_exile.GetName] вигнав [artist_to_exile.GetHerselfHimself] і покинув наші землі на користь [exile_location.GetName]. [artist_to_exile.GetSheHe|U] прагне думати, говорити та творити без страху покарання, чого наша нинішня політика не може запропонувати.\n\nЦе цілком може бути на краще, оскільки непокірний художник, яким би талановитим [artist_to_exile.GetSheHe] не був, буде лише терном у боці нашої чистої нації, яка повинна бути вільною від критичного та небезпечного мистецтва."
  laws.0006.a: "Геть, і не повертайся!"
  laws.0007.t: "Єретична робота врятована"
  laws.0007.desc: "[work_to_damage.GetName] нещодавно було пошкоджено під час суперечки, в якій члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] намагалися спалити його згідно з нашими законами про цензуру, стверджуючи, що твір є єретичним.\n\nРобота зрештою була врятована завдяки протестам інших, але вона не змогла уникнути пошкоджень повністю."
  laws.0007.a: "Що зроблено, те зроблено."
  laws.0008.t: "Пісні Героїв"
  laws.0008.desc: "Наша політика цензури запобігла поширенню негативних поглядів та думок під час воєнних труднощів.\n\nЯк наслідок, наш народ залишається сильним, вірячи, що перемога неминуча, оскільки кожен памфлет і шматок новин містить лише найвищу похвалу благородній боротьбі нашої нації."
  laws.0008.a: "Хай живе (цензуроване)!"
  laws.0009.t: "Цензура Захищає Союзника"
  laws.0009.desc: "Останнім часом багато відвертих членів нашого суспільства, деякі з яких мають засоби для виробництва та розповсюдження скандальних памфлетів по всьому королівству, почали досить критично ставитися до нашого союзника, [ally_to_protect.GetName]. Однак наша політика цензури дозволила нам швидко конфіскувати та знищити всі ці шкідливі твори, захистивши нашого союзника від необхідності реагувати на думки нашого народу."
  laws.0009.a: "Їм краще бути вдячними!"
  laws.0009.b: "Вони можуть подякувати нам... іншими засобами."
  laws.0010.t: "Скандал Відвернено!"
  laws.0010.desc: "Нещодавно серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] сталася найскандальніша подія. Якби про це стало відомо, це була б соціальна катастрофа катастрофічних масштабів. На щастя, наша політика цензури забезпечила, що вся ця подія була зам'ята, перш ніж решта суспільства змогла дізнатися."
  laws.0010.a: "Тримайте ці скелети в шафі!"
  laws.0010.b: "Можливо, це має бути публічною інформацією..."
  laws.0011.t: "Художник Страчений"
  laws.0011.desc: "Сьогодні художника на ім'я [dead_artist.GetName] було страчено за наказом [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] за його єретичні коментарі та твори мистецтва, згідно з нашими законами про цензуру. Наш [ROOT.GetCountry.GetFlavorRank] втратив талановитого та цінного художника і обміняв його на стабільність та силу моральної гармонії."
  laws.0011.a: "Тим не менш, це жахлива втрата."
  laws.0012.t: "Контроль Інформації"
  laws.0012.desc: "Наші суворі закони про цензуру гарантують, що негативні та шкідливі ідеї не перестрибують з одного населеного пункту до іншого. Таким чином, [ROOT.GetCountry.GetFlavorRank] в цілому є набагато гармонійнішим. Невелика катастрофа чи скандал не повинні впливати на тих, хто знаходиться поза їхнім безпосереднім досягненням, а також блудні думки не повинні отруювати тих, хто раніше був благословенний невіглаством."
  laws.0012.a: "Гармонія, нарешті."
  laws.0012.b: "Обмеження інформації лише сповільнює нас."
  laws.0013.t: "Доктринальна Гармонія"
  laws.0013.desc: "Наше дотримання суворої релігійної цензури задовольнило наші релігійні установи. Вони вдячні нам за підтримку гармонії та забезпечення того, щоб єресь трималася на відстані."
  laws.0013.a: "Все, щоб їх задобрити."
  laws.0013.b: "Можливо, питання – це шлях до божественності?"
  laws.0014.t: "Цензуровані Звіти"
  laws.0014.desc: "Наші суворі практики цензури призвели до найнещаснішого випадку, спричинивши хаос серед наших армій. Польові звіти, що містять життєво важливу, але негативну інформацію про стан війни, цензуруються бюрократами та релігійними діячами, щоб забезпечити фільтрацію богохульних ідей про відступ або військову неадекватність на користь більш позитивного зображення конфлікту.\n\nВ результаті одна з наших армій стала дезорганізованою, оскільки звіти, які вони надсилають, не є тими, які отримує наша столиця та на основі яких видає накази."
  laws.0014.a: "Яка катастрофа!"
  laws.0014.b: "Примусити накази обійти нагляд."
  laws.0015.t: "Єретична праця знищена"
  laws.0015.desc: "#italic [work_to_destroy.GetName]#! було знищено, згідно з нашою суворою політикою цензури, після звинувачень у тому, що це єретичний твір, який прагне підірвати все добре і святе.\n\nПротестів художників і навіть інших членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] було недостатньо, щоб врятувати цей злий твір від спалення у праведному полум'ї. Можливо, ми втратили безцінний витвір мистецтва, але ми забезпечили духовну святість."
  laws.0015.a: "Спалити все, що є безбожним!"
  laws.0016.t: "Суперечливий портрет"
  laws.0016.desc: "Місцевий художник на ім'я [random_artist.GetName] звернувся до [glorious_leader.GetName], пропонуючи створити портрет, що зображує їх як \"божество\" та \"рятівника нації\".\n\nВідсутність у нас законів про цензуру робить це питання морально сірим: з одного боку, технічно ніщо не заважає цьому статися, і така робота, ймовірно, принесла б престиж нації, але з іншого боку, тема досить недоречна та безбожна, незалежно від закону. Таке замовлення, безумовно, засмутить [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та їхніх вірних."
  laws.0016.a: "Нехай [glorious_leader.GetNameWithNoTooltip] буде більшим за життя!"
  laws.0016.b: "Це жахливо несмачно!"
  art_key_holy_leader_portrait: "Портрет святого правителя"
  laws.0017.t: "Художник емігрує"
  laws.0017.desc: "[artist_to_exile.GetName] із земель [exile_location.GetName] прибув до нашого порогу, шукаючи нашого захисту та переваг наших законів про відсутність цензури.\n\nЩе один талановитий художник прибуває до нашої країни, назавжди збагачуючи нашу культуру! Однак, якщо ми коли-небудь запровадимо більш суворі закони про релігійну цензуру, [artist_to_exile.GetSheHe] може покинути наші землі так само, як [artist_to_exile.GetSheHe] покинув [exile_location.GetNameWithNoTooltip]..."
  laws.0017.a: "Ласкаво просимо!"
  laws.0018.t: "Підпільне мистецтво"
  laws.0018.desc: "Державні чиновники нещодавно виявили місце зустрічі підпільного мистецького руху. Нашим чиновникам не вдалося спіймати винних, але вдалося вилучити три твори мистецтва, які повинні бути знищені згідно з нашою політикою релігійної цензури.\n\nЗвісно, знищення такої великої кількості мистецтва, яке інакше могло б бути використане на благо [ROOT.GetCountry.GetFlavorRank], здається контрпродуктивним. Можливо, варто проігнорувати скарги [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] і зберегти мистецтво для себе."
  laws.0018.a: "Ми повинні знищити ці нечестиві речі!"
  laws.0018.b: "Можливо, мистецтво було залишено для нас?"
  laws.0019.t: "Заборонені книги"
  laws.0019.desc: "Державні чиновники нещодавно виявили схованку заборонених книг. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] просить нас негайно їх утилізувати, але ці тексти, схоже, містять знання, які могли б бути корисними для [ROOT.GetCountry.GetFlavorRank]..."
  laws.0019.a: "Спалити їх!"
  laws.0019.b: "Маленький погляд не зашкодить..."
  laws.0020.t: "Спонсорство релігійного мистецтва"
  laws.0020.desc: "Натхненні нашими законами про релігійну цензуру, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] почали спонсорувати створення мистецтва по всій країні. На знак єдності між [ROOT.GetCountry.GetLongName] та її [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] вони пожертвували твір безпосередньо до колекції [ROOT.GetCountry.GetFlavorRank]."
  laws.0020.a: "Наймилостивіше!"
  laws.0021.t: "Незаконні приватні колекції"
  laws.0021.desc: "Кілька сімей [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] були спіймані на спонсоруванні створення незаконного мистецтва, яке явно порушує постанови, встановлені нашими законами про релігійну цензуру.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розлючений і вимагає конфіскації та подальшого знищення колекцій. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], з іншого боку, просить про милість, оскільки їхні колекції є приватними та зберігаються подалі від очей громадськості. Вони навіть запропонували пожертвувати кошти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] на створення допустимого мистецтва, щоб заспокоїти їх."
  laws.0021.a: "Конфіскувати їхні колекції."
  laws.0021.b: "Виявити милосердя беззастережно."
  laws.0021.c: "Виявити милосердя в обмін на кошти."
  laws.0022.t: "Іконоборство"
  laws.0022.desc: "Підживлювані релігійним запалом, члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] просять [ROOT.GetCountry.GetFlavorRank] спалити витвір мистецтва, відомий як #italic [icono_target.GetName]#, на знак побожності.\n\nУ цьому витворі мистецтва, який вони намагаються спалити, немає нічого нечестивого, і тому ми маємо право відмовити. Однак, доведення нашої відданості вірі може бути більш вигідним для наших цілей..."
  laws.0022.a: "Палити, палити, палити!"
  laws.0022.b: "Відмовитися спалювати мистецтво."
  laws.0023.t: "Спалення книг"
  laws.0023.desc: "Після підтвердження підозр, що єретичні книги зберігалися в бібліотеці в [loc_heretic_book_town.GetName], [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розпочали процесію, яка завершиться спаленням бібліотеки.\n\nЇхні дії відповідають нашій політиці цензури, але бібліотека містить книги, життєво важливі для наших дослідницьких зусиль, які будуть спалені разом з єретичним матеріалом, якщо ми не зупинимо це."
  laws.0023.a: "Спалення заради вищого блага."
  laws.0023.b: "Жоден факел не торкнеться наших досліджень!"
  laws.0024.t: "Незаконні релігійні фігурки"
  laws.0024.desc: "Купців на ринку в [loc_market.GetName] спіймали на продажу невеликих керамічних та глиняних фігурок релігійного характеру. Ці фігурки явно порушують нашу політику релігійної цензури, але їхнє знищення було б досить дорогим, оскільки вони стали досить популярними в [loc_market.GetNameWithNoTooltip].\n\n[ROOT.GetCountry.GetFlavorRank] відчув би втрату цих товарів, але, можливо, це ціна, яку ми повинні заплатити, щоб зберегти чистоту нашої віри?"
  laws.0024.a: "Розбити фігурки!"
  laws.0024.b: "Закрити очі на ринок фігурок."
  laws.0025.t: "Єретики вимагають переговорів"
  laws.0025.desc: "Самопроголошене \"Підпільне товариство теологів\" вимагає дозволити публікацію їхньої теорії створення. Вони стверджують, що світ — це сир, а божества — не що інше, як черви, що переробляють сир. Мало того, самі черви народжуються з цього сиру.\n\nЗвісно, навіть розважання такими думками сильно засмутило б [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], але наша відсутність релігійної цензури технічно означає, що рішення залежить від [ROOT.GetCountry.GetFlavorRank]."
  laws.0025.a: "Чому б і ні? Дозволити їм публікувати!"
  laws.0025.b: "Безглуздо! Заборонити цю теорію!"
  laws.0026.t: "Несанкціоновані місіонери"
  laws.0026.desc: "Самопроголошені місіонери з країни [mis_origin.GetName] нещодавно привернули увагу наших [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] через надто великий прогрес у наверненні нашого населення.\n\nУ нас немає законів про релігійну цензуру, і тому місіонери мають право робити те, що їм заманеться, але бездіяльність засмутить наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], які закликають до прямого ув'язнення цих \"фальшивих пророків\"."
  laws.0026.a: "Відвернути місіонерів."
  laws.0026.b: "Терпіти місіонерів."
  laws.0026.c: "Заарештувати місіонерів."
  laws.0027.t: "Застарілі тексти"
  laws.0027.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] шукає нашої допомоги, стверджуючи, що відповідно до наших законів про цензуру ми повинні вилучити всі застарілі релігійні тексти, що перебувають в обігу.\n\nНещодавно було виявлено, що десятиліття невеликих змін і відхилень у новіших версіях наших священних текстів призвели до розколу між тими, хто проповідує старе слово, і тими, хто проповідує нове. Цей розкол мінімальний, але сама ідея відхилення священних текстів один від одного є огидною для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]. Таким чином, вони попросили нас знищити всі старі копії, що може призвести до нестабільності через необхідність знищення старих і улюблених копій місцевих храмів."
  laws.0027.a: "Жодного відхилення не можна допустити!"
  laws.0027.b: "Дозволити старим книгам природно вийти з обігу."
  laws.0028.t: "Неправильні сигнали"
  laws.0028.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] попросили нас втрутитися у шлюб між двома родинами [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Проблема полягає в тому, що наречена сповідує іншу віру, ніж та, яку підтримує наш [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]. Шлюби [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] зазвичай є публічними справами, тому подальший фестиваль привернув би багато уваги і надіслав би неправильне повідомлення про те, як наш [ROOT.GetCountry.GetFlavorRank] ставиться до інших вір.\n\nНаші закони про релігійну цензуру не призначені для втручання в це, не кажучи вже про те, як це зашкодило б нашим стосункам з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], але це чудова нагода зобов'язати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] нам."
  laws.0028.a: "Запобігти шлюбу з \"моральних міркувань\"."
  laws.0028.b: "Кохання вільне! Крім того, ми не хочемо розгніваних [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]!"
  laws.0029.t: "Культи, спонсоровані іноземцями"
  laws.0029.desc: "Наш [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], виконуючи свої звичайні обов'язки з релігійної цензури, знайшов і знищив невеликий культ, який згодом виявився приналежним до іноземної організації. Цей культ спонсорувався іншою нацією в обмін на інформацію, діючи як шпигунська мережа. Його знищення значно пошкодило їхні можливості зі збору інформації."
  laws.0029.a: "Продовжуйте їх викорінювати!"
  laws.0030.t: "Укріплений релігійний район"
  laws.0030.desc: "У поселенні [random_town.GetName] місцеві релігійні меншини укріпили свій релігійний район через побоювання, що наші закони про цензуру можуть призвести до заворушень.\n\nДозволити їм залишатися за барикадами буде погано для стабільності, але ці імпровізовані укріплення можуть стати досить корисними, якщо місцевість опиниться в облозі."
  laws.0030.a: "Знести барикади."
  laws.0030.b: "Дозволити їм залишитися."
  laws.0040.title: "Новий [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  laws.0040.desc: "З приходом до влади [target_character.GetName] [target_character.GetSheHe] планував перенести [ROOT.GetCountry.GetGovernment.GetCourtTitle] в інше місце, як це прийнято в [ROOT.GetCountry.GetName]. Варіанти: [target_location.GetName], [target_location2.GetName] та [target_location3.GetName]. Який з них обрати?"
  laws.0040.a: "[target_location.GetNameWithNoTooltip] — найкращий вибір."
  laws.0040.b: "[target_location2.GetNameWithNoTooltip] — гарне місце."
  laws.0040.c: "Аутсайдер [target_location3.GetRank.GetNameWithNoTooltip] з [target_location3.GetNameWithNoTooltip] — найкращий вибір."
  laws.0040.d: "Залишимо [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] столицею."