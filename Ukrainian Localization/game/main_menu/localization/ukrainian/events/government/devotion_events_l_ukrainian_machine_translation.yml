l_english:
  devotion_events.1.title: "Головний шпиталь"
  devotion_events.1.desc: "Було висунуто пропозицію заснувати головний [ShowBuildingTypeName('hospital')|l], місце, де нужденні були б прийняті та отримали допомогу. Громадське здоров'я є дуже важливим, і пропозиція безкоштовних курсів акушерства та деяких закладів для боротьби з хворобами підвищила б добробут кожного."
  devotion_events.1.a: "Чого ми чекаємо? Зробіть це!"
  devotion_events.1.b: "Молитва вирішить усі їхні проблеми."
  devotion_events.2.title: "Утримання фортів"
  devotion_events.2.desc: "Наші форти є найважливішою обороною, яку ми маємо проти загарбників та ворогів, але вони дуже потребують реставрації. Нам потрібно буде збільшити податки, щоб профінансувати це, і це, безумовно, засмутить тих, хто вважає, що вони вже платять непомірні податки."
  devotion_events.2.a: "Нам це потрібно, ігноруйте натовп!"
  devotion_events.2.b: "Зробіть те, що можливо, з грошима, які ми вже маємо."
  devotion_events.3.title: "Модернізація фортів"
  devotion_events.3.desc: "Форти вже не виглядають так, ніби вони розсипляться на наших очах, тепер вони достатньо міцні, щоб витримати більшість атак на їхні стіни. Їхні укріплення, хоч і функціональні та вражаючі, незважаючи на свій вік, все ще поступаються фортам інших націй. Нам потрібно буде глибоко залізти в кишені наших платників податків, щоб профінансувати оновлення та модернізацію, яких так гостро потребують наші форти."
  devotion_events.3.a: "Це для загального блага; хто хоче бути завойованим?"
  devotion_events.3.b: "Вони достатньо хороші такими, якими є."
  devotion_events.4.title: "Занадто високі податки"
  devotion_events.4.desc: "Важко чути, як наші громадяни лютують проти підвищених податків з високих, високих стін та всередині товстих, товстих веж наших відновлених фортів, але ми чуємо, як вони погрожують повстанням та бунтом, якщо ми не знизимо податки."
  devotion_events.4.a: "Ми чуємо і неохоче погоджуємося."
  devotion_events.4.b: "Що ви кажете? МИ ВАС НЕ ЧУЄМО!"
  devotion_events.5.title: "Прикрашання фортів"
  devotion_events.5.desc: "Подарунок вітража був розміщений в одному з наших фортів, і ефект вишуканий. Настільки вишуканий, що ми розглядаємо можливість прикрасити кожен форт, яким ми володіємо, нашим гербом у вітражі."
  devotion_events.5.a: "Марнославство — гріх, навіть якщо це для форту!"
  devotion_events.5.b: "Наші піддані, безсумнівно, оцінять, що їхні податки йдуть на таку красу!"
  devotion_events.6.title: "Пошуки релігійної свободи"
  devotion_events.6.desc: "Група, відома своїми радикальними ідеями щодо релігійних реформ, засуджує наш [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetReligion.GetAdjective] доктрини, згуртовуючи громадськість. Це призвело до широких скарг та вимог релігійної свободи від наших не надто лояльних громадян [target_location.GetName]."
  devotion_events.6.a: "Наша країна є [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] і завжди буде [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip]!"
  devotion_events.6.b: "Надати повну релігійну свободу [target_location.GetRank.GetNameWithNoTooltip]."
  devotion_events.7.title: "Хибні вірування"
  devotion_events.7.desc: "Одна з цілей нашого [ROOT.GetCountry.GetFlavorRank] — поширення [ROOT.GetCountry.GetReligion.GetAdjective] віри та її захист від єресі. Це шляхетна справа, але коли єресь вражає саме серце нашої країни, це ганьбить нас. [target_location.GetRank.GetName] [target_location.GetName] не сповідує [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] віри, і якщо цю ситуацію не вирішити найближчим часом, це принесе нам велику ганьбу."
  devotion_events.7.a: "Збільшити зусилля для навернення єретиків."
  devotion_events.7.b: "Тоді ми будемо зганьблені."
  devotion_events.8.title: "Підробка документів"
  devotion_events.8.desc: "Поширеним захистом від анексії та узурпації є підробка документів, їх фальсифікація або датування заднім числом, щоб підтвердити свої аргументи під час боротьби за розширення земель чи привілеїв. Навіть зараз ці сумнівні методи все ще використовуються, і ми навіть розмірковуємо, чи повинна ця практика принести нам користь. Ми робили це в минулому, але завжди є ймовірність, що хтось виявить розбіжності."
  devotion_events.8.a: "Підробити ці документи."
  devotion_events.8.ct: "Підробку можуть виявити..."
  devotion_events.8.b: "Тримайте цю гидоту подалі від наших архівів!"
  devotion_events.9.title: "Підроблені документи"
  devotion_events.9.desc: "Попри всі наші зусилля приховати підробку, нас викрили. Все, що ми хотіли зробити, це захистити наш [ROOT.GetCountry.GetFlavorRank] від тих, хто прагнув би анексувати та узурпувати наші провінції."
  devotion_events.9.a: "Підкупити, шантажувати або побити кожного, хто розголосив цю таємницю!"
  devotion_events.10.title: "Місцевий шляхтич"
  devotion_events.10.desc: "[target_heir.GetName] швидко здобув довіру та прихильність народу [ROOT.GetCountry.GetLongName], особливо місцевих аристократів, до яких [target_heir.GetSheHe] належав, перш ніж стати [ROOT.GetCountry.GetGovernment.GetHeirTitle] нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Це допомогло нам відновити владу, і наш контроль над правлінням сильніший, ніж будь-коли."
  devotion_events.10.a: "Як же нам пощастило, що ми обрали [target_heir.GetHerHim]!"
  devotion_events.11.title: "Іноземний шляхтич"
  devotion_events.11.desc: "Окрім великого хисту до дипломатії, військового розвитку та управління, [target_heir.GetName], [ROOT.GetCountry.GetGovernment.GetHeirTitle] нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], також приніс альянси та зв'язки з іноземними дворами, які можуть виявитися незамінними."
  devotion_events.11.a: "Ми мали сумніви щодо [target_heir.GetHerHim], але тепер вони давно розвіялися!"
  devotion_events.12.title: "[target_heir.GetDaughterSon] купця"
  devotion_events.12.desc: "Гострий розум для переговорів і талант до торгівлі, що, мабуть, походить від [target_heir.GetHerHis] батьків-купців, змусили [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], вільних [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ROOT.GetCountry.GetLongName] поважати та боятися [target_heir.GetName]. Вони ніколи не намагатимуться обдурити [target_heir.GetHerHim] у будь-яких угодах чи переговорах, коли [target_heir.GetSheHe] очолюватиме наш [ROOT.GetCountry.GetFlavorRank]."
  devotion_events.12.a: "Наш [ROOT.GetCountry.GetGovernment.GetHeirTitle] може бути лише [target_heir.GetDaughterSon] купця, але [target_heir.GetSheHe] довів [target_heir.GetHerselfHimself]!"
  devotion_events.13.title: "Талановитий богослов"
  devotion_events.13.desc: "Навчений у науці божественного, обраний наступник нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_heir.GetName], здатен використовувати різні форми аналізу та аргументації, щоб допомогти зрозуміти, пояснити, захистити або просувати численні релігійні теми."
  devotion_events.13.a: "Ми знали від самого початку, що [target_heir.GetSheHe] мудро правитиме нашим [ROOT.GetCountry.GetFlavorRank]."
  devotion_events.14.title: "Місцевий проповідник"
  devotion_events.14.desc: "Народ радів, коли місцевого проповідника, [target_heir.GetName], було обрано [ROOT.GetCountry.GetGovernment.GetHeirTitle] [target_ruler.GetName] з [ROOT.GetCountry.GetLongName]. Чи раділи вони тому, що бачили кінець [target_heir.GetHerHis] постійним проповідям, чи тому, що вірили в здатність [target_heir.GetHerHim] змінити наш [ROOT.GetCountry.GetFlavorRank]? Хай там як, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] підтримують і довіряють наступному [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_heir.GetNameWithNoTooltip]."
  devotion_events.14.a: "[target_heir.GetNameWithNoTooltip] мав підтримку народу, тепер [target_heir.GetSheHe] має нашу."
  devotion_events.26.title: "Впливовий реформатор"
  devotion_events.26.desc: "Ділова [target_heir.GetWomanMan], добре обізнана в мистецтві риторики, наступна правителька [target_heir.GetName] вже використовує [target_heir.GetHerHis] сили на благо, поширюючи [target_heir.GetHerHis] ідеї серед усіх, хто бажає слухати — члени вищого суспільства прагнуть довести свій інтелект [target_heir.GetHerHim], тоді як інші просто зачаровані модною [target_heir.GetWomanMan]. Незалежно від причини, у [target_heir.GetNameWithNoTooltip] є щось особливе, адже навіть люди, зазвичай абсолютно незацікавлені в політиці, виявляються учасниками дискусії."
  devotion_events.26.a: "[target_heir.GetNameWithNoTooltip] може бути саме тим, що нам потрібно."
  devotion_events.15.title: "Влада під загрозою"
  devotion_events.15.desc: "Почалося, як завжди, з чуток, пліток і крадькома кинутих поглядів, сповнених презирства та злоби. Якщо цей виклик владі [target_ruler.GetName] зайде надто далеко, що [target_ruler.GetSheHe] не був належним чином обраний на престол нашого [ROOT.GetCountry.GetFlavorRank], люди більше не будуть говорити, а можуть спробувати скинути [target_ruler.GetHerHim]!"
  devotion_events.15.a: "Як це сталося?"
  devotion_events.16.title: "Кампанія проти забобонних практик"
  devotion_events.16.desc: "Суворе, диктаторське ставлення [target_ruler.GetName] спровокувало [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] нашого [ROOT.GetCountry.GetFlavorRank], які вимагають припинити спроби [target_ruler.GetNameWithNoTooltip] обмежити забобонні практики. Лють, що виходить від цих простаків через оманливі традиції та безглузді, недоктринальні практики, спантеличує."
  devotion_events.16.a: "Переконати [target_ruler.GetNameWithNoTooltip] поступитися."
  devotion_events.16.b: "[target_ruler.GetNameWithNoTooltip] має рацію!"
  devotion_events.18.title: "Божевільний провидець"
  devotion_events.18.desc: "[mad_seer.GetSheHe|U] стверджує, що є провидцем, який бачив громадянську славу, руйнування світського мистецтва та культури, а також великий потоп, що очистить [ROOT.GetCountry.GetCapital.GetName] від його бруду. Божевільний проповідник закликає до [ROOT.GetCountry.GetReligion.GetAdjective] оновлення та запровадив екстремальну пуританську кампанію. Залучивши допомогу молодих чоловіків [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip], існує ризик, що [mad_seer.GetSheHe] спричинить заворушення або навіть оскаржить право [target_ruler.GetName] на правління!"
  devotion_events.18.a: "Переконайтеся, що [mad_seer.GetSheHe] замовкне назавжди!"
  devotion_events.18.b: "Не визнавати [mad_seer.GetHerHis] маячні та не реагувати на неї."
  devotion_events.18.c: "[target_ruler.GetNameWithNoTooltip] прихистить такого палкого [mad_seer.GetReligion.GetAdjectiveWithNoTooltip]!"
  devotion_events.19.title: "Рада на наш смак"
  devotion_events.19.desc: "На наш жаль, але не здивування, постійна боротьба між [target_ruler.GetName] та кожною установою в нашому [ROOT.GetCountry.GetFlavorRank] — церковною, освітньою, юридичною, медичною, фіскальною, адміністративною та публіцистичною — лише посилюється з кожною новою запропонованою реформою. Створивши та підтримавши однодумців усередині незгодних установ, вони можуть допомогти нам переконати неохоче населення змінити свою думку щодо запропонованої політики нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  devotion_events.19.a: "Ми почнемо з наших власних радників."
  devotion_events.19.b: "Нагадайте людям, хто є [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetLongNameWithNoTooltip]!"
  devotion_events.21.title: "Секуляристи серед нас"
  devotion_events.21.desc: "Кожен інцидент, що знижує нашу відданість нашому [ROOT.GetCountry.GetFlavorRank], наближає все більше проблем до нашого порогу. Є ті, хто вважає, що релігійні міркування повинні бути виключені з цивільних справ, і їхня кількість зросла. Вони вимагають змін і бажають, щоб ми секуляризували наш уряд."
  devotion_events.21.a: "[target_ruler.GetNameWithNoTooltip] скине [target_ruler.GetHerHis] релігійні шати заради корони!"
  devotion_events.21.b: "Цей радикальний крок поки що не буде зроблено."
  devotion_events.22.title: "Декаданс править"
  devotion_events.22.desc: "Розчаровані тим, що вони вважають корупцією та декадансом, одновірці припинили надсилати нам пожертви та відмовляються добровільно воювати в наших арміях як оплот [ROOT.GetCountry.GetReligion.GetAdjective] віри."
  devotion_events.22.a: "Знайдіть інші джерела монет."
  devotion_events.22.b: "Збільшити призов, щоб компенсувати втрати добровольців."
  devotion_events.23.title: "Корумпований [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  devotion_events.23.desc: "[target_ruler.GetName] став корумпованим, зосереджуючись на [target_ruler.GetHerHis] особистих цілях, а не на благо [ROOT.GetCountry.GetReligion.GetAdjective] віри. З огляду на це, не дивно, що наш народ розчарувався в [target_ruler.GetHerHim]."
  devotion_events.23.a: "Ігнорувати розпусту [target_ruler.GetNameWithNoTooltip]."
  devotion_events.23.b: "Спробувати щось змінити."
  devotion_events.24.title: "Добровольці для Священної Боротьби"
  devotion_events.24.desc: "Натхненні нашою святою справою, добровольці з [ROOT.GetCountry.GetReligion.GetAdjective] світу прибули, щоб допомогти боротися з невірними та поширювати істинну віру!"
  devotion_events.24.a: "Чудово! Така чудова ініціатива."
  devotion_events.100.title: "Конфлікт між [target_location.GetRank.GetNameWithNoTooltip|U] та [ROOT.GetCountry.GetFlavorRank]"
  devotion_events.100.desc: "Довготривале суперництво між [ROOT.GetCountry.GetFlavorRank] та нашим [target_location.GetRank.GetName] з [target_location.GetName] протягом багатьох років шкодило нашим відносинам. [target_location.GetRank.GetNameWithNoTooltip] прагне свободи від влади [target_ruler.GetName] і не бажав надавати притулок нашому [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [target_ruler.GetHerHis] попередникам у часи заворушень та війни."
  devotion_events.100.a: "Рано чи пізно вони прийдуть до тями."
  devotion_events.100.b: "Застосувати нашу владу!"
  devotion_events.101.title: "Ліхтар Світла"
  devotion_events.101.desc: "Огидна єретична книга «Ліхтар Світла» стверджує, що головною причиною переслідування перших християн було незаконне утримання дорогоцінних товарів священиками. Вона також порівнює престоли архієпископів або єпископів з престолами Антихриста. Цю книгу було знайдено у групи єретиків-рецидивістів, які, незважаючи на багато років ув'язнення та багато слізних зречень, все ще відмовляються змінити свої погляди."
  devotion_events.101.a: "Засудити єретиків до в'язниці ще раз."
  devotion_events.101.b: "Спалити єретиків."
  devotion_events.104.title: "Багаття марнославства"
  devotion_events.104.desc: "У [ROOT.GetCountry.GetCapital.GetName] є енергійний проповідник, чиї вуличні проповіді про спокуси марнославних предметів призвели до того, що [preacher.GetHerHis] прихильники збирають і спалюють косметику, мистецтво, книги, визнані аморальними, та музичні інструменти. [preacher.GetSheHe|U] лютує про те, як ці предмети можуть спокусити до гріха, і закликає людей, особливо відомих художників нашого [ROOT.GetCountry.GetFlavorRank], приносити речі, які [preacher.GetSheHe] вважає аморальними, до [preacher.GetHerHis] багать."
  devotion_events.104.a: "Зупинити [preacher.GetWomanMan]!"
  devotion_events.104.b: "Дозволити [preacher.GetHerHim] продовжувати, але врятувати мистецтво."
  devotion_events.104.c: "Цей [preacher.GetWomanMan] марнується поза нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  devotion_events.107.title: "Ювілей у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  devotion_events.107.desc: "Ювілей – святий рік – передбачає паломництво до священного місця, такого як [ShowLocationName('rome')] або наша власна столиця. Це особливий рік відпущення гріхів та загальних пробачень, щось, що [pope.GetName] зазвичай скликає кожні 25 або 50 років, але хто [pope.GetSheHe], щоб сказати, що ми не можемо скликати власний ювілей у [ROOT.GetCountry.GetCapital.GetName]?"
  devotion_events.107.desc_pope: "Ювілей, традиція, що сягає часів [GetCharacter('pap_boniface_viii').GetName], є особливим роком відпущення гріхів і передбачає багато паломництв до [ShowLocationName('rome')]. Скликаний кожні 25 або 50 років, знову настав час вирішити, чи варто оголошувати цей рік Ювілейним."
  devotion_events.107.a: "Чудова ідея – ми схвалюємо!"
  devotion_events.107.b: "Не цього року – можливо, наступного?"
  devotion_events.108.title: "Ювілей у [from_country.GetCapital.GetNameWithNoTooltip]"
  devotion_events.108.desc: "[from_country.GetGovernment.GetRulerTitle] [from_country.GetLongName] скликав ювілей у [from_country.GetCapital.GetName], святий рік відпущення гріхів та загальних пробачень. Це [ShowReligionGroupAdjective('christian')] традиція, що сягає 1300 року, коли [GetCharacter('pap_boniface_viii').GetName] скликав святий рік у [ShowLocationName('rome')]."
  devotion_events.108.a: "Це має бути зарезервовано для нас!"
  devotion_events.108.b: "Це чудова ідея!"
  devotion_events.109.title: "[papacy.GetGovernment.GetRulerTitle] реагує на Ювілей у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  devotion_events.109.desc: "Традиція ювілеїв розпочалася, коли [GetCharacter('pap_boniface_viii').GetName] скликав святий рік у [ShowLocationName('rome')] 1300 року. [pope.GetName] надіслав нам посланця, коли новини про ювілей у [ROOT.GetCountry.GetCapital.GetName] дійшли до [pope.GetHerHim], і ми побоюємося реакції [pope.GetHerHis]."
  devotion_events.109.a: "[pope.GetSheHe|U] це не подобається, зовсім ні."
  devotion_events.109.b: "Нам не варто хвилюватися. [pope.GetSheHe|U] схвалює!"
  devotion_events.117.title: "Конфіскація [ShowReligionAdjectiveWithNoTooltip('calvinist')|U] церкви"
  devotion_events.117.desc: "Група ченців конфіскувала [ShowReligionAdjective('calvinist')] церкву в [target_location.GetName]! Їхні дії не були санкціоновані [target_ruler.GetName], і якби ми знали про їхні наміри, ми б переконали ченців обрати іншу будівлю для своєї каплиці. Це, звичайно, засмутило жителів постраждалого [target_location.GetRank.GetName], і хоча ми змусили ченців повернути церкву, розлючені [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] не забудуть цієї образи."
  devotion_events.117.a: "Чого ще вони хочуть?"
  devotion_events.118.title: "Галлеське Священство"
  devotion_events.118.desc: "Покійний [old_ruler.GetName] боявся за [old_ruler.GetHerHis] місце на небесах і зібрав багато реліквій, щоб забезпечити якомога менший час перебування в чистилищі. Коли слуги збирали речі [old_ruler.GetHerHis], вони виявили 8100 реліквій та 42 святі скелети, приховані в різних місцях по всій резиденції [old_ruler.GetNameWithNoTooltip]."
  devotion_events.118.a: "Продаж індульгенцій – ось що спровокувало [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip]! Тримайте їх у таємниці."
  devotion_events.118.b: "Можливо, вони допомогли [old_ruler.GetNameWithNoTooltip] потрапити на небеса?"
  devotion_events.119.title: "Чутка про Голову Кобили"
  devotion_events.119.desc: "Шепіт і погляди на [target_ruler.GetName], коли [target_ruler.GetSheHe] подорожує вулицями [ROOT.GetCountry.GetCapital.GetName], викликані тривожною чуткою. Люди насправді вірять, що [target_ruler.GetNameWithNoTooltip] був не урочисто освячений, а натомість був освячений з Біблією, притиснутою до [target_ruler.GetHerHis] шиї, перебуваючи всередині таверни сумнівної репутації!"
  devotion_events.119.a: "Ігнорувати справу і молитися, щоб вона зникла."
  devotion_events.119.b: "Заперечувати це палко."
  devotion_events.200.title: "Місцевий імам-хатіб"
  devotion_events.200.desc: "[target_heir.GetName] був лідером молитов у мечеті та проповідником на спільній молитві в п'ятницю, перш ніж [target_heir.GetSheHe] був обраний правити нашим [ROOT.GetCountry.GetFlavorRank] після [target_ruler.GetName]. Місцева громада, яка обрала [target_heir.GetHerHim] імамом-хатібом, буде сумна бачити, як [target_heir.GetNameWithNoTooltip] йде, бо мало хто інший настільки освічений і доброчесний, як [target_heir.GetHerHim], у навчанні громади основам [ShowReligionGroupName('muslim')]. Коли [target_heir.GetSheHe] піде, релігійні питання тепер доведеться ставити комусь, хто поступається [target_heir.GetNameWithNoTooltip], але те, що вони втратять, ми здобудемо."
  devotion_events.200.a: "Мудро було з нашого боку обрати [target_heir.GetNameWithNoTooltip]."
  devotion_events.201.title: "Керівні принципи"
  devotion_events.201.desc: "Дехто може стверджувати, що Аль-Шура є частиною правлячої структури, але не однією з її опор. Зустрічі повинні відповідати вченням [ShowReligionGroupName('muslim')], консультації – настановам $common_string_quran$ та $sunnah$. Лідера слід обирати з присутніх, щоб очолити зустріч. Обговорення ґрунтуються на мушаварі та музакарі – обговоренні та консенсусі. Кожен може висловити свою думку, і голоси більшості приймаються, якщо це не порушує вчення $common_string_quran$ та $sharia$."
  devotion_events.201.a: "Зробити це однією з опор."
  devotion_events.201.b: "Здається, це легкий спосіб керувати нашою країною."
  devotion_events.202.title: "Серце Милосердя"
  devotion_events.202.desc: "Алі ібн Абі Таліб, двоюрідний брат Пророка, мир йому, одного разу сказав: «Наповніть своє серце милосердям, любов’ю та добротою до своїх підданих. Не будьте перед ними ненажерливою твариною, що вважає їх легкою здобиччю, бо вони бувають двох видів: або ваші брати по вірі, або рівні вам у творінні. Помилка застає їх зненацька, недоліки долають їх, злі вчинки та гріхи вони чинять навмисно та помилково. Тож даруйте їм своє прощення та свою милість тією ж мірою, якою ви сподіваєтеся, що [ROOT.GetCountry.GetReligion.GetGodName] дарує вам Своє прощення та Свою милість. Бо ви вищі за них, а той, хто призначив вас, вищий за вас, і [ROOT.GetCountry.GetReligion.GetGodName] вищий за того, хто призначив вас. [ROOT.GetCountry.GetReligion.GetGodName] вимагав від вас виконання їхніх потреб і Він випробовує вас ними».\n\nЦінний урок можна винести з його слів, яким ми могли б присвятити себе або знайти способи включити його в наше управління."
  devotion_events.202.a: "Ін шаа Аллах."
  devotion_events.202.b: "Мудрі слова, до яких ми прислухаємося."
  devotion_events.203.title: "Байт аль-Маль"
  devotion_events.203.desc: "Дім Багатства управляє податками та служить скарбницею, яка керує особистими фінансами та державними витратами. Він також управляє $zakah$, податком, який кожен заможний [ShowReligionGroupAdjective('muslim')] платить для розподілу тим, хто потребує, безробітним, пораненим або іншим чином нездатним працювати. Минулого року, незалежно від проблем, з якими зіткнувся наш [ROOT.GetCountry.GetFlavorRank], наш народ зумів провести винятковий рік. Сума $zakah$, що надходить до Байт аль-Маль, перевищує будь-які наші очікування."
  devotion_events.203.a: "Монета збільшить наші скарбниці."
  devotion_events.203.b: "Вона піде бідним і нужденним, як завжди."
  devotion_events.204.title: "Освіта жінок"
  devotion_events.204.desc: "Мухаммад, мир йому, хвалив жінок аль-Ансар, бо сором не заважав їм вивчати [ShowReligionGroupName('muslim')]. Фатіма аль-Фіхрія – яка заснувала Університет аль-Каравійїн, Лубна з [ShowLocationName('cordoba')] – вправна математикиня, і Фатіма б. Абі аль-Касім Абд аль-Рахман б. Мухаммад б. Галіб аль-Ансарі аль-Шаррат – чиї праці з правової теорії, юриспруденції та містицизму показали її великі знання ісламських наук, – усі є чудовими прикладами того, що відбувається, коли ви навчаєте жінок. Протягом історії жінки показали, що вони бажають і здатні вивчати [ShowReligionGroupNameWithNoTooltip('muslim')] та продовжувати справу поширення [ROOT.GetCountry.GetReligion.GetName]. Надаючи жінкам чудову можливість навчатися та викладати, ми зможемо поширювати нашу віру набагато швидше."
  devotion_events.204.a: "Освіта має бути для всіх, чоловіків і жінок."
  devotion_events.204.b: "Це питання, над яким нам потрібно поміркувати, перш ніж щось вирішувати."
  devotion_events.205.title: "Базар"
  devotion_events.205.desc: "[ROOT.GetCountry.GetCapital.GetName] приваблює торговців і купців з усього світу, і звук та запах змучених тварин, голоси, що торгуються, аромат спецій та всі кольори одягу, тканин і килимів, що продаються тут, можуть бути приголомшливими. Ділянка в центрі базару залишилася недоторканою, призначена для мечеті, але оскільки базар стає все більш жвавим, це місце можна було б краще використати для більшої кількості ринкових прилавків."
  devotion_events.205.a: "Дозволити більше місця для торговців."
  devotion_events.205.b: "Зробити це місцем поклоніння."
  devotion_events.207.title: "Корумповані губернатори"
  devotion_events.207.desc: "Кожен губернатор має свої фінансові активи та інші дані, записані до його призначення. Потім це зберігається в спеціальному офісі, і переглядається лише щороку, коли їх перевіряють на розбіжності у фінансах. Це робиться для уникнення корупції та хабарництва, але іноді система дає збій."
  devotion_events.207.a: "Усунути наших найбільш корумпованих губернаторів."
  devotion_events.208.title: "Кафір у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle|U]"
  devotion_events.208.desc: "[minister.GetName] розлютив не ту [ROOT.GetCountry.GetReligion.GetAdjective] особу заявою, яку можна було інтерпретувати так, ніби [minister.GetSheHe] свідомо відмовився від [ShowReligionGroupName('muslim')]. Перш ніж ми змогли перервати дискусію і, можливо, врятувати [minister.GetNameWithNoTooltip] від будь-яких звинувачень, були зроблені заяви про те, що він кафір, невіруючий."
  devotion_events.208.a: "Ігнорувати, виправдати, забути."
  devotion_events.208.b: "Спробуйте знайти рішення для цього."
  devotion_events.208.c: "Звільнити [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle]."
  devotion_events.209.title: "Переворот проти декадансу"
  devotion_events.209.desc: "Нарікання на розпусту [target_ruler.GetName], його декадентські звичаї та відмову відновити престиж [ShowReligionGroupName('muslim')] стають дедалі частішими. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] гнівно бурмочуть, що [target_ruler.GetNameWithNoTooltip] проводить [target_ruler.GetHerHis] дні у сні, а ночі з повіями та музикантами. Коли імам [ROOT.GetCountry.GetCapital.GetName] назвав нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] у публічних молитвах, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] навіть кидали в нього каміння!"
  devotion_events.209.a: "Примусити [target_ruler.GetNameWithNoTooltip] пообіцяти змінити [target_ruler.GetHerHis] звичаї."
  devotion_events.209.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] можуть висловлювати будь-які докори, які забажають, але [target_ruler.GetNameWithNoTooltip] є [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  devotion_events.210.title: "Рафіда"
  devotion_events.210.desc: "Послідовники [ShowReligionAdjective('shia')] віри — ті, кого ми називаємо Рафіда, хто відкидає [ShowReligionGroupAdjective('muslim')] владу та лідерство, хто не визнає 'Абу Бакра, 'Умара та 'Усмана наступниками пророка Мухаммада, мир йому — заявили про свою присутність у наших провінціях та привабили інших приєднатися до них. Вони навіть називають себе Равафід — ті, хто відмовляється — і пишаються тим, що завжди відкидали зло, а не зверталися до нього."
  devotion_events.210.a: "Не гайте часу — виженіть їх з [ROOT.GetCountry.GetFlavorRank]!"
  devotion_events.210.a.tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowReligionName('shia')] як домінуючою [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowModifier('dev_rafida')] на 10 років"
  devotion_events.210.b: "Вони можуть вірити і називати себе як завгодно."
  devotion_events.211.title: "Насібі"
  devotion_events.211.desc: "Ті, кого ми називаємо Насібі, ті, хто ненавидить 'Ахль Аль-Байт — Домашнє господарство пророка Мухаммада, мир йому — і хто ненавидить їхніх послідовників, з'явилися в наших провінціях. [ShowReligionAdjective('sunni')] віруючі, які нерозумно вважають, що 'Абу Бакр, 'Умар та 'Усман є законними наступниками Мухаммада, мир йому, загрожують релігійній однорідності нашого [ROOT.GetCountry.GetFlavorRank]."
  devotion_events.211.a: "Цим [ShowReligionAdjectiveWithNoTooltip('sunni')] дурням немає місця в нашому [ROOT.GetCountry.GetFlavorRank]."
  devotion_events.211.a.tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowReligionName('sunni')] як домінуючою [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowModifier('dev_nasibi')] на 10 років"
  devotion_events.211.b: "Залиште їх, вони одного дня усвідомлять свою помилку."
  devotion_events.212.title: "Нечесність у Меджлісі"
  devotion_events.212.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] скликав зустріч, меджліс, для обговорення важливих та нагальних справ у нашому [ROOT.GetCountry.GetFlavorRank]. Хоча їхні обличчя були чесними, а слова правдивими, їхні наміри були оманливими та нечесними! Гроші розтрачені, престиж втрачено, а надії на справедливий меджліс для блага нашого [ROOT.GetCountry.GetFlavorRank] розбиті та зруйновані!"
  devotion_events.212.a: "Ми довіряли їм, а вони нас зрадили!"
  devotion_events.212.b: "[target_ruler.GetNameWithNoTooltip] звинувачує [target_ruler.GetHerselfHimself] у надмірній наївності."
  devotion_events.213.title: "[ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle|U] звинувачений у ширку"
  devotion_events.213.desc: "Робота старанного [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] викриє їх і, відповідно, нас для різних культур, релігій та традицій. Ми завжди вирішували відвертати погляд від дивних звичок [minister.GetName] та одержимості нашого [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] ілюмінованими рукописами та мініатюрами. Хоча наші підозри зростали, коли ми чули плітки та розповіді від слуг та людей [ROOT.GetCountry.GetGovernment.GetCourtTitle], ми ніколи б не передбачили виразу обличчя [minister.GetHerHis], коли імам звинуватив [minister.GetHerHim] у ширку — практиці ідолопоклонства!"
  devotion_events.213.a: "Негайно усуньте [minister.GetHerHim] з нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  devotion_events.213.b: "Відкиньте цю думку!"
  devotion_events.214.title: "Скасувати ідолопоклонство?"
  devotion_events.214.desc: "Нас повідомили, що правління [target_ruler.GetName] ставиться під сумнів нашими радниками. Очевидно, люди сумніваються в [target_ruler.GetHerHis] благочесті. Ми повинні щось зробити, щоб встановити релігійний і політичний суверенітет! Ідолопоклонство є [ROOT.GetCountry.GetReligion.GetSinName], але все ще наш народ молиться святим постатям, здійснює паломництва до гробниць і мечетей, шанує дерева, печери і навіть каміння. Ми повинні показати нашу релігійну силу і скасувати ці речі, щоб здобути владу, яка законно належить [target_ruler.GetNameWithNoTooltip]!"
  devotion_events.214.a: "Вперед, заборонити їх усі!"
  devotion_events.214.b: "Навіщо турбуватися?"
  devotion_events.215.title: "Податки чи сільське господарство"
  devotion_events.215.desc: "Народ нашого [ROOT.GetCountry.GetFlavorRank] є кочівниками та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які живуть з того, що дає земля. З огляду на це, наші губернатори потребують, щоб ми вирішили, чи слід нам зосередитися на податках, чи на сільському господарстві. Деякі стверджують, що розвиток землі важливіший за збір податків. Податок можна отримати лише шляхом розвитку землі, і вимагати податок, не роблячи цього, зруйнує наш [ROOT.GetCountry.GetFlavorRank] і знищить його народ. Інші стверджують, що люди розвиватимуть землю без втручання, якщо від них вимагатимуть лише податок."
  devotion_events.215.a: "Зосередитися на податках."
  devotion_events.215.b: "Зосередитися на сільському господарстві."
  devotion_events.215.c: "Спробувати збалансувати обидва."
  devotion_events.215.d: "Наша поточна політика цілком задовільна."
  devotion_events.216.title: "Реформи благочестивих"
  devotion_events.216.desc: "Після багатьох зустрічей, обговорень та меджлісів наші радники запропонували нам різні реформи для розгляду. Виникли дві основні фракції з конкуруючими реформами, з яких ми повинні обрати одну, щоб покращити наш [ROOT.GetCountry.GetFlavorRank]. Перша пропонує виключити державних службовців, таких як дипломати та губернатори, з будь-якої підприємницької діяльності. Це дозволило б їм повністю зосередитися на своїй роботі на службі нашому [ROOT.GetCountry.GetFlavorRank], таким чином дозволяючи їм краще виконувати свою роботу. Друга реформа пропонує розподілити пасовища та мисливські угіддя, які зараз зарезервовані для сімей сановників, серед бідних, щоб вони могли обробляти землю. Неоплачувана праця також буде оголошена незаконною."
  devotion_events.216.a: "Виключити державних службовців з будь-якої підприємницької діяльності."
  devotion_events.216.b: "Розподілити землі серед бідних."
  devotion_events.216.c: "Не обирати жодної з них."
  devotion_events.219.title: "Каді, Хісба та Мухтасіб"
  devotion_events.219.desc: "Не минуло й кількох місяців, як ми призначили нового Каді – суддю, що править згідно з $sharia$ – у кожну з наших провінцій, але багато з них вже приходять до нас із насупленими бровами та тривожними очима. Вони розповідають нам про занепад нашого народу, його злочини та його нечестиві шляхи. Вони суворо нагадали нам про Хісбу, наш божественно санкціонований обов'язок втручатися та наказувати правильне і забороняти неправильне. Закони [ROOT.GetCountry.GetReligion.GetGodName] повинні дотримуватися. Нашому народу потрібні муттавві'ін – релігійна поліція – для забезпечення $sharia$."
  devotion_events.219.a: "Знайти добровольців і навчити їх стати Мухтасібінами."
  devotion_events.219.b: "Це не правильний спосіб вирішення цієї проблеми."