l_english:
  steppe_horde.1.title: "Місто, що рухається"
  steppe_horde.1.desc: "Існують стародавні оповіді про рухомі палаци, що розсипалися в пісках пустелі. Крихкі та мінливі міражі з'являлися і зникали, розвіюючись, як імена людей, що жили та помирали в їхніх таємних покоях. Але всі легенди народжуються з тінистої правди, відлуння того, що минуло.\n\nМи — ті рухомі палаци, ті зникаючі мешканці. Наші міста побудовані не з каменю, а на кістках."
  steppe_horde.1.a: "Ми не залишимося міражем."
  STATIC_MODIFIER_NAME_a_moving_city: "Місто, що рухається"
  STATIC_MODIFIER_DESC_a_moving_city: "Наші мобільні каравани принесли нам добру репутацію в торгівлі."
  steppe_horde.1.b: "Залишатися на одному місці теж непогано."
  STATIC_MODIFIER_NAME_not_so_moving_city: "Постійне місто"
  STATIC_MODIFIER_DESC_not_so_moving_city: "Постійність дає стабільність."
  steppe_horde.2.title: "Храм предків"
  steppe_horde.2.desc: "Один з наших господарів заблукав під час мисливської експедиції і виявив покинуте святилище [target_religion.GetAdjective] віри в глибинах нашої землі. Досконалі вірування мають бути непроникними, як тверді камені, що потонули в останньому подиху природи, але все ще намагаються вдихнути повітря. Залишки давно минулих часів під слабким променем світла, його підмурівок міцний, як приручені коні.\n\nНаші воїни були вражені його досконалою неясністю. Вони не могли кричати, бо велич цього храму змусила їх замовкнути від благоговіння."
  steppe_horde.2.a: "Ми повинні поважати наших предків."
  STATIC_MODIFIER_NAME_ancestral_temple: "Храм предків"
  STATIC_MODIFIER_DESC_ancestral_temple: "Ми виявили стародавнє святилище нашого народу."
  steppe_horde.2.b: "Єресь, спалити його!"
  steppe_horde.3.desc.common: "Шаман з [target_location.GetName] з'явився до намету [target_ruler.GetName]. [target_character.GetSheHe|U] прийшов, щоб оголосити, що [target_character.GetSheHe] благословить наших воїнів"
  steppe_horde.3.title: "Синій Дракон"
  steppe_horde.3.desc: "$steppe_horde.3.desc.common$, бо синій дракон з'явився [target_character.GetHerHim] у зірках, щоб наділити нашу віддану орду непереможною силою.\n\nУ цей непевний час війни, обіцянки [target_character.GetHerHis] виглядають надто привабливо."
  steppe_horde.3.a: "Ми будемо слідувати порадам [target_character.GetHerHis]."
  STATIC_MODIFIER_NAME_blue_dragon: "Синій Дракон"
  STATIC_MODIFIER_DESC_blue_dragon: "Наша орда була благословлена, і тепер ми можемо повернути те, що по праву належить нам."
  steppe_horde.3.b: "Ми не піддамося чаклунству, вбити [target_character.GetHerHim]."
  steppe_horde.4.title: "Білий Тигр"
  steppe_horde.4.desc: "$steppe_horde.3.desc.common$, бо білий тигр з'явився [target_character.GetHerHim] у зірках, щоб наділити нашу віддану орду грізною присутністю.\n\nСаме в ці часи миру ми повинні готуватися до того, що має статися."
  steppe_horde.4.a: "Ми будемо слідувати порадам [target_character.GetHerHis]."
  STATIC_MODIFIER_NAME_white_tiger: "Білий Тигр"
  STATIC_MODIFIER_DESC_white_tiger: "$STATIC_MODIFIER_DESC_blue_dragon$"
  steppe_horde.4.b: "$steppe_horde.3.b$"
  steppe_horde.5.title: "Мовчання ягнят"
  steppe_horde.5.desc: "Місяці й роки ми провели під цими незмінними зорями, наші ягнята були єдиними тваринами, що годували наші мандрівні вуста, пил — єдиним слідом життя, яким ми могли йти.\n\nА потім щось зупинилося. Наша худоба почала падати одна за одною, їхні невинні спини лежали на землі, наче килим у наших наметах. Швидко поширилися чутки про прокляття, закляття, чари.\n\nЄдине, що було певним, це те, що смерть забрала те, що належало життю. Без м'яса нашої худоби, наш народ незабаром спіткає їхня доля. Ми могли б спробувати виправити ситуацію, звернувшись до наших дипломатичних контактів, або забезпечивши «альтернативні» джерела м'яса з інших земель."
  steppe_horde.5.a: "На нас падає жорстока доля."
  STATIC_MODIFIER_NAME_the_silence_of_the_lambs: "Мовчання ягнят"
  STATIC_MODIFIER_DESC_the_silence_of_the_lambs: "Брак худоби не дозволяє нашим солдатам бути ситими."
  steppe_horde.5.b: "Спробуймо з кимось зв'язатися."
  STATIC_MODIFIER_NAME_contact_modifier: "Контакт"
  STATIC_MODIFIER_DESC_contact_modifier: "Наші дипломатичні контакти дозволяють нам вирішити проблему нестачі продовольства, але ціною того, що ми виглядатимемо слабкими."
  steppe_horde.5.c: "Шукаймо інших тварин, м'ясо є м'ясо."
  STATIC_MODIFIER_NAME_the_elephant_man: "Людина-слон"
  STATIC_MODIFIER_DESC_the_elephant_man: "Деяка тіньова особа забезпечила нас альтернативним джерелом м'яса у вигляді слонів, привезених із далеких земель. Чомусь, слони, що блукають степами, не здаються такими вже дивними."
  steppe_horde.6.title: "Зіпсований розум"
  steppe_horde.6.desc: "[target_ruler.GetName] мав звичай блукати околицями [target_ruler.GetHerHis] палацу, гублячись у хащах у пошуках спокою. Але сьогодні [target_ruler.GetSheHe] повернувся... трохи змінений. Коли [target_ruler.GetNameWithNoTooltip] прибув до палацу цього ранку, [target_ruler.GetHerHis] очі були яскраво-червоними, [target_ruler.GetHerHis] рот сухим, як пустеля, [target_ruler.GetHerHis] голос тріснув, коли [target_ruler.GetSheHe] заявив, що [target_ruler.GetSheHe] їстиме шматки серця [target_ruler.GetHerHis] коханої з землі, як голодний собака.\n\nЗі страху за [target_ruler.GetHerHis] розум, група дослідників пішла слідами [target_ruler.GetHerHis] і знайшла переконливу та тривожну відповідь: шкідливі випари виходили з сусідньої печери."
  steppe_horde.6.a: "Це неможливо!"
  steppe_horde.6.b: "Насправді, [target_ruler.GetNameWithNoTooltip] не такий вже й інший."
  steppe_horde.6.c: "Просто запечатаймо ту печеру."
  steppe_horde.7.title: "Осередок влади"
  steppe_horde.7.desc: "Будучи кочовою цивілізацією, джерело нашої влади знаходиться не в осілому місці, а виходить від постаті [target_ruler.GetName] і, отже, є там, де [target_ruler.GetSheHe] є. Однак навіть наймогутніший [ROOT.GetCountry.GetGovernment.GetRulerTitle] не може блукати безкінечно, і створення постійної бази завжди має свої переваги. [ROOT.GetCountry.GetGovernment.GetRulerTitle] досить часто знаходить [target_ruler.GetHerselfHimself] у [target_location.GetName], тому більш постійне місце там не зашкодить, але йому потрібно буде забезпечити свою оборону."
  steppe_horde.7.a: "Давайте зміцнимо його!"
  STATIC_MODIFIER_NAME_seat_of_power: "Осередок влади"
  STATIC_MODIFIER_DESC_seat_of_power: "Наші форти були укріплені."
  steppe_horde.7.b: "Блукатимемо."
  steppe_horde.8.title: "Найкраще навчання"
  steppe_horde.8.desc: "Витончене навчання нашого народу на мисливських угіддях завжди дарувало нашому [ROOT.GetCountry.GetFlavorRank] чималий досвід для наших солдатів. Приручення хижих птахів виділило одного молодого [target_character.GetWomanMan] з-поміж усіх [target_character.GetHerHis] побратимів і продемонструвало велику майстерність [target_character.GetHerHis] здібностей."
  steppe_horde.8.a: "Вдалого полювання."
  steppe_horde.9.title: "Білий Місяць"
  steppe_horde.9.desc: "Білий місяць з'явився в небі, його розмиті краї виливали світло. Багато хто в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] попереджали [target_ruler.GetName] про небезпеку нешанування його, як це належить. Буде відсвятковано бенкет, щоб помилуватися цим рідкісним явищем, люди з усієї нації прийдуть і порадіють тьмяному мерехтінню місяця. І ми могли б навіть розширити запрошення на деяких іноземних сановників."
  steppe_horde.9.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  opinion_lunar_new_year: "Відсвятковано Місячний Новий Рік"
  steppe_horde.9.b: "Це об'єднає наш народ."
  steppe_horde.10.title: "Приборкання провінцій"
  steppe_horde.10.desc: "Наближення орди – це те, чого більшість націй прагнуть уникнути. Наша лютість добре відома серед наших підданих, і їхнє бажання догодити нам тепер майже абсолютне – або принаймні бажання зберегти свої будинки."
  steppe_horde.10.a: "Краще боятися, ніж любити."
  STATIC_MODIFIER_NAME_taming_provinces: "Приборкання провінцій"
  STATIC_MODIFIER_DESC_taming_provinces: "Ніхто не бажає чути наших коней."
  steppe_horde.10.b: "Спробуймо дипломатичний підхід."
  STATIC_MODIFIER_NAME_diplomatic_approach: "Дипломатичний підхід"
  STATIC_MODIFIER_DESC_diplomatic_approach: "Іноді перо могутніше за меч."
  steppe_horde.11.title: "Народжені в сідлі"
  steppe_horde.11.desc: "З війни ми прийшли, для війни б'ються наші серця. Ми, сини безкраїх рівнин, не були створені для бездіяльності. Наш недавній період без воєн вже починає проявляти ознаки неспокою серед нашого населення, особливо серед наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які бачать у цьому втрату можливостей."
  steppe_horde.11.a: "Незважаючи на це, нашій країні потрібен відпочинок."
  steppe_horde.11.b: "У мирі також є переваги."
  steppe_horde.12.title: "Втома для слабких"
  steppe_horde.12.desc: "Поки поселенці ховаються за своїми високими стінами і голодують від страху, наше військо – це наш народ. Орди не бояться війни, орди живуть для війни."
  steppe_horde.12.a: "Сила через єдність."
  steppe_horde.12.b: "Єдність через силу."
  steppe_horde.13.title: "Це гарний день, щоб померти"
  steppe_horde.13.desc: "Чутки про наші славні військові подвиги поширюються на наших сусідів як близьких, так і далеких. Загони сильних молодих воїнів стікаються через племінні землі на нашу службу, шукаючи життя, сповненого слави та здобичі."
  steppe_horde.13.a: "Справді, вельми бажана звістка."
  steppe_horde.13.b: "Очевидно, наш народ прагне битися."
  steppe_horde.14.title: "Клановики стікаються до наших орд"
  steppe_horde.14.desc: "Почувши чутки про виснаження наших могутніх орд, молоді воїни виходять з найглибших куточків нашого володіння, стікаючись до наших армій. Деякі шукають життя кочових воїнів та найманців, інші — лише здобичі."
  steppe_horde.14.a: "Нехай сини приєднаються до своїх батьків."
  steppe_horde.14.b: "Ми вже достатньо сильні."
  steppe_horde.15.title: "Невгамовні кочівники"
  steppe_horde.15.desc: "Розлючений поточним станом миру та відсутністю набігів і грабунків, цілий клан, що складається переважно з досвідчених воїнів та мисливців, планує покинути наш [ROOT.GetCountry.GetFlavorRank], заявляючи, що якщо ми не надамо їм можливостей, вони будуть змушені шукати їх самостійно."
  steppe_horde.15.a: "Зрадницька наволоч!"
  steppe_horde.15.b: "Компроміс з кланами."
  steppe_horde.16.title: "Племінна ворожнеча"
  steppe_horde.16.desc: "Під час розпалу літніх святкувань у нашій столиці, члени двох ворогуючих кланів вирішили влаштувати публічну розправу та битися перед усім політичним та релігійним керівництвом нашого [ROOT.GetCountry.GetFlavorRank]! Наступне насильство було настільки жорстоким, що загинули не лише ворогуючі клановики, але й незліченні перехожі та навіть члени [ROOT.GetCountry.GetGovernment.GetAdjective] гвардії."
  steppe_horde.16.a: "Підла чернь! Як вони сміють!"
  steppe_horde.16.b: "Такий шлях [ROOT.GetCountry.GetFlavorRank]."
  steppe_horde.17.title: "Нещасний випадок на полюванні"
  steppe_horde.17.desc: "Під час полювання, [target_heir.GetName] та [target_heir.GetHerHis] охоронці були атаковані засідкою невідомих убивць. Перевищені числом та атаковані з укриття, всі, крім одного, полягли там і тоді. Той, хто вижив, хоч і поранений отруєною стрілою, прожив достатньо довго, щоб розповісти нам про доблесний останній бій [target_heir.GetShortNameWithNoTooltip]. Високий і могутній [target_heir.GetSheHe] стояв, рубаючи істот ночі одну за одною, коли вони оточували [target_heir.GetHerHim], доки останній з [target_heir.GetHerHis] охоронців не піддався. Струшені та в жалобі, наші люди вшановують спадщину [target_heir.GetNameWithNoTooltip], оскільки [target_heir.GetSheHe] досягає безсмертя в їхній пам'яті."
  steppe_horde.17.a: "Вистежити вбивць!"
  steppe_horde_small_armies_common_desc: "Наші армії настільки малі та жалюгідні, що"
  steppe_horde.18.title: "Ми виглядаємо слабкими"
  steppe_horde.18.desc: "$steppe_horde_small_armies_common_desc$ не лише старійшини, але й місцеві правителі кланів сміють паплюжити ім'я нашого [ROOT.GetCountry.GetFlavorRank]."
  steppe_horde.18.a: "Ігнорувати чернь, собака, що гавкає, не кусає."
  steppe_horde.18.b: "Ми явно бачили кращі дні."
  steppe_horde.19.title: "Підірваний авторитет"
  steppe_horde.19.desc: "$steppe_horde_small_armies_common_desc$ багато лідерів кланів та старійшин відкрито ставлять під сумнів здатність [target_ruler.GetName] вести нас, стверджуючи, що [target_heir.GetName] був би набагато кращим [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  steppe_horde.19.a: "Їхні слова нічого не варті."
  steppe_horde.19.b: "Можливо, вони мають рацію."
  steppe_horde.20.title: "Військова традиція зневажена"
  steppe_horde.20.desc: "$steppe_horde_small_armies_common_desc$ наші командири починають сумніватися, чи має їхня служба взагалі якийсь сенс."
  steppe_horde.20.a: "О, ви, маловіри."
  steppe_horde.20.b: "Це правда, вони нам не потрібні."
  steppe_horde.21.title: "$steppe_horde.20.title$"
  steppe_horde.21.desc: "$steppe_horde.20.desc$ Деморалізовані відсутністю будь-яких перспектив на славне життя набігів та грабунків, чоловіки починають залишати наші війська і замість цього йдуть до інших племен або формують місцеві банди грабіжників та розбійників."
  steppe_horde.21.a: "$steppe_horde.20.a$"
  steppe_horde.21.b: "Переконайтеся, що вони залишаться."
  steppe_horde.22.title: "Війна, для чого вона потрібна"
  steppe_horde.22.desc: "Стоячи на вершині пагорба, спостерігаючи, як наші всемогутні війська марширують на ворожу землю, чимало хто замислюється про корисність війни. Який сенс у постійних грабунках і різанині, для чого це потрібно? Відповідь ясна як день: «Абсолютно для всього»."
  steppe_horde.22.a: "Так, справді."
  steppe_horde.1000.title: "Військові ігри"
  steppe_horde.1000.desc: "Величезна подія в повсякденному житті степових мешканців ось-ось відбудеться. Воїни з далеких і близьких місць зберуться в нашій столиці, щоб взяти участь у демонстрації майстерності. Кінна стрільба з лука, змагання на силу та спритність відбудуться і можуть породити нових чемпіонів та легенд."
  steppe_horde.1000.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  steppe_horde.1001.title: "Славний [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  steppe_horde.1001.desc: "Радійте! Наш славний [target_ruler.GetName] виграв змагання з рукопашного бою. [target_ruler.GetHerHis|U] військова доблесть безпрецедентна і є прикладом для наслідування."
  steppe_horde.1001.a: "Ми всі підемо за [target_ruler.GetHerHim]!"
  steppe_horde.1001.b: "[target_ruler.GetSheHe|U] поведе нас до слави!"
  steppe_horde.1002.title: "Успішні ігри"
  steppe_horde.1002.desc: "Наші військові ігри пройшли з повним успіхом: як вітчизняні, так і далекі воїни продемонстрували свою майстерність та знання військової справи. У нас багато нових чемпіонів та легенд, і всі пам'ятатимуть цю подію протягом багатьох поколінь."
  steppe_horde.1002.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  steppe_horde.1003.title: "Згубні ігри"
  steppe_horde.1003.desc: "О, жах! Коли почалися військові ігри, два ворогуючі клани розпочали сварку, яка вийшла з-під контролю і перетворилася на масову бійку. Перш ніж наша палацова гвардія змогла їх зупинити, арена була пошкоджена, а дві великі будівлі були підпалені, зіпсувавши решту цієї події!"
  steppe_horde.1003.a: "Ці катастрофічні ігри буде важко забути."
  steppe_horde.1004.title: "Легендарні ігри"
  steppe_horde.1004.desc: "Вся подія пройшла краще, ніж ми могли сподіватися! Кожне змагання виявилося змаганням запеклого суперництва з опонентами рівної майстерності, що змагалися один проти одного. Наші старійшини були настільки вражені, що після події навіть найстаріші серед них не могли згадати більш успішних ігор!"
  steppe_horde.1004.a: "[ROOT.GetCountry.Custom('common_string_positive')]"