l_english:
  republics.1.title: "Республіканські традиції обговорюються"
  republics.1.desc: "Наша молода та тендітна республіка переживає запеклі дебати, деякі з яких навіть переростають у насильство, між прихильниками старого режиму та стійкими захисниками свободи й волі. Як нам реагувати на це?"
  republics.1.a: "Нам потрібен Король!"
  republics.1.b: "Республіка священна!"
  republics.2.title: "Перемога вільноторговців у дебатах"
  republics.2.desc: "Вільноторговці стають дедалі популярнішими і, схоже, тепер мають більшість підтримки в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Вони виступають за те, що ми повинні зменшити наші меркантилістичні тенденції."
  republics.2.a: "Ми повинні бути вільноторговцями"
  republics.2.b: "Меркантилізм життєво важливий для держави"
  republics.4.title: "Судовий процес"
  republics.4.desc: "Старший син [target_character.GetName] перебуває під судом за корупцію та хабарництво. Немає сумнівів, що звинувачення правдиві, і засудження старшого сина [target_character.GetHerHis] було б серйозним особистим ударом для [target_character.GetHerHim]. З іншого боку, ми, звичайно, могли б втрутитися в судовий процес і забезпечити його невинність."
  republics.4.a: "Відійти від публічного життя"
  republics.4.b: "Домогтися його виправдання"
  republics.5.title: "Нова монета"
  republics.5.desc: "У минулі часи [ROOT.GetCountry.GetGovernment.GetRulerTitle] зображувався на зворотному боці монет, тепер республіка відкидає такі культи особистості. Якби ми випустили нову монету високої чистоти, ми могли б покращити віру людей у ​​карбування, і, звичайно, всі повинні пам'ятати, хто це зробив."
  republics.5.a: "Відхилити реформу"
  republics.5.b: "Нехай монети будуть випущені"
  republics.6.title: "Іноземні змови?"
  republics.6.desc: "Ширяться дикі чутки про змову нашої знаті з іноземними державами. Істерія зростає, і настрій лякаючий. Народ вимагає, щоб ми вдарили по зрадниках, але мудріші уми кажуть, що ми повинні дозволити традиції республіканського правосуддя йти своїм шляхом."
  republics.6.a: "Захопити їх та їхнє багатство"
  republics.6.b: "Справедливість понад усе"
  republics.7.title: "Розширити охорону"
  republics.7.desc: "Посада [ROOT.GetCountry.GetGovernment.GetRulerTitle] оскаржується ворогами зсередини та ззовні, і тому сильна особиста охорона є важливою для забезпечення того, щоб [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] залишався при владі. Бурхлива політика нашого часу вимагає цього, але є ті, хто засуджує це, стверджуючи, що ця нова тенденція демонструє аристократичні схильності та підриває традиції Республіки."
  republics.7.a: "Зробити це!"
  republics.7.b: "Це порушило б наші республіканські ідеали!"
  republics.8.title: "Запальний проповідник"
  republics.8.desc: "З'явився проповідник, який пророкує кінець усього, що ми знаємо, і новий початок. Проповідник здобув прихильність після нашої нещодавньої війни, але він не прагне до такої республіки, яку ми знаємо. Ми могли б викликати його на випробування вогнем, але це може створити внутрішні проблеми саме тоді, коли нам потрібна єдність."
  republics.8.a: "Дозволити це!"
  republics.8.b: "Випробувати його вогнем!"
  republics.9.title: "Змова знаті"
  republics.9.desc: "Оскільки республіка виглядає крихкою, до нас дійшли чутки, що знать плете змову, аби запровадити спадкоємну владу в нашій великій Республіці."
  republics.9.a: "Це викликає занепокоєння"
  republics.9.b: "Нагадати їм, що стається з ворогами Революції!"
  republics.10.title: "Розкол у Раді"
  republics.10.desc: "Республіка функціонує завдяки узгодженій спільній меті правителів, які, своєю чергою, представляють усталену волю керованих. Наша республіка відвертається від традицій, які зробили нас сильними. Відсутність згуртованості в нашій правлячій раді коштує нам військових втрат."
  republics.10.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  republics.11.title: "Суперечки, що впливають на уряди"
  republics.11.desc: "Республіки успішні, коли важливі родини готові ставити інтереси республіки нарівні зі своїми власними. Наразі наші республіканські традиції перебувають під тиском, і родини ставлять власні інтереси вище інтересів республіки. Це шкодить нашій здатності керувати, оскільки консенсусу важче досягти."
  republics.11.a: "Це погано!"
  republics.12.title: "Торгові війни"
  republics.12.desc: "Ми завжди заохочували здорову конкуренцію між нашими купцями, але водночас вони завжди ставили вищі інтереси республіки на перше місце. Ми працювали разом, щоб забезпечити зміцнення торгівлі республіки проти інтересів суперників. Тепер ця традиція згасає, і купецький клас стає дедалі більш братовбивчим. Це шкодить нашій країні..."
  republics.12.a: "Треба щось робити!"
  republics.13.title: "Церемонію зірвано"
  republics.13.desc: "Однією з основних частин республіки є великі державні церемонії. Це час, коли розбіжності та суперечки між патриціями призупиняються, щоб ми могли продемонструвати нашу єдність мети та показати світові нашу силу. На нещодавній церемонії незадоволені елементи відвернулися від наших традицій, щоб висловити свої розбіжності з правлячою радою."
  republics.13.a: "Далеко не ідеально!"
  republics.14.title: "Фокус на торгівлі"
  republics.14.desc: "Деякі члени нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] вважають, що ми недостатньо зосереджуємося на національній торгівлі. Усім досить зрозуміло, що ми не домінуємо в торгівлі в цій області, але ми, безумовно, могли б мати гірші результати, принаймні так стверджують інші члени. Якщо судити за нашим попереднім досвідом, наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName] навряд чи дійде до будь-якої згоди найближчим часом, якщо хтось не зможе їх переконати."
  republics.14.a: "Нам потрібно більше купців"
  STATIC_MODIFIER_NAME_more_merchants: "Набір купців"
  republics.14.b: "Нам бракує ефективності"
  STATIC_MODIFIER_NAME_efficienct_merchants: "Збільшена ефективність купців"
  republics.15.title: "Розширення торгівлі"
  republics.15.desc: "Обговорення шляхів розширення нашої торгівлі тривають у [ROOT.GetCountry.GetGovernment.GetParliament.GetName] вже деякий час. Ми вже маємо ексклюзивний контроль над місцевим ринком, але багатьох приваблюють можливості заморської торгівлі. Інші переконані, що ризики надто великі, і що більше грошей можна заробити вдома."
  republics.15.a: "Місцева торгівля — ось на чому ми маємо зосередитися"
  republics.15.b: "Можливо, настав час розширити наші горизонти"
  trade_focus: "Торговельний фокус"
  republics.16.title: "Бюджетні розбіжності"
  republics.16.desc: "Наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName], схоже, має значні труднощі з узгодженням того, як керувати нашою нацією, чи то щодо бюджету, податків, портових зборів, чи торговельної та митної політики. Цього разу йдеться про бюджет: чи слід більше грошей інвестувати в дослідження, чи відкласти їх на непередбачені витрати в майбутньому?"
  republics.16.a: "Інвестувати все в дослідження"
  republics.16.b: "Відкласти частину на майбутні витрати"
  republics.17.title: "Розбіжності в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  republics.17.desc: "Наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName] розділений щодо пропозиції створити новий ринок. Більшість із них не бачать жодної логічної причини, чому така видатна торговельна нація, як наша, не повинна мати власного ринку, але, як ми всі знаємо, такі речі коштують недешево і тому вимагають ретельного розгляду."
  republics.17.a: "Спробувати виступити посередником між двома сторонами"
  republics.17.b: "Запропонувати інші зміни"
  republics.18.title: "Хибний фокус"
  republics.18.desc: "Кілька членів нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] переконані, що ми надто багато уваги приділяємо військовим операціям замість того, щоб зосередитися на розширенні нашої торгівлі. Вони скаржаться, що занадто багато інвестицій спрямовується на фінансування нашої армії, але майже нічого — на покращення наших торговельних умов."
  republics.18.a: "Все йде за планом"
  republics.18.b: "Можливо, наш фокус був дещо хибним"
  republics.19.title: "Парламентські проблеми"
  republics.19.desc: "Один із наших радників останнім часом був досить зайнятий, пропонуючи нові зміни одну за одною. Хоча можна стверджувати, що [minister.GetSheHe] лише виконує [minister.GetHerHis] роботу, [minister.GetHerHis] постійне втручання та ставлення «всезнайки» в будь-якій справі, навіть віддалено пов'язаній з політикою, викликає значний розкол у нашому [ROOT.GetCountry.GetGovernment.GetParliament.GetName], є навіть ті, хто вважає, що нам було б краще без [minister.GetName]."
  republics.19.a: "Знайти когось на заміну йому."
  republics.19.b: "Дати раднику ще один шанс"
  republics.20.title: "Гарячі дебати"
  republics.20.desc: "Деякі члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] висловлюють занепокоєння щодо нашої репутації, що дедалі погіршується, стверджуючи, що це негативно впливає на наші торговельні відносини. Це питання порушувалося багато разів у минулому, але не так багато хто вважав його значущим. Однак цього разу це питання викликає справді гарячі дебати, можливо, нам слід спробувати врегулювати ситуацію, перш ніж вона вийде з-під контролю."
  republics.20.a: "Це, мабуть, мудро"
  republics.20.b: "Це не є справжньою проблемою"
  republics.21.title: "Наступ чи Оборона"
  republics.21.desc: "Поточна війна призвела до серйозних конфліктів у [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. З одного боку, є ті, хто стверджує, що немає жодної вигоди від затягування війни, тоді як інші переконані, що шляху назад немає. На жаль, їхня нездатність дійти згоди ніяк не покращує нашу поточну ситуацію, а навпаки."
  republics.21.a: "Наступ, мабуть, єдиний варіант"
  republics.21.b: "Оборона звучить краще на цьому етапі"
  republics.22.title: "Суперечливі думки"
  republics.22.desc: "Здається, завжди є невелика група [ROOT.GetCountry.GetGovernment.GetParliament.GetName], яка не може дійти згоди з іншими. Незалежно від поточного питання, ця конкретна група завжди має іншу думку, ніж усі інші."
  republics.22.a: "Мабуть, найкраще залишити все як є"
  republics.22.b: "Можливо, потрібна деяка реструктуризація"
  republics.23.title: "Інфільтратор у [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  republics.23.desc: "Серед нас шпигун! Якимось чином шпигунові вдалося проникнути в наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName], і раптом усі стали підозрюваними. Ми ще не змогли з'ясувати, хто його надіслав, але оскільки наші відносини з деякими сусідами наразі дещо напружені, це, ймовірно, був хтось із них."
  republics.23.a: "Це неможливо"
  republics.23.b: "Це єдине розумне пояснення"
  republics.24.title: "Зрадник у [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  republics.24.desc: "Здається, що член нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] продавав таємниці нашим ворогам. Як інакше ми могли б пояснити той факт, що вони раптом здатні передбачати кожен наш крок? Це були рішення, які ніколи не обговорювалися за межами будівлі [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  republics.24.a: "Звісно, це був хтось із них"
  opinion_traitor: "Зрадник"
  republics.24.b: "Краще діяти обережно, доки ми не дізнаємося більше"
  republics.25.title: "Політичний хаос"
  republics.25.desc: "Нерішучість нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] та нездатність приймати будь-які рішення створили майже хаос. Кожен член докладає всіх зусиль, щоб його голос був почутий, але відмовляється визнавати думки будь-кого іншого."
  republics.25.a: "Така вже природа політики"
  republics.25.b: "Можливо, необхідна деяка реструктуризація"
  republics.26.title: "Рішення під впливом"
  republics.26.desc: "Нам стало відомо, що певний член нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] приймав хабарі від кількох різних джерел за вплив на всілякі національні рішення."
  republics.26.a: "Це має припинитися"
  republics.26.b: "Це не може бути правдою"
  republics.27.title: "Фінансові розбіжності"
  republics.27.desc: "Наша економіка вже не та, що була раніше. Скарбниця майже порожня, а наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName] не може збагнути, як зарадити ситуації чи які причини її виникнення. Карбування більшої кількості грошей, звісно, завжди є варіантом, як і підвищення податків. У будь-якому разі, вони чекають на наше рішення."
  republics.27.a: "Карбувати більше грошей"
  republics.27.b: "Підвищити податки"
  republics.28.title: "Військові витрати"
  republics.28.desc: "Деякі члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] скаржаться, що ми витрачаємо забагато грошей на нашу армію. Багато з них переконані, що наше виробництво та торгівля постраждають, якщо ми не скоротимо військові витрати."
  republics.28.a: "Що ж, торгівля та виробництво не такі вже й важливі"
  STATIC_MODIFIER_NAME_trade_and_production_cutbacks: "Скорочення торгівлі та виробництва"
  republics.28.b: "Скоротити військові витрати"
  STATIC_MODIFIER_NAME_military_cutbacks: "Військові скорочення"
  republics.29.title: "Сильна армія чи флот?"
  republics.29.desc: "Наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName] розділений щодо нашого військового фокусу, деякі з них виступають за великий флот, тоді як інші більше зацікавлені у великій армії. Хоча якийсь компроміс був би можливий, більшість з них воліла б, щоб ми збільшили розмір нашого флоту."
  republics.29.a: "Великий флот – єдиний варіант"
  republics.29.b: "Велика армія була б вигіднішою"
  republics.30.title: "Військова поблажливість"
  republics.30.desc: "Деякі члени нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] вважають, що ми надто поблажливі, коли йдеться про встановлення контролю над тим, що по праву належить нам. Вони не можуть зрозуміти, як ми можемо дозволити, щоб ключова територія, як-от [SCOPE.sLocation('target').GetName], контролювалася іншою країною, і просто сидіти склавши руки."
  republics.30.a: "Вони не бачать ширшої картини"
  republics.30.b: "Це більше не становить інтересу"
  republics.31.title: "Забагато вольностей"
  republics.31.desc: "Кілька членів нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] вважають, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] останнім часом дозволяє собі забагато вольностей у керуванні нашою нацією. Деякі навіть стверджують, що [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe], схоже, зовсім не поважає ані конституцію, ані решту [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  republics.31.a: "Вони перебільшують"
  republics.31.b: "Вжити відповідних заходів"
  republics.32.title: "Економічні рішення"
  republics.32.desc: "Наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName] постійно шукає різні способи поповнення державної скарбниці, але, як завжди, існують розбіжності щодо найкращої стратегії. Значне підвищення податків значно покращило б стан нашої скарбниці, але також дуже ймовірно обурило б населення, тоді як невелике підвищення, з іншого боку, не покращило б наші фінанси настільки сильно, але й не викликало б стільки протестів."
  republics.32.a: "Короткострокове рішення, ймовірно, найкращий варіант"
  STATIC_MODIFIER_NAME_short_term_boost: "Короткостроковий поштовх"
  republics.32.b: "Врахувати довгострокові наслідки"
  STATIC_MODIFIER_NAME_long_term_boost: "Довгостроковий поштовх"
  republics.33.title: "Військові витрати"
  republics.33.desc: "Деякі члени нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] скаржаться, що витрати на утримання такої великої армії занадто великі для нашого поточного бюджету."
  republics.33.a: "Переконати їх, що ми можемо собі це дозволити"
  republics.33.b: "Погодитися на деякі скорочення"
  republics.34.title: "Непопулярність серед еліти"
  republics.34.desc: "Попри найкращі наміри [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis], наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] бачить [ROOT.GetCountry.GetGovernment.GetRuler.GetHerselfHimself] наодинці перед вкрай незадоволеними членами [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]. Очевидно, що дії [ROOT.GetCountry.GetGovernment.GetRuler.GetName] створили [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHim] могутніх ворогів у державі. Єдиний спосіб запобігти повстанню — це відмовитися від посади [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName]."
  republics.34.a: "Відмовитися від посади."
  republics.34.b: "Зустріти повстання."
  upset_nobles_pretender: "Повстання претендента"
  upset_nobles_pretender_tt: "Усі [ShowPopTypeName('nobles')] у [ROOT.GetCountry.GetCapital.GetArea.GetName] приєднаються до [upset_nobles_pretender.GetName]"
  STATIC_MODIFIER_NAME_decreased_military_funding: "Зменшене військове фінансування"
  republics.36.title: "Напрямки досліджень"
  republics.36.desc: "Кожен член нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] вимагає більше грошей для інвестування в різні сфери. Наша армія потребує фінансування, але так само і наша торгівля та виробництво, і не забуваймо про наш флот."
  republics.36.a: "Рівномірний розподіл має спрацювати"
  republics.36.b: "Немає потреби в додаткових інвестиціях"
  republics.37.title: "Брак підтримки"
  republics.37.desc: "Деякі члени нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] вважають, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] обіймав свою посаду достатньо довго і виступають за нові вибори. Очевидно, причина цього полягає в розбіжності, яку вони мали з [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHim] нещодавно щодо впровадження нової фінансової реформи."
  republics.37.a: "Ігнорувати їх"
  republics.37.b: "Погодитися вислухати їх ще раз"
  republics.39.title: "Проблемний [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  republics.39.desc: "Наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName], схоже, має деякі труднощі з розумінням того, хто керує нашим урядом. Вони, здається, вважають цілком прийнятним приймати рішення, не інформуючи нас або не обговорюючи це питання з нами спочатку. Що ж дало їм таку ідею?"
  republics.39.a: "Зробити це їм трохи зрозумілішим"
  republics.39.b: "Дозволити їм думати, що вони мають право голосу"
  republics.41.title: "Розтрата"
  republics.41.desc: "Нам стає все більш зрозуміло, що не так багато членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName], яким ми можемо справді довіряти. Один з наших найближчих радників щойно був викритий у крадіжці грошей з державної скарбниці."
  republics.41.a: "Ймовірно, цьому є добре пояснення"
  republics.41.b: "Позбутися їх"