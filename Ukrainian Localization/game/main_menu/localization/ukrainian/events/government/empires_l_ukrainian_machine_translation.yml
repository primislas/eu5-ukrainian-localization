l_english:
  empires.1.title: "Загрози для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]"
  empires.1.desc: "Як і більшість династій, наша нація перебуває під постійними нападами іноземних суперників, які заявляють свої права на нашу [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Знедолений браком фінансових ресурсів, [target_ruler.GetName] отримав пораду шукати дипломатичних переговорів, інакше зіткнеться з можливим кінцем нашого [ROOT.GetCountry.GetFlavorRank]."
  empires.1.a: "Дати останній бій"
  empires.1.b: "Шукати дипломатичного компромісу"
  empires.2.title: "Національна фрагментація"
  empires.2.desc: "Хоча [ROOT.GetCountry.GetName] охоплює величезну територію, політично це досить роздроблена нація. Влада [ROOT.GetCountry.GetGovernment.GetFullRulerName] над імперією була суворо обмежена різними місцевими правителями, і [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] стикається зі зростаючими труднощами в управлінні великою імперією. Різноманітне поєднання культурних груп з різними цінностями та переконаннями призвело до конфліктів, що виникають через найнезначніші питання."
  empires.2.a: "Посилити зусилля з централізації"
  empires.2.b: "Залишити як є"
  empires.3.title: "Реформи [target_minister.GetNameWithNoTooltip]"
  empires.3.desc: "Управління такою великою імперією, як [ROOT.GetCountry.GetName], вимагає широкого економічного планування, і відсутність хорошого фінансового радника досі виявлялася досить катастрофічною. Однак призначення [target_minister.GetName] до нашого кабінету допомогло змінити ситуацію. [target_minister.GetSheHe|U] запровадив низку фінансових реформ, включаючи більш справедливу податкову систему та план фінансування державного боргу."
  empires.3.a: "Впровадити план фінансування державного боргу."
  empires.3.b: "Впровадити податкову реформу."
  empires.4.title: "Часи процвітання"
  empires.4.desc: "[target_location.GetName] прославився художніми досягненнями нашої країни та квітучою економікою. Художники, філософи та поети стікаються до [target_location.GetNameWithNoTooltip], а процвітаюча економіка дозволила значне фінансування мистецтва. Зводяться кілька вишуканих архітектурних будівель та будуються прекрасні сади, щоб продемонструвати багатство нашої країни, і багато членів нашої нової інтелектуальної еліти мають ідеї щодо покращення різних частин нашої країни."
  empires.4.a: "Інвестувати в кращу міську інфраструктуру."
  empires.4.b: "Інвестувати в кращу сільську інфраструктуру."
  empires.4.c: "Інвестувати в кращі методи виробництва."
  empires.5.title: "Правління [target_character.GetNameWithNoTooltip]"
  empires.5.desc: "[target_country.GetLongName] переживає золотий вік під правлінням [target_character.GetName]. Навички [target_character.GetHerHis|U] виявилися більш ніж чудовими, оскільки стабільність, престиж та безпека відзначають [target_country.GetAdjectiveWithNoTooltip] державу. Економіка демонструє висхідну тенденцію; [target_country.GetCulture.GetName] мистецтво та культура процвітають у [target_country.GetGovernment.GetCourtTitle].\n\nНаш народ спорудив статуї на честь правління [target_character.GetShortNameWithNoTooltip] і назвав [target_character.GetHerHim] '$nick_the_great$'."
  empires.5.a: "Хай живе [target_character.GetShortNameWithNoTooltip] $nick_the_great$!"