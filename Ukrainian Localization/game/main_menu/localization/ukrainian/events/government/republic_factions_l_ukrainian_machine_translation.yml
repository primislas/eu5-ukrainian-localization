l_english:
  republic_factions.1.title: "Обмеження гільдій на [target_goods.GetNameWithNoTooltip]"
  republic_factions.1.desc: "Торгівля [target_goods.GetName] у [target_location.GetName] спричинила конфлікт у [ROOT.GetCountry.GetName]. Купці, які прагнуть вільної руки у купівлі та продажу цих товарів, вважають, що гільдії, які контролюють їхнє виробництво, стали надто могутніми. На їхню думку, це тепер не що інше, як картель, що завдає шкоди економіці.\n\nКерівники гільдій, з іншого боку, стверджують, що їхня організація робить виробництво [target_goods.GetNameWithNoTooltip] ефективнішим. На чий би бік ми не стали, ті, хто противиться нашій політиці, ймовірно, постраждають або навіть саботуватимуть власну діяльність, щоб довести свою точку зору."
  republic_factions.1.a: "Ми повинні працювати над статутами, щоб послабити цей картель."
  republic_factions.1.a.tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втрачає [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  republic_factions.1.b: "Сильна гільдія необхідна для забезпечення якості."
  republic_factions.2.title: "Гільдії наполягають на меркантилістських реформах"
  republic_factions.2.desc: "Меркантилістська економічна теорія останнім часом стала модною серед впливових членів гільдій. Вони, звичайно, добре обізнані в цих питаннях... і також, за збігом обставин, ймовірно, отримають вигоду від політики, яку вони підтримують.\n\nІнші навряд чи отримають вигоду. Могутні торговці, що працюють на міжнародному рівні, стверджують, що ці теорії є глухим кутом, і будуть боротися до останнього, щоб запобігти їхньому прийняттю [ROOT.GetCountry.GetFlavorRank]. За підтримки гільдій їх, можливо, вдасться впровадити, але не без політичних потрясінь."
  republic_factions.2.a: "Ми не можемо дозволити собі досліджувати глухі кути."
  republic_factions.2.b: "Меркантилізм – це майбутнє, знають про це торговці чи ні."
  republic_factions.3.title: "Купці закликають до збільшення імпорту"
  republic_factions.3.desc: "Вплив могутньої гільдії призвів до зростання цін на [target_goods.GetName] у [ROOT.GetCountry.GetName]. Дійшло до того, що торговці вважають дешевше імпортувати товари з-за кордону, щоб конкурувати з місцевими цінами, що, за їхніми словами, стає все складніше через чинне [ROOT.GetCountry.GetAdjectiveWithNoTooltip] законодавство щодо імпорту.\n\nПослаблення митних правил дало б нашим купцям шанс укласти вигідні угоди там, де виробляється [target_goods.GetNameWithNoTooltip], але гільдії, які категорично проти цього, також служать своїй меті."
  republic_factions.3.a: "Нашою головною турботою має бути ефективна торгівля."
  republic_factions.3.b: "Ми не підемо на поступки, які можуть зашкодити гільдіям."
  republic_factions.3.c: "Необхідні радикальні зміни."
  allowed_imports: "Дозволений імпорт"
  republic_factions.4.title: "Керівники гільдій конкурують зі статусом [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  republic_factions.4.desc: "У [ROOT.GetCountry.GetName] присутність гільдій породила новий вид впливу та новий вид впливових людей. Провідні діячі [ROOT.GetCountry.GetAdjectiveWithNoTooltip] гільдій не тільки стають багатшими за багатьох аристократів, але й володіють владою, при цьому їм бракує родинних зв'язків, які довгий час визначали правителів [ROOT.GetCountry.GetFlavorRank].\n\nМожливо, такий зсув неминучий, особливо враховуючи природу нашого [ROOT.GetCountry.GetFlavorRank]. Проте на цьому етапі єдине, що є певним, це те, що [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у [ROOT.GetCountry.GetNameWithNoTooltip] відчувають відразу до цих невихованих нових багатіїв і хотіли б бачити їх вигнаними з місцевих політичних процесів."
  republic_factions.4.a: "Гроші є гроші, нові чи старі."
  republic_factions.4.b: "Скільки б вони не платили, владу не купиш."
  republic_factions.5.title: "Таємні товариства в уряді"
  republic_factions.5.desc: "Повний обсяг діяльності гільдії відомий лише її членам. Оскільки гільдії існують частково для управління знаннями, це неминуче, але також призводить до звинувачень у змовах. Досі ми мало звертали уваги на ці ідеї, вважаючи їх параноїдальними мареннями.\n\nОднак у [ROOT.GetCountry.GetGovernment.GetCourtTitle] ширяться чутки про те, хто може або не може бути частиною таємних гільдій в уряді [ROOT.GetCountry.GetName], і деякі серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] помітно стурбовані... настільки багато, що їхня власна сторона більше схожа на змову, ніж ті, кого вони звинувачують. Проте немає сумнівів, що аристократи [ROOT.GetCountry.GetNameWithNoTooltip] відчувають загрозу від цих можливих таємних товариств, які породили гільдії."
  republic_factions.5.a: "Можливо, ці змови змусять політиків нарешті домовитися."
  republic_factions.5.a.tt: "Залишити можливий вплив таємних гільдій без уваги наразі, що може мати наслідки пізніше"
  republic_factions.5.b: "Добре. Нехай ті, хто відомий своєю лояльністю, розслідують це."
  republic_factions.6.title: "Гільдія понад країну"
  republic_factions.6.desc: "Коли аристократи попереджали нас про таємні товариства, які нібито проникли в [ROOT.GetCountry.GetAdjective] політику, ми вирішили не слухати. Вони пророкували, що ми цілком можемо поплатитися життям, коли ця змова обернеться проти нас.\n\nНічого настільки драматичного не сталося, але один з наших близьких радників, [target_advisor.GetName], останнім часом приймав дуже сумнівні рішення і зрештою визнав, що це були послуги «таємному» товариству, частиною якого [target_advisor.GetSheHe] дійсно є. Інші політики обурені цим, і на цьому етапі скандалу не уникнути."
  republic_factions.6.a: "Їхня нелояльність до [ROOT.GetCountry.GetNameWithNoTooltip] має бути покарана."
  republic_factions.6.b: "Спробувати розрядити ситуацію."
  republic_factions.6.c: "Таємне товариство? Як до нього приєднатися?"
  republic_factions.7.title: "Міжнародні гільдійські контакти"
  republic_factions.7.desc: "Деякі з наших дипломатичних посланців, що мають міцні зв'язки з вітчизняною гільдією, були звинувачені деякими старшими послами в укладанні угод з гільдією за кордоном. Хоча наші гільдії визнають використання наших дипломатів, пов'язаних з ними, для встановлення контактів з іноземними гільдіями за кордоном, вони заперечують звинувачення в компрометації наших політичних місій. З іншого боку, вони кажуть, що відкриті до ідеї спробувати використати ці зв'язки за кордоном на нашу користь.\n\nСтара гвардія аристократичних дипломатів вважає цю практику вкрай сумнівною, але використання зв'язків між гільдіями може дати нам перевагу в таємних операціях."
  republic_factions.7.a: "Ми побачимо, чиї члени гільдії виявлять найбільшу лояльність до своєї країни."
  republic_factions.7.b: "Призупинити їхню службу, доки ми не розберемося."
  republic_factions.8.title: "Шляхетна спадщина [ROOT.GetCountry.GetNameWithNoTooltip]"
  republic_factions.8.desc: "Наша [ROOT.GetCountry.GetGovernment.GetAdjective] нація відмовилася від багатьох старих уявлень про шляхетність та феодальне правління, але іноді, коли вони нам корисні, ми готові переглянути їх ситуативно. Така ситуація виникла в [target_location.GetName], де місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] стверджують, що земля одразу за нашим кордоном у [target_province.GetName] насправді є частиною законного домену їхньої родини.\n\nМісцеві купці подали петицію проти цієї претензії, щойно домовившись про велику торговельну угоду з [target_country.GetName]. Для будь-якого [ROOT.GetCountry.GetFlavorRank], стверджують вони, торгівля має бути першочерговою турботою – претензії [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] ведуть лише до війни та злиднів."
  republic_factions.8.a: "Війна, можливо, але хто говорив про злидні?"
  republic_factions.8.b: "Вони мають рацію. Ми повинні залишити ці дрібні чвари позаду."
  republic_factions.9.title: "Кандидати змагаються за можливості"
  republic_factions.9.desc: "Як будь-який [ROOT.GetCountry.GetFlavorRank], ми прагнемо знайти баланс між економічними інтересами та традиціями. Тому ми відповідно обираємо наших радників, дотримуючись таких принципів. Родини, які це знають, як патриції, так і аристократи, намагаються планувати наперед і розміщувати своїх представників на вигідних посадах, перш ніж вони прагнуть отримати місце безпосередньо при [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nНещодавно відкрилася посада, що пропонує такі можливості, і тепер різні сторони тиснуть на нас. Угодити всім неможливо, і когось потрібно призначити найближчим часом."
  republic_factions.9.a: "Хтось досвідчений у військових справах був би корисним."
  republic_factions.9.b: "Комерція понад усе в [ROOT.GetCountry.GetLongNameWithNoTooltip]."
  republic_factions.10.title: "Торгівля між суперниками"
  republic_factions.10.desc: "Ми відкриті для бізнесу з усіма... доки ми можемо його контролювати. Який бізнес ми можемо, а який не можемо контролювати, є предметом дискусій, і, як більшість питань, відкритих для обговорення в нашому [ROOT.GetCountry.GetFlavorRank], це стало предметом суперечок. Купці почали торгувати на дружніх умовах з нашим суперником, [target_rival.GetName], стверджуючи, що це необхідно, незважаючи на політичні розбіжності. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вважають це сумнівним і закликають до негайного припинення обмінів."
  republic_factions.10.a: "Ми не можемо дозволити собі порушити комерцію."
  republic_factions.10.b: "Ми можемо дозволити собі розірвати зв'язки з цими свинями."
  enemy_allowed_trade: "Дозволена торгівля між суперниками"
  republic_factions.11.title: "[target_country.GetNameWithNoTooltip] відкрита для торгівлі"
  republic_factions.11.desc: "Незважаючи на їхню відкриту ненависть до нас і всього, за що ми стоїмо, [target_country.GetLongName] дозволили своїм торговцям можливість укладати з нами угоди. Це надало їхнім купцям вплив на наших ринках, але комерція працює в обидва боки."
  republic_factions.11.a: "Їм варто частіше довіряти нам у цьому."
  republic_factions.12.title: "Пропозиція від [target_character.GetNameWithNoTooltip]"
  republic_factions.12.desc: "[target_estate.GetName] у [ROOT.GetCountry.GetName] перехитрили своїх конкурентів на політичній арені, вирвавши контроль над [ROOT.GetCountry.GetAdjectiveWithNoTooltip] урядом, але їхня влада далеко не беззаперечна.\n\n[target_character.GetName], шанований [ROOT.GetCountry.GetFlavorRank] за [target_character.GetHerHis] вірність та службу країні, звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle] з вирішенням цієї проблеми. За [target_character.GetHerHim] словами, зміна влади зараз може звести нанівець усе, над чим мудро працювали [target_estate.GetNameWithNoTooltip]. Вони довіряють мудрості [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ROOT.GetCountry.GetGovernment.GetAdjective] уряду, але якщо потрібен додатковий стимул, у них є кошти для політичних пожертв..."
  republic_factions.12.a: "[target_character.GetSheHe] пропонує хабар?"
  republic_factions.12.b: "Вірність та щедрість [target_estate.GetNameWithNoTooltip] цінується."
  republic_factions.13.title: "Внутрішнє коло"
  republic_factions.13.desc: "[target_ruler.GetName] намагався підтримувати відносну нейтральність до гільдій як [ROOT.GetCountry.GetGovernment.GetRulerTitle], особливо з огляду на те, що вони нещодавно дещо втратили прихильність у [ROOT.GetCountry.GetName]. [target_ruler.GetSheHe|U] не є членом жодної гільдії, і в нинішньому політичному кліматі це було б недоречно для [target_ruler.GetHerHim]. Проте ця ситуація може змінитися. Найвидатніша гільдія [ROOT.GetCountry.GetFlavorRank] запропонувала [target_ruler.GetHimHerFormal] членство, навіть пообіцявши зберігати це в таємниці стільки, скільки буде потрібно. Досить смілива пропозиція, хоча відмова все одно зіпсує наші стосунки з гільдією."
  republic_factions.13.a: "Вірність [ROOT.GetCountry.GetGovernment.GetRulerTitle] належить [ROOT.GetCountry.GetFlavorRank]."
  republic_factions.13.b: "[target_ruler.GetNameWithNoTooltip] може зберегти таємницю, якщо зможе."
  republic_factions.14.title: "Вигідна угода"
  republic_factions.14.desc: "У [ROOT.GetCountry.GetName] бізнес і політика нерозривно переплелися з незапам'ятних часів. Іноді ми можемо стикатися з угодами, які приносять користь багатьом сторонам, але не самому [ROOT.GetCountry.GetFlavorRank]. Коли [target_ruler.GetName] є однією з цих сторін, ситуація стає ще більш небезпечною.\n\nХороша ділова угода будує міцніші стосунки з ключовими торговцями, що нам, безумовно, знадобиться. Ми можемо уникнути відчуження цих партнерів, якщо готові пожертвувати частиною нашої цілісності як представника [ROOT.GetCountry.GetFlavorRank]."
  republic_factions.14.a: "Цілісність вартує більше в довгостроковій перспективі."
  republic_factions.14.b: "Ми не можемо жертвувати особистими інтересами."
  republic_factions.15.title: "Кров густіша за воду"
  republic_factions.15.desc: "Для багатьох впливових людей у [ROOT.GetCountry.GetName] контакти чи багатство визначають статус, але [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] все ще високо цінують кровні зв'язки. Хоча вони зараз не є наймогутнішою фракцією в нашій республіці, вони все ще використовують ті ж методи для забезпечення лояльності.\n\nНедавній запит від деяких членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] щодо отримання прихильності в [ROOT.GetCountry.GetGovernment.GetCourtTitle] є явно такою спробою. Це змусить нас спрямувати політику ближче до їхньої лінії та послабить [ROOT.GetCountry.GetFlavorRank], але відмова зробить ще складнішим змусити їх підтримати наші заплановані дії."
  republic_factions.15.a: "Відмовити якомога ввічливіше."
  republic_factions.15.b: "Нам потрібно підтримувати тісні зв'язки з ними."
  republic_factions.16.title: "Гільдії у співпраці"
  republic_factions.16.desc: "Відтоді, як [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] стали домінуючою силою не лише в [ROOT.GetCountry.GetAdjective] бізнесі, а й у політиці, гільдії все частіше бачать силу у співпраці. Організації, які інакше могли б вважати одна одну суперниками, тепер ефективно працюють разом, щоб підтримувати владу в управлінні нацією. Як щасливий побічний ефект цього, їхній контроль над якістю та торгівлею [ROOT.GetCountry.GetAdjectiveWithNoTooltip] товарів став менш вузьким і більш широким та ефективним."
  republic_factions.16.a: "Якби ж вони могли бути такими розсудливими, коли їм не так щастить..."
  republic_factions.17.title: "Торговці дивляться за кордон"
  republic_factions.17.desc: "Вирвавши контроль над [ROOT.GetCountry.GetLongName], наші купці тепер прагнуть вирвати контроль над світовою торгівлею. Їхнє домінування в політичних справах у [ROOT.GetCountry.GetNameWithNoTooltip] зменшило їхні внутрішні турботи та заохотило їх до ризиків, які були б немислимими, якби їм довелося турбуватися про те, що їхні рішення будуть скасовані вдома. Зрештою, це може принести користь не лише їм, а й самому [ROOT.GetCountry.GetFlavorRank]."
  republic_factions.17.a: "Нехай вони принесуть нам багатство світу."
  republic_factions.18.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] відкладають розбіжності"
  republic_factions.18.desc: "Відтоді, як [ROOT.GetCountry.GetName] почала служити [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], вони почали служити [ROOT.GetCountry.GetFlavorRank] у відповідь. Колись боячись, що їх вважають пережитком старих форм правління, вони усвідомили, що можуть зберігати владу, доки готові працювати разом. Хоча це може поставити їх у протиріччя з іншими [ROOT.GetCountry.GetAdjectiveWithNoTooltip] політичними силами, це допомогло приборкати амбіції щодо повалення [ROOT.GetCountry.GetFlavorRank] і допомогло їм набагато ефективніше організувати свої зусилля."
  republic_factions.18.a: "Наш великий [ROOT.GetCountry.GetFlavorRank] об'єднує навіть старі родини!"
  republic_factions.19.title: "Гільдії перешкоджають торгівлі"
  republic_factions.19.desc: "Гільдійські лідери можуть бути безжальними маніпуляторами влади і не терплять політичної опозиції. Оскільки гільдії деякий час не мали прихильності уряду [ROOT.GetCountry.GetName], деякі з них почали використовувати більш залякуючі методи, щоб показати свій вплив. Знаючи, що [ROOT.GetCountry.GetFlavorRank] залежить від торгівлі, гільдії почали перешкоджати вільній торгівлі, свідомо шкодячи національній економіці та справам своїх політичних опонентів."
  republic_factions.19.a: "Чи думають вони, що таким чином здобудуть прихильність країни?"
  republic_factions.19.b: "Надайте їм деякі поступки."
  republic_factions.20.title: "Торговці відмовляються служити"
  republic_factions.20.desc: "Незважаючи на беззаперечну відданість [ROOT.GetCountry.GetName] торгівлі, багато її найвидатніших торговців тепер стверджують, що [ROOT.GetCountry.GetGovernment.GetCourtTitle] відмовляється їх слухати і ставить інші інтереси вище тих, що зробили нашу країну багатою. Деякі з купців, на яких ми покладаємося в нашій міжнародній торгівлі, погрожують повністю припинити співпрацю з [ROOT.GetCountry.GetFlavorRank]. Хоча ми впевнені, що зрештою дійдемо згоди, це завадить нашій співпраці, перш ніж ситуація владнається."
  republic_factions.20.a: "Чого вони планують досягти цим?"
  uncooperative_trader: "Неспівпрацюючий торговець"
  republic_factions.21.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] відкидають [ROOT.GetCountry.GetFlavorRank]"
  republic_factions.21.desc: "Багато в чому наш [ROOT.GetCountry.GetFlavorRank] був надзвичайно ефективним у відбиранні влади у аристократичних правителів, які зазвичай вважають її своєю належністю. Вони визнають, що не можуть претендувати на неї як на своє право, як це було б у багатьох інших націях. Однак бувають часи, коли ці старі ідеї аристократичної слави відроджуються, оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ROOT.GetCountry.GetName] відчувають, що не можуть впливати на її політику жодним іншим значущим способом, окрім як мечем. Відповідно, меч — це те, що вони готові взяти в руки, у відкритому повстанні проти республіки."
  republic_factions.21.a: "Якщо вони хочуть влади, навчіть їх боротися пером!"
  republic_factions.21.b: "Спробуйте досягти з ними порозуміння."
  republic_factions.22.title: "Закон про сім'ю"
  republic_factions.22.desc: "Аристократи [ROOT.GetCountry.GetName] просувають законодавство, відоме як Закон про сім'ю, намагаючись запобігти розбещенню невинних умів спотвореними п'єсами та романами, виверженими 'лібертинськими' авторами останніх років. Головним обуренням, що стоїть за ініціативою Закону про сім'ю, є непристойна п'єса, сімейний акт, що подорожує країною і сатиризує надмірності [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Принижені та обурені, жертви його глузування тепер вимагають, щоб [ROOT.GetCountry.GetFlavorRank] запобіг його подальшому поширенню."
  republic_factions.22.a: "Цікаво. Як вони називають такий акт?"
  republic_factions.22.b: "Свобода не існує для служіння непристойності!"
  republic_factions.22.c: "Можливо, нам слід переосмислити, що ми дозволяємо їм робити."
  republic_factions.23.title: "Заворушення в [ROOT.GetCountry.GetNameWithNoTooltip]"
  republic_factions.23.desc_burghers: "Вже деякий час [ROOT.GetCountry.GetFlavorRank] спостерігає посилення контролю [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] на [ROOT.GetCountry.GetAdjective] політичній арені. Спираючись на велику кількість учнів, дрібних крамарів та ремісників, ця фракція змогла конфіскувати значну владу в уряді та монополізувати посади в адміністрації.\n\nЗамість того, щоб ризикувати тривалою маргіналізацією, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] почали вживати заходів для забезпечення своєї влади та багатства над населенням. Це швидко перетворилося на гноблення та невдоволення простого люду. Досі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] ігнорували кризу, що розвивалася, оскільки бідні люди, які просили позики на купівлю їжі, здавалися можливістю для значних прибутків. Так було, доки вони не почали збиратися на Головній площі [target_capital.GetName], біля підніжжя палацу [ROOT.GetCountry.GetGovernment.GetRulerTitle], дійшовши до того, що зарізали десяток охоронців, які наказали їм розійтися."
  republic_factions.23.desc_nobles: "Використовуючи всі доступні засоби тиску, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ROOT.GetCountry.GetName] вдалося захопити контроль над владою в нашому [ROOT.GetCountry.GetFlavorRank]. Сини могутніх аристократичних родин парадують вулицями, а також у палацах [target_capital.GetName]. На цьому етапі їхні суперники ніколи не могли сподіватися знайти законний спосіб відновити втрачений вплив.\n\nОднак є й інші шляхи. Використовуючи свою спільну ненависть до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та їхніх зловживань, [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] збирають підтримку простого люду і вже почали роздавати їм хліб та зброю. Незабаром обурені натовпи збираються біля палацу [ROOT.GetCountry.GetGovernment.GetRulerTitle], і перша атака міської міліції призвела до великих втрат крові та життів, перш ніж натовп зміг жорстоко помститися, взявши в облогу [ROOT.GetCountry.GetGovernment.GetAdjective] резиденцію."
  republic_factions.23.a: "Ми не можемо дозволити масам занурити [ROOT.GetCountry.GetFlavorRank] в анархію."
  republic_factions.23.b: "Піддайтеся їхнім вимогам."