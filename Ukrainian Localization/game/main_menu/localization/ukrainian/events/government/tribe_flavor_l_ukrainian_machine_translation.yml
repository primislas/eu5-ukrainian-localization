l_english:
  tribe_flavor.3.title: "Неортодоксальна тактика"
  tribe_flavor.3.desc: "З роками ми навчилися захищатися від зовнішніх загроз. Наш підхід до проблем може бути не найпривабливішим і не найприйнятнішим, але ніхто не може заперечити його ефективність. Знову ми у стані війни, і наш ворог силою засвоїть урок, який ми для них маємо."
  tribe_flavor.3.a: "Вони не застануть нас зненацька."
  STATIC_MODIFIER_NAME_defensive_stance: "Оборонна позиція"
  STATIC_MODIFIER_DESC_defensive_stance: "Завдяки вмілому поєднанню хитрощів та тактики наскоків і відступів ми можемо стримувати наших ворогів."
  tribe_flavor.4.title: "Підтримання миру"
  tribe_flavor.4.desc: "Закони важливі для підтримання миру серед членів нашого племені. Якщо чиниш зло, мусиш за нього заплатити. Якщо чиниш добро, мусиш бути винагороджений. Добробут племені залежить від поваги до цих законів."
  tribe_flavor.4.a: "Предки спостерігають."
  STATIC_MODIFIER_NAME_peace_kept: "Мир збережено"
  STATIC_MODIFIER_DESC_peace_kept: "Мир було збережено серед нашого народу, і ми насолоджуємося його плодами по всій нашій землі."
  tribe_flavor.5.title: "Неповага до предків"
  tribe_flavor.5.desc: "Контакти з нашими сусідами принесли нові ідеї, які не всіма приймаються. Серед нашого народу зросло невдоволення, і Шаман виступив проти цих ідей, що суперечать нашим традиціям та нашій позиції щодо них."
  tribe_flavor.5.a: "Ми мусимо повернутися на правильний шлях."
  STATIC_MODIFIER_NAME_disrespecting_the_ancestors: "Неповага до предків"
  STATIC_MODIFIER_DESC_disrespecting_the_ancestors: "Шаман незадоволений шляхом, який ми обрали для нашого народу."
  tribe_flavor.6.title: "Великий воїн"
  tribe_flavor.6.desc: "Серед наших лав з'явився природжений лідер. Воїн, що може вселити мужність у серця наших чоловіків і жах у серця наших ворогів. Лише дурень тримав би його подалі від керівництва."
  tribe_flavor.6.a: "Наші бійці будуть непереможними під його проводом."
  tribe_flavor.7.title: "Надмірна самовпевненість серед наших лав"
  tribe_flavor.7.desc: "Високий бойовий дух наших військ поза сумнівом. Але це не завжди добре. Наші чоловіки тепер сміливіші в бою, що приносить нам велику славу, але вони також стають безрозсудними."
  tribe_flavor.7.a: "Ми повинні бути обережнішими."
  STATIC_MODIFIER_NAME_overconfidence: "Надмірна самовпевненість"
  STATIC_MODIFIER_DESC_overconfidence: "Бойовий дух наших воїнів настільки високий, що вони кидаються прямо на ворога, це палиця з двома кінцями."
  STATIC_MODIFIER_NAME_foreign_veterans: "Іноземні ветерани"
  STATIC_MODIFIER_DESC_foreign_veterans: "Хоча й не найдисциплінованіші, іноземні ветерани прийшли на допомогу у військових зусиллях, приносячи з собою досвід і тактику далеких конфліктів."
  tribe_flavor.8.title: "Невгамовний вогонь"
  tribe_flavor.8.desc: "Наші люди періодично спалюють землю, щоб покликати духів землі назад, аби вони знову оживили її після того, як ми інтенсивно її використовували. Це дуже традиційна річ, яка зазвичай проходить добре. Цього разу, однак, вогонь залишився без нагляду і розрісся до такої міри, що його вже неможливо контролювати. Замість того, щоб повернути багатство, схоже, він забере його у нас."
  tribe_flavor.8.a: "Що ми накоїли?"
  tribe_flavor.9.title: "Танець на лезі ножа"
  tribe_flavor.9.desc: "Контакт із нашими сусідами приносить нам нові ідеї та продукти, але також показує, наскільки ми відрізняємося від них. Ми знаємо, як поводитися зі своїм племенем, але не знаємо, як поводитися з чужинцями. Чи сподобаються їм наші традиції? Наші слова? Наш вигляд?"
  tribe_flavor.9.a: "Чим це закінчиться?"
  dancing_on_the_knife_good: "Танець на лезі ножа"
  dancing_on_the_knife_bad: "Танець на лезі ножа"
  tribe_flavor.11.title: "Нові ідеї не для всіх"
  tribe_flavor.11.desc: "Традиції та чужоземні ідеї не завжди добре уживаються. Деякі люди відчувають, що ми віддаляємося від нашої культури, приймаючи ці нові ідеї. Але ми так багато отримуємо від них..."
  tribe_flavor.11.a: "Вони не розуміють."