l_english:
  parliaments.1.title: "[target_city.GetRank.GetNameWithNoTooltip] Вимагає Місце в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  parliaments.1.desc: "[target_city.GetRank.GetName] [target_city.GetName] розбагатів і процвітає, а люди там розчаровані, що їх не обрали місцем засідань поточного [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Представники [target_city.GetNameWithNoTooltip] вимагають від нас компенсації та гарантій, що забезпечать їхні інтереси в майбутньому. Вони погрожують піти, якщо їхні вимоги не будуть задоволені."
  parliaments.1.a: "Задовольнити їх!"
  parliaments.1.b: "Відмовити їм!"
  parliaments.2.title: "Гнилі Округи"
  parliaments.2.desc: "Завдяки своєму важливому становищу в [ROOT.GetCountry.GetGovernment.GetParliament.GetName], [target_location.GetName] може похвалитися значним впливом на політику нашої країни. Однак громадяни [envious.GetName] почуваються недопредставленими в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Люди [envious.GetNameWithNoTooltip] бажають мати власне [ShowBuildingTypeName('urban_parliament_seat')] з усіма правами, що до нього додаються. Хоча їхня вимога сама по собі здається розумною, вона також передбачає скасування місця [target_location.GetNameWithNoTooltip], що наш [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] безсумнівно сприйме як тяжку образу."
  parliaments.2.a: "Справедливо чи ні, але це місце є правом [target_location.GetNameWithNoTooltip]!"
  parliaments.2.b: "Ми повинні перепризначити місце."
  parliaments.3.desc_generic: "Окрім того, що [target_location.GetName] є важливим членом [ROOT.GetCountry.GetGovernment.GetParliament.GetName], [target_location.GetName] також є центром низки впливових підприємств, зацікавлених у заморській торгівлі."
  parliaments.3.title: "Економічна Могутність [target_location.GetNameWithNoTooltip]"
  parliaments.3.desc: "$parliaments.3.desc_generic$ Здається, багато з цих підприємств вирішили, що вони не отримають вигоди від впровадження пропозиції, що обговорюється, і чинили тиск на своїх членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName], щоб послабити пропозицію."
  parliaments.3.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  parliaments.3.b: "Якщо вони хочуть грошей, то вони можуть їх отримати."
  parliaments.4.title: "Підкуп Голосування"
  parliaments.4.desc: "Члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] від гнилих округів у [target_location.GetName] вирішили виступити проти нашої пропозиції в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Здається, землевласника, який контролює цю територію, переконали, що пропозиція не відповідає його інтересам."
  parliaments.4.a: "Погана вдача!"
  parliaments.4.b: "Тоді ми повинні підкупити землевласника."
  parliaments.5.title: "[target_location.GetNameWithNoTooltip] Перемагає в Дебатах"
  parliaments.5.desc: "Впливовий [ShowBuildingTypeName('university')] [target_location.GetName] зумів схилити членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName] [ROOT.GetCountry.GetName] виступити за збільшення фінансування [ShowBuildingTypeNameWithNoTooltip('university')]."
  parliaments.5.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  parliaments.5.b: "Вони повинні зосередитися виключно на своїх дослідженнях."
  parliaments.6.desc: "$parliaments.3.desc_generic$ Здається, багато з цих підприємств вирішили, що вони отримають вигоду від впровадження пропозиції, що обговорюється, і чинили тиск на своїх членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName], щоб вона пройшла."
  parliaments.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  parliaments.7.title: "Військова Підтримка в [target_location.GetNameWithNoTooltip]"
  parliaments.7.desc: "Армія багато в чому є найвпливовішою внутрішньою силою в [target_location.GetName], а члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName], які походять з цієї впливової організації та лояльні до неї, були переконані проголосувати за поточну пропозицію."
  parliaments.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  parliaments.7.b: "Їхньої підтримки нам достатньо."
  parliaments.8.title: "Вплив [target_location.GetNameWithNoTooltip]"
  parliaments.8.desc: "Поточні дебати в [ROOT.GetCountry.GetGovernment.GetParliament.GetName] щодо того, як найкраще захистити вітчизняне виробництво, привернули увагу багатьох у [target_location.GetName]. Ця важлива позиція в [ROOT.GetCountry.GetGovernment.GetParliament.GetName] стала на наш бік у дебатах, сподіваючись, що це принесе користь від запропонованої політики."
  parliaments.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  parliaments.8.b: "Ми повинні інвестувати в [target_location.GetNameWithNoTooltip] незалежно від результату."
  parliaments.9.title: "Сила [target_location.GetNameWithNoTooltip]"
  parliaments.9.desc: "Як осідок нашої столиці, [target_location.GetName] може отримати значну вигоду від нині запропонованих реформ. На щастя, достатньо людей усвідомили це, щоб їхній представник тепер голосував на нашу користь."
  parliaments.9.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  parliaments.10.title: "[target_location.GetNameWithNoTooltip] Змінює позицію в дебатах!"
  parliaments.10.desc: "Здається, що члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] від [target_location.GetName] нарешті усвідомили, наскільки вигідною для них була б нині обговорювана пропозиція, якби її прийняли. Їхня підтримка нашої справи є дуже бажаною."
  parliaments.10.desc_b: "Здається, що члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] від [target_location.GetName] усвідомили, наскільки згубною для них була б нині обговорювана пропозиція, якби її прийняли. Їхня підтримка нашої опозиції має велике значення."
  parliaments.10.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  parliaments.11.desc: "Здається, що члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] від [target_location.GetName], хоча ще нещодавно були непохитними прихильниками нашої справи, повністю змінили свою позицію щодо нині обговорюваного питання. Ми не можемо знати напевно, як це сталося, але зрозуміло, що ми більше не можемо покладатися на їхній голос."
  parliaments.11.a: "Можливо, їхня жадібність взяла над ними гору..."
  parliaments.12.title: "Немає підтримки для селянства"
  parliaments.12.desc: "Хоча ми дозволяємо [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] подавати петиції до нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName], це право не перетворюється на таку ж владу, яку мають інші стани над цією установою. Під час нещодавнього обговорення стало зрозуміло, що простий народ [ROOT.GetCountry.GetName] не користується тими ж привілеями, що й панівний вищий клас, який, до речі, виступає проти пропозиції [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  parliaments.12.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  parliaments.12.b: "Яка жахлива несправедливість!"
  parliaments.13.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Домінують у дебатах"
  parliaments.13.desc: "Рішуча кампанія членів [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] схилила [ROOT.GetCountry.GetGovernment.GetParliament.GetName] на користь нині обговорюваного питання. Незважаючи на їхній нижчий соціальний статус, їхній голос приймається як рівний в обговореннях держави."
  parliaments.13.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  parliaments.13.b: "Вимоги народу будуть почуті."
  parliaments.14.desc_common: "Члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] від [target_location.GetName] займають впливову позицію в межах [ROOT.GetCountry.GetGovernment.GetParliament.GetName], оскільки вони представляють один з наших економічних центрів."
  parliaments.14.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] від [target_location.GetNameWithNoTooltip]"
  parliaments.14.desc: "$parliaments.14.desc_common$ Їхнє багатство має великий вплив у [ROOT.GetCountry.GetGovernment.GetParliament.GetName], але, на щастя для нас, обговорювана пропозиція принесе їм користь, якщо її буде прийнято, тому їхні гроші витрачаються на купівлю підтримки замість її перешкоджання."
  parliaments.14.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  parliaments.15.title: "Тягар [target_location.GetNameWithNoTooltip]"
  parliaments.15.desc: "Багато хто в [target_location.GetName] були досить розчаровані пропозицією збільшити нашу увагу до морської інфраструктури. Вони вважають, що їхній регіон вже багато робить для збройних сил нашої країни і радше очікували, що [ROOT.GetCountry.GetGovernment.GetParliament.GetName] виділить більше коштів на їхній розсуд, замість того, щоб просити більше грошей для флоту."
  parliaments.15.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  parliaments.15.a.tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  parliaments.16.title: "Морське домінування в [target_location.GetNameWithNoTooltip]"
  parliaments.16.desc: "Домінування флоту в [target_location.GetName] означало, що запропоноване збільшення витрат на армію в [ROOT.GetCountry.GetGovernment.GetParliament.GetName] було там досить холодно сприйняте. Незважаючи на те, що спочатку вони були прихильні до пропозиції, члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] з цієї області тепер не бачать іншого вибору, окрім як проголосувати проти неї."
  parliaments.16.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  parliaments.17.desc_common: "Люди [target_location.GetName] схильні сповідувати іншу віру, ніж наша, а члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName], відповідальні за [target_location.GetNameWithNoTooltip], були звинувачені в представленні їхніх інтересів над інтересами нашої власної віри."
  parliaments.17.title: "Віра [target_location.GetNameWithNoTooltip]"
  parliaments.17.desc_tolerance: "$parliaments.17.desc_common$ Однак ці звинувачення зазвичай викликають лише сміх у решти [ROOT.GetCountry.GetGovernment.GetParliament.GetName], оскільки для нас нерідко цінувати тих, хто сповідує іншу віру, ніж віра нашої держави."
  parliaments.17.desc_intolerance: "$parliaments.17.desc_common$ Ці різкі звинувачення зашкодили репутації [target_location.GetNameWithNoTooltip] і зашкодили підтримці поточної пропозиції в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  parliaments.17.a: "Це була воля [ROOT.GetCountry.GetReligion.GetGodName]."
  parliaments.18.title: "Очікування [target_location.GetNameWithNoTooltip]"
  parliaments.18.desc: "Члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] з [target_location.GetName] напрочуд прихильні до нашої пропозиції в парламентських дебатах. Здається, університет у [target_location.GetNameWithNoTooltip] переконаний, що він буде залучений до підрахунків та вимірювань, які передбачає поточна пропозиція, і вчені в захваті від можливості взяти участь у зборі нових, необроблених даних щодо нашої країни."
  parliaments.18.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  parliaments.19.title: "Некомпетентність [target_character.GetNameWithNoTooltip]"
  parliaments.19.desc: "Оскільки наші поточні дебати в [ROOT.GetCountry.GetGovernment.GetParliament.GetName] зосереджені на складі нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle], виявилася серйозна помилка, допущена [target_character.GetName]. Протягом [target_character.GetHerHis] призначення, [target_character.GetHerHis] навички, схоже, швидко погіршилися, і нам, можливо, доведеться розглянути повну заміну [target_character.GetHimHer]."
  parliaments.19.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  parliaments.20.title: "Життя в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  parliaments.20.desc: "Як представники областей, що іноді досить віддалені від [ROOT.GetCountry.GetCapital.GetName], багато членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName] часто виявляють, що життя в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] під час їхніх візитів дуже відрізняється від того, до чого вони звикли. Деякі вважають його тісним і брудним, і багато хто здається досить полегшеним, коли повертається додому.\n\nЦей рік виявився ще важчим, ніж зазвичай, для витончених почуттів наших членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Жаркі місяці були надзвичайно спекотними, вологі місяці – надзвичайно вологими, а холодні місяці – надзвичайно холодними. Кілька членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName] тепер вирішили, що з них досить, і звернулися до нас із проханням допомогти зробити їхнє перебування приємнішим."
  parliaments.20.a: "Ми повинні зробити все, що в наших силах."
  parliaments.20.b: "Їм доведеться терпіти, як і решті з нас."
  parliaments.21.title: "Члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] у скандалі"
  parliaments.21.desc: "У [ROOT.GetCountry.GetCapital.GetName] під час поточних дебатів стався незначний скандал. Здається, замість того, щоб особисто відвідувати засідання, деякі члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] порушували спокій і переслідували своїх співвітчизників. Обурення велике, як серед їхніх колег, так і на вулицях, і цей інцидент, ймовірно, переслідуватиме майбутні парламенти роками."
  parliaments.21.a: "$common_string_let_it_slide$"
  parliaments.21.b: "Заарештувати членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  parliaments.22.title: "Прогульництво"
  parliaments.22.desc: "Враховуючи великий вплив на політику нашої країни, легко припустити, що всі члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] відвідували парламентські засідання з великим ентузіазмом, прагнучи зробити якомога більше з владою, яка їм була довірена. Однак це далеко не так. У будь-якому [ROOT.GetCountry.GetGovernment.GetParliament.GetName] будуть ті, хто ніколи не з'являється, або тому, що вони все ще насолоджуються своїми маєтками в сільській місцевості, або тому, що вони вирішили взяти участь у багатьох радощах столиці. Проблема останнім часом зростає, і ми боїмося, що іноземні високопосадовці сміються з нас за спиною. Ми могли б штрафувати тих, хто відсутній під час дебатів, щоб збільшити відвідуваність, але, звичайно, ці члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] не сприйняли б це дуже прихильно."
  parliaments.22.a: "Оштрафувати найгірших порушників."
  parliaments.22.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  parliaments.23.title: "Вимоги щодо представництва"
  parliaments.23.desc: "У містах [ROOT.GetCountry.GetName] почали циркулювати ворожі публікації. Анонімні, але дуже критичні автори стверджують, що наш уряд є автократичним і не керує з належним врахуванням ситуації всіх [ROOT.GetCountry.GetAdjectiveWithNoTooltip] людей, а також інші подібні безглузді звинувачення. Вони вимагають як письмової конституції, так і парламенту, де могли б бути представлені різні частини нашої країни."
  parliaments.23.a: "Заборонити публікації."
  parliaments.23.b: "Дати туманні обіцянки реформ."
  parliaments.24.title: "Фінансова допомога"
  parliaments.24.desc: "Здається, що поточний поганий фінансовий стан нашого уряду та наші відчайдушні спроби знайти будь-які кошти стали загальновідомими. Хоча це, безумовно, зашкодить нашій репутації як у [ROOT.GetCountry.GetName], так і за кордоном, це принесло деякі переваги, оскільки кілька членів [ROOT.GetCountry.GetGovernment.GetParliament.GetName], що представляють [target_location.GetName], звернулися до нас, пропонуючи свою допомогу. Їхня ціна, однак, полягає у більшому представництві в уряді загалом, а також у формалізованих каналах, через які держава може звертатися за їхньою допомогою в майбутньому."
  parliaments.24.a: "Надати їм більше представництва."
  parliaments.24.b: "Відмовитися від їхніх грошей."
  parliaments.24.c: "Пообіцяти врахувати їхні погляди."
  parliaments.25.desc: "$parliaments.14.desc_common$ Їхнє багатство має великий вплив у [ROOT.GetCountry.GetGovernment.GetParliament.GetName] і, на жаль, вони використовують його для лобіювання проти наших поточних зусиль."
  parliaments.25.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  parliaments.27.title: "Парламентські традиції"
  parliaments.27.desc: "Одна з найскладніших речей у роботі парламентаря менше пов'язана з дебатами в [ROOT.GetCountry.GetCapital.GetName], а більше з тим, як продати дебати та компроміси людям вдома. Проте місцевому члену [ROOT.GetCountry.GetGovernment.GetParliament.GetName] часто легше пояснити новий податок, ніж збирачу, надісланому центральним урядом у менш представницьких системах.\n\nЗдається, що члени [ROOT.GetCountry.GetGovernment.GetParliament.GetName] загалом, а ті, що з [target_location.GetName] зокрема, стали настільки вправними в захисті політики, що ми спостерігаємо зростання підтримки центрального уряду в цілому."
  parliaments.27.a: "Вони нарешті нас розуміють!"
  parliaments.26.title: "Зговірливий [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  parliaments.26.desc: "Члени нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] останнім часом були особливо зговірливими. Завдяки їхнім лоялістським нахилам ми могли б легко схилити їх на нашу користь або витягти додаткові ресурси з їхніх регіонів."
  parliaments.26.a: "Використання їхньої лояльності є найважливішим."
  parliaments.26.b: "Нам потрібна тверда валюта!"
  parliaments.28.title: "Зіткнення повноважень"
  parliaments.28.desc: "Рідкісне та несподіване видовище з'явилося в [ROOT.GetCountry.GetCapital.GetName], оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та інші члени середніх і нижчих верств скликали свій власний імпровізований [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Об'єднані у своєму невдоволенні, вони просувають дебати [target_debate.GetName], вимагаючи змін, які прямо кидають виклик волі [target_character.GetName]. Багато їхніх членів, підживлені розчаруванням у правлячому класі, вирішили, що вони більше не можуть терпіти статус-кво, і висловлюють свою думку, незважаючи на сильну опозицію [target_character.GetShortNameWithNoTooltip]."
  parliaments.28.a: "Наші батоги стали неефективними!"