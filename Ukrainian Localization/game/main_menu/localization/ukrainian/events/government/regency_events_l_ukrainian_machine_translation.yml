l_english:
  regencies.1.title: "Коронувати регента"
  regencies.1.desc: "Передчасна смерть [target_previous_ruler.GetName] змусила наш [ROOT.GetCountry.GetFlavorRank] увійти в період регентства, доки не буде знайдено належного спадкоємця. Хоча за [ROOT.GetCountry.GetAdjective] законом [target_character.GetName] не повинен бути правителем, [target_character.GetSheHe] здобув популярність і підтримку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')].\n\nПриродно, амбітна особа, як [target_character.GetShortNameWithNoTooltip], більш ніж зацікавлена в отриманні лідерства [ROOT.GetCountry.GetFlavorRank]. Але врешті-решт, саме [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вирішує, чи [target_character.GetSheHe] гідний правити [ROOT.GetCountry.GetLongNameWithNoTooltip]."
  regencies.1.a: "Це гарна ідея!"
  regencies.1.a.japanese.tt: "Це змусить нас припинити мати династію [target_previous_ruler.GetDynasty.GetName], що також змінить ідентичність нашого [ROOT.GetCountry.GetFlavorRank]"
  regencies.1.founds_dynasty_tt: "Засновує нову [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] в [THIS.GetCharacter.GetLocation.GetName]"
  regencies.1.a.japanese_imperial_family.tt: "Ми перестанемо бути частиною [ShowGovernmentReformName('japanese_imperial_family')]"
  regencies.1.b: "Уникнімо цього!"
  regencies.1.c: "Насправді, [target_previous_ruler.GetShortNameWithNoTooltip] усиновив [target_character.GetShortNameWithNoTooltip] у [target_previous_ruler.GetHerHis] заповіті."
  regencies.2.title: "Без образ"
  regencies.2.desc: "Гарна освіта та природний шарм [ROOT.GetCountry.GetGovernment.GetHeir.GetName] зробили [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHim] більш ніж відповідним варіантом на трон. Однак погане управління [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] змусило [ROOT.GetCountry.GetName] обурюватися через відсутність [Concept('stability', 'CONCEPT_PLACEHOLDER')|e]. Управління нацією таке ж складне і делікатне, як збирання троянд, не торкаючись жодної колючки; і, іноді, просто не народжуються з цим. Можливо, ми могли б використати одну з тих колючок..."
  regencies.2.a: "Ми повинні забезпечити [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetName]. Будь-якою ціною."
  regencies.3.title: "Навіть як тінь"
  regencies.3.desc: "Після того, як [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] пережив замах на [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHis] фізичну цілісність, [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] почав відчувати себе поглинутим тим, що [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetSheHe] може назвати обережністю, тоді як інші можуть називати це менш приємними словами. [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetSheHe|U] почав уникати світських заходів, залишаючи решту ради наодинці керувати всією нацією.\n[ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHis|U] кричуща безвідповідальність викликала багато підозр серед двору, однак, що значно погіршило громадську думку про [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName], так це дивна поведінка, яку [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetSheHe] демонстрував останнім часом, [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHis] очі червоні та широко розплющені посеред ночі, бурмочучи в темряві, що [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetSheHe] ніколи не покине трон, просячи когось прийти до [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHim] навіть як тінь, навіть як сон."
  regencies.3.a: "Ми повинні негайно покласти цьому край."
  regencies.3.c: "Це не так вже й погано."
  regencies.4.title: "Навіть як сон"
  regencies.4.desc: "Після невдалої спроби зупинити [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] від погіршення долі нашої нації, параноя, що оточувала [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHim], лише виявилася правдою, тим самим завдавши ще більшої шкоди [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHis] психічному здоров'ю. Вже допитавши найближчих членів ради, [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] почав заходити до їхніх кімнат без попередження, супроводжуваний кількома [ROOT.GetCountry.GetGovernment.GetAdjective] охоронцями та суворим тоном [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHis] голосу: \"Це має бути зроблено\", — єдина відповідь, яку можна отримати від [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHim], поки їхні речі перевіряються."
  regencies.4.a: "Це лише одне рішення."
  regencies.5.title: "Злісні уми"
  regencies.5.desc: "Золото — небезпечна річ, його спокусливий блиск неможливо встояти. Воно ховається в тіні, приваблюючи необізнаних дурнів до свого приреченого сяйва, його позолочена округлість, як два демонічні ока. [target_character.GetName] не чужий цьому небезпечному почуттю, [target_character.GetHerHis] роздратоване обличчя відчайдушно шукає нову іграшку, щоб погратися, [target_character.GetHerHis] пальці оглядають кожну шухляду, кожну кишеню, намагаючись використовувати [target_character.GetHerHis] руки як Мідас.\n\nТим часом наша нація страждає, населення повільно впадає у відчай, їхні голодні роти відкриті в молитвах."
  regencies.5.a: "Ми не можемо дозволити [target_character.GetNameWithNoTooltip] зруйнувати нашу країну."
  regencies.5.c: "Вже запізно!"
  regencies.6.title: "Пошуки скарбів"
  regencies.6.desc: "Почалося з невинних сміхів, випадкових коментарів, безгрішних пропозицій. Потім це почало перетворюватися на пустотливі посмішки, гострі коментарі, зловісні накази.\nВесь палац знав, що [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] занадто звик до влади, але мало хто навіть подумав би, що [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetSheHe] зайде так далеко, щоб зберегти її. Наш законний спадкоємець, [ROOT.GetCountry.GetGovernment.GetHeir.GetName], був ув'язнений після того, як його запросили \"знайти особливий скарб\", прихований у підземеллях."
  regencies.6.a: "Чутки поширюються по нашій країні."
  regencies.7.title: "Дні слави"
  regencies.7.desc: "Іноді надія знаходиться в найнесподіваніших місцях. З початку [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetHerHis] регентства, [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] виявився чудовим правителем, завжди усвідомлюючи потреби нашого народу. Деякі навіть заходять так далеко, що кажуть, що наша нація пережила б більше процвітання, якби [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetSheHe] залишився при владі трохи довше...\n\nВраховуючи неминучий вік повноліття [ROOT.GetCountry.GetGovernment.GetHeir.GetName], це жодним чином не повинно бути можливим. Проте [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHis] некомпетентність вже розлютила більшість [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHis] вчителів, багато з них покинули наш двір після невдалих спроб приборкати [ROOT.GetCountry.GetGovernment.GetHeir.GetHimHer]."
  regencies.7.a: "Я впевнений, що щось можна зробити..."
  regencies.7.b: "[ROOT.GetCountry.GetGovernment.GetHeir.GetSheHe|U] не перший некомпетентний спадкоємець."