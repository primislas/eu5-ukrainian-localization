l_english:
  societal_values.100.title: "Втрата стабільності"
  societal_values.100.desc: "Це зміцнення привілеїв [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] сильно обурює [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]. Це створює заворушення в нашому королівстві і може виявитися катастрофічним у довгостроковій перспективі."
  societal_values.100.a: "Ну, вони ж просто селяни."
  societal_values.101.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] Повстають!"
  societal_values.101.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] повстають проти змін у нашій країні, які обмежили їхні повноваження. Очевидно, вони не задоволені зміцненням привілеїв [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  societal_values.101.a: "Покладатися на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  societal_values.102.title: "Більше [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] в армії"
  societal_values.102.desc: "Зі збільшенням привілеїв [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] приходять додаткові обов'язки. Від них очікується служба в армії як офіцерів та справжніх джентльменів."
  societal_values.102.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] завжди можуть вести маси."
  societal_values.102.b: "Можливо, найкращі мають вести?"
  societal_values.103.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Незадоволені"
  societal_values.103.desc: "Однією з переваг кріпацтва є те, що, забезпечуючи неможливість пересування [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], їх стає легше оподатковувати. Однак деякі з них, схоже, мають проблеми з цією справедливою та природною політикою..."
  societal_values.103.a: "Це менш ніж ідеально..."
  societal_values.104.title: "Залучення потрібних людей"
  societal_values.104.desc: "Допомагаючи нашим [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у прив'язуванні кріпаків до їхніх земель, ми значно збагатили земельну аристократію. Заможний [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] — це той, хто може присвятити час вищим життєвим прагненням, а молодші сини будь-якого поважного дому матимуть серед своїх нащадків велику кількість вірних і здібних художників, адміністраторів чи інших людей високої якості. Деякі з них досить охоче відплачують державі за послугу, яку вона надала їхнім родинам. Один з них, [target_character.GetName], нещодавно прибув до [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб запропонувати [target_character.GetHerHis] послуги [ROOT.GetCountry.GetFlavorRank]."
  societal_values.104.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.105.title: "Велике повстання"
  societal_values.105.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] глибоко засмучені новиною про те, що їхня свобода пересування буде ще більше обмежена. Насправді, по всій нашій країні відбулися масові повстання через це... Можливо, якби вони приділяли час особистій гігієні, вони б не були такими огидними?"
  societal_values.105.a.tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у кількох [Concept('rural', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], таких як [target_location.GetName], втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  societal_values.105.a: "Селяни повстають!"
  societal_values.106.title: "Кріпаки належним чином експлуатуються"
  societal_values.106.desc: "Наша політика кріпацтва дала результати, оскільки наші землевласники нещодавно доклали особливих зусиль для експлуатації своїх кріпаків."
  societal_values.106.a: "Ось чому ми тримаємо їх на їхньому місці."
  STATIC_MODIFIER_NAME_serf_exploitation: "Експлуатація кріпаків"
  STATIC_MODIFIER_DESC_serf_exploitation: "Наша політика сприяння кріпацтву дозволила землевласникам експлуатувати своїх кріпаків-орендарів ще більше, ніж зазвичай."
  societal_values.107.title: "Кріпаки невдоволені"
  societal_values.107.desc: "До нас дійшли чутки, що наше щасливе населення кріпаків не таке вже й щасливе, як ми спочатку думали. Ми навіть чуємо чутки про заплановане повстання."
  societal_values.107.a: "Нашим військам потрібна практика."
  societal_values.107.b: "Кілька поступок можуть бути найкращим варіантом."
  societal_values.108.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вдячні за нашу прихильність"
  societal_values.108.desc: "Делегація [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] прибула до нас сьогодні, щоб подякувати за нашу прихильність до них в уряді. Насправді, вони настільки вдячні, що зробили невеликий добровільний внесок до скарбниці."
  societal_values.108.a: "Ми дякуємо їм за їхній дар."
  societal_values.109.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] скаржаться"
  societal_values.109.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], що представляють зростаючий клас купців та міських жителів, висловили свої претензії щодо явного фаворитизму до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], який демонструє наш [ROOT.GetCountry.GetFlavorRank]. Вони стверджують, що політика, яка підтримує традиційні привілеї [ShowSocietyDirectionName('aristocracy')], відбувається за рахунок зростаючої міської економіки, пригнічуючи торгівлю, інновації та зростання міст.\n\nЦі скарги стали гучнішими, а видатні члени міщанства підкреслюють дисбаланс як загрозу процвітанню [ROOT.GetCountry.GetFlavorRank]. Оскільки напруга зростає, ми повинні вирішити, чи продовжувати задобрювати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], чи змінити нашу політику, щоб задовольнити вимоги [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], ризикуючи при цьому накликати гнів [ShowSocietyDirectionNameWithNoTooltip('aristocracy')]."
  societal_values.109.a: "Без болю немає здобутків."
  societal_values.109.b: "Можливо, ми можемо допомогти."
  societal_values.110.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] підтримують Державу"
  societal_values.110.desc: "Країна відчуває тягар війни, і люди всюди шукають надії в цей важкий час. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] виступили, пропонуючи підтримку та заохочення тим, хто постраждав."
  societal_values.110.a: "Ми дякуємо їм за підтримку"
  societal_values.111.title: "Військовий трактат"
  societal_values.111.desc: "Наш акцент на сильній аристократії дав [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] засоби для служби в армії, і вони приділяють більше уваги військовій справі. Один з них опублікував трактат про військову думку."
  societal_values.111.a: "Це було гарне читання!"
  societal_values.112.title: "Збільшення набору"
  societal_values.112.desc: "Оскільки до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] дійшли чутки, що наша національна міць не в оптимальному стані, вони запропонували своїх кріпаків для служби в армії."
  societal_values.112.a: "Це добре!"
  societal_values.200.title: "Повстання [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  societal_values.200.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ROOT.GetCountry.GetName] повстали через наше рішення обмежити їхні привілеї і поклялися зупинити нас. Можливо, нам слід було подумати про це, перш ніж діяти."
  societal_values.200.a: "Дуже добре, розчавити їх!"
  societal_values.201.title: "Втрата престижу"
  societal_values.201.desc: "Зміцнення [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та купців за рахунок дворянства зменшує наш престиж в очах світу. Ми втрачаємо обличчя і ризикуємо стати нацією жадібних грошолюбів."
  societal_values.201.a: "Що нам до того?"
  societal_values.202.title: "Купці отримують вигоду"
  societal_values.202.desc: "Коли позиція [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та купців зміцнюється в країні, з'являється більше компетентних людей, доступних для державної служби. Іноді країна може отримати вигоду навіть від талантів простолюду."
  societal_values.202.a: "Один Великий Чоловік служитиме нам!"
  societal_values.203.title: "Меншина процвітає"
  societal_values.203.desc: "Завдяки гарантованому нашим [ShowAdvanceName('bill_of_rights')] правовому статусу, наша [minority_religion_province.GetDominantCulture.GetName] меншина процвітає під нашим правлінням."
  societal_values.203.a: "Приємно бачити."
  STATIC_MODIFIER_NAME_minority_prospers: "Меншина процвітає"
  STATIC_MODIFIER_DESC_minority_prospers: "Наше рішення надати [ShowAdvanceName('bill_of_rights')] дозволило нашим меншинам процвітати в нашій нації."
  societal_values.204.title: "Зворотна реакція"
  societal_values.204.desc: "Відколи ми запровадили [ShowAdvanceName('bill_of_rights')], багато представників наших початкових правлячих класів відчувають себе маргіналізованими. Однак, замість того, щоб обговорювати це, вони, схоже, влаштовують повстання."
  societal_values.204.a: "Чому вони просто не обговорять це як джентльмени?"
  societal_values.205.title: "Люди зникають"
  societal_values.205.desc: "Оскільки ми полегшили [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] пересування в пошуках кращих можливостей для землеробства, на жаль, стало важче їх відстежувати, коли армії потрібні новобранці."
  societal_values.205.a: "Це не ідеально."
  societal_values.206.title: "Втрата контролю"
  societal_values.206.desc: "З нашими новими законами, які менш міцно прив'язують [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] до землі, здається, що вони також отримують дивні нові ідеї щодо своєї точної ролі у великій схемі речей."
  societal_values.206.a: "Це тривожний розвиток подій."
  societal_values.207.title: "Краща адміністрація"
  societal_values.207.desc: "Обмежуючи [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у їхній безжальній експлуатації [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], так звані «джентльмени-фермери» стали напрочуд поширеними в адміністрації. Це, своєю чергою, покращило загальні умови в нашій країні."
  societal_values.207.a: "Прогрес!"
  societal_values.208.title: "Наш народ насолоджується свободою"
  societal_values.208.desc: "Наша політика надання свободи простому народу приносить плоди. Здається, вони задоволеніші, ніж зазвичай."
  societal_values.208.a: "Ми правимо мудро."
  societal_values.209.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] стурбовані"
  societal_values.209.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] стурбовані, що наша політика дозволу вільних підданих заважає їхній здатності шмагати своїх слуг. Здається, кілька званих обідів було зіпсовано."
  societal_values.209.a: "Нехай скаржаться."
  societal_values.209.b: "Зробімо деякі поступки."
  societal_values.210.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] задоволені"
  societal_values.210.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] процвітають завдяки нашій плутократичній політиці, і тому вони вирішили надіслати державі невеликий подарунок, щоб нагадати нам, чому це добре."
  societal_values.210.a: "Ми дякуємо їм за подарунок."
  societal_values.211.title: "$societal_values.209.title$"
  societal_values.211.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] стурбовані, що наша плутократична політика не віддає їм належного."
  societal_values.211.a: "Нехай скаржаться."
  societal_values.211.b: "Можливо, ми можемо трохи поступитися."
  societal_values.212.title: "Найманці стікаються під прапор"
  societal_values.212.desc: "Найманці завжди йдуть за грошима, і наші плутократичні традиції змушують найманських капітанів думати, що прибуток тут."
  societal_values.212.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_mercenaries_to_the_standard: "Найманці стікаються під прапор"
  STATIC_MODIFIER_DESC_mercenaries_to_the_standard: "Наші плутократичні традиції змусили найманців, що завжди шукають грошей, стікатися під наш прапор."
  societal_values.213.title: "За Свободу!"
  societal_values.213.desc: "Вони приходять, щоб забрати наші найсвятіші свободи, вони приходять за нашою самою свободою. Ми будемо битися, і так, ми можемо померти, але ми матимемо шанс сказати нашим ворогам, що вони можуть забрати наші життя, але ніколи не заберуть нашу свободу."
  societal_values.213.a: "Надихаюче!"
  STATIC_MODIFIER_NAME_for_freedom: "За Свободу!"
  STATIC_MODIFIER_DESC_for_freedom: "Ми завжди будемо боротися за свободу, наші вороги можуть забрати наші життя, поки ми боремося, ми можемо померти, але вони ніколи не заберуть нашу свободу!"
  societal_values.214.title: "Наші Права"
  societal_values.214.desc: "Нам не потрібно боротися за наші права, плутократичні принципи нашого уряду закріплюють наші права та захищають їх. Це те, за що варто стояти і що варто цінувати."
  societal_values.214.a: "Чудові Новини!"
  societal_values.215.title: "На захист торговельних інтересів"
  societal_values.215.desc: "Торговельні інтереси є основою плутократичного ідеалу нашого великого [ROOT.GetCountry.GetFlavorRank]. Ми повинні забезпечити, щоб наші закони належним чином захищали інтереси наших купців від несправедливої іноземної конкуренції."
  societal_values.215.a: "Це єдино правильно і належно"
  societal_values.216.title: "Сільськогосподарський бум"
  societal_values.216.desc: "Наші ферми, особливо ті, що виробляють різні види зерна, переживають бум продуктивності, що, своєю чергою, дає поштовх усім сферам нашої економіки. Це добре, бо є більше податків."
  societal_values.216.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_agricultural_boom: "Сільськогосподарський бум"
  STATIC_MODIFIER_DESC_agricultural_boom: "Наші ферми переживають бум продуктивності, даючи більше продовольства, що дає поштовх нашій економіці, оскільки, своєю чергою, дає нам більше для оподаткування."
  societal_values.217.title: "Толерантність для всіх"
  societal_values.217.desc: "Наш уряд докладає особливих зусиль, щоб люди різних віросповідань толерувалися, доки вони мають гроші."
  societal_values.217.a: "Бог добрий!"
  STATIC_MODIFIER_NAME_tolerance_for_all: "Толерантність для всіх!"
  STATIC_MODIFIER_DESC_tolerance_for_all: "Люди всіх віросповідань толеруються урядом, доки вони мають гроші."
  societal_values.218.title: "До прапорів"
  societal_values.218.desc: "Коли війна лютує, патріоти звідусіль стікаються під прапори, щоб забезпечити захист нашого гордого [ROOT.GetCountry.GetFlavorRank] від ворогів свободи звідусіль."
  societal_values.218.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_to_the_colors: "До прапорів!"
  societal_values.300.title: "Поширюються небезпечні ідеї!"
  societal_values.300.desc: "Наше дещо менш догматичне мислення призвело до нових і дивних уявлень про «гуманізм». Це є причиною глибокого занепокоєння, оскільки люди починають ставити під сумнів належний порядок речей."
  societal_values.300.a: "Ми занепокоєні."
  societal_values.301.title: "Ми виглядаємо слабкими"
  societal_values.301.desc: "Належно цивілізовані країни не дозволяють дрібним [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] намагатися мати будь-які серйозні думки. Очі світу прикуті до нас, і світ не схвалює того, що бачить."
  societal_values.301.a: "Це тимчасово."
  societal_values.302.title: "З'являються нові мислителі"
  societal_values.302.desc: "Наша щедра політика, що дозволяє людям більше свободи слова, створила сприятливий ґрунт для багатообіцяючих нових ідей. Деякі з видатних нових мислителів можуть стати великими людьми, які зрештою залишать нашій нації тривалу спадщину інтелектуального зростання."
  societal_values.302.a: "Ми обрали мудро."
  societal_values.303.title: "Створено епічне мистецтво"
  societal_values.303.desc: "Наше постійне покровительство мистецтву призвело до створення найвеличніших творів, які бачив світ. Особливо [target_work.GetName] від [target_artist.GetName] приносить велику славу нашій нації."
  societal_values.303.a: "Ми втішаємося славою."
  societal_values.304.title: "Немає мистецтва, гідного покровительства"
  societal_values.304.desc: "Хоча ми відомі як покровителі мистецтв, наразі художники, яким ми покровительствуємо, не створюють якісного мистецтва. Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] виглядає дещо безглуздо."
  societal_values.304.a: "Я впевнений, що все зміниться."
  societal_values.305.title: "Наукова революція триває"
  societal_values.305.desc: "Наша Наукова революція продовжує приносити користь, і наші вчені роблять подальші відкриття. Будучи інноваційною країною, ми можемо досягти нескінченних можливих переваг!"
  societal_values.305.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.306.title: "Наукова революція зупиняється"
  societal_values.306.desc: "Наразі нашим вченим, схоже, бракує нових відкриттів. Ну, мабуть, ні, але революція наразі сповільнилася."
  societal_values.306.a: "Не ідеально."
  societal_values.307.title: "Хвиля інновацій"
  societal_values.307.desc: "Наша довгострокова політика заохочення інновацій принесла значні переваги. Ми спостерігаємо інтелектуальний ріст у нашій нації."
  societal_values.307.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_innovation_wave: "Хвиля інновацій"
  STATIC_MODIFIER_DESC_innovation_wave: "Наші інноваційні політики призвели до появи нових ідей у нашій країні."
  societal_values.308.title: "Сплеск адміністративної думки"
  societal_values.308.desc: "Мислітелі нашої країни, заохочені відкритою позицією нашого уряду, зайняті сплеском думки в галузі управління, ставлячи собі питання: як ми можемо краще керувати?"
  societal_values.308.a: "Надзвичайно чудові новини."
  STATIC_MODIFIER_NAME_burst_of_administrative_thought: "Сплеск адміністративної думки"
  STATIC_MODIFIER_DESC_burst_of_administrative_thought: "У відкритому суспільстві навіть уряд може стати ефективним!"
  societal_values.309.title: "Погляд назовні"
  societal_values.309.desc: "Наші мислителі, беручи приклад з розслабленого ставлення уряду до цих речей, почали цікавитися тими, хто не схожий на нас. Ті, хто розмовляє іншою мовою або живе в іншій країні, ці ідеї допоможуть їм у спілкуванні з тими людьми."
  societal_values.309.a: "Тепер вони говорять нашою мовою..."
  societal_values.310.title: "Військова теорія"
  societal_values.310.desc: "Військова зброя завжди була захопленням для чоловіків у всьому світі. Вони перетворили це захоплення на конкретні ідеї, які ми можемо використовувати."
  societal_values.310.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.400.title: "Єресь"
  societal_values.400.desc: "Якимось чином здається, що на кожне гніздо єретиків, яке ми викорінюємо та очищаємо, виникає ще два."
  societal_values.400.a: "Бур'яни в саду..."
  societal_values.401.title: "Безлад"
  societal_values.401.desc: "Не всі погоджуються з нашою релігійною доктриною. Деякі люди голосно скаржаться, називаючи наш підхід до сучасних ідей обмеженим і стверджуючи, що чіпляння за давню філософію є регресивним безглуздям."
  societal_values.401.a: "На жаль, дехто, можливо, мусить згоріти..."
  societal_values.402.title: "Прибула Свята Особа"
  societal_values.402.desc: "[target_character.GetName], клірик зі святого ордену в [target_country.GetLongName], прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] сьогодні. [target_character.GetHeShe|U] глибоко вражений нашим суворим, але благочестивим покаранням невіруючих і попросив про дорадчу посаду. Зрештою, [ROOT.GetCountry.GetFlavorRank], що молиться разом, залишиться разом."
  societal_values.402.a: "Вітаємо священика."
  societal_values.402.b: "Нами не керує Церква."
  societal_values.403.title: "Підтримка Війни"
  societal_values.403.desc: "Оскільки ми оголосили, що будемо вести війну проти наших релігійних ворогів, народ підтримав військові зусилля."
  societal_values.403.a: "Deus Vult!"
  societal_values.404.title: "Нездійснені Обіцянки"
  societal_values.404.desc: "Ми часто давали зрозуміти, що [ROOT.GetCountry.GetReligion.GetAdjective] віра є єдиною істинною вірою, запевняючи наш народ, що війна проти [infidel_neighbor.GetLongName] неминуча, враховуючи наші релігійні розбіжності. Однак багато наших підданих зараз розчаровані в нас, оскільки ми не змогли розпочати жодної війни проти наших сусідів, [infidel_neighbor.GetNameWithNoTooltip]. Деякі виходять на вулиці, щоб висловити своє невдоволення."
  societal_values.404.a: "Ми просто ще не зовсім готові."
  societal_values.404.b: "Якщо вони хочуть бійки, вони її отримають!"
  societal_values.405.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] Мобілізує Населення"
  societal_values.405.desc: "Протягом багатьох років наша політика мотивувала більшість нашого населення сумлінно відвідувати очікувані релігійні церемонії. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловив свою подяку за нашу підтримуючу політику, у свою чергу, роблячи підтримуючі коментарі щодо нашого уряду."
  societal_values.405.a: "Нехай наш народ завжди знаходить єдність через віру."
  societal_values.406.title: "Релігійні Розбіжності"
  societal_values.406.desc: "Нас багато в чому вважають одним із найвидатніших захисників [ROOT.GetCountry.GetReligion.GetAdjective] віри. Наші релігійні установи сильні, а члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] як тут, так і за кордоном стікаються на наші семінари.\n\nТому дещо бентежить те, що сільське населення нашої країни не настільки співзвучне з теологією, як ми. Повідомлення про відхилення, такі як проголошення собаки святим або інтеграція старих язичницьких свят у святі цереморії нашої віри, підривають нашу державу."
  societal_values.406.a: "Нехай скаржаться."
  STATIC_MODIFIER_NAME_religious_deviants: "Релігійні відступники"
  STATIC_MODIFIER_DESC_religious_deviants: "Заплющуючи очі на релігійних відступників по всій нашій країні, ми підірвали авторитет наших місіонерів на всій нашій території..."
  societal_values.406.b: "Спробувати змусити їх відмовитися від своїх шляхів."
  societal_values.407.title: "Релігійна ревність"
  societal_values.407.desc: "Натхненні нашими палкими віруваннями та релігійною політикою, наші місіонери виявляються більш переконливими у своїх тихих бесідах з невіруючими."
  societal_values.407.a: "Час поширювати добру звістку."
  STATIC_MODIFIER_NAME_missionary_zeal: "Місіонерська ревність"
  STATIC_MODIFIER_DESC_missionary_zeal: "Оскільки наша нація ґрунтується на принципі божественного верховенства, наші місіонери відчувають більший запал, ніж зазвичай."
  societal_values.408.title: "Консервативна реакція"
  societal_values.408.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не вважають, що [ROOT.GetCountry.GetLongName] належним чином дотримується принципів Божественного Верховенства. Ми чули, як вони засуджували уряд."
  societal_values.408.a: "Це лише пусті балачки неспокійних душ."
  societal_values.408.b: "З цими дисидентами необхідно розібратися!"
  societal_values.409.title: "Єдність віри"
  societal_values.409.desc: "Оскільки уряд нашого [ROOT.GetCountry.GetFlavorRank] офіційно почав заохочувати поклоніння та зосереджувати життя на істинній [ROOT.GetCountry.GetReligion.GetAdjective] вірі, наш народ почувається безпечніше у своєму повсякденному житті та один з одним."
  societal_values.409.a: "Де є віра, там є довіра."
  societal_values.410.title: "Ліберали розгнівані"
  societal_values.410.desc: "Більш ліберальні та вільнодумні верстви нашого суспільства засмучені відсутністю інновацій в урядових підходах."
  societal_values.410.a: "Інновації — ніщо порівняно з традицією."
  societal_values.410.b: "Вони заслуговують бути почутими."
  societal_values.411.title: "Релігійна відданість"
  societal_values.411.desc: "Вогні віри сильні в нашому [ROOT.GetCountry.GetFlavorRank]! Щодня люди стікаються, щоб приєднатися або якимось чином підтримати наших місіонерів, які прагнуть заохочувати [ROOT.GetCountry.GetReligion.GetAdjective] спосіб життя на всіх наших землях. Ті, кого ми прагнемо навернути, не можуть не бути враженими запалом, яким володіють наші піддані."
  societal_values.411.a: "Поширюйте слово!"
  societal_values.412.title: "Священна війна"
  societal_values.412.desc: "Війна за віру — це війна справедлива і істинна. Вже важливі ченці та інші члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] проповідують масам про важливість цієї війни. Люди збираються, щоб забезпечити перемогу."
  societal_values.412.a: "Наша віра переможе!"
  societal_values.413.title: "Ласкаво просимо додому"
  societal_values.413.desc: "Наші заблукалі брати у [convert_location.GetName] усвідомили помилки своїх шляхів і повернулися до єдиної істинної віри. Усі вони врятовані."
  societal_values.413.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.414.title: "Вони бачать світло"
  societal_values.414.desc: "Народ [convert_location.GetName], побачивши силу нашої віри, спонтанно обрав її прийняти. Це гордий день для нас, адже ще більше душ врятовано."
  societal_values.414.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.415.title: "Божественне керівництво"
  societal_values.415.desc: "Нинішній період невизначеності гриз розуми простого люду. Однак, оскільки наші релігійні лідери нещодавно зайняли позицію, оголосивши ці суворі часи випробуванням нашої віри, ситуація стабілізувалася. Люди по всьому нашому [ROOT.GetCountry.GetFlavorRank] тепер знаходять розраду у своїй релігійній громаді."
  societal_values.415.a: "Ми черпаємо силу одне в одному."
  societal_values.416.title: "Сила віри"
  societal_values.416.desc: "У питаннях віри ми не маємо собі рівних. Наша підтримка нашої релігії та відданість, яку ми виявляємо, вражає людей навколо нас."
  societal_values.416.a: "Це факт."
  societal_values.417.title: "Любов відданих"
  societal_values.417.desc: "Наша любов до істинної віри не знає меж, і наш народ почувається захищеним та безпечним, знаючи це. Їхня доля після смерті є нашим головним занепокоєнням."
  societal_values.417.a: "Народ задоволений."
  societal_values.500.title: "Нові шпигунські техніки"
  societal_values.500.desc: "Наша система шпигунства працює, і наші агенти знайшли нові способи шпигувати за людьми. Рано чи пізно наші 'друзі' та вороги дізнаються, але наразі ми маємо перевагу."
  societal_values.500.a: "Переваги — це добре."
  STATIC_MODIFIER_NAME_enhanced_spies: "Покращені шпигуни"
  STATIC_MODIFIER_DESC_enhanced_spies: "Наша система шпигунства функціонує краще, ніж зазвичай, що означає, що наші шпигуни ще ефективніші."
  societal_values.501.title: "Перебіжчики-шпигуни"
  societal_values.501.desc: "Деякі шпигуни в нашій системі шпигунства перебігають до інших країн. Це може зашкодити нам у короткостроковій перспективі."
  societal_values.501.a: "Нехай нелояльні елементи йдуть."
  STATIC_MODIFIER_NAME_spy_defections: "Перебіжчики-шпигуни"
  STATIC_MODIFIER_DESC_spy_defections: "Наша система шпигунства наразі переживає труднощі, оскільки деякі шпигуни перебігають працювати на інші нації."
  societal_values.501.b: "Невелика грошова сума може змінити кілька думок."
  societal_values.502.title: "Людина в Генеральному штабі"
  societal_values.502.desc: "За допомогою легко підкупної людини в Генеральному штабі нашого ворога, ми таємно розкрили військові плани та розташування ворожих військ. Наші шпигуни знову довели свою цінність."
  societal_values.502.a: "Це піде нам на користь"
  societal_values.503.title: "Наша діяльність прихована"
  societal_values.503.desc: "Завдяки нашим чудовим шпигунам, наша шпигунська діяльність ретельно прихована та захищена як від ворожих, так і від союзницьких очей. Це виявилося дуже корисним у минулому і, безсумнівно, буде особливо корисним у майбутньому."
  societal_values.503.a: "Ми, безсумнівно, можемо цим скористатися"
  STATIC_MODIFIER_NAME_hidden_agents: "Приховані агенти"
  STATIC_MODIFIER_DESC_hidden_agents: "Наші агенти, що проводять таємні операції, досить добре вміють залишатися прихованими та мінімізувати вплив своїх дій."
  societal_values.505.title: "Викриті дипломати"
  societal_values.505.desc: "Оскільки наші дипломати іноді залучені до дещо тіньових аспектів міжнародної дипломатії, вони здобули певну репутацію. Це тепер впливає на престиж нашої нації."
  societal_values.505.a: "Це погані новини."
  societal_values.507.title: "Шпигунство вимагає зусиль"
  societal_values.507.desc: "Останнім часом серед дипломатичного корпусу виникло певне роздратування щодо нашої зосередженості на таємних діях. Дипломати вважають, що ця зосередженість обмежує їхні можливості, і вимагають, щоб ми знайшли для них більше застосувань, деякі з яких не передбачають таємних дій, інакше..."
  societal_values.507.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  STATIC_MODIFIER_NAME_focus_on_covert_actions: "Таємні дії"
  STATIC_MODIFIER_DESC_focus_on_covert_actions: "Наша зосередженість на таємних діях обмежує можливості нашого дипломатичного корпусу."
  societal_values.508.title: "Наші шпигуни виявляють хорошого бюрократа"
  societal_values.508.desc: "Наші дипломати завжди шукають добрих і компетентних працівників на благо держави. Тепер один з наших дипломатів знайшов справді обдарованого простолюдина, якого можна працевлаштувати в одному з департаментів нашого уряду.\n\nДе ми його працевлаштуємо?"
  societal_values.508.a: "...в Адміністрації"
  societal_values.508.b: "...в Дипломатії"
  societal_values.508.c: "...у Війську"
  societal_values.600.title: "Динамізм Кабінету"
  societal_values.600.desc: "Поєднання саме тих людей у нашому кабінеті може створити умови для приємного невеликого збільшення податкових надходжень. Усі в країні будуть раді почути, що це щойно сталося."
  societal_values.600.a: "Це справді гарні новини."
  STATIC_MODIFIER_NAME_cabinet_dynamism: "Динамізм Кабінету"
  STATIC_MODIFIER_DESC_cabinet_dynamism: "Завдяки вдало підібраним членам, що доповнюють один одного, наш кабінет виявляється ефективнішим, ніж зазвичай."
  societal_values.601.title: "Урядова Корупція"
  societal_values.601.desc: "Коли невідповідні люди потрапляють до нашого кабінету, це може означати погані новини для країни. Також їх важко усунути."
  societal_values.601.a: "Схоже, наші податки падають."
  societal_values.601.b: "Інфляція зростає."
  societal_values.602.title: "Успішне Посольство"
  societal_values.602.desc: "Наші посли дуже добре поширювали сприятливу думку про [ROOT.GetCountry.GetName] при іноземних дворах. Той факт, що ми перебуваємо в мирі, безумовно, допомагає цій справі."
  societal_values.602.a: "Розкажіть їм милі маленькі брехні..."
  succesful_embassy: "Успішне Посольство"
  societal_values.603.title: "Некомпетентні Дипломати"
  societal_values.603.desc: "Ми призначили занадто багато інбредних членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] на посаду дипломата. Вони виставляють себе на посміховисько, що, ймовірно, було очікувано, але що гірше, вони також ганьблять нашу країну."
  societal_values.603.a: "Проте вони є частиною [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]..."
  STATIC_MODIFIER_NAME_incompetent_diplomats: "Некомпетентні Дипломати"
  STATIC_MODIFIER_DESC_incompetent_diplomats: "Наші дипломати останнім часом були настільки некомпетентними, що їм просто не можна вірити, коли вони намагаються розмовляти з іншими країнами."
  societal_values.603.b: "Замініть їх."
  societal_values.604.title: "Блискучий Дипломат"
  societal_values.604.desc: "Один молодий чоловік у нашому дипломатичному корпусі значно відзначився. Він справді обдарована особистість і абсолютно відданий [ROOT.GetCountry.GetName]. Наша нація довго отримуватиме користь від його роботи."
  societal_values.604.a: "Це хороші новини!"
  STATIC_MODIFIER_NAME_brilliant_diplomat: "Блискучий Дипломат"
  STATIC_MODIFIER_DESC_brilliant_diplomat: "Блискучий дипломат підтримує відносини з однією країною практично самотужки!"
  societal_values.604.b: "Він може служити [ROOT.GetCountry.GetReligion.GetGodName]!"
  societal_values.604.c: "$societal_values.604.b$"
  societal_values.604.d: "$societal_values.604.b$"
  societal_values.604.e: "Він буде слугою [GetUniqueInternationalOrganization('hre').GetName]!"
  societal_values.605.title: "Примирення розбіжностей"
  societal_values.605.desc: "Іноді, коли країни мають різні форми правління, вони не можуть повністю зрозуміти одна одну. Завдяки нашим компетентним дипломатам, ми примирили розбіжності з одним із наших сусідів."
  societal_values.605.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  reconciling_differences: "Примирення розбіжностей"
  societal_values.606.title: "Поліпшення репутації"
  societal_values.606.desc: "Завдяки наполегливій праці наших дипломатів, які трудилися вдень і вночі, наша репутація покращилася, і світ дивиться на нас прихильно."
  societal_values.606.a: "Вся слава нам!"
  STATIC_MODIFIER_NAME_improved_dip_reputation: "Поліпшення репутації"
  STATIC_MODIFIER_DESC_improved_dip_reputation: "Наша дипломатична репутація останнім часом покращилася завдяки нашим працьовитим дипломатам."
  societal_values.607.title: "Базікаючі блазні"
  societal_values.607.desc: "Дипломат за дипломатом підводили нас, їхня некомпетентність настільки вражаюча, що світ почав бачити нас в іншому світлі. Наші недолугі дипломати зруйнували нашу репутацію!"
  societal_values.607.a: "Якби ж ми могли їх стратити."
  STATIC_MODIFIER_NAME_reduced_dip_reputation: "Погана репутація"
  STATIC_MODIFIER_DESC_reduced_dip_reputation: "Наші базікаючі блазні-дипломати зруйнували нашу репутацію."
  societal_values.700.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Стурбовані"
  societal_values.700.desc: "Члени нашого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], чиї маєтки розташовані поблизу кордону, стурбовані тим, що ми нехтуємо нашою обороною. Вони висловили свої побоювання всім і кожному."
  societal_values.700.a: "Але напад — найкраща форма захисту!"
  societal_values.701.title: "Забагато боягузів"
  societal_values.701.desc: "Наше зростаюче зосередження на наступальній доктрині ускладнило пошук відважних селян для поповнення лав. Безглузді скарги на те, що вони є гарматним м'ясом, часто висловлюються нашим офіцерам з набору."
  societal_values.701.a: "Дурні втрачають славу."
  societal_values.702.title: "Слава нам"
  societal_values.702.desc: "Наше рішення зосередитися на наступі призвело до того, що занадто багато наших сусідів із заздрістю та занепокоєнням дивляться на наші славні війська, які готові дати нашим ворогам скуштувати холодної сталі."
  societal_values.702.a: "Вони мають рацію, що хвилюються."
  societal_values.703.title: "Новобранці стікаються під прапори"
  societal_values.703.desc: "Наша система національного призову виявляється дуже успішною: бідні, зневірені, навіть патріоти стікаються під прапори. Генерали задоволені."
  societal_values.703.a: "Залучімо їх до армії негайно."
  STATIC_MODIFIER_NAME_recruits_flock: "$societal_values.703.title$"
  STATIC_MODIFIER_DESC_recruits_flock: "Наша політика національного призову змушує новобранців стікатися під прапори."
  societal_values.704.title: "Народ відмовляється від призову"
  societal_values.704.desc: "Зазвичай наша система національного призову функціонує як добре змащена машина, але зараз ми стикаємося з певним опором вербуванню. Заворушення, напади на вербувальні загони, подібні дрібниці останнім часом є досить звичним явищем."
  societal_values.704.a: "Безперечно, ми можемо уповільнити вербування в короткостроковій перспективі."
  STATIC_MODIFIER_NAME_resist_conscription: "Призову чинять опір"
  STATIC_MODIFIER_DESC_resist_conscription: "Зазвичай наша політика національного призову дає ще більше чоловіків для армії. Однак зараз призову чинять опір."
  societal_values.704.b: "Нам потрібні солдати, а не скиглії."
  societal_values.705.title: "Велика армія"
  societal_values.705.desc: "Наша армія настільки велика, що крокує від однієї перемоги до іншої. Досвід цих перемог позитивно впливає на вербування та навчання нових солдатів."
  societal_values.705.a: "Це фантастично."
  societal_values.706.title: "Наша армія не така вже й велика"
  societal_values.706.desc: "Однієї миті наша армія є заздрістю світу, наступної — ніхто не має про неї нічого доброго сказати. Ми не маємо уявлення, як наше велике військо так низько опустилося, але це може вплинути на вербування."
  societal_values.706.a: "Час струсити військовий істеблішмент!"
  societal_values.707.title: "Елан нашої армії вселяє страх у ворога"
  societal_values.707.desc: "Наша політика вибору наступу над обороною призвела до розповідей про елан армій."
  societal_values.707.a: "В атаку!"
  societal_values.708.title: "Фортифікації занедбані"
  societal_values.708.desc: "Наша політика сприяння наступальній позиції призводить до занедбання наших укріплень."
  societal_values.708.a: "Нехай впаде."
  STATIC_MODIFIER_NAME_fort_in_disrepair: "Форт у занепаді"
  STATIC_MODIFIER_DESC_fort_in_disrepair: "Відсутність обслуговування значно ускладнила захист цього форту."
  societal_values.708.b: "$common_string_we_shall_do_something$"
  societal_values.709.title: "Армія — шлях до слави"
  societal_values.709.desc: "Наше зосередження на суходолі змусило багатьох відчути, що ми маємо чудову армію. Деякі з наших найяскравіших і найкращих бажають стати в ній офіцерами."
  societal_values.709.a: "Вони обрали мудро."
  societal_values.710.title: "Адмірали занепокоєні"
  societal_values.710.desc: "Наші адмірали висловлюють занепокоєння, що наше зосередження на суходолі відбувається надто коштом флоту."
  societal_values.710.a: "Що вони знають?"
  societal_values.710.b: "$common_string_we_shall_do_something$"
  societal_values.711.title: "Проявити Елан"
  societal_values.711.desc: "Наш сильний акцент на наступі надає армії нашої країни відчуття сили, бо атака завжди є найкращою формою захисту. Наші люди безстрашно кидаються в бій, знаючи, що перемога буде за ними."
  societal_values.711.a: "Цілься в очі!"
  STATIC_MODIFIER_NAME_full_elan: "Повний Елан"
  STATIC_MODIFIER_DESC_full_elan: "Акцент на наступі наповнює наших солдатів завзяттям і запалом."
  societal_values.712.title: "Відправити піхоту"
  societal_values.712.desc: "Скромного піхотинця іноді зневажає кавалерист, але вони є хребтом будь-якої армії. Сильна піхотна атака може виявитися майже такою ж руйнівною, як кавалерійська атака. Наша піхота усвідомлює, що насолоджується своїм днем слави."
  societal_values.712.a: "Ви найкращі!"
  STATIC_MODIFIER_NAME_finest_infantry: "Найкраща піхота"
  STATIC_MODIFIER_DESC_finest_infantry: "Наші піхотинці є хребтом нашої армії, і їхня атака виявляється майже такою ж руйнівною, як кавалерійська атака."
  societal_values.713.title: "Відправити кавалерію"
  societal_values.713.desc: "Наші вершники мають майстерність і здатність бути вирішальною силою, так само, як це було за часів Олександра 'Великого'. У наші дні наші компаньйони є цвітом армії і завжди готові йти в атаку. Вони насолоджуються увагою, яку отримують, і пишаються своєю важливістю."
  societal_values.713.a: "В атаку-у-у!"
  STATIC_MODIFIER_NAME_cavalry_companions: "Кавалерійські компаньйони"
  STATIC_MODIFIER_DESC_cavalry_companions: "Кавалерійські компаньйони є цвітом армії, завжди готові атакувати і мають майстерність та здатність бути вирішальною силою."
  societal_values.800.title: "Аристократи не бажають служити"
  societal_values.800.desc: "Наші аристократи стають неохочими служити в нашій армії, оскільки ми зосереджуємося на оборонній тактиці. Вони занепокоєні відсутністю можливостей для слави, ховаючись за укріпленнями."
  societal_values.800.a: "Вони просто не розуміють"
  societal_values.800.b: "Трохи золота їх переконає"
  societal_values.801.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Незадоволені"
  societal_values.801.desc: "Зі зростанням нашої уваги до оборони ми розчищали землі навколо наших укріплень, щоб копати рови та створювати чисті поля обстрілу. Люди, що займали частину цих земель, відреагували вкрай нелояльно."
  societal_values.801.a: "Що ж, форт повинен протриматися до прибуття підкріплення."
  societal_values.802.title: "Експерт з укріплень"
  societal_values.802.desc: "Відколи ми почали зосереджуватися на більш оборонних філософіях, скромний інженер (посада, зазвичай на найнижчому щаблі у військовій ієрархії) отримав шанс вразити відзнакою справжнього генія."
  societal_values.802.a: "Він досить хороший..."
  STATIC_MODIFIER_NAME_improved_fortifications: "Покращені укріплення"
  STATIC_MODIFIER_DESC_improved_fortifications: "Місцеві укріплення тут були значно покращені та забезпечують чудовий захист від будь-якої облоги."
  societal_values.803.title: "Перспективний генерал"
  societal_values.803.desc: "Наша політика польових призначень була дуже успішною, з'явився новий генерал."
  societal_values.803.a: "Що ж, він подає надії."
  societal_values.804.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Стурбовані Втратою Привілеїв"
  societal_values.804.desc: "Наша політика польових призначень серйозно турбує наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Вони вважають, що те, що людина виявляє певні здібності на полі бою, не означає, що вона буде хорошим генералом. Насправді, здається, що життя в офіцерській їдальні стає досить нестерпним, оскільки ці нові офіцери не мають уявлення, як поводиться джентльмен. Також ходять чутки, що рядовий склад вважає, що хороший лідер повинен бути краще вихованим."
  societal_values.804.a: "Чи справді [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] мають значення?"
  societal_values.804.b: "Що ж, зробити речі трохи складнішими в короткостроковій перспективі може бути краще."
  societal_values.805.title: "Військові вдосконалення"
  societal_values.805.desc: "Наші офіцери експериментують з новими способами муштри нашої вже чудово вишколеної армії. Це, здається, підвищує загальний рівень військової думки в нашій нації."
  societal_values.805.a: "Хвала військовим мислителям!"
  STATIC_MODIFIER_NAME_military_improvements: "Військові вдосконалення"
  STATIC_MODIFIER_DESC_military_improvements: "Наш відмінний військовий вишкіл призвів до покращень у нашій військовій думці."
  societal_values.806.title: "Військова самовдоволеність"
  societal_values.806.desc: "Наша чудово вишколена армія, на думку наших найвпливовіших генералів, непереможна. Будь-які нещодавні невдачі пояснюються погодою або тим, що ворог використовує такі немужні речі, як тактика. Наскільки це стосується наших генералів, немає способу покращити досконалість."
  societal_values.806.a: "Непереможна, це звучить гарно..."
  STATIC_MODIFIER_NAME_military_complacency: "Військова самовдоволеність"
  STATIC_MODIFIER_DESC_military_complacency: "Наш військовий вишкіл дав нам чудову армію, якої всі бояться. Це призвело до того, що наші старші офіцери повірили, що нашу армію просто неможливо покращити."
  societal_values.806.b: "Правда може засмутити декого."
  societal_values.807.title: "Слава Війська"
  societal_values.807.desc: "Наше Славне Військо примножує престиж нашої держави."
  societal_values.807.a: "Слава нам!"
  societal_values.808.title: "Наше Військо знало й кращі часи"
  societal_values.808.desc: "Здається, зблякла слава нашої зброї. Люди вже не сприймають наше військо так серйозно, як раніше."
  societal_values.808.a: "Час тоді все перевернути!"
  societal_values.808.b: "Мало що можна вдіяти..."
  societal_values.809.title: "Фортифікаційні зусилля"
  societal_values.809.desc: "Наше рішення зосередитися на обороні призвело до того, що місцеві командири будують укріплення, щоб за ними ховатися."
  societal_values.809.a: "Мудре рішення."
  societal_values.810.title: "Генерали занепокоєні нашою немужньою тактикою"
  societal_values.810.desc: "Наше зосередження на обороні позбавляє наші підрозділи того запалу, який їм потрібен для справжнього успіху на полі бою. Наші генерали глибоко занепокоєні цим, і ходять чутки, що інші країни глузують з нас за спиною."
  societal_values.810.a: "Кого хвилює, що думають інші?"
  societal_values.810.b: "Ми можемо трохи поступитися тут."
  societal_values.811.title: "Невпинна Муштра"
  societal_values.811.desc: "Наших чоловіків вимуштрували до вершини військової ефективності. Як стиснута пружина, ми не можемо підтримувати цей високий рівень надто довго. Проте, деякий час наші війська стоятимуть там, де менш відважні чоловіки втекли б."
  societal_values.811.a: "Покажіть їм, хлопці!"
  STATIC_MODIFIER_NAME_relentless_drill: "$societal_values.811.title$"
  STATIC_MODIFIER_DESC_relentless_drill: "Високий рівень військової ефективності не триватиме довго, але деякий час наші війська стоятимуть там, де менш відважні чоловіки втекли б."
  societal_values.812.title: "Полкова Гордість"
  societal_values.812.desc: "Наші чоловіки пишаються своїми полками в найкращі часи, але цими днями їхня гордість не знає меж. Здорова конкуренція між полками означає, що вони перевершують один одного, щоб забезпечити свою досконалість."
  societal_values.812.a: "Зберігайте спокій і пишайтеся"
  STATIC_MODIFIER_NAME_regimental_pride: "$societal_values.812.title$"
  STATIC_MODIFIER_DESC_regimental_pride: "Гордість, яку наші чоловіки відчувають до своїх полків, не знає меж. Спільне братерство та товариськість змушують їх постійно намагатися перевершити інші полки, змушуючи їх завжди прагнути до досконалості."
  societal_values.813.title: "Підготовлена оборона"
  societal_values.813.desc: "Нехай розійдеться звістка до кожного села, хутора і містечка, що ворогу не слід надавати жодної підтримки. Будь-яка спроба взяти ворожу монету буде покарана після здобуття перемоги. Нехай ніхто не сумнівається в нашій рішучості довести це до кінця."
  societal_values.813.a: "Поширте звістку!"
  STATIC_MODIFIER_NAME_prepared_defence: "$societal_values.813.title$"
  STATIC_MODIFIER_DESC_prepared_defence: "Погроза покаранням будь-кому, хто допомагає ворогу та бере ворожу монету, гарантує, що жодне село, хутір чи містечко жодним чином не підтримає ворога."
  societal_values.814.title: "До останнього чоловіка"
  societal_values.814.desc: "Ми нечасто можемо це зробити, але зараз настав час розпалити в наших чоловіках нові рівні фанатизму. Вони готові захищати наші фортеці до останнього чоловіка."
  societal_values.814.a: "Тримайте лінію!"
  STATIC_MODIFIER_NAME_to_the_last_man: "$societal_values.814.title$"
  STATIC_MODIFIER_DESC_to_the_last_man: "Фанатизм, розпалений у наших чоловіках, готує їх захищати наші фортеці до останнього чоловіка."
  societal_values.815.title: "Полковницький дух"
  societal_values.815.desc: "Успішне фуражування залежить від тих, кого відправляють на пошуки провіанту, щоб вони добровільно йшли на жертви, аби товариші також отримали свої пайки. Вони зобов'язані долати великі відстані після цілого дня маршу, щоб принести їжу для решти. Чим міцніший зв'язок між побратимами, тим далі піде фуражир і тим краще буде нагодована армія. Нинішня війна створила сильний дух серед чоловіків, і фуражування йде винятково добре."
  societal_values.815.a: "Ось такий дух треба мати!"
  STATIC_MODIFIER_NAME_regimental_spirit: "$societal_values.815.title$"
  STATIC_MODIFIER_DESC_regimental_spirit: "Нинішня війна створила сильний дух серед чоловіків, і фуражування йде винятково добре."
  societal_values.900.title: "Бізнес процвітає"
  societal_values.900.desc: "Завдяки нашим кмітливим комерційним практикам, купці приваблюються до нашого володіння, і ми отримуємо більше вигод від нашої торгівлі, ніж будь-коли раніше."
  societal_values.900.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_business_booming: "$societal_values.900.title$"
  STATIC_MODIFIER_DESC_business_booming: "Завдяки нашим кмітливим комерційним практикам, купці приваблюються до нашого володіння, і наша [Concept('trade_efficiency', 'CONCEPT_PLACEHOLDER')|e] зросла в результаті."
  societal_values.901.title: "Торгове самовдоволення"
  societal_values.901.desc: "Хоча як нація ми славимося нашими кмітливими комерційними практиками, наразі наші купці стають дещо самовдоволеними."
  societal_values.901.a: "Наші купці конкурують не так добре."
  STATIC_MODIFIER_NAME_out_of_date_commerce: "Застарілі комерційні практики"
  STATIC_MODIFIER_DESC_out_of_date_commerce: "Наші кмітливі комерційні практики дали нашим купцям справжню перевагу, однак наразі вони працюють не так добре, як мали б."
  societal_values.901.b: "Ціни можуть зростати."
  societal_values.902.title: "Авантюрні купці"
  societal_values.902.desc: "Поточні торговельні умови сильно сприяють нашим купцям. Вони готові скористатися ситуацією на нашу користь."
  societal_values.902.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_adventuring_merchants: "$societal_values.902.title$"
  STATIC_MODIFIER_DESC_adventuring_merchants: "Наші купці-авантюристи авантюрують більше, ніж зазвичай, а це означає, що наша торгівля приносить ще більше прибутків, ніж раніше."
  societal_values.903.title: "Наші купці працюють погано"
  societal_values.903.desc: "Хоча раніше наші купці-авантюристи вели успішну торгівлю, останнім часом справи пішли на спад."
  societal_values.903.a: "Нам доведеться просто затягнути паски."
  STATIC_MODIFIER_NAME_poor_merchants: "Купці працюють погано"
  STATIC_MODIFIER_DESC_poor_merchants: "Зазвичай наші купці-авантюристи вирушають у подорожі та привозять багатства з усього світу, але наразі вони працюють не так добре, як мали б."
  societal_values.903.b: "Відповіддю є кілька непопулярних реформ."
  societal_values.904.title: "Успіх торговельної політики"
  societal_values.904.desc: "Наша Національна торговельна політика наразі виявляється надзвичайно успішною. Це дає нашим купцям справжній поштовх."
  societal_values.904.a: "Безперечно, це гарна новина."
  STATIC_MODIFIER_NAME_trade_policy_working: "Торговельна політика працює"
  STATIC_MODIFIER_DESC_trade_policy_working: "Наша національна торговельна політика наразі успішніша, ніж зазвичай."
  societal_values.905.title: "Торговельна політика зазнає невдачі"
  societal_values.905.desc: "Наша Національна торговельна політика наразі не приносить бажаних результатів. Наші купці просто не працюють так добре."
  societal_values.905.a: "Схоже, купці мають труднощі."
  STATIC_MODIFIER_NAME_trade_policy_failing: "$societal_values.905.title$"
  STATIC_MODIFIER_DESC_trade_policy_failing: "Наша національна торговельна політика наразі не дуже успішна."
  societal_values.905.b: "Нам слід трохи більше змастити колеса..."
  societal_values.906.title: "Бонза доходів"
  societal_values.906.desc: "Нашим купцям вдалося отримати перевагу над іншими купцями. Хоча ця перевага не триватиме вічно, наразі наші купці отримують прибуток."
  income_bonanza: "Дохідна боназа"
  societal_values.906.a: "Вельми чудові новини"
  societal_values.907.title: "Конкурентна перевага"
  societal_values.907.desc: "Боротьба за торгівлю у світі є конкурентною, але одному з наших купців вдалося укласти преференційну угоду з місцевими постачальниками. Хоча ми не зможемо зберегти цю угоду назавжди, наразі ми можемо принести більше змін."
  societal_values.907.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_competitive_advantage: "$societal_values.907.title$"
  STATIC_MODIFIER_DESC_competitive_advantage: "Преференційну угоду з місцевими постачальниками уклав один з наших купців, що дає нам конкурентну перевагу."
  societal_values.908.title: "Співпраця з купецьким станом"
  societal_values.908.desc: "Найбільшою проблемою зі збором доходу від торгівлі є контрабанда. Наша урядова політика підтримки торговельних інтересів призвела до більшої співпраці купецького стану проти тих, хто займається контрабандою. Принаймні на деякий час."
  societal_values.908.a: "Фантастичні новини!"
  STATIC_MODIFIER_NAME_cooperation_with_merchant_class: "$societal_values.908.title$"
  STATIC_MODIFIER_DESC_cooperation_with_merchant_class: "Купецький стан співпрацює проти тих, хто займається контрабандою, завдяки нашій урядовій політиці підтримки торговельних інтересів."
  societal_values.909.title: "Підтримка меркантилістської політики"
  societal_values.909.desc: "Торговельні інтереси лобіювали розширення меркантилістської політики. Ми розглядаємо розширення цих політик, щоб побачити, чи будуть вони вигідними для нашої нації."
  societal_values.909.a: "Варто розглянути..."
  societal_values.909.b: "Абсолютно ні!"
  societal_values.910.title: "Крах торгівлі"
  societal_values.910.desc: "Важко осягнути, але з якоїсь причини обсяг доходу від торгівлі просто обвалився. Вантажі просто не доходять до берега. Це контрабанда? Чи купці прямують в інше місце? Ми не знаємо, але справи кепські..."
  societal_values.910.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  STATIC_MODIFIER_NAME_trade_collapse: "$societal_values.910.title$"
  STATIC_MODIFIER_DESC_trade_collapse: "Через деякі непередбачені проблеми торгівля занепала."
  societal_values.910.b: "[ROOT.GetCountry.Custom('common_string_we_must_do_something')]"
  societal_values.1000.title: "Народна підтримка нашого Великого Флоту"
  societal_values.1000.desc: "По всій землі люди підтримують наш Великий Флот, роблячи внески на захист нашої нації. На верфях наші корабельні майстри працюють дедалі старанніше, і люди навіть добровільно йдуть у моряки! Люди пишаються нашим великим Флотом."
  societal_values.1000.a: "Це просто фантастично."
  STATIC_MODIFIER_NAME_faster_ships: "Прискорене будівництво кораблів"
  STATIC_MODIFIER_DESC_faster_ships: "Наше рішення прийняти ідею великого флоту дало поштовх нашій суднобудівній промисловості."
  societal_values.1001.title: "Народний ентузіазм щодо нашого флоту зменшується"
  societal_values.1001.desc: "Чесно кажучи, наші люди більше не вважають наш флот таким величним. Насправді, він їм просто не подобається. Набирачам стає ще важче, ніж зазвичай, і навіть здобуття основних матеріалів є проблемою."
  societal_values.1001.a: "Це лише короткострокова проблема."
  STATIC_MODIFIER_NAME_slower_ships: "Уповільнене будівництво кораблів"
  STATIC_MODIFIER_DESC_slower_ships: "Незважаючи на наше рішення прийняти ідею великого флоту, наша суднобудівна промисловість, схоже, страждає."
  societal_values.1001.b: "Це ніщо, що не могли б вирішити невеликі гроші."
  societal_values.1002.title: "З'являється перспективний адмірал"
  societal_values.1002.desc: "Один з наших «Морських яструбів» виявився набагато кращим, ніж ми спочатку очікували."
  societal_values.1002.a: "Це була гарна ідея."
  societal_values.1003.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Стурбовані"
  societal_values.1003.desc: "Наша політика призначення перспективних командирів незалежно від походження не подобається нашим [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], яким важко обідати з людьми, що не мають шляхетного виховання. За їхніми словами, це також засмучує людей під їхнім командуванням, які очікують, що ними керуватимуть їхні вищі, а не хтось, хто явно не є джентльменом."
  societal_values.1003.a: "Нехай скаржаться."
  societal_values.1003.b: "Що ж, ми можемо піти на кілька поступок."
  societal_values.1004.title: "Морські розробки"
  societal_values.1004.desc: "Наше використання вищої майстерності мореплавства призводить до величезних розробок у військово-морській думці, що принесе користь нашому флоту на багато років вперед."
  societal_values.1004.a: "Це просто не може бути поганим."
  STATIC_MODIFIER_NAME_naval_developments: "Морські розробки"
  STATIC_MODIFIER_DESC_naval_developments: "Завдяки нашій вищій майстерності мореплавства ми розробляємо ще новіші та кращі способи покращити наш флот."
  societal_values.1005.title: "Морська гординя"
  societal_values.1005.desc: "Наша майстерність мореплавства настільки вища, що починається самовдоволення. Люди задоволені тим, щоб спочивати на лаврах, але це може зробити нас вразливими до викликів з боку потенційних вискочок."
  societal_values.1005.a: "Наш флот найкращий."
  STATIC_MODIFIER_NAME_naval_hubris: "$societal_values.1005.title$"
  STATIC_MODIFIER_DESC_naval_hubris: "З нашою вищою майстерністю мореплавства, що дає нам флот, який може панувати на хвилях, з'являється натяк на гординю. Однак не варто хвилюватися, це ніколи нас не наздожене."
  societal_values.1005.b: "Ми мусимо їх трохи струсонути."
  societal_values.1006.title: "Покращена тактика блокади"
  societal_values.1006.desc: "Використання нами інструкцій з морського бою дозволило нам розробити значно покращену тактику блокади. Хоча наші вороги з часом знайдуть протидію, наразі ми зможемо по-справжньому закрутити гайки."
  societal_values.1006.a: "Ми навіть можемо заробити на цьому трохи грошей."
  STATIC_MODIFIER_NAME_blockade_tactics: "$societal_values.1006.title$"
  STATIC_MODIFIER_DESC_blockade_tactics: "Використання нами інструкцій з морського бою дозволило нам розробити ще кращу тактику блокади, принаймні доки наші вороги не навчаться їй протидіяти."
  societal_values.1007.title: "Зниження стандартів"
  societal_values.1007.desc: "Використання нами інструкцій з морського бою дозволило нам встановлювати грізні блокади ворожих узбереж, але наразі наші моряки просто трохи лінуються."
  societal_values.1007.a: "Ну, ми не можемо очікувати, що вони працюватимуть на піку ефективності весь час."
  STATIC_MODIFIER_NAME_slipping_standards: "Стандарти блокади знижуються"
  STATIC_MODIFIER_DESC_slipping_standards: "Використання нами інструкцій з морського бою покращило загальну здатність наших сил до блокади, але, схоже, починає з'являтися деяка самовдоволеність."
  societal_values.1007.b: "Від кожного очікується виконання свого обов'язку, незважаючи ні на що."
  societal_values.1009.b: "Час похитнути військово-морський істеблішмент."
  societal_values.1010.title: "Ми пануємо на хвилях"
  societal_values.1010.desc: "Наш славетний флот – гордість нашої нації та заздрість світу. Навіть риби, що плавають у морі, несуть наш прапор на своєму хвості."
  societal_values.1010.a: "Більше слави для нас."
  societal_values.1011.title: "Флот занепав"
  societal_values.1011.desc: "Ніхто не може цього зрозуміти. Одну хвилину ми мали славетний флот, яким пишалася вся нація, тепер світ сміється з нашого флоту."
  societal_values.1011.a: "Дні слави повернуться."
  societal_values.1011.b: "Трохи грошей може все владнати."
  societal_values.1012.title: "Арсенали спустошуються"
  societal_values.1012.desc: "Оскільки ми вирішили збільшити нашу увагу до морських справ, наші військові арсенали, що постачають армію, спустошуються. Досвідчені майстри шукають роботу в інших місцях."
  societal_values.1012.a: "[ROOT.GetCountry.Custom('common_string_disappointing')]"
  societal_values.1013.title: "Генерал іде у відставку"
  societal_values.1013.desc: "Недавнє рішення більше сприяти флоту призвело до того, що кілька генералів вирішили піти у відставку. Вони відчувають, що для них буде менше слави."
  societal_values.1013.a: "Ох, добре."
  societal_values.1015.title: "Наш флот – гордість нації"
  societal_values.1015.desc: "Наше рішення зосередитися на морській політиці викликає сплеск підтримки флоту вдома. Молоді дурні записуються в офіцери."
  societal_values.1015.a: "Бажаю їм удачі."
  societal_values.1016.title: "Генерали стурбовані"
  societal_values.1016.desc: "Наші генерали стурбовані тим, що наша увага до флоту шкодить нашій армії."
  societal_values.1016.a: "Хай буде флот, хай їм грець."
  societal_values.1016.b: "Час приділити більше уваги армії."
  societal_values.1018.title: "Достаток моряків"
  societal_values.1018.desc: "Наші купці продовжують розширювати свої флоти та навчати нових моряків для своїх кораблів. Це означає, що коли ми змушені призивати їх до наших військово-морських сил, ми отримуємо набагато кращих моряків."
  societal_values.1018.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.1019.title: "Морські переваги"
  societal_values.1019.desc: "Нашим морським капітанам вдалося захопити чимало контрабандистів за останні роки, і частка держави була досить великою."
  societal_values.1019.a: "Ми ніколи не відмовляємося від кількох монет..."
  societal_values.1020.title: "Гордість флоту"
  societal_values.1020.desc: "Наявність важких кораблів у наших флотах завжди є джерелом гордості. Наші моряки пишаються службою на них, а наш народ відчуває гордість, спостерігаючи їхню міць у наших портах."
  societal_values.1020.a: "Вони наша радість і гордість."
  societal_values.1021.title: "Ефективність у флоті"
  societal_values.1021.desc: "Після кількох адміністративних змін та найму дуже компетентних моряків ефективність нашого флоту зросла. Це приносить користь як нашому флоту, так і торговому флоту, оскільки ефективний корабель коштуватиме менше і вимагатиме менше уваги."
  societal_values.1021.a: "Це корисно."
  societal_values.1100.title: "Покращення виробництва"
  societal_values.1100.desc: "Наше прийняття Смітіанської економіки призвело до того, що люди почали замислюватися над тим, як виробляються речі. Наразі це, здається, окупилося."
  societal_values.1100.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_production_improvements: "$societal_values.1100.title$"
  STATIC_MODIFIER_DESC_production_improvements: "З нашим рішенням прийняти ідею Смітіанської економіки, наш народ продовжує експериментувати з новими та кращими способами виробництва."
  STATIC_MODIFIER_NAME_production_improvements_generic: "$STATIC_MODIFIER_NAME_production_improvements$"
  STATIC_MODIFIER_DESC_production_improvements_generic: "Ми досягли покращення виробництва завдяки поєднанню минулих мудрих економічних рішень та силі волі."
  societal_values.1101.title: "Виробництво придушене"
  societal_values.1101.desc: "Наші виробники стали самовдоволеними, оскільки наше використання Смітіанської економіки призвело до такого прогресу в наших виробничих техніках."
  societal_values.1101.a: "Це зашкодить виробництву."
  STATIC_MODIFIER_NAME_production_stifled: "$societal_values.1101.title$"
  STATIC_MODIFIER_DESC_production_stifled: "Наше рішення прийняти Смітіанську економіку призвело до покращення виробництва. Однак ми зазнали хвилі консерватизму, яка стримує покращення."
  STATIC_MODIFIER_NAME_production_stifled_generic: "$STATIC_MODIFIER_NAME_production_stifled$"
  societal_values.1101.b: "Насправді, це, схоже, призвело до вищих цін."
  societal_values.1102.title: "Успішна бюрократія"
  societal_values.1102.desc: "Щорічно бюрократія дає країні приємний невеликий податковий приріст, але іноді правильні люди на правильних місцях можуть дати країні трохи більше. Шкода, що через кілька років їх доводиться підвищувати понад їхні здібності."
  societal_values.1102.a: "Куй залізо, поки гаряче."
  STATIC_MODIFIER_NAME_successful_bureaucracy: "$societal_values.1102.title$"
  STATIC_MODIFIER_DESC_successful_bureaucracy: "Наші бюрократи працюють краще, ніж зазвичай, що призводить до збільшення податкових надходжень."
  societal_values.1103.title: "Корумпована бюрократія"
  societal_values.1103.desc: "Бюрократія іноді просто не працює. Неправильні люди на неправильних місцях можуть призвести до корупційних практик, які шкодять доходам країни. Що ще гірше, знадобиться кілька років, щоб отримати належні документи для її зміни."
  societal_values.1103.a: "Ніхто не може боротися із системою."
  STATIC_MODIFIER_NAME_corrupt_bureaucracy: "$societal_values.1103.title$"
  STATIC_MODIFIER_DESC_corrupt_bureaucracy: "Наразі деякі з наших старших бюрократів занадто зайняті набиванням власних кишень, щоб зосередитися на своїх завданнях."
  societal_values.1104.title: "$societal_values.1102.title$"
  societal_values.1104.desc: "Наша політика підтримки та розширення бюрократії нашої нації дійсно приносить плоди. Щодня нові чиновники проходять навчання та вирушають до славних нових кар'єр у нашій адміністрації!"
  societal_values.1104.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.1105.title: "$societal_values.1102.title$"
  societal_values.1105.desc: "Імперія такого розміру потребує багато бюрократів, можливо, пропозиція бонусу за реєстрацію заохотить їхню кількість до зростання?"
  societal_values.1105.a: "Будь-що."
  societal_values.1105.b: "Не зараз."
  societal_values.1106.title: "Національний банк виплачує дивіденди"
  societal_values.1106.desc: "Кілька мудрих позик принесли значні прибутки нашому Національному банку. Банк підвищує свої дивіденди та викуповує частину своїх акцій."
  societal_values.1106.a: "Ми при грошах."
  societal_values.1107.title: "Національний банк у скруті"
  societal_values.1107.desc: "Наш Національний банк перебуває у дуже скрутному становищі. Йому важко надавати позики надійним людям, і він стикається з труднощами."
  societal_values.1107.a: "Ми надамо йому кошти для підтримки!"
  societal_values.1107.b: "Накажемо банку надавати позики дещо менш надійним людям."
  societal_values.1108.title: "Покращення розвитку"
  societal_values.1108.desc: "[ROOT.GetCountry.GetGovernment.GetLowOfficialTitle] у [target.GetName] майстерно використав свою владу для збільшення розвитку у своїй провінції."
  societal_values.1108.a: "Чудова робота."
  societal_values.1110.title: "Зростання стабільності"
  societal_values.1110.desc: "Наше рішення надати більше влади місцевим магнатам забезпечило, що впливові особи добре ставляться до нашого уряду. Тож вони розповідають усім іншим, як добре ними керують."
  societal_values.1110.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.1300.title: "Непридатні рекрути"
  societal_values.1300.desc: "Оскільки ми вважали за необхідне посилити стандарти якості нашої армії, ціла низка потенційних рекрутів, на жаль, має бути визнана непридатною до служби."
  societal_values.1300.a: "Ми повинні відокремити зерно від полови."
  societal_values.1301.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] занепокоєні"
  societal_values.1301.desc: "Оскільки наша армія все більше зосереджується на якості, існують побоювання, що традиційна армія – вірна насамперед їм, а потім країні – зникла назавжди. На щастя, вони ще більше стурбовані тим, що ця нова модель армії стане найпереконливішим аргументом проти будь-яких надто гучних скарг... [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] особливо занепокоєні тим, що їхні позиції можуть бути під загрозою."
  societal_values.1301.a: "Нема про що турбуватися."
  societal_values.1303.title: "Зниження якості армії"
  societal_values.1303.desc: "Наше рішення зосередитися на кількості призводить до зменшення кількості рекрутів для нашої армії."
  societal_values.1303.a: "Ми просто проігноруємо це."
  societal_values.1303.b: "Реформа – це відповідь."
  STATIC_MODIFIER_NAME_quality_modifier: "Підвищена якість"
  societal_values.1304.title: "Якість Наших Військ Вражає"
  societal_values.1304.desc: "Наше рішення інвестувати в якість зробило нашу армію більш вражаючою в очах наших сусідів."
  societal_values.1304.a: "Ми Пануємо!"
  societal_values.1305.title: "Криза Вербування"
  societal_values.1305.desc: "Наша зосередженість на якості викликала занепокоєння у наших генералів щодо рівня людських ресурсів, доступних для армії."
  societal_values.1305.a: "Армія може постраждати."
  societal_values.1305.b: "Ми повинні змінити нашу політику."
  societal_values.1306.title: "Залізні Люди"
  societal_values.1306.desc: "Наші кораблі можуть бути зроблені з дерева, але чоловіків, які ними керують, треба побачити, щоб повірити. Хоробрі та непохитні, вони завжди готові вступити в ближній бій з ворогом."
  societal_values.1306.a: "Чудовий приклад для всіх."
  STATIC_MODIFIER_NAME_iron_ships: "$societal_values.1306.title$"
  STATIC_MODIFIER_DESC_iron_ships: "Хоробрі та непохитні чоловіки, які керують нашими дерев'яними кораблями, завжди готові вступити в бій з ворогом."
  societal_values.1307.title: "Захист Торгівлі"
  societal_values.1307.desc: "Щоб виграти цю війну, ми повинні максимізувати наш дохід, і торгівля є джерелом, про яке ми не повинні забувати. Ми повинні забезпечити, щоб наші кораблі, які захищають нашу торгівлю, отримували найкращих людей при поповненні втрат."
  societal_values.1307.a: "Так має бути."
  STATIC_MODIFIER_NAME_protected_commerce: "Захищена Торгівля"
  STATIC_MODIFIER_DESC_protected_commerce: "Кораблі, що захищають нашу торгівлю, отримуватимуть найкращих людей при поповненні втрат."
  societal_values.1308.title: "Могутність Флоту"
  societal_values.1308.desc: "Якість наших морських екіпажів справді виділяється, і наші люди це знають. Завжди готові до бою, вони не можуть дочекатися ще однієї нагоди довести свою відвагу в бою."
  societal_values.1308.a: "Вони боятимуться нас!"
  STATIC_MODIFIER_NAME_power_of_the_fleet: "$societal_values.1308.title$"
  STATIC_MODIFIER_DESC_power_of_the_fleet: "Наш могутній флот з якісними морськими екіпажами є одним з найкращих у світі."
  societal_values.1309.title: "Стійко, хлопці!"
  societal_values.1309.desc: "Якість нашої армії проявляється в дисципліні наших військ, наші люди це знають і готові показати ворогам свою відвагу."
  societal_values.1309.a: "В атаку!"
  STATIC_MODIFIER_NAME_good_discipline: "Добра дисципліна"
  STATIC_MODIFIER_DESC_good_discipline: "Наша армія має достатню дисципліну, що змушує наших солдатів битися набагато краще."
  societal_values.1310.title: "Назад на фронт"
  societal_values.1310.desc: "Поразка є поразкою лише тоді, якщо армія вірить, що її розбито. Наші високоякісні армії розглядають ці події як тимчасові невдачі перед неминучою перемогою. Таким чином, наші люди не просто завжди готові повернутися до бою, цими днями вони позитивно прагнуть це зробити."
  societal_values.1310.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_back_to_the_front: "$societal_values.1310.title$"
  STATIC_MODIFIER_DESC_back_to_the_front: "Назад на фронт\nТи зробиш те, що я скажу, коли я скажу\nНазад на фронт\nТи помреш, коли я скажу, що ти мусиш померти"
  societal_values.1400.title: "Люди сміються з нашої армії"
  societal_values.1400.desc: "Хоча рішення про створення масової армії має сенс для багатьох у нашій країні, невиховані іноземці сміються з нас, кажучи, що наша армія — це не що інше, як недисциплінований натовп."
  societal_values.1400.a: "Нехай сміються."
  societal_values.1401.title: "Важче знайти лідерів"
  societal_values.1401.desc: "Ми прийняли мудре рішення віддати перевагу кількості над якістю. Однак нова, більша армія зіткнулася з непередбаченою проблемою: стало важче виявляти талановитих офіцерів серед мас."
  societal_values.1401.a: "Безсумнівно, все покращиться."
  societal_values.1403.title: "Більше людей для армії"
  societal_values.1403.desc: "Наша політика віддавати перевагу кількості над якістю приносить плоди, оскільки сьогодні ще більше людей стало доступними для армії."
  societal_values.1403.a: "Ніколи не буває забагато людей."
  societal_values.1404.title: "Бум популяції коней"
  societal_values.1404.desc: "Коня найкраще купувати як кавалерійського коня у віці 3 або 4 років. На щастя для нас, протягом останніх кількох років у нас народилася кількість коней, вища за середню. Це збільшення пропозиції зробило набір кавалеристів набагато дешевшим."
  societal_values.1404.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_horse_population_boom: "$societal_values.1404.title$"
  STATIC_MODIFIER_DESC_horse_population_boom: "За останні кілька років народилося більше коней, ніж зазвичай, що значно здешевило набір кавалеристів."
  societal_values.1405.title: "Надлишкове спорядження"
  societal_values.1405.desc: "Перетворити людину на солдата дорого і довго. Однією з найбільших витрат є необхідне спорядження, яке перетворює беззахисну людину на невблаганну машину для вбивств. На щастя, ми виявили, що у нас є запас такого спорядження. Воно в поганому стані і довго не прослужить, але якщо ми використаємо його зараз, то зможемо одягнути людей у форму набагато дешевше."
  societal_values.1405.a: "Використаймо його, поки ще можемо."
  STATIC_MODIFIER_NAME_surplus_equipment: "$societal_values.1405.title$"
  STATIC_MODIFIER_DESC_surplus_equipment: "Ми маємо запас необхідного спорядження, що перетворює беззахисну людину на невпинну машину для вбивств."
  societal_values.1408.title: "Чоловіки стікаються під прапори"
  societal_values.1408.desc: "Чоловіки стікаються під прапори, благаючи про шанс служити в наших славетних збройних силах. Наші великі батальйони справді мають [ROOT.GetCountry.GetReligion.GetGodName] на своєму боці!"
  societal_values.1408.a: "Приємно бачити"
  societal_values.1409.title: "Дефіцит деревини"
  societal_values.1409.desc: "Якась дивна хвороба вразила нашу деревину. Дерево вкрите якимось грибковим наростом, що робить його непридатним ні для чого, крім спалювання. Це значно ускладнює пошук деревини для будівництва кораблів."
  societal_values.1409.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  STATIC_MODIFIER_NAME_timber_shortage: "$societal_values.1409.title$"
  societal_values.1410.title: "Адміністративні проблеми"
  societal_values.1410.desc: "Стає дедалі важче керувати нашими арміями. Люди, яких ми маємо на цій роботі, виявляються некомпетентними та надто продажніми. Ми шукаємо людей, які достатньо корумповані, щоб їх можна було купити, але не надто жадібні, і доки це не буде зроблено, наша військова адміністрація виявиться дорогою."
  societal_values.1410.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  STATIC_MODIFIER_NAME_admin_problems: "$societal_values.1410.title$"
  STATIC_MODIFIER_DESC_admin_problems: "Через некомпетентних людей нашими арміями стає дедалі важче керувати, а рішення є дуже дорогим, оскільки нова адміністрація є як жадібною, так і корумпованою."
  societal_values.1600.title: "Централізація приносить вигоди"
  societal_values.1600.desc: "Завдяки нашій політиці централізації ми краще контролюємо управління нашою державою, що приносить користь усім."
  societal_values.1600.a: "Це гарна новина."
  STATIC_MODIFIER_NAME_centralized_state: "Централізована держава"
  STATIC_MODIFIER_DESC_centralized_state: "Наша централізована політика зменшує корупцію та посилює наш контроль."
  societal_values.1601.title: "Провінції розчаровані відсутністю автономії"
  societal_values.1601.desc: "Наша централізуюча політика призвела до того, що багато хто в провінціях відчув втрату значної автономії. У повітрі витають розмови про повстання."
  societal_values.1601.a: "$common_string_let_them_revolt$"
  societal_values.1601.a.tt: "До #Y [ROOT.GetVariable('province_count').GetValue]#! [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  societal_values.1601.b: "Надати поступки."
  societal_values.1602.title: "Провінції хочуть ще більшої автономії"
  societal_values.1602.desc: "Один з наших провінційних губернаторів зрозумів, що за нашої поточної децентралізованої політики він міг би зайнятися справами для себе. Той факт, що армія, яку йому вдалося зібрати, надто мала, щоб підтримати таку претензію, схоже, його не надто турбує."
  societal_values.1602.a: "Дайте йому бажану автономію."
  societal_values.1602.b: "$common_string_rein_them_in$"
  societal_values.1603.title: "Низькі Виплати"
  societal_values.1603.desc: "Кілька інших країн запізнювалися з виплатами своїм найманцям. Це призвело до того, що багато капітанів потребують коштів для оплати своїх людей. Вони готові прийняти контракти від нас за нижчою ціною, за умови, що ми дійсно заплатимо."
  societal_values.1603.a: "Вони нам довіряють."
  STATIC_MODIFIER_NAME_trust_from_mercs: "Довіра від Найманців"
  STATIC_MODIFIER_DESC_trust_from_mercs: "Запізнення інших країн з виплатами своїм найманцям призвело до того, що багато капітанів готові працювати на нас, якщо ми дійсно платитимемо."
  societal_values.1604.title: "Надлишок Найманських Компаній"
  societal_values.1604.desc: "Яка війна закінчилася? Хто може сказати, чи це було кілька, чи лише одна велика? Це не має значення, але кілька безробітних найманських компаній прибули до нашого королівства в пошуках роботи. Війна для однієї людини – це можливість для іншої. У нас є війна, а вони шукають можливості."
  societal_values.1604.a: "Ми – земля можливостей."
  societal_values.1605.title: "Щедрі Умови"
  societal_values.1605.desc: "Єдине, що ми не могли терпіти більше, це руйнівні відсоткові ставки, які нам нараховують. Однак наша міцна адміністрація переконала наших кредиторів, що, можливо, відсоткова ставка занадто висока, і вони погодилися, що невелике зниження заслуговує на увагу, принаймні на деякий час."
  societal_values.1605.a: "Ми схвалюємо!"
  STATIC_MODIFIER_NAME_generous_terms: "$societal_values.1605.title$"
  STATIC_MODIFIER_DESC_generous_terms: "Наші кредитори погодилися тимчасово знизити наші відсоткові ставки."
  societal_values.1606.title: "Добра Порада"
  societal_values.1606.desc: "Добру пораду іноді важко знайти, але в ці дні кількість людей, які пропонують нам поради, приємно зростає. Це дає нам більше вибору, ніж будь-коли раніше."
  societal_values.1606.a: "Розгляньмо кандидатів"
  STATIC_MODIFIER_NAME_good_advise: "$societal_values.1606.title$"
  STATIC_MODIFIER_DESC_good_advise: "Люди, які підтримують наш кабінет, постійно дають їм добрі поради!"
  societal_values.1607.title: "Покажіть Людям Нашу Стійкість"
  societal_values.1607.desc: "Наша держава перебуває під тиском, але настав час показати нашу стійкість перед лицем негараздів. Настав час хлопцям стати чоловіками, а чоловікам показати світові, з чого вони зроблені. Разом ми можемо рухатися вперед."
  societal_values.1607.a: "Настав час!"
  societal_values.1608.title: "Підтримати Війну"
  societal_values.1608.desc: "Наш народ стомився від цієї війни, але його дух сильний. Вони готові докласти ще одне зусилля для перемоги. Ми будемо переможцями."
  societal_values.1608.a: "Вперед до перемоги!"
  societal_values.1609.title: "Невдала адміністрація"
  societal_values.1609.desc: "Наша адміністрація підвела наш народ. Замість справедливості для всіх, є справедливість для небагатьох. Це підриває саму опору нашої держави."
  societal_values.1609.a: "Це сумний стан справ."
  societal_values.1609.b: "Натомість держава буде підтримуватися золотом."
  societal_values.1610.title: "Вимоги оплати"
  societal_values.1610.desc: "Відчуваючи, що ми можемо потребувати їх більше, ніж вони нас, різні капітани найманців об'єдналися, щоб вимагати вищої платні."
  societal_values.1610.a: "$common_string_what_can_we_do$"
  societal_values.1700.title: "Загартований дуб на наших кораблях"
  societal_values.1700.desc: "Досвідчений кораблебудівник знайшов спосіб зміцнити корпуси наших кораблів, щоб вони легше витримували шторми та інші випробування моря. Техніка секретна, але на короткий час океани таять менше жаху."
  societal_values.1700.a: "Ми не боїмося мисів."
  STATIC_MODIFIER_NAME_hardened_oak: "$societal_values.1700.title$"
  STATIC_MODIFIER_DESC_hardened_oak: "Досвідчений кораблебудівник знайшов спосіб зміцнити корпуси наших кораблів."
  societal_values.1701.title: "Адмірал, гідний свого звання"
  societal_values.1701.desc: "На нашу увагу звернув чудовий морський офіцер, який демонструє не лише майстерність у військовому мистецтві, а й здатність передавати ці знання іншим. Як нам використати цей видатний талант?"
  societal_values.1701.a: "У море, щоб розбити наших ворогів!"
  societal_values.1701.b: "До академії, щоб навчати."
  societal_values.1702.title: "Покращена підготовка"
  societal_values.1702.desc: "У військово-морській академії є місце для нового інструктора, і [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] попросив нас запропонувати курс навчання для моряків. Куди нам спрямувати зусилля навчальної програми?"
  societal_values.1702.a: "Патріотичний обов'язок, звісно."
  STATIC_MODIFIER_NAME_patriotic_curriculum: "Патріотична навчальна програма"
  STATIC_MODIFIER_DESC_patriotic_curriculum: "Військово-морська академія викладає навчальну програму з патріотичного обов'язку."
  societal_values.1702.b: "Мореплавство та обслуговування."
  STATIC_MODIFIER_NAME_maintenance_curriculum: "Навчальна програма з обслуговування"
  STATIC_MODIFIER_DESC_maintenance_curriculum: "Військово-морська академія викладає навчальну програму з мореплавства та обслуговування кораблів."
  societal_values.1703.title: "Тактична інновація"
  societal_values.1703.desc: "Роки в морі дали нам досвідчені екіпажі, здатні здійснювати дивовижні подвиги в бою. Деякі з цих технік можуть бути стандартизовані та використані, щоб дати нам перевагу над ворогами."
  societal_values.1703.a: "Веслуй, веслуй, веслуй свою галеру."
  STATIC_MODIFIER_NAME_galley_veterans: "Ветерани галер"
  STATIC_MODIFIER_DESC_galley_veterans: "Тактичні досягнення, винайдені досвідченими екіпажами, були стандартизовані у галерній війні."
  societal_values.1703.b: "Наші важкі кораблі очистять моря."
  STATIC_MODIFIER_NAME_heavy_ship_veterans: "Ветерани важких кораблів"
  STATIC_MODIFIER_DESC_heavy_ship_veterans: "Тактичні досягнення, винайдені досвідченими екіпажами, були стандартизовані у війні за участю важких кораблів."
  societal_values.1704.title: "Контрабандистів спіймано"
  societal_values.1704.desc: "Ми пануємо на морях, щоб панувати над торговими шляхами. Тому життєво важливо очистити рідні води від контрабандистів, що торгують забороненими та іноземними товарами, які можуть підірвати наші внутрішні ринки."
  societal_values.1704.a: "Перемога є перемога, навіть над покидьками."
  societal_values.1704.b: "Інвестувати конфісковане майно."
  societal_values.1705.title: "Королівський гість"
  societal_values.1705.desc: "Чутки про наших талановитих кораблебудівників та військово-морську систему поширилися по всьому відомому світу, і іноземний принц попросив оглянути наші доки та поговорити з нашими людьми. Це велика честь, від якої ми не можемо відмовитися!"
  societal_values.1705.a: "Ура!"
  societal_values.1706.title: "Патріотична пожертва"
  societal_values.1706.desc: "Могутній купець бажає висловити вдячність за наші зусилля з патрулювання морів та утримання шляхів вільними для торгівлі та досліджень. Купецька компанія побудувала нові судна для нашого військового флоту і готова пожертвувати їх Короні."
  societal_values.1706.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.1708.title: "Недосягнення цілі набору"
  societal_values.1708.desc: "Швидке розширення наших портів і доків призвело до того, що більше молодих чоловіків залишають ферми та знаходять роботу на кораблях торгових компаній. Стає все важче знайти чоловіків, на яких ми можемо розраховувати, щоб йти на війну."
  societal_values.1708.a: "Хай море поглине їх."
  societal_values.1709.title: "Гниле дерево"
  societal_values.1709.desc: "Наші подорожі в невідомі води на погано підготовлених кораблях означають, що деревина гниє швидше, ніж очікувалося. Вологість, гниль, терміти... є ціна за пошук нових ринків."
  societal_values.1709.a: "Виправте, де можете."
  STATIC_MODIFIER_NAME_repairing_decayed_ships: "Ремонт зіпсованих кораблів"
  STATIC_MODIFIER_DESC_repairing_decayed_ships: "Ми доклали особливих зусиль, аби відновити пошкодження, завдані нашим кораблям під час далеких подорожей."
  societal_values.1709.b: "Дотримуватися звичайного розкладу."
  STATIC_MODIFIER_NAME_rotting_wood: "$societal_values.1709.title$"
  STATIC_MODIFIER_DESC_rotting_wood: "Наші подорожі в невідомі води на погано підготовлених кораблях призвели до швидшого, ніж очікувалося, гниття деревини."
  societal_values.1710.title: "Пожежа на верфі"
  societal_values.1710.desc: "Це було лише питанням часу, коли небезпечна суміш смоли, деревини та пороху призведе до пожежі у великому порту. Знадобиться деякий час, щоб відновити виробництво до нормального рівня."
  societal_values.1710.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  STATIC_MODIFIER_NAME_shipyard_fire: "$societal_values.1710.title$"
  STATIC_MODIFIER_DESC_shipyard_fire: "Пожежа на місцевій верфі уповільнила виробництво."
  societal_values.1800.title: "Вправний дипломат"
  societal_values.1800.desc: "Один з наших послів має надприродну здатність розуміти заплутані союзи, що оточують нас, та наслідки одного невірного кроку або сказаних саме тих слів. Як ми використаємо цього великого державного діяча?"
  societal_values.1800.a: "Використати його для найделікатніших місій."
  STATIC_MODIFIER_NAME_skilled_diplomat: "$societal_values.1800.title$"
  STATIC_MODIFIER_DESC_skilled_diplomat: "Посол виявив особливу майстерність і був призначений до наших найважливіших закордонних справ."
  societal_values.1800.b: "Залишити його при дворі, щоб викривати таємниці."
  societal_values.1801.title: "Наша справа праведна"
  societal_values.1801.desc: "Наполеглива праця нашої дипломатичної команди переконала світ, що наші претензії справедливі, наші дії виправдані, а нашим сусідам нема чого боятися нас. Усе, що ми робимо, стверджується, відповідає найкращим інтересам усіх."
  societal_values.1801.a: "Як і має бути."
  STATIC_MODIFIER_NAME_just_causes: "Праведні справи"
  STATIC_MODIFIER_DESC_just_causes: "Наполеглива праця нашої дипломатичної команди переконала світ, що наші претензії справедливі, а наші дії виправдані."
  societal_values.1802.title: "Популярний шляхтич"
  societal_values.1802.desc: "Один з наших найтовариськіших членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] повернувся з подорожі, де він розважав іноземні двори історіями про нашу велич, не кажучи вже про щедрі витрати з власної кишені. Лише велика земля могла породити такого бажаного гостя."
  societal_values.1802.a: "Принаймні, вони на щось придатні."
  STATIC_MODIFIER_NAME_popular_noble: "Популярний шляхтич"
  STATIC_MODIFIER_DESC_popular_noble: "Один з наших найтовариськіших шляхтичів виявив щедрість за кордоном."
  societal_values.1803.title: "Васали почуваються в безпеці"
  societal_values.1803.desc: "Сила наших армій та наша щедрість до їхніх прав змусили наших васалів почуватися в безпеці та під захистом під нашим покровом. Щоб забезпечити міцність цих стосунків, вони збільшили данину, яку готові нам платити."
  societal_values.1803.a: "Пастухи стрижуть своїх овець; вони їх не вбивають."
  STATIC_MODIFIER_NAME_vassals_feel_safe: "$societal_values.1803.title$"
  STATIC_MODIFIER_DESC_vassals_feel_safe: "Сила наших армій та наша щедрість до їхніх прав змусили наших васалів почуватися в безпеці та під захистом під нашим покровом."
  societal_values.1804.title: "Справедливе ставлення"
  societal_values.1804.desc: "Імперія з колоніями та васалами нагадує галасливу родину, і потрібна тверда, але справедлива рука, щоб тримати все в порядку. Недавні політики здобули захоплення наших підвладних народів і зблизили всіх нас."
  societal_values.1804.a: "Це завжди було для їхнього ж блага."
  fair_dealing: "$societal_values.1804.title$"
  societal_values.1805.title: "Тверда рука"
  societal_values.1805.desc: "$STATIC_MODIFIER_DESC_firm_hand$ Їм це може не подобатися, але вони слуги, а ми пани. Можливо, вони нарешті зрозуміли послання – поки що."
  societal_values.1805.a: "Те, що їхнє, є нашим."
  STATIC_MODIFIER_NAME_firm_hand: "Тверда рука"
  STATIC_MODIFIER_DESC_firm_hand: "Належне застосування тиску та важелів дозволило нам вичавити трохи більше з наших васалів."
  societal_values.1806.title: "Перо підкріплене мечем"
  societal_values.1806.desc: "Паспорти, які носять наші дипломати, стали символом довіри та послідовності нашої національної мети. Впевнені в тому, що наші посли говорять слова, підкріплені повною владою нашого уряду, емісари отримують безперешкодні подорожі та швидких коней, щоб їхні обов'язки виконувалися поспіхом."
  societal_values.1806.a: "Повага давно назріла."
  STATIC_MODIFIER_NAME_emissary_authority: "Повноваження емісара"
  STATIC_MODIFIER_DESC_emissary_authority: "Паспорти, які носять наші дипломати, стали символом довіри та послідовності нашої національної мети."
  societal_values.1807.title: "Зарозумілі адміністратори"
  societal_values.1807.desc: "Установи, що займаються нашими підвладними народами, настільки ізолювалися від тих, ким вони керують, що стали зарозумілими – переконаними, що немає сенсу слухати нікого, хто не перебуває в столиці. Гнів у колоніях та васалах перелився через край."
  societal_values.1807.a: "Ким вони себе вважають?"
  arrogant_administrators: "$societal_values.1807.title$"
  spy_ring_busted: "Шпигунську мережу викрито"
  societal_values.1808.title: "$spy_ring_busted$"
  societal_values.1808.desc: "Деякі з наших дипломатів були замішані у великій шпигунській операції в [target.GetLongName].\n\nТепер кожен посол чи емісар, якого ми відправляємо, підозрюється у шпигунстві та підлягає найсуворішим перевіркам після завершення призначених місій. Знадобиться час, щоб відновити нашу репутацію."
  societal_values.1808.a: "Це прикра відсутність довіри."
  STATIC_MODIFIER_NAME_suspected_diplomats: "Підозрювані дипломати"
  STATIC_MODIFIER_DESC_suspected_diplomats: "Деякі з наших дипломатів були замішані у великій шпигунській операції і тепер ретельно перевіряються."
  societal_values.1809.title: "Зухвалі вимоги"
  societal_values.1809.desc: "Тиск, який ми чинимо на наших васалів, може здаватися розумним у столиці, але деякі вимоги розцінюються як образи дрібними коронами, які ми взяли під свій захист. Переговори щодо умов займуть трохи більше часу, ніж очікувалося."
  societal_values.1809.a: "Ми можемо зачекати."
  STATIC_MODIFIER_NAME_slow_negotiations: "Повільні переговори"
  STATIC_MODIFIER_DESC_slow_negotiations: "Деякі з наших вимог розцінюються нашими васалами як образи, що уповільнює переговори з ними."
  societal_values.1810.title: "Ворожа риторика"
  societal_values.1810.desc: "Один з наших послів зробив кілька необачних заяв на нещодавній вечірці. Його гнівні та войовничі засудження наших сусідів означають, що нас сприймають як більшу загрозу, ніж ми є насправді."
  societal_values.1810.a: "Нехай тремтять."
  STATIC_MODIFIER_NAME_hostile_rhetoric: "$societal_values.1810.title$"
  STATIC_MODIFIER_DESC_hostile_rhetoric: "Один з наших послів зробив кілька необачних заяв, через що сусіди бачать у нас загрозу."
  societal_values.1810.b: "Ми можемо це залагодити."
  societal_values.1900.title: "Вільнодумці не переслідуються"
  societal_values.1900.desc: "Наша політика дозволяти філософам, адміністраторам і вченим здобувати знання, не обмежуючись урядовими чи релігійними заборонами, призвела до сплеску активності в салонах та університетах нашої столиці."
  societal_values.1900.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_free_freethinkers: "Вільнодумці"
  STATIC_MODIFIER_DESC_free_freethinkers: "Дозвіл вільнодумцям здобувати знання без переслідувань призвів до сплеску активності в салонах та університетах нашої столиці."
  societal_values.1901.title: "Справедливі закони, прийняті всіма"
  societal_values.1901.desc: "Прихильність до справжньої справедливості — сліпої до нації, релігії чи традиції — виявилася популярною серед більшості верств нашого населення. Скарги на наше правління значно зменшилися."
  societal_values.1901.a: "Закон керує великими й малими."
  STATIC_MODIFIER_NAME_fair_laws: "Справедливі закони"
  STATIC_MODIFIER_DESC_fair_laws: "Прихильність до справжньої справедливості виявилася популярною серед більшості верств нашого населення."
  societal_values.1902.title: "Чесний посередник"
  societal_values.1902.desc: "Ми здобуваємо міжнародну репутацію як нація, що поважатиме інтереси всіх своїх громадян та захищатиме права інших. Наша внутрішня чесність приносить плоди в нашому сусідстві."
  societal_values.1902.a: "Ми їм дуже подобаємося!"
  honest_broker: "$societal_values.1902.title$"
  societal_values.1903.title: "Співпраця Кабінету"
  societal_values.1903.desc: "Наша гуманістична політика зменшила заздрість між нашими радниками, оскільки вони більше не можуть грати на релігійних та етнічних розбіжностях у країні. Кожен працює на державу, в яку вірить, і в кабінеті панує довіра."
  societal_values.1903.a: "Ділитися – це турбота."
  societal_values.1904.title: "Прийняття всіх – шлях до прогресу"
  societal_values.1904.desc: "Дрібні розбіжності в нашій нації довго гальмували наш розвиток. Відкривши адміністрацію для всіх талановитих громадян, ми помітили великі досягнення у розвитку місцевих економік."
  societal_values.1904.a: "Толерантність може зробити нас багатими."
  societal_values.1905.title: "Лагідна відповідь відвертає гнів"
  societal_values.1905.desc: "Наша віра дає нам мир і безпеку, тому ми не маємо потреби гнобити інших. Навіть ті, хто перебуває в найглибших безоднях єретичних вірувань, можуть бачити, як повага до всього людства заохочується [ROOT.GetCountry.GetReligion.GetGodName]."
  societal_values.1905.a: "Ми будемо єдиною нацією."
  societal_values.1908.title: "Вільнодумство відводить від [ROOT.GetCountry.GetReligion.GetGodName]"
  societal_values.1908.desc: "Толерантність до думок – це добре, але єретичні проповідники ризикують душами своїх парафіян. Що ще гірше, спроба придушити цих відступників суперечила б нашим гуманістичним ідеалам."
  societal_values.1908.a: "Сподіваємося, це нешкідливо в довгостроковій перспективі..."
  societal_values.1910.title: "Ми боремося з минулим, воно бореться у відповідь"
  societal_values.1910.desc: "Відданість більш ліберальному розумінню місця громадянина в державі означає, що наші сусіди назвали нас державою-ізгоєм, яка прагне підірвати традиційні права корони, Церкви та гільдій. Чи можемо ми довіряти лише тим, хто думає так само, як ми?"
  societal_values.1910.a: "Вперед, навіть якщо наодинці."
  rogue_nation: "Держава-ізгой"
  STATIC_MODIFIER_NAME_an_eye_for_an_eye: "Око за око"
  societal_values.2000.t: "Прискорена урбанізація"
  societal_values.2000.desc: "По всій нашій землі помітна зростаюча тенденція. Групи [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] залишають свої землі, прямуючи до міських центрів. Вони шукають щастя в майстернях, гільдіях та мануфактурах, сподіваючись заробити на життя краще, ніж вони могли б на своїх постійно зменшуваних ділянках сільськогосподарських угідь.\n\nХоча це чудова новина для нашої промислової та торгової спроможності, вона супроводжується зростаючими проблемами, від нестабільності через дефіцит житла та санітарні умови до повільної смерті ізольованих сільських громад."
  societal_values.2000.a: "Урбанізація – це сила!"
  societal_values.2000.b: "Можливо, нам варто сповільнитись..."
  STATIC_MODIFIER_NAME_generic_urbanization_attraction: "Збільшення привабливості міст"
  STATIC_MODIFIER_NAME_generic_ruralization_attraction: "Збільшення привабливості сільської місцевості"
  societal_values.2001.t: "Рух обгороджування"
  societal_values.2001.desc: "Оскільки сільськогосподарські угіддя з покоління в покоління дедалі більше роздроблюються, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] змушені мігрувати до міст через те, що їхні ділянки стають занадто малими для натурального господарства. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] почали скуповувати великі ділянки інакше безцінних земель і об'єднувати їх для створення більших сільськогосподарських маєтків з метою отримання прибутку.\n\nЦе видається природним рішенням для нашого повільно занепадаючого сільськогосподарського сектора, але [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] глибоко незадоволені, оскільки вони розглядають це як загострення проблеми, що змушує їх мігрувати до міських центрів, де їх можуть експлуатувати ті, хто також купив їхні землі."
  societal_values.2001.a: "Економіка понад усе."
  societal_values.2001.b: "Землі мають бути куплені за гідними цінами."
  societal_values.2001.c: "Ввести законодавство, що обмежує розміри ділянок."
  societal_values.2002.t: "Продаж посад"
  societal_values.2002.desc: "Впливові члени [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] виявили великий інтерес до прийняття на себе адміністративних обов'язків деяких урядових посад. З одного боку, це значно полегшує економічний тягар держави і надає їм шанс глибше залучитися до державних справ.\n\nОднак, з іншого боку, це забирає контроль у держави, дозволяючи [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] встановлювати власний порядок денний для цих посад, що може призвести до небажаних наслідків для загального управління ними."
  societal_values.2002.a: "Продати посади!"
  societal_values.2002.b: "Продати лише другорядні посади."
  societal_values.2002.c: "Зберегти державний контроль."
  merchant_power_key_selling_offices: "$societal_values.2002.t$"
  merchant_power_key_selling_minor_offices: "Продаж другорядних посад"
  societal_values.2003.t: "Культура споживання"
  societal_values.2003.desc: "Механізми капіталу рухають нашу економіку. Ця економічна система вимагає безперервного та постійно зростаючого споживання товарів для свого існування. Однак ідея нескінченного зростання стає дедалі віддаленішою в часи труднощів.\n\nВчені та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] закликають нас встановити запобіжні заходи для забезпечення постійної стабільності нашої економіки. Вони пропонують, щоб держава заохочувала культуру споживання товарів, аби наш народ не став ощадливим, тим більше не опустився нижче порогу самозабезпечення."
  societal_values.2003.a: "Заохочувати споживання товарів."
  societal_values.2003.b: "Інвестувати безпосередньо в буржуазні підприємства."
  societal_values.2003.c: "Нехай виробники самі про себе дбають."
  societal_values.2004.t: "Ерозія майстерності"
  societal_values.2004.desc: "Оскільки наша економіка прагне подальшого зростання та задоволення потреб населення, майстерні повільно перетворюються на мануфактури. Там, де колись митці вкладали індивідуальну турботу в кожен виріб, тепер робітники працюють за щільним графіком, щоб масово виробляти стандартизовані продукти.\n\nВажко сперечатися з результатами, але багато хто задається питанням, чи варта вища продуктивність нижчих стандартів якості та згасання краси."
  societal_values.2004.a: "Стандартизація – це шлях."
  societal_values.2004.b: "Ми повинні повернутися до майстерності."
  societal_values.2005.t: "Аграрні громади"
  societal_values.2005.desc: "У ці часи швидких змін наші традиційні шляхи призвели до відродження аграрної громади. Хоча, можливо, вони не такі продуктивні, як гамірні міські центри, вони забезпечують рівень сталості та соціальної згуртованості, який інакше неможливо досягти без значних витрат часу та зусиль.\n\nМожливо, нам варто заохочувати це відродження, щоб і надалі пожинати плоди нашої традиціоналістської економіки?"
  societal_values.2005.a: "Заохочувати відродження."
  societal_values.2005.b: "Прагнути до урбанізації натомість."
  societal_values.2006.t: "Поновлена увага до традиційних практик"
  societal_values.2006.desc: "Наш народ, загублений у вирі змін, почав звертатися до практик своїх предків. Вони прагнуть краще гармонізувати, а не адаптувати свої громади до довкілля, вони підтримують давні місцеві традиції, вирощують велике розмаїття нетоварних культур та досліджують медичні практики, які були відкинуті як нісенітниця недавніми поколіннями.\n\nЦя поновлена увага значно зміцнює наші громади, але вона також заохочує децентралізоване управління та почуття місцевої незалежності, ми повинні вирішити, чи є дозволити людям дотримуватися старих звичаїв благом, чи загрозою для держави."
  societal_values.2006.a: "Заохочувати традиційні практики."
  societal_values.2006.a.tt: "Деякі з наших сільських місцевостей отримають вигоду від щедрих врожаїв."
  societal_values.2006.b: "Просувати економічну модернізацію."
  societal_values.2006.b.tt: "Простолюдини в деяких наших сільських місцевостях будуть незадоволені."
  societal_values.2007.t: "Збільшення общинних земель"
  societal_values.2007.desc: "По всій нашій країні було відзначено збільшення формування «общинних земель», спільних земель між [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Звісно, [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] скаржаться, що общинні землі є застарілим методом, менш продуктивним, ніж їхнє перетворення на огородження. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] рішуче виступають проти цієї ідеї, посилаючись на вікові права та важливість общинних земель для їхнього існування.\n\nРішення тепер лягає на державу: чи повинні ми підтримувати традиції та дозволити общинним землям процвітати, чи шукаємо ми шлях вперед до модернізації нашої сільськогосподарської структури?"
  societal_values.2007.a: "Підтримувати общинні землі."
  societal_values.2007.b: "Віддавати перевагу огородженням."
  societal_values.2008.t: "Сільськогосподарська стабільність"
  societal_values.2008.desc: "Чудові новини! Наша увага до традиційної економіки буквально принесла плоди.\n\nЦього року ми пожинаємо плоди традицій, оскільки наші поля дають більший урожай, ніж очікувалося. У той час як інші нації зосереджуються на прибуткових експортних культурах, які дуже чутливі до змін довкілля, наші культури процвітають, а наш народ залишається нагодованим. Жодна кількість золота не може бути ціннішою за стабільність, яку хороший урожай забезпечує [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]."
  societal_values.2008.a: "Нехай народ радіє!"
  societal_values.2009.t: "Повернення бартеру"
  societal_values.2009.desc: "Оскільки наша нація продовжує все більше занурюватися в традиційну економіку, можна спостерігати значний зсув у повсякденних операціях [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Бартер, практика прямого обміну товарами без проміжних засобів, таких як монети, значно зріс у популярності.\n\nХоча це відродження підриває вплив [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], воно призвело до більшого ступеня економічної активності на низовому рівні та стабільності в наших сільських поселеннях."
  societal_values.2009.a: "Дозволити бартеру продовжуватися."
  societal_values.2009.b: "Запровадити використання монет."
  societal_values.2010.t: "Піднесення Торгового Дому"
  societal_values.2010.desc: "Самі правила, які колись забезпечували якість та послідовність у продукції гільдій, почали розглядатися як обмежувальні для бізнесу. Хто може приєднатися, що виробляється, де продається і кому продається — все це гільдії часто регулюють дуже суворо. Нове, молодше покоління купців розглядає ці колись захисні правила не інакше як перешкоди для економіки, що швидко розвивається, та бізнесу, що швидко змінюється.\n\nТаким чином, торгові доми почали затьмарювати гільдії, вони пропонують більші свободи та можливості, але плюють в обличчя традиційним гільдійським структурам, які колись були ядром багатьох громад."
  societal_values.2010.a: "Економіка розвивається, як і повинна."
  societal_values.2010.b: "Гільдії повинні залишатися домінуючими!"
  trade_houses_over_guilds: "Зосередитися на торгових домах замість гільдій"
  guilds_over_trade_houses: "Зосередитися на гільдіях замість торгових домів"
  societal_values.2011.t: "Індивідуальний митець"
  societal_values.2011.desc: "Зі зростанням системи меценатства у світі почали з'являтися окремі митці. Раніше мистецтво створювалося в майстернях групами невідомих людей, але тепер почали з'являтися митці зі славою, які вимагають вищих цін за свої роботи.\n\nБагато хто вітає це як потенційний початок нової ери мистецтва, але багато хто стурбований тим, що ситуація може вийти з-під контролю. Дозвіл митцям ставати відомими впливає на ціни на мистецтво, зменшує владу майстерень і може навіть призвести до того, що митці з часом стануть частиною еліти."
  societal_values.2011.a: "Ми всі заслуговуємо на увагу."
  societal_values.2011.b: "Мистецтво належить майстерні."
  societal_values.2012.t: "Приватні розваги"
  societal_values.2012.desc: "Театр, камерна музика, застілля, літературні гуртки, колекціонування мистецтва, приватні сади та бали — так багато способів для людей розважатися приватно нині. Однак ці розваги помітно менші за масштабом, набагато приватніші та індивідуальніші, і зазвичай призначені для вищих верств суспільства.\n\nПоки можновладці розважаються, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які колись процвітали в епоху великих публічних святкувань, залишаються зі зменшеним бюджетом і рідкіснішими святкуваннями. Доки всі серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] не зможуть насолоджуватися таким рівнем розваг, вони залишатимуться в тузі; можливо, державі варто заохочувати більше публічних заходів?"
  societal_values.2012.a: "Розваги найкраще знаходити наодинці."
  societal_values.2012.b: "Усі повинні розважатися разом!"
  societal_values.2013.t: "Індивідуальне землеволодіння"
  societal_values.2013.desc: "Хоча це й не було нечуваним, останнім часом зросла кількість осіб, які почали викуповувати землю у своїх титульних власників. Це надає більшу свободу зазначеним особам і дозволяє їм отримувати повний прибуток від свого врожаю, але шкодить здатності держави збирати належне через данину чи оподаткування.\n\nЗагалом легше оподатковувати великі ділянки землі, що належать установі чи шляхтичу, ніж багатьох окремих фермерів. Дозвіл на це може бути кроком вперед для народу, але може бути кроком назад для держави..."
  societal_values.2013.a: "Народ має право купувати землю."
  societal_values.2013.b: "Заборонити несанкціоновані покупки землі."
  societal_values.2014.t: "Професійне правосуддя"
  societal_values.2014.desc: "У міру того, як наше суспільство відходить від цінностей громадського судочинства, суди, наповнені звичайними людьми, повільно замінюються юридичними професіоналами. Якщо в минулі часи правосуддя здійснювалося на основі звичаїв і традицій громади та мудрості її найважливіших членів, то зростання усвідомлення прав особистості призвело до збільшення кількості суддів, які діють від імені [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] для врегулювання суперечок.\n\nХоча ця зміна забезпечує кращу стандартизацію правосуддя по всьому [ROOT.GetCountry.GetFlavorRank], вона призвела до того, що громади віддалилися від процесу, тужачи за часами, коли правосуддя було відповідальністю, яку розділяло все місто."
  societal_values.2014.a: "Прийняти професійних суддів."
  societal_values.2014.b: "Заохочувати громадське правосуддя."
  societal_values.2015.t: "Ради громадської земельної реформи"
  societal_values.2015.desc: "У міру того, як наше суспільство зближується, а громада має більший вплив на життя окремих осіб та порядок речей, у невеликих містах почали формуватися ради для кращого управління розподілом виділених земель. Зазвичай це обмежується лише спільними землями, але вони повільно почали втручатися в контроль над земельними наділами фермерів, незважаючи на бажання титульного власника.\n\nСеляни вважають це правом і обов'язком громади управляти землею, але [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] розглядають це як не більше ніж зручне підривання влади. Безсумнівно, реформи працюють, але дозвіл цим радам діяти ставить під сумнів праведність землевласників та їхній початковий поділ землі."
  societal_values.2015.a: "Дозволити радам продовжувати діяльність."
  societal_values.2015.b: "Забезпечити виконання початкового розподілу землі."
  societal_values.2016.t: "Громадське правосуддя"
  societal_values.2016.desc: "У міру того, як наше суспільство розвивається, щоб більше цінувати внесок громади, суди стали більш залежними, ніж будь-коли, від суджень важливих членів громади та згоди громадськості щодо визначення долі підсудного. Більше не холодна, недосконала, негнучка папірця вирішуватиме долю людей, натомість накопичена мудрість містян, які живуть поруч із підсудним, стала суддями, а не присяжними, для кожного, хто, як стверджується, скривдив громаду.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] подобається ця форма правосуддя, але багато містян та вчених сумніваються у справедливості вироку, винесеного непрофесіоналами. Чи повинна держава дозволити цьому продовжуватися?"
  societal_values.2016.a: "$societal_values.2014.b$"
  societal_values.2016.b: "Заохочувати професійне, писане право."
  societal_values.2017.t: "Громадська оборона"
  societal_values.2017.desc: "Чи то з патріотичного обов'язку, любові до своєї громади, чи через недовіру до наших оборонних можливостей, громади по всьому нашому володінню почали формувати громадські ополчення. Невеликі, неорганізовані, незалежні армії, які можна скликати, коли їм загрожує небезпека. Незалежно від того, що люди можуть думати про наших військових, це гідно подиву, бачити, як багато хто виступає перед обличчям небезпеки, щоб захистити те, що їм дороге.\n\nВ результаті, кількість [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], яких можна скликати в часи потреби, різко зросла."
  societal_values.2017.a: "Їхня відданість послужить нам добре..."
  societal_values.2017.b: "Ополчення – це ризик, включіть їх до складу армії!"
  societal_values.2018.t: "Громадська освіта"
  societal_values.2018.desc: "Грамотні почали організовувати невеликі та неформальні школи, де діти та менш обдаровані вчаться читати та писати.\n\nЦі громадські школи діють поза нашими системами, але надають безцінну та самовіддану послугу нашим громадам."
  societal_values.2018.a: "Громада навчає та вчиться!"
  societal_values.2018.b: "Це найкраще залишити нашим вже існуючим установам."
  societal_values.2019.t: "Розширення тісно пов'язаної родини"
  societal_values.2019.desc: "Подібно до зміни наших суспільних цінностей, що відходять від індивідуалізму та рухаються до комуналізму, сама тканина, що тримає наше суспільство разом, родина, почала змінюватися та трансформуватися з плином часу.\n\nІдея тісно пов'язаної родини почала відкидатися на користь розширених сімейних структур. Бабусі, дідусі, дядьки та двоюрідні брати та сестри тепер підтримують тісний контакт та діляться ресурсами та обов'язками з рештою родини. Ці зв'язки міцні та допомагають створити мережу безпеки, де вся родина піклується про кожного."
  societal_values.2019.a: "Всі люблять родину."
  societal_values.2020.t: "Можливість для емісара"
  societal_values.2020.desc: "Завдяки зосередженості нашої нації на зовнішній політиці, тепер з'явилася можливість відправити емісарів до [target_country.GetName]. Вони передадуть наші побажання їхньому уряду, створюючи можливість зблизити наші нації або роз'єднати їх, якщо ми того забажаємо."
  societal_values.2020.a: "Передайте наші вітання [target_country.GetAdjectiveWithNoTooltip]."
  societal_values.2020.b: "Вони заслуговують на образу!"
  societal_values.2021.t: "Міжнародний торговий ярмарок"
  societal_values.2021.desc: "Наша зовнішня політика надає можливість організувати короткий міжнародний торговий ярмарок, показуючи світові безліч товарів та багатств, що знаходяться в наших кордонах. Звісно, з товарами, представленими за зниженою ціною та з дещо перебільшеними характеристиками, щоб вразити іноземних сановників та купців.\n\nЦе буде дорога справа, але це, безумовно, змусить нації, з якими ми торгуємо, приділяти нам більше уваги. Альтернативно, ми завжди могли б залишити гроші собі та натомість інвестувати їх у місцеву торгівлю."
  societal_values.2021.a: "Фінансувати торговий ярмарок."
  societal_values.2021.b: "Інвестувати в місцеву торгівлю."
  merchant_power_key_local_trade_focus: "Фокус на місцевій торгівлі"
  societal_values.2022.t: "Іноземні ветерани-добровольці"
  societal_values.2022.desc: "У наш час потреби, наша зовнішня політика прийшла нам на допомогу.\n\nНевелика кількість іноземних ветеранів прийшла нам на допомогу, принісши з собою перевірені тактики, які наші війська можуть використовувати для підвищення своєї ефективності в бою. Прийняття їхньої допомоги покращило б наші можливості у війні, хоча відмова їм може сигналізувати, що ми й так достатньо сильні."
  societal_values.2022.a: "Вітаємо добровольців."
  societal_values.2022.b: "Ми добре справляємося зі своїми людьми."
  societal_values.2023.t: "Технології через культурний обмін"
  societal_values.2023.desc: "Наша зовнішньополітична позиція призвела до багатьох культурних обмінів останнім часом, але один з них нещодавно став помітним для держави та її інститутів, оскільки завдяки йому ми отримали подальше розуміння іноземних винаходів та технологій..."
  societal_values.2023.a: "Відібрати!"
  societal_values.2023.b: "Ми можемо розробити власні технології!"
  STATIC_MODIFIER_NAME_generic_minor_research_bonus: "Незначні дослідницькі зусилля"
  societal_values.2024.t: "Дослідницьке захоплення!"
  societal_values.2024.desc: "Наше суспільство, як відображено в нашій зовнішній політиці, високо цінує інших. Зазвичай це означало не більше, ніж взаємодію з нашими сусідами, але в цю епоху досліджень люди не можуть не бути схвильованими перспективою зустрічі та взаємодії з іноземними культурами з далеких земель.\n\nЦе захоплення безпосередньо перетворилося на приплив пожертвувань та волонтерів до однієї з наших поточних експедицій. Нехай ми знайдемо те, що шукаємо."
  societal_values.2024.a: "Їхні пожертви вітаються."
  societal_values.2024.b: "Ці ресурси найкраще зберігати всередині нашої держави..."
  societal_values.2025.t: "Інфраструктурний поштовх"
  societal_values.2025.desc: "Державний апарат — це чудова машина, яку потрібно не лише постійно змащувати та підтримувати, але й розширювати та вдосконалювати.\n\nСьогодні місцеві та державні органи влади визнають цінність інфраструктури, механізму, що дозволяє нашій державі функціонувати з дедалі більшою ефективністю. Таким чином, на всіх рівнях уряду спостерігається поштовх до розвитку інфраструктури, що проявилося у формі здешевлення будівельних витрат. Було б розумно скористатися цим."
  societal_values.2025.a: "Держава покращиться."
  societal_values.2025.b: "Ми завжди могли б привласнити кошти..."
  STATIC_MODIFIER_NAME_infrastructure_focus: "Фокус на інфраструктурі"
  STATIC_MODIFIER_DESC_infrastructure_focus: "Наші національні зусилля з покращення інфраструктури знижують витрати."
  societal_values.2026.t: "Культурний ренесанс"
  societal_values.2026.desc: "Зосередження на собі привело нас до усвідомлення важливості нашої культури. Хто ми? Звісно, більше, ніж просто набір карлючок на карті, чи мова, чи монета.\n\nНі, ми — народ, народ, пов'язаний і керований нашими культурами. Це майже нарцисичне зосередження на собі призвело до ренесансу нашої культури, кожен у нашій країні знає, що має пишатися тим, що є [ROOT.GetCountry.GetAdjective]."
  societal_values.2026.a: "Наша культура править!"
  societal_values.2026.b: "Можливо, нам варто повчитися й у інших..."
  STATIC_MODIFIER_NAME_growing_families: "Зростаючі родини"
  societal_values.2027.t: "Протекціонізм"
  societal_values.2027.desc: "Нашим купцям не потрібно боротися. У наших кордонах, на наших ринках ми беззаперечно пануємо над усім. Чому [ROOT.GetCountry.GetAdjective] купці повинні боротися на власному ринку? Чому їхні підприємства повинні бути замінені іноземними?\n\nЗаради блага держави ми маємо можливість запровадити м'який, короткочасний сплеск протекціоністських ринкових правил, щоб розширити можливості наших купців та процвітати економічно без ризику. Звісно, якщо ми не запровадимо ці протекціоністські правила, можливо, буде більш негайна економічна вигода..."
  societal_values.2027.a: "Наші купці на першому місці."
  societal_values.2027.b: "Гроші є гроші..."
  societal_values.2028.t: "Національна освітня кампанія"
  societal_values.2028.desc: "Наші люди мають міцне тіло та характер, але вони ще не досягли висот сильного розуму. Оскільки наше суспільство так зосереджене на собі, цілком природно, що установи по всій країні починають координувати свої дії, щоб організувати національну освітню кампанію.\n\nЦе не щось таке вишукане, як стандартизована навчальна програма чи щось подібне, а скоріше проста кампанія з підвищення грамотності місцевими та національними установами, щоб довести кожного члена нашого суспільства до належного рівня. Чим швидше вони зможуть читати, тим швидше вони зможуть дізнатися, наскільки ми великі."
  societal_values.2028.a: "Давайте індоктри- навчимо їх!"
  STATIC_MODIFIER_NAME_literacy_drive: "Кампанія з підвищення грамотності"
  societal_values.2028.b: "Можливо, нам слід зосередитися на іноземних вченнях натомість..."
  societal_values.2029.t: "Внутрішня чистка"
  societal_values.2029.desc: "Виявилося, що кількох вищих офіцерів та адміністративних членів було підкуплено нашими ворогами та нашими так званими союзниками.\n\nУ відповідь лоялісти розпочали ретельне розслідування кожного члена уряду та згодом очистили від будь-яких ворожих елементів, які вони могли виявити. Велика кількість зрадників була повішена, що призвело до втрати охоплення та контактів іноземними шпигунськими мережами. Багато роботи ще залишається, зрадників ще належить виявити, повішення ще мають відбутися."
  societal_values.2029.a: "Добра робота."
  societal_values.2030.t: "Монастирські інтелектуали"
  societal_values.2030.desc: "У нашій державі інтелектуали не сидять замкнені у своїх домівках і не витрачають час на дивні теоретичні концепції у світських установах, натомість вони відвідують монастирі та використовують свої обдаровані уми на благо всього святого.\n\nНа практиці це означає, що ми благословенні практичними знаннями від наших релігійних установ, на благо народу, держави та нашої віри."
  societal_values.2030.a: "Нехай [ROOT.GetCountry.GetReligion.GetGodName] відкриє п'ятий постулат!"
  societal_values.2030.b: "Ставити під сумнів природу — це ставити під сумнів божественне! Припиніть!"
  STATIC_MODIFIER_NAME_research_is_unholy: "Дослідження, що вважаються нечестивими"
  STATIC_MODIFIER_DESC_research_is_unholy: "Досліджувати та ставити під сумнів світ навколо нас — це те саме, що робити це з божественним, ми не повинні ставити під сумнів божественність або шукати відповіді у творінні."
  societal_values.2031.t: "Божественні одкровення"
  societal_values.2031.desc: "У відображенні духовних шляхів нашого суспільства, [loc_leader_char.GetName] на мить досяг вищого рівня свідомості та отримав божественне видіння, що показало [loc_leader_char.GetHerHim], що [loc_leader_char.GetSheHe] має покращитися, перш ніж покращиться країна.\n\n[loc_leader_char.GetSheHe|U] більше не є тим, ким [loc_leader_char.GetSheHe] був колись, цей духовний досвід спонукав [loc_leader_char.GetHerHim] стати кращим, оскільки [loc_leader_char.GetSheHe] має здійснити [loc_leader_char.GetHerHis] видіння, щоб побачити, як [ROOT.GetCountry.GetLongName] підноситься."
  societal_values.2031.a: "Небеса благословляють нас!"
  societal_values.2031.b: "Ігнорувати цю дурість."
  societal_values.2033.t: "Виявлено святу реліквію"
  societal_values.2033.desc: "Антиквари, керовані духовними цінностями нашого суспільства, а не грошовими стимулами, виявили безцінну святу реліквію в [loc_random_find_location.GetName] і пожертвували її державі, щоб вона могла бути збережена для майбутнього.\n\nОднак [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] стверджують, що цей артефакт більше не відповідає нашій релігійній доктрині, оскільки він був втрачений, і його слід спалити, якщо це можливо. Незважаючи на це, люди все ще вважають його релігійно канонічним, і [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] готові заплющити на це очі, якщо ми наполягатимемо."
  societal_values.2033.a: "$common_string_it_belongs_in_a_museum$"
  societal_values.2033.b: "Спалити це, єресь!"
  societal_values.2034.t: "Войовничі віряни"
  societal_values.2034.desc: "Наше суспільство дуже побожне, і в часи війни наша висока повага до духовності призвела до формування войовничих орденів вірян для допомоги у військових зусиллях.\n\nДержава закликає вірних захищати себе, і вірні відповідають."
  societal_values.2034.a: "Дух незламний!"
  societal_values.2034.b: "Вся допомога, яка нам потрібна, походить від [ROOT.GetCountry.GetReligion.GetGodName]!"
  societal_values.2032.t: "Бум паломництва"
  societal_values.2032.desc: "Наш народ, керований своєю духовністю, став одержимий паломництвами. Вони не задовольняються простим відвідуванням наших великих місць поклоніння, вони вважають за краще подорожувати далеко і бачити місця паломництва [pilgrimage_target.GetName].\n\nОскільки так багато наших людей тепер подорожують до [pilgrimage_target.GetNameWithNoTooltip], наші стосунки з ними покращилися."
  societal_values.2032.a: "Наша спільна віра єднає нас!"
  societal_values.2032.b: "Немає потреби їхати за кордон, ми маємо власні святі місця!"
  societal_values.2034.knights: "$societal_values.2034.t$"
  societal_values.2035.t: "Релігійна толерантність"
  societal_values.2035.desc: "Останнім часом люди стали надзвичайно толерантними. Здається, наші гуманістичні цінності спонукають їх бачити в інших людей, а не втілення ідеї.\n\nЦе братання між людьми підвищує стабільність."
  societal_values.2035.a: "Під кожною вірою – людина."
  societal_values.2035.b: "Ми не повинні відвертати очі від єретиків!"
  societal_values.2036.t: "Світська освіта"
  societal_values.2036.desc: "Довгий час непотрібні релігійні вчення марнували той невеликий дорогоцінний час, який діти мали для вивчення корисних речей. Останнім часом відбувається рух, в якому навіть монастирі обирають більш світський підхід до освіти, спочатку навчаючи важливим навичкам, таким як грамотність та базова математика, а потім базікаючи про віру з рештою часу.\n\nЦя зміна у використанні часу повинна допомогти покращити нашу грамотність."
  societal_values.2036.a: "Прийняти світську освіту."
  societal_values.2036.b: "Вимагати повернення старої системи."
  societal_values.2037.t: "Cuius Regio, Eius Religio"
  societal_values.2037.desc: "Соціальна атмосфера в нашому регіоні, у поєднанні з гуманістичними цінностями нашого народу, спричинила дипломатичний прорив.\n\nСусідні нації погодилися, що кожна суверенна держава повинна мати право вирішувати, як поводитися зі своєю вірою, незалежно від того, наскільки вона неправильна чи єретична. Це згладило дипломатичні відносини з нашими сусідами, заклавши основу для подальших дипломатичних кроків."
  societal_values.2037.a: "Кожному своє."
  societal_values.2037.b: "Дурниці! Всі наші сусіди – єретики!"
  every_neighbor_country_gets_opinion_diplomatic_move_on_us: "Кожна сусідня [Concept('country', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowBiasValue('opinion_diplomatic_move')|+=0] думки про [ROOT.GetCountry.GetLongName]."
  societal_values.2038.t: "Наукові товариства"
  societal_values.2038.desc: "Наші гуманістичні цінності призвели до того, що багато грамотних людей утворюють невеликі наукові товариства, де вони обговорюють різноманітні практичні та непрактичні концепції та теми.\n\nВони не мають особливого значення індивідуально, але в цілому це захоплення може призвести до проведення деяких наукових досліджень, якими держава може скористатися."
  societal_values.2038.a: "Нехай вони будуть корисними."
  societal_values.2038.b: "Об'єднання грамотних – це загроза!"
  societal_values.2039.t: "Народження філософа"
  societal_values.2039.desc: "У нашому суспільстві, яке високо цінує гуманістичні цінності, нерідко можна побачити, як люди сперечаються та дискутують без обмежень. Це середовище вільної дискусії означає, що час від часу барна розмова переростає в усвідомлення кимось, що йому подобається думати, і він хоче обтяжувати всіх інших своїми постійними думками до кінця свого життя.\n\nТак народжуються філософи, такі як [target_philo.GetName], який нещодавно здобув місцеву славу. [target_philo.GetSheHe|U] може бути корисним для держави."
  societal_values.2039.a: "Ласкаво просимо до клубу."
  societal_values.2039.b: "Ігнорувати [target_philo.GetHerHim]."
  societal_values.2040.t: "Скорочення родини"
  societal_values.2040.desc: "Подібно до зміни в наших суспільних цінностях, що відходять від комуналізму та рухаються до індивідуалізму, сама тканина, яка тримає наше суспільство разом, сім'я, почала змінюватися та трансформуватися з плином часу.\n\nІдея розширеної сім'ї почала відкидатися на користь тісно згуртованих сімейних структур. Кому потрібен тягар далеких кузенів та прадідусів, про яких треба дбати? Індивід набагато вільніший, коли звільнений від відповідальності великої родини."
  societal_values.2040.a: "Вони лише тягар."
  societal_values.2100.title: "Перший Слуга Держави"
  societal_values.2100.desc: "[ROOT.GetCountry.GetLongName] насолоджувалася часом доброго правління, залишивши нам щасливе населення та стабільну країну. Все це завдяки нашій відданості правити як освічений деспот, просвічувати розум наших підданих, культивувати їхню мораль та робити їх настільки щасливими, наскільки це відповідає людській природі."
  societal_values.2100.a: "Добробут Держави має залишатися нашим першочерговим пріоритетом."
  societal_values.2101.title: "Необхідна Ціна"
  societal_values.2101.desc: "Через сприйняту загрозу з боку [target_rebel.GetName], більшість представників наших станів здаються більш поступливими, ніж зазвичай, у наданні [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] більших повноважень у боротьбі з ними. Але чому ми повинні скасовувати ці повноваження, коли загрозу буде усунено?"
  societal_values.2101.a: "Звісно, це лише для їхнього захисту!"
  societal_values.2102.title: "Філософська Підтримка"
  societal_values.2102.desc: "Відомий філософ у [target_artist.GetHisHer] рідній країні, [target_artist.GetName] розпочав листування з [target_ruler.GetName] щодо питань управління. Під час цих обмінів [target_artist.GetNameWithNoTooltip] згадав, що [target_artist.GetHeShe] незадоволений у [target_artist.GetHisHer] рідній країні та шукає менш обмежене середовище для творчості. Завдяки добрим стосункам, що склалися між [target_ruler.GetNameWithNoTooltip] та [target_artist.GetNameWithNoTooltip], наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] запросив [target_artist.GetHerHim] проживати в [ROOT.GetCountry.GetName]."
  societal_values.2102.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.2103.title: "Абсолютна Перемога"
  societal_values.2103.desc: "Наша держава тріумфує над ворожими силами, що протистояли абсолютистським тенденціям наших правителів. Без опозиції ми можемо насолоджуватися плодами наших зусиль та грітися в славі нашої перемоги."
  societal_values.2103.a: "Настав час діяти."
  societal_values.2104.title: "Центр Культури"
  societal_values.2104.desc: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName] відомий за межами наших кордонів своєю пишністю та майстерним дизайном. [ROOT.GetCountry.GetGovernment.GetCourtTitle] слугував натхненням для багатьох інших країн, і ми повинні заявити про це як про перемогу [ROOT.GetCountry.GetCulture.GetName] Культури!"
  societal_values.2104.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.2105.title: "Протест Станів"
  societal_values.2105.desc: "Наші зусилля щодо створення абсолютистської держави не залишилися непоміченими станами нашої країни, і вони вимагають від нас відмовитися від цих ідей абсолютистського правління на користь більш ліберального підходу."
  societal_values.2105.a: "Ми повинні наполягати сильніше."
  societal_values.2105.a.tt: "Всі наші [Concept('upper_class', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  societal_values.2105.b: "Поступитися їхнім вимогам."
  societal_values.2106.title: "Непопулярні Збирачі Податків"
  societal_values.2106.desc: "Ми відійшли від попередніх століть і почали збирати податки через державних чиновників, замість того, щоб залишати це в руках місцевих органів влади. Хоча це підвищило нашу ефективність у виявленні оподатковуваних товарів та точному нарахуванні податків на них, це непопулярне рішення серед станів, які повинні платити ці податки."
  societal_values.2106.a: "Вони повинні звикнути до цих нових обставин."
  societal_values.2106.b: "Зменшити деякі податки для компромісу."
  societal_values.2107.title: "З Божої ласки?"
  societal_values.2107.desc: "Церква могла б стати корисним союзником у наших зусиллях з реформування держави. Однак наш [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] залишається настороженим щодо цього процесу, оскільки він може підірвати їхній статус у нашій країні. Можливо, ми могли б укласти угоду про їхню підтримку?"
  societal_values.2107.a: "Деякі пожертви, безперечно, покращать їхню думку."
  societal_values.2107.b: "Нехай ця нагода мине."
  societal_values.2108.title: "Економіка держави"
  societal_values.2108.desc: "Щоб досягти більшого контролю над нашою державою, нам потрібно буде заохочувати місцеве виробництво на користь іноземного імпорту. На жаль, ми все ще покладаємося на торгові шляхи, що доставляють товари до наших земель. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] також рішуче виступають за продовження цього імпорту, посилаючись на занепокоєння щодо власних прибутків, якщо ми змістимо нашу увагу на перешкоджання цій торгівлі."
  societal_values.2108.a: "Можливо, вони мають рацію."
  societal_values.2108.b: "Ігнорувати їхні занепокоєння."
  societal_values.2109.title: "Тяжке становище селянства"
  societal_values.2109.desc: "Наш [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] сильно страждає під нашим суворим оподаткуванням. Багато хто скаржиться на нездатність дозволити собі достатньо їжі для утримання своїх сімей, особливо в районах з поганими врожаями. З цим важким тягарем їм буде важче нести відповідальність за догляд за ґрунтом наших земель."
  societal_values.2109.a: "Їхня думка щодо їхнього статусу не має значення."
  societal_values.2109.b: "Спробувати полегшити їхнє становище."
  societal_values.2110.title: "Культура [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] не шанується"
  societal_values.2110.desc: "Культура [ROOT.GetCountry.GetCulture.GetName] зазнала удару по репутації за останні роки, оскільки ми не наймаємо достатньо митців, щоб розважати наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] за високими стандартами, які очікуються від абсолютистського [ROOT.GetCountry.GetGovernment.GetRulerTitle]. На щастя, [target_artist.GetName] виявляє талант до [target_artist.GetHerHis] ремесла і міг би покращити наше культурне становище, якщо ми вирішимо найняти [target_artist.GetHimHer]."
  societal_values.2110.a: "Вкласти більше грошей у наших митців."
  societal_values.2110.b: "Яка взагалі цінність мистецтва?"
  societal_values.2111.title: "Підрив віри"
  societal_values.2111.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволений нашими зусиллями з реструктуризації держави. Вони звинувачують у підриві віри народу та довіри до божественності нашого правління. Джерелом їхнього занепокоєння може бути страх залишитися поза новою державою, тому може бути корисним запевнити їх у їхній значущості."
  societal_values.2111.a: "Вони звикнуть!"
  societal_values.2111.b: "Безперечно, їхню підтримку можна купити."
  societal_values.2112.title: "Занепокоєння [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  societal_values.2112.desc: "З постійно зростаючим набором до нашої постійної армії, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] здається, стурбований своїм становищем у військовій організації нашої країни. Хоча раніше вони відігравали важливу роль у зборі наших військ або фінансуванні дорогих найманих армій, тепер їм доводиться знаходити адекватне місце в нашому суспільстві."
  societal_values.2112.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  societal_values.2113.title: "Зловживання мас"
  societal_values.2113.desc: "Значна частина нашого населення не представлена в нашій абсолютистській державі, а взаємодія з нашими збирачами податків стала більш ворожою. Вони згадують зловживання та необґрунтовано високі податки, стягнуті нашими чиновниками, і вимагають підвищеного статусу в нашому уряді, щоб захистити себе від таких надмірностей."
  societal_values.2113.a: "Відмовити, що вони з цим зроблять?"
  societal_values.2113.a.tt: "Усі наші [ShowPopTypeName('peasants')] та [ShowPopTypeName('burghers')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  societal_values.2113.b: "Піддатися їхнім вимогам."
  societal_values.2114.title: "Неадекватний [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  societal_values.2114.desc: "Абсолютний [ROOT.GetCountry.GetGovernment.GetRulerTitle] має бути непогрішним і служити чудовим прикладом лідерства. На жаль, [target_ruler.GetName] не виправдав цих очікувань через [target_ruler.GetHerHis] нездатність керувати, надихати та вести народ [ROOT.GetCountry.GetName]. Це змусило наших підданих поставити під сумнів [target_ruler.GetHerHis] мандат на правління."
  societal_values.2114.a: "[target_ruler.GetSheHe|U] є ганьбою для держави."
  societal_values.2200.title: "Процвітаюча економіка"
  societal_values.2200.desc: "Наша відданість повазі до основних прав підданих, схоже, позитивно впливає на стан нашої економіки. Особливо [target_province.GetName] отримала вигоду, забезпечуючи нашу скарбницю значними внесками. Це чудова ситуація, що нам потрібно так мало робити, щоб пожинати плоди нашої політики."
  societal_values.2200.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.2201.title: "Угода народу"
  societal_values.2201.desc: "З частими сесіями нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] та загальним правом нашого народу бути почутим у його залах приходить певна гармонія між нашими станами. Це глибоко вкорінені цінності як у наших підданих, так і в принципах нашого уряду, що демонструє рішучість [ROOT.GetCountry.GetAdjective] народу до цінностей лібералізму."
  societal_values.2201.a: "Гарний і належний процес."
  societal_values.2202.title: "Рай для філософів"
  societal_values.2202.desc: "Наше суспільство високо цінує свободу особистості та свободу слова, і ці свободи захищені нашою надійною правовою системою. В останні десятиліття розвинулися певні кола, що обговорюють філософські теми та природу людства. Деякі з цих найкваліфікованіших осіб також готові тісно співпрацювати з державою, як-от [target_artist.GetName], який оселився в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  societal_values.2202.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.2203.title: "У згоді з урядом"
  societal_values.2203.desc: "Недавнє правління [target_ruler.GetName] було відзначене відсутністю конфліктів між [ROOT.GetCountry.GetGovernment.GetParliament.GetName] та рештою уряду, що призвело до ефективного та стабілізуючого періоду. Значна частина цього успіху також може бути приписана [target_ruler.GetNameWithNoTooltip] [target_ruler.GetHerselfHimself] завдяки [target_ruler.GetHerHis] кооперативній натурі."
  societal_values.2203.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.2204.title: "Тріумф держави"
  societal_values.2204.desc: "Ми досягли такого стану справ, коли дуже мало опозиції до нашого ліберального правління залишається. Наші стани та радники припинили змовлятися та чинити опір нашому курсу, принаймні наразі. Ми можемо очікувати меншого опору відтепер."
  societal_values.2204.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  societal_values.2205.title: "На спині держави"
  societal_values.2205.desc: "Хоча наша система правління залишається на контролюючих інституціях, вони не бездоганні. Корупція стала більш поширеною останнім часом, і наші стани, схоже, виявляють мало каяття, коли їх ловлять. Хоча ми можемо виправити деякі з цих зловживань реактивно, це залишатиметься звичайним явищем протягом наступних років."
  societal_values.2205.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  societal_values.2206.title: "Остерігайтеся невіруючих"
  societal_values.2206.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] користувалося поважним статусом у нашому суспільстві. Однак, із поширенням ідей $enlightenment$ у нашій країні, розвинулися нові думки. Деякі стверджують, що вони не лише обговорюють природу [ROOT.GetCountry.GetReligion.GetGodName], але й ставлять під сумнів саме існування божественності."
  societal_values.2206.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  societal_values.2207.title: "Свобода на папері"
  societal_values.2207.desc: "Хоча ми гарантуємо певні права нашому населенню, навіть нижчим верствам, наша країна все ще пронизана зловживаннями владою вищого класу проти тих, кого вони вважають меншими. Важке оподаткування лише збільшило тягар [ShowPopTypeName('peasants')], а скарги на нашу бездіяльність стрімко зросли."
  societal_values.2207.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  societal_values.2207.a.tt: "Усі наші [ShowPopTypeName('peasants')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  societal_values.2208.title: "Туга за минулим"
  societal_values.2208.desc: "Із триваючою лібералізацією нашої економіки, більше [ShowPopTypeName('burghers')] придбали землі та тепер наймають [ShowPopTypeName('peasants')] на тих самих землях. Наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] виступають проти цих нових землевласників, посилаючись на їхнє краще життя за попередніх умов. Деякі з них вже переселилися з цих земель у [target_province.GetName], де поля та ліси лежать невикористаними."
  societal_values.2208.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  societal_values.2209.title: "Шляхетська змова"
  societal_values.2209.desc: "Незадоволені поступовою втратою влади, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] підірвали наші зусилля щодо закріплення законних прав усіх наших підданих. Нам знадобиться деякий час, щоб усунути завдану ними шкоду та усунути винних з їхніх посад."
  societal_values.2209.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  societal_values.2210.title: "Критика уряду"
  societal_values.2210.desc: "Один із найшанованіших членів нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_artist.GetName], написав про принципи лібералізму та про те, наскільки добре наш власний уряд відповідає цим високим ідеалам. На жаль, [target_artist.GetSheHe] вказав на кілька серйозних недоліків, які могли б дестабілізувати наше правління, якби їх було опубліковано. Ми все ще могли б запобігти публікаціям, але нам довелося б діяти швидко."
  societal_values.2210.a: "Придушити ці писання."
  societal_values.2210.b: "Дозволити [target_artist.GetHerHim] продовжувати."
  societal_values.2211.title: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName] у конфлікті"
  societal_values.2211.desc: "Нашу поточну сесію [ROOT.GetCountry.GetGovernment.GetParliament.GetName] затьмарила суперечка між нашими [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] щодо нашої торгової політики. Якщо ми не втрутимося, цей конфлікт може спричинити подальші проблеми."
  societal_values.2211.a: "Нагадати їм про їхні обов'язки."
  societal_values.2211.b: "Зрештою, вони заспокояться."
  societal_values.2212.title: "Носії закону"
  societal_values.2212.desc: "Наші люди в [target_province.GetName] не бажають підкорятися нашим законам лібералізму і воліють, щоб їхня провінція існувала в особливому стані, зневажаючи більш традиційні тлумачення та застосування. Однак, заплющуючи очі на їхню непокору, ми підірвемо наш авторитет і, що гірше, авторитет наших законів."
  societal_values.2212.a: "Залишити їх у спокої."
  societal_values.2212.b: "Ми все одно спробуємо це застосувати."
  societal_values.2213.title: "Творчість [target_artist.GetNameWithNoTooltip]"
  societal_values.2213.desc: "[target_artist.GetName], визнаний митець нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], останніми роками критикував роботу нашого уряду. [target_artist.GetSheHe|U] особливо зосереджений на функції правителя як інституції, що стоїть понад будь-яким контролем, ідеалізуючи абсолютистські тенденції інших країн."
  societal_values.2213.a: "Можливо, [target_artist.GetSheHe] має рацію в деяких речах."
  societal_values.2213.b: "Запропонувати [target_artist.GetSheHe] завжди покинути країну."
  societal_values.2214.title: "Розділений уряд"
  societal_values.2214.desc: "Напрямок нашого уряду все ще залишається невизначеним, ми стоїмо перед можливістю сформувати його на нашу користь. Хоча уряд, що відповідає ідеям лібералізму, зашкодив би нашому правлінню з ласки [ROOT.GetCountry.GetReligion.GetGodName], абсолютне правління [ROOT.GetCountry.GetGovernment.GetRulerTitle] дестабілізувало б наші стосунки з деякими іншими членами нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  societal_values.2214.a: "Тримати курс на лібералізм."
  societal_values.2214.b: "Прагнути до абсолютистського ідеалу."
  societal_values.2300.title: "Позиція [target_character.GetNameWithNoTooltip]"
  societal_values.2300.desc: "Здається, культура, яку демонструє [target_character.GetName], нині наш [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle], відхилилася від китаїзованих норм, очікуваних у [GetInternationalOrganization('middle_kingdom').GetName]. Дійсно, [target_character.GetHerHis] кричуща зневага до етикету може поставити під загрозу весь [ROOT.GetCountry.GetFlavorRank], на думку наших радників. Ми не чужі культурним тертям, і нам слід добре подбати, щоб ця ситуація не переросла в щось серйозніше."
  societal_values.2300.a: "Вигнати [target_character.GetHerHim]!"
  societal_values.2300.b: "[target_character.GetSheHe|U] стане [target_culture.GetNameWithNoTooltip]!"
  societal_values.2300.c: "Ми не втручатимемося."
  scale_with_sinicized_unsinicized_key: "масштабуватиметься на основі наших [ShowSocietyDirectionName('sinicized')] та [ShowSocietyDirectionName('unsinicized')] [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e]"
  stability_cost_scales_with_sinicized_vs_unsinicized_tt: "[Concept('stability', 'CONCEPT_PLACEHOLDER')|e] $scale_with_sinicized_unsinicized_key$"
  legitimacy_cost_scales_with_sinicized_vs_unsinicized_tt: "[Concept('government_power', 'CONCEPT_PLACEHOLDER')|e] $scale_with_sinicized_unsinicized_key$"
  between_3_5_become_chinese_tt: "Деякі з наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] приймуть [target_culture.GetName] [Concept('culture', 'CONCEPT_PLACEHOLDER')|e]"
  societal_values.2301.title: "Хвиля китаїзації"
  societal_values.2301.desc: "Наша присутність у сфері впливу [GetInternationalOrganization('middle_kingdom').GetName] — це складні стосунки між [target_character1.GetName] та [target_character2.GetName]. Контакт між нашими двома царствами породив іскри китаїзації. Дійсно, [target_sinicized_pop_scope.GetName] нещодавно почали демонструвати елементи впливу [target_culture.GetName] культури, всупереч нашим нормам."
  societal_values.2301.a: "З цього не може бути нічого поганого."
  societal_values.2301.b: "Не забуваймо про наше коріння!"
  societal_values.2302.title: "Фракційні боротьби"
  societal_values.2302.desc: "Напруга в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] досягла критичної точки. [target_character1.GetName], затятий захисник [target_native_culture.GetName] звичаїв, і [target_character2.GetName], чиє прийняття [target_culture.GetName] звичаїв стало сумнозвісним, почали відкрито конфліктувати. Їхня суперечка розділила наших радників на дві конкуруючі фракції — одна закликає до тісніших зв'язків з [GetInternationalOrganization('middle_kingdom').GetName], інша вимагає відкинути такий іноземний вплив і відновити наші власні традиції. Обидві фракції підтримуються здібними членами нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], такими як [target_sinophile.GetName] або [target_nativist.GetName]."
  societal_values.2302.a: "Віддати перевагу китаїзованій фракції [target_character1.GetShortNameWithNoTooltip]."
  societal_values.2302.b: "Прислухатися до [target_character2.GetShortNameWithNoTooltip] та рідної фракції."
  societal_values.2302.c: "Нехай вони розбираються між собою."
  societal_values.2303.title: "Виклик [target_country.GetNameWithNoTooltip]"
  societal_values.2303.desc: "Наша позиція лідера [GetInternationalOrganization('middle_kingdom').GetName] передбачає обов'язок підтримувати гармонію серед її членів. До [target_character1.GetName] дійшли повідомлення, що [target_character2.GetName], [target_country.GetGovernment.GetRulerTitle] [target_country.GetName], відкрито знехтував синіфікованими нормами [GetInternationalOrganization('middle_kingdom').GetName] та проігнорував етикет, що об'єднує нашу сферу. Якщо це залишити без уваги, така образа може послабити наш престиж і заохотити інших наслідувати цей приклад."
  societal_values.2303.a: "Нагадайте їм їхнє місце."
  societal_values.2304.title: "Попередження [target_character1.GetNameWithNoTooltip]"
  societal_values.2304.desc: "Прибуває посланець від [target_mkio_leader.GetName], лідера [GetInternationalOrganization('middle_kingdom').GetName], засуджуючи наше відхилення від синіфікованих норм і вимагаючи негайного виправлення. Дотримання відновить гармонію в майбутньому ціною втрати обличчя та авторитету вдома в короткостроковій перспективі. Виклик, однак, ризикує осудом та санкціями, що можуть ізолювати наш [ROOT.GetCountry.GetFlavorRank] у межах сфери."
  societal_values.2304.a: "Зобов'яжіть [target_mkio_leader.GetGovernment.GetRulerTitle]."
  societal_values.2304.b: "Порожні погрози!"
  societal_values.2305.title: "Соціальний спротив проти [ShowSocietyDirectionNameWithNoTooltip('sinicized')] політики"
  societal_values.2305.desc: "Ми перегнули палицю у своєму прагненні прийняти синіфіковану культуру! Гільдії бурчать через дорогі церемонії, місцеві традиціоналісти протестують проти руйнування їхніх звичаїв, а чутки про фаворитизм поширюються від [ROOT.GetCountry.GetCapital.GetName] до глибинки. Те, що колись обіцяло витонченість, тепер сприймається як іноземна зухвалість, оскільки елементи нашого суспільства обертаються проти нашої політики. Якщо ми продовжимо без коригувань, ми ризикуємо підірвати стабільність, відштовхнути стани або виснажити наш культурний авторитет."
  societal_values.2305.a: "З часом вони зрозуміють."
  societal_values.2306.title: "[ShowSocietyDirectionNameWithNoTooltip('unsinicized')] політика викликає спротив"
  societal_values.2306.desc: "Наше відхилення від синіфікованих норм почало важко позначатися на [ROOT.GetCountry.GetFlavorRank]. Придворні шепочуться про зниження легітимності, міністри сперечаються між собою, а вчені скаржаться на застій, оскільки іноземні знання відкидаються. Те, що колись здавалося гордим захистом нашої спадщини, тепер ризикує послабити нашу державу та підірвати наше місце серед сусідів."
  societal_values.2307.title: "[ShowSocietyDirectionNameWithNoTooltip('sinicized')] цінності приносять користь"
  societal_values.2307.desc: "Наше поглиблене прийняття синіфікованих обрядів та знань принесло відчутні результати. Дійсно, придворні церемонії проходять з новою точністю, вчені діляться методами з [GetInternationalOrganization('middle_kingdom').GetName], а міністри, навчені витонченій державності, покращують управління. Чи то через спокійніші провінції, швидкі успіхи в знаннях, чи покращення наших провідних чиновників, переваги цього вирівнювання очевидні."
  societal_values.2307.a: "$common_string_very_well$"
  societal_values.2308.title: "[ShowSocietyDirectionNameWithNoTooltip('unsinicized')] політика приносить користь"
  societal_values.2308.desc: "Твердо стоячи проти хвилі синіфікації, наш народ відновив гордість за свою спадщину. Звичаї, які колись вважалися архаїчними, тепер слугують стовпами єдності, надаючи більшої легітимності нашому правлінню та зміцнюючи культурну тканину, що відрізняє нас від [GetInternationalOrganization('middle_kingdom').GetName]."
  societal_values.2309.title: "[target_province.GetNameWithNoTooltip] чинить опір синіфікації"
  societal_values.2309.desc: "Наш поновлений поштовх до приведення нашої адміністрації у відповідність до [ShowSocietyDirectionName('sinicized')] стандартів зустрів жорсткий опір у [target_province.GetName]. Старійшини гільдій, хранителі святилищ та місцеві знатні особи засуджують іноземні обряди та письмена, попереджаючи, що подальший тиск розірве громадські зв'язки. Деякі просять поблажливості, інші погрожують тихою обструкцією, а змішані громади провінції стають обережними щодо наших намірів."
  societal_values.2309.a: "Їхні скарги безпідставні."
  societal_values.2309.b: "Зважте на їхні занепокоєння!"
  pops_in_target_province_resist_sinicization_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], намагаючись чинити опір нашій [ShowSocietyDirectionName('sinicized')] політиці"
  societal_values.2310.title: "[target_estate.GetNameWithNoTooltip] чинить опір [ShowSocietyDirectionNameWithNoTooltip('unsinicized')] політиці"
  societal_values.2310.desc: "Наш відхід від синіфікованих норм не залишився непоміченим при [ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetCapital.GetName]. [target_estate.GetName] стверджує, що відмова від встановленого етикету послабить наше становище та підірве престиж нашого [ROOT.GetCountry.GetFlavorRank]. Вони наполягають, щоб ми переглянули наш курс, перш ніж їхній вплив та лояльність будуть втрачені."
  societal_values.2310.a: "[target_estate.GetNameWithNoTooltip] не диктує нашу політику!"
  societal_values.2310.b: "Прислухайтеся до занепокоєнь стану."
  societal_values.2311.title: "Мілітаризація Двору"
  societal_values.2311.desc: "Зростаюче домінування нативістських голосів у нашому [ROOT.GetCountry.GetFlavorRank] змістило баланс [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Цивільних адміністраторів відсувають на другий план, тоді як генерали та войовничі міністри здобувають вплив, закликаючи нас обрати більш войовничий напрямок для держави."
  societal_values.2311.a: "Поставте солдатів в основу управління."
  societal_values.2311.b: "Підтримуйте авторитет цивільного [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  societal_values.2312.title: "Покращення в Бюрократії"
  societal_values.2312.desc: "Наші адміністративні практики та удосконалені процедури двору почали приносити плоди. За прикладом [target_character.GetName], наші міністерства оптимізували свої процедури, записи стали чіткішими, а чиновники застосовують більш вимогливі стандарти, запозичені з китаїзованого управління."
  societal_values.2312.a: "Кодифікуйте найкращі практики в усіх міністерствах."
  societal_values.2313.title: "Ринки [GetInternationalOrganization('middle_kingdom').GetNameWithNoTooltip]"
  societal_values.2313.desc: "Тісніше узгодження з китаїзованими звичаями відкрило двері для нашого [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] у [GetInternationalOrganization('middle_kingdom').GetName]. Хитрий новий купець, [target_character.GetName], пропонує стандартизовані контракти та придворний етикет для гільдійських посланців, обіцяючи кращий доступ до ринків та прихильність серед китаїзованих партнерів."
  societal_values.2313.a: "Ми любимо звук дзенькоту золота у нашому гаманці!"
  societal_values.2314.title: "Рідні Натхнення"
  societal_values.2314.desc: "Відомий ремісник [target_character.GetName] презентує амбітну роботу, на основі наших власних історій, мотивів та обрядів. Придворні та простолюдини однаково захоплені, а меценати прагнуть побачити її завершеною — підтвердження того, що наша спадщина сяє, не потребуючи вираження у запозичених формах."
  societal_values.2314.a: "Мистецтво промовляє до нашої душі."
  gains_depend_on_scope_target_character_total_abilities: "Здобутки для нашої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] залежатимуть від [Concept('total_ability', 'CONCEPT_PLACEHOLDER')|e] [target_character.GetName]"
  societal_values.2315.title: "Прибувають Мігранти з [target_province_origin.GetNameWithNoTooltip]"
  societal_values.2315.desc: "Групи сімей почали залишати [target_province_origin.GetName], перетинаючи наші землі з [target_country.GetName]. Приваблені новими можливостями або незадоволені місцевою адміністрацією, ці мігранти тепер осідають у [target_province_destination.GetName], приносячи з собою звичаї та навички, що можуть змінити баланс нашого суспільства, наближаючи нас до [GetInternationalOrganization('middle_kingdom').GetName]."
  societal_values.2316.title: "Багато Рук [target_country.GetNameWithNoTooltip]"
  societal_values.2316.desc: "Посланці з [target_country.GetName], лідера [GetInternationalOrganization('middle_kingdom').GetName], прибувають до наших воріт, приносячи щедрі данини та символічні подарунки. Прийняти їх — означає визнати престиж їхнього становища та наблизитися до їхньої орбіти, тоді як відмова буде розцінена як акт гордовитої непокори, ризикуючи безладом та неслухняними станами вдома."
  societal_values.2316.a: "Відверніть їхні дари."
  societal_values.2316.b: "Лише дурень відмовив би їм."
  societal_values.2317.title: "Культурні Зіткнення у [target_province.GetNameWithNoTooltip]"
  societal_values.2317.desc: "[target_culture.GetName] мігранти вкорінилися у [target_province.GetName], і їхня зростаюча присутність тепер викликає складні питання. Деякі члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] закликають нас накласти суворіші обмеження на їхні права, побоюючись нелояльності та культурного розмивання, тоді як інші стверджують, що прояв толерантності зміцнить наш престиж і завоює лояльність цих нових підданих."
  societal_values.2317.a: "Придушити їхні права."
  societal_values.2317.b: "Це межа, яку ми не перетнемо."
  every_location_in_target_province_cracked_down_on_minorities_modifier: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] отримають [ShowModifier('cracked_down_on_minorities_modifier')] на #Y 10#! років"
  societal_values.2318.title: "[target_country.GetAdjectiveWithNoTooltip] [ShowPopTypeNameWithNoTooltip('burghers')] Оселяються у [target_location_destination.GetNameWithNoTooltip]"
  societal_values.2318.desc: "[ShowPopTypeName('burghers')] з [target_country.GetName] почали осідати навколо [target_location_destination.GetName], розбудовуючи мережі, що тісніше пов'язують нашу торгівлю з [GetInternationalOrganization('middle_kingdom').GetName]. Їхня присутність обіцяє нові товари та процвітання, але дехто застерігає, що це надасть іноземним торговцям надмірний вплив на нашу економіку."
  societal_values.2318.a: "Наплив [ShowPopTypeNameWithNoTooltip('burghers')] — це добре, чи не так?"
  societal_values.2319.title: "[target_religion.GetNameWithNoTooltip] Пускає коріння в [target_province.GetNameWithNoTooltip]"
  societal_values.2319.desc: "Наша близькість до [target_country.GetName] значно принесла користь нашому [ROOT.GetCountry.GetFlavorRank]. Нещодавно ці відносини призвели до нового розвитку. [target_country.GetAdjectiveWithNoTooltip] принесли свою віру [target_religion.GetName] до [target_province.GetName], де вона тепер починає знаходити прихильників серед населення. Дехто вважає це небезпечним вторгненням, що підриває наші традиції, тоді як інші стверджують, що це може зміцнити зв'язки з [GetInternationalOrganization('middle_kingdom').GetName]."
  societal_values.2319.a: "Терпіти їхнє поклоніння."
  societal_values.2319.b: "Викорінити цю єресь."
  approximately_10_percent_pop_target_province_convert_target_religion_tt: "Приблизно #Y 10%#! наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують [our_religion_scope.GetName] у [target_province.GetName], навернуться до [target_religion.GetName]"
  societal_values.2320.title: "Обмін знаннями у сфері [target_country.GetNameWithNoTooltip]"
  societal_values.2320.desc: "Як лідер [GetInternationalOrganization('middle_kingdom').GetName], [target_country.GetName] вже прийняла інституції, відсутні в нашому власному [ROOT.GetCountry.GetFlavorRank]. Їхні вчені та посланці пропонують поділитися з нами методами, технологіями та практиками, обіцяючи зменшити розрив між нашими державами — хоча дехто застерігає, що такі дари коштують глибшої залежності."
  societal_values.2320.a: "Інвестиції в знання приносять найкращі відсотки."
  societal_values.2320.b: "Нам не потрібне іноземне втручання."
  gain_in_institutions_depends_on_monthly_towards_sinicized_tt: "Прогрес [Concept('institution', 'CONCEPT_PLACEHOLDER')|e], а також кількість зачеплених [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] залежатимуть від нашого [ShowModifierTypeName('monthly_towards_sinicized')]"
  societal_values.2321.title: "Архітектура [target_country.GetNameWithNoTooltip]"
  societal_values.2321.desc: "Від величних палаців [target_country.GetLongName] до її храмів і садів, [target_country.GetAdjectiveWithNoTooltip] архітектори вдосконалили стиль, що поєднує велич з гармонією. Делегати та будівельники здалеку тепер приносять знання цих проектів до нашого [ROOT.GetCountry.GetFlavorRank]. Ми повинні вирішити, чи прийняти їхні уроки, чи возвеличити наші рідні традиції."
  societal_values.2321.a: "Вчитися у їхніх інженерів."
  societal_values.2321.b: "Ми піднесемо наші власні стилі."
  societal_values.2322.title: "Суперечка про інтеграцію"
  societal_values.2322.desc: "У [target_province.GetName] громади [target_culture.GetName] підданих зросли настільки, що привернули увагу [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Магістрати сперечаються, який шлях є правильним: запропонувати визнання та допомогу для прискорення їхньої інтеграції, або застосувати суворіші заходи для підтвердження рідних звичаїв."
  societal_values.2322.a: "Єдність для прискорення наших зусиль."
  societal_values.2322.b: "Їм сподобається бути [our_culture_scope.GetNameWithNoTooltip]."
  societal_values.2323.title: "Майбутнє нашого [ROOT.GetCountry.GetFlavorRank]"
  societal_values.2323.desc: "Оскільки [target_heir.GetName] ще юний, [ROOT.GetCountry.GetGovernment.GetCourtTitle] обговорює, хто має бути його наставником. Прославлений місцевий наставник, [target_tutor1.GetName], готовий формувати [target_heir.GetHerHim] за нашими власними звичаями, тоді як [target_tutor2.GetName], видатний інструктор з [target_birth_location.GetName] — добре обізнаний у обрядах та вченнях [GetInternationalOrganization('middle_kingdom').GetName] — пропонує навчальну програму китаїзованої державності."
  societal_values.2323.a: "[target_heir.GetSheHe|U] навчатиметься у [target_tutor2.GetShortNameWithNoTooltip]."
  societal_values.2323.b: "[target_tutor1.GetShortNameWithNoTooltip] добре нам послужить."
  societal_values.2323.c: "[target_heir.GetShortNameWithNoTooltip] не буде навчатися далі."