l_english:
  regency_estate_events.1.title: "Лідерство Стану Оскаржено"
  regency_estate_events.1.desc: "Протягом останніх кількох місяців фракція в нашому королівстві набирала сили, і вони вважають, що повинні правити під час регентства.\n\nЇхні вимоги починалися як плітки; хтось шепоче, що та чи інша особа незадоволена напрямком нації, інший каже, що провідна фракція не така сильна, як ця інша, або що вони не так представлені в регентстві, як повинні, і так далі.\n\n[target_regent.GetName] стурбований, з очевидних причин, і бачить, що влада його/її власної фракції ослабла до такої міри, що він/вона сумнівається, чи зможе вона дати відсіч. Настав момент прийняти рішення, яке змінить нашу націю."
  regency_estate_events.1.a: "Прийняти зміну лідерства."
  regency_estate_events.1.b: "Підтримати регента."
  regency_estate_events.3.title: "Регент-Тиран"
  regency_estate_events.3.desc: "Кровна ворожнеча – це те, що руйнує королівства, але вона така ж давня, як і сама людина. Наш [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle], [target_regent.GetName], вважає, що перебування при владі – це золота можливість позбутися деяких політичних супротивників.\n\n[target_regent.GetSheHe|U] використовує [target_regent.GetHerHis] вплив як регент, щоб безжально атакувати будь-який голос, який виступає проти [target_regent.GetHerHim], навіть якщо вони цього не роблять, просто тому, що [target_regent.GetSheHe] може.\n\nЗвісно, інші фракції не особливо задоволені тим, як все робиться, і можуть спробувати помститися. Ми стоїмо на роздоріжжі, де маємо вирішити, що робити: чи варто нам втручатися?"
  regency_estate_events.3.a: "Ми повинні довіряти [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetShortNameWithNoTooltip]."
  regency_estate_events.3.b: "Ми не повинні терпіти тиранію."
  regency_estate_events.5.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] Створює Проблеми"
  regency_estate_events.5.desc: "Кажуть, що [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] дбають лише про гроші. Поки грошей багато, вони щасливі і не створюватимуть багато проблем. Принаймні, так ми думали.\n\n[target_regent.GetName] та [target_regent.GetHerHis] фракція використали свою владу для подальшого просування деяких тіньових справ, поки вони були при владі. Це було б не вперше, коли ми закриваємо очі на контрабанду, але ці незаконні дії роздратували іншу націю, і вони можуть використати цей інцидент як привід для оголошення нам війни та отримання компенсацій. На жаль, вони не бажають вести переговори."
  regency_estate_events.5.a: "Ми можемо лише чекати."
  regency_estate_events.6.title: "Зростає Нетерпимість"
  regency_estate_events.6.desc: "Ніхто не здивується, якщо скажуть, що кожна релігійна влада завжди намагатиметься увічнити свою владу або утвердити своє панування над іншими, коли вони правлять. І саме з такою ситуацією стикається [ROOT.GetCountry.GetLongName].\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] використовують свою владу, щоб усунути вплив інших релігій у нашому королівстві, і їхня влада занадто велика, щоб відмовити. Боязкий протест – це все, що ми змогли підняти. Ми змінимо цю політику в майбутньому, без сумніву, але поки що нам доведеться з цим жити."
  regency_estate_events.6.a: "Одна проблема за раз."
  regency_estate_events.9.title: "Регент – Добрий Вплив"
  regency_estate_events.9.desc: "Коли добрі чоловіки та жінки більше віддані благу нації, ніж власним інтересам, відбуваються великі речі. Протягом місяців [target_regent.GetName] приділяв багато часу, щоб ділитися [target_regent.GetHerHis] мудрістю з [target_heir.GetName], і обоє дуже насолоджувалися цим часом.\n\nПідготовка до правління ніколи не буває легкою, але [target_regent.GetShortNameWithNoTooltip] виконав чудову роботу. Уроки з наук, етикету, історії та військової тактики лунали палацом, слідуючи за регентом та спадкоємцем, куди б вони не йшли."
  regency_estate_events.9.a: "[target_heir.GetShortNameWithNoTooltip] так багато навчився!"