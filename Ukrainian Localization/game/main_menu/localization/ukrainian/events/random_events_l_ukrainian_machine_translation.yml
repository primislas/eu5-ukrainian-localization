l_english:
  random_event.1.title: "Побачено комету"
  random_event.1.desc: "Народ нашого [ROOT.GetCountry.GetFlavorRank] завжди був забобонним, і поява комети в небі викликала серед них паніку. Вони переконані, що це знак наближення кінця часів або що в найближчому майбутньому станеться щось жахливе."
  random_event.1.a: "Це лихий знак."
  random_event.2.title: "Дар державі"
  random_event.2.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] нашого [ROOT.GetCountry.GetFlavorRank] вирішили винагородити наше добре правління останніх років, зробивши щедрі пожертви до скарбниці, деякі з чистого патріотизму, інші в обмін на почесні титули та посади."
  random_event.2.a: "Покласти до скарбниці."
  random_event.2.b: "Витратити щедро."
  random_event.3.title: "Тимчасове божевілля [target_ruler.GetNameWithNoTooltip]"
  random_event.3.desc: "[target_ruler.GetName] останні кілька місяців поводився дуже дивно. Здається, [target_ruler.GetHeSheFormal] страждає від тимчасової кризи божевілля. В результаті наш [ROOT.GetCountry.GetFlavorRank] залишився з дуже малою ефективною керівною силою."
  random_event.3.a: "Зменшити [target_ruler.GetHerHis] адміністративні обов'язки."
  random_event.3.b: "Зменшити [target_ruler.GetHerHis] дипломатичні обов'язки."
  random_event.3.c: "Зменшити [target_ruler.GetHerHis] військові обов'язки."
  random_event.4.title: "Хвиля обскурантизму"
  random_event.4.desc: "Нещодавно дослідники в нашому [ROOT.GetCountry.GetFlavorRank] опублікували кілька праць з радикальними тезами, які можуть виявитися дестабілізуючими, якщо їх широко поширити. Ми могли б обрати легкий шлях обскурантизму та придушити це знання, але чи справді душевний спокій вартий того, щоб стояти на шляху прогресу?"
  random_event.4.a: "Знання — сила."
  random_event.4.b: "Невігластво — блаженство."
  random_event.5.title: "Чудовий [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle|U]"
  random_event.5.desc: "Нам зрозуміло, що [minister.GetName] виявився чудовим призначенням до нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle], виконуючи цінну роботу для нашого [ROOT.GetCountry.GetFlavorRank]. Нам пощастило мати такого чудового [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] на службі!"
  random_event.5.a: "Заохотити [minister.GetHerHis] зусилля."
  random_event.5.b: "Пожинати плоди."
  random_event.6.title: "Скандал при [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  random_event.6.desc: "Скандал вибухнув у [ROOT.GetCountry.GetGovernment.GetAdjective|U] [ROOT.GetCountry.GetGovernment.GetCourtTitle]! Здається, поширюються непристойні чутки щодо розпусності [princess.GetName], внаслідок чого родина [target_ruler.GetDynasty.GetName] стала посміховиськом [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Це ускладнює виконання будь-яких справ."
  random_event.6.a: "Хто тепер одружиться з [princess.GetNameWithNoTooltip]?"
  random_event.6.b: "Підкупити людей, щоб мовчали."
  random_event.7.title: "Винятковий рік"
  random_event.7.desc: "Минулий рік приніс багатий урожай та сприятливе середовище для торговців і підприємців. Це виявилося благословенням для нашої податкової бази, генеруючи вищий дохід для нашого [ROOT.GetCountry.GetFlavorRank]."
  random_event.7.a: "Використаймо це на благо нашого [ROOT.GetCountry.GetFlavorRank]."
  random_event.7.b: "Скористаймося перевагами негайно."
  random_event.7.c: "Інвестуймо в майбутнє."
  random_event.8.title: "Дипломатичний хід"
  random_event.8.desc: "Дипломатія між націями часто залежить від випадкових факторів, з обох сторін, залучених у спосіб, що виходить за межі можливостей дипломатичного корпусу будь-якої держави. З постійно мінливими примхами наших відносин із сусідами, що змінюються ще швидше, ніж зазвичай, нашим дипломатам стає важко встигати."
  random_event.8.a: "Призначити нових дипломатів."
  random_event.8.b: "Покращити відносини з сусідніми державами."
  random_event.8.tt: "Кожен сусід [Concept('country', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowBiasValue('opinion_diplomatic_move')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас"
  random_event.9.title: "Відмінна дипломатія"
  random_event.9.desc: "Вправна робота наших дипломатів та завидне становище сили, в якому опинився наш [ROOT.GetCountry.GetFlavorRank], виявляються корисними для нашого становища серед рівних. Наші дипломати використовують ці фактори для досягнення кращих, ніж зазвичай, результатів у своїх переговорах."
  random_event.9.a: "Задобрити мінливі стани."
  random_event.9.b: "Покращити нашу репутацію."
  random_event.10.title: "Гарна державна політика"
  random_event.10.desc: "Серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] існує широка підтримка нашої поточної політики. Дійсно, їхня ефективність значно перебільшується як доказ доброї волі уряду та його зацікавленості у добробуті нашого [ROOT.GetCountry.GetFlavorRank]."
  random_event.10.a: "Віддати гроші тим, хто їх найбільше потребує."
  random_event.10.b: "Інвестувати гроші в наш уряд."
  random_event.10.c: "Наповнімо нашу скарбницю."
  random_event.11.title: "Погана державна політика"
  random_event.11.desc: "Наша політика викликає широке невдоволення серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Здається, вони неправильно тлумачать її всупереч нашим намірам, до такої міри, що наші опоненти використовують її як доказ злої волі уряду та відсутності інтересу до добробуту нашого [ROOT.GetCountry.GetFlavorRank]."
  random_event.11.a: "Ми обрали правильний шлях."
  random_event.11.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] мають рацію."
  random_event.12.title: "Невдоволення серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|U]"
  random_event.12.desc: "Розбіжності в думках та інтересах щодо релігійних та світських питань між нашим урядом та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] переросли у значне джерело конфлікту в нашому [ROOT.GetCountry.GetFlavorRank]. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] тепер висувають вимоги щодо змін у політиці, заявляючи, що вони відмовлять у підтримці [target_ruler.GetName], якщо їм буде відмовлено."
  random_event.12.a: "Ігнорувати їхні вимоги."
  random_event.12.b: "Погодитися на їхні вимоги."
  random_event.13.title: "Невдоволення серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|U]"
  random_event.13.desc: "Конфлікти та протести з [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] щодо податків, державних підприємств, торговельних законів та митної політики стають досить частими. Це може призвести до різкого падіння наших доходів, якщо ми не вирішимо ситуацію обережно."
  random_event.13.a: "Стратити бунтівників."
  random_event.13.b: "Задобрити бунтівників."
  random_event.14.title: "Невдоволення серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|U]"
  random_event.14.desc: "Конфлікти та протести з [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] щодо податків, жорстокості землевласників, експропріації, кріпацтва та митної політики останнім часом стали ще частішими, ніж зазвичай. Якщо ми не зможемо вирішити проблеми найближчим часом, наслідки для стабільності нашої нації можуть бути жахливими."
  random_event.14.a: "Ми правимо, як вважаємо за потрібне!"
  random_event.14.b: "Спробувати покращити їхнє становище."
  random_event.15.title: "Невдоволення серед купців"
  random_event.15.desc: "Конфлікти та протести з купцями щодо наших податків, портових зборів, реквізицій флоту, торговельних законів та митної політики стають досить частими і мають контрпродуктивні наслідки для нашої економіки."
  random_event.15.a: "Зменшити інвестиції в торгівлю та нагляд."
  random_event.15.b: "Позбутися бунтівників."
  random_event.16.title: "Політична криза"
  random_event.16.desc: "Політичні кризи час від часу трапляються в нашому [ROOT.GetCountry.GetFlavorRank]. Вони часто включають конфлікт між [target_ruler.GetName] та [ROOT.GetCountry.GetGovernment.GetParliament.GetName], заворушення серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] або конфлікти інтересів між [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Одна така криза нещодавно викликала сумніви громадськості щодо наших керівних інституцій."
  random_event.16.a: "З часом рішення знайдеться."
  random_event.16.b: "Репутація — це не все."
  random_event.17.title: "Корупція"
  random_event.17.desc: "Корупція є одним з найпоширеніших і найчастіших факторів політичного та економічного життя в нашому [ROOT.GetCountry.GetFlavorRank]. Кілька скандалів за останній рік вивели це питання на перший план, настільки, що багато впливових популістів тепер закликають нас вжити заходів проти цієї зростаючої проблеми. Невиконання цього може мати жахливі наслідки для нашої здатності керувати нашим [ROOT.GetCountry.GetFlavorRank]."
  random_event.17.a: "Спробувати викорінити проблеми."
  random_event.17.b: "Ігнорувати їх."
  random_event.18.title: "Дипломатична образа"
  random_event.18.desc: "Необережний вислів [target_ruler.GetName] сильно образив [angry_ruler.GetName]. Задобрити [angry_ruler.GetHerHim] буде нелегко, не втративши обличчя."
  random_event.18.a: "Вони цього не забудуть!"
  random_event.18.b: "Спробувати послабити напругу."
  random_event.19.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] Вимагають Привілеїв"
  random_event.19.desc: "Привілеї [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] постійно зазнавали утисків, оскільки [target_ruler.GetName] намагався централізувати все більше контролю. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] нарешті втратили терпіння і вимагають повернути їм те, що вони вважають своїм по праву."
  random_event.19.a: "Прийняти їхні законні вимоги."
  random_event.19.b: "Ігнорувати їхні вимоги."
  random_event.20.title: "Святі Творять Чудеса"
  random_event.20.desc: "Деякі особливо побожні члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та миряни в наших землях присвятили себе допомозі бідним та зціленню хворих по всьому нашому [ROOT.GetCountry.GetFlavorRank]. Тепер ми чуємо, що громади, які відвідують ці благочестиві особи, починають називати їх святими за їхні дії, а деякі навіть, як вважається, творили чудеса."
  random_event.20.a: "Ми справді були благословенні."
  random_event.20.b: "Їхні дії показали нам істинний шлях."
  random_event.21.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] Укладають Союз з Іноземною Державою"
  random_event.21.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] часто виявляються непокірними підданими [ROOT.GetCountry.GetGovernment.GetRulerTitle], прагнучи чинити опір будь-якому посяганню на їхню автономію та використовуючи будь-яку можливість для зміцнення свого становища. Це часто включає спільну справу з іноземними державами. Нещодавно кілька ключових фігур, схоже, уклали угоду з [noble_ally_target.GetName] про підтримку про-[noble_ally_target.GetAdjectiveWithNoTooltip] курсу дій в обмін на певні послуги та обіцянки. Хоча це не зовсім зрада, така поведінка явно шкодить нашим інтересам; однак, приборкати їх, ймовірно, буде нелегко."
  random_event.21.a: "Вони заплатять за свою зраду."
  random_event.21.b: "Ми розберемося з ними пізніше."
  random_event.22.title: "Припинення Церковних Функцій"
  random_event.22.desc: "Кілька членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] прийшли до [target_ruler.GetName] з пропозицією. Відчайдушно прагнучи більшої кількості земель і титулів, вони із заздрістю дивляться на [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], які володіють значними землями. Вони просять нас передати їм церковні землі в обмін на великий грошовий внесок у зусилля [ROOT.GetCountry.GetLongName]. Звісно, у довгостроковій перспективі ми втратимо податкові надходження від церковних земель в обмін на це короткострокове збільшення доходу."
  random_event.22.a: "Навіщо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] земні володіння?"
  random_event.22.b: "Землі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] мають бути захищені!"
  random_event.23.title: "Продаж Посад"
  random_event.23.desc: "Скарбниця нашого [ROOT.GetCountry.GetFlavorRank] бачила кращі дні, і нові джерела доходу вкрай необхідні. На щастя, деякі члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] запропонували щедрі дари в обмін лише на кілька державних посад. Ці продажі принесли б багато доходу, але в довгостроковій перспективі більше чиновників могло б означати більше податкових надходжень, які відводяться до того, як вони досягнуть нашої скарбниці."
  random_event.23.a: "Прийняти їхню щедру пропозицію."
  random_event.23.b: "Ми можемо знайти кошти деінде."
  random_event.24.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] Вимагають Збільшення Пенсій"
  random_event.24.desc: "[target_ruler.GetName] доводиться використовувати багато методів, щоб тримати непокірних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у покорі. Один з найпоширеніших – це готівка. Ми вже надаємо їм пенсію в обмін на відмову від певних прав; однак їхні лідери тепер стверджують, що ми платимо їм недостатньо, і вимагають підвищення їхніх пенсій, якщо вони мають продовжувати підтримувати [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  random_event.24.a: "Прийняти їхні вимоги."
  random_event.24.b: "Відмовити їм у вимогах."
  random_event.25.title: "Надати Експортні Ліцензії"
  random_event.25.desc: "Замість того, щоб платити готівку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], іншим варіантом забезпечення їхньої лояльності є надання їм привілеїв для збору особливих доходів, наприклад, від зовнішньої торгівлі, з якої вони можуть отримати значний прибуток. Нещодавно до вух [target_ruler.GetName] дійшла пропозиція надати кільком родинам [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] експортні ліцензії для нашої торгівлі з [trade_target.GetName]. Це дуже їх порадує, але [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] можуть поставитися до цього питання менш прихильно."
  random_event.25.a: "Надати привілеї."
  random_event.25.b: "Привілеї потрібно заслужити."
  random_event.26.title: "Заснувати кантони"
  random_event.26.desc: "Створення постійних районів для набору до армії значно полегшує нам залучення чоловіків з населення для служби у війську. Наш [ROOT.GetCountry.GetGovernment.GetCabinetTitle] запропонував заснувати нові кантони в [target_province.GetName]."
  random_event.26.a: "Це гарний план."
  random_event.26.b: "Нам це не потрібно."
  random_event.27.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] Вимагають Старих Прав"
  random_event.27.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] досі пам'ятають часи, коли [ROOT.GetCountry.GetGovernment.GetRulerTitle] був лише першим серед багатьох у [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Вони прагнуть повернення до тих часів і активно тиснуть на [target_ruler.GetName], щоб той відновив їм певні втрачені права та привілеї."
  random_event.27.a: "Прийняти їхні вимоги"
  random_event.27.b: "Відхилити їхні вимоги"
  random_event.28.title: "Міські центри вимагають старих прав"
  random_event.28.desc: "Прагнучи централізувати наш [ROOT.GetCountry.GetFlavorRank], ми неминуче посягаємо на автономію міських жителів, які завжди існували за іншим кодексом правил, ніж їхні сільські побратими. Ці міщани активно чинять опір тиску, щоб їх підпорядкували більш уніфікованим правилам і нормам, і вимагають поважати їхні старі права."
  random_event.28.a: "Відмовити їм у їхніх старих правах!"
  random_event.28.b: "Прийняти їхні вимоги."
  random_event.29.title: "Невиконання указів"
  random_event.29.desc: "Хоча [target_ruler.GetName] видає багато указів, [target_ruler.GetHeSheFormal] на практиці майже безсилий їх виконувати. Натомість виконання залежить від місцевих влад – регіональних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та міських урядів – які не завжди такі пильні, як ми бажаємо. Нещодавно до нашої уваги дійшло, що наші органи влади в [target_province.GetName] особливо неохоче виконують волю [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  random_event.29.a: "Нехай вони самі цим займаються."
  random_event.29.b: "Збільшити спроби!"
  random_event.30.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|U] Просять Привілеїв"
  random_event.30.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] дедалі більше обурюються владою [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] і, зокрема, відсутністю можливостей для них на вищих щаблях уряду. Їхній єдиний шлях до влади – це одруження з бідними, але титулованими родинами, або здобуття посад в урядових колах шляхом вимагання більших привілеїв від [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  random_event.30.a: "Надати їм [target_privilege.GetNameWithNoTooltip]."
  random_event.30.b: "Такі привілеї призначені для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  random_event.31.title: "Італійський архітектор"
  random_event.31.desc: "Молодий архітектор з [ShowAreaName('tuscany_area')], [italian.GetName], прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], пропонуючи [italian.GetHerHis] послуги [target_ruler.GetName]. [italian.GetSheHe|U] стверджує, що добре обізнаний у мистецтві будівництва прекрасних палаців у новому стилі [ShowInstitutionName('renaissance')], який ми так прагнули наслідувати. Однак [italian.GetHerHis] послуги не будуть дешевими."
  random_event.31.a: "Найняти [italian.GetHerHim]."
  random_event.31.b: "Відхилити пропозицію."
  random_event.32.title: "Доступний італійський інженер"
  random_event.32.desc: "Облоговий інженер з Північної [ShowRegionName('italy_region')] прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], пропонуючи [italian.GetHerHis] послуги [target_ruler.GetName]. [italian.GetSheHe|U] стверджує, що добре обізнаний у мистецтві будівництва грізного [ShowCultureGroupName('italian_group')] бастіонного форту, #italic trace italienne#!, який наші військові теоретики відчайдушно прагнули наслідувати. Однак [italian.GetHerHis] послуги не будуть дешевими."
  random_event.32.a: "Найняти [italian.GetHerHim], щоб покращити наші укріплення."
  random_event.32.b: "[italian.GetHerHis|U] розум повинен служити нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] безпосередньо."
  random_event.32.c: "Як взагалі вимовляється це '#italic tracé à l'italienne#!'?"
  random_event.33.title: "Доступний іноземний інструктор з муштри"
  random_event.33.desc: "[drill_country.GetAdjective] інструктори з муштри стали майстрами у мистецтві навчання військ ефективному використанню вогнепальної зброї. Однак їхні методи не є таємницею – зовсім навпаки. Насправді, підприємливі [drill_country.GetAdjectiveWithNoTooltip] ветерани тепер заробляють на життя, пропонуючи свої знання правителям по всій [ShowContinentName('europe')]. Один такий інструктор з муштри прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб запропонувати [drill_instructor.GetHerHis] послуги."
  random_event.33.a: "Найняти [drill_instructor.GetHerHim] для навчання наших військ."
  random_event.33.b: "[drill_instructor.GetHerHis|U] таланти марнуються поза нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  random_event.33.c: "Відхилити пропозицію."
  random_event.34.title: "Побудувати [ShowBuildingTypeNameWithNoTooltip('grand_palace')|U]"
  random_event.34.desc: "Монархи часто борються, щоб підкорити своїх [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та забезпечити своє становище в очах своїх однолітків. Зростання вогнепальної зброї зменшило роль [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] як воїнів, але залишило їм, на думку монархів, занадто багато вільного часу. Щоб вразити своїх [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та зайняти їх, багато монархів все частіше створюють вражаючі нові палаци та запроваджують складні придворні ритуали. [target_ruler.GetName] не є винятком і доручив нашому головному архітектору розробити плани нового [ShowBuildingTypeNameWithNoTooltip('grand_palace')], який буде побудований, щоб вразити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  random_event.34.a: "Побудувати [ShowBuildingTypeNameWithNoTooltip('grand_palace')]!"
  random_event.34.b: "Не будувати його."
  random_event.35.title: "Неспівпрацюючий філософ"
  random_event.35.desc: "Філософ [philosopher.GetName] не ухилявся від висловлювання думок, що суперечать як [target_ruler.GetName], так і Святій Церкві. [philosopher.GetHerHis|U] останні публікації виявилися особливо провокаційними, настільки, що Церква вимагає, щоб ми передали [philosopher.GetHerHim] їхнім інквізиторам для суду за єресь та \"переконання\" відректися. Відмова їм у цьому сильно розгніває Церкву, але [philosopher.GetNameWithNoTooltip] має багато прихильників серед [ROOT.GetCountry.GetAdjective] освічених еліт."
  random_event.35.a: "Спалити [philosopher.GetHerHim]."
  random_event.35.b: "Дозволити [philosopher.GetHerHim] залишатися вільним."
  random_event.35.c: "Спалити їх усіх!"
  random_event.35.c.tt: "Спалення [philosopher.GetNameWithNoTooltip] та [philosopher.GetHerHis] прихильників усуне єретичні голоси з нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], але розгніває їхні родини та друзів."
  random_event.36.title: "Купці зазнають утисків"
  random_event.36.desc: "Наші купці давно скаржилися на несправедливе ставлення, якого вони зазнали на [target_market.GetName]. Однак нещодавно ці скарги загострилися, і купці тепер стверджують, що є жертвами [market_owner.GetAdjective] розбою та каперства – нападів, які, як вони наполягають, були здійснені за мовчазної підтримки [market_owner.GetNameWithNoTooltip]. Ми повинні знайти рішення цієї проблеми тим чи іншим способом."
  random_event.36.a: "Висловити офіційну скаргу [market_owner.GetNameWithNoTooltip]."
  random_event.36.b: "Шукати дипломатичне рішення."
  random_event.37.title: "Клопотання про відшкодування"
  random_event.37.desc: "Деякі місцеві члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у [uppity_peasants.GetName] настільки засмутили та погано поводилися зі своїми підданими, що делегація [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] прибула до [target_ruler.GetName], щоб просити відшкодування. Згода на це була б популярною серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')], але [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] розцінила б це як посягання на їхню владу."
  random_event.37.a: "Прийняти клопотання."
  random_event.37.b: "Відхилити клопотання."
  random_event.37.b.tt: "Це призведе до того, що наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] у [uppity_peasants.GetName] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  random_event.38.title: "Престижна родина просить допомоги"
  random_event.38.desc: "Одна з найвпливовіших родин [ROOT.GetCountry.GetName] з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], попри своє величезне земельне багатство, зуміла накопичити значні борги, які їй важко виплатити. Вони звернулися до [target_ruler.GetName] по допомогу, сподіваючись, що їхня довга історія вірності родині [target_ruler.GetDynasty.GetName] та їхні обіцянки незмінної підтримки схилять [target_ruler.GetHerHim] допомогти їм у скрутний час."
  random_event.38.a: "Надати їм допомогу."
  random_event.38.b: "Відмовити їм у допомозі."
  opinion_supports_dissidents: "Підтримує дисидентів"
  random_event.39.title: "Підтримка дисидентів за кордоном"
  random_event.39.desc: "До нас звернулася група [dissidents.GetAdjective] дисидентів, які стверджують, що мають розгалужену мережу підтримки, готову змусити [dissidents.GetAdjectiveWithNoTooltip] [dissidents.GetGovernment.GetRulerTitle] прийняти про-[ROOT.GetCountry.GetAdjective] курс, якщо ми лише надамо їм необхідні кошти. Хоча вони, швидше за все, брешуть, їхні заяви схвилювали багатьох впливових людей при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Підтримка цих дисидентів, ймовірно, нічого не досягне, окрім антагонізму з [dissidents.GetNameWithNoTooltip], але відмова їм може справити погане враження на наших більш войовничих [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  random_event.39.a: "Підтримати їх."
  random_event.39.b: "Яка марна трата монет!"
  random_event.40.title: "Зростає конкуренція в зовнішній торгівлі"
  random_event.40.desc: "Іноземні купці все частіше витісняють наших у портах нашого [ROOT.GetCountry.GetFlavorRank], наповнюючи наші ринки дешевими товарами, виробленими в інших місцях. Це ускладнює життя нашим купцям. Вони прийшли до [target_ruler.GetName], щоб запропонувати новий тариф на іноземні товари, який допоможе захистити їх від конкуренції з-за кордону."
  random_event.40.a: "Ввести новий тариф."
  random_event.40.b: "Нових тарифів не буде."
  random_event.41.title: "Єретик-радник"
  random_event.41.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] обурені тим, що єретик, [minister.GetName], працює радником у [target_ruler.GetName]. Вони вимагають негайного усунення [minister.GetHerHis]!"
  random_event.41.a: "Звільнити [minister.GetHerHim]!"
  random_event.41.b: "Ми віримо в [minister.GetHerHim]."
  random_event.42.title: "[ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle|U] здобуває владу"
  random_event.42.desc: "Здається, член нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle], [minister.GetName], не зупиниться ні перед чим, щоб підвищити [minister.GetHerHis] становище. Використовуючи більш-менш сумнівні методи, [minister.GetSheHe] зумів привернути безроздільну увагу [target_ruler.GetName], який, як кажуть, підкоряється кожній [minister.GetHerHis] примсі."
  random_event.42.a: "Звільнити [minister.GetHerHim]!"
  random_event.42.b: "[minister.GetSheHe|U] чудово справляється."
  random_event.43.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|U] стають зухвалими"
  random_event.43.desc: "Наші зусилля утримувати [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] на їхньому місці були дещо занадто успішними останнім часом. Наше правління настільки суворе, що знедолені стають все більш голосними у своїх скаргах і обертаються проти своїх землевласників, вимагаючи кращого ставлення та умов."
  random_event.43.a: "Зміцнити нашу владу."
  random_event.43.b: "Таке трапляється."
  random_event.44.title: "Корупція серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|U]"
  random_event.44.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] мають бути непідкупними — зрештою, саме це вони й проповідують. Однак, схоже, вони не завжди дотримуються власних вчень. Вибухнув скандал навколо кількох їхніх провідних діячів, які, замість того, щоб надавати нашому народу чесне духовне керівництво, схоже, непристойно збагатилися через різні сумнівні угоди протягом тривалого періоду часу."
  random_event.44.a: "Очистити храм."
  random_event.44.b: "Ігнорувати це заради частки прибутку."
  random_event.45.title: "Купецькі розколи"
  random_event.45.desc: "Виникла суперечка між кількома надзвичайно заможними — а отже, впливовими — купцями щодо [ROOT.GetCountry.GetAdjective] торгової політики. Одна група виступає за меркантилістський підхід, закликаючи нашого [ROOT.GetCountry.GetFlavorRank] забезпечити, щоб багатство, отримане від торгівлі в межах [ROOT.GetCountry.GetNameWithNoTooltip], надходило переважно [ROOT.GetCountry.GetAdjectiveWithNoTooltip] торговцям і виробникам. Інша фракція відкидає цей протекціоністський підхід як старомодний і виступає за вільну торгівлю, яка, як вони стверджують, звільнить їх для пошуку прибутків по всьому світу. Природно, обидві сторони вважають іншу щонайменше вкрай нерозумною, а в гіршому випадку — небезпечною у своїх помилкових переконаннях."
  random_event.45.a: "Підтримати меркантилістську фракцію."
  random_event.45.b: "Вільна торгівля — це майбутнє."
  random_event.45.c: "Це не наша справа вирішувати."
  random_event.46.title: "Зневажені морські традиції"
  random_event.46.desc: "Останнім часом наша увага була зосереджена переважно на армії. Можливо, нам не варто ігнорувати можливість сильного флоту та інвестувати більше часу в морські дослідження."
  random_event.46.a: "Це добре, земля — це головне."
  random_event.46.b: "Ми повинні зупинити це погіршення."
  random_event.47.title: "Зневажені армійські традиції"
  random_event.47.desc: "Останнім часом наша увага була зосереджена переважно на флоті. Можливо, нам не варто ігнорувати можливість сильної армії та інвестувати більше часу в армійські дослідження."
  random_event.47.a: "Флот — наша дерев'яна стіна!"
  random_event.47.b: "Ми повинні зупинити це погіршення."
  random_event.48.title: "Протиборчі військові школи"
  random_event.48.desc: "Випадкові сутички, що спалахують між нашими протиборчими військовими школами, останнім часом стали частішими. Якщо ми не втрутимося незабаром, ми ризикуємо подальшою роз'єднаністю в наших збройних силах."
  random_event.48.a: "Напад – завжди найкращий варіант!"
  random_event.48.b: "Ми завжди повинні захищати своїх насамперед!"
  random_event.48.c: "Найкраще з обох шкіл природно виявиться через дебати."
  random_event.49.title: "Придворний художник доступний"
  random_event.49.desc: "Останнім часом ми шукали художників чи митців, щоб належним чином закарбувати славу засновників нашого [ROOT.GetCountry.GetFlavorRank]. Так сталося, що художник, [the_artist.GetName], запропонував [the_artist.GetHerHis] послуги нам саме цього ранку."
  random_event.49.a: "Найняти [the_artist.GetHerHim]."
  random_event.49.b: "Відмовитися від [the_artist.GetHerHis] послуг."
  random_event.50.title: "Великий бал у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  random_event.50.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] полюбили пишні бали, державні обіди та інші надмірності для розваг. Хоча ці події досить дорогі, вони є чудовою нагодою показати велич [ROOT.GetCountry.GetName] та щедрість [target_ruler.GetName]."
  random_event.50.a: "Влаштувати бал."
  random_event.50.b: "Не влаштовувати бал."
  random_event.51.title: "Святкування"
  random_event.51.desc: "Цей рік видається настільки успішним, що кілька радників [target_ruler.GetName] запропонували, як жест доброї волі, [target_ruler.GetHeSheFormal] відсвяткувати, влаштувавши різноманітні святкування для місцевих жителів."
  random_event.51.a: "Влаштувати святкування."
  random_event.51.b: "Яка нісенітниця, так марнувати гроші!"
  random_event.52.title: "Скарги на судових виконавців"
  random_event.52.desc: "Наші судові виконавці в [bailiff_location.GetName] здобули репутацію жахливо жадібних і жорстоких чиновників. Місцеве населення зібралося, щоб подати петицію про їхнє усунення."
  random_event.52.a: "Замінити судових виконавців."
  random_event.52.b: "Ігнорувати скарги."
  random_event.52.c: "Усунути судових виконавців."
  random_event.53.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|U] проповідують єресь!"
  random_event.53.desc: "До нас дійшли чутки про кількох незадоволених членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у [heresy_location.GetName], які, розчаровані нашим правлінням, почали проповідувати єресь, що явно суперечить істинній вірі. Якщо ми нічого не зробимо, члени місцевого населення почнуть слідувати їхнім зрадницьким і єретичним словам, що може стати проблемою в майбутньому."
  random_event.53.a: "Ігнорувати проповіді єретичних [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  random_event.53.b: "Придушити це!"
  random_event.54.title: "Різка переоцінка валюти"
  random_event.54.desc: "Обеспокоєні спіралевидною інфляцією, наші фінансові радники наполегливо рекомендували нам відмовитися від старої монети та почати використовувати нову, стабільнішу валюту. Хоча це буде вигідно в довгостроковій перспективі, це негайно спричинить серйозні заворушення в нашому [ROOT.GetCountry.GetFlavorRank], а також розкриє нашим сусідам, що ми катастрофічно погано керували економікою."
  random_event.54.a: "Прислухайтеся до їхньої поради."
  random_event.54.b: "Ніщо, що не можна виправити карбуванням більшої кількості монет!"
  random_event.55.title: "Декаданс"
  random_event.55.desc: "Мир і процвітання, які наша країна переживає нині, дозволили людям розслабитися та почуватися щасливими й у безпеці. До цього вони могли б звикнути... настільки, що труднощі минулого стають дедалі немислимішими, і люди загалом з часом стають лінивішими та менш продуктивними."
  random_event.55.a: "Нам потрібен був струс."
  random_event.55.b: "Добрі часи ніколи не закінчаться!"
  random_event.56.title: "Наплив колоністів"
  random_event.56.desc: "Демографічний, економічний та політичний тиск удома об'єдналися, щоб викликати раптове збільшення кількості людей, які шукають кращого життя в багатих незвіданих землях наших заморських колоній. Серед них є підприємці, які шукають пригод і багатства в зовнішній торгівлі."
  random_event.56.a: "Отримати додаткових колоністів."
  random_event.56.b: "Отримати грошові вигоди."
  random_event.57.title: "Наплив купців"
  random_event.57.desc: "Розширення торгівлі призвело до зростання бажання серед наших купців розпочати нові торговельні підприємства за межами наших кордонів."
  random_event.57.a: "Вітаємо додаткові купецькі підприємства."
  random_event.57.b: "Зміцнити існуючі торговельні шляхи."
  random_event.58.title: "Військо розділене!"
  random_event.58.desc: "Протиборчі фракції у війську відстоюють різні тактики. Оскільки компромісу не видно, нам потрібно підтримати одну з них, щоб припинити суперечки."
  random_event.58.a: "Форти – наша сила!"
  random_event.58.b: "Ми завжди повинні атакувати!"
  random_event.59.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] бентежить [ROOT.GetCountry.GetGovernment.GetCourtTitle|U]"
  random_event.59.desc: "[target_ruler.GetName|U] сьогодні допустив абсолютний промах перед [ROOT.GetCountry.GetGovernment.GetCourtTitle] та кількома іноземними високопосадовцями. Наслідки цього доведеться виправляти роками."
  random_event.59.a: "Звинуватити [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  random_event.60.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] вимагає компенсації"
  random_event.60.desc: "Держава тривалий час жила за рахунок внесків [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Тепер наш [ROOT.GetCountry.GetFlavorRank] процвітає, тому [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] прагне отримати свою частку пирога."
  random_event.60.a: "Ігнорувати їх!"
  random_event.60.b: "Гаразд, заплатіть їм."
  random_event.61.title: "Грошові реформи"
  random_event.61.desc: "Наші скарбники стверджують, що нам потрібно провести деякі реформи в нашій економічній політиці. Також знадобиться новий майстер монетного двору, щоб подбати про економіку, але їхній кандидат на цю посаду не є відомим популістом."
  random_event.61.a: "Запровадити їх!"
  random_event.61.b: "Немає потреби в реформах."
  random_event.62.title: "Наслідки війни"
  random_event.62.desc: "Наш [ROOT.GetCountry.GetFlavorRank] був спустошений війною, і люди, від найвищих [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] до найбідніших [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], втомилися від неї. Нам потрібно запровадити тимчасові заходи, щоб наш [ROOT.GetCountry.GetFlavorRank] швидше відновився."
  random_event.62.a: "Не шкодувати коштів."
  random_event.62.b: "Запровадити кілька символічних заходів."
  random_event.63.title: "Сильне військове керівництво"
  random_event.63.desc: "Наші нещодавні війни дали поштовх до появи компетентних лідерів, навіть із [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Ми могли б скористатися їхніми навичками, або ж відкинути їх, оскільки вони, зрештою, не є частиною [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які традиційно домінували у вищому командуванні нашої армії."
  random_event.63.a: "[ROOT.GetCountry.GetNameWithNoTooltip] потребує їх усіх!"
  random_event.63.b: "Обмежити не-[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  random_event.64.title: "Морська традиція"
  random_event.64.desc: "Єдине, що може по-справжньому створити хорошого командира на морі, це досвід перебування в морі. Коли компетентних людей підвищують, незалежно від їхнього походження, наш флот стає сильнішим. Однак деяким [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у нашому [ROOT.GetCountry.GetFlavorRank] не подобається такий егалітаризм."
  random_event.64.a: "Юнга може стати капітаном!"
  random_event.64.b: "Ніколи!"
  random_event.65.title: "Хвороба [ROOT.GetCountry.GetGovernment.GetRulerTitle|U]"
  random_event.65.desc: "[target_ruler.GetName] захворів і тимчасово не може займатися всіма аспектами управління [ROOT.GetCountry.GetName]. Як ми з цим впораємося?"
  random_event.65.a: "Більше влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  random_event.65.b: "Більше влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  random_event.65.c: "Більше влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  random_event.65.d: "Більше влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  random_event.66.title: "Регіональні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] кидають виклик [ROOT.GetCountry.GetNameWithNoTooltip]"
  random_event.66.desc: "Місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у [unruly_nobles_province.GetName] незадоволені наданими їм привілеями. Вони вимагають більше прав і готові підкріпити це повстанням проти [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  random_event.66.a: "Знищити їх!"
  random_event.66.b: "Надати їм більше місцевої влади."
  random_event.67.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|U] Засуджує Філософа як Єретика!"
  random_event.67.desc: "Видатний натурфілософ, [natural_philosopher.GetName], висуває нові твердження, що суперечать релігійним істинам. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вимагає, щоб [natural_philosopher.GetSheHe] був зупинений і переданий для покарання. У будь-якому випадку, це спричинить великі заворушення в нашому [ROOT.GetCountry.GetFlavorRank]."
  random_event.67.a: "Підтримати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  random_event.67.b: "Підтримати [natural_philosopher.GetNameWithNoTooltip]."
  random_event.68.title: "Зростання [target_location.GetNameWithNoTooltip] Приваблює [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]"
  random_event.68.desc: "Здається, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] переселяються з глибинки [starting_location.GetName] і прагнуть заробити на життя в [target_location.GetName]. Це створює заворушення в сільській місцевості [starting_location.GetNameWithNoTooltip], але [target_location.GetNameWithNoTooltip] може отримати вигоду в довгостроковій перспективі."
  random_event.68.a: "Ми повинні це прийняти."
  random_event.68.a.tt: "Це призведе до того, що наші [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] в [starting_location.GetName] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  random_event.68.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] належать до своєї землі."
  following_happens_because_of_peasants_free_peasantry_tt: "#Y Наступне відбудеться, оскільки ми надали нашим [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [ShowEstatePrivilegeName('peasants_free_peasantry')] [Concept('estate_privilege', 'CONCEPT_PLACEHOLDER')|e]:#!"
  random_event.69.title: "Репутація [ROOT.GetCountry.GetGovernment.GetRulerTitle|U] Заплямована!"
  random_event.69.desc: "Якийсь пропагандистський текст циркулює в [ROOT.GetCountry.GetGovernment.GetCourtTitle] про те, що [target_ruler.GetName] є безжальним розпалювачем війни. Це може вплинути на наші відносини з нашими підданими та іншими країнами."
  random_event.69.a: "Прийняти репутацію!"
  random_event.69.b: "Стратити когось за це!"
  random_event.70.title: "Боротися за праве діло!"
  random_event.70.desc: "Кожен у нашому [ROOT.GetCountry.GetFlavorRank] об'єднаний за нашу справедливу війну проти [enemy_country.GetLongName]. Вони відчувають, що це битва, яку ми повинні виграти, і всі роблять свій внесок для [ROOT.GetCountry.GetLongName]."
  random_event.70.a: "Тримати оборону!"
  random_event.71.title: "Покращення [target_capital.GetNameWithNoTooltip]"
  random_event.71.desc: "Слава [target_capital.GetName] довго була занедбана. Тепер ми маємо можливість покращити [target_capital.GetRank.GetName] і зробити її маяком культурної гордості. Це може виявитися дорогим для нашої скарбниці, але ми завжди можемо використати наші надлишкові резерви робочої сили."
  random_event.71.a: "Використати військових як робочу силу."
  random_event.71.b: "Найняти незалежних підрядників."
  random_event.72.title: "Покоління Боягузів"
  random_event.72.desc: "Багато довгих років миру спричинили тривожну відсутність чоловічих чеснот у простолюдина. Це може бути катастрофічним, оскільки надто багато наших нещодавніх новобранців виявилися боягузами..."
  random_event.72.a: "Наші армії – не місце для боягузів!"
  random_event.72.b: "Вони нам потрібні."
  random_event.73.title: "Щедра купецька родина"
  random_event.73.desc: "Одна з найвеличніших і найбагатших купецьких родин у [ROOT.GetCountry.GetLongName] вирішила винагородити нас за наше справедливе правління значною пожертвою. Будучи шанованими торговцями, які збудували свій статок на комерції, родина здобула репутацію щедрих покровителів релігії та мистецтв. Тепер, з цим новознайденим багатством, ми можемо зміцнити нашу скарбницю або надати покровительство новим талантам. Один художник, [the_artist.GetName], почав здобувати певну популярність у місцевих колах, і залучення [the_artist.GetHerHis] послуг могло б стати справжнім благом для нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  random_event.73.a: "Нашому [ROOT.GetCountry.GetFlavorRank] потрібні гроші."
  random_event.73.b: "Спонсорувати [the_artist.GetNameWithNoTooltip], щоб вшанувати родину."
  random_event.73.c: "[the_artist.GetNameWithNoTooltip] із задоволенням працював би для [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetNameWithNoTooltip]!"
  random_event.74.title: "Виявлено місцевого експерта з фортифікації"
  random_event.74.desc: "Наші місцеві адміністратори в [fortification.GetName] повідомили, що місцеві жителі мають досить інтригуючі ідеї щодо створення кращих укріплень. Однак вони неохоче залишають своє рідне місто."
  random_event.74.a: "Усьому [ROOT.GetCountry.GetFlavorRank] потрібні їхні ідеї."
  random_event.74.b: "Дозволити їм покращити місцеві укріплення в [fortification.GetNameWithNoTooltip]."
  random_event.75.title: "Наївний родич"
  random_event.75.desc: "Близький член родини [target_ruler.GetName], [naive.GetName], виявився абсолютно наївним і постійно публічно розповідає іноземцям важливу інформацію. Це технічно є зрадою, але страта члена [ROOT.GetCountry.GetGovernment.GetAdjective] родини може спричинити заворушення."
  random_event.75.a: "Дозволити нашим агентам розібратися з [naive.GetHerHim]."
  random_event.75.b: "[naive.GetSheHe|U] все ж таки родич..."
  random_event.76.title: "Контрабандисти лютують"
  random_event.76.desc: "Люди знаходять безліч способів уникнути сплати податків і зборів за переміщення товарів, контрабандою переправляючи їх повз нашу владу через різноманітні таємні канали. Це зменшує наш дохід, але зупинити це коштуватиме досить дорого в короткостроковій перспективі."
  random_event.76.a: "Зупинити їх!"
  random_event.76.b: "Це занадто дорого."
  random_event.77.title: "Друкарський верстат дає переваги"
  random_event.77.desc: "З часу винаходу друкарського верстата публікується все більше книг, що охоплюють все ширший спектр тем. Тепер ми бачимо переваги цього, оскільки знання поширюються швидше, і серед наших філософів та природознавців з'являється більше ідей."
  random_event.77.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  random_event.78.title: "Надзвичайна політика набору"
  random_event.78.desc: "Ми перебуваємо у стані війни, і наші резерви живої сили повільно зникають. [target_ruler.GetName], наш великий і компетентний правитель, розробив план набору більшої кількості чоловіків для військової служби. Однак це може спричинити проблеми в сільській місцевості."
  random_event.78.a: "Набрати якомога більше!"
  random_event.78.b: "Беріть лише тих, кого можна виділити."
  random_event.79.title: "Велика економічна політика"
  random_event.79.desc: "Завдяки великому адміністративному керівництву [target_ruler.GetName], ми змогли досить значно скоротити накопичену інфляцію нашої країни за останній рік."
  random_event.79.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  random_event.80.title: "Золота доба для культури!"
  random_event.80.desc: "З миром у нашій країні, великі музиканти, художники та поети радіють своїм новим можливостям розважати своїх покровителів. Ця доба культурного просвітництва безумовно покращує настрій [ROOT.GetCountry.GetName]."
  random_event.80.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  random_event.81.title: "Воїни не читають книг"
  random_event.81.desc: "Оскільки війна поглинає увагу кожної здатної та продуктивної особи в нації, залишається значно менше часу для легковажних занять музикантів та поетів. І навіть найкращий поет не є кращим солдатом, ніж звичайний селянин."
  random_event.81.a: "Меч сильніший за книгу."
  random_event.82.title: "Компетентна дипломатія!"
  random_event.82.desc: "Доклавши зусиль у спілкуванні зі своїми однолітками [target_ruler.GetHerHis], наполеглива праця [target_ruler.GetName] окупилася. Наш дипломатичний статус зріс завдяки [target_ruler.GetHerHis] красномовству."
  random_event.82.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] завжди можна довіряти!"
  random_event.83.title: "Некомпетентна дипломатія!"
  random_event.83.desc: "Майже неможливо уявити, наскільки некомпетентним є [target_ruler.GetName] у веденні дипломатії. Ми не знаємо, як [target_ruler.GetSheHe] це зробив/зробила, але [target_ruler.GetSheHe] зумів/зуміла зашкодити нашому дипломатичному становищу у світі одним лише листом вибачення до посла."
  random_event.83.a: "Як це можливо?"
  random_event.84.title: "Втомлене війною населення"
  random_event.84.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] втомилися від нашої війни, а наші солдати виснажені. Стає все важче змушувати їх битися за нас, оскільки вони знаходять все більш винахідливі методи ухилення від призову. Навіть ті, хто в армії, більше думають про дім, ніж про славу перемоги над нашим ворогом. Ми повинні швидко завершити війну, інакше вона може незабаром обернутися на гірше."
  random_event.84.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] слід ігнорувати."
  random_event.84.b: "Солдати — це лише [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] у формі."
  random_event.85.title: "Надія ще є"
  random_event.85.desc: "Хоча [ROOT.GetCountry.GetName] втомилася від війни, надія та позитивний дух все ще живуть у серці кожного, від найнижчого з [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] до [target_ruler.GetName] [target_ruler.GetHerselfHimself]. Ми переживемо цю війну, і ми її виграємо."
  random_event.85.a: "Ще раз на пролом!"
  random_event.85.b: "Ми, брати по зброї..."
  random_event.86.title: "Візит від якихось підозрілих осіб"
  random_event.86.desc: "Кілька дещо підозрілих осіб з'явилися при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], пропонуючи свої послуги нашому [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Вони стверджують, що готові та здатні робити те, чого жоден гідний правитель ніколи б не удостоїв робити – публічно."
  random_event.86.a: "Це пропозиція..."
  random_event.86.b: "...Від якої ми можемо відмовитися."
  merchants_not_supported: "Непідтримувані купці"
  random_event.87.title: "Розпорошені купці"
  random_event.87.desc: "Наші купці приносять гроші від торгівлі з усього світу. Однак, схоже, вони дещо розтягнулися, і уряд не може надати їм повну підтримку дипломатичного впливу [ROOT.GetCountry.GetLongName]. Схоже, нам доведеться зробити вибір, куди зосередити нашу торгівлю."
  random_event.87.a: "[ShowContinentNameWithNoTooltip('asia')|U] не настільки важлива."
  random_event.87.b: "Ми можемо ігнорувати [ShowContinentNameWithNoTooltip('europe')]."
  random_event.87.c: "Все одно підтримати їх!"
  opinion_united_in_faith: "Об'єднані у вірі"
  random_event.88.title: "Відносини покращилися"
  random_event.88.desc: "Ми знайшли спільну мову з нашими [neighbour_country.GetAdjective] сусідами у тому, що ми сповідуємо [ROOT.GetCountry.GetReligion.GetAdjective] віру. Наші відносини покращилися, і наші дві нації тепер дивляться в майбутнє як єдине ціле."
  random_event.88.a: "За [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] віру."
  random_event.89.title: "Продаж титулів"
  random_event.89.desc: "Один з наших радників запропонував продати титули [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] будь-кому, хто може собі це дозволити. Це могло б принести багато грошей і відкрити шлях до соціального просування для багатих, якщо ми це зробимо, але це знецінило б ідею [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] і, можливо, засмутило б існуючі аристократичні родини."
  random_event.89.a: "Золото – ознака справжньої цінності!"
  random_event.89.b: "Деякі речі не можна купити!"
  random_event.90.title: "Мандрівні менестрелі"
  random_event.90.desc: "Група відомих менестрелів нещодавно перетнула кордони нашої нації. Їхній намір – мандрувати сільською місцевістю [ROOT.GetCountry.GetLongName], приносячи радість усім, хто їх чує, але дехто каже, що лише вуха [target_ruler.GetName] гідні чути таку чудову музику."
  random_event.90.a: "Дозволити їм йти, куди бажають їхні серця."
  random_event.90.b: "Привести їх до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  random_event.91.title: "Рясний урожай"
  random_event.91.desc: "Цьогорічні врожаї були винятковими! Рідко в історії нашої нації земля приносила стільки своїх щедрот. Народ вже тлумачить це як знак божественної прихильності до нашого правління."
  random_event.91.a: "Ми благословенні!"
  random_event.92.title: "Напруженість між [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|U]"
  random_event.92.desc: "У нашій державі дві групи мають велику владу: [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Однак вони не завжди ладнають. Нещодавно [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] у [bicker.GetName] та місцеві монастирі поблизу їхніх феодів почали сперечатися про те, кому належить досить велика ділянка землі.\n\nЦими днями [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] переповнений людьми, які базікають про божественне право – [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] заявляють про своє божественне право на володіння землею, а [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] стверджують свою позицію як представників Бога на Землі. Вся ситуація стає досить нестабільною, причому згадані [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] підбурюють інших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] проти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та ставлять під сумнів їхнє право володіти будь-якою світською власністю. Пріор монастирів залучив на свій бік високопоставлених членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], які, своєю чергою, погрожують звернутися безпосередньо до [GetCountry('PAP').GetName], якщо ми вирішимо стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Таким чином, ми опинилися в досить скрутному становищі."
  random_event.92.a: "Ісус жив серед жебраків і рибалок, чому б не [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]?"
  random_event.92.b: "Звісно, ми не бажаємо гнівити його святість."
  random_event.93.title: "Радник, що не погоджується"
  random_event.93.desc: "[minister.GetName], член нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle], досі був вірним слугою, але тепер [minister.GetSheHe], здається, дозволив [minister.GetHerHis] знатності затьмарити [minister.GetHerHis] розум і став зухвалим. [minister.GetHeSheFormal|U] сміє засуджувати політику нашого великого [target_ruler.GetName] і нещодавно зробив це публічно перед іноземними послами. Навіть якщо для цих критичних зауважень можуть бути деякі підстави, ми не повинні дозволяти відкритому приниженню [ROOT.GetCountry.GetGovernment.GetRulerTitle] стати звичкою."
  random_event.93.a: "Але це була слушна думка..."
  random_event.93.b: "Геть [minister.GetHerHis] голову!"
  random_event.94.title: "Влада місцевих [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] зростає"
  random_event.94.desc: "Завдяки інтригам при [ROOT.GetCountry.GetGovernment.GetCourtTitle], вмілим союзам та великій кількості опортунізму, група місцевих [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] створила міцну базу влади в [local_noble.GetName]. Якщо ми не розберемося з ними зараз, вони можуть підтримати одного з різних претендентів на [ROOT.GetCountry.GetFlavorRank] в надії на ще більший вплив, хоча зменшити їхню владу буде важко, враховуючи їхній вплив та велику силу утримувачів, яких вони підтримують як частину своєї приватної армії."
  random_event.94.a: "Ігнорувати їх."
  random_event.94.b: "Обмежити їхню владу."
  random_event.95.title: "Колоніальне відкриття!"
  random_event.95.desc: "Наші колоністи натрапили на дивовижне відкриття, [ShowGoodsName('cocoa')], і це справжній делікатес у [ShowContinentName('europe')]. Великі торгові доми імпортують цю цікавинку бочками. Вони виявили достатньо, щоб забезпечувати нашу країну до кінця часів."
  random_event.95.a: "Усі можуть отримати від цього користь!"
  random_event.95.b: "Це явно для [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  random_event.96.title: "Країна дестабілізована"
  random_event.96.desc: "Наші нещодавні рішення та політика призвели до порушення регіональних інтересів, що створило певну прогалину в місцевій політиці. Оскільки немає місцевих можновладців, які б сказали їм, що все гаразд, люди почали вірити, що ними погано керують."
  random_event.96.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  random_event.97.title: "Морські офіцери йдуть у відставку"
  random_event.97.desc: "Наше рішення почати надавати перевагу армії над флотом призвело до того, що багато перспективних молодих морських офіцерів пішли у відставку. Вони стверджують, що можливостей для просування по службі стало менше, ніж раніше."
  random_event.97.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  random_event.98.title: "Капери приносять прибутки"
  random_event.98.desc: "Наше рішення підтримати каперський флот окупається. Один з наших капітанів зумів захопити корабель, повний цінних товарів, що прямував до [gold_port.GetName]. Після продажу товарів значна частина прибутку дістається нашій країні!"
  random_event.98.a: "Це добре поповнить нашу скарбницю."
  random_event.99.title: "Каперів захоплено"
  random_event.99.desc: "Наші капітани виявили надзвичайну майстерність у морських боях, захопивши численних ворожих каперів, які намагалися грабувати наші кораблі. Ніколи раніше ми не мали стільки капітанів, які б так успішно перехитрили ворожих капітанів, і вони вже здобули чималу славу серед нашого флоту та населення, оскільки майстерність наших морських командирів вселяє впевненість у нових рекрутів."
  random_event.99.a: "Це, очевидно, капітани, з яких варто брати приклад!"
  random_event.100.title: "Купці організовують експедицію"
  random_event.100.desc: "Після нещодавніх пропозицій щодо торговельного шляху до $india$ у тому напрямку, група купців зібрала флот і найняла дослідника, [india_explorer.GetName], щоб дослідити незвідані води заходу."
  random_event.100.a: "Цікаво, приведіть [india_explorer.GetNameWithNoTooltip] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  random_event.100.b: "Поки їх немає, конфіскуйте їхні активи!"
  random_event.101.title: "Меценатство для [ShowInstitutionNameWithNoTooltip('renaissance')|U] художників?"
  random_event.101.desc: "Різноманітні та інноваційні ідеї [ShowInstitutionName('renaissance')] поширюються нашою країною. Вже низка заможних родин вирішила надати фінансову підтримку перспективним художникам. Один художник, зокрема, [ren_artist.GetName], привернув їхню увагу. Чи дозволимо ми історії пройти повз, не залишивши на ній свого сліду?"
  random_event.101.a: "Ми також підтримаємо розквітаюче [ShowInstitutionNameWithNoTooltip('renaissance')] мистецтво."
  random_event.101.b: "У нас є кращі речі, на які можна витратити гроші."
  random_event.102.title: "Занепад морської думки"
  random_event.102.desc: "Оскільки наша увага все більше зміщується з флоту на армію, деякі з наших майстрів-корабелів вирішили шукати роботу в іншому місці. Це призвело до занепаду всієї нашої морської потужності."
  random_event.102.a: "Цього слід було очікувати."
  random_event.103.title: "Реформа армії"
  random_event.103.desc: "Наразі розробляються плани щодо незначної реформи нашої армії. Нова тактика, зброя та командування – це деякі з областей, що обговорюються для підвищення нашої бойової ефективності."
  random_event.103.a: "Зосередитися на якості."
  random_event.103.b: "Зосередитися на кількості."
  random_event.103.c: "Зосередитися на наступі."
  random_event.103.d: "Зосередитися на обороні."
  random_event.104.title: "Реформа флоту"
  random_event.104.desc: "Наразі розробляються плани щодо незначної реформи нашого флоту. Нова тактика, зброя та командування – це деякі з областей, що обговорюються для підвищення нашої бойової ефективності."
  random_event.104.a: "Покращити наш існуючий флот."
  random_event.104.b: "Надати нам більше морської спрямованості."
  random_event.105.title: "Має бути стабільний уряд"
  random_event.105.desc: "Кілька провідних членів нашого уряду глибоко стурбовані деякими змінами, які нещодавно були запропоновані щодо того, як має керуватися наш [ROOT.GetCountry.GetFlavorRank]. Вони вимагають припинити такі обурливі реформи та повернутися до наших перевірених і надійних традицій. Звісно, вони уникають згадки про те, як ці зміни вплинуть на їхню власну владну базу..."
  random_event.105.a: "Прийняти їхні вимоги."
  random_event.105.b: "Ігнорувати їх."
  random_event.106.title: "Блискуче правління"
  random_event.106.desc: "Наш [ROOT.GetCountry.GetFlavorRank] керувався надзвичайно ефективно минулого року. Тепер ми маємо можливість скористатися цим."
  random_event.106.a: "Гроші завжди добре!"
  random_event.106.b: "Але престиж краще!"
  random_event.107.title: "Вибори під впливом"
  random_event.107.desc: "Хабарі та інші стимули ніколи не були рідкістю перед виборами. Також добре відомо, що впливові люди, навіть у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], вдавалися до таких практик у надії змінити результат виборів на свою користь."
  random_event.107.a: "Це просто здоровий глузд!"
  random_event.107.b: "Хабарям не місце в нашому [ROOT.GetCountry.GetFlavorRank]!"
  random_event.108.title: "Національні інституції"
  random_event.108.desc: "Останнім часом все більше людей вимагають представницьких національних інституцій. Наш [ROOT.GetCountry.GetGovernment.GetParliament.GetName] довго керував нашим [ROOT.GetCountry.GetFlavorRank] крізь такі потрясіння, проте наш народ, здається, довіряє йому все менше, стверджуючи, що вони не мають достатнього контролю над тим, хто їх представляє."
  random_event.108.a: "Скликати [ROOT.GetCountry.GetGovernment.GetParliament.GetName] на чергові дебати."
  random_event.109.title: "Військова реформа"
  random_event.109.desc: "[ROOT.GetCountry.GetLongName] розпочали ґрунтовний перегляд військової структури нашої країни. Хоча офіцери все ще набираються з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та міщани призиваються до інших рангів. Було запроваджено регулярні навчання та створено потужний флот разом із сотнями лінійних кораблів, галер та інших суден."
  random_event.109.a: "Зосередитися на армійських реформах."
  random_event.109.b: "Зосередитися на військово-морських реформах."
  random_event.109.c: "Обидва? Обидва. Обидва добре."
  random_event.110.title: "Національний банк"
  random_event.110.desc: "Створення національного банку дало нам репутацію серйозності та надійності. Це також дозволило нашому [ROOT.GetCountry.GetFlavorRank] значно більшу гнучкість у залученні коштів для ведення війни."
  random_event.110.a: "Це справді корисно!"
  random_event.111.t: "Спіймана на гарячому"
  random_event.111.desc: "Усі живі істоти в нашому [ROOT.GetCountry.GetFlavorRank] підпорядковуються законам людини, незалежно від того, чи можуть вони їх зрозуміти. Нещодавно свиню спіймали на вбивстві та поїданні дитини. Тепер вона постає перед судом за свій тяжкий злочин.\n\nВкрай важливо, щоб влада підтримувала враження ретельного дотримання законів і порядку в країні. Навіть якщо обвинувачений не є людиною, надання йому суду, який повною мірою дотримується правових звичаїв, забезпечує людям більшу довіру до системи.\n\nОднак можна поставити під сумнів витрати на проведення повного судового розгляду тварини, яка не здатна ним скористатися. Можливо, тваринам слід надавати швидші судові розгляди, які є менш витратними?"
  random_event.111.a: "Закон і надалі буде справедливим для всіх, навіть для тварин!"
  random_event.111.b: "Ми повинні скоротити витрати на судові процеси над тваринами!"
  random_event.111.c: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] також має відповідати за тварин."
  random_event.112.title: "Скарги на [ShowGoodsNameWithNoTooltip('copper')]"
  random_event.112.desc: "Група незадоволених [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] висунула офіційну скаргу проти наших [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які добре відомі тим, що ведуть справи в [target_location.GetName]. За словами [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')], придбана ними [ShowGoodsName('copper')] була настільки низької якості, що її ледь можна було використовувати.\n\nОднак [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] наполягають, що метал був саме таким, як обіцяли. Коли пристрасті розпалюються, а суперечка поширюється по ринку, інші починають сумніватися, чи є торгівля в [target_location.GetNameWithNoTooltip] такою справедливою, як здається."
  random_event.112.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] повинні або взяти, або відмовитися!"
  random_event.112.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] винні."
  random_event.112.c: "Дрібні чвари..."