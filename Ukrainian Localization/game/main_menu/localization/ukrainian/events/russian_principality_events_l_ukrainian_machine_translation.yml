l_english:
  russian_principality_events.2.title: "Інтенсифікація сільського господарства"
  russian_principality_events.2.desc: "Надзвичайно тривалий період миру та стабільності дозволив селянам у великих монастирських та боярських маєтках почати впроваджувати сучасніші методи землеробства. Підсічно-вогневе землеробство залишається нормою на значних територіях нашого володіння, але з поширенням сівозміни населення в деяких частинах нашого володіння значно зростає."
  russian_principality_events.2.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  russian_principality_events.3.title: "Дрібні володарі"
  russian_principality_events.3.desc: "З татарським ярмом, що стає все більш віддаленим спогадом, та розширенням земель, що безпосередньо управляються [ROOT.GetCountry.GetGovernment.GetRulerTitle], стає все більш очевидним, що нам потрібно більше дрібних землевласників. Традиційно, земельна аристократія була б основними кандидатами на отримання цього привілею, навіть для менших ділянок землі, але більша внутрішня стабільність означає, що ми могли б просувати людей інших якостей для вирішення цих питань економіки та сільського господарства."
  russian_principality_events.3.a: "Продовжуймо надавати перевагу боярам."
  russian_principality_events.3.b: "Розподілімо землю серед дрібних землевласників."
  russian_principality_events.4.title: "Набуття земель"
  russian_principality_events.4.desc: "Центральна влада [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] невпинно зростає, і без данини ханам Центральної Азії зростає наш вільний дохід. Надзвичайно багатий урожай залишив нам значний надлишок. Ми могли б використати це, щоб поповнити нашу скарбницю на чорний день, але ми також могли б інвестувати це для придбання земель дрібних князів та монастирських маєтків."
  russian_principality_events.4.a: "Земля – справжнє багатство."
  russian_principality_events.4.b: "Нам потрібне золото для королівської скарбниці."
  russian_principality_events.4.c: "Ми повинні використати це як важіль у державних справах."
  russian_principality_events.5.title: "Голод у [famine_province.GetNameWithNoTooltip]"
  russian_principality_events.5.desc: "Поєднання хвороб та суворої погоди повністю знищило врожай у частинах [ROOT.GetCountry.GetAdjective] Володіння. У такі часи багато хто звертається до держави або Церкви за підтримкою, інші залишають свої землі або шукають захисту у могутніх бояр, монастирських маєтків або навіть приєднуються до козаків у диких полях."
  russian_principality_events.5.a: "Ми залишимо це боярам."
  STATIC_MODIFIER_NAME_russian_famine: "Голод"
  russian_principality_events.5.b: "Ми дозволимо Церкві впоратися з цим."
  russian_principality_events.5.c: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetGovernment.GetRuler.GetHerselfHimself] допоможе їм."
  russian_principality_events.7.title: "Юріїв день"
  russian_principality_events.7.desc: "Традиційно селяни мали право переходити з однієї місцевості в іншу за контрольованими формами в Юріїв день. Це забезпечує певну мобільність, водночас оберігаючи цьогорічний урожай.\nОднак останнім часом багато землевласників скаржаться, що селяни зловживають цим привілеєм, шукаючи кращого життя. Сьогодні землевласники шукали аудієнції, благаючи нас скасувати це право для їхніх селян. В іншому випадку вони стверджують, що не зможуть надавати військову службу, яку вимагає держава."
  russian_principality_events.7.a: "Обмежити їхній рух."
  russian_principality_events.7.b: "Ми не звільнятимемо ці землі від наших законів."
  russian_principality_events.8.title: "Помирає удільний князь"
  russian_principality_events.8.desc: "Князь [ROOT.GetCountry.GetName] помер, і [ROOT.GetCountry.GetGovernment.GetRuler.GetName] оплакує втрату брата. Як нинішній [ROOT.GetCountry.GetGovernment.GetRulerTitle], ми повинні тепер перерозподілити землі, які покійний тримав як уділ. Наші брати, що залишилися, безсумнівно, очікуватимуть отримати частину землі, але ми могли б спробувати використати цю нагоду, щоб збільшити розмір наших власних земель..."
  russian_principality_events.8.a: "Конфіскуймо землю для себе."
  russian_principality_events.8.b: "Ми повинні забезпечити собі підтримку наших братів."
  russian_principality_events.9.title: "Татарські васали"
  russian_principality_events.9.desc: "З придбанням татарських земель ми стали верховним володарем народів, яким ми були підкорені так довго. Хоча це перемога для [ROOT.GetCountry.GetAdjective] народу, це також і можливість.\nЯк ми болісно усвідомлювали століттями, татари є чудовими вершниками і знають степи краще за будь-кого іншого. Якщо ми дозволимо місцевим лідерам продовжувати правити своїм народом, але від нашого імені, вони цілком можуть бути відкритими до ідеї служити в наших арміях."
  russian_principality_events.9.a: "Чудова ідея!"
  russian_principality_events.9.b: "Ми не можемо дозволити мусульманам такі права в межах наших кордонів."