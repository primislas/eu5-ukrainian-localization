l_english:
  rebel.1.title: "Cola di Rienzo"
  rebel.1.desc: "Колись велике місто [target_location.GetName] лежить у занепаді та безладі. Роки безгосподарності місцевих вельмож перетворили його на жахливу тінь колишньої величі, жебраки заповнюють кожен куток, а провулки кишать розбійниками.\n\nНе дивно, що зрештою повстання мало спалахнути, і в цьому випадку повстанців очолює чоловік на ім'я [target_character.GetName]. Він добре відомий як нотаріус, чий брат був убитий під час інциденту з міським вельможею, і якого відправили поговорити з [GetCountry('PAP').GetGovernment.GetRulerTitle] і вразили його настільки, що він отримав офіційну посаду при його дворі на короткий період.\n\nНаші джерела повідомляють, що цей чоловік зібрав своїх прихильників і згуртував народ [target_location.GetNameWithNoTooltip]. Разом вони захопили Капітолій, не проливши жодної краплі крові, завдяки боягузтву правлячих вельмож, які просто втекли, побачивши натовп, і здали місто."
  rebel.1.a: "Дозволити йому утримати місто від вельмож."
  rebel.1.b: "Надати йому надзвичайні повноваження та керівництво містом."
  rebel.1.c: "Ми не допустимо такої анархії, повернімо місто!"
  cola_rebels: "Прихильники Коли ді Рієнцо"