l_english:
  STATIC_MODIFIER_NAME_minor_recovery_effort: "Незначні зусилля з відновлення"
  STATIC_MODIFIER_NAME_major_recovery_effort: "Значні зусилля з відновлення"
  earthquake_events.1.title: "Землетрус у [target_location.GetNameWithNoTooltip]"
  earthquake_events.1.desc: "На жаль, велике лихо спіткало [target_location.GetName]. Здавалося, небо і земля розкололися, спричинивши величезну сейсмічну активність, що призвела до переселення багатьох наших громадян і загального руйнування багатьох будівель по всьому місту. Найбільше постраждала наша велика [ShowWorkOfArtName('hagia_sophia')], зазнавши значних пошкоджень, ремонт яких може зайняти роки та коштувати багато монет..."
  earthquake_events.1.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  earthquake_events.1.b: "Негайно фінансувати її ремонт!"
  earthquake_events.title: "Землетрус у [target_location.GetNameWithNoTooltip] [GetCurrentYear] року"
  earthquake_events_minor.desc: "В районі [target_location.GetName] протягом останніх кількох днів повідомлялося про серію землетрусів. Хоча населення було в паніці, і значні пошкодження сталися як під час землетрусу, так і під час наступних пожеж, на щастя, збитки, схоже, знаходяться в керованому стані. Наші радники також зазначили, що ми могли б використати спричинені руйнування як зручну нагоду для реінвестування в [target_location.GetNameWithNoTooltip] і формування його за нашими бажаннями."
  earthquake_events_minor.a: "[target_location.GetOwner.Custom('common_string_negative')]"
  earthquake_events_minor.a.tt: "[Concept('target_location.GetName] та сусідні [locations', 'CONCEPT_PLACEHOLDER')|e] втратять незначну кількість [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] будуть зруйновані катастрофою."
  earthquake_events_minor.b: "Підтримати [target_location.GetNameWithNoTooltip] грошима"
  earthquake_events_minor.b.tt: "[Concept('target_location.GetName] та сусідні [locations', 'CONCEPT_PLACEHOLDER')|e] втратять незначну кількість [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] будуть зруйновані катастрофою. Завдяки нашим інвестиціям у [Concept('location', 'CONCEPT_PLACEHOLDER')|e] нам буде легше відбудовувати."
  earthquake_events_major.desc: "Землетрус вразив [target_location.GetName]! Сильні поштовхи протягом останніх кількох днів значною мірою зруйнували [target_location.GetNameWithNoTooltip] та прилеглу територію. Хоча багато збитків ще не повністю враховано, зрозуміло, що руйнування, спричинені цією подією, впливатимуть на територію протягом тривалого часу, якщо ми негайно не діятимемо і не надішлемо допомогу постраждалим!"
  earthquake_events_major.a: "[target_location.GetOwner.Custom('common_string_negative')]"
  earthquake_events_major.a.tt: "[Concept('target_location.GetName] та сусідні [locations', 'CONCEPT_PLACEHOLDER')|e] втратять значну кількість [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] будуть зруйновані катастрофою."
  earthquake_events_major.b: "Реінвестування необхідне, щоб допомогти [target_location.GetNameWithNoTooltip] відновитися"
  earthquake_events_major.b.tt: "[Concept('target_location.GetName] та сусідні [locations', 'CONCEPT_PLACEHOLDER')|e] втратять значну кількість [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] будуть зруйновані катастрофою. Завдяки нашим інвестиціям у [Concept('location', 'CONCEPT_PLACEHOLDER')|e] нам буде легше відбудовувати."
  earthquake_events_catastrophic.desc: "Протягом останніх кількох днів землетрус незрівнянної сили вразив [target_location.GetName]! Сила, з якою сталася ця подія, була набагато більшою, ніж те, до чого ми звикли, і громадяни [target_location.GetNameWithNoTooltip] сильно постраждали від катастрофи. Багато хто похований під завалами будівель, ще більше втратили свої домівки та притулок. Без реінвестування [target_location.GetNameWithNoTooltip] безумовно знадобилися б десятиліття, щоб належним чином відновитися, і ми повинні належним чином подбати про постраждалий район."
  earthquake_events_catastrophic.a: "[target_location.GetOwner.Custom('common_string_negative')]"
  earthquake_events_catastrophic.a.tt: "[Concept('target_location.GetName] та сусідні [locations', 'CONCEPT_PLACEHOLDER')|e] втратять значну кількість [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] будуть зруйновані катастрофою."
  earthquake_events_catastrophy.b: "Ми повинні допомогти бідним душам!"
  earthquake_events_catastrophy.b.tt: "[Concept('target_location.GetName] та сусідні [locations', 'CONCEPT_PLACEHOLDER')|e] втратять значну кількість [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] будуть зруйновані катастрофою. Завдяки нашим інвестиціям у [Concept('location', 'CONCEPT_PLACEHOLDER')|e] нам буде легше відбудовувати."
  earthquake_events.79.historical_info: "Землетрус, що зруйнував Лісабон, був катастрофою величезних масштабів, яка відгукнулася по всій Європі і навіть у Новому Світі. 1 листопада 1755 року земля раптом почала трястися, а будівлі почали руйнуватися. Для тих, хто вижив, це було далеко не кінець, оскільки в місті спалахнули пожежі, підтримувані сильними вітрами. Тисячі людей стали жертвами великої припливної хвилі, що досягла суші лише через кілька хвилин. Кількість загиблих тоді оцінювалася від 20 000 до 40 000 людей, і, враховуючи всі елементи, пояснення #italic покарання Боже#! було широко поширеною думкою як у Португалії, так і в інших місцях."
  earthquake_events.7.historical_info: "Лісабонський землетрус 1531 року стався вранці 26 січня 1531 року. Інтенсивність поштовхів землі в поєднанні з наступною повінню річки Тежу та цунамі, що вдарило по берегах Португалії, завдали серйозної шкоди місту та спричинили загибель приблизно 30 000 людей."
  earthquake_events.1000.title: "Землетрус у [target_location.GetNameWithNoTooltip]"
  earthquake_events.1000.desc: "Наче нашим нещастям не було кінця, руйнівний землетрус вразив [target_location.GetName] та прилеглі території. Майже кожна будівля в місті була зруйнована, змусивши тисячі мешканців тікати в пошуках нових домівок деінде. Але це не лише жахливий удар по колись жвавій економіці [target_location.GetNameWithNoTooltip] — це також може прокласти шлях для вторгнення наших ворогів!"
  earthquake_events.1000.a: "Нехай Бог змилується над нами!"
  earthquake_events.1000.b: "Ми повинні негайно відправити солдатів для укріплення території."
  earthquake_events.1000.tt: "[Concept('target_location.GetName] та сусідні прибережні [locations', 'CONCEPT_PLACEHOLDER')|e] втратять [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] постраждають від лиха"
  earthquake_events.1000.historical_info: "Землетрус 2 березня 1354 року спустошив Галліполі. Османи швидко скористалися нагодою, щоб перетнути Дарданелли та захопити місто, і таким чином здобули свій перший плацдарм у Європі."
  earthquake_events.1001.title: "$earthquake_events.1000.title$"
  earthquake_events.1001.desc: "[target_country.GetAdjectiveWithNoTooltip] місто [target_location.GetName] було вражене руйнівним землетрусом і тепер лежить у хаосі та руїнах. Люди розсіялися на всі чотири сторони, а оборона в безладді. Це здається Богом даною можливістю спробувати вирвати місто з рук [target_country.GetName] і переселити його нашими вірними підданими. Але більш обережний підхід полягав би в тому, щоб запросити деяких вправних містян оселитися в [capital_location.GetName]."
  earthquake_events.1001.a: "Знак від Бога! Плануйте атаку!"
  earthquake_events.1001.b: "Заохотити постраждалих переїхати до [capital_location.GetNameWithNoTooltip]."
  earthquake_events.1001.historical_info: "$earthquake_events.1000.historical_info$"
  earthquake_events.1100.title: "Доля [target_location.GetNameWithNoTooltip]"
  earthquake_events.1100.desc: "[target_location.GetName] лежить у руїнах після землетрусу, і наше завоювання не покращило ситуацію. Але знелюднене місто надає чудову можливість для переселення, і [ShowCultureName('turkish_culture')] анатолійці як міського, так і кочового походження вже почали переселятися — з нашого заохочення, звичайно. Це стане важливим плацдармом у Румелії!"
  earthquake_events.1100.a: "На те була Божа воля."
  earthquake_events.1100.historical_info: "Після того, як османський полководець Сулейман-паша завоював Галліполі, знелюднене місто було переселене турецькими мігрантами з Анатолії і стало першою турецькою твердинею в Європі. Це викликало великий страх у Константинополі і зрештою спровокувало Савойський хрестовий похід 1366–67 років."