l_english:
  king_in_prussia.1.title: "[target_country.GetAdjectiveWithNoTooltip] Корона"
  king_in_prussia.1.desc: "Коли наша велика нація підноситься до все вищих вершин, [target_character.GetName] оголосив(-ла) про свій намір піднести [target_country.GetName] до рангу [ShowCountryRankName('rank_kingdom')], а [target_character.GetHerselfHimself] — до рангу [target_character.Custom('GetQueenKing')]. Як [target_character.Custom('GetPrincessPrince')] [GetUniqueInternationalOrganization('hre').GetName], було б непристойно, якби ми не проконсультувалися з [emperor_character.Custom('GetEmpressEmperor')] у цій справі, і тому ми написали пропозицію, яку він(-вона) було б мудро ретельно розглянути."
  king_in_prussia.1.desc.emperor: "Наша нація підноситься до все вищих вершин. Хоча імперська милість перебуває на [target_character.GetName], [target_character.GetHerHis] приватна держава [target_country.GetName] досягла нової висоти могутності. Настав час скинути старий, дріб'язковий титул [target_character.Custom('GetPrincessPrince')] і заявити про належний ранг [target_character.Custom('GetQueenKing')]!"
  king_in_prussia.1.a: "Ми будемо королями!"
  king_in_prussia_request_tt: "Рішення буде прийнято [emperor_country.GetLongName]"
  king_in_prussia.2.title: "[target_character.Custom('GetQueenKing')] у [target_country.GetNameWithNoTooltip]"
  king_in_prussia.2.desc: "[target_country.GetName] є зростаючою силою в [GetUniqueInternationalOrganization('hre').GetName], стаючи все більш домінуючою в імперській політиці та утверджуючись як претендент на світовій арені. [target_character.GetName] оголосив(-ла) про свій намір створити [ShowCountryRankName('rank_kingdom')] Пруссії, піднявши націю зі статусу простого [target_country.GetFlavorRank]. Це майже безпрецедентно в [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip], і [emperor_character.GetName] повинен(-на) розглянути, як вирішити це питання."
  king_in_prussia.2.a: "Нехай [target_character.GetHerHim] називає [target_character.GetHerselfHimself] [target_character.Custom('GetQueenKing')] у [target_country.GetNameWithNoTooltip]."
  king_in_prussia_compromise_tt: "[target_country.GetName] стане [ShowCountryRankName('rank_kingdom')] в [GetUniqueInternationalOrganization('hre').GetName] через правовий компроміс, терпимий [emperor_character.Custom('GetEmpressEmperor')]"
  opinion_king_in_prussia: "Король у Пруссії"
  king_in_prussia.2.b: "Піднести [target_country.GetNameWithNoTooltip] до Імперського [ShowCountryRankNameWithNoTooltip('rank_kingdom')]."
  king_in_prussia_elevated_tt: "[target_country.GetName] стане [ShowCountryRankName('rank_kingdom')] в [GetUniqueInternationalOrganization('hre').GetName] за підтримки [emperor_character.Custom('GetEmpressEmperor')]"
  elevated_prussia: "Піднесена Пруссія"
  king_in_prussia.2.c: "Ми не визнаємо цього самопроголошеного монарха."
  king_in_prussia_rejection_tt: "[target_country.GetName] має обрати між своєю фальшивою короною та своїм статусом Імперського Принца."
  opinion_prussia_not_recognized: "Заперечує Прусську Легітимність"
  king_in_prussia.3.title: "Король у [target_country.GetNameWithNoTooltip]"
  king_in_prussia.3.desc: "Наш близький друг і союзник, [emperor_character.GetName], милостиво вирішив(-ла) піднести [target_country.GetName] до рангу Імперського [ShowCountryRankName('rank_kingdom')]! Такий привілей не надавався з часів піднесення Королів [GetCountry('BOH').GetName]. Королі [target_country.GetNameWithNoTooltip] носитимуть свою корону з гордістю, завжди пам'ятаючи про милість, надану їм [emperor_character.Custom('GetEmpressEmperor')]."
  king_in_prussia.3.a: "Дякуємо Богу та [emperor_character.Custom('GetEmpressEmperor')]!"
  king_in_prussia.4.title: "[target_character.Custom('GetQueenKing')] у [target_country.GetNameWithNoTooltip]"
  king_in_prussia.4.desc: "Імперська традиція диктує, що єдиними Королями в Імперії повинні бути Король Римлян, тобто [emperor_character.Custom('GetEmpressEmperor')] [emperor_character.GetHerselfHimself], та Король [GetCountry('BOH').GetName]. Однак ми досягли інтригуючого правового компромісу з [emperor_character.GetName]: наші монархи використовуватимуть титул '[target_character.Custom('GetQueenKing')] у [target_country.GetNameWithNoTooltip]'. Оскільки [target_country.GetName] лежить за межами [GetUniqueInternationalOrganization('hre').GetName], ми можемо називати себе Королями без необхідності для [emperor_character.Custom('GetEmpressEmperor')] порушувати імперські традиції."
  king_in_prussia.4.a: "Задовільний компроміс."
  king_in_prussia.5.title: "[target_character.Custom('GetQueenKing')] у [target_country.GetNameWithNoTooltip]"
  king_in_prussia.5.desc: "[emperor_character.GetName], цей безчесний пес, відмовився визнати наше право називати себе Королями, незалежно від того, які розумні компроміси ми пропонували. Ми, звісно, не звертатимемо на [emperor_character.GetHerHim] уваги і все одно титулуватимемо себе Королями."
  king_in_prussia.5.a: "Нам не потрібен дозвіл [emperor_character.Custom('GetEmpressEmperor')]."
  king_in_prussia.5.b: "Граціозно прийняти рішення [emperor_character.Custom('GetEmpressEmperor')]."
  king_in_prussia.6.title: "[ROOT.GetCountry.GetRulerOrRegent.Custom('GetQueenKing')] в та з [ROOT.GetCountry.GetNameWithNoTooltip]"
  king_in_prussia.6.desc: "З часу компромісу щодо титулу '[target_character.Custom('GetQueenKing')] у [ROOT.GetCountry.GetNameWithNoTooltip]', ідея офіційного піднесення [ROOT.GetCountry.GetName] до [ShowCountryRankName('rank_kingdom')] в [GetUniqueInternationalOrganization('hre').GetName] більше ніколи не згадувалася. Однак, найновіше питання в [GetUniqueInternationalOrganization('hre').GetParliament.GetName] змусило [emperor_character.GetName] переглянути цей компроміс. Щоб отримати голос [target_character.GetName] за нагальне питання, що стосується [GetUniqueInternationalOrganization('hre').GetParliament.GetCurrentDebate.GetName], було прийнято рішення надати титул [ShowCountryRankNameWithNoTooltip('rank_kingdom')] [ROOT.GetCountry.GetNameWithNoTooltip]."
  king_in_prussia.6.a: "Терпіння все ж винагороджується!"