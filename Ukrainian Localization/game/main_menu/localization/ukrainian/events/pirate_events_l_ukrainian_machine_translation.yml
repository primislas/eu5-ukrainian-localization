l_english:
  pirate_events.1.title: "[target_character.GetNameWithNoTooltip] Пірат"
  pirate_events.1.desc: "[ROOT.GetCountry.GetName], колись серце великої імперії Шрівіджая, довго змагалася за наш регіон із закордонними суперниками. Статус [GetCountry('MAJ').GetLongName] залишив наш [ROOT.GetCountry.GetFlavorRank] вразливим, і десятиліттями він слугував притулком для беззаконних піратів. Однак, течії знову змінилися, оскільки наша морська присутність розширюється. З'явилися нові групи каперів, і серед них постає хитрий і безжальний лідер, [target_character.GetName]. Отримавши посаду в нашому флоті, [target_character.GetSheHe] може виявитися цінним кандидатом на посаду адмірала."
  pirate_events.1.a: "Ми спробуємо щастя у відкритому морі!"
  pirate_events.1.b: "Нехай [target_character.GetHerHim] служить у флоті."
  pirate_events.1.c: "Відіслати [target_character.GetHerHim]."
  government_implements_several_policies_relevant_to_pirates_tt: "Наш уряд запровадить кілька [Concept('policies', 'CONCEPT_PLACEHOLDER')|e] для підтримки піратської діяльності вздовж наших узбереж"
  pirate_events.2.title: "Банда [target_character.GetNameWithNoTooltip]"
  pirate_events.2.desc: "Сумнозвісний [target_culture.GetName] пірат [target_character.GetName] та [target_character.GetHerHis] безжальна банда головорізів прибули до порту в [target_location.GetName], де [target_character.GetSheHe] шукає аудієнції у [target_character_2.GetName]. [target_character.GetShortNameWithNoTooltip] відомий [target_character.GetHerHis] жорстокістю, здобуваючи небезпечні трофеї та потопивши багатьох ворогів лише цього року. Кажуть, що в [ShowAreaNameWithNoTooltip('taiwan_area')] [target_character.GetSheHe] вирізав корінне населення і використав їхню кров як конопатку, щоб залатати протікання на [target_character.GetHerHis] кораблі.\n\n[target_character.GetSheHe] заявляє, що [target_character.GetHerHis] мета в [target_location.GetNameWithNoTooltip] — запропонувати [target_character.GetHerHis] послуги [ROOT.GetCountry.GetFlavorRank] в обмін на притулок від [target_culture.GetNameWithNoTooltip] влади. Однак, зважаючи на [target_character.GetHerHis] репутацію та розмір [target_character.GetHerHis] флоту, ймовірно, що [target_character.GetHerHis] справжні амбіції в [target_location.GetRank.GetNameWithNoTooltip] виходять за межі того, що [target_character.GetSheHe] заявляє."
  build_galleys_to_navy_size_percentage_tt: "Флот галерних [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] буде побудовано в [target_location.GetName]"
  pirate_events.4.title: "Тиранія [target_character.GetNameWithNoTooltip]"
  pirate_events.4.desc: "Коли піратський капітан піднімає чорний прапор, він мусить вселяти жах у серця всіх, хто його бачить. Але він також мусить завойовувати повагу своєї команди і, принаймні теоретично, командувати кораблем за їхньою згодою.\n\n[target_character.GetShortName] здобув [target_character.GetHerselfHimself] жорстоку та тиранічну репутацію. Покарання, які [target_character.GetSheHe] застосовує навіть за найменші та необґрунтовані провини, є надмірними навіть за стандартами беззаконних людей. Невдоволення зростає, і це лише питання часу, перш ніж команда візьме справу у свої руки."
  pirate_events.4.a: "Заколот!"
  pirate_events.4.b: "Слово капітана — закон."
  pirate_events.5.title: "Розподіл здобичі"
  pirate_events.5.desc: "Наш останній трофей від [target_privateer.GetName] виявився набагато ціннішим вантажем, ніж очікувалося. Цей факт ще не розкрито екіпажам, які очікували б і вимагали, щоб додаткова здобич була додана до їхньої частки.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] залучених кораблів бажають приховати гроші для переобладнання своїх суден та придбання додаткових гармат, тоді як представник [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] стверджує, що найкраще витратити їх на підкуп чиновників у законних портах."
  pirate_events.5.a: "Розділити порівну між екіпажем."
  pirate_events.5.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] візьмуть свою частку."
  pirate_events.5.c: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] отримають додаткову частку."
  pirate_events.6.title: "Підроблені супровідні документи"
  pirate_events.6.desc: "Піратство — небезпечна справа, але контрабанда може нести не менший ризик, якщо не вжити належних запобіжних заходів. Наші контрабандисти отримують прибуток, купуючи крадені товари у піратських екіпажів і продаючи їх з прибутком на законних ринках.\n\nЩоб продати ці незаконно придбані товари, контрабандисти повинні підкуповувати портових чиновників, щоб ті ігнорували їхнє походження, або ж пред'являти прийнятні документи, що підтверджують їхню законність. [target_character.GetName], вправний фальсифікатор, нещодавно вступив до нашої служби і забезпечив нас низкою документів, які повинні бути прийняті майже в будь-якому порту, забезпечуючи безперебійну роботу наших операцій."
  pirate_events.6.a: "Це добре для бізнесу."
  pirate_events.7.title: "Капер переходить на бік ворога"
  pirate_events.7.desc: "Капітан флоту [target_navy.GetName], [target_character.GetName], здобув собі чималу славу на службі [target_country.GetAdjective] флоту. Однак оплата, яку [target_character.GetSheHe] отримував за [target_character.GetHerHis] підприємства, була значно меншою за повну вартість самих підприємств.\n\nЯк і багато кмітливих капітанів, [target_character.GetSheHe] усвідомив, що [target_character.GetSheHe] міг би отримати більший прибуток, ставши піратом. [target_character.GetSheHe|U] викинув [target_character.GetHerHis] каперський патент за борт і взяв курс на наші береги. Як пірат [ROOT.GetCountry.GetLongName], [target_character.GetSheHe] буде вільний грабувати досхочу і зберігати здобич, яку [target_character.GetSheHe] по праву вкрав."
  pirate_events.7.a: "За прибуток і грабунок!"
  pirate_events.8.title: "Захоплений невільничий корабель"
  pirate_events.8.desc: "Після абордажу нашого останнього трофею з [target_privateer.GetName] ми виявили, що трюми були заповнені полоненими рабами. Багато хто з наших екіпажів самі пережили жахи рабства, і, природно, їхнім першим інстинктом було вимагати звільнення рабів та їх включення до екіпажу або відправлення до [target_location.GetName].\n\nМенш сумлінні члени екіпажу, які особливо прагнуть золота, воліли б натомість ставитися до цих людей як до вантажу і продати їх скупнику. Вони стверджують, що не буде жодної грошової компенсації за їхні зусилля щодо захоплення цього трофею, якщо ми відмовимося отримувати прибуток від торгівлі рабами."
  pirate_events.8.a: "Звільніть їх! Нехай живуть вільно в [target_location.GetNameWithNoTooltip]."
  pirate_events.8.b: "Це просто вантаж, який потрібно продати заради прибутку."
  pirate_events.9.title: "Кілювання"
  pirate_events.9.desc: "Настав час знову кілювати кораблі. Цей виснажливий процес вимагає від екіпажів витягувати кораблі на безпечний пляж під час припливу та безпечно нахиляти їх на бік, щоб оголити корпус для ремонту.\n\nЦе завдання, якого боїться кожен пірат, не лише тому, що ризик пошкодження корабля та травмування екіпажу високий, але й через виснажливу працю, яку вони повинні виконати, щоб робота була зроблена правильно. Кілька прихильників серед наших [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] вважають, що до кілювання слід підходити більш розслаблено, незважаючи на наполягання [target_character.GetShortName] на тому, що невиконання належного ремонту спричинить набагато більше проблем у майбутньому."
  pirate_events.9.a: "Забезпечте ретельну роботу екіпажів."
  pirate_events.9.b: "Дозвольте екіпажам відпочити."
  pirate_events.10.title: "Контрабандисти борються"
  pirate_events.10.desc: "Навіть у найкращі часи важко контрабандою доставляти заборонені товари до іноземних портів. Це, безумовно, не найкращі часи. Багато наших контрабандистів повертаються до [target_location.GetName], маючи конфісковані товари. Деякі взагалі не повертаються і чекають шибениці."
  pirate_events.10.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  pirate_events.11.title: "Позиція [ROOT.GetCountry.Custom('GetHeadOfCabinetName')]"
  pirate_events.11.desc: "Оскільки попередній [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] [ROOT.GetCountry.GetLongName], схоже, здійснив довгу прогулянку по короткій дошці, ми потребуємо нового кандидата на цю роль. Посада [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] має унікальну юрисдикцію та підзвітність у межах нашого [ROOT.GetCountry.GetFlavorRank]. Обраний екіпажем, він має бути їхнім представником і відстоювати їхні потреби проти часто довільної влади капітана.\n\nОдразу ж з'являються два кандидати. [target_character_1.GetName] є справжнім захисником екіпажу; [target_character_1.GetSheHe] має як скромність, щоб слухати їхні занепокоєння, так і стійкість, щоб протистояти капітану. Тим часом [target_character_2.GetName] міцно сидить у кишені будь-якого капітана; [target_character_2.GetSheHe] вміє маніпулювати екіпажем, змушуючи їх вірити, що наші бажання є також їхніми власними. Хто завоює серця та уми зібраних піратів?"
  pirate_events.11.a: "Підвищити [target_character_1.GetNameWithNoTooltip]."
  pirate_events.11.b: "Довірити посаду [target_character_2.GetNameWithNoTooltip]"
  pirate_events.11.c: "Не може бути фаворитизму!"
  as_long_as_cabinet_tt: "доки цей [Concept('character', 'CONCEPT_PLACEHOLDER')|e] працює в [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  pirate_events.12.title: "Екіпаж у чорному списку"
  pirate_events.12.desc: "Екіпаж нашого головного флоту — це загроза. Хоча вони мають відмінний послужний список у доставці призів, як тільки вони заходять у порт, їхнє пияцтво та насильство завдають стільки шкоди та руйнувань у [target_location.GetName], що багато хто дивується, чи варті вони тих проблем, які вони спричиняють. Після особливо руйнівного епізоду місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вирішили внести весь екіпаж до чорного списку, зробивши їх нездатними продавати свою здобич будь-де в [ROOT.GetCountry.GetFlavorRank].\n\nЦе викликало обурення серед піратів, які називають [target_location.GetNameWithNoTooltip] своїм домом; вони вважають, що їхні природні права жити так, як їм заманеться, порушуються, і кілька бунтівників порівнюють контрабандистів зі снобістськими аристократами."
  pirate_events.12.a: "Ніхто не сміє кидати виклик нашому кодексу!"
  pirate_events.12.b: "Зберегти заборону."
  pirate_events.12.c: "Зняти заборону."