l_english:
  mercs.1.title: "Невдоволення серед [SCOPE.sMercenary('patriotic_mercs').GetName]"
  mercs.1.desc: "Багато хто з [SCOPE.sMercenary('patriotic_mercs').GetName] розвинули безпідставні сентиментальні почуття до своєї жалюгідної батьківщини [SCOPE.sCountry('merc_home_country').GetName]. Значна частина їхніх людей дезертує, жахаючись думки побачити свої рідні міста у вогні."
  mercs.1.a: "Їхні серця слабкі."
  mercs.1.b: "Золото – ось що шотландці справді люблять."
  mercs.2.title: "Ворог їхнього ворога"
  mercs.2.desc: "Солдати [bloodthirsty_mercs.GetName] радісно очікують нагоди битися зі своїми ненависними ворогами, [bloodthirsty_mercs_enemy.GetAdjective]. Здається, гірка ворожнеча між [bloodthirsty_mercs_home.GetName] та [bloodthirsty_mercs_enemy.GetNameWithNoTooltip] поширюється навіть на найманих мечів."
  mercs.2.a: "Щасливий збіг."
  mercs.2.b: "Почуття, яке поділяють усі справжні [ROOT.GetCountry.GetAdjective] чоловіки."
  mercs.3.title: "Плата здобиччю"
  mercs.3.desc: "Кілька найманих компаній, що перебувають у нас на службі, стають незадоволеними умовами своєї зайнятості. Багатства ворожих міст, таких як [rich_enemy_province.GetName], ледве порівнюються з їхніми мізерними зарплатами, або так вони стверджують. Капітан [loot_mercs.GetName] зайняв принципову позицію і вимагає, щоб велика частина військових трофеїв була зарезервована для нього та його людей."
  mercs.3.a: "Нехай візьмуть свою частку здобичі."
  mercs.3.b: "Відмовити у здобичі, але збільшити їхню платню."
  mercs.4.title: "Ветерани стікаються до [veteran_mercs.GetName]"
  mercs.4.desc: "[ROOT.GetCountry.GetName] високо цінується серед найманих капітанів як за наш міжнародний престиж, так і, що найважливіше, за нашу репутацію щодо своєчасної виплати найманим солдатам за узгодженими ставками. Приплив іноземних ветеранів приєднався до [veteran_mercs.GetName], сподіваючись знайти стабільну роботу під нашим керівництвом."
  mercs.4.a: "Хто б не хотів воювати за [ROOT.GetCountry.GetName]?"
  mercs.5.title: "Слони!"
  mercs.5.desc: "Вперше з часів Ганнібала та Пунічних війн бойові слони повернулися до Європи під командуванням [ROOT.GetCountry.GetAdjective] генералів. Наші вороги тремтять від страху перед цими масивними, величними звірами, одягненими в обладунки та прикрашеними символами війни."
  mercs.5.a: "Нехай тремтять перед [elephant_mercs.GetName]."
  mercs.7.title: "Високий попит на [popular_mercs.GetName]"
  mercs.7.desc: "Оскільки конфлікти, що спустошують наш куточок світу, тривають, послуги найманих компаній користуються високим попитом. [popular_mercs.GetName] виявили, що їхні особливі таланти особливо підходять для поточної ситуації, і були законтрактовані кількома воюючими державами.\n\nКоли солдати [popular_mercs.GetName] повертаються додому в [popular_mercs_origin.GetName], вони приносять із собою військові трофеї, включаючи як свою контрактну зарплату, так і будь-які багатства, які вони змогли розграбувати під час своєї кампанії. Цей приплив багатства стимулював місцеву економіку та заохочує подальший набір до [popular_mercs.GetName]."
  mercs.7.a: "Нехай багатство тече."
  mercs.10.title: "Наймана ревність"
  mercs.10.desc: "[pious_mercs.GetName] дуже серйозно ставляться до своєї [ROOT.GetCountry.GetReligion.GetName] віри, принаймні за стандартами найманих мечів. Натхненні нашою праведною справою, Компанія перебуває у піднесеному настрої, готуючись до битви з безбожними [pious_mercs_enemy.GetName]."
  mercs.10.a: "Наша справа праведна!"