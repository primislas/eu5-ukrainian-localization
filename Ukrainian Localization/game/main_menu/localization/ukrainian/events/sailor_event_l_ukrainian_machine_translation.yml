l_english:
  sailor_event.1.title: "Величезне та Безмежне Море"
  sailor_event.1.desc: "На відміну від поклику на сухопутні поля битв, що є справою обов'язку та пошуку слави, море кличе багатьох вільних духів, яким мало діла до таких речей. Історії про плавання океанами світу та минулі експедиції [ROOT.GetCountry.GetAdjectiveWithNoTooltip] флоту переказуються старими моряками як пригоди, багато величних краєвидів пам'ятаються, багато великих жертв забуваються.\n\nЧи дивно, маючи таку спадщину, що молодь [ROOT.GetCountry.GetName] прагне морських просторів? Набагато більше приєдналося до нашого флоту за останній рік. Дехто може закінчити своє життя на дні океану, але ті, хто повернеться, обов'язково збережуть історії живими."
  sailor_event.1.a: "Ми пишемо спадщину, що надихає майбутні покоління."
  sailor_event.2.title: "Суворе Життя в Океані"
  sailor_event.2.desc: "Багато хто вступає до лав нашого флоту, очікуючи більш захопливого життя, що чекає на них з цією можливістю залишити свій дім і побачити моря та землі за [ROOT.GetCountry.GetAdjective] кордонами. Не всі з них готові до часто суворого, а ще частіше нудного та монотонного життя в морі. Застрягши з нескінченно повторюваними завданнями, їжею та компанією під час довших подорожей, багато молодих моряків швидко шкодують про своє рішення.\n\nВідкинуті як мрійливі сухопутні щури своїми більш досвідченими товаришами по команді, вони швидко стають більшою проблемою, ніж варті. Дехто з часом може звикнути до реалій роботи та стати корисним, але інші приносять більше користі, повертаючись додому."
  sailor_event.2.a: "Пропаганда вербування має свої недоліки."
  sailor_event.3.title: "Моряки Згуртовуються на Допомогу Армії"
  sailor_event.3.desc: "Наша армія зазнала значних втрат протягом останніх років, тисячі життів загинули в бою. Тим часом ті, хто служить [ROOT.GetCountry.GetName] на морі, не зазнали такої ж долі. Попри жертви, які вони принесли для захисту нашої нації, лави нашого флоту не бракують рук на палубі.\n\nЯк наслідок, флот почав заохочувати тих, хто готовий ризикувати своїм життям у морі, натомість допомагати нашим хворим сухопутним військам. Зрештою, якщо нікому захищати наші порти, навіть наші найкращі кораблі та екіпажі не матимуть де пришвартуватися."
  sailor_event.3.a: "Нові рекрути повинні йти туди, де вони потрібні."
  sailor_event.4.title: "Солдати Згуртовуються на Допомогу Флоту"
  sailor_event.4.desc: "В останніх конфліктах багато життів було втрачено в морі. Хоча наша армія добре відновилася, капітанам важко набирати екіпажі для [ROOT.GetCountry.GetAdjective] кораблів, і багато гірких історій було розказано аж до двору [ROOT.GetCountry.GetGovernment.GetRuler.GetName] про жертви, які приніс наш флот.\n\nВсе частіше армійські лідери звертають на це увагу, заохочуючи тих, хто міг би служити в їхніх лавах, подорожувати до узбережжя та замість цього комплектувати наші кораблі. Хоча їм ще багато чого доведеться навчитися, їхня допомога буде потрібна флоту для відновлення."
  sailor_event.4.a: "Нові рекрути повинні йти туди, де вони потрібні."
  sailor_event.5.title: "Шлях до Моря"
  sailor_event.5.desc: "Хоча [ROOT.GetCountry.GetName] не має мореплавної культури багатьох прибережних націй, ми все ж пишаємося короткою смугою землі, яка надає нам доступ до моря. [ROOT.GetCountry.GetAdjectiveWithNoTooltip] узбережжя надає багато можливостей і приваблює багатьох сповнених надій молодих відвідувачів, які шукають нового життя.\n\nХоча наша морська спроможність обмежена, наявність більшої кількості молодих людей з досвідом у човнярстві посилила б екіпажі наших кораблів. Можливо, ми могли б допомогти цим сповненим надій морякам оселитися в їхньому новому домі?"
  sailor_event.5.a: "Їхні амбіції слід заохочувати."
  sailor_event.5.b: "Вони досить швидко втомляться від моря."