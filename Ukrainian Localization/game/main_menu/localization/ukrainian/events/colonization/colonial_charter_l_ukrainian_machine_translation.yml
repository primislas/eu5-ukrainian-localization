l_english:
  colonial_charter.1.title: "Компанія [SCOPE.sLocation('new_colony').GetNameWithNoTooltip]"
  colonial_charter.1.desc: "Наша нація оточена територіями, ще не заявленими жодним з наших суперників. Наше прагнення розширити землі, що належать короні, вкоренилося серед нашого народу як націоналістичний запал, і нова приватна компанія заснувала себе з наміром привести поселенців на землі [SCOPE.sLocation('new_colony').GetName], щоб заявити права на територію заради Слави, Золота, [ROOT.GetCountry.GetGovernment.GetRulerTitle] та їхньої Компанії. Якщо ми дозволимо їхнє розширення, вони привезуть велику кількість поселенців до провінції та швидко розширять [ROOT.GetCountry.GetAdjective] вплив у цьому районі."
  colonial_charter.1.a: "Це може бути лише на користь нам. Залишити їх у спокої."
  colonial_charter.1.b: "Стягнути з них додаткові збори!"
  colonial_charter.3.title: "Хвиля імміграції"
  colonial_charter.3.desc: "Одна з наших колоній, [target.GetName], отримала наплив іммігрантів, що шукають щастя в наших колоніях. Вона незабаром стане самодостатнім містом, що приноситиме багато багатства нашому володінню."
  colonial_charter.3.a: "Це приємно бачити."
  colonial_charter.4.title: "Колоніальна катастрофа"
  colonial_charter.4.desc: "Катастрофа спіткала одну з наших колоній. Багато поселенців загинуло, а ще більше повернулося додому. Це катастрофа, і ми можемо навіть втратити нашу колонію."
  colonial_charter.4.a: "Цьому не зарадити."
  colonial_charter.4.b: "Не шкодувати зусиль у допомозі колонії."
  colonial_charter.5.title: "Дружба з тубільцями"
  colonial_charter.5.desc: "Наші колоністи зуміли налагодити зв'язок з тубільцями та досягти з ними порозуміння. Ця угода дозволила [SCOPE.sColonialCharter('target').GetName] більший простір для зростання без обурення тубільців."
  colonial_charter.5.a: "Це варте подяки!"
  colonial_charter.6.title: "Залучення жінок, придатних до шлюбу"
  colonial_charter.6.desc: "Піонерська колонія — це переважно чоловіче місце, але, у міру розвитку колонії, ми прагнемо зростати менше за рахунок еміграції і більше за рахунок народження дітей. Колоніальна компанія, відповідальна за [SCOPE.sColonialCharter('target').GetName], організувала подорож до колонії кількох жінок, придатних до шлюбу, переважно вдів, щоб забезпечити створення сімей."
  colonial_charter.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  colonial_charter.7.title: "Заохочувати систему енком'єнди"
  colonial_charter.7.desc: "Питання тубільного населення є для нас ключовим. Ми повинні забезпечити, щоб тубільці під нашою опікою були захищені від ворожих сусідів, належним чином цивілізовані та сповідували істинну віру. Наш план полягає в тому, щоб доручити нашим колоністам цей обов'язок, згідно з яким кожному колоністу буде надано певну кількість тубільців для навчання та захисту. Це, очевидно, не те, що люди робитимуть безкоштовно, тому тубільці надаватимуть нашим колоністам певну кількість днів праці взамін."
  colonial_charter.7.a: "Це чудовий розвиток подій!"
  STATIC_MODIFIER_NAME_encomienda_system: "Система енком'єнди"
  STATIC_MODIFIER_DESC_encomienda_system: "Система енком'єнди надає кожному колоністу певну кількість тубільців для навчання та захисту і, взамін, тубільці надаватимуть нашим колоністам певну кількість днів праці."
  colonial_charter.8.title: "Євангельська місія"
  colonial_charter.8.desc: "Сподіваючись на добрі справи, люди віри поширювали істинну віру серед населення [SCOPE.sLocation('missionary_location').GetName]. Наші інвестиції в місію там справді окупилися."
  colonial_charter.8.a: "Поширювати Добру Новину"
  colonial_charter.9.title: "Колонія у скруті!"
  colonial_charter.9.desc: "Наші колоніальні зусилля розпорошені. Одна з наших колоній потрапила у скруту, оскільки їжу стало важко знайти. Багато померло, а ще більше покинуло колонію та повернулося додому."
  colonial_charter.9.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  colonial_charter.9.b: "Ми мусимо їм допомогти!"
  colonial_charter.10.title: "Неврожай"
  colonial_charter.10.desc: "[SCOPE.sColonialCharter('target').GetName] постраждала від низки неврожаїв, що призвело до нестачі їжі. Колонія стає менш привабливою для нових іммігрантів, тоді як інші покидають її, щоб повернутися додому. Це шкодить перспективам колонії."
  colonial_charter.10.a: "Ми не можемо їх покинути."
  colonial_charter.10.b: "Вони можуть впоратися самостійно."
  colonial_charter.100.title: "Колонія [SCOPE.sProvince('target').GetNameWithNoTooltip]"
  colonial_charter.100.desc: "Хартія, яку ми заснували для колонізації [SCOPE.sProvince('target').GetName], тепер виконала свою роль і стала повноцінною колонією. Тепер нам потрібно вирішити, як ми хочемо розпорядитися цією територією!"
  colonial_charter.100.a: "Сформувати нового колоніального суб'єкта."
  colonial_charter.100.b: "Дозволити їй приєднатися до [SCOPE.sCountry('potential_join_1').GetNameWithNoTooltip]."
  colonial_charter.100.c: "Дозволити їй приєднатися до [SCOPE.sCountry('potential_join_2').GetNameWithNoTooltip]."
  colonial_charter.100.d: "Залишити її частиною [ROOT.GetCountry.GetNameWithNoTooltip] поки що!"
  colonial_charter.100.e: "Чому б не почати нове життя в колоніях?"
  colonial_charter.100.f: "Дозволити їй приєднатися до [SCOPE.sCountry('potential_join_big_regional_subject').GetNameWithNoTooltip]."
  colonial_charter.100.e.tt: "Перейти до гри за нового колоніального суб'єкта."
  colonial_charter.200.title: "Невдала колонія [target.GetNameWithNoTooltip]"
  colonial_charter.200.desc: "Хартія, яку ми заснували для колонізації [target.GetNameWithNoTooltip], повністю провалилася; [attacker.GetLongName] був успішнішим і відбив усі наші спроби!"
  colonial_charter.200.a: "Це катастрофа!"