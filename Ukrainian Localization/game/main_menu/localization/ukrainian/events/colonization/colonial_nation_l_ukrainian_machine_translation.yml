l_english:
  colonial_nation.4.title: "Борець за свободу чи бунтівник?"
  colonial_nation.4.desc: "Полковник в армії здобуває собі ім'я як рішучий прихильник збройного опору проти [ROOT.GetCountry.GetDiplomacy.GetOverlord.GetLongName]. Окрім того, що він обдарований солдат, він, здається, є натхненним і харизматичним лідером, і все більше людей прислухаються до його ідей незалежності.\n\nЧи варто нам таврувати його як зрадника та бунтівника, чи, можливо, він той, хто може допомогти нам скинути наші колоніальні кайдани та повести [ROOT.GetCountry.GetName] до свободи?"
  colonial_nation.4.a: "Підвищити його до генерала!"
  colonial_nation.4.b: "Його треба стратити!"
  colonial_nation.5.title: "Неприємності в [from.GetName]"
  colonial_nation.5.desc: "Полковник [from.GetAdjective] армії здобуває собі ім'я як рішучий прихильник збройного опору проти [ROOT.GetCountry.GetName]! Окрім того, що він обдарований солдат, він, здається, є натхненним і харизматичним лідером, і все більше людей прислухаються до його небезпечних ідей незалежності.\n\nАле замість того, щоб негайно обезголовити цього вискочку, місцева влада в [from.GetName] підвищила його до генерала!"
  colonial_nation.5.a: "Як вони сміють?!"
  colonial_nation.6.title: "Колоніального бунтівника страчено"
  colonial_nation.6.desc: "Полковник [from.GetAdjective] армії здобуває собі ім'я як рішучий прихильник збройного опору проти [ROOT.GetCountry.GetName]! Окрім того, що він обдарований солдат, він, здається, є натхненним і харизматичним лідером, і все більше людей прислухаються до його небезпечних ідей незалежності.\n\nНа щастя, [from.GetCountry.GetGovernment.GetRulerTitle] [from.GetCountry.GetGovernment.GetRuler.GetName] швидко розібрався з цією справою, відрубавши полковнику голову. Ця дія, однак, здається, розпалила ще більше бажання свободи в [from.GetName]..."
  colonial_nation.6.a: "Можливо, це було поспішне рішення..."
  colonial_nation.14.title: "Тягар війни"
  colonial_nation.14.desc: "Наша нещодавня війна виснажила країну. Можливо, частину цього тягаря слід розділити з нашими колоніями?"
  colonial_nation.14.a: "Збільшити колоніальне оподаткування!"
  colonial_nation.14.b: "Ми візьмемо тягар на себе."
  colonial_nation.15.title: "Тягар війни"
  colonial_nation.15.desc: "Нещодавня війна [from.GetName] виснажила нашу країну. Оскільки війна зачепила одного з наших сусідів, [from.GetCountry.GetGovernment.GetRulerTitle] [from.GetCountry.GetGovernment.GetRuler.GetName] тепер вирішив, що ми повинні взяти на себе частину тягаря!"
  colonial_nation.15.a: "Нестерпно!"
  colonial_nation.182.title: "Корумпований губернатор"
  colonial_nation.182.desc: "Боротьба [ROOT.GetCountry.GetGovernment.GetRuler.GetName] з управлінням нашою нацією не є таємницею, і нашим найдосвідченішим дипломатам довелося замовчувати чутки про [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] некомпетентність у спробі зберегти мир у колонії. Однак нещодавнє зростання корупції призвело до неминучого. Один з наших колишніх адміністраторів оприлюднив інформацію, що грошова допомога, отримана від Корони, пішла безпосередньо в кишеню [ROOT.GetCountry.GetGovernment.GetRuler.GetName].\n\nЦя ганебна поведінка в часи потреби призвела до низки повстань серед нашого народу, якими потрібно зайнятися."
  colonial_nation.182.a: "Це обурливо."
  colonial_nation.183.title: "Новий губернатор"
  colonial_nation.183.desc: "Чутки про неефективне правління [ROOT.GetCountry.GetGovernment.GetRuler.GetName] неминуче дійшли до Корони, поширюючи занепокоєння щодо того, як ця прикра ситуація може вплинути на їхню репутацію та нашу. Під загрозою асиміляції Короною, колонія запропонувала нам паліативну угоду: призначити нового губернатора, який зможе взяти кермо нашої колонії, поки не стало надто пізно."
  colonial_nation.183.a: "Ми повинні прислухатися до їхньої поради."
  colonial_nation.183.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] все ще може правити."
  colonial_nation.184.title: "[ROOT.GetCountry.GetName] у боргах!"
  colonial_nation.184.desc: "Важкі часи, що спіткали нашу колонію, не мають видимого кінця. Грошовий борг, що нині лежить на нас, зламав дух нашого народу, який, спонуканий голодом, що страждають їхні родини, вимагає, аби [ROOT.GetCountry.GetGovernment.GetRuler.GetName] знайшов негайне та ефективне рішення."
  colonial_nation.184.a: "Ми використаємо наш вплив, аби вирішити це."
  colonial_nation.184.b: "Їхні скарги безпідставні."
  colonial_nation.186.title: "Колоніальні стимули"
  colonial_nation.186.desc: "Землі нашої колонії родючі та чудово підходять для землеробства, наш народ добрий і гостинний, наша адміністрація настільки ефективна, наскільки це можливо, а вітер співає про спокій і стабільність, що дуже відрізняється від політичних заворушень метрополії. Ми справді рай на землі, але зміни часто є неприємним, хоча іноді необхідним, процесом, і наше населення не таке високе, як нам хотілося б.\n\nОдин радник запропонував запровадити нову політику, збільшивши нашу толерантність до інших віросповідань, аби привабити більше колоністів до нашої процвітаючої землі."
  colonial_nation.186.a: "Це, безперечно, приведе до нас більше поселенців."
  STATIC_MODIFIER_NAME_colonist_incentives: "Колоніальні стимули"
  STATIC_MODIFIER_DESC_colonist_incentives: "Новий набір привілеїв надано всім віросповіданням."
  colonial_nation.187.title: "Умиротворити [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]"
  colonial_nation.187.desc: "Серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] виникли занепокоєння щодо правління нашою колонією. Їхні думки натяками та потай поширювалися протягом останніх кількох місяців, але тепер у багатьох аспектах стало зрозуміло, що їхнє невдоволення є виразним і тривожним.\n\nОдин з їхніх членів звернувся до [ROOT.GetCountry.GetGovernment.GetRuler.GetName] цього ранку, ще до того, як [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] зміг(змогла) відвідати раду, і досить чітко висловив(висловила) свої наміри, сказавши: «Ми глибоко стурбовані тим, що шляхетна олігархія впливає на долю [ROOT.GetCountry.GetName] своїми вадами та жадібністю Старого Світу»."
  colonial_nation.187.a: "Ми повинні стати на бік [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]."
  colonial_nation.187.b: "Нам потрібно захистити [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  colonial_nation.188.title: "Шляхетне занепокоєння"
  colonial_nation.188.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] не дуже добре приховують свої політичні позиції, та й, схоже, їм байдуже. Їх чули на бенкетах і святах, як вони голосно заявляли, що колонія приречена на провал через владу, яку так несправедливо утримують [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')].\n\nОднак сьогодні їхні наміри призвели до безпрецедентного кроку: один з них прийшов до покоїв [ROOT.GetCountry.GetGovernment.GetRuler.GetName] ще до світанку. «Вибачте, що перериваю ваш відпочинок, мій [ROOT.GetCountry.GetGovernment.GetRulerTitle], — сказали вони, — проте щось потрібно зробити негайно. Зухвалість [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та відсутність чесноти перетворюють цю колонію на рай для дурнів. Це потрібно зупинити до сьогоднішньої ради»."
  colonial_nation.188.a: "Ми повинні стати на бік [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  colonial_nation.188.b: "Нам потрібно захистити [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]."