l_english:
  colonial_policies.10.title: "Колоністська лихоманка"
  colonial_policies.10.desc: "Чутки про наш Пошук Нового Світу призвели до того, що все більше людей готуються до нового життя як колоніальні поселенці."
  colonial_policies.10.a: "Вони можуть бути корисними."
  STATIC_MODIFIER_NAME_colonial_enthusiasm: "Колоніальний ентузіазм"
  STATIC_MODIFIER_DESC_colonial_enthusiasm: "Великі групи амбітних людей зацікавлені в переїзді до колоній."
  colonial_policies.11.title: "Люди тікають до колоній"
  colonial_policies.11.desc: "Наш Пошук Нового Світу відкрив можливості для людей у наших колоніях. Триваюча війна переконала багатьох найкращих і найяскравіших представників нашої країни, що час скористатися цими можливостями настав."
  colonial_policies.11.a: "Нехай ідуть."
  colonial_policies.11.b: "Їх треба зупинити."
  colonial_policies.13.title: "Видатні віцекоролі"
  colonial_policies.13.desc: "Час від часу країна благословляється чесними людьми, які наполегливо працюють на державу. Низка добрих віцекоролів у наших заморських володіннях дає нам справжній поштовх."
  colonial_policies.13.a: "Ми раді це чути."
  STATIC_MODIFIER_NAME_excellent_administration: "Відмінна адміністрація"
  STATIC_MODIFIER_DESC_excellent_administration: "Наші віцекоролі виконують видатну роботу, покращуючи наш дохід від наших заморських провінцій."
  colonial_policies.14.title: "Корумповані віцекоролі"
  colonial_policies.14.desc: "Заморські провінції, як відомо, важко контролювати, і добрі віцекоролі є необхідними для підтримання порядку. Однак іноді справи йдуть не за планом, і корумповані та продажнi люди опиняються при владі."
  colonial_policies.14.a: "Вжити заходів."
  colonial_policies.14.b: "Просто заплющити очі."
  STATIC_MODIFIER_NAME_corrupt_viceroys: "Корумповані віцекоролі"
  STATIC_MODIFIER_DESC_corrupt_viceroys: "На жаль, деякі з наших нещодавно призначених віцекоролів вважають, що коли вони обіймають посаду заради прибутку під короною, то частина, що стосується прибутку, є найважливішою."
  colonial_policies.21.title: "Успішна компанія"
  colonial_policies.21.desc: "Наше рішення надати концесію торговій компанії виявилося мудрим. Наші прибутки значно зросли, і ці гроші можуть бути корисними для інших справ."
  colonial_policies.21.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  colonial_policies.22.title: "Колоніальний ентузіазм"
  colonial_policies.22.desc: "'Нове життя чекає на вас у колоніях! Шанс почати все спочатку в золотій країні можливостей та пригод!' Колоніальне життя не таке, але люди вірять, що це так, і мчать до колоній, перш ніж ці уявні можливості зникнуть."
  colonial_policies.22.a: "Вони дурні..."
  colonial_policies.23.title: "Дипломатичні кроки"
  colonial_policies.23.desc: "Наш дипломатичний корпус наполегливо працював, щоб забезпечити представлення наших інтересів у закордонних дворах. Їхні зусилля дозволили нам ще більше розширити мережу нашого впливу."
  colonial_policies.23.a: "Це гарна новина!"
  STATIC_MODIFIER_NAME_diplomatic_moves: "Дипломатичні кроки"
  STATIC_MODIFIER_DESC_diplomatic_moves: "Наші працьовиті дипломати забезпечили представлення наших інтересів у закордонних дворах, дозволивши нам ще більше розширити мережу нашого впливу."
  colonial_policies.24.title: "Будівельний бум кораблів"
  colonial_policies.24.desc: "Наша суднобудівна промисловість пережила бум замовлень на торгові судна. Цей бум з тих пір закінчився, і тепер є надлишкові потужності верфей. Це не триватиме довго, але наш флот міг би скористатися цим зараз."
  colonial_policies.24.a: "Скористаймося цим"
  STATIC_MODIFIER_NAME_ship_building_boom: "Будівельний бум кораблів"
  STATIC_MODIFIER_DESC_ship_building_boom: "Після буму замовлень на торгові судна, є надлишкові потужності верфей, якими міг би скористатися наш флот."
  colonial_policies.25.title: "Покращена репутація"
  colonial_policies.25.desc: "Довго працювали наші дипломати, щоб забезпечити найкращу можливу репутацію. Дивне збіг обставин призвів до того, що ми насолоджуємося покращеною дипломатичною репутацією."
  colonial_policies.25.a: "Використаймо це!"
  STATIC_MODIFIER_NAME_enhanced_reputation: "Покращена репутація"
  STATIC_MODIFIER_DESC_enhanced_reputation: "Наполеглива праця наших дипломатів та дивний збіг обставин призвели до того, що ми насолоджуємося покращеною дипломатичною репутацією."
  colonial_policies.26.title: "Торговий успіх"
  colonial_policies.26.desc: "Наш купецький клас насолоджується незвичайним успіхом по всьому світу. Дехто каже, що це просто випадкова вдача, але нам байдуже, бо багатство є багатством, незалежно від того, як ми його здобуваємо."
  colonial_policies.26.a: "Нехай вони поділяться багатством... з нами"
  STATIC_MODIFIER_NAME_trade_success: "Торговий успіх"
  STATIC_MODIFIER_DESC_trade_success: "Купці насолоджуються дещо незвичайним успіхом по всьому світу, що призводить до збільшення нашого багатства."
  colonial_policies.28.title: "Торговий провал"
  colonial_policies.28.desc: "Наші купці останнім часом працюють погано. Наші великі емпорії порожні від товарів світу і, що важливіше, наші доходи знизилися."
  colonial_policies.28.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  STATIC_MODIFIER_NAME_trade_failure: "Торговий провал"
  STATIC_MODIFIER_DESC_trade_failure: "Діяльність наших купців останнім часом була невтішною, що призвело до зниження прибутків."
  colonial_policies.28.b: "Спробуйте запобігти цьому!"
  colonial_policies.29.title: "Проблеми з будівництвом кораблів"
  colonial_policies.29.desc: "Сплеск запитів на кораблі від різних осіб призвів до зростання попиту на судноплавство з різних джерел, збільшуючи час і вартість будівництва кораблів. Хоча ніхто не наважиться стягувати з нас більше за ці кораблі, їхнє будівництво займає більше часу."
  colonial_policies.29.a: "Чи вистачить нам часу?"
  STATIC_MODIFIER_NAME_ship_building_problems: "Проблеми суднобудування"
  colonial_policies.30.title: "Дипломатичний промах"
  colonial_policies.30.desc: "Посеред дуже важливої державної події при дворі одного з наших сусідів наш посол припустився найжахливішого промаху. Чутки про це поширилися, і нашим дипломатам стало важче, оскільки наші сусіди присвячують багато часу глузуванню з них."
  colonial_policies.30.a: "Це жахливо!"
  STATIC_MODIFIER_NAME_diplo_fuax_pas: "Дипломатичний промах"
  STATIC_MODIFIER_DESC_diplo_fuax_pas: "Дипломатичний промах, допущений одним з наших послів, ускладнив життя нашим дипломатам."