l_english:
  settle_the_frontier.1.title: "Розширення до [target.GetNameWithNoTooltip]"
  settle_the_frontier.1.desc: "[recipient.GetName] - відважний член [ROOT.GetCountry.GetLongName] - вирушив із загоном добровольців на незаймані землі [target.GetName]. [recipient.GetSheHe|U] та [recipient.GetHerHis] послідовники розширять території нашого [ROOT.GetCountry.GetFlavorRank]."
  settle_the_frontier.1.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  settle_the_frontier.1.a.tt: "[recipient.GetName] спробує заселити [target.GetName]. Цей процес займе до #Y 10 років#!"
  settle_the_frontier.2.title: "Подорожі до [target.GetNameWithNoTooltip]"
  settle_the_frontier.2.desc: "Хоча [from_province.GetName] є столичною провінцією [actor.GetName], деякі її мешканці бажають знайти можливості в [target.GetName] - землях, які зараз досліджує [recipient.GetName]."
  settle_the_frontier.2.a: "Нехай вони почнуть нове життя в провінції."
  settle_the_frontier.2.b: "Натомість покращити їхнє становище в столиці."
  settle_the_frontier.2.b.tt: "Жоден [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] не мігруватиме до [target.GetName] протягом наступного року"
  settle_the_frontier.3.title: "Культурне поширення"
  settle_the_frontier.3.desc: "Поки [recipient.GetName] продовжує заселення [target.GetName], [recipient.GetSheHe] та [recipient.GetHerHis] послідовники вступили в контакт з місцевим корінним населенням цих земель. [recipient.GetSheHe|U] просить [actor.GetAdjective] підтримки для поширення [target_culture.GetName] ідеалів серед тубільців."
  settle_the_frontier.3.a: "Привезіть деякі з наших найкращих історій та мистецтва до [target.GetNameWithNoTooltip]."
  settle_the_frontier.3.b: "Кілька простих [target_culture.GetNameWithNoTooltip] історій буде достатньо."
  settle_the_frontier.3.c: "Мало причин просвіщати тубільців."
  settle_the_frontier.4.title: "Запити на інвестиції"
  settle_the_frontier.4.desc: "Землі [target.GetName] виявилися складнішими для заселення, ніж очікувалося. Наш колоніст, [recipient.GetName], надіслав офіційний запит до [actor.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] про додаткове фінансування, оскільки, схоже, потрібно більше ресурсів."
  settle_the_frontier.4.a: "Ми повинні підтримувати поселенців за будь-яку ціну."
  settle_the_frontier.4.b: "Вони можуть фінансувати себе."
  settle_the_frontier.5.title: "Конфлікти з сусідами"
  settle_the_frontier.5.desc: "Молоді поселення [target.GetName] вступили в конфлікт зі своїми усталеними сусідніми землями та людьми. [recipient.GetName] попросив нас більш ретельно забезпечити їхній привілей на [target.GetNameWithNoTooltip] та покарати цих порушників спокою."
  settle_the_frontier.5.a: "Поселенців потрібно поважати."
  settle_the_frontier.5.b: "Ворожі дії врешті-решт припиняться."
  settle_the_frontier.6.title: "Рання експлуатація ресурсів"
  settle_the_frontier.6.desc: "Зусилля [recipient.GetName] щодо заселення вже показують ранній успіх. Молоді [actor.GetAdjective] села в [target.GetName] встановили перші доступи для експлуатації ресурсів землі. Ми могли б використати нашу владу, щоб вимагати деякі з цих ресурсів для власної вигоди..."
  settle_the_frontier.6.a: "Нам потрібен [target_goods_0.GetNameWithNoTooltip]."
  settle_the_frontier.6.b: "[target_goods_1.GetNameWithNoTooltip] потрібен у нашій столиці."
  settle_the_frontier.6.c: "Доступ до [target_goods_2.GetNameWithNoTooltip] підтримає державу."
  settle_the_frontier.6.d: "Напевно, їм не так вже й потрібен [target_goods_3.GetNameWithNoTooltip]."
  settle_the_frontier.6.e: "[target_goods_4.GetNameWithNoTooltip] послужить нам великою мірою."
  settle_the_frontier.6.zzz: "Ми не повинні забирати у них їхні дорогоцінні матеріали."
  settle_the_frontier.100.title: "Поселення [target.GetNameWithNoTooltip]"
  settle_the_frontier.100.desc: "Кілька років тому [recipient.GetName] було відправлено за [actor.GetAdjective] наказом до незаселених земель [target.GetName], щоб приєднати їх до [actor.GetLongNameWithNoTooltip]. Це підприємство нарешті завершилося сьогодні!"
  settle_the_frontier.100.desc.a: "$settle_the_frontier.100.desc$\n\n[recipient.GetNameWithNoTooltip] передав провінцію своїй батьківщині. Хоча [recipient.GetSheHe] залишається губернатором заселених земель, тепер вони перебувають під нашим повним управлінням."
  settle_the_frontier.100.desc.b: "$settle_the_frontier.100.desc$\n\nНа жаль, [recipient.GetNameWithNoTooltip] так і не повернувся до [actor.GetNameWithNoTooltip]. Здається, автономія, яку ми надали [recipient.GetHerHim], призвела до того, що [recipient.GetHerHim] оголосив [recipient.GetHerHis] власну [target_country.GetLongName]."
  settle_the_frontier.100.a: "[actor.Custom('common_string_positive')]"
  settle_the_frontier.100.b: "[recipient.GetSheHe|U] пошкодує про [recipient.GetHerHis] зухвалість!"
  settle_the_frontier.100.b.tt: "[target_country.GetName] було засновано в [target.GetName]"
  settle_the_frontier.100.c: "Що сталося з [target.GetNameWithNoTooltip]?"
  settle_the_frontier.101.title: "Кінець експансії в [target.GetNameWithNoTooltip]"
  settle_the_frontier.101.desc: "З раптовою смертю [recipient.GetName] поселенці, які слідували за [recipient.GetHerHim] до кінця, втратили всю надію та моральний дух продовжувати своє підприємство. Де колись була єдність, тепер лише хаос, а кілька заснованих поселень було розпущено."
  settle_the_frontier.101.a: "[actor.Custom('common_string_disappointing')]"
  settle_the_frontier.101.a.tt: "Наші зусилля щодо заселення [target.GetName] припиняються"
  settle_the_frontier.102.title: "Невдале заселення [target.GetNameWithNoTooltip]"
  settle_the_frontier.102.desc: "Хоча підприємство [recipient.GetName] щодо заселення земель [target.GetName] було дуже багатообіцяючим, до нас дійшли новини, що ми почали його занадто пізно. Вся провінція вже була колонізована та укріплена нашими сусідами..."
  settle_the_frontier.102.a: "[actor.Custom('common_string_disappointing')]"
  settle_the_frontier.102.a.tt: "[recipient.GetName] повертається до [actor.GetName]"
  settler_character_truthfulness: "Лояльність поселенців"
  change_settling_character_loyalty: "Збільшити #Y $settler_character_truthfulness$#! [CHARACTER.GetHerHis] на $VALUE|V0G$ (поточне значення: #Y [CHARACTER.MakeScope.GetVariable('settler_character_truthfulness').GetValue]#!)"
  neg_change_settling_character_loyalty: "Зменшити #Y $settler_character_truthfulness$#! [CHARACTER.GetHerHis] на $VALUE|V0R$ (поточне значення: #Y [CHARACTER.MakeScope.GetVariable('settler_character_truthfulness').GetValue]#!)"
  third_change_settling_character_loyalty: "[CHARACTER.GetName] збільшує #Y $settler_character_truthfulness$#! [CHARACTER.GetHerHis] на $VALUE|V0G$ (поточне значення: #Y [CHARACTER.MakeScope.GetVariable('settler_character_truthfulness').GetValue]#!)"
  third_neg_change_settling_character_loyalty: "[CHARACTER.GetName] зменшує #Y $settler_character_truthfulness$#! [CHARACTER.GetHerHis] на $VALUE|V0R$ (поточне значення: #Y [CHARACTER.MakeScope.GetVariable('settler_character_truthfulness').GetValue]#!)"
  past_change_settling_character_loyalty: "Збільшено #Y $settler_character_truthfulness$#! [CHARACTER.GetHerHis] на $VALUE|V0G$ (поточне значення: #Y [CHARACTER.MakeScope.GetVariable('settler_character_truthfulness').GetValue]#!)"
  past_neg_change_settling_character_loyalty: "Зменшено #Y $settler_character_truthfulness$#! [CHARACTER.GetHerHis] на $VALUE|V0R$ (поточне значення: #Y [CHARACTER.MakeScope.GetVariable('settler_character_truthfulness').GetValue]#!)"
  third_past_change_settling_character_loyalty: "[CHARACTER.GetName] збільшив #Y $settler_character_truthfulness$#! [CHARACTER.GetHerHis] на $VALUE|V0G$ (поточне значення: #Y [CHARACTER.MakeScope.GetVariable('settler_character_truthfulness').GetValue]#!)"
  third_past_neg_change_settling_character_loyalty: "[CHARACTER.GetName] зменшив #Y $settler_character_truthfulness$#! [CHARACTER.GetHerHis] на $VALUE|V0R$ (поточне значення: #Y [CHARACTER.MakeScope.GetVariable('settler_character_truthfulness').GetValue]#!)"