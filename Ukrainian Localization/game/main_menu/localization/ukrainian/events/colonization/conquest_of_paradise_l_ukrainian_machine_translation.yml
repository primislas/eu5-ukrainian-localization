l_english:
  conquest_of_paradise.1.title: "Закони про заробітну плату для будівельників"
  conquest_of_paradise.1.desc: "Вартість будівництва зростає через брак кваліфікованої робочої сили, оскільки нові колоністи, що прибувають на територію, дуже потребують їхніх послуг. Була висунута пропозиція встановити максимальну заробітну плату по всьому [ROOT.GetCountry.GetName] для всіх теслярів, пилярів, мулярів та цеглярів. Їхня заробітна плата буде обмежена справедливим рівнем, тоді як будь-хто, хто вимагатиме вищої оплати або пропонуватиме платити більше за будівельні роботи, підлягатиме штрафу. Як ми голосуємо?"
  conquest_of_paradise.1.a: "Голосуємо «за». Це слушна ідея."
  conquest_of_paradise.1.b: "Нам не потрібно це регулювати."
  STATIC_MODIFIER_NAME_construction_wages: "Заробітна плата в будівництві"
  STATIC_MODIFIER_DESC_construction_wages: "Щоб стримати зростання цін, було встановлено максимальну заробітну плату для будівельних робітників."
  conquest_of_paradise.2.title: "Прикордонний конфлікт у колоніях"
  conquest_of_paradise.2.desc: "Поселенці з колоній [colonial_conflict_target.GetLongName] порушили наші кордони! У пошуках ресурсів вони розширилися на землі, що є частиною [ROOT.GetCountry.GetName], і вступили в конфлікт з місцевим населенням. Цього не можна терпіти!"
  conquest_of_paradise.2.a: "Відправити місцеве ополчення, щоб вигнати їх!"
  conquest_of_paradise.2.a.tt: "Вони можуть помститися..."
  conquest_of_paradise.2.b: "Нехай ситуація вирішиться сама собою."
  conquest_of_paradise.3.title: "Прикордонний конфлікт у колоніях"
  conquest_of_paradise.3.desc: "У пошуках нових земель та ресурсів поселенці з [ROOT.GetCountry.GetName] перетнули кордон до [colonial_conflict_source.GetName], що спричинило конфлікти з місцевим населенням. [colonial_conflict_source.GetLongName] тоді відправили своє ополчення, щоб вигнати їх, але їхнє ополчення, схоже, зайшло занадто далеко, оскільки їхня місія перетворилася на мстивий набіг на [ROOT.GetCountry.GetName]. Цього не можна терпіти!"
  conquest_of_paradise.3.a: "Відправити наше місцеве ополчення також!"
  conquest_of_paradise.3.b: "Нехай ситуація вирішиться сама собою."
  conquest_of_paradise.4.title: "Прикордонний конфлікт у колоніях"
  conquest_of_paradise.4.desc: "Відправлення нашого ополчення, щоб вигнати конкуруючих поселенців з [colonial_conflict_target.GetLongName], можливо, було помилкою. Заохочені легким успіхом, наші війська захопилися і продовжили рух у чужі землі, грабуючи прикордонні села. Це дуже розлютило місцевих жителів, і вони, у свою чергу, відправили своє ополчення на наші землі."
  conquest_of_paradise.4.a: "Будь вони прокляті!"
  conquest_of_paradise.5.title: "Прикордонний конфлікт у колоніях"
  conquest_of_paradise.5.desc: "Зітхання... З чого почати? Здається, поселенці з [colonial_conflict_target.GetLongName] вирушили до [colonial_conflict_source.GetLongName] у пошуках нових земель та ресурсів. [colonial_conflict_source.GetName] тоді відправили своє ополчення, щоб вигнати їх, але вони були надто завзятими і переслідували поселенців назад до [colonial_conflict_target.GetName], грабуючи та спалюючи там поселення. Конфлікт тоді загострився, коли [colonial_conflict_target.GetName] відправили своє ополчення, щоб вигнати [colonial_conflict_source.GetAdjective] ополчення та здійснити власні набіги на [colonial_conflict_target.GetName].\n\n[colonial_conflict_source.GetGovernment.GetRulerTitle] з [colonial_conflict_source.GetName] звинувачує [colonial_conflict_target.GetGovernment.GetRulerTitle] з [colonial_conflict_target.GetName], і навпаки. Як нам вирішити цей конфлікт, не втративши обличчя?"
  conquest_of_paradise.5.a: "Нехай колонії розберуться самі."
  conquest_of_paradise.5.b: "Догану тим, хто загострив конфлікт!"
  conquest_of_paradise.5.c: "Догану тим, хто розпочав конфлікт!"
  conquest_of_paradise.6.title: "Прикордонний конфлікт у колоніях"
  conquest_of_paradise.6.desc: "У нещодавньому конфлікті вздовж кордону між [colonial_conflict_source.GetName] та [colonial_conflict_target.GetName], [the_overlord.GetLongName] став на бік [colonial_conflict_target.GetLongName]! [the_overlord.GetGovernment.GetRulerTitle] [the_overlord.GetGovernment.GetRuler.GetName] вирішив звинуватити [ROOT.GetCountry.GetGovernment.GetRuler.GetName] в інциденті та звільнив [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHim]."
  conquest_of_paradise.6.a: "На кого це '[the_overlord.GetGovernment.GetRulerTitle]' думає, що [the_overlord.GetGovernment.GetRuler.GetSheHe] є?"
  conquest_of_paradise.7.title: "Колоніальний прикордонний конфлікт"
  conquest_of_paradise.7.desc: "У нещодавньому конфлікті на кордоні між [colonial_conflict_source.GetName] та [colonial_conflict_target.GetName], [the_overlord.GetLongName] став на наш бік! [the_overlord.GetGovernment.GetRulerTitle] [the_overlord.GetGovernment.GetRuler.GetName] вирішив звинуватити [colonial_conflict_target.GetGovernment.GetRulerTitle] [colonial_conflict_target.GetGovernment.GetRuler.GetName] в інциденті та звільнив [colonial_conflict_target.GetGovernment.GetRuler.GetHerHim]."
  conquest_of_paradise.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  conquest_of_paradise.8.title: "Колоніальний прикордонний конфлікт"
  conquest_of_paradise.8.desc: "У нещодавньому конфлікті на кордоні між [colonial_conflict_source.GetName] та [colonial_conflict_target.GetName], [the_overlord.GetLongName] став на бік [colonial_conflict_source.GetLongName]! [the_overlord.GetGovernment.GetRulerTitle] [the_overlord.GetGovernment.GetRuler.GetName] вирішив звинуватити [ROOT.GetCountry.GetGovernment.GetRuler.GetName] в інциденті та звільнив [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHim]."
  conquest_of_paradise.8.a: "На кого це '[the_overlord.GetGovernment.GetRulerTitle]' думає, що [the_overlord.GetGovernment.GetRuler.GetSheHe] є?"
  conquest_of_paradise.9.title: "Колоніальний прикордонний конфлікт"
  conquest_of_paradise.9.desc: "У нещодавньому конфлікті на кордоні між [colonial_conflict_source.GetName] та [colonial_conflict_target.GetName], [the_overlord.GetLongName] став на наш бік! [the_overlord.GetGovernment.GetRulerTitle] [the_overlord.GetGovernment.GetRuler.GetName] вирішив звинуватити [colonial_conflict_source.GetGovernment.GetRulerTitle] [colonial_conflict_source.GetGovernment.GetRuler.GetName] в інциденті та звільнив [colonial_conflict_source.GetGovernment.GetRuler.GetHerHim]."
  conquest_of_paradise.9.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  conquest_of_paradise.10.title: "Посилена колоніальна міліція"
  conquest_of_paradise.10.desc: "Асамблея запропонувала виділити значні ресурси для посилення нашої міліції. Колонія потребує кращого захисту як від нападів тубільців, так і від набігів інших колоній. Це також зміцнить нас, якщо ми в якийсь момент опинимося у війні з [ROOT.GetOverlord.GetName]."
  conquest_of_paradise.10.a: "Прийняти пропозицію."
  STATIC_MODIFIER_NAME_enhanced_colonial_militia: "Посилена колоніальна міліція"
  conquest_of_paradise.10.b: "Не приймати пропозицію."
  conquest_of_paradise.11.title: "Заборонити торгівлю хутром"
  conquest_of_paradise.11.desc: "Люди в [ROOT.GetCountry.GetName] занадто дружні з тубільцями. Була висунута пропозиція заборонити всю приватну торгівлю з тубільцями, що включатиме смертну кару для будь-кого, хто буде спійманий на навчанні тубільця стріляти з рушниці. Ці нові обмеження завдадуть шкоди місцевим економікам як тубільців, так і наших підданих, але забезпечать нашу безпеку від збройних набігів тубільців."
  conquest_of_paradise.11.a: "Схвалити пропозицію."
  STATIC_MODIFIER_NAME_restrict_fur_trade: "Торгівля хутром обмежена"
  conquest_of_paradise.11.b: "Ігнорувати проблему."
  conquest_of_paradise.12.title: "Урожай [GetCurrentYear] року"
  conquest_of_paradise.12.desc: "Урожай зернових в [ROOT.GetCountry.GetName] цього року був дуже бідним, і нестача їжі вже відчувається по всій колонії. Ціни на продукти стрімко зростають, а деякі далі пророкують, що може настати сувора зима. Сусідні тубільці дізналися про нашу скрутну ситуацію і запропонували частину своїх запасів їжі. Те, що вони принесли, далеко не достатньо, щоб прогодувати нас протягом зими, але там, звідки прийшов подарунок, має бути більше кукурудзи. Деякі пропонують відправити солдатів до тубільних сіл і захопити їхню їжу."
  conquest_of_paradise.12.a: "Взяти те, що нам потрібно."
  conquest_of_paradise.12.b: "Ми вирішимо це самі."
  conquest_of_paradise.13.title: "Знайдено залізо"
  conquest_of_paradise.13.desc: "Щоб підтримувати себе, [ROOT.GetCountry.GetName] мусить шукати нові джерела прибутку та зменшити нашу залежність від імпорту. Проте, з'явилася чудова нагода, оскільки в [ROOT.GetCountry.GetName] було відкрито болотну залізну руду! Тепер є пропозиція зобов'язати власника землі побудувати піч та кузню і негайно розпочати виробництво. В обмін власнику буде гарантовано 10-річну податкову пільгу для субсидування початкових витрат."
  conquest_of_paradise.13.a: "Це здається гарною нагодою."
  conquest_of_paradise.13.b: "Ні, дякую."
  conquest_of_paradise.14.title: "Вітчизняна вовняна промисловість"
  conquest_of_paradise.14.desc: "Зменшення прибутків від колоніальної торгівлі та наша залежність від імпортних товарів починають шкодити [ROOT.GetCountry.GetName]. Ми мусимо шукати економічної незалежності від імпорту, і з цією метою було представлено нову пропозицію: Заборонивши експорт овець та наказавши виробляти більше вовни на місці, ми забезпечимо достатню кількість теплого одягу для колоністів. Щоб це спрацювало, в [ROOT.GetCountry.GetName] слід заснувати текстильну мануфактуру."
  conquest_of_paradise.14.a: "Це здається гарною нагодою."
  conquest_of_paradise.14.b: "Ні, дякую."
  conquest_of_paradise.15.title: "Заборона товарних культур"
  conquest_of_paradise.15.desc: "На відміну від засновників [ROOT.GetCountry.GetName], нові поселенці схильні бути недалекоглядними та ставити прибуток вище забезпечення майбутнього для себе та своїх родин. Багато хто ігнорує необхідність виробництва їжі для колонії і замість цього вирощує виключно товарні культури, вірячи, що зможуть продати свій урожай та придбати їжу в інших фермерів. Якщо це триватиме, наша колонія зрештою зіткнеться з голодом та безладом. Щоб запобігти такій можливості, дехто запропонував закон, який вимагатиме від нових фермерів виробляти їжу принаймні на частині своїх полів."
  conquest_of_paradise.15.a: "Закон здається необхідним."
  conquest_of_paradise.15.b: "Це не наша справа."
  conquest_of_paradise.16.title: "Заборона вирощування тютюну"
  conquest_of_paradise.16.desc: "Коли ми вперше прибули сюди, ціни на тютюн стрімко зростали, а прибутки були величезними. Тепер, коли прибуває все більше фермерів і засновують власні плантації, пропозиція тютюну швидко зростає, що призводить до падіння цін у Європі рік за роком. Досвідчені плантатори висунули пропозицію заборонити вирощування тютюну на один рік, щоб ціни мали час відновитися. Нові фермери, очевидно, проти цієї пропозиції, але ми мусимо зробити те, що необхідно для захисту наших засобів до існування."
  conquest_of_paradise.16.a: "Запровадити цю заборону."
  STATIC_MODIFIER_NAME_banned_tobacco_planting: "Заборона вирощування тютюну"
  conquest_of_paradise.16.b: "Відхилити їхню пропозицію."