l_english:
  flavor_bah.1.title: "[ShowBuildingTypeNameWithNoTooltip('mahmud_gawan_madrasa')]"
  flavor_bah.1.desc: "Щоб підтвердити [ShowReligionName('shia')] вплив у [ShowRegionName('deccan_region')], [target_character.GetName] вирішив побудувати нову медресе, натхненну архітектурою [ShowSubContinentName('central_asia')]. Названа [ShowBuildingTypeName('mahmud_gawan_madrasa')], вона має слугувати одним із найвеличніших [ShowReligionGroupName('muslim')] коледжів у всій $india$, приймаючи близько 500 студентів з усього світу. Її бібліотека також планується вміщувати томи з усіх куточків землі, сподіваючись перетворити [target_location.GetName] на одне з найвеличніших місць, які коли-небудь існували."
  flavor_bah.1.historical_info: "Медресе Махмуда Гавана в Бідарі було побудовано в 1472 році. Поєднання індійської та арабської архітектур, воно було замовлено Махмудом Гаваном і спроектовано місцевим дворянином Бахманійського султанату. Щоб підтвердити шиїтську віру, воно було спроектовано з ідеєю, що привабить вчених з усього світу, де їм буде надано безкоштовне проживання, харчування та освіту. З часом воно зібрало близько 3000 томів."
  flavor_bah.1.a: "Ми збудуємо її."
  flavor_bah.1.b: "Золото краще витратити на інші речі, ніж на прості будівлі."
  flavor_bah_1000_shared: "Трон для миру"
  flavor_bah_100_historical_info_shared: "Тахт-і-Фіроза був троном Бахманійських султанів, що символізував королівську владу двору. Однак його побудували не його піддані. Натомість це був подарунок від Мусунурі Капаї Наяки з Варангалу. Спочатку трон мав бути переданий Мухаммаду бін Туглуку з Делі, але династія втратила контроль над Варангалом до того, як він був завершений."
  flavor_bah.1000.title: "$flavor_bah_1000_shared$"
  flavor_bah.1000.desc: "[target_country.GetName] володіє найціннішим мистецтвом. Відомий як $takht_i_firoza$, він тепер не служить жодному правителю, який може проживати в [ShowLocationName('warangal')]. Ми могли б вимагати цей артефакт і пообіцяти їм встановити перемир'я, а також викарбувати кордони між нашими двома володіннями. Ця пропозиція підійде [target_character.GetName] та [target_character.GetHerHis] підданим у [target_country.GetNameWithNoTooltip]."
  flavor_bah.1000.historical_info: "$flavor_bah_100_historical_info_shared$"
  flavor_bah.1000.a: "Дійсно, чудова пропозиція. Надішлемо її."
  flavor_bah.1000.b: "Немає потреби купувати його у них, коли ми можемо завоювати його для себе."
  bah_target_must_accept_tt: "[target_country.GetName] має прийняти нашу пропозицію, щоб ефекти набули чинності"
  bah_no_deal_tt: "Жодної угоди не буде надіслано до [target_country.GetName]"
  flavor_bah.1001.title: "$flavor_bah_1000_shared$"
  flavor_bah.1001.desc: "[target_character2.GetName] з [target_country2.GetName] вимагає від нас передати $takht_i_firoza$, а в обмін ми встановимо перемир'я між нашими двома володіннями, а також закріпимо кордони, які ми розділимо."
  flavor_bah.1001.historical_info: "$flavor_bah_100_historical_info_shared$"
  flavor_bah.1001.a: "Трон для миру? Досить цікава пропозиція. Ми приймаємо."
  flavor_bah.1001.b: "Ми не віддамо наші артефакти за порожні обіцянки."