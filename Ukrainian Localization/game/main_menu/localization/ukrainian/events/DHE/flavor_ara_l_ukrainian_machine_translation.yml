l_english:
  flavor_ara.1.title: "Консулат моря"
  flavor_ara.1.desc: "Наш новий квазісудовий орган, що адмініструватиме морське та комерційне право, називається Консулатом моря. Він надає нашим купцям право вирішувати свої комерційні суперечки без втручання королівських судів, а натомість ми, [GetCountry('ARA').GetLongName], отримуємо фінансову підтримку."
  flavor_ara.1.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ara.1.tt: "[Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('ara_consulate_sea')] у [ShowLawName('maritime_law')] буде доступна для нас"
  flavor_ara.2.title: "Книга Консулату моря"
  flavor_ara.2.desc: "#italic Llibre del Consolat de Mar#!, більш відома як #italic Книга Консулату моря#!, є збіркою стародавніх морських звичаїв та зводом правил для управління військовими крейсерами. Пропонується профінансувати нове видання книги, яке міститиме кодекс процедур для керівництва судами Консулів моря, суддів, відповідальних за дотримання цього набору морських законів."
  flavor_ara.2.a: "Профінансувати рукопис"
  flavor_ara.2.b: "Ігнорувати рукопис"
  flavor_ara.3.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.3.desc: "Італійський поет, каноніст, вчений, дипломат і хроніст [target_character.GetName] нині присвячує себе філологічним дослідженням під патронатом правителя [ROOT.GetCountry.GetName]. Він заснував академію Porticus Antoniana, звідки багато молодих вчених, безсумнівно, стануть у пригоді [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Його великі знання могли б забезпечити йому посаду чудового радника, тому було б мудро найняти [target_character.GetNameWithNoTooltip] як нашого нового радника."
  flavor_ara.3.a: "Так, найняти його"
  flavor_ara.4.title: "[target_character2.GetNameWithNoTooltip]"
  flavor_ara.4.desc: "[target_character.GetName] першим представив молодого вченого [target_character2.GetName] правителю [ROOT.GetCountry.GetName]. [target_character2.GetNameWithNoTooltip] був наставником [ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle], служив політичним радником, військовим секретарем та канцлером, але його головною заслугою була наукова діяльність.\n\nВін дисертував на такі теми, як «Щедрість князів», «Жорстокість» або «Пишність», і стверджував, що архітектура та великі пам'ятники є ознакою великого правителя. Він може висловлювати факти сучасного життя та реалії особистих емоцій мовою, яка є достатньо класичною, але завжди характерною для цієї людини.\n\n«Уранія» — його амбітна дидактична композиція гекзаметром, що втілює астрономічну науку епохи, прикрашена високою темою міфологічних епізодів. Він пише латиною, а його найоригінальніші віршовані композиції присвячені особистим темам — #italic De conjugali amore#!, #italic Eridanus#!, #italic Tumuli Naeniae#!, #italic Baiae#! — його пристрасні емоції висловлені з теплотою забарвлення та щирістю."
  flavor_ara.4.a: "Він не зміг би цього зробити без нас!"
  flavor_ara.4.b: "Його успіх — це успіх народу"
  flavor_ara.5.title: "Монастир Санта-Марія-де-Сіхена"
  flavor_ara.5.desc: "Королівський монастир Санта-Марія-де-Сіхена був заснований королевою Санчою Кастильською, дружиною Альфонсо II Арагонського, і будувався між 1183 і 1208 роками. Хоча деякий час тому він почав втрачати популярність і значення, монастир все ще є великим клуатром, де також зберігається прекрасна колекція романських фресок. Черниці просять нас допомогти профінансувати монастир, а місцевий художник, відомий як Маестро Сіхени, запропонував написати великий вівтарний образ."
  flavor_ara.5.a: "Профінансувати монастир"
  flavor_ara.5.b: "Ігнорувати його"
  flavor_ara.6.title: "Синдикат Ременса"
  flavor_ara.6.desc: "Шляхта в [ROOT.GetCountry.GetLongName] почала суворо дотримуватися правил, що прив'язують селян до землі, і це, у поєднанні з суворішим дотриманням сеньйоріальних прав загалом, призвело до заворушень серед селян. Найбідніші селяни рішуче підтримують відкрите повстання, тоді як заможніші віддають перевагу зверненню до нас за реформами та припиненням сеньйоріальних зловживань.\n\nЦе була б чудова нагода заручитися підтримкою селян, оскільки ми перебуваємо в постійній боротьбі за владу зі шляхтою. Були висунуті пропозиції щодо дозволу селянам створити [ShowEstatePrivilegeName('ara_sindicat_ara_remenca')], селянську гільдію або примітивну профспілку, що надасть їм більше свободи."
  flavor_ara.6.a: "Дозволити селянам створити Синдикат Ременса"
  ara_sindicat_ara_remenca: "Синдикат Ременса"
  ara_sindicat_ara_remenca_desc: "Синдикат Ременса — це селянська гільдія або примітивна профспілка. Вперше її запровадили в Каталонії у 1448 році."
  flavor_ara.6.b: "Ігнорувати селянський натовп"
  flavor_ara.7.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.7.desc: "[target_character.GetName], видатний єзуїтський проповідник і ректор єзуїтського коледжу [ShowLocationName('tarragona')], здобув широке захоплення завдяки [target_character.GetHisHer] інтелектуальній блискучості. Відомий [target_character.GetHisHer] красномовними проповідями та проникливими поглядами на мораль і політику, [target_character.GetLastNameWithNoTooltip] здобув прихильність багатьох у [ROOT.GetCountry.GetName] та за її межами. [target_character.GetHisHer|U] релігійні принципи та [target_character.GetHisHer] дослідження людської природи принесли [target_character.GetHimHer] репутацію як Божої людини, так і майстра світської мудрості.\n#NL!Погляди [target_character.GetLastNameWithNoTooltip], однак, не обійшлися без суперечок. [target_character.GetHisHer|U] філософські праці кидають виклик загальноприйнятому мисленню та привернули увагу деяких представників [GetUniqueInternationalOrganization('catholic_church').GetName]. Попри це, [target_character.GetHisHer] гострий інтелект і здатність орієнтуватися в складних соціальних і політичних реаліях роблять [target_character.GetHimHer] цінним кандидатом для служби при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ara.7.a: "Запропонувати [target_character.GetHimHer] посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ara.7.b: "Нам не потрібен суперечливий священик."
  flavor_ara.7.historical_info: "Балтасар Грасіан був арагонським єзуїтським священиком, філософом і письменником. Його популярність у Іспанії XVII століття ґрунтувалася на його здатності поєднувати глибоке філософське проникнення з культурними та політичними нюансами свого часу, що зробило його впливовою фігурою не лише серед сучасників, а й серед майбутніх поколінь філософів у Європі. Деякі з його творів були суперечливими та публікувалися без згоди його єзуїтських настоятелів. Характер його праць зрештою призвів до того, що його позбавили кафедри в єзуїтському коледжі та вигнали з єзуїтського товариства."
  flavor_ara.8.title: "[gracian.GetNameWithNoTooltip] завершує [ShowWorkOfArtNameWithNoTooltip('el_criticon')]"
  flavor_ara.8.desc: "[gracian.GetName], блискучий єзуїтський вчений на нашій службі, завершив [gracian.GetHisHer] magnum opus, [ShowWorkOfArtName('el_criticon')]. Цей великий моральний епос втілює [gracian.GetHisHer] світогляд, розмірковуючи про людську природу, мораль і життєві виклики через багату алегоричну розповідь. Хоча роман здається вражаючим, він не обійшовся без суперечок. Попередні частини були опубліковані без схвалення [gracian.GetHisHer] єзуїтських настоятелів, що викликало критику [gracian.GetHimHer] і поставило під загрозу [gracian.GetHisHer] становище в ордені. [gracian.GetLastNameWithNoTooltip] тепер просить нашої підтримки для фінансування повного видання [ShowWorkOfArtNameWithNoTooltip('el_criticon')], щоб [gracian.GetHisHer] праця досягла ширшої аудиторії. Це зміцнило б нашу спадщину як покровителів мистецтв та інтелекту, хоча це може напружити наші відносини з єзуїтським орденом."
  flavor_ara.8.a: "Ця праця заслуговує на визнання!"
  flavor_ara.8.b: "Праця надто суперечлива. Ми не можемо це підтримати."
  flavor_ara.8.historical_info: "Опублікований у трьох частинах між 1651 і 1657 роками, #italic El Criticón#! є найзначнішою працею Грасіана та однією з вершин іспанської філософської прози. Роман є алегоричним і сатиричним твором, що досліджує життя Андреніо, який представляє подвійні аспекти людської природи: імпульсивність і брак досвіду. Стиль письма Грасіана характеризується його концептуальним підходом, що підкреслює дотепність, гру слів та мистецтво винахідливості. #italic El Criticón#! пропонує песимістичний, але сповнений надії погляд на людське життя, заохочуючи читачів прагнути до чесноти та вічної слави."
  flavor_ara.9.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.9.desc: "[target_character.GetName] — відомий францисканський теолог і письменник, який здобув широке визнання завдяки [target_character.GetHisHer] працям, що поєднують теологію, політику та моральну філософію. [target_character.GetHisHer|U] твори, такі як #italic Lo Crestià#!, надають всебічний посібник про те, як жити доброчесним життям і будувати добре кероване суспільство, глибоко резонуючи як з правителями, так і з простолюдинами. Завдяки [target_character.GetHisHer] красномовству та прагматичній мудрості, [target_character.GetLastNameWithNoTooltip] був запрошений радити дворянам і міським лідерам по всьому [ROOT.GetCountry.GetName]. Можливо, [target_ruler.GetName] також міг би використати [target_character.GetHimHer] як радника."
  flavor_ara.9.a: "Запросити [target_character.GetHimHer] до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ara.9.b: "Нам не потрібна [target_character.GetHisHer] порада."
  flavor_ara.9.historical_info: "Праці Ейшіменіса читали численні значні особистості того часу, включаючи арагонських королів Мартіна I, Педро IV та Хуана I, а також Папу Бенедикта XIII. Однак його вплив поширювався за межі його письмових праць. Він відіграв ключову роль в Авіньйонському папстві, служив сповідником королеви Марії де Луна та брав участь у релігійних і політичних дебатах своєї епохи."
  flavor_ara.10.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.10.desc: "[target_character.GetName] — відомий поет з [ShowLocationName('valencia')], який підкорив серця та уми нашого народу [target_character.GetHisHer] майстерними віршами. Як піонер [ShowDialectName('catalan_dialect')] літературної традиції, [target_character.GetSheHe] підносить теми кохання, моралі та людських емоцій до неперевершених художніх висот. Поезія [target_character.GetLastNameWithNoTooltip] виходить за межі придворних умовностей і представляє глибоко інтроспективні та філософські роздуми, що резонують у всьому суспільстві. Залучення такої натхненної постаті до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] зміцнило б наш культурний престиж і надихнуло б на розквіт мистецтв."
  flavor_ara.10.a: "Запросити [target_character.GetHimHer] приєднатися до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ara.10.b: "[target_character.GetHisHer|U] поезія — це дар народу; нехай [target_character.GetHimHer] залишається у [ShowLocationNameWithNoTooltip('valencia')]."
  flavor_ara.10.c: "Ми не можемо дозволити собі такі розкоші."
  flavor_ara.10.historical_info: "Аузіас Марк був одним із найвидатніших поетів так званого Валенсійського Золотого століття літератури. Він був одним із перших, хто використовував валенсійську мову замість окситанської, яка тоді вважалася стандартною мовою трубадурів. Поезія Марка значно вплинула на пізніших поетів і відома своїм дослідженням таких тем, як кохання, смерть і мораль."
  flavor_ara.11.title: "Реновація [target_art.GetNameWithNoTooltip]"
  flavor_ara.11.desc: "[target_art.GetName] століттями була значною культурною та духовною пам'яткою, шанованою як священне місце маріанського поклоніння та гордість [ShowLocationName('zaragoza')]. Однак час взяв своє, і споруда тепер демонструє ознаки старіння та руйнування. У світлі цього, пропозиції щодо її реновації набрали обертів, прихильники пропонують будівництво нового, грандіозного храму в стилі бароко, щоб замінити застарілу споруду. [target_ruler.GetName] пропонує залучити [target_character.GetName], престижного [ROOT.GetCountry.GetGovernment.GetAdjective] архітектора, для нагляду за цим монументальним проектом."
  flavor_ara.11.a: "Відбудуймо Базиліку у всій її пишноті!"
  flavor_ara.11.b: "Натомість замовте скромну реновацію."
  flavor_ara.11.c: "Ми не можемо дозволити собі таку екстравагантність зараз."
  flavor_ara.11.historical_info: "Реконструкція Базиліки дель Пілар розпочалася 1681 року за ініціативи Хуана Хосе де Австрії, тодішнього віцекороля Арагону, щоб замінити стару споруду грандіозним храмом у стилі бароко. Проєкт, розроблений майстрами-будівельниками під керівництвом королівського архітектора Франсіско Еррери, став значним архітектурним і культурним починанням. До 1730 року храм було розширено до 130 метрів у довжину та 67 метрів у ширину."
  flavor_ara.12.title: "Боротьба «Біги» та «Буски»"
  flavor_ara.12.desc: "Протягом десятиліть суспільство [ShowLocationName('barcelona')] було розділене на дві фракції: #italic Бігу#!, що представляла вкорінену міську олігархію, та #italic Буску#!, коаліцію купців і ремісників, які виступали за економічні реформи та ширший доступ до влади. #italic Біга#!, що складалася з заможних землевласників та шляхетних громадян, подібних до дворян, довго контролювала міське управління, чинячи опір закликам до змін, чіпляючись за свої привілеї. #italic Буска#!, однак, виступає за протекціоністську політику, девальвацію валюти та покращення умов для місцевих галузей промисловості, щоб боротися з економічною кризою, що охопила середземноморську торгівлю. Напруга зросла, оскільки #italic Буска#! дедалі більше розчаровується у своєму виключенні з муніципальної влади, вимагаючи [ROOT.GetCountry.GetGovernment.GetAdjective] втручання."
  flavor_ara.12.a: "Підтримати «Бігу»."
  flavor_ara.12.b: "Підтримати «Буску»."
  flavor_ara.12.c: "Уникнути вибору сторони."
  flavor_ara.13.title: "[ROOT.GetCountry.GetGovernment.GetAdjective] Хроніст"
  flavor_ara.13.desc: "[target_ruler.GetName] висловив бажання замовити всеосяжну хроніку, присвячену історії [ROOT.GetCountry.GetName], яка зберегла б нашу спадщину для майбутніх поколінь. Після довгих обговорень [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонував [target_character.GetName] як ідеального кандидата для цього завдання. [target_character.GetLastNameWithNoTooltip] вивчав риторику, [ShowLanguageName('latin_language')] та [ShowLanguageName('greek_language')], а також опанував кілька сучасних мов, включаючи [ShowLanguageName('french_language')], [ShowLanguageName('north_italian_language')] та [ShowDialectName('catalan_dialect')]. На початку своєї кар'єри [target_character.GetHisHer] піднявся на впливові посади, такі як магістрат Барбастро та помічник секретаря Інквізиції, і тому [target_character.GetSheHe], здається, має як досвід, так і знання, які були б необхідні для цієї посади."
  flavor_ara.13.a: "Запросити [target_character.GetLastNameWithNoTooltip] приєднатися до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ara.13.b: "Ми не можемо дозволити собі [target_character.GetHisHer] досвід."
  flavor_ara.13.historical_info: "У 1548 році Зуріта був призначений першим офіційним хроністом Арагонського королівства, що призвело до укладання його монументальної праці — #italic Anales de la Corona de Aragón#!. Ця хроніка охоплює арагонську історію від ісламського періоду до правління Фердинанда Католика. Вона ознаменувала відхід від середньовічної історіографії, надаючи пріоритет архівній документації та першоджерелам над легендами та вторинними свідченнями. Підхід Зуріти встановив стандарт для історичної науки, зробивши його першим сучасним істориком в Іспанії."
  flavor_ara.14.title: "Хроніка [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ara.14.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] розпочав обговорення створення хроніки для збереження та прославлення історії [ROOT.GetCountry.GetName]. Така праця розповідала б про діяння наших монархів, від легендарних королів Собрарбе до сучасної епохи. Серед запропонованих кандидатів на це завдання — [target_character.GetName], вчений великої слави. Солдат, а пізніше цистерціанський монах, [target_character.GetLastNameWithNoTooltip] показав [target_character.GetHisHer] відданість [ROOT.GetCountry.GetAdjectiveWithNoTooltip] спадщині. [target_character.GetHisHer|U] знання історії, у поєднанні з [target_character.GetHisHer] майстерністю як у віршах, так і в прозі, роблять [target_character.GetHimHer] ідеальним хроністом."
  flavor_ara.14.a: "Призначити [target_character.GetLastNameWithNoTooltip] для написання хроніки."
  flavor_ara.14.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] не має часу на такі поблажливості."
  flavor_ara.14.historical_info: "Хроніка Арагону, написана Гуальберто Фабріціо Вагадом і опублікована 1499 року, є основоположним історичним текстом та однією з найраніших хронік королівства, надрукованих арагонською народною мовою. Хроніка відображає історіографічні тенденції XV століття, підкреслюючи королівську владу та націоналізм, водночас прославляючи монархію та досягнення королівства. Попри свою залежність від старих, часто ненадійних джерел, вона стала ключовим інструментом для формування арагонської ідентичності та історичної свідомості."
  flavor_ara.15.title: "Укази [target_ruler.GetNameWithNoTooltip]"
  flavor_ara.15.desc: "[target_ruler.GetName] розглядає створення збірки статутних положень для регулювання діяльності [ROOT.GetCountry.GetGovernment.GetAdjective] Палати [ROOT.GetCountry.GetName]. Метою було б встановлення чітких правил функціонування [ROOT.GetCountry.GetGovernment.GetCourtTitle] та ролей її посадових осіб. [target_ruler.GetNameWithNoTooltip] також має намір включити конкретні вказівки щодо церемонії коронації [ROOT.GetCountry.GetAdjectiveWithNoTooltip] правителів, прагнучи стандартизувати процес освячення та коронації та забезпечити, щоб ритуали монархії були послідовними та глибоко символічними."
  flavor_ara.15.a: "Гарна ідея!"
  flavor_ara.15.b: "У цьому немає потреби."
  flavor_ara.15.historical_info: "#italic Ordinacions de Pere el Cerimoniós#! були збіркою статутів, виданих у 1344 році королем Арагону Пере IV для регулювання функціонування королівського дому. Ці правила окреслювали ролі та обов'язки придворних чиновників і включали детальні положення щодо церемонії коронації арагонських королів. Укази служили як правовим посібником для придворної адміністрації, так і ритуальним стандартом для церемоній монархії."
  flavor_ara.16.title: "[ShowEstatePrivilegeNameWithNoTooltip('justicia_de_aragon')]"
  flavor_ara.16.desc: "Протягом століть посада [ShowEstatePrivilegeName('justicia_de_aragon')] служила вирішальним посередником між [ROOT.GetCountry.GetLongName] та станами [ROOT.GetCountry.GetFlavorRank]. Діючи як охоронець [ROOT.GetCountry.GetAdjectiveWithNoTooltip] законів та привілеїв, вона традиційно забезпечувала, щоб [ROOT.GetCountry.GetGovernment.GetAdjective] влада не порушувала давні #italic фуерос#! — закони та привілеї [ROOT.GetCountry.GetFlavorRank]. Однак зараз стани виступають за зміцнення її незалежності шляхом формалізації посади в законі. Вони пропонують, щоб [ShowEstatePrivilegeNameWithNoTooltip('justicia_de_aragon')] стала постійною, спадковою посадою, обраною станами, а не призначеною [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], і щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle] було заборонено усувати або втручатися в діяльність обраного посадовця."
  flavor_ara.16.a: "Піддатися їхнім вимогам."
  flavor_ara.16.b: "Воно мусить лишатися під контролем [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]!"
  flavor_ara.16.historical_info: "Хустісія Арагону була значною історичною посадою в Арагонському королівстві, заснованою в XII столітті, відповідальною за забезпечення дотримання місцевих законів та привілеїв, а також слугувала противагою королівській владі. Ця посада мала широкі судові та виконавчі повноваження, включаючи право вето на королівські рішення, якщо вони порушували місцеві закони. Вона також головувала в парламенті та відігравала вирішальну роль у присязі нових монархів. До XIII століття Хустісія стала незалежним та неупередженим арбітром, маючи владу тлумачити фуеральні закони та захищати свободи підданих королівства від королівського свавілля."
  flavor_ara.17.title: "Формалізація присяги на вірність"
  flavor_ara.17.desc: "Стани [ROOT.GetCountry.GetFlavorRank], зібрані в [ShowCultureName('aragonese')] Кортесах, вимагають формального визнання своїх давніх прав та привілеїв. Вони наполягають, щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle] присягнув дотримуватися #italic фуерос#! — законів та звичаїв, які здавна визначали управління [ShowAreaName('aragon_area')]. Без цього визнання вони відмовляються присягати на вірність [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Їхня прокламація, #italic Y si no, no#! — якщо ні, то ні, втілює їхню непокору: якщо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] не поважає їхні права, вони не визнають нашої влади правити."
  flavor_ara.17.a: "Присягнути дотримуватися їхніх прав."
  flavor_ara.17.b: "Ми не будемо зв'язані їхніми вимогами!"
  flavor_ara.17.historical_info: "Фраза #italic 'Y si no, no'#! символізувала умовну лояльність арагонських станів до свого монарха, вимагаючи від короля присягнути дотримуватися їхніх прав та фуерос перед тим, як бути визнаним. Вкорінений у традиціях, таких як #italic Privilegio de la Unión#!, цей принцип підкреслював здатність станів обмежувати королівську владу та відкидати абсолютизм."
  flavor_ara.18.title: "Зміни в [ShowAreaNameWithNoTooltip('aragon_area')]"
  flavor_ara.18.desc: "Зусилля [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] щодо консолідації влади та централізації [ROOT.GetCountry.GetFlavorRank] зустріли запеклий опір в [ShowAreaName('aragon_area')]. Давні привілеї регіону, а також могутня [ShowEstatePrivilegeName('justicia_de_aragon')], стали значними перешкодами для [ROOT.GetCountry.GetGovernment.GetAdjective] влади. Ці давні традиції зобов'язують монархію поважати [ShowCultureName('aragonese')] свободи, обмежуючи здатність [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] повністю інтегрувати королівство в єдину адміністрацію. Розчаровані повільним прогресом централізації, радники [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] пропонують скасувати ці архаїчні інституції."
  flavor_ara.18.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] мусить панувати!"
  flavor_ara.18.a.tt: "Усі [ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('aragon_area')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднаються до [target_rebels.GetName]"
  aragonese_loyalist_rebels: "Арагонські лоялісти"
  flavor_ara.18.b: "Фуерос мусять поважатися."
  flavor_ara.18.historical_info: "Зміни в Арагоні були серією політичних конфліктів наприкінці XVI століття, спричинених спробами централізувати королівську владу по всій Іспанії. Арагон запекло чинив опір цим заходам, оскільки його інституції захищали регіональну автономію та обмежували владу короля. Напруга переросла у збройне повстання в 1591 році, коли королівське втручання в місцеве управління призвело до широких заворушень, які зрештою були придушені силами Філіпа II, що призвело до значного занепаду традиційних автономних привілеїв Арагону."
  flavor_ara.19.title: "Доля [target_character.GetNameWithNoTooltip]"
  flavor_ara.19.desc: "Хоча нам вдалося обмежити автономію та місцеві інституції [ShowAreaName('aragon_area')], все ще є багато тих, хто зайняв тверду позицію проти наших дій під час $flavor_ara.18.title$, найпомітнішим з яких є [target_character.GetName], який служив [ShowEstatePrivilegeName('justicia_de_aragon')], посада, яка зробила [target_character.GetHimHer] головним захисником традиційних законів та привілеїв [ShowAreaNameWithNoTooltip('aragon_area')]. [target_character.GetSheHe|U] був однією з провідних фігур повстання, які розцінювали наші дії як незаконну спробу підірвати автономію регіону. На щастя, наші війська заарештували [target_character.GetHimHer], і [target_character.GetHisHer] доля тепер повністю в наших руках."
  flavor_ara.19.a: "Це ціна єдності."
  flavor_ara.19.a.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('aragon_area')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ara.19.b: "Помилувати [target_character.GetHimHer], щоб заспокоїти напругу."
  flavor_ara.19.b.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('aragon_area')] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ara.19.historical_info: "У 1591 році, за правління Філіпа II, Хуан де Лануса став лідером повстання проти королівських спроб централізувати владу та обійти давні закони та інституції регіону. У швидкій кампанії королівські війська придушили опір і захопили Ланусу. Без попереднього суду його було обезголовлено за особистим наказом Філіпа II. Його смерть ознаменувала кінець останньої значної спроби захистити традиційну правову систему та автономію Арагону від королівського абсолютизму."
  flavor_ara.20.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.20.desc: "Відомий лицар і вчений, [target_character.GetName], здобув визнання по всьому Середземномор'ю. Як член Ордену Святого Іоанна, [target_character.GetHisHer] ім'я стало синонімом військової доблесті та інтелектуального просвітництва. Окрім [target_character.GetHisHer] військових та адміністративних внесків, [target_character.GetLastNameWithNoTooltip] прославлений як покровитель знань. [target_character.GetSheHe|U] керував створенням численних перекладів класичних творів на [ShowDialectName('aragonese_dialect')] та [ShowLanguageName('latin_language')]. [ROOT.GetCountry.GetGovernment.GetCourtTitle] бачить у [target_character.GetLastNameWithNoTooltip] унікальну постать, яка втілює ідеали лицарства та державності — що робить [target_character.GetHimHer] ідеальним кандидатом для служіння нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] або використання [target_character.GetHisHer] стратегічного розуму на благо [ROOT.GetCountry.GetLongName] на полі бою."
  flavor_ara.20.a: "[target_character.GetHisHer|U] військові та дипломатичні знання добре послужать нам."
  flavor_ara.20.c: "[target_character.GetHisHer|U] зусилля краще підходять для Ордену Святого Іоанна."
  flavor_ara.20.historical_info: "Хуан Фернандес де Ередія був видатним іспанським лицарем, який також служив Великим магістром Ордену госпітальєрів. Він відіграв вирішальну роль у битві при Епілі, підтримуючи Педро IV Арагонського проти Арагонської унії. Як Великий магістр, він був значним покровителем історичних та літературних творів, сприяючи перекладам та компіляціям арагонською мовою."
  flavor_ara.21.title: "Повстання Германій"
  flavor_ara.21.desc: "Напруженість між класами в [ShowAreaName('valencia_area')] переросла у відкрите повстання. Розчаровані високими податками, зловживаннями владою з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та нездатністю [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] захистити їх від набігів берберських піратів, місцеві братства, відомі як Германії, взялися за зброю. Те, що починалося як рух для захисту своїх громад, переросло у ширшу вимогу реформ. Хоча вони стверджують, що діють від імені [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], їхні напади на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та їхній зростаючий радикалізм не можна ігнорувати."
  flavor_ara.21.a: "Ігнорувати їх."
  flavor_ara.21.a.tt: "Усі [ShowPopTypeName('burghers')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('valencia_area')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднаються до [target_rebels.GetName]"
  flavor_ara.21.b: "Визнати їхні проблеми та запропонувати компенсацію."
  flavor_ara.21.c: "Придушити повстання."
  germanies_revolt: "Повстання Германій"
  flavor_ara.21.historical_info: "Повстання Германій було значним повстанням у Королівстві Валенсія, частині Арагонської Корони, очолюваним ремісничими гільдіями проти Карла V. Воно було спричинене економічними труднощами, соціальною напруженістю та опозицією до феодальної та монархічної влади. Ремісничі гільдії були розчаровані економічним домінуванням земельної знаті та корупцією уряду, а також відсутністю Короля, який перебував у Німеччині, що створило вакуум влади та невдоволення Королівською Радою та місцевими чиновниками."
  flavor_ara.100.title: "Тірант Білий"
  flavor_ara.100.desc: "#italic Тірант Білий#!, валенсійський лицарський роман [target_artist.GetName], опублікований у [GetCurrentYear], розповідає про пригоди сера Тіранта, який рятує [GetCountry('BYZ').GetName] від [GetCountry('TUR').GetAdjective]. Він стає відомим і шанованим у [ShowCultureName('catalan')|U] літературних колах. Теми книги відходять від традиційних лицарських оповідей, підкреслюючи жваве кохання, сарказм та людські емоції, а також яскраві описи повсякденного життя, пропонуючи реалістичне, а іноді й гірке зображення життя."
  flavor_ara.100.a: "Наша культура справді розвинена!"
  flavor_ara.101.title: "Каталонський атлас"
  flavor_ara.101.desc: "#italic Каталонський атлас#!, створений у [GetCurrentYear], вважатиметься вершиною світових карт нашого часу. Виготовлений Майорканською картографічною школою, він складається з шести пергаментних аркушів, складених і закріплених на дерев'яних панелях. Карта надає космографічну та астрономічну інформацію, підкреслюючи сферичну форму Землі та пропонуючи вказівки морякам. Вона зображує відомий світ, з ілюстраціями міст, політичних союзів та представленням океанів. Східна частина карти включає знання, зібрані від різних мандрівників, тоді як західна частина містить всю інформацію, необхідну в портолані."
  flavor_ara.101.a: "Ця школа — національний скарб."
  flavor_ara.102.title: "Королівський Пантеон Абатства Поблет"
  flavor_ara.102.desc: "Наш правитель [target_character.GetName] останнім часом розмірковував про те, де [target_character.GetHerHis] смертні останки мають спочивати вічно. Серед кількох монастирів по всій нашій нації, [ShowWorkOfArtName('poblet_abbey')] привернуло увагу [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Абатство розташоване в [target_location.GetName] і належить до Цистерціанського ордену."
  flavor_ara.102.a: "Буде збудовано Королівський та Шляхетний пантеон."
  flavor_ara.102.b: "Шляхта не буде задоволена, але ми маємо кращі способи використання наших грошей."
  flavor_ara.103.title: "Хроніка [target_character.GetNameWithNoTooltip]"
  flavor_ara.103.desc: "[target_character.GetName] нарешті завершив свою Хроніку, що описує правління його батька, [target_character2.GetName], та його власне. Хроніка поділена на шість розділів, плюс додаток, кожен з яких розповідає про різні теми.\n\nЦя Хроніка має на меті виправдати рішення, прийняті [GetCountry('ARA').GetGovernment.GetRulerTitle], а також описує численні події, що відбулися під час його правління. Якщо що, ця Хроніка також є збіркою знань, які допоможуть нашій країні знайти правильний шлях до процвітання."
  flavor_ara.103.a: "Ми дізналися, що влада має бути в руках короля."
  flavor_ara.103.b: "Передача влади — це шлях нашого королівства."
  flavor_ara.104.title: "Барселонська Королівська Верф"
  flavor_ara.104.desc: "Звинувачення у бездіяльності та непрофесіоналізмі лунали на адресу робітників Королівських верфей, розташованих поблизу гавані в [port_location.GetName]. Королівство витратило значну частину скарбниці протягом років з моменту її створення як розширення попередньої старої верфі у 1241 році, і ми не бажаємо, щоб ці гроші були марними.\n\nНовини про розчарування при дворі після пліток змусили корабелів взяти ініціативу, і вони працювали вдень і вночі, щоб доставити нові чудові судна, щоб довести хибність звинувачень проти них."
  flavor_ara.104.a: "Плітки були несправедливими до цих чоловіків."
  flavor_ara.105.title: "Вісент Феррер"
  flavor_ara.105.desc: "[target_character.GetName], домініканський чернець із [target_location.GetName] та проповідник, приєднався до нашого двору. Він розпочав місіонерські подорожі та відзначився як логік. Він присвятив себе теологічним студіям, вступив до Домініканського ордену та став видатною постаттю у викладанні філософських лекцій. Його видатні проповідницькі здібності та імовірний дар мов сприяли наверненням та вплинули на життя багатьох, тоді як його участь у єврейських громадах залишається предметом суперечок."
  flavor_ara.105.a: "Нехай він приєднається до нашого двору і нехай проповідує Євангеліє."
  flavor_ara.105.b: "Його ідеї занадто нетерпимі для нас."
  flavor_ara.105.a.tt: "Деякі [ShowCultureName('sephardi')] люди в нашому володінні будуть навернені до нашої релігії, але це засмутить решту з них"
  flavor_ara.106.title: "Ла Льотжа де ла Седа"
  flavor_ara.106.desc: "[target_location.GetName]'s [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вимагають будівництва спеціальної будівлі для торгівлі [ShowGoodsName('silk')], з метою перетворити місто на видатний центр для [ShowGoodsNameWithNoTooltip('silk')] продукції в Середземномор'ї. Цей амбітний проєкт має потенціал привабити купців та заручитися підтримкою впливової фракції [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], зміцнюючи позиції [ShowLocationNameWithNoTooltip('valencia')] в торгівлі [ShowGoodsNameWithNoTooltip('silk')]."
  flavor_ara.106.a: "Це добре для всіх."
  flavor_ara.106.b: "Нам слід використати гроші на кращі речі."
  flavor_ara.107.title: "Доля Монтсеррату"
  flavor_ara.107.desc: "Санта-Марія-де-Ріполь був культурним центром Каталонії з моменту заснування у 888 році графом Віфредом Волохатим. Протягом століть його скрипторій був таким же важливим, як ті, що в Монте-Кассіно чи Сен-Дені, але його остання слава давно минула. Його позиція як родинного мавзолею для графів Барселони та Бесалу гарантувала щедрі пожертви, що зробили монастир справді могутнім.\n\nВ останні десятиліття відгалуження монастиря Санта-Марія-де-Монтсеррат вимагало незалежності від Ріполя. Якщо ми підтримаємо цю незалежність, доля Ріполя може бути вирішена, але багато хто задається питанням, чи не є це природним ходом речей."
  flavor_ara.107.a: "Нехай Монтсеррат літає вільно."
  flavor_ara.107.b: "Трохи грошей може змусити Ріполь знову засяяти."
  flavor_ara.108.title: "Санта-Марія-де-Монтсеррат"
  flavor_ara.108.desc: "Колись відгалуження Санта-Марія-де-Ріполь, Санта-Марія-де-Монтсеррат став одним із найважливіших монастирів у володінні. Це місце, відоме як місце паломництва для поклоніння Діві Монтсерратській, стає занадто малим для власних потреб і змусило ченців, що живуть у ньому, звернутися до нас за щедрою допомогою.\n\nЧенці хочуть розпочати будівництво клуатру, що значно розширило б монастир."
  flavor_ara.108.a: "Ми допоможемо розширити Монтсеррат."
  flavor_ara.108.b: "Ми підтримали їх у здобутті незалежності. Чого ще вони хочуть?"
  flavor_ara.109.title: "Ла Моренета"
  flavor_ara.109.desc: "Сліпий паломник до монастиря Санта-Марія-де-Монтсеррат заявляє, що був зцілений від своєї сліпоти Дівою Монтсерратською, ласкаво названою #italic Ла Моренета#! (Маленька Темна).\n\nМаленька статуя, знайдена століття тому дітьми-пастухами, отримала своє прізвисько, тому що її спочатку бліда шкіра потемніла, ймовірно, через дим від свічок."
  flavor_ara.109.a: "Відсвяткуймо цей дар від Діви!"
  flavor_ara.109.b: "Чудеса, ви сказали?"
  flavor_ara.109.b.tt: "[Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] зменшиться"
  flavor_ara.110.title: "Пальмський собор"
  flavor_ara.110.desc: "Після завоювання Майорки, [target_character.GetName] розпочав будівництво $palma_cathedral$ на місці колишньої мечеті. Його величний неф сягає висоти 44 метрів, всього на 4 метри коротший за собор Сен-П'єр де Бове. Побудований у захопливому каталонському готичному стилі, з впливами з півночі, будівництво розпочалося у 1229 році. Незважаючи на його освячення, дехто все ще вважав його незавершеним."
  flavor_ara.110.a: "Наш обов'язок — продовжити цю священну справу."
  flavor_ara.110.b: "Свята Церква може цим керувати."
  flavor_ara.111.title: "Коронаційна дилема"
  flavor_ara.111.desc: "Від славетного правління [GetCharacter('ara_pere_ii_arago').GetName] кожен суверен цієї шляхетної землі прагнув благословення [GetCountry('PAP').GetLongName] для величної коронації в священних стінах собору [ShowLocationName('zaragoza')], відомого як #italic Seo de [ShowLocationNameWithNoTooltip('zaragoza')]#!. Велична церемонія, супроводжувана урочистою присягою Фуерос Арагону, запалювала б блискучий ювілей, наповнюючи вулиці міста радістю. Тепер настає нова ера, і [new_ruler.GetName] стоїть на краю долі, розриваючись між збереженням заповітних традицій або прокладанням сміливого шляху. Проте, незалежно від [new_ruler.GetHerHis] вибору, чекає бурхлива подорож, бо тягар невблаганного царства лягає на [new_ruler.GetHerHis] царські плечі від самого початку."
  flavor_ara.111.a: "Королі [GetCountry('ARA').GetNameWithNoTooltip] не потребують дозволу."
  flavor_ara.111.b: "Ми дотримаємося присяги."
  flavor_ara.111.c: "Коронація відбудеться там, де забажає правитель."
  flavor_ara.111.c.tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] в [GetCountry('ARA').GetName] буде розлютований"
  flavor_ara.200.title: "[GetCountry('MLL').GetAdjectiveWithNoTooltip] питання"
  flavor_ara.200.desc: "Наш васал [GetCountry('MLL').GetLongName] був занозою в нашому боці з моменту їхнього створення. Їхній правитель [majorca_ruler.GetName] бунтівний і неповажний, їхні купці створюють торгові союзи з [GetCountry('GEN').GetAdjective] та іншими західносередземноморськими ринками, які виключають [ShowCultureName('catalan')] інтереси, а їхня наполегливість у підписанні дипломатичних договорів з нашими суперниками та ворогами всупереч нашим наказам зробила ситуацію нестерпною.\n\nМи могли б використати той факт, що вони карбують власну монету, незважаючи на те, що це незаконно за [GetCountry('ARA').GetAdjective] законом, щоб притягнути [majorca_ruler.GetShortNameWithNoTooltip] до суду. Як тільки [majorca_ruler.GetHeShe] опиниться в Барселоні, ми могли б схопити [majorca_ruler.GetHimHer] і вирішити проблему раз і назавжди."
  flavor_ara.200.a: "Продовжуйте план, надішліть виклик."
  flavor_ara.200.b: "Мене не хвилюють дрібні махінації дрібних людей."
  flavor_ara.201.title: "[GetCountry('ARA').GetAdjectiveWithNoTooltip|U] Тиранія"
  flavor_ara.201.desc: "Наш жорстокий сюзерен [GetCountry('ARA').GetGovernment.GetRuler.GetName] офіційно звинуватив [majorca_ruler.GetName] у порушенні [GetCountry('ARA').GetAdjective] закону шляхом карбування власних монет, навмисно ігноруючи давню традицію карбування монет з наших володінь у Руссільйоні.\n\nВони вимагають, щоб [majorca_ruler.GetName] поїхав до [target_location.GetName], щоб постати перед судом і захистити свою справу, якщо ми відхилимо їхні накази, вони погрожують оголосити нас бунтівним васалом."
  flavor_ara.201.a: "Ми не порушували жодного закону, нам нічого боятися."
  flavor_ara.201.b: "[GetCountry('ARA').GetGovernment.GetRuler.GetShortName] жадібний, але слабкий, надання [majorca_ruler.GetHimHer] деяких земель заспокоїть [GetCountry('ARA').GetGovernment.GetRuler.GetHimHer]."
  flavor_ara.201.c: "Це пастка; ми підготуємося і звільнимося від тирана."
  flavor_ara.202.title: "Пастка спрацювала"
  flavor_ara.202.desc: "[majorca_ruler.GetName] прибув до [target_location.GetName], щоб постати перед судом за [majorca_ruler.GetHisHer] злочини, і наші охоронці схопили [majorca_ruler.GetHimHer]. Що нам робити з [majorca_ruler.GetHimHer]?"
  flavor_ara.202.a: "[majorca_ruler.GetHeShe|U] винен, не потрібно більше витрачати час на це, покінчіть з [majorja_ruler.GetHimHer]."
  flavor_ara.202.b: "Нехай [majorca_ruler.GetHimHer] говорить. У нас буде справедливий суд."
  flavor_ara.202.b.tt: "[majorca_ruler.GetName] виправданий"
  flavor_ara.203.title: "Зустрічна пропозиція"
  flavor_ara.203.desc: "[majorca_ruler.GetName] не прибув на суд, а натомість надіслав пропозицію викупити права, якими [majorca_ruler.GetHeShe] користувався. [majorca_ruler.GetHeShe|U] пропонує передати [majorca_ruler.GetHisHer] володіння в [target_location.GetName] короні назавжди."
  flavor_ara.203.a: "Ми приймемо це, поки що."
  flavor_ara.204.title: "Помста!"
  flavor_ara.204.desc: "Нас спіткало лихо! Тиран [GetCountry('ARA').GetGovernment.GetRuler.GetName] убив нашого дорогого [GetCountry('MLL').GetGovernment.GetPreviousRuler.GetName]. Народ розлючений і закликає до війни."
  flavor_ara.204.a: "До зброї! Смерть тирану!"
  flavor_ara.204.b: "Зачекайте! Ми ще не готові."
  flavor_ara.210.title: "Сварливі брати"
  flavor_ara.210.desc: "Відносини між нашим правителем [aragon_ruler.GetName] та [ruler_brother.GetHisHer] братом [ruler_brother.GetName] завжди були напруженими, але народження [aragon_daugther.GetName] довело ситуацію до кипіння.\n\n[aragon_ruler.GetShortNameWithNoTooltip] негайно почав позбавляти [ruler_brother.GetShortNameWithNoTooltip] будь-яких привілеїв та влади, наданих [ruler_brother.GetHisHer] становищем спадкоємця [GetCountry('ARA').GetLongName]. Зі свого боку, [ruler_brother.GetShortNameWithNoTooltip] швидко втік до [target_location.GetName] і почав збирати союзників, кажучи їм, що рішення [GetCountry('ARA').GetGovernment.GetRulerTitle] є надто передчасним і мотивоване ірраціональною ненавистю замість справедливості."
  flavor_ara.210.a: "Полюйте на цього щура! Виженіть [ruler_brother.GetHimHer] з [target_location.GetNameWithNoTooltip], перш ніж [ruler_brother.GetHeShe] отруїть більше умів!"
  flavor_ara.210.a.tt: "[ruler_brother.GetName] вигнано з [target_location.GetName]"
  flavor_ara.210.b: "Запросіть його назад до двору. Ми обговоримо спадкування престолу."
  flavor_ara.219.title: "Унії більше немає"
  flavor_ara.219.desc: "Повстання Уній нарешті добігло кінця, їхні армії розгромлено та розпущено, міста-дисиденти умиротворено та взято під контроль, а змовники вже висять на шибеницях.\n\n[aragon_ruler.GetName] тріумфував над зрадниками і повернув мир до [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName], настав час вирішити, що робити з привілеями, які вони накопичили завдяки впливу та силі."
  flavor_ara.219.a: "Моєю владою, їх більше немає! Знищіть кожну копію цих привілеїв!"
  flavor_ara.219.b: "Я не прийму того, що це було нав'язано мені."
  flavor_ara.219.c: "Знищити старий привілей!"
  flavor_ara.219.d: "Ніхто не може кинути виклик владі нашого [GetCountry('ARA').GetGovernment.GetRulerTitle]."