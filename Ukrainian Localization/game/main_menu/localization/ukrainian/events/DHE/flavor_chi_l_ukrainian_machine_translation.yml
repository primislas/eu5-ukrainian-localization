  third_past_chi_improve_pre_rtr_modifiers: "[Concept('COUNTRY.GetName] покращив ефекти [country_modifiers', 'CONCEPT_PLACEHOLDER')|e] до та під час [ShowSituationName('red_turban_rebellions')] на $VALUE|G2%$ (поточний масштаб модифікатора: #Y [COUNTRY.MakeScope.GetVariable('chi_rtr_modifier_intensity').GetValue|2%]#!)"
  chi_adjust_pre_rtr_modifiers_base_text: "#Y Це впливає на [ShowModifier('chi_factional_strife')] та [ShowModifier('rtr_red_turban_rebellions')]#!"
  flavor_chi.1.title: "Стратегічне рішення після подорожі [target_explorer.GetNameWithNoTooltip]"
  flavor_chi.1.desc: "Хоча безперечно, що ми є центром світу, і все, що знаходиться за межами наших кордонів, не варте нашої уваги, знання про ті далекі місця все ж корисні. Тому ми доручили [target_explorer.GetName] принести нам інформацію про такі місця, і [target_explorer.GetSheHe] проводить для нас дослідження.\n\nОднак багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджує, що [ROOT.GetCountry.GetLongName] не личить турбуватися про варварські землі, тоді як інші мають протилежну думку і припускають, що ми повинні натомість спрямувати свій погляд назовні, оскільки вони передбачають багато переваг від цього."
  flavor_chi.1.historical_info: "У XIV столітті відносини Китаю із зовнішнім світом почали змінюватися. За династії Юань Китай встановив контакти із Заходом, відновивши старі шовкові шляхи та залучивши мусульманських, християнських та єврейських торговців до Китаю. Вигнання монголів у 1367 році та захоплення влади Мінцями скасувало процеси, що міцніше пов'язували Китай із зовнішнім світом. Після семи експедицій (1405-1433) адмірала Чжен Хе, який провів імперський флот в Індійський океан та до узбережжя Африки, Китай замкнувся в собі та закрив свої зовнішні зв'язки."
  flavor_chi.1.a: "Внутрішня досконалість."
  flavor_chi.1.b: "Збалансована позиція."
  flavor_chi.1.c: "Зовнішня експансія."
  flavor_chi.2.title: "Ремонт [ShowBuildingTypeNameWithNoTooltip('ruined_great_wall_of_china')]"
  flavor_chi.2.desc: "З давніх-давен безпека на північному кордоні була важливим питанням. Однією з проблем є жалюгідний стан [ShowBuildingTypeName('ruined_great_wall_of_china')], збудованої в давні часи, але залишеної руйнуватися в останні століття. Ми могли б її відремонтувати, але це було б дорого, і зусилля, як фізичні, так і фінансові, ймовірно, спричинили б деякі заворушення серед людей. Однак, з покращеною обороною, провінції в цьому районі, ймовірно, стали б більш продуктивними та безпечними, тоді як без них люди можуть покинути їх заради безпечніших притулків. Що нам робити?"
  flavor_chi.2.a: "Давайте краще підтримувати [ShowBuildingTypeNameWithNoTooltip('ruined_great_wall_of_china')]."
  flavor_chi.2.b: "Ми могли б ґрунтовно відремонтувати ділянку в [target_province1.GetNameWithNoTooltip]."
  flavor_chi.2.c: "[target_province2.GetNameWithNoTooltip] отримає вигоду від значних ремонтних робіт."
  flavor_chi.2.d: "Давайте відбудуємо ділянку стіни в [target_province3.GetNameWithNoTooltip]."
  flavor_chi.2.e: "Нехай і далі руйнується."
  flavor_chi.4.title: "Армійські реформи [target_character.GetNameWithNoTooltip]"
  flavor_chi.4.desc: "Відомий [target_character.GetName] запропонував низку військових реформ, які, якщо їх впровадити, зроблять наші армії сильнішими, а наших чоловіків – ефективнішими у бою. На жаль, ґрунтовна перебудова війська є досить складним завданням. Вона вимагатиме чималих коштів та зусиль, і навіть тоді збройні сили можуть не оцінити змін, що призведе до нестабільності та дезертирства."
  flavor_chi.4.a: "Приймімо реформи!"
  flavor_chi.4.b: "Ні, такі реформи надто дорогі."
  flavor_chi.5.title: "Прибуття єзуїтів"
  flavor_chi.5.desc: "Чужинці з [target_country.GetName] вже деякий час присутні на наших землях. Хоча їхні дивні вірування, які вони називають [target_country.GetReligion.GetName], можуть підірвати наші [ROOT.GetCountry.GetReligion.GetAdjective] вчення, якщо їм дозволити поширюватися нашими землями, безперечно, знання, які вони приносять, можуть бути дуже корисними для нас.\n\nДеякі серед нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджують, що ми повинні використовувати будь-яку перевагу, яку можемо отримати від них, навіть якщо це коштуватиме того, що деякі люди будуть обмануті цією чужою релігією. Однак інші побоюються за цілісність наших інститутів, якщо ми дозволимо таким варварським ідеям проникати в наше суспільство."
  flavor_chi.5.historical_info: "У 1581 році перші єзуїтські місіонери прибули до Китаю, приносячи дари імператору та демонструючи різні механічні винаходи з Європи. Вони також виявили великі знання, створивши величезну карту світу та запропонувавши слушні ідеї для нової календарної реформи. Але вони також принесли з собою дивні релігійні та філософські ідеї, які почали порушувати традиційний порядок Китаю."
  flavor_chi.5.a: "Ми можемо отримати користь від їхнього навчання."
  flavor_chi.5.a.tt: "Багато наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [Concept('convert', 'CONCEPT_PLACEHOLDER')|e] до [ShowReligionName('catholic')]"
  flavor_chi.5.b: "Їхні чужі ідеї неприйнятні в нашому суспільстві."
  flavor_chi.6.title: "Фінансова криза"
  flavor_chi.6.desc: "Через десятиліття повстань, заворушень та корупції наша фінансова ситуація перебуває у скрутному становищі. Нам потрібен новий приплив готівки, але єдиний спосіб зробити це – запровадити нові непопулярні податки. Зробивши це, ми можемо тимчасово полегшити деякі наші проблеми з грошовим потоком, але вже нестабільна ситуація може стати ще гіршою. Але якщо ми цього не зробимо, ми можемо втратити здатність ефективно збирати податки в певних провінціях через заворушення."
  flavor_chi.6.a: "Піднімімо податки."
  flavor_chi.6.b: "Наші піддані вже достатньо розгнівані!"
  flavor_chi.7.title: "Вигнання єзуїтів"
  flavor_chi.7.desc: "Через нещодавні події тепер здається, що єзуїти, можливо, пережили свою корисність. Хоча їхні знання великі, вони чужі нам і іноді викликають багато заворушень серед наших вчених та простого люду, порушуючи стабільність нашого царства. Вони десятиліттями втручалися у внутрішні справи нашої нації, навіть намагаючись втручатися у справи нашої [ROOT.GetCountry.GetGovernment.GetAdjective] спадщини. Можливо, настав час їм піти."
  flavor_chi.7.a: "Вигнати їх!"
  flavor_chi.7.b: "Вони надто цінні!"
  flavor_chi.8.title: "Місія [target_character.GetNameWithNoTooltip]"
  flavor_chi.8.desc: "До нас дійшли повідомлення, що на наших берегах прибула дипломатична місія з далекої західної варварської нації [target_country.GetName], очолювана певним [target_character.GetName]. Кажуть, що [target_character.GetSheHe|U] принесла [target_character.GetHerHim] дружні привітання [target_character.GetHerHis] [target_country.GetGovernment.GetRulerTitle], ідеї для полегшення торгівлі між нашими націями та різні механічні дива."
  flavor_chi.8.a: "Відкинути пропозиції цих грубих західних дияволів!"
  flavor_chi.8.b: "Нам цікаво почути їхні ідеї."
  opinion_ideas: "Зацікавлені в наших ідеях"
  flavor_chi.9.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.9.desc: "Незвичайний єзуїт наблизився до [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetName] одягається як [ShowCultureGroupName('chinese_group')] людина, перейняв багато [ShowCultureGroupNameWithNoTooltip('chinese_group')] звичаїв і розмовляє подібно до [ShowCultureGroupNameWithNoTooltip('chinese_group')] людей. Вчений і місіонер, [target_character.GetLastNameWithNoTooltip] здається, так само зацікавлений у звичаях, картографії та науці [ShowCultureGroupNameWithNoTooltip('chinese_group')] світу, як і [target_character.GetSheHe] у тому, щоб повідомити нам про [target_character.GetHerHis] власний. Це означає, що [target_character.GetSheHe] мав набагато більше успіху, ніж багато хто з [target_character.GetHerHis] братів, коли йдеться про залучення навернених, але [target_character.GetHerHis] навички, особливо щодо астрономії та картографії, безсумнівно, можуть стати нам у пригоді."
  flavor_chi.9.a: "Ласкаво просимо [target_character.GetNameWithNoTooltip] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_chi.9.b: "Повертайтеся до [ShowContinentNameWithNoTooltip('europe')]!"
  flavor_chi.10.title: "Куньюй Ванго Цюаньту"
  flavor_chi.10.desc: "Після довгої та кропіткої роботи, що поєднала карти всього світу як з [ShowContinentName('europe')], так і з $china$, [target_character.GetName] та [target_character.GetHerHis] [ShowCultureGroupName('chinese_group')] співробітники представили нам #italic Куньюй Ванго Цюаньту#!, або «карту безлічі країн світу». Сама карта є джерелом цінної інформації для нас і дала нам набагато детальніші знання про королівства та народи, що знаходяться далеко від наших кордонів."
  flavor_chi.10.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_chi.10.a.tt: "Ми отримаємо велику карту [ShowContinentName('europe')]"
  flavor_chi.11.title: "Коледж Святого Павла"
  flavor_chi.11.desc: "Єзуїтський місіонер створив коледж у своєму анклаві в [target_location.GetName], щоб, серед іншого, навчати своїх братів [ShowCultureGroupName('chinese_group')] мові та звичаям. Єзуїти переконалися, що шлях до [ShowCultureGroupNameWithNoTooltip('chinese_group')] народу полягає в тому, щоб навчитися діяти та вписуватися серед них.\n\nНас не дивує, що ці іноземці хотіли б нас наслідувати, але можливо, це дозволить їхній проповіді охопити більшу частину нашого населення."
  flavor_chi.11.a: "Це нам до вподоби."
  flavor_chi.11.b: "Чинити тиск, щоб коледж було закрито."
  flavor_chi.12.title: "Поширення [ShowReligionGroupNameWithNoTooltip('christian')]"
  flavor_chi.12.desc: "Постійна присутність [ShowReligionGroupAdjective('christian')] місіонерів у [ROOT.GetCountry.GetName] не залишилася без наслідків. Кількість мешканців однієї з наших провінцій дедалі більше підпадала під вплив [ShowReligionGroupAdjectiveWithNoTooltip('christian')] місіонерів, і наразі [ShowReligionGroupNameWithNoTooltip('christian')] вдалося стати домінуючою релігією в цьому районі."
  flavor_chi.12.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_chi.13.title: "[ShowReligionGroupNameWithNoTooltip('christian')], віра для [ROOT.GetCountry.GetGovernment.GetRulerTitle]?"
  flavor_chi.13.desc: "[ShowReligionGroupName('christian')] стає все більш прийнятною серед наших підданих, і [target_ruler.GetName] зараховує [ShowReligionGroupAdjectiveWithNoTooltip('christian')] місіонерів до [target_ruler.GetHerHis] найближчих довірених осіб у столиці. Нещодавно навіть члени нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle] вже належать до цієї іноземної релігії. Деякі вже припускають, чи не настав час для [ROOT.GetCountry.GetGovernment.GetRulerTitle] [target_ruler.GetHerselfHimself] навернутися до цієї римської [ShowReligionAdjective('catholic')] віри. Окрім теологічних наслідків, ми, безсумнівно, знайшли б багато нових друзів серед королівств Заходу."
  flavor_chi.13.a: "Прийняти [ShowReligionGroupNameWithNoTooltip('christian')]."
  flavor_chi.13.b: "Це було б немислимо."
  flavor_chi.14.title: "[ShowReligionGroupAdjectiveWithNoTooltip('christian')] [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle]"
  flavor_chi.14.desc: "Здається, [target_character.GetName], один [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], був зачарований культурою та знаннями місіонерів із Заходу. Хоча ми й можемо отримати вигоду з ідей, які [target_character.GetSheHe] здобув завдяки контактам, які [target_character.GetSheHe] встановив, [target_character.GetHerHis] нещодавнє навернення до [ShowReligionName('catholic')] є, можливо, занадто важким для сприйняття."
  flavor_chi.14.a: "Звільнити [target_character.GetHerHim]."
  flavor_chi.14.b: "Доки [target_character.GetSheHe] виконує [target_character.GetHerHis] роботу."
  flavor_chi.15.title: "Вкорінена некомпетентність"
  flavor_chi.15.desc: "Наша адміністрація є домом для видатних посад навколо [ROOT.GetCountry.GetGovernment.GetCourtTitle] [target_character.GetName]. Незважаючи на наші спроби просувати та підтримувати [ROOT.GetCountry.GetGovernment.GetCabinetTitle] здатних осіб, іноді прослизає некомпетентність.\n\nТакий випадок із [target_character2.GetName], який, незважаючи на [target_character2.GetHerHis] найкращі зусилля, зумів спричинити проблеми та затори в нашому бюрократичному процесі."
  flavor_chi.15.a: "Негайно припинити [target_character2.GetHerHis] повноваження."
  flavor_chi.15.b: "Організувати односторонню подорож для [target_character2.GetShortNameWithNoTooltip] додому."
  flavor_chi.15.c: "Дати [target_character2.GetHerHim] ще один шанс..."
  flavor_chi.16.title: "Недовіра до [ROOT.GetCountry.GetGovernment.GetCabinetTitle]"
  flavor_chi.16.desc: "Шепіт та інтриги не є чужими для повсякденного життя палацу. Однак нещодавні плітки збурили служниць та євнухів. Здається, [target_character2.GetName] засудив витончену елегантність [ROOT.GetCountry.GetCulture.GetName] культури. Насправді, [target_character2.GetSheHe] наполягає, що [target_culture.GetName] перевершує її в усьому. Ця скандальна поведінка загрожує стабільності та здоров'ю наших внутрішніх справ, немов бур'ян у саду..."
  flavor_chi.16.a: "Геть [target_character2.GetHerHim]."
  flavor_chi.16.b: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] не боїться такої критики!"
  based_on_spiritualist_vs_humanist_tt: "Виходячи з нашого поточного положення між [ShowSocietyDirectionName('spiritualist')] та [ShowSocietyDirectionName('humanist')]:"
  flavor_chi.17.title: "Рідке срібло"
  flavor_chi.17.desc: "Мистецтво алхімії та занурення у вивчення мінералів є цікавим заняттям і чудовим прикладом нашої інноваційності. На щастя, людина великої слави в алхімічних справах на ім'я [target_character2.GetShortName] з'явилася в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], обіцяючи доступ до нових і вдосконалених еліксирів..."
  flavor_chi.17.a: "Цікаво..."
  flavor_chi.17.b: "Нам це не потрібно."
  this_may_shorten_ruler_lifespan_tt: "Це може різко вплинути на здоров'я [target_character.GetShortNameWithNoTooltip]"
  flavor_chi.18.title: "Далеко від дому"
  flavor_chi.18.desc: "Життя при [ROOT.GetCountry.GetGovernment.GetCourtTitle] зазвичай дуже насичене. Придворні готують наступний бенкет, міністри складають новий указ, поки весь палац насвистує зайняту мелодію. Хоча такий спосіб життя, що передбачає посаду в нашому [ROOT.GetCountry.GetGovernment.GetCabinetTitle], бажаний для багатьох, до нашого відома дійшло, що [target_character2.GetShortName] став дуже меланхолійним.\n\nКоли до [target_character2.GetHerHim] звернулися, [target_character2.GetSheHe] розповів про [target_location.GetName], де [target_character2.GetSheHe] народився, деякі [ROOT.GetVariable('character_age_display_variable').GetValue] років тому. [target_character2.GetHerHis|U] бажання — повернутися і приділити час відновленню зв'язку з [target_character2.GetHerHis] родиною та насолодитися тихим життям подалі від [ROOT.GetCountry.GetCapital.GetName], займаючись місцевими адміністративними справами в [target_location.GetNameWithNoTooltip]..."
  flavor_chi.18.a: "Сім'я важлива, нехай [target_character2.GetHerHim] іде."
  flavor_chi.18.b: "А хто займатиметься нашою бюрократією?"
  target_province_gets_pop_sat_and_prosperity_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] отримають #G +[ROOT.GetVariable('character_prosperity_gain_variable_display').GetValue]%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], а їхні [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають #G +[ROOT.GetVariable('character_pop_satisfaction_gain_variable_display').GetValue]%#! [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] відповідно до навичок [target_character2.GetShortNameWithNoTooltip]"
  based_on_the_abilities_of_cabinet_tt: "На основі спільних навичок [target_character.GetShortNameWithNoTooltip] та [target_character2.GetShortNameWithNoTooltip]:"
  flavor_chi.19.title: "Дружба на високих місцях"
  flavor_chi.19.desc: "Зв'язок між друзями є священним. Так само і для [target_character.GetName] та [target_character2.GetName]. Разом ці дві споріднені душі написали прославляння своїх спільних інтересів та часу, проведеного в [ROOT.GetCountry.GetGovernment.GetCabinetTitle].\n\nЗгідно з їхнім твором, дружба — це безцінний дар, який не можна купити чи продати, але його цінність набагато більша, ніж гора із золота. Бо золото холодне й безжиттєве. Воно не може ні бачити, ні чути. У скрутні часи воно безсиле розрадити. Воно не має вух, щоб слухати, серця, щоб розуміти. Воно не може принести вам розради чи простягнути руку допомоги. Тож коли ви просите небеса про дар, будьте вдячні, якщо вони пошлють не діаманти, перли чи багатства, а любов справжніх, вірних друзів!"
  flavor_chi.19.a: "Вони встановили зразковий стандарт."
  flavor_chi.19.b: "Ми завжди мали гарне око на видатних людей."
  every_location_in_province_food_prosperity_satisfaction_tt: "[Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] отримають #G +[ROOT.GetVariable('target_province_control_prosperity_variable_display').GetValue]%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], а їхні [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають #G +[ROOT.GetVariable('target_province_control_pop_satisfaction_variable_display').GetValue]%#! [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] на основі нашого [Concept('control', 'CONCEPT_PLACEHOLDER')|e] там"
  target_province_loses_prosperity_and_pop_satisfaction_tt: "[Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] втратять [ShowNamedValue('prosperity_very_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], а їхні [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_chi.20.title: "Голод у [target_province.GetNameWithNoTooltip]"
  flavor_chi.20.desc: "Народ [target_province.GetName] пережив кілька циклів неврожаю. У поєднанні з нещастями, поганими прикметами та загальним відчуттям незахищеності, багато хто пошепки говорить про недоліки нашого уряду. До нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] прибув посланець, просячи про транспортування цінної їжі. Однак наші радники нагадали нам, що наш вплив, ймовірно, залежатиме від інфраструктури провінції."
  flavor_chi.20.a: "Наш обов'язок — допомогти народу."
  flavor_chi.20.b: "Ми не можемо собі цього дозволити..."
  flavor_chi.21.title: "Відновлення павільйону принца Тенга"
  flavor_chi.21.desc: "Народ [target_location.GetName] благословенний жвавим і яскравим серцем країни, повним пишних, родючих сільськогосподарських угідь. У поєднанні з життєво важливим розташуванням місцевості в серці $china$, не дивно, що вона привабила такий ріст і торговельне значення. Щоб відзначити це та спробувати продемонструвати наше багатство, [target_character.GetName] запропонував відновлення павільйону принца Тенга, щоб він слугував видатним символом нашого багатства та потужною демонстрацією нашої вищої архітектури..."
  flavor_chi.21.a: "Нехай комплекс прикрасить красу [target_province.GetNameWithNoTooltip]."
  flavor_chi.21.b: "Ми не можемо собі цього дозволити."
  target_province_gets_20_prosperity: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [Concept('target_province.GetNameWithNoTooltip] [province', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowNamedValue('prosperity_severe_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_target_province_loses_25_satisfaction_tt: "Кожен селянський [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [Concept('target_province.GetNameWithNoTooltip] [province', 'CONCEPT_PLACEHOLDER')|e] втратить [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_25_satisfaction_gain_tt: "Кожен селянський [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [Concept('target_province.GetNameWithNoTooltip] [province', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_chi.22.title: "Великий адмірал"
  flavor_chi.22.desc: "Досить часто простолюдинам і військовополоненим важко піднятися соціальними щаблями. Проте, досить дивовижно, коли з'являється така особа. Це випадок євнуха на ім'я [target_character.GetName]. Бувши захопленим і кастрованим у молодому віці, [target_character.GetNameWithNoTooltip] розпочав свою службу в домі місцевого принца в [ShowAreaName('yunnan_area')]. Завоювавши довіру принца, [target_character.GetSheHe] був відправлений до [ShowLocationName('dadu')], щоб удосконалити [target_character.GetHerHis] освіту, де він досяг успіху. Не диво, що така людина справила велике враження на [target_character2.GetName]. Без сумніву, [target_character.GetNameWithNoTooltip] стане чудовим адміралом і лідером для нашого славетного народу."
  flavor_chi.22.a: "Чудове поповнення наших військових лав."
  flavor_chi.22.b: "Ми не можемо довіряти жодним євнухам!"
  flavor_chi.23.title: "Повстання [target_character.GetNameWithNoTooltip]"
  flavor_chi.23.desc: "Наші армії щойно придушили незначне повстання, очолюване дрібним бюрократом на ім'я [target_character.GetName]. Незадоволений нашою політикою, [target_character.GetSheHe] очолив жорстоке повстання, під час якого [target_character.GetSheHe] захопив [target_location.GetRank.GetName] [target_location.GetName] і стратив багатьох урядовців.\n\nБільшість [ROOT.GetCountry.GetCulture.GetName] членів [ROOT.GetCountry.GetGovernment.GetCourtTitle] погоджуються, що головною причиною цієї трагедії була нелояльність [ShowCultureGroupName('chinese_group')] чиновників, чиї привілеї повинні бути обмежені, щоб запобігти іншій такій трагедії."
  flavor_chi.23.a: "Ми не дозволимо їм розпалити ще одне повстання."
  flavor_chi.23.b: "Ми не можемо дозволити собі втратити кваліфікованих бюрократів."
  flavor_chi.24.title: "Переворот [recipient.GetNameWithNoTooltip]"
  flavor_chi.24.desc: "Авторитарна політика [couped_character.GetName] значно змінила політичну атмосферу [ROOT.GetCountry.GetLongName] за останні кілька років. [couped_character.GetSheHe|U] володіє майже абсолютною владою над урядом і його бояться навіть увесь [ROOT.GetCountry.GetGovernment.GetCourtTitle] і навіть [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ruler_scope.GetHerselfHimself].\n\nЩоб покласти край правлінню терору [couped_character.GetShortNameWithNoTooltip], [recipient.GetName] розробив змову, бажаючи скинути [recipient.GetHerHis] дядька у підступному перевороті, можливо, навіть ставши новим Великим Канцлером [recipient.GetHerselfHimself]. Не дивно, що навіть [ruler_scope.GetName] бере участь у змові, сподіваючись обмежити владу цього могутнього аристократа."
  flavor_chi.24.a: "Продовжити за планом."
  flavor_chi.24.b: "Викрити змову [recipient.GetNameWithNoTooltip]."
  flavor_chi.24.c: "Змістити [couped_character.GetNameWithNoTooltip] і вибити ґрунт з-під ніг."
  flavor_chi.25.title: "Призначення [recipient.GetNameWithNoTooltip]"
  flavor_chi.25.desc: "Смерть [dead_character.GetName] залишила [ROOT.GetCountry.GetName] без провідного канцлера, який би займався придворними справами. Здається, є природний наступник, адже [dead_character.GetHerHis] племінник, [recipient.GetName], є вправним державним діячем, який підійшов би на цю роль. Багато хто, однак, побоюється призначення [recipient.GetHerHis], адже правління [dead_character.GetShortNameWithNoTooltip] було абсолютним і жорстоким, і багато хто хвилюється, що [recipient.GetNameWithNoTooltip] може піти стопами свого дядька."
  flavor_chi.25.a: "Призначити [recipient.GetNameWithNoTooltip]."
  flavor_chi.25.b: "Нам не потрібен ще один диктатор."
  YUA_benefits_of_toqto: "Після призначення [recipient.GetName] обов'язково скасує політику свого дядька, допомагаючи нам рухатися до [ShowSocietyDirectionName('sinicized')] правління, а також скасує [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('direct_appointment')] та [ShowPolicyName('limit_the_han_powers')]."
  flavor_chi.26.title: "Доля [ShowLawNameWithNoTooltip('keju_examination')]"
  flavor_chi.26_27.common_desc: "Тепер, коли [target_character.GetName] при владі, [target_character.GetSheHe] прагне скасувати політику [target_character.GetHisHer] дядька в багатьох сферах."
  flavor_chi.26.desc: "$flavor_chi.26_27.common_desc$\n\nОднією з них є [ShowPolicyName('direct_appointment')]. Результат цієї політики був згубним для нашої бюрократії, оскільки вона поклала край єдиній інституції, яка протягом століть сприяла просуванню багатьох талановитих студентів на посади в уряді [ROOT.GetCountry.GetName] та його попередників.\n\nТепер, коли [target_character.GetShortNameWithNoTooltip] розглядає можливість повернення [ShowLawName('keju_examination')], ми можемо лише сподіватися, що віра в систему буде відновлена, і ми згодом отримаємо багато нових заявників."
  flavor_chi.26.a: "Дотримуватися."
  flavor_chi.26.b: "Можливо, [dead_character.GetNameWithNoTooltip] мав рацію."
  flavor_chi.27.title: "[ShowLawNameWithNoTooltip('status_of_the_han_law')]"
  flavor_chi.27.desc: "$flavor_chi.26_27.common_desc$\n\nЯк [target_character.GetHerHis] наступна ціль, [target_character.GetHeShe] має намір скасувати політику [ShowPolicyName('limit_the_han_powers')], яка відчужила багатьох [ShowCultureGroupName('chinese_group')] громадян і підштовхнула їх до різних повстань, спрямованих на повалення [ROOT.GetCountry.GetFlavorRank]. Навіть за життя [dead_character.GetName] цю політику таємно критикували як надто жорстоку, але ніхто не міг протистояти могутньому диктатору."
  flavor_chi.27.a: "Скасувати!"
  flavor_chi.27.b: "Однак це нам підходить."
  yua_every_chinese_pop_will_get_20_satisfaction: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], що належить до [Concept('culture_group', 'CONCEPT_PLACEHOLDER')|e] [ShowCultureGroupName('chinese_group')], отримає [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_chi.28.title: "$three_histories_china$"
  flavor_chi.28.desc: "Прагнучи створити спадщину для [target_character.GetHerselfHimself], [target_character.GetName] нещодавно вирішив укласти історії попередників [ROOT.GetCountry.GetLongName] — династій Ляо, Сун та Цзінь, щоб включити їх до офіційної збірки історій.\n\nНезважаючи на різні труднощі, [ROOT.GetCountry.GetGovernment.GetAdjective] команда на чолі з [target_character.GetNameWithNoTooltip] змогла завершити три хроніки всього за кілька років. Однак така вражаюча швидкість також призвела до численних фактичних помилок, що заплямувало репутацію роботи, яка могла б потребувати подальших переглядів."
  flavor_chi.28.a: "Це все одно чудове доповнення до хронік."
  flavor_chi.29.title: "Піднесення [target_character.GetNameWithNoTooltip]"
  flavor_chi.29.desc: "Вже багато років було цілком очевидно, що [target_character.GetName], друга дружина [ROOT.GetCountry.GetGovernment.GetRulerTitle], була [ruler_scope.GetHerHis] справжньою улюбленицею. Однак [target_character.GetSheHe] ніколи не могла здобути першість у [ROOT.GetCountry.GetGovernment.GetCourtTitle] через скандал, який неминуче вибухнув би, якби [target_character.GetSheHe] була піднесена до статусу головної дружини. Тепер, зі смертю [deceased_wife.GetName], [ROOT.GetCountry.GetGovernment.GetRulerTitle] отримав найсприятливіший час, щоб піднести [target_character.GetHerHim] до статусу імператриці-консорта."
  flavor_chi.29.a: "Хай буде проклята опозиція!"
  flavor_chi.29.b: "Ми не можемо терпіти такого скандалу."
  flavor_chi.30.title: "Катастрофічні дощі в [target_province.GetNameWithNoTooltip]"
  flavor_chi.30.desc: "Серія катастрофічних погодних явищ вразила [target_province.GetName], спричинивши широкомасштабні руйнування та страждання. Це само по собі є лихом, але злива досягла [ShowModifier('chi_grand_canal')], спричинивши його переповнення та розлив. Ця безпрецедентна подія перешкодила функціонуванню каналу, що, у свою чергу, розірвало зв'язок між півднем і північчю.\n\nХоча це пошкодження теоретично можна відремонтувати, це коштуватиме значних витрат, які ми не можемо собі дозволити в нашому поточному стані. Але чи зможе [ROOT.GetCountry.GetName] вижити без Великого каналу?"
  flavor_chi.30.a: "Трагедія спіткала нашу націю."
  destroy_grand_canal_china_tt: "Великий канал стане практично непридатним, послабивши його ефекти від [ShowModifier('chi_grand_canal')] до [ShowModifier('chi_grand_canal_destruction')]."
  repair_grand_canal_china_tt: "Великий канал буде відремонтовано, змінивши його ефекти з [ShowModifier('chi_grand_canal_destruction')] на [ShowModifier('chi_grand_canal')]."
  flavor_chi.32.title: "Захоплення [target_location.GetNameWithNoTooltip]"
  flavor_chi.32.desc: "[target_location.GetRank.GetName] [target_location.GetName] нарешті потрапив до наших рук. Символ [ShowCultureName('mongolian_culture')] правління, захоплення цього [target_location.GetRank.GetNameWithNoTooltip] є монументальною перемогою для [ROOT.GetCountry.GetLongName], і це, можливо, останній поштовх, необхідний для того, щоб змусити наших ворогів сісти за стіл переговорів."
  flavor_chi.32.a: "Відтепер він буде відомий як Умиротворена Північ."
  flavor_chi.32.b: "Монументальна перемога для всіх нас."
  flavor_chi.33.title: "$NORTHERN_YUA$"
  flavor_chi.33.desc: "Останні десятиліття були важкими для [ROOT.GetCountry.GetFlavorRank]. Постійні повстання через [ShowSituationName('red_turban_rebellions')] та жахливий стан економіки довели нашу країну до руїни. Сьогодні мало хто насправді вважає нашу країну [GetInternationalOrganization('middle_kingdom').GetName], а наш залишковий стан був названий $NORTHERN_YUA$. Хоча, очевидно, [ROOT.GetCountry.GetLongName] ще не впала, вони можуть бути праві, що ми зараз переживаємо десятиліття приниження. Однак ми повернемося, і незабаром Небеса знову благословлять нас."
  flavor_chi.33.a: "Ми повернемося в належний час."
  NORTHERN_YUA: "Північна $YUA$"
  flavor_chi.34.title: "Піднесення [ShowCultureNameWithNoTooltip('oirat_culture')] Конфедерації"
  flavor_chi.34.desc: "Могутня конфедерація на чолі з [ShowCultureName('oirat_culture')] народом здобула значний вплив у західних частинах нашої країни, особливо навколо їхньої місцевої столиці [target_location.GetName]. Наш контроль настільки ослаб, що вони та їхні племінні союзники офіційно оголосили незалежність. Це загрожує цілісності нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_chi.34.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_chi.34.b: "Це повстання кличе нас."
  flavor_chi.36.title: "Втеча до [target_location.GetNameWithNoTooltip]"
  flavor_chi.36.desc: "З падінням [lost_capital.GetName] держава [ROOT.GetCountry.GetName] була справді принижена. Ми змушені відступити до [target_location.GetName], останньої подоби нашої гордості, або ховатися в страху в [current_capital.GetName]. Що б ми не обрали, ми повинні бути готові до ворожого наступу."
  flavor_chi.36.a: "Відкрийте ворота до [target_location.GetNameWithNoTooltip]!"
  flavor_chi.36.b: "Справді жахлива доля."
  flavor_chi.37.title: "Знищення [target.GetNameWithNoTooltip]"
  flavor_chi.37.desc: "Ми захопили [target.GetRank.GetName] [target.GetName], літню столицю [target_owner.GetLongName]. Було б звичаєм зруйнувати [target.GetRank.GetNameWithNoTooltip], щоб залякати ворога і змусити його швидше здатися. Зробивши це, ми також забезпечили б, що вони не повернуться найближчим часом."
  flavor_chi.37.a: "Зрівняти його з землею!"
  flavor_chi.37.b: "Пощадити поселення."
  flavor_chi.38.title: "Відступ до [target_location.GetNameWithNoTooltip]"
  flavor_chi.38.desc: "Жорстокий занепад [ROOT.GetCountry.GetLongName] триває. Здається, навіть у [current_capital.GetName] [ROOT.GetCountry.GetGovernment.GetRulerTitle] не в безпеці. З ворогами, що дихають нам у спину, можливо, було б доречно здійснити стратегічний відступ до стародавньої столиці [target_location.GetName]."
  flavor_chi.38.a: "Ми повернемося до [current_capital.GetNameWithNoTooltip]."
  flavor_chi.38.b: "Ми не можемо покинути свій пост."
  flavor_chi.39.title: "Доля [subject_country.GetNameWithNoTooltip]"
  flavor_chi.39.desc: "Наше падіння з милості призводить до того, що наш [chain_initiator.GetFlavorRank] втрачає свої залежності наліво й направо. Одна з них дуже скоро може стати [subject_country.GetLongName] під спільним контролем [chain_initiator.GetName] та [target_country.GetName]. Через втрату нами вирішальних портів та загальний хаос, що охопив нашу державу, ми не можемо керувати островом, не кажучи вже про придушення повстання, що зараз назріває. Можливо, найкраще було б просто передати його [target_country.GetLongName], що, своєю чергою, також покращить відносини між двома державами."
  flavor_chi.39.a: "Передати його [target_country.GetAdjectiveWithNoTooltip]."
  flavor_chi.39.b: "Ми будемо триматися за нього, попри проблеми."
  flavor_chi.40.title: "[chain_initiator.GetNameWithNoTooltip] поступається [subject_country.GetNameWithNoTooltip]"
  flavor_chi.40.desc: "[chain_initiator.GetLongName] занепадає, що ставить під сумнів наше спільне управління над [subject_country.GetName].\n\nВідповідно, нещодавні заворушення на острові нарешті переконали їх остаточно скоротити свої втрати та передати право власності на острів нам — законним власникам!"
  flavor_chi.40.a: "Як і очікувалося."
  flavor_chi.40.b: "Однак це не відповідає нашим планам."
  flavor_chi.41.title: "$peony_pavilion$"
  flavor_chi.41.desc: "Наша епоха породила багато академічних та мистецьких досягнень. Однією з наших найвищих почестей та найвиразніших проявів нашої культури є #italic Повернення душі в $peony_pavilion$#! від [target_character.GetArtistType.GetName] [target_character.GetName]. Сюжет обертається навколо історії кохання між Ду Лінян та Лю Менмей, чия рішучість долає всі перешкоди. Ця [ShowWorkOfArtTypeName('play')] закріпила за [target_character.GetShortNameWithNoTooltip] репутацію одного з найвидатніших драматургів [ROOT.GetCountry.GetName]."
  flavor_chi.41.a: "Чудово! Надзвичайно! Браво!"
  flavor_chi.42.title: "Відбудова $beijing_mosque$"
  flavor_chi.42.desc: "У [target_location.GetRank.GetName] [target_location.GetName] колись стояла велика будівля, $beijing_mosque$. Спочатку збудована в 996 році під час правління династії Ляо, вона пізніше була зруйнована навалою військ $genghis_khan_name$ у 1215 році. Відтоді залишки цієї колись величної [ShowWorkOfArtTypeName('monument')] стоять серед славетних будівель [target_location.GetNameWithNoTooltip]. Можливо, було б найдоречніше відновити її як знак дружби до [target_religion.GetAdjective] населення."
  flavor_chi.42.a: "Відбудувати її."
  flavor_chi.42.b: "Ми не можемо собі цього дозволити."
  flavor_chi.43.title: "Місія [target_character.GetNameWithNoTooltip] до $china$"
  flavor_chi.43.desc: "До нас дійшли повідомлення, що до наших берегів прибула дипломатична місія з далекої західної варварської нації [target_country.GetName], очолювана певним лордом, [target_character.GetName]. Кажуть, [target_character.GetSheHe] привіз [target_character.GetHerHim] дружні вітання від [target_character.GetHerHis] [target_country.GetGovernment.GetRulerTitle], ідеї для сприяння торгівлі між нашими націями та різні механічні дива."
  flavor_chi.43.a: "Відкинути пропозиції цих грубих західних дияволів!"
  flavor_chi.43.b: "Вітати цю місію."
  flavor_chi.44.title: "Євнухи [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_chi.44.desc: "Мало які інституції під час нашого правління мали такий великий вплив, як євнухи за спиною нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. На краще чи на гірше, ці елементи мають значний вплив і часом просувають власні плани, навіть переважаючи волю [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Багато радників у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] висловлюють свою огиду до цих практик і закликають нас приборкати вплив євнухів..."
  flavor_chi.44.a: "Ми не можемо ризикувати їхнім гнівом."
  flavor_chi.44.b: "Їхня влада має бути приборкана!"
  chi_how_to_strengthen_the_reform: "Вплив [ShowGovernmentReformName('empower_the_eunuchs')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] може бути збільшений за допомогою подальших [Concept('events', 'CONCEPT_PLACEHOLDER')|e], які надають [ShowModifierTypeName('eunuch_power')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_chi.45.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.45.desc: "Один з великих поетів нашої епохи, [target_character.GetName] є гордістю [target_character.GetHerHis] рідної провінції [target_province.GetName]. Відомий під багатьма псевдонімами, такими як Шен Ань, Бо Нань Шаньжень та Дянь Нань Шуші, [target_character.GetSheHe] є майстерним письменником та ліриком, вже створивши велику кількість творів, переважно на тему природи та культури. Деякі з [target_character.GetHerHis] творів вже досягли такої широкої популярності, що [target_character.GetHerHis] ім'я напевно буде навіки викарбувано на сторінках історії."
  flavor_chi.45.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.46.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.46.desc: "Загартований у боях генерал на ім'я [target_character.GetName] знову вшанував нас [target_character.GetHerHis] присутністю. [target_character.GetHerHis|U] батько подбав про те, щоб [target_character.GetSheHe] отримала таку ж освіту, як і [target_character.GetHerHis] брати, і [target_character.GetSheHe] добре обізнана в історії, класиці, бойових мистецтвах, стрільбі з лука та верховій їзді, маючи репутацію творця прекрасних і глибоких віршів. З огляду на [target_character.GetHerHis] нещодавню участь у військових справах, цілком очевидно, що [target_character.GetSheHe] чудово підійде."
  flavor_chi.46.a: "Нам потрібен [target_character.GetHerHim] у війську!"
  flavor_chi.46.b: "Нехай [target_character.GetHerHim] пише нам вірші."
  flavor_chi.46.c: "[target_character.GetSheHe|U] має служити в нашому [ROOT.GetCountry.GetGovernment.GetCabinetTitle]."
  flavor_chi.47.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.47.desc: "До нас дійшли чутки про надзвичайно цікаву та вражаючу особистість. [target_character.GetName] — талановитий [ShowArtistTypeName('scientist')] багатьох навичок, які [target_character.GetSheHe] набула протягом [target_character.GetHerHis] життя. З юних років [target_character.GetSheHe] виявляла здібності до швидкого навчання. Протягом [target_character.GetHerHis] дитинства [target_character.GetSheHe] отримала чудову освіту, переважно завдяки [target_character.GetHerHis] родині, і змогла зробити собі ім'я, кидаючи виклик багатьом соціальним нормам, присутнім у [ROOT.GetCountry.GetAdjective] суспільстві.\n\n[target_character.GetSheHe|U] чудово підійде до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_chi.47.a: "Нам потрібен [target_character.GetHerHim] при [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_chi.47.b: "Нас це не дуже цікавить."
  flavor_chi.48.title: "Стійкий захисник"
  flavor_chi.48.desc: "Справжнє диво сталося в одному з наших провінційних гарнізонів! Перед обличчям неминучого заколоту та повстання, [target_character.GetWomanMan] на ім'я [target_character.GetName] взяв на себе відповідальність за оборону місцевого гарнізону, успішно відбивши зрадників і здобувши [target_character.GetHerselfHimself] військову славу. Цей майстерний прояв військової доблесті запам'ятається на десятиліття вперед."
  flavor_chi.48.a: "[target_character.GetSheHe|U] належить підвищення."
  flavor_chi.48.b: "Багато таких випадків."
  flavor_chi.49.title: "Велика Наглядова Агенція [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_chi.49.desc: "Цензорат є високоефективною та впливовою гілкою нашого уряду. Під безпосереднім керівництвом [ROOT.GetCountry.GetGovernment.GetRulerTitle] його основна роль полягає в поширенні влади та пильності [ROOT.GetCountry.GetGovernment.GetRulerTitle] на всі гілки адміністрації, наданні детальних звітів про палацову поведінку різних бюрократів, викритті корупції та служінні сильним моральним компасом.\n\nНещодавно вдосконалені адміністративні можливості дозволили нам ще більше розширити вплив одного з аспектів обов'язків Цензорату, що ще більше забезпечує стабільну поведінку наших підданих."
  flavor_chi.49.a: "[ShowModifierWithNoTooltip('chi_palace_branch')] для забезпечення кодексу поведінки буде дуже корисним."
  flavor_chi.49.b: "[ShowModifierWithNoTooltip('chi_admonishment_branch')] для дотримання належних процедур відповідно до божественного закону."
  flavor_chi.49.c: "[ShowModifierWithNoTooltip('chi_touring_censors')] для встановлення порядку та спокою в нашому царстві."
  flavor_chi.49.d: "Ніхто не буде у фаворі."
  flavor_chi.50.title: "Східне та Західне Бюро"
  flavor_chi.50.desc: "Могутні [ROOT.GetCountry.GetGovernment.GetAdjective] органи завжди організовували та керували впливом і владою в палацових справах. Щоб задовольнити потребу залишатися пильними щодо внутрішніх загроз, багато наших радників запропонували створити такий [ROOT.GetCountry.GetGovernment.GetAdjective] орган, повністю присвячений управлінню палацовими інтригами та викоріненню [ROOT.GetCountry.GetGovernment.GetAdjective] корупції."
  flavor_chi.50.a: "Заснувати Західне Бюро."
  flavor_chi.50.b: "Створити Східне Бюро."
  flavor_chi.50.c: "Євнухам не потрібно більше влади!"
  flavor_chi.51.title: "$porcelain_tower$"
  flavor_chi.51.desc: "Очевидно, що [ROOT.GetCountry.GetName] вступає в нове століття процвітання. На знак початку нової епохи, нехай буде створено новий [ShowWorkOfArtTypeName('monument')], що відображатиме велич нинішньої Династії. Хоча ми могли б здійснити багато різних проєктів, улюбленою здається ідея масивної пагоди в серці [target_location.GetName], яка перевершила б усі інші та слугувала символом [target_location.GetRank.GetName]."
  flavor_chi.51.a: "Вкладімо в це наші кошти!"
  flavor_chi.51.b: "Ми просто не можемо собі цього дозволити."
  flavor_chi.52.title: "Будівництво $flavor_chi.51.title$ завершено!"
  flavor_chi.52.desc: "Будівництво величної пагоди в серці [target_location.GetName] нарешті завершено. Збудована з найтоншої [ShowGoodsName('porcelain')], яку [ROOT.GetCountry.GetName] змогло зібрати, вона височіє над гамірними вулицями [target_location.GetRank.GetName] і слугує центральною пам'яткою. Хоча вона вже чудова, її справжня краса розкривається лише тоді, коли сонячні промені падають на вежу, створюючи приголомшливий ефект, який вразить навіть найхолодніші серця."
  flavor_chi.52.a: "Воістину чудово!"
  flavor_chi.53.title: "[ShowBuildingTypeNameWithNoTooltip('forbidden_city')]"
  flavor_chi.53.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ROOT.GetCountry.GetGovernment.GetRulerTitle] потребують нового палацу для управління справами [ROOT.GetCountry.GetFlavorRank]. Після довгих обговорень, [target_location.GetName] було обрано для розміщення нового палацу, оскільки його визнали найбільш придатним місцем для північної столиці та нового осідку влади.\n\nТаким чином, [target_character.GetName] доручив [target_character.GetHerHis] міністрам та архітекторам спроєктувати новий палац, який мав бути розташований там. Після місяців невпинної праці їхня робота нарешті завершена, і результатом є план [ShowBuildingTypeName('forbidden_city')] – масивного комплексу, що містить сотні будівель та вміщує тисячі міністрів і слуг."
  flavor_chi.53.a: "Нехай його збудують негайно!"
  flavor_chi.53.b: "Якби ми могли виділити золото, ми б це зробили."
  flavor_chi.54.title: "$flavor_chi.53.title$ Built"
  flavor_chi.54.desc: "Будівництво величного [ShowBuildingTypeName('forbidden_city')] нарешті завершено. Комплекс тепер готовий для переїзду [ROOT.GetCountry.GetGovernment.GetRulerTitle], і безсумнівно, що палац, принаймні, слугуватиме зимовою резиденцією для монархів. Однак, безсумнівним є те, що [target_location.GetRank.GetName] [target_location.GetName] стало набагато важливішим для нашої держави."
  flavor_chi.54.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] більш ніж задоволений."
  flavor_chi.54.b: "Важливіші справи залишаються в [current_capital.GetNameWithNoTooltip]."
  flavor_chi.55.title: "Юань Ши"
  flavor_chi.55.desc: "Звичаєм для кожної наступної [ShowCultureGroupName('chinese_group')] Династії є складання історії попередньої та додавання її до збірки офіційних літописів. Настав час зробити те саме для попередньої [GetCountry('YUA').GetName]. На щастя, [target_character.GetName] зацікавлений у цьому, але потребує додаткових коштів, щоб втілити це в життя."
  flavor_chi.55.a: "Ми можемо виділити кошти."
  flavor_chi.55.b: "Тоді скасуймо проєкт."
  flavor_chi.56.title: "Цзусюнь Лу"
  flavor_chi.56.desc: "[target_character.GetName|U] є мудрим правителем з великим баченням для [ROOT.GetCountry.GetLongName]. Однак, після [target_character.GetHerHis] неминучої смерті, [target_character.GetHeShe] не має гарантії, що [target_character.GetHerHis] нащадки будуть такими ж обізнаними, як [target_character.GetHerHim].\n\nТому [target_character.GetShortNameWithNoTooltip] планує скласти перелік рекомендацій для [target_character.GetHerHis] спадкоємців, щоб [ROOT.GetCountry.GetNameWithNoTooltip] не спіткала та ж доля, що й інші династії."
  flavor_chi.56.a: "Присвятити максимум зусиль питанням легізму."
  flavor_chi.56.b: "Скласти перелік націй, які не слід завойовувати."
  flavor_chi.56.c: "Попередити їх про зрадників зсередини."
  flavor_chi.56.d: "Надати допомогу у громадських роботах."
  flavor_chi.56.e: "Навчити їх писати закони."
  flavor_chi.56.f: "Нам це не потрібно."
  chi_subsequent_rulers: "Наступні правителі [ROOT.GetCountry.GetName] зможуть обрати, чи дотримуватися цієї рекомендації протягом свого життя. Вони також завжди можуть відмовитися."
  flavor_chi.57.title: "Налаштування [ShowLawNameWithNoTooltip('keju_examination')]"
  flavor_chi.57.desc: "Військовий інтерес [target_character.GetName|U] не є секретом для більшої частини [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetSheHe|U] бажає перетворити [ROOT.GetCountry.GetFlavorRank] на масивну військову державу, назавжди поклавши край будь-яким страхам іноземного вторгнення на наші території, а також зміцнивши [target_character.GetHerHis] владу.\n\nОсь чому [ROOT.GetCountry.GetGovernment.GetRulerTitle] планує додати багато військових предметів до [ShowLawName('keju_examination')], сподіваючись виховати нове покоління більш військово-орієнтованих бюрократів. Серед предметів є стрільба з лука, верхова їзда, а також більш звичні математика, каліграфія та право."
  flavor_chi.57.a: "Додати предмети."
  flavor_chi.57.b: "Немає потреби в змінах."
  flavor_chi.58.title: "100 слів панегірика"
  flavor_chi.58.desc: "Протягом правління [Concept('target_character.GetName] [target_character.GetSheHe] взаємодіяв з багатьма [target_religion.GetAdjective] [religion', 'CONCEPT_PLACEHOLDER')|e] підданими, явно виявляючи прихильність до їхніх традицій. Щоб відсвяткувати та закріпити цю своєрідну дружбу, [target_character.GetHeShe] бажає написати офіційний панегірик, вихваляючи релігію та пророка Мухаммада."
  flavor_chi.58.a: "Написати панегірик."
  flavor_chi.58.b: "Чому це має бути зроблено?"
  flavor_chi.58.c: "Справді захоплива релігія!"
  chi_every_sunni_pop_gains_10_satisfaction: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] [Concept('target_religion.GetAdjective] [religion', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  chi_every_sunni_country_gets_bias: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] [Concept('target_religion.GetAdjective] [religion', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowBiasValue('chi_praised_islam')] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [ROOT.GetCountry.GetName]."
  flavor_chi.59.title: "Доля [ShowLawNameWithNoTooltip('keju_examination')]"
  flavor_chi.59.desc: "Багато представників [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] скаржаться на наш [ShowLawName('keju_examination')], посилаючись на його нещодавню неефективність. Вони закликають повністю ігнорувати іспити, пропонуючи, щоб призначення на державні посади здійснювалися за особистою рекомендацією, що, безумовно, підійшло б синам аристократії, яка має зв'язки."
  flavor_chi.59.a: "Дотримуватися їхньої поради."
  flavor_chi.59.b: "Ми не можемо цього зробити."
  flavor_chi.60.title: "Дотримуючись Рекомендацій"
  flavor_chi.60.desc: "Один із предків [new_ruler.GetName], [ROOT.GetVariable('chi_ancestor').GetCharacter.GetName], колись написав набір вичерпних рекомендацій для будь-якого майбутнього [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Ці правила були зібрані в книзі під назвою $flavor_chi.56.title$, яка містить перелік країн, які не слід вторгатися, а також тринадцять розділів, присвячених багатьом аспектам державного управління. Чи повинен [new_ruler.GetShortNameWithNoTooltip] прислухатися до цих попереджень та пропозицій?"
  flavor_chi.60.a: "Прочитати книгу."
  flavor_chi.60.b: "Ба, [new_ruler.GetNameWithNoTooltip] знає краще!"
  flavor_chi.61.title: "Привратники"
  flavor_chi.61.desc: "З моменту посилення євнухів ця могутня фракція в [ROOT.GetCountry.GetGovernment.GetCourtTitle] здобула значний вплив в уряді. Щоразу, коли звернення подається до [ROOT.GetCountry.GetGovernment.GetRulerTitle], воно має пройти через євнухів, які обов'язково не допустять до розмови з [ROOT.GetCountry.GetGovernment.GetRulerTitle] будь-кого, хто хоч трохи проти них. У всьому цьому Божественний Імператор нічого не підозрює."
  flavor_chi.61.a: "Сподіваємося, це не призведе до більших надмірностей."
  flavor_chi.62.title: "Вихований євнухами"
  flavor_chi.62.desc: "Юний [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_character.GetName], мав нещастя зійти на престол [ROOT.GetCountry.GetName] значно раніше, ніж було задумано. Оскільки [target_regent.GetName] не зміг стримати владу палацових євнухів, [target_character.GetNameWithNoTooltip] потрапив під їхній вплив, ставши маріонеткою цієї могутньої фракції."
  flavor_chi.62.a: "Ось так імперії і гинуть."
  flavor_chi.63.title: "Ворожий міністр"
  flavor_chi.63.desc: "Кліка палацових євнухів висунула пропозицію ув'язнити певного міністра, [target_character.GetName], за звинуваченням у державній зраді. Це не дивно, оскільки в дні, що передували цій події, міністр, про якого йдеться, відкрито виступав проти наймогутніших євнухів, явно викликаючи їхній гнів. Однак цей запит може ґрунтуватися не лише на зарозумілості, і його слід ретельно переглянути."
  flavor_chi.63.a: "Євнухи завжди праві."
  flavor_chi.63.b: "Чиніть опір цьому їхньому надмірності!"
  flavor_chi.63.c: "Відповідальних євнухів слід висікти!"
  flavor_chi.64.title: "Слуги для [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_chi.64.desc: "Євнухи справді найцінніші слуги. Менш вправним можна доручити прості завдання, що вимагають ручної праці, такі як садівництво та кулінарія, тоді як вищі ешелони можуть виконувати різноманітні урядові обов'язки. Протягом усього цього ми можемо бути впевнені, що вони не намагатимуться захопити владу, щоб заснувати власну династію."
  flavor_chi.64.a: "Придбайте більше євнухів."
  flavor_chi.64.b: "Їх і так достатньо!"
  flavor_chi.65.title: "Добровільна кастрація"
  flavor_chi.65.desc: "Багато звичайних громадян [target_location.GetName] із заздрістю та ревнощами дивляться на життя палацових євнухів. Чудові умови життя, близькість до [ROOT.GetCountry.GetGovernment.GetRulerTitle] та багато можливостей у житті – це лише кілька переваг, які вони мають над звичайними громадянами. Життя євнуха здається настільки багатообіцяючим, що багато бідніших мешканців [target_location.GetNameWithNoTooltip] добровільно каструють себе, щоб вступити на палацову службу до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_chi.65.a: "Чим більше євнухів, тим краще."
  flavor_chi.65.b: "Чоловіки не повинні йти на такі крайнощі."
  flavor_chi.66.title: "Прийняття влади"
  flavor_chi.66.desc: "Сьогодні одного з високопоставлених євнухів помітили, як він розмовляв з провідним міністром [ShowGovernmentReformName('three_departments_system')]. Зазвичай міністр розмовляв би з [ROOT.GetCountry.GetGovernment.GetRulerTitle], але в цьому сценарії саме євнух-секретар приймав посланця та приймав вирішальне рішення. Це спонукало [target_character.GetName] поставити життєво важливе питання: чи не отримали палацові євнухи занадто багато прав і привілеїв?"
  flavor_chi.66.a: "Можливо, деякі накази потрібно скасувати."
  flavor_chi.66.b: "Чим менше роботи у [target_character.GetNameWithNoTooltip], тим краще."
  flavor_chi.67.title: "Урядові чистки в [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_chi.67.desc: "Цикл життя і смерті справедливий для всього, включаючи бюрократію. Занадто довго елементи нашого уряду користувалися прихильністю та багатством [ROOT.GetCountry.GetGovernment.GetRulerTitle], збагачуючись і поширюючи свою корупцію на все, до чого вони торкалися. Нам краще обмежити та придушити цих недобросовісних бюрократів, щоб їхній вплив не став занадто великим!"
  flavor_chi.67.a: "Євнухи повинні знати своє місце!"
  flavor_chi.67.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_chi.68.title: "Прохання про звільнення"
  flavor_chi.68.desc: "На початку сьогоднішньої сесії в [ROOT.GetCountry.GetGovernment.GetCourtTitle] низка високопоставлених урядовців, багато з яких самі є євнухами, звернулися до [target_character.GetName] з проханням звільнити впливового євнуха, [eunuch.GetName], з [eunuch.GetHerHis] посади в уряді, посилаючись на надмірності, корупцію та зловживання владою як основні причини. Однак міністр, про якого йдеться, також відповідає за багато важливих функцій в уряді, що робить [eunuch.GetHerHis] звільнення політично ризикованим."
  flavor_chi.68.a: "Вони нічого не знають!"
  flavor_chi.68.b: "Можливо, вони мають рацію."
  flavor_chi.69.title: "Євнух без обмежень"
  flavor_chi.69.desc: "Очевидно, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] мало що робить для фактичного управління державою. Не те щоб [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] міг, оскільки майже все правління централізовано під жорстким контролем Ради євнухів, повністю керованої одним могутнім лідером. Це цілком може бути рецептом катастрофи."
  flavor_chi.69.a: "Не турбує, зовсім ні..."
  flavor_chi.70.title: "Змова про вбивство"
  flavor_chi.70.desc: "Ми дізналися про змову ліги видатних євнухів на чолі з [eunuch.GetName], провідною фігурою в уряді. Вони планують вбити відвертого критика. Було б доречно затримати та ув'язнити їх, але це також може викликати обурення серед євнухів-еліт. Що слід зробити, щоб врятувати життя [murder_target.GetName]?"
  flavor_chi.70.a: "Закрити очі."
  flavor_chi.70.b: "Ув'язнити євнуха!"
  flavor_chi.71.title: "Морська заборона"
  flavor_chi.71.desc: "Наразі наші узбережжя страждають від розгулу піратства та нестабільності, що завдає багато шкоди нашим прибережним провінціям. Щоб приборкати проблему піратства, ми вирішили запровадити політику [ShowPolicyName('haijin_policy')], заборону на всю морську торгівлю поза офіційною Системою данини. Завдяки цьому ми систематично викорінимо всю незаконну діяльність, що здійснюється на нашому узбережжі."
  flavor_chi.71.a: "Запровадити морську заборону."
  flavor_chi.71.b: "Це може мати катастрофічні наслідки."
  flavor_chi.72.title: "Реформування армії"
  flavor_chi.72.desc: "Наша армія ідентична тій, яку ми так багато разів перемагали під час [ShowSituationName('red_turban_rebellions')]. Таким чином, ми успадкували багато непотрібних інститутів, що походять від кочових коренів [GetCountry('YUA').GetName]. Тому було б доцільно реформувати армію в систему, яка б більше відповідала нашим сучасним потребам. Наші сили будуть згруповані в гвардію та батальйони, кожен з яких складатиметься з 5600 та 1120 чоловік відповідно. Наші солдати також будуть змушені керувати власними фермами, щоб зменшити навантаження на нашу логістику в мирний час."
  flavor_chi.72.a: "Продовжувати реформи."
  flavor_chi.72.b: "Ми не можемо дозволити собі зміни прямо зараз."
  flavor_chi.73.title: "Великі проголошення"
  flavor_chi.73.desc: "[target_character.GetName|U] стверджує, що падіння попередньої династії було повністю спричинене корупцією та надмірними повноваженнями урядових міністрів. У цьому ключі [target_character.GetHeShe] стверджує, що слід запровадити більш суворий та легалістичний правовий кодекс, щоб запобігти [ROOT.GetCountry.GetName] від страждань тієї ж долі."
  flavor_chi.73.a: "Ударити по корупції."
  flavor_chi.73.b: "Корупція? У нашому уряді? Неможливо."
  chi_ming_dynasty_code_will_be_changed: "[ShowPolicyName('chi_ming_dynasty_code_policy')] буде змінено, щоб включити модифікатори [ShowModifier('chi_grand_pronouncements')]."
  integrated_grand_prounouncements: "Інтегровано [ShowModifier('chi_grand_pronouncements')] у [ShowPolicyName('chi_ming_dynasty_code_policy')]."
  flavor_chi.74.title: "Укладання нового правового кодексу"
  flavor_chi.74.desc: "Протягом останніх кількох років наші бюрократи невтомно працювали над створенням нового зведення законів та постанов. Його багато разів переглядали, але нещодавнє оновлення принесло безпрецедентну кількість змін. Можливо, настав час остаточно доопрацювати [ShowPolicyName('chi_ming_dynasty_code_policy')] та прийняти його як наш [ShowLawName('legal_code_law')]."
  flavor_chi.74.a: "Негайно оприлюднити його!"
  flavor_chi.74.b: "Йому все ще потрібні деякі доопрацювання."
  flavor_chi.75.title: "Змова [target_character.GetNameWithNoTooltip]?"
  flavor_chi.75.desc: "До [ruler_scope.GetName] дійшли чутки про нібито змову, очолювану не ким іншим, як [target_character.GetName], лідером Великої Канцелярії, наглядачем та контролером [ShowGovernmentReformName('three_departments_system')]. За словами інформатора, [target_character.GetShortNameWithNoTooltip] планує повалити [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Хоча в історії є кілька невідповідностей, вся ця справа здається досить переконливою, і зменшення влади канцелярії може бути корисним для нас."
  flavor_chi.75.a: "Стратити [target_character.GetHerHim] і розпустити Велику Канцелярію!"
  flavor_chi.75.b: "Нехай бюрократи Академії Ханьлінь служать у Секретаріаті."
  flavor_chi.75.c: "Лише чутки."
  flavor_chi.76.title: "Велика Лешу"
  flavor_chi.76.desc: "[target_character.GetName|U] є набагато більше, ніж просто здібним [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [target_character.GetDaughterSon|U] Небес, адже [target_character.GetSheHe] також є пристрасним вченим. Таким чином, створення великої енциклопедії #italic Лешу#! завжди було частиною грандіозних амбіцій [target_character.GetHerHis]. Тепер, коли [target_character.GetShortNameWithNoTooltip] керує [ROOT.GetCountry.GetName], можливо, настав час втілити це в реальність?"
  flavor_chi.76.a: "Негайно замовити її!"
  flavor_chi.76.b: "Ми не можемо собі цього дозволити."
  flavor_chi.77.title: "Компіляція завершена"
  flavor_chi.77.desc: "Після років наполегливої праці дітище [target_character.GetName] нарешті завершено. Велика [ShowModifier('chi_grand_encyclopedia')], над якою працювали тисячі вчених, складається з понад десяти тисяч томів і містить інформацію про багато творів, не лише сучасних, а й тих, що сягають класичних часів. Це величезне досягнення, і воно назавжди сяятиме як частина багатої спадщини [target_character.GetShortNameWithNoTooltip]."
  flavor_chi.77.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.78.title: "Закон про єдиний батіг"
  flavor_chi.78.desc: "У нинішньому вигляді фіскальна система [ROOT.GetCountry.GetLongName] є безладом з багатьох різних податкових режимів, що примусово співіснують один з одним. Це породжує багато неефективностей, які є серйозними перешкодами у використанні нашої податкової бази. Щоб боротися з цим, була запропонована ідея [ShowGovernmentReformName('single_whip_law')], згідно з якою всі суб'єкти в межах нашого [ROOT.GetCountry.GetFlavorRank] були б зобов'язані платити центральному уряду [ShowGoodsName('silver')]. Однак ми не маємо достатньо монет, щоб наше населення могло виконати ці вимоги."
  flavor_chi.78.a: "Все одно запровадити реформу!"
  flavor_chi.78.b: "Чи маємо ми взагалі достатньо [ShowGoodsNameWithNoTooltip('silver')]?"
  flavor_chi.79.title: "Внутрішня школа"
  flavor_chi.79.desc: "[ShowGovernmentReformName('empower_the_eunuchs')] призвело до значного збільшення кількості палацових євнухів у [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Однак більшість з них неписьменні і тому нездатні служити в провінційних департаментах, не кажучи вже про високопоставлених міністрів. Можливо, було б розумно створити установу, щоб навчати їх прямо в серці [ROOT.GetCountry.GetLongName]."
  flavor_chi.79.a: "Продовжувати з ідеєю."
  flavor_chi.79.b: "Краще, щоб вони залишалися неписьменними."
  flavor_chi.80.title: "Експедиція до [ShowRegionNameWithNoTooltip('manchuria_region')]"
  flavor_chi.80.desc: "Величезні землі [ShowRegionName('manchuria_region')] все ще так само малонаселені, як і раніше, з багатьма варварськими племенами, які ніколи навіть не чули про славетну [ROOT.GetCountry.GetLongName]. Можливо, було б краще очолити експедицію вниз по річці Амур, щоб переконати місцевих вождів стати частиною нашої [ShowSubjectTypeName('tributary')] системи. Один з наших генералів, [target_character.GetName], зголосився це зробити."
  flavor_chi.80.a: "[target_character.GetSheHe|U] має нашу печатку схвалення."
  flavor_chi.80.b: "Наші ресурси краще витратити деінде."
  flavor_chi.81.title: "Візит [expedition_country.GetAdjectiveWithNoTooltip] експедиції"
  flavor_chi.81.desc: "Експедиція на чолі з певним [target_character.GetName] прибула на наші [ROOT.GetCountry.GetGovernment.GetAdjective] території, шукаючи аудієнції у [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Ми маємо підстави вважати, що вони прагнуть зробити з нас [ShowSubjectTypeName('tributary')]! Чи варто нам прислухатися до їхніх пропозицій?"
  flavor_chi.81.a: "[expedition_country.GetLongNameWithNoTooltip]? Ми зробимо це!"
  flavor_chi.81.b: "Нас не підкорити!"
  flavor_chi.82.title: "Нурґанська військова комісія"
  flavor_chi.82.desc: "Наша експедиція нарешті дісталася до гирла річки Амур, у місцевість, відому як [target_location.GetName]. Вони подружилися з місцевим вождем і тепер шукають нашої грошової та військової допомоги у збереженні лояльності підкорених племінних лідерів."
  flavor_chi.82.a: "Фінансувати комісію."
  flavor_chi.82.b: "Їхня робота виконана."
  flavor_chi.83.title: "Білий Лотос у [target_province.GetNameWithNoTooltip]!"
  flavor_chi.83.desc: "Місцевий член Білого Лотоса, дисидент на ім'я [target_character.GetName], почав розпалювати заворушення зі свого дому в [target_location.GetName]. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] з [target_province.GetName] були обмануті, повіривши в [target_character.GetHerHis] міленаристську брехню, яка обіцяє добро тим, хто вирішить слідувати за [target_character.GetHerHim].\n\nНам потрібно зіткнутися з реальністю, що може назрівати нове повстання."
  flavor_chi.83.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  white_lotus_rebellion: "Повстання Білого Лотоса"
  flavor_chi.83.tooltip: "Кожен [ShowPopTypeName('peasants')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [Concept('target_province.GetName] [province', 'CONCEPT_PLACEHOLDER')|e] змінить вірність на [Concept('target_rebel.GetName] і матиме свою [pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] зменшену на [ROOT.ScriptValue('pop_satisfaction_mild_penalty')|%=+].\nКожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [Concept('target_province.GetName] [province', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowModifier('chi_white_lotus_agitation')] [Concept('location_modifier', 'CONCEPT_PLACEHOLDER')|e] на [SCOPE.GetLocalVariable('length_of_agitation').GetValue|2-] років."
  flavor_chi.84.title: "Вісім Тигрів"
  flavor_chi.84.desc: "Євнухські кола часом накопичували значний вплив як у зовнішніх, так і у внутрішніх справах. Однак нещодавно палацом поширилися повідомлення про групу з 8 видатних євнухів, чия влада, як кажуть, конкурує з владою самого [ruler_scope.GetName] [ruler_scope.GetHerselfHimself]! Називаючись «Вісім Тигрів», ці олігархи прагнуть контролювати [ROOT.GetCountry.GetGovernment.GetCourtTitle] і розгромити всі опозиційні фракції в межах [ROOT.GetCountry.GetFlavorRank].\n\nЇхнім лідером вважається видатний персонаж на ім'я [target_character.GetName], євнух, чий вплив у політиці приніс [target_character.GetHerHim] прізвисько, що натякає на те, що [target_character.GetSheHe] є справжнім монархом."
  flavor_chi.84.a: "Припиніть свою незаконну поведінку в ім'я [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  flavor_chi.84.b: "Дозволити їм автономію, яку вони вимагають."
  flavor_chi.84.historical_info: "Під час династії Мін, особливо за імператора Чженде, група впливових євнухів, відомих як Вісім Тигрів, здобула величезну владу при дворі. Очолювані Лю Цзінем, вони контролювали імперський доступ, маніпулювали адміністрацією та збагачувалися через корупцію та залякування. Їхнє панування викликало глибоке обурення серед вчених-чиновників і сприяло нестабільності в уряді. У 1510 році Лю Цзінь був звинувачений у державній зраді та страчений, що призвело до падіння групи. Вісім Тигрів стали символом небезпеки неконтрольованої влади євнухів у пізній політиці Мін."
  flavor_chi.85.title: "Контрабандисти [ShowGoodsNameWithNoTooltip('salt')|U]"
  flavor_chi.85.desc: "У [target_province.GetName] з'явилася нова фракція контрабандистів [ShowGoodsName('salt')]. Хоча для багатьох це може здатися дрібницею, статус [ShowGoodsNameWithNoTooltip('salt')] промисловості є для нас справою великої важливості, і вона становить одну з «семи життєвих потреб» згідно з одним із наших прислів'їв. Для злочинців обходити наші формальні правила та [ROOT.GetCountry.GetGovernment.GetAdjective] [ShowGoodsNameWithNoTooltip('salt')] режим є не просто образою, а справжньою загрозою нашим інтересам та доходам."
  flavor_chi.85.a: "Вирішити це рішуче!"
  flavor_chi.85.b: "Нехай місцевий уряд розбереться з цим."
  flavor_chi.85.c: "Не наша проблема."
