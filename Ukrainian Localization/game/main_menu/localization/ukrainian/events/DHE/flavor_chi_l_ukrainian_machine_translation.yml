  flavor_chi.92.title: "POSTEDIT_FAILED_TRANSLATION"
  flavor_chi.92.desc: "POSTEDIT_FAILED_TRANSLATION"
  flavor_chi.92.historical_info: "Як один із чотирьох літературних шедеврів Китаю, роман «Сон у червоному теремі», також відомий як «Історія каменю», розповідає історію Цзя Баоюя, божественного нефриту зі Стіни Небес, який бажає зрозуміти, що означає бути людиною. Він простежує життя двох гілок клану Цзя, що проживають у столиці. Через політичні потрясіння більшість членів родини зрештою відправляють, видають заміж або помирають без спадкоємця."
  flavor_chi.92.a: "Профінансуймо завершення цього роману."
  flavor_chi.92.b: "Дозволимо [target_character.GetNameWithNoTooltip] написати його [target_character.GetHerHis] самотужки."
  flavor_chi_four_masters_of_yuan_historical_info: "Чотири майстри династії Юань багатьма вважаються головними представниками стилю живопису літераторів. Бажаючи наслідувати роботи стародавніх китайських майстрів, вони здобули репутацію в Юань, що заохотило багатьох інших художників експериментувати з новими техніками мазка."
  flavor_chi.93.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.93.desc: "Хоча золотий вік [ROOT.GetCountry.GetAdjective] культури минув, художники продовжують поширювати стиль живопису літераторів. Одним із найвидатніших є [target_character.GetName]. Народжений під час династії Сун, [target_character.GetSheHe] є побожним послідовником [ShowPolicyName('daoism_policy')], що протистоїть нашому правлінню, проте [target_character.GetHerHis] художні таланти, як кажуть, конкурують з талантами стародавніх майстрів завдяки [target_character.GetHerHis] створенню численних картин тушшю. Відкинути такий талант було б ганьбою, хоча його прийняття може обмежити наш [ROOT.GetCountry.GetCulture.GetName] вплив на $china$."
  flavor_chi.93.a: "Запросімо [target_character.GetHerHim] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_chi.93.b: "Натомість забезпечимо зростання $china$."
  flavor_chi.93.historical_info: "$flavor_chi_four_masters_of_yuan_historical_info$"
  flavor_chi.94.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.94.desc: "Намагаючись розширити охоплення живопису літераторів, [ROOT.GetCountry.GetGovernment.GetCourtTitle] знайшов [target_character.GetName], майстра пейзажного мистецтва. Хоча [target_character.GetSheHe] здобув освіту у філософії та бойових мистецтвах, [target_character.GetSheHe] обрав простіше життя художника, навчаючись у друзів і зрештою перевершивши їх у майстерності. Тепер, будучи у фаворі при [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetSheHe] має можливість малювати для найшанованіших осіб у всьому $china$."
  flavor_chi.94.a: "Ми дозволимо [target_character.GetHerHim] у [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_chi.94.b: "[target_character.GetSheHe|U] житиме подалі від [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_chi.94.historical_info: "$flavor_chi_four_masters_of_yuan_historical_info$"
  flavor_chi.95.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.95.desc: "Хоча колишні династії $china$ впали, і ми тепер домінуємо в регіоні, їхня культурна спадщина живе в мові, мистецтві та цінностях у кожному селі та місті. Після нашого успішного завоювання династії Сун багато художників-традиціоналістів залишилися. Одним із таких художників є [target_character.GetName], який тепер подорожує південним $china$ у пошуках натхнення. Ми повинні вирішити, чи дозволити таким художникам процвітати в межах нашого [ROOT.GetCountry.GetFlavorRank], чи зміцнити наші [ROOT.GetCountry.GetCulture.GetName] цінності."
  flavor_chi.95.a: "Дозволимо [target_character.GetNameWithNoTooltip] поширювати [target_character.GetHerHis] мистецтво."
  flavor_chi.95.b: "[target_character.GetSheHe|U] не слідуватиме шляхам минулого."
  flavor_chi.95.historical_info: "$flavor_chi_four_masters_of_yuan_historical_info$"
  flavor_chi.96.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.96.desc: "Незважаючи на нещодавній крах династії Сун, її культурна спадщина зберігається в $china$. Серед її залишків є [target_character.GetName], досвідчений художник у стилі літераторів. Вже будучи творцем кількох шедеврів, [target_character.GetSheHe] продовжує підтримувати місцеві традиції, відхиляючись від наших [ROOT.GetCountry.GetCulture.GetName] звичаїв. Ми можемо вибрати повільне прийняття звичаїв народу, догоджаючи [target_character.GetNameWithNoTooltip] і забезпечуючи [target_character.GetHerHis] лояльність, або ми можемо залишатися непохитними у своїх традиціях."
  flavor_chi.96.a: "Виконаємо [target_character.GetHerHis] вимоги."
  flavor_chi.96.b: "Якщо [target_character.GetSheHe] хоче зруйнувати нашу [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] спадщину, [target_character.GetSheHe] доведеться робити це самотужки."
  flavor_chi.96.historical_info: "$flavor_chi_four_masters_of_yuan_historical_info$"
  flavor_chi_masters_of_the_ming_historical_info: "З перенесенням столиці Мін з Нанкіна до Пекіна багато придворних художників також переїхали туди. Лише деякі, хто цього не зробив, були майстрами школи У зі старої столиці. Будучи протилежністю школи Чже, вона переважно складалася з художників-аматорів, літераторів та численних вчених, для яких вона служила способом самовираження, на відміну від їхніх консервативних колег, які зосереджувалися на більш академічному стилі."
  flavor_chi.97.title: "Народження [ShowCultureNameWithNoTooltip('wu_culture')] школи"
  flavor_chi.97.desc: "Коли $china$ звільнилася від $YUA_ADJ$ панування, багато митців потягнулися до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Однак група з них бажає прокласти власний шлях. Замість того, щоб служити в столиці, вони планують створити колектив: [ShowCultureName('wu_culture')] школу. Очолюваний [target_character.GetName], цей рух наголошує на особистому вираженні, а не на декоративному мистецтві."
  flavor_chi.97.a: "Цим митцям краще бути в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_chi.97.b: "Вони можуть мати власну групу."
  flavor_chi.97.historical_info: "$flavor_chi_masters_of_the_ming_historical_info$"
  flavor_chi.98.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.98.desc: "Оскільки [ShowCultureName('wu_culture')] школа набирає популярності в [ROOT.GetCountry.GetName], з'явилася нова хвиля митців. Серед них [target_character.GetName], далекий родич державного діяча Вень Тяньсяна, який чинив опір впливу [GetCharacter('kublai_khan').GetName]. Хоча [target_character.GetHerHis|U] родина служила в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] війську, [target_character.GetSheHe] тепер прагне надихати інших художників-аматорів стилем [target_character.GetHerHis] школи."
  flavor_chi.98.a: "Приведемо [target_character.GetNameWithNoTooltip] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_chi.98.b: "[target_character.GetSheHe|U] не матиме нашої підтримки."
  flavor_chi.98.historical_info: "$flavor_chi_masters_of_the_ming_historical_info$"
  flavor_chi.99.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.99.desc: "Зростаючий вплив [ShowCultureName('wu_culture')] школи привернув до її орбіти багатьох [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]. Одним із таких членів є [target_character.GetName], колись збіднілий художник, який тепер користується заступництвом еліти завдяки [target_character.GetHerHis] неабиякому таланту. Отримавши великий прибуток від [target_character.GetHerHis] роботи, [target_character.GetSheHe] тепер впевнено розвиває самобутній стиль. [ROOT.GetCountry.GetGovernment.GetCourtTitle] прагне найняти [target_character.GetHerHim], демонструючи [target_character.GetHerHis] унікальність світові."
  flavor_chi.99.a: "Ми дозволимо впливу [ShowCultureNameWithNoTooltip('wu_culture')] школи досягти нашого [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_chi.99.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] не буде під впливом звичаїв [ShowLocationNameWithNoTooltip('wuxian')]."
  flavor_chi.99.historical_info: "$flavor_chi_masters_of_the_ming_historical_info$"
  flavor_chi.100.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.100.desc: "[target_character.GetName] здобув популярність як один із найвидатніших художників у [ROOT.GetCountry.GetName]. Хоча [target_character.GetSheHe] народився в [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] і підтримувався лише кількома покровителями, [target_character.GetHerHis] здатність відтворювати різні художні стилі принесла [target_character.GetHerHim] повагу. [target_character.GetSheHe] навіть приєднався до [ShowCultureName('wu_culture')] школи, щоб далі вдосконалювати [target_character.GetHerHis] майстерність. Можливо, [target_character.GetNameWithNoTooltip] належить до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], навіть якщо це посилить культурний вплив [ShowLocationName('wuxian')]."
  flavor_chi.100.a: "Приведемо [target_character.GetNameWithNoTooltip] служити нам."
  flavor_chi.100.b: "[target_character.GetSheHe|U] не дозволено в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_chi.100.historical_info: "$flavor_chi_masters_of_the_ming_historical_info$"
  flavor_chi_six_masters_of_the_qing: "У ранній період Цін група з шести майстрів піднялася в ранзі як одні з найкращих художників у всьому Китаї, це були квітковий художник Юнь Шоупін, єзуїтський пейзажист У Лі, а також четверо Ван. Порівняно зі своїми минулими колегами, вони були досить консервативними у своїх художніх методах, обираючи слідувати вченням Дун Цічана."
  flavor_chi.101.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.101.desc: "Хоча [ShowCultureName('wu_culture')] школа продовжує поширюватися, деякі [ROOT.GetCountry.GetAdjective] чиновники стурбовані сміливими ідеями її художників. Однією з найбільш суперечливих фігур є [target_character.GetName], який вважає, що живопис повинен виражати моральний характер людини. Хоча багато хто відкидає [target_character.GetSheHe] як радикала, [target_character.GetSheHe] захопив захоплення молоді. За належної підтримки [target_character.GetHerHis] рух міг би процвітати, але якою ціною?"
  flavor_chi.101.a: "[ROOT.GetCountry.GetNameWithNoTooltip] потребує [target_character.GetHerHim]."
  flavor_chi.101.b: "Ми вирішимо слідувати іншим художнім школам."
  flavor_chi.101.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.102.title: "Західні Вчення"
  flavor_chi.102.desc: "Завдяки зусиллям [target_character.GetName], [ShowCultureName('wu_culture')] школа стала одним з найпрестижніших мистецьких рухів у $china$. Колись аутсайдер, [target_character.GetSheHe] тепер сидить на вершині [ROOT.GetCountry.GetAdjectiveWithNoTooltip] культури. Зі зростаючою групою учнів, [target_character.GetSheHe] прагне створити більш особисту, емоційно керовану форму живопису літераторів, шануючи традиції, але прокладаючи новий шлях."
  flavor_chi.102.a: "Запросімо [target_character.GetHerHim] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_chi.102.b: "Вигнати [target_character.GetHerHim] з [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_chi.102.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.103.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.103.desc: "Після занепаду [ShowCultureName('wu_culture')] школи, [target_character.GetName], учень Dǒng Qíchāng, виявився перспективним художником. Хоча й не революціонер, [target_character.GetSheHe] поважається за [target_character.GetHerHis] витончені техніки та безтурботні композиції. Художники, як [target_character.GetNameWithNoTooltip], слугують мостом між епохами, зберігаючи нашу [ROOT.GetCountry.GetCulture.GetName] ідентичність, водночас звертаючись до традиційних почуттів."
  flavor_chi.103.a: "[target_character.GetNameWithNoTooltip] служитиме нам."
  flavor_chi.103.b: "Нехай [target_character.GetHerHim] краще подорожує, здобуваючи натхнення таким чином."
  flavor_chi.103.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.104.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.104.desc: "Шляхи та вплив попередньої династії залишаються серед деяких вчених у $china$. Хоча багато хто залишається вірним ідеалам колишнього двору, деякі звернулися до мистецтва, щоб зберегти старі стилі живими. Серед них [target_character.GetName], колишній урядовець, який тепер живе у відлюдді. [target_character.GetSheHe] проводить [target_character.GetHerHis] дні, малюючи ліси та річки [ROOT.GetCountry.GetName], вважаючи це способом зв'язку з минулими епохами. Деякі вірять, що [target_character.GetSheHe] може слугувати культурним мостом у ці бурхливі часи."
  flavor_chi.104.a: "Наймімо [target_character.GetNameWithNoTooltip]."
  flavor_chi.104.b: "У нас вже є колекція великих художників."
  flavor_chi.104.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.105.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.105.desc: "[target_character2.GetName] шукав таланти для служби [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. На щастя, [target_character.GetName], член Чотирьох Вангів, звернувся до нас, бажаючи бути найнятим. [target_character.GetHerHis|U] причина полягає в тому, що [target_character.GetSheHe] прагне поширити ідеї [target_character.GetHerHis] консервативної школи, створюючи мистецтво, натхнене $YUA_ADJ$ династією, створюючи абстрактний дизайн у [target_character.GetHerHis] пейзажах. Така пропозиція досить інтригуюча, але найняття [target_character.GetHerHim] буде розцінено як знак нашої прихильності до однієї художньої школи над іншими."
  flavor_chi.105.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] виграє від присутності [target_character.GetNameWithNoTooltip]."
  flavor_chi.105.b: "Не будемо віддавати перевагу жодним школам."
  flavor_chi.105.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.106.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.106.desc: "Як останній великий майстер традиції літераторів, [target_character.GetName] заслужив захоплення як вчених, так і державних діячів. Хоча народився довго після золотого віку стилю, [target_character.GetHerHis] роботи втілюють його найвищі ідеали: витонченість, безтурботність та філософську глибину. За підтримки [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetNameWithNoTooltip] заснував нову студію, де наступне покоління художників може вчитися у минулого, водночас уявляючи майбутнє."
  flavor_chi.106.a: "Прийняти [target_character.GetHerHis] пропозицію."
  flavor_chi.106.b: "Нам не потрібні люди, які копіюють старі художні стилі."
  flavor_chi.106.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.107.title: "$yuanmingyuan$"
  flavor_chi.107.desc: "Кожна династія, що править [GetInternationalOrganizationType('middle_kingdom').GetName], повинна демонструвати світові свою велич. [ROOT.GetCountry.GetLongName] не є винятком у цьому відношенні. З цієї причини [target_character.GetName] вирішив розробити плани щодо створення нового комплексу палаців, садів та павільйонів, щоб забезпечити легітимність дому [target_character.GetDynasty.GetName] та [target_character.GetHerHis] спадкоємців."
  flavor_chi.107.a: "Нехай його збудують!"
  flavor_chi.107.b: "Це лише марнославство."
  flavor_chi.108.title: "Данницькі місії до [target_country.GetNameWithNoTooltip]"
  flavor_chi.108.desc: "Наші [ShowSubjectTypeName('tributary')] відносини з [target_country.GetName] досить складні та включають багато ритуалів і формальностей. Один факт про них досить очевидний: вони тішать нашого сюзерена і надають можливості нашим посланцям для ведення торгівлі з [target_country.GetAdjectiveWithNoTooltip] [target_country.GetGovernment.GetEstateName('burghers_estate')]. Відправлення все більших данницьких посольств може дозволити нам отримати більше вигод від цих відносин."
  flavor_chi.108.a: "Збільшити розмір посольства."
  flavor_chi.108.b: "Це може зіпсувати наші відносини!"
  flavor_chi.109.title: "Нежиттєздатна данницька місія"
  flavor_chi.109.desc: "Наші міністри повідомляють, що [ShowSubjectTypeName('tributary')] місії з [origin_country.GetName] стають все більшими, збільшуючи наші витрати на розміщення та утримання цих посланців. Хоча це може здатися невинним або навіть позитивним на перший погляд, ми надто добре усвідомлюємо їхні приховані мотиви, якими є прибутки. Якщо ми не накладемо обмежень на [origin_country.GetNameWithNoTooltip], ми понесемо багато витрат, через які ці відносини стануть занадто дорогими для підтримки."
  flavor_chi.109.a: "Встановити ліміт на посланців."
  flavor_chi.109.b: "Шукати більш дипломатичне рішення."
  flavor_chi.109.c: "Розірвати [ShowSubjectTypeNameWithNoTooltip('tributary')] статус."
  flavor_chi.110.title: "Законодавчий прецедент"
  flavor_chi.110.desc: "Один з наших суддів та юристів, [target_character.GetName], нещодавно виніс суперечливе рішення під час важливого судового процесу. Згідно з [ROOT.GetCountry.GetAdjective] законом, такий прецедент обов'язково буде повторений іншими суддями, зрештою ставши законом сам по собі. Однак це не влаштовує [target_estate.GetName], чиї інтереси загрожені цим кроком. Проте спроба підірвати рішення зменшить довіру до [ROOT.GetCountry.GetFlavorRank]."
  flavor_chi.110.a: "Вшанувати цей прецедент."
  flavor_chi.110.b: "Поставити під сумнів рішення!"
  flavor_chi.111.title: "Критика судової системи"
  flavor_chi.111.desc: "Один з експертів з [ROOT.GetCountry.GetAdjective] права, [target_character.GetName], сьогодні подав апеляцію до [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetSheHe|U] стверджує, що розуміння закону багатьма суддями є неадекватним, і що право судити має бути відібране у всіх, крім тих, хто може скласти новий тип іспиту. Противники [target_character.GetShortNameWithNoTooltip] стверджують, однак, що [target_character.GetHerHis] критика політизована і не повинна сприйматися серйозно."
  flavor_chi.111.a: "Це політизовано. Не звертайте уваги на критику."
  flavor_chi.111.b: "Ввести суворіші вимоги."
  flavor_chi.111.c: "Відлупцювати [target_character.GetNameWithNoTooltip] важкою палицею!"
  flavor_chi.112.title: "Спіймано [ShowCultureNameWithNoTooltip('mongolian_culture')] повстанців"
  flavor_chi.112.desc: "Наші гарнізони в [target_province.GetName] нещодавно захопили банду [ShowCultureName('mongolian_culture')] волоцюг, які сіяли невдоволення та були великою перешкодою для нашого контролю над провінцією. Спіймавши цю банду, ми можемо використати їх як приклад для інших таких повстанців. Інші дисиденти, подібні до них, двічі подумають, перш ніж порушувати мир на наших кордонах!"
  flavor_chi.112.a: "Зробити з них приклад."
  flavor_chi.112.b: "Проявити поблажливість до повстанців."
  flavor_chi.113.title: "[target_character.GetNameWithNoTooltip] Втікає до [ShowAreaNameWithNoTooltip('taiwan_area')]"
  flavor_chi.113.desc: "[ROOT.GetCountry.GetName] переживає період безпрецедентного занепаду, що викликає велике занепокоєння у [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Вважаючи, що доля династії вирішена, [target_character.GetName], один з наших полководців, втік з країни на острів [ShowAreaName('taiwan_area')], заснувавши там [target_character.GetHerselfHimself] як принца, що продовжить нашу спадщину."
  flavor_chi.113.a: "Невже все так погано?"
  flavor_chi.113.b: "[ROOT.GetCountry.GetName] дійсно втрачено."
  flavor_chi.114.title: "Особиста рекомендація"
  flavor_chi.114.desc: "З часу скасування [ShowLawName('imperial_examination_law')], [ROOT.GetCountry.GetLongName] покладалася на особисті рекомендації для заповнення посад у кабінеті міністрів та інших урядових установах. Що ж, [recommending_character.GetName] щойно зробив таку рекомендацію, відкрито ручаючись за [target_character.GetName] як компетентного писаря, що міг би допомогти у [ROOT.GetCountry.GetGovernment.GetAdjective] справах."
  flavor_chi.114.a: "Найняти [target_character.GetHerHim]."
  flavor_chi.114.b: "[recommending_character.GetNameWithNoTooltip] нічого не знає про хороших кандидатів."
  flavor_chi.115.title: "Проголошення сходження на престол"
  flavor_chi.115.desc: "Після десятиліть кривавих боротьб за контроль над [GetInternationalOrganizationType('middle_kingdom').GetName], [ROOT.GetCountry.GetLongName] нарешті тріумфує над усіма іншими самозванцями. Пройшовши всі необхідні формальності, настав час розіслати посланців до всіх підданих під Небесним Мандатом. Нас приймуть як Синів Неба."
  flavor_chi.115.a: "Нова ера настане для $china$."
  flavor_chi.116.title: "$flavor_chi.115.title$"
  flavor_chi.116.desc: "Ми отримали посланця від [target_country.GetLongName]. Після бурхливих кількох десятиліть їм вдалося захопити контроль над [GetInternationalOrganizationType('middle_kingdom').GetName] і вони виконали необхідні ритуали, що легітимізували б їх як наступних Синів Неба. Однак, надавати їм нашу підтримку — це не те, чого ми б точно хотіли."
  flavor_chi.116.a: "Визнати [target_country.GetNameWithNoTooltip] як [GetInternationalOrganizationType('middle_kingdom').GetNameWithNoTooltip]."
  flavor_chi.116.b: "Вони не більше ніж самозванці!"
  flavor_chi.117.title: "Селянин-відступник"
  flavor_chi.117.desc: "Останні події в [target_area.GetName] призвели до зростання зрадницької поведінки серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Грабежі, жорстокі суперечки, формування озброєних банд — це лише кілька ознак часу лихоліть, що охопив цю територію. На чолі цього стоїть [target_character.GetName], [target_character.GetWomanMan], що здобув велику славу і заробив [target_character.GetHerselfHimself] репутацію того, хто забирає у багатих і віддає бідним. [target_character.GetShortNameWithNoTooltip] є лідером значної озброєної банди [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')], що повільно захоплює [target_area.GetRegion.GetName]."
  flavor_chi.117.a: "Ми розчавимо цього низького негідника!"
  flavor_chi.117.b: "[target_character.GetSheHe|U] здається досить харизматичним."
  chi_we_will_continue_playing_as_target_country: "Ми продовжимо грати за [target_rebels.GetName]."
  flavor_chi.118.title: "$CSH_ADJ$ Повстання"
  flavor_chi.118.desc: "Селянський натовп [target_character.GetName] виявився іскрою для повстання, значно більшого, ніж ми очікували. Статус народного героя [target_character.GetShortNameWithNoTooltip] надав [target_character.GetHerselfHimself] велику підтримку серед селянства, що масово стікається до лав повстання. Численні збіднілі поселення перейшли на бік повстання, і тепер навіть великим містам $china$ загрожує небезпека."
  flavor_chi.118.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_chi.119.title: "Визволення [target_location.GetNameWithNoTooltip]"
  flavor_chi.119.desc: "[target_location.GetRank.GetName] [target_location.GetName] пав перед [ROOT.GetCountry.GetLongName]. Ця монументальна перемога дозволила [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetFlavorRank] заявити про свої права на Мандат Неба та [GetInternationalOrganizationType('middle_kingdom').GetName]. Якщо [target_country.GetName] не зможе зупинити поширення цього повстання, незабаром їхня [ShowSubjectTypeName('tributary')] система буде схилятися перед нами."
  flavor_chi.119.a: "Заявити про Мандат Неба."
  flavor_chi.119.b: "Ми не маємо амбіцій скидати [target_country.GetAdjectiveWithNoTooltip]"
  flavor_chi.120.title: "Селянська спадщина"
  flavor_chi.120.desc: "Наріжним каменем [ROOT.GetCountry.GetLongName] є історія боротьби [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] проти [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Протягом багатьох десятиліть простолюдини ледве зводили кінці з кінцями через недбалість попередньої династії, доки наш засновник, [target_character.GetName], не поклав цьому край. Саме [target_character.GetHerHim] об'єднав простий народ проти тиранії, призвівши до падіння старого порядку та заснування династії [ROOT.GetCountry.GetName]. Однак її піднесення поставило під сумнів наші засадничі цінності, які, як правило, суперечать ефективним бюрократичним структурам попередніх власників титулу [GetInternationalOrganizationType('middle_kingdom').GetName]. Прийняття основних цінностей попередніх династій може підірвати засадничі принципи всієї держави [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_chi.120.a: "Ми повинні залишатися близькими до простого народу."
  flavor_chi.120.b: "Якщо ми не зможемо адаптуватися, ми, безсумнівно, впадемо."
  flavor_chi.121.title: "[target_work_of_art.GetNameWithNoTooltip]"
  flavor_chi.121.desc: "Один з наших найдосвідченіших генералів, [target_character.GetName], вирішив написати [ShowWorkOfArtTypeName('treatise')] про використання різноманітної порохової зброї. Назва твору — [target_work_of_art.GetName], і він описує багато нових застосувань, які використовувалися під час наших недавніх війн.\n\n[target_work_of_art.GetNameWithNoTooltip] згадує використання пороху для створення зброї з отруйними хімікатами, детально описує використання такої зброї, як вогняні списи та вогняні стріли, і, нарешті, описує використання артилерії."
  flavor_chi.121.a: "Ми подбаємо, щоб це ніколи не було забуто."
  flavor_chi.122.title: "Управління повенями"
  flavor_chi.122.desc: "Нещодавні катастрофічні дощі призвели до зміни русла Жовтої річки. Більше того, розлив річки спричинив повсюдний біль, страждання та смерть. Що ще гірше, це значно порушило роботу Великого каналу, позбавивши [ShowAreaName('beiping_area')] життєво важливих поставок продовольства з [ShowRegionName('east_china_region')]. Щоб полегшити наслідки цього лиха, наші міністри запропонували зібрати понад 170 тисяч робітників, щоб повернути русло річки на належне місце."
  flavor_chi.122.a: "Ми будемо працювати над проектом безперервно."
  flavor_chi.122.b: "Такий проект для нас занадто дорогий."
  until_yellow_river_works_are_complete: "доки роботи на Жовтій річці не будуть завершені"
  flavor_chi.123.title: "Роботи на Жовтій річці зірвано"
  flavor_chi.123.desc: "Підлий агітатор поширював злу пропаганду серед робітників, які зараз працюють над зміною русла Жовтої річки. Згідно з нашими записами, йдеться про [target_character.GetName], фанатика секти Білого Лотоса, який пророкує неминуче пришестя Будди Майтреї. Ми вважаємо, що [target_character.GetHeShe] наказав своїм послідовникам закопати однооку кам'яну статую на шляху проекту, щоб робітники її викопали. На статуї був напис, що пророкував кінець династії [ROOT.GetCountry.GetName].\n\nХоча наші сили зробили все можливе, щоб зупинити цього вискочку від відволікання робітників від їхнього проекту, багато хто все ж дезертирував. Наразі ми не знаємо місцезнаходження ватажка Білого Лотоса."
  flavor_chi.123.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_chi.124.title: "Зміна русла Жовтої річки завершена"
  flavor_chi.124.desc: "Після місяців невтомної праці та попри роботу месіанських шарлатанів, 170 тисяч робітників, яких ми залучили до проекту «Роботи на Жовтій річці», нарешті завершили своє завдання. Це має полегшити частину заворушень та страждань у серці [GetInternationalOrganizationType('middle_kingdom').GetName]."
  flavor_chi.124.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.125.title: "Справа [target_character.GetNameWithNoTooltip]"
  flavor_chi.125.desc: "[target_character.GetName] — жорстокий дисидент, що діє в районі [ShowAreaName('shandong_area')] країни. [target_character.GetHeShe|U] стверджує, що походить від династії Сун, і є яскравим агітатором, що представляє секту Білого Лотоса. Під час проекту зміни русла Жовтої річки [target_character.GetHeShe] здобув багато прихильників серед робітників, тим часом порушуючи процес.\n\nНещодавно ми отримали розвіддані про точне місцезнаходження [target_character.GetNameWithNoTooltip], що дало нам необхідну інформацію для остаточного арешту цього ворога народу. Однак такий крок може призвести до сміливої реакції [target_character.GetHerHis] палких прихильників у червоних тюрбанах."
  flavor_chi.125.a: "Ми повинні здійснити арешт."
  flavor_chi.125.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  rtr_sped_up_red_turban_rebellions: "Заарештовано лідера Червоних пов'язок через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  chi_red_turban_rebellion: "Це ускладнить уникнення [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [ShowSituationName('red_turban_rebellions')]"
  until_the_end_of_red_turban_rebellion: "допоки [ShowSituationName('red_turban_rebellions')] активні"
  flavor_chi.126.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]"
  flavor_chi.126.desc: "Нещодавно одна з наших армій зіткнулася з місцевим повстанським загоном. Їхня провокаційна дія змусила наші сили вступити в несприятливу сутичку, де наші війська зазнали катастрофічної поразки. Цю подію наші вороги використали як доказ нібито занепаду нашої армії. Їхня дурна зарозумілість стане їхньою загибеллю."
  flavor_chi.126.a: "Наша армія не розвалюється, ваша розвалюється!"
  flavor_chi.127.title: "Майбутнє [target_location.GetNameWithNoTooltip]"
  flavor_chi.127.desc: "[target_location.GetName] — це [target_location.GetRank.GetName] з довгою історією. Ця територія вже була центром стародавньої династії Чжоу, а її значення як імперської столиці зросло за часів династій Хань і особливо Тан. Хоча її роль столиці після цього закінчилася, її важливість як центру культури та традицій збереглася.\n\nТепер нам належить вирішити майбутнє цього стародавнього великого міста. Ми могли б знову піднести його до маяка культури та процвітання, яким воно колись було для цих великих стародавніх династій."
  flavor_chi.127.a: "Нове ім'я сповістить про нове майбутнє."
  flavor_chi.127.b: "Вона поверне собі свою давню славу."
  flavor_chi.127.c: "Її розквіт, на жаль, минув."
  flavor_chi.128.title: "[target_location.GetNameWithNoTooltip]"
  flavor_chi.128.desc: "[target_location.GetName] у минулому служила столицею багатьох різних династій, у найбурхливіші часи історії Китаю. З імперією під нашим керівництвом, деякі голоси стверджують, що ми повинні перетворити [target_location.GetRank.GetName] на нову сяючу столицю, більшу, ніж будь-яка в минулому. Її чудове розташування та культурна важливість незаперечні, і за належного керівництва вона безперечно могла б стати центром процвітання."
  flavor_chi.128.a: "Її роль історичної столиці має бути визнана."
  flavor_chi.128.b: "Вона служитиме нашою новою столицею."
  flavor_chi.128.c: "Вона вже має свою давню славу."
  flavor_chi.1000.title: "Закриття [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_chi.1000.desc: "Іноземних західних торговців з [ShowContinentName('europe')] можна, здається, знайти скрізь у [ROOT.GetCountry.GetName]. Вони виснажують прибутки наших власних торговців і доводять їх до банкрутства, змушуючи нас втрачати значні доходи від податків і мит. Можливо, нам слід заборонити їх взагалі або обмежити їх одним місцем для поселення, щоб краще контролювати їх і полегшити накладення торгових мит.\n\nНаші експерти вважають, що передача [target_location.GetName] [target_foreign_country.GetName] і дозвіл їм торгувати лише там може бути найкращим рішенням. Це також дасть нам перевагу розширення торгівлі в наших південних регіонах [ShowAreaName('guangdong_area')]. Знову ж таки, ми могли б вирішити повністю відмовитися від зовнішньої торгівлі або відкрити наші береги для вільної та безперешкодної торгівлі для всіх."
  flavor_chi.1000.a: "Закрити [ROOT.GetCountry.GetNameWithNoTooltip] для зовнішнього світу."
  flavor_chi.1000.b: "Тримати торгівлю відкритою для всіх."
  flavor_chi.1000.c: "Запропонувати їм [target_location.GetNameWithNoTooltip]."
  flavor_chi.1000.c.tt: "Ми надішлемо їм пропозицію до [target_foreign_country.GetName] щодо [target_location.GetName]. Якщо вони погодяться, вони стануть її власниками"
  flavor_chi.1001.title: "Пропозиція щодо [target_location.GetNameWithNoTooltip]"
  flavor_chi.1001.desc: "До нас звернулися емісари [target_origin_country.GetLongName], пропонуючи нам володіння [target_location.GetName]. Це дало б нам вигідну позицію для доступу до їхніх ринків, надаючи нам більші торговельні можливості, але вони, безперечно, очікують від нас певної компенсації натомість, і вони, безумовно, матимуть кращий контроль над нашими купцями, якщо ми отримаємо доступ туди на їхніх умовах."
  flavor_chi.1001.a: "Прийняти їхню пропозицію."
  flavor_chi.1001.b: "Немає потреби з ними домовлятися."
  flavor_chi.1002.title: "[target_country.GetAdjectiveWithNoTooltip] Відповідь"
  flavor_chi.1002.desc: "Видатний народ [target_country.GetLongName] вирішив прийняти нашу пропозицію щодо володіння [target_location.GetName]. Вони оселяться там і належним чином компенсували нам це, і тепер нам доведеться пильніше стежити за ними, щоб набагато легше контролювати рух їхніх купців."
  flavor_chi.1002.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.1003.title: "$flavor_chi.1002.title$"
  flavor_chi.1003.desc: "Проклятий народ [target_country.GetName] по-дурному відмовився прийняти нашу великодушну пропозицію щодо їхнього поселення в [target_location.GetName]. Вони все ще вдають, що мають доступ до наших ринків, не маючи наміру підкорятися нашим правилам. Таку образу не можна дозволити."
  flavor_chi.1003.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_chi.1100.title: "Суперечка щодо [ShowCultureGroupNameWithNoTooltip('chinese_group')] Обрядів"
  flavor_chi.1100.desc: "Досі контакти між нашою Церквою та народом [target_chinese_country.GetName] здійснювалися виключно єзуїтами. Щоб наблизитися до [ShowCultureGroupName('chinese_group')], орден вивчив їхні звичаї та мову, і загалом намагався стати частиною [target_chinese_country.GetAdjectiveWithNoTooltip] суспільства.\n\nОднак із прибуттям домініканців та францисканців до $china$ до нас почали надходити тривожні повідомлення. Здається, єзуїти толерують дуже високий ступінь не-[ROOT.GetReligion.GetAdjective] ритуалів серед нібито наверненого [target_chinese_country.GetAdjectiveWithNoTooltip] народу. Інші ордени обурені поведінкою єзуїтів та їхніми нібито [ROOT.GetReligion.GetAdjectiveWithNoTooltip] наверненими і закликали нас чітко заявити, що [target_chinese_country.GetAdjectiveWithNoTooltip] Обряди Предків не мають місця серед [target_chinese_country.GetAdjectiveWithNoTooltip] вірних і що кожен, хто бажає приєднатися до нашої Церкви, повинен відмовитися від таких речей."
  flavor_chi.1100.a: "Вирішити на користь єзуїтів."
  flavor_chi.1100.b: "Вирішити на користь домініканців."
  mng_chinese_rites_denounced: "$flavor_chi.1100.title$"
  flavor_chi.1101_1102_common: "Серед [target_papal_country.GetReligion.GetAdjective] населення нашої країни точилися численні дебати щодо того, чи сумісні традиційні [ShowCultureGroupName('chinese_group')] Обряди з їхньою релігією. Багатьом людям з [ShowContinentName('europe')], особливо новоприбулим, ці обряди здаються неприємними."
  flavor_chi.1101.title: "[ShowCultureGroupNameWithNoTooltip('chinese_group')] Обряди Засуджено"
  flavor_chi.1101.desc: "$flavor_chi.1101_1102_common$ Сьогодні до нас дійшла звістка, що [target_character.GetName], їхній лідер у [target_country.GetCapital.GetName], заборонив усім [ShowCultureGroupNameWithNoTooltip('chinese_group')] [target_papal_country.GetReligion.GetAdjectiveWithNoTooltip] людям виконувати ці традиційні обряди."
  flavor_chi.1101.a: "Місіонери, які не поважають наші традиції, будуть вигнані!"
  flavor_chi.1101.b: "Нам потрібні ці місіонери."
  flavor_chi.1102.title: "Західники Сперечаються Про [ShowCultureGroupNameWithNoTooltip('chinese_group')] Традиції"
  flavor_chi.1102.desc: "$flavor_chi.1101_1102_common$ Це досить багато, щоб проковтнути від таких варварів, навіть якщо вони, здається, вирішили тепер «терпіти» ці [ShowCultureGroupNameWithNoTooltip('chinese_group')] звичаї."
  flavor_chi.1102.a: "$flavor_chi.1101.a$"
  flavor_chi.1102.a.tt: "Зупиняє навернення до християнства в Китаї"
  flavor_chi.1102.b: "$flavor_chi.1101.b$"
  flavor_chi_pap.1.title: "Делегація з [target_country.GetNameWithNoTooltip]"
  flavor_chi_pap.1.desc: "Посланець з далекої землі [target_country.GetName] щойно прибув до [ROOT.GetCountry.GetCapital.GetName]. Вони повідомляють нам про скрутне становище [target_pop_cath.GetName], які залишилися без духовного лідера в далекому Катаї. Тому вони благають нас відправити священиків до [target_location.GetName] від їхнього імені.\n\nЦе те, що потрібно [target_building.GetName]."
  flavor_chi_pap.1.a: "Дуже добре, відправте їм священиків!"
  flavor_chi_pap.1.b: "Вони нам тут потрібні."
  flavor_chi_pap.2.title: "Експедиція з [ShowContinentNameWithNoTooltip('europe')] повертається"
  flavor_chi_pap.2.desc: "Роки тому [target_country.GetName] відправила посланця до [papal_state.GetLongName], прохаючи надіслати священиків від імені громади [target_pop_cath.GetName]. Сьогодні цей посланець повернувся, несучи найвеличніші новини.\n\nНаше прохання було тепло прийняте, і [papal_state.GetGovernment.GetRulerTitle] відповів ствердно, відправивши десятки священиків на чолі з [target_character.GetName]. Майбутнє [target_building.GetName] у [target_location.GetName] сяє яскраво."
  flavor_chi_pap.2.a: "Зустріньте їх з пошаною!"
  flavor_chi_pap.2.b: "Часи справді змінилися з тих пір."
  flavor_chi_por.1.title: "Оренда порту в $china$"
  flavor_chi_por.1.desc: "Багатства та розкоші $china$ відомі по всій [ShowContinentName('europe')], і отримати хоча б їхню частку було б для нас монументальною перемогою. Хоча є багато способів досягти цього, можливо, найкращий спосіб — це придбати трохи території, де ми могли б вести торгівлю. З цієї причини, давайте попросимо [target_country.GetAdjective] орендувати частину їхньої території в [target_location.GetName]."
  flavor_chi_por.1.a: "Запропонувати оренду."
  flavor_chi_por.1.b: "Нам це не потрібно."
  flavor_chi_por.2.title: "Оренда в [target_location.GetNameWithNoTooltip]"
  flavor_chi_por.2.desc: "Ми отримали посланця від [offering_country.GetName] з пропозицією оренди [target_location.GetName]. Згідно з угодою, [offering_country.GetNameWithNoTooltip] отримає частину території та зможе заснувати [target_building_type.GetName] для ведення торгівлі з [target_country.GetName]. Така торгівля з далекою [ShowContinentName('europe')] безумовно підштовхне нас у більш [ShowSocietyDirectionName('outward')] напрямку та дозволить нам імпортувати багато товарів, які зараз невідомі в $china$."
  flavor_chi_por.2.a: "Прийняти пропозицію."
  flavor_chi_por.2.b: "Відхилити пропозицію."
  flavor_chi_por.3.title: "Відповідь від [target_country.GetNameWithNoTooltip]"
  flavor_chi_por.3.desc_common: "Наш посланець, відправлений до [target_country.GetName], нарешті повернувся!"
  flavor_chi_por.3.desc_success: "$flavor_chi_por.3.desc_common$ Як і очікувалося, [target_country.GetAdjectiveWithNoTooltip] представники позитивно відреагували на нашу пропозицію, і наші міністри вже працюють над втіленням усього в реальність."
  flavor_chi_por.3.desc_failure: "$flavor_chi_por.3.desc_common$ На жаль, зарозумілі міністри [target_country.GetLongNameWithNoTooltip] відхилили нашу скромну пропозицію. Багатства $china$ все одно не такі вже й важливі!"
  flavor_chi_por.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  expedition_name_treasure_voyage: "Подорож за скарбами"
  expedition_name_chinese_expedition: "[ShowCultureGroupName('chinese_group')] Експедиція"
  expedition_leader_name: "[character_expedition_leader_target.GetName]"
  expedition_leader_name_tooltipless: "[character_expedition_leader_target.GetNameWithNoTooltip]"
  expedition_leader_name_shehe: "[character_expedition_leader_target.GetSheHe]"
  expedition_leader_name_herhim: "[character_expedition_leader_target.GetHerHim]"
  expedition_leader_name_herhis: "[character_expedition_leader_target.GetHerHis]"
  expedition_leader_name_herselfhimself: "[character_expedition_leader_target.GetHerselfHimself]"
  expedition_location_name: "[expedition_initiator.MakeScope.GetVariable('chinese_treasure_fleet_location').GetLocation.GetName]"
  expedition_location_name_tooltipless: "[expedition_initiator.MakeScope.GetVariable('chinese_treasure_fleet_location').GetLocation.GetNameWithNoTooltip]"
  flavor_chi.2000.title: "Доба скарбних подорожей"
  flavor_chi.2000.desc: "Останні успішні десятиліття забезпечили нас достатком вільного золота та ресурсів, які можна витратити на наші дипломатичні зусилля. Ми могли б, і, безперечно, повинні, використати ці кошти для подальшого зміцнення вже сильної позиції [GetInternationalOrganization('middle_kingdom').GetName] в очах світу. Для цього ми відправимо різноманітні морські експедиції, сповнені найбагатших дарів, які може дозволити собі [ROOT.GetCountry.GetName], щоб переконати більше націй стати частиною нашої [ShowSubjectTypeName('tributary')] мережі."
  flavor_chi.2000.a: "Так і зробимо!"
  chi_able_to_send_treasure_voyages: "[Concept('ROOT.GetCountry.GetName] зможе використовувати [action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('start_a_treasure_voyage')], щоб витрачати своє [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] для залучення більшої кількості націй до своєї [ShowSubjectTypeName('tributary')] мережі. Це буде можливо лише доти, доки вони є [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [GetInternationalOrganizationType('middle_kingdom').GetName]."
  flavor_chi.2001.title: "Кінець доби"
  flavor_chi.2001.desc: "Сьогодні держава [ROOT.GetCountry.GetName] озирається на досягнення Скарбних Подорожей і бачить лише марнотратне розтрачання коштів заради нічого, крім невеликого престижу. Було б краще, якби історики просто опустили існування цих подвигів."
  flavor_chi.2001.a: "Як є, так є."
  chi_unable_to_send_treasure_voyages: "[ROOT.GetCountry.GetName] більше не зможе використовувати [ShowGenericActionName('start_a_treasure_voyage')]."
  flavor_chi.2002.title: "Початок експедиції"
  flavor_chi.2002.desc: "Після тижнів підготовки наш великий флот нарешті готовий вирушити до [target_area.GetName]. Невідомо, які пригоди чи нещастя зустрінуть $expedition_leader_name$ та $expedition_leader_name_herhis$ екіпаж на шляху, але, враховуючи, що [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] довірив їм таку відповідальність, ми впевнені, що вони не розчарують.\n\nЗгідно з планом, флот вирушить на світанку з порту [start_location.GetName], і можуть пройти роки, перш ніж вони повернуться до наших берегів. Бажаємо їм щасливої дороги!"
  flavor_chi.2002.a: "Хай щастить!"
  chinese_treasure_expeditions_send_tooltip: "$expedition_name_treasure_voyage$ відправляється до [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.GetName] під керівництвом [target_character.GetName].\nФлот везе #g [ROOT.GetVariable('chinese_treasure_voyage_cargo').GetValue|2]#! [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] вантажу, призначеного для подарунків [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які вони відвідають."
  flavor_chi.2003.title: "Прихована подія"
  flavor_chi.2003.desc: "Прихована подія"
  flavor_chi.2003.a: "Прихована подія"
  flavor_chi.2004.title: "Прибуття [expedition_initiator.GetAdjectiveWithNoTooltip] $expedition_name_treasure_voyage$"
  flavor_chi.2004.desc: "На світанку мешканців [target_stop.GetRank.GetName] [target_stop.GetName] зустріло найжахливіше, але й найдивовижніше видовище. Увесь обрій над [coastal_sea_tile.GetName] був вкритий кораблями не кого іншого, як [GetInternationalOrganization('middle_kingdom').GetName], [expedition_initiator.GetLongName]. Керівник флоту, $expedition_leader_name$, негайно висадився в нашому порту та отримав дозвіл на поповнення запасів у [target_stop.GetNameWithNoTooltip]. Те, що сталося далі, справді дивно, оскільки [expedition_initiator.GetAdjectiveWithNoTooltip] моряки зв'язалися з місцевими судовими виконавцями, обсипаючи їх подарунками та просячи аудієнції у [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_chi.2004.a: "Ласкаво просимо їх до [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_chi.2005.title: "Аудієнція у [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_chi.2005.desc: "$expedition_leader_name$ та $expition_leader_name_herhis$ почт нарешті змогли зв'язатися з нашим доброзичливим [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Їхній величезний флот та потік подарунків справили на нас усіх велике враження, і тому ми були дуже вражені, коли вони запропонували нам те, що дорівнює [ShowSubjectTypeName('tributary')] відносинам під [expedition_initiator.GetAdjective] правлінням. Можливо, бути підданим такій могутній державі принесе нам більше користі, ніж здається."
  flavor_chi.2005.a: "Дружба має свою ціну."
  flavor_chi.2005.b: "Ми не потерпимо такого!"
  chinese_expedition_resolution_tt: "Протягом наступних місяців китайська $expedition_name_treasure_voyage$ залишатиметься в нашому порту [Concept('target_stop.GetName]. Ми отримуватимемо [events', 'CONCEPT_PLACEHOLDER')|e], що дозволять нам взаємодіяти з ними та змінювати їхню думку про нас. Залежно від думки наприкінці перебування, ми отримаємо різні результати:\n\nПокірні (#y 67#! - #y 100#!):\n[ShowScriptedEffectForScope('chi_expedition_resolution_very_positive', ROOT.GetCountry.MakeScope.Self)]\nПрихильні (#y 33#! - #y 66#!):\n[ShowScriptedEffectForScope('chi_expedition_resolution_positive', ROOT.GetCountry.MakeScope.Self)]\nБайдужі (#y -32#! - #y 32#!):\n$NOTHING_HAPPENS_EFFECT$\nНешанобливі (#y -66#! - #y -33#!):\n[ShowScriptedEffectForScope('chi_expedition_resolution_negative', ROOT.GetCountry.MakeScope.Self)]\nЗарозумілі (#y -100#! - #y -67#!):\n[ShowScriptedEffectForScope('chi_expedition_resolution_very_negative', ROOT.GetCountry.MakeScope.Self)]"
  flavor_chi.2006.title: "Відповідні дари"
  flavor_chi.2006.desc: "Виконавши свою місію в [ROOT.GetCountry.GetName], скарбниця флоту [expedition_initiator.GetName] наразі поповнює свої запаси, очікуючи відплиття протягом кількох місяців. Було б звичаєм надати їм найкраще, що може запропонувати наш [ROOT.GetCountry.GetFlavorRank], як знак вдячності та підтвердження наших [ShowSubjectTypeName('tributary')] відносин."
  flavor_chi.2006.a: "Покажімо їм нашу щедрість."
  flavor_chi.2006.gift: "Даймо їм нашу особливість."
  flavor_chi.2006.b: "Ми не можемо собі цього дозволити..."
  flavor_chi.2007.title: "Експедиція відпливає"
  flavor_chi.2007.desc: "Нарешті, [expedition_initiator.GetAdjective] скарбниця флоту нарешті відплила з [target_stop.GetName]. Ми виявили їм велику гостинність і сподіваємося, що їхня подорож буде сповнена добрих милостей."
  flavor_chi.2007.a: "Прощавай!"
  chi_fleet_will_depart: "[expedition_initiator.GetAdjective] експедиція відпливе з [ROOT.GetCountry.GetName]."
  chinese_expedition_opinion: "Довіра до скарбничої експедиції"
  based_on_expedition_opinion: "На основі $chinese_expedition_opinion$ (Наразі: [ROOT.GetVariable('chinese_expedition_opinion').GetValue]) відбудеться наступне:"
  flavor_chi.2008.title: "Повернення $expedition_name_treasure_voyage$"
  flavor_chi.2008.desc: "Наш флот, який ми відправили багато років тому до [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.GetName], нарешті повернувся, привізши багато посланців та подарунків, які вони отримали під час своєї довгої подорожі. $expedition_leader_name$ тепер прямує з багатствами та іноземними представниками до нашої столиці."
  flavor_chi.2008.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.2009.title: "Аудієнція з [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_chi.2009.desc: "$expedition_leader_name$ нарешті повернувся до [ROOT.GetCountry.GetCapital.GetName] з великими фанфарами та радістю. У складі своєї делегації вони привезли багато посланців з країн, які вони відвідали, і які готові присягнути на вірність [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Ми дуже задоволені їхнім рішенням прибути сюди."
  flavor_chi.2009.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.2010.title: "Кінець експедиції"
  flavor_chi.2010.desc: "$expedition_name_treasure_voyage$ нарешті завершилася. Давайте переглянемо, чи варті були наші інвестиції в кінцевому підсумку, і розглянемо, чи варто відправляти ще одну в майбутньому, оскільки це дорога справа."
  flavor_chi.2010.a: "Нам потрібно більше таких місій."
  flavor_chi.2011.title: "Відкриті маршрути"
  flavor_chi.2011.desc: "Хоча наша експедиція до [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.GetName] не була дослідницькою за своєю природою, листування з місцевими правителями по дорозі дозволило нашим мандрівникам відкрити нові маршрути. З їхнім поверненням ми можемо використати цей досвід, щоб краще картографувати землі за межами [GetInternationalOrganization('middle_kingdom').GetName]."
  flavor_chi.2011.a: "У світі є щось більше, ніж просто [GetInternationalOrganization('middle_kingdom').GetNameWithNoTooltip]?"
  chi_we_will_gift_cloves: "Ми подаруємо [expedition_initiator.GetName] [ShowGoodsName('cloves')]."
  chi_we_will_gift_giraffe: "Ми подаруємо [expedition_initiator.GetName] жирафа."
  chi_we_will_gift_persian_blue: "Ми подаруємо [expedition_initiator.GetName] подарунок з наших місцевих [ShowGoodsName('dyes')]."
  flavor_chi.2012.title: "Екзотичний звір"
  flavor_chi.2012.desc: "Наша $expedition_name_treasure_voyage$ привезла справді виняткову та видатну істоту до [ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle]! Це величезний звір з довгою шиєю, вкритий темними плямами, і за кордоном його назвали жирафом. Наші придворні, однак, ідентифікували істоту з легендарним [ShowCultureGroupName('chinese_group')] #italic qílín#!, що символізує настання золотої ери під правлінням видатного правителя. Ми могли б повірити в цю теорію, підвищивши наш престиж, але встановивши вищі очікування щодо наших дій."
  flavor_chi.2012.a: "Це міфічний #italic qílín#!!"
  flavor_chi.2012.b: "Чудова істота, безперечно."
  flavor_chi.2013.title: "Колір Чудес"
  flavor_chi.2013.desc: "Наша велика експедиція привезла екзотичний барвник з [ShowSubContinentName('middle_east')]. Інтенсивний синій, він був ідентифікований як ідеальний ресурс, який можна використовувати для виробництва нашої відомої [ShowGoodsName('pottery')]. Достатньо цих [ShowGoodsName('dyes')] було привезено, щоб ми могли використовувати їх у нашому виробництві."
  flavor_chi.2013.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.2014.title: "Смак, що запам'ятається"
  flavor_chi.2014.desc: "Хоча [ShowRegionName('indonesia_region')] безумовно відома своїми спеціями, наша $expedition_name_treasure_voyage$ відвідала район, де у великих кількостях вирощуються виняткові [ShowGoodsName('cloves')] – [ShowAreaName('moluccas_area')]. Місцеві жителі там гостинно зустріли нашу експедицію і надали нам багато цих чудових спецій як данину. [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ROOT.GetCountry.GetGovernment.GetRulerTitle] смакуватимуть їх протягом наступних місяців."
  flavor_chi.2014.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.2015.title: "Знайдено боягуза"
  flavor_chi.2015.desc: "Під час $expedition_name_treasure_voyage$ $expedition_leader_name$ та $expedition_leader_name_herhis$ вірні моряки зуміли вистежити високопоставленого дисидента на ім'я [extradited_character.GetName]. [extradited_character.GetShortNameWithNoTooltip] втік з [ROOT.GetCountry.GetName] давно, уникаючи належного правосуддя. Однак наша експедиція не тільки зуміла знайти [extradited_character.GetHerHim], але й вирвати [extradited_character.GetHerHim] з рук [extradited_character.GetHerHis] охоронців притулку в [asylum_country.GetName] і вони привезли [extradited_character.GetHerHim] назад до $china$ для здійснення правосуддя."
  flavor_chi.2015.a: "Задушити цього дрібного злочинця!"
  flavor_chi.2015.b: "Нехай [extradited_character.GetHerHim] обезголовлять."
  flavor_chi.2015.c: "Видати #italic língchí,#! повільне розрізання."
  flavor_chi.2015.d: "Помилувати дисидента, [extradited_character.GetHerHis] навички можуть бути корисними."
  flavor_chi.2016.title: "Страта [executed_character.GetNameWithNoTooltip]"
  flavor_chi.2016.desc: "[executed_character.GetName] є втікачем з [executed_character.GetBirthLocation.GetArea.GetName], чия родина звернулася до піратства після впровадження [ShowPolicyName('haijin_policy')]. Після [executed_character.GetHerHis] втечі, [executed_character.GetShortNameWithNoTooltip] став піратським ватажком у [loser_country.GetName] і згодом вів битви проти $expedition_leader_name$ біля узбережжя [loser_country.GetFlavorRank]. Тепер настав час зробити приклад з [executed_character.GetNameWithNoTooltip]."
  flavor_chi.2016.a: "Правосуддя звершилося."
  flavor_chi.2017.title: "Зухвалий правитель"
  flavor_chi.2017.desc: "Під час нашої $expedition_name_treasure_voyage$ $expedition_leader_name$ та $expedition_leader_name_herhis$ великий флот зумів захопити високопоставленого в'язня – [loser_character.GetName], колишнього [loser_country.GetGovernment.GetRulerTitle] [loser_country.GetLongName]. Однак зрада та неповага [loser_country.GetNameWithNoTooltip] призвели [loser_character.GetHerHim] до швидкої поразки, де [loser_character.GetSheHe] був взятий у полон."
  flavor_chi.2017.a: "Зробити приклад з [loser_character.GetHerHim]."
  flavor_chi.2017.b: "Проявити доброзичливе ставлення."
  flavor_chi.2018.title: "Доля [loser_country.GetNameWithNoTooltip]"
  flavor_chi.2018.desc: "Нерозумний правитель [loser_country.GetName] колись чинив опір бажанням [GetInternationalOrganization('middle_kingdom').GetName], представленим $expedition_leader_name$ та $expedition_leader_name_herhis$ експедицією. Після запеклого конфлікту [loser_country.GetLongNameWithNoTooltip] була розгромлена, і тимчасовий [loser_country.GetGovernment.GetRulerTitle] був призначений, поки ми вирішуємо, що з ними робити."
  flavor_chi.2018.a: "Відправити [target_character_for_viceroyalty.GetNameWithNoTooltip] правити як наш віце-король."
  flavor_chi.2018.b: "Місцевий номінальний правитель може залишитися."
  flavor_chi.2019.title: "Віце-король від [expedition_initiator.GetNameWithNoTooltip]"
  flavor_chi.2019.desc: "Ми отримали звістку від [GetInternationalOrganization('middle_kingdom').GetName]. Вони домовилися, щоб наша держава управлялася їхнім віце-королем, [target_character_for_viceroyalty.GetName], який буде правити нами в [ShowSubjectTypeName('tributary')] відносинах у найближчому майбутньому. Така наша доля — бути підкореними нашими ворогами-переможцями."
  flavor_chi.2019.a: "Ми скинемо це ярмо свого часу."
  flavor_chi.2020.title: "Дари здалеку"
  flavor_chi.2020.desc: "Протягом експедиції нашим морякам було подаровано багато місцевих товарів та виробів, які тепер доставлені до $china$. Вони мають невелику грошову цінність для нас, але виставляють [GetInternationalOrganization('middle_kingdom').GetName] у вигідному світлі і, безсумнівно, підвищать наш престиж на довгі роки."
  flavor_chi.2020.a: "Ми й не очікували меншого."
  flavor_chi.2021.title: "Смерть [target.GetNameWithNoTooltip]"
  flavor_chi.2021.desc: "До нас дійшла звістка, що наш лідер $expedition_name_treasure_voyage$, $expedition_leader_name$, загинув під час $expedition_leader_name_herhis$ подорожі. Другий за рангом, [new_leader.GetName], перейняв командування і муситиме вести подорож самостійно."
  flavor_chi.2021.a: "Нехай це не буде передвістям того, що має статися."
  chi_new_expedition_leader: "[new_leader.GetName] тепер є лідером нашої $expedition_name_treasure_voyage$."
  flavor_chi.2022.title: "Нестача коштів"
  flavor_chi.2022.desc: "Ми отримали інформацію, що $expedition_name_treasure_voyage$ повертається до [ROOT.GetCountry.GetName] через нестачу дарів для ведення дипломатії. Можливо, наступного разу нам слід виділити більше відповідних коштів для наших експедицій."
  flavor_chi.2022.a: "Це бентежить."
  chi_expedition_is_returning_to_china: "$expedition_name_treasure_voyage$ тепер на шляху назад до [ROOT.GetCountry.GetName]."
  show_current_chinese_expedition_amount: "[COUNTRY.MakeScope.GetVariable('chinese_expedition_opinion').GetValue]"
  change_amount_of_treasure_voyage_tt: "Обсяг вантажу, що перевозиться $expedition_name_treasure_voyage$, збільшується на $VALUE|+$."
  change_amount_of_treasure_voyage_tt_neg: "Обсяг вантажу, що перевозиться $expedition_name_treasure_voyage$, зменшується на $VALUE|-$."
  change_opinion_of_expedition: "$chinese_expedition_opinion$ до нас збільшується на $VALUE|0Y$. (Наразі: $show_current_chinese_expedition_amount$)"
  change_opinion_of_expedition_neg: "$chinese_expedition_opinion$ до нас зменшується на $VALUE|0Y$. (Наразі: $show_current_chinese_expedition_amount$)"
  give_gold_to_expedition: "$VALUE|2Y$ буде подаровано $expedition_name_treasure_voyage$."
  chi_gift_received_count: "Ми отримали [ROOT.GetVariable('gifts_received').GetValue|2+=] [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], що конвертується в:"
  flavor_chi.2100.title: "Флот скарбів потрапив у шторм"
  flavor_chi.2100.desc: "Під час своєї подорожі наш найвеличніший флот скарбів зустрів найтривожнішого ворога під час плавання: не кого іншого, як могутні сили природи у вигляді величезного шторму, що застав зненацька наших найдосвідченіших моряків. Численні кораблі були втрачені під час цієї катастрофи, втративши при цьому багато наших дарів та товарів."
  flavor_chi.2100.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_chi.2101.title: "Зіткнення з піратським флотом"
  flavor_chi.2101.desc: "Під час плавання через [target_location.GetTopography.GetName] [target_location.GetName] наш славетний Флот скарбів під пильним оком $expedition_leader_name$ зустрів мерзенний флот буйних піратів. Наші хоробрі воїни, звісно, не злякалися і негайно вступили в рішучу битву з ворогом, де ворожі головорізи були повністю розгромлені, а їхні лідери захоплені. Однак таке зіткнення не обійшлося без втрат у живій силі та кораблях, позбавивши наш великий флот багатьох ресурсів."
  flavor_chi.2101.a: "Це принесе нам певну вдячність."
  flavor_chi.2200.title: "Пошук перекладача"
  flavor_chi.2200.desc: "Так далеко від дому, представникам [ShowCultureGroupName('chinese_group')] Експедиції скарбів досить важко ефективно спілкуватися з нами, і все ж вони прагнуть плисти далі, скоро зустрічаючись з людьми багатьох культур, з якими вони ніколи раніше не взаємодіяли. Щоб продовжити свою подорож, вони попросили нас надати місцевого перекладача, який міг би служити для них перекладачем."
  flavor_chi.2200.a: "Знайдіть перекладача негайно!"
  flavor_chi.2200.b: "Це їхня проблема, а не наша."
  flavor_chi.2201.title: "Обмін картами"
  flavor_chi.2201.desc: "$expedition_name_treasure_voyage$ попросив нас поділитися з ними нашими картами місцевих водних шляхів. Ми не зобов'язані це робити, але виконання їхнього прохання було б розцінено як жест доброї волі і було б високо оцінено $expedition_leader_name$ та іншими елітами [ShowCultureGroupName('chinese_group')], які зараз перебувають у $expedition_location_name$."
  flavor_chi.2201.a: "Поділитися тим, що маємо."
  flavor_chi.2201.b: "У нас немає таких карт для обміну."
  flavor_chi.2202.title: "Грабіжницькі ціни"
  flavor_chi.2202.desc: "Через незнайомство моряків $expedition_name_treasure_voyage$, місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] облаштували ринки поблизу гавані $expedition_location_name$. Ці ринки пропонують відвідувачам місцеві товари за певну ціну, і в цьому полягає проблема, бо найжадібніші з наших купців вирішили скористатися відчаєм моряків, щоб підняти ціни до непомірних розмірів. Ціни зросли настільки високо в деяких місцях, що на вулиці спалахнула збройна сутичка, спричинивши заворушення в [fleet_loc.GetRank.GetName]."
  flavor_chi.2202.a: "Покарати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]!"
  flavor_chi.2202.b: "Притягнути моряків до відповідальності."
  flavor_chi.2203.title: "Сприйняте приниження"
  flavor_chi.2203.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вкрай незадоволені увагою, яку ми приділили $expedition_name_treasure_voyage$. Вони розглядають [ShowCultureGroupName('chinese_group')] як зарозумілих загарбників, які не заслуговують на жодну гостинність чи привілеї, які ми надали їм під час їхнього перебування. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вимагають, отже, щоб ми скасували деякі привілеї та показали їм, що вони не на своїй землі."
  flavor_chi.2203.a: "Виконати прохання [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_chi.2203.b: "Ми не можемо ризикувати роздратувати [ShowCultureGroupNameWithNoTooltip('chinese_group')]."
  flavor_chi.2204.title: "Релігійний промах"
  flavor_chi.2204.desc: "Моряки [ShowCultureGroupName('chinese_group')] Експедиції скарбів, так незвиклі до наших [ROOT.GetCountry.GetReligion.GetAdjective] звичаїв, вчинили святотатський акт проти нашої віри. Це викликало обурення серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], які закликають лідера експедиції, $expedition_leader_name$, виступити та вибачитися за таку неповагу."
  flavor_chi.2204.a: "Вимагати вибачень від $expedition_leader_name_tooltipless$."
  flavor_chi.2204.b: "Нехай ця помилка зійде з рук."
  flavor_chi.2205.title: "Вимога про екстрадицію"
  flavor_chi.2205.desc: "$expedition_name_treasure_voyage$ ідентифікувала одного з наших придворних, [target_escapee.GetName], як втікача-ренегата з [expedition_initiator.GetName]. Еліта [ShowCultureGroupName('chinese_group')] експедиції, очолювана $expedition_leader_name$, вимагає передати [target_escapee.GetShortNameWithNoTooltip] їм та екстрадувати назад до [GetInternationalOrganization('middle_kingdom').GetName], де [target_escapee.GetSheHe] може бути судимий."
  flavor_chi.2205.a: "Виконати їхнє прохання."
  flavor_chi.2205.b: "Безглузда вимога!"
  flavor_chi.2206.title: "Спільні армійські навчання"
  flavor_chi.2206.desc: "Під час свого тривалого перебування $expedition_leader_name$, лідер $expedition_name_chinese_expedition$, запропонував нашим і їхнім силам взяти участь у спільних військових навчаннях. Такі навчання могли б принести користь обом сторонам і свідчили б про глибоку довіру між двома сторонами. Проте, можуть бути деякі ризики у навчаннях з іноземними солдатами, і ми повинні діяти обережно. Найближча армія, розташована до $expedition_location_name$, [target_unit.GetName], буде силами, які спільно тренуватимуться з китайцями."
  flavor_chi.2206.a: "Прийняти цю пропозицію."
  flavor_chi.2206.b: "Ми завжди можемо відмовитися."
  flavor_chi.2207.title: "Пропозиція допомоги від [ShowCultureGroupNameWithNoTooltip('chinese_group')]"
  flavor_chi.2207.desc: "Коли [ShowCultureGroupNameWithNoTooltip('chinese_group')] $expedition_name_treasure_voyage$ прибула до $expedition_location_name$, вони не очікували побачити [ROOT.GetCountry.GetLongName] посеред кривавої війни, але вони тут. Тим не менш, [expedition_initiator.GetLongName] не має високої думки про наших ворогів у війні і, отже, буде готовий допомогти нам у нашому конфлікті."
  flavor_chi.2207.a: "Ми приймемо будь-яку допомогу, яку зможемо отримати."
  flavor_chi.2207.b: "Це наша боротьба, а не їхня."
  flavor_chi.2208.title: "[ShowCultureGroupNameWithNoTooltip('chinese_group')] Шукачі Скарбів Допомагають [from.GetNameWithNoTooltip]"
  flavor_chi.2208.desc: "Наші шпигуни повідомляють нам про значну $expedition_name_treasure_voyage$, очолювану $expedition_leader_name$, ініційовану [expedition_initiator.GetLongName]. Прибувши до ворожого порту $expedition_location_name$, вони вирішили забруднити руки і підтримати нашого ворога [from.GetName] у його війні проти нас!"
  flavor_chi.2208.a: "Ми ніколи не пробачимо [ShowCultureGroupNameWithNoTooltip('chinese_group')]!"
  flavor_chi.2209.title: "Прохання про будівництво мечеті"
  flavor_chi.2209.desc: "Лідер $expedition_name_chinese_expedition$, певний моряк на ім'я $expedition_leader_name$, також є побожним послідовником [target_religion.GetName]. Оскільки багато хто з $expedition_leader_name_herhis$ флоту сповідує ту ж віру, вони попросили дозволити будівництво мечеті, щоб підтримати місцеву [target_religion.GetAdjectiveWithNoTooltip] громаду."
  flavor_chi.2209.a: "Дозволити будівництво."
  flavor_chi.2209.b: "Застерегти їх від таких посягань."
  flavor_chi.2210.title: "[ShowCultureGroupNameWithNoTooltip('chinese_group')] Діаспора в $expedition_location_name_tooltipless$"
  flavor_chi.2210.desc: "У $expedition_location_name$ проживає значна [ShowCultureGroupName('chinese_group')] діаспора, яка зростала тут протягом багатьох десятиліть. Спочатку прибувши сюди як торговці, [ShowCultureGroupNameWithNoTooltip('chinese_group')] купці брали дружин з місцевих жінок і оселилися тут, адаптуючись до нового середовища та виконуючи вирішальну роль у нашому суспільстві. Тепер, з прибуттям $expedition_name_treasure_voyage$ з [expedition_initiator.GetName], $expedition_leader_name$ вирішив надати підтримку цій діаспорі."
  flavor_chi.2210.a: "Заохочувати це."
  flavor_chi.2210.b: "Зупинити їх!"
  flavor_chi.2211.title: "Солдати осідають"
  flavor_chi.2211.desc: "Кілька солдатів з $expedition_name_chinese_expedition$ були звільнені та отримали дозвіл оселитися в $expedition_location_name$. Вони взяли собі місцевих дружин, і їхні зв'язки можуть виявитися корисними для нас у довгостроковій перспективі."
  flavor_chi.2211.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_chi.2212.title: "Втручання з $expedition_name_treasure_voyage$"
  flavor_chi.2212.desc: "Коли $expedition_name_chinese_expedition$ прибула до $expedition_location_name$, вони виявили, що наш [ROOT.GetCountry.GetFlavorRank] занурений у криваву громадянську війну. Хоча такі обставини зазвичай відлякували б багатьох відвідувачів, $expedition_leader_name$ та $expedition_leader_name_herhis$ $expedition_name_treasure_voyage$ вподобали [ROOT.GetCountry.GetAdjective] справу і пропонують нам військову підтримку в ім'я [GetInternationalOrganization('middle_kingdom').GetName]."
  flavor_chi.2212.a: "Ми приймемо всю допомогу, яку зможемо отримати."
  flavor_chi.2212.b: "Нам не потрібна їхня допомога."
  flavor_chi.2213.title: "$flavor_chi.2212.title$"
  flavor_chi.2213.desc: "Підлий $expedition_name_chinese_expedition$ вирішив обрати сторону в нашій [target_war.GetName]. І попри мудрість $expedition_leader_name$, їхнього лідера, вони зробили неправильний вибір, вирішивши підтримати [country_at_war_with.GetName] замість того, щоб допомогти [ROOT.GetCountry.GetName]. Ми розгромимо їх на полі бою."
  flavor_chi.2213.a: "Ми цього не забудемо!"
  flavor_chi.2214.title: "[ShowCultureGroupNameWithNoTooltip('chinese_group')] Зневага"
  flavor_chi.2214.desc: "Відносини між [ROOT.GetCountry.GetName] та нашими відвідувачами, $expedition_name_treasure_voyage$, впали до безпрецедентного рівня. Останніми днями відбулося численні сутички між нашим гарнізоном та іноземними моряками, але номінально наші відвідувачі все ще підтримували стосунки, хоч і прохолодні. Однак, нещодавні події ще більше погіршили ці зв'язки, і $expedition_leader_name$ щойно засудив [ROOT.GetCountry.GetLongNameWithNoTooltip] та його цінності, а $expedition_name_chinese_expedition$ готується покинути $expedition_location_name$, перш ніж напруга загостриться ще більше."
  flavor_chi.2214.a: "Ми повинні відновити наші стосунки."
  flavor_chi.2214.b: "Скатертиною дорога!"
  chinese_interregnum: "[THIS.GetCountry.GetName] буде піддано [ShowCultureGroupName('chinese_group')] міжцарів'ю."
  flavor_chi.2215.title: "Войовничий запит"
  flavor_chi.2215.desc: "Лідер $expedition_name_treasure_voyage$ $expedition_leader_name_herselfhimself$, $expedition_leader_name$, подав нам серйозне звернення, вимагаючи військового втручання проти [target_country.GetName]. З того, що ми знаємо, з тієї чи іншої причини [target_country.GetAdjectiveWithNoTooltip] [target_country.GetFlavorRank] став мішенню для [ShowCultureGroupName('chinese_group')], і лідери експедиції закликають нас виконати Небесну кару над зухвалим [target_country.GetGovernment.GetRulerTitle]."
  flavor_chi.2215.a: "Ми виконаємо їхню рекомендацію."
  flavor_chi.2215.b: "Вони не можуть очікувати від нас такого."
  flavor_chi.2216.title: "Невтішна якість данини"
  flavor_chi.2216.desc: "Хоча вони не заявляли про це публічно, ми можемо сказати, що еліти $expedition_name_treasure_voyage$ незадоволені якістю наших подарунків. Ми підозрювали це ще під час їхньої аудієнції з [ROOT.GetCountry.GetGovernment.GetRulerTitle], але звіти наших шпигунів, які підслухали їхні розмови, підтвердили це."
  flavor_chi.2216.a: "Компенсувати їм."
  flavor_chi.2216.b: "Ми нічого не робитимемо, доки вони не звернуться до нас з цього приводу."
  flavor_chi.2217.title: "Скандал при [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_chi.2217.desc: "Під час аудієнції з [ROOT.GetCountry.GetGovernment.GetRulerTitle] член [ROOT.GetCountry.GetGovernment.GetCourtTitle] висловив найогидніші слова про наших [ShowCultureGroupName('chinese_group')] відвідувачів, чим завдав їм великої образи. Якщо нічого не буде зроблено, $expedition_name_treasure_voyage$ може повідомити про цей інцидент [expedition_initiator.GetGovernment.GetRulerTitle]."
  flavor_chi.2217.a: "Принести урочисті вибачення."
  flavor_chi.2217.b: "Наділити їх дарами вибачення."
  flavor_chi.2217.c: "Хто ми такі, щоб карати своїх?"
  flavor_chi.2218.title: "Гідне ставлення"
  flavor_chi.2218.desc: "Еліти, що очолюють $expedition_name_treasure_voyage$, вельми задоволені нашою гостинністю та різноманітними привілеями, якими ми їх наділили. Окрім очевидного обміну даниною, ми дозволили та допомогли їм у ремонті їхніх кораблів. Можливо, вони не показують цього прямо, але ми знаємо, що вони цілком задоволені ставленням."
  flavor_chi.2218.a: "Гостинність — запорука успіху!"
  flavor_chi.2218.b: "Не дозволяйте їм скласти хибне уявлення."
  chi_neighboring_nations_might_get_cb_on_us: "Сусідні [Concept('nations', 'CONCEPT_PLACEHOLDER')|e], відвідані $expedition_name_treasure_voyage$, отримають шанс оголосити [Concept('war', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetName] за їхньої підтримки."
  not_is_treasure_voyage_active: "Наразі жодна $expedition_name_treasure_voyage$ не активна."
  chinese_treasure_expeditions_when_expedition_returns: "Коли експедиція повернеться до [expedition_initiator.GetName]:"