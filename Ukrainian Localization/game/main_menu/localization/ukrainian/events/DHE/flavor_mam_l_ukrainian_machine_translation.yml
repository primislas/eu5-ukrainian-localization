l_english:
  flavor_mam.1.title: "Турки взяли Константинополь"
  flavor_mam.1.desc: "Османське захоплення Константинополя добре сприйняте в Каїрі. Поразка невірних справді славна, і ходять чутки про велику кількість святкувань у місті. Ми запланували великий візит посла до османського султана і надішлемо йому славні дари."
  flavor_mam.1.a: "Напишіть вірш Султану!"
  mam_poem_recieved: "Особиста хвалебна поема"
  flavor_mam.1.b: "Підтримати святкування."
  flavor_mam.2.title: "Міське планування [ShowLocationNameWithNoTooltip('cairo')]"
  flavor_mam.2.desc: "Багато зусиль було докладено для покращення та розвитку інфраструктури [ShowLocationName('cairo')]. Це принесе велику користь у майбутньому."
  flavor_mam.2.historical_info: "Султан Абу Аль-Наср Сайф ад-Дін Аль-Ашраф Кайтбей був відомий своєю великою зацікавленістю в міському плануванні, особливо в [ShowLocationNameWithNoTooltip('cairo')]. У 1457 році Султан наказав побудувати дві нові громадські лазні та велику спільну резиденцію в районі Байн аль-Касрайн. У той час він вирішив розширити дорогу, що виходила з нього, головну магістраль Каїра, відому як Касаба. Це зруйнувало кілька старих споруд, але в кінці кінців рух став набагато швидшим, і, за словами важливих істориків, це значно принесло користь широкій публіці."
  flavor_mam.2.a: "[ROOT.GetCountry.GetReligion.GetGodName] Великий!"
  flavor_mam.3.title: "Король Кіпру"
  flavor_mam.3.desc: "У 1458 році Султан прийняв позашлюбного сина Короля Кіпру, який намагався вирвати корону свого батька у своєї зведеної сестри, що стала королевою. Султан прикрасив його «почесною мантією» і пообіцяв посадити його на трон Короля Кіпру. Коли Королева запропонувала велику данину Каїру, Султан поступився і визнав владу Королеви над Кіпром. Оскільки Жак подружився з кількома $mamluk$ охоронцями, вони протестували і напали на кіпрське посольство на знак протесту.\nЩо нам робити?"
  flavor_mam.3.a: "Надіслати посольство на Кіпр"
  flavor_mam.3.b: "Те, що роблять невірні, для нас не має значення"
  flavor_mam.4.title: "Посольство $mamluk$ висуває нам вимоги!"
  flavor_mam.4.desc: "Посольство з Каїра висуває нам серйозні вимоги. Вони стверджують, що [target_character.GetName], позашлюбний син колишнього Короля Кіпру, є законним правителем нашого Острова. Що нам з цим робити?"
  flavor_mam.4.a: "Посадити його як законного Короля!"
  flavor_mam.4.b: "Підкупити їх..."
  flavor_mam.4.c: "Ігнорувати невірних!"
  mam_refused_james: "Відмовлено Королю Жаку"
  flavor_mam.5.title: "Новини з Кіпру!"
  flavor_mam.5.desc: "Посольство повертається з новинами, що наш добрий друг [target_character.GetName] тепер Король Кіпру. Він буде надійним союзником на довгий час і слухняним васалом [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_mam.5.a: "Це справді гарні новини..."
  mam_installed_ruler: "Жака встановлено"
  flavor_mam.6.title: "Кораблі, наповнені золотом, у гавані!"
  flavor_mam.6.desc: "Здається, правителі Кіпру вирішили спорожнити свої скарбниці, щоб ми забули про всі претензії якогось невірного дворянина, якого ми раніше приймали як гостя."
  flavor_mam.6.a: "Як його звали знову??"
  flavor_mam.7.title: "Кіпр непокірний!"
  flavor_mam.7.desc: "[GetCountry('CYP').GetLongName] відмовляється від наших вимог і стверджує, що Жак — син повії, а наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] — не хто інший, як брудний невірний."
  flavor_mam.7.a: "Це законна причина для війни!"
  flavor_mam.8.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_mam.8.desc: "[target_artist.GetName] був відомим єгипетським істориком, який належав до $mamluk$ еліти Каїра. Він навчався у провідних істориків та вчених, таких як аль-Айні та аль-Макрізі. Він найбільш відомий своєю багатотомною хронікою Єгипту та $mamluk$ Султанату, яка була написана в анналістичному стилі з точними датами для більшості подій. Він мав привілейований доступ до Султанів та їхніх записів, щоб створити її.\nЯк нам вчинити?"
  flavor_mam.8.a: "Підтримати його повністю!"
  chronicle_of_egypt: "Хроніка Єгипту"
  flavor_mam.8.b: "Відмовити йому в доступі до наших записів"
  flavor_mam.10.title: "Пожежа в [target_location.GetNameWithNoTooltip]"
  flavor_mam.10.desc: "У 1481 році серйозна пожежа охопила Мечеть Пророка в [target_location.GetName]. Султан доклав багато зусиль, щоб ґрунтовно відновити її до повної пишноти.\nЩо нам робити?"
  flavor_mam.10.a: "Ми відновимо її!"
  flavor_mam.10.b: "Це не наша справа..."
  flavor_mam.11.title: "Спільні вороги в Османській імперії"
  flavor_mam.11.desc: "Османи вже деякий час є нашим головним суперником, а їхній експансіонізм загрожує нашій державі ще довше. Їхні експансіоністські амбіції в Середземномор'ї також призвели до конфлікту з християнськими державами. В історії $mamluks$ та король Фердинанд II Арагонський уклали тимчасовий союз між 1488 і 1491 роками, спрямований проти османів, де іспанці обіцяли 50 каравел проти Османської імперії."
  flavor_mam.11.a: "Навіть християни можуть бути союзниками"
  mam_anti_ottoman_friends: "Османи — спільний ворог"
  flavor_mam.12.title: "Спільні вороги в Османській імперії"
  flavor_mam.12.desc: "Велике розширення Османської імперії в Середземномор'ї не лише занепокоїло наше найхристиянське царство, але й дуже занепокоїло $mamluks$. В історії $mamluks$ та король Фердинанд II Арагонський уклали тимчасовий союз між 1488 і 1491 роками, спрямований проти османів, де іспанці обіцяли 50 каравел проти Османської імперії."
  flavor_mam.12.a: "Навіть мусульманська країна може бути союзником..."
  flavor_mam.15.title: "Португальсько-$mamluk$ Торгові війни"
  flavor_mam.15.desc: "Коли португальські торговці відкрили шлях навколо [ShowContinentName('africa')] до Індії, вони почали перенаправляти прибуткову східну торгівлю навколо [ShowContinentNameWithNoTooltip('africa')] замість Червоного моря. Коли це сталося, вони вступили в конфлікт з $mamluk$ Султанатом в Єгипті. У 1505 році $mamluk$ Султан наказав здійснити першу експедицію проти португальців. Флоти були побудовані на Червоному морі та відправлені воювати з португальцями в Індійському океані. У 1509 році португальцям нарешті вдалося знищити $mamluk$ Флот у битві при Діу, вигравши війну.\nЩо нам робити?"
  flavor_mam.15.a: "Християн треба зупинити"
  surrender_the_trade: "Здати торгівлю"
  flavor_mam.15.b: "У нас є інші джерела доходу"
  flavor_mam.16.title: "Португальсько-$mamluk$ Торгові Війни"
  flavor_mam.16.desc: "Коли португальські торговці відкрили шлях навколо [ShowContinentName('africa')] до Індії, вони почали перенаправляти прибуткову східну торгівлю навколо [ShowContinentNameWithNoTooltip('africa')] замість Червоного моря. Коли це сталося, вони вступили в конфлікт з $mamluk$ Султанатом в Єгипті. У 1505 році $mamluk$ Султан наказав здійснити першу експедицію проти португальців. Флоти були побудовані на Червоному морі та відправлені воювати з португальцями в Індійському океані. У 1509 році португальці нарешті успішно ліквідували $mamluk$ Флот у битві при Діу, вигравши війну."
  flavor_mam.16.a: "І ми виграємо цю війну..."
  flavor_mam.17.title: "$mamluk$ Просування"
  flavor_mam.17.desc: "Основа нашої армії та одні з найвпливовіших членів нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] складаються з $mamluks$. Колишні раби, які були куплені або отримані з далеких земель, це одні з найкращих чоловіків, яких виховала наша країна. Як тільки їх привозять до [target_capital.GetName], їм надають житло та добре ставлення, що різко контрастує з їхнім попереднім життям.\n\nЗ того часу, і як тільки вони навертаються, їх навчають багатьом мистецтвам: вивченню релігійних текстів, вдосконаленню тіла та опануванню військової справи. Через цей процес народжуються люди заслуг та досконалості, деякі з яких можуть згодом висунути свою кандидатуру на трон..."
  flavor_mam.17.a: "Підвищити [target_character.GetShortNameWithNoTooltip]."
  flavor_mam.17.b: "[target_character2.GetShortNameWithNoTooltip] служитиме."
  found_dynasty_target_location_tt: "Засновує нову [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName]"
  flavor_mam.100.title: "Наслідки [mansa_musa.GetNameWithNoTooltip]"
  flavor_mam.100.desc: "Паломництво [mansa_musa.GetName] у 1325 році було чудовим видовищем для нашого народу. Чого ніхто не очікував, так це щедрості Манси, який подорожував нашою землею, щоб дістатися до [ShowLocationName('mecca')]. Під час своєї подорожі великий [GetCountry('MAL').GetGovernment.GetRulerTitle] роздавав [ShowGoodsName('goods_gold')], [ShowGoodsName('gems')] та інші безцінні товари всім людям.\n\nХоча [ROOT.GetCountry.GetReligion.GetGodName] може благословити його душу, його дії мали непередбачені наслідки для нашої економіки. Наші ринки переповнені золотом [mansa_musa.GetShortNameWithNoTooltip], що призвело до різкого падіння його вартості. Нині наслідки далеко не такі погані, як багато років тому, проте його вплив все ще помітний."
  flavor_mam.100.a: "Сподіваємося, наступний Манса буде мудрішим у своїй щедрості."
  mam_mansa_musas_visit: "Наслідки Манси Муси"
  flavor_mam.18.title: "Чистки [target_character.GetNameWithNoTooltip]"
  flavor_mam.18.desc: "Коли церемонія коронації [target_character.GetName] добігає кінця, тіньові махінації змінюються... Шепіт про зраду доходить до вух наших довірених осіб, і незабаром стає очевидним, що багато $mamluks$ старої гвардії незадоволені поточним станом справ. Чи це чутка, чи факт, ніхто не може сказати напевно.\n\nБаланс сил – це делікатне мистецтво, і, можливо, ми повинні розглянути можливість заміни цих старих людей нашими власними, які, теоретично, зберігають беззаперечну лояльність."
  flavor_mam.18.a: "Очистити їх усіх!"
  flavor_mam.18.b: "Ми не можемо кинути виклик їхній владі."
  mam_backstabs_later_tt: "$mamluks$, що вижили, можуть спричинити нам проблеми пізніше..."
  flavor_mam.19.title: "[target_character.GetNameWithNoTooltip] Зіткнення з [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_mam.19.desc: "Для людини досягти вершини влади – це солодке відчуття. Бути пониженим або позбавленим впливу – це вдесятеро гіркіше. Такий випадок з [target_character.GetName], який вірно служив під керівництвом [target_character3.GetName]. Колись могутній та впливовий $mamluk$, цей старий пес тепер проводить [target_character.GetHerHis] дні, сердито плетучи інтриги та гірко сперечаючись навколо [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] погрози порушують порядок нашого устрою. Ми повинні впоратися з цим заворушенням, перш ніж воно пошириться."
  flavor_mam.19.a: "Ми не будемо розважати роздуми минулої епохи."
  flavor_mam.19.b: "Надати шляхетну посаду одному з членів [target_character.GetHerHis] родини..."
  flavor_mam.19.c: "Познайомити [target_character.GetHerHim] з ножем."
  flavor_mam.20.title: "[target_character.GetNameWithNoTooltip] Зіткнення з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_mam.20.desc: "Протягом останніх кількох тижнів впливові члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вступили в сутички з одним із $mamluks$ старої гвардії, [target_character.GetName]. Плоди суперечки – не що інше, як місцева адміністрація в [target_province.GetName]. За свідченнями очевидців, між двома фракціями спалахнули сутички, які постійно порушують мир. Якщо ми не діятимемо, така поведінка лише пошириться, як лісова пожежа..."
  flavor_mam.20.a: "Геть [target_character.GetHerHis] голову."
  flavor_mam.20.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] помиляються!"
  people_in_bl_will_dislike_that_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.21.title: "Зловживання владою в [target_location.GetNameWithNoTooltip]"
  flavor_mam.21.desc: "До нашої уваги дійшло, що відколи [target_character2.GetName] було короновано, [target_character.GetShortName] відмовляється збирати податки зі своєї місцевої твердині в [target_location.GetName] і замість цього привласнює їжу, ресурси та свободи місцевих жителів, що призводить до зловживань у масштабах провінції, які загрожують процвітанню!"
  flavor_mam.21.a: "Нехай [target_character.GetHerHim] робить, що [target_character.GetSheHe] хоче."
  flavor_mam.21.b: "[target_character.GetSheHe|U] перетнув межу!"
  target_province_local_abuses_modifier_tt: "[Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] отримують [ShowModifier('local_abuses_modifier')] на #Y 5#! років, а місцеві [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.22.title: "Старі суперечки з новими"
  flavor_mam.22.desc: "Оскільки нове покоління $mamluks$ захоплює кожен аспект нашої великої країни, багато представників старої гвардії чинять опір цим змінам. У спробі втриматися при владі, [target_character2.GetName] висунув скарги на своє ставлення з боку [target_character.GetName], якому нещодавно було надано колишню посаду."
  flavor_mam.22.a: "Станьте на бік [target_character2.GetShortNameWithNoTooltip], старі звичаї слід поважати."
  flavor_mam.22.b: "Позбудьтеся порушника спокою!"
  based_on_target_character2_importance_tt: "Виходячи з важливості та впливу [target_character2.GetShortName]:"
  flavor_mam.23.title: "Мечеть-медресе [target_character.GetNameWithNoTooltip]"
  flavor_mam.23.desc: "Нещодавно замовлене [target_character.GetName], прекрасне мечеть-медресе гордо стоїть у центрі [target_location.GetName], немов коштовність корони. Його розмір досить значний, що є свідченням майстерності наших інженерів. Напис на стіні будівлі вітає головного архітектора за його блискуче використання інноваційних дизайнерських технік та турботу про робітників, оскільки ніхто не захворів під час будівництва."
  flavor_mam.23.historical_info: "Побудована десь між 1356 і 1363 роками за часів правління Бахрі $mamluk$ під керівництвом султана Ан-Насіра Хасана, мечеть виділяється своїм грандіозним масштабом і новаторськими архітектурними особливостями. Навіть сьогодні вона залишається однією з найвражаючих історичних пам'яток Каїра. Кажуть, що будівництво тривало близько 3 років, тоді як витрати на робочу силу та управління проектом оцінюються приблизно в 30 000 дирхамів щодня. Проект контролював Мухаммад ібн Білік аль-Мухсіні, місцевий шляхтич."
  flavor_mam.23.a: "Ознака нашого процвітання та благочестя!"
  flavor_mam.24.title: "Політична нестабільність"
  flavor_mam.24.desc: "Смерть [target_character2.GetName] призвела до виснаження нашої скарбниці та впливу. З кожним днем сили, які колись поважали нашу владу та виконували наші накази, тепер відвертаються від нас і протистоять нам. [ROOT.GetCountry.GetGovernment.GetCourtTitle] лежить у руїнах, і кожен наступний правитель не може стабілізувати нашу руйнівну легітимність. З цією метою [target_character.GetName] є лише останнім, хто намагається врятувати цю жахливу ситуацію. Незважаючи на його зусилля, шляхта та $mamluks$ відкрито зневажали наше ім'я."
  flavor_mam.24.a: "Це лише сумний стан справ..."
  flavor_mam.24.historical_info: "Насправді, 1341 рік ознаменувався смертю Аль-Насіра Мухаммада. Після його смерті Імперія побачила послідовність понад 10 султанів за короткий проміжок у 15 років, деякі навіть правили менше кількох місяців. Цей період характеризується політичною нестабільністю, до такої міри, що більшість фігур були султанами лише за назвою, не маючи реальної влади."
  modifier_goes_away_if_90_legitimacy_tt: "Цей [Concept('modifier] буде видалено, якщо ми досягнемо #Y 90#! [government_power', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.25.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] за назвою?"
  flavor_mam.25.desc: "Останні кілька років наша політична влада була під питанням. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та $mamluks$ прагнули скористатися хаосом, в який занурився наш [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Однак під керівництвом [target_character.GetName] ми відновили порядок у наших володіннях, приборкавши всі неслухняні елементи в нашій адміністрації та поклавши край дуже бурхливій ері!"
  flavor_mam.25.a: "Ніколи не було жодних сумнівів."
  flavor_mam.26.title: "Цитадель [target_location.GetNameWithNoTooltip]"
  flavor_mam.26.title_fallback: "Цитадель [ShowLocationNameWithNoTooltip('cairo')]"
  flavor_mam.26.desc: "Осередок знань, просвітництва та жвавої торгівлі між глибинами [ShowContinentName('africa')] та Середземномор'ям, [target_location.GetName] є серцем нашого зростаючого [ROOT.GetCountry.GetFlavorRank]. Цитадель служила поколінням найвидатніших і найпрестижніших правителів. Нашому нинішньому [ROOT.GetCountry.Custom('GetRulerOrRegentTitle')] нещодавно були представлені амбітні плани щодо розширення її різних аспектів, що включатиме нову мечеть-медресе, розширений зал для аудієнцій, а також центр для виробництва Кісви."
  flavor_mam.26.a: "Дуже добре."
  flavor_mam.26.b: "Натомість ми будемо ощадливими."
  unlocked_ablaq_palace_tt: "Ми розблокували цю [Concept('building', 'CONCEPT_PLACEHOLDER')|e] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e] '$flavor_mam.26.title_fallback$'"
  flavor_mam.27.title: "Авлад аль-Нас"
  flavor_mam.27.desc: "На тлі політичної нестабільності та військової стагнації багато реформаторів у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували нове покоління солдатів, щоб замінити наших старіючих і нерішучих $mamluks$. Відомі як «Діти Народу», ці елітні солдати не будуть продуктом рабства чи звільнення."
  flavor_mam.27.a: "Це необхідно."
  flavor_mam.27.b: "Ми не можемо порушувати статус-кво."
  enables_awlad_al_nas: "Ми отримаємо доступ до [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('awlad_al_nas_policy')] для [ShowLawName('mamluk_army_law')]"
  flavor_mam.28.title: "Занепад $a_halqah_unit$"
  flavor_mam.28.desc: "Протягом багатьох років наша увага у військових справах змістилася від допоміжних військ. Масштабні руйнування, спричинені нещодавніми епідеміями, у поєднанні зі спробою реформування нижчих чинів та перерозподілом земель ікта призвели до цього. Солдати, яким колись була дарована велика слава та престиж супроводжувати наших $mamluks$ у битві, тепер стали розбійниками, їхні лави скомпрометовані.\n\nНещодавні зміни у вимогах до їхньої реєстрації призвели до того, що військова підготовка не є передумовою для членства в цих підрозділах. Ситуація настільки погана, що багато загонів $a_halqah_unit$ складаються з літніх або інвалідів, або навіть дітей..."
  flavor_mam.28.a: "Ми повинні негайно переорієнтувати наші військові плани!"
  flavor_mam.28.b: "Питання, що не викликає занепокоєння."
  flavor_mam.29.title: "Династійні писарі адміністрації $mamluk$"
  flavor_mam.29.desc: "Згуртована та високопрофесійна каста бюрократів, наші писарі та члени кабінету є гвинтиками, що підтримують баланс нашого великого [ROOT.GetCountry.GetFlavorRank] та його адміністративного апарату. Чоловіки, обрані для служби в ньому, є одними з наших найкращих і найяскравіших! Справді, кожен з них добре обізнаний у низці тем, таких як політична теорія, $common_string_quran$, наука, мистецтво, і навіть проза та поезія.\n\nОфіси, які займають ці мудрі особи, є життєво важливими для нашого процвітання. Від давадара, майстра чорнильниці, який іноді служить головним секретарем, до катіба аль-сірра, приватного радника [target_character99.GetShortName] та сахіба дивана аль-інша, голови канцелярії."
  flavor_mam.29.a: "Ми повинні підтримувати обізнаних радників."
  flavor_mam.29.b: "Зосередимо наші зусилля на збереженні тексту та традицій."
  flavor_mam.29.c: "Канцелярія має пріоритет."
  based_on_average_adm_cabinet_character_total_abilities_tt: "На основі середнього [Concept('adm', 'CONCEPT_PLACEHOLDER')|e] нашого [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]:"
  based_on_average_dip_cabinet_character_total_abilities_tt: "На основі середнього [Concept('dip', 'CONCEPT_PLACEHOLDER')|e] нашого [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]:"
  based_on_average_mil_cabinet_character_total_abilities_tt: "На основі середнього [Concept('mil', 'CONCEPT_PLACEHOLDER')|e] нашого [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]:"
  flavor_mam.30.title: "Поділ [ShowRegionNameWithNoTooltip('egypt_region')]"
  flavor_mam.30.desc: "Наші землі простягаються за межі [ShowRegionName('egypt_region')] та [ShowAreaName('levant_area')]. Багато людей різного походження, традицій та поглядів опинилися під нашим прапором. Щоб належним чином керувати таким царством, ми повинні забезпечити ретельне розмежування нашої країни. Щоб приділяти пильну увагу місцевому самоврядуванню, забезпечити процвітання та слухняність, ми повинні інвестувати наші дорогоцінні монети..."
  flavor_mam.30.a: "Варте зусилля."
  flavor_mam.30.b: "Нам байдуже до таких дрібниць."
  cost_scale_with_num_locations_tt: "Вартість цього заходу залежатиме від кількості наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.31.title: "Реформи Устадара"
  flavor_mam.31.desc: "Економічне безгосподарність, спустошення війни та повстання нашого народу призвели до значної заборгованості в нашій скарбниці. З часом наші радники все більше турбуються про погашення кожного кредиту. Коли деякі з них наближаються до [target_character.GetName], вони висувають пропозицію повністю пограбувати все наше селянство, у відчайдушній спробі виконати наші фінансові зобов'язання..."
  flavor_mam.31.a: "Відчайдушні часи."
  flavor_mam.31.b: "Бери, що можеш, але дбай про людей."
  flavor_mam.31.c: "Не будемо порушувати спокій..."
  extreme_fiscal_reforms_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втратять #R -25%#! свого [Concept('province', 'CONCEPT_PLACEHOLDER')|e] [Concept('food', 'CONCEPT_PLACEHOLDER')|e], [ShowNamedValue('prosperity_severe_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], а їхні [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  mild_fiscal_reforms_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втратять #R -20%#! свого [Concept('province', 'CONCEPT_PLACEHOLDER')|e] [Concept('food', 'CONCEPT_PLACEHOLDER')|e], [ShowNamedValue('prosperity_mild_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], а їхні [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.31.historical_info: "На початку XV століття мало що відомо про спроби відновити фінансову стабільність у $mamluk$ володіннях. Однак в одному випадку устадар, який керував приватною канцелярією (dīwān al-mufrad), намагаючись поповнити королівську скарбницю, отримав завдання провести масштабні фіскальні експедиції в провінції. Під час цих експедицій податки збиралися примусово, процес, який дуже нагадував грабунок, хоча й під приводом стягнення несплачених боргів."
  flavor_mam.32.title: "Удосконалення Фурусії"
  flavor_mam.32.desc: "[ROOT.GetCountry.GetAdjective] держава здавна покладалася на свою унікальну військову доктрину, Фурусію, набір лицарських практик, що кореняться як у [ShowReligionGroupAdjective('muslim')] принципах, так і в стародавніх воїнських традиціях. Цей військовий кодекс, що передавався століттями, наголошує на дисципліні, верховій їзді та ближньому бою, слугуючи основою наших сил. Однак, оскільки війна розвивається з новими тактиками та технологіями як зі Сходу, так і з Заходу, деякі серед нашої військової еліти виступають за вдосконалення та інституціоналізацію цих принципів."
  flavor_mam.32.a: "Докласти зусиль для інституціоналізації Фурусії."
  flavor_mam.32.b: "Наші армії функціонують досить добре."
  flavor_mam.33.title: "Прибуття [target_character.GetNameWithNoTooltip]"
  flavor_mam.33.desc: "Видатний вчений та історик [target_character.GetName], чиї праці та теорії з історії, соціології та економіки здобули визнання по всьому [ShowRegionName('maghreb_region')], прибув до [ShowLocationName('cairo')]. Як один з найінноваційніших умів нашого часу, [target_character.GetHisHer|U] ідеї могли б послужити нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] неоціненним чином, направляючи нас не лише в управлінні, а й у розумінні основних принципів, що зміцнюють державу."
  flavor_mam.33.a: "Запросити [target_character.GetHimHer] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_mam.33.b: "Ми не можемо дозволити собі інвестувати в науковців зараз."
  flavor_mam.33.historical_info: "Халдун був видатним арабським істориком, філософом і соціологом, якого широко вважають одним із засновників історіографії, соціології та економіки. Його праці виклали новаторські теорії, які значно пізніше були сформовані в соціальні науки."
  flavor_mam.34.title: "Сімейна трагедія"
  flavor_mam.34.desc: "Відомий вчений [khaldun.GetName] зазнав невимовної втрати. [khaldun.GetHisHer|U] родина, яка вирушила з [GetCountry('TUN').GetName], щоб приєднатися до [khaldun.GetHimHer] у [ShowLocationName('cairo')], зіткнулася з трагічною долею, коли їхній корабель потрапив у сильний шторм поблизу [ShowLocationName('alexandria')]. Судно затонуло, перш ніж змогло дістатися безпечного місця, і жодних вцілілих не було знайдено. Ця руйнівна новина занурила [khaldun.GetNameWithNoTooltip] у глибокий смуток, і [khaldun.GetHisHer] колись жвавий дух тепер здається затьмареним горем. [ROOT.GetCountry.GetGovernment.GetCourtTitle] відчуває тягар [khaldun.GetHisHer] втрати, і багато хто задається питанням, як найкраще підтримати нашого шановного радника в ці важкі часи."
  flavor_mam.34.a: "Надати [khaldun.GetHimHer] відпустку, щоб оплакати [khaldun.GetHisHer] втрату."
  flavor_mam.34.b: "Трагедія – це приватна справа, і життя має тривати."
  flavor_mam.34.historical_info: "Султан Баркук мав тісні та шанобливі стосунки з Халдуном. Цей зв'язок спонукав Баркука до переговорів з правителем Тунісу, щоб дозволити родині Халдуна залишити Північну Африку та приєднатися до нього в Каїрі. Трагічно, під час їхньої подорожі корабель, що перевозив родину Халдуна, затонув поблизу гавані Александрії, що призвело до загибелі всіх на борту."
  flavor_mam.35.title: "[khaldun.GetNameWithNoTooltip] просить фінансування"
  flavor_mam.35.desc: "До прибуття в [ShowRegionName('egypt_region')] [khaldun.GetName] присвятив [khaldun.GetHerselfHimself] написанню $kitab_al_ibar$, монументальної історії, спочатку призначеної для хроніки берберів та їхніх суспільств. Тепер, натхненний [khaldun.GetHisHer] часом у [ShowRegionNameWithNoTooltip('egypt_region')], [khaldun.GetNameWithNoTooltip] прагне розширити [khaldun.GetHisHer] працю до універсальної історії. Однак такий амбітний проєкт вимагає значних ресурсів для підтримки досліджень, матеріалів та помічників. [khaldun.GetNameWithNoTooltip] звернувся до [target_ruler.GetName], шукаючи фінансування для завершення цього шедевра."
  flavor_mam.35.a: "Надати необхідні кошти."
  flavor_mam.35.b: "Ми не можемо виділити кошти."
  flavor_mam.36.title: "[khaldun.GetNameWithNoTooltip] завершує $kitab_al_ibar$"
  flavor_mam.36.desc: "Наші інвестиції в наукову працю [khaldun.GetName] принесли надзвичайні плоди. Після років відданості [khaldun.GetSheHe] завершив $kitab_al_ibar$, шедевр, що перевершує всі очікування. Те, що починалося як історія [ShowCultureName('mozabite')] народів, перетворилося на універсальну історію, яка досліджує піднесення та падіння цивілізацій, а також глибші філософські аспекти людського суспільства. [khaldun.GetHisHer|U] проникливі теорії будуть резонувати крізь покоління, і вчені звідусіль неодмінно прагнутимуть вивчати його праці."
  flavor_mam.36.a: "Славне досягнення!"
  flavor_mam.36.historical_info: "$kitab_al_ibar$ — це всеосяжна історична енциклопедія, яка не тільки досліджує історію світу, але й заглиблюється в різні концепції, такі як соціальна згуртованість та динаміка політичного й релігійного впливу на суспільство. $kitab_al_ibar$ є однією з найраніших спроб систематично вивчати історію та суспільство, використовуючи науковий та аналітичний підхід, що має тривалий вплив на галузі історії, соціології та політології."
  flavor_mam.37.title: "Найкращий учень [khaldun.GetNameWithNoTooltip]"
  flavor_mam.37.desc: "Наше рішення вітати шановного вченого [khaldun.GetName] у [ShowLocationName('cairo')] виявилося плідним. [khaldun.GetHisHer|U] монументальна праця надихнула покоління вчених та істориків, а [khaldun.GetHisHer] вчення продовжують формувати уми тих, хто навчається під [khaldun.GetHimHer] керівництвом. Серед найперспективніших учнів [khaldun.GetHisHer] є [target_character.GetName], блискучий історик із палким інтересом до багатої історії [ShowRegionNameWithNoTooltip('egypt_region')] та ширшого світу. [target_character.GetSheHe|U] тепер готовий служити [ROOT.GetCountry.GetName], пропонуючи [target_character.GetHisHer] досвід у записі та збереженні нашої спадщини."
  flavor_mam.37.a: "Чудове доповнення до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_mam.38.title: "Війни [ShowCultureNameWithNoTooltip('bedouin_culture')] порушують торгівлю"
  flavor_mam.38.desc: "Постійні сутички та суперництво між племенами [ShowCultureName('bedouin_culture')] загострилися, створюючи серйозні перебої на наших торгових шляхах. На купців та каравани часто нападають, товари грабують, а колись надійні торгові шляхи стали небезпечними для подорожей. Збитки для нашого доходу зростають, а нестабільність загрожує нашому впливу на критично важливі торгові мережі."
  flavor_mam.38.a: "Фінансувати місцеву владу для їх придушення."
  flavor_mam.38.a.tt: "[ShowCultureNameWithNoTooltip('bedouin_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у кожній володінні [Concept('location', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.38.b: "Нам не слід втручатися в їхні племінні справи."
  flavor_mam.39.title: "Переселення племен [ShowCultureNameWithNoTooltip('bedouin_culture')]"
  flavor_mam.39.desc: "Щоб вирішити постійні конфлікти між племенами [ShowCultureName('bedouin_culture')], що порушують торгівлю та мир у нашому [ROOT.GetCountry.GetFlavorRank], деякі радники запропонували переселити окремі племена до [ShowAreaName('upper_egypt_area')]. Розділення їх від конкуруючих груп, сподіваємося, зменшить шанси на міжусобиці та має підтримувати стабільність у [ROOT.GetCountry.GetFlavorRank]. У разі успіху ця політика може запобігти подальшим племінним сутичкам та захистити наші торгові шляхи, хоча й з певним ризиком для лояльності [ShowCultureNameWithNoTooltip('bedouin_culture')]."
  flavor_mam.39.a: "Перемістити їх до [ShowAreaNameWithNoTooltip('upper_egypt_area')]."
  flavor_mam.39.b: "Зберігати статус-кво."
  flavor_mam.39.historical_info: "Мамлюкський султанат часто переселяв бедуїнські племена для підтримки контролю та стабільності. Переміщуючи племена, мамлюки прагнули запобігти їх перетворенню на джерело повстань та уникнути племінних зіткнень, які часто негативно впливали на торгівлю та внутрішню стабільність."
  flavor_mam.40.title: "Гордість [ShowLocationNameWithNoTooltip('alexandria')]"
  flavor_mam.40.desc: "Величний [ShowBuildingTypeName('lighthouse_of_alexandria')] колись стояв як одне з чудес стародавнього світу. Він був маяком, що безпечно направляв кораблі до гавані, і символом впливу та багатства [ShowLocationName('alexandria')], а його висока форма домінувала над Середземноморським узбережжям протягом століть. На жаль, ця гордість [ShowLocationNameWithNoTooltip('alexandria')] була зруйнована землетрусом у 1323 році, і ніхто не бажав інвестувати в її реконструкцію. Останнім часом багато хто в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонував відновити маяк, підвищивши безпеку гавані [ShowLocationNameWithNoTooltip('alexandria')], а також сигналізуючи про нашу відданість відродженню міста як життєво важливого центру торгівлі та культури в Середземному морі."
  flavor_mam.40.a: "Ми відновимо його колишню славу!"
  flavor_mam.40.b: "Маяк належить історії."
  flavor_mam.41.title: "[ShowBuildingTypeNameWithNoTooltip('al_azhar_madrasa')]"
  flavor_mam.41.desc: "[ShowBuildingTypeName('al_azhar_madrasa')] здавна був центром знань і престижу в [ShowRegionName('egypt_region')]. Колись він був домом для незліченних книг і вчених, але зазнав руйнівних втрат під час переходу [ShowRegionNameWithNoTooltip('egypt_region')] до [ShowReligionName('sunni')] [ShowReligionGroupName('muslim')] під керівництвом Саладіна, який, прагнучи змінити релігійний ландшафт, наказав знищити тисячі [ShowReligionAdjective('shia')] текстів. Відтоді медресе намагається відновити свій колишній статус.\n\nВідновлення [ShowBuildingTypeNameWithNoTooltip('al_azhar_madrasa')] до його колишньої слави вимагатиме значного фінансування, але це може відродити навчання та науку в нашому [ROOT.GetCountry.GetFlavorRank], можливо, навіть запаливши нову [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] Золоту добу."
  flavor_mam.41.a: "Фінансувати його відновлення."
  flavor_mam.41.b: "Його минула слава залишиться лише спогадом."
  flavor_mam.41.historical_info: "Мамлюки доклали значних зусиль для відновлення престижу та слави Аль-Азхара. Він зазнав капітального ремонту: за межами мечеті було побудовано новий коледж, розширено гуртожитки для студентів, а також отримано значні фінансові кошти для підтримки зарплат і стипендій."
  flavor_mam.42.title: "Завоювання [ShowProvinceDefinitionNameWithNoTooltip('cyprus_province')]"
  flavor_mam.42.desc: "З моменту захоплення хрестоносцями під час Третього хрестового походу [ShowProvinceDefinitionName('cyprus_province')] слугував плацдармом для набігів і ворожих дій, спрямованих на [ShowAreaName('levant_area')] та [ShowRegionName('egypt_region')]. Цей острів, стратегічно розташований у Середземному морі, довгий час був занозою в нашому боці, підживлюючи амбіції хрестоносців і порушуючи наш регіональний вплив. Після століть боротьби [ShowProvinceDefinitionNameWithNoTooltip('cyprus_province')] нарешті перебуває під [ROOT.GetCountry.GetAdjective] контролем."
  flavor_mam.42.a: "Відновити його автономне правління."
  flavor_mam.42.a.tt: "[GetCountry('CYP').GetName] буде засновано як наш [ShowSubjectTypeName('vassal')] у [ShowProvinceDefinitionName('cyprus_province')]. Ми передамо їм право власності на [ShowProvinceDefinitionNameWithNoTooltip('cyprus_province')] та наші [Concept('cores', 'CONCEPT_PLACEHOLDER')|e] там."
  flavor_mam.42.b: "Острів належить нам!"
  flavor_mam.42.historical_info: "У 1426 році мамлюки розпочали рішучу кампанію проти Кіпру, кульмінацією якої стала битва при Хірокітії. Ця перемога стала поворотним моментом у давньому конфлікті між мамлюками та Кіпрським королівством. Мамлюки захопили кіпрського короля Януса, що змусило Кіпр прийняти васалітет під владою Мамлюцького султанату."
  flavor_mam.43.title: "Викорінення левантійських язичників"
  flavor_mam.43.desc: "[ShowAreaName('levant_area')] здавна була землею великого релігійного розмаїття. Хоча [ROOT.GetCountry.GetGovernment.GetEstateName('dhimmi_estate')] надає захист цим громадам, зростає занепокоєння, що деякі [ShowReligionGroupAdjective('christian')] віряни можуть підтримувати таємні зв'язки з [ShowReligionGroupAdjectiveWithNoTooltip('christian')] державами за кордоном. Історично ці громади часто ставали на бік наших ворогів під час війни. Деякі радники пропонують застосувати більш рішучий підхід для зміцнення лояльності в регіоні, можливо, заохочуючи навернення цих меншин. Хоча це може сприяти єдності, це також може спровокувати опір і заворушення."
  flavor_mam.43.a: "Зайняти жорстку позицію."
  flavor_mam.43.a.tt: "#Y 25%#! не-[ShowReligionAdjective('sunni')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('levant_area')] будуть навернені до [ShowReligionNameWithNoTooltip('sunni')]"
  flavor_mam.43.b: "Заохочувати їхнє навернення."
  flavor_mam.43.b.tt: "#Y 10%#! не-[ShowReligionAdjective('sunni')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('levant_area')] будуть навернені до [ShowReligionNameWithNoTooltip('sunni')]"
  flavor_mam.43.c: "Залишити ситуацію як є."
  flavor_mam.43.historical_info: "У Сирії мамлюки вдавалися до репресивних дій щодо релігійних меншин, переважно православних і маронітських християн, оскільки їх підозрювали у зв'язках з європейськими країнами та хрестоносцями. Багатьох християн переселили з прибережних районів, щоб вони втратили легкий доступ до християн за межами Султанату."
  flavor_mam.44.title: "Поводження з [ShowCultureNameWithNoTooltip('coptic_culture')] громадою"
  flavor_mam.44.desc: "[ShowRegionName('egypt_region')] має значну [ShowCultureName('coptic_culture')] [ShowReligionAdjective('miaphysite')] популяцію, громаду з глибоким корінням і традиціями, що сягають століть. Хоча багато з них залишалися лояльними та робили внесок в економіку, дехто стверджує, що заохочення навернення допомогло б зміцнити єдність у серці нашого [ROOT.GetCountry.GetFlavorRank]. Ми повинні ретельно розглянути, чи варто наполягати на релігійній відповідності, чи підтримувати поточну систему захищеної толерантності."
  flavor_mam.44.a: "Докласти зусиль для їх навернення."
  flavor_mam.44.a.tt: "#Y 20%#! [ShowReligionAdjective('miaphysite')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('lower_egypt_area')] будуть навернені до [ShowReligionName('sunni')]"
  flavor_mam.44.b: "Залишити поточну ситуацію без змін."
  flavor_mam.44.historical_info: "Під час правління мамлюків у Єгипті навернення коптів в іслам значно прискорилося, зумовлене як соціальним тиском, так і економічними стимулами. XIV століття стало свідком особливо інтенсивної хвилі репресій проти коптської громади, з обмеженнями на будівництво церков, обмеженнями зайнятості та періодичним насильством. Цей період посиленого тиску призвів до помітного збільшення навернень, і до кінця правління мамлюків співвідношення мусульман до коптів у Єгипті змінилося приблизно до 10:1."
  flavor_mam.45.title: "Повінь Нілу"
  flavor_mam.45.desc: "Нещодавні повені вразили Ніл, спричинивши серйозні руйнування в кількох провінціях. Бурхливі води пронеслися через сільськогосподарські угіддя, села та інфраструктуру, залишивши незліченну кількість домівок та засобів до існування в руїнах. Якщо ми не втрутимося з допомогою та ресурсами, збитки лише погіршаться, потенційно призводячи до голоду та загибелі людей."
  flavor_mam.45.a: "Мобілізувати ресурси для допомоги постраждалим від повеней."
  flavor_mam.45.b: "Люди повинні подбати про себе самі."
  flavor_mam.46.title: "Призначення Мухтасіба"
  flavor_mam.46.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] висловили занепокоєння щодо цілісності торгівлі на наших ринках, скаржачись, що нечесні купці часто маніпулюють вагами та мірами, щоб обманювати покупців. Така корупція загрожує процвітанню та репутації нашої торгівлі, і [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] закликають нас створити систему чиновників, відповідальних за забезпечення чесних угод на ринку."
  flavor_mam.46.a: "Інвестувати у створення такої посади."
  flavor_mam.46.b: "Відхилити їхні скарги."
  flavor_mam.46.historical_info: "У мамелюцькому Єгипті мухтасіби були чиновниками, призначеними для нагляду за чесністю на ринку та забезпеченням справедливої торгової практики. Вони контролювали купців і карали тих, хто обманював при зважуванні товарів, часто публічно шмагаючи порушників як засіб залякування. Мухтасіби також використовували посібники, що детально описували поширені хитрощі купців, підвищуючи свою здатність виявляти та запобігати шахрайству."
  flavor_mam.47.title: "[ShowAdvanceNameWithNoTooltip('royal_mamluks')]"
  flavor_mam.47.desc: "Прагнучи захистити [ROOT.GetCountry.GetGovernment.GetRulerTitle] та забезпечити безпеку [ROOT.GetCountry.GetFlavorRank], ми створили елітний корпус, відомий як [ShowAdvanceName('royal_mamluks')]. Ці солдати, відібрані з-поміж наших найкращих воїнів, проходять сувору підготовку та оснащені найкращою зброєю, стаючи символом вірності, дисципліни та неперевершеної майстерності."
  flavor_mam.47.a: "Гордість нашої армії!"
  flavor_mam.48.title: "[ShowInstitutionNameWithNoTooltip('printing_press')] у [ShowLocationNameWithNoTooltip('cairo')]"
  flavor_mam.48.desc: "[ShowReligionAdjective('judaism')] друкар, [target_character.GetName], нещодавно прибув до [ShowLocationName('cairo')] з [ShowRegionName('italy_region')], привізши з [target_character.GetHimHer] імовірно перший [ShowInstitutionName('printing_press')], який коли-небудь бачили на наших землях. Ця революційна технологія, що швидко поширюється по [ShowContinentName('europe')], дозволяє масово виробляти книги, роблячи знання доступнішими, ніж будь-коли раніше. За допомогою цього пристрою ми могли б сприяти грамотності, поширенню ідей і, можливо, отримати перевагу в наукових та адміністративних питаннях. Хоча це іноземна технологія, інвестування в неї може принести користь [ROOT.GetCountry.GetFlavorRank] у довгостроковій перспективі."
  flavor_mam.48.a: "Вітати [target_character.GetHimHer] та дослідити технологію."
  flavor_mam.48.b: "Купити її у [target_character.GetHimHer] та ретельно вивчити."
  flavor_mam.48.c: "Нас це не цікавить."
  flavor_mam.49.title: "Європейці обпливають [ShowContinentNameWithNoTooltip('africa')]"
  flavor_mam.49.desc: "Жахливі новини дійшли до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Дослідники з [ShowContinentName('europe')] відкрили морський шлях навколо [ShowContinentName('africa')], що дозволяє їм отримати прямий доступ до багатств $india$ та оминати наші життєво важливі торгові шляхи. Наші бюргери глибоко стурбовані, побоюючись краху наших ринків, оскільки західні купці наповнюють торгівлю прянощами за нижчими цінами."
  flavor_mam.49.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_mam.49.b: "Оголосити про наші власні дослідницькі місії."
  flavor_mam.49.b.tt: "Розблоковує більше подій, що стосуються [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.49.historical_info: "Оминаючи традиційні сухопутні шляхи та маршрути через Червоне море, контрольовані мамелюками, європейські торговці, особливо португальці, змогли отримати прямий доступ до прибуткових ринків прянощів Азії. Це зменшило роль мамелюків як посередників у торгівлі прянощами, послабивши їхню економіку та зменшивши їхній вплив на торгівлю між Сходом і Заходом."
  flavor_mam.50.title: "Зростаючий попит на корабельне спорядження"
  flavor_mam.50.desc: "Після нашого оголошення про нові дослідницькі місії, ринки по всьому [ROOT.GetCountry.GetFlavorRank] спостерігають сплеск попиту на матеріали для суднобудування. Купці та ремісники прагнуть постачати матеріали для підтримки будівництва флоту, здатного досягати далеких земель та захищати наші торгові інтереси."
  flavor_mam.50.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mam.50.b: "Надати субсидії суднобудівникам і купцям."
  flavor_mam.50.b.tt: "Кожна володіння з [ShowBuildingTypeName('naval_supplies_workshop')] отримує [ShowNamedValue('prosperity_severe_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.51.title: "Затьмарюючи [GetCountry('POR').GetNameWithNoTooltip]"
  flavor_mam.51.desc: "Після років суперництва та напруги ми нарешті затьмарили [GetCountry('POR').GetAdjective] у військово-морській силі. Наш флот тепер є потужною силою, здатною конкурувати з європейським домінуванням у регіоні, що заспокоює наших купців, що ми здатні захистити торгові шляхи [ShowAreaName('red_sea_area')]. Це військове досягнення значно підвищує нашу військово-морську безпеку та дозволяє нам прагнути розширити наш вплив і відновити контроль над прибутковими шляхами спецій."
  flavor_mam.51.a: "Святкуймо нашу військово-морську перевагу!"
  flavor_mam.51.historical_info: "Мамлюксько-португальське військово-морське суперництво розпочалося на початку 16 століття, коли португальці обійшли контрольовані мамлюками торгові шляхи, обпливши Африку. Напруга зросла, коли португальці заснували бази в Індійському океані, а мамлюки, в союзі з Османською імперією, прагнули протистояти португальському впливу, зміцнюючи власні флоти."
  flavor_mam.52.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mam.52.desc: "[target_character.GetName] — досвідчений адмірал з великим досвідом морських битв проти європейських сил у [ShowAreaName('gujarat_area')]. Відомий [target_character.GetHisHer] досвідом у маневруванні кораблями та військово-морській стратегії, [target_character.GetLastNameWithNoTooltip] відточив [target_character.GetHisHer] навички в розпалі бою, захищаючи місцеві сили від іноземних вторгнень. Оскільки ми прагнемо розширити наш військово-морський потенціал і протистояти європейському впливу на [ShowContinentName('indian_ocean_continent')], [target_character.GetHisHer] досвід і лідерство, безсумнівно, зміцнять наш флот."
  flavor_mam.52.a: "Нам потрібен [target_character.GetLastNameWithNoTooltip] як адмірал."
  flavor_mam.52.b: "[target_character.GetSheHe|U] добре служив би нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_mam.52.c: "Використайте [target_character.GetHisHer] досвід, щоб керувати нашими флотами."
  flavor_mam.53.title: "Флот [ShowAreaNameWithNoTooltip('red_sea_area')]"
  flavor_mam.53.desc: "Морська війна довго була вторинною щодо наших сухопутних сил, але нависла загроза європейців, що просуваються в $india$ та [ShowAreaName('red_sea_area')], вимагає нашої уваги. Останнім часом багато повідомлень свідчать, що європейські держави можуть прагнути вторгнутися в наші води. У відповідь ми замовили новий флот, який зараз будується в порту [target_location.GetName]. Залишається лише, щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle] ухвалив своє остаточне рішення щодо типу кораблів, які будуть побудовані."
  flavor_mam.53.a: "Нам потрібна боєздатна сила."
  flavor_mam.53.b: "Пріоритет – транспортування наших армій."
  flavor_mam.54.title: "Піднесення [scope_barquq.GetLastNameWithNoTooltip]"
  flavor_mam.54.desc: "Роки нестабільності та неефективне правління [target_ruler.GetName] залишили [ROOT.GetCountry.GetFlavorRank] у безладі. Багато хто, розчарований нинішнім режимом, шукає лідера, здатного відновити стабільність, і нещодавно згуртувався навколо людини на ім'я [scope_barquq.GetName]. Тепер циркулюють чутки, що [scope_barquq.GetNameWithNoTooltip] планує скинути [ROOT.GetCountry.GetGovernment.GetRulerTitle] і зайняти трон."
  barquq_supporters: "Лоялісти Баркука"
  flavor_mam.54.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] має бути скинутий!"
  flavor_mam.54.b: "[target_ruler.GetNameWithNoTooltip] є законним [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  flavor_mam.54.b.tt: "Усі $slaves$ [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('egypt_region')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднаються до [barquq_support.GetName]"
  flavor_mam.54.historical_info: "Баркук був черкеським рабом, який здобув популярність на тлі політичної нестабільності наприкінці 14 століття. У 1382 році він скористався ослабленим правлінням султана-дитини Ас-Саліха і згуртував багато видатних фракцій, які діяли за троном, щоб підтримати його претензії на владу. Баркук зрештою скинув молодого султана, що ознаменувало кінець династії Бахрі Мамлюків і початок Бурджитського періоду."
  flavor_mam.55.title: "Військово-морська реформа [target_character.GetLastNameWithNoTooltip]"
  flavor_mam.55.desc: "Оскільки європейці продовжують домінувати на морях і загрожувати нашій торгівлі та суверенітету, необхідність значних військово-морських інвестицій очевидна. [target_character.GetName], впливовий військово-морський стратег, запропонував сміливу реформу для відновлення нашої сили на воді. [target_character.GetSheHe|U] стверджує, що залежність від європейського імпорту кораблів лише робить нас вразливими до іноземних розробок та обмежень. Натомість, [target_character.GetSheHe] пропонує значні інвестиції в наші власні верфі, виступаючи за будівництво суден на основі новітніх європейських моделей, але виготовлених місцевими будівельниками та адаптованих до наших потреб."
  flavor_mam.55.a: "Повністю впровадити [target_character.GetHisHer] реформу."
  flavor_mam.55.b: "Адаптувати лише кілька [target_character.GetHisHer] ідей."
  flavor_mam.55.c: "Наразі ми не потребуємо дорогих реформ."
  flavor_mam.55.historical_info: "Велика морська реформа за часів 'Ала' ад-Діна піднесла флот Мамлюків до рівня європейських армад. Ця реформа виявилася вирішальною в таких битвах, як битва при Чаулі 1508 року, де Мамлюки перемогли португальців, які широко вважалися домінуючою морською наддержавою того часу."
  flavor_mam.56.title: "Провінційна система Ніябат"
  flavor_mam.56.desc: "Через постійні племінні війни між племенами [ShowCultureName('bedouin_culture')] було запропоновано низку адміністративних реформ, що розділяють країну на кілька #italic Ніябатів#!, провінцій з більш централізованою формою управління. Ця структура дозволить нам ефективніше керувати справами наших територій, забезпечуючи, щоб кожен регіон управлявся з більшим наглядом. Це також дозволить більш ретельно контролювати племена [ShowCultureNameWithNoTooltip('bedouin_culture')], чиї внутрішні конфлікти часто поширюються на наші більш процвітаючі райони."
  flavor_mam.56.a: "Впровадити реформу."
  flavor_mam.56.a.tt: "Усі [ShowCultureName('bedouin_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.56.b: "Наразі ми повинні зосередитися на інших пріоритетах."
  flavor_mam.56.historical_info: "У світлі постійної нестабільності, спричиненої міжплемінними чварами бедуїнів, султан Баркук оновив єгипетську адміністративну систему, розділивши регіон на три #italic Ніябати#!, провінції, що дозволило мамлюцьким властям краще тримати бедуїнів під контролем."
  flavor_mam.57.title: "[ShowCultureNameWithNoTooltip('bedouin_culture')] Племінна війна"
  flavor_mam.57.desc: "Тривалі племінні чвари між племенами [ShowCultureName('bedouin_culture')] знову виплеснулися з пустелі на наші більш процвітаючі території. Цього разу їхні конфлікти наблизилися до [target_location.GetName], і місцеві жителі бояться, що це може спричинити значні пошкодження майна та забрати життя невинних громадян, які потрапили під перехресний вогонь, якщо ми не втрутимося."
  flavor_mam.57.a: "Ігнорувати інцидент."
  flavor_mam.57.b: "Розгромити їх, перш ніж вони завдадуть шкоди."
  flavor_mam.58.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mam.58.desc: "[target_character.GetName] широко відомий у [ShowLocationName('cairo')] завдяки [target_character.GetHisHer] енциклопедичній праці про природний світ. [target_character.GetHisHer|U] проникливість у зоологію та [target_character.GetHisHer] глибоке розуміння ісламського права принесли [target_character.GetHimHer] величезну повагу як теологу та натуралісту. [target_character.GetSheHe|U] привернув увагу наших радників, які тепер радять [ROOT.GetCountry.GetGovernment.GetRulerTitle] запропонувати [target_character.GetHimHer] посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle], оскільки [target_character.GetHisHer] рідкісний досвід у природному світі міг би принести користь нашому науковому розумінню та освіті."
  flavor_mam.58.a: "Приведіть [target_character.GetHimHer] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_mam.58.b: "Ми не можемо дозволити собі [target_character.GetHisHer] праці."
  flavor_mam.58.historical_info: "Камаль ад-Дамірі був видатним мамлюцьким вченим, юристом і теологом, найбільш відомим своєю всеосяжною зоологічною працею #italic Ḥayāt al-ḥayawān#!, яка систематично збирала знання про тварин і природний світ. Його праця була значущою завдяки детальним описам, класифікаціям та інтеграції зоологічних знань з ісламською юриспруденцією та прислів'ями."
  flavor_mam.59.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mam.59.desc: "Талановитий історик і поет, [target_character.GetName] здобув славу завдяки [target_character.GetHisHer] детальним розповідям про історію, звичаї та останні події [ShowRegionName('egypt_region')]. [target_character.GetHisHer|U] найзначніша праця, #italic Badā'i al-Zuhūr fī Waqā'i al-Duhūr#!, є всеосяжною історією [ShowRegionNameWithNoTooltip('egypt_region')], що охоплює понад 3000 сторінок, відображаючи як велич, так і труднощі нашої землі. Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] був би прикрашений присутністю такої значної особистості."
  flavor_mam.59.a: "Призначити [target_character.GetHimHer] нашим істориком [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_mam.59.b: "[target_character.GetHisHer|U] праці нам не потрібні."
  flavor_mam.59.historical_info: "Ібн Іяс вважається одним з найважливіших істориків пізньосередньовічного Єгипту. Він був очевидцем османського вторгнення до Єгипту в 1517 році і детально задокументував перехід від мамлюцького до османського правління. Його хроніки є безцінними для розуміння соціальних, політичних та економічних умов Єгипту в цей трансформаційний період."
  flavor_mam.60.title: "Охоронець Священних Міст"
  flavor_mam.60.desc: "З [ShowLocationName('mecca')], [ShowLocationName('medina')] та [ShowLocationName('jerusalem')] під нашим прямим правлінням, ми тепер є справжнім щитом [ShowReligionGroupName('muslim')] та охоронцями його найсвятіших місць. Ця священна відповідальність приносить нам престиж, але також вимагає пильності та відданості. Оскільки [target_ruler.GetName] гордо називає [target_ruler.GetHerselfHimself] Охоронцем Священних Міст, паломники з усіх куточків [ShowReligionGroupAdjectiveWithNoTooltip('muslim')|U] світу шукатимуть у нас захисту на своїх священних подорожах, і ми тепер розглядаємося як захисники самої віри. Нехай ми виявимося гідними цього урочистого обов'язку."
  flavor_mam.60.a: "[ROOT.GetCountry.GetReligion.GetGodName] благоволить своїм вірним!"
  flavor_mam.61.title: "Відкриття Розетського каменю"
  flavor_mam.61.desc: "Робітники в місті [ShowLocationName('rashid')] натрапили на незвичайний камінь, вмурований у стіну будівлі, що, здається, був використаний як будівельний матеріал. Камінь виглядає стародавнім, його поверхня вкрита написами трьома різними письменами. Місцеві вчені заінтриговані відкриттям, вважаючи, що воно може приховувати таємниці далекого минулого нашої землі. Ця чудова знахідка захопила цікавість як народу, так і нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]; можливо, вона варта подальшого вивчення."
  flavor_mam.61.a: "Заплатити нашим найкращим умам за вивчення написів."
  flavor_mam.61.tt: "Буде зроблена спроба розшифрувати написи на камені."
  flavor_mam.61.b: "Це не має для нас значення."
  flavor_mam.62.title: "Розшифровка Розетського каменю"
  flavor_mam.62.desc: "Після років самовідданої праці наші вчені зробили неймовірний прорив. Використовуючи свої знання давньогрецької мови, яка є однією з мов, зображених на камені, знайденому в [ShowLocationName('rashid')], вони успішно розшифрували інші написи. Завдяки їхнім зусиллям ми тепер можемо читати та розуміти давньоєгипетське письмо, відкриваючи знання з далекого минулого [ShowRegionName('egypt_region')]. Це відкриття є монументальним досягненням для наших вчених і предметом гордості для [ROOT.GetCountry.GetFlavorRank]."
  flavor_mam.62.a: "Воістину славне досягнення!"
  flavor_mam.62.historical_info: "Розшифровка Розетського каменю була монументальним досягненням, яке дало ключ до розуміння давньоєгипетських ієрогліфів, письма, що було нерозшифрованим майже 1500 років. Камінь містить той самий указ, вигравіруваний трьома письменами: ієрогліфічним, демотичним та давньогрецьким. Оскільки вчені все ще могли читати давньогрецьку, вони використовували її як відправну точку для розшифровки двох інших письменностей."
  flavor_mam.63.title: "[target_character.GetNameWithNoTooltip] переїжджає до [target_country_2.GetNameWithNoTooltip]"
  flavor_mam.63.desc: "Від пісків [target_country.GetName] до [target_country_2.GetAdjective] сяйва,\n[target_character.GetName] гнався за [target_character.GetHerHis] мрією вченого.\nЧерез наші двори та милість [ShowLocationName('granada')],\n[target_character.GetSheHe|U] шукав нової мудрості, правдивішого місця.\nПоклик Нілу, принада вченого,\nУ [target_country_2.GetAdjectiveWithNoTooltip] залах, [target_character.GetHerHis] шлях надійний.\nПроте [target_character.GetSheHe] все ще розмірковував про безмежний потік часу,\nІсторії, викарбувані там, де течуть річки."
  flavor_mam.63.a: "[target_character.GetSheHe|U] веде авантюрне життя!"
  ibn_khaldun_hit_the_road_tt: "[target_character.GetNameWithNoTooltip] переїхав до [target_country.GetLongNameWithNoTooltip]"
  flavor_mam.64.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Спадкоємність"
  flavor_mam.64.desc: "Смерть [ROOT.GetCountry.GetGovernment.GetRuler.GetName] залишила [ROOT.GetCountry.GetNameWithNoTooltip] без [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Усі важливі [ROOT.GetCountry.GetAdjective] домогосподарства [ROOT.GetCountry.GetFlavorRank] закликають свій вплив, щоб мати слово у виборі наступника. Залежно від того, хто переможе, наш новий правитель матиме підтримку різних домогосподарств та різних частин [ROOT.GetCountry.GetFlavorRank]. Лише одне є певним: ті, хто волів би бачити перевагу інтересів своєї групи, не зустрінуть нашого нового [ROOT.GetCountry.GetGovernment.GetRulerTitle] з радістю. Деякі можуть навіть провести решту свого життя, намагаючись обмежити його вплив."
  flavor_mam.64.a: "Нам потрібна підтримка [target_culture.GetNameWithNoTooltip] мамлюків."
  flavor_mam.64.b: "Підтримка [target_culture2.GetNameWithNoTooltip] мамлюків є як ніколи життєво важливою."
  flavor_mam.64.c: "Хоча й не такий важливий, [third_ruler.GetNameWithNoTooltip] виявив майстерність."
  flavor_mam.64.d: "Традиційний мамлюк з наших [target_culture4.GetName] лав."
  flavor_mam.65.title: "[target_location.GetNameWithNoTooltip] Солдати"
  flavor_mam.65.desc: "Хоча $mamluks$ складають ядро наших сил, не вся наша військова міць складається з воїнів-рабів. Місцеві [target_location.GetName] солдати формують значну частину нашої піхоти, і вони також використовуються для охорони та гарнізонної служби.\n\nОднак невеликі шанси на просування та низька оплата не є найкращими мотиваторами, і незрозуміло, наскільки ми можемо довіряти цим людям. Звичайно, їхнє навчання та спорядження часто нехтуються [ROOT.GetCountry.GetGovernment.GetRulerTitle] та місцевими губернаторами в [target_location.GetRank.GetName]. У [target_location.GetArea.GetName] недовіра між місцевими жителями [target_location.GetName] та губернаторами $mamluks$ призвела до заворушень."
  flavor_mam.65.a: "Ми повинні придушити це в зародку!"
  flavor_mam.65.b: "Подивимося, що ми можемо зробити, щоб покращити їхнє становище."
  mam_all_pop_not_of_primary_culture_lose_satisfaction_tt: "Усі [ShowPopTypeName('soldiers')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], які не є частиною [Concept('ROOT.GetCountry.GetCulture.GetName] [culture', 'CONCEPT_PLACEHOLDER')|e], втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.66.title: "Тарх та [ROOT.GetCountry.GetGovernment.GetAdjective] монополії"
  flavor_mam.66.desc: "Наші попередники мудро використовували систему [ROOT.GetCountry.GetGovernment.GetAdjective] монополій для контролю доходів від товарних культур та вишуканих товарів. Однак, зі зменшенням попиту ми втрачаємо гроші на цих інвестиціях. Наш наглядач у [target_location.GetName] повідомляє, що вони не змогли продати свій запас протягом двох років і турбуються, що це коштуватиме державі грошей.\n\nВони пропонують змусити наших підданих купувати ці товари за встановленою ціною, щоб відшкодувати наші інвестиції. Процес, традиційно відомий як Тарх."
  flavor_mam.66.a: "Яка чудова ідея!"
  flavor_mam.66.b: "Нам доведеться просто витримати витрати."
  tarh: "Тарх"
  lack_of_demand_for_fine_goods: "Брак попиту на вишукані товари"
  flavor_mam.67.title: "Повстання $mamluk$ губернатора [target_location.GetName]"
  flavor_mam.67.desc: "Могутній $mamluk$ губернатор створив базу влади в [target_area.GetName] і тепер марширує на [ROOT.GetCountry.GetCapital.GetName]. Ходять чутки про широку підтримку цього $mamluk_pretender$ повстання серед $mamluk$ домогосподарств столиці і навіть у самій цитаделі."
  flavor_mam.67.a: "Кара за зраду – смерть!"
  mamluk_pretender: "$mamluk$ Претендент"
  mam_every_location_in_area_minus_capital_joins_rebellion_tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [Concept('target_area.GetName], які не перебувають у [capital', 'CONCEPT_PLACEHOLDER')|e], приєднаються до [Concept('mamluk_pretender.GetName] [rebel', 'CONCEPT_PLACEHOLDER')|e] і втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mam.68.title: "Фракціоналізм у [ROOT.GetCountry.GetFlavorRank]"
  flavor_mam.68.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] далеко не єдиний власник $mamluk$ у нашому [ROOT.GetCountry.GetFlavorRank]. Домогосподарства впливових звільнених $mamluk$ часто містять стільки ж, якщо не більше, новопривезених рабів зі своїх рідних регіонів. Ці впливові губернатори часто є тими, хто має найбільший вплив під час престолонаслідування, але навіть коли трон зайнятий, вплив $mamluk$ домогосподарств значний у [ROOT.GetCountry.GetAdjective] політиці. [target_character.GetName] має забезпечити, щоб цей фракціоналізм не придушував політику [ROOT.GetCountry.GetCapital.GetName]."
  flavor_mam.68.a: "Ми повинні спробувати налаштувати їх один проти одного."
  flavor_mam.68.b: "Давайте оберемо сторони та підтримаємо сильніші фракції."
  flavor_mam.68.c: "Давайте нічого не робитимемо в цьому фракційному конфлікті."
  flavor_mam.69.title: "Переворот у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_mam.69.desc: "Глибоко невдоволені поганим правлінням [target_character2.GetName], видатні $mamluk$ губернатори на чолі з [target_character.GetName] вчинили дії, щоб скинути нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] і посадити на трон більш здібного воїна."
  flavor_mam.69.a: "Ми не покинемо [target_character2.GetNameWithNoTooltip]."
  flavor_mam.69.b: "Хай живе [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_mam.70.title: "[target_location.GetRank.GetNameWithNoTooltip] [ShowLocationNameWithNoTooltip('cairo')]"
  flavor_mam.70.desc: "Набагато старіший за наш власний [ROOT.GetCountry.GetFlavorRank], [target_location.GetName] прикрашався правителями та завойовниками протягом сотень, якщо не тисяч років. Наведення порядку в цьому лабіринті будівель, від гробниць [target_location.GetRank.GetName] мертвих і нетрів Фустата до гамірних ринків Хан ель-Халілі або великої Цитаделі [target_location.GetNameWithNoTooltip] самої, довго було монументальним завданням для багатьох наших попередників. Проте, як господар [target_location.GetRank.GetNameWithNoTooltip], [target_character.GetName] очікується, що залишить [target_character.GetHerHis] слід на цьому місці, як для його прикраси та розвитку, так і для боротьби з хворобами та підтримання порядку."
  flavor_mam.70.a: "Давайте відремонтуємо суки та Хан ель-Халілі."
  flavor_mam.70.b: "Ми повинні відремонтувати зростаючі нетрі та передмістя."
  flavor_mam.70.c: "Мечеті та Аль-Азхар потребують нашої уваги."
  flavor_mam.70.d: "Прийдешні покоління заздритимуть пам'ятникам, які ми зводимо."
  flavor_mam.70.e: "Зараз ми мало що можемо зробити для громадян."
  bolstered_capital_trade: "Зміцнена столична торгівля"
  flavor_mam.71.title: "Новий Амір аль-Хадж"
  flavor_mam.71.desc: "Паломництво до святих місць [ShowLocationName('mecca')] та [ShowLocationName('medina')] є обов'язком, який кожен [ShowReligionGroupAdjective('muslim')] повинен здійснити хоча б раз у житті. Як [ROOT.GetCountry.GetGovernment.GetRulerTitle], відповідальність за забезпечення безпечного проходу лежить на [target_character.GetName]. Ця посада багато в чому вимагає як хитрості, так і військових здібностей, оскільки шлях може варіюватися від перемоги над рейдерами до переговорів про прохід з місцевими правителями, до прямих погроз або хабарництва. Амір аль-Хадж нестиме загальну відповідальність за каравани Хаджу і матиме велику свободу у тому, як забезпечити стабільний і мирний прохід для всіх [ROOT.GetCountry.GetAdjective] паломників."
  flavor_mam.71.a: "[bedouin_candidate.GetNameWithNoTooltip] є уродженцем цих земель."
  flavor_mam.71.b: "[mil_candidate.GetNameWithNoTooltip] використає [mil_candidate.GetHerHis] хитрість для захисту."
  flavor_mam.71.c: "Вправний дипломат, як [dip_candidate.GetNameWithNoTooltip], впорається з цим найкраще."
  flavor_mam.71.d: "Благочестиві люди, як [adm_candidate.GetNameWithNoTooltip], будуть відповідати за цю роль."
  flavor_mam.71.e: "Лише вірний $mamluk$, як [mamluk_candidate.GetNameWithNoTooltip], може виконати це завдання."
  flavor_mam.72.title: "Авлад аль-Нас"
  flavor_mam.72.desc: "Будучи вихованими як вірні воїни з раннього віку, $mamluk$ солдати часто користуються повною довірою свого власника або роботодавця. Однак їхні сини, Авлад аль-Нас, вирослі в набагато сприятливіших і поблажливіших обставинах, зазвичай вважаються набагато менш здібними та вірними. Нездатні служити як [ROOT.GetCountry.GetGovernment.GetAdjective|U] $mamluk$, Авлад аль-Нас натомість становлять соціальну еліту в регулярних військових підрозділах та в нижчій адміністрації.\nЦі шляхетні сини, однак, постійно намагаються довести, що вони готові до більших обов'язків. З відкритою позицією командування обороною [target_location.GetName], деякі з них сподіваються, що ми довіримо їм це завдання."
  flavor_mam.72.a: "Призначимо одного з синів."
  flavor_mam.72.b: "Ми можемо довіряти лише своїм, командиром має бути $mamluk$."
  flavor_mam.73.title: "Карані"
  flavor_mam.73.desc: "Наш [ROOT.GetCountry.GetFlavorRank] був заснований $mamluk$ рабами, і володіння та імпорт кваліфікованих воїнів-рабів залишаються основою будь-якої влади для [target_character.GetName]. Цілком природно, що раб буде більш вірним своєму господареві, ніж будь-хто інший на його новій батьківщині, і тим більше, якщо його винагородять звільненням за надані послуги.\nОднак, наразі багато [ROOT.GetCountry.GetGovernment.GetAdjective] $mamluk$ у нашій адміністрації, [ROOT.GetCountry.GetGovernment.GetCourtTitle] та арміях – це ті, кого попередні правителі купили та представили нашому [ROOT.GetCountry.GetFlavorRank]. Це люди з великим впливом, але без особистої відданості [target_character.GetNameWithNoTooltip], люди, яких наші нові $mamluk$ звинувачують у змові та прагненні обмежити їхній вплив."
  flavor_mam.73.a: "Викорінимо Карані з важливих посад!"
  flavor_mam.73.b: "У нас немає вибору, окрім як довіряти їм, адже ми всі $mamluk$..."
  flavor_mam.74.title: "Фурусія"
  flavor_mam.74.desc: "Фурусія – це комплекс кінних вправ, що навчає молодих воїнів мистецтву кавалерійської війни. З кодифікованими правилами, посібниками та популярними змаганнями, Фурусія багато в чому була вдосконалена мамлюкською військовою аристократією. Хоча деякі хроністи стверджували б, що сьогоднішні чемпіони ніколи не змогли б змагатися з воїнами минулого, все ж є як звичаєм, так і дуже популярним, для будь-якого [ROOT.GetCountry.GetGovernment.GetRulerTitle] влаштовувати великі публічні змагання з Фурусії, а чемпіони залишаються героями багатьох популярних оповідань. Все це надихнуло [target_character.GetName], експерта у військовій справі, і тепер він бажає організувати ще більше турнірів серед [ROOT.GetCountry.GetAdjective] воїнів."
  flavor_mam.74.a: "Це добре для народу, але не те, на що [target_character.GetNameWithNoTooltip] повинен витрачати гроші."
  flavor_mam.74.b: "Розширимо та збудуємо нові іподроми, щоб підтримувати квіти лицарства."
  flavor_mam.75.title: "Паломники в безпеці"
  flavor_mam.75.desc: "Наші зусилля щодо захисту наших підданих, які прагнуть здійснити паломництво до святих місць [ShowLocationName('medina')] та [ShowLocationName('mecca')], окупилися. Вже давно не було набігів, і держава перебуває в мирі."
  flavor_mam.75.a: "Це демонстрація нашої готовності захищати нашу віру."
  flavor_mam.76.title: "Напади на каравани хаджу"
  flavor_mam.76.desc: "Нещодавній караван паломників до святих місць [ShowLocationName('medina')] та [ShowLocationName('mecca')] був атакований та пограбований. Наш обов'язок — захищати тих серед наших підданих, хто вирушає до святих місць, і тепер наша здатність це робити поставлена під сумнів."
  flavor_mam.76.a: "Цього більше не станеться."
  flavor_mam.77.title: "Житниця Середземномор'я"
  flavor_mam.77.desc: "Багаті заплави [ShowRegionName('egypt_region')], особливо в дельті Нілу, залишаються житницею східного Середземномор'я. Наша [ShowGoodsName('wheat')] годує міста від [ShowLocationName('constantinople')] до [ShowLocationName('damascus')] і забезпечує наше місце як життєво важливої економічної та логістичної сили. Деякі в [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонують інвестувати далі в сільськогосподарські реформи та розширити виробництво зерна, щоб забезпечити продовольчу стабільність та прибуток."
  flavor_mam.77.a: "Інвестувати для збільшення виробництва."
  flavor_mam.77.b: "Поточного виробництва достатньо."
  flavor_mam.77.historical_info: "За часів Мамлюків Єгипет був відомий своїм сільськогосподарським багатством та експортом зерна. Родючі долини Нілу та складна система іригації зробили Єгипет критично важливим постачальником продовольства для ширшого ісламського світу. Це принесло регіону прізвисько «Житниця Середземномор'я»."
  flavor_mam.78.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mam.78.desc: "[target_character.GetName] почав публікувати серію праць з хадису, соціальних звичаїв та історії. Завдяки поєднанню суворої хадисної науки та записів повсякденного життя, [target_character.GetHerHis] антропологічна праця, яка зосереджується переважно на шлюбі та розлученні, призвела до цікавих висновків. Дослідження виявило, що принаймні третина жінок у [ShowLocationName('cairo')] виходили заміж щонайменше двічі, багато хто — тричі, і що близько третини всіх шлюбів закінчувалися розлученням. Хоча багато хто вважає, що підтримка праці [target_character.GetHerHim] може дати ще цікавіші результати, інші вважають, що фінансування дослідження, яке зосереджується на таких тривіальних речах, як шлюби, було б марною тратою наших фінансів."
  flavor_mam.78.a: "Підтримати дослідження та публікації [target_character.GetHerHim]."
  flavor_mam.78.b: "Ми не можемо дозволити собі фінансувати кожне дослідження."
  flavor_mam.78.historical_info: "Шамс ад-Дін ас-Сахаві був одним з провідних вчених-хадисознавців та істориків пізнього мамлюцького періоду, який написав десятки трактатів з хадису, історії, літератури та соціальних звичаїв. Його антропологічні дані, такі як зафіксовані шлюбні моделі 500 жінок у Каїрі, представляли дуже рідкісне статистичне вікно в середньовічне ісламське суспільство і були найбільшим вибірковим дослідженням, проведеним щодо жінок у Середньовіччі."
  flavor_mam.79.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mam.79.desc: "Останніми роками імам [target_character.GetName] став видатною постаттю інтелектуального життя в [ShowLocationName('cairo')]. Майстер хадису, [ShowReligionGroupAdjective('muslim')] юриспруденції та історії, [target_character.GetHerHis] ерудиція принесла престиж нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] та установам. [target_character.GetSheHe|U] широко шанований за відновлення вивчення хадису до його колишньої важливості, а [target_character.GetHerHis] вчення приваблює студентів з усього [ROOT.GetCountry.GetFlavorRank]."
  flavor_mam.79.a: "Підтримати наукову діяльність [target_character.GetHerHis]."
  flavor_mam.79.b: "У нас є більш нагальні потреби."
  flavor_mam.79.historical_info: "Ібн Хаджар аль-Аскалані був відомим єгипетським вченим, найбільш відомим своїм авторитетним коментарем до #italic Сахіх аль-Бухарі#!, під назвою #italic Фатх аль-Барі#!. Його знання хадису, а також юриспруденції, поезії та історії, принесли йому тривалу репутацію в усьому ісламському світі. Йому вдалося відродити хадисну науку в час, коли вона почала занепадати, і його вплив тривав століттями."