l_english:
  flavor_zan.1.title: "[ShowBuildingTypeNameWithNoTooltip('husuni_kubwa')]"
  flavor_zan.1.desc: "[GetCharacter('zan_abu_al_mawahib_al_hasan_ibn_suleiman').GetName] спочатку замовив [ROOT.GetCountry.GetGovernment.GetAdjective] резиденцію в серці [target_location.GetName], яка мала стати найвеличнішим палацом. Однак нещастя, перенаправлення коштів та особиста хвороба — усе це прагнуло зупинити та повністю припинити проєкт. Попри ці труднощі, наші архітектори представили оновлений план палацу, доповнений складами та приміщеннями, спеціально призначеними для купецьких обмінів, у супроводі блискучої тронної зали. Їхня єдина перешкода зараз — це монета."
  flavor_zan.1.a: "Замовити будівництво."
  flavor_zan.1.b: "Це занадто дорого, поки що..."
  flavor_zan.1.historical_info: "Хусуні Кубва є свідченням архітектурної та політичної майстерності Кілвійського султанату під час його розквіту в XIV столітті. Збудований за султана аль-Хасана ібн Сулеймана в Кілва-Кісівані, цей розлогий палацовий комплекс, що займає 1,6 гектара, був зведений переважно з коралового каменю та поєднував суахілійські, ісламські та перські архітектурні впливи. Він включав розкішні приватні покої, великі двори, вишукані лазні та комори, підкреслюючи свою багатогранну роль як королівської резиденції, комерційного центру та укріплення."
  construct_the_building_at_another_time_tt: "Ми можемо вирішити побудувати [ShowBuildingTypeNameWithNoTooltip('husuni_kubwa')] іншим разом..."
  flavor_zan.2.title: "Карбування монет [target_character2.GetNameWithNoTooltip]"
  flavor_zan.2.desc: "Великий [target_character2.GetName] служив маяком чесноти та розсудливого управління. [target_character2.GetHerHis|U] мудрі реформи та рішення привели наш [GetCountry('ZAN').GetFlavorRank] до встановленого періоду процвітання, коли торгівля текла до далеких земель, приносячи необхідні цінності для обміну.\n\nЩоб полегшити цю систему, [target_character2.GetSheHe] наказав запровадити єдину монету, яка б допомагала в бартері. Вшановуючи [target_character2.GetHerHis] кончину, нам нагадали, що зрештою нам потрібно буде вирішити, чи карбувати нові монети з ім'ям та обличчям [target_character.GetName], чи продовжувати використовувати існуючі..."
  flavor_zan.2.a: "Карбувати нові монети."
  flavor_zan.2.b: "Продовжувати використовувати існуючі монети."
  flavor_zan.2.c: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] вирішує питання валюти."
  zan_gold_coinage: "Попит на [ShowGoodsNameWithNoTooltip('goods_gold')] монети"
  flavor_zan.3.title: "Тінь [target_character2.GetNameWithNoTooltip]"
  flavor_zan.3.desc: "[target_character2.GetName] був відомий [target_character2.GetHerHis] безмежною щедрістю та готовністю допомогти. Коли цей доброчесний і важливий [GetCountry('ZAN').GetGovernment.GetRulerTitle] помер, [target_character2.GetSheHe] успадкував [target_character2.GetHerHis] брат, [target_character.GetName]. На відміну від [target_character.GetHerHis] попередника, [target_character.GetShortNameWithNoTooltip] виявляв велику відсутність чесноти в плані допомоги нашому народу.\n\nКажуть, що одного разу бідняк зустрів [target_character.GetShortNameWithNoTooltip], [GetCountry('ZAN').GetGovernment.GetRulerTitle] відповів, сказавши, що '#italic Той, хто давав, помер і нічого не залишив після себе, щоб дати#!'. Останні візити іноземних високопосадовців також зменшилися, з огляду на відсутність щедрості та гостинності, які ми нещодавно виявили."
  flavor_zan.3.a: "Ми повинні наслідувати [target_character2.GetShortNameWithNoTooltip]!"
  flavor_zan.3.b: "Направити щедрі внески на просування нашої програми."
  flavor_zan.3.c: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] може голодувати."
  flavor_zan.3.historical_info: "Коли Ібн Баттута відвідав регіон, при владі був Аль-Хасан ібн Сулейман. Під час свого перебування Ібн Баттута спостерігав надзвичайну щедрість султана, особливо до гостей. Один випадок, який залишив незабутнє враження, стався, коли султан, виявляючи доброту, запропонував свій власний одяг біднякові."
  flavor_zan.4.title: "Золотий вік [GetCountry('ZAN').GetNameWithNoTooltip]"
  flavor_zan.4.desc: "Відтоді, як королівські династії [GetCountry('ZAN').GetName] запровадили іноземні ісламські впливи серед місцевого [ShowCultureName('swahili_culture')] народу, унікальне злиття місцевих традицій та зовнішньої мудрості призвело до покращення нашого суспільства майже в усіх аспектах.\n\nНедавнє зростання кількості ремісників та вчених, а також поява нового архітектурного стилю є ознаками того, що ми справді перетинаємо вершину нашої золотої ери!"
  flavor_zan.4.a: "Ми повинні фінансувати наші літературні установи."
  flavor_zan.4.b: "Що може бути кращим способом насолодитися нашою славою, ніж мистецтво?"
  flavor_zan.4.c: "Таке багатство заслуговує на відповідну столицю."
  flavor_zan.4.d: "Не поспішаймо..."
  flavor_zan.5.title: "Місцеві звичаї в [target_location.GetNameWithNoTooltip]"
  flavor_zan.5.desc: "Впровадження культурних норм і звичаїв з [ShowSubContinentName('middle_east')] та $india$ створило розкол між правлячою елітою та [ShowCultureName('swahili_culture')] народом. Більшість культурних традицій місцевого населення, як у неформальних, так і в офіційних умовах, не відповідають традиціям [ROOT.GetCountry.GetGovernment.GetCourtTitle], а деякі дрес-коди та поведінка вже викликали здивування при взаємодії між обома сторонами.\n\nЗвісно, ми мали б повне право заборонити це і змусити місцевих жителів дотримуватися наших звичаїв, однак це не буде сприйнято прихильно..."
  flavor_zan.5.a: "Їхня культура має бути поважана."
  flavor_zan.5.b: "Вони підкоряться."
  flavor_zan.6.title: "Піднесення [target_country.GetNameWithNoTooltip]"
  flavor_zan.6.desc: "Мандрівники невідомого походження, об'єднавшись з місцевими пастухами та фермерами в [target_location.GetName], заснували велику та процвітаючу низку поселень. Завдяки складній іригаційній системі та їхнім знанням у землеробстві, [target_location.GetNameWithNoTooltip] перетворилося на найпроцвітаюче місце.\n\nЙого мешканці та місцева адміністрація навіть встановили стандарти для запобігання ерозії ґрунту та сприяння родючості ділянок. Їхня присутність не становить для нас загрози, але вони є своєрідним та цікавим видовищем..."
  flavor_zan.6.historical_info: "Десь у 15 столітті землеробська громада побудувала велике село біля підніжжя уступу Рифтової долини, створивши складну іригаційну систему з кам'яними каналами та терасованими полями. Найбільше поселення серед них, відоме як Енгарука, було домом для тисяч людей і використовувало гній худоби для збагачення ґрунту."
  flavor_zan.6.a: "Захоплююче."
  engaruka_people_interesting_tt: "Народ [target_country.GetName] є піонерами землеробства, [target_location.GetNameWithNoTooltip] процвітатиме..."
  flavor_zan.7.title: "Багатство [ShowProvinceDefinitionNameWithNoTooltip('upper_save_province')]"
  flavor_zan.7.desc: "Наша нещодавня анексія [target_location.GetName] викликала багато здивування та застережень з боку наших західних сусідів. Здається, вони усвідомили наші наміри забезпечити стабільне та пряме постачання [ShowGoodsName('goods_gold')], замість того, щоб купувати його у них.\n\nЇхні скарги не мають значення, вони всі схиляться перед нашою могутністю, коли прийде час..."
  flavor_zan.7.a: "Все за планом..."
  flavor_zan.8.title: "Ширазькі [ShowReligionGroupNameWithNoTooltip('muslim')] та патриції [target_country2.GetNameWithNoTooltip]"
  flavor_zan.8.desc: "Більшість [ShowCultureName('swahili_culture')] держав донині керуються династіями, які стверджують, що походять від першої ісламської міграції в цей регіон. [ShowReligionGroupName('muslim')], що практикується цими \"ширазцями\", як вони себе називають, однак, не є найортодоксальнішою формою релігії. Багато давніх місцевих церемоній щодня проводяться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], а ширазькі родоводи вважаються такими, що мають магічні здібності, які дають їм право керувати цими містами.\n\nОднак, зі зростанням багатства [target_country2.GetName] та інших [ShowCultureNameWithNoTooltip('swahili_culture')] держав, нові хвилі іноземців продовжують прибувати у великій кількості. Торговці з [ShowAreaName('oman_area')], [ShowRegionName('persia_region')] та інших далеких земель зробили наші міста своїм домом, а зростаючий клас корінних купців зробив ці групи своїми партнерами.\n\nБагато новоприбулих жахаються наших традицій. Якби ми прийняли більш ортодоксальну форму [ShowReligionGroupNameWithNoTooltip('muslim')], це, безумовно, покращило б наші відносини з іншими державами [ShowRegionName('indian_ocean_region')], але існує дуже реальний ризик, що це підірве наше власне правління та зашкодить відносинам з іншими [ShowCultureNameWithNoTooltip('swahili_culture')] державами."
  flavor_zan.8.a: "Ми повинні слідувати шляхам наших предків."
  flavor_zan.8.b: "Очистимо наш [ROOT.GetCountry.GetFlavorRank] від язичницьких вірувань та церемоній."
  countries_with_positive_piety_reduced_relations_tt: "[ShowReligionGroupNameWithNoTooltip('muslim')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] у межах нашого [Concept('diplomatic_range', 'CONCEPT_PLACEHOLDER')|e], які не підтримують наші практики (такі як [target_country.GetName]), втратять [ShowBiasValue('opinion_shirazi_islam')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас"
  countries_with_positive_piety_increased_relations_tt: "[ShowReligionGroupNameWithNoTooltip('muslim')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] у межах нашого [Concept('diplomatic_range', 'CONCEPT_PLACEHOLDER')|e], які не підтримують наші практики (такі як [target_country.GetName]), отримають [ShowBiasValue('opinion_adopted_our_religious_views')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас"
  flavor_zan.9.title: "Хроніка [target_country.GetNameWithNoTooltip]"
  flavor_zan.9.desc: "З прибуттям все більшої кількості іноземних торговців до [ShowRegionName('swahili_coast_region')] з ортодоксальних [ShowReligionGroupAdjective('muslim')] держав, наші старі ширазькі звичаї все більше піддаються критиці. Ми з огидою спостерігали, як деякі старі ширазькі династії [ShowRegionNameWithNoTooltip('swahili_coast_region')] були повалені зростаючим класом корінних торговців, що об'єдналися з новоприбулими.\n\nОднак, як одна з найстаріших і наймогутніших ширазьких династій, ми все ще міцно стоїмо. Щоб належним чином вразити як іноземців, так і внутрішніх смутьянів, можливо, найкраще було б доручити нашим писарям створити хроніку нашого славетного роду, щоб ніхто не міг сумніватися в нашому ширазькому походженні та давніх ісламських коренях нашої династії."
  flavor_zan.9.a: "Створимо таку Хроніку."
  flavor_zan.9.b: "У нас є важливіші справи."
  flavor_zan.10.title: "Прибуття [target_country.GetAdjectiveWithNoTooltip]"
  flavor_zan.10.desc: "Наше панування вздовж узбережжя було значною мірою безперечним протягом понад століття. Однак повідомлення про іноземних торговців та великі флоти слугують ознакою невідомої країни. Розмови про могутні судна, керовані людьми та озброєні потужними гарматами такого розміру, якого ми ніколи не бачили, більш ніж достатньо, щоб розбити слабких придворних та радників, які перебувають у нас на службі. Перед обличчям неминучого вторгнення багато хто покинув свої пости та знайшов притулок у глибині країни, побоюючись початку війни."
  flavor_zan.10.a: "У них немає шансів, безперечно."
  flavor_zan.11.title: "Відкриття [target_country2.GetLongNameWithNoTooltip]"
  flavor_zan.11.desc: "Повідомлення з-за [ShowProvinceDefinitionName('good_hope_cape_coast_province')] стверджують про присутність могутньої країни, чиї торговці мають велике багатство у своїх гаманцях. Завдяки мережам, що охоплюють невідомі моря, купці [target_country2.GetName] підняли свій народ на нові висоти процвітання. Було б розсудливо забезпечити їхні землі тим чи іншим способом, щоб не ризикувати їхнім переходом на бік або потраплянням під вплив наших конкурентів..."
  flavor_zan.11.a: "Вони схилять коліна."
  flavor_zan.11.b: "Надіслати подарунки та мирну делегацію."
  flavor_zan.11.c: "Ігнорувати їх."
  flavor_zan.12.title: "[target_country.GetAdjectiveWithNoTooltip] Делегація"
  flavor_zan.12.desc: "Здається, могутні флоти [target_country.GetName] відвідали нас лише для того, щоб продемонструвати свою вдячність нашій культурі та висловити бажання мирної співпраці. Усі ті, хто пророкував загибель нашого народу, тепер соромляться своїх непотрібних легковажностей."
  flavor_zan.12.a: "Хибна тривога!"