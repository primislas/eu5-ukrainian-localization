l_english:
  flavor_vol.1.title: "Керувати чужою країною"
  flavor_vol.1.desc: "[target_ruler.GetName] має складне завдання керувати країною, де дуже мало людей сповідують [target_ruler.GetHerHis] віру. Щоб полегшити проблеми, що виникають з цього, ми могли б запросити деяких [ShowReligionAdjective('catholic')] радників зі [ShowCultureGroupName('slavic_group')] районів [ShowContinentName('europe')], які вже сповідують [ShowReligionAdjectiveWithNoTooltip('catholic')] віру."
  flavor_vol.1.historical_info: "Король Рутенії Юрій II був членом польської династії П'ястів, а через свою матір він також був нащадком династії Рюриковичів, оскільки вона була сестрою Лева II Галицького. Після Лева II трон Рутенії перейшов до Юрія II, який, тим не менш, був іноземцем і католиком. Це зробило його загалом непопулярним серед православного населення Рутенії і зрештою призвело до його вбивства у 1340 році."
  flavor_vol.1.a: "Нам потрібна їхня допомога, щоб сформувати [ROOT.GetCountry.GetFlavorRank]."
  flavor_vol.1.b: "Ми не можемо ризикувати гнівом [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_vol.2.title: "Зв'язок із Заходом"
  flavor_vol.2.desc: "[ShowLocationName('sanok')] біля підніжжя Карпатських гір займає важливу територію нашого [ROOT.GetCountry.GetFlavorRank]. Багато купців, що прибувають з [ShowLocationName('krakow')] та [ShowAreaName('slovakia_area')] і прямують туди, зупиняються в [ShowLocationNameWithNoTooltip('sanok')], торгуючи з нашим місцевим населенням. Завдяки деяким інвестиціям [ShowLocationNameWithNoTooltip('sanok')] може перетворитися на важливий торговий центр як для наших, так і для іноземних купців."
  flavor_vol.2.a: "Інвестуйте в новий центр для наших купців!"
  flavor_vol.2.b: "Це не варте грошей."
  flavor_vol.3.title: "Потенціал [target_location.GetNameWithNoTooltip]"
  flavor_vol.3.desc: "У центрі [ShowAreaName('red_ruthenia_area')] лежить [target_location.GetName], [target_location.GetRank.GetName], що добре підходить для нас як центр нашого [ROOT.GetCountry.GetFlavorRank]. На жаль, місцевому населенню бракує коштів для покращення умов. Ми могли б підвищити привабливість [target_location.GetNameWithNoTooltip] за привілеями, наданими [ShowEstatePrivilegeName('novi_fori')], та деякими додатковими інвестиціями з нашого боку."
  flavor_vol.3.a: "[target_location.GetNameWithNoTooltip] процвітатиме."
  flavor_vol.3.b: "Безглузда трата грошей."
  flavor_vol.3.c: "Наша столиця досягне нових висот."
  flavor_vol.4.title: "Віднайдена хроніка"
  flavor_vol.4.desc: "Один із членів нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [target_character.GetName], зробив цікаве відкриття, працюючи в монастирі. Під час своєї роботи він виявив кодекс, написаний [ShowLanguageName('church_slavonic_language')], що складається з компендіуму різних хронік, які записують та переказують історію старої Київської Русі з часів [GetCharacter('kie_rurik').GetName] і навіть раніше.\n\nМи повинні негайно викликати [target_character.GetNameWithNoTooltip] разом з його відкриттям до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] і переконатися, що ця історична документація [ShowCultureName('ruthenian')] народу зможе зберегтися на століття."
  flavor_vol.4.a: "Захоплива розповідь про минулі роки."
  flavor_vol.4.b: "Це не звучить правдоподібно."
  flavor_vol.1000.title: "Наступництво [target_ruler.GetNameWithNoTooltip]"
  flavor_vol.1000.desc: "[ROOT.GetCountry.GetName] та [target_ruler.GetName] стикаються з невизначеним майбутнім через відсутність спадкоємця та нестабільну політичну ситуацію. Наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вимагають, щоб один з їхніх представників був призначений кандидатом, доки [target_ruler.GetNameWithNoTooltip] не матиме власного сина. З додатковим тиском, з яким [target_ruler.GetNameWithNoTooltip] стикається як з боку [GetCountry('POL').GetName], так і з боку [GetCountry('LIT').GetName], це здається нерозв'язною ситуацією, яку неможливо подолати, не викликавши гніву принаймні однієї сторони."
  flavor_vol.1000.historical_info: "Член польської династії П'ястів, король Рутенії Юрій II також одружився з дочкою Великого князя Литовського Гедиміна, яка також була сестрою дружини Казимира III Польського. У 1338 році Юрій запропонував Казимиру спадкоємство на галицький престол, але Литва, також маючи на нього претензії, спровокувала Галицько-Волинські війни після вбивства Юрія у 1340 році."
  flavor_vol.1000.a: "[GetCharacter('pol_casimir_iii_piast').GetNameWithNoTooltip] буде нашим кандидатом."
  flavor_vol.1000.a.tt: "Ми підтримаємо [GetCharacter('pol_casimir_iii_piast').GetName] як нашого майбутнього [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_vol.1000.b: "[GetCharacter('lit_liubartas_gediminds').GetNameWithNoTooltip] має вагомі претензії."
  flavor_vol.1000.b.tt: "Ми підтримаємо [GetCharacter('lit_liubartas_gediminds').GetName] як нашого майбутнього [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_vol.1000.c: "[GetCharacter('vol_dmytro_dedko').GetNameWithNoTooltip] умиротворить [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_vol.1000.c.tt: "Ми підтримаємо [GetCharacter('vol_dmytro_dedko').GetName] як нашого майбутнього [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_vol.1000.d: "[target_ruler.GetNameWithNoTooltip] з часом народить спадкоємця."
  flavor_vol.1001.title: "Спадкоємець для [target_country.GetNameWithNoTooltip]"
  flavor_vol.1001.desc: "[target_country.GetGovernment.GetEstateName('nobles_estate')] [target_country.GetName] переконали [target_ruler.GetName] проголосити [target_heir.GetName] [target_ruler.GetHisHer] кандидатом на престол. Завдяки нашим родинним зв'язкам з [target_ruler.GetShortNameWithNoTooltip], ми очікували отримати значний вплив у [target_country.GetFlavorRank] після смерті [target_ruler.GetHerHis], але ці сподівання були зруйновані цим поворотом подій. Якщо [target_country.GetNameWithNoTooltip] відмовить нам у праві на спадщину, ми візьмемо її силою."
  flavor_vol.1001.a: "Готуйте військо!"
  flavor_vol.1002.title: "Релігія [target_ruler.GetNameWithNoTooltip]"
  flavor_vol.1002.desc: "Наш [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] залишається дуже стурбованим релігійними практиками [target_ruler.GetName]. З огляду на його прихильність до іноземних [ShowReligionAdjective('catholic')] впливів, [ShowReligionAdjective('orthodox')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] нашого [ROOT.GetCountry.GetFlavorRank] занепокоєні тим, що [target_ruler.GetNameWithNoTooltip] має амбіції поширити [ShowReligionAdjectiveWithNoTooltip('catholic')] віру в [ROOT.GetCountry.GetName]. Публічне навернення до [ShowReligionNameWithNoTooltip('orthodox')] заспокоїло б їх, але це також зашкодило б нашим відносинам з нашими [ShowReligionAdjectiveWithNoTooltip('catholic')] сусідами."
  flavor_vol.1002.historical_info: "Католик в православному царстві, король Русі Юрій II часто зустрічав опір з боку галицької шляхти та духовенства, особливо коли він намагався запровадити католицизм у королівстві. Це зрештою призвело до відкритого невдоволення деяких бояр ним і до його вбивства."
  flavor_vol.1002.a: "[target_ruler.GetNameWithNoTooltip] не підкориться цим дрібним вимогам."
  flavor_vol.1002.b: "[target_ruler.GetNameWithNoTooltip] навернеться до [ShowReligionNameWithNoTooltip('orthodox')]."
  flavor_vol.1003.title: "Непокірний [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_vol.1003.desc: "[target_ruler.GetName] сильно розгнівав [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] своїми рішеннями та прихильністю до [ShowReligionAdjective('catholic')] голосів. У відчайдушній спробі повернути прихильність [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], ми могли б розширити їхні привілеї та сподіватися, що це згладить наші відносини з ними."
  flavor_vol.1003.a: "Надати їм більше привілеїв."
  flavor_vol.1003.b: "Це неможливо!"
  flavor_vol.1100.title: "Отруєння [pol_the_dead_monarch.GetNameWithNoTooltip]"
  flavor_vol.1100.desc: "[ROOT.GetCountry.GetGovernment.GetAdjective] родина сумує, оскільки [pol_the_dead_monarch.GetName] оголошено мертвим [pol_the_dead_monarch.GetHisHer] придворним лікарем. Можна було б очікувати, що придворні також будуть залиті сльозами, але це не так. Сувора правда полягає в тому, що такий результат був досить очікуваним, оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] був незадоволений [pol_the_dead_monarch.GetHimHer] протягом довгого часу через [pol_the_dead_monarch.GetHisHer] іноземне походження та [pol_the_dead_monarch.GetHisHer] відкриту перевагу [ShowReligionAdjective('catholic')] радників. Таким чином, вердикт про отруєння здається далеко не дивним. Більш тривожною, ніж сама смерть, є доля нашого улюбленого [ROOT.GetCountry.GetLongName] і хто тепер візьме його кермо."
  flavor_vol.1100.historical_info: "Отруєння Юрія II Руського спровокувало Галицько-Волинські війни між Польщею та Литвою, за підтримки Угорщини та Золотої Орди відповідно, та різних руських фракцій, що воювали за обидві сторони. Війни тривали півстоліття, з 1340 по 1392 рік, і закінчилися поділом Галицько-Волині між Польщею та Литвою."
  flavor_vol.1100.a: "[GetCharacter('pol_casimir_iii_piast').GetNameWithNoTooltip] є законним спадкоємцем."
  flavor_vol.1100.b: "[GetCharacter('lit_liubartas_gediminds').GetNameWithNoTooltip] був обраний."
  flavor_vol.1100.c: "[GetCharacter('vol_dmytro_dedko').GetNameWithNoTooltip] здобув довіру [pol_the_dead_monarch.GetNameWithNoTooltip]."
  flavor_vol.1100.d: "[ROOT.GetCountry.GetNameWithNoTooltip] сумує за [pol_the_dead_monarch.GetNameWithNoTooltip]"
  flavor_vol.1101.title: "Спадщина [pol_the_dead_monarch.GetNameWithNoTooltip]"
  flavor_vol.1101.desc: "До нас дійшла звістка, що [pol_the_dead_monarch.GetName] з [GetCountry('VOL').GetName] загинув через отруєння, спричинене інтригами його власного [GetCountry('VOL').GetGovernment.GetEstateName('nobles_estate')]. Завдяки його династичним зв'язкам з нашим [ROOT.GetCountry.GetFlavorRank], ми тепер вільні зробити крок на [GetCountry('VOL').GetLongNameWithNoTooltip]."
  flavor_vol.1101.a: "І ми зробимо це!"
  flavor_vol.1101.b: "Натомість давайте турбуватися про наш [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."