l_english:
  flavor_rus.1.title: "Помісна реформа"
  flavor_rus.1.desc: "Завоювання [GetCountry('NOV').GetName] все ще несе ризик повстань через сильну місцеву опозицію. Відбулися примусові депортації громадян, а місцевих лідерів [GetCountry('NOV').GetAdjectiveWithNoTooltip] Церкви було замінено на [ROOT.GetCountry.GetAdjective] лідерів [target_religion.GetName]. Щоб придушити подальші повстання, ми могли б запровадити реформу землеустрою, яка конфіскує маєтки у місцевих [ShowPopTypeName('nobles')] і передає їх у власність армії, централізуючи владу та забезпечуючи лояльність у процесі."
  flavor_rus.1.a: "Запровадити помістя."
  flavor_rus.1.b: "Станьмо більше схожими на [GetCountry('NOV').GetNameWithNoTooltip]."
  flavor_rus.1.c: "Усіх опонентів схопити та стратити."
  flavor_rus.1.historical_info: "Після того, як Московія вторглася в Новгород у 1471 році, а Литва не змогла прийти на допомогу Новгороду, Новгород був змушений прийняти Коростинський договір, який ще більше обмежив його незалежність. Іван III, все ще побоюючись повстань через те, що сталося з його батьком, депортував багатьох громадян Новгорода. Він також замінив лідерів Новгородської Церкви на російських православних лідерів. Землі були відібрані у місцевих жителів і передані кавалеристам в обмін на військову службу. Після встановлення там реформи землеустрою, названої помісною системою, він запровадив її в Московії. Захопивши маєтки місцевих дворян, званих боярами, і віддавши їх своїй армії, він допоміг зміцнити та централізувати свою владу, а також створити лояльність у своїй армії та інших слуг. До 1489 року Новгород був лише тінню свого колишнього \"я\" і тепер частиною постійно зростаючої Російської держави."
  flavor_rus.2.title: "[malyuta_skuratov.GetNameWithNoTooltip]"
  flavor_rus.2.desc: "Грізний стратег [malyuta_skuratov.GetName] наразі шукає роботу при дворі. [malyuta_skuratov.GetSheHe|U] має глибоке розуміння політичних інтриг, продемонстровану непохитну вірність та репутацію безжального виконавця. Названий «Чорним Псом» та «Залізним Кулаком», [malyuta_skuratov.GetSheHe] ймовірно, вселить страх у наших опонентів, забезпечуючи точне виконання кожного королівського наказу."
  flavor_rus.2.a: "Чудовий міністр!"
  flavor_rus.2.tt1: "Надзвичайна жорстокість, продемонстрована [malyuta_skuratov.GetNameWithNoTooltip], добре резонує з [target_root_country.GetGovernment.GetRuler.GetName]"
  flavor_rus.2.b: "Безжальний розпалювач війни."
  flavor_rus.2.historical_info: "Малюта Скуратов був одним із найвидатніших лідерів під час Опричнини – коли Іван Грозний та його таємна поліція здійснили тисячі страт та конфіскацій земель. Скуратов здобув собі ім'я у 1569 році, коли брав участь у суді та страті єдиного двоюрідного брата Івана, Володимира Старицького – можливого претендента на престол. Пізніше того ж року він задушив митрополита Московського Філіпа II за критику судів, а у 1570 році був відповідальний за вбивство тисяч громадян під час каральної експедиції до Новгорода. Скуратов був убитий у 1573 році під час облоги Вейсенштейна під час Лівонської війни."
  flavor_rus.3.title: "Росія дивиться на Схід"
  flavor_rus.3.desc: "Забезпечивши контроль над областями [ShowAreaName('tambov_area')], [ShowAreaName('samara_area')] та [ShowAreaName('astrakhan_area')], ми повинні продовжити нашу експансію на схід, щоб забезпечити панування над [ShowRegionName('ural_region')] та помститися тим, хто колись прагнув домінувати над нами."
  flavor_rus.3.a: "Все це належить Матінці Росії."
  flavor_rus.3.b: "Внутрішня стабільність понад усе."
  flavor_rus.3.c: "Ми розширюємося словами, а не мечами."
  flavor_rus.3.historical_info: "У 1552 році цар Іван IV Грозний розпочав експедицію проти Казанського ханства, на схід від Нижнього Новгорода, що було блокуючим пунктом на Волзі. Використання важких бомбард пробило стіни татарського міста, яке було швидко захоплене та анексоване. У 1556 році, після успіху проти Казані чотирма роками раніше, Іван розпочав нову експедицію проти Астраханського ханства, на південь по Волзі. Захоплення Астрахані відкрило доступ до Каспійського моря і поставило весь басейн Волги під російський контроль. Міста, такі як Самара, Саратов і Царицин, були засновані вздовж річки для забезпечення належного контролю."
  flavor_rus.4.title: "[GetCountry('PLC').GetNameWithNoTooltip] Перешкода"
  flavor_rus.4.desc: "Успішне розширення на захід надало нам повний контроль над територією [ShowAreaName('smolensk_area')], проте в [ShowAreaName('white_ruthenia_area')] залишаються осередки опору, що перешкоджають нашому подальшому вторгненню на землі [GetCountry('PLC').GetName]. Ми повинні скористатися перевагою та забезпечити контроль над рештою території, якщо ми прагнемо об'єднати всі слов'янські землі під одним великим [ROOT.GetCountry.GetFlavorRank]."
  flavor_rus.4.a: "Ми рухаємося вперед."
  rus_claimed_land: "Заявили про нашу землю"
  rus_claimed_land_antagonism: "Заявили про нашу землю"
  flavor_rus.4.b: "Це напружить дипломатичні відносини."
  flavor_rus.4.tt1: "Опір експансіонізму розчаровує [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]"
  flavor_rus.4.c: "Колись ці землі були нашими."
  flavor_rus.4.tt2: "Харизматична писемність [target_root_country.GetGovernment.GetRuler.GetName] викликає питання щодо законного володіння територією [ShowAreaName('white_ruthenia_area')]"
  flavor_rus.4.historical_info: "Іван IV Московський поширив кордони своєї батьківщини далеко на Південь та Схід, але зустрів сильний опір на Заході, особливо в Лівонії. Війни з Річчю Посполитою та Швецією затягнулися, призвівши до численних поразок, що змусило Івана підписати мирний договір, за яким Московія мала поступитися будь-якими західними територіальними здобутками. Ворожнеча між двома країнами залишалася високою, кульмінацією чого стала польська окупація Москви під час Смутного часу."
  flavor_rus.5.title: "Підкорення степів"
  flavor_rus.5.desc: "Тріумфальне завоювання тюркських кочових племен, що населяли степи, просунуло наш східний фронт на кілька миль вперед, поставивши нас у межі досяжності [ShowAreaName('lower_yik_area')]. Нагально необхідно закріпити за собою Степи, усунувши загрозу набігів шляхом остаточного підкорення та започаткувавши нову еру східної експансії."
  flavor_rus.5.a: "Останній рубіж, який треба приборкати."
  flavor_rus.5.b: "Нічого більше, ніж пасовище для худоби."
  flavor_rus.5.historical_info: "Відразу після падіння Астрахані цар Іван IV розпочав кампанію в степах на південь від Казані, де мешкала Ногайська Орда. Це був перший крок для подальшої експансії на схід, і кампанію очолювали козаки та фінансувала могутня купецька родина Строганових. За цим послідувало завоювання Сибірського ханства та подальше знищення останнього ханства, що дозволило досліджувати та контролювати величезні внутрішні території. Згодом козаки будували міста зі своїх острогів (простих укріплень для забезпечення транзиту) і досягли Тихого океану в Охотську в 1645 році."
  flavor_rus.6.title: "Вибрана Рада"
  flavor_rus.6.desc: "Влада [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] перешкоджає централізації влади, необхідній для швидкого прийняття рішень. Було запропоновано створити виконавчу раду з обраних осіб, щоб прискорити урядові процедури та приборкати вплив дворян, надаючи можливість вирішувати різноманітні питання та впроваджувати необхідні реформи. [alexi_adashev.GetName] та [sylvestr_the_priest.GetName] є близькими друзями [ROOT.GetCountry.GetGovernment.GetRulerTitle] і, як очікується, увійдуть до ради."
  flavor_rus.6.a: "Грізна сила здібних мужів."
  flavor_rus.6.b: "Така рада не матиме жодного впливу."
  flavor_rus.6.tt3: "[alexi_adashev.GetNameWithNoTooltip] та [sylvestr_the_priest.GetNameWithNoTooltip] вистежені та страчені на радість [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  enable_chosen_rada_reform: "Надає доступ до [ShowGovernmentReformName('chosen_rada_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.6.historical_info: "Вибрана Рада була групою радників, які відіграли значну роль у перші роки правління Івана IV. Вона складалася з таких осіб, як Олексій Адашев та священик Сильвестр, які були довіреними радниками великого князя Івана IV і були необхідні для зусиль Івана щодо централізації влади, реформування правової системи та вирішення різних питань, що стосувалися держави."
  flavor_rus.7.title: "Пограбування [ShowLocationNameWithNoTooltip('moscow')]"
  flavor_rus.7.desc: "Триваючий конфлікт з [moscow_sacker.GetName] набув руйнівного повороту, оскільки їхні сили прорвали ворота [ShowLocationName('moscow')], залишаючи за собою слід руйнування. Будівлі були підпалені, і до тих, хто вижив, надходять трагічні повідомлення про жертви серед цивільного населення. Це найжахливіша катастрофа для [ROOT.GetCountry.GetName]!"
  flavor_rus.7.a: "Перенаправити зусилля з надання допомоги."
  rus_sacked_moscow: "Пограбована Москва"
  flavor_rus.7.b: "Скористайтеся нагодою, щоб розгромити будь-яку опозицію."
  flavor_rus.7.historical_info: "У 1558 році цар Іван IV, усвідомлюючи важливість вільного доступу до Балтики для європейської торгівлі, переключив свою увагу на захід. Таким чином, він розпочав війну, намагаючись встановити російське панування над Лівонією. Спочатку Московія досягла успіху, розгромивши лівонських лицарів, однак їхній союзник Литва незабаром після цього стала невід'ємною частиною Польщі. Війна затягнулася – тоді як шведи, які захищали власні інтереси в Естонії, підтримували Польщу проти Московії, кримські татари атакували Астрахань і навіть здійснили масштабне вторгнення в Московію в 1571 році. Це призвело до пограбування та спалення Москви, залишивши стояти лише Кремль."
  flavor_rus.8.title: "Система кормління"
  flavor_rus.8.desc: "Поточні зусилля щодо консолідації влади та контролю в [ROOT.GetCountry.GetAdjective] державі наштовхуються на перешкоди, оскільки занадто багато влади зосереджено в руках регіональних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Щоб подолати цю проблему, ми могли б запровадити систему, за якої цар отримує контроль над розподілом фінансових та матеріальних потреб [ShowPopTypeName('nobles')], щоб підтримувати баланс влади та контроль над дворянством та бюрократією, забезпечуючи їхню постійну підтримку."
  flavor_rus.8.a: "Повідець ніколи не буває занадто коротким."
  flavor_rus.8.b: "Архаїчно та непотрібно."
  flavor_rus.8.historical_info: "Система кормління була системою забезпечення фінансових та матеріальних потреб російського дворянства та бюрократії за часів правління Івана Грозного. Ця система була важливим компонентом його зусиль зі зміцнення влади та контролю в Російській державі. Дворяни, які отримували вигоду від системи кормління, стали фінансово залежними від царя. Ця залежність допомагала забезпечити їхню лояльність та стримувала потенційну опозицію."
  flavor_rus.9.title: "Незалежність [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ShowReligionNameWithNoTooltip('orthodox')] Церкви"
  flavor_rus.9.desc: "Падіння [ShowLocationName('constantinople')], історично осідку церковної влади для [ShowReligionName('orthodox')], надає нам значну нагоду. Ми повинні тепер вирішити, чи підтримувати спадщину та виступати за передачу контролю над [ShowReligionAdjectiveWithNoTooltip('orthodox')] Церквою до [ShowLocationName('moscow')], чи прагнути альтернативи – відвоювання колишньої імперської столиці у [ShowReligionGroupAdjective('muslim')|U] невірних."
  flavor_rus.9.a: "Амбітна мета, без сумніву."
  rus_aspires_to_lead_orthodoxy: "Прагне очолити Православ'я"
  flavor_rus.9.b: "Наша доля – звільнити Константинополь."
  flavor_rus.9.historical_info: "Незадовго до краху Візантійської імперії, Російська Церква стала, по суті, незалежною від Константинопольського Патріархату. Митрополиту Іоні, призначеному Собором російських єпископів, було надано титул Митрополита Московського і всієї Русі. Відтоді Російська Церква ставала все більш і більш незалежною від Константинополя, натомість об'єднуючись з Російською державою."
  flavor_rus.10.title: "Ярмо кріпацтва"
  flavor_rus.10.desc: "Поточний спалах [ShowDiseaseName('bubonic_plague')] спустошує сільські громади по всій [ROOT.GetCountry.GetName], з повідомленнями, що цілі села залишаються покинутими, оскільки мешканці прагнуть уникнути божественної кари, накладеної на них. Поля залишаються без догляду, що створює неминучий ризик значного зменшення врожаю, якщо ситуація не буде негайно вирішена."
  flavor_rus.10.a: "Закріпачити селян."
  flavor_rus.10.tt: "У демонстрації об'єднаної сили, кілька громад повстають проти своїх [ShowPopTypeName('nobles')] панів у запеклій опозиції до запропонованих змін"
  STATIC_MODIFIER_NAME_unattended_crops: "Недоглянуті посіви"
  flavor_rus.10.b: "Не закріпачувати їх."
  flavor_rus.10.historical_info: "Наприкінці шістнадцятого століття посуха, голод і чума вбили півмільйона людей у Московії. Селяни тікали зі своїх сіл, залишаючи свої володіння, які заростали бур'янами. У відповідь було постановлено, що селянам заборонялося залишати маєтки, на яких вони народилися. Селяни справді стали кріпаками."
  flavor_rus.11.title: "Стоглавий собор"
  flavor_rus.11.desc: "У 1551 році митрополит Макарій скликав Церковний собор, який став відомим як Стоглавий собор, з метою уніфікації церковних обрядів та обов'язків по всій Русі. Вони також вимагали, щоб уряд скасував свою юрисдикцію над Церквою."
  flavor_rus.11.a: "Підтвердити ці зміни"
  flavor_rus.11.b: "Заборонити ці ідеї"
  flavor_rus.12.title: "[boris_morozov.GetNameWithNoTooltip]"
  flavor_rus.12.desc: "Ощадливий фінансист [boris_morozov.GetName] вважається амбітним і вправним державним діячем, який міг би значно покращити щоденні операції [ROOT.GetCountry.GetAdjective] держави. Його прагнення збільшити доходи скарбниці, ймовірно, призведуть до значних скорочень зарплат державних службовців та оптимізації управління державними справами. Без сумніву, він є цінним активом в управлінні країною, [boris_morozov.GetSheHe] очікується, що він буде відстоювати позиції [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] на додаток до [boris_morozov.GetHisHer] інших обов'язків при дворі."
  flavor_rus.12.a: "Запросити [boris_morozov.GetHimHer] до двору."
  STATIC_MODIFIER_NAME_steamroll_administrator: "Адміністратор-паровий каток"
  flavor_rus.12.tt2: "[boris_morozov.GetHisHer|U] потужний вплив як регента сприяє інтересам [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_rus.12.tt3: "[boris_morozov.GetSheHe|U] може впровадити додаткові реформи, якщо служитиме [Concept('regent', 'CONCEPT_PLACEHOLDER')|e] або буде призначений до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.12.b: "Збіднілий плебей не може правити [ROOT.GetCountry.GetFlavorRank]."
  flavor_rus.12.historical_info: "Борис Морозов був шурином і вихователем царя Олексія та очолював уряд на початку його правління. Наглядаючи за виплатою заробітної плати та Великою скарбницею, Морозов намагався збільшити державний дохід, знижуючи зарплати та запроваджуючи нові податки. Високий податок на сіль спричинив Соляний бунт 1648 року і дав йому назву. Після короткого вигнання до монастиря Морозов зміг повернутися до Москви, де він тримався в тіні, контролюючи значну частину уряду."
  flavor_rus.13.title: "Соборне уложення"
  flavor_rus.13.desc: "Існуюче законодавство, що визначає правову та соціальну структуру [ROOT.GetCountry.GetName], застаріле і не відповідає своєму часу, ані владі, якою володіє [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Ми повинні написати нову всеосяжну правову систему, що ґрунтується на традиційному [ROOT.GetCountry.GetAdjectiveWithNoTooltip] праві з включеними елементами [GetCountry('BYZ').GetAdjective] права. Це дозволить і надалі зміцнювати центральну владу, створювати гармонійні відносини між Церквою та Державою, а також запроваджувати суворі покарання за такі злочини, як крадіжка, державна зрада та повстання."
  flavor_rus.13.a: "Запровадити його."
  flavor_rus.13.b: "Навіщо змінювати виграшну формулу?"
  flavor_rus.13.historical_info: "Соборне уложення було зведенням законів, прийнятим у Московському царстві представницькою асамблеєю російських станів. Його метою було створення оновленої правової бази для здійснення правосуддя, кримінального та цивільного права, а також регулювання соціальних та економічних питань. Воно ще більше закріпило кріпацтво, посиливши існуючий соціальний лад, прив'язавши селян до землі."
  flavor_rus.14.title: "Реформи Никона"
  flavor_rus.14.desc: "Практики [ShowCultureName('greek_culture')] та [ShowCultureGroupName('russian_group')] Церков з часом розійшлися, і існує кілька розбіжностей у богослужбових книгах, ритуалах та іконописі. Ми повинні вжити заходів для модернізації Церкви, щоб досягти гармонії між нашими двома автокефальними громадами."
  flavor_rus.14.a: "Модернізуймо Церкву."
  flavor_rus.14.b: "Прислухатися до розкольників."
  flavor_rus.14.tt2: "[nikita_minin.GetSheHe|U] може прискорити релігійну реформу, якщо його призначити до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.14.historical_info: "Никон, Патріарх Російської Православної Церкви, здійснив масштабні реформи для очищення церковної дисципліни та ритуалів, виправляючи богослужбові книги за грецькими зразками. Зіткнувшись із сильним опором, Никон був вигнаний і зрештою позбавлений сану. Незважаючи на його усунення, його реформи збереглися."
  flavor_rus.15.title: "Розкол"
  flavor_rus.15.desc: "Недавні реформи сколихнули церковні води [ROOT.GetCountry.GetAdjective] [ShowReligionAdjective('orthodox')] Церкви, спричинивши розкол між тими, хто виступає за зміни, і тими, хто проти будь-яких змін, які сприймаються як радикальні та далекосяжні. Ми повинні вирішити, чи слід нам відкотити нещодавні зміни, чи твердо стояти на своєму зобов'язанні щодо нових принципів, що керують трансформацією Церкви."
  flavor_rus.15.a: "Ці реформи необхідні."
  flavor_rus.15.tt1: "Енергійний та красномовний [nikita_minin.GetName] розпочинає сміливі реформи на велике розчарування [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"
  flavor_rus.15.b: "Підтримати старі традиції."
  flavor_rus.15.c: "Позбавити [nikita_minin.GetNameWithNoTooltip] влади."
  flavor_rus.15.tt2: "[nikita_minin.GetName] судять синодом і понижують до становища ченця"
  flavor_rus.15.historical_info: "Розкол був значним розколом у Російській Православній Церкві, що стався після церковних реформ Патріарха Никона. Багато хто вважав зміни надто масштабними та відхиленням від істинного Православ'я, що призвело до утворення окремих релігійних громад, щоб продовжувати практикувати старі звичаї. Відомі як секта розкольників, вони підтримувалися такими групами, як духобори, і трималися старих практик, заборонених Никоном."
  flavor_rus.16.title: "Великі реформи"
  flavor_rus.16.desc: "Наші сусіди стрімко розвиваються в галузі науки, залишаючи за собою слід відсталості, яка гноїться в нашому суспільстві. Ми повинні прийняти суспільні реформи та звільнитися від кайданів традицій, інакше ризикуємо бути перевершеними та витісненими іншими державами, які адаптуються швидше."
  flavor_rus.16.a: "Необхідне зло."
  flavor_rus.16.tt1: "Спроби обмежити церковну владу викликають глибоке обурення у [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"
  flavor_rus.16.tt2: "Реформи, ймовірно, спровокують повстання"
  flavor_rus.16.b: "Уникати зовнішнього впливу."
  flavor_rus.16.tt3: "Уроки, винесені з великої подорожі Європою, ігноруються"
  flavor_rus.16.historical_info: "Протягом кінця сімнадцятого та початку вісімнадцятого століття Петро I запровадив низку реформ, спрямованих на перетворення Росії на сучасну європейську державу. Уряд та армія були реформовані під наглядом радників із Західної Європи, і Петро, мріючи зробити Росію морською державою, прагнув взяти під контроль узбережжя Балтійського та Чорного морів. Різкі реформи зустріли сильний опір, оскільки люди були обурені раптовим відмовою від їхнього традиційного життя та звичаїв, і за ними послідували кілька повстань."
  flavor_rus.17.title: "Булавінське повстання"
  flavor_rus.17.desc: "Невдоволення нещодавно прийнятими реформами спричинило широкомасштабне повстання [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які прагнуть повалити режим і повернути [ROOT.GetCountry.GetName] до старих порядків. До нього слід поставитися з максимальною терміновістю, перш ніж воно дестабілізує країну та зведе нанівець кроки, зроблені для модернізації."
  flavor_rus.17.a: "Придушити повстання."
  flavor_rus.17.b: "Закликати до здорового глузду."
  flavor_rus.17.tt1: "Військова доблесть [target_root_country.GetGovernment.GetRuler.GetName] вселяє страх у серця кількох лідерів повстанців, обмежуючи масштаби повстання"
  flavor_rus.17.tt2: "Далекоглядні благання [target_root_country.GetGovernment.GetRuler.GetName] переконують лідерів повстанців скласти зброю та підтримати реформи"
  flavor_rus.17.c: "Скасувати більшість реформ."
  bulavin_rebellion: "Булавінське повстання"
  flavor_rus.17.historical_info: "Булавінське повстання спалахнуло в жовтні 1707 року, коли Кіндрат Булавін та загін донських козаків влаштували засідку та вбили групу мисливців за головами, відправлених Петром I для арешту селян-втікачів, що переховувалися в Донському регіоні. Основні причини полягали в тому, що новостворена держава Петра розширювалася, що почало посягати як на землі козаків, так і на їхню напівавтономію. Повстання було спрямоване не проти Царства, а проти Петра та його радників, яких вважали злими силами, чиї реформи розглядалися як спроба знищити Росію."
  flavor_rus.18.title: "Дипломатичне інтермеццо"
  flavor_rus.18.desc: "Східний зв'язківець [fyodor_baikov.GetName] нещодавно відвідав [GetCountry('CHI').GetName] з метою встановлення дипломатичних зв'язків та забезпечення договору про взаємну повагу. На жаль, належний етикет не був дотриманий через культурні зіткнення, що призвело до прикрого непорозуміння, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] підкорився верховенству [GetCountry('CHI').GetNameWithNoTooltip], з вимогою, надісланою до [ROOT.GetCountry.GetAdjective] двору, негайно розпочати сплату данини. Цю дипломатичну помилку необхідно вирішити, інакше ми ризикуємо розпалити внутрішнє невдоволення, що нагадує темні часи [ShowCultureGroupName('tatar_group')] правління."
  flavor_rus.18.a: "Ігнорувати вимоги."
  flavor_rus.18.tt1: "Холодні відносини між [target_root_country.GetNameWithNoTooltip] та [GetCountry('CHI').GetNameWithNoTooltip] тимчасово заморожують дипломатичні відносини та спільні ініціативи."
  rus_ignored_vassal_demands: "Ігноровані вимоги васала"
  flavor_rus.18.b: "Визнати васалітет, але відмовитися від сплати."
  rus_paid_vassal_respect: "Виявлена повага васала"
  flavor_rus.18.c: "Сплатити данину."
  rus_paid_vassal_tribute: "Сплачена данина васала"
  flavor_rus.18.historical_info: "Федір Байков вирушив до Пекіна в 1656 році, щоб налагодити дипломатичні відносини з Китаєм. Він отримав чіткі інструкції не брати участь у жодних принизливих ритуалах, які б означали неповноцінність Росії щодо Китаю. Тому, коли він прибув до воріт Забороненого міста, він відмовився виконувати коутоу, коли його попросили, оскільки це означало б визнання верховенства імперії Цін російською державою згідно з китайськими концепціями. Це призвело до кількох місяців ізоляції та подальшого вигнання з Пекіна."
  flavor_rus.19.title: "Козацьке повстання Степана Разіна"
  stenka_razin_tt: "[Concept('rebel_origin.GetName] [pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionNameWithNoTooltip('steppes_region')] приєднуються до [stenka_razin.GetName]"
  flavor_rus.19.desc: "Зіткнувшись із соціальною несправедливістю та економічними труднощами, [rebel_origin.GetName] козаки регіону [ShowRegionName('steppes_region')] повстали, намагаючись відстояти свою незалежність. Ми могли б спробувати придушити повстання силою наших збройних сил або спробувати дипломатичне рішення, запропонувавши автономне рішення."
  flavor_rus.19.a: "Придушити усі сепаратистські рухи."
  flavor_rus.19.b: "Запропонувати обмежену автономію."
  flavor_rus.19.c: "Спробувати духовне рішення."
  flavor_rus.19.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] звертаються до лідерів повстанців, які представляють себе як захисники [ShowReligionAdjective('orthodox')] віри, апелюючи до їхніх спільних цінностей, щоб прийняти компроміс."
  stenka_razin: "Козацьке повстання Степана Разіна"
  stenka_razin_gives_up_tt1: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('steppes_region')] [Concept('region', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowNamedValue('control_ultimate_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  stenka_razin_gives_up_tt2: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('steppes_region')] [Concept('region', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.19.historical_info: "Степан Разін здобув славу та багатство завдяки успішним набігам на перські та російські поселення. У 1670 році він розпочав кампанію проти волзьких фортечних міст царя, захопивши Царицин та Астрахань із загоном у 7000 козаків. Займаючись розпустою та звірствами, Разін замінив місцеві уряди козацьким самоврядуванням. Його повстання поширилося, захопивши Саратов і просуваючись до Симбірська. Зіткнувшись з лояльною армією, Разін зазнав вирішальної поразки у 1671 році, що призвело до його захоплення, тортур та страти на Червоній площі в Москві."
  flavor_rus.20.title: "Нерчинський договір"
  flavor_rus.20.desc: "Територіальні суперечки між [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank] та [GetCountry('CHI').GetName] ймовірно, посиляться, оскільки ми продовжуємо розширюватися на схід. Слід запропонувати договір, щоб запобігти подальшому конфлікту та зміцнити наші претензії на регіони [ShowRegionName('west_siberia_region')] та [ShowRegionName('east_siberia_region')]. В обмін ми могли б відмовитися від будь-якого контролю над [ShowRegionName('manchuria_region')] як жест доброї волі."
  flavor_rus.20.a: "Умови прийнятні."
  flavor_rus.20.tt1: "Наполегливість [target_root_country.GetName] щодо [ShowRegionName('west_siberia_region')] та [ShowRegionName('east_siberia_region')] безсумнівно спровокує будь-які країни зі схожими претензіями на ці регіони."
  rus_treaty_of_nerchinsk: "Нерчинський договір"
  rus_claimed_siberia: "Заявлено Сибір"
  flavor_rus.20.b: "Відхилити договір як безглуздий."
  rus_refused_treaty_of_nerchinsk: "Відхилено Нерчинський договір"
  flavor_rus.20.historical_info: "Російська розвідка та колонізація Сибіру, розпочата за Івана Грозного, тривала протягом 17 століття. До кінця століття більша частина Східного Сибіру була відкрита, включаючи Камчатку, досягнуту в 1679 році. Басейн Амуру був досліджений у 1650-х роках Хабаровим. У 1689 році російсько-китайський прикордонний конфлікт знайшов вирішення в Нерчинському договорі, що визначив кордон по Амуру. У 1727 році Кяхтинський договір сприяв створенню російської торгової станції в Пекіні, столиці маньчжурської династії."
  flavor_rus.21.title: "Велика Північна війна"
  flavor_rus.21.desc: "[GetCountry('SWE').GetFlavorRank] [GetCountry('SWE').GetName] межує з нами, і існують труднощі у визначенні загрози, яку вони можуть становити, якщо ми станемо їхньою наступною ціллю. Було б розсудливо розпочати переговори з країнами, які мають напружені стосунки з ними, та шукати спільну позицію, щоб стримати зростання Північного Лева."
  flavor_rus.21.a: "Сила в єдності."
  rus_political_aggressions: "Політичні агресії"
  rus_enemy_of_sweden: "Ворог Швеції"
  flavor_rus.21.b: "Нехай інші самі про себе дбають."
  flavor_rus.21.historical_info: "Наприкінці сімнадцятого століття Швеція постала як велика держава після кількох битв з державами Балтійського моря. Але в 1697 році 15-річний Карл XII зійшов на престол. Відчувши слабкість, російський цар Петро I уклав союз з Данією та Річчю Посполитою-Саксонією. Однак, за британської та голландської військово-морської допомоги, Карл XII висадився на Зеландії та швидко розгромив данців, потім рушив до Естляндії, де його армія, що значно поступалася чисельністю, здобула вирішальну перемогу над росіянами. Зрештою Карл вирішив йти на Москву, але сувора зима та російські набіги знищили його армію, і він був остаточно розбитий у Полтавській битві 1709 року."
  flavor_rus.22.title: "Абсолютна перебудова управління"
  flavor_rus.22.desc: "Настав час модернізувати управління [ROOT.GetCountry.GetName], відмовившись від архаїчних традицій та неефективних засобів управління. Зміцнивши законодавчу владу [ROOT.GetCountry.GetGovernment.GetRulerTitle] та забезпечивши швидке виконання [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] указів скоординованим та централізованим урядовим органом, ми можемо рухатися вперед і гарантувати, що будь-яка реформа не буде зірвана корупцією та тривалими апеляціями."
  flavor_rus.22.a: "Новий початок."
  enable_russian_absolutism_reform: "Надає доступ до [ShowGovernmentReformName('russian_absolutism')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.22.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] розлючені відвертою зневагою до їхніх привілеїв та прав"
  flavor_rus.22.b: "Старий шлях кращий!"
  flavor_rus.22.historical_info: "Під час правління Петра 'Великого' він замінив середньовічні та застарілі форми правління ефективною автократією. У 1711 році він скасував боярську думу та заснував Сенат як верховний орган держави, що координував центральні та місцеві дії, наглядав за доходами та розробляв законодавство. До цивільних установ застосовувалася військова дисципліна, з офіцером гвардії на чергуванні в Сенаті."
  flavor_rus.23.title: "Урядова опіка"
  flavor_rus.23.desc: "Патріархат зберігає значну владу та вплив, проте він продовжує перешкоджати прогресу та інноваціям на користь традицій та накопичення церковної влади. Його необхідно скасувати, а на його місце запровадити нову систему для посилення державного контролю над Церквою та забезпечення її покори державі."
  flavor_rus.23.a: "Скасувати Патріархат."
  flavor_rus.23.tt1: "Священний Синод запроваджує сувору цензуру на всі публікації"
  flavor_rus.23.b: "$common_string_leave_them_be$"
  flavor_rus.23.c: "Звичайний бізнес, за певну ціну."
  flavor_rus.23.historical_info: "У 1721 році Петро 'Великий' скасував Московський Патріархат, щоб підпорядкувати Православну Церкву державі. Священний Синод, духовна колегія, що представляла волю Царя, замінив патріарха. Обер-прокурор був призначений для нагляду за Священним Синодом, який жорстоко переслідував дисидентів та запроваджував цензуру на публікації."
  flavor_rus.24.title: "Академія наук"
  flavor_rus.24.desc: "Важливо, щоб ми розвивали знання та наукові пошуки, аби забезпечити [ROOT.GetCountry.GetName] актуальність на міжнародній арені. Запропонуймо заснувати Академію наук у нашій новій столиці просвітництва та перетворити її на бастіон інновацій у таких галузях, як математика, астрономія, фізика, хімія та інші."
  flavor_rus.24.a: "Інтелектуальна міць повинна відповідати військовій силі."
  flavor_rus.24.tt1: "Внесок [vasily_tatishchev.GetName] в академію значно прискорює її заснування, додаючи до її внесків у [ShowLocationName('neva')]"
  flavor_rus.24.tt2: "Літературні твори [james_bruce.GetName] додано до колекції академії, збагачуючи її наукові ресурси"
  flavor_rus.24.b: "Прогрес через діалог."
  flavor_rus.24.tt3: "Найкращі уми [target_root_country.GetName] активно ведуть широке листування з іншими освітніми установами по всій Європі, обмінюючись ідеями та віддаючи перевагу шляху дипломатії"
  flavor_rus.24.historical_info: "Санкт-Петербурзька академія наук була заснована Петром 'Великим' після його тривалої подорожі Європою в рамках 'Великого посольства'. Академія черпала натхнення з Паризької академії, а також з Лондонського королівського товариства, які мали схожу мету – сприяти науковим дослідженням. Академія відіграла важливу роль у просуванні наукових знань та культурного розвитку в Росії."
  flavor_rus.25.title: "Амбітна комісія"
  flavor_rus.25.desc: "Воля народу часто ігнорується, а відсутність конституції в нашому кодексі законів робить права та привілеї простої людини крихкою гарантією, яка може бути змінена за примхою нового указу. Скличмо комісію для вирішення цих питань. Комісії буде доручено вирішальну місію розробки конституції, яка відображатиме різноманітні погляди та прагнення [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], сприяючи почуттю громадянської залученості та забезпечуючи демократичну основу для нашого суспільства."
  flavor_rus.25.a: "Ігнорувати несправедливість суспільства."
  flavor_rus.25.b: "Спробувати досягти безплідного компромісу."
  flavor_rus.25.tt1: "Харизматична та приваблива поведінка [target_root_country.GetGovernment.GetRuler.GetName] ефективно сприяє відчуттю інклюзивності та рівності, попри відсутність значних змін"
  flavor_rus.25.historical_info: "У 1767 році Катерина II 'Велика' скликала комісію, що складалася з делегатів від усіх провінцій та всіх соціальних класів, крім кріпаків, щоб з'ясувати справжні бажання свого народу та розробити конституцію. Дебати тривали місяцями і ні до чого не призвели. \"Наказ\" Катерини для комісії був проєктом конституції та кодексу законів. Його вважали занадто ліберальним для публікації у Франції та він залишився мертвою літерою в Росії."
  flavor_rus.26.title: "Державний контроль над торгівлею"
  flavor_rus.26.desc: "Існує нагальна потреба в модернізації економіки та консолідації державного контролю для зміцнення наших фінансів, стимулювання вітчизняних галузей промисловості та збільшення експорту. Давайте запровадимо низку меркантилістських реформ, щоб спрямувати [ROOT.GetCountry.GetName] до економічного процвітання та самодостатності."
  flavor_rus.26.a: "Так, нам потрібні реформи."
  state_promoted_mercantilism_key: "Державний меркантилізм"
  flavor_rus.26.b: "Обираємо вільну торгівлю."
  flavor_rus.26.historical_info: "Наприкінці XVIII століття Росія прийняла дедалі більш меркантилістську політику як наслідок зростаючої монополізації влади аристократії. Реформи кинули виклик усталеним нормам та інтересам, що призвело до опору з боку груп, які сприймали зміни як руйнівні для їхнього статусу та впливу."
  flavor_rus.27.title: "Повстання Пугачова"
  flavor_rus.27.desc: "Широке невдоволення важкими умовами, з якими зіткнулися [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], та загальна опозиція будь-яким спробам модернізувати та диверсифікувати економіку спровокували повстання в [ShowRegionName('ural_region')] регіоні. Очолюване харизматичним повстанцем на ім'я [yemelyan_pugatchev.GetName], [yemelyan_pugatchev.GetSheHe] обіцяє скасування кріпацтва, зменшення податків та припинення адміністративних реформ."
  flavor_rus.27.a: "Маси рухаються."
  pugatchev_uprising: "Пугачовське повстання"
  pugatchev_uprising_tt: "Багато [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('ural_region')] приєднуються до [pugatchev_uprising.GetName]"
  flavor_rus.27.tt1: "Повстання поширюється на [ShowRegionName('russian_region')] регіон через широке невдоволення серед [ShowPopTypeName('peasants')]"
  flavor_rus.27.b: "Запропонувати значні поступки."
  flavor_rus.27.historical_info: "Пугачовське повстання почалося в 1773 році в Уральському регіоні. Очолюване Омеляном Пугачовим, це було повстання витіснених козаків і селян, які йшли за лідером, що видавав себе за Петра III, убитого чоловіка цариці Катерини II. Взимку 1773-1774 років повстання взяло під контроль більшу частину басейну Волги і навіть загрожувало Москві, поставивши царство Катерини на межу краху. Зрештою, регулярні війська під командуванням Суворова зуміли захопити Пугачова поблизу Царицина, і його стратили в Москві."
  flavor_rus.28.title: "Реакційна політика"
  flavor_rus.28.desc: "Нещодавнє повстання продемонструвало необхідність більш обережного підходу. Ми повинні відновити певні привілеї для [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] в обмін на підтримання ними порядку, і застосувати більш примирливий підхід до реформування економіки, щоб зменшити ризик подальшого опору змінам."
  flavor_rus.28.a: "Видати Жалувану грамоту дворянству."
  flavor_rus.28.b: "Дозволити певну свободу."
  flavor_rus.28.historical_info: "Після Пугачовського повстання Катерина II змінила свою позицію щодо кріпацтва. Спочатку плануючи емансипацію, вона усвідомила опір, з яким зіткнеться з боку впливових землевласників, що були ключовими для її підтримки. Побоюючись хаосу, вона відмовилася від цієї ідеї, натомість посиливши гнітючу систему. Катерина поширила кріпацтво на українців, які раніше були вільними, і погіршила становище селян, надавши коронні землі своїм союзникам. До кінця її правління в Росії було мало вільних селян, що різко контрастувало з її початковими намірами."
  flavor_rus.29.title: "Дещо ліберальне законодавство"
  flavor_rus.29.desc: "Соціальна ієрархія [ROOT.GetCountry.GetName] сильно залежить від прив'язки [ShowPopTypeName('peasants')] до землі та обмеження їхньої здатності пересуватися. Однак останнім часом лунають заклики до більш ліберального підходу, щоб поступово змістити економічну залежність від кріпацтва та пом'якшити деякі з жорсткіших практик, не ставлячи під загрозу автократичне правління, яке так добре нам служило."
  flavor_rus.29.a: "Обмежити кріпацтво."
  flavor_rus.29.tt1: "Обережна натура [ROOT.GetCountry.GetGovernment.GetRuler.GetName] передбачає більш поступову зміну в бік свободи для [ShowPopTypeName('peasants')]"
  flavor_rus.29.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] нажахані поширеним смаком свободи, наданим нижчим верствам суспільства"
  flavor_rus.29.b: "Це ідеально, як є."
  flavor_rus.29.historical_info: "Цар Павло I, прагнучи зміцнити самодержавство, скасував багато політик Катерини «Великої», включаючи відновлення централізованих адміністративних установ, посилення бюрократичного контролю в місцевому управлінні та обмеження дворянської влади. На відміну від Катерини, яка увічнила кріпацтво, Павло був першим царем, який зменшив тягар для простих росіян."
  flavor_rus.30.title: "Іскри Змін"
  flavor_rus.30.desc: "Впровадження нової конституційної системи залишається головним пріоритетом для прогресивного піонера [mikhail_speransky.GetName], який залишається в кабінеті, щоб очолити будь-які відповідні зміни. Приймімо вітри змін і вирушимо в незвідані води, маючи лише ліберальний компас, щоб вести нас."
  flavor_rus.30.a: "Вітри, вперед!"
  enable_speransky_liberalization_reform: "Надає доступ до [ShowGovernmentReformName('speransky_liberalization_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.30.tt1: "Прогресивні кроки робляться для модернізації адміністрації [target_root_country.GetName] попри опір [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]"
  flavor_rus.30.b: "Суперечливо та небезпечно."
  flavor_rus.30.historical_info: "Цар Олександр I, керований баченням реформ, здійснив значні зміни під час свого правління. У 1802 році він запровадив більш організовану адміністрацію, створивши вісім міністерств, що продемонструвало його відданість ефективному управлінню. Ця епоха стала свідком впливу Михайла Сперанського, ключового радника царя та прихильника модернізації."
  flavor_rus.31.title: "POSTEDIT_Аньяльська змова"
  flavor_rus.31.desc: "Значна група фінських солдатів на службі у [johan_jagerhorn.GetNameWithNoTooltip], члена [GetCountry('SWE').GetAdjective] [GetCountry('SWE').GetGovernment.GetEstateName('nobles_estate')], надіслала нам депешу, оголошуючи поточну війну незаконною та запитуючи, чи розглянемо ми можливість допомогти їм сформувати незалежну націю [GetCountry('FIN').GetName]. Це може бути корисним як буферна держава та слугувати плацдармом для подальших вторгнень на [GetCountry('SWE').GetAdjectiveWithNoTooltip] територію."
  flavor_rus.31.a: "Надайте їм нашу підтримку."
  flavor_rus.31.a.custom: "Усі [ShowPopTypeName('peasants')] у [ShowAreaName('finland_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [anjala_conspirators.GetName]"
  anjala_conspirators: "POSTEDIT_Аньяльські змовники"
  flavor_rus.31.b: "Відхиліть їхні прохання."
  rus_rejected_anjala_league: "Відхилена POSTEDIT_Аньяльська ліга"
  flavor_rus.31.tt1: "Послідовники [johan_jagerhorn.GetNameWithNoTooltip] навряд чи зможуть зібрати достатньо підтримки для організації повстання"
  flavor_rus.31.historical_info: "POSTEDIT_Аньяльська змова була змовою групи шведських офіцерів і політиків, які були незадоволені триваючою війною проти Росії. Змовники прагнули домовитися про окремий мир з Росією, вважаючи, що продовження війни призведе до значних втрат для Швеції. Подія мала великий вплив на шведську політику. Хоча мирні переговори відбулися без прямої участі змовників, їхні дії підкреслили невдоволення та розчарування правлінням короля."
  flavor_rus.32.title: "[michailo_shcherbatov.GetNameWithNoTooltip]"
  flavor_rus.32.desc: "Консервативний інтелектуал [michailo_shcherbatov.GetName] багато пише про культурні, соціальні та політичні питання, висловлюючи традиційні погляди, які критикують вплив ідей Просвітництва в [ROOT.GetCountry.GetName]. [michailo_shcherbatov.GetHisHer|U] праці загалом висловлюють занепокоєння щодо ерозії моралі та соціального порядку перед обличчям західноєвропейських впливів, проте він може виявитися цінним активом, якщо ми бажаємо повернутися до традиційних цінностей."
  flavor_rus.32.a: "Запросіть його до двору."
  flavor_rus.32.tt2: "[michailo_shcherbatov.GetHisHer|U] літературні твори значно впливають на [target_root_country.GetAdjective] суспільство та спрямовують його до консервативної думки"
  flavor_rus.32.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлює захоплення зростаючим впливом [michailo_shcherbatov.GetNameWithNoTooltip], оскільки [michailo_shcherbatov.GetHisHer] думки тісно узгоджуються з [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]."
  STATIC_MODIFIER_NAME_literary_moralist: "Літературний мораліст"
  flavor_rus.32.b: "Наші цінності не збігаються."
  flavor_rus.32.historical_info: "Михайло Щербатов був важливим державним діячем, істориком і філософом у Росії XVIII століття. Він став членом Комерц-колегії у 1768 році, президентом Колегії державних доходів у 1778 році та сенатором у 1779 році. Хоча він був провідним представником російського консерватизму та критиком російського Просвітництва, його пам'ятають як автора кількох праць, що критикували занепад моральних цінностей."
  flavor_rus.33.title: "[vasily_tatishchev.GetNameWithNoTooltip]"
  flavor_rus.33.desc: "Освічений реформатор і проникливий історик [vasily_tatishchev.GetName] деякий час служив у війську, швидко піднімаючись по службі, щоб потім зайняти адміністративну посаду в урядовому відомстві. [vasily_tatishchev.GetSheHe|U] попросив(ла) звільнитися з активної служби та зайнятися [vasily_tatishchev.GetHisHer] письменницькою діяльністю, прохання, яке ми повинні обміркувати, оскільки [vasily_tatishchev.GetSheHe] міг(могла) би бути корисним(корисною), залишаючись на [vasily_tatishchev.GetHisHer] урядовій посаді."
  flavor_rus.33.a: "Заохотити [vasily_tatishchev.GetHisHer] письменницьку діяльність."
  flavor_rus.33.b: "[vasily_tatishchev.GetSheHe|U] повинен(на) залишатися на консультативній посаді."
  flavor_rus.33.c: "Геть з наших очей!"
  STATIC_MODIFIER_NAME_exiled: "Вигнаний(а)"
  flavor_rus.33.tt2: "[vasily_tatishchev.GetSheHe|U] звільняється зі служби та висилається до [ShowRegionName('east_siberia_region')] до кінця [vasily_tatishchev.GetHisHer] життя, що зменшує ймовірність створення будь-яких літературних творів"
  flavor_rus.33.historical_info: "Російський державний діяч та етнограф Василь Татіщев закінчив Інженерну школу в Москві та брав участь у Великій Північній війні проти Швеції. Він став важливою фігурою в Колегії закордонних справ за правління Петра I «Великого», а пізніше підтримав сходження Анни Російської на престол на противагу Верховній таємній раді. Він є автором кількох історіографічних праць, включаючи одну з найраніших повномасштабних робіт з російської історії."
  flavor_rus.34.title: "[mikhail_lomonosov.GetNameWithNoTooltip]"
  flavor_rus.34.desc: "Академічний візіонер і прихильник самодержавства [mikhail_lomonosov.GetName] продемонстрував(ла) великі здібності до наук, філософії та ерудиції. Однак [mikhail_lomonosov.GetHisHer] скромне походження відмовляє [mikhail_lomonosov.GetHimHer] у доступі до вищої освіти. Пропозиція стипендії могла б дозволити [mikhail_lomonosov.GetHimHer] навчатися у Слов'яно-греко-латинській академії в [ShowLocationName('moscow')], інвестиція, від якої ми, ймовірно, отримаємо вигоду в найближчі роки. Крім того, ми могли б вплинути на галузь досліджень залежно від того, в якій області ми бажаємо досягти успіху."
  flavor_rus.34.a: "Людина науки та просвітництва."
  flavor_rus.34.b: "Прихильник освітніх реформ."
  flavor_rus.34.tt2: "[mikhail_lomonosov.GetNameWithNoTooltip] присвячує [mikhail_lomonosov.GetHisHer] час внескам у [target_root_country.GetAdjective] культуру та освіту."
  enable_imperatorskiy_moskovskiy_universitet_advance: "Надає доступ до [ShowAdvanceName('imperatorskiy_moskovskiy_universitet')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.34.tt3: "Внесок [mikhail_lomonosov.GetNameWithNoTooltip] є вирішальним у заснуванні Імператорського [ShowLocationNameWithNoTooltip('moscow')] університету"
  flavor_rus.34.c: "Драконівському авторитаризму тут не місце."
  flavor_rus.34.historical_info: "Михайло Ломоносов був російським вченим та інтелектуалом, який вступив до Слов'яно-греко-латинської академії в Москві у дев'ятнадцять років, видавши себе за сина священика. Отримавши стипендію до Санкт-Петербурзького університету, він навчався за кордоном в Марбурзькому університеті під керівництвом німецького філософа Просвітництва Християна Вольфа. Ломоносов зробив значний внесок у різні наукові галузі, зокрема відкрив атмосферу Венери."
  flavor_rus.35.title: "Нестримний божевільний"
  flavor_rus.35.desc: "Колись такий харизматичний [ROOT.GetCountry.GetGovernment.GetRuler.GetName] потрапив у період великої жалоби після несподіваної смерті [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] дружини, [first_spouse.GetName]. Ірраціональна поведінка та спалахи насильства стали майже щоденним явищем на судових засіданнях, з виданням указів, що наказують Великій Раді, створеній [ShowGovernmentReformName('chosen_rada_reform')], негайно розпуститися. Здається, цьому божевіллю немає кінця."
  flavor_rus.35.a: "Це воля нашого Суверена."
  flavor_rus.35.tt1: "Члени [cabinet|U] вивезені, і їх більше ніколи не бачили"
  flavor_rus.35.b: "Замкнути [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] у вежі."
  flavor_rus.35.historical_info: "Після смерті першої дружини Івана, Анастасії, він звинуватив своїх друзів у раді в її отруєнні, що призвело до їхнього вигнання. Без будь-кого, хто б його стримував, жорстокість Івана посилилася в цей період."
  flavor_rus.36.title: "Палата фінансів"
  flavor_rus.36.desc: "З державним апаратом, що міцно перебуває під нашим контролем, ми повинні запровадити економічне регулювання, щоб забезпечити стабільний потік коштів для підтримки діяльності уряду. Централізований фінансовий орган, такий як Палата фінансів, тісно пов'язаний з [ShowGovernmentReformName('oprichnina')], може бути заснований з додатковим мандатом контролювати ціни, моніторити торгівлю та керувати економічною політикою для забезпечення стабільності."
  flavor_rus.36.a: "Це фіскально доцільно."
  flavor_rus.36.b: "Залізна рука може досягти того ж."
  flavor_rus.36.historical_info: "Деякі з найважливіших російських урядових реформ були запроваджені Іваном IV. Він створив окрему Палату фінансів, що перебувала безпосередньо в його розпорядженні, яка забезпечувала певну ефективність у надходженні та відтоку коштів. Вона також використовувалася для забезпечення реалізації політики опричнини та нагляду за скарбничими чиновниками."
  flavor_rus.37.title: "Годування із землі"
  flavor_rus.37.desc: "З розширенням нашого впливу на нові території, управління зростаючою кількістю локацій стало справжнім викликом. Регіональні [ShowPopTypeName('nobles')] були відправлені для здійснення управління, але їх утримання постійно обтяжує наші фінанси. Розгляд можливості дозволити цим губернаторам покладатися на землю та [ShowPopTypeName('peasants')] у межах їхньої юрисдикції потенційно може полегшити фінансовий тягар, дозволяючи нам перенаправити увагу на більш нагальні справи."
  flavor_rus.37.a: "Добре нагодований шляхтич — задоволений шляхтич."
  flavor_rus.37.b: "Забезпечити їхні потреби."
  flavor_rus.37.historical_info: "Практика отримання засобів до існування із землі була системою, впровадженою в середньовічній Русі, де місцеве населення мало підтримувати провінційних губернаторів. Селяни не завжди могли надати товари, які від них вимагали, змушуючи їх пропонувати оплату натурою безпосередньо правлячому класу. Скасування системи платежів було частиною ширших адміністративних реформ, проведених царем Іваном IV."
  flavor_rus.38.title: "Заходи економії [boris_morozov.GetNameWithNoTooltip]"
  flavor_rus.38.desc: "Фінансовий наглядач [boris_morozov.GetName] готує серію звільнень та скорочень зарплат для зміцнення скарбниці та забезпечення відповідності державного апарату потребам країни. Ці заходи можуть мати несприятливі наслідки для адміністративної спроможності [ROOT.GetCountry.GetName], а також негативний вплив на армію, оскільки як державні службовці, так і солдати побачать зменшення своїх заробітків."
  flavor_rus.38.a: "Ми всі повинні йти на жертви."
  STATIC_MODIFIER_NAME_reduced_government_expenses: "Зменшені державні витрати"
  flavor_rus.38.b: "Делегувати обов'язки [ShowPopTypeName('nobles')]."
  flavor_rus.38.tt1: "Руки [boris_morozov.GetNameWithNoTooltip] дещо зв'язані, оскільки влада відходить від держави"
  flavor_rus.38.historical_info: "Борис Морозов був непохитний у прагненні покращити скрутне фінансове становище Русі і зробив пріоритетом збільшення доходів скарбниці будь-якими засобами. Було підвищено кілька податків, деякі з яких призвели до сумнозвісного Соляного бунту 1648 року, але також були скорочені загальні адміністративні витрати країни."
  flavor_rus.39.title: "Неправильно витлумачений дипломат"
  flavor_rus.39.desc: "Неординарний аташе [fyodor_baikov.GetName] має великий досвід у спілкуванні з іноземними високопосадовцями в далеких країнах і, як очікується, повернеться до активної служби після тривалої подорожі. Ми повинні використати [fyodor_baikov.GetHisHer] багаті знання, щоб укласти вигідні договори з іншими державами, використовуючи його унікальні ідеї для зміцнення позитивних міжнародних відносин та просування наших інтересів на світовій арені."
  flavor_rus.39.a: "Запросити його до двору."
  flavor_rus.39.tt2: "[fyodor_baikov.GetSheHe|U] може виконувати важливі дипломатичні місії, якщо його призначать до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.39.b: "Чекає нудне офісне завдання."
  flavor_rus.39.tt3: "[fyodor_baikov.GetSheHe|U] доручено завершити звіти послів з попередніх подорожей, що значно поповнить знання про іноземні двори"
  flavor_rus.39.c: "Схильний до обмовок."
  flavor_rus.39.historical_info: "Федір Байков був першим російським послом у Китаї. Його пам'ятають за спробу договору, який він намагався укласти, що мав на меті заохотити торгівлю між двома імперіями, що розвивалися, та врегулювати будь-які потенційні територіальні суперечки, що виникли під час східної експансії Росії."
  flavor_rus.40.title: "Історія Російська"
  flavor_rus.40.desc: "Колишній письменник і патріот-пенсіонер [vasily_tatishchev.GetName] написав детальний опис історії [ROOT.GetCountry.GetName], який не лише висвітлює пишність наших військових перемог та надихаючих лідерів, але й зосереджується на очевидних перевагах [ShowGovernmentReformName('autocracy')]. Ми повинні подбати про те, щоб це переказ було опубліковано для всіх очей, забезпечуючи всебічне розуміння історії нашої нації та переваг нашого правління."
  flavor_rus.40.a: "Опублікувати."
  flavor_rus.40.b: "Опублікувати виключно параграфи про самодержавне правління."
  flavor_rus.40.c: "Марна трата чорнила."
  flavor_rus.40.historical_info: "Після відходу з активної служби Татищев занурився в наукові заняття. Він не тільки багато писав про російську історію, але й взявся за укладання першої російської енциклопедії. У своїх працях він послідовно відстоював ідею, що самодержавство є ідеальною формою правління для Росії."
  flavor_rus.41.title: "Російсько-американська компанія"
  flavor_rus.41.desc: "Рання розвідка [ShowRegionName('alaska_region')] показує багату популяцію морських видр. Їхнє [ShowGoodsName('fur')] є дуже затребуваним товаром, і тому була висунута пропозиція створити свого роду статутну компанію, щоб регіон не потрапив під іноземний вплив. Давайте займемося торгівлею з місцевими племенами та побудуємо низку [ShowBuildingTypeName('overseas_trading_post')] споруд, щоб зміцнити наші претензії та забезпечити достатній запас."
  flavor_rus.41.a: "Надати статут."
  flavor_rus.41.b: "Надзвичайно дороге починання."
  flavor_rus.41.historical_info: "РАК, або Російсько-американська компанія, була створена для управління російськими справами в Північній Америці. Регіон Аляски був багатий на морських видр, і постійний попит на хутро означав, що дослідники вважали прибутковим заснування поселень для торгівлі хутром та видобутку ресурсів. Компанія продовжувала працювати до свого розпуску в середині вісімнадцятого століття через надмірне полювання та зміну ринкових умов."
  flavor_rus.42.title: "Вільне економічне товариство"
  flavor_rus.42.desc_common1: "Сільське господарство залишається основою нашого суспільства, проте методи обробітку та техніки землеробства, що використовуються [ShowPopTypeName('peasants')], є статичними та низьковрожайними порівняно з конкуруючими державами."
  flavor_rus.42.desc_orlov: "$flavor_rus.42.desc_common1$ За скромну плату архітектор влади [grigory_orlov.GetName] запропонував створити економічну організацію для розвитку знань у сільському господарстві та торгівлі, а також запропонував взяти на себе провідну роль у її управлінні. $flavor_rus.42.desc_common2$"
  flavor_rus.42.desc_ruler: "$flavor_rus.42.desc_common1$ Наш просвічений Суверен [target_character.GetName] запропонував спонсорувати створення економічної організації для розвитку знань у сільському господарстві та торгівлі. $flavor_rus.42.desc_common2$"
  flavor_rus.42.desc_both: "$flavor_rus.42.desc_common1$ Архітектор влади [grigory_orlov.GetName] запропонував створити економічну організацію для розвитку знань у сільському господарстві та торгівлі, а також запропонував взяти на себе провідну роль у її управлінні. Наш просвічений Суверен [target_character.GetName] запропонував спонсорувати це підприємство, щоб забезпечити його реалізацію. $flavor_rus.42.desc_common2$"
  flavor_rus.42.desc_common2: "\n\nЯкщо організація досягне успіху, вона також повинна прагнути покращити освіту фермерів та сприяти підготовці кваліфікованих робітників, надаючи практичні поради та публікуючи журнали та наукові праці з цієї теми."
  flavor_rus.42.a: "Зрештою, ми повинні себе прогодувати."
  STATIC_MODIFIER_NAME_potato_varieties_introduced: "Запроваджено сорти картоплі"
  flavor_rus.42.tt1: "Товариство запроваджує нові сорти [ShowGoodsName('potato')] та новаторські методи вирощування, що сприяє збільшенню врожайності."
  flavor_rus.42.b: "Це не той шлях."
  flavor_rus.42.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вітають зусилля щодо збереження їхнього владного становища над [ShowPopTypeName('peasants')]"
  flavor_rus.42.historical_info: "Вільне економічне товариство було засноване Григорієм Орловим за підтримки імператриці Катерини II, яка сама вважала, що сільськогосподарські практики Росії застаріли та відстають від інших великих держав, зокрема Британії. Товариство опублікувало кілька робіт про нові методи землеробства, запровадило культури та організувало освітні заходи для фермерів, щоб вони могли ефективніше обробляти землю та виробляти більше їжі."
  flavor_rus.43.title: "[grigory_orlov.GetNameWithNoTooltip]"
  flavor_rus.43.desc_empress: "Відважний офіцер і заможний землевласник привернув увагу [ROOT.GetCountry.GetGovernment.GetRulerTitle], який запросив [grigory_orlov.GetHimHer] служити за [ROOT.GetCountry.GetGovernment.GetRuler.GetHimHer] примхою. $flavor_rus.43.desc_common$"
  flavor_rus.43.desc_artillery_yard: "Висококваліфікований офіцер і заможний землевласник, що служить у [ShowBuildingTypeName('moscow_artillery_yard')], викликав цікавість у високопоставлених осіб, які запросили [grigory_orlov.GetHimHer] взяти на себе додаткові обов'язки. $flavor_rus.43.desc_common$"
  flavor_rus.43.desc_common: "Маючи раніше продемонстровані здібності до морської війни та державних справ, [grigory_orlov.GetName] чудово доповнив би Кабінет або Флот."
  flavor_rus.43.a: "Бюрократ у душі."
  flavor_rus.43.tt2: "[grigory_orlov.GetSheHe|U] може очолити кілька ініціатив, якщо його призначать до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.43.b: "Море чекає на [grigory_orlov.GetHimHer]."
  flavor_rus.43.c: "Недостатньо відважний."
  flavor_rus.43.historical_info: "Григорій Орлов став фаворитом і коханцем Катерини II та допоміг організувати переворот, внаслідок якого її чоловіка було скинуто на її користь. Завзятий покровитель мистецтв і наук, він колекціонував картини всесвітньо відомих художників і виступав за покращення умов життя та освіти для кріпаків."
  flavor_rus.44.title: "Пишність Гатчини"
  flavor_rus.44.desc: "Надзвичайно щедрий [grigory_orlov.GetName] найняв архітектора-початківця для проектування чудової садиби, розташованої за воротами [ShowLocationName('neva')]. Вона поєднає кілька архітектурних стилів, включаючи елементи середньовіччя та нового неокласичного напрямку, такі як великий купол, вежі та башти. Це має піднести пишність сусіднього [target_location.GetRank.GetName] і слугуватиме вражаючою садибою для амбітного графа, з достатнім простором для відвідування [ShowPopTypeName('nobles')]."
  flavor_rus.44.a: "Скромний заміський маєток."
  rus_gatchina_palace_construction: "Будівництво Гатчинського палацу"
  flavor_rus.44.b: "Немає потреби в ще одному екстравагантному палаці."
  flavor_rus.44.c: "Краще витратити на роздачу милостині."
  flavor_rus.44.historical_info: "Гатчинський палац призначався як основна резиденція Григорія Орлова, який на той час вважався найвпливовішою людиною в Росії та фаворитом імператриці. З роками він став найвідвідуванішою резиденцією дворянства, за винятком самого Орлова, який помер до його завершення. Палац унікальний тим, що поєднує елементи класичної, готичної та ренесансної архітектури."
  flavor_rus.45.title: "Про розбещення моралі"
  flavor_rus.45.desc: "Обскурантистський автор [michailo_shcherbatov.GetName] завершив зневажливу працю, яка критикує вплив західних ідей Просвітництва та соціальних змін на суспільство. [michailo_shcherbatov.GetSheHe|U] стверджує, що традиційна моральна тканина руйнується, натомість виступаючи за повернення до традиційних цінностей, де сильна центральна влада має завдання зберігати порядок та перешкоджати індивідуалізму. Вона ось-ось буде надрукована, якщо наратив не буде оскаржений незгодними голосами."
  flavor_rus.45.a: "Засудження цього викличе чималий резонанс."
  flavor_rus.45.tt1: "[ShowWorkOfArtTypeName('treatise')] виступає за більший церковний вплив у суспільстві, на велику радість [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"
  flavor_rus.45.b: "Перешкодити її публікації."
  flavor_rus.45.historical_info: "#italic Про розбещення моралі#! в Росії було опубліковано Михайлом Щербатовим, одним з провідних консервативних мислителів XVIII століття в Росії. Вона закликала до відродження традиційних російських цінностей, підкреслюючи важливість православного християнства, самодержавства та ієрархічного соціального порядку. Її публікація мала глибокий вплив на колективну мораль та вплинула на консервативних мислителів на покоління вперед."
  flavor_rus.46.title: "Ідеологічне редагування Московської газети"
  flavor_rus.46.desc: "Заснована [ShowLocationName('moscow')] [ShowBuildingTypeName('university')], #italic Московська газета#! має скромний, але популярний тираж і залишається єдиною газетою, доступною для тих, хто шукає регулярний дайджест дрібниць місцевих і світових подій. Газета має обрати нового редактора, причому два запропоновані кандидати дивляться на світ досить по-різному, і тому, ймовірно, обиратимуть історії протилежного спрямування."
  flavor_rus.46.a: "Віддати перевагу людині консервативних поглядів."
  flavor_rus.46.b: "Віддати перевагу людині ліберальних поглядів."
  flavor_rus.46.tt1: "Газета починає публікувати сатиричні журнали, що висміюють усталені соціальні звичаї, що може мати майбутні наслідки"
  flavor_rus.46.historical_info: "#italic Московские ведомости#! була найбільшою газетою в Росії у вісімнадцятому та дев'ятнадцятому століттях і відігравала важливу роль у розповсюдженні новин, інформації та коментарів, пов'язаних з Москвою та міжнародними подіями. Вона використовувала університетську пресу і видавалася щотижня, аж до її остаточного закриття більшовиками після Жовтневої революції."
  flavor_rus.47.title: "[mikhail_speransky.GetNameWithNoTooltip]"
  flavor_rus.47.desc: "Інтелектуал-реформатор [mikhail_speransky.GetName] щиро прийняв ідеали лібералізму під час [mikhail_speransky.GetHisHer] перебування в [university_location.GetName] [ShowBuildingTypeName('university')], ідеали, які [mikhail_speransky.GetSheHe] тепер прагне впровадити в державний апарат [ROOT.GetCountry.GetName]. Знайдімо для [mikhail_speransky.GetHimHer] відповідну роль, щоб струсити адміністрацію та прокласти шлях до нової ери сучасності."
  flavor_rus.47.a: "Справжній впливовець на уми."
  flavor_rus.47.tt2: "[mikhail_speransky.GetSheHe|U] обрано почесним членом [ShowBuildingTypeName('academy_of_sciences')], що ще більше зміцнює [mikhail_speransky.GetHisHer] інтелектуальний статус та вплив"
  flavor_rus.47.tt3: "[mikhail_speransky.GetSheHe|U] приєднується до [ShowBuildingTypeName('free_economic_society')], що ще більше розширює [mikhail_speransky.GetHisHer] сферу знань"
  flavor_rus.47.b: "Агент змін."
  flavor_rus.47.tt4: "[mikhail_speransky.GetNameWithNoTooltip] шукає роботу в іншому місці"
  flavor_rus.47.historical_info: "Михайло Сперанський був державним діячем і реформатором за часів правління Олександра I, і відіграв важливу роль у проведенні всебічних реформ, яких прагнув імператор. Загальною метою була модернізована та централізована адміністративна система, яка б зменшила владу дворянства та створила більш ефективний уряд. Це було досягнуто головним чином через статути, які запровадили більш уніфіковані правові принципи. Зрештою він втратив владу через внутрішню опозицію до його запропонованих реформ, але його ідеї мали тривалий вплив на майбутні уряди."
  flavor_rus.48.title: "Просвітлений Узурпатор"
  flavor_rus.48.desc: "Заможна родина [target_culture.GetName] походження пропонує шлюб [ROOT.GetCountry.GetGovernment.GetRuler.GetName], щоб забезпечити тривалу дружбу та продовження шанованої династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Дещо шибениця, [sophie_of_anhalt_zerbst.GetName] опанувала мистецтво фехтування і вважається добре освіченою та відвертою молодою леді з хистом до багатослівних обмінів. Незважаючи на дещо наполегливу поведінку, [sophie_of_anhalt_zerbst.GetSheHe] безсумнівно візьме на себе [sophie_of_anhalt_zerbst.GetHimHer] роль відданої дружини та виконає договірні зобов'язання, поєднуючи традиції зі своїми унікальними якостями."
  flavor_rus.48.a: "Схвалити запропонований шлюб."
  flavor_rus.48.b: "Негідна поведінка для пані."
  flavor_rus.48.historical_info: "Принцеса Софія Ангальт-Цербстська, відома як Катерина «Велика», була німецькою принцесою, яка вийшла заміж за російського імператора Петра III. Вона часто конфліктувала зі своїм чоловіком, що пояснювалося його розумовою незрілістю, і зрештою скинула його за допомогою королівських радників після того, як він прийняв низку політичних рішень, які відштовхнули більшість дворянства. Правління Катерини було відзначене просвітництвом та ренесансом культури та науки, нарешті принісши Росії визнання як Великої Держави Європи."
  flavor_rus.49.title: "Державний переворот"
  flavor_rus.49.desc: "Нездатність об'єднати та ефективно керувати країною поставила під сумнів правління [target_ruler.GetName]. Спроба усунути [target_ruler.GetHimHer] від влади була розпочата [target_ruler.GetHisHer] дружиною, [sophie_of_anhalt_zerbst.GetName], разом з провідним членом кабінету [coup_leader.GetName], і, ймовірно, матиме успіх, якщо спробу не буде зірвано великою силою, за ще більшу ціну."
  flavor_rus.49.a: "Дозволити цьому розгорнутися мирно."
  flavor_rus.49.tt1: "[target_ruler.GetNameWithNoTooltip] оголошено непридатним для правління, усунено від влади та поміщено під варту"
  flavor_rus.49.b: "Позбавити [target_ruler.GetNameWithNoTooltip] [target_ruler.GetHisHer] життя."
  flavor_rus.49.c: "Стратити змовників."
  flavor_rus.49.tt2: "Наймані війська швидко наймаються для захисту [target_root_country.GetGovernment.GetRulerTitle]"
  flavor_rus.49.tt3: "[sophie_of_anhalt_zerbst.GetNameWithNoTooltip] бачить, як [sophie_of_anhalt_zerbst.GetHisHer] свобода обмежується подіями, що розгортаються"
  flavor_rus.49.historical_info: "Переворот, організований Катериною «Великою» проти її чоловіка, імператора Петра III, був спровокований зменшенням підтримки, яку він зумів підірвати серед дворянства через свої ексцентричності, військові рішення та впровадження непопулярної політики. Катерина бачила мало варіантів для самозбереження і відчувала себе змушеною діяти відповідно."
  flavor_rus.50.title: "Імператорська академія мистецтв"
  flavor_rus.50.desc: "Візіонер-реформатор [ivan_shuvalov.GetName] продовжує [ivan_shuvalov.GetHisHer] невпинні реформи освітньої системи та наполягає на постійній підтримці мистецтв. [ivan_shuvalov.GetSheHe|U] прагне заснувати академію, присвячену досягненню найвищих стандартів у мистецтві та архітектурі, вихованню та розвитку [ROOT.GetCountry.GetAdjective] художнього таланту шляхом спонсорування найперспективніших студентів до інноваційних міст Європи для подальшого навчання. Приймімо цю ініціативу та побудуймо оплот культурного прогресу, щоб перетворити [ShowLocationName('neva')] на маяк класицизму."
  flavor_rus.50.a: "Лицарська пропозиція."
  flavor_rus.50.tt1: "Шановний [grigory_orlov.GetName] жертвує значну частину [grigory_orlov.GetHisHer] художньої колекції новоствореній академії"
  flavor_rus.50.b: "Обов'язки кабінету мають пріоритет."
  flavor_rus.50.tt2: "[Concept('ivan_shuvalov.GetNameWithNoTooltip] зосереджується виключно на [cabinet', 'CONCEPT_PLACEHOLDER')|e] обов'язках, відмінно виконуючи [ivan_shuvalov.GetHisher] посаду та піднімаючи планку для державної служби"
  flavor_rus.50.c: "Немає потреби в змінах."
  flavor_rus.50.tt3: "Сучасні архітектурні стилі зміцнюються та переживають другий ренесанс"
  flavor_rus.50.historical_info: "Імператорська академія мистецтв була художньою академією, розташованою на річці Неві в Санкт-Петербурзі. Заснована в 1757 році Іваном Шуваловим, державним діячем та поціновувачем мистецтва, вона пропагувала неокласичний стиль та техніку, прагнула наслідувати європейські художні академії, а також запрошувала іноземних художників для навчання російських студентів."
  flavor_rus.51.title: "Шляхетний меценат"
  flavor_rus.51.desc: "Шляхетний мандрівник, що має глибокий інтерес до мистецтв та бачення наслідування європейських інституцій як засобу стимулювання художніх інновацій, просить безпосередньо долучитися до культурного розвитку [ROOT.GetCountry.GetName]. Добре обізнаний з етикетом та володіючи стабільною присутністю, [ivan_shuvalov.GetName] зрадів би будь-якій наданій [ivan_shuvalov.GetHimHer] можливості, що підтримує культурні та освітні ініціативи."
  flavor_rus.51.a: "Державна діяльність йому личить."
  flavor_rus.51.tt2: "[ivan_shuvalov.GetSheHe|U] може підготувати ґрунт для мистецьких починань, якщо буде призначений до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.51.b: "Ключовий діяч для підтримки культурної спадщини."
  flavor_rus.51.tt3: "[ivan_shuvalov.GetSheHe|U] невтомно працює, щоб забезпечити просування та поширення мистецтва, створеного в країні"
  flavor_rus.51.tt4: "[ivan_shuvalov.GetSheHe|U] приєднується до викладацького складу [ShowLocationName('moscow')] [ShowBuildingTypeName('university')] як куратор і може привабити найкращих вчених"
  flavor_rus.51.c: "Наслідування мистецтва марне."
  flavor_rus.51.tt5: "[ivan_shuvalov.GetNameWithNoTooltip] відмовлено в посаді"
  flavor_rus.51.historical_info: "Іван Шувалов був російським дворянином, який обіймав різні урядові посади, пов'язані з освітою та культурою, протягом вісімнадцятого століття. Він здобув всебічну освіту і прагнув повернути просвітницькі впливи з таких країн, як Італія та Франція, щоб сприяти розуму, освіті та культурному обміну."
  flavor_rus.52.title: "Член Королівського товариства"
  flavor_rus.52.desc: "Внесок [ivan_shuvalov.GetName] не залишився непоміченим і привернув увагу відомого [target_location.GetName] [ShowBuildingTypeName('royal_society')], який, у свою чергу, пропонує обрати [ivan_shuvalov.GetSheHe] почесним членом Товариства на знак визнання [ivan_shuvalov.GetHisHer] праці."
  flavor_rus.52.a: "Милостиво прийняти."
  STATIC_MODIFIER_NAME_artist_enrollment_surge: "Сплеск зарахування художників"
  STATIC_MODIFIER_NAME_magnet_for_scholars: "Магніт для вчених"
  STATIC_MODIFIER_NAME_gazette_subscription_surge: "Сплеск підписок на газету"
  flavor_rus.52.tt1: "[ShowBuildingTypeName('imperial_academy_of_arts')] спостерігає наплив художників, які прагнуть записатися"
  flavor_rus.52.tt2: "[ShowLocationName('moscow')] [ShowBuildingTypeName('university')] приваблює безліч студентів, які шукають наставництва та кураторства [ivan_shuvalov.GetNameWithNoTooltip]"
  flavor_rus.52.tt3: "[ShowLocationName('moscow')] Газета бачить сплеск підписок, оскільки її читачі прагнуть читати редакційні статті відомого [ivan_shuvalov.GetNameWithNoTooltip], який часто пише статті для газети"
  flavor_rus.52.b: "Прийняти, але з іншим порядком денним."
  flavor_rus.52.tt4: "[ivan_shuvalov.GetNameWithNoTooltip] використовує церемонію нагородження як платформу для просування [target_root_country.GetName] як маяка просвітництва"
  flavor_rus.52.historical_info: "Членство Королівського товариства є престижною нагородою, що надається Королівським товариством у Лондоні. Вважається видатною відзнакою, її часто присуджують видатним вченим, дослідникам та науковцям. У 1758 році Іван Шувалов отримав цю відзнаку завдяки своїй ключовій ролі у створенні першого театру та університету Росії, а також за його внесок у заснування Імператорської академії мистецтв."
  flavor_rus.53.title: "Сиротинець добрих намірів"
  flavor_rus.53.desc_ivan_betskoy_sole_contributor: "Видатна ідея представлена членом кабінету [ivan_betskoy.GetName] $flavor_rus.53.desc$"
  flavor_rus.53.desc_common_initiative: "Видатна та щедра ідея спільно представлена членом кабінету [ivan_betskoy.GetName] та [target_character.GetName] $flavor_rus.53.desc$"
  flavor_rus.53.desc_ruler_sole_contributor: "Добре продумана ідея представлена [target_character.GetName] $flavor_rus.53.desc$"
  flavor_rus.53.desc: "щоб вирішити те, що сприймається як одна з найбільших трагедій, що відбуваються, а саме – покинутість новонароджених дітей. Пропонується створити безпечний притулок для менш щасливих, забезпечити їх харчуванням та літературою, щоб вони виросли продуктивними членами суспільства. Питання фінансування залишається невирішеним, але розглядаються кілька життєздатних варіантів для підтримки цієї ініціативи."
  flavor_rus.53.a: "Прибуткова інвестиція."
  flavor_rus.53.tt1: "Сиротинець створив кілька приватних банківських відділень для управління позиками та заощадженнями з метою фінансування діяльності"
  flavor_rus.53.b: "Гідна справа."
  flavor_rus.53.tt2: "Фінансування щедро надається скарбницею"
  flavor_rus.53.c: "Кожному своє."
  flavor_rus.53.historical_info: "Московський сиротинець був заснований у 1763 році під керівництвом імператриці Катерини 'Великої' та Івана Бецького, міністра її уряду та великого прихильника освітніх реформ. Установа була задумана, коли ідеали Просвітництва набирали обертів у Росії та по всій Європі. Незважаючи на добре фінансування, його переслідували високі показники дитячої смертності, і він мав обмежений вплив на життя покинутих дітей, хоча деякі все ж отримали користь від наданої освіти та змогли забезпечити собі працевлаштування."
  flavor_rus.54.title: "Ініціативи [ivan_betskoy.GetNameWithNoTooltip]"
  flavor_rus.54.desc: "Байстрюк шляхетного походження зміг домовитися про звільнення [ivan_betskoy.GetHisHer] з полону в [GetCountry('SWE').GetName] і повертається до [ROOT.GetCountry.GetName], шукаючи посаду в уряді. [ivan_betskoy.GetName] вже зробив собі ім'я в армії, перш ніж зазнав падіння, що змусило [ivan_betskoy.GetHimHer] піти зі служби і натомість зайнятися дипломатичною кар'єрою. [ivan_betskoy.GetSheHe|U] палає пристрастю до питань, що охоплюють освіту та соціальні проблеми, і сподівається зробити великі кроки до більш рівноправного суспільства."
  flavor_rus.54.a: "Віддана душа та візіонер."
  flavor_rus.54.tt2: "[ivan_betskoy.GetSheHe|U] може ініціювати освітні та соціальні реформи, якщо буде призначений до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.54.b: "Обмежити роботу [ivan_betskoy.GetHisHer]."
  STATIC_MODIFIER_NAME_barred_from_educational_ministry: "Заборонено до Міністерства освіти"
  flavor_rus.54.tt3: "[ivan_betskoy.GetSheHe|U] бачить [ivan_betskoy.GetHisHer] обов'язки обмеженими питаннями, що стосуються громадської опіки та допомоги на потіху [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]"
  flavor_rus.54.c: "Занепалий герой малої цінності."
  flavor_rus.54.tt4: "[ivan_betskoy.GetNameWithNoTooltip] відмовлено в посаді"
  flavor_rus.54.historical_info: "Іван Бецький був ключовим радником імператриці Катерини 'Великої', цю посаду він отримав завдяки своїй підтримці під час перевороту, який привів її на трон. Він брав участь у кількох реформах, які уніфікували освітню систему, включаючи створення установ для надання освіти жінкам та сиротам. Як затятий противник панівних суспільних класів, Бецький також присвятив себе вихованню народження середнього класу."
  flavor_rus.55.title: "Інститут шляхетних дівчат"
  flavor_rus.55.desc: "Освіта жінок залишається гаряче обговорюваною темою і рішуче підтримується ентузіастом [ivan_betskoy.GetName], який скликав кабінет міністрів з наміром створити виховний заклад, присвячений навчанню сумлінних жінок. Передбачається, що ці жінки виконуватимуть ролі цінних помічниць як у родині, так і в суспільстві. Доручімо будівництво відповідної споруди, присвяченої прогресивним ідеям та інклюзивності, і почнімо формувати нове покоління, вільне від згубного впливу неосвіченого виховання."
  flavor_rus.55.a: "[ShowLocationNameWithNoTooltip('neva')] добре підходить."
  flavor_rus.55.tt1: "Друковані статути розсилаються всім дівчатам [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]"
  rus_printed_charters: "Друковані статути"
  flavor_rus.55.b: "Воно належить до [target_location.GetName]."
  flavor_rus.55.c: "Перепрофілювати [ShowBuildingTypeName('novodevichy_convent')]."
  flavor_rus.55.d: "Загроза встановленому порядку."
  flavor_rus.55.historical_info: "Інститут шляхетних дівчат, заснований Іваном Бецьким за рішучої підтримки імператриці Катерини Великої, мав на меті ознайомити жінок з інтелектуальними мислителями того часу, включаючи Вольтера та Локка. Діти вступали до монастиря в ранньому віці, переживаючи розлуку з батьками на шість років. Інститут кілька разів змінював місце розташування і фінансувався за рахунок щорічної плати, щоб забезпечити ексклюзивність та обмежити вступ для низькорангових членів суспільства."
  flavor_rus.56.title: "Доступна вистава"
  flavor_rus.56.desc: "Благонамірний [ShowBuildingTypeName('moscow_orphanage')] почав ставити початкові вистави на непримітному майданчику як засіб розваги для дітей та надання їм можливості ввійти на ринок культурної праці. Ініціатива виявляється популярною серед місцевих [ShowPopTypeName('peasants')], але не була добре сприйнята театральними режисерами відомих закладів, оскільки вони не можуть конкурувати в ціні. Була висунута вимога, щоб [ShowBuildingTypeNameWithNoTooltip('moscow_orphanage')] припинив свої вистави та залишив сцену для шоу вищого ґатунку."
  flavor_rus.56.a: "Дотримуватися їхніх побажань."
  flavor_rus.56.tt1: "Прохання театрального режисера задоволено, що призводить до заборони популярних вистав сиротинця"
  flavor_rus.56.b: "Подивитися в інший бік."
  flavor_rus.56.tt2: "Пожежа спалахує на майданчику [ShowBuildingTypeNameWithNoTooltip('moscow_orphanage')] [ShowBuildingTypeName('theater')], що призводить до його повного знищення"
  flavor_rus.56.c: "Вільний ринок – здоровий ринок."
  flavor_rus.56.tt3: "Конкуруючий [ShowBuildingTypeName('bolshoi_theater')] закривається"
  flavor_rus.56.tt4: "Конкуруючий [ShowBuildingTypeName('bolshoi_theater')] вимагає компенсації, як це передбачено раніше наданим статутом монополії"
  flavor_rus.56.tt5: "Конкуруючий [ShowBuildingTypeName('theater')] закривається"
  flavor_rus.56.historical_info: "Московський сиротинець почав ставити аматорські вистави в розпал культурного ренесансу, чому протистояв Михайло Меддокс, засновник Большого театру, якому було надано монополію на театральні вистави в Москві в обмін на фінансування закладу. Зрештою, сиротинець припинив свої постановки, а дітям було запропоновано взяти участь у виставах Меддокса."
  flavor_rus.57.title: "[michael_maddox.GetNameWithNoTooltip]"
  flavor_rus.57.desc: "Відомий театральний підприємець [michael_maddox.GetName] відвідує [ShowLocationName('moscow')] у рамках гастрольного шоу, яке досі часто відвідувало вулиці [ShowLocationName('london')] та [ShowLocationName('paris')] на радість перехожих. Не вражений місцевим вибором вистав, [michael_maddox.GetSheHe] пропонує співзаснувати постійну продюсерську компанію, яка регулярно виступатиме для москвичів, за умови, що компанії буде надано ексклюзивний статут на розваги в театральній якості."
  flavor_rus.57.a: "Якість понад кількість."
  STATIC_MODIFIER_NAME_theatrical_monopoly_granted: "Надано театральну монополію"
  flavor_rus.57.b: "Зухвалість."
  flavor_rus.57.tt2: "[michael_maddox.GetNameWithNoTooltip] відмовлено в ексклюзивній хартії"
  flavor_rus.57.historical_info: "Майкл Меддокс був театральним менеджером, який заснував кілька успішних закладів, зокрема театр Хеймаркет у Лондоні та попередник знаменитого Большого театру в Москві. Він гастролював зі своєю власною постановкою Європою і прибув до Росії наприкінці XVIII століття. Не вражений тьмяним вибором місцевих оперних і театральних вистав, він заснував театральну трупу, а також перший постійний театр у Москві, за що йому було надано щедру пенсію."
  flavor_rus.58.title: "Большой театр"
  flavor_rus.58.desc: "Театральна компанія Меддокса шукає більш екстравагантне місце для постановки складних оперних і балетних вистав. Неокласичний дизайн запропонував амбітний та економний архітектор [joseph_bove.GetName], який продемонстрував надзвичайну майстерність у покращенні естетичної привабливості споруд. Новий театр також слугуватиме головною сценою для театральних вистав і гарантовано стане культурним маяком [ShowLocationName('moscow')] та слугуватиме орієнтиром та архітектурним натхненням для майбутніх поколінь."
  flavor_rus.58.a: "Пірует досконалості."
  flavor_rus.58.tt1: "[Concept('joseph_bove.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.58.b: "Натомість давайте прикрасимо [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_rus.58.tt2: "[joseph_bove.GetSheHe|U] призначено до Департаменту фасадів із завданням покращити занепадаючий стан руйнуючихся екстер'єрів будинків"
  flavor_rus.58.c: "Така грандіозна споруда зайва."
  flavor_rus.58.historical_info: "Большой театр був заснований у 1776 році князем Петром Урусовим та Майклом Меддоксом і славиться своїми балетними та оперними постановками. Початкова споруда, що займала те саме місце, відома як Петровський театр, була зруйнована під час вторгнення Наполеона до Росії. Сьогодні тут розміщуються Большой балет та Большой опера, одні з найвідоміших та найавторитетніших балетних та оперних труп світу."
  flavor_rus.59.title: "Наказ"
  flavor_rus.59.desc: "Стає все важливіше просунути [ROOT.GetCountry.GetName] у нову еру просвітництва та прогресу. Візіонерська переробка правового кодексу, узгоджена з освіжаючими принципами, що охоплюють Європу, відповідала б вимогам, охоплюючи такі ідеали, як розум, справедливість та гуманізм. Прийнявши ці цінності, ми нарешті зможемо позбутися застарілих правових практик, які перешкоджають соціальному розвитку. Станьмо на шлях реформ та впровадьмо рівність усіх громадян перед законом."
  flavor_rus.59.a: "Прогрес може бути болючим."
  enable_nakaz_reform: "Надає доступ до [ShowGovernmentReformName('nakaz_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_rus.59.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] розлючені загрозою, що нависла над їхнім становищем влади"
  flavor_rus.59.b: "Задовольнитися пенітенціарною реформою."
  flavor_rus.59.tt2: "Більш гуманний підхід до злочинців без вирішення потреби в соціальних реформах призводить до зростання злочинності у великих містах"
  flavor_rus.59.c: "Ми не наважуємося."
  flavor_rus.59.tt3: "Печера до консервативних сил бачить їхню програму посиленою"
  flavor_rus.59.historical_info: "#italic Наказ Правильності#!, або #italic Інструкція про закони#!, був правовим кодексом, запровадженим Катериною «Великою» у спробі модернізувати та реформувати правову систему. Під впливом ідей Просвітництва він прагнув створити правову систему, яка б відповідала прогресивним філософіям того часу, а також спростити та уточнити закони. Він запровадив більш гуманні покарання, обмежив використання тортур та підкреслив рівність усіх громадян перед законом. Наказ ніколи не був повністю реалізований через численні консервативні сили, які йому протистояли, і Катерина зрештою переключила свою увагу на інші пріоритети."
  flavor_rus.60.title: "Повстання декабристів"
  flavor_rus.60.desc: "Вітри лібералізму суворо віють у [ROOT.GetCountry.GetName], розпалюючи дебати про право кожної особи на життя у свободі та рівності. Невдоволення особливо сильне серед [ShowPopTypeName('peasants')], які прагнуть іншого життя та більш інклюзивного правління, але кілька [ShowPopTypeName('nobles')] надали свою підтримку спільній справі, очолювані [sergei_trubetskoy.GetName]. Прихильники руху об'єдналися, вимагаючи значних соціальних та політичних реформ, щоб закріпити право кожної особи на життя у свободі та рівності в тканині нашого суспільства. Рух зростає з кожним днем, і ми повинні вирішити, чи протистояти йому, чи погодитися на їхні вимоги."
  flavor_rus.60.a: "Банда шахраїв та розбійників."
  STATIC_MODIFIER_NAME_rus_decembrist_movement: "Декабристський рух"
  decembrist_revolt: "Повстання декабристів"
  flavor_rus.60.tt1: "Публікація #italic A Journey from Saint Petersburg to Moscow#! та [ShowWorkOfArtName('ode_to_liberty')] [ShowWorkOfArtTypeName('poem')] згуртовує кількох прихильників до повстанської справи"
  flavor_rus.60.tt2: "Публікація #italic A Journey from Saint Petersburg to Moscow#! згуртовує додаткових прихильників до повстанської справи"
  flavor_rus.60.tt3: "[ShowWorkOfArtName('ode_to_liberty')] [ShowWorkOfArtTypeName('poem')] надихає народ, зміцнюючи повстанський рух"
  flavor_rus.60.b: "Запропонувати значні поступки."
  flavor_rus.60.tt4: "Кілька [ShowPopTypeNameWithNoTooltip('peasants')] об'єднують зусилля з бунтівними [ShowPopTypeNameWithNoTooltip('nobles')], зміцнюючи повстанський рух"
  flavor_rus.60.tt5: "Права, надані [ShowGovernmentReformName('speransky_liberalization_reform')], закріплені в кодексі законів і їх буде складно скасувати"
  flavor_rus.60.c: "Перо могутніше за меч."
  flavor_rus.60.tt6: "Харизматична вдача [ROOT.GetCountry.GetGovernment.GetRuler.GetName] сприяє мирному врегулюванню з повстанцями"
  flavor_rus.60.historical_info: "Повстання декабристів було бунтом проти самодержавного правління імператора Миколи I. Повстання очолила група військових офіцерів та дворян, відомих як декабристи, які були натхненні ліберальними та конституційними ідеалами. Декабристи зібралися в Санкт-Петербурзі, щоб влаштувати протест і спробувати змусити Миколу I прийняти їхні вимоги, який натомість вирішив їх придушити, а кількох лідерів згодом стратили або заслали до Сибіру. Цей інцидент послугував натхненням для подальших реформаторських рухів у країні."
  flavor_rus.61.title: "Критика [alexander_radishchev.GetNameWithNoTooltip]"
  flavor_rus.61.desc: "Радикалізований та впливовий письменник повернувся з навчання за кордоном з арсеналом соціальної критики у [alexander_radishchev.GetHisHer] розпорядженні. Прагнучи висловити [alexander_radishchev.GetHisHer] невдоволення щодо уявних несправедливостей, [alexander_radishchev.GetName] безсумнівно посіє зерна анархії, якщо його не контролювати. Однак нам, можливо, доведеться діяти обережно, враховуючи [alexander_radishchev.GetHisHer] популярність серед мас."
  flavor_rus.61.a: "Призначений для далекого місця."
  flavor_rus.61.tt2: "[alexander_radishchev.GetSheHe|U] відправлено у віддалене місце, щоб спробувати обмежити ступінь [alexander_radishchev.GetHisHer] впливу"
  flavor_rus.61.b: "[alexander_radishchev.GetHisHer|U] слова мають мало цінності."
  flavor_rus.61.historical_info: "Олександр Радищев був письменником і соціальним критиком за часів правління Катерини 'Великої'. Він навчався в Німеччині та привіз нові ідеї щодо управління та критику кріпацтва, ідеї, які не відповідали самодержавному правлінню Росії. Його праця #italic Journey from St. Petersburg to Moscow#! принесла йому вирок про заслання до Сибіру, де він продовжував писати філософські твори."
  flavor_rus.62.title: "Визначна подорож"
  flavor_rus.62.desc: "Незабаром буде опубліковано нещодавню працю впливового автора [alexander_radishchev.GetName], що описує вигадану подорож між [ShowLocationName('neva')] та [ShowLocationName('moscow')]. Вона висвітлює уявні щоденні труднощі, з якими стикаються [ShowPopTypeName('peasants')], і залишається вкрай критичною щодо їхнього ставлення з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], але також занурюється у вир невдоволення щодо поточного методу управління, виступаючи за більшу свободу для громадян. Ми повинні діяти, щоб запобігти її публікації та негайно засудити її послання, інакше ризикуємо поширенням отруйних та незворотних впливів по всьому нашому суспільству."
  flavor_rus.62.a: "Негайно заборонити."
  STATIC_MODIFIER_NAME_exodus_of_artists: "Вихід митців"
  flavor_rus.62.tt1: "Гнітюча природа та втручання викликають жах у всьому літературному світі, значно впливаючи на кількість опублікованих творів"
  flavor_rus.62.b: "Освіжаюча оповідь."
  flavor_rus.62.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] виступають проти упередженої критики їхнього способу життя"
  flavor_rus.62.historical_info: "#italic Journey from St. Petersburg to Moscow#! — це сатиричний твір, опублікований у 1790 році, який кинув виклик правлінню імператриці Катерини 'Великої'. Хоча вона була обізнана з проблемами, порушеними у творі, Катерина заборонила його і засудила до смерті, намагаючись обмежити вплив його публікації. Вирок пізніше було замінено на заслання до Сибіру. Роман став джерелом впливу для руху декабристів і зрештою був заборонений до 1905 року."
  flavor_rus.63.title: "Маніфест свободи"
  flavor_rus.63.desc: "Здатність керувати вимагає стабільної країни з сильним правителем, який міцно тримає кермо влади. Наразі назріває невдоволення вибором, зробленим [ROOT.GetCountry.GetGovernment.GetRuler.GetName], і було б розсудливо принаймні забезпечити постійну підтримку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] до покращення ситуації. Давайте запропонуємо щедрі поступки, які звільняють [ShowPopTypeName('nobles')] від державної служби разом з іншими громадянськими свободами, дозволяючи нам зосередитися на стабілізації крихкої природи нинішнього абсолютистського правління."
  flavor_rus.63.a: "Необхідне зло."
  flavor_rus.63.tt1: "Широкі привілеї, надані [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], залишаються невідкличними під час правління [target_root_country.GetGovernment.GetRuler.GetName]"
  revoke_manifesto_of_freedom: "Широкі привілеї, надані [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], залишаються невідкличними під час правління володаря, який їх надав."
  flavor_rus.63.b: "Знайдімо золоту середину."
  flavor_rus.63.c: "Образливе поняття."
  flavor_rus.63.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] користуються скрутним становищем країни та активно перешкоджають правлінню [target_root_country.GetGovernment.GetRuler.GetName]"
  flavor_rus.63.historical_info: "#italic Маніфест про вольності дворянства#! був наданий імператором Петром III під час його короткого та невдалого правління. За його задумом стояло кілька факторів, а саме те, що він зумів відштовхнути більшість дворянства через зміну геополітичних альянсів, що позбавило Росію значної військової перемоги над Пруссією. Прагнучи стабілізувати своє правління, Петро зменшив обов'язки дворянства та конфіскував церковні землі для оплати, що натомість образило духовенство. Його наполягання на впровадженні прусських військових навчань в армії майже спровокувало повстання, що спонукало його дружину, Катерину, скинути його в результаті перевороту."
  flavor_rus.64.title: "Біронівщина"
  flavor_rus.64.desc: "Вродливий та впливовий герцог привернув увагу [ROOT.GetCountry.GetGovernment.GetRuler.GetName], який сподівається залучити [ernst_von_biron.GetName] до [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] двору. Герцог, схоже, вже має значний вплив, але на [ernst_von_biron.GetHisHer] користь, [ernst_von_biron.GetSheHe] також демонструє вражаючу здатність до управління та лідерства, якість, що, безумовно, може бути дуже корисною для нашого кабінету. Усуньмо будь-які перешкоди для [ernst_von_biron.GetHisHer] призначення та пожнемо плоди іноземного досвіду для більшого блага [ROOT.GetCountry.GetName]."
  flavor_rus.64.a: "Вирішена справа."
  flavor_rus.64.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle], що має ліжко, — щасливий [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_rus.64.tt2: "Це може бути виконано лише членами [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] не-[target_culture.GetNameWithNoTooltip] походження"
  flavor_rus.64.c: "Злочинець, що прагне влади."
  flavor_rus.64.tt3: "[ernst_von_biron.GetNameWithNoTooltip] відмовлено в позиції впливу"
  flavor_rus.64.historical_info: "Ернст Йоган фон Бірон був радником і, можливо, коханцем імператриці Анни Іоаннівни. Він був німецького шляхетного походження, мав значну владу при російському дворі і став опорою для імператриці, яка прагнула утвердити своє авторитарне правління. Прославлений своїми адміністративними здібностями, він залишався непопулярним у Росії через своє іноземне походження в поєднанні з владою, яку він мав над станами, і значним багатством, яке він накопичив в результаті свого становища. Його час при дворі отримав прізвисько «Біронівщина», що означає німецьке ярмо, посилаючись на часи татарського панування."
  flavor_rus.65.title: "Великий театр"
  flavor_rus.65.desc: "Великий [ShowBuildingTypeName('bolshoi_theater')] розширює свій репертуар і створив балетну трупу, яка отримала захоплені відгуки. Пропонуючи широку палітру від класичних до сучасних вистав, він готується до туру, щоб забезпечити собі статус культової установи та продовжувати залучати найкращі таланти. Ми могли б вплинути на директора, щоб змінити маршрут залежно від того, яку програму ми бажаємо реалізувати, забезпечуючи, щоб культурна сцена продовжувала служити [ROOT.GetCountry.GetName] у будь-якій якості."
  flavor_rus.65.a: "На нас чекає вражаючий внутрішній тур."
  flavor_rus.65.b: "Вони повинні пропагувати сутність нашої спадщини."
  flavor_rus.65.tt1: "Балет вирушає в континентальний тур, зміцнюючи міжнародну репутацію [target_root_country.GetName]"
  flavor_rus.65.tt2: "Добре налагоджені зв'язки розважального магната [michael_maddox.GetName] забезпечують доступ до додаткових майданчиків"
  flavor_rus.65.historical_info: "Великий театр був заснований у 1776 році імператрицею Катериною II у Великому театрі, одному з найвідоміших та історичних театрів Росії. Він здобув міжнародне визнання, гастролюючи по всьому світу та демонструючи російські балетні традиції глядачам у всьому світі."
  flavor_rus.66.title: "Таємна канцелярія"
  flavor_rus.66.desc: "Виникли занепокоєння щодо здатності [current_policy.GetName] придушувати виклики еліти уряду [ROOT.GetCountry.GetName]. Іноземні впливи у відділі [ShowCabinetActionName('bironovshchina')] запропонували спеціалізоване агентство, яке може краще підходити для цього завдання, причому груба сила є кращим методом відлякування. Відродимо батіг і реорганізуємо таємну поліцію, щоб прищепити оновлене почуття авторитету та зірвати будь-яку спробу підірвати наше верховне правління."
  flavor_rus.66.a: "Покора вимагає випадкових жертв."
  enable_secretnoye_byuro_policy: "Надає доступ до [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('secretnoye_byuro_policy')]"
  flavor_rus.66.tt1: "Її можна обрати лише тоді, коли член [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] виконує [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('bironovshchina')]"
  flavor_rus.66.b: "Ми вище цього."
  flavor_rus.66.historical_info: "Таємна канцелярія відіграла значну роль під час правління імператриці Анни Іоаннівни, яка використовувала її для контролю над своїми політичними опонентами як засіб забезпечення свого авторитарного правління. Покарання включали розрізання носа або побиття до смерті батогом, що було типовим батогом, що характеризувався ремінцем із сиром'ятини або мотузкою, прикріпленою до подовженої дерев'яної ручки. За оцінками, близько двадцяти тисяч дворян стали жертвами політичних чисток."
  flavor_rus.67.title: "Хрещення батогом"
  flavor_rus.67.desc: "Область [ShowAreaName('kazan_area')] має сильну релігійну меншину, яка може спричинити громадянські заворушення, якщо нею не керувати належним чином. Щоб створити єдину [ROOT.GetCountry.GetName], ми повинні вжити заходів для поспішного навернення цих язичників будь-якими необхідними засобами. Навернення методом батога та пряника може бути здійснене новим офісом, розташованим у [ShowLocationName('kazan')], пропонуючи стимули тим, хто добровільно приймає Христа у свої серця, з більш переконливими методами, зарезервованими для тих, хто протистоїть істинній вірі."
  flavor_rus.67.a: "Переконливий удар робить свою справу."
  STATIC_MODIFIER_NAME_office_of_new_converts: "Управління нових навернених"
  enable_office_of_new_converts_cabinet_action: "[Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('office_of_new_converts')] стає доступною"
  flavor_rus.67.tt1: "Її можна виконувати лише тоді, коли [ShowLocationName('kazan')] має [ShowBuildingTypeName('orthodox_monastery')]"
  flavor_rus.67.b: "Віра — особиста справа."
  flavor_rus.67.historical_info: "Управління у справах новонавернених було засноване імператрицею Анною Іоаннівною для управління зростаючою кількістю неправославних, які потрапили під контроль Росії, оскільки імперія швидко розширювалася. Навернення часто було примусовим і призвело до руйнування сотень храмів і мечетей, а також насильства та залякування для прискорення спроб навернення. Штаб-квартира управління знаходиться в Богородицькому монастирі, розташованому в Казані."
  flavor_rus.68.title: "[alexander_pushkin.GetNameWithNoTooltip]"
  flavor_rus.68.desc: "Нащадок [abram_petrovich.GetName], камер-мору, який був прийнятий під час попереднього правління і вихований при дворі, почав публікувати добре написані вірші та романи. Провокаційний поет [alexander_pushkin.GetName] черпає натхнення у деяких інтелектуальних гігантів письменства і, безсумнівно, зробить значний внесок у розвиток [ROOT.GetCountry.GetAdjective] літератури. [alexander_pushkin.GetSheHe|U] висловив симпатію до націоналістичних рухів і може стати небезпечним впливом, якщо залишиться без нагляду."
  flavor_rus.68.a: "Неперевершений талант має бути вільним."
  flavor_rus.68.b: "Бунтівний розбійник має бути під наглядом."
  flavor_rus.68.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] рішуче виступають проти посягання на високопоставленого дворянина, але відмовляються від своїх заперечень, як тільки [ShowPolicyName('secretnoye_byuro_policy')] надає переконливі докази бунтівної діяльності"
  flavor_rus.68.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] рішуче виступають проти посягання на високопоставленого дворянина"
  flavor_rus.68.historical_info: "Олександр Пушкін вважається одним із найвидатніших поетів Росії, і свій перший вірш написав у 15 років. На нього сильно вплинули Просвітництво та націоналістичні рухи, що відбувалися по всій Європі, з особливим інтересом до грецького руху за звільнення від османського панування. Незважаючи на походження з видатної родини, він був засланий після публікації суперечливого вірша, що ставив під сумнів кріпацтво та відсутність особистої свободи."
  flavor_rus.69.title: "Ода до волі"
  flavor_rus.69.desc: "Обдарований [alexander_pushkin.GetName] прочитав запальний вірш, який висловлює сильні почуття проти самодержавного правління та виступає за свободу та справедливість. Тон його послання є закликом до дії, підкреслюючи страждання простого народу, тиранію правителів та необхідність переписати закон з урахуванням лібертаріанських цінностей. Необхідно негайно вжити заходів, щоб обмежити його поширення та приборкати його музу, перш ніж вона вкорениться в найрадикальніших колах."
  flavor_rus.69.a: "Покладіть край цій виставі."
  flavor_rus.69.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вдається перехопити більшість копій помилкової публікації завдяки [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_rus.69.b: "Це лише слова."
  flavor_rus.69.tt2: "Вірш широко читається і має глибокий вплив на цінності суспільства"
  flavor_rus.69.c: "Спровокувати прикрий інцидент."
  flavor_rus.69.tt3: "[ShowPolicyName('secretnoye_byuro_policy')] влаштовує випадкову пожежу, яка охопила [ShowBuildingTypeNameWithNoTooltip('printing_press_shop')], що використовувалася [alexander_pushkin.GetNameWithNoTooltip], знищивши вихідний матеріал та вбивши його автора"
  flavor_rus.69.historical_info: "#italic Ода до волі#! — відомий вірш, написаний Олександром Пушкіним. Він був опублікований незабаром після закінчення ним навчання і призвів до його вигнання через зміст. $ode_to_liberty_desc$ Це було особливо актуально для руху декабристів, які використовували його для залучення додаткових прихильників до своєї справи."
  flavor_rus.70.title: "Ретельні вдосконалення [yury_felten.GetNameWithNoTooltip]"
  flavor_rus.70.desc: "Амбітний архітектор і винахідник [yury_felten.GetName], німецького походження, успішно завершив [yury_felten.GetHisHer] навчання в [ShowBuildingTypeNameWithNoTooltip('academy_of_sciences')] і наразі працює помічником інших архітекторів. Демонструючи унікальний талант до розбудови існуючих робіт, [yury_felten.GetSheHe] міг би значно сприяти вдосконаленню наших грандіозних палаців на благо аристократії. Крім того, [yury_felten.GetSheHe] здобув репутацію винахідника та збирача своєрідних пристроїв і механізмів, деякі з яких можна було б використати для просування наших будівельних технологій."
  flavor_rus.70.a: "Скласти стандартний чотирнадцятигодинний контракт."
  flavor_rus.70.tt2: "[yury_felten.GetSheHe|U] навчається у відомого архітектора [francesco_rastrelli.GetName], отримуючи цінні знання"
  flavor_rus.70.tt3: "[yury_felten.GetSheHe|U] додає додаткові твори мистецтва, фрески та мурали до існуючих палаців у [ShowLocationName('neva')]"
  flavor_rus.70.b: "Навички мають передаватися."
  flavor_rus.70.tt4: "[yury_felten.GetSheHe|U] отримує викладацьку посаду в [ShowBuildingTypeNameWithNoTooltip('imperial_academy_of_arts')] у [ShowLocationName('neva')]"
  flavor_rus.70.c: "Краса суб'єктивна."
  flavor_rus.70.tt5: "[yury_felten.GetNameWithNoTooltip] шукає роботу в іншому місці"
  flavor_rus.70.historical_info: "Юрій Фельтен був відомим архітектором, який здобув прихильність імператриці Катерини «Великої». Він спроектував кілька пам'ятників і церков, брав участь у будівництві Зимового палацу та Катерининського палацу. Його також пам'ятають за важкопідйомну машину, створену для переміщення каменю, необхідного для Мідного вершника в Санкт-Петербурзі. Він став директором Імператорської академії мистецтв, цю посаду він обіймав до кінця свого життя."
  flavor_rus.71.title: "Військові поселення"
  flavor_rus.71.desc: "Вартість утримання постійної армії є постійним тягарем для скарбниці, особливо з точки зору постачання та розміщення. В результаті, наша військова міць залишається нижчою за встановлені очікування, незважаючи на кроки, що вживаються для її покращення. Давайте запровадимо нову систему, яка передбачатиме розподіл часу солдата між сільськогосподарською діяльністю та службою в армії, з метою створення більш самодостатньої моделі. Солдати будуть ротуватися, щоб протидіяти значному падінню сільськогосподарського виробництва, а сім'ї призваних солдатів повинні отримувати військову освіту, щоб прив'язати їх до служби в збройних силах на покоління вперед."
  flavor_rus.71.a: "Безпрограшний сценарій."
  enable_military_settlements_policy: "Надає доступ до [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('military_settlements_policy')]"
  flavor_rus.71.b: "Внутрішніх недоліків занадто багато."
  flavor_rus.71.historical_info: "Військові поселення були запроваджені імператором Олександром I у спробі протидіяти зростаючим витратам, пов'язаним з утриманням величезної армії, а також забезпечити безперервне постачання працездатних солдатів, дозволяючи сім'ям проводити більше часу разом. Система виявилася неефективною, оскільки організація була поганою, і не враховувалася делікатна природа сезонної залежності від самого землеробства, що означало, що солдати іноді були відсутні, коли потрібно було працювати. Замість вирішення проблем, застосовувалися суворі покарання, оскільки виробництво продовольства погіршувалося, що призводило до масових заворушень."
  flavor_rus.72.title: "Початок націоналізму"
  flavor_rus.72.desc: "Визначення та сприйнята перевага [ShowCultureGroupName('slavic_group')] культури є гаряче обговорюваною темою серед вчених. Думки розходяться щодо того, чи слід нам дотримуватися більш прозахідної позиції, щоб забезпечити, що [ROOT.GetCountry.GetName] не буде стагнувати в нескінченному циклі традицій, чи важливість продовження недооцінена і повинна залишатися центральною частиною збереження [ROOT.GetCountry.GetAdjectiveWithNoTooltip] ідентичності. Розбіжності спричинили створення двох різних інтелектуальних рухів, які бажають спрямувати нас у протилежні сторони, і ми повинні вирішити, який шлях відповідає нашому баченню майбутнього."
  flavor_rus.72.a: "Підтримати слов'янофілів."
  flavor_rus.72.custom1: "Надає доступ до [Concept('law', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('intellectual_movements')]"
  flavor_rus.72.custom2: "[Concept('policy', 'CONCEPT_PLACEHOLDER')|e] за [Concept('law', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('intellectual_movements')] може бути змінена лише раз на десять років"
  flavor_rus.72.b: "Підтримати західників."
  flavor_rus.72.historical_info: "Західники та слов'янофіли були двома різними інтелектуальними та ідеологічними рухами в Росії дев'ятнадцятого століття. Вони мали різні погляди на шлях розвитку Росії, її відносини із Західною Європою та збереження російської культурної ідентичності. Західники виступали за модернізацію шляхом прийняття західних ідей, інститутів і технологій, тоді як слов'янофіли наголошували на збереженні традиційних російських цінностей, духовності та громадських структур."
  flavor_rus.73.title: "Листування [francois_marie_voltaire.GetLastNameWithNoTooltip]"
  flavor_rus.73.desc: "[GetCountry('FRA').GetAdjective] письменник і провокатор [francois_marie_voltaire.GetName] нещодавно відвідав [target_ruler.GetName], і вони, схоже, знайшли спільну мову в темах, починаючи від свободи слова та критики релігії, відповідно до просвітницьких ідей, що охопили континент. Перед від'їздом [francois_marie_voltaire.GetHisHer] було досягнуто консенсусу щодо необхідності постійного обміну листами для продовження обміну ідеями та філософських дебатів. Такий обмін може мати несприятливі наслідки для формування політики [ROOT.GetCountry.GetName], дозволяючи радикальним думкам проникати на найвищі рівні суспільства, але він також може прискорити потік нових та інтригуючих концепцій до нашого порогу."
  flavor_rus.73.a: "Заохочувати письменство."
  STATIC_MODIFIER_NAME_extensive_correspondence: "Широке листування"
  flavor_rus.73.b: "Недоумкуватий бовдур."
  flavor_rus.73.historical_info: "Імператриця Катерина «Велика» обмінювалася численними листами з Вольтером під час свого правління. Вони дебатували, висловлювали нові ідеї та навіть сперечалися залежно від теми, що виносилася на обговорення, включаючи філософію, літературу, політику та соціальні питання. Вольтер, відомий своїм дотепністю та ідеалами Просвітництва, хвалив зусилля Катерини з модернізації Росії та впровадження реформ. У свою чергу, Катерина зверталася до Вольтера за порадами щодо питань управління та культурного розвитку."
  flavor_rus.74.title: "Неприємні істини [nikolay_novikov.GetNameWithNoTooltip]"
  flavor_rus.74.desc: "Філантроп і трансформаційний автор [nikolay_novikov.GetName] здобув собі ім'я в культурних і літературних колах, публікуючи широкий спектр робіт для стимулювання дискусій на безліч тем. Зовсім недавно [nikolay_novikov.GetSheHe] очолив редагування в «Московській газеті», місцевій газеті, і почав видавати сатиричні журнали, які швидко набирають популярність. Ми повинні діяти, щоб зупинити поширення небезпечних думок, інакше ми можемо опинитися на неправильному кінці гільйотини."
  flavor_rus.74.a: "Конфіскувати [nikolay_novikov.GetHisHer] роботу."
  flavor_rus.74.tt2: "Популярність вилученої роботи викликає невдоволення серед [ShowPopTypeName('peasants')] та [ShowPopTypeName('burghers')]"
  flavor_rus.74.b: "Залишити [nikolay_novikov.GetHimHer] у спокої."
  flavor_rus.74.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вражені тим, що революційні ідеї [nikolay_novikov.GetNameWithNoTooltip] дозволено поширювати через [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_rus.74.c: "Примусити [nikolay_novikov.GetHimHer] опублікувати спростування."
  flavor_rus.74.tt4: "Цензура посилюється, щоб уповільнити подальше поширення революційних ідей"
  flavor_rus.74.historical_info: "Микола Новіков був письменником, філантропом і видавцем за часів правління імператриці Катерини «Великої». Він заснував літературно-філософський журнал, який відіграв важливу роль у просуванні ідей Просвітництва в Росії, а також займався масонською діяльністю та благодійністю. Це призвело до конфлікту з урядом, який ув'язнив його на кілька років. Проте його роботи продовжували поширюватися і сприяли антиурядовим настроям, надихаючи майбутні революції."