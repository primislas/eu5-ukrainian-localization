l_english:
  flavor_maj.1.title: "Книга Царів"
  flavor_maj.1.desc: "Кульмінація нашої історії та коріння нашої цивілізації дуже добре задокументовані. Нещодавно [target_artist.GetName] звернувся до [target_character.GetName] з пропозицією. Під [target_artist.GetHerHis] рукою буде написана хроніка. Цей літературний твір деталізуватиме правителів, які привели [ROOT.GetCountry.GetLongName] до величі. Прагнучи возвеличити минуле та вшанувати тих, на чиїх плечах ми збудували цей великий [ROOT.GetCountry.GetFlavorRank], ми повинні прагнути пам’ятати, звідки ми прийшли."
  flavor_maj.1.a: "Замовити роботу."
  flavor_maj.1.b: "Краще не витрачати наші монети..."
  flavor_maj.1.historical_info: "Найвидатніша хроніка, що поєднує історію та міф, #italic Параратон#! — це розповідь про піднесення королівств Сінгасарі та Маджапахіт у Східній Яві."
  flavor_maj.2.title: "$maj_sumpah_palapa$ [target_character.GetNameWithNoTooltip]"
  flavor_maj.2.desc: "У вчинку, який був висміяний [target_character.GetHerHis] політичними суперниками, [target_character.GetName] проголосив [target_character.GetHerHis] офіційну клятву припинити споживання розкішної їжі та насолоду культурою та розвагами, доки [target_character.GetSheHe] успішно не підкорить усю [ShowRegionName('indonesia_region')]. Наші армії зворушені таким проявом переконання і впевнені, що підуть за цією великою людиною до кінців Землі."
  flavor_maj.2.a: "[target_character.GetHerHis|U] успіх відіб'ється на правлінні [target_character2.GetNameWithNoTooltip]!"
  flavor_maj.3.title: "$maj_nagarakretagama_woa$"
  flavor_maj.3.desc: "Потреба підтвердити нашу відданість релігійним кореням нашого [ROOT.GetCountry.GetFlavorRank] породила багато літературних творів, які вихваляють архітектуру наших храмів, а також наші складні та видатні церемонії. Ніхто інший, як [target_character.GetName], виступив і зголосився написати прекрасну хвалебну промову, поему на честь самої сутності нашого народу під керівництвом [target_character2.GetName]."
  flavor_maj.3.a: "Спонсорувати роботу."
  flavor_maj.3.b: "Безперечно, марна трата наших монет!"
  flavor_maj.4.title: "Піднесення [target_character.GetNameWithNoTooltip]"
  flavor_maj.4.desc: "На порозі нашої золотої ери та радісного престижу, що сяє від нашого могутнього становища по всій [ShowRegionName('indonesia_region')] та наших численних підданих, іскорка безсмертя в історичних книгах сяє на обличчі [target_character.GetName].\n\nЦя іскорка — не хто інший, як [target_character.GetHerHis] власний спадкоємець, який показав великі обіцянки, оскільки [target_character.GetSheHe] досяг успіху в кожному аспекті [target_character.GetHerHis] освіти. Мирна передача влади, безсумнівно, також зміцнить нашу стабільність."
  flavor_maj.4.a: "Нехай хлопець отримає [target_character.GetHerHis] корону."
  flavor_maj.4.b: "[target_character2.GetShortNameWithNoTooltip] поки що не відпустить владу!"
  flavor_maj.5.title: "Забезпечення західних кордонів"
  flavor_maj.5.desc: "На захід від нас лежить [target_country2.GetLongName], якою править [target_character2.GetName]. Оскільки ми прагнемо розширити наш вплив та владу по всій [ShowRegionName('indonesia_region')], питання забезпечення нашого західного кордону знову постало серед наших радників. Вони підтримують ідею, що політичний шлюб між [target_character3.GetName] та [target_country2.GetAdjectiveWithNoTooltip] принцесою [target_character.GetName] вирішив би це питання мирним шляхом.\n\nОднак фракція членів нашої ради виступає за більш жорстоке рішення. Вони говорять про слабкість, яку виявив [target_character2.GetNameWithNoTooltip]. Таким чином, вони бажають, щоб шлюб був брехнею, приводом вимагати їх негайного підкорення."
  flavor_maj.5.a: "Це чудова можливість забезпечити їхню вірність."
  flavor_maj.5.b: "Нам не потрібно вдаватися до хитрощів, укласти належний шлюб!"
  flavor_maj.5.c: "У нас немає часу на дрібні інтриги."
  press_for_subjugation_tt: "Якщо вони погодяться, ми висунемо нашу вимогу про їхнє підкорення."
  do_not_press_for_subjugation_tt: "Якщо вони погодяться, ми #R не#! висунемо нашу вимогу про їхнє підкорення."
  flavor_maj.6.title: "Мир через шлюб?"
  flavor_maj.6.desc: "Вже досить давно нам стало відомо, що правитель [target_country.GetName] став грізним, оскільки його вплив поширюється по всій [ShowRegionName('indonesia_region')]. Прагнучи забезпечити наші спільні кордони, вони попросили руки [target_character.GetName] у шлюбі з [target_character3.GetName]. Це хитрощі, щоб висунути законну претензію на підкорення, чи справжній знак миру та спокою на майбутнє?"
  flavor_maj.6.a: "Дуже добре, ми довіримося їм."
  flavor_maj.6.b: "Ми не можемо, за чистим сумлінням, дозволити цього."
  they_may_demand_subjugation_tt: "#italic Вони можуть вимагати нашого підкорення#!"
  flavor_maj.7.title: "Відповідь [target_country2.GetNameWithNoTooltip]"
  flavor_maj.7.desc: "Після тривалого очікування прибуття [target_country2.GetAdjective] дипломатичної делегації, нарешті надійшли новини про їхнє рішення щодо пропозиції шлюбу між [target_character2.GetName] та [target_character3.GetName]. Здається, вони нарешті набралися сміливості відповісти на наш жест!"
  flavor_maj.7.a: "Вони схилять коліно!"
  flavor_maj.7.b: "Нехай цей союз переросте у дружбу між нашими народами."
  flavor_maj.7.c: "Вони відмовилися? Ми очікували кращого..."
  explain_options_flavor_maj.8: "Якщо вони погодяться, вони стануть нашим прямим [Concept('subject', 'CONCEPT_PLACEHOLDER')|e], але якщо відмовляться, ми отримаємо [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти них"
  flavor_maj.8.title: "Вимоги [target_country.GetNameWithNoTooltip]"
  flavor_maj.8.desc: "Невдовзі після того, як новоспечена пара [target_character.GetName] та [target_character3.GetName] поєднала свої долі, [target_character.GetShortNameWithNoTooltip] висунув обурливу вимогу! Здається, шлюб був лише хитрощами, щоб вимагати нашого підкорення, посилаючись на їхній зростаючий вплив та владу над нами. Який жахливий поворот подій!"
  flavor_maj.8.a: "На жаль, ми мусимо схилити коліно заради блага нашого народу."
  flavor_maj.8.b: "Як вони сміють?"
  flavor_maj.8.historical_info: "Шлюб між королем Хаямом Вуруком та принцесою Дях Піталокою Суданського королівства закінчився жахливо, коли Гаджа Мада, тодішній #italic махапатіх#! імперії Маджапахіт, побачив прибуття принцеси як нагоду вимагати негайного підкорення Суданського королівства. Наступні битви після такої зради зрештою призвели до смерті суданської королівської родини та падіння їхнього Королівства."
  flavor_maj.9.title: "Історія [GetCountry('SUN').GetAdjectiveWithNoTooltip] Держави"
  flavor_maj.9.desc: "Наш острів є домом для одних з найвитонченіших та найрозвиненіших культур і цивілізацій, відомих нам. Щоб вшанувати минуле та королів колись великого Королівства, [target_artist.GetName] запропонував створити видатну хроніку, що деталізує історію цього минулого Королівства, зосереджуючись на збереженні культурних та [ROOT.GetCountry.GetGovernment.GetAdjective] коренів нашого дому."
  flavor_maj.9.a: "Чудова ідея."
  flavor_maj.9.b: "Нам не потрібна писана хвала невдалим Королівствам!"
  flavor_maj.9.historical_info: "Вважається життєво важливим суданським рукописом, #italic Каріта Парахіянган#! розповідає історію Королівства Сунда, включаючи легендарних правителів західної частини Яви, особливо за часів Королівства Сунда, попередника пізнішого Королівства Паджаджаран."
  flavor_maj.10.title: "Популяризація поем Какавін"
  flavor_maj.10.desc: "Серед культурного та соціального розквіту, який нині переживає наш народ, з'явилася нова видатна форма літератури. Ці нові поеми виникли завдяки поширенню впливу [ShowCultureGroupName('indian_group')] епосів, таких як #italic $ramayana$#! та #italic $mahabarata$#!. Поширення іноземних вірувань та, як побічний ефект, культурні обміни, призвели до нових форм літературного вираження.\n\nНезважаючи на сильний вплив їхніх [ShowCultureGroupNameWithNoTooltip('indian_group')] аналогів, поеми Какавін не є простими імітаціями чи навіть перекладами, оскільки вони успішно поєднують місцеве та іноземне культурне багатство для створення епічної міфології та оповідання. Такий художній вираз, безсумнівно, є ознакою нашого золотого віку, що сприяє перу таких людей, як [target_artist.GetName]!"
  flavor_maj.10.a: "Дуже добре, фінансуйте ці починання."
  flavor_maj.10.b: "Не будемо витрачати цінні монети."
  flavor_maj.10.historical_info: "Популяризація довгих наративних поем, написаних у віршованій формі з ритмами та метрами, натхненними санскритською літературою, відіграла важливу роль у формуванні ідентичності та культури суспільства Маджапахіт."
  flavor_maj.11.title: "Мрія Нусантари"
  flavor_maj.11.desc: "Десятиліття завоювань і неперевершена домінація в нашому регіоні змусили багатьох наших радників проголошувати наше божественне право на землі, що лежать далі, ніж бачить наше око.\n\nСправді, нещодавні успіхи можна пояснити лише божественною прихильністю, і хто ми такі, щоб ставити під сумнів таку волю? Народ [ROOT.GetCountry.GetName] приречений на велич під проводом [target_character.GetName]!"
  flavor_maj.11.a: "Ми скористаємося цією нагодою."
  flavor_maj.11.b: "Краще не поспішати."
  such_a_proclamation_will_incur_the_following_penalty_tt: "Таке войовниче проголошення спричинить наступний штраф:"
  flavor_maj.12.title: "Нові храми"
  flavor_maj.12.desc: "Велике процвітання, розширення та зростання нашої долі є не чим іншим, як нагородою за побожність нашого народу та міцну соціальну структуру. Суспільство, що складається з заможних купців, які жертвують свої монети, шляхтичів, які дбають про свій народ, і священнослужителів, які дотримуються своїх практик, безперечно, буде прогресувати.\n\nНамагаючись проголосити нашу ревність і прославити божественну природу, яка нас об'єднує, багато радників запропонували, щоб [target_character.GetName] особисто контролював фінансування, розширення та відновлення кількох храмів по всій [ROOT.GetCountry.GetLongName]."
  flavor_maj.12.a: "Продовжити фінансування."
  flavor_maj.12.b: "Ми не допустимо іноземних духовних впливів!"
  flavor_maj.12.historical_info: "Між XIII та XV століттями імперію Маджапахіт охопила епоха будівництва. Були зведені храми, прикрашені вишуканими арками, присвятами та золотими елементами, присвячені індуїстсько-буддійським божествам. Ці архітектурні дива переважно використовувалися для церемоніальних або пам'ятних цілей."
  maj_receive_events_about_important_temples_tt: "#italic Ми можемо отримувати особливі події, пов'язані зі зведенням різних важливих храмів на нашій основній території#!"
  flavor_maj.13.title: "Канді Тікус"
  flavor_maj.13.desc: "Наша побожність виявляється на всіх вулицях [target_location.GetName], оскільки храми та церемоніальні зали оживають, свідчення нашого достатку та багатства. Останній комплекс, який просить фінансування, справді є своєрідною концепцією. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у [target_location.GetNameWithNoTooltip] виступили з планами зведення ритуального очисного місця, особливого храму.\n\nЦі екстравагантні споруди, однак, викликали гнів простолюдинів, і вони, своєю чергою, бажають, щоб це місце вільно функціонувало для них як купальня та водогосподарський об'єкт."
  flavor_maj.13.a: "Нехай це буде місце поклоніння!"
  flavor_maj.13.b: "Вода для людей."
  flavor_maj.13.c: "Це лише марнотратні витрати, нам це не потрібно."
  flavor_maj.13.historical_info: "Комплекс із зануреним басейном, святилищами та водними каналами символізує гору Меру та космічний океан в індуїстсько-буддійській космології. Він використовується для ритуального очищення та відображає акцент імперії Маджапахіт на священності води."
  flavor_maj.14.title: "Канді Суравана"
  flavor_maj.14.desc: "Диво архітектурної майстерності, плани будівництва розширеного храмового комплексу в [target_location.GetName] вже в повному розпалі. За словами наших радників, будівля поєднає різні стилі елементів, прославляючи минулих правителів та задовольняючи наші ритуальні потреби. Присвячений минулим діянням наших найвеличніших правителів, цей релігійний комплекс є свідченням нашої вищої культури та славетної історії!"
  flavor_maj.14.a: "Дуже добре, продовжуйте!"
  flavor_maj.14.b: "Краще заощадити наші монети..."
  flavor_maj.14.historical_info: "Побудований на піку імперії Маджапахіт, він був присвячений королю Бхре Венгкеру, який був обожнений після своєї смерті. Храм має складні кам'яні рельєфи, що зображують сцени з $ramayana$ та яванських легенд. Хоча зараз він у руїнах, Канді Суравана демонструє синкретичні релігійні та художні традиції періоду Маджапахіт, поєднуючи індуїстські та буддійські елементи."
  flavor_maj.15.title: "Східна кампанія"
  flavor_maj.15.desc: "Отримавши [ShowModifier('maj_sumpah_palapa_modifier')], міністр [target_character.GetName] повністю відданий виконанню [target_character.GetHerHis] великих амбіцій щодо створення [ShowCountryRankName('rank_empire')] з [ROOT.GetCountry.GetLongName]. Наступною ціллю [target_character.GetHerHis] подвигів є [target_country.GetLongName], держава на острові [ShowProvinceDefinitionName('bali_province')]. Якщо вони впадуть, більше острівних королівств, безсумнівно, підуть за ними, створюючи каскадний ефект і приносячи значні прибутки від кампанії."
  flavor_maj.15.a: "Ми повинні негайно атакувати."
  flavor_maj.15.b: "Час ще не настав."
  flavor_maj.15.c: "Ми повинні сприяти миру та дипломатії!"
  flavor_maj.16.title: "Висадка [target_religion.GetGroup.GetNameWithNoTooltip]"
  flavor_maj.16.desc: "[target_religion.GetName] — це релігія, яка набуває все більшого впливу по всьому [ShowRegionName('indonesia_region')]. Протягом десятиліть вона повільно закріплювалася на Суматрі та на [ShowAreaName('malay_peninsula_area')]. Тепер вона поширилася на саму [ShowAreaName('java_area')], де перша значна громада [target_religion.GetGroup.GetAdjective] торговців оселилася в [target_location.GetName]. Хоча наші порти відвідують багато купців різних віросповідань, багато хто вважає, що поширення [target_religion.GetNameWithNoTooltip] може виявитися руйнівним для наших амбіцій."
  flavor_maj.16.a: "Їм раді в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_maj.16.b: "Ми повинні це зупинити."
  flavor_maj.17.title: "[target_character.GetNameWithNoTooltip]"
  flavor_maj.17.desc: "Справді винятковий персонаж прибув до нашої країни. [target_character.GetName], як [target_character.GetSheHe] відомий, є [target_religion.GetAdjective] проповідником з [birth_location.GetArea.GetName]. До прибуття в [ROOT.GetCountry.GetName], [target_character.GetShortNameWithNoTooltip] також проповідував у [ShowAreaName('champa_area')] і тепер перейшов до створення нової [target_religion.GetGroup.GetAdjective] громади в нашому [ROOT.GetCountry.GetFlavorRank]."
  flavor_maj.17.a: "Це добре."
  wali_songo_tt: "Коли [THIS.GetCharacter.GetName] помре, [ShowBuildingTypeName('wali_songo_shrine')] буде побудовано у видному [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionAdjective('sunni')] [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_maj.18.title: "Смерть Валі"
  flavor_maj.18.desc: "Ми отримали звістку про смерть [target_character.GetName]. За [target_character.GetHerHis] життя [target_character.GetSheHe] був шанований як великий [ShowReligionAdjective('sunni')] вчитель і [target_character.GetWomanMan], справді відданий поширенню [target_character.GetHerHis] віри. Чи це добре, чи ні, стане відомо незабаром. Одне, однак, безсумнівно: таких, як [target_character.GetHerHim], буде більше."
  flavor_maj.18.a: "Будь що буде."
  flavor_maj.19.title: "Новий [target_religion.GetGroup.GetAdjectiveWithNoTooltip] Проповідник"
  flavor_maj.19.desc: "Певний [target_religion.GetAdjective] проповідник став активним у [ROOT.GetCountry.GetLongName]. [target_character.GetHerHis|U] ім'я [target_character.GetName], і [target_character.GetSheHe] зумів здобути велику кількість послідовників до такої міри, що [target_character.GetSheHe] заснував [target_religion.GetAdjectiveWithNoTooltip] школу для полегшення [target_character.GetHerHis] роботи з навернення. [target_character.GetSheHe|U] є високошанованим членом і був визнаний одним з лідерів [target_religion.GetGroup.GetAdjectiveWithNoTooltip] громади в [ROOT.GetCountry.GetName]."
  flavor_maj.19.a: "Це може принести нам лише користь."
  flavor_maj.19.b: "Ми цього не терпітимемо."
  flavor_maj.20.title: "З'являється Герой"
  flavor_maj.20.desc: "[target_character.GetDaughterSon] члена [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] не так давно, все про нього було абсолютно невідомо, крім [target_character.GetHerHis] імені – Дамарвулан. [target_character.GetSheHe|U] служив нам конюхом, але незабаром чутки про [target_character.GetHerHis] природну красу досягли доньки прем'єр-міністра, і мало які вогні важче загасити, ніж молоду любов.\n\nДоля, що чекає [target_character.GetHerHim] за [target_character.GetHerHis] образу, повинна бути ясною, як літній день, однак, [target_character.GetSheHe] здобув прихильність [ROOT.GetCountry.GetGovernment.GetCourtTitle], і багато хто бачить [target_character.GetHerHim] як пророкованого рятівника [ROOT.GetCountry.GetFlavorRank]."
  flavor_maj.20.a: "Можливо, [target_character.GetSheHe] наш рятівник."
  flavor_maj.20.b: "Це була б гарна історія!"
  maj_winning_10_battles_with_damarwulan: "Коли [target_character.GetName] виграє щонайменше 10 [Concept('battles', 'CONCEPT_PLACEHOLDER')|e], [target_character.GetSheHe] отримає #g +15#! [Concept('mil', 'CONCEPT_PLACEHOLDER')|e], а [ROOT.GetCountry.GetName] отримає #g +25#! [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_maj.21.title: "Перемога [target_character.GetNameWithNoTooltip]"
  flavor_maj.21.desc: "Легше не стає. Гнила кров все ще смердить, як своя, очі ворогів все ще людські очі, ніч перед битвою все ще не дає [target_character.GetName] заснути.\n\nБитва закінчується переможно, як і будь-яка інша битва для [target_character.GetHerHim]. Це десята битва, і [target_character.GetSheHe] бажає, щоб десять було остаточним числом. Коли [target_character.GetSheHe] повертається до [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetSheHe] зустрічають з найбільшими почестями, [target_character.GetHerHis] ім'я повторюється стільки разів, що [target_character.GetSheHe] забуває, що це [target_character.GetHerHis] ім'я, і думає, що це просто інше слово для \"перемоги\". [ROOT.GetCountry.GetGovernment.GetRuler.GetName] наближається до [target_character.GetHerHim], [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] серце сповнене радості."
  flavor_maj.21.a: "Справді славетний переможець!"
  flavor_maj.22.title: "Загибель [target_location.GetNameWithNoTooltip]"
  flavor_maj.22.desc: "[target_character.GetName] втратив прихильність у [target_country.GetName]. Відверто пішовши проти політики [ROOT.GetCountry.GetName], [target_character.GetSheHe] був негайно атакований одним із наших вірних контингентів у цьому районі, а його/її столиця була взята в облогу. У такій відчайдушній ситуації [target_character.GetNameWithNoTooltip] вирішив/вирішила втекти з кількома членами свого/її [ROOT.GetCountry.GetGovernment.GetCourtTitle] з [target_location.GetName]. Мало що відомо про його/її майбутні плани, але одне можна сказати напевно: яким би не був його/її наступний крок, він не буде нам на користь."
  flavor_maj.22.a: "Скатертиною дорога!"
  flavor_maj.22.b: "Нам цікаво, куди це його/її приведе."
  flavor_maj.23_24.common_desc: "Втікши з [target_country.GetAdjective] двору, [target_character.GetName] подорожував/подорожувала на північ уздовж узбережжя [ShowAreaName('malay_peninsula_area')] в надії заснувати нове поселення для правління. Лише в гирлі річки Бентам [target_character.GetSheHe] знайшов/знайшла підходяще місце для такого починання."
  flavor_maj.23.title: "Заснування $MLC$"
  flavor_maj.23.desc: "$flavor_maj.23_24.common_desc$\n\nОднак місце, яке обрав/обрала [target_character.GetSheHe], знаходиться в наших межах, і заснування такої держави може стати проблематичним у майбутньому. Можливо, варто було б використати наші ресурси, щоб прогнати такого волоцюгу."
  flavor_maj.23.a: "Дозволити заснування."
  flavor_maj.23.b: "[target_character.GetSheHe|U] тут раді!"
  flavor_maj.23.c: "Ми не терпітимемо таких вискочок."
  maj_get_trust_with_malacca: "[ShowFormableCountryName('MLC_f')] отримає взаємну [ShowBiasValue('maj_mutual_trust_malacca')] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] з [ROOT.GetCountry.GetName]."
  flavor_maj.24.title: "Народження нового [ROOT.GetCountry.GetFlavorRank]"
  flavor_maj.24.desc: "$flavor_maj.23_24.common_desc$\n\nДійсно, наш скромний [ROOT.GetCountry.GetGovernment.GetRulerTitle] сидів під малаккським деревом, коли [target_character.GetSheHe] помітив/помітила, як мишачий олень перехитрив мисливського собаку. Саме це місце було обрано наріжним каменем його/її нового володіння на заході."
  flavor_maj.24.a: "Ми принесемо революцію в Нусантару."
  flavor_maj.25.title: "Здійснення мрії"
  flavor_maj.25.desc: "[target_character.GetName] поклявся/поклялася поставити весь [ShowRegionName('indonesia_region')] під пильне правління [ROOT.GetCountry.GetLongName], інакше [target_character.GetSheHe] ніколи більше не скуштує жодної спеції.\n\nЩоб наблизити наш славетний [ROOT.GetCountry.GetFlavorRank] до цієї благородної мети, [target_character.GetShortNameWithNoTooltip] та інші міністри планують вступити в конфлікт з [target_country.GetName], яких вони вважають головною мішенню для підкорення."
  flavor_maj.25.a: "Їм краще підкоритися нам раніше, ніж пізніше."
  flavor_maj.25.b: "Ми знайдемо інший шлях."
  flavor_maj.26.title: "Упараджа для [target_country.GetNameWithNoTooltip]"
  flavor_maj.26.desc: "До нас звернувся один високопоставлений міністр, [target_character.GetName] з [target_country.GetLongName]. [target_character.GetSheHe|U] служив/служила нам у минулому і запропонував/запропонувала очолити експедицію в [ShowAreaName('south_sumatra_area')], щоб зміцнити нашу владу над нашими підданими, а також підкорити [target_country2.GetName]."
  flavor_maj.26.a: "[target_character.GetNameWithNoTooltip] був би хорошим лідером."
  flavor_maj.26.b: "Ми не можемо фінансувати такі експедиції."
  maj_fire_will_event_if_target_character_lives: "Якщо [target_character.GetName] помре до кінця експедиції, [Concept('event', 'CONCEPT_PLACEHOLDER')|e] не спрацює."
  flavor_maj.27.title: "$PGR$"
  flavor_maj.27.desc: "Після експедиції [target_character.GetName] [target_character.GetSheHe] взяв/взяла під контроль [ROOT.GetCountry.GetLongName] і заснував/заснувала власну державу. Як [ROOT.GetCountry.GetGovernment.GetRulerTitle] $PGR$, [target_character.GetNameWithNoTooltip] має намір контролювати знамениту торгівлю [ShowGoodsName('goods_gold')]."
  flavor_maj.27.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_maj.28.title: "Пишність [target_location.GetNameWithNoTooltip]"
  flavor_maj.28.desc: "Мало міст на [ShowAreaName('java_area')] можуть зрівнятися зі славетним [target_location.GetName]. Оточене товстими стінами з чудового червоної цегли, [target_location.GetRank.GetName] є справжньою сутністю [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank].\n\nА посередині нього — [ROOT.GetCountry.GetGovernment.GetAdjective] палац, заздрість усього світу, з підлогою із золотих і срібних плиток. Резиденція [ROOT.GetCountry.GetGovernment.GetRulerTitle], це справді центральна частина світу."
  flavor_maj.28.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_maj.29.title: "Золотий вік [ROOT.GetCountry.GetAdjectiveWithNoTooltip] мистецтва"
  flavor_maj.29.desc: "Зі зростанням нашого [ROOT.GetCountry.GetFlavorRank] [ROOT.GetCountry.GetCulture.GetName] культура переживає золотий вік, усі аспекти нашої культурної спадщини переживають справжнє відродження. Пишуться нові #italic kakawin#! поеми, а населення насолоджується традиційними ляльковими виставами. [ROOT.GetCountry.GetGovernment.GetRulerTitle] регулярно подорожує країною, милуючись і надаючи покровительство грандіозним новим закладам, створеним нашими художниками. Нехай цей час процвітання триває."
  flavor_maj.29.a: "[ROOT.GetCountry.GetNameWithNoTooltip] справді є центром світу."
  flavor_maj.29.b: "І ми повинні прагнути експортувати його нашим підданим!"
  MAJ_we_will_play_as_malacca: "Ми продовжимо грати за [ShowFormableCountryName('MLC_f')]."
  demak_progress_at_least_20: "Сунітське домінування становить щонайменше #r 20.0%#!"