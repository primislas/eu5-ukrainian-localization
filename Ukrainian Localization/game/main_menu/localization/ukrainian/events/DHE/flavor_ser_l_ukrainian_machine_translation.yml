l_english:
  flavor_ser.10.title: "Слабкість Корони"
  flavor_ser.10.desc: "Завоювання та спадщина, очолені [GetCharacter('ser_stefan_dusan').GetName], проклали шлях до піднесення нової могутньої сили на Балканах. Однак смерть нашого колишнього правителя призвела до приходу [target_character.GetName]. Змагаючись із втратою найшанованішого глави держави нашої країни, багато радників почали шепотіти в наших залах про неадекватність нашого керівництва. Чутки про нерішучість та імпотенцію роз'їли королівську владу, чинячи тиск і ризикуючи знищити те, що ми збудували. Наша доля висить на волосині, і правління [target_character.GetNameWithNoTooltip] ризикує знищити нашу імперську спадщину та призвести до неконтрольованого спуску в хаос."
  flavor_ser.10.a: "Нехай [target_parent.GetName] очолить регентство."
  flavor_ser.10.b: "Ми довіримо [target_dynasty_member_scope.GetName] трон."
  flavor_ser.10.c: "[target_character.GetNameWithNoTooltip] має піти!"
  flavor_ser.10.d: "Ми не боягузи, ми будемо битися!"
  flavor_ser.10.e: "Їх буде поставлено на коліна."
  ser_every_conquered_location_gets_tt: "Кожна [Concept('conquered', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] зазнає наступного:"
  ser_abdicate_throne_tt: "[target_character.GetNameWithNoTooltip] зречеться престолу"
  flavor_ser.11.title: "Боротьба за владу"
  flavor_ser.11.desc: "Видатні діячі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у наших володіннях мовчали під час правління [GetCharacter('ser_stefan_dusan').GetName]. Однак, з приходом [target_character.GetName], вони відчули себе сміливішими у своїй гордині. Вимагаючи більшої автономії та зменшення своїх зобов'язань, делегація шляхтичів прибула до нашого двору, просячи бути вислуханими, щоб гнів їхніх панів не вилився на землю..."
  flavor_ser.11.a: "Ми мусимо співпрацювати..."
  flavor_ser.11.b: "Купити їхню вірність за деякі привілеї."
  flavor_ser.11.c: "Вони скуштують чобіт."
  flavor_ser.11.d: "Ці погрози нижче нашої гідності!"
  flavor_ser.11.e: "Вони відповідають МЕНІ!"
  STATIC_MODIFIER_NAME_ser_reduced_taxation_obligation_modifier: "Зменшені зобов'язання"
  flavor_ser.12.title: "Мінливий контроль Корони"
  flavor_ser.12.desc: "Надто довго махінації видатних діячів у нашому королівстві впливали на політику. Тіньові фігури в темних кімнатах контролюють розпорядження та виконання центральної влади під виглядом вірності та лояльності. Відчуваючи себе сміливішими через слабке командування [target_character.GetName], багато представників могутніх груп вимагали панування та юрисдикції над нашими прикордонними землями, щоб ми не ризикували втратити їх..."
  flavor_ser.12.a: "Ми мусимо задовольнити їхні вимоги наразі..."
  flavor_ser.12.b: "Дуже добре, довіримо їм контроль над цими володіннями..."
  flavor_ser.12.c: "Якщо вони бажають боротьби..."
  ser_every_location_20_control_tt: "Кожна [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] втратить [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  STATIC_MODIFIER_NAME_ser_noble_borderlands_modifier: "Шляхетські прикордонні землі"
  STATIC_MODIFIER_NAME_ser_clergy_borderlands_modifier: "Прикордонні землі духовенства"
  STATIC_MODIFIER_NAME_ser_burgher_borderlands_modifier: "Купецькі прикордонні землі"
  flavor_ser.30.title: "Мрії [GetCharacter('ser_stefan_dusan').GetNameWithNoTooltip]"
  flavor_ser.30.desc: "Багато лідерів вважали себе продовжувачами Риму. Імперські мрії, одягнені в королівський пурпур, та видовище легендарних завоювань слугують головною привабливістю для сусідніх [ShowReligionGroupAdjectiveWithNoTooltip('christian')] володінь. Однак, на відміну від інших фальшивих претендентів, [GetCharacter('ser_stefan_dusan').GetName] має задатки легендарної постаті. Під [GetCharacter('ser_stefan_dusan').GetHerHis] твердою рукою ми вирушимо і візьмемо те, що по праву належить нам!"
  flavor_ser.30.a: "До воріт [ShowLocationNameWithNoTooltip('constantinople')], слава Риму чекає!"
  ser_conquest_into_empire: "Якщо ми завершимо завоювання цих [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] за життя [GetCharacter('ser_stefan_dusan').GetShortNameWithNoTooltip], ми станемо [ShowCountryRankName('rank_empire')] і отримаємо можливість проголосити власного #italic Автокефального#! [Concept('patriarch', 'CONCEPT_PLACEHOLDER')|e]"
  stefan_uros_conqueror_tt: "[target_character.GetName] отримає вигоду від [ShowModifier('insatiable_ambition')] [Concept('character', 'CONCEPT_PLACEHOLDER')|e] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] протягом [target_character.GetHerHis] правління"
  granted_claims_stefan_uros_tt: "Нам буде надано [ShowCasusBelliName('cb_conquer_province')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти [ShowProvinceDefinitionName('upper_macedonia_province')], [ShowProvinceDefinitionName('lower_macedonia_province')], [ShowProvinceDefinitionName('chalkidiki_province')] та [ShowProvinceDefinitionName('thessaly_province')]"
  flavor_ser.30.historical_info: "Стефан Урош IV Душан був проголошений імператором у 1346 році, що ознаменувало зеніт середньовічної сербської могутності. Його правління визначалося військовими завоюваннями та правовими реформами, які перетворили Сербію на домінуючу балканську імперію. Скориставшись ослабленням Візантійської імперії, Душан розширив свої володіння, включивши значні частини Македонії, Фессалії та навіть Епіру. На великому церковному соборі, що відбувся в Скоп'є, він був коронований імператором сербів і греків, утверджуючи як політичну перевагу, так і церковну незалежність шляхом піднесення Сербського архієпископства до Патріархату. Це імперське проголошення символізувало амбіції Сербії стати наступницею Візантії як провідної православної християнської сили в регіоні."
  flavor_ser.31.title: "Світанок нової імперії"
  flavor_ser.31.desc: "Крізь попіл полеглого фенікса та з неперевершеною силою [GetCharacter('ser_stefan_dusan').GetName] підніс наш народ до неперевершених висот пишноти, слави та престижу. З занепадом [GetCountry('BYZ').GetName] багато їхніх територій тепер неухильно переходять до наших рук. Незважаючи на місцеві заворушення та опір нашій адміністрації, це лише перший крок до грандіозних планів, спрямованих на піднесення нас до статусу легенд. Нова сила піднімається. Її перемога вже близько. Було провіщено, що земля буде заплямована кров'ю наших ворогів. Рушайте до [ShowLocationName('constantinople')]. Не залишайте нікого живим. На війну!"
  flavor_ser.31.a: "Це наш момент слави!"
  flavor_ser.31.b: "Поспішаймо, повільно..."
  flavor_ser.31.historical_info: "Стефан Душан, також відомий як Душан Могутній, зійшов на престол як імператор греків і сербів у 1346 році, що ознаменувало поворотний момент в історії Балкан. Народившись у 1308 році, він ініціював повстання проти свого батька, короля Стефана Уроша III Дечанського, зрештою ставши королем Сербії у 1331 році. Його амбіції виходили за межі сербських кордонів, що призвело до успішної кампанії проти Візантійської імперії, якою тоді правив Іоанн VI Кантакузен. Його коронація імператором у Скоп'є закріпила його владу над величезним царством, що простягалося від сучасної Хорватії до південної Греції. Душан ще більше утвердив свою незалежність, заснувавши Сербську православну церкву, закріплену Сербським патріархом у Печі, і запровадив впливовий Кодекс Душана, комплексну правову систему, що спиралася на візантійські та римські традиції. Його правління ознаменувало зеніт сербської могутності, культурного впливу та територіальної експансії, але після його смерті у 1355 році імперія поступово розпалася і втратила свої попередні завоювання, залишивши значну спадщину в сербській історії."
  flavor_ser.40.title: "Втеча [target_character.GetNameWithNoTooltip]"
  flavor_ser.40.desc: "Не секрет, що двір нашого ворога повний жадібних до влади стерв'ятників, готових пожерти тіло власної країни при першому ж прояві слабкості. Оскільки настали часи війни, хитання [GetCountry('BYZ').GetName] стало очевидним для тих, хто має високі прагнення. Однією з таких осіб є [target_character.GetName]. Зневажений [target_character.GetHerHis] однолітками та з розбитими [target_character.GetHerHis] мріями про королівську владу, [target_character.GetSheHe] запропонував [target_character.GetHerHis] меч проти наших ворогів."
  flavor_ser.40.a: "[target_character.GetSheHe|U] стане чудовим доповненням до наших лав."
  flavor_ser.40.b: "Нам не потрібні перебіжчики!"
  flavor_ser.40_for_byz_tt: "[GetCountry('BYZ').GetLongNameWithNoTooltip] буде поінформовано про зміну вірності [target_character.GetNameWithNoTooltip]"
  flavor_ser.41.title: "Кинджал у спину"
  flavor_ser.41.desc: "Надійшла звістка з фронту, і, схоже, [target_character.GetName] дезертирував [target_character.GetHerHis] пост, фактично приєднавшись до наших ворогів під час нашої боротьби. Ця образа не буде забута, і кров повинна бути пролита, щоб виправити це зухвальство проти нашої легітимності."
  flavor_ser.41.a: "Проклятий зрадник!"
  flavor_ser.50.title: "Кодекс [target_character.GetNameWithNoTooltip]"
  flavor_ser.50.desc: "Завоювання та різноманітні перемоги за кордоном започаткували еру процвітання під вмілим керівництвом [target_character.GetName]. Однак за руйнуванням має слідувати оновлення, і тому ми розробили законодавство для кращого управління новорозширеним царством. Нова правова база передбачає значні зміни в нашій адміністрації та місцевій організації наших провінцій по всьому Балканському регіону."
  flavor_ser.50.a: "Правова база, гідна такої великої нації, як наша!"
  flavor_ser.50.b: "Не будемо порушувати статус-кво."
  flavor_ser.50.historical_info: "Правовий кодекс, широко відомий як #italic Закон Благочестивого Імператора Стефана#!, є значним історичним документом для всього регіону, а також сербської історії. Він був запроваджений за правління Душана, який правив греками та сербами в середині XIV століття. Ця правова система офіційно відома як Кодекс Душана, названа на честь її головного автора, і вона відіграла вирішальну роль у формуванні правової та адміністративної структури новонародженої Сербської імперії. Цей кодекс особливо примітний тим, що спирався на візантійські та римські правові традиції, відображаючи різноманітні культурні впливи імперії. Кодекс Душана охоплював різні аспекти права, управління та соціальної організації, пропонуючи положення щодо таких питань, як майнові права, шлюб, кримінальне правосуддя та оподаткування. Він значно сприяв розвитку єдиної правової бази у межах Сербської імперії в цей період, залишивши тривалий вплив на правову історію всього регіону."
  flavor_ser.60.title: "Зростання Влахів та Меропсів"
  flavor_ser.60.desc: "Землі, керовані нашим славетним володінням, густо населені широким колом селян та простолюдинів. Найвидатнішими класами з них є #italic Влахи#! та #italic Меропси#!. Перші займаються випасом великої рогатої худоби та овець під владою феодального пана, тоді як останні здебільшого активні у виробництві пшениці і часто перебували під юрисдикцією пана, глави держави або Церкви. Ці класи становлять основу нашого матеріального виробництва, вирощуючи величезну кількість [ShowGoodsName('livestock')] та [ShowGoodsName('wheat')]. Однак останні зими виявилися важкими, і тому вони приходять до нас, просячи підтримки."
  flavor_ser.60.a: "Забезпечити як #italic Влахів#!, так і #italic Меропсів#!."
  flavor_ser.60.b: "Ми допоможемо #italic Влахам#!."
  flavor_ser.60.c: "Фінансувати #italic Меропсів#! натомість."
  flavor_ser.60.d: "Ми не можемо собі цього дозволити..."
  ser_every_livestock_or_wheat_location_tt: "Наступне стосуватиметься усіх належних [ShowGoodsName('wheat')] та [ShowGoodsName('livestock')] локацій:"
  ser_every_livestock_location_tt: "Наступне стосуватиметься усіх належних [ShowGoodsName('livestock')] локацій:"
  ser_every_wheat_location_tt: "Наступне стосуватиметься усіх належних [ShowGoodsName('wheat')] локацій:"
  flavor_ser.70.title: "Столиця, гідна імперії"
  flavor_ser.70.desc: "Наш успіх у всьому регіоні зрівнявся лише з нашим прагненням вписати наше ім'я в книги історії золотими літерами та незмірним престижем. У міру зростання нашої держави ми повинні зазирнути всередину і визначити гідну столицю для зростаючої сили, символ нашої влади та величі..."
  flavor_ser.70.a: "Нехай це буде [ShowLocationNameWithNoTooltip('skopje')]!"
  flavor_ser.70.b: "[ShowLocationNameWithNoTooltip('constantinople')], сяюча перлина Риму!"
  flavor_ser.70.c: "Наше нинішнє місце влади добре нам послужить..."
  flavor_ser.80.title: "Щит Балкан, що руйнується"
  flavor_ser.80.desc: "Наші війни проти [GetCountry('TUR').GetLongName] були для нас несприятливими. Солдати зі зламаним бойовим духом тікають з поля бою, знамення та забобони охоплюють батьківщину, заворушення та розгубленість на вулицях. Це лише кілька ознак того, що наше суспільство та тканина нашої нації розпадаються, руйнуються та розплутуються, крок за кроком. З цією метою ми зібрали велику раду, щоб визначити хід наших дій під час війни та спробувати врятувати наш народ."
  flavor_ser.80.a: "Просити офіційної допомоги."
  flavor_ser.80.b: "Напевно, наші брати по вірі допоможуть..."
  flavor_ser.80.c: "Це ще не кінець!"
  ser_target_country_gets_flavor_ser.82_tt: "Подія #Y Братерська допомога?#! відбувається для [target_country.GetNameWithNoTooltip]"
  flavor_ser_desc_key: "Емісар з [GetCountry('SER').GetName] прибув до нашого двору. Він говорить про катастрофу, що охопила їхню війну проти [GetCountry('TUR').GetLongName]. Зазначаючи, що їхнє володіння нині є щитом Європи проти загрози зі Сходу, вони смиренно просять нашої допомоги у їхній поточній боротьбі..."
  flavor_ser.81.title: "[GetCountry('SER').GetNameWithNoTooltip] просить допомоги"
  flavor_ser.81.desc: "$flavor_ser_desc_key$"
  flavor_ser.81.a: "Надіслати союз та пожертви, прапори війни знову рушать!"
  flavor_ser.81.b: "Поділімося нашим військовим досвідом."
  flavor_ser.81.c: "Символічна пожертва на підтримку їхньої боротьби."
  flavor_ser.81.d: "Вони нічого не отримають!"
  flavor_ser.82.title: "Братерська допомога?"
  flavor_ser.82.desc: "$flavor_ser_desc_key$"
  flavor_ser.82.a: "Ми брати по вірі та зброї!"
  flavor_ser.82.b: "Наш військовий досвід послужить їхній боротьбі."
  flavor_ser.82.c: "Пропозиція монети для фінансування їхньої боротьби."
  flavor_ser.82.d: "Ми не можемо дозволити собі жодної допомоги..."
  flavor_ser_reply_desc: "Після кількох суворих днів подорожі, крізь дощі, бурі та постійну небезпеку розбійників на дорогах, наш емісар повернувся зі своєї місії просити допомоги у нашій поточній війні проти [GetCountry('TUR').GetLongName]. Поспішно пробираючись до нашого двору, він приносить елегантний лист із печаткою наших кореспондентів..."
  flavor_ser.83.title: "Прибуває Делегат [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  flavor_ser.83.desc: "$flavor_ser_reply_desc$"
  flavor_ser.83.a: "$flavor_ser_response$"
  flavor_ser.83.b: "$flavor_ser_response$"
  flavor_ser.83.c: "$flavor_ser_response$"
  flavor_ser.83.d: "Вони покинули нас? Як вони сміють?"
  flavor_ser_response: "Їхня допомога є дуже бажаною! Ми дякуємо їм за це."
  flavor_ser.84.title: "Делегація з [target_country.GetNameWithNoTooltip] повертається."
  flavor_ser.84.desc: "$flavor_ser_reply_desc$"
  flavor_ser.84.a: "$flavor_ser_response$"
  flavor_ser.84.b: "$flavor_ser_response$"
  flavor_ser.84.c: "$flavor_ser_response$"
  flavor_ser.84.d: "Вони покинули нас? Як це можливо?"
  flavor_ser.90.title: "Монастир Манасія"
  flavor_ser.90.desc: "У серці нашої нації існує райська ущелина, яка привернула увагу нашого [GetCountry('SER').GetGovernment.GetRulerTitle]. Під час численних прогулянок у цій місцевості, що мали призвести до планування монастиря, [target_character.GetName] мріяв/мріяла про те, щоб він служив мавзолеєм після [target_character.GetHerHis] смерті.\n\nОднак, з часом, планування ставало все більш амбітним, передбачаючи не лише простий монастир, який би розмістив кількох ченців та черниць, але й такий, що був би оточений міцними стінами для захисту у випадку нападу.\n\nЯкщо план буде реалізовано, церква монастиря буде присвячена Святій Трійці, яка так довго захищала нашу націю."
  flavor_ser.90.a: "Цей монастир призначений для величі."
  flavor_ser.90.b: "Навіщо нам ще один монастир?"
  flavor_ser.91.title: "Ресавська школа"
  flavor_ser.91.desc: "Лише за короткий період після заснування, монастир Манасія, також відомий як Ресава, став культурним центром у [ShowProvinceDefinitionName('toplica_province')] і повільно поширив свій вплив по всій нашій території та за її межами. Кажуть, що найкращі рукописи та переклади виконуються в так званій #italic Ресавській школі#!.\n\nЗнання минулого копіюються, засвоюються переписувачами та викладаються іншим. Хоча таким чином можуть бути виявлені небезпечні знання, що суперечать вченням Святої Церкви, якщо ми будемо пильними, викладатиметься лише добра мудрість, що виходить безпосередньо від Бога."
  flavor_ser.91.a: "Ми святкуватимемо нашу культуру."
  flavor_ser.100.title: "Завоювання Царгорода"
  flavor_ser.100.desc: "Протягом століть наш народ мріяв володіти Містом Світових Бажань. Тепер наші армії зуміли завоювати місто, і наші прапори гордо майорять над найвизначнішими місцями в ньому.\n\nНаш правитель, [target_character.GetName], тепер може вважатися справжнім Царем або Імператором, оскільки [target_character.GetSheHe] тримає в своїх руках найпрекрасніше та наймогутніше з усіх міст.\n\nМожна запитати, чи не слід змінити назву міста на більш відповідну: #Italic Місто Царів#!."
  flavor_ser.100.a: "Місто наше, і його буде перейменовано."
  flavor_ser.100.b: "Ми збережемо його оригінальну назву."
  flavor_ser.110.title: "[target_location.GetNameWithNoTooltip] Зростає"
  flavor_ser.110.desc: "Поселення [ShowLocationName('novo_brdo')] зросло завдяки багатим покладам гламу [ShowGoodsName('silver')] (різновид срібла з до третини сплаву з [ShowGoodsName('goods_gold')]), що оточують його і експлуатуються старанними нащадками [ShowCultureName('german_transylvanian')] народу, який наша нація запросила кілька поколінь тому.\n\nОскільки багатство тече з гір на вулиці, все більше і більше людей приваблюються блиском дорогоцінних металів, щоб приїхати до агломерації, і це відображається в тому, як швидко вона зросла за останні роки.\n\nМуніципальна рада надіслала делегацію до нашої столиці, щоб ми визнали її статус як важливого поселення."
  flavor_ser.110.a: "Нехай буде благословенне!"
  flavor_ser.120.title: "[ShowGoodsNameWithNoTooltip('goods_gold')] знайдено в Леце"
  flavor_ser.120.desc: "Розвідувальна група [ShowCultureName('german_transylvanian')] шахтарів пройшлася горами поблизу [ShowLocationName('glubocica')], неподалік поселення Леце. Вони стверджують, що знайшли ознаки присутності [ShowGoodsName('goods_gold')] під поверхнею.\n\nЗвісно, щоб дістатися до дорогоцінної руди, ми повинні побудувати належну гірничу споруду, що коштуватиме грошей. Інвестиції високі, але прибутки можуть зробити її неймовірно вигідною, оскільки вони очікують, що це буде найбільше родовище золота в нашому володінні."
  flavor_ser.120.a: "Саксонські шахтарі зроблять нас багатими."
  flavor_ser.120.b: "Золото в наших руках важить більше, ніж можливе золото."
  flavor_ser.130.title: "Фортеця [ShowLocationNameWithNoTooltip('smederevo')]"
  flavor_ser.130.desc: "Злиття річок Дунай та Єзава має стратегічне значення для нашої нації. Можливі вторгнення з півночі можуть пройти через це місце, і тому наявність належної фортеці в цьому районі може допомогти нам захистити нашу націю від цих зовнішніх загроз.\n\nНещодавно ми отримали низку тривожних повідомлень від стурбованих мешканців, що проживають поблизу [ShowLocationName('smederevo')], які вимагають покращити місцеві оборонні споруди, оскільки вони не почуваються в безпеці. Їхні заклики про допомогу та захист стали гучнішими, спонукаючи нас негайно вжити заходів для посилення цих укріплень.\n\nЯкщо ми інвестуємо в зміцнення цих оборонних споруд, ми забезпечимо ще один фланг нашої нації. Однак рішення не слід приймати легковажно, оскільки проекти укріплень вимагають значних ресурсів та ретельного розгляду."
  flavor_ser.130.a: "Нам потрібно контролювати цю територію."
  flavor_ser.130.b: "Нехай самі дають собі раду."
  STATIC_MODIFIER_NAME_ser_defenses_neglected: "Занедбані оборонні споруди"
  STATIC_MODIFIER_DESC_ser_defenses_neglected: "Наші оборонні споруди на півночі не отримують уваги, яку вимагають мешканці регіону, і почали руйнуватися. Люди в цьому районі почуваються покинутими напризволяще."
  flavor_ser.140.title: "Батько сучасної сербської літератури"
  flavor_ser.140.desc: "Народжений [target_character.GetBirthDate], [target_character.GetName] є видатним [ShowCultureName('serbian')] вченим, письменником та педагогом. [target_character.GetHerHis|U] життєва праця значно вплинула не лише на [ShowCultureNameWithNoTooltip('serbian')] культуру, але й на ширшу сферу європейського Просвітництва.\n\nНатхненний західними знаннями, [target_character.GetLastNameWithNoTooltip] поставив [target_character.GetHerHis] місією трансформувати [ShowCultureNameWithNoTooltip('serbian')] літературу та мову, щоб вони більше відповідали розмовній мові звичайних людей, відмінній від переважно церковної мови [ROOT.GetCountry.GetReligion.GetLanguage.GetName]\n\nКілька голосів у нашому уряді пропонують [target_character.GetHerHis] ім'я як можливого міністра, тоді як інші стверджують, що [target_character.GetSheHe] не є особливим."
  flavor_ser.140.a: "[target_character.GetSheHe|U] повинен працювати на уряд."
  flavor_ser.140.b: "[target_character.GetSheHe|U] є натхненням для нашого народу."
  flavor_ser.150.title: "Відвоювання [target_location.GetNameWithNoTooltip]"
  flavor_ser.150.desc: "Після багатьох десятиліть туги та боротьби, великий [target_location.GetRank.GetName] [target_location.GetName] нарешті повернувся до [ROOT.GetCountry.GetAdjective] рук. [target_location.GetNameWithNoTooltip], стратегічно розташований на злитті річок Сава та Дунай, має величезне значення як фортеця, так і як центр торгівлі та культури. Його стратегічне розташування, що пропонує неперевершений контроль над регіоном, робить його ідеальним кандидатом для нашої столиці.\n\nГолоси в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] стають все голоснішими, припускаючи, що перенесення нашого центру влади до [target_location.GetNameWithNoTooltip] зміцнить наш контроль та пожвавить нашу націю."
  flavor_ser.150.a: "Перенести столицю до [target_location.GetNameWithNoTooltip]!"
  flavor_ser.150.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] залишиться в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_ser.160.title: "Битва на [ShowProvinceDefinitionNameWithNoTooltip('kosovo_province')]"
  flavor_ser.160.desc: "Попри всі труднощі, хоробрі [ROOT.GetCountry.GetAdjective] сили здобули монументальну перемогу над [GetCountry('TUR').GetAdjective] загарбниками в [ShowProvinceDefinitionName('kosovo_province')]. Цей тріумф є маяком надії для всього християнського світу, оскільки невпинна [ShowCultureName('turkish_culture')] експансія в [ShowRegionName('balkan_region')] регіон становила серйозну загрозу для [ShowReligionGroupAdjective('christian')] світу, кидаючи довгу тінь на наші землі та народ.\n\nМужність і доблесть, виявлені нашими воїнами, показали, що [GetCountry('TUR').GetAdjectiveWithNoTooltip] хвилю можна повернути. Тепер, з оновленою енергією, ми стоїмо на порозі потенційного звільнення всього півострова. Нехай ця перемога стане першим кроком до повернення нашої батьківщини та забезпечення майбутнього, вільного від [GetCountry('TUR').GetAdjectiveWithNoTooltip] панування."
  flavor_ser.160.a: "Вперед, до перемоги!"
  flavor_ser.160.historical_info: "Битва на Косовому полі, що відбулася 28 червня 1389 року, була значним і вирішальним конфліктом між сербськими християнськими силами та Османською імперією, що розширювалася. Ця битва відбулася на Косовому полі, поблизу міста Приштина, і пам'ятається як одна з найважливіших битв в історії Балкан. Одним з найвизначніших аспектів битви на Косовому полі була смерть османського султана Мурада I. Згідно з історичними даними, Мурад був убитий у своєму наметі сербським лицарем Мілошем Обиличем, який проник до османського табору під виглядом дезертира. Це вбивство стало єдиним випадком в історії, коли османський султан загинув у битві."
  flavor_ser.170.title: "[target_location.GetNameWithNoTooltip] – Білий Фенікс"
  flavor_ser.170.desc: "[target_location.GetName], серце нашої нації, піднялося до неперевершених висот, ставши найбільш населеним і жвавим [target_location.GetRank.GetName] у [ShowRegionName('balkan_region')]. Ця трансформація принесла йому прізвисько Білий Фенікс. Зі свого стратегічного положення на злитті річок Сава та Дунай, [target_location.GetNameWithNoTooltip] тепер стоїть як маяк могутності та пишноти, затьмарюючи навіть поважний [ShowLocationName('constantinople')]."
  flavor_ser.170.a: "Чудово!"
  STATIC_MODIFIER_NAME_ser_the_white_phoenix: "Білий Фенікс"
  flavor_ser.180.title: "Перегляд Законоправила"
  flavor_ser.180.desc: "#italic Законоправило#!, монументальний правовий кодекс, укладений святим Савою у 1219 році, довгий час був основою наших законів та церковного порядку, а його мудрість та настанови формували [ROOT.GetCountry.GetAdjective] суспільство протягом століть.\n\nОднак, плин часу приніс значні зміни, і багато хто тепер стверджує, що закон має бути переглянутий, щоб відобразити еволюцію нашої нації та вирішити сучасні проблеми. Ця пропозиція викликала інтенсивні дебати. Хоча багато хто бачить необхідність оновлення закону для збереження актуальності та ефективності, значна частина [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] затято виступає проти будь-яких змін до цього майже святого писання."
  flavor_ser.180.a: "Його доцільно переглянути."
  flavor_ser.180.b: "Ми повинні зберегти його первісну форму."
  flavor_ser.190.title: "Хіландарський монастир"
  flavor_ser.190.desc: "[ShowLocationName('mount_athos')] знову опинився під [ROOT.GetCountry.GetAdjective] владою. Серед його священних монастирів стоїть Хіландар – наріжний камінь нашої національної спадщини, збудований Стефаном Неманею та його сином, святим Савою. Однак роки занедбаності та плин часу позначилися на цьому поважному місці. Стіни, що колись відлунювали молитвами наших предків, тепер потребують реставрації."
  flavor_ser.190.a: "Відремонтувати місцевий комплекс."
  flavor_ser.190.b: "Ми не можемо собі цього дозволити."
  flavor_ser.200.title: "Інституціоналізація Видовдана"
  flavor_ser.200.desc: "Жертви та доблесть наших предків у битвах проти [GetCountry('TUR').GetAdjective] гнобителів давно закарбувалися в серці нашої нації. Серед цих вшанувань день Видовдана виділяється як пронизливе нагадування про нашу боротьбу за незалежність та хоробрість тих, хто віддав своє життя за [ROOT.GetCountry.GetName]. Цей священний день, традиційно відзначається 28 червня, знаменує річницю $flavor_ser.160.title$ та вшановує мучеників і героїв, які боролися за збереження свободи нашої нації.\n\nЗростає рух за офіційну інституціоналізацію Видовдана як офіційного релігійного та національного свята. Це забезпечить вічне вшанування пам'яті наших полеглих героїв у нашій національній свідомості, слугуючи незмінним символом єдності."
  flavor_ser.200.a: "Інституціоналізувати його!"
  flavor_ser.200.b: "Нам слід уникати офіційної інституціоналізації."
  flavor_ser.210.title: "Кодекс [ShowLocationNameWithNoTooltip('novo_brdo')]"
  flavor_ser.210.desc: "Жваве гірничодобувне місто [ShowLocationName('novo_brdo')] розробило власний звід правил та практик для управління складними операціями та правами, пов'язаними з його прибутковою галуззю. Останнім часом зростає заклик прийняти всеосяжний загальнонаціональний гірничий кодекс на основі його принципів. Запропонований [ShowPolicyName('novo_brdo_mining_law')] стандартизував би організацію гірничих міст, визначив би права та обов'язки шахтарів, а також забезпечив би справедливі практики та заходи безпеки по всій [ROOT.GetCountry.GetName]."
  flavor_ser.210.a: "Впровадити гірничий кодекс по всій країні."
  flavor_ser.210.b: "Зберегти чинні гірничі правила."
  flavor_ser.210.historical_info: "Гірничий кодекс Ново Брдо, заснований у 1412 році Стефаном Лазаревичем, був всеосяжним зведенням правил, що регулювали гірничі операції, права робітників та організацію гірничих міст у середньовічній Сербії. Він надавав детальні вказівки щодо майнових прав, заходів безпеки та економічних практик, значно впливаючи на розвиток та процвітання гірничих громад."
  STATIC_MODIFIER_NAME_ser_novo_brdo_code: "Кодекс Ново Брдо"
  flavor_ser.210.tt: "Відкриває [ShowPolicyName('novo_brdo_mining_law')] Гірничий закон."
  has_unlocked_novo_brdo_tt: "Розблоковано закон через #Y Кодекс [ShowLocationNameWithNoTooltip('novo_brdo')]#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ser.220.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ser.220.desc: "[target_character.GetName] та [target_character.GetHisHer] елітний корпус германських воїнів, званий Алеманською гвардією, відіграють вирішальну роль у захисті [ROOT.GetCountry.GetFlavorRank] та виконанні волі [GetCharacter('ser_stefan_dusan').GetName]. Під [target_character.GetHisHer] командуванням Алеманська гвардія стала відомою своєю дисципліною, доблестю та вірністю, і вона є символом сили та стабільності у бурхливі часи."
  flavor_ser.220.a: "Ми вдячні [target_character.GetHimHer]!"
  flavor_ser.230.title: "Укріплення Голубаця"
  flavor_ser.230.desc: "Стратегічна Голубацька фортеця, розташована на берегах могутнього Дунаю у [ShowLocationName('kucevo')], довгий час була ключовим оборонним бастіоном та життєво важливим вузлом у нашій торговельній мережі. Її розташування біля входу до Дунайської ущелини робить її вирішальною для контролю над водними шляхами, забезпечення безпеки нашої торгівлі та відбиття потенційних загарбників. Враховуючи її важливе положення, було б мудро перетворити її на грізний замок, що зміцнив би наше панування над регіоном."
  flavor_ser.230.a: "Інвестувати в укріплення."
  flavor_ser.230.b: "Наші ресурси краще витратити деінде."
  flavor_ser.240.title: "Іллірійський рух"
  flavor_ser.240.desc: "Натхненний [ShowInstitutionName('enlightenment')] та духом південнослов'янської єдності, Іллірійський рух виступає за створення єдиної батьківщини для всіх слов'ян, вільної від ярма іноземних гнобителів. Іллірійські мислителі та активісти, зі своїм переконливим баченням єдиної та незалежної слов'янської нації, захопили уяву нашого народу, поширюючи свої ідеали по всій [ROOT.GetCountry.GetName].\n\nЗаклик руху до єдності та визволення глибоко резонує з нашими національними прагненнями. Однак це також створює значні виклики, оскільки прагнення до такого бачення може спровокувати неслов'янське населення нашої країни."
  flavor_ser.240.a: "Південнослов'янська єдність є нашим найвищим пріоритетом!"
  flavor_ser.240.b: "Це може дестабілізувати нас."
  flavor_ser.240.historical_info: "Іллірійський рух був політичною та культурною кампанією 19-го століття, спрямованою на сприяння південнослов'янській єдності та національній свідомості серед хорватів, словенців та сербів. Натхненний Просвітництвом та романтичним націоналізмом, він прагнув відродити та просувати слов'янські мови та культуру, закладаючи основу для майбутніх зусиль щодо політичного об'єднання та незалежності від іноземного панування."
  flavor_ser.250.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ser.250.desc: "[target_character.GetName], призначений шанованим главою [ROOT.GetCountry.GetAdjective] Патріархату, стоїть як стовп духовної сили для нашої нації. Під [target_character.GetHisHer] керівництвом [ROOT.GetCountry.GetName] яскраво сяє як бастіон християнства, сприяючи єдності та моральному керівництву серед нашого народу. [target_character.GetHisHer|U] непохитна відданість релігійній цілісності та мудрості піднесла вплив [ROOT.GetCountry.GetNameWithNoTooltip] у [ShowReligionAdjective('orthodox')] світі."
  flavor_ser.250.a: "Справжній поборник Христа!"
  flavor_ser.250.historical_info: "Соколович був історично значущим як Сербський Патріарх у критичний період османського панування. Він відіграв ключову роль у збереженні сербських православних традицій та ідентичності, надаючи духовне керівництво та лідерство серед політичних потрясінь. Термін перебування Макарія на посаді заклав основу для стійкості Сербського Православ'я та сприяв культурній та релігійній спадкоємності сербського народу під османським пануванням."