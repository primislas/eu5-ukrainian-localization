l_english:
  flavor_dai.1.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] кампанія проти [target_country.GetNameWithNoTooltip]"
  flavor_dai.1.desc: "Конфлікти між [ROOT.GetCountry.GetLongName] та [target_country.GetLongName] були присутні протягом століть у відносинах між [ROOT.GetCountry.GetCulture.GetName] та [target_country.GetCulture.GetName]. Знову правління [target_country.GetNameWithNoTooltip] виявляє слабкість, роблячи їх готовими до остаточного захоплення."
  flavor_dai.1.historical_info: "Попри союз у 13 столітті проти династії Юань, конфлікт між цими двома державами знову виник, коли суперечка про спадкування престолу Чампи переросла в напівгромадянську війну. Че Мо, член королівської родини Чампи, перейшов на бік Дайв'єту і попросив допомоги у Чан Зу Тонга проти узурпатора Ча Хоа Бо Де, щоб зайняти трон Чампи, що, своєю чергою, призвело до Чамсько-Дайв'єтської війни, яка тривала з 1367 по 1390 рік."
  flavor_dai.1.a: "Цього разу [target_country.GetNameWithNoTooltip] схилиться перед нами!"
  flavor_dai.1.b: "Досить крові було пролито в минулому. Покладімо край ворожнечі."
  flavor_dai.2.title: "Консолідація [target_area.GetNameWithNoTooltip]"
  flavor_dai.2.desc: "Після багатьох років конфліктів з [target_country.GetLongName], нарешті, їхня доля була вирішена. Території [target_area.GetName] тепер підкорені [ROOT.GetCountry.GetLongName], і великий [target_location.GetRank.GetName] [target_location.GetName] має схилити коліно перед [root_location.GetName]. Проте, з цим завоюванням постає питання, як управляти новими землями та як поводитися з [target_culture.GetName] народом у [root_culture.GetName] суспільстві."
  flavor_dai.2.tt: "[Concept('integration', 'CONCEPT_PLACEHOLDER')|e] кожної [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] збільшується на #G +10#!"
  flavor_dai.2.a: "Інтегрувати [target_culture.GetNameWithNoTooltip] у наше суспільство."
  flavor_dai.2.b: "Залишити їх у спокої."
  flavor_dai.2.c: "Розселити [root_culture.GetNameWithNoTooltip] людей у [target_area.GetNameWithNoTooltip]."
  flavor_dai.3.title: "[target_culture_group.GetNameWithNoTooltip] купці"
  flavor_dai.3.desc: "[target_culture_group.GetName] купці з [target_country.GetName] стали звичним явищем у [target_location.GetName]. Торгуючи на [target_market.GetName], їхня присутність створила унікальний зв'язок між [ROOT.GetCountry.GetName] та народом [target_region.GetName]. Деякі з наших більш недовірливих членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] побоюються, однак, що частина [root_culture.GetName] може бути втрачена, якщо ми продовжимо ці торговельні відносини."
  flavor_dai.3.historical_info: "Протягом 16 століття японські купці займалися торгівлею з в'єтнамцями і навіть заснували власну резиденцію в портовому місті Файфо. У цей період японці побудували Японський міст, який слугує як мостом, так і храмом."
  flavor_dai.3.a: "Зміцнити наші зв'язки з [target_country.GetNameWithNoTooltip]"
  japanese_bridge: "Міст $japanese_group$"
  flavor_dai.3.b: "Зберегти статус-кво."
  flavor_dai.3.c: "Видалити [target_culture_group.GetNameWithNoTooltip] купців з наших портів."
  flavor_dai.4.title: "Імператорська цитадель"
  flavor_dai.4.desc: "Зі зростанням населення [ROOT.GetCountry.GetLongName], наша держава продовжує нагадувати справжню імперію, подібну до [GetUniqueInternationalOrganization('middle_kingdom').GetName]. Наші радники пропонують побудувати велику цитадель на честь [target_character.GetName]."
  flavor_dai.4.desc.a: "$flavor_dai.4.desc$ Вони також пропонують перенести [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] до [target_location.GetRank.GetName] [target_location.GetName], хоча деякі радять розширити [capital_location.GetName] натомість."
  flavor_dai.4.desc.b: "$flavor_dai.4.desc$ [target_location.GetRank.GetName] [target_location.GetName] буде розширено, щоб розмістити [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_dai.4.historical_info: "Імператорське місто Хюе — це обнесене стіною укріплення в межах цитаделі імперської столиці династії Нгуєн. Воно було побудоване в 1803 році після того, як Нгуєн Ань нарешті об'єднав В'єтнам після століття поділу між лордами Чінь та лордами Нгуєн."
  flavor_dai.4.a: "[target_location.GetNameWithNoTooltip] стане чудовою столицею."
  flavor_dai.4.tt: "За підтримки держави"
  flavor_dai.4.b: "Ми повинні зосередити наші зусилля на [capital_location.GetNameWithNoTooltip]."
  flavor_dai.4.c: "Великою буде слава [target_location.GetNameWithNoTooltip]."
  flavor_dai.5.title: "Латинізація [root_language.GetNameWithNoTooltip]"
  flavor_dai.5.desc: "Європейські купці та місіонери досягли [target_region.GetName] і займаються торгівлею з мешканцями цих місць, намагаючись також поширити свою віру. Одним з таких місіонерів є [target_character.GetName] з [target_country.GetName], який поширює вплив [target_religion.GetName] у [ROOT.GetCountry.GetName]. Хоча [target_character.GetHerHis] релігійна діяльність викликає подив у [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [target_character.GetHerHis] наукові праці створили версію [target_language.GetName] письма для написання [root_language.GetName] мови, що приносить великі переваги над старим [root_culture.GetName] письмом."
  flavor_dai.5.historical_info: "Франсіско де Піна, португальський єзуїт, перекладач та впливовий місіонер, був активним у сучасному В'єтнамі з 1617 року до своєї смерті у 1625 році. Він латинізував написання в'єтнамської мови, що пізніше стало основою сучасного в'єтнамського алфавіту."
  flavor_dai.5.a: "Прийняти цей новий алфавіт."
  portuguese_missionary: "[target_culture.GetName] місіонер"
  flavor_dai.5.b: "Дозволити [target_character.GetHerHim] проживати, але [target_character.GetHerHis] робота не повинна впливати на нашу мову."
  flavor_dai.5.c: "Вигнати цього та всіх інших [target_culture.GetNameWithNoTooltip] місіонерів за [target_character.GetHerHis] зухвалість."