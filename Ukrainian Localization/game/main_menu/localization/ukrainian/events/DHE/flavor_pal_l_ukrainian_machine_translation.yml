l_english:
  flavor_pal.1.title: "Гарний вибір"
  flavor_pal.1.desc: "Наша підтримка справжнього [GetCountry('PAP').GetGovernment.GetRulerTitle] у [ShowSituationName('western_schism')] здобула нам прихильність [ShowLocationName('rome')], що спонукало славетного [pope_ruler.GetName] надати нам нову папську буллу, яка дозволяє будівництво нового [ShowBuildingTypeName('university')] у [ShowLocationName('heidelberg')] за зразком університету [ShowLocationName('paris')]."
  flavor_pal.1.a: "Розпочати будівництво."
  flavor_pal.1.b: "Ми не можемо дозволити собі такі витрати."
  flavor_pal.2.title: "Переслідування [target_character.GetNameWithNoTooltip]"
  flavor_pal.2.desc: "[target_character.GetName], будучи шанованим вченим та гуманістом, також має хист до конфліктів з іншими [ShowReligionAdjective('catholic')] теологами. [target_character.GetSheHe|U] нещодавно довелося залишити свого попереднього роботодавця через особистий конфлікт з іншими радниками.\n\nНа щастя для нас, [target_character.GetSheHe] дуже зацікавлений служити нам і вже прямує до [ROOT.GetCountry.GetCapital.GetName]. Завдяки своїй гуманістичній натурі він міг би значно покращити репутацію нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_pal.2.a: "[target_character.GetSheHe|U] матиме нове місце, яке можна назвати домом."
  flavor_pal.2.b: "[target_character.GetSheHe|U] слід розвернутися і піти кудись інше."
  flavor_pal.3.title: "Перенесення $game_concept_capital$"
  flavor_pal.3.desc: "Через триваючу релігійну напругу в [ShowLocationName('heidelberg')], [target_ruler.GetName] розглядає можливість перенесення $game_concept_capital$ до розташованого неподалік $mannheim$. Цей крок міг би забезпечити новий початок і зменшити конфлікти, але може дестабілізувати населення та напружити ресурси."
  flavor_pal.3.a: "Перенести столицю до $mannheim$."
  flavor_pal.3.b: "Залишити [ShowLocationNameWithNoTooltip('heidelberg')] як $game_concept_capital$."
  flavor_pal.3.historical_info: "У 1720 році курфюрст Пфальцу Карл III Філіп зіткнувся зі значними релігійними конфліктами в Гейдельберзі, що виникли через напруженість між його католицькою адміністрацією та протестантською більшістю міста. Прагнучи пом'якшити ці проблеми та створити більш гармонійне місце влади, він вирішив перенести столицю до Мангейма. Будівництво Мангеймського палацу розпочалося того ж року на місці колишньої фортеці Фрідріхсбург, символізуючи світанок нової ери для Курфюрства. Цей стратегічний крок мав на меті не лише полегшити релігійні чвари, але й позиціонував Мангейм як зростаючий центр політичного та культурного значення в регіоні."