l_english:
  flavor_arm.1.title: "Втрата знань"
  flavor_arm.1.desc: "Протягом століть [ShowBuildingTypeName('university')] в [target_location.GetName] служив нашому народу як осередок культури та наук. Процвітаючи під патронатом відомих шляхетних родин, останні роки принесли великі нещастя покровителям цього закладу. Втрата багатства призвела до скасування багатьох предметів та втрати посад багатьма лекторами. Якщо [ShowBuildingTypeNameWithNoTooltip('university')] не отримає допомоги, люди побоюються, що вона може закритися..."
  flavor_arm.1.a: "Нехай занепадає."
  flavor_arm.1.b: "Фінансувати!"
  flavor_arm.2.title: "Татевський університет"
  flavor_arm.2.desc: "Розташований у жвавій громаді в [target_location.GetName], місцевий монастир розрісся, щоб містити багато серій контрактів, офіційних документів та цінних рукописів. Як наслідок, він тепер слугує б'ючим серцем знань, і його лектори прийшли клопотати про розширення приміщень. Вони бажають заснувати нові відділи, що пропонуватимуть заняття з мистецтва письма та вивчення музики."
  flavor_arm.2.a: "Фінансувати розширення."
  flavor_arm.2.b: "Краще ні."