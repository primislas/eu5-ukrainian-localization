l_english:
  flavor_fra.1.title: "Народження постійної податкової системи"
  flavor_fra.1.desc: "Після масштабних заходів [ruler_fra.GetName] завершив реорганізацію фінансів [ROOT.GetCountry.GetName]. Хоча [ROOT.GetCountry.GetNameWithNoTooltip] підтримував політику [ShowPolicyName('exceptional_only')] податку, що збирався лише під час війни, [ruler_fra.GetShortNameWithNoTooltip] розробив основу для постійної податкової системи. Завдяки компромісу з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] нова політика може бути впроваджена, хоча ці нові податкові заходи зустрінуть несхвалення з боку [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]."
  flavor_fra.1.a: "Видати її."
  flavor_fra.1.b: "Старі звичаї кращі..."
  enables_taille_laws: "[ROOT.GetCountry.GetName] отримає доступ до законів [ShowLawName('fra_taille')]"
  flavor_fra.1.historical_info: "Правління Карла VII ознаменувалося реорганізацією французьких фінансів із запровадженням податку Талья, що призвело до народження постійної податкової системи у Франції. Хоча дворянство та духовенство були звільнені, новостворена Талья, прямий податок на землю, значно допомогла б державним фінансам після закінчення Столітньої війни."
  flavor_fra.2.title: "Претензії [ShowDynastyNameWithNoTooltip('anjou_dynasty')] на [GetCountry('NAP').GetLongNameWithNoTooltip]"
  flavor_fra.2.desc: "Колись одне з багатьох володінь [ShowDynastyName('capet_dynasty')], правління [ShowDynastyNameWithNoTooltip('capet_dynasty')] над [GetCountry('NAP').GetName] давно закінчилося, і за нинішнього правління [ruler_nap.GetName] [GetCountry('NAP').GetAdjectiveWithNoTooltip] [GetCountry('NAP').GetFlavorRank] не позбавлений ворогів. Хоча [ruler_fra.GetName] [ShowDynastyNameWithNoTooltip('capet_dynasty')] коріння дозволяє [ruler_fra.GetHimHer] претендувати на [GetCountry('NAP').GetLongNameWithNoTooltip] через минулі династичні зв'язки, це залишалося б досить слабким. Однак непопулярне правління [ruler_nap.GetShortNameWithNoTooltip] надає можливість повернути [GetCountry('NAP').GetFlavorRank]."
  flavor_fra.2.historical_info: "У 1442 році Рене Анжуйський втратив контроль над Неаполітанським королівством на користь династії Трастамара. Хоча він ніколи не поверне собі корону, Рене продовжував називати себе королем Неаполя протягом усього свого життя. Людовик XII пізніше використав претензії Рене, щоб вторгнутися в Неаполь і встановити особисту унію. Однак вторгнення Людовика XII призвело до подальших Італійських війн."
  flavor_fra.2.a: "Заявимо права на те, що по праву належить нам!"
  fra_claimed_naples: "Заявлено права на Неаполь"
  flavor_fra.2.b: "Відмовимося від наших претензій назавжди!"
  fra_did_not_claim_naples: "Не заявлено прав на Неаполь"
  flavor_fra.3.title: "Конфіскація гільдій"
  flavor_fra.3.desc: "Гільдії в [ROOT.GetCountry.GetName] служили різним цілям протягом століть, сприяючи ремеслам або торгівлі членів асоційованої гільдії. Однак з часом ці гільдії стали джерелом втраченого доходу для держави, причому багато хто вносив значну частину свого багатства до своєї гільдії. Бачачи фінансові втрати, держава вимагає, щоб [fra_ruler.GetName] схвалив державне поглинання гільдій, акт, який, хоча й розлютить [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], дозволить державі поповнити королівську скарбницю."
  flavor_fra.3.a: "Схвалити поглинання гільдій."
  flavor_fra.3.b: "Дозволити гільдіям залишатися автономними."
  flavor_fra.4.title: "[ShowReligionAdjectiveWithNoTooltip('lutheran')] невдоволення в Беарні"
  flavor_fra.4.desc: "Зростаючий вплив кардинала [target_character.GetName] глибоко розгнівав [ShowReligionAdjective('lutheran')] населення в [ShowProvinceDefinitionName('bearn_bigorre_province')]. Якщо вплив [target_character.GetShortNameWithNoTooltip] продовжуватиме зростати, це ризикує довести відносини з іншими [ShowReligionAdjectiveWithNoTooltip('lutheran')] громадами в [ROOT.GetCountry.GetName] до бунтівної точки кипіння."
  flavor_fra.4.historical_info: "За правління короля Людовика XIII кардинал де Рішельє вирішив придушити політичні привілеї протестантів. Повстання (1621-22) проти запровадження католицизму в Беарні було придушене де Рішельє, і протестанти втратили всі фортеці, надані їм за Нантським едиктом, крім Монтобана та Ла-Рошелі."
  flavor_fra.4.a: "Стосовно."
  richelieu_may_cause_more_revolts: "Ворожа політика [target_character.GetName] проти [ShowReligionAdjective('lutheran')] може посилитися, щоб спровокувати відкрите повстання проти [ROOT.GetCountry.GetName]"
  flavor_fra.5.title: "Кардинал де Рішельє"
  flavor_fra.5.desc: "З моменту свого призначення кардиналом [target_character.GetName] став впливовою фігурою в [ROOT.GetCountry.GetGovernment.GetAdjective] політиці [ROOT.GetCountry.GetName]. Як міністр і близький радник [fra_ruler.GetName], він здобув значні внутрішні перемоги, що призвели до ослаблення політичних привілеїв [ROOT.GetCountry.GetGovernment.GetEstateName('nobility')]. Тепер [target_character.GetShortNameWithNoTooltip] прагне розширити вплив [ROOT.GetCountry.GetNameWithNoTooltip] на європейському континенті, але зробить це лише в тому випадку, якщо [ROOT.GetCountry.GetGovernment.GetCourtTitle] надалі вітатиме його вплив."
  flavor_fra.5.historical_info: "Арман Жан дю Плессі, широко відомий як кардинал де Рішельє, мав 39 років, коли став головним міністром короля Людовика XIII у 1624 році. Його головними успішними зусиллями у внутрішній політиці були боротьба проти вищого дворянства та політичних привілеїв протестантів. Він також підтримував заморську торгівлю, колоніальну експансію та створення постійного королівського флоту. Найбільш помітним досягненням залишалася дипломатична гра, яку він вів під час Тридцятилітньої війни, підштовхуючи французьким золотом шведську інтервенцію в 1630 році і, зрештою, Францію, яка приєдналася до війни в 1635 році. Його метою було зменшення впливу дому Габсбургів та виведення Франції з оточення ворожими землями. Його вважають винахідником концепції Real Politik."
  flavor_fra.5.a: "[target_character.GetHerHis] вплив може виявитися корисним у прийдешні часи"
  flavor_fra.6.title: "Винахід столового ножа"
  flavor_fra.6.desc: "При королівському дворі кардинал [target_character.GetName] відомий усім своїм витонченим та елегантним смаком у придворній кухні. Прагнучи ще більше покращити делікатеси двору, [target_character.GetShortNameWithNoTooltip] взявся за особисте завдання покращити посуд, який використовували різні королівські кухарі. Тепер, після інтенсивних та ретельних досліджень, [target_character.GetShortNameWithNoTooltip] представив свої розробки столового ножа, який має вигнуте лезо та загострений кінчик, — прилад, який, як наполягає [target_character.GetShortNameWithNoTooltip], ідеально підходить для нарізання овочів та м'яса. Такий винахід зробить делікатеси двору ще приємнішими."
  flavor_fra.6.a: "Це висока культура!"
  table_knife_court_flavor: "[ROOT.GetCountry.GetAdjective] двір тепер насолоджуватиметься елегантнішими стравами!"
  flavor_fra.7.title: "[fronde_uprising.GetNameWithNoTooltip] у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_fra.7.desc: "Протягом незліченних десятиліть занепаду політичної влади та зростання королівського абсолютизму, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] зібралися разом, щоб дати останній бій абсолютистському правлінню [fra_ruler.GetName]. Хоча жоден з головних членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не зробив публічного кроку до прямого повстання проти [fra_ruler.GetShortNameWithNoTooltip], зростаюча буря відіграватиме важливу роль у майбутньому [ROOT.GetCountry.GetName]."
  flavor_fra.7.historical_info: "Фронда (1648-1653) була переважно останнім повстанням французької знаті проти королівського абсолютизму. Вона почалася з повстання Паризького парламенту (на той час найвищого французького суду з юрисдикцією над королівськими едиктами) проти внутрішньої політики кардинала Мазаріні, який виконував обов'язки прем'єр-міністра 5-річного Людовика XIV. За цим послідувало повстання вищої знаті, але повстання було остаточно придушено поєднанням макіавеллівської дипломатії, зрад та змін долі. Парламент був приборканий (його не скликали знову до 1789 року), а вища знать позбавлена політичної влади, що підготувало прихід повного королівського абсолютизму за часів Короля-Сонця, Людовика XIV, після 1661 року."
  flavor_fra.7.a: "L'État, c'est moi."
  flavor_fra.7.b: "Заспокойте їх, ми не можемо ризикувати конфліктом з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]!"
  fronde_uprising: "Фронда"
  fronde_joining: "Усі [ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('france_region')] приєднаються до [fronde_uprising.GetName]"
  flavor_fra.8.title: "Французька академія"
  flavor_fra.8.desc: "Будучи покровителем літератури, кардинал [target_character.GetName] подав прохання про створення #italic l'Academie Francaise#!, установи, яка, як сподівається [target_character.GetShortNameWithNoTooltip], зможе сприяти [ROOT.GetCountry.GetAdjectiveWithNoTooltip] мові та літературним заняттям. Хоча така установа могла б виявитися корисною, витрати на реалізацію планів [target_character.GetShortNameWithNoTooltip] можуть виявитися занадто великим тягарем для державних фінансів."
  flavor_fra.8.historical_info: "Кардинал де Рішельє, будучи ліберальним покровителем літератури, заснував Французьку академію в 1636 році, щоб сприяти розвитку французької мови та літературних занять. Хоча наукова частина академії ніколи не зрівнялася з літературною за славою, вона зробила низку важливих наукових відкриттів у вісімнадцятому столітті. Наприклад, саме французькі експедиції 1735 і 1743 років встановили сплюснуту форму Землі."
  flavor_fra.8.a: "Фінансувати створення Французької академії!"
  flavor_fra.8.b: "Ні, це занадто дорого."
  flavor_fra.9.title: "Кольбертизм"
  flavor_fra.9.desc: "Призначений міністром фінансів [fra_ruler.GetName], [target_character.GetName] провів значну роботу з розвитку економіки [ROOT.GetCountry.GetName] у сучасну епоху. Протягом свого нинішнього перебування на посаді міністра фінансів, [target_character.GetLastNameWithNoTooltip] значно покращив збір податків державою та підтримував вражаюче управління державним бюджетом. Крім того, власний бренд меркантилізму [target_character.GetLastNameWithNoTooltip], #italic «Кольбертизм»#!, виявився ефективною торговою практикою.\n\nХоча економічна політика [target_character.GetLastNameWithNoTooltip] виявилася ефективною, його заклики до розширення державного флоту викликали певне занепокоєння, що може вплинути на новостворений надлишок держави, і ті, хто при дворі, запропонували, щоб [target_character.GetLastNameWithNoTooltip] натомість зосередився виключно на економіці держави."
  flavor_fra.9.historical_info: "Призначений міністром фінансів у 1661 році, Жан Кольбер розробив першу національну економіку сучасної епохи. Його державна економіка включала кращий збір податків, статистичне планування бюджету та регулярний бухгалтерський облік. Прихильник власного бренду меркантилізму (названого кольбертизмом), він прагнув до сприятливого французького торговельного балансу через експорт цінних готових продуктів та високі імпортні тарифи. Він заохочував ефективнішу внутрішню торгівлю, створював державні монополії, субсидував мануфактури, сприяв навігації та торговельним асоціаціям, фіксував сільськогосподарські ціни та заохочував шлюби, забороняючи еміграцію (крім Канади). Для підтримки своєї політики він також значно збільшив розмір Королівського французького флоту. Хоча кольбертизм сприяв торгівлі та ремеслам, тим самим збільшуючи процвітання, селяни не були стимульовані до збільшення свого виробництва."
  flavor_fra.9.a: "Сильніший флот ще більше сприятиме політиці [target_character.GetLastNameWithNoTooltip]."
  flavor_fra.9.b: "Зосередитися на економічному домінуванні."
  flavor_fra.10.title: "Замовлення Версаля"
  flavor_fra.10.desc: "Прагнучи продемонструвати [ROOT.GetCountry.GetAdjective] велич на світовій арені, [fra_ruler.GetName] заклав основу для створення грандіозного палацу неперевершеної пишності. Обравши місце старого династичного мисливського будиночка [fra_ruler.GetDynasty.GetName], [fra_ruler.GetShortNameWithNoTooltip] сподівається, що [fra_ruler.GetHerHis] бачення цього грандіозного палацу може стати реальністю, палацу, якому ніхто не зможе зрівнятися."
  flavor_fra.10.historical_info: "У 1669 році Людовик XIV (1638-1715) вирішив перетворити старий мисливський будиночок у Версалі на палац безпрецедентної пишності. Його будівництво було завершено в 1682 році, а двір переїхав туди в 1683 році. Не було жодного королівського чи князівського двору в Європі, який міг би зрівнятися з Версалем за розкішшю його позолочених інтер'єрів, дзеркал та люстр, з відповідною пишністю придворної церемонії, і не було жодного королівського чи князівського двору в Європі, який би, відкрито чи таємно, не прагнув відповідати цьому зразку."
  flavor_fra.10.a: "Нам це потрібно для Слави."
  flavor_fra.10.b: "Такий проєкт був би великим тягарем для держави."
  flavor_fra.11.title: "Палати Возз'єднання"
  flavor_fra.11.desc: "Прагнучи встановити [ROOT.GetCountry.GetAdjective] гегемонію в [ShowContinentNameWithNoTooltip('europe')] та посилити контроль над спірними територіями з [GetUniqueInternationalOrganization('hre').GetName], [fra_ruler.GetName] наказав створити суди #italic Палат Возз'єднання#! в цих спірних областях. Метою цих судів є подальше сприяння територіальним амбіціям [fra_ruler.GetShortNameWithNoTooltip], одночасно зміцнюючи [ROOT.GetCountry.GetAdjectiveWithNoTooltip] правління. Без сумніву, агресивна політика [fra_ruler.GetShortNameWithNoTooltip], ймовірно, викличе гнів наших сусідів, хоча розширення в ці спірні регіони виявиться набагато легшим."
  flavor_fra.11.historical_info: "Прагнучи європейської гегемонії та округлення французьких кордонів на Півночі та Сході (до Рейну), Людовик XIV заснував Палати Возз'єднання – суди, які висували претензії на імперські землі. Ця експансіоністська політика спочатку толерувалася безсилими сусідами Франції, хоча пізніше призвела до формування антифранцузького альянсу, Ліги Аугсбурга, у 1689 році для протидії агресії Людовика XIV."
  flavor_fra.11.a: "Офіційно оформити створення судів!"
  claims_through_chambers_of_union: "Претензії через Палати Возз'єднання"
  flavor_fra.11.b: "Нехай справа затихне."
  did_not_form_chambers_of_union: "Скасувати Палати Возз'єднання"
  did_not_form_chambers_of_union_antagonism: "$did_not_form_chambers_of_union$"
  chamber_of_union_claims: "[ROOT.GetCountry.GetName] отримає претензії на всі сусідні локації, де домінує [GetCountry('FRA').GetAdjective] мова"
  improve_relations_with_neighbors_with_french_provinces: "[ROOT.GetCountry.GetName] отримає підвищену думку з усіма сусідами, які мають локації, де домінує [GetCountry('FRA').GetAdjective] мова"
  flavor_fra.12.title: "Скрутне становище [ShowReligionAdjectiveWithNoTooltip('lutheran')]ів"
  flavor_fra.12.desc: "Хоча [ShowReligionAdjective('lutheran')] населення залишалося досить невеликим порівняно з більшим [ShowReligionAdjective('calvinist')] населенням у [ROOT.GetCountry.GetName], послідовники цієї віри були однією з багатьох релігійних меншин у [ROOT.GetCountry.GetNameWithNoTooltip], які були захищені згідно з [ShowPolicyName('edict_of_nantes')]. Однак, зі скасуванням едикту [fra_ruler.GetName], багато [ShowReligionAdjective('lutheran')]ів приєдналися до своїх гугенотських родичів і втекли з [ROOT.GetCountry.GetName] через страх переслідувань."
  flavor_fra.12.a: "Вони повинні покинути [ROOT.GetCountry.GetNameWithNoTooltip], ми не можемо ризикувати розбратом."
  flavor_fra.12.b: "Проявити милосердя до решти [ShowReligionAdjectiveWithNoTooltip('lutheran')] послідовників."
  flavor_fra.12.historical_info: "Після скасування Нантського едикту Людовиком XIV багато французьких протестантів були піддані примусовому наверненню. Щоб уникнути переслідувань, багато з них втекли до сусідніх країн, щоб уникнути політики Людовика #italic Драгонад#!. Скасування призвело до знищення французьких протестантів."
  flavor_fra.13.title: "Придушення гугенотів"
  flavor_fra.13.desc: "Зі скасуванням [ShowPolicyName('edict_of_nantes')] багато послідовників гугенотів втекли з [ROOT.GetCountry.GetName] разом з іншими релігійними меншинами. Прагнучи забезпечити, щоб [ROOT.GetCountry.GetNameWithNoTooltip] ніколи більше не піддавався релігійним чварам, спричиненим гугенотами, [ROOT.GetCountry.GetGovernment.GetAdjective] видав наказ про розквартирування драгунів у багатьох гугенотських будинках для примусового виконання політики релігійного навернення. Оскільки значна частина попереднього гугенотського населення тепер або втекла з Франції, або навернулася назад до [ShowReligionName('catholic')], малоймовірно, що [ROOT.GetCountry.GetNameWithNoTooltip] знову піддасться релігійним чварам."
  flavor_fra.13.a: "[ROOT.GetCountry.GetNameWithNoTooltip] ніколи більше не страждатиме від релігійних чвар."
  flavor_fra.13.b: "Проявити милосердя до решти гугенотських анклавів у [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.13.historical_info: "Політика Людовика XIV щодо драгонадів, спрямована на примусове навернення після скасування Нантського едикту, призвела до великого вигнання гугенотів та інших французьких релігійних меншин з Франції. Хоча база влади гугенотів була значною мірою розгромлена, наслідки масового виходу частини населення Франції завдали шкоди державі в наступні десятиліття."
  flavor_fra.14.title: "Мережа [target_character.GetNameWithNoTooltip]"
  flavor_fra.14.desc: "Маркіз [ROOT.GetCountry.GetName], [target_character.GetName] вже досить давно служить головним організатором шпигунства під керівництвом [ruler_fra.GetName]. Під керівництвом та ідеями [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_character.GetShortNameWithNoTooltip] організував першу повну та структуровану таємну службу, #italic Le Secret du Roy#!. Спочатку менша мережа, мережа #italic Le Secret du Roy#! розрослася, охопивши більшу частину [ShowContinentNameWithNoTooltip('europe')]. Мережа [target_character.GetShortNameWithNoTooltip], хоча й стратегічна, виявилася такою, що впливає на ресурси держави, щоб забезпечити [target_character.GetShortNameWithNoTooltip] можливість виконувати цілі та інтереси [ruler_fra.GetShortNameWithNoTooltip]."
  flavor_fra.14.historical_info: "Шарль-Франсуа де Брольї був маркізом Франції, який став головним організатором шпигунства короля Людовика XV. Під керівництвом та ідеями короля він організував першу повну та структуровану таємну службу, #italic Le Secret du Roy#!. Мережа Шарля-Франсуа охоплювала більшу частину Європи, і якщо її перша місія у питанні польської спадщини провалилася, його головним досягненням була роль, яку він відіграв під час Американської війни за незалежність, надавши першу та цінну допомогу повстанцям (військові поставки, фінанси, дипломатична підтримка місії Франкліна в Парижі тощо)."
  flavor_fra.14.a: "Ми повинні продовжувати фінансувати #italic Le Secret du Roy#!."
  flavor_fra.14.b: "Мережа може залишитися, але ми повинні перенаправити ресурси в інше місце."
  flavor_fra.15.title: "Піднесення [target_character.GetNameWithNoTooltip]"
  flavor_fra.15.desc: "Син державного податківця, [target_character.GetName] довів свою компетентність як член [ROOT.GetCountry.GetAdjective] уряду. Спочатку наставник [ROOT.GetCountry.GetGovernment.GetHeir.GetName], [target_character.GetShortNameWithNoTooltip] відіграв значну роль в управлінні державою та розробив плани для забезпечення процвітання [ROOT.GetCountry.GetLongNameWithNoTooltip] у майбутньому. Багато членів королівського двору просили, щоб [target_character.GetShortNameWithNoTooltip] був нагороджений за його зусилля на благо держави."
  flavor_fra.15.historical_info: "Народившись у 1653 році сином податківця, Андре-Еркюль де Флері став наставником молодого Людовика XV 23 серпня 1715 року. Між учителем і учнем завжди панувала велика довіра, і в 1726 році, у віці 73 років, Флері став прем'єр-міністром і залишався ним до своєї смерті в 1743 році. Вірний, чесний, де Флері був насамперед прихильником миру і робив усе можливе, щоб його підтримувати. За його урядування Франція пережила найдовший мирний період у своїй історії за останні 3 століття."
  flavor_fra.15.a: "Він має вдячність держави."
  flavor_fra.16.title: "П'ятивідсотковий податок [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.16.desc: "Коли [ShowLawName('fra_taille')] було спочатку запроваджено, воно замінило давню феодальну систему оподаткування, що використовувалася [ROOT.GetCountry.GetLongName]. Однак з часом старі особливі привілеї, надані [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], почали виявлятися неефективними в загальній системі оподаткування держави.\n\n[target_character.GetName], член [ROOT.GetCountry.GetAdjectiveWithNoTooltip] адміністрації, запропонував переглянути [ShowLawNameWithNoTooltip('fra_taille')], включивши #italic п'ятивідсотковий податок#! до загального земельного податку, який буде поширено на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]. Хоча ця пропозиція була б вигідною для державних фінансів, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вже висловили рішучу опозицію."
  flavor_fra.16.historical_info: "Коли Жан-Батист де Машо став генеральним контролером фінансів Франції в грудні 1745 року, він виявив країну на межі банкрутства. Ні дворяни, ні духовенство не сплачували загальний земельний податок, Taille. У 1749 році Машо спробував реформувати систему, запропонувавши замінити старий податок у розмірі однієї десятої, якого багато представників духовенства та дворянства уникали, п'ятивідсотковим податком без винятків. Пропозиція зустріла такі гучні протести, що Машо не зміг її реалізувати."
  flavor_fra.16.a: "Провести це силою!"
  flavor_fra.16.b: "Ми не сміємо їх гнівити."
  unlocks_machault_tax_reforms: "[ROOT.GetCountry.GetName] отримає доступ до законів [ShowLawName('fra_5_percent_tax')], розширення [ShowLawName('fra_taille')]"
  flavor_fra.17.title: "Реформи [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.17.desc: "Економіст і державний діяч [ROOT.GetCountry.GetName], роль [target_character.GetName] зустріла опір з боку старої [ROOT.GetCountry.GetAdjectiveWithNoTooltip] аристократії через його адвокацію економічного лібералізму. Незважаючи на це, [fra_ruler.GetName] залишався стійким союзником [target_character.GetLastNameWithNoTooltip] у державі, що дозволило міністру зберегти свою посаду, незважаючи на неодноразовий опір.\n\nОднак нова, радикальна пропозиція [target_character.GetLastNameWithNoTooltip], яка значно змінить економічні основи [ROOT.GetCountry.GetNameWithNoTooltip], спонукає навіть близьких союзників [fra_ruler.GetShortNameWithNoTooltip] втрутитися та благати [ROOT.GetCountry.GetGovernment.GetRulerTitle] заблокувати реформи. Названі #italic Шістьма Едиктами#!, реформи [target_character.GetLastNameWithNoTooltip] змінять аспекти [ROOT.GetCountry.GetAdjectiveWithNoTooltip] економіки, які, хоча й будуть корисними, можуть спричинити період фінансової нестабільності та загального невдоволення."
  flavor_fra.17.historical_info: "#italic Шість Едиктів#! Тюрго ліквідували систему примусової праці з будівництва доріг, розпустили цехову систему, скасували всілякі тарифи та контроль над зовнішньою торгівлею, а також запровадили єдиний податок на землевласників."
  flavor_fra.17.a: "Дозволити [target_character.GetLastNameWithNoTooltip] запровадити Реформи."
  STATIC_MODIFIER_NAME_turgots_economic_reforms: "Економічні реформи Тюрго"
  STATIC_MODIFIER_DESC_turgots_economic_reforms: "#italic Шість Едиктів#! Тюрго були серією економічних реформ, запроваджених [GetCountry('FRA').GetAdjectiveWithNoTooltip] міністром фінансів Анн Робер Жаком Тюрго в середині XVIII століття. Ці реформи мали на меті модернізувати та оптимізувати [GetCountry('FRA').GetAdjectiveWithNoTooltip] економіку, а також зменшити вплив груп особливих інтересів та привілейованих класів."
  flavor_fra.17.b: "Заблокувати Реформи!"
  flavor_fra.18.title: "[target_character.GetLastNameWithNoTooltip] та Державний Бюджет"
  flavor_fra.18.desc: "Прослуживши міністром фінансів [fra_ruler.GetName] вже деякий час, термін перебування [target_character.GetName] на посаді був трансформаційним. Хоча спроби [target_character.GetLastNameWithNoTooltip] реформувати фінанси держави мали певний успіх, одне з [target_character.GetHisHer] останніх рішень викликало гнів [fra_ruler.GetShortNameWithNoTooltip] та інших членів королівського двору. У кроці до продовження [target_character.GetHisHer] кампанії реформ, [target_character.GetLastNameWithNoTooltip] оприлюднив інформацію щодо державних фінансів, розкривши деякі тривожні дефіцити.\n\n[target_character.GetLastNameWithNoTooltip] повідомив двору, що [target_character.GetHisHer] метою оприлюднення цієї інформації було надати державі можливість сприяти процесу реформ для досягнення профіциту. Однак досі фінанси держави залишалися таємницею лише для двору. Багато хто при дворі закликав до негайного звільнення [target_character.GetHisHer], заявляючи, що розкриття цієї інформації лише зменшило глобальне становище [ROOT.GetCountry.GetName]."
  flavor_fra.18.a: "Зняти [target_character.GetShortNameWithNoTooltip] з посади."
  flavor_fra.18.b: "Заохочувати його чудову роботу."
  STATIC_MODIFIER_NAME_necker_reforms: "Реформи Неккера"
  STATIC_MODIFIER_DESC_necker_reforms: "Реформи Неккера — це серія економічних та фінансових реформ, запроваджених швейцарським банкіром та міністром фінансів Жаком Неккером."
  necker_resigns: "[target_character.GetName] буде змушений піти у відставку та відійти від громадського життя."
  flavor_fra.18.historical_info: "Жак Неккер був міністром фінансів, а згодом головним міністром Людовика XVI. Неккер здобув визнання за публікацію #italic Compte Rendu#! у 1781 році, що стало першим випадком оприлюднення французького національного бюджету. Його оприлюднення бюджету призвело до його звільнення через кілька місяців, перш ніж Людовик XVI знову покликав його у 1789 році на посаду головного міністра."
  flavor_fra.19.title: "Еденська угода"
  flavor_fra.19.desc: "Переговорники на прохання [target_character.GetName] з [GetCountry('ENG').GetName] прибули до [ROOT.GetCountry.GetAdjective] двору в надії підписати новий комерційний договір. Хоча відносини між [GetCountry('ENG').GetNameWithNoTooltip] та [ROOT.GetCountry.GetNameWithNoTooltip] завжди залишалися напруженими, [target_character.GetShortNameWithNoTooltip] запропонував шлях до примирення зв'язків між двома державами з пропозицією #italic Еденського договору#!.\n\nЯкщо двір погодиться, [GetCountry('ENG').GetNameWithNoTooltip] та [ROOT.GetCountry.GetNameWithNoTooltip] вступлять у тісніші комерційні відносини, що призведе до поглиблення торговельних зв'язків. Однак члени двору висловили скептицизм, оскільки договір може бути хитрощами, щоб зробити [GetCountry('ENG').GetAdjectiveWithNoTooltip] торговий вплив більш домінуючим."
  flavor_fra.19.historical_info: "У 1786 році Вільям Еден підписав важливу комерційну угоду, Еденський договір, з Францією. Це відповідало аргументу економіста Адама Сміта в його праці #italic «Багатство народів»#! (1776), що Англія повинна бути менш економічно залежною від торгівлі з Америкою та стати більш авантюрною у дослідженні торговельних можливостей у континентальній Європі."
  flavor_fra.19.a: "Погодитися на договір."
  the_eden_agreement: "Еденська угода"
  flavor_fra.19.b: "Відмовитися від цього одностороннього договору!"
  refusal_of_the_eden_agreement: "Відмова від Еденської угоди"
  flavor_fra.20.title: "[target_artist.GetLastNameWithNoTooltip] публікує #italic «Суспільний договір»#!"
  flavor_fra.20.desc: "По [ShowLocationName('paris')] шириться звістка про нову книгу, опубліковану [target_artist.GetName], яка приваблює як маси, так і членів політичної еліти. Книга [target_artist.GetLastNameWithNoTooltip], названа #italic «Суспільний договір»#!, запропонувала нову перспективу, атакуючи концепцію правління більшості, а також окреслюючи цілі, до яких має прагнути #italic уряд#!."
  flavor_fra.20.a: "Це може перевернути суспільний лад..."
  flavor_fra.21.title: "[target_artist.GetLastNameWithNoTooltip] публікує #italic «Філософські листи»#!"
  flavor_fra.21.desc: "Спочатку тимчасово висланий до [GetCountry('ENG').GetName] за попередню критику [ROOT.GetCountry.GetAdjective] уряду, суперечливий письменник [target_artist.GetName] нещодавно опублікував збірку філософських листів у [ShowLocationName('paris')] про свій час у [GetCountry('ENG').GetNameWithNoTooltip]. Хоча спочатку вважалося, що це розповідь про його життя під час вигнання, члени двору звернули увагу на його порівняння [GetCountry('ENG').GetAdjectiveWithNoTooltip] уряду з урядом [ROOT.GetCountry.GetNameWithNoTooltip], порівняння, які значною мірою є докором.\n\nОскільки робота [target_artist.GetLastNameWithNoTooltip] ще досить нова, двір може швидко її придушити. Однак її існування вже завдало шкоди репутації уряду."
  flavor_fra.21.desc_GBR: "Спочатку тимчасово висланий до [GetCountry('GBR').GetName] за попередню критику [ROOT.GetCountry.GetAdjective] уряду, суперечливий письменник [target_artist.GetName] нещодавно опублікував збірку філософських листів у [ShowLocationName('paris')] про свій час у [GetCountry('GBR').GetNameWithNoTooltip]. Хоча спочатку вважалося, що це розповідь про його життя під час вигнання, члени двору звернули увагу на його порівняння [GetCountry('GBR').GetAdjectiveWithNoTooltip] уряду з урядом [ROOT.GetCountry.GetNameWithNoTooltip], порівняння, які значною мірою є докором.\n\nОскільки робота [target_artist.GetLastNameWithNoTooltip] ще досить нова, двір може швидко її придушити. Однак її існування вже завдало шкоди репутації уряду."
  flavor_fra.21.a: "Ми повинні негайно це придушити!"
  flavor_fra.22.title: "[target_artist.GetLastNameWithNoTooltip] публікує #italic «Про дух законів»#!"
  flavor_fra.22.desc: "Нещодавнє видання філософської книги [target_artist.GetName] привернуло увагу членів королівського двору різними ідеями, викладеними в її змісті. Хоча деякі ідеї в книзі [target_artist.GetLastNameWithNoTooltip] #italic «Про дух законів»#! отримали засудження [ShowReligionAdjective('catholic')] Церквою, помітна атака на божественне право на правління викликала гнів у всьому дворі, розглядаючи її як напад на абсолютистське правління [fra_ruler.GetName].\n\nХоча [ShowReligionAdjectiveWithNoTooltip('catholic')] Церква вже вжила заходів для заборони публікації, ідеї, викладені в книзі, вже стають широко поширеними."
  flavor_fra.22.a: "Будемо сподіватися, що ці ідеали не приживуться."
  flavor_fra.23.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.23.desc: "Видатний математик, вчений і філософ сучасності, [target_character.GetName] здобув визнання по всій Європі за свої різноманітні новаторські праці та філософські есе. Спочатку здобувши визнання за свою опозицію до схоластичного аристотелізму, [target_character.GetLastNameWithNoTooltip] привернув багато великих умів до [ROOT.GetCountry.GetName], а також привернув увагу двору, причому деякі припускають, що [target_character.GetLastNameWithNoTooltip] слід спонсорувати та вітати при дворі як почесного гостя."
  flavor_fra.23.historical_info: "Французького математика, вченого та філософа Рене Декарта називають батьком сучасної філософії, оскільки він був одним із перших, хто виступив проти схоластичного аристотелізму. Декарт почав з методичного сумніву в знаннях, заснованих на авторитеті чуттів над розумом, потім знайшов впевненість в інтуїції, що коли він мислить, він існує – це він висловив у відомому твердженні «Я мислю, отже, я існую». Декарт розробив дуалістичну систему, в якій він радикально розрізняв розум, сутність якого є мислення, і матерію, сутність якої є розширення в трьох вимірах."
  flavor_fra.23.a: "Ми повинні спонсорувати його геніальні інновації!"
  flavor_fra.24.title: "[target_character.GetNameWithNoTooltip] та індіанці [ShowLanguageNameWithNoTooltip('wendat_language')]"
  flavor_fra.24.desc: "[target_character.GetName] був відправлений [ROOT.GetCountry.GetAdjective] дворянином, якому [fra_ruler.GetName] надав привілей заснувати хутрову торговельну компанію. Під час своїх подорожей [target_character.GetShortNameWithNoTooltip] встановив контакт і подружився з індіанцями [ShowLanguageName('wendat_language')]. Час, проведений з індіанцями [ShowLanguageNameWithNoTooltip('wendat_language')] у дослідженні території, створив потенціал для [ROOT.GetCountry.GetNameWithNoTooltip] для формування дружніх відносин на цих землях, хоча сусідні [ShowCultureGroupName('haudenosaunee_group')] можуть виявитися більш плідними союзниками."
  flavor_fra.24.a: "Нехай ми подружимося з [ShowLanguageNameWithNoTooltip('wendat_language')]."
  flavor_fra.24.b: "Нехай ми подружимося з [ShowCultureGroupNameWithNoTooltip('haudenosaunee_group')]."
  samuel_de_champlain: "Подружився Самуель де Шамплен"
  flavor_fra.25.title: "Сліпуче Проявлення Могутності"
  flavor_fra.25.desc_common: "розробив досить дорогу, але ефективну пропозицію, яка дозволить продемонструвати багатство та могутність [ROOT.GetCountry.GetName], одночасно покращивши відносини з [target_root_country.GetNameWithNoTooltip].\n\nЗустріч двох правителів відбудеться в [summit_location.GetName], поблизу [target_root_country.GetAdjectiveWithNoTooltip] кордону, з ретельними приготуваннями для їхнього розміщення.\n\nНамети, виткані золотими нитками, та зведення тимчасового палацу – ось деякі з ідей, що розглядаються."
  flavor_fra.25.desc: "Довірений радник [target_root_country.GetAdjective] [target_root_country.GetGovernment.GetRuler.GetName] $flavor_fra.25.desc_common$"
  flavor_fra.25.desc_wolsey: "Хитрий та підступний [thomas_wolsey.GetName] $flavor_fra.25.desc_common$"
  flavor_fra.25.a: "Ми згодні."
  flavor_fra.25.tt1: "Саміт \"Поле золотої парчі\" буде організовано незабаром, за великі кошти"
  flavor_fra.25.tt2: "Коштовна та могутня демонстрація покращить відносини та сприятиме міжнародному становищу [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_fra.25.b: "Мало що можна отримати."
  flavor_fra.25.tt3: "Саміт буде відхилено"
  flavor_fra.26.title: "Кінець Столітньої війни"
  flavor_fra.26.desc: "Ми нарешті ліквідували присутність [GetCountry('ENG').GetName] у [ShowRegionName('france_region')]. Нарешті наші кордони в безпеці від англійської загрози!"
  flavor_fra.26.historical_info: "Людовик XI отримав вигоду від результатів Столітньої війни. Фактичне знищення феодальної знаті дозволило йому міцніше об'єднати Францію під королівською владою та сприяти і укладати союзи з середнім класом."
  flavor_fra.26.a: "Час будувати сильнішу націю"
  flavor_fra.1001.t: "Перерозподіл земель тамплієрів"
  flavor_fra.1001.desc: "Виснажена витратами на війну та національне зростання, [GetCountry('FRA').GetName] успішно проводить політику ліквідації боргів шляхом ліквідації кредиторів. З 1306 року поступове розформування лицарів-тамплієрів шляхом переслідувань та маніпуляцій нашими активами в [ShowLocationName('avignon')] виявилося надзвичайно ефективним. Однак, у децентралізованому хаосі нашої операції, деякі місцеві дворяни перерозподіляли землі тамплієрів, які ми раніше домовилися з [ShowLocationNameWithNoTooltip('avignon')] здати в оренду [GetCountry('KNI').GetName]. Звісно, земля, безсумнівно, буде прибутковішою в підприємливих руках наших молодих дворян, але дозвіл на це розгніває духовенство."
  flavor_fra.1001.a: "Надати землі [GetCountry('KNI').GetNameWithNoTooltip]."
  flavor_fra.1001.b: "Дозволити дворянам залишити землі."
  flavor_fra.1001.c: "Земля належить виключно державі."
  flavor_fra.1002.t: "Зрадник-фальсифікатор"
  flavor_fra.1002.desc: "З часів його підробок в Артуа, [robert_d_artois.GetName] був розшукуваним втікачем [GetCountry('FRA').GetName]. Його спільника — фальсифікатора — спалили на вогнищі, але йому вдалося втекти на території, що належать нашим сусідам за морем. Як дворянина, ми намагалися зберегти йому життя, але його дії зробили його загрозою, яку ми більше не можемо ігнорувати. Якщо його залишити живим, він може поширювати зловмисні чутки, розголошувати таємниці та викривати роботу нашого двору. [GetCountry('ENG').GetName] не буде надто задоволений тим, що ми вбиваємо їхнього гостя, але це може бути ціна, яку варто заплатити за безпеку, знаючи, що мертва людина не тримає образ."
  flavor_fra.1002.historical_info: "Роберт III Артуа був французьким дворянином і членом династії Капетингів. Спочатку він мав титул графа Артуа, але пізніше був вигнаний після того, як його спадкові документи виявилися підробкою. Він втік до Бретані, шукаючи захисту англійців, зрештою ставши радником Едуарда III і відігравши ключову роль у розв'язанні Столітньої війни."
  flavor_fra.1002.a: "Видати наказ про його вбивство."
  flavor_fra.1002.b: "Дозволити зраднику втекти."
  flavor_fra.1002.desc.eng.a: "Цікаві новини: [GetCountry('FRA').GetAdjectiveWithNoTooltip] шляхтич втік до наших земель, шукаючи притулку від люті свого колишнього короля. Мстивий, він готовий поділитися з нами великою кількістю інформації про події при цьому іноземному дворі за морем..."
  flavor_fra.1002.desc.eng.b: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] зухвало вбили когось на нашій території без нашої згоди. Жертвою міг бути [GetCountry('FRA').GetAdjectiveWithNoTooltip], міг бути зрадник і ворог короля, але це не дає їм права робити, що заманеться, на наших землях!\n\nЯкби цей шляхтич вижив, він міг би стати найціннішим джерелом інформації про події при [GetCountry('FRA').GetAdjectiveWithNoTooltip] дворі."
  flavor_fra.1002.eng.a: "Він міг би бути корисним..."
  flavor_fra.1002.eng.b: "Його знання стануть у пригоді..."
  flavor_fra.1008.t: "Святий Гінефорт, Святий Хорт"
  flavor_fra.1008.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] стурбовані зростанням популярності так званого «Святого» Гінефорта, оскільки вшанування тварин як християнських святих вважається шкідливим і забобонним. Вони давно намагаються придушити культ фальшивого святого, і державне втручання могло б полегшити цю проблему..."
  flavor_fra.1008.a: "Посилити придушення Церквою."
  flavor_fra.1008.b: "Наказати знести святилище."
  flavor_fra.1008.c: "Канонізувати собаку."
  flavor_fra.1008.historical_info: "Гінефорт був хортом лицаря, що жив поблизу Ліона; вірний супутник мав наглядати за дитячою кімнатою, поки господар був на полюванні. Повернувшись, він був вражений горем: дитяча кімната була спустошена, дитини не було, а Гінефорт був заплямований чужою кров'ю.\n\nУ нападі люті через втрату сина лицар убив собаку, лише потім знайшовши свою дитину цілою серед уламків. Біля дитини була гадюка, яку собака спіймав, захищаючи немовля. Кров на собаці належала цій рептилії. Усвідомивши свою поспішну помилку, лицар у покаянні наказав побудувати святилище для собаки на дні колодязя. Донині жителі Ліона відвідують святилище, щоб молитися за благополуччя своїх хворих дітей."
  flavor_fra.1009.t.n: "Дике шаріварі проти шляхтича"
  flavor_fra.1009.t.c: "Дике шаріварі проти священнослужителя"
  flavor_fra.1009.t.b: "Дике шаріварі проти міщанина"
  flavor_fra.1009.t.p: "Дике шаріварі"
  flavor_fra.1009.desc: "Сільські жителі зібралися навколо будинку знатної особи. Вони мають намір витягти цю особу і присоромити її за повторний шлюб як вдови до закінчення періоду жалоби. У них є горщики та сковорідки, щоб шуміти; вила та каміння, щоб погрожувати та примушувати. Ця особа заслуговує нагадування про те, щоб не порушувати місцеві звичаї, але селяни можуть зайти занадто далеко, що може засмутити стан, до якого вона належить..."
  flavor_fra.1009.desc.f: "Сільським жителям набридло, що знатна особа занадто багато п'є вдень, і тепер люди планують влаштувати шаріварі, щоб змусити її виправитися. Це може виявитися ефективним методом виправлення помилкового шляху, але деякі не можуть витримати ганьби шаріварі і вчиняють дії, які не можуть скасувати. Члени стану цієї особи хвилюються і просять скасувати шаріварі шляхом державного втручання. Але чи розумно втручатися у волю народу?"
  flavor_fra.1009.historical_info: "«Шаріварі» — це традиційний народний звичай, особливо поширений у Франції, що є формою соціального осуду через соціальне приниження для тих, хто порушив соціальні норми чи звичаї. Учасники зазвичай марширують навколо будинку обвинуваченого, створюючи гучний шум. У деяких випадках вони можуть схопити обвинуваченого і провести його по селу на показ ганьби. Хоча це не є поширеним явищем, відомі випадки, коли обвинуваченого вбивали в запалі пристрасті, зазвичай, коли він намагався захиститися."
  flavor_fra.1009.a: "Ця дикість не буде терпітися!"
  flavor_fra.1009.b: "Це має виправити їхні лихі шляхи!"
  flavor_fra.1015.t: "Жакерія"
  flavor_fra.1015.desc: "Відносини між [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] досягли критичної точки, і тепер селянство почало безладно повставати по всьому [ROOT.GetCountry.GetName]. Ці натовпи, озброєні косами та вилами, не мають генерала, а лише гнів. Їхні цілі прості: вони бажають лише перевернути соціальний лад і знищити всі живі символи свого пригнічення.\n\nЯкщо наша велика нація має вижити, ми повинні придушити це повстання і подати історичний приклад того, що трапляється з тими, хто виходить за межі свого становища."
  flavor_fra.1015.historical_info: "Жакерія — селянське повстання 1358 року, назване на честь «Жака Бонхома» (Простак/Чесний Жак), зневажливого терміна, який використовувала знать для опису селян. Повстання було жорстоким і широкомасштабним, будучи кульмінацією надзвичайної експлуатації селянства. Таким чином, навіть малоймовірні союзники, такі як Королівство Наварра, з'явилися, щоб переконатися, що воно не матиме успіху, оскільки воно мало потенціал зруйнувати вкорінену феодальну систему та призвести до занепаду королівської та дворянської влади."
  flavor_fra.1015.a: "Закликати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]!"
  flavor_fra.1015.b: "Нам не потрібна допомога."
  jacquerie_revolt: "Жакерія"
  jacquerie_revolt_warning: "Приблизно #Y [ROOT.GetVariable('jacquerie_revolt_total_num_pop_variable').GetValue|V0] тис.#! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] з [ROOT.GetVariable('jacquerie_revolt_total_num_provinces_variable').GetValue] [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] приєднаються до [jacquerie_revolt.GetName]\n"
  based_on_our_crown_power_tt: "Виходячи з нашої [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e]:"
  flavor_fra.1016.t: "Ордонанс Нормандії"
  flavor_fra.1016.desc: "Хоча він і бере свій початок у давніші часи, лише нещодавно ми завершили Ордонанс Нормандії. Цей документ, що має силу революціонізувати нашу юриспруденцію, може бути використаний для забезпечення більшого рівня централізації, що раніше було неможливим. Шляхта буде незадоволена нашим відходом від феодального до королівського права, але це цілком може бути ціна, яку варто заплатити..."
  flavor_fra.1016.historical_info: "#italic Кутюм Нормандії#! (Ордонанс Нормандії) — це низка правових кодексів, остаточно сформованих близько XIV століття, які безпосередньо сприяли подальшому розвитку французького загального права. Від кодифікації місцевих звичаїв, переходу від феодального до королівського права, запровадження прецедентного права та положень про спадкування, цей документ був нічим іншим, як революційним. Однак його справжня цінність полягала в тому, що він ознаменував початок історичного переходу від ситуативних рішень до писаного та систематичного права."
  flavor_fra.1016.a: "Ордонанс буде впроваджено!"
  flavor_fra.1016.b: "Роздратовувати шляхту було б нерозумно..."
  flavor_fra.1017.t: "Габель"
  flavor_fra.1017.desc: "Наші доходи постійно зменшуються, наші армії незабаром стануть недоукомплектованими, наші міста — збіднілими, а наша скарбниця — порожньою.\n\nНастав час розглянути альтернативні джерела оподаткування, незалежно від того, наскільки непопулярними вони можуть бути. Сіль, як і вода, є невід'ємним елементом життя; можливо, ми могли б запровадити низку податків на цей життєво важливий ресурс, щоб відновити наші податкові надходження?"
  flavor_fra.1017.historical_info: "Економічне напруження Столітньої війни призвело до того, що Франція гостро потребувала коштів для утримання своїх армій та кампаній. Тому Франція вдалася до оподаткування солі, основного товару в середньовічній Європі, що використовувався для консервації їжі, серед багатьох інших застосувань, що зробило її привабливою мішенню для оподаткування. Незважаючи на свою широку непопулярність, габель стала опорою державних доходів."
  flavor_fra.1017.a: "Сіль буде оподатковано!"
  flavor_fra.1017.b: "Ми не можемо дозволити собі селянське повстання зараз!"
  flavor_fra.1020.t: "Римські правознавці"
  flavor_fra.1020.desc: "З моменту падіння колись великої Римської імперії, її системи права та порядку занепадали по всій Європі. Це вважалося неминучим, доки триста років тому не було знову відкрито Кодекс Юстиніана. З того часу римське право повільно проникало в дослідження наших університетів. Це призвело до великих кроків у нашому правовому устрої, таких як Великий Ордонанс та Установи Святого Людовика. Але ми завжди можемо просунути справи далі. Наказ про подальше копіювання римського права нашою правовою системою відібрав би владу у феодальних лордів і централізував би її до держави."
  flavor_fra.1020.historical_info: "Ордонанс 1254 року та «Установи Святого Людовика» (1273) були двома правовими кодексами, які вже зазнали значного впливу римського права, що підкреслює центральну владу, що призвело до того, що їх кодифікація надала додаткову владу короні та поступово централізувала французьке право та управління. Однак опір феодальних лордів, які справедливо бачили в цьому загрозу, поряд з тим, наскільки складним було римське право порівняно з більш ситуативними системами того часу, призвів до того, що його впровадження було повільним і поступовим, що тривало до раннього Нового часу."
  flavor_fra.1020.a: "Обрати більш поступовий підхід"
  flavor_fra.1020.b: "Наполягати на подальшому впровадженні"
  flavor_fra.1023.title: "Карбування франка"
  flavor_fra.1023.desc: "Недавні світові події призвели до фінансового напруження скарбниці [GetCountry('FRA').GetName]. [SCOPE.sCharacter('minister').GetName] з кабінету висунув ідею карбування нових монет для боротьби з цими фінансовими труднощами, назвавши їх «франком». Хоча карбування запропонованих монет франка допомогло б стабілізувати [GetCountry('FRA').GetAdjectiveWithNoTooltip] економіку та допомогти нам у поточних справах, воно також несе ризик зростання інфляції в далекому майбутньому."
  flavor_fra.1023.a: "Дозволити карбування франка."
  flavor_fra.1023.b: "Ми повинні експлуатувати цю нову монету!"
  flavor_fra.1023.c: "Ризики занадто великі"
  flavor_fra.1023.historical_info: "У пізнішій частині XIV століття Франція зазнала фінансових труднощів через конфлікти з Королівством Англія під час Столітньої війни. У битві при Пуатьє Жан II був захоплений у полон Чорним Принцом. Після низки переговорів Жан II разом з іншими полоненими був викуплений в обмін на фінансову компенсацію. Після свого повернення Жан II видав Ордонанс про створення золотої монети «франк» для сплати викупів, що тривало з 1360 по 1380 рік. Франк був перевипущений у пізніші століття і став національною валютою Франції в 1795 році."
  flavor_fra.1100.title: "Принци крові"
  flavor_fra.1100.desc: "Серед назріваючого конфлікту з [GetCountry('ENG').GetName] члени королівського двору заохочували [ROOT.GetCountry.GetGovernment.GetRuler.GetName] умиротворити різноманітних удільних князів по всій [GetCountry('FRA').GetName]. Хоча багато хто підтримував [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] як правлячу династію після згасання старшої Капетинзької династії у 1328 році, чутки про те, що [GetCountry('ENG').GetGovernment.GetRuler.GetName] прагне претендувати на трон через [GetCharacter('eng_isabella_of_france').GetName], можуть посіяти невдоволення та дискредитувати легітимність [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip]. Однак будь-які спроби нелояльності можуть дозволити нам конфіскувати землі будь-яких бунтівних уділів та реінтегрувати їх до королівського домену."
  flavor_fra.1100.a: "Підтримувати статус-кво."
  flavor_fra.1100.b: "Обдарувати їх щедрими дарами!"
  flavor_fra.1100.c: "Їх треба приборкати."
  flavor_fra.1100.historical_info: "З часів правління Капетинзьких королів Франція дотримувалася обережної політики щодо успадкування королівства. Щоб запобігти поділу королівства між синами померлого правителя, звичай подільного успадкування було скасовано на користь старшого сина, який успадковував увесь королівський домен. Однак майбутні королі дарували своїм молодшим братам особливі феоди, призначаючи їх уділом. Хоча діти цих уділів успадковували свої титули, у випадку згасання роду титули поверталися до королівського домену."
  flavor_fra.1101.title: "[SCOPE.sCharacter('target_son_for_appanage').GetShortNameWithNoTooltip] просить феод"
  flavor_fra.1101.desc: "[SCOPE.sCharacter('target_son_for_appanage').GetName] попросив, щоб йому було надано феод для правління на власний розсуд як новий уділ. [ROOT.GetCountry.GetGovernment.GetHeir.GetName] наразі має успадкувати всі титули в королівському домені після смерті [ROOT.GetCountry.GetGovernment.GetRuler.GetName], що може призвести до того, що [SCOPE.sCharacter('target_son_for_appanage').GetShortNameWithNoTooltip] стане претендентом. Однак, якщо ми надамо [SCOPE.sCharacter('target_son_for_appanage').GetShortNameWithNoTooltip] його власні землі для правління, він може стати потенційним союзником, коли [ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] прийде до влади. Проте поділ земель у королівському домені для нового уділу також ризикує ще більше децентралізувати державу."
  flavor_fra.1101.a: "Йому буде надано герцогство."
  flavor_fra.1101.b: "[SCOPE.sCharacter('target_son_for_appanage').GetShortNameWithNoTooltip] правитиме невеликим графством по-справжньому."
  flavor_fra.1101.c: "Відмовити йому в будь-яких титулах."
  flavor_fra.1102.title: "Інтеграція [target.GetName]"
  flavor_fra.1102.desc: "З поточною інтеграцією [target.GetName] багато лордів інших уділів, що залишилися, висловили велике невдоволення, оскільки вони відчувають, що королівство намагається позбавити їх шляхетних прав як Принців Крові. Подальша конфіскація удільних земель може змусити уділи, що залишилися, взятися за нелояльні справи, хоча це також сприяє централізації [GetCountry('FRA').GetName]."
  flavor_fra.1102.a: "Ми повинні проявити обережність."
  flavor_fra.1102.b: "[GetCountry('FRA').GetNameWithNoTooltip] має бути централізована!"
  flavor_fra.1103.title: "Консолідація Удільних Земель"
  flavor_fra.1103.desc: "Після століть фрагментації корона нарешті повернула багато з неіснуючих удільних земель, знову інтегрувавши їх до королівського домену. Хоча різноманітні кадетські гілки Капетинзького дому виявилися здібними підданими, вони також унеможливили будь-які спроби централізації. З цими землями, що тепер консолідовані, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] та його двір можуть зробити кроки до реформування [GetCountry('FRA').GetName] у більш сучасну державу."
  flavor_fra.1103.a: "Важливий крок до модернізації [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.1110.title: "Генеральні штати припиняють підтримку"
  flavor_fra.1110.desc: "Хоча Генеральні штати спочатку підтримували війну з [GetCountry('ENG').GetName], значна залученість [GetCountry('FRA').GetName] у війну посіяла розбрат по всій Генеральних штатах. Втомлені від війни Генеральні штати видали прокламацію, що скасовує будь-яку підтримку конфлікту, і відмовляться від запитів [ROOT.GetCountry.GetGovernment.GetRuler.GetName] на стягнення нових податків або військ."
  flavor_fra.1110.a: "Прокляття!"
  flavor_fra.1110.historical_info: "Після поразки [GetCountry('FRA').GetAdjectiveWithNoTooltip] армії в битві при Кресі Генеральні штати, виснажені невдачами короля Філіпа у Столітній війні, припинили подальше стягнення нових податків на війну. Король Філіп сподівався побудувати новий флот для контратаки та вторгнення в Англію."
  flavor_fra.1120.title: "Податок на вогнище (Фуаж)"
  flavor_fra.1120.desc: "Протягом [scope_ruler.GetHisHer] правління [scope_ruler.GetName] вів досить розкішний спосіб життя у [scope_ruler.GetHisHer] якості [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Від дорогих подорожей по різних маєтках у [GetCountry('FRA').GetName] до утримання [ROOT.GetCountry.GetGovernment.GetAdjective] палацу в [ROOT.GetCountry.GetCapital.GetName], [ROOT.GetCountry.GetGovernment.GetAdjective] скарбниця була значно виснажена. Щоб протидіяти розкішному способу життя [scope_ruler.GetShortNameWithNoTooltip], члени кабінету висунули ідею стягнення #italic Податку на вогнище (Фуаж)#! як нового податку на домогосподарства по всій [GetCountry('FRA').GetNameWithNoTooltip]. Хоча цей запропонований податок буде значною ціною для [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], він дозволить [ROOT.GetCountry.GetGovernment.GetAdjective] скарбниці відновити свої кошти, а також дозволить [scope_ruler.GetShortNameWithNoTooltip] підтримувати [scope_ruler.GetHisHer] розкішний спосіб життя."
  flavor_fra.1120.a: "Стягнути його для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
  flavor_fra.1120.b: "Призупинити впровадження збору наразі."
  flavor_fra.1120.c: "Держава не покриватиме розкоші [scope_ruler.GetShortNameWithNoTooltip]."
  flavor_fra.1120.historical_info: "Спочатку запроваджений за правління короля Філіпа III для покриття королівських витрат, а також фінансових наслідків Чорної Смерті та Столітньої війни, податок на вогнище (фуаж) став одним із помітних податків, що стягувалися для підтримки королівської скарбниці монархів Франції. Хоча в деяких [GetCountry('FRA').GetAdjectiveWithNoTooltip] регіонах цей податок був запроваджений, згодом він поширився по всій Франції наприкінці XIV століття."
  flavor_fra.1121.title: "Чутки про повстання тушенів"
  flavor_fra.1121.desc: "Надійшли звістки, що спроби місцевої адміністрації [ShowLocationName('le_puy')] запровадити новий податок на населення зустріли запеклий опір, місцеві ремісники засуджують податок як надто суворий, і багато хто тепер береться за зброю. Що ще гірше, мешканці сусідніх міст приєдналися до справи повстанців і планують взятися за зброю проти адміністраторів [ShowLocationNameWithNoTooltip('le_puy')] та держави."
  flavor_fra.1121.a: "З учасниками повстання доведеться розібратися!"
  flavor_fra.1121.b: "Надати їм автономію."
  le_puy_may_revolt: "Безлад у [ShowLocationName('le_puy')] може перерости у повномасштабне повстання!"
  flavor_fra.1123.title: "Останні обряди [GetCountry('FRA').GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip]"
  flavor_fra.1123.desc: "На смертному ложі [GetCountry('FRA').GetGovernment.GetPreviousRuler.GetName] просив скасувати [ShowLawName('fra_fouage_tax')] зі страху перед вічним прокляттям. Хоча бажання короля зробили б його пам'ятним серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], це також залишалося б досить складним завданням для виконання. З моменту свого першого запровадження [ShowLawNameWithNoTooltip('fra_fouage_tax')] слугував ефективним засобом наповнення королівської скарбниці, водночас дедалі більше вкорінюючись у [GetCountry('FRA').GetAdjectiveWithNoTooltip] фінансових справах. Скасування [ShowLawNameWithNoTooltip('fra_fouage_tax')] фактично зруйнувало б бюрократію, що тепер навколо нього вибудувалася, і мало б тривалі наслідки на найближче майбутнє. Щоб виконати останні обряди короля, було запропоновано натомість запровадити тимчасову паузу у зборі, виявивши повагу до останніх бажань короля, але дозволяючи державі продовжувати збір фуажу, коли це буде визнано необхідним."
  flavor_fra.1123.a: "Останній ордонанс [GetCountry('FRA').GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip] не може бути ефективно виконаний."
  flavor_fra.1123.b: "Запровадити тимчасову паузу щодо фуажу."
  flavor_fra.1123.c: "Скасувати податок будь-якими необхідними засобами!"
  flavor_fra.1123.historical_info: "На смертному ложі Карл (1380) наказав скасувати податок на вогнище разом з іншими податками, запровадженими під час Столітньої війни за його правління. Однак держава, що дедалі більше покладалася на податок на вогнище, відновила б його в місяці після смерті Карла, що призвело б до кількох нових податкових повстань по всій Франції."
  flavor_fra.1122.title: "Повстання Хареля та Майотина"
  flavor_fra.1122.desc: "Хоча початкове скасування [ShowLawName('fra_fouage_tax')] за наказом [GetCountry('FRA').GetGovernment.GetPreviousRuler.GetName] було зустрінуте схваленням багатьох членів [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] через фінансовий тягар, який він накладав, подальше повторне запровадження державою призвело до того, що початкове полегшення перетворилося на гнів. У місті [ShowLocationName('rouen')] цей гнів досяг точки кипіння, де члени місцевих гільдій планують організувати повстання проти держави. Крім того, у [ShowLocationName('paris')] опір поверненню [ShowLawNameWithNoTooltip('fra_fouage_tax')] призвів до того, що багато хто озброївся молотами, що загрожує розгортанням ще одного повстання."
  flavor_fra.1122.a: "Ми їх розчавимо!"
  flavor_fra.1130.title: "Піднесення [SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip]"
  flavor_fra.1130.desc: "Походячи з заможної родини [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], [SCOPE.sCharacter('etienne_marcel').GetName] здобув собі значне ім'я в останні роки по всьому [ShowLocationName('paris')], ставши досить впливовою фігурою в торговельній політиці міста. Саме завдяки цьому впливу Марсель зрештою отримав титул проректора, представляючи інтереси різних купців [ShowLocationNameWithNoTooltip('paris')]. Хоча минуло чимало часу з того часу, як він обійняв посаду проректора, лідери Генеральних штатів визнали його впливовою фігурою і обрали його делегатом для представлення інтересів Третього стану. Було б не дивно, якби вплив Марселя продовжував зростати з його новою посадою."
  flavor_fra.1130.a: "Він лише ще один делегат від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_fra.1130.b: "Вітати його в Генеральних штатах."
  flavor_fra.1131.title: "Великий Ордонанс"
  flavor_fra.1131.desc: "Недавні конфлікти з [GetCountry('ENG').GetName] сильно напружили фінанси корони, змусивши [ROOT.GetCountry.GetGovernment.GetRuler.GetName] звернутися до Генеральних штатів за оновленою підтримкою у зборі коштів та військ для корони. Однак останні десятиліття посіяли невдоволення по всій Генеральних штатах, особливо серед Третього стану, де підтримка війни зустрічалася зі скептицизмом щодо зміни фінансової політики з початку конфлікту з [GetCountry('ENG').GetNameWithNoTooltip]. Одним із зростаючих лідерів цієї опозиції є впливовий [SCOPE.sCharacter('etienne_marcel').GetName], який здобув велику підтримку для контрпропозиції щодо збору нового фінансування від Генеральних штатів. У своєму «Великому Ордонансі» [SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip] вимагає, щоб корона погодилася обмежити свою владу, прокладаючи шлях для реформ, очолюваних [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]."
  flavor_fra.1131.a: "Така пропозиція абсурдна!"
  flavor_fra.1131.b: "Спробувати домовитися про компроміс з Марселем."
  flavor_fra.1131.c: "Відчайдушні часи вимагають відчайдушних заходів."
  flavor_fra.1131.historical_info: "Після битви при Пуатьє та захоплення короля Іоанна II, дофін Карл, який тепер виконував обов'язки регента, був змушений скликати засідання Генеральних штатів, щоб впоратися з наслідками битви. Зустрівши запеклий опір з боку Етьєна Марселя, який мав вплив Третього стану, він вимагав, щоб Карл погодився на кілька угод, таких як підписання Великого Ордонансу, поряд з іншими політичними компромісами, такими як звільнення короля Карла «Злого» Наваррського, з яким перший був політично пов'язаний. Хоча Карл спочатку чинив опір вимогам Марселя, він зрештою поступився їм і підписав Ордонанс. Однак король Іоанн II заборонив Ордонанс у 1357 році, не давши йому повністю набути чинності."
  flavor_fra.1132.title: "Податкове ембарго міщан"
  flavor_fra.1132.desc: "Недавні дії корони призвели до того, що лідер [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], [SCOPE.sCharacter('etienne_marcel').GetName], став дедалі більше роздратованим і, як наслідок, закликав до податкового ембарго проти двору. Незважаючи на можливу відплату, багато видатних купців та пов'язаних гільдій прислухалися до прохання лідера [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] заборонити будь-який збір податків."
  flavor_fra.1132.a: "Будь він проклятий!"
  flavor_fra.1133.title: "Натовп вторгається до палацу"
  flavor_fra.1133.desc: "У шокуючій сцені натовп під командуванням [SCOPE.sCharacter('etienne_marcel').GetName] прорвався до Королівського палацу, убивши кількох охоронців і діставшись до тронної зали під час королівського зібрання двору. Однак те, що спочатку вважалося спробою перевороту, було лише жестом, щоб продемонструвати владу, якою володіє [SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip]. Замість того, щоб взяти короля в полон, Марсель наказав убити двох маршалів, [SCOPE.sCharacter('murdered_marshal_1').GetName] та [SCOPE.sCharacter('murdered_marshal_2').GetName], перш ніж безпечно відступити в натовп.\n\nХоча [ROOT.GetCountry.GetGovernment.GetRuler.GetName] відтоді відправив свою родину з [ShowLocationName('paris')], дії прево не можуть залишитися без відповіді. Хоча демонстрація прево раніше була символом влади та впевненості, він відтоді втратив значну підтримку серед членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які раніше співчували його справі, коли він спочатку запропонував Великий Ордонанс з стратою шляхетної крові."
  flavor_fra.1133.a: "[SCOPE.sCharacter('etienne_marcel').GetShortNameWithNoTooltip] з часом заплатить за те, що він зробив!"
  flavor_fra.1133.b: "[SCOPE.sCharacter('etienne_marcel').GetShortNameWithNoTooltip] та його прихильники повинні бути покарані негайно."
  tooltip_marcel_1: "Вбивство Марселем двох маршалів шляхетного походження коштувало йому значної підтримки серед [GetCountry('FRA').GetGovernment.GetEstateName('nobles_estate')] та [GetCountry('FRA').GetGovernment.GetEstateName('clergy_estate')]. Будь-які подальші дії, які він зробить, можуть стати його власною загибеллю."
  tooltip_marcel_2: "Спроба завдати удару зараз може покінчити з Марселем раз і назавжди, але його підтримка серед [GetCountry('FRA').GetGovernment.GetEstateName('burghers_estate')] все ще досить впливова, і це ще більше погіршить відносини, якщо його вб'ють."
  tooltip_marcel_3: "Будуть відправлені охоронці, щоб убити [SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip]."
  flavor_fra_hyw.historical_info: "Після погіршення відносин між дофіном Карлом та Етьєном Марселем, прево скористався нагодою після вбивства громадянина, щоб повести натовп до королівського палацу в Парижі. Хоча прево не вживав жодних дій щодо захоплення короля, він натомість стратив маршалів Жана де Конфлана та Робера де Клермона перед дофіном. Хоча його дії жахнули і зробили дофіна слабким, це також ознаменувало швидкий занепад впливу Марселя, оскільки члени знаті розлютилися через вбивство двох маршалів."
  flavor_fra.1134.title: "Смерть [SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip]"
  flavor_fra.1134.desc_a: "З моменту його вторгнення до королівського палацу та вбивства двох маршалів [GetCountry('FRA').GetName], [SCOPE.sCharacter('etienne_marcel').GetName] втрачав підтримку серед своїх союзників. Хоча вбивство маршалів призвело до того, що багато дворян відмовилися від підтримки його, як тільки новина поширилася, багато хто серед керівництва [GetCountry('FRA').GetGovernment.GetEstateName('burghers_estate')] та [GetCountry('FRA').GetGovernment.GetEstateName('peasants_estate')] відкрито висловили презирство до його дій. Незважаючи на це, новина про раптову смерть прево біля воріт Сен-Антуан була досить несподіваною, оскільки після підозр, що [SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip] збирався відкрити ворота для вторгнення, охоронці швидко розправилися з прево разом з членами його свити. Тепер, коли [SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip] мертвий, а його репутація зруйнована, кілька лідерів [GetCountry('FRA').GetGovernment.GetEstateName('burghers_estate')] тепер висловлюють прощення за ворожнечу, яку він розпалив."
  flavor_fra.1134.desc_b: "[SCOPE.sCharacter('etienne_marcel').GetName] був убитий охоронцями, відправленими на його пошуки після подій, що розгорнулися в королівському палаці. Хоча [SCOPE.sCharacter('etienne_marcel').GetShortNameWithNoTooltip] вчинив великий акт зради, його заклики до страти також принесли з собою великі наслідки, і члени [GetCountry('FRA').GetGovernment.GetEstateName('burghers_estate')] та [GetCountry('FRA').GetGovernment.GetEstateName('peasants_estate')] висловили великий гнів. Хоча [SCOPE.sCharacter('etienne_marcel').GetShortNameWithNoTooltip] може бути прийнятий як мученик, його смерть за наказом корони порадувала членів [GetCountry('FRA').GetGovernment.GetEstateName('nobles_estate')], які розлютилися, коли натовп убив маршалів за наказом Марселя."
  flavor_fra.1134.a: "Його амбіції більше не турбуватимуть корону."
  flavor_fra.1134.b: "Будь-які угоди з ним тепер недійсні."
  flavor_fra.1134.c: "Марсель може бути мертвий, але його впливова спадщина поки що залишається."
  flavor_fra.1135.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Прогрес"
  flavor_fra.1135.desc: "Раптове піднесення [target_character.GetName] та [target_character.GetHisHer] подальша опозиція правлінню [fra_ruler.GetName] призвели до певних політичних чвар по всій [ROOT.GetCountry.GetName]. Використовуючи [target_character.GetHisHer] міцні зв'язки з різними гільдіями по всій [ROOT.GetCountry.GetNameWithNoTooltip], кампанія [target_character.GetLastNameWithNoTooltip] проти [fra_ruler.GetShortNameWithNoTooltip] викликала зростаюче занепокоєння серед ради, що організоване повстання на чолі з [target_character.GetNameWithNoTooltip] може незабаром здійснитися.\n\nПрагнучи відновити [fra_ruler.GetHisHer] владу, [fra_ruler.GetShortNameWithNoTooltip] запросив підтримку для туру через [target_province.GetName], одну з головних фортець, відомих своєю вірністю [target_character.GetNameWithNoTooltip]. Однак деякі члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] припустили, що [fra_ruler.GetShortNameWithNoTooltip] замість цього повинен прагнути завоювати громадян [ShowLocationName('paris')], оскільки [target_character.GetNameWithNoTooltip] може спробувати використати тур, щоб згуртувати свій народ проти [fra_ruler.GetShortNameWithNoTooltip]."
  flavor_fra.1135.a: "Проведіть [ROOT.GetCountry.GetGovernment.GetAdjective] тур через [target_province.GetNameWithNoTooltip]!"
  flavor_fra.1135.b: "Завоюйте народ [ShowLocationNameWithNoTooltip('paris')]."
  flavor_fra.1135.c: "Прагніть послабити вплив [target_character.GetNameWithNoTooltip]."
  flavor_fra_province_gain_control_satisfaction: "Усі [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [target_province.GetName] отримають [ShowNamedValue('control_severe_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] та [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_fra_paris_gain_satisfaction_prosperity: "[ShowLocationName('paris')] отримає [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та [ShowNamedValue('prosperity_mild_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_fra.1136.title: "Бал палаючих чоловіків"
  flavor_fra.1136.desc: "Шепіт про декаданс [ROOT.GetCountry.GetGovernment.GetCourtTitle] поширився вулицями [ShowLocationName('paris')] після маскараду в [ROOT.GetCountry.GetGovernment.GetAdjective] палаці. Те, що спочатку мало бути традиційним балом, влаштованим [fra_ruler.GetName], швидко перетворилося на хаотичну подію, коли чотири лорди загинули, спалахнувши від смолоскипа, принесеного [target_sibling.GetName]. [fra_ruler.GetNameWithNoTooltip] разом з іншими чотирма лордами мали очолити танець балу, але з п'яти учасників [fra_ruler.GetShortNameWithNoTooltip] залишився єдиним, хто вижив.\n\nБагато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] звинуватили [target_sibling.GetNameWithNoTooltip] у спробі царевбивства проти [target_sibling.GetHisHer] власного родича і закликали до [target_sibling.GetHisHer] ув'язнення."
  flavor_fra.1136.a: "Ув'язнити [target_sibling.GetNameWithNoTooltip]!"
  flavor_fra.1136.b: "Помилувати [target_sibling.GetNameWithNoTooltip], це стане історією на віки!"
  flavor_fra.1150.title: "Виклик у [ShowLocationNameWithNoTooltip('rome')]"
  flavor_fra.1150.desc: "Недавня смерть [GetInternationalOrganization('catholic_church').GetLeaderTitle] ознаменувала значну зміну в політиці, коли [pap_ruler.GetName] та кардинали, що підтримують [pap_ruler.GetHerHim], прагнуть перенести [GetCountry('PAP').GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle] назад до [ShowLocationName('rome')], а також обрати [ShowCultureGroupName('italian_group')] [GetInternationalOrganization('catholic_church').GetLeaderTitle]. З 1309 року Папство залишалося під сильним [GetCountry('FRA').GetAdjectiveWithNoTooltip] впливом, причому кожен попередній [ROOT.GetCountry.GetGovernment.GetRulerTitle] мав великий вплив на вибір наступного [GetInternationalOrganization('catholic_church').GetLeaderTitle]. Однак раптова зміна політики [pap_ruler.GetNameWithNoTooltip] викликала бурхливу реакцію з боку [GetCountry('FRA').GetAdjectiveWithNoTooltip] кардиналів, які стверджували, що ті, хто в [ShowLocationNameWithNoTooltip('rome')], погрожували підтримати [pap_ruler.GetShortNameWithNoTooltip], інакше будуть вжиті заходи щодо обрання нового [GetInternationalOrganization('catholic_church').GetLeaderTitle]. Розлючені подіями в [ShowLocationNameWithNoTooltip('rome')], ці ж кардинали в опозиції вирішили назвати нового [GetInternationalOrganization('catholic_church').GetLeaderTitle] в особі [target_schism_opponent_cardinal.GetName], оголосивши його новим законним [GetInternationalOrganization('catholic_church').GetLeaderTitle].\n\nЦі кардинали тепер звернулися до [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ruler_fra.GetName] з проханням визнати [target_schism_opponent_cardinal.GetNameWithNoTooltip] [GetInternationalOrganization('catholic_church').GetLeaderTitle], засуджуючи [pap_ruler.GetShortNameWithNoTooltip] як нелегітимного."
  flavor_fra.1150.a: "Підтримати [target_schism_opponent_cardinal.GetNameWithNoTooltip] Папство."
  flavor_fra.1150.b: "Прийняти нову політику [pap_ruler.GetShortNameWithNoTooltip]."
  flavor_fra.1150.c: "Зберігати невизначену позицію щодо Папських справ."
  flavor_fra.1140.title: "$dreams_of_the_orchard$"
  flavor_fra.1140.desc: "Відносини між світською та церковною владою завжди були напруженими, і зіткнення між ними є звичайним явищем при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_artist.GetName] вигадав ідею перекласти ці напруження в історію, використовуючи сатиру. Це послужить як політичним трактатом, що стосується взаємодії між сувереном і населенням, так і розважальною критикою того, як [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] взаємодіє з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_fra.1140.historical_info: "Написаний за правління короля Карла V, $dreams_of_the_orchard$ слугував уроком з правової доктрини між світською та церковною владою. $dreams_of_the_orchard_desc$"
  flavor_fra.1140.a: "Чудовий витвір мистецтва!"
  flavor_fra.1140.b: "Це занадто дорого."
  flavor_fra.1160.title: "Мандрівні Рутьєри"
  flavor_fra.1160.desc: "Після укладення перемир'я між [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName], вільні компанії, що були найняті обома сторонами, почали грабувати менші поселення між кордонами. Деякі з цих рутьєрів під проводом [target_character.GetName] навіть заснували невелику базу операцій у деяких з цих провінцій, називаючи себе баронами. Хоча обов'язком корони є захист своїх територій, війна з [GetCountry('ENG').GetNameWithNoTooltip] залишила її фінансово та військово виснаженою, і знову братися за зброю ризикує ще більше погіршити ситуацію."
  flavor_fra.1160.a: "Ми повинні їх розгромити!"
  flavor_fra.1160.b: "Тримати їх найнятими для підтримки миру!"
  flavor_fra.1160.c: "Дозволити їм вільно блукати."
  fra_roaming_routiers_faction: "Розбійницькі вільні компанії"
  routier_revolt_provinces: "Наступні [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] приєднаються до [fra_roaming_routiers_faction.GetName]: [SCOPE.sLocation('english_french_flashpoint_1').GetName], [SCOPE.sLocation('english_french_flashpoint_2').GetName], [SCOPE.sLocation('english_french_flashpoint_3').GetName], [SCOPE.sLocation('english_french_flashpoint_4').GetName]"
  routier_affected_provinces: "Наступні [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]: [SCOPE.sLocation('english_french_flashpoint_1').GetName], [SCOPE.sLocation('english_french_flashpoint_2').GetName], [SCOPE.sLocation('english_french_flashpoint_3').GetName], [SCOPE.sLocation('english_french_flashpoint_4').GetName]"
  routiers_affected_provinces_by_undisturbed_raids: "Наступні [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowModifier('fra_routiers_looted_province')] на 10 років: [SCOPE.sLocation('english_french_flashpoint_1').GetName], [SCOPE.sLocation('english_french_flashpoint_2').GetName], [SCOPE.sLocation('english_french_flashpoint_3').GetName], [SCOPE.sLocation('english_french_flashpoint_4').GetName]"
  hire_rogue_mercenaries: "Розбійницькі найманці будуть знову найняті, складаючись з двох найманих загонів по #G 7.00#! піхоти кожен."
  flavor_fra.1161.title: "Набіги рутьєрів у [routiers_target_province.GetNameWithNoTooltip]"
  flavor_fra.1161.desc: "Отримавши дозвіл вільно пересуватися країною, розбійницька вільна рота оселилася в [routiers_target_province.GetName], назвавши себе бароном. Місцеві адміністратори [routiers_target_province.GetNameWithNoTooltip] звернулися до держави з проханням швидко відправити війська для ліквідації розбійницьких найманців, перш ніж вони зможуть завдати подальшої шкоди."
  flavor_fra.1161.a: "З ними треба розібратися."
  flavor_fra.1161.b: "Ігнорувати їх."
  flavor_fra.1162.title: "Кінець мандрівних рутьєрів"
  flavor_fra.1162.desc: "Після кількох років боротьби з розбійницькими вільними ротами, що грабували сільську місцевість по всьому [GetCountry('FRA').GetName], їхні останні осередки були ліквідовані. Хоча на відновлення завданої ними шкоди знадобиться час, простолюдини по всьому королівству поки що можуть спати спокійно."
  flavor_fra.1162.a: "Мир нарешті відновлено."
  flavor_fra.1163.title: "Тард-Веню"
  flavor_fra.1163.desc: "До [ROOT.GetCountry.GetGovernment.GetCourtTitle] дійшли новини, що ще одна банда розбійників значно розрослася по всьому [ShowAreaName('champagne_area')]. Ці розбійники Тард-Веню – це переважно колишні найманці, які стали поза законом після перемир'я з [GetCountry('ENG').GetName].\n\nРадники закликали [fra_ruler.GetName] погодитися відправити загін ополчення до [ShowAreaNameWithNoTooltip('champagne_area')]. Однак інші зауважили, що банда розбійників, ймовірно, з часом розпадеться сама по собі, і не варто витрачати вже виснажену скарбницю на експедицію в регіон."
  flavor_fra.1163.a: "Відправити загін ополчення до [ShowAreaNameWithNoTooltip('champagne_area')], щоб придушити Тард-Веню."
  flavor_fra.1163.b: "Цим мають займатися лорди [ShowAreaNameWithNoTooltip('champagne_area')]."
  flavor_fra.1170.title: "Орел [GetCountry('BRI').GetNameWithNoTooltip]"
  flavor_fra.1170.desc: "Раніше до [ROOT.GetCountry.GetCapital.GetName] прибув почет з [GetCountry('BRI').GetName] під командуванням [GetCountry('BRI').GetAdjectiveWithNoTooltip] генерала [bertrand_guesclin.GetName]. Видатний полководець, він уже відбив кілька [GetCountry('ENG').GetAdjective] вилазок у [GetCountry('BRI').GetNameWithNoTooltip]. За рекомендацією [bri_ruler.GetName], [bertrand_guesclin.GetShortNameWithNoTooltip] прибув до столиці, прагнучи служити [fra_ruler.GetName] у великій війні з [GetCountry('ENG').GetNameWithNoTooltip]. Вже довівши свою спроможність проти [GetCountry('ENG').GetAdjectiveWithNoTooltip], [bertrand_guesclin.GetLastNameWithNoTooltip] може стати інструментальним генералом у майбутніх війнах."
  flavor_fra.1170_bri_annexed.desc: "Почет з наших володінь у [ShowAreaName('brittany_area')] прибув раніше до [ROOT.GetCountry.GetCapital.GetName] під командуванням [GetCountry('BRI').GetAdjective] генерала [bertrand_guesclin.GetName]. Видатний полководець, він уже відбив кілька [GetCountry('ENG').GetAdjective] вилазок у [GetCountry('BRI').GetNameWithNoTooltip]. Проголошений героєм народом [ShowAreaNameWithNoTooltip('brittany_area')], [bertrand_guesclin.GetShortNameWithNoTooltip] прибув до столиці, прагнучи служити [fra_ruler.GetName] у великій війні з [GetCountry('ENG').GetNameWithNoTooltip]. Вже довівши свою спроможність проти [GetCountry('ENG').GetAdjectiveWithNoTooltip], [bertrand_guesclin.GetShortNameWithNoTooltip] може стати інструментальним генералом у майбутніх війнах."
  flavor_fra.1170.a: "Він має очолити наступ проти [GetCountry('ENG').GetAdjectiveWithNoTooltip]!"
  flavor_fra.1170.b: "[bertrand_guesclin.GetNameWithNoTooltip] потрібніший у [GetCountry('BRI').GetNameWithNoTooltip]."
  flavor_fra.1170.c: "Звільнити його зі служби."
  flavor_fra.1170.historical_info: "Спочатку служивши генералом під час Бретонської громадянської війни, Бертран згодом заслужив визнання французького короля і був підвищений до командування французькими арміями у Столітній війні. Під керівництвом Дюгеклена Франція змогла повернути втрачені території, а також відбити набіги Едуарда Чорного Принца на французькі території."
  bertrand_can_lead_troops_tt: "[bertrand_guesclin.GetName] буде дозволено командувати військами, навіть з [ShowEstatePrivilegeName('noble_leaders_only')]"
  flavor_fra.1171.title: "Фабіанська стратегія [bertrand_guesclin.GetLastNameWithNoTooltip]"
  flavor_fra.1171.desc: "З того часу, як [bertrand_guesclin.GetName] став генералом [GetCountry('FRA').GetName], він неодноразово доводив свою більш ніж видатну спроможність як лідер на полі бою. Для досягнення перемоги [bertrand_guesclin.GetLastNameWithNoTooltip] застосовував фабіанську стратегію, подібну до тієї, що використовував римський генерал Квінт Фабій під час Другої Пунічної війни. Хоча ця стратегія виявилася корисною для [bertrand_guesclin.GetLastNameWithNoTooltip], інші генерали [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] критикували її і навіть припускали, що [bertrand_guesclin.GetShortNameWithNoTooltip] здобув перемогу завдяки щасливому випадку. Інші, однак, пропонували заохочувати інших генералів застосовувати стратегію [bertrand_guesclin.GetShortNameWithNoTooltip], оскільки вона виявилася ефективним засобом боротьби з ворогом."
  flavor_fra.1171.a: "[bertrand_guesclin.GetShortNameWithNoTooltip] завдасть спустошення на полі бою!"
  flavor_fra.1171.b: "Заохотити інших [GetCountry('FRA').GetAdjectiveWithNoTooltip] лідерів перейняти тактику [bertrand_guesclin.GetShortNameWithNoTooltip]."
  flavor_fra.1171.c: "Нам не потрібні зміни в стратегії."
  flavor_fra.1172.title: "Титул коннетабля"
  flavor_fra.1172.desc: "[bertrand_guesclin.GetName], неодноразово довівши себе як здібний лідер, деякі в королівському дворі запропонували надати [bertrand_guesclin.GetShortNameWithNoTooltip] титул коннетабля, головного військового лідера [GetCountry('FRA').GetName]. Однак багато хто з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], хоча й поважають [bertrand_guesclin.GetShortNameWithNoTooltip], були б проти надання йому посади коннетабля через його низьке походження, оскільки цей титул був зарезервований для лідерів шляхетного походження."
  flavor_fra.1172.a: "[bertrand_guesclin.GetShortNameWithNoTooltip] заслужив це право."
  flavor_fra.1172.b: "[bertrand_guesclin.GetShortNameWithNoTooltip] потрібен більше на полі бою."
  flavor_fra.1172.c: "Простолюдин ніколи не може бути конетаблем."
  flavor_fra.1173.title: "Пропозиція морських набігів [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.1173.desc: "Прагнучи забезпечити перевагу над [english_nation.GetName], [target_character.GetName] запропонував план проведення серії морських набігів на [english_nation.GetAdjectiveWithNoTooltip] порти, сподіваючись спустошити запаси [english_nation.GetAdjectiveWithNoTooltip] солдатів у [ROOT.GetCountry.GetName]. Однак, хоча план, запропонований [target_character.GetNameWithNoTooltip], безсумнівно, надав би значну перевагу нашим сподіванням вигнати [english_nation.GetAdjectiveWithNoTooltip] війська з [ROOT.GetCountry.GetNameWithNoTooltip], робоча сила та кораблі, необхідні для такого заходу, можуть виявитися надто дорогими."
  flavor_fra.1173.a: "Запропоновані [target_character.GetLastNameWithNoTooltip] набіги допоможуть розірвати [english_nation.GetAdjectiveWithNoTooltip] ланцюги постачання."
  flavor_fra.1173.b: "Ці набіги були б надто дорогими для спроби."
  guesclin_raid_requirement_tt: "[Concept('target_character.GetName] розпочне морський набіг на [english_nation.GetName], якщо існуючий [navy', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetName] перевищує #G 75.0%#! своєї максимальної місткості. Крім того, [ROOT.GetCountry.GetNameWithNoTooltip] має бути у стані війни з [english_nation.GetNameWithNoTooltip]."
  flavor_fra.1174.title: "Морські набіги успішні проти [english_nation.GetNameWithNoTooltip]"
  flavor_fra.1174.desc: "Зібрана армада, [target_character.GetName] успішно здійснив набіги на кілька критично важливих портів уздовж [english_nation.GetAdjective] узбережжя, паралізувавши здатність [english_nation.GetNameWithNoTooltip] постачати війська в [ROOT.GetCountry.GetName]. Мине чимало часу, перш ніж сили [ruler_eng.GetName] зможуть відновитися, тому ми повинні використати цю перевагу, яку [target_character.GetNameWithNoTooltip] створив для нас!"
  flavor_fra.1174.a: "Настав час вигнати [english_nation.GetNameWithNoTooltip] з [ROOT.GetCountry.GetNameWithNoTooltip]!"
  ports_raided_by_guesclin: "Наступні [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowModifier('fra_english_ports_raided')] на 5 років і втратять [ShowNamedValue('prosperity_mild_penalty')|-=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]: [SCOPE.sLocation('target_location_1').GetName], [SCOPE.sLocation('target_location_2').GetName], [SCOPE.sLocation('target_location_3').GetName], [SCOPE.sLocation('target_location_4').GetName]."
  flavor_fra.1175.title: "Нелояльність у [norman_nation.GetNameWithNoTooltip]"
  flavor_fra.1175.desc: "Недавні зусилля щодо подальшої консолідації влади [fra_ruler.GetName] зустріли жорсткий опір у [norman_nation.GetName]. Хоча території [norman_nation.GetNameWithNoTooltip] довгий час ретельно управлялися як продовження володінь [fra_ruler.GetDynasty.GetName], вони також були одним з найбільш автономних регіонів. З огляду на загрозу, яку становлять бунтівні лорди в [norman_nation.GetNameWithNoTooltip], [fra_ruler.GetName] бажає швидко придушити їх, тоді як інші в [ROOT.GetCountry.GetGovernment.GetCourtTitle] побоюються, що такі жорсткі дії можуть розлютити інші апанажі.\n\nОднак, у [ROOT.GetCountry.GetGovernment.GetCourtTitle] ширяться чутки, що багато лордів у [norman_nation.GetNameWithNoTooltip] прагнуть присягнути на вірність [english_nation.GetNameWithNoTooltip], якщо [fra_ruler.GetName] буде вважатися слабким."
  flavor_fra.1175.a: "Посилити тиск на [norman_nation.GetNameWithNoTooltip]!"
  flavor_fra.1175.b: "Задобрити [norman_nation.GetAdjectiveWithNoTooltip] лордів, щоб уникнути розлючення інших підданих."
  normandy_event_chain_reward: "Якщо [Concept('norman_nation.GetName] впаде нижче #R 5.00%#! лояльності, [norman_nation.GetAdjectiveWithNoTooltip] лорди можуть спробувати обрати нового правителя в [norman_nation.GetNameWithNoTooltip] і присягнути на вірність [english_nation.GetName]. Якщо [norman_nation.GetNameWithNoTooltip] не перевищить #G 30#! [locations', 'CONCEPT_PLACEHOLDER')|e], а також досягне #G 85.00%#! лояльності, ми отримаємо шанс повністю інтегрувати [norman_nation.GetNameWithNoTooltip] як [ROOT.GetCountry.GetAdjective] ядро."
  flavor_fra.1176.title: "Консолідація [norman_nation.GetNameWithNoTooltip]"
  flavor_fra.1176.desc: "Незважаючи на початковий опір, [fra_ruler.GetName] вдалося зміцнити владу [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] над [norman_nation.GetName]. З багатьма нелояльними лордами, які тепер придушені, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] тепер може зробити останні кроки для консолідації [ShowCountryRankName('rank_duchy')] у [ROOT.GetCountry.GetGovernment.GetAdjective] володіння. Деякі в [ROOT.GetCountry.GetGovernment.GetCourtTitle] інакше припускали, що [norman_nation.GetNameWithNoTooltip] збереже свою автономію, а її лорди тепер тісніше пов'язані з [fra_ruler.GetNameWithNoTooltip]."
  flavor_fra.1176.a: "Поглинути [norman_nation.GetNameWithNoTooltip] у [ROOT.GetCountry.GetGovernment.GetAdjective] володіння."
  flavor_fra.1176.b: "Дозволити [norman_nation.GetAdjectiveWithNoTooltip] лордам зберегти свою автономію."
  flavor_fra.1177.title: "[norman_nation.GetAdjectiveWithNoTooltip] Лорди присягають на вірність [GetCountry('ENG').GetNameWithNoTooltip]"
  flavor_fra.1177.desc: "В акті непокори спробам [fra_ruler.GetName] консолідувати [norman_nation.GetName] у королівське володіння, [norman_nation.GetAdjectiveWithNoTooltip] лорди обрали [nrm_ruler.GetName] своїм новим герцогом, який тепер присягнув на вірність [ruler_eng.GetName].\n\nЗ відкритою повстанською діяльністю [norman_nation.GetAdjectiveWithNoTooltip] лордів, що тепер у повному розпалі, [fra_ruler.GetNameWithNoTooltip] наказав конфіскувати титули та землі зрадників. Однак, прийняття [ruler_eng.GetNameWithNoTooltip] [nrm_ruler.GetNameWithNoTooltip] як вірного підданого не залишає іншого вибору, окрім війни з [GetCountry('ENG').GetNameWithNoTooltip] для повернення [norman_nation.GetAdjectiveWithNoTooltip]."
  flavor_fra.1177.a: "Ми придушимо це повстання!"
  cores_on_normandy_fra: "[Concept('ROOT.GetCountry.GetName] отримує [cores', 'CONCEPT_PLACEHOLDER')|e] на всі [Concept('norman_nation.GetAdjective] [locations', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_fra_nrm.1.title: "Зростання нелояльності"
  flavor_fra_nrm.1.desc: "Багато [ROOT.GetCountry.GetAdjective] лордів зненавиділи [fra_ruler.GetName] та [fra_ruler.GetHisHer] спроби [french_nation.GetGovernment.GetCourtTitle] консолідувати [ROOT.GetCountry.GetLongName] у [french_nation.GetGovernment.GetAdjective] домен. Прагнучи запобігти розпуску [ROOT.GetCountry.GetFlavorRank], численні лорди зібралися в таємному місці, щоб спланувати повстання проти [fra_ruler.GetShortNameWithNoTooltip] в надії відновити автономію [ROOT.GetCountry.GetNameWithNoTooltip], хоча деякі лорди висунули ідею пошуку захисту від [GetCountry('ENG').GetName]."
  flavor_fra_nrm.1.a: "Майбутнє [ROOT.GetCountry.GetNameWithNoTooltip] на роздоріжжі."
  flavor_fra_nrm_tt: "Якщо лояльність [ROOT.GetCountry.GetName] впаде нижче #G 5.00%#!, [ROOT.GetCountry.GetAdjectiveWithNoTooltip] лорди матимуть шанс обрати нового правителя та присягнути на вірність [GetCountry('ENG').GetNameWithNoTooltip]. Однак, якщо [Concept('ROOT.GetCountry.GetNameWithNoTooltip] досягне #G 85.00%#! лояльності з [french_nation.GetNameWithNoTooltip], вона ризикує бути безпосередньо анексованою [french_nation.GetAdjectiveWithNoTooltip] [french_nation.GetGovernment.GetCourtTitle]. Здобуття незалежності іншими засобами, володіння 30 або більше [locations', 'CONCEPT_PLACEHOLDER')|e], або підтримання лояльності між #G 5.00%#! та #G 85.00%#! запобігатиме прямій анексії [ROOT.GetCountry.GetNameWithNoTooltip] [french_nation.GetAdjectiveWithNoTooltip] [french_nation.GetGovernment.GetCourtTitle]."
  flavor_fra_nrm.2.title: "Обрання [nrm_ruler.GetNameWithNoTooltip]"
  flavor_fra_nrm.2.desc: "Побачивши нагоду звільнитися від [french_nation.GetAdjective] [french_nation.GetGovernment.GetAdjective] зусиль з консолідації, незадоволені [ROOT.GetCountry.GetAdjective] лорди обрали [nrm_ruler.GetName] новим [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetNameWithNoTooltip]. Завдяки тісним зв'язкам з [eng_ruler.GetName], [nrm_ruler.GetShortNameWithNoTooltip] присягнув як васал і здобув захист [english_nation.GetName].\n\nЗвістка про сходження [nrm_ruler.GetShortNameWithNoTooltip] була зустрінута гнівом у [french_nation.GetAdjectiveWithNoTooltip] [french_nation.GetGovernment.GetAdjective] [french_nation.GetGovernment.GetCourtTitle], і вони тепер оголосили всі землі та титули, що належали [ROOT.GetCountry.GetAdjectiveWithNoTooltip] лордам, конфіскованими."
  flavor_fra_nrm.2.a: "[ROOT.GetCountry.GetNameWithNoTooltip] знайде більший захист під [english_nation.GetNameWithNoTooltip]."
  fra_cores_on_normandy_nrm: "[Concept('french_nation.GetName] отримує [cores', 'CONCEPT_PLACEHOLDER')|e] на всі [Concept('norman_nation.GetAdjective] [locations', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_fra.1180.title: "[joan_of_arc.GetNameWithNoTooltip]"
  flavor_fra.1180.desc: "З плином [GetCurrentYear] року, [GetCountry('FRA').GetName] опиняється на роздоріжжі. Постійні принизливі поразки від рук [GetCountry('ENG').GetName] деморалізували та дискредитували військове та цивільне керівництво. Коли [fra_ruler.GetName] задовольнив термінове прохання [joan_of_arc.GetNameWithNoTooltip] про спорядження для війни та призначення її на чолі [fra_ruler.GetHisHer] армії, [fra_ruler.GetHisHer] рішення, мабуть, значною мірою ґрунтувалося на знанні, що кожен раціональний, ортодоксальний варіант був випробуваний і зазнав невдачі.\n\nЛише режим у крайньому відчаї звернув би увагу на неписьменну селянську дівчину, яка стверджувала, що голос Бога наказує [joan_of_arc.GetHimHer] очолити [joan_of_arc.GetHisHer] армію своєї країни та привести її до перемоги."
  flavor_fra.1180.a: "Але [fra_ruler.GetHeShe] звернув(-ла) увагу."
  flavor_fra.1180.b: "Ми можемо здобути перемогу без [joan_of_arc.GetHisHer] допомоги!"
  flavor_fra.2000.title: "Відродження проти [GetCountry('ENG').GetNameWithNoTooltip]"
  flavor_fra.2000.desc: "Хоча наші початкові конфлікти з [GetCountry('ENG').GetName] призвели до втрати [ROOT.GetCountry.GetFlavorRank] кількох частин [ROOT.GetCountry.GetName] через вторгнення [ruler_eng.GetDynasty.GetName], під керівництвом [ruler_fra.GetName] більшість цих територій знову перебувають під [ROOT.GetCountry.GetAdjectiveWithNoTooltip] контролем. Це відродження значно підвищило моральний дух по всьому [ROOT.GetCountry.GetNameWithNoTooltip] і вселило надію, що війна майже закінчена, і якщо ці успіхи продовжаться, [GetCountry('ENG').GetAdjectiveWithNoTooltip] загарбники будуть вигнані з [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.2000.a: "Рушаймо вперед і виженемо [GetCountry('ENG').GetAdjectiveWithNoTooltip] армії раз і назавжди!"
  flavor_fra.2000.b: "Наш дух ніколи не буде зламаний!"
  flavor_fra.2002.title: "Захоплення [joan_of_arc.GetNameWithNoTooltip]"
  flavor_fra.2002.desc: "Жахливі новини! Під час нещодавнього зіткнення з ворожими силами [joan_of_arc.GetName] була захоплена і потрапила в лапи [GetCountry('ENG').GetName]. Гірше того, ходять чутки, що [GetCountry('ENG').GetAdjectiveWithNoTooltip] готують проти неї суд за єресь."
  flavor_fra.2002.a: "Жахливо!"
  flavor_fra.2003.title: "Суд над [joan_of_arc.GetNameWithNoTooltip]"
  flavor_fra.2003.desc: "Після нещодавнього зіткнення з [GetCountry('FRA').GetAdjective] силами, самопроголошена «Діва Орлеанська», [joan_of_arc.GetName], була захоплена та передана під нашу опіку. Розповіді наших військ повідомили нам, що вона стверджує, ніби отримала місію від Бога зупинити нашу кампанію в [GetCountry('FRA').GetName] і повністю вигнати наші армії. Такі заяви є потенційною підставою для суду за єресь, це вимагало б лише дозволу суду, однак, якщо її визнають винною та стратять, її прихильники в [GetCountry('FRA').GetNameWithNoTooltip] можуть стати сміливішими. Ми також могли б натомість запропонувати викуп за її повернення [GetCountry('FRA').GetAdjectiveWithNoTooltip], оскільки їхній двір, ймовірно, був би готовий розглянути її звільнення в обмін на велику суму золота."
  flavor_fra.2003.a: "Організувати трибунал і стратити її за єресь!"
  flavor_fra.2003.b: "Давайте запропонуємо непомірний викуп [GetCountry('FRA').GetNameWithNoTooltip] за її повернення."
  flavor_fra.2003.c: "Мирно дозволити їй повернутися до [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.2004.title: "[joan_of_arc.GetNameWithNoTooltip] страчена [GetCountry('ENG').GetNameWithNoTooltip]"
  flavor_fra.2004.desc: "Страшні новини дійшли до двору! Здається, після захоплення [GetCountry('ENG').GetAdjective] військами, [joan_of_arc.GetName] була засуджена до смерті через спалення на [GetCountry('ENG').GetAdjectiveWithNoTooltip] трибуналі. Трибунал оголосив її видіння від Бога про звільнення [GetCountry('FRA').GetName] від [GetCountry('ENG').GetAdjectiveWithNoTooltip] контролю підставою для єресі, і її швидко засудили як єретичку. Хоча смерть [joan_of_arc.GetShortNameWithNoTooltip] є трагічною, найкращий спосіб вшанувати її пам'ять — продовжити її мрію про вигнання [GetCountry('ENG').GetAdjectiveWithNoTooltip] з [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.2004.a: "Ми помстимося за неї!"
  flavor_fra.2005.title_ransom: "[GetCountry('ENG').GetAdjectiveWithNoTooltip] викуп"
  flavor_fra.2005.title_return: "Повернення [joan_of_arc.GetNameWithNoTooltip]"
  flavor_fra.2005.desc_ransom: "Почет з [GetCountry('ENG').GetName] прибув раніше до [GetCountry('FRA').GetAdjective] двору, принісши несподівані умови щодо захоплення [joan_of_arc.GetName] [GetCountry('ENG').GetAdjectiveWithNoTooltip] військами. Замість страти [joan_of_arc.GetShortNameWithNoTooltip], [GetCountry('ENG').GetAdjectiveWithNoTooltip] запропонували нам умови, за якими вони готові звільнити [joan_of_arc.GetShortNameWithNoTooltip] назад до [GetCountry('FRA').GetNameWithNoTooltip] в обмін на велику суму золота. Ціна за [joan_of_arc.GetShortNameWithNoTooltip], хоч і безсумнівно висока, відновить моральний дух нашого двору та військ, втрачений з моменту її захоплення."
  flavor_fra.2005.desc_return: "Хоча раніше вважалося, що після захоплення [joan_of_arc.GetName] [GetCountry('ENG').GetAdjectiveWithNoTooltip] військами, вона постане перед судом у [GetCountry('ENG').GetName], сьогодні двір отримав звістку, що вона знову повернулася до [GetCountry('FRA').GetName]. Незважаючи на те, що вона була ворогом [GetCountry('ENG').GetAdjectiveWithNoTooltip] справи, її викрадачі натомість погодилися на безпечне звільнення. Хоча залишається загадкою, чому [GetCountry('ENG').GetAdjectiveWithNoTooltip] зрештою пощадили її, повернення [joan_of_arc.GetShortNameWithNoTooltip] лише зміцнило її рішучість вигнати [GetCountry('ENG').GetAdjectiveWithNoTooltip] з [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.2005.a: "Сплатити викуп."
  flavor_fra.2005.b: "Ми не можемо ризикувати фінансовою руїною заради порятунку однієї людини."
  flavor_fra.2005.c: "Вітати її повернення."
  flavor_fra.2005.d: "Її повернення — це диво, але ми не можемо ризикувати втратити її знову."
  flavor_fra.2006.title: "Спірне престолонаслідування"
  flavor_fra.2006.desc: "Сходження [ruler_fra.GetName] на трон [GetCountry('FRA').GetName] виявилося складним завданням. Коронація [ruler_fra.GetShortNameWithNoTooltip] відбулася в той час, коли значна частина [GetCountry('FRA').GetNameWithNoTooltip] була захоплена [GetCountry('ENG').GetAdjective]. Ці військові завоювання призвели до того, що деякі наші піддані, які проживають на кордоні з [GetCountry('ENG').GetAdjectiveWithNoTooltip] окупованими територіями, нібито висловлюють повагу [GetCountry('ENG').GetAdjectiveWithNoTooltip] монарху і навіть вважають його законним правителем [GetCountry('FRA').GetNameWithNoTooltip]. Ходять чутки, що навіть при дворі є ті, хто волів би бачити [ruler_eng.GetName] правителем [GetCountry('FRA').GetNameWithNoTooltip] замість [ruler_fra.GetShortNameWithNoTooltip]. У найближчому майбутньому [ruler_fra.GetShortNameWithNoTooltip] та його/її нащадки матимуть проблеми із закріпленням свого правління як правителя [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.2006.a: "[ruler_eng.GetDynasty.GetNameWithNoTooltip] ніколи не отримає [GetCountry('FRA').GetAdjectiveWithNoTooltip] трон!"
  flavor_fra.2006.b: "Задовольнити [GetCountry('ENG').GetAdjectiveWithNoTooltip] претензії."
  flavor_fra.2007.title: "Законний [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_fra.2007.desc: "Після періоду спірного престолонаслідування, [ruler_fra.GetName] нарешті став законним, беззаперечним правителем [GetCountry('FRA').GetName]. Хоча [GetCountry('ENG').GetAdjective] вплив у [GetCountry('FRA').GetNameWithNoTooltip] колись був домінуючим завдяки величезній кількості контрольованих територій, цей вплив тепер значно зменшився діями [ruler_fra.GetShortNameWithNoTooltip] та його/її двору. Ті, хто колись скептично ставився до правління [ruler_fra.GetShortNameWithNoTooltip], знову визнають його/її єдиним правителем [GetCountry('FRA').GetNameWithNoTooltip], і, за чутками, зменшення впливу [GetCountry('ENG').GetName] на окупованих територіях призвело до того, що їхнє населення почало засуджувати [GetCountry('ENG').GetAdjectiveWithNoTooltip] правління."
  flavor_fra.2007.a: "Ми завдячуємо цією перемогою повністю [joan_of_arc.GetNameWithNoTooltip]."
  flavor_fra.2007.b: "[GetCountry('ENG').GetAdjectiveWithNoTooltip] претензія на [GetCountry('FRA').GetNameWithNoTooltip] стає все слабшою."
  flavor_fra.2007.c: "Ми повинні ще більше зміцнити правління [ruler_fra.GetNameWithNoTooltip]."
  flavor_fra.2007.d: "Ми завдячуємо цією перемогою [joan_of_arc.GetNameWithNoTooltip] за забезпечення законної претензії [ruler_fra.GetShortNameWithNoTooltip]."
  flavor_fra.2010.title: "Майстерність [target_character.GetNameWithNoTooltip]"
  flavor_fra.2010.desc: "Видатна родина з [ShowLocationName('chalons_champagne')], родина [target_character.GetLastNameWithNoTooltip] здобула неабияку репутацію у [GetCountry('FRA').GetName] як обдарована у поводженні з порохом. Завдяки своїм роботам, [target_character.GetName] створив порох, що дозволяє гарматам стріляти з вищою швидкістю, ніж вважалося раніше, а також допоміг у створенні гарматних стволів, які менш схильні до вибуху при пострілі. Тепер, однак, [target_character.GetNameWithNoTooltip] запропонував свої послуги [GetCountry('FRA').GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle] в надії використати свої знання на полі бою."
  flavor_fra.2010.a: "Найняти його!"
  flavor_fra.2010.b: "Хоча його досягнення похвальні, нам не потрібна його стратегія для наших військ."
  flavor_fra.2011.title: "Майстер-гармаш [GetCountry('FRA').GetNameWithNoTooltip]"
  flavor_fra.2011.desc: "Відколи [target_character.GetName] був найнятий, він довів свою надзвичайну здатність зміцнювати наші сили завдяки своєму досвіду у пороховій та артилерійській війні. Деякі члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] рекомендували нагородити [target_character.GetNameWithNoTooltip] титулом «Майстер-гармаш [GetCountry('FRA').GetName]» на знак визнання його легендарних якостей. Крім того, ця нова посада дозволить [target_character.GetLastNameWithNoTooltip] отримати більше ресурсів для подальшого вдосконалення гармат, що виробляються та використовуються нашими силами."
  flavor_fra.2011.a: "Надати йому титул Майстра-гармаша!"
  flavor_fra.2011.b: "Порох дорогий, зосередьмося на традиційній війні!"
  flavor_fra.2012.title: "[target_character.GetNameWithNoTooltip], Бастард Орлеанський"
  flavor_fra.2012.desc: "Попри тісні родинні зв'язки з [ROOT.GetCountry.GetGovernment.GetRuler.GetName], [target_character.GetName] здобув досить похвальну репутацію завдяки своїм військовим успіхам проти [GetCountry('ENG').GetAdjective]. За ці дії деякі члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували підвищити [target_character.GetShortNameWithNoTooltip] до вищого становища в [ROOT.GetCountry.GetGovernment.GetCourtTitle], оскільки він більш ніж довів свою спроможність на полі бою. Інші, однак, побоюються, що [target_character.GetShortNameWithNoTooltip] лише прагнув завоювати прихильність [ROOT.GetCountry.GetGovernment.GetCourtTitle] для досягнення власних цілей."
  flavor_fra.2012.a: "Вітаємо [target_character.GetNameWithNoTooltip] як члена [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_fra.2012.b: "Він не заслужив цього права."
  flavor_fra.2013.title: "[ShowBuildingTypeNameWithNoTooltip('university')] у [ShowLocationNameWithNoTooltip('poitiers')]"
  flavor_fra.2013.desc: "Прагнучи профінансувати заснування нового [ShowBuildingTypeName('university')] у [ShowLocationName('poitiers')], [pap_ruler.GetName] звернувся із запитом до [fra_ruler.GetName] в надії отримати хартію. Хоча [ShowLocationNameWithNoTooltip('poitiers')] виграло б від нового центру навчання, будучи одним із найбільших міст у [ROOT.GetCountry.GetName], деякі члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] звернулися до [fra_ruler.GetNameWithNoTooltip] із закликом заборонити надання хартії, оскільки цей запит може зробити [ROOT.GetCountry.GetNameWithNoTooltip] більш залежним від [GetCountry('PAP').GetGovernment.GetRulerTitle] у майбутньому. Інші, однак, закликали [fra_ruler.GetNameWithNoTooltip] погодитися, оскільки у запиті [pap_ruler.GetNameWithNoTooltip] згадувалося, що [GetCountry('PAP').GetName] надасть фінансування для нового [ShowBuildingTypeNameWithNoTooltip('university')]."
  flavor_fra.2013.a: "Надати хартію."
  flavor_fra.2013.b: "Відхилити запит [pap_ruler.GetNameWithNoTooltip]."
  flavor_fra.2014.title: "Повстання [praguerie_revolt_target.GetNameWithNoTooltip]"
  flavor_fra.2014.desc: "Зростаючи невдоволення правлінням [fra_ruler.GetName], багато хто з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] публічно висловили своє незадоволення, значною мірою спрямоване на нещодавню політику [fra_ruler.GetNameWithNoTooltip], що загрожує безпеці багатьох членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Разом зі зростаючим невдоволенням, багатьом незадоволеним [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вдалося завербувати [fra_heir.GetName] в надії змусити [fra_ruler.GetNameWithNoTooltip] зректися престолу. Хоча багато хто з тих, хто лояльний до [fra_ruler.GetNameWithNoTooltip], вірять, що невдоволення мине, деякі тиснуть на [fra_ruler.GetNameWithNoTooltip], щоб він принаймні розглянув зречення, аби запобігти повномасштабній громадянській війні."
  flavor_fra.2014.a: "Відмовитися підкорятися незадоволеним [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_fra.2014.b: "Зректися престолу на користь [fra_heir.GetNameWithNoTooltip]."
  fra_praguerie_revolt_region: "Усі [ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('ile_de_france_area')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднаються до [praguerie_revolt_target.GetName]."
  praguerie_revolt: "Прагерія"
  flavor_fra.2020.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.2020.desc: "Видатна та впливова постать серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], [target_character.GetName] за останні роки довів [target_character.GetHerselfHimself] як одного з найпроникливіших купців нашого часу. Вже очоливши гігантську торговельну операцію, що базується в [ShowLocationName('montpellier')], [target_character.GetShortNameWithNoTooltip] зумів налагодити досить блискучі стосунки з купецькими республіками [ShowRegionName('italy_region')] завдяки [target_character.GetHisHer] справам у Леванті.\n\nБувши викликаним [ROOT.GetCountry.GetGovernment.GetCourtTitle] за [target_character.GetHisHer] діяння, деякі рекомендували [fra_ruler.GetName] надати [target_character.GetShortNameWithNoTooltip] посаду Майстра Монетного двору та передати йому кермо державних фінансів."
  flavor_fra.2020.a: "Нехай [target_character.GetNameWithNoTooltip] візьме кермо!"
  flavor_fra.2020.b: "Дозволити [target_character.GetNameWithNoTooltip] натомість повернутися до [target_character.GetHisHer] приватної справи."
  flavor_fra.2021.title: "[target_character.GetLastNameWithNoTooltip] та [ROOT.GetCountry.GetGovernment.GetAdjective|U] Витрати"
  flavor_fra.2021.desc: "З моменту вступу на посаду Майстра Монетного двору, [target_character.GetLastName] сприяв стабілізації фінансів [ROOT.GetCountry.GetName]. Хоча роль [target_character.GetLastNameWithNoTooltip] як Майстра Монетного двору призвела до багатьох покращень, вона також суворо обмежувала державну скарбницю.\n\nДовівши [target_character.GetHerselfHimself] більш ніж спроможним, деякі заохочували [fra_ruler.GetName] підвищити [target_character.GetLastNameWithNoTooltip] до посади управителя [ROOT.GetCountry.GetGovernment.GetAdjective] витрат, розширивши [target_character.GetHisHer] вплив на [ROOT.GetCountry.GetGovernment.GetAdjective] скарбницю."
  flavor_fra.2021.a: "Надати [target_character.GetLastNameWithNoTooltip] управління [ROOT.GetCountry.GetGovernment.GetAdjective] витратами."
  flavor_fra.2021.b: "[target_character.GetHisHer|U] поточна посада цілком [target_character.GetHimHer] влаштовує."
  flavor_fra.2022.title: "[target_character.GetLastNameWithNoTooltip] Переговори з [mamluk_country.GetNameWithNoTooltip]"
  flavor_fra.2022.desc: "Використовуючи свої міцні зв'язки з комерційними інтересами в регіоні, [target_character.GetName] та [target_character.GetHisHer] близькі радники зуміли укласти угоду з [mam_ruler.GetName] з [mamluk_country.GetName]. Хоча ця угода принесла деякі ключові поступки, такі як покращення доступу до консулів по всьому Леванту, [target_character.GetLastNameWithNoTooltip] також зумів налагодити нові комерційні зв'язки з [mamluk_country.GetNameWithNoTooltip].\n\nХоча угода з [mamluk_country.GetNameWithNoTooltip] покращила б вплив [ROOT.GetCountry.GetName] на комерційну торгівлю по всьому Середземномор'ю, дехто побоюється, що ця угода, укладена [target_character.GetLastNameWithNoTooltip], може бути вигіднішою для [target_character.GetHisHer] торгової імперії."
  flavor_fra.2022.a: "Погодитися на угоду [target_character.GetLastNameWithNoTooltip]."
  flavor_fra.2022.b: "Заборонити ратифікацію угоди."
  mam_trade_with_france: "Торгова угода з Францією"
  fra_trade_with_mamluks: "Торгова угода з Мамлюками"
  flavor_fra.2023.title: "Шато д'Ене-ле-В'єй та Палац [target_character.GetNameWithNoTooltip]"
  flavor_fra.2023.desc: "Хоча [target_character.GetName] служив здібним міністром і управителем [ROOT.GetCountry.GetName], [target_character.GetHeShe] також здобув значну репутацію, як позитивну, так і негативну. До приєднання до [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetNameWithNoTooltip] вже побудував велике комерційне підприємство, і хоча [target_character.GetHisHer] пріоритети значною мірою приносили користь [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], [target_character.GetHisHer] особисті проєкти почали викликати невдоволення серед інших міністрів.\n\nУ [ShowLocationName('bourges')], [target_character.GetNameWithNoTooltip] вже зробив кроки для забезпечення купівлі #italic Шато д'Ене-ле-В'єй#!, замку, який давно втратив своє значення, а також для будівництва екстравагантного Палацу [target_character.GetNameWithNoTooltip] у самому [ShowLocationNameWithNoTooltip('bourges')].\n\nЦі дорогі проєкти викликали занепокоєння, що [target_character.GetLastNameWithNoTooltip] може використовувати [target_character.GetHisHer] посаду для власного збагачення."
  flavor_fra.2023.a: "Не втручатися в проєкти [target_character.GetLastNameWithNoTooltip]."
  flavor_fra.2023.b: "Вимагати, щоб [target_character.GetLastNameWithNoTooltip] утримувався від подальших амбітних проєктів."
  flavor_fra.2024.title: "Підприємливі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_fra.2024.desc: "Піднесення [target_character.GetName] на міністерську посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle] призвело до стабільного зростання інтересу [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] до зростаючих торговельних шляхів. Хоча раніше така практика вважалася недоцільною, деякі з найближчих радників [fra_ruler.GetNameWithNoTooltip], включаючи [target_character.GetNameWithNoTooltip], заохочували [fra_ruler.GetNameWithNoTooltip] дозволити та розширити доступ для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] до подальшого розвитку цих підприємницьких зусиль. Попередня політика передбачала, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], які займалися такими зусиллями, ризикували втратити свої привілеї.\n\nОднак деякі представники еліти [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] закликають до обережності, оскільки конкуренція може спричинити несприятливий вплив на економіку [ROOT.GetCountry.GetName]."
  flavor_fra.2024.a: "Скасувати обмеження та дозволити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] займатися підприємницькою діяльністю."
  flavor_fra.2024.b: "Заборонити будь-які подальші зусилля членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] для захисту інтересів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_fra.2025.title: "Монополізація [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.2025.desc: "Хоча [target_character.GetName] служив надзвичайним міністром [fra_ruler.GetName], [target_character.GetHisHer] статус тепер виріс настільки, що спричиняє занадто багато заворушень при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Багато придворних тепер вказують на те, що бізнес-імперія [target_character.GetLastNameWithNoTooltip] тримає майже монополію на більшість торгових товарів [ROOT.GetCountry.GetName]. Крім того, з'явилися звинувачення, що [target_character.GetLastNameWithNoTooltip] більше зацікавлений у [target_character.GetHisHer] багатстві, ніж у державі, наприклад, [target_character.GetLastNameWithNoTooltip] викрадав веслярів для [target_character.GetHisHer] торгових галер, а також вилучав багатство з доків шляхом легкої монети.\n\nЗіткнувшись з цими звинуваченнями, багато хто вимагав ув'язнення та подальшого суду, щоб притягнути [target_character.GetLastNameWithNoTooltip] до відповідальності, а також позбавити [ROOT.GetCountry.GetGovernment.GetCourtTitle] цієї амбітної особи."
  flavor_fra.2025.a: "Ув'язнити [target_character.GetHimHer] та конфіскувати [target_character.GetHisHer] володіння!"
  flavor_fra.2025.b: "[target_character.GetLastNameWithNoTooltip] приніс велику користь цьому [ROOT.GetCountry.GetGovernment.GetCourtTitle], пощадити [target_character.GetHimHer] і дозволити [target_character.GetHimHer] залишитися."
  flavor_fra.2030.t: "Піднесення [GetCountry('BUR').GetNameWithNoTooltip]"
  flavor_fra.2030.desc: "Хоча в минулому кілька амбітних підданих [GetCountry('FRA').GetName] намагалися перешкодити або послабити владу короля, їх зрештою заспокоювали або розправлялися з ними, коли вони ставали занадто проблематичною фракцією для двору. Однак лорди [GetCountry('BUR').GetName] стали, мабуть, найзагрозливішим викликом авторитету [ruler_fra.GetName]. Давно припинивши платежі або ігноруючи заклики двору, [ruler_bur.GetName] діє як незалежний правитель у [ruler_bur.GetHisHer] власному праві. Хоча [GetCountry('BUR').GetNameWithNoTooltip] залишається номінально, де-юре землями [GetCountry('FRA').GetNameWithNoTooltip], нинішній правитель [GetCountry('BUR').GetNameWithNoTooltip] загрожує підірвати політичні відносини між [ruler_fra.GetShortNameWithNoTooltip] та [ruler_fra.GetHisHer] підданими."
  flavor_fra.2030.a: "Лордів [GetCountry('BUR').GetNameWithNoTooltip] необхідно приборкати."
  flavor_fra.2030.b: "Ми не можемо ризикувати більшим конфліктом з [GetCountry('BUR').GetNameWithNoTooltip]."
  flavor_fra.2031.t: "Ліга суспільного блага"
  flavor_fra.2031.desc: "[GetCountry('FRA').GetName] під проводом [ruler_fra.GetName] та [ruler_fra.GetHisHer] попередника доклали значних зусиль для централізації влади при дворі та утвердження верховної влади короля. Однак, внаслідок цих постійно зростаючих зусиль зі створення сильного централізованого органу, багато підданих [GetCountry('FRA').GetNameWithNoTooltip], особливо ті, що належать до принців крові, стали все більш ворожими до держави. Тепер, вважаючи владу Корони занадто всеосяжною, кілька підданих підписали політичний альянс, відомий як Ліга суспільного блага, з метою розгрому авторитету [ruler_fra.GetShortNameWithNoTooltip] та відновлення автономії підданих корони."
  flavor_fra.2031.a: "Ми ніколи не будемо вести переговори з повстанцями."
  flavor_fra.2032.a: "Якщо наші інтереси збігаються, нам варто розглянути можливість приєднання до Ліги."
  flavor_fra.2032.b: "Корона стала надто могутньою, приєднуйтесь до Ліги!"
  flavor_fra.2033.t: "Ліга вимагає автономії!"
  flavor_fra.2033.desc: "Хоча спочатку це була менша політична фракція васалів, стурбованих процесом постійної централізації [GetCountry('FRA').GetName], Ліга суспільного блага розрослася і тепер включає кількох видатних лордів, що походять із апанажних земель. Обраний лідером Ліги, [league_leader_ruler.GetName] видав список вимог, найбільшою з яких є швидка децентралізація держави, щоб повернутися до періоду правління [GetCharacter('fra_philippe_iv_capet').GetName].\n\nЯкщо двір відмовиться прийняти ці вимоги, ліга вибухне відкритим повстанням проти Корони."
  flavor_fra.2033.a: "Ці вимоги обурливі!"
  flavor_fra.2033.b: "У нас немає вибору, окрім як прийняти вимоги Ліги."
  flavor_fra.2034.title_royalist: "Тріумф Королівського двору"
  flavor_fra.2034.title_league: "Тріумф Ліги"
  flavor_fra.2034.desc_royalist: "Після оголошення відкритого повстання проти [ruler_fra.GetName] та королівського двору, Ліга суспільного блага була розгромлена! З поразкою Ліги, остання велика перешкода для забезпечення верховної влади [ruler_fra.GetShortNameWithNoTooltip] була усунена, дозволяючи двору застосовувати більш агресивні засоби консолідації державної влади. Хоча, ймовірно, є ті, хто все ще протистоїть цим зусиллям, загибель Ліги зробить будь-які майбутні спроби майже неможливими."
  flavor_fra.2034.desc_league: "Після відкритого повстання проти [ruler_fra.GetName] та королівського двору, Ліга суспільного блага здобула перемогу у своїх зусиллях послабити державну владу, а також централізаційні зусилля двору. Ця бурхлива поразка змусила [ruler_fra.GetShortNameWithNoTooltip] підписати Конфланський договір, а також надати додаткові привілеї повстанцям, що перемогли."
  flavor_fra.2034.a: "Жахливий поворот подій."
  flavor_fra.2034.b: "Велика перемога для корони!"
  flavor_fra.2040.t: "Компанії Ордонансу"
  flavor_fra.2040.desc: "Щоб боротися зі зростаючими набігами раніше найманих груп найманців, а також різних вільних компаній, що вимагали данину з [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], Генеральні штати видали новий закон, що надає [ruler_fra.GetName] виключне право на створення нової королівської армії. На відміну від минулих армій, нові #italic Компанії Ордонансу#! підпорядковуватимуться [ruler_fra.GetShortNameWithNoTooltip] як постійна сила і прагнутимуть діяти на постійній основі. Така сила прокладе шлях до створення постійної армії для [GetCountry('FRA').GetName]."
  flavor_fra.2040.a: "Сформувати Компанії Ордонансу!"
  flavor_fra.2040.b: "Створити зменшену постійну силу."
  flavor_fra.2040.c: "Перенаправити інвестиції з нового закону на заохочення зусиль з набору військ."
  flavor_fra.2041.t: "Фіскальна розсудливість [target_character.GetNameWithNoTooltip]"
  flavor_fra.2041.desc: "Хоча [GetCountry('FRA').GetName] бачила різних великих монархів, жоден досі не зумів бути таким фіскально розсудливим, як [target_character.GetName]. Протягом правління [target_character.GetShortNameWithNoTooltip] відносини між короною та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] залишалися значно сердечними, що дозволило побудувати різні великі споруди по всій [GetCountry('FRA').GetNameWithNoTooltip]. Крім того, ретельне управління королівською скарбницею [target_character.GetShortNameWithNoTooltip] забезпечило фінансову стабільність держави."
  flavor_fra.2041.a: "Це процвітаючі часи для [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.2041.b: "Поглибити наші відносини з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_fra.2041.c: "Скористатися цією можливістю, щоб провести велику податкову реформу."
  flavor_fra.2042.t: "Прагматична санкція [ShowLocationNameWithNoTooltip('bourges')]"
  flavor_fra.2042.desc: "Спочатку запроваджена для обмеження влади Святого Престолу в [GetCountry('FRA').GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], Прагматична санкція [ShowLocationName('bourges')] надала Католицькій Церкві [GetCountry('FRA').GetNameWithNoTooltip] значну адміністративну незалежність від [ShowGovernmentReformName('papacy_reform')]. Хоча санкція діяла деякий час і дозволяла [fra_ruler.GetName] зберігати певний вплив на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], [pap_ruler.GetName] звернувся з проханням скасувати санкцію, щоб [ShowGovernmentReformNameWithNoTooltip('papacy_reform')] могла знову відновити свою присутність у [GetCountry('FRA').GetNameWithNoTooltip]. Хоча [GetCountry('PAP').GetGovernment.GetRulerTitle] запропонував оновлені відносини з [fra_ruler.GetShortNameWithNoTooltip], скасування санкції послабило б здатність двору відігравати впливову роль у справах [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_fra.2042.a: "Скасувати санкцію."
  flavor_fra.2042.b: "Відхилити побажання [ShowGovernmentReformNameWithNoTooltip('papacy_reform')], зберегти санкцію."
  flavor_fra.2043.t: "Розширення Королівських поштових доріг"
  flavor_fra.2043.desc: "Хоча королівський двір підтримував стабільний потік зв'язків зі своїми підданими, найближчими до столиці, наші віддалені піддані завжди виявлялися складним завданням для нашої мережі зв'язку. [target_character.GetName] запропонував розширення королівських поштових доріг по всьому [GetCountry('FRA').GetName], що дозволить створити ефективніші шляхи для королівських кур'єрів та зміцнити наш зв'язок з найвіддаленішими підданими. Радники [target_character.GetShortNameWithNoTooltip] також запропонували, щоб такий проєкт обрав альтернативний підхід для створення дешевших доріг, які можна було б ширше використовувати."
  flavor_fra.2043.a: "Фінансувати розширення!"
  flavor_fra.2043.b: "Прийняти підхід радників."
  flavor_fra.2043.c: "Розширення доріг було б марною тратою ресурсів."
  flavor_fra.2044.t: "Поштові заїзди"
  flavor_fra.2044.desc: "Наслідуючи успіхи розширення Королівських доріг, [target_character.GetName] тепер запропонував створення спеціалізованих заїздів уздовж новостворених доріг. Ці заїзди слугуватимуть зупинками для особистих посланців [target_character.GetShortNameWithNoTooltip] та членів королівського двору. Такі заїзди також могли б посилити нашу шпигунську мережу, якщо їхні можливості будуть розширені."
  flavor_fra.2044.a: "Дозволити створення цих заїздів за наказом [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_fra.2044.b: "Розширити Поштові заїзди для посилення наших шпигунських мереж."
  flavor_fra.2044.c: "Дороге починання."
  flavor_fra.2100.t: "Справи [ShowRegionNameWithNoTooltip('italy_region')]"
  flavor_fra.2100.desc: "Після вирішення нашого конфлікту з [GetCountry('ENG').GetName], відновився підхід до наших південних кордонів уздовж Альп. Хоча королівський двір у минулому мав контакти з кількома [ShowCultureGroupName('italian_group')] державами та родинами [ShowRegionName('italy_region')], здатність підтримувати згуртовані відносини з регіоном була обмежена під час нашого конфлікту з [GetCountry('ENG').GetAdjectiveWithNoTooltip]. Різні радники та придворні запропонували [fra_ruler.GetName], щоб [GetCountry('FRA').GetNameWithNoTooltip] прагнула посилити свій вплив у регіоні, оскільки, хоча [ShowRegionNameWithNoTooltip('italy_region')] є домом для різних держав, вони мають потенціал стати потужними політичними союзниками. Є також ті при дворі, хто пропонує нам обрати більш домінуючий підхід і прагнути силою привести наших [ShowCultureGroupNameWithNoTooltip('italian_group')] сусідів під крило [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.2100.a: "Ми повинні підтримувати нейтральну політику наразі."
  flavor_fra.2100.b: "Прагнути встановити сердечні відносини з вигідними державами."
  flavor_fra.2100.c: "Нашим [ShowCultureGroupNameWithNoTooltip('italian_group')] сусідам було б краще під нашим пануванням."
  flavor_fra.2101.t: "[ruler_mlo.GetNameWithNoTooltip] пропонує дружбу"
  flavor_fra.2101.desc: "Прибув сановник з [GetCountry('MLO').GetLongName], який прагне встановити тісніші відносини між ним та [GetCountry('FRA').GetLongName]. [ruler_mlo.GetName] є однією з найвпливовіших фігур у поточній політичній атмосфері [ShowRegionName('italy_region')] і запевнив нас, що інтереси [GetCountry('MLO').GetNameWithNoTooltip] та двору [GetCountry('FRA').GetNameWithNoTooltip] тісно збігаються, і що тісні відносини між нашими державами були б вигідними. Хоча [ruler_mlo.GetShortNameWithNoTooltip] запросив формальний союз, наші радники запропонували нам проявити обережність і наразі погодитися лише на тісніші відносини з [GetCountry('MLO').GetNameWithNoTooltip]."
  flavor_fra.2101.a: "Погодитися на тісніші відносини з [GetCountry('MLO').GetNameWithNoTooltip]."
  flavor_fra.2101.b: "Залишимося сердечними наразі."
  flavor_fra.2101.c: "Леви не ведуть переговорів з вівцями."
  flavor_fra.2102.t: "[GetCountry('MLO').GetNameWithNoTooltip] Просить допомоги проти [GetCountry('NAP').GetNameWithNoTooltip]"
  flavor_fra.2102.desc: "Правитель [GetCountry('MLO').GetName], [ruler_mlo.GetName], звернувся до нас по допомогу проти [GetCountry('NAP').GetLongName]. [ruler_nap.GetName] висунув претензії на [GetCountry('MLO').GetLongNameWithNoTooltip] і [ruler_mlo.GetShortNameWithNoTooltip] стверджує, що [GetCountry('NAP').GetAdjectiveWithNoTooltip] армії незабаром спробують силою захопити [GetCountry('MLO').GetNameWithNoTooltip].\n\nЯкщо [GetCountry('MLO').GetNameWithNoTooltip] впаде, це ризикує зробити північний регіон [ShowRegionName('italy_region')] сильно вразливим до впливу [GetCountry('NAP').GetNameWithNoTooltip].\n\nЯкщо ми погодимося на [GetCountry('MLO').GetAdjectiveWithNoTooltip] прохання, ті при дворі стверджували, що ми повинні скористатися нагодою, щоб висунути претензії [ruler_fra.GetName] на [GetCountry('NAP').GetNameWithNoTooltip], оскільки ці землі колись належали Дому [ShowDynastyName('anjou_dynasty')], який колись правив [ShowAreaName('provence_area')] і керував союзом з [GetCountry('NAP').GetNameWithNoTooltip]. Однак таке завоювання потенційно може зустріти опір у [ShowRegionNameWithNoTooltip('italy_region')]."
  flavor_fra.2102.a: "Прислухатися до прохання [ruler_mlo.GetShortNameWithNoTooltip] і висунути наші претензії на [GetCountry('NAP').GetNameWithNoTooltip]."
  flavor_fra.2102.b: "Ми захищатимемо [ruler_mlo.GetShortNameWithNoTooltip] лише якщо [ruler_nap.GetShortNameWithNoTooltip] вторгнеться."
  flavor_fra.2102.c: "Ці справи не стосуються [GetCountry('FRA').GetAdjectiveWithNoTooltip] двору."
  flavor_fra.2103.t: "[GetCountry('NAP').GetAdjectiveWithNoTooltip] Наслідки"
  flavor_fra.2103.desc: "На прохання [ruler_mlo.GetName], [ruler_fra.GetName] зібрав значні сили та розпочав вторгнення на вимогу [ruler_mlo.GetShortNameWithNoTooltip]. Хоча ця нагода дала [ruler_fra.GetShortNameWithNoTooltip] шанс відстояти [ruler_fra.GetHisHer] претензії на [GetCountry('NAP').GetLongName], це зустріло масовий опір у всьому [ShowCultureGroupName('italian_group')] політичному світі. Навіть наші однодумці в [GetCountry('MLO').GetName] з тих пір розірвали з нами зв'язки. Якщо ми не відійдемо від [GetCountry('NAP').GetNameWithNoTooltip], дії [ruler_fra.GetShortNameWithNoTooltip] ризикують зустріти [ShowCultureGroupNameWithNoTooltip('italian_group')] коаліцію, щоб вигнати [GetCountry('FRA').GetAdjectiveWithNoTooltip] вплив з [ShowRegionName('italy_region')]."
  flavor_fra.2103.a: "[GetCountry('NAP').GetNameWithNoTooltip] — наша законна претензія, і ми її відстоюватимемо!"
  flavor_fra.2103.b: "Пограбувати [GetCountry('NAP').GetAdjectiveWithNoTooltip] скарбницю та відійти від [GetCountry('NAP').GetNameWithNoTooltip]."
  flavor_fra.2103.c: "Повністю відмовитися від [GetCountry('FRA').GetAdjectiveWithNoTooltip] претензій на [GetCountry('NAP').GetNameWithNoTooltip] та відійти."
  flavor_fra.2103.historical_info: "Протягом цього історичного періоду агресивність, виявлена Карлом VIII, призвела до надзвичайних обставин. Монархи та сильні світу цього, які колись ворогували, такі як правителі Іспанії, Священної Римської імперії та багатьох італійських держав, об'єдналися в одну коаліцію, щоб відбити вторгнення французьких армій в Італії. Гнів, що виник від послідовних французьких перемог, привернув увагу монархів аж до берегів Англії, коли король Генріх VII приєднався до підтримки Ліги Венеції."
  flavor_fra.2104.t: "Управління [GetCountry('NAP').GetNameWithNoTooltip]"
  flavor_fra.2104.desc: "Нещодавнє завоювання [GetCountry('NAP').GetName] викликало обговорення при дворі щодо управління регіоном. Хоча раніше [GetCountry('NAP').GetNameWithNoTooltip] перебувало в особистій унії під владою Дому [ShowDynastyName('anjou_dynasty')], воно зрештою вислизнуло з їхніх рук, тепер, коли [ruler_fra.GetName] повернув [GetCountry('NAP').GetNameWithNoTooltip], не можна допустити, щоб воно знову було втрачене. Придворні запропонували призначити [GetCountry('FRA').GetAdjectiveWithNoTooltip] дворянина для управління [GetCountry('NAP').GetNameWithNoTooltip] замість [ruler_fra.GetShortNamewithNoTooltip], тоді як інші пропонують безпосередньо пов'язати [GetCountry('NAP').GetAdjectiveWithNoTooltip] адміністрацію з роботою королівського двору. Альтернативно, ми могли б надати [GetCountry('NAP').GetAdjectiveWithNoTooltip] народу власну автономію та дозволити їм самостійно керувати собою в унії."
  flavor_fra.2104.a: "Залишити [GetCountry('FRA').GetAdjectiveWithNoTooltip] дворянина губернатором [GetCountry('NAP').GetNameWithNoTooltip]."
  flavor_fra.2104.b: "[GetCountry('NAP').GetNameWithNoTooltip] підпорядковуватиметься безпосередньо королівському двору!"
  flavor_fra.2104.c: "Дозволити [GetCountry('NAP').GetAdjectiveWithNoTooltip] народу самостійно керувати собою в унії."
  flavor_fra.2105.t: "Кампанія за [GetCountry('MLO').GetNameWithNoTooltip]"
  flavor_fra.2105.desc: "Хоча відносини між [GetCountry('FRA').GetName] та [GetCountry('MLO').GetName] починалися приязно, [ruler_mlo.GetName] підступно зрадив [ruler_fra.GetName] після нашого вторгнення до [GetCountry('NAP').GetName]. Незважаючи на те, що ми виконали заклики [ruler_mlo.GetShortNameWithNoTooltip] запобігти [GetCountry('NAP').GetAdjectiveWithNoTooltip] захопленню [GetCountry('MLO').GetNameWithNoTooltip], [ruler_mlo.GetShortNameWithNoTooltip] сподівався сам претендувати на [GetCountry('NAP').GetLongNameWithNoTooltip] після успішної кампанії [GetCountry('FRA').GetNameWithNoTooltip]. Довівши свою ненадійність, радники при дворі звернулися до [ruler_fra.GetShortNameWithNoTooltip] з проханням заявити претензії на [GetCountry('MLO').GetLongNameWithNoTooltip] у [ruler_fra.GetHisHer] якості нового правителя [GetCountry('NAP').GetNameWithNoTooltip], а також повалити [ruler_mlo.GetShortNameWithNoTooltip] у процесі. Це також забезпечить, що [GetCountry('MLO').GetNameWithNoTooltip] не зможе сформувати ефективну коаліцію після нашого вторгнення до [GetCountry('NAP').GetNameWithNoTooltip]."
  flavor_fra.2105.a: "[ruler_mlo.GetShortNameWithNoTooltip] заплатить за [ruler_mlo.GetHisHer] зраду!"
  flavor_fra.2105.b: "Нашого завоювання [GetCountry('NAP').GetNameWithNoTooltip] поки що буде достатньо."
  flavor_fra.2106.t: "Доля [GetCountry('MLO').GetLongNameWithNoTooltip]"
  flavor_fra.2106.desc: "З [GetCountry('MLO').GetName] у [GetCountry('FRA').GetAdjective] володінні, тепер двору належить вирішити його майбутнє. Хоча [ruler_fra.GetName] править як [ROOT.GetCountry.GetGovernment.GetRulerTitle] [GetCountry('FRA').GetName] і [GetCountry('MLO').GetGovernment.GetRulerTitle] [GetCountry('MLO').GetNameWithNoTooltip], послідовне захоплення спочатку [GetCountry('NAP').GetName], а тепер і [GetCountry('MLO').GetNameWithNoTooltip] значно погіршило наші зв'язки в регіоні, до чого навіть [target_hre_ruler.GetName] почав проявляти зростаючий інтерес до регіону. Збереження [GetCountry('MLO').GetNameWithNoTooltip] може виявитися складним завданням, але радники при дворі запропонували нам встановити лояльне управління, призначивши місцевого [GetCountry('MLO').GetAdjectiveWithNoTooltip] дворянина, вірного [GetCountry('FRA').GetAdjectiveWithNoTooltip] справі. Однак це змусило б [ruler_fra.GetShortNameWithNoTooltip] відмовитися від [ruler_fra.GetHisHer] правління."
  flavor_fra.2106.a: "[ruler_fra.GetShortNameWithNoTooltip] продовжуватиме правити як [GetCountry('MLO').GetGovernment.GetRulerTitle] [GetCountry('MLO').GetNameWithNoTooltip]."
  flavor_fra.2106.b: "Призначити [GetCountry('MLO').GetAdjectiveWithNoTooltip] союзника губернатором."
  flavor_fra.2106.c: "Ми лише прагнули скинути тих, хто нас зрадив, відійти від [GetCountry('MLO').GetNameWithNoTooltip]."
  flavor_fra.2107.t: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.2107.desc: "Родом з [ShowLocationName('aix_en_provence')], [target_character.GetName] залишався вірним членом королівського двору, допомагаючи у вихованні дітей [GetCountry('FRA').GetGovernment.GetRuler.GetName] і особливо нинішнього спадкоємця [ROOT.GetCountry.GetGovernment.GetHeir.GetName]. Довівши свою спроможність, [ROOT.GetCountry.GetGovernment.GetHeir.GetShortNameWithNoTooltip] попросив, щоб [target_character.GetShortNameWithNoTooltip] був підвищений до вищої посади при дворі, оскільки він виявився цінним членом двору."
  flavor_fra.2107.a: "Підвищити [target_character.GetShortNameWithNoTooltip] до вищої посади при дворі."
  flavor_fra.2107.b: "[target_character.GetShortNameWithNoTooltip] збереже свій поточний статус."
  flavor_fra.2107.historical_info: "Улюблений придворний при дворах як Людовика XI, так і Карла VIII, Етьєн де Веск мав значний вплив. Спочатку він заслужив прихильність Людовика XI вихованням дофіна Карла, а також доглядав за дофіном під час хвороби. Пізніше Етьєн приєднався до двору Карла, коли той став королем Франції, і був головним союзником, заохочуючи його вторгнутися до Італії в 1494 році, щоб претендувати на Неаполь."
  flavor_fra.2108.t: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.2108.desc: "Наші спроби налагодити відносини в [ShowRegionName('italy_region')] привернули увагу сумнозвісного кондотьєра [target_character.GetName]. Досвідчений і здібний полководець, [target_character.GetShortNameWithNoTooltip] вже здобув численні перемоги в конфліктах у [ShowRegionNameWithNoTooltip('italy_region')], і його знання, безсумнівно, виявляться цінними, якщо ми втрутимося на Півострові. Однак придворні висловили занепокоєння щодо ціни, яку [target_character.GetShortNameWithNoTooltip] запросив за свої послуги."
  flavor_fra.2108.a: "Найняти відомого Кондотьєра!"
  flavor_fra.2108.b: "Ми не потребуємо [target_character.GetHimHer]."
  flavor_fra.2050.t: "Криза престолонаслідування в [GetCountry('BRI').GetNameWithNoTooltip]"
  flavor_fra.2050.desc: "Виникла тривожна ситуація в [GetCountry('BRI').GetName], оскільки [bri_ruler.GetName] не має законного спадкоємця чоловічої статі та оголосив свою дочку, [breton_heir_for_marriage.GetName], своєю призначеною спадкоємицею. Хоча королівський двір зазвичай уникав би втручання у спадкування своїх підданих, ситуація в [GetCountry('BRI').GetNameWithNoTooltip] є тривожною, оскільки [breton_heir_for_marriage.GetShortNameWithNoTooltip], за чутками, заручена з родичем [GetUniqueInternationalOrganization('hre').GetLeaderTitle] [target_hre_ruler.GetName]. Така подія призвела б до того, що титули [GetCountry('BRI').GetNameWithNoTooltip] перейшли б до титулів [GetUniqueInternationalOrganization('hre').GetName].\n\nТаким чином, двір запропонував примусити [breton_heir_for_marriage.GetShortNameWithNoTooltip] одружитися з представником [fra_ruler.GetDynasty.GetName], щоб уникнути назріваючої проблемної спадкоємності, однак примус нашого підданого до такої шлюбної угоди може створити непотрібну напругу між короною та [GetCountry('BRI').GetNameWithNoTooltip]."
  flavor_fra.2050.a: "[fra_ruler.GetNameWithNoTooltip] одружиться зі спадкоємицею [GetCountry('BRI').GetNameWithNoTooltip]."
  flavor_fra.2050.b: "[ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] буде заручений з [breton_heir_for_marriage.GetShortNameWithNoTooltip]."
  flavor_fra.2050.c: "[random_male_dynasty_member.GetNameWithNoTooltip] був би гідним нареченим."
  flavor_fra.2050.d: "Не будемо втручатися в бажання [GetCountry('BRI').GetNameWithNoTooltip]."
  flavor_fra.2060.title: "Мандрівний [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_fra.2060.desc: "Порівняно з багатьма його/її попередниками, правління [fra_ruler.GetName] було відзначене численними [ROOT.GetCountry.GetGovernment.GetAdjective] поїздками та подорожами. Зі своїх численних подорожей [fra_ruler.GetNameWithNoTooltip] був/була відомий/відома тим, що прибував/прибувала без попередження, дивуючи багатьох місцевих лордів. Хоча ці неоголошені візити часто порушували щоденні справи, до моменту від'їзду [fra_ruler.GetShortNameWithNoTooltip] провінція залишалася в кращому стані.\n\nТепер, плануючи ще одну [ROOT.GetCountry.GetGovernment.GetAdjective] поїздку, [fra_ruler.GetNameWithNoTooltip] визначив/визначила два пункти призначення, [target_province_1.GetName] та [target_province_2.GetName], запитуючи думку [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб вирішити, на чому зосередитися під час наступної поїздки."
  flavor_fra.2060.a: "Місцеві чиновники [target_province_1.GetNameWithNoTooltip] були б більш ніж привітними."
  flavor_fra.2060.b: "Чиновники [target_province_2.GetNameWithNoTooltip] були менш поступливими, туди належить візит."
  flavor_fra.2060.c: "Порадити відмовитися від поїздки та заохотити [fra_ruler.GetNameWithNoTooltip] залишитися в [ShowLocationNameWithNoTooltip('paris')]."
  flavor_fra.2061.title: "Прониклива Сестра"
  flavor_fra.2061.desc: "Хоча [fra_ruler.GetName] залишається шанованим [ROOT.GetCountry.GetGovernment.GetRulerTitle], його/її сестра, [target_sibling.GetName], стала досить впливовою прихильницею при [ROOT.GetCountry.GetGovernment.GetCourtTitle] для його/її правління. Талановита та прониклива особистість, [target_sibling.GetNameWithNoTooltip] використала свій [target_sibling.GetDynasty.GetName] вплив, щоб забезпечити успішне виконання політики [fra_ruler.GetNameWithNoTooltip] радою.\n\nДеякі з найпалкіших прихильників [fra_ruler.GetNameWithNoTooltip] попросили зарезервувати місце в [ROOT.GetCountry.GetGovernment.GetCabinetTitle] для [target_sibling.GetShortNameWithNoTooltip], вважаючи її/його навички марними для політичних суперечок у [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_fra.2061.a: "Дозволити [target_sibling.GetShortNameWithNoTooltip] служити членом [ROOT.GetCountry.GetGovernment.GetCabinetTitle]."
  flavor_fra.2061.b: "Нам потрібна [target_sibling.GetHimHer] як прихильниця в [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_fra.2062.title: "Правові Реформи [fra_ruler.GetNameWithNoTooltip]"
  flavor_fra.2062.desc: "Прагнучи модернізувати державу, [fra_ruler.GetName] зробив/зробила кілька кроків у реформуванні правової системи [ROOT.GetCountry.GetName]. Серед його/її досягнень, [fra_ruler.GetNameWithNoTooltip] успішно знизив/знизила податки, одночасно збалансувавши державний бюджет. Щоб збалансувати бюджет, одна з головних реформ [fra_ruler.GetShortNameWithNoTooltip] включала скорочення пенсій для [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], що викликало гнів деяких найбагатших сімей.\n\nХоча ці реформи, безумовно, вплинули на державу, бюрократія стане більш стабільною та ефективною для майбутнього наступника [fra_ruler.GetNameWithNoTooltip]."
  flavor_fra.2062.a: "[ROOT.GetCountry.GetNameWithNoTooltip] пожне плоди цих реформ з часом."
  flavor_fra.2062.b: "Відкликати деякі реформи, щоб уникнути гніву [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_fra.2063.title: "Іконографія [fra_ruler.GetNameWithNoTooltip]"
  flavor_fra.2063.desc: "Протягом правління [fra_ruler.GetName] спостерігалося безпрецедентне зростання підтримки [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] в очах громадськості. Хоча минулі правителі часто посилалися на підтримку мас для легітимізації свого правління, [fra_ruler.GetShortNameWithNoTooltip] використовував кожну нагоду, щоб забезпечити проекцію [ROOT.GetCountry.GetGovernment.GetAdjective] влади, одночасно підносячи [fra_ruler.GetHisHer] статус вище в очах народу. Завдяки [ROOT.GetCountry.GetGovernment.GetAdjective] іконографії, зображення [fra_ruler.GetShortNameWithNoTooltip] заполонили вулиці, тоді як багато письменників почали вихваляти [ROOT.GetCountry.GetGovernment.GetRulerTitle] у публічних творах.\n\nДеякі радили бути обережними, оскільки постійне піднесення [fra_ruler.GetShortNameWithNoTooltip] може бути розцінене як єретичне [ShowReligionAdjective('catholic')] Церквою."
  flavor_fra.2063.a: "Продовжувати підтримувати [ROOT.GetCountry.GetGovernment.GetAdjective] іконографічні зусилля."
  flavor_fra.2063.b: "Зменшити іконографічні зусилля, щоб уникнути засудження з боку [ShowReligionAdjectiveWithNoTooltip('catholic')] Церкви."
  flavor_fra.2064.title: "Захисник Народу"
  flavor_fra.2064.desc_frontend: "Оскільки [fra_ruler.GetHisHer] роль була відзначена періодом іконографії та пропаганди на підтримку [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip], Генеральні штати надали титул"
  flavor_fra.2064.desc_backend: "Хоча минулі засідання Генеральних штатів впливали на популярність правителя, це вперше, коли було надано такий почесний титул."
  flavor_fra.2064.desc_king: "$flavor_fra.2064.desc_frontend$ #italic Батько Народу#! [fra_ruler.GetName] як символ сильної підтримки серед мас [ROOT.GetCountry.GetName]. $flavor_fra.2064.desc_backend$"
  flavor_fra.2064.desc_queen: "$flavor_fra.2064.desc_frontend$ #italic Мати Народу#! [fra_ruler.GetName] як символ сильної підтримки серед мас [ROOT.GetCountry.GetName]. $flavor_fra.2064.desc_backend$"
  flavor_fra.2064.a: "Прийняти титул з грацією."
  flavor_fra.301.title: "[ruler_fra.GetShortNameWithNoTooltip] та Твори [ShowInstitutionNameWithNoTooltip('renaissance')]"
  flavor_fra.301.desc: "Поширення [ShowInstitutionName('renaissance')] по всій [ROOT.GetCountry.GetName] принесло з собою відродження творів мистецтва різних художників по всій [ShowContinentName('europe')]. Багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle], включаючи [ruler_fra.GetShortName], розвинули пристрасть і повільно почали відволікати більше скарбниці на прикрашання [ROOT.GetCountry.GetGovernment.GetAdjective] палацу цими творами. З фіксацією [ROOT.GetCountry.GetGovernment.GetCourtTitle] на [ShowInstitutionNameWithNoTooltip('renaissance')] мистецтві, можливо, вдасться залучити видатних [ShowInstitutionNameWithNoTooltip('renaissance')] художників, якщо ми будемо готові їх спонсорувати."
  flavor_fra.301.a: "Запропонувати меценатство будь-яким охочим художникам!"
  flavor_fra.301.b: "Місцеві художники вже довели свою достатність."
  flavor_fra.301.c: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] негайно покладе край цій фіксації!"
  flavor_fra.302.title: "Прибуття [target_character.GetNameWithNoTooltip]"
  flavor_fra.302.desc: "На запрошення [ROOT.GetCountry.GetGovernment.GetCourtTitle] спонсорувати будь-яких охочих видатних [ShowInstitutionName('renaissance')] художників, художник [target_character.GetName] прибув до [ROOT.GetCountry.GetCapital.GetName]. Видатна та відома постать по всій [ShowRegionName('italy_region')], меценатство [target_character.GetShortNameWithNoTooltip] безсумнівно підвищило б престиж та пишність [GetCountry('FRA').GetName]. [target_character.GetNameWithNoTooltip] також привіз [target_character.GetHimHer] одну зі своїх найвидатніших робіт, #italic $mona_lisa$#!. Якщо ми погодимося спонсорувати [target_character.GetHimHer], цей легендарний твір стане скарбом [GetCountry('FRA').GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_fra.302.a: "Ми спонсоруватимемо [target_character.GetHimHer]!"
  flavor_fra.302.b: "Напевно, є кращі художники, відмовитися спонсорувати [target_character.GetHimHer]."
  flavor_fra.303.title: "Пропозиція наставництва [target_character.GetNameWithNoTooltip]"
  flavor_fra.303.desc: "Походячи з видатної [GetCountry('FRA').GetAdjective] родини [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [target_character.GetName] вже деякий час служив [ROOT.GetCountry.GetGovernment.GetCourtTitle] як релігійний вчений та радник. Однак сьогодні [target_character.GetShortNameWithNoTooltip] запропонував навчати молодого [scope_heir_fra.GetName] в надії підготувати майбутнього [ROOT.GetCountry.GetGovernment.GetRulerTitle] до правління в епоху нових ідеалів, принесених [ShowInstitutionName('renaissance')]. Хоча в минулому діти [ROOT.GetCountry.GetGovernment.GetRulerTitle] отримували [ROOT.GetCountry.GetGovernment.GetCourtTitle] освіту, пропозиція [target_character.GetShortNameWithNoTooltip] могла б допомогти підготувати [scope_heir_fra.GetShortNameWithNoTooltip] до майбутнього правління в цю нову епоху."
  flavor_fra.303.a: "[target_character.GetShortNameWithNoTooltip] був би чудовим наставником."
  flavor_fra.303.b: "Освітня система [ROOT.GetCountry.GetGovernment.GetCourtTitle] не потребує змін."
  flavor_fra.303.historical_info: "Важливий наставник для молодого Франциска, який пізніше став Франциском I Французьким у 1515 році, Франсуа де Мулен де Рошфор був однією з багатьох постатей, які вплинули на молодого Франциска ідеалами, принесеними Відродженням. Франсуа залишався важливим радником Франциска I, коли той став королем у 1515 році, і був підвищений до Великого Капелана Франції у 1519 році, обіймаючи цю посаду до своєї смерті у 1526 році."
  flavor_fra.304.title: "Гуманістичні ідеали [target_character.GetNameWithNoTooltip]"
  flavor_fra.304.desc: "Маючи певну популярність у Північній [ShowRegionName('france_region')] та Нижніх Країнах, гуманіст [target_character.GetName] з'явився в [ShowLocationName('paris')] і привернув увагу членів [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Деякі припустили, що він міг би стати цінним наставником для молодого [scope_heir_fra.GetName] завдяки [target_character.GetHisHer] гуманістичним принципам, тоді як інші висловили скептицизм. Якщо [target_character.GetShortNameWithNoTooltip] буде запропоновано шанс навчати [ROOT.GetCountry.GetGovernment.GetHeirTitle], ймовірно, [target_character.GetSheHe] скористається цією можливістю, щоб прищепити [target_character.GetHisHer] толерантні погляди [scope_heir_fra.GetHimHer]."
  flavor_fra.304.a: "Запропонувати [target_character.GetShortNameWithNoTooltip] можливість бути наставником для [scope_heir_fra.GetShortNameWithNoTooltip]."
  flavor_fra.304.b: "Гуманістичні ідеали [target_character.GetShortNameWithNoTooltip] можуть виявитися небезпечними для [scope_heir_fra.GetShortNameWithNoTooltip]."
  flavor_fra.305.title: "Реновація Луврського замку"
  flavor_fra.305.desc: "Побудований як переважно оборонний замок у XII та XIII століттях, Луврський замок давно втратив своє призначення. Прагнучи переосмислити старий замок і перетворити його на потенційну палацову резиденцію для [ROOT.GetCountry.GetGovernment.GetAdjective] родини, [ruler_fra.GetName] та [ruler_fra.GetHisHer] найближчі радники розробили плани реновації, щоб перетворити старий замок на розкішний палац. Однак інші члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] висловили незгоду, пропонуючи модернізувати Лувр, щоб замок знову міг служити своєму первісному оборонному призначенню."
  flavor_fra.305.a: "Реконструювати Лувр у розкішний палац!"
  flavor_fra.305.b: "Лувр краще служив би як модернізована оборонна фортеця."
  flavor_fra.306.title: "Розширення мисливського будиночка у Фонтенбло"
  flavor_fra.306.desc: "Хоча землі Фонтенбло здавна слугували улюбленим мисливським угіддям для [GetCountry('FRA').GetAdjective] [ROOT.GetCountry.GetGovernment.GetRulerTitle], він був лише скромним будиночком для розміщення королівської родини. Прагнучи розширити та переосмислити Фонтенбло, [ruler_fra.GetName] запросив фінансування з [ROOT.GetCountry.GetGovernment.GetAdjective] скарбниці для грандіозного розширення угідь. Однак такий проєкт може виявитися занадто дорогим для фінансів держави."
  flavor_fra.306.a: "Погодитися на прохання [ROOT.GetCountry.GetGovernment.GetRulerTitle] та розпочати розширення Фонтенбло."
  flavor_fra.306.b: "Розкішне розширення [ROOT.GetCountry.GetGovernment.GetRulerTitle] було б занадто дорогим."
  flavor_fra.307.title: "[target_character.GetNameWithNoTooltip] та [ShowWorkOfArtNameWithNoTooltip('de_asse_et_partibus_eius')]"
  flavor_fra.307.desc: "Маючи око на таланти, [fra_ruler.GetName] запросив до [ROOT.GetCountry.GetGovernment.GetCourtTitle] все більш шанованого вченого [target_character.GetName] у надії найняти [target_character.GetHerHim] як радника. Недавня публікація [ShowWorkOfArtNameWithNoTooltip('de_asse_et_partibus_eius')] за авторством [target_character.GetLastNameWithNoTooltip] призвела до запрошення від [fra_ruler.GetNameWithNoTooltip] через повагу до робіт, які [target_character.GetLastNameWithNoTooltip] виклав у зв'язку з античними монетами.\n\nХоча наукові праці [target_character.GetLastNameWithNoTooltip] призвели до зростання [target_character.GetHisHer] репутації, [target_character.GetHeShe] також є видатним гуманістом, тому [target_character.GetHisHer] приєднання до [ROOT.GetCountry.GetGovernment.GetCourtTitle] може призвести до зміни політики."
  flavor_fra.307.a: "Дозволити [target_character.GetLastNameWithNoTooltip] приєднатися до [ROOT.GetCountry.GetGovernment.GetCourtTitle] і служити художником."
  flavor_fra.307.b: "Похвалити [target_character.GetLastNameWithNoTooltip] за [target_character.GetHisHer] роботу, але дозволити [target_character.GetHimHer] повернутися до приватного життя."
  flavor_fra.308.title: "[target_character.GetNameWithNoTooltip] та [ShowWorkOfArtNameWithNoTooltip('heptameron')]"
  flavor_fra.308.desc: "Хоча покійна [target_sibling.GetName] була відома як шанована письменниця, чиї історії здобули похвалу серед [ROOT.GetCountry.GetGovernment.GetCourtTitle], багато хто пропонував зберегти [target_sibling.GetHisHer] твори як артефакт у [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nЗ цієї причини [target_character.GetName] доклав зусиль, щоб увічнити твори [target_sibling.GetNameWithNoTooltip] як [ShowWorkOfArtNameWithNoTooltip('heptameron')], кураторську збірку [target_sibling.GetHisHer] коротких оповідань, і попросив дозволу у [fra_ruler.GetName] на публікацію збірки."
  flavor_fra.308.a: "Опублікувати [ShowWorkOfArtNameWithNoTooltip('heptameron')] на честь [target_sibling.GetNameWithNoTooltip]."
  flavor_fra.308.b: "Дозволити створити лише обмежену збірку [ShowWorkOfArtNameWithNoTooltip('heptameron')]."
  flavor_fra.309.title: "#italic Колеж де Франс#!"
  flavor_fra.309.desc: "Прагнучи наслідувати рамки #italic Collegium Trilingue#!, [target_character.GetName] попросив покровительства [fra_ruler.GetName] для заснування нового коледжу в [ShowLocationName('paris')]. Йдучи слідами #italic Collegium Trilingue#!, [target_character.GetLastNameWithNoTooltip] сподівається створити новий центр навчання математики та інших спеціалізованих досліджень, таких як давньогрецька мова [ShowLanguageName('greek_language')]."
  flavor_fra.309.a: "Спонсорувати заснування нового коледжу!"
  flavor_fra.309.b: "Відмовити [target_character.GetNameWithNoTooltip] у проханні, держава не може дозволити собі такі витрати."
  flavor_fra.310.title: "Оскарження [ShowLanguageNameWithNoTooltip('latin_language')] мови"
  flavor_fra.310.desc: "Протягом століть [ROOT.GetCountry.GetName], як і багато інших держав по всій [ShowContinentName('europe')], підтримувала [ShowLanguageName('latin_language')] як основну мову для документів [ROOT.GetCountry.GetGovernment.GetCourtTitle], записів та освіти. Прагнучи викорінити монополію, яку [ShowLanguageNameWithNoTooltip('latin_language')] мала як мова знань та культури, [fra_ruler.GetName] за керівництвом [target_character.GetName] підготував указ про встановлення [ShowDialectNameWithNoTooltip('french_dialect')] як офіційної альтернативи [ShowLanguageNameWithNoTooltip('latin_language')]."
  flavor_fra.310.a: "Прийняти Указ!"
  flavor_fra.310.b: "Прагніть підтримувати [ShowLanguageNameWithNoTooltip('latin_language')] як основну мову!"
  flavor_fra.311.title: "Новий Світ"
  flavor_fra.311.desc: "Хоча оповіді про далекий континент поширювалися вже досить давно, їх здебільшого вважали вигадками. Однак з плином часу ці вигадки стали правдою. Хоча є ті, хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] заохочував експедиції до цих дивних, нових земель, більшість при [ROOT.GetCountry.GetGovernment.GetCourtTitle] висловила застереження, оскільки відволікання державних фінансів на фінансування експедицій може виявитися надто дорогим і принести загибель [ROOT.GetCountry.GetName] з невеликою вигодою."
  flavor_fra.311.a: "Розгляньмо експедиції до цих дивних, нових земель."
  flavor_fra.311.b: "Внутрішні райони [ROOT.GetCountry.GetNameWithNoTooltip] мають більший пріоритет."
  flavor_fra.312.title: "Подорож [target_character.GetNameWithNoTooltip]"
  flavor_fra.312.desc: "Після зацікавленості [ROOT.GetCountry.GetGovernment.GetCourtTitle] у спонсоруванні експедицій до Нового Світу, [target_character.GetName], [ShowCultureName('breton')] мореплавець, привернув увагу [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Хоча багато спроб [ROOT.GetCountry.GetGovernment.GetCourtTitle] залучити досвідчених [ShowCultureGroupName('italian_group')] морських дослідників зазнали невдачі, досвід [target_character.GetShortNameWithNoTooltip] може виявитися корисним у картографуванні морів Нового Світу."
  flavor_fra.312.a: "Довірити дослідницькі зусилля [target_character.GetShortNameWithNoTooltip]."
  flavor_fra.312.b: "Найняти [target_character.GetHimHer], але призначити йому інше завдання."
  flavor_fra.312.historical_info: "Жак Картьє був одним із перших французьких дослідників, що досягли Нового Світу та нанесли на карту частини Канади. Під час ранніх дослідницьких зусиль Франції італійські дослідники були в пошані за їхній досвід, але після представлення королю Франциску Жаном Ле Венуром, Жаку було доручено дослідити та відкрити «західний прохід» до ринків Азії, але замість цього він відкрив би затоку Святого Лаврентія. Відкриття Картьє Канади призвело б до заснування Францією свого першого поселення в Новому Світі, Шарльбур-Рояль, у 1541 році. Шарльбур-Рояль пізніше був би покинутий у 1543 році, і Франція більше ніколи не засновувала б постійної колонії в Новому Світі до 1605 року з Порт-Роялем в Акадії."
  flavor_fra.313.title: "Повернення Експедиції [target_character.GetShortNameWithNoTooltip]"
  flavor_fra.313.desc: "[ShowCultureName('breton')] мореплавець [target_character.GetName] повернувся до [GetCountry('FRA').GetName] з нововідкритими регіонами Нового Світу! Під час своєї розвідки [target_character.GetShortNameWithNoTooltip] зустрів племінних людей на цих дивних нових землях, і хоча вони не завдали шкоди [target_character.GetShortNameWithNoTooltip] та його дослідницькій команді, натомість вони надали цінну інформацію про навколишній регіон.\n\nЦі відкриття тепер зустріли пропозиції від [ROOT.GetCountry.GetGovernment.GetCourtTitle] заохотити експедицію до нововідкритих земель у надії на створення регіонального форпосту. Однак така експедиція також несе ризик виснаження скарбниці."
  flavor_fra.313.a: "Доручити експедицію для заселення цих земель!"
  flavor_fra.313.b: "Інші питання є більш нагальними для [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.321.title: "Альянс [GetCountry('FRA').GetAdjectiveWithNoTooltip]-[GetCountry('TUR').GetAdjectiveWithNoTooltip]"
  flavor_fra.321.desc: "Зіткнувшись із суперниками з усіх боків, геополітична ситуація [GetCountry('FRA').GetName] є такою, що веде її до великих небезпек. Зростаючий вплив навколишніх суперників [GetCountry('FRA').GetNameWithNoTooltip] змусив [ruler_fra.GetName] та [ROOT.GetCountry.GetGovernment.GetCourtTitle] розглянути малоймовірні союзи, найпроблемнішим з яких є військовий альянс з [GetCountry('TUR').GetLongName].\n\nХоча [GetCountry('PAP').GetGovernment.GetRulerTitle] оголосив [GetCountry('TUR').GetNameWithNoTooltip] ворогом [ShowReligionGroupNameWithNoTooltip('christian')], ми маємо спільних геополітичних суперників, що робить альянс з ними міцним оборонним. Однак такий альянс, ймовірно, викличе обурення в усьому [ShowReligionGroupAdjectiveWithNoTooltip('christian')] світі."
  flavor_fra.321.a: "Нечестивий Альянс, але необхідний."
  flavor_fra.321.b: "Прагнути тісніших зв'язків, але не альянсу."
  flavor_fra.321.c: "Ми ніколи не будемо союзниками [GetCountry('TUR').GetNameWithNoTooltip]!"
  flavor_fra.322.title: "Засудження в усьому [ShowReligionAdjectiveWithNoTooltip('catholic')] Світі"
  flavor_fra.322.desc: "Наше підписання нечестивого альянсу з [GetCountry('TUR').GetName] тепер принесло із собою засудження в усьому [ShowReligionAdjective('catholic')] світі. Хоча [ruler_PAP.GetName] не відлучив [ruler_fra.GetName] від церкви прямо, його засудження [GetCountry('FRA').GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] призвело до того, що наші сусіди стали більш схильними підтримувати наших суперників за наш огидний вчинок."
  flavor_fra.322.a: "Ці засудження зрештою матимуть невелике значення."
  flavor_fra.323.title: "Відновлена торгівля з Левантом"
  flavor_fra.323.desc: "Після формалізації [GetCountry('FRA').GetAdjective]-[GetCountry('TUR').GetAdjective] альянсу, торгівля між нашими двома державами пережила економічний бум. Хоча європейські торговці довго страждали від ембарго з часів [GetCountry('TUR').GetAdjective] завоювання [ShowRegionName('egypt_region')], ембарго тепер було знято для [GetCountry('FRA').GetAdjectiveWithNoTooltip] торговців. Зростання торгівлі призвело до ширшого сплеску попиту на товари з ринків як [GetCountry('FRA').GetAdjectiveWithNoTooltip], так і [GetCountry('TUR').GetAdjectiveWithNoTooltip]!"
  flavor_fra.323.a: "[ROOT.GetCountry.Custom('common_string_positive')]."
  flavor_fra.330.title: "Едикт Фонтенбло"
  flavor_fra.330.desc: "Поширення Реформації сколихнуло [ShowContinentName('europe')], і багато хто, хто перестав довіряти вченням [ShowReligionAdjective('catholic')] Церкви, тепер сповідують новозасновану [ShowReligionAdjective('lutheran')] віру. Хоча більшість [GetCountry('FRA').GetName] все ще залишається вірною [ShowReligionAdjectiveWithNoTooltip('catholic')] вірі, зростаючий вплив [ShowReligionAdjectiveWithNoTooltip('lutheran')] послідовників змусив [ROOT.GetCountry.GetGovernment.GetCourtTitle] вжити заходів.\n\n[ruler_fra.GetName] було подано прохання про ухвалення [ShowPolicyName('edict_of_fontainebleau')], едикту, спрямованого на придушення зростаючого [ShowReligionAdjectiveWithNoTooltip('lutheran')] впливу, перш ніж він зможе спричинити великі заворушення в [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.330.a: "Ми змушені діяти, щоб боротися зі зростанням єресі."
  flavor_fra.330.b: "Ми повинні прагнути підтримувати гуманістичний світогляд з [ShowReligionAdjectiveWithNoTooltip('lutheran')] послідовниками."
  flavor_fra.331.title: "[ShowReligionAdjectiveWithNoTooltip('waldensian')] різанина в Меріндолі"
  flavor_fra.331.desc: "Зростаючий хаос, спричинений поширенням навернення людей до [ShowReligionAdjective('lutheran')] віри, призвів до перенаправлення гніву на старі єресі [ShowReligionAdjective('catholic')] віри. [ShowReligionAdjective('waldensian')] народ Меріндоля, розташованого в [ShowLocationName('aix_en_provence')], спостерігав різке погіршення відносин зі своїм [ShowReligionAdjectiveWithNoTooltip('catholic')] населенням з моменту початку Реформації.\n\nХоча відносини залишалися напруженими, до [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] дійшли новини про те, що місцеві чиновники наказали влаштувати різанину будь-яких [ShowReligionAdjectiveWithNoTooltip('waldensian')] послідовників, що тепер викликало подальші заворушення по всьому [GetCountry('FRA').GetName], і багато [ShowReligionAdjectiveWithNoTooltip('lutheran')] послідовників тепер вважають, що наступними цілями стануть вони."
  flavor_fra.331.a: "Ця різанина лише ще більше розпалить напругу."
  flavor_fra.332.title: "Піднесення гугенотів"
  flavor_fra.332.desc: "Хоча спалах Реформації та її неминуче прибуття до [GetCountry('FRA').GetName] викликали побоювання у багатьох в [ROOT.GetCountry.GetGovernment.GetCourtTitle] через широкомасштабні заворушення, які [ShowReligionAdjective('lutheran')] вчення принесли іншим націям в [ShowContinentNameWithNoTooltip('europe')], її прибуття натомість залишилося дещо стриманим. Однак народження іншої віри Реформації, [ShowReligionName('calvinist')], неухильно приваблювало все більше послідовників в останні роки, викликаючи нове занепокоєння по всьому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Ці #italic гугеноти#!, як їх називали їхні [ShowReligionAdjective('catholic')] вороги, мають потенціал принести ті самі заворушення, яких ми колись боялися."
  flavor_fra.332.a: "Гугеноти становлять велику загрозу і з ними потрібно розібратися."
  flavor_fra.332.b: "Прагніть миру з гугенотами."
  flavor_fra.333.title: "Едикт Шатобріана"
  flavor_fra.333.desc: "Після зростання ворожнечі з гугенотами по всьому [GetCountry('FRA').GetName], [ROOT.GetCountry.GetGovernment.GetCourtTitle] звернувся до [ruler_fra.GetName] з проханням ухвалити більш суворий едикт. Цей [ShowPolicyName('edict_of_chateaubriant')] надасть подальші дії проти послідовників єретичних вір, що мучать [GetCountry('FRA').GetNameWithNoTooltip]. Згідно з умовами нового едикту, послідовники єретичних вір зіткнуться з суворими обмеженнями на ведення бізнесу, а вже існуючі послідовники будуть піддані конфіскації майна.\n\nТакий екстремальний захід, безсумнівно, викличе негативну реакцію з боку гугенотів, але невведення едикту також може призвести до того, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] [GetCountry('FRA').GetNameWithNoTooltip] стане ворожим до держави, розглядаючи її як небажаючу захищати [GetCountry('FRA').GetNameWithNoTooltip] від зростання єресей."
  flavor_fra.333.a: "Ми повинні вжити надзвичайних заходів!"
  flavor_fra.333.b: "Чинити опір закликам до посилення переслідувань гугенотів."
  flavor_fra.340.title: "Влада [consort_fra.GetNameWithNoTooltip]"
  flavor_fra.340.desc: "Протягом хаотичного періоду, що охопив [GetCountry('FRA').GetName], [ROOT.GetCountry.GetGovernment.GetConsortTitle] виявилася потужним союзником [ruler_fra.GetName] і впливовим голосом авторитету в раді. Хоча [consort_fra.GetShortNameWithNoTooltip] вже має великий вплив сама по собі, дозволити [consort_fra.GetHerHim] бути ще активнішою в політичних справах [ROOT.GetCountry.GetGovernment.GetCourtTitle] може виявитися важливим для майбутніх часів."
  flavor_fra.340.a: "Дозволити [consort_fra.GetShortNameWithNoTooltip] мати владу самостійно."
  flavor_fra.340.b: "Розширити вплив [consort_fra.GetShortNameWithNoTooltip] на справи [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_fra.340.c: "Довіряти [consort_fra.GetShortNameWithNoTooltip] як рівній."
  flavor_fra.341.title: "Зниження авторитету [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]"
  flavor_fra.341.desc: "Продовження зростання гугенотів по всьому [GetCountry('FRA').GetName] поставило під сумнів авторитет [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Незважаючи на постійні едикти, що обмежують практику єретичних вір Реформації, вони продовжували зростати і поширюватися в [GetCountry('FRA').GetNameWithNoTooltip]. Політики, які колись вважалися обов'язковими до виконання, стали лише пропозицією для багатьох послідовників гугенотів. Це лише питання часу, перш ніж конфлікт між єретичними послідовниками переросте в повномасштабне повстання проти держави."
  flavor_fra.341.a: "Зростаючий вплив гугенотів має бути зупинений!"
  flavor_fra.341.b: "Ми повинні продовжувати надавати поступки, щоб запобігти заворушенням."
  flavor_fra.342.title: "Змова Амбуаза"
  flavor_fra.342.desc: "Прагнучи нав'язати свою політику [ruler_fra.GetName], фракція гугенотів спробувала викрасти [ruler_fra.GetHerHim]. На щастя, злочинців було вбито до того, як [ROOT.GetCountry.GetGovernment.GetRulerTitle] могла бути завдана будь-яка шкода. Такий жахливий вчинок демонструє, наскільки гугеноти зросли в силі.\n\nБуло скликано надзвичайну раду, щоб впоратися з наслідками спроби викрадення, але одне тепер зрозуміло: гугенотів необхідно розгромити, інакше їхній постійно зростаючий вплив загрожує повномасштабним повстанням."
  flavor_fra.342.a: "Ми повинні розібратися з гугенотами, зараз або ніколи."
  flavor_fra.342.b: "Можливо, справа гугенотів справедлива."
  amboise_revolt: "Повстання гугенотів"
  flavor_fra.351.title: "[ruler_fra.GetShortNameWithNoTooltip] навертається до [ShowReligionNameWithNoTooltip('calvinist')]"
  flavor_fra.351.desc: "Хоча [GetCountry('FRA').GetName] бачила чимало фермерів та ремісників, які приймали єретичні віри Реформації, ті, хто належав до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], здебільшого трималися [ShowReligionName('catholic')]. Однак [ruler_fra.GetName] сьогодні раніше влаштував сцену в [ROOT.GetCountry.GetGovernment.GetCourtTitle], коли [ruler_fra.GetSheHe] оголосив про своє навернення до [ShowReligionName('calvinist')].\n\nМаючи намір правити як толерантний [ROOT.GetCountry.GetGovernment.GetRulerTitle], навернення [ruler_fra.GetShortNameWithNoTooltip], безсумнівно, викличе шок у [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та Генеральних штатах. Крім того, навернення [ruler_fra.GetHisHer] може виявитися корисним для подолання релігійного розколу, що охопив [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_fra.351.a: "Навернення [ruler_fra.GetShortNameWithNoTooltip] може принести релігійну стабільність."
  flavor_fra.351.b: "Нехай рада засудить навернення [ruler_fra.GetHisHer]!"
  flavor_fra.351.c: "[ruler_fra.GetShortNameWithNoTooltip] повинен негайно навернутися назад!"
  flavor_fra.352.title: "[ruler_fra.GetShortNameWithNoTooltip] налагоджує стосунки з [ShowReligionAdjectiveWithNoTooltip('calvinist')] сусідами"
  flavor_fra.352.desc: "Навернення [ruler_fra.GetShortName] принесло дипломатичні переваги, оскільки за його політики релігійної толерантності [GetCountry('FRA').GetName] вдалося відновити стосунки зі своїми [ShowReligionAdjective('calvinist')] сусідами. У випадку, якщо [ruler_fra.GetShortNameWithNoTooltip] помре, а трон [GetCountry('FRA').GetNameWithNoTooltip] повернеться до [ShowReligionAdjective('catholic')] [ROOT.GetCountry.GetGovernment.GetRulerTitle], новостворені зв'язки, які [ruler_fra.GetShortNameWithNoTooltip] зміг налагодити, стануть великим досягненням."
  flavor_fra.352.a: "Ці новознайдені друзі можуть виявитися корисними в майбутньому."
  flavor_fra.353.title: "Рада вимагає навернення"
  flavor_fra.353.desc: "Хоча в [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] були ті, хто рішуче виступав проти рішення [ruler_fra.GetShortName] навернутися до [ShowReligionName('calvinist')], на той час їм бракувало союзників, щоб кинути виклик авторитету [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Однак тепер, зростаючи все більше незадоволеними політикою [ROOT.GetCountry.GetGovernment.GetRulerTitle], багато членів ради вимагають, щоб [ruler_fra.GetShortNameWithNoTooltip] навернувся назад до [ShowReligionName('catholic')], знову прийнявши віру своїх предків.\n\nВодночас дії [ruler_fra.GetShortNameWithNoTooltip] принесли йому поміркованих союзників при [ROOT.GetCountry.GetGovernment.GetCourtTitle], і якщо він піддасться бажанням [ROOT.GetCountry.GetGovernment.GetCourtTitle], аспекти толерантної політики [ROOT.GetCountry.GetGovernment.GetRulerTitle] все ще можуть бути дозволені."
  flavor_fra.353.a: "Настав час [ruler_fra.GetShortNameWithNoTooltip] повернутися до [ShowReligionAdjectiveWithNoTooltip('catholic')] віри."
  flavor_fra.353.b: "[ruler_fra.GetShortNameWithNoTooltip]'s [ShowReligionAdjectiveWithNoTooltip('calvinist')] віра виявилася перевагою, а не перешкодою."
  flavor_fra.354.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.354.desc: "Незважаючи на своє виховання як послідовника [ShowReligionName('calvinist')], [target_character.GetName] виявився компетентною та впливовою фігурою в [GetCountry('FRA').GetAdjective] уряді, а також особистим другом [fra_ruler.GetShortName]. Будучи одним з небагатьох членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які сповідують [ShowReligionNameWithNoTooltip('calvinist')], [target_character.GetShortNameWithNoTooltip] мав мало союзників та дружби з іншими [ShowReligionAdjective('catholic')] членами [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Так само його відданість [GetCountry('FRA').GetAdjectiveWithNoTooltip] уряду та [fra_ruler.GetShortNameWithNoTooltip] також зробила його вкрай непопулярним серед послідовників гугенотів.\n\nБудучи близьким другом [fra_ruler.GetShortNameWithNoTooltip] і довівши себе як здібний міністр, деякі члени ради запропонували розширити роль [target_character.GetShortNameWithNoTooltip] і надати йому посаду Головного міністра."
  flavor_fra.354.a: "[target_character.GetShortNameWithNoTooltip] — [ROOT.GetCountry.GetGovernment.GetAdjective] союзник, призначте його Головним міністром!"
  flavor_fra.354.b: "Непопулярність [target_character.GetShortNameWithNoTooltip] може призвести до наслідків у разі підвищення."
  flavor_fra.355.title: "Пропозиція щодо Пон-Неф"
  flavor_fra.355.desc: "Хоча [ShowLocationName('paris')] протягом століть залишався одним з найбільш густонаселених [target_location.GetRank.GetNameWithNoTooltip] у [ShowContinentNameWithNoTooltip('europe')], зростання [target_location.GetRank.GetNameWithNoTooltip] за останні десятиліття призвело до деяких проблем зі старими частинами архітектури [target_location.GetRank.GetNameWithNoTooltip]. Одним з головних пунктів цього архітектурного недоліку були різні мости, що використовуються для транспортування через річку Сена, яка протікає через [target_location.GetRank.GetNameWithNoTooltip], що викликало занепокоєння серед міністрів, що збільшене використання існуючих мостів може призвести до обвалу.\n\nЩоб подолати це занепокоєння, міністри [GetCountry('FRA').GetAdjective] розробили плани нового та сучасного мосту під назвою Пон-Неф. Хоча плани нового мосту виглядають багатообіцяюче, вони принесуть фінансові витрати для держави і все ще потребують схвалення [fra_ruler.GetShortName]."
  flavor_fra.355.a: "Новий Пон-Неф добре послужить народу [ShowLocationNameWithNoTooltip('paris')]."
  flavor_fra.355.b: "Зменшити масштаб проєкту, щоб зберегти державну скарбницю."
  flavor_fra.355.c: "Наша поточна інфраструктура в порядку."
  flavor_fra.370.title: "Зближення з колоніальними справами"
  flavor_fra.370.desc: "Через релігійні заворушення, що десятиліттями охоплювали [GetCountry('FRA').GetName], [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] знову запропонував переслідувати колоніальні амбіції в Новому Світі. Хоча подорожі попередніх дослідників вже принесли [GetCountry('FRA').GetNameWithNoTooltip] багато інформації щодо нових земель, релігійний спалах Реформації змусив [ROOT.GetCountry.GetGovernment.GetCourtTitle] відмовитися від подальших колоніальних амбіцій. Однак інші колоніальні держави в [ShowContinentName('europe')] вже заснували власні поселення по всьому Новому Світу, і [GetCountry('FRA').GetAdjectiveWithNoTooltip] поселення можуть призвести до дипломатичних зривів з іншими колоніальними державами.\n\nІнші в [ROOT.GetCountry.GetGovernment.GetCourtTitle] також запропонували державі переслідувати амбіції монополізувати нові індійські торгові шляхи, і замість цього заснувати торгову компанію в [ShowContinentName('asia')]."
  flavor_fra.370.a: "Землі Нового Світу мають бути нашим пріоритетом."
  flavor_fra.370.b: "Натомість ми повинні прагнути монополізувати індійську торгівлю."
  flavor_fra.371.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.371.desc: "Походячи з родини моряків, [target_character.GetName] привернув увагу кількох радників у [ROOT.GetCountry.GetGovernment.GetCourtTitle], які прагнуть розвинути оновлені колоніальні амбіції [GetCountry('FRA').GetName]. Ці радники запропонували [fra_ruler.GetShortName], що [target_character.GetShortNameWithNoTooltip] стане чудовим дослідником для експедиції до північних регіонів Нового Світу в надії заснувати там нові [GetCountry('FRA').GetAdjectiveWithNoTooltip] поселення. Хоча [target_character.GetShortNameWithNoTooltip] має бути досить здібним, його досвід може бути краще використаний в експедиціях в інших місцях."
  flavor_fra.371.a: "Найняти [target_character.GetShortNameWithNoTooltip] для дослідження північних регіонів Нового Світу."
  flavor_fra.371.b: "У нас є інші плани щодо [target_character.GetHimHer]."
  flavor_fra.372.title: "Подорож [target_character.GetNameWithNoTooltip]"
  flavor_fra.372.desc: "Видатний авантюрист і моряк, [target_character.GetName], повернувся до [ShowLocationName('paris')] сьогодні, викликавши велику цікавість. Будучи членом одного з #italic Croissant#!, одного з кораблів, що вирушили з наміром встановити торгівлю з $india$, [target_character.GetShortNameWithNoTooltip] є однією з небагатьох осіб [GetCountry('FRA').GetAdjective] походження, що досягли тих чужих земель. Хоча #italic Croissant#! досяг своєї мети, він був атакований каперами та захоплений. Хоча [target_character.GetShortNameWithNoTooltip] тепер безпечно повернувся до [GetCountry('FRA').GetNameWithNoTooltip], його пригода на Далекий Схід викликала цікавість на вулицях.\n\nНавіть у палаці [fra_ruler.GetShortName] висловив зацікавленість особисто зустрітися з [target_character.GetShortNameWithNoTooltip] як з почесним гостем. Є ті в [ROOT.GetCountry.GetGovernment.GetCourtTitle], хто вважає, що розповіді [target_character.GetShortNameWithNoTooltip] заслуговують на те, щоб бути задокументованими назавжди."
  flavor_fra.372.a: "Доручити йому написати звіт про свої подорожі!"
  flavor_fra.372.b: "Розповіді про його подорожі захоплюючі!"
  flavor_fra.373.title: "Амбіції [fra_ruler.GetShortNameWithNoTooltip] в $india$"
  flavor_fra.373.desc: "Після письмових звітів про подорожі [target_character.GetName], [fra_ruler.GetName] розвинув фіксацію на створенні торгової факторії в $india$. Хоча [fra_ruler.GetShortNameWithNoTooltip] представив цю ідею [ROOT.GetCountry.GetGovernment.GetCourtTitle], вона була зустрінута неоднозначно, з побоюваннями, що це відволікатиме від спроб розвивати поселення в Новому Світі. Інші також згадували, що спроба створити торгову компанію в $india$ може виявитися дорогою спочатку, але згодом принесе багато торгових переваг, які [GetCountry('FRA').GetName] зможе фінансово пожинати."
  flavor_fra.373.a: "Продовжувати інтереси в $india$."
  flavor_fra.373.b: "Запобігти тому, щоб амбіції [fra_ruler.GetShortNameWithNoTooltip] стали нашим падінням."
  flavor_fra.380.title: "Інновації у праві власності на винаходи"
  flavor_fra.380.desc: "Прагнучи закласти основу для більш точного обліку нових винаходів, [fra_ruler.GetName] видав указ, що деталізує опис нових робіт, створених у [ROOT.GetCountry.GetName]. Згідно з новим указом, нові винахідники повинні будуть розкривати специфікації своїх винаходів, щоб забезпечити ексклюзивні права на виробництво своєї роботи."
  flavor_fra.380.a: "Видати указ!"
  flavor_fra.380.b: "Нам не потрібні ці процедури."
  flavor_fra.380.historical_info: "Правління Генріха II стало свідком ранніх інновацій у видачі патентних законів з винаходом голометра Абелем Фуллоном у 1551 році. Щоб забезпечити ексклюзивний патент на свою роботу, Генріх II наказав Абелю Фуллону опублікувати опис, що деталізує специфікації нововинайденого голометра. Натомість Фуллону було надано 10-річний ексклюзивний патент на санкціоновану монополію на винахід, термін дії якого закінчувався у 1561 році."
  flavor_fra.400.title: "[ShowWorkOfArtNameWithNoTooltip('ballet_de_la_merlaison')]"
  flavor_fra.400.desc: "Спочатку балет, народжений пристрастю [fra_ruler.GetName] до [ROOT.GetCountry.GetGovernment.GetCourtTitle] балету, [ShowWorkOfArtName('ballet_de_la_merlaison')] привернув багато похвал від [ROOT.GetCountry.GetGovernment.GetCourtTitle], а також від відвідуючих [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Відвідувачі балету часто хвалили відданість [fra_ruler.GetName] виставі, відзначаючи його/її участь у виконанні різних ролей до його/її внеску в розробку костюмів для акторів. Інші згадували виставу як одну з найвеличніших у всій [ShowContinentName('europe')]."
  flavor_fra.400.a: "Чудовий балет!"
  flavor_fra.400.b: "Майбутні балети проводитимуться лише для [ROOT.GetCountry.GetGovernment.GetAdjective] родини."
  flavor_fra.401.title: "[target_character.GetNameWithNoTooltip]'s Centralization Efforts"
  flavor_fra.401.desc: "Since assuming the role as a minister of the state, [target_character.GetName] has taken many steps to consolidate power and centralize the bureaucracy of [ROOT.GetCountry.GetName]. While many of [target_character.GetHisHer] predecessors have attempted to centralize power, they have largely been pushed back by many of the old feudal families that still maintain a power base of their own.\n\nNonetheless, [target_character.GetLastNameWithNoTooltip] continues drafting policies and edicts for the [ROOT.GetCountry.GetGovernment.GetCourtTitle] to enact, though some are growing increasingly worried that these centralization efforts by [target_character.GetLastNameWithNoTooltip] may once again earn the wrath of the old elite."
  flavor_fra.401.a: "Allow [target_character.GetNameWithNoTooltip] to continue [target_character.GetHisHer] efforts."
  flavor_fra.401.b: "Curtail some of [target_character.GetHisHer] efforts to prevent infuriating the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_fra.402.title: "[target_character.GetNameWithNoTooltip]'s Supression of the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_fra.402.desc: "Throughout the centuries, the old feudal nobility has remained one of the most powerful and ingrained institutions in [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetAdjective] society. Despite the transition from levy based armies to more permanent and professional ones, the various feudal noble houses of [ROOT.GetCountry.GetNameWithNoTooltip] have retained respectable power in their own right, and even maintained private armies for their own interests.\n\nSeeking to lay the foundation for breaking this threat and ensuring [ROOT.GetCountry.GetGovernment.GetAdjective] dominance, [target_character.GetName] has steadily been drafting policies targeting these families, as well as dissolving offices that have largely become symbolic, such as the Constable of [ROOT.GetCountry.GetNameWithNoTooltip]. [target_character.GetShortNameWithNoTooltip] continuedly strives to weaken the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] and has seen many delegates from the various families issue grievances with [target_character.GetHisHer] policies, with some warning they may be forced to take action."
  flavor_fra.402.a: "Now is the time to secure power for the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
  flavor_fra.402.b: "Request [target_character.GetShortNameWithNoTooltip] be cautious with [target_character.GetHisHer] policies."
  flavor_fra.402.c: "[target_character.GetShortNameWithNoTooltip] has gone too far, exile [target_character.GetHimHer]!"
  flavor_fra.403.title: "Day of the Dupes"
  flavor_fra.403.desc: "While [target_character.GetName] and [fra_queen_mother.GetName] have never seen eye to eye in the politics of the [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], the two have never once dared to openly challenge the other's authority. However, today [fra_queen_mother.GetShortNameWithNoTooltip] alongside her closest allies presented an ultimatum to [fra_ruler.GetName] demanding the firing of [target_character.GetShortNameWithNoTooltip] and [target_character.GetHisHer] exile from [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nThe growing power of [target_character.GetShortNameWithNoTooltip] in [ROOT.GetCountry.GetAdjective] internal affairs has seen [fra_queen_mother.GetShortNameWithNoTooltip] steadily lose [fra_queen_mother.GetHisHer] influence in the [ROOT.GetCountry.GetGovernment.GetCourtTitle], which has resulted in dysfunction in the [ROOT.GetCountry.GetGovernment.GetCourtTitle] by closely aligned allies. Should [fra_ruler.GetShortNameWithNoTooltip] decline [fra_queen_mother.GetShortNameWithNoTooltip]'s ultimatum, [fra_queen_mother.GetSheHe] will leave [ROOT.GetCountry.GetGovernment.GetCourtTitle] and take her closest allies with [fra_queen_mother.GetHimHer], however accepting the ultimatum would lead to the pausing of ongoing efforts by [target_character.GetShortNameWithNoTooltip]."
  flavor_fra.403.a: "[target_character.GetShortNameWithNoTooltip] is a proven minister, reject the demands."
  flavor_fra.403.b: "Demote [target_character.GetShortNameWithNoTooltip] so that [fra_queen_mother.GetShortNameWithNoTooltip] can retain political power."
  flavor_fra.403.c: "Accept [fra_queen_mother.GetShortNameWithNoTooltip] ultimatum and remove [target_character.GetShortNameWithNoTooltip] from [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  richelieu_retires_from_court: "[target_character.GetShortName] will retire from the politics of the [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_fra.404.title: "Peace of Alès"
  flavor_fra.404.desc: "While the enactment of the [ShowPolicyName('edict_of_nantes')] saw an end to religious strife in [ROOT.GetCountry.GetName], it also saw the Huguenots and other religious minorities in [ROOT.GetCountry.GetNameWithNoTooltip] gain political autonomy and power. Seeing the [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] in a stronger position than years prior, [target_character.GetName] has negotiated a revised treaty between the state and the Huguenots, seeking to affirm many of the principles set forth by the [ShowPolicyNameWithNoTooltip('edict_of_nantes')], while also rescinding some of the political privileges bestowed to the Huguenots.\n\nWhile under the new terms negotiated by [target_character.GetShortNameWithNoTooltip] the Huguenots and other religious minorities would still retain some power, it would lay the ground for the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] to one day fully rescind the [ShowPolicyNameWithNoTooltip('edict_of_nantes')]."
  flavor_fra.404.a: "Agree to the treaty negotiated by [target_character.GetShortNameWithNoTooltip]."
  flavor_fra.404.b: "Retain the current terms of the [ShowPolicyNameWithNoTooltip('edict_of_nantes')] to ensure religious peace."
  if_monarch_revokes_nantes_modifier_lost: "In the event a [ROOT.GetCountry.GetGovernment.GetRulerTitle] revokes the [ShowPolicyName('edict_of_nantes')], the below modifier will be lost."
  flavor_fra.405.title: "[target_character.GetNameWithNoTooltip] and the Military Expenses of the State"
  flavor_fra.405.desc: "Seeking to ensure the security of [ROOT.GetCountry.GetName] both financially and militarily, [target_character.GetName] has been lobbying members of the [ROOT.GetCountry.GetGovernment.GetCourtTitle] as well as [fra_ruler.GetName] to raise a new [ShowGovernmentReformName('gabelle')] and [ShowLawName('fra_taille')] tax. Military expenses in recent times have proven to be a great strain on the state, and with the evolving innovations, the risk of [ROOT.GetCountry.GetNameWithNoTooltip] falling behind militarily would leave the state in a precarious situation.\n\nWhile in the past the [ShowGovernmentReformNameWithNoTooltip('gabelle')] and [ShowLawNameWithNoTooltip('fra_taille')] have been levied, the proposal set forth by [target_character.GetShortNameWithNoTooltip] would generate considerable revenue for the state, and allow for some military reforms. While these reforms could prove helpful, it also brings with it the risk of upsetting the populace with the severity of the tax."
  flavor_fra.405.a: "Adopt the measure, we cannot risk falling behind militarily."
  flavor_fra.405.b: "Strive for a modest tax to avoid overtaxing the populace."
  flavor_fra.405.c: "Reject the proposal, we cannot inflict such a burden on the populace."
  flavor_fra.406.title: "Засудження єретичної дипломатії [target_character.GetNameWithNoTooltip]"
  flavor_fra.406.desc: "Після підписання Алеського миру, укладеного [target_character.GetName], деякі видатні радники [ROOT.GetCountry.GetGovernment.GetCourtTitle] відкрито засуджують політику [target_character.GetShortNameWithNoTooltip], стверджуючи, що [target_character.GetHeShe] пропонує амністію гугенотам, які раніше майже призвели до руїни [ROOT.GetCountry.GetName]. Хоча й не тими самими словами, що деякі чиновники [ROOT.GetCountry.GetGovernment.GetCourtTitle], інші видатні [ROOT.GetCountry.GetAdjectiveWithNoTooltip] державні діячі висловили розчарування тим, як [target_character.GetShortNameWithNoTooltip] вирішує геополітичні справи з сусідніми єретичними державами."
  flavor_fra.406.a: "Дипломатичний акт [target_character.GetShortNameWithNoTooltip] приніс нам перевагу."
  flavor_fra.406.b: "Припинити будь-яку подальшу дипломатію з єретиками!"
  flavor_fra.407.title: "Указ [GetCurrentYear] року"
  flavor_fra.407.desc: "Після отримання листів від кількох колоніальних губернаторів наших колоніальних поселень спостерігається постійне зростання кількості місцевих тубільців, які асимілюються та приєднуються до місцевого населення. Хоча звіти губернаторів свідчать, що ці взаємодії були здебільшого плідними, більшість [ROOT.GetCountry.GetAdjective] колоніальних законів застосовуються лише до природжених [ROOT.GetCountry.GetAdjectiveWithNoTooltip] людей у цих поселеннях.\n\nПрагнучи врахувати зростаючу асиміляцію корінного населення в наших колоніальних поселеннях, [target_character.GetName] розробили новий Указ, який проголошує, що будь-які тубільці, які повністю приймуть [ShowReligionName('catholic')], вважатимуться природними громадянами [ROOT.GetCountry.GetNameWithNoTooltip] і, як такі, користуватимуться всіма перевагами та захистом держави."
  flavor_fra.407.a: "Прийняти Указ!"
  flavor_fra.407.b: "Видати більш автономний Указ."
  flavor_fra.408.title: "Смерть [target_character.GetNameWithNoTooltip]"
  flavor_fra.408.desc: "Вірно прослуживши державі багато років як могутній міністр і принісши багато досягнень державі, [fra_ruler.GetName] та багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] були глибоко засмучені, дізнавшись про смерть [target_character.GetName].\n\nХоча його перебування на посаді бачило багато спроб зміцнити владу [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та держави, це також принесло йому багато ворогів, як при [ROOT.GetCountry.GetGovernment.GetCourtTitle], так і за кордоном. Ймовірно, пройде деякий час, перш ніж [ROOT.GetCountry.GetName] матиме такого відомого міністра, як [target_character.GetShortNameWithNoTooltip]."
  flavor_fra.408.a: "[target_character.GetShortNameWithNoTooltip] залишив тривалий вплив на [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.408.b: "Суперечки навколо [target_character.GetShortNameWithNoTooltip] більше не турбуватимуть нас."
  flavor_fra.410.title: "Божественне право на правління"
  flavor_fra.410.desc: "Хоча традиційно [ROOT.GetCountry.GetGovernment.GetRulerTitle] вживає заходів для формування тісно пов'язаної ради з головним міністром для порад, [target_character.GetName] вирішив [target_character.GetHerselfHimself] порушити цю давню традицію. Вважаючи [target_character.GetHerselfHimself] обдарованим [ROOT.GetCountry.GetGovernment.GetRulerTitle], чиє власне правління санкціоноване божественно. [target_character.GetShortNameWithNoTooltip] оголосив [target_character.GetHisHer] раді, що [target_character.GetHeShe] має намір правити без керівництва головного міністра, і замість цього візьме на себе цю роль [target_character.GetHerselfHimself]. Очевидно, що [target_character.GetShortNameWithNoTooltip] має намір закріпити [target_character.GetHisHer] спадщину як грізного та престижного правителя [ROOT.GetCountry.GetName]."
  flavor_fra.410.a: "Правління [target_character.GetShortNameWithNoTooltip] буде незабутнім."
  flavor_fra.410.b: "Правління [target_character.GetShortNameWithNoTooltip], сподіваємося, стане епохою стабільності та миру."
  fra_sun_king_adm_prestige: "Вибір цього варіанту призведе до більшого збільшення #G адміністративних#! навичок над #T дипломатичними#! навичками в майбутніх подіях."
  fra_sun_king_dip_stability: "Вибір цього варіанту призведе до більшого збільшення #G дипломатичних#! навичок над #T адміністративними#! навичками в майбутніх подіях."
  if_fra_ruler_designate_dies: "Якщо [Concept('target_character.GetName] помре, збільшення навичок від певних [ROOT.GetCountry.GetAdjective] [dynamic_historical_events', 'CONCEPT_PLACEHOLDER')|e] буде #R зменшено вдвічі#!."
  flavor_fra.411.title: "Регентство [scope_former_consort.GetNameWithNoTooltip]"
  flavor_fra.411.desc: "У разі [scope_ruler_dead.GetHisHer] смерті, [scope_ruler_dead.GetName] оголосив, що для молодого [ROOT.GetCountry.GetGovernment.GetHeirTitle] буде сформована регентська рада з найближчих радників [scope_ruler_dead.GetShortNameWithNoTooltip], щоб підготувати [scope_heir_fra.GetName] до [scope_heir_fra.GetHisHer] майбутнього сходження на престол. Однак, [scope_former_consort.GetName], за підтримки видатних союзників [ROOT.GetCountry.GetGovernment.GetCourtTitle], таких як [target_character.GetName], вимагали, щоб [scope_former_consort.GetHeShe] була призначена виконуючою обов'язки регента, прагнучи підірвати останні бажання [scope_ruler_dead.GetNameWithNoTooltip].\n\nХоча [scope_ruler_dead.GetShortNameWithNoTooltip] бажав, щоб [scope_heir_fra.GetShortNameWithNoTooltip] керувався регентською радою, амбіції [scope_former_consort.GetShortNameWithNoTooltip] можуть принести нестабільність, якщо її не призначать регентом."
  flavor_fra.411.a: "Дозволити [scope_former_consort.GetShortNameWithNoTooltip] правити як регенту."
  flavor_fra.411.b: "Ми виконаємо останні бажання [scope_ruler_dead.GetShortNameWithNoTooltip]."
  fra_designated_regency_council: "Буде призначено нового регента для керівництва [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.412.title: "Підозра у корупції [target_character.GetNameWithNoTooltip]"
  flavor_fra.412.desc: "Ключовий міністр державних фінансів, [target_character.GetName] обіймає цю посаду вже досить давно. Однак останніми місяцями ширяться чутки, що [target_character.GetShortNameWithNoTooltip] почав вести розкішніший спосіб життя, помітно розширивши свої особисті володіння. Це призвело до припущень, що [target_character.GetShortNameWithNoTooltip] може використовувати свою посаду міністра фінансів для розкрадання коштів з [ROOT.GetCountry.GetGovernment.GetAdjective] скарбниці для фінансування власного багатства. Хоча багато хто в раді закликав до розслідування за підозрою в корупції, доля міністра зрештою залежить від [fra_ruler.GetName]."
  flavor_fra.412.a: "[target_character.GetLastNameWithNoTooltip] має негайно піти у відставку!"
  flavor_fra.412.b: "Докорити йому, але дозволити зберегти поточну посаду."
  flavor_fra.412.c: "Його ймовірна корупція – лише безпідставні чутки."
  fouquet_will_resign_and_retire_from_life: "[target_character.GetName] відійде від політичних справ і залишить [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_fra.413.title: "Оподаткування аристократії"
  flavor_fra.413.desc: "Хоча стара [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ROOT.GetCountry.GetName] довго користувалася особливими привілеями, деякі з яких дозволяли багатьом вести розкішний спосіб життя, [fra_ruler.GetName] докладає зусиль для встановлення першого прямого податку на членів старої аристократії. Хоча багато попередніх податкових кодексів скасовували спеціальні винятки для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], такі як [ShowLawName('fra_taille')], пропозиція [fra_ruler.GetShortNameWithNoTooltip] ознаменувала б кінець століть привілеїв звільнення, наданих цим елітам.\n\nХоча ті, хто належить до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], безсумнівно, висловлять свої претензії до [fra_ruler.GetShortNameWithNoTooltip], збереження [ROOT.GetCountry.GetGovernment.GetRulerTitle] може дозволити відбити будь-які загрози, хоча також може бути досягнутий компроміс, як і в багатьох попередніх податкових кодексах минулого."
  flavor_fra.413.a: "Настав час старій [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] сплатити свої борги."
  flavor_fra.413.b: "Прагнути компромісу, щоб запобігти повному відчуженню."
  flavor_fra.413.c: "Ми повинні уникати гніву [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_fra.414.title: "Армійська реформа [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.414.desc: "Служачи як вірний радник, так і канцлер держави, [target_character.GetName] довів свою більш ніж достатню спроможність у зміцненні правління [fra_ruler.GetName].\n\nПрагнучи ще більше зміцнити правління [fra_ruler.GetShortNameWithNoTooltip], [target_character.GetLastNameWithNoTooltip] висунув плани реформ, які перетворять постійну армію [ROOT.GetCountry.GetNameWithNoTooltip] на більш професійну, водночас зміцнюючи владу [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Щоб ще більше централізувати владу до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], високі військові посади тепер будуть призначатися більше за заслугами, а не за зв'язками зі старою [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_fra.414.a: "Дозволити [target_character.GetLastNameWithNoTooltip] прокласти шлях для реформ!"
  flavor_fra.414.b: "Прийняти більшість реформ, але зберегти особливі привілеї, надані лідерам [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_fra.415.title: "Кодекс Людовика"
  flavor_fra.415.desc: "Прагнучи уніфікувати закони країни, [fra_ruler.GetName] разом із багатьма [fra_ruler.GetHisHer] найближчими радниками в [ROOT.GetCountry.GetGovernment.GetCourtTitle] завершили створення #italic Кодексу Людовика#!, першої спроби уніфікованого правового кодексу для всієї [ROOT.GetCountry.GetName]. Протягом століть [ROOT.GetCountry.GetNameWithNoTooltip] існувала з двома постійними, співіснуючими правовими системами: північні провінції керувалися старими звичаєвими законами, тоді як у південних провінціях римське цивільне право слугувало основним правовим кодексом.\n\nХоча Кодекс Людовика уніфікував би правовий кодекс [ROOT.GetCountry.GetNameWithNoTooltip], деякі радники закликали до обережності у поспішному його впровадженні, оскільки деякі провінції, особливо південні, які раніше керувалися римським правом, можуть зіткнутися з перешкодами для прийняття нового правового кодексу."
  flavor_fra.415.a: "Настав час, щоб уся [ROOT.GetCountry.GetNameWithNoTooltip] дотримувалася одного, уніфікованого закону."
  flavor_fra.415.b: "Поки що прийняти Кодекс лише в північних провінціях [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.415.c: "Зберігати чинні співіснуючі правові кодекси."
  flavor_fra.416.title: "Едикт [fra_ruler.GetShortNameWithNoTooltip] про рабство"
  flavor_fra.416.desc: "З часів перших [ROOT.GetCountry.GetAdjective] колоніальних поселень рабство залишалося провокаційною практикою серед колоній, причому багато перших поселень покладалися на поневолення тих, хто належав до різних корінних культур. Хоча [fra_ruler.GetName] не забороняв цю практику повністю, він розробив новий [ROOT.GetCountry.GetGovernment.GetAdjective] указ, що намагається гуманізувати цю практику, забороняючи будь-яке розділення членів сімей рабів, а також оголошуючи, що кожен новий раб повинен бути охрещений за [ShowReligionAdjective('catholic')] традиціями."
  flavor_fra.416.a: "Практику рабства в колоніях необхідно приборкати."
  flavor_fra.416.b: "Видати Едикт і залишити колоніальним губернаторам забезпечення виконання нового закону."
  flavor_fra.417.title: "Деволюція Нижніх Земель"
  flavor_fra.417.desc: "Хоча Нижні Землі здебільшого залишалися сукупністю провінцій, розташованих у більшій [GetUniqueInternationalOrganization('hre').GetName], вони також були предметом суперечок за вплив між [ROOT.GetCountry.GetName], [GetCountry('ENG').GetName] та різними імператорами Священної Римської імперії. Бачачи імперію в ослабленому стані, [fra_ruler.GetName] тепер розглядає регіон як значною мірою відокремлений від імперії, а отже, як потенційний шлях для експансії."
  flavor_fra.417.a: "Настав час захопити ці території та приєднати їх."
  flavor_fra.417.b: "[GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip] може бути ослаблена, але краще уникнути конфлікту."
  claims_on_lowland_culture_countries: "[Concept('ROOT.GetCountry.GetName] отримає [casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти сусідніх націй, розташованих у Нижніх Землях."
  flavor_fra.418.title: "Зближення з [GetCountry('TUR').GetNameWithNoTooltip]"
  flavor_fra.418.desc: "Хоча відносини між [GetCountry('TUR').GetName] та [ROOT.GetCountry.GetName] давно припинилися, дехто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] припустив, що, можливо, настав час [fra_ruler.GetName] та державі знову відновити відносини з [GetCountry('TUR').GetNameWithNoTooltip]. Хоча дипломатичне становище [ROOT.GetCountry.GetNameWithNoTooltip] не таке хистке, як колись, а відкриття Нового Світу значною мірою переструктурує політичні союзи [ShowContinentName('europe')], відновлення сприятливої політики щодо [GetCountry('TUR').GetNameWithNoTooltip] може призвести до відродження [GetCountry('FRA').GetAdjectiveWithNoTooltip]-[GetCountry('TUR').GetAdjectiveWithNoTooltip] альянсу."
  flavor_fra.418.a: "Відправити сановників до [GetCountry('TUR').GetNameWithNoTooltip]."
  flavor_fra.418.b: "[GetCountry('TUR').GetAdjectiveWithNoTooltip] не пропонує нам жодної стратегічної цінності."
  flavor_fra.419.title: "Войовнича політика [target_character.GetNameWithNoTooltip]"
  flavor_fra.419.desc: "Прагнучи розширити геополітичний вплив [ROOT.GetCountry.GetName], [target_character.GetName] зайняв войовничу позицію у реалізації територіальних амбіцій. Хоча в минулому [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetRulerTitle] не ухилявся б від акту завоювання, войовнича політика [target_character.GetShortNameWithNoTooltip] надала [ROOT.GetCountry.GetNameWithNoTooltip] можливість продемонструвати свою доблесть на європейській арені. Хоча війна може бути жорстокою, це найкращий спосіб, яким [target_character.GetShortNameWithNoTooltip] може забезпечити повагу до [ROOT.GetCountry.GetNameWithNoTooltip] на світовій арені."
  flavor_fra.419.a: "Могутність [ROOT.GetCountry.GetNameWithNoTooltip] має бути продемонстрована на світовій арені."
  flavor_fra.419.b: "Ми повинні послабити нашу войовничу політику, щоб уникнути ризиків коаліції."
  flavor_fra.421.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та Версаль"
  flavor_fra.421.desc: "З моменту свого будівництва Версаль швидко став популярним місцем збору для [fra_ruler.GetName] та [ROOT.GetCountry.GetGovernment.GetAdjective] родини, щоб розмістити членів різних відомих політичних сімей у [ROOT.GetCountry.GetName]. Хоча палац був побудований як символ [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s «Божественного Права на Правління», він також став символом політичного фаворитизму та статусу для тих, кому дозволено проживати в ньому деякий час.\n\nБагато близьких радників [fra_ruler.GetHerHis] закликали [fra_ruler.GetShortNameWithNoTooltip] розширити запрошення до багатьох впливових сімей, які все ще занурені у старий феодальний устрій, щоб [ROOT.GetCountry.GetGovernment.GetCourtTitle] їх проживати у Версалі. Залицяння до цих старих сімей дозволило б владі ще більше консолідуватися навколо [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_fra.421.a: "Розширити запрошення видатним родинам проживати у Версалі."
  flavor_fra.421.b: "Палац був побудований для задоволення [ROOT.GetCountry.GetGovernment.GetAdjective] родини, нехай так і залишається."
  this_may_lead_to_permanent_weakening_of_the_nobility: "Дозвіл членам [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] проживати у Версалі може призвести до постійного ослаблення їхнього впливу."
  flavor_fra.422.title: "Спокушання [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_fra.422.desc: "Зусилля щодо забезпечення лояльності та політичного впливу [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] шляхом надання їм резиденції у Версалі виявилися досить ефективними: багато членів різних політичних сімей все частіше обирають проживання в палаці, а не у власних маєтках. Щоразу, коли у Версалі проводяться [ROOT.GetCountry.GetGovernment.GetAdjective] бали, ці члени здаються майже зачарованими розкішшю палацу і швидко підтримують тісні зв'язки з [fra_ruler.GetName], щоб залишатися в [fra_ruler.GetHisHer] милості.\n\nКолись Версаль був занозою в боці [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetRulerTitle], але тепер він призвів до майже повного спокушання влади, якою володіли багато хто з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Однак тепер здається, що [fra_ruler.GetShortNameWithNoTooltip] справді став нерівним, неперевершеним [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_fra.422.a: "Велич Версаля назавжди затьмарила [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_fra.422.b: "Історична влада [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] все ще має бути поважана."
  flavor_fra.423.title: "Скасування [ShowPolicyNameWithNoTooltip('edict_of_nantes')]"
  flavor_fra.423.desc: "Бачачи, що влада [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] є беззаперечною, [fra_ruler.GetName] скликав раду при [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб скасувати давній [ShowPolicyName('edict_of_nantes')], який надавав багато привілеїв гугенотам та іншим релігійним меншинам [ROOT.GetCountry.GetName]. Хоча влада гугенотів ослабла в останні десятиліття, призупинення Едикту, безсумнівно, відродить деякі релігійні напруження, хоча такі напруження навряд чи зрівняються з тими, що були десятиліттями раніше. Однак скасування привілеїв, наданих [ShowPolicyNameWithNoTooltip('edict_of_nantes')], може призвести до втечі багатьох послідовників гугенотів з [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.423.a: "Настав час скасувати цей Едикт назавжди."
  flavor_fra.423.b: "Затягнути зусилля, [ShowPolicyNameWithNoTooltip('edict_of_nantes')] має бути збережений!"
  edict_of_nantes_disabled: "[ShowLawName('fra_reformation_tolerance_edicts')] буде #R вимкнено#!."
  flavor_fra.424.title: "Наслідки скасування [ShowPolicyNameWithNoTooltip('edict_of_nantes')]"
  flavor_fra.424.desc: "Хоча призупинення [ShowPolicyName('edict_of_nantes')] [fra_ruler.GetName] призвело до того, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] відновила значну владу, яку вона поступилася гугенотам у минулі десятиліття, це також принесло деякі згубні наслідки для [ROOT.GetCountry.GetName]. Побоюючись повернення політики примусового навернення, багато гугенотів втекли з [ROOT.GetCountry.GetNameWithNoTooltip], щоб уникнути можливих переслідувань. Крім того, багато видатних ремісників та вчених засуджують призупинення едикту [fra_ruler.GetNameWithNoTooltip]. Більше того, деякі союзники при [ROOT.GetCountry.GetGovernment.GetCourtTitle] висловили невдоволення тим, що хоча [ShowPolicyNameWithNoTooltip('edict_of_nantes')] послабив владу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], він приніс релігійне врегулювання в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.424.a: "Це лише незначна незручність."
  flavor_fra.425.title: "Розквартирування драгунів"
  flavor_fra.425.desc: "Після скасування [ShowPolicyName('edict_of_nantes')], [fra_ruler.GetName] та [ROOT.GetCountry.GetGovernment.GetCourtTitle] прагнули вжити заходів, щоб запобігти повторному зануренню [ROOT.GetCountry.GetName] у релігійні чвари. Хоча це дорогий метод, деякі радники при [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували, щоб [fra_ruler.GetShortNameWithNoTooltip] видав [ROOT.GetCountry.GetGovernment.GetAdjective] указ, що санкціонує розквартирування драгунських офіцерів у будинках гугенотів. Хоча такий процес, безсумнівно, буде коштовним для фінансів держави, він значно перешкодить будь-яким потенційним єретичним повстанням."
  flavor_fra.425.a: "Видати указ!"
  flavor_fra.425.b: "Це було б занадто дорого для держави, відмовитися від ідеї!"
  flavor_fra.426.title: "Меценатство чиновників [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_fra.426.desc: "Хоча минулі [ROOT.GetCountry.GetGovernment.GetRulerTitle] були відомі своїм меценатством видатних діячів, як при [ROOT.GetCountry.GetGovernment.GetCourtTitle], так і за кордоном, [fra_ruler.GetName] доклав значних зусиль, щоб запропонувати меценатство багатьом видатним чиновникам при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Хоча [ROOT.GetCountry.GetGovernment.GetAdjective] скарбниця дозволила меценатство [fra_ruler.GetShortNameWithNoTooltip], деякі фінансові радники [ROOT.GetCountry.GetGovernment.GetRulerTitle] стурбовані тим, що надмірне меценатство може загрожувати фінансовим крахом скарбниці, хоча переваги меценатства [fra_ruler.GetShortNameWithNoTooltip] значно вплинули на [fra_ruler.GetHisHer] імідж як престижного та заможного [ROOT.GetCountry.GetGovernment.GetRulerTitle] по всій [ShowContinentName('europe')]."
  flavor_fra.426.a: "Дозволити [fra_ruler.GetShortNameWithNoTooltip] продовжувати [fra_ruler.GetHisHer] меценатську діяльність."
  flavor_fra.426.b: "Попросити [ROOT.GetCountry.GetGovernment.GetRulerTitle] зменшити [fra_ruler.GetHisHer] меценатство, щоб зменшити тягар на державу."
  flavor_fra.427.title: "Відродження Французької академії"
  flavor_fra.427.desc: "Заснована [target_character.GetName], Французька академія залишалася одним з видатних центрів літератури та мистецтва по всій [ShowContinentName('europe')]. Однак в останні роки академія зазнавала труднощів через безгосподарність своїх керівників. Прагнучи забезпечити, щоб академія залишалася маяком [ROOT.GetCountry.GetAdjective] культури, [fra_ruler.GetName] запросив кошти з [ROOT.GetCountry.GetGovernment.GetAdjective] скарбниці для відродження Академії, а також для підтримки тісних відносин з державою в майбутньому."
  flavor_fra.427.a: "[fra_ruler.GetShortNameWithNoTooltip] забезпечить продовження існування Французької академії."
  flavor_fra.427.b: "Фінансувати Французьку академію, але не надто багато за рахунок держави."
  flavor_fra.428.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Академія танцю"
  flavor_fra.428.desc: "Одним з перших едиктів, виданих [fra_ruler.GetName], було заснування #italic [ROOT.GetCountry.GetGovernment.GetAdjective|U] Академії танцю#!, першої у своєму роді в [ShowContinentName('europe')]. З юності [fra_ruler.GetShortNameWithNoTooltip] тісно займався цим мистецтвом і розглядає [fra_ruler.GetHisHer] особистий досвід у ньому як демонстрацію [fra_ruler.GetHisHer] особистої влади.\n\nНещодавно в [ShowLocationName('paris')] відбувся приватний балет, на якому [fra_ruler.GetShortNameWithNoTooltip] привернув увагу багатьох представників вищої еліти, оскільки [fra_ruler.GetShortNameWithNoTooltip] разом з кількома елітами академії виконав балет, причому [ROOT.GetCountry.GetGovernment.GetRulerTitle] зображував Аполлона, Короля-Сонце."
  flavor_fra.428.a: "[fra_ruler.GetShortNameWithNoTooltip] має вишуканий смак до мистецтв!"
  flavor_fra.428.b: "Такі мистецтва, безсумнівно, зникнуть з часом."
  flavor_fra.429.title: "Неперевершений [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_fra.429.desc: "З моменту [fra_ruler.GetHisHer] сходження на престол та оголошення про те, що [fra_ruler.GetHeShe] правитиме без великого міністра, [fra_ruler.GetName] довів [fra_ruler.GetHerselfHimself], що є одним з найпрестижніших [ROOT.GetCountry.GetGovernment.GetRulerTitle] в [ROOT.GetCountry.GetAdjective] історії своїми численними вчинками. Хоча влада [fra_ruler.GetShortNameWithNoTooltip] широко шанується при [ROOT.GetCountry.GetGovernment.GetCourtTitle] та в [ROOT.GetCountry.GetNameWithNoTooltip], як друзі, так і вороги по всій [ShowContinentName('europe')] висловлювали похвалу репутації, яку [fra_ruler.GetShortNameWithNoTooltip] створив для [fra_ruler.GetHerselfHimself]. Хоча одного дня правління [fra_ruler.GetShortNameWithNoTooltip] закінчиться, [fra_ruler.GetHeShe], безсумнівно, буде пам'ятатися як найпрестижніший [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.429.a: "Правління [fra_ruler.GetShortNameWithNoTooltip] буде пам'ятним."
  flavor_fra.430.title: "Вплив у [indochina_french_sphere.GetNameWithNoTooltip]"
  flavor_fra.430.desc: "Хоча [ROOT.GetCountry.GetAdjective] торговці все більше активізуються у східній торгівлі, кілька східних країн також привернули увагу [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle] разом з [fra_ruler.GetName]. Деякі радники при [ROOT.GetCountry.GetGovernment.GetCourtTitle] зацікавилися [indochina_french_sphere.GetName], [indochina_french_sphere.GetFlavorRank], що став би цінним партнером у регіоні, і запропонували заснувати посольство. Інші ж, однак, розглядають [indochina_french_sphere.GetNameWithNoTooltip] як посередній [indochina_french_sphere.GetFlavorRank] і потенційно регіон для встановлення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] протекторату."
  flavor_fra.430.a: "Прагнути встановити відносини в [indochina_french_sphere.GetNameWithNoTooltip] за допомогою посольства."
  flavor_fra.430.b: "Розширимо наш прямий вплив у [indochina_french_sphere.GetNameWithNoTooltip]."
  flavor_fra.431.title: "Єзуїтські місії в [GetCountry('CHI').GetNameWithNoTooltip]"
  flavor_fra.431.desc: "Хоча відносини між [ROOT.GetCountry.GetName] та [GetCountry('CHI').GetName] були офіційно встановлені вже досить давно, нинішній [GetCountry('CHI').GetAdjectiveWithNoTooltip] [GetCountry('CHI').GetGovernment.GetRulerTitle] чинить опір дозволу іноземному впливу на повсякденне життя населення [GetCountry('CHI').GetNameWithNoTooltip].\n\nПрагнучи поширити слово [ShowReligionName('catholic')], [target_character.GetName] разом з іншими єзуїтами звернулися до [fra_ruler.GetName] з проханням дозволити їм в'їхати до [GetCountry('CHI').GetNameWithNoTooltip] разом з нашим наступним візитом сановників до держави. Хоча це допомогло б поширити істинну віру, це несе ризики спричинення дипломатичного інциденту."
  flavor_fra.431.a: "Нехай [target_character.GetShortNameWithNoTooltip] поширює [ShowReligionAdjectiveWithNoTooltip('catholic')] віру за кордоном!"
  flavor_fra.431.b: "Заборонити єзуїтам, щоб запобігти дипломатичному інциденту."
  nothing_happens_with_jesuits: "Єзуїти будуть прозелітизувати в мирі."
  flavor_fra.432.title: "Екзотичний подарунок від [GetCountry('POR').GetAdjectiveWithNoTooltip] [GetCountry('POR').GetGovernment.GetRulerTitle]"
  flavor_fra.432.desc: "Хоча будівництво Версаля бачило прибуття багатьох видатних сановників з різних країн по всій [ShowContinentNameWithNoTooltip('europe')], нечасто [ROOT.GetCountry.GetGovernment.GetCourtTitle] приймає прибуття іншого [GetCountry('POR').GetGovernment.GetRulerTitle] особисто. Як жест доброї волі та дружби, [por_ruler.GetName] та [por_ruler.GetHisHer] оточення привезли з собою екзотичну тварину з [ShowContinentName('africa')], #italic слона#!. Хоча [ROOT.GetCountry.GetGovernment.GetCourtTitle] має записи про слонів з минулих їхніх прибуття до [ROOT.GetCountry.GetName], це вперше багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [fra_ruler.GetName] мали задоволення бачити цей вид на власні очі. [por_ruler.GetShortNameWithNoTooltip] сподівається, що подарунок екзотичного слона для особистого звіринця [fra_ruler.GetShortNameWithNoTooltip] допоможе налагодити добрі відносини між [ROOT.GetCountry.GetNameWithNoTooltip] та [GetCountry('POR').GetNameWithNoTooltip]."
  flavor_fra.432.a: "Прийміть [por_ruler.GetShortNameWithNoTooltip] у Версалі та люб'язно прийміть [por_ruler.GetHisHer] екзотичний подарунок."
  flavor_fra.432.b: "Відхилити щедрий подарунок, але виявити гостинність [GetCountry('POR').GetAdjectiveWithNoTooltip] [GetCountry('POR').GetGovernment.GetRulerTitle]."
  flavor_fra.433.title: "Правління Чотирьох Рад"
  flavor_fra.433.desc: "Прагнучи сформувати ефективну раду радників для вирішення різноманітних питань, що стоять перед [ROOT.GetCountry.GetName], [fra_ruler.GetName] вирішив делегувати різні державні справи чотирьом різним радам. Вища Рада є найважливішою з цих рад, що займається державними справами. Рада Повідомлень формує раду, що займається звітами про процвітання та інші економічні справи, що відбуваються в провінціях. Релігійні справи держави делегуються Раді Совісті, тоді як, нарешті, Королівська Рада Фінансів керує державною скарбницею."
  flavor_fra.433.a: "Прийняти систему чотирьох рад!"
  flavor_fra.433.b: "Нам не потрібна ця делегація державних справ."
  flavor_fra.440.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.440.desc: "Довівши себе як визнаний експерт у мистецтві фортифікації, [target_character.GetName] швидко став улюбленим радником і близьким другом [fra_ruler.GetName]. Хоча [target_character.GetShortNameWithNoTooltip] має кілька почесних титулів, багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] припускав, що настав час призначити [target_character.GetHeShe] Маршалом [ROOT.GetCountry.GetName], оскільки він вже довів себе як здібна та стратегічна особистість."
  flavor_fra.440.a: "Призначити [target_character.GetShortNameWithNoTooltip] Маршалом!"
  flavor_fra.440.b: "Нинішні титули [target_character.GetShortNameWithNoTooltip] йому найкраще підходять."
  flavor_fra.441.title: "Експертиза [target_character.GetNameWithNoTooltip]"
  flavor_fra.441.desc: "З моменту вступу на посаду Маршала, [target_character.GetName] взяв на себе керівництво оновленням укріплень по всьому [ROOT.GetCountry.GetName], особливо тих, що знаходяться на ключових стратегічних позиціях. Хоча [target_character.GetShortNameWithNoTooltip] безсумнівно є майстром у мистецтві оборони, його знання укріплень по всій [ShowContinentNameWithNoTooltip('europe')] також призвели до нових планів щодо подолання укріплень наших суперників у разі війни."
  flavor_fra.441.a: "Використаймо тактику [target_character.GetShortNameWithNoTooltip]!"
  flavor_fra.441.b: "Пріоритезувати вивчення наступальної тактики [target_character.GetShortNameWithNoTooltip] над зусиллями з укріплення."
  flavor_fra.460.title: "Введення перуки"
  flavor_fra.460.desc: "Зі страху бути сприйнятим як слабкий, [fra_ruler.GetName] нещодавно почав носити #italic перуку#!, або парик, як протидію зростаючим ознакам раннього облисіння. Хоча спочатку це була досить своєрідна зміна моди для [ROOT.GetCountry.GetGovernment.GetCourtTitle], інші придворні повільно почали носити перуку, що стало зростаючою зміною в головних уборах [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Те, що спочатку було задумано як спосіб протидії символу слабкості, тепер перетворилося на нову епоху моди, оскільки чутки з [adopted_peruke_court.GetName] свідчать, що [adopted_peruke_court.GetAdjective] еліта також почала носити перуку."
  flavor_fra.460.a: "Повністю прийняти новий [ROOT.GetCountry.GetGovernment.GetCourtTitle] на довгі роки."
  flavor_fra.460.b: "Лише [ROOT.GetCountry.GetGovernment.GetRulerTitle] носитиме перуку за необхідності."
  flavor_fra.500.title: "Повернення до форми"
  flavor_fra.500.desc: "Сходження [fra_ruler.GetName] на трон [ROOT.GetCountry.GetName] після успішного правління [fra_ruler.GetHisHer] попередника, [previous_ruler.GetName], залишило глибоку тінь над [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Під час [previous_ruler.GetHisHer] правління, [previous_ruler.GetShortNameWithNoTooltip] прагнув встановити [previous_ruler.GetHisHer] правління як символ чистого абсолютизму, консолідуючи значну частину державної влади до [previous_ruler.GetHerselfHimself]. Тепер, зі смертю [previous_ruler.GetShortNameWithNoTooltip], багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] відчуває, що це можливість відновити владу від нового монарха [fra_ruler.GetShortNameWithNoTooltip] та обмежити [fra_ruler.GetHisHer] авторитет. Крім того, очевидно, що головні стани також прагнуть повернення балансу сил минулого."
  flavor_fra.500.a: "Настав час для більш кооперативного [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip]."
  flavor_fra.500.b: "Було б мудро, якби [fra_ruler.GetShortNameWithNoTooltip] пішов слідами [previous_ruler.GetShortNameWithNoTooltip]."
  flavor_fra.501.title: "Абсолютистська спадщина [previous_ruler.GetNameWithNoTooltip]"
  flavor_fra.501.desc: "Хоча правління [fra_ruler.GetName] триває вже досить довго, тінь [fra_ruler.GetHisHer] попередника [previous_ruler.GetName] все ще висить над [fra_ruler.GetHimHer]. Тривала спадщина спроб [previous_ruler.GetShortNameWithNoTooltip] кинути виклик старим вкоріненим силам [ROOT.GetCountry.GetName] для консолідації влади до [previous_ruler.GetHerselfHimself] призвела до значного вакууму влади після [previous_ruler.GetHisHer] смерті. Тепер, коли правління [fra_ruler.GetShortNameWithNoTooltip] значною мірою зміцнилося, деякі з радників [previous_ruler.GetShortNameWithNoTooltip], що залишилися, пропонують [fra_ruler.GetShortNameWithNoTooltip] йти шляхом [previous_ruler.GetHisHer] у подальшій консолідації влади до [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Однак багато нових міністрів, які піднялися по службі під час правління [fra_ruler.GetShortNameWithNoTooltip], закликають до обережності, пропонуючи підтримувати новий статус-кво, щоб запобігти значному виклику [fra_ruler.GetHisHer] правлінню."
  flavor_fra.501.a: "Новий статус-кво слід підтримувати."
  flavor_fra.501.b: "Поступитися частиною влади станам."
  flavor_fra.501.c: "Зміцнити абсолютистські ідеали [previous_ruler.GetShortNameWithNoTooltip]."
  flavor_fra.502.title: "Візит [GetCountry('RUS').GetAdjectiveWithNoTooltip] [GetCountry('RUS').GetGovernment.GetRulerTitle]"
  flavor_fra.502.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetName] готує [ROOT.GetCountry.GetGovernment.GetAdjective] церемонію для візиту [GetCountry('RUS').GetAdjective] [rus_ruler.GetName], який наразі проводить турне по [ShowContinentName('europe')]. Прагнучи продемонструвати красу земель [ROOT.GetCountry.GetNameWithNoTooltip], [fra_ruler.GetName] підготував колекцію ретельно складених карт, щоб привернути інтерес [GetCountry('RUS').GetAdjectiveWithNoTooltip] [GetCountry('RUS').GetGovernment.GetRulerTitle] до картографії. Також через цей візит [fra_ruler.GetShortNameWithNoTooltip] та кілька радників сподіваються завоювати прихильність та відкрити двері до тісніших відносин з [GetCountry('RUS').GetName]."
  flavor_fra.502.a: "Влаштувати чудовий бенкет для [GetCountry('RUS').GetGovernment.GetRulerTitle]!"
  flavor_fra.502.b: "Прагнути лише до потепління відносин з [GetCountry('RUS').GetNameWithNoTooltip], але залишатися обережними."
  flavor_fra.502.c: "Підготувати [GetCountry('RUS').GetAdjectiveWithNoTooltip] [GetCountry('RUS').GetGovernment.GetRulerTitle] «добре написану» прощальну записку."
  flavor_fra.503.title: "[target_character.GetNameWithNoTooltip] та [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_fra.503.desc: "Увійшовши до особистого кола [ROOT.GetCountry.GetGovernment.GetRulerTitle] як вірний радник на початку його правління, [target_character.GetName] стільки разів доводив себе як один з найздібніших членів [ROOT.GetCountry.GetGovernment.GetCourtTitle], що [fra_ruler.GetName] вирішив надати йому посаду головного міністра. Хоча [target_character.GetNameWithNoTooltip] сам не виявляв великих особистих амбіцій, він розробив плани, щоб вести [ROOT.GetCountry.GetName] у цю нову епоху ідеалів."
  flavor_fra.503.a: "Ми добре скористаємося його порадою."
  fleury_additional_dhe: "Додаткові [Concept('dynamic_historical_events', 'CONCEPT_PLACEHOLDER')|e], що стосуються перебування [target_character.GetNameWithNoTooltip] на посаді головного міністра, тепер можуть спрацювати."
  fleury_ministry_bonus: "Отримайте наступний модифікатор до смерті [target_character.GetNameWithNoTooltip], після чого він буде видалений."
  flavor_fra.504.title: "Карти Кассіні"
  flavor_fra.504.desc: "Походячи з родини геодезистів, [target_artist.GetName] привернув увагу як [ROOT.GetCountry.GetGovernment.GetCourtTitle], так і [fra_ruler.GetName] в надії замовити великі топографічні карти всієї [ROOT.GetCountry.GetName]. Хоча [target_artist.GetShortNameWithNoTooltip] вже здобув відому особисту репутацію своїми існуючими роботами, його прізвище також несе в собі історію минулих топографічних робіт. Якщо йому буде доручено зафіксувати топографію [ROOT.GetCountry.GetNameWithNoTooltip], це, безсумнівно, буде цінним активом, що послужить для підвищення престижу [ROOT.GetCountry.GetNameWithNoTooltip] на світовій арені, а також створить витончену карту для подальшого визначення ключових стратегічних позицій по всій країні."
  flavor_fra.504.a: "Замовити [target_artist.GetShortNameWithNoTooltip] створити велику карту!"
  flavor_fra.504.b: "Таке замовлення, безсумнівно, було б занадто великими витратами."
  flavor_fra.505.title: "Розширення Колежу [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_fra.505.desc: "Зберігаючи пристрасть до науки протягом [fra_ruler.GetHisHer] життя, [fra_ruler.GetName] звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle] з проханням спонсорувати створення нових кафедр у #italic Collège de [ROOT.GetCountry.GetNameWithNoTooltip]#!. Хоча коледж залишається одним із найпрестижніших не лише в [ROOT.GetCountry.GetName], а й у [ShowContinentName('europe')], останнім часом він зіткнувся з фінансовою стагнацією.\n\nПрагнучи реабілітувати коледж, спонсорство [fra_ruler.GetNameWithNoTooltip] призвело б до тісніших стосунків між установою та державою."
  flavor_fra.505.a: "Спонсорувати Collège de [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_fra.505.b: "Перенаправити запропоновані кошти до [ROOT.GetCountry.GetGovernment.GetAdjective|U] скарбниці."
  college_may_request_more_funds: "Буде засновано кафедру фізики, що надасть бонус до досліджень. Collège de [ROOT.GetCountry.GetNameWithNoTooltip] може запросити додаткове фінансування в майбутньому."
  flavor_fra.506.title: "Collège de [ROOT.GetCountry.GetNameWithNoTooltip] просить додаткові кошти"
  flavor_fra.506.desc: "Після спонсорства [fra_ruler.GetName] Collège de [ROOT.GetCountry.GetNameWithNoTooltip] значно розширився, заснувавши кілька нових освітніх кафедр. Однак керівництво коледжу тепер просить [fra_ruler.GetShortNameWithNoTooltip] надати ще одну хвилю коштів. Серед пропозицій – створення кафедри класичної механіки в коледжі, галузі науки, до якої [fra_ruler.GetShortNameWithNoTooltip] особисто має прихильність."
  flavor_fra.506.a: "Надати додаткове спонсорство для Collège de [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.506.b: "Ми вже надали все, що могли."
  flavor_fra.507.title: "Стимуляція [target_artist.GetNameWithNoTooltip]"
  flavor_fra.507.desc: "Виявивши державні фінанси в нестійкому становищі, кілька членів [ROOT.GetCountry.GetGovernment.GetCabinetTitle] розіслали запити до кількох видатних економістів по всій [ShowContinentName('europe')] в надії вирішити навислу фінансову кризу. Серед цих економістів [target_artist.GetName] став фаворитом у [ROOT.GetCountry.GetGovernment.GetCabinetTitle].\n\nПрагнучи переосмислити концепцію державної валюти, політика [target_artist.GetLastNameWithNoTooltip] має потенціал змінити фінансове становище [ROOT.GetCountry.GetName] на краще, хоча такі радикальні заходи можуть бути згубними в довгостроковій перспективі."
  flavor_fra.507.a: "Дозволити [target_artist.GetLastNameWithNoTooltip] взяти кермо влади!"
  flavor_fra.507.b: "Його ідеї принесуть лише подальшу руїну!"
  john_law_dhe_events: "Дозволяє [Concept('target_artist.GetNameWithNoTooltip] пов'язані [dynamic_historical_events', 'CONCEPT_PLACEHOLDER')|e]."
  john_law_joins_france_and_bank: "[target_artist.GetNameWithNoTooltip] почне переформовувати фінанси [ROOT.GetCountry.GetNameWithNoTooltip] як Генеральний контролер фінансів."
  flavor_fra.508.title: "Banque Générale"
  flavor_fra.508.desc: "Прагнучи переосмислити фінанси держави, [target_artist.GetName] заснував #italic Banque Générale#!, новий приватний банк, що фінансується як самим [target_artist.GetLastNameWithNoTooltip], так і [fra_ruler.GetName]. Однак, порівняно з іншими банками, Banque Générale випускатиме #italic паперову валюту#! для торгівлі замість століть металевих монет.\n\nНезважаючи на певний скептицизм з боку тих, хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle], Banque Générale досі виявився досить успішним у залученні інвесторів, які за політикою [target_artist.GetLastNameWithNoTooltip] змогли обмінювати золото на нову валюту. Хоча це поки що допомогло в економічних труднощах [ROOT.GetCountry.GetName], деякі радники просять [ROOT.GetCountry.GetGovernment.GetRulerTitle] бути обережним з банком."
  flavor_fra.508.a: "Пожинати плоди Banque Générale."
  flavor_fra.508.b: "Прислухатися до застережень радників і запобігти надмірній залежності від банку [target_artist.GetLastNameWithNoTooltip]."
  john_law_bank_risk: "Надмірні інвестиції в банк збільшують ризик його краху. Якщо це станеться, це підірве відновлювані фінанси [ROOT.GetCountry.GetNameWithNoTooltip]."
  john_law_bank_more_direct: "Зменшення надмірної залежності від банку допоможе пом'якшити збитки в разі краху банку."
  flavor_fra.509.title: "Banque Générale інвестує в колонії"
  flavor_fra.509.desc: "З моменту свого відкриття Banque Générale приваблює постійний потік інвесторів та позичальників, які прагнуть обміняти металеві монети та золото на легшу в обігу паперову валюту, пропоновану банком. Тепер, ставши впливовим і, за запитом [target_artist.GetName], націоналізованим, банк почав залучати інвестиції для володіння акціями торгових компаній у колоніях. Хоча [target_artist.GetNameWithNoTooltip] вказував на це як на ще одну ознаку успішності його економічної політики, інші радники висловили скептицизм, що якщо банк зрештою зазнає краху, це, ймовірно, призведе до краху нині процвітаючих торгових компаній у колоніях."
  flavor_fra.509.a: "Дозволити торгівлю акціями компаній продовжуватись."
  flavor_fra.509.b: "Обмежити здатність банку впливати на торгові компанії колоній."
  john_law_colonial_risk: "Хоча процвітаюча економіка торгових компаній збільшить загальне багатство в колоніях, ризик краху банку також буде для них руйнівним."
  law_monopoly_restricted: "Якщо банк збанкрутує, збитки для колоній буде зменшено."
  flavor_fra.510.title: "Банк Женераль Приносить Вигоду"
  flavor_fra.510.desc: "З моменту свого заснування Банк Женераль лише продовжував зростати, і разом з ним скарбниці [ROOT.GetCountry.GetName] лише бачили приплив багатства. Хоча наразі здається, що політика [target_artist.GetName] була великим успіхом, що призвело до того, що Банк Женераль став видатним банком у [ShowContinentName('europe')], він також привернув увагу заможної еліти. Багато з цих еліт, прагнучи інвестувати в зростаючі торгові компанії Нового Світу, почали покладатися на паперову валюту банку для отримання акцій у цих компаніях Нового Світу. Наразі здається, що скептицизм, який колись висловлювали різні радники щодо політики [target_artist.GetNameWithNoTooltip], виявився хибним."
  flavor_fra.510.a: "Нехай ця політика й надалі приносить користь [ROOT.GetCountry.GetNameWithNoTooltip]!"
  bank_yields_benefits_for_now: "Політика [target_artist.GetNameWithNoTooltip] дозволила [ROOT.GetCountry.GetNameWithNoTooltip] відновитися після майже економічного колапсу, хоча залежність від Банку Женераль може виявитися катастрофічною в довгостроковій перспективі."
  flavor_fra.511.title: "Крах Банку Женераль"
  flavor_fra.511.desc: "Хоча ознаки сильної економіки з'являлися завдяки політиці [target_artist.GetName], останні кілька тижнів для [ROOT.GetCountry.GetName] призвели до повного розладу економіки через раптовий крах Банку Женераль. Хоча останні роки банк процвітав, завдяки інвестиціям у колонії та запровадженню паперової валюти, цей період процвітання не мав тривати вічно, оскільки раптове зростання попиту на папір зробило державну закупівлю цього товару дорогою. Оскільки папір робить підтримку валюти все більш складною для торгівлі, вартість акцій банку неухильно знижувалася, що тепер призвело до його саморуйнування. Цей крах викликав хвильові ефекти по всіх колоніях, де багато нових торгових компаній сильно залежали від інвесторів, пов'язаних з банком.\n\nБагато міністрів [ROOT.GetCountry.GetNameWithNoTooltip] тепер намагаються стабілізувати ситуацію, хоча [target_artist.GetNameWithNoTooltip], архітектора цієї політики, ніде не видно."
  flavor_fra.511.a: "Політика [target_artist.GetLastNameWithNoTooltip] була повною катастрофою!"
  flavor_fra.511.b: "Наша обережність щодо політики [target_artist.GetLastNameWithNoTooltip] допоможе стабілізувати ситуацію."
  flavor_fra.512.title: "Наслідки [target_character.GetNameWithNoTooltip]"
  flavor_fra.512.desc: "Після краху Банку Женераль та повного провалу його політики, [target_character.GetName] став ізгоєм серед кількох радників, які закликають до його негайної відставки. Однак, після краху банку, [target_character.GetLastNameWithNoTooltip] не був помічений при [ROOT.GetCountry.GetGovernment.GetCourtTitle] і не контактував з [fra_ruler.GetName]. Після наказів перевірити його особисту резиденцію, не було знайдено жодних ознак, що вказують на місцезнаходження [target_character.GetLastNameWithNoTooltip], але консенсус [ROOT.GetCountry.GetGovernment.GetCourtTitle] полягає в тому, що він втік з [ROOT.GetCountry.GetName], побоюючись відплати за провал своєї політики.\n\nВиходячи з припущення про втечу з [ROOT.GetCountry.GetNameWithNoTooltip] як злочинця, було видано наказ [ROOT.GetCountry.GetGovernment.GetCourtTitle] про конфіскацію всього майна та маєтків [target_character.GetNameWithNoTooltip], розташованих у [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.512.a: "Можливо, ми зможемо знайти якусь цінність у конфіскованих володіннях [target_character.GetLastNameWithNoTooltip]."
  flavor_fra.520.title: "Булла Unigenitus та янсенізм"
  flavor_fra.520.desc: "Після попереднього прохання [GetCountry('FRA').GetGovernment.GetPreviousRuler.GetName] до [pap_ruler.GetName], папська булла Unigenitus була надана в надії придушити зростаючий янсенізм, доктрину, засновану на вченнях Святого Августина. Хоча папська булла була видана давно, смерть [GetCountry('FRA').GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip] та її некодифікація як закону [ROOT.GetCountry.GetName] лише призвели до зростання сили послідовників цієї доктрини з часів правління [fra_ruler.GetName]. Однак, зростаючий тиск серед антиянсеністських міністрів відновив дискусію щодо формалізації булли як закону, хоча тепер велика кількість послідовників може ускладнити це завдання."
  flavor_fra.520.a: "Настав час вирішити статус Unigenitus у [ROOT.GetCountry.GetNameWithNoTooltip]."
  janseism_unigenitus_conflict_events_wilL_occur: "Вмикає [Concept('dynamic_historical_events', 'CONCEPT_PLACEHOLDER')|e], пов'язані з папською буллою Unigenitus та релігійним конфліктом янсенізму."
  flavor_fra.521.title: "Засудження янсенізму"
  flavor_fra.521.desc: "З моменту дозволу дебатів щодо встановлення папської булли Unigenitus як закону [ROOT.GetCountry.GetName], багато антиянсеністських радників при [ROOT.GetCountry.GetGovernment.GetCourtTitle] почали відкрито засуджувати цю практику. Це призвело до хвилі обурення з боку послідовників янсенізму, багато з яких мають великий вплив на [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Оскільки [pap_ruler.GetName] уважно стежить за ситуацією в [ROOT.GetCountry.GetNameWithNoTooltip], придушення прихильників Unigenitus, ймовірно, викличе гнів папства. Однак, бездіяльність щодо обмеження цих запальних радників також призведе до невдоволення серед тих у [ROOT.GetCountry.GetGovernment.GetParliament.GetName], хто є твердими прихильниками доктрини янсенізму."
  flavor_fra.521.a: "Стати на бік прихильників Unigenitus."
  flavor_fra.521.b: "Знехтувати прихильниками Unigenitus, щоб заспокоїти послідовників янсенізму."
  flavor_fra.522.title: "Податок Cinquantième"
  flavor_fra.522.desc: "Прагнучи вжити подальших заходів проти послідовників янсенізму, прихильники Unigenitus розробили плани щодо податку, якщо Unigenitus стане остаточним законом [ROOT.GetCountry.GetName]. Згідно з цим #italic податком Cinquantième#!, будь-хто, кого виявлять за читанням #italic Nouvelles Ecclésiastiques#! (Тексту янсенізму), буде змушений сплатити значний податок державі. Крім того, будь-які релігійні діячі, які раніше були звільнені, але мають зв'язки з янсенізмом, також будуть змушені сплачувати цей податок.\n\nТакий податок, ймовірно, буде розцінений як надзвичайно згубний, якщо булла Unigenitus набуде чинності, оскільки послідовники янсенізму збережуть велику зневагу до [ROOT.GetCountry.GetFlavorRank]."
  flavor_fra.522.a: "Погодитися встановити податок разом з Unigenitus."
  flavor_fra.522.b: "Публічно виступити проти податку."
  cheapter_to_enact_unigenitus: "Якщо Unigenitus набуде чинності, податок Cinquantième буде відображено в ньому."
  period_of_stability_when_declining_unigenitus: "Відмова від ухвалення декрету Unigenitus призведе до значного зростання стабільності."
  flavor_fra.523.title: "Розбрат серед галліканських прихильників"
  flavor_fra.523.desc: "Будучи непохитними прихильниками незалежної [ROOT.GetCountry.GetAdjective] [ShowReligionAdjective('catholic')] Церкви, значною мірою незалежної від [ShowGovernmentReformName('papacy_reform')], багато впливових галліканських голосів в уряді засудили підтримку Unigenitus, а також висловили підтримку багатьом янсеністським послідовникам. Вважаючи впровадження Unigenitus засобом зміцнення впливу папства на [ROOT.GetCountry.GetFlavorRank], багато галліканських членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] дали зрозуміти, що вони рішуче виступатимуть проти [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] у майбутніх починаннях, якщо Unigenitus зрештою стане законом [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra.523.a: "Нам доведеться остерігатися галліканців."
  flavor_fra.523.b: "Заспокоїти їх наразі, залишивши буллу Unigenitus відкритим питанням."
  gallicans_in_clergy_will_oppose_crown: "Галліканська секта [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] стане протистояти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], але їхній вплив зменшиться."
  avoids_gallican_ire_unless_unigenitus_implemented: "Галліканці не стануть протистояти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], однак, якщо Unigenitus буде ухвалено як закон, це викличе гнів галліканських послідовників."
  flavor_fra.524.title: "Декрет Unigenitus"
  flavor_fra.524.desc: "Зіткнувшись з різними перешкодами та опозицією з боку янсеністських послідовників у Генеральних штатах, прихильники булли Unigenitus розробили декрет для ухвалення [fra_ruler.GetName]. Віддзеркалюючи політику, висунуту [pap_ruler.GetName], декрет не тільки заборонить практику янсенізму по всій [ROOT.GetCountry.GetName], але й вживе заходів щодо відомих послідовників, погрожуючи діями, а також встановлюючи податок на майно, пов'язане з доктриною.\n\nЯкщо [fra_ruler.GetShortNameWithNoTooltip] підпише декрет, це, безсумнівно, посіє розбрат серед решти янсеністських послідовників у [ROOT.GetCountry.GetNameWithNoTooltip], але це послужить ще одним засобом для подальшого зміцнення авторитету [fra_ruler.GetShortNameWithNoTooltip]."
  flavor_fra.524.a: "Ухвалити декрет Unigenitus!"
  flavor_fra.524.b: "Відхилити декрет, ми не повинні розпалювати конфлікт і дестабілізувати [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_fra.530.title: "Скорочення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] флоту"
  flavor_fra.530.desc: "Хоча [ROOT.GetCountry.GetName] підтримувала значний флот, щоб конкурувати з суперницькими морськими державами, в останні десятиліття він став слабшим місцем нашої армії. Вважаючи флот слабким місцем [ROOT.GetCountry.GetNameWithNoTooltip], з невеликим простором для покращення, [target_character.GetName] запропонував скоротити майбутні витрати на флот на користь перерозподілу коштів на комерційний проект, навіть припускаючи, що поточні проекти, пов'язані з морськими справами, можуть бути переорієнтовані на морську торгівлю.\n\nХоча коментарі [target_character.GetLastNameWithNoTooltip] безумовно викликали опозицію, перерозподіл коштів з флоту також може дозволити [ROOT.GetCountry.GetNameWithNoTooltip] більше зосередитися на своїх сухопутних арміях."
  flavor_fra.530.a: "[target_character.GetLastNameWithNoTooltip] має рацію, скоротити розмір флоту!"
  flavor_fra.530.b: "Відхилити ідею [target_character.GetLastNameWithNoTooltip], ми повинні натомість прагнути розширити флот!"
  flavor_fra.531.title: "Збалансування бюджету [philip_orry.GetNameWithNoTooltip]"
  flavor_fra.531.desc: "Після економічних труднощів, спричинених політикою [john_law.GetName], та тривалої корупції його наступника на посаді Генерального фінансиста, [philip_orry.GetName] було доручено важке завдання стабілізації економіки. Незважаючи на це, наступник, обраний [target_character.GetName] для Генерального фінансиста, виявився досить компетентним, зумівши збалансувати бюджет [ROOT.GetCountry.GetName] вперше за багато років. Хоча реформи [philip_orry.GetLastNameWithNoTooltip] також зробили податковий кодекс [ROOT.GetCountry.GetNameWithNoTooltip] справедливішим, це коштувало того, що #italic Dixieme tax#! знову довелося стягувати, що спричинило деякі заворушення на вулицях [ShowLocationName('paris')].\n\nЩоб придушити заворушення, деякі радники запропонували змінити поточний податок на зменшену суму, хоча це може вплинути на економічні перспективи на наступні роки, особливо з огляду на те, що реформи [philip_orry.GetLastNameWithNoTooltip] значною мірою покладаються на поточний податок Dixieme."
  flavor_fra.531.a: "Стягнення Dixieme [philip_orry.GetLastNameWithNoTooltip] необхідне, ці заворушення вщухнуть."
  flavor_fra.531.b: "Змінюючи податок, ми не можемо ризикувати ескалацією заворушень."
  flavor_fra.532.title: "Національна дорожня мережа [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.532.desc: "Прагнучи оновити інфраструктуру за рахунок нововиявленого державного надлишку, [target_character.GetName] висунув амбітний проект з модернізації та покращення доріг [ROOT.GetCountry.GetName], а також засоби для створення національної дорожньої мережі. Однак, щоб досягти амбітної пропозиції, [target_character.GetLastNameWithNoTooltip] подав прохання про використання примусової праці, сподіваючись використати селян [ROOT.GetCountry.GetNameWithNoTooltip] для своєчасного будівництва доріг. Враховуючи труднощі, яких зазнали багато членів третього стану в останні десятиліття, призов їх на такий проект, безсумнівно, погіршить відносини між державою та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Деякі члени ради, однак, вважають пропозицію [target_character.GetLastNameWithNoTooltip] перспективною і що використання цієї примусової праці допоможе досягти мети проекту."
  flavor_fra.532.a: "Погодитися з пропозицією [target_character.GetLastNameWithNoTooltip] щодо дорожньої мережі."
  flavor_fra.532.b: "Проект є занадто великим тягарем, щоб накладати його на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  if_fleury_dies_road_network_change: "У випадку смерті [target_character.GetLastNameWithNoTooltip], [ShowModifier('fra_fleury_national_road_project')] буде замінено на [ShowModifier('fra_fleury_national_road_project_legacy')]."
  flavor_fra.533.title: "Зростання комерційної торгівлі під керівництвом [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.533.desc: "Протягом свого перебування на посаді [target_character.GetName] докладав великих зусиль для покращення комерційної торгівлі [ROOT.GetCountry.GetName], і досі вони виявилися досить успішними. Від перерозподілу коштів з мілітаризованого флоту для зосередження на морській торгівлі, торгівля між [ROOT.GetCountry.GetNameWithNoTooltip] та рештою світу значно зросла. Разом із заснуванням національного дорожнього проекту, не тільки наша морська торгівля зазнала сприятливого зростання, але й міжконтинентальна торгівля з нашими сусідами також отримала вигоду завдяки більш сучасним та ефективним сухопутним маршрутам."
  flavor_fra.533.a: "Комерційний успіх [ROOT.GetCountry.GetNameWithNoTooltip] належить [target_character.GetLastNameWithNoTooltip]!"
  flavor_fra.533.b: "[ROOT.GetCountry.GetNameWithNoTooltip] має вітати цей період процвітання."
  flavor_fra.534.title: "Смерть [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.534.desc: "Прослуживши особистим радником та головним міністром [fra_ruler.GetName] протягом багатьох десятиліть, [target_character.GetLastName] був знайдений мертвим цього ранку, вважається, що він мирно помер уві сні. Хоча [fra_ruler.GetShortNameWithNoTooltip] та його найближчі радники при [ROOT.GetCountry.GetGovernment.GetCourtTitle] були засмучені його смертю, інші скористалися нагодою, щоб запропонувати наступника на посаду головного міністра.\n\nХоча [target_character.GetLastNameWithNoTooltip] може більше не бути, багато його протеже вже проявили себе при [ROOT.GetCountry.GetGovernment.GetCourtTitle] і, безсумнівно, стали б гідними наступниками, хоча [fra_ruler.GetShortNameWithNoTooltip] міг би натомість залишити посаду вакантною."
  flavor_fra.534.a: "[ROOT.GetCountry.GetNameWithNoTooltip] поки що обійдеться без головного міністра."
  flavor_fra.534.b: "Збільшити залежність від ради зі смертю [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.540.title: "Інженерна школа в Мезьєрі [ROOT.GetCountry.GetGovernment.GetAdjective|U]"
  flavor_fra.540.desc: "Впливова фігура, що зростає в [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetName] запропонував створити [ROOT.GetCountry.GetGovernment.GetAdjective] інженерну школу в Мезьєрі, місті в [ShowLocationName('chateau_porcien')]. Прагнучи створити нове покоління інженерів, як військових, так і цивільних, запропонована школа могла б стати проривом в інженерних зусиллях держави. Однак така пропозиція обійдеться державі у великі витрати."
  flavor_fra.540.a: "Ця школа створить нове покоління талановитих інженерів!"
  flavor_fra.540.b: "Заснувати школу та підвищити [target_character.GetLastNameWithNoTooltip]!"
  flavor_fra.540.c: "Ця школа була б занадто великими витратами."
  flavor_fra.541.title: "Військова школа"
  flavor_fra.541.desc: "Прагнучи подальшої модернізації армії, [fra_ruler.GetName] подав прохання про створення нової академії в районі Еколь у [ShowLocationName('paris')]. Прагнучи перейняти елементи [ShowCultureName('prussian')] тактики в [ROOT.GetCountry.GetAdjective] армію, запропонована установа навчатиме нове покоління солдатів за новою моделлю. Саме через цю академію [fra_ruler.GetShortNameWithNoTooltip] сподівається, що військове становище [ROOT.GetCountry.GetNameWithNoTooltip] на сцені [ShowContinentName('europe')] значно покращиться."
  flavor_fra.541.a: "Заснувати Академію!"
  flavor_fra.541.b: "Наша існуюча армійська модель чудова, подвоїти зусилля з утримання!"
  flavor_fra.542.title: "Місцевий парламент реагує на [ShowLawNameWithNoTooltip('fra_5_percent_tax')]"
  flavor_fra.542.desc: "Після впровадження [ShowLawName('fra_5_percent_tax')] [target_character.GetName], багато місцевих парламентів висловили опозицію до нового податку та відмовилися виконувати указ у провінціях. Хоча [ROOT.GetCountry.GetGovernment.GetParliament.GetName] спочатку висловив опозицію до закону, після втручання [ROOT.GetCountry.GetGovernment.GetRulerTitle] у процес, багато членів погодилися прийняти податок [target_character.GetLastNameWithNoTooltip].\n\nХоча [ROOT.GetCountry.GetGovernment.GetRulerTitle] може вжити прямих заходів щодо закриття місцевих парламентів, змушуючи місцевих чиновників безпосередньо відповідати перед державою, це також значно погіршить відносини з [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які висловили критику щодо нового закону."
  flavor_fra.542.a: "Закрити парламенти!"
  flavor_fra.542.b: "Відкликати закон."
  flavor_fra.543.title: "Придушення єзуїтів"
  flavor_fra.543.desc: "Хоча орден єзуїтів у [ROOT.GetCountry.GetName] міцно тримався протягом кількох століть, останніми роками вони викликали гнів [ROOT.GetCountry.GetGovernment.GetParliament.GetName], а також розчарування [fra_ruler.GetName]. Хоча єзуїти очолюють одні з найвидатніших і найуспішніших коледжів у [ROOT.GetCountry.GetNameWithNoTooltip], їхній значний вплив викликає зростаюче занепокоєння у [fra_ruler.GetShortNameWithNoTooltip], який бачить у них загрозу через їхню незалежність від влади [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')].\n\nСоюзники в Генеральних штатах висунули ідею вигнання єзуїтів назавжди з [ROOT.GetCountry.GetNameWithNoTooltip], і такий захід, ймовірно, буде прийнятий. Однак такий захід також викличе невдоволення в [ROOT.GetCountry.GetGovernment.GetAdjective] родині, оскільки кілька членів, включаючи [scope_heir_fra.GetName], є затятими прихильниками ордену."
  flavor_fra.543.a: "Єзуїти стали занадто впливовими, приборкайте їх!"
  flavor_fra.543.b: "Єзуїти все ще пропонують занадто багато цінності для [ROOT.GetCountry.GetNameWithNoTooltip], запобігти цьому заходу!"
  some_in_royal_household_will_oppose: "Деякі члени [ROOT.GetCountry.GetGovernment.GetAdjective] дому виступатимуть проти придушення єзуїтів."
  flavor_fra.544.title: "Розбрат у [ROOT.GetCountry.GetGovernment.GetAdjective|U] Домі через заборону єзуїтів"
  flavor_fra.544.desc: "Вірний союзник єзуїтського ордену, [scope_heir_fra.GetName], висловив(-ла) глибоке розчарування [fra_ruler.GetName] через нещодавнє вигнання єзуїтів. Хоча [scope_heir_fra.GetShortNameWithNoTooltip] заявив(-ла) про [scope_heir_fra.GetHisHer] незгоду, [consort_fra.GetName] також збирає підтримку в раді, сподіваючись скасувати закон. Хоча це питання розділить [ROOT.GetCountry.GetGovernment.GetAdjective] дім на майбутнє, вплив єзуїтів у [ROOT.GetCountry.GetNameWithNoTooltip] вже почав зменшуватися, і багато єзуїтів вже втекли."
  flavor_fra.544.a: "Це питання з часом вщухне."
  flavor_fra.544.b: "Піти на компроміс і погодитися поступитися частиною влади єзуїтам, що залишилися."
  flavor_fra.550.title: "Відкриття Луврського палацу"
  flavor_fra.550.desc: "Колись один із багатьох палаців старої [ShowGovernmentTypeName('monarchy')], Луврський палац служив королівською колекцією для минулих [ROOT.GetCountry.GetAdjective] королів. Хоча #italic Ancien régime#! більше немає, дехто в [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip] вважає, що Луврський палац повинен натомість стати новим культурним центром для демонстрації різноманітних творів, які [ROOT.GetCountry.GetName] створила протягом століть. Більше не повинна культурна історія [ROOT.GetCountry.GetNameWithNoTooltip] бути прив'язана до історії старої еліти."
  flavor_fra.550.a: "Постановити, щоб Луврський палац був відкритий для публіки як культурний центр!"
  flavor_fra.550.b: "Було б краще, якби Луврський палац залишився закритим для публіки."
  joan_of_arc_may_lead_tt: "[joan_of_arc.GetName] буде дозволено очолювати війська!"
  joan_of_arc_disappears_tt: "[joan_of_arc.GetName] зникне в безвісті"
  marcel_will_now_oppose_the_crown: "Етьєн Марсель діятиме більш вороже щодо Корони"
  marcel_loses_support_for_murder: "Вбивство осіб шляхетного походження змусило Марселя втратити підтримку серед станів Духовенства та Шляхти, сильно послабивши його політично."
  routiers_can_raid_nearby_locations: "Рутьєри можуть розширити свої набіги на сусідні провінції!"
  fra_annexing_appanages_moves_towards_centralize: "Кожен анексований апанажний [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] наблизить нас до Централізації [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e] на 5, ціною зменшення [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] з апанажами, що залишилися, на -25."
  fra_how_to_remove_feudal_nobility_info: "Французька феодальна шляхта [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] стане застарілою, якщо не залишиться апанажних [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e], і буде видалена."
  fra_aggression_towards_burgundy: "Хоча лорди [GetCountry('BUR').GetNameWithNoTooltip] накопичили достатньо території та влади, щоб вважатися політично незалежними, вони все ще розглядаються нашими підданими як співвасал. Зайняття агресивної позиції знизить відносини з усіма підданими [GetCountry('FRA').GetNameWithNoTooltip] на -33."
  fra_neutrality_towards_burgundy: "Лорди [GetCountry('BUR').GetNameWithNoTooltip] накопичили достатньо території та влади, що тепер вони вважаються політично незалежними від [GetCountry('FRA').GetLongNameWithNoTooltip]."
  appanages_can_now_take_public_weal_reform: "Апанажні піддані тепер можуть прийняти реформу 'Член Ліги суспільного блага'. Нелояльні апанажі будуть більш схильні приєднатися до Ліги."
  more_than_six_will_trigger_war: "Якщо більше 5 апанажів приєднаються до Ліги, може спалахнути боротьба за владу між [ROOT.GetCountry.GetGovernment.GetAdjective|U] [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] та Лігою."
  league_demands_accepted_fra: "Централізація Корони буде значно скасована, однак мирне вирішення не призведе до кровопролиття."
  league_demands_rejected_fra: "Спалахне війна між Короною та Лігою, якщо корона вийде переможцем, зусилля щодо централізації держави будуть значно покращені."
  public_weal_will_disband: "Ліга суспільного блага була розпущена і більше не турбуватиме [GetCountry('FRA').GetName]."
  weal_members_bonus_and_appanage_autonomy: "Усі члени Ліги отримають бонуси від урядової реформи 'Член Ліги суспільного блага' протягом 15 років, а також значно зменшуючи централізацію [GetCountry('FRA').GetName]."
  weal_members_weakened_royalist_integration_boost: "[GetCountry('FRA').GetName] отримає потужний бонус до швидкості інтеграції, поряд зі збільшенням лояльності всіх підданих."
  jeanne_d_arc_will_face_trial: "[joan_of_arc.GetName] буде піддана суду за єресь з боку [GetCountry('ENG').GetName]"
  jeanne_d_arc_will_trouble_us_no_further: "[joan_of_arc.GetName] буде страчена за єресь!"
  random_joan_of_arc_or_executed: "[joan_of_arc.GetName] буде запропоновано викупити [GetCountry('FRA').GetName]. Якщо [GetCountry('FRA').GetNameWithNoTooltip] відхилить пропозицію викупу, [joan_of_arc.GetShortNameWithNoTooltip] буде страчена."
  legitimacy_penalty_with_english_advancements: "Поки [GetCountry('ENG').GetName] контролює велику ділянку території в [GetCountry('FRA').GetName], легітимність [GetCountry('FRA').GetAdjectiveWithNoTooltip] правителів буде порушена."
  reduced_legitimacy_penalty_but_prestige_hit: "Зменшує штраф до легітимності від [GetCountry('ENG').GetAdjective] контролю території в [GetCountry('FRA').GetNameWithNoTooltip], але також накладає штраф до престижу."
  french_succession_no_longer_contested: "[GetCountry('FRA').GetAdjective] спадкоємність більше не вважатиметься оскарженою."
  english_appeasement_reduced_reward_tt: "Зменшено бонуси від умиротворення [GetCountry('ENG').GetAdjective] претензій на [GetCountry('FRA').GetNameWithNoTooltip]."
  fra_may_enact_bourges_sanctions: "Прагматична санкція буде скасована, але може бути відновлена, якщо відносини з Папством погіршаться."
  unlocks_formalize_relations_action: "Розблоковує [ShowCountryInteractionName('formalize_relations')] [Concept('diplomatic_action', 'CONCEPT_PLACEHOLDER')|e] проти [ShowCultureGroupName('italian_group')] націй."
  has_unlocks_formalize_relations_action: "Розблоковано [ShowCountryInteractionName('formalize_relations')] [Concept('diplomatic_action', 'CONCEPT_PLACEHOLDER')|e] з [Concept('dynamic_historical_event', 'CONCEPT_PLACEHOLDER')|e] $flavor_fra.2100.t$."
  every_independent_italian_state_loses_opinion: "Наші відносини з усіма [ShowCultureGroupName('italian_group')] націями значно погіршаться. Союзні нації отримають менший штраф до відносин."
  formalize_disabled_tt: "[ShowCountryInteractionName('formalize_relations')] [Concept('diplomatic_action', 'CONCEPT_PLACEHOLDER')|e] стане #R недоступною#!."
  withdraw_opinion_penalty_increase: "Наші відносини з усіма [ShowCultureGroupName('italian_group')] націями все одно погіршаться, але мирний відхід зменшить штраф."
  bonuses_will_be_lost_if_broken: "Якщо Союз між [GetCountry('FRA').GetName] та [GetCountry('NAP').GetName] буде розірвано, ці бонуси будуть втрачені."
  league_of_weal_joiners: "[league_member_ruler.GetCountry.GetName] приєднається до війни на боці [league_leader_ruler.GetCountry.GetName]"
  lower_cooldown_campaign_in_italy_tt: "Час між діями [ShowGenericActionName('plan_campaign_in_italy')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [ShowSituationName('italian_wars')] буде зменшено на #G -1#! рік"
  fra_may_attract_prominent_painters_tt: "#G Видатний#! [ShowCultureGroupNameWithNoTooltip('italian_group')] художник може приєднатися до [GetCountry('FRA').GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  da_vinci_brings_mona_lisa: "[target_character.GetName] приєднається до [ROOT.GetCountry.GetGovernment.GetCourtTitle] і принесе з собою #italic $mona_lisa$#!"
  fra_colonial_power_risk: "Створення колоніальної бази може виявитися складним для [ROOT.GetCountry.GetNameWithNoTooltip] і призвести до конфлікту з іншими європейськими колоніальними державами."
  canada_cartier_bonus: "Відправлення [target_character.GetName] до [ShowAreaName('canadian_atlantic_coast_area')] може спровокувати подальші колоніальні події"
  devoting_crown_resources_is_costly: "Хоча створення колоніального кордону може виявитися корисним для майбутніх колоніальних зусиль, це може виявитися складним завданням, оскільки нововідкриті землі знаходяться на великій відстані від [ROOT.GetCountry.GetNameWithNoTooltip]."
  may_suffer_widespread_condemnation: "[ROOT.GetCountry.GetNameWithNoTooltip] #R зазнає осуду#! від [ShowReligionGroupAdjective('christian')] сусідів, уклавши союз з [GetCountry('TUR').GetLongNameWithNoTooltip]"
  fra_may_recieve_benefit_from_alliance: "Союз з [GetCountry('TUR').GetLongNameWithNoTooltip] може принести #G вигідні#! торговельні відносини"
  fra_hostilities_with_lutheran_nations: "Усі [ShowReligionAdjective('lutheran')] нації, які не є нашими підданими, втратять [ShowBiasValue('opinion_protestant_persecution')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [ROOT.GetCountry.GetName]"
  fra_hostilities_with_catholic_nations: "Усі [ShowReligionAdjective('catholic')] нації, які не є нашими підданими, втратять [ShowBiasValue('opinion_tolerance_to_protestants')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [ROOT.GetCountry.GetName]"
  hostilities_will_expand_with_calvinists_nations: "[ShowPolicyName('edict_of_fontainebleau')] буде розширено, щоб включити політику, спрямовану проти [ShowReligionAdjectiveWithNoTooltip('calvinist')] послідовників.\nУсі [ShowReligionAdjective('calvinist')] нації, які не є нашими підданими, втратять [ShowBiasValue('opinion_fra_persecute_calvinists')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [ROOT.GetCountry.GetName]"
  further_hostilities_with_catholic_nations: "Усі [ShowReligionAdjective('catholic')] нації, що не є нашими підданими, втратять додатково [ShowBiasValue('opinion_fra_calvinist_granted_tolerance')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [ROOT.GetCountry.GetName]"
  fra_high_negative_tolerance_warning: "Висока #R нетерпимість#! несе ризик посилення повстань"
  council_will_condemn_but_continue_rule: "[ruler_fra.GetShortName] продовжить правити, хоча рада може #R тиснути на [ruler_fra.GetHimHer]#!, щоб навернути, якщо відчує себе сміливішою."
  ruler_may_improve_relations_with_calvinist_nations: "Навернення [ruler_fra.GetShortName] може призвести до #G покращення відносин#! із сусідніми [ShowReligionName('calvinist')] націями."
  avoid_risks_of_a_calvinist_ruler: "Примусове навернення [ruler_fra.GetShortName] буде розцінено як глибоко #R нетерпиме#!."
  fra_ruler_may_become_inspired_french_eoc: "Це може #G надихнути#! [fra_ruler.GetShortName] створити Торгову компанію в $india$!"
  fra_maintain_current_colonial_policy_but_unlock: "Розблоковує політику [ShowPolicyName('french_east_india_company')]"
  richelieu_may_pursue_supression: "[target_character.GetName] може розробити політики, що мають на меті придушити владу [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]"
  richelieu_curtailed_keeps_nobles_strong: "[target_character.GetName] уникатиме політик, спрямованих на придушення влади [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
