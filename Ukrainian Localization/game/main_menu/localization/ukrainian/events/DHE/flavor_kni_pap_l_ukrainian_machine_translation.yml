l_english:
  flavor_kni_pap.1.title: "Смірнський хрестовий похід"
  flavor_kni_pap.1.desc: "Широкомасштабне [crusade_target.GetCulture.GetName] піратство, очолюване [crusade_target.GetLongName], викликало велике занепокоєння у [ROOT.GetCountry.GetReligion.GetGroup.GetAdjective] судноплавства. Такий стан справ не може тривати. Християнський світ не буде принижений ницими [crusade_target.GetReligion.GetAdjective] піратами! Щоб припинити це лихо, ми могли б закликати до хрестового походу проти [crusade_target.GetNameWithNoTooltip], щоб покінчити з їхньою зрадою раз і назавжди."
  flavor_kni_pap.1.historical_info: "Два Смірнські хрестові походи відбулися між 1343 і 1351 роками. Під час першого хрестового походу християнам вдалося захопити Смірнську цитадель і порт, але не вдалося закріпити акрополь. Щоб відсвяткувати успіхи, у місті була проведена меса, під час якої турки увірвалися і вирізали молитовне керівництво. Після цього був організований другий хрестовий похід, щоб допомогти християнській стороні міста, що боролася."
  flavor_kni_pap.1.a: "Ніхто не загрожуватиме [ROOT.GetCountry.GetReligion.GetGroup.GetAdjectiveWithNoTooltip] судноплавству!"
  flavor_kni_pap.1.b: "О, яке лихо."
  flavor_kni_pap.2.title: "$flavor_kni_pap.1.title$"
  flavor_kni_pap.2.desc: "Прибув посланець від [papal_state.GetLongName], запрошуючи нас до хрестового походу проти [crusade_target.GetName]. Ці [crusade_target.GetReligion.GetAdjective] пірати були бичем [ShowProvinceDefinitionName('aegean_sea_province')] вже кілька десятиліть, нещодавно посиливши свої зусилля з набігів на [papal_state.GetReligion.GetGroup.GetAdjective] судноплавство. Настав час провчити їх."
  flavor_kni_pap.2.historical_info: "$flavor_kni_pap.1.historical_info$"
  flavor_kni_pap.2.a: "Прислухатися до заклику."
  flavor_kni_pap.2.b: "Ми не можемо брати участь у цей час."
  STATIC_MODIFIER_NAME_kni_smyrniote_crusade: "Хрестоносний запал"
  kni_joined_crusade: "Приєднався до Смірнського хрестового походу"
  flavor_kni_pap.3.title: "Хрестовий похід проти нас!"
  flavor_kni_pap.3.desc: "Мерзенні [papal_state.GetReligion.GetAdjective] покидьки в [papal_state.GetName] оголосили проти нас Священну війну. Очевидно, наше недавнє піратство було для них занадто. Зустрінемося з ними на морях і провчимо їх, хто є справжніми адміралами [ShowProvinceDefinitionName('aegean_sea_province')]."
  flavor_kni_pap.3.historical_info: "$flavor_kni_pap.1.historical_info$"
  flavor_kni_pap.3.a: "Більше кораблів для набігів!"
  flavor_kni_pap.4.title: "Передача [target_country.GetNameWithNoTooltip]"
  flavor_kni_pap.4.desc: "Наші нещодавні надбання в [ShowAreaName('west_anatolia_area')] є результатом наших доблесних зусиль у недавньому хрестовому поході. З огляду на це, слід зазначити, що наша здатність утримувати цю землю є в кращому випадку спірною. Таким чином, можливо, передача цих територій [target_country.GetLongName] була б ідеальною."
  flavor_kni_pap.4.a: "Передати."
  flavor_kni_pap.4.b: "Ми доблесно боролися за цю землю."
  STATIC_MODIFIER_NAME_kni_cession_of_anatolia_to_holy_order: "Надати Священному військовому ордену"
  flavor_kni_pap.5.title: "Надання [the_from.GetNameWithNoTooltip]"
  flavor_kni_pap.5.desc: "[the_from.GetLongName] пропонує нам свої нещодавні земельні надбання, посилаючись на свою нездатність утримувати ці території перед обличчям іноземного повстання. Оскільки ми знаходимося на кордоні Християнського світу, ми були б більш придатними для утримання цієї території."
  flavor_kni_pap.5.a: "Ця передача послужить Християнському світу."
  flavor_kni_pap.5.b: "Ми вже перевантажені."
  flavor_kni_pap.6.title: "Відповідь від [target_country.GetNameWithNoTooltip]"
  flavor_kni_pap.6.desc_common: "Прибув посланець від [target_country.GetName], несучи новини про їхню відповідь на нашу пропозицію про надання."
  flavor_kni_pap.6.desc_accept: "$flavor_kni_pap.6.desc_common$ Вони подякували нам за наш дар і нашу побожність і заявили про повну відданість утриманню території в ім'я нашого Господа."
  flavor_kni_pap.6.desc_deny: "$flavor_kni_pap.6.desc_common$ На жаль, вони заявили про свою нездатність взяти подальші території. У такому випадку нам доведеться створити місцевих бальї для здійснення належного контролю над територіями."
  flavor_kni_pap.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_kni_pap.6.b: "Тоді ми утримуємо її справедливо."