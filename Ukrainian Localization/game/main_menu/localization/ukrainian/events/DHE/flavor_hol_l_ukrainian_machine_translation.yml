l_english:
  flavor_hol.1.title: "Університет [target_location.GetNameWithNoTooltip]"
  flavor_hol.1.desc: "Освіта [ROOT.GetCountry.GetCulture.GetName] народу є великою турботою для держави. Урядовий апарат постійно потребує освічених осіб, які можуть служити державі як адміністратори та губернатори. Щоб підвищити грамотність та компетентність потенційних нових адміністраторів, радники [target_character.GetName] пропонують побудувати університет у [target_location.GetName]."
  flavor_hol.1.historical_info: "Вільгельм, принц Оранський, лідер Нідерландської революції у Вісімдесятирічній війні, заснував Лейденський університет у 1575 році, оскільки новостворена Нідерландська республіка не мала жодних університетів. Іспанія контролювала південний Левен, де знаходився єдиний університет у Нідерландах. Принц Вільгельм вирішив заснувати перший голландський університет у Лейдені, щоб навчати громадян для релігійних цілей та дати країні та її уряду освічених чоловіків в інших галузях. Академічні дослідження стали важливими, оскільки розпочався науковий ренесанс, і Лейден був обраний як нагорода за героїчну оборону Лейдена від іспанських атак попереднього року. Філіп II Іспанський фігурує в офіційному свідоцтві про заснування, оскільки він все ще був де-юре графом Голландії, хоча заборонив будь-якому підданому навчатися в Лейдені."
  flavor_hol.1.a: "Спонсорувати університет."
  flavor_hol.1.b: "Це того не варте."
  flavor_hol.2.title: "Синод [target_location.GetNameWithNoTooltip]"
  flavor_hol.2.desc: "[ShowReligiousAspectName('arminianism')], рух у межах [ShowReligionName('calvinist')], заснований [loc_jacobus_arminius.GetName] з плюралістичними та гуманітарними поглядами, набув все більшої популярності серед вірних [ROOT.GetCountry.GetName]. Це спричинило народження контрруху у формі [ShowReligiousAspectName('gomarism')], заснованого [loc_franciscus_gomarus.GetName], який намагається захистити ідеали та погляди [ShowReligionNameWithNoTooltip('calvinist')]. Щоб зупинити гарячу суперечку, перш ніж вона загостриться ще більше, у [target_location.GetName] було проведено Національний Синод, щоб врегулювати цей релігійний конфлікт раз і назавжди."
  flavor_hol.2.historical_info: "Піднесення армініанства спричинило проведення Національного Синоду в Дордрехті Голландською реформатською церквою для врегулювання розкольницької суперечки. 13 листопада 1618 року Голландська реформатська церква та представники з правом голосу від восьми іноземних реформатських церков провели перше засідання. Останнє та заключне засідання відбулося 9 травня 1619 року і було 154-м засіданням. Воно врегулювало суперечку щодо армініанства, засудило його, відкинуло армініанські погляди та виклало реформатську доктрину щодо кожного пункту, а саме: повна зіпсованість, безумовне обрання, обмежене спокутування, непереборна благодать та витривалість святих. Ремонстрантам, як були відомі армініани, було наказано утримуватися від міністерської діяльності, такої як проповідь, повчання, здійснення таїнств та відвідування хворих. Їм також було запропоновано підписати Акт про припинення, легалізацію наказу про відмову від служіння, але вони відмовилися його підписати і були засуджені як «порушники громадського спокою» та наказано покинути Об'єднані провінції. Синод засудив релігійну доктрину армініанства як єресь."
  flavor_hol.2.a: "Засудити [ShowReligiousAspectNameWithNoTooltip('arminianism')]"
  flavor_hol.2.a.tt: "Замінити [ShowReligiousAspectName('gomarism')] на [ShowReligiousAspectName('instituionalized_gomarism')].\n[ShowReligiousAspectName('arminianism')] стає для нас недоступним"
  flavor_hol.2.b: "Відкинути [ShowReligiousAspectNameWithNoTooltip('gomarism')]"
  flavor_hol.2.b.tt: "Замінити [ShowReligiousAspectName('arminianism')] на [ShowReligiousAspectName('instituionalized_arminianism')].\n[ShowReligiousAspectName('gomarism')] стає для нас недоступним"
  flavor_hol.2.c: "Це нас не стосується."
  flavor_hol.3.title: "Штатенверталінг"
  flavor_hol.3.desc: "[ROOT.GetCountry.GetReligion.GetName] є об'єднуючою релігією [ROOT.GetCountry.GetLongName]. Проте мова священного тексту, хоч і перекладена на [ROOT.GetCountry.GetCulture.GetLanguage.GetName], не передає справжнього значення слова. Це транскрипція з [ShowLanguageName('latin_language')] на [ShowLanguageName('german_language')], яка потім адаптується до [ROOT.GetCountry.GetCulture.GetLanguage.GetNameWithNoTooltip]. Створення Штатенбіблії — #italic Державної Біблії#! — забезпечить належний переклад тексту, як того бажає Господь."
  flavor_hol.3.historical_info: "Дортський синод 1618-1619 років визнав за необхідне перекласти Біблію на голландську мову, оскільки існуючі голландські Біблії були лише перекладами інших перекладів. Новий переклад, Штатенбіблія, мав базуватися на оригінальних мовах за зразком Біблії короля Якова 1611 року. Його перша публікація мала чекати до 1637 року, проте його вплив на культурну ідентичність та єдність Нідерландів став основою для стандартизованої голландської мови сьогодення."
  flavor_hol.3.a: "Профінансувати Штатенбіблію."
  flavor_hol.3.b: "Ми не можемо собі цього дозволити."
  flavor_hol.4.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.4.desc: "Математик і вчений з [ShowLocationName('bruges')], [target_character.GetName] подорожував до багатьох місць, щоб розширити [target_character.GetHisHer] знання, перш ніж вирішив оселитися в [ShowLocationName('the_hague')]. [target_character.GetHeShe|U] запропонував [target_character.GetHisHer] послуги нам як радник або як вчений."
  flavor_hol.4.historical_info: "Фламандський математик і військовий інженер Симон Стевін був активним у багатьох галузях науки та інженерії, як теоретичних, так і практичних. Голландське слово для математики, wiskunde або «мистецтво того, що є певним», було власним перекладом Стевіна і робить голландську однією з небагатьох європейських мов, де «математика» не походить від грецької через латину. Він винайшов візок з вітрилами, який рухався виключно силою вітру, і досягав швидкості, що перевищувала швидкість коней."
  flavor_hol.4.a: "Його знання матимуть велику наукову цінність."
  flavor_hol.4.b: "Його розум буде великою послугою державі."
  flavor_hol.4.b.tt: "[Concept('target_character.GetName] стає доступним для [cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hol.5.title: "Вільгельмус"
  flavor_hol.5.desc: "Національний гімн є відображенням духу країни та її народу. Хоча багато інших держав вже встановили гімни в минулому, [ROOT.GetCountry.GetName] все ще бракує його. Сприяння створенню такого гімну не тільки збільшить наш міжнародний престиж, але й дасть [ROOT.GetCountry.GetCulture.GetName] народу почуття гордості та єдності."
  flavor_hol.5.historical_info: "Гімн #italic Wilhelmus#! або #italic Wilhelmus van Nassouwe#! був дуже популярним серед голландського населення і в 1932 році був визнаний офіційним національним гімном Нідерландів. Віллем ван Ораньє або Вільям Оранський є головним героєм гімну, який розповідає про нього, його життя та чому він бореться проти короля Іспанії, написаний від першої особи. Для національного гімну текст і мелодія пісні надзвичайно мирні."
  flavor_hol.5.a: "Профінансувати національний гімн."
  flavor_hol.5.b: "Ми не можемо собі цього дозволити."
  flavor_hol.6.title: "Тюльпаноманія"
  flavor_hol.6.desc: "Коли [target_country.GetName] розширюється та з'єднує [ShowSubContinentName('middle_east')] з [ShowContinentName('europe')], тюльпан знайшов свій шлях з [ShowLocationName('constantinople')] до рук [ROOT.GetCountry.GetAdjective] купців. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] дуже полюбив цю квітку не тільки за її красу, але й за її цінність. Після цього багато купців почали продавати та спекулювати на вартості квітки. Однак невидима рука ринку швидко поклала цьому край, оскільки ціна на тюльпани обвалилася — а разом з нею і фінансова стабільність багатьох членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_hol.6.historical_info: "Тюльпан був завезений до Європи в 1550-х роках з Османської імперії. Він швидко став популярним серед багатих купців у Нідерландах як предмет розкоші. Ринок зростав, і в 1634 році, коли попит зріс у Франції, спекулянти вийшли на ринок. У 1636 році був створений ф'ючерсний ринок, і протягом осені та зими ціни стрімко зросли, поки не обвалилися в лютому 1637 року. Результатом стало банкрутство багатьох та економічна катастрофа."
  flavor_hol.6.a: "Вам нікого, крім себе, звинувачувати!"
  flavor_hol.6.b: "Держава могла б пом'якшити втрати."
  flavor_hol.7.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.7.desc: "[target_character.GetName], талановитий/талановита [target_character.GetWomanMan] у створенні книг, знайшов/знайшла свій шлях до [ShowLocationName('amsterdam')], щоб заснувати [ShowBuildingTypeName('printing_press_shop')]."
  flavor_hol.7.historical_info: "Колишній палітурник і купець, Лодевейк Ельзевір був відомим друкарем і видавцем. Його перша книга була опублікована в 1583 році в Лейдені, що згодом лягло в основу сімейного бізнесу до 1791 року. Ельзевір був відомий своєю елегантністю та точністю, а також малими та дуже портативними форматами, що використовувалися, такими як формат дуодецимо."
  flavor_hol.7.a: "Дозволити [target_character.GetHimHer] заснувати [target_character.GetHisHer] крамницю."
  flavor_hol.7.b: "Письменство має залишатися правом для [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_hol.8.title: "Амбітні колоніальні плани"
  flavor_hol.8.desc: "Як відносний запізнілий учасник у боротьбі за колонії, ми виявили, що багато бажаних нами колоніальних володінь вже були захоплені іншими. Однак, маючи сильний флот і готовий фінансовий сектор, ми все ж маємо значні ресурси в наших руках. Ці обставини спонукали Голландську Вест-Індську компанію розробити #italic Groot Desseyn Grand#! — План того, як [ROOT.GetCountry.GetCulture.GetName] сила все ж таки може піднятися над нашими конкурентами.\n\nЗгідно з планом, замість того, щоб просто намагатися заснувати власні колонії, було б ефективніше завойовувати колонії наших конкурентів. Як природний конкурент, [GetCountry('POR').GetAdjective] колоніальна імперія, зокрема, була визнана хорошою ціллю для цього плану, особливо тому, що [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] інвестори вже залучені до деяких з них."
  flavor_hol.8.a: "Звучить як грандіозний план!"
  ned_grand_design: "Groot Desseyn"
  flavor_hol.8.b: "Ні, міжнародна спільнота ненавидітиме нас."
  flavor_hol.9.title: "Флейтшип"
  flavor_hol.9.desc: "Експансивна [ROOT.GetCountry.GetCulture.GetName] економіка висунула великі вимоги до нашого торгового флоту. Дуже мілкі [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] води також означають, що звичайні торгові судна, такі як каравели, не можуть наблизитися до багатьох [ROOT.GetCountry.GetAdjectiveWithNoTooltip] портів. Досі це вирішувалося за допомогою менших боєрів, але за фінансової підтримки [target_character.GetName], купця з [ShowLocationName('hoorn')], був розроблений новий тип судна.\nФлейтшип або флюйт довший, має дуже характерну грушоподібну корму і побудований для ефективного управління невеликим екіпажем. Оскільки він здатний перевозити більші вантажі, при цьому справляючись з мілкими голландськими водами та дуже добре поводячись у відкритому морі, цей корабель є даром Божим для наших купців."
  flavor_hol.9.a: "Це безумовно гарна ідея!"
  flavor_hol.9.b: "Я не думаю, що наша суднобудівна промисловість готова до цього."
  flavor_hol.10.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.10.desc: "[target_character.GetName], більш відомий як просто Еразм, є гуманістом і вченим-початківцем. [target_character.GetHisHer|U] світогляд, а також [target_character.GetHisHer] філософії відомі в [ShowContinentName('europe')] своєю толерантною природою. Крім того, як [target_character.GetWomanMan] поміркованих поглядів, [target_character.GetHisHer] вплив у теології робить [target_character.GetHimHer] маяком для тих, хто цінує свободу більше, ніж ортодоксію."
  flavor_hol.10.historical_info: "Дезидерій Еразм Роттердамський, видатна постать Північного Відродження, був голландським гуманістом, відомим своїм обширним літературним внеском латинською та грецькою мовами. Він відіграв значну роль у класичній науці та прославився своїм природним латинським стилем. Еразм виступав за толерантність, злагоду та вільнодумство в Католицькій Церкві, незважаючи на тло європейської релігійної Реформації. Його праці, включаючи #italic Похвалу глупоті#! та #italic Про вільну волю#!, торкалися теологічних і суспільних питань, часто пропагуючи компромісний підхід, який розчаровував як католицькі, так і протестантські фракції. Незважаючи на бідність і духовні труднощі на початку життя, праці Еразма відображають його переконання щодо освіти, шлюбу, соціальних реформ та важливості індивідуальної автономії в релігійних установах."
  flavor_hol.10.a: "Нехай ідеї [target_character.GetHisHer] створять краще майбутнє."
  flavor_hol.10.b: "Філософії [target_character.GetHisHer|U] не можуть залишатися в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_hol.11.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.11.desc: "[target_character.GetName] — вчений і юрист, відомий своєю знаменитою книгою «De Jure Belli ac Pacis». Вважається юридичним шедевром, праці [target_character.GetHisHer] закладають основу для майбутніх законів. [target_character.GetHeShe|U] також відомий [target_character.GetHisHer] знаменитою втечею з в'язниці (де він був ув'язнений через політичні та релігійні конфлікти) у книжковій скрині!"
  flavor_hol.11.historical_info: "Гуго Гроцій, голландський ерудит, народжений у Делфті 1583 року, зробив значний внесок у філософію, політичну теорію та право, особливо в галузі міжнародного права та природних прав. Незважаючи на ув'язнення за участь у релігійних суперечках у Голландській Республіці, Гроцій продовжував свої інтелектуальні пошуки та написав впливові праці під час вигнання у Франції. Його шедеври, #italic De jure belli ac pacis#! та #italic Mare Liberum#!, заклали основи сучасного міжнародного права, принісши йому титул #italic батька міжнародного права#!. Ідеї Гроція щодо суверенітету, природного права та прав вплинули на наступних мислителів, таких як Джон Локк, і відіграли роль у формуванні політичних подій, таких як Славна революція в Англії та Американська революція. Його теологічна основа природного права, що корениться як у біблійному одкровенні, так і в людському розумі, залишається наріжним каменем його спадщини."
  flavor_hol.11.a: "Яка чудова людина!"
  flavor_hol.12.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.12.desc: "Син одного дипломата нашого двору стає популярним завдяки [target_character.GetHerHis] генію. За словами деяких наших радників, [target_character.GetSheHe] виявив дивовижні здібності до геометрії та математики. Здібності [target_character.GetHerHis|U] могли б бути корисними при дворі, і за належного фінансування [target_character.GetSheHe] міг би здивувати нас і світ."
  flavor_hol.12.historical_info: "Гюйгенс був голландським математиком, астрономом і фізиком, який заснував хвильову теорію світла, відкрив справжню форму кілець Сатурна і зробив оригінальний внесок у науку динаміки – вивчення дії сил на тіла. Забуті до початку 19 століття, його теорії світла сьогодні виглядають як один з найблискучіших і найоригінальніших внесків у сучасну науку і завжди будуть пам'ятатися за принципом, що носить його ім'я."
  flavor_hol.12.a: "Приведіть [target_character.GetHerHim] до двору."
  flavor_hol.12.b: "[target_character.GetSheHe|U] — звичайна людина."
  NED_BUFFED_POLDERS: "[ShowBuildingTypeName('polders')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e] #Y Максимальний рівень#! від [Concept('development', 'CONCEPT_PLACEHOLDER')|e] тепер буде #G Подвоєно#!."
  flavor_hol.13.title: "Банк [ShowLocationNameWithNoTooltip('amsterdam')] та Міжнародний ринок капіталу"
  flavor_hol.13.desc: "Заснування [ShowBuildingTypeName('wisselbank')] було історичним досягненням нашого суспільства та купецького класу. Однак те, що починалося як спосіб суворого контролю над вартістю грошей, з роками змінювалося, додаючи все більше винятків до правила — якщо не безпосередньо їх порушуючи. Нікого не дивує, що раніше дуже шанована установа втратила свій минулий престиж і вважається корумпованим місцем.\n\nОднак тепер економічні труднощі, з якими стикається наша нація, змушують нас озирнутися на цю установу в останній спробі відновити її минулий престиж і, в процесі, нашу власну економіку."
  flavor_hol.13.historical_info: "З моменту заснування Віссельбанку спочатку сувора політика повного резерву з часом послабилася, фінансуючи заморську торгівлю та голландську економіку, але підтримуючи ліквідність через заставу. Коли почалася Четверта англо-голландська війна, довіра до банку була серйозно підірвана, оскільки Голландська Ост-Індська компанія оголосила дефолт. У 1790 році Віссельбанк був оголошений неплатоспроможним, навіть після кількох спроб рекапіталізувати установу. Зрештою, місто Амстердам взяло його під контроль і замінило його на Нідерландський банк. Віссельбанк був закритий у 1819 році."
  flavor_hol.13.a: "Спроба врятувати [ShowBuildingTypeNameWithNoTooltip('wisselbank')]."
  flavor_hol.13.b: "Закрити Банк [ShowLocationNameWithNoTooltip('amsterdam')] і мати справу з наслідками."
  STATIC_MODIFIER_NAME_ned_bank_crisis: "Криза голландського фінансового сектору"
  STATIC_MODIFIER_DESC_ned_bank_crisis: "Колись центр загальноєвропейських фінансів, інші міста в інших країнах тепер обігнали [ShowLocationNameWithNoTooltip('amsterdam')]. Разом з поганою економічною політикою самого Банку [ShowLocationNameWithNoTooltip('amsterdam')] серйозно ставиться під сумнів довіра та життєздатність голландського банківського сектору."
  flavor_hol.14.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.14.desc: "Зі скромної родини [target_character.GetName] виявив вражаючу здатність зображати світ на папері. Ця здатність може бути дуже корисною у військових операціях, однак існує ризик, що навички [target_character.GetHerHis] використовуються недостатньо, якщо [target_character.GetSheHe] обмежений лише військовими картами."
  flavor_hol.14.historical_info: "Фламандський географ, математик і картограф. Навчався в Лувені, де мав географічний заклад (1534). З 1537 по 1540 рік він обстежував і картографував Фландрію. У 1538 році він створив свою першу карту світу (на основі карти Птолемея)."
  flavor_hol.14.a: "Карти [target_character.GetHerHis|U] будуть дуже корисними для військових."
  flavor_hol.14.b: "Дозвольте [target_character.GetHerHim] працювати над [target_character.GetHerHis] вдосконаленнями карт."
  flavor_hol.15.title: "[ShowReligionNameWithNoTooltip('calvinist')] у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hol.15.desc: "Роками наша нація дискутувала між більш консервативним [ShowReligionName('calvinist')] або більш відкритим, намагаючись пристосуватися до різноманітних вірувань, що населяють нашу країну.\n\nУ [ShowLocationName('dordrecht')] відбувається синод, де два головні представники обох сторін зустрілися, щоб судити доктрину свого опонента. Це може бути чудовою нагодою публічно показати нашу підтримку одному з двох претендентів і, таким чином, покласти край цій дискусії назавжди."
  flavor_hol.15.historical_info: "На церковній зустрічі в Дордрехті (1618-1619) жорсткий кальвінізм був зроблений державною релігією. Це був кінець довгої боротьби між плюралістичною та гуманітарною фракцією, армініанами, та догматичною, вузьколобою фракцією «Істинних кальвіністів», гомаристами. Моріц Оранський підтримував гомаристів, що складалися переважно з дрібних буржуа та фермерів, тоді як Ольденбарневельд підтримував армініан, що складалися з інтелектуалів та багатих буржуа."
  flavor_hol.15.a: "Підтримати [target_character2.GetName]."
  flavor_hol.15.b: "[target_character1.GetName] має рацію."
  flavor_hol.16.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.16.desc: "Народжений в одній з найважливіших родин нашої нації, [target_character.GetName] є великим [target_character.GetWomanMan], чиї таланти не використовуються належним чином на [target_character.GetHerHis] посаді пенсіонарія [ShowLocationNameWithNoTooltip('dordrecht')]. Ми повинні найняти [target_character.GetHerHim] і залучити [target_character.GetHerHim] до нашого офісу."
  flavor_hol.16.historical_info: "Ян де Вітт став Раадпенсіонарісом (Великим Пенсіонарієм) у 1653 році. Голландська республіка під його керівництвом пережила одні з найблискучіших років. Він також провів своє життя, борючись із впливом Оранського дому, який традиційно обіймав посаду штатгальтера, а отже, відповідав за військові справи Республіки, зумівши домогтися голосування за Акт про виключення проти них у 1667 році. Однак поразки 1672 року проти Франції та Англії змусили оранжистську партію повернутися і ув'язнити його. 20 серпня 1672 року його та його брата Корнеліса було розтерзано натовпом, підбурюваним його політичними опонентами."
  flavor_hol.16.a: "[target_character.GetSheHe|U] стане чудовим міністром!"
  flavor_hol.16.b: "Немає потреби в іншому раднику."
  flavor_hol.17.title: "Створення Амстердамської фондової біржі"
  flavor_hol.17.desc: "Оскільки наші підприємства всюди стають все більш прибутковими, все більше людей зацікавлені в інвестуванні в них. Ці інвестори очікують повернення своїх інвестицій, і тому виникає необхідність створення установи, яка гарантуватиме, що ці інвестори отримають майбутню частку прибутку. Рішення цієї проблеми прийшло з заснуванням фондової біржі в Амстердамі, яка надаватиме цим інвесторам облігації. Однак наші радники кажуть нам, що напрямок цієї установи повинен схилятися до контролю над нашою економікою або надання легшого доступу до позик."
  flavor_hol.17.historical_info: "Після створення Амстердамського банку (1609) фондова біржа міста ставала все активнішою. Перейнявши від Антверпена роль провідного фінансового центру, фондова біржа процвітала. Кошти з усієї Європи ставали доступними, а позики були легкодоступними за ставками, неперевершеними ніде більше. Це було посилено капіталістичним успіхом Голландської Ост-Індської компанії (1602) і навіть менш успішної Вест-Індської торгової компанії (1621)."
  flavor_hol.17.a: "Розширити ринок позик."
  flavor_hol.17.b: "Ввести суворий контроль."
  flavor_hol.18.title: "[target_country.GetAdjectiveWithNoTooltip]-[root_country.GetCulture.GetNameWithNoTooltip] Напруженість"
  flavor_hol.18.desc: "Протягом років [target_country.GetAdjective] [target_country.GetFlavorRank] завжди підтримував наш [root_country.GetFlavorRank], оскільки ми мали спільного ворога в [GetUniqueInternationalOrganization('hre').GetLeaderTitle]. Однак останнім часом [target_country.GetAdjectiveWithNoTooltip] внутрішня політика щодо гугенотів, а також їхня зовнішня політика в нашому безпосередньому оточенні змусили багатьох побоюватися [target_country.GetNameWithNoTooltip]. Можливо, настав час спробувати зібрати друзів перед неминучим конфліктом з нашим південним сусідом."
  flavor_hol.18.a: "Наша політика повинна полягати в стримуванні [target_country.GetNameWithNoTooltip]."
  ned_anti_french_policy: "Спільний ворог"
  fra_dutch_friction: "Франко-голландські тертя"
  flavor_hol.18.b: "Проводити дружню політику щодо [target_country.GetNameWithNoTooltip]."
  ned_friendly_towards_france: "Дружити з Францією"
  flavor_hol.19.title: "В'язень Голландії"
  flavor_hol.19.desc: "Після років, якщо не дружби, то принаймні дружньої співпраці, [root_country.GetName] почала діяти більш вороже до нас. Ми отримали повідомлення, що вони шукають друзів за кордоном серед наших ворогів і що вони мають намір обмежити наш вплив у Нижніх Землях. Хоча це невдячно, можливо, це також досить своєчасно. Без нашої доброї волі, щоб захистити їх, Нижні Землі стали б чудовим доповненням до нашого [target_country.GetFlavorRank]."
  flavor_hol.19.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_hol.19.a.tt: "[Concept('root_country.GetLongName] спробує покращити свої стосунки з нашими [rivals', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hol.20.title: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] Військові реформи"
  flavor_hol.20.desc: "Військові сили [ShowContinentName('europe')] швидко розвиваються в технологіях і тактиці. Стало зрозуміло, що ми повинні якнайшвидше реформувати нашу армію, щоб [ROOT.GetCountry.GetName] могла зберегти будь-який політичний вплив на арені великих держав. На щастя, [target_character.GetName] вже має плани щодо вирішення цього питання..."
  flavor_hol.20.historical_info: "Йоганн, граф Нассау-Зігенський, разом зі своїм кузеном, принцом Моріцем, та братом Віллемом, були в центрі голландських реформ. Переосмислюючи втрачені навички класичних армій з перекладів римських військових посібників, вони реорганізували бойові порядки, щоб зробити їх більш гнучкими та збільшити вогневу міць. Саме Йоганн був мозком найвідомішого з усіх навчальних посібників, «Wapenhandelinghe» де Гейна, і засновником однієї з перших військових академій у Зігені, Німеччина."
  flavor_hol.20.a: "Віддати перевагу наступальному підходу."
  flavor_hol.20.b: "Віддати перевагу оборонному підходу."
  flavor_hol.21.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.21.desc: "Справжня сила правителя полягає в компетентності його міністрів. На щастя для [ROOT.GetCountry.GetCulture.GetName] [ROOT.GetCountry.GetFlavorRank], двір благословенний службою [target_character.GetName]."
  flavor_hol.21.historical_info: "Народжений у 1640 році, Антоні Хейнсіус все життя користувався довірою Вільгельма III Оранського. Відправлений до Версаля після Неймегенського миру для нагляду за виконанням його умов, він став Раад Пенсіонарієм у 1688 році після переїзду Вільгельма до Англії. Жорсткий переговорник і впертий противник Франції, він був у центрі всіх антифранцузьких коаліцій, що створювалися у всіх війнах кінця 17 століття. Помер у 1720 році."
  flavor_hol.21.a: "Чудовий міністр!"
  STATIC_MODIFIER_NAME_hol_brilliant_minister: "Блискучий міністр"
  STATIC_MODIFIER_DESC_hol_brilliant_minister: "Здібності цього персонажа при дворі значно перевершують усі очікування. Їхні ідеї та дії відкривають державі шлях до великого майбутнього."
  flavor_hol.22.title: "Арумерський Чорний Загін"
  flavor_hol.22.desc: "Невдоволені поведінкою наших військ у регіоні, [ShowPopTypeName('peasants')] [ShowAreaName('friesland_area')] взяли до рук зброю проти нас. До них приєдналися найманці, і ці повстанці мали обмежений успіх на суші, але вже здійснили кілька дивовижних маневрів на морі. Справді, повстанці є стільки ж піратами, скільки й солдатами, і якщо ми не придушимо це незабаром, судноплавство постраждає."
  flavor_hol.22.a: "Придушити зрадників."
  frisian_independence_fighter: "$frisian$ Борці за незалежність"
  flavor_hol.22.a.tt: "Усі [ShowCultureName('frisian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] приєднаються до [Concept('target_rebel.GetName] [rebel', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hol.23.title: "[target_character.GetNameWithNoTooltip] - Принц Філософів"
  flavor_hol.23.desc: "Інноваційні ідеї та думки активно просуваються в [ROOT.GetCountry.GetCulture.GetName] державі, що, своєю чергою, виховує більше допитливих умів, які прагнуть підтримати спільноту своїми філософіями. Одним із таких інтелектуалів є [target_character.GetName], який присвятив себе кільком філософським галузям."
  flavor_hol.23.historical_info: "Син родини португальських єврейських іммігрантів, Барух Спіноза вів відносно просте життя і утримував себе як виробник лінз та за рахунок внесків благодійників. Хоча Спіноза, як кажуть, був чудовим виробником лінз, саме його відданість філософії, етиці та теології запам'ятається цій людині. Спіноза опублікував небагато праць за свого життя, але його ідеї все одно поширювалися, і це призвело до того, що Гейдельберзький університет запропонував йому кафедру, від якої він відмовився, побоюючись, що це може обмежити його думки."
  flavor_hol.23.a: "Велика людина."
  flavor_hol.24.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.24.desc: "[ShowReligionName('calvinist')] поширюється в [ROOT.GetCountry.GetName] як лісова пожежа. Відкидаючи погляди [ShowReligionName('lutheran')], [ShowReligionAdjectiveWithNoTooltip('calvinist')] віруючі мають значно радикальніший підхід проти [ShowReligionName('catholic')].\n\nОднак не всі погоджуються з їхніми ідеологіями. Теолог [target_character.GetName] кидає виклик ревним шляхам і пропонує більш гуманне ставлення до єретиків. Його спосіб мислення призвів до заснування руху [ShowReligiousAspectName('arminianism')] у [ShowReligionNameWithNoTooltip('calvinist')]."
  flavor_hol.24.historical_info: "Якобус Армініус, голландський реформатський теолог, кинув виклик кальвінізму та розробив теологічну основу для армініанства, що спричинило голландський ремонстрантський рух. Незважаючи на те, що спочатку він захищав кальвіністське приречення, Армініус почав сумніватися в деяких його аспектах і запропонував модифікації, наголошуючи на благодаті, достатній для всіх, щоб повірити і бути врятованими. Його вчення були систематизовані посмертно в П'яти статтях ремонстрантів, що призвело до переслідувань з боку кальвіністського Синоду Дорта, проте армініанство збереглося і вплинуло на таких діячів, як Джон Веслі, який став його видатним прихильником у методистському русі."
  flavor_hol.24.a: "Прийняти [target_character.GetHisHer] філософії."
  flavor_hol.24.b: "Відкиньте [target_character.GetHimHer] та [target_character.GetHisHer] ідеї."
  flavor_hol.24.c: "Вигнати цього єретика!"
  flavor_hol.25.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.25.desc: "[ShowReligiousAspectName('arminianism')] зростає в популярності серед [ShowReligionName('calvinist')]. Однак не всі підписуються під ідеалами [trigger_character.GetName] та [trigger_character.GetHisHer] руху. Таким видатним опонентом є теолог [target_character.GetName], який виступає проти ліберальних та гуманістичних поглядів, що їх відстоює [ShowReligiousAspectNameWithNoTooltip('arminianism')]. Так народжується рух [ShowReligiousAspectName('gomarism')]."
  flavor_hol.25.historical_info: "Голландський теолог Франциск Гомар затято протистояв вченням Якоба Армінія, відстоюючи абсолютне приречення та очолюючи фракцію гомаристів. Незважаючи на те, що спочатку Гомар викладав тихо, він зіткнувся з Армінієм після прибуття останнього до Лейденського університету, вступаючи в особисті суперечки та теологічні дебати. Він відіграв помітну роль на Дортському синоді, захищаючи кальвіністську доктрину, і продовжував свої академічні заняття до самої смерті, залишивши після себе спадщину теологічної вченості та суперечок."
  flavor_hol.25.a: "$flavor_hol.24.a$"
  flavor_hol.25.b: "$flavor_hol.24.b$"
  flavor_hol.25.c: "$flavor_hol.24.c$"
  flavor_hol.26.title: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip]-[target_country.GetAdjectiveWithNoTooltip] Війна"
  flavor_hol.26.desc: "[target_country.GetAdjective] народ проголосив безбожне життя. Незалежне від будь-якого феодального правління, звільнене від будь-якого божественного керівництва, життя в [target_country.GetNameWithNoTooltip] більше нагадує анархію, ніж будь-яке схвалене Біблією існування. Як побожні члени [ShowReligionGroupAdjective('christian')] Віри, наш священний обов'язок покласти край цій образі Господа і покінчити з цією «свободою» раз і назавжди."
  flavor_hol.26.a: "Нехай Господь допоможе нам швидко покласти край цій єресі."
  flavor_hol.27.title: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] Живопис Золотої Доби"
  flavor_hol.27.desc: "Процвітання та стабільність формують поточну історію [ROOT.GetCountry.GetName]. Натхненні цією [ROOT.GetCountry.GetCulture.GetName] Золотою Добою, художники з усіх куточків нашої нації створюють великі картини, небачені раніше людством."
  flavor_hol.27.historical_info: "Голландський живопис Золотої доби процвітав у XVII столітті під час розквіту Голландської республіки, позначеного процвітанням та інноваціями в торгівлі, науці та мистецтві. Відходячи від традиційних релігійних тем, голландські художники прийняли світські сюжети з деталізованим реалізмом, формуючи окремі жанри, такі як портретний живопис, жанрові сцени, пейзажі, морські пейзажі та натюрморти. Ця спеціалізація в жанрах живопису, що спостерігалася з кінця 1620-х до 1672 року, уособлювала художню ідентичність епохи та вплинула на майбутню траєкторію західного живопису."
  flavor_hol.27.a: "Нехай наше мистецтво досягне сердець своїх глядачів."
  flavor_hol.28.title: "[ShowBuildingTypeNameWithNoTooltip('wisselbank')]"
  flavor_hol.28.desc: "З огляду на мінливість дорогоцінних металів, що використовуються для карбування монет, особливо [ShowGoodsName('silver')], багатьом стає очевидною потреба у стабільній срібній банківській валюті. Кілька [ShowPopTypeName('burghers')], колишніх членів міської ради, запропонували створити обмінний банк, який був би гарантом цієї вкрай необхідної стабільності вартості валюти.\n\nНе всі підтримують цю ідею, переважно серед [ShowPopTypeName('nobles')], які вбачають у цьому новий спосіб для [ShowPopTypeNameWithNoTooltip('burghers')] отримати більше влади для себе. Хоча це не обов'язково неправда, у пропозиції є перевага, оскільки вона призведе до кращого контролю над вартістю валют, якими ми торгуємо."
  flavor_hol.28.a: "Побудувати обмінний банк."
  flavor_hol.28.b: "Нам це не потрібно."
  flavor_hol.28.historical_info: "Заснований у 1609 році, Банк Амстердама, або Віссельбанк, був раннім обмінним банком, схваленим містом Амстердам. Деякі вважали його першим справжнім центральним банком, він відіграв вирішальну роль у захисті стандартів карбування монет та запровадив першу міжнародну резервну валюту, банківський гульден. Віссельбанк вплинув на державні банки по всій Європі, але зміна політики та дефолти під час Четвертої англо-голландської війни призвели до його неплатоспроможності у 1790 році. Місто Амстердам взяло контроль у 1791 році, а Нідерландський банк перебрав на себе обов'язки з випуску грошей у 1814 році, що призвело до ліквідації Віссельбанку у 1819 році."
  flavor_hol.29.title: "Північне [ShowInstitutionNameWithNoTooltip('renaissance')]"
  flavor_hol.29.desc: "Поки [ShowInstitutionName('renaissance')] вирує в решті [ShowContinentName('europe')], [target_character.GetName] планує просувати художників, щоб зміцнити [target_character.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle] та далі поширювати ідеали Відродження в Нижніх Країнах."
  flavor_hol.29.a: "Давайте спонсоруємо це починання."
  flavor_hol.29.b: "Це занадто дорого."
  flavor_hol.29.c: "Вони допоможуть нам не лише в мистецтві."
  flavor_hol.30.title: "[ShowLocationNameWithNoTooltip('jerusalem')] Заходу"
  flavor_hol.30.desc: "Оскільки [ShowLocationName('amsterdam')] є домом для багатьох [ShowReligionAdjective('judaism')] людей, його назвали #italic [ShowLocationName('jerusalem')] Заходу#!. Хоча це не [ShowReligionAdjectiveWithNoTooltip('judaism')] [target_location.GetRank.GetName], це, безумовно, дім для багатьох із них."
  flavor_hol.30.a: "Нехай живуть у мирі."
  flavor_hol.31.title: "Порт [target_location.GetNameWithNoTooltip]"
  flavor_hol.31.desc: "[target_location.GetRank.GetName] [target_location.GetName] бачив, як його [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] планували новий порт. Це дозволить нам краще зосередитися на морських справах, але вимагатиме від нас інвестувати в їхні плани."
  flavor_hol.31.a: "Якщо їм потрібні гроші, то вони можуть їх отримати."
  flavor_hol.31.b: "Натомість ми повинні зосередитися на землі."
  flavor_hol.32.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] гульден"
  flavor_hol.32.desc: "Оскільки флорин досяг нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], багато купців просять нас почати карбувати цю нову монету, названу в [ROOT.GetCountry.GetName] як #italic Гульден#!, сподіваючись, що ця нова монета матиме більшу грошову вартість, ніж попередня."
  flavor_hol.32.a: "Створимо цю нову монету."
  flavor_hol.32.b: "Немає потреби в будь-яких грошових реформах."
  flavor_hol.32.historical_info: "Під час правління герцога Філіпа Доброго Бургундського він надихнувся флорином Італії, лівром Франції та фунтом Англії, щоб створити свою монету. Відомий як голландський гульден, він швидко поширився по всій Нижній Землі, зрештою ставши домінуючою валютою на століття вперед."
  flavor_hol.33.title: "Пошуки [ShowAreaNameWithNoTooltip('baltic_area')] зерна"
  flavor_hol.33.desc: "Оскільки нам бракує виробництва зерна для самозабезпечення, ми повинні шукати джерела для імпорту нашого зерна. Одним із найближчих джерел є провінції [ShowAreaName('baltic_area')]. Дві ключові проблеми заважають нам забезпечити ці поставки зерна. Перша і найважливіша – це Звуковий збір у [ShowLocationName('kobenhavn')], що заважає будь-яким [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] інтенсивніше торгувати там, оскільки вони повинні платити високий збір за прохід. Інша важлива проблема – це панування [ShowCultureGroupName('german_group')] націй там, що ускладнює конкуренцію для будь-кого іншого. Можливо, використовуючи розумну дипломатію або борючись із цими проблемами силою, ми нарешті зможемо забезпечити наші поставки зерна."
  flavor_hol.33.a: "Відпливемо до [ShowAreaNameWithNoTooltip('baltic_area')]."
  NED_GAIN_GRAIN_SUPPLY_TO_DEAL_WITH_GRAIN_ISSUES: "Проблема триватиме доти, доки [ROOT.GetCountry.GetCapital.GetMarket.GetName] бракуватиме [ShowGoodsName('wheat')], а наша [Concept('merchant_power', 'CONCEPT_PLACEHOLDER')|e] у [target_location2.GetMarket.GetName] та [target_location.GetMarket.GetName] буде нижчою за #Y 100#!."
  flavor_hol.34.title: "[ShowAreaNameWithNoTooltip('baltic_area')] торгівля забезпечена"
  flavor_hol.34.desc: "Завдяки забезпеченій торгівлі в [ShowAreaName('baltic_area')] ми можемо надійніше почати відправляти партії продовольства назад до Нижніх Земель."
  flavor_hol.34.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  NED_ALL_DUTCH_POPS_BECOME_HAPPIER: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], що є частиною [ShowCultureGroupName('netherlandish_group')] [Concept('culture_group', 'CONCEPT_PLACEHOLDER')|e], отримає [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."