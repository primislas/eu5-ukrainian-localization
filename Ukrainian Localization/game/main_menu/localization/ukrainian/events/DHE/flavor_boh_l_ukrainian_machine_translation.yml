l_english:
  flavor_boh.1.title: "Повернення [ShowReligionNameWithNoTooltip('hussite')]!"
  flavor_boh.1.desc: "Спроби забезпечити релігійний мир між [ShowReligionAdjective('hussite')] та [ShowReligionAdjective('catholic')] послідовниками провалилися, незважаючи на всі наші зусилля. [jiri_z_podebrad.GetName], лідер [ShowReligionAdjectiveWithNoTooltip('hussite')] фракції, зібрав армію і тепер марширує на [ShowLocationName('prague')]. Він має намір зробити себе [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName] і забезпечити релігійну свободу для послідовників [GetCharacter('boh_jan_hus').GetLastName]."
  flavor_boh.1.historical_info: "Їржі з Кунштату і Подебрад був богемським дворянином і лідером гуситів. Через напруженість між вірними католицизму та гуситами під час правління короля Ладислава, він зібрав армію і рушив до столиці, а потім переміг усіх дворян, які все ще були вірні Папі. У 1451 році імператор Священної Римської імперії Фрідріх III надав йому управління Богемією, а згодом у 1458 році він був обраний станами Богемії, навіть тими, хто все ще був вірний Папі. Його правління було відзначене політикою миру та співпраці, але католицька опозиція організувала повстання за допомогою короля Угорщини Матяша Корвіна, який вторгся в Богемію, щоб повернути її до католицизму."
  flavor_boh.1.a: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] знав правду."
  flavor_boh.1.b: "Нехай [ROOT.GetCountry.GetGovernment.GetRulerTitle] слідує за Гусом, нація слідує за Римом."
  STATIC_MODIFIER_NAME_boh_hussite_king: "Гуситське правління"
  STATIC_MODIFIER_NAME_DESC_boh_hussite_king: "Наш правитель підтримує [ShowReligionName('hussite')], релігійний рух, заснований [GetCharacter('boh_jan_hus').GetName] на противагу [ShowReligionAdjective('catholic')] Церкві. Хоча рух дуже популярний серед наших підданих, це зробило інших [ShowReligionGroupAdjective('christian')] правителів Європи ворожими до нас у кращому випадку."
  flavor_boh.1.c: "Ми будемо вірні Риму!"
  boh_papal_reconciled: "Гуситське підкорення"
  flavor_boh.2.title: "Єретик [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_boh.2.desc: "[target_character.GetName] є відданим послідовником [ShowReligionAdjective('hussite')] секти, що ставить [target_character.GetHerselfHimself] у протиріччя з [ShowReligionAdjective('catholic')] Церквою. [GetCountry('PAP').GetGovernment.GetRulerTitle], вважаючи себе милосердним сувереном, запропонував повне примирення з Церквою і навіть м'які поступки, якщо ми відмовимося від [GetCharacter('boh_jan_hus').GetLastName] і повернемося до відповідності Риму."
  flavor_boh.2.a: "Схилити коліна перед Римом"
  flavor_boh.2.b: "Залишатися вірним Христу!"
  flavor_boh.3.title: "Конфедерація Зеленої Гори"
  flavor_boh.3.desc: "Відмова [target_character.GetName] від вимог Церкви придушити [ShowReligionAdjective('hussite')] віру викликала озлоблення папської фракції в [ROOT.GetCountry.GetName]. Вони вважають [target_character.GetHerHim] єретиком і ворогом як їх, так і Церкви. На зустрічі в Зеленій Горі вони оголосили [target_character.GetShortNameWithNoTooltip] непридатним для правління. Разом з однодумцями-дворянами в [ShowAreaName('silesia_area')] вони розпочали відкрите повстання проти нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_boh.3.a: "Ми їх розчавимо!"
  flavor_boh.4.title: "Владиславська зала"
  flavor_boh.4.desc: "[target_character.GetName], наш чудовий архітектор, справді перевершив себе своєю останньою спорудою, [ShowWorkOfArtName('vladislav_hall')]. Абсолютний шедевр архітектури, це, безсумнівно, найбільший світський простір у [ShowLocationName('prague')]. Його можна використовувати для бенкетів, коронацій та інших важливих подій двору, а його безпрецедентний розмір, не тільки в довжину, але й у висоту склепінчастої стелі, робить його достатньо великим, щоб проводити в ньому турніри з лицарями на конях."
  flavor_boh.4.a: "Чудово!"
  flavor_boh.4.historical_info: "Владиславська зала, шедевр пізньої готики в Празькому Граді, була завершена в 1502 році за короля Владислава II. Спроектована Бенедиктом Рейтом, її величезний простір і ребристі склепіння відображають середньовічну архітектурну винахідливість. Спочатку використовувалася для королівських церемоній, бенкетів і лицарських турнірів, пізніше під час епохи Габсбургів тут проводилися парламентські засідання та королівські вибори. Її широкі сходи були побудовані для розміщення лицарів на конях."
  flavor_boh.6.title: "Браге і Кеплер"
  flavor_boh.6.desc: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] став маяком наукового прогресу, приваблюючи найбільші уми епохи. Серед них до [ROOT.GetCountry.GetCapital.GetName] прибув відомий данський астроном [target_character.GetName], принісши [target_character.GetHerHis] неперевершені знання в галузі небесних спостережень. Прагнучи вдосконалити [target_character.GetHerHis] теорії, [target_character.GetSheHe] приєднався до блискучого математика [target_character2.GetName], чия аналітична майстерність може революціонізувати наше розуміння небес. Їхня співпраця може принести престиж і знання нашому королівству, але їхня робота кидає виклик традиційним поглядам."
  flavor_boh.6.historical_info: "Відомий астроном Тихо Браге переїхав до Праги в похилому віці, де став офіційним астрономом при дворі. Він побудував нову обсерваторію, де йому допомагав Йоганн Кеплер, який згодом використав зібрані Браге дані після його смерті для розробки своїх законів планетних рухів."
  flavor_boh.6.a: "Блискуче!"
  flavor_boh.6.b: "Їм слід перестати дивитися на небо!"
  flavor_boh.7.title: "[ShowReligionAdjectiveWithNoTooltip('hussite')] Традиції"
  flavor_boh.7.desc: "[ShowReligionAdjective('hussite')] традиції досі пам'ятають серед народу [ROOT.GetCountry.GetName]. Тепер, коли тези Лютера стали широко відомими, все більше важливих людей відкрито оголошують себе [ShowReligionAdjective('lutheran')], а не [ShowReligionAdjectiveWithNoTooltip('hussite')]. Ми повинні вирішити, чи зберегти окрему [ShowReligionAdjectiveWithNoTooltip('hussite')] ідентичність, чи приєднатися до ширшої [ShowReligionAdjectiveWithNoTooltip('lutheran')] Реформації."
  flavor_boh.7.a: "Ми збережемо нашу окрему [ShowReligionAdjectiveWithNoTooltip('hussite')] віру."
  flavor_boh.7.b: "Ми приєднаємося до Реформації. За Лютера та [GetCharacter('boh_jan_hus').GetLastNameWithNoTooltip]!"
  flavor_boh.8.title: "Зимовий король у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_boh.8.desc: "Релігійна напруга між нашим [ShowReligionAdjective('catholic')] та [ShowReligionAdjective('lutheran')] населенням не є чимось новим, але останнім часом вона досягла тривожних крайнощів. Деяким [ShowReligionAdjectiveWithNoTooltip('lutheran')] дворянам вдалося заручитися підтримкою інших подібних єретиків із сусідніх країн, і вони навіть обрали кандидата, щоб замінити [target_character.GetName] як [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName]. Їхня зухвалість не знає меж, але релігійний конфлікт є незаперечним. Ми повинні або прийняти [ShowReligionNameWithNoTooltip('lutheran')], або бути готовими зустріти їх на полі бою."
  flavor_boh.8.historical_info: "У 1608 році напруга між католицькими та протестантськими частинами Імперії зросла. Протестанти об'єдналися під проводом князя Фрідріха Пфальцького, якого підтримували Бранденбург та Гессен-Кассель. Католики відповіли, створивши власний союз, Католицьку лігу. У 1618 році протестанти Богемії повстали і обрали протестантського короля Богемії, Фрідріха Пфальцького. Імператор не міг цього прийняти, оскільки він також був королем Богемії. Він відправив свого досвідченого полководця Тіллі зі своїми військами до Богемії, і в битві на Білій Горі правління Фрідріха Пфальцького закінчилося. Весь протестантський опір в Австрії та південній Німеччині був придушений. Фрідріх втік з Богемії і був названий «Зимовим королем» через його коротке правління."
  flavor_boh.8.a: "Уникнемо кровопролиття."
  flavor_boh.8.b: "Бог буде з нами!"
  boh_lutheran_king: "Лютеранський король на троні"
  flavor_boh.9.title: "[ShowReligionAdjectiveWithNoTooltip('hussite')] [GetCountry('BOH').GetGovernment.GetRulerTitle] у [GetCountry('BOH').GetNameWithNoTooltip]"
  flavor_boh.9.desc: "Новий [GetCountry('BOH').GetGovernment.GetRulerTitle] розпочав [target_character.GetHerHis] правління у [GetCountry('BOH').GetLongName]. Безсумнівно, спокушений дияволом, [target_character.GetName] обрав слідувати єретичній [ShowReligionAdjective('hussite')] вірі, відкрито кидаючи виклик усьому належному. Колегія кардиналів ідентифікує це як образу [ShowReligionNameWithNoTooltip('catholic')] та особисто [ROOT.GetCountry.GetGovernment.GetRuler.GetName]."
  flavor_boh.9.a: "Ми повинні засудити [target_character.GetNameWithNoTooltip] та [target_character.GetHerHis] дім."
  boh_heretic_hussite: "Єретик-гусит"
  flavor_boh.9.b: "Ми повинні шукати примирення з [GetCountry('BOH').GetNameWithNoTooltip]."
  flavor_boh.10.title: "[GetCountry('PAP').GetLongNameWithNoTooltip] засуджує [target_character.GetNameWithNoTooltip]"
  flavor_boh.10.desc: "[GetCountry('PAP').GetLongName] засудив нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] за [target_character.GetHerHis] наполягання на [ShowReligionAdjective('hussite')] єресі."
  flavor_boh.10.a: "Я стою зі своїм народом!"
  flavor_boh.11.title: "[GetCountry('PAP').GetLongNameWithNoTooltip] погоджується"
  flavor_boh.11.desc: "Ми отримали звістку, що [GetCountry('PAP').GetLongName] вирішив утриматися від засудження нашого нового [ROOT.GetCountry.GetGovernment.GetRulerTitle], незважаючи на [target_character.GetHerHis] відкрите дотримання [ShowReligionAdjective('hussite')] руху."
  flavor_boh.11.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_boh.13.title: "Розкол у Церкві"
  flavor_boh.13.desc: "Відбудеться Собор щодо [ShowReligionAdjective('catholic')] віри у [ShowLocationName('konstanz')], і [target_character.GetName] було запропоновано поїхати туди та представити свої погляди на розкол у Церкві. Йому було обіцяно безпечний проїзд."
  flavor_boh.13.a: "Все буде добре!"
  flavor_boh.14.title: "Констанцький собор"
  flavor_boh.14.desc: "На великому зібранні Ради [ShowLocationName('konstanz')] вітри долі віють люто, несучи з собою тягар релігійних заворушень і долю однієї людини. [target_character.GetName], [GetCountry('BOH').GetAdjective] реформатор і поборник релігійної свободи, стоїть перед могутньою радою, його життя висить на волосині. Відлуння вчень [target_character.GetLastNameWithNoTooltip] лунають священними залами, кидаючи виклик авторитету [ShowReligionAdjective('catholic')] Церкви та вимагаючи реформ. Його послідовники, гусити, затамувавши подих, спостерігають, як рада обговорює його долю."
  flavor_boh.14.a: "Спалити [target_character.GetNameWithNoTooltip] на вогнищі"
  flavor_boh.14.b: "Помилувати єретика"
  flavor_boh.15.title: "[target_character.GetNameWithNoTooltip] спалений на вогнищі"
  flavor_boh.15.desc: "У літописах релігійної боротьби розгортається темний розділ, коли життя [target_character.GetName], [ROOT.GetCountry.GetAdjective] реформатора, досягає фатальної та трагічної кульмінації. Коли полум'я незгоди охопило вірних, могутні сили [ShowReligionAdjective('catholic')] Церкви тепер збираються, щоб загасити мерехтливе світло вчень [target_character.GetLastNameWithNoTooltip]."
  flavor_boh.15.a: "Чи був він одним із нас?"
  flavor_boh.16.title: "[target_character.GetNameWithNoTooltip] відпущено..."
  flavor_boh.16.desc: "У приголомшливому повороті подій зали правосуддя лунають проголошенням, що відлунює крізь віки. [target_character.GetName], [ROOT.GetCountry.GetAdjective] реформатор, колись засуджений як єретик, отримує проблиск спасіння. Його більше не вважають ворогом [ShowReligionAdjective('catholic')] Віри, і тому він вільний продовжувати свої вчення."
  flavor_boh.16.a: "Ці вчення обов'язково поширяться..."
  flavor_boh.17.title: "Перший Конгрес [ShowLocationNameWithNoTooltip('visegrad')]"
  flavor_boh.17.desc: "Минуло кілька років відтоді, як [ROOT.GetCountry.GetAdjective], [GetCountry('HUN').GetAdjective] та [GetCountry('POL').GetAdjective] доми зібралися з приводу [GetCountry('HAB').GetAdjective] експансії. Щоб зміцнити міцні відносини між трьома націями, ми вирішили анулювати наші претензії на [ShowDynastyName('piast_dynasty')] трон.\n\nНатомість, і як знак доброї волі, ми отримали ексклюзивні права на комерційні маршрути, а також визнання нашого суверенітету над [ShowAreaName('silesia_area')]. Ця угода оновила відносини між трьома домами і ще може виявитися життєво важливою пішаком у нашій війні впливу проти родини [ShowDynastyName('habsburg_dynasty')]."
  flavor_boh.17.a: "Ми й надалі дотримуватимемося цієї угоди!"
  flavor_boh.17.b: "У нас інші плани..."
  flavor_boh.18.title: "Староміська Ратуша"
  flavor_boh.18.desc: "Адміністрування нашого домену є складною справою, яка вимагає уваги до деталей численних здібних канцлерів та членів кабінету.\n\nЩоб полегшити судові процедури та покращити нашу здатність керувати [ROOT.GetCountry.GetFlavorRank], багато радників з нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle] запропонували придбати великий патриціанський будинок у заможної родини та перетворити його на місце зустрічей для обговорення політики та урядових дій між нашими радниками та членами станів."
  flavor_boh.18.a: "Це перевага для нашого [ROOT.GetCountry.GetGovernment.GetAdjective] становища!"
  flavor_boh.18.b: "Ми не повинні порушувати статус-кво."
  flavor_boh.19.title: "Права районів на оподаткування"
  flavor_boh.19.desc: "Зі зростанням міських кордонів [ShowLocationName('prague')] багато видатних діячів, які очолюють різні райони міста, такі як Мала Страна, виступили з вимогою надати їм право оподатковувати громадян, що проживають у їхніх межах.\n\nЦей крок, безумовно, передасть багато впливу з рук нашої скарбниці до рук [ShowEstateTypeName('nobles_estate')] і тому має бути розглянутий з надзвичайною обережністю."
  flavor_boh.19.a: "Дуже добре, задовольнити їхнє прохання."
  flavor_boh.19.b: "Про це не може бути й мови!"
  flavor_boh.20.title: "Університет [ShowLocationNameWithNoTooltip('prague')]"
  flavor_boh.20.desc: "Поширення знань є життєво важливим прагненням, якщо ми хочемо вважати себе одними з найосвіченіших та найерудованіших народів світу. Проведення академічного навчання, жваві кімнати нового університету та поширення мудрості стали найбажанішими заняттями нашої еліти останнім часом, що призвело до вимог побудувати [ShowBuildingTypeName('university')] у спробі розмістити та виховати наступне покоління яскравих умів!"
  flavor_boh.20.a: "Блискуча ідея!"
  flavor_boh.20.b: "Це не дуже гарна ідея..."
  flavor_boh.21.title: "Nové Město – Нове Місто"
  flavor_boh.21.desc: "На доказ великого управління [target_character.GetName], а також процвітання та достатку нашого народу, міська рада [target_location.GetName] пропонує будівництво абсолютно нового міста в межах нашої великої столиці. Прагнучи піднести статус міста [target_location.GetNameWithNoTooltip] до метрополії, багато радників підтримують ідею заселення нового міського центру щойно зведеними будівлями, які втілюють славу та працьовитість нашого народу!"
  flavor_boh.21.a: "Нехай буде збудовано!"
  flavor_boh.21.b: "Це не ідеальне використання наших коштів."
  flavor_boh.22.title: "Спільна Генеральна Асамблея"
  flavor_boh.22.desc: "З моменту нашого сходження на чолі [GetUniqueInternationalOrganization('hre').GetName] ми помітили чітку різницю між судовими процедурами Імперії та нашими. Розрив ще більше поглиблюється культурними та традиційними відмінностями, оскільки ми прагнемо захистити та легітимізувати наше правління.\n\nПрагнучи зміцнити нашу позицію та наблизити наш народ до Імперії, багато радників [target_character.GetName] запропонували спільну генеральну асамблею. Вона включатиме членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та провідних діячів усіх імперських князів поряд з нашими, і дозволить підтвердити багато існуючих римських законів, що стосуються їхніх привілеїв."
  flavor_boh.22.a: "Життєво важливий і необхідний крок для легітимізації нашого правління."
  flavor_boh.22.b: "Не будемо змішувати внутрішню та зовнішню політику."
  every_elector_25_opinion_tt: "Кожен курфюрст отримає [ShowBiasValue('granted_joint_assembly_decrees_modifier')|+=0] думки про нас"
  flavor_boh.23.title: "Земський суд [target_area.GetNameWithNoTooltip]"
  flavor_boh.23.desc: "Управління нашим королівством – непросте завдання. Сотні бальї та губернаторів невтомно працюють вдень і вночі, щоб покращити ефективність збору податків та посилити наш контроль над прикордонними землями нашого домену.\n\nНещодавно ми отримали звістку від муніципальних голів району [target_area.GetName], які звернулися з проханням про створення регіонального суду для перейняття адміністрації за дорученням [target_capital.GetName]. Представлений місцево обраним губернатором та під наглядом регіонального судді, суд матиме 14 місць для найвидатніших дворян району."
  flavor_boh.23.a: "Дуже добре, схвалити пропозицію."
  flavor_boh.23.b: "Ми не можемо ризикувати відчуженням центральної влади..."
  boh_control_prosp_dev_moravia_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в районі [target_area.GetName] отримає:\n#G 10%#! Контролю\n#G 1.00#! Розвитку\n#G 10%#! Процвітання"
  boh_prosperity_capital_prov: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в провінції [target_capital.GetName] отримає:\n#G 10%#! Процвітання"
  flavor_boh.24.title: "Maiestas Carolina"
  flavor_boh.24.desc: "Протягом століть члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] здійснювали майже необмежену владу над своїми місцевими володіннями. Це часто призводило до того, що багато з них оскаржували владу корони.\n\nБуло встановлено дуже небезпечне поняття та небезпечний прецедент. Багато радників у наших лавах запропонували розробити низку статей, спрямованих на обмеження повноважень видатних діячів дворянства на наших землях. Однак це може виявитися досить дестабілізуючим..."
  flavor_boh.24.a: "Продовжуйте розгляд, ми правимо цією землею."
  flavor_boh.24.b: "Не будемо засмучувати можновладців."
  flavor_boh.25.title: "Майстер Вишнього Броду"
  flavor_boh.25.desc: "Один з наших найталановитіших художників, [target_artist.GetName], здобув популярність в останні роки. З блискучим портфоліо робіт, є висока похвала та визнання такого здібного живописця. Запрошення [target_artist.GetHerHim] до нашого двору лише принесе користь престижу та славі нашої культури, а також нашій увазі до великого мистецтва."
  flavor_boh.25.a: "Основа наших вищих мистецьких починань!"
  flavor_boh.25.b: "Ми вважаємо ці роботи досить переоціненими, в будь-якому випадку..."
  flavor_boh.26.title: "Корона Святого Вацлава"
  flavor_boh.26.desc: "Наш королівський дім пережив багато бурхливих часів. Наша стійкість загартована перешкодами та ворогами, яких ми мусили перемогти, щоб досягти нашого нинішнього домінуючого становища.\n\nЯк спосіб відзначити та продемонструвати нашу перевагу, наші радники обмірковували ідею виготовлення легендарної та прекрасної корони, присвяченої Святому Вацлаву. Прикрашена золотом та оздоблена понад 90 дорогоцінними каменями, ця корона назавжди стоятиме як символ нашої могутності та достатку!"
  flavor_boh.26.a: "Профінансуймо створення такого символу самі!"
  flavor_boh.26.b: "Присвята святому Вацлаву, безперечно, вимагає пожертви..."
  flavor_boh.26.c: "Дорогі дрібнички нам не по кишені."
  wear_st_wenceslas_crown_tt: "[target_character.GetName] носитиме нову корону"
  flavor_boh.27.title: "[ShowBuildingTypeNameWithNoTooltip('cathedral')] Святого Віта"
  flavor_boh.27.desc: "Спочатку збудований у X столітті, [ShowBuildingTypeName('cathedral')] Святого Віта є постійним і прекрасним символом нашої сили та віри. Однак, у міру зростання пишноти [target_location.GetName] повинні зростати й наші пам'ятники божественному. Архітектурні плани розроблено, робітників буде найнято, якщо ми вирішимо взятися за це велике починання."
  flavor_boh.27.a: "Профінансуймо розширення!"
  flavor_boh.27.b: "Ми не можемо собі цього дозволити..."
  flavor_boh.27.historical_info: "Собор був спочатку заснований у 930 році Вацлавом I, князем Богемії, як рання романська ротонда. З часом, через зростання християнської громади та бажання мати більшу церкву, у 1060 році князем Спитігнєвом II була збудована грандіозніша романська базиліка, що включала південну апсиду оригінальної ротонди. Дизайн собору черпав натхнення з романської архітектури Священної Римської імперії, зокрема з Гільдесгаймського абатства та Шпаєрського собору. Готична версія собору почала будуватися у 1344 році, коли Прага стала архієпископством, але гуситські війни у XIV столітті призвели до зупинки будівництва. Кілька спроб продовжити будівництво робилися протягом століть, але лише у 1844 році серйозні роботи відновилися, і собор був завершений лише у 1929 році."
  flavor_boh.28.title: "Рідка насолода"
  flavor_boh.28.desc: "Містяни [target_location.GetName] є завзятими поціновувачами холодного [ShowGoodsName('beer')] після довгого робочого дня. Настільки, що багато хто почав варити власні напої вдома, а пивоварні стають все більш поширеними як у сільській, так і в міській місцевості.\n\nЗдається, що на кожен будинок у місті припадає інший сорт пива. Де є спрага, яку потрібно втамувати, там може бути й монета, яку можна заробити. Таким чином, багато видатних членів [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] виступили з пропозицією налагодити стабільне виробництво пива, щоб місцеве пиво стало відомим усюди."
  flavor_boh.28.a: "Нехай буде так."
  flavor_boh.28.b: "Забудьте про алкоголь і повертайтеся до роботи!"
  flavor_boh.29.title: "Велич з малих початків"
  flavor_boh.29.desc: "Багато [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] мріють про життя, повне пригод, підйом соціальними сходами та перетворення з бідняка на багатія. Попри наше бажання бачити, як наш народ процвітає та підноситься, у житті фермера є чесність, доблесть і повага.\n\nОднак не кожен селянин зроблений з одного тіста. До [target_capital_location.GetName] дійшли чутки про чоловіка з великою військовою та бойовою майстерністю. [target_character.GetHerHis|U] історія здається прямо з казки. Чесно кажучи, ми не впевнені, які частини є міфом, а які — фактами.\n\nВихований як син коваля, [target_character.GetName] був змушений взяти меч у руки з юного віку, коли [target_character.GetHerHis] село, Стршібрна Скаліце, поблизу [target_location.GetName], було спалене вогнем війни. Відтоді [target_character.GetSheHe] тренувався, щоб стати великим воїном, вирушивши в подорож, яка відвела [target_character.GetHerHim] від [target_character.GetHerHis] мирних початків у світ війни та пригод. Тепер [target_character.GetShortNameWithNoTooltip] прийшов до нас."
  flavor_boh.29.a: "[target_character.GetSheHe|U] стане чудовим лідером!"
  flavor_boh.29.b: "[target_character.GetSheHe|U] забуває [target_character.GetHerHis] місце."
  flavor_boh.30.title: "[ShowGoodsNameWithNoTooltip('silver')] знайдено в [target_location.GetNameWithNoTooltip]"
  flavor_boh.30.desc: "Ми отримали повідомлення, що селяни в [target_location.GetName] виявили незаймані жили [ShowGoodsName('silver')|l]! На щастя, місцевість придатна для експлуатації, і багато оцінок прогнозують великі обсяги цінного металу, готового до видобутку.\n\nЗаглиблення в це підприємство, безсумнівно, збільшить процвітання місцевого населення, а також привабить нових поселенців, готових скористатися моментом і заробити статок на [ShowGoodsNameWithNoTooltip('silver')|l]."
  flavor_boh.30.a: "Дуже добре, фінансуйте видобуток."
  flavor_boh.30.b: "Ні, розподіліть те, що можна легко зібрати, і підтримуйте статус-кво."
  flavor_boh.31.title: "Корона [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_boh.31.desc: "З новою [target_art.GetName] на голові нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] та землями [ShowAreaName('bohemia_area')], [ShowAreaName('moravia_area')] і [ShowAreaName('silesia_area')] під нашим контролем, [ROOT.GetCountry.GetLongName] міцно утвердилася як потужна [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] в Європі. [ROOT.GetCountry.GetGovernment.GetRulerTitle] було запропоновано пов'язати наші землі з [target_art.GetNameWithNoTooltip] і називати їх Короною [ROOT.GetCountry.GetLongNameWithNoTooltip]."
  flavor_boh.31.a: "Відтепер ми — Корона [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_boh.31.b: "Наш титул і так чудовий."
  crown_of_bohemia_tt: "Ми змінимо нашу назву на #Y Корона [GetCountry('BOH').GetNameWithNoTooltip]#!"
  flavor_boh.32.title: "Доля [GetCountry('LUX').GetNameWithNoTooltip]"
  flavor_boh.32.desc: "Обов'язки [target_character.GetName] не тільки як [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName], але й як [GetCountry('LUX').GetGovernment.GetRulerTitle] [GetCountry('LUX').GetName] значно зросли останнім часом після [target_character.GetHerHis] нещодавнього обрання Імператором [GetUniqueInternationalOrganization('hre').GetName]. Щоб консолідувати бюрократію та полегшити управління [target_character.GetHerHis] титулами, [target_character.GetSheHe] має можливість передати [GetCountry('LUX').GetLongNameWithNoTooltip] [target_heir.GetName].\n\nХоча володіння [target_character.GetNameWithNoTooltip] тоді було б легше управляти, [target_character.GetHerHis] територія все ж зменшилася б, хоча все ще залишалася б під контролем династії [target_character.GetDynasty.GetName]. Однак, якщо ми вирішимо зберегти все це як [target_character.GetHerHis] володіння, нас можуть сприймати як загрозу через накопичення титулів під [target_character.GetShortNameWithNoTooltip]."
  flavor_boh.32.a: "Віддай, віддай, віддай зараз."
  flavor_boh.32.b: "Це все наше!"
  flavor_boh.33.title: "Придбання [GetCountry('BRA').GetLongNameWithNoTooltip]"
  flavor_boh.33.desc: "[GetCountry('BRA').GetLongName] довгий час був дуже впливовим членом [GetUniqueInternationalOrganization('hre').GetName], і влада династії [target_bra_ruler.GetDynasty.GetName] поширюється по всій ній. Тепер, коли [target_ruler.GetName] є [GetUniqueInternationalOrganization('hre').GetLeaderTitle], нам буде вигідно, якщо ми зможемо забезпечити місця Виборців. Будучи вже [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetNameWithNoTooltip], отримання контролю також над [GetCountry('BRA').GetLongNameWithNoTooltip] не тільки забезпечить курфюрство, але й послужить для зменшення влади [target_bra_ruler.GetDynasty.GetNameWithNoTooltip].\n\nОскільки вони є династією, керованою жадібністю та жагою до влади, ми могли б спробувати надіслати їм пропозицію про придбання титулу [GetCountry('BRA').GetNameWithNoTooltip] для [target_character.GetName] і подивитися, скільки вони за нього хочуть."
  flavor_boh.33.a: "Надіслати їм пропозицію."
  flavor_boh.33.b: "Ми краще використаємо наші гроші."
  flavor_boh.33.tt: "[GetCountry('BRA').GetLongName] отримає від нас пропозицію про покупку"
  flavor_boh.33.historical_info: "У 1373 році Карл IV, король Богемії та імператор Священної Римської імперії, зміг придбати Маркграфство Бранденбург для свого сина та спадкоємця, майбутнього короля Вацлава IV. Оскільки він був ще дитиною, Карл правив від його імені. Це також забезпечило обрання на імператорський престол, але влада династії Люксембургів занепала за пізніших правителів, і коли настала черга Сигізмунда, також сина Карла IV, бути обраним імператором, Богемія забезпечила обрання в обмін на передачу спадкового правління над Бранденбургом династії Гогенцоллернів."
  flavor_boh.34.title: "[GetCountry('BOH').GetLongNameWithNoTooltip] хоче придбати наш [ROOT.GetCountry.GetFlavorRank]"
  flavor_boh.34.desc: "[GetCountry('BOH').GetLongName], схоже, осміліла після того, як їхній правитель також був обраний Імператором [GetUniqueInternationalOrganization('hre').GetName], і тепер намагається забезпечити контроль над курфюрствами. Таким чином, вони звернулися до нас з пропозицією придбати нашу країну для [target_character.GetName].\n\nХоча це призвело б до значної втрати влади для династії [target_bra_ruler.GetDynasty.GetName], гроші, які ми отримаємо від цього, можуть бути корисними на будь-якій іншій нашій території. Крім того, перебування під владою династії [target_ruler.GetDynasty.GetName] та під захистом [GetCountry('BOH').GetNameWithNoTooltip] також може мати свої переваги."
  flavor_boh.34.a: "Надіслати їм цінову пропозицію."
  flavor_boh.34.b: "Нас не купити!"
  flavor_boh.34.tt: "[GetCountry('BOH').GetLongName] отримає від нас цінову пропозицію"
  flavor_boh.35.title: "Відповідь [GetCountry('BRA').GetLongNameWithNoTooltip]"
  flavor_boh.35.desc_no_heir: "$flavor_boh.35.desc$\n\nОднак тепер ми виявляємо, що не маємо відповідного [ROOT.GetCountry.GetGovernment.GetHeirTitle], здатного прийняти пропозицію."
  flavor_boh.35.desc: "[GetCountry('BRA').GetLongName] надіслали нам свою відповідь із сумою, яку вони вважають належною компенсацією за продаж своєї країни та призначення нашого [ROOT.GetCountry.GetGovernment.GetHeirTitle] їхнім [GetCountry('BRA').GetGovernment.GetRulerTitle]."
  flavor_boh.35.a: "Ця пропозиція прийнятна."
  flavor_boh.35.b: "На жаль, ми не можемо її прийняти."
  flavor_boh.36.title: "Чотири статті [target_location.GetNameWithNoTooltip]"
  flavor_boh.36.desc: "Останні кілька років були довгою боротьбою за захист нашої віри, оскільки незліченна кількість наших людей загинула, наш колись лагідний народ перетворився на дикунів і зайняв оборонну позицію проти світу. Коли пил осів, і ми зібрали наших поранених, щоб відсвяткувати нашу перемогу та вшанувати наших загиблих, ми сіли за стіл переговорів разом з тими, хто колись бажав викорінити нашу віру.\n\nМожливо, Бог хотів, щоб ми вистояли проти гордині [ShowReligionAdjective('catholic')] Церкви та їхніх слабких проступків проти нас. Тепер ми повинні вирішити, чи наполягати на наших вимогах проти цих стерв'ятників, чи відхилити їхні благання про перемир'я та продовжувати боротьбу проти корупції їхньої віри."
  flavor_boh.36.a: "Мир у наш час?"
  enable_4_articles_prague_reform: "Надає доступ до [ShowGovernmentReformName('four_articles')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_boh.36.b: "Досить розмов!"
  STATIC_MODIFIER_NAME_bohemian_aggression_modifier: "Богемська агресія"
  STATIC_MODIFIER_DESC_bohemian_aggression_modifier: "Наші вороги не змогли викорінити нашу віру і бажали миру. Однак тепер настав наш час відновити агресію і перемогти їх раз і назавжди!"
  opinion_hussite_aggression_modifier: "Відкинуто Чотири статті"
  boh_widespread_condemnation_tt: "Кожна [ShowReligionAdjective('catholic')] країна втратить [ShowBiasValue('opinion_hussite_aggression_modifier')|-=0] думки щодо нас"
  four_articles: "Чотири статті"
  four_articles_desc: "Серія вимог, висунутих нашими главами держави та віри проти агресорів папських хрестових походів, що були підтримані в слабкій спробі придушити нашу віру."
  flavor_boh.36.historical_info: "Чотири празькі статті, також відомі як Празькі статті, — це низка вимог, висунутих послідовниками [GetCharacter('boh_jan_hus').GetName], богемського реформатора, під час Базельського собору в XV столітті. Ці статті відіграли значну роль у гуситському русі, який був предтечею протестантської Реформації. Статті включали такі положення, як свобода проповідувати слово Боже, причастя, загальна реформа церковної установи та виключення смертних грішників із Церкви."
  flavor_boh.37.title: "Єдність братів"
  flavor_boh.37.desc: "Протягом минулих років практики [ShowReligionAdjective('hussite')] літургії, дерево нашої віри пустило багато гілок, розквітаючи та зростаючи в нашій країні. Багато віруючих стікаються до громад, щоб взяти участь у церковних ритуалах, очищених і вільних від дотику єретиків, що заблукали.\n\nОднак, у цьому середовищі благочестя та теолатрії, зростаюча кількість наших [ShowEstateTypeName('clergy_estate')] звернулася до екстремальної інтерпретації [ShowReligionNameWithNoTooltip('hussite')], яка проповідує виключення знаті та купців з представників Церкви, проведення літургії в простих і скромних церемоніях, відкидаючи апостольську спадкоємність."
  flavor_boh.37.a: "Нехай проповідують, їхні слова містять істину."
  flavor_boh.37.b: "Ми не можемо дозволити цим голосам захопити наше суспільство."
  unity_brethren_privilege: "Єдність братів"
  unity_brethren_privilege_desc: "Рух радикальних [ShowReligionName('hussite')], зосереджений навколо простої елегантності проповіді та поклоніння, що зосереджується на виключенні впливових осіб з [ShowEstateTypeName('burghers_estate')] та [ShowEstateTypeName('nobles_estate')], водночас пропагуючи рідну мову та спрощені церемонії під час причастя."
  jan_hus_executed_boh: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] страчений"
  jan_hus_executed_pap: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] страчений"
  jan_hus_free_boh: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] звільнений"
  jan_hus_free_pap: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] звільнений"
  flavor_boh.38.title: "Об'єднання [ShowLocationNameWithNoTooltip('prague')]"
  flavor_boh.38.desc: "[ShowLocationName('prague')] століттями служила [ROOT.GetCountry.GetAdjective] столицею і досі дуже успішно виконувала цю роль. Однак масові досягнення в технологіях та індустріалізація починають виявляти тріщини в застарілій інфраструктурі [target_location.GetRank.GetName]. Щоб дозволити [target_location.GetRank.GetNameWithNoTooltip] продовжувати природно зростати та бути гідною столицею нашої нації, ми, можливо, повинні об'єднати райони, що становлять історичний [target_location.GetRank.GetNameWithNoTooltip], і сформувати єдиний інфраструктурний план, який дозволить продовжити розширення [ShowLocationNameWithNoTooltip('prague')]."
  flavor_boh.38.a: "Ми повинні профінансувати реорганізацію [ShowLocationNameWithNoTooltip('prague')]."
  flavor_boh.38.b: "Ми не можемо собі цього дозволити."
  flavor_boh.38.historical_info: "У 1784 році Прага була об'єднана в єдине місто шляхом злиття чотирьох історичних королівських міст – Старого Міста, Нового Міста, Малої Страни та Градчан."
  flavor_boh.39.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Співдружність"
  flavor_boh.39.desc: "Наш шлях крізь історію бачив, як [ROOT.GetCountry.GetName] піднялася від незначної сили до імперських висот – ставши великою державою на світовій арені, керуючи величезними регіонами та численними націями. Однак управління такою нацією вимагає твердої руки. З огляду на побоювання сепаратизму та напруженості між національностями [ROOT.GetCountry.GetFlavorRank], дехто пропонує прийняти нову конституцію. Вони стверджують, що ми повинні вийти за межі того, що традиційно вважалося [ROOT.GetCountry.GetNameWithNoTooltip], щоб створити більшу співдружність. Наша імперія охоплюватиме величезні регіони [ShowContinentName('europe')], і ми займемо своє місце серед великих держав світу."
  flavor_boh.39.a: "Прийняти нову конституцію."
  flavor_boh.39.b: "Зберегти чинну конституцію."
  flavor_boh.40.title: "Розширення [ShowLocationNameWithNoTooltip('kutna_hora')]"
  flavor_boh.40.desc: "[ShowLocationName('kutna_hora')] здавна була наріжним каменем [ROOT.GetCountry.GetAdjective] процвітання, відома своїми багатими [ShowGoodsName('silver')] копальнями, що значно зміцнили нашу економіку. Історичне та економічне значення [ShowLocationNameWithNoTooltip('kutna_hora')] неможливо переоцінити, адже її багатство фінансувало незліченні підприємства та зміцнювало нашу скарбницю. Нині є можливість подальших інвестицій у вдосконалення гірничої діяльності, забезпечуючи стабільне зростання та прибутковість для майбутніх поколінь."
  flavor_boh.40.a: "Інвестувати в розширення."
  flavor_boh.40.b: "Це не варте інвестицій."
  flavor_boh.40.a.tt: "Інвестування в інфраструктуру [ShowLocationNameWithNoTooltip('kutna_hora')] зменшить шанси обвалу шахт та повеней."
  flavor_boh.41.title: "Повінь у [ShowLocationNameWithNoTooltip('kutna_hora')]"
  flavor_boh.41.desc: "[ShowGoodsName('silver')] копальні [ShowLocationName('kutna_hora')] останнім часом стикаються з сильними повенями. З затопленими головними та найбагатшими шахтними стовбурами майбутнє місцевих багатовікових гірничих традицій під загрозою. [ShowLocationNameWithNoTooltip('kutna_hora')] звернулася до нас із проханням допомогти їм врятувати те, що можна, але робити це в обваленій шахті буде дорого та небезпечно."
  flavor_boh.41.a: "Спробувати врятувати те, що можемо."
  flavor_boh.41.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_boh.41.historical_info: "Кутна Гора пережила низку руйнівних повеней протягом XVI та XVII століть, що призвело до масового занепаду гірничої діяльності, від якого вона так і не оговталася."
  flavor_boh.42.title: "Пан-[ShowCultureGroupNameWithNoTooltip('slavic_group')] Конгрес [GetCurrentYear] року"
  flavor_boh.42.desc: "Коли ідеї націоналізму поширювалися [ShowContinentName('europe')] як лісова пожежа, представники [ShowCultureGroupName('slavic_group')] націй зустрілися в [ShowLocationName('prague')], щоб обговорити співпрацю між усіма слов'янами. Панславізм формується як впливовий рух, зацікавлений у розвитку між-[ShowCultureGroupNameWithNoTooltip('slavic_group')] відносин та розвитку [ShowCultureGroupNameWithNoTooltip('slavic_group')] фольклору та традицій, тоді як деякі з його найекстремальніших прихильників навіть закликають до об'єднання всіх слов'ян під єдиним прапором. Через широку підтримку цього руху він, ймовірно, відіграватиме значну роль у майбутньому."
  flavor_boh.42.a: "Слава роду!"
  flavor_boh.42.historical_info: "Перший Панслов'янський конгрес, що відбувся у Празі, став значним кроком до сприяння єдності між слов'янськими народами. Він також призвів до прийняття синьо-біло-червоного Панслов'янського прапора та прийняття пісні «Гей, слов'яни» як Панслов'янського гімну."
  flavor_boh.43.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.43.desc: "[target_character.GetName], утраквістський єпископ та прихильник загальної освіти, відомий як «Вчитель народів». [target_character.GetHisHer|U] інноваційні освітні методи та зусилля з реформування освіти мали глибокий вплив на наше суспільство. Зі зростаючим визнанням [target_character.GetHisHer] освітніх теорій, ми отримуємо можливість використати [target_character.GetHisHer] досвід для розвитку [ROOT.GetCountry.GetName]."
  flavor_boh.43.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] міг би скористатися [target_character.GetHimHer]."
  flavor_boh.43.historical_info: "Ян Амос Коменський, також відомий як Коменій, був значущим завдяки своїй новаторській роботі в сучасній освіті, виступаючи за загальну освіту та прогресивні методи навчання, які наголошували на розумінні та критичному мисленні, а не на механічному запам'ятовуванні."
  flavor_boh.44.title: "[ShowLocationNameWithNoTooltip('prague')] - Золоте Місто"
  flavor_boh.44.desc: "[ShowLocationName('prague')], наша блискуча столиця, заслужила прізвисько «Золоте Місто». Як найбільше місто в межах [GetUniqueInternationalOrganization('hre').GetName], воно стало маяком, що приваблює людей звідусіль. Вчені, купці та ремісники стікаються на наші жваві вулиці, сприяючи безперервному зростанню та процвітанню нашої величної столиці. Приплив талантів та багатства перетворює [ShowLocationNameWithNoTooltip('prague')] на справжній центр культури та влади."
  flavor_boh.44.a: "Чудово!"
  STATIC_MODIFIER_NAME_the_golden_city_of_prague: "Золоте Місто"
  flavor_boh.44.historical_info: "За часів правління Карла IV Прага процвітала і стала великим політичним, культурним та економічним центром. Як резиденція імператора, Прага стала де-факто столицею Священної Римської імперії, і місто пережило значне зростання та розвиток. Під його правлінням були побудовані важливі пам'ятки, такі як Карлів міст, Нове Місто та Собор Святого Віта."
  flavor_boh.45.title: "Відкриття рукопису Войнича"
  flavor_boh.45.desc: "Переглядаючи архіви Карлового університету в [ShowLocationName('prague')], ректор університету виявив надзвичайно своєрідний рукопис. Том наповнений дивними ілюстраціями та текстами, написаними шрифтом, що не піддається жодній відомій мові. При подальшому дослідженні виявилося, що він містить безліч тем, від астрології до рецептів, проте жоден вчений не може розшифрувати його значення. З моменту свого відкриття книга стала предметом бурхливих дебатів: одні пропонують її зберегти та дослідити, тоді як інші припускають, що це може бути книга заклинань, написана якоюсь демонічною мовою."
  flavor_boh.45.a: "Зберегти цей захопливий витвір мистецтва."
  flavor_boh.45.b: "Знищити цей витвір Диявола!"
  voynich_manuscript: "Рукопис Войнича"
  flavor_boh.45.historical_info: "Рукопис Войнича — це загадковий і ілюстрований середньовічний кодекс, написаний невідомим письмом і мовою, мета та походження якого залишаються таємницею, незважаючи на широкі дослідження."
  flavor_boh.46.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.46.desc: "[target_character.GetName], значна постать у [ShowReligionAdjective('hussite')] русі, служить архієпископом [ShowLocationName('prague')] у часи великих релігійних потрясінь. [target_character.GetHisHer|U] непохитна відданість [ShowReligionAdjectiveWithNoTooltip('hussite')] справі та [target_character.GetHisHer] зусилля з примирення поміркованих і радикальних фракцій залишили тривалий вплив на [ROOT.GetCountry.GetName]. Глибоке розуміння теології [target_character.GetLastNameWithNoTooltip] та [target_character.GetHisHer] майстерність у релігійних дебатах можуть бути неоціненними для поширення нашої віри."
  flavor_boh.46.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_boh.46.historical_info: "Рокицана відіграв ключову роль у чеському гуситському русі, де він значно вплинув на релігійні та політичні реформи в землях Богемської корони. Як видатний лідер і теолог, він просував гуситські принципи та прагнув об'єднати різні фракції, що значно сформувало релігійну сцену королівства."
  flavor_boh.47.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.47.desc: "[target_character.GetName] є значною фігурою в розвитку [ShowDialectName('czech_dialect')] літератури, працюючи видавцем, друкарем і перекладачем. [target_character.GetHisHer|U] внесок у [ShowDialectNameWithNoTooltip('czech_dialect')] мову та зусилля зробити літературу доступною для мас залишили тривалий вплив на грамотність нашої нації. Оскільки вплив [target_character.GetHisHer] продовжує зростати, ми маємо можливість використати [target_character.GetHisHer] досвід на благо нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_boh.47.a: "Ми обов'язково скористаємося [target_character.GetHisHer] навичками."
  flavor_boh.47.historical_info: "Їржі Мелантріх з Авентина значно вплинув на культурний та інтелектуальний ландшафт Богемії своєю обширною друкарською та видавничою діяльністю. Його зусилля у створенні та розповсюдженні важливих літературних та наукових праць допомогли зберегти та просувати чеську мову та літературу в ключовий час культурного відродження."
  STATIC_MODIFIER_NAME_melantrichs_efforts: "Зусилля Мелантріха"
  flavor_boh.48.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.48.desc: "[target_character.GetName] є одним із найвидатніших архітекторів епохи бароко в [ROOT.GetCountry.GetName]. [target_character.GetHisHer|U] архітектурні шедеври, такі як Церква Святого Миколая в [ShowLocationName('prague')] та Бржевновський монастир, залишають тривалий вплив на ландшафт нашої країни. Інноваційні проекти [target_character.GetLastNameWithNoTooltip] та увага до деталей здобувають зростаюче визнання та захоплення. Зробивши внесок у понад сорок архітектурних див, було б мудро нагородити [target_character.GetHimHer] посадою при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_boh.48.a: "[target_character.GetHisHer|U] служба високо цінується."
  flavor_boh.48.historical_info: "Архітектура Дінценгофера в стилі бароко залишила тривалий вплив завдяки його шедеврам, таким як Церква Святого Яна Непомуцького та Лоретанська церква в Празі. Його інноваційні проекти та увага до деталей значно сформували архітектурний ландшафт та культурну спадщину королівства."
  flavor_boh.49.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.49.desc: "[target_character.GetName], видатний [ShowCultureName('czech')] філолог та історик, стає ключовою фігурою в [ShowCultureNameWithNoTooltip('czech')] Національному Відродженні. Під впливом [ShowInstitutionName('enlightenment')] та зростаючих ідей національної держави, [target_character.GetLastNameWithNoTooltip] пристрасно виступає за збереження та відродження [ShowCultureNameWithNoTooltip('czech')] мови, культури та ідентичності.\n\n[target_character.GetHisHer|U] наукові праці та відданість [ShowCultureNameWithNoTooltip('czech')] спадщині надихають на оновлене почуття національної гордості та єдності серед [ShowCultureNameWithNoTooltip('czech')] народу. Це культурне пробудження сприяє формуванню колективної свідомості, яка може значно змінити майбутнє нашої нації."
  flavor_boh.49.a: "Ми підтримаємо [target_character.GetHisHer] зусилля!"
  flavor_boh.49.b: "Підтримка [target_character.GetHimHer] може розлютити меншини країни."
  flavor_boh.49.historical_info: "Йозеф Добровський був ключовою фігурою Чеського національного відродження, оскільки він пристрасно просував збереження та відродження чеської мови та культури, викликаючи оновлене почуття національної ідентичності та гордості серед чеського народу. Його наукова праця та відданість чеській спадщині значно вплинули на культурну та національну свідомість тієї епохи."
  flavor_boh.50.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Кришталь"
  flavor_boh.50.desc: "Століттями [GetCountry('VEN').GetAdjective] [ShowGoodsName('glass')] домінувало в секторі склоробства, а менші склоробні підприємства намагалися вірно наслідувати майстрів на острові Мурано. [ROOT.GetCountry.GetName] був регіоном виробництва [ShowGoodsNameWithNoTooltip('glass')] з XII століття, але, поєднавши нашу рідну крейду з поташем за новою методикою, [ROOT.GetCountry.GetAdjectiveWithNoTooltip] склороби тепер нарешті можуть кинути виклик [GetCountry('VEN').GetAdjectiveWithNoTooltip] [ShowGoodsNameWithNoTooltip('glass')].\n\nНовий вид [ROOT.GetCountry.GetAdjectiveWithNoTooltip] кришталю є більш міцним, блискучим і виразно відрізняється своїм стилем від [GetCountry('VEN').GetAdjectiveWithNoTooltip]. [ROOT.GetCountry.GetAdjectiveWithNoTooltip] кришталеві люстри, скляні прикраси та гравіроване [ShowGoodsNameWithNoTooltip('glass')] швидко стають звичним явищем у всіх дворах [ShowContinentName('europe')]."
  flavor_boh.50.a: "Ясно як кришталь."
  flavor_boh.50.a.tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowBuildingTypeName('market_village')] або [ShowBuildingTypeName('glassworks')] отримує #G 20.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_boh.51.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Традиція пивоваріння"
  flavor_boh.51.desc: "[ShowGoodsName('beer')] здавна перепліталося з культурною тканиною нашої землі, завоювавши своє почесне місце як національний напій [ShowCultureName('czech')] народу. Від [ROOT.GetCountry.GetGovernment.GetAdjective] бенкетів у величних палацах до шляхетних зібрань у розкішних маєтках, і навіть у скромних оселях простолюдинів, це рідке золото цінується всіма. Монастирі також роблять свій внесок у цю поважну традицію, вдосконалюючи свої методи пивоваріння протягом століть і виробляючи одні з найкращих елів у [ROOT.GetCountry.GetFlavorRank].\n\nІсторія [ShowCultureNameWithNoTooltip('czech')] пивоваріння сягає століть, кожне покоління вдосконалювало ремесло та передавало свої знання. Ця традиція не лише об'єднує наш народ, але й слугує значною економічною вигодою."
  flavor_boh.51.a: "На здоров'я!"
  flavor_boh.51.a.tt: "Кожна володіння з [ShowBuildingTypeName('brewery')], [ShowBuildingTypeName('beer_workshop')], [ShowBuildingTypeName('brewery_manufactory')] або [ShowBuildingTypeName('brewery_mill')] отримує [ShowNamedValue('prosperity_severe_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_boh.52.title: "Болотяне чудовисько [ShowLocationNameWithNoTooltip('vizovice')]"
  flavor_boh.52.desc: "До нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] надійшли повідомлення з регіону поблизу [ShowLocationName('vizovice')], що деталізують жахливу історію, яка швидко поширюється серед простолюдинів. Вони розповідають про чудовисько, що ховається в болотах, викрадаючи та пожираючи безпорадних селян. Ця легенда викликала значні заворушення та паніку в цьому районі. Хоча деякі радники пропонують відправити війська, щоб вистежити це так зване чудовисько, щоб придушити страхи та відновити порядок, інші стверджують, що це не більше ніж народна казка, і що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] не повинна витрачати ресурси на такі нісенітниці."
  flavor_boh.52.a: "Профінансувати групу для розслідування."
  flavor_boh.52.b: "Люди не повинні бути такими забобонними..."