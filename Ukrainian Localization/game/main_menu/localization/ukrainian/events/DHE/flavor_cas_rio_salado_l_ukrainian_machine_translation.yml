l_english:
  flavor_cas_rio_salado.1.title: "Загроза від [GetCountry('MOR').GetNameWithNoTooltip]"
  flavor_cas_rio_salado.1.desc: "Язичницькі правителі [GetCountry('MOR').GetName] приготувалися вдарити по нас із силами вторгнення на півдні [ShowRegionName('iberia_region')]. Це загрожує нашим безперервним зусиллям очистити півострів від іноземних загарбників та зміцнити [ROOT.GetCountry.GetReligion.GetAdjective] правління над [ShowRegionNameWithNoTooltip('iberia_region')]. Ми повинні закликати наших друзів у [GetCountry('POR').GetName] і підготувати наші армії, щоб назавжди вигнати [GetCountry('MOR').GetAdjectiveWithNoTooltip] загарбників."
  flavor_cas_rio_salado.1.a: "Готуватися до війни."
  flavor_cas_rio_salado.1.b: "Це не варте ризику."
  flavor_cas_rio_salado.1.historical_info: "Ситуація на південному кордоні Кастилії виглядала похмуро в десятилітті 1330-х років. Втрата замку Гібралтар у 1333 році відкрила можливість Абу Маліку Абд аль-Вахіду, сину та спадкоємцю Абу Аль-Хасана 'Алі ібн 'Османа, маринідського султана Марокко, захопити дрібне королівство з центром навколо Альхесіраса та Ронди. Смерть першого під час #italic algarada#! (рейду) у 1339 році переконала останнього підготувати повномасштабне вторгнення через Гібралтарську протоку, яке могло бути профінансоване його завоюванням Емірату Тлемсен у 1337 році. Кампанія розпочалася у квітні 1340 року, коли маринідський флот досяг морської переваги над протокою, дозволивши Абу Аль-Хасану 'Алі переправитися з армією 14 серпня 1340 року, а пізніше у вересні розпочати облогу замку Таріфа, ключової кастильської фортеці в цьому районі.\n\nНарешті, мусульманські та християнські сили зіткнулися в долині річки Саладо 30 жовтня. Протиборчі армії билися весь день, і після того, як захисники Таріфи атакували з тилу, маринідська армія розвалилася, а султан Абу Аль-Хасан 'Алі відступив із залишками своєї армії до Альхесіраса. Битва стала поворотним моментом, оскільки вона забезпечила кастильську позицію над протокою на 150 років, доки остання мусульманська твердиня на Піренейському півострові, Гранада, не була завойована в 1492 році."
  claimed_our_land: "Заявили права на наші землі"
  refused_claim: "Відмовилися заявляти права на наші землі"
  flavor_cas_rio_salado.2.title: "[GetCountry('CAS').GetNameWithNoTooltip] заявляє права на наші землі"
  flavor_cas_rio_salado.2.desc: "[GetCountry('CAS').GetReligion.GetAdjective] правителі [ShowRegionName('iberia_region')] знову підготували напад на наші законні землі на півострові та загрожують нашому контролю над [ShowLocationName('strait_of_gibraltar')]. Ми повинні закликати наших друзів у [GetCountry('GRA').GetName] і підготувати наші армії, щоб назавжди відбити [GetCountry('CAS').GetAdjective] загарбників."
  flavor_cas_rio_salado.2.a: "Готуватися до війни."
  flavor_cas_rio_salado_response.34.title: "[target_ally.GetNameWithNoTooltip] кличе на допомогу"
  flavor_cas_rio_salado_response.34.desc: "Конфлікт за [ShowLocationName('strait_of_gibraltar')] знову загострюється, і посланець [target_ally.GetName] прибув до нашого двору, щоб просити про союз для відбиття [target_enemy.GetReligion.GetAdjective] армій у славетній битві."
  flavor_cas_rio_salado_response.34.a: "Допомогти нашим друзям у [target_ally.GetNameWithNoTooltip]."
  flavor_cas_rio_salado_response.34.b: "Відмовити їм у проханні."
  flavor_cas_rio_salado.5.title: "[GetCountry('MOR').GetNameWithNoTooltip] вигнано з [ShowRegionNameWithNoTooltip('iberia_region')]"
  flavor_cas_rio_salado.5.desc: "Нашою важко здобутою перемогою над арміями [GetCountry('MOR').GetName] ми нарешті зламали [GetCountry('MOR').GetAdjective] панування над [ShowLocationName('strait_of_gibraltar')] і встановили власне правління над [ShowLocationName('algeciras')]. Разом із здобиччю, отриманою від битв та мирних договорів, ми зможемо насолоджуватися славою цієї перемоги протягом століть!"
  flavor_cas_rio_salado.5.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas_rio_salado.6.title: "Візит [target_ruler.GetNameWithNoTooltip]"
  flavor_cas_rio_salado.6.desc: "[target_ruler.GetName] відвідав [ShowBuildingTypeName('monastery')] у [ShowLocationName('guadalupe')], щоб висловити [target_ruler.GetHerHis] вдячність Діві Гваделупській за успіх проти [GetCountry('MOR').GetAdjective] язичників під час війни за [ShowLocationName('algeciras')]. Під час [target_ruler.GetHerHis] перебування в [ShowBuildingTypeNameWithNoTooltip('monastery')] [target_ruler.GetHeShe] пожертвував кілька трофеїв, здобутих під час вирішальної битви війни, і підвищив статус [ShowBuildingTypeNameWithNoTooltip('monastery')]."
  flavor_cas_rio_salado.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas_rio_salado.6.b: "Ми не можемо дозволити собі витрачати гроші."
  flavor_cas_rio_salado.7.title: "Вшанувати нашу перемогу"
  flavor_cas_rio_salado.7.desc: "Зі здобутою військовою здобиччю ми маємо можливість вшанувати нашу перемогу над [GetCountry('MOR').GetAdjective] арміями чудовим [ShowBuildingTypeName('monastery')] у районі [ShowLocationName('valladolid')]. Монастир, присвячений Ордену Святої Клари, чудово послугував би нам як пам'ять про нашу славетну перемогу."
  flavor_cas_rio_salado.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas_rio_salado.7.b: "Ми не можемо дозволити собі витрачати гроші."