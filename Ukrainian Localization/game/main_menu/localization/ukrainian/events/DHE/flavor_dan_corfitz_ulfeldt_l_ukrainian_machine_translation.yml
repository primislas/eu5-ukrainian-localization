l_english:
  flavor_dan_corfitz_ulfeldt.1.title: "[target_character.GetNameWithNoTooltip]"
  flavor_dan_corfitz_ulfeldt.1.desc: "[target_character.GetName] повернувся до [ROOT.GetCountry.GetName], після навчання за кордоном у [ShowLocationName('padova')], і цим [target_character.GetSheHe] швидко представив [target_character.GetHerselfHimself] нашому доброму [target_ruler.GetName]. [target_character.GetSheHe|U] пропонує [target_character.GetHerHis] послуги [ROOT.GetCountry.GetFlavorRank], які, як [target_character.GetSheHe] обіцяє, будуть щедрими."
  flavor_dan_corfitz_ulfeldt.1.marriage.desc: "$flavor_dan_corfitz_ulfeldt.1.desc$\n\nКрім того, [target_character.GetSheHe] також почав залицятися до доньки [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_princess.GetName], і обіцянки шлюбу вже на горизонті."
  flavor_dan_corfitz_ulfeldt.1.a: "Весілля, яка чудова ідея."
  flavor_dan_corfitz_ulfeldt.1.b: "[target_character.GetSheHe|U] справді талановита особистість."
  flavor_dan_corfitz_ulfeldt.2.title: "Зростаючий вплив [target_character.GetNameWithNoTooltip]"
  flavor_dan_corfitz_ulfeldt.2.desc: "[target_character.GetName] постійно поширював [target_character.GetHerHis] щупальця на всі аспекти політики та придворних справ. [target_character.GetHerHis|U] вплив та контакти з могутніми членами [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] почали ставати не просто неприємністю, а загрозою для самої [ROOT.GetCountry.GetGovernment.GetAdjective] влади. Якщо ми не приборкаємо [target_character.GetHerHis] амбіції, [target_character.GetSheHe] обов'язково з часом вирве контроль над усім [ROOT.GetCountry.GetLongName] для [target_character.GetHerselfHimself]. Також почали з'являтися звинувачення навіть у планах [target_character.GetHerHis] щодо вбивства членів [ROOT.GetCountry.GetGovernment.GetAdjective] родини."
  flavor_dan_corfitz_ulfeldt.2.a: "Давайте домовимося з [target_character.GetHerHim]."
  flavor_dan_corfitz_ulfeldt.2.b: "Досить цього, [target_character.GetSheHe] — ворог [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_dan_corfitz_ulfeldt.3.title: "[target_character.GetNameWithNoTooltip] пропонує статок"
  flavor_dan_corfitz_ulfeldt_flight_common: "[target_character.GetName] довелося втекти з [target_character.GetHerHis] рідної [GetCountry('DAN').GetLongName] через звинувачення у підступності та вбивствах, а також у змові з метою захоплення контролю над країною. Звинувачення, звісно, які [target_character.GetSheHe] стверджує, що вони повністю неправдиві та безпідставні."
  flavor_dan_corfitz_ulfeldt.3.desc: "$flavor_dan_corfitz_ulfeldt_flight_common$ Тепер, щоб довести [target_character.GetHerHis] добру волю, [target_character.GetSheHe] запропонував величезну суму грошей [target_ruler.GetName].\n\nЦілком ймовірно, що ці гроші були взяті з [GetCountry('DAN').GetAdjectiveWithNoTooltip] скарбниці, але водночас вони дуже знадобляться для фінансування війни проти них."
  flavor_dan_corfitz_ulfeldt.3.a: "Сюрприз, звісно, але приємний."
  flavor_dan_corfitz_ulfeldt.3.b: "Ми не можемо приймати гроші від перебіжчиків."
  flavor_dan_corfitz_ulfeldt.4.title: "Проникливість [target_character.GetNameWithNoTooltip]"
  flavor_dan_corfitz_ulfeldt.4.desc: "$flavor_dan_corfitz_ulfeldt_flight_common$\n\n[target_character.GetHerHis|U] знання землі виявилися дуже корисними тепер, коли ми опинилися у війні з [GetCountry('DAN').GetNameWithNoTooltip]. Інформація, яку [target_character.GetSheHe] надав, призвела до швидкого захоплення та капітуляції захисників у [target_location.GetName], і це може бути різницею між перемогою та поразкою в цій війні."
  flavor_dan_corfitz_ulfeldt.4.a: "Найчудовіший результат."
  flavor_dan_corfitz_ulfeldt.5.title: "[target_character.GetNameWithNoTooltip] стає неприємністю"
  flavor_dan_corfitz_ulfeldt.5.desc: "[target_character.GetName] виявився дуже корисним, давши нам перевагу проти [GetCountry('DAN').GetLongName], але [target_character.GetSheHe] з тих пір стає все більш проблематичним. Здається, звинувачення [target_character.GetHerHim] у змові в [GetCountry('DAN').GetNameWithNoTooltip] виявилися не такими вже й безпідставними, оскільки з'явилися докази того, що [target_character.GetHerHim] намагається зробити те саме тут. Якщо залишити [target_character.GetHerHis] на власний розсуд, [target_character.GetSheHe] обов'язково спробує захопити [ROOT.GetCountry.GetFlavorRank] для [target_character.GetHerselfHimself]."
  flavor_dan_corfitz_ulfeldt.6.title: "[target_character.GetNameWithNoTooltip] прибуває з пропозицією"
  flavor_dan_corfitz_ulfeldt.6.desc: "[target_character.GetName] прибув до нашого двору, після того, як йому довелося втекти як з [GetCountry('DAN').GetName], так і з [origin_country.GetName] через звинувачення в тому, що [target_character.GetHerHim] планував захопити контроль над цими країнами. Тепер [target_character.GetSheHe] прийшов до нас, у [target_character.GetHerHis] нескінченному прагненні помсти, і запропонував нам правління над [GetCountry('DAN').GetLongNameWithNoTooltip] в обмін на нашу допомогу в його захопленні."
  flavor_dan_corfitz_ulfeldt.6.a: "Справді цікава пропозиція."
  flavor_dan_corfitz_ulfeldt.6.b: "Ми не можемо довіряти такій змії."
  flavor_dan_corfitz_ulfeldt.7.title: "Кінець схем [target_character.GetNameWithNoTooltip]"
  flavor_dan_corfitz_ulfeldt.7.desc: "[target_character.GetName] був занозою в нашому боці деякий час, плануючи захопити контроль над країною як зсередини, так і ззовні. На щастя, розсудливий [target_ruler.GetName] з [origin_country.GetLongName] поклав край [target_character.GetHerHis] махінаціям, відмовившись їх слухати. Тепер влада [target_character.GetShortNameWithNoTooltip] зникла, і [target_character.GetHerHis] дні полічені."
  flavor_dan_corfitz_ulfeldt.7.a: "Гідний кінець для змії."