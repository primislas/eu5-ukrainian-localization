l_english:
  flavor_lit.1.title: "Прибуття [ShowReligionNameWithNoTooltip('lutheran')]"
  flavor_lit.1.desc: "Запровадження [ShowReligionName('lutheran')] у [ShowContinentName('europe')] викликало хвилювання в кожній [ShowReligionAdjective('catholic')] громаді. Оскільки прихильників цієї нової віри переслідують і змушують мігрувати, багато з них, завдяки своєму багатству, дісталися наших земель. Ці культурні еліти принесли свіжі ідеї до [GetCountry('LIT').GetLongName], оскільки ми стоїмо на релігійному роздоріжжі між Сходом і Заходом.\n\nКоли вони осідають у наших міських центрах, зростає тиск, щоб прийняти їхній рух і співчувати їхній боротьбі, ціною нашого становища з могутніми [ShowReligionAdjectiveWithNoTooltip('catholic')] сусідами. Лише час покаже, чи буде поява такого потужного релігійного руху нам на користь."
  flavor_lit.1.a: "Прийняти їхній рух."
  flavor_lit.1.b: "Їх треба розчавити."
  many_pops_will_become_lutheran_in_christian_locations_tt: "Багато наших [ShowReligionGroupAdjective('christian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ShowReligionName('lutheran')]"
  lutheran_pops_gain_25_satisfaction: "[ShowReligionAdjective('lutheran')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  lutheran_pops_lose_33_satisfaction: "[ShowReligionAdjective('lutheran')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.2.title: "Хвиля [ShowReligionNameWithNoTooltip('calvinist')]"
  flavor_lit.2.desc: "Невдовзі після появи [ShowReligionAdjective('lutheran')] віри, ще один рух привертає увагу всієї [ShowContinentName('europe')], [ShowReligionName('calvinist')]. Прибуття [ShowReligionAdjectiveWithNoTooltip('lutheran')] біженців прокладає шлях для другої хвилі [ShowReligionAdjectiveWithNoTooltip('calvinist')] біженців, оскільки вони походять з багатьох різноманітних куточків континенту, тікаючи від вузьколобих [ShowReligionAdjective('catholic')] урядів своїх колишніх країн."
  flavor_lit.2.a: "Їхня віра інтегрується в нашу соціальну структуру."
  flavor_lit.2.b: "Ми не можемо зрадити нашу доктрину..."
  many_pops_will_become_calvinist_in_christian_locations_tt: "Багато наших [ShowReligionGroupAdjective('christian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ShowReligionName('calvinist')]"
  calvinist_pops_gain_25_satisfaction: "[ShowReligionAdjective('calvinist')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  calvinist_pops_lose_33_satisfaction: "[ShowReligionAdjective('calvinist')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.3.title: "Угорський договір"
  flavor_lit.3.desc: "З'явилася дипломатична можливість, яка тимчасово заспокоїть одного з наших заклятих ворогів, дозволяючи нам зайнятися більш нагальними проблемами. Прагнучи забезпечити своє поточне становище та гарантувати, що ми не будемо намагатися атакувати їхні території, [target_root_country.GetName] запропонувала поступитися нам територією [ShowAreaName('smolensk_area')] в обмін на проголошений союз та значно зміцнені дипломатичні зв'язки."
  flavor_lit.3.a: "Підписати договір."
  flavor_lit.3.b: "Договір, створений божевільними."
  smolensk_owned_by_muscovy_tt: "Кожна локація в [ShowAreaName('smolensk_area')], що належить [Concept('target_root_country.GetNameWithNoTooltip] або [subject', 'CONCEPT_PLACEHOLDER')|e], належатиме нам і стане нашим [Concept('core', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.4.title: "Погано трактоване потомство"
  flavor_lit.4.desc_common: "Тривожні новини дійшли до двору [target_root_country.GetName], хибно стверджуючи, що тривають спроби навернути [target_character.GetName], члена [target_root_country.GetGovernment.GetRuler.GetDynasty.GetName] і нині одруженого з [target_husband.GetName], до [ShowReligionAdjective('catholic')] віри."
  flavor_lit.4.desc_severed_ties: "$flavor_lit.4.desc_common$ Вони відповіли розривом усіх дипломатичних зв'язків і потенційно використовують це як привід для порушення суверенітету наших кордонів."
  flavor_lit.4.desc_opted_for_divorce: "$flavor_lit.4.desc_common$ На щастя, було досягнуто дипломатичного рішення: [target_character.GetNameWithNoTooltip] негайно розлучилася зі своїм чоловіком і негайно від'їхала."
  flavor_lit.4.a: "Як вони сміють."
  flavor_lit.4.tt1: "Погані дипломатичні навички [target_root_country.GetGovernment.GetRuler.GetName] призводять до розриву всіх дипломатичних зв'язків"
  flavor_lit.4.b: "Наразі краще зберігати спокій."
  flavor_lit.4.c: "Найкращий можливий результат."
  flavor_lit.4.tt2: "Дипломатичні навички [target_root_country.GetGovernment.GetRuler.GetName] забезпечують розлучення та відвертають війну"
  flavor_lit.5.title: "Західні шлюбні зв'язки"
  flavor_lit.5.desc: "Завершивши наше навернення до [ShowReligionName('catholic')], стає цілком зрозуміло, що нам потрібно шукати легітимності в нашому новому релігійному суспільстві. Після днів листування ми отримали звістку, що існує неодружений родич [target_character2.GetName] на ім'я [target_character3.GetName]. Було б мудро розглянути цей шлюб, оскільки такий союз, безсумнівно, допоможе нам інтегруватися як частина Західного [ShowReligionNameWithNoTooltip('catholic')] світу та сприяти подальшому розвитку нашого народу."
  flavor_lit.5.a: "[target_character3.GetShortNameWithNoTooltip] стане чудовою [target_character3.GetWifeHusband]!"
  flavor_lit.5.b: "[ROOT.GetCountry.GetLongNameWithNoTooltip] не потребує іноземної королівської родини."
  lit_should_poland_accept_tt: "Якщо [GetCountry('POL').GetName] прийме нашу пропозицію, ми можемо отримати вигоду від поширення [Concept('institutions', 'CONCEPT_PLACEHOLDER')|e] та процвітання."
  flavor_lit.5.historical_info: "Формально відомий як #italic Кревська унія#!, шлюб між литовським великим князем Ягайлом та польською королевою Ядвігою був кульмінацією десятиліть католицизації та дипломатичних зусиль з боку великого князя. Це ознаменувало остаточний кінець язичницької ідентичності литовської держави."
  flavor_lit.6.title: "Хитання між Сходом і Заходом"
  flavor_lit.6.desc: "Зростаючий тиск нашого політичного та географічного становища досяг критичної точки. Оскільки наші кордони постійно зазнають нападів у сутичках з [ShowReligionAdjective('catholic')] лицарями та ворогами, настав час зробити вибір, який, ймовірно, визначить долю нашого народу.\n\nБагато наших радників підтримують ідею справжнього навернення. Вони стверджують, що встановлення довірених зв'язків з [GetCountry('PAP').GetGovernment.GetRulerTitle] забезпечить наші кордони назавжди.\n\nОднак, деякі з наших лав стверджують, що наша нерішучість щодо навернення працює на нашу користь. Вони виступають за фальшиве навернення, щоб виграти цінний час і зібрати сили, щоб не відмовлятися від вірувань наших предків..."
  flavor_lit.6.a: "Прикинемося, що граємо за правилами, поки що..."
  flavor_lit.6.b: "Справжнє навернення для захисту нашого майбутнього!"
  flavor_lit.6.c: "[ROOT.GetCountry.GetLongNameWithNoTooltip] залишиться [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip]!"
  neighbor_catholics_lose_opinion_tt: "Усі сусідні [ShowReligionAdjectiveWithNoTooltip('catholic')] країни втратять [ShowBiasValue('religious_friction_modifier')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас і можуть оголосити нам #R війну#!"
  flavor_lit.6.historical_info: "Християнізація Литви, останнього великого бастіону язичництва, була надзвичайно бурхливою справою. Протягом XIV століття було багато спроб прийняти католицизм і охреститися на прохання литовських великих князів. Вони, на жаль, були марними, оскільки багато з них були ветовані Тевтонськими лицарями або завершилися невдало через ворожі дії. Лише за правління Ягайла та його двоюрідного брата Вітовта «Великого» Литва офіційно прийняла католицьку віру."
  flavor_lit.7.title: "Листи від [target_character1.GetShortNameWithNoTooltip]"
  flavor_lit.7.desc.a: "Незважаючи на всі наші зусилля переконати [target_character1.GetName], що найкраще майбутнє для [target_character1.GetHerHis] народу – це прийняти нашу істинну віру, схоже, що [GetCountry('LIT').GetLongName] ще не настільки розвинена або благословенна, щоб купатися у світлі нашого Господа. В результаті вони відкинули наші спроби навернути їх, категорично відповівши, що вони зберігатимуть свої вірування та традиції до гіркого кінця..."
  flavor_lit.7.desc.b: "Наші зусилля навернути відсталі землі [GetCountry('LIT').GetLongName], здається, принесли плоди! Після деякого часу роздумів, [target_character1.GetName] звернувся і зобов'язався навернути [target_character1.GetHerselfHimself] та [target_character1.GetHerHis] народ до [ShowReligionName('catholic')] у належний час!"
  flavor_lit.7.a: "Цікавий розвиток подій."
  lit_conversion.7_tt: "Чи щирі вони у своїх намірах, покаже лише час"
  flavor_lit.8.title: "Християнізація [target_character.GetShortNameWithNoTooltip]"
  flavor_lit.8.desc: "Не так давно ми зобов'язалися навернути нашого [GetCountry('LIT').GetGovernment.GetRulerTitle] та наш народ до [ShowReligionName('catholic')]. Тепер настав час визначити нашу позицію щодо такого життєво важливого релігійного питання. Чи повинні ми виконати своє зобов'язання та повністю навернутися, чи залишитися вірними нашим язичницьким кореням, рішення в такий ключовий момент, безсумнівно, визначить наше майбутнє\n\nХрещення [target_character.GetShortNameWithNoTooltip], безсумнівно, послужить прелюдією до нової ери для нашої нації. Хоча це може стати несподіванкою для багатьох простолюдинів [ROOT.GetCountry.GetName], насправді навернення [target_character.GetShortNameWithNoTooltip] та [target_character.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle] було переговорним процесом, який залучив багатьох придворних та значну частину [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_lit.8.a: "Настав час."
  flavor_lit.8.b: "Все це було фасадом!"
  every_neighbor_catholic_gets_heresy_cb_tt: "#R Це сильно засмутить сусідні [ShowReligionAdjectiveWithNoTooltip('catholic')] країни та [GetCountry('PAP').GetGovernment.GetRulerTitle] і може навіть спровокувати війни проти нас#!"
  ruler_and_children_convert_to_catholicism_tt: "#italic [target_character.GetShortNameWithNoTooltip] та [target_character.GetHerHis] безпосередні нащадки навернуться до [ShowReligionNameWithNoTooltip('catholic')], щоб закріпити перший крок країни до християнізації#!"
  neighbor_catholics_receive_opinion_tt: "Усі сусідні [ShowReligionAdjectiveWithNoTooltip('catholic')] країни отримують [ShowBiasValue('recently_embraced_catholicism')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас"
  enable_conversion_to_catholicism_tt: "Отримайте доступ до [ShowCabinetActionName('lit_promote_catholicism')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.8.historical_info: "Литва, остання язичницька нація в Європі, офіційно прийняла християнство наприкінці XIV століття. Навернення почалося 1387 року, коли великий князь Ягайло був охрещений, щоб одружитися з польською королевою Ядвігою, закріпивши польсько-литовський союз. Ця подія ініціювала поширення католицизму, хоча язичницькі практики зберігалися ще деякий час. Пізніше Вітовт Великий, двоюрідний брат Ягайла, продовжив християнізацію, особливо в Жемайтії, останньому оплоті язичництва. Це ознаменувало кінець навернення Європи від язичництва, хоча традиційні вірування залишили тривалий відбиток на литовській культурі."
  flavor_lit.9.title: "[ShowReligionNameWithNoTooltip('catholic')] Зраджено"
  flavor_lit.9.desc: "Здається, що хитруни, які керують [GetCountry('LIT').GetLongName], вирішили відмовитися від свого слова і не навернутися до [ShowReligionName('catholic')]. Ця остання крапля є достатньою причиною для нас мати законний аргумент на користь остаточного позбавлення нашого кордону від їхніх язичницьких вірувань!"
  flavor_lit.9.a: "До зброї!"
  flavor_lit.10.title: "Східні Зв'язки"
  flavor_lit.10.desc: "Незважаючи на різні спроби на прохання багатьох [ShowReligionAdjective('catholic')] місій навернути наш народ, ми залишалися непохитними у своїй вірі.\n\nОднак, шепіт у наших залах поступився чуткам про потенційне навернення до [ShowReligionAdjective('orthodox')] віри завдяки королівському шлюбу з членом династії [target_character2.GetName]. Якою б радикальною не була ця пропозиція, вона має багато переваг для тих, хто під нашим прапором вже сповідує [ShowReligionAdjectiveWithNoTooltip('orthodox')] віру.\n\nХоча таке навернення, безумовно, захистило б наш східний кордон, воно значно загрожувало б нашим відносинам із Заходом і ще більше посилило б хаос і нестабільність там. Крім того, багато радників говорять про владну поведінку та вимоги за наш рахунок, які створив би такий шлюб..."
  flavor_lit.10.a: "Жарт поганого смаку, не більше."
  flavor_lit.10.b: "Безперечно, розумний крок."
  target_character3_is_scorned_tt: "Це сильно засмутить [target_character3.GetName]"
  flavor_lit.10.historical_info: "Під час християнізації Литви наприкінці XIV – на початку XV століть країна майже прийняла православ'я через складні політичні мотиви. Великий князь Гедимін спочатку розглядав можливість навернення до православ'я, перебуваючи під впливом сусідніх православних держав. Однак остання спроба навернення була зроблена Ягайлом, який зіткнувся з тиском своєї російської матері одружитися з Софією, дочкою князя Дмитра Московського. Цей шлюб вимагав би від Ягайла навернення до православ'я і потенційно навіть зробив би Литву васалом Москви, варіант, який зрештою був повністю відхилений."
  flavor_lit.11.title: "Рука [GetCountry('LIT').GetNameWithNoTooltip]"
  flavor_lit.11.desc.a: "Після тижнів обговорень з [target_character.GetHerHis] [GetCountry('LIT').GetGovernment.GetCourtTitle], [target_character.GetName] звернувся до наших дипломатів з цікавою пропозицією. Розчарований постійними прикордонними сутичками та дипломатичною ізоляцією, [GetCountry('LIT').GetLongName] вирішив прийняти [ShowReligionName('catholic')] і навіть попросити руки [target_character3.GetShortName], щоб ще більше об'єднати наші два доми. Такий розвиток подій, можливо, призведе до подальшого посилення нашого впливу в їхньому ядрі..."
  flavor_lit.11.desc.b: "Незважаючи на їхнє нещодавнє навернення до [ShowReligionName('catholic')], потенційні вісники нової епохи для [GetCountry('LIT').GetLongName] не змогли усвідомити життєво важливу природу забезпечення своєї легітимності через шлюб з нами. Вони не тільки відкинули наші дипломатичні спроби як їхні сусіди, але й зайшли так далеко, що натякнули на образу через нашу кореспонденцію!"
  flavor_lit.11.a: "Багато благословень їм."
  flavor_lit.11.b: "Нам не потрібні зв'язки, щоб забезпечити їхню лояльність!"
  may_lead_to_peaceful_union: "Це може призвести до мирного союзу між нашими країнами"
  flavor_lit.12.title: "Весільні дзвони в [target_location2.GetNameWithNoTooltip]"
  flavor_lit.12.desc: "Планування королівського шлюбу – справа непроста. Правильні штори відповідного кольору та стилю, ідеальне місце та рій [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та родичів для участі – ось деякі з завдань такої грандіозної події. І найголовніше, [target_character.GetShortName] та [target_character3.GetShortName], одягнені в розкішне вбрання, ніби саме сонце обдарувало їх своїм променем. Церемонія проходить без жодних заминок, і міські глашатаї по всьому [GetCountry('LIT').GetLongName] проголошують союз між двома молодятами!"
  flavor_lit.12.a: "Нехай живуть довго і щасливо!"
  flavor_lit.13.desc: "[GetCountry('LIT').GetLongName] завжди була аномалією на наших кордонах. Справді, ми не завжди підтримували добрі чи навіть нейтральні відносини, і ми багато разів стикалися в минулому.\n\nЇхня нещодавня кореспонденція з [GetCountry('PAP').GetGovernment.GetRulerTitle] призвела лише до тиску та розпливчастих обіцянок без реального успіху. У момент прояснення [target_character.GetName] вирішив офіційно попросити руки одного з членів нашого дому через шлюб.\n\nТакий крок, безсумнівно, вплине на баланс сил у регіоні, тим самим здобувши їм багато нових ворогів, дозволяючи нам робити впливові вимоги та кроки на їхньому східному кордоні..."
  flavor_lit.13.a: "Схвалити шлюб."
  flavor_lit.13.b: "Ми цього не дозволимо!"
  flavor_lit.14.title: "Весілля [target_character.GetShortNameWithNoTooltip] та [target_character3.GetShortNameWithNoTooltip]"
  flavor_lit.14.desc: "Прибуло послання від [target_character2.GetName]! У ньому детально описано вимоги до весільної церемонії між [target_character.GetName] та [target_character3.GetName]. Здається, вони нарешті схвалили наш запит на офіційне об'єднання наших двох домів. Вага такого рішення, безперечно, велика, і його значущість достатньо сильна, щоб змінити хід усієї нашої історії..."
  flavor_lit.14.a: "Продовжити шлюб."
  flavor_lit.14.b: "Ми не можемо ризикувати нашим суверенітетом."
  flavor_lit.15.title: "Дипломатія з [ShowRegionNameWithNoTooltip('russian_region')]"
  flavor_lit.15.desc: "Баланс сил на наших кордонах між Сходом і Заходом перебуває в делікатній рівновазі. Зростаюча міць [GetCountry('MOS').GetLongName] загрожує затьмарити жах, принесений нам ордами з Далекого Сходу. Щоб запобігти поширенню їхніх войовничих тенденцій на весь регіон, ми повинні зробити необхідні дипломатичні приготування, звернувшись до їхніх наймогутніших сусідів..."
  flavor_lit.15.a: "Дипломатія, щоб уникнути війни!"
  flavor_lit.15.b: "Звернутися до [target_country1.GetNameWithNoTooltip]."
  flavor_lit.15.c: "Безперечно, марна трата монет."
  flavor_lit.15.historical_info: "Відносини між Великим князівством Литовським та руськими державами у XIV та XV століттях включали як співпрацю, так і конкуренцію. Під керівництвом таких лідерів, як Гедимін, Ольгерд та Вітовт Великий, Литва розширила свою територію на схід, включивши регіони сучасної Білорусі та України. Це призвело до частих взаємодій з руськими князівствами, зокрема з Великим князівством Московським, що зростало. Оскільки обидві держави боролися за контроль над цими землями, напруга зростала. Однак Литва також укладала стратегічні союзи з північними руськими республіками, такими як Новгород і Псков, які прагнули протистояти зростаючому впливу Москви. Хоча ці партнерства допомагали захищатися від спільних ворогів, таких як татари, динаміка між Литвою та Москвою залишалася нестабільною, змінюючись між періодами співпраці та суперництва."
  flavor_lit.16.title: "В інтересах дипломатії"
  flavor_lit.16.desc: "Процесія дипломатів з [GetCountry('LIT').GetLongName] прибула сьогодні до [target_location.GetName]. Розкішні подарунки та королівський протокол супроводжують дипломатів, які проходять через нашу столицю. Лист від [target_character2.GetName] малює картину дружби між нашими народами проти спільного ворога, [GetCountry('MOS').GetLongName]. Співпраця та дружба, безперечно, виявляться життєво важливим і важливим інструментом у стримуванні зростаючого [GetCountry('MOS').GetFlavorRank] на нашому східному кордоні."
  flavor_lit.16.a: "Подарунки дуже бажані!"
  diplomatic_isolation_tt: "Наші шанси знайти союзників у [ShowRegionNameWithNoTooltip('russian_region')] зменшаться"
  flavor_lit.17.title: "[ShowLocationNameWithNoTooltip('vilnius')|U] Кафедральний собор"
  flavor_lit.17.desc: "Тепер, коли [ROOT.GetCountry.GetLongName] нарешті приєдналася до [ShowReligionGroupAdjective('christian')] світу, ми повинні показати нашим новим братам нашу побожність і відданість, побудувавши новий [ShowBuildingTypeName('cathedral')] у [ShowLocationName('vilnius')].\n\nМи збудуємо його на руїнах дуже старої церкви, яка колись використовувалася давно померлим [ShowReligionGroupAdjectiveWithNoTooltip('christian')] правителем [ROOT.GetCountry.GetNameWithNoTooltip], і ми покажемо світові наше велике бажання знову приєднатися до пастви Господа."
  flavor_lit.17.a: "Розпочати будівництво."
  flavor_lit.17.b: "Ми не можемо собі цього дозволити."
  flavor_lit.17.historical_info: "У 1251 році, за правління Міндовга та після його навернення до християнства, у Вільнюсі було збудовано оригінальний собор для розміщення єпископа Литви. Після смерті Міндовга будівлю знову перетворили на язичницьке місце поклоніння, яке проіснувало до 1387 року, коли Литва офіційно навернулася до християнства."
  flavor_lit.18.title: "Реформи централізації [target_character.GetShortNameWithNoTooltip]"
  flavor_lit.18.desc: "Під опікою династії [target_character.GetDynasty.GetName], [ROOT.GetCountry.GetName] виросла у велике [ROOT.GetCountry.GetFlavorRank]. Вона нарешті покинула обійми язичництва і приєдналася до сучасного світу. Однак багато регіонів під нашим правлінням чинять опір дотриманню законів, створених у [capital_scope.GetName], і відкидають нашу владу.\n\nНастав час відновити контроль над власною країною та створити більш уніфіковану державу."
  flavor_lit.18.a: "Ми повинні централізувати державу."
  flavor_lit.18.b: "Ми не підемо проти традиції."
  flavor_lit.18.historical_info: "Великий князь Вітовт доклав багато зусиль для централізації своєї країни під час свого правління, одним з таких зусиль було скасування стародавньої системи часткових князівств. Вітовт захопив Луцьк під свій прямий контроль у 1393 році, скасував Київське князівство у 1394 році та призначив намісника в Поділлі у 1395 році, при цьому лише менші князівства залишилися недоторканими."
  flavor_lit.19.title: "[consort_scope.GetNameWithNoTooltip]"
  flavor_lit.19.desc: "Нова [ROOT.GetCountry.GetGovernment.GetConsortTitle] нашого правителя, [consort_scope.GetName], принесла з [consort_scope.GetHerHis] собою багато кулінарних інновацій зі своєї рідної [birth_location_scope.GetName].\n\nПридворні та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [capital_scope.GetName] зачаровані дивним приладом, що зветься виделкою, яким [ROOT.GetCountry.GetGovernment.GetConsortTitle] їсть, а також дивними новими стравами та інгредієнтами, які [consort_scope.GetSheHe] принесла з півдня. Кожен, хто хоче зберегти свою репутацію, швидко почав наслідувати [consort_scope.GetHerHis], і нова тенденція створила великий попит на такі речі, як оливки, пшениця та вино."
  flavor_lit.19.a: "Ми приймемо ці нові звичаї."
  flavor_lit.19.b: "Нам не потрібен цей іноземний вплив."
  lit_fancy_new_dishes: "Вишукані нові страви"
  flavor_lit.19.historical_info: "З прибуттям італійки Бони Сфорца як нової великої княгині-консорта Литви, численні кулінарні інновації прийшли з нею до литовського двору, такі як виделка та багато традиційних італійських рецептів."
  flavor_lit.20.title: "Supremus Dux Lithuaniae"
  flavor_lit.20.desc: "Хоча наш [ROOT.GetCountry.GetFlavorRank] розширився за свої початкові кордони і тепер включає багато народів, ми ніколи належним чином не називали себе інакше, ніж [ROOT.GetCountry.GetGovernment.GetRulerTitle], незважаючи на те, що ми могутніші за багатьох у [ShowContinentName('europe')]. [target_character.GetName] не з тих, хто погодиться, що [target_character.GetHerHis] титули поступаються титулам [target_character.GetHerHis] ворогів. З цієї причини [target_character.GetSheHe] бажає називати [target_character.GetHerselfHimself] чимось більшим — вище простих князів і, безумовно, рівним королям.\n\nТакі зусилля, безсумнівно, зашкодять нашій легітимності в короткостроковій перспективі. Однак збереження певної скромності запобігло б тому, щоб наші піддані бачили нас як володарів, які вважають їх нижчими. Проте, у боротьбі за владу в [ShowContinentNameWithNoTooltip('europe')] скромність часто призводить до занепаду."
  flavor_lit.20.historical_info: "Наслідки литовської громадянської війни 1381 року та Острівська угода залишили Вітовта Великого єдиним монархом Великого князівства. Прагнучи подальшої легітимізації свого правління та претендуючи на спадкоємність від Київської Русі, він назвав себе #italic Supremus Dux Lithuaniae#!, Верховним князем Литви — титул, який не використовувався послідовно до його часу. Це позначення зберігалося навіть за часів Речі Посполитої до поділу держави австрійцями, пруссаками та росіянами."
  flavor_lit.20.a: "Назвемо себе відповідно."
  flavor_lit.20.b: "Певна скромність забезпечить внутрішню стабільність."
  flavor_lit.21.title: "Династія [ShowDynastyNameWithNoTooltip('radziwill_dynasty')]"
  flavor_lit.21.desc: "Хоча в [ROOT.GetCountry.GetName] існує багато родин, лише деякі з них домінували на політичній сцені [ROOT.GetCountry.GetFlavorRank]. Однією з таких родин є династія [ShowDynastyName('radziwill_dynasty')], очолювана впливовим [target_character.GetName]. Прагнучи розширити свій вплив у [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetNameWithNoTooltip] звернувся до [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName], прагнучи отримати посаду в [ROOT.GetCountry.GetFlavorRank]."
  flavor_lit.21.historical_info: "Родина Радзивіллів була однією з небагатьох у Речі Посполитій, яка допомогла зберегти Велике князівство Литовське як окрему державу. Заснована Радвілою Астікасом, вони накопичили численні титули по всій Європі, навіть ставши князями Священної Римської імперії."
  flavor_lit.21.a: "[target_character.GetNameWithNoTooltip] стане Великим маршалом [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_lit.21.b: "Посади в [ROOT.GetCountry.GetGovernment.GetCabinetTitle] буде достатньо."
  flavor_lit.21.c: "Хто вони такі, щоб вимагати щось від [ROOT.GetCountry.GetGovernment.GetRulerTitle]?"
  flavor_lit.22.title: "Піднесення [ShowDynastyNameWithNoTooltip('gostautai_dynasty')]"
  flavor_lit.22.desc: "У лавах наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] родина [ShowDynastyName('gostautai_dynasty')] завжди мала беззаперечний вплив. Нині очолювана [target_character.GetName], вони контролюють багато регіонів у [ROOT.GetCountry.GetFlavorRank]. Хоча це створює проблему для [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], можливо, ми могли б об'єднатися з ними, оскільки узгодження наших інтересів може призвести до більшої внутрішньої стабільності."
  flavor_lit.22.historical_info: "Гоштаути були головними суперниками родини Радзивіллів протягом XV та XVI століть. Служачи як Вітовту Великому, так і Казимиру IV Ягеллончику, вони накопичили величезні землі та вважалися одними з найбагатших дворян у Європі. На жаль, родова лінія обірвалася в 1542 році, і їхні маєтки перейшли до Великого князя Литовського."
  flavor_lit.22.a: "Подарунок був би чудовим жестом дружби."
  flavor_lit.22.b: "Ми не повинні дозволяти їхній владі зростати далі."
  flavor_lit.23.title: "Релігійний привілей [target_character.GetNameWithNoTooltip]"
  flavor_lit.23.desc: "[ROOT.GetCountry.GetName] здавна мав у своїх кордонах низку [ShowReligionAdjective('orthodox')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Однак багато з них не користуються рівним статусом зі своїми [ROOT.GetCountry.GetReligion.GetAdjective] колегами. Тепер вони виступають проти [target_character.GetName], якого вони звинувачують у цій несправедливості. Якщо ми хочемо їх завоювати, ми повинні гарантувати їм ті ж законні права, що й решті [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_lit.23.historical_info: "Щоб належним чином заснувати феодальне володіння в Литві, Сигізмунду Кейстутовичу потрібна була довіра його православних підданих. У 1434 році він надав їм привілеї, що гарантували, що жоден дворянин — незалежно від релігії — не міг бути ув'язнений або покараний без схвалення суду."
  flavor_lit.23.a: "Вони матимуть нашу підтримку — і свої привілеї."
  flavor_lit.23.b: "Якщо вони прагнуть рівності, то мусять дотримуватися [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] закону."
  flavor_lit.24.title: "$church_of_saint_nicholas$"
  flavor_lit.24.desc: "Наше навернення до [ROOT.GetCountry.GetReligion.GetName] залишило людей [target_location.GetRank.GetName] [target_location.GetName] без священного місця для молитви. Прагнучи вирішити це, [target_character.GetName] та [ROOT.GetCountry.GetGovernment.GetCourtTitle] хочуть запросити [ShowCultureGroupName('german_group')] архітекторів, щоб допомогти закласти фундамент для місця, присвяченого святому Миколаю. Хоча це, безперечно, здобуло б прихильність народу, можливо, було б мудріше дозволити побудувати таке місце без державного втручання, зберігши нашу [ROOT.GetCountry.GetGovernment.GetAdjective] скарбницю."
  flavor_lit.24.historical_info: "Церква Святого Миколая була першою церквою, побудованою в Литві. Натхненна готичною архітектурою Священної Римської імперії, вона приваблювала німецьких ремісників і купців, які оселилися на Vokiečių gatvė у Вільнюсі."
  flavor_lit.24.a: "В ім'я [ROOT.GetCountry.GetReligion.GetGodName] ми профінансуємо цю нову церкву."
  flavor_lit.24.b: "Нехай простолюд сам дбає про свої потреби."
  flavor_lit.25.title: "[ShowLocationRankNameWithNoTooltip('city')] Права [ShowLocationNameWithNoTooltip('vilnius')]"
  flavor_lit.25.desc: "З огляду на статус [target_location.GetName] у [ROOT.GetCountry.GetName], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] побоюються, що [target_location.GetRank.GetName] може втратити своє значення в межах [ROOT.GetCountry.GetFlavorRank]. Тому вони звернулися до [target_character.GetName] та [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] з проханням надати поселенню офіційні права [ShowLocationRankName('city')], що потенційно привабить нових купців та ремісників.\n\nОднак дехто виступає проти централізації нашого населення в одному [ShowLocationRankNameWithNoTooltip('city')], натомість виступаючи за більш рівномірний розподіл у межах [ROOT.GetCountry.GetFlavorRank]. Хоча це може розширити можливості різних станів, це також підтримає їхнє задоволення."
  flavor_lit.25.a: "Нехай [target_location.GetNameWithNoTooltip] стане [ShowLocationRankNameWithNoTooltip('city')]."
  flavor_lit.25.b: "Натомість ми заохочуватимемо децентралізацію."
  lit_all_vilnius_pops_become_loyal_tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в межах [target_location.GetName] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.26.title: "Валацька реформа"
  flavor_lit.26.desc: "Хоча значна частина земель у [ROOT.GetCountry.GetName] є орною, робоча сила скоротилася через триваючу урбанізацію. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] особливо стурбовані, вважаючи, що ця тенденція лише посилює [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]. Щоб запобігти подальшим заворушенням, [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує земельну реформу. Замість того, щоб покладатися на алодіальні титули, які створюють недовіру між [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], усі піддані за законом перебуватимуть у власності [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Оподаткування та військові обов'язки більше не базуватимуться на кількості домогосподарств, а вимірюватимуться за допомогою валацької одиниці, що забезпечить чіткіше розуміння багатства та робочої сили наших земель.\n\nТепер, коли ці реформи представлені [target_character.GetName], зростає тиск на [target_character.GetHerHim] щодо їх впровадження, незважаючи на деякі суперечки серед нижчих класів."
  flavor_lit.26.a: "Ми приймемо валацьку одиницю вимірювання."
  flavor_lit.26.b: "Мобільність [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] є вигідною в довгостроковій перспективі."
  lit_all_peasant_pops_lose_satisfaction_tt: "Усі наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.27.title: "Судебник [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_lit.27.desc: "Відсутність правового кодексу в [ROOT.GetCountry.GetName] стала більшою проблемою, ніж очікувалося. Деякі з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] крадуть вельдамаїв з інших земель або експлуатують ліси без дозволу. Щоб вирішити це, [target_character.GetName] прагне запровадити правовий кодекс для боротьби з такими злочинами. Ці закони забезпечать послідовність у тому, як землевласники ставляться до своїх підданих, дозволяючи видатним родинам уникнути довільних практик менш знатних [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_lit.27.a: "Давайте впровадимо ці нові закони."
  flavor_lit.27.b: "Замість того, щоб посилювати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], ми повинні відсторонитися від такої системи."
  flavor_lit.28.title: "[target_character.GetNameWithNoTooltip]"
  flavor_lit.28.desc: "Оскільки [ROOT.GetCountry.GetAdjective] військо потребує нових ідей, з'явився дивний [target_character.GetWomanMan], який стверджує, що брав участь у численних облогах по всій [ShowContinentName('europe')]. [target_character.GetHerHis|U] ім'я — [target_character.GetName], член [ShowDynastyName('siemienowicz_dynasty')]. Хоча багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] сумнівається в [target_character.GetHerHis] [ShowCultureName('aukstaitian')] походженні, історії про [target_character.GetHerHis] походження здаються достовірними. Таким чином, багато хто в [ROOT.GetCountry.GetNameWithNoTooltip] бажає, щоб [target_character2.GetName] прийняв [target_character.GetHerHim] до армії, оскільки [target_character.GetSheHe] може виявитися стратегом нарівні з Олександром «Великим»."
  flavor_lit.28.a: "Давайте наймемо [target_character.GetHerHim] до армії."
  flavor_lit.28.b: "Дозволити [target_character.GetHerHim] йти [target_character.GetHerHis] власним шляхом також може бути нам на користь."
  flavor_lit.28.c: "Видалення такої фігури принесе нам прихильність [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_lit.29.title: "Впровадження Контушової Юсти"
  flavor_lit.29.desc: "Нещодавно значна частина наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] захопилася новою модою, яку наші купці привезли з [ShowContinentName('asia')]. Зокрема, це тип пояса, виготовленого з найтоншої тканини та прикрашеного найяскравішим золотом, що походить з [ShowRegionName('anatolia_region')] та [ShowRegionName('persia_region')]. Тепер, проникаючи до [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], деякі члени вже носять його, щоб підкреслити свій статус у [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Можливо, це чудова нагода привнести новий стиль для всіх у [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_lit.29.a: "Ці нові пояси стануть чудовим вбранням."
  flavor_lit.29.b: "Це схоже на марнування ресурсів."
  lit_new_clothing_style: "Новий стиль одягу"
  flavor_lit.30.title: "Палемоніди"
  flavor_lit.30.desc: "Хоча ми навернули [ROOT.GetCountry.GetName] до [ROOT.GetCountry.GetReligion.GetName], багато наших сусідів все ще бачать нас як простих варварів, вважаючи, що наші старі [ShowReligionAdjective('romuva')] традиції впливають на кожну частину нашого суспільства. Хоча це може бути правдою для багатьох у [ROOT.GetCountry.GetNameWithNoTooltip], якщо ми хочемо справді легітимізувати правління [target_character2.GetName], ми повинні проявити креативність.\n\n[target_character.GetName] написав оповіді, стверджуючи, що [ShowDynastyName('gediminid_dynasty')] мають римське походження. Вони розповідають про Палемона, який разом з кількома шляхетними родинами втік з [ShowLocationName('rome')] після спустошення, спричиненого Аттілою Гуном. Уникнувши певної смерті, вони врешті-решт прибули до [ShowAreaName('lithuania_area')] і заснували нове царство.\n\nХоча багато хто вважає ці оповіді простою вигадкою, можливо, ми можемо використати їх як доказ того, що ми є нащадками самого Августа."
  flavor_lit.30.a: "Ми будемо просувати ці хроніки."
  flavor_lit.30.b: "Ми повернемо [ShowLocationNameWithNoTooltip('rome')]!"
  flavor_lit.30.c: "Немає причин поширювати таку пропаганду."
  flavor_lit.31.title: "Відродження [ShowReligionAdjectiveWithNoTooltip('romuva')] Традицій"
  flavor_lit.31.desc: "З хвилею [ShowSituationName('reformation')], що прокотилася [ROOT.GetCountry.GetName], виник значний конфлікт у [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] щодо теологічних питань. Цей неспокій помітили [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], що призвело багатьох до думки, що [ROOT.GetCountry.GetReligion.GetAdjective] віра накладає занадто великий тягар на [ROOT.GetCountry.GetFlavorRank].\n\nПо всій країні люди намагаються відновити старі [ShowReligionAdjective('romuva')] вірування — можливість для простого люду звільнитися від проблем, накладених [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]. Можливо, це знак того, що сам [ROOT.GetCountry.GetGovernment.GetCourtTitle] повинен повернутися до старих звичаїв."
  flavor_lit.31.a: "Ми не будемо намагатися це зупинити."
  flavor_lit.31.b: "Нагадаємо їм, чому ми [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip]."
  lit_10_percent_of_primary_culture_pops_convert_to_romuva_tt: "#Y 10%#! усіх наших [Concept('ROOT.GetCountry.GetCulture.GetName] [pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ShowReligionName('romuva')]"
  lit_5_percent_of_primary_culture_pops_convert_to_romuva_tt: "#Y 5%#! усіх наших [Concept('ROOT.GetCountry.GetCulture.GetName] [pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ShowReligionName('romuva')]"
  flavor_lit.32.title: "[target_country.GetAdjectiveWithNoTooltip] Вплив у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_lit.32.desc: "Зі зростанням впливу [target_country.GetName] на [ROOT.GetCountry.GetName] виникла нова тенденція не лише серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], але й у [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Натхненні [target_country.GetCulture.GetName] звичаями, вони впроваджують нові ідеї, книги та культурні елементи в [ROOT.GetCountry.GetFlavorRank]. Це допомогло [ROOT.GetCountry.GetNameWithNoTooltip] повільно позбутися своїх ізоляціоністських звичаїв, даючи своєму народу краще розуміння більш екзотичних практик. Однак це також почало руйнувати [ROOT.GetCountry.GetCulture.GetName] культуру, поступово перетворюючи її на гібрид з культурою [target_country.GetCulture.GetNameWithNoTooltip]."
  flavor_lit.32.a: "Ми будемо чинити опір цьому культурному зсуву."
  flavor_lit.32.b: "Зміни неминучі, приймімо їх."
  flavor_lit.33.title: "Останні [ShowReligionAdjectiveWithNoTooltip('romuva')] Віруючі"
  flavor_lit.33.desc: "Хоча минуло значний час з моменту нашого навернення до [ROOT.GetCountry.GetReligion.GetName], вплив [ShowReligionAdjective('romuva')] традицій довго зберігався в [ROOT.GetCountry.GetFlavorRank]. Після багатьох жорстоких років, витрачених на викорінення цих звичаїв з [ROOT.GetCountry.GetName], боротьба нарешті закінчилася. Недавній перепис, проведений [ROOT.GetCountry.GetGovernment.GetCabinetTitle], показує, що більше немає жодного сліду впливу Старих Богів у [ROOT.GetCountry.GetFlavorRank]."
  flavor_lit.33.a: "Настав час рухатися вперед."
  flavor_lit.33.b: "Давайте хоча б віддамо шану цим старим традиціям."
  lit_all_primary_culture_pops_gain_satisfaction_tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetName], що є [ROOT.GetCountry.GetCulture.GetName], отримає [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.34.title: "[ShowCultureNameWithNoTooltip('ruthenian')] Закони в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_lit.34.desc: "Наші володіння в [ShowRegionName('ruthenia_region')] управлялися за законами, відмінними від тих, що діяли в [ROOT.GetCountry.GetAdjective] серцевині. Відомі як $russkaya_pravda_policy$, вони диктують, як управляють [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], як слід поводитися з [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] і яка є офіційна віра. Хоча багато з цих законів не застосовуються в серці [ROOT.GetCountry.GetFlavorRank], ми могли б взяти з них натхнення — можливо, навіть піднести деякі їхні аспекти в ширшому [ROOT.GetCountry.GetFlavorRank]."
  flavor_lit.34.a: "Києво-Руські закони стануть чудовим доповненням до нашої правової системи."
  flavor_lit.34.b: "Ми не будемо паплюжити [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] закони."
  lit_all_lithuanian_nobles_gain_pop_satisfaction_tt: "Кожен [Concept('ROOT.GetCountry.GetCulture.GetName] [pop', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.35.title: "Перший рукопис"
  flavor_lit.35.desc: "Масове виробництво книг завдяки дивам [ShowInstitutionName('printing_press')] принесло потік літератури до [ROOT.GetCountry.GetName]. Однак багато з цих книг написані не [ROOT.GetCountry.GetCourtDialect.GetName], що робить їх недоступними для простого люду. В результаті кілька осіб присвятили себе перекладу цих творів на місцеву мову. Деякі навіть надихнулися перекласти всю Біблію та написати про свої власні релігійні переконання. Одним з таких прикладів є нещодавно опублікований [ShowWorkOfArtTypeName('treatise')], під назвою $simple_words_of_catechism$ і написаний [target_character.GetName]. Він дав багатьом краще розуміння світу за межами [ROOT.GetCountry.GetFlavorRank] — що могло б розширити можливості людей, але також могло б зробити їх важчими для контролю."
  flavor_lit.35.a: "Дива [ShowInstitutionNameWithNoTooltip('printing_press')] будуть поширені!"
  flavor_lit.35.b: "Ми зупинимо цей масовий друк книг."
  flavor_lit.36.title: "Іммігранти з [target_country.GetNameWithNoTooltip]"
  flavor_lit.36.desc: "Як член [target_country.GetLongName], ми спостерігаємо приплив людей, які шукають притулку від політичних заворушень [target_country.GetFlavorRank], сподіваючись побудувати нове життя в [ROOT.GetCountry.GetName]. Багато з цих [target_country.GetCulture.GetName] осіб бажають оселитися в різних частинах нашої країни, допомагаючи заселити райони, які гостро потребують робочої сили. Ми могли б заохочувати цю імміграцію, навіть якщо це ризикує напружити наші відносини з [target_country.GetNameWithNoTooltip]."
  flavor_lit.36.a: "Давайте їх приймемо."
  flavor_lit.36.b: "Ми не повинні засмучувати [target_country.GetNameWithNoTooltip]."
  flavor_lit.37.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ShowInstitutionNameWithNoTooltip('renaissance')]"
  flavor_lit.37.desc: "Поширення ідеалів [ShowInstitutionName('renaissance')] у [ROOT.GetCountry.GetName] позитивно вплинуло на [ROOT.GetCountry.GetCulture.GetName] культуру. Через взаємодію з ширшою [ShowContinentName('europe')] думкою, деякі впливи почали переформовувати певні аспекти [ROOT.GetCountry.GetFlavorRank]. Зокрема, спостерігається зростання літератури, написаної [ROOT.GetCountry.GetCourtDialect.GetName], з новими авторами, які прагнуть створювати твори мистецтва, що згодом могли б поширити нашу культуру далі. Чи слід нам просувати цей рух, чи дозволити йому розвиватися природним шляхом?"
  flavor_lit.37.a: "Ми вкладемо золото для просування цього нового мистецтва."
  flavor_lit.37.b: "Марна трата наших скарбниць."
  flavor_lit.38.title: "Хлібниця [ShowContinentNameWithNoTooltip('europe')]"
  flavor_lit.38.desc: "Виробництво [ShowGoodsName('wheat')] у [ShowRegionName('ruthenia_region')] забезпечило нас їжею, необхідною для підтримки зростання населення. Проте ці родючі землі далеко не повністю використовуються. [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер пропонує інвестувати ресурси для подальшого розвитку регіону — будівництво нових міст, які більше не залежатимуть від імпорту для годування населення, і потенційно дозволить повне заселення території."
  flavor_lit.38.a: "Це буде наша хлібниця."
  flavor_lit.38.b: "Давайте натомість пріоритезуємо короткострокову торгівлю."
  lit_cheaper_granaries_in_ruthenia_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('ruthenia_region')], якою ми володіємо і яка виробляє [ShowGoodsName('wheat')], отримає [ShowModifier('lit_grain_supply_of_europe')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 20#! років"
  flavor_lit.39.title: "[target_character.GetNameWithNoTooltip]"
  flavor_lit.39.desc: "Піднесення неокласичного мистецтва привабило нових художників з усієї [ShowContinentName('europe')], кожен з яких сподівається залишити свій слід в історії нашої нації. Одним з таких художників є [target_character.GetName], [ShowCultureName('greater_polish')] громадянин з [ShowLocationName('warsaw')]. [target_character.GetSheHe|U] бажає служити [ROOT.GetCountry.GetGovernment.GetCourtTitle] — якщо ми готові фінансувати [target_character.GetHerHim]."
  flavor_lit.39.a: "Наше золото піде туди, де поширює нашу культуру."
  flavor_lit.39.b: "Тоді [target_character.GetSheHe] має шукати роботу деінде."
  flavor_lit.40.title: "[ShowReligionAdjectiveWithNoTooltip('romuva')] Послідовники [target_location.GetNameWithNoTooltip]"
  flavor_lit.40.desc: "Недавні опитування, проведені в [ROOT.GetCountry.GetFlavorRank], виявляють, що [ShowReligionAdjective('romuva')] вірування все ще зберігаються в [ROOT.GetCountry.GetName]. [target_location.GetRank.GetName] [target_location.GetName] продовжує практикувати ці язичницькі звичаї, що становить загрозу для [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], які прагнуть об'єднати націю через віру. Можливо, настав час примусово навернути їх до [ROOT.GetCountry.GetReligion.GetName], щоб ми могли справді правити як [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] лідери."
  flavor_lit.40.a: "Давайте навернемо цих язичників!"
  flavor_lit.40.b: "Розбурхувати наше населення може бути не наймудрішим кроком."
  lit_convert_percentage_of_pops_in_location_tt: "#Y 5%#! всіх [ShowReligionAdjective('romuva')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName] навернуться до [ROOT.GetCountry.GetReligion.GetName]"
  lit_all_romuva_pop_become_unhappy_tt: "Всі наші [ShowReligionAdjective('romuva')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.41.title: "[ShowReligionAdjectiveWithNoTooltip('romuva')] Священна територія в [target_location.GetNameWithNoTooltip]"
  flavor_lit.41.desc: "Хоча наше навернення до [ROOT.GetCountry.GetReligion.GetName] було здебільшого успішним, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] продовжують триматися своєї віри в старих богів. Вони все ще шанують своє священне місце в [target_location.GetName], відмовляючись визнавати [ROOT.GetCountry.GetAdjective] правління та вперто чіпляючись за стародавні звичаї. Можливо, настав час показати їм наслідки непокори [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_lit.41.a: "Спалити його."
  flavor_lit.41.b: "Не будемо спричиняти жодних інцидентів через це."
  lit_romuva_pops_in_location_gain_satisfaction_tt: "Всі [ShowReligionAdjective('romuva')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.42.title: "[ShowReligionAdjectiveWithNoTooltip('romuva')] Залишки серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_lit.42.desc: "Хоча багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] навернувся до [ROOT.GetCountry.GetReligion.GetName], не всі прийняли істинну віру. Деякі все ще таємно шанують старих богів, прямо кидаючи виклик владі [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Можливо, надані їм привілеї служать лише для приховування цих єретичних практик. Можливо, настав час нагадати їм, хто насправді править ними, якщо вони продовжуватимуть дотримуватися [ShowReligionAdjective('romuva')] вірувань."
  flavor_lit.42.a: "Примусово навернути їх."
  flavor_lit.42.b: "Такі дії засмутять наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  lit_convert_percent_of_nobles_to_religion_tt: "#Y 5%#! всіх наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ShowReligionAdjective('romuva')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ROOT.GetCountry.GetReligion.GetName]"
  flavor_lit.43.title: "Запрошення [ShowCultureGroupNameWithNoTooltip('tatar_group')] Родин"
  flavor_lit.43.desc: "Наше завоювання [ShowRegionName('steppes_region')] принесло нам не лише славу та безпеку, але й багато [ShowCultureGroupName('tatar_group')] родин, які колись правили цією землею. Тепер ці родини шукають нового початку, бажаючи оселитися в наших центральних землях, де вони зможуть краще інтегруватися в наше суспільство. Багато хто висловив бажання служити в нашій армії, формуючи громаду, яка могла б значно принести користь [ROOT.GetCountry.GetName]. Проте така інтеграція матиме свою ціну для [ROOT.GetCountry.GetFlavorRank]."
  flavor_lit.43.a: "Давайте привітаємо ці липські [ShowCultureGroupNameWithNoTooltip('tatar_group')] родини."
  flavor_lit.43.b: "Ми не дозволимо їм мігрувати на наші землі."
  flavor_lit.44.title: "Боротьба з [ShowReligionAdjectiveWithNoTooltip('romuva')] Відродженням"
  flavor_lit.44.desc: "Піднесення [ShowSituationName('reformation')] надихнуло багатьох серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] в [ROOT.GetCountry.GetName] повернутися до стародавніх традицій [ShowReligionName('romuva')], що призвело до заворушень у сільській місцевості. Ця зростаюча проблема призвела до скликання [ROOT.GetCountry.GetGovernment.GetParliament.GetName] для обговорення шляхів вирішення питання. Більшість вважає, що [ROOT.GetCountry.GetFlavorRank] має вжити прямих заходів для прискорення їхнього навернення, а не чекати, поки ці старі традиції зникнуть самі по собі. [target_character.GetName] можливо, доведеться схвалити такі заходи — якщо [target_character.GetSheHe] справді є побожним [ROOT.GetCountry.GetReligion.GetAdjective]."
  flavor_lit.44.a: "Настав час розібратися з цим релігійним питанням."
  flavor_lit.44.b: "Ми не шкодитимемо громадам [ROOT.GetCountry.GetNameWithNoTooltip]."
  lit_unlock_parliament_debate_to_convert_romuva_people_for_the_rest_of_the_situation_tt: "Ми розблокуємо [ShowParliamentIssueTypeName('lit_measures_against_romuva')] до кінця [ShowSituationName('reformation')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_lit.45.title: "Статути [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_lit.45.desc: "Відсутність єдиного правового кодексу в [ROOT.GetCountry.GetName] виявилася проблематичною для [target_character.GetName], який мусить керувати, спираючись на сукупність регіональних законів по всьому [ROOT.GetCountry.GetFlavorRank]. [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер пропонує створити новий правовий кодекс — такий, що об'єднав би ці розрізнені закони та був би перекладений різними мовами нашого народу. Такий кодекс приніс би таку необхідну ясність та авторитет по всьому королівству."
  flavor_lit.45.a: "Створімо ці нові закони."
  flavor_lit.45.b: "Збереження регіональних законів було б кращим."
  flavor_lit.1000.title: "[target_country2.GetAdjectiveWithNoTooltip] Вплив у [ShowLocationNameWithNoTooltip('kaunas')]"
  flavor_lit.1000.desc: "[target_location.GetRank.GetName] [target_location.GetName] зазнав занепаду, його торгівля скоротилася в межах [ROOT.GetCountry.GetName]. У відповідь губернатор [target_location.GetRank.GetNameWithNoTooltip] прагне залучити купців з [target_country2.GetLongName], сподіваючись, що їхні інвестиції пожвавлять територію — навіть якщо це означає прийняття впливу іноземних держав."
  flavor_lit.1000.a: "Запросімо цих купців, щоб допомогти [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_lit.1000.b: "Нам не потрібна [target_country2.GetCulture.GetNameWithNoTooltip] допомога для цього."
  lit_no_offer_on_hansa_tt: "Жодної пропозиції не буде надіслано до [target_country2.GetName]"
  flavor_lit.1001.title: "$flavor_lit.1000.title$"
  flavor_lit.1001.desc: "Губернатор [target_location.GetName], разом із [target_character.GetName], звернувся до нас із пропозицією: право для наших купців оселитися в [target_location.GetRank.GetName]. Вони сподіваються, що наша участь перетворить цю територію на процвітаючий центр торгівлі в межах [target_country.GetName]. Це спокуслива пропозиція, хоча ми повинні врахувати ризик втрати наших інвестицій, якщо вони пізніше захоплять наші активи."
  flavor_lit.1001.a: "Ми приймемо цю угоду."
  flavor_lit.1001.b: "Чому ми повинні інвестувати в таке ненадійне місце?"