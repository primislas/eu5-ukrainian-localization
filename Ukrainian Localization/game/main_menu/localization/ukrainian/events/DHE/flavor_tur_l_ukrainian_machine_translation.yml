l_english:
  flavor_tur.1.title: "[persia.GetAdjectiveWithNoTooltip] Проблема"
  flavor_tur.1.desc: "[persia.GetName] довгий час був терном у нашому боці, постійною загрозою нашим кордонам. Але шпигуни при їхньому [ROOT.GetCountry.GetGovernment.GetCourtTitle] повідомили нам, що [persia.GetAdjectiveWithNoTooltip] уряд, можливо, готовий підписати довготривалу мирну угоду з нами. Це забезпечило б охорону розтерзаних війною прикордонних провінцій на благо нашого [ROOT.GetCountry.GetFlavorRank], а також їхнього. [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] вже почав розробляти пропозицію договору."
  flavor_tur.1.historical_info: "Зі зростанням династії Сефевідів в Ірані, османи отримали грізного ворога. Подібно до Римських імперій до них, османи були втягнуті в тривалі та руйнівні війни з Іраном. Цього разу конфлікти були не лише за обтяжені землі Близького Сходу – був також елемент релігійної боротьби, оскільки Сефевіди прийняли шиїтський іслам, тоді як османи вважали себе спадкоємцями сунітського халіфату."
  flavor_tur.1.a: "Запропонувати повне примирення."
  flavor_tur.1.b: "Запропонувати помірний договір."
  flavor_tur.1.c: "З нашими заклятими ворогами не буде жодної угоди."
  full_reconciliation_persia: "[persia.GetLongName] незабаром дасть відповідь на нашу пропозицію."
  moderate_treaty_persia: "$full_reconciliation_persia$."
  flavor_tur.2.title: "[ottomans.GetAdjectiveWithNoTooltip] Пропозиція"
  flavor_tur.2.desc: "Посли з [ottomans.GetName] прибули до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], стверджуючи, що шукають довготривалого рішення для миру між нашими країнами. Вони мають пропозицію договору, яка підтвердить наші поточні кордони та забезпечить нашим паломникам безпечну подорож до їхніх святих місць, але натомість ми повинні будемо змусити наших [ROOT.GetCountry.GetReligion.GetAdjective] проповідників припинити їхнє ритуальне прокляття Аїші, Сахаби та трьох перших Рашидунських халіфів, яких [ShowReligionAdjective('sunni')] високо шанують. З усією цією ворожнечею між нами, чи можемо ми їм справді довіряти?"
  flavor_tur.2.historical_info: "$flavor_tur.3.historical_info$"
  flavor_tur.2.a: "Шукати повного примирення."
  full_reconciliation: "Повне примирення"
  flavor_tur.2.b: "Погодитися на помірний договір."
  moderate_treaty: "Помірний договір"
  flavor_tur.2.c: "Ми не можемо прийняти цю пропозицію."
  flavor_tur.3.title: "Договір Каср-е Ширін"
  flavor_tur.3.desc: "[persia.GetAdjective] посли повернулися з листом від свого уряду, в якому йдеться про їхню готовність підписати договір. Він підтвердить наші поточні кордони назавжди і, з ласки [ROOT.GetCountry.GetReligion.GetGodName], створить тривалий мир між нами. Ми будемо зобов'язані надати їхнім паломникам безпечну подорож до святих місць на наших землях, незалежно від їхнього віросповідання, але натомість їхні [ShowReligionAdjective('shia')] проповідники припинять своє ритуальне прокляття Аїші, Сахаби та трьох перших Рашидунських халіфів, яких ми [ShowReligionAdjective('sunni')] високо шануємо."
  flavor_tur.3.historical_info: "Договір Зухаб, також відомий як Договір Каср-е Ширін, був підписаний між Османською імперією та Персією у 1639 році та встановив кордони, які мало змінилися до сьогодні. Ворожнеча між двома великими імперіями значно зменшилася після договору, оскільки їхні відносини неухильно покращувалися, але прикордонні суперечки не зникли повністю, і в 1722 році знову спалахнула війна. Однак договір був переглянутий та поновлений у 1747 році."
  flavor_tur.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_tur.3.b: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_tur.4.title: "[persia.GetAdjectiveWithNoTooltip] Відповідь"
  flavor_tur.4.desc: "Наші посли, відправлені до [ROOT.GetCountry.GetGovernment.GetCourtTitle] [persia.GetLongName], повернулися, принісши тривожні новини. [persia.GetAdjectiveWithNoTooltip] уряд, як повідомляється, розглянув наші умови, але з якоїсь причини вирішив їх відхилити. Чи вони вже планують напад?"
  flavor_tur.4.historical_info: "$flavor_tur.3.historical_info$"
  flavor_tur.4.a: "Вони заплатять за цю образу"
  flavor_tur.5.title: "Децентралізуючий ефект провінційної системи"
  flavor_tur.5.desc: "Провінційні губернатори, беї, є могутніми людьми, зазвичай амбітними і не завжди лояльними. Попри це, їхній титул має давнє походження серед турків, і вони довго були нашим найкращим варіантом для управління [ROOT.GetCountry.GetFlavorRank]. Група з них, підтримана багатьма серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], тепер вимагає ще більшої місцевої автономії, стверджуючи, що це допоможе їм швидше реагувати на будь-який складний місцевий конфлікт, що може виникнути."
  flavor_tur.5.historical_info: "Бей — це тюркський титул для #italic вождя#!, а також часто використовується як почесний титул для чоловіків, пов'язаних з правлячими династіями або урядами. Цей титул використовувався протягом османських часів, часто для позначення провінційних губернаторів, поряд з титулом бейлербей, для намісників найбільших провінцій імперії. У XVII столітті, коли османський уряд ставав більш бюрократичним і менш зосередженим на особистій владі султана, ці провінційні губернатори здобули ще більшу владу."
  flavor_tur.5.a: "Піддатися їхнім вимогам."
  flavor_tur.5.b: "Обмежити поступки."
  flavor_tur.5.c: "$common_string_rein_them_in$"
  flavor_tur.6.title: "Справа купців у [ShowLocationNameWithNoTooltip('constantinople')]"
  flavor_tur.6.desc: "З нашим завоюванням [ShowLocationName('constantinople')] настав час переглянути нашу політику щодо торгівлі, що проходить через це могутнє [target_location.GetRank.GetName]. Ми могли б спробувати запровадити закони для посилення державного контролю над купцями. Хоча це, безперечно, розлютить могутні купецькі республіки, чиї торговці довго користувалися певними привілеями в [ShowLocationNameWithNoTooltip('constantinople')], це може принести користь нашій економіці в довгостроковій перспективі."
  flavor_tur.6.historical_info: "До завоювання Константинополя Мехмед II підписав кілька щедрих угод з торговими імперіями Венеції та Генуї, щоб забезпечити їхній нейтралітет, але коли велике місто впало, він не забарився розірвати західний купецький контроль над чорноморською торгівлею. Мехмед був меркантилістом, який прагнув підтримувати державний контроль над купцями, і деякий час це виявлялося ефективною політикою — османська економіка процвітала."
  flavor_tur.6.a: "Ця реформа давно назріла."
  broken_trade_agreement: "Розірвана торгова угода"
  flavor_tur.6.b: "Ми повинні залишити все як є."
  honored_trade_agreement: "Почесна торгова угода"
  flavor_tur.7.title: "Справа військових"
  flavor_tur.7.desc: "Після нещодавньої війни [ROOT.GetCountry.GetGovernment.GetRuler.GetName] почав розмірковувати над подальшою військовою реформою. Щоб продовжувати розвивати ефективність нашої військової ієрархії та методів набору, ми повинні ще більше зосередити армію навколо елітних солдатів-рабів та спеціалізованих загонів, набраних з нижчих класів, і спробувати раз і назавжди розірвати нашу залежність від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та їхніх сил."
  flavor_tur.7.historical_info: "Правління Мехмеда I та Мурада II ознаменувало возз'єднання Османської імперії після нищівної поразки, якої вона зазнала від Тимура. У цей період система #italic девшірме#!, армія султана, справді набула значного поширення, а після падіння Константинополя стара турецька військова знать була остаточно зламана, багатьох її лідерів вислано або страчено. Військо тепер міцно перебувало в руках держави."
  flavor_tur.7.a: "Це майбутнє."
  flavor_tur.7.b: "Ні, ми є [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], і ми завжди будемо ними."
  flavor_tur.7.c: "Натомість ми повинні зосередитися на флоті."
  flavor_tur.8.title: "Академія Ендерун"
  flavor_tur.8.desc: "Щоб підготувати адміністраторів та генералів для нашого зростаючого володіння, ми могли б заснувати школу, керовану внутрішнім колом двору, щоб тримати студентів близько до правителя. Це не тільки дало б нам велике розуміння, але й прив'язало б студентів до нас, забезпечуючи постійну важливість династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] у всіх державних справах.\n\nПроте ми повинні дозволяти вступати не лише дворянам, а й будь-якій обдарованій молоді, незалежно від її походження."
  flavor_tur.8.historical_info: "Мехмед II заснував школу у дворі щойно збудованого палацу Топкапи. Студентів обирали з-поміж найперспективніших новобранців девшірме (призваних християнських юнаків) і навчали ісламській вірі, наукам, військовому мистецтву, а також багатьом мовам. Призначення на державні посади новобранців девшірме, навчених у палацовій школі та лояльних до султана, становило основу османської системи патрімоніального правління протягом п'ятнадцятого та шістнадцятого століть."
  flavor_tur.8.a: "Це майбутнє!"
  flavor_tur.8.b: "Натомість ми повинні зосередитися на розширенні системи тімарів."
  flavor_tur.9.title: "Перенаправлення доходів"
  flavor_tur.9.desc: "Щоб профінансувати розширення тимаріотської системи, кмітливі радники запропонували перенаправити частину доходів від вакфу — заснованих при мечетях фондів, що підтримують благодійність для нещасних і покинутих. Це, безумовно, ще більше зміцнить нашу армію та зменшить владу [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], але може викликати широке невдоволення, щойно побожніші верстви населення дізнаються про це."
  flavor_tur.9.historical_info: "Мехмед II прагнув за будь-яку ціну розширити свою особисту владу в Османській імперії. Ближче до кінця свого правління він спробував зменшити владу улемів, перенаправивши доходи від #italic вакфів#!, які їх підтримували, до тимарної системи, тим самим зміцнивши османську армію. Однак цей крок виявився суперечливим..."
  flavor_tur.9.a: "Державі потрібні гроші."
  flavor_tur.9.b: "Вакф ніколи не можна чіпати!"
  flavor_tur.10.title: "Гнів [GetCountry('VEN').GetNameWithNoTooltip]"
  flavor_tur.10.desc: "[GetCountry('VEN').GetLongName] давно насолоджувалися домінуючим становищем у торгівлі прянощами завдяки своїм володінням в Егейському морі та вигідним зв'язкам в [ShowLocationName('alexandria')]. Але з нашим захопленням цього [target_location.GetRank.GetName] та зростаючою присутністю в [ShowProvinceDefinitionNameWithNoTooltip('aegean_sea_province')], купці [GetCountry('VEN').GetNameWithNoTooltip] дедалі більше занепокоєні тим, що ми повністю заблокуємо їм торгівлю прянощами. [GetCountry('VEN').GetGovernment.GetRulerTitle] тепер надіслав дуже рішучий запит, щоб ми виплатили репарації за втрачені доходи."
  flavor_tur.10.historical_info: "Хоча і Венеція, і османи отримували вигоду від взаємних торговельних відносин, територіальні суперечки в Егейському морі та тиск на Венецію з боку інших християнських націй неминуче штовхнули їх до збройного конфлікту. Друга венеційсько-османська війна спалахнула в 1499 році, коли блискучий адмірал Кемаль Рейс привів османів до кількох перемог. Венеція зрештою звернулася за допомогою до Угорщини та Папської держави, і було укладено перемир'я, за яким Венеція мала поступитися туркам важливими грецькими фортецями Модон і Корон."
  flavor_tur.10.a: "Відмовитися навіть обговорювати компенсацію."
  flavor_tur.10.b: "Віддати Александрію як компенсацію."
  ceded_alexandria: "Александрію передано"
  VEN_will_get_a_cb: "[GetCountry('VEN').GetLongName] отримає [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.14.title: "Королівська бюрократія"
  flavor_tur.14.desc: "Настав час для серйозних реформ. Якщо ми коли-небудь прагнемо стати імперією, ми повинні розглянути можливість зміцнення бюрократії та тіснішого зв'язку її з палацом і династією [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], щоб раз і назавжди приборкати владу провінційних еліт. Традиціоналісти, однак, будуть ненавидіти це, оскільки це буде ще один крок від нашого коріння в степах."
  flavor_tur.14.historical_info: "Сулейман I був, мабуть, найвеличнішим з османських султанів. Названий Кануні (Законодавцем), він був неперевершеним адміністратором, який усвідомлював, що влада провінційних беїв повинна бути приборкана сильною центральною владою. Таким чином, він боровся за просування потужної королівської бюрократії, яка була непопулярною в усіх таборах..."
  flavor_tur.14.a: "Розширити бюрократію, чого б це не коштувало."
  flavor_tur.14.b: "Обмежених реформ буде достатньо."
  flavor_tur.14.c: "Натомість задобрити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_tur.15.title: "Імперський Арсенал"
  flavor_tur.15.desc: "Якщо ми коли-небудь зможемо по-справжньому опанувати Східне Середземномор'я, ми повинні інвестувати ще більше в нашу військово-морську міць. Стара гавань [GetCountry('GEN').GetName] у [ShowLocationName('constantinople')] була б ідеальним місцем для масивної верфі — але таке починання, звичайно, не було б дешевим."
  flavor_tur.15.historical_info: "Невдовзі після падіння Константинополя Мехмед II заснував імперську верф через Золотий Ріг, ймовірно, на місці старої генуезької верфі Vetus Tersana. Верф була масово розширена за правління Селіма I, аскетичної людини з гострим розумом. До 1515 року, з понад 160 побудованими доками, вона справді перевершила стару османську військово-морську базу в Галліполі."
  flavor_tur.15.a: "Нехай він буде більшим за арсенал у [ShowLocationNameWithNoTooltip('venice')]!"
  flavor_tur.15.b: "Давайте просто будувати більше кораблів по-старому."
  flavor_tur.15.c: "Ні, наша доля пов'язана з армією."
  galley_construction: "Будівництво галер"
  flavor_tur.16.title: "Перше повстання Джелалі"
  flavor_tur.16.desc: "У [ShowRegionName('anatolia_region')] панує безлад. Студенти [ShowBuildingTypeName('madrasa')], нерегулярні солдати-секбани та дрібні чиновники об'єднали зусилля під проводом [ShowReligionAdjective('shia')] проповідника на ім'я [sheikh_celal.GetName], розлючені фінансовими негараздами. Вони розпочали заворушення в багатьох провінціях і вимагають зниження податків, меншого втручання уряду в місцеві справи та більшої поваги до [ShowReligionAdjectiveWithNoTooltip('shia')] вірян."
  flavor_tur.16.historical_info: "Повстання Джелалі відбувалися в Анатолії між 1519 і 1659 роками. Ці повстання були симптомом економічних негараздів багатьох османських підданих у цей час, оскільки державні доходи від грабунків зменшилися, а торгові шляхи змістилися від Близького Сходу через відкриття, зроблені європейцями. Визнаючи їхні скарги, султани іноді погоджувалися на деякі вимоги повстанців, а багатьох лідерів повстанців підвищували до урядових посад. Слабші повстання, такі як перше, очолюване Джелалем, були придушені силою."
  flavor_tur.16.a: "Придушити цих зрадників."
  flavor_tur.16.b: "Прийняти їхні вимоги."
  celali_uprising: "Повстання Джелалі"
  celali_uprising_joining: "Усі [ShowReligionName('shia')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('anatolia_region')] приєднаються до [celali_uprising.GetName]"
  celal_available.tt: "[Concept('sheikh_celal.GetNameWithNoTooltip] стає доступним для служби в [cabinet', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.17.title: "Захисник паломництва"
  flavor_tur.17.desc: "Тепер, коли ми пануємо над [ShowLocationName('jerusalem')] та [ShowLocationName('cairo')], ми також контролюємо значну частину паломницьких доріг Хаджу до [ShowLocationName('mecca')] та [ShowLocationName('medina')]. Таким чином, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] може претендувати на великий титул Хадім аль-Харамайн, #italic Слуга Двох Святих Місць#! – але з такою претензією прийде зобов'язання захищати Хадж і всіх, хто вирушає в нього."
  flavor_tur.17.historical_info: "Після надзвичайно успішної $mamluk$ кампанії султан Селім I прийняв омаж Шаріфа Мекки та прийняв титул Хадім аль-Харамайн. Захист паломницьких шляхів відтоді став одним із найважливіших джерел легітимності та престижу для Османської династії."
  flavor_tur.17.a: "Ми готові до цього завдання!"
  flavor_tur.18.title: "Архітектор Блаженства"
  flavor_tur.18.desc: "[mimar_sinan.GetName] — видатний [mimar_sinan.GetWomanMan], який вже досяг великих успіхів як військовий інженер, сапер і кораблебудівник. Але [mimar_sinan.GetHerHis] справжня пристрасть лежить у сфері архітектури, де [mimar_sinan.GetSheHe] показав великі перспективи. Ми могли б призначити [mimar_sinan.GetHerHim] на посаду Архітектора Обителі Блаженства, яка наразі вакантна. На цій посаді [mimar_sinan.GetSheHe] наглядав би за нашими дорогами, водогонами та мостами."
  flavor_tur.18.historical_info: "Мімар Сінан був головним архітектором, інженером і математиком для трьох османських султанів. Хоча він починав як скромний інженер і архітектор доріг і мостів, він продовжив наглядати за незліченними важливими проектами і залишив тривалу спадщину в османській архітектурі."
  flavor_tur.18.a: "Негайно призначити [mimar_sinan.GetHerHim]."
  flavor_tur.18.b: "[mimar_sinan.GetSheHe|U] занадто дорогий!"
  flavor_tur.19.title: "Велика правова реформа"
  flavor_tur.19.desc: "[target_character.GetName] довго розмірковував над правовою реформою для [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] зростаючого володіння. Працюючи разом з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], ми могли б зібрати та гармонізувати закони, прийняті всіма попередниками [ROOT.GetCountry.GetGovernment.GetRulerTitle], а також переконатися, що вони все ще відповідають [ShowPolicyName('sharia_law_policy')], яку ми, як вірні [ShowReligionGroupName('muslim')], зобов'язані поважати."
  flavor_tur.19.historical_info: "Султан Сулейман I став відомим як Кануні – Законодавець – для свого народу завдяки його обширним правовим реформам та справедливому правлінню. Далі кодифікуючи династичні закони, «канун», він працював у співпраці зі знаменитим $common_string_shaikh_al_islam$ Ебюссуудом Ефенді, щоб привести їх у відповідність з мусульманськими законами $sharia$, створивши більш гармонійну правову систему для імперії."
  flavor_tur.19.a: "Кодифікувати Османські Закони."
  flavor_tur.19.b: "Залишити як є"
  flavor_tur.20.title: "Піднесення [muhammad_koprulu.GetDynasty.GetNameWithNoTooltip]"
  flavor_tur.20.desc.opening: "[muhammad_koprulu.GetName] довго служив [ROOT.GetCountry.GetFlavorRank] як губернатор у провінціях і продемонстрував як вірність, так і проникливість, а також надзвичайну майстерність у державному управлінні."
  flavor_tur.20.valide_sultan.desc: "$flavor_tur.20.desc.opening$ [valide_sultan.GetName] наполягає на призначенні [muhammad_koprulu.GetHerHis] на посаду [ROOT.GetCountry.Custom('GetHeadOfCabinetName')], що вимагатиме усунення [muhammad_koprulu.GetHerHis] попередника, [doomed_vizier.GetName], і викличе велике занепокоєння серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_tur.20.no_valide_sultan.desc: "$flavor_tur.20.desc.opening$ Фракції при [ROOT.GetCountry.GetGovernment.GetCourtTitle] вважають, що цей [muhammad_koprulu.GetWomanMan] буде благословенням для Високої Порти. Вони наполягають на підвищенні [muhammad_koprulu.GetHerHis] до рангу [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] — і усуненні [muhammad_koprulu.GetHerHis] попередника, [doomed_vizier.GetName]."
  flavor_tur.20.historical_info: "Народжений близько 1575 року в селі Радник в Албанії, Мехмед Кьопрюлю був молодим християнським хлопчиком, забраним системою девшірме (викрадений і вихований у мусульманській вірі, як і більшість яничарських військ). Він розпочав свою кар'єру кухарем, потім перейшов до Скарбниці. Паша в центральній Анатолії, він здобув собі ім'я як чудовий і чесний адміністратор – рідкісна істота в Османській імперії. 15 вересня 1656 року його призначила великим візиром Турхан, мати молодого султана Мехмеда IV. Це ознаменувало початок довгої династії впливових візирів з родини Кьопрюлю."
  flavor_tur.20.a: "Геть старе, хай живе нове."
  flavor_tur.20.b: "Нам не потрібен [muhammad_koprulu.GetHerHim]."
  becomes_head_of_cabinet_tt: "[Concept('muhammad_koprulu.GetName] стає нашим [head_of_the_cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  koprulu_forgotten.tt: "[muhammad_koprulu.GetName] відступає в безвість."
  flavor_tur.21.title: "Великий Лучник"
  flavor_tur.21.desc: "[kemankes.GetName] давно здобув [kemankes.GetHerselfHimself] ім'я серед $janissaries_advance$ та у флоті, і особливо славиться [kemankes.GetHerHis] навичками стрільби з лука, що принесло [kemankes.GetHerHim] прізвисько #italic Кеманкєш#!, Лучник. Але [kemankes.GetSheHe] також талановитий в інших галузях і відомий тим, що очистив корумповані елементи як в армії, так і на флоті під час [kemankes.GetHerHis] перебування там офіцером. Тепер [kemankes.GetSheHe] готовий зробити те саме для всього [ROOT.GetCountry.GetFlavorRank], якщо ми зможемо надати [kemankes.GetHerHim] посаду в нашому [ROOT.GetCountry.GetGovernment.GetCabinetTitle]."
  flavor_tur.21.historical_info: "Кеманкєш Кара Мустафа-паша був албанського походження. Він мав досвід у яничарському корпусі, а пізніше служив великим адміралом флоту. Мурад IV підняв його до рангу великого візира, але він здобув значно більшу владу під час правління свого слабкого наступника, Ібрагіма. Однак, незважаючи на його блискучу державну діяльність та обґрунтовані реформи, Кеманкєш став смертельним ворогом Кьосем, матері султана, та оточення гаремних жінок і шарлатанів навколо неї, і це зрештою призвело до його звільнення та страти у 1644 році."
  flavor_tur.21.a: "Нам потрібні [kemankes.GetHerHis] навички."
  flavor_tur.21.b: "Наші нинішні радники достатньо хороші."
  kemankes_forgotten.tt: "[kemankes.GetName] відступає в безвість."
  flavor_tur.22.title: "[ShowCultureNameWithNoTooltip('tunisian')] Повстання"
  flavor_tur.22.desc: "У [ShowAreaName('tunis_area')] зростає невдоволення нашим правлінням. Місцеві лідери, нібито лояльні до [ROOT.GetCountry.GetName], були оскаржені бунтівними $janissaries_advance$ у заплутаній мережі інтриг, і ситуація швидко виходить з-під контролю. Але залишається можливість вирішити ситуацію, надіславши додаткові кошти беям, які все ще лояльні, та надавши більшу автономію [ShowCultureName('tunisian')] народу."
  flavor_tur.22.historical_info: "У перші десятиліття XVIII століття беї та деї (яничарські лідери) Північної Африки були в бунтівному настрої після Карловицького миру між Османською імперією та Священною лігою. У 1705 році Хусейн бін Алі Ага критського походження здійснив переворот і заснував династію Хусейнідів, яка правила Тунісом до 1957 року. Туніс не став по-справжньому автономним одразу, але він здобув значну міру незалежності."
  flavor_tur.22.a: "Розчавити зрадників!"
  flavor_tur.22.b: "Надіслати кошти та обіцянки."
  tunisian_uprising: "Усі [ShowCultureName('tunisian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('tunis_area')] матимуть дуже низьку [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.23.title: "[ShowAreaNameWithNoTooltip('tripolitania_area')] Повстання"
  flavor_tur.23.desc: "Здається, назрівають нові проблеми в [ShowSubContinentName('north_africa')]. Місцевий кавалерійський офіцер, [karamanli.GetName], скористався нагодою, щоб убити губернатора [ShowAreaName('tripolitania_area')], стверджуючи, що той був корумпований і втратив довіру народу. [karamanli.GetNameWithNoTooltip] тепер вимагає, щоб ми визнали [karamanli.GetHerHim] беєм. Здається очевидним, що [karamanli.GetSheHe] має намір заснувати місцеву династію та здійснювати значною мірою автономну владу, проте наш єдиний варіант, якщо ми відмовимося, полягатиме в підготовці до війни проти повстанців під [karamanli.GetHerHis] командуванням."
  flavor_tur.23.historical_info: "У 1711 році Ахмад Караманлі, турецький кавалерійський офіцер і яничарський дей, убив османського губернатора Триполітанії та переконав султана призначити його беєм. Посада губернатора залишалася спадковою в родині Караманлі до 1835 року. Хоча Караманлі формально підпорядковувалися Стамбулу, Триполітанія фактично була автономною державою."
  flavor_tur.23.a: "Зробити [karamanli.GetHerHim] беєм."
  flavor_tur.23.b: "Якщо [karamanli.GetSheHe] хоче війни, ми її забезпечимо."
  tripolitan_uprising: "Усі [ShowCultureName('libyan_arabic_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('tripolitania_area')] матимуть дуже низьку [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  ahmed_karamanli_becomes_bey.tt: "[karamanli.GetName] стає губернатором [ShowAreaNameWithNoTooltip('tripolitania_area')]"
  flavor_tur.24.title: "Ловець Хмар"
  flavor_tur.24.desc: "Бей [ShowRegionName('egypt_region')], [ali_al_kabir.GetName], якого називають Хмароловцем, здобув значну владу, і, як ми тепер чуємо, карбував монети від [ali_al_kabir.GetHerHis] власного імені, що є відкритим актом повстання проти Блискучої Порти. Але ми маємо шанс придушити повстання в зародку, переконавши одного з [ali_al_kabir.GetHerHis] командирів, [abu_al_dhahab.GetName], зрадити [ali_al_kabir.GetHerHim]. Це, однак, буде розцінено як підступний вчинок і все одно викличе деяке невдоволення серед народу [ShowRegionNameWithNoTooltip('egypt_region')]."
  flavor_tur.24.historical_info: "Незважаючи на завоювання Мамлюцького султанату в 1518 році, османи продовжували покладатися на мамлюцькі фракції як частину управління Єгиптом. Дві такі фракції зрештою вступили в гірке суперництво в середині XVIII століття в Єгипті, і з цього конфлікту виник Алі-бей аль-Кабір. Після того, як він зміцнив свою владу, він повстав проти османського панування, здобувши кілька перемог у Сирії та Хіджазі. Але османам вдалося зупинити його просування, викликавши недовіру між ним та його підлеглими, і незабаром після цього він був убитий у Каїрі, поклавши край єгипетському повстанню."
  flavor_tur.24.a: "Переконати командира."
  flavor_tur.24.b: "Ігнорувати проблему."
  flavor_tur.24.c: "Також зруйнувати репутацію [ali_al_kabir.GetHerHis]."
  egyptian_uprising: "Усі [ShowCultureName('lower_egyptian_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('egypt_region')] отримають дуже низьке [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  egyptian_discontent: "Усі [ShowCultureName('lower_egyptian_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('egypt_region')] втратять частину [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.25.title: "Корсари [ShowAreaNameWithNoTooltip('algiers_area')]"
  flavor_tur.25.desc: "Невдоволення нашим правлінням зростає в [ShowAreaName('algiers_area')], де сформувався нестійкий баланс сил між $janissaries_advance$ та берберськими корсарами. Вони здобули значну владу і, здається, готові спробувати вирватися з-під влади [ROOT.GetCountry.GetName]. Однак ми все ще маємо можливість розрядити ситуацію, підкупивши впливових сильних людей серед завжди жадібних корсарів, щоб вони оголосили про свою підтримку нашого боку."
  flavor_tur.25.historical_info: "Алжир був оплотом берберських корсарів і досить космополітичним місцем. Але після того, як автократ Алі-ага був убитий під час англійського нападу в 1671 році, сформувався новий порядок, що характеризувався інституціоналізованими відносинами між місцевими яничарами, які володіли військовою владою, та корсарами, які контролювали торгівлю. Це розташування призвело до того, що Алжир став фактично незалежним від Османської імперії."
  flavor_tur.25.a: "Ці пірати нам більше не потрібні."
  flavor_tur.25.b: "Надіслати хабарі."
  algiers_uprising: "Усі [ShowCultureName('algerian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('algiers_area')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.27.title: "[ShowLocationRankNameWithNoTooltip('city')] Світового Бажання"
  flavor_tur.27.desc: "Нарешті, ми завоювали [ShowLocationName('constantinople')], де багато [ShowReligionGroupName('muslim')] полководців минулих епох зазнали поразки перед могутністю [ShowBuildingTypeName('theodosian_walls')]. Ця велика римська [constantinople_location.GetRank.GetName] була б гідною столицею для нашого [ROOT.GetCountry.GetFlavorRank], але ми могли б зробити кроки для відновлення її давньої слави та залучити [ShowCultureName('turkish_culture')] лоялістів на найважливіші посади. Або ми могли б просто пограбувати все, що зможемо."
  flavor_tur.27.historical_info: "Хоча завоювання Константинополя османами розглядалося як катастрофічна подія серед західних християн, воно піднесло їх до слави в очах мусульманського світу. Після трьох днів звичайного грабунку Мехмед II наказав, щоб мешканці міста відтепер були захищені. Греки Константинополя пізніше надали багато здібних радників для османського режиму."
  flavor_tur.27.a: "Вона стане гідною столицею."
  flavor_tur.27.b: "Пограбувати багатства і оголосити про нашу перемогу!"
  flavor_tur.27.c: "Ще одна перлина до нашої колекції, не більше."
  tur_byzantion_becomes_core_tt: "Усі володіння [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [ShowProvinceDefinitionNameWithNoTooltip('constantinople_province')] змінять свій рівень інтеграції на [Concept('core', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.28.title: "Поховання Кьосе Міхала"
  flavor_tur.28.desc: "Колишній [GetCountry('BYZ').GetAdjectiveWithNoTooltip] губернатор, який навернувся до [ShowReligionGroupName('muslim')] після пророчого сну, Кьосе Міхал став вірним союзником [GetCharacter('tur_osman').GetShortName]. Він допоміг у взятті [ShowLocationName('bursa')], і тепер він помер там, після довгого та плідного життя. Його численні сини подбають про його похорон, але залишається питання, якою буде його спадщина для нашого [ROOT.GetCountry.GetFlavorRank].\nУ панегірику Кьосе Міхалу, чи слід нам підкреслити його [ShowCultureName('greek_culture')] походження, що кожен бажаний під нашим прапором, чи краще заспокоїти [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], зосередившись на його відданості [ShowReligionName('sunni')] вірі?"
  flavor_tur.28.a: "[ShowCultureNameWithNoTooltip('greek_culture')] народ — наші брати!"
  flavor_tur.28.b: "Віра — це те, що нас об'єднує."
  burial_of_mihal: "Усі наші [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('anatolia_region')] та [ShowRegionName('balkan_region')] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.29.title: "Залицяння до дервішів"
  flavor_tur.29.desc: "[GetCharacter('tur_osman').GetShortName] здобув легітимність, одружившись із [GetCharacter('tur_rabia_bala_hatun').GetShortName], дочкою лідера громади дервішів на східному кордоні. Ці релігійні містики зберігають сильний вплив у нашому молодому [ROOT.GetCountry.GetFlavorRank], але тепер вони просять нас підтвердити наше заступництво, і натомість нададуть як політичні, так і військові поради від імені школи [target_school_scope.GetName]. Однак більш консервативні частини [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] заперечують проти зосередженості дервішів на езотеричних ритуалах, а не на науці, і воліли б, щоб ми не ставали ще більше залежними від них..."
  flavor_tur.29.historical_info: "Дервіші були суфійськими містиками, які відігравали ключову роль у ранньому османському суспільстві, поширюючи іслам, підтримуючи завоювання та впливаючи на адміністрацію. Їхні ложі служили центрами навчання та соціального забезпечення, тоді як ордени, такі як Бекташі та Мевлеві, формували османську релігійну та військову культуру через духовне керівництво та ритуали."
  flavor_tur.29.a: "Дервіші мають багато чому нас навчити!"
  flavor_tur.29.b: "Нам більше не потрібен цей союз."
  flavor_tur.30.title: "Монети на наше власне ім'я"
  flavor_tur.30.desc: "Під час пізнього правління [GetCharacter('tur_osman').GetShortName] [GetCharacter('tur_osman').GetSheHe] карбував монети на [GetCharacter('tur_osman').GetHerHis] власне ім'я, і ​​більше не як номінальний васал вмираючих Ільханідів в Ірані. Це був великий крок до легітимності як незалежного правителя, і тепер, коли Ільханат упав, ми мало що втратимо, продовжуючи цю практику. Однак монетний двір у [ShowLocationNameWithNoTooltip('bursa')] стверджує, що у них бракує срібла та золота, і просить внесок, щоб вони могли виробляти більшу кількість монет із славетним зображенням [target_character.GetName]."
  flavor_tur.30.a: "Вони отримають те, що їм потрібно."
  flavor_tur.30.b: "Достатньо буде обмеженого виробництва."
  flavor_tur.30.historical_info: "Перший великий монетний двір Османської держави, що підносилася, знаходився в Бурсі. Після захоплення міста в 1326 році Осман I почав карбувати монети на своє ім'я, а не як васал Монгольського Ільханату, що до того часу було звичаєм серед анатолійських тюркських правителів."
  flavor_tur.31.title: "Розквіт [target_location.GetNameWithNoTooltip]"
  flavor_tur.31.desc: "З часу нашого завоювання [ShowLocationNameWithNoTooltip('bursa')] місто процвітало, приваблюючи купців і мандрівників [ShowCultureName('greek_culture')], [ShowCultureName('turkish_culture')], [ShowCultureGroupName('italian_group')] та [ShowCultureGroupName('jewish_group')] походження.\n\nІнвестиції наших попередників у нову та модернізовану інфраструктуру, схоже, окупаються, поступово перетворюючи [ShowLocationNameWithNoTooltip('bursa')] на перлину нашої зростаючої держави. Здається, багато ремісників і торговців, які раніше працювали під [GetCountry('BYZ').GetAdjectiveWithNoTooltip] ярмом, відчувають, що корабель тоне, і натомість звернулися до нас."
  flavor_tur.31.a: "Нехай розширюється з часом."
  flavor_tur.31.b: "Фінансувати його розширення!"
  flavor_tur.31.historical_info: "Перше велике місто, захоплене османами в 1326 році, Бурса зберегла своє комерційне та культурне значення навіть після перенесення столиці до Адріанополя (Едірне). Протягом 14 століття воно пережило значне міське зростання."
  flavor_tur.32.title: "Сон [GetCharacter('tur_osman').GetShortNameWithNoTooltip]"
  flavor_tur.32.desc: "Як розповідає історія, однієї зоряної ночі давно, коли [GetCharacter('tur_osman').GetSheHe] перебував у таборі мудрого Шейха Едебалі, [GetCharacter('tur_osman').GetShortName] побачив сон, сповнений знамень. [GetCharacter('tur_osman').GetSheHe|U] снилося, що [GetCharacter('tur_osman').GetHerHis] нащадки завоюють більшу частину світу, а [ShowLocationNameWithNoTooltip('constantinople')] стане їхньою найбільшою нагородою. Хоча ми не можемо визначити джерело цієї історії, вона почала поширюватися як при нашому дворі, так і в інших місцях."
  flavor_tur.32.a: "Давайте переконаємося, що всі наші піддані дізнаються про це."
  flavor_tur.32.b: "Ми почуваємося такими натхненними!"
  flavor_tur.32.historical_info: "Історія про сон Османа почала поширюватися в 15 столітті, через століття після його смерті. Вважається, що це був пропагандистський твір, покликаний забезпечити основоположний міф для молодої імперії його нащадків."
  flavor_tur.33.title: "Перська бюрократія"
  flavor_tur.33.desc: "Через Великих Сельджуків у давнину наша держава успадкувала важливу спадщину від [ShowRegionName('persia_region')], і наші бюрократи пишуть [ShowLanguageName('persian_language')] мовою та стилем. Однак наші [ShowCultureName('greek_culture')] піддані хотіли б, щоб це змінилося, і щоб наше управління натомість наслідувало приклад, наданий [GetCountry('BYZ').GetName], а бюрократичні документи писалися [ShowLanguageName('greek_language')] мовою. Така радикальна реформа, безсумнівно, розлютила б [ShowCultureName('turkish_culture')] племена в нашому домені, оскільки вони цінують [ShowLanguageNameWithNoTooltip('persian_language')] спадщину та пов'язують її з великим престижем."
  flavor_tur.33.a: "Ми не відмовимося від нашої [ShowCultureGroupNameWithNoTooltip('iranian_group')] спадщини."
  flavor_tur.33.b: "Наші бюрократи використовуватимуть [ShowLanguageNameWithNoTooltip('greek_language')]."
  flavor_tur.33.c: "Чому б нашим документам не бути двомовними?"
  flavor_tur.33.historical_info: "Ранні османи моделювали свою державу за зразком своїх персизованих попередників-Сельджуків, переймаючи ключові адміністративні та бюрократичні практики, які були вдосконалені протягом століть перського впливу. В результаті, офіційні документи, судові записи та навіть державне листування переважно писалися перською мовою, яка слугувала мовою управління та високої культури на значній частині ісламського світу. Ця практика відображала глибокий відбиток сельджуцької адміністративної системи, де перські бюрократи та писарі довго відігравали вирішальну роль в управлінні державними справами. Хоча турецька залишалася мовою військової еліти, а арабська використовувалася для релігійних та правових питань, перська функціонувала як основний засіб державотворення, дипломатії та літератури в перші десятиліття бейліка."
  persianate_protocols_persianate_option: "Усі [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [Multiply_CFixedPoint(ShowNamedValue('pop_satisfaction_weak_penalty'), '(CFixedPoint)-1')|R2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  persianate_protocols_greek_option: "Усі [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  persianate_protocols_balanced_option: "Усі [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.34.title: "Наплив анатолійських вчених"
  flavor_tur.34.desc: "Зі зростанням престижу нашої династії почали прибувати численні вчені з [ShowAreaName('central_anatolia_area')]. Вони занурені в бюрократичні традиції давніх Великих Сельджуків, володіючи навичками державного управління, які, безсумнівно, знадобляться нашому зростаючому [ROOT.GetCountry.GetFlavorRank].\n\nОднак, їхнє масове працевлаштування спричинить тертя з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] прикордонних племен воїнів під нашим впливом, які розглядатимуть це як явний крок до спроби зменшити їхню владу на користь держави."
  flavor_tur.34.a: "Проте, ми їх наймемо."
  flavor_tur.34.b: "Було б розсудливо не гнівити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]..."
  flavor_tur.34.historical_info: "Ранній османській централізації значною мірою сприяв наплив вчених з Центральної Анатолії, де турко-перська бюрократія мала більший вплив, ніж на Заході."
  flavor_tur.35.title: "Перший серед рівних"
  flavor_tur.35.desc: "Лідери племінних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які очолили нашу експансію, розглядають нас лише як першого серед рівних, за давнім [ShowCultureName('turkish_culture')] звичаєм. Однак тепер вони стурбовані зростанням могутності династії [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetDynasty.GetName] і хочуть, щоб ми підтвердили ці стосунки, що коштуватиме нам частини престижу та авторитету, які ми роками будували."
  flavor_tur.35.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] необхідно задобрити."
  flavor_tur.35.b: "Настав час відмовити."
  flavor_tur.35.historical_info: "Рання османська експансія значною мірою спиралася на племена прикордонних воїнів, званих Ġuzāt. Лідери Ġuzāt вважали себе більш-менш рівними османським правителям, стосунки, які історики називають #italic primus inter pares#!, і обурювалися будь-якими спробами зосередити більше влади в османських руках."
  flavor_tur.36.title: "Місто Адріана"
  flavor_tur.36.desc: "Завоювавши давній [target_location.GetRank.GetName] [ShowLocationName('edirne')], ми тепер повинні розглянути можливість зробити його столицею нашого [ROOT.GetCountry.GetFlavorRank] та нашим постійним плацдармом у [ShowContinentName('europe')]. З [ShowLocationNameWithNoTooltip('edirne')] наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] можуть здійснювати набіги на нові землі в [ShowAreaName('thrace_area')], і, коли прийде час, ми навіть зможемо націлитися на найбільшу здобич – [ShowLocationName('constantinople')]. Проте населення нашої нинішньої столиці [ShowLocationName('bursa')] буде засмучене."
  flavor_tur.36.a: "Це наше найбільше завоювання!"
  flavor_tur.36.b: "[ShowLocationNameWithNoTooltip('bursa')] достатньо добре."
  flavor_tur.36.historical_info: "Османи завоювали Адріанополь у Східної Римської імперії в 1362 році. Перенісши туди столицю, Мурад I дав світові зрозуміти, що він налаштований на подальші завоювання в Європі."
  all_pops_lose_10_satisfaction_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у цьому [Concept('location', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  core_and_prosperity_tt: "Кожне [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у цій [Concept('province', 'CONCEPT_PLACEHOLDER')|e] змінить свій рівень інтеграції на [Concept('core', 'CONCEPT_PLACEHOLDER')|e] та отримає [ShowNamedValue('prosperity_weak_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.37.title: "Легенда про Огуза $rank_empire_horde_ruler_suffix_male$"
  flavor_tur.37.desc: "[target_artist.GetName], член групи амбітних вчених та письменників, виступив із пропозицією, щоб ми спонсорували [target_artist.GetHerHim] у складанні генеалогії нашої династії – звісно, з деякими прикрасами. Найбільш помітно, [target_artist.GetSheHe] хотів би стверджувати, що ми походимо від легендарного Огуза $rank_empire_horde_ruler_suffix_male$, великого героя стародавнього світу, що дало б нам найкращий родовід серед усіх [ShowCultureName('turkish_culture')] династій."
  flavor_tur.37.a: "Не шкодуйте витрат!"
  flavor_tur.37.b: "Навіть дитина в це не повірить..."
  flavor_tur.37.historical_info: "Огуз $rank_empire_horde_ruler_suffix_male$ був міфічним прабатьком у тюркських легендах, який фігурує в багатьох середньовічних династичних хроніках. Заявляючи про своє походження від нього, османи могли позиціонувати себе як вищих за інших тюркських правителів. Однак не всі були переконані в цьому, і в своїх обмінах образами з Баязидом I, Тимур принижував османський рід."
  flavor_tur.38.title: "Перший з [ShowDynastyNameWithNoTooltip('candarli_dynasty')]"
  flavor_tur.38.desc: "Маючи коріння в культурах степів, ми завжди пишалися тим, що цінуємо заслуги більше, ніж кров. [advisor_character.GetName], перспективний суддя з [ShowLocationName('bursa')], виявив неабиякі здібності як у державному управлінні, так і в стратегії. Ми могли б отримати вигоду, підвищивши [advisor_character.GetHerHim] до посади радника нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Але оскільки [advisor_character.GetSheHe] походить з військових, це може викликати деякі тертя з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], які давно наполягають на тому, що радники такого високого рангу повинні походити з лав вчених мужів."
  flavor_tur.38.a: "Нам потрібна нова кров і нові думки при [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_tur.38.b: "Покладімося на більш традиційних радників"
  flavor_tur.38.historical_info: "Родина кочового туркменського походження, Чандарли, здобула популярність як судді та візири ранньої Османської держави. П'ять османських великих візирів походили з Чандарли. Але Халіл-паша Молодший, четвертий візир Чандарли, втратив прихильність Мурада II і був страчений. Статус родини так і не відновився після цього удару."
  flavor_tur.39.title: "Велика мечеть [target_location.GetNameWithNoTooltip]"
  flavor_tur.39.desc: "З часу нашого завоювання [ShowLocationName('bursa')], [target_location.GetRank.GetName] процвітає і бачить багато нових будівельних проектів. Але місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] тепер наполягають на тому, щоб ми взялися за більш складне завдання — будівництво великої мечеті. Це було б свідченням сили династії [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetDynasty.GetName] і пам'ятником духовній славі [ShowReligionGroupName('muslim')]."
  flavor_tur.39.a: "Гідний проект для нашої спадщини!"
  flavor_tur.39.b: "Ні, нам потрібні гроші на війну."
  flavor_tur.39.historical_info: "Довгий час, навіть після перенесення столиці до Адріанополя (Едірне), Бурса вважалася церемоніальним серцем Османської держави. Баязид I керував будівництвом двох великих мечетних комплексів, Баязид Кюллієсі та Улу Джамі, перш ніж його правління було перервано вторгненнями Тимура."
  flavor_tur.40.title: "Відновлення [target_location.GetNameWithNoTooltip]"
  flavor_tur.40.desc: "[target_location.GetRank.GetName] [target_location.GetName], колись місце великого римського [ShowLocationRankName('city')] Нікеї, занепадає з того часу, як ми його захопили, і, можливо, задовго до того. Місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] хочуть, щоб ми спонсорували відновлення зруйнованого та занедбаного [target_location.GetRank.GetNameWithNoTooltip], щоб залучити нових поселенців та нагадати нам, що [target_location.GetNameWithNoTooltip] має велику цінність та перспективи для розширення..."
  flavor_tur.40.a: "Це занадто дорого — нехай руйнується."
  flavor_tur.40.b: "Слава давнини буде відновлена!"
  flavor_tur.40.historical_info: "Колись велике місто Нікея, Ізнік був дуже занедбаний в османські часи. Марокканський мандрівник Ібн Баттута, який відвідав його в 1331 році, стверджує, що це були переважно руїни, а англійський мандрівник 18 століття описав його як жалюгідне село з довгими провулками та глиняними стінами..."
  flavor_tur.43.title: "Падіння [GetCountry('AHI').GetNameWithNoTooltip]"
  flavor_tur.43.desc: "[GetCountry('AHI').GetName], держава, керована духовною [GetCountry('AHI').GetAdjectiveWithNoTooltip] Братією, давно мала зв'язки з династією [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Шейх Едебалі, тесть [GetCharacter('tur_osman').GetName], був лідером [GetCountry('AHI').GetNameWithNoTooltip]. Впливові члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у нашому [ROOT.GetCountry.GetFlavorRank] досі високо цінують [GetCountry('AHI').GetAdjectiveWithNoTooltip] містиків і наполягають, що ми повинні мати їх як союзників, а не підданих. Проте інші стверджують, що давно настав час включити братію до нашого домену — чому вони, звичайно, можуть чинити жорстокий опір..."
  flavor_tur.43.a: "Ми повинні атакувати."
  flavor_tur.43.b: "Запропонуймо союз."
  flavor_tur.43.c: "Поки що співіснуватимемо."
  flavor_tur.43.historical_info: "Республіка Ахі здобула незалежність від монголів близько 1290 року. Це був своєрідний анатолійський бейлік, керований не воєначальником, а релігійним братством суфіїв, у спосіб, не зовсім відмінний від купецьких республік Європи. Республіка занепала після падіння Анкари в 1354 році, але братства, подібні до Ахі, мали довготривалий вплив на османську культуру."
  ahi_vassalage_tooltip: "[Concept('target_country.GetNameWithNoTooltip] буде більш схильний прийняти підкорення через спеціальну [event', 'CONCEPT_PLACEHOLDER')|e] під час [ShowSituationName('rise_of_the_ottomans')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e], доки ми залишаємося найсильнішим претендентом.\n\nЯкщо ми підкоримо їх таким чином, ми також запустимо #italic $flavor_tur.44.title$#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  explain_flavor_tur.43_tt: "Через наш вибір у #italic $flavor_tur.43.title$#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e] вони більш схильні прийняти\n\nЯкщо вони стануть нашим [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] зараз, ми також запустимо #italic $flavor_tur.44.title$#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.44.title: "[GetCountry('AHI').GetAdjectiveWithNoTooltip] Братія"
  flavor_tur.44.desc: "Після об'єднання [GetCountry('AHI').GetAdjective] земель з нашим [ROOT.GetCountry.GetFlavorRank], багато їхніх вправних ремісників та торговців прагнуть приєднатися до лав [ROOT.GetCountry.GetAdjective] бюрократії. Ці люди відомі своїми інтенсивними традиційними практиками і, здається, готові пробачити будь-які образи, які ми їм завдали, реальні чи уявні, щоб працювати на благо [ShowReligionGroupName('muslim')]."
  flavor_tur.44.a: "У нас є кілька відкритих вакансій..."
  flavor_tur.44.b: "Краще відправимо їх організовувати прикордоння."
  flavor_tur.44.historical_info: "Братство Ахі було частиною Акхія, групи суфійських гільдій, що мали значний вплив у пост-Сельджуцькій Анатолії. Після того, як османи завоювали їхню республіку, що базувалася в Ангорі (Анкарі), деякі Ахі стали бюрократами в Османській державі."
  flavor_tur.46.title: "Базилік"
  flavor_tur.46.desc: "Великий бомбард [cannon_maker.GetNameWithNoTooltip] добре послужив нам у взятті [target_location.GetNameWithNoTooltip], зламавши могутні Феодосієві стіни. Але він був схильний до перегріву і тепер розпався в колосальному вибуху,"
  flavor_tur.46.ending_orban.desc: "вбивши свого творця під час вибуху."
  flavor_tur.46.orbanless.desc: "з багатьма членами його екіпажу, загиблими під час вибуху."
  flavor_tur.46.ending: "Питання тепер полягає в тому – чи варто нам будувати ще одну гармату подібного масштабу? Чи краще задовольнитися тим, що вона виконала своє призначення і справді рознесла стіни Вавилона?"
  flavor_tur.46.a: "Чи може гармата бути занадто величезною?"
  flavor_tur.46.b: "Краще переплавити її на брухт..."
  flavor_tur.46.historical_info: "Реальний Базилік був жахливо потужним, але мав серйозні проблеми з перегрівом, прослуживши лише шість тижнів після побудови. Проте за цей час він зумів пробити могутні Феодосієві стіни Константинополя, поклавши край Римській імперії після 1500 років. Незважаючи ні на витрати, ні на вибухові випадки, османи незабаром побудували ще одну гармату подібного масштабу, Дарданельську гармату, яка стріляла по британському флоту ще в 1807 році."
  melted_great_bombard: "Брухт з Великого Бомбарда"
  flavor_tur.47.title: "Лорд Прикордоння"
  flavor_tur.47.desc: "[target_character.GetName] здійснив(ла) відважні вчинки на прикордонні та виявив(ла) великий талант до командування. Ми повинні піднести [target_character.GetHerHim] до нової посади Лорда Прикордоння та тримати [target_character.GetHerHim] близько.\n\nОднак, надання собі такої влади призначення, безсумнівно, розлютить значні частини [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які розглядатимуть це як ще одну ознаку того, що наша династія намагається підірвати їхню владу."
  flavor_tur.47.a: "Наш курс визначено!"
  flavor_tur.47.b: "Натомість ми підемо на поступки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_tur.47.c: "Ми почекаємо і побачимо..."
  flavor_tur.47.historical_info: "Надавши собі владу призначати Лордів Прикордоння (uc begleri), Мурад I зробив ще один крок від того, щоб його розглядали лише як першого серед рівних серед Ґузатської знаті прикордоння."
  flavor_tur.48.title: "Барабани війни"
  flavor_tur.48.desc: "Мехтерські оркестри, що виникли з наметників та музикантів, здавна відігравали важливу роль у нашій культурі, і справді, перший такий оркестр був подарований [GetCharacter('tur_osman').GetName] Кайкубадом III, великим султаном Руму. У воєнний час вони виконують свою музику біля намету [ROOT.GetCountry.GetGovernment.GetRulerTitle], і всі стоять на честь Кайкубада.\n\nАле чому ми повинні продовжувати стояти за султана, який помер так давно? Ми теж тепер стали великими. Час може бути сприятливим, щоб сісти, хоча традиціоналістський [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] може бути незадоволений."
  flavor_tur.48.a: "Їм доведеться з цим жити."
  flavor_tur.48.b: "Ні, ми продовжимо стояти."
  flavor_tur.48.historical_info: "Відмовляючись стояти, коли грали мехтерські оркестри, османські правителі зробили ще один крок від свого степового походження і позиціонували себе як правителів над усіма іншими."
  flavor_tur.49.title: "П'ята частина здобичі"
  flavor_tur.49.desc: "Згідно зі Священним $common_string_quran$, одна п'ята частина військової здобичі належить [ROOT.GetCountry.GetReligion.GetGodName], пророку, мандрівникам та нужденним. Так само, за [ShowCultureName('turkish_culture')] звичаєм, одна п'ята частина здобичі йде вождю, і таким чином ми отримали прибуток від багатьох недавніх війн. Раби, однак, довго були звільнені від цього, але з напливом [ShowReligionGroupAdjective('christian')] рабів з наших недавніх завоювань, настав час вимагати частку і з них. Хоча прикордонні лорди, безсумнівно, будуть обурюватися цим, серед цих рабів будуть сильні молоді чоловіки, яких ми могли б використати для створення власної домашньої армії, щоб зменшити нашу залежність від прикордонних лордів..."
  flavor_tur.49.a: "Ми маємо на це право."
  flavor_tur.49.b: "Нехай вони залишать своїх рабів"
  flavor_tur.49.historical_info: "За традицією, лідер мав право на одну п'яту частину військової здобичі. Мурад I інтерпретував це так, щоб включити рабів, і таким чином народився податок пенчик. Деякі раби, отримані таким чином, стали частиною капікулу, османських домашніх підрозділів – найвидатнішим з яких був знаменитий корпус яничарів."
  flavor_tur.50.title: "[ROOT.GetCountry.GetGovernment.GetHeirTitle] та Хуруфія"
  flavor_tur.50.desc: "Хуруфія, що раніше утвердилася в нашому [ROOT.GetCountry.GetFlavorRank], можливо, не спричинила стільки клопоту, але наше консервативне [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] ненавидить їх — і що гірше, здається, деякі хуруфії стали наставниками для [heretic_heir.GetShortName], нашого [ROOT.GetCountry.GetGovernment.GetHeirTitle]. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], жахнувшись ідеї переходу [heretic_heir.GetHerHim] до [ShowReligionName('shia')], хочуть вирішити проблему, спаливши хуруфіїв та їхніх основних прихильників живцем."
  flavor_tur.50.a: "Спалити їх усіх, а Бог розбереться!"
  flavor_tur.50.b: "Нехай [heretic_heir.GetNameWithNoTooltip] знайде [heretic_heir.GetHerHis] власний шлях до [ROOT.GetCountry.GetReligion.GetGodName]."
  flavor_tur.50.historical_info: "Група хуруфіїв, пізнішими хроністами названа «Певними проклятими, що не мають значення», надзвичайно наблизилася до молодого Мехмеда II. Це стривожило його візира Махмуда-пашу Ангеловича, який перешкодив хуруфіям в Едірне, спаливши кількох з них на вогнищі."
  flavor_tur.51.title: "Питання звичаїв"
  flavor_tur.51.desc: "Завойовуючи нові порти, ми повинні замислитися над чимось незвичним для наших кочових коренів — морем. Таке місце, як [port_location.GetName], могло б отримати вигоду від ефективних податкових фермерів та більш суворого збору митних зборів, а найкращими кандидатами для цього завдання були б люди з [GetCountry('GEN').GetName]. Залучення цих іноземців зміцнило б уявлення про те, що наш [ROOT.GetCountry.GetFlavorRank] гостинний до всіх, але засмутило б [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], з лав яких найчастіше походили попередні збирачі податків."
  flavor_tur.51.a: "Нам потрібні всі експерти, яких ми можемо отримати!"
  flavor_tur.51.b: "Ні, ми не можемо довіряти [GetCountry('GEN').GetAdjectiveWithNoTooltip] купцям."
  flavor_tur.51.historical_info: "Рання Османська держава, схоже, отримала економічну та адміністративну вигоду від своїх позитивних відносин з генуезцями. За правління Мурада I латинські (ймовірно, генуезькі) податкові фермери часто служили митниками в османських портах."
  flavor_tur.52.title: "Анатолійська заборона на [ShowGoodsNameWithNoTooltip('wheat')]"
  flavor_tur.52.desc: "Багато західних купців розбагатіли завдяки нашому експорту [ShowGoodsName('wheat')] з полів [ShowRegionName('anatolia_region')]. Можливо, настав час покласти цьому край і забезпечити постачання для нашого власного народу — і армії! Введення заборони на експорт [ShowGoodsNameWithNoTooltip('wheat')] може зміцнити наше економічне становище та дати важелі впливу в майбутніх угодах з іноземними купцями."
  flavor_tur.52.a: "Жодного бушеля не покине наших портів."
  flavor_tur.52.b: "Ми не повинні втручатися у справи купців."
  flavor_tur.52.historical_info: "Заборона Баязида I на експорт зерна була, на той час, рідкісним втручанням в інтереси купців. Його мотиви дещо невизначені – можливо, він хотів підірвати своїх європейських ворогів або очікував поступок від могутніх купецьких республік Генуї та Венеції."
  flavor_tur.53.title: "Вовки [ShowProvinceDefinitionNameWithNoTooltip('aegean_sea_province')]"
  flavor_tur.53.desc: "Відколи наш [ROOT.GetCountry.GetFlavorRank] вперше здобув прибережні землі, підприємливі [ShowCultureName('turkish_culture')] нальотчики залишили своїх коней і вийшли в море, грабуючи поселення та судна в [ShowProvinceDefinitionName('aegean_sea_province')], [ShowAreaName('aegean_sea_area')] та [ShowAreaName('black_sea_area')], привозячи рабів та здобич. Але ми могли б організувати це в щось більше, на нашу користь і на погибель нашим морським суперникам — ми могли б спонсорувати цих піратів, звичайно, таємно."
  flavor_tur.53.a: "Усі нас боятимуться!"
  flavor_tur.53.b: "Ми повинні зосередитися на будівництві належного флоту."
  flavor_tur.53.c: "Ми не повинні шкодити нашим торговельним відносинам."
  flavor_tur.53.historical_info: "Піратство, спонсороване Османською імперією, було поширеним у XIV та XV століттях, і Генуя та Венеція регулярно відправляли галери навколо Егейського моря, щоб збирати інформацію про рух турецьких кораблів. Туркам потрібен був сильний флот, щоб з'єднати своє царство, розділене Босфорською протокою, але перш ніж вони могли цього досягти, піратство надавало їм асиметричний спосіб підірвати своїх суперників на морі."
  flavor_tur.54.title: "Потяг до піратства"
  flavor_tur.54.desc: "Змагаючись зі старими морськими державами, такими як [GetCountry('BYZ').GetNameWithNoTooltip] та [GetCountry('VEN').GetNameWithNoTooltip], ми сильно поступаємося в Егейському морі – принаймні наразі.\n\nАле оскільки багато [ShowCultureName('turkish_culture')] чоловіків вийшли в море, щоб займатися піратством під нашим прапором, ми могли б використати деяких із цих рейдерів для зміцнення нашого власного флоту."
  flavor_tur.54.a: "Вони нам потрібні!"
  flavor_tur.54.b: "Їхні грабунки служать нам краще."
  flavor_tur.54.c: "Ми не можемо довіряти таким некерованим людям."
  flavor_tur.54.historical_info: "У ранній османський період багато турків вийшли в море, здійснюючи набіги на грецькі поселення на островах поблизу Анатолійського материка. Оскільки піратство розширювалося, воно, схоже, було справді прибутковим – свідчення одного очевидця стверджують, що багато чоловіків, які були б вкрай потрібні в битві проти Тимура, вже були зайняті, готуючись до морських експедицій."
  flavor_tur.55.title: "Фортеця [target_location.GetNameWithNoTooltip]"
  flavor_tur.55.desc: "Відколи ми завоювали [target_location.GetName], стає все більш очевидним, що це важливий плацдарм для нас у Європі, оскільки протока там вужча і легша для перетину. Хоча на півострові є кілька старих невеликих фортець, ми повинні побудувати більшу і міцнішу, щоб запобігти будь-яким атакам з моря."
  flavor_tur.55.a: "Її треба побудувати!"
  flavor_tur.55.b: "Це занадто дорого."
  flavor_tur.55.historical_info: "Османи отримали фортецю Цимпе в Галліполі від Іоанна Кантакузена, щоб допомогти йому у війні з іншим претендентом на візантійський престол, і звідти вони пізніше захопили набагато більшу фортецю Галліполі. Це місце стало важливим як їхній плацдарм до Європи, і Баязид I наказав побудувати могутню прибережну фортецю для захисту гавані."
  tur_treathens_the_bosphorus: "Загрожує Босфору"
  flavor_tur.56.title: "Прибуття Ḥurūfiyyah"
  flavor_tur.56.desc: "Ḥurūfiyyah – це зростаючий рух [ShowReligionName('shia')] містиків, що базується в Ірані. Однак нещодавно вони зіткнулися там з деякою опозицією, і тепер строкатий гурт вчених-хуруфітів шукає притулку в нашому царстві. Вони цікавляться літерами та нумерологією і можуть бути нешкідливими. Їхній лідер [hurufiyya_character.GetName] стверджує, що вони працюватимуть на благо нашої держави. Проте деякі люди в [capital_location.GetName] вже присягнули їхньому віровченню..."
  flavor_tur.56.a: "Ми приймемо їх – наразі."
  flavor_tur.56.b: "Ми зустрінемо їх з розпростертими обіймами!"
  flavor_tur.56.c: "Відішліть цих єретиків туди, звідки вони прийшли."
  flavor_tur.56.historical_info: "Ḥurūfiyyah був езотеричним суфійським рухом, що виник в Ірані в 1370-х роках і швидко здобув певний вплив. Не зумівши навернути Тимура в Самарканді, лідер хуруфітів Фазлаллах Астарабаді був страчений, що змусило кількох його послідовників втекти до Анатолії, Сирії та Єгипту."
  flavor_tur.56.b.tt: "Усі [ShowReligionName('shia')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.56.c.tt: "Усі [ShowReligionName('shia')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.57.title: "Володар дервішів"
  flavor_tur.57.desc: "[sufi_character.GetName], лідер зростаючого суфійського ордену під назвою #italic Bayramiye#!, що базується в [target_location.GetName], був доставлений до нашого двору для суду. Деякі впливові члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] стверджують, що [sufi_character.GetHerHis] вчення про світ і майбутнє є богохульним. Проте нам [sufi_character.GetHerHis] слова здаються мудрими..."
  flavor_tur.57.a: "Ми можемо навчитися у [sufi_character.GetHerHim]!"
  flavor_tur.57.b: "Ми повинні задобрити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_tur.57.c: "Просто відішлемо [sufi_character.GetHerHim] додому."
  flavor_tur.57.historical_info: "Хаджі Байрам Велі був впливовим суфійським містиком, чиї вчення проіснували кілька століть. Місцева влада ставила під сумнів доктрину та патріотизм його ордену, стурбована його швидким зростанням, і відправила його до Мурада II. Але султан знайшов Хаджі Байрама дуже надихаючим і дозволив йому читати лекції та проповідувати при дворі."
  flavor_tur.58.title: "Кривавий острів"
  flavor_tur.58.desc: "Надходять повідомлення від збентежених рибалок, які розповідають нам, що [nemesis.GetName] повісили сотні своїх [ROOT.GetCountry.GetAdjective] військовополонених на острові в Егейському морі. Лише деякі [ShowReligionGroupAdjective('christian')] полонені, яких вважали примусово завербованими на нашу службу, були помилувані. Один свідок описав це як моторошне видовище трупів, що висіли на шибеницях, наче грона винограду на лозах."
  flavor_tur.58.a: "І все ж більше чоловіків приєднаються до нашої справи!"
  flavor_tur.58.b: "Ми присягнемося помститися!"
  flavor_tur.58.historical_info: "Після своєї великої перемоги над османським флотом у 1416 році венеційці відтягли своїх полонених на острів Тенедос, де їх усіх жорстоко вбили, за винятком тих християн, яких примусили до служби. Проте венеційці з небезпекою для себе дізналися, що лише морська перевага не може гарантувати вічного панування в Егейському морі."
  flavor_tur.59.title: "Бойові безумці"
  flavor_tur.59.desc: "Видатні лідери серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] скаржилися на поведінку іррегулярів башибузуків, яких ми використовували для комплектування прикордонних гарнізонів. Башибузуки, як вони стверджують, схильні до грабунків і переслідувань не лише ворожих земель, а й нашого власного сільського населення на кордоні. А тепер стався інцидент у [atrocity_location.GetName], де башибузуки нібито вчинили жахливий акт насильства проти корчмаря та його родини. Розлючені цим, лідери [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] вимагають, щоб ми дисциплінували башибузуцькі полки в цілому."
  flavor_tur.59.a: "На жаль, ці люди — необхідне зло."
  flavor_tur.59.b: "Так, ми повинні спробувати їх приборкати."
  flavor_tur.59.historical_info: "Башибузуки набиралися з меншин, головним чином албанців і черкесів, і не отримували платні — натомість їх мотивувала перспектива грабунку. Це означало, що вони були дуже доступними для Османської держави, але незабаром вони стали сумно відомими своїми нападами на цивільних. Слово «башибузук» з часом стало синонімом «бандита» в багатьох мовах."
  flavor_tur.60.title: "Внутрішня служба"
  flavor_tur.60.desc: "Вправні євнухи-раби давно відігравали обмежену роль у нашому уряді, але в цих кастрованих чоловіках, без амбіцій щодо сім'ї та світської влади, є великий потенціал. Так само, як і в кількох талановитих молодих рабів-хлопчиків при дворі. Ми могли б тісніше пов'язати таких здібних придворних з династією [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], надавши їм офіційні ролі в нашому домі, за рахунок старих підлабузників [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які раніше змагалися за такі посади."
  flavor_tur.60.a: "Судова реформа давно назріла."
  flavor_tur.60.b: "Ні, ми повинні продовжувати покладатися на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_tur.60.historical_info: "#italic Ендерун#!, від перського слова #italic всередині#!, позначав придворних, найближчих до османського султана. Їх протиставляли #italic Біруну#!, зовнішній службі, яка була бюрократією імперії. Ряди Ендеруну головним чином складалися з євнухів та молодих християнських рабів, чиї завдання зосереджувалися на догляді та вихованні імператорської родини, але з часом деякі з них набули великої політичної влади."
  flavor_tur.61.title: "Переваги тиші"
  flavor_tur.61.desc: "Кілька глухонімих юнаків та дівчат нещодавно були привезені на невільничий ринок у [capital_location.GetName] та відправлені до двору як подарунок. Внутрішня служба тепер пропонує прийняти цих глухонімих та навчити їх служити поруч з нами, як посланців та шпигунів — і, можливо, також вбивць, якщо нам це знадобиться. Зрештою, ті, хто не може говорити, не розкриють наших таємниць..."
  flavor_tur.61.a: "Це незвично, але чому б і ні?"
  flavor_tur.61.b: "Наш двір і так досить дивний..."
  flavor_tur.61.historical_info: "Внутрішня служба мала багато незвичайних персонажів і відзначалася використанням Дільсіз, глухонімих. Вважалося, що їм можна довіряти таємниці та особливо делікатні місії, і відповідно, вони часто виконували роль охоронців, слуг, посланців — а іноді й катів. Хоча німі, багато з них були грамотними і використовували власну мову жестів."
  flavor_tur.62.title: "Прихована мова"
  flavor_tur.62.desc: "Глухонімі при дворі об'єднали свої кмітливі уми і розробили нову мову жестів, яка дозволяє їм дуже добре і безшумно спілкуватися один з одним. Тепер вони пропонують, щоб [target_ruler.GetName] також практикував цю мову, оскільки це дозволило б дуже таємний та інтимний обмін інформацією, коли [target_ruler.GetHerHis] високість забажає."
  flavor_tur.62.a: "Нехай [target_ruler.GetHerHim] почне практикуватися."
  flavor_tur.62.b: "Краще зосередитися на військових справах."
  flavor_tur.62.tt: "Це дасть переваги за кілька місяців."
  flavor_tur.62.historical_info: "Деталі османської мови жестів, також відомої як гаремна мова жестів, втрачені для нас, але, схоже, вона була складною та популярною при дворі, де тиша часто була цінною якістю. Осман II опанував мову жестів і заохочував багатьох своїх придворних, що чули, робити те саме."
  flavor_tur.63.title: "Цезар Риму"
  flavor_tur.63.desc: "Освячений славою стародавнього світу, [ShowLocationName('constantinople')] тепер наш, і [GetCountry('BYZ').GetName] більше немає. Тепер ми можемо по правді претендувати на титул #italic qayṣar-i Rūm#!, Цезаря Риму, хоча всі фальшиві претенденти на цей титул можуть обурюватися цим. Мало що могли передбачити стародавні римляни, що одного дня їхня спадщина буде успадкована народом, який прийшов із земель їхніх стародавніх ворогів — Ірану."
  flavor_tur.63.a: "Це буде наша спадщина!"
  flavor_tur.63.b: "Одного разу відсвяткувати тріумф буде достатньо."
  flavor_tur.63.historical_info: "Мехмед II претендував на титул Цезаря після завоювання Константинополя. Хоча ця претензія була рішуче відкинута більшістю західного християнства, вона була визнана Православною Церквою. Цей славетний титул мав велику символічну вагу для османів на початку, але втратив значення після завоювання Єгипту, оскільки вони все більше зосереджувалися на тому, щоб бути сприйнятими мусульманським світом як халіфи."
  not_the_real_rome: "Не справжній Рим"
  flavor_tur.64.title: "Обрізка родовідного дерева"
  flavor_tur.64.desc: "Оскільки легітимність [ROOT.GetCountry.GetGovernment.GetRuler.GetName] оскаржується в деяких колах, у внутрішній службі ширяться чутки, що безпека всієї держави під загрозою. Євнухи гострять свої кинджали і пропонують дозволити їм непомітно покласти край амбіціям [ambitious_brother.GetName], одного з головних потенційних претендентів на трон."
  flavor_tur.64.a: "Це для блага королівства!"
  flavor_tur.64.b: "Ми не можемо цього зробити..."
  flavor_tur.64.historical_info: "Як і багато мусульманських династій до них, османи боролися з проблемами престолонаслідування через полігамію та розпливчасті закони про спадкування, і громадянські війни між братами були звичним явищем. Хоча це зрештою було вирішено #italic Kafes#!, примусовим ув'язненням потенційних наступників султана, у ранній період братовбивство було варіантом, охоче застосованим Мехмедом III, коли він убив своїх 19 братів."
  flavor_tur.65.title: "Династія [nasrid_ruler.GetDynasty.GetNameWithNoTooltip] просить про допомогу"
  flavor_tur.65.desc: "[nasrid_ruler.GetName] з [GetCountry('GRA').GetName] перебуває під атакою могутнього [GetCountry('CAS').GetName] і тепер просить нас про допомогу. [nasrid_ruler.GetDynasty.GetName] правлять останніми залишками славетної [ShowReligionGroupAdjective('muslim')] цивілізації Аль-Андалус, де колись процвітали великі мислителі багатьох віросповідань. Чи все це, запитують вони нас у своєму листі, було марно?"
  flavor_tur.65.a: "На жаль, ми не можемо допомогти."
  flavor_tur.65.tt: "Надішліть найкращі побажання [GetCountry('GRA').GetNameWithNoTooltip]"
  flavor_tur.65.b: "[GetCountry('CAS').GetNameWithNoTooltip] пошкодує про цей день!"
  flavor_tur.65.historical_info: "Насрідські правителі Гранади відправили послів як до османів, так і до $mamluks$, щоб шукати допомоги проти Кастилії. Однак османи та $mamluks$ незабаром втягнулися у війну один проти одного і не змогли надати значної прямої допомоги. Турки відправили флот під командуванням Кемаля Рейса, який здійснив набіги на кастильські володіння в Західному Середземномор'ї, і цей флот пізніше допоміг переправити багатьох біженців через море."
  flavor_tur.66.title: "Порушення вакфу"
  flavor_tur.66.desc: "Реформа, яку ми запровадили для перенаправлення доходів від благодійних фондів вакфу з метою отримання більших коштів для тимаріотської системи, виявилася дуже непопулярною. Видатні [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] проповідують, що ми зганьбили як державу, так і династію, і чутки настільки поширилися, що навіть [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] засмучені. Можливо, нам доведеться скасувати реформу, перш ніж ця ситуація стане справді проблематичною для [ROOT.GetCountry.GetGovernment.GetRuler.GetName]."
  flavor_tur.66.historical_info: "Спроба Мехмеда II зміцнити систему тимарів та зменшити владу улемів через фонди вакфу була сприйнята як незаконна згідно з ісламським правом. Це викликало широке обурення і була швидко скасована його сином Баязидом після смерті Мехмеда у 1481 році."
  flavor_tur.66.a: "Ми повинні негайно скасувати це!"
  flavor_tur.66.b: "Кілька хабарів потрібним людям повинні вирішити це..."
  flavor_tur.66.c: "Проте ми будемо дотримуватися нашого курсу."
  flavor_tur.67.title: "Перший серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  flavor_tur.67.desc: "[target_character.GetName] є вельми шанованим релігійним вченим, якого вже призначено кадієм війська. Але ми могли б піднести [target_character.GetHerHim] ще вище, відродивши та адаптувавши старий титул з давніх-давен — $common_string_shaikh_al_islam$. Його раніше надавали містикам великої слави, але надавши його [target_character.GetShortNameWithNoTooltip], ми б сповістили про новий день ісламської організації, коли такий високопоставлений [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] тісно співпрацюватиме з державою для нагляду за справами віри. Однак багато інших членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] розцінили б це як виклик їхній автономії..."
  flavor_tur.67.historical_info: "Перевизначення шанованого титулу $common_string_shaikh_al_islam$ відбувалося поступово, коли богослови та юристи $sharia$, такі як Шамс ад-Дін аль-Фанарі, спочатку призначалися кадіями війська, перш ніж титул еволюціонував і став асоціюватися з посадою великого муфтія. Османи, звісно, мали пряму зацікавленість у прив'язуванні релігійних вчених до себе таким чином."
  flavor_tur.67.a: "[target_character.GetShortNameWithNoTooltip] ідеально підходить для цієї посади!"
  flavor_tur.67.b: "Такі призначення залежать від Бога, а не від нас."
  flavor_tur.68.title: "Суперечливе призначення"
  flavor_tur.68.desc: "[target_character.GetName] є суфійським містиком, улюбленим значними верствами [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], і, треба сказати, блискучим [target_character.GetWomanMan]. Призначення [target_character.GetHerHim] $common_string_shaikh_al_islam$ було б добрим наступним кроком у формалізації ієрархії серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та прив'язуванні рішень у справах фетви ближче до [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] — але консервативні богослови жахаються, що ми взагалі розглядаємо суфія на цю посаду."
  flavor_tur.68.historical_info: "Призначення $common_string_shaikh_al_islam$ іноді були суперечливими, особливо коли вони стосувалися членів суфійських орденів. Мурад IV призначив Зекеріязадзе Ях'я Ефенді, який був дуже здібною людиною, але згодом заплутався у складних придворних інтригах, коли натовп тисяч людей рушив до палацу, вимагаючи його страти. Однак зрештою він прожив довге життя."
  flavor_tur.68.a: "Проте, [target_character.GetSheHe] є найкращим кандидатом."
  flavor_tur.68.b: "Гаразд, ми знайдемо когось іншого..."
  flavor_tur.69.title: "$common_string_shaikh_al_islam$"
  flavor_tur.69.desc: "Здається, настав час нам раз і назавжди зробити $common_string_shaikh_al_islam$ офіційною державною посадою, з верховною владою над рішеннями фетви, призначеннями муфтіїв та іншими справами віри. Хоча це зрештою зміцнило б [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], водночас це забезпечило б узгодження їхніх інтересів з інтересами держави."
  flavor_tur.69.historical_info: "Османи прагнули створити більш формальну ієрархію улемів. Таким чином вони відновили титул $common_string_shaikh_al_islam$, що походив зі Східного Ірану, щоб він став найвищою релігійною владою в державі — хоча, можливо, поруч із самим султаном. Це були взаємні стосунки; $common_string_shaikh_al_islam$ призначався султаном, лише щоб підтвердити наступного султана після смерті попереднього."
  flavor_tur.69.a: "Закріпити це в законі!"
  flavor_tur.69.b: "Нам слід більше покладатися на всіх [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_tur.69.c: "Нам слід повністю відмежуватися від справ [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_tur.70.title: "[kemal_reis.GetNameWithNoTooltip]"
  flavor_tur.70.desc: "[kemal_reis.GetName], досі незначний командувач флоту [naval_base.GetName], має за плечима багато успішних боїв, хоча деякі з них були каперськими місіями, про які нам не слід відкрито говорити. Наші радники тепер радять, щоб [kemal_reis.GetSheHe] отримав підвищення до адмірала — і щоб ми побудували [kemal_reis.GetHerHim] відповідний флагман."
  flavor_tur.70.historical_info: "Ахмед Кемаледдін, відомий нащадкам як Кемаль Рейс, був капером, а пізніше адміралом, який брав участь у багатьох важливих османських битвах. Він розпочав свою кар'єру з морської місії під час падіння Гранади, а пізніше воював в османсько-венеціанських війнах, серед інших. Він також був дядьком відомого картографа Пірі Рейса, який супроводжував його в кількох морських місіях."
  flavor_tur.70.a: "Підвищити [kemal_reis.GetHerHim]!"
  flavor_tur.70.b: "У нас вже достатньо адміралів."
  heavy_ship_construction: "Будівництво важких кораблів"
  flavor_tur.71.title: "Смерть [kemal_reis.GetNameWithNoTooltip]"
  flavor_tur.71.desc: "Жахливі новини! Перетинаючи Егейське море, корабель [kemal_reis.GetName] потрапив у жахливий шторм і перекинувся. Востаннє його бачили біля узбережжя [ShowLocationNameWithNoTooltip('naxos')], але, на жаль, схоже, ніхто не вижив."
  flavor_tur.71.historical_info: "Після блискучої кар'єри, воюючи як з іспанцями, так і з венеціанцями та лицарями Мальти, Кемаль Рейс знайшов свій кінець у штормі у Східному Середземномор'ї. Він очолював флот, що перевозив військово-морські припаси до Александрії, щоб підтримати $mamluks$ проти португальців, але більше половини флоту було втрачено під час шторму, включно з його власним кораблем."
  flavor_tur.71.a: "Ми збудуємо корабель на [kemal_reis.GetHerHis] честь."
  flavor_tur.71.b: "Ми спонсоруємо пишний похорон."
  flavor_tur.71.c: "Кого це хвилює?"
  flavor_tur.72.title: "[piri_reis.GetNameWithNoTooltip]"
  flavor_tur.72.desc: "[piri_reis.GetName], родич нашого старого флотоводця [GetCharacter('tur_kemal_reis').GetName], є колишнім капером і вправним навігатором, який міг би підійти для підвищення. Хоча [piri_reis.GetSheHe] також є картографом, з великим інтересом до нещодавніх відкриттів нових земель за Західним океаном, він стверджує, що лише бавиться цим мистецтвом, і волів би служити нам адміралом, а не дослідником."
  flavor_tur.72.historical_info: "Ахмед Мухіддін Пірі, сьогодні більш відомий як Пірі Рейс, мав довгу кар'єру османського навігатора та флотоводця, зрештою воюючи з португальцями в Перській затоці. Але він також був автором #italic Kitāb-ı Baḥrīye#!, Книги Моря, однієї з найзначніших картографічних праць того періоду."
  flavor_tur.72.a: "Тоді [piri_reis.GetSheHe] буде адміралом."
  flavor_tur.72.b: "Проте, ми потребуємо дослідника."
  flavor_tur.73.title: "Картографування світу"
  flavor_tur.73.desc: "[piri_reis.GetName] останнім часом був зайнятий, укладаючи #italic Kitāb-ı Baḥrīye#!, велику книгу карт, що використовує як нові відкриття, зроблені європейцями через Західне море, так і старі перські, індійські та китайські знання про Східні океани. Велика книга також містить нотатки про навігацію, астрономію, різні види штормів та звичаї місцевих народів."
  flavor_tur.73.historical_info: "Незважаючи на те, що Пірі Рейс ніколи сам не плавав Атлантикою, він був плідним картографом, який створив багато карт, поєднуючи нові відкриття, зроблені Португалією та Іспанією, зі старими знаннями, доступними в арабських джерелах. Фрагмент однієї з його карт, знайдений у палаці Топкапи в 1929 році, є найстарішою ісламською картою, що зображує Новий Світ."
  flavor_tur.73.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_tur.74.title: "Егейське питання"
  flavor_tur.74.desc: "Розділене між Румелією та Анатолією, наше царство більше не може терпіти присутності [evil_nemesis.GetName] на [contested_island.GetName]. Цей острів не тільки є базою, звідки вони потенційно можуть атакувати наші судна, але й виявився притулком для рабів-утікачів, змушуючи работорговців постійно скаржитися на нашу бездіяльність у вирішенні цієї проблеми. Тепер у нас мало вибору – ми #italic мусимо#! забезпечити безпеку Егейського моря."
  flavor_tur.74.historical_info: "На початку свого правління Мурад II виявив, що його міжконтинентальне царство турбують острівні володіння його суперників Венеції, Генуї та лицарів-госпітальєрів. Ці острови стали базами для корсарів та каталонських піратів, які становили постійну небезпеку для османських торговців та мандрівників. Тому він розпочав кампанію завоювань в Егейському морі."
  flavor_tur.74.a: "Ми повинні готуватися до війни!"
  flavor_tur.74.b: "Натомість ми спонсоруємо більше піратів."
  flavor_tur.74.c: "Нам набридли ці морські справи."
  flavor_tur.75.title: "Дзеркало Божої Волі"
  flavor_tur.75.desc: "[target_character.GetName] мав зловісний, повторюваний сон і попросив кількох суфійських містиків його витлумачити. Знаки зрозумілі, або так тепер вірить [target_character.GetShortNameWithNoTooltip] — [target_character.GetSheHe] мусить зректися престолу. Це Божа воля, стверджує [target_character.GetSheHe], щоб [target_heir.GetName] правив відтепер."
  flavor_tur.75.historical_info: "Подібно до персів до них, османські турки надавали величезного значення снам. Біографії релігійних вчених 15-го та 16-го століть показують, що сни часто надихали на зміни кар'єри і розглядалися як дзеркала прихованого світу, через які можна було отримати натяки на наміри Бога. Хоча зречення Мурада II мало також прагматичні причини, тут воно представляє керівництво, яке, як вважалося, надавали сни."
  flavor_tur.75.a: "Якщо на те Божа воля, нехай буде так."
  flavor_tur.75.b: "Ні, [target_character.GetSheHe] мусить залишатися на троні."
  tur_abdicate_throne_tt: "$ser_abdicate_throne_tt$"
  flavor_tur.76.title: "Краси [beautiful_city.GetNameWithNoTooltip]"
  flavor_tur.76.desc: "Письменник, уродженець [beautiful_city.GetName], склав довгу поему про це [beautiful_city.GetRank.GetName], оспівуючи його природну, історичну та архітектурну красу. Але він також описує красу місцевих юнаків, у спосіб, який дехто назвав непристойним. Така поезія стала досить поширеною, і гучні голоси серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вимагають її заборони. Суфійські містики, тим часом, стверджують, що це лише невинний вираз краси Божого творіння."
  flavor_tur.76.historical_info: "Шехренгіз, що перекладається як «міські трилери», був жанром османської поезії, що описував пишність певних міст. Одна така поема була присвячена Баязиду II, коли він відвідав Едірне. Але шехренгіз також помітно включав тужливі описи краси місцевих юнаків, елемент, який іноді інтерпретувався як частина гомоеротичних тем у турко-перській традиції."
  flavor_tur.76.a: "Вся краса має бути скарбом."
  flavor_tur.76.b: "Ми накажемо стратити автора."
  flavor_tur.76.c: "Нам потрібні суворіші закони про цензуру."
  flavor_tur.77.title: "Слова [mihri_hatun.GetWomanMan|U]"
  flavor_tur.77.desc: "[mihri_hatun.GetName], поет з [ShowLocationName('amasya')], став відомим у певних літературних колах – до одного з яких [target_heir.GetName] має опосередковане відношення. Хоча жінки при дворі стверджували б, що [target_heir.GetShortNameWithNoTooltip] міг би навчитися чогось від цього видатного [mihri_hatun.GetWomanMan], деякі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вважають це недоречним зв'язком, який слід негайно припинити."
  flavor_tur.77.historical_info: "Міхрі Хатун було прийнятим ім'ям Міхрюнніси, дочки каді, який сам також бавився поезією під псевдонімом Белаї. Міхрі була частиною культурної сцени в Амасьї, де також був активним принц Ахмед, син Баязида II. Вона писала вірші в стилях #italic qasida#! (ода) та #italic ghazal#! (романтична поезія) і стала досить шанованою за свого життя."
  flavor_tur.77.a: "Це здається нешкідливим."
  flavor_tur.77.b: "Нам потрібен [mihri_hatun.GetHerHim] талант при дворі."
  flavor_tur.77.c: "Заборонимо їхнє листування."
  flavor_tur.78.title: "Справа Нілу"
  flavor_tur.78.desc: "Тепер, контролюючи [ShowRegionName('egypt_region')], ми можемо отримати велику вигоду від цієї житниці імперій – але нам потрібно врахувати розливи Нілу. Ця стародавня земля здавна покладалася на складну систему зрошення, що перебувала в хиткій рівновазі з навколишніми пустелями. Ми повинні забезпечити державний контроль над цією системою, а також постачати багато деревини – чого [ShowRegionNameWithNoTooltip('egypt_region')] дуже бракує."
  flavor_tur.78.historical_info: "Регулювання розливів Нілу було питанням великої важливості протягом усієї історії. Після завоювання Єгипту османи зберегли більшу частину старої адміністративної системи недоторканою, але вони вважали підтримку стародавніх іригаційних систем життєво важливою для постачання зерна своїй імперії. Османські наглядачі, таким чином, активно долучилися до цього."
  flavor_tur.78.a: "Тут потрібен державний нагляд."
  egyptians_displeased_tooltip: "Усі [ShowCultureName('lower_egyptian_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('egypt_region')] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.78.b: "Нехай місцеві жителі цим займаються."
  egyptians_pleased_tooltip: "Усі [ShowCultureName('lower_egyptian_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('egypt_region')] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  wood_for_egypt: "Деревина для Єгипту"
  flavor_tur.79.title: "Арабські салони"
  flavor_tur.79.desc: "Зі збільшенням кількості носіїв [ShowLanguageName('arabic_language')] у нашому володінні, наші місцеві вчені зіткнулися з труднощами, намагаючись брати участь у салонах, що проводяться в [ShowLanguageNameWithNoTooltip('arabic_language')] містах. Ці салони здавна були важливими для інтелектуального дискурсу, але, очевидно, [ShowCultureName('turkish_culture')] вчені мають труднощі з розмовою тією формальною [ShowLanguageNameWithNoTooltip('arabic_language')], яка потрібна для прийняття в цьому середовищі. Вчені тепер скаржаться, що це викликало у них збентеження."
  flavor_tur.79.historical_info: "Інтелектуальні салони, де вчені збиралися для дебатів, були поширеними в мусульманському світі, і могли мати значний престиж. Після завоювання Єгипту та Леванту турецьким вченим було важко підтримувати дискурс через їхнє обмежене знання арабської мови."
  flavor_tur.79.a: "Вони зрештою навчаться."
  flavor_tur.79.b: "Навчимо їх правильної [ShowLanguageNameWithNoTooltip('arabic_language')]."
  flavor_tur.79.c: "Ми повинні прийняти [ShowLanguageNameWithNoTooltip('arabic_language')] при дворі."
  flavor_tur.80.title: "Плацдарм в [ShowRegionNameWithNoTooltip('italy_region')]"
  flavor_tur.80.desc: "[target_province.GetName] — стратегічне місце, яке забезпечить нам плацдарм в [ShowRegionName('italy_region')] та спосіб оскаржити [ShowLocationName('strait_otranto')]. Якщо ми коли-небудь захочемо завоювати [ShowLocationName('rome')] і відновити повну славу стародавніх імператорів, ми повинні почати з виривання [target_province.GetNameWithNoTooltip] з несправедливих рук [target_country.GetName].\n\nАле було б мудро переконатися, що у нас достатньо кораблів для такого починання..."
  flavor_tur.80.historical_info: "Ранні султани після завоювання Константинополя непохитно підтримували свої претензії на звання римських імператорів і використовували це для виправдання завоювань у Західній Європі. У 1479 році відносини між османами та Венецією покращилися, і Мехмед II шукав їхньої підтримки для вторгнення в Неаполітанське королівство, що дозволило б йому створити плацдарм у Південній Італії."
  flavor_tur.80.a: "Запропонувати нечестивий союз із [GetCountry('VEN').GetNameWithNoTooltip]."
  flavor_tur.80.b: "Негайно розпочати підготовку."
  flavor_tur.80.c: "Час не настав."
  flavor_tur.81.title: "[GetCountry('VEN').GetAdjectiveWithNoTooltip] підтримка"
  flavor_tur.81.desc: "[GetCountry('VEN').GetName] вирішила підтримати нас, але лише через дещо беззубі дипломатичні кроки, конфіденційно заявивши нам, що ми маємо право захопити [target_province.GetName]. Проте це може бути кроком до здобуття їх як союзника за обставинами в майбутньому..."
  flavor_tur.81.historical_info: "Хоча Синьйорія у Венеції зрештою відмовилася від пропозиції османського союзу, вони зробили дипломатичний крок, щоб запевнити Мехмеда II, що вони не будуть проти османського завоювання Отранто, Бриндізі та Таранто. Чи вплинуло це на його остаточне рішення здійснити висадку в Італії, важко встановити – він мав такі амбіції досить довго."
  flavor_tur.81.a: "Продовжувати військові плани!"
  flavor_tur.81.b: "Можливо, нам варто переглянути..."
  flavor_tur.82.title: "Лев і Півмісяць"
  flavor_tur.82.desc: "[GetCountry('VEN').GetName] вирішила повністю підтримати нас, підписавши договір про союз, щоб допомогти нам перемогти сили християнства. Звісно, вони планують скористатися нами для власної вигоди, але така природа всіх союзів. Це, тим не менш, значно допоможе нашим амбіціям у [ShowRegionName('italy_region')]."
  flavor_tur.82.a: "Чудово."
  flavor_tur.83.title: "Сувора відмова"
  flavor_tur.83.desc: "[GetCountry('VEN').GetName] відмовилася від нашої пропозиції, беззастережно заявивши, що вони ніколи не підтримають [ShowReligionGroupAdjective('muslim')] претензії на [ShowRegionName('italy_region')]. Здається очевидним, що якщо ми хочемо продовжити наші італійські амбіції, ми повинні робити це без них."
  flavor_tur.83.a: "Тоді так і буде."
  flavor_tur.83.b: "$flavor_tur.81.b$"
  flavor_tur.84.title: "Мистецтво [ShowRegionNameWithNoTooltip('italy_region')]"
  flavor_tur.84.desc: "Великі події відбуваються в [ShowRegionName('italy_region')], і багато хто при дворі зацікавився прекрасним портретним живописом та скульптурою, що почали там з'являтися. [target_country.GetName] тепер, здається, бажає розвивати кращі відносини з державою [target_character.GetDynasty.GetName] і пропонує надіслати нам [artist_character.GetName], великого художника, щоб він працював свого роду культурним послом. І, звичайно, малював портрети [target_character.GetName]."
  flavor_tur.84.a: "[artist_character.GetSheHe|U] буде вітатися."
  flavor_tur.84.b: "Натомість ми повинні просувати [ShowCultureNameWithNoTooltip('turkish_culture')] культуру."
  flavor_tur.84.historical_info: "Мехмед II мав великий інтерес до культури та звичаїв Італії і хотів, щоб його портрет написав італійський художник. Після мирного договору 1479 року венеційці відправили відомого художника Джентіле Белліні до османського двору. Це призвело не лише до портрета султана, який зберігся до наших днів, але й до деяких коренів орієнталістської традиції в західному живописі."
  flavor_tur.85.title: "Питання історії"
  flavor_tur.85.desc: "[ahmed_azikpazade.GetName], ветеран багатьох військових кампаній, завершив написання великої хроніки історії держави. Здається, серед [ahmed_azikpazade.GetWomenMen], таких як [ahmed_azikpazade.GetHerHim], зростає інтерес до історій, написаних [ShowCultureNameWithNoTooltip('greek_culture')] мудрецями давнини, і до того, як їхні методи тепер можуть бути використані для хроніки історії династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName].\n\nАле чи можемо ми справді довіряти їм, що вони зроблять це справедливо та належним чином?"
  flavor_tur.85.a: "Здається, це нешкідливо."
  flavor_tur.85.b: "Цей [ahmed_azikpazade.GetWomanMan] повинен працювати в офіційній бюрократії."
  flavor_tur.85.c: "$flavor_tur.76.c$"
  flavor_tur.85.d: "Спалити ті книги."
  flavor_tur.85.historical_info: "Османські історики вперше з'явилися у XV столітті. Деякі, як-от Ашикпашазаде, починали як солдати, які в пізніші роки писали мемуари або хроніки Османської імперії, особливо про події, які вони пережили самі. «Косморама» Нешрі була ранньою спробою світової історії, заснованою на різноманітних турецьких та європейських джерелах, і стала основою для багатьох пізніших праць."
  flavor_tur.86.title: "Практика робить досконалим"
  flavor_tur.86.desc: "Завдяки доброму навчанню від кількох глухонімих придворних, [target_ruler.GetName] опанував основи гаремної мови жестів. Це може стати в пригоді у всіляких дипломатичних та таємних справах, а також, можливо, принести деяку розраду в інакше постійному гомоні переповнених палацових залів."
  flavor_tur.86.a: "Дуже добре."
  flavor_tur.86.historical_info: "Часом при Османському дворі було багато десятків глухонімих. Культура таємниці та тиші пронизувала багато процедур, і унікальна мова жестів двору часто використовувалася. Мова жестів також могла використовуватися для навігації делікатними нюансами палацової культури – глухонімі придворні могли жартувати з султаном, що могло бути неприйнятним у розмовній мові."
  flavor_tur.87.title: "Дивлячись на небеса"
  flavor_tur.87.desc: "[herat_ruler.GetName], правитель [ShowLocationName('herat')], відправив [ali_qushji.GetName] як делегата до двору [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]. [ali_qushji.GetNameWithNoTooltip] — відомий астроном, який довго працював у великій обсерваторії в далекому [ShowLocationName('samarkand')] і написав книгу, що описує рух Місяця. Після завершення [ali_qushji.GetHerHis] дипломатичної місії, [ali_qushji.GetSheHe] сподівається залишитися в [capital_location.GetName] зі [ali_qushji.GetHerHis] синами та послідовниками, щоб сприяти наукам під нашим заступництвом."
  flavor_tur.87.a: "Будь ласка, вони можуть залишитися."
  flavor_tur.87.b: "Нам потрібен придворний астроном..."
  flavor_tur.87.c: "Відправити цих дурнів назад до Ірану."
  ali_qushji_settles.tooltip: "[ali_qushji.GetNameWithNoTooltip] оселяється в [capital_location.GetNameWithNoTooltip]."
  flavor_tur.87.historical_info: "Після вбивства астронома-короля Улугбека в Трансоксіані вчені, які працювали в його обсерваторії, розсіялися по світу. Алі Кушджі, почувши про позитивне ставлення Мехмеда II до вчених, прийняв прохання володаря Герата стати його делегатом при Османському дворі. Кушджі був прихильником емпіричної астрономії, заснованої на математиці, і відкидав аристотелівську спадщину старої ісламської астрономії. Кілька його нащадків стали видатними астрономами в Константинополі."
  flavor_tur.88.title: "Організація гарему"
  flavor_tur.88.desc: "Дотепер двір [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] був розкиданий по різних палацах і посадах. Але якщо ми справді прагнемо величі, ми могли б зосередити нашу владу та присутність у [capital_location.GetName]. Це передбачало б переміщення всіх королівських наложниць-каріє туди та розміщення їх у закритих розкішних приміщеннях.\n\nАле [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] розцінили б це як агресивний крок проти них, оскільки це позбавило б багатьох з них особистого доступу до [target_ruler.GetName], яким вони довго насолоджувалися."
  flavor_tur.88.a: "Створити Імператорський гарем."
  flavor_tur.88.b: "Наша організація двору працює добре, як є."
  flavor_tur.88.historical_info: "У XVI столітті османська династична влада зосередилася в палаці Топкапи в Константинополі, і більшість членів королівської родини, особливо жінки, проводили там усе своє життя. Це перетворило гарем на добре організовану ієрархічну установу, чий акцент на усамітненні династичного життя зробив особистий доступ до правителя великим привілеєм, і таким чином передавав його владу."
  flavor_tur.89.title: "Втручання в [ShowAreaNameWithNoTooltip('crimea_area')]"
  flavor_tur.89.desc: "Занадто довго ми ігнорували справи на півострові [ShowAreaName('crimea_area')], стратегічно важливому місці та значному центрі работоргівлі з давніх часів. Зараз ходять чутки, що [target_country.GetName] найняла [rival_country.GetAdjective] найманців для захисту своїх кримських володінь у [crimea_location.GetName] від набігів кочівників з внутрішніх районів. Незалежно від того, правда це чи ні, це може означати, що [rival_country.GetNameWithNoTooltip] планує закріпитися на півострові в майбутньому, чого ми не можемо допустити. [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] пропонує використати це як привід для нападу."
  flavor_tur.89.a: "Підготуватися до захоплення [crimea_location.GetNameWithNoTooltip]."
  flavor_tur.89.b: "Наша дружба з [target_country.GetNameWithNoTooltip] занадто важлива."
  flavor_tur.89.c: "Ми зачекаємо кращого часу."
  flavor_tur.89.historical_info: "У середині XV століття Крим був розділений між генуезцями та Кримським ханством, а на півночі межував з Польським королівством. Коли генуезькі колонії найняли польських найманців у 1462 році, Мехмед II занепокоївся, що півострів потрапить під польську гегемонію. Щоб запобігти цьому, османи атакували в 1475 році і правили Кримом, частково безпосередньо, частково як васали, протягом наступних століть."
  flavor_tur.90.title: "Забезпечення Степу"
  flavor_tur.90.desc: "Кочівники [crimean_country.GetName], що межують з нашими володіннями в [ShowAreaName('crimea_area')], є вправними вершниками та воїнами, і завдяки своїм набігам на [ShowReligionGroupAdjective('christian')] сусідів, вони відіграють важливу роль у мережі работоргівлі, що простягається аж до [ShowLocationNameWithNoTooltip('bukhara')] в [ShowRegionName('khorasan_region')]. Тепер наші посланці повідомляють нам, що весь [crimean_country.GetNameWithNoTooltip] може бути готовий стати нашим протекторатом — якщо ми будемо готові зробити це вигідним для них, надіславши запас срібла та солдатів для допомоги їм у місцевих війнах."
  flavor_tur.90.a: "Надіслати пропозицію."
  flavor_tur.90.b: "Готуватися до прямої анексії."
  flavor_tur.90.c: "У нас достатньо турбот вдома."
  flavor_tur.90.historical_info: "Невдовзі після османського вторгнення в генуезькі міста Криму, Кримське ханство, ослаблене кризою престолонаслідування, підкорилося. Кримські татари відтоді постачали османам вправних розвідників і, можливо, найважливіше, рабів, захоплених під час набігів. Османи, у свою чергу, надали татарам дуже сприятливі умови, визнавши їх спадкоємцями $genghis_khan_name_no_tooltip$ і ставлячись до них скоріше як до союзників, ніж до підданих — хоча це згодом зміниться..."
  crimean_vassalage_guaranteed_chance_tooltip: "Завдяки нашим добрим стосункам, [crimean_country.GetNameWithNoTooltip] прийме цю угоду."
  crimean_vassalage_decent_chance_tooltip: "Є велика ймовірність, що [crimean_country.GetNameWithNoTooltip] прийме цю угоду."
  crimean_vassalage_low_chance_tooltip: "Через наші погані стосунки, є висока ймовірність, що [crimean_country.GetNameWithNoTooltip] відмовиться від цієї угоди."
  crimean_vassalage_very_low_chance_tooltip: "Через наші погані стосунки, є дуже висока ймовірність, що [crimean_country.GetNameWithNoTooltip] відмовиться від цієї угоди."
  crimean_slave_trade_encouraged: "Заохочення Кримської работоргівлі"
  flavor_tur.91.title: "Жахливий нещасний випадок"
  flavor_tur.91.desc: "Жахлива трагедія спіткала нашого [ROOT.GetCountry.GetFlavorRank]. Улюблений [tur_suleyman_scope.GetName] постраждав від нещасного випадку під час полювання зі своїм вірним соколом на землях [location_scope.GetName]. Під час цієї розваги невідома причина налякала його коня, змусивши його впасти на смерть.\n\nНаш народ розірваний раптовою розлукою з [tur_suleyman_scope.GetShortNameWithNoTooltip] і глибоко деморалізований втратою для нашої країни."
  flavor_tur.91.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_tur.91.b: "Ми вшануємо його, як очікує народ."
  flavor_tur.92.title: "Великі твори [mimar_sinan.GetNameWithNoTooltip]"
  flavor_tur.92.desc: "З того часу, як ми вперше найняли [mimar_sinan.GetHerHim], [mimar_sinan.GetName] наполегливо працював, будуючи незліченні дороги, мости та громадські споруди, і виховав ціле нове покоління архітекторів. Але тепер [mimar_sinan.GetSheHe] хоче ресурсів, щоб робити більші речі. Якби ми зробили [mimar_sinan.GetHerHim] імперським архітектором, [mimar_sinan.GetSheHe] міг би побудувати мечеті та палаци, подібних до яких світ не бачив з часів Ктесифона, Вавилона та Риму."
  flavor_tur.92.historical_info: "Блискучий Мімар Сінан спланував і керував будівництвом понад 300 споруд, таких як мечеті, акведуки, лазні, мости, палаци, караван-сараї та школи протягом своєї півстолітньої кар'єри. Його шедеврами були мечеті Селіміє та Сулейманіє в Адріанополі та Константинополі, чудові досягнення, які зробили його одним з великих митців свого часу."
  flavor_tur.92.a: "[mimar_sinan.GetSheHe|U] матиме все, що [mimar_sinan.GetSheHe] потрібно."
  flavor_tur.92.b: "Є важливіші речі, на які можна витратити гроші."
  flavor_tur.93.title: "Східна тюльпаноманія"
  flavor_tur.93.desc: "В одному з [ROOT.GetCountry.GetGovernment.GetAdjective] садів [target_ruler.GetName] розцвіла прекрасна біла квітка. Це тюльпан, колись рідкісна квітка в наших землях, хоча давно оспівана поетами [ShowRegionName('persia_region')]. Побачивши цю квітку, багато [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] закохалися в неї і почали вирощувати тюльпани у своїх власних садах. Також є ознаки того, що іноземні високопосадовці при [ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle] можуть оцінити тюльпани як подарунок."
  flavor_tur.93.historical_info: "Тюльпани вперше почали вирощувати в Ірані близько 1000 року і стали популярними серед османської знаті за правління Сулеймана Пишного, який любив сади. Тюльпани часто використовували для прикраси тюрбанів, і захоплення квітами зробило їх зображення поширеним мотивом на килимах і кераміці. Можливо, саме західні дипломати привезли тюльпани до Європи, побачивши їх цвітіння в османських садах."
  flavor_tur.93.a: "Нам потрібно більше цих чудових квітів!"
  flavor_tur.93.b: "Краще зосередимося на військових справах."
  flavor_tur.94.title: "Блиск [moses_hamon.GetNameWithNoTooltip]"
  flavor_tur.94.desc: "[moses_hamon.GetName] — вельми видатний [ShowReligionAdjective('judaism')] вчений та фізик, родом з [ShowLocationName('granada')]. [target_ruler.GetName] безперечно міг би отримати користь від найму [moses_hamon.GetHerHim], хоча деякі високопоставлені [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] висловлюють невдоволення, не бажаючи бачити язичника, хоч би яким доброчесним він був, на такій високій посаді при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tur.94.historical_info: "Мозес Хамон був частиною сефардської діаспори. Надзвичайно здібний лікар і вправний лінгвіст, він став придворним лікарем і дантистом Сулеймана Пишного. Між двома чоловіками розвинувся значний зв'язок, і Хамону також довіряли вирішувати суперечки, що стосувалися єврейської громади Османської імперії."
  flavor_tur.94.a: "Ми вітаємо всі таланти. Найміть [moses_hamon.GetHerHim]!"
  flavor_tur.94.b: "Нам не слід засмучувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  jewish_support.tt: "Усі [ShowCultureName('sephardi')] або [ShowReligionAdjective('judaism')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у нашій країні отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.95.title: "Єдиний Істинний Імператор"
  flavor_tur.95.desc: "Останнім часом, як повідомляє Служба внутрішніх справ, поширюються чутки про невдоволення правлінням [target_ruler.GetName]. Вони рекомендують нам вирішити це, замовивши велику та розкішну хроніку, що вихваляє чесноти правління [target_ruler.GetHerHis]. Бо [target_ruler.GetSheHe] все ще сидить на троні [ShowLocationNameWithNoTooltip('constantinople')], і, безперечно, може бути зображений як Єдиний Істинний Імператор світу – особливо серед [target_ruler.GetHerHis] [ShowReligionGroupAdjective('christian')] підданих."
  flavor_tur.95.historical_info: "Сулейман I успадкував неспокійну спадщину від свого жорстокого батька, Селіма I. Протягом свого правління Сулейман докладав зусиль, щоб його сприймали як справедливого та доброзичливого правителя. Частиною цього була хроніка «Сулейманнаме», яка висвітлювала його досягнення та зображувала його як ідеального правителя на завершальному етапі світу. Він також розвинув європейську легенду про Останнього Римського Імператора, представляючи себе як месіанську фігуру, яка об'єднає іслам і християнство під одним прапором."
  flavor_tur.95.a: "Для пропаганди жодна ціна не є занадто високою."
  flavor_tur.95.b: "Достатньо буде дешевшої хроніки."
  flavor_tur.95.c: "Ми завжди можемо покластися на підтримку [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  christian_support.tt: "Усі [ShowReligionGroupAdjective('christian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у нашій країні отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.96.title: "[traitorous_son.GetNameWithNoTooltip] Зрадник"
  flavor_tur.96.desc: "Посеред війни з [super_sinister_rival.GetName] ширяться темні чутки про [traitorous_son.GetName], [traitorous_son.GetDaughterSon] [target_ruler.GetName]. Істину важко встановити, але в багатьох колах подейкують, що [traitorous_son.GetSheHe] змовився з [rival_ruler.GetName], щоб спричинити загибель нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_tur.96.no_silent_service.desc: "$flavor_tur.96.desc$ Докази накопичуються, і довірені придворні натякали, наскільки сміливо вони наважувалися, що ми повинні негайно вбити [traitorous_son.GetHerHim]."
  flavor_tur.96.silent_service.desc: "$flavor_tur.96.desc$ Досі надійні агенти Служби внутрішніх справ припускають, що ми повинні негайно вбити [traitorous_son.GetHerHim]."
  flavor_tur.96.historical_info: "Шехзаде Мустафа був видатним і дуже здібним османським принцом, сином Сулеймана Пишного. Але він був фаворитом на успадкування престолу, і це створило йому ворогів. Змова з метою його усунення зрештою вдалася під час Сефевідської війни 1532 року, коли його печатку підробили в листі до Тахмаспа I, правителя Сефевідів. Звинувачений у зраді, Мустафа був страчений за наказом свого батька, разом з багатьма його синами та послідовниками."
  flavor_tur.96.a: "На жаль, [traitorous_son.GetSheHe] мусить померти."
  flavor_tur.96.b: "Ми відмовляємося слухати такий наклеп."
  brush_with_death.tt: "[traitorous_son.GetNameWithNoTooltip] здобуде важливий досвід, переживши цю суперечку."
  flavor_tur.97.title: "Спадщина [traitorous_son.GetNameWithNoTooltip]"
  flavor_tur.97.desc: "На жаль, схоже, що страта [traitorous_son.GetName] розлютила громадськість, а також кілька фракцій [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Популярний вірш вихваляє чесноти [traitorous_son.GetHerHis] і оплакує [traitorous_son.GetHerHis] вбивство. [minister.GetName] був названий головним серед змовників, що спричинили цю трагедію, і хоча докази причетності та зловмисності [minister.GetHerHis] є в кращому випадку невловимими, тепер широко закликають [target_ruler.GetName] звільнити [minister.GetHerHim]."
  flavor_tur.97.historical_info: "Страта Шехзаде Мустафи викликала широке невдоволення. У віршах його зображували мучеником, і навіть перси називали його смерть несправедливою. Великий візир Рюстем-паша, чоловік Мустафиної зведеної сестри Міхрімах Султан, стояв у центрі суперечки. Він був одним із головних змовників, прагнучи забезпечити трон для Мустафиного зведеного брата Селіма, і був швидко звільнений зі своєї посади. Однак Селім все одно став султаном."
  flavor_tur.97.a: "[minister.GetSheHe|U] буде відправлено у вигнання."
  flavor_tur.97.b: "Ми спонсоруватимемо вірші, щоб спростувати ці фальшиві заяви."
  flavor_tur.97.c: "$flavor_tur.76.c$"
  flavor_tur.97.d: "Нам потрібні жорсткі заходи проти цих неправдивих звинувачень."
  minister_exiled.tt: "[minister.GetNameWithNoTooltip] вигнано з [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tur.98.title: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] П'єса"
  flavor_tur.98.desc: "Смерть [traitorous_son.GetName] продовжує переслідувати нас. Тепер навіть театральна вистава у [GetCountry('FRA').GetName] зображує [traitorous_son.GetHerHis] долю, повідомляють свідки, і #italic не#! у спосіб, сприятливий для репутації [target_ruler.GetName]. Великий візир рекомендує щось зробити, щоб нас не сприймали ще несприятливіше серед королів [ShowContinentName('europe')]."
  flavor_tur.98.historical_info: "Габріель Бунен був французьким драматургом. У 1561 році він опублікував «Ла Солтана», трагедію, що зображувала улюблену дружину Сулеймана Пишного Роксолану (Хюррем Султан) як головну змовницю, що стояла за смертю Шехзаде Мустафи. На практиці це, здається, дуже мало вплинуло на франко-османські відносини, але це був перший випадок, коли турків зображували на сцені у Франції, і це демонструє зростаючі зв'язки між двома країнами."
  flavor_tur.98.a: "Будьте терплячі, це теж мине."
  flavor_tur.98.b: "Надіслати вимоги до [GetCountry('FRA').GetAdjectiveWithNoTooltip] [GetCountry('FRA').GetGovernment.GetRulerTitle]."
  flavor_tur.98.c: "Вигнати більше ймовірних змовників."
  france_will_refuse.tt: "[GetCountry('FRA').GetNameWithNoTooltip] відмовиться заборонити п'єсу."
  france_will_aquiesce.tt: "[GetCountry('FRA').GetNameWithNoTooltip] заборонить п'єсу."
  tur_courting_the_sublime_porte: "Залицяння до Блискучої Порти"
  flavor_tur.99.title: "Ціна Амбіцій"
  flavor_tur.99.desc: "[minister.GetName] стає занадто амбітним для [minister.GetHerHis] власного блага. [ambitious_wife.GetName] шепоче темні попередження [target_ruler.GetName] вночі. [minister.GetNameWithNoTooltip] повинен померти, інакше [minister.GetHerHis] прагнення до влади поставить під загрозу весь [ROOT.GetCountry.GetFlavorRank]. [minister.GetSheHe|U] може бути дуже здібним [minister.GetWomanMan], але є й інші, запевняє нас [ambitious_wife.GetShortNameWithNoTooltip], які служитимуть [ROOT.GetCountry.GetGovernment.GetRulerTitle] з такою ж майстерністю і більшою відданістю."
  flavor_tur.99.historical_info: "Османський двір був місцем, де можна було злетіти метеоритним чином — а також зустріти кривавий кінець. Паргали Ібрагім-паша пройшов шлях від низькородного раба до першого візира Сулеймана Пишного. Але він був настільки успішним у цій ролі, що його стали вважати загрозою для влади султана, і зрештою його стратили. Часто стверджують, хоча й суперечливі джерела, що Хюррем, улюблена наложниця Сулеймана, стояла за смертю Ібрагіма і прийшла до влади за його рахунок."
  flavor_tur.99.a: "Так, [minister.GetSheHe] повинен померти."
  flavor_tur.99.b: "Яка безглузда пропозиція."
  ottoman_execution_refusal.tt: "Ми відмовляємося стратити [minister.GetName]."
  flavor_tur.100.title: "[capital_location.GetNameWithNoTooltip] вночі"
  flavor_tur.100.desc: "Видатні голоси серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [capital_location.GetName] піднялися проти діяльності, що відбувається в [capital_location.GetRank.GetName] вночі — пияцтва, розпусти, азартних ігор та подібних безбожних речей. Вони закликають до заборони або принаймні до жорстких заходів. Але деякі з наших радників застерігають, що [GetCountry('TUR').GetAdjectiveWithNoTooltip] держава давно отримує вигоду від толерантності, і особливо від податкових надходжень, які надають ці неславні заклади..."
  flavor_tur.100.historical_info: "У османському Константинополі вночі процвітали бари та борделі. Бути спійманим без ліхтаря вважалося вірною ознакою того, що людина замишляє щось недобре, і могло призвести до того, що її зачиняли в хамамі на ніч. Особливо побожні султани час від часу намагалися придушити розпусні нічні заклади, але в іншому вони були терпимими, оскільки були значним джерелом податкових надходжень для держави."
  flavor_tur.100.a: "Ми не будемо розгойдувати цей човен."
  flavor_tur.100.b: "Дати туманні обіцянки для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_tur.100.c: "Це більше не можна терпіти."
  crackdown.tt: "Ми розпочинаємо жорстоку кампанію проти пияцтва та розпусти."
  flavor_tur.100.clergy_angry.tt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.100.burghers_happy.tt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.100.clergy_moderately_angry.tt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.100.clergy_happy.tt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.100.burghers_unhappy.tt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.101.title: "Сила Ночі"
  flavor_tur.101.desc: "Почали ширитися чутки щодо меншинних сект у [capital_location.GetName]. Простий люд [capital_location.GetRank.GetName] жахається, стверджуючи, що дивні культи вдаються до плотського гріха під покровом ночі, утворюючи купи стогнучих, язичницьких тіл, щойно згасають свічки. Чи варто нам щось робити з цим, щоб це не переросло у щось небезпечніше, як великі [GetCountry('BYZ').GetAdjectiveWithNoTooltip] заворушення в давні часи?"
  flavor_tur.101.historical_info: "Багато релігійних сект Османської епохи мали практики, пов'язані з ніччю. Такі групи, як суфійський орден Бекташі, алевіти та єврейські саббатіанці, розглядали нічні ритуали як особливо містичні, так і як спосіб відокремитися від основної ісламської та православної спільноти. Мерзенні чутки часто поширювалися про ці групи та їхні нічні дії."
  flavor_tur.101.a: "Ці чутки вщухнуть."
  flavor_tur.101.b: "Усі ми маємо свій шлях до [ROOT.GetCountry.GetReligion.GetGodName]."
  flavor_tur.101.c: "Знайти групу-цапа відбувайла і конфіскувати їхні активи."
  defend_heathens.tt: "Ми намагаємося задобрити обидві сторони."
  flavor_tur.101.a_majority.tt: "Усі наші [ShowReligionAdjective('sunni')] та [ShowReligionAdjective('orthodox')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.101.a_minority.tt: "Усі наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] інших віросповідань у [capital_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.101.b_minority.tt: "Усі наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] інших віросповідань у [capital_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.101.b_majority.tt: "Усі наші [ShowReligionAdjective('sunni')] та [ShowReligionAdjective('orthodox')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.101.c_majority.tt: "Усі наші [ShowReligionAdjective('sunni')] та [ShowReligionAdjective('orthodox')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.101.c_minority.tt: "Усі наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] інших віросповідань у [capital_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.102.title: "Диво, що обертається"
  flavor_tur.102.desc: "[taqi_ad_din.GetWomanMan] на ім'я [taqi_ad_din.GetName] винайшов геніальну машину, що працює на гарячому повітрі, яка може обертати шампур для кебабу. Цей пристрій [taqi_ad_din.GetHerHis] тепер розважає голодні натовпи в ресторані у [capital_location.GetName]. Але [taqi_ad_din.GetNameWithNoTooltip] також є видатним вченим в інших галузях, особливо в астрономії, навички якого/якої могли б принести нам славу, якби ми найняли [taqi_ad_din.GetHerHim]."
  flavor_tur.102.historical_info: "POSTEDIT_Такі ад-Дін Мухаммад ібн Ма'руф був ерудитом, який написав понад 90 книг у таких галузях, як астрономія, годинники, інженерія та оптика. У 1551 році він описав кілька конструкцій парових двигунів, які могли обертати рожен. Хоча такі конструкції сягали давніх греків, мало хто до нього був здатний до будь-якого практичного застосування. Через два десятиліття він став придворним астрономом султана Мурада III."
  flavor_tur.102.a: "Нам потрібні такі [taqi_ad_din.GetWomenMen]."
  flavor_tur.102.b: "Давайте просто насолоджуємося кебабом."
  taqi_ad_din_leaves.tt: "[taqi_ad_din.GetNameWithNoTooltip] відступає в безвість."
  flavor_tur.103.title: "Обсерваторія [taqi_ad_din.GetNameWithNoTooltip]"
  flavor_tur.103.desc: "Відколи ми найняли [taqi_ad_din.GetHerHim], [taqi_ad_din.GetName] мріяв про велику обсерваторію, де [taqi_ad_din.GetSheHe] міг би поглибити вивчення небес. [taqi_ad_din.GetSheHe|U] вже будує армілярну сферу та механічні годинники для майбутньої обсерваторії, а також знайшов підходяще місце на пагорбі з видом на [capital_location.GetName]. Все, що [taqi_ad_din.GetSheHe] тепер потрібно, це фінансування."
  flavor_tur.103.historical_info: "Обсерваторія Таки ад-Діна була побудована в 1577 році і складалася з двох будівель на пагорбі з видом на європейський район Константинополя. Протягом короткого існування обсерваторії Таки ад-Дін отримав знання, які дозволили йому виправити та доповнити зоряний каталог, складений Улугбеком більш ніж століттям раніше в Самарканді."
  flavor_tur.103.a: "Ми її збудуємо."
  flavor_tur.103.b: "Ми повинні зосередитися на релігійній архітектурі."
  flavor_tur.104.title: "Велика комета [GetCurrentYear] року"
  flavor_tur.104.desc: "У нічному небі помічено велику комету, її дивне світло відкидає моторошні тіні на землю. Проте, як би зловісно це не здавалося, астрономи [ShowBuildingTypeNameWithNoTooltip('constantinople_observatory')] стверджують, що це добрий знак, який віщує благополуччя та пишність, і нашу перемогу над [super_sinister_rival.GetLongName], нарешті."
  flavor_tur.104.historical_info: "Велика комета 1577 року була вивчена як Таки ад-Діном в Османських землях, так і Тихо Браге в Данії. Але Мурад III попросив Таки ад-Діна інтерпретувати значення комети як знамення, і його оптимістичні прогнози не справдилися, оскільки незабаром після цього країну охопила чума. Це сприяло руйнуванню його обсерваторії через кілька років."
  flavor_tur.104.a: "Це справді чудова новина."
  flavor_tur.104.b: "Це занадто добре, щоб бути правдою."
  repercussions_later.tt: "Це може мати позитивний вплив пізніше."
  flavor_tur.105.title: "Кінець обсерваторії"
  flavor_tur.105.opening: "Незабаром після того, як астрономи [ShowBuildingTypeNameWithNoTooltip('constantinople_observatory')] зробили свої прогнози щодо значення великої комети, частини [ROOT.GetCountry.GetFlavorRank] були охоплені чумою. Гучні голоси серед жителів [capital_location.GetName] тепер стверджують, що сама обсерваторія є безбожною річчю, поганим знаменням."
  flavor_tur.105_believed_in_portents.desc: "$flavor_tur.105.opening$ Висока Порта була нерозумною, кажуть вони, що взагалі повірила в це. $flavor_tur.105_ending$"
  flavor_tur.105_disbelieved_in_portents.desc: "$flavor_tur.105.opening$ Висока Порта мала рацію, сумніваючись у цьому. $flavor_tur.105_ending$"
  flavor_tur.105_ending: "По всьому [ROOT.GetCountry.GetFlavorRank] люди тепер закликають до знищення обсерваторії."
  flavor_tur.105.historical_info: "Хоча закриття обсерваторії в Константинополі в 1580 році іноді приписували релігійному обуренню серед громадськості, це було скоріше питанням політики. Таки ад-Дін нажив ворогів серед багатьох дрібних чиновників бюрократії та улемів, які хотіли судити його за єресь. Таким чином, обсерваторія проіснувала лише кілька років, що стало великою втратою для науки астрономії в мусульманському світі."
  flavor_tur.105.a: "Було добре, поки тривало."
  flavor_tur.105.b: "Ні, її треба зберегти."
  flavor_tur.105.happy_pops.tt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [capital_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.106.title: "Відновлення [ShowLocationNameWithNoTooltip('jerusalem')]"
  flavor_tur.106.desc: "Священне [target_location.GetRank.GetName] [target_location.GetName] є перлиною нашого [ROOT.GetCountry.GetFlavorRank], але вкрай потребує ремонту. Стародавні стіни [target_location.GetRank.GetNameWithNoTooltip] руйнуються, і навіть Купол Скелі втратив свій колишній блиск. Якщо ми спонсоруємо масштабні реставрації, ми зможемо завоювати серця місцевих жителів і довести нашу відданість [ShowReligionGroupName('muslim')]."
  flavor_tur.106.historical_info: "Сулейман Пишний, а також його дружина Роксолана, замовили багато будівельних проектів, бажаючи представити Османську імперію як центр ісламської цивілізації. Це включало масштабні реставраційні роботи у святому місті Єрусалимі. Були відбудовані стародавні міські стіни, а Купол Скелі був відремонтований та прикрашений синіми мармуровими плитками, які покривають його донині."
  flavor_tur.106.a: "Жодна ціна не є надто великою."
  flavor_tur.106.b: "Відремонтувати лише Купол."
  flavor_tur.106.c: "Натомість збудувати сучасне укріплення."
  jerusalem_happy_burghers.tt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowLocationNameWithNoTooltip('jerusalem')] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.107.title: "[ShowGoodsNameWithNoTooltip('coffee')] [ShowLocationNameWithNoTooltip('cairo')]"
  flavor_tur.107.desc: "[ShowGoodsName('coffee')|U], що походить з Ємену, останнім часом набула великої популярності, а кав'ярні з'являються в містах і містечках по всьому [ROOT.GetCountry.GetFlavorRank]. [ShowLocationName('cairo')] зокрема процвітає завдяки зростаючій торгівлі цим смачним темним напоєм, але деякі з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] хочуть, щоб ми його обмежили. Кава, стверджують вони, майже так само небезпечна для чоловічої чесноти, як алкоголь, і людям [ShowLocationNameWithNoTooltip('cairo')] було б краще без неї."
  flavor_tur.107.historical_info: "Вживання кави, схоже, виникло в Ємені у 15 столітті, а до кінця 16-го поширилося по всіх османських землях. Каву відправляли з єменського порту Моха до Каїра, звідки її доставляли в кожен куточок імперії. Єгипет став найбагатшою провінцією імперії, частково завдяки торгівлі кавою."
  flavor_tur.107.a: "Проте ми підтримаємо купців."
  flavor_tur.107.b: "Репресивне регулювання давно назріло."
  flavor_tur.108.title: "Велике знецінення"
  flavor_tur.108.desc: "З нещодавніми проблемами в [ROOT.GetCountry.GetFlavorRank] почали зростати економічні труднощі. Купці скаржаться на обурливі різниці в цінах на наших внутрішніх ринках, де використовується широкий спектр місцевих валют. Солдати незадоволені тим, що не отримують платню вчасно. Але якби ми були готові знецінити наші срібні монети акче, можливо, вдалося б полегшити ці труднощі, об'єднавши економіку [ROOT.GetCountry.GetFlavorRank] та підвищивши вартість золотих монет, які державна скарбниця все ще має в резерві."
  flavor_tur.108.historical_info: "Не зовсім зрозуміло, чому в 1585 році османи вирішили знецінити акче. Це могло бути необхідним через вартість тривалих воєн з Персією або через приплив срібла з Нового Світу. Місцеві економіки в імперії були дуже роз'єднані, і знецінення могло бути спробою об'єднати їх та зміцнити вартість золотих монет відносно срібла на користь державної скарбниці. Зрештою, ці зусилля мали змішані результати, і валюта залишалася нестабільною протягом кількох десятиліть."
  flavor_tur.108.a: "Це варте ризику."
  flavor_tur.108.b: "Ці побоювання необґрунтовані."
  flavor_tur.109.title: "Клітка"
  flavor_tur.109.desc: "Народ дедалі більше відчуває дискомфорт від жорстокого, але необхідного вбивства братів, навіть немовлят, коли новий [ROOT.GetCountry.GetGovernment.GetRulerTitle] сходить на престол. Якби ми натомість ув'язнили братів [ROOT.GetCountry.GetGovernment.GetRulerTitle] у #italic Кафес#!, клітці, частині [ROOT.GetCountry.GetGovernment.GetAdjective] гарему, вони могли б прожити свої дні в розкоші. Це забезпечило б, що династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] ніколи не матиме нестачі спадкоємців."
  flavor_tur.109.historical_info: "Османське братовбивство вийшло з моди наприкінці 16 століття, після жахливих вбивств під час сходження на престол Мурада III та Мехмеда III, під час яких було вбито десятки немовлят та молодих хлопчиків. Чоловічі родичі султана натомість утримувалися під різним ступенем домашнього арешту в гаремі та залишалися пасивними завдяки розкоші та наложницям. Це забезпечувало життєздатність династії та стабільність держави, але послаблювало особисту владу правителя, оскільки його легше було замінити."
  flavor_tur.109.a: "Так, цьому варварству має бути покладено край."
  flavor_tur.109.b: "Ні, своїм братам ніколи не можна довіряти."
  flavor_tur.110.title: "Капітуляції"
  flavor_tur.110.desc: "Можливо, настав час нам налагодити кращі стосунки з [ShowReligionGroupAdjective('christian')] країнами. [capitulation_country.GetName] є гарним кандидатом для нового типу хартії, яку підготував [ROOT.GetCountry.Custom('GetHeadOfCabinetName')]. Вона надасть [capitulation_country.GetAdjectiveWithNoTooltip] купцям та мандрівникам захист та привілеї в межах нашого [ROOT.GetCountry.GetFlavorRank], але буде жестом доброї волі до них. Наші власні [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] незадоволені, стверджуючи, що це створить недобросовісну конкуренцію з боку цих іноземців."
  flavor_tur.110.historical_info: "Капітуляції, #italic Ахіднаме#! турецькою, були хартіями, які Османська імперія підписувала з іншими націями, зазвичай надаючи торговцям з цих націй права, такі як звільнення від місцевого оподаткування та судового переслідування, перебуваючи на османських землях. Ранніми одержувачами капітуляцій були Венеція та Генуя, але, можливо, найзначнішою була капітуляція, надана Франції в 1535 році, яка заклала основи франко-османського альянсу в наступні роки."
  flavor_tur.110.a: "Підписати хартію."
  flavor_tur.110.b: "Ні, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] мають рацію."
  opinion_ottoman_capitulation: "Отримана капітуляція"
  flavor_tur.111.title: "Театр тіней"
  flavor_tur.111.desc: "Вид лялькового театру, що використовує тіні, які проєктуються на мусліновий екран, останнім часом став популярним у багатьох містах [ROOT.GetCountry.GetFlavorRank]. У ньому виступають два клоунські персонажі, відомі як Караґьоз і Хадживат, чиї витівки збирають величезні натовпи як у чайних, так і в шляхетних будинках. Деякі члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] стверджують, що вистави, які часто містять грубі та підривні теми, є образою [ShowReligionGroupName('muslim')], але заборона їх сильно розлютила б багатьох міських жителів."
  flavor_tur.111.historical_info: "Походження традиції театру тіней Караґьоз невідоме. Дехто вважає, що вона прибула з торговцями з Яви, де тіньові вистави виконувалися ще з Середньовіччя. До XVI століття ці часто сатиричні та неповажні вистави виконувалися в кожному місті Османської імперії. $common_string_shaikh_al_islam$ Ебюссууд Ефенді видав відоме рішення, що вистави справді дозволені ісламським законом. Однак у пізніші століття вони були придушені правителями через їхній політичний зміст."
  flavor_tur.111.a: "Нехай люди розважаються."
  flavor_tur.111.b: "Ми заспокоїмо прихильників жорсткої лінії."
  plays_banned.tt: "Вистави Караґьоз заборонені."
  flavor_tur.112.title: "Кінець [ShowAdvanceNameWithNoTooltip('timariots')]"
  flavor_tur.112.desc: "Система [ShowAdvanceName('timariots')], яка довго нам добре служила, стикається з критичними проблемами. Земельні наділи, які ми надаємо цим кавалеристам, стають все більш подрібненими та бідними, а наші вороги, озброєні мушкетами, гарантують, що кавалерія не є такою домінантною на полі бою, як у давні часи. Якщо ми більше не будемо роздавати землі Тимар, ми могли б, коли їхні власники старітимуть і помиратимуть, перетворити їх на податкові ферми для прямої вигоди держави. Армія також могла б бути модернізована, більше зосереджена на піхотинцях, озброєних пороховою зброєю."
  flavor_tur.112.historical_info: "Система Тимарів, що надавала земельні наділи кавалеристам-сипахам, з часом стала нежиттєздатною. Коли великі османські завоювання залишилися в минулому, землі для роздачі вже не вистачало. Інші фракції в армії, особливо яничари, також вимагали наділів. Усвідомивши, що реформа давно назріла, османи скасували систему і стали більше покладатися на набір солдатів-секбанів з селянства."
  flavor_tur.112.a: "Ми повинні змінюватися з часом."
  flavor_tur.112.b: "Кавалерія завжди пануватиме."
  timars_unavailable.tt: "Тимарські [Concept('reforms', 'CONCEPT_PLACEHOLDER')|e] стануть назавжди недоступними."
  flavor_tur.113.title: "Поради для королів"
  flavor_tur.113.desc: "Жанр літератури під назвою #italic Насіхатнаме#!, або «Поради для королів», останнім часом набув великої популярності. Ці книги часто написані так, ніби вони мали бути представлені [target_ruler.GetName], нібито радячи [target_ruler.GetHimHerFormal] у таких питаннях, як благочестя, мораль чи політична майстерність. Але автори також почали натякати, що наш [ROOT.GetCountry.GetFlavorRank] глибоко вражений проблемами, перебуваючи в жалюгідному стані, який може полегшити лише провидіння. Чи дозволимо ми й надалі процвітати цим творам?"
  flavor_tur.113.historical_info: "Жанр Насіхатнаме мав багато схожостей з європейською літературою «Дзеркал для принців», але згодом став характеризуватися зростаючим почуттям зневіри, висвітлюючи різні уявні недуги Османської держави. Вони озиралися на передбачувану золоту добу правління Селіма I. Дещо помилкове уявлення пізніших істориків про те, що XVII століття було періодом занепаду Османської імперії, ймовірно, було сформоване літературою Насіхатнаме."
  flavor_tur.113.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] міг би повчитися з цього."
  flavor_tur.113.b: "Переконати авторів хвалити режим."
  flavor_tur.113.c: "Стратити цих зрадників."
  executed_authors.tt: "Рух Насіхатнаме раптово припиняється."
  flavor_tur.114.title: "Право матері — це право [ROOT.GetCountry.GetReligion.GetGodName]"
  flavor_tur.114.desc: "[valide_sultan.GetName], Валіде Хатун, є [valide_sultan.GetWomanMan] майстерності та рішучості, яка вже досягла міцної позиції при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Усвідомлюючи численні загрози династії [target_ruler.GetDynasty.GetName], [valide_sultan.GetSheHe] тепер прагне більшого впливу в державних справах, щоб працювати на благо [ROOT.GetCountry.GetFlavorRank], як великі сельджуцькі цариці в давнину. Ми могли б надати [valide_sultan.GetHerHim] новий титул Валіде Султан, де [valide_sultan.GetSheHe] була б шанована понад усіх інших [valide_sultan.GetWomenMen] і мала б право наглядати за засіданнями ради."
  flavor_tur.114.historical_info: "Хоча матері османських султанів майже завжди походили з гаремних рабинь, вони все ж могли досягти великої влади за лаштунками, особливо після правління Сулеймана Пишного та його могутньої дружини Роксолани. Валіде Султан, титул, який вперше був наданий матері Сулеймана Хафсі, мала багато особливих привілеїв і повноважень, а також головувала на весіллях принцес – ключовій частині імперської дипломатії."
  flavor_tur.114.a: "Нам потрібна [valide_sultan.GetHerHim] мудрість."
  flavor_tur.114.b: "[valide_sultan.GetWomenMen|U] повинні залишатися в гаремі, де їм місце."
  flavor_tur.115.title: "Влада жінок"
  flavor_tur.115.desc: "Коли наш [ROOT.GetCountry.GetFlavorRank] охоплений проблемами, [harem_power.GetName] та інші [harem_power.GetWomenMen] [ROOT.GetCountry.GetGovernment.GetCourtTitle] готові взяти на себе більше обов'язків, чи то з-за стін гарему, чи то на більш публічних посадах. Вплив [ROOT.GetCountry.GetGovernment.GetAdjective] [harem_power.GetWomenMen] давно зростає, і хоча багато з них рабського походження, вони довели свою геніальність. Але якщо ми дозволимо [harem_power.GetWomenMen] взяти кермо влади в [ROOT.GetCountry.GetGovernment.GetCourtTitle], багато традиціоналістів, безсумнівно, будуть цим незадоволені."
  flavor_tur.115.historical_info: "Період, відомий як Султанат жінок, тривав майже 150 років. Це був бурхливий час, коли багато султанів мали короткі правління, а деякі сходили на трон ще дітьми. Їхні матері, бабусі, сестри або дружини здобули великий вплив, хоча часто їм протистояли великі візири. Султани цього часу, такі як Мірімах, Нурбану, Кьосем і Турхан, стали одними з найвпливовіших жінок в османській історії."
  flavor_tur.115.a: "[ROOT.GetCountry.GetFlavorRank] потребує жіночої мудрості."
  flavor_tur.115.b: "Навчити цих фурій їхнього належного місця."
  flavor_tur.116.title: "[favored_country.GetAdjectiveWithNoTooltip] фракція"
  flavor_tur.116.desc: "Фракція наложниць, одалісок, карликів та євнухів [favored_country.GetAdjective] походження зростає у владі при [ROOT.GetCountry.GetGovernment.GetCourtTitle] [target_ruler.GetName]. Працюючи за лаштунками, вони вже досягли значного впливу в гаремі та бюрократії. Вони вимагають рішень, більш сприятливих для [favored_country.GetNameWithNoTooltip], і щоб ми підписали капітуляцію з цією країною."
  flavor_tur.116.historical_info: "При османському дворі рабство не було перешкодою для досягнення великого впливу. Євнухи та наложниці не забували про країни свого походження і іноді створювали фракції, щоб просувати політичні рішення, які були б вигідні їхній батьківщині. Наприкінці 16 століття при дворі навіть існувала венеціанська партія-відступниця, очолювана могутнім головним євнухом Газанфером, який сам був венеціанцем."
  flavor_tur.116.a: "Умиротворимо цю фракцію."
  flavor_tur.116.b: "Нехай Внутрішня служба вб'є їх усіх."
  flavor_tur.116.c: "Ми просто ігноруватимемо їх."
  flavor_tur.117.title: "Реформи [ambitious_ruler.GetNameWithNoTooltip]"
  flavor_tur.117.desc: "Усвідомлюючи, що посада [ROOT.GetCountry.GetGovernment.GetRulerTitle] починає втрачати колишній престиж, [ambitious_ruler.GetName] неспокійний. [ambitious_ruler.GetSheHe|U] нарікає на зростаючий вплив бюрократії, провінційних губернаторів і навіть жінок гарему, що, як стверджує [ambitious_ruler.GetSheHe], відбулося за [ambitious_ruler.GetHerHis] рахунок. [ambitious_ruler.GetSheHe|U] хоче здійснити низку політичних маневрів, щоб повернути владу [ROOT.GetCountry.GetGovernment.GetRulerTitle], але такий крок, безсумнівно, розлютить деякі фракції."
  flavor_tur.117.historical_info: "Протягом 16 століття Османська імперія поступово перетворилася на бюрократичну імперію, де султани володіли набагато меншою абсолютною владою, ніж у минулому. Зійшовши на трон у 1618 році, молодий Осман II спробував змінити цю тенденцію, але йому бракувало сильної союзниці в гаремі, і незабаром він налаштував проти себе яничарів та багатьох радників. Його спроба була, м'яко кажучи, невдалою."
  flavor_tur.117.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] потребує більше влади."
  flavor_tur.117.b: "[ambitious_ruler.GetSheHe|U] мав би вивчати державне управління замість цього."
  flavor_tur.117.c: "Скинути цього дурня."
  very_successful_coup.tt: "Переворот дуже успішний."
  somewhat_successful_coup.tt: "Переворот дещо успішний."
  flavor_tur.118.title: "Гнів $janissaries_advance$"
  flavor_tur.118.desc: "Поки [ambitious_ruler.GetName] намагався втілити [ambitious_ruler.GetHerHis] радикальні реформи, [ambitious_ruler.GetSheHe] також зумів образити $janissaries_advance$, назвавши їх боягузами. Розлючені та побоюючись, що [ambitious_ruler.GetSheHe] спробує скасувати їхній корпус наступним, вони знайшли багато союзників у [ROOT.GetCountry.GetGovernment.GetCourtTitle] та гаремі, і жадають крові. Якщо ми не готові ризикувати громадянською війною, життя [ROOT.GetCountry.GetGovernment.GetRulerTitle], схоже, буде втрачено."
  flavor_tur.118.historical_info: "Дедалі більше налаштовуючи яничарів проти себе, Осман II прагнув обмежити їхній вплив, закриваючи кав'ярні, де вони збиралися, та створюючи нову армію анатолійських секбанів, яка була б більш лояльною до нього. Але яничари змовилися з Халіме Султан, матір'ю попереднього правителя, Мустафи Божевільного, і ув'язнили та вбили Османа. Психічно нестабільний Мустафа тоді знову зайняв трон."
  flavor_tur.118.a: "Тоді [ambitious_ruler.GetSheHe] мусить померти."
  flavor_tur.118.b: "Знищити цю загрозу для Блискучої Порти."
  janissary_revolt: "Яничарські повстанці"
  flavor_tur.119.title: "Охоронці Блаженства"
  flavor_tur.119.desc: "[mehmed_agha.GetName] — блискучий євнух [ROOT.GetCountry.GetGovernment.GetCourtTitle], один із охоронців [ROOT.GetCountry.GetGovernment.GetAdjective] гарему. Кілька фракцій при [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажають створити нову посаду для [mehmed_agha.GetHerHim], #italic Кізляр-ага#!, Охоронця дівчат. На цій посаді [mehmed_agha.GetSheHe] наглядатиме за приватними покоями [ROOT.GetCountry.GetGovernment.GetRulerTitle] та виступатиме посередником між гаремом і високою радою. [mehmed_agha.GetSheHe|U] також підніметься над старим білим головним євнухом, #italic Капи-ага#!, який відповідає за хлопчиків-слуг при [ROOT.GetCountry.GetGovernment.GetCourtTitle], але ніколи не був по-справжньому надійним."
  flavor_tur.119.historical_info: "Кількість євнухів при османському дворі неухильно зростала. У 1574 році для Мехмеда-аги було створено посаду Кізляр-аги, що дало євнухам безпрецедентну владу. Африканські євнухи вважалися більш надійними, оскільки їхні батьківщини були дуже далеко, і з часом стали набагато впливовішими, ніж білі євнухи. Частково завдяки тісним зв'язкам Кізляр-аги з могутніми Валіде-султан (королевами-матерями), ця посада незабаром стала візиром першого рангу, поступаючись лише великому візирові та $common_string_shaikh_al_islam$."
  flavor_tur.119.a: "Піднести Кізляр-агу."
  flavor_tur.119.b: "Натомість зміцнити Капи-агу."
  flavor_tur.119.c: "Ці євнухи не потребують більшої влади."
  valide_sultan_objects.tt: "Валіде-султан цього не прийме."
  mehmed_agha_fired.tt: "[mehmed_agha.GetNameWithNoTooltip] залишає [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tur.120.title: "Гармати [super_sinister_rival.GetNameWithNoTooltip]"
  flavor_tur.120.desc: "З часів нашої останньої війни з [super_sinister_rival.GetName] ми виставляли кілька їхніх захоплених гармат, і в ці мирні дні армії не завадило б підняти бойовий дух. [target_ruler.GetName] бажає використати ці гармати для військового святкування в [reenactment_location.GetName] на честь [target_ruler.GetHerHis] [target_child.GetDaughterSon] [target_child.GetName], якому щойно виповнилося [target_child.GetAgeInYears], і якого, звісно, відправлять туди."
  flavor_tur.120.historical_info: "Нещасливий Осман II прагнув здобути легітимність, вигравши війну проти Польщі, але зазнав нищівної поразки. На зворотному шляху він, здається, знайшов розраду в новині про народження свого першого сина Шехзаде Омера в Константинополі. Він попросив немовля та його матір Мейлішах Хатун приєднатися до нього в Едірне, де мало відбутися велике святкування, включаючи відтворення минулих битв..."
  flavor_tur.120.a: "Провести святкування."
  flavor_tur.120.b: "Нам не потрібні такі марнославні вистави."
  unpredictable_outcome.tt: "Це може виявитися небезпечним — або дуже вигідним."
  flavor_tur.121.title: "Катастрофа в [reenactment_location.GetNameWithNoTooltip]"
  flavor_tur.121.desc: "Святкування в [reenactment_location.GetName] обернулося катастрофою. Під час відтворення великої битви з [super_sinister_rival.GetName] куля вершника зрикошетила і влучила в [target_child.GetName], який, на жаль, помер. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] розглядають усе це як жахливий знак для майбутнього правління [target_ruler.GetName]."
  flavor_tur.121.historical_info: "Під час відтворення в Едірне первісток Османа II, Омер, загинув, найімовірніше, випадково, хоча чутки про те, що це був навмисний акт тієї чи іншої сторони, довго зберігалися. Осман II поринув у глибоке горе. Мати Омера, Мейлішах, російська наложниця, була звинувачена в нещасному випадку і відправлена у вигнання. Особистість султана тепер стала більш жорстокою, що сприяло його передчасній кончині."
  flavor_tur.121.a: "Перетворити горе на гнів."
  flavor_tur.121.b: "Накинутися на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_tur.121.c: "Шукати розради в гаремі."
  flavor_tur.122.title: "Тріумф у [reenactment_location.GetNameWithNoTooltip]"
  flavor_tur.122.desc: "Святкування в [reenactment_location.GetName] пройшло успішно, з чудовими демонстраціями захопленої зброї та великою майстерністю, продемонстрованою нашими вершниками та $janissaries_advance$, а гарматні постріли були настільки гучними, що їх було чути аж до [super_sinister_rival.GetName]. Це був великий день для [target_ruler.GetName] та [target_child.GetName]."
  flavor_tur.122.historical_info: "Хоча падіння Османа II значною мірою було зумовлене поганими рішеннями, погана вдача також зіграла свою роль. Якби він трагічно не втратив свого первістка Омера внаслідок нещасного випадку під час відтворення в Едірне, можливо, його вибір був би іншим, а його режим — успішнішим."
  flavor_tur.122.a: "Переконатися, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] це пам'ятають."
  flavor_tur.122.b: "Нехай [ROOT.GetCountry.GetGovernment.GetRulerTitle] вчиться на цьому."
  flavor_tur.122.c: "Нехай наші вороги розмірковують про нашу міць."
  flavor_tur.123.title: "[target_character.GetShortNameWithNoTooltip] Божевільний"
  flavor_tur.123.desc_opening: "[target_character.GetName] завжди був дещо ексцентричним, але тепер ходять чутки, що [target_character.GetSheHe] зовсім збожеволів. Кажуть, що [target_character.GetSheHe] ходить ночами, вигукуючи ім'я [target_character.GetHerHis] попередника в коридорах палацу, просячи звільнити [target_character.GetHerHis] від тягаря суверенітету. Могутня фракція серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] об'єдналася з [ROOT.GetCountry.Custom('GetHeadOfCabinetName')], вимагаючи [target_character.GetHerHis] усунення."
  flavor_tur.123.valide_sultan.desc: "$flavor_tur.123.desc_opening$ [valide_sultan.GetName], [valide_sultan.GetMotherFather] [ROOT.GetCountry.GetGovernment.GetRulerTitle], можна переконати погодитися, але [valide_sultan.GetSheHe] радше плануватиме падіння призначеного наступника змовників, [ruler_replacement.GetName]."
  flavor_tur.123.no_valide_sultan.desc: "$flavor_tur.123.desc_opening$ Вони хотіли б, щоб [ruler_replacement.GetName] зайняв трон замість нього."
  flavor_tur.123.historical_info: "Між 1617 і 1623 роками Мустафа I двічі ставав султаном. Але він був молодий і використовувався як маріонетка могутніми імперськими наложницями, такими як його мати Халіме, щоб їхні власні сини не були вбиті, якщо на трон зійде неправильний принц. Мустафа завжди був ексцентричним, але вбивство Османа II, який правив між двома його термінами, сильно вплинуло на нього, і він став по-справжньому нестабільним. Зрештою, спалахнуло повстання, і Мустафа був скинутий за неохочої згоди його матері."
  flavor_tur.123.a: "[target_character.GetSheHe|U] має мирно зректися престолу."
  flavor_tur.123.b: "Нехай $janissaries_advance$ розбереться з цим."
  flavor_tur.123.c: "Нехай [ruler_replacement.GetNameWithNoTooltip] буде вбитий."
  flavor_tur.123.d: "Ігнорувати ці необґрунтовані вимоги."
  tur_put_in_kafes_tt: "[target_character.GetName] ув'язнений у [ROOT.GetCountry.GetGovernment.GetAdjective] гаремі."
  flavor_tur.124.title: "Розбійники в [ShowRegionNameWithNoTooltip('anatolia_region')]"
  flavor_tur.124.desc_opening: "Мандрівні банди розбійників завдають великого лиха [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [ShowRegionName('anatolia_region')]. Багато бандитів самі походять із селян, збідніли через відсутність можливостей, і тепер вони грабують і переслідують усіх, кого можуть."
  flavor_tur.124.no_sekban.desc: "$flavor_tur.124.desc_opening$ Скасувавши систему [ShowAdvanceName('timariots')] і натомість створивши систему мушкетерів [ShowGovernmentReformName('sekban_system')], ми могли б набрати більше [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] для наших армій і таким чином полегшити кризу в [ShowRegionNameWithNoTooltip('anatolia_region')]."
  flavor_tur.124.has_sekban.desc: "$flavor_tur.124.desc_opening$ [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] пропонує пом'якшити проблему, набравши тих бандитів, які бажають спокутувати свою провину, до армійської [ShowGovernmentReformName('sekban_system')]."
  flavor_tur.124.historical_info: "Масовий приріст населення протягом XVI століття призвів до нестачі доступних земель в Анатолії, спричинивши повсюдну бідність. Деякі відчайдушні селяни приєдналися до повстань Джелалі, інші вдалися до розбійництва, ще більше посилюючи проблему. Одним із методів, який держава застосовувала для контролю над ситуацією, було вербування колишніх бандитів як мушкетерів до армійського корпусу Секбан."
  flavor_tur.124.a: "Набрати їх як мушкетерів до армії."
  flavor_tur.124.b: "Створити [ShowGovernmentReformNameWithNoTooltip('sekban_system')]."
  flavor_tur.124.c: "Нацькувати [ShowAdvanceNameWithNoTooltip('bashi_bazouks')] на сільську місцевість."
  flavor_tur.124.d: "Ця проблема перебільшена."
  anatolian_brigands_maybe_more_problems.tt: "Це може вирішити проблему розбійництва."
  anatolian_brigands_no_more_problems.tt: "Це, швидше за все, вирішить проблему розбійництва."
  anatolian_brigands_certainly_more_problems.tt: "Це майже напевно не вирішить проблему."
  flavor_tur.125.title: "Роззброєння [ShowRegionNameWithNoTooltip('anatolia_region')]"
  flavor_tur.125.desc: "Незважаючи на наші зусилля, заворушення серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [ShowRegionName('anatolia_region')] тривають. Набіги повстанців і розбійників створили параноїдальну атмосферу в сільській місцевості, де багато хто тепер сильно озброєний. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')], звичайно, стверджували б, що це для самозахисту, але їхня вогнепальна зброя та мечі могли б так само легко бути використані для допомоги майбутнім повстанням. Було б розумно роззброїти їх, поки ми ще можемо."
  flavor_tur.125.historical_info: "Османське регулювання зброї сильно відрізнялося протягом століть. Але в XVII столітті, частково через заворушення, спричинені повстаннями Джелалі, вогнепальна зброя стала поширеною серед селян в Анатолії. Прагнучи роззброїти потенційних повстанців, держава почала конфісковувати зброю та боєприпаси — лише в 1659 році було вилучено 80 000 одиниць незаконної вогнепальної зброї. Контрабандисти, однак, забезпечували, щоб вогнепальна зброя залишалася доступною в багатьох районах для тих, хто міг собі її дозволити."
  flavor_tur.125.a: "Роззброїти їх силою."
  flavor_tur.125.b: "Надати компенсацію [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  flavor_tur.125.c: "Хто тоді поповнить наші армії?"
  peasant_revolt: "$bra_peasants_revolt$"
  rebellion_dies_down_tt: "Повстання не матиме значної підтримки"
  flavor_tur.126.title: "Варварські Моряки"
  flavor_tur.126.desc: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')] висловив занепокоєння щодо нашого зростаючого морського відставання, особливо порівняно з [naval_adversary.GetName]. Щоб ефективно кинути їм виклик, нам потрібні як додаткові моряки, так і покращена підготовка. [target_country.GetName], відома як одна з Варварських держав, має багаті традиції піратства та мореплавства. Завдяки правильним поступкам ми могли б залучити їхній досвід для посилення нашого флоту."
  flavor_tur.126.historical_info: "Османи намагалися утримувати стільки ж досвідчених моряків, скільки їхні морські супротивники, особливо Венеція, яка могла черпати робочу силу зі свого великого торгового флоту. Це стало дуже очевидним у 1656 році, коли османи зазнали поразки в битві при Дарданеллах. У минулому османи значною мірою покладалися на моряків і морських командирів з Варварських держав Північної Африки, і під час морських реформ наприкінці XVII століття вони знову стали це робити."
  flavor_tur.126.a: "Покладатися на [target_country.GetNameWithNoTooltip]."
  flavor_tur.126.b: "Нам радше потрібна масштабна морська реформа."
  flavor_tur.126.c: "Нам немає користі від варварських піратів."
  flavor_tur.127.title: "Рух Кадизаделі"
  flavor_tur.127.desc: "Група [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] під проводом [kadizade.GetName] проповідує в мечетях [capital_location.GetName] і здобула масову, і #italic дуже#! побожну, підтримку. Кадизаделі, як їх називають, хочуть повернутися до віри, як вона практикувалася на початку, обмежити безрозсудні державні витрати та заборонити декаданс, такий як кава, алкоголь, пісні та танці. Проте серед еліт [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] багато хто волів би, щоб ці підривні демагоги зустріли швидкий кінець."
  flavor_tur.127.historical_info: "Радикальний консервативний рух Кадизаделі був не схожий на ваххабітів, які виникли кількома століттями пізніше, лютуючи проти так званих #italic нововведень#! у вірі, і швидко став противником суфійських орденів. Їхня ідеологія набула поширення під час правління Мурада IV та Мехмеда IV, коли вони проповідували навіть у Святій Софії. Вони втратили прихильність після призначення великого візира Мехмеда Кьопрюлю, який вважав їх загрозою для держави, і провідні члени групи були вислані на Кіпр."
  flavor_tur.127.a: "Вигнати цих дурнів."
  flavor_tur.127.b: "Вони таки мають рацію..."
  flavor_tur.128.title: "Епоха [ROOT.GetCountry.Custom('GetHeadOfCabinetName')]"
  flavor_tur.128.desc.opening: "Забезпечивши собі посаду [ROOT.GetCountry.Custom('GetHeadOfCabinetName')], [target_character.GetName] далі прагне змусити замовкнути всіх [target_character.GetHerHis] опонентів. [target_character.GetSheHe|U] просить надати ще більше влади [target_character.GetHerHis] відомству, щоб [target_character.GetSheHe] міг невтомно працювати на благо династії [target_ruler.GetDynasty.GetName]."
  flavor_tur.128.valide_sultan.desc: "$flavor_tur.128.desc.opening$ [valide_sultan.GetName] рішуче підтримує цю пропозицію, оскільки в багатьох питаннях [target_character.GetNameWithNoTooltip] звітував [valide_sultan.GetHerHim]."
  flavor_tur.128.no_valide_sultan.desc: "$flavor_tur.128.desc.opening$ Це обмежило б особисту владу [ROOT.GetCountry.GetGovernment.GetRulerTitle], який міг би проводити [target_ruler.GetHerHis] дні на полюванні та в подорожах, тоді як важливі справи вирішували б більш досвідчені [target_character.GetWomenMen]."
  flavor_tur.128.historical_info: "Як великий візир, Мехмед Кьопрюлю швидко здобув безпрецедентну владу. Він переконав молодого султана Мехмеда IV переїхати до старої столиці Едірне, таким чином усунувши його від управління державою. Хоча Кьопрюлю покладався на підтримку Турхан, валіде-султан, він також вжив заходів для обмеження її влади. Після його смерті в 1661 році він переконав султана дозволити його синові Фазилу Ахмеду замінити його на посаді великого візира. Багато великих візирів династії Кьопрюлю підуть за ним, і протягом кількох десятиліть часто домінуватимуть в османській політиці."
  flavor_tur.128.a: "Держава буде в безпеці в [target_character.GetHerHis] руках."
  flavor_tur.128.b: "[target_character.GetSheHe|U] вже має достатньо влади."
  nobles_revolt: "Розлючені шляхтичі"
  flavor_tur.129.title: "Велика пожежа [GetCurrentYear]"
  flavor_tur.129.desc: "Спустошлива пожежа охопила [target_location.GetName], пройшлася [target_location.GetRank.GetName] наче вороже військо. Десятки, а то й сотні тисяч старих дерев'яних будинків знищено, і Старий [ShowReligionAdjective('judaism')] квартал особливо постраждав. [grand_vizier.GetName] прагне наглядати за відбудовою, але має нову ідею, як її профінансувати. [grand_vizier.GetSheHe|U] хотів би заборонити відбудову багатьох зруйнованих церков та синагог, натомість виставити ці ділянки на аукціон справжнім [ShowReligionGroupAdjective('muslim')] громадянам."
  flavor_tur.129.historical_info: "Велика пожежа 1660 року спустошила значні частини Константинополя, серед іншого багато церков та синагог. Після цього Вані Мехмед Ефенді, проповідник радикального ісламського руху Кадизаделі, заявив, що непропорційне знищення єврейського майна було покаранням від Аллаха. Хоча християнам зрештою дозволили викупити землю своїх згорілих церков, євреям пощастило менше. Великий візир Кьопрюлю Фазил Ахмед, схоже, прислухався до Кадизаделі і конфіскував усі ділянки синагог."
  flavor_tur.129.a: "Це добра ідея."
  flavor_tur.129.b: "Ні, ми поважаємо всі віри."
  constantinople_fire_event.a.tt: "$constantinople_fire_event.b.tt$ З нашими інвестиціями в [Concept('location', 'CONCEPT_PLACEHOLDER')|e] нам буде легше відбудовувати."
  constantinople_fire_event.b.tt: "[Concept('target_location.GetName] втратить [prosperity', 'CONCEPT_PLACEHOLDER')|e], втратить [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] будуть знищені катастрофою."
  flavor_tur.129.a.tt: "Усі наші [ShowReligionAdjective('judaism')] та [ShowReligionGroupAdjective('christian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.129.b.tt: "Усі наші [ShowReligionAdjective('judaism')] та [ShowReligionGroupAdjective('christian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.130.title: "Доктрина Розуму"
  flavor_tur.130.desc: "Багато вчених, схоже, нещодавно покинули [scholars_location.GetName] у [ShowRegionName('persia_region')], можливо, щоб уникнути переслідувань або місцевих економічних негараздів. Після довгих подорожей велика група з них прибула до воріт [capital_location.GetName], просячи про проживання. Натомість вони пообіцяли невтомно працювати на благо [ROOT.GetCountry.GetName]. Але ці люди — віддані раціоналісти, зацікавлені в #italic тахкік#!, емпіричному підході до світу, який деякі лідери серед наших [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вважають безбожним."
  flavor_tur.130.historical_info: "Хоча іноді стверджувалося, що консервативний вплив руху Кадизаделі гальмував османське інтелектуальне життя, це не обов'язково було так. На початку 17 століття також спостерігався великий приплив вчених з Курдистану та Ірану, які виступали за відродження раціональних наук минулого. Вони наголошували на верифікації, тахкіку, старому понятті, яке часто протиставлялося імітації, такліду, і було впливовим у пізньосередньовічній ісламській науці."
  flavor_tur.130.a: "Прийміть їх."
  flavor_tur.130.b: "Тримайте ворота [capital_location.GetRank.GetNameWithNoTooltip] зачиненими."
  flavor_tur.131.title: "Вівці серед вовків"
  flavor_tur.131.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та містяни дедалі більше розчаровані привілеями, якими довго користувалися державні службовці. У [janissary_location.GetName] надходять повідомлення, що самі [ShowBuildingTypeName('janissary_barracks')] були інфільтровані амбітними купцями, які використали свої зв'язки, щоб стати частиною ордену і таким чином отримати доступ до статусу, яким користуються його члени. Безумовно, це може принести економічні вигоди Високій Порті, якщо ми дозволимо цьому тривати, але це також може зменшити авторитет і майстерність $janissaries_advance$, які століттями були грізною силою на полі бою."
  flavor_tur.131.historical_info: "16-17 століття відзначилися зростанням економічного та політичного плюралізму в Османській державі. Привілейовані посади, які раніше займали виключно чоловіки з системи Девширме, тепер іноді могли бути отримані людьми з фінансовою кмітливістю з середніх класів. Яскравим прикладом цього був яничарський корпус, до якого торговці та ремісники почали проникати, щоб отримати частину привілеїв, якими він користувався."
  flavor_tur.131.a: "Гроші — найважливіше."
  flavor_tur.131.b: "$janissaries_advance$ є священними."
  flavor_tur.132.title: "Реформа $ottoman_tax_farming$ [GetCurrentYear]"
  flavor_tur.132.desc: "Розмірковуючи над нашою економікою, [grand_vizier.GetName] підготував нову систему відкупу податків, названу #italic Малікане#!. Село або район буде виставлено на аукціон тому, хто запропонує найвищу ціну, який потім матиме право оподатковувати його довічно. Це покращить нашу стару систему, стверджує [grand_vizier.GetSheHe], зробивши відкупника податків більш зацікавленим у довгостроковому добробуті своїх земель і менш схильним виснажувати їх до закінчення свого терміну. Це також позбавить нас бюрократичних клопотів з адміністрування всіх тих однорічних контрактів, які були нормою в минулі часи — але з іншого боку, вони були досить прибутковими."
  flavor_tur.132.historical_info: "Система Малікане була запроваджена в 1695 році нещасливим великим візиром Елмасом Мехмедом Пашою. Він, схоже, мав добрі наміри, бажаючи покращити довгострокові економічні вигоди, але частково зазнав невдачі. Система зустріла запеклий опір з боку старого покоління відкупників податків, а державний нагляд за новим типом довічних грантів був відсутній. Незважаючи на реформу, держава незабаром зіткнулася з військовими втратами і мала труднощі з оплатою своїх солдатів. Елмас був убитий своїми людьми в 1697 році, а в 1703 році неоплачувані яничари скинули Мустафу II."
  flavor_tur.132.a: "Впровадити цю реформу."
  flavor_tur.132.b: "Оподатковувати їх по-старому."
  malikane_available.tt: "[ShowGovernmentReformName('ottoman_malikane_tax_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] стане доступною."
  flavor_tur.133.title: "Ціна науки"
  flavor_tur.133.desc: "Багатьом вченим серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] стає все важче знайти роботу. Хоча на каді завжди є попит, ці посади бажані та висококонкурентні, і їх недостатньо для всіх. Батьки тепер радять своїм синам не ставати вченими, і, можливо, навіть взагалі не навчатися в [ShowBuildingTypeName('madrasa')]. Вони сумують, кажуть вчені, за часами Алі аль-Каушаджі та Такі ад-Діна, коли держава ще цінувала науку всіх видів."
  flavor_tur.133.historical_info: "У XVII столітті можливості для османських вчених зменшилися. У Константинополі було багато медресе, і, отже, не бракувало доступу до освіти, але роки економічних негараздів призвели до зниження зарплат, а разом з ними й загальної пристрасті до абстрактної науки. Наукові заняття стали складним і не дуже прибутковим вибором кар'єри, і ті, хто міг би бути талановитим у таких галузях, все частіше обирали стати торговцями, ремісниками або бюрократами."
  flavor_tur.133.a: "Це було неминуче."
  flavor_tur.133.b: "Ми повинні інвестувати в науку."
  flavor_tur.134.title: "Війна за [target_province.GetNameWithNoTooltip]"
  flavor_tur.134.desc: "Конвой кораблів, що перевозив важливих паломників до [ShowLocationName('mecca')], зазнав підступного нападу піратів. Серед убитих були колишній головний євнух, каді [ShowLocationName('cairo')] та няня [ROOT.GetCountry.GetGovernment.GetRulerTitle] [target_ruler.GetHerselfHimself]. Після цього пірати пришвартувалися в порту поблизу [ShowLocationName('candia')] на [target_province.GetName]. Цей острів давно був занозою в нашому боці, і фракції при [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер закликають до війни з [target_country.GetName]. Але [objecting_vizier.GetName] категорично проти, кажучи, що це надзвичайно зашкодить нашим фінансам."
  flavor_tur.134.historical_info: "У середині XVII століття венеціанська влада занепадала, і османи давно прагнули захопити Крит, що перебував під контролем Венеції. Коли лицарі Мальти напали на кораблі, що перевозили важливих паломників, а пізніше висадили деяких своїх полонених як рабів на Криті, це дало османам ідеальний привід для війни з Венецією. Але ця війна стала дуже довгою та дуже дорогою справою, довівши правоту великого візира Семіза Мехмеда-паші, коли він заперечував проти неї, попри потужні войовничі фракції при дворі."
  flavor_tur.134.a: "Ігнорувати [objecting_vizier.GetHerHim] — це означає війну."
  flavor_tur.134.b: "Скарбниця має бути на першому місці."
  flavor_tur.135.title: "Неприємні впливи на [target_ruler.GetShortNameWithNoTooltip]"
  flavor_tur.135.desc: "[target_ruler.GetShortName] останнім часом почувався досить погано і почав цінувати товариство різних людей, які, здається, більше зацікавлені у власній вигоді, ніж у добробуті нашого [ROOT.GetCountry.GetFlavorRank]. Серед них найпершим є [cinci_hoca.GetWomanMan] на ім'я [cinci_hoca.GetName], самопроголошений спіритуаліст і цілитель, якого багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] відкидає як шарлатана. Але [ROOT.GetCountry.GetGovernment.GetRulerTitle] хоче піднести [cinci_hoca.GetHerHim] до високої посади і зробити те саме для інших владолюбців, які оточують [target_ruler.GetHerHim]."
  flavor_tur.135.historical_info: "Ібрагім був слабким і психічно нестабільним султаном, що не дивно, враховуючи жорстокий придворний клімат, у якому він виріс, де більшість його братів були вбиті. Він швидко потрапив під вплив своєї могутньої матері, Кесем Султан, а також безлічі невідповідних людей, які прагнули ним маніпулювати. До них належали фрейліна Шекерпаре Хатун, адмірал Сілахдар Юсуф-паша та Джінчі Ходжа, шарлатан і знахар, який стверджував, що може вилікувати хвороби султана. Ця група зрештою здобула величезний вплив."
  flavor_tur.135.a: "Що б не було потрібно [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  flavor_tur.135.b: "Вигнати цих дурнів з [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tur.135.c: "$janissaries_advance$ повинні скинути [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_tur.136.title: "[target_character.GetShortNameWithNoTooltip] Марнотратний"
  flavor_tur.136.desc: "Оскільки [target_character.GetShortName] досі не має спадкоємця, зростає відчуття, що [ROOT.GetCountry.GetFlavorRank] перебуває в небезпеці. Але [target_character.GetHerHis] [valide_sultan.GetMotherFather] [valide_sultan.GetName] має план, як вирішити ситуацію, перш ніж вона перетвориться на кризу. Добре відомо, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] любить шовк, хутро, коштовності — і огрядних жінок. Забезпечуючи [target_character.GetHerHim] усім цим, ми можемо тримати [target_character.GetHerHim] зайнятим у гаремі, переконатися, що [target_character.GetSheHe] не надто втручається в державні справи, а також забезпечити майбутнє дому [target_character.GetDynasty.GetName]."
  flavor_tur.136.historical_info: "Через вбивство своїх братів, коли Ібрагім зійшов на престол, він був останнім чоловічим членом Османської династії. Його могутня мати, Кесем, прагнула вирішити цю проблему, забезпечуючи його рабинями-наложницями та розкошами, що також допомагало тримати його під її контролем. Ібрагім мав щонайменше двадцять дітей і таким чином врятував Османську династію, але його любов до марнотратства та численні привілеї, які він надавав своїм улюбленим наложницям і поплічникам, сприяли його передчасній смерті."
  flavor_tur.136.a: "[valide_sultan.GetMotherFather] завжди знає краще."
  flavor_tur.136.b: "Ні, ми краще довіримося [ROOT.GetCountry.GetReligion.GetGodName]."
  flavor_tur.137.title: "Судді Вірних"
  flavor_tur.137.desc: "#italic Каді#!, судді у всіх важливих для [ShowReligionGroupAdjective('muslim')] людей справах, давно були опорою держави, а посада каді — мрією багатьох вчених. Але з останніми досягненнями в управлінні та податковому відкупі, каді тепер прагнуть більшої автономії над земельними наділами #italic Кадилук#!, за які вони відповідають. Надання їм цього, вони припускають, принесе користь нашій претензії на першість над усіма [ShowReligionGroupNameWithNoTooltip('muslim')] і назавжди збільшить довіру між ними та Високою Портою."
  flavor_tur.137.historical_info: "Османська імперія XVII століття спостерігала поступове ослаблення влади султана, причому все більше впливу надавалося таким інституціям, як яничари та каді. Кадилук був юрисдикцією, наданою каді, і в ній він наглядав як за оподаткуванням, так і за військовим призовом. Через кадилуки каді могли мати значний вплив, особливо в провінціях за межами безпосередніх центрів королівської влади, і їхній статус досяг нового піку після Едірнського інциденту 1703 року, коли султан Мустафа II був скинутий."
  flavor_tur.137.a: "Вони заслуговують нашої довіри."
  flavor_tur.137.b: "Вони вже достатньо могутні."
  has_enabled_kadiluks_privilege: "Увімкнув цей [Concept('estate_privilege', 'CONCEPT_PLACEHOLDER')|e] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e] '$flavor_tur.137.title$'"
  flavor_tur.138.title: "Брак писарів"
  flavor_tur.138.desc: "Наша бюрократія, $late_ottoman_bureaucracy$, стала величезним механізмом писарів, бухгалтерів та чиновників, відданих забезпеченню стабільності [ROOT.GetCountry.GetFlavorRank]. Але бюрократія потребує старанних писарів з чудовим володінням писемним словом, і їм стає все важче знайти таких людей. Високопоставлені чиновники в бюрократії благають про більше державного фінансування, застерігаючи нас, що зараз багато крісел в їхніх офісах порожні, а полиці вкриті пилом."
  flavor_tur.138.historical_info: "У 17 столітті Османська імперія перетворилася з патрімоніальної держави, зосередженої на особистій владі султана, на бюрократичну імперію, зосереджену на її інституціях. Ключовою частиною цього було розширення імперської бюрократії, яка швидко зростала і згодом була перенесена з палацу Топкапи, щоб стати більш незалежною. Набір кваліфікованих писарів завжди був пріоритетом, оскільки рукописні документи все ще були нормою."
  flavor_tur.138.a: "Вони отримають нашу повну підтримку."
  flavor_tur.138.b: "Натомість інвестувати в $janissaries_advance$."
  flavor_tur.138.c: "Навіщо нам знову бюрократія?"
  flavor_tur.139.title: "Реформи [kemankes.GetNameWithNoTooltip]"
  flavor_tur.139.desc: "[kemankes.GetName] старанно працював над багатьма реформами. [kemankes.GetSheHe|U] хоче розширити флот, одночасно скорочуючи розмір армії та зосереджуючись на її навчанні та будівництві укріплень у віддалених провінціях. Більш масштабним завданням буде реорганізація фінансів [ROOT.GetCountry.GetFlavorRank], зосереджена на боротьбі з корупцією та забезпеченні встановлених державою цін на товари на місцевих ринках, що надасть більший економічний контроль Високій Порті. Але [kemankes.GetSheHe] нажив багато ворогів у [ROOT.GetCountry.GetGovernment.GetAdjective] гаремі, з якими, можливо, доведеться розібратися, якщо ідеї [kemankes.GetHerHis] будуть реалізовані."
  flavor_tur.139.historical_info: "Кеманкеш Кара Мустафа-паша був як блискучим, так і безжальним, не схожим на деяких своїх супротивників при дворі. Його реформи включали скорочення розміру яничарського та сипахійського корпусів, а також велику спробу спрямувати османську економіку в більш меркантилістський напрямок. Він реорганізував всю країну, щоб спробувати зменшити зловживання податкових чиновників проти простого народу, але також запровадив суворі покарання за порушення його нової політики. Але він перегнув палицю, коли спробував підняти яничарів проти королеви-матері Кьосем та інших людей, близьких до султана Ібрагіма, і був страчений у 1644 році."
  flavor_tur.139.a: "Ці зміни необхідні."
  flavor_tur.139.b: "[kemankes.GetSheHe|U] може бути занадто амбітним..."
  flavor_tur.140.title: "$tulip_period$"
  flavor_tur.140.desc: "Настала нова епоха. Художники, поети та архітектори надихалися як класичним [ShowCultureName('turkish_culture')] мистецтвом, так і новими рухами в [ShowContinentName('europe')], створюючи твори з квітковою, витонченою красою. Тюльпани цвітуть у кожному саду, і відчувається оновлена надія на майбутнє. Час здається слушним, щоб скористатися цим новим настроєм і впровадити реформи, щоб спрямувати весь [ROOT.GetCountry.GetFlavorRank] у новому напрямку, відкриваючи кращі дипломатичні зусилля та торговельні можливості, які, безсумнівно, принесуть нам величезну користь у майбутньому."
  flavor_tur.140.historical_info: "Період тюльпанів, #italic Lale Devri#!, — це назва, дана короткій, мирній ері між 1718 і 1730 роками, яка ознаменувалася відродженням османського мистецтва та архітектури. Великий візир Невшехірлі Дамат Ібрагім-паша впровадив нову політику, зосереджену на покращенні зовнішніх відносин та торгівлі, а художники та архітектори черпали натхнення з європейського бароко, використовуючи квітковий та витончений стиль. Тюльпан мав довгу історію в османському мистецтві, але став особливо помітним у новому русі, давши назву всій ері."
  flavor_tur.140.a: "Так, ми повинні дивитися вперед."
  flavor_tur.140.b: "Чинити опір цим язичницьким впливам."
  flavor_tur.141.title: "Сила друку"
  flavor_tur.141.desc: "[muteferrika.GetName] багато років вірно служив нам як дипломат, але справжньою пристрастю [muteferrika.GetHerHis] завжди було навчання, і [muteferrika.GetSheHe] довго вивчав історію [ShowContinentName('europe')]. Тепер [muteferrika.GetSheHe] хоче заснувати друкарню в [capital_location.GetName], використовуючи новий винахід, який лише нещодавно почав поширюватися в [ROOT.GetCountry.GetFlavorRank]: рухомі літери [ShowLanguageName('arabic_language')]. Але деякі з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] категорично проти цього, кажучи, що це зруйнує мистецтво каліграфії, яке довго цінувалося серед побожних."
  flavor_tur.141.historical_info: "Хоча єврейські друкарні були присутні в Османській імперії протягом століть, друкарні з рухомим арабським шрифтом почали з'являтися лише у 18 столітті. Ібрагім Мутеферріка був угорським дипломатом і вченим, який у 1726 році подав прохання до двору про дозвіл друкувати нерелігійні книги в Константинополі. Згодом він опублікував 23 томи протягом двох десятиліть, серед них словник, атлас та різні наукові та історичні праці."
  flavor_tur.141.a: "Прийняти цей розвиток."
  flavor_tur.141.b: "Стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  muteferrika_forgotten.tt: "[muteferrika.GetNameWithNoTooltip] відступає в невідомість."
  flavor_tur.142.title: "Скарги писарів"
  flavor_tur.142.desc: "Друкарський верстат з рухомими літерами, запроваджений [muteferrika.GetName], став благом для навчання, але стикається з новою опозицією з боку багатьох писарів серед $ottoman_bureaucracy$ та $late_ottoman_bureaucracy$. Побоюючись, що він повністю витіснить їхню роботу, вони тепер вимагають закрити друкарню, і знайшли підтримку серед бунтівної групи $janissaries_advance$. Ми можемо зіткнутися з повстанням, якщо не погодимося, але що таке друкарський верстат порівняно зі стабільністю [ROOT.GetCountry.GetFlavorRank]?"
  flavor_tur.142.historical_info: "Друкарня Ібрагіма Мютеферріки проіснувала лише кілька десятиліть. Серед її недоброзичливців були не лише деякі з улемів, а й багато писарів, впливових у бюрократії, які турбувалися, що їхня справа буде зруйнована. Це зрештою змусило султана Ахмеда III закрити друкарню. Десятиліттями пізніше британський дипломат Джеймс Маріо Матра зробив ще одну спробу заснувати нову друкарню в Стамбулі, але зіткнувся з подібною опозицією, і він також зазнав невдачі."
  flavor_tur.142.a: "$flavor_tur.16.b$"
  flavor_tur.142.b: "Друкарня прийшла, щоб залишитися."
  flavor_tur.143.title: "Залізний замок"
  flavor_tur.143.desc: "Гори та пагорби [ShowCultureName('kurdish_culture')] народу є оплотом нашого [ROOT.GetCountry.GetFlavorRank], залізним замком, викуваним самою землею. Але місцеві [ShowCultureNameWithNoTooltip('kurdish_culture')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] прагнуть більшої автономії, обіцяючи докласти ще більше зусиль для укріплення та розвитку [kurdish_stronghold_location.GetName], якщо ми надамо їм значну ступінь незалежності в їхніх місцевих справах. Однак це викличе заздрість інших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] під нашим правлінням."
  flavor_tur.143.historical_info: "Курдистан був важливою територією для османів як зі стратегічних, так і з економічних причин. Розташований на кордоні з їхніми іранськими заклятими ворогами, гірський регіон забезпечував чудову оборону, але в копальнях Кебан-Ергані він також мав одні з найкращих ресурсів срібла в імперії. Ранні османські султани вирішили надати місцевим курдським дворянам особливо велику ступінь автономії, систему, яка зберігалася до централізаційних зусиль 19 століття."
  flavor_tur.143.a: "[ShowCultureNameWithNoTooltip('kurdish_culture')] важливі."
  flavor_tur.143.b: "Нам потрібен більший контроль, а не менший."
  kurds_pleased_tooltip: "Усі наші [ShowCultureName('kurdish_culture')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  kurds_displeased_tooltip: "Усі наші [ShowCultureName('kurdish_culture')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], але [ShowCultureNameWithNoTooltip('kurdish_culture')] локації з пагорбами або горами отримають [Concept('control', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.144.title: "Скромність у небезпеці"
  flavor_tur.144.desc: "З настанням $tulip_period$ зростає любов до всього з [ShowContinentName('europe')], і особливо до одягу, який почали носити жінки [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Багато [ShowReligionGroupAdjective('muslim')] та [ShowReligionGroupAdjective('christian')] жінок тепер вільно спілкуються одна з одною, а іноземні західні дами високого рангу часто відвідують [ROOT.GetCountry.GetGovernment.GetAdjective] гарем. Все це може бути нешкідливим, і ці нові свободи та насолоди дуже подобаються жінкам [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], але [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] стурбовані скромністю та смиренністю, які повинні виявляти всі [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] жінки, і закликають до повернення до суворіших норм."
  flavor_tur.144.historical_info: "Османська культура мала історію занепокоєння щодо інтимних контактів мусульманських жінок з християнськими жінками, особливо в #italic Hammam#! лазнях, де вважалося, що християнські жінки можуть мати підривний вплив на скромність і мораль. Але $tulip_period$ ознаменувався посиленням контактів між високопоставленими османськими жінками та західними жінками, наприклад, леді Мері Вортлі Монтегю, дружиною англійського посла. Хоча участь жінок у громадських заходах зросла в цей період, також були відгуки консервативних сил, що, наприклад, призвело до заборони жінкам входити до магазинів #italic Kaymak#!."
  flavor_tur.144.a: "Це нові часи, ми повинні їх прийняти."
  flavor_tur.144.b: "Ми повинні захищати мораль за будь-яку ціну."
  flavor_tur.145.title: "Викуп з [ShowAreaNameWithNoTooltip('iceland_area')]"
  flavor_tur.145.desc: "Деякий час тому корсари з держав Варварського узбережжя здійснили набіг на [raid_location.GetName] на [ShowAreaName('iceland_area')], безлюдному острові далеко в Атлантиці. Вони повернулися на невільницькі ринки [barbary_location.GetName] з багатьма світлошкірими полоненими. Але деяким викраденим вдалося зібрати величезні суми грошей для викупу, і [target_country.GetGovernment.GetRulerTitle] [target_country.GetName] також зробив внесок зі [iceland_ruler.GetHerHis] особистої скарбниці, твердо, але ввічливо просячи нас використати наш вплив у [barbary_location.GetNameWithNoTooltip], щоб звільнити [iceland_ruler.GetHerHis] підданих."
  flavor_tur.145.historical_info: "Після Дванадцятирічного перемир'я 1609 року багато іспанських, голландських та англійських моряків знайшли нову роботу у варварських піратів і навчили їх плавати у відкритому океані. Варварські пірати згодом здійснювали набіги в Атлантику і кілька разів нападали на Мадейру, Ірландію, Ісландію та Фарерські острови. Але багато ісландських полонених, яких привезли до Алжиру після великих набігів рабів у 1627 році, зрештою були викуплені. Священик на ім'я Олафур Егілссон був звільнений своїми викрадачами, щоб збирати кошти для таких викупів, а пізніше втрутився і данський король."
  flavor_tur.145.a: "Ми люб'язно приймемо."
  flavor_tur.145.b: "Ми повинні мати більше набігів рабів, а не менше!"
  slaves_released: "Звільнені раби, несправедливо захоплені."
  slaves_sent_home.tt: "Більшість рабів [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [barbary_location.GetNameWithNoTooltip] повернуться до [raid_location.GetNameWithNoTooltip]."
  flavor_tur.146.title: "Дерево трупів"
  flavor_tur.146.desc: "Група $janissaries_advance$ стукає у двері [ROOT.GetCountry.GetGovernment.GetAdjective] палацу, вимагаючи відшкодування за уявні кривди. Вони мають довгий список скарг і такий же довгий список чиновників, яких вони вважають відповідальними за свої біди. Вони вже почали хапати людей зі списку і вішати їх на сусідньому дереві #italic çınar#!. Вони вимагають, щоб ми видали [minister_1.GetName] та [minister_2.GetName], яких вони звинувачують у затримці їхніх зарплат і загалом у завданні великих неприємностей [ROOT.GetCountry.GetFlavorRank]."
  flavor_tur.146.historical_info: "Інцидент з Чінаром стосувався незадоволених солдатів, які поверталися з Критської війни 1656 року і вважали, що не отримали належних їм зарплат. Вони тиснули на молодого султана Мехмеда IV та його могутню матір, Турхан, показуючи список з 30 чиновників, яких вони вважали відповідальними за занепад економіки імперії, і вимагали видати цих людей. Султан погодився звільнити деяких людей зі списку, але як тільки повстанці дістали їх, їх повісили. Після цього інциденту Турхан побачила необхідність у більш здібній адміністрації і призначила Кьопрюлю Мехмеда-пашу великим візиром."
  flavor_tur.146.a: "Видайте обвинуваченого."
  flavor_tur.146.b: "Відкупіться від них."
  flavor_tur.146.c: "Ми повісимо їх на їхньому власному дереві."
  flavor_tur.147.title: "Доми Мудрості"
  flavor_tur.147.desc: "[library_enthusiast.GetName] має пристрасть до навчання і бажає присвятити [library_enthusiast.GetHerHis] благодійні починання чомусь іншому, ніж мечетям. [library_enthusiast.GetSheHe|U] пропонує інвестувати в новий стиль [ShowBuildingTypeName('library')], побудований у грандіозному та вишуканому стилі, але доступний для громадськості, щоб кожен у [ROOT.GetCountry.GetFlavorRank] отримав доступ до мудрості, яку він містить. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] цінували б такі можливості, але багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] не надто прихильні до цієї ідеї, бачачи мало сенсу в заохоченні навчання серед людей нижчого стану."
  flavor_tur.147.historical_info: "До кінця XVII століття єдиними публічними бібліотеками в Османській імперії були невеликі заклади при мечетях та благодійних організаціях. Хоча існувало багато архівів, вони не були широко доступними, і величезні літературні скарби лежали забутими в сховищах, таких як Каїрська Ґеніза. Бібліотека Кьопрюлю, побудована в Константинополі в 1678 році, була першою публічною бібліотекою на Близькому Сході, а згодом Епоха тюльпанів започаткувала будівельний бум окремо розташованих бібліотек з книгосховищем та читальним залом, різною мірою натхненних європейською класичною архітектурою."
  flavor_tur.147.a: "Це вартий проєкт."
  flavor_tur.147.b: "Ми зосередимося на мечетях, як і завжди."
  flavor_tur.148.title: "Кров на шовку"
  flavor_tur.148.desc: "Суперництво між [valide_sultan.GetName], Валіде-султан, та [haseki_sultan.GetName], улюбленою наложницею [target_ruler.GetShortName], стало смертельно серйозним. [valide_sultan.GetNameWithNoTooltip] довгий час була потужною фігурою при [ROOT.GetCountry.GetGovernment.GetCourtTitle], але відбувся зсув влади, коли Головний Чорний Євнух раптово став на бік [haseki_sultan.GetShortNameWithNoTooltip]. Вони готові увійти до гарему і покінчити з владою Валіде-султан раз і назавжди, дуже кривавим способом. Однак [valide_sultan.GetShortNameWithNoTooltip] не збирається здаватися і намагається змусити [valide_sultan.GetHerHim] [target_ruler.GetDaughterSon] натомість убити [target_ruler.GetHerHis] улюбленицю."
  flavor_tur.148.historical_info: "Бурхливий період Жіночого султанату завершився суперництвом між Кесем, яка десятиліттями володіла великою владою як Валіде-султан, і Турхан, Хасекі-султан сина Кесем Ібрагіма I. Кесем була дуже політично підкованою, але її союз з яничарами змусив її ворогів заохочувати амбіції Турхан, і молодша жінка почала змовлятися проти Кесем за допомогою Сулеймана Аги, Головного Чорного Євнуха. Зрештою сотні євнухів і яничарів зіткнулися всередині гарему, але партія Кесем була в меншості і втекла, а поважну Валіде-султан схопили і задушили — дехто каже, її власними косами."
  flavor_tur.148.a: "Підтримати наложницю."
  flavor_tur.148.b: "Хай живе королева-мати."
  flavor_tur.149.title: "Євнухи [ShowLocationNameWithNoTooltip('cairo')]"
  flavor_tur.149.desc: "У [ShowLocationName('cairo')] назрівають проблеми через заворушення в далекому [rebellion_location.GetName]. Оскільки багато наших колишніх чорних гаремних євнухів вийшли на пенсію з великим багатством у [ShowLocationNameWithNoTooltip('cairo')], тепер на вулицях юрби кричать, що політично вправні євнухи повинні самі вирушити до [rebellion_location.GetNameWithNoTooltip], замість того, щоб очікувати, що [ShowCultureName('lower_egyptian_culture')] народ пошле своїх синів для придушення повстання. Але літні євнухи вважають це необґрунтованим і пообіцяли присвятити більше ресурсів добробуту [ShowLocationNameWithNoTooltip('cairo')], якщо ми утримаємося від їх відправлення."
  flavor_tur.149.historical_info: "Термін служби гаремного євнуха не був довічним. За традицією, чорні євнухи на старості років виходили на пенсію в Каїрі, де вони володіли як багатством, так і впливом. Єгипет відігравав символічну роль у житті цих чоловіків, оскільки їх часто кастрували та навчали в Єгипті після того, як їх брали в рабство в Ефіопії. У 1654 році в Хабеші, османській Еритреї, спалахнуло повстання, і губернатора в Каїрі попросили мобілізувати війська. Це призвело до протесту, де каїрці, очевидно, вважали, що заможні євнухи на пенсії, які мали особисті зв'язки з Хабешем, повинні поїхати туди і самі вирішити ситуацію."
  flavor_tur.149.a: "Євнухи заслуговують на пенсію."
  flavor_tur.149.b: "Відправити їх до [rebellion_location.GetNameWithNoTooltip]."
  cairenes_displeased_tooltip: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] не вищого класу, за винятком [ShowPopTypeName('slaves')] у [ShowLocationName('cairo')], втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  cairenes_pleased_tooltip: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] не вищого класу, за винятком [ShowPopTypeName('slaves')] у [ShowLocationName('cairo')], отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.150.title: "Ображений Слуга"
  flavor_tur.150.desc: "Літній євнух на ім'я [yusuf_agha.GetName] колись служив попереднику [target_ruler.GetName], але тепер впав у бідність і злидні, стверджуючи, що його несправедливо вигнали внаслідок змови при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Якщо Висока Порта все ще має почуття справедливості, каже [yusuf_agha.GetSheHe], ми повинні відновити частину [yusuf_agha.GetHerHis] ресурсів і слуг, щоб [yusuf_agha.GetSheHe] міг принаймні комфортно дожити [yusuf_agha.GetHerHis] дні в [ShowLocationName('cairo')], і там працювати на благо [target_location.GetRank.GetName] та [ROOT.GetCountry.GetFlavorRank]."
  flavor_tur.150.historical_info: "Юсуф Ага був Кислар-агою, Головним Чорним Євнухом, Мехмеда IV, і, судячи з усього, був дуже здібною людиною. Коли султана скинули через програш у Війні Священної Ліги, Юсуф Ага став винним за асоціацією, і всі його володіння були конфісковані та продані повстанцями. Йому довелося піти на пенсію в бідності до Єгипту, нарікаючи, що він, хто колись був головним гаремним євнухом, тепер став «африканським рабом за 10 курушів»."
  flavor_tur.150.a: "[yusuf_agha.GetHerHis|U] нещастя — не наша проблема."
  flavor_tur.150.b: "Деяка компенсація, здається, доречна."
  flavor_tur.150.c: "[yusuf_agha.GetSheHe|U] може спокутувати [yusuf_agha.GetHerselfHimself] знову працюючи на нас."
  yusuf_agha_retires_in_poverty.tt: "[yusuf_agha.GetNameWithNoTooltip] іде на пенсію в бідності."
  yusuf_agha_retires_in_splendor.tt: "[yusuf_agha.GetNameWithNoTooltip] іде на пенсію в розкоші."
  flavor_tur.151.title: "Краса літер"
  flavor_tur.151.desc: "[hafiz_osman.GetName] — вправний каліграф і типограф, який довго навчав як багатих, так і бідних, і зробив кілька нововведень у цьому виді мистецтва. Походячи з поважної родини [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], його роботи [hafiz_osman.GetHerHis] були визнані як чудовими, так і побожними. Тепер [hafiz_osman.GetSheHe] пропонує навчати синів [target_ruler.GetShortName] мистецтву створення красивих і витончених літер, але, звісно, не безкоштовно."
  flavor_tur.151.historical_info: "Хафіз Осман був одним з найвидатніших каліграфів в історії Османської імперії. Він навчав султанів Ахмеда II, Мустафу II та Ахмеда III, а також давав уроки бідним. Каліграфія була дуже шанованим і цінним видом мистецтва в ісламському світі, але Хафіз майстерно поєднував інновації та повагу до традицій. Його шаблон для художньої форми Хільє, абстрактних зображень Мухаммеда, став стандартом в Османській імперії."
  flavor_tur.151.a: "Цей [hafiz_osman.GetWomanMan] геніальний."
  flavor_tur.151.b: "Каліграфія вже була досконалою."
  hafiz_osman_retires.tt: "[hafiz_osman.GetNameWithNoTooltip] залишається в безвісті."
  flavor_tur.152.title: "Червоні монети"
  flavor_tur.152.desc: "Знову наші солдати скаржаться на свою зарплату, стверджуючи, що їм платять знеціненими #italic червоними монетами#!, і економіка [ROOT.GetCountry.GetFlavorRank] безумовно не в ідеальному стані. Але наші радники пропонують радикальну грошову реформу. Якби ми заборонили всі іноземні монети, ми могли б переплавити їх і випустити як нову валюту, і таким чином боротися з інфляцією та зробити великі кроки до більш контрольованих державних фінансів. Однак це зашкодило б нашій торгівлі в короткостроковій перспективі."
  flavor_tur.152.historical_info: "Османська срібна монета акче зрештою була настільки знецінена, що її вартість стала занадто малою для загального використання, і навіть золоті монети пара були девальвовані, іноді зневажливо називаючись #italic червоними монетами#!. Під тиском війни проти Священної ліги османи розпочали серію грошових реформ, кульмінацією яких у 1697 році стала заборона всіх іноземних монет. Це був сміливий крок, оскільки османська торгівля раніше залежала від голландських левових доларів, але на їхньому місці була створена срібна монета куруш, яка стане основою економіки на наступне століття."
  flavor_tur.152.a: "Запровадити заборону."
  flavor_tur.152.b: "Ні, ми повинні підтримувати зовнішню торгівлю."
  flavor_tur.153.title: "Барон [francis_de_tott.GetDynasty.GetNameWithNoTooltip]"
  flavor_tur.153.desc: "У [ShowContinentName('europe')] все швидко змінюється, особливо це стосується артилерії. Деякі радники при [ROOT.GetCountry.GetGovernment.GetCourtTitle] стурбовані тим, що ми відстаємо від наших суперників у цьому відношенні. Але [GetCountry('FRA').GetAdjective] аристократ на ім'я [francis_de_tott.GetName] готовий допомогти. Вправний у новітньому використанні гармат і гаубиць, [francis_de_tott.GetSheHe] має багато ідей, як ми могли б покращити наші укріплення, нашу морську артилерію та наші артилерійські підрозділи. Але його [francis_de_tott.GetHerHis] послуги не були б дешевими."
  flavor_tur.153.historical_info: "У середині XVIII століття, після десятиліть миру, османська армія відстала від своїх європейських суперників. Реформи були вкрай необхідні, і одна з таких можливостей з'явилася у вигляді Франсуа Барона де Тотта, французького посланника, який раніше був консулом у Криму. Він приїхав працювати на османів як офіцер у російсько-турецькій війні (1768-1774), а пізніше брав участь у серії реформ. Серед них були будівництво нових укріплень на Босфорі, а також створення мобільних артилерійських підрозділів."
  flavor_tur.153.a: "Найняти [francis_de_tott.GetHerHim]."
  flavor_tur.153.b: "Ми не можемо собі цього дозволити."
  de_tott_retires.tt: "[francis_de_tott.GetNameWithNoTooltip] шукає роботу в іншому місці."
  flavor_tur.154.title: "Спалення [target_location.GetNameWithNoTooltip]"
  flavor_tur.154.desc: "Підступні нерегулярні сили, таємно найняті [russia.GetName], увійшли до [target_location.GetName] на кордоні, підпаливши місто та вбиваючи всіх, кого знаходили. Тисячі мирних жителів загинули. Це груба образа нашого суверенітету та престижу, і багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] очікує, що ми оголосимо війну у відповідь. Інші при дворі більш обережні, однак, вказуючи, що [russia.GetNameWithNoTooltip] може виявитися могутнім ворогом, і що наші ресурси краще було б витратити на відбудову [target_location.GetNameWithNoTooltip]."
  flavor_tur.154.historical_info: "Російсько-турецька війна 1768-1774 років виникла через напруженість у Речі Посполитій, де Росія отримувала все більший контроль. Це загрожувало безпеці османів та їхнього союзника, Кримського ханства. У 1768 році українські козаки, підтримувані Росією, увійшли до османського прикордонного міста Балта, стверджуючи, що переслідують ворожих польських солдатів. Вони спалили місто дотла і вирізали його мешканців. Антиросійські поляки, тепер підтримувані Францією, підштовхнули султана Мустафу III до оголошення війни Росії — війни, яка стала катастрофою для османів."
  flavor_tur.154.a: "Якщо вони хочуть війни, вони її отримають."
  flavor_tur.154.b: "Ми підставимо іншу щоку."
  burnt_town_event.a.tt: "$constantinople_fire_event.b.tt$"
  burnt_town_event.b.tt: "$constantinople_fire_event.a.tt$"
  flavor_tur.155.title: "Праці [mehmed_tahir.GetNameWithNoTooltip]"
  flavor_tur.155.desc: "[target_character.GetName] побожний(-а) і гордий(-а), і попри всі витрати, [target_character.GetSheHe] прагне залишити [target_character.GetHerHis] власний слід на [ROOT.GetCountry.GetFlavorRank]. Попри заперечення провідних членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які воліли б бачити гроші витраченими на укріплення та кораблі, [target_character.GetHimHerFormal] бажає фінансувати будівництво мечетей, мостів і гробниць, які будуть достатньо величними, щоб простояти так довго, як і Софійський собор. Правильний(-а) [mehmed_tahir.GetWomanMan] для цього завдання — [mehmed_tahir.GetName], досвідчений архітектор, який, можливо, єдиний зможе втілити мрію [ROOT.GetCountry.GetGovernment.GetRulerTitle] в життя."
  flavor_tur.155.historical_info: "Попри напругу довгої війни проти Росії, багато будівельних проєктів було розпочато за правління Мустафи III. Його головний архітектор, Мехмед Тахір Ага, керував реконструкцією колосальної мечеті Фатіх, видатної риси стамбульського обрію, а також спроєктував гробницю султана та багато інших мечетей у місті. Хоча султан Мустафа залишив державу у важкій економічній та військовій ситуації після своєї ранньої смерті, він також залишив дуже відчутну архітектурну спадщину."
  flavor_tur.155.a: "Негайно призначити [mehmed_tahir.GetHerHim] головним архітектором."
  flavor_tur.155.b: "Прислухаймося до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_tur.156.title: "Кінець тюльпанів"
  flavor_tur.156.desc: "[petrona_halil.GetName] є лідером групи $janissaries_advance$, які дедалі більше обурюються декадансом і примирливою політикою, що асоціюються з $tulip_period$. Тепер вони потужною силою йдуть до [target_capital.GetName], вимагаючи здачі [target_character.GetName] та скасування нещодавніх реформ. [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] має план, як їм перешкодити — але для цього нам потрібно виграти час. Якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle] погодиться зректися престолу, ми заспокоїмо менш палких учасників повстання, а потім зможемо зібрати достатньо союзників, щоб убити [petrona_halil.GetNameWithNoTooltip] та решту повстанців. Таким чином, ми принаймні збережемо престиж [ROOT.GetCountry.GetFlavorRank]."
  flavor_tur.156.historical_info: "Реформи та розкоші при дворі під час Епохи тюльпанів розлютили частину населення, особливо албанських яничарів, які стали головними учасниками повстання під проводом яничара Петрона Халіла. Протягом тижнів повстанці контролювали імперію, змусивши Ахмеда III зректися престолу. Але великий візир звернувся за допомогою до кримського хана та вірних яничарів, щоб придушити повстання, і зумів переломити ситуацію. Петрона Халіла було вбито, як і тисячі його послідовників. Але з цим насильством Епоха тюльпанів добігла кінця, і запанував більш гнітючий клімат."
  flavor_tur.156.a: "Це необхідна жертва."
  flavor_tur.156.b: "Піддатися їхнім вимогам."
  flavor_tur.156.c: "Розгромити зрадників на полі бою."
  janissaries_will_not_revolt_tt: "[target_rebel.GetName] буде заспокоєно наразі"
  revolt_will_not_spread_too_far_tt: "Повстання [Concept('target_rebel.GetName] привабить менше [pops', 'CONCEPT_PLACEHOLDER')|e]"
  revolt_will_spread_further_tt: "Повстання [Concept('target_rebel.GetName] привабить значно більше [pops', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.157.title: "Підозрілі товариства"
  flavor_tur.157.desc: "Таємні товариства, що належать до масонського братства, набирають популярності серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]. Масони організовуються в ложі та присягають на святій книзі, але їхня діяльність в іншому тримається в таємниці і значною мірою невідома агентам Високої Порти. Самі масони стверджують, що вони займаються лише нешкідливою благодійністю та братанням, але члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] застерігають нас, що масони таємно поширюють атеїстичні та підривні західні ідеї, і що було б розумно їх заборонити."
  flavor_tur.157.historical_info: "У часи заворушень для Османської імперії масонство надавало спосіб знайти відчуття приналежності та спільної ідентичності, і зрештою стало досить популярним серед міської еліти. Перші ложі були засновані під час Епохи тюльпанів у 1720-х роках, але незабаром були заборонені, звинувачені у поширенні атеїстичних ідей. Багато десятиліть потому заборону було знято, але масонські ідеї вже встигли вплинути на націоналістичні таємні товариства, такі як Філікі Етерія, які відіграли важливу роль у грецькому прагненні до незалежності."
  flavor_tur.157.a: "Немає потреби в такій таємності."
  flavor_tur.157.b: "Здається, це нешкідливо."
  freemasons_banned.tt: "Масонство стає поза законом."
  flavor_tur.158.title: "Королева поетес"
  flavor_tur.158.desc: "[fitnat_hanim.GetNameWithNoTooltip] — дочка $common_string_shaikh_al_islam$ і поетеса надзвичайного дотепу та майстерності. Її літературні кола оплакують [fitnat_hanim.GetHerHis] шлюб з Мехметом Ефенді, верховним суддею Румелії, який зневажає її мистецтво. Вони хочуть, щоб ми наполягли на розлученні, аби дозволити [fitnat_hanim.GetHerHis] талантам розквітнути під егідою Високої Порти, але втручання в такі справи було б неортодоксальним і суперечливим серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_tur.158.historical_info: "Зюбейде, що писала під псевдонімом Фітнат Ханим, походила з видатної родини релігійних вчених. Вона писала вірші в пишному жанрі Диван, але також була відома своїм дотепом і гумором, що проявлялося в обмінах з поетами-чоловіками Хашметом і Коджа Рагипом-пашею. Хоча пізніші письменники прославляли її як Королеву Поетес, за життя їй перешкоджав шлюб з чоловіком, який не схвалював її навчання та поезії, і мало що відомо про її пізніші роки."
  flavor_tur.158.a: "Розлучення — не справа держави."
  flavor_tur.158.b: "Ми мусимо звільнити [fitnat_hanim.GetHerHim]."
  flavor_tur.159.title: "Небезпечні слова"
  flavor_tur.159.desc: "[enderunlu_fazil.GetNameWithNoTooltip] — це справжній персонаж — вигнаний з [ShowBuildingTypeNameWithNoTooltip('enderun_academy')] за [enderunlu_fazil.GetHerHis] інтрижки з іншими [enderunlu_fazil.GetWomenMen] там, [enderunlu_fazil.GetSheHe] відтоді розпочав кар'єру письменника еротичної та сатиричної поезії. Хоча [enderunlu_fazil.GetHerHis] остання робота, «Книга жінок», була відзначена в деяких колах, інші застерігають нас, що [enderunlu_fazil.GetSheHe] походить з родини зрадників, оскільки і [enderunlu_fazil.GetHerHis] брат, і батько були страчені за повстання в [ShowProvinceDefinitionName('filastin_province')], і що було б найкраще вигнати [enderunlu_fazil.GetHerHim] з [target_location.GetName]."
  flavor_tur.159.historical_info: "Ендерунлу Фазіл був пізнім письменником у жанрі шехренгіз, поезії, яка оспівувала еротичну красу молодих чоловіків, і рідше жінок, з різних місць. Серед його основних творів були #italic Хубаннаме#!, #italic Книга прекрасних юнаків#!, та #italic Зенаннаме#!, #italic Книга жінок#!, і він сам, безумовно, віддавав перевагу першому, не маючи, як він висловився, схильності до жінок. Але саме Зенаннаме після його смерті було перекладено та прочитано в Західній Європі, можливо, через орієнталістське захоплення гаремами."
  flavor_tur.159.a: "Відправити [enderunlu_fazil.GetHerHim] у вигнання."
  flavor_tur.159.b: "Ми повинні бути покровителями [enderunlu_fazil.GetHerHis] мистецтва."
  flavor_tur.160.title: "Володар [target_province.GetNameWithNoTooltip]"
  flavor_tur.160.desc: "[zahir_al_umar.GetName] довго був правителем [target_province.GetName] під нашим заступництвом і зайняв міцну та укріплену позицію в [target_location.GetName]. [zahir_al_umar.GetHerHis|U] влада справді зросла, і [zahir_al_umar.GetHerHis] дії часто посягали на володіння інших місцевих губернаторів. Багато хто тепер закликає до усунення [zahir_al_umar.GetHerHis] від влади. Але [zahir_al_umar.GetShortNameWithNoTooltip] пропонує нам величезну суму золота, якщо ми продовжимо підтримувати [zahir_al_umar.GetHerHis] правління, заперечуючи звинувачення проти [zahir_al_umar.GetHerHim]."
  flavor_tur.160.historical_info: "Захір аль-Умар розпочав свою кар'єру як збирач податків, але поступово здобув величезну владу, ставши майже незалежним правителем Османської Палестини. Він міг розраховувати на підтримку місцевих шиїтських кланів завдяки своїй політиці релігійної толерантності та розбагатів на торгівлі бавовною та оливковою олією. Його постійно оскаржував губернатор Дамаска, а також його власні сини, і в складній серії інтриг він зрештою заслужив ворожнечу уряду в Константинополі. Це призвело до його падіння та руйнування його династії, але його правління залишило тривалий спадок у Палестині."
  flavor_tur.160.a: "[zahir_al_umar.GetHerHis|U] влада має бути зламана."
  flavor_tur.160.b: "Ми приймемо цю угоду."
  zahir_dies_in_battle.tt: "[zahir_al_umar.GetNameWithNoTooltip] гине в битві."
  zahir_is_captured.tt: "[zahir_al_umar.GetNameWithNoTooltip] схоплений і страчений."
  zahir_escapes.tt: "[zahir_al_umar.GetNameWithNoTooltip] уникає правосуддя."
  flavor_tur.161.title: "Халвові ночі"
  flavor_tur.161.desc: "[target_heir.GetName] полюбив так звані Халвові ночі, де різні члени [ShowAdvanceNameWithNoTooltip('late_ottoman_bureaucracy')] та інші державні службовці збираються в модних районах [target_capital.GetName], спілкуючись з поетами та артистами. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] схоже, цінують ці зібрання, що дає їм шанс поспілкуватися з високопосадовцями Високої Порти, але Халвові ночі можуть бути бурхливими, включаючи алкогольні напої, непристойну поезію та пісні, іноді навіть жінок. Чи справді [target_heir.GetShortNameWithNoTooltip] та високі бюрократи повинні бути помічені в таких обставинах?"
  flavor_tur.161.historical_info: "Халвові ночі, названі на честь солодкого десерту, були зібраннями в Константинополі, часто навколо нещодавно збудованого палацу Са'д-абад, де державні бюрократи та високопосадовці спілкувалися з поетами та художниками. Поет Недім, який часто брав участь у цих заходах, описував їх як «зібрання, які Олександр не міг уявити уві сні». Халвові ночі були характерною рисою все більш публічного придворного клімату під час Епохи тюльпанів."
  flavor_tur.161.a: "Нехай розважаються."
  flavor_tur.161.b: "Нам потрібно приборкати цю декадентність."
  flavor_tur.162.title: "Чорний як гріх, солодкий як заколот"
  flavor_tur.162.desc: "Занадто часто кав'ярні, де збираються багато [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], стають притулком для зрадницьких братань і навіть змов повстання, особливо серед $janissaries_advance$. Хоча жваві дискусії, що відбуваються за темною кавою та солодкими десертами, були корисними для торгівлі та громади, не завадило б розширити нашу шпигунську мережу, переконавшись, що жоден таємний обмін не залишиться непочутим."
  flavor_tur.162.historical_info: "Кав'ярні в Османській імперії були динамічними місцями зустрічей для чоловіків багатьох різних професій, етнічних груп та віросповідань, де турецькі ремісники могли спілкуватися з російськими волоцюгами та венеціанськими купцями. Таким чином, вони стали форумом для публічного дискурсу, нових ідей, мистецтва — та повстання. Кав'ярні яничарів особливо надавали можливість зв'язатися з таємними мережами для вбивств, отримання інформації та ресурсів. Уряд впроваджував багато шпигунів у кав'ярні та подібні громадські установи, щоб отримати уявлення про громадські настрої та будь-які розмови про злочини чи повстання."
  flavor_tur.162.a: "Інформація — це сила."
  flavor_tur.162.b: "Провести рейди в кав'ярнях."
  flavor_tur.162.c: "Кава має текти безперешкодно."
  coffee_house_espionage_available.tt: "[ShowGovernmentReformName('ottoman_coffee_house_espionage')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] стане доступною."
  flavor_tur.163.title: "Образливе видовище?"
  flavor_tur.163.desc: "Відомий композитор і драматург у [target_rival.GetName] створив музичну виставу, що зображує зусилля двох героїв з порятунку їхніх коханих жінок від ганебного ув'язнення в гаремі вигаданого Паші. Її прем'єра нещодавно відбулася в [rival_capital.GetName] з великим успіхом — і в день пам'яті однієї з наших найбільших поразок. Деякі наші радники тепер стверджують, що це не просто збіг, а навмисна образа для [ROOT.GetCountry.GetName]. Вони отримали переклад лібрето, яке тепер поширюється при дворі."
  flavor_tur.163.historical_info: "#italic Die Entführung aus dem Serail#!, #italic Викрадення із Сералю#!, була оперою Вольфганга Амадея Моцарта, прем'єра якої відбулася у Відні 1782 року з великим успіхом. Вона була вільно натхненна берберськими корсарами, які часто викрадали пасажирів та екіпажі захоплених кораблів, щоб вимагати викуп або продавати їх у рабство, деякі з яких потрапляли до османських гаремів. Гареми часто називалися Сералями західняками того часу, від перського слова Sarāy, хоча для османів Sarāy скоріше означає палац або урядову будівлю в цілому."
  flavor_tur.163.a: "З більшим заступництвом наші власні митці зможуть зрівнятися з цим."
  flavor_tur.163.b: "Ця вистава насправді досить хороша..."
  flavor_tur.164.title: "Блаженство баклави"
  flavor_tur.164.desc: "Настав час готуватися до баклавних процесій під час місяця посту. $janissaries_advance$ очікують грандіозного видовища, і щоб [target_ruler.GetName] [target_ruler.GetHerselfHimself] надав їм величезні кількості солодких ласощів баклави. Кожен член палацового кухонного персоналу наполегливо працює, готуючи баклаву до події, але вони скаржаться на нестачу цукру, яку, як вони сподіваються, може вирішити державна скарбниця."
  flavor_tur.164.historical_info: "Баклава була дорогим ласощами через такі інгредієнти, як мед і горіхи, та майстерність, необхідну для її приготування. Тому вона часто зберігалася для святкових подій і стала майже священною частиною Рамадану, мусульманського місяця посту. Султан дарував величезні кількості баклави яничарам під час баклавних процесій, публічних видовищ, що символізували зв'язок між правителем та його солдатами. Яничари несли баклаву назад до своїх казарм, співаючи героїчні пісні, і повертали порожні таці наступного дня, щоб продемонструвати, наскільки смачним був подарунок."
  flavor_tur.164.a: "Баклава має бути доставлена."
  flavor_tur.164.b: "Цього року процесії не буде."
  sugar_for_baklava: "Попит на [ShowGoodsNameWithNoTooltip('sugar')] для баклави"
  flavor_tur.165.title: "Повінь на Євфраті"
  flavor_tur.165.desc: "Сталася катастрофа в [ShowAreaName('iraq_arabi_area')]. Дамби річки Євфрат обвалилися, і могутня річка поглинає землю, як потоп у давні часи. Тисячі загинули, і губернатор у [target_location.GetName] відчайдушно потребує допомоги. Євфрат завжди був дуже непередбачуваною річкою, і протягом тисячоліть її ретельно зрошували, щоб забезпечити великий сільськогосподарський врожай, який може дати [ShowAreaNameWithNoTooltip('iraq_arabi_area')]. Якщо ми нічого не зробимо, все це може закінчитися."
  flavor_tur.165.historical_info: "Починаючи з 1680-х років, могутня річка Євфрат змінила русло, що призвело до затоплення значних територій та широкомасштабних руйнувань. Османи були втягнуті у війну зі Священною Лігою на заході і не могли зібрати ресурси для вирішення ситуації в Іраку. Ця катастрофа призвела до руйнування старих османських стратегій управління в регіоні, і лише з призначенням ветерана-державного діяча Хасана Паші губернатором Багдада в 1704 році вони відновили значний контроль."
  flavor_tur.165.a: "Це була воля [ROOT.GetCountry.GetReligion.GetGodName]."
  flavor_tur.165.b: "Ми не пошкодуємо жодних витрат."
  euphrates_flooding.a.tt: "Усі володіння в [ShowAreaName('iraq_arabi_area')] втратять [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] та [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]."
  euphrates_flooding.b.tt: "Усі володіння в [ShowAreaName('iraq_arabi_area')] втратять [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] та [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], але збитки будуть значно меншими."
  flavor_tur.166.title: "Губернатор [ShowLocationNameWithNoTooltip('baghdad')]"
  flavor_tur.166.desc: "[ShowAreaName('iraq_arabi_area')] залишається під впливом повені на Євфраті, що сталася багато років тому. Але [hasan_pasha.GetName] — надзвичайно здібний адміністратор та офіцер. Якби ми призначили [hasan_pasha.GetHerHim] валі [target_location.GetName], [hasan_pasha.GetSheHe] приніс би знання та ресурси, необхідні для того, щоб [ShowAreaNameWithNoTooltip('iraq_arabi_area')] знову процвітала. Однак це вимагало б, щоб ми наділили [hasan_pasha.GetHerHim] значною мірою місцевої влади, зменшивши авторитет Високої Порти."
  flavor_tur.166.historical_info: "Хасан Паша був грузинського походження, ветеран воєн проти Ірану. Ставши губернатором Багдада, він зробив себе незамінним для османського уряду, приборкуючи непокірні племена та регулярно надсилаючи данину до скарбниці в Стамбулі. Черкеські та грузинські солдати, яких він привів, щоб приборкати місцевих яничарів, дали йому значну місцеву владу, і його династія, іракські мамлюки, правила б регіоном понад століття."
  flavor_tur.166.a: "Відправити [hasan_pasha.GetHerHim] до [ShowLocationNameWithNoTooltip('baghdad')]."
  flavor_tur.166.b: "Нам потрібен [hasan_pasha.GetHerHim] у [target_capital.GetNameWithNoTooltip]."
  hasan_pasha_becomes_governor.tt: "[hasan_pasha.GetName] вирушає, щоб обійняти посаду губернатора [ShowAreaName('iraq_arabi_area')]."
  competent_governance.a.tt: "Усі володіння в [ShowAreaName('iraq_arabi_area')] отримають [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] та [Concept('control', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.167.title: "Медична школа [target_ruler.GetShortNameWithNoTooltip]"
  flavor_tur.167.desc: "Хоча [ShowReligionGroupAdjective('muslim')] вчені здавна пишалися своїми медичними знаннями, [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] наполягає, що нам було б добре також вчитися на досягненнях, зроблених у [ShowContinentName('europe')]. Ми могли б побудувати [ShowBuildingTypeName('medical_school')] у [capital_location.GetName] та запросити вчителів як із Заходу, так і зі Сходу. Проте, прихильники жорсткої лінії серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] проти цієї ідеї, стверджуючи, що це принесе небезпечні, підривні впливи до [ROOT.GetCountry.GetFlavorRank]."
  flavor_tur.167.historical_info: "Першою великою медичною школою в Османській імперії була Сулейманіє, побудована в середині XVI століття, де навчали хірургів як для армії, так і для імператорського палацу. Новий тип шкіл, сильно вплинутий західною медициною та традиціями, почав з'являтися на початку XIX століття, такі як Терсане Тиббієсі, #italic Військово-морська медична школа#!, а в 1824 році Тибхане-І Аміре, #italic Імперська медична школа#!. Оскільки підручники були переважно французькою, незабаром немусульманські студенти, які краще володіли цією мовою, стали більшістю студентів."
  flavor_tur.167.a: "Ми повинні приймати знання в усіх їхніх формах."
  flavor_tur.167.b: "Нам не потрібні західні інновації."
  flavor_tur.168.title: "Скарги [ShowCultureNameWithNoTooltip('greek_culture')]"
  flavor_tur.168.desc: "[ShowCultureName('greek_culture')] народ дедалі більше підпадає під вплив ідей Просвітництва та нації, і особливо в [ShowRegionName('balkan_region')] вони все більше обурюються правлінням [ROOT.GetCountry.GetName]. Зрадницькі [ShowCultureNameWithNoTooltip('greek_culture')] лідери Церкви та таємних товариств тепер набрали достатньо сили та впевненості, щоб закликати до повстання, і в [uprising_location.GetName] кілька [ShowCultureName('turkish_culture')] поселень були атаковані розлюченими [ShowCultureNameWithNoTooltip('greek_culture')] натовпами."
  flavor_tur.168.historical_info: "Греки здавна були видатною етнічною групою в Османській імперії та значно впливали на її історію, але вони завжди зберігали відчуття власної ідентичності, особливо завдяки постійній присутності Православної Церкви. Революційні націоналістичні настрої сильно зросли серед греків протягом XVIII століття, підживлювані впливом ідей Просвітництва, а також свідомими підривними зусиллями європейських суперників Османської імперії. Це призвело до кількох повстань і конфліктів, кульмінацією яких у 1821 році стала Грецька війна за незалежність."
  flavor_tur.168.a: "Запланувати жорстоку відплату."
  flavor_tur.168.b: "Заспокоїти їх реформами."
  flavor_tur.168.c: "Дивитися, як [ShowLocationNameWithNoTooltip('rome')] горить."
  greek_uprising_aggravated: "Усі [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('balkan_region')] матимуть дуже низький [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  greek_uprising_milder: "Усі [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('balkan_region')] матимуть низький [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  greeks_appeased: "[Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('balkan_region')] зменшиться лише незначно."
  flavor_tur.169.title: "Різанина в [massacre_location.GetNameWithNoTooltip] [GetCurrentYear] року"
  flavor_tur.169.desc: "Ми обіцяли відплату [ShowCultureName('greek_culture')] повстанцям [ShowRegionName('balkan_region')], і ось настав час. Оскільки [ShowReligionAdjective('orthodox')] Патріарх не зміг запобігти кризі, він має стати прикладом, як і Великий Драгоман та всі інші [ShowCultureNameWithNoTooltip('greek_culture')] лідери громади в [massacre_location.GetName], незалежно від того, чи мають вони зв'язки з повстанцями. Ми стратимо зрадників та їхніх прихильників, конфіскуємо їхнє майно та зруйнуємо їхні молитовні будинки, і змусимо світ боятися нас — або нас вважатимуть слабаками, які не виконують своїх погроз."
  flavor_tur.169.historical_info: "У відповідь на Грецьку війну за незалежність, навесні 1821 року османський уряд здійснив масові вбивства та переслідування греків у Константинополі. Незважаючи на те, що він відлучив революціонерів від церкви, православний Патріарх Григорій V був заарештований і страчений, як і багато інших лідерів грецьких громад, більшість з яких не мали зв'язку з повстанням. Звірства проти греків тривали багато днів. Подібні переслідування, хоча й меншого масштабу, відбувалися й в інших частинах імперії."
  flavor_tur.169.a: "Це зруйнує репутацію [ROOT.GetCountry.GetFlavorRank]."
  flavor_tur.169.b: "Ми не можемо дозволити цьому статися."
  everyone_hates_you.tt: "[Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] усіх [ShowCultureName('greek_culture')] або [ShowReligionAdjective('orthodox')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetFlavorRank] значно зменшиться."
  flavor_tur.170.title: "Суддя Степу"
  flavor_tur.170.desc: "З [target_location.GetName] у наших руках настав час подумати, як нам керувати в [ShowAreaName('iraq_arabi_area')]. Могутні річки Євфрат і Тигр схильні до повеней, і хоча фермери тисячоліттями приборкували їх за допомогою дамб і гребель, урожай може раптово опинитися під загрозою. Тому кочівники та їхній спосіб життя все ще панують на цій землі. Якщо ми хочемо повністю контролювати її, ми повинні призначити Суддю Степу, який працюватиме над тим, щоб кочівники та прикордонні фермери сплачували податки та залишалися непохитними у своїй відданості [ShowReligionGroupName('muslim')]."
  flavor_tur.170.historical_info: "Великі річки Месопотамії набагато мінливіші, ніж Ніл у Єгипті. Їхні непередбачувані повені змушують багатьох фермерів залежати від доходів з інших джерел, крім сільського господарства, часто обмінюючись товарами з кочовими групами пустель і степів. Це робило Ірак складним для контролю центральною владою. Після завоювання Багдада османи визнали цю проблему та адаптувалися до місцевої ситуації, зокрема, призначивши Суддю Степу, високопоставленого Каді, якому було доручено наглядати за кочівниками та їхніми справами."
  flavor_tur.170.a: "Ми знайдемо відповідного кандидата."
  flavor_tur.170.b: "Зробити більші інвестиції в цю сферу."
  grasslands_judge.tt: "Ми призначаємо Каді на цю посаду."
  flavor_tur.171.title: "[ShowCultureNameWithNoTooltip('circassian_culture')] Красуня"
  flavor_tur.171.desc: "[circassian_cariye.GetName] — це досі досить невідома карія-наложниця в [ROOT.GetCountry.GetGovernment.GetAdjective] гаремі, але [circassian_cariye.GetSheHe] не бракує амбіцій. [circassian_cariye.GetSheHe|U] відчайдушно хоче бути намальованою [italian_painter.GetName], талановитим художником, з яким [circassian_cariye.GetSheHe] подружилася через свою посередницю Кіру. [circassian_cariye.GetNameWithNoTooltip] обіцяє, що картина буде скромною і не порушить [ShowReligionGroupAdjective('muslim')] традиції, але все ж буде оспівуванням її рідкісної [ShowCultureName('circassian_culture')] краси, на заздрість усій [ShowContinentName('europe')]."
  flavor_tur.171.historical_info: "Хоча термін \"черкес\" найчастіше стосується адигів, в історичному контексті він міг також включати інші народи Кавказу, такі як грузини та абхази. Черкеси, особливо жінки, довго вважалися особливо красивими, жвавими та елегантними. Черкеські рабині-наложниці були дуже затребувані в ісламському світі та надзвичайно дорогі. Зрештою вони стали складати більшість наложниць у багатьох гаремах. Черкеські красуні були відомі й у Європі, ставши основним елементом орієнталістського мистецтва у XVIII та XIX століттях."
  flavor_tur.171.a: "Дуже добре, дозвольмо це."
  flavor_tur.171.b: "Яка безглузда ідея."
  flavor_tur.172.title: "Зрізання кутів"
  flavor_tur.172.desc: "[ShowReligionGroupAdjective('muslim')] вчені, рідкісні аболіціоністи работоргівлі та інші стурбовані громадяни [ROOT.GetCountry.GetFlavorRank] висловили скарги, що занадто часто [ShowGoodsName('slaves_goods')], якими торгують на [ShowAreaName('black_sea_area')], насправді є не язичниками, а послідовниками [ShowReligionGroupNameWithNoTooltip('muslim')], що заборонено священним законом. Вони закликають до суворішого регулювання работоргівлі, щоб боротися з цією образою [ROOT.GetCountry.GetReligion.GetGodName]. Але [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] жахаються, стверджуючи, що такі обмеження знищать торгівлю [ShowCultureName('circassian_culture')] красунями для їхніх гаремів."
  flavor_tur.172.historical_info: "Ісламський закон суворо забороняв брати в рабство інших мусульман, проте ця практика іноді ігнорувалася, особливо щодо черкесів, найцінніших наложниць в османських та арабських гаремах. Продаж полонених в рабство османам був дуже прибутковою практикою для Кримського ханства, і поширеним виправданням лицемірства щодо черкесів було твердження, що торгівля черкеськими жінками була скоріше шлюбним ринком."
  flavor_tur.172.a: "Постачання [ShowGoodsNameWithNoTooltip('slaves_goods')] є найважливішим."
  flavor_tur.172.b: "Ми повинні дотримуватися закону Пророка."
  flavor_tur.173.title: "Кінець [ShowPolicyNameWithNoTooltip('devshirme_system_policy')]"
  flavor_tur.173.desc: "[ShowPolicyName('devshirme_system_policy')] давно перебуває в занепаді, викликаючи невдоволення в багатьох куточках [ROOT.GetCountry.GetFlavorRank]. Багато [ShowReligionAdjective('orthodox')] ненавидять її, бо вона передбачає примусове забирання їхніх синів для служби в $janissaries_advance$ та $ottoman_bureaucracy$, проте [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] також розчаровані, бо вона виключає їх з просування по службі, натомість надаючи посади людям низького походження. У нас є рідкісний шанс задовольнити обидві ці групи, скасувавши [ShowPolicyNameWithNoTooltip('devshirme_system_policy')] раз і назавжди."
  flavor_tur.173.historical_info: "Девширме була османською практикою примусового набору солдатів і бюрократів з числа їхніх балканських християнських підданих. Вважалося, що, не маючи зв'язків із вкоріненою османською знаттю, ці люди будуть лояльними безпосередньо до режиму, і система стала опорою османської адміністрації під час золотого віку імперії. Але османські солдати віддавали перевагу набору власних синів до армії, і незабаром мусульманам було дозволено вступати до системи. Це сприяло поступовому скасуванню девширме."
  flavor_tur.173.a: "Її необхідно скасувати."
  flavor_tur.173.b: "Ні, [ShowPolicyNameWithNoTooltip('devshirme_system_policy')] є опорою держави."
  christians_pleased.tt: "Усі [ShowReligionAdjective('orthodox')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetFlavorRank] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  devshirme_removed_forever.tt: "[ShowPolicyName('devshirme_system_policy')] буде назавжди скасовано."
  flavor_tur.174.title: "Лідер поетів"
  flavor_tur.174.desc: "Люди при [ROOT.GetCountry.GetGovernment.GetCourtTitle] вступили в запеклу дискусію про те, хто з двох чоловіків є кращим поетом. [osmanzade.GetName] — красномовний автор сатир та од, улюблений [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], тоді як [nedim.GetName] — дещо загадковий, його поезія пишна та життєрадісна, але іноді песимістична та радикальна. [nedim.GetSheHe|U] популярний серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], яким подобається [nedim.GetHerHis] використання народних поетичних форм."
  flavor_tur.174.historical_info: "Багато османських поетів були активними під час Епохи тюльпанів. Для своїх сучасників Османзаде Таїб був найвідомішим, отримавши титул реїс-і шаїран, #italic лідер поетів#!, від самого султана Ахмеда III. Твори Османзаде відрізнялися дотепністю, і його жарти зрештою призвели до його смерті від рук губернатора Єгипту. Його сучасник Недім, можливо, був дещо занадто інноваційним для свого часу, відомий своїм дещо декадентським стилем, який іноді критикував перську поетичну традицію, але також підкреслював красу Константинополя."
  flavor_tur.174.a: "[osmanzade.GetNameWithNoTooltip] є найдостойнішим."
  flavor_tur.174.b: "[nedim.GetNameWithNoTooltip] — це майбутнє поезії."
  nedim_retires.tt: "[nedim.GetNameWithNoTooltip] відступає в невідомість."
  osmanzade_retires.tt: "[osmanzade.GetNameWithNoTooltip] відступає в невідомість."
  flavor_tur.175.title: "Місцеві сили"
  flavor_tur.175.desc: "Як найкраще керувати віддаленими та різноманітними територіями – це вічна головоломка для Блискучої Порти. Занадто часто лише ті, хто мав прямі зв'язки з [ROOT.GetCountry.GetGovernment.GetRulerTitle], зуміли отримати владні позиції, навіть у віддалених провінціях. Але знайшовши потрібних людей з достатніми амбіціями або зв'язками в місцевій громаді та наділивши їх новим статусом Аяна, ми могли б покращити ефективність нашого податкового відкупу та стабільність [ROOT.GetCountry.GetFlavorRank], хоча й ціною зменшення урядового контролю над місцевими справами."
  flavor_tur.175.historical_info: "У XVIII столітті в Османській імперії відбувалася поступова децентралізація, оскільки все більше влади передавалося місцевим елітам. Ці еліти, Аяни, могли мати дуже різне походження, від знаті та яничарів до духовенства та впливових купців, але були тісно пов'язані з системою податкового відкупу Малікане. Хоча величезна місцева влада, якою вони володіли, могла розглядатися як ознака ослаблення османського впливу та престижу, це була скоріше адаптація до мінливого світу, де націоналістичні настрої потрібно було придушувати, щоб зберегти імперію сильною."
  flavor_tur.175.a: "Ми повинні зосередитися на цій реформі."
  flavor_tur.175.b: "Натомість довіритися Кадилукам."
  flavor_tur.175.c: "Влада завжди повинна залишатися в [target_capital.GetNameWithNoTooltip]."
  flavor_tur.176.title: "Гонка смерті"
  flavor_tur.176.desc: "[grand_vizier.GetName], [ROOT.GetCountry.Custom('GetHeadOfCabinetName')], звинувачений у безлічі злочинів, і якщо його визнають винним, [grand_vizier.GetSheHe] буде задушений [bostancibasi.GetName], [ROOT.GetCountry.GetGovernment.GetAdjective] дипломатом. Вирок буде винесено, згідно з традицією, шляхом подачі обвинуваченому чаші шербету — якщо він червоний, [grand_vizier.GetSheHe] засуджений, але якщо він білий, [grand_vizier.GetSheHe] буде звільнений. Але навіть якщо йому подадуть червоний шербет, [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] має план. Бо як високопоставленому чиновнику, [grand_vizier.GetSheHe] буде дозволено змагатися в гонці проти дипломата і, можливо, врятувати [grand_vizier.GetHerHis] життя. І [grand_vizier.GetSheHe] тренувався..."
  flavor_tur.176.historical_info: "Палац Топкапи бачив багато кровопролиття, страти часто здійснював Бостанджибаші, головний дипломат султана. Він також відповідав за Фонтан Страт у Першому дворі, де кати мили руки після виконання своїх жахливих завдань. У XVIII столітті виникла цікава традиція, згідно з якою засудженим високопоставленим чиновникам дозволялося змагатися з Бостанджибаші в палацовому саду. Якщо вони вигравали, їхні вироки замінювалися зі страти на вигнання."
  flavor_tur.176.a: "Дати [grand_vizier.GetHerHim] червоний шербет."
  flavor_tur.176.b: "Дати [grand_vizier.GetHerHim] білий шербет."
  flavor_tur.176.c: "Наказати вбити [grand_vizier.GetHerHim] негайно."
  race_held.tt: "У садах відбудеться гонка з невизначеним результатом."
  grand_vizier_freed.tt: "[Concept('grand_vizier.GetNameWithNoTooltip] звільнений і може продовжувати служити в [cabinet', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_tur.177.title: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')] Переможець"
  flavor_tur.177.desc: "Тренування, які [grand_vizier.GetName] стверджував, що проводив напередодні гонки, схоже, окупилися, бо на фінальній ділянці з палацового саду [grand_vizier.GetSheHe] вирвався вперед і випередив [bostancibasi.GetName] до Ворот Рибного Ринку, кінцевої точки, де [grand_vizier.GetHerHis] голову відрубали б, якби [grand_vizier.GetSheHe] програв. Але замість цього [grand_vizier.GetSheHe] виграв, чесно і справедливо, і отримав багато досвіду від цього зіткнення зі смертю. Ми зобов'язані за традицією замінити [grand_vizier.GetHerHis] смертний вирок."
  flavor_tur.177.historical_info: "Хоча життя високопоставлених чиновників в Османській імперії могло бути дуже небезпечним, не було нечуваним, щоб вони вигравали смертельну гонку проти Бостанджибаші. Це сталося з великим візиром Хаджі Саліхом-пашею в 1822 році, який став настільки відомим завдяки перемозі в гонці, що його вигнання радше перетворилося на затишну відставку, коли його призначили губернатором Дамаска."
  flavor_tur.177.a: "Все ж [grand_vizier.GetSheHe] має бути вигнаний."
  grand_vizier_exiled.tt: "[grand_vizier.GetName] відправлений у вигнання."
  flavor_tur.177.b: "Ми повинні повністю замінити вирок."
  flavor_tur.178.title: "Кінець [ROOT.GetCountry.Custom('GetHeadOfCabinetName')]"
  flavor_tur.178.desc: "Незважаючи на енергійний спринт, [grand_vizier.GetName] програв гонку проти [bostancibasi.GetName], який чекав на [grand_vizier.GetHerHim] біля Ворот Рибного Ринку, кінцевої точки гонки. Там [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] був убитий, а [grand_vizier.GetHerHis] тіло безцеремонно кинуто в море. Але голову було збережено, якщо ми захочемо розмістити її на Каменях Прикладу за межами палацу, щоб усі бачили."
  flavor_tur.178.historical_info: "Хоча султани XVIII століття були набагато менш кровожерливими, ніж Селім Грізний у XVI столітті, вони не вагалися демонструвати, що траплялося з тими, хто їх ображав. Чиновник, який програв свою гонку на смерть, був би негайно вбитий Бостанджибаші, а його голова виставлена на Каменях Прикладу, двох мармурових стовпах за воротами палацу Топкапи."
  flavor_tur.178.a: "[grand_vizier.GetHerHis|U] смерть — це достатньо."
  flavor_tur.178.b: "Виставити голову на показ."
  flavor_tur.179.title: "Армія Нового Порядку"
  flavor_tur.179.desc: "Розмірковуючи про силу наших суперників та небезпеки мінливого світу, але особливо про постійну загрозу повстання з боку непокірних і занепалих $janissaries_advance$, [target_ruler.GetName] має нову ідею. [target_ruler.GetSheHe|U] бажає реформувати армію в високопрофесійну, сучасну силу, посилену інструкторами з [ShowContinentName('europe')] та новими одностроями, традиціями та навчанням. Але, роблячи це, [target_ruler.GetSheHe] ризикує накликати гнів $janissaries_advance$, $bashi_bazouks$, членів $sekban_system$ та всіх інших, хто отримує вигоду від поточного стану справ."
  flavor_tur.179.historical_info: "Нізам-і Джедід, #italic Армія Нового Порядку#!, була заснована в 1797 році. Вона була основною частиною програми реформ Селіма III. Він сподівався скасувати децентралізацію імперії та обійти вкорінену владу яничарів, поступово замінюючи яничарський корпус сучасною піхотною силою за зразком європейських армій."
  flavor_tur.179.a: "Нам потрібні ці зміни."
  flavor_tur.179.b: "Старі методи достатньо хороші."
  new_order_army_available.tt: "[Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('ottoman_new_order_army')] стане доступною."
  tur_new_order_army: "Розблоковано [ShowGovernmentReformNameWithNoTooltip('ottoman_new_order_army')]"
  flavor_tur.180.title: "Інцидент у [target_location.GetNameWithNoTooltip]"
  flavor_tur.180.desc: "Справи виглядають похмуро в [target_location.GetName], де [target_ruler.GetName] щойно спробував заснувати нові казарми для [ShowGovernmentReformName('ottoman_new_order_army')]. Місцеві лорди та $janissaries_advance$ чинять жорстокий опір, звинувачуючи [ROOT.GetCountry.GetGovernment.GetRulerTitle] у бажанні скасувати їхні старі привілеї, і вони вже заручилися підтримкою видатних членів [ROOT.GetCountry.GetGovernment.GetAdjective] адміністрації. Можливо, було б мудро відкотити деякі реформи та зупинити розширення нової армії, перш ніж це спричинить громадянську війну."
  flavor_tur.180.historical_info: "Обіцянка Нізам-і Джедід швидко закінчилася Едірнським інцидентом 1806 року. Селім III спробував заснувати нові армійські казарми в Едірне та інших місцях Румелії, що спричинило збройне протистояння з елементами яничарського корпусу та місцевими аянами. Оскільки конфлікт швидко розширився, султану довелося поступитися і відправити свої війська назад до Константинополя, завдавши смертельного удару його престижу, а також його спробам централізувати адміністрацію імперії."
  flavor_tur.180.a: "Погодитися обмежити реформи."
  flavor_tur.180.b: "Битися зі зрадниками!"
  flavor_tur.180.c: "Розпустити [ShowGovernmentReformNameWithNoTooltip('ottoman_new_order_army')]."
  new_order_army_permanently_disbanded.tt: "[Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('ottoman_new_order_army')] стане назавжди недоступною."
  tur_new_order_army_disbanded: "Розпущено [ShowGovernmentReformNameWithNoTooltip('ottoman_new_order_army')]"
  flavor_tur.181.title: "Пара каліграфів"
  flavor_tur.181.desc: "[celaleddin.GetName] та [esma.GetName] — подружня пара, і найкращі каліграфи, яких бачили за покоління. Хоча [celaleddin.GetShortName] добре відомий у цій галузі, [esma.GetShortName] — вундеркінд з великими перспективами, незважаючи на [esma.GetHerHis] скромну покірність. Багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] настільки вражені роботою пари, що хочуть найняти їх на постійну роботу для створення прикрас для наших палаців і мечетей. Навіть якщо ми дозволимо їм повернутися до їхнього подружнього життя в мирі, щедра довічна грантова допомога була б доречною."
  flavor_tur.181.historical_info: "Махмуд Джелаледдін Ефенді походив з Дагестану і став одним з провідних каліграфів своєї епохи. Він багато натхнення черпав у Хафіза Османа, великого каліграфа XVII століття. Есма Ібрет Ханим була молодим вундеркіндом, його ученицею, а згодом і дружиною. Джелаледдін спочатку неохоче брався за ученицю, але одразу змінив свою думку, побачивши її роботу. Султан Селім III та його мати також були дуже вражені майстерністю Есми і нагородили її грантом у 500 курушів."
  flavor_tur.181.a: "Нам потрібні вони обоє."
  flavor_tur.181.b: "Гранту буде достатньо."
  celaleddin_and_esma_retires.tt: "[celaleddin.GetNameWithNoTooltip] та [esma.GetNameWithNoTooltip] повертаються до тихого життя."
  flavor_tur.182.title: "Велетень"
  flavor_tur.182.desc: "[koca.GetName] — [koca.GetWomanMan] багатьох талантів, будучи скарбником, вченим, поетом та губернатором [ShowRegionName('anatolia_region')]. Люди називають [koca.GetHerHim] Коца, #italic Велетень#!, хоча чи через [koca.GetHerHis] розмір, чи з іншої причини, важко сказати. Втомившись від [ShowRegionNameWithNoTooltip('anatolia_region')], [koca.GetSheHe] написав елегантний вірш, адресований Високій Порті, просячи дозволу служити [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] у [target_capital.GetName]. Але [koca.GetSheHe] відомий як любитель миру, чого багато амбітних [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не дуже люблять."
  flavor_tur.182.historical_info: "Коджа Рагип-паша був, мабуть, найздібнішим великим візиром XVIII століття. Занепад імперії отримав перепочинок під час його правління, оскільки він успішно провів економічні та адміністративні реформи та зумів утримати османів від Семирічної війни, що вирувала в Європі. Він також був вченим і поетом, часто обмінюючись думками зі знаменитою поетесою Фітнат Ханим та іншими видатними сучасниками."
  flavor_tur.182.a: "Держава вкрай потребує [koca.GetHerHim]."
  flavor_tur.182.b: "Ми можемо знайти інших [koca.GetWomenMen]."
  koca_retires.tt: "[koca.GetNameWithNoTooltip] залишається в провінціях."
  flavor_tur.183.title: "Черепаха та свічка"
  flavor_tur.183.desc: "[unfortunate_courtier.GetName] відвідував(-ла) читання поезії з іншими [unfortunate_courtier.GetWomenMen] палацу [ROOT.GetCountry.GetFlavorRank], коли спіткало нещастя. [unfortunate_courtier.GetSheHe|U] спіткнувся(-лася) об черепаху, що прогулювалася вночі зі свічкою, закріпленою на її спині, — поширений елемент декору в садах. Але свічка згасла, що ускладнювало розгляд черепахи в темряві. Тварина, на жаль, померла, тоді як [unfortunate_courtier.GetName] вивихнув(-ла) [unfortunate_courtier.GetHerHis] щиколотку. [unfortunate_courtier.GetSheHe|U] тепер хоче, щоб ми прибрали черепах та подібні небезпеки з садів."
  flavor_tur.183.historical_info: "Імператорське селище Саад-Абад у Константинополі було побудоване для задоволення Ахмеда III та його почту й бюрократів, на очах у простих людей, яким не дозволялося входити. Воно включало палац, секцію гарему з хамамами, кіоск та численні сади навколо струмка Кагитхане. Однією з вражаючих особливостей були черепахи зі свічками, закріпленими на їхніх спинах, що освітлювали теплі ночі."
  flavor_tur.183.a: "Ми можемо використовувати звичайні свічники."
  flavor_tur.183.b: "Нам потрібно більше свічкових черепах, а не менше."
  flavor_tur.183.c: "Помолимося за мертву черепаху."
  flavor_tur.184.title: "Коти [ShowLocationNameWithNoTooltip('constantinople')]"
  flavor_tur.184.desc: "Коли чума спалахує в межах стін [target_location.GetName], її поширення завжди простежується до мишей та щурів, що мешкають у домогосподарствах. На щастя, багато громадян у [target_location.GetRank.GetName] мають котів, а вулиці заповнені тисячами цих диких створінь. Завдяки [target_character.GetName] та [target_character.GetHerHis] відданості [ROOT.GetCountry.GetReligion.GetName], багато з цих котів вважаються цінностями, і жодна шкода чи викрадення не дозволяються, інакше їм загрожує суворе покарання."
  flavor_tur.184.historical_info: "Під час османського правління на вулицях Стамбула зросла популяція безпритульних котів. Це пояснювалося кількістю щурів та мишей у домогосподарствах, а також перевагою котів через іслам. Вважалося незаконним вбивати чи красти будь-якого кота, оскільки вони вважалися спільною власністю."
  flavor_tur.184.a: "Ми приймаємо наших нових диких володарів."
  tur_all_pops_in_constantinople_gain_satisfaction: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.185.title: "Лев [ShowLocationNameWithNoTooltip('ioannina')]"
  flavor_tur.185.desc: "[target_character.GetName] піднявся(-лася) до лав [ROOT.GetCountry.GetName] [ROOT.GetCountry.GetGovernment.GetCourtTitle], виявивши неабиякий талант у таких питаннях, як адміністрація та війна. Хоча [target_character.GetSheHe] народився(-лася) бандитом(-кою) у [ShowProvinceDefinitionName('albania_province')], що не завадило [target_character.GetHerHim] здобути репутацію вирішувача проблем або правоохоронця. Попри це, багато хто заздрить [target_character.GetHerHis] успіху, багато хто волів би бачити [target_character.GetHerHis] падіння. Однак слід зазначити, що [target_character2.GetName] уподобав(-ла) цього персонажа, того, хто діяв би щодо проблем, а не просто говорив про них, тому [target_character2.GetSheHe] бажає призначити [target_character.GetNameWithNoTooltip] до адміністрації."
  flavor_tur.185.historical_info: "Однією з найвпливовіших постатей XVIII століття був Алі-паша з Яніни, який народився бандитом в Албанії, де він створював проблеми для місцевого паші Ахмета Курта-паші. Хоча Османська імперія вжила заходів проти нього, вони незабаром усвідомили його військові та дипломатичні навички завдяки стабілізації, яку він приніс між османами та венеціанцями, тому вирішили надати йому губернаторство Яніни. Попри те, що його було скинуто через дотримання власних інтересів, а не наказів султана, його було повторно призначено, і він діяв як незалежний правитель, втручаючись у справи західних держав. Однак, зрештою, ці дії привернули увагу султана Махмуда II, який оголосив йому війну і поклав край його володінням."
  flavor_tur.185.a: "[target_character.GetNameWithNoTooltip] служитиме нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tur.185.b: "Надамо [target_character.GetHerHim] землі [ShowAreaNameWithNoTooltip('northern_greece_area')]."
  flavor_tur.185.c: "Ми не будемо набирати бандитів до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tur.186.title: "Піднесення класу кочабаші в [ShowRegionNameWithNoTooltip('balkan_region')]"
  flavor_tur.186.desc: "З численними містами та містечками, які ми завоювали в [ShowRegionName('balkan_region')], наша адміністрація розтягнута до межі, особливо враховуючи місцеві закони, які має кожне з них. З огляду на ці складнощі, повна інтеграція їх у [ROOT.GetCountry.GetAdjective] право є майже неможливою. Саме з цієї причини наш [ROOT.GetCountry.GetGovernment.GetCabinetTitle] пропонує залучати місцевих жителів для збору податків, правоохоронної діяльності та всього іншого, що стосується адміністрації. Це може не принести нам того контролю, якого ми хотіли б від цих земель, але принаймні це дозволить нам отримувати від них вигоду."
  flavor_tur.186.a: "Залучення місцевих жителів, безсумнівно, принесе нам бажані переваги."
  flavor_tur.186.b: "Ми не довіряємо їм закони чи податки."
  flavor_tur.187.title: "[ShowCultureNameWithNoTooltip('turkish_culture')] насолода"
  flavor_tur.187.desc: "Кулінарний геній нашого народу призвів до того, що багато крамниць намагаються створити унікальні солодощі, які залишать незабутнє враження у кожного, хто їх спробує. На щастя для нас, [target_character.GetName] знайшов точний рецепт для цього. Використовуючи нещодавні відкриття щодо смаку, кольору та текстури, [target_character.GetSheHe] створив нові солодощі для кожного громадянина в [ShowLocationName('constantinople')] – [ShowCultureName('turkish_culture')] насолоду. Хоча багато хто вважає, що такі солодощі вже існували в минулому, вони набувають неймовірної популярності, що призводить до того, що багато хто вважає, що їх винайшли в [ROOT.GetCountry.GetName]."
  flavor_tur.187.a: "Такий ароматний десерт міг бути винайдений лише в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_tur.187.b: "Неважливо, хто це зробив, а хто продає."
  tur_greek_people_will_not_like_this_tt: "[ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetName] можуть не схвалювати наших сміливих заяв щодо [ShowCultureName('turkish_culture')] насолоди"
  flavor_tur.188.title: "[ShowCultureNameWithNoTooltip('greek_culture')] претензії на [ShowCultureNameWithNoTooltip('turkish_culture')] насолоду"
  flavor_tur.188.desc: "Хоча ми рекламували [ShowCultureName('turkish_culture')] насолоду як солодощі, що походять з [ROOT.GetCountry.GetName], наш [ShowCultureName('greek_culture')] народ образився на це. Натомість вони стверджують, що це лише переосмислення $BYZ_ADJ$ солодощів, тоді як інші стверджують, що їх винайшли люди з [ShowRegionName('anatolia_region')]. Хоча це дріб'язкова скарга, вона все ж засмутила наше [ShowCultureNameWithNoTooltip('greek_culture')] населення."
  flavor_tur.188.a: "Така дріб'язковість..."
  tur_all_greek_pops_lose_satisfaction_due_to_turkish_delight_tt: "Усі наші [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.189.title: "Фанаріоти"
  flavor_tur.189.desc: "Хоча $BYZ_ADJ$ імперія впала, [target_location.GetName] все ще має тривалий вплив на своїх старих людей, зокрема на [ShowCultureName('greek_culture')] населення. Незважаючи на те, що вони схилили перед нами коліна, вони все ще дотримуються своїх звичаїв, оскільки ми дозволили їм це. Фанаріоти складаються переважно з багатих купців або кількох [ShowReligionAdjective('orthodox')] єпископів. З цієї причини вони освічені та займають досить значне становище в [ROOT.GetCountry.GetFlavorRank]. Можливо, ми можемо надати їм місце для проживання в [target_location.GetNameWithNoTooltip], дозволивши їм самостійно розширювати свої багатства."
  flavor_tur.189.a: "Вони отримають свій район."
  flavor_tur.189.b: "Немає причин; вони вже є громадянами [target_location.GetNameWithNoTooltip]."
  tur_lose_greek_satisfaction_in_constantinople_tt: "Усі [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowLocationName('constantinople')] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.190.title: "Право на носіння зброї"
  flavor_tur.190.desc: "Хоча [ROOT.GetCountry.GetName] не дозволяв [GetEstateName('peasants_estate')] володіти зброєю; багато наших завойованих земель, схоже, ігнорують це правило, натомість обираючи бути готовими до бою у випадку будь-яких повстань, війн чи заворушень. Хоча це може дозволити нам належним чином їх мобілізувати, це також ставить нас під загрозу нестабільності, тому існують наші закони проти зброї. З цієї причини [target_character.GetName] проконсультувався з [ROOT.GetCountry.GetGovernment.GetCabinetTitle] щодо цього питання, і було запропоновано належним чином застосувати ці заборони, хоча вони, безумовно, спричинять деякі заворушення в короткостроковій перспективі. Альтернативно, ми могли б прийняти це явище, дозволивши їм носити зброю і сподіваючись, що це їх задовольнить."
  flavor_tur.190.a: "Давайте повністю заборонимо [GetEstateNameWithNoTooltip('peasants_estate')] носити зброю."
  flavor_tur.190.b: "Дозвольте їм мати зброю, щоб виявити повагу до їхньої автономії."
  tur_all_heathen_peasants_lose_satisfaction_tt: "Усі не-[ROOT.GetCountry.GetReligion.GetGroup.GetAdjective] [GetEstateName('peasants_estate')] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.191.title: "Маніоти"
  flavor_tur.191.desc: "Незважаючи на падіння [ShowAreaName('morea_area')] до [ROOT.GetCountry.GetName], все ще існує група, зокрема в [ShowProvinceDefinitionName('messenia_province')], яка чинить опір нашому правлінню. Відомі як маніоти, вони безпосередньо займають дороги в цьому районі, здійснюючи набіги на місцевих губернаторів, намагаючись відлякати їх від входу в їхні гірські села. Хоча вони ніколи не становитимуть великої проблеми, населення там повільно починає приєднуватися до їхньої справи, сподіваючись отримати ще більшу автономію від такої боротьби. Замість того, щоб намагатися боротися з ними у відкритому бою, ми могли б надати їм бажану автономію, заощадивши нам зусилля на відправлення військ для боротьби з цим повстанням."
  flavor_tur.191.a: "Вони отримають свої права в [ShowProvinceDefinitionNameWithNoTooltip('messenia_province')]."
  flavor_tur.191.b: "Нехай повстають, якщо хочуть; ми просто їх переможемо."
  tur_all_messenian_locations_lose_control_and_gain_estate_building: "Кожен [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowProvinceDefinitionName('messenia_province')] втратить [ShowNamedValue('control_ultimate_penalty')|-=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] та отримає [ShowBuildingTypeName('maniot_toll_guards')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e]"
  tur_all_messenian_location_pops_lose_satisfaction: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowProvinceDefinitionName('messenia_province')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.192.title: "[ShowCultureNameWithNoTooltip('greek_culture')] крипто-[ShowReligionGroupAdjectiveWithNoTooltip('Christian)] населення"
  flavor_tur.192.desc: "Наші зусилля навернути [ShowCultureName('greek_culture')] народ до [ROOT.GetCountry.GetReligion.GetName] були, здебільшого, успішними. Однак, попри це, надходять повідомлення про фальшиві навернення, що використовуються як спосіб отримати більше привілеїв, таємно сповідуючи свої [ShowReligionGroupAdjective('christian')] звичаї. Ми вже мали кілька таких випадків, що виявилися правдивими, але [ROOT.GetCountry.GetGovernment.GetCabinetTitle] вважає, що таких людей ховається більше, навіть у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Саме з цієї причини [target_character.GetName] пропонує провести розслідування та накласти покарання на тих, хто таємно залишається [ShowReligionGroupAdjectiveWithNoTooltip('christian')]."
  flavor_tur.192.a: "Ми розкриємо будь-які подібні випадки."
  flavor_tur.192.b: "Можливо, нам варто просто залишити їх у спокої; розпалювання заворушень не закінчиться для нас добре."
  tur_convert_greek_christians_tt: "#Y 10%#! наших [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ROOT.GetCountry.GetReligion.GetName]"
  flavor_tur.193.title: "[target_character.GetNameWithNoTooltip]"
  flavor_tur.193.desc: "Критський купець з [ShowLocationName('rethymno')], [target_character.GetName] отримує прибуток для [target_character.GetHerselfHimself], створюючи торговельні мережі по всій [ShowContinentName('europe')]. Її/Його багатство також залишається неперевершеним порівняно з іншими [GetEstateName('burghers_estate')], володіючи значним приватним флотом. З огляду на все це, [ROOT.GetCountry.GetGovernment.GetCourtTitle] вважає, що просування такої [target_character.GetWomanMan] у нашому суспільстві допоможе нам, як би ми того не бажали, чи то завдяки [target_character.GetHerHis] досвіду як судновласника, чи то завдяки [target_character.GetHerHis] багатству."
  flavor_tur.193.a: "[target_character.GetNameWithNoTooltip] служитиме адміралом."
  flavor_tur.193.b: "[target_character.GetSheHe|U] дозволено використовувати [target_character.GetHerHis] багатство для [GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_tur.193.c: "Ми не дозволимо [ShowCultureNameWithNoTooltip('greek_culture')] домінувати в нашій політиці."
  flavor_tur.194.title: "Драгоман"
  flavor_tur.194.desc: "Зростаюча влада різних меншин у [ROOT.GetCountry.GetName] виявилася значною перевагою при веденні дипломатії. Багато з них, особливо заможні купці, володіють кількома мовами, що було б корисно при веденні дипломатії. Замість того, щоб вони служили лише [GetEstateName('burghers_estate')], можливо, нам варто надати їм посаду драгомана, перекладача для посольств, консульств та торгових постів. Однак це дозволить їм отримати інші посади в [ROOT.GetCountry.GetFlavorRank], чим вони можуть скористатися."
  flavor_tur.194.a: "Почнімо наймати цих багатомовних купців."
  flavor_tur.194.b: "Дипломатію краще вести [ROOT.GetCountry.GetAdjectiveWithNoTooltip] чиновникам."
  tur_unlock_appoint_dragoman_interaction_for_non_primary_culture_characters: "Ми зможемо використовувати [ShowCharacterInteractionName('tur_appoint_dragoman')] [Concept('character_interaction', 'CONCEPT_PLACEHOLDER')|e] на [Concept('characters', 'CONCEPT_PLACEHOLDER')|e], які не є частиною [Concept('ROOT.GetCountry.GetCulture.GetName] [culture', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.195.title: "Повстання в [ShowProvinceDefinitionNameWithNoTooltip('thessaly_province')]"
  flavor_tur.195.desc: "[ShowReligionAdjective('orthodox')] народ [ShowProvinceDefinitionName('thessaly_province')] незадоволений нашим правлінням, стверджуючи, що ми часто ігноруємо їхні релігійні традиції, нав'язуючи свої звичаї їхній землі. Хоча вони ніколи не повставали лише через це, місцевий губернатор зайшов занадто далеко, понизивши в сані популярного єпископа в цьому районі. З цієї причини клас [GetEstateName('peasants_estate')] повстав, вимагаючи, щоб ми подбали про цю несправедливість."
  flavor_tur.195.a: "Нехай повстають, якщо хочуть; ми їх розчавимо."
  flavor_tur.195.b: "Вони отримають свою справедливість."
  tur_all_of_thessaly_will_join_revolt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('thessaly_province')] приєднаються до [Concept('thessaly_revolt.GetName] [rebellion', 'CONCEPT_PLACEHOLDER')|e] і втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  thessaly_revolt: "Фессалійське повстання"
  flavor_tur.196.title: "Заснування Сараєва"
  flavor_tur.196.desc: "Щодо нашої адміністрації в [ShowProvinceDefinitionName('bosnia_province')], нам бракувало центру, де б могли проживати наші губернатори та належним чином зміцнювати свій вплив на народ. Щоб виправити це, [ROOT.GetCountry.GetGovernment.GetCabinetTitle] пропонує заснувати [target_location.GetName] як такий центр, ефективно перетворивши [target_location.GetRank.GetName] на резиденцію для наших губернаторів. Це дало б нам контроль, якого ми прагнемо в цьому районі, якщо у нас є вільні кошти."
  flavor_tur.196.a: "Заснуймо Сараєво."
  flavor_tur.196.b: "Нехай [target_location.GetRank.GetNameWithNoTooltip] розвивається самостійно."
  sarajevo: "Сараєво"
  flavor_tur.197.title: "Розвиток [ShowCultureNameWithNoTooltip('greek_culture')] народної музики"
  flavor_tur.197.desc: "Відсутність належної нації для [ShowCultureName('greek_culture')] народу призвела до того, що багато хто з них почав бачити [ROOT.GetCountry.GetName] як свій єдиний дім. Однак замість інтеграції в наше суспільство, вони повільно починають розгалужуватися, створюючи характер, достатньо відмінний від $BYZ$ та наших [ROOT.GetCountry.GetAdjectiveWithNoTooltip] звичаїв. Прикладом є нові стилі народної музики, що розвиваються в численних містах і селах у межах [ShowRegionName('balkan_region')]. Хоча це не єдине зусилля, багато з цих стилів поділяють одне й те саме почуття, розповідаючи про давні часи та різні опори проти іноземних загроз. Дозвіл на розвиток такого стилю може задовольнити простолюдинів, але це також означатиме, що їх буде важче включити до [ROOT.GetCountry.GetFlavorRank]."
  flavor_tur.197.a: "Нехай музика насолоджується, незалежно від стилю."
  flavor_tur.197.b: "Якщо вони розповідають історії проти нас, їм не дозволено співати таку музику."
  tur_all_greek_peasants_gain_satisfaction: "Кожен [GetEstateName('peasants_estate')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], що належить до [ShowCultureName('greek_culture')] [Concept('culture', 'CONCEPT_PLACEHOLDER')|e], отримає [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.198.title: "Клефти"
  flavor_tur.198.desc: "Численні села та магістралі в [ShowRegionName('balkan_region')] були відрізані від зв'язку з [ROOT.GetCountry.GetCapital.GetName] внаслідок розгулу бандитизму в сільській місцевості. Ці бандити, відомі як клефти, чинять опір нашому правлінню над їхніми землями, облаштувавши свої схованки в горах. Хоча вони не організовані у своєму опорі, вони спричинили кілька проблем для місцевих губернаторів на цих землях. Таку проблему потрібно вирішити негайно."
  flavor_tur.198.a: "Ми розберемося з ними по-старому."
  flavor_tur.198.b: "Давайте заплатимо цим бандитам, натомість завербувавши їх до нашої армії."
  tur_all_balkan_location_greek_pops_lose_satisfaction: "Усі [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('balkan_region')] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  klephts: "Клефти"
  flavor_tur.199.title: "Позиція [ShowLocationNameWithNoTooltip('sredets')]"
  flavor_tur.199.desc: "На окупованих землях у [ShowAreaName('bulgaria_area')] існує безліч законів, які не відповідають законам [ROOT.GetCountry.GetName]. Це дозволило їм часто ігнорувати такі речі, як податки та призов, надаючи їм більше автономії, ніж вони повинні мати. З цієї причини [ROOT.GetCountry.GetGovernment.GetCabinetTitle] запропонував нам належним чином створити адміністрацію в центрі цих земель, зокрема [target_location.GetName]. Контрольовані [ROOT.GetCountry.GetAdjective] елітами, вони обов'язково принесуть нам бажані вигоди, якщо ми інвестуємо в них наше золото."
  flavor_tur.199.a: "Давайте встановимо [target_location.GetNameWithNoTooltip] як центр [ShowAreaNameWithNoTooltip('bulgaria_area')]."
  flavor_tur.199.b: "Їхні місцеві закони нас не дуже турбують."
  flavor_tur.200.title: "Зникнення [ShowCultureNameWithNoTooltip('bulgarian')] культури"
  flavor_tur.200.desc: "Роки [ROOT.GetCountry.GetAdjective] правління та роки іноземного управління призвели до повільного згасання культурної ідентичності [ShowCultureName('bulgarian')] народу. Будучи більш інтегрованими з нашими [ROOT.GetCountry.GetCulture.GetName] звичаями, їх стало легше інтегрувати в нашу адміністрацію, забезпечуючи належний контроль над їхніми землями з боку [target_character.GetName]."
  flavor_tur.200.a: "Сумний розвиток подій, але на нашу користь."
  flavor_tur.201.title: "[ShowCultureNameWithNoTooltip('greek_culture')] Вплив у [ShowAreaNameWithNoTooltip('bulgaria_area')]"
  flavor_tur.201.desc: "Через занепад [ShowCultureName('bulgarian')] культури з'явилося багато опортуністів, які прагнуть натомість поширити свій вплив на землях [ShowAreaName('bulgaria_area')]. Зокрема, [ShowCultureName('greek_culture')] люди нашого [ROOT.GetCountry.GetFlavorRank] планували оселитися на їхніх землях, купуючи будинки та заселяючи вулиці. Це означає погані новини для [ShowCultureNameWithNoTooltip('bulgarian')] громадян, але принаймні це дозволить нам зберегти їхні землі живими."
  flavor_tur.201.a: "Цікавий розвиток подій."
  flavor_tur.202.title: "[ShowReligionAdjectiveWithNoTooltip('orthodox')] Повстання у [ShowProvinceDefinitionNameWithNoTooltip('vidin_province')]"
  flavor_tur.202.desc: "[ShowReligionAdjective('orthodox')] люди [ShowProvinceDefinitionName('vidin_province')] були незадоволені нашим [ROOT.GetCountry.GetAdjective] правлінням над їхніми землями. Частково це пов'язано з ворожнечею між обома вірами, коли місцеві губернатори порушували їхні права як громадян [ROOT.GetCountry.GetFlavorRank]. Вони організувалися, сіючи невдоволення в інших місцях у [ShowAreaName('bulgaria_area')], бажаючи таким чином отримати автономію. Як ми відповімо на цю проблему?"
  flavor_tur.202.a: "Якщо вони бажають повстати, давайте відправимо армію."
  flavor_tur.202.b: "Такі тривіальні вимоги нам не шкодять; даймо їм те, чого вони хочуть."
  tur_all_of_vidin_will_join_revolt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowProvinceDefinitionName('vidin_province')] приєднаються до [Concept('chiprovtsi_uprising.GetName] [revolt', 'CONCEPT_PLACEHOLDER')|e], і вони втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  chiprovtsi_uprising: "Чипровське повстання"
  flavor_tur.203.title: "[ShowReligionGroupNameWithNoTooltip('muslim')] у [ShowAreaNameWithNoTooltip('bulgaria_area')]"
  flavor_tur.203.desc: "Наш повний контроль над [ShowAreaName('bulgaria_area')] дозволив поширити нашу віру на їхні землі. Хоча це повільний процес, він також стабільний, але є члени [GetEstateName('clergy_estate')], які бажають, щоб ми наклали на них більше податків, позбавивши їх більшої кількості прав, щоб вони були змушені навернутися до істинної віри. Однак, якщо ми це зробимо, ми, безумовно, зіткнемося з громадянськими заворушеннями на їхніх землях, можливо, навіть призведе до повстання."
  flavor_tur.203.a: "Чим більше [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] громадян ми маємо, тим краще."
  flavor_tur.203.b: "Не будемо засмучувати наших [GetEstateNameWithNoTooltip('dhimmi_estate')]."
  tur_convert_bulgarian_pops_to_islam_tt: "#Y 10%#! [ShowCultureName('bulgarian')] або [ShowReligionAdjective('orthodox')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('bulgaria_area')] навернуться до [ROOT.GetCountry.GetReligion.GetName]"
  tur_unrest_in_bulgarian_pops_tt: "Усі наші [ShowCultureName('bulgarian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.204.title: "Доля халіфа"
  flavor_tur.204.desc: "З окупацією [ShowLocationName('cairo')] халіф перебуває в нашій милості. Приведений до [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] і зустрівшись віч-на-віч з [target_character.GetName], усім очевидно, що ця релігійна фігура є не більше ніж простою людиною, яка зараз слабша за нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Будучи зрозумілим для всіх, можливо, Аббасидський халіф є лише застарілою фігурою, яку потрібно скинути і, можливо, замінити на [target_character.GetNameWithNoTooltip], справжній меч [ShowReligionGroupName('muslim')]."
  flavor_tur.204.a: "Позбудьмося старого халіфа."
  flavor_tur.204.b: "Залишимо халіфа як фігуру."
  tur_all_muslim_pops_gain_satisfaction: "Усі наші [ShowReligionGroupAdjective('muslim')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.205.title: "[ShowAdvanceNameWithNoTooltip('ghazi')] [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_tur.205.desc: "Військова доблесть [ROOT.GetCountry.GetName] поширилася далеко й широко, але є твердження, що наші завоювання здійснюються екстремальними заходами. Помітивши це, [target_character.GetName] бажає створити інший образ для [ROOT.GetCountry.GetAdjectiveWithNoTooltip] полків. Замість того, щоб залежати від грабунку та розбою, [target_character.GetSheHe] бажає зобразити [target_character.GetHerselfHimself] як [ShowAdvanceName('ghazi')] [ROOT.GetCountry.GetGovernment.GetRulerTitle], того, хто захищає права невіруючих і не займається політикою, а радше [ROOT.GetCountry.GetGovernment.GetRulerTitle], який є простим солдатом."
  flavor_tur.205.a: "Нехай вони пам'ятають [target_character.GetNameWithNoTooltip] як справжнього [ShowAdvanceNameWithNoTooltip('ghazi')]."
  flavor_tur.205.b: "Немає потреби створювати такий образ для [target_character.GetNameWithNoTooltip]."
  flavor_tur.206.title: "[ShowReligionAdjectiveWithNoTooltip('judaism')] Народ [ShowLocationNameWithNoTooltip('thessaloniki')]"
  flavor_tur.206.desc: "Зростаюча [ShowReligionAdjective('judaism')] меншина в [target_location.GetName] принесла свої ідеї людям [target_location.GetRank.GetName], що було, здебільшого, сприйнято позитивно. Вже розвинувши власну культуру, вони зайняли частину [target_location.GetNameWithNoTooltip]. З цих причин [target_character.GetName] бажає надати їм їхній район, де вони зможуть розвивати його вулиці та приносити нам якомога більше багатства."
  flavor_tur.206.a: "Надаймо їм їхній район."
  flavor_tur.206.b: "Вони не отримають особливих привілеїв."
  flavor_tur.207.title: "Заворушення серед послідовників [ShowReligiousSchoolNameWithNoTooltip('alevism_school')]"
  flavor_tur.207.desc: "Наша війна з [target_country.GetName] призвела до значних заворушень серед частини нашого населення. Зокрема, ті, хто дотримується ідей [ShowReligiousSchoolName('alevism_school')], почали озброюватися, сподіваючись покласти край цьому божевіллю конфлікту. Це привело наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] у стан підвищеної готовності та готовності розгромити будь-кого, хто може спробувати звільнитися від нашого правління."
  flavor_tur.207.a: "Вони скуштують нашої сталі."
  tur_alevi_unrest_tt: "Всі наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що належать до [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] [ShowCultureName('kurdish_culture')] або сповідують [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionAdjective('shia')] чи [ShowReligionAdjective('ibadi')], втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tur.208.title: "[ShowPolicyNameWithNoTooltip('tur_kanum_i_osmani')]"
  flavor_tur.208.desc: "Завдяки зростанню [ROOT.GetCountry.GetFlavorRank] у його межах оселилося безліч різних народів. Багато хто вже став невід'ємною частиною нашої нації, дотримуючись старих [ROOT.GetCountry.GetAdjective] законів. Проте, схоже, цих законів недостатньо. [target_character.GetName], відомий як піонер реформ, натомість бажає переписати весь правовий кодекс [ROOT.GetCountry.GetNameWithNoTooltip], щось, що принесе внутрішню стабільність, а не заохочуватиме розширення кордонів шляхом завоювань."
  flavor_tur.208.a: "Ці закони приведуть нас у нову добу."
  flavor_tur.208.b: "Ми пам'ятатимемо про ці реформи."
  tur_change_tur_kanum_policy_to_give_values_weighted_by_crown_power: "[Concept('modifiers', 'CONCEPT_PLACEHOLDER')|e], які надає [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('tur_kanum_i_osmani')], будуть на #Y 50%#! ефективнішими, але натомість їхня ефективність залежатиме від [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] [GetEstateName('crown_estate')]"
  flavor_tur.209.title: "$sulaymaniyya_takiyya$"
  flavor_tur.209.desc: "Коли правління [target_character2.GetName] досягло свого апогею, [target_character2.GetSheHe] бажає звести пам'ятник для всіх, хто близький [target_character2.GetHerHim]. [target_character.GetSheHe|U] вважає, що [ShowLocationName('damascus')] було б ідеальним місцем для цього, і попросив [target_character.GetName] розробити його. [target_character.GetNameWithNoTooltip] з ентузіазмом ставиться до такого проєкту, але передбачає, що це буде нелегке завдання, оскільки воно потребуватиме включення елементів [ShowCultureName('syriac_culture')] стилю, про що [target_character.GetSheHe] мало знає."
  flavor_tur.209.a: "Навчальний досвід і шанс для екзотичної архітектури."
  flavor_tur.209.b: "Відмовимося від цих зусиль."
  flavor_tur.210.title: "Рудобородий корсар"
  flavor_tur.210.desc: "Народившись у [ShowLocationName('molyvos')], [target_character.GetName] усе життя служив на морі, здійснюючи численні торговельні експедиції в Середземному морі. Попри це, [target_character.GetSheHe] вважає, що таке життя не підходить [target_character.GetHerHim], і тепер є корсаром для [ROOT.GetCountry.GetName]. Хоча [target_character.GetSheHe] не займає високих посад, [target_character.GetSheHe] приніс багато багатства [target_character.GetHerHis] родині. Усе це привернуло увагу [ROOT.GetCountry.GetGovernment.GetCourtTitle], який бажає завербувати [target_character.GetHerHim] до [ROOT.GetCountry.GetAdjectiveWithNoTooltip] флоту."
  flavor_tur.210.a: "Нехай ця рудоборода загроза принесе нам славу."
  flavor_tur.210.b: "Ми завербуємо [target_character.GetHerHim] та будь-якого іншого корсара."
  flavor_tur.210.c: "Немає потреби займатися подальшим піратством."
  flavor_tur.211.title: "Падіння [ShowLocationNameWithNoTooltip('belgrad')]"
  flavor_tur.211.desc: "Після місяців облоги наші війська взяли під контроль [target_location.GetRank.GetName] [target_location.GetName], важливу фортецю на всіх [ShowRegionName('balkan_region')]. З її падінням [target_character.GetName] побачив нові можливості, зокрема на землях [ShowRegionName('carpathia_region')], де наші армії, безсумнівно, домінуватимуть у відкритому бою. Нехай ця облога стане прикладом для всіх, хто нам протистоїть."
  flavor_tur.211.a: "Рушаймо далі."
  flavor_tur.212.title: "Окупація [ShowLocationNameWithNoTooltip('buda')]"
  flavor_tur.212.desc: "Землі [ShowRegionName('carpathia_region')] завжди залежали від [target_location.GetName] як захисту від іноземних загарбників. Будучи важливим місцем для [target_country.GetName], саме воно підтримувало їхній [target_country.GetFlavorRank] на плаву, але тепер, коли такий [target_location.GetRank.GetName] знаходиться під нашим контролем, решта їхніх земель, безсумнівно, незабаром піде за ним. Можливо, настав час використати розбрат у [ShowRegionNameWithNoTooltip('carpathia_region')] і завоювати залишки там."
  flavor_tur.212.a: "Вони пам'ятатимуть падіння [target_location.GetNameWithNoTooltip] протягом багатьох років."
  flavor_tur.213.title: "Лігво халіфа"
  flavor_tur.213.desc: "Наші конфлікти з [target_country.GetLongName], схоже, наближаються до кінця. З окупацією [target_location.GetName] неминуче, що ми будемо керувати Аббасидським халіфом, який проживає в [target_location.GetRank.GetName]. Однак наразі всім зрозуміло, що [target_country.GetNameWithNoTooltip] не може захистити свою віру чи свій [target_country.GetFlavorRank]. Можливо, ми зможемо використати таке явище в майбутньому, але наразі ми будемо купатися в славі відчинених воріт [ShowRegionName('egypt_region')]."
  flavor_tur.213.a: "Насолоджуймося таким успіхом."
  flavor_tur.214.title: "Ворота [ShowContinentNameWithNoTooltip('europe')]"
  flavor_tur.214.desc: "Для багатьох націй у [ShowContinentName('europe')], [target_location.GetName] вважалася фортецею, що тримала б нас подалі від решти континенту. Попри це, однак, [target_country.GetName] не змогла зупинити нашу військову кампанію, що призвело до падіння [target_location.GetRank.GetName]. Багато хто вважає це неминучим, і, можливо, їм слід незабаром схилити коліна, тоді як інші тепер збирають опір проти нас. У будь-якому разі, ворота [ShowContinentNameWithNoTooltip('europe')] тепер широко відчинені."
  flavor_tur.214.a: "Ми пройдемо за ці ворота."
  flavor_tur.215.title: "Падіння [target_country.GetNameWithNoTooltip]"
  flavor_tur.215.desc: "Острів [target_location.GetName] був великою завадою для нас надто довго. [target_country.GetName] завжди організовувала набіги проти нас, використовуючи острів як базу для операцій. Однак наша нещодавня кампанія проти них була успішною, що призвело до падіння острова та всього [target_country.GetAdjectiveWithNoTooltip] опору."
  flavor_tur.215.a: "Нехай вони пам'ятають, що стається, коли вони чинять нам опір."
  flavor_tur.216.title: "Майбутня база в [ShowAreaNameWithNoTooltip('western_mediterranean_sea_area')]"
  flavor_tur.216.desc: "[target_country.GetName] знала наші наміри щодо бажання окупувати [target_location.GetName]. Вони знали, що ми хотіли використовувати його як базу для операцій в решті [ShowAreaName('western_mediterranean_sea_area')], дозволяючи нам проводити експедиції до сусідніх портів. Саме тому вони чинили нам опір у кривавій облозі фортеці там. Попри їхні зусилля, однак, [target_location.GetRank.GetNameWithNoTooltip] тепер підпала під наше правління."
  flavor_tur.216.a: "Негайно розмістимо там наші флотилії."
  flavor_tur.217.title: "Заворушення в [ShowAreaNameWithNoTooltip('serbia_area')]"
  flavor_tur.217.desc: "[ShowReligionAdjective('orthodox')] громади в [ShowAreaName('serbia_area')] не сприйняли наші [ROOT.GetCountry.GetReligion.GetAdjective] звичаї, особливо тому, що вони вважають, ніби ми намагаємося нав'язати їх за допомогою наших місцевих намісників. Тому вони беруться за зброю і готові боротися проти нас, якщо ми спробуємо розширити наш вплив на їхніх землях. Це турбує наш [ROOT.GetCountry.GetGovernment.GetCabinetTitle], який вважає, що ми повинні перешкоджати будь-яким повстанням, щоб інші частини нашого [ROOT.GetCountry.GetFlavorRank] також не повстали."
  flavor_tur.217.a: "Ми готові зустріти їх на полі бою."
  flavor_tur.217.b: "Нехай вони мають свою автономію."
  tur_all_of_specified_locations_join_rebellion_tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('toplica_province')], [ShowProvinceDefinitionName('sumadija_province')], та [ShowProvinceDefinitionName('branicevo_province')] приєднаються до [serb_uprising.GetName], і втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  tur_all_specified_locations_lose_control: "Усі [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('toplica_province')], [ShowProvinceDefinitionName('sumadija_province')], та [ShowProvinceDefinitionName('branicevo_province')] втратять [ShowNamedValue('control_ultimate_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  serb_uprising: "$serbian$ Повстання"
  flavor_tur.218.title: "[target_location.GetRank.GetNameWithNoTooltip] біля річки"
  flavor_tur.218.desc: "Через потребу в адмініструванні в [ShowAreaName('bosnia_area')], система доріг застаріла. Одним із таких місць, що гостро потребують оновлення, є [target_location.GetName], [target_location.GetRank.GetName] біля річки. З цієї причини [target_character.GetName] бажає, щоб [target_location.GetRank.GetNameWithNoTooltip] отримала додаткову допомогу, перетворивши її на адміністративний центр для [ShowAreaNameWithNoTooltip('bosnia_area')]."
  flavor_tur.218.a: "Інвестуймо в [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_tur.218.b: "Дорога інвестиція, безперечно."
  flavor_tur.219.title: "Арматоли"
  flavor_tur.219.desc: "[ShowCultureName('greek_culture')] народ і загалом гірські місцевості [ShowRegionName('balkan_region')] чинили опір нашому правлінню за допомогою іррегулярних військ, здійснюючи набіг за набігом на наші торгові шляхи, дороги та адміністрацію, бажаючи знайти слушний час, щоб завдати удару по нас і здобути більшу автономію. Такі загрози рідко впливали на [ROOT.GetCountry.GetGovernment.GetCourtTitle] донедавна, коли вони, здається, накопичуються, викликаючи загальне невдоволення в усьому [ShowRegionNameWithNoTooltip('balkan_region')]."
  flavor_tur.219.a: "Прокляття!"
  flavor_tur.219.b: "Замість того, щоб вони протистояли нам, ми можемо їх підкупити."
  flavor_tur.220.title: "[ShowBuildingTypeNameWithNoTooltip('darussifa')] в [ShowLocationNameWithNoTooltip('amasya')]"
  flavor_tur.220.desc: "З нашим контролем над [target_location.GetRank.GetName], [target_character.GetName] зацікавився [ShowBuildingTypeName('darussifa')] там. Хоча його було збудовано в період $ilkhanate$, він досі слугує досить передовою лікарнею в усій [ShowRegionName('anatolia_region')], можливо, навіть у всьому світі. Тому [target_character.GetSheHe] бажає профінансувати його розширення, перетворивши його на місце, де кожен вчений зможе вивчати шляхи медичної науки."
  flavor_tur.220.a: "Ми профінансуємо її розширення."
  flavor_tur.220.b: "Нехай залишається як є."
  flavor_tur.221.title: "$blue_mosque$ [ShowLocationNameWithNoTooltip('constantinople')]"
  flavor_tur.221.desc: "Землі [target_location.GetName] можуть бути під владою [ROOT.GetCountry.GetReligion.GetAdjective] віри, але [target_character2.GetName] усвідомив брак благочестя та престижу в останні роки щодо [target_location.GetRank]. Саме тому [target_character2.GetSheHe] одержимий будівництвом нової мечеті, яка була б поблизу Іподрому $BYZ_ADJ$ епохи. Для цієї роботи [target_character.GetName] було доручено спроектувати найекстравагантніший пам'ятник в історії, або принаймні в усій [ROOT.GetCountry.GetAdjective] історії, щоб він виділявся серед інших мечетей."
  flavor_tur.221.a: "Створимо $blue_mosque$."
  flavor_tur.221.b: "Занадто дорого, мабуть."
  flavor_tur.1000.title: "Вимагати [ShowCultureNameWithNoTooltip('albanian')] заручників"
  flavor_tur.1000.desc: "Попри наш контроль над [ShowProvinceDefinitionName('albania_province')], на цих землях було кілька бунтівних лордів, які, можливо, відкрито не говорять про свою позицію [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], але, безсумнівно, вжили б заходів, якщо виникнуть проблеми. Замість того, щоб сидіти склавши руки, були пропозиції взяти у них заручників, зокрема членів родини [ShowDynastyName('kastrioti_dynasty')]. Можливо, таким чином ми зможемо мати над ними вплив, використовуючи його, якщо вони коли-небудь надумають повстати проти [target_character.GetName]."
  flavor_tur.1000.a: "Вимагаймо цих заручників."
  flavor_tur.1000.b: "Це було б неповагою до [target_country.GetNameWithNoTooltip]."
  tur_demand_hostage_from_albanian_country_tt: "Ми вимагатимемо від [Concept('target_country.GetName] дати нам [character', 'CONCEPT_PLACEHOLDER')|e] з [ShowDynastyName('kastrioti_dynasty')]"
  flavor_tur.1001.title: "$flavor_tur.1000.title$"
  flavor_tur.1001.desc: "[target_country2.GetName] вимагає, щоб ми надіслали їм заручника. Хоча вони могутніші за нас, їм потрібен важіль впливу на нас на випадок, якщо ми захочемо воювати з ними в майбутньому. [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує передати їм [target_character2.GetName], дрібного дворянина цих земель, як заручника. Однак, зробивши це, ми зміцнюємо нашу позицію в цій динаміці."
  flavor_tur.1001.a: "Передамо [target_character2.GetNameWithNoTooltip]"
  flavor_tur.1001.b: "Вони не отримають нікого з наших людей!"
  flavor_tur.1002.title: "Військова підготовка для [target_character.GetNameWithNoTooltip]"
  flavor_tur.1002.desc: "За роки служби в [ROOT.GetCountry.GetAdjective] армії [target_character.GetName] виявив природний талант до лідерства. Хоча [target_character.GetSheHe] ніколи не очолював [target_character.GetHerHis] власну армію, [target_character.GetSheHe] може згуртувати сотні солдатів, ведучи їх до перемоги, попри чисельну перевагу противника. [target_character2.GetName] вражений такою майстерністю і бажає надати [target_character.GetHerHim] належну військову освіту, на яку [target_character.GetSheHe] заслуговує."
  flavor_tur.1002.a: "Оплатимо це навчання."
  flavor_tur.1002.b: "[target_character.GetSheHe|U] розбереться без будь-якої освіти."
  flavor_tur.1003.title: "[ShowSubjectTypeNameWithNoTooltip('uc_bey')] [ShowProvinceDefinitionNameWithNoTooltip('albania_province')]"
  flavor_tur.1003.desc: "Здобувши нам багато перемог, [target_character.GetName] відзначив [target_character.GetHerselfHimself] серед багатьох чоловіків, довівши [target_character2.GetName], що [target_character.GetHerHis] наміри полягають лише в допомозі [ROOT.GetCountry.GetName]. Саме тому [target_character.GetSheHe] тепер бажає служити [ShowSubjectTypeName('uc_bey')] [ShowProvinceDefinitionName('albania_province')]. [ROOT.GetCountry.GetGovernment.GetCourtTitle] підозрює, що це може бути хитрість, щоб повстати проти нас, не забуваючи, що [target_character.GetSheHe] є нашим заручником, але такий талант слід, навпаки, заохочувати."
  flavor_tur.1003.a: "Надамо [target_character.GetHerHim] землі."
  flavor_tur.1003.b: "Ми не довіряємо [target_character.GetHerHim]."
  tur_grant_all_of_albania_to_skanderbeg_as_uc_bey: "Ми створимо [ShowSubjectTypeName('uc_bey')] у [ShowProvinceDefinitionName('albania_province')], очолюваний [target_character.GetName]"
  tur_no_lands_for_skanderbeg_tt: "Жодних земель не буде надано [target_character.GetName]"
  flavor_tur.1004.title: "Піднесення [target_character2.GetNameWithNoTooltip]"
  flavor_tur.1004.desc: "Після такої довгої служби [ROOT.GetCountry.GetName], після отримання титулу [target_country.GetName], [target_character2.GetName] втратив прихильність [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], бажаючи натомість створити незалежну [ShowCultureName('albanian')] державу. Саме з цієї причини [target_character.GetSheHe] повстав проти нас, сподіваючись, що [target_character.GetSheHe] зможе здійснити [target_character.GetHerHis] мрії про суверенітет."
  flavor_tur.1004.a: "Цей зрадник!"
  flavor_tur.1004.b: "Ми не в змозі боротися з ними."
  flavor_tur.1004.c: "Червоний і чорний я ношу, орел на моїх грудях..."
  flavor_tur.1005.title: "[target_character.GetNameWithNoTooltip] залишає [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_tur.1005.desc: "Попри послуги, які [target_character.GetName] надав [ROOT.GetCountry.GetName], [target_character.GetSheHe] усвідомив, що [target_character.GetSheHe] не в змозі досягти незалежної [ShowCultureName('albanian')] держави. Ось чому [target_character.GetSheHe] втік з полону, втікши до [target_country.GetName], сподіваючись отримати там підтримку."
  flavor_tur.1005.a: "Скатертиною дорога."
  flavor_tur.1006.title: "$flavor_tur.1005.title$"
  flavor_tur.1006.desc: "[target_character.GetName] втік з [target_country2.GetName] після років статус-кво з [target_country2.GetAdjectiveWithNoTooltip] [target_country2.GetGovernment.GetCourtTitle]. Натомість [target_character.GetNameWithNoTooltip] тепер бажає служити нам, сподіваючись, що ми допоможемо [target_character.GetHerHim] у [target_character.GetHerHis] амбіціях незалежної [ShowCultureName('albanian')] нації."
  flavor_tur.1006.a: "Ми вітаємо [target_character.GetHerHim]."
  flavor_tur.1100.title: "[GetEstateNameWithNoTooltip('cossacks_estate')]"
  flavor_tur.1100.desc: "[GetEstateName('cossacks_estate')] з [target_country.GetName] є чудовою ціллю для нас, якщо ми коли-небудь розширимося в [ShowRegionName('ruthenia_region')]. Відомі як одні з найкращих вершників у всій [ShowContinentName('europe')], вони відбили багатьох завойовників. Однак у їхньому поточному стані ми повинні бути в змозі підкорити їх, чи то пером, чи мечем."
  flavor_tur.1100.a: "Вони схилять коліна перед нами."
  flavor_tur.1100.b: "Немає потреби у ворожнечі з ними."
  tur_demand_subjugation_of_zaz_tt: "Ми вимагатимемо, щоб [target_country.GetName] став нашим [ShowSubjectTypeName('vassal')]"
  flavor_tur.1101.title: "$flavor_tur.1100.title$"
  flavor_tur.1101.desc: "[target_country2.GetName] надіслали нам вимогу, щоб ми стали їхнім підданим. Обіцяючи нам захист від зовнішніх загроз і нагадуючи нам про свою могутність, вони сподіваються, що ми схилимо коліна перед [target_character2.GetName]."
  flavor_tur.1101.a: "У нас немає вибору."
  flavor_tur.1101.b: "Нам не потрібен їхній захист."
  flavor_tur.1101.c: "О, [target_country.GetGovernment.GetRulerTitle], [target_country.GetAdjectiveWithNoTooltip] диявол..."
  flavor_tur.1102.title: "$flavor_tur.1100.title$"
  flavor_tur.1102.desc: "Попри наші зусилля васалізувати [target_country.GetName], вони, здається, чинять опір. Що гірше, [target_character.GetName], завжди вульгарний, надіслав нам найобразливішого листа, не визнаючи великих титулів, якими володіє [target_character2.GetName], чого весь [ROOT.GetCountry.GetGovernment.GetCourtTitle] не залишає без уваги."
  flavor_tur.1102.a: "Вони пошкодують про той день, коли так образили нас!"
  flavor_tur.1200.title: "[target_country.GetAdjectiveWithNoTooltip] Пакт"
  flavor_tur.1200.desc: "Хоча наша віра не збігається з вірою [target_country.GetName], ми перебуваємо в однаковій дипломатичній ситуації з ними. Обидва ми бажаємо, щоб [target_rival.GetName] зник; надто довго вони конфліктували з нами, чинячи опір нашому впливу. Тому [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажає, щоб ми відправили посольство до [target_country.GetCapital.GetName]: для встановлення союзу та перемоги над нашим спільним суперником."
  flavor_tur.1200.a: "Надішлімо їм повідомлення."
  flavor_tur.1200.b: "Ми не будемо об'єднуватися з невірними."
  flavor_tur.1201.title: "$flavor_tur.1200.title$"
  flavor_tur.1201.desc: "[target_country2.GetName] бачило нашу боротьбу проти [target_rival.GetName], і, бачачи, що ми маємо того ж ворога, вони пропонують нам: союз між обома націями, призначений для перемоги над цим спільним суперником. Хоча це спокуслива пропозиція, інші нації можуть розцінити це як загрозу і об'єднатися проти нас, що було б не ідеально для [target_character.GetName]."
  flavor_tur.1201.a: "Залишимо це невизначеним наразі."
  flavor_tur.1201.b: "Ворог мого ворога..."
  flavor_tur.1201.c: "Союз із невірними? Ніколи!"
  flavor_tur.1300.title: "[target_country.GetAdjectiveWithNoTooltip] Зв'язки"
  flavor_tur.1300.desc: "Корсари в [target_country.GetName] займають важливу позицію, коли йдеться про вторгнення до [ShowRegionName('iberia_region')]. Маючи одних із найкращих моряків, вони стали б чудовим суб'єктом у [ShowRegionName('maghreb_region')]. Знаючи, що нашої військової сили буде достатньо, щоб захистити їх від будь-кого, можливо, ми зможемо укласти з ними угоду..."
  flavor_tur.1300.a: "Розширимо наш вплив у [target_country.GetNameWithNoTooltip]."
  flavor_tur.1300.b: "Свого часу, але точно не зараз."
  flavor_tur.1301.title: "$flavor_tur.1300.title$"
  flavor_tur.1301.desc: "[target_country2.GetName] звернулося до [target_character.GetName], бажаючи встановити тісніші зв'язки з нами. Їхня головна мета — запропонувати нам захист; натомість ми станемо їхнім суб'єктом, служачи [target_character2.GetName]."
  flavor_tur.1301.a: "Ми не приймемо захисту від чужинців."
  flavor_tur.1301.b: "Якщо це забезпечить нашу безпеку..."