l_english:
  flavor_usa.1.title: "Збори делегатів"
  flavor_usa.1.desc: "Делегати нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName] зібралися, щоб обговорити важливі питання сьогодення. Серед найактуальніших питань – питання управління та того, чи варто нам підтримувати місцеву владу, чи прагнути до централізованої держави. Хоча більшість наших делегатів виступають за децентралізацію, ми маємо сильну підтримку серед більшості представників і, безсумнівно, могли б переконати їх підтримати більшу централізацію."
  flavor_usa.1.a: "Місцева автономія має залишатися нашим пріоритетом."
  flavor_usa.1.b: "Використаємо наше становище для централізації."
  flavor_usa.2.title: "Статті Конфедерації"
  flavor_usa.2.desc: "Штати, що заснували [ROOT.GetCountry.GetLongName] як конфедерацію суверенних країн, затвердили документ, який слугуватиме нашій країні правовою основою як для внутрішньої стабільності, так і для зовнішніх справ."
  flavor_usa.2.a: "Ратифікувати Статті"
  flavor_usa.3.title: "Північно-західний Ордонанс"
  flavor_usa.3.desc: "Території між річкою Міссісіпі, [ShowAreaName('great_lakes_sea_zones_area')] та річкою Огайо, також відомі як Північно-західний Ордонанс, вже деякий час існують на периферії нашої країни. Особливим питанням є їхній адміністративний статус у межах нашої території та те, чи повинні вони управлятися з нашої столиці, чи стати новими штатами в межах [ROOT.GetCountry.GetName]. Ми повинні врегулювати цей конфлікт зараз, щоб стабільне правління цими землями могло розпочатися."
  flavor_usa.3.a: "Вони будуть окремими штатами."
  flavor_usa.3.a.tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у Північно-західному Ордонансі отримає [ShowNamedValue('development_weak_bonus')|+=] [Concept('development', 'CONCEPT_PLACEHOLDER')|e] та втратить [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_usa.3.b: "Зміцнити наше панування над цими провінціями."
  flavor_usa.3.b.tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у Північно-західному Ордонансі втратить [ShowNamedValue('development_weak_penalty')|+=] [Concept('development', 'CONCEPT_PLACEHOLDER')|e] та отримає [ShowNamedValue('control_mild_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_usa.4.title: "Декларація незалежності"
  flavor_usa.4.desc: "Численні голоси в нашій країні, особливо ті, хто раніше виступав за нашу незалежність, закликають до офіційного акту, щоб закріпити [ROOT.GetCountry.GetLongName] як легітимну націю. Вони стверджують, що без Декларації незалежності нас вважали б поза законом країни [ShowContinentName('europe')], повстанцями проти легітимного суверена та уряду. Щоб перетворити нас на легітимну націю, нам потрібне міжнародне визнання нашої справи та іноземні союзники для її підтримки."
  flavor_usa.4.a: "Підписати Декларацію незалежності"
  flavor_usa.5.title: "[target_character.GetNameWithNoTooltip]"
  flavor_usa.5.desc: "[target_character.GetName] добре відомий(-а) своєю роботою на службі [ROOT.GetCountry.GetName]. [target_character.GetHerHis|U] кампанія за національну єдність багато в чому стабілізувала нашу країну та зміцнила нашу незалежність. Без [target_character.GetHerHis] нескінченної праці та енергії, [ROOT.GetCountry.GetLongName] все ще могла б бути під владою іноземних тиранів."
  flavor_usa.5.a: "[target_character.GetSheHe|U] продовжуватиме добре служити нам."
  flavor_usa.6.title: "Торгівля [ShowGoodsNameWithNoTooltip('fur')]"
  flavor_usa.6.desc: "Величезні простори [ShowSubContinentName('north_america')] славляться своєю високоякісною [ShowGoodsName('fur')]. З постійно зростаючим попитом [ShowContinentName('europe')], ми повинні переорієнтувати нашу економіку на придбання та торгівлю [ShowGoodsNameWithNoTooltip('fur')], щоб постійно отримувати від цього прибуток."
  flavor_usa.6.a: "Інвестувати в більше мисливців."
  flavor_usa.6.a.tt: "Це покращить усі видобутки [ShowGoodsNameWithNoTooltip('fur')] у нашій країні."
  flavor_usa.6.b: "Наша увага потрібна в іншому місці."
  flavor_usa.7.title: "Асиміляція тубільців"
  flavor_usa.7.desc: "Землі, що нами заявлені, також населені значною кількістю тубільців, які змушені жити в невизначеному правовому статусі. Деякі члени нашого уряду запропонували політику асиміляції, заохочуючи цих людей краще адаптуватися до [ROOT.GetCountry.GetCulture.GetName] культури."
  flavor_usa.7.a: "Прийняти політику [ShowPolicyNameWithNoTooltip('native_integration')]."
  flavor_usa.7.b: "Залишити їх у спокої."
  flavor_usa.8.title: " [ShowBuildingTypeNameWithNoTooltip('usa_academy_of_arts_and_sciences')]"
  flavor_usa.8.desc: "Раніше ми мусили покладатися на чужоземні країни для освіти нашого народу. Зі змінами останнього часу це більше не може бути прийнятним станом. Нам знадобиться власна установа, щоб навчати наш народ і плекати культурну тканину [ROOT.GetCountry.GetName]."
  flavor_usa.8.a: "Спонсорувати установу."
  flavor_usa.8.b: "Ігнорувати це."
  flavor_usa.9.title: "Несправедливе оподаткування"
  flavor_usa.9.desc: "Важкі податки, які ми накладаємо на [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], спричинили заворушення в [unrest_location.GetName]. Не лише самі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] обурені цією несправедливістю, але й більшість їхніх співвітчизників у [unrest_location.GetProvince.GetName]. Якщо ми не вирішимо їхнє занепокоєння, це може перерости у більшу проблему."
  flavor_usa.9.a: "Що вони знають про справедливі податки?"
  flavor_usa.9.a.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у провінції [unrest_location.GetProvince.GetName] втрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], але локації також отримують [ShowNamedValue('control_weak_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_usa.9.b: "Надати їм більше автономії."
  flavor_usa.9.b.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у провінції [unrest_location.GetProvince.GetName] отримують [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], але локації також втрачають [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_usa.10.title: "[unrest_location.GetNameWithNoTooltip] Поштова дорога"
  flavor_usa.10.desc: "Сільська місцевість [ROOT.GetCountry.GetName] погано сполучена з нашими міськими центрами, і інвестиції в нашу дорожню мережу були запитані кілька разів. Кращі дороги не лише принесуть користь нашому народу, але й скоротять час, необхідний нашій армії для реагування на будь-яку чужоземну агресію, тому інвестиції здаються мудрими."
  flavor_usa.10.a: "Адміністрація повинна це організувати."
  flavor_usa.10.b: "Це була б марна трата часу."
  flavor_usa.11.title: " [ShowBuildingTypeNameWithNoTooltip('usa_philosophical_society')]"
  flavor_usa.11.a: "Звучить вражаюче, давайте спонсоруємо це!"
  flavor_usa.12.title: "Велика пожежа в [target_location.GetNameWithNoTooltip]"
  flavor_usa.12.desc: " [target_location.GetRank.GetName] [target_location.GetName] охоплено вогнем!\n\nПоки ненажерливе полум'я все ще палить будинки, деякі представники з [target_location.GetNameWithNoTooltip] вже почали організовувати план допомоги та відбудови для [target_location.GetRank.GetNameWithNoTooltip]. Це було б дорогим заходом, але могло б виявитися гарною довгостроковою інвестицією для цінної ділянки землі."
  flavor_usa.12.a.tt: " [target_location.GetName] втратить [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратить [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] і деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] постраждають від пожежі"
  flavor_usa.12.a: "Обрати амбітний план!"
  flavor_usa.12.b.tt: " [target_location.GetName] втратить [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратить [Concept('development', 'CONCEPT_PLACEHOLDER')|e], втратить [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] і деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] постраждають від пожежі"
  flavor_usa.12.b: "Робити лише те, що необхідно!"
  flavor_usa.13.title: "Експедиція [target_character.GetNameWithNoTooltip] та [target_character_2.GetNameWithNoTooltip]"
  flavor_usa.13.desc: "[target_character.GetName] та [target_character.GetHerHis] близький друг [target_character_2.GetName] пропонують експедицію [ROOT.GetCountry.GetAdjective] народу, щоб перетнути західну частину [ShowSubContinent('north_america')] та знайти найпряміший і найпрактичніший водний шлях через континент. Разом із невеликою групою добровольців вони перетнуть континент і дослідять річку Міссурі, щоб з'ясувати, чи може якась річка запропонувати водний шлях через цей континент для комерційних цілей."
  flavor_usa.13.a: "Фінансувати їхню експедицію."
  flavor_usa.13.b: "Їм потрібна додаткова підготовка."
  flavor_usa.14.title: "[ShowBuildingTypeNameWithNoTooltip('usa_national_bank')]"
  flavor_usa.14.desc_generic: "Заснування такої установи в [target_location.GetName] може стати першим кроком у становленні [ROOT.GetCountry.GetName] як надійного торговельного партнера зі стабільною валютою для іноземних держав."
  flavor_usa.14.desc: "Для боротьби з економічною невизначеністю та стабілізації нашої власної скарбниці було запропоновано створення [ShowBuildingTypeName('usa_national_bank')]. $flavor_usa.14.desc_generic$"
  flavor_usa.14.a: "Заснувати [ShowBuildingTypeNameWithNoTooltip('usa_national_bank')]."
  flavor_usa.14.b: "Це звучить дорого."
  flavor_usa.15.title: "Винахід [ShowModifierWithNoTooltip('cotton_gin')]"
  flavor_usa.15.desc: "Зараз розробляється нова машина, яка швидко та легко відокремлює волокна [ShowGoodsName('cotton')] від їхнього насіння, і це може значно покращити вихід нашого виробництва [ShowGoodsNameWithNoTooltip('cotton')]. Машина являє собою дерев'яний барабан з невеликими дротяними гачками, які протягують волокна [ShowGoodsNameWithNoTooltip('cotton')] через сітку, щоб відокремити насіння від решти рослини, тоді як щітки видаляють вільний ворс, щоб запобігти застряганню."
  flavor_usa.15.a: "Нам знадобиться ця машина!"
  flavor_usa.15.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [Concept('raw_material', 'CONCEPT_PLACEHOLDER')|e] [ShowGoodsNameWithNoTooltip('cotton')] отримує [ShowModifier('cotton_gin')]."
  flavor_usa.15.b: "Старі методи цілком підходять."
  flavor_usa.16.title: "[ShowBuildingTypeNameWithNoTooltip('usa_national_mint')]"
  flavor_usa.16.desc: "На жаль, наша валюта не відповідає стандартам, встановленим іноземними державами, через відсутність монетного двору під контролем нашого уряду. $flavor_usa.14.desc_generic$"
  flavor_usa.16.a: "Заснувати [ShowBuildingTypeNameWithNoTooltip('usa_national_mint')]"
  flavor_usa.16.b: "Ми повернемося до цього пізніше."
  flavor_usa.17.title: "Напруга з тубільцями"
  flavor_usa.17.desc: "Повільне та стабільне розширення [ROOT.GetCountry.GetAdjective] поселенців в [ShowContinentName('america')] спричинило нові конфлікти з тубільцями цих земель. Наша присутність на землях, які вони вважають своїми домівками, змусила багатьох об'єднатися та організувати опір проти нас."
  flavor_usa.17.a: "Ми повинні перемогти!"
  flavor_usa.18.title: "[target_shays_rebellion.GetName]."
  flavor_usa.18.desc: "Наші високі податки та поганий фінансовий стан викликали обурення серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Харизматичний фермер, [target_character.GetName], виступив проти оподаткування центрального уряду і хоче зберегти автономію [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]. Якщо ми не будемо обережно керувати цією ситуацією, [target_character.GetHerHis] вплив може поширитися і спричинити широкі заворушення."
  flavor_usa.18.a: "Ми впораємося."
  shays_rebellion: "Повстання Шейса"
  flavor_usa.19.title: "Майбутнє армії"
  flavor_usa.19.desc: "Тепер, коли ми є господарями власної долі в [ShowContinentName('america')], ми повинні визначити склад та набір нашої армії. Існують вагомі аргументи як за [ShowPolicyName('elite_training_policy')], так і за [ShowPolicyName('levee_en_masse_policy')], але тепер необхідно вирішити, яку армію ми хочемо мати в новому майбутньому."
  flavor_usa.19.a: "Прийняти [ShowPolicyNameWithNoTooltip('elite_training_policy')]."
  flavor_usa.19.b: "Покладатися на [ShowPolicyNameWithNoTooltip('levee_en_masse_policy')]."
  flavor_usa.20.title: "У народу є булочки"
  flavor_usa.20.desc: "У давні часи поширеною скаргою народу була нестача булочок. На щастя, ми тепер живемо в часи достатку та розкоші, і всі [ROOT.GetCountry.GetAdjective] громадяни можуть насолоджуватися своїми булочками так, як їм подобається."
  flavor_usa.20.a: "Смачні булочки!"
  flavor_usa.1000.title: "Конституційний конвент"
  flavor_usa.1000.desc: "Час виявив певні недоліки в управлінні нашою [GetInternationalOrganizationType('colonial_federation').GetName]. Як лідер [target_io.GetName], ми могли б закликати всіх членів зібратися разом і обговорити необхідні реформи. Реформа є складним завданням, і результат не гарантує задоволення кожного члена [target_io.GetNameWithNoTooltip], але дозволити поточним проблемам розростатися може спричинити ще більше неприємностей у майбутньому."
  flavor_usa.1000.a: "Закличмо представників."
  flavor_usa.100.b: "З нашим поточним управлінням все гаразд."
  flavor_usa.1001.title: "Правова реформа"
  flavor_usa.1001.desc: "З усіма представниками, зібраними в [ROOT.GetCountry.GetCapital.GetName], ми нарешті можемо почати обговорювати важливі питання сьогодення. Спочатку ми повинні обговорити питання нашого правового кодексу та законів кожного члена [target_io.GetName]. Чи повинна кожна держава бути господарем своїх власних законів, чи ми повинні встановити централізовану владу для видання указів над усіма?"
  flavor_usa.1001.a: "Місцевим органам влади буде надано більше прав."
  flavor_usa.1001.b: "Центральна адміністрація здійснюватиме свою владу."
  flavor_usa.1002.title: "Рабська торгівля"
  flavor_usa.1002.desc: "З вирішенням питань права, меншість делегатів тепер наполягає на обговоренні питання рабства. Хоча вони звинувачують цю інституцію як нелюдську, багато членів [target_io.GetName] сильно покладаються на працю [ShowPopTypeName('slaves')] на своїх плантаціях. Заборона цієї практики для всіх членів може сильно дестабілізувати нас і може завдати значної шкоди відносинам з певними державами та ризикувати їхнім виходом з Конституційного конвенту взагалі."
  flavor_usa.1002.a: "Нехай кожен член вирішує сам за себе."
  flavor_usa.1002.b: "Скасувати це для всіх."
  flavor_usa.1002.b.tt: "Усі [ShowPopTypeName('peasants')] та колишні [ShowPopTypeName('slaves')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у нашій країні отримують [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_usa.1003.title: "Злочини, що тягнуть за собою імпічмент"
  flavor_usa.1003.desc: "Зберігши Конвент щодо питання рабства, ми тепер можемо перейти до обговорення конкретного [ShowLawName('legal_code_law')], якого ми повинні дотримуватися. Нам потрібно не тільки вирішити, чи повинні всі держави [target_io.GetName] дотримуватися одного [ShowLawNameWithNoTooltip('legal_code_law')], але й на якому правовому кодексі ми повинні його базувати."
  flavor_usa.1003.a: "Прийняти [ShowPolicyNameWithNoTooltip('civil_law_policy')]."
  flavor_usa.1003.b: "Ми віддаємо перевагу [ShowPolicyNameWithNoTooltip('common_law_policy')]."
  flavor_usa.1003.c: "[ShowPolicyNameWithNoTooltip('traditional_law_policy')] має бути законом."
  flavor_usa.1003.d: "Немає потреби диктувати це для всіх."