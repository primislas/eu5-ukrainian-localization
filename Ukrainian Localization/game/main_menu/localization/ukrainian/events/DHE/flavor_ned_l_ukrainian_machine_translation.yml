l_english:
  flavor_ned.1.title: "[target_location.GetNameWithNoTooltip] у вогні"
  flavor_ned.1.desc: "Трагедія спіткала [target_location.GetRank.GetName] [target_location.GetName]! Спалахнула велика пожежа, охопивши частини [target_location.GetRank.GetNameWithNoTooltip], такі як #italic Ратуша#! та #italic Архів#! Місцеві жителі намагалися її загасити, але деякі з них потрапили в полум'я і загинули."
  flavor_ned.1.a: "Трагедія для [target_location.GetNameWithNoTooltip]..."
  flavor_ned.2.title: "Зміцнення [target_location.GetNameWithNoTooltip]"
  flavor_ned.2.desc: "Відколи наші дослідники прибули до [ShowRegionName('indonesia_region')], значна частина тамтешніх земель перейшла під наш контроль або війною, або пером. [target_character.GetName] та [target_character.GetHerHis] радники планують нове місто в цьому районі, форт, куди [ROOT.GetCountry.GetCulture.GetName] поселенці зможуть стікатися, не турбуючись про місцеве населення."
  flavor_ned.2.historical_info: "Коли голландські поселенці прибули до Ост-Індії, однією з їхніх перших цілей було укріплення колонізованих земель. Одним із таких фортів була Батавія, яка пізніше стала столицею Голландської Ост-Індії. Під час правління VOC місто стало найважливішим у регіоні."
  flavor_ned.2.a: "Зробімо [target_location.GetNameWithNoTooltip] фортом."
  flavor_ned.2.b: "Це надто дорого. Натомість умиротворимо місцевих."
  flavor_ned.2.c: "[target_location.GetNameWithNoTooltip] стане найвеличнішим місцем у цьому районі."
  flavor_ned.2.d: "[target_location.GetNameWithNoTooltip] МАЄ бути збудований!"
  flavor_ned.3.title: "[target_character2.GetNameWithNoTooltip]"
  flavor_ned.3.desc: "Зі зростанням нашої торгової імперії багато видатних діячів, чи то вони є частиною [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], чи [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], приєднуються до нашої справи. Одним із них є [target_character2.GetName], [ShowCultureName('swedish')] громадянин, який робить собі ім'я в [target_country2.GetName], бажаючи одного дня стати губернатором одного з наших колоніальних володінь."
  flavor_ned.3.historical_info: "Народжений у Стокгольмі, Фредерік Койєтт був першим шведом, що досліджував Східну Азію, провівши більшу частину свого часу як дипломат VOC у Дедзімі, він успішно впорався з #italic Справою Нанбу#!, що призвело до звільнення кількох голландських в'язнів із Сьогунату. Після багатьох успішних переговорів його було призначено губернатором Формози. Однак, коли династія Мінь впала, він втратив своє губернаторство та весь острів на користь #italic Чжен Ченгуна#! Його останні роки пройшли в Батавії, де він зібрав тонни індуїстських статуй."
  flavor_ned.3.a: "Ми дозволимо йому служити нам."
  flavor_ned.3.b: "Йому заборонено в'їзд до цієї країни."
  flavor_ned.4.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ned.4.desc: "З нашою золотою добою культури та архітектури наше населення почало звертати увагу на справи поза війною та торгівлею. Одним із них є [target_character.GetName], піонер стилю #italic Голландської барокової архітектури#! Якщо ми його субсидуємо, він зможе піднести культуру нашої нації на нові висоти."
  flavor_ned.4.historical_info: "Протягом 17 століття Нідерланди побачили розквіт свого голландського барокового стилю архітектури. Пітер Пост, разом зі своїм співробітником Якобом ван Кампеном, були головними піонерами цього стилю, проектуючи багато нових палаців та музеїв."
  flavor_ned.4.a: "Він має нашу підтримку."
  flavor_ned.4.b: "Кращі будівлі? Наші гроші потрібні в іншому місці."
  flavor_ned.5.title: "Торгівля в [ShowRegionNameWithNoTooltip('japan_region')]"
  flavor_ned.5.desc: "Землі [ShowRegionName('japan_region')], хоч і чужі для нас, здаються чудовим місцем для торгівлі наших купців. Їхнє срібло, а також їхні предмети розкоші мають велику привабливість для нашого населення. Якщо ми зможемо заснувати там наших торговців, то зможемо почати повертати ці товари до [ROOT.GetCountry.GetName]."
  flavor_ned.5.a: "Заснуймо там новий аванпост."
  flavor_ned.5.b: "Марна трата часу."
  NED_UNLOCK_DUTCH_OUTPOSTS_IN_JAPAN: "Ми зможемо побудувати [ShowBuildingTypeName('dutch_trade_outpost')] в [target_location.GetName]."
  flavor_ned.6.title: "Каапколонія"
  flavor_ned.6.desc: "З нашими поселенцями на землях [ShowRegionName('southern_africa_region')] багато з них будують нові міста та порти, готові забезпечити безпеку навколишніх морів, а отже, і всієї азійської торгівлі. Одним із таких міст є [target_location.GetName]. Можливо, ми зможемо субсидувати будівництво цього порту."
  flavor_ned.6.historical_info: "Кейп був однією з найважливіших колоній Голландської імперії. Будучи перехрестям морської торгівлі між Азією та Європою, він служив життєво важливим портом для VOC."
  flavor_ned.6.a: "Кейп принесе нам добру надію."
  flavor_ned.6.b: "Нам потрібен не новий порт, а більший флот."
  flavor_ned.7.title: "[target_location.GetNameWithNoTooltip]"
  flavor_ned.7.desc: "Багато європейських націй приєдналися до колоніальної гонки, і ми також. Замість того, щоб претендувати на величезні території, ми вирішили створити більш концентровані міста в Америці. Одним із них є [target_location.GetName], куди багато нових поселенців приєдналися до зусиль по його укріпленню проти будь-яких загроз. Ми можемо запропонувати субсидії колоністам там, або дозволити їм самостійно розбудовувати порт."
  flavor_ned.7.a: "У нас є один [ShowLocationNameWithNoTooltip('amsterdam')], але як щодо двох?"
  flavor_ned.7.b: "Нехай поселенці там самі цим займаються."
  flavor_ned.8.title: "Морські жебраки"
  flavor_ned.8.desc: "Якщо ми хочемо забезпечити нашу незалежність, ми повинні забезпечити наші землі та наші моря. Щоб досягти останнього, [target_character.GetName] бажає надати каперські свідоцтва будь-якому озброєному судну, яке бажає служити [target_country.GetName]."
  flavor_ned.8.historical_info: "Під час Вісімдесятирічної війни Вільгельм Оранський надав каперські свідоцтва будь-якому озброєному судну, залучивши вісімнадцять кораблів під голландським прапором. Ці капери поступово збільшувалися в розмірах і турбували іспанські порти. Багато великих героїв також були частиною Морських жебраків."
  flavor_ned.8.a: "Для захисту [target_country.GetNameWithNoTooltip] це необхідно."
  flavor_ned.8.b: "Пропагувати піратство? Що сталося із захистом наших вод?"
  flavor_ned.9.title: "Інтереси в [ShowAreaNameWithNoTooltip('sailan_area')]"
  flavor_ned.9.desc: "Острів [ShowAreaName('sailan_area')] служить стратегічним регіоном для будь-якого торговця в $india$. [target_country.GetName] контролює [ShowLocationName('kurunegala')], і єдиний спосіб взяти його — силою."
  flavor_ned.9.a: "[ShowAreaNameWithNoTooltip('sailan_area')] належить нам."
  flavor_ned.9.b: "Війна там була б нерозумною."
  flavor_ned.10.title: "П'ять [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Адміралтейств"
  flavor_ned.10.desc: "Нашими землями може керувати [target_character.GetName], але відмінності між нашими провінціями розділили наші [ShowBuildingTypeName('admiralty')]. Цей фракціоналізм між [ShowLocationName('groningen')], [ShowLocationName('hoorn')], [ShowLocationName('rotterdam')], [ShowLocationName('middelburg')] та [ShowLocationName('amsterdam')] заважає нам об'єднати наші флоти. Однак, дозволивши їм переслідувати свої інтереси, можна досягти більшої відданості від кожного з них."
  flavor_ned.10.a: "Дозвольмо цим адміралтействам існувати самостійно."
  flavor_ned.10.b: "Об'єднаймо їх в одне."
  NED_UNLOCKS_UNIFIED_ADMIRALTIES_GOV_REFORM: "Розблоковує [ShowGovernmentReformName('unified_admiralty_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_ned.11.title: "Заселення [ShowAreaNameWithNoTooltip('taiwan_area')]"
  flavor_ned.11.desc: "З нашими дослідниками та поселенцями, що досягли земель $china$, вони заявили та колонізували [ShowAreaName('taiwan_area')]. Однак вплив [ROOT.GetCountry.GetCulture.GetName] там бракує. Можливо, ми можемо спробувати заселити його людьми з [ROOT.GetCountry.GetCapital.GetName]."
  flavor_ned.11.a: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] пануватиме в [ShowAreaNameWithNoTooltip('taiwan_area')]."
  flavor_ned.11.b: "Залишимо [ShowAreaNameWithNoTooltip('taiwan_area')] як є."
  flavor_ned.12.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_ned.12.desc: "Зі зростаючою загрозою морів, готових повільно поглинути Нижні Землі, багато архітекторів намагаються знайти нові способи вирішення цієї проблеми. Один із них – [target_artist.GetName], який уже спланував багато [ShowBuildingTypeName('polders')] по всій нашій землі."
  flavor_ned.12.historical_info: "Ян Адріансзоон Легватер був першою людиною, яка створила польдер з озера, осушивши воду за допомогою вітряка. Він також керував будівництвом багатьох інших польдерів у Пурмері, Схермері та Хеерхуговаарді."
  flavor_ned.12.a: "Наймімо його, щоб він створив ще більше [ShowBuildingTypeNameWithNoTooltip('polders')]."
  flavor_ned.12.b: "Його роботи тут не вітаються."
  flavor_ned.13.title: "Батько мікробіології"
  flavor_ned.13.desc: "З розвитком науки розвивається і наше знання про навколишній світ. Багато хто бажає поглибити ці знання і почав навчатися в численних університетах. Один із них – [target_artist.GetName], мікробіолог із [ShowLocationName('the_hague')]. Хоча його робота не визнана, ми можемо спробувати допомогти йому в цьому починанні."
  flavor_ned_13.historical_info: "Відомий своїми проривами в галузі мікробіології, Антоні Філіпс ван Левенгук був названий Батьком мікробіології багатьма істориками та вченими. Будучи самоуком, він зумів утвердити мікробіологію як офіційну наукову галузь. Його експерименти над собою дозволили йому дослідити власну кров, що призвело до відкриття еритроцитів."
  flavor_ned.13.a: "Ми виділимо кошти на допомогу в галузі мікробіології."
  flavor_ned.13.b: "Він не належить до [target_country2.GetNameWithNoTooltip]."
  flavor_ned.14.title: "Поїдання [target_character.GetNameWithNoTooltip]"
  flavor_ned.14.desc: "Війна та нещастя спіткали [ROOT.GetCountry.GetName]. Оскільки сили [target_country.GetName] захопили [ROOT.GetCountry.GetCapital.GetName], значна частина [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] вважає [target_character.GetName] та [target_character.GetHisHer] амбіції єдиною причиною всього цього. Розлючений натовп зібрався біля резиденції [target_character.GetNameWithNoTooltip], щоб стратити [target_character.GetHimHer]. Незважаючи на [target_character.GetHisHer] захоплюючу промову, натовп не зупинився. Як тварини, вони напали на [target_character.GetHimHer], що призвело до [target_character.GetHisHer] смерті. Після цього частини тіла були відсутні, їх канібалізував невблаганний натовп, який спочатку переслідував [target_character.GetHimHer]."
  flavor_ned.14.a: "Навіть зараз [ROOT.GetCountry.GetNameWithNoTooltip] не в безпеці..."
  flavor_ned.15.title: "Сім провінцій"
  flavor_ned.15.desc: "Хоча Нижні Землі були об'єднані спільною справою, вони все ще розділені завдяки де-юре претензіям та культурним відмінностям. Однак ми можемо використати цю роз'єднаність на свою користь. Створивши конфедерацію, де кожна провінція має свої закони та права, але при цьому підкоряється центральному уряду, ми можемо належним чином забезпечити захист та процвітання кожної з них, дозволяючи нам дивитися назовні."
  flavor_ned.15.historical_info: "Під час Нідерландської революції проти Габсбургів голландський народ створив конфедерацію, в якій кожна провінція могла зберігати власні інтереси. Ця конфедерація, однак, все ще страждала від фракціонізму, оскільки статісти та оранжисти боролися за контроль над численними провінціями. Лише в епоху Наполеона та Батавської республіки ця система була скасована, що призвело до створення Королівства Нідерландів, яким ми його знаємо."
  flavor_ned.15.a: "Створимо цю конфедерацію."
  flavor_ned.15.b: "Децентралізація – не вихід."
  flavor_ned.16.title: "Золотий вік [target_country.GetCulture.GetNameWithNoTooltip] культури"
  flavor_ned.16.desc: "З нашим піднесенням у світовій політиці наша культура переживає свій зеніт, багато нових митців стікаються до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. З їхньою допомогою [target_country.GetCulture.GetName] культура поширюється далеко й широко, у Золотий вік."
  flavor_ned.16.a: "[target_country.GetCulture.GetNameWithNoTooltip] культура буде відома в кожному куточку."
  flavor_ned.17.title: "Текстильна промисловість [target_location.GetNameWithNoTooltip] та [target_location2.GetNameWithNoTooltip]"
  flavor_ned.17.desc: "Землі [target_country.GetName] багаті на барвники, що дозволяє нам виробляти всі види тканин. Дві найвідоміші гільдії знаходяться в [target_location.GetName] та [target_location2.GetName], обидві дуже цінні для [target_country.GetNameWithNoTooltip]. [target_character.GetName] має плани допомогти обом гільдіям, однак віддаючи перевагу одній над іншою, ми можемо ще більше спеціалізувати нашу текстильну промисловість."
  flavor_ned.17.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] [target_location.GetNameWithNoTooltip] матиме нашу допомогу."
  flavor_ned.17.b: "Допомога [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] [target_location2.GetNameWithNoTooltip] принесе більше вигод."
  flavor_ned.17.c: "Підтримаймо обидві гільдії."
  flavor_ned.17.d: "У нас немає коштів на це."
  flavor_ned.18.title: "Жага до прянощів"
  flavor_ned.18.desc: "Оскільки шляхи до $india$ заблоковані [ShowReligionGroupAdjective('muslim')] торговцями, наш народ був позбавлений своїх предметів розкоші. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] [target_market.GetName] придивляються до нових морських шляхів, щоб знову забезпечити торгівлю прянощами. У будь-якому випадку, [target_character.GetName] потрібно знайти шлях до $india$."
  flavor_ned.18.a: "Відпливімо до Індій."
  NED_SECURE_SPICE_FOR_BONUSES: "Якщо ми зможемо імпортувати [ShowGoodsName('pepper')] на [Concept('target_market.GetName] [market', 'CONCEPT_PLACEHOLDER')|e], ми отримаємо вигоди."
  flavor_ned.19.title: "Свобода думки"
  flavor_ned.19.desc: "Зі зростанням [ShowReligionAdjective('lutheran')] Реформації, багато нових екстремістських релігійних поглядів виникло в [ShowReligionGroupAdjective('christian')] світі. [ROOT.GetCountry.GetName] проте, просуває все більше гуманістичних ідей, сприяючи свободі думки та ідеалів, доки людина служить нації. [target_character.GetName] взяв це до уваги і тепер планує майбутнє цієї нової хвилі гуманізму."
  flavor_ned.19.a: "Це вільна країна, зрештою."
  flavor_ned.19.b: "Використаймо їхні ідеї для себе."
  flavor_ned.19.c: "Не гнівімо [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] владу."
  flavor_ned.20.title: "Прянощі течуть"
  flavor_ned.20.desc: "Наші купці нарешті змогли отримати постачання [ShowGoodsName('pepper')]. [target_country.GetAdjective] народ тепер нарешті може використовувати цей новий товар у своїх стравах."
  flavor_ned.20.a: "Доки ми маємо флот, [ShowGoodsNameWithNoTooltip('pepper')] тектиме."
  flavor_ned.21.title: "Філософії [target_character.GetNameWithNoTooltip]"
  flavor_ned.21.desc: "Натхненний працями Мухаммада бін Туфайля, [target_character.GetName] прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] у пошуках роботи. Народжений у [ShowLocationName('paris')] як [ShowCultureName('french')] громадянин, він з тих пір покинув свій дім, щоб продовжити свої філософські дослідження. Він бажає написати біографічний словник під назвою #italic Dictionnaire Historique et Critique#!."
  flavor_ned.21.historical_info: "П'єр Бейль був гугенотом, народженим у Парижі за правління Людовика XIV. Після навчання в Пюїлорані, Парижі та Седані, він втік до Голландської республіки через релігійні переслідування в країні. Під час свого перебування там він був призначений професором філософії та історії в Роттердамі. Багато його праць проклали шлях до Просвітництва, а також до інших філософій, які безпосередньо суперечили його вченням, таких як Теодицея."
  flavor_ned.21.a: "Спонсоруймо його праці."
  flavor_ned.21.b: "Геть його, жоден [ShowCultureNameWithNoTooltip('french')] філософ не допускається у [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ned.22.title: "Оповідь про [target_character2.GetNameWithNoTooltip]"
  flavor_ned.22.desc: "Народжений простолюдином у [ShowLocationName('middelburg')], [target_character2.GetName] виявив великий талант з дуже юного віку. Працюючи помічником боцмана з 11 років і приєднавшись до [ROOT.GetCountry.GetAdjective] армії в молодому віці. Тепер він служить у [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Торговому флоті. Хоча молодий, він досвідчений, і ми можемо використати його, щоб зміцнити або нашу армію, або наш флот."
  flavor_ned.22.a: "Ми, [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip], завжди були гордими мореплавцями."
  flavor_ned.22.b: "Мусимо захистити землю [ROOT.GetCountry.GetNameWithNoTooltip] сильнішою армією."
  flavor_ned.22.c: "Замість того, щоб питати [target_character2.GetNameWithNoTooltip], давайте повністю задіємо його."
  flavor_ned.23.title: "Свобода морів"
  flavor_ned.23.desc: "Хоча ідея [ShowSocietyDirectionName('free_trade')] не є чужою для [ROOT.GetCountry.GetName], дебати між протекціонізмом та [ShowSocietyDirectionNameWithNoTooltip('free_trade')] стають все більш запеклими. Одним із філософів, що бере участь у цих розмовах, є [target_character.GetName], який служив заморським купцем для [ROOT.GetCountry.GetFlavorRank]. Вже розпочавши писати свій новий трактат, він може схилити шальки терезів на бік [ShowSocietyDirectionNameWithNoTooltip('free_trade')]."
  flavor_ned.23.a: "Дозвольмо йому закінчити, свобода торгівлі тут вітається."
  flavor_ned.23.b: "Йому не дозволено перебувати в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ned_paper_industry_title: "[target_location.GetNameWithNoTooltip] [ShowGoodsNameWithNoTooltip('paper')] Промисловість"
  flavor_ned.24.title: "$flavor_ned_paper_industry_title$"
  flavor_ned.24.desc: "[target_location.GetName] та її [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] є найвідомішими гільдіями в Південних Нідерландах. Нещодавно вони розробили плани щодо розширення виробництва [ShowGoodsName('paper')], вірячи, що це дозволить [ROOT.GetCountry.GetName] ще більше зміцнити свою самодостатність."
  flavor_ned.24.a: "Давайте заснуємо цю південну секцію виробництва [ShowGoodsNameWithNoTooltip('paper')]."
  flavor_ned.24.b: "Ми не маємо коштів для таких починань."
  flavor_ned.25.title: "$flavor_ned_paper_industry_title$"
  flavor_ned.25.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] з [target_location.GetName] досягли прогресу у своїх зусиллях з виробництва [ShowGoodsNameWithNoTooltip('paper')]. Розробивши плани щодо нової [ShowBuildingTypeName('paper_workshop')], вони тепер просять [target_character.GetName] про фінансову допомогу."
  flavor_ned.25.a: "Вони отримають свою допомогу."
  flavor_ned.25.b: "Ми не маємо зайвих коштів для них."
  flavor_ned.26.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Гуманізм"
  flavor_ned.26.desc: "Цей світ наповнений багатьма різними вірами, багатьма різними традиціями та багатьма різними ідеями. Замість того, щоб нав'язувати наші скрізь, куди ми йдемо, ми повинні терпіти такі вірування, доки вони не створюють проблем для [ROOT.GetCountry.GetName]."
  flavor_ned.26.a: "Кожен вільний думати в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ned.26.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] повинні бути задоволені натомість."
  NED_ALL_NON_TRUE_FAITH_POP_BECOME_HAPPIER: "Усі наші не-[Concept('ROOT.GetCountry.GetReligion.GetAdjective] [pop', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  NED_ALL_CLERGY_BECOME_HAPPIER: "Усі наші [ROOT.GetCountry.GetReligion.GetAdjective] [ShowPopTypeName('clergy')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ned.27.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ned.27.desc: "Народжений у [ShowLocationName('leiden')], [target_character.GetName] виявив неабиякий талант як художник. [target_character.GetHeShe] вже створив незначні твори мистецтва, кожен з яких зображує різний стиль. Можливо, [target_character.GetHeShe] стане чудовим доповненням до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ned.27.historical_info: "Рембрандт Гарменсзон ван Рейн, просто відомий як Рембрандт, вважається одним з найвидатніших художників в історії. Незважаючи на те, що він ніколи не виїжджав за кордон для вивчення інших форм мистецтва, його роботи були натхненні італійськими старими майстрами, а також Бентвегелями, товариством художників у Римі. Хоча в молодості він створив сотні картин, друга половина його життя була обтяжена фінансовими проблемами та особистими трагедіями, такими як відмова від його олійного живопису #italic Змова Клавдія Цивіліса#!, або продаж його будинку через борги, що змусило його та його родину переїхати до скромнішого місця на Розенграхті."
  flavor_ned.27.a: "Давайте наймемо [target_character.GetHimHer]."
  flavor_ned.27.b: "[target_character.GetHeShe|U] тут не дозволено."
  NED_WE_WILL_FUND_REMBRANDT: "[target_character.GetName] служитиме нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ned.28.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ned.28.desc: "Облогова війна, мабуть, найдорожча частина війни. Багато теоретиків розробили нові ідеї, але жодна з них не наближається до ідей [target_character.GetName]. Служачи офіцером у нашій армії, він набув досвіду умов, в яких опинився б середньостатистичний солдат у такій ситуації. Його плани включають будівництво нових фортів у [ROOT.GetCountry.GetName] та використання кількох ліній оборони, а також активну форму оборонної війни, де наші сили повинні турбувати ворога."
  flavor_ned.28.a: "Використаймо ці ідеї, коли будемо брати в облогу."
  flavor_ned.28.b: "Захист [ROOT.GetCountry.GetNameWithNoTooltip] є нашим найбільшим пріоритетом."
  flavor_ned.28.c: "Ми не будемо слухати його ідей."
  flavor_ned.29.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ned.29.desc: "Багато дослідників і картографів завжди мріяли повністю нанести на карту Арктику. Одним із таких людей є [target_character.GetName], народжений у селі в [ShowLocationName('harlingen')]. Він звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle] з причиною, чому він повинен вирушити в цю експедицію: хоча лід Північно-Східного проходу не дозволяє нам плисти до $china$, опівнічне сонце розтопить лід, дозволяючи створити надійний маршрут."
  flavor_ned.29.a: "Йому дозволено служити нам."
  flavor_ned.29.b: "Він божевільний? Виженемо його."
  flavor_ned.30.title: "Система фіксованих фортів"
  flavor_ned.30.desc: "Наші землі в Нижніх Країнах можуть бути процвітаючими, але вони також вразливі під час війни. Створивши кілька ліній укріплень у глибокому оборонному плані, ми можемо забезпечити захист наших земель навіть у найгірших ситуаціях."
  flavor_ned.30.historical_info: "Протягом XVII століття, коли облогова війна була найдомінантнішою, два військові теоретики домінували в цьому відділі. Маршал Вобан з Королівства Франції та Менно ван Кугорн, відомий голландський інженер, довели ці теорії до межі. У випадку Нідерландів їхні густонаселені міста забезпечили будівництво кількох укріплень по всій країні, щоб відбити бажання ворожих армій намагатися завоювати націю. Ці фортеці могли легко стримувати цілі армії самостійно, що призводило до того, що ворог мусив планувати тривалу облогу або готувати дорогу атаку."
  flavor_ned.30.a: "Заохочуймо цю нову лінію укріплень."
  flavor_ned.30.b: "Найкращий захист – це хороший напад."
  flavor_ned.31.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Архітектура бароко"
  flavor_ned.31.desc: "З досягненням зеніту [ROOT.GetCountry.GetAdjective] архітектури з'явилися нові стилі. Одним з них є #italic стиль бароко#!, що зосереджується на оздобленні екстер'єру таким чином, щоб сприяти серйозності, тоді як інтер'єр прикрашений благородними матеріалами. Можливо, ми можемо просувати цей стиль."
  flavor_ned.31.a: "Ми повинні просувати цей новий стиль!"
  flavor_ned.31.b: "У нас немає коштів на це."
  flavor_ned.32.title: "Патріоттентайд"
  flavor_ned.32.desc: "Хоча [ShowGovernmentReformName('seven_provinces')] добре нам послужила, сформувалася група повстанців, які називають себе #italic Патріотами#! і бажають падіння цієї системи. Вони протистоять [target_character.GetName] та [target_character.GetHerHis] прихильникам, готові занурити [ROOT.GetCountry.GetName] у революцію."
  flavor_ned.32.a: "Виходьте, патріоти!"
  ned_all_peasants_in_capital_become_disloyal: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetName] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_ned.33.title: "Урбанізація Нижніх Країн"
  flavor_ned.33.desc: "Нижні Країни нещодавно побачили, як багато їхніх місцевостей заповнилися різними людьми, як шляхетними, так і простолюдинами. Такі місцевості, як [target_location.GetName], [target_location2.GetName], а також [target_location3.GetName] є найбільш населеними і могли б скористатися нашою допомогою для ще більшої урбанізації."
  flavor_ned.33.a: "Вони матимуть нашу допомогу."
  flavor_ned.33.b: "Вони можуть розвиватися самостійно."
  flavor_ned.1000.title: "Славна змова?"
  flavor_ned.1000.desc: "Хоча [target_character.GetName] є законним правителем [ROOT.GetCountry.GetName], [target_character.GetHisHer] публічний імідж поволі занепадав, і його/її бачили не інакше як гнобителя. Ходили чутки, ба навіть численні чутки, про змову запросити [target_character2.GetName] правити цими землями замість нього/неї."
  flavor_ned.1000.a: "Змова проти [target_character.GetNameWithNoTooltip]? Ми мусимо їх зупинити!"
  NED_UNLESS_IF_WE_SECURE_LEGITIMACY_ENGLISH_NOBLES_WILL_INVITE_DUTCH_RULER: "Доки наша [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e] нижче #Y 80#!, існує ймовірність, що [ROOT.GetCountry.GetCulture.GetName] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] запросить [target_character2.GetName] правити над ними."
  flavor_ned.1001.title: "Безсмертна Сімка"
  flavor_ned.1001.desc: "З погіршенням ситуації в [target_country.GetName] та тим, що [target_character2.GetName] вважають фальшивим [target_country.GetGovernment.GetRulerTitle], частина їхнього [target_country.GetGovernment.GetEstateName('nobles_estate')] звернулася до [target_character.GetName] і запропонувала [target_character.GetHerHim] [target_country.GetAdjectiveWithNoTooltip] корону, якщо [target_character.GetHeShe] прийме її."
  flavor_ned.1001.a: "Відпливемо до [target_country.GetNameWithNoTooltip]."
  flavor_ned.1001.b: "Стривайте, ми ніколи не погоджувалися на це!"
  flavor_ned.1002.title: "Славна революція"
  flavor_ned.1002.desc: "З поваленням старого уряду [target_country.GetName], [target_character.GetName] тепер є законним правителем усіх [target_country.GetAdjectiveWithNoTooltip] земель. [target_character.GetHeShe|U] та [target_character.GetHisHer] [ROOT.GetCountry.GetGovernment.GetParliament.GetName] тепер готові обговорити справу [target_country.GetNameWithNoTooltip]."
  flavor_ned.1002.a: "Вони стануть підданими [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
  flavor_ned.1003.title: "Інтеграція Британії"
  flavor_ned.1003.desc: "Хоча землі Британії тепер під [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], частина населення все ще чинить опір нашому правлінню. Нам слід обговорити це питання з [ROOT.GetCountry.GetGovernment.GetParliament.GetName] і спробувати знайти рішення."
  flavor_ned.1003.a: "Вони схилять коліна так чи інакше."
  dutch_spice_lust: "Жага прянощів"
  ned_increased_grain_demands: "Зростання попиту на зерно"