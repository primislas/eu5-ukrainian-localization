l_english:
  flavor_sav.1.title: "Палац Венарія"
  flavor_sav.1.desc: "Стоячи як свідчення величі та історичної значущості, ця розкішна королівська резиденція у [ShowLocationNameWithNoTooltip('turin')] оточена розлогими садами і може похвалитися витонченими елементами дизайну в стилі бароко, а також [ShowInstitutionName('renaissance')]. Придворні навколо палацу насолоджуються розкішно прикрашеними кімнатами, кожна з яких розповідає історію королівського минулого і обіцяє славетну розповідь для майбутнього.\n\nРозлогі сади, доповнені вражаючими фонтанами та скульптурами, забезпечують безтурботний притулок. Палац Венарія слугує не лише культурним скарбом, але й місцем проведення різноманітних заходів та виставок, запрошуючи іноземних сановників зануритися в його багату спадщину. Під нашим пильним і культурним оком він стоїть як чудовий приклад архітектурної та культурної спадщини [ROOT.GetCountry.GetName]."
  flavor_sav.1.a: "Символ нашої могутності."