l_english:
  flavor_sale_of_lusatia.1000.title: "Застава [GetCountry('SOR').GetNameWithNoTooltip]"
  flavor_sale_of_lusatia.1000.desc: "[GetCountry('SOR').GetLongName], яку ми набули у спадок після смерті [GetCharacter('bra_heinrich_ii_askanier').GetName], не має великої цінності для [target_ruler.GetName] та [target_ruler.GetHerHis] амбіцій у [ROOT.GetCountry.GetCapital.GetName]. Раніше ми досягли угоди з [GetCountry('MEI').GetLongName], заставивши їм права на [GetCountry('SOR').GetNameWithNoTooltip]. Оскільки іноземні держави розглядають [GetCountry('SOR').GetNameWithNoTooltip] як шлях для власної експансії, було б вигідніше поновити цю угоду та отримати з цього гроші зараз, замість того, щоб бути прикутими до тягаря її захисту від іноземної агресії."
  flavor_sale_of_lusatia.1000.a: "Відправте дипломата до [GetCountry('MEI').GetCapital.GetNameWithNoTooltip]!"
  flavor_sale_of_lusatia.1000.a.tt: "[GetCountry('MEI').GetName] зможе придбати [GetCountry('SOR').GetName] за значну суму грошей, передавши їм [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] відносини на 10 років. Однак [target_ruler.GetName] залишиться [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] [GetCountry('SOR').GetNameWithNoTooltip]."
  flavor_sale_of_lusatia.1000.b: "Ми не можемо розлучитися з нею, навіть тимчасово."
  flavor_sale_of_lusatia.1000.historical_info: "Маркграфство Лужиця було заставлене Маркграфству Мейсен у 1353 році, поновивши стару заставу 1323 року. Було погоджено, що застава діятиме протягом 10 років, надаючи Мейсену доступ до прибутків Лужиці, тоді як Віттельсбахи залишалися номінальними правителями."
  flavor_sale_of_lusatia.1001.desc: "[GetCountry('BRA').GetLongName] запропонувало нам поновити стару заставу [GetCountry('SOR').GetName] на десять років. Хоча вони вимагають значної плати, це може бути чудова нагода здобути більший вплив на старих землях [target_ruler_meissen.GetDynasty.GetName]."
  flavor_sale_of_lusatia.1001.a: " [ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_sale_of_lusatia.1001.b: "Ми не потребуємо цієї землі."
  flavor_sale_of_lusatia.1100.title: "Справа [GetCountry('SOR').GetNameWithNoTooltip]"
  flavor_sale_of_lusatia.1100.desc_normal: "[GetCountry('SOR').GetLongName] тепер має повернутися до нашого володіння, оскільки термін застави завершився.\n\nОднак воно залишається володінням, що пропонує нам мало цінності, і продаж земель міг би надати нам необхідну фінансову підтримку для важливіших справ. Ми могли б розглянути варіант продати титул повністю, позбувшись клопітної землі. Безперечно, багато хто був би зацікавлений у придбанні [GetCountry('SOR').GetName], а наші добрі відносини з [target_buyer.GetName] роблять їх надійним варіантом."
  flavor_sale_of_lusatia.1100.desc_fallback: "Застава [GetCountry('SOR').GetName] вичерпала свій термін, але, на жаль, вона припинила своє існування у володінні іноземних дурнів. Зараз у нас мало законних варіантів повернути ці землі."
  flavor_sale_of_lusatia.1100.a: "Звернутися до [target_buyer.GetName] з пропозицією."
  flavor_sale_of_lusatia.1100.b: "Ми закінчили з продажем земель."
  flavor_sale_of_lusatia.1100.c: "Ми повернемо наші законні землі!"
  flavor_sale_of_lusatia.1100.d: "Можливо, промах у розсудливості."
  flavor_sale_of_lusatia.1100.historical_info: "Після того, як Застава 1353 року вичерпала свій термін, Отто фон Віттельсбах продав титул та землі Маркграфства Лужиця Короні Богемії, яка прийняла пропозицію. Лужиця увійшла до володінь Богемії, знову об'єднавши Верхню та Нижню Лужицю під одним правлінням."
  flavor_sale_of_lusatia.1101.desc: "Із завершенням терміну застави [GetCountry('SOR').GetName] [GetCountry('MEI').GetName], [GetCountry('BRA').GetName] вирішило запропонувати нам повний викуп [GetCountry('SOR').GetLongNameWithNoTooltip]. Хоча ціна, безумовно, висока, це може бути прибутковою інвестицією для нас."
  flavor_sale_of_lusatia.1101.a: "Ми приймаємо це!"
  flavor_sale_of_lusatia.1101.b: "Це звучить як погана інвестиція."
  flavor_sale_of_lusatia.1102.title: "Пропозицію відхилено"
  flavor_sale_of_lusatia.1102.desc: "[target_buyer.GetName] відхилив нашу пропозицію! [GetCountry('SOR').GetName] повернеться під наше правління, як зазначено в початковій заставі, і вони знову платитимуть нам васальні збори."
  flavor_sale_of_lusatia.1102.a: "[ROOT.GetCountry.Custom('common_string_ok')]"