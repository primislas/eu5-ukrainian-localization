l_english:
  flavor_ira.1.title: "Реформи [target_character.GetNameWithNoTooltip]"
  flavor_ira.1.desc: "[target_character.GetName] довів [target_character.GetHerHis] мужність як об'єднувач [ShowRegionName('persia_region')]. Однак [ShowCultureName('mongolian_culture')] завоювання регіону призвело до створення [GetInternationalOrganizationType('ilkhanate').GetName], а також інші іноземні загарбники підкреслили необхідність суттєвих реформ у [target_country.GetLongName], якщо [target_country.GetFlavorRank] має витримати випробування часом."
  flavor_ira.1.a: "Зосередьмося на відбудові міст."
  flavor_ira.1.b: "Військо гостро потребує реформ."
  flavor_ira.1.c: "Переглянути закони держави."
  flavor_ira.1.d: "Ми не можемо дозволити собі жодного з цих варіантів."
  flavor_ira.1.historical_info: "Ісмаїл I, $rank_kingdom_persian_ruler_male$ Персії з 1501 по 1524 рік, був засновником династії Сефевідів у Персії. Хоча він був відомий як великий завойовник і консолідатор, він також запровадив багато реформ у Персії, які забезпечили піднесення імперії. Його народ, який страждав від Тимура та туркменських племен, здебільшого вітав реформи Ісмаїла."
  abbas_the_great: "Аббас-е Бозорг"
  flavor_ira.2.title: "Правління [target_character.GetNameWithNoTooltip]"
  flavor_ira.2.desc: "[target_country.GetLongName] процвітає під керівництвом [target_character.GetName]. Уряд править майже без проблем, [target_country.GetAdjectiveWithNoTooltip] народ насолоджується заможним життям, а [target_country.GetCulture.GetName] культура процвітає."
  flavor_ira.2.a: "Довгим буде правління [target_character.GetShortNameWithNoTooltip] $nick_the_great$!"
  flavor_ira.2.historical_info: "Правління Аббаса Великого, $rank_empire_persian_ruler_male$ династії Сефевідів з 1587 по 1629 рік, ознаменувало вершину держави. Він створив дисципліновану постійну армію, розгромив узбеків і помстився османам. У 1598 році він обрав $isfahan$ своєю новою столицею. Прихильник мистецтв, особливо архітектури, він прикрасив місто одними з найкращих ісламських пам'яток у світі. Він побудував низку мечетей, шкіл, мостів і великий базар. За його правління перські майстри та художники досягли успіху у створенні вишуканих шовків, тканин, порцеляни, металевих виробів, каліграфії, мініатюр та килимів."
  flavor_ira.3.title: "Радник з-за кордону"
  flavor_ira.3.desc: "Два мандрівники здалеку прибули до нашого [root_country.GetGovernment.GetCourtTitle]. Вони представляються як [first_sibling.GetDynasty.GetName] [root_country.Custom('GetSiblings')] і повідомляють про технологічні досягнення з [ShowContinentName('europe')]. Хоча [second_sibling.GetName] не має наміру залишатися і лише бажає створити торговельні відносини між [root_country.GetName] та [target_country.GetName], [first_sibling.GetName] пропонує [first_sibling.GetHerHis] послуги для підтримки нас — звісно, в обмін на золото."
  flavor_ira.3.historical_info: "$rank_kingdom_persian_ruler_male$ Аббас Великий дуже захоплювався військовими навичками західних європейців і охоче приймав християнських місіонерів до свого володіння, навіть вдаючи, що сам перебуває на межі навернення. $rank_kingdom_persian_ruler_male$ нарешті заручився допомогою двох англійців — Ентоні та Роберта Шерлі — для реформування перської армії та флоту. Результати не забарилися. Аббас відібрав Бахрейн у португальців і розграбував їхню базу в Ормузі."
  flavor_ira.3.a: "Найняти [first_sibling.GetCulture.GetNameWithNoTooltip] радника."
  flavor_ira.3.b: "Покладатися на вітчизняних радників"
  flavor_ira.4.title: "Політичні заворушення"
  flavor_ira.4.desc: "Під правлінням [great_ruler.GetName] [target_country.Custom('GetQizilbashEstateName')] були умиротворені під [great_ruler.GetHerHis] пильним оком і використовувалися як зброя проти ворогів [target_country.GetName]. Однак [target_character.GetName] тепер контролює [target_country.GetAdjectiveWithNoTooltip] [target_country.GetGovernment.GetCourtTitle], що знову відкрило шлях для подальших конфліктів між племенами."
  flavor_ira.4.historical_info: "Влада Сефевідів базувалася на племенах кизилбашів з Малої Азії, які спочатку перемогли Ак-Коюнлу. Однак клани змагалися між собою за контроль над $rank_kingdom_persian_ruler_male$. За Аббаса Великого вони були під жорстким контролем, але з його смертю Персія знову була охоплена їхніми міжусобицями. Зрештою, їхня влада ослабла, але їх замінили лише бунтівні воєначальники з Афганістану та Белуджистану у XVIII столітті."
  flavor_ira.4.a: "Дозволити кланам битися."
  flavor_ira.4.b: "Ми повинні приборкати клани, перш ніж це вийде з-під контролю."
  flavor_ira.4.b.tt: "Кожен [ShowUnitDefinitionName('a_discovery_qizilbash')] #R розпускається#!"
  flavor_ira.5.title: "[target_country.GetCulture.GetNameWithNoTooltip] Мініатюрний живопис"
  flavor_ira.5.desc: "У [target_country.GetCulture.GetName] мистецтві заборона зображення людської фігури ніколи не поширювалася на нерелігійну літературу, і [target_country.GetCulture.GetNameWithNoTooltip] [target_country.GetGovernment.GetEstateName('nobles_estate')] замовляли ілюміновані рукописи, що містять вишукані та дуже дорогі мініатюрні картини, скільки хто пам'ятає. З відродженням [target_country.GetLongName] індустрія мініатюрного живопису зараз процвітає. Роботи майстрів школи приваблюють не лише вітчизняних покупців, але й експортуються по всьому [ShowReligionGroupAdjective('muslim')] світу."
  flavor_ira.5.a: "Нам слід заохочувати наших митців створювати більше таких картин."
  flavor_ira.5.a.tt: "#Y 3#! наших найкращих [ShowArtistTypeName('painter')] почнуть працювати над [ShowWorkOfArtTypeName('miniature_painting')] [Concept('works_of_art', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.5.b: "Це чудові ілюстрації."
  flavor_ira.6.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ira.6.desc: "[target_character.GetName] походить з [target_country.Custom('GetQizilbashEstateName')] роду. Проте [target_character.GetSheHe] вирішив(-ла) приєднатися до бюрократії [target_country.GetFlavorRank]. [target_character.GetHerHis|U] праця може допомогти [target_country.GetName] процвітати, але [target_character.GetSheHe], як і багато інших працівників, потребуватиме золота за [target_character.GetHerHis] службу."
  flavor_ira.6.a: "[target_character.GetSheHe|U] буде дуже корисним(-ою) у кабінеті."
  flavor_ira.6.b: "У нас немає грошей для [target_character.GetHerHim]."
  flavor_ira.7.title: "Таріх-е Алам-ара-є [target_ruler.GetNameWithNoTooltip]"
  flavor_ira.7.desc: "Після життя в [target_country.GetGovernment.GetAdjective] бюрократії, [target_character.GetName] завершив(-ла) велику хроніку історії нашої держави. Починаючи із заснування [target_country.GetFlavorRank], [target_character.GetLastName] переповідає події кожного правителя з того часу — з особливим акцентом на [target_ruler.GetName]. Новіші частини періоду, охопленого хронікою, ґрунтуються на власному багатому досвіді [target_character.GetLastNameWithNoTooltip] з [target_character.GetHerHis] часу на службі у [target_country.Custom('GetSeatOfPower')]."
  flavor_ira.7.a: "Який чудовий переказ!"
  flavor_ira.8.title: "Ан-Наджаф аль-Ашраф"
  flavor_ira.8.desc: "Нам пощастило бути хранителями Ан-Наджаф аль-Ашраф, центру [target_location.GetName] та одного з найсвятіших міст світу. Це місце спочинку імама Алі. В останні роки, під час криз на [ShowSubContinentName('middle_east')], [GetCountry('JAL').GetLongName] та інших воюючих держав, місто та його святині дещо занедбані. Наш обов'язок виправити цю ситуацію."
  flavor_ira.8.a: "Ми повинні зробити все можливе, щоб прикрасити Наджаф та його святині."
  flavor_ira.8.b: "Захистимо Наджаф, не вдаючись до марнотратства."
  flavor_ira.9.title: "[target_country.GetCulture.GetNameWithNoTooltip] Вплив"
  flavor_ira.9.desc: "Впливаючи від великих султанів $ADU_f$ аж до Небесних Імператорів [GetCountry('CHI').GetName], велика [target_country.GetCulture.GetName] культура залишила свій слід в історії світу, надихаючи багато різних мов та цивілізацій. Зі зростанням [target_country.GetLongName] настав час знову стати центром мистецтва та культури. Людина завтрашнього дня говоритиме [target_country.GetCulture.GetLanguage.GetName]!"
  flavor_ira.9.a: "Слава [target_country.GetNameWithNoTooltip] завжди була в її культурі."
  flavor_ira.10.title: "Піднесення Муша'ша'ійї"
  flavor_ira.10.desc: "Міленаристська секта, зосереджена навколо [target_character.GetCulture.GetName] теолога [target_character.GetName], швидко набирає послідовників серед людей у [target_location.GetArea.GetName]. За словами [target_character.GetHerHim], [target_character.GetSheHe] є посланцем імама Алі та Махді, хоча багато хто навколо [target_ruler.GetName] також засуджує такі заяви як єретичні.\n\nОскільки секта продовжує набирати послідовників та фінансові активи, залишається незрозумілим, чи [target_character.GetLastNameWithNoTooltip|U] або будь-хто з [target_character.GetHerHis] наступників стане значним фактором у політиці [ROOT.GetCountry.GetName]."
  flavor_ira.10.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ira.10.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetArea.GetName] отримає [ShowModifier('ira_mushashaiya')] на #Y 10 років#! і багато [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ShowReligionName('shia')]"
  flavor_ira.10.b: "[target_ruler.GetShortNameWithNoTooltip] може багато чого навчитися від [target_character.GetHerHim]."
  flavor_ira.10.c: "[target_character.GetSheHe|U] є явним єретиком, убийте [target_character.GetHerHim]."
  flavor_ira.10.c.tt: "Кожна [ShowReligionAdjective('shia')] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetArea.GetName] отримає [ShowModifier('ira_mushashaiya')] на #Y 5 років#!"
  flavor_ira.11.title: "Піднесення Сафавійї"
  flavor_ira.11.desc: "Багата суфійська секта Сафавійя на північному заході [ShowRegionName('persia_region')] розпочала трансформацію з переважно аскетичної секти на військовий орден. Ідеї секти пройшли довгий шлях з моменту її заснування Сафі ад-Діном Ісхаком Ардабілі в минулому, наближаючись до [ShowReligionName('shia')] порівняно з її [ShowReligionAdjective('sunni')] витоками. Тепер її доктрина зробила ще один крок, оскільки лідерів секти все частіше вважають напівбожественними істотами, а її вірні стають дедалі войовничішими."
  flavor_ira.11.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ira.11.b: "Їм слід заспокоїти свої вчення."
  flavor_ira.11.b.tt: "Кожна [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [Concept('dominant_religion', 'CONCEPT_PLACEHOLDER')|e], що не є [ShowReligionName('shia')], отримує [ShowModifier('ira_safawiya')] на #Y 10 років#!"
  flavor_ira.12.title: "Повстання $qizilbash$"
  flavor_ira.12.desc: "Поява релігійної [ShowCultureName('farsi_culture')] держави сколихнула серця [ROOT.GetCountry.Custom('GetQizilbashEstateName')] на наших землях. Дрібні сутички з урядовцями тепер назрівають і загострюються до такої міри, що загрожують вибухнути повстанням, якщо їх не контролювати."
  flavor_ira.12.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ira.12.a.tt: "[ShowCultureName('farsi_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] по всій нашій країні втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.12.b: "Ми можемо тримати їх під контролем."
  flavor_ira.13.title: "[target_culture.GetNameWithNoTooltip] Люди в [target_country.GetLongNameWithNoTooltip]"
  flavor_ira.13.desc: "Завоювання завжди приводить нових людей до нашого лона. Для [target_culture.GetName] народу, почесних бійців Кавказу, доля визначила їхню загибель від рук [target_character.GetName]. Оскільки останні їхні сепаратистські елементи придушуються різними засобами, питання про те, що робити з їхнім населенням, нависає над головами [target_character.GetNameWithNoTooltip] та [target_character.GetHerHis] радників. Багато хто серед [target_country.Custom('GetQizilbashEstateName')] припускає, що нам не потрібні непокірні язичники в нашій адміністрації. Однак є переваги та перспективне вирощування в тому, щоб дозволити їм гармонійно процвітати під нашим прапором..."
  flavor_ira.13.historical_info: "Завжди існувала взаємодія між вірменами та Персією, і навіть Сельджуки привезли багато вірменських рабів та купців до Персії. Але #italic Великий Сургун#! або Велике Вигнання було здійснене Аббасом «Великим» у 1604-1605 роках під час Османсько-Сефевідської війни, і тоді сотні тисяч вірмен були насильно депортовані до Персії. Багато вірменських міст були розграбовані та зруйновані, і більшість депортованого населення загинула по дорозі. У Персії їх спочатку добре приймали і дозволяли процвітати, але пізніше також змусили прийняти іслам і піддали дискримінації. Депопулізовані райони були заселені різними племенами турків та курдів, що значно змінило демографію регіону."
  flavor_ira.13.a: "Дозволити їм влитися в наше суспільство!"
  flavor_ira.13.a.tt: "#Y 40%#! [ShowCultureName('armenian_culture')] [Concept('people', 'CONCEPT_PLACEHOLDER')|e] з #Y 5#! наших найбільш населених локацій у [ShowRegionName('caucasus_region')] переїдуть до [target_location.GetName]"
  flavor_ira.13.b: "Ми не можемо розбавляти нашу вищу касту."
  flavor_ira.14.title: "[ShowCultureNameWithNoTooltip('turkmen_culture')] Новобранці стікаються під прапори"
  flavor_ira.14.desc: "Після того, як так багато [ShowCultureName('turkmen_culture')] земель потрапили під наш [ROOT.GetCountry.GetFlavorRank], багато їхніх бійців блукали по безплідній сільській місцевості, грабуючи та переслідуючи мандрівних купців і фермерів. Чоловіки без мети, чиї серця були сповнені віри та вірності своїм колишнім господарям, тепер без керма у світі, що змінюється швидше за них, залишаючи їх позаду. До цих чоловіків ми повинні підняти наш прапор і виростити насіння нашої віри в їхніх серцях. Закличмо цих загартованих у боях чоловіків рівнин і нехай вони ведуть наші армії до величі!"
  flavor_ira.14.a: "Збирайте коней, ми вирушаємо на світанку!"
  flavor_ira.14.b: "Вони просто натовп!"
  flavor_ira.15.title: "Новий кінь"
  flavor_ira.15.desc: "Роки схрещування найкращих коней світу нарешті дали результати! Наші [ROOT.GetCountry.GetGovernment.GetAdjective] заводчики зібрали коней з [ShowContinentName('europe')], [ShowContinentName('africa')], [ShowRegionName('arabia_region')] і навіть з далекого $china$, щоб вивести ідеального бойового коня, скакуна, який прокладе шлях до перемоги для наших армій і закріпить наше місце в історичних книгах. Наші [ROOT.GetCountry.GetGovernment.GetAdjective] слуги красномовно повідомляють [ROOT.GetCountry.GetGovernment.GetCourtTitle], що процес наближається до завершення, і що результати, безсумнівно, будуть покращенням порівняно з існуючою породою кавалерії, що використовується нашими арміями."
  flavor_ira.15.a: "Ми отримаємо найкращих коней!"
  flavor_ira.15.b: "Нам слід зосередитися на тому, щоб мати більше коней."
  STATIC_MODIFIER_NAME_ira_selective_horse_breeding: "Вибіркове розведення коней"
  STATIC_MODIFIER_NAME_ira_intensive_horse_breeding: "Інтенсивне розведення коней"
  flavor_ira.16.title: "$шахнаме$"
  flavor_ira.16.desc: "Невдовзі після славетного сходження [target_ruler.GetHerHis] на престол, [target_ruler.GetName] відкрито висловив [target_ruler.GetHerHis] захоплення старовинною епічною поемою $шахнаме$, написаною століття тому великим Хакімом Або'л-Касемом Фердовсі Тусі. Ця книга була оспівана при дворах [ShowRegionName('persia_region')], і тепер [target_ruler.GetShortNameWithNoTooltip] висловлює [target_ruler.GetHerHis] бажання мати еквівалентний епос, щоб оповісти про [target_ruler.GetHerHis] славетне правління та історію нашої [ROOT.GetCountry.GetLongName].\n\nЗ цією метою було проведено пошук найталановитішого письменника, придатного для цієї роботи, і [target_character.GetName] представив [target_character.GetHerselfHimself] як найвідповіднішу особу."
  flavor_ira.16.a: "Зеніт [ROOT.GetCountry.GetAdjectiveWithNoTooltip] культури та витонченого мистецтва!"
  flavor_ira.17.title: "[target_country.GetAdjectiveWithNoTooltip] синьо-білі [ShowGoodsNameWithNoTooltip('porcelain')]"
  flavor_ira.17.desc: "Успіх приносить багатство, а багатство часто супроводжується престижем, легітимністю та владою. З цією метою багато наших авантюрних купців подорожували до легендарних палаців [target_country.GetLongName] і назад, повертаючись до наших дворів та ринків з багатьма дивними, іноземними, але захопливо красивими тканинами та матеріалами. Серед них синьо-біла [ShowGoodsName('porcelain')] була зарезервована для [root_character.GetName] як особистий подарунок від [target_character.GetName]. Ця [ShowGoodsNameWithNoTooltip('porcelain')] безсумнівно прикрасить наші гробниці та палаци, надаючи нам ауру легітимності та нового статусу!"
  flavor_ira.17.a: "Матеріал, гідний [root_country.GetGovernment.GetRulerTitle]"
  flavor_ira.18.title: "Килими [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ira.18.desc: "Зі збільшенням нашого виробництва килимів та монополією на текстиль, попит та пропозиція шовку, тканини та барвників знаходяться в наших руках. Ми маємо безліч способів отримати значну вигоду від нашого економічного впливу, тож давайте скористаємося цим якнайкраще."
  flavor_ira.18.a: "Забезпечити монополію на їх виробництво."
  flavor_ira.18.b: "Збільшити обсяг продажів від їх торгівлі."
  flavor_ira.18.c: "Наше поточне співвідношення проданих килимів є достатньо хорошим."
  flavor_ira.19.title: "Піднесення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] аркебузи"
  flavor_ira.19.desc: "Під час наших численних кампаній правила війни змінювалися знову і знову. Наші предки вели війни верхи, озброєні мечами та луками. Проте поява пороху переосмислила спосіб знищення наших ворогів. Так сталося, що наші війська не лише прийняли аркебузу, нову винайдену довгоствольну порохову зброю, але й інтегрували її у свої культурні традиції та повсякденне життя. В результаті наша піхота та кавалерія здобули собі ім'я на полі бою."
  flavor_ira.19.a: "Наша майстерність з аркебузою неперевершена!"
  flavor_ira.19.a.tt: "Кожен [ShowUnitDefinitionName('a_tofangchi')] отримує [ShowNamedValue('subunit_experience_severe_bonus')|+=2%] [Concept('experience', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.19.b: "Ми не можемо відмовитися від наших традицій!"
  flavor_ira.20.title: "Лев [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ira.20.desc: "[ROOT.GetCountry.GetLongName]: імперія, що простягається від земель [ShowContinentName('europe')] до самого серця $india$. Багато складних і могутніх ворогів стояли на нашому шляху, проте [ROOT.GetCountry.GetAdjectiveWithNoTooltip] рішучість збереглася. Наші солдати тримали лінію, тоді як наша кавалерія флангувала та знищувала наших ворогів. [ROOT.GetCountry.GetAdjectiveWithNoTooltip] бюрократи інтегрували величезні території, тоді як [ROOT.GetCountry.GetCulture.GetName] ремісники та художники увічнюють досягнення нашої нації.\n\nВоістину, жодна імперія до нас і після нас не залишає більшого сліду, ніж [ROOT.GetCountry.GetLongNameWithNoTooltip], і жоден правитель не є таким великим, як [target_ruler.GetName]."
  flavor_ira.20.a: "Слава [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_ira.21.title: "Місто Світових Бажань"
  flavor_ira.21.desc: "[target_location.GetName]: столиця багатьох суперників знаходиться в [ROOT.GetCountry.GetAdjective] руках. З часів стародавньої Римської імперії [target_location.GetNameWithNoTooltip] завжди було великим містом стратегічного та культурного значення як для [ShowReligionGroupAdjective('christian')], так і для [ShowReligionGroupAdjective('muslim')] світів.\n\nДеякі в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджували, що [target_location.GetNameWithNoTooltip] можна розвинути в нашу «Другу столицю» на європейській землі, тоді як інші вважають, що ми повинні перемістити багатства [target_location.GetNameWithNoTooltip] до [target_capital.GetName] замість цього."
  flavor_ira.21.a: "Зробімо [target_location.GetNameWithNoTooltip] нашою Другою Столицею."
  flavor_ira.21.b: "[target_location.GetNameWithNoTooltip] буде лише ще однією провінцією для нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_ira.22.title: "[ShowCultureGroupNameWithNoTooltip('turkic_group')] Інтеграція"
  flavor_ira.22.desc: "[ShowCultureGroupName('turkic_group')] не є рідкісним явищем у [ROOT.GetCountry.GetName]. Самі [ROOT.GetCountry.GetGovernment.GetEstateName('tribes_estate')] є [ShowCultureGroupNameWithNoTooltip('turkic_group')], і як такі пов'язані зі своїми осілими родичами з [ShowRegionName('anatolia_region')].\n\nБагато [ShowCultureGroupNameWithNoTooltip('turkic_group')] народів наших новозавойованих провінцій приєдналися до різних груп [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('tribes_estate')] і були інтегровані в наше суспільство. Хоча їхні землі більше не створюватимуть проблем для нашого [ROOT.GetCountry.GetFlavorRank], саме збільшення впливу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('tribes_estate')] є приводом для занепокоєння..."
  flavor_ira.22.a: "Ми можемо розібратися з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('tribes_estate')] пізніше."
  flavor_ira.22.a.tt: "Кожна [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowCultureGroupName('turkic_group')] [culture_group] як її [Concept('dominant_culture', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowNamedValue('control_weak_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.22.b: "Заборонити їм приєднуватися до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('tribes_estate')]."
  flavor_ira.23.title: "[ShowCultureNameWithNoTooltip('georgian_culture')] Раби в [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_ira.23.desc: "Завоювання завжди приводить нових людей до нашого лона. Для [ShowCultureName('georgian_culture')] та [ShowCultureName('armenian_culture')] народів, шанованих бійців [ShowRegionName('caucasus_region')], доля приготувала їхній занепад від рук нашого [ROOT.GetCountry.GetFlavorRank]. Оскільки вони тепер схилять коліна перед нами, питання про те, що робити з їхнім населенням, нависає над головами [target_ruler.GetName] та [target_ruler.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nБагато хто серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] припускає, що ми не потребуємо непокірних язичників у нашій адміністрації. Однак є переваги та перспективи розвитку в тому, щоб дозволити їм гармонійно процвітати під нашим прапором..."
  flavor_ira.23.a: "Вони процвітатимуть у нашому великому [ROOT.GetCountry.GetFlavorRank]!"
  flavor_ira.23.tt.common: "Кожен [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] [ShowCultureName('georgian_culture')] або [ShowCultureName('armenian_culture')] [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] отримає"
  flavor_ira.23.a.tt: "$flavor_ira.23.tt.common$ #G 15%#! [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.23.b: "Вони ніколи не будуть [ROOT.GetCountry.GetAdjectiveWithNoTooltip]!"
  flavor_ira.23.b.tt: "$flavor_ira.23.tt.common$ #R -10%#! [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.24.title: "[target_location.GetNameWithNoTooltip]"
  flavor_ira.24.desc: "Хоча й не особливо значуще, [target_location.GetRank.GetName] було заселене з давніх-давен, і дехто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] [target_ruler.GetName] вважає його чудовим місцем для розвитку безпрецедентного міста. Якщо ми докладемо зусиль для цього, ми справді зможемо створити центр [ROOT.GetCountry.GetCulture.GetName] культури та навчання в серці [target_location.GetArea.GetName]."
  flavor_ira.24.historical_info: "Хоча поселення існувало й раніше, значення Ашавалу почалося, коли Ахмад Шах I Музаффарид переніс туди свою столицю в 1411 році, а місто Ахмедабад було завершено в 1413 році. Його наступники висадили дерева вздовж вулиць міста, прикрасили його чудовими будівлями та щедро підтримували його торговців і ремісників. Хоча Чампанер став столицею Гуджаратського султанату в 1484 році, Ахмедабад залишався його головним містом, добре захищеним своїми стінами, добре забезпеченим своїми садами та городами, і прикрашеним добре спланованими вулицями, площами та будинками. Поряд зі своєю неперевершеною красою, місто також є домом для відомої та великої мечеті Сархедж Роза."
  flavor_ira.24.a: "Місто, що затьмарить усі інші!"
  flavor_ira.24.b: "Це просто глухе місце."
  flavor_ira.25.title: "Еволюція [ShowUnitDefinitionNameWithNoTooltip('a_discovery_qizilbash')]"
  flavor_ira.25.desc: "[ShowUnitDefinitionName('a_discovery_qizilbash')] були на нашій службі роками і показали свою вірність та лютість. З часом військовий прогрес також розвивається. Тому нікого не дивує, що ці воїни еволюціонували в [ShowUnitDefinitionName('a_reformation_qizilbash')]."
  flavor_ira.25.a: "Нехай вони ведуть нас до незліченних перемог."
  flavor_ira.26.title: "Піднесення $ira_clerical_aristocracy$"
  flavor_ira.26.desc: "Союз, що зароджується між [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], призвів до того, що багато нових землевласників змогли уникнути конфіскації своїх земель [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Вони можуть досягти цього, пожертвувавши свої володіння [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], і натомість отримуватимуть частину доходів. Хоча ця практика може допомогти принести стабільність у [ROOT.GetCountry.GetName], вона також послабить [ROOT.GetCountry.GetFlavorRank], забезпечуючи захист прав обох станів один одним."
  flavor_ira.26.a: "Давайте сприяти цій практиці."
  flavor_ira.26.b: "Ми не дозволимо їм ігнорувати наше правління."
  flavor_ira.27.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ira.27.desc: "Брак компетентних чоловіків у [ROOT.GetCountry.GetName] призвів до пошуку будь-кого, хто міг би зайняти кілька посад у [ROOT.GetCountry.GetGovernment.GetCabinetTitle] або у війську. На щастя для нас, [target_character.GetWomanMan] на ім'я [target_character.GetName] звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle], шукаючи працевлаштування у [ROOT.GetCountry.GetFlavorRank]. Будучи уродженцем [ShowLocationName('isfahan')] та членом родини [ShowDynastyName('husayn_dynasty')], [target_character.GetSheHe] міг би допомогти стабілізувати [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ira.27.a: "[target_character.GetNameWithNoTooltip] служитиме нашим [ROOT.GetCountry.Custom('GetHeadOfCabinetName')]."
  flavor_ira.27.b: "[target_character.GetSheHe|U] буде великим полководцем."
  flavor_ira.27.c: "Нам не потрібна допомога шляхетних родин."
  flavor_ira.29.title: "Нова столиця в [ShowLocationNameWithNoTooltip('qazvin')]"
  flavor_ira.29.desc: "Наша столиця в [target_capital2.GetName] була головною мішенню багатьох наших суперників. [ROOT.GetCountry.GetGovernment.GetCourtTitle] побоюється, що якщо ми коли-небудь підемо на війну з [target_country.GetName], захист [target_capital2.GetRank.GetName] вимагатиме багато зусиль. З цієї причини багато хто пропонує перенести [ROOT.GetCountry.GetGovernment.GetCourtTitle] до [target_capital.GetName].\n\n[target_character.GetName] розглядає цей крок не лише як стратегічний, але й як шанс спробувати приборкати деякі нелояльні родини в [ROOT.GetCountry.GetName]. З обіцянкою безпеки від наших суперників, вони, безсумнівно, будуть у нас в боргу, і буде легше вимагати від них послуг."
  flavor_ira.29.a: "Перенесемо столицю."
  flavor_ira.29.b: "Столиця залишається в [target_capital2.GetNameWithNoTooltip]."
  flavor_ira.30.title: "$takmelat_al_akhbar$"
  flavor_ira.30.desc: "Хоча історичні записи зазвичай фіксуються якомога точніше, вони часто створюються способами, які вважаються ненадійними. Ці неточності завжди призводили до того, що кілька наших істориків переписували історію [ROOT.GetCountry.GetName]. Одним з них є [target_character.GetName], місцевий адміністратор, який звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle] з проханням про фінансування для написання #italic $takmelat_al_akhbar$#!, універсальної історії, що містить правління [target_character2.GetName], а також династії [target_character2.GetDynasty.GetName] в цілому."
  flavor_ira.30.a: "Ми надамо [target_character.GetHerHim] кошти"
  flavor_ira.30.b: "Якщо [target_character.GetSheHe] може пройти весь шлях сюди, [target_character.GetSheHe] напевно може зробити це без допомоги."
  flavor_ira.31.title: "Військові реформи [target_character.GetNameWithNoTooltip]"
  flavor_ira.31.desc: "Хоча наша армія мала успіхи в минулому, [target_character.GetName] помітив багато недоліків у ній, починаючи від проблем з організацією до проблем з навчанням та логістикою. Бажаючи їх вирішити, [target_character.GetSheHe] хоче ініціювати великі реформи в армії.\n\nЗалучаючи більше рабів до нашої армії та використовуючи більше артилерії для облоги та сухопутної війни, ми можемо започаткувати тенденцію до подальших успіхів [ROOT.GetCountry.GetAdjective] армії проти її ворогів."
  flavor_ira.31.a: "Ми ініціюємо покращення нашої військової інфраструктури."
  flavor_ira.31.b: "Ми зосередимося на покращенні якості та підготовки наших військ."
  flavor_ira.31.c: "Настав час набрати більше людей до армії."
  ira_grant_prosperity_to_armory_building_locations: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що має #Y Військову#! [Concept('building', 'CONCEPT_PLACEHOLDER')|e], отримає [ShowNamedValue('prosperity_mild_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.32.title: "$imamzadeh_hossein$"
  flavor_ira.32.desc: "Хоча наша столиця в [target_location.GetName] принесла нам багато переваг, [target_character.GetName] помітив брак як релігійного, так і художнього вираження. Бажаючи показати [target_character.GetHerselfHimself] як побожного [ROOT.GetCountry.GetReligion.GetAdjective], [target_character.GetSheHe] планує побудувати гробницю для сина імама Абу аль-Хасана аль-Тані. Хоча багато наших [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] людей були б щасливі, якби ми почали її будівництво, це також досить дорогий проект, який [ROOT.GetCountry.GetName] може не дозволити собі."
  flavor_ira.32.a: "Ми покажемо нашу віру як послідовники [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip]."
  flavor_ira.32.b: "Це був би досить дорогий проект."
  flavor_ira.34.title: "Розквіт мистецтва [target_character.GetDynasty.GetNameWithNoTooltip]"
  flavor_ira.34.desc: "Наші інвестиції в мистецтво та культуру змусили багатьох повірити, що династія [target_character.GetDynasty.GetName] є піонером значної частини нового мистецтва, створеного в [ROOT.GetCountry.GetName]. [target_character.GetName] також помітив це, і будучи [target_character.GetWomanMan], який шукає такі наукові можливості, бажає максимізувати наше фінансування цього ренесансу [ROOT.GetCountry.GetAdjectiveWithNoTooltip] мистецтва."
  flavor_ira.34.a: "Ми фінансуватимемо кожного митця в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ira.34.b: "Натомість ми повинні спробувати зберегти наші скарбниці."
  flavor_ira.35.title: "Монетні реформи [target_character.GetNameWithNoTooltip]"
  flavor_ira.35.desc: "Через економічну ситуацію, завдяки нашій накопиченій інфляції, вартість наших монет сильно коливається в межах [ROOT.GetCountry.GetFlavorRank]. Це спричинило багато проблем для [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які тепер закликають до реформ нашої валюти. [target_character.GetName], завжди старанний, пропонує унікальне рішення цієї проблеми. Замість єдиної валюти, [target_character.GetSheHe] бажає впровадити різну монету для кожного регіону [ROOT.GetCountry.GetFlavorRank]. Хоча це коштуватиме нам [ShowGoodsName('silver')], це стабілізує нашу інфляцію, а також задовольнить наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], які прагнули справедливих угод на нашому ринку."
  flavor_ira.35.a: "Ця ідея звучить інтригуюче."
  flavor_ira.35.b: "Можливо, ми повинні дозволити проблемі вирішитися самій."
  ira_currency_reforms: "Валютні реформи"
  flavor_ira.37.title: "[ShowCultureNameWithNoTooltip('armenian_culture')] Впливи"
  flavor_ira.37.desc: "[ShowCultureName('armenian_culture')] народ може бути меншиною в межах [ROOT.GetCountry.GetFlavorRank], але ніхто не може заперечити вплив, який вони мали на [ROOT.GetCountry.GetName]. Будучи прихильними до [ROOT.GetCountry.GetGovernment.GetCourtTitle], вони можуть процвітати в межах [ROOT.GetCountry.GetFlavorRank], створюючи кілька громад по всій землі. Завдяки своєму впливу вони бажають включити таких людей, як [target_character2.GetName], до [ROOT.GetCountry.GetGovernment.GetCabinetTitle]. Хоча це задовольнило б цю меншину, є члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які вважали б це образою для самої [ROOT.GetCountry.GetCulture.GetName] культури."
  flavor_ira.37.a: "Здібні люди допускаються до [ROOT.GetCountry.GetGovernment.GetCabinetTitle]."
  flavor_ira.37.b: "Ми не ображатимемо наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  ira_all_armenian_pops_gain_satisfaction: "Усі наші [ShowCultureName('armenian_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  ira_all_armenian_pops_lose_satisfaction: "Усі наші [ShowCultureName('armenian_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.38.title: "$ali_qapu_palace$"
  flavor_ira.38.desc: "Відсутність адекватного палацу для родини [target_character.GetDynasty.GetName] зашкодила нашому праву правити [ROOT.GetCountry.GetName]. Будучи сприйнятими як слабкі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], ми ризикуємо державним переворотом. Замість того, щоб використовувати нашу армію для придушення таких заворушень і намагатися вимагати безглуздих послуг у [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], ми повинні показати наше багатство, створивши палац. Вже [target_character.GetName] заклав основи для такого монумента в [target_location.GetName], бажаючи перетворити [target_location.GetRank.GetName] на справжню столицю [ROOT.GetCountry.GetNameWithNoTooltip]. Запланований до назви $ali_qapu_palace$, Велика Брама, його інтер'єр міститиме численні картини, музичний зал, а також інші розкоші, гідні [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_ira.38.a: "Давайте побудуємо палац!"
  flavor_ira.38.b: "Можливо, це був би занадто дорогий проєкт."
  flavor_ira.39.title: "Заборона алкоголю"
  flavor_ira.39.desc: "Незважаючи на наші правила проти алкоголю як [ShowReligionGroupAdjective('muslim')] [ROOT.GetCountry.GetFlavorRank], існують різні віри навколо [ROOT.GetCountry.GetName], які все ще споживають напої, такі як [ShowGoodsName('beer')] або [ShowGoodsName('wine')]. Для багатьох такий напій є їхнім повсякденним життям, відволікаючи їх від поганого дня чи катастрофи. Однак [ShowReligionGroupNameWithNoTooltip('muslim')] суворо забороняє його споживання, що [target_character.GetName] вже добре знає. Вважаючи це [ROOT.GetCountry.GetReligion.GetSinName] для решти [ROOT.GetCountry.GetFlavorRank] потурати собі таким напоєм, [target_character.GetSheHe] планує повністю заборонити його споживання. Однак такий закон, безумовно, буде суперечливим і призведе до того, що багато наших [ROOT.GetCountry.GetGovernment.GetEstateName('dhimmi_estate')] будуть незадоволені цією нашою зміною."
  flavor_ira.39.a: "Заборонимо алкоголь."
  flavor_ira.39.b: "Ми поважатимемо право на споживання алкоголю."
  flavor_ira.40.title: "Питання [ShowReligionNameWithNoTooltip('zoroastrian')]"
  flavor_ira.40.desc: "[ShowReligionAdjective('zoroastrian')] народ може бути корінним для [ShowRegionName('persia_region')], але наша [ROOT.GetCountry.GetReligion.GetAdjective] віра домінувала в регіоні століттями, і наші звичаї домінують над [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Незважаючи на це, деякі все ще дотримуються вчень [ShowReligionNameWithNoTooltip('zoroastrian')], чинячи опір словам Пророка, мир йому. Хоча вони мають захист [ROOT.GetCountry.GetGovernment.GetEstateName('dhimmi_estate')], [target_character.GetName] бажає примусити їх до навернення, що не тільки нагадає їм, що саме [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] править ними, але й задовольнить наших [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_ira.40.a: "Вони вивчать шляхи [ShowReligionGroupNameWithNoTooltip('muslim')]."
  flavor_ira.40.b: "Ми не ігноруватимемо їхні права як [ShowReligionAdjectiveWithNoTooltip('zoroastrian')] народу."
  ira_conversion_of_zoroastrians_tt: "Велика кількість наших [ShowReligionAdjective('zoroastrian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернеться до [ROOT.GetCountry.GetReligion.GetName], але всі [ShowReligionAdjective('zoroastrian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  ira_satisfaction_for_zoroastrians_tt: "Усі наші [ShowReligionAdjective('zoroastrian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.41.title: "Мистецький стиль Фарангі-Сазі"
  flavor_ira.41.desc: "Хоча [ROOT.GetCountry.GetName] та його митці створювали шедевр за шедевром, вони тепер досягли свого зеніту. Не бажаючи відставати, [target_character2.GetName] планує скопіювати художній стиль [target_country.GetName]. Багато їхніх митців, а також [target_country.GetCulture.GetName] звичаї, зацікавили значну частину [ROOT.GetCountry.GetGovernment.GetCourtTitle] і вже почали розвивати художній стиль Фарангі-Сазі. Хоча це, здається, зашкодило [ROOT.GetCountry.GetCulture.GetName] звичаям, можливо, варто це спонсорувати."
  flavor_ira.41.a: "Ми дозволимо його розвиток."
  flavor_ira.41.b: "Немає причин шкодити [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] звичаям."
  flavor_ira.42.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ira.42.desc: "Талановитий бюрократ, [target_character.GetName] народився в [ShowLocationName('qazvin')], а його/її родина займала важливі посади в [ROOT.GetCountry.GetName]. Попри непотизм, пов'язаний із його/її просуванням у [ROOT.GetCountry.GetFlavorRank], [target_character.GetSheHe] виявив/виявила великі здібності як губернатор, настільки, що [target_character2.GetName] бажає підвищити його/її до посади [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] та нагородити його/її за його/її службу."
  flavor_ira.42.a: "Нагородити та підвищити [target_character.GetHerHim]."
  flavor_ira.42.b: "[target_character.GetSheHe|U] може становити проблему в довгостроковій перспективі."
  flavor_ira.43.title: "Священне місце [ShowLocationNameWithNoTooltip('qom')]"
  flavor_ira.43.desc: "[target_location.GetRank.GetName] [target_location.GetName] завжди було важливим місцем для всіх [ShowReligionAdjective('shia')] вірян. Попри це, воно зазнало недбалості з боку [ROOT.GetCountry.GetAdjective] народу, особливо тих, хто проживає в інших місцях у межах [ROOT.GetCountry.GetFlavorRank]. Щоб показати свою віру, [target_character.GetName] бажає допомогти з розвитком [target_location.GetRank.GetNameWithNoTooltip], перетворивши його на процвітаючий центр для кожної культури та віри в межах нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_ira.43.a: "Допоможемо в його будівництві."
  flavor_ira.43.b: "Залишити [target_location.GetRank.GetNameWithNoTooltip] напризволяще."
  flavor_ira.44.title: "Розквіт [ShowDynastyNameWithNoTooltip('safavid_dynasty')] мистецтва"
  flavor_ira.44.desc: "Династія [ShowDynastyName('safavid_dynasty')], хоча й [ShowCultureName('kurdish_culture')] походження, довела свою повагу до [ROOT.GetCountry.GetCulture.GetName] звичаїв, навіть до того, що її вважають багато меценатів. Будучи головними учасниками ренесансу мистецтва в [ROOT.GetCountry.GetName], значна частина нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], а також [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], вражені нашою відданістю і сподіваються, що ми продовжимо це культурне домінування. Однак раніше це відбувалося природним шляхом, а не шляхом витрачання золота для досягнення. Можливо, настав час для більшого меценатства, чогось, що змусило б кожного митця з усіх куточків світу стікатися до нас."
  flavor_ira.44.a: "Ми витратимо наше золото на це."
  flavor_ira.44.b: "Ми не будемо намагатися залучати іноземців до нашої країни для цього."
  flavor_ira.44.c: "Нехай цей ренесанс розквітне по всьому [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ira.45.title: "Племена [ShowDynastyNameWithNoTooltip('qajar_dynasty')]"
  flavor_ira.45.desc: "Недавня міграція племен [ShowDynastyName('qajar_dynasty')] у межах [ROOT.GetCountry.GetName] спричинила певну дестабілізацію в [ROOT.GetCountry.GetFlavorRank]. Попри це, правителі племені, [target_character.GetName] та [target_character2.GetName], виявили себе як здібні стратеги та адміністратори. Хоча вони досить непопулярні серед усіх у [ROOT.GetCountry.GetFlavorRank], все ще можливо залишити їх у нашому поточному уряді, скориставшись їхнім досвідом і, можливо, використовуючи їхнє плем'я для додаткової допомоги."
  flavor_ira.45.historical_info: "Як наступники Сефевідів, родина Каджарів переважно допомагала іранським шахам у їхні ранні роки. Зі зростанням впливу Аги Мохаммада Хана Каджара в регіоні та фрагментацією Сефевідської держави, родина Каджарів змогла проголосити себе шахами, повільно завойовуючи численні інші племена, які чинили опір їхній легітимності. Їхнє правління тривало до 1925 року, коли відбувся державний переворот, який замінив їх династією Пехлеві."
  flavor_ira.45.a: "Їм раді в [ROOT.GetCountry.GetName]."
  flavor_ira.45.b: "Геть їх!"
  ira_qajar_dynasty_may_claim_crown: "[ShowDynastyName('qajar_dynasty')] [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] спробує претендувати на наш трон, якщо нам бракуватиме [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e] та [Concept('stability', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_ira.46.title: "Повстання племен [ShowDynastyNameWithNoTooltip('qajar_dynasty')]"
  flavor_ira.46.desc: "Попри наш теплий прийом племен [ShowDynastyName('qajar_dynasty')] у минулому, [rebellion_ruler.GetName] побачив розбрат у [ROOT.GetCountry.GetName] і зібрав підтримку, щоб претендувати на трон від [current_ruler.GetName]. Вже [rebellion_ruler.GetNameWithNoTooltip] зібрав армію, щоб протистояти нам, і тепер марширує на [ROOT.GetCountry.GetCapital.GetName]."
  flavor_ira.46.historical_info: "$flavor_ira.45.historical_info$"
  flavor_ira.46.a: "Ми не зануримо [ROOT.GetCountry.GetFlavorRank] у хаос."
  flavor_ira.46.b: "Ми готові битися з цими самозванцями."
  qajar_pretenders: "[ShowDynastyNameWithNoTooltip('qajar_dynasty')] Самозванці"
  flavor_ira.47.title: "Піднесення династії [ShowDynastyNameWithNoTooltip('safavid_dynasty')]"
  flavor_ira.47.desc: "Орден [ShowReligiousSchoolName('safavid_school')] заснував свою присутність у [target_location.GetName]. Під проводом [target_character.GetName] вони довели себе як побожні послідовники [ShowReligionAdjective('shia')] віри, поширюючи дванадцятьницькі вірування на навколишні землі. Тепер, з їхньою присутністю в [ROOT.GetCountry.GetName] та нашим узгодженням з їхніми віруваннями, можливо, настав час надати їм область [target_area.GetName] як дім. Звісно, вони функціонуватимуть як наші піддані, але завдяки цьому ми зможемо краще контролювати їх та їхній вплив."
  flavor_ira.47.a: "Віддаймо землі ордену [ShowDynastyNameWithNoTooltip('safavid_dynasty')]."
  flavor_ira.47.a.tt: "[GetCountry('ABL').GetLongName] буде засновано як наш [ShowSubjectTypeName('vassal')] у [target_area.GetName] з [target_character.GetName] як правителем. Ми передамо їм право власності на цю область та наші тамтешні ядра."
  flavor_ira.47.b: "Вони не матимуть наших земель."
  flavor_ira.47.c: "Їхні [ShowReligiousSchoolNameWithNoTooltip('safavid_school')] звичаї інтригують нас..."
  flavor_ira.48.title: "Мілітаризм [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ira.48.desc: "Хоча нашою головною метою є поширення [ROOT.GetCountry.GetReligion.GetAdjective] віри, останнім часом це було важко здійснити лише словами. З цієї причини [target_character.GetName] планує сформувати [ROOT.GetCountry.GetAdjective] суспільство таким чином, щоб наша місія процвітала завдяки військовій силі. Використовуючи слова $common_string_quran$ як виправдання, [target_character.GetSheHe] сподівається, що це згуртує народ проти будь-яких язичників та невіруючих, які можуть нам протистояти. Однак такі зміни можуть зашкодити нашій нації щодо внутрішнього розвитку, що може бути несприятливим для [ROOT.GetCountry.GetFlavorRank]."
  flavor_ira.48.a: "Ми заохочуватимемо мілітаризацію в нашому суспільстві."
  flavor_ira.48.b: "Натомість зосередимося всередині."
  flavor_ira.49.title: "Ставлення до [ShowReligionGroupAdjectiveWithNoTooltip('christian')] громадян"
  flavor_ira.49.desc: "[ShowReligionGroupAdjective('christian')] меншинам у [ROOT.GetCountry.GetName] ніколи не було легко, особливо з фанатизмом простолюду. Попри це, вони досягли успіху в нашому [ROOT.GetCountry.GetFlavorRank], зумівши використати свої права як [ROOT.GetCountry.GetGovernment.GetEstateName('dhimmi_estate')], щоб піднятися на посади, які інакше були б їм недоступні. Однак до [target_character2.GetName] звернулися [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], бажаючи натомість змусити наших [ShowReligionGroupAdjectiveWithNoTooltip('christian')] людей навернутися до [ROOT.GetCountry.GetReligion.GetName]. Хоча це інтригує, це не обійдеться без опору."
  flavor_ira.49.a: "Ми виконаємо волю [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_ira.49.b: "Поважатимемо їхні права."
  ira_convert_christian_people_tt: "Кілька наших [ShowReligionGroupAdjective('christian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ROOT.GetCountry.GetReligion.GetName], але всі наші [ShowReligionGroupAdjectiveWithNoTooltip('christian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  ira_happier_christians_tt: "Усі наші [ShowReligionGroupAdjective('christian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ira.50.title: "Піднесення династії [ShowDynastyNameWithNoTooltip('safavid_dynasty')]"
  flavor_ira.50.desc: "Наш вплив у [ShowRegionName('persia_region')] не такий великий, як ми того бажаємо, проте, попри це, багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] прагне це змінити. [target_character.GetName] також бажає почати збирати [target_character.GetHerHis] армії, щоб посилити вплив [ShowDynastyName('safavid_dynasty')] над [ShowRegionName('persia_region')]. Будучи також компетентним військовим лідером, багато хто вважає, що [target_character.GetSheHe] зможе принести [ROOT.GetCountry.GetName] славу, можливо, піднявши [ROOT.GetCountry.GetFlavorRank] як гегемона регіону."
  flavor_ira.50.a: "Нехай нація йде до перемоги."
  flavor_ira.50.b: "Зосередження всередині було б кращим для нації."
  flavor_ira.51.title: "Мистецтво [ShowDynastyNameWithNoTooltip('qajar_dynasty')]"
  flavor_ira.51.desc: "Відколи племена [ShowDynastyName('qajar_dynasty')] здобули трон [ROOT.GetCountry.GetName], вони зосередилися на впровадженні нової хвилі мистецтва в [ROOT.GetCountry.GetFlavorRank], витісняючи старі стилі. Натомість вони просували більш ідеалістичний художній стиль, який прагне зобразити [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] більше, ніж просто підданих. Саме з цієї причини багато художників малювали [target_character.GetName] та всю династію [ShowDynastyNameWithNoTooltip('qajar_dynasty')]. Можливо, нам слід допомогти цим художникам, щоб ще більше закріпити цей новий художній стиль, який домінує в [ROOT.GetCountry.GetFlavorRank]."
  flavor_ira.51.a: "Нехай це впливає на нашу культуру самостійно."
  flavor_ira.51.b: "Використаймо цих митців, щоб вони малювали для всього [ROOT.GetCountry.GetFlavorRank]."
  flavor_ira.51.c: "Ці митці служитимуть [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ira.1000.title: "[target_country.GetAdjectiveWithNoTooltip]-[root_country.GetAdjectiveWithNoTooltip] суперництво"
  flavor_ira.1000.desc: "У давні часи імперії [GetCountry('BYZ').GetName] та [GetCountry('ERA').GetName] неодноразово стикалися одна з одною за панування над [ShowSubContinentName('middle_east')]. І, здається, історія повторюється, оскільки [root_character.GetName] з [root_country.GetLongName] та [target_character.GetName] з [target_country.GetLongName] змагаються за один і той же географічний регіон. Відносини між нашими двома державами напружені, і це лише питання часу, коли наші армії зустрінуться на полі бою..."
  flavor_ira.1000.historical_info: "Відносини між Сефевідами та Османами були сповнені суперництва та конкуренції з самого заснування Сефевідської імперії. Релігійні конфлікти, боротьба за торгове панування на Близькому Сході та загальна загроза один одному гарантували, що жодна зі сторін не примириться з іншою. Починаючи з битви при Чалдирані у 1514 році, дві мусульманські порохові імперії мали загалом 11 війн одна проти одної, а їхнє протистояння завершилося перською перемогою у війні 1821–1823 років."
  flavor_ira.1000.a: "Це суперництво — наша спадщина..."
  flavor_ira.1000.a.tt: "Ми дозволимо більше [Concept('events', 'CONCEPT_PLACEHOLDER')|e], які ще більше антагонізують [target_country.GetName]"
  flavor_ira.1000.b: "...але це не повинно бути нашою долею."
  flavor_ira.1001.a: "Вони врешті-решт схилять коліна перед нами."
  flavor_ira.1010.title: "Повстання $qizilbash$ у [target_location.GetNameWithNoTooltip]"
  flavor_ira.1010.desc: "Зі зростанням [ShowReligionName('shia')] у регіоні [ShowRegionName('persia_region')], [root_country.Custom('GetQizilbashEstateName')] нашого сусіда, [target_country.GetLongName], здається, опиняються у все більш складних обставинах. Вони звернулися до нас із проханням про підтримку проти своїх [target_country.GetAdjectiveWithNoTooltip] володарів та звільнення [target_location.GetName] від [ShowReligionName('sunni')] панування."
  flavor_ira.1010.historical_info: "З того часу, як молодий Ісмаїл, голова Сефевідського ордену, скинув ярмо Ак-Коюнлу, щоб проголосити себе $rank_kingdom_persian_ruler_male$ Ірану в 1501 році, єресь кизилбашів зміцніла в Анатолії. Ближче до кінця правління Баязида II, $qizilbash$ повстали проти централізаційних зусиль сунітського режиму Османів. За підтримки $rank_kingdom_persian_ruler_male$ Ісмаїла, і скориставшись боротьбою за спадщину між синами Баязида, повстанці загрожували змінити хід османської історії..."
  flavor_ira.1010.a: "Підтримати [target_country.GetCulture.GetNameWithNoTooltip] $qizilbash$."
  flavor_ira.1010.b: "Залишити їх напризволяще"
  flavor_ira.1011.title: "[ShowReligionNameWithNoTooltip('shia')] повстання $qizilbash$"
  flavor_ira.1011.desc: "[root_country.Custom('GetQizilbashEstateName')], [ShowReligionAdjective('shia')] єретики, останнім часом спричиняють проблеми в [target_location.GetName]. Здається, [root_country.GetLongName] надіслала їм фінансову підтримку, щоб спровокувати повстання. Тепер ці повстанці вимагають значної автономії в [target_province.GetName] та інших землях, зайнятих цими фанатиками..."
  qizilbash_uprising: "Повстання $qizilbash$"
  flavor_ira.1011.a: "Покласти край їхній єресі раз і назавжди!"
  flavor_ira.1011.a.tt: "Кожен [ShowReligionName('shia')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [THIS.GetProvince.GetName] буде примусово навернений до [ShowReligionName('sunni')]. #Y 10%#! населення буде #R втрачено#! у процесі"
  flavor_ira.1011.b: "Ми можемо їх перечекати."
  flavor_ira.1011.c: "Піддатися їхнім вимогам."
  flavor_ira.1011.c.tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_province.GetArea.GetName] змінює [Concept('control', 'CONCEPT_PLACEHOLDER')|e] на #R -100.0%#!"
  flavor_ira.1020.title: "[root_country.GetAdjectiveWithNoTooltip] кампанія проти [target_country.GetNameWithNoTooltip]"
  flavor_ira.1020.desc: "Відносини між [root_character.GetName] та [target_character.GetName] досягли найнижчої точки. Релігійні відмінності, конфлікти щодо кордонів та загальні конкуруючі амбіції викликають велике занепокоєння між [target_country.GetName] та [root_country.GetName]. Плани кампанії проти [target_country.GetAdjectiveWithNoTooltip] земель вже розробляються..."
  flavor_ira.1020.historical_info: "Мурад III, султан, яким правили жінки, вів виснажливу війну з персами (1578–90), що сильно виснажила Імперію та змусила накласти важкі податки на громадян. Хоча війна не була марною, оскільки Персія була змушена поступитися Азербайджаном, Тифлісом та Хамаданом османам."
  flavor_ira.1020.a: "Розпалити полум'я війни!"
  flavor_ira.1020.b: "Зберегти статус-кво..."
  flavor_ira.1020.c: "Шукати примирення."
  flavor_ira.1021.a: "Продовжити війну з турками!"
  flavor_ira.1021.b: "Ігнорувати [root_country.GetAdjectiveWithNoTooltip] загрозу..."
  flavor_ira.1021.c: "Шукати дипломатичне рішення."
  flavor_ira.1100.title: "[ShowUnitDefinitionNameWithNoTooltip('a_ghilman')] [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ira.1100.desc: "Через зростання політичної влади, яку утримує [ROOT.GetCountry.GetGovernment.GetEstateName('tribes_estate')], та зростання конфліктів між ними та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [target_character.GetName] нещодавно заснував нову гілку в армії [ROOT.GetCountry.GetName]: [ShowUnitDefinitionName('a_ghilman')]. Завербовані як раби-солдати з населення наших прикордонних регіонів, вони служать «Третьою Силою» в правлячій аристократії [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ira.1100.a: "Це забезпечить стабільність нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_ira.1101.title: "Аристократичний розкол"
  flavor_ira.1101.desc: "Аристократія [target_country.GetName] подібна до будь-якої іншої: складається з членів суспільства, які володіють землею та присвячені військовим справам держави. Подібно до всіх шляхетних родин в історії, наша аристократія намагається розширити свій вплив на державу за рахунок правління [target_country.GetGovernment.GetRulerTitle], підриваючи [target_character.GetHerHis] авторитет.\n\n[origin_character.GetName] мав мудрість і передбачливість, щоб передбачити боротьбу за владу, і тому заснував [ShowUnitDefinitionNameWithNoTooltip('a_ghilman')]. Тепер під компетентним правлінням [target_character.GetName] політична влада всіх фракцій була ліквідована. Ні [target_country.GetGovernment.GetEstateName('nobles_estate')], ні [target_country.Custom('GetQizilbashEstateName')] не мають підтримки інших військових лідерів, щоб нав'язати свою волю [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_ira.1101.a: "Розділяй і володарюй."
  flavor_ira.1101.b: "Однак, можливо, нам поки що потрібен їхній вплив."
  flavor_ira.1200.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ShowReligionNameWithNoTooltip('shia')]"
  flavor_ira.1200.desc: "Занадто довго [ShowRegionName('persia_region')] залишалася розділеною, коли іноземні загарбники входили на ці землі. Хоча [target_ruler.GetName] є надзвичайно популярним [ROOT.GetCountry.GetGovernment.GetRulerTitle], міцна держава не повинна будуватися лише на особистій відданості. Шлях вперед має полягати в об'єднанні нашого народу через спільну релігійну ідентичність, відмінну від наших сусідів.\n\nХоча наразі далеко не всі наші люди ідентифікують себе як [ShowReligionAdjective('shia')] віруючі, існує багато випадків, коли [ShowReligionNameWithNoTooltip('shia')] звичаї практикувалися [ShowReligionGroupName('muslim')] народом [ROOT.GetCountry.GetName], наприклад, вшанування постаті Імама. Забезпечивши, щоб усі наші люди дотримувалися [ShowReligionNameWithNoTooltip('shia')], ми можемо створити [ROOT.GetCountry.GetAdjectiveWithNoTooltip] ідентичність, яка витримає випробування часом."
  flavor_ira.1200.a: "Наш народ буде об'єднаний своєю вірою."
  flavor_ira.1200.b: "У різноманітності також є сила."
  flavor_ira.1201.title: "Віра [ShowReligionAdjectiveWithNoTooltip('sunni')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  flavor_ira.1201.desc: "Хоча популярні [ShowReligionGroupName('muslim')] в [ROOT.GetCountry.GetName] можуть бути позитивно налаштовані до [ShowReligionName('shia')], [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] завжди були під домінуванням [ShowReligionAdjective('sunni')] віри. Для деяких з них перехід був дуже плавним, майже підозріло плавним, тоді як інші відмовлялися адаптуватися до нових порядків нашої держави."
  flavor_ira.1201.a: "Нагородити тих, хто навертається."
  flavor_ira.1201.b: "Покарати тих, хто не навертається."
  flavor_ira.1202.title: "[ShowReligionAdjectiveWithNoTooltip('shia')] Витік мізків"
  flavor_ira.1202.desc: "Минуло вже століття, як не було сильної [ShowReligionAdjective('shia')] держави ні в [ShowRegionName('persia_region')], ні деінде. З народженням нашого [ROOT.GetCountry.GetFlavorRank] та нашою прихильністю до [ShowReligionNameWithNoTooltip('shia')], зростаюча кількість [ShowReligionAdjectiveWithNoTooltip('shia')] теологів, священнослужителів та всіляких освічених людей почала стікатися до наших кордонів з усього [ShowReligionGroupName('muslim')] світу.\n\nЦе досить вдало, оскільки в наших землях бракує [ShowReligionAdjectiveWithNoTooltip('shia')] юристів, священнослужителів та чиновників, але цей поворот подій змусив багатьох [ShowReligionGroupNameWithNoTooltip('muslim')] правителів відчути себе досить загроженими нашою державою."
  flavor_ira.1202.a: "Вітаємо наших братів."
  flavor_ira.1202.a.tt: "Кожна відома [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що є [ShowReligionAdjective('shia')] або має [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowReligionAdjectiveWithNoTooltip('shia')] [Concept('dominant_religion', 'CONCEPT_PLACEHOLDER')|e], втратить [ShowBiasValue('opinion_irritated')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас"
  flavor_ira.1202.b: "Ми не можемо прийняти всіх"
  flavor_ira.1300.title: "[target_location.GetNameWithNoTooltip]"
  flavor_ira.1300.desc: "Якщо ми маємо збудувати справді [ROOT.GetCountry.GetAdjective] націю, ми мусимо створити гідну та справді [ROOT.GetCountry.GetAdjectiveWithNoTooltip] столицю. [target_location.GetName] — це старий [target_location.GetRank.GetName], розташований у серці земель [ShowRegionName('persia_region')], і він чудово пасуватиме нашим амбіціям.\n\nТалановиті архітектори з усіх наших земель готові перетворити цей старий [target_location.GetRank.GetNameWithNoTooltip] на належний символ нашої могутності. Однак це буде як коштовний, так і тривалий процес."
  flavor_ira.1300.a: "Нехай робота розпочнеться!"
  flavor_ira.1300.b: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] є столицею цієї країни."
  flavor_ira.1301.title: "[target_location.GetNameWithNoTooltip] Несф-е-Джахан"
  flavor_ira.1301.desc: "Будівництво нового [ROOT.GetCountry.GetGovernment.GetAdjective] центру в [target_location.GetName] нарешті завершено, і перед нами тепер лежить одне з найвеличніших міст світу. Починаючи з проспекту Чахар-Баг і закінчуючи великим Майданом-е Накш-е Джахан, ми тепер зібрали всі урядові установи нашого [ROOT.GetCountry.GetFlavorRank] в одному місці.\n\nЦей Майдан [target_location.GetNameWithNoTooltip] сам по собі є мікрокосмом нашого [ROOT.GetCountry.GetFlavorRank], величезною площею, заповненою прилавками купців з усіх наших земель, де домінують монументальна мечеть Масджид-е Шах, [ROOT.GetCountry.GetGovernment.GetAdjective] базар та палац Алі Капу. У процесі завершення реструктуризації міста з необхідності народилося багато нових будівельних технік, а покоління ремісників та архітекторів розвинули свої ремесла далі, ніж раніше вважалося можливим."
  flavor_ira.1301.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ira.1400.title: "Ворог мого ворога"
  flavor_ira.1400.desc: "Наше суперництво з [shared_rival.GetName] виявилося більш клопітким, ніж будь-хто міг передбачити. Будучи рівними, і не маючи шансу перевершити одне одного через війну, пропонується знайти інший спосіб обійти такі дорогі умови. На щастя, багато наших радників повідомили нам про їхні амбіції, що розгорнулися в [ShowContinentName('europe')], що зробило їх непопулярними серед тамтешніх правителів. Найсильнішим з них є [target_country.GetName], які поділяють ту ж ненависть до цих [shared_rival.GetAdjectiveWithNoTooltip] завойовників. Ми повинні спробувати зв'язатися з ними та надіслати їм делегата та кілька подарунків, а потім ми могли б належним чином створити альянс, який дозволив би нам обом знищити цього спільного суперника."
  flavor_ira.1400.a: "Надішлемо їм дипломатичну місію."
  flavor_ira.1400.b: "Ми позбудемося наших ворогів самі."
  flavor_ira.1401.title: "$flavor_ira.1400.title$"
  flavor_ira.1401.desc: "Через наше спільне суперництво з [shared_rival.GetName] до [target_country.GetCapital.GetName] прибула дипломатична місія з [target_country2.GetName], сподіваючись встановити кращий зв'язок з нами. Привізши подарунки, характерні для [target_country2.GetNameWithNoTooltip], вони сподіваються, що ми зможемо краще співпрацювати щодо конфліктів з нашим спільним суперником. Якщо ми погодимося, ми зможемо тримати [shared_rival.GetNameWithNoTooltip] під контролем, а також матимемо змогу шукати експансію деінде, не турбуючись про те, що наш суперник зосередить свої армії на нас."
  flavor_ira.1401.a: "Ми приймаємо ці зв'язки."
  flavor_ira.1401.b: "Відвідаймо [target_country2.GetAdjectiveWithNoTooltip] столицю, щоб ще більше зміцнити наші зв'язки."
  flavor_ira.1401.c: "Нам не потрібен такий союз."
  flavor_ira.1402.title: "$flavor_ira.1400.title$"
  flavor_ira.1402.desc: "Наша делегація до [target_country.GetName] була більш ніж успішною. Прагнучи зміцнити наші відносини, [target_character.GetName] надіслав делегацію до [ROOT.GetCountry.GetCapital.GetName], і вони вражені її унікальною культурою, яка відрізняється від культури [target_country.GetCapital.GetName]. Після переговорів з [target_character2.GetName], [target_country.GetName] готовий допомогти нам у будь-якому конфлікті з [shared_rival.GetName]."
  flavor_ira.1402.a: "Разом ми вийдемо переможцями!"