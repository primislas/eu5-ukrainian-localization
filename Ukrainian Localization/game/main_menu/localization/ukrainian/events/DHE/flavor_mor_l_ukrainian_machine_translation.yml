l_english:
  flavor_mor.1.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mor.1.desc: "Відомий під багатьма іменами, такими як імам [target_character.GetLastName] або шейх [target_character.GetLastNameWithNoTooltip], [target_character.GetShortNameWithNoTooltip] нещодавно здобув велику популярність завдяки [target_character.GetHerHis] великому прояву благочестя, побожності та знання священних текстів. Заявляючи про статус Шурфа як прямого нащадка Пророка, [target_character.GetSheHe] нещодавно запропонував [target_character.GetHerHis] свої вміння та послуги нам."
  flavor_mor.1.a: "Надати [target_character.GetHerHim] покровительство."
  flavor_mor.1.b: "Нам не потрібно більше бездіяльних блукачів у наших залах."
  flavor_mor.1.historical_info: "Аль-Джазулі, марокканський суфій XV століття, був ключовою фігурою в ордені Шаділія. Народившись у регіоні Сус, він навчався у Фесі та прославився завдяки «Далаїл аль-Хайрат», широко розповсюдженій збірці молитов, що закликають благословення на Пророка Мухаммеда (мир йому). Його праця залишила тривалий вплив на марокканські суфійські практики."
  flavor_mor.2.title: "Андалуські біженці"
  flavor_mor.2.desc: "[target_country.GetName] вирішила вигнати [ShowCultureName('andalusi')] народ, який все ще проживав у її межах. Велика кількість біженців прибуває до наших портів, просячи дозволу в'їхати до нашої країни. Хоча нам боляче, що цим людям довелося покинути свої домівки, це може бути благословенням для нашого [ROOT.GetCountry.GetFlavorRank].\n\nБільшість біженців – міські жителі, ремісники, вчені, художники та адміністратори. На їхніх плечах і з їхньою допомогою ми прагнутимемо піднести наш престиж і створити вічно славетне ім'я для наших прапорів."
  flavor_mor.2.a: "Вітаємо наших братів по вірі в [target_location1.GetNameWithNoTooltip]."
  flavor_mor.2.b: "Нехай вони оселяться навколо [target_location2.GetNameWithNoTooltip]."
  flavor_mor.2.c: "Лише найкращі з них можуть інтегруватися в наше суспільство."
  flavor_mor.3.title: "[target_character.GetNameWithNoTooltip] та $dalai_al_khayarat$"
  flavor_mor.3.desc: "Нещодавно повернувшись після довгого перебування в [target_location.GetName], [target_character.GetName] користується швидко зростаючою популярністю в релігійних колах нашої країни. Після повернення він представляє нам молитовник, в якому зібрав літанії, що просять [ROOT.GetCountry.GetReligion.GetGodName] благословити, виявити милосердя та доброту до Мухаммада.\n\nНа відміну від [target_character.GetLastNameWithNoTooltip] [target_character.GetHerselfHimself], книга може бути в багатьох місцях, і, враховуючи її фантастичну популярність, вона, здається, призначена пережити як [target_character.GetHerHim], так і [target_character2.GetShortName]."
  flavor_mor.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_mor.3.b: "Ми не можемо дозволити собі такі витрати."
  flavor_mor.4.title: "Прихильники Ідрісідів у [target_location.GetNameWithNoTooltip]"
  flavor_mor.4.desc: "Виконуючи давню легенду, збережене тіло Ідріса II було знайдено в одній з мечетей [target_location.GetName] кілька років тому. З того часу члени ідрісідських Шурфа стали центром зростаючого руху в [target_location.GetNameWithNoTooltip] і в нашому [ROOT.GetCountry.GetFlavorRank] загалом.\n\nЦя побожна група, здається, призначена піднести серця нашого населення своєю благочестивою поведінкою та проповідями. Однак завжди існує ризик з такими пристрасними народними рухами, як цей, їм не варто забувати, хто володіє світською владою."
  flavor_mor.4.a: "Підтримати Ідрісідів."
  flavor_mor.4.b: "Дозволити їм представництво, але без реальної офіційної підтримки."
  flavor_mor.5.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mor.5.desc: "Вплив [ROOT.GetCountry.GetGovernment.GetCourtTitle] майже повністю перебуває в руках могутніх членів [ROOT.GetCountry.GetGovernment.GetCabinetTitle] та сильних світу цього. Здобувши популярність після [target_character.GetHerHis] успішного піднесення до влади в лавах [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [target_character.GetName] забезпечив, що [ROOT.GetCountry.GetGovernment.GetAdjective] бюрократія є як добре функціонуючою, так і під [target_character.GetHerHis] твердим контролем.\n\nОскільки [ShowDynastyName('wattasid_dynasty')] пов'язані з правителями [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], це саме по собі, можливо, не є тривожним розвитком. За всіма ознаками, ми повинні радіти, що такий здібний адміністратор піднявся, щоб служити нашому народу, напевно, [target_character.GetSheHe] не прагнутиме влади для [target_character.GetHerselfHimself]..."
  flavor_mor.5.a: "Цікавий розвиток подій."
  wattasids_appear_at_court_tt: "Члени династії [ShowDynastyName('wattasid_dynasty')] з'являться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_mor.6.title: "Змова [ShowDynastyNameWithNoTooltip('wattasid_dynasty')]?"
  flavor_mor.6.desc: "Нам тепер зрозуміло, що родині [ShowDynastyName('wattasid_dynasty')] дозволили стати занадто сильною та впливовою в нашому [ROOT.GetCountry.GetFlavorRank]. Якщо ми не обмежимо їхню владу зараз, ми можемо не змогти зробити це пізніше. [target_country.Custom('GetRulerOrRegentTitle')] переконаний, що існує змова проти трону, і інші радники закликають нас діяти швидко."
  flavor_mor.6.a: "Усунути їх від влади!"
  flavor_mor.6.b: "Вони залишаються нашими довіреними радниками."
  flavor_mor.7.title: "Повстання [ShowDynastyNameWithNoTooltip('wattasid_dynasty')]"
  flavor_mor.7.desc: "Те, що було сприйнято як раптова зрада наших візирів [ShowDynastyName('wattasid_dynasty')], призвело до того, що наш [target_country.Custom('GetRulerOrRegentTitle')] наказав схопити та стратити більшість із них. Однак популярність родини [ShowDynastyNameWithNoTooltip('wattasid_dynasty')] означає, що цей крок був дуже непопулярним.\n\nКоли ми призначили нових радників, щоб служити нам, до нашої уваги дійшло, що спалахнули заворушення, і ходять чутки, що десь член [ShowDynastyNameWithNoTooltip('wattasid_dynasty')] залишається прихованим, щоб взяти під контроль це повстання, сповнений рішучості помститися за померлу родину."
  flavor_mor.7.a: "Варта, варта!"
  wattasid_rebels: "Повстанці [ShowDynastyName('wattasid_dynasty')]"
  flavor_mor.12.title: "Імперські міста"
  flavor_mor.12.desc: "Протягом своєї історії кілька великих міст мали честь бути політичним центром [ROOT.GetCountry.GetLongName]. За Ідрісидів та [ShowDynastyName('marinid_dynasty')] північне місто [ShowLocationName('fez')] було улюбленим місцем уряду, дозволяючи його правителям очолювати наступ проти своїх ворогів у [ShowRegionName('iberia_region')] та східному [ShowRegionName('maghreb_region')]. Альморавіди та Альмохади віддавали перевагу південному місту [ShowLocationName('marrakesh')], тоді як Халіф Якуб аль-Мансур намагався заснувати столицю в [ShowLocationName('rabat')]. Деякі в [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджують, що [ShowLocationName('meknes')] також може слугувати політичним центром. Будь-яке з цих міст стало б чудовою столицею для нашої нації."
  flavor_mor.12.a: "[ShowLocationNameWithNoTooltip('fez')] буде столицею."
  flavor_mor.12.a2: "[ShowLocationNameWithNoTooltip('fez')] і надалі буде нашою столицею."
  flavor_mor.12.b: "Ми оберемо [ShowLocationNameWithNoTooltip('marrakesh')]"
  flavor_mor.12.b2: "[ShowLocationNameWithNoTooltip('marrakesh')] і надалі буде нашою столицею."
  flavor_mor.12.c: "Нехай це буде [ShowLocationNameWithNoTooltip('meknes')]."
  flavor_mor.12.c2: "[ShowLocationNameWithNoTooltip('meknes')] і надалі буде нашою столицею."
  flavor_mor.12.d: "[ShowLocationNameWithNoTooltip('rabat')] матиме цю честь."
  flavor_mor.12.d2: "[ShowLocationNameWithNoTooltip('rabat')] і надалі буде нашою столицею."
  flavor_mor.13.title: "Ворушіння на Півдні"
  flavor_mor.13.desc: "Після конфлікту між династіями [ShowDynastyName('wattasid_dynasty')] та [ShowDynastyName('marinid_dynasty')] сили півдня почали ворушитися. Відчуваючи слабкість, багато членів [ShowEstateTypeName('tribes_estate')] почали формувати альянси та укладати шлюбні угоди між собою. Хоча багато хто в [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s [ROOT.GetCountry.GetGovernment.GetCourtTitle] задоволені тим, щоб залишити їх напризволяще та усамітнитися в [ROOT.GetCountry.GetCapital.GetName], загроза з півдня лише зростатиме, якщо з ними не розібратися."
  flavor_mor.13.a: "Демонстрація сили нагадає їм про їхнє місце."
  flavor_mor.13.b: "Ми повинні залишити їх у спокої."
  flavor_mor.14.title: "Бану Марін"
  flavor_mor.14.desc: "Протягом десятиліть місцеві сильні люди по всьому [ShowRegionName('maghreb_region')] покладалися на сильні та впливові племена, щоб утвердити контроль та захистити торгові шляхи. Одним із таких племен є Бану Марін. Спочатку вони виникли з попелу попередньої [ROOT.GetCountry.GetAdjective] династії та зайняли [ShowLocationName('meknes')] у 1245 році.\n\nЧерез їхнє походження з наших північно-східних територій та їхню близькість до ворожих дій між нашим народом та правителями [ShowRegionName('iberia_region')], вони колись становили значну частину нашої армії. Однак, незважаючи на їхню військову майстерність, більшу частину часу вони проводять зі своїми родинами, як пастухи великих овечих отар."
  flavor_mor.14.a: "Ми повинні їх розмістити."
  every_location_with_wool_gains_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowGoodsName('wool')], така як [target_location.GetName], отримає [ShowModifier('banu_marin_wool_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mor.14.b: "Ми не можемо покладатися на віддалені та непокірні племена."
  flavor_mor.14.historical_info: "Бану Марін, або Мариніди, були POSTEDIT_амазизьким племенем із групи POSTEDIT_Зената, спочатку жили як кочові скотарі в північно-східних горах Атлас у Марокко. Спочатку вони працювали найманцями для династії Альмохадів, але пізніше повстали та встановили власну владу в 13 столітті. Плем'я було ключовим у заснуванні династії Маринідів, яка контролювала Марокко та частини Північної Африки. Відомі своїми сильними військовими можливостями, вони значно вплинули на політичну динаміку регіону, хоча внутрішні чвари зрештою призвели до їхнього занепаду."
  flavor_mor.15.title: "Суспільна тканина [ROOT.GetCountry.GetAdjectiveWithNoTooltip] народу"
  flavor_mor.15.desc: "Бурхливі роки голоду, війн, нестабільності та спустошення, залишені попередньою династією, вже майже забуті. Попри багатьох, хто працював проти нас, ми досягли успіху в об'єднанні багатогранної спільноти племен, місцевих жителів, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та вчених під твердим керівництвом [target_character.GetName]. Вперше за століття [target_country.Custom('GetRulerOrRegentTitle')] володіє справжньою владою та впливом по всій землі."
  flavor_mor.15.a: "Ми процвітатимемо в спокої."
  flavor_mor.15.b: "Час централізувати настав!"
  flavor_mor.16.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mor.16.desc: "Широко визнаний одним із найкращих філософів світу, [target_character.GetName] запропонував нам можливість спонсорувати [target_character.GetHerHis] праці. Завдяки усталеному престижу його родини, [target_character.GetShortNameWithNoTooltip] дозволили навчатися у деяких із найвидатніших вчених у [ShowRegionName('maghreb_region')].\n\nВ результаті він досяг успіху в багатьох предметах, таких як юриспруденція, релігійне право та лінгвістика. Таке доповнення до нашої культурної сфери, безсумнівно, матиме велике значення."
  flavor_mor.16.a: "Ми спонсоруватимемо [target_character.GetHerHis] роботу."
  flavor_mor.16.b: "Краще ні..."
  flavor_mor.16.historical_info: "Ібн Хальдун був відомим арабським соціологом, філософом та істориком, визнаним одним із найвидатніших мислителів Середньовіччя, якого часто називають піонером у галузі історіографії, соціології, економіки та демографії. Його найвідоміша праця, #italic Мукаддіма#!, написана всього за шість місяців, мала глибокий вплив на пізніших істориків, які використовували її ідеї для розуміння динаміки імперій. Проводилися порівняння між теоріями Ібн Хальдуна та теоріями європейських інтелектуалів, таких як Макіавеллі, Гегель та Адам Сміт, що підкреслює його новаторський вплив. Його наукові праці продовжують формувати сучасну ісламську думку та різні академічні галузі."
  flavor_mor.17.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mor.17.desc: "Не секрет, що [ShowReligionGroupAdjective('muslim')] світ є домом для деяких із найвидатніших ерудитів, які коли-небудь благословляли наш народ. Серед них [target_character.GetName] вирізняється як видатний у багатьох своїх галузях. Великий письменник, а часом і поет з великими літературними творами, натхненними [target_character.GetHerHis] життям у [ShowRegionName('maghreb_region')], [target_character.GetSheHe] є майстром римованої прози, відомої також як садж."
  flavor_mor.17.historical_info: "Лісан аль-Дін ібн аль-Хатіб був видатним арабським ерудитом з Гранадського емірату, який відзначився як поет, письменник, історик, філософ, лікар і політик. Його відомі поеми, зокрема #italic Джадака аль-Гайту#! та #italic Лямма Бада Ятатанна#!, прикрашають стіни Альгамбри. Його головна історична праця, #italic аль-Іхата фі ахбар Гарната#!, написана в 1369 році і містить його автобіографію, залишається неперекладеною.\n\nНезважаючи на значний внесок, він пережив періоди вигнання і був страчений за єресь у 1374 році, ймовірно, через політичні конфлікти з династією Насрідів. Його поезія, відома своєю римованою прозою, черпала натхнення у східних ісламських поетів, а його трактат про чуму описував передачу хвороби через зараження, випереджаючи європейські наукові досягнення на століття."
  flavor_mor.18.title: "Змова [target_character2.GetNameWithNoTooltip]"
  flavor_mor.18.desc: "У кричущому та насильницькому кроці проти нашої влади [target_character2.GetName] виступив, щоб вимагати трон у [target_ruler.GetShortName]. Посилаючись на старість проти енергії та жагу до влади, [target_character2.GetSheHe] зібрав багатьох змовників, які бажають вигнати нинішнього [target_country.Custom('GetRulerOrRegentTitle')], щоб розпочати еру незаконних схильностей та корупції!"
  flavor_mor.18.a: "Тоді [target_character2.GetSheHe] втратить [target_character2.GetHerHis] голову."
  flavor_mor.18.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  marinid_pretender_rebels: "POSTEDIT_Маринідські повстанці"
  no_head_of_cabinet_tt: "Відсутність [Concept('head_of_the_cabinet', 'CONCEPT_PLACEHOLDER')|e] призводить до наступного:"
  flavor_mor.19.title: "Влада в чужих руках"
  flavor_mor.19.desc: "Повільний занепад авторитету та величі помічається лише тоді, коли вже надто пізно. Так сталося з [target_character.GetName], чиї невдалі спроби приборкати владу наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] призвели до того, що вони повністю захопили кожен важливий аспект нашого уряду..."
  flavor_mor.19.a: "На жаль, що ми можемо зробити?"
  resisting_viziership_lowers_requirements_to_repeal: "Опір автократичним тенденціям наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] у #Y наступних подіях#! знизить вимоги для видалення цієї [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mor.20.title: "Політичні династії"
  flavor_mor.20.desc: "Відтоді, як наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] захопили владу, зростає кількість титулів та посад, що передаються між ними. Передача влади залишила [target_character2.GetName] безсилим протистояти тиранічним тенденціям цих впливових чоловіків. Цю образу нашої влади не можна ігнорувати.\n\nНіхто інший, як [target_character.GetName], який є останнім [target_character.Custom('GetCharacterCabinetTitle')], хто намагався зробити такий крок, викриває величезні та критичні проблеми, які створили [target_character.GetSheHe] та [target_character.GetHerHis] однолітки."
  flavor_mor.20.a: "Що таке ще одна посада?"
  flavor_mor.20.b: "Вони забувають своє місце!"
  easier_to_repeal_viziership_tt: "Скасування [ShowGovernmentReformName('powerful_vizierships_reform')] вимагатиме менше [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mor.21.title: "Привілейовані Вимоги"
  flavor_mor.21.desc: "Добре відомо, що [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] мають значну владу та вплив через численних [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Через цих людей, що куплені та оплачені, вони вимагають нових привілеїв та розширення свого впливу в нашому володінні."
  flavor_mor.21.a: "Ми мусимо підкоритися..."
  flavor_mor.21.b: "Ніколи!"
  flavor_mor.22.title: "Економіка [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_mor.22.desc: "Дія знімання монет з кожної податкової поставки стала свого роду звичаєм відтоді, як [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] здобули справжню владу за спиною [target_character.GetName]. Їхня остання спроба порушити важко зароблені доходи нашого [ROOT.GetCountry.GetFlavorRank] є черговим зниженням податків для їхніх однолітків та спонсорів серед них."
  flavor_mor.22.a: "Вони це заслужили?"
  flavor_mor.22.b: "Вони забувають, кому служать!"
  flavor_mor.22.c: "Пожертва заспокоїла б їх..."
  flavor_mor.23.title: "Змова [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_mor.23.desc: "На превеликий жаль багатьох могутніх [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], останні спроби схилити баланс сил на користь [target_country.Custom('GetRulerOrRegentTitle')] зустріли беззаперечний опір. За зачиненими дверима, тіньовими угодами та підступами робляться кроки, щоб забезпечити [target_character.GetName] передчасну загибель, під керівництвом [target_character2.GetName], перш ніж [target_character.GetSheHe] поверне владу від цих голодних стерв'ятників."
  flavor_mor.23.a: "Цей клятий зрадник, [target_character2.GetShortNameWithNoTooltip]!"
  flavor_mor.24.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mor.24.desc: "Відомий(-а) своєю великою побожністю та увагою до [ShowReligionGroupAdjective('muslim')] дисциплін, [target_character.GetName] здобув(-ла) собі ім'я як великий(-а) духовний(-а) лідер(-ка) у нашому володінні. Походячи з міста поблизу скелястих гір [ShowLocationName('eastern_anti_atlas')], [target_character.GetSheHe] зібрав(-ла) багато послідовників навколо своєї завії, де [target_character.GetSheHe] говорить про містичні вчення. Нам вирішувати, чи бажаємо ми мати таких людей, як [target_character.GetHerHim], у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_mor.24.a: "[target_character.GetSheHe|U] є найбажанішим(-ою)!"
  flavor_mor.24.b: "Ми не потребуємо більше священнослужителів."
  flavor_mor.25.title: "Кончина [target_character.GetNameWithNoTooltip]"
  flavor_mor.25.desc: "Зі сльозами на очах та великим болем послідовники [target_character.GetName] відвідали [target_location.GetName], щоб вшанувати свого великого вчителя невдовзі після того, як [target_character.GetSheHe] відійшов(-ла) у вічність. Його/Її місце спочинку привабило стільки паломників, що місцеві жителі вирішили подати прохання про заснування належного святого місця на честь його/її пам'яті."
  flavor_mor.25.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_mor.25.b: "Ми не можемо собі цього дозволити."
  flavor_mor.26.title: "Видіння [target_character.GetShortNameWithNoTooltip]"
  flavor_mor.26.desc: "Протягом багатьох безсонних ночей [target_character.GetName] боровся(-лася) зі снами, які [target_character.GetSheHe] не міг(-могла) пояснити. Щоб вгамувати його/її неспокій, [target_character.GetShortNameWithNoTooltip] шукав(-ла) тлумачення у суфійського шейха. Сни були різними, але всі мали однаковий висновок. Проходячи крізь прекрасне місто, що кишіло заможними людьми, його центральна вежа була оздоблена мармуром та золотом. [target_character.GetSheHe|U] побачив(-ла) двох левів, що входили до вежі, супроводжувані натовпом людей.\n\nВчений надав два пояснення цих видінь. В одному випадку це є знаком благословення [ROOT.GetCountry.GetReligion.GetGodName], чітким свідченням побожності [target_character.GetShortNameWithNoTooltip]. Інше тлумачення зображує [target_child1.GetName] та [target_child2.GetName] як двох левів, знак їхньої майбутньої величі..."
  flavor_mor.26.a: "[target_character.GetShortNameWithNoTooltip] поведе нас до величі."
  flavor_mor.26.b: "Левам довірено майбутнє нашого народу."
  flavor_mor.27.title: "Справедлива оборона [GetCountry('TUN').GetLongNameWithNoTooltip]"
  flavor_mor.27.desc: "Відколи наш дорогий правитель [ruler_scope.GetName] одружився з принцесою [GetCharacter('tun_fatimah').GetName] з [ShowDynastyName('hafsid_dynasty')], між двома династіями було укладено союз.\n\nНехтуючи цим союзом, у 1335 році мерзенна [GetCountry('TLE').GetLongName] наважилася турбувати наших [GetCountry('TUN').GetAdjective] союзників. У відповідь наші хоробрі воїни відгукнулися на заклик до війни та атакували [GetCountry('TLE').GetNameWithNoTooltip] із Заходу, змусивши їх відступити та захищати свою столицю [tle_capital_scope.GetName], поки наші сили облягали її.\n\nТепер, через два роки, облогу було призупинено, поки [ruler_scope.GetNameWithNoTooltip] придушував повстання, спровоковане його бунтівним братом.\n\nНастав час повернутися на фронт і покінчити із загрозою [GetCountry('TLE').GetNameWithNoTooltip]."
  flavor_mor.27.a: "До зброї!"
  flavor_mor.28.title: "Бунтівний син"
  flavor_mor.28.desc: "Син нашого правителя [usurper_scope.GetName], який до цього моменту керував новими землями, завойованими в [ShowAreaNameWithNoTooltip('algiers_area')], скористався нашою відсутністю в столиці під час поточної кампанії, щоб поспішити до нашої столиці [capital_scope.GetName] і оголосив себе [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nВін звинувачує нас у тому, що ми покинули наш народ на війну та голод, і вимагає, щоб ми визнали його сходження на престол."
  flavor_mor.28.a: "Повернутися до столиці!"
  flavor_mor.28.b: "Прийняти вимоги [usurper_scope.GetNameWithNoTooltip]"
  abu_inan_faris_rebels: "Прихильники Абу Інана Фаріса"
  flavor_mor.29.title: "Доля мінлива"
  flavor_mor.29.desc: "Всупереч будь-якому розуму чи справедливості, зрада [usurper_scope.GetName] отримала незаслужену нагороду.\n\nНаш славетний правитель [ruler_scope.GetName] на жаль помер, не встигнувши придушити повстання свого сина, який не гаяв часу на стабілізацію та закріплення своєї влади та позиції.\n\nЧи призведе ця незаконно здобута влада до майбутньої стабільності, чи це ознаменує початок падіння династії [ShowDynastyName('marinid_dynasty')]?"
  flavor_mor.29.a: "Час покаже."
  flavor_mor.30.title: "Хоробрий первісток"
  flavor_mor.30.desc: "Жах огортає нашу країну.\n\nУлюблений і шанований [heir_scope.GetName] зустрів передчасний кінець, виконуючи свій обов'язок на службі [ROOT.GetCountry.GetName].\n\nЙого пам'ять і приклад будуть направляти молодих солдатів нашої країни протягом поколінь."
  flavor_mor.30.historical_info: "Абу Малік Абд аль-Вахід, спадкоємець султана Маринідів, потрапив у засідку в 1339 році кастильськими військами, повертаючись з рейду до прикордонного міста Херес-де-ла-Фронтера, його люди були вирізані, а сам він був убитий, намагаючись втекти."
  flavor_mor.30.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_mor.30.b: "Нація оплакуватиме його разом."
  flavor_mor.31.title: "Створення [ShowBuildingTypeNameWithNoTooltip('guich_garrison')]"
  flavor_mor.31.desc: "Численні племена [ShowCultureGroupName('amazigh_group')] виявилися чудовими союзниками для [ROOT.GetCountry.GetName]. Розміщені в кількох наших поселеннях, вони допомагали захищати їх від будь-яких внутрішніх і зовнішніх загроз. Можливо, ми зможемо створити спеціальні гарнізони для племен Джайш, щоб ще більше зміцнити ці укріплення."
  flavor_mor.31.a: "Давайте їх створимо."
  flavor_mor.31.b: "Ми не довіряємо їм таку життєво важливу роль."
  flavor_mor.32.title: "Покращення $ben_youssef_mosque$"
  flavor_mor.32.desc: "Будучи найважливішою мечеттю в [target_location.GetName], $ben_youssef_mosque$ занепадала. Потребуючи значних змін як в інтер'єрі, так і в екстер'єрі, [target_character.GetName] думав про її реновацію. Це не тільки допомогло б споруді, але й принесло б більше процвітання всьому [target_location.GetRank.GetName]."
  flavor_mor.32.a: "Ми її покращимо."
  flavor_mor.32.b: "Вона в хорошому стані."
  flavor_mor.33.title: "Палац Ель-Баді"
  flavor_mor.33.desc: "Під час правління [target_character.GetName] [target_character.GetSheHe] планував(-ла) створити палац, щоб продемонструвати свою перевагу над [target_character.GetHerHis] ворогами. Бажаючи використовувати матеріали від [ShowRegionName('italy_region')] до [ShowRegionName('guinea_region')], [target_character.GetSheHe] уявляє його як найблискучіший палац у всьому світі. Хоча це досить важке завдання, можливо, ми зможемо докласти до цього зусиль."
  flavor_mor.33.a: "Ми докладемо всіх зусиль, щоб виправдати очікування."
  flavor_mor.33.b: "Ми не будемо реалізовувати цей проєкт."
  flavor_mor.33.c: "Зробімо його найвеличнішим палацом у світі."
  flavor_mor.34.title: "Піднесення династії [ShowDynastyNameWithNoTooltip('saadi_dynasty')]"
  flavor_mor.34.desc: "Через нестабільність у [ROOT.GetCountry.GetName] багато людей почали вважати [target_character2.GetName] слабким(-ою) [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Тепер вони гуртуються навколо незначного члена [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], відомого як [target_character.GetName]. Бажаючи повалити режим під керівництвом [target_character2.GetNameWithNoTooltip], [target_character.GetSheHe] обіцяє мир, свободу, справедливість і безпеку [target_character.GetHerHis] новому(-ій) [ROOT.GetCountry.GetFlavorRank]."
  flavor_mor.34.a: "Давайте замінимо [target_character2.GetNameWithNoTooltip]."
  flavor_mor.34.b: "[target_character.GetHerHis|U] новий(-а) [ROOT.GetCountry.GetFlavorRank]?"
  flavor_mor.35.title: "Піднесення [ShowReligiousSchoolNameWithNoTooltip('isawiyya_school')]"
  flavor_mor.35.desc: "Вплив суфіїв у [ROOT.GetCountry.GetName] призвів до створення, можливо, однієї з наймістичніших шкіл. Відома як [ShowReligiousSchoolName('isawiyya_school')], вона тепер поширює свій вплив у [ROOT.GetCountry.GetFlavorRank]."
  flavor_mor.35.a: "Більше релігійних шкіл для конфлікту."
  flavor_mor.35.b: "Ми зацікавлені."
  mor_unlock_isawiyya_school_tt: "Відкриває [Concept('religious_school', 'CONCEPT_PLACEHOLDER')|e] [ShowReligiousSchoolName('isawiyya_school')]"
  flavor_mor.36.title: "Повернення [ShowLocationNameWithNoTooltip('cordoba')]"
  flavor_mor.36.desc: "З перемогою наших армій у [ShowRegionName('iberia_region')] ми досягли нашої мети в цій кампанії. Тепер, коли з'явився проблиск надії на відновлення $ADU$ та повернення [ShowReligionGroupAdjective('muslim')] правління в регіоні, ми повинні вимагати підкорення наших союзників, яким ми допомогли в цьому кривавому конфлікті."
  flavor_mor.36.a: "Нехай вони схиляться перед своїми господарями."
  flavor_mor.37.title: "Вимога від [prev_country.GetNameWithNoTooltip]"
  flavor_mor.37.desc: "Завдяки допомозі [prev_country.GetName] у відбитті наших ворогів у [ShowRegionName('iberia_region')], вони тепер нагадують нам про наш борг. Вимагаючи, щоб ми стали їхнім суб'єктом, схоже, вони не відступлять, доки ми не виконаємо ці вимоги."
  flavor_mor.37.a: "Ми дали обіцянку."
  flavor_mor.37.b: "Наша незалежність буде збережена!"
  mor_demand_granada_submission_tt: "Ми вимагатимемо анексії [target_country.GetName]"
  flavor_mor.38.title: "[target_country.GetNameWithNoTooltip] Непокірний(-а)"
  flavor_mor.38.desc: "Схоже, [target_country.GetGovernment.GetRulerTitle] [target_country.GetName] вирішив(-ла) відхилити нашу волю. Тепер вони стоять на нашому шляху до відновлення $ADU$, бажаючи захистити свою незалежність."
  flavor_mor.38.a: "Вони збережуть свободу лише у своїх могилах!"
  flavor_mor.38.b: "Ми ще не готові."
  mor_deny_submission_may_lead_to_war_tt: "Відмова від цього призведе до війни з [prev_country.GetName]"
  flavor_mor.1000.title: "Найм [target_country.GetAdjectiveWithNoTooltip] найманців"
  flavor_mor.1000.desc: "Наші союзники в [target_country.GetName] процвітали, будучи великою державою на світовій арені. Багато їхніх завзятих воїнів тепер бажають приєднатися до нас. Однак, щоб це сталося, ми повинні не тільки надати їм фінансову допомогу, але й отримати підтримку від їхнього [target_country.GetGovernment.GetRulerTitle]."
  flavor_mor.1000.a: "Давайте вести переговори."
  flavor_mor.1000.b: "Запрошення чужинців до нашого війська неминуче призведе до лиха."
  mor_they_must_accept_offer_tt: "[target_country.GetName] має прийняти нашу пропозицію, щоб ефекти набули чинності"
  mor_no_ottoman_mercs_tt: "Ми не будемо просити [target_country.GetName] про [Concept('mercenaries', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mor.1001.title: "$flavor_mor.1000.title$"
  flavor_mor.1001.desc: "[prev_country.GetName] повідомило нам, що частина наших військових бажає приєднатися до них, слугуючи шукачами удачі в їхній армії. Вони не тільки погодилися оплатити їхню службу, але й надати нам додаткове золото, щоб ще більше переконати нас дозволити цим чоловікам вирушити до [prev_country.GetCapital.GetName] як солдатам."
  flavor_mor.1001.a: "Усе для наших союзників!"
  flavor_mor.1001.b: "Вони залишаються в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_mor.1100.title: "Посилення виробництва [ShowGoodsNameWithNoTooltip('sugar')]"
  flavor_mor.1100.desc: "Через зростання попиту на [ShowGoodsName('sugar')] у [ROOT.GetCountry.GetName], [target_character.GetName] запропонував нам купити [ShowGoodsName('slaves_goods')] у [target_country.GetName]. Пропонується, що вони працюватимуть на плантаціях у [target_location2.GetName], щоб збільшити його виробництво. Звісно, усе це залежить від того, чи [target_country.GetGovernment.GetRulerTitle] у [target_country.GetNameWithNoTooltip] вважатиме це взаємовигідним."
  flavor_mor.1100.a: "Давайте надішлемо їм пропозицію."
  flavor_mor.1100.b: "Натомість ми знайдемо інших людей для поневолення."
  mor_no_slave_purchase_tt: "Ми не будемо купувати [ShowGoodsName('slaves_goods')] у [target_country.GetName]"
  flavor_mor.1101.title: "$flavor_mor.1100.title$"
  flavor_mor.1101.desc: "[prev_country.GetGovernment.GetRulerTitle] [prev_country.GetName], [target_character.GetName], запропонував нам надіслати їм [ShowGoodsName('slaves_goods')] з [target_location.GetProvinceDefinition] на їхні землі за велику суму грошей. Їхні наміри полягають у збільшенні виробництва [ShowGoodsName('sugar')]."
  flavor_mor.1101.a: "Взаємовигідна торгівля."
  flavor_mor.1101.b: "Вони не матимуть наших рабів."
  flavor_mor.1200.title: "Відновлення $ADU$"
  flavor_mor.1200.desc: "З самого початку Реконкісти [ShowReligionGroupAdjective('muslim')] панування над [ShowRegionName('iberia_region')] занепадало. Тепер, коли такі важливі місця, як [ShowLocationName('cordoba')], перебувають під [target_country2.GetAdjective] правлінням, [target_character.GetName] розмірковував про початок експедиції та повернення тамтешніх земель. За підтримки [target_character2.GetName] ми потенційно можемо не тільки відновити $ADU$, але й загасити цей хрестоносний дух в ім'я [ROOT.GetCountry.GetReligion.GetGodName]!"
  flavor_mor.1200.a: "Давайте заручимося підтримкою [target_country.GetNameWithNoTooltip]."
  flavor_mor.1200.b: "Ця експедиція того не варта."
  mor_reclaiming_corduba_and_most_of_andalucia_will_allow_us_to_request_vassalization_of_granada_tt: "Якщо нам вдасться володіти [ShowLocationName('cordoba')] та #Y 80%#! [AreaName('andalusia_area')] після перемоги у [Concept('war', 'CONCEPT_PLACEHOLDER')|e], ми зможемо стати $ADU$ і вимагати анексії [target_country.GetName]"
  mor_send_offer_to_granada_for_war_against_castile: "Ми надішлемо пропозицію [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] до [target_country.GetName]"
  flavor_mor.1201.title: "$flavor_mor.1200.title$"
  flavor_mor.1201.desc: "[target_character.GetName] з [prev_country.GetName] запропонував нам союз, щоб повернути старі [ShowReligionGroupAdjective('muslim')] місця в південному [ShowRegionName('iberia_region')], такі як [ShowLocationName('cordoba')]."
  flavor_mor.1201.a: "Ми приєднаємося до їхньої кампанії."
  flavor_mor.1201.b: "Чи можна їм взагалі довіряти?"