l_english:
  flavor_jap.1.title: "Закон [ShowPolicyNameWithNoTooltip('sakoku_enabled')]"
  flavor_jap.1.desc: "Наше рішення ізолюватися від світу через [ShowPolicyName('sakoku_enabled')] досі успішно полегшувало нам контроль над населенням. Однак очевидно, що ми перешкоджаємо поширенню нових ідей та винаходів. Оскільки світ навколо нас починає глобалізуватися, ми бачимо, як наші сусіди отримують вигоду від цього контакту з іншими націями, тоді як ми залишаємося боротися. Можливо, настав час переглянути нашу політику?"
  flavor_jap.1.a: "Продовжувати дотримуватися закону [ShowPolicyNameWithNoTooltip('sakoku_enabled')]."
  flavor_jap.1.b: "Відмовитися від закону [ShowPolicyNameWithNoTooltip('sakoku_enabled')]."
  flavor_jap.2.title: "Ранґаку"
  flavor_jap.2.desc: "[target_country.GetAdjective] купці вже деякий час присутні на острові Дедзіма в [target_location.GetName], і контакт між нашим народом та анклавом суворо контролювався. Попри це, наші дві культури не можуть не помічати проблисків одна одної. [target_country.GetAdjectiveWithNoTooltip] люди, здається, знають те, чого не знаємо ми, особливо в медицині, а також у науці, виробництві та машинобудуванні. Деякі з наших багатших громадян навіть вирішили скористатися послугами [target_country.GetAdjectiveWithNoTooltip] хірурга в анклаві, замість того, щоб покладатися на місцевих лікарів.\n\nОчевидно, що можна багато чого навчитися від посиленої взаємодії з цими відвідувачами із Заходу, якщо ми готові ризикнути відкрити їм наші провінції трохи більше."
  flavor_jap.2.a: "Відкрити наші провінції для [target_country.GetAdjectiveWithNoTooltip] знань."
  flavor_jap.2.a.tt: "Розблоковує [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('jap_rangaku')]"
  flavor_jap.2.b: "Тримати наші провінції закритими."
  flavor_jap.3.title: "Розбитий західний корабель"
  flavor_jap.3.desc: "Корабель досяг берегів [target_location.GetName] після довгої та важкої подорожі через те, що екіпаж називає #italic Магеллановою протокою#!. #italic Де Ліфде#!, очевидно, є єдиним кораблем, що залишився з групи п'яти, і на ньому лише 24 хворих і вмираючих чоловіків із початкового екіпажу понад сотні, причому менше 10 здатні стояти.\n\nЙого багатий вантаж західних диковин та військового спорядження зберігся набагато краще, ніж його екіпаж, і повинен коштувати чимало. Більше того, один із тих, хто вижив, навігатор на ім'я [target_character.GetName], наполягає, щоб [target_character.GetSheHe] був доставлений до нашого «короля»..."
  flavor_jap.3.historical_info: "Вільям Адамс був першим англійцем, який досяг Японії. Після служби під керівництвом сера Френсіса Дрейка під час війни з Іспанією він приєднався до Голландської Ост-Індської компанії в експедиції через Магелланову протоку, яка після багатьох труднощів зуміла прибути до Японії. Його та його другого помічника Яна Йостена відправили до Токуґави Ієясу, і вони вступили до нього на службу, отримавши звання хатамото, високий ранг самурая, і дозвіл носити два мечі. Адамс взяв ім'я Міура Андзін і отримав територію Міура. Він керував будівництвом перших японських кораблів західного зразка, а також різними торговими та дипломатичними місіями між Японією та Європою."
  flavor_jap.3.a: "Допомогти іноземцям."
  flavor_jap.3.b: "Нічого не робити."
  flavor_jap.3.c: "Ми очікуємо [target_character.GetHerHis] прибуття."
  flavor_jap.3.c.tt: "[target_country.GetName] вирішить, що робити з [target_character.GetName]."
  flavor_jap.4.title: "$flavor_jap.3.title$"
  flavor_jap.4.desc: "$flavor_jap.3.desc$"
  flavor_jap.4.a: "[target_character.GetSheHe|U] — видатна особистість."
  flavor_jap.4.b: "Відправити [target_character.GetHerHim] до [GetCountry('JAP').GetGovernment.GetAdjective] [GetCountry('JAP').GetGovernment.GetCourtTitle]."
  flavor_jap.5.title: "[target_character.GetNameWithNoTooltip]"
  flavor_jap.5.desc: "[target_country.GetLongName] виконали свій обов'язок і відправили [target_character.GetName] до нас, як [target_character.GetSheHe] просив. Тепер ми бачимо, що [target_character.GetSheHe] — видатна особистість, з величезними знаннями про світ і море. [target_character.GetSheHe|U] безсумнівно буде нам дуже корисним, якщо ми візьмемо [target_character.GetHerHim] під своє крило."
  flavor_jap.5.a: "[target_character.GetSheHe|U] буде чудовим доповненням при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_jap.5.b: "Цікавинка, але ми не маємо потреби в [target_character.GetHerHim]."
  flavor_jap.6.title: "Кірішітан"
  flavor_jap.6.desc: "Торговці, яких ми вітали, лише посилювали свою присутність у нашій країні. Разом із цим вони привезли [ShowReligionAdjective('catholic')] місіонерів, підтриманих їхніми рідними державами, які негайно почали поширювати [ShowReligionGroupName('christian')] і масово навертати місцеве населення. Якщо їх не зупинити, ці єзуїти, францисканці та домініканці можуть становити значну загрозу для [ShowReligionName('shinto')]."
  flavor_jap.6.a: "Зупинити місіонерів!"
  flavor_jap.6.a.tt: "Багато наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ShowReligionName('catholic')] і втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_jap.6.b: "Нехай поширюють свою віру."
  flavor_jap.7.title: "[ShowLawNameWithNoTooltip('jap_buke_shohatto')]"
  flavor_jap.7.desc: "Феодальні лорди не виконали свого обов'язку, і настав час переконатися, що вони знають свої обов'язки. [ShowLawName('jap_buke_shohatto')] або «Різні пункти законів для будинків воїнів» є відповіддю на це у формі серії едиктів, розроблених для ілюстрації обов'язків та поведінки самураїв. Це має розглядатися як кодекс поведінки, простий опис того, до чого повинен прагнути ідеальний самурай. Таким чином, ідея полягає в тому, що самураї самі хочуть їх дотримуватися, а не ми змушуємо їх."
  flavor_jap.7.a: "Застосувати [ShowLawNameWithNoTooltip('jap_buke_shohatto')] для всього [GetUniqueInternationalOrganization('japanese_shogunate').GetNameWithNoTooltip]."
  flavor_jap.7.b: "Кодекс — це скоріше настанови, ніж справжні правила."
  flavor_jap.7.c: "Ігнорувати це."
  flavor_jap.8.title: "[ShowLawNameWithNoTooltip('jap_buke_shohatto')]"
  flavor_jap.8.desc: "[target_character.GetName] видав збірку едиктів під назвою [ShowLawName('jap_buke_shohatto')] або «Різні пункти законів для будинків воїнів». Це серія едиктів, нотаток про те, як повинні поводитися самураї та якими мають бути їхні обов'язки. Серед них перераховуються бойові практики та мистецтва, якими повинен займатися клас воїнів, а також дії, яких слід уникати. Він також надає настанови щодо належної поведінки $daimyo$, встановлюючи, що дозволено, а що ні в їхніх володіннях."
  flavor_jap.8.a: "Це лише настанови."
  flavor_jap.9.title: "Гокайдо"
  flavor_jap.9.desc: "Щоб посилити наш контроль над [GetUniqueInternationalOrganization('japanese_shogunate').GetName], ми повинні контролювати рух п'ятьма централізовано керованими дорогами, що з'єднують нашу столицю із зовнішніми провінціями. На П'яти Шляхах або Гокайдо будуть встановлені поштові станції вздовж найбільш використовуваних маршрутів, де мандрівники зможуть відпочити та придбати припаси."
  flavor_jap.9.historical_info: "Гокайдо були п'ятьма основними магістралями в Японії періоду Едо, що з'єднували важливі міста та регіони країни. Ці дороги відігравали вирішальну роль у торгівлі, комунікації та переміщенні людей. Інфраструктура Гокайдо значно сприяла економічному та культурному розвитку Японії в цей період."
  flavor_jap.9.a: "Заснувати Гокайдо."
  flavor_jap.9.b: "У цьому немає потреби."
  flavor_jap.10.title: "Реформи Кьохо"
  flavor_jap.10.desc: "[target_character.GetName] було подано пропозицію щодо «Реформ Кьохо» — комплексу економічних політик, спрямованих на забезпечення фінансової платоспроможності [ROOT.GetCountry.GetLongName]. Оскільки конфуціанські принципи певною мірою вкорінені в нашому уряді, і оскільки вони стверджують, що гроші оскверняють, буде необхідно відкласти деякі з цих принципів, якщо вони перешкоджатимуть процесу реформ. Реформи включають формування купецьких гільдій, що дозволить посилити контроль і оподаткування, а також наголошує на ощадливості."
  flavor_jap.10.a: "Ми реформуємо торгівлю."
  flavor_jap.10.b: "Військо потребує реформ."
  flavor_jap.10.c: "Дотримуватися початкових, економічних реформ."
  flavor_jap.11.title: "Генроку"
  flavor_jap.11.desc: "Це наш новий Золотий Вік. Роки внутрішнього миру в [ROOT.GetCountry.GetLongName] створили економічну стабільність. Мистецтво та архітектура процвітають, добробут поширюється по всій землі, а наші найяскравіші уми досягають значних проривів у технологіях та філософії."
  flavor_jap.11.a: "Це наш час!"
  flavor_jap.12.title: "Кокуґаку"
  flavor_jap.12.desc: "Панівне вивчення [ShowCultureGroupName('chinese_group')], конфуціанських та [ShowReligionGroupAdjective('buddhist')] текстів призвело до занепаду [ShowCultureGroupName('japanese_group')] студій. Кілька вчених почали досліджувати ранні [ShowCultureGroupNameWithNoTooltip('japanese_group')] класичні твори, критикуючи репресивну моралізацію конфуціанських мислителів та намагаючись відновити [ShowCultureGroupNameWithNoTooltip('japanese_group')] культуру до напливу іноземних способів мислення та поведінки. Вони називають себе Кокуґаку, або мислителями «Національного дослідження»."
  flavor_jap.12.a: "Ми охоче підтримаємо цих мислителів."
  flavor_jap.13.title: "$kakitsu_treaty$"
  flavor_jap.13.desc: "Нальотчики та пірати заробляють на грабуванні торгових шляхів, оскільки це для них вигідніше, ніж чесна торгівля. Щоб обмежити їхню діяльність, посланці з [target_kor.GetName] прибули до нас, пропонуючи підписати договір, який надасть нам преференційні торгові права з ними. Підписавши договір, ми відкриємо їхні порти для наших купців, але нам доведеться допомогти їм боротися з піратством у регіоні."
  flavor_jap.13.historical_info: "Договір Какіцу, також званий Договором Кєхе, був підписаний у 1443 році між династією Чосон Кореї та Со Садаморі з клану Со з Цусіми. Договір став результатом вторгнення корейських військ на Цусіму в спробі придушити піратство, що розвинулося там і постійно загрожувало торгівлі навколо Корейського півострова. Со Садаморі запропонував договір, щоб встановити фіксовану кількість суден, яким буде дозволено торгувати з Кореєю, і таким чином дозволити клану Со монополізувати цю торгівлю."
  flavor_jap.13.a: "Підписати договір."
  flavor_jap.13.b: "Цей договір не на нашу користь."
  kakitsu_treaty: "Договір Какіцу"
  flavor_jap.101.title: "Проголошення [our_ruler.GetNameWithNoTooltip] як [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_jap.101.desc: "Після повалення [go_daigo.GetName] [our_ruler.GetName] встановив [our_ruler.GetHerselfHimself] як [ROOT.GetCountry.GetGovernment.GetRulerTitle] та заснував [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] як наступника правління Камакури. Хоча [go_daigo.GetNameWithNoTooltip] втік до [ShowLocationName('yoshino')], [koumyou.GetName] був піднесений на місце [go_daigo.GetNameWithNoTooltip] і офіційно санкціонував правління [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] з [our_ruler.GetNameWithNoTooltip] на чолі. Хоча більшість кланів підтримують [our_ruler.GetNameWithNoTooltip], у тіні шипляться ті, хто прагне відновити [go_daigo.GetNameWithNoTooltip] як імператора."
  flavor_jap.101.a: "[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] поведе [ShowRegionNameWithNoTooltip('japan_region')] у цю нову еру!"
  flavor_jap.102.title: "Призначення [kou_no_moronao.GetNameWithNoTooltip]"
  flavor_jap.102.desc: "Шукаючи видатних осіб для допомоги у стабілізації [ShowRegionName('japan_region')] династією [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] та подальшому обмеженні влади [GetCountry('STC').GetName], [our_ruler.GetName] призначив [kou_no_moronao.GetName] на посаду #italic Шіцудзі#!. Хоча близькі прихильники при [ROOT.GetCountry.GetGovernment.GetCourtTitle] підтримують [our_ruler.GetNameWithNoTooltip], інші тихіше висловлюють невдоволення [kou_no_moronao.GetNameWithNoTooltip], побоюючись, що [kou_no_moronao.GetHeShe] може порушити поточний розподіл влади у внутрішній політиці [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_jap.102.a: "Надати йому посаду Шіцудзі!"
  flavor_jap.102.b: "Уникнути посилення [kou_no_moronao.GetNameWithNoTooltip]."
  flavor_jap.102.b_tt: "Посада Шіцудзі залишиться вакантною, щоб уникнути політичних чвар."
  jap_should_ko_clan_accept: "Якщо [GetCountry('KOU').GetName] погодиться, ми отримаємо такі переваги:"
  jap_should_ko_clan_decline: "Якщо [GetCountry('KOU').GetName] відмовиться, ми натомість отримаємо такі переваги:"
  jap_random_court_official_becomes_shitsuji: "Аполітичний чиновник з-поза [ROOT.GetCountry.GetGovernment.GetCourtTitle] стане Шіцудзі."
  flavor_jap.103.title: "Спроба вбивства [kou_no_moronao.GetNameWithNoTooltip]"
  flavor_jap.103.desc: "Коли [kou_no_moronao.GetName] був спочатку призначений Шіцудзі, деякі при [ROOT.GetCountry.GetGovernment.GetCourtTitle] були досить незадоволені, вважаючи [kou_no_moronao.GetName] фігурою, яка зруйнує структуру [ROOT.GetCountry.GetGovernment.GetCourtTitle]. З часом багато з цих побоювань справдилися, і новини навколо [ROOT.GetCountry.GetCapital.GetName] свідчать, що [kou_no_moronao.GetNameWithNoTooltip] пережив замах на [kou_no_moronao.GetHisHer] життя вночі!\n\nВинуватцем замаху виявився не хто інший, як [ask_tadayoshi.GetName], один з найзапекліших політичних суперників [kou_no_moronao.GetShortNameWithNoTooltip] при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_jap.103.a: "Усунути [ask_tadayoshi.GetNameWithNoTooltip] з [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_jap.103.b: "Пощадити [ask_tadayoshi.GetNameWithNoTooltip] поки що."
  flavor_jap.103.c: "Усунути [kou_no_moronao.GetNameWithNoTooltip] та призначити [ask_tadayoshi.GetNameWithNoTooltip] Шіцудзі."
  flavor_jap.104.title: "[ask_tadayoshi.GetNameWithNoTooltip] переходить на бік [GetCountry('STC').GetLongNameWithNoTooltip]"
  flavor_jap.104.desc: "Хоча [our_ruler.GetName] вигнав [ask_tadayoshi.GetName] з [ROOT.GetCountry.GetGovernment.GetCourtTitle] за спробу вбивства [kou_no_moronao.GetName], [ask_tadayoshi.GetHeShe] все ж вдалося зберегти політичних союзників. Будучи вкрай незадоволеним продовженням правління [our_ruler.GetNameWithNoTooltip], [ask_tadayoshi.GetNameWithNoTooltip] втік з [ROOT.GetCountry.GetCapital.GetName] разом зі [ask_tadayoshi.GetHisHer] прихильниками до [GetCountry('STC').GetLongName], щоб підтримати [stc_ruler.GetName]. Знаючи [ask_tadayoshi.GetNameWithNoTooltip] як впливову особу, багато чиновників у [ROOT.GetCountry.GetGovernment.GetCourtTitle] закликали [our_ruler.GetNameWithNoTooltip] не діяти зухвало перед обличчям зради [ask_tadayoshi.GetShortNameWithNoTooltip], а натомість проявити обережність у подальших діях проти [GetCountry('STC').GetLongNameWithNoTooltip]."
  flavor_jap.104.a: "Ми повинні остерігатися [GetCountry('STC').GetLongNameWithNoTooltip] тепер, коли [ask_tadayoshi.GetNameWithNoTooltip] втік."
  south_court_will_become_stronger: "[ask_tadayoshi.GetName] забере багатьох зі [ask_tadayoshi.GetHisHer] союзників до [GetCountry('STC').GetLongName], що їх підбадьорить."
  flavor_jap.105.title: "[ask_tadayoshi.GetNameWithNoTooltip] прибуває"
  flavor_jap.105.desc: "Несподіваним кроком, бунтівний [ask_tadayoshi.GetName] прибув до [ROOT.GetCountry.GetLongName], прагнучи присягнути на вірність на підтримку [our_ruler.GetName]. Будучи незадоволеним тим, як [jap_ruler.GetName] керував [jap_ruler.GetHisHer] [GetCountry('JAP').GetGovernment.GetCourtTitle], [ask_tadayoshi.GetNameWithNoTooltip] тепер висловив [ask_tadayoshi.GetHisHer] підтримку у відновленні [ROOT.GetCountry.GetLongNameWithNoTooltip] на Хризантемовому Троні."
  flavor_jap.105.a: "[ask_tadayoshi.GetNameWithNoTooltip] буде вирішальним у майбутні часи."
  flavor_jap.106.title: "[ymn_clan.GetNameWithNoTooltip] переходить на бік [GetCountry('STC').GetLongNameWithNoTooltip]"
  flavor_jap.106.desc: "Жахливі новини надійшли до [ROOT.GetCountry.GetCapital.GetName]: один з найвпливовіших кланів, [ymn_clan.GetName] під проводом [ymn_ruler.GetName], перейшов на бік [GetCountry('STC').GetLongName]. Побоюючись відповіді від [ymn_clan.GetAdjectiveWithNoTooltip] сил, багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] висунув ідею розпочати ранній наступ проти [ymn_clan.GetNameWithNoTooltip], сподіваючись розгромити будь-які плани [ymn_clan.GetNameWithNoTooltip] щодо посилення [GetCountry('STC').GetLongNameWithNoTooltip]."
  flavor_jap.106.a: "Ми повинні остерігатися [ymn_clan.GetLongNameWithNoTooltip]."
  flavor_jap.106.b: "Ми швидко завдамо їм удару!"
  flavor_jap.106.tt: "[GetCountry('YMN').GetLongName] тепер підтримуватиме [GetCountry('STC').GetLongName] у [GetCountry('STC').GetCapital.GetNameWithNoTooltip]."
  flavor_jap.107.title: "Компроміс для підкорення"
  flavor_jap.107.desc: "Серед найсильніших [ShowSpecialStatusName('shugo_daimyo')] [ShowRegionName('japan_region')], [GetCountry('OUC').GetName] та [GetCountry('YMN').GetName] виявилися двома досить складними кланами для переговорів, часто використовуючи свій значний вплив, щоб відбити вимоги [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Однак, прагнучи подальшої інтеграції кланів у більшу бюрократію, [our_ruler.GetName] запропонував [GetCountry('OUC').GetNameWithNoTooltip] та [GetCountry('YMN').GetNameWithNoTooltip] автономію у формі невтручання в домен їхнього клану, якщо [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] повністю підкоряться. Хоча переговори виглядали багатообіцяючими, деякі в [ROOT.GetCountry.GetGovernment.GetCourtTitle] закликали [our_ruler.GetNameWithNoTooltip] не дотримуватися угоди, побоюючись, що це може лише підбадьорити клани в довгостроковій перспективі."
  flavor_jap.107.a: "Вітаємо компроміс з [GetCountry('OUC').GetNameWithNoTooltip] та [GetCountry('YMN').GetNameWithNoTooltip]."
  flavor_jap.107.b: "Відмовляємося, ми не пропонуватимемо особливих привілеїв жодному [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')]!"
  flavor_jap.110.title: "Інтеграція [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] у бюрократію"
  flavor_jap.110.desc: "Прагнучи зменшити розрив між правлінням [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] та автономією [ShowSpecialStatusName('shugo_daimyo')], [our_ruler.GetName] почав закладати основи для інтеграції сильніших кланів [ShowRegionName('japan_region')] у бюрократію [ROOT.GetCountry.GetFlavorRank]. Завдяки цим реформам [our_ruler.GetName] сподівається, що домінуючі клани залишаться вірними правлячому [ROOT.GetCountry.GetFlavorRank], а також винагородить тих, хто виявиться цінним активом для правління [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]."
  flavor_jap.110.a: "Давайте залучимо цих [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] до бюрократії [ROOT.GetCountry.GetFlavorRank]."
  flavor_jap.110.b: "Давайте зробимо додаткові кроки, щоб забезпечити лояльність [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')]."
  flavor_jap.111.title: "Система Ради Канрей"
  flavor_jap.111.desc: "Серед перших реформ щодо зміцнення бюрократії [ROOT.GetCountry.GetFlavorRank] є створення нової системи ради Канрей. Завдяки цій реформованій системі [our_ruler.GetName] сподівається, що могутні [ShowSpecialStatusName('shugo_daimyo')] матимуть голос в управлінні [ShowRegionName('japan_region')], а також поглибить зв'язки та відносини між [ROOT.GetCountry.GetFlavorRank] та кланами."
  flavor_jap.111.a: "Ця рада допоможе посилити владу [ROOT.GetCountry.GetGovernment.GetRulerTitle] над [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')]."
  flavor_jap.112.title: "Включення могутніх кланів до Ради Канрей"
  flavor_jap.112.desc: "Прагнучи сформувати початковий склад новоствореної Ради Канрей, [our_ruler.GetName] звернувся до найсильніших кланів по всьому [ShowRegionName('japan_region')] в надії побудувати міцні політичні відносини для майбутньої стабільності. За порадою [ROOT.GetCountry.GetGovernment.GetCourtTitle], члени рекомендували [GetCountry('HSK').GetName], [GetCountry('SBA').GetName] та [GetCountry('HTK').GetName] служити першими старшими членами."
  flavor_jap.112.a: "Нехай вони започаткують нову еру!"
  flavor_jap.112.b: "Зменшити їхню владу, щоб вони не стали надто могутніми."
  flavor_jap.113.title: "Розширення Шукуро Кайгі"
  flavor_jap.113.desc: "Хоча початкове заснування ради Канрей передбачало призначення трьох могутніх кланів до ради, дехто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонував [our_ruler.GetName] розширити її. Призначення деяких слабших кланів до Шукуро Кайгі (ради старійшин) забезпечило б іншим [ShowSpecialStatusName('shugo_daimyo')] сильніший голос у [ROOT.GetCountry.GetGovernment.GetCourtTitle], а також тримало б під контролем правлячих найвищих за рангом [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')]."
  flavor_jap.113.a: "Ввести деякі слабші клани до Шукуро Кайгі."
  flavor_jap.113.b: "Ми не можемо ризикувати подальшим зміцненням цих кланів."
  flavor_jap.114.title: "Самурай-Докоро"
  flavor_jap.114.desc: "Зі зростанням кількості злочинів по всьому [ShowRegionName('japan_region')], [our_ruler.GetName] вирішив зміцнити #italic Самурай-Докоро#!, а також розширити його, щоб він став сильнішою позицією влади в [ROOT.GetCountry.GetLongName]. Оскільки це провідний орган кримінального правосуддя в [ShowRegionNameWithNoTooltip('japan_region')], дехто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] висловив прихильність до [GetCountry('IMG').GetName] на цю посаду, тоді як інші припускають, що [replacement_clan.GetName] слід нагородити цією посадою натомість."
  flavor_jap.114.a: "Нагородити посадою [GetCountry('IMG').GetLongNameWithNoTooltip]."
  flavor_jap.114.b: "Використати більшу владу над посадою з [replacement_clan.GetNameWithNoTooltip]."
  flavor_jap.115.title: "Рада Канрей зміцнює родинні зв'язки між членами"
  flavor_jap.115.desc: "Хоча рада Канрей стала місцем політичного суперництва між кланами, вона також перетворилася на місце для зростання родинних зв'язків між ними. Крім того, ці родинні зв'язки призвели до подальшого зміцнення [ROOT.GetCountry.GetGovernment.GetAdjective] правління, причому багато кланів висловлюють абсолютну лояльність до [our_ruler.GetName]."
  flavor_jap.115.a: "Рада виявилася ефективним інструментом бюрократії."
  flavor_jap.120.title: "Невдоволення [GetCountry('SBA').GetNameWithNoTooltip]"
  flavor_jap.120.desc: "Хоча призначення [GetCountry('SBA').GetLongName] до ради Канрей мало покращити стосунки між [ROOT.GetCountry.GetFlavorRank] та [GetCountry('SBA').GetNameWithNoTooltip], [sba_ruler.GetName] висловив невдоволення правлінням [our_ruler.GetName]'s і все частіше робить кроки, щоб відкрито кинути виклик [our_ruler.GetNameWithNoTooltip] у [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nПрагнучи покарати [GetCountry('SBA').GetNameWithNoTooltip] за його непокірну поведінку, [our_ruler.GetNameWithNoTooltip] відправив посланців по всьому [ShowRegionName('japan_region')], щоб розпочати коаліцію проти [sba_ruler.GetNameWithNoTooltip], сподіваючись скинути [sba_ruler.GetHimHer], хоча інші в [ROOT.GetCountry.GetGovernment.GetCourtTitle] побоюються, що це може дестабілізувати [ROOT.GetCountry.GetFlavorRank]."
  flavor_jap.120.a: "Ця зухвалість не може залишитися безкарною, шукайте інших [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')]!"
  flavor_jap.120.b: "Ми поки що ігноруватимемо цю зухвалість."
  summoning_of_shugo_lords: "Кілька [ShowSpecialStatusName('shugo_daimyo')] відгукнуться на прохання [our_ruler.GetName] і допоможуть протистояти [GetCountry('SBA').GetLongName]."
  flavor_jap.121.title: "Коаліція Шуґо проти [GetCountry('SBA').GetNameWithNoTooltip]"
  flavor_jap.121.desc: "Відгукнувшись на прохання [our_ruler.GetName], клани [summoned_shugo_one.GetName], [summoned_shugo_two.GetName] та [summoned_shugo_three.GetName] запропонували допомогу в коаліції для розгрому [GetCountry('SBA').GetNameWithNoTooltip]. Хоча [our_ruler.GetNameWithNoTooltip] запропонував великі політичні переваги, дехто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] натомість попросив [ROOT.GetCountry.GetFlavorRank] особисто зайнятися цією справою, оскільки нагороджені клани можуть спробувати скористатися своєю прихильністю до [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_jap.121.a: "Безчесний [GetCountry('SBA').GetNameWithNoTooltip] має бути повалений."
  flavor_jap.121.b: "Натомість ми самі займемося цим."
  shugo_lords_will_join_and_prestige: "[summoned_shugo_one.GetName], [summoned_shugo_two.GetName] та [summoned_shugo_three.GetName] отримають [ShowNamedValue('prestige_extreme_bonus')|+] [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e] та приєднаються до нашої [Concept('war', 'CONCEPT_PLACEHOLDER')|e] проти [GetCountry('SBA').GetName]"
  flavor_jap.122.title: "[chosen_kanrei_leader.GetNameWithNoTooltip] та Рада Канрей"
  flavor_jap.122.desc: "Падіння [GetCountry('SBA').GetName] призвело до зникнення їхньої владної позиції в раді Канрей. Прагнучи заповнити вакуум влади, що утворився, [chosen_kanrei_leader.GetName] запропонував служити найстаршим кланом у раді. Інші в [ROOT.GetCountry.GetGovernment.GetCourtTitle] натомість припустили, що настав час обрати новий клан поза радою, щоб заповнити вакуум, а також такий, що не мав попередніх амбіцій."
  flavor_jap.122.a: "[chosen_kanrei_leader.GetNameWithNoTooltip] очолить наразі."
  flavor_jap.122.b: "[new_major_kanrei_member.GetNameWithNoTooltip] займе місце [GetCountry('SBA').GetNameWithNoTooltip] у раді."
  flavor_jap.123.title: "Зростання каральної влади"
  flavor_jap.123.desc: "Падіння [GetCountry('SBA').GetName] викликало хвилі по всьому [ShowRegionName('japan_region')], сигналізуючи, що [ROOT.GetCountry.GetFlavorRank] готовий вжити каральних заходів для приборкання будь-яких руйнівних проявів серед своїх підданих. Хоча попередні клани діяли не за правилами, вони не боялися жодних наслідків від [ROOT.GetCountry.GetFlavorRank] дотепер.\n\nХоча нововиявлена каральна природа може зменшити амбіції деяких [ShowSpecialStatusName('shugo_daimyo')], вона також принесла з собою певну недовіру до [our_ruler.GetName]."
  flavor_jap.123.a: "[ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] навчаться бути обережнішими щодо влади [our_ruler.GetNameWithNoTooltip]."
  flavor_jap.130.title: "Легітимізація [ROOT.GetCountry.GetGovernment.GetAdjective] правління"
  flavor_jap.130.desc: "Хоча [old_ashikaga_ruler.GetName] заснував новий [ROOT.GetCountry.GetFlavorRank], його значною мірою вважали нелегітимним багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ShowRegionName('japan_region')] через його ставлення до родини [ShowDynastyName('yamato_dynasty')]. Прагнучи подальшої легітимізації правлячої [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], [kanrei_council_leader.GetName] заохочував участь [our_ruler.GetName] у стародавній системі рангів. Будучи одним із наріжних каменів імперських традицій, якщо [our_ruler.GetNameWithNoTooltip] виявить повагу до цього процесу, це може зміцнити [our_ruler.GetHisHer] легітимність в очах еліти."
  flavor_jap.130.a: "Дотримуватися поради [kanrei_council_leader.GetNameWithNoTooltip] та брати участь."
  flavor_jap.130.b: "Відмовитися від участі в стародавній системі придворних рангів."
  flavor_jap.131.title: "Указ про половинний податок"
  flavor_jap.131.desc: "Прагнучи ще більше зміцнити зв'язки імператорського двору з [ROOT.GetCountry.GetLongName], [our_ruler.GetName] офіційно санкціонував указ #italic Hanzei#!. Забороняючи поділ імперських земель [ShowSpecialStatusName('shugo_daimyo')], [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] тепер будуть зобов'язані сплачувати половинний податок, пропорційний підтримці, отриманій [ROOT.GetCountry.GetGovernment.GetAdjective] представниками у вирішенні місцевих вторгнень. Новопризначені [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] однак були звільнені від указу."
  flavor_jap.131.a: "Цей указ принесе користь усьому [ShowRegionNameWithNoTooltip('japan_region')]!"
  flavor_jap.131.b: "Дозволити деяку конфіскацію імперських земель."
  flavor_jap.132.title: "Кюсю Тандай"
  flavor_jap.132.desc: "Будучи одним із найпроблемніших регіонів [ROOT.GetCountry.GetGovernment.GetAdjective] правління над [ShowRegionName('japan_region')], [ShowAreaName('saikaidou_area')] виявився головним оплотом підтримки [GetCountry('STC').GetAdjective]. Прагнучи придушити регіон, [our_ruler.GetName] закликав призначити нового лояльного Тандая для [ShowAreaNameWithNoTooltip('saikaidou_area')], хоча дехто закликав обрати місцевий клан, лояльний до [ROOT.GetCountry.GetGovernment.GetAdjective] справи, в надії на більш ефективного адміністратора."
  flavor_jap.132.a: "[non_kyushu_clan_tandai.GetNameWithNoTooltip] служитиме Тандаєм Кюсю."
  flavor_jap.132.b: "Натомість призначити місцевого [kyushu_clan_tandai.GetLongNameWithNoTooltip]."
  flavor_jap.133.title: "Розвиток Ґобансю"
  flavor_jap.133.desc: "Прагнучи протистояти зростаючій непокорі деяких [ShowSpecialStatusName('shugo_daimyo')], [our_ruler.GetName] звернувся за підтримкою до [ROOT.GetCountry.GetGovernment.GetCourtTitle] для заснування нової сьогунальної армії. Щоб забезпечити лояльність нової армії, [our_ruler.GetNameWithNoTooltip] наказав, щоб її ряди підпорядковувалися безпосередньо [ROOT.GetCountry.GetGovernment.GetRulerTitle], а також обмежив командування лише тими [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')], які мають найвищу лояльність до [ROOT.GetCountry.GetFlavorRank]."
  flavor_jap.133.a: "Ніхто не посміє кинути виклик могутності [ROOT.GetCountry.GetFlavorRank]!"
  flavor_jap.133.b: "Зробити більший акцент на армії, заснованій на ополченні."
  flavor_jap.134.title: "Обов'язкове проживання"
  flavor_jap.134.desc: "Бажаючи подальшої централізації [ShowRegionName('japan_region')], [our_ruler.GetName] видав указ, що вимагає від [ShowSpecialStatusName('shugo_daimyo')], які займають посади в раді Канрей, обов'язкового проживання в [ROOT.GetCountry.GetCapital.GetName]. Хоча деяким [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] безсумнівно не сподобається новий указ, примус [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] залишатися в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] безсумнівно послабить будь-які їхні прагнення проти [ROOT.GetCountry.GetFlavorRank], перебуваючи під поглядом [our_ruler.GetNameWithNoTooltip]."
  flavor_jap.134.a: "Примусити [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] проживати в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_jap.134.b: "Відкликати впровадження політики."
  flavor_jap.135.title: "Послаблення [tki_country.GetNameWithNoTooltip]"
  flavor_jap.135.desc: "Хоча [tki_country.GetName] завжди залишався одним із найсильніших кланів у [ShowRegionName('japan_region')], останнім часом він значно зміцнів під керівництвом [tki_ruler.GetName], і [ROOT.GetCountry.GetGovernment.GetCourtTitle] більше не може ігнорувати [tki_ruler.GetHisHer] амбіції. З огляду на вимоги [ROOT.GetCountry.GetGovernment.GetCourtTitle] розділити землі [tki_country.GetNameWithNoTooltip] на молодші гілки, [our_ruler.GetName] закликав до прямих дій, щоб покарати [tki_ruler.GetNameWithNoTooltip] за [tki_ruler.GetHisHer] непокору."
  flavor_jap.135.a: "[tki_country.GetNameWithNoTooltip] необхідно приборкати!"
  flavor_jap.135.b: "Ми не будемо далі займатися цією справою."
  flavor_jap.136.title: "Повстання Мейтоку"
  flavor_jap.136.desc: "Хоча зв'язки між [GetCountry('YMN').GetName] та [ROOT.GetCountry.GetFlavorRank] залишалися стабільними останнім часом, [ymn_ruler.GetName] спричинив майже повний крах раптовим захопленням імперських земель у [ymn_ruler.GetHisHer] володіннях. Ігноруючи прохання [ROOT.GetCountry.GetGovernment.GetCourtTitle] повернути конфісковані землі, [our_ruler.GetName] звернувся за допомогою, щоб розгромити клан за його безчесні дії."
  flavor_jap.136.a: "[GetCountry('YMN').GetNameWithNoTooltip] не можна дозволити подальше захоплення імперських земель!"
  flavor_jap.136.b: "[GetCountry('YMN').GetNameWithNoTooltip] — сильний клан, уникнемо конфлікту з ними."
  flavor_jap.137.title: "Оподаткування Сакая-Досо"
  flavor_jap.137.desc: "Прагнучи отримати додатковий дохід для [ROOT.GetCountry.GetFlavorRank], [our_ruler.GetName] запропонував новий податок на Сакая-Досо (лихварів) по всьому [ROOT.GetCountry.GetCapital.GetName]. Хоча в минулому вони були джерелом доходу, останнім часом розширення [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] призвело до значного збагачення Сакая-Досо [ROOT.GetCountry.GetCapital.GetRank.GetName], до того, що поточна податкова політика залишала їм великі частини їхнього багатства."
  flavor_jap.137.a: "Оподаткувати лихварів!"
  flavor_jap.137.b: "Ми не можемо ризикувати розгнівати лихварів."
  flavor_jap.138.title: "Погіршення відносин з [chi_nation.GetNameWithNoTooltip]"
  flavor_jap.138.desc: "Хоча торгівля колись процвітала між [ROOT.GetCountry.GetName] та [chi_nation.GetName], останні часи виявилися бурхливими між нашими двома державами. Прагнучи відновити зв'язки з [chi_nation.GetNameWithNoTooltip], [our_ruler.GetName] звернувся за допомогою до [ROOT.GetCountry.GetGovernment.GetCourtTitle] у формуванні нової делегації, але також висловив [our_ruler.GetHisHer] невдоволення [chi_ruler.GetName]."
  flavor_jap.138.a: "Відновимо відносини між нашими державами."
  flavor_jap.138.b: "Справи [chi_nation.GetNameWithNoTooltip] для нас безглузді."
  flavor_jap.140.title: "[ShowWorkOfArtNameWithNoTooltip('hana_no_gosho_palace')]"
  flavor_jap.140.desc: "З огляду на те, що владна база [ROOT.GetCountry.GetFlavorRank] по всьому [ShowRegionName('japan_region')] значною мірою консолідована, [our_ruler.GetName] взяв на себе завдання побудувати новий величний палац як символ [ROOT.GetCountry.GetGovernment.GetAdjective] могутності та пишноти. Названий [ShowWorkOfArtName('hana_no_gosho_palace')], [our_ruler.GetNameWithNoTooltip] сподівається, що він залишатиметься джерелом [ROOT.GetCountry.GetGovernment.GetAdjective] сили та престижу в наступні століття."
  flavor_jap.140.a: "Престижний палац!"
  flavor_jap.141.title: "Будівництво [ShowWorkOfArtNameWithNoTooltip('kinkaku_ji')]"
  flavor_jap.141.desc: "Отримавши ділянку від родини Сайондзі за допомогою політичного впливу та [ROOT.GetCountry.GetGovernment.GetAdjective] скарбниці, [our_ruler.GetName] наказав збудувати нову величну споруду, прикрашену золотом.\n\nПрикрашаючи споруду золотом, [our_ruler.GetNameWithNoTooltip] сподівається усунути будь-які почуття щодо смерті, а також продемонструвати велич [ROOT.GetCountry.GetFlavorRank]."
  flavor_jap.141.a: "Цей храм слугуватиме символом нашої величі!"
  flavor_jap.142.title: "[ShowWorkOfArtNameWithNoTooltip('jinno_shotoki_chronicle')]"
  flavor_jap.142.desc: "Спричинивши ажіотаж у [ROOT.GetCountry.GetGovernment.GetCourtTitle], ретельно складена хроніка [kitabatake_chikafusa.GetName] була завершена. Документуючи всіх минулих імператорів аж до нинішнього [stc_ruler.GetName], вона поширювалася по всьому [ShowRegionName('japan_region')] подібно до бурі. Деякі в [ROOT.GetCountry.GetGovernment.GetCourtTitle] висловили занепокоєння щодо написаного, заявивши, що виключення [GetCountry('NTC').GetLongName] з хроніки та натомість вибір слідувати [stc_ruler.GetNameWithNoTooltip] з [GetCountry('STC').GetName] викличе подальші питання щодо легітимності [ntc_ruler.GetName]."
  flavor_jap.142.a: "Викривальна хроніка."
  flavor_jap.143.title: "Відродження Ґакко [ShowLocationNameWithNoTooltip('ashikaga_loc')]"
  flavor_jap.143.desc: "Хоча Ґакко [ShowLocationName('ashikaga_loc')] століттями була видатною академією, останнім часом вона зазнала значного занепаду в інноваціях. Оскільки кілька прихильників мистецтв школи присутні при [ROOT.GetCountry.GetGovernment.GetCourtTitle], багато хто почав закликати [our_ruler.GetName] підтримати її зміцнення в надії, що оновлена допомога від держави допоможе відродити колись велику академію."
  flavor_jap.143.a: "Відродимо цю велику академію!"
  flavor_jap.144.title: "Прибуття [jesuit_francis_xavier.GetNameWithNoTooltip]"
  flavor_jap.144.desc: "Останніми роками зростаюча кількість #italic нанбанських#! торговців, що прибувають до наших берегів, викликала суперечки серед деяких місцевих [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')], а також серед діячів при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Однак нещодавня постать привернула особисту увагу [our_ruler.GetName]. Названий [jesuit_francis_xavier.GetName] нанбанськими торговцями, [jesuit_francis_xavier.GetHeShe] прибув до [arrival_location.GetName] і, як людина віри, [jesuit_francis_xavier.GetHeShe] сподівається поширити [jesuit_francis_xavier.GetHisHer] [ShowReligionName('catholic')] вчення по всьому [ShowRegionName('japan_region')]."
  flavor_jap.144.a: "Дозволити [jesuit_francis_xavier.GetHimHer] залишитися."
  flavor_jap.144.b: "Припинити будь-які спроби навернути наше населення."
  flavor_jap.145.title: "Храм [ShowWorkOfArtNameWithNoTooltip('shokoku_ji')]"
  flavor_jap.145.desc: "Завзятий прихильник [ShowReligionGroupAdjective('buddhist')] ченців, [our_ruler.GetName] виділив кошти на заснування [ShowWorkOfArtName('shokoku_ji')], нового [ShowReligionGroupAdjectiveWithNoTooltip('buddhist')] храму в [ShowLocationName('kyoto')]. Вважаючи це подарунком ченцям, [our_ruler.GetNameWithNoTooltip] сподівається з часом використовувати новий храм як місце для проведення бенкетів у майбутньому та як місце для зборів усіх у [ROOT.GetCountry.GetGovernment.GetAdjective] бюрократії."
  flavor_jap.145.a: "Чудовий храм!"
  flavor_jap.146.title: "[target_character.GetNameWithNoTooltip]"
  flavor_jap.146.desc: "Один із ченців [ShowWorkOfArtName('shokoku_ji')], [target_character.GetName] почав привертати увагу [ROOT.GetCountry.GetGovernment.GetCourtTitle] своєю практикою чорнильного живопису #italic суйбоку#!. За час свого перебування в [ShowWorkOfArtNameWithNoTooltip('shokoku_ji')], [target_character.GetNameWithNoTooltip] написав кілька неймовірних картин, які вразили [ROOT.GetCountry.GetGovernment.GetCourtTitle], хоча жодна з них не зрівнялася з улюбленою, [ShowWorkOfArtName('catfish_with_a_gourd')]."
  flavor_jap.146.a: "Вправний майстер суйбоку."
  flavor_jap.147.title: "[target_character.GetNameWithNoTooltip]"
  flavor_jap.147.desc: "Навчившись багато чого в практиці #italic суйбоку#! у [josetsu.GetName] під час свого перебування в [ShowWorkOfArtName('shokoku_ji')], [target_character.GetName] піднявся по службових сходах, щоб служити директором живопису [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName]. Серед багатьох його картин на службі у [ROOT.GetCountry.GetFlavorRank] жодна не привернула більше визнання при [ROOT.GetCountry.GetGovernment.GetCourtTitle], ніж [ShowWorkOfArtName('reading_in_a_bamboo_grove')]."
  flavor_jap.147.a: "Чудовий художник!"
  flavor_jap.148.title: "[target_character.GetNameWithNoTooltip]"
  flavor_jap.148.desc: "Йдучи слідами свого вчителя [tensho_shubun.GetName] та великого [josetsu.GetName], [target_character.GetName] став ще одним великим художником нашого часу, здобувши славу по всьому [ShowRegionName('japan_region')] завдяки своєму поєднанню [ShowCultureGroupName('japanese_group')] та [ShowCultureGroupName('chinese_group')] стилів чорнильного живопису. Серед багатьох його картин, [ShowWorkOfArtName('jap_winter_landscape')] служить однією з найкращих демонстрацій цього поєднання стилів."
  flavor_jap.148.a: "Видатна особистість!"
  flavor_jap.150.title: "Заснування школи Кано"
  flavor_jap.150.desc: "Протягом своєї служби головним художником при [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetName] був прихильником різних дзенських та #italic суйбоку#! стилів живопису. Хоча його позиція головного художника була розкритикована деякими при [ROOT.GetCountry.GetGovernment.GetCourtTitle], його роботи зробили його близьким другом [our_ruler.GetName].\n\nПрагнучи заснувати школу живопису, [target_character.GetNameWithNoTooltip] попросив [our_ruler.GetNameWithNoTooltip] виділити деякі [ROOT.GetCountry.GetGovernment.GetAdjective] кошти для нього, щоб розвивати новостворений стиль."
  flavor_jap.150.a: "Чудова пропозиція!"
  flavor_jap.150.b: "Надати [target_character.GetNameWithNoTooltip] додаткові кошти."
  flavor_jap.150.c: "Відмовити [target_character.GetNameWithNoTooltip] у проханні."
  flavor_jap.151.title: "Прихильність до театру Но"
  flavor_jap.151.desc: "Хоча багато форм театру були предметом захоплення при [ROOT.GetCountry.GetGovernment.GetCourtTitle] у минулому, жодна не залишила такого тривалого враження, як практика Но. Однак, порівняно з [our_ruler.GetHerHis] попередниками, [our_ruler.GetName] виявив особливу прихильність до цього мистецтва і прагне поєднати його з аристократичними мистецтвами [ROOT.GetCountry.GetGovernment.GetCourtTitle], а також попросив підтримки серед інших при [ROOT.GetCountry.GetGovernment.GetCourtTitle] для покровительства мистецтву Но."
  flavor_jap.151.a: "Покровительство мистецтву Но."
  flavor_jap.151.b: "Ми матимемо інші форми для демонстрації [ROOT.GetCountry.GetGovernment.GetAdjective] могутності."
  flavor_jap.152.title: "Розвиток архітектури Сьоін-Дзукурі"
  flavor_jap.152.desc: "Прагнучи відокремити еру [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] від Камакурської, [our_ruler.GetName] заклав основи нового будівельного стилю для епохи [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]. Порівняно з минулими будівельними проектами, за #italic Сьоін-Дзукурі#! квадратні стовпи з татамі формують основу споруди.\n\nПрагнучи оновити палац у [ROOT.GetCountry.GetCapital.GetName] за новими проектами, [our_ruler.GetNameWithNoTooltip] сподівається, що з часом увесь [ShowRegionNameWithNoTooltip('japan_region')] наслідуватиме прийняття нової архітектури Сьоін-Дзукурі."
  flavor_jap.152.a: "Це час змін."
  flavor_jap.153.title: "Шлях [ShowGoodsNameWithNoTooltip('tea')]"
  flavor_jap.153.desc: "Хоча культура [ShowGoodsName('tea')] залишалася ключовою частиною [ShowCultureGroupName('japanese_group')] традицій, [target_character.GetName] привернув увагу [our_ruler.GetName] та інших членів [ROOT.GetCountry.GetGovernment.GetCourtTitle] за [target_character.GetHisHer] революціонізацію цієї практики. Переосмислюючи кожен аспект #italic чайної церемонії#!, від посуду до самих процедур, нові практики [target_character.GetNameWithNoTooltip] швидко привернули увагу та поширилися по всьому [ShowRegionName('japan_region')]."
  flavor_jap.153.a: "Давайте офіційно приймемо цю практику."
  flavor_jap.153.b: "Це було б непотрібним відволіканням."
  flavor_jap.154.title: "[ShowLocationNameWithNoTooltip('kyoto')] Сьосідай"
  flavor_jap.154.desc: "Прагнучи ще більше зміцнити бюрократію, [our_ruler.GetName] заклав основи для офісу #italic [ShowLocationName('kyoto')] Сьосідай#!, еволюції попереднього офісу Тандай, який займали регіональні губернатори. За новоствореним розширеним офісом, його власник служитиме особистим представником [ROOT.GetCountry.GetGovernment.GetRulerTitle] і діятиме безпосередньо під [our_ruler.GetHisHer] керівництвом."
  flavor_jap.154.a: "Заснувати офіс!"
  flavor_jap.154.b: "Це була б марна трата ресурсів"
  flavor_jap.155.title: "Інституціоналізація Хатамото"
  flavor_jap.155.desc: "Прагнучи провести межу між Гокенін, [our_ruler.GetName] заклав основи для інституціоналізації [our_ruler.GetHisHer] найвідданіших послідовників як приналежних до класу Хатамото. Хоча функціонально схожі на Гокенін минулих століть, ті, хто є Хатамото, можуть особисто просити аудієнції у [our_ruler.GetNameWithNoTooltip], особливий привілей, раніше наданий лише небагатьом."
  flavor_jap.155.a: "Інституціоналізувати Хатамото."
  flavor_jap.155.b: "Зберегти баланс між Гокенін та Хатамото."
  flavor_jap.156.title: "Будівництво острова Дедзіма"
  flavor_jap.156.desc: "Зі зростанням прибуття торговців Нанбан з чужих земель, багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] просили [our_ruler.GetName] закласти основи для спеціального порту в [ShowLocationName('nishisonogi')]. Слугуючи відокремленим островом від основного поселення, «Дедзіма» слугувала б призначеним торговим місцем для будь-яких людей, які бажають торгувати з Нанбан."
  flavor_jap.156.a: "Побудувати острів."
  flavor_jap.156.b: "Побудувати острівний порт, але послабити обмеження для тих, хто торгує в ньому."
  flavor_jap.160.title: "Заснування району Йосівара"
  flavor_jap.160.desc: "Прагнучи ізолювати аспекти [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] у [ShowLocationName('toshima_kanto')], [our_ruler.GetName] наказав створити новий район у [ShowLocationNameWithNoTooltip('toshima_kanto')], Йосівара. У цьому районі заможний клас [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] може жити в надмірності, водночас повністю ізолюючи їх від решти поселення."
  flavor_jap.160.a: "Заснувати район!"
  flavor_jap.160.b: "[ShowLocationNameWithNoTooltip('toshima_kanto')] не потребує району."
  flavor_jap.161.title: "Кінчу Нарабіні Куґе Сьохатто"
  flavor_jap.161.desc: "Прагнучи ще більше обмежити владу родини [ShowDynastyName('yamato_dynasty')], [our_ruler.GetName] видав нові закони, щоб обмежити повноваження [ymt_ruler.GetName] та [ymt_ruler.GetHisHer] вплив на [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Згідно з новим законом, [ROOT.GetCountry.GetFlavorRank] також рекомендував [ymt_ruler.GetNameWithNoTooltip] присвятити [ymt_ruler.GetHisHer] життя мистецтву вченості та поезії."
  flavor_jap.161.a: "Прийняти закони для обмеження імператорської родини."
  flavor_jap.161.b: "Уникнути ослаблення імператорської родини."
  flavor_jap.162.title: "Будівництво замку [ShowLocationNameWithNoTooltip('osaka')]"
  flavor_jap.162.desc: "Бажаючи перевершити багато великих замків по всій [ShowRegionName('japan_region')], [our_ruler.GetName] заклав основи для будівництва замку [ShowLocationName('osaka')]. З п'ятьма головними вежами та укріпленим ровом навколо переднього плану, [ShowLocationNameWithNoTooltip('osaka')] безсумнівно буде однією з найбільш укріплених споруд по всій [ShowRegionNameWithNoTooltip('japan_region')] та головною ознакою правління [our_ruler.GetNameWithNoTooltip]."
  flavor_jap.162.a: "Побудувати замок!"
  flavor_jap.162.b: "Це було б занадто великою витратою."
  flavor_jap.162.a.tt: "Якщо [ROOT.GetCountry.GetName] розблокував [ShowAdvanceName('bastion_advance')] і [ShowLocationName('osaka')] вже має [ShowBuildingTypeName('castle')], замість нього буде побудовано [ShowBuildingTypeName('bastion')]."
  flavor_jap.163.title: "Інституціоналізація Кінчу Нарабіні Куґе Сьохатто"
  flavor_jap.163.desc: "Прагнучи ще більше обмежити владу [our_ruler.GetName], [jap_ruler.GetName] прийняв #italic Кінчу Нарабіні Куґе Сьохатто#!. Згідно з новим законом, повноваження [our_ruler.GetNameWithNoTooltip] були значною мірою обмежені, а [jap_ruler.GetNameWithNoTooltip] рекомендував [our_ruler.GetNameWithNoTooltip] присвятити життя вченості та поезії."
  flavor_jap.163.a: "Це жахливе обмеження!"
  flavor_jap.170.title: "Реформи Кансей"
  flavor_jap.170.desc: "Після десятиліть нестабільності та голоду по всій [ShowRegionName('japan_region')], багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] закликав [our_ruler.GetName] вжити надзвичайних заходів.\n\nПрагнучи стабілізувати та вирішити численні проблеми, з якими стикається [ROOT.GetCountry.GetFlavorRank], багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] брав участь у розробці реформ Кансей. Хоча деякі дії, запропоновані [ROOT.GetCountry.GetGovernment.GetCourtTitle], шкодять відносинам з іноземними державами, обмежуючи торгівлю, вони закладуть основу для відродження сільськогосподарської бази [ShowRegionNameWithNoTooltip('japan_region')]."
  flavor_jap.170.a: "Прийняти реформи!"
  flavor_jap.170.b: "Заборонити реформи"
  flavor_jap.180.title: "Посада Шіцудзі"
  flavor_jap.180.desc: "Бажаючи видатних особистостей у [GetCountry('JAP').GetGovernment.GetCourtTitle], [jap_ruler.GetName] запропонував престижну посаду #italic Шіцудзі#! [our_ruler.GetName]. Це посада величезного політичного впливу в [GetUniqueInternationalOrganization('japanese_shogunate').GetName], і якщо [our_ruler.GetNameWithNoTooltip] прийме пропозицію, [our_ruler.GetHeShe] зможе мати значний вплив по всій [ShowRegionName('japan_region')]."
  flavor_jap.180.a: "Прийняти посаду Шіцудзі!"
  flavor_jap.180.b: "Відхилити пропозицію щодо посади."
  flavor_jap.181.title: "[kou_no_moronao.GetNameWithNoTooltip] відхиляє призначення"
  flavor_jap.181.desc: "Незважаючи на те, що це посада великої влади, [kou_no_moronao.GetNameWithNoTooltip] відхилив пропозицію [our_ruler.GetName] щодо посади #italic Шіцудзі#!.\n\nПрагнучи запобігти посиленню однієї з фракцій у [ROOT.GetCountry.GetGovernment.GetCourtTitle], [our_ruler.GetNameWithNoTooltip] натомість шукав нижчого за рангом чиновника, [target_character.GetName], сподіваючись, що [target_character.GetHeShe] буде незаплямований політикою [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_jap.181.a: "Будемо сподіватися, що чиновник зможе зберегти посаду з чесністю."
  flavor_jap.182.title: "[kou_no_moronao.GetNameWithNoTooltip] приймає призначення"
  flavor_jap.182.desc: "Отримавши нашу пропозицію щодо посади Шіцудзі, [kou_no_moronao.GetName] прибув до [ROOT.GetCountry.GetCapital.GetName], щоб офіційно прийняти посаду та зміцнити наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] своїм впливом."
  flavor_jap.182.a: "[kou_no_moronao.GetNameWithNoTooltip] буде чудовим Шіцудзі."