l_english:
  flavor_ayu.1.title: "Заснування $ayutthaya$"
  flavor_ayu.1.desc: "Об'єднавши під [target_ruler.GetHerHis] владою території [GetCountry('LAV').GetName] та [GetCountry('ADH').GetName], [target_ruler.GetName] тепер спрямував [target_ruler.GetHerHis] погляд на більші висоти. Використовуючи [target_ruler.GetHerHis] тісні зв'язки з народом [GetCountry('SPN').GetName], [target_ruler.GetSheHe] висунув пропозицію заснувати нове місто на землях навколо [target_location.GetName], звідки [target_ruler.GetSheHe] прагне правити всіма територіями як єдиною країною. Місто, і ця нова нація, має називатися $ayutthaya$, надаючи їй виразну [ShowCultureName('thai_culture')] ідентичність, відокремлену від старої [ShowLanguageName('sanskrit_language')] [target_location.GetNameWithNoTooltip]."
  flavor_ayu.1.a: "Нове місто та країна піднімуться над усім!"
  flavor_ayu.1.b: "Наша ідентичність не визначається лише містом."
  flavor_ayu.1.c: "Кошти на це можна краще використати в іншому місці."
  flavor_ayu.2.title: "Реформи [target_ruler.GetNameWithNoTooltip]"
  flavor_ayu.2.desc: "Хоча наша адміністрація, безумовно, успішна, [target_ruler.GetName] помітив деякі прогалини в ній і запропонував різні реформи, щоб краще оптимізувати управління державою. Хоча багато з цих пропозицій мають великий сенс, вони також призведуть до порушення, принаймні тимчасово, роботи нашого уряду, і є багато тих, хто ставиться до цих змін зі скептицизмом."
  flavor_ayu.2.historical_info: "Король Боромматрайлокканат запровадив численні реформи під час свого правління як короля Аюттхаї. Серед них були традиційні тайські міністерства #italic Kalahom#! та #italic Mahatthai#!, попередники нинішніх міністерства оборони та міністерства внутрішніх справ відповідно. Він також структурував феодальну систему та соціальну ієрархію під #italic Sakdina#! та стабілізував королівську спадковість. Хоча міністерства існували й раніше, саме їхня реорганізація та інституціоналізація королем Боромматрайлокканатом у 1454 році перетворили їх на основу уряду Аюттхаї, і їхня структура залишалася в силі до 1892 року."
  flavor_ayu.2.a: "Оновлення, люди. Оновлення."
  flavor_ayu.2.b: "Ми не повинні змінювати те, що вже працює."
  flavor_ayu.3.title: "Армійські реформи [target_ruler.GetNameWithNoTooltip]"
  flavor_ayu.3.desc: "Хоча наші армії є гордістю та радістю нашої країни, завжди є місце для вдосконалення. [target_ruler.GetName] запропонував різні реформи для наших військових сил, включаючи навчання постійної професійної слонової бригади. Ми, безумовно, повинні підтримувати нашу армію в найкращому бойовому стані, але деякі сумніваються в фактичній ефективності цих реформ на полі бою."
  flavor_ayu.3.a: "Армія потребує постійних тренувань та вдосконалення."
  flavor_ayu.3.b: "Зосередьмося на тому, що доведено та перевірено."
  flavor_ayu.4.title: "Економічні реформи [target_ruler.GetNameWithNoTooltip]"
  flavor_ayu.4.desc: "[target_ruler.GetName] запропонував різні реформи, що стосуються торгівлі та економічного добробуту нашого [ROOT.GetCountry.GetFlavorRank]. Хоча торгівля через нашу країну вже значна, покращення торгових шляхів та загальної економіки нашої землі може принести збільшені довгострокові вигоди для нашого народу."
  flavor_ayu.4.a: "Торгівля повинна текти."
  flavor_ayu.4.a.tt: "Багато наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('development_weak_bonus')|+=] [Concept('development', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ayu.4.b: "Занадто багато втручання може навіть порушити торгівлю."
  flavor_ayu.5.title: "Заснування сучасної [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] держави"
  flavor_ayu.5.desc: "[target_ruler.GetName] — видатний правитель у довгій історії нашої країни, оскільки [target_ruler.GetHerHis] лідерство справді просвітлене. [target_ruler.GetSheHe|U] хоче, щоб [ROOT.GetCountry.GetName] стояв на рівних з найбільшими імперіями історії, і спрямував [target_ruler.GetHerHis] погляд на новий курс для [ROOT.GetCountry.GetFlavorRank]. [target_ruler.GetSheHe|U] бажає відновити державу, перемістивши її столицю трохи на південь від [target_location.GetName] та здійснивши ґрунтовну адміністративну реформу."
  flavor_ayu.5.historical_info: "Падіння королівства Аюттхая було бурхливим часом, позначеним війною та внутрішньою фрагментацією. Король Таксін, колишній генерал адміністрації Аюттхаї, очолив визволення Сіаму від бірманських військ, а потім зумів об'єднати Сіам, який був розділений між кількома воєначальниками. Потім Таксін заснував королівство Тонбурі, заснувавши нове місто та столицю в Бангкоку, яке також служило столицею наступного королівства Раттанакосін після того, як Таксін був скинутий під час державного перевороту та страчений."
  flavor_ayu.5.a: "Це початок нової ери!"
  flavor_ayu.5.b: "Зосередьмося на тому, ким ми є, а не на тому, ким ми могли б бути."
  flavor_ayu.6.title: "[ShowBuildingTypeNameWithNoTooltip('wat_chaiwatthanaram_temple_building')]"
  flavor_ayu.6.desc: "Ми є побожним [ROOT.GetCountry.GetReligion.GetAdjective] [ROOT.GetCountry.GetFlavorRank], і [target_ruler.GetName] бажає чітко показати це як приклад. З цією метою [target_ruler.GetSheHe] бажає спонсорувати створення нового храму в [target_location.GetName], що слугуватиме вираженням [ROOT.GetCountry.GetGovernment.GetAdjective] влади. Там [ROOT.GetCountry.GetGovernment.GetRulerTitle] має проводити церемонії, тим самим зміцнюючи [target_ruler.GetHerHis] зв'язок із вірою."
  flavor_ayu.6.historical_info: "Король Прасат Тонг у 1630 році збудував перший храм свого правління, Ват Чайваттханарам, як пам'ятник своїй матері. Назва храму означає «Храм довгого правління та славетної епохи», він був спроектований у кхмерському стилі та використовувався для проведення королівських релігійних церемоній та кремації принців і принцес. Сто двадцять сидячих статуй Будди, пофарбованих у чорний та золотий кольори, прикрашають зовнішню стіну, тоді як вісім чеді-подібних каплиць зі статуями Будди всередині оточують центральну платформу. Зовнішні стіни цих каплиць прикрашені 12 рельєфами, що зображують сцени з життя Будди, а внутрішні розписані. Храм символізує буддійський світогляд, де центральна вежа представляє світову вісь, а чотири менші вежі навколо неї — чотири континенти у чотирьох напрямках."
  flavor_ayu.6.a: "[ShowBuildingTypeNameWithNoTooltip('wat_chaiwatthanaram_temple_building')] освітить наш шлях."
  flavor_ayu.6.b: "У нас вже достатньо храмів."
  flavor_ayu.7.title: "Розширення горизонтів"
  flavor_ayu.7.desc: "Останніми роками світ, здається, став більшим, оскільки торговці з далеких земель стають все частішими гостями серед нас. Ми не можемо заперечувати переваги, які ми можемо отримати від такої торгівлі, як у плані товарів, так і технологій, але багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] побоюється впливу, який ці іноземці можуть мати на [target_ruler.GetName], якщо [target_ruler.GetSheHe] прислухається до них. Ми могли б встановити деякі правила, щоб обмежити їхню торгівлю, але це, безсумнівно, налаштувало б їх проти нас, тоді як дозвіл їм вільно пересуватися може відкрити нас для потенційних внутрішніх проблем."
  flavor_ayu.7.a: "Посилити торговельні правила."
  flavor_ayu.7.b: "Дозволити вільний потік торгівлі."
  flavor_ayu.8.title: "Слід Будди"
  flavor_ayu.8.desc: "Мисливець у [target_location.GetName] знайшов калюжу води, що нагадує великий відбиток ноги, і вже лунають голоси, які стверджують, що це слід Будди. Добре відомо, що за свого життя Будда залишав свої сліди у всіх землях, де його вчення буде визнано. Тому нікого не дивує, що один із таких слідів може бути на нашій території. Багато хто в [target_location.GetNameWithNoTooltip] та по всій нашій країні вже просять [target_ruler.GetName] належним чином розмістити та вшанувати цей слід."
  flavor_ayu.8.historical_info: "У 1624 році мисливець знайшов заглиблення в камені в Сарабурі, і вважалося, що це слід Будди. Король Сонгтхам з Аюттхаї тоді наказав збудувати храм для його захисту та поклоніння, відомий як Ват Пхра Пхуттхабат."
  flavor_ayu.8.a: "Це, безперечно, святий знак."
  flavor_ayu.8.b: "Це лише природне явище."
  flavor_ayu.9.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ayu.9.desc: "У нашій землі з'явився найцікавіший чужинець. [target_character.GetName] плавав по всьому світу, про що чітко свідчить [target_character.GetHerHis] майстерність мов та практичні навички. [target_character.GetSheHe|U] привернув увагу [target_ruler.GetName], оскільки [target_character.GetSheHe] був би дуже корисним доповненням до [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], особливо з [target_character.GetHerHis] навичками в бухгалтерії. Однак включення іноземця на чільну посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle] безсумнівно викличе невдоволення серед найвпливовіших осіб у нашому [ROOT.GetCountry.GetFlavorRank], які, звичайно, не схвалюватимуть заміщення своїх позицій."
  flavor_ayu.9.historical_info: "Грецький авантюрист і купець Костянтин Фаулкон прибув до Сіаму в 1675 році, попрацювавши в Англійській Ост-Індській компанії. В Англії його оригінальне грецьке ім'я «Геракіс» було перекладено як «Фалькон», яке пізніше було змінено на «Фаулкон» як ре-еллінізація. Він працював при дворі короля Нарая як перекладач, оскільки вільно володів тайською, англійською, французькою, португальською та малайською мовами. Невдовзі він став радником короля, піднявшись до високого впливу при сіамському дворі.\n\nБагато членів королівського двору заздрили прихильності, яку король виявляв до нього, що стало кінцем для обох. Пра Пхетрача, прийомний брат Нарая, здійснив державний переворот на основі чуток про те, що Фаулкон хотів стати правителем, використовуючи Пхра Пуї, спадкоємця престолу, як маріонетку. Цей переворот був сіамською революцією 1688 року, під час якої Фаулкон і королівський спадкоємець були страчені, тоді як король Нарай помер через кілька днів, залишивши Пхетрачі проголосити себе новим королем Сіаму."
  flavor_ayu.9.a: "Цей [target_character.GetWomanMan] життєво важливий для нашого [ROOT.GetCountry.GetFlavorRank]!"
  flavor_ayu.9.b: "Іноземець завжди буде іноземцем."
  flavor_ayu.1000.title: "Питання [target_country.GetNameWithNoTooltip]"
  flavor_ayu.1000.desc: "Останніми роками колись могутня [target_country.GetLongName] стала не більше ніж підданою владі [target_origin_country.GetName]. Скориставшись нагодою отримати більший контроль над [target_country.GetNameWithNoTooltip], [target_ruler.GetName] висунув пропозицію призначити [target_ruler.GetHerHis] власного [target_origin_country.GetGovernment.GetHeirTitle] [target_country.GetGovernment.GetRulerTitle] [target_country.GetNameWithNoTooltip]. Це, безсумнівно, сприятиме подальшій інтеграції [target_country.GetFlavorRank] до [target_origin_country.GetNameWithNoTooltip] у майбутньому, що, безумовно, буде на користь обом."
  flavor_ayu.1000.historical_info: "Король Боромматрайлокканат, також відомий як Трайлок, був призначений у 1438 році королем Сукхотаї своїм батьком, королем Бороммарачатіратом II з Аюттхаї, коли помер король Маха Тхаммарача IV з Сукхотаї. На той момент йому було лише 7 років, а коли йому виповнилося 15, батько відправив його до столиці Сукхотаї, щоб він правив цими територіями від імені короля. Коли король Бороммарачатірат II помер, принц був коронований королем Боромматрайлокканатом з Аюттхаї, тим самим закріпивши союз між обома королівствами."
  flavor_ayu.1000.a: "Призначити [target_heir.GetNameWithNoTooltip] [target_country.GetGovernment.GetRulerTitle]."
  flavor_ayu.1000.b: "Надіслати їм пропозицію."
  flavor_ayu.1000.c: "Поточна ситуація поки що влаштовує."
  flavor_ayu.1001.title: "$flavor_ayu.1000.title$"
  flavor_ayu.1001.desc: "$flavor_ayu.1000.desc$"
  flavor_ayu.1001.a: "Прийняти [target_heir.GetNameWithNoTooltip]."
  flavor_ayu.1001.b: "Відхилити їхню пропозицію."
  flavor_ayu.1002.title: "Відповідь [target_country.GetNameWithNoTooltip]"
  flavor_ayu.1002.desc_heir_accepted: "[target_country.GetLongName] мудро вирішили прийняти нашого [ROOT.GetGovernment.GetHeirTitle] як свого нового [target_country.GetGovernment.GetRulerTitle]. Вони, безсумнівно, отримають вигоду від правління [target_heir.GetName] так само, як і ми отримаємо вигоду від тіснішого зв'язку з нашою адміністрацією."
  flavor_ayu.1002.desc_heir_refused: "Дурні з [target_country.GetName] відмовилися бути керованими [target_heir.GetName], і таким чином вони втратили будь-який шанс бути такими ж благословенними у своєму правлінні, як і ми. Однак це не останнє, що вони почують від нас, оскільки ми зробимо їх частиною нашої країни тим чи іншим способом."
  flavor_ayu.1002.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ayu.1002.b: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_ayu.1003.title: "[ROOT.GetCountry.GetNameWithNoTooltip] та [target_country.GetLongNameWithNoTooltip]"
  flavor_ayu.1003.desc: "Відтоді, як ми почали правити також у [target_country.GetLongNameWithNoTooltip], обидві наші країни тісніше пов'язалися. Багато хто навколо [target_ruler.GetName] пропонує формалізувати це шляхом повної інтеграції [target_country.GetNameWithNoTooltip] до [ROOT.GetCountry.GetLongName], таким чином об'єднавши обидві в єдиний [ROOT.GetCountry.GetFlavorRank]. Однак залишається питання, яка має бути головною назвою, навколо якої ми маємо об'єднатися."
  flavor_ayu.1003.a: "[GetCountry('AYU').GetNameWithNoTooltip] є новою силою."
  flavor_ayu.1003.b: "[GetCountry('SUK').GetNameWithNoTooltip] має більше традицій."
  flavor_ayu.1003.c: "У поточній ситуації немає нічого поганого."