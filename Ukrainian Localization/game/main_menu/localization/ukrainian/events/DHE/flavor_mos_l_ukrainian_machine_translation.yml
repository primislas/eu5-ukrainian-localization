l_english:
  flavor_mos.1.title: "Кампанії [ROOT.GetCountry.GetGovernment.GetRulerTitle] проти [GetCountry('NOV').GetNameWithNoTooltip]"
  flavor_mos.1.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] з [ROOT.GetCountry.GetName] протягом років розвивав ідею, що [GetCountry('NOV').GetLongName] необхідно принизити, аби утвердити владу своєї родини та утримати титул [GetCountry('NOV').GetGovernment.GetRulerTitle] [GetCountry('NOV').GetNameWithNoTooltip].\n\nНастав час втілити цю ідею в життя та провчити незалежних володарів [GetCountry('NOV').GetNameWithNoTooltip] так, щоб вони цього не забули."
  flavor_mos.1.a: "Настав час принизити [GetCountry('NOV').GetNameWithNoTooltip]!"
  flavor_mos.1.b: "Вони наші брати."
  flavor_mos.2.title: "Яжелбицький мирний договір"
  flavor_mos.2.desc: "Десятиліття суперництва між князівствами [GetCountry('MOS').GetName] та [GetCountry('NOV').GetName] добігає кінця, оскільки ми нарешті беремо над ними гору. Дехто радить нам заздалегідь підписати незначні договори як знак нашої неминучої перемоги. Інші при дворі бажають, щоб ми цього не робили, а натомість наполягали на більшому проти [GetCountry('NOV').GetName] задля слави вітчизни."
  flavor_mos.2.a: "Підпишімо кілька договорів, щоб полегшити виснаження."
  flavor_mos.2.b: "Ми можемо вимагати більшого!"
  flavor_mos.3.title: "Золота Вірність"
  flavor_mos.3.desc: "Наші шпигуни повертаються з новинами про те, що внутрішня стабільність [GetCountry('GLH').GetLongName] може руйнуватися. Наша вірність та підпорядкування їхній імперії сягають століть, проте, можливо, настав слушний час переглянути, де лежить наша лояльність. Можливо, в наших інтересах було б натомість об'єднатися з [GetCountry('LIT').GetLongName] і сподіватися, що будь-які [ShowCultureGroupName('tatar_group')] репресії будуть стримані таким кроком."
  flavor_mos.3.a: "Ми дурні, якщо віримо в це."
  flavor_mos.3.tt1: "Продовження лояльності до [ShowCultureGroupNameWithNoTooltip('tatar_group')] загарбників демонструє традицію"
  flavor_mos.3.b: "Час звільнитися від цих кайданів."
  flavor_mos.3.tt2: "Хоробрість, виявлена [target_root_country.GetGovernment.GetRuler.GetName], вважається ознакою сили та стійкості"
  flavor_mos.3.c: "Протистояти будь-якому іноземному впливу."
  flavor_mos.3.historical_info: "Московія та інші руські князівства продовжували платити данину татарам протягом чотирнадцятого століття. Коли Золоту Орду охопила внутрішня боротьба, вони розглядали, чи не кращим варіантом було б стати на бік зростаючої могутності Литви; однак вони продовжували свою традиційну зовнішню політику, поки до середини п'ятнадцятого століття не стало очевидним, що татарський вплив нарешті слабшає."
  flavor_mos.4.title: "Кремль"
  flavor_mos.4.desc: "Руські землі неодноразово піддаються набігам, і вкрай важливо, щоб ми могли захистити наш народ у часи лиха. Система укріплень навколо [target_location.GetName] не справляється із завданням і може бути захоплена, що відкине наш прогрес до становлення регіональною державою.\n\nМи повинні побудувати потужне укріплення зі стінами, що не матимуть собі рівних у цій місцевості."
  flavor_mos.4.a: "Нехай привезуть найкращу [ShowGoodsNameWithNoTooltip('lumber')]."
  threatened_by_military_expansion: "Загроза військових експансій"
  safe_haven_during_raids: "Забезпечує безпечний притулок під час набігів"
  flavor_mos.4.tt1: "Сусідні суперники сприймають будівництво потужного [ShowBuildingTypeNameWithNoTooltip('kremlin')] як ворожий акт"
  flavor_mos.4.tt2: "Сусідні піддані вважають будівництво потужного [ShowBuildingTypeNameWithNoTooltip('kremlin')] безпечним притулком під час набігів"
  flavor_mos.4.a.custom1: "Кожна сусідня країна втрачає [ShowBiasValue('threatened_by_military_expansion')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] [target_root_country.GetName]"
  flavor_mos.4.a.custom2: "Кожен сусідній [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowBiasValue('safe_haven_during_raids')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] [target_root_country.GetName]"
  flavor_mos.4.b: "Ми не бажаємо провокувати наших сусідів."
  flavor_mos.4.b.custom1: "Кожна сусідня країна отримує #G 3#! [Concept('trust', 'CONCEPT_PLACEHOLDER')|e] від [target_root_country.GetName]"
  flavor_mos.4.b.custom2: "Кожен сусідній [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowBiasValue('lack_of_protection')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [target_root_country.GetName]"
  lack_of_protection: "Брак захисту"
  mos_kremlin_construction: "Будівництво Кремля"
  flavor_mos.4.c: "Пограбувати [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] [ShowBuildingTypeNameWithNoTooltip('castle')] заради матеріалів."
  flavor_mos.4.tt3: "Майже вся необхідна [ShowGoodsName('clay')] та [ShowGoodsName('lumber')] здобувається шляхом примусового знесення [ShowBuildingTypeNameWithNoTooltip('castle')] у [castle_location.GetName]"
  flavor_mos.4.historical_info: "Оригінальний Московський Кремль був переважно збудований з дерева і включав не лише стіни та вежі, а й багато адміністративних будівель. Його будівництво було дорогим проєктом, але воно вважалося необхідним через доведену неефективність простих дерев'яних валів, що використовувалися до того часу проти повторних татарських набігів за рабами та ворожих облог."
  flavor_mos.5.title: "Сергій Радонезький"
  flavor_mos.5.desc: "Відлюдний чернець заснував невелику чернечу келію, присвячену життю власною працею. Келія швидко розвивається в посад, або поселення, з новими послідовниками, що прибувають щодня. Вчення привернуло увагу Патріарха, який сподівається надати чернечу грамоту, щоб дозволити [sergius_of_radonezh.GetShortName] поширювати [sergius_of_radonezh.GetHisHer] вчення по всій [ShowRegionName('russian_region')]."
  flavor_mos.5.a: "Чудотворець усього [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_mos.5.tt1: "[Concept('sergius_of_radonezh.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.5.b: "Неписьменний реформатор-шарлатан."
  flavor_mos.5.historical_info: "Сергій Радонезький був шанованим ченцем, якого вважають однією з найзначніших постатей у Російській Православній Церкві. За свого життя він заснував Троїце-Сергієву Лавру і відіграв ключову роль у реформуванні чернечого життя в Росії. Він шанується як святий і пам'ятається як духовний лідер у непевні часи."
  flavor_mos.6.title: "Троїце-Сергієва Лавра"
  flavor_mos.6.desc: "Чернеча келія, заснована [sergius_of_radonezh.GetName], продовжує приваблювати ченців з князівств, і в Сергієвому Посаді, поблизу [ShowLocationName('pushkino')], починає формуватися поселення, з допоміжними будівлями, такими як пекарня та кухня. Можливо, доцільно фінансувати це починання, щоб допомогти сформувати духовний центр для [ShowReligionAdjective('orthodox')] віри як засіб об'єднання наших братів і поширення істинного вчення."
  flavor_mos.6.a: "Гідна справа."
  flavor_mos.6.a.custom: "Швидке зростання поселення приваблює [ShowPopTypeName('clergy')] з усієї [ShowRegionName('russian_region')]"
  flavor_mos.6.tt: "Зосередження вірян поблизу столиці полегшує нагляд за релігійними справами"
  flavor_mos.6.b: "Віру можна сповідувати будь-де."
  mos_holy_trinity_st_sergius_lavra_construction: "Будівництво Свято-Троїцької Сергієвої Лаври"
  flavor_mos.6.historical_info: "Троїце-Сергієва Лавра була заснована в чотирнадцятому столітті і постійно розвивалася архітектурно з часом, і сьогодні може похвалитися кількома церквами та соборами. Вона вважається найважливішим монастирем у Росії та є духовним центром Російської Православної Церкви. Вона служить місцем поховання митрополитів і патріархів та має величезну колекцію релігійного мистецтва."
  flavor_mos.7.title: "Мощі преподобного Сергія"
  flavor_mos.7.desc: "Смерть шанованого ченця та духовного лідера, [sergius_of_radonezh.GetName], занурила країну в глибокий період жалоби. Обговорюється питання збереження його мощей для вшанування та паломництва, причому бажаним варіантом є їх виставлення у [ShowWorkOfArtName('holy_trinity_st_sergius_lavra')]. Хоча їх важче захищати, це глибоко резонує з вірянами та Церквою. Зрештою, мощі залишаються духовним і культурним клеєм, що тримає наше суспільство разом."
  flavor_mos.7.a: "Не має значення, де спочиває людина."
  flavor_mos.7.b: "Нехай реліквії доставлять до [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_mos.7.c: "Вони мають малу цінність."
  flavor_mos.7.historical_info: "Після смерті святого Сергія його спочатку поховали у скромній могилі в заснованому ним монастирі. Через три десятиліття після його смерті мощі були перевідкриті та виявилися нетлінними, що було витлумачено як чудодійний знак його святості. Мощі відіграли важливу роль у перетворенні Троїце-Сергієвої лаври на одне з найважливіших місць паломництва в Росії."
  flavor_mos.8.title: "[alexander_peresvet.GetNameWithNoTooltip]"
  flavor_mos.8.desc: "Відданий і дисциплінований воїн-монах [alexander_peresvet.GetName] готовий приєднатися до лав нашої грізної армії, коли ми знову зіткнемося з навислою язичницькою загрозою. [alexander_peresvet.GetHisHer|U] присутність на полі бою приносить не лише виняткові бойові навички, але й ритуалізований та лицарський стиль бою, що слугує джерелом натхнення, заохочуючи наші війська битися з хоробрістю та доблестю."
  flavor_mos.8.a: "Джерело натхнення та доблесті."
  STATIC_MODIFIER_NAME_monomachia: "Мономахія"
  flavor_mos.8.b: "Лідерів удосталь."
  flavor_mos.8.c: "Організувати тренування при дворі."
  flavor_mos.8.historical_info: "Олександр Пересвіт був руським православним ченцем, який брав участь у великих битвах між Монгольською Золотою Ордою та військами Великого князівства Московського. Його пам'ятають за те, що він викликав своїх ворогів на поєдинок на початку кожної битви, відомий як #italic мономахія#!, особливо одного разу, коли він виїхав вперед і хоробро переміг татарського чемпіона Челубея, згуртувавши та заохотивши руські війська захищати свою землю від монгольських загарбників."
  flavor_mos.9.title: "Калита"
  flavor_mos.9.desc: "Титул [ShowSpecialStatusName('tatar_tax_collector')] продовжує приносити великі вигоди, але є можливість для подальшого розвитку відносин з [GetCountry('GLH').GetName] шляхом збільшення зібраної данини з інших данників [GetUniqueInternationalOrganization('tatar_yoke').GetName]. Будь-який такий захід, безсумнівно, збільшить наші шанси на збереження титулу та його привілеїв."
  flavor_mos.9.a: "Необхідне зло для забезпечення нашої значущості."
  flavor_mos.9.tt1: "[GetCountry('GLH').GetGovernment.GetRulerTitle] отримує додаткові #G 25.00%#! данини, зібраної від [GetCountry('GLH').GetGovernment.GetRuler.GetHisHer] імені [target_root_country.GetGovernment.GetRuler.GetName]"
  flavor_mos.9.at: "Кожен член [GetUniqueInternationalOrganization('tatar_yoke').GetName] (крім [GetCountry('GLH').GetName]) втрачає [ShowBiasValue('bleeding_us_dry')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [ROOT.GetCountry.GetName]"
  bleeding_us_dry: "Виснажують нас"
  flavor_mos.9.b: "Вони й так терплять достатньо труднощів."
  flavor_mos.9.tt2: "Ефективна [Concept('spy_network', 'CONCEPT_PLACEHOLDER')|e] [GetCountry('GLH').GetNameWithNoTooltip] інформує [GetCountry('GLH').GetGovernment.GetRulerTitle], що ми приховуємо дуже корисну інформацію"
  flavor_mos.9.tt3: "[GetCountry('GLH').GetGovernment.GetRulerTitle] дізнається, що ми приховуємо дуже корисну інформацію"
  flavor_mos.9.tt4: "[GetCountry('GLH').GetGovernment.GetRulerTitle] залишається в невіданні"
  flavor_mos.9.historical_info: "Слово «Калита», що означає грошовий мішок, було вигадано для московського правителя Івана I, який був надзвичайно ефективним у зборі данини та податків від імені монгольських володарів. Забезпечивши прихильність Золотоординського $rank_kingdom_horde_ruler_suffix_male$, Московія була позбавлена руйнівних набігів, які часто гальмували розвиток її сусідніх князівств, що в довгостроковій перспективі значно сприяло подальшому піднесенню Московії як регіональної держави."
  flavor_mos.10.title: "Деньга та Рубль"
  flavor_mos.10.desc: "Можливість регулювати власну валюту має першочергове значення, якщо ми прагнемо утвердитися як великий центр торгівлі та комерції. Ми маємо нагоду створити новий набір монет, які можна використовувати виключно для внутрішніх операцій, або ж для торгівлі з нашими сусідами. Також є варіант карбування обох типів монет, але це створило б значний попит на [ShowGoodsName('silver')]."
  flavor_mos.10.a: "Ввести їх обидва в обіг."
  denga_ruble_key: "Деньга та Рубль"
  flavor_mos.10.b: "Нам не потрібна торгівля з іншими."
  flavor_mos.10.c: "Торгівля з нашими сусідами робить нас сильними."
  STATIC_MODIFIER_NAME_denga: "Денга"
  STATIC_MODIFIER_NAME_ruble: "Рубль"
  mos_silver_coinage_introduced: "Введено срібні монети"
  flavor_mos.10.historical_info: "Срібники були першими монетами, викарбуваними зі срібла в Київській Русі протягом X та XI століть. Пізніше, за часів татарського ярма, почали виробляти новий тип монет, що називався денга, наслідуючи срібні монети Золотої Орди. Хоча вони були запозичені з іноземного впливу, поступово вони почали набувати більш російської форми, давши також початок іншим типам монет, таким як гривна та рубль. Спочатку призначений бути альтернативою або навіть похідним від денги та гривни, рубль зрештою став основною валютою протягом XIV та XV століть."
  flavor_mos.11.title: "[andrei_rublev.GetNameWithNoTooltip]"
  flavor_mos.11.desc_common1: "Духовний живописець [andrei_rublev.GetName] продемонстрував винятковий талант до релігійної іконографії, оскільки [andrei_rublev.GetSheHe] вже створює кілька робіт, що прикрашають церкви на нашій території."
  flavor_mos.11.desc_common2: "[andrei_rublev.GetHisHer|U] винятковий талант був вихований візантійським вченим Феофаном Греком, який походить з [ShowLocationNameWithNoTooltip('constantinople')], і вважається, що цей вплив відіграв значну роль у формуванні [andrei_rublev.GetHisHer] стилю іконографії\n\n[andrei_rublev.GetSheHe|U] проживає в [ShowWorkOfArtName('holy_trinity_st_sergius_lavra')], де [andrei_rublev.GetSheHe] дотримується чеснот, встановлених монастирем, і продовжує збагачувати його церкви та собори."
  flavor_mos.11.desc_byzantine_master: "$flavor_mos.11.desc_common1$\n\n[andrei_rublev.GetHisHer|U] винятковий талант був вихований візантійським вченим Феофаном Греком, який походить з [ShowLocationNameWithNoTooltip('constantinople')], і вважається, що цей вплив відіграв значну роль у формуванні [andrei_rublev.GetHisHer] стилю іконографії."
  flavor_mos.11.desc_st_sergius_monk: "$flavor_mos.11.desc_common1$\n\n[andrei_rublev.GetSheHe|U] проживає в [ShowWorkOfArtName('holy_trinity_st_sergius_lavra')], де [andrei_rublev.GetSheHe] дотримується чеснот, встановлених монастирем, і продовжує збагачувати його церкви та собори."
  flavor_mos.11.desc_all_criteria_met: "$flavor_mos.11.desc_common1$\n\n$flavor_mos.11.desc_common2$"
  flavor_mos.11.a: "Межі монастиря добре підходять [andrei_rublev.GetHimHer]."
  flavor_mos.11.tt2: "[andrei_rublev.GetHisHer|U] таланти використовуються для збагачення релігійного мистецтва в [ShowWorkOfArtNameWithNoTooltip('holy_trinity_st_sergius_lavra')]"
  flavor_mos.11.tt3: "Вчення [andrei_rublev.GetHisHer] візантійського майстра значно збагачує [andrei_rublev.GetHisHer] навички"
  flavor_mos.11.b: "Нехай [andrei_rublev.GetHimHer] прикрасить наші собори."
  flavor_mos.11.tt4: "Спільна робота з [andrei_rublev.GetHisHer] візантійським майстром значно впливає на розвиток [target_root_country.GetAdjective] релігійного мистецтва."
  flavor_mos.11.c: "Немає потреби в додаткових фресках."
  flavor_mos.11.historical_info: "Андрій Рубльов вважається одним із найвидатніших середньовічних російських живописців і найбільше запам'ятався іконою Трійці, відомим шедевром російського мистецтва. Його творчість зазвичай характеризується обмеженою палітрою кольорів, гармонійними композиціями та використанням м'яких відтінків. Він став частим джерелом натхнення для художників і богословів і був канонізований у 1988 році."
  flavor_mos.12.title: "Свята Трійця"
  flavor_mos.12.desc: "Відомий іконописець [andrei_rublev.GetName] створив шедевр, що зображує Святу Трійцю, з трьома ангельськими фігурами, що сидять за столом, символізуючи Отця, Сина та Святого Духа. Він вишукано деталізований і демонструє характерні елементи, знайдені в інших роботах [andrei_rublev.GetHisHer], такі як гармонійне використання кольорів та скромна палітра."
  flavor_mos.12.a: "Туристичний магніт."
  flavor_mos.12.b: "Зосередитися на існуючих релігійних об'єктах."
  flavor_mos.12.tt1: "[andrei_rublev.GetNameWithNoTooltip] натомість працює над подальшим збагаченням релігійного мистецтва в [ShowWorkOfArtName('holy_trinity_st_sergius_lavra')]"
  flavor_mos.12.tt2: "Відданість, виявлена до духовних справ, глибоко цінується [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"
  flavor_mos.12.c: "Воно не пасує до килимів."
  flavor_mos.12.historical_info: "Свята Трійця, створена Андрієм Рубльовим близько 1410 року, вважається одним із найвидатніших творів релігійного мистецтва. Вона надихала митців і продовжує слугувати символом російської православної духовності. Твір заохочує до споглядання та молитви, а також до роздумів над його таємницями."
  flavor_mos.13.title: "Паперовий Заповіт"
  flavor_mos.13.desc: "Необхідність належної документації є вирішальною для запобігання суперечкам та підтримки спадкоємності. Наш шанований володар [ROOT.GetCountry.GetGovernment.GetRuler.GetName] вирішив скласти спадковий документ, повністю виготовлений з [ShowGoodsName('paper')], що окреслює [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] побажання та настанови щодо управління [ROOT.GetCountry.GetName] після [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] смерті."
  flavor_mos.13.a: "Паперова ідея."
  flavor_mos.13.tt1: "Запровадження [ShowGoodsNameWithNoTooltip('paper')] у державних справах зберігає владу та спадщину правлячої династії та може призвести до її ширшого впровадження"
  flavor_mos.13.b: "Зарезервувати його використання для релігійного переписування."
  flavor_mos.13.c: "Дорого і непотрібно."
  mos_paper_wills: "Паперові юридичні заповіти"
  flavor_mos.13.historical_info: "Першим правителем Московського князівства, який залишив заповіт або письмову волю, був Іван I, широко відомий як Іван Калита. Названий просто як #italic Спадщина Калити#!, він стосувався різних аспектів правління та управління, а також настанов щодо престолонаслідування та розподілу влади між його синами."
  flavor_mos.14.title: "Митрополит Олексій"
  flavor_mos.14.desc: "Новообраний митрополит [metropolitan_alexius.GetShortName] прагне сприяти політичним амбіціям [ROOT.GetCountry.GetName], на додаток до [metropolitan_alexius.GetHisHer] ролі в управлінні та розвитку [ShowReligionAdjective('orthodox')] Церкви. [metropolitan_alexius.GetHisHer|U] значний досвід може виявитися корисним для мистецтва правління та дипломатії, що є життєво важливим, якщо ми хочемо зайняти своє місце як законні правителі всієї Русі."
  flavor_mos.14.a: "Запросити [metropolitan_alexius.GetShortNameWithNoTooltip] до двору."
  flavor_mos.14.tt2: "[metropolitan_alexius.GetHisHer|U] вплив надихає [ROOT.GetCountry.GetGovernment.GetRuler.GetName] та заохочує до більш побожного способу життя"
  flavor_mos.14.b: "Нехай [metropolitan_alexius.GetHimHer] діє як регент."
  flavor_mos.14.c: "Руйнівний вплив."
  flavor_mos.14.tt3: "Опір духовному керівництву в державних справах ображає [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  STATIC_MODIFIER_NAME_spiritual_administrator: "Духовний адміністратор"
  STATIC_MODIFIER_NAME_metropolitan: "Митрополит"
  flavor_mos.14.historical_info: "Митрополит Олексій служив регентом і духовним наставником під час малолітнього правління Дмитра Донського і відіграв ключову роль у піднесенні Москви як великого політичного та релігійного центру. Як митрополит, Олексій брав участь у сприянні релігійній освіті, а також наглядав за будівництвом церков і монастирів."
  flavor_mos.15.title: "Годинникова Вежа"
  flavor_mos.15.desc: "Чернець і годинникар на ім'я Лазар тікає від війни та переслідувань зі своєї рідної землі [GetCountry('SER').GetName] і нещодавно оселився в [ShowLocationName('moscow')]. Він звернувся до [ROOT.GetCountry.GetGovernment.GetRuler.GetName] з проектами нового пристрою, названого 'механічним годинником', який автоматично відбивав години. Таке досягнення, безсумнівно, прославило б [ROOT.GetCountry.GetName] і стимулювало б наукову цікавість."
  flavor_mos.15.a: "Негайно розпочати будівництво."
  flavor_mos.15.tt1: "Годинник викликає благоговіння серед населення та приваблює інвестиції та нових мислителів."
  flavor_mos.15.b: "Поділитися його дизайном з нашими найвидатнішими умами."
  flavor_mos.15.c: "Візьміть повну заслугу за його винахід."
  flavor_mos.15.tt2: "Жадібна натура [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] призводить до того, що [target_root_country.GetGovernment.GetRuler.GetHimHer] привласнює собі заслугу за годинник"
  flavor_mos.15.historical_info: "Перша механічна годинникова вежа була побудована за часів правління Івана III і розташовувалася в Московському Кремлі. Вона використовувалася для оголошення важливих подій та часу, а також слугувала символом важливості та впливу Московії. На той час вона вважалася технічним дивом і була серед перших десяти таких передових годинників у Європі."
  flavor_mos.16.title: "Спірна спадщина"
  flavor_mos.16.desc: "Після монгольської навали вибір спадкоємця сильно залежав від $rank_kingdom_horde_ruler_suffix_male$, як засіб нацьковування різних князівств одне на одного та збереження балансу сил у [ShowRegionName('russian_region')] регіоні.\n\nНещодавно пролунали заклики до змін, оскільки нинішній правитель отримав владу через успадкування, як це передбачено в юридичному заповіті, складеному батьком [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer]. На жаль, схоже, що в контракті був пункт, який обіцяв лідерство близькому родичу [ROOT.GetCountry.GetGovernment.GetRuler.GetName], якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] успадкує трон у дуже молодому віці. Це правило відкрито оскаржується [pretender.GetName], який, схоже, вже зібрав значну підтримку серед населення."
  flavor_mos.16.a: "Шукати підтримки у [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_mos.16.a.custom: "Значна кількість [ShowPopTypeName('nobles')] втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і стає на бік [pretender.GetNameWithNoTooltip]."
  flavor_mos.16.b: "Шукати підтримки у [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_mos.16.b.custom: "Значна кількість [ShowPopTypeName('clergy')] та [ShowPopTypeName('peasants')] втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і стає на бік [pretender.GetNameWithNoTooltip]."
  flavor_mos.16.tt1: "[pretender.GetNameWithNoTooltip] відступає з [target_location.GetName] в очікуванні [pretender.GetHisHer] наступного кроку."
  flavor_mos.16.c: "Розповсюдити юридичний документ."
  flavor_mos.16.tt2: "Легітимність [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] зміцнюється завдяки чудово збереженому заповіту, повністю виготовленому з [ShowGoodsNameWithNoTooltip('paper')]"
  flavor_mos.16.tt3: "[pretender.GetNameWithNoTooltip] відступає з [target_location.GetName] і навряд чи збере багато послідовників."
  flavor_mos.16.d: "Звернутися безпосередньо до [GetCountry('GLH').GetGovernment.GetRuler.GetNameWithNoTooltip]."
  flavor_mos.16.tt4: "[GetCountry('GLH').GetName] просять підтвердити [GetCountry('GLH').GetGovernment.GetRuler.GetHisHer] підтримку [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_mos.16.tt5: "$rank_kingdom_horde_ruler_suffix_male$ може винести рішення на користь [pretender.GetNameWithNoTooltip]"
  war_of_succession_pretender: "POSTEDIT_Рюрикович-претендент"
  flavor_mos.16.historical_info: "У тринадцятому столітті руські князівства були відносно невеликими та слабкими, і кожен правитель потребував схвалення $rank_kingdom_horde_ruler_suffix_male$ Золотої Орди. У наступному столітті Московія зросла в могутності та спробувала кинути виклик владі монголів, дозволивши трону перейти до сина Василя I, правлячого князя. Після його смерті цей крок був оскаржений його братом через різні тлумачення його заповіту, і громадянська війна, що послідувала, призвела до десятиліть боротьби за владу, відомої як Московська війна за спадщину."
  flavor_mos.21.title: "Прикази"
  flavor_mos.21.desc: "Відсутність ефективної адміністрації розглядається як перешкода для [ROOT.GetCountry.GetName] зайняти своє законне місце серед великих держав. Ми могли б покращити управління, створивши низку відомств для нагляду за різними сферами державних справ, що, своєю чергою, може прискорити виконання різних указів [ROOT.GetCountry.GetGovernment.GetRuler.GetName] та допомогти централізувати владу."
  flavor_mos.21.a: "Як нам інакше функціонувати?"
  flavor_mos.21.tt1: "Створено кілька бюро, що дозволяє членам [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] наглядати за ними за допомогою [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]"
  enable_prikazi_reform: "Надає доступ до [ShowGovernmentReformName('prikazi_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.21.b: "Вільні віжки – запорука успіху."
  flavor_mos.21.historical_info: "Прикази – це адміністративні установи, що існували за часів Царства та ранньої Російської імперії. Вони були необхідні для впровадження політики та рішень Царя, а також займалися повсякденними функціями, пов'язаними з державними справами. Деякі з більших відомств займалися питаннями зовнішньої політики і були вирішальними в той час, коли Росія бачила себе оточеною ворогами і все ще боролася за утвердження своєї незалежності від Золотої Орди."
  flavor_mos.22.title: "[ShowGovernmentReformNameWithNoTooltip('razriadnyi_reform')]"
  flavor_mos.22.desc: "Існує небагато доступних записів про населення, власність та оподаткування, що ускладнює контроль над витратами та фінансування розширення нашої адміністрації. Ми могли б провести регулярний перепис, здійснюваний новоствореним [ShowGovernmentReformName('razriadnyi_reform')], який би надав детальні записи про осіб та домогосподарства по всій [ROOT.GetCountry.GetName], щоб оцінити ресурси та зобов'язання наших підданих."
  flavor_mos.22.a: "Дослідити кожен куточок і щілину."
  enable_razriadnyi_reform: "Надає доступ до [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('razriadnyi_reform')]"
  flavor_mos.22.b: "Порушення приватності та цілісності."
  flavor_mos.22.historical_info: "Військова канцелярія, #italic Разрядний Приказ#!, запровадила новий перепис як засіб визначення податкових зобов'язань населення на основі багатства, власності та соціального стану. Це також був спосіб забезпечити, щоб кожен стан надавав необхідну кількість солдатів та військових матеріалів відповідно до своїх зобов'язань. Записи стали інструментом для управління величезною та різноманітною територією."
  flavor_mos.23.title: "Угорський договір"
  flavor_mos.23.desc: "Грізна [GetCountry('LIT').GetName] є явною силою, що розвивається, і вона перебуває у конфлікті з [GetCountry('TEU').GetName], одночасно проводячи політику верховенства над східнослов'янськими територіями. Територія [ShowAreaName('smolensk_area')] наразі перебуває під нашим контролем, але, можливо, її можна було б передати їм, якщо будуть надані певні дипломатичні гарантії. Зробивши це, [GetCountry('LIT').GetNameWithNoTooltip] могла б безперешкодно перенаправити свої зусилля на умиротворення лицарів-хрестоносців, а ми могли б забезпечити, щоб вони також не прагнули проникнути на наші землі."
  flavor_mos.23.a: "Запропонувати умови."
  enable_state_controlled_church_reform: "Надає доступ до [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('state_controlled_church')]"
  flavor_mos.23.tt1: "Ми поступаємося [ShowAreaNameWithNoTooltip('smolensk_area')] [GetCountry('LIT').GetNameWithNoTooltip], якщо договір буде прийнято"
  flavor_mos.23.tt2: "Пропонується союз"
  flavor_mos.23.b: "Навіщо зволікати, коли ми можемо вдарити."
  flavor_mos.23.c: "Наші позиції повинні бути консолідовані в іншому місці."
  flavor_mos.23.historical_info: "Угорський договір був підписаний у 1408 році між Московським князівством та Великим князівством Литовським. Він передав спірну територію Смоленська в обмін на зміцнення дипломатичних відносин та короткочасний союз, дозволивши Литві зміцнити свої позиції та вплив у регіоні, а також сприяючи її боротьбі проти Тевтонського ордену."
  flavor_mos.24.title: "Вестіарій"
  flavor_mos.24.desc: "Королівська скарбниця залишається недокументованою та не має жодного інвентарю, що ускладнює встановлення загальної вартості накопичених активів. Нагально необхідно створити засоби для кращого управління нашим багатством, оскільки його можна використовувати для просування як дипломатичних цілей, так і для зміцнення управління [ROOT.GetCountry.GetFlavorRank]."
  flavor_mos.24.a: "Ефективне управління – ключ до успіху."
  flavor_mos.24.b: "Павутину дипломатії необхідно сплести."
  flavor_mos.24.custom: "Надає доступ до [Concept('law', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('vestiarium')]"
  flavor_mos.24.historical_info: "#italic Вестіарій#! Василя I був інвентарем цінних предметів, що належали королівській скарбниці. Він був запроваджений для створення фінансового та інвентарного обліку всього, починаючи від дорогоцінних металів, ювелірних виробів, текстилю та одягу, предметів, які могли бути використані для державних церемоній та дипломатичних подарунків."
  flavor_mos.25.title: "[sender.GetGovernment.GetRulerTitle] [sender.GetNameWithNoTooltip] погоджується на запропоновані умови"
  flavor_mos.25.desc_treaty_of_ugra: "Наші спроби укласти вигідний договір з [sender.GetName] увінчалися успіхом, обидві сторони підписали Угорський договір. Припинення бойових дій, можливо, призведе до більш процвітаючих відносин між нашими двома країнами та забезпечить наше виживання як незалежного [ROOT.GetCountry.GetFlavorRank].\n\nНаші дипломатичні зусилля, схоже, були варті того."
  flavor_mos.25.desc_generic_treaty: "Наші спроби укласти вигідний договір виявилися успішними, оскільки [sender.GetGovernment.GetRulerTitle] [sender.GetName] погодився підписати.\n\nНаші дипломатичні зусилля, схоже, були варті того."
  flavor_mos.25.a: "Багатообіцяючий початок."
  flavor_mos.25.tt1: "Ми поступаємо [ShowAreaNameWithNoTooltip('smolensk_area')] [GetCountry('LIT').GetNameWithNoTooltip]"
  flavor_mos.25.tt2: "Підписано [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] з [GetCountry('LIT').GetNameWithNoTooltip]"
  flavor_mos.25.b: "На здоров'я!"
  flavor_mos.26.title: "[sender.GetGovernment.GetRulerTitle] [sender.GetNameWithNoTooltip] відхиляє дипломатичну пропозицію"
  flavor_mos.26.desc_treaty_of_ugra_declined: "Вигідний договір, запропонований [sender.GetGovernment.GetRulerTitle] [sender.GetName], було відхилено. Очевидно, вони не бачать помилки у своїх діях і мусять і надалі стикатися із загрозами звідусіль.\n\nНаші дипломатичні зусилля, схоже, були марними."
  flavor_mos.26.desc_generic_treaty: "Наші спроби укласти вигідний договір виявилися безплідними, оскільки [sender.GetGovernment.GetRulerTitle] [sender.GetName] відмовляється підписувати.\n\nНаші дипломатичні зусилля, схоже, були марними."
  flavor_mos.26.a: "Це стане їхньою загибеллю."
  flavor_mos.26.b: "Можливо, помилка в судженні."
  flavor_mos.26.tt: "Довіра, надана [sender.GetName], втрачена"
  flavor_mos.27.title: "[maria_borovsk.GetNameWithNoTooltip]"
  flavor_mos.27.desc: "Спільна рекомендація [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] висунула відповідну кандидатуру для шлюбу з [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. [maria_borovsk.GetName], що походить зі знатного роду та відома [maria_borovsk.GetHimHer] побожністю та благодійними вчинками, стане чудовою парою як у державних, так і в сердечних справах."
  flavor_mos.27.a: "Благословенний союз."
  flavor_mos.27.tt1: "[Concept('maria_borovsk.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.27.tt2: "[maria_borovsk.GetHimHer|U] благодійні та побожні вчинки сприяють заснуванню монастиря [ShowLocationNameWithNoTooltip('borovsk')]"
  flavor_mos.27.b: "Нехай [maria_borovsk.GetHimHer] помістять у монастир."
  flavor_mos.27.tt3: "Численні діти [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] усувають потребу в іншому подружжі"
  flavor_mos.27.tt4: "Нестача дітей [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] та відмова одружуватися турбує [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_mos.27.historical_info: "Марія Боровська була руською православною черницею, яку пам'ятають за її шлюб з великим князем Василем II. Вона бачила, як її родину усунули від влади під час Московської війни за спадщину, і спочатку була вигнана з Москви, а згодом захоплена під час тривалої боротьби за владу. Пізніші етапи її життя були присвячені молитві, посту та служінню бідним."
  flavor_mos.28.title: "$uspensky_sobor$"
  flavor_mos.28.desc: "Нещодавно збудований [ShowBuildingTypeName('kremlin')] забезпечує безпеку нашого народу, але брак духовного життя в цих стінах перешкоджає розвитку нашої віри. Великий собор, присвячений Успінню Пресвятої Богородиці, міг би стати місцем коронацій та поховань майбутніх князів, а також служити символом наших великих прагнень об'єднати ці землі."
  flavor_mos.28.a: "Він відіграватиме центральну роль."
  mos_uspensky_sobor_construction: "Будівництво $uspensky_sobor$"
  flavor_mos.28.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] дуже вражені перспективою великого релігійного [Concept('building', 'CONCEPT_PLACEHOLDER')|e] будівництва"
  flavor_mos.28.b: "Натомість замовте серію релігійних творів мистецтва."
  flavor_mos.28.c: "Ймовірна ціль татарських набігів."
  flavor_mos.28.tt2: "Значний час витрачається на укріплення існуючих оборонних споруд"
  flavor_mos.28.historical_info: "Первісний Успенський собор Москви був збудований за правління Івана I і швидко став місцем проведення важливих релігійних церемоній, включно з коронаціями правителів. Він прийшов у занепад і згодом був перебудований у наступному столітті, з іще більшою пишністю та під сильним впливом візантійської архітектури."
  flavor_mos.29.title: "Пермська писемність"
  flavor_mos.29.desc: "Землі навколо нашого [ROOT.GetCountry.GetFlavorRank] ще не бачили світта Христового і не відмовилися від своїх хибних шляхів. Роль місіонерської праці є вирішальною для їхнього навернення, проте це залишається викликом через існуючі мовні бар'єри.\n\nОдин відданий місіонер, [stephen_of_perm.GetName], родом із далеких західних земель, але нині проживає в [ShowLocationName('perm')], розпочав сміливу місію, щоб принести вчення християнства цим ненаверненим душам. Щоб допомогти [stephen_of_perm.GetHimHer] у цьому починанні, [stephen_of_perm.GetSheHe] розпочав складне завдання створення нової мови, заснованої на східнослов'янській абетці та охоплюючої як кириличні, так і некириличні символи. Якщо її буде завершено, її можна буде використовувати для перекладу релігійних творів мовою, доступнішою для тих, хто ще не прийняв віру."
  flavor_mos.29.a: "Записуй, вікарію."
  STATIC_MODIFIER_NAME_cyrilic_scripter: "Творець кирилиці"
  flavor_mos.29.tt1: "[Concept('stephen_of_perm.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.29.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] раді ініціативі навернення заблукалих душ."
  flavor_mos.29.b: "Збереження віри понад усе."
  flavor_mos.29.tt3: "[stephen_of_perm.GetNameWithNoTooltip] повністю присвячує себе переписуванню релігійних творів."
  flavor_mos.29.historical_info: "Пермська писемність була розроблена Стефаном Пермським після того, як він вивчив мову та традиції комі, корінного етносу, що населяв віддалені східні території Московії. Він розробив окрему систему письма для їхнього використання, щоб полегшити навернення до християнства, і в процесі створив одну з найдавніших писемностей для уральської мови, що призвело до його призначення першим єпископом Пермським."
  flavor_mos.30.title: "[prokhor_of_gorodets.GetNameWithNoTooltip]"
  flavor_mos.30.desc: "Аскет [prokhor_of_gorodets.GetName] присвячує [prokhor_of_gorodets.GetHisHer] час створенню прекрасної релігійної іконографії між духовними роздумами. [prokhor_of_gorodets.GetHisHer|U] час можна було б краще використати для прикрашання нещодавно освяченого [ShowWorkOfArtName('uspensky_sobor')], щоб ще більше збагатити іконостас між навою та святилищем."
  flavor_mos.30.a: "Справу зроблено!"
  flavor_mos.30.tt1: "[Concept('prokhor_of_gorodets.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.30.tt2: "[prokhor_of_gorodets.GetHisHer|U] талант застосовується у створенні кількох фресок для [ShowWorkOfArtNameWithNoTooltip('uspensky_sobor')]"
  flavor_mos.30.b: "Немає потреби втручатися."
  flavor_mos.30.tt3: "[prokhor_of_gorodets.GetNameWithNoTooltip] вільно прикрашає, як [prokhor_of_gorodets.GetSheHe] забажає."
  flavor_mos.30.tt4: "[prokhor_of_gorodets.GetSheHe|U] виділяє час на наставництво [andrei_rublev.GetNameWithNoTooltip], і дует спільно сприяє створенню кількох релігійних фресок."
  flavor_mos.30.historical_info: "Прохор з Городця був руським православним ченцем, який відомий своєю роботою над релігійними творами Московського Благовіщенського собору, а саме фресками, що зображують розп'яття, вознесіння та успіння. Він присвятив своє життя служінню Церкві і був наставником талановитого Андрія Рубльова, який став одним з найвідоміших художників у руській історії."
  flavor_mos.31.title: "Юріїв день"
  flavor_mos.31.desc: "Згідно з указом Судебника, [ShowPopTypeName('peasants')] вільні змінювати свого роботодавця раз на календарний рік, зазвичай наприкінці сезону збору врожаю, щоб уникнути перебоїв у постачанні продовольства. Обмеження залишаються вкрай непопулярними серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які вимагають повернення свободи пересування по [ROOT.GetCountry.GetName] для покращення своїх умов праці."
  flavor_mos.31.a: "Немає вигоди від обмеження їхнього пересування."
  flavor_mos.31.b: "Якщо не зламано!"
  flavor_mos.31.c: "Задобрити їх, щоб вийти з цього."
  flavor_mos.31.tt1: "Умиротворення, виявлене щодо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')], послаблює здатність уряду зберігати контроль"
  flavor_mos.31.historical_info: "Закон Судебник був прийнятий у 1497 році та включав обмеження на пересування селянства, що зміцнило владу землевласників і майже встановило кріпацтво по всій Московії. В результаті, селянам дозволялося змінювати землевласника лише протягом двотижневого періоду, відомого як Юріїв день, що збігався з релігійним святом Святого Георгія. Обмеження були тимчасово послаблені під час правління Івана IV шляхом уточнення платежів, що належали землевласнику. Обмеження були суворо застосовані наприкінці XVI століття, супроводжуючись скасуванням будь-яких винятків, що закріпило встановлення повного кріпацтва."
  flavor_mos.32.title: "Пожиле"
  flavor_mos.32.desc: "Свобода пересування для [ShowPopTypeName('peasants')] дозволяє задовольняти нестачу робочої сили та заохочує здорову конкуренцію між землевласниками. Однак це також додає певну непевність у наше виробництво продовольства та перешкоджає довголіттю наших працівників, а також демотивує будь-які спроби зробити робочу силу продуктивнішою, оскільки землевласник не може бути впевненим, що працівники залишаться більше ніж на один сезон. Ми могли б запровадити плату за відхід, яка стягується з кожного, хто бажає залишити свого поточного землевласника, слугуючи стримуючим фактором для регулярної міграції робочої сили."
  flavor_mos.32.a: "Це метод батога і пряника."
  STATIC_MODIFIER_NAME_pozhiloye: "Пожиле"
  flavor_mos.32.b: "У цьому немає потреби."
  flavor_mos.32.historical_info: "Пожиле було запроваджено в 1550 році як частина великої реформи Судебника. Це був крок до зміцнення влади аристократії за рахунок селян, але перегляд також підтвердив право кожного працівника залишити свого роботодавця, якщо плата могла бути сплачена."
  flavor_mos.33.title: "[sophia_palaiologina.GetNameWithNoTooltip]"
  flavor_mos.33.desc: "Падіння [ShowLocationName('constantinople')] надало нам можливість одружитися з колишнім правлячим класом [GetCountry('BYZ').GetName]. Рука [sophia_palaiologina.GetName] в шлюбі привнесла б вплив візантійської культури до двору, зміцнила б нашу претензію як природного наступника Римської імперії та носія [ShowReligionAdjective('orthodox')] віри, а будь-яке потомство [ROOT.GetCountry.GetGovernment.GetRulerTitle] могло б претендувати на походження від імператорів занепалої імперії."
  flavor_mos.33.a: "Пророкований шлюб."
  flavor_mos.33.tt1: "[Concept('sophia_palaiologina.GetNameWithNoTooltip] додається як [character', 'CONCEPT_PLACEHOLDER')|e]"
  enable_byzantine_court_ceremonies_reform: "Надає доступ до [ShowGovernmentReformName('byzantine_court_ceremonies_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.33.tt2: "[sophia_palaiologina.GetHisHer|U] обурення, виявлене щодо певних дипломатів, псує дипломатичні відносини між [Concept('target_root_country.GetName] та її [heathen', 'CONCEPT_PLACEHOLDER')|e] сусідами"
  STATIC_MODIFIER_NAME_mongol_intolerance: "Монгольська нетерпимість"
  flavor_mos.33.b: "Це дає мало переваг."
  flavor_mos.33.historical_info: "Шлюб між Іваном III та Софією Палеолог запровадив складні придворні церемонії та етикет до московського двору, що допомогло зміцнити його претензії на Третій Рим. Софія народила одинадцять дітей і стала бабусею сумнозвісного Івана Грозного. Її нетерпимість до монгольського панування спричинила кілька дипломатичних інцидентів і допомогла прискорити відрив Московії від Золотої Орди в 1480 році."
  flavor_mos.34.title: "[ridolfo_fioravanti.GetNameWithNoTooltip]"
  flavor_mos.34.desc: "Архітектор епохи Відродження та майстер-інженер [ridolfo_fioravanti.GetName] вирушив у подорож до [ShowLocationName('moscow')] на запрошення [ROOT.GetCountry.GetGovernment.GetRuler.GetName], який бажає посилити архітектурну пишність [ShowBuildingTypeName('kremlin')]. Якщо його залучити до роботи, [ridolfo_fioravanti.GetHisHer] західні впливи, безсумнівно, поширяться по [ROOT.GetCountry.GetFlavorRank] і піднімуть наш статус серед європейських держав."
  flavor_mos.34.a: "Приведіть [ridolfo_fioravanti.GetHisHer] генія сюди."
  flavor_mos.34.tt1: "[Concept('ridolfo_fioravanti.GetNameWithNoTooltip] додається як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.34.tt2: "[ridolfo_fioravanti.GetHeShe|U] приносить найновіші будівельні техніки та впливи Відродження"
  flavor_mos.34.tt3: "[ridolfo_fioravanti.GetHeShe|U] береться за перепланування [ShowWorkOfArtName('uspensky_sobor')], включаючи найновіші стилі"
  flavor_mos.34.tt4: "[ridolfo_fioravanti.GetHeShe|U] досвід у гідравлічній інженерії покращує інфраструктуру [ShowLocationNameWithNoTooltip('moscow')]"
  flavor_mos.34.b: "Іноземні впливи небажані."
  flavor_mos.34.historical_info: "Рідольфо «Арістотель» Фіораванті був відомим італійським архітектором та інженером, який працював над кількома проєктами в Італії, перш ніж переїхати до Москви в 1475 році. Він отримав запрошення від Івана III Московського, який хотів підняти статус Москви до рівня інших європейських міст. Рідольфо пам'ятають за проєктування Успенського собору в стінах Кремля."
  flavor_mos.35.title: "[marco_ruffo.GetNameWithNoTooltip]"
  flavor_mos.35.desc_kremlin: "Військовий архітектор [marco_ruffo.GetName] прибув з [ShowLocationName('milano')] і пропонує контракт на роботу для посилення оборонних можливостей [ShowBuildingTypeName('kremlin')] шляхом будівництва серії веж, що супроводжуватимуть навколишні стіни. $flavor_mos.35.desc_common$"
  flavor_mos.35.desc_defensiveness: "Військовий архітектор [marco_ruffo.GetName] прибув з [ShowLocationName('milano')] і пропонує контракт на роботу для впровадження низки заходів, спрямованих на посилення оборонних можливостей [ROOT.GetCountry.GetFlavorRank]. $flavor_mos.35.desc_common$"
  flavor_mos.35.desc_common: "Будь-яка така ініціатива, безсумнівно, сприятиме передачі знань із заходу на схід, а також зміцнить нашу позицію в [ShowRegionName('russian_region')]."
  flavor_mos.35.a: "Креслярські дошки напоготові."
  flavor_mos.35.tt1: "[Concept('marco_ruffo.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.35.tt2: "[marco_ruffo.GetHeShe|U] посилює оборонні можливості [ShowBuildingTypeName('kremlin')], вбудовуючи серію веж у ділянки стін, що оточують [ShowLocationName('moscow')]"
  flavor_mos.35.tt3: "[marco_ruffo.GetHeShe|U] запроваджує новітні оборонні стратегії та впливи Відродження"
  flavor_mos.35.b: "Найкращий напад — це добра оборона."
  flavor_mos.35.c: "Нехай [marco_ruffo.GetHimHer] навчає наші найвидатніші уми."
  flavor_mos.35.tt4: "[marco_ruffo.GetHerHis|U] досвід у мистецтві оборони поширюється серед місцевих архітекторів, сприяючи поширенню знань."
  flavor_mos.35.d: "Нехай [marco_ruffo.GetHimHer] замість цього спроєктує бенкетний палац."
  flavor_mos.35.tt5: "Вишукано прикрашений новий палац стає головним місцем для коронацій, бенкетів та офіційних прийомів."
  flavor_mos.35.historical_info: "Марко Руффо був запрошений Іваном III Московським у рамках ініціативи з покращення міжнародного становища князівства та допомоги Московії у відстоюванні її незалежності від Золотої Орди. Місто вже кілька разів успішно грабували, і князь був сповнений рішучості зміцнити його оборону. Руффо, у цьому контексті, також відомий своїм проєктом Грановитої палати."
  flavor_mos.36.title: "Жахлива Мати"
  flavor_mos.36.desc: "Відсутність спадкоємців викликає занепокоєння, і мало що вказує на те, що [current_wife.GetName] зможе народити його найближчим часом. Хоча Церква не повністю схвалює це, все ж може бути мудро розглянути можливість пошуку менш безплідної дружини для [ROOT.GetCountry.GetGovernment.GetRuler.GetName], щоб забезпечити спадкоємність династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. [eleanor_glinskaya.GetName], відома [eleanor_glinskaya.GetHisHer] красою та молодістю, потенційно могла б зміцнити [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip], однак [eleanor_glinskaya.GetSheHe] сповідує [ShowReligionAdjective('shamanism')] віру, і такий шлюб, ймовірно, зустріне сильний опір з боку [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_mos.36.a: "Династія понад усе."
  STATIC_MODIFIER_NAME_terrible: "Жахливо"
  flavor_mos.36.tt1: "[Concept('eleanor_glinskaya.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e] і народжує [ivan_the_terrible.GetName]"
  flavor_mos.36.b: "Стара кайдана ще може народити спадкоємця."
  flavor_mos.36.historical_info: "Олена Глинська була татарського походження і належала до знатного литовського роду Глинських. Мало що відомо про її виховання, і її найбільше пам'ятають за народження Івана Грозного, який став першим царем Росії. Вона правила як регент після смерті чоловіка, і на цій посаді успішно провела кілька реформ та домовилася про перемир'я з конкуруючим Литовським князівством."
  flavor_mos.37.title: "Велика пожежа в Москві"
  flavor_mos.37.desc: "Пожежа невідомого походження охоплює наше велике місто [ShowLocationName('moscow')]. Використання легкозаймистих будівельних матеріалів у багатьох будівлях, таких як [ShowGoodsName('lumber')], сприяє її швидкому поширенню, залишаючи мало безпечних притулків. Наслідки цієї трагедії, безсумнівно, відчуватимуться протягом багатьох років."
  flavor_mos.37.a: "Що це за божественна кара!"
  flavor_mos.37.tt1: "Вогонь знищує кілька історичних скарбів та артефактів"
  flavor_mos.37.tt2: "Полум'я охоплює Кремль і запалює порох, що зберігається в оборонних вежах"
  flavor_mos.37.tt3: "Вогонь знищує деякі історичні скарби та артефакти"
  flavor_mos.37.b: "Могло бути й гірше."
  flavor_mos.37.historical_info: "Москва була спустошена вогнем у 1547 році, коли пожежа спалахнула і знищила частини міста, які були повністю побудовані з дерева. Кремль не уникнув руйнування, але більшість релігійних будівель пережили пожежу. Фольклор та історичні свідчення того часу припускали, що провину швидко поклали на родичів матері покійного царя, Олени Глинської, яких звинуватили в шаманській магії, що спричинила пожежі."
  flavor_mos.38.title: "Лаврське паломництво"
  flavor_mos.38.desc: "Монастир [ShowWorkOfArtName('holy_trinity_st_sergius_lavra')] у Сергієвому Посаді, поблизу [ShowLocationName('pushkino')], перетворився на справжнє місце усамітнення для [ShowPopTypeName('clergy')], зі стабільним зростанням кількості паломників, приваблених до шанованого місця. Ми повинні розглянути можливість офіційного визнання його головним місцем [ShowReligionAdjective('orthodox')] віри, щоб підкреслити зростаючий вплив [ROOT.GetCountry.GetName]."
  flavor_mos.38.a: "Знаменна подія для істинно віруючих."
  flavor_mos.38.b: "Це може спричинити розкол у Церкві."
  flavor_mos.38.historical_info: "Троїце-Сергієва лавра стала головним місцем паломництва приблизно через століття після її будівництва і вважається духовним та культурним центром російського православ'я. Це не лише релігійне місце, а й сховище кількох культурних та мистецьких скарбів. Незважаючи на своє вразливе розташування, вона пережила періоди політичних та соціальних потрясінь, включаючи Смутний час та радянську епоху."
  flavor_mos.39.title: "[target_country.GetAdjectiveWithNoTooltip] Експедиція"
  flavor_mos.39.desc: "Постійні рейди за рабами, організовані [target_country.GetName], виснажують наші людські резерви та сіють хаос у сільській місцевості. Ми повинні знищити здатність татар здійснювати ці рейди, інакше ризикуємо не змогти адекватно захистити наші кордони."
  flavor_mos.39.a: "Превентивний удар."
  flavor_mos.39.b: "Окупація марна."
  flavor_mos.39.c: "Краще витратити на підготовку наших сил."
  flavor_mos.39.tt1: "Проводиться серія військових навчань"
  flavor_mos.39.historical_info: "Протягом п'ятнадцятого та шістнадцятого століть Велике князівство Московське брало участь у кількох військових кампаніях проти кримських татар. Московія часто піддавалася спустошливим рейдам за рабами з боку татар і прагнула покласти їм край, зменшивши їхні можливості для набігів."
  flavor_mos.40.title: "Ображений нащадок"
  flavor_mos.40.desc: "Надійшли тривожні новини з двору [GetCountry('LIT').GetName], які свідчать про спроби навернути [target_character.GetName], члена династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], до [ShowReligionAdjective('catholic')] віри. Це вимагає рішучої відповіді і потенційно може стати каталізатором для досягнення ширших стратегічних цілей."
  flavor_mos.40.a: "Така образа має бути помщена!"
  flavor_mos.40.tt1: "Погані дипломатичні навички [target_root_country.GetGovernment.GetRuler.GetName] призводять до розриву всіх дипломатичних зв'язків"
  flavor_mos.40.b: "Вимагати їхньої беззастережної покори."
  flavor_mos.40.tt2: "[GetCountry('LIT').GetNameWithNoTooltip] розглядає щедрі умови, представлені їм"
  flavor_mos.40.c: "Організувати розлучення для [target_character.GetNameWithNoTooltip]."
  flavor_mos.40.tt3: "Дипломатичні навички [target_root_country.GetGovernment.GetRuler.GetName] забезпечують розлучення та відвертають війну"
  flavor_mos.40.historical_info: "У 1500 році Іван III отримав повідомлення про те, що його дочка Олена, яка була одружена з великим князем Литовським Олександром, піддавалася жорстокому поводженню та примусу відмовитися від православної віри, що порушувало умови їхнього шлюбного договору. Скориставшись цією інформацією як приводом, Московія оголосила війну Литві. Ворожі дії завершилися мирним договором, за яким значна частина литовської території була передана, включаючи ключові регіони, такі як історичне місто Київської Русі Чернігів."
  flavor_mos.41.title: "Збирання земель Руських"
  flavor_mos.41.desc: "Династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] має стратегічний вплив на численні престоли в [ShowRegionName('russian_region')], проте внутрішні розбрати та конфлікти перешкоджають об'єднанню наших прабатьківських земель. Необхідно розірвати ці зв'язки та утвердити панування [ROOT.GetCountry.GetName], незважаючи на будь-який опір."
  flavor_mos.41.a: "Слабкі загинуть."
  flavor_mos.41.tt1: "Агресивна риторика [target_root_country.GetGovernment.GetRuler.GetName] зустрічає несхвалення сусідніх держав"
  flavor_mos.41.b: "У нашому розпорядженні є інші засоби."
  flavor_mos.41.c: "Використати юридичний привід для захоплення землі."
  flavor_mos.41.tt2: "Використовуючи двозначності в Судебнику, [target_root_country.GetGovernment.GetRuler.GetName] знаходить юридичний привід для захоплення додаткових земель та консолідації влади."
  flavor_mos.41.historical_info: "За правління Івана III Московія зазнала значного територіального розширення, оскільки князівство стратегічно захоплювало землі у заборгованих князів та родичів. Ця тактика, використовуючи їхні фінансові зобов'язання, служила зміцненню контролю Москви над руськими землями."
  flavor_mos.42.title: "Отруйне регентство"
  flavor_mos.42.desc: "Регентство [target_character.GetName] не до вподоби [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які, як виявилося, змовилися разом з родичами покійного [last_ruler.GetName], щоб скинути і навіть убити [target_character.GetHimHer]. Ми повинні завдати удару, перш ніж вони встигнуть здійснити свій план, інакше ризикуємо вкинути [ROOT.GetCountry.GetName] у політичні заворушення."
  flavor_mos.42.a: "Немає місця узурпаторам."
  flavor_mos.42.b: "Вигнати винних."
  flavor_mos.42.tt1: "[target_character.GetName] отруєно"
  flavor_mos.42.c: "Простягнути оливкову гілку."
  flavor_mos.42.tt2: "[target_character.GetName] виживає після замахів на [target_character.GetHimHer] життя"
  flavor_mos.42.historical_info: "Олена Глинська правила як регентка в перші роки правління Івана IV, з 1533 по 1538 рік. Цей період характеризувався політичними інтригами та боротьбою за владу при дворі, і сама Олена стикалася з викликами з боку конкуруючих боярських фракцій, а також братів покійного Василя III. Вона наказала заарештувати обох братів і успішно захопила їхні землі в ім'я свого сина. Незважаючи на їхнє захоплення, вона померла в 1538 році, найімовірніше, отруєна боярином."
  flavor_mos.43.title: "[ShowCultureGroupNameWithNoTooltip('tatar_group')] Слобода"
  flavor_mos.43.desc: "[target_location.GetRank.GetName] [target_location.GetName] продовжує розширюватися, але процес перетворення її на регіональну потугу можна прискорити, сприяючи міграції з навколишніх територій. [ShowCultureGroupName('tatar_group')] можна заохотити до участі в цій ініціативі, виділивши їм визначену територію за стінами. Таке розташування дозволить їм зберегти свою культуру та релігію, водночас сприяючи економічному зростанню через збільшення населення."
  flavor_mos.43.a: "Заохочувати [ShowCultureGroupNameWithNoTooltip('tatar_group')] імміграцію."
  flavor_mos.43.b: "Зараз не час і не місце."
  flavor_mos.43.a.custom: "[ShowCultureGroupNameWithNoTooltip('tatar_group')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] з усього [ShowRegionName('steppes_region')] мігрують до нещодавно заснованої Татарської Слободи в [target_location.GetNameWithNoTooltip]"
  flavor_mos.43.historical_info: "Будівництво Татарської Слободи в Москві розпочалося, коли місто зростало в розмірах та значенні. Слободи служили житловими районами за межами міських стін, але також перетворилися на центри економічного та культурного обміну, додаючи до економічного процвітання міста."
  flavor_mos.44.title: "Плоди західного навчання"
  flavor_mos.44.desc: "Завоювання [GetCountry('NOV').GetName] та загальне розширення території під [ROOT.GetCountry.GetName] заклали основу для грізної держави. З іншого боку, це зростання принесло західні впливи до нашого порогу, включаючи потенційні небезпеки, які можуть вкоренитися в тканині нашого суспільства. Щоб підтримувати надійне управління цими величезними землями, ми повинні утвердити свою владу, придушити інакомислення та протистояти несприятливому впливу [ShowReligionAdjective('catholic')] віри."
  flavor_mos.44.a: "Свободу слід викорінити."
  STATIC_MODIFIER_NAME_territorial_aggrandizement: "Територіальне розширення"
  flavor_mos.44.b: "Прийняти всі впливи."
  STATIC_MODIFIER_NAME_curtailed_ambitions: "Обмежені амбіції"
  flavor_mos.44.historical_info: "Іван III значно розширив територію Московії, що допомогло покласти край пануванню Золотої Орди над Руссю та централізувати контроль над місцевими правителями. Однак антикатолицька позиція Івана призвела до придушення свободи на руських землях та зведення бар'єру між Московією та Заходом, що уповільнило поширення нових ідей та наукового прогресу, який відбувався по всій Європі."
  flavor_mos.45.title: "[ivan_fyodorov.GetNameWithNoTooltip]"
  flavor_mos.45.desc: "Майстер чорнила та паперовий чарівник [ivan_fyodorov.GetName] прагне встановити новітній пристрій, що прибув аж із [GetInstitutionByKey('printing_press').GetOrigin.GetName]. Це матиме глибокий вплив на суспільство та революціонізує спосіб виробництва всього, від літератури до офіційних документів."
  flavor_mos.45.a: "Негайно відкрити майстерню."
  flavor_mos.45.tt1: "Ксенофобські тенденції [target_root_country.GetAdjective] протистоять впровадженню іноземних впливів"
  flavor_mos.45.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не схвалює конкуренції, яку створює друкарський верстат для його писарів"
  flavor_mos.45.b: "Старі звичаї набагато кращі."
  flavor_mos.45.historical_info: "Іван Федоров був російським друкарем та видавцем, якого часто вважають першим, хто запровадив друкарство в Росії. У 1564 році він заснував першу друкарню в Москві за підтримки царя Івана IV і керував друком першої книги в Росії, а саме #italic Апостола#!."
  flavor_mos.46.title: "Апостол"
  flavor_mos.46.desc: "Друковані матеріали, особливо релігійні тексти, продовжують бути великим внеском у підвищення грамотності та освіти, що робить їх стандартизацію все більш важливою. Завдяки нещодавно збудованій [ShowBuildingTypeName('printing_press_shop')] у [target_location.GetName], [target_artist.GetName] може надрукувати першу датовану книгу та видання #italic Діянь та Послань Апостолів#!, демонструючи останні технологічні досягнення."
  flavor_mos.46.a: "Дозволити вільно розповсюджувати."
  STATIC_MODIFIER_NAME_the_apostle_wide_distribution: "Апостол"
  flavor_mos.46.b: "Лише для елітних очей."
  flavor_mos.46.tt1: "Книга коротко висвітлює заснування першої державної друкарні, викликаючи інтерес у [target_location.GetNameWithNoTooltip]."
  STATIC_MODIFIER_NAME_the_apostle: "Апостол"
  flavor_mos.46.c: "Приготувати маркер."
  flavor_mos.46.tt2: "Книга зазнає суттєвих переглядів для підвищення її ефективності відповідно до [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_mos.46.historical_info: "Видання #italic Апостола#! стало значним фактором культурного розвитку Росії. Воно уможливило перехід від рукописних манускриптів до друкованих книг, що зробило релігійні тексти доступнішими. Це також сприяло релігійній освіті народу, що допомогло зміцнити християнські вірування."
  flavor_mos.47.title: "Вчення Ніла Сорського"
  flavor_mos.47.desc: "Духовний піонер Ніл Сорський виступає за реформу Церкви у відповідь на багатство та матеріалізм, що проникли в деякі [ROOT.GetCountry.GetAdjective] монастирі. Його рух, відомий як нестяжателі, пропонує повернутися до принципів бідності та смирення, з акцентом на простий спосіб життя, повністю присвячений вченням Христа. Будь-які такі спроби, ймовірно, зустрінуть опір з боку встановленої Церкви, яка вважає за необхідне зберегти деяке матеріальне багатство для виконання своїх функцій."
  flavor_mos.47.a: "Підтримати нестяжателів."
  flavor_mos.47.b: "Підтримати власників."
  flavor_mos.47.custom1: "Надає доступ до [ShowLawName('monastic_reformation_movement')] [Concept('law', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.47.custom2: "[Concept('policy', 'CONCEPT_PLACEHOLDER')|e] за [ShowLawName('monastic_reformation_movement')] [Concept('law', 'CONCEPT_PLACEHOLDER')|e] може бути змінена лише раз на десять років"
  flavor_mos.47.historical_info: "Ніл Сорський був російським православним ченцем, який допоміг сформувати рух, відомий як нестяжателі. Він складався з ченців, які прагнули суворого дотримання чернечої бідності, тим самим критикуючи володіння землею та багатством монастирями. Вчення зустріло опір з боку деяких представників Церкви, які були проти запропонованих змін. Проте його вчення залишило тривалий слід у російській духовності, і Ніл Сорський сьогодні шанується як святий у Східній Православній Церкві."
  flavor_mos.48.title: "Школа Строганових"
  flavor_mos.48.desc: "Заможна купецька родина [ShowDynastyName('stroganov_dynasty')] є сильними прихильниками мистецтв і розглядає можливість спонсорства місцевої школи для створення релігійних ікон, багато з яких використовуються для прикраси їхніх численних палаців по всьому [ROOT.GetCountry.GetFlavorRank]. Будь-які твори мистецтва, створені школою, будуть розроблені спеціально для приватного використання і навряд чи принесуть користь країні в цілому, але підтвердять підтримку могутньої родини та сприятимуть духовному благополуччю [ROOT.GetCountry.GetName]."
  flavor_mos.48.a: "Ми підтримуємо один одного."
  flavor_mos.48.b: "Натомість просувати їхній бізнес."
  flavor_mos.48.c: "Нехай вони мають вплив при дворі."
  enable_stroganov_influences_cabinet_action: "[Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('stroganov_influences')] стає доступною для членів династії [ShowDynastyNameWithNoTooltip('stroganov_dynasty')]"
  flavor_mos.48.historical_info: "Строгановська школа іконопису була заснована в період розквіту середньовічного живопису в Росії, передуючи початку вестернізації мистецтва, яка пізніше поширилася на Східну Європу. Створене мистецтво було значною мірою відображенням смаків королівських і знатних покровителів, зрештою включаючи царя. Школа користувалася популярністю до заснування Санкт-Петербурга, що прискорило її занепад, оскільки західні впливи поступово закріпилися."
  flavor_mos.49.title: "Сказання про князів Володимирських"
  flavor_mos.49.desc: "Вважається, що династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] веде свій родовід від римських імператорів, проте цей зв'язок залишається фольклорною оповіддю з незначним значенням. Складання трактату могло б забезпечити ідеологічне підґрунтя для [ROOT.GetCountry.GetGovernment.GetRulerTitle], надаючи підтримку імперській спадщині, гідній царя."
  flavor_mos.49.a: "Родовід беззаперечний."
  flavor_mos.49.tt1: "Перекладацькі здібності [dmitry_gerasimov.GetName] сприяють поширенню ідеї [target_root_country.GetNameWithNoTooltip ] як Третього Риму"
  flavor_mos.49.b: "Марновірні нісенітниці."
  flavor_mos.49.c: "Нехай сказання прикрасить стіни [ShowWorkOfArtName('uspensky_sobor')]."
  flavor_mos.49.historical_info: "#italic Сказання про князів Володимирських#! було написано або Дмитром Герасимовим, або Пахомієм Сербом на початку шістнадцятого століття і було створено для надання передісторії, яка мала бути використана для царя на коронаційних церемоніях. Його основною метою було встановлення історичного зв'язку між Московським князівством та римськими імператорами, зокрема Августом, але воно також слугувало засобом для формування ідеї Москви як Третього Риму та природного наступника Східної Римської імперії, яка занепала після завоювання Константинополя."
  flavor_mos.50.title: "[dmitry_gerasimov.GetNameWithNoTooltip]"
  flavor_mos.50.desc: "Лінгвістичний світило та вправний дипломат [dmitry_gerasimov.GetName] вільно володіє кількома мовами, що є спадщиною [dmitry_gerasimov.GetHisHer] наукових років у [GetCountry('LIV').GetLongName]. Цей затребуваний набір навичок міг би бути дуже корисним, призначивши [dmitry_gerasimov.GetHimHer] послом до іноземних дворів, посада, яка, безсумнівно, передбачає зустрічі з іншими вченими Відродження та просування дипломатичної репутації [ROOT.GetCountry.GetName]. Альтернативно, [dmitry_gerasimov.GetHisHer] досвід у мовах може знайти краще застосування у перекладі релігійних текстів для підтримки подальшого поширення християнства."
  flavor_mos.50.a: "Міжнародна слава є важливою."
  flavor_mos.50.tt2: "[dmitry_gerasimov.GetSheHe|U] проводить значний час, відвідуючи іноземні двори, де [dmitry_gerasimov.GetSheHe] передає деталі географії [target_root_country.GetName]"
  flavor_mos.50.tt3: "[dmitry_gerasimov.GetSheHe|U] коротко відвідує [ShowLocationName('rome')], що дозволяє [dmitry_gerasimov.GetHimHer] документувати різні наукові пристосування"
  flavor_mos.50.b: "Старі звичаї набагато кращі."
  flavor_mos.50.tt4: "[dmitry_gerasimov.GetSheHe|U] перекладає значну кількість релігійних текстів, посилюючи [ShowReligionAdjective('orthodox')] вплив, що дуже тішить [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"
  flavor_mos.50.historical_info: "Дмитро Герасимов був відомим перекладачем і дипломатом, якому приписують авторство «Повісті про князів Володимирських». Він також служив перекладачем у московських посольствах у Центральній та Північній Європі, а під час візиту до Риму був ненадовго призначений послом у рамках зусиль Папи зі збору підтримки для антиосманської коаліції."
  flavor_mos.51.title: "Шапка Мономаха"
  flavor_mos.51.desc: "Вишукана шапка, прикрашена рубінами, смарагдами та золотим оздобленням, відігравала роль у коронаціях протягом досить тривалого часу, проте її походження залишається предметом наукових дебатів. Легенда свідчить, що шапка була подарунком від візантійських імператорів, хоча це твердження походить із народної казки і не має надійного джерела. Зі зростанням впливу правлячої еліти та постійною потребою підтверджувати божественне правління виникає можливість сформувати наратив і встановити єдину версію походження регалії."
  flavor_mos.51.a: "Заявити про її візантійське походження."
  flavor_mos.51.b: "Відстоювати її божественне походження."
  flavor_mos.51.c: "Вона явно татарського дизайну."
  flavor_mos.51.tt1: "Детальний наратив, представлений у [ShowWorkOfArtName('tale_of_the_princes_of_vladimir')], докладно прояснює походження Шапки Мономаха, посилюючи її історичне значення."
  flavor_mos.51.historical_info: "Вважається, що Шапка Мономаха була виготовлена на початку XIV століття, а перша зафіксована згадка про її використання в московському документі датується 1518 роком. Шапка символізує самодержавне правління та підкріплює й просуває теорію Москви як Третього Риму, концепцію, що була додатково закріплена трактатом «Повість про князів Володимирських». Хоча її точне походження залишається предметом дискусій, дизайн свідчить, що вона могла походити із Золотої Орди як подарунок правителям Московії; однак кілька вчених представили альтернативні теорії."
  flavor_mos.52.title: "Книга царського родоводу"
  flavor_mos.52.desc: "Наразі триває робота над історіографічним твором, що узагальнює великі хроніки [ROOT.GetCountry.GetName], черпаючи натхнення з «[ShowWorkOfArtName('tale_of_the_princes_of_vladimir')]» та інших надійних джерел. Метою цього грандіозного починання є створення письмового джерела, що підтверджує нашу ідентичність як Третього Риму, утверджуючи імперську спадщину [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Кожен правитель має бути представлений як святий, а його дії визнані священними діяннями.\n\nУкладання #italic Книги царського родоводу#! є важливим для збереження та зміцнення нашого історичного наративу в теперішній момент."
  flavor_mos.52.a: "Це лише проста переповідь."
  flavor_mos.52.tt1: "Страх, навіяний [ivan_the_terrible.GetName], змушує писарів прикрашати книгу зі страху перед репресіями."
  STATIC_MODIFIER_NAME_imperial_descent: "Імперське походження"
  flavor_mos.52.b: "Віддати більшу частину заслуг Церкві."
  flavor_mos.52.c: "У цих діяннях немає нічого святого."
  flavor_mos.52.historical_info: "Замовлена митрополитом Московським, #italic Книга царського родоводу#! була історичним твором, покликаним узгодити історичні дані з уподобаннями та амбіціями царя. Її мета поширювалася на закріплення концепції Москви як «Третього Риму», а також на посилення влади Івана IV та спрямування нації до більш самодержавного шляху."
  flavor_mos.53.title: "Соляний бунт"
  flavor_mos.53.desc: "Зростання вартості [ShowGoodsName('salt')] викликає невдоволення серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які залежать від її доступності для збереження їжі. Вони погрожують націлитися на тих, кого вважають відповідальними, головним чином на [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], чиє зловживання владою та несправедливе оподаткування вважаються головною причиною. Щоб запобігти виходу ситуації з-під контролю, ми повинні терміново вирішити конкретні скарги народу та полегшити податковий тягар, щоб придушити повстання, перш ніж воно вийде з-під контролю."
  flavor_mos.53.a: "Звільнити [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] від податку."
  salt_riot: "Соляні бунтівники"
  flavor_mos.53.b: "Стояти осторонь."
  flavor_mos.53.tt: "Повстанці націлюються на майно [ShowPopTypeName('nobles')] та [ShowPopTypeName('clergy')] у відповідь на бездіяльність [target_root_country.GetGovernment.GetRuler.GetName] щодо кризи."
  flavor_mos.53.historical_info: "Соляний бунт 1648 року був великим повстанням, що відбулося в Москві. Вартість солі неухильно зростала внаслідок різних факторів, що спричинило значні економічні труднощі для селянського населення. Сіль на той час була вирішальним інгредієнтом для збереження їжі, і її недоступність багатьох поставила на межу голоду. Бунтівники націлилися на кілька боярських та церковних маєтків, і повстання було придушене лише після того, як цар заарештував кількох членів дворянства, а також погодився регулювати ціну на сіль, щоб тимчасово полегшити економічні труднощі."
  flavor_mos.54.title: "Контрдії [antonio_possevino.GetNameWithNoTooltip]"
  flavor_mos.54.desc: "Кмітливий сперечальник і побожний єзуїт [antonio_possevino.GetName] відвідує [ROOT.GetCountry.GetName] у рамках тривалої подорожі Європою, намагаючись просувати [ShowReligionName('catholic')] та протидіяти поширенню [ShowReligionName('lutheran')]. Його присутність, ймовірно, образить Церкву, але значно сприятиме нашим дипломатичним амбіціям, оскільки [antonio_possevino.GetNameWithNoTooltip] виявив велику майстерність у навігації складним політичним та релігійним ландшафтом."
  flavor_mos.54.a: "Прийняти [antonio_possevino.GetHisHer] погляди."
  flavor_mos.54.tt2: "[antonio_possevino.GetSheHe|U] проводить значний час при [target_root_country.GetAdjective] дворі, допомагаючи врегульовувати різні внутрішні та зовнішні суперечки"
  STATIC_MODIFIER_NAME_controversial_nuncio: "Суперечливий нунцій"
  flavor_mos.54.b: "Заохочувати культурні обміни."
  flavor_mos.54.tt3: "[antonio_possevino.GetSheHe|U] залишається в [target_root_country.GetName] на деякий час, беручи участь в обміні західними знаннями, книгами та ідеями"
  flavor_mos.54.c: "[antonio_possevino.GetHisHer|U] мотиви підозрілі."
  flavor_mos.54.tt4: "[antonio_possevino.GetSheHe|U] відмовлено в доступі до двору та обмежено [antonio_possevino.GetHisHer] місіонерську діяльність"
  flavor_mos.54.historical_info: "Антоніо Поссевіно був італійським єзуїтом, який брав участь у кількох дипломатичних місіях по всій Європі. У 1581 році він був відправлений Папою Григорієм XIII до Москви з місією встановлення діалогу з царем. Основними цілями його місії було забезпечення політичного союзу між католицькими та православними державами та протидія швидкому поширенню протестантизму."
  flavor_mos.55.title: "[joseph_volotsky.GetNameWithNoTooltip]"
  flavor_mos.55.desc: "Благочестивий прихильник [joseph_volotsky.GetName] прагне зміцнити авторитет Церкви, запровадивши низку правил для зменшення корупції, одночасно дозволяючи [ShowBuildingTypeName('orthodox_monastery')] по всьому [ROOT.GetCountry.GetFlavorRank] володіти землею на свій розсуд. Крім того, [joseph_volotsky.GetSheHe] рішуче виступає проти послідовників [ShowReligionName('strigolniki')] і може виявитися корисним у обмеженні поширення будь-якого єретичного мислення."
  flavor_mos.55.a: "Єресь має бути викорінена."
  strigolniki_pops_tt: "Усі [ShowReligionAdjective('strigolniki')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]"
  flavor_mos.55.tt1: "[Concept('joseph_volotsky.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.55.tt2: "[joseph_volotsky.GetSheHe|U] переключає [joseph_volotsky.GetHisHer] увагу на обмеження поширення віри [ShowReligionName('strigolniki')]"
  flavor_mos.55.b: "Вони становлять невелику небезпеку."
  flavor_mos.55.tt3: "[joseph_volotsky.GetSheHe|U] зосереджує [joseph_volotsky.GetHisHer] зусилля на зміцненні авторитету [target_root_country.GetGovernment.GetRulerTitle]"
  flavor_mos.55.c: "Спробувати скасувати ініціативу щодо ліквідації монастирського землеволодіння."
  flavor_mos.55.tt4: "Закон [ShowLawName('monastic_reformation_movement')] [Concept('law', 'CONCEPT_PLACEHOLDER')|e] більше не заблокований"
  flavor_mos.55.historical_info: "Йосип Волоцький був православним ченцем, який виступав проти ініціатив нестяжателів, фракції, що прагнула зменшити монастирське землеволодіння та повернутися до життя аскетизму, молитви та смирення. У відповідь на те, що він сприймав як корупцію в чернечих орденах, він допоміг встановити набір правил, спрямованих на посилення суворої чернечої дисципліни, що матиме тривалий вплив на російське чернецтво."
  flavor_mos.56.title: "Вогняні наслідки"
  flavor_mos.56.desc: "Після великої пожежі в [ShowLocationName('moscow')] провину швидко поклали на родичів по материнській лінії [ROOT.GetCountry.GetGovernment.GetRulerTitle] — [eleanor_glinskaya.GetName], а причиною пекла назвали шаманське чаклунство. [ShowPopTypeName('peasants')] вийшли на вулиці і вимагають негайної видачі членів династії [ShowDynastyName('glinskaya_dynasty')], щоб вони могли помститися за численні смерті, приписані жахливій пожежі."
  flavor_mos.56.a: "Подивитися в інший бік."
  flavor_mos.56.tt1: "Члени династії [ShowDynastyNameWithNoTooltip('glinskaya_dynasty')] переслідуються та вбиваються розлюченим натовпом"
  flavor_mos.56.tt2: "Напад на членів [eleanor_glinskaya.GetHisHer] родини викликає великий стрес у [eleanor_glinskaya.GetNameWithNoTooltip]"
  flavor_mos.56.b: "Видати й пані."
  flavor_mos.56.tt3: "Усіх членів [ShowDynastyNameWithNoTooltip('glinskaya_dynasty')] збирає та вбиває розлючений натовп"
  flavor_mos.56.c: "Жорстоко розправитися з бандитами."
  flavor_mos.56.d: "Кожна людина має свою ціну."
  flavor_mos.56.historical_info: "Московська пожежа 1547 року мала глибокий вплив на селянське населення, призвівши до тисяч загиблих або переміщених осіб, які були змушені жити в бідності. Цивільне населення шукало цапа-відбувайла, спрямувавши свою увагу на бабусю царя, чиє шаманське походження сприймалося як джерело розв'язаної магії, що впливала на християнське населення. Кілька родичів були забиті камінням до смерті; однак цар категорично відмовився видати свою бабусю розлюченому натовпу."
  flavor_mos.57.title: "Розширення Кремля"
  flavor_mos.57.desc: "Величний [ShowBuildingTypeName('kremlin')] продовжує відігравати вирішальну роль у захисті земель Русі. Однак його початкова конструкція, повністю виготовлена з [ShowGoodsName('lumber')], робить його вразливим до пожеж та новітніх військових інновацій, які можуть завдати шкоди його структурній цілісності. Щоб вирішити ці проблеми та забезпечити довговічність цього символу нашої спадщини, ми пропонуємо складне завдання заміни його будівельних елементів такими матеріалами, як [ShowGoodsName('stone')] та [ShowGoodsName('clay')]. Це оновлення не тільки зміцнить Кремль від зовнішніх загроз, але й збереже його велич для майбутніх поколінь, захищаючи нашу славетну столицю."
  flavor_mos.57.a: "Сокири та долота напоготові."
  mos_kremlin_upgrade: "Модернізація Кремля"
  flavor_mos.57.b: "Надто довго ми затримувалися за цими стінами."
  flavor_mos.57.c: "Матеріали краще витратити на модернізацію палаців та соборів."
  flavor_mos.57.historical_info: "Будівництво кам'яних стін та укріплень Московського Кремля було великим інженерним проектом. Дерев'яні укріплення, що використовувалися на той час, виявилися неефективними через військові досягнення, такі як артилерія, але рішення про модернізацію комплексу також було зумовлене нещодавнім збільшенням татарських набігів, яких Московія досі уникала завдяки своєму вигідному статусу із Золотою Ордою $rank_kingdom_horde_ruler_suffix_male$."
  flavor_mos.58.title: "Велика дзвіниця"
  flavor_mos.58.desc: "Наплив [ShowCultureGroupName('italian_group')] архітекторів значно оновлює [ShowLocationName('moscow')], з білими кам'яними будівлями, що тепер прикрашають вулиці. Хоча Соборна площа залишається центральним фокусом, більшість її будівель скромно побудовані і ледь помітні ззовні стін [ShowBuildingTypeName('kremlin')]. Щоб підняти міський пейзаж, наш погляд звертається вгору, коли ми уявляємо монументальну дзвіницю поруч із [ShowBuildingTypeNameWithNoTooltip('cathedral')]. Ця вежа не тільки слугуватиме фокусом, але й наповнить місто веселими та піднесеними дзвонами, на які заслуговує населення."
  flavor_mos.58.a: "Чудовий спостережний пункт."
  mos_great_bell_tower_construction: "Будівництво Великої дзвіниці"
  great_bell_tower_construction: "Будівництво Великої дзвіниці"
  flavor_mos.58.tt1: "Радісний та мелодійний характер двадцяти двох церковних дзвонів приносить радість [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]"
  flavor_mos.58.b: "[ShowGoodsNameWithNoTooltip('stone')] — дорогоцінний товар."
  flavor_mos.58.historical_info: "Дзвіниця Івана Великого була побудована в 1508 році за часів правління Івана III і була частиною поточної реконструкції та розширення Московського Кремля. Вежа має двадцять два дзвони і є найвищою будівлею в комплексі. Завдяки своїй вражаючій висоті вона також функціонувала як оглядовий пункт для виявлення пожеж та моніторингу наближення потенційних супротивників."
  flavor_mos.59.title: "[ShowLocationNameWithNoTooltip('arkhangelsk')] Указ"
  flavor_mos.59.desc: "Природна гавань [ShowLocationName('arkhangelsk')] пропонує доступ до Північного Льодовитого океану, а отже, до основних європейських торговельних шляхів. Заохочуймо подальше заселення, розширюючи інфраструктуру для розміщення зростаючого обсягу морської торгівлі, і використовуймо порт як плацдарм для можливого створення [ShowBuildingTypeName('trade_office')] вздовж західних узбереж, забезпечуючи собі частку в цьому."
  flavor_mos.59.a: "Ми не можемо покладатися на внутрішні можливості."
  STATIC_MODIFIER_NAME_bustling_trade_hub: "Жвавий торговий центр"
  flavor_mos.59.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] у захваті від національного прагнення до нових торговельних перспектив"
  flavor_mos.59.b: "Дороге починання."
  flavor_mos.59.historical_info: "Правління Івана IV зосередилося на встановленні прямих морських торговельних шляхів на Захід. Це було зумовлено бажанням обійти домінування Ганзейського союзу та встановити прямі торговельні зв'язки із Західною Європою, посилюючи економічне та політичне становище Росії."
  flavor_mos.60.title: "Цензура [ShowGovernmentReformNameWithNoTooltip('oprichnina')]"
  flavor_mos.60.desc: "Триває очищення від інакомислячих умів, і настав час звернутися до тих, хто, як вважається, поширює ідеї, що суперечать ідеології, яку пропагує [ShowGovernmentReformName('oprichnina')]. Ми повинні задіяти опричників для зміцнення центральної влади шляхом обмеження текстів і трактатів, що кидають виклик нашій політичній програмі, та забезпечити гармонію церковного керівництва з цією політикою."
  flavor_mos.60.a: "Мова – це привілей, який використовується мудро."
  flavor_mos.60.b: "Деяка поблажливість допускається."
  flavor_mos.60.historical_info: "Політичні репресії були поширені під час опричнини і досягли нових висот із заснуванням опричників, політичної поліції царя. Православна церква в Росії, як і інші інституції, постраждала від політики опричнини, із суворою цензурою релігійних текстів та забороною або знищенням певних книг і рукописів."
  flavor_mos.61.title: "Переселення [ShowGovernmentReformNameWithNoTooltip('oprichnina')]"
  flavor_mos.61.desc: "Перерозподіл землі від нелояльних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] до чоловіків і жінок, які не розглядаються як загроза, триває безперешкодно, але конфіскації негативно впливають на виробництво продуктів харчування, оскільки [ShowPopTypeName('peasants')] витісняються і не можуть обробляти поля. Ризик голоду зберігається, і нам, можливо, доведеться діяти більш поблажливо, якщо ми хочемо врахувати загальне благополуччя населення."
  flavor_mos.61.a: "Конфіскація землі триватиме."
  STATIC_MODIFIER_NAME_disruption_of_agricultural_activities: "Порушення сільськогосподарської діяльності"
  flavor_mos.61.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] продовжують стикатися з невизначеністю та переміщенням, що призводить до зниження сільськогосподарської продуктивності"
  flavor_mos.61.b: "Уникайте конфіскації маєтків у сільських бояр."
  flavor_mos.61.c: "Прив'язати [ShowPopTypeNameWithNoTooltip('peasants')] до маєтку."
  flavor_mos.61.tt2: "Жорстокі репресії [ivan_the_terrible.GetName] мінімізують будь-які перебої у виробництві продуктів харчування за рахунок сільського населення"
  flavor_mos.61.historical_info: "Опричнина мала руйнівний вплив на сільське господарство та сільську економіку Росії. Конфіскація маєтків та порушення звичайної сільськогосподарської практики сприяли дефіциту продовольства та економічній нестабільності, що призвело до широкомасштабного голоду та додаткових труднощів для селянства."
  flavor_mos.62.title: "Собор Василія Блаженного"
  flavor_mos.62.desc: "Успішне завоювання [ShowAreaName('kazan_area')] є великим тріумфом для [ROOT.GetCountry.GetName] і має бути увіковічнене. Можна розглянути будівництво грандіозного собору, присвяченого цій військовій перемозі, використовуючи найновіші впливи в будівельних техніках, щоб продемонструвати пишність та інноваційність [ROOT.GetCountry.GetAdjectiveWithNoTooltip] архітектури."
  flavor_mos.62.a: "Блискуча ідея."
  mos_st_basil_cathedral_construction: "Будівництво Собору Василія Блаженного"
  flavor_mos.62.tt1: "Ретельна майстерність [postnik_yakovlev.GetName] ще більше збагачує собор"
  flavor_mos.62.b: "Непотрібна демонстрація."
  flavor_mos.62.c: "Ще зарано називати це перемогою."
  STATIC_MODIFIER_NAME_shoring_up_defenses: "Зміцнення оборони"
  flavor_mos.62.tt2: "Матеріальні ресурси інвестуються у зміцнення [ShowGoodsName('stone')] стін [ShowBuildingTypeName('kremlin')]."
  flavor_mos.62.historical_info: "Собор Василія Блаженного був побудований за часів правління Івана Грозного на честь успішної військової кампанії проти Казанського ханства. Будівництво вважалося жертвою подяки Діві Марії за її заступництво у завоюванні. Сьогодні він залишається знаковим символом Росії та служить символом витривалості та виживання російської держави."
  flavor_mos.63.title: "Новодівичий монастир"
  flavor_mos.63.desc: "Після тріумфального завоювання [ShowAreaName('smolensk_area')] виникає нагода увічнити перемогу, укріпивши південний оборонний пояс [ShowLocationName('moscow')] задля безпеки [ROOT.GetCountry.GetName]. Ідея будівництва укріпленого монастиря випливає зі стратегічної необхідності, але його також можна використати для розміщення багатьох [ShowPopTypeName('nobles')] жінок, яких змусили прийняти чернечий постриг, забезпечивши цим прихильність серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_mos.63.a: "Більше користі за ті ж гроші."
  flavor_mos.63.b: "[ShowLocationNameWithNoTooltip('moscow')] вже адекватно захищена."
  flavor_mos.63.c: "Запропонувати стипендію постраждалим жінкам."
  flavor_mos.63.historical_info: "Новодівичий монастир був заснований великим князем Василем III на честь успішного завоювання Смоленської області. Його було засновано як фортецю та релігійну установу для захисту західних підступів до міста. Монастир також надавав притулок жінкам з російських королівських родин, яких заохочували до чернечого життя."
  flavor_mos.64.title: "[ShowLocationNameWithNoTooltip('moscow')] Гарматний двір"
  flavor_mos.64.desc: "З розвитком артилерійських технологій на полі бою стає дедалі важливішим забезпечувати армію достатнім запасом боєприпасів для підтримки військових зусиль. Ми повинні доручити нашим інженерам створити спеціалізований об'єкт, зосереджений на виробництві артилерії, перетворивши [ShowLocationName('moscow')] на центр технологічних інновацій та надійного постачальника."
  flavor_mos.64.a: "Вигідна угода."
  flavor_mos.64.b: "Час краще витратити на військові навчання."
  flavor_mos.64.historical_info: "Московський гарматний двір був побудований за правління Івана IV і відіграв важливу роль у зміцненні військового потенціалу Росії. Виробництво гармат та артилерії було вирішальним для розширення військового впливу Росії та сприяло її військовим успіхам у кількох конфліктах."
  flavor_mos.65.title: "Балтійський кордон"
  flavor_mos.65.desc: "Регіон [ShowAreaName('baltic_area')] здавна мав вигідне торгове положення поруч із Балтійським морем, жвавим центром торгівлі Північної Європи. Однак отримання прибутків від цієї торгівлі виявилося складним через географічну віддаленість. Ми повинні скористатися нашою перевагою та захопити контроль над регіоном, якщо прагнемо спрямувати частину багатства назад до [target_location.GetName]."
  flavor_mos.65.a: "Частка у справі."
  flavor_mos.65.a.custom: "[target_root_country.GetName] отримує [ShowCasusBelliName('cb_conquer_province')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] на кожну [Concept('province', 'CONCEPT_PLACEHOLDER')|e] та [ShowCasusBelliName('cb_subjugation')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] на будь-якого [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] в регіоні [ShowAreaName('baltic_area')]."
  flavor_mos.65.b: "Мир корисний для бізнесу."
  flavor_mos.65.historical_info: "Спроби Росії завоювати Балтійський регіон призвели до тривалої та безплідної Лівонської війни, яка спустошила економіку Росії та призвела до незначних територіальних здобутків. Війна закінчилася Ям-Запольським миром 1582 року та Плюським перемир'ям 1583 року, що закріпили поділ лівонських та естонських земель між Річчю Посполитою, Швецією та Данією."
  flavor_mos.66.title: "Трагічне дітовбивство"
  flavor_mos.66.desc: "Гаряча суперечка між [target_ruler.GetName] та [target_heir.GetName] лунає палацовими коридорами. Коли слуги наближаються до приватних покоїв [ROOT.GetCountry.GetGovernment.GetRulerTitle], суперечка переростає у бійку, де [target_ruler.GetShortNameWithNoTooltip], тепер озброєний загостреним посохом, намагається вдарити [target_ruler.GetHisHer] спадкоємця, додаючи небезпечної інтенсивності протистоянню."
  flavor_mos.66.a: "Залишатися мовчазним. Це сімейна справа."
  flavor_mos.66.tt1: "[target_heir.GetNameWithNoTooltip] отримує смертельний удар у голову і помирає в обіймах заплаканого [target_ruler.GetNameWithNoTooltip]."
  flavor_mos.66.b: "Наказати охороні стримати [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  STATIC_MODIFIER_NAME_temporarily_incarcerated: "Тимчасово ув'язнений"
  flavor_mos.66.tt2: "[target_ruler.GetSheHe|U] ув'язнений, доки не мине [target_ruler.GetHisHer] лють."
  flavor_mos.66.c: "Позбудьмося цього божевільного."
  flavor_mos.66.historical_info: "У 1581 році, у момент сильного гніву, Іван IV смертельно вдарив свого сина та спадкоємця, Івана Івановича, загостреним посохом. Цей акт синовбивства розгорнувся під час бурхливого періоду пізніх років Івана, що характеризувався зростаючою параноєю та низкою жорстоких чисток."
  flavor_mos.67.title: "[postnik_yakovlev.GetNameWithNoTooltip]"
  flavor_mos.67.desc: "Прозірливий творець [postnik_yakovlev.GetName] продовжує демонструвати винятковий талант у розширенні архітектурних меж та прикрашанні обрію [ShowLocationName('moscow')] своїми творіннями. Мало що відомо про [postnik_yakovlev.GetHisHer] походження чи соціальний статус, але це не повинно стати на заваді використанню таких величних навичок. Ми повинні тримати [postnik_yakovlev.GetHimHer] близько на випадок будь-яких великих будівельних робіт, замовлених [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_mos.67.a: "Запросити [postnik_yakovlev.GetHimHer] до двору."
  flavor_mos.67.b: "Важливе те, що є зараз."
  flavor_mos.67.historical_info: "Постник Яковлєв був архітектором у Росії, якого особливо пам'ятають за його участь у будівництві собору Василя Блаженного в Москві. Собор був замовлений Іваном Грозним на честь захоплення міста Казані у монголів."
  flavor_mos.68.title: "Відволікання Шуйських"
  flavor_mos.68.desc: "Молодий [target_character.GetName] виявляється жертвою руйнівного впливу впливової родини Шуйських, які піддають [target_character.GetHimHer] алкоголю та іншим зловживанням як засіб зміцнення свого контролю над [ROOT.GetCountry.GetName]. Ця ситуація загострилася до такої міри, що тепер вона впливає на повсякденні справи при дворі, і будь-які зусилля щодо приборкання цієї поведінки, ймовірно, призведуть до внутрішніх конфліктів."
  flavor_mos.68.a: "Клин клином вибивають."
  flavor_mos.68.tt1: "Вольовий [target_character.GetNameWithNoTooltip] запроваджує [ShowGovernmentReformName('oprichnina')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e], щоб приборкати вплив [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]"
  flavor_mos.68.b: "Ми не можемо ризикувати державним переворотом."
  STATIC_MODIFIER_NAME_drunkard: "П'яниця"
  flavor_mos.68.tt2: "[target_character.GetNameWithNoTooltip] піддається алкоголізму, зміцнюючи домінування [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]"
  flavor_mos.68.historical_info: "Шуйські були могутньою боярською родиною, яка мала значну владу під час регентства Івана IV. У дитинстві Іван часто відчував зневагу та образи з боку Шуйських, і він дедалі більше розчаровувався їхньою зарозумілою та некерованою поведінкою, що підготувало ґрунт для його майбутнього масштабного придушення російської знаті."
  flavor_mos.69.title: "Влада намісників"
  flavor_mos.69.desc: "Намісники-віце-королі мають значну владу, що дозволяє їм керувати найвіддаленішими регіонами [ROOT.GetCountry.GetName]. Таке розташування створює низку проблем, таких як позбавлення нас значної частини отриманих доходів та труднощі у підтримці їхньої покори. Ми повинні працювати над встановленням прямого контролю над регіональним управлінням та централізацією адміністрації, можливо, за рахунок місцевих еліт."
  flavor_mos.69.a: "Приборкати їхній вплив."
  flavor_mos.69.b: "Ми не чіпаємо те, що не порушено."
  flavor_mos.69.c: "Це справа минулого."
  disable_namestnik_policy: "[ShowPolicyName('namestnik_policy')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] стає недоступною"
  flavor_mos.69.historical_info: "Намісники мали значні адміністративні та виконавчі повноваження в Росії, діючи як представники монарха на віддалених територіях. Їхні повноваження були дещо обмежені під час правління Івана IV, однак вони проіснували до низки реформ, запроваджених Петром Великим, як частина загальних змін в адміністративній структурі Росії."
  flavor_mos.70.title: "[ivan_viskovatiy.GetNameWithNoTooltip]"
  flavor_mos.70.desc: "Дипломатичний майстер слова [ivan_viskovatiy.GetName] прагне служити і має кілька ідей щодо покращення бюрократії, запровадженої урядовою реформою [ShowGovernmentReformName('prikazi_reform')]. Ми повинні скористатися моментом і використати [ivan_viskovatiy.GetHisHer] навички з користю, щоб допомогти орієнтуватися у складній сфері дипломатії."
  flavor_mos.70.a: "Запросити його до двору."
  flavor_mos.70.tt2: "[ivan_viskovatiy.GetSheHe|U] може створити додаткові бюро, якщо буде призначений до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.70.b: "Мистецтво дипломатії можна навчити."
  flavor_mos.70.tt3: "[ivan_viskovatiy.GetNameWithNoTooltip] навчає [target_root_country.GetGovernment.GetRuler.GetName] навичкам спілкування та ведення переговорів"
  flavor_mos.70.c: "Бездарний шарлатан."
  flavor_mos.70.historical_info: "Іван Вісковатий відіграв ключову роль у дипломатичних амбіціях Івана IV і був призначений відповідальним за зовнішні відносини Росії, обіймаючи цю посаду до своєї смерті. Вважається, що він був відповідальним за створення зовнішньополітичного відомства Приказу, широко відомого як #italic Посольський приказ#!. У пізніші роки його вірність була поставлена під сумнів царем, і він був публічно страчений внаслідок чисток Івана IV."
  flavor_mos.71.title: "Посольський приказ"
  flavor_mos.71.desc: "Старанна праця [ivan_viskovatiy.GetName] принесла плоди, що призвело до ефективнішого ведення зовнішніх справ та оптимізованої бюрократії. Тепер пропонується створити окреме бюро для вирішення питань, пов'язаних з дипломатією та подібними справами, щоб встановити ті ж стандарти, що застосовуються до інших державних сфер."
  flavor_mos.71.a: "Розумний вибір."
  enable_posolsky_cabinet_action: "Надає доступ до [ShowCabinetActionName('posolsky')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.71.b: "Магазин міжнародних витівок."
  flavor_mos.71.historical_info: "#italic Посольський приказ#! служив урядовим бюро, що наглядало за зовнішніми та дипломатичними справами. Він відігравав важливу роль в управлінні дипломатичними відносинами, відправленні послів та адмініструванні міжнародних справ."
  flavor_mos.72.title: "Діти Темряви"
  flavor_mos.72.desc: "Опричник, потужна політична поліція, зберігає значний вплив і є силою, з якою слід рахуватися. Покращення їхнього вигляду за допомогою схожих уніформ, таких як чорні мантії, та аксесуарів у вигляді відрубаних голів тварин, прикріплених до їхніх сідел, може посилити гнітючу та загрозливу атмосферу, яку вони бажають передати, вселяючи страх у наших ворогів."
  flavor_mos.72.a: "Зовнішність — це все."
  mos_equipping_the_oprichnik: "Екіпірування опричника"
  flavor_mos.72.b: "Вони носять усе, що вдається поцупити."
  flavor_mos.72.c: "Варварський і тривожний."
  flavor_mos.72.historical_info: "Опричники носили чорні мантії та відрубану голову собаки або вовка, прикріплену до їхніх сідел. Це мало символізувати їхнє гостре чуття у виявленні будь-якої зради проти царя. Крім того, вони носили мітлу як метафору переслідування ворогів царя та акту їхнього вимітання."
  flavor_mos.73.title: "Рейди опричників"
  flavor_mos.73.desc: "Опричники продовжують здійснювати страти осіб, яких вважають нелояльними. Нещодавно кілька маєтків [ShowPopTypeName('nobles')] у сільській місцевості стали мішенню, що призвело до переміщення [ShowPopTypeName('peasants')], приписаних до землі, через заборону залишати домогосподарство, до якого вони приписані. Якщо цю ситуацію не вирішити негайно, ми ризикуємо зіткнутися з ендемічною нестачею продовольства."
  flavor_mos.73.a: "Не наша справа."
  STATIC_MODIFIER_NAME_displaced_farmers: "Переміщені фермери"
  flavor_mos.73.b: "Покласти край опричнині."
  disable_oprichnik_policy: "[ShowPolicyName('oprichnik_policy')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] стає недоступною"
  flavor_mos.73.historical_info: "Опричники брали участь у конфіскації майна у тих, кого вважали ворогами держави. Ця практика ще більше зміцнила економічну владу царя та його вірних прихильників, але мала небажаний ефект: селяни були переміщені та вигнані, оскільки їхні колишні господарі були або вбиті, або захоплені. Це, своєю чергою, мало руйнівний вплив на виробництво продовольства, оскільки поля залишалися без догляду."
  flavor_mos.74.title: "Питання спадкоємності"
  flavor_mos.74.desc: "Наш улюблений [ROOT.GetCountry.GetGovernment.GetRuler.GetName], можливо, недовго проживе на цій землі, і нездатність знайти відповідного спадкоємця ризикує вкинути [ROOT.GetCountry.GetName] у політичні заворушення. Було запропоновано обрати члена ради [ROOT.GetCountry.GetGovernment.GetRulerTitle] для прийняття керівництва після смерті [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nДвоє [ShowPopTypeName('nobles')] розглядаються на це складне завдання, а саме [boris_godunov.GetName] та [feodor_romanov.GetName]. Вони володіють схожими якостями, але перший користується сильною підтримкою серед національної асамблеї. Ми повинні прийняти рішення, інакше ризикуємо громадянською ворожнечею після передачі влади."
  flavor_mos.74.a: "[boris_godunov.GetNameWithNoTooltip] — кращий вибір."
  STATIC_MODIFIER_NAME_by_grace_of_national_assembly: "З ласки Національної Асамблеї"
  STATIC_MODIFIER_NAME_blocked_from_being_ruler: "Заблоковано від становлення правителем"
  flavor_mos.74.b: "[feodor_romanov.GetNameWithNoTooltip] має нашу підтримку."
  flavor_mos.74.tt1: "[Concept('boris_godunov.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.74.tt2: "[Concept('feodor_romanov.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  STATIC_MODIFIER_NAME_national_assembly_opposed: "Національна Асамблея проти"
  flavor_mos.74.c: "Залишити їх обох впливовими радниками."
  flavor_mos.74.tt3: "Сильний і харизматичний [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] чинить опір спробам нав'язати [ROOT.GetCountry.GetGovernment.GetRuler.GetHimHer] рішення"
  flavor_mos.74.d: "Жоден не підходить."
  flavor_mos.74.tt4: "[boris_godunov.GetNameWithNoTooltip] та [feodor_romanov.GetNameWithNoTooltip] страчені на велике розчарування [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"
  flavor_mos.74.historical_info: "Смерть Івана IV призвела до того, що Федір I став царем. Його не вважали сильним лідером, йому бракувало рішучості батька, і його описували як слабкого та неефективного. Під час правління Федора його шваґер, Борис Годунов, став впливовою фігурою при російському дворі. Після смерті Федора, не маючи спадкоємців, Борис забезпечив собі трон за підтримки Земського Собору. Претендентом на трон був Федір Романов, боярин, який був першим з династії Романових, але він не користувався такою ж підтримкою і був ув'язнений у монастирі, як тільки Борис взяв владу."
  feodor_romanov_becomes_a_monk_tt: "[feodor_romanov.GetShortNameWithNoTooltip] стане ченцем і утримуватиметься від політики до кінця [feodor_romanov.GetHerHis] днів"
  boris_godunov_becomes_a_monk_tt: "[boris_godunov.GetShortNameWithNoTooltip] стане ченцем і утримуватиметься від політики до кінця [boris_godunov.GetHerHis] днів"
  flavor_mos.75.title: "Іноземні освітяни"
  flavor_mos.75.desc: "Дипломатичні зусилля [ROOT.GetCountry.GetGovernment.GetRuler.GetName] спрямовані на покращення освітніх потреб нашої молоді, готуються кілька ініціатив, щоб принести нові впливи та ідеї для боротьби з відсталістю. Ми повинні запровадити програму, щоб допомогти відправити наших молодих людей за кордон, дозволяючи їм вивчати секрети успіху. Одночасно ми повинні активно заохочувати поселення освітян, щоб допомогти підвищити стандарти нашої освітньої системи та звільнити її від лап [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_mos.75.a: "Ми повинні наздогнати інтелектуальний прогрес."
  flavor_mos.75.b: "Нічого доброго з цього не вийде."
  flavor_mos.75.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] задоволені, що вони залишаються потужним впливом у питаннях освіти"
  flavor_mos.75.historical_info: "Цар Борис Годунов швидко усвідомив, що Росія відстала від своїх європейських сусідів, і зробив пріоритетом підвищення освітніх стандартів, що пропонуються дітям. Одним з таких заходів було активне заохочення іноземних вчителів до поселення в Росії, але він також ініціював відправлення молодих росіян за кордон для навчання."
  flavor_mos.76.title: "[ivan_gramotin.GetNameWithNoTooltip]"
  flavor_mos.76.desc: "Дипломат виняткової майстерності та великих знань пропонує [ivan_gramotin.GetHisHer] послуги, висловлюючи бажання бути призначеним до закордонного відомства. [ivan_gramotin.GetName] відомий [ivan_gramotin.GetHisHer] красномовством та інтелектом, і нам рекомендується скористатися [ivan_gramotin.GetHisHer] пропозицією, щоб допомогти орієнтуватися у складному світі міжнародних відносин, якщо ми не шукаємо більш конфронтаційного підходу."
  flavor_mos.76.a: "Запросити його до двору."
  flavor_mos.76.tt1: "[Concept('ivan_gramotin.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.76.tt2: "[ivan_gramotin.GetSheHe|U] може здійснити великі дипломатичні справи, якщо його призначити до [ShowCabinetActionName('posolsky')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.76.b: "Ще один бездарний нездара."
  flavor_mos.76.historical_info: "Іван Грамотін був успішним дипломатом за часів правління Івана IV і пізніше, якого здебільшого пам'ятають як очільника зовнішньополітичного відомства. Він став близьким другом майбутнього патріарха під час дипломатичного візиту до Польщі, де його тримали в полоні. Ця дружба допомогла Івану забезпечити майбутнє місце при дворі та кілька впливових посад, включно з боярською думою. На пізніших етапах життя він втратив прихильність і був висланий, але повернувся після смерті патріарха. Через кілька років він пішов у монастир, де помер ченцем."
  flavor_mos.77.title: "Красномовний дипломат"
  flavor_mos.77.desc: "Адміністративний експерт [ivan_gramotin.GetName] творить справжні дива в #italic Посольському приказі#!, оптимізуючи бюрократію та всі процеси, безпосередньо пов'язані із зовнішніми та внутрішніми відносинами. Тепер ми можемо вирішити скористатися плодами [ivan_gramotin.GetHisHer] праці або перенаправити [ivan_gramotin.GetHisHer] увагу на покращення внутрішньої стабільності [ROOT.GetCountry.GetName], допомагаючи налагодити зв'язки між ворогуючими фракціями та вирішити будь-які затяжні суперечки."
  flavor_mos.77.a: "Пожинаємо те, що посіяли."
  STATIC_MODIFIER_NAME_fine_tuned_diplomacy: "Тонко налаштована дипломатія"
  flavor_mos.77.tt1: "Невпинні зусилля [ivan_gramotin.GetNameWithNoTooltip] добре використовуються в будь-яких зовнішніх справах"
  flavor_mos.77.b: "Внутрішні чвари мають бути врегульовані."
  flavor_mos.77.historical_info: "Іван Грамотін успішно провів переговори з головними суперниками Росії, а саме Польщею, Швецією та Османською імперією, і його внесок допоміг стабілізувати Росію під час Смутного часу. Він пережив турбулентність, попри зміну вірності та інтриги, і продовжував очолювати важливі дипломатичні місії протягом багатьох років."
  flavor_mos.78.title: "Аптекарський приказ"
  flavor_mos.78.desc: "Урядові установи, створені відповідно до реформи [ShowGovernmentReformName('prikazi_reform')], кожна відіграє окрему роль в урядовому механізмі, проте нещодавня моровиця підкреслює необхідність поновленої уваги до питань, що стосуються здоров'я та добробуту наших підданих. Ми повинні створити окремий офіс, щоб краще координувати будь-яку необхідну відповідь, коли станеться наступне божественне покарання або смертельний спалах, або ризикувати нестачею працездатних робітників для обробітку земель та захисту нашого великого [ROOT.GetCountry.GetFlavorRank]."
  flavor_mos.78.a: "П'явки та кровопускання для всіх."
  flavor_mos.78.tt1: "Двір радіє преференційному медичному обслуговуванню, яке надається вищим верствам суспільства Аптекарським приказом"
  enable_aptekarsky_cabinet_action: "Надає доступ до [ShowCabinetActionName('aptekarsky')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.78.b: "Все, що нам потрібно, це молитва."
  flavor_mos.78.historical_info: "Аптекарський приказ був урядовою установою з широким колом обов'язків, включаючи нагляд за виробництвом та розповсюдженням ліків, регулювання аптек та вирішення питань, пов'язаних з громадським здоров'ям. Йому також було доручено піклуватися про добробут та здоров'я царя та його двору. Аптекарський приказ залишався важливою частиною адміністрації Російської імперії, доки його не розформували після революції 1917 року."
  flavor_mos.79.title: "Підкорення [ivan_bolotnikov.GetNameWithNoTooltip]"
  flavor_mos.79.desc: "Бунтівний козацький раб, призначений на придворну службу, втік, щоб приєднатися до [ivan_bolotnikov.GetHisHer] побратимів, кидаючи виклик уявленню про життя в неволі. Однак [ivan_bolotnikov.GetHisHer] життя вільної людини далеко від двору було перерване набігом [ShowCultureGroupName('tatar_group')] з [ShowAreaName('crimea_area')], і [ivan_bolotnikov.GetSheHe] тепер перебуває в їхньому полоні. Ми можемо захотіти організувати порятунок, перш ніж [ivan_bolotnikov.GetSheHe] буде проданий у рабство, або ризикувати тим, що будь-які підслухані державні таємниці будуть розкриті незадоволеним слугою."
  flavor_mos.79.a: "Дорога справа з невеликою вигодою."
  flavor_mos.79.tt1: "[ivan_bolotnikov.GetSheHe|U] залишається на [ivan_bolotnikov.GetHisHer] власну долю і може радикалізуватися"
  flavor_mos.79.b: "Викупити [ivan_bolotnikov.GetHisHer] свободу та безпечне повернення."
  flavor_mos.79.tt2: "[Concept('ivan_bolotnikov.GetNameWithNoTooltip] додається як [character', 'CONCEPT_PLACEHOLDER')|e] і повертається до двору"
  flavor_mos.79.tt3: "[ivan_bolotnikov.GetHisHer|U] присутність при дворі ставиться під сумнів аристократією через [ivan_bolotnikov.GetHisHer] бунтівну натуру"
  flavor_mos.79.c: "Потужне полум'я, яке потребує гасіння."
  flavor_mos.79.tt4: "[ivan_bolotnikov.GetNameWithNoTooltip] помирає від таємничої хвороби."
  flavor_mos.79.historical_info: "Іван Болотніков був козацьким отаманом, який очолював протести проти царя, щоб зменшити соціальну несправедливість та економічні труднощі, накладені на простолюдинів, а також на певні верстви дворянства. Після короткого періоду свободи він був захоплений і проданий у рабство кримськими татарами. Його врятували німецькі найманці, що дозволило йому повернутися до Москви, де він допоміг організувати протести."
  flavor_mos.80.title: "Повстання Болотнікова"
  flavor_mos.80.desc: "Розбійник-революціонер [ivan_bolotnikov.GetName] втік з [ShowCultureGroupName('tatar_group')] полону і повернувся до [target_location.GetName] під покровом темряви, намагаючись підняти населення проти нас. Поширюються неправдиві чутки про жорстоке поводження та зловживання владою з боку уряду, до лав повстанців приєднуються знатні [ShowPopTypeName('nobles')] та [ShowPopTypeName('burghers')]."
  flavor_mos.80.a: "Їх зустрінуть шаблі та незламна груба сила."
  bolotnikov_uprising: "Повстання Болотнікова"
  flavor_mos.80.b: "Запропонувати поблажливість та обмежену свободу."
  flavor_mos.80.c: "Роззброїти їх майстерною риторикою."
  flavor_mos.80.tt1: "Переговорна тактика [ROOT.GeGovernment.GetRuler.GetName] переконує лідерів повстанців скласти зброю."
  flavor_mos.80.historical_info: "Повстання Болотнікова відбулося з 1606 по 1607 рік під час Смутного часу. Його спровокував козак Іван Болотніков, який прагнув боротися із соціальною несправедливістю, зловживаннями владою та економічними труднощами. Повстання отримало значну підтримку від різних станів, включаючи селян, козаків та незадоволених верств дворянства. В один момент повстання контролювало понад сімдесят міст на півдні Росії, і цар був змушений жорстоко придушити його, щоб відновити контроль."
  flavor_mos.81.title: "Впливовий Маршал"
  flavor_mos.81.desc: "Губернатор [alexander_lvov.GetName] з [ShowLocationName('nizhny_novgorod')] нещодавно повернувся до двору, щоб взяти на себе обов'язки окольничого, високу посаду, яка дозволить [alexander_lvov.GetHimHer] взяти на себе додаткові адміністративні обов'язки. Ми могли б розширити цю роль, щоб вона також охоплювала нове бюро приказу, що наглядає за палацовими справами та наглядом за монастирями, згідно з реформою [ShowGovernmentReformName('prikazi_reform')]. Це прагнуло б до кращого управління витратами двору та забезпечення повного впровадження політики [ShowPolicyName('non_possessors')]."
  flavor_mos.81.a: "Прийнятне рішення."
  enable_bolshogo_dvortsa_cabinet_action: "Надає доступ до [ShowCabinetActionName('bolshogo_dvortsa')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.81.b: "Немає потреби в додатковому нагляді."
  flavor_mos.81.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] радіють довірі, виявленій до них"
  flavor_mos.81.historical_info: "Олександр Львов був заступником губернатора, який швидко піднявся по службових сходах царського уряду, очолюючи дипломатичні делегації та служачи послом після призначення мажордомом царського двору. Він очолював бюро палацових справ, цю роль він зберігав до свого остаточного виходу на пенсію."
  flavor_mos.82.title: "Місництво"
  flavor_mos.82.desc: "[ShowGovernmentReformName('the_mestnichestvo')] гарантує, що кожен боярин має право на державну посаду відповідно до свого роду та раніше займаних посад, а також місце за столом [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Однак ця система заохочує міжусобиці серед [ShowPopTypeName('nobles')], і можна стверджувати, що вона віддаляє інші таланти від двору, що, своєю чергою, перешкоджає адміністративній ефективності уряду.\n\nРодовід найшляхетніших родин простежується в так званих стародавніх родовідних книгах, і було б розсудливо знищити їх, якщо ми прагнемо реформувати систему та краще керувати державою."
  flavor_mos.82.a: "Спалити родовідні книги."
  flavor_mos.82.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] обурені спробою обмежити їхній вплив"
  flavor_mos.82.b: "Зміни ніколи не бувають добрими."
  flavor_mos.82.c: "Покласти край феодальній ієрархічній системі."
  flavor_mos.82.historical_info: "Система місництва визначала старшинство бояр при царському дворі та у війську на основі їхніх службових записів, соціального стану та особистих зв'язків. Вона мала великий вплив на соціальну ієрархію Росії та залишалася чинною, доки її не скасував Федір III, що пізніше Петро «Великий» використав на свою користь, запроваджуючи кілька реформ загального управління Росією."
  flavor_mos.83.title: "Вежа Сююмбіке"
  flavor_mos.83.desc: "Різноманітне населення [ShowLocationName('kazan')] сповідує різні віри, що викликає потребу в додатковій оборонній споруді, яка також забезпечує кращу видимість. Збудуймо величну вежу, що черпає натхнення зі своєї історичної спадщини, дозволяючи їй служити спостережним пунктом та мінаретом для заклику вірян до молитви."
  flavor_mos.83.a: "Пропозиція щодо похилої вежі."
  mos_soyembika_tower_construction: "Будівництво Сююмбіке"
  flavor_mos.83.b: "Краще регулярно обстежувати землі."
  flavor_mos.83.historical_info: "Вежа Сююмбіке, ймовірно, була збудована за часів правління Івана IV, але історичні записи мізерні, а її походження залишається невизначеним. Вона розташована в Казанському кремлі і має висоту 58 метрів. Раніше вона була відома як одна з двох похилих веж, доки не було докладено зусиль для її стабілізації протягом двадцятого століття."
  flavor_mos.84.title: "Ревізії Домострою"
  flavor_mos.84.desc: "Представники [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] запросили низку оновлень до Домострою, щоб забезпечити, що управління домогосподарствами продовжує відповідати [ShowReligionAdjective('orthodox')] цінностям. Ця унікальна можливість дозволяє певну художню свободу, і ми можемо обрати, який аспект суспільства посилити, коли ревізії розгортатимуться."
  flavor_mos.84.a: "Традиції та мораль понад усе."
  flavor_mos.84.b: "Сімейні цінності мають бути підтримані."
  flavor_mos.84.c: "Послух і покірність Богові."
  flavor_mos.84.d: "Піст і молитва є необхідністю."
  STATIC_MODIFIER_NAME_stringent_fasting_and_prayer: "Суворий піст і молитва"
  flavor_mos.84.historical_info: "Домострой — це звід настанов і правил для ведення російського домогосподарства, а його походження можна простежити до шістнадцятого століття, найімовірніше, до міста Новгорода. Він дає унікальне уявлення про соціальні та культурні норми середньовічної Русі і був переглянутий, коли цінності та мораль того часу змінилися."
  flavor_mos.85.title: "[simon_ushakov.GetNameWithNoTooltip]"
  flavor_mos.85.desc: "Іконописний візіонер [simon_ushakov.GetName] запровадив нову форму релігійного живопису з акцентом на світські постаті та поєднанням традиційних іконографічних елементів з деякими західними впливами. Використана багата палітра кольорів різко контрастує з існуючими роботами і, ймовірно, викличе невдоволення у [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Однак приплив нових смаків та барокових впливів принесе користь мистецькій спільноті в цілому і сприятиме поширенню нових ідей."
  flavor_mos.85.a: "Запросити його до двору."
  flavor_mos.85.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вважає нові впливи диявольською справою та порушенням чинної цензури."
  flavor_mos.85.b: "Краще підходить для викладання."
  STATIC_MODIFIER_NAME_restricted_to_teaching: "Обмежено до викладання"
  flavor_mos.85.tt3: "[simon_ushakov.GetSheHe|U] пропонують викладацьку посаду у [ShowBuildingTypeName('stroganov_school_of_iconic_art')]"
  flavor_mos.85.c: "Змінити бренд та перепродати."
  flavor_mos.85.tt4: "Робота [simon_ushakov.GetHisHer|U] терпима, але внутрішні продажі заборонені."
  flavor_mos.85.d: "Ув'язнити [simon_ushakov.GetHimHer]."
  flavor_mos.85.historical_info: "Симон Ушаков був одним з провідних художників Московської школи іконопису, який сприяв розвитку стилю бароко в російському мистецтві. Його пам'ятають як одного з наймайстерніших іконописців, що включав ілюстрації та портрети царя. Він недовго обіймав посаду голови Збройової палати Кремля, що посилило його вплив у культурних та мистецьких справах."
  flavor_mos.86.title: "Збір коштів Кузьми Мініна"
  flavor_mos.86.desc: "Війна, що триває, призвела до тимчасової втрати [target_location.GetName], але несподівано один з наших найзаможніших [ShowPopTypeName('burghers')] спромігся зібрати значні кошти для військових зусиль, включно зі значною частиною його статків. Також було організовано добровольче військо, яке долучилося до наших загальних сил."
  flavor_mos.86.a: "Прийняти щедру пропозицію."
  flavor_mos.86.b: "Відхилити пропозицію."
  flavor_mos.86.tt1: "[ShowPopTypeName('burghers')] радіють, що вони зберігають свої тяжко зароблені копійки"
  flavor_mos.86.historical_info: "Кузьма Мінін був впливовим купцем, якого пам'ятають за його внесок у визволення Москви від польської окупації. Разом із князем Дмитром Пожарським він організував добровольче військо та пожертвував значну частину свого особистого прибутку на цю справу. Сьогодні його вшановують як символ патріотизму та єдності під час Смутного часу."
  flavor_mos.87.title: "Віднайдення Казанської Богоматері"
  flavor_mos.87.desc: "Найбільш свята з ікон була віднайдена після завоювання [ShowLocationName('kazan')]. Спочатку привезена до [ROOT.GetCountry.GetName] з [ShowLocationName('constantinople')] у тринадцятому столітті, вона залишалася втраченою з початку набігів [ShowCultureGroupName('tatar_group')]. Необхідно вжити заходів, щоб забезпечити її місцезнаходження та переконатися, що вона отримає належну увагу та пошану."
  flavor_mos.87.a: "Виставити її негайно."
  mos_lady_of_kazan_copies: "Робляться копії Казанської Богоматері"
  flavor_mos.87.b: "Її слід вшановувати у багатьох місцях."
  flavor_mos.87.tt1: "Робляться копії Богоматері на велику радість [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"
  flavor_mos.87.c: "Запилена стара скриня заслуговує на незначне визнання."
  flavor_mos.87.historical_info: "Казанська Богоматір — це ікона, переважно пов'язана з кількома чудесними подіями, яка має велике культурне та релігійне значення в Росії. За переказами, ікона чудесним чином з'явилася під час пожежі в Казані після її завоювання у татар. Хоча оригінальна ікона відсутня, репродукції та копії Казанської Богоматері широко поширені по всій Православній Церкві."
  flavor_mos.88.title: "Перший поет"
  flavor_mos.88.desc: "Благочестивий вчений, родом з [ShowLocationName('polotsk')], висунув пропозицію заснувати лінгвістичну академію, зосереджену головним чином на навчанні урядовців мові дипломатії, а саме [latin.GetName]. [simon_sitnianowicz.GetName], будучи не чужим суперечливим ідеям, також запропонував, щоб [simon_sitnianowicz.GetSheHe] було доручено викладати граматику, поетику та риторику простому народу. Таку ініціативу слід заохотити, виділивши кошти для її реалізації."
  flavor_mos.88.a: "Спілкування — ключ до успіху."
  flavor_mos.88.tt1: "[Concept('simon_sitnianowicz.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.88.b: "Час краще витратити на проповіді та повчання."
  flavor_mos.88.tt2: "[simon_sitnianowicz.GetSheHe|U] присвячує [simon_sitnianowicz.GetHisHer] час поширенню просвітницьких ідей та створенню поезії"
  flavor_mos.88.c: "Залучити [simon_sitnianowicz.GetHimHer] як приватного вчителя."
  flavor_mos.88.d: "Народ повинен залишатися в невіданні."
  flavor_mos.88.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] задоволені бути свідками вигнання людини неортодоксальних ідей."
  flavor_mos.88.historical_info: "Симеон Полоцький був білоруським православним ченцем, поетом і перекладачем, якого пам'ятають за його літературний внесок, що вважається ключовим для становлення православної християнської традиції. Він запровадив викладання грецької та латинської мов у Росії, і протягом свого життя також допомагав перекладати кілька праць західних богословів, сприяючи поширенню знань у Православній Церкві."
  flavor_mos.89.title: "Військові досягнення [patrick_gordon.GetNameWithNoTooltip]"
  flavor_mos.89.desc: "Стратег і військовий інженер, що воює як найманець у [GetCountry('SWE').GetAdjective] армії, пропонує перейти на наш бік і приєднатися до наших лав за невелику винагороду. Досвід [patrick_gordon.GetName] безумовно сприяв би нашим зусиллям з реформування та зміцнення армії відповідно до західноєвропейських стандартів."
  flavor_mos.89.a: "Запропонувати щедру стипендію."
  STATIC_MODIFIER_NAME_military_influencer: "Військовий впливовець"
  flavor_mos.89.b: "Залізна Діва змусить [patrick_gordon.GetHimHer] виспівати [patrick_gordon.GetHisHer] таємниці."
  flavor_mos.89.tt2: "[patrick_gordon.GetSheHe|U] схоплений і катований задля інформації"
  flavor_mos.89.c: "Перебіжчик – ризикована інвестиція."
  flavor_mos.89.historical_info: "Патрік Гордон був шотландським військовим інженером і генералом, який служив у російській армії. Він розпочав свою військову кар'єру у шведській армії під час Другої Північної війни, але пізніше перейшов на інший бік і приєднався до російської армії. Він став близьким соратником Петра 'Великого', що згодом призвело до напруженості у відносинах з російським дворянством."
  flavor_mos.90.title: "Мандрівник інкогніто"
  flavor_mos.90.desc: "Ми ризикуємо відстати від наших супротивників у наукових досягненнях та інноваціях. Необхідно вжити заходів для впровадження нового мислення в [ROOT.GetCountry.GetName] шляхом здійснення дипломатичної подорожі з основною метою вивчення західних технологій, культур та практик управління. Наші представники могли б подорожувати інкогніто, дозволяючи членам вищого суспільства супроводжувати почет. Це могло б стати справді цінним досвідом з перших рук і сприяти подальшим дипломатичним переговорам."
  flavor_mos.90.a: "Вигідна пригода."
  grand_embassy: "Велике посольство"
  flavor_mos.90.tt1: "Річна подорож на захід з часом відкриває [target_root_country.GetNameWithNoTooltip] для нових впливів та проривів"
  flavor_mos.90.tt2: "Подорож, очолювана [target_root_country.GetGovernment.GetRuler.GetName], обіцяє стати чудовим досвідом навчання"
  flavor_mos.90.b: "Давайте натомість проведемо науковий ярмарок."
  flavor_mos.90.tt3: "Ярмарок приваблює дослідників та провідних мислителів з усієї Європи"
  flavor_mos.90.tt4: "Відбувається значна перебудова, щоб мати можливість провести ярмарок, що додає до [Concept('development', 'CONCEPT_PLACEHOLDER')|e] [target_location.GetName]"
  flavor_mos.90.c: "Ми наздоженемо з часом."
  flavor_mos.90.historical_info: "Велике посольство було подорожжю, здійсненою Петром 'Великим' у спробі забезпечити додаткову підтримку коаліції проти Османської імперії. Вторинні цілі включали наймання іноземних військових експертів та придбання нових технологій. У цей період Росія зіткнулася з внутрішніми та зовнішніми викликами, що мотивувало рішучість Петра запровадити реформи та перетворити країну на більш сучасну та могутню державу. Він подорожував під псевдонімом, щоб злитися з місцевим населенням; однак його зріст у 2,05 метра все одно виділяв його."
  flavor_mos.91.title: "[francesco_rastrelli.GetNameWithNoTooltip]"
  flavor_mos.91.desc: "Блискучий архітектор скромного походження, що проживає в [ShowLocationName('paris')], переїхав до [ShowLocationName('neva')] у пошуках нових можливостей. [francesco_rastrelli.GetName] має значний досвід проектування в стилі пізнього бароко, що було б надзвичайно важливим, якщо ми прагнемо перетворити [ShowLocationNameWithNoTooltip('neva')] на грандіозний та розкішний мегаполіс."
  flavor_mos.91.a: "Свіжий вплив."
  flavor_mos.91.tt2: "[francesco_rastrelli.GetHeShe|U] може продовжити проектувати чудові будівлі в [ShowLocationName('neva')], за умови, що це столиця [target_root_country.GetName]"
  flavor_mos.91.b: "Нарешті, гідний талант."
  STATIC_MODIFIER_NAME_chief_architect: "Головний архітектор"
  flavor_mos.91.tt3: "[francesco_rastrelli.GetHeShe|U] користується наставництвом [target_root_country.GetGovernment.GetRuler.GetName], що підносить [francesco_rastrelli.GetHimHer] до посади Головного архітектора"
  flavor_mos.91.c: "Талант можна знайти деінде."
  flavor_mos.91.historical_info: "Франческо Бартоломео Растреллі прибув до Росії зі своїм батьком на запрошення імператора Петра I. Його метою було покращити культурне та мистецьке середовище в Росії, і він вірив, що таланти родини Растреллі будуть неоціненними для досягнення цієї мети. Його першим великим проєктом була реконструкція Зимового палацу, який згодом став головною царською резиденцією."
  flavor_mos.92.title: "Зимовий палац"
  flavor_mos.92.desc: "Ми опинилися без жодної справді величної архітектурної пам'ятки в новій столиці [ShowLocationName('neva')]. Як свідчення величі [ROOT.GetCountry.GetName], [francesco_rastrelli.GetName] пропонує будівництво Зимового палацу, який розмістить адміністрацію та стоятиме як маяк влади та розкоші на століття вперед. Справжнє відображення могутності та витонченості нашого [ROOT.GetCountry.GetFlavorRank], що викликатиме захоплення з усіх куточків світу."
  flavor_mos.92.a: "Живе свідчення величі."
  mos_winter_palace_construction: "Будівництво Зимового палацу"
  flavor_mos.92.tt1: "Щедрість [grigory_orlov.GetName] дозволяє додати до палацу вишуканий сад на додаток до багатого вибору фресок та муралів"
  flavor_mos.92.b: "Монета повинна відповідати амбіціям."
  mos_catherine_palace_construction: "Будівництво Катерининського палацу"
  flavor_mos.92.tt2: "Будується менш вишуканий палац, придатний для літніх місяців"
  flavor_mos.92.c: "Покращмо саме місто."
  flavor_mos.92.historical_info: "Зимовий палац служив офіційною резиденцією російської імператорської родини до скасування монархії. Завершений за правління Катерини 'Великої', він вважається одним з найраніших прикладів барокової архітектури в Росії. Спочатку замовлений Петром 'Великим', палац зазнав численних розширень та змін протягом років, зумовлених необхідністю усунення пожеж та зростаючим бажанням модернізувати його структуру."
  flavor_mos.93.title: "Указ про одяг"
  flavor_mos.93.desc: "Європейська мода постійно змінюється, проте в [ROOT.GetCountry.GetName] ми все ще дотримуємося архаїчних тенденцій, продиктованих традицією, а не #italic mode actuelle#!. Приймімо найновіші стилі, прийняті в подібних європейських дворах, і залишмо застарілу та сприйняту відсталість, заборонивши традиційний одяг та запровадивши сучасне вбрання для [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_mos.93.a: "Перуки та панчохи напоготові."
  mos_enforced_fashion: "Примусова мода"
  flavor_mos.93.tt1: "Значні обсяги тканин імпортуються для сприяння переходу до західних стилів моди"
  flavor_mos.93.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] спровоковані кричущою зневагою до традиційної ієрархічної структури дворянства"
  flavor_mos.93.b: "Кафтани – це новий чорний."
  flavor_mos.93.tt3: "Традиційне вбрання зберігається, що ще більше зміцнює будь-який опір змінам"
  flavor_mos.93.historical_info: "За правління Петра 'Великого' відбулися значні зміни в одязі дворянства як частина його ширших зусиль з модернізації та вестернізації Росії. Він запровадив суворі заходи проти традиційного вбрання, такого як довгі кафтани та бороди, які зазвичай носили дворяни."
  flavor_mos.94.title: "Всеп'яніший собор"
  flavor_mos.94.desc: "Молодий монарх вважає настрій при дворі досить жорстким і безкомпромісним. Прагнучи внести трохи розваг, [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] заснував соціальний клуб, де члени беруть участь у гумористичних та грайливих витівках, одягаючись у перебільшені західні костюми, жартуючи та беручи участь у комедійних виступах. Хоча це не цінується [ShowReligionAdjective('orthodox')] Церквою через глузування з її традицій, це загалом сприймається як трохи веселої розради від формальностей придворного життя, допомагаючи внести освіжаючу дозу гумору в повсякденну рутину."
  flavor_mos.94.a: "Трохи невинних веселощів."
  flavor_mos.94.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] не розважаються повторними глузуваннями з традиційних цінностей"
  flavor_mos.94.b: "Ганебна демонстрація найвищого гріха."
  flavor_mos.94.tt2: "Розпуск соціального клубу створює тертя між [target_root_country.GetGovernment.GetRulerTitle] та [target_root_country.GetGovernment.GetRuler.GetHisHer] найближчими друзями"
  flavor_mos.94.c: "Призначити цапа-відбувайла."
  flavor_mos.94.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] виганяє будь-якого причетного винуватця за підтримки [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.94.historical_info: "Всежартівливий, всеп'яний Собор блазнів і жартівників був створений Петром 'Великим' та його близькими друзями Патріком Гордоном і Франсуа Ле Фортом як соціальний експеримент для виклику традиційних норм. Члени товариства, включаючи дворян і придворних чиновників, займалися діяльністю, що висміювала традиційні російські звичаї, переймаючи західні манери та одяг. Пияцтво заохочувалося і відігравало значну роль у різноманітних виставах та ритуалах, якими займалася група."
  flavor_mos.95.title: "Меценатство [bogdan_khitrovo.GetNameWithNoTooltip]"
  flavor_mos.95.desc: "Могутній дворянин та проникливий бізнесмен висловив зацікавленість у забезпеченні урядової посади, придатної для [bogdan_khitrovo.GetHisHer] соціального становища. [bogdan_khitrovo.GetName] глибоко відданий мистецьким починанням і шукає посаду, де [bogdan_khitrovo.GetSheHe] зможе безпосередньо сприяти в обмін на щедре меценатство, надане [bogdan_khitrovo.GetHisHer] родиною."
  flavor_mos.95.a: "Справжній меценат мистецтв."
  STATIC_MODIFIER_NAME_artistic_encouragement: "Мистецьке заохочення"
  flavor_mos.95.tt2: "[bogdan_khitrovo.GetSheHe|U] стає головним наглядачем провідних художників, що призводить до переходу до прийняття західних впливів у таких творах, як натуралізм"
  flavor_mos.95.tt3: "[ShowBuildingTypeName('stroganov_school_of_iconic_art')] отримує значну пожертву, що каталізує створення додаткових творів мистецтва"
  flavor_mos.95.b: "Запропонувати урядову посаду."
  flavor_mos.95.tt4: "Офіси [ShowGovernmentReformName('prikazi_reform')] відмінно працюють під керівництвом [bogdan_khitrovo.GetNameWithNoTooltip]"
  STATIC_MODIFIER_NAME_accomplished_overseeing: "Досконалий нагляд"
  flavor_mos.95.c: "Увага не буде розділена."
  flavor_mos.95.historical_info: "Богдан Хітрово був російським державним діячем, який відзначився в управлінні кількома приказами за часів правління двох послідовних царів. Ця посада дозволила йому наглядати за іконописцями, зайнятими при дворі, впливаючи на них у процесі. Захоплений західною культурою, Богдан прагнув використати свій вплив, щоб запровадити її в провідні мистецькі кола того часу, що призвело до значного припливу поширених ідей, таких як натуралізм. Це започаткувало нову еру для російського мистецтва, відзначивши відхід від традиційних практик іконопису, що використовувалися з часів Середньовіччя."
  flavor_mos.96.title: "Надзвичайно успішний дяк"
  flavor_mos.96.desc: "Зростаюча зірка дещо скромного походження продемонструвала надзвичайний талант до переговорів з іноземними державами і прагне продовжувати просуватися кар'єрними сходами. [afanasy_nashchokin.GetName] має видатні освітні заслуги і може виявитися грізним активом у будь-якому дорученому завданні, за умови, що ми зможемо не зважати на [afanasy_nashchokin.GetHisHer] незначні родинні зв'язки."
  flavor_mos.96.a: "Майстер слова неперевершеної майстерності."
  flavor_mos.96.tt2: "[afanasy_nashchokin.GetHisHer|U] майстерне формулювання призводить до того, що [afanasy_nashchokin.GetHimHer] призначають представляти [target_root_country.GetName] за кордоном, долаючи підступну місцевість, яку представляє дипломатія"
  flavor_mos.96.b: "Ткач бюрократичних гобеленів."
  flavor_mos.96.tt3: "[afanasy_nashchokin.GetSheHe|U] наглядає за Посольським Приказом, значно покращуючи його передбачувану функцію"
  STATIC_MODIFIER_NAME_posolsky_prikaz_excelling: "Посольський Приказ відмінно працює"
  STATIC_MODIFIER_NAME_brilliant_diplomacy: "Блискуча дипломатія"
  flavor_mos.96.c: "Столичний реформатор."
  flavor_mos.96.tt4: "[afanasy_nashchokin.GetSheHe|U] запроваджує такі модернізації, як газети та векселі, в [target_root_country.GetAdjective] економіку"
  flavor_mos.96.d: "Відмовитися визнавати [afanasy_nashchokin.GetHisHer] внесок."
  flavor_mos.96.tt5: "Перевантажений працівник, знеохочений відсутністю позитивного підкріплення, вирішує шукати роботу в іншому місці"
  flavor_mos.96.historical_info: "Афанасій Нащокін був державним діячем, а згодом дипломатом, який уклав кілька договорів, що були дуже вигідними для Росії. Його було призначено відповідальним за #italic Посольський приказ#!, посада, на якій він досяг успіху, і він піднявся по службі завдяки навичкам, а не спадку, як це було поширеною практикою в Росії. Він постійно був об'єктом заздрості знаті та мусив неодноразово відбивати їхню ворожість."
  flavor_mos.97.title: "Відомості"
  flavor_mos.97.desc: "Останні міжнародні плітки знайшли платформу у вигляді друкованої газети, очолюваної [ROOT.GetCountry.GetGovernment.GetRuler.GetName], з розкриттям дипломатичних відносин, новин з фронту та військових перемог. Очікується, що незабаром вона буде введена в обіг, починаючи з кількох сотень примірників для тих, кого вважають достатньо поважними, щоб її читати. Ми можемо побажати відредагувати її зміст перед випуском, якщо наші амбіції дещо відрізняються від амбіцій її видавця."
  flavor_mos.97.a: "Терміново, терміново, читайте все про це."
  flavor_mos.97.tt1: "Журналістські амбіції [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] забезпечують [target_root_country.GetName] бути в курсі світових драм"
  STATIC_MODIFIER_NAME_briefed_on_current_events: "Поінформований про поточні події"
  flavor_mos.97.b: "Обмежити публікації військовими досягненнями."
  flavor_mos.97.tt2: "Звіти про епічні перемоги [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] майстерно перетворюються на славні оповіді"
  flavor_mos.97.c: "Переробити його як стратегічний посібник."
  flavor_mos.97.tt3: "Детальні бойові звіти та ретельно розроблені військові стратегії під час конфліктів подаються командувачам армій у письмовому форматі"
  flavor_mos.97.d: "Нам не потрібен жоден дурний папір."
  flavor_mos.97.historical_info: "Відомості були найстарішою газетою в Росії, заснованою царем Петром 'Великим' у перші роки його правління. Вона мала нерегулярний тираж і надавала оновлення щодо конфліктів, у яких Росія брала участь, демонструючи свої досягнення на полі бою та зображуючи царя у сприятливому світлі для широкої публіки. Новини того часу часто були застарілими та неактуальними, створюючи значні виклики при укладанні договорів з противниками та управлінні загальною адміністрацією імперії."
  flavor_mos.98.title: "Колегія"
  flavor_mos.98.desc: "Недавня реорганізація урядових органів вимагала більш ефективного міністерського управління, щоб запобігти будь-якому дублюванню обов'язків відомств. Давайте відмовимося від існуючої системи [ShowGovernmentReformName('prikazi_reform')], замінивши її низкою колегій. Кожна колегія матиме чіткі обов'язки та поділ повноважень, з додатковою відповідальністю надавати поради щодо невирішених справ за запитом."
  flavor_mos.98.a: "Геть старе, хай живе нове."
  enable_collegium_reform: "Надає доступ до [ShowGovernmentReformName('collegium_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.98.tt1: "[ShowGovernmentReformNameWithNoTooltip('prikazi_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] та будь-які пов'язані [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] стають недоступними"
  flavor_mos.98.b: "Управління є делікатною справою, і з ним не можна легковажити."
  flavor_mos.98.tt2: "Вживаються заходи для покращення управління [ShowLocationName('neva')] відповідно до [ShowPolicyName('dop_law_governing_senate')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.98.historical_info: "Після заснування Урядового Сенату Петро 'Великий' заснував різні колегії як адміністративні органи, відповідальні за різні аспекти управління, такі як Синод та Адміралтейська колегія. Натхнення було черпано з подібних реформ, які нещодавно були впроваджені в сусідній Швеції. Терміновість реформ була прискорена зростанням кількості територій Російської імперії."
  flavor_mos.99.title: "Бородовий жетон"
  flavor_mos.99.desc: "Останні модні тенденції, що охоплюють [ShowSubContinentName('western_europe')], диктують, що чоловік повинен бути чисто поголеним. Однак ця тенденція не прижилася серед [ROOT.GetCountry.GetAdjective] еліти, оскільки традиція носити довгу бороду глибоко вкорінена в [ShowReligionAdjective('orthodox')] культурі та релігії. Спроби запровадити заборону зустріли широке обурення, і Церква нещодавно оголосила це блюзнірством. Введення плати у вигляді обов'язкового бородового жетона могло б допомогти схилити деяких до нашої безбородої справи, водночас генеруючи значний внесок до державної скарбниці для тих, хто вирішить зберегти свою бороду."
  flavor_mos.99.a: "Так і буде, коротка щетина."
  STATIC_MODIFIER_NAME_beard_tax: "Податок на бороди"
  mos_beard_tax_tokens: "Бородні жетони"
  flavor_mos.99.tt1: "Значна кількість бородних жетонів виробляється за державний кошт"
  flavor_mos.99.tt2: "Волохаті чоловіки [target_root_country.GetName] тримаються своїх переконань, просто сплачуючи податок"
  flavor_mos.99.b: "Спробувати іншу заборону."
  flavor_mos.99.c: "Нехай усі підборіддя вільно блукають."
  flavor_mos.99.historical_info: "Податок на бороди був спробою Петра «Великого» узгодити Росію з іншими великими державами Європи в плані моди та культури. Був викарбуваний жетон, який став обов'язковою покупкою для тих, хто вирішив сплатити податок замість того, щоб розлучитися зі своїми бородами. Таємна поліція царя намагалася забезпечити дотримання системи; однак це не призвело до значного зсуву в бік західних стандартів, оскільки більшість чоловіків воліли просто сплачувати податок."
  flavor_mos.100.title: "Перший адмірал"
  flavor_mos.100.desc: "Морський стратег [feodor_apraksin.GetName] деякий час успішно керував [target_location.GetRank.GetName] [ShowLocationName('arkhangelsk')], що дозволило [feodor_apraksin.GetHimHer] одночасно займатися іншими справами. Нещодавно [feodor_apraksin.GetSheHe] продемонстрував здібності до військової інженерії, галузі, яку [feodor_apraksin.GetSheHe] прагне досліджувати далі. Ми повинні обміркувати наступне призначення [feodor_apraksin.GetHisHer], оскільки поточний термін добігає кінця, потенційно переведення до [ShowBuildingTypeName('admiralty')], щоб допомогти зміцнити наші морські амбіції та реалізувати мрію про суверенне панування над морями"
  flavor_mos.100.a: "Адміралтейство отримає велику користь."
  flavor_mos.100.tt2: "[feodor_apraksin.GetHisHer|U] технічна експертиза та ресурси [ShowBuildingTypeNameWithNoTooltip('admiralty')] у розпорядженні [feodor_apraksin.GetHisHer] дозволяють розробляти нові конструкції кораблів для нової лінії кораблів, що приборкують шторми"
  enable_hurricane_hardy_advance: "Надає доступ до [ShowAdvanceName('hurricane_hardy')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.100.b: "Продовжити губернаторство."
  STATIC_MODIFIER_NAME_tempest_engineer: "Інженер буревіїв"
  flavor_mos.100.tt3: "Технічна експертиза та управління [feodor_apraksin.GetNameWithNoTooltip] портом [ShowLocationName('arkhangelsk')] дозволяють швидко будувати нові конструкції для нової лінії кораблів, що приборкують шторми, включаючи багатообіцяючий прототип"
  flavor_mos.100.c: "Захист батьківщини має пріоритет."
  flavor_mos.100.tt4: "Технічна експертиза та нагляд [feodor_apraksin.GetNameWithNoTooltip] дозволяють посилити укріплення по всьому [ROOT.GetNameWithNoTooltip]"
  flavor_mos.100.historical_info: "Федір Апраксін брав участь у кількох військових кампаніях, що принесло йому губернаторство найважливішого торгового порту Росії, Архангельська. Він був вправним інженером і зрештою йому довірили будівництво першого флоту Росії, а також кількох укріплень, поки цар був зайнятий в інших місцях. Зусилля Апраксіна відіграли вирішальну роль у модернізації флоту, що залишило тривалий вплив на імперські амбіції Росії."
  flavor_mos.101.title: "Інформативний державний візит"
  flavor_mos.101.desc: "Поточна польова поїздка по [ShowSubContinentName('western_europe')] проходить за планом і з великим очікуванням. Тепер настала черга [ROOT.GetCountry.GetGovernment.GetRuler.GetName] відвідати [target_country.GetName]. [ROOT.GetCountry.GetGovernment.GetRulerTitle] має зробити кілька видатних зупинок, що включають ретельно сплановані бенкети, елегантну моду, напудрені перуки та вишукані вугрові пироги як елементи витонченого меню вражень. Це справді обіцяє бути вражаючою королівською подією."
  flavor_mos.101.a: "Прийняти видовище."
  flavor_mos.101.tt1: "Обсерваторія в Гринвічі дозволяє [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] особисто тренувати телескоп"
  flavor_mos.101.tt2: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] бере участь у огляді флоту Королівського флоту в Дептфорді"
  flavor_mos.101.tt3: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] отримує почесний докторський ступінь в [ShowLocationName('oxford')] університеті"
  flavor_mos.101.tt4: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] відвідує інформаційну сесію, організовану [ShowBuildingTypeName('royal_society')]"
  flavor_mos.101.tt5: "Особистий портрет [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] подарований провідним портретистом [godfrey_kneller.GetName]"
  opinion_gifted_magnificent_painting: "Подаровано чудовий живопис"
  flavor_mos.101.b: "Присвятіть час приватному навчанню та спогляданню."
  flavor_mos.101.c: "Спостережлива сова мовчки сидить у тіні."
  flavor_mos.101.tt6: "Витончена [Concept('spy_network', 'CONCEPT_PLACEHOLDER')|e] у [target_country.GetNameWithNoTooltip] використовується для збору інформації у зв'язку з офіційним візитом"
  flavor_mos.101.historical_info: "Велике посольство Петра «Великого» зрештою привело його до берегів Англії, яка на той час мала зростаючий вплив у світових справах і вважалася місцем збору інтелектуалів, що прагнули уникнути переслідувань автократичної Європи. Петро відвідав кілька відомих установ, таких як Королівський монетний двір, Товариство та Обсерваторія, брав участь у пиятиках з англійським королем і вивчав англійські техніки містобудування, які пізніше будуть використані при будівництві нової столиці Санкт-Петербурга. Головною метою візиту було забезпечення цінними технологічними активами."
  flavor_mos.102.title: "Мальтійська делегація"
  flavor_mos.102.desc: "Лицарі-тамплієри [ShowLocationName('malta')] мають довгу історію боротьби з інвазивною силою, якою є [GetCountry('TUR').GetLongName], з повторюваними сутичками на суші та на морі протягом століть. Тамплієри висококваліфіковані і можуть виявитися безцінними для наших збройних сил, якщо ми вирішимо кинути виклик могутності [GetCountry('TUR').GetAdjectiveWithNoTooltip] [GetCountry('TUR').GetFlavorRank]. Давайте відправимо делегацію з нашої бази, що межує з [ShowAreaName('black_sea_area')], і дізнаємося секрети цих фанатиків, щоб отримати перевагу."
  flavor_mos.102.a: "Підйомники напоготові."
  flavor_mos.102.tt1: "Делегація вивчає бойову історію та бойові техніки колишніх хрестоносців"
  flavor_mos.102.b: "Від торгівлі можна отримати більше."
  flavor_mos.102.c: "Чоловікам потрібна лише горілка та славна смерть."
  flavor_mos.102.historical_info: "Петро «Великий» відправив дипломата та фельдмаршала Бориса Петровича Шереметєва на Мальту, щоб спостерігати за навчанням та навичками Мальтійських лицарів та їхніх військово-морських сил. Росія нещодавно заснувала свою першу військово-морську базу в Азовському морі, і конфлікт з Османською імперією здавався неминучим."
  flavor_mos.103.title: "Сухарева вежа"
  flavor_mos.103.desc: "Флот залежить від стабільного постачання здібних моряків та передачі знань від одного покоління до іншого. Щоб задовольнити наші морські амбіції, ми повинні заснувати школу, яка надаватиме технічну освіту, щоб закласти основу для подальшого розширення наших збройних сил. Нещодавно було подано проект величної вежі, яка могла б розмістити такий заклад, одночасно сприяючи прикрасі міського пейзажу [ShowLocationName('moscow')]."
  flavor_mos.103.a: "Достойна амбіція."
  flavor_mos.103.tt1: "Верхній поверх призначений для [james_bruce.GetName], який облаштовує астрономічну обсерваторію з чудовим видом"
  flavor_mos.103.b: "Немає потреби в такій екстравагантності."
  flavor_mos.103.c: "Він повинен відповідати потребам [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_mos.103.tt2: "Сучасна система водопостачання побудована на другому поверсі для блага [ShowLocationName('moscow')]"
  flavor_mos.103.historical_info: "Сухарева вежа була побудована наприкінці сімнадцятого століття на честь перемоги Петра «Великого» над стрільцями, які повстали проти нього в попередні роки. Вежа служила різним цілям протягом багатьох років, таким як казарми, навчальні заклади, інфраструктура та сховище для купців, до її остаточного руйнування радянською владою в 1934 році."
  flavor_mos.104.title: "[francois_le_fort.GetNameWithNoTooltip]"
  flavor_mos.104.desc: "Колишній стратег і найманець шукає роботу в [ROOT.GetCountry.GetAdjective] армії, сподіваючись зробити собі ім'я. Заслуги [francois_le_fort.GetName] вражаючі, але йому бракує лідерського досвіду, проте [francois_le_fort.GetSheHe] наполягає на польовому званні капітана, підвищення, яке не сподобалося б генералам-уродженцям на подібному кар'єрному шляху."
  flavor_mos.104.a: "Правила створені для того, щоб їх порушувати."
  flavor_mos.104.tt2: "[francois_le_fort.GetSheHe|U] демонструє природний талант розважати маси, як шляхту, так і простолюдинів, що може стати в нагоді"
  flavor_mos.104.b: "Безглузда ідея."
  flavor_mos.104.historical_info: "Франсуа Лефорт служив Петру I «Великому» як дипломат і генерал, беручи участь у кількох кампаніях із забезпечення доступу Росії до Азовського моря. Він став близьким другом царя і відіграв важливу роль у формуванні Всеп'янішого, Всешумнішого та Всесвятішого Собору, а також був головним організатором і учасником серії військових ігор, влаштованих для Петра під час його регентства, зазвичай званих «Потішним військом»."
  flavor_mos.105.title: "Потішне військо"
  flavor_mos.105.desc_common1: "Юний [target_character.GetName] захопився військовими іграми та мініатюрними солдатами, демонструючи великі здібності до стратегії та розгортання військ."
  flavor_mos.105.desc_common2: "пропонуючи організувати серію імітаційних битв, використовуючи справжніх солдатів замість іграшок, щоб розіграти складні сцени, які дозволили б молодому спадкоємцю вивчити мистецтво війни."
  flavor_mos.105.desc_patrick_gordon: "$flavor_mos.105.desc_common1$ Значний інтерес до військових справ помітив військовий стратег [patrick_gordon.GetName], який $flavor_mos.105.desc_common2$"
  flavor_mos.105.desc_francois_le_fort: "$flavor_mos.105.desc_common1$ Значний інтерес до військових справ помітив військовий стратег і близький довірений [francois_le_fort.GetName], який наполягає не тільки на участі, але й $flavor_mos.105.desc_common2$"
  flavor_mos.105.desc_both: "$flavor_mos.105.desc_common1$ Значний інтерес до військових справ помітили військові стратеги та близькі довірені [patrick_gordon.GetName] і [francois_le_fort.GetName], які $flavor_mos.105.desc_common2$"
  flavor_mos.105.a: "Нехай ігри почнуться."
  training_with_gordon: "Отримує #G 10#! [Concept('mil_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('ability', 'CONCEPT_PLACEHOLDER')|e] від тренувань з [patrick_gordon.GetName]"
  training_with_le_fort: "Отримує #G 10#! [Concept('mil_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('ability', 'CONCEPT_PLACEHOLDER')|e] від тренувань з [francois_le_fort.GetName]"
  flavor_mos.105.tt1: "Харизматична натура [target_character.GetNameWithNoTooltip] допомагає [target_character.GetHimHer] розвивати тісні дружні стосунки з організаторами та учасниками нижчого статусу, що розлючує [ShowPopTypeName('nobles')]"
  flavor_mos.105.tt2: "Будуються спеціальні казарми для розміщення зростаючого потішного війська"
  mos_toy_army_components: "Компоненти потішного війська"
  STATIC_MODIFIER_NAME_friends_in_all_places: "Друзі всюди"
  flavor_mos.105.b: "Приватного навчання буде достатньо."
  flavor_mos.105.historical_info: "Петро I «Великий» мав колекцію іграшкових солдатиків, з якими він грав у дитинстві. Були влаштовані складні ігри, в яких також брали участь справжні солдати, інструктори та стрілецькі добровольці. Це раннє знайомство з військовими іграшками вплинуло на його пізніше рішення вступити до армії, досвід, який став вирішальним у його подальших спробах як царя модернізувати та зміцнити російську армію."
  flavor_mos.106.title: "Імператорська гвардія"
  flavor_mos.106.desc: "Складні та реалістичні військові ігри, проведені Потішним військом, призвели до створення елітного полку, придатного для битв, з непохитною вірністю [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Однак він залишається мішаниною новобранців з різних верств суспільства, але цю непослідовність можна подолати, реорганізувавши його в дві роти. Перша рота складалася б переважно з [ShowPopTypeName('nobles')] і мала б завдання захищати [ROOT.GetCountry.GetGovernment.GetRulerTitle], тоді як друга відігравала б активнішу роль у військових кампаніях та війнах."
  flavor_mos.106.a: "На старт, увага, руш."
  enable_preobrazhensky_semyonovsky_imperial_guard_advance: "Надає доступ до [ShowAdvanceName('preobrazhensky_semyonovsky_imperial_guard')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.106.b: "Зайве для встановленого порядку."
  flavor_mos.106.historical_info: "Преображенський та Семенівський полки були двома найпрестижнішими та елітними військовими частинами Російської імператорської армії, відомими своєю історичною важливістю та тісними зв'язками з російськими монархами. Вони були сформовані Петром I «Великим» як частина масштабних реформ загальної військової структури та продовжували захищати монархію до їх розпуску під час Російської революції."
  flavor_mos.107.title: "Винятково високий державний діяч"
  flavor_mos.107.desc: "[ShowPolicyName('dop_law_governing_senate')] ретельно шукає по всій країні талановитих особистостей, які можуть служити з відзнакою та доблестю. Настала черга впливового дворянина та губернатора [tikhon_streshnev.GetName] приєднатися до інших політиків. [tikhon_streshnev.GetSheHe|U] не чужий бюрократії і, як очікується, ідеально впишеться, якщо не враховувати [tikhon_streshnev.GetHisHer] надзвичайний зріст."
  flavor_mos.107.a: "Запросити його на службу."
  flavor_mos.107.tt2: "Зріст [tikhon_streshnev.GetHisHer] становить трохи більше двох метрів, що сприяє його схожості з [target_character.GetName], підживлюючи чутки про те, що [tikhon_streshnev.GetNameWithNoTooltip] є [target_character.GetHisHer] справжнім батьком"
  flavor_mos.107.b: "Висока пам'ятка відволікатиме сесії."
  flavor_mos.107.historical_info: "Тихон Стрешнєв був одним із перших членів новоствореного Урядового Сенату, недовго також обіймав посаду голови Розрядного Приказу та очолював армію. Він був близький до царської родини, виступаючи наставником молодого Петра I, що принесло йому значний вплив. Незвично високий для свого часу, цю рису він розділяв з Петром, припускають, що він, насправді, був біологічним батьком майбутнього Царя."
  flavor_mos.108.title: "Зрада спадкоємця"
  flavor_mos.108.desc: "Були розмови про значні розбіжності між [target_heir.GetName] та [target_ruler.GetName] щодо масштабних реформ у військовій, урядовій та суспільній сферах, що відбуваються в [ROOT.GetCountry.GetName], причому перший чинить опір цим змінам і чіпляється за традиційні [ROOT.GetCountry.GetAdjectiveWithNoTooltip] цінності. Не в змозі вирішити розбіжності та відчуваючи себе відчуженим, [target_heir.GetNameWithNoTooltip] шукав притулку в [target_country.GetName] у спробі уникнути впливу реформ [target_heir.GetHisHer] батька."
  flavor_mos.108.a: "Негайно затримати [target_heir.GetHimHer]."
  flavor_mos.108.tt1: "[target_heir.GetNameWithNoTooltip] піддається ретельному закулісному розслідуванню і може загинути за таємничих обставин"
  flavor_mos.108.b: "Запропонувати поступки."
  flavor_mos.108.tt2: "[target_heir.GetNameWithNoTooltip] пропонується незначна зміна політики в обмін на повернення додому"
  flavor_mos.108.c: "Розбудити шпигуна, щоб повернути наш актив."
  flavor_mos.108.tt3: "[target_heir.GetNameWithNoTooltip] повертається додому, перш ніж [target_heir.GetHisHer] відсутність буде помічена"
  flavor_mos.108.d: "Позбавити дурня спадщини."
  flavor_mos.108.historical_info: "Олексій Петрович, син Петра 'Великого', мав напружені стосунки зі своїм батьком через їхні різні погляди на вестернізацію Росії. Традиційна освіта Олексія, зосереджена на релігійних та консервативних цінностях, різко контрастувала з більш сучасним підходом його батька. Цей розкол призвів до спроби втечі до Священної Римської імперії, але Олексія затримали та повернули до Росії, де на нього чекав публічний суд. Він помер незабаром після цього за таємничих обставин."
  flavor_mos.109.title: "Камермоор"
  flavor_mos.109.desc: "Досить незвичайний подарунок був представлений послом [GetCountry('TUR').GetLongName] у вигляді хлопчика, що походить з далеких земель [ShowAreaName('northern_ethiopia_area')]. Спочатку захоплений і утримуваний як раб, [abram_petrovich.GetName] має бути звільнений і вихований при дворі, щоб [abram_petrovich.GetSheHe] міг вивчити наші звичаї та служити [ROOT.GetCountry.GetName] у майбутньому, можливо, як частина армії або як камердинер. Хоча [abram_petrovich.GetNameWithNoTooltip] демонструє високий рівень інтелекту, йому бракує базової освіти, і було б розумно обдарувати [abram_petrovich.GetHimHer] даром грамотності."
  flavor_mos.109.a: "Хлопчик повинен бути освічений."
  flavor_mos.109.tt1: "[Concept('abram_petrovich.GetNameWithNoTooltip] додано як [character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mos.109.tt2: "[abram_petrovich.GetSheHe|U] зараховано до найвищих інститутів, доступних у [GetCountry('FRA').GetName]"
  flavor_mos.109.tt3: "[abram_petrovich.GetSheHe|U] зараховано до престижного університету в [target_location.GetName]"
  flavor_mos.109.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] виступають проти преференційного ставлення до кріпака"
  flavor_mos.109.b: "Коштовна справа з невеликою вигодою."
  flavor_mos.109.historical_info: "Термін \"камермоор\" історично використовувався для позначення придворного слуги з чорним кольором шкіри. Це була звичайна практика для європейських монархів мати слугу африканського походження, що слугував екзотичною емблемою престижу двору. Абрам Петрович був подарований Османською імперією Росії та вихований як хрещеник Петра 'Великого', що дозволило йому отримати престижну освіту за кордоном. Пізніше він повернувся висококваліфікованим військовим інженером, зайнявши посаду в російській армії."
  flavor_mos.110.title: "Повернення вундеркінда"
  flavor_mos.110.desc: "[abram_petrovich.GetName] завершив [abram_petrovich.GetHisHer] навчання і повертається до [ROOT.GetCountry.GetName], озброєний багатством знань у військовій інженерії. Тепер ми повинні вирішити, як найкраще використати [abram_petrovich.GetHisHer] таланти, чи то в якості наставника, чи як важливого члена урядового апарату."
  flavor_mos.110.a: "Ділитися – це турбота."
  flavor_mos.110.tt1: "[abram_petrovich.GetNameWithNoTooltip] стає інженером та викладачем математики для збройних сил"
  STATIC_MODIFIER_NAME_fortress_forger: "Коваль фортець"
  flavor_mos.110.b: "Справжній патріот бореться до кінця."
  STATIC_MODIFIER_NAME_gannibal: "Ганнібал"
  flavor_mos.110.c: "До добре змащеного механізму управління."
  flavor_mos.110.d: "Більше не цікавить."
  flavor_mos.110.tt2: "[abram_petrovich.GetNameWithNoTooltip] висланий на радість [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]"
  flavor_mos.110.historical_info: "Абрам Петрович повернувся до Росії після завершення навчання у Франції. Його хрещений батько, Петро 'Великий', помер незабаром після цього, і новий регент не любив Абрама, виславши його до Сибіру. Пізніше, завдяки його винятковим інженерним навичкам, його помилували та доручили будівництво кількох укріплень по всій Росії. Наступні правління стали свідками його повернення до визнання, кульмінацією чого стало його призначення головним військовим інженером російської армії."
  flavor_mos.111.title: "Петропавлівська фортеця"
  flavor_mos.111.desc: "Заячий острів стратегічно захищає вхід до річки Неви, стратегічного водного шляху, що використовується для переходу між [ShowAreaName('eastern_baltic_sea')] та Ладозьким озером. Розширимо нашу владу над цією територією, побудувавши сучасну цитадель у [ShowLocationName('neva')] та заклавши основи для величної метрополії."
  flavor_mos.111.a: "Найбільш підходяще місце."
  mos_st_peter_and_paul_construction: "Будівництво Петропавлівського собору"
  flavor_mos.111.tt1: "Інженерні дива [abram_petrovich.GetName] спрощують процес будівництва та зменшують загальну вартість мастодонтського проєкту"
  flavor_mos.111.b: "Дім там, де серце."
  flavor_mos.111.historical_info: "Петропавлівська фортеця є найстарішою спорудою Санкт-Петербурга і була заснована Петром 'Великим' як військова твердиня під час Північної війни проти Швеції. Вона також містить Петропавлівський собор, місце поховання багатьох членів російської імператорської родини. Місто Санкт-Петербург перетворилося з цитаделі на розгалужену столицю менш ніж за 20 років."
  flavor_mos.112.title: "Головний архітектор"
  flavor_mos.112.desc: "Ландшафтний дизайнер та архітектор бароко [jean_baptiste_le_blond.GetName] зробив значний внесок у галузь архітектури та нещодавно прибув до [ShowLocationName('neva')] на прохання місцевої влади. Родом з [ShowLocationName('paris')], [jean_baptiste_le_blond.GetHisHer] досвід у грандіозності та стилі #italic Ле Нотра#! зробив би [jean_baptiste_le_blond.GetHimHer] чудовим доповненням до будь-яких негласних амбіцій щодо перетворення [target_location.GetRank.GetName] на сучасний міський центр та культурну мекку."
  flavor_mos.112.a: "Його потрібно будувати з великою поспішністю."
  flavor_mos.112.a.custom: "Швидке будівництво поселення вимагає примусового призову [ShowPopTypeName('peasants')] з усієї [ShowRegionName('russian_region')]"
  flavor_mos.112.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] незадоволені обмеженнями, накладеними на їхню свободу пересування"
  flavor_mos.112.tt3: "Розроблено план, що окреслює інфраструктуру та дизайн міста, та розпочато необхідні підготовчі роботи для майбутньої столиці"
  flavor_mos.112.tt4: "Десятки призваних [ShowPopTypeName('peasants')] гинуть внаслідок суворих умов праці"
  flavor_mos.112.b: "Покладіть край цьому божевіллю."
  flavor_mos.112.historical_info: "Жан-Батист Александр Ле Блон був французьким архітектором, який запам'ятався проектуванням кількох пам'ятників у новоствореній столиці, Санкт-Петербурзі. Він відіграв вирішальну роль у впровадженні французької барокової архітектури в Росії, що видно в плануванні та загальному дизайні міста, що також приписується внеску Ле Блона."
  flavor_mos.113.title: "Брама до Заходу"
  flavor_mos.113.desc: "[target_location.GetRank.GetName] [ShowLocationName('neva')] має кілька переваг: вона має доступ до основних торгових шляхів, болотиста дельта річки Неви забезпечує природні оборонні переваги, а її близькість до Європи сприяє культурним обмінам. Перенесення нашого адміністративного центру управління є обов'язковим для використання цих сильних сторін. Це не тільки заохочує подальші інвестиції, але й служить стратегічним кроком для зміцнення іміджу [ROOT.GetCountry.GetName] як грізної європейської держави, здатної проектувати свій вплив на континент."
  flavor_mos.113.a: "Новий початок."
  st_petersburg: "Санкт-Петербург"
  flavor_mos.113.tt1: "Кілька подій можуть статися, коли [ShowLocationName('neva')] буде призначено столицею [target_root_country.GetName]"
  flavor_mos.113.b: "Хибний і необдуманий план."
  flavor_mos.113.tt2: "Кілька [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] залишають [ShowLocationName('neva')] заради зеленіших пасовищ [capital.GetName]"
  flavor_mos.113.historical_info: "Заснування Санкт-Петербурга в 1703 році за правління Петра «Великого» було мотивоване його бажанням забезпечити доступ до Балтійського моря, прагнучи перенести столицю в місце з цілорічним морським портом, на відміну від Москви, що не мала виходу до моря. Це рішення було частиною ширшої мети Петра щодо вестернізації та модернізації. Будівництво міста зіткнулося зі значними труднощами, включаючи болотисту місцевість та суворі погодні умови. Примусова праця, за участю кріпаків та військовополонених, використовувалася при будівництві."
  flavor_mos.114.title: "Дружина-опора"
  flavor_mos.114.desc: "Безперервність династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] має першочергове значення, і шанси на її забезпечення значно покращаться, якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetName] візьме собі дружину. Нещодавно було проведено огляд відповідних жінок, і [natalya_naryshkina.GetName] зі знатної династії [ShowDynastyName('naryshkin_dynasty')] привернула увагу [ROOT.GetCountry.GetGovernment.GetRulerTitle]. [natalya_naryshkina.GetSheHe|U] у фертильному віці та неодружена, і, як передбачається, народить синів величі. Однак родина, всупереч традиції, попросила, щоб їхній дочці було надано вільніший спосіб життя, щоб краще відповідати її ідеалістичному вихованню."
  flavor_mos.114.a: "Чому б і ні!"
  STATIC_MODIFIER_NAME_great: "Великий"
  flavor_mos.114.tt1: "[Concept('natalya_naryshkina.GetNameWithNoTooltip] додається як [character', 'CONCEPT_PLACEHOLDER')|e] і народжує [peter_the_great.GetName]"
  flavor_mos.114.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлює своє невдоволення відвертим характером [natalya_naryshkina.GetNameWithNoTooltip]"
  flavor_mos.114.b: "Мало думок може бути висловлено."
  flavor_mos.114.c: "Немає потреби в шлюбі."
  flavor_mos.114.historical_info: "Наталія Наришкіна була матір'ю Петра «Великого» і вийшла заміж за царя після смерті його першої дружини. Родина намагалася запобігти шлюбу, стверджуючи, що Наталія практикувала чорну магію на царя, щоб привернути його увагу, але ці заяви були відхилені після короткого розслідування. Наталія виховувалася в західно-ліберальному дусі і неодноразово зверталася до свого чоловіка з проханням надати їй свободи, незвичайні для жінок того часу, такі як відвідування театральних вистав та поява в церкві без покривала. Вона також намагалася запровадити кілька західних звичаїв при російському дворі."
  flavor_mos.115.title: "Спостереження [james_bruce.GetNameWithNoTooltip]"
  flavor_mos.115.desc: "Походячи з [ShowAreaName('scottish_lowlands_area')] та маючи родовід з детальними записами в Росії з 1647 року, [james_bruce.GetName] є людиною як меча, так і пера, з вражаючою освітою та відповідним польовим досвідом, особливо в галузі артилерії. Його вражаючі заслуги та майстерність письма доступні для найму, і, безсумнівно, сприятимуть будь-якій галузі, для якої його буде призначено, чи то адміністративні та наукові заняття, чи то військові справи."
  flavor_mos.115.a: "Запросити його до двору."
  flavor_mos.115.tt2: "Його літературні праці можуть виявитися корисними для майбутнього заснування наукових інститутів"
  flavor_mos.115.b: "Виключно для Армії."
  STATIC_MODIFIER_NAME_artillery_maestro: "Маестро артилерії"
  flavor_mos.115.tt3: "[james_bruce.GetSheHe|U] зарезервований для військової служби, покращуючи розгортання та використання артилерії"
  flavor_mos.115.c: "Сумнівний родовід."
  flavor_mos.115.historical_info: "Джеймс Брюс брав участь у кількох військових кампаніях проти Османської імперії як генерал-майор артилерії. Він вважається одним з найосвіченіших людей у Росії того часу, зробивши внесок у галузі астрономії та науки, написавши кілька томів, які він пізніше пожертвував Академії наук. Йому приписують відкриття першої обсерваторії в Росії в Сухаревій вежі, що принесло йому репутацію практика алхімії та магії."