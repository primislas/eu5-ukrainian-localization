l_english:
  flavor_geo.1.title: "Вигнання [ShowCultureGroupNameWithNoTooltip('mongolian_group')]"
  flavor_geo.1.desc: "Минуло десять років відтоді, як ми взялися за зброю проти очільників [GetUniqueInternationalOrganization('ilkhanate').GetName] і вигнали десятки тисяч [ShowCultureGroupName('mongolian_group')] військ з наших земель. Пронизані корупцією, здійснюючи набіги та зловживання проти нашого народу, чужоземні кінні володарі тісно співпрацювали з [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], щоб тримати наш народ на короткому повідку. [target_character1.GetName], використавши смерть [target_character2.GetName] як привід, розтрощив наші кайдани, вимагав евакуації чужоземних військ з наших кордонів і вирізав тих серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], кого [target_character1.GetSheHe] вважав зрадниками або впливовими. Сьогодні відзначається десята річниця цієї події, і святкування на часі..."
  flavor_geo.1.a: "Святкування поширяться по всій [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_geo.1.b: "Скористайтеся цією нагодою, щоб усунути впливових членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  every_location_target_province_30_prosperity_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_province.GetName] отримує [ShowNamedValue('prosperity_extreme_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_geo.2.title: "Торгівля із Заходом"
  flavor_geo.2.desc: "Щоб убезпечити наше майбутнє, було б мудро розглянути дипломатичні та торговельні відносини з різними заможними західниками. Незважаючи на те, що ми є головою сильного [ROOT.GetCountry.GetFlavorRank], ми оточені ворожими язичниками. Листування із Заходом лише зміцнило б наш зв'язок з ними та забезпечило б нашу позицію в той час, коли навіть колись могутній [GetUniqueInternationalOrganization('ilkhanate').GetName] розпадається..."
  flavor_geo.2.a: "Ми будемо торгувати з [target_country1.GetNameWithNoTooltip]."
  flavor_geo.2.b: "Звернімося до [target_country2.GetNameWithNoTooltip]."
  flavor_geo.2.c: "[target_country3.GetNameWithNoTooltip] зробить нас багатими."
  flavor_geo.2.d: "Нам ніхто з них не потрібен."
  flavor_geo.3.title: "Посланець з [GetCountry('GEO').GetNameWithNoTooltip]"
  flavor_geo.3.desc: "Група найдивовижніших гостей прибула до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], одягнена в біле та червоне. Виявляється, це дипломатичне посольство від імені [target_character.GetName], яке прибуло для переговорів про вступ наших [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] до [target_location.GetName] в обмін на сердечні відносини та активну дипломатію між двома державами."
  flavor_geo.3.a: "Розумна пропозиція."
  flavor_geo.3.b: "Ми не зацікавлені в них."
  trade_in_caucasus_key: "Торгівля в [ShowRegionNameWithNoTooltip('caucasus_region')]"
  flavor_geo.4.title: "Листування з [target_country2.GetGovernment.GetRulerTitle]"
  flavor_geo.4.desc: "У такі небезпечні часи, як наші, часто мудро заводити міцних друзів серед наших однолітків. У часи великої потреби навіть життєво важливо подолати релігійні відмінності та прагнути взаємної вигоди. З огляду на це, було запропоновано, що було б розсудливо звернутися та зв'язатися з [target_country2.GetGovernment.GetRulerTitle] [target_country2.GetLongName]. Могутня та заможна держава, їхні міста приймають багато [ShowReligionGroupAdjective('christian')] людей. Ми могли б забезпечити їм краще ставлення, якби пообіцяли союз та добрі відносини..."
  flavor_geo.4.a: "Надіслати їм листа."
  flavor_geo.4.b: "У нас є важливіші справи."
  flavor_geo.4.historical_info: "Історично, Георгій V Грузинський та король Філіп VI Французький підтримували сердечні стосунки протягом багатьох років листування. В одному зі своїх листів Георгій V Грузинський висловлює своє прагнення об'єднати сили з Філіпом VI у благородній справі – визволенні Святих Земель в Єрусалимі. Він запевнив французького короля у своїй відданості, пропонуючи підтримку 30 000 солдатів для цієї справи."
  flavor_geo.5.title: "Лист від [target_country.GetGovernment.GetRulerTitle]"
  flavor_geo.5.desc: "Прибув дипломат з [target_country.GetGovernment.GetCourtTitle] [target_character.GetName]. У листуванні [target_country.GetAdjectiveWithNoTooltip] [target_country.GetGovernment.GetRulerTitle] наголошує на необхідності співпраці між нашими двома країнами, щоб піклуватися про [ShowReligionGroupAdjective('christian')] меншини в наших володіннях та захищати наші кордони від сусідніх загроз."
  flavor_geo.5.a: "У словах [target_character.GetShortNameWithNoTooltip] є сенс."
  flavor_geo.5.b: "Нам байдуже до таких огидних дій."
  every_christian_pop_gains_25_satisfaction_tt: "Кожен [ShowReligionGroupAdjective('christian')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [GetCountry('MAM').GetName] отримує [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_geo.5.historical_info: "Георгій V Грузинський підтримував активні стосунки з Мамлюцьким султанатом, обмінюючись листами зі своїм бахрітським мамлюцьким колегою. Завдяки цьому дипломатичному зусиллю кілька грузинських монастирів по всій Палестині потрапили під вплив Грузинської православної церкви. Їхнє листування також дозволило вільний прохід грузинським паломникам до Святої Землі."
  flavor_geo.6.title: "[target_country2.GetAdjectiveWithNoTooltip] Відповідь"
  flavor_geo.6.desc.a: "Ми радіємо, читаючи позитивну відповідь від [target_country2.GetAdjective] [target_country2.GetGovernment.GetCourtTitle]. Підкреслюючи спільні інтереси обох наших народів, [target_character2.GetName] бажає укласти з нами союз!"
  flavor_geo.6.desc.b: "Незважаючи на наші найкращі та найдобріші зусилля щодо встановлення взаємовигідного союзу, [target_country2.GetAdjective] [target_country2.GetGovernment.GetRulerTitle] вирішив відмовитися від тісніших стосунків з нашим народом..."
  flavor_geo.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_geo.6.b: "[ROOT.GetCountry.Custom('common_string_disappointing')]"
  flavor_geo.7.title: "Кампанія проти [target_country2.GetLongNameWithNoTooltip]"
  flavor_geo.7.desc: "Наші східні сусіди в [target_country2.GetName] давно були занозою в нашому боці. Було б мудро використати їхні язичницькі вірування та відверту ворожість як привід для великої експедиції та стерти їх з карти раз і назавжди. Армії готові, а наші радники вже складають бойові плани..."
  flavor_geo.7.a: "Хай буде війна."
  flavor_geo.7.b: "Ми не можемо ризикувати відкритою ворожнечею."
  flavor_geo.8.title: "Листи для [target_character2.GetNameWithNoTooltip]"
  flavor_geo.8.desc: "Далеко на далеких землях заходу лежить могутній [target_country2.GetGovernment.GetCourtTitle] з лицарськими лицарями та багатством, наскільки сягає око. Незважаючи на відстань між нами, нас об'єднує спільна справа.\n\nЗахист [target_location.GetName], що знову потрапив до рук невірних, має бути найвищим пріоритетом для них і для нас. Багато членів нашої ради просили про відкриту лінію зв'язку між нами та [target_country2.GetLongName], просячи допомоги в наших хрестових походах..."
  flavor_geo.8.a: "Надіслати їм листа з проханням про підтримку."
  flavor_geo.8.b: "У нас немає часу на це!"
  flavor_geo.9.title: "[ShowReligionGroupNameWithNoTooltip('christian')] на Сході"
  flavor_geo.9.desc: "Сьогодні прибула найдивовижніша група! Вони стверджують, що є посланцями від [ShowReligionGroupAdjective('christian')] [target_country.GetFlavorRank] з регіону [ShowRegionName('caucasus_region')]. Вони представляють вишукану печатку, підписану хрестами, які ми колись носили і які піднялися над [target_location.GetName]...\n\nЛист підкреслює життєву важливість закріплення позицій на Святій Землі і натомість просить допомоги в їхній справі."
  flavor_geo.9.a: "Монета за їхню справу!"
  flavor_geo.9.b: "Наші лицарі допоможуть їм!"
  flavor_geo.9.c: "У нас немає часу на порожні обіцянки..."
  up_to_x_commoners_will_migrate_tt: "Деякі з наших [ShowPopTypeName('peasants')] у [Concept('province_definition', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] мігрують до [target_country.GetName]"
  flavor_geo.10.title: "[target_country2.GetAdjectiveWithNoTooltip] [target_country2.GetGovernment.GetRulerTitle] Відповідає"
  flavor_geo.10.desc: "Після довгої та виснажливої подорожі наші дипломати повернулися із Заходу, несучи відповідь [target_country2.GetAdjective] [target_country2.GetGovernment.GetRulerTitle]. Їхня допомога, безумовно, сприяла б нашим військовим зусиллям за кордоном.\n\nПовітря тиші та жаху огортає кімнату, коли печатка розламується, і розкривається зміст кореспонденції..."
  flavor_geo.10.a: "Радійте! Вони погодилися допомогти!"
  flavor_geo.10.b: "Відмовили!? Як вони сміють?"
  flavor_geo.11.title: "Могутній сусід"
  flavor_geo.11.desc: "Наші найкращі зусилля із захисту нашої незалежності, у поєднанні з військовими успіхами та вигнанням іноземних військ з нашої землі, виявилися недостатніми, щоб утримати сусідні держави від зазіхань на наше багатство. Останнім, хто спробував, є не хто інший, як [target_character2.GetName] з [target_country2.GetLongName]. [target_character2.GetSheHe|U] вимагає мізерну данину в обмін на нашу подальшу автономію під [target_character2.GetHerHis] прапором захисту."
  flavor_geo.11.a: "Невелика ціна..."
  flavor_geo.11.b: "[target_character2.GetShortNameWithNoTooltip] нічого не отримає!"
  flavor_geo.12.title: "[target_country.GetLongNameWithNoTooltip]"
  flavor_geo.12.desc.a: "На знак доброї волі та дипломатії сусідня [target_country.GetLongName] погодилася увійти до нашої сфери впливу та сплатити цінну данину, визнаючи силу нашої влади, що пронизує їхні землі!"
  flavor_geo.12.desc.b: "[target_country.GetLongName] вперто чинили опір іноземному вторгненню знову і знову. Замість того, щоб усвідомити, що ми, очевидно, сильніші та могутніші за них, вони знову відмовилися схилити коліна і повстали проти нашої влади."
  flavor_geo.12.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_geo.12.b: "Їх поставлять на коліна..."
  flavor_geo.13.title: "Порядок у [ShowProvinceDefinitionNameWithNoTooltip('imereti_province')]"
  flavor_geo.13.desc: "Наші володіння охоплюють одні з найнепрохідніших і найвеличніших гірських хребтів у регіоні, багато наших людей живуть на схилах і в найглибших ущелинах цих велетнів. Однак їхня віддаленість від нашої столиці призвела до певної автономії, що межує з бунтарським ставленням. Інвестуючи в їхні громади, ми змогли б інтегрувати їх і зменшити їхню автономію..."
  flavor_geo.13.a: "Вони повинні визнати нашу владу."
  flavor_geo.13.b: "Не будемо порушувати поточний устрій."
  flavor_geo.14.title: "Монетний двір Елегіра"
  flavor_geo.14.desc: "Монета – це мова влади та впливу. У міру того, як ми розширюємо наші володіння та закріплюємося далі на Сході, зростає потреба в монетах для утримання фортів та армій. Нове родовище цінного металу було виявлено в [target_location.GetName], а разом з ним – низка планів наших радників щодо подальшого розвитку цього великого відкриття та максимізації видобутку."
  flavor_geo.14.historical_info: "Хоча точне географічне положення монетного двору значною мірою спірне, монетний двір Елегіра широко вважається одним із найважливіших наріжних каменів багатьох великих націй, оскільки він почав функціонувати ще в 740 році нашої ери. Саме тут карбувалася монета Джалаїридів під час правління Чобанідів у Закавказзі."
  flavor_geo.14.a: "Блискуче!"
  flavor_geo.14.b: "Не піддавайся жадібності, допоможи місцевим жителям натомість..."
  flavor_geo.15.title: "Стіни [target_location.GetNameWithNoTooltip]"
  flavor_geo.15.desc: "Позиція [target_location.GetName] має життєво важливе значення. Розташовані біля входу в гірський перевал, ті кілька імпровізованих укріплень, які місцеві жителі раніше побудували, вірно служили їм. Однак, оскільки ми зростаємо і охоплюємо більший кордон на Південному Заході, було б розсудливо вивчити розширення цих оборонних споруд як засіб захисту дороги до нашої столиці."
  flavor_geo.15.a: "Фінансувати розширення!"
  flavor_geo.15.b: "$common_string_let_them_fend_for_themselves$"
  flavor_geo.16.title: "[ShowReligionAdjectiveWithNoTooltip('catholic')] Присутність у [target_location1.GetNameWithNoTooltip]"
  flavor_geo.16.desc: "Незважаючи на відстань між нашими кордонами, ми підтримували активний контакт з [target_country.GetLongName] та [target_character2.GetName]. Під час наших дипломатичних обмінів ми домовилися дозволити заснування [ShowBuildingTypeName('missionary_building')] у [target_location1.GetName]. З 1330 року, з призначенням [GetCharacter('geo_giovanni_da_firenze').GetName] єпископом [ShowLocationName('tbilisi')], тиск на [target_character1.GetName] зростає, щоб він прийняв [ShowReligionName('catholic')] на протест наших підданих..."
  flavor_geo.16.a: "Просто підтримуватимемо доброзичливі стосунки..."
  flavor_geo.16.b: "Це межа, яку вони переступили!"
  flavor_geo.16.c: "Можливо, в їхніх словах є сенс?"
  suffer_20_opinion_with_every_catholic_in_range_tt: "Кожна відома [ShowReligionAdjectiveWithNoTooltip('catholic')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] в нашому [Concept('diplomatic_range', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowBiasValue('opinion_demolished_catholic_embassies')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] щодо нас"
  flavor_geo.17.title: "Посланець від [target_country.GetLongNameWithNoTooltip]"
  flavor_geo.17.desc_common: "Відтоді, як ми заснували [ShowBuildingTypeName('missionary_building')] в [target_location1.GetName], ми підтримували здорові стосунки з [target_character.GetName]."
  flavor_geo.17.desc: "$flavor_geo.17.desc_common$ Останні роки, однак, призвели до сумного погіршення, що виявилося у знесенні наших маєтків по всій [target_country.GetLongName]..."
  flavor_geo.17.a: "Це безумство!"
  flavor_geo.18.desc: "$flavor_geo.17.desc_common$ За іронією долі, [target_character1.GetShortNameWithNoTooltip] погодився прийняти істинну віру, освітлюючи світлом [ShowReligionName('catholic')] по всьому [ShowRegionNameWithNoTooltip('caucasus_region')]."
  flavor_geo.18.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_geo.19.title: "[ShowReligionNameWithNoTooltip('catholic')] Поширюється"
  flavor_geo.19.desc: "З впровадженням [ShowReligionName('catholic')] в нашу країну, деякі з наших людей активно прийняли її, щодня залучаючи нових вірян до своїх лав. Хрещення [target_character.GetName] є останнім розвитком цієї нової віри в наших кордонах. Деякі підтримують прийняття [ShowReligionNameWithNoTooltip('catholic')], закликаючи до тісніших зв'язків із Заходом, тоді як багато хто боїться відмовитися від нашої віри та традицій..."
  flavor_geo.19.a: "Це має припинитися!"
  flavor_geo.19.b: "Надіслати запит на більше місій."
  flavor_geo.20.title: "[ShowReligionNameWithNoTooltip('catholic')] в [target_country.GetLongNameWithNoTooltip]"
  flavor_geo.20.desc: "Відтоді, як відбулося хрещення [target_character.GetName], багато впливових осіб у [target_country.GetAdjective] [target_country.GetGovernment.GetCourtTitle] виступали за офіційний перехід своєї країни до [ShowReligionName('catholic')]. Щоб бути ефективними та швидкими, вони звернулися до нас з проханням або профінансувати нову [ShowBuildingTypeName('missionary_building')] в кількох ключових місцях, або запропонувати нашу руку в альянсі з їхньою справою..."
  flavor_geo.20.a: "Ми профінансуємо їхні зусилля."
  flavor_geo.20.b: "Альянс доречний."
  flavor_geo.20.c: "Ми не маємо зобов'язань допомагати."
  flavor_geo.21.title: "Листування від [target_country.GetLongNameWithNoTooltip]"
  flavor_geo.21.desc: "У щедрому кроці, щоб допомогти нашій адвокації на користь прийняття [ShowReligionName('catholic')], [GetCountry('PAP').GetGovernment.GetRulerTitle] погодився запропонувати цінну допомогу у формі..."
  flavor_geo.21.a: "...нових [ShowReligionAdjectiveWithNoTooltip('catholic')] місій!"
  flavor_geo.21.b: "...альянсу!"
  flavor_geo.21.c: "...емоційної підтримки."
  flavor_geo.22.title: "Відновлення [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  flavor_geo.22.desc: "Надто довго [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] топтали статки та права [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Розлючені члени [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та впливові мужі віри постали перед [target_character.GetName] в [target_location.GetName], щоб вимагати обмеження влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], інакше їхня жадібність поглине нас цілком!"
  flavor_geo.22.a: "Зважте на пораду [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_geo.22.b: "Нав'яжіть кілька обмежень."
  flavor_geo.22.c: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_geo.23.title: "Сонячне затемнення [GetCurrentYear] року"
  flavor_geo.23.desc: "Спостерігалося найдивовижніше явище! У найвизначнішій сцені сонце вкрите темно-червоним відтінком, ніби п'ять разів занурюючись у темряву! Коли день перетворюється на ніч, найзабобонніші серед нашого народу відзначають відродження, пророцтва, божественність та епоху темряви..."
  flavor_geo.23.a: "Немає для нас раю, куди б ми могли втекти!"
  flavor_geo.23.b: "Найцікавіше астрономічне явище."
  flavor_geo.24.title: "Вимоги [target_character2.GetShortNameWithNoTooltip]"
  flavor_geo.24.desc: "Великий завойовник і володар величезних територій звернувся до нас через [target_character2.GetHerHis] сановників з немислимою пропозицією! Крізь [target_character2.GetHerHis] маніакальний сміх і прохання, [target_character2.GetSheHe] вимагає, щоб [target_character1.GetName] та вся [ROOT.GetCountry.GetGovernment.GetAdjective] родина прийняли [target_religion.GetName], інакше ми ризикуємо накликати гнів наймогутнішого [target_country2.GetFlavorRank]..."
  flavor_geo.24.a: "На жаль, ми мусимо. Заради блага нашого народу..."
  flavor_geo.24.b: "Ми не зрадимо нашої віри!"
  flavor_geo.24.historical_info: "Наприкінці XIV століття Королівство Грузія зіткнулося з жахливою загрозою з боку Тимура, грізного завойовника, чиї вторгнення залишили регіон у сум'ятті. Коли війська Тимура сіяли хаос на грузинських землях, місцеві правителі постали перед жорстким вибором: прийняти іслам, щоб уникнути подальшого спустошення, або зіткнутися з продовженням руйнувань. Після тижнів обговорень, переговорів і зростаючого тиску грузинська влада вирішила прийняти іслам лише номінально, щоб потім відмовитися від цього фасаду, як тільки вони зрозуміли, що влада Тимура занепадає."
  flavor_geo.25.title: "Навернення [target_country1.GetLongNameWithNoTooltip]"
  flavor_geo.25.desc: "Наш найлагідніший дотик завойовників, коли ми проїжджаємо різними регіонами, приніс новини з [target_country1.GetLongName]. Здається, місцевий вождь, відповідальний за їхні справи, висунув вимогу, щоб [target_character1.GetName] прийняв [target_religion.GetName]. Здається, лист містить..."
  flavor_geo.25.a: "...їхню зухвалість! Ми спалимо їх дощенту!"
  flavor_geo.25.b: "...їхню тверду відмову. Залиште їх поки що."
  flavor_geo.25.c: "...офіційне проголошення навернення [target_character1.GetShortNameWithNoTooltip]."
  flavor_geo.26.title: "Релігійна ідентичність [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_geo.26.desc: "Нещодавно вимушене прийняття [GetCountry('TIM').GetAdjective] віри нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle] очевидно не було сприйнято в найкращому світлі більшістю населення. Наші [ROOT.GetCountry.GetReligion.GetAdjective] вірування не можуть бути так легко похитнуті іноземним впливом, навіть під загрозою війни. Багато хто стверджує, що [target_character.GetName] повинен відмовитися від такого навернення і натомість готуватися захищати справжню віру."
  flavor_geo.26.a: "Насправді це була хитрість, і вона досягла своєї мети."
  flavor_geo.26.b: "Що зроблено, те зроблено."
  flavor_geo.27.title: "[target_character2.GetNameWithNoTooltip]"
  flavor_geo.27.desc: "Видатна особа останнім часом часто згадується багатьма членами [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Член незначної безземельної дворянської родини з [target_location.GetName], [target_character2.GetName] вже зробив собі ім'я завдяки [target_character2.GetHerHis] військовим досягненням, присвятивши [target_character2.GetHerselfHimself] цій кар'єрі з самого раннього віку. Наявність такого таланту, безсумнівно, покращить наші військові можливості, а [target_character2.GetHerHis] палкі тактики обов'язково стануть корисними в наших майбутніх конфліктах."
  flavor_geo.27.a: "Запросіть [target_character2.GetHerHim] до [ROOT.GetCountry.GetGovernment.GetCourtTitle], ми скористаємося [target_character2.GetHerHim]."
  flavor_geo.27.b: "Нам не потрібні поради від вискочок-менших дворян."
  flavor_geo.27.historical_info: "Георгій Саакадзе, прославлений як захисник Грузії від вторгнень таких держав, як Османська імперія та Сефевіди, був видатним грузинським військовим лідером початку XVII століття. Походячи з відомої родини, він спочатку служив командиром у Картлійському царстві. Саакадзе здобув славу завдяки своєму стратегічному генію, особливо під час битви при Ціцамурі в 1625 році, де він здобув вирішальну перемогу над Сефевідами. Його кар'єра була відзначена як військовими тріумфами, так і політичними потрясіннями, включаючи конфлікти з грузинським королівським двором."
  flavor_geo.28.title: "[target_character2.GetNameWithNoTooltip]"
  flavor_geo.28.desc: "Народжений в одному з наших менших дворянських родів, [target_character2.GetName] з раннього віку виявляв ознаки великої допитливості та інтелекту. Провівши [target_character2.GetHerHis] дитинство у [target_character2.GetHerHis] рідному [target_location.GetRank.GetName] [target_location.GetName], [target_character2.GetSheHe] переглядав усе в бібліотеці [target_character2.GetHerHis] родини. Коли [target_character2.GetSheHe] пізніше був привезений жити до [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character2.GetSheHe] поглинув усі знання в [ROOT.GetCountry.GetGovernment.GetAdjective] бібліотеці. Навіть у молодому віці [target_character2.GetSheHe] вже займався письменством, і деякі з цих текстів обіцяють багато. Якщо його виховати, [target_character2.GetSheHe] обов'язково стане одним з наших найкращих письменників."
  flavor_geo.28.a: "Тримайте [target_character2.GetHerHim] близько при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_geo.28.b: "Сільський простак, нехай [target_character2.GetHerHim] повернеться туди, звідки [target_character2.GetSheHe] прийшов."
  flavor_geo.28.historical_info: "Видатний грузинський вчений, дипломат і письменник, Сулхан-Саба Орбеліані відомий своїм внеском у грузинську літературу та освіту. Член впливової родини Орбеліані, він найбільш відомий своєю працею #italic Життя Саби#! та перекладом класичних творів, включаючи байки Езопа на грузинську мову, що значно збагатило грузинську літературну традицію. Його зусилля в освіті та дипломатії були ключовими у просуванні та збереженні грузинської культури в період політичної нестабільності та зовнішніх загроз. Вплив Орбеліані пам'ятають за його роль у сприянні грузинському інтелектуальному та культурному відродженню."