l_english:
  flavor_mol.1000.title: "[target_character.GetShortNameWithNoTooltip] [target_character.GetNicknameWithNoTooltip]"
  flavor_mol.1000.desc: "З часу заснування [target_country.GetLongName] [root_country.GetName] перебуває в постійному конфлікті з мародерськими рейдерами [target_country.GetCulture.GetName]. [target_character.GetShortName] з [target_location.GetName] має намір об'єднати [target_area.GetName] під [target_character.GetHerHis] та нашими прапорами. [target_character.GetShortNameWithNoTooltip] присягнув на вірність [root_character.GetName] і обіцяє нам заселити прикордонні землі та служити [root_country.GetFlavorRank] як вірний [ShowSubjectTypeName('march')]."
  flavor_mol.1000.historical_info: "Драгош Воде, також відомий як Драгош Засновник, був першим воєводою Молдавії та васалом Угорської Корони. Після гучної перемоги над Золотою Ордою в 1345 році, Драгош та інші чоловіки з Марамурешу вирушили до річки Молдова, щоб заселити ці землі. Хоча «Спішування» на берегах згаданої річки оповите міфами, і тому саме заснування Молдавії є дискусійним питанням."
  flavor_mol.1000.a: "Дозвольмо [target_character.GetHerHim] заснувати [ShowSubjectTypeNameWithNoTooltip('march')]."
  flavor_mol.1000.a.at: "[target_character.GetName] вирушить до [target_area.GetName], щоб заснувати $MOL_ADJ$ [ShowSubjectTypeName('march')]"
  flavor_mol.1000.a.bt: "#R Це може спричинити конфлікт із [target_country.GetName]#!"
  flavor_mol.1000.b: "Ми не можемо ризикувати гнівом [target_country.GetNameWithNoTooltip]"
  flavor_mol.1001.title: "[ShowSubjectTypeNameWithNoTooltip('march')] [GetCountry('MOL').GetNameWithNoTooltip]"
  flavor_mol.1001.desc: "[target_character.GetName] з [root_country.GetName] та символічний загін [root_country.GetAdjectiveWithNoTooltip] солдатів увійшли до [target_area.GetName]. Нехтуючи нашою владою, ці люди оселилися в [target_location.GetName] і заснували державу [release_country.GetName] прямо у нас під носом!"
  flavor_mol.1001.historical_info: "Після вирішальної поразки від Угорщини в 1345 році, Драгош Воде, також відомий як Драгош Засновник, та його послідовники переїхали до Молдавії, щоб заснувати марку для угорського короля. Хоча «Спішування» на берегах згаданої річки оповите міфами, і тому саме заснування Молдавії є дискусійним питанням, його часто відзначають як історію походження Воєводства Молдавії."
  flavor_mol.1001.a: "Ми не можемо дозволити собі конфлікт із [root_country.GetNameWithNoTooltip] через це."
  flavor_mol.1001.b: "Це оголошення війни!"
  flavor_mol.1002.title: "[target_country.GetAdjective] Рейд"
  flavor_mol.1002.desc: "Із заснуванням [release_country.GetName] наш вплив межує з [ShowRegionName('steppes_region')]. Однак [target_country.GetGovernment.GetRulerTitle] [target_country.GetLongName], [target_character.GetName], розглядає це розширення як загрозу їхньому варварському уряду. [target_country.GetCulture.GetName] рейдери вже вторглися на нашу територію, розпочавши війну між [target_country.GetNameWithNoTooltip] та [root_country.GetNameWithNoTooltip]."
  flavor_mol.1002.a: "До зброї!"
  flavor_mol.1003.title: "$flavor_mol.1000.title$"
  flavor_mol.1003.desc: "[target_character.GetName] увійшов до наших земель, сподіваючись заселити [target_area.GetName] та встановити безпечний кордон проти [target_country.GetName]. Багато [ShowCultureName('moldovan')] людей втомилися від ярма [target_country.GetCulture.GetName] правління і приєднуються до [target_character.GetShortNameWithNoTooltip]."
  flavor_mol.1003.a: "Шукати захисту [root_country.GetNameWithNoTooltip]"
  flavor_mol.1003.a.tt: "Усі інші країни в [target_area.GetName] отримують можливість приєднатися до нас"
  flavor_mol.1003.b: "Ми не змінимо одного господаря на іншого."
  flavor_mol.1004.title: "Заснування [release_country.GetNameWithNoTooltip]"
  flavor_mol.1004.title_default: "Заснування $MOL$"
  flavor_mol.1004.desc: "$flavor_mol.1003.desc$\n\n[target_character.GetHerHis|U] люди тепер прийшли до нас, сподіваючись переконати нас також приєднатися до [release_country.GetName]."
  flavor_mol.1004.a: "Землі [target_area.GetNameWithNoTooltip] стоятимуть об'єднаними!"
  flavor_mol.1004.b: "Ми не можемо відвернутися від [target_country.GetLongNameWithNoTooltip]."
  opinion_hun_moldavian_push: "Молдавський наступ"
  become_moldavia_tt: "Сформувати #Y $MOL$#! і стати [ShowSubjectTypeName('march')] [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] [root_country.GetName]"