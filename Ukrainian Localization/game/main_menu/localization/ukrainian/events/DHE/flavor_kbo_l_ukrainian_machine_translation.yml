l_english:
  flavor_kbo.2.title: "Заснування [target_location.GetNameWithNoTooltip]"
  flavor_kbo.2.desc: "Хоча [ShowAreaName('bornu_area')] є багатою областю, цілком гідною бути столицею нашого королівства, її захист завжди був проблемою. Зі сходу наші старі вороги [target_country.GetName] часто здійснюють набіги на наші землі, а часті війни за спадщину також підкреслюють потребу в більш укріпленій столиці.\n\nБули розроблені плани щодо створення укріпленого міста за західним берегом озера Чад у [target_location.GetName], щоб забезпечити майбутню безпеку нашої династії."
  flavor_kbo.2.a: "Побудувати [target_location.GetNameWithNoTooltip]."
  flavor_kbo.2.b: "Наша нинішня столиця чудова."
  flavor_kbo.3.title: "Запровадження ісламського православ'я"
  flavor_kbo.3.desc: "Хоча наш ісламський [ROOT.GetCountry.GetFlavorRank] є одним із найстаріших у цьому регіоні, [ROOT.GetCountry.GetReligion.GetName] навіть серед вищих класів є неортодоксальною та синкретичною релігією. Натхненні багатьма вченими мужами, які прибувають до нашої столиці, ми розглядаємо можливість проведення чистки релігійного синкретизму, особливо серед аристократії та членів династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Оскільки її більш конфліктні лінії отримують частину своєї підтримки від язичників, ми можемо лише сподіватися, що це, можливо, також зменшить політичну нестабільність нашої країни."
  flavor_kbo.3.a: "Більше ніякого синкретизму!"
  flavor_kbo.3.b: "Не будемо перегинати палицю."
  flavor_kbo.6.title: "Реформи [target_character.GetNameWithNoTooltip]"
  flavor_kbo.6.desc: "Натхненний тим, що [target_character.GetSheHe] побачив під час [target_character.GetHerHis] хаджу, [target_character.GetName] вирішив, що [ROOT.GetCountry.GetLongName] має модернізувати свою армію та економіку. [target_character.GetSheHe|U] вже почав вживати заходів для зміцнення нашої кавалерії, запрошувати [ShowCultureName('turkish_culture')] гармашів та переймати адміністративні техніки, які він бачив серед наших мусульманських братів між нами та [ShowLocationName('mecca')]."
  flavor_kbo.6.a: "Реформувати як економіку, так і армію."
  flavor_kbo.6.b: "Зосередитися на армії."
  flavor_kbo.6.c: "Зосередитися на економіці."
  flavor_kbo.6.d: "Зосередитися на адміністрації."
  flavor_kbo.6.historical_info: "Ідріс Алоома був Маї імперії Канем-Борну з 1564 по 1596 рік. Він був видатним як в адміністративних, так і у військових справах і підняв свою країну до безпрецедентних висот. Він запровадив багато реформ, заснованих на шаріаті, ісламському праві, а також багато військових інновацій та реорганізації армії. Підтримуючи дипломатичні відносини як з Османським, так і з Марокканським султанатами, торгові шляхи від озера Чад до Середземномор'я процвітали під його правлінням."
  flavor_kbo.7.title: "Терни [ROOT.GetCountry.GetGovernment.GetAdjective|U] корони"
  flavor_kbo.7.desc: "Попри наше панування над ворогами, минулими та нинішніми, багато хто в нашій нації бажає бачити, як горять наші великі палаци, а наш народ гине. Будьте обережні з шакалами серед нас, бо вони вдарять у момент слабкості, готові розірвати те, що ми збудували. Ми повинні шукати мудрої поради та визначити стабільний курс дій, щоб не ризикувати стати здобиччю цих жадібних до влади стерв'ятників."
  flavor_kbo.7.a: "Якщо вони хочуть громадянської війни, нехай приходять!"
  flavor_kbo.7.b: "Не будемо ризикувати відкритими повстаннями..."
  kbo_pop_50_everywhere_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] скрізь втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  kbo_location_25_control_everywhere_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e], якою ми володіємо, втратить [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_kbo.8.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] та воїн?"
  flavor_kbo.8.desc: "Наші [ROOT.GetCountry.GetGovernment.GetRulerTitle] ведуть свої війська з фронту, традиція, глибоко вкорінена в нашій культурі та звичаях. Ця відважна практика демонструє нашу непохитну відданість і надихає наших солдатів битися з надзвичайною хоробрістю. Однак, роблячи це, наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] наражається на величезні небезпеки, ставлячи своє життя безпосередньо на карту серед хаосу битви.\n\nПопри пов'язані з цим ризики, цей стиль лідерства є цінною частиною спадщини народу, символізуючи наше втілення честі, доблесті та самопожертви заради більшого блага нашого народу. Він служить потужним свідченням нашої непохитної відданості захисту та керівництву народом."
  flavor_kbo.8.a: "[ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] не злякається жодного ворога!"
  flavor_kbo.8.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe|U] має розробляти стратегію!"
  flavor_kbo.8.c: "[ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] може зосередитися на багатьох речах одночасно."
  flavor_kbo.9.title: "Торгівля через Сахель"
  flavor_kbo.9.desc: "Купці здалеку, що везуть вишукані предмети та екзотичні товари, час від часу потрапляли на наш ринок. Незважаючи на наші поселення на півночі в пустелі, ми майже не приділяли уваги спрямуванню різноманітнішої торгівлі через ці коридори. Можливо, було б мудро змінити наші торговельні зусилля та використовувати піщані шляхи, що ведуть до контакту з [ShowRegionName('maghreb_region')]."
  flavor_kbo.9.a: "Відкрита торгівля з північанами — це правильний шлях."
  flavor_kbo.9.b: "Ми не можемо ризикувати іноземним впливом на наших власних купців!"
  kanem_presence_key: "Відкрити ринки Канембу"
  flavor_kbo.10.title: "Легалізм та іслам у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_kbo.10.desc: "Наша велика нація була однією з найперших країн у нашому регіоні, яка прийняла [ShowReligionName('sunni')] та інтегрувала її численні аспекти в кожен аспект нашого суспільства. Незважаючи на розбіжності в той час, перехід приніс велику користь нашому народу в довгостроковій перспективі, встановивши відносини з іноземними однодумцями-правителями та відкривши прибуткові торговельні можливості.\n\nЗнову настав час делегувати наші пріоритети в прийнятті аспектів легалізму та вибрати, чи бажаємо ми інтегрувати їх у наше поточне суспільство."
  flavor_kbo.10.a: "Було б мудро розвивати цю інституцію."
  flavor_kbo.10.b: "Не будемо взаємодіяти з поточним станом речей..."
  flavor_kbo.11.title: "Переселення [target_pop.GetCulture.GetNameWithNoTooltip]"
  flavor_kbo.11.desc: "Наш [ROOT.GetCountry.GetLongName] побудований на попередніх досягненнях династії Дугува, членів [target_pop.GetCulture.GetName]. Їхнє королівство було недостатньо сильним і швидко розвалилося під натиском наших [ShowCultureName('kanembu_culture')] предків, що прийшли з півночі. Потім вони замінили Дугува і заснували наш нинішній [ROOT.GetCountry.GetFlavorRank].\n\nОднак багато [target_pop.GetCulture.GetNameWithNoTooltip] досі живуть у наших кордонах, і для декого це може поставити під сумнів нашу легітимність як правителів. Було б мудро усунути цю проблему, перш ніж вона стане занадто великим ризиком."
  flavor_kbo.11.a: "Запропонувати їм «альтернативне» місце для поселення."
  flavor_kbo.11.b: "Нехай залишаються."
  kbo_zaghawa_angry_tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] [ShowCultureName('zaghawa_culture')] втратить [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_kbo.12.title: "Спадщина [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_kbo.12.desc: "Останні часи справді сильно позначилися на нашому славетному народі. Постійні конфлікти з [ShowCultureName('bilala_culture')] та [ShowCultureName('sao_culture')] роз'їдали нашу країну, як чума. Останнім цвяхом у труну стала втрата провінції [target_lost_province.GetName], колись невід'ємної частини нашої території та ідентичності, яка тепер беззаперечно лежить поза нашою досяжністю. Чи маємо ми право називати себе [ROOT.GetCountry.GetLongNameWithNoTooltip], якщо не контролюємо [target_lost_province.GetName]?"
  flavor_kbo.12.bad.desc: "Настали темні часи. Недавні кризи сильно позначилися на раніше славетному [ROOT.GetCountry.GetLongName], і ми не вийшли з них неушкодженими. Дехто може сказати, що ми лише тінь наших колишніх себе, і, бачачи недавні втрати [ShowProvinceDefinitionName('kanem_province')] та [ShowProvinceDefinitionName('bornu_province')], колись невід'ємної частини нашої території та ідентичності, ці голоси можуть бути праві. Чи приречені ми зникнути в безвісті, чи зможемо повстати з попелу?"
  flavor_kbo.12.a: "Ми повинні прийняти свою долю."
  flavor_kbo.12.b: "Ми ще не мертві."
  flavor_kbo.12_become_bornu_tt: "Ми станемо #W $BNU_ADJ$ [GetCountry('KBO').GetFlavorRank]#!"
  flavor_kbo.13.title: "Відвоювання [ShowProvinceDefinitionName('kanem_province')]"
  flavor_kbo.13.desc: "Бувши вигнаними з наших прабатьківських земель [ShowProvinceDefinitionName('kanem_province')] і змушеними терпіти ганьбу зведення до тіні нашої колишньої слави, ми зуміли відвоювати ці землі у наших ворогів. З провінцією [ShowProvinceDefinitionName('kanem_province')] та [ShowLocationName('njimi')] знову міцно в наших руках, ми можемо відновити нашу минулу велич і стати беззаперечним правителем усієї території навколо озера Чад."
  flavor_kbo.13.a: "Слава нам!"
  flavor_kbo.14.title: "Озеро Чад та торгівля $kanembu_culture$"
  flavor_kbo.14.desc: "Протягом століть наш народ отримував вигоду від присутності серед водойм. Посеред пустель у наших володіннях осередки життя, наповнені цінною водою, є важливими притулками для наших мандрівних купців і місцевих жителів, щоб отримувати прибуток і засоби до існування. Зі зростанням нашого впливу навколо озера Чад зростає і наш дохід від різноманітної торговельної діяльності на його берегах."
  flavor_kbo.14.a: "Ми повинні скористатися цією можливістю."
  flavor_kbo.14.b: "Ми не можемо потурати бажанням купців..."
  flavor_kbo.15.title: "Рабська торгівля в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_kbo.15.desc: "Як і в різних частинах континенту, так і наша економіка значною мірою залежить від притоку та використання примусової праці. Часті рейди, що підтримуються нашою армією та місцевими воєначальниками, забезпечують наші ринки свіжою робочою силою для роботи в кожному куточку нашого суспільства. Однак, завдяки нашим нещодавнім досягненням та інвестиціям у цю діяльність, ми накопичили значну кількість цих людей. Таким чином, нам належить вирішити, чи бажаємо ми продовжувати інвестувати в ці рейди та збільшувати потік завойованих людей на нашому ринку, чи вирішити надати їм місце в нашому суспільстві та дозволити їм процвітати як його частині."
  flavor_kbo.15.a: "Давайте працювати над інтеграцією всіх у наше суспільство."
  flavor_kbo.15.b: "Наша економіка значно виграє від цієї торгівлі."
  kbo_pop_promotion_more_potent_tt: "Ми отримаємо доступ до унікальної [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] дії [ShowCabinetActionName('kbo_pop_promote_action')]"
  flavor_kbo.16.title: "Азалай і Тагламт"
  flavor_kbo.16.desc: "Протягом століть, після появи верблюда в Західній та Центральній Африці, багато торговців брали на себе завдання долати несприятливі умови в пошуках прибутків та торговельних пригод, використовуючи такі маршрути, як Азалай або Тагламт. Відомі як Аменокали, ці могутні особистості наглядали та подорожували пустелею, від оази до оази, з'єднуючи далекі місця та торгуючи цінною [ShowGoodsName('salt')]. На цих ринках сіль продавалася плитами або цеглинами в обмін на їжу, худобу та інші важливі товари. Чи надавати таку привілейовану наглядову посаду могутнім особам, чи ні, є делікатною справою, і такою, що вимагатиме від наших найдовіреніших радників її вирішення."
  flavor_kbo.16.a: "Нехай Аменокали кожного каравану наглядають за своєю торгівлею."
  flavor_kbo.16.b: "Ця влада зарезервована для [ROOT.GetCountry.GetGovernment.GetRuler.GetName]!"
  flavor_kbo.17.title: "$sharia$ в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_kbo.17.desc: "Наша велика нація була однією з найстаріших і найшвидших прихильників [ShowReligionAdjective('sunni')] ісламу. З новою силою для істинної віри та озброєні невпинною енергією, ми зробили все можливе, щоб консолідувати наші релігійні цінності та захистити наш народ від сторонніх язичників. Однак один аспект нашої віри, який ще не прижився, це $sharia$. Збірка релігійних законів, які можуть диктувати ефективність нашої адміністрації, а також вплив, який вона може мати на наш народ. Хоча багато наших радників виступають за впровадження $sharia$, інші застерігають від переплетення релігії та адміністрації."
  flavor_kbo.17.a: "Впровадження $sharia$ є наступним логічним кроком!"
  flavor_kbo.17.b: "Не будемо порушувати статус-кво."
  kbo_enable_sharia_courts_cabinet_action_tt: "Ми отримаємо доступ до унікальної [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] дії [ShowCabinetActionName('kbo_sharia_courts')]"
  gained_access_to_this_privilege_tt: "Отримав доступ до цього привілею"