l_english:
  flavor_fra_dau.100.title: "Дуфінський Статут"
  flavor_fra_dau.100.desc: "Хоча [target_country.GetLongName] вдалося зберегти незалежність протягом століть, вона також залишалася зоною великого інтересу для [ROOT.GetCountry.GetLongName] через її близькість до [GetInternationalOrganizationType('hre').GetName] та [ShowRegionName('italy_region')]. Однак нинішній правитель, [scope_rule_dau.GetName], звернувся до [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle] з пропозицією. Після успадкування [target_country.GetNameWithNoTooltip] після смерті [scope_rule_dau.GetHerHis] брата у 1333 році, [scope_rule_dau.GetShortNameWithNoTooltip] зіткнувся з фінансовими труднощами, які з часом ставали дедалі гіршими. \n\nСпочатку маючи намір продати [scope_rule_dau.GetHerHis] землі та титули [GetCountry('PAP').GetLongName], [scope_rule_dau.GetShortNameWithNoTooltip] натомість запропонував продаж [ROOT.GetCountry.GetNameWithNoTooltip], якщо [scope_rule_dau.GetHerHis] вимоги будуть виконані. В обмін на землі [target_country.GetNameWithNoTooltip], її території повинні бути звільнені від оподаткування та певних державних указів. Крім того, титул $country_flavor_france_dauphin$ повинен розглядатися як окремий унікальний титул серед тих, що належать правителям [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_fra_dau.100.a: "Ми приймемо [scope_rule_dau.GetHerHis] пропозицію і зробимо $country_flavor_france_dauphin$ окремим [ROOT.GetCountry.GetGovernment.GetAdjective] титулом."
  flavor_fra_dau.100.b: "Прийняти [scope_rule_dau.GetHerHis] пропозицію, але об'єднати її з іншими [ROOT.GetCountry.GetGovernment.GetAdjective] титулами."
  flavor_fra_dau.100.c: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] за жодних обставин не визволить [scope_rule_dau.GetHimHer]."
  flavor_fra_dau.101.title: "Дуфінський Статут"
  flavor_fra_dau.101.desc: "Хоча [GetCountry('DAU').GetName] вдалося зберегти свою незалежність під правлінням [scope_rule_dau.GetName], [scope_rule_dau.GetHerHis] успадкування сімейного боргу [scope_rule_dau.GetDynasty.GetName] призвело до того, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] розглядає можливість продажу [ROOT.GetCountry.GetFlavorRank]. Хоча [scope_rule_dau.GetShortNameWithNoTooltip] сподівався укласти угоду з [GetCountry('PAP').GetName], переговори з ними згорнулися, оскільки вони більше не виявляють інтересу.\n\nЧлени [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували нам прагнути до угоди з [target_country.GetLongName], щоб звільнити [scope_rule_dau.GetShortNameWithNoTooltip] від [scope_rule_dau.GetHerHis] боргу. Хоча [scope_rule_dau.GetShortNameWithNoTooltip] відмовиться від [scope_rule_dau.GetHerHis] титулів та правління, будь-яка угода з [target_country.GetNameWithNoTooltip] буде написана таким чином, що [ROOT.GetCountry.GetNameWithNoTooltip] збереже автономію."
  flavor_fra_dau.101.a: "Запропонувати угоду [target_country.GetAdjectiveWithNoTooltip] [target_country.GetGovernment.GetCourtTitle]."
  flavor_fra_dau.101.b: "Ми ніколи не продамо нашу незалежність!"
  dau_sale_of_viennois_tt: "Якщо [Concept('target_country.GetName] погодиться, ми станемо молодшим партнером у персональній унії та отримаємо #G +1000#! [gold', 'CONCEPT_PLACEHOLDER')|e]"
  heirs_will_inherit_dauphin_title: "Титул $country_flavor_france_dauphin$ буде надано спадкоємцю [ROOT.GetCountry.GetName]"