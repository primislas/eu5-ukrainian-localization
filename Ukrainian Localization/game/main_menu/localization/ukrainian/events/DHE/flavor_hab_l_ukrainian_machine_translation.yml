l_english:
  flavor_hab.1.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.1.desc: "[target_character.GetName] здобув велике визнання на службі [ROOT.GetCountry.GetReligion.GetAdjective] Церкви, і оскільки він тепер обіймає посаду, розташовану на наших землях, ми могли б використати його навички на нашу користь, або при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], або як дипломатичного посланця до [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle]."
  flavor_hab.1.a: "Залишити його при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.1.b: "Використати його як [ROOT.GetCountry.GetAdjectiveWithNoTooltip] голос у [GetCountry('PAP').GetLongNameWithNoTooltip]"
  good_papal_relations: "Добрі стосунки з [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle]"
  flavor_hab.2.title: "[target_artist.GetNameWithNoTooltip] Документація нашої історії"
  flavor_hab.2.desc: "[target_artist.GetName] детально задокументував історію [ruler_dynasty.GetName], від перемог Фрідріха II, обрання [GetCharacter('hab_rudolf_i_habsburg').GetName] та нашого нещодавнього успадкування [ShowAreaName('carinthia_area')]. Хоча ця книга певних історій не надто прикрашає великі діяння нашої династії, це лише служить нашій справі, щоб підкреслити велич [ruler_dynasty.GetName]! Ми повинні надати [target_artist.GetNameWithNoTooltip] наше спонсорство та виставити його велику роботу в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.2.a: "Слава [ruler_dynasty.GetNameWithNoTooltip]!"
  flavor_hab.2.b: "Відпустити його."
  flavor_hab.3.title: "Втрата нашого родового осідку"
  flavor_hab.3.desc: "Наші вороги змусили нас відкликати нашу законну претензію на [ShowLocationName('aarau')]! З цим ми втрачаємо не лише один з наших найсильніших центрів у районі Швейцарії, але й сам Габсбурзький замок. Хоча замок втратив більшу частину своєї функціональності та престижу з нашим придбанням та переїздом до [ShowLocationName('vienna')], втрата нашого династичного осідку є сильним ударом по нашому престижу."
  flavor_hab.3.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_hab.4.title: "Золотий дах [ShowLocationNameWithNoTooltip('innsbruck')]"
  flavor_hab.4.desc: "Щоб увічнити славу [ROOT.GetCountry.GetName] та нашої династії, ми повинні замовити архітектору прикрасити наш маєток в [ShowLocationName('innsbruck')], впливовому гірничодобувному місті. [target_ruler.GetName] раніше виявляв особливий інтерес до [ShowLocationNameWithNoTooltip('innsbruck')], проводячи якомога більше часу в місті. Здібний архітектор [target_artist.GetName] поділився з нами багатообіцяючими планами, однією з його найпривабливіших пропозицій був дах з плитки, що сяє, як чисте золото, на сонці."
  flavor_hab.4.a: "Це покаже славу нашої династії"
  flavor_hab.4.b: "Ми не повинні витрачати такі гроші."
  flavor_hab.4.historical_info: "#italic Золотий дах#!, Goldenes Dachl, Інсбрука був побудований у 1500 році на честь зміни століття за замовленням імператора Максиміліана I. Отримавши свою назву від понад 2000 позолочених мідних плиток на даху, еркер прикрашений рельєфами, що зображують Максиміліана та його першу і другу дружин, Марію Бургундську та Б'янку Марію Сфорца."
  flavor_hab.5.title: "Метеорит [ShowLocationNameWithNoTooltip('ensisheim')]"
  flavor_hab.5.desc: "Камінь упав з гуркотом і вогняним хвостом на полях [ShowLocationName('ensisheim')]. Хоча явище можна було спостерігати в [ShowProvinceDefinitionName('lower_alsace_province')] та навколо неї, падіння метеорита на полі поблизу [ShowLocationNameWithNoTooltip('ensisheim')] не спричинило значних пошкоджень і швидко стало привабливим для місцевого населення. Ми повинні розглядати це як диво, яким нас благословив [ROOT.GetCountry.GetReligion.GetGodName]."
  flavor_hab.5.a: "Справжнє диво!"
  flavor_hab.5.historical_info: "7 листопада 1492 року метеорит вагою 127 кілограмів упав на полі за містом Енсісхайм в Ельзасі, тоді частині провінції Передньої Австрії. Після того, як жителі Енсісхайма почали досліджувати дивне явище, місцевий магістрат наказав їм зберегти камінь і припинити відламувати від нього шматки. Король Максиміліан пізніше наказав зберегти камінь у місцевій парафіяльній церкві, тоді як шматок метеорита був відправлений майбутньому Папі Пію III."
  flavor_hab.6.title: "Генеральний ландтаг"
  flavor_hab.6.desc: "Наші землі, від берегів Дунаю в [ShowAreaName('austria_area')] до гір [ShowAreaName('tirol_area')], різноманітні та населені людьми з різними інтересами та бажаннями. Об'єднати цих людей в одному [ROOT.GetCountry.GetGovernment.GetParliament.GetName] є неймовірним досягненням і допоможе нам забезпечити сильний уряд для неподільної землі."
  flavor_hab.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.7.title: "[ShowGovernmentReformNameWithNoTooltip('reichshofrat_reform')]"
  flavor_hab.7.desc: "З нашим контролем над [GetUniqueInternationalOrganization('hre').GetName] ми можемо створити певні інституції, які адмініструватимуть імперську бюрократію, перебуваючи при цьому під нашим власним контролем. [ShowGovernmentReformName('reichshofrat_reform')] могла б стати такою інституцією, пов'язаною з нашим урядом, що функціонує як юридичний суд для наших імперських підданих."
  flavor_hab.7.a: "Це послужить як нам, так і імперії."
  flavor_hab.7.b: "Це звучить як погана ідея."
  flavor_hab.8.title: "Реформаторський рух [ShowLocationNameWithNoTooltip('melk')]"
  flavor_hab.8.desc: "Деякі члени нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] зустрілися в районі [ShowLocationName('melk')], щоб обговорити постійний занепад монастирської культури в [ROOT.GetCountry.GetName]. Зі зростанням кількості скарг стає зрозуміло, що наші монастирі гостро потребують реформ. Якщо ми діятимемо швидко, нас можуть вважати яскравим прикладом [ROOT.GetCountry.GetReligion.GetAdjective] реформ."
  flavor_hab.8.a: "Впровадити реформи."
  flavor_hab.8.b: "Нинішні порядки цілком прийнятні."
  flavor_hab.9.title: "Конкордат [ShowLocationNameWithNoTooltip('vienna')]"
  flavor_hab.9.desc: "Після тривалих переговорів з папськими делегаціями ми нарешті досягли прийнятної точки, що представляє інтереси як [ROOT.GetCountry.GetName], так і [GetCountry('PAP').GetName]. Після століть ворожнечі та сумнівів між [GetUniqueInternationalOrganization('hre').GetName] та [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle], це може стати поворотним моментом у наших відносинах, встановивши дружні стосунки між нами."
  flavor_hab.9.a: "Підписати договір!"
  flavor_hab.9.b: "Нам не потрібна допомога [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle]."
  flavor_hab.10.title: "Щедрі громадяни [ShowLocationNameWithNoTooltip('graz')]"
  flavor_hab.10.desc: "У лихі часи мешканці [ShowLocationName('graz')] подарували місцевому [ShowBuildingTypeName('cathedral')] прекрасну фреску, створену [target_artist.GetName]. Хоча ці часи вже в минулому, [target_artist.GetNameWithNoTooltip] тепер може представити свій проєкт у всій його красі. Вона стоятиме тут як пам'ять про труднощі, які довелося пережити та подолати народу [ROOT.GetCountry.GetName]."
  flavor_hab.10.historical_info: "Після того, як місто Грац постраждало від чуми, рою сарани та облоги турецькими військами у 1480 році, його громадяни вирішили спонсорувати фреску для місцевого собору. Томасу фон Філлаху було доручено завершити фреску, щоб громадяни Граца могли подякувати за своє виживання після всіх цих труднощів."
  flavor_hab.10.a: "Благословення!"
  flavor_hab.11.title: "Amor Electis, Iniustis Ordinor Ultor"
  flavor_hab.11.desc: "[target_ruler.GetName] було обрано [GetUniqueInternationalOrganization('hre').GetLeaderTitle]. [target_ruler.GetHisHer|U] обрання не стало несподіванкою, враховуючи [target_ruler.GetHisHer] талант у встановленні дипломатичних зв'язків з виборцями [GetUniqueInternationalOrganization('hre').GetName]. [target_ruler.GetHisHer|U] амбіції та бажання перемогти на виборах вже були продемонстровані в [target_ruler.GetHisHer] раніше обраному девізі #italic Amor Electis, Iniustis Ordinor Ultor#!, який [target_ruler.GetHeShe] скоротив до AEIOU у [target_ruler.GetHisHer] підписах."
  flavor_hab.11.a: "Слава [target_ruler.GetDynasty.GetNameWithNoTooltip]!"
  flavor_hab.11.historical_info: "AEIOU використовувався Фрідріхом III фон Габсбургом як його особистий девіз і підпис, який пізніше використовувався багатьма монархами тієї ж династії як династична фраза. Передбачуване значення фрази незрозуміле, але під час правління Фрідріха вона використовувалася як #italic En, amor electis, iniustis ordinor ultor; sic Fridericus ego mea iura rego.#! в його офіційних імперських документах. Фраза перекладається як #italic Ось, я призначений любити обраних, карати несправедливих, і так я, Фрідріх, здійснюю свої права.#! Пізніше стали популярними інші прочитання, наприклад, #italic Austriae est imperare orbi universo#!, #italic Австрія має правити всім світом#!."
  flavor_hab.12.title: "Піднесення [target_character.GetNameWithNoTooltip]"
  flavor_hab.12.desc: "[target_character.GetName], народжений у заможній купецькій родині, стрімко піднявся в статусі та ранзі протягом останніх кількох років. Хоча його навички могли б бути дуже корисними для [ROOT.GetCountry.GetName], деякі з наших радників висловили сумніви щодо походження його родини та його власної чесності у представленні своєї спадщини."
  flavor_hab.12.a: "Його навички переважують його сумнівне походження."
  flavor_hab.12.b: "Нам не потрібні його послуги."
  flavor_hab.13.title: "[ShowPolicyNameWithNoTooltip('cameralism_policy')] у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab.13.desc: "З нашим прийняттям [ShowPolicyName('cameralism_policy')] наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] також запросив до обговорення специфічної природи цих політик. Одна фракція, очолювана [target_character_1.GetName], виступає за зосередження на покращенні наших мануфактур та виробництва. [target_character_2.GetName] натомість бачить майбутнє економіки [ROOT.GetCountry.GetName] в імітації іноземних методів."
  flavor_hab.13.a: "#italic Австрія понад усе, коли тільки забажає!#!"
  flavor_hab.13.b: "[target_character_2.GetNameWithNoTooltip] покращить нашу економіку через дипломатію!"
  flavor_hab.14.title: "Боротьба [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]"
  flavor_hab.14.desc: "Представники [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] звернулися до [target_ruler.GetName] по допомогу у їхньому поточному слабкому становищі через тривалі воєнні навантаження. Хоча ми мало дбаємо про думки цих селян, безперечно, нам потрібно забезпечити їхню співпрацю для необхідного оподаткування та військової підтримки. Надавши їм набір законів, що регулюють їхні обов'язки перед землевласником, ми могли б врегулювати відносини між обома сторонами та забезпечити правову співпрацю, що полегшить вирішення майбутніх суперечок."
  flavor_hab.14.a: "Надати їм привілей."
  flavor_hab.14.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] сміють вимагати щось від нас?"
  flavor_hab.14.historical_info: "#italic Tractatus de iuribus incorporalibus#! був збіркою законів, підписаних імператором Леопольдом I у 1679 році. Ці закони забезпечували більший правовий захист для селян Австрії та дозволяли їм подавати до суду на порушення та жорстоке поводження з боку відповідальних дворян. Хоча нова ситуація принесла користь як селянству, так і імператору, її успіх був неоднозначним і не повністю застосовувався в усіх австрійських землях однаковою мірою."
  flavor_hab.15.title: "#italic Wiennerische Diarium#!"
  flavor_hab.15.desc: "Мешканець [ShowLocationName('vienna')] та видавець створив газету. Обіцяючи повідомляти про все варте уваги, що відбувається як у [ShowLocationNameWithNoTooltip('vienna')], так і у світі, без додавання поезії, він прагне отримати офіційну грантову допомогу від нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб здобути репутацію визнання та переваги."
  flavor_hab.15.a: "Приємне читання."
  flavor_hab.15.b: "Ми повинні її закрити!"
  flavor_hab.15.c: "Під нашим контролем газета справді процвітатиме."
  flavor_hab.15.historical_info: "Заснована як #italic Wiennerisches Diarium#! у 1703 році, газета була першою на австрійських землях і залишалася однією з найважливіших газет Габсбурзької імперії. Перейменована на #italic Wiener Zeitung#! у 1780 році, газета також опублікувала Декларацію прав людини і громадянина французьких революціонерів, перекладену німецькою, у 1789 році."
  flavor_hab.16.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.16.desc: "[target_character.GetName], [ShowReligionAdjective('catholic')] священнослужитель, виявив талант до навернення людей [ShowReligionAdjective('lutheran')] віри. Це може походити з [target_character.GetHisHer] власного досвіду навернення до [ShowReligionAdjectiveWithNoTooltip('catholic')] віри, оскільки [target_character.GetHeShe] сам виріс [ShowReligionAdjectiveWithNoTooltip('lutheran')]."
  flavor_hab.16.a: "Призначити [target_character.GetHimHer] нашим радником."
  flavor_hab.16.a.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionAdjective('lutheran')] віри втрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_hab.16.b: "Нам не потрібні його послуги."
  flavor_hab.16.b.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionAdjective('lutheran')] віри отримують [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_hab.17.title: "[ShowReligionAdjectiveWithNoTooltip('lutheran')] Люди [ShowAreaNameWithNoTooltip('salzburg_area')]"
  flavor_hab.17.desc: "Частина населення [ShowAreaName('salzburg_area')] на наш шок і жаль прийняла [ShowReligionName('lutheran')]! [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [ShowAreaNameWithNoTooltip('salzburg_area')] бажає, щоб ці єретики зникли якнайшвидше, і вже підготували плани їхнього вигнання."
  flavor_hab.17.a: "Нам потрібно очистити наші землі від єретиків."
  flavor_hab.17.a.tt: "[ShowReligionAdjectiveWithNoTooltip('lutheran')] люди [ShowAreaNameWithNoTooltip('salzburg_area')] мігруватимуть до інших країн."
  flavor_hab.17.b: "Ми не можемо дозволити собі втратити цих людей."
  flavor_hab.17.historical_info: "Через загальне невдоволення правлінням князя-архієпископа більшість населення Зальцбурга відчула себе притягнутою до Реформації незабаром після публікації Дев'яноста п'яти тез. Хоча ці симпатії часто спалахували під час заворушень, уряд Зальцбурга придушував і виганяв багатьох протестантів. Еміграційний патент, наданий для всієї території, що перебувала під управлінням єпископа Зальцбурга у 1731 році, підтвердив ворожу позицію та вигнав 20 000 протестантів з цієї території."
  flavor_hab.18.title: "[ShowGovernmentReformNameWithNoTooltip('geheime_kabinettskanzlei')]"
  flavor_hab.18.desc: "Шпигунство може бути ненадійним ремеслом, особливо коли ми змушені покладатися на прямі зв'язки з окремими особами. Інші країни вже створили установи для задоволення цих потреб, і ми тепер повинні створити одну з таких «Чорних палат» самі. [ShowGovernmentReformName('geheime_kabinettskanzlei')] розпочала б свою роботу під прикриттям поштового відділення, надаючи їм легкий доступ до пошти, що подорожує нашою країною."
  flavor_hab.18.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_hab.18.b: "Розвідка — марна справа."
  flavor_hab.18.historical_info: "Geheime Kabinettskanzlei була створена в 1711 році як «Чорна палата» з резиденцією у віденському Гофбурзі. Заради секретності назва відомства змінювалася кілька разів, перш ніж воно стало відомим як Geheime Kabinettskanzlei. Палата існувала до 1848 року, коли її було розпущено внаслідок революцій, що сколихнули Австрійську імперію."
  flavor_hab.19.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.19.desc: "[target_character.GetName], вправний офіцер наших військ, звернувся до [target_ruler.GetName] з проханням підвищити його до звання генерала. Хоча [target_character.GetHeShe] недовго служив у наших арміях раніше, [target_character.GetNameWithNoTooltip] виявляє обіцянку як командир і відкрито просить того ж від інших країн. Якщо ми не хочемо втратити такого перспективного офіцера, ми повинні найняти [target_character.GetHimHer] зараз і дозволити йому командувати нашими арміями."
  flavor_hab.19.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.19.b: "Яке обурливе прохання!"
  flavor_hab.19.historical_info: "Принц Євген Савойський, народжений у французькій шляхетній родині, виховувався при дворі Людовика XIV. Спочатку відхилений від військової посади у Французькій королівській армії, Євген у віці 19 років вступив на службу до імператора Священної Римської імперії Леопольда I. В імперській армії він відзначився під час османської облоги Відня і швидко піднявся до посади фельдмаршала. Керуючи австрійськими арміями до багаторазових перемог у битвах проти турецьких армій, він зрештою був визнаний одним з найвидатніших військових командирів свого часу."
  flavor_hab.20.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_hab.20.desc: "Події світу змусили юнака з [ShowLocationName('bonn')] на ім'я [target_artist.GetName] назавжди оселитися в нашій розлогій столиці [target_location.GetName]. Тут він швидко здобув собі ім'я як композитор, спонсорований деякими з наших місцевих [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Він виявляє великий талант як музикант і, здається, сповнений рішучості створити тривалу спадщину, навіть попри найсуворіші обставини."
  flavor_hab.20.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.20.historical_info: "Після короткої поїздки до Відня у 1786 році Бетховен остаточно оселився в місті у 1792 році. Там він безперервно перебував, за винятком деяких коротких перерв, до своєї смерті у 1827 році. У Відні він також написав більшість своїх творів за спонсорства різних австрійських дворян, таких як Франц Йозеф Максиміліан фон Лобковіц та Карл Ліхновський."
  flavor_hab.21.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_hab.21.desc: "[target_artist.GetName], попри свій юний вік, вже демонструє композиторські навички, про які багато його попередників можуть лише мріяти. З його талантом та потенційним спонсорством він міг би бути пам'ятним протягом століть і піднести наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] до нових висот."
  flavor_hab.21.a: "Він буде справжнім віртуозом."
  flavor_hab.21.b: "Його музика більше підходить для простолюдинів."
  flavor_hab.22.title: "Заселення [ShowAreaNameWithNoTooltip('transylvania_area')]"
  flavor_hab.22.desc: "[ShowAreaName('transylvania_area')] — це територія, багата на сировину та потенційні мінерали. На жаль, їй бракує кваліфікованої робочої сили для повного використання цих ресурсів. На щастя для наших цілей, міграції [ShowCultureGroupName('german_group')] до [ShowAreaNameWithNoTooltip('transylvania_area')] не є рідкістю, і з невеликим переконанням ми могли б переконати ще більше людей шукати щастя в горах [ShowRegionName('carpathia_region')]."
  flavor_hab.22.a: "Невелика ціна."
  flavor_hab.22.b: "Перешкодити поселенням."
  flavor_hab.23.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.23.desc: "[target_character.GetName] привернув нашу увагу під час своєї служби [ROOT.GetCountry.GetName]. Хоча він приєднався до нашого дипломатичного міністерства лише кілька років тому, його талант і навички чітко помітні, і багато наших радників погоджуються, що йому судилося велике майбутнє. Його рішучість зберегти наше правління перед обличчям ймовірних і реальних загроз, безсумнівно, допоможе нам."
  flavor_hab.23.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.24.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.24.desc: "[target_character.GetName] приєднався до війська [ROOT.GetCountry.GetName] лише кілька років тому, але швидко піднявся у званні завдяки своїй рішучості та світлому розуму. Походячи з [ShowCultureName('czech')] родини та виростаючи в [ShowAreaName('bohemia_area')], він є яскравим прикладом для інших і чудово підготовлений очолити наші армії."
  flavor_hab.24.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.24.b: "Нехай він марширує прямо з нашого володіння."
  flavor_hab.24.historical_info: "Йозеф Венцель Радецький вступив до австрійської армії у 1784 році. Під час наполеонівських війн він швидко піднявся у званні та відіграв важливу роль у перемозі коаліції в битві під Лейпцигом. Зрештою він вийшов на пенсію у 1856 році, прослуживши 72 роки в австрійській армії та під керівництвом 5 імператорів."
  flavor_hab.25.title: "[ShowBuildingTypeNameWithNoTooltip('schonbrunn_palace')]"
  flavor_hab.25.desc: "Хоча [ShowLocationName('vienna')] не бракує прекрасних будівель, де [target_ruler.GetName] міг би проводити час, їй бракує вінцевого твору. На щастя, старий мисливський замок нашої династії, розташований за межами [ShowLocationNameWithNoTooltip('vienna')], та його околиці добре підходять для розкішного палацу та його садів. [target_artist.GetName] чудово підійшов би для розробки плану резиденції, гідної [ROOT.GetCountry.GetLongName]."
  flavor_hab.25.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.25.b: "Це схоже на марнування грошей."
  flavor_hab.25.historical_info: "Спочатку невелика резиденція австрійських монархів, побудована в 1643 році, Шенбрунн був майже повністю зруйнований під час другої облоги Відня в 1683 році османськими військами. Будівля спочатку була реконструйована, але повністю перепланована в 1740 році, коли призначена спадкоємиця Марія Терезія обрала її головною літньою резиденцією для династії Габсбургів. Запланований архітекторами Ніколаусом фон Пакассі та Йоганном Фердинандом Хетцендорфом фон Гогенбергом, будівництво головної будівлі та парку завершилося в 1749 році."
  flavor_hab.26.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_hab.26.desc: "Після років роботи на [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] родину, [target_artist.GetName] тепер шукає нову роботу. Це було б значним підвищенням репутації для нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], якби ми змогли забезпечити послуги такого відомого композитора."
  flavor_hab.26.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.26.b: "Йому доведеться шукати роботу деінде."
  flavor_hab.26.historical_info: "Розпочавши музичне навчання у віці 6 років, Йозеф Гайдн швидко був визнаний за свій співочий талант директором музики собору Святого Стефана у Відні. Залишившись у Відні, він знайшов роботу спочатку у графа Морзіна, а пізніше у угорської шляхетної родини Естергазі."
  flavor_hab.27.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Кольори"
  flavor_hab.27.desc: "Наше піднесення до [ROOT.GetCountry.GetGovernment.GetAdjective] висот було нічим іншим, як надзвичайним. Як одна з домінуючих сил у німецькій сфері та маяк могутності в [ShowContinentName('europe')], багато хто вважає, що настав час, щоб наш статус відображався не лише у справах, а й у символах. Серед цих пропозицій – прийняття нового прапора: вражаючого чорно-жовтого стяга, свідчення наших [ROOT.GetCountry.GetGovernment.GetAdjective] амбіцій та величі."
  flavor_hab.27.a: "Прийняти [ROOT.GetCountry.GetGovernment.GetAdjective] кольори!"
  flavor_hab.27.a.tt: "Змінює прапор [ROOT.GetCountry.GetName] на чорно-золотий біколор"
  flavor_hab.27.b: "Залишити поточний прапор."
  flavor_hab.27.historical_info: "Щонайменше з XIII століття червоно-біло-червоний прапор асоціювався з Австрією та правлячою династією Габсбургів. Однак Габсбурги також використовували чорно-жовтий прапор, коли вони тримали титул імператорів Священної Римської імперії. Після розпуску Імперії цей чорно-жовтий прапор був прийнятий як цивільний прапор Австрійської імперії."
  flavor_hab.29.title: "Завершення [ShowWorkOfArtNameWithNoTooltip('st_stephens_cathedral')]"
  flavor_hab.29.desc: "У 1304 році [albrecht.GetName] ініціював амбітну реконструкцію [ShowWorkOfArtName('st_stephens_cathedral')] у [ShowLocationName('vienna')], замінивши споруду, зруйновану пожежею у 1258 році. Спроектований у готичному стилі, проєкт став символом віри та єдності для [ROOT.GetCountry.GetFlavorRank], але після десятиліть зусиль прогрес сповільнився через брак коштів. Будівельники, відчайдушно бажаючи побачити собор завершеним, тепер звернулися до [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] за фінансовою підтримкою."
  flavor_hab.29.a: "Підтримати завершення собору."
  flavor_hab.29.b: "Казна має інші пріоритети."
  flavor_hab.30.title: "Університет [ShowLocationNameWithNoTooltip('vienna')]"
  flavor_hab.30.desc: "Заснування університету у [ShowLocationName('vienna')] було запропоновано як засіб підвищення культурного статусу нашого [ROOT.GetCountry.GetFlavorRank] та сприяння розвитку знань та освіти. Така установа слугуватиме маяком навчання, приваблюючи вчених та підвищуючи престиж [ROOT.GetCountry.GetName]. Однак для реалізації цього амбітного бачення потрібні значні ресурси."
  flavor_hab.30.a: "Інвестувати в майбутнє знань."
  flavor_hab.30.b: "Наразі ми не можемо виділити ресурси."
  flavor_hab.30.historical_info: "Віденський університет був заснований 12 березня 1365 року герцогом Рудольфом IV і був другим найстарішим університетом у Священній Римській імперії та найстарішим у німецькомовному світі. Пізніше він став найбільшим університетом у Священній Римській імперії та був домом для понад 6000 студентів."
  flavor_hab.31.title: "Віденська Гесера [ShowLocationNameWithNoTooltip('vienna')]"
  flavor_hab.31.desc: "Звинувачення у оскверненні гостини та ритуальних злочинах викликали хвилю заворушень у [ShowLocationName('vienna')], спрямованих проти [ShowReligionAdjective('judaism')] громади. Спалахнули заворушення, були атаковані синагоги, а місцеве населення закликає до жорстких заходів. Ситуація загострилася до того, що вимагаються арешти, страти та масові вигнання."
  flavor_hab.31.a: "Вигнати [ShowReligionAdjectiveWithNoTooltip('judaism')] населення, щоб відновити порядок."
  flavor_hab.31.a.tt: "Усе [ShowReligionAdjective('judaism')] та [ShowCultureName('ashkenazi')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] буде вигнано з [ShowLocationName('vienna')]"
  flavor_hab.31.b: "Це велика несправедливість; ми повинні захистити наших громадян і шукати миру."
  flavor_hab.31.b.tt: "Усі не-[ShowReligionAdjective('judaism')] та не-[ShowCultureName('ashkenazi')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowLocationName('vienna')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hab.31.historical_info: "Віденська Гесера 1420-1421 років була подією, під час якої антисемітські настрої вилилися в переслідування, страти та вигнання єврейського населення Відня за герцога Альбрехта V. Звинувачення в оскверненні гостини та співпраці з гуситами шляхом постачання їм зброї були використані як приводи для цього жорстокого придушення, що призвело до втрати життів та руйнування єврейського кварталу Відня."
  flavor_hab.32.title: "Парацельс"
  flavor_hab.32.desc: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] чув про мандрівного лікаря, який зараз відвідує [ShowLocationName('vienna')]. [target_character.GetName], також відомий як Парацельс, відомий [target_character.GetHisHer] революційними ідеями в медицині, алхімії та натурфілософії, стверджуючи, що [target_character.GetSheHe] може відкрити нові способи розуміння світу та його таємниць. Хоча [target_character.GetHisHer] нетрадиційні методи викликали деякі сумніви, [target_character.GetHisHer] знання можуть надати безцінний погляд на розвиток [ROOT.GetCountry.GetFlavorRank]."
  flavor_hab.32.a: "Зробити [target_character.GetHisHer] перебування у [ShowLocationNameWithNoTooltip('vienna')] постійним!"
  flavor_hab.32.b: "[target_character.GetHisHer|U] ідеї здаються занадто радикальними."
  flavor_hab.32.historical_info: "Теофраст фон Гогенгайм, більш відомий як Парацельс, був піонером швейцарської медицини, алхіміком та астрологом. Відомий своїм відкиданням традиційних медичних практик та наполяганням на використанні спостережень та експериментів, Парацельс революціонізував вивчення медицини, виступаючи за використання хімікатів та мінералів у лікуванні. Йому також приписують назву елемента цинку та розробку концепції токсикології, що робить його однією з найвпливовіших постатей ранньої сучасної науки."
  flavor_hab.33.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.33.desc: "Родом з [ShowProvinceDefinitionName('south_tirol_province')], [target_character.GetName] — обдарований поет, дипломат і лицар. Відомий [target_character.GetHisHer] майстерністю музики та лірики, [target_character.GetSheHe] здається унікально розташованим, щоб подолати розрив між дипломатією та процвітаючими мистецтвами нашого королівства. Раніше служивши зброєносцем і дипломатом, [target_character.GetLastNameWithNoTooltip] багато подорожував [ShowContinentName('europe')], що лише підкреслює [target_character.GetHisHer] важливість. [target_character.GetHisHer|U] присутність при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] може значно покращити наш культурний та дипломатичний статус."
  flavor_hab.33.a: "Ми повинні шукати [target_character.GetHisHer] поради."
  flavor_hab.33.b: "[target_character.GetHisHer|U] навички занадто дорогі."
  flavor_hab.33.historical_info: "Освальд фон Волькенштайн був однією з найвідоміших постатей пізнього середньовічного німецькомовного світу, відомий своєю роллю поета, композитора та дипломата. Він багато подорожував Європою, Близьким Сходом та Північною Африкою, вбираючи різноманітні культурні впливи, що збагатили його мистецтво. Освальд також відігравав активну роль у регіональній політиці, особливо в Тіролі, і був ключовою фігурою на службі імператора Священної Римської імперії Сигізмунда."
  flavor_hab.34.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.34.desc: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] нещодавно почув про [target_character.GetName], відданого целестинського ченця та грізного інквізитора. Відомий [target_character.GetHisHer] невпинним переслідуванням єретиків та [target_character.GetHisHer] впливовими антиєретичними працями, він приносить багатий досвід у боротьбі з релігійним інакомисленням. [target_character.GetHisHer|U] присутність може посилити наші зусилля щодо підтримки релігійної ортодоксії та порядку."
  flavor_hab.34.a: "Шукати його досвіду в єретичних судах."
  flavor_hab.34.b: "Ми мусимо йти більш поблажливим шляхом."
  flavor_hab.34.historical_info: "Петрус Цвікер був членом Целестинського ордену та одним із найактивніших інквізиторів пізнього середньовіччя на німецькомовних землях. Йому було доручено боротися з вальденською єрессю, і Цвікер очолював інквізиційні зусилля в Австрії, Померанії, Бранденбурзі та Угорщині. Його кампанії все ж призвели до численних смертей і майже повного викорінення вальденсів у регіоні."
  flavor_hab.35.title: "Селянське повстання в [ShowLocationNameWithNoTooltip('salzburg')]"
  flavor_hab.35.desc: "Нібито пригноблені селяни [ShowLocationName('salzburg')], обтяжені збільшеними податками, повстали. Гірська місцевість [ShowLocationNameWithNoTooltip('salzburg')] стала полем битви, оскільки тисячі незадоволених підданих кидають виклик місцевим елітам, яких вони звинувачують у своїх труднощах. Очолювані досвідченими шахтарями та підтримані нижчими верствами [ShowLocationNameWithNoTooltip('salzburg')], повстанці, як очікується, рушать на фортецю Гогензальцбург. Ситуація загострилася, і ми повинні діяти рішуче, щоб відновити порядок — або ризикуємо втратити контроль над землею."
  flavor_hab.35.a: "Вести з ними переговори та запропонувати компенсацію."
  flavor_hab.35.b: "Придушити повстання за будь-яку ціну!"
  hab_salzburger_peasant_revolt: "Зальцбурзьке селянське повстання"
  flavor_hab.35.historical_info: "Зальцбурзька селянська війна 1525-1526 років була одним із найорганізованіших повстань під час Німецької селянської війни, коли шахтарі та селяни здобули значні перемоги, такі як битва при Шладмінгу. Незважаючи на початковий успіх, повстанці зрештою піддалися поєднанню внутрішньої роз'єднаності та переважної сили Швабської ліги."
  flavor_hab.36.title: "Повстання поширюється"
  flavor_hab.36.desc: "Наша жорстка відповідь на селянське повстання в [ShowLocationName('salzburg')] лише підлила масла у вогонь. Надходять повідомлення, що незадоволені селяни, шахтарі та фермери в сусідніх регіонах почали збиратися до справи. Те, що починалося як локальне повстання, тепер розпалило регіональне повстання, яке загрожує дестабілізувати всю територію."
  flavor_hab.36.a: "Дуже добре..."
  flavor_hab.37.title: "Колегія виборців підтверджує [ROOT.GetCountry.GetAdjectiveWithNoTooltip] імператорство"
  flavor_hab.37.desc: "Створення Колегії виборців ускладнило імперські вибори, оскільки тепер нам потрібно активно домагатися прихильності окремих виборців за допомогою дипломатії, альянсів, привілеїв, надання земель та багатьох інших поступок. Незважаючи на формалізацію виборчого процесу через нещодавно прийняту Золоту буллу, [austria_first_emperor.GetName] вдалося повернути імперську корону [GetUniqueInternationalOrganization('hre').GetName]. Ця монументальна подія закріплює [ROOT.GetCountry.GetAdjective] позицію як домінуючої сили в [ShowContinentName('europe')] і відкриває нову еру престижу та впливу для нашої династії."
  flavor_hab.37.a: "Хай живе імператор!"
  flavor_hab.37.historical_info: "Габсбурги зберігали свій майже безперервний контроль над троном імператора Священної Римської імперії з 1438 року до розпаду Імперії в 1806 році, вміло керуючи Колегією виборців. Завдяки стратегічним шлюбам, територіальним придбанням та альянсам Габсбурги накопичили величезне багатство та політичний вплив, що дозволило їм пропонувати значні фінансові стимули або політичні послуги для забезпечення голосів."
  flavor_hab.38.title: "Гробниця Першого Імператора"
  flavor_hab.38.desc: "Смерть нашого [first_emperor.GetName] ознаменувала кінець епохи, але його спадщина живе в імперії, яку він допоміг об'єднати. На честь його пам'яті та його монументального внеску в [ROOT.GetCountry.GetName] та [GetUniqueInternationalOrganization('hre').GetName], [target_ruler.GetName] видав указ про будівництво величної гробниці в [ShowWorkOfArtName('st_stephens_cathedral')] у [ShowLocationName('vienna')]. Гробниця Першого Імператора слугуватиме як місцем спочинку для нашого улюбленого предка, так і свідченням сили та витривалості нашої династії."
  flavor_hab.38.a: "Ця гробниця надихатиме майбутні покоління!"
  flavor_hab.38.b: "Це починання занадто дороге."
  flavor_hab.38.historical_info: "Гробниця імператора Фрідріха III є одним із найзначніших творів пізньосередньовічного мистецтва. Розташована в Апостольському хорі собору Святого Стефана у Відні, вона була завершена посмертно в 1513 році за замовленням сина покійного імператора, Максиміліана I. Виготовлена з аднетського мармуру із Зальцбурга, монументальний дизайн гробниці відображає імперську велич Фрідріха та незмінну спадщину Габсбургів."
  flavor_hab.39.title: "Reichstürkenhilfe"
  flavor_hab.39.desc: "Коли ми стикаємося з язичницькими [GetCountry('TUR').GetAdjective] ордами, [target_ruler.GetName] розглядає можливість скликання Імперського сейму та звернення до князів і міст [GetUniqueInternationalOrganization('hre').GetName] з проханням надати кошти та війська для захисту кордонів і збереження віри."
  flavor_hab.39.a: "Скликати Сейм і просити допомоги."
  flavor_hab.39.b: "Ми вистоїмо самі."
  flavor_hab.39.historical_info: "Історично, #italic Reichstürkenhilfe#! був податком, що стягувався імператором Священної Римської імперії для боротьби з османськими турками під час їхньої експансії на захід. Після падіння Константинополя в 1453 році османська загроза стала нагальною проблемою для Імперії. На численних Імперських сеймах, таких як ті, що проводилися у Франкфурті, Нюрнберзі та Регенсбурзі, імператор Фрідріх III, а пізніше Карл V, домагалися схвалення коштів і військ для захисту Імперії. Однак ці внески часто затримувалися, були неповними або повністю відхилялися."
  flavor_hab.40.title: "Фрауенштайнська Мадонна"
  flavor_hab.40.desc: "Один з найвідоміших скульпторів Імперії, [target_character.GetName], завершив шедевр, що поєднує мистецтво та віру у спосіб, який рідко бачили раніше. [target_character.GetHisHer|U] робота, Фрауенштайнська Мадонна, була представлена у паломницькій церкві поблизу [ShowLocationName('kirchdorf')]. Ця пізньоготична скульптура, вирізана з липового дерева, зображує Діву Марію в її ролі захисниці-матері, що укриває колінопреклонні фігури під своїм плащем. Витончений дизайн роботи, від збільшених Мадонни з Дитям до деталізованих фігур внизу, викликає відчуття як божественної величі, так і людської відданості. Кажуть, що [target_ruler.GetName] зображений серед фігур під захисним покровом Марії, що лише підкреслює нашу віру та благословенне лідерство у [GetUniqueInternationalOrganization('hre').GetName]."
  flavor_hab.40.a: "Нагородити [target_character.GetHimHer] посадою при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.40.b: "Похвалити [target_character.GetHisHer] роботу, але дозволити [target_character.GetHimHer] залишитися у [ShowLocationNameWithNoTooltip('kirchdorf')]."
  flavor_hab.41.title: "[ShowBuildingTypeNameWithNoTooltip('ambras_castle')]"
  flavor_hab.41.desc: "[target_ruler.GetName] оголосив про плани перетворити середньовічний [ShowBuildingTypeName('ambras_castle')] на розкішну королівську резиденцію. Амбітний проєкт має на меті створити величну резиденцію для правлячої родини, а також слугувати вітриною для вражаючої колекції картин, обладунків, зброї та різноманітних інших рідкісних і дорогоцінних предметів, які [target_ruler.GetNameWithNoTooltip] збирав протягом багатьох років."
  flavor_hab.41.a: "Нова резиденція відображатиме нашу силу та пишність!"
  flavor_hab.41.b: "Це дорого і непотрібно."
  flavor_hab.41.historical_info: "Замок Амбрас був реконструйований у його сучасну форму ерцгерцогом Фердинандом II між 1564 і 1589 роками. Призначений провінційним сувереном Тиролю, Фердинанд наказав італійським архітекторам переробити середньовічну фортецю на шедевр Відродження. Верхній замок став резиденцією для його родини, тоді як Іспанський зал, диво пізньоренесансної архітектури, був побудований як церемоніальний та культурний центр."
  flavor_hab.42.title: "Суд над [target_character.GetNameWithNoTooltip]"
  flavor_hab.42.desc: "До нашої уваги дійшло, що тривалий судовий процес, зосереджений на [target_character.GetName], шанованому правознавці, судді та колишньому бургомістрі [ShowLocationName('vienna')], спричиняє політичні заворушення. Відомий [target_character.GetHisHer] чесністю та непохитним прагненням до справедливості, [target_character.GetLastNameWithNoTooltip]'s розгляд справ про корупцію приніс [target_character.GetHimHer] ворогів серед укорінених еліт. [target_character.GetHisHer|U] відмова підкорятися хабарництву та [target_character.GetHisHer] конфронтації з могутніми фракціями тепер втягнули [target_character.GetHimHer] у політично забарвлене розслідування, особливо через участь [target_character.GetLastNameWithNoTooltip] у $flavor_hab.45.title$. Зі зростанням напруги, [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] було запропоновано втрутитися та врегулювати цю справу."
  flavor_hab.42.a: "[target_character.GetSheHe|U] є порядною людиною і має бути звільнений!"
  flavor_hab.42.b: "Ми не можемо ризикувати роздратувати еліти..."
  flavor_hab.42.historical_info: "Зібенбюргер відіграв ключову роль у викритті різноманітних корупційних скандалів, пов'язаних з розтратами та хабарництвом серед міських чиновників. Попри його рішучість, могутні опоненти прагнули дискредитувати його, навіть звертаючись до імператора Максиміліана I. Після смерті Максиміліана політичні заворушення тривали, і Зібенбюргер був втягнутий у фракційні суперечки. Коли Фердинанд I взяв владу, Зібенбюргера та інших членів ради звинуватили у перевищенні повноважень та стратили."
  flavor_hab.43.title: "Купець впливу"
  flavor_hab.43.desc: "До нашої уваги потрапив вправний купець і фінансист, [target_character.GetName]. [target_character.GetHisHer|U] великий досвід на посадах канцлера та скарбника, а також [target_character.GetHisHer] цінні зв'язки з впливовою родиною [ShowDynastyName('fugger_dynasty')], роблять [target_character.GetHimHer] привабливим кандидатом на офіційну роль при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Хоча [target_character.GetLastNameWithNoTooltip] є іноземцем, [target_character.GetSheHe] вже володіє землею в Австрії та почав інтегруватися в місцеву еліту. [target_character.GetHisHer|U] експертиза у фінансовому управлінні та торгівлі могла б значно послужити інтересам нашої скарбниці."
  flavor_hab.43.a: "[target_character.GetHisHer|U] навички добре послужать нам."
  flavor_hab.43.b: "Ми не можемо ризикувати довіряти іноземцю наші фінанси."
  flavor_hab.43.historical_info: "Габріель фон Саламанка був іспанським купцем, пізніше дворянином, який відіграв значну роль при дворі Габсбургів як генеральний скарбник та ерцканцлер ерцгерцога Фердинанда I Австрійського з 1521 по 1526 рік. Саламанка став дуже впливовим радником австрійського суверена і піднявся до такого соціального становища, яке зрештою знайшло своє пишне вираження в його шлюбах з представниками найвищої знаті."
  flavor_hab.44.title: "Заклик до звільнення [target_character.GetLastNameWithNoTooltip]"
  flavor_hab.44.desc: "Попри отримання посади при [ROOT.GetCountry.GetGovernment.GetCourtTitle], зусилля [target_character.GetName] щодо стабілізації скарбниці та забезпечення стабільного доходу зустріли запеклий опір з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Через те, що [target_character.GetHisHer] фінансові стратегії були зірвані, а скарбниця все ще перебуває у скрутному становищі, дворяни почали відкрито критикувати Саламанку, звинувачуючи [target_character.GetHimHer] в економічних проблемах. Тепер вони вимагають [target_character.GetHisHer] звільнення, стверджуючи, що [target_character.GetHisHer] подальша присутність лише поглибить розкол між [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та аристократією."
  flavor_hab.44.a: "[target_character.GetSheHe|U] не винен у поточній ситуації."
  flavor_hab.44.b: "Звільнити [target_character.GetHimHer] з [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.44.historical_info: "У 1526 році становище Саламанки при дворі ставало дедалі хиткішим, оскільки дворянство об'єдналося проти нього, звинувачуючи його в некомпетентності та егоїстичних мотивах. Через величезний тиск з боку аристократії, він був змушений піти у відставку з посади скарбника та ерцканцлера."
  flavor_hab.45.title: "Кривавий суд [ShowLocationNameWithNoTooltip('wiener_neustadt')]"
  flavor_hab.45.desc: "Влада [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] була оскаржена бунтівними радниками, які прагнули сформувати власний уряд, обійшовши волю суверена. Їхня непокора порушила порядок і підірвала авторитет монархії над [ROOT.GetCountry.GetFlavorRank]. Тепер, викликані [target_ruler.GetName] до [ShowLocationName('wiener_neustadt')], щоб відповісти за свої дії, ці дисиденти постають перед судом."
  flavor_hab.45.a: "Справедливість має бути відновлена."
  flavor_hab.45.b: "Надати помилування, щоб уникнути подальших заворушень."
  flavor_hab.45.historical_info: "Віденський Нойштадтський Кривавий Суд 1522 року був подією на початку правління Фердинанда I. Після смерті імператора Максиміліана I у 1519 році австрійські стани відмовилися визнавати старий уряд, встановлений покійним імператором, і сформували власний бунтівний режим, очолюваний станами. Суд перетворився на трибунал проти нового уряду станів, звинувачуючи його лідерів у незаконному узурпації влади та підбурюванні народу. Фердинанд наказав покарати лише призвідників, що призвело до страти як шляхетних, так і простолюдних лідерів повстання."
  flavor_hab.46.title: "Падіння [GetCountry('HUN').GetNameWithNoTooltip]"
  flavor_hab.46.desc: "[GetCountry('HUN').GetName] зазнала нищівної поразки від рук [GetCountry('TUR').GetName]. З нашими королівськими зв'язками з [GetCountry('HUN').GetNameWithNoTooltip] через шлюб, відповідальність діяти тепер лягає на нас. Багато голосів у [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджують, що ми повинні втрутитися, щоб претендувати на [GetCountry('HUN').GetAdjectiveWithNoTooltip] трон, аби зупинити [GetCountry('TUR').GetAdjectiveWithNoTooltip] наступ. Якщо [ShowContinentName('europe')] має бути врятована від цієї напасті, зрозуміло, що лише ми маємо силу об'єднати необхідні сили для опору їм."
  flavor_hab.46.a: "Ми повинні претендувати на Священну Корону!"
  flavor_hab.46.b: "Ми не повинні антагонізувати [GetCountry('TUR').GetNameWithNoTooltip]."
  flavor_hab.46.historical_info: "Битва при Могачі 1526 року стала катастрофічною поразкою для Угорщини. Смерть короля Угорщини та Богемії Людовика II залишила королівство в хаосі. Це створило вакуум влади, який прагнули заповнити як австрійський ерцгерцог Фердинанд I, так і трансільванський шляхтич Янош Заполья. Як чоловік сестри Людовика Анни, Фердинанд претендував на трон на основі династичних прав і був обраний королем Угорщини фракцією угорських шляхтичів у 1526 році."
  flavor_hab.47.title: "Палац пишноти"
  flavor_hab.47.desc: "З процвітанням [ROOT.GetCountry.GetFlavorRank] та нашими скарбницями, що переповнені багатством, є можливість перетворити нашу резиденцію влади на справжній символ нашої величі. Старий замок Гофбург більше не відображає пишноти та статусу, яких ми досягли. Багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує нам перебудувати та розширити Гофбург у грандіозну резиденцію, гідну нашого зростаючого престижу та могутності."
  flavor_hab.47.a: "Перебудувати його в резиденцію, гідну нашої величності!"
  flavor_hab.47.b: "Ми повинні зосередитися на більш важливих справах."
  flavor_hab.48.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.48.desc: "Оскільки Реформація охоплює [ShowContinentName('europe')], наш [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] спонукає нас наймати людей, які зайняли б жорстку позицію проти поширення єресі. Одним з таких людей є [target_character.GetName], відомий своїми гострими дипломатичними навичками та [target_character.GetHisHer] твердою позицією у питаннях віри, [target_character.GetSheHe] є ідеальним кандидатом для керівництва нашою політикою в ці неспокійні часи."
  flavor_hab.48.a: "Запросити [target_character.GetHimHer] приєднатися до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.48.b: "[target_character.GetHisHer|U] погляди занадто радикальні."
  flavor_hab.48.historical_info: "Бернгард фон Клес був кардиналом, єпископом і державним діячем, чия кар'єра перепліталася з політичними та релігійними потрясіннями Європи XVI століття. Він здобув популярність як єпископ Тренту, а пізніше як президент Таємної ради за Фердинанда I. Фон Клес був затятим противником Мартіна Лютера і відіграв значну роль у протидії протестантській Реформації, зокрема посиливши тиск на протестантські стани на Шпаєрському рейхстазі 1529 року."
  flavor_hab.49.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.49.desc: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] обговорював присутність [target_character.GetName] у [ShowLocationName('vienna')]. [target_character.GetLastNameWithNoTooltip] — великий вчений і ерудит, відомий [target_character.GetHisHer] знаннями в медицині, математиці, астрономії та картографії. [target_character.GetSheHe|U] також служив особистим лікарем багатьох важливих осіб [ROOT.GetCountry.GetFlavorRank]. Завдяки [target_character.GetHisHer] великим знанням та [target_character.GetHisHer] здатності поєднувати наукову роботу з практикою, [target_character.GetSheHe] був би дуже хорошим кандидатом для служби при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.49.a: "Запросити [target_character.GetHimHer] приєднатися до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.49.b: "Нас не цікавить те, що [target_character.GetSheHe] може запропонувати."
  flavor_hab.50.title: "[target_character.GetNameWithNoTooltip] створює [ShowWorkOfArtNameWithNoTooltip('tabula_hungariae')]"
  flavor_hab.50.desc: "[target_character.GetName], відомий вчений та ерудит, що служить при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], взявся за чудовий проєкт — детальну карту [GetCountry('HUN').GetName], відому як [ShowWorkOfArtName('tabula_hungariae')]. Ця карта, заснована на рукописі Лазаря Секретаріуса, включає понад 1300 поселень та революційну спробу включити точні відстані між ними. Її рівень деталізації та включення масштабу відзначають її як одну з найпередовіших регіональних карт нашого часу."
  flavor_hab.50.a: "Свідчення геніальності нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_hab.51.title: "Облога [ShowLocationNameWithNoTooltip('vienna')]"
  flavor_hab.51.desc: "[GetCountry('TUR').GetAdjective] орди відбито! Всупереч усім труднощам, наші війська здобули перемогу над обложниками-язичниками, убезпечивши [ShowLocationName('vienna')] та захистивши ворота до серця [ShowContinentName('europe')]. Ця перемога є свідченням доблесті наших солдатів та стійкості нашого народу. Знявши облогу, ми завдали критичного удару по [GetCountry('TUR').GetAdjectiveWithNoTooltip] амбіціям у християнському світі."
  flavor_hab.51.a: "Тріумфальна перемога!"
  flavor_hab.51.historical_info: "Облога Відня 1529 року стала першою великою спробою Османської імперії завоювати місто, очоленою султаном Сулейманом Пишним після його перемоги в битві при Могачі. Незважаючи на значну чисельну перевагу противника, захисники утримали місто та зуміли відбити атакуючих турків. Друга, більш відома облога відбулася 1683 року під проводом Кара Мустафи. Цього разу Священна ліга здобула вирішальну перемогу. Коли все здавалося втраченим, крилаті гусари на чолі з польським королем Яном III Собеським прибули та звільнили місто масовою кавалерійською атакою."
  flavor_hab.52.title: "Укріплення [ShowLocationNameWithNoTooltip('vienna')]"
  flavor_hab.52.desc: "Хоча війна з [GetCountry('TUR').GetName] закінчилася, ми отримали цінний урок. [GetCountry('TUR').GetAdjectiveWithNoTooltip] змогли загрожувати [ShowLocationName('vienna')], і її падіння мало б руйнівні наслідки для всієї [ShowContinentName('europe')]. Багато хто в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер тисне на [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], щоб інвестувати в укріплення [ShowLocationNameWithNoTooltip('vienna')]."
  flavor_hab.52.a: "Замовити масштабну реконструкцію стін."
  flavor_hab.52.b: "Замовити незначне покращення."
  flavor_hab.52.c: "Поточних укріплень достатньо."
  flavor_hab.53.title: "Знесення стін [ShowLocationNameWithNoTooltip('vienna')]"
  flavor_hab.53.desc: "Стіни [ShowLocationName('vienna')], колись гордий символ стійкості нашого міста проти іноземних загарбників, тепер під пильною увагою. Зі зростанням тиску міського планування та швидким зростанням населення, ці укріплення стали менш необхідністю і більше перешкодою. Розширення стримується, архітектурні проєкти та нові райони обмежені постійними бар'єрами. Багато голосів, особливо серед містобудівників та купців, закликають знести стіни, стверджуючи, що їхнє видалення започаткує еру зростання та процвітання."
  flavor_hab.53.a: "Знести цю стіну!"
  flavor_hab.53.b: "Ці стіни безцінні."
  flavor_hab.53.historical_info: "Рішення про знесення віденських укріплень було прийнято в XIX столітті, зумовлене швидкою індустріалізацією та зростанням населення міста. Стіни, які успішно захищали Відень під час таких подій, як османські облоги 1529 та 1683 років, більше не були необхідними в епоху сучасної війни."
  flavor_hab.54.title: "Зала Ландтафеля"
  flavor_hab.54.desc: "З придбанням [ShowLocationName('prague')] ми зіткнулися з чудовою [GetCountry('BOH').GetAdjective] практикою так званих #italic Zemské desky#!. Ця система передбачає ведення записів про шляхетські маєтки, юридичні угоди та права, які зберігаються в офіційних книгах. Спочатку вона розміщувалася в Старому Королівському палаці в [ShowLocationNameWithNoTooltip('prague')]ському замку, але зала була знищена пожежею. Оскільки ця установа забезпечує прозорість та безперервність у питаннях шляхетського землеволодіння та юридичних рішень, багато хто пропонує побудувати нову залу, де вони будуть розташовані, та прийняти цю систему для себе."
  flavor_hab.54.a: "Відбудувати її!"
  flavor_hab.54.b: "Це не потрібно."
  flavor_hab.55.title: "Створення Військової Границі"
  flavor_hab.55.desc: "Невпинна загроза [GetCountry('TUR').GetAdjective] посягань на наші кордони ставить під загрозу безпеку наших земель та стабільність самої [ShowContinentName('europe')]. Щоб протистояти цій загрозі, багато хто запропонував створити оборонну зону вздовж нашого південного кордону, заселену вірними підданими та професійними солдатами, яким доручено захищати наш [ROOT.GetCountry.GetFlavorRank]."
  flavor_hab.55.a: "Створити її!"
  flavor_hab.55.b: "У цьому немає потреби."
  flavor_hab.55.historical_info: "Військова границя Габсбургів була створена в XVI столітті як укріплена прикордонна зона для захисту Габсбурзької монархії від Османської імперії. Ця границя простягалася через Хорватію, Сербію та Румунію, слугуючи буферною зоною між територіями, контрольованими Османською імперією, та землями Габсбургів. Регіон був заселений сумішшю етнічних груп, включаючи сербів, хорватів та влахів, яким надавалися землі та привілеї в обмін на військову службу."
  flavor_hab.56.title: "Заселення Військової Границі"
  flavor_hab.56.desc: "Наші військові планувальники запропонували сміливу ініціативу для посилення нашої оборони проти [GetCountry('TUR').GetAdjective] вторгнень: переселення селян з центральних районів на новостворену військову границю. Заохочуючи поселення в цих прикордонних регіонах, ми можемо створити самодостатню лінію оборони, де вірні піддані діятимуть як система раннього попередження та сили опору проти будь-яких ворожих наступів."
  flavor_hab.56.a: "Гарна ідея."
  flavor_hab.56.b: "Вони потрібніші вдома."
  flavor_hab.57.title: "Тирольське селянське повстання"
  flavor_hab.57.desc: "До нас дійшли звістки про бунтівні повстання в [ShowAreaName('tirol_area')] під проводом [target_character.GetName]. Здобувши довіру незадоволених шахтарів та селян, [target_character.GetLastNameWithNoTooltip] згуртував збройне повстання проти встановленого порядку, заявляючи, що бореться за рівність, справедливість та права простого народу. Рух швидко поширився, повстанці штурмували єпископства та висували радикальні вимоги, що кидали виклик владі як [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], так і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_hab.57.a: "Мобілізувати ресурси та розгромити їх!"
  flavor_hab.57.b: "Вони не становлять для нас загрози."
  flavor_hab.57.c: "Ми мусимо поступитися — вони надто сильні."
  flavor_hab.57.b.tt: "Усі [ShowPopTypeName('peasants')] у [ShowAreaName('tirol_area')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднаються до [tirolean_rebel.GetName]"
  hab_tirolean_peasant_revolt: "Тирольське селянське повстання"
  flavor_hab.57.historical_info: "Міхаель Гайсмайр був визначною фігурою у Німецькій селянській війні, очолюючи тирольські та зальцбурзькі повстання 1525-1526 років. Гайсмайр виступив проти вкорінених привілеїв знаті та Католицької Церкви. Після початку повстання у 1525 році він розробив радикальні реформи, включаючи рівність перед законом, обрання суддів та священиків, і навіть скасування Католицької Церкви. Незважаючи на його зусилля організувати демократичну християнську селянську державу, його повстання було зрештою придушене."
  flavor_hab.58.title: "Найдивніший з дарів"
  flavor_hab.58.desc: "Новини ширяться [ShowLocationName('vienna')] про надзвичайне прибуття — величного слона, подарованого нам нашими [GetCountry('POR').GetAdjective] друзями. Тварина викликала сенсацію в місті, адже для більшості наших людей це вперше, коли вони бачать таку істоту поза ілюстраціями чи розповідями з далеких земель. Високий і величний, слон є як символом [GetCountry('POR').GetAdjectiveWithNoTooltip] впливу по всьому світу, так і жестом доброї волі до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.58.a: "Ну... дякую?"
  flavor_hab.58.historical_info: "Слон Сулейман був подарунком короля Жуана III Португальського ерцгерцогу Максиміліану II Австрійському у 1552 році. Сулеймана відправили до Відня як жест дипломатії та союзу. Його подорож з Португалії через Іспанію та Італію до Австрії була видовищем, яке захопило публіку по всій Європі. Після прибуття до Відня Сулейман став сенсацією."
  flavor_hab.59.title: "Розширення [ShowWorkOfArtNameWithNoTooltip('hofburg')]"
  flavor_hab.59.desc: "[target_ruler.GetName] розвинув пристрасть до колекціонування рідкісних та екзотичних предметів, від вишуканих рукописів та безцінних реліквій до незвичайних артефактів. Проте ця нововиявлена пристрасть призвела до нагальної проблеми — у [ShowWorkOfArtName('hofburg')] просто немає відповідного місця для розміщення такої зростаючої та престижної колекції. Щоб вирішити це, було запропоновано розширити [ShowWorkOfArtNameWithNoTooltip('hofburg')] грандіозними залами та галереями, які могли б вмістити ці скарби."
  flavor_hab.59.a: "Розширити [ShowWorkOfArtNameWithNoTooltip('hofburg')], щоб зберегти ці скарби."
  flavor_hab.59.b: "У нас є більш нагальні справи, на які можна витратити кошти."
  flavor_hab.59.historical_info: "Багато австрійських правителів прагнули консолідувати мистецтво, літературу та історичні артефакти під владою Габсбургів. Деякі з них спочатку розміщувалися в розширеному палаці Гофбург у Відні, і ці колекції служили як свідченням імперського престижу, так і ресурсом для вчених. З часом це зростаюче сховище знань та мистецтва стало основою Австрійської імператорської придворної бібліотеки."
  flavor_hab.60.title: "Маестро для [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_hab.60.desc: "[target_ruler.GetName], палкий шанувальник мистецтв, висловив зацікавленість у запрошенні відомого композитора [target_character.GetName] служити при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetLastNameWithNoTooltip], прославлений за [target_character.GetHerHis] майстерність у духовній музиці та складній поліфонії, є одним з найшанованіших музикантів у [ShowContinentName('europe')]. [target_character.GetHerHis|U] призначення підвищило б престиж нашої нації та ще більше зміцнило б наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] як маяк культури та витонченості."
  flavor_hab.60.a: "Не шкодувати коштів."
  flavor_hab.60.b: "[target_character.GetHerHis|U] вимоги надто дорогі."
  flavor_hab.60.historical_info: "Джованні П'єрлуїджі да Палестрина широко вважається одним із найвидатніших композиторів епохи Відродження. Його музика встановила еталон для духовних композицій. У 1560-х роках імперський посланник імператора Максиміліана II вів переговори з Палестриною, щоб заповнити вакантну посаду капельмейстера при віденському дворі. Незважаючи на високу повагу імператора до нього, переговори зрештою провалилися через високі фінансові вимоги Палестрини."
  flavor_hab.61.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.61.desc: "Будучи пристрасним поціновувачем мистецтв, [target_ruler.GetName] давно захоплювався творами видатного художника [target_character.GetName]. Яскраві зображення селянського життя, пейзажів та алегоричних тем [target_character.GetLastNameWithNoTooltip] зачаровували двори по всій [ShowContinentName('europe')]. Вже придбавши кілька шедеврів [target_character.GetHerHis], [target_ruler.GetNameWithNoTooltip] тепер розглядає можливість запросити [target_character.GetLastNameWithNoTooltip] приєднатися до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] як придворного художника."
  flavor_hab.61.a: "Запросімо [target_character.GetLastNameWithNoTooltip] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_hab.61.b: "Ми не можемо дозволити собі таку розкіш зараз."
  flavor_hab.62.title: "Імперська корона"
  flavor_hab.62.desc: "[target_ruler.GetName] висловив бажання створити корону, яка символізувала б пишність, владу та престиж нашого [ROOT.GetCountry.GetFlavorRank]. Нова імперська корона стала б уособленням величі [ROOT.GetCountry.GetName] та її суверена, слугуючи як свідченням нашого божественного права, так і відображенням нашого неперевершеного статусу в [ShowContinentName('europe')]."
  flavor_hab.62.a: "Не шкодувати витрат!"
  flavor_hab.62.b: "Зараз не час для такої марнославства."
  flavor_hab.62.historical_info: "Імперська корона Австрії була спочатку виготовлена для імператора Рудольфа II у 1602 році. Корона поєднує мистецтво Відродження з традиційними символами імперської влади, маючи митру, що відображає божественну владу імператора Священної Римської імперії. Хоча спочатку вона була особистою короною Рудольфа, пізніше вона стала офіційною короною Австрійської імперії у 1804 році за імператора Франца II після розпуску Священної Римської імперії."
  flavor_hab.64.title: "Інституціоналізація [ShowAdvanceNameWithNoTooltip('geheimrat')]"
  flavor_hab.64.desc: "Хоча наше нещодавнє заснування [ShowAdvanceName('geheimrat')] було широко відзначене, деякі при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] задаються питанням, чи достатньо цього неформального заснування. Вони стверджують, що, можливо, його слід інституціоналізувати як невід'ємну частину політики [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], забезпечуючи, щоб лише найдовіреніші та найздібніші особи впливали на справи [ROOT.GetCountry.GetFlavorRank]."
  flavor_hab.64.a: "Інституціоналізувати це!"
  flavor_hab.64.a.tt: "Розблоковує події про важливих особистостей, які були членами [ShowGovernmentReformName('hab_geheimer_rat')]."
  flavor_hab.64.b: "Його нинішня форма добре служить своїй меті."
  flavor_hab.65.title: "Апостол Штирії"
  flavor_hab.65.desc: "Поточні зусилля з рекатолізації на наших землях отримали величезний поштовх завдяки невтомній відданості [target_character.GetName], [ShowReligionAdjective('catholic')] єпископа Секкау. Відомий як Апостол Штирії, [target_character.GetLastNameWithNoTooltip] очолював військові комісії для вигнання [ShowReligionAdjective('lutheran')] проповідників, спалення єретичних текстів та примусу до присяги на вірність [ShowReligionAdjectiveWithNoTooltip('catholic')] вірі."
  flavor_hab.65.a: "Надати [target_character.GetLastNameWithNoTooltip] повну підтримку."
  flavor_hab.65.b: "Дії [target_character.GetLastNameWithNoTooltip] можуть викликати заворушення."
  flavor_hab.66.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.66.desc: "[target_character.GetName] став одним з найздібніших і найвідданіших радників нашого [ROOT.GetCountry.GetFlavorRank]. Видатний член [ShowGovernmentReformName('hab_geheimer_rat')], [target_character.GetLastNameWithNoTooltip] відомий [target_character.GetHerHis] адміністративною експертизою, дипломатичною витонченістю та непохитною вірністю [ROOT.GetCountry.GetName]. [target_character.GetHerHis|U] гострий розум та величезний досвід виявилися безцінними в управлінні нашими державними справами, а [target_character.GetHerHis] вплив серед знаті робить [target_character.GetHerHim] незамінною фігурою при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.66.a: "Відсвяткувати [target_character.GetHerHis] успішну кар'єру!"
  flavor_hab.66.historical_info: "Гундер був важливою фігурою в австрійській адміністрації за правління Матвія, Фердинанда I та Фердинанда II. Як член Geheimer Rat та вправний адміністратор, він відіграв ключову роль у консолідації влади Габсбургів під час Тридцятилітньої війни та в поточних зусиллях Контрреформації."
  flavor_hab.67.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.67.desc: "[target_character.GetName] відзначився як проникливий адміністратор і довірений слуга нашої династії. Як член [ShowGovernmentReformName('hab_geheimer_rat')], [target_character.GetHerHis] зусилля зі зміцнення правління [ROOT.GetCountry.GetGovernment.GetRulerTitle] принесли йому як повагу, так і страх. [target_ruler.GetName] розглядає можливість надання [target_character.GetLastNameWithNoTooltip] підвищеної консультативної ролі, щоб використати [target_character.GetHerHis] неперевершену експертизу в державному управлінні."
  flavor_hab.67.a: "Надати [target_character.GetHerHim] підвищену посаду."
  flavor_hab.67.historical_info: "Карл I Ліхтенштейнський був ключовою фігурою в зусиллях Габсбурзької монархії відновити контроль під час Тридцятилітньої війни. Він став вірним прихильником імператора Фердинанда II, допомагаючи в придушенні станів під час Празького кривавого суду та наглядаючи за перерозподілом конфіскованих земель повстанців. Призначений губернатором і віце-королем Богемії, він відіграв вирішальну роль у відновленні порядку після битви на Білій Горі."
  flavor_hab.68.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.68.desc: "[target_character.GetName] піднявся по службових сходах [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], перетворившись з молодого шляхтича на досвідченого командира та довіреного союзника [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та члена [ShowGovernmentReformName('hab_geheimer_rat')]. Відомий [target_character.GetHerHis] лідерством на полі бою та [target_character.GetHerHis] непохитною вірністю, [target_character.GetSheHe] забезпечив захист [ROOT.GetCountry.GetFlavorRank], а також здобув захоплення як солдатів, так і [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_hab.68.a: "[target_character.GetSheHe|U] добре поведе наші армії!"
  flavor_hab.68.historical_info: "Максиміліан фон Ліхтенштейн був важливим генералом у військовій та політичній сфері Габсбургів під час бурхливих перших років Тридцятилітньої війни. Від захисту Кремса до командування військами в битві на Білій Горі, його внесок у перемоги Габсбургів був величезним."
  flavor_hab.69.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.69.desc: "[target_character.GetName] є одним з найздібніших державних діячів у [ROOT.GetCountry.GetFlavorRank] та видатною фігурою нашого [ShowAdvanceName('geheimrat')]. Людина глибокого інтелекту та стратегічного бачення, [target_character.GetSheHe] служив [ROOT.GetCountry.GetGovernment.GetCourtTitle] з відзнакою, долаючи складнощі дипломатії та управління з неперевершеною витонченістю. Відомий [target_character.GetHerHis] гострим розумом та здатністю укладати делікатні угоди, [target_character.GetHerHis] зростаюча репутація зробила його незамінним для [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_hab.69.a: "Нам пощастило мати [target_character.GetHerHim]!"
  flavor_hab.69.historical_info: "Максиміліан Фрайгер фон унд цу Трауттмансдорф був впливовим австрійським державним діячем і дипломатом під час Тридцятилітньої війни та одним з ключових архітекторів Вестфальського миру. Як голова імперської делегації на переговорах щодо Вестфальського миру, він невтомно працював над забезпеченням вигідних умов для Габсбурзької монархії. Після коронації Фердинанда III у 1637 році він став другою найвпливовішою особою в усьому королівстві."
  flavor_hab.70.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.70.desc: "[target_character.GetName] відомий як майстер дипломатії з непохитною відданістю Контрреформації. [target_character.GetSheHe|U] довгий час був стабілізуючою силою в мінливому політичному та релігійному ландшафті [ROOT.GetCountry.GetFlavorRank]. Завдяки [target_character.GetHerHis] широким зв'язкам як з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], так і з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], порада Дітріхштейна може виявитися безцінною в управлінні внутрішніми справами, зміцненні віри та забезпеченні лояльності ключових шляхетних родин."
  flavor_hab.70.a: "[target_character.GetHerHis|U] служба дуже цінується."
  flavor_hab.70.historical_info: "Франц фон Дітріхштейн був австрійським кардиналом і державним діячем, який служив близьким радником правителів Габсбургів під час Контрреформації. Як єпископ Ольмюца та імперський дипломат, він був ключовою фігурою у впровадженні Контрреформації та зміцненні влади Габсбургів у Богемії."
  flavor_hab.71.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.71.desc: "[target_character.GetName] — відомий дипломат, державний діяч і член [ShowGovernmentReformName('hab_geheimer_rat')]. Відомий [target_character.GetHerHis] досвідом у дипломатії та державному управлінні, [target_character.GetSheHe] приносить багатий досвід, що значно приносить користь нашій нації. Можливо, переведення [target_character.GetHerHim] зі служби [ROOT.GetCountry.GetGovernment.GetRulerTitle] на посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle] може бути ще більш вигідним."
  flavor_hab.71.a: "Ми знайдемо посаду для [target_character.GetHerHim] при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.71.historical_info: "Герхард фон Квестенберг був ключовою фігурою під час Тридцятилітньої війни, слугуючи імперським дипломатом і державним діячем. Народившись у видатній родині, він став таємним радником імператора Фердинанда II і відіграв вирішальну роль у ключових подіях, таких як Регенсбурзький виборчий сейм 1630 року."
  flavor_hab.72.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.72.desc: "[target_character.GetName], який раніше служив у [ShowGovernmentReformName('hab_geheimer_rat')], запропонував [target_character.GetHerHis] послуги нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] великий досвід як дипломата та державного службовця, разом з [target_character.GetHerHis] тісними стосунками з [ROOT.GetCountry.GetGovernment.GetRulerTitle] роблять [target_character.GetHerHim] цінним активом."
  flavor_hab.72.a: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] добре використає [target_character.GetHerHim]."
  flavor_hab.72.historical_info: "Йоганн Баптист Верда був видатним дипломатом і довіреною особою імператора Фердинанда II, слугуючи першим придворним канцлером Верхньої, Внутрішньої та Нижньої Австрії. Відомий своєю роллю у значних переговорах та участю в інтригах Тридцятилітньої війни, Верда був ключовою фігурою у формуванні політичного ландшафту Імперії."
  flavor_hab.73.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.73.desc: "[target_character.GetName], видатний шляхтич з [ShowCultureName('hungarian')] частини нашого [ROOT.GetCountry.GetFlavorRank], запропонував [target_character.GetHerHis] послуги нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Відомий [target_character.GetHerHis] непохитною підтримкою католицизму та [target_character.GetHerHis] відданістю нашій справі, досвід [target_character.GetLastNameWithNoTooltip] у політиці та військових справах робить [target_character.GetHerHim] цінним активом."
  flavor_hab.73.a: "Призначити [target_character.GetHerHim] радником."
  flavor_hab.73.b: "Звернутися за [target_character.GetHerHis] військовим керівництвом."
  flavor_hab.73.historical_info: "Ніколаус Естергазі був угорським шляхтичем і державним діячем, який заснував впливовий дім Естергазі. Колишній протестант, який навернувся до католицизму, він здобув популярність завдяки своїй підтримці Габсбургів. Він відіграв ключову роль у протистоянні османській експансії та зміцненні влади Габсбургів в Угорщині, за що отримав титули графа Березького та палатина Угорщини."
  flavor_hab.74.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.74.desc: "Вельможа великого становища в [ROOT.GetCountry.GetFlavorRank], [target_character.GetName] є постаттю, яку водночас і шанують, і бояться. Маючи минуле, позначене [target_character.GetHerHis] вірністю [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], [target_character.GetSheHe] тепер прагне ще більше зміцнити [target_character.GetHerHis] позицію. Багато хто пропонує винагородити [target_character.GetHerHis] вірність посадою при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.74.a: "Нехай [target_character.GetHerHim] веде нас."
  flavor_hab.74.historical_info: "Сальвата був вірним прихильником Габсбургів, обіймаючи різні ключові посади, включаючи губернатора Богемії та участь в Імперській армії. Він найбільш відомий тим, що пережив знамениту Празьку дефенестрацію 1618 року, коли його викинула з вікна протестантська юрба."
  flavor_hab.75.title: "[ShowGovernmentReformNameWithNoTooltip('hab_geheimer_rat')] стає неефективним"
  flavor_hab.75.desc: "Багато хто скаржиться, що [ShowGovernmentReformName('hab_geheimer_rat')], колись потужна установа, стає все більш неефективною. Величезна кількість людей, залучених до її роботи, призвела до роздутої та млявої бюрократії. Неефективність перешкоджає важливим рішенням, і система задихається під власною вагою. Деякі кажуть, що [ShowGovernmentReformNameWithNoTooltip('hab_geheimer_rat')] віджив своє, тоді як інші вважають, що його можна реформувати та оптимізувати, щоб краще служити потребам Імперії."
  flavor_hab.75.a: "Присвятити ресурси його реформі."
  flavor_hab.75.b: "Скасувати його."
  flavor_hab.76.title: "Тріумфальне святкування"
  flavor_hab.76.desc: "Наша нещодавня перемога над силами $protestant_union$ стала рішучим і вкрай необхідним тріумфом у цьому довгому та виснажливому конфлікті. [target_ruler.GetName] оголосив, що настав час відзначити цю знаменну подію в історії, спорудивши грандіозний пам'ятник на честь нашого успіху. Ідея полягає в тому, щоб побудувати статую, присвячену Діві Марії. [ShowWorkOfArtName('marian_column')] символізуватиме божественний захист і силу наших військ перед лицем негараздів."
  flavor_hab.76.a: "Спорудити пам'ятник."
  flavor_hab.76.b: "Зосередитися на інших пріоритетах."
  flavor_hab.76.historical_info: "Маріанська колона у Вернштайні-на-Інні — це статуя, присвячена Діві Марії, створена на знак подяки за захист Відня під час його оборони від шведських військ у 1645 році. Імператор Фердинанд III замовив статую на честь тріумфу. Пізніше була виготовлена бронзова копія та розміщена у Відні для подальшого вшанування перемоги."
  flavor_hab.77.title: "Спокусливий талант [target_character.GetNameWithNoTooltip]"
  flavor_hab.77.desc: "[target_character.GetName], відомий композитор та оперний співак, здобув широку славу по всій [ShowRegionName('italy_region')] завдяки [target_character.GetHerHis] надзвичайному музичному таланту та захопливим оперним виступам. [target_character.GetHerHis|U] твори зачарували публіку далеко за межами, принісши [target_character.GetHerHim] місце серед найвідоміших митців того часу. [target_ruler.GetName], відданий шанувальник [target_character.GetHerHis] опер, висунув ідею запросити Честі приєднатися до нашого двору."
  flavor_hab.77.a: "Підтримати цю пропозицію."
  flavor_hab.77.b: "Ми не можемо дозволити собі таку розкіш."
  flavor_hab.78.title: "Позбавлення влади Тирольського парламенту"
  flavor_hab.78.desc: "Місцевий парламент у [ShowAreaName('tirol_area')] довго служив регіональним керівним органом, представляючи стани землі та захищаючи місцеві привілеї. Однак останніми роками він все більше ставав перешкодою для наших зусиль щодо централізації та реформ. Багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджує, що його вплив підриває авторитет [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], припускаючи, що настав час позбавити цю установу влади та передати її функції під більш прямий контроль."
  flavor_hab.78.a: "Негайно позбавити його влади!"
  flavor_hab.78.a.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('tirol_area')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hab.78.b: "Нехай парламент продовжує свою роботу."
  flavor_hab.78.b.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('tirol_area')] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hab.79.title: "Кування Пуммерін"
  flavor_hab.79.desc: "Після нашого тріумфального зняття [GetCountry('TUR').GetAdjective] облоги багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] запропонували грандіозний жест, щоб увічнити нашу перемогу. Маючи незліченну кількість захоплених [GetCountry('TUR').GetAdjectiveWithNoTooltip] гармат, деякі пропонують переплавити їх, щоб викувати масивний церковний дзвін для [ShowWorkOfArtName('st_stephens_cathedral')]."
  flavor_hab.79.a: "Викуймо цей дзвін перемоги!"
  flavor_hab.79.b: "Наші ресурси краще витратити деінде."
  flavor_hab.79.historical_info: "Пуммерін, великий дзвін собору Святого Стефана, був відлитий у 1705 році з османських гармат, захоплених під час другої облоги Відня у 1683 році. З його вишуканими бароковими прикрасами, дзвін був приголомшливим витвором художньої майстерності. Однак, хоча візуально він був чудовим, якість його звуку вважалася менш успішною, що приписувалося його величезному розміру та вазі."
  flavor_hab.80.title: "Щастя і кінець короля Оттокара"
  flavor_hab.80.desc: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] завжди прагнув прославляти мистецтво, і нещодавня трагедія #italic Щастя і кінець короля Оттокара#!, написана талановитим [target_character.GetName], була визнана шедевром. П'єса, що розповідає про зліт і падіння [otakar.GetName], поєднує драму та історію таким чином, що захопила аудиторію та принесла оновлений престиж [ROOT.GetCountry.GetFlavorRank]. Майстерність [target_character.GetLastNameWithNoTooltip] у створенні такої пронизливої розповіді змусила багатьох запропонувати [target_character.GetHerHim] посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.80.a: "Запропонувати [target_character.GetLastNameWithNoTooltip] місце при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.80.b: "Нехай [target_character.GetHerHim] процвітає самостійно."
  flavor_hab.81.title: "Королівство Галичини та Лодомерії"
  flavor_hab.81.desc: "Наше придбання великих польських територій принесло нові виклики в адміністрування цих земель. Багато наших чиновників висловили занепокоєння щодо підтримки контролю та стабільності в регіоні. Щоб вирішити це питання, було запропоновано створити нову коронну землю та надати їй обмежену автономію та повноваження для управління від нашого імені."
  flavor_hab.81.a: "Заснувати Королівство Галичини та Лодомерії."
  flavor_hab.81.a.tt: "Ми заснуємо $GLD$ як [ShowSubjectTypeName('vassal')] на всій території [ShowAreaName('lesser_poland_area')] та [ShowAreaName('red_ruthenia_area')]"
  flavor_hab.81.b: "Територія залишиться під нашим прямим правлінням."
  flavor_hab.81.b.tt: "Ми отримаємо [ShowNamedValue('control_severe_bonus')|+=2%] контролю над усіма належними локаціями в [ShowAreaName('lesser_poland_area')] та [ShowAreaName('red_ruthenia_area')]"
  flavor_hab.81.historical_info: "Королівство Галичини та Лодомерії було засноване в 1772 році після Першого поділу Польщі. В рамках поділу польської території між Австрією, Пруссією та Росією, Габсбурзька монархія отримала значну частину південно-східної Польщі, де й було створено цей автономний регіон."
  flavor_hab.82.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.82.desc: "[target_character.GetName] викликає фурор своїми інноваціями в управлінні та розвідці. Відомий [target_character.GetHerHis] адміністративною кмітливістю та неперевершеними навичками в дипломатії, [target_character.GetLastNameWithNoTooltip] має плани революціонізувати державний нагляд та управління внутрішніми справами. Багато хто вважає, що [target_character.GetHerHis] таланти можуть значно підвищити ефективність нашої адміністрації та зміцнити безпеку держави. [target_ruler.GetName], вражений ідеями [target_character.GetLastNameWithNoTooltip], висунув пропозицію запросити [target_character.GetHerHim] приєднатися до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] як радника."
  flavor_hab.82.a: "Запросити [target_character.GetHerHim] до [ROOT.GetCountry.GetGovernment.GetCourtTitle] та просувати [target_character.GetHerHis] реформи!"
  flavor_hab.82.b: "Немає потреби в реформі."
  flavor_hab.83.title: "Пам'ятник Тріумфу"
  flavor_hab.83.desc: "На честь нещодавнього королівського шлюбу було запропоновано збудувати грандіозну тріумфальну арку в місті [ShowLocationName('innsbruck')]. Тріумфальна арка символізуватиме об'єднання домів та святкуватиме цю радісну подію, що зміцнює силу нашої династії. Збудована з міцного каменю, а не з ефемерного дерева, ця тріумфальна арка проіснує крізь віки як свідчення нашої єдності."
  flavor_hab.83.a: "Збудуймо цю тріумфальну арку на честь цієї події."
  flavor_hab.83.b: "Ми повинні зосередитися на практичних інвестиціях замість грандіозних жестів."
  flavor_hab.83.historical_info: "Тріумфальна арка в Інсбруку була збудована в 1765 році на честь шлюбу ерцгерцога Леопольда, сина імператриці Марії Терезії, з іспанською принцесою Марією Луїзою. Трагічно, батько Леопольда, імператор Франц I, помер незабаром після весілля, і арка стала подвійним символом як святкування, так і жалоби."
  flavor_hab.84.title: "Повстання [target_character.GetLastNameWithNoTooltip]"
  flavor_hab.84.desc: "Невдоволення спалахнуло в [ShowAreaName('slovakia_area')], оскільки [target_character.GetName], могутній шляхтич, очолює збройне повстання проти нашого правління. [target_character.GetHerHis|U] вимоги щодо більших релігійних свобод та автономії знаходять відгук у багатьох, хто обурюється нашою централізаційною політикою та придушенням протестантизму в регіоні. Повідомлення свідчать, що [target_character.GetLastNameWithNoTooltip] об'єднався з [GetCountry('TUR').GetName], що робить це повстання серйозною загрозою імперській владі."
  flavor_hab.84.a: "Ніхто не посміє кинути виклик нашому правлінню!"
  bocskai_uprising: "Повстання Бочкаї"
  flavor_hab.84.a.tt: "Усі [ShowPopTypeName('nobles')] та протестантські [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [bocskai_uprising_scope.GetName]"
  flavor_hab.84.b: "Ми повинні поступитися їхнім вимогам."
  flavor_hab.84.b.tt: "Ми втратимо [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над усіма [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')]"
  flavor_hab.84.historical_info: "Повстання Бочкаї було значним заколотом проти Габсбурзького правління в Угорщині, спричиненим невдоволенням централізацією та переслідуванням протестантів. Іштван Бочкаї, за підтримки Османських та Трансільванських сил, досяг військових успіхів, що змусило імператора Рудольфа II вести переговори та поступитися деяким вимогам повстанців."
  flavor_hab.85.title: "Повстання [target_character.GetLastNameWithNoTooltip]"
  flavor_hab.85.desc: "Попри наші попередні зусилля щодо збереження миру в Угорщині, невдоволення продовжує тліти. [target_character.GetName], амбітний і харизматичний шляхтич, натхненний попереднім повстанням [bocskai.GetName], підняв відкритий заколот, згуртувавши [ShowCultureName('hungarian')] протестантів та незадоволених [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] проти нашого правління."
  flavor_hab.85.a: "Придушити повстання."
  flavor_hab.85.a.tt: "Усі [ShowPopTypeName('nobles')] та протестантські [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [bethlen_uprising_scope.GetName]"
  bethlen_uprising: "Повстання Бетлена"
  flavor_hab.85.b: "Домовитися про мирне врегулювання."
  flavor_hab.85.historical_info: "Бетлен протистояв Габсбурзьким спробам нав'язати католицизм в Угорщині. Його було обрано королем Угорщини, а його війська захопили значні території та навіть загрожували Відню. Конфлікт зрештою призвів до Нікольсбурзького миру 1621 року, який надав релігійні свободи та політичні поступки угорській знаті в обмін на відмову Бетлена від претензій на угорську корону."
  flavor_hab.86.title: "Війна за незалежність [target_character.GetLastNameWithNoTooltip]"
  flavor_hab.86.desc: "До нас дійшли повідомлення, що в наших [ShowCultureName('hungarian')] провінціях знову назріває повстання. Підживлені скаргами на високі податки, примусову працю та іноземне панування, повстанці оголосили про свою боротьбу за [ShowCultureNameWithNoTooltip('hungarian')] незалежність. [target_character.GetName] заручився підтримкою незадоволених шляхтичів, селян, і поширюються чутки, що він навіть отримує підтримку наших політичних суперників. Повідомлення свідчать, що його сили захоплюють фортеці та збирають великі армії по всій [ShowAreaName('slovakia_area')]."
  flavor_hab.86.a: "Придушити повстання силою."
  flavor_hab.86.a.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [rakoczi_uprising_scope.GetName]"
  rakoczi_uprising: "Війна за незалежність Ракоці"
  flavor_hab.85.b.tt: "Ми втратимо [ShowNamedValue('control_ultimate_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над усіма [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')]"
  flavor_hab.86.b: "Запропонувати їм компроміс."
  flavor_hab.86.historical_info: "Війна за незалежність Ракоці була великим повстанням, очолюваним Ференцом II Ракоці проти Габсбурзького правління в Угорщині. Спровокований невдоволенням жорсткою політикою імператора Леопольда I та постійними соціальними й економічними труднощами, заколот здобув широку підтримку серед угорської знаті та селян. Попри початкові успіхи, повстання зрештою зазнало невдачі."
  flavor_hab.88.title: "Релігійна місія [target_character.GetLastNameWithNoTooltip]"
  flavor_hab.88.desc: "Ширяться чутки про зростаючий вплив [target_character.GetName], [ShowCultureName('slovene')] священика, що став протестантським реформатором, чиї вчення та праці швидко набирають популярності серед [ShowCultureNameWithNoTooltip('slovene')] населення. Однак, зусилля [target_character.GetHerHis] є прямим викликом авторитету [GetUniqueInternationalOrganization('catholic_church').GetName] та загрозою єдності нашої віри. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], стривожені зростаючою популярністю [target_character.GetHerHis], закликають [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] впровадити суворі контрреформаційні заходи для придушення цієї єресі."
  flavor_hab.88.a: "Негайно зупинити цю єресь!"
  flavor_hab.88.a.tt: "#Y 10%#! усіх [ShowCultureName('slovene')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovenia_area')] приймають [ShowReligionName('lutheran')]"
  flavor_hab.88.b: "Терпіти [target_character.GetHerHis] вчення."
  flavor_hab.88.b.tt: "#Y 30%#! усіх [ShowCultureName('slovene')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('slovenia_area')] приймають [ShowReligionName('lutheran')]"
  flavor_hab.88.historical_info: "Примож Трубар був словенським протестантським реформатором і теологом, найвідомішим завдяки написанню та публікації перших книг словенською мовою, включаючи словенський переклад Нового Завіту. Його праця заклала основу словенської літературної мови та поширила протестантські ідеали серед словенців."
  flavor_hab.90.title: "[target_character.GetLastNameWithNoTooltip] публікує Regesta Imperii"
  flavor_hab.90.desc: "[target_character.GetName], старанний міський бібліотекар [ShowLocationName('frankfurt')], завершив монументальний проєкт: #italic Regesta Imperii#!. Ця праця є упорядкованим переліком документальних та історіографічних джерел імператорів Священної Римської імперії та пап, і вона пропонує безцінний інструмент для розуміння історії [GetUniqueInternationalOrganization('hre').GetName]."
  flavor_hab.90.a: "Запросити [target_character.GetHerHim] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.90.b: "Уся Імперія повинна скористатися [target_character.GetHerHis] працею."
  flavor_hab.90.historical_info: "Проєкт #italic Regesta Imperii#! був започаткований у 1829 році Йоганном Фрідріхом Бьомером, чиєю початковою метою було скласти попередні регести для #italic Monumenta Germaniae Historica#!. З часом він став незалежним починанням, каталогізуючи та організовуючи документи та історіографічні джерела імператорів Священної Римської імперії від Каролінгів до Максиміліана I."
  flavor_hab.91.title: "Епоха Бідермаєру"
  flavor_hab.91.desc: "Зі зростанням добробуту та впливу середнього класу в нашому суспільстві відбувається помітна культурна трансформація. Оцінка мистецтва, музики, літератури та дизайну інтер'єру більше не обмежується [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], а стає життєво важливою частиною життя середнього класу. Це значний культурний зсув у бік особистої витонченості та домашнього затишку, оскільки нова буржуазія приймає красу та творчість у своєму повсякденному оточенні."
  flavor_hab.91.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.91.historical_info: "Епоха Бідермаєру, що тривала приблизно з 1815 по 1848 рік, виникла в Центральній Європі в період політичного консерватизму після Віденського конгресу. Це був час, коли зростаючий середній клас почав зосереджуватися на домашньому житті, з акцентом на комфорт, простоту та практичність."
  flavor_hab.92.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.92.desc: "[target_character.GetName] зачаровує публіку по всій [ShowContinentName('europe')] своєю жвавою танцювальною музикою та майстерністю віденського вальсу. [target_character.GetHerHis|U] творчість піднесла цей колись популярний народний танець до символу витонченої культурної вишуканості. Представники [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували запросити [target_character.GetLastNameWithNoTooltip] служити офіційним композитором та диригентом при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], де [target_character.GetHerHis] композиції могли б додати престижу нашим світським подіям та культурному статусу."
  flavor_hab.92.a: "Запросити [target_character.GetHerHim] до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.92.b: "[target_character.GetHerHis|U] музика належить народу."
  flavor_hab.92.historical_info: "Йоганн Баптист Штраус I був австрійським композитором, відомим популяризацією віденського вальсу, перетворивши його на культурну візитівку Австрії 19 століття. Його найвідоміша композиція, Марш Радецького, оспівувала австрійські військові перемоги та була символом імперської гордості."
  flavor_hab.93.title: "[ShowAdvanceNameWithNoTooltip('imperial_artillery')]"
  flavor_hab.93.desc: "Зміни в обличчі війни вимагають модернізації, і жоден рід військ не виявився більш вирішальним, ніж артилерія. Визнаючи це, [target_character.GetName] ініціював масштабні реформи, щоб перетворити [ROOT.GetCountry.GetAdjective] артилерію на гордість наших армій. Завдяки його далекоглядному керівництву, впроваджуються нові артилерійські установки та професійні артилеристи з метою забезпечення панування на полі бою. Вони сформують нову [ShowAdvanceName('imperial_artillery')]."
  flavor_hab.93.a: "Ніхто не зрівняється з нашою силою!"
  flavor_hab.93.historical_info: "Йозеф Венцель фон Ліхтенштейн був австрійським фельдмаршалом, якого вшановують як батька австрійської артилерії. Заклавши основи її модернізації та професіоналізації, його далекоглядні реформи перетворили артилерію на вирішальний елемент австрійської армії, забезпечивши їй місце одного з найшанованіших родів військ Європи протягом 19 століття."
  flavor_hab.94.title: "[ShowAdvanceNameWithNoTooltip('multicultural_empire')]"
  flavor_hab.94.desc: "[ROOT.GetCountry.GetName] — це клаптикова ковдра різноманітних культур, релігій та мов, що простягається через величезні та різноманітні землі. Хоча це багате розмаїття було джерелом сили, воно також створює виклики для нашого правління. Щоб забезпечити тривалий мир та стабільність, ми прийняли ідентичність [ShowAdvanceName('multicultural_empire')], надавши нашим меншинам більшу автономію та сприяючи єдності через інклюзивність."
  flavor_hab.94.a: "Indivisibiliter ac Inseparabiliter!"
  flavor_hab.94.historical_info: "Австрійська імперія була однією з найбільш етнічно різноманітних держав у Європі, що охоплювала німців, угорців, чехів, словаків, поляків, русинів, румунів, хорватів, сербів, словенців та італійців, серед інших."
  flavor_hab.95.title: "[ShowAdvanceNameWithNoTooltip('wiener_klassik')]"
  flavor_hab.95.desc: "[ShowLocationName('vienna')] стало серцем європейської музики, куди композитори та виконавці стікаються до нашої столиці, щоб створювати твори позачасової краси. Нова ера музики, відома як [ShowAdvanceName('wiener_klassik')], процвітає на наших землях. Це культурне цвітіння підносить престиж нашого [ROOT.GetCountry.GetFlavorRank], а також надихає душу нашої нації."
  flavor_hab.95.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.95.historical_info: "Віденський класицизм виник наприкінці XVIII століття як ознака австрійського культурного впливу. Ця музична епоха наголошувала на ясності, балансі та емоційній глибині, знаменуючи відхід від складності музики бароко. Відень став центром цього руху, приваблюючи деяких з найвідоміших композиторів історії, включаючи Йозефа Гайдна, Вольфганга Амадея Моцарта, Людвіга ван Бетховена та Франца Шуберта."
  flavor_hab.96.title: "Прагматична санкція"
  flavor_hab.96.desc: "Стабільність нашого [ROOT.GetCountry.GetFlavorRank] та спадщина династії [target_ruler.GetDynasty.GetName] завжди залежали від плавного та безперечного успадкування. Щоб забезпечити це, ми успішно домовилися про Прагматичну санкцію, знакову угоду, яка дозволяє жіночим спадкоємцям сходити на трон за відсутності чоловічого наступника. Завдяки цьому едикту [target_heir.GetName] зможе успадкувати [target_ruler.GetName] без будь-яких суперечок."
  flavor_hab.96.a: "Все заради майбутнього нашої династії."
  flavor_hab.96.historical_info: "Прагматична санкція 1713 року була конституційним едиктом, виданим імператором Карлом VI для забезпечення безперервності династії Габсбургів. Зіткнувшись з відсутністю спадкоємця чоловічої статі, Карл VI прагнув забезпечити право своєї дочки, Марії Терезії, успадкувати всі габсбурзькі землі. Прагматична санкція проголошувала, що габсбурзькі спадкові землі є неподільними і дозволяла жіноче успадкування, якщо не було спадкоємців чоловічої статі."
  flavor_hab.97.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.97.desc: "Чарівні мелодії [target_character.GetName] полонили серця всіх, хто чув [target_character.GetHerHim]. Прославлена [ROOT.GetCountry.GetAdjective] співачка, композиторка та піаністка, [target_character.GetLastNameWithNoTooltip] захоплює весь [ROOT.GetCountry.GetFlavorRank] своїм видатним талантом та здатністю вдихнути життя в будь-яку композицію. До [ROOT.GetCountry.GetGovernment.GetCourtTitle] дійшли чутки, що [target_character.GetSheHe] може бути доступна для служби як музикант [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.97.a: "Ми повинні найняти [target_character.GetHerHim]."
  flavor_hab.97.b: "Жінкам не місце при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.98.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.98.desc: "[target_character.GetName], один з найвідоміших композиторів та диригентів у [ShowContinentName('europe')], здобув славу завдяки своїм майстерним операм та оркестровим творам. Шанований вчитель та наставник, серед його учнів є одні з найвидатніших імен у музиці. Останнім часом наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] зацікавився найняттям [target_character.GetHerHim] як музиканта [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.98.a: "Найняти [target_character.GetHerHim]."
  flavor_hab.98.b: "Нам не потрібна така екстравагантність."
  flavor_hab.98.historical_info: "Антоніо Сальєрі був італійським композитором, який більшу частину своєї кар'єри провів у Відні, служачи придворним композитором та капельмейстером Габсбурзької монархії. Плідний митець, Сальєрі писав опери, духовну музику та оркестрові твори. За життя він здобув широке визнання."
  flavor_hab.99.title: "Проголошення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Імперії"
  flavor_hab.99.desc: "Падіння Священної Римської імперії залишило значну порожнечу в Центральній [ShowContinentName('europe')], і разом з нею закінчився багатовіковий зв'язок між нашою династією та імперською короною. Однак, замість того, щоб зациклюватися на втраченому, деякі радники стверджують, що ми повинні звернути увагу на силу та різноманітність наших власних володінь. Вони пропонують проголосити [ROOT.GetCountry.GetAdjective] Імперію та сигналізувати світові, що наша монархія залишається маяком стабільності, сили та безперервності."
  flavor_hab.99.a: "Проголосити [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Імперію!"
  flavor_hab.99.b: "Ми не повинні провокувати наших суперників."
  flavor_hab.99.historical_info: "Австрійська імперія була офіційно проголошена в 1804 році імператором Францом II. Зіткнувшись зі зростаючим впливом Наполеона в Європі, Франц прагнув консолідувати владу своєї родини та підкреслити суверенітет Габсбурзької монархії."
  flavor_hab.100.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.100.desc: "Пишність наших міст і палаців красномовно свідчить про могутність і витонченість нашого [ROOT.GetCountry.GetFlavorRank], і мало хто з архітекторів може зрівнятися з [target_character.GetName] у їхній здатності втілити таку велич у життя. Відомий своїм майстерним володінням стилем бароко, [target_character.GetLastNameWithNoTooltip] створив одні з найвеличніших споруд у всьому [ROOT.GetCountry.GetName], поєднуючи елегантність з практичністю. Багато хто в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] пропонує призначити [target_character.GetHerHim] головним архітектором нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_hab.100.a: "Призначити [target_character.GetHerHim] [ROOT.GetCountry.GetAdjectiveWithNoTooltip] архітектором."
  flavor_hab.100.b: "[target_character.GetHerHis|U] служба надто дорога."
  flavor_hab.100.historical_info: "Йоганн Лукас фон Гільдебрандт був одним із найвидатніших архітекторів австрійського бароко. Серед його робіт — чудовий палац Бельведер у Відні, побудований для принца Євгена Савойського, та палац Шенборн у Геллерсдорфі."
  flavor_hab.101.title: "[ShowBuildingTypeNameWithNoTooltip('belvedere_palace')]"
  flavor_hab.101.desc: "[target_character.GetName], завжди провидець, виступив з амбітним планом ще більше піднести престиж [ShowLocationName('vienna')]. [target_character.GetSheHe|U] пропонує будівництво грандіозного [ShowBuildingTypeName('belvedere_palace')], що перевершить усі очікування та стане найвищим символом могутності та величі нашого [ROOT.GetCountry.GetFlavorRank]. Також було запропоновано, що палац може слугувати культурним центром, де розміщуватимуться величні твори мистецтва [ROOT.GetCountry.GetFlavorRank]."
  flavor_hab.101.a: "Побудувати його!"
  flavor_hab.101.b: "Цей проєкт надто дорогий."
  flavor_hab.102.title: "Складання [ShowWorkOfArtNameWithNoTooltip('kaiserhymne')]"
  flavor_hab.102.desc: "У міру поширення націоналізму по всій [ShowContinentName('europe')], багато націй використовують силу музики для виховання національної гордості та єдності. Натхненний цим зростаючим рухом, наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонував ідею створення гімну, який прославляє нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] та наш могутній [ROOT.GetCountry.GetFlavorRank]. Талановитий композитор [target_character1.GetName] міг би написати музику, тоді як досвідчений письменник і композитор [target_character2.GetName] написав би слова."
  flavor_hab.102.a: "Ми замовимо його!"
  flavor_hab.102.b: "Це надмірні витрати, які ми не можемо собі дозволити."
  flavor_hab.103.title: "Регулювання Дунаю"
  flavor_hab.103.desc: "Дунай знову затопив [ShowLocationName('vienna')], спричинивши масштабні руйнування інфраструктури та домівок. Місцеве населення перебуває у скруті, і багато хто звернувся по допомогу до [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], щоб допомогти їм відновити те, що вони можуть. Хоча надання негайної допомоги є вкрай важливим, кілька впливових голосів при [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонують, що цю повторювану катастрофу можна було б запобігти, якби ми вжили більш постійних заходів для регулювання річки та її берегів. Деякі пропонують звернутися за допомогою до [target_character], який добре відомий [target_character.GetHerHis] інженерними роботами на Шварценському озері та Дунайських мостах. Можливо, [target_character.GetSheHe] зможе допомогти нам зупинити розлив річки."
  flavor_hab.103.a: "Найняти [target_character.GetLastNameWithNoTooltip] для будівництва греблі."
  flavor_hab.103.b: "Зосередитися на негайній допомозі."
  flavor_hab.103.c: "Річка завжди буде розливатися."
  flavor_hab.103.historical_info: "Історично Дунай був нерегульованою, кількакілометровою заболоченою місцевістю. Оскільки багато частин міста були схильні до затоплення, багато хто пропонував регулювати річку, створивши нове русло. Першу спробу зробив Йоганн Сигізмунд Губерт у 1771 році. Йому вдалося побудувати захисну дамбу висотою майже 6 метрів, але його дамбу кілька разів проривало. Лише у 19 столітті будь-який з цих проєктів успішно регулював річку та допоміг запобігти її затопленню міста."
  flavor_hab.1000.title: "Викувати Privilegium Maius"
  flavor_hab.1000.desc: "Як головний захисник [GetUniqueInternationalOrganization('hre').GetName] від південно-східних загроз, [ROOT.GetCountry.GetLongName] заслуговує на піднесення до найвищого становища в Імперії! [GetCharacter('ogk_friedrich_i_hohenstaufen').GetName] надав #italic Privilegium minus#! нашим попередникам, забезпечивши нашу незалежність від $BAV$ та надавши нам титул [ROOT.GetCountry.GetFlavorRank].\n\nТепер настав час чинити додатковий тиск на [target_emperor.GetName], щоб розширити ці привілеї, піднявши нас близько до статусу [ShowSpecialStatusName('elector')]. У нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] є вправні люди, яких можна було б найняти для створення нового документа, який міг би змусити [target_emperor.GetNameWithNoTooltip] визнати наше становище."
  flavor_hab.1000.a: "Скласти необхідні документи."
  flavor_hab.1000.b: "Також надіслати фінансово обґрунтовані аргументи $emperor$!"
  flavor_hab_emperor_response_generic: "Дипломатична делегація [target_ruler.GetDynasty.GetName] прибула до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]! Серед їхніх прохань — широке розширення їхніх привілеїв, засноване на справді обурливому документі, в істинність якого ми не можемо повірити! Вони стверджують, що територія, яка зараз є [origin_country.GetName], отримала привілеї від римських імператорів Юлія Цезаря та Нерона, і що [GetCharacter('ogk_heinrich_iv_salier').GetName] передав їх тодішньому Маркграфству [origin_country.GetNameWithNoTooltip] у 1058 році."
  flavor_hab.1001.title: "[target_ruler.GetDynasty.GetNameWithNoTooltip] вимагають розширених привілеїв"
  flavor_hab.1001.desc_petrarca: "$flavor_hab_emperor_response_generic$\n\nХоча ці документи звучать надумано та дивно, нам потрібен експерт, щоб детально їх вивчити. На щастя, [target_judge.GetName], відомий вчений, перебуває в дружніх стосунках з нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle] і міг би бути залучений до цього завдання."
  flavor_hab.1001.desc_default: "$flavor_hab_emperor_response_generic$\n\nАвтентичність цих документів може бути сумнівною, і ми повинні залучити наших найкращих вчених для їх детального вивчення."
  flavor_hab.1001.a: "Уважно вивчити це."
  flavor_hab.1001.a.tt: "Експертиза може виявити підробку."
  flavor_hab.1001.b: "Прийняти без експертизи."
  flavor_hab.1002.title: "Делегація [target_ruler.GetDynasty.GetNameWithNoTooltip] прибуває"
  flavor_hab.1002.desc: "$flavor_hab_emperor_response_generic$\n\nСеред їхньої делегації також є щедра пожертва до нашої скарбниці, що, безперечно, є чисто випадковою подією."
  flavor_hab.1002.a: "Як ми могли відмовитися від такої пропозиції?"
  flavor_hab.1002.b: "Невже вони справді думають, що можуть просто купити собі шлях до влади?"
  flavor_hab.1003.title: "Виявлення порушень у документах"
  forgery_desc_generic: "кілька серйозних занепокоєнь щодо документів, представлених нам делегацією [target_ruler.GetDynasty.GetName]. Здається, що привілеї, підписані [GetCharacter('ogk_heinrich_iv_salier').GetName], можуть ґрунтуватися на підробленому акті. Хоча [origin_country.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] представив вагомі докази деякими зі своїх документів, ця ситуація кидає тінь обману на їхнє прохання. Ми повинні обережно вирішувати цю ситуацію!"
  flavor_hab.1003.desc_petrarca: "[target_judge.GetName] виявив $forgery_desc_generic$"
  flavor_hab.1003.desc_default: "Наші радники виявили $forgery_desc_generic$"
  flavor_hab.1003.a: "Наші вчені існують не просто так."
  flavor_hab.1004.title: "Документи ідеальні"
  flavor_hab.1004.desc: "Навіть після ретельної експертизи акти, представлені делегацією [target_ruler.GetDynasty.GetName], виглядають бездоганно. На основі цих доказів ми не маємо іншого вибору, окрім як прийняти їхнє прохання та надати їм ці права."
  flavor_hab.1004.a: "Народився новий ерцгерцог для імперії!"
  flavor_hab.1005.title: "[target_emperor_country.GetNameWithNoTooltip] надає нам привілеї"
  flavor_hab.1005.desc: "Нашу підробку документів не виявив дурний [target_emperor.GetName], і [target_emperor.GetHeShe] тому надав нам [target_emperor.GetHerHis] повний дозвіл називати себе Ерцгерцогством [ROOT.GetCountry.GetName] відтепер, разом з усіма привілеями, про які ми просили."
  flavor_hab.1005.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.1006.title: "[target_emperor_country.GetNameWithNoTooltip] відхилив наш хабар"
  flavor_hab.1006.desc: "[target_emperor.GetName] виявився непідкупним і відхилив наш щедрий подарунок. Крім того, [target_emperor.GetSheHe] вирішив поставити під сумнів наші претензії та уважно вивчити наші документи."
  flavor_hab.1006.a: "Ми можемо лише чекати на [target_emperor.GetHerHis] вердикт."
  flavor_hab.1007.title: "Вердикт Privilegium Maius"
  flavor_hab.1007.desc: "Радники [target_emperor.GetName] завершили свою експертизу та висловили сумніви щодо автентичності наших претензій. Однак підробка виявилася достатньо хорошою, щоб її не можна було повністю відкинути. Хоча [target_emperor.GetNameWithNoTooltip] відмовив у [target_emperor.GetHerHis] повній згоді на наші законні привілеї, [target_emperor.GetHeShe] погодився на деякі з наших вимог."
  flavor_hab.1007.a: "Достатньо... наразі."
  flavor_hab.1008.title: "Privilegium Maius у наших руках"
  flavor_hab.1008.desc: "Тепер, коли нас обрано на посаду [GetUniqueInternationalOrganization('hre').GetLeaderTitle], ми нарешті можемо виправити серйозну помилку, допущену нашими попередниками як [GetUniqueInternationalOrganization('hre').GetLeaderTitle]. Як лідер [GetUniqueInternationalOrganization('hre').GetName], ми тепер можемо надати привілеї, на які заслуговує династія [target_ruler.GetDynasty.GetName]."
  flavor_hab.1008.a: "Час виправити цю несправедливість."
  flavor_hab.1009.title: "Нові правила дому"
  flavor_hab.1009.desc: "[target_ruler.GetName] прагне утвердити [target_ruler.GetHisHer] владу над зростаючими [ROOT.GetCountry.GetAdjective] володіннями як голова дому, однак [target_ruler.GetHisHer] брат [brother.GetName] чинить опір цій уявній перевазі, наголошуючи на необхідності єдності та справедливості в родині. Щоб уникнути потенційного конфлікту, стани пропонують розробити офіційну угоду — набір правил дому — для забезпечення спільного управління при збереженні стабільності."
  flavor_hab.1009.a: "Офіційно оформити правила дому."
  flavor_hab.1009.b: "Уникнути будь-яких офіційних угод."
  flavor_hab.1009.historical_info: "Рудольфінські правила дому, встановлені в 1364 році, мали на меті регулювати спільне управління габсбурзькими землями Рудольфом IV та його братами, Альбрехтом III і Леопольдом III. Надаючи всім чоловікам-Габсбургам рівні титули та обов'язки, вони також надавали найстаршому братові, Рудольфу IV, особливі привілеї у зовнішньому представництві та зборі податків. Правила створили делікатний баланс сил, який зрештою проіснував лише до поділу габсбурзьких земель за Нойберзьким договором у 1379 році."
  flavor_hab.1100.title: "Столиця [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_hab.1100.desc: "Зі смертю [target_old_ruler.GetName] ми маємо можливість перенести наш центр влади в межах наших основних володінь. Нова столиця дозволить нам зосередитися саме на цьому регіоні та перетворити його на належне місце влади для нашої династії."
  flavor_hab.1100.a: "[ShowLocationNameWithNoTooltip('vienna')] на берегах Дунаю стане чудовою столицею!"
  flavor_hab.1100.b: "[ShowLocationNameWithNoTooltip('innsbruck')], оточений багатими горами, буде нашим центром!"
  flavor_hab.1100.c: "Процвітаючі торговці в [ShowLocationNameWithNoTooltip('graz')] зроблять нас багатими!"
  flavor_hab.1100.d: "Наша нинішня столиця добре нам служить."
  STATIC_MODIFIER_NAME_habsburg_capital: "Династична столиця"
  flavor_hab.1101.title: "Постійна столиця для [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_hab.1101.desc: "Вибір столиці за примхами нашого правителя, схоже, все більше стає пережитком минулої епохи. Завдяки сильній волі [target_ruler.GetName] ми маємо можливість обрати постійне місце проживання для нашої родини та централізувати там наше правління."
  flavor_hab.1101.tt: "Ми більше не зможемо змінювати нашу столицю з новим правителем"
  flavor_hab.1101.a: "[ShowLocationNameWithNoTooltip('vienna')] — це майбутнє [target_ruler.GetDynasty.GetNameWithNoTooltip]."
  flavor_hab.1101.b: "[ShowLocationNameWithNoTooltip('innsbruck')] слід зробити нашим постійним місцем проживання."
  flavor_hab.1101.c: "[ShowLocationNameWithNoTooltip('graz')] — наш бажаний вибір!"
  flavor_hab.1101.d: "Старі звичаї нам цілком підходять."
  flavor_hab.1200.title: "[ShowGoodsNameWithNoTooltip('silver')] знайдено в [ShowLocationNameWithNoTooltip('schwaz')]"
  flavor_hab.1200.desc: "Служниця фермера в [ShowLocationName('schwaz')] зробила дивовижне відкриття, доглядаючи за своїми волами. Одна з тварин викопала [ShowGoodsName('silver')] руду на лузі! За її розповіддю, [ShowGoodsNameWithNoTooltip('silver')] лежало неглибоко в землі. Місцевий майор негайно відправив розвідників на пошуки розширених [ShowGoodsNameWithNoTooltip('silver')], що підтвердило її історію.\n\nЗ потенційними покладами [ShowGoodsNameWithNoTooltip('silver')], які вони обіцяли, для нас дуже мало ризику, щоб почати експлуатувати цю територію якомога більше."
  flavor_hab.1200.a: "[ROOT.GetCountry.GetReligion.GetGodName] благослови цю служницю!"
  STATIC_MODIFIER_NAME_mining_rush: "Срібна лихоманка!"
  flavor_hab.1201.title: "Срібна копальня Швац"
  flavor_hab.1201.desc: "Зі стабільним розширенням наших гірничих робіт у [ShowLocationName('schwaz')] щороку відкривається все більше [ShowGoodsName('silver')]. Тепер зрозуміло, що [ShowLocationNameWithNoTooltip('schwaz')] має потенціал зробити нас неймовірно багатими та стати основою наших фінансів. Сусідні [ShowLocationName('innsbruck')] та [ShowLocationNameWithNoTooltip('schwaz')] можуть перетворитися на демонстрацію пишноти та могутності нашої династії, якщо ми підтримаємо їхню гірничу промисловість зараз."
  flavor_hab.1201.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  schwaz_mine: "Швацська срібна копальня"
  flavor_hab.1202.title: "Новий Бергорднунг для [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab.1202.desc: "Наша гірнича промисловість процвітає і приваблює все більше людей до роботи в шахтах і навколо них у наших прекрасних долинах. Щоб не втратити контроль над ситуацією та вигідно врегулювати цей гірничий бум, ми повинні усунути будь-які невизначеності в нашому поточному [ShowPolicyName('german_mining_law')]. На щастя, [target_character.GetName] вже довів себе як здібний адміністратор у [ShowLocationName('schladming')] і міг би бути залучений для безпосереднього нагляду за нашими гірничими зусиллями з нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.1202.a: "Негайно відправте за ним!"
  flavor_hab.1202.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з гірничою [Concept('raw_material', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowModifier('schladming_bergordnung')]."
  STATIC_MODIFIER_NAME_schladming_bergordnung: "Шладмінгський Бергорднунг"
  flavor_hab.1202.b: "Нам не потрібна його допомога."
  flavor_hab.1300.title: "[target_ruler.GetNameWithNoTooltip] — князь Відродження"
  flavor_hab.1300.desc: "З правлінням [target_ruler.GetName] у [ROOT.GetCountry.GetName] та [target_ruler.GetHerHis] сходженням як [GetUniqueInternationalOrganization('hre').GetLeaderTitle] приходить відповідальність як покровителя мистецтв та культури. Як і належить, нам потрібно буде інвестувати в митців наших земель, інакше ми ризикуємо втратити своє становище на європейській арені."
  flavor_hab.1300.a: "Ми покажемо світові нашу пишність!"
  flavor_hab.1300.a.tt: "Це дозволить нам розвивати культурні прагнення нашої країни."
  flavor_hab.1300.b: "Це марнотратство грошей."
  flavor_hab.1301.title: "[target_character.GetNameWithNoTooltip] пропонує [ShowBuildingTypeNameWithNoTooltip('college_of_poets')]"
  flavor_hab.1301.desc: "Відомий гуманіст і поет [target_character.GetName] звернувся до [target_ruler.GetName] з пропозицією розширити [ShowBuildingTypeName('university')] спеціалізованим коледжем для гуманітарних досліджень. Ця гуманістична школа могла б допомогти нам залучити більше здібних митців до [ROOT.GetCountry.GetName] і показати нашу відданість ідеалам гуманізму."
  flavor_hab.1301.a: "Чудовий план!"
  flavor_hab.1301.b: "Яка безглузда ідея."
  flavor_hab.1302.title: "«Теуерданк» [target_ruler.GetNameWithNoTooltip]"
  flavor_hab.1302.desc: "Глибоко стурбований [target_ruler.GetHerHis] спадщиною як правителя, [target_ruler.GetName] написав роман #italic Теуерданк#!, переказ його власних подорожей до його нареченої [target_ruler.GetSpouse.GetName]. Спираючись на традиції міннезангу [ROOT.GetCountry.GetName], [target_ruler.GetHeShe] зафіксував свої труднощі правління та те, як він їх подолав, у майстерно складеному тексті."
  flavor_hab.1302.a: "Справжній князь Відродження!"
  flavor_hab.1303.title: "Вправний [target_character.GetNameWithNoTooltip]"
  flavor_hab.1303.desc: "[target_character.GetName] нещодавно завершив свої студії в [ShowBuildingTypeName('university')] [ShowLocationName('vienna')] і тепер прагне продовжити свої гуманістичні дослідження. Окрім своєї наукової освіти, він також виявляє обіцянки в дипломатичних справах і міг би стати великим активом для наших зовнішніх справ."
  flavor_hab.1303.a: "Він був би чудовим Вчителем при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  STATIC_MODIFIER_NAME_cuspinian_educator: "Освіта Куспініана"
  flavor_hab.1303.b: "Він має потенціал блискучого дипломата."
  STATIC_MODIFIER_NAME_cuspinian_diplomacy: "Куспініанська дипломатія"
  flavor_hab.1303.c: "Ми не потребуємо його послуг."
  flavor_hab.1400.title: "Зустріч [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] у [ShowLocationNameWithNoTooltip('hollabrunn')]"
  flavor_hab.1400.desc: "Ми отримали звістку про підозрілу зустріч деяких наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у [ShowAreaName('austria_area')]. Один із учасників, вірний [target_ruler.GetName], повідомив нам про їхню змову використати [target_pretender.GetName] для просування власних вимог."
  flavor_hab.1400.a: "Яка огидна поведінка."
  mailberger_noble_rebels: "Майльберзький союз"
  mailberger_noble_rebels_joining: "Усі [ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('austria_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднуються до [target_mailberger_noble_rebels.GetName]."
  flavor_hab.1401.title: "Інтерес [target_rebel.GetNameWithNoTooltip] до $mailberger_noble_rebels$"
  flavor_hab.1401.desc: "[target_rebel.GetName] — талановитий і перспективний шляхтич з менш знатного роду. На жаль, схоже, він симпатизує назріваючому повстанню серед наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], сподіваючись просунути власні амбіції. Ми могли б забезпечити його вірність і послуги, але це обійшлося б значною ціною."
  flavor_hab.1401.a: "Просто ще один зрадник."
  flavor_hab.1401.b: "Відкупитися від нього."
  flavor_hab.1402.title: "Майльберзькі вимоги"
  flavor_hab.1402.desc: "Невдоволені [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які деякий час інтригували та плели змови, тепер висунули свої вимоги [target_ruler.GetName]. Хоча вони сміливо висувають ці вимоги під ледь прихованою загрозою збройного повстання у випадку, якщо ми не поступимося, можливо, мудрішим рішенням буде задовольнити їхнє прохання та примиритися з членами."
  flavor_hab.1402.a: "Це здається досить розумним."
  flavor_hab.1402.b: "Вони нічого не отримають!"
  flavor_hab.1403.title: "Невдоволені [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] [ShowAreaNameWithNoTooltip('styria_area')]"
  flavor_hab.1403.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ShowAreaName('styria_area')], незадоволені тягарем війни, об'єдналися і відкрито протистоять [target_ruler.GetName]. З нашими поточними військовими зусиллями це може мати небезпечний вплив на поточну ситуацію, і ми повинні бути обережними у вирішенні цієї справи."
  flavor_hab.1403.a: "Будьте прокляті!"
  styria_noble_rebels: "Штирійське повстання"
  styria_noble_rebels_joining: "Усі [ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('austria_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднуються до [target_styria_noble_rebels.GetName]."
  flavor_hab.1500.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_hab.1500.desc: "Блискучий астроном, [target_artist.GetName] завершив свою освіту у [ShowLocationName('vienna')] і шукає відповідного спонсора для подальших наукових досліджень. Якщо ми спонсоруємо його дослідження в нашому [ShowBuildingTypeName('university')] у [ShowLocationNameWithNoTooltip('vienna')], він може досягти значного прогресу."
  flavor_hab.1500.a: "Найняти його!"
  flavor_hab.1500.b: "Нас не цікавлять його послуги."
  flavor_hab.1501.title: "[target_artist.GetNameWithNoTooltip] Публікує свою Працю"
  flavor_hab.1501.desc: "[target_artist.GetName] досяг значного прогресу у своїй праці, опублікувавши свою роботу з птолемеївської астрономії у #italic Theoricae novae planetarum#!."
  flavor_hab.1501.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.1502.title: "Учень [target_artist.GetNameWithNoTooltip]"
  flavor_hab.1502.desc: "Помічник та учень [target_artist.GetName], [target_character.GetName] виявив подібні ознаки генія, як і його майстер, і міг би служити нам великим активом та допомогою як радник. Наше початкове рішення підтримати дослідження [target_artist.GetNameWithNoTooltip] справді досягло великих успіхів як для [ROOT.GetCountry.GetName], так і для нашого [ShowBuildingTypeName('university')]."
  flavor_hab.1502.a: "Яка чудова інвестиція!"
  flavor_hab.1502.b: "Це ще більше прискорить наші дослідницькі зусилля."
  flavor_hab.1600.title: "Мандат [target_location.GetNameWithNoTooltip]"
  flavor_hab.1600.desc: "Зі зростанням впливу Реформації наша країна пережила наплив [ShowReligionAdjective('lutheran')] навернених. Наші [ShowReligionAdjective('catholic')] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловили занепокоєння [target_ruler.GetName] щодо впливу, який ці групи могли б набути, та шкоди, яку це могло б спричинити. Вони стурбовані не лише наслідками для нашої зовнішньої політики, але й внутрішнім конфліктом, який такий поділ міг би викликати. Щоб придушити цей рух на ранній стадії, ми повинні розробити мандат за допомогою [target_character.GetName], який чітко пояснить нашому населенню, які дії вважатимуться єрессю."
  flavor_hab.1600.a: "Нам потрібно діяти швидко!"
  flavor_hab.1600.b: "Це не потрібно."
  flavor_hab.1601.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hab.1601.desc: "Попри всі зусилля нашої країни та нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [ShowPolicyName('mandate_of_ofen')] не зупинив поширення [ShowReligionName('lutheran')]. [target_character.GetName] є видатним [ShowReligionAdjectiveWithNoTooltip('lutheran')] проповідником у нашій країні, і [target_ruler.GetName] виявляє до нього певний інтерес. Ми могли б запросити його до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], де він міг би просувати справу [ShowReligionAdjectiveWithNoTooltip('lutheran')] народу."
  flavor_hab.1601.a: "Він буде корисним при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.1601.b: "Нам не потрібні єретики в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.1601.historical_info: "Йоганн Себастьян Пфаузер був придворним проповідником Максиміліана II. Під його керівництвом Максиміліан схилився до лютеранської віри, хоча особисто ніколи не навертався до неї."
  flavor_hab.1602.title: "[ShowReligionAdjectiveWithNoTooltip('lutheran')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab.1602.desc: "Внаслідок Реформації деякі члени нашого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] навернулися до [ShowReligionName('lutheran')]. Ця фракція стурбована відсутністю правової безпеки їхньої нової віри в нашій країні та прагне такого ж захисту, як і наші [ShowReligionAdjective('catholic')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_hab.1602.a: "Нам доведеться піти на компроміс з ними."
  flavor_hab.1602.b: "Відхилити всі їхні вимоги."
  flavor_hab.1602.c: "Повністю прийняти [ShowReligionNameWithNoTooltip('lutheran')]."
  flavor_hab.conversion.tt: "Деякі з наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ROOT.GetCountry.GetName] навернуться до [ShowReligionName('lutheran')]."
  flavor_hab.1603.title: "Розбрат у [GetInternationalOrganization('hre').GetNameWithNoTooltip]"
  flavor_hab.1603.desc: "[GetInternationalOrganization('hre').GetName] розділена між [ShowReligionName('catholic')] та новими вірами Реформації, очолюваними [ShowReligionName('lutheran')]. Наша власна позиція в цьому конфлікті ще не визначена, і, враховуючи наш значний вплив в імперії, наша позиція могла б значно змінити долю імперії."
  flavor_hab.1603.historical_info: "Після поразки Шмалькальденської ліги в битві при Мюльберзі імператор Карл V працював над відновленням релігійної єдності Священної Римської імперії. На Імперському сеймі в Аугсбурзі 1548 року він нав'язав імперським станам Аугсбурзький інтернім, який мав регулювати релігійну політику Імперії до завершення загального собору Католицької Церкви. Аугсбурзький інтернім переважно відображав католицьку точку зору; однак він дозволяв шлюб духовенства та причастя обома видами (хлібом і вином) для мирян. Кілька протестантських курфюрстів заперечували проти католицького акценту Аугсбурзького інтерніму та відмовлялися дотримуватися його. Карл намагався примусити до його прийняття, дія, яка призвела до того, що протестанти прийняли Лейпцизький інтернім, який підтримував протестантські доктрини, на наступному сеймі. Жоден інтернім не був повністю прийнятий, тому німецьке релігійне врегулювання не було досягнуто до Аугсбурзького миру 1555 року, який встановив принцип #italic Cuius regio, eius religio#!, «чия влада, того й релігія», диктуючи, що релігія кожного правителя потім буде нав'язана його підданим."
  flavor_hab.1603.a: "Віддати перевагу золотій середині."
  religious_compromise: "Сприяє релігійному компромісу"
  flavor_hab.1603.a.all: "Усі [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в [GetInternationalOrganization('hre').GetName] отримують [ShowBiasValue('religious_compromise')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetCountry('HAB').GetLongName]"
  flavor_hab.1603.b: "Підтримати [ShowReligionAdjectiveWithNoTooltip('catholic')] фракцію."
  flavor_hab.1603.b.catholics: "Усі [ShowReligionAdjectiveWithNoTooltip('catholic')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в [GetInternationalOrganization('hre').GetName] отримують [ShowBiasValue('favors_catholics_catholics')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetCountry('HAB').GetLongName]"
  favors_catholics_catholics: "Сприяє католикам"
  flavor_hab.1603.b.protestants: "Усі протестантські [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в [GetInternationalOrganization('hre').GetName] отримують [ShowBiasValue('favors_catholics_protestants')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetCountry('HAB').GetLongName]"
  favors_catholics_protestants: "Сприяє католикам"
  flavor_hab.1603.c: "Підтримати [ShowReligionAdjectiveWithNoTooltip('lutheran')] фракцію."
  flavor_hab.1603.c.catholics: "Усі [ShowReligionAdjectiveWithNoTooltip('catholic')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в [GetInternationalOrganization('hre').GetName] отримують [ShowBiasValue('favors_protestants_catholics')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetCountry('HAB').GetLongName]"
  favors_protestants_protestants: "Сприяє протестантам"
  flavor_hab.1603.c.protestants: "Усі протестантські [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в [GetInternationalOrganization('hre').GetName] отримують [ShowBiasValue('favors_protestants_protestants')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetCountry('HAB').GetLongName]"
  favors_protestants_catholics: "Сприяє протестантам"
  flavor_hab.1604.title: "[ShowBuildingTypeNameWithNoTooltip('jesuit_college')] для [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab.1604.desc: "Дозволивши єзуїтам увійти до [ROOT.GetCountry.GetName], ми тепер можемо використовувати їх для зміцнення [ShowReligionAdjective('catholic')] віри серед нашого населення. Єзуїти обіцяють нам побудувати [ShowBuildingTypeName('jesuit_college')] у нашій країні, що слугуватиме місцем [ShowReligionAdjectiveWithNoTooltip('catholic')] освіти. Хоча це приваблива перспектива для нашого [ShowReligionAdjectiveWithNoTooltip('catholic')] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [ShowReligionAdjectiveWithNoTooltip('lutheran')] населення може розцінити це як ознаку посилення зусиль щодо їхнього навернення."
  flavor_hab.1604.a: "Підтримати єзуїтів."
  flavor_hab.1604.b: "Максимально обмежити їхній вплив."
  flavor_hab.1604.c: "Вигнати їх з [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_hab.1605.title: "Скарги проти єзуїтів"
  flavor_hab.1605.desc: "За останні кілька років до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] надійшло все більше скарг щодо [ShowBuildingTypeName('jesuit_college')]. Згідно з їхніми скаргами, єзуїти навертають [ShowReligionAdjective('lutheran')] людей, порушуючи Сповідь, підписану нами, та імперські закони, що регулюють співіснування [ShowReligionName('catholic')] та [ShowReligionNameWithNoTooltip('lutheran')] на наших землях."
  flavor_hab.1605.a: "Нам не варто сваритися з єзуїтами."
  flavor_hab.1605.a.tt: "Це зробить наше населення, що сповідує [ShowReligionNameWithNoTooltip('lutheran')], нещасним."
  flavor_hab.1605.b: "Розглянути ці скарги."
  flavor_hab.1605.b.tt: "Це зробить наше населення, що сповідує [ShowReligionNameWithNoTooltip('lutheran')], щасливим."
  flavor_hab.1605.c: "Ми повинні позбутися єзуїтів."
  flavor_hab.1605.c.tt: "Це зробить наше населення, що сповідує [ShowReligionNameWithNoTooltip('lutheran')], дуже щасливим."
  flavor_hab.1606.title: "[ShowReligionAdjectiveWithNoTooltip('catholic')] Реакція"
  flavor_hab.1606.desc: "Як [GetCountry('PAP').GetName], так і [catholic_strong_country.GetName] висловили протести щодо нашого рішення вигнати єзуїтів з наших земель. Вони вимагають, щоб ми негайно надали їм доступ до [ROOT.GetCountry.GetName] знову і дозволили їм продовжити свою роботу."
  flavor_hab.1606.a: "Підкоритися їхній волі та дозволити єзуїтам повернутися до [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_hab.1606.b: "Ми відмовляємося від їхніх вимог."
  flavor_hab.1607.title: "Монастирська Рада [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab.1607.desc: "З Реформацією, що досягла нашої країни, вона також має жахливі наслідки для нашої [ShowBuildingTypeName('monastery')] організації. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] скаржаться на брак нових членів у [ShowBuildingTypeNameWithNoTooltip('monastery')] будівлях та на їхній відчайдушний фінансовий стан. Ми могли б встановити раду, яка взяла б [ShowBuildingTypeNameWithNoTooltip('monastery')] адміністрацію у свої руки, сподіваючись вирішити проблему."
  flavor_hab.1607.a: "Реформувати [ShowBuildingTypeNameWithNoTooltip('monastery')] структуру."
  flavor_hab.1607.a.tt: "Розблоковує [ShowProductionMethodName('hab_reformed_monastery_maintenance')] для всіх [ShowBuildingTypeNameWithNoTooltip('monastery')] будівель у нашій країні."
  flavor_hab.1607.b: "Їм доведеться просто адаптуватися самостійно."
  flavor_hab.1608.title: "Богемська конфесія"
  flavor_hab.1608.desc: "[ShowCultureName('czech')] стани нашого домену звернулися до нас із проханням підтвердити їхню власну конфесію, яка є [ShowReligionAdjective('lutheran')], віддаленою від нашої [ShowReligionAdjective('catholic')] віри. Хоча [ShowCultureNameWithNoTooltip('czech')] стани ще не є достатньо могутніми, повна відмова їм може мати серйозні наслідки в майбутньому."
  flavor_hab.1608.a: "Прийняти її, без підпису."
  royal_letter_of_bohemia: "Конфесія [ShowAreaNameWithNoTooltip('bohemia_area')]"
  flavor_hab.1608.b: "Повністю відмовити."
  refused_royal_letter_of_bohemia: "Відхилена Конфесія [ShowAreaNameWithNoTooltip('bohemia_area')]"
  flavor_hab.1608.c: "Прийняти її з офіційним підписом."
  flavor_hab.1608.historical_info: "#italic Confessio Bohemica#! була прийнята імператором Максиміліаном II у травні 1575 року, щоб забезпечити спадщину його призначеного спадкоємця, Рудольфа II. Конфесія була розроблена некатолицькими станами Богемії, щоб забезпечити їхній правовий статус під владою Габсбургів. Максиміліан II прийняв конфесію як правову основу, але не підписав її, і вона була надана лише в основних Богемських землях, а не в Сілезії чи Лужиці. Підписання Листа Величі Рудольфом II у 1609 році підтвердило ці права Богемським станам."
  flavor_hab.1609.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Рекатолізація"
  flavor_hab.1609.desc: "Вогні єресі загрожували поглинути єдність християнства в наших землях, проте останні події відродили надію на істинну віру. Натхненні [ShowAdvanceName('edict_of_restitution')] та нашим нещодавнім приєднанням до [ShowReligionAdjective('catholic')] фракції в Імперському сеймі, наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] тепер виступають за сміливу кампанію рекатолізації, щоб повернути серця та уми людей. Вони стверджують, що через впровадження [ShowReligionAdjectiveWithNoTooltip('catholic')] вчень та відновлення церковної влади ми можемо відновити божественний порядок у нашому [ROOT.GetCountry.GetFlavorRank] та забезпечити позицію [ROOT.GetCountry.GetName] як бастіону [ShowReligionAdjectiveWithNoTooltip('catholic')] віри в [ShowContinentName('europe')]."
  flavor_hab.1609.a: "Запровадити рекатолізацію завзято."
  flavor_hab.1609.b: "Просувати істинну віру мирними засобами."
  flavor_hab.1609.c: "Зосередитися на єдності понад релігію."
  flavor_hab.1700.title: "Банк для [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab.1700.desc: "Щоб покращити нашу фінансову стабільність та зменшити залежність від інших джерел, ми повинні розвивати державний банк. На жаль, це вимагатиме значних початкових інвестицій для забезпечення його виживання. З цією метою [target_ruler.GetName] міг би вимагати внесок від наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], хоча вони, безумовно, не були б задоволені таким рішенням."
  flavor_hab.1700.a: "Ми вимагатимемо внесок від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_hab.1700.b: "Ми впораємося самотужки."
  flavor_hab.1700.historical_info: "Після того, як залежність від приватних осіб у фінансовій підтримці призвела до банкрутства Габсбурзької держави, імператор Леопольд I ухвалив рішення заснувати державний банк, #italic Banco del Giro#!, у 1703 році. Через зайнятість зовнішньою політикою та великі державні інвестиції, що йшли на фінансування Війни за іспанську спадщину, банк збанкрутував лише через 2 роки і зрештою був переданий місту Відню, яке перетворило його на #italic Wiener Stadtbank#!, що відтоді відігравав центральну роль у фінансуванні Габсбургів."
  flavor_hab.1701.title: "Доля Банку [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab.1701.desc: "Настав час вирішити, чи можемо ми рухатися вперед з нашими планами щодо фінансування нового банку в [ROOT.GetCountry.GetName]. Це буде можливо лише за умови, що ми зможемо зібрати достатньо коштів."
  flavor_hab.1701.a: "Приголомшливий успіх!"
  flavor_hab.1701.b: "Грандіозний провал."
  flavor_hab.1800.title: "Текстильне виробництво [ShowProvinceDefinitionNameWithNoTooltip('muhlviertel_province')]"
  flavor_hab.1800.desc: "Наша територія в [ShowProvinceDefinitionName('muhlviertel_province')] знаходиться в чудовому місці для розширення та створення престижної текстильної промисловості, оскільки доступні [ShowGoodsName('fiber_crops')] у [ShowLocationName('linz')] є природним вибором для експлуатації. Якщо ми зможемо побудувати та інвестувати в потужну [ShowBuildingTypeName('cloth_manufactory')], ми зможемо отримати значну вигоду в майбутньому."
  flavor_hab.1800.a: "Ідеальна нагода."
  flavor_hab.1800.b: "Ткачі не принесуть нам багатства."
  flavor_hab.1800.historical_info: "Завдяки сприятливим умовам для вирощування льону, на початку XVII століття в регіоні Мюльфіртель спостерігалося швидке зростання ткацтва. Текстильна промисловість швидко перетворилася на наріжний камінь економіки Верхньої Австрії, хоча згодом вона зазнала поразки в міжнародній конкуренції."
  flavor_hab.1801.title: "Процвітаюча текстильна промисловість [ShowLocationNameWithNoTooltip('linz')]"
  flavor_hab.1801.desc: "Наші інвестиції в ткачів [ShowProvinceDefinitionName('muhlviertel_province')] були великим успіхом! Заснована [ShowBuildingTypeName('cloth_manufactory')] процвітає в цьому районі, і це безсумнівно, що ці галузі принесуть користь нашій економіці в наступні роки."
  flavor_hab.1801.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.1802.title: "Невдала текстильна промисловість [ShowLocationNameWithNoTooltip('linz')]"
  flavor_hab.1802.desc: "Без будь-яких значних інвестицій у [ShowBuildingTypeName('cloth_manufactory')] ми не змогли реалізувати наші початкові плани щодо створення [ShowGoodsName('cloth')] промисловості в [ShowProvinceDefinitionName('muhlviertel_province')]."
  flavor_hab.1802.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_hab.1900.title: "[target_character.GetNameWithNoTooltip] Осідає [target_character.GetHerselfHimself] у [ShowLocationNameWithNoTooltip('vienna')]"
  flavor_hab.1900.desc: "[target_character.GetName] здобув [target_character.GetHerselfHimself] ім'я як банкір і завдяки [target_character.GetHisHer] зв'язкам з деякими членами нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Завдяки значному багатству, яке він накопичив, він міг би стати для нас великим надбанням, якщо ми запропонуємо йому посаду в нашій дорадчій раді."
  flavor_hab.1900.a: "Запросити [target_character.GetHimHer] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.1900.b: "Нам не потрібно більше радників."
  flavor_hab.1901.title: "[target_mentor.GetNameWithNoTooltip] Рекомендує [target_character.GetNameWithNoTooltip]"
  flavor_hab.1901.desc: "Завдяки чудовим послугам, наданим [target_mentor.GetName], [target_mentor.GetHeShe] тепер рекомендує можливого наступника на [target_character.GetHisHer] посаду. [target_character.GetName], досвідчений банкір сам по собі, міг би виконувати роль [target_mentor.GetNameWithNoTooltip] як наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] радник у фінансових питаннях."
  flavor_hab.1901.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.1901.b: "[target_mentor.GetNameWithNoTooltip] вже достатньо."
  flavor_hab.1902.title: "Підтримка війни [target_character.GetNameWithNoTooltip]"
  flavor_hab.1902.desc: "Війна — дорогий час для [ROOT.GetCountry.GetName]. На щастя, заможний [target_character.GetName] готовий зробити значний внесок у наші військові зусилля, не вимагаючи натомість привілеїв чи грантів."
  flavor_hab.1902.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.1903.title: "Підтримка будівництва [target_character.GetNameWithNoTooltip]"
  flavor_hab.1903.desc: "[target_location.GetName] — жвавий [target_location.GetRank.GetName], і будівельні майданчики видно навколо. [target_character.GetName] ще не задоволений виглядом [target_location.GetRank.GetNameWithNoTooltip] і надав нам щедру пожертву, щоб продовжити перетворення [target_location.GetNameWithNoTooltip] на прекрасний бароковий [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_hab.1903.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.2000.title: "Дипломатичні плани [target_character.GetNameWithNoTooltip]"
  flavor_hab.2000.desc: "Видатний представник [ShowInstitutionName('enlightenment')], [target_character.GetName] довів [target_character.GetHisHer] цінність як дипломат, будучи нашим представником при дворах як наших суперників, так і союзників. [target_character.GetNameWithNoTooltip] тепер розробив грандіозний план, щоб забезпечити наше місце на європейській арені. Це може бути чудова нагода для нас сформувати наші зовнішні відносини на власний розсуд, особливо з нашим суперником [rival_country.GetName]."
  flavor_hab.2000.a: "Ідеальний план."
  flavor_hab.2000.b: "Поточна ситуація нам підходить."
  hab_diplomatic_revolution: "Дипломатичне зближення"
  flavor_hab.2001.title: "Зближення з [GetCountry('HAB').GetNameWithNoTooltip]"
  flavor_hab.2001.desc: "[GetCountry('HAB').GetName] звернувся до нас з пропозицією припинити наші поточні ворожі відносини. Це може бути чудовим шансом скоригувати нашу дипломатію та прагнути дружніх відносин з [GetCountry('HAB').GetNameWithNoTooltip]."
  flavor_hab.2001.a: "Ми погоджуємося на їхню пропозицію."
  flavor_hab.2001.b: "Ні, вони наші вороги не просто так!"
  flavor_hab.2100.title: "Реформи [target_ruler.GetNameWithNoTooltip]"
  flavor_hab.2100.desc: "Наш найосвіченіший [ROOT.GetCountry.GetGovernment.GetRulerTitle] незадоволений поточними законами [ROOT.GetCountry.GetName]. Вільно базуючись на принципах [ShowInstitutionName('enlightenment')], [target_ruler.GetHeShe] видав указ про великі зміни в політиці щодо майже всіх цивільних питань. Хоча деякі голоси в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] радять [ROOT.GetCountry.GetGovernment.GetRulerTitle] обрати менш радикальний і швидкий підхід до реформ, лише час покаже, чи є ці занепокоєння чимось більшим, ніж реакційним залякуванням."
  flavor_hab.2100.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.2100.historical_info: "За правління Марії Терезії між 1740 і 1780 роками Австрія розпочала процес реформ в ідеалах Просвітництва. Хоча вона дотримувалася консервативного підходу, щоб не засмучувати аристократію, її син Йосиф II наполягав на більш радикальних ідеях після того, як він розпочав своє співправління разом зі своєю матір'ю в 1765 році. Хоча його ідеї були спрямовані на швидку зміну до освіченого абсолютизму, він зіткнувся з жорстким опором у всіх частинах австрійського населення."
  flavor_hab.2101.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] виступає проти реформ"
  flavor_hab.2101.desc: "Реформаторські зусилля [target_ruler.GetName] не були прихильно сприйняті нашими [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Вони відмовилися дотримуватися нових законів, встановлених у [ROOT.GetCountry.GetName], якщо ми не компенсуємо їм кожну їхню втрату."
  flavor_hab.2101.a: "Відступити та скоригувати реформи."
  flavor_hab.2101.b: "Трохи золота їх точно заткне."
  flavor_hab.2101.c: "Можливо, вони хочуть нагадування, хто їхній [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_hab.2102.title: "Без спротиву реформам"
  flavor_hab.2102.desc: "Наші реформи, започатковані [target_ruler.GetName], були прийняті без звичних суперечок щодо кожної дрібниці нашої політики. [ROOT.GetCountry.GetName] тепер справді можна вважати маяком [ShowInstitutionName('enlightenment')]."
  flavor_hab.2102.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.2103.title: "Раабізація землеустрою"
  flavor_hab.2103.desc: "[target_character.GetName], далекоглядний адміністратор, запропонував трансформаційну політику для усунення неефективності у землекористуванні в межах нашого [ROOT.GetCountry.GetFlavorRank]. [target_character.GetHerHis|U] план, тепер відомий як «раабізація», передбачає перерозподіл великих земель, що належать [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], дрібним орендарям у спадкову оренду. Надаючи повноваження [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], стверджує [target_character.GetLastNameWithNoTooltip], ми можемо модернізувати сільське господарство, збільшити продуктивність та забезпечити більші доходи для держави."
  flavor_hab.2103.a: "Впровадити реформи [target_character.GetLastNameWithNoTooltip]."
  flavor_hab.2103.b: "[target_character.GetHerHis|U] ідеї надто радикальні."
  flavor_hab.2104.title: "Реформи [target_character.GetNameWithNoTooltip]"
  flavor_hab.2104.desc: "[target_character.GetName] — видатний [ShowCultureName('slovak')] вчений та імперський бібліотекар, який викликав хвилю обговорень своїми радикальними ідеями щодо управління та прав підданих. Відомий як «[ShowCultureNameWithNoTooltip('slovak')] Сократ», [target_character.GetLastNameWithNoTooltip] стверджує, що освіта та реформи є життєво важливими для процвітання держави, і навіть кинув виклик традиційним привілеям [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. [target_character.GetHerHis|U] пропозиції щодо розширення повноважень [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та зменшення впливу вкорінених феодальних структур викликали запеклі дебати в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hab.2104.a: "Ми повинні підтримати [target_character.GetHerHis] пропозиції."
  flavor_hab.2104.b: "[target_character.GetHerHis|U] ідеї загрожують нашій стабільності."
  flavor_hab.2104.historical_info: "Адам Франтішек Коллар був словацьким істориком, лінгвістом та політичним мислителем, який служив бібліотекарем у Віденській придворній бібліотеці. Затятий прихильник освіченого абсолютизму, Коллар виступав за централізаційні реформи та зменшення влади дворянства. Він був ключовим радником Марії Терезії під час її правових та адміністративних реформ. Він також відомий тим, що вигадав термін «етнологія»."
  flavor_hab.2200.title: "[ShowLocationNameWithNoTooltip('wiener_neustadt')]"
  flavor_hab.2200.desc: "[ShowLocationName('wiener_neustadt')] займає важливе положення як головний вузол нашого сполучення з [ShowAreaName('styria_area')]. На жаль, [ShowLocationNameWithNoTooltip('wiener_neustadt')] не розглядається як центр нашого правління, що відповідало б такій позиції, і гостро потребує інвестицій у свою інфраструктуру. За невеликої фінансової підтримки, наданої [target_ruler.GetName], це можна було б легко вирішити, і [ShowLocationNameWithNoTooltip('wiener_neustadt')] могла б зрости у своєму значенні для нашого королівства."
  flavor_hab.2200.a: "Варта інвестиція."
  flavor_hab.2200.b: "Яка марна трата грошей."
  flavor_hab.2200.historical_info: "Після розколу династії Габсбургів на Альбертинську та Леопольдинську гілки у 1379 році, Вінер-Нойштадт був піднесений до одного з ключових міст-резиденцій Габсбурзьких герцогів. Місто швидко зростало у своєму новому статусі, особливо під пильною увагою імператора Фрідріха III."
  flavor_hab.2201.title: "Безпека [ShowAreaNameWithNoTooltip('austria_area')]"
  flavor_hab.2201.desc: "[ShowLocationName('wiener_neustadt')] вважається життєво важливою позицією в обороні [ROOT.GetCountry.GetName]. На жаль, оборонні споруди [ShowLocationNameWithNoTooltip('wiener_neustadt')] перебувають у жалюгідному стані і не змогли б утримати жодного загарбника більше ніж кілька днів. Якби це сталося, дорога до [ShowLocationName('vienna')] була б широко відкритою. Ми не можемо цього допустити і повинні модернізувати наші укріплення!"
  flavor_hab.2201.a: "[ShowAreaNameWithNoTooltip('austria_area')] має бути захищена."
  flavor_hab.2201.b: "Вторгнення в [ShowAreaNameWithNoTooltip('austria_area')] — абсурдна ідея."
  flavor_hab.2202.title: "Військова академія для [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab.2202.desc: "Ми можемо багато чого навчитися у наших друзів та ворогів на полях битв [ShowContinentName('europe')]. Але навчання лише через безпосередній досвід може виявитися катастрофічною помилкою, коли йдеться про війну. Якщо ми хочемо зайняти позицію шанованої військової сили, ми повинні створити установу для навчання наших офіцерів, незалежно від їхнього становища, мистецтву війни."
  flavor_hab.2202.a: "Заснувати Академію!"
  flavor_hab.2202.b: "Безглузда ідея, наші нинішні офіцери неперевершені!"
  flavor_hab.2202.historical_info: "Війна за австрійську спадщину показала відчайдушну потребу у військовій реформі австрійської армії. Щоб передати військовий контроль більше в руки самої держави, імператриця Марія Терезія заснувала Терезіанську військову академію в 1751 році."
  flavor_hab.2300.title: "[GetCountry('BUR').GetAdjectiveWithNoTooltip] Шлюб"
  flavor_hab.2300.desc: "[GetCountry('BUR').GetLongName] наразі керує жінка-суверен, яка ще не одружилася і не народила спадкоємця. Її [burgundian_ruler.GetHisHer|U] можлива смерть без нащадків призведе до поглинання [GetCountry('BUR').GetAdjectiveWithNoTooltip] земель [GetCountry('FRA').GetAdjective] короною, сценарій, який становить серйозну загрозу для балансу сил у [ShowContinentName('europe')] та безпеки [GetUniqueInternationalOrganization('hre').GetName]. Щоб запобігти цьому, було запропоновано влаштувати шлюб між [burgundian_ruler.GetName] та [austrian_ruler.GetName], створивши союз, який забезпечить території [GetCountry('BUR').GetNameWithNoTooltip] під нашим контролем та протидіятиме [GetCountry('FRA').GetAdjectiveWithNoTooltip] амбіціям."
  flavor_hab.2300.a: "Запропонувати шлюб."
  flavor_hab.2300.b: "Це ризикований крок."
  flavor_hab.2300.historical_info: "У 1477 році Марія Бургундська, єдина дитина та спадкоємиця герцога Карла Сміливого, успадкувала величезні бургундські землі після смерті свого батька в битві при Нансі. Оскільки Франція претендувала на сюзеренітет над частинами Бургундії, спадщина Марії була оскаржена королем Франції Людовиком XI. Щоб протистояти французькому тиску, Марія вийшла заміж за ерцгерцога Максиміліана Австрійського, створивши потужний Габсбурзько-Бургундський союз. Цей союз не тільки забезпечив бургундську спадщину для династії Габсбургів, але й підготував ґрунт для майбутніх конфліктів з Францією, оскільки обидві держави змагалися за контроль над цими територіями."
  flavor_hab.2301.title: "[GetCountry('HAB').GetAdjectiveWithNoTooltip] Шлюб"
  flavor_hab.2301.desc: "Дипломатичний посланець з [GetCountry('HAB').GetName] прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] з зухвалою пропозицією. Вони пропонують шлюб між [burgundian_ruler.GetName] та [austrian_ruler.GetName], союз, який захистить [ROOT.GetCountry.GetName] від [GetCountry('FRA').GetAdjective] посягань та забезпечить наш суверенітет. [GetCountry('HAB').GetAdjectiveWithNoTooltip] посланці стверджують, що [ROOT.GetCountry.GetAdjectiveWithNoTooltip] спадщина [GetCountry('FRA').GetAdjectiveWithNoTooltip], якщо [burgundian_ruler.GetNameWithNoTooltip] помре без спадкоємця, створить незбалансовану владу в [ShowContinentName('europe')], загрожуючи не тільки [ROOT.GetCountry.GetNameWithNoTooltip], але й безпеці всього [GetUniqueInternationalOrganization('hre').GetName]."
  flavor_hab.2301.a: "Ми повинні це розглянути."
  flavor_hab.2301.b: "Ми не зацікавлені в такій пропозиції."
  flavor_hab.2302.title: "[GetCountry('BUR').GetNameWithNoTooltip] Приймає Нашу Пропозицію"
  flavor_hab.2302.desc: "Добрі новини надійшли з [GetCountry('BUR').GetName]! [burgundian_ruler.GetName] прийняла нашу пропозицію про шлюб, зміцнивши союз між нашими двома великими домами. Цей альянс принесе величезні території [GetCountry('BUR').GetAdjectiveWithNoTooltip] під [ROOT.GetCountry.GetAdjective] вплив і забезпечить захист від [GetCountry('FRA').GetName]."
  flavor_hab.2302.a: "Чудові новини!"
  flavor_hab.2303.title: "[GetCountry('BUR').GetNameWithNoTooltip] Відхиляє Нашу Пропозицію"
  flavor_hab.2303.desc: "Відповідь з [GetCountry('BUR').GetName] надійшла, але це не те, на що ми сподівалися. [burgundian_ruler.GetName] відхилила нашу пропозицію про шлюб, посилаючись на занепокоєння щодо незалежності [GetCountry('BUR').GetNameWithNoTooltip] та потенційної негативної реакції з боку [GetCountry('FRA').GetName]."
  flavor_hab.2303.a: "Невтішний результат."
  flavor_hab.2400.title: "[GetCountry('BOH').GetAdjectiveWithNoTooltip] Шлюб"
  flavor_hab.2400.desc: "Минуло майже покоління з того часу, як [rudolf.GetName] став першим [ROOT.GetCountry.GetAdjective] правителем [GetCountry('BOH').GetName]. Проте його передчасна смерть у 1307 році без спадкоємця призвела до втрати нашого контролю над [GetCountry('BOH').GetAdjectiveWithNoTooltip] престолом. Хоча збройне захоплення [GetCountry('BOH').GetNameWithNoTooltip] немислиме в нинішніх умовах, можливо, більш дипломатичний підхід міг би послужити нашим амбіціям. Шлюбний союз з однією з дочок [bohemian_ruler.GetName] міг би прокласти шлях до поновлення наших претензій на престол. Представлена як жест для послаблення напруги між нашими королівствами, така пропозиція могла б посіяти насіння майбутнього союзу під [ROOT.GetCountry.GetAdjectiveWithNoTooltip] керівництвом."
  flavor_hab.2400.a: "Запропонувати шлюб."
  flavor_hab.2400.b: "Не ризикуймо їх образити."
  flavor_hab.2400.historical_info: "У 1357 році Рудольф IV Австрійський одружився з Катериною Богемською, дочкою імператора Карла IV. Цей шлюб був стратегічним союзом, спрямованим на зміцнення зв'язків між Габсбургами та династією Люксембургів, яка правила Богемією. У той час обидві родини прагнули зміцнити свій вплив у Священній Римській імперії та протистояти зростаючій могутності конкуруючих шляхетних домів."
  flavor_hab.2401.title: "[GetCountry('HAB').GetAdjectiveWithNoTooltip] Пропозиція"
  flavor_hab.2401.desc: "Несподівана пропозиція надійшла від [GetCountry('HAB').GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]: шлюб між [austrian_ruler.GetName] та [target_princess.GetName], дочкою [bohemian_ruler.GetName]. Австрійці говорять про примирення, пропонуючи, що такий союз відновить мир і стабільність між нашими королівствами після років недовіри. Однак багато хто в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] підозрює, що їхня справжня мета — відновити вплив на [ROOT.GetCountry.GetName], потенційно навіть заклавши основу для їхніх династичних амбіцій. Прихильники пропозиції стверджують, що міцний союз з [GetCountry('HAB').GetNameWithNoTooltip] міг би захистити [ROOT.GetCountry.GetNameWithNoTooltip] від зовнішніх загроз, тоді як противники попереджають, що це може призвести до [GetCountry('HAB').GetAdjectiveWithNoTooltip] домінування в нашому королівстві."
  flavor_hab.2401.a: "Цей шлюб може служити нашим інтересам."
  flavor_hab.2401.b: "Ми не можемо довіряти їхнім намірам."
  flavor_hab.2402.title: "[GetCountry('BOH').GetNameWithNoTooltip] Приймає нашу пропозицію"
  flavor_hab.2402.desc: "[GetCountry('BOH').GetAdjective] [GetCountry('BOH').GetGovernment.GetCourtTitle] прийняв нашу пропозицію шлюбного союзу, поєднавши [austrian_ruler.GetName] з [target_princess.GetName]. Цей шлюб запалив надію, що [ROOT.GetCountry.GetAdjective] вплив одного дня може бути відновлений у [GetCountry('BOH').GetNameWithNoTooltip], можливо, навіть призведе до повернення нашої династії на трон. Наразі цей союз є кроком до миру та взаємного процвітання між нашими володіннями."
  flavor_hab.2402.a: "Знаменна подія!"
  flavor_hab.2403.title: "[GetCountry('BOH').GetNameWithNoTooltip] Відхиляє нашу пропозицію"
  flavor_hab.2403.desc: "[GetCountry('BOH').GetAdjective] [GetCountry('BOH').GetGovernment.GetCourtTitle] відхилив нашу пропозицію шлюбу, заявивши, що вона є непотрібною та недоречною на цей час. Дехто підозрює, що це рішення було зумовлене недовірою до [ROOT.GetCountry.GetName], оскільки багато хто в [GetCountry('BOH').GetNameWithNoTooltip] залишається обережним щодо наших династичних амбіцій."
  flavor_hab.2403.a: "Ми мусимо прийняти це розчарування."
  flavor_hab.2500.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]-[GetCountry('PRU').GetAdjectiveWithNoTooltip] Суперництво"
  flavor_hab.2500.desc: "Вже досить давно ми є беззаперечним лідером [GetUniqueInternationalOrganization('hre').GetName], позиція, здобута силою, дипломатією та родоводом. Однак, піднесення [GetCountry('PRU').GetName] як могутньої та амбітної держави загрожує нашій гегемонії. Завдяки їхнім військовим реформам, економічному зростанню та зростаючому впливу серед князів Імперії, [GetCountry('PRU').GetNameWithNoTooltip] становить серйозний виклик нашій владі. Дехто припускає, що ми повинні діяти рішуче, щоб приборкати їхню зростаючу силу, перш ніж вона підірве нашу роль охоронця Імперії."
  flavor_hab.2500.a: "Ми мусимо діяти, щоб стримати їх."
  flavor_hab.2500.b: "Вони не становлять для нас загрози."
  flavor_hab.2500.historical_info: "Австро-прусське суперництво стало одним із визначальних конфліктів у Священній Римській імперії. Хоча Австрія залишалася домінуючою імперською державою, Пруссія виникла як грізний суперник під керівництвом таких лідерів, як Фрідріх Великий, який перетворив її на військову потугу. Конфлікти, такі як Війна за австрійську спадщину та Семирічна війна, відіграли важливу роль у створенні та посиленні цього суперництва, оскільки Пруссія прагнула утвердити домінування в Імперії та кинути виклик традиційній перевазі Австрії."
  flavor_hab.2501.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]-[GetCountry('HAB').GetAdjectiveWithNoTooltip] Суперництво"
  flavor_hab.2501.desc: "[GetCountry('HAB').GetAdjective] [GetCountry('HAB').GetGovernment.GetCourtTitle] чітко висловив свої наміри: вони прагнуть підірвати наш зростаючий вплив у [GetUniqueInternationalOrganization('hre').GetName]. Чи то через військові приготування, дипломатичні інтриги, чи відкриту ворожість, очевидно, що [GetCountry('HAB').GetNameWithNoTooltip] розглядає [ROOT.GetCountry.GetName] як загрозу своєму домінуванню."
  flavor_hab.2501.a: "Нас не залякати!"
  flavor_hab.2600.title: "[target_spain.GetAdjectiveWithNoTooltip] Шлюб"
  flavor_hab.2600.desc: "Зростаюча загроза, яку становить [GetCountry('FRA').GetName], викликала занепокоєння при дворах [ShowContinentName('europe')]. Оскільки [ROOT.GetCountry.GetName] та [target_spain.GetName] мають спільний інтерес у приборканні [GetCountry('FRA').GetAdjectiveWithNoTooltip] амбіцій, деякі радники запропонували шлюбний союз для зміцнення дружби між нашими народами. Укладення королівського шлюбу з [target_spain.GetAdjectiveWithNoTooltip] принцесою зміцнило б зв'язки з [target_spain.GetNameWithNoTooltip], а також заклало б основу для ширшої анти-[GetCountry('FRA').GetAdjectiveWithNoTooltip] коаліції."
  flavor_hab.2600.a: "Надіслати пропозицію шлюбу."
  flavor_hab.2600.b: "Ми знайдемо інший шлях."
  flavor_hab.2600.historical_info: "Перший великий австро-іспанський союз був укладений у 1496 році, коли Філіп Красивий, ерцгерцог Габсбургів, одружився з Хуаною Кастильською, дочкою Фердинанда та Ізабелли. Після смерті Ізабелли у 1504 році Філіп став першим королем Кастилії з династії Габсбургів. Цей союз привів іспанську корону до сфери впливу Габсбургів і зрештою заклав основу для панування Габсбургів над Іспанією та її величезною світовою імперією протягом 16-го та 17-го століть."
  flavor_hab.2601.title: "[GetCountry('HAB').GetAdjectiveWithNoTooltip] Шлюб"
  flavor_hab.2601.desc: "[GetCountry('HAB').GetAdjectiveWithNoTooltip] [GetCountry('HAB').GetGovernment.GetCourtTitle] надіслав офіційну пропозицію королівського шлюбу між [austrian_ruler.GetName] та [target_princess.GetName]. Вони стверджують, що такий союз міг би врівноважити [GetCountry('FRA').GetAdjective] владу та захистити інтереси обох володінь."
  flavor_hab.2601.a: "Прийняти пропозицію."
  flavor_hab.2601.b: "Відхилити пропозицію."
  flavor_hab.2602.title: "[target_spain.GetNameWithNoTooltip] Приймає нашу пропозицію"
  flavor_hab.2602.desc: "[target_spain.GetName] прийняв нашу пропозицію шлюбу, пов'язавши наші два володіння у могутній союз проти наших спільних ворогів. Разом [target_spain.GetNameWithNoTooltip] та [ROOT.GetCountry.GetName] стоятимуть об'єднаними проти амбіцій [GetCountry('FRA').GetName], забезпечуючи більш безпечне та процвітаюче майбутнє для обох народів."
  flavor_hab.2602.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hab.2603.title: "[target_spain.GetNameWithNoTooltip] Відхиляє нашу пропозицію"
  flavor_hab.2603.desc: "[target_spain.GetName] відхилив нашу пропозицію шлюбу, посилаючись на занепокоєння щодо інших зобов'язань. Хоча це розчарування для наших прагнень до тісніших зв'язків з [target_spain.GetNameWithNoTooltip], це нагадування про делікатний характер дипломатії в [ShowContinentName('europe')]."
  flavor_hab.2603.a: "Ми розглянемо інші варіанти..."