l_english:
  flavor_grm.1.title: "Смерть [target_character.GetNameWithNoTooltip]"
  flavor_grm.1.desc: "Один з наших найславетніших мужів та засновник нашого [target_country.GetFlavorRank] відійшов у вічність. [target_character.GetHerHis|U] правління досі знаменувало апогей нашого впливу в [ShowRegionName('anatolia_region')], успішно підкоривши багатьох наших сусідів. На жаль, [target_character.GetHerHis] смерть посіяла невдоволення та акти повстання, оскільки наші піддані прагнуть поживитися багатством нашого народу."
  flavor_grm.1.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_grm.1.b: "Ми не підкоримося без бою!"
  flavor_grm.1.historical_info: "Один з наймогутніших бейликів, що виникли на початку XIV століття, Герміяніди були засновані Якубом I, чиї завоювання принесли багато земель під його юрисдикцію. Його сорокарічне правління призвело до зіткнень з багатьма його сусідами, підкоривши Айдинідів, Саруханідів та Карасидів на Заході, а також вступивши у відкриті конфлікти з Османами. Після його смерті його численні васали скористалися нагодою і проголосили свою незалежність."