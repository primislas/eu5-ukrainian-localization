l_english:
  flavor_tre.1.title: "Цитадель [target_location.GetNameWithNoTooltip]"
  flavor_tre.1.desc: "Гордо височіючи століттями, [target_location.GetRank.GetName] [target_location.GetName] є символом королівської влади глибоко в серці [ShowRegionName('anatolia_region')]. Слугуючи маяком наших культурних традицій, наша велика столиця процвітала значною мірою завдяки своїй чудовій гавані та географічному розташуванню.\n\nОснащена багатьма міськими установами, такими як купецькі квартали, ринки та акведуки, вона стала символом нашої влади, нашої гордості та коштовності. Нещодавній приріст населення зумовив необхідність розширення кордонів [target_location.GetRank.GetNameWithNoTooltip], щоб розмістити більше домогосподарств за нашими міцними стінами."
  flavor_tre.1.historical_info: "Заснований у 756 році до нашої ери, Трапезунд має довгу історію як оплот християнства та грецької культури. Ще з римських часів місто слугувало вирішальною легіонерською базою в Понті Полемоніакському. Пізніше, за правління Юстиніана, кілька вірменських кампаній використовували Трапезунд як пункт збору та відправлення.\n\nМісто перетворилося на архієпископство у 8 столітті та митрополію на початку 10 століття. Трапезундська імперія, заснована у 1204 році Олексієм I Комніном та Давидом Комніном, проіснувала до 1461 року, укріплена Понтійськими горами, міцними міськими укріпленнями та стратегічними шлюбними союзами. Хоча й невелика, з близько 4000 мешканців у 1438 році, вона була добре захищена та мала значні пам'ятки, такі як монастир Святої Софії та собор Панагії Хризокефалос. Трапезунд був останнім візантійським форпостом, що впав перед османами, зберігаючи своє культурне та історичне значення до 1461 року."
  flavor_tre.1.a: "Фінансувати розширення!"
  flavor_tre.1.b: "Нехай вони голодують за стінами..."
  flavor_tre.2.title: "Непокора схоларіїв"
  flavor_tre.2.desc: "Мотивовані ослабленням центральної влади та спонукані своєю ненаситною жадібністю, багато членів місцевих шляхетних ополчень взяли під контроль значні ділянки політичної сцени в [target_location.GetName]. Хоча вони завжди були раді отримати нову посаду, привілеї та цінні маєтки, багато членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] перетнули межу... Якщо ми не діятимемо рішуче проти них, їхня схильність до корупції може кинути всю країну в пащу громадянської війни!"
  flavor_tre.2.a: "Приборкати цих скажених псів!"
  flavor_tre.2.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_tre.2.historical_info: "Схоларії були впливовими #italic άρχοντες#! (шляхтичами) та однією з наймогутніших родин у Трапезунді. Спочатку вони були сформовані як королівський ополченський підрозділ, завданням якого був захист міста. Незабаром вони стали корумпованими та оскаржували владу правлячої імператриці Ірини у 1340 році. Їхня зухвалість та жага до контролю призвели до того, що вони наклали вето на сходження Ірини, кинувши всю країну в громадянську війну, тоді як південний кордон Трапезунда був атакований туркменськими набігами. Це завершилося тим, що нападники захопили місто, підпалили його та спричинили епідемію, яка виникла від смороду гниючих трупів — як людей, так і коней."
  flavor_tre.3.title: "Отруєння [target_character1.GetNameWithNoTooltip]"
  flavor_tre.3.desc: "У відчайдушному кроці пристрасної ненависті та ревнощів [target_character2.GetName] здійснив отруєння та вирішив долю [target_character1.GetShortName]. Це було посилено, здавалося б, холодними почуттями [target_character1.GetShortNameWithNoTooltip] до [target_character2.GetHerHim] та існуванням багатьох коханок і коханців..."
  flavor_tre.3.a: "У коханні та на війні все дозволено."
  flavor_tre.3.b: "Ми цього не потерпимо!"
  flavor_tre.3.historical_info: "Шлюб між Іриною та Василем був лише способом для династії Комнінів забезпечити союз з імператором Візантії, оскільки Ірина була позашлюбною дочкою імператора Андроніка III Палеолога. Хоча між ними не було прихильності, Ірина не народила дітей, тоді як Василь знайшов притулок в обіймах придворної коханки. Образа між королівською парою зрештою призвела до вбивства Василя та початку правління Ірини, бурхливого періоду для Трапезунда."