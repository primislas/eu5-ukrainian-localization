l_english:
  flavor_tim_governor.1.title: "Смерть нашого правителя"
  flavor_tim_governor.1.desc: "Зі смертю нашого правителя, [target_area.GetName] тепер перебуває під де-юре управлінням [target_country.GetName]. Відтак, [target_character2.GetName] вимагає від поточного правителя повернути їх до [target_country.GetAdjectiveWithNoTooltip] рук."
  flavor_tim_governor.1.a: "Наш час як намісників вичерпано."
  flavor_tim_governor.1.b: "Можливо, ми зможемо домовитися про продовження?"
  flavor_tim_governor.2.title: "Прохання [prev_country.GetNameWithNoTooltip]"
  flavor_tim_governor.2.desc: "Зі смертю [target_character3.GetName], землі [prev_country.GetName] тепер належать нам. Однак, [target_character2.GetName] просить, щоб [target_character2.GetSheHe] зберегла ці землі."
  flavor_tim_governor.2.a: "Нам байдуже."
  flavor_tim_governor.2.b: "Це те, що ми можемо зробити."
  tim_governor_maintain_governance_tt: "[prev_country.GetName] збереже контроль над [target_area.GetName]"
  flavor_tim_governor.3.title: "Підтримка від [target_country.GetNameWithNoTooltip]"
  flavor_tim_governor_3_desc_shared: "Останнім часом нам бракувало підтримки від нашого сюзерена, [target_country.GetName]. [target_character2.GetName] усвідомив це і тепер бажає просити підтримки у [target_character.GetName]. Ми могли б обрати з кількох варіантів, як-от золото або люди."
  flavor_tim_governor.3.desc.a: "$flavor_tim_governor_3_desc_shared$ Ми могли б навіть попросити [target_character3.GetName] приєднатися до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tim_governor.3.desc.b: "$flavor_tim_governor_3_desc_shared$"
  flavor_tim_governor.3.a: "Нам потрібно більше людей для боротьби."
  flavor_tim_governor.3.b: "Наші скарбниці порожні."
  flavor_tim_governor.3.c: "[target_character3.GetNameWithNoTooltip] був би добрим членом нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tim_governor.3.d: "Немає потреби нічого вимагати."
  tim_governor_overlord_must_accept_tt: "[target_country.GetName] має погодитися, щоб ефекти набули чинності"
  timurid_governor_no_demand_tt: "Жодної вимоги не буде надіслано до [target_country.GetName]"
  flavor_tim_governor.4.title: "Прохання від [prev_country.GetNameWithNoTooltip]"
  flavor_tim_governor.4.desc: "[prev_country.GetName] останнім часом страждає. Вони попросили нас про підтримку. Ми могли б надати її їм, і натомість, ми зможемо залишити їх на місці на деякий час."
  flavor_tim_governor.4.a: "Ми надішлемо їм людей."
  flavor_tim_governor.4.b: "Вони отримають золото, яке хочуть."
  flavor_tim_governor.4.c: "[target_character3.GetNameWithNoTooltip] приєднається до них."
  flavor_tim_governor.4.d: "Вони не отримають від нас підтримки."
  flavor_tim_governor.5.title: "Нові мужі стікаються до [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_tim_governor.5.desc: "Коли наше намісництво міцно вкорінилося, нові люди вирішили приєднатися до нашого починання. Одного з них звуть [target_character.GetName], це [target_character.GetWomanMan] з різноманітними навичками. [target_character.GetSheHe|U] походить з [target_religion.GetAdjective] [target_culture.GetName] середовища і володіє різноманітними вміннями, які ми можемо використати."
  flavor_tim_governor.5.a: "Наймімо їх."
  flavor_tim_governor.5.b: "[target_character.GetSheHe|U] стане чудовим наставником для нас."
  flavor_tim_governor.5.c: "Ще є давня образа, яку слід розв'язати..."
  flavor_tim_governor.5.d: "Чудовий супутник для нас."
  flavor_tim_governor.5.e: "Не триматимемо їх тут."
  flavor_tim_governor.6.title: "Розвиток [target_area.GetNameWithNoTooltip]"
  flavor_tim_governor.6.desc: "Відтоді, як [target_character.GetName] отримав намісництво над [target_area.GetName], він наполегливо працював, щоб перетворити його на перлину [target_country.GetName]. Використовуючи обмежені ресурси, що були в [target_character.GetHerHis] розпорядженні, це виявилося чудовим досвідом навчання. Громадяни, які спочатку сумнівалися в [target_character.GetHerHis] здібностях, тепер щасливі жити під [target_character.GetHerHis] правлінням."
  flavor_tim_governor.6.a: "Сприяти подальшому розвитку."
  flavor_tim_governor.6.b: "Нехай [target_character.GetHerHim] вчиться на цьому успіху."
  timurid_governor_increase_development_in_area_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] отримає [ShowNamedValue('development_weak_bonus')|+=] [Concept('development', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tim_governor.7.title: "Економічна політика обертається невдачею в [target_area.GetNameWithNoTooltip]"
  flavor_tim_governor.7.desc: "Попри всі спроби [target_character.GetName] перетворити [target_area.GetName] на перлину, [target_character.GetSheHe] зазнав невдач. Певна економічна політика, запроваджена в [target_area.GetNameWithNoTooltip], призвела до закриття будинків та гільдій, що фактично призвело до занепаду."
  flavor_tim_governor.7.a: "Клянуся [ROOT.GetCountry.GetReligion.GetGodName], це погано."
  flavor_tim_governor.7.b: "Нам слід скасувати цю політику."
  timurid_governor_decrease_development_in_area_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] втратить [ShowNamedValue('development_weak_penalty')|+=] [Concept('development', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tim_governor.8.title: "Прикордонне життя"
  flavor_tim_governor.8.desc: "Відтоді, як ми були у вигнанні в [target_area.GetName], люди там загартувалися. Завжди готові до будь-якого ворожого набігу, тепер вони відомі в [target_country.GetAdjective] [ROOT.GetCountry.GetFlavorRank]. [target_character.GetName] також це помітив і бажає перетворити [target_area.GetNameWithNoTooltip] на мілітаристське намісництво, щоб, сподіваємося, одного дня помститися [target_country.GetNameWithNoTooltip]."
  flavor_tim_governor.8.a: "Тренуймо їх завзятіше."
  flavor_tim_governor.8.b: "Чи справді ця жага помсти варта того?"
  flavor_tim_governor.9.title: "Новий [target_country.GetGovernment.GetRulerTitle]"
  flavor_tim_governor.9.desc: "Зі смертю нашого правителя, [target_country.GetName] тепер керується новою особою. Хоча це не спричинило значної нестабільності, з'явилися нові можливості претендувати на [target_country.GetNameWithNoTooltip]. Використовуючи лише ресурси з [target_area.GetName], це була б ризикована кампанія, але вигнання, якого зазнав народ, не забуто, і ця помста може бути вгамована лише тоді, коли [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] контролюватиме всю [target_country.GetAdjectiveWithNoTooltip] [target_country.GetFlavorRank]."
  flavor_tim_governor.9.a: "Вперед до [target_country.GetCapital.GetNameWithNoTooltip]!"
  flavor_tim_governor.9.b: "Ще не час."
  flavor_tim_governor.10.title: "Вигнання при [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_tim_governor.10.desc: "Через нещодавні вигнання в столиці [target_country.GetName], [target_country.GetCapital.GetName], відбувся їхній наплив до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], одним з яких є [target_character2.GetName]. [target_character.GetName] бажає найняти [target_character2.GetHerHim], хоча це, безсумнівно, розгніває [target_country.GetNameWithNoTooltip]."
  flavor_tim_governor.10.a: "Якщо вони виженуть нас, то ми приймемо всіх вигнанців до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_tim_governor.10.b: "Стратити [target_character2.GetNameWithNoTooltip], щоб здобути прихильність."
  flavor_tim_governor.11.title: "Ефективне управління в [target_area.GetNameWithNoTooltip]"
  flavor_tim_governor.11.desc: "Завдяки [target_character.GetName] та [target_character.GetHerHis] ефективній політиці, запровадженій у [target_area.GetName], провінція тепер переживає процвітання. Вулиці [ROOT.GetCountry.GetCapital.GetName] тепер заповнені працьовитими [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та задоволеними [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Ми могли б витратити більше на це, або ж ми могли б пожинати поточні плоди."
  flavor_tim_governor.11.a: "Давайте витратимо більше для процвітання."
  flavor_tim_governor.11.b: "Замість витрачати золото, давайте насолоджуватися поточним станом справ."
  timurid_governor_increase_prosperity_and_satisfaction_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] отримає [ShowNamedValue('prosperity_weak_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], а їхні [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tim_governor.12.title: "Політика губернатора в [target_area.GetNameWithNoTooltip] має зворотний ефект"
  flavor_tim_governor.12.desc: "Нещодавні політики, запроваджені [target_character.GetName], дали зворотний результат. Замість того, щоб принести процвітання, на яке [target_character.GetSheHe] сподівався(-лася), це призвело до зниження продуктивності для [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Однак ще не пізно, ми могли б спробувати скасувати деякі з них, навіть якщо це спричинить певну нестабільність у [ROOT.GetCountry.GetName]."
  flavor_tim_governor.12.a: "Що посієш, те й пожнеш."
  flavor_tim_governor.12.b: "Давайте швидко їх скасуємо."
  timurid_governor_decrease_prosperity_and_satisfaction_in_area_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] втратить [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], а їхні [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_tim_governor.13.title: "Розвиток порту в [target_location.GetNameWithNoTooltip]"
  flavor_tim_governor.13.desc: "Губернаторство [target_character.GetName] принесло процвітання порту [target_location.GetName]. Наплив торговців з усього [ROOT.GetCountry.GetDiplomacy.GetOverlord.GetName] призвів до того, що [target_location.GetRank.GetName] став, можливо, одним з найбільших портів у всьому [ROOT.GetCountry.GetDiplomacy.GetOverlord.GetFlavorRank]."
  flavor_tim_governor.13.a: "Нехай процвітає."
  flavor_tim_governor.13.b: "Давайте використаємо це процвітання для себе."
  flavor_tim_governor.14.title: "Укріплення [target_location.GetNameWithNoTooltip]"
  flavor_tim_governor.14.desc: "Отримавши довіру на губернаторство [ROOT.GetCountry.GetCapital.GetArea.GetName], [target_character.GetName] наполегливо працював(-ла). Вже зібравши кошти та креслення для створення [ShowBuildingTypeName('castle')] у [target_location.GetName], [target_character.GetSheHe] тепер готовий(-а) його збудувати. Ми могли б реалізувати цю ідею, або ж ми могли б натомість зосередитися на зміцненні наших армій замість будівництва укріплень на кордоні."
  flavor_tim_governor.14.a: "Давайте збудуємо цей [ShowBuildingTypeNameWithNoTooltip('castle')]."
  flavor_tim_governor.14.b: "Зміцнення армії звучить більш привабливо."