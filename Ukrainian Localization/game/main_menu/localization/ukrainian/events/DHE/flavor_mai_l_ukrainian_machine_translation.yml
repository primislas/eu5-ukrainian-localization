l_english:
  flavor_mai.1.title: "Гуттенберг і друкарський верстат"
  flavor_mai.1.desc: "У 1450 році Йоганн Гуттенберг, заможний купець у Майнці, застосував свої знання, здобуті від роботи батька-золотаря, і створив перший у світі друкарський верстат."
  flavor_mai.1.a: "Першим надрукованим твором була німецька поема, але Гуттенберг мав більші амбіції, оскільки прагнув надрукувати Біблію."