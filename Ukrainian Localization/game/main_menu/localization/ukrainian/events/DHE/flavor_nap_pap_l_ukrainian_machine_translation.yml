l_english:
  flavor_nap_pap.1.title: "[lorenzo_valla_scope.GetNameWithNoTooltip]"
  flavor_nap_pap.1.desc: "Видатний лектор, [lorenzo_valla_scope.GetName], нещодавно зустрівся з [country_ruler.GetName], що викликало інтерес суверена до [lorenzo_valla_scope.GetHerHis] навичок полеміста та філософа. Здається, вони добре порозумілися, оскільки [country_ruler.GetShortNameWithNoTooltip] згодом запропонував фінансування школи для письменника та залучення [lorenzo_valla_scope.GetHerHis] навичок до [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nКрім того, схоже, що [lorenzo_valla_scope.GetNameWithNoTooltip] має сумніви щодо давнього #italic Дару Костянтина#! і [lorenzo_valla_scope.GetSheHe] вірить, що [lorenzo_valla_scope.GetSheHe] може довести, що твір є підробкою. Якщо [lorenzo_valla_scope.GetSheHe] має рацію, це викличе хвилювання у [ShowReligionAdjective('catholic')] світі."
  flavor_nap_pap.1.historical_info: "Лоренцо Валла був італійським гуманістом XV століття, який зробив багато внесків в італійське Відродження, переважно на службі у короля Альфонсо V Арагонського в Неаполі, після того, як той його завоював. Валла найбільше запам'ятався своєю критикою #italic Дару Костянтина#!, документа, на якому ґрунтувалася папська влада над католицьким світом, викривши його як підробку та принизивши папство. Тому він вважається одним із засновників текстової критики та філології як академічної дисципліни."
  flavor_nap_pap.1.a: "Негайно найняти [lorenzo_valla_scope.GetHerHim]!"
  flavor_nap_pap.1.b: "Нехай [lorenzo_valla_scope.GetHerHim] матиме школу щонайбільше."
  flavor_nap_pap.1.c: "А що, як [lorenzo_valla_scope.GetSheHe] — шпигун?"
  NAP_when_done: "Коли [lorenzo_valla_scope.GetName] завершить [lorenzo_valla_scope.GetHerHis] працю, ми зможемо викрити [GetCountry('PAP').GetName]:"
  flavor_nap_pap.2.title: "Викриття #italic Дару Костянтина#!"
  flavor_nap_pap.2.desc: "[lorenzo_valla_scope.GetName] не збрехав, коли [lorenzo_valla_scope.GetSheHe] пробурмотів [lorenzo_valla_scope.GetHerHis] сумніви щодо #italic Дару Костянтина#!. Заглибившись у нього, [lorenzo_valla_scope.GetSheHe] зумів знайти всілякі невідповідності у творі, довівши, що #italic Дар#! є нічим іншим, як обманом. Що зроблено, те зроблено, і [lorenzo_valla_scope.GetShortNameWithNoTooltip] вже був винагороджений за свою працю. Тепер нам залишається вирішити, чи оприлюднювати викриття."
  flavor_nap_pap.2.historical_info: "#italic Дар Костянтина#!, нібито наданий Папі Сильвестру в четвертому столітті, є підробленим римським указом, який наділяв папство старшинством над чотирма іншими патріаршими престолами та правами на західну частину Імперії. Цей документ широко використовувався папством з XI століття як виправдання для захисту різних папських інтересів."
  flavor_nap_pap.2.a: "Поширити працю далеко й широко!"
  flavor_nap_pap.2.b: "Не публікувати працю."
  nap_papal_state_exposed: "Викрито папство"
  STATIC_MODIFIER_NAME_nap_exposed_papacy: "$nap_papal_state_exposed$"
  NAP_increase_reform_desire: "Рішення опублікувати це може збільшити [Concept('reform_desire', 'CONCEPT_PLACEHOLDER')|e] до #g +100.0%#!, залежно від того, скільки [Concept('nations', 'CONCEPT_PLACEHOLDER')|e] вирішать засудити [GetCountry('PAP').GetName]."
  flavor_nap_pap.3.title: "#italic Про Дар Костянтина#!"
  flavor_nap_pap.3.desc: "[lorenzo_valla_scope.GetName] з [nap_from.GetName] створив дослідження походження #italic Дару Костянтина#!, визнавши його підробкою. Незважаючи на всі наші зусилля знайти недоліки в роботі, ми знайшли мало причин обґрунтовано заперечувати що-небудь у ній. Хоча новина ще не досягла кожного куточка [ROOT.GetCountry.GetReligion.GetAdjective] світу, вона обов'язково досягне з часом. Якщо ми нічого не зробимо з цим, наша влада обов'язково постраждає і зменшиться."
  flavor_nap_pap.3.historical_info: "$flavor_nap_pap.2.historical_info$"
  flavor_nap_pap.3.a: "Відлучити [lorenzo_valla_scope.GetShortNameWithNoTooltip] та всіх причетних!"
  flavor_nap_pap.3.b: "Прикинутися невігласом."
  nap_harsher_effect_on_excommunication_but_less_likely_and_excom: "Це рішення зменшить шанс інших країн засудити нас на #g -50.0%#!, але також збільшить вплив на [Concept('reform_desire', 'CONCEPT_PLACEHOLDER')|e] на #r +50.0%#!."
  nap_every_catholic_country_gets_to_choose: "Кожна [ShowReligionAdjective('catholic')] країна вирішує, засуджувати нас чи ні. Якщо вони вирішать засудити нас, вони збільшать [Concept('reform_desire', 'CONCEPT_PLACEHOLDER')|e] на частку [ShowReligionAdjective('catholic')] [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e], якими вони володіють."
  STATIC_MODIFIER_NAME_nap_donation_of_contantine_exposed: "Дар Костянтина викрито"
  flavor_nap_pap.4.title: "$flavor_nap_pap.3.title$"
  flavor_nap_pap.4.desc: "До нас дійшла звістка про певного філософа, [lorenzo_valla_scope.GetName] з [nap_from.GetName], який створив дослідження походження #italic Дару Костянтина#!, визнавши його підробкою. Вчені та гуманісти держави вважають викриття справжнім. Це дає нам найкращий шанс завдати удару по [the_papacy.GetName] і спробувати зменшити [the_papacy.GetAdjectiveWithNoTooltip] вплив. Однак засудження [the_pope.GetName] було б серйозною справою і могло б поставити нас під загрозу відлучення."
  flavor_nap_pap.4.historical_info: "$flavor_nap_pap.2.historical_info$"
  flavor_nap_pap.4.a: "Засудити [the_papacy.GetLongNameWithNoTooltip]!"
  flavor_nap_pap.4.b: "Нічого не робити з цього приводу."
  nap_condemned_his_holiness: "Засуджено Його Святість"