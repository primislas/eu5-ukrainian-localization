l_english:
  flavor_pap_holy_league.1.title: "Священна Ліга"
  flavor_pap_holy_league.1.desc: "Падіння [ShowLocationName('constantinople')] та подальша [GetCountry('TUR').GetAdjective] експансія на [ShowRegionName('balkan_region')] стали нищівним ударом для Християнства. Як наслідок, багато хто закликає нас до помсти. Як лідер [GetUniqueInternationalOrganization('catholic_church').GetName], нашим святим обов'язком є зібрати морські держави [ShowRegionName('italy_region')] та Середземномор'я на наш бік і оголосити хрестовий похід, щоб назавжди вигнати невірних з [ShowContinentName('europe')]."
  flavor_pap_holy_league.1.a: "Оголосити хрестовий похід!"
  flavor_pap_holy_league.1.a.tt: "[Concept('THIS.GetCountry.GetName] буде запрошено до [crusade', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_pap_holy_league.1.b: "Ми не можемо протистояти їм..."
  flavor_pap_holy_league.1.historical_info: "Священні Ліги були союзами християнських держав, переважно організованими Папою, для протидії експансії Османської імперії, яка становила значну загрозу для християнських королівств та Католицької Церкви. Ці ліги були вирішальними у сповільненні османського наступу та захисті Європи від подальших турецьких вторгнень."
  flavor_pap_holy_league.2.title: "Заклик до хрестового походу"
  flavor_pap_holy_league.2.desc: "Послання від [GetCountry('PAP').GetGovernment.GetRulerTitle] досягло нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [pope_ruler.GetHeSheFormal|U] вирішив сформувати Священну Лігу середземноморських держав у спробі перемогти [GetCountry('TUR').GetAdjective] загрозу, зупинити їхню експансію на Балканському півострові та захистити [ShowRegionName('italy_region')]."
  flavor_pap_holy_league.2.a: "Наш обов'язок приєднатися до Священної Ліги."
  flavor_pap_holy_league.2.b: "Це нас не стосується."
  flavor_pap_holy_league.3.title: "[target_country.GetNameWithNoTooltip] приєднується до Священної Ліги"
  flavor_pap_holy_league.3.desc: "Нас благословили чудовими новинами! [target_ruler.GetName] з [target_country.GetName] прийняв наше запрошення приєднатися до Священної Ліги, і тому [target_country.GetAdjectiveWithNoTooltip] армії йтимуть поруч з нашими проти [GetCountry('TUR').GetName]."
  flavor_pap_holy_league.3.a: "Deus Vult!"
  flavor_pap_holy_league.4.title: "[target_country.GetNameWithNoTooltip] відмовляється приєднатися до Священної Ліги"
  flavor_pap_holy_league.4.desc: "Той боягуз [target_ruler.GetName] з [target_country.GetName] відхилив наше запрошення приєднатися до Священної Ліги, і тому ми залишилися без підтримки [target_country.GetAdjectiveWithNoTooltip] армій у нашій боротьбі проти [GetCountry('TUR').GetName]."
  flavor_pap_holy_league.4.a: "Одного дня вони відповідатимуть перед Богом!"
  flavor_pap_holy_league.5.title: "Тріумф Священної Ліги"
  flavor_pap_holy_league.5.desc: "Армії Священної Ліги успішно провели свій хрестовий похід проти [GetCountry('TUR').GetName] і здобули вирішальну перемогу. Цей тріумф, сподіваємося, є лише першим кроком у наших зусиллях звільнити [ShowRegionName('balkan_region')] від язичницьких впливів та відновити владу Хреста над регіоном."
  flavor_pap_holy_league.5.a: "Бог на нашому боці!"
  flavor_pap_holy_league.5.historical_info: "Священна Ліга здобула перемоги в численних конфліктах проти османів. Наприклад, битва при Лепанто або облога Відня призвели до поразки османів, що спричинило їхній відступ з великих частин Європи та значне зменшення їхньої могутності як на суші, так і на морі."
  flavor_pap_holy_league.6.title: "Поразка Священної Ліги"
  flavor_pap_holy_league.6.desc: "З підписанням принизливого мирного договору, зусилля Священної Ліги зламати [GetCountry('TUR').GetAdjective] панування над [ShowRegionName('balkan_region')] зазнали невдачі. Цей нищівний удар, ймовірно, дозволить їм закріпити домінування над [ShowRegionNameWithNoTooltip('balkan_region')] і викличе шокові хвилі по всій [ShowContinentName('europe')]. Колись впевнені хрестоносці відступають, і [GetCountry('TUR').GetNameWithNoTooltip] тепер готові розширювати свою імперію ще далі."
  flavor_pap_holy_league.6.a: "Руйнівний удар..."
  flavor_pap_holy_league.6.historical_info: "Османи здобули перемоги в численних конфліктах за участю Священної Ліги. Наприклад, битви при Нікополі, Варні або війни Сулеймана проти Ліги бачили османів переможцями, що дозволило їм далі розширювати свою територію в Європі та закріпити своє домінування у східному Середземномор'ї."
  flavor_pap_holy_league.7.title: "Битва при Лепанто"
  flavor_pap_holy_league.7.desc: "У знаменній та історичній битві [ROOT.GetCountry.GetAdjective] флот здобув рішучу перемогу над [GetCountry('TUR').GetAdjective] флотом у битві при Лепанто. Цей неперевершений тріумф у морській війні, один із найбільших з античності, завдав значного удару по [GetCountry('TUR').GetAdjectiveWithNoTooltip] морській могутності та має потенціал змінити хід подій на користь Християнства. Героїзм та майстерність наших моряків та командирів не лише забезпечили життєво важливу стратегічну перемогу, але й підняли дух усіх [ShowReligionGroupAdjective('christian')] націй."
  flavor_pap_holy_league.7.a: "Наша морська міць неперевершена!"
  flavor_pap_holy_league.7.historical_info: "Битва при Лепанто, що відбулася 7 жовтня 1571 року, була вирішальною морською битвою між Священною Лігою, коаліцією християнських держав, включаючи Венецію, Іспанію та Папську державу, які об'єдналися проти морської могутності Османської імперії. Перемога Священної Ліги ознаменувала поворотний момент у боротьбі за контроль над Середземномор'ям, значно стримуючи османську експансію та утверджуючи християнське морське панування в регіоні."
  flavor_pap_holy_league.8.title: "Хрестовий похід Священної Ліги"
  flavor_pap_holy_league.8.desc: "Намагаючись зупинити [ROOT.GetCountry.GetAdjective] наступ на [ShowRegionName('balkan_region')], невірні сформували коаліцію на чолі з [GetCountry('PAP').GetName]. Вони закликали інші нації приєднатися до їхньої справи, і з оголошенням війни збираються величезні армії хрестоносців. Так звана Священна Ліга незабаром перетне наші кордони та рушить на [ShowLocationName('constantinople')]."
  flavor_pap_holy_league.8.a: "Нехай приходять..."
  flavor_pap_holy_league.9.title: "Поразка Священної Ліги"
  flavor_pap_holy_league.9.desc: "Прапори хреста були зірвані, а армії Священної Ліги розгромлені. Всупереч усім обставинам, ми вистояли перед однією з найбільших коаліцій, коли-небудь зібраних проти нас. Мрії [GetCountry('PAP').GetGovernment.GetRulerTitle] про повернення [ShowRegionName('balkan_region')] для Християнства розбиті, а [ShowReligionGroupAdjective('christian')] королі, які наважилися кинути виклик нашій могутності, тепер зализують свої рани, відступаючи назад до своїх земель у ганьбі."
  flavor_pap_holy_league.9.a: "Наша перемога буде увічнена в легендах!"
  flavor_pap_holy_league.10.title: "Перемога Священної Ліги"
  flavor_pap_holy_league.10.desc: "Армії Священної Ліги тріумфували, а наші горді сили були розгромлені на полі бою. [ShowReligionGroupAdjective('christian')] королі, об'єднані закликом [GetCountry('PAP').GetGovernment.GetRulerTitle] до хрестового походу, завдали значного удару по нашому [ROOT.GetCountry.GetFlavorRank]. По всій [ShowContinentName('europe')] дзвонять церковні дзвони на честь перемоги Священної Ліги, тоді як у наших землях панує неспокій. Приниження поразки важко лягає на людей. Наші вороги стали сміливішими, і [ShowReligionGroupAdjectiveWithNoTooltip('christian')] королі можуть шукати подальших здобутків, поки ми ослаблені."
  flavor_pap_holy_league.10.a: "Руйнівний удар..."