l_english:
  flavor_nov.1.title: "Громадянська війна в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_nov.1.desc: "XIV століття стало свідком початку довгої боротьби [ROOT.GetCountry.GetName] з Москвою за верховенство. Міжусобні суперечки серед лідерів республіки послабили її перед обличчям зростаючої [GetCountry('MOS').GetAdjective] сили. Хоча вона стала васалом [GetCountry('MOS').GetNameWithNoTooltip] після [GetCountry('MOS').GetAdjectiveWithNoTooltip] вторгнень у 1456 та 1470 роках, [ROOT.GetCountry.GetNameWithNoTooltip] було дозволено зберегти самоврядування. Лише у 1478 році вона потрапила під повний контроль Москви і втратила свою свободу. [ROOT.GetCountry.GetNameWithNoTooltip] зберігала своє комерційне становище до будівництва Санкт-Петербурга у 1703 році."
  flavor_nov.1.a: "Підтримати купецьку фракцію"
  flavor_nov.1.b: "Підтримати шляхетську фракцію"
  STATIC_MODIFIER_NAME_civil_war_looming: "Насувається громадянська війна"
  STATIC_MODIFIER_DESC_civil_war_looming: "Міжусобні суперечки між лідерами республіки досягли критичної точки."
  flavor_nov.2.title: "Болотовський договір"
  flavor_nov.2.desc: "Протягом багатьох років влада [ROOT.GetCountry.GetName] над [pskov_country.GetName] була, м'яко кажучи, сумнівною. У багатьох сферах держава [pskov_country.GetNameWithNoTooltip] організовувала свою адміністрацію та зовнішню політику незалежно від [ROOT.GetCountry.GetNameWithNoTooltip]. Де-факто, [pskov_country.GetNameWithNoTooltip] стала незалежною у 1329 році. Болотовський договір закріпить цей статус та визнає поточне становище [pskov_country.GetNameWithNoTooltip]."
  flavor_nov.2.a: "Офіційно визнати їхню незалежність."
  nov_acknowledged_our_independence: "Визнано нашу незалежність"
  flavor_nov.2.b: "Настав час знову утвердити нашу владу над [pskov_country.GetNameWithNoTooltip]."
  flavor_nov.2.b.tt: "Ми спробуємо приборкати [pskov_country.GetName].\n#italic Це може призвести до #R війни#! між нашими державами!#!"
  flavor_nov.3.title: "[overlord_country.GetNameWithNoTooltip] загрожує нашій незалежності!"
  flavor_nov.3.desc: "Де-юре, наш [ROOT.GetCountry.GetFlavorRank] підпорядковується [overlord_country.GetLongName]. Проте, [overlord_country.GetAdjectiveWithNoTooltip] влада над [ROOT.GetCountry.GetNameWithNoTooltip] є, м'яко кажучи, поверхневою. Наша держава де-факто є незалежною одиницею.\n\nБолотовський договір мав підтвердити нашу незалежність та надати нам майбутнє, окреме від [overlord_country.GetNameWithNoTooltip]. Однак такий договір так і не був підписаний. Натомість уряд [overlord_country.GetNameWithNoTooltip] надіслав до нас губернаторів, щоб знову утвердити [overlord_country.GetAdjectiveWithNoTooltip] владу над нашою країною."
  flavor_nov.3.a: "Наше майбутнє пов'язане з майбутнім [overlord_country.GetNameWithNoTooltip]."
  nov_acknowledged_our_authority: "Визнано нашу владу"
  flavor_nov.3.b: "Ми ніколи не підкоримося жодному сюзерену!"
  flavor_nov.3.b.tt: "#italic Війна розпочнеться через #R 30#! днів, якщо [overlord_country.GetName] не надасть нам незалежності.#!"
  flavor_nov.4.title: "[pskov_country.GetNameWithNoTooltip] визнає нашу владу"
  flavor_nov.4.desc: "Добрі новини з [pskov_country.GetName] дійшли до нашого двору! [pskov_country.GetGovernment.GetRulerTitle] [pskov_country.GetNameWithNoTooltip] визнає наше правління над [pskov_country.GetNameWithNoTooltip] і присягнув на вірність [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank]. Нам не доведеться турбуватися про подальші спроби [pskov_country.GetNameWithNoTooltip] стати незалежними від нашого правління."
  flavor_nov.4.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_nov.5.title: "[pskov_country.GetNameWithNoTooltip] оголошує війну за незалежність!"
  flavor_nov.5.desc: "Скандальні новини з [pskov_country.GetName] дійшли до нашого двору! Ці мерзенні пси відмовляються визнавати законне та справедливе правління [ROOT.GetCountry.GetName] над їхнім дрібним [pskov_country.GetFlavorRank] і оголосили нам війну за незалежність! Ми повинні підготувати нашу державу до війни або дозволити [pskov_country.GetNameWithNoTooltip] стати незалежною від нас!"
  flavor_nov.5.a: "До зброї!"
  flavor_nov.5.b: "Вони не варті боротьби."
  flavor_nov.6.title: "Криза через Двінські землі"
  flavor_nov.6.desc: "Двінські землі, також відомі як Б'ярмаланд, — це регіон уздовж річки Двіни та головний постачальник [ShowGoodsName('fur')] для [ROOT.GetCountry.GetName]. Протягом багатьох років ці джерела хутра забезпечували багатство та стабільність [ROOT.GetCountry.GetLongNameWithNoTooltip].\n\nЗ ворожим захопленням Двінських земель з боку [dvina_crisis_target.GetNameWithNoTooltip] наша ситуація значно погіршилася. Державна скарбниця щодня зменшується. Це лише питання часу, поки наша держава не підкориться бідності!"
  flavor_nov.6.a: "Ми повинні повернути Двінські землі!"
  flavor_nov.6.a.tt: "Ми вимагатимемо Двінські землі назад від [dvina_crisis_cause.GetName].\n#italic Це може призвести до #R війни#! між нашими державами!#!"
  flavor_nov.6.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_nov.7.title: "Криза через Двінські землі – [GetCountry('NOV').GetNameWithNoTooltip] вимагає землі назад"
  flavor_nov.7.desc: "[GetCountry('NOV').GetLongName] вимагає Двінські землі, також відомі як Б'ярмаланд, регіон уздовж річки Двіни та головний постачальник [ShowGoodsName('fur')] для них. Хоча він має великий потенціал багатства, ми можемо зіткнутися з війною, якщо не поступимося їхнім вимогам."
  flavor_nov.7.a: "Тоді поверніть їм ці землі."
  flavor_nov.7.a.tt: "#R Кожна володіння в [ShowAreaName('pomorye_area')], [ShowProvinceDefinitionName('velsk_province')], [ShowProvinceDefinitionName('ustye_province')] та [ShowProvinceDefinitionName('kholmogory_province')] буде повернуто [dvina_crisis_target.GetName].#!\n#italic Ця дія набуде чинності через 7 днів.#!"
  nov_returned_the_dvina_lands: "Двінські землі повернуто"
  flavor_nov.7.b: "Ми збережемо те, що наше."
  flavor_nov.7.b.tt: "Ми збережемо Двінські землі.\n#italic Це може призвести до #R війни#! між [dvina_crisis_target.GetNameWithNoTooltip] та [ROOT.GetCountry.GetNameWithNoTooltip]!#!"
  flavor_nov.8.title: "Криза через Двінські землі – [dvina_crisis_cause.GetNameWithNoTooltip] поступається"
  flavor_nov.8.desc: "Наша загроза війни була успішною, і ми повернули багаті Двінські землі для нашої країни."
  flavor_nov.8.a: "Наша економіка врятована!"
  flavor_nov.8.a.tt: "#G [dvina_crisis_cause.GetName] повертає нам кожне володіння в [ShowAreaName('pomorye_area')], [ShowProvinceDefinitionName('velsk_province')], [ShowProvinceDefinitionName('ustye_province')] та [ShowProvinceDefinitionName('kholmogory_province')].#!"
  flavor_nov.9.title: "Криза через Двінські землі – Наші вимоги відхилено"
  flavor_nov.9.desc: "Нашої загрози війни було недостатньо, щоб змусити [dvina_crisis_cause.GetName] повернути нам Двінські землі. Тепер ми повинні вирішити, як діяти далі..."
  flavor_nov.9.a: "До зброї!"
  flavor_nov.9.b: "Ми відмовимося від цієї справи"
  flavor_nov.10.title: "Нібурів мир"
  flavor_nov.10.desc: "Відносини з [GetCountry('HSA').GetLongName] традиційно були напруженими, оскільки конкуренція за балтійську торгівлю зазвичай сприймається як гра з нульовою сумою між нашими купцями. Однак деякі з їхніх найвпливовіших представників, очолювані мером [ShowLocationName('lubeck')] Йоганном Нібуром, висловлювали підхід між нашими країнами. Вони бажають зміцнити спільні зв'язки та посилити торгівлю між нашими центрами."
  flavor_nov.10.a: "Ми поцілуємо хрест, щоб підтвердити угоду!"
  nov_novgorodian_hanseatic_friendship: "Новгородсько-ганзейська дружба"
  flavor_nov.10.b: "Нам вигідніше накласти на них ембарго!"
  flavor_nov.12.title: "Церква Преображення"
  flavor_nov.12.desc: "Церква Преображення Спаса, що стоїть на Ільїній вулиці в [ShowLocationName('novgorod')], зберігає одну з наших найшанованіших ікон, #italic Знамення Пресвятої Богородиці#!, яка здійснила диво порятунку міста під час облоги 1170 року арміями чотирьох князівств на чолі з суздальцями. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] міста благає про новий храм для найкращого служіння цій святій іконі."
  flavor_nov.12.a: "Святій іконі потрібна нова церква!"
  flavor_nov.12.b: "Нинішня церква достатньо хороша."
  flavor_nov.13.title: "Секта стригольників"
  flavor_nov.13.desc: "[ShowReligionName('strigolniki')] є послідовниками проповіді певного диякона [deacon_karp.GetName], який після вигнання з [ShowLocationName('pskov')] прибув до [ShowLocationName('novgorod')], щоб уникнути переслідування. Його вчення засуджує церковну ієрархію та чернецтво, оскільки, на його думку, всі священики певною мірою корумповані, вимагаючи права на проповіді та таїнства, що звершуються мирянами.\n\nЦі вчення поширилися серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], низькорангових [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], і релігійна влада тепер вимагає від нас відповіді."
  flavor_nov.13.a: "Вони є єретиками!"
  flavor_nov.13.a.tt: "Кожна [ShowReligionName('orthodox')] країна отримує [ShowBiasValue('nov_opposes_strigolniki')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [root_country.GetName]"
  nov_opposes_strigolniki: "Проти стригольників"
  lots_of_strigolniki: "Багато [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] тепер слідують за [ShowReligionName('strigolniki')]."
  flavor_nov.13.b: "Будьмо толерантними до цих братів-християн."
  flavor_nov.13.b.tt: "Кожна [ShowReligionName('orthodox')] країна отримує [ShowBiasValue('nov_tolerates_strigolniki')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [root_country.GetName]"
  nov_tolerates_strigolniki: "Толерує стригольників"
  flavor_nov.14.title: "Єресь жидовствующих"
  flavor_nov.14.desc: "З'явилася нова секта, що виникла з вчень певного Схарії, який відкидає Святу Трійцю та божественність Христа, водночас вимагаючи, щоб кожна особа мала право голосу в питаннях віри та спасіння, не визнаючи жодного статусу священикам і ченцям. Через ці думки Схарія відомий як 'жид', а його прихильників називають 'жидовствующими'.\n\nЦі вірування стають все більш популярними, і ми повинні на них реагувати."
  skhariya_sect_rebels: "Секта Схарії"
  flavor_nov.14.a: "Протистояти їм!"
  flavor_nov.14.a.tt: "[ShowReligionName('strigolniki')] поширюватимуться #Y повільно#! в сусідніх локаціях"
  skhariya_sect_rebels_massive_support: "[ShowReligionAdjective('strigolniki')] члени всіх наших володінь у [ShowRegionName('russian_region')] приєднаються до [skhariya_sect_rebels.GetName]."
  nov_opposes_skhariya_sect: "Проти секти Схарії"
  flavor_nov.14.b: "Потерпіти їх поки що."
  flavor_nov.14.b.tt: "[ShowReligionName('strigolniki')] поширюватимуться #Y швидко#! в сусідніх локаціях"
  skhariya_sect_rebels_soothed: "[ShowReligionAdjective('strigolniki')] члени всіх наших володінь у [ShowRegionName('russian_region')] будуть заспокоєні."
  nov_tolerates_skhariya_sect: "Толерує секту Схарії"
  flavor_nov.15.title: "Карельське повстання [GetCurrentYear] року"
  flavor_nov.15.desc: "Землі Карелії стали полем битви між [GetCountry('SWE').GetName] та [ROOT.GetCountry.GetName] після того, як перші закріпилися у [ShowLocationName('vyborg')], укріпили його та почали поширювати свій вплив у регіоні, що зіткнулося з [ROOT.GetCountry.GetAdjective] форпостами за річкою Невою. Це призвело до війни, яка завершилася Ньотеборзьким мирним договором у 1323 році.\n\nОднак останнім часом карели, очевидно, були заохочені [GetCountry('SWE').GetGovernment.GetRuler.GetName] повстати проти нас і послабити нашу країну."
  karelian_independence_fighter: "Карельські борці за незалежність"
  flavor_nov.15.a: "Попереду неспокійні часи."
  flavor_nov.15.a.tt: "#R [sweden_country.GetName] може підтримати [karelian_independence_fighter.GetName]...#!"
  flavor_nov.15.b: "Нехай вони об'єднаються зі своїм народом."
  nov_granted_karelian_independence: "Надана незалежність нашому народу"
  flavor_nov.16.title: "Карельське повстання [GetCurrentYear] року – Підтримка Швеції"
  flavor_nov.16.desc: "Землі Карелії стали полем битви між [GetCountry('NOV').GetName] та [ROOT.GetCountry.GetName] після того, як наша країна закріпилася у [ShowLocationName('vyborg')], укріпила його та почала поширювати свій вплив у регіоні, що зіткнулося з [GetCountry('NOV').GetAdjective] форпостами за річкою Невою. Це призвело до війни, яка завершилася Ньотеборзьким мирним договором у 1323 році.\n\nОстаннім часом з'явилася нагода підтримати карелів, щоб вони повстали проти них і послабили їхню країну."
  flavor_nov.16.a: "Ми повинні скористатися цією нагодою!"
  flavor_nov.16.a.tt: "Ми підтримаємо [karelian_independence_fighter.GetName] проти [novgorod_country.GetName].\n#R Це може призвести до подальшої ескалації між нашими державами.#!"
  flavor_nov.16.b: "Ми нічого від цього не отримаємо."
  flavor_nov.17.title: "Карельське повстання [GetCurrentYear] року"
  flavor_nov.17.desc: "[GetCountry('SWE').GetAdjective] активно підтримують Карельське повстання. Якою буде наша відповідь їм?"
  flavor_nov.17.a: "Нам потрібно деескалувати Карельське повстання"
  flavor_nov.17.b: "Зрадники! Це Casus Belli!"
  flavor_nov.18.title: "Карельське повстання [GetCurrentYear] року"
  flavor_nov.18.desc: "[GetCountry('NOV').GetLongName] загострили ситуацію, заявивши, що наша підтримка Карельського повстання дає їм Casus Belli проти нас."
  flavor_nov.18.a: "На жаль..."
  flavor_nov.19.title: "Карельське повстання [GetCurrentYear] року"
  flavor_nov.19.desc: "[GetCountry('NOV').GetLongName] деескалували ситуацію, вирішивши не оскаржувати нашу підтримку Карельського повстання."
  flavor_nov.19.a: "Вони боягузи, ха!"
  flavor_nov.20.title: "Талановитий іконописець просить про покровительство"
  flavor_nov.20.desc: "Постійне покровительство релігійних мистецтв у нашій країні протягом століть сприяє створенню середовища, в якому талановиті іконописці ніколи не залишаються без роботи, причому [SCOPE.sCharacter('novgorodian_iconographer').GetName] є останнім талантом, що з'явився в цій дисципліні."
  flavor_nov.20.a: "Наш Господь, Наша Пані та Всі Святі будуть задоволені!"
  flavor_nov.21.title: "Зростання напруги між [GetCountry('MOS').GetNameWithNoTooltip] та [GetCountry('NOV').GetNameWithNoTooltip]"
  flavor_nov.21.desc: "Суперництво між [GetCountry('MOS').GetLongName] та [ROOT.GetCountry.GetLongName] зростало протягом довгого часу, оскільки їхній [GetCountry('MOS').GetGovernment.GetRulerTitle] традиційно намагався стати [ROOT.GetCountry.GetGovernment.GetRulerTitle] нашої країни та встановити сюзеренітет.\n\nЦе напруження досягло критичної точки, коли лише одна з наших країн може пережити іншу."
  flavor_nov.21.a: "Може бути лише один з нас!"
  flavor_nov.22.title: "Союз із [GetCountry('LIT').GetNameWithNoTooltip]"
  flavor_nov.22.desc: "Зростаюче суперництво з [GetCountry('MOS').GetName] робить мудрим кроком пошук нових союзників поблизу. У цьому відношенні опір [GetCountry('MOS').GetAdjective] впливу очолює відважна жінка, [marfa_boretskaya.GetName], чий чоловік, посадник Ісаак Борецький, загинув у боротьбі з ними. [marfa_boretskaya.GetShortNameWithNoTooltip] тепер виступає за укладення союзу з [GetCountry('LIT').GetName], оскільки вони можуть бути найкращим варіантом для протистояння нашим ворогам."
  flavor_nov.22.a: "[marfa_boretskaya.GetShortNameWithNoTooltip] має рацію, укладімо цей союз!"
  flavor_nov.22.a.tt: "[marfa_boretskaya.GetName] вирушить до [GetCountry('LIT').GetName], щоб укласти союз для нашої держави"
  flavor_nov.22.b: "Нам не потрібна іноземна підтримка"
  flavor_nov.23.title: "Союз із [GetCountry('NOV').GetNameWithNoTooltip]"
  flavor_nov.23.desc: "Зростаюче суперництво між [GetCountry('NOV').GetName] та [GetCountry('MOS').GetName] змусило перших шукати нових союзів. Заохочені відважною жінкою, [marfa_boretskaya.GetName], їхні посланці прибули до нашого двору і намагаються переконати нас стати партнерами та підтримати їх."
  flavor_nov.23.a: "[marfa_boretskaya.GetNameWithNoTooltip] говорить правду!"
  flavor_nov.23.b: "Ці справи серед росіян не наша справа."
  nov_refused_alliance_with_novgorod: "Відмовлено в союзі з [GetCountry('NOV').GetName]"
  nov_accepted_alliance_with_novgorod: "Прийнято союз із [GetCountry('NOV').GetName]"
  nov_refused_alliance_with_us: "Відмовлено в союзі з нами"
  nov_accepted_alliance_with_us: "Прийнято союз із нами"
  flavor_nov.24.title: "Союз із [GetCountry('LIT').GetNameWithNoTooltip]"
  flavor_nov.24.desc: "Наші посланці до [GetCountry('LIT').GetName] повернулися з добрими вістями: [GetCountry('LIT').GetNameWithNoTooltip] вирішило стати нашим союзником!"
  flavor_nov.24.a: "[marfa_boretskaya.GetName] мала рацію весь час!"
  flavor_nov.25.title: "Союз із [GetCountry('LIT').GetNameWithNoTooltip]"
  flavor_nov.25.desc: "Наші посланці до [GetCountry('LIT').GetName] повернулися з поганими вістями: [GetCountry('LIT').GetNameWithNoTooltip] відмовилося стати нашим союзником!"
  flavor_nov.25.a: "Чому ми довіряли цій жінці?"
  flavor_nov.26.title: "Різанина в [novgorod_city.GetNameWithNoTooltip]"
  flavor_nov.26.desc: "Місто [novgorod_city.GetName] потрапило до рук ворога. Проте опір міста завжди був значним. Місцеві окупанти помітили впертість нашого народу і вчинили невимовні дії, щоб «відновити порядок».\n\nСолдати та найманці однаковою мірою увійшли до міста, зібрали місцеве населення та вчинили різанину над невинними."
  flavor_nov.26.a: "Вони заплатять за це..."
  nov_massacred_our_people: "Вирізали наш народ"
  flavor_nov.28.title: "Заснування [target_location.GetNameWithNoTooltip]"
  flavor_nov.28.desc: "Гирло річки Двіни на Білому морі в останні десятиліття все частіше стає центром торгівлі в північних землях. Мандрівні купці зазвичай зупиняються в монастирі, присвяченому Архангелу Михаїлу, де вони укладають свої угоди. Однак вони почали вимагати певної інфраструктури, яка дозволила б процвітаючій торгівлі цих земель зростати у більших масштабах. Деякі з наших радників висунули ідею заснування там портового міста, яке буде названо [target_location.GetName] на честь монастиря."
  flavor_nov.28.a: "Це чудове місце для нового міста!"
  flavor_nov.28.b: "Це того не варте."
  flavor_nov.30.title: "Софійський собор"
  flavor_nov.30.desc: "Софійський собор, також відомий як [house_of_holy_wisdom_art.GetName], у [ShowLocationName('novgorod')] є духовним центром нашого [ROOT.GetCountry.GetFlavorRank], символом самого міста і навіть його володіння землею на нашій території. За багато років собор став підвладним часу і потребує реставрації. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] були б більш ніж задоволені, якби ми інвестували в оновлення будівлі."
  flavor_nov.30.a: "Підтримати реставраційні роботи."
  flavor_nov.30.b: "Ми не можемо собі цього дозволити."
  flavor_nov.31.title: "[GetCountry('MOS').GetAdjectiveWithNoTooltip] Загроза наступає!"
  flavor_nov.31.desc: "[GetCountry('MOS').GetGovernment.GetRuler.GetName] з [GetCountry('MOS').GetName] вирішив(ла) утвердити [GetCountry('MOS').GetGovernment.GetRuler.GetHerHis] владу над нами. Навіть якщо ми оберемо їхнього [GetCountry('MOS').GetGovernment.GetRulerTitle] як нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], ми гордо незалежні, і вони повинні підкорятися рішенням нашої Ради.\n\nМи повинні захищатися від цієї загрози зараз, інакше основи нашої держави будуть підірвані."
  flavor_nov.31.a: "До зброї!"
  flavor_nov.32.title: "Руйнівний Яжелбицький договір"
  flavor_nov.32.desc: "Десятиліття суперництва між князівствами [GetCountry('MOS').GetName] та [GetCountry('NOV').GetName] добігають кінця, хоча й не найкращим чином для нас. [GetCountry('MOS').GetAdjective] загроза тепер реальніша, ніж будь-коли, оскільки вони уклали ранні договори, що сигналізує про їхню перемогу у війні, яку ми вели. Вони прагнуть принизити нас у майбутньому та обмежити наші майбутні дії."
  flavor_nov.32.a: "Це справді погані знаки..."
  flavor_nov.33.title: "Посадницька реформа"
  flavor_nov.33.desc: "Посада посадника є впливовою в місті [ShowLocationName('novgorod')]. Щоб уникнути монополії влади в руках однієї людини, серед членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] зростає консенсус щодо необхідності розширення цієї посади, щоб кілька людей могли обіймати її одночасно і контролювати один одного."
  flavor_nov.33.a: "Чудова ідея!"
  flavor_nov.33.b: "Ці реформи того не варті."
  flavor_nov.34.title: "Рада Господ"
  flavor_nov.34.desc: "Пани міста [ShowLocationName('novgorod')] все частіше стають органом прийняття рішень [ROOT.GetCountry.GetFlavorRank], створюючи інституцію, де відбуваються політичні дебати, — Раду Господ. На відміну від вічової системи, Рада Господ має на меті надати більше влади посадникам, тисяцьким та іншим членам [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], тоді як вплив [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] у цій системі є незначним."
  flavor_nov.34.a: "Рада Господ керуватиме нашою країною!"
  flavor_nov.34.b: "Не дозволяйте панам захопити більше влади!"
  flavor_nov.35.title: "Заснування [target_location.GetNameWithNoTooltip] монастиря"
  flavor_nov.35.desc: "На півночі, в Онезькій затоці, є група островів, Соловецькі, відомі багатством своїх солеварень, серед інших ресурсів. Нещодавно два ченці, Герман і Савватій, заснували в цьому віддаленому місці монастир. Інший чернець, на ім'я Зосима, прийшов до нас, просячи благочестивого покровительства.\n\nЦей монастир міг би стати важливим релігійним центром на Білому морі, якби ми підтримали Зосиму як його ігумена або настоятеля та профінансували його розвиток."
  flavor_nov.35.a: "Покровительствувати монастирю!"
  flavor_nov.35.b: "Ці ченці хоробрі самі по собі!"
  flavor_nov.36.title: "[ShowPolicyNameWithNoTooltip('novgorod_judicial_charter_policy')]"
  flavor_nov.36.desc: "[ShowPolicyName('russkaya_pravda_policy')] була частиною нашої адміністрації з моменту заснування [target_country.GetLongName]. Хоча багато аспектів цього закону застосовні до нас, деякі інші частини стали менш актуальними для нас, оскільки адміністрація та обставини мають тенденцію змінюватися. Настав час кодифікувати новий закон, [ShowPolicyName('novgorod_judicial_charter_policy')], для держави."
  flavor_nov.36.a: "Впровадити [ShowPolicyNameWithNoTooltip('novgorod_judicial_charter_policy')]."
  flavor_nov.36.b: "Старий правовий кодекс працює чудово."
  flavor_psk.1.title: "Новий уряд для [ROOT.GetCountry.GetNameWithNoTooltip]?"
  flavor_psk.1.desc: "З нашою незалежністю від [overlord_country.GetLongName] постало питання про новий уряд. Під владою [overlord_country.GetNameWithNoTooltip] [ROOT.GetCountry.GetNameWithNoTooltip] пережила процвітання та багатство [ShowGovernmentReformName('veche_republic')]. Голоси в нашій державі вимагають, щоб ми прийняли систему Віча для себе, щоб народ [ROOT.GetCountry.GetNameWithNoTooltip] міг бути приведений до світлого майбутнього."
  flavor_psk.1.a: "Ми організуємося в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Республіку!"
  flavor_psk.1.b: "Наша нинішня система працює досить добре."
  flavor_nov.100.title: "[ShowEstatePrivilegeNameWithNoTooltip('novgorod_ivans_hundred')] Купецька Асоціація"
  flavor_nov.100.desc: "Будучи одним з головних центрів торгівлі, [ROOT.GetCountry.GetName] став домом для багатьох могутніх купецьких асоціацій. Серед цих асоціацій, однак, [ShowEstatePrivilegeName('novgorod_ivans_hundred')] є однією з найвпливовіших, підтримуючи міцний контроль над торгівлею [ShowGoodsName('beeswax')]. Прагнучи розширити свій вплив, багато високопоставлених чиновників асоціації звернулися до [our_ruler.GetName] та Віча в надії отримати подальшу підтримку. Деякі представники [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] тихо закликали [our_ruler.GetNameWithNoTooltip] уникати подальшого посилення асоціації, оскільки вона може отримати занадто великий вплив на торгівлю [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_nov.100.a: "Надати їм посилену підтримку від Віча."
  flavor_nov.100.b: "Натомість ізолювати [ShowEstatePrivilegeNameWithNoTooltip('novgorod_ivans_hundred')]."
  empower_ivan_hundred_privilege: "[ShowEstatePrivilegeName('novgorod_ivans_hundred')] отримає наступне на 25 років:\n#R -5.00%#! [ShowModifierTypeName('global_crown_estate_power')] та #G +20.00%#! [ShowModifierTypeName('global_merchant_capacity_modifier')]"
  ivan_hundred_strengthened: "Зміцнено Іванову Сотню"
  ivan_hundred_strengthened_requirement: "Наступний бонус можна отримати від $flavor_nov.100.title$ [Concept('dynamic_historical_event', 'CONCEPT_PLACEHOLDER')|e]:"
  flavor_nov.101.title: "[ShowEstatePrivilegeNameWithNoTooltip('novgorod_ivans_hundred')] Запитує Монополію на [ShowGoodsNameWithNoTooltip('beeswax')]"
  flavor_nov.101.desc: "Після додаткової підтримки від Віча, [ShowEstatePrivilegeName('novgorod_ivans_hundred')] почали насолоджуватися своїм вищим статусом. Прагнучи отримати подальшу підтримку для своїх починань, асоціація попросила надати їй виключну монополію на виробництво [ShowGoodsName('beeswax')] у Новгороді. Хоча асоціація завжди мала великий вплив на торгівлю, монополія міцно закріпила б їхній контроль над товаром."
  flavor_nov.101.a: "Задовольнити запит на більший вплив на торгівлю [ShowGoodsNameWithNoTooltip('beeswax')]."
  flavor_nov.101.b: "Запобігти посиленню [ShowEstatePrivilegeNameWithNoTooltip('novgorod_ivans_hundred')]."
  ivan_hundred_beeswax: "Більший вплив на торгівлю воском"
  ivan_hundred_beeswax_increase: "[ShowEstatePrivilegeName('novgorod_ivans_hundred')] отримає наступне на 25 років:\n#G +10.00%#! [ShowModifierTypeName('trade_efficiency')] та #G +25.00%#! [ShowModifierTypeName('global_beeswax_output_modifier')]"
  ivan_hundred_beeswax_increase_requirement: "Наступний бонус можна отримати від $flavor_nov.101.title$ [Concept('dynamic_historical_event', 'CONCEPT_PLACEHOLDER')|e]:"
  flavor_nov.102.title: "[hansa_country.GetAdjectiveWithNoTooltip] Контора в Петергофі"
  flavor_nov.102.desc: "Хоча відносини між [hansa_country.GetName] та купцями [ROOT.GetCountry.GetName] завжди були напруженими через торгівлю в Балтійському морі, [ROOT.GetCountry.GetGovernment.GetRulerTitle] та Віче постійно дозволяли [hansa_country.GetNameWithNoTooltip] утримувати Контору в [ShowLocationName('neva')]. Однак останнім часом Контора стала предметом суперечок, оскільки різні купецькі асоціації в [ROOT.GetCountry.GetNameWithNoTooltip] висловлювали претензії щодо надмірного впливу [hansa_country.GetAdjectiveWithNoTooltip] купців на торгівлю. Щоб протидіяти зростаючому впливу Контори, деякі члени Віча запропонували захопити контроль над Петергофською Конторою в [ShowLocationNameWithNoTooltip('neva')] для захисту [ROOT.GetCountry.GetAdjectiveWithNoTooltip] інтересів, хоча така дія, безсумнівно, розгніває [hansa_country.GetNameWithNoTooltip]."
  flavor_nov.102.a: "Прагніть контролювати Петергофську контору."
  flavor_nov.102.b: "Натомість прагніть мирного співіснування з [hansa_country.GetNameWithNoTooltip]."
  flavor_nov.103.title: "Захоплення Петергофа приносить вигоду"
  flavor_nov.103.desc: "Попри те, що це ризикований крок у наших і без того напружених стосунках з [hansa_country.GetName], наше захоплення Петергофської контори досі виявилося вартісною авантюрою. [ROOT.GetCountry.GetAdjective] купці значною мірою відновили торговельну перевагу в [ShowLocationName('neva')], тоді як вплив [hansa_country.GetAdjectiveWithNoTooltip] значною мірою ослаб. Хоча контора залишається активною, багато купців, які раніше співпрацювали з [hansa_country.GetNameWithNoTooltip], почали вести торгівлю, що приносить вигоду [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_nov.103.a: "Захоплення Петергофа було вартісною авантюрою."
  flavor_nov.104.title: "Фінансування ушкуйників-піратів"
  flavor_nov.104.desc: "Хоча ушкуйники були значною мірою активними протягом століть по всій [ROOT.GetCountry.GetName], вони здебільшого залишалися розбійницькою групою, яка отримувала заступництво різних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] родин для націлювання на торговельних суперників. Однак останнім часом члени [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] також почали фінансувати цих піратів. Зі зростанням різних князівств багато хто закликав Віче та [our_ruler.GetName] офіційно дозволити санкціонування використання ушкуйників, щоб будь-яка торговельна загроза для [ROOT.GetCountry.GetNameWithNoTooltip] могла бути піддана їхньому піратству."
  flavor_nov.104.a: "Погодьтеся запропонувати фінансування Віче для ушкуйницьких підприємств."
  flavor_nov.104.b: "Не варто гнівити інші князівства."
  enable_ushkuiniks_advance: "Надає доступ до [ShowAdvanceName('ushkuiniks')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_nov.105.title: "Зростаючі рухи за розпуск ушкуйників"
  flavor_nov.105.desc: "Хоча ушкуйники добре служили різним [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] родинам та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] гільдіям у минулі століття, в останні роки вони стали політичною перешкодою по всьому [ShowRegionName('russian_region')]. Повторювана агресія ушкуйників стала проблематичною, оскільки багато піратів діяли далеко за межами своїх намічених цілей, спричиняючи більше руйнувань, ніж впливу. Оскільки ушкуйники тепер розглядаються як організація-парія, деякі члени Віче звернулися до [our_ruler.GetName] з проханням видати указ про їх розпуск, щоб допомогти [ROOT.GetCountry.GetName] відновити свій імідж."
  flavor_nov.105.a: "У нас немає вибору, окрім як розпустити ушкуйників."
  flavor_nov.105.b: "Ушкуйники добре нам служили, це з часом мине."
  ushkuiniks_greatly_weakened_tt: "Хоча [ShowAdvanceName('ushkuiniks')] втратить підтримку [ROOT.GetCountry.GetLongName], менші залишки продовжуватимуть існувати по всьому [ShowRegionName('russian_region')]."
  flavor_nov.106.title: "Продовження розширення посадника"
  flavor_nov.106.desc: "Хоча зусилля [target_character.GetName] з розширення посадництва призвели до того, що посада вийшла за межі одноосібної влади, деякі члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вважають, що [target_character.GetHisHer] реформи зайшли недостатньо далеко. Прагнучи розширити посаду втричі, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] попросили створити додаткову посаду, #italic Степенного посадника#!, що дозволить мати ще одну виборну посаду у Віче. Однак деякі члени [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] побоюються, що це лише призведе до подальшої консолідації влади в руках [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] родин [ROOT.GetCountry.GetName]."
  flavor_nov.106.a: "Розширити посадників утричі!"
  flavor_nov.106.b: "Обмежимося оригінальними реформами [target_character.GetLastNameWithNoTooltip]."
  nov_expanded_posadnik: "Подальше розширення посадника"
  nov_expanded_posadnik_risk: "Подальше розширення посадника може спричинити зростання корупції в цій посаді в майбутньому."
  flavor_nov.107.title: "Захоплені посади посадників"
  flavor_nov.107.desc: "Хоча минулі реформи посадника були спрямовані на зменшення контролю влади над посадою однією особою, вони значною мірою мали зворотний ефект, призвівши до того, що посади потрапили під контроль найвпливовіших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] родин. Хоча це виборна посада, ці посади вже досить давно послідовно обіймаються членами однієї й тієї ж [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] родини.\n\nВважаючи посадника посадою, яка стала захопленою, багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] закликали до скасування минулих реформ у надії обмежити владу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Однак таке скасування посад, безсумнівно, викличе гнів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] родин."
  flavor_nov.107.a: "У нас немає вибору, окрім як дозволити посадам залишитися."
  flavor_nov.107.b: "Примусово скасувати деякі посади посадників, щоб обмежити владу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_nov.108.title: "Скасування посадництва"
  flavor_nov.108.desc: "Хоча за останнє століття посада зазнала значних змін, посадництво значною мірою перетворилося на корумповану посаду, яка, хоч і під виглядом виборної, безпосередньо успадковується членами [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Значно розширивши вплив [ROOT.GetCountry.GetName], [our_ruler.GetName] запросив підтримку у Вічі для скасування цих посад, розглядаючи їх як адміністративний тягар для зростаючої [ROOT.GetCountry.GetAdjectiveWithNoTooltip] держави. Хоча [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] залишається сильною одиницею, їхня влада значною мірою зменшилася завдяки впливу [our_ruler.GetNameWithNoTooltip] на Віче."
  flavor_nov.108.a: "Настав час позбутися цих корумпованих посад."
  flavor_nov.108.b: "Зберегти посадництво, посада все ще має свої переваги."
  flavor_nov.109.title: "Старий тисяцький"
  flavor_nov.109.desc: "Хоча [ShowEstatePrivilegeName('tysiatskii_privilege')] залишалася виборною посадою в [ROOT.GetCountry.GetName], вона значною мірою залишалася посадою, яку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] тримала під пильним контролем, причому багато обраних тисяцьких часто походили з родин [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Однак останнім часом, навіть після відходу з посади, колишні тисяцькі стали зберігати значний вплив на наступні вибори, часто виступаючи за те, щоб їхній син успадкував цю посаду. Відомі як #italic Старі тисяцькі#!, ці особи стали силою, з якою доводиться рахуватися у Вічі."
  flavor_nov.109.a: "Ми повинні прагнути використовувати їхній вплив."
  flavor_nov.109.b: "Прагнути послабити вплив [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] на цю посаду."
  nov_influential_tysiatskii: "Впливовий тисяцький"
  nov_tysiatskii_influence_weakened: "Вплив тисяцького ослаблено"
  nov_influential_tysiatskii_benefits: "[ShowEstatePrivilegeName('tysiatskii_privilege')] отримає наступне на 30 років:\n#G +25.00%#! [ShowModifierTypeName('global_nobles_estate_power')] та #G +15.00%#! [ShowModifierTypeName('army_infantry_power')]"
  nov_tysiatskii_influence_weakened_benefits: "[ShowEstatePrivilegeName('tysiatskii_privilege')] отримає наступне на 30 років:\n#R -25.00%#! [ShowModifierTypeName('global_nobles_estate_power')] та #G +0.10#! [ShowModifierTypeName('stability_investment')]"
  nov_tysiatskii_influence_event_happened: "Тисяцький здобув більше впливу!"
  nov_tysiatskii_influence_event_happened_possible_event: "Тисяцький може спробувати утвердитися над [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] у майбутньому!"
  nov_influential_tysiatskii_requirement: "Наступний бонус можна отримати від $flavor_nov.109.title$ [Concept('dynamic_historical_event', 'CONCEPT_PLACEHOLDER')|e]:"
  nov_tysiatskii_influence_weakened_requirement: "Наступний бонус можна отримати від $flavor_nov.109.title$ [Concept('dynamic_historical_event', 'CONCEPT_PLACEHOLDER')|e]:"
  flavor_nov.110.title: "Тисяцький вимагає податок на [ShowEstatePrivilegeNameWithNoTooltip('novgorod_ivans_hundred')]"
  flavor_nov.110.desc: "Розглядаючи це значною мірою як боротьбу за владу між [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], нинішній тисяцький звернувся до [our_ruler.GetName] за підтримкою Віча, щоб запровадити суворіший податок на [ShowEstatePrivilegeName('novgorod_ivans_hundred')]. Хоча члени [ShowEstatePrivilegeNameWithNoTooltip('novgorod_ivans_hundred')] повинні сплачувати значний вступний внесок для участі в асоціації, а також дарунки власнику посади тисяцького, нинішній тисяцький натомість вимагає, щоб частина цих зборів була перенаправлена до його посади. Деякі члени [ShowEstatePrivilegeNameWithNoTooltip('novgorod_ivans_hundred')] засудили цей крок як спробу тисяцького розширити свій вплив."
  flavor_nov.110.a: "Задовольнити прохання тисяцького про додатковий збір на [ShowEstatePrivilegeNameWithNoTooltip('novgorod_ivans_hundred')]."
  flavor_nov.110.b: "Відмовити тисяцькому в його бажаннях."
  flavor_nov.111.title: "Розширення впливу [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_nov.111.desc: "Хоча [ShowLocationName('novgorod')] служив серцем Віча, його здатність підтримувати вплив над містами та поселеннями у віддалених регіонах значною мірою виявилася складною. Хоча в минулому правлячий [ROOT.GetCountry.GetGovernment.GetRulerTitle] здебільшого дозволяв цим регіонам зберігати певну автономію, [our_ruler.GetName] натомість обрав інший підхід. Якщо [ROOT.GetCountry.GetName] вдасться підпорядкувати ці автономні регіони прямому впливу, це дозволить [ShowGovernmentTypeName('republic')] витримати будь-які майбутні загрози."
  flavor_nov.111.a: "Ми повинні прагнути зменшити автономію цих віддалених регіонів."
  flavor_nov.111.b: "Дозволити віддаленим регіонам зберегти самоврядування."
  flavor_nov.112.title: "Карбування новгородки"
  flavor_nov.112.desc: "Протягом своєї історії [ROOT.GetCountry.GetName] підтримувала практику обміну різноманітних валют як засіб торгівлі. Завдяки цьому процесу купці [ROOT.GetCountry.GetNameWithNoTooltip] зуміли зберегти певну гнучкість у торгівлі товарами з інших балтійських народів. Однак, прагнучи встановити унікальну валюту для держави, [our_ruler.GetName] розпочав карбування перших новгородок, валюти, яка, як [our_ruler.GetHisHer] сподівається, стане символом [ROOT.GetCountry.GetNameWithNoTooltip] за нашими кордонами. Деякі купці, однак, побоюються, що це може порушити репутацію, яку [ROOT.GetCountry.GetNameWithNoTooltip] здобула завдяки своїй гнучкості у використанні іноземних монет."
  flavor_nov.112.a: "Карбувати новгородку!"
  flavor_nov.112.b: "Дозволити подальше використання інших валют для торгівлі."
  flavor_nov.113.title: "Впровадження порохової зброї"
  flavor_nov.113.desc: "Хоча чутки про нову форму озброєння вже деякий час були відомі на вулицях [ShowLocationName('novgorod')], купці зі сходу прибули, привозячи цю зброю для торгівлі. Прагнучи зрозуміти цю зброю, перш ніж ворожі князівства зможуть її освоїти, [our_ruler.GetName] звернувся до Віче з проханням придбати цю вогнепальну зброю в надії відтворити її, щоб зберегти перевагу над нашими суперниками."
  flavor_nov.113.a: "Прагнути опанувати цю нову зброю."
  flavor_nov.113.b: "Інші торговельні питання мають бути більшим пріоритетом для [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_nov.114.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] монополія на торгівлю [ShowGoodsNameWithNoTooltip('beeswax')] та [ShowGoodsNameWithNoTooltip('fur')]"
  flavor_nov.114.desc: "Хоча наші купці вже давно підтримують значний вплив на постачання [ShowGoodsName('beeswax')] та [ShowGoodsName('fur')], в останні десятиліття різні купецькі об'єднання в [ROOT.GetCountry.GetName] лише посилили свій контроль над цими ресурсами. Вважаючи це грошовою вигодою для [ROOT.GetCountry.GetNameWithNoTooltip], [our_ruler.GetName] та інші члени Віче надали додаткові привілеї [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] в надії зберегти монополію на ці товари в осяжному майбутньому."
  flavor_nov.114.a: "Ми повинні скористатися цією торговою монополією, поки можемо."