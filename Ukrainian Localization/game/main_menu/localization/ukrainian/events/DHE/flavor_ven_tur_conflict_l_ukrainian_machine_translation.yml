l_english:
  flavor_ven_tur_conflict.1000.title: "Зародження конфлікту"
  flavor_ven_tur_conflict.1000.desc: "Падіння міста [ShowLocationName('constantinople')] до рук [rising_power.GetLongName], хоч і не завдало нам горя, проте серйозно вплинуло на наші торгові шляхи до [ShowAreaName('black_sea_area')|U]. Їхні тарифи та торгове втручання гнівають багатьох наших купців, які вимагають, аби ми діяли на їхній захист за будь-яку ціну.\n\nМи могли б попросити [rising_power.GetNameWithNoTooltip] передати нам інший торговий порт у Східному Середземномор'ї, щоб компенсувати наші втрати."
  flavor_ven_tur_conflict.1000.historical_info: "З моменту захоплення [ShowLocationNameWithNoTooltip('constantinople')] турками 29 травня 1453 року, [ROOT.GetCountry.GetName] спостерігала за погіршенням своїх комерційних позицій у [ShowAreaNameWithNoTooltip('black_sea_area')|U]. Численні війни точилися між 1456 та 1490 роками, зіштовхуючи [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] проти [rising_power.GetNameWithNoTooltip], наслідком чого [ROOT.GetCountry.GetNameWithNoTooltip] втратила більше частин своєї комерційної імперії (успадкованої від Четвертого хрестового походу 1204 року) в [ShowProvinceDefinitionName('aegean_sea_province')] та Греції ([ShowLocationName('athens')] у 1460, [ShowLocationName('negroponte')] у 1470). Війна знову спалахнула у 1499 році, [ROOT.GetCountry.GetNameWithNoTooltip] втратила фортеці в [ShowAreaName('morea_area')|U], такі як [ShowLocationName('modon')], Корон та Наваррін."
  flavor_ven_tur_conflict.1000.a: "Вимагати [ShowLocationNameWithNoTooltip('alexandria')] як компенсацію!"
  flavor_ven_tur_conflict.1000.b: "Прийняти їхнє розширення"
  flavor_ven_tur_conflict.1001.title: "Зародження конфлікту"
  flavor_ven_tur_conflict.1001.desc: "Регіт невірних купців, що називають себе [origin_tag.GetLongName], скаржиться нашому великому [ROOT.GetCountry.GetGovernment.GetRulerTitle], що з часу нашого завоювання міста [ShowLocationName('constantinople')] їхні торгові шляхи були обкладені податками та втратили вигоди. Вони вимагають, щоб ми віддали їм портове місто [ShowLocationName('alexandria')] для покриття їхніх втрат."
  flavor_ven_tur_conflict.1001.historical_info: "З моменту захоплення [ShowLocationNameWithNoTooltip('constantinople')] турками 29 травня 1453 року, [GetCountry('VEN').GetName] спостерігала за погіршенням своїх комерційних позицій у [ShowAreaName('black_sea_area')|U]. Численні війни точилися між 1456 та 1490 роками, зіштовхуючи [GetCountry('VEN').GetGovernment.GetGovernmentType.GetName] проти [ROOT.GetCountry.GetName], наслідком чого [GetCountry('VEN').GetNameWithNoTooltip] втратила більше частин своєї комерційної імперії (успадкованої від Четвертого хрестового походу 1204 року) в [ShowProvinceDefinitionName('aegean_sea_province')] та Греції ([ShowLocationName('athens')] у 1460, [ShowLocationName('negroponte')] у 1470). Війна знову спалахнула у 1499 році, [GetCountry('VEN').GetNameWithNoTooltip] втратила фортеці в [ShowAreaName('morea_area')|U], такі як [ShowLocationName('modon')], Корон та Наваррін."
  flavor_ven_tur_conflict.1001.a: "Відмовитися обговорювати компенсацію"
  flavor_ven_tur_conflict.1001.b: "Віддати [ShowLocationNameWithNoTooltip('alexandria')] як компенсацію"
  flavor_ven_tur_conflict.1002.title: "У компенсації відмовлено"
  flavor_ven_tur_conflict.1002.desc: "Турки відмовляються навіть обговорювати компенсацію за наші торгові втрати!"
  flavor_ven_tur_conflict.1002.a: "Принаймні тепер ми маємо на неї претензію"
  flavor_ven_tur_conflict.1003.title: "[ShowLocationNameWithNoTooltip('alexandria')] здобуто"
  flavor_ven_tur_conflict.1003.desc: "Турки погодилися компенсувати наші торгові втрати містом [ShowLocationName('alexandria')]."
  flavor_ven_tur_conflict.1003.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven_tur_conflict.1100.title: "[GetCountry('TUR').GetAdjectiveWithNoTooltip] контроль над [ShowAreaNameWithNoTooltip('morea_area')|U]"
  flavor_ven_tur_conflict.1100.desc: "Після падіння [ShowLocationName('constantinople')] турки повернули на південь, і в 1461 році остання фортеця в [ShowAreaName('morea_area')|U] впала до [GetCountry('TUR').GetName]. Цей півострів був надто важливим для [ROOT.GetCountry.GetAdjective] торгових шляхів, щоб його ігнорувати, і він став причиною багатьох війн між [ROOT.GetCountry.GetNameWithNoTooltip] та [GetCountry('TUR').GetNameWithNoTooltip], оскільки [ROOT.GetCountry.GetNameWithNoTooltip] висувала претензії на [ShowAreaNameWithNoTooltip('morea_area')|U].\nЩо нам робити?"
  flavor_ven_tur_conflict.1100.a: "Сьогодні гарний день для [GetCountry('TUR').GetNameWithNoTooltip], щоб померти!"
  ven_opinion_morean_confrontation: "Морейське протистояння"
  flavor_ven_tur_conflict.1100.b: "Ми не можемо ризикувати війною"
  flavor_ven_tur_conflict.1101.title: "[origin_tag.GetAdjectiveWithNoTooltip] претензії на [ShowAreaNameWithNoTooltip('morea_area')|U]"
  flavor_ven_tur_conflict.1101.desc: "Посол від [origin_tag.GetName] щойно повідомив нам, що вони висунули претензії на півострів [ShowAreaName('morea_area')|U]. Це неприйнятно, і вони повинні бути покарані."
  flavor_ven_tur_conflict.1101.a: "Це означає війну!"