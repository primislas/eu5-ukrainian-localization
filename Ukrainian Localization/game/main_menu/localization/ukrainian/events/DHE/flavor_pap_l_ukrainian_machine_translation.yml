l_english:
  flavor_pap.1.title: "Реорганізація Святої Інквізиції"
  flavor_pap.1.desc: "За ініціативи [future_paul_iv_scope.GetName] з [ShowLocationName('naples')], [ROOT.GetCountry.GetGovernment.GetRulerTitle] реорганізував Римську інквізицію за іспанським зразком. Разом з єзуїтами на народ було накладено панування терору. Однак жорстокі методи є ефективними і призводять до повного викорінення [ShowReligionAdjective('lutheran')] руху на Італійському півострові."
  flavor_pap.1.a: "Іспанська модель інквізиції"
  flavor_pap.1.b: "Помірна інквізиція"
  flavor_pap.2.title: "[target_character.GetNameWithNoTooltip]"
  flavor_pap.2.desc: "[target_character.GetName] є теологом, який ототожнює Бога з Природою. Хоча він стверджує, що є побожним [ShowReligionGroupAdjective('christian')], він як захищає погляд Коперника на космос, так і сатиризує сліпу віру в релігію. Його заарештували у [ShowLocationName('venice')] і екстрадували до [ShowLocationName('rome')], де він зараз перебуває під судом."
  flavor_pap.2.a: "Спалити єретика"
  flavor_pap.2.b: "Зберегти йому життя"
  borgia_pope_tt: "[borgia_pope_scope.GetName] стане новим Папою!"
  flavor_pap.4.title: "[borgia_pope_scope.GetLastNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_pap.4.desc: "Білий дим виходить з даху Сикстинської капели. Серед звинувачень у симонії Конклав обрав [borgia_pope_scope.GetName], архієпископа [ShowLocationName('valencia')], на Престол Святого Петра. [borgia_pope_scope.GetLastNameWithNoTooltip]и є відносно недавнім прибуттям на арену римської політики і викликали гнів більш усталених римських родин, які прагнули цієї посади для себе. Хоча багато чуток, що оточують цього [borgia_pope_scope.GetLastNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetRulerTitle], ймовірно, є перебільшеннями, поширюваними його ворогами, він відомий тим, що відкрито тримає коханку, і вже підніс свого сина-підлітка [borgia_pope_son_scope.GetName] до рангу кардинала. Поширюються припущення, що правління цього [ROOT.GetCountry.GetGovernment.GetRulerTitle] буде сповнене скандалів і корупції."
  flavor_pap.4.a: "[ROOT.GetCountry.GetNameWithNoTooltip] виживе."
  flavor_pap.5.title: "[caesar_borgia_scope.GetNameWithNoTooltip]"
  flavor_pap.5.desc: "[caesar_borgia_scope.GetName], син [ROOT.GetCountry.GetGovernment.GetRulerTitle], став першою людиною, яка коли-небудь відмовилася від посади кардинала. Натомість шукаючи кар'єру військового авантюриста, він вже довів себе як здібний і безжальний кондотьєр. Святий Отець вирішив визнати його здібності, надавши [caesar_borgia_scope.GetShortNameWithNoTooltip] роль Генерал-капітана Церкви, давши йому контроль над [ROOT.GetCountry.GetAdjective] арміями."
  flavor_pap.5.a: "Aut Caesar, aut nihil."
  flavor_pap.6.title: "Скандалізована [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_pap.6.desc: "Безліч жорстоких чуток оточує діяння родини Борджіа. Поширюються звинувачення у вбивствах за допомогою Кантарелли, нібито смертельної та важковиявлюваної отрути, використовуваної для усунення політичних суперників. Кажуть, що сам Святий Отець регулярно займається симонією та корупцією, і навіть більш непристойні вчинки шепочуться про стосунки між його дітьми, [caesar_borgia_scope.GetShortName] та [lucrecia_borgia_scope.GetName]. Хоча, схоже, мало доказів цих звинувачень, їм широко вірять [ShowReligionAdjective('catholic')] люди по всьому світу."
  flavor_pap.6.a: "Брехня і наклеп!"
  flavor_pap.6.b: "Ми можемо обернути цю ситуацію на нашу користь."
  flavor_pap.7.title: "Кінець [GetCharacter('rodrigo_borgia').GetLastNameWithNoTooltip] [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_pap.7.desc: "Смерть [GetCharacter('rodrigo_borgia').GetLastNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetRulerTitle] була зустрінута тихою радістю серед патриціанських родин [ShowLocationName('rome')]. Кардинали обрали одного з найзавзятіших суперників [GetCharacter('rodrigo_borgia').GetLastNameWithNoTooltip], щоб замінити його. [target_character.GetName] обіцяє скасувати корупцію свого попередника та відновити довіру до святості Церкви. Тим часом [caesar_borgia_scope.GetName] побачив, як його влада обвалилася за одну ніч без [ROOT.GetCountry.GetAdjective] підтримки. Побоюючись за своє життя, він втік до [GetCountry('NAV').GetName], де сподівається знайти порятунок від своїх ворогів."
  flavor_pap.7.a: "Церква повинна відновити свою репутацію."
  flavor_pap.8.title: "Чутки про чаклунство"
  flavor_pap.8.desc: "[target_character.GetName] є добре відомою фігурою всередині [GetInternationalOrganization('catholic_church').GetName]. [target_character.GetSheHe|U] є завзятим прихильником існування відьом та їхнього злого впливу на бідні [ShowReligionAdjective('catholic')] душі. [target_character.GetHerHis|U] завзятість зустрічає лише суперечливу реакцію, яку [target_character.GetSheHe] викликає в інших членів нашої [GetInternationalOrganization('catholic_church').GetNameWithNoTooltip]. Кілька єпископів відмовили [target_character.GetNameWithNoTooltip] у праві судити над передбачуваними відьмами на підставі порушення [ShowReligionAdjectiveWithNoTooltip('catholic')] доктрини.\n\nЩоб не допустити переростання конфлікту у широкомасштабний розкол [GetInternationalOrganization('catholic_church').GetNameWithNoTooltip], ми повинні чітко висловити свою позицію щодо чаклунства та єресі."
  flavor_pap.8.a: "Чаклунство є явною ознакою єресі."
  flavor_pap.8.b: "Дурниці, відьом не існує!"
  flavor_pap.8.historical_info: "Генріх Крамер був домініканським ченцем, чия діяльність мала великий вплив на ставлення до чаклунства та початок відьомських процесів у Центральній Європі. Взявши участь у відьомському процесі в Равенсбурзі в 1482 році, він розробив текст того, що пізніше стане папською буллою #italic Summis desiderantes affectibus#!. Крамер, залишаючись суперечливою фігурою, був вигнаний з Інсбрука після того, як переслідування місцевої жінки закінчилося виправданням. Під час подорожі до Кельна він почав розробляти #italic Malleus Maleficarum#!, Молот Відьом, що дало йому подальшу владу в переслідуванні ймовірних відьом на землях Священної Римської імперії."
  flavor_pap.9.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] закликає до Апостольського податку"
  flavor_pap.9.desc: "Наша віра та завзяття є мірою основ нашої нації. Прагнучи легітимізувати себе як гордих прихильників [ShowReligionAdjective('catholic')] віри, ми вирішили взяти на себе фінансування [ShowEstatePrivilegeName('apostolic_tax_privilege')]. Тепер настав час нам виконати наші фінансові зобов'язання та сплатити належне."
  flavor_pap.9.a: "Це наш обов'язок..."
  flavor_pap.9.b: "Ми не можемо собі цього дозволити."
  every_catholic_upset_tt: "Наша відмова виконувати наші грошові зобов'язання призведе до широкого осуду з боку всіх [ShowReligionAdjectiveWithNoTooltip('catholic')] країн"
  opinion_refused_to_pay_apostolic_tax: "Відмовлено у сплаті Апостольського податку"
  flavor_pap.10.title: "Швейцарська гвардія"
  flavor_pap.10.desc: "Чорнило висохло на контракті про створення Папської Швейцарської гвардії. Цей елітний полк складається з дисциплінованих та досвідчених чоловіків з абсолютною відданістю Святому Отцю. Вони присягнули служити [ROOT.GetCountry.GetLongName] до Судного дня."
  flavor_pap.10.a: "Вони добре захищатимуть Церкву."
  flavor_pap.11.title: "Пассетто ді Борго"
  flavor_pap.11.desc: "[ShowLocationName('rome')] втрачено! Коли ворог наближається, щоб заарештувати [target_character.GetName], йому нагадують про Пассетто ді Борго, прохід, що з'єднує Ватикан з Замком Святого Ангела. Багато минулих лідерів використовували його як шлях для втечі в часи небезпеки, і тепер [target_character.GetShortNameWithNoTooltip] має вирішити, чи тікати з Ватикану."
  flavor_pap.11.a: "Втекти через прохід!"
  flavor_pap.11.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] не покине Ватикан."
  flavor_pap.12.title: "Пограбування [ShowLocationNameWithNoTooltip('rome')]"
  flavor_pap.12.desc: "Війна залишила місто [ShowLocationName('rome')] в руїнах. Ворог штурмував стіни та розграбував місто, здолавши гарнізон. На сходах базиліки Святого Петра наші останні кілька охоронців зустріли жахливий кінець, зарізані перед початком грабунку. Руйнування, мародерство та страти тривали, доки, нарешті, бандити, дезертири, солдати та мародери не почали свій довгий шлях додому з цінностями, які їм вдалося поцупити."
  flavor_pap.12.a: "Посилити гарнізон, цього більше ніколи не повинно статися."
  flavor_pap.12.b: "Відновити пошкодження міста."
  flavor_pap.13.title: "Ватиканська бібліотека"
  flavor_pap.13.desc: "[ShowReligionAdjective('catholic')] Церква володіє величезною кількістю письмових творів з усіх епох. Було забезпечено фінансування для консолідації та розширення знань християнського світу шляхом створення чудової бібліотеки в стінах Ватикану. Заснування Ватиканської бібліотеки зробить [ShowLocationName('rome')] центром наукового світу."
  flavor_pap.13.a: "Заснувати її та зосередитися на адміністративних працях."
  flavor_pap.13.b: "Основна увага має бути приділена дипломатичним працям."
  flavor_pap.13.c: "Профінансувати бібліотеку про військові мистецтва."
  flavor_pap.14.title: "Сікстинська капела"
  flavor_pap.14.desc: "Капела Маджоре – Велика Капела – використовується для мес, які можуть проводитися в менших, менш публічних приміщеннях, ніж Базиліки. Роки не були ласкавими до колись величної капели, прикрашеної Фра Анджеліко, її стіни нахилені, і вона перебуває в руїнах. Капелу слід знести, споруда недостатньо безпечна для багатьох мес, які проводяться там щороку. Нова, більш велична будівля повинна зайняти її місце, і багато відомих художників були б вшановані, якби їх попросили прикрасити нову Сикстинську капелу."
  flavor_pap.14.a: "Знести старе і побудувати нове на тому ж місці."
  flavor_pap.15.title: "Прикрасити Сикстинську капелу"
  flavor_pap.15.desc: "Стара, занепала Капела Маджоре більше не існує – на її місці тепер стоїть велична Сикстинська капела. Храм Соломона та Сикстинська капела мають однакові розміри, як зазначено у Старому Завіті. Зовнішній вигляд не прикрашений декоративними деталями, а будівля розділена на три поверхи зі склепінчастою стелею та шістьма високими арковими вікнами з боків, по два з кожного кінця. Хоча красива у своїй простоті, краса капели могла б бути посилена фресками, написаними найвидатнішими художниками нашого часу."
  flavor_pap.15.a: "Найняти [sandro_boticelli_scope.GetNameWithNoTooltip]."
  flavor_pap.15.b: "Найняти [ghirlandaio_scope.GetNameWithNoTooltip]."
  flavor_pap.15.c: "Найняти [pietro_perugino_scope.GetNameWithNoTooltip]."
  flavor_pap.15.d: "Найняти [michaelangelo_scope.GetNameWithNoTooltip]."
  flavor_pap.15.e: "Просто знайдіть когось, щоб прикрасити капелу!"
  flavor_pap.17.title: "Суд над симонією"
  flavor_pap.17.desc: "У Діяннях Апостолів 8:9-24 Симон Волхв запропонував двом учням Петру та Івану гроші, якщо вони дадуть йому змогу передавати силу Святого Духа кожному, на кого він покладе руки. Цей акт продажу духовних речей, таких як церковні посади та ролі, називається симонією на честь цієї людини, і багатьох правителів спокушав блиск золота продавати єпископські місця."
  flavor_pap.17.a: "Ми будемо ставитися до цього як до злочину!"
  disables_simony: "Це вимикає подію «Симонія» для [ShowReligionAdjective('catholic')] країн."
  flavor_pap.17.b: "Це практика, яку ми дозволимо."
  flavor_pap.18.title: "Вшанування реліквій – дозволити чи заборонити?"
  flavor_pap.18.desc: "Церкви завжди зберігали реліквії святих, щоб вшановувати їх, а в деяких випадках використовувати для зцілення хворих та немічних. Ця давня практика тепер оскаржується, і деякі вважають її ідолопоклонством, єрессю, яку слід заборонити. Продаж реліквій збагатив багато церков, і якби [ROOT.GetCountry.GetGovernment.GetRulerTitle] публічно оголосив про свою підтримку цієї практики, частина цих грошей потрапила б до нашої скарбниці."
  flavor_pap.18.a: "Заборонити продаж реліквій!"
  disables_veneration_of_relics: "Це вимикає подію «Вшанування реліквій» та «Вшанування Діви Марії» для [ShowReligionAdjective('catholic')] країн."
  flavor_pap.18.b: "Ми станемо багатшими, якщо дозволимо і практикуватимемо це."
  flavor_pap.18.c: "Ми повинні утвердити свій контроль над цим."
  flavor_pap.19.title: "[galileo_galilei_scope.GetNameWithNoTooltip]"
  flavor_pap.19.desc: "Ідея про те, що Земля та планети обертаються навколо Сонця, була вперше викладена Миколаєм Коперником у його книзі #italic 'De revolutionibus orbium coelestium'#! у 1543 році, а тепер [galileo_galilei_scope.GetName] знову її популяризував у своїй книзі #italic 'Sidereus Nuncius'#! – #italic 'Зоряний вісник'#!. Його суперечливе відстоювання цієї тези створило йому багато ворогів у [ShowReligionAdjective('catholic')] Церкві, і хоча ми визнаємо, що він був би дуже цікавим опонентом у дебатах, можливо, нам слід бути обережними і просто ув'язнити його, перш ніж він висміє наші постулати?"
  flavor_pap.19.a: "Запросити його обговорити науку."
  flavor_pap.19.b: "Його треба віддати під суд."
  flavor_pap.20.title: "Царство Боже на Землі"
  flavor_pap.20.desc: "Об'єднавши всю [ShowRegionName('italy_region')] під прапором [ShowReligionName('catholic')], [GetCountry('PAP').GetGovernment.GetRulerTitle] визнав за потрібне проголосити її '[ShowGovernmentReformName('kingdom_of_god_reform')]'. [ShowReligionNameWithNoTooltip('catholic')] віряни з усієї [ShowContinentName('europe')] стікаються під [target_character.GetHerHis] прапор, прагнучи жити в цій зразковій нації [ShowReligionGroupAdjective('christian')] чесноти. Іноземні держави більше не можуть контролювати Колегію кардиналів, але й не звертатимуть особливої уваги на будь-які [GetCountry('PAP').GetAdjective] булли чи декрети."
  flavor_pap.20.a: "Всі люди під одним Богом!"
  flavor_pap.20.b: "Амінь"
  STATIC_MODIFIER_NAME_kingdom_of_god_slot_modifier: "$kingdom_of_god_reform$"
  STATIC_MODIFIER_DESC_kingdom_of_god_slot_modifier: "Релігійна влада $kingdom_of_god_reform$ може змусити навіть іржаві механізми бюрократії схилитися перед нею."
  flavor_pap.21.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] звинувачують у батьківстві"
  flavor_pap.21.desc: "По всій землі ширяться чутки, що [GetCountry('PAP').GetGovernment.GetRulerTitle], попри прийняття святих орденів, таємно став батьком дітей. Дехто каже, що ці звинувачення є зловмисною спробою підірвати авторитет [GetUniqueInternationalOrganization('catholic_church').GetName], тоді як інші стверджують, що чутки правдиві, з шепотом про конкретні імена та докази. Кардинали та решта [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розриваються між тим, чи слід розслідувати ці звинувачення, чи тихо відхилити їх, щоб захистити нашу репутацію."
  flavor_pap.21.a: "Докласти зусиль, щоб відхилити їх."
  flavor_pap.21.b: "Занадто пізно зупиняти їх поширення."
  STATIC_MODIFIER_NAME_sinner_pope: "Репутація заплямована"
  STATIC_MODIFIER_NAME_sinner_pope_severe: "Грішний Папа"
  flavor_pap.21.historical_info: "Протягом століть кількох пап підозрювали в батьківстві, навіть після прийняття святих орденів. Папи Юлій II, Павло III, Олександр VI та Григорій XIII стикалися з такими звинуваченнями, причому деякі, як Олександр VI, відкрито визнавали своїх дітей. Ці випадки викликали скандали, кидаючи виклик моральному авторитету папського престолу."
  flavor_pap.22.title: "Пожежа в Латеранському палаці"
  flavor_pap.22.desc: "Лихо спіткало стародавній Латеранський палац у [ShowLocationName('rome')]. Ця стародавня резиденція пап була серцем [ROOT.GetCountry.GetAdjective] влади майже тисячу років, зберігаючи безцінні артефакти, священні реліквії та незамінні записи, що хронікують історію [GetUniqueInternationalOrganization('catholic_church').GetName]. Коли полум'я поширюється, тріскаються колони, а багатовікові гобелени перетворюються на попіл. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], охоронці та слуги намагаються загасити пожежу, але без швидких дій весь палац може бути втрачений."
  flavor_pap.22.a: "Мобілізувати ресурси, щоб врятувати те, що можемо!"
  flavor_pap.22.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_pap.22.historical_info: "У 1361 році Латеранський палац охопила руйнівна пожежа. Цей стародавній палац, колись величний центр папської влади, був майже повністю зруйнований, лише #italic каплиця Sancta Sanctorum#! – де зберігалися деякі з найсвященніших реліквій Церкви – пережила полум'я."
  flavor_pap.23.title: "[pap_fontana.GetNameWithNoTooltip]"
  flavor_pap.23.desc: "[pap_fontana.GetName], відомий і обдарований архітектор, здобув славу завдяки [pap_fontana.GetHisHer] роботі над численними проєктами для наших кардиналів. [pap_fontana.GetHisHer|U] майстерність у грандіозних проєктах та міській реструктуризації перетворила частини [ShowLocationName('rome')]. Таланти [pap_fontana.GetLastNameWithNoTooltip] могли б бути для нас безцінними, оскільки ми реалізуємо наше бачення реструктурованого, славетного [ShowLocationNameWithNoTooltip('rome')]. Можливо, було б мудро офіційно призначити [pap_fontana.GetHimHer] нашим понтифікальним архітектором, довіривши [pap_fontana.GetHimHer] втілення наших архітектурних амбіцій."
  flavor_pap.23.a: "Найняти [pap_fontana.GetHimHer]!"
  flavor_pap.23.b: "Залишити [pap_fontana.GetHimHer] працювати з нашими кардиналами."
  flavor_pap.23.historical_info: "Доменіко Фонтана був впливовим італійським архітектором, чиї роботи сформували обличчя Риму. Він став улюбленим архітектором Папи Сикста V, керуючи великими міськими проєктами в Римі. Досягнення Фонтани включають переміщення Ватиканського обеліска на площу Святого Петра та проєктування реконструкції Латеранського палацу."
  flavor_pap.24.title: "Відбудова Латеранського палацу"
  flavor_pap.24.desc: "Латеранський палац, колись велична резиденція пап і символ авторитету Церкви, тепер лежить переважно в руїнах після масштабних пожеж у XIV столітті. Багато хто вважає, що настав час відновити цей стародавній палац до його колишньої слави, оскільки його історичне та духовне значення незаперечне. З нашим відомим архітектором [fontana.GetName] при [ROOT.GetCountry.GetGovernment.GetCourtTitle] ми маємо досвід, щоб взятися за цей монументальний проєкт."
  flavor_pap.24.a: "Відбудувати палац."
  flavor_pap.24.b: "Натомість покращити ширшу інфраструктуру [ShowLocationNameWithNoTooltip('rome')]."
  flavor_pap.24.historical_info: "Наприкінці XVI століття Папа Сикст V доручив відомому архітектору Доменіко Фонтані відбудувати Латеранський палац, який занепав після століть пожеж та занедбаності. Фонтана перетворив стародавню споруд, модернізувавши її та додавши нові крила, двори та великі зали, щоб відновити її значущість як символу папської влади."
  flavor_pap.25.title: "Зміцнення [ShowBuildingTypeNameWithNoTooltip('castel_sant_angelo')]"
  flavor_pap.25.desc: "Мавзолей Адріана, нині більш відомий як [ShowBuildingTypeName('castel_sant_angelo')], поступово був перетворений нашими попередниками на укріплений бастіон, що забезпечує життєво важливу лінію оборони для [ShowLocationName('rome')]. З огляду на бурхливий характер наших часів, багато радників тепер закликають нас завершити його перетворення на грізний замок, здатний захистити [ShowLocationNameWithNoTooltip('rome')] від будь-якої загрози."
  flavor_pap.25.a: "Перетворити його на повноцінну фортецю."
  flavor_pap.25.b: "Його нинішніх укріплень достатньо."
  flavor_pap.25.historical_info: "До XVI століття Замок Святого Ангела став повністю розвиненою фортецею з підземними переходами, що з'єднували його з Ватиканом. Замок Святого Ангела відомо захистив Папу Климента VII під час розграбування Риму в 1527 році, коли він та його почет знайшли там притулок від військ Карла V."
  flavor_pap.26.title: "Літня резиденція Пап"
  flavor_pap.26.desc: "[GetCountry('PAP').GetGovernment.GetRulerTitle] висловив зацікавленість у створенні літньої резиденції подалі від гамірних, переповнених вулиць центрального [ShowLocationName('rome')]. Квіринальський пагорб, один із відомих Семи пагорбів [ShowLocationNameWithNoTooltip('rome')], розглядається як ідеальне місце, що пропонує спокійний відпочинок з прохолодним вітерцем та панорамними краєвидами. Якщо ми продовжимо, відомий архітектор [fontana.GetName] міг би керувати проектуванням та будівництвом палацу."
  flavor_pap.26.a: "Побудувати літню резиденцію на Квіринальському пагорбі."
  flavor_pap.26.b: "Зараз не час для розкішних проектів."
  flavor_pap.26.historical_info: "Квіринальський палац був замовлений у 1583 році Папою Григорієм XIII як літня резиденція для папства. Спроектований за участю видатних архітекторів, включаючи Доменіко Фонтану, палац пропонував притулок від спеки та натовпу центрального Риму. Коли новостворене Королівство Італія анексувало значну частину того, що залишилося від Папської держави, Квіринальський палац став резиденцією італійських королів."
  flavor_pap.27.title: "[pap_danti.GetNameWithNoTooltip]"
  flavor_pap.27.desc: "Вчений та математик [pap_danti.GetName] привернув увагу нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] своєю вражаючою роботою в астрономії, картографії та виготовленні інструментів. [pap_danti.GetLastNameWithNoTooltip] відомий створенням точних карт, небесних діаграм та сонячних годинників, і [pap_danti.GetHisHer] досвід вже виявився цінним для архітектурних проектів Церкви. Як вчений, присвячений просуванню знань, [pap_danti.GetLastNameWithNoTooltip] міг би значно допомогти нам, надавши [pap_danti.GetHisHer] навички нашим амбіціям."
  flavor_pap.27.a: "Призначити [pap_danti.GetHimHer] нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle] Картографом!"
  flavor_pap.27.b: "Призначити [pap_danti.GetHimHer] та додатково фінансувати [pap_danti.GetHisHer] дослідження."
  flavor_pap.27.c: "[pap_danti.GetHisHer|U] таланти гідні захоплення, але ми не можемо собі їх дозволити зараз."
  flavor_pap.27.historical_info: "Ігнаціо Данті був вправним астрономом, математиком і картографом, який створював точні карти та астрономічні інструменти для Папського двору. Данті відіграв вирішальну роль у пропозиції низки реформ, які зрештою призвели до створення Григоріанського календаря."
  flavor_pap.28.title: "Помилки Юліанського календаря"
  flavor_pap.28.desc: "Протягом століть Юліанський календар був стандартом у всьому [ShowReligionGroupAdjective('christian')] світі. Однак стає все більш очевидним, що його неточності в обчисленні року та прогнозуванні ключових дат, таких як Великдень, викликали зростаюче занепокоєння. Невідповідність календаря сонячному року призвела до значного зсуву, що кидає виклик як нашим традиціям, так і практичним питанням. Багато радників тепер закликають зібрати наших найвидатніших вчених, математиків та астрономів, щоб розробити рішення, яке могло б виправити ці давні помилки."
  flavor_pap.28.a: "Скликати найкращі уми для реформування календаря."
  flavor_pap.28.a.tt: "Наші найвидатніші уми почнуть працювати над створенням нового календаря."
  flavor_pap.28.b: "Це масштабне починання було б занадто дорогим."
  flavor_pap.28.historical_info: "Юліанський календар, запроваджений Юлієм Цезарем, був розроблений для узгодження римського календаря з сонячним роком. Однак він мав значний недолік: він переоцінював тривалість року. Протягом століть ця невелика помилка накопичувалася, спричиняючи відхилення календаря від фактичного сонячного року, і це розбіжність впливала на час важливих подій, зокрема святкування Великодня, яке традиційно було прив'язане до весняного рівнодення."
  flavor_pap.29.title: "Inter Gravissimas – Новий календар"
  flavor_pap.29.desc: "Після значних зусиль та співпраці між найвидатнішими умами [GetUniqueInternationalOrganization('catholic_church').GetName] ми досягли прориву у календарній реформі. [target_ruler.GetName] видав папську буллу #italic Inter Gravissimas#!, оголошуючи про створення нового календаря на заміну недосконалій Юліанській системі. Цей новий календар виправляє сезонне зміщення та точно передбачає такі дати, як Великдень. Його буде негайно прийнято, що узгодить наші священні святкування та повсякденне життя з природним сонячним роком."
  flavor_pap.29.a: "Монументальний успіх!"
  flavor_pap.29.historical_info: "Папа Григорій XIII запровадив Григоріанський календар у 1582 році, який зумів вирішити проблеми, спричинені неузгодженим Юліанським календарем. Він усунув усі зайві дні, що накопичилися протягом століть, та впровадив точнішу систему високосних років, яка запобігла б повторенню цієї помилки."
  flavor_pap.30.title: "Конституції Святої Матері Церкви"
  flavor_pap.30.desc: "Останніми роками багато хто в [GetUniqueInternationalOrganization('catholic_church').GetName] висловлював занепокоєння щодо питань дисципліни, освіти та духовної цілісності. Зростає заклик розробити всеосяжний документ, який би вирішив ці давні проблеми. Такий декрет запровадив би суворіші стандарти для поведінки духовенства, покращив би освіту священиків та забезпечив би дисципліну на всіх рівнях Церкви."
  flavor_pap.30.a: "Підтримати його розробку."
  flavor_pap.30.b: "Церква і так добре функціонує; жодних змін не потрібно."
  flavor_pap.30.historical_info: "#italic Конституції Святої Матері Церкви#!, також відомі як Егідієві Конституції, були зведенням законів, проголошених кардиналом Альборносом у 1357 році. Ці закони сформували першу історичну конституцію Папської держави і були розроблені для централізації та реформування адміністрації Папської держави, яка була роздроблена та страждала від корупції."
  flavor_pap.31.title: "[pap_raphael.GetNameWithNoTooltip]"
  flavor_pap.31.desc: "[pap_raphael.GetName], видатний художник та архітектор [ShowInstitutionName('renaissance')], нещодавно привернув увагу нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Відомий [pap_raphael.GetHisHer] вишуканими композиціями та майстерністю перспективи, твори [pap_raphael.GetLastNameWithNoTooltip] здобули [pap_raphael.GetHimHer] визнання по всій Італії та за її межами. Наймання [pap_raphael.GetHimHer] безсумнівно підвищило б культурний престиж Церкви, а також привернуло б захоплення вчених та художників. Багато радників рекомендують нам офіційно запросити [pap_raphael.GetLastNameWithNoTooltip] служити художнім консультантом, щоб піднести велич наших проєктів та зміцнити [ROOT.GetCountry.GetAdjective] спадщину в мистецтві та архітектурі."
  flavor_pap.31.a: "Запросити [pap_raphael.GetLastNameWithNoTooltip] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_pap.31.b: "Ми не можемо дозволити собі розкіш мати художника в цей час."
  flavor_pap.31.historical_info: "Рафаель Санціо да Урбіно був майстром живопису та архітектури італійського Високого Відродження, відомий своєю ясністю форми, легкістю композиції та візуальним втіленням неоплатонічного ідеалу людської величі. У 1508 році Рафаеля запросив Папа Юлій II працювати у Ватикані, де він створив деякі зі своїх найвідоміших робіт, включаючи «Афінську школу» та «Сікстинську Мадонну»."
  flavor_pap.32.title: "Гуманізм та церковні вчення"
  flavor_pap.32.desc: "Останні події навколо Протестантської Реформації швидко змінюють ландшафт [GetUniqueInternationalOrganization('catholic_church').GetName]. Колись оспівані гуманістичні тенденції, що процвітали за [ShowInstitutionName('renaissance')] пап і наголошували на розумі, класичній освіті та цінності індивідуального досвіду, дедалі частіше розглядаються з підозрою.\n\nОскільки Церква повільно зміщується до більш ортодоксальної позиції, багато хто вважає гуманізм несумісним з традиційними вченнями та доктринами. Ця зростаюча напруга викликає питання про майбутній напрямок Церкви та її стосунки з ширшими інтелектуальними рухами [ShowContinentName('europe')]."
  flavor_pap.32.a: "Зміцнити ортодоксальні вчення та відмежуватися від гуманізму."
  flavor_pap.32.b: "Гуманізм має залишатися частиною наших вчень!"
  flavor_pap.101.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Архіви [from_location.GetNameWithNoTooltip]"
  flavor_pap.101.desc: "Історія [ROOT.GetCountry.GetAdjective] уряду є давньою та дуже добре задокументованою. Багато подій та рішень щодо справ [ROOT.GetCountry.GetFlavorRank] та [ROOT.GetCountry.GetReligion.GetName] зберігаються та збираються в [ShowBuildingTypeName('papal_archives')] [from_location.GetName].\n\nДоступ до цих архівів став дуже обмеженим, однак, через наші справи в [ShowRegionName('france_region')], нашій столиці; саме місце [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip] було перенесено до [target_location.GetName]. Наш вплив на наші володіння в [ShowRegionName('italy_region')] як такий стає дедалі більш обмеженим.\n\nРадники [ruler_scope.GetName] пропонують перенести архіви до [target_location.GetNameWithNoTooltip], щоб зняти обмеження."
  flavor_pap.101.a: "Перенести архіви."
  flavor_pap.101.b: "Це не варте витрат."
  flavor_pap.33.title: "Ювілей 1350 року"
  flavor_pap.33.desc: "З настанням 1350 року паломники з усього християнського світу стікаються до [ShowLocationName('rome')], щоб взяти участь у великому Ювілеї, священному святкуванні, що пропонує відпущення гріхів та божественні благословення вірним. Ця свята подія, проголошена [target_ruler.GetName], привабила тисячі тих, хто шукає духовного оновлення, приносячи не лише релігійну відданість, але й процвітання Вічному Місту."
  flavor_pap.33.a: "Наголосити на духовному значенні Ювілею."
  flavor_pap.33.b: "Скористатися економічними вигодами від паломників."
  flavor_pap.33.historical_info: "Ювілей 1350 року був другим Святим Роком в історії Католицької Церкви, наслідуючи прецедент, встановлений Папою Боніфацієм VIII у 1300 році. Проголошений Папою Климентом VI, він привабив величезну кількість паломників до Риму, незважаючи на руйнівний вплив Чорної Смерті, що прокотилася Європою. Повні індульгенції були надані тим, хто відвідав базиліки Святого Петра та Святого Павла, що зміцнило духовний авторитет Папства. Однак Ювілей також мав значні економічні наслідки, оскільки купці та місцева влада отримували прибуток від збільшеної активності в місті."
  flavor_pap.34.title: "Видання «Канцоньєре»"
  flavor_pap.34.desc: "Шанований поет і вчений [target_character.GetName] завершив майстерну збірку сонетів і поем, присвячених [target_character.GetHisHer] музі, Лаурі. Ця праця, відома як #italic Канцоньєре#!, є свідченням як [target_character.GetHisHer] літературного генія, так і зростаючого духу гуманізму, що прагне відродити класичні ідеали. [target_character.GetLastNameWithNoTooltip] тепер звертається до [ROOT.GetCountry.GetGovernment.GetCourtTitle], просячи покровительства, щоб забезпечити широке видання [target_character.GetHisHer] magnum opus."
  flavor_pap.34.a: "Покровительствувати [target_character.GetLastNameWithNoTooltip] та [target_character.GetHisHer] творам!"
  flavor_pap.34.b: "Ця поезія відволікає від віри!"
  flavor_pap.34.historical_info: "Франческо Петрарка, широко відомий як Петрарка, був італійським поетом, вченим і одним з найперших гуманістів, якому часто приписують започаткування італійського ренесансного гуманізму. Він найбільш відомий своєю поезією, зокрема #italic Канцоньєре#!, а також своїми зусиллями з перевідкриття та збереження класичних латинських текстів. Захоплення Петрарки античністю та його віра в моральну та інтелектуальну перевагу класичної епохи відіграли вирішальну роль у формуванні ренесансної думки в Італії та за її межами."
  flavor_pap.35.title: "Осушення Понтійських боліт"
  flavor_pap.35.desc: "Протягом століть величезні та кишать хворобами Понтійські болота [ShowLocationName('velletri')] та [ShowLocationName('terracina')] становили значну перешкоду для сільського господарства, торгівлі та проживання. Кілька Пап прагнули відвоювати ці землі, проте кожна спроба була зірвана суперечками щодо прав власності, політичною опозицією або надзвичайною складністю завдання. Тепер, з оновленою рішучістю, наші інженери запропонували сміливий план остаточного осушення боліт."
  flavor_pap.35.a: "Взятися за їх осушення."
  flavor_pap.35.a.tt: "Застосований модифікатор нівелюватиме деякі негативні ефекти місцевої [Concept('topography', 'CONCEPT_PLACEHOLDER')|e] болотистої місцевості"
  flavor_pap.35.b: "Витрати та труднощі переважують переваги."
  flavor_pap.35.historical_info: "Понтійські болота були давньою проблемою для Пап, оскільки вони були відомі своєю непрохідністю та поширеністю малярії. Перші зафіксовані спроби їх осушення датуються Папою Боніфацієм VIII у 1298 році, чий канальний проект ненавмисно призвів до подальших повеней. Протягом наступних століть Папи, включаючи Євгенія IV, Лева X, Мартина V, Сикста V та Пія VI, всі намагалися провести меліораційні роботи, часто стикаючись з опором місцевої знаті щодо прав власності та рибальства."
  flavor_pap.36.title: "Жадібність кардинала [target_character.GetLastNameWithNoTooltip]"
  flavor_pap.36.desc: "Останнім часом кардинала [target_character.GetName] сильно критикують за нібито використання [target_character.GetHisHer] впливу для накопичення величезних багатств і здобуття влади. [target_character.GetHisHer|U] контроль над прибутковими посадами, агресивне придбання земель та покровительство екстравагантним архітектурним проектам збагатили [target_character.GetHisHer] родину за рахунок скарбниці. [target_character.GetHisHer|U] розкішний спосіб життя та фаворитизм викликали критику як з боку [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], так і з боку [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які розглядають [target_character.GetHisHer] дії як символ корупції в [GetUniqueInternationalOrganization('catholic_church').GetName]."
  flavor_pap.36.a: "Спробувати тихо приховати [target_character.GetHisHer] дії."
  flavor_pap.36.b: "Публічно засудити [target_character.GetHisHer] корупцію та звільнити [target_character.GetHimHer]."
  flavor_pap.36.historical_info: "Кардинал Каффареллі-Боргезе був одним із наймогутніших та найвпливовіших кардиналів свого часу, слугуючи секретарем та правою рукою свого дядька, Папи Павла V. Завдяки непотизму він набув численних титулів, земель та прибуткових посад, зробивши родину Боргезе однією з найбагатших у Римі. Він активно інвестував у мистецтво та замовив будівництво Вілли Боргезе, розкішного маєтку, наповненого цінними творами мистецтва. Однак його безжальне прагнення до багатства та влади зробило його суперечливою фігурою."
  flavor_pap.37.title: "Велике благочестя 1399 року"
  flavor_pap.37.desc: "Велика хвиля релігійного запалу охопила [ROOT.GetCountry.GetName], коли тисячі каянників перетинають сільську місцевість у урочистих процесіях. Відомі як #italic Б'янкі#! за білі шати, які вони носять, вони йдуть босоніж від міста до міста із закритими обличчями, виспівуючи молитви та закликаючи до покаяння та божественної милості. Ці самоорганізовані маси, натхненні апокаліптичними страхами та потрясіннями того часу, здобули величезну народну підтримку, але їхня неконтрольована та спонтанна природа викликає занепокоєння, особливо серед церковної влади."
  flavor_pap.37.a: "Заохочувати рух."
  flavor_pap.37.b: "Регулювати ці зібрання, щоб запобігти безладу."
  flavor_pap.37.historical_info: "Рух Б'янкі 1399 року був масовим релігійним явищем, що охопило центральну та північну Італію. Його підживлювала поширена тривога через війну, чуму та економічні труднощі. Рух швидко поширився на такі міста, як Рим, Флоренція та Болонья, де тисячі каянників йшли довгими процесіями, читаючи молитви та гімни. Хоча Б'янкі були загалом мирними та мотивованими духовними турботами, їхні раптові та нерегульовані процесії викликали тривогу серед влади."
  flavor_pap.38.title: "Створення [ShowCultureNameWithNoTooltip('corsican')|U] гвардії"
  flavor_pap.38.desc: "Визнаючи потребу в відданій та лояльній силі для захисту [ROOT.GetCountry.GetGovernment.GetRulerTitle] та підтримання порядку в [ROOT.GetCountry.GetName], [target_ruler.GetHeSheFormal] дозволив набір [ShowCultureName('corsican')|U] гвардії. Складена з загартованих воїнів з [ShowAreaName('liguria_area')], які славляться своєю військовою майстерністю та непохитною відданістю, їхнє призначення в [ROOT.GetCountry.GetCapital.GetName] забезпечить захист [ROOT.GetCountry.GetGovernment.GetRulerTitle] та ключових церковних чиновників."
  flavor_pap.38.a: "Заснувати їх як гвардію [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_pap.38.b: "Ми покладатимемося на наших регулярних солдатів."
  flavor_pap.38.historical_info: "Присутність корсиканців у Папській державі засвідчена з IX століття. Їхня кількість зросла після закінчення Авіньйонського папства, оскільки Рим став новим центром країни з багатьма новими можливостями працевлаштування, що приваблювало імміграцію. З цих іммігрантів у 1603 році Папа Климент VIII заснував Корсиканську гвардію, головним чином для служіння папською охороною та поліцейською силою в Римі."
  flavor_pap.39.title: "Неконтрольована поведінка [ShowCultureNameWithNoTooltip('corsican')|U] гвардії"
  flavor_pap.39.desc: "Наші елітні захисні сили стали джерелом постійних заворушень у [ROOT.GetCountry.GetCapital.GetName]. Члени [ShowCultureName('corsican')|U] гвардії все частіше беруть участь у жорстоких бійках — не лише між собою, а й з іншими військовими підрозділами та навіть цивільними. Повідомлення про вуличні дуелі, смертельні чвари та неконтрольовану агресію стали звичним явищем, перетворюючи частини [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] на поля битв. Громадяни живуть у страху, і навіть церковні чиновники вагаються ходити вулицями вночі. Багато хто тепер стверджує, що ці люди пережили свою корисність."
  flavor_pap.39.a: "Розформувати підрозділ."
  flavor_pap.39.a.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetCapital.GetName] отримують [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_pap.39.b: "Ігнорувати проблему і сподіватися, що вона вирішиться сама."
  flavor_pap.39.b.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetCapital.GetName] втрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_pap.39.historical_info: "До середини XVII століття Корсиканська гвардія стала сумно відомою своєю неконтрольованою поведінкою. Їхнє сильне почуття гордості та вірності призводило до частих суперечок, які часто переростали в жорстокі бійки з іншими фракціями в Римі. Один з найвідоміших інцидентів стався в 1662 році, коли сутичка Корсиканської гвардії з ескортом французького посла призвела до міжнародного скандалу. Дипломатичне обурення, що виникло внаслідок цього, у поєднанні з їхньою постійною безрозсудною поведінкою, змусило Папу Олександра VII розпустити Корсиканську гвардію в 1662 році."
  flavor_pap.40.title: "Зміцнення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] флоту"
  flavor_pap.40.desc: "Зростаюче морське панування наших супротивників загрожує безпеці наших узбереж і [ROOT.GetCountry.GetAdjective] земель. З розширенням досяжності ворожих флотів стало зрозуміло, що ми повинні посилити наші військово-морські сили, щоб захистити віру та забезпечити наш вплив над Середземномор'ям. Багато важливих діячів тепер наполягають на новій військово-морській ініціативі, щоб збільшити розмір нашого флоту та сприяти [ShowReligionGroupAdjective('christian')|U] зусиллям щодо збереження безпеки Середземномор'я."
  flavor_pap.40.a: "Підтримати ініціативу."
  flavor_pap.40.a.tt: "#G [ROOT.GetVariable('total_gained_ships_variable').GetValue]#! галерних [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] буде зібрано в [target_location.GetName]"
  flavor_pap.40.b: "Море — не наше поле битви."
  flavor_pap.40.historical_info: "Протягом XVI та XVII століть Папський флот зазнав значного розширення через зростаючу загрозу османського морського панування в Середземномор'ї. Визнаючи необхідність сильного флоту, Папа Сикст V видав указ про створення десяти постійних військових кораблів, які мали становити ядро Папського флоту. Хоча він був відносно невеликим порівняно з флотами Венеції чи Іспанії, Папський флот сприяв зусиллям християнського світу та здобув перемоги в численних морських битвах."
  flavor_pap.41.title: "Меценатство [target_character.GetLastNameWithNoTooltip]"
  flavor_pap.41.desc: "[target_character.GetName] — [ShowArtistTypeNameWithNoTooltip('sculptor')] та [ShowArtistTypeNameWithNoTooltip('architect')] надзвичайного таланту. [target_character.GetHisHer|U] майстерність барокового мистецтва вже залишила незгладний слід у [ShowLocationName('rome')], а [target_character.GetHisHer] проекти грандіозних церков, фонтанів та палаців перетворили Вічне Місто на справжній шедевр. Завдяки [target_character.GetHisHer] навичкам у нашому розпорядженні, ми могли б ще більше зміцнити наше культурне та мистецьке панування, найнявши [target_character.GetHimHer] як офіційного [ROOT.GetCountry.GetAdjective] архітектора."
  flavor_pap.41.a: "Надати [target_character.GetLastNameWithNoTooltip] підтримку, якої [target_character.GetSheHe] потребує!"
  flavor_pap.41.b: "Наші кошти потрібні в іншому місці."
  flavor_pap.41.historical_info: "Джан Лоренцо Берніні був одним із найвпливовіших барокових художників Італії. Він служив кільком Папам, включаючи Урбана VIII та Олександра VII, і папське меценатство дозволило йому спроектувати багато найвідоміших пам'яток Риму, включаючи колонади площі Святого Петра, Фонтан Чотирьох Річок та численні скульптури всередині базиліки Святого Петра."
  flavor_pap.42.title: "Замовлення першого [ShowBuildingTypeNameWithNoTooltip('theater')]"
  flavor_pap.42.desc: "Задоволення від відвідування [ShowBuildingTypeName('theater')] швидко поширюється серед народу [ShowRegionName('italy_region')], з грандіозними виставами, що захоплюють аудиторію в таких місцях, як [ShowLocationName('florence')], [ShowLocationName('venice')] та [ShowLocationName('naples')]. Щоб [ShowLocationName('rome')] залишався на передовій культурного та мистецького розвитку, було запропоновано побудувати новий [ShowBuildingTypeNameWithNoTooltip('theater')] у [target_location.GetRank.GetName]. На щастя, ми вже маємо [bernini.GetName] у своєму розпорядженні, і [bernini.GetHisHer] архітектурний геній міг би зробити цей проект шедевром барокового дизайну. Однак деякі члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] стурбовані тим, що такий [ShowBuildingTypeNameWithNoTooltip('theater')] може заохочувати невірне та декадентське мистецтво, відволікаючи вірних від більш побожних занять."
  flavor_pap.42.a: "Дозволити [bernini.GetLastNameWithNoTooltip] створити свій шедевр!"
  flavor_pap.42.b: "Сцена не місце для наших коштів."
  flavor_pap.42.historical_info: "#italic Teatro delle Quattro Fontane#! був бароковим театром у Римі, спроектованим Джаном Лоренцо Берніні та замовленим кардиналом Франческо Барберіні в середині XVII століття. Театр був частиною більшого архітектурного комплексу, що оточував церкву #italic San Carlo alle Quattro Fontane#!. Він став центром барокових театральних інновацій, але був знесений на початку XVIII століття в рамках архітектурної реконструкції Риму."
  flavor_pap.1000.title: "Заснування Товариства Ісуса"
  flavor_pap.1000.historical_info: "У 1540 році Папа Павло III визнав Орден єзуїтів, заснований у 1534 році іспанцем Доном Іньїго Лопесом де Оньясом-і-Лойолою, більш відомим як Святий Ігнатій Лойола. Він став одним з найвідданіших контрреформаторів та ворогом номер один [ShowReligionAdjectiveWithNoTooltip('lutheran')] руху. Лойола, маючи військове минуле, наклав свій відбиток на орден, який був організований майже як армія. Високий пріоритет надавався як навчанню місіонерів, так і радників для європейських королівських дворів. Це зробило орден єзуїтів дуже впливовим на політичній арені. У 1773 році орден єзуїтів був розпущений Папою Пієм VI через тиск з боку [ShowReligionGroupAdjective('christian')] країн в епоху Просвітництва. У 1814 році орден єзуїтів був відновлений, проте він постав блідою тінню могутнього ордену, яким колись був."
  flavor_pap.1000.desc: "[target_country.GetName] очолює підтримку новоствореного Ордену єзуїтів та їхні зусилля протистояти [ShowReligionAdjective('lutheran')] руху."
  flavor_pap.1000.a: "Привітати [target_country.GetNameWithNoTooltip]."
  flavor_pap.1001.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] схвалення Ордену єзуїтів"
  flavor_pap.1001.desc: "Наша підтримка Ордену єзуїтів була відзначена і повністю оцінена [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  flavor_pap.1001.historical_info: "Орден єзуїтів був створений у 1534 році іспанцем Доном Іньїго Лопесом де Оньясом-і-Лойолою, більш відомим як Святий Ігнатій Лойола. Він був одним з найвідданіших контрреформаторів та ворогом номер один [ShowReligionAdjective('lutheran')] руху."
  flavor_pap.1001.a: "Ми приймаємо похвалу зі смиренням."
  flavor_pap.1200.title: "Місія до $china$"
  flavor_pap.1200.desc: "Це наш урочистий обов'язок євангелізувати всюди, нести Слово [ROOT.GetCountry.GetReligion.GetGodName] в усі куточки землі. Зі зростанням наших знань про світ зростає і наш обов'язок. Дослідники на Далекому Сході почали встановлювати контакти з місцевими купцями в [target_province.GetName]; це знак того, що ми повинні йти вперед і проповідувати серед них."
  flavor_pap.1200.a: "Відправити єзуїтів!"
  flavor_pap.1201.title: "Прибуття єзуїтів"
  flavor_pap.1201.desc: "Місіонери з-за моря припливли до наших земель, приносячи дари [ROOT.GetCountry.GetGovernment.GetRulerTitle] та демонструючи різні механічні винаходи з Європи. Вони також виявили великі знання, створивши величезну карту світу та запропонувавши слушні ідеї для календарної реформи. Але вони також принесли з собою дивні релігійні та філософські ідеї, які можуть порушити традиційний порядок Китаю. Чи слід дозволити цим місіонерам залишитися?"
  flavor_pap.1201.a: "Так, ми можемо отримати користь від їхніх знань"
  flavor_pap.1201.b: "Ні, їхні чужі ідеї неприйнятні в нашому суспільстві"
  all_catholic_will_love_tt: "Усі [ShowReligionAdjective('catholic')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які нас відкрили, отримують [ShowBiasValue('opinion_accepted_jesuits')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [ROOT.GetCountry.GetName]"
  flavor_pap.1300.title: "Місія до [ShowRegionNameWithNoTooltip('japan_region')]"
  flavor_pap.1300.desc: "Легендарні землі [ShowRegionName('japan_region')] ваблять нас, волаючи про спасіння. Ми повинні шукати ці острови Далекого Сходу і поширювати Добру Новину серед їхнього народу."
  flavor_pap.1300.a: "Відправити єзуїтів!"
  flavor_pap.1301.title: "Кірішітан"
  flavor_pap.1301.desc: "[ShowReligionAdjective('catholic')] місіонери, підтримувані їхнім [ROOT.GetCountry.GetGovernment.GetRulerTitle] здалеку, почали прибувати до наших берегів. Вони намагаються поширити [ShowReligionGroupName('christian')] і навернути місцеве населення масово. Якщо їх не зупинити, ці єзуїти, францисканці та домініканці можуть становити значну загрозу для [ShowReligionName('shinto')]."
  flavor_pap.1301.a: "Зупинити місіонерів!"
  flavor_pap.1301.b: "Дозволити їм поширювати свою віру"
  flavor_pap.1400.title: "Товариство Ісуса"
  flavor_pap.1400.desc: "Єзуїти — це ударні війська [ShowReligionAdjective('catholic')] відродження. Спеціально навчені технікам навернення людей до [ShowReligionNameWithNoTooltip('catholic')], вони є потужною силою у переконанні язичників та єретиків побачити світло."
  flavor_pap.1400.a: "Ite, inflammate omnia!"
  flavor_pap.1400.tooltip: "Буде засновано Товариство Ісуса!"
  flavor_pap.1401.title: "Заснувати Societas Jesu"
  flavor_pap.1401.desc: "Його Святість схвалив новий місіонерський орден під назвою Товариство Ісуса. Однак без королівської підтримки новостворений орден не зможе процвітати на наших територіях.\n\nЧи підтримаємо ми єзуїтів?"
  flavor_pap.1401.a: "Ad maiorem Dei gloriam!"
  flavor_pap.1401.b: "Абсолютно ні..."
  flavor_pap.1500.title: "Замовлення Базиліки Святого Петра"
  flavor_pap.1500.desc: "Стара Базиліка Святого Петра, збудована імператором Костянтином Великим, нині перебуває в жалюгідному стані через свій вік та відсутність належного догляду, якого вона зазнала під час перебування [ROOT.GetCountry.GetGovernment.GetRulerTitle] у місті [ShowLocationName('avignon')].\n\nНастав час усім [ShowReligionGroupName('christian')] об'єднатися та відбудувати храм, перетворивши його на пам'ятник, гідний самого Святого Петра."
  flavor_pap.1500.historical_info: "Папа Юлій II почав будівництво Базиліки невдовзі після обрання [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Завершення тривало понад 100 років, і один з найвідоміших художників в історії, Мікеланджело, відіграв велику роль у її завершенні, як архітектор, так і художник."
  flavor_pap.1500.a: "Збудувати Базиліку"
  flavor_pap.1500.b: "Використовувати дохід від індульгенцій для її фінансування."
  flavor_pap.1500.c: "Збудувати Базиліку та доручити [michaelangelo_scope.GetShortNameWithNoTooltip] її прикрасити."
  flavor_pap.1500.d: "Профінансувати індульгенціями, найняти [michaelangelo_scope.GetShortNameWithNoTooltip] для оздоблення."
  flavor_pap.1500.e: "Зосередитися на мирських справах"
  flavor_pap.1501.title: "Інавгурація Святого Петра"
  flavor_pap.1501.desc: "Після 120 років праці чудова Базиліка Святого Петра нарешті завершена, це час радості та святкування для кожного слуги Божого."
  flavor_pap.1501.a: "Відсвяткувати цю грандіозну подію!"
  flavor_pap.1501.b: "Церква має бути стриманою."
  flavor_pap.1502.title: "Загибель Базиліки Святого Петра"
  flavor_pap.1502.desc: "[ShowLocationName('rome')] впав перед нашими ворогами, [rome_ocupier.GetLongName], і під час пограбування Священного Міста будівельний майданчик Базиліки Святого Петра був підпалений цими дияволами, знищивши всі сліди її давньої слави."
  flavor_pap.1502.a: "Прокляття!"
  flavor_pap.1700.title: "Продаж індульгенцій"
  flavor_pap.1700.desc: "Багато країн почали продавати індульгенції за гроші, щоб багаті могли врятувати свої душі та продовжувати жити в гріху. Ми отримали повідомлення, що деякі наші єпископи пропонують ці послуги, стверджуючи, що вони уповноважені [target_ruler.GetName] [target_ruler.GetHerselfHimself].\n\nЦя практика приносить багато грошей до скарбниці Церкви, і хоча дехто засуджує її, інші вважають, що її слід дозволити."
  flavor_pap.1700.a: "Розслідувати ці звинувачення."
  flavor_pap.1700.a.tt: "Ми розпочнемо розслідування цих заяв."
  flavor_pap.1700.b: "Гроші правлять світом..."
  flavor_pap.1700.c: "Ми спробуємо викорінити цю практику повністю!"
  flavor_pap.1701.title: "Чернець [target_character.GetNameWithNoTooltip]"
  flavor_pap.1701.desc: "Член Домініканського ордену, [target_character.GetName], здобув славу завдяки [target_character.GetHerHis] радикальним та інноваційним способам продажу індульгенцій. Окрім продажу прощення після того, як бідний грішник піддався слабкості, [target_character.GetSheHe] також готовий прощати ще не вчинені гріхи. Цим [target_character.GetSheHe] заробив значну суму для [GetInternationalOrganization('catholic_church').GetName] та [GetInternationalOrganization('catholic_church').GetLeaderTitle]."
  flavor_pap.1701.a: "Щойно золото в скриньці дзвенить, врятована душа до неба летить."
  flavor_pap.1701.b: "Викличте його на суд."
  disables_indulgences: "Це вимикає подію «Продаж індульгенцій» для [ShowReligionAdjective('catholic')] країн."
  flavor_pap.1702.desc: "$flavor_pap.1701.desc$ Його присутність у нашій країні може викликати деякі суперечки."
  flavor_pap.1702.a: "Це звучить трохи суперечливо."
  flavor_pap.1703.title: "Розслідування [GetInternationalOrganization('catholic_church').GetNameWithNoTooltip]"
  flavor_pap.1703.desc: "Останні повідомлення свідчать, що члени [GetInternationalOrganization('catholic_church').GetName] продають індульгенції з нашого дозволу. Оскільки схвалення такого гріховного вчинку не може бути далі від істини, ми тепер повинні вирішити, чи і як ми хочемо переслідувати ці дії."
  flavor_pap.1703.a: "Вони приносять гроші, нехай продовжують."
  flavor_pap.1703.b: "Ми покараємо кожного, кого спіймають на продажу індульгенцій."
  flavor_pap.1704.title: "Суд над [target_character.GetNameWithNoTooltip]"
  flavor_pap.1704.desc: "Ми викликали [target_character.GetName] до [ROOT.GetCountry.GetCapital.GetName], щоб [target_character.GetHerselfHimself] захистився від звинувачення у розгульному продажу індульгенцій. Після [target_character.GetHerHis] прибуття, [target_character.GetSheHe] довго захищав [target_character.GetHerHis] дії, і тепер у наших руках вирішити, як ми повинні діяти з цього питання."
  flavor_pap.1704.a: "[target_character.GetNameWithNoTooltip] винен."
  flavor_pap.1704.b: "Відправте його до місцевого [ShowBuildingTypeNameWithNoTooltip('monastery')]."
  flavor_pap.1704.c: "Він невинний!"
  flavor_pap.1800.title: "Корона Риму та [GetCountry('TUR').GetNameWithNoTooltip]"
  flavor_pap.1800.desc: "Падіння [ShowLocationName('constantinople')] викликало шок у всьому [ShowReligionGroupAdjective('christian')] світі, змінивши баланс регіональної влади та віддавши одне з найважливіших місць християнства в руки невірних. Незважаючи на численні військові спроби зупинити [GetCountry('TUR').GetAdjective] експансію, наші зусилля мали незначний успіх.\n\nУ світлі цього з'явилася смілива пропозиція: замість того, щоб продовжувати безплідний конфлікт, ми повинні розглянути дипломатичний підхід. Було запропоновано надіслати листа [ottoman_ruler.GetName], закликаючи його навернутися до [ShowReligionName('catholic')]. В обмін ми визнали б його законним Імператором Риму, потенційно об'єднавши віру під одним прапором та стабілізувавши регіон."
  flavor_pap.1800.a: "Це божевілля!"
  flavor_pap.1800.b: "Це божевілля! Але спробуймо..."
  suffer_100_opinion_with_every_muslim_in_range_tt: "Кожна відома [ShowReligionGroupAdjective('muslim')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] у нашому [Concept('diplomatic_range', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowBiasValue('opinion_tur_betrayed_the_true_faith')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас."
  gain_50_opinion_with_every_christian_in_range_tt: "Кожна відома [ShowReligionGroupAdjective('christian')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] у нашому [Concept('diplomatic_range', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowBiasValue('opinion_tur_embraced_the_true_faith')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас."
  flavor_pap.1800.historical_info: "У 1461 році Папа Пій II написав листа султану Мехмеду II Османської імперії, пропонуючи йому можливість навернутися до християнства. В обмін Папа обіцяв Мехмеду папські благословення, визнання його законним правителем християнських земель, які він контролював, та підтримку в його майбутніх починаннях. Однак лист так і не був доставлений султану і, ймовірно, поширювався лише серед християн у Європі."
  flavor_pap.1801.title: "Пропозиція Римської Корони"
  flavor_pap.1801.desc: "Дивовижне послання надійшло від [GetCountry('PAP').GetName], адресоване безпосередньо нашому [GetCountry('TUR').GetGovernment.GetRulerTitle]. У листі [GetCountry('PAP').GetGovernment.GetRulerTitle] пропонує радикальну угоду: якщо ми погодимося навернутися до [ShowReligionName('catholic')], [GetUniqueInternationalOrganization('catholic_church').GetName] офіційно визнає нас законними Імператорами Риму. Це поклало б край гіркому конфлікту з Християнським світом і, теоретично, об'єднало б наші володіння під єдиною вірою. Більшість розглядає це як хитрий хід, щоб підірвати нашу імперію зсередини, тоді як дехто бачить у цьому унікальну можливість консолідувати владу по всій [ShowContinentName('europe')]. Наші радники вважають цю пропозицію божевіллям, і згода на неї, ймовірно, призведе до внутрішніх заворушень неймовірного масштабу."
  flavor_pap.1801.a: "[GetCountry('PAP').GetGovernment.GetRulerTitle] — проклятий дурень."
  flavor_pap.1801.b: "Хай живе Кайзер-і Рум!"
  flavor_pap.1802.title: "[GetCountry('TUR').GetNameWithNoTooltip] Відхиляє пропозицію"
  flavor_pap.1802.desc: "Несподівано, [GetCountry('TUR').GetName] відхилили нашу пропозицію про єдність під [GetUniqueInternationalOrganization('catholic_church').GetName], обравши залишитися непохитними у своїй вірі та відокремленими від нашої справи. Ця відмова є тверезим нагадуванням про зростаючий розкол між нашими володіннями, який необхідно вирішувати іншими засобами, якщо ми хочемо захистити наш світ від подальших конфліктів."
  flavor_pap.1802.a: "Марна спроба..."
  flavor_pap.1803.title: "[GetCountry('TUR').GetNameWithNoTooltip] Приймає пропозицію"
  flavor_pap.1803.desc: "Історичним рішенням [GetCountry('TUR').GetName] погодилися розглянути навернення та прийняти титул Імператора Риму під керівництвом [GetUniqueInternationalOrganization('catholic_church').GetName]. Цей монументальний зсув може принести мир між нашими володіннями та зміцнити Християнський світ несподіваними способами. Однак багато хто в Церкві сприймає цей розвиток подій зі змішаними почуттями, ставлячи під сумнів розсудливість надання такого титулу колишньому супротивнику [ShowReligionGroupAdjective('christian')] [ShowContinentName('europe')]."
  flavor_pap.1803.a: "Велика дипломатична перемога!"
  flavor_pap.9000.title: "Папська держава"
  flavor_pap.9000.desc: "Глибока відданість римо-католиків у Римі пробудила бажання незалежної держави, керованої Папами Церкви. Значна частина населення висловила підтримку ідеї такого утворення і тепер звернулася до [ROOT.GetCountry.GetGovernment.GetRuler.GetName] за схваленням."
  flavor_pap.9000.a: "Ми ніколи не підтримаємо таку державу"
  every_catholic_hates_us_tt: "Кожна [ShowReligionAdjective('catholic')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] змінює свою [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] про [ROOT.GetCountry.GetLongName] на [ShowBiasValue('opinion_declined_independent_state_support')|+=0]"
  flavor_pap.9000.b: "Рим по праву їхній"
  flavor_pap.9001.title: "Папська держава"
  flavor_pap.9001.desc: "Нам справді сумно бачити, що володіння Папи майже зникли. Наша сильна відданість робить нас ідеальним кандидатом, відповідальним за створення нової Папської держави. Можливо, нам варто поступитися однією з наших провінцій?"
  flavor_pap.9001.a: "На славу Божу!"
  flavor_pap.9001.b: "Можливо, ні."