l_english:
  flavor_dan_skane_war.1.title: "Повстання [target_character.GetNameWithNoTooltip]"
  flavor_dan_skane_war.1.desc: "[target_character.GetName], один з найшанованіших членів нашого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], був виявлений у змові проти [GetCountry('SWE').GetAdjective] верховенства [ROOT.GetCountry.GetName]. Його причини невдоволення нашими Сюзеренами небезпідставні, оскільки [target_ruler.GetName] часто нехтує справами нашої держави на користь [GetCountry('SWE').GetCulture.GetNameWithNoTooltip] [GetCountry('SWE').GetGovernment.GetEstateName('nobles_estate')]. З огляду на останні події в [GetCountry('DAN').GetName], нам може бути вигідно знову проголосити свою вірність [GetCountry('DAN').GetAdjectiveWithNoTooltip] державі."
  flavor_dan_skane_war.1.a: "Вислати його до [GetCountry('DAN').GetNameWithNoTooltip]."
  flavor_dan_skane_war.1.b: "Підтримати його повстання."
  flavor_dan_skane_war.1.b.tt: "Це може призвести до того, що наша країна буде анексована [GetCountry('DAN').GetName]"
  flavor_dan_skane_war.2.title: "[target_character.GetNameWithNoTooltip] Пропонує свої послуги"
  flavor_dan_skane_war.2.desc: "[target_character.GetName] прибув з [GetCountry('SKE').GetName], де він відстоював справу, щоб знову проголосити законне [ROOT.GetCountry.GetAdjective] правління над [ShowAreaName('skaneland_area')]. З ним при нашому дворі ми змогли б налагодити контакти з привітними [ShowCultureName('danish')] членами [GetCountry('SKE').GetAdjective] [GetCountry('SKE').GetGovernment.GetEstateName('nobles_estate')]."
  flavor_dan_skane_war.2.a: "Він більш ніж бажаний!"
  flavor_dan_skane_war.2.a.tt: "Коли настане слушний час, ми зможемо розраховувати на [GetCountry('SKE').GetAdjectiveWithNoTooltip] підтримку"
  flavor_dan_skane_war.2.b: "Ми не потребуємо жодної допомоги."
  flavor_dan_skane_war.3.title: "[GetCountry('SKE').GetNameWithNoTooltip] Повертається до лона"
  flavor_dan_skane_war.3.desc: "[GetCountry('SKE').GetGovernment.GetEstateName('nobles_estate')] [GetCountry('SKE').GetName] знову осягнув розум і вирішив обрати нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] своїм законним правителем. Хоча це безсумнівно розгніває [GetCountry('SWE').GetLongName], є мало причин відмовлятися від коронації."
  flavor_dan_skane_war.3.a: "Славний день!"
  flavor_dan_skane_war.3.b: "Та корона нічого не варта."
  flavor_dan_skane_war.4.title: "[GetCountry('SKE').GetNameWithNoTooltip] Приєднується до [GetCountry('DAN').GetNameWithNoTooltip]"
  flavor_dan_skane_war.4.desc: "Підступний [GetCountry('SKE').GetGovernment.GetEstateName('nobles_estate')] [GetCountry('SKE').GetName] змовився з [GetCountry('DAN').GetName], щоб покласти край нашому правлінню в [ShowAreaName('skaneland_area')]. Якщо ми не діятимемо швидко, ця територія вислизне з нашого володіння, можливо, назавжди."
  flavor_dan_skane_war.4.a: "Обурливо!"
  flavor_dan_skane_war.5.title: "Пропозиція про купівлю [GetCountry('SKE').GetNameWithNoTooltip]"
  flavor_dan_skane_war.5.desc: "Хоча відкриті повстання були рідкістю в [GetCountry('SKE').GetName], розбрат між країною та [GetCountry('SWE').GetName] не зник з часів повстання [target_character.GetName].\n\nМи повинні зробити пропозицію викупити землю у [GetCountry('SWE').GetNameWithNoTooltip], що дозволило б уникнути кровопролиття в [ShowRegionName('scandinavian_region')] та забезпечити мир."
  flavor_dan_skane_war.5.a: "Зробити пропозицію."
  flavor_dan_skane_war.5.a.tt: "Ми запропонуємо 6 місяців нашого доходу як плату за [GetCountry('SKE').GetNameWithNoTooltip], що зробить їх нашими васалами у випадку, якщо [GetCountry('SWE').GetNameWithNoTooltip] погодиться"
  flavor_dan_skane_war.5.b: "Це більше не приносить нам користі."
  flavor_dan_skane_war.6.title: "[GetCountry('DAN').GetNameWithNoTooltip] Пропонує купити [GetCountry('SKE').GetNameWithNoTooltip]"
  flavor_dan_skane_war.6.desc: "[GetCountry('DAN').GetName] надіслав нам пропозицію придбати права на верховенство над [GetCountry('SKE').GetName]. Прийняття пропозиції принесе нам приплив золота, яке можна було б використати з великою користю, але це також коштуватиме нам негайного доступу до [ShowLocationName('oresund')]."
  flavor_dan_skane_war.6.a: "Ми приймаємо!"
  flavor_dan_skane_war.6.b: "Відхилити пропозицію!"
  flavor_dan_skane_war.7.title: "[GetCountry('SWE').GetNameWithNoTooltip] Приймає нашу пропозицію"
  flavor_dan_skane_war.7.desc: "[GetCountry('SWE').GetName] прийняв нашу пропозицію придбати верховенство над [GetCountry('SKE').GetName]. Хоча деякі формальності ще виконуються, договір ратифіковано і він вже діє."
  flavor_dan_skane_war.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"