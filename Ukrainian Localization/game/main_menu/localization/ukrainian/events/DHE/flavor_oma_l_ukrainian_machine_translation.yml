l_english:
  flavor_oma.1.title: "Боротьба за владу"
  flavor_oma.1.desc: "Зі зростанням нестабільності в [ROOT.GetCountry.GetName], А'імма вирішили виступити проти нації, сподіваючись відновити старий Імамат та владу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] над [ROOT.GetCountry.GetGovernment.GetCourtTitle] та простим народом."
  flavor_oma.1.historical_info: "Династія Набханітів тримала владу понад три століття, але в XV столітті її авторитет почали ставити під сумнів обрані А'імма. Ця боротьба тривала, доки династія не втратила контроль над країною."
  flavor_oma.1.a: "Підкоритися Імаму."
  flavor_oma.1.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] править в Омані!"
  flavor_oma_portugal_historical_info: "Наприкінці XV століття дослідники з Португалії відкрили шлях навколо мису Доброї Надії до Індії. Щоб захистити свої морські шляхи та забезпечити своє панування в торгівлі, вони вторглися в Оман і окупували Сухар та Маскат майже на 150 років."
  flavor_oma.2.title: "Португальці прибули!"
  flavor_oma.2.desc: "Купці з [GetCountry('POR').GetName] прибули до наших берегів. Вони оселилися в [ShowLocationName('masqat')], сподіваючись ще більше закріпити свій контроль там, щоб посилити свою владу над торгівлею прянощами."
  flavor_oma.2.historical_info: "$flavor_oma_portugal_historical_info$"
  flavor_oma.2.a: "Ми будемо боротися з ними."
  mam_por_confronted: "Протистояння через торгівлю"
  flavor_oma.2.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_oma.3.title: "Захист індійської торгівлі"
  flavor_oma.3.desc: "Якщо ми коли-небудь хочемо мати шанс проти конкуруючих держав за торгівлю рисом в $india$, ми повинні створити військово-морські форпости, які дозволять нам базувати наші флоти. Одним з таких портів є [target_location.GetRank.GetName] [target_location.GetName], що належить народу [target_country.GetName]. Ми могли б розпочати вторгнення на [target_location.GetRank.GetNameWithNoTooltip], але, можливо, є інші способи придбати таке вишукане місце."
  flavor_oma.3.historical_info: "$flavor_oma_portugal_historical_info$"
  flavor_oma.3.a: "Нам потрібно більше форпостів."
  flavor_oma.3.b: "Навіщо завойовувати, коли ми можемо торгувати?"
  flavor_oma.4.title: "Кораблебудівники [target_location.GetNameWithNoTooltip]"
  flavor_oma.4.desc: "[target_location.GetName] має історію головного торгового центру для будь-яких іноземних купців, які продають свої товари та зупиняються в його багатих кварталах. [target_character.GetName] планував перетворити цей [target_location.GetRank.GetName] на місце, де будуватимуться наші кораблі, і де наші флоти швартуватимуться, щоб вирушити до [ShowSubContinentName('indian_ocean_sub_continent')]."
  flavor_oma.4.historical_info: "Сур завжди був чудовим портом, з каналом, який тисячоліттями був безпечною якірною стоянкою для кораблів. Тут розташовані знамениті верфі Оману, де будують дау. У середині XVII століття країна стала більш процвітаючою завдяки торгівлі, знову покладаючись на свої кораблі."
  flavor_oma.4.a: "Дау будуть плавати скрізь."
  flavor_oma.4.b: "Ми вкладемо всі наші ресурси в це."
  flavor_oma.4.c: "У нас є важливіші справи."
  flavor_oma.5.title: "Правителі [ShowRegionNameWithNoTooltip('swahili_coast_region')]"
  flavor_oma.5.desc: "Зі завоюванням [ShowLocationName('kilwa_kisiwani')] та нашим закріпленням у [ShowRegionName('swahili_coast_region')], ми тепер можемо забезпечити посилення нашого впливу в цьому районі. Одним з перших планів для досягнення цього є перенесення нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] до [target_location.GetRank.GetName] [target_location.GetName]."
  flavor_oma.5.a: "[target_character.GetNameWithNoTooltip] мешкатиме в [ShowLocationNameWithNoTooltip('kilwa_kisiwani')]."
  flavor_oma.5.b: "Ми ніколи не покинемо [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]!"
  flavor_oma_forts_historical_info: "Щоб захистити торгівлю ладаном в Омані, вони збудували численні форти по всій країні, аби ці каравани не зазнавали нападів."
  flavor_oma.6.title: "Форт [target_location.GetNameWithNoTooltip]"
  flavor_oma.6.desc: "[target_location.GetRank.GetName] є життєво важливою зупинкою для наших [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], оскільки він стоїть між виробництвом [ShowGoodsName('incense')] у [ShowLocationName('mirbat')] та узбережжям [ShowRegionName('persia_region')], звідки його потім відправляють до [ShowContinentName('europe')] або [ShowContinentName('asia')]. Попередні правителі намагалися укріпити [target_location.GetRank.GetNameWithNoTooltip], але відповідальність лежить на [target_character.GetName] та [target_character.GetHisHer] [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_oma.6.historical_info: "$flavor_oma_forts_historical_info$"
  flavor_oma.6.a: "Розширити [target_location.GetRank.GetNameWithNoTooltip] та укріпити територію."
  flavor_oma.6.b: "Розширимо лише [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_oma.6.c: "[target_location.GetNameWithNoTooltip] не потребує жодної підтримки."
  flavor_oma.7.title: "Зміцнення торгівлі ладаном"
  flavor_oma.7.desc: "Хоча ферми [target_location.GetName] добре служили нашій торгівлі [ShowGoodsName('incense')], попит на нього зростає, оскільки наші високоякісні парфуми шукають у всьому світі. Можливо, інвестувавши більше в цю торгівлю, ми зможемо швидко отримати великий прибуток."
  flavor_oma.7.a: "Продамо ще більше парфумів світу."
  flavor_oma.7.b: "Це надто дорого."
  flavor_oma.8.title: "Піднесення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] флоту"
  flavor_oma.8.desc: "Оскільки багато інших націй змагаються за [ShowRegionName('indian_ocean_region')] та її величезну торгівлю, ми також повинні приєднатися до цієї гонки, інакше наші порти будуть на милості інших держав. Розширивши [ShowBuildingTypeName('dock')] у [target_location.GetName] і відправивши [target_character2.GetName] для планування такої армади, ми, можливо, зможемо панувати на наших морях."
  flavor_oma.8.a: "До морів, хоробрі [ROOT.GetCountry.GetAdjectiveWithNoTooltip] моряки!"
  flavor_oma.8.b: "Натомість буде розширено [ROOT.GetCountry.GetAdjectiveWithNoTooltip] армію."
  flavor_oma_falaj_historical_info: "Фалядж, більш відомий як Канат перського походження, — це підземна система акведуків, яка допомагає транспортувати воду на поверхню, переважно використовується на Близькому Сході та в Північній Африці. Оман використовував цю систему для транспортування води з Ізкі до Нізви, що дозволило місту процвітати."
  flavor_oma.9.title: "Постачання води до [target_location.GetNameWithNoTooltip]"
  flavor_oma.9.desc: "[target_location.GetName] має проблеми з водопостачанням. Будучи далеко від узбережжя, можливо, настав час розширити наші старі підземні акведуки, [ShowBuildingTypeName('oma_falaj')], щоб допомогти місцевому населенню."
  flavor_oma.9.historical_info: "$flavor_oma_falaj_historical_info$"
  flavor_oma.9.a: "Наші попередні акведуки були недостатньо хорошими. Розширимо їх."
  flavor_oma.9.b: "[target_location.GetRank.GetNameWithNoTooltip] почувається чудово."
  flavor_oma.10.title: "Піднесення [target_location.GetNameWithNoTooltip]"
  flavor_oma.10.desc: "З огляду на те, що [target_location.GetRank.GetName] [target_location.GetName] процвітає останніми роками, а його позиція в торгівлі ладаном є такою ж життєво важливою, як і раніше, [target_character.GetName] розробив плани перетворити [target_location.GetRank.GetNameWithNoTooltip] на перлину [ROOT.GetCountry.GetName]. Розширивши його резиденції та побудувавши [ShowBuildingTypeName('oma_nizwa_fort')], ми можемо гарантувати, що [target_location.GetNameWithNoTooltip] ніколи не буде зневажений іншими націями."
  flavor_oma.10.historical_info: "$flavor_oma_forts_historical_info$"
  flavor_oma.10.a: "Зміцнімо [target_location.GetNameWithNoTooltip] ще більше."
  flavor_oma.10.b: "Лише [target_location.GetRank.GetNameWithNoTooltip] буде розширено."
  flavor_oma.10.c: "Це вже чудове [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_oma.11.title: "Мігранти на [ShowRegionNameWithNoTooltip('swahili_coast_region')]"
  flavor_oma.11.desc: "З нашими планами встановити контроль над [ShowRegionName('swahili_coast_region')], багато людей з [ShowAreaName('oman_area')] вже запланували оселитися в [target_location.GetName] та навколишніх територіях. Можливо, нам варто дозволити їм це, оскільки це дозволить нам легше керувати тамтешнім населенням."
  flavor_oma.11.a: "Заселімо [ShowRegionNameWithNoTooltip('swahili_coast_region')] [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] поселенцями."
  flavor_oma.11.b: "Це не варте зусиль."
  flavor_oma.12.title: "Піратський берег"
  flavor_oma.12.desc: "[ShowAreaName('oman_sea_zones_area')] поволі стає домом для численних каперських дій, де вантажі, що прямують з $india$ до [ShowContinentName('europe')] або [ShowContinentName('africa')], перехоплюються піратами, які бажають нажитися. Ми можемо спробувати боротися з ними, або ж запросити їх служити нам."
  flavor_oma.12.a: "Запросімо цих піратів до наших портів."
  flavor_oma.12.b: "Піратське життя для [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_oma.12.c: "На нашому узбережжі не буде піратів."
  flavor_oma.13.title: "Замок [target_location.GetNameWithNoTooltip]"
  flavor_oma.13.desc: "Остання зупинка для наших [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] перед досягненням узбережжя — це [target_location.GetRank.GetName] [target_location.GetName]. Хоча там вже є укріплення, їх недостатньо для захисту караванів, що проходять повз. Можливо, [target_character.GetName] може профінансувати [target_location.GetRank.GetNameWithNoTooltip] ще більше."
  flavor_oma.13.historical_info: "$flavor_oma_forts_historical_info$"
  flavor_oma.13.a: "Замок захистить наші інтереси для нового порту."
  flavor_oma.13.b: "Натомість зосередьмося на зміцненні наших сухопутних кордонів."
  flavor_oma.14.title: "Укріплення [target_location.GetNameWithNoTooltip]"
  flavor_oma.14.desc: "З нашими старими суперниками, що мешкали в [target_location.GetName], затьмареними, і [target_location.GetRank.GetName] під нашим контролем, настав час вирішити її долю. Попри наші старі образи, це життєво важливий порт для торгівлі в [ShowRegionName('persia_region')] та її затоці."
  flavor_oma.14.a: "Острів відіграє життєво важливу роль для торгівлі в [ShowRegionNameWithNoTooltip('persia_region')]."
  flavor_oma.14.b: "Натомість розвиваймо [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_oma.15.title: "Новий імамат"
  flavor_oma.15.desc: "[ROOT.GetCountry.GetName] знову стала нестабільною. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [target_character.GetName] тепер застрягли у боротьбі за владу, а [target_character2.GetName] планує відновити [ShowGovernmentTypeName('theocracy')]. Можливо, ми зможемо впоратися з [target_character2.GetHimHer], вигнавши [target_character2.GetHerHis] за межі [ROOT.GetCountry.GetName], хоча це, безумовно, засмутить наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_oma.15.a: "Ми підтримуємо новий режим під керівництвом [target_character2.GetNameWithNoTooltip]."
  flavor_oma.15.b: "Вигнати [target_character2.GetNameWithNoTooltip] за змову проти [target_character.GetNameWithNoTooltip]."
  flavor_oma.16.title: "Заселення Узбережжя"
  flavor_oma.16.desc: "Хоча частина нашого населення мешкає подалі від узбережжя в таких місцях, як [target_location.GetName], єдиний спосіб розширити наш морський вплив — це заселення наших узбереж. [target_character.GetName] та [target_character.GetHisHer] [ROOT.GetCountry.GetGovernment.GetCourtTitle] вже розробляють плани щодо цього."
  flavor_oma.16.a: "Почнімо заселяти наші прибережні райони."
  flavor_oma.16.b: "Єдині місця, що потребують підтримки, це ті, що знаходяться подалі від узбережжя."
  flavor_oma.16.c: "У нас недостатньо коштів для цього."
  flavor_oma.17.title: "Розширення фаладжу"
  flavor_oma.17.historical_info: "$flavor_oma_falaj_historical_info$"
  flavor_oma.17.desc: "Наші минулі зусилля з водопостачання [ShowLocationName('nizwa')] за допомогою системи [ShowBuildingTypeName('oma_falaj')] виявилися успішними. Значна частина населення там тепер задоволена своїм новим водопостачанням, живучи розкішним життям. [target_character.GetName] вже розробив плани щодо розширення цієї системи на інші місця, хоча вони, безумовно, є дорогими."
  flavor_oma.17.a: "Гідне починання."
  flavor_oma.17.b: "Самі лише плани призведуть нас до банкрутства."
  flavor_oma.18.title: "Заморські Амбіції"
  flavor_oma.18.desc: "З нашим могутнім флотом, збудованим та визнаним іншими державами, [target_character.GetName] та [target_character.GetHisHer] [ROOT.GetCountry.GetGovernment.GetCabinetTitle] розробляли плани щодо того, яку частину світу вони заявлять для себе. Багато хто стверджує, що [ShowGoodsName('pepper')] в $india$ — це те, що їм потрібно забезпечити, тоді як інші вважають, що землі [ShowRegionName('swahili_coast_region')] є більш життєздатними для контролю. У будь-якому випадку, історія пам'ятатиме [ROOT.GetCountry.GetName] як $rank_empire$."
  flavor_oma.18.a: "Як і решта, ми також виборемо своє місце під сонцем."