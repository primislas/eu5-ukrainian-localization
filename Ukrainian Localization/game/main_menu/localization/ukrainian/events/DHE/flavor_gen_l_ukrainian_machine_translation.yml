l_english:
  flavor_gen.1.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Купецька Республіка"
  flavor_gen.1.desc: "З моменту державного перевороту Гульєльмо Бокканегри в 1257 році, держава [ROOT.GetCountry.GetName] має #italic Capitano del popolo#! як главу держави. З часом ця посада була розділена на [ShowGovernmentReformName('diarchy_republic')] з родинами [ShowDynastyName('spinola_dynasty')] та [ShowDynastyName('doria_dynasty')], які порівну керували країною.\n\nОднак, #italic Capitano del popolo#! завжди була суперечливою позицією, оскільки багато [ROOT.GetCountry.GetAdjectiveWithNoTooltip] розглядають нинішній уряд як автократію. За загальним визнанням у [GetCurrentYear], правління Діархії може нарешті знайти свій кінець."
  flavor_gen.1.a: "Нехай республіка приведе нас у нову золоту добу!"
  flavor_gen.1.b: "Ми не можемо відмовитися від функціонуючої системи."
  flavor_gen.2.title: "Liber Gazerie"
  flavor_gen.2.desc: "Газарія — це назва, яку [ROOT.GetCountry.GetName] дає своїм володінням у Криму, за назвою її столиці, [ShowLocationName('kaffa')]. Через їхню велику віддаленість від материка та кордон з монголами та татарами Понтійських степів, Газарія завжди перебуває під загрозою чергової кампанії орд.\n\nАдміністрація Газарії була організована в 1313 році після того, як її було відвойовано у монголів. Однак ці зміни в адміністрації ще належить кодифікувати та запровадити за допомогою #italic Liber Gazerie#!."
  flavor_gen.2.a: "Кодифікувати #italic Liber Gazerie#!."
  flavor_gen.2.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowNamedValue('control_radical_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] та [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_gen.2.b: "У нас немає ресурсів для цих законів."
  flavor_gen.3.title: "Падіння [ShowLocationNameWithNoTooltip('constantinople')]"
  flavor_gen.3.desc: "З падінням [ShowLocationName('constantinople')] до [GetCountry('TUR').GetLongName], [ROOT.GetCountry.GetAdjective] торгівля з Чорного моря опинилася під загрозою. Економічний вплив італійських купців зменшився після того, як [GetCountry('TUR').GetNameWithNoTooltip] отримав контроль над входом до моря, а останні провінції були втрачені в 1455 році."
  flavor_gen.3.a: "Вимагати вільного доступу від [GetCountry('TUR').GetNameWithNoTooltip]"
  flavor_gen.3.a.tt: "Ми надішлемо листа з проханням про звільнення від [Concept('sound_tolls', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_gen.3.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_gen.4.title: "Вимоги від Генуї"
  flavor_gen.4.desc: "Емісар від [GetCountry('GEN').GetLongName] з'явився при дворі. Вони просять ексклюзивних торгових привілеїв через Босфор. Вони стверджують, що це їхнє право, і що ми процвітатимемо завдяки їхній пропозиції."
  flavor_gen.4.a: "Це обурливо!"
  gen_trade_access_denied: "Відмовлено в ексклюзивних торгових привілеях через Босфор"
  flavor_gen.4.b: "Може бути нагода..."
  flavor_gen.4.b.tt: "Вони отримають звільнення від [Concept('sound_tolls', 'CONCEPT_PLACEHOLDER')|e] у Босфорі."
  gen_trade_given: "Надано ексклюзивні торгові привілеї через Босфор"
  flavor_gen.5.title: "[GetCountry('TUR').GetNameWithNoTooltip] відмовляється!"
  flavor_gen.5.desc: "[GetCountry('TUR').GetLongName] відмовився від наших вимог надати нам привілейований торговий доступ через Босфор. Вони обурені нашим нерозумінням політики, і деякі радники закликали [GetCountry('TUR').GetGovernment.GetRulerTitle] розпочати війну."
  flavor_gen.5.a: "Сподіваємося, вони не розпочнуть війну..."
  flavor_gen.6.title: "Привілейована торгівля надана!"
  flavor_gen.6.desc: "[GetCountry('TUR').GetLongName] надав нам привілейований торговий доступ через Босфор, щоб підтримати наших купців на Чорному морі."
  flavor_gen.6.a: "Добрі новини"
  flavor_gen.7.title: "Статути Газарії"
  flavor_gen.7.desc: "Хоча #italic Liber Gazerie#! охоплює торгівлю, майнові права та кримінальне правосуддя в [ROOT.GetCountry.GetAdjective] Газарії, він описує уряд колонії лише на відносно поверхневому рівні. Із запровадженням #italic Statuta Gazerie#!, оновлення цієї правової бази, можна було б вирішити питання управління та організації громади в Газарії. Однак, знову ж таки, впровадження та забезпечення виконання цього кодексу законів є фінансовою інвестицією, яку має зробити [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_gen.7.a: "Впровадити #italic Statuta Gazerie#!."
  flavor_gen.7.b: "Ми не можемо собі цього дозволити."
  flavor_gen.8.title: "Банкрутство Casa San Giorgio"
  flavor_gen.8.desc: "У 1407 році Ufficio di San Giorgio розпочав банківську діяльність, позичаючи гроші своїм акціонерам та надаючи такі послуги, як векселі. До 1437 року банк також керував монетним двором. Постійні державні запозичення та недостатня капіталізація призвели до краху банку в 1444 році.\n\nЩо нам робити?"
  flavor_gen.8.a: "Врятувати банк!"
  flavor_gen.8.b: "Нехай він загине..."
  flavor_gen.9.title: "Міжусобиця гвельфів і гібелінів"
  flavor_gen.9.desc: "Розкол між Папою та Імператором розпочався наприкінці XI століття і технічно закінчився в 1122 році, але поділ між гвельфами та гібелінами зберігався в Італії протягом століть після цього, будучи постійним фактором, що розділяв міста-держави внутрішньо та тримав Італію слабкою. Гвельфи були прихильниками Папи, тоді як гібеліни підтримували Імператора. У XV столітті гвельфи змінили свою вірність на французів, оскільки ті почали виявляти інтерес до Італії."
  flavor_gen.9.a: "Стати на бік гвельфів"
  gen_pro_guelph: "Підтримка гвельфів"
  gen_anti_ghibellines: "Проти гібелінів"
  flavor_gen.9.b: "Віддати перевагу гібелінам"
  gen_pro_ghibellines: "Підтримка гібелінів"
  gen_anti_guelph: "Проти гвельфів"
  flavor_gen.10.title: "Адмірал Андреа Доріа"
  flavor_gen.10.desc: "Андреа Доріа належав до гілки старовинної родини де Ауріа. Він рано втратив своїх шляхетних батьків і став солдатом удачі, служачи спочатку Папі, а потім французам. Він прославився як морський командир, ведучи війну проти турків та берберських піратів. Він стояв за піднесенням [ROOT.GetCountry.GetLongName] після років окупації французькими та імперськими силами."
  flavor_gen.10.a: "Він очолить наш флот!"
  flavor_gen.10.b: "Нам не потрібні його послуги"
  flavor_gen.11.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] Андреа Доріа"
  flavor_gen.11.desc: "Андреа Доріа відмовився від кількох пропозицій стати дожем Генуї, але зрештою прийняв посаду довічного цензора і мав значний вплив у радах республіки. За свою службу Республіці йому було надано кілька палаців та багато інших привілеїв, а також титул Liberator et Pater Patriae."
  flavor_gen.11.a: "Він стане хорошим [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  flavor_gen.11.b: "Він стане Довічним Цензором!"
  flavor_gen.12.title: "Рішення Генуї"
  flavor_gen.12.desc: "Генуя була невеликою купецькою республікою на Середземномор'ї, тоді як Франція та Іспанія перетворилися на могутні держави з великим інтересом до Італії. Знаменитий кондотьєр Андреа Доріа з Генуї служив спочатку Франції, а потім Іспанії в різних війнах.\n\nЩо нам робити?"
  flavor_gen.12.a: "Стати на бік Франції"
  gen_andrea_doria_reform: "Спадщина Андреа Доріа"
  flavor_gen.12.b: "Стати на бік Іспанії"
  flavor_gen.13.title: "Золотий вік [ROOT.GetCountry.GetAdjective] банкірів"
  flavor_gen.13.desc: "[ROOT.GetCountry.GetAdjective] банкіри фінансували багато закордонних починань іспанської корони. Деякі історики навіть називали цей період Добою [ROOT.GetCountry.GetAdjectiveWithNoTooltip]. Кілька блискучих палаців було побудовано в цю епоху вздовж Страда Нуова, але це тривало не вічно, оскільки коли турки захопили Хіос, тоді [ROOT.GetCountry.GetAdjective] торгова імперія у східному Середземномор'ї занепала."
  flavor_gen.13.a: "Це триватиме вічно!"
  flavor_gen.14.title: "Доля Газарії"
  flavor_gen.14.desc: "Падіння [ShowLocationName('constantinople')] є не лише шоком для християнського світу, але й кінцем існування [ROOT.GetCountry.GetAdjective] колоніальних амбіцій у Чорному морі. Зрозуміло, що [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Газарія приречена впасти під турецькою загрозою.\n\nОскільки у нас мало причин утримувати колонію, виникли ідеї передати її Casa San Giorgio. Хоча доля колонії вирішена, вона все ще може мати шанс на виживання під суверенітетом банку."
  flavor_gen.14.a: "Передати Газарію банку."
  flavor_gen.14.b: "Ми можемо і будемо захищати Газарію самі!"
  flavor_gen.15.title: "Маона Хіоса та Фокеї"
  flavor_gen.15.desc: "[ShowLocationName('chios')] та [ShowLocationName('foca')] перебували під [ROOT.GetCountry.GetAdjective] суверенітетом доки [GetCharacter('byz_andronikos_ii_palaiologos').GetName] не повернув острів для [GetCountry('BYZ').GetName] у 1329 році. Маона Хіоса та Фокеї, створена групою впливових інвесторів, більш ніж зацікавлена у поверненні острова [ShowLocationNameWithNoTooltip('chios')], встановленні на ньому свого плацдарму та захисті багатих квасцевих копалень [ShowLocationNameWithNoTooltip('foca')]. Але для такого починання їм знадобиться додаткова фінансова підтримка."
  flavor_gen.15.a: "Надати їм кошти та права."
  flavor_gen.15.b: "Вони можуть впоратися самі."
  flavor_gen.16.title: "Відвоювання Хіоса"
  flavor_gen.16.desc: "Острів [ShowLocationName('chios')] був домом для Сеньйорії Хіоса, яка перебувала під владою [ROOT.GetCountry.GetLongName] з 1304 року до її падіння у 1329 році. Занепадаюча [GetCountry('BYZ').GetLongName] знову повернула острів собі у 1329 році після того, як місцева родина Дзаккарія налаштувала проти себе місцеве грецьке населення. З тих пір острів вважався втраченим для візантійців, доки не почалася нова громадянська війна.\n\nПоки їхній уряд був зайнятий внутрішніми чварами, хитрі члени Маони Хіоса та Фокеї захопили острів у греків. Тепер Хіос повернувся до [ROOT.GetCountry.GetAdjectiveWithNoTooltip] рук."
  flavor_gen.16.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  gen_has_taken_chios_from_us: "Забрали у нас Хіос."
  flavor_gen.16.b: "Ми не повинні гнівити греків і повернути острів."
  gen_has_returned_chios_to_us: "Повернули нам Хіос."
  flavor_gen.17.title: "[arrigo_della_rocca.GetNameWithNoTooltip]"
  flavor_gen.17.desc: "Хоча Корсика, що складається з провінцій [ShowProvinceDefinitionName('cismonte_province')] та [ShowProvinceDefinitionName('pumonte_province')], формально перебуває під суверенітетом [ROOT.GetCountry.GetLongName], місцева політика Корсиканського острова традиційно домінує п'ятьма шляхетними кланами. Одним з них є родина Банда деї Фуорі, яка висунула амбітного [arrigo_della_rocca.GetName]. Спочатку утримуваний генуезцями як заручник після того, як його батько був змушений віддати його, [arrigo_della_rocca.GetShortNameWithNoTooltip] приєднався до армії [GetCountry('ARA').GetName] і заробляв на життя як солдат удачі.\n\nЗрештою, він повернувся на острів і був обраний графом Корсики іншими шляхетними кланами за [GetCountry('ARA').GetAdjectiveWithNoTooltip] підтримки, ще більше підриваючи [ROOT.GetCountry.GetAdjectiveWithNoTooltip] владу над островом."
  corsican_independence_fighter: "Корсиканські борці за незалежність"
  arrigo_della_rocca_support_nobles_joining: "Усі [ShowCultureName('corsican')] [ShowPopTypeName('nobles')] у [ShowProvinceDefinitionName('cismonte_province')] та [ShowProvinceDefinitionName('pumonte_province')] приєднаються до [corsican_independence_fighter.GetName]"
  flavor_gen.17.a: "Надати йому Маону Корсики."
  flavor_gen.17.b: "Відбити його!"
  flavor_gen.18.title: "[sambucuccio_dalando.GetNameWithNoTooltip]"
  flavor_gen.18.desc: "Корсика завжди була причиною багатьох проблем для [ROOT.GetCountry.GetLongName]. Її народ упертий і шукає незалежності від нас за будь-якої нагоди.\n\nПроте вони також відмовляються схилятися перед будь-яким феодалом. Лідер жакерії, селянських повстанців з [GetCountry('FRA').GetName] під час Столітньої війни, [sambucuccio_dalando.GetName] та його союзники розпочали повстання проти [rebel_location.GetController.GetAdjective] у [rebel_location.GetName]."
  anti_feudal_revolters: "Антифеодальні повстанці"
  flavor_gen.18.a: "Нехай повстанці відіб'ють наших ворогів."
  flavor_gen.18.b: "Нам потрібен [sambucuccio_dalando.GetName] як наш генерал!"
  flavor_gen.19.title: "Заснування Бастії"
  flavor_gen.19.desc: "Острів Корсика виявився досить неприбутковим, і тому багато [ROOT.GetCountry.GetAdjective] купців та чиновників відмовилися втручатися у внутрішню політику острова. Однак деякі бізнесмени [ROOT.GetCountry.GetFlavorRank] все ще бачать потенціал у Корсиці. Заснована Маона Корсики організувала укріплення місцевості [ShowLocationName('bastia')], щоб утвердити свій контроль над островом. Вони також мають намір прискорити зростання міста поблизу, хоча це вимагатиме додаткової фінансової підтримки."
  flavor_gen.19.a: "Надати Маоні необхідну підтримку."
  flavor_gen.19.b: "Одного замку більш ніж достатньо."
  flavor_gen.20.title: "Кондотьєри Дому Доріа"
  flavor_gen.20.desc: "Родина [ShowDynastyName('doria_dynasty')] — це старий і заможний клан [ROOT.GetCountry.GetName]. Хоча вони здебільшого відомі своїми втручаннями в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] політику, Доріа славляться своїм керівництвом [ShowUnitDefinitionName('a_genoese_crossbowmen')] у наших найманих арміях.\n\nОдним із таких військових лідерів є [doria_commander.GetName], який висловив зацікавленість у командуванні армією [merc_army.GetName]."
  flavor_gen.20.a: "Нехай він командує нашими військами."
  flavor_gen.20.b: "Нам потрібен його досвід для всіх наших армій."
  flavor_gen.21.title: "Генуезькі арбалетники"
  flavor_gen.21.desc: "Завдяки своїй службі кондотьєрам, [ShowUnitDefinitionName('a_genoese_crossbowmen')] здобули визнання на полях битв. Природно, ця повага до цього підрозділу також змінює сприйняття іншими державами військових можливостей [ROOT.GetCountry.GetName]."
  flavor_gen.21.a: "Вони формуватимуть поля битв нашого часу."
  flavor_gen.21.b: "Арбалетники приносять славу [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_gen.22.title: "[ROOT.GetCountry.GetAdjective] Бізнес-можливості"
  flavor_gen.22.desc: "З початком великої війни між [target_country.GetLongName] та [target_country2.GetLongName] виникла чудова можливість для наших кишень. Оскільки обидві сторони намагаються перемогти свого ворога на полі бою, їм знадобиться будь-яка додаткова робоча сила, яку вони зможуть отримати.\n\nНа щастя, ми володіємо нашими смертоносними [ShowUnitDefinitionName('a_genoese_crossbowmen')]. Ми можемо схилити шальки терезів війни на користь того, хто готовий запропонувати більше за наших якісних солдатів."
  flavor_gen.22.a: "Підтримаємо [target_country.GetNameWithNoTooltip]."
  flavor_gen.22.a.tt: "Ми запропонуємо [target_country.GetName] 2000 наших найкращих [ShowUnitDefinitionName('a_genoese_crossbowmen')] в обмін на річний дохід"
  flavor_gen.22.b: "[target_country2.GetNameWithNoTooltip] добре заплатить."
  flavor_gen.22.b.tt: "Ми запропонуємо [target_country2.GetName] 2000 наших найкращих [ShowUnitDefinitionName('a_genoese_crossbowmen')] в обмін на річний дохід"
  gen_offered_crossbowmen: "Запропонували нам арбалетників"
  gen_offered_opponent_crossbowmen: "Запропонували нашому ворогу арбалетників"
  flavor_gen.22.c: "Нам не слід антагонізувати жодну з цих держав."
  flavor_gen.23.title: "Пропозиція від [genoese_crossbowmen_seller.GetNameWithNoTooltip]"
  flavor_gen.23.desc: "Війна з нашим заклятим суперником, схоже, перетворюється на довготривалий і кровопролитний конфлікт за панування над [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName] — конфлікт, який ми не повинні програти!\n\nЩоб отримати перевагу над [the_enemy.GetAdjective], ми повинні бути відкритими до можливостей ззовні. На щастя, така можливість надходить від досить несподіваних [genoese_crossbowmen_seller.GetAdjective] та їхніх [ShowUnitDefinitionName('a_genoese_crossbowmen')], оскільки вони пропонують продати нам 2000 своїх найкращих воїнів для боротьби проти [the_enemy.GetNameWithNoTooltip]."
  flavor_gen.23.a: "Ми повинні прийняти цю пропозицію!"
  gain_10_a_genoese_crossbowmen: "Отримати 2000 [ShowUnitDefinitionName('a_genoese_crossbowmen')] у [genoese_crossbowmen_buyer.Capital.GetName]."
  flavor_gen.23.b: "Ми не можемо собі цього дозволити."
  flavor_gen.24.title: "Відповідь [genoese_crossbowmen_buyer.GetAdjective]"
  flavor_gen.24.desc.a: "Новини від [genoese_crossbowmen_buyer.GetName] дійшли до нашого двору! З великою радістю нас повідомляють, що [genoese_crossbowmen_buyer.GetAdjective] ухвалили мудре рішення прийняти нашу щедру пропозицію.\n\n[ShowUnitDefinitionName('a_genoese_crossbowmen')] битимуться під [genoese_crossbowmen_buyer.GetAdjective] прапором."
  flavor_gen.24.desc.b: "Новини від [genoese_crossbowmen_buyer.GetName] дійшли до нашого двору! З жалем нас повідомляють, що [genoese_crossbowmen_buyer.GetAdjective] або надто економічно виснажені, або надто незацікавлені, щоб прийняти нашу пропозицію.\n\nЇхня відмова кидає погане світло на наших арбалетників."
  flavor_gen.24.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.24.b: "Ці дурні не люблять перемагати."
  flavor_gen.25.title: "Війна за протоки"
  flavor_gen.25.desc: "[ROOT.GetCountry.GetLongName] та [GetCountry('VEN').GetLongName] перебували у постійних суперечках та боротьбі з того часу, як обидва королівства почали змагатися за панування над Середземним морем з 1256 року.\n\nХоча остання війна завершилася у 1299 році, відносини між цими державами знову досягли нового мінімуму, оскільки [GetCountry('VEN').GetAdjectiveWithNoTooltip] мають труднощі з доступом до чорноморських портів і тепер погрожують нам війною."
  flavor_gen.25.a: "До зброї!"
  flavor_gen.25.b: "Можливо, цього разу мир вдасться забезпечити."
  flavor_gen.26.title: "Війна за Кьоджу"
  flavor_gen.26.desc: "[ROOT.GetCountry.GetLongName] та [GetCountry('VEN').GetLongName] ще не вирішили свого довготривалого суперництва, і суперечка за протоки ще свіжа в пам'яті їхніх правителів.\n\nНаближається нова конфронтація за контроль над Егейським морем, і у лідерів [ROOT.GetCountry.GetNameWithNoTooltip] починає формуватися ідея: чому б не розпочати нову війну за [GetCountry('VEN').GetAdjectiveWithNoTooltip] володіння в Адріатичному морі?"
  flavor_gen.26.a: "Фортуна сприяє сміливим!"
  flavor_gen.26.b: "Можливо, надто ризиковано тримати цей конфлікт відкритим."
  flavor_gen.27.title: "Облога Кафи"
  flavor_gen.27.desc: "[ROOT.GetCountry.GetName] здобула плацдарм у Криму після 1266 року за згодою [GetCountry('GLH').GetLongName], угода, яка дозволила обом сторонам встановити вигідні торговельні відносини, поєднавши Шовковий шлях із середземноморськими торговельними шляхами та зробивши [ShowLocationName('kaffa')] найважливішим центром у Чорному морі.\n\nОднак періодично виникають напруження між [GetCountry('GLH').GetGovernment.GetRulerTitle] [GetCountry('GLH').GetLongNameWithNoTooltip] та [ROOT.GetCountry.GetAdjectiveWithNoTooltip], причому Кафа перебуває в облозі, доки не буде укладено нову угоду. Цього разу, однак, може бути трохи інакше..."
  flavor_gen.27.a: "Спробуйте врятувати наш народ від чуми та війни!"
  flavor_gen.27.a.tt: "Хвороби зі сходу можуть поширитися в [target_location.GetRegion.GetSubContinent.GetContinent.GetName]..."
  flavor_gen.27.b: "Голод і смерть можуть бути єдиним розумним виходом."
  flavor_gen.28.title: "Скеля Монако"
  flavor_gen.28.desc: "Піратська гавань, сюзеренітет Скелі Монако був наданий імператором Священної Римської імперії Генріхом VI [ROOT.GetCountry.GetLongName] у 1191 році, а пізніше укріплений [ROOT.GetCountry.GetAdjectiveWithNoTooltip] гібелінами у 1215 році. Однак внутрішні чвари в місті [ShowLocationName('genoa')] призвели до того, що деякі гвельфи на чолі з Франческо [ShowDynastyName('grimaldi_dynasty')] знайшли притулок на Скелі, захопивши над нею контроль. Хоча формально під суверенітетом [ROOT.GetCountry.GetLongNameWithNoTooltip], династія Грімальді почала діяти досить незалежно, розширюючи свої володіння та виступаючи як моряки удачі."
  flavor_gen.28.a: "Нехай Грімальді продовжують свою справу."
  flavor_gen.28.b: "Ця Скеля належить нам!"
  flavor_gen.29.title: "Золотий рік Casa San Giorgio"
  flavor_gen.29.desc: "Банківська справа Casa San Giorgio останнім часом була досить прибутковою, що значно принесло користь [ROOT.GetCountry.GetLongName]."
  flavor_gen.29.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.30.title: "Фінансові проблеми Casa San Giorgio"
  flavor_gen.30.desc: "Банківська справа Casa San Giorgio останнім часом переживала деякі проблеми, маючи фінансові втрати, з якими тепер має зіткнутися [ROOT.GetCountry.GetLongName]."
  flavor_gen.30.a: "Тривожно..."
  flavor_gen.31.title: "Генуезький університет"
  flavor_gen.31.desc: "Місто [ShowLocationName('genoa')] – це місце багатства та процвітання. Хоча це переважно торгове місто, цінність освіти не втрачена для його громадян, оскільки тут є коледжі, що надають ступені в галузі права, теології, медицини та мистецтв.\n\nНа прохання Папи [GetCountry('PAP').GetGovernment.GetRuler.GetName], Коледж теології офіційно заснований у Генуї у святий рік [GetCurrentYear]."
  flavor_gen.31.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.31.b: "Підтримати коледж."
  flavor_gen.32.title: "[sampieru_corso.GetNameWithNoTooltip]"
  flavor_gen.32.desc: "Простолюдин, [sampieru_corso.GetName] розпочав успішну кар'єру як #italic condottiero#! в Італійських війнах, здобувши великий статок. Вигнаний зі своєї батьківщини Корсики, він почав плести інтриги, щоб використати свій статок і зв'язки для вигнання [ROOT.GetCountry.GetLongName] з острова за підтримки Великої Держави."
  flavor_gen.32.a: "Хто знає, що може статися..."
  flavor_gen.32.b: "Нехай він повернеться, ми розгромимо його повстання, перш ніж воно стане загрозою."
  flavor_gen.33.title: "Проблеми Корсики"
  flavor_gen.33.desc: "Корсиканці довго перебували під владою іноземців, острів був полем битви між його шляхетними кланами та пізанцями, генуезцями, арагонцями та іншими державами. Однак останніми роками поширюються нові ідеї, і деякі інтелектуали, такі як [luiggi_giafferi.GetName], Джачинто Паолі та син Джачинто Паскуале, закликають до революції, яка приведе корсиканців до самоврядування після поколінь іноземного гніту."
  flavor_gen.33.a: "Припинити ці повстання."
  flavor_gen.33.b: "Надати їм незалежність."
  flavor_gen.34.title: "Корсиканські негаразди"
  flavor_gen.34.desc: "Після першої спроби корсиканські революціонери реорганізувалися під проводом [pasquale_paoli.GetName] і знову прагнуть незалежності, тепер із ще більшою народною підтримкою після їхньої попередньої невдачі."
  flavor_gen.34.a: "Придушити революціонерів!"
  flavor_gen.34.b: "Надати їм незалежність."
  flavor_gen.35.title: "Корсиканські негаразди"
  flavor_gen.35.desc: "Корсиканська революція набрала сили та поширилася під проводом Паскуале Паолі. Метою революціонерів є створення незалежної Республіки, керованої Генеральним Сеймом Народу Корсики, представники якого обиратимуться громадянами на трирічний термін."
  flavor_gen.35.a: "Цей острів — більше прокляття, ніж благословення..."
  flavor_gen.35.b: "Надати їм незалежність."
  can_sell_corsica_via_diplo_action: "Розблокувати дипломатичну дію, що дозволяє нам продати Корсику іншій державі.\n\n#italic Можна використати ЛИШЕ ОДИН РАЗ.#!"
  flavor_gen.36.title: "Корсиканські негаразди"
  flavor_gen.36.desc: "Ситуація на Корсиці стала нестерпною для нашої країни, виснажуючи ресурси на війну, яку ми справді не можемо виграти. Найпрагматичніші члени нашого Кабінету пропонують постійне рішення: продати весь острів [corsica_buyer.GetName] і назавжди позбутися проблеми, дозволивши [ROOT.GetCountry.GetLongName] зосередитися на інших, більш нагальних справах.\n\nНа наше велике щастя, нічого не підозрюючі [corsica_buyer.GetAdjectiveWithNoTooltip] таки купили проклятий острів. Тепер [ShowCultureName('corsican')] — це їхні проблеми."
  flavor_gen.36.a: "Скатертиною дорога!"
  flavor_gen.37.title: "Будівництво Палацу [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_gen.37.desc: "Недавня зміна режиму в [ROOT.GetCountry.GetLongName], що призвела до нової політичної системи на чолі з [ROOT.GetCountry.GetGovernment.GetRulerTitle], була успішною. Тепер розпочалася публічна дискусія щодо гідності цієї нової посади, прихильники [target_ruler.GetName] та [target_ruler.GetHerHis] стверджують, що будівництво нового палацу як [target_ruler.GetHerHis] резиденції та головного офісу було б великим кроком вперед, тоді як [target_ruler.GetHerHis] критики виступають проти цього як надмірності [target_ruler.GetHerHis] влади та впливу."
  flavor_gen.37.a: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] заслуговує на палац!"
  flavor_gen.37.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] не буде вище традицій Республіки!"
  flavor_gen.38.title: "[artist_character.GetNameWithNoTooltip]"
  flavor_gen.38.desc: "[artist_character.GetName], видатний італійський архітектор з [ShowLocationName('perugia')], виступає як визначна постать у будівництві та переплануванні великих архітектурних проєктів по всій Європі. З вражаючим портфоліо шедеврів, Алессі славиться своєю здатністю поєднувати класичні римські елементи з інноваційними дизайнерськими концепціями. Тепер він може бути найнятий на службу [ROOT.GetCountry.GetLongName]."
  flavor_gen.38.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.39.title: "[artist_character.GetNameWithNoTooltip]"
  flavor_gen.39.desc: "[artist_character.GetName] переїхав зі свого місця народження в [ShowLocationName('como')] до [ShowLocationName('genoa')] слідом за своїм батьком, архітектором, хоча він перевершив би його завдяки своєму таланту. Відомий своєю майстерністю динамічних форм, вишуканих прикрас та екстравагантних фасадів, архітектурне бачення Б'янко має на меті переформувати міські ландшафти того часу."
  flavor_gen.39.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.40.title: "[artist_character.GetNameWithNoTooltip]"
  flavor_gen.40.desc: "[artist_character.GetName], також відомий як #italic Іль Капучіно#!, оскільки він деякий час був капуцинським ченцем, є одним з найперспективніших генуезьких художників. Відомі своєю майстерністю світла, тіні та емоційної інтенсивності, картини Строцці викликають відчуття драми та реалізму, що захоплює глядачів далеко за межами."
  flavor_gen.40.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.41.title: "[artist_character.GetNameWithNoTooltip]"
  flavor_gen.41.desc: "Прозорливий художник [artist_character.GetName] прагне переосмислити межі мистецтва, розширюючи кордони творчості та техніки. Відомий своїм експериментальним використанням нетрадиційних матеріалів, сміливими мазками та інноваційними техніками гравюри, твори Кастільйоне провокують нові способи мислення."
  flavor_gen.41.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.42.title: "[artist_character.GetNameWithNoTooltip]"
  flavor_gen.42.desc: "Обдарований художник [artist_character.GetName] стає ключовою фігурою в царині релігійного мистецтва завдяки своїй здатності зображати божественні сюжети з трансцендентною красою та емоційною глибиною, картини Кастелло стають символами віри та відданості. Він також відзначається у написанні батальних сцен з витонченими композиціями."
  flavor_gen.42.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.43.title: "[artist_character.GetNameWithNoTooltip]"
  flavor_gen.43.desc: "[artist_character.GetName] — прозорливий художник, що стає видатною фігурою, яка кидає виклик загальноприйнятим нормам і революціонізує художнє вираження через свої таємничі та атмосферні композиції."
  flavor_gen.43.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_gen.44.title: "Чорна Смерть поширюється!"
  flavor_gen.44.desc: "Облога [ShowLocationName('kaffa')] спричинила великий біль і страждання серед населення, проте це був лише початок. Облогові сили використовували заражені тіла, щоб прискорити облогу, і хоча громадяни [ShowLocationName('kaffa')] позбувалися трупів якомога швидше, хвороби все одно поширилися на живих.\n\nРятуючись від війни, люди з наших колоній принесли саму [ShowSituationName('black_death')] у наші домівки та оселі!"
  flavor_gen.44.a: "$common_string_the_end_is_nigh$"
  flavor_gen.45.title: "[sampieru_corso.GetName] завдає удару у відповідь!"
  flavor_gen.45.desc: "[sampieru_corso.GetName] набирав сили у вигнанні за іноземної підтримки. Тепер він вирішив, що настав час для загальноострівного повстання, щоб звільнити Корсику від нашого правління."
  flavor_gen.45.a: "Корсиканці знову повстають!"
  flavor_gen.45.a.tt: "Усе [ShowCultureName('corsican')] населення в [ShowProvinceDefinitionName('cismonte_province')] та [ShowProvinceDefinitionName('pumonte_province')] приєднається до [corsican_independence_fighter.GetName]"