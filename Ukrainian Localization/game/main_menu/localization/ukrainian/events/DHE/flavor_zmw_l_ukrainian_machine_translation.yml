l_english:
  flavor_zmw.1.title: "Піднесення $MTP$"
  flavor_zmw.1.desc: "Наше розширення в [ShowProvinceDefinitionName('upper_mazowe_province')] створило новий економічний центр, який тепер перебуває в руках [target_character.GetName]. З багатством, що повільно почало накопичуватися від прибутків [ShowProvinceDefinitionNameWithNoTooltip('upper_mazowe_province')], [target_character.GetSheHe] планує захопити ще більше влади в [ROOT.GetCountry.GetName] і оголосити [target_character.GetHerselfHimself] «Завойовником Людини»."
  flavor_zmw.1.a: "[target_character.GetNameWithNoTooltip] поведе нас."
  flavor_zmw.1.b: "[target_character.GetHerHis|U] жалюгідне повстання буде придушене."
  flavor_zmw.1.historical_info: "Ньяцімба Мутота, перший король Мутапи, був зімбабвійським дворянином, який очолив розширення королівства на північні території в пошуках нових ресурсів. Там він заснував нову базу влади для своєї династії, повільно захоплюючи старе королівство та замінюючи їхнє правління."
  mutapa_rebels: "Повстання $MTP$"
  mutapa_rebels_joining: "Усі [ShowPopTypeName('peasants')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('upper_mazowe_province')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднуються до [target_mutapa_rebels.GetName]."
  flavor_zmw.2.title: "Піднесення $RZW$"
  flavor_zmw.2.desc: "Нова сила піднімається! Під проводом [target_character.GetName], [ShowProvinceDefinitionName('shangani_province')] перетворилася на значну загрозу стабільності нашого [ROOT.GetCountry.GetFlavorRank]. Амбіції [target_character.GetNameWithNoTooltip] не зупиняться ні перед чим, окрім правління [ROOT.GetCountry.GetName]."
  flavor_zmw.2.a: "[target_character.GetNameWithNoTooltip] буде нашим новим лідером."
  flavor_zmw.2.b: "Ми розчавимо цього вискочку-претендента."
  flavor_zmw.2.historical_info: "Заснування імперії Розві на землях навколо Бутуа, однієї з провінцій Мутапського королівства. Під проводом Домбо Чангаміре, Розві здобули вирішальну перемогу над португальською присутністю в Зімбабве в 1660 році та встановили свою династію як правителів Зімбабвійського плато."
  rozwi_rebels: "Повстання $RZW$"
  rozwi_rebels_joining: "Усі [ShowPopTypeName('peasants')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('shangani_province')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднуються до [target_rozwi_rebels.GetName]."
  flavor_zmw.3.title: "[ShowGovernmentReformNameWithNoTooltip('zmw_council_of_senior_wives')]"
  flavor_zmw.3.desc: "Дружини наших правителів мають доступ до багатьох ключових точок нашої держави і могли б запропонувати нам велике розуміння, якби їм дозволили бути в нашій раді. Ми не повинні марнувати такий потенціал і створити [ShowGovernmentReformName('zmw_council_of_senior_wives')] як безпосередню частину нашого уряду."
  flavor_zmw.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_zmw.3.b: "Не зараз."
  flavor_zmw.1000.title: "Пошук ресурсів"
  flavor_zmw.1000.desc: "Серцевина [target_country.GetName] зосереджена навколо [target_location.GetRank.GetName] [target_location.GetName]. Проте дорогоцінні ресурси, такі як [ShowGoodsName('salt')], вичерпуються. [target_character.GetName] зробив заяву для всіх, хто шукає пригод, негайно з'явитися до [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб заселити прилеглі незаймані землі."
  flavor_zmw.1000.a: "Нам потрібна будь-яка допомога, яку ми можемо отримати."
  flavor_zmw.1000.a.tt: "Ми розблоковуємо '#Y $flavor_zmw.1001.title$#!' [Concept('event', 'CONCEPT_PLACEHOLDER')|e], який приваблює нових [Concept('courtiers', 'CONCEPT_PLACEHOLDER')|e] на щорічній основі, якщо у нас коли-небудь буде менше 10"
  flavor_zmw.1001.title: "Шукачі пригод відгукуються на заклик"
  flavor_zmw.1001.desc: "Відколи [target_character.GetName] зробив [target_character.GetHerHis] заяву, шукачі пригод стікаються до [target_country.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб [ShowCabinetActionName('settle_the_frontier')] для своєї країни."
  flavor_zmw.1001.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_zmw.1001.a.tt: "Новий [Concept('character', 'CONCEPT_PLACEHOLDER')|e] з'являється в [target_country.GetName]"
  flavor_zmw.1100.title: "[target_character.GetNameWithNoTooltip] Прибуває"
  flavor_zmw.1100.desc: "[target_character.GetName], самопроголошений [ShowCultureName('portuguese')] авантюрист, благає про аудієнцію з [target_ruler.GetName]. Хоча він народився на чужині, [target_character.GetHeShe] бажає служити в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] як радник. Хоча [target_character.GetHeShe] міг би стати цінним надбанням для нас, важко перевірити, де лежить [target_character.GetHisHer] вірність."
  flavor_zmw.1100.a: "Він стане корисним радником."
  flavor_zmw.1100.b: "Це звучить дуже ризиковано."
  flavor_zmw.1100.historical_info: "Антоніу Фернандеш був першим португальським дослідником, який проник у внутрішні райони Зімбабве. Він увійшов до Зімбабве в 1511 році з порту Софала. Звідти він подорожував углиб країни і зрештою встановив контакт з правлячим монархом Мутапи, Чікуйо Чісамаренгу."
  flavor_zmw.1101.title: "[target_character.GetNameWithNoTooltip] Надає карти [ShowRegionNameWithNoTooltip('zimbabwe_region')]"
  flavor_zmw.1101.desc: "[target_character.GetName], авантюрист, який вже деякий час подорожує [ShowRegionName('zimbabwe_region')], зміг завоювати прихильність одного з місцевих правителів. Під час своїх подорожей він створив карту регіону, яка перевершує все, що ми про нього знаємо. На щастя, він пропонує продати нам цю життєво важливу інформацію."
  flavor_zmw.1101.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_zmw.1101.b: "Нас це не цікавить."
  flavor_zmw.1200.title: "Місія [target_character.GetNameWithNoTooltip]"
  flavor_zmw.1200.desc: "Родом з [target_country.GetName], [target_character.GetName] служив як дипломат і губернатор на службі [target_character.GetHisHer] країни, але бажав присвятити життя [ShowReligionAdjective('catholic')] місіонеру, що привело його до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHeShe|U] просить нашого дозволу заснувати місію та цікавиться, чи бажає [target_ruler.GetName] особисто навернутися до [ShowReligionNameWithNoTooltip('catholic')]."
  flavor_zmw.1200.a: "[target_ruler.GetNameWithNoTooltip] навернеться."
  flavor_zmw.1200.b: "Дозволити його місію, але [target_ruler.GetNameWithNoTooltip] не відмовиться від нашої віри."
  flavor_zmw.1200.c: "Відмовити йому в проханні."
  flavor_zmw.conversion.tt: "Деякі з наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ROOT.GetCountry.GetName] навернуться до [ShowReligionName('catholic')]."
  flavor_zmw.1200.historical_info: "Єзуїт Гонсалу да Сілвейра прибув до Зімбабве після того, як залишив свою посаду провінційного настоятеля в Португальській Індії в 1560 році. На зустрічі з королем він зміг навернути його та деяких його підданих. Це ознаменувало першу успішну католицьку місіонерську діяльність у регіоні."
  flavor_zmw.1201.title: "Реакція проти навернення"
  flavor_zmw.1201.desc: "[ShowReligionGroupAdjective('muslim')] торговці в нашій країні були обурені наверненням [target_ruler.GetName] і тепер тиснуть на [target_ruler.GetHimHer], щоб він відмовився від [ShowReligionAdjective('catholic')] віри. Хоча очевидно, що вони бояться зростаючого впливу [ShowReligionAdjectiveWithNoTooltip('catholic')] торговців, втрата наших вигідних відносин з [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] купцями може серйозно зашкодити нашій економіці.\n\nНезалежно від того, що ми зробимо, нам доведеться прийняти жорстке рішення щодо майбутнього нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_zmw.1201.a: "Вони мають рацію. Відмовитися від [ShowReligionNameWithNoTooltip('catholic')]."
  flavor_zmw.1201.b: "Ми повинні прийняти світло [ShowReligionNameWithNoTooltip('catholic')]."
  flavor_zmw.1201.historical_info: "Невдовзі після навернення Мвенемутапи Гонсалу да Сілвейрою, король зіткнувся з сильним опором з боку мусульманських купців з узбережжя, які були активні в Зімбабве. Купці виступили проти навернення і досягли успіху. Гонсалу да Сілвейра був задушений людьми короля, і подальші католицькі місії не були допущені, що поклало край присутності католицизму в Зімбабве."