l_english:
  flavor_nor.1.title: "Сіґурд Йонссон"
  flavor_nor.1.desc: "Норвезький шляхтич і лицар Сіґурд Йонссон — колишній дроттсет, людина, яка могла правити країною від імені короля, і регент Норвегії. Він є прямим нащадком старої норвезької королівської родини та командувачем фортеці Акерсхус з 1440 по 1445 рік. Сіґурд Йонссон є одним з провідних прихильників антиганзейської політики в Норвегії."
  flavor_nor.1.a: "Він міг би бути корисним для королівства"
  flavor_nor.1.b: "Ми не хочемо ворогувати з Ганзою"
  hanseatic_conflict: "Ганзейсько-скандинавський конфлікт"
  flavor_nor.2.title: "Ґільденльове"
  flavor_nor.2.desc: "Син національного радника Генріка Єнссона, [niels.GetName], нещодавно одружився з Інґерд Оттесдаттер і закріпив за собою володіння маєтками Аустротт. Тепер він є одним з найбільших землевласників Норвегії, маючи власність у Бергені, Вардьогусі, Голоґаланді, Фосені, Фрості, Стьордалі, Суннмьоре, Ромсдалі, Едьої, Сельбу та Гер'єдалені. Його було запропоновано на посаду національного радника."
  flavor_nor.2.a: "Нехай він стане радником"
  flavor_nor.3.title: "Фортеця Вардьогус"
  flavor_nor.3.desc: "Перше укріплення в муніципалітеті Вардьо у фюльке Фіннмарк було побудовано в 1306 році і називалося Варґгьоя. Друге укріплення було збудовано в Естервоґені між 1450 і 1500 роками, прямокутне укріплення з двома кутовими бастіонами."
  flavor_nor.3.a: "Укріпити фортецю ще більше"
  flavor_nor.3.b: "Збільшити оборону по всій Норвегії"
  flavor_nor.3.c: "Нічого не робити"
  flavor_nor.5.title: "Стратегічний шлюб"
  flavor_nor.5.desc: "З часів Пертського договору 13-го століття, [GetCountry('SCO').GetName] зобов'язана щорічно сплачувати суму [ROOT.GetCountry.GetLongName] в обмін на контроль над Гебридами. Ці платежі вже давно прострочені, і це було причиною постійної напруги. Однак, незалежно від наших спадкових претензій, наша здатність проектувати владу в [ShowAreaName('scottish_highlands')] вже не та, що раніше, і ми маємо більші проблеми ближче до дому, які потрібно вирішити. Було запропоновано врегулювати цей конфлікт раз і назавжди. Ярлство [ShowLocationName('orkney')] буде закладено, а потім передано шотландцям.\n\n[ShowLocationNameWithNoTooltip('orkney')] залишається одним з найвищих титулів у [ROOT.GetCountry.GetLongNameWithNoTooltip], однак, таким, що часом був сходинкою до [ROOT.GetCountry.GetAdjectiveWithNoTooltip] престолу. Хоча вони залишаються слабким фактором, [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] дуже обережні щодо цієї угоди."
  flavor_nor.5.historical_info: "У 1468 році збіднілий Кристіан I, король Данії, Норвегії та Швеції, одружив свою єдину дочку Маргарет з Яковом III Шотландським. Оскільки він не міг надати обіцяний посаг, він натомість заклав Оркнейські острови Якову III Шотландському замість королівського посагу за 50 000 флоринів. Шетландські острови були закладені за додаткові 8 000 флоринів."
  flavor_nor.5.a: "Давайте покінчимо з цим конфліктом."
  flavor_nor.5.a.tt: "#flavor Якщо [GetCountry('SCO').GetName] погодиться, станеться наступне:#!"
  nor_gave_away_orkney: "Віддали Оркнейські острови"
  nor_strategic_marriage: "Стратегічний шлюб"
  flavor_nor.5.b: "Ми ніколи не відмовимося від наших претензій на ці землі!"
  nor_taxation_conflict_over_hebrides: "Напруга через Гебриди"
  flavor_nor.6.title: "Графство Оркнейські острови"
  flavor_nor.6.desc: "З часів Пертського договору 13-го століття Шотландія зобов'язана щорічно сплачувати суму Норвезькому королівству в обмін на контроль над Норвезькими Гебридами. Ці платежі вже давно прострочені, і це було причиною постійної напруги. [GetCountry('NOR').GetName] тепер запропонувала врегулювати цей конфлікт раз і назавжди."
  flavor_nor.6.a: "Укласти угоду!"
  flavor_nor.6.b: "Ми радше вирішимо це мечами в руках."
  flavor_nor.8.title: "Шотландія погоджується"
  flavor_nor.8.desc: "Ми відмовилися від споконвічних норвезьких претензій на Гебриди, Оркнейські острови та будь-яку іншу частину Гайлендсу. Відносини зі шотландцями ніколи не були кращими."
  flavor_nor.8.a: "Це зроблено."
  flavor_nor.9.title: "Шотландія відмовляється"
  flavor_nor.9.desc: "Шотландці відмовилися від нашої угоди щодо врегулювання суперечливих претензій на Гебридах та Оркнейських островах. Внаслідок цього напруга знову зростає."
  flavor_nor.9.a: "Ми ніколи не здамося!"
  flavor_nor.16.title: "Голландський період"
  flavor_nor.16.desc: "Деревина завжди була основним експортним товаром норвезької економіки, і торгові судна з Нижніх країн ставали все більш поширеним явищем уздовж норвезького узбережжя. На відміну від ганзейських торговців, які століттями домінували в нашій економіці, голландці задовольняються торгівлею, не втручаючись у місцеві справи та не порушуючи законів країни.\nЗ постійно зростаючим попитом з боку голландських суднобудівників, лісова промисловість у Норвегії цілком може стати найбільшою в Європі. Як морський та суднобудівний народ, ми, безсумнівно, можемо багато чого навчитися у голландських підприємців, об'єднавшись з ними проти німців."
  flavor_nor.16.a: "Настав час голландців."
  STATIC_MODIFIER_NAME_nor_hollendertiden: "Голландський період"
  flavor_nor.21.title: "[tordenskiold.GetNameWithNoTooltip]"
  flavor_nor.21.desc: "Завдяки сміливим атакам та вмілим маневрам, [tordenskiold.GetName] здобув собі ім'я як перспективний капітан норвезького флоту. Його небажання відступати від бою, незалежно від розмірів залучених кораблів чи будь-яких інших обставин, катапультувало його по службових сходах. Сьогодні він стоїть перед [ROOT.GetCountry.GetGovernment.GetRuler.GetName], щоб бути облагородженим за свої великі подвиги у відкритому морі."
  flavor_nor.21.a: "Відтепер він буде відомий як «Торденскйольд» – Громовий Щит."
  flavor_nor.22.title: "[cort_adeler.GetNameWithNoTooltip]"
  flavor_nor.22.desc: "У віці 15 років молодий син шкіпера [cort_adeler.GetName] залишив Норвегію заради відкритого моря і відтоді зробив кар'єру успішного торгового капітана в низинах, Середземномор'ї і навіть так далеко, як Коромандельське узбережжя в Індії. Також виконуючи обов'язки капітана під час війни в голландських, англійських, венеціанських та турецьких морських битвах, Аделер володіє досвідом та контактами, якими мало хто з його покоління володіє. Завдяки своїм різноманітним торговим підприємствам він набув значного особистого статку, частину якого він інвестував у свою рідну країну, особливо в маєтки, які він почав розвивати за межами норвезького міста Скіен.\nЛюдина калібру Аделера, безумовно, могла б бути добре використана на службі державі."
  flavor_nor.22.a: "Видатна людина!"
  flavor_nor.23.title: "Велика пожежа в Осло"
  flavor_nor.23.desc: "Три дні пожежі спустошували дерев'яне місто Осло, і тепер майже всі будівлі в столиці нашої країни лежать у попелі. Хоча пожежі переслідували Осло і раніше, руйнування, з якими ми стикаємося зараз, настільки остаточні, що було запропоновано повністю перенести місто під час відбудови. Замість того, щоб будувати з дерева і чекати наступної катастрофи, було запропоновано відбудувати ближче до фортеці Акерсхус, використовуючи більш надійні методи будівництва та містобудування, як личить столиці нашого часу.\nВідбудова ближче до Акерсхуса також дозволить нам належним чином укріпити місто, що може бути дуже корисним у ці часи. На практиці попереднім правителям було важко перешкодити громадянам Осло відбудовувати місто з будь-яких матеріалів та у будь-який спосіб, який вони бажають, тому належна реконструкція, ймовірно, буде дуже дорогою."
  flavor_nor.23.a: "Ми повинні заснувати нове місто!"
  STATIC_MODIFIER_NAME_nor_rebuilding_oslo: "Відбудова Осло"
  flavor_nor.23.b: "Те, що втрачено, зникло, нехай люди відбудовують, як їм заманеться."
  flavor_nor.24.title: "Голландсько-норвезькі зв'язки зміцнюються"
  flavor_nor.24.desc: "З часом широка інтеграція Норвегії в економіку багатих міст Нижніх країн призвела до зростання суднобудівної промисловості вдома. Норвезькі міста, тісно пов'язані з торгівлею деревиною, швидко зростають, як ніколи раніше, з норвезькими, голландськими, данськими, шотландськими, англійськими та шведськими купцями, що змішуються, створюючи космополітичне морське середовище.\nМолоді норвезькі чоловіки також почали мігрувати у зростаючій кількості до Нижніх країн. Деякі осідають там, тоді як інші продовжують подорожувати відкритим морем. Зростаюча кількість норвезьких емігрантів та тих, хто врешті-решт повертається на наші землі, разом занурюють нашу країну все глибше в глобальну економіку, що формується."
  flavor_nor.24.a: "Море – наше майбутнє і наше минуле."