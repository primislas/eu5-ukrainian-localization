l_english:
  flavor_kni.3.title: "Великий карака з [ShowLocationNameWithNoTooltip('alexandria')]"
  flavor_kni.3.desc: "Невеликий, але вправний флот [ROOT.GetCountry.GetName] був бичем різних [ShowReligionAdjective('muslim')] ворогів протягом сотень років. Утримання вод чистими від ворожих каперів, а також захоплення [ShowReligionAdjective('muslim')] торгових суден, тримало скарбниці [ROOT.GetCountry.GetCapital.GetName] повними, а [ShowReligionAdjective('muslim')] моряків у жаху. Однією з найвідоміших подій було захоплення Великого карака з [ShowLocationName('alexandria')] у [GetCurrentYear], наповненого величезними багатствами."
  flavor_kni.3.a: "Божественність прихильна до нас!"
  opinion_captured_alexandria_great_carrack: "Захоплено Великий карака з Александрії"
  flavor_kni.4.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kni.4.desc: "[target_character.GetName] вважається одним з найкращих інженерів-фортифікаторів [target_location.GetRegion.GetSubContinent.GetContinent.GetName] і був уповноважений покращити фортеці на [ShowLocationName('rodos')]. У [GetCurrentYear], коли [target_character.GetSheHe] щойно прибув до нашої столиці, щоб розпочати [target_character.GetHerHis] роботу, [target_character.GetSheHe] був настільки зачарований нашим народом та його ідеалами, що [target_character.GetSheHe] схилив коліна перед [ROOT.GetCountry.GetGovernment.GetRulerTitle] і благав [target_character.GetHerHim] зробити його лицарем. Тиск на [ROOT.GetCountry.GetGovernment.GetRulerTitle] зростав, щоб прийняти [target_character.GetHerHim] з огляду на [target_character.GetHerHis] сміливу рішучість та інженерні навички."
  flavor_kni.4.a: "[target_character.GetSheHe|U] стане чудовим доповненням..."
  flavor_kni.5.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kni.5.desc: "Після того, як її придбав наш народ, [ShowLocationName('malta')] стала такою ж міцною фортецею, якою була [ShowLocationName('rodos')]. Під керівництвом [target_character.GetName] місто витримало ворожих загарбників кілька разів завдяки доблесній обороні свого дисциплінованого гарнізону. Ця нова твердиня стала містом чудових палаців та неперевершених укріплень. Вона зростатиме в могутності та багатстві головним чином завдяки нашим морським рейдерським пригодам проти різних ворогів."
  flavor_kni.5.a: "Знак нашої віри та стійкості!"
  flavor_kni.100.title: "[GetCountry('KNI').GetNameWithNoTooltip]"
  flavor_kni.100.desc: "Загін легендарних лицарів, чий метал був випробуваний у вогняних горнилах битв по всьому Середземномор'ю, прибув до нашого двору з петицією. Будучи вигнаними з острова [ShowLocationName('rodos')] [target_rodos_owner.GetLongName], [GetCountry('KNI').GetName] блукали бездомними, шукаючи новий дім, щоб продовжити свій побожний захист нашої віри, поки в [GetCurrentYear] [GetUniqueInternationalOrganization('hre').GetLeaderTitle], [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.GetName], не погодився надати їм суверенітет над островом [ShowLocationName('malta')], за умови нашого схвалення."
  flavor_kni.100.a: "Віддати [ShowLocationNameWithNoTooltip('malta')] [GetCountry('KNI').GetNameWithNoTooltip]."
  spa_ceded_malta: "Мальта відійшла"
  spa_ceded_malta_pap: "Мальта відійшла лицарям"
  flavor_kni.100.b: "Не давати їм нічого."
  spa_refused_ceding_malta: "Відмовлено у передачі Мальти лицарям"
  flavor_kni.7.title: "Переклад Хроніки"
  flavor_kni.7.desc: "#italic Хроніка Мореї#! – це хроніка, що детально описує встановлення #italic Франкократії#! в Греції, охоплюючи більшу частину 13 століття після Четвертого хрестового походу. Хоча [GetCountry('LAT').GetLongName] міг впасти перед [GetCountry('BYZ').GetLongName], інші різні держави все ще існують, включаючи [ROOT.GetCountry.GetName]. Нехай її перекладуть на нашу мову, одночасно розширивши саму роботу, щоб охопити нашу історію."
  flavor_kni.7.a: "Перекласти її."
  flavor_kni.7.b: "Не турбуватися про це."
  flavor_kni.8.title: "Церква Святої Трійці"
  flavor_kni.8.desc: "Оскільки [ROOT.GetCountry.GetName] стає місцем призначення для всіх хрестоносців, готових боротися за [target_religion.GetAdjective] віру, наш рідний острів [target_location.GetName] потребує адаптації, щоб мати можливість розмістити більше віруючих. Для досягнення цієї мети [ROOT.GetCountry.GetFlavorRank] готовий витратити частину накопиченого багатства на будівництво нової церкви."
  flavor_kni.8.a: "Присвятити Церкву Святій Трійці."
  flavor_kni.8.b: "Віддати її під покровительство Архангела Михаїла."
  flavor_kni.8.c: "Ми славимо Господа по-різному."
  flavor_kni.9.title: "Замок Фераклос"
  flavor_kni.9.desc: "Замок Фераклос — лише одна з багатьох твердинь на нашому рідному острові [target_location.GetName]. Ще в 1306 році це була фортеця, яку ми мусили захопити, щоб отримати контроль над островом, а тепер, понад століття потому, вона лежить занедбана та в руїнах, замінена іншими укріпленнями, розміщеними в столиці. Можливо, настав час витратити монету, щоб відновити її та повернути в експлуатацію."
  flavor_kni.9.a: "Влити кошти."
  flavor_kni.9.b: "Нам не потрібно залишатися в обороні."
  flavor_kni.10.title: "[target_country.GetCulture.GetNameWithNoTooltip] Піратство"
  flavor_kni.10.desc: "Зі встановленням #italic Франкократії#! в Південних [ShowRegionName('balkan_region')] та подальшим розширенням торгівлі купецьких республік [ShowRegionName('italy_region')], кількість комерційних суден, що проходять через [ShowProvinceDefinitionName('aegean_sea_province')], неухильно зростала протягом останніх десятиліть. Однак таке процвітання приваблює наших ворогів, які прагнуть завдати нам шкоди будь-якими засобами. Таким чином, наші релігійні вороги в [target_country.GetName] вирішили найняти каперів, які тепер відкрито атакують [ROOT.GetCountry.GetReligion.GetGroup.GetAdjective] судноплавство."
  flavor_kni.10.a: "Ми їх покараємо!"
  flavor_kni.11.title: "Захисник Віри"
  flavor_kni.11.desc: "Один з наших генералів, [target_character.GetName], отримав титул #italic Fidei Defensor#! — Захисник Віри. Здається, наше урочисте звернення до Святого Престолу щодо надання титулу спрацювало. Ми віримо, що зусилля [target_character.GetNameWithNoTooltip] щодо захисту християнства є видатними, і що під [target_character.GetHerHis] керівництвом армії [target_religion.GetName] поширять нашу віру в усі куточки світу."
  flavor_kni.11.a: "Цілком заслужено!"
  flavor_kni.12.title: "Лицарі Нового Світу"
  flavor_kni.12.desc: "Наш [ROOT.GetCountry.GetFlavorRank] успішно заснував свою першу колонію в [ShowRegionName('caribbean_region')], бастіон віри та притулок для [ShowReligionGroupAdjective('christian')] поселенців далеко від заворушень [ShowContinentName('europe')]. Колонія є свідченням нашої місії, пропонуючи як стратегічну цінність, так і новий кордон для впливу нашого [ROOT.GetCountry.GetFlavorRank]. Хоча колонія є цінним активом, немає консенсусу щодо того, чи слід продовжувати колоніальні зусилля."
  flavor_kni.12.a: "Зосередити наші ресурси на подальшій колонізації."
  flavor_kni.12.b: "Це лише другорядне питання."
  flavor_kni.12.historical_info: "$flavor_kni.1000.historical_info$"
  flavor_kni.13.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kni.13.desc: "[target_character.GetName] піднявся по службових сходах нашого [ROOT.GetCountry.GetFlavorRank] і привернув увагу багатьох, хто тепер розглядає можливість надати [target_character.GetHerHim] більш помітну посаду. [target_character.GetSheHe|U] є досвідченим лідером з твердою рукою, і [target_character.GetSheHe] вже поставив [target_character.GetHerHis] за мету розширити наш контроль над островами [ShowRegionName('caribbean_region')], зміцнити нашу оборону та забезпечити процвітання нашої колонії."
  flavor_kni.13.a: "Призначити [target_character.GetHerHim] губернатором островів."
  flavor_kni.13.b: "Ми не потребуємо [target_character.GetHerHis] послуг."
  flavor_kni.13.historical_info: "Філіпп де Лонгвільє де Пуансі був французьким лицарем Ордену Святого Іоанна, який служив губернатором Сент-Кіттса з 1639 року до своєї смерті в 1660 році. Він правив островом з майже автономною владою, розширюючи його укріплення та захищаючи його від конкуруючих колоніальних держав."
  flavor_kni.14.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kni.14.desc: "[target_character.GetName] є видатним членом [ROOT.GetCountry.GetFlavorRank], відомим [target_character.GetHerHis] репутацією як непохитної рішучості, так і вмілої дипломатії. Непохитний захисник твердинь [ROOT.GetCountry.GetFlavorRank], [target_character.GetSheHe] прагне зміцнити наші середземноморські володіння та забезпечити, щоб ми залишалися грізною силою проти наших ворогів. Водночас [target_character.GetSheHe] довів свою вправність у навігації політичним ландшафтом [ShowContinentName('europe')], забезпечуючи життєво важливі союзи та фінансову підтримку."
  flavor_kni.14.a: "Поставити [target_character.GetHerHim] на чолі [ROOT.GetCountry.GetFlavorRank]."
  flavor_kni.14.b: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] отримав би користь від [target_character.GetHerHis] мудрості."
  flavor_kni.14.c: "Нас це не цікавить."
  flavor_kni.14.historical_info: "Джованні Паоло Ласкаріс служив Великим Магістром Лицарів-Госпітальєрів з 1636 по 1657 рік. Його правління було відзначене зусиллями по зміцненню середземноморських укріплень для забезпечення належної оборони від османів. Ласкаріс також вміло керував дипломатичними відносинами, забезпечуючи фінансову допомогу від європейських монархів для підтримки діяльності Ордену. Його правління зміцнило позиції Ордену в Середземномор'ї, хоча він також зіткнувся з внутрішніми труднощами щодо управління заморськими володіннями Ордену."
  flavor_kni.15.title: "[ShowCultureNameWithNoTooltip('carib')] Тубільці Рейдують [target_location.GetNameWithNoTooltip]"
  flavor_kni.15.desc: "Загони [ShowCultureName('carib')] воїнів здійснили руйнівні рейди на [target_location.GetName], грабуючи будинки, спалюючи врожаї та вбиваючи багатьох наших людей. Ці люті воїни довго чинили опір європейському вторгненню, і їхні напади призвели до заворушень на наших острівних володіннях. Деякі в нашому [ROOT.GetCountry.GetFlavorRank] стверджують, що відповідь силою лише посилить кровопролиття та спровокує ще жорстокішу відплату. Інші наполягають, що ми повинні завдати удару у відповідь, рейдуючи їхні села, щоб вони більше не могли загрожувати нашим поселенням."
  flavor_kni.15.a: "Ми безсилі в цій ситуації."
  flavor_kni.15.b: "Розпочати контратаку!"
  flavor_kni.15.historical_info: "Контроль госпітальєрів над Карибськими островами був досить слабким. За межами столиць відповідних островів їхні поселення були легкою здобиччю для місцевого населення. Один такий напад племені карибів на Сен-Бартелемі призвів до загибелі незліченної кількості людей, а ті небагато, хто вцілів, вирішили втекти з острова, ще більше послабивши контроль Ордену над їхніми колоніями."
  flavor_kni.16.title: "Лицарі Звертаються до Піратства"
  flavor_kni.16.desc: "Оскільки наш [ROOT.GetCountry.GetFlavorRank] бореться під зростаючими економічними обмеженнями, деякі з наших лав вдалися до відчайдушних заходів. Шукаючи багатства та пригод, багато лицарів почали рейдувати [ShowReligionGroupAdjective('muslim')] торгові судна, вимагаючи здобичі для підтримки свого розкішного способу життя. Деякі навіть повністю покинули нашу справу, живучи як капери або вступаючи до флотів іноземних флотів заради особистої вигоди. Хоча деякі вважають ці дії нечесними, інші стверджують, що ці рейди є необхідністю для підтримки [ROOT.GetCountry.GetFlavorRank] на плаву."
  flavor_kni.16.a: "Ми не можемо їх зупинити."
  flavor_kni.16.b: "Засудити їхні дії та відновити дисципліну."
  flavor_kni.16.c: "Закрити очі, якщо вони діляться своєю здобиччю."
  flavor_kni.16.historical_info: "Коли лицарі-госпітальєри оселилися на Мальті, вони зіткнулися зі зростаючими економічними труднощами. Їхні традиційні джерела доходу зменшилися, а фінансовий тягар утримання флоту для патрулювання Середземномор'я зростав. У відповідь багато хто звернувся до каперства, рейдуючи мусульманські торгові судна під виглядом захисту християнства. З часом деякі лицарі пішли далі, прийнявши піратство як спосіб життя, живучи в розкоші за рахунок своєї здобичі, і навіть приєднуючись до флотів Франції та Іспанії в пошуках багатства та пригод."
  flavor_kni.17.title: "Захоплення [ShowLocationNameWithNoTooltip('tripoli')]"
  flavor_kni.17.desc: "Прапори [ROOT.GetCountry.GetFlavorRank] тепер майорять над [ShowLocationName('tripoli')], важко здобутим бастіоном християнства на узбережжі [ShowContinentName('africa')]. Хоча забезпечення [ShowLocationNameWithNoTooltip('tripoli')] було великою перемогою, керувати ним може бути набагато більшим викликом. [ShowLocationNameWithNoTooltip('tripoli')] оточений ворожими силами, а його оборона залишається слабкою проти постійної загрози піратів і корсарів. Його гарнізон розтягнутий, і деякі сумніваються, чи зможемо ми справді утримати цей віддалений форпост."
  flavor_kni.17.a: "Нічого не робити."
  flavor_kni.17.b: "Натомість покращити його укріплення."
  flavor_kni.17.c: "Інвестувати в інфраструктуру."
  flavor_kni.17.d: "Його гавань процвітатиме під нашим правлінням!"
  flavor_kni.17.historical_info: "Лицарі отримали контроль над Триполі в 1530 році, коли імператор Карл V надав їм місто разом з Мальтою та Гоцо. Однак їхнє правління над Триполі було сповнене труднощів. Місто було ізольоване, погано захищене та оточене ворожими силами. Орден боровся за збереження контролю, стикаючись з частими нападами та повстаннями. У 1551 році, після років опору, османи розпочали великий штурм, здолавши гарнізон і змусивши лицарів здатися."
  flavor_kni.18.title: "Історія Госпітальєрів"
  flavor_kni.18.desc: "[target_character.GetName], відданий член нашого [ROOT.GetCountry.GetFlavorRank], висловив зацікавленість у збереженні нашого минулого для майбутніх поколінь. [target_character.GetSheHe|U] передбачає велику [ShowWorkOfArtTypeName('chronicle')], що деталізує історію [ROOT.GetCountry.GetFlavorRank], її боротьбу та її тріумфи. Однак таке починання вимагає значного фінансування для досліджень, подорожей та публікації [target_character.GetHerHis] роботи."
  flavor_kni.18.a: "Історія, гідна нашого [ROOT.GetCountry.GetFlavorRank], повинна бути написана!"
  flavor_kni.18.b: "Ми не можемо виділити кошти на такі розкоші."
  flavor_kni.18.historical_info: "Джакомо Бозіо був італійським істориком і членом лицарів-госпітальєрів, який присвятив більшу частину свого життя документуванню історії Ордену. Його найвідоміша праця, #italic Dell'Istoria della Sacra Religione et Illustrissima Militia di San Giovanni Gierosolimitano#!, була опублікована в 1594 році. Ця монументальна хроніка надала розлогий опис походження Ордену, його ролі в хрестових походах, його боротьби проти османів та його заснування на Мальті."
  flavor_kni.110.title: "Наслідки епохи хрестових походів"
  flavor_kni.110.desc: "У 1291 році [ShowLocationName('acre')] впав перед [GetCountry('MAM').GetLongName], а разом з ним і наш останній плацдарм на землях Святої Землі. Наші надії та віра були випробувані, коли нас відтіснили язичники, наша скривавлена боротьба обернулася лише купами тіл і ганьбою.\n\nВідтоді ми відступили до [ShowProvinceDefinitionName('cyprus_province')], а пізніше до [ShowLocationName('rodos')] у спробі відновити рівновагу та зрештою повернути землі, що по праву належать нам. Однак, з плином часу та відходом зі світу цього старої гвардії, що брала участь в облозі [ShowLocationNameWithNoTooltip('acre')], багато голосів у нашому дворі породили сумніви щодо природи нашого Ордену..."
  flavor_kni.110.a: "Ми залишаємося хрестоносцями в душі!"
  pap_gets_flavor_kni.111_tt: "Подія '#Y Відновлення хрестових походів лицарями#!' відбувається для [target_pope_country.GetName]"
  flavor_kni.110.b: "Погляньмо всередину, ми повинні розвивати нашу твердиню."
  lose_100_opinion_with_pope_tt: "Відносини між нами та [target_pope_country.GetName] погіршаться на #R -100#!"
  kni_receive_stronger_events_about_building_capital_tt: " Потенційні події щодо розвитку нашої столиці будуть більш значущими"
  flavor_kni.110.c: "Ми не повинні порушувати статус-кво."
  flavor_kni.111.title: "Відновлення хрестових походів лицарями"
  flavor_kni.111.desc: "Минулі століття в [ShowAreaName('levant_area')] були залиті кров'ю, пилом і потом, коли ми намагалися вирвати контроль над Святою Землею у наших [ShowReligionGroupAdjective('muslim')] ворогів. Незважаючи на наші невдачі, наші діяння були увіковічені в історії та слугують натхненням для багатьох майбутніх лицарів і воїнів, які бажають взятися за справу. Таким чином, [GetCountry('KNI').GetName] звернувся до нас з пропозицією спонсорувати відновлений Хрестовий похід, нову спробу повернути те, що по праву належить нам."
  flavor_kni.111.a: "Звісно, несподіванка, але бажана."
  flavor_kni.111.b: "Ми не можемо собі цього дозволити."
  opinion_deteriorates_and_gets_event_tt: "Подія '#italic Відкинута мета#!' відбувається для [GetCountry('KNI').GetNameWithNoTooltip], і їхня думка про нас погіршиться"
  flavor_kni.112.title: "Відкинута мета"
  flavor_kni.112.desc: "Нашою місією на Святій Землі завжди було захищати її від рук язичників та ворогів. Однак нещодавня відмова Святого Отця підтримати нашу заявку на Хрестовий похід залишила гіркий присмак у наших вустах, урочисту зраду..."
  flavor_kni.112.a: "Чи впав він з благодаті?"
  flavor_kni.120.title: "Розвиток [target_location.GetNameWithNoTooltip]"
  flavor_kni.120.desc: "Протягом десятиліть наша столиця була базою операцій для багатьох нападів на ворогів нашої віри. З часом стало очевидним, що для реалізації нашої боротьби ми повинні розвинути твердиню, яка відповідатиме нашим амбіціям і підвищить наш престиж в очах інших [ROOT.GetCountry.GetReligion.GetAdjective] державних діячів. [target_location.GetName] буде прикрашена нашими прапорами та заселена нашим процвітаючим народом, який прагне викарбувати наші імена в анналах історії."
  flavor_kni.120.a: "Надати громадянство іноземним купцям."
  flavor_kni.120.b: "Натомість розвиваймо нашу інфраструктуру."
  flavor_kni.121.title: "Морська справа в [target_location.GetNameWithNoTooltip]"
  flavor_kni.121.desc: "[target_location.GetName] — острів у дуже вигідному положенні. Його близькість до узбережжя [target_location.GetRegion.GetName] підносить його до цінної якірної стоянки для нашої морської діяльності вздовж сусідніх узбереж. Водночас, слугуючи проходом між Сходом і Заходом, багато іноземних купців прагнули зробити [target_location.GetNameWithNoTooltip] зупинкою у своїх подорожах до та з Близького Сходу."
  flavor_kni.121.a: "Ми сприятимемо виробництву [ShowGoodsName('naval_supplies')]!"
  flavor_kni.121.b: "Ми повинні розмістити більше купців."
  flavor_kni.121.c: "Натомість зосередимо наші зусилля на догляді за місцевими жителями."
  flavor_kni.130.title: "Чудотворний землетрус"
  flavor_kni.130.desc: "Святе втручання в [target_location.GetName]! Посеред штурму [siege_leader.GetAdjective] військами земля почала сильно трястися, кидаючи як нападників, так і захисників у безлад. Поштовхи спричинили цунамі, яке змогло перешкодити штурму наших обложників і знищити більшу частину їхніх запасів продовольства."
  flavor_kni.130.a: "Це святе схвалення чи осуд?"
  flavor_kni.131.title: "Землетрус вражає [target_location.GetNameWithNoTooltip]"
  flavor_kni.131.desc: "Під час нашої облоги [target_location.GetName] сталася вкрай невдала подія. Земля почала сильно трястися, сильніше, ніж ми коли-небудь бачили, спричиняючи широкомасштабні руйнування та смерті. Більше того, цунамі, що послідувало, знищило наші запаси продовольства, роблячи нашу облогу нежиттєздатною в довгостроковій перспективі."
  flavor_kni.131.a: "Прокляття!"
  flavor_kni.150.title: "Замок у [target_location.GetNameWithNoTooltip]"
  flavor_kni.150.desc: "[target_location.GetOwner.GetAdjective] влада над [target_location.GetRank.GetName] [target_location.GetName] є в кращому випадку слабкою. Загальновідомо, що ми могли б розумно висадити наших лицарських братів на півострові, щоб побудувати замок. Для будівництва ми могли б використати залишки стародавнього Мавзолею в Галікарнасі, щоб зменшити ризики та витрати."
  flavor_kni.150.a: "Візьміть під контроль і використайте залишки Галікарнасу."
  flavor_kni.150.b: "Побудувати замок з наших власних матеріалів."
  flavor_kni.150.c: "Нам не потрібна фортеця на материку."
  flavor_kni.151.title: "Іноземний замок у [target_location.GetNameWithNoTooltip]"
  flavor_kni.151.desc: "Ті підступні [kni_from.GetAdjective] брати висадилися на берегах [target_location.GetName] і почали будівництво замку. Хоча [target_location.GetRank.GetName] номінально наш, наші найближчі бальї знаходяться за милі і не змогли відповісти на загрозу в розумний час. Ми вважаємо, що єдиний спосіб провчити [kni_from.GetNameWithNoTooltip] — це військова кампанія."
  flavor_kni.151.a: "Ми провчимо їх."
  flavor_kni.1000.title: "Розширення [ShowRegionNameWithNoTooltip('caribbean_region')] володінь"
  flavor_kni.1000.desc: "Наш [ROOT.GetCountry.GetFlavorRank] довго стояв як бастіон проти язичницьких загроз у Середземномор'ї, але наші амбіції не повинні обмежуватися цими берегами. Вже встановивши присутність у [ShowRegionName('caribbean_region')], ми знаємо, що острови там багаті на ресурси та стратегічно розташовані вздовж ключових торговельних шляхів. Деякі серед [ROOT.GetCountry.GetFlavorRank] пропонують розширити наш вплив, придбавши острів у [target_country.GetLongName]. Видатні члени [ROOT.GetCountry.GetGovernment.GetCabinetTitle] були особливо зацікавлені в купівлі [target_location.GetName]."
  flavor_kni.1000.a: "Надіслати пропозицію про купівлю острова."
  kni_if_target_agrees: "Якщо [target_country.GetName] погоджується:"
  flavor_kni.1000.b: "Нам це не потрібно."
  flavor_kni.1000.historical_info: "У 1651 році, під керівництвом Великого Магістра Джованні Паоло Ласкаріса, Лицарі-госпітальєри розширили свій вплив за межі Середземномор'я, придбавши кілька Карибських островів у французької #italic Compagnie des Îles de l'Amérique#!. До них належали Сент-Крістофер, Сент-Мартін, Сент-Бартелемі та Сент-Круа. Однак Ордену було важко утримувати свої позиції через логістичні труднощі, фінансові тягарі та загрози з боку конкуруючих європейських держав. Зрештою, у 1665 році Лицарі продали свої Карибські володіння назад французам."
  flavor_kni.1001.title: "Пропозиція від [from_country.GetNameWithNoTooltip]"
  flavor_kni.1001.desc: "Несподіваний запит надійшов від [from_country.GetName]. Хоча вони відомі насамперед своєю обороною Середземномор'я, тепер вони прагнуть закріпитися в Новому Світі. Їхня пропозиція проста: вони бажають придбати одне з наших [ShowRegionName('caribbean_region')] володінь, а саме [target_location.GetName], щоб розширити свою місію."
  flavor_kni.1001.a: "Приступити до продажу островів."
  flavor_kni.1001.b: "Виключено!"
  flavor_kni.1002.title: "Купівля [target_location.GetNameWithNoTooltip]"
  flavor_kni.1002.desc: "Наші переговори принесли плоди – [target_location.GetName] тепер під нашим контролем! Ця фортеця в [ShowRegionName('caribbean_region')] слугуватиме базою для нашого [ROOT.GetCountry.GetFlavorRank], дозволяючи нам поширити свій вплив на Новий Світ."
  flavor_kni.1002.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_kni.1002.a.t: "Ми взяли під контроль [target_location.GetName] у [target_country.GetName]"
  flavor_kni.1003.title: "Невдала транзакція"
  flavor_kni.1003.desc: "Нашу пропозицію зустріли відмовою. [target_country.GetName] визнало [target_location.GetName] надто цінним, щоб розлучатися з ним, залишивши наші плани щодо хрестового походу в Новому Світі нездійсненими. Хоча дехто з нас стверджує, що ми повинні продовжувати шукати іншу можливість, інші бачать у цьому знак того, що наша увага має залишатися на Середземномор'ї."
  flavor_kni.1003.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_kni.1003.a.t: "[target_country.GetName] відмовилося продати нам [target_location.GetName]."
  flavor_kni.2000.title: "Продаж колоній"
  flavor_kni.2000.desc: "Наше колоніальне правління в [ShowRegionName('caribbean_region')] було поставлено під сумнів. Зі зростанням європейської конкуренції, тиском великих держав, а також логістичними та економічними викликами у підтримці наших острівних володінь, дехто серед [ROOT.GetCountry.GetFlavorRank] вважає, що настав час продати наші території в [ShowRegionNameWithNoTooltip('caribbean_region')], щоб зосередитися на захисті наших європейських фортець. Багато хто пропонує продати наші колоніальні володіння [target_country.GetName], оскільки вони вже мають присутність у регіоні та дружні стосунки з [ROOT.GetCountry.GetFlavorRank]. Однак інші наполягають, що наша місія в Новому Світі ще далеко не завершена, і відмова від наших колоній була б серйозною помилкою."
  flavor_kni.2000.a: "Острови – це тягар."
  flavor_kni.2000.a.t: "Якщо [target_country.GetName] погодиться:"
  flavor_kni.2000.b: "Ми збережемо наші колонії!"
  flavor_kni.2000.historical_info: "У 1665 році лицарі-госпітальєри продали свої карибські острови Сент-Крістофер, Сент-Мартін, Сент-Бартелемі та Сент-Круа французам через надзвичайні труднощі у підтримці своєї колоніальної присутності. Острови виявилися важкими для захисту від нападів тубільців, англійців та голландців, а Ордену бракувало необхідних фінансових та військових ресурсів для їх утримання."
  flavor_kni.2001.title: "Продаж колоній"
  flavor_kni.2001.desc: "До нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] надійшла несподівана пропозиція від [from_country.GetName]. Посилаючись на економічні обмеження та стратегічні міркування, вони бажають продати нам свої володіння в [ShowRegionName('caribbean_region')]. Ці острови, хоч і невеликі, могли б слугувати цінними форпостами для торгівлі, оборони та експансії в Новому Світі."
  flavor_kni.2001.a: "Погодитися на придбання островів."
  flavor_kni.2001.b: "Відхилити пропозицію."
  flavor_kni.2002.title: "[target_country.GetNameWithNoTooltip] купує наші колонії"
  flavor_kni.2002.desc: "Нашу пропозицію було прийнято, і ми офіційно передали контроль над нашими володіннями в [ShowRegionName('caribbean_region')] до [target_country.GetName]. Отриманий нами платіж значно зміцнить наше фінансове становище, дозволяючи нам краще підтримувати нашу присутність у Середземномор'ї та наші основні володіння."
  flavor_kni.2002.a: "Це було необхідно..."
  flavor_kni.2002.a.t: "Ми успішно продали наші колоніальні володіння [target_country.GetName]"
  flavor_kni.2003.title: "[target_country.GetNameWithNoTooltip] відхиляє пропозицію"
  flavor_kni.2003.desc: "Незважаючи на нашу пропозицію, [target_country.GetName] відмовилося придбати наші острови в [ShowRegionName('caribbean_region')]. Схоже, вони не бачать достатньої цінності в придбанні цих віддалених володінь або не бажають інвестувати необхідні ресурси. Наразі ми залишаємося правителями цих островів, хоча фінансовий тягар їх утримання залишається нагальною проблемою."
  flavor_kni.2003.a: "Ми вирішимо це іншим способом."
  flavor_kni.2003.a.t: "[target_country.GetName] відмовилося купувати наші колоніальні володіння"