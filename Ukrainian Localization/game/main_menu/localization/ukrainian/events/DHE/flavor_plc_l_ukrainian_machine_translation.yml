l_english:
  flavor_plc.1.title: "Орден Святого Духа"
  flavor_plc.1.desc: "Виникла потреба у новому святому ордені у [GetCountry('FRA').GetLongName] після втрати престижу, якого зазнав Орден Святого Михаїла. Цей новий орден здобуде старшинство на своїй батьківщині через першість, здобуваючи славу та вплив завдяки прийняттю до нього деяких наймогутніших правителів та шляхтичів у [GetCountry('FRA').GetNameWithNoTooltip].\n\nОрден Святого Духа, як він буде відомий, складатиметься з восьми духовних членів, чотирьох офіцерів та ста лицарів, тоді як здобуття членства вимагатиме найсуворіших вимог віри та статуту. Будучи пов'язаними з таким великодушним орденом через наше покровительство, ми забезпечимо собі великі переваги."
  flavor_plc.1.a: "Заснувати орден."
  flavor_plc.1.b: "Нам не потрібні відзнаки та пишні титули!"
  flavor_plc.1.historical_info: "Заснований королем Генріхом III Французьким під час його перебування на польському престолі, Орден Святого Духа почав діяти 31 грудня 1578 року. Його метою було відновити престиж, втрачений Орденом Святого Михаїла під час Французьких релігійних війн. Натхнення походило від ранішого ордену, створеного Людовиком Анжуйським у 1353 році, з яким Генріх III зіткнувся у Венеції. Новий орден, присвячений Святому Духу, був призначений для високопоставлених князів та шляхтичів, створюючи дворівневу систему з Орденом Святого Михаїла, тепер призначеним для менших слуг Корони. Ця ініціатива прагнула вшанувати подвійне сходження Генріха III на престоли Польщі та Франції, обидва з яких відбулися на П'ятидесятницю, та відродила історичний Орден Вузла, заснований у XIV столітті."
  flavor_plc.2.title: "Морська комісія"
  flavor_plc.2.desc: "Моря ніколи не були пріоритетом для нашого [ROOT.GetCountry.GetFlavorRank]. Протягом більшої частини нашої історії прибережні райони були або на периферії нашої держави, або повністю контролювалися іноземною державою. Однак часи змінюються, і ми повинні адаптуватися. З нашим зростаючим потенціалом та новими амбіціями на [ShowAreaName('eastern_baltic_sea')], настав час заснувати військовий флот."
  flavor_plc.2.historical_info: "Морська комісія, або #italic Komisja Morska#!, була установою, створеною 24 березня 1568 року королем Сигізмундом II Августом. Базуючись у Данцигу, вона була першим польським адміралтейством, і її метою було керувати флотилією каперів, забезпечувати дисципліну в рядах моряків та віддавати накази флотам. Вона була відносно недовговічною, проіснувавши лише до 1572 року, але концепція була знову використана у 1626 році, коли була створена 'Комісія королівських кораблів', або #italic Komisja Okrętów Królewskich#!."
  flavor_plc.2.a: "Заснувати комісію."
  flavor_plc.2.b: "Давайте зосередимося на реформуванні наших сухопутних сил натомість."
  STATIC_MODIFIER_NAME_plc_start_of_a_navy: "Початок флоту"
  flavor_plc.3.title: "[plc_arend_dickmann_scope.GetNameWithNoTooltip]"
  flavor_plc.3.desc: "Купець [plc_arend_dickmann_scope.GetCulture.GetName] походження нещодавно вступив на службу до нашого флоту, вирізняючись [plc_arend_dickmann_scope.GetHerselfHimself] серед інших моряків [plc_arend_dickmann_scope.GetHerHis] майстерністю. Оскільки [plc_arend_dickmann_scope.GetHerHim] піднявся по службі, морська комісія розглядає призначення [plc_arend_dickmann_scope.GetNameWithNoTooltip] адміралом."
  flavor_plc.3.a: "Нам потрібен [plc_arend_dickmann_scope.GetNameWithNoTooltip] як адмірал!"
  flavor_plc.3.b: "Нехай [plc_arend_dickmann_scope.GetHerHim] залишається звичайним моряком."
  flavor_plc.4.title: "Сарматизм"
  flavor_plc.4.desc: "Нещодавно серед нашого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] почав набирати обертів найдивніший зв'язок. Цей зв'язок, на який вказував ще в XV столітті [GetCharacter('jan_dlugosz').GetName], стверджує, що походження [ROOT.GetCountry.GetAdjective] народу лежить у сарматів стародавнього [ShowRegionName('steppes_region')]. Ця теорія [ShowPolicyName('plc_sarmatism')] безумовно відповідає інтересам [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], які щиро прийняли її та зробили частиною своєї ідентичності."
  flavor_plc.4.a: "Захоплююче!"
  flavor_plc.4.b: "Це слугує цікавою теорією, нічого більше."
  flavor_plc.5.title: "Четвергові обіди"
  flavor_plc.5.desc: "Прибуття [ShowInstitutionName('enlightenment')] до [ROOT.GetCountry.GetName] не залишилося безплідним. Спонтанно, на прохання одного з членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], що займав високе становище в ієрархії [ROOT.GetCountry.GetGovernment.GetCourtTitle], [ROOT.GetCountry.GetGovernment.GetRulerTitle] вирішив почати організовувати зустрічі в [ROOT.GetCountry.GetGovernment.GetAdjective] палаці. Ці події не були звичайними, оскільки вони були засновані на [GetCountry('FRA').GetAdjective] салонах."
  flavor_plc.5.historical_info: "Четвергові обіди були зустрічами, що проводилися між польською інтелігенцією та королем Станіславом Августом Понятовським у 1770-1784 роках у королівських резиденціях. Серед учасників були видатні філософи, письменники та політики, які обговорювали літературу та ідеали."
  flavor_plc.5.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_plc.6.title: "[ShowPolicyNameWithNoTooltip('order_of_the_white_eagle_policy')]"
  flavor_plc.6.desc: "Натхненний сусідніми державами, [target_character.GetName] висунув пропозицію заснувати власний військовий орден [target_character.GetHerHis], щоб бути рівним серед інших великих держав [ShowContinentName('europe')] та щоб [target_character.GetHerHis] придворні були належним чином винагороджені. Проте заснування такого ордену не обійшлося б без витрат, як фінансових, так і політичних. Новий орден відштовхнув би [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які розглядають цю установу як порушення своїх ідеалів, що постулюють рівність кожного шляхтича."
  flavor_plc.6.historical_info: "Орден Білого Орла було засновано 1 листопада 1705 року королем Августом II Сильним Речі Посполитої. Його заснування було натхненне французьким Орденом Святого Духа та російським Орденом Святого Андрія. Хоча спочатку це був орден, який надавався лише обраним, наступник Августа, Август III, надав його понад триста разів."
  flavor_plc.6.a: "Заснувати орден!"
  flavor_plc.6.b: "Ми не можемо ризикувати розгнівати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_plc.7.title: "Шляхетські колегії"
  flavor_plc.7.desc: "Різні видатні члени [root_religion.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] нещодавно заснували кілька колегій та університетів по всьому [target_capital.GetName], більшість з яких носять назву #italic Collegium Nobilium#! або Колегія для шляхти. Як випливає з назви, ці школи призначені для навчання синів вищого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_plc.7.a: "Ми можемо лише підтримати таку ініціативу."
  flavor_plc.7.b: "Вони просто прагнуть збагатитися."
  STATIC_MODIFIER_NAME_pol_excellent_noble_education: "Відмінна шляхетська освіта"
  flavor_plc.8.title: "Комісія національної освіти"
  flavor_plc.8.desc: "У [ROOT.GetCountry.GetGovernment.GetParliament.GetName] було висунуто пропозицію про створення [ShowModifier('plc_polish_commission')], яка була б регулюючим органом, що головним чином керував би системою шкільної освіти [ROOT.GetCountry.GetLongName] та іншими пов'язаними з нею питаннями. Хоча пропозиція зустріла надзвичайну підтримку з боку [ROOT.GetCountry.GetGovernment.GetRulerTitle] та багатьох видатних членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], значна частина [ROOT.GetCountry.GetGovernment.GetParliament.GetName] залишається скептичною."
  flavor_plc.8.historical_info: "Комісія національної освіти, або #italic Komisja Edukacji Narodowej#!, була установою, створеною 14 жовтня 1773 року для управління системою шкільної освіти Речі Посполитої після розпуску Ордену єзуїтів. Вона не тільки перейняла єзуїтські колегії, але й розробила нову навчальну програму та зробила освіту доступнішою для широкої публіки."
  flavor_plc.8.a: "Заснувати комісію."
  flavor_plc.8.b: "Ми не можемо ризикувати розгнівати [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  STATIC_MODIFIER_NAME_plc_polish_commission: "Комісія національної освіти"
  flavor_plc.9.title: "[lisowczycy_scope.GetNameWithNoTooltip]"
  flavor_plc.9.desc: "Молодий солдат на ім'я [target_character.GetName] досить незнатного шляхетського походження вирішив зробити собі ім'я у світі і тому став солдатом удачі, зібравши невеликий загін як лідер нової найманської компанії [lisowczycy_scope.GetName]. Хоча ми вважаємо, що [target_character.GetNameWithNoTooltip] було б краще приєднатися до наших сил, ми, безумовно, повинні розглянути можливість використання [target_character.GetHerHis] послуг, перш ніж це зроблять наші вороги."
  flavor_plc.9.a: "Нам знадобиться будь-яка зброя, яку ми можемо отримати."
  flavor_plc.9.b: "Зараз не час."
  flavor_plc.10.title: "[target_character.GetNameWithNoTooltip]"
  flavor_plc.10.desc: "Певний член [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] нещодавно здобув велику славу в [ROOT.GetCountry.GetFlavorRank]. [target_character.GetHerHis|U] ім'я [target_character.GetName], і [target_character.GetSheHe] став видатною фігурою в політиці та в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Що важливіше, [target_character.GetShortNameWithNoTooltip] відомий [target_character.GetHerHis] громовими проповідями та промовами, виголошеними під час засідань [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  flavor_plc.10.a: "Ми повинні приділяти найпильнішу увагу цим проповідям."
  flavor_plc.10.b: "Ігнорувати [target_character.GetHerHim]."
  every_non_catholic_pop_loses_satisfaction: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] не-[Concept('skarga_religion.GetAdjective] [religion', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_plc.11.title: "[target_character.GetNameWithNoTooltip]"
  flavor_plc.11.desc: "[ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] захоплений нещодавніми досягненнями [target_character.GetName], висхідної зірки нашої армії. Хоча деякі сумнівалися в військовій майстерності [target_character.GetShortNameWithNoTooltip], спогади про [target_character.GetHerHis] останню сутичку, схоже, рішуче змінили їхню думку. Тепер існує широка згода, що [target_character.GetNameWithNoTooltip] слід підвищити до рангу #italic гетьмана#!."
  flavor_plc.11.a: "#italic O, quam dulce et decorum est pro patria mori.#!"
  flavor_plc.11.b: "[target_character.GetSheHe|U] надто амбітний(-а) і може підірвати [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_plc.12.title: "Бібліотека Залуських"
  flavor_plc.12.desc: "Члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вирішили заснувати вражаючу [ShowBuildingTypeName('library')] у нашій столиці [target_location.GetName]. Однак це не звичайна установа, оскільки вона містить вражаючу кількість літературних творів як вітчизняних, так і іноземних авторів. Можливо, було б корисно надати [ShowBuildingTypeNameWithNoTooltip('library')] додаткові кошти."
  flavor_plc.12.a: "Зробити її національною бібліотекою!"
  flavor_plc.12.b: "Спонсорувати заснування."
  flavor_plc.12.c: "Натомість покращити життя знаті."
  STATIC_MODIFIER_NAME_plc_zaluski_library_modifier: "Бібліотека Залуських"
  flavor_plc.13.title: "Школа лицарства"
  flavor_plc.13.desc: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName] нещодавно схвалив(-ла) план створення нової елітної школи в [target_location.GetName]. Будівництво йде за планом, але виникло питання, чи має будівля бути призначена для еліти, як це заведено в багатьох установах, чи нам слід застосувати більш меритократичний підхід."
  flavor_plc.13.a: "Лише [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] матиме доступ."
  flavor_plc.13.b: "Нехай вона буде відкритою для всіх."
  flavor_plc.13.c: "Не звертати уваги на установу [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  STATIC_MODIFIER_NAME_plc_school_of_chivalry_modifier: "Кадетський корпус"
  STATIC_MODIFIER_NAME_plc_school_of_chivalry_burghers_modifier: "Кадетський корпус для всіх"
  flavor_plc.14.title: "Гадяцький договір"
  flavor_plc.14.desc: "З огляду на величезний вплив [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] та загрозу їхнього повстання, нам іноді доводиться танцювати під їхню дудку. Однак їхня мелодія останнім часом була особливо безглуздою, оскільки вони запропонували, щоб [ShowReligionAdjective('orthodox')] [ShowCultureName('ruthenian')] народ приєднався до [ROOT.GetCountry.GetName] як третій член [ROOT.GetCountry.GetFlavorRank], що теоретично робить їх рівними нам, хоча на практиці дає їм домінуюче становище в державі."
  flavor_plc.14.a: "Підписати цю гірку пропозицію."
  flavor_plc.14.b: "Ми не будемо вести переговори з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]."
  every_cossack_pop: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], що належить до [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')], втратить [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  plc_name_will_change: "Наша назва зміниться на $PLC_ruthenian$."
  flavor_plc.15.title: "[target_rebel.GetNameWithNoTooltip]"
  flavor_plc.15.desc: "Група [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] на чолі з [target_character.GetName] вирішила об'єднатися в #italic конфедерацію#! на захист своїх історичних привілеїв від нібито надмірностей [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Якщо ми не задовольнимо вимоги [target_rebel.GetName], дуже ймовірно, що нам доведеться зіткнутися зі збройним повстанням проти нас."
  flavor_plc.15.historical_info: "#italic Конфедерація#! — це об'єднання, створене одним із польсько-литовських станів з метою нав'язати свою волю королівській владі та захистити свої привілеї. Ця зрада корони виправдовувалася #italic ius resistendi#!, правом чинити опір надмірностям уряду."
  flavor_plc.15.a: "Зустріти їх на полі бою."
  flavor_plc.15.b: "Виконати їхні вимоги."
  plc_confederation_rebelname: "Конфедерація"
  flavor_plc.16.title: "Рокош [target_character.GetNameWithNoTooltip]"
  flavor_plc.16.desc: "Зрадницька банда [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] під проводом [target_character.GetName] взялася за зброю у відкритому повстанні через нашу відмову виконати їхні вимоги. Їхній мізерний [target_rebel.GetName] не вистоїть проти військової могутності [ROOT.GetCountry.GetGovernment.GetAdjective] сил."
  flavor_plc.16.historical_info: "Польсько-литовський #italic рокош#! був повстанням шляхти в ім'я захисту своїх привілеїв та обмеження абсолютистських надмірностей короля."
  flavor_plc.16.a: "Прокляті зрадники!"
  PLC_our_neighbors_rivals_enemies_have_been_notified: "Усі наші сусіди, [Concept('rivals', 'CONCEPT_PLACEHOLDER')|e] та [Concept('enemies', 'CONCEPT_PLACEHOLDER')|e] були повідомлені про наші негаразди."
  flavor_plc.17.title: "[target_rebel.GetNameWithNoTooltip]"
  flavor_plc.17.desc: "Зрадницькі [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] під проводом [target_character.GetName] вирішили підняти повстання проти нашого шляхетного та справедливого правління. Забезпечивши підтримку [ShowCultureName('crimean')] татар, вони прагнуть здобути незалежність для себе, або принаймні розширення привілеїв та збільшення реєстру."
  flavor_plc.17.historical_info: "Повстання Хмельницького було одним з багатьох козацьких повстань у Речі Посполитій, але безумовно найуспішнішим. Воно почалося 25 січня 1648 року з нападу на королівську варту на Запорізькій Січі. Повстання тривало 9 років до смерті Богдана Хмельницького. Після його смерті Січ розпочала переговори з Річчю Посполитою, що призвело до Гадяцького договору."
  flavor_plc.17.a: "Ми не дамо зрадникам нічого з цього."
  plc_chmielnicki_uprising: "Повстання Хмельницького"
  flavor_plc.18.title: "Нова столиця в [target_location.GetNameWithNoTooltip]?"
  flavor_plc.18.desc: "Утворення [ROOT.GetCountry.GetLongName] дещо змістило центр влади. З об'єднанням володінь, [target_location.GetName] тепер стала одним з головних місць у нашому [ROOT.GetCountry.GetFlavorRank]. Можливо, було б мудро перенести туди осідок [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName]?\n\nБагато наших радників підтримують цю ідею, оскільки [target_location.GetNameWithNoTooltip] розташована у вигідному географічному положенні між нашими новоінтегрованими територіями та нашим ядром навколо поточної столиці в [current_capital.GetName]."
  flavor_plc.18.historical_info: "Протягом більшої частини існування Королівства Польського місто Краків було головним містом держави, звідки правив Монарх і де знаходився двір. Однак, з особистою унією з Литвою, ситуація почала змінюватися, оскільки місто Варшава почало набувати значення. У 1569 році було вирішено, що Варшава буде місцем засідань Сейму, а через 4 роки було вирішено, що саме там відбуватимуться королівські вибори. З того часу місто продовжувало здобувати перевагу над Краковом, де все ще відбувалися коронації."
  flavor_plc.18.a: "Це відповідає нашому піднесеному статусу!"
  flavor_plc.18.b: "Навіщо порушувати багатство [current_capital.GetNameWithNoTooltip]?"
  STATIC_MODIFIER_NAME_plc_capital_change_modifier: "Зміна столиці"
  flavor_plc.19.title: "[ShowEstatePrivilegeNameWithNoTooltip('liberum_veto')]"
  flavor_plc.19.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], усвідомивши слабкість [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], вирішили забезпечити собі нові привілеї найпідступнішим способом. Тонко усвідомлюючи нашу залежність від них, вони вирішили шантажувати [ROOT.GetCountry.GetGovernment.GetRulerTitle] в надії отримати привілей [ShowEstatePrivilegeName('liberum_veto')]."
  flavor_plc.19.a: "Надати привілей."
  flavor_plc.19.b: "Нас не шантажуватимуть!"
  STATIC_MODIFIER_NAME_plc_blackmail_of_the_nobles: "Невиконання"
  plc_take_the_privilege_to_remove_the_modifier: "[ShowModifier('plc_blackmail_of_the_nobles')] можна усунути, взявши [Concept('privilege', 'CONCEPT_PLACEHOLDER')|e] [ShowEstatePrivilegeName('liberum_veto')]."
  flavor_plc.20.title: "[ShowEstatePrivilegeNameWithNoTooltip('golden_liberty')]"
  flavor_plc.20.desc: "Надання різноманітних привілеїв протягом багатьох років призвело до створення справді унікального уряду, де [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] здається, володіють абсолютною владою над державним правлінням. Якщо є якесь законодавство, яке аристократія не схвалює, воно припиняється правом на [ShowEstatePrivilegeName('liberum_veto')]. Крім того, [ROOT.GetCountry.GetGovernment.GetCourtTitle] більше не може вільно стягувати з них податки через [ShowEstatePrivilegeName('privilege_of_koszyce')]. Жодних обмежень також не може бути встановлено, оскільки [ShowEstatePrivilegeName('nihil_novi')] забороняє створювати будь-які закони про [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] без їхньої згоди. Підтвердження всіх цих привілеїв та інших підтверджується кожним наступним [ROOT.GetCountry.GetGovernment.GetRulerTitle] під час їхньої коронації як частина [ShowEstatePrivilegeName('pacta_conventa')]."
  flavor_plc.20.a: "Ми досягли ідеального уряду."
  flavor_plc.20.b: "Яка жахлива катастрофа цей уряд."
  STATIC_MODIFIER_NAME_plc_strive_for_reform: "Прагнення до реформ"
  plc_as_long_as_modifier_is_active_revoking_privileges_will_be_easier: "Доки активний [ShowModifier('plc_strive_for_reform')], вимоги щодо скасування [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e] [ShowEstatePrivilegeName('golden_liberty')], [ShowEstatePrivilegeName('liberum_veto')], [ShowEstatePrivilegeName('pacta_conventa')], [ShowEstatePrivilegeName('privilege_of_koszyce')], [ShowEstatePrivilegeName('nihil_novi')] та [ShowEstatePrivilegeName('nieszawa_privileges')] будуть зняті."
  flavor_plc.1000.title: "[ShowReligionAdjectiveWithNoTooltip('orthodox')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вимагають рівних прав"
  flavor_plc.1000.desc: "Це факт, що [ROOT.GetCountry.GetReligion.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] отримали багато привілеїв, не всі з яких також поширюються на їхніх [target_religion.GetAdjective] колег. Такий стан справ глибоко турбує [target_religion.GetAdjectiveWithNoTooltip], які відчувають, що їхні давні привілеї порушуються. Тому вони подали прохання про поширення на них різних привілеїв. Хоча це не дивно, що дивно в цьому проханні, так це підтримка [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], для яких релігійний розкол не є перешкодою для підтримки інтересів побратимів-магнатів іншого віросповідання."
  flavor_plc.1000.a: "Надати привілеї."
  flavor_plc.1000.b: "Відмовити в їхніх проханнях."
  plc_required_for_further_events: "[ShowEstatePrivilegeName('plc_empower_orthodox_nobility')] потрібен для подальших [Concept('events', 'CONCEPT_PLACEHOLDER')|e] щодо Берестейської унії."
  every_noble_pop_orthodox_loses_20_satisfaction: "[ShowPopTypeName('nobles')], які є [ShowReligionAdjective('orthodox')], втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_plc.1001.title: "Візит Патріарха"
  flavor_plc.1001.desc: "Нещодавно Патріарх [ShowLocationName('constantinople')] відвідав [target_religion.GetAdjective] Митрополію [leader_of_the_kyiv_patriarchate.GetName], щоб зібрати кошти для великої справи [target_religion.GetAdjectiveWithNoTooltip] Церкви. Під час візиту він лише формально відгукнувся на прохання місцевих вірян, ігноруючи їхні благання допомогти їм у кризі Церкви.\n\nЗа таких обставин ми могли б зробити кроки до об'єднання двох церков в унію."
  flavor_plc.1001.historical_info: "У 1588 році Патріарх Константинопольський Єремія II відвідав землі Русі, щоб зібрати кошти для поповнення Патріаршої скарбниці та зміцнення своєї політичної влади. По дорозі він надав статус Автокефального Патріархату Москві. Під час свого візиту до Рутенії він звільнив Київського митрополита Онисифора та попередив про полігінію серед духовенства. Однак цих дій було недостатньо, щоб заспокоїти рутенських єпископів, які вважали, що Єремія робить недостатньо для боротьби зі занепадом благочестя серед рутенського простолюду."
  flavor_plc.1001.a: "Запропонувати об'єднання [leader_of_the_kyiv_patriarchate.GetAdjective] Митрополії."
  flavor_plc.1001.b: "Спробувати схилити [target_religion.GetAdjectiveWithNoTooltip] простолюд до [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip]."
  plc_revoking_empowered_orthodox_nobility_will_prevent: "Скасування [ShowEstatePrivilegeName('plc_empower_orthodox_nobility')] запобігатиме спрацьовуванню майбутніх [Concept('events', 'CONCEPT_PLACEHOLDER')|e]."
  STATIC_MODIFIER_NAME_plc_diplomatic_efforts_to_unify_churches: "Об'єднання Церков"
  flavor_plc.1002.title: "Зрадники серед нас"
  flavor_plc.1002.desc: "Не всі [target_religion.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] піддаються нашим зусиллям об'єднати дві церкви. Багато хто, насправді, активно бореться з нашою місією встановити зв'язок між [GetCountry('PAP').GetLongName] та [target_religion.GetAdjectiveWithNoTooltip] Церквою. Хоча ми успішно зупинили поширення цього руху \"роз'єднання\", зрозуміло, що єпархії, керовані непокірними єпископами, не приєднаються до унії."
  flavor_plc.1002.historical_info: "$flavor_plc.1001.historical_info$"
  flavor_plc.1002.a: "Яка ганьба."
  flavor_plc.1002.tooltip: "[SCOPE.GetLocalVariable('amount_of_locations_affected').GetValue|0-] [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] матимуть [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] своїх [Concept('target_religion.GetAdjective] [pops', 'CONCEPT_PLACEHOLDER')|e] зменшено на [ROOT.ScriptValue('pop_satisfaction_severe_penalty')|%=+]"
  flavor_plc.1003.title: "Унія [target_location.GetNameWithNoTooltip]"
  flavor_plc.1003.desc: "Наші зусилля об'єднати рутенську [target_religion.GetAdjective] Церкву з [ROOT.GetCountry.GetReligion.GetAdjective] Церквою нарешті окупилися, оскільки сьогодні відзначається підписання Договору [target_location.GetName], що створює [target_io.GetName] під нашим керівництвом. Шлях сюди був нелегким, оскільки не всі єпископи були в захваті від перспективи об'єднання. Прикро, що було так багато опору не лише всередині країни, але й з боку інших [target_religion.GetAdjectiveWithNoTooltip] націй."
  flavor_plc.1003.historical_info: "Наслідком невдалого візиту Єремії стали поновлені зусилля з возз'єднання Православної та Католицької Церков у Речі Посполитій. Зрештою, кілька єпископів Київської митрополії підкорилися папській владі, утворивши Руську Унійну Церкву, якій було дозволено зберегти східні обряди, але яка формально перебувала під владою Риму. Створення цієї Церкви було закріплено підписанням Берестейської унії 1596 року."
  flavor_plc.1003.a: "#italic Te Deum!#!"
  formed_union_of_brest: "Сформував Унійний Церковний Патріархат"
  plc_patriarchate_tt: "Ми стали лідером [Concept('target_io.GetName] [international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  plc_patriarchate_tt_no_scope: "Ми стали лідером [GetInternationalOrganizationType('autocephalous_patriarchate').GetName] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  plc_revoked_privilege_will_destroy_io: "Скасування [ShowEstatePrivilegeName('plc_empower_orthodox_nobility')] розпустить [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_plc.2000.title: "Затиснуті між державами"
  flavor_plc.2000.desc: "Наша держава оточена націями, могутнішими за нас. Страждаючи від внутрішнього фракціоналізму та поширеної кризи, багато хто в [ROOT.GetCountry.GetName] почав закликати до централізації держави, тоді як інші, переважно представники [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], зосереджені на збереженні своїх давніх привілеїв, одночасно перебуваючи в союзі з [other_country.GetName]."
  flavor_plc.2000.historical_info: "Лівонська війна була конфліктом між Московським царством та коаліцією Польщі-Литви, Швеції та Данії, що тривав з 1558 по 1583 рік. Іскрою до цього конфлікту стало втручання Росії в Лівонію, і саме вони протягом 25 років намагалися приєднати Лівонію до себе. Однак, зрештою, коаліційні сили здобули перемогу, і #italic Terra Mariana#! була розділена між Данським Езелем, Шведською Естонією та Польсько-Литовським Герцогством Курляндії-Семигалії з його відповідником у Лівонії."
  flavor_plc.2000.a: "Прагнути централізації."
  flavor_plc.2000.b: "Звернутися до [other_country.GetAdjectiveWithNoTooltip]."
  flavor_plc.2001.title: "Звернення від [livonian_scope.GetNameWithNoTooltip]"
  flavor_plc.2001.desc: "[livonian_scope.GetLongName|U] запропонувала нам союз. Хоча сама по собі ця пропозиція досить неприваблива, з деяким політичним впливом ми змогли б перетворити цю пропозицію на пропозицію васалітету. Однак, якщо ми скористаємося цією можливістю, ми неодмінно побачимо втручання іноземної держави."
  flavor_plc.2001.historical_info: "$flavor_plc.2000.historical_info$"
  flavor_plc.2001.a: "Це чудова нагода."
  flavor_plc.2001.b: "Відхилити пропозицію."
  flavor_plc.2002.title: "[livonian_scope.GetNameWithNoTooltip] переорієнтовується"
  flavor_plc.2002.desc: "[livonian_scope.GetLongName|l] вирішила об'єднатися з державою [nation_helping.GetName], що призвело до її васалітету. Це відверте захоплення земель загрожує нашим інтересам у [ShowAreaName('baltic_area')], і вкрай важливо, щоб ми втрутилися, перш ніж осяде пил і їхня влада зміцниться."
  flavor_plc.2002.historical_info: "$flavor_plc.2000.historical_info$"
  flavor_plc.2002.a: "Ми повинні втрутитися."
  flavor_plc.2002.b: "Ми не в змозі вести війну."
  flavor_plc.2003.title: "$flavor_plc.2002.title$"
  flavor_plc.2003.desc: "$flavor_plc.2002.desc$"
  flavor_plc.2003.historical_info: "$flavor_plc.2000.historical_info$"
  flavor_plc.2003.a: "Варто розглянути."
  flavor_plc.2004.title: "Договір у [ShowLocationNameWithNoTooltip('vilnius')]"
  flavor_plc.2004.desc: "Майбутнє [ShowAreaName('baltic_area')] все ще невизначене. Хоча кілька воєн за цей регіон вже було проведено, питання про те, чий вплив пануватиме над цими територіями, все ще обговорюється, і тут, безсумнівно, буде ще більше воєн. Хоча війни, безумовно, чинили тиск на нашу владу, нам вдалося вистояти та зміцнити наш контроль над південно-західними районами [ShowProvinceDefinitionName('courland_province')] та [ShowProvinceDefinitionName('semigalia_province')]. Можливо, нам варто створити там нового васала."
  flavor_plc.2004.historical_info: "#italic Віленський договір#! підтвердив підкорення лівонських станів Речі Посполитій. Натомість лівонці отримали підтвердження релігійної свободи, гарантію привілеїв та #italic Indigenat#!, надання шляхетського статусу іноземним дворянам. Крім того, в рамках договору лівонські території на південь від річки Даугава були об'єднані під новоствореним Герцогством Курляндії-Семигалії, яким автономно керував останній лівонський магістр Готхард Кетлер. Решта лівонських територій на північ від річки були перетворені на Герцогство Лівонія безпосередньо під литовською юрисдикцією."
  flavor_plc.2004.a: "Ми довіримо це [target_country.GetNameWithNoTooltip]."
  flavor_plc.2004.b: "Ця угода для нас недійсна."
  STATIC_MODIFIER_NAME_plc_kurland_colonial_ambitions: "Колоніальні амбіції"