l_english:
  flavor_mlo.1.title: "Амброзіанська республіка"
  flavor_mlo.1.desc.no_ally: "Місто [ROOT.GetCountry.GetCapital.GetName] охопило сум'яття через раптову смерть [ROOT.GetCountry.GetGovernment.GetRulerTitle] без шанованого дорослого [ROOT.GetCountry.GetGovernment.GetHeirTitle]. Впливові громадяни вважали, що стару республіку, яку колись мала наша країна, можна відновити. Вчені установи, такі як Коледж юриспруденції в [ShowLocationName('pavia')], змальовували часи старої республіки як золоту добу. Купці, бачачи процвітання інших італійських республік, підтримували цю ідею.\n\nТаким чином, було висунуто пропозицію про проголошення республіки, а претендентів на трон мали вигнати з міста. Нова республіка буде названа Золотою Амброзіанською Республікою, на честь єпископа IV століття з [ShowLocationNameWithNoTooltip('milano')]."
  flavor_mlo.1.desc: "$flavor_mlo.1.desc.no_ally$\n\nЗ іншого боку, ми могли б запросити іншу [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName], союзну нам, щоб вона взяла нас під своє крило і правила нами разом зі своєю країною."
  flavor_mlo.1.a: "За Святого Амвросія!"
  flavor_mlo.1.b: "Ми не повернемося до республіки."
  mlo_against_ambrosian: "Проти Амброзіанської республіки"
  establish_union_with_target_country_tt: "Цей варіант завершить [ShowDisasterName('ambrosian_republic_disaster')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] і створить [Concept('union', 'CONCEPT_PLACEHOLDER')|e] між нами та [target_country.GetLongName]"
  flavor_mlo.2.title: "Гвельфсько-гібеллінська ворожнеча в Мілані"
  flavor_mlo.2.desc: "Внутрішні розбіжності помітні в Мілані. Населення сильно розділене між різними фракціями. Обрання гвельфських аристократів замість гібеллінів послаблює Республіку і робить її менш демократичною. Однак потрібна певна стабільність!"
  flavor_mlo.2.a: "Стати на бік гвельфів"
  flavor_mlo.2.b: "Віддати перевагу гібеллінам"
  flavor_mlo.3.title: "Оспедале Маджоре"
  flavor_mlo.3.desc: "На прохання [ROOT.GetCountry.GetGovernment.GetRuler.GetName] відомий архітектор Антоніо Філарете розробив плани нової лікарні Ка'Гранда, яка після завершення будівництва стане однією з перших громадських лікарень в Італії. Присвячена жителям Аннунціати (які вагалися визнавати владу [ROOT.GetCountry.GetGovernment.GetRulerTitle]), вона буде побудована в новому, модному ренесансному стилі."
  flavor_mlo.3.a: "Нехай буде збудовано!"
  flavor_mlo.4.title: "Лодійський мир"
  flavor_mlo.4.desc: "Наші дипломати домовилися про мир між нами, Неаполем, Флоренцією та Венецією! Поклавши край тривалим боротьбам між Міланом і Венецією, він встановлює баланс сил у Північній Італії, включаючи чотири великі держави Італії. З удачею, це забезпечить нам безпеку для зміцнення нашої позиції."
  flavor_mlo.4.a: "Мир у наш час!"
  mlo_peace_of_lodi: "Лодійський мир"
  flavor_mlo.4.b: "Це завадить нашим амбіціям..."
  flavor_mlo.5.title: "Лодійський мир"
  flavor_mlo.5.desc: "Міланці погодилися підписати мирний договір між собою, Неаполем, Флоренцією та Венецією! Поклавши край тривалим боротьбам між Міланом і Венецією, він встановлює баланс сил у Північній Італії, включаючи чотири великі держави Італії. З удачею, це забезпечить нам безпеку для зміцнення нашої позиції."
  flavor_mlo.5.a: "Мир у наш час!"
  flavor_mlo.6.title: "#italic $Таємна вечеря$# [target_artist.GetNameWithNoTooltip]!"
  flavor_mlo.6.desc: "Є правда у твердженні, що наші найяскравіші та найславетніші витвори мистецтва є лише символами нашої сили та стійкості. Однак людство має цінність саме у своїй здатності до мистецтва та самовираження. Найпряміший спосіб спрямування нашого культурного розвитку та демонстрації нашого престижу – це створення величезних витворів мистецтва, і така нагода нещодавно виникла, оскільки легендарний художник [target_artist.GetName] нещодавно почав шукати спонсорські кошти для своєї наступної великої роботи, #italic $Таємна вечеря$#!."
  flavor_mlo.6.a: "Ми спонсоруватимемо [target_artist.GetHerHim]!"
  flavor_mlo.6.b: "Ми не можемо дозволити собі цю комісію..."
  flavor_mlo.9.title: "[target_artist.GetNameWithNoTooltip] відвідує [target_location.GetNameWithNoTooltip]"
  flavor_mlo.9.desc: "Один із найлегендарніших художників, справжня людина Відродження, благословив наш двір своєю присутністю. [target_artist.GetName] відомий своїми здібностями далеко за межами нашої країни і є бажаним гостем, оскільки він славиться як неймовірний художник, інженер, архітектор і багато іншого!"
  flavor_mlo.9.a: "Леонардо, ласкаво просимо залишитися!"
  flavor_mlo.9.b: "Ми не можемо дозволити собі його зарплату."
  flo_target_artist_joins_our_court_tt: "[target_artist.GetName] приєднується до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_mlo.10.title: "Центр моди"
  flavor_mlo.10.desc: "Місто [target_location.GetName] стало центром моди в пізньому середньовіччі, а виробництво предметів розкоші було настільки важливим, що інші мови використовували назву самого міста для опису вишуканих товарів. На початку 16 століття понад двадцять тисяч робітників були зайняті в шовковій промисловості, наполегливо працюючи над тим, щоб зробити двір найпишнішим в Італії."
  flavor_mlo.10.a: "Це виглядає добре..."
  flavor_mlo.11.title: "Зростаюча сила в Північній Італії"
  flavor_mlo.11.desc: "Протягом нашого століття [ROOT.GetCountry.GetName] переживає значне зростання та розвиток, утверджуючись як процвітаюче місто-держава в Північній Італії. Стратегічне розташування міста вздовж основних торговельних шляхів значною мірою сприяє його процвітанню. [ROOT.GetCountry.GetNameWithNoTooltip] стало центром торгівлі, приваблюючи купців та ремісників з усієї Європи.\n\nЙого населення зростає семимильними кроками, а міський ландшафт прикрашається будівництвом вражаючої готичної та ренесансної архітектури, включаючи знакові споруди пишноти та величі. Правляча [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] відіграє вирішальну роль у сприянні культурному та мистецькому патронажу, перетворюючи [ROOT.GetCountry.GetNameWithNoTooltip] на жвавий осередок творчості.\n\nЗростаюче багатство та вплив нашого міста також сприяють розвитку науки, технологій та освіти, роблячи [ROOT.GetCountry.GetNameWithNoTooltip] маяком прогресу в цей динамічний період історії."
  flavor_mlo.11.a: "Ми повинні зосередитися навколо нашої центральної влади."
  flavor_mlo.11.b: "Звернімося до шляхетних голів наших міст."
  flavor_mlo.12.title: "Родина [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] з [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_mlo.12.desc: "Під час правління [ROOT.GetCountry.GetGovernment.GetRuler.GetName] як голови [ROOT.GetCountry.GetLongName] політична ситуація перебуває в процесі значної трансформації. [ROOT.GetCountry.GetGovernment.GetRuler.GetName], відомий [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] амбіціями та політичною проникливістю, мріє про справжнє об'єднання наших роздроблених міст, багато з яких очолюються нелояльними родинами.\n\nУ майстерному дипломатичному кроці для захоплення влади наші радники рекомендують нам вичікувати і використовувати цей час для розробки планів, що включають розширення територій [ROOT.GetCountry.GetNameWithNoTooltip] шляхом військових завоювань та стратегічних альянсів, як спосіб консолідації контролю над регіоном та об'єднання роздроблених міст-держав [ROOT.GetCountry.GetFlavorRank].\n\nЦе відкрило б шлях до впровадження ефективних адміністративних реформ та сприяння процвітаючому культурному та мистецькому середовищу, зрештою зробивши [ROOT.GetCountry.GetNameWithNoTooltip] видатним центром культури Відродження, але не раніше, ніж ті з нашої родини, хто має королівські амбіції, будуть змушені повернутися до ладу."
  flavor_mlo.12.a: "Терпіння, наш час настане..."
  flavor_mlo.12.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] негайно здолає [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] підступну родину!"
  flavor_mlo.13.title: "Об'єднане царство"
  flavor_mlo.13.desc: "Однією з ключових подій, що ілюструє еволюцію [ROOT.GetCountry.GetName] від вільного об'єднання міст-держав, контрольованих родиною [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], до більш централізованої одиниці, є сходження на престол [ROOT.GetCountry.GetGovernment.GetRuler.GetName] як визнаного правителя [ROOT.GetCountry.GetNameWithNoTooltip] у [GetCurrentYear].\n\nСходження [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] на титул [ROOT.GetCountry.GetGovernment.GetRulerTitle] знаменує перехід до єдиної та централізованої структури управління. Сходження зміцнює контроль родини [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] над [ROOT.GetCountry.GetNameWithNoTooltip] і незабаром прокладе шлях для наступних правителів [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]."
  flavor_mlo.13.a: "Настав час нам стати [ShowGovernmentTypeNameWithNoTooltip('monarchy')]!"
  flavor_mlo.13.c: "Настав час для більш централізованої влади."
  flavor_mlo.13.b: "Вони можуть триматися за свої занепадаючі привілеї ще деякий час..."
  flavor_mlo.14.title: "[target_character.GetNameWithNoTooltip] завершує #italic Cronica Universalis#!"
  flavor_mlo.14.desc: "[target_character.GetName], італійський історик і хроніст, є автором #italic Cronica Universalis#!, значної історичної праці. Завершена в [GetCurrentYear], хроніка надає всебічний опис подій, що охоплюють різні регіони та епохи, що робить її цінним джерелом для розуміння середньовічної історії.\n\nРетельні дослідження та увага до деталей [target_character.GetNameWithNoTooltip] очевидні в обширній документації та хронології, що містяться в його останній праці.$cronica_universalis_desc$\n\nВнесок [target_character.GetNameWithNoTooltip] в історичну науку через його публікації, безумовно, залишить тривалий вплив на вивчення середньовічної історії та сприятиме нашому політичному та культурному впливу."
  flavor_mlo.14.a: "[target_location.GetName] є центром наукових інновацій!"
  flavor_mlo.14.b: "Ці публікації принесуть нам лише прокляття..."
  flavor_mlo.15.title: "Скрутне становище [target_character.GetNameWithNoTooltip]"
  flavor_mlo.15.desc: "[target_character.GetName], сповнений палкого прагнення до справедливості, увірвався до залів [ROOT.GetCountry.GetCapital.GetName], маючи намір протистояти [ROOT.GetCountry.GetGovernment.GetRuler.GetName], [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName], вимагаючи правди про вбивць свого батька.\n\nНаше місто не чуже змовам про вбивства між братами, і, як це часто буває, саме [target_character.GetNameWithNoTooltip] заплутався в павутині змов, уявляючи тіні там, де їх немає. З якою б метою це не було, він, здається, переконаний, що наш дорогий [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] мав стосунок до вбивства, що, безперечно, є лише безглуздою чуткою..."
  flavor_mlo.15.a: "Все дозволено в гонитві за владою, [target_character.GetShortNameWithNoTooltip]!"
  flavor_mlo.15.b: "Розслідувати та звинуватити інших членів родини у вбивстві."
  flavor_mlo.15.c: "Ми знаємо, як змусити тебе зникнути..."
  flavor_mlo.16.title: "[target_character.GetNameWithNoTooltip] наближається до нашого двору"
  flavor_mlo.16.desc: "[target_character.GetName], прагнучи помсти за смерть свого батька, наближається до двору [ROOT.GetCountry.GetCapital.GetName]. З продуманою пропозицією він пропонує свою військову доблесть і ресурси, щоб допомогти в завоюванні [target_rival.GetName].\n\nПалке прагнення [target_character.GetNameWithNoTooltip] до справедливості підживлює його рішучість, коли він представляє себе грізним союзником проти правителя, який забрав життя його батька. Напруга наповнює повітря, оскільки його пропозиція висить у повітрі, чекаючи нашого рішення. Чи виявляться його вендета та пропозиція допомоги непереборними, що призведе до союзу, який може змінити хід історії [ROOT.GetCountry.GetName]?"
  flavor_mlo.16.a: "Засиплемо його монетами, його боротьба тепер наша!"
  flavor_mlo.16.b: "Це цінна можливість, але з обережністю..."
  flavor_mlo.16.c: "Ми не ведемо переговорів з людьми, які тікають зі свого двору!"
  flavor_mlo.17.title: "[target_character.GetNameWithNoTooltip] збирає армію"
  flavor_mlo.17.desc: "У гамірній столиці [ROOT.GetCountry.GetName] [target_character.GetName], керований амбіціями та жагою до пригод, збирає відому найману компанію Compagnia di Santo Giorgio. Озброєні мечами та одягнені в міцні обладунки, найманці збираються, готові вирушити на сміливі подвиги під командуванням [target_character.GetNameWithNoTooltip].\n\nЗавдяки репутації своєї майстерності та дисципліни, компанія чоловіків стає грізною силою, приваблюючи відважних воїнів зблизька та здалеку. [target_character.GetNameWithNoTooltip], як кондотьєр, має намір вести свою компанію в невідоме, шукаючи слави, багатства та пошани на полях битв Європи. Вулиці [target_location.GetName] гудуть від передчуття, оскільки ця зухвала банда найманців бажає вирушити у свої небезпечні та захоплюючі пригоди."
  flavor_mlo.17.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mlo.17.b: "Ми закінчили потурати його роздумам, геть звідси, мерзенний жебраку!"
  flavor_mlo.18.title: "[target_character.GetNameWithNoTooltip] представляє Liber Gestorum у Ломбардії"
  flavor_mlo.18.desc: "У [GetCurrentYear] році [target_character.GetName], вправний хроніст, старанно завершив і представляє #italic Liber Gestorum in Lombardy#!, всеосяжну хроніку, що документує багату історію Північної Італії. Під патронатом [ROOT.GetCountry.GetGovernment.GetRuler.GetName], правителя [ROOT.GetCountry.GetLongName], [target_character.GetNameWithNoTooltip] ретельно зафіксував події, боротьбу та тріумфи, що сформували регіон.\n\nЗ твердою рукою та гострим оком на деталі, його яскраві описи оживляють минуле, захоплюючи читачів та зберігаючи колективну пам'ять Ломбардії. Його праця служить свідченням сили історичних наративів та незмінної спадщини династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. У залах [target_location.GetName] презентація [target_character.GetNameWithNoTooltip] захоплює аудиторію, залишаючи їм глибоке розуміння історії та спадщини їхнього улюбленого домену."
  flavor_mlo.18.a: "Це стане чудовим доповненням до нашої колекції..."
  flavor_mlo.18.b: "Навіщо виставляти його, коли ми можемо його продати? Найвищому учаснику торгів!"
  flavor_mlo.19.title: "Міст [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_mlo.19.desc: "У вічно процвітаючій [ROOT.GetCountry.GetLongName] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] палко просить швидкого завершення будівництва [ShowBuildingTypeName('bridge_infrastructure')] у [target_location.GetName]. Вони твердо вірять, що його будівництво сприятиме процвітанню, оскільки обіцяє полегшити обмін товарами та людьми, покращуючи торговельні шляхи по всьому регіону.\n\nМіст представляє собою відчутний зв'язок між купцями та [ROOT.GetCountry.GetGovernment.GetRuler.GetName], зміцнюючи відносини та сприяючи взаємній вигоді. З кожним днем їхнє очікування зростає, а вимоги щодо завершення будівництва мосту стають все голоснішими."
  flavor_mlo.19.a: "Дуже добре, ми профінансуємо будівництво."
  flavor_mlo.19.b: "Ми не можемо собі цього дозволити."
  flavor_mlo.20.title: "Арка ді Сан П'єтро Мартіре [target_character.GetNameWithNoTooltip]"
  flavor_mlo.20.desc: "У віці, коли наш народ підкорює нові вершини в мистецтві Відродження, талановитий скульптор [target_character.GetName] звертається до [ROOT.GetCountry.GetGovernment.GetRuler.GetName] зі скромним проханням. Він шукає фінансування, щоб втілити в життя своє візіонерське творіння, Ковчег Святого Петра Мученика.\n\nЗ непохитною пристрастю та переконанням [target_character.GetNameWithNoTooltip] пристрасно описує свій шедевр, уявляючи його як символ релігійної відданості та свідчення культурної величі [ROOT.GetCountry.GetName]. Наші радники, захоплені пристрастю та талантом [target_character.GetNameWithNoTooltip], визнали потенційну значущість проекту та закликають нас схвалити фінансування."
  flavor_mlo.20.a: "Гроші не проблема..."
  flavor_mlo.20.b: "...але й не безкінечні."
  flavor_mlo.21.title: "Статути громадського водопостачання [GetCurrentYear] року"
  flavor_mlo.21.desc: "[target_location.GetName] — місто, збудоване на дивах води. Протягом століть це життєво важливе благо було основною рушійною силою не лише для задоволення першочергових потреб наших громадян та їхньої санітарії, але й ключовим фактором зростання нашої промисловості, від паперових фабрик до суконних майстерень та лісопилок.\n\nТаким чином, було б мудро належним чином забезпечити постійне здоров'я нашого водопостачання, підтримку наших каналів та безперервний потік цього рідкого золота."
  flavor_mlo.21.a: "Ми охоче оплатимо такий рахунок."
  flavor_mlo.21.b: "Нехай стани підтримують водні шляхи."
  flavor_mlo.21.c: "Ми не можемо собі цього дозволити..."
  flavor_mlo.22.title: "Університет [target_location.GetNameWithNoTooltip]"
  flavor_mlo.22.desc: "До [GetCurrentYear] року університет [target_location.GetName] здобув неабияку славу в наших кордонах. Його хвалять за висококваліфікованих викладачів та захопливі лекції з наук, він користується авторитетом та престижем.\n\nЗ чітким баченням просування знань та плекання інтелектуальних прагнень, наші радники та заможні люди заснували інтелектуальні заклади як маяки навчання. Вчені та студенти стікаються до [target_location.GetNameWithNoTooltip], приваблені обіцянкою академічної досконалості та жвавої інтелектуальної спільноти.\n\nЗакладено основи університету, піднімаються будівлі, а лекції лунають у його залах, створюючи процвітаюче академічне середовище. Наша відданість освіті гарантує, що університет стане відомим центром навчання, залишивши тривалу спадщину в анналах інтелектуальної історії."
  flavor_mlo.22.a: "Яка блискуча установа!"
  flavor_mlo.22.b: "Ми подбаємо, щоб їхнє фінансування було більш ніж достатнім!"
  flavor_mlo.22.c: "Це тепер наш головний пріоритет!"
  flavor_mlo.23.title: "Суконна промисловість [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_mlo.23.desc: "У [GetCurrentYear] році суконна промисловість у [ROOT.GetCountry.GetName] процвітає! Вправні ремісники тчуть вишукані тканини, включаючи шовк та тонке сукно, відомі своєю якістю та майстерністю. Північноіталійські міста, такі як [target_location.GetName], слугують центрами текстильного виробництва, приваблюючи купців та покупців звідусіль.\n\nЦя галузь стала відігравати життєво важливу роль в економіці регіону, генеруючи багатство та можливості для працевлаштування. Вишукані текстильні вироби, що виробляються в Північній Італії, користуються великим попитом і закріпили за регіоном репутацію провідного центру суконної промисловості."
  flavor_mlo.23.a: "Давайте й надалі інвестувати в це прибуткове підприємство!"
  flavor_mlo.23.b: "Ми не можемо собі цього дозволити."
  flavor_mlo.24.title: "Собор [target_location.GetNameWithNoTooltip]"
  flavor_mlo.24.desc: "Будівництво [ShowBuildingTypeName('cathedral')] завершено! Вправні майстри та архітектори старанно працювали над створенням величного собору.\n\n$milan_cathedral_desc$"
  flavor_mlo.24.a: "Це декларація переваги нашої культури!"
  flavor_mlo.24.b: "Ми не можемо дозволити собі такі марнотратні витрати."
  flavor_mlo.25.title: "Найсуверенніший Майстер Живопису"
  flavor_mlo.25.desc: "У [GetCurrentYear] році нещодавня смерть видатного художника Джотто відлунює у світі мистецтва. Його спадщина як майстра живопису та архітектури живе, надихаючи майбутні покоління багатьма його роботами, такими як #italic Капела Скровеньї#! та #italic Життя Христа та Діви Марії#!.\n\nМіж нашими дорадчими радами виникає питання щодо того, що робити з його цінними творами мистецтва: продати їх чи зберегти для нащадків. Колекціонери та меценати цінують величезну цінність мистецтва Джотто, що робить його бажаним активом. Зрештою, рішення лежить у руках [target_character.GetName]. Ми б добре зробили, ретельно розглянувши збереження його художньої спадщини."
  flavor_mlo.25.a: "Він хотів би, щоб ми востаннє отримали прибуток від його робіт..."
  flavor_mlo.25.b: "Його твори мають бути збережені!"
  flavor_mlo.26.title: "Прагнення до величі"
  flavor_mlo.26.desc: "Наші нещодавні успіхи у зміцненні влади вдома та за кордоном привели нас до дуже важливого перехрестя в нашому історичному становищі в Італії. Вперше за століття ми маємо можливість реалізувати амбіції Ломбардського королівства та зміцнити північну Італію під нашим контролем.\n\nОднак багато радників при нашому дворі виступають проти таких агресивних маневрів і замість цього пропонують зосередити наші ресурси та час всередині країни, на благо нашого народу. Ми повинні ретельно зважити варіанти та послідовно враховувати потреби та прагнення наших підданих.\n\nПрагнучи підтримувати баланс між зовнішніми прагненнями та внутрішнім добробутом, ми повинні проводити консультації з радниками та видатними членами нашого суспільства, щоб приймати обґрунтовані рішення, які принесуть користь як нашому народу, так і нашій спадщині в цілому."
  flavor_mlo.26.a: "Ломбардія наша!"
  flavor_mlo.26.b: "Давайте краще подбаємо про наш народ."
  flavor_mlo.27.title: "Легітимізація влади"
  flavor_mlo.27.desc: "Видатні дворяни [target_country.GetName] на чолі з великим [target_character.GetName] звернулися до нас з делікатною пропозицією. Вони вимагають визнання їхньої династії законними володарями корони [target_country.GetNameWithNoTooltip].\n\nЯкщо ми візьмемо участь у цій дипломатичній церемонії, ми обов'язково здобудемо престиж і, в свою чергу, легітимізуємо нашу власну внутрішню присутність як володарів імператорської корони. Однак ми також повинні остерігатися зростаючої сили на півострові..."
  flavor_mlo.27.a: "Дуже добре, [target_character.GetNameWithNoTooltip] отримає [target_character.GetHerHis] корону."
  flavor_mlo.27.b: "Їхнє прагнення до влади не отримає нашої печатки!"
  flavor_mlo.28.title: "Імператор відмовляє нам у титулі"
  flavor_mlo.28.desc: "Нас спіткали жахливі новини. Змій [target_character.GetName] відмовився визнати нашу претензію на монархічну правлячу династію [target_country.GetName]! [target_character.GetSheHe|U] навіть зайшов так далеко, що силоміць вивів наших дипломатів, відмовивши їм у перебуванні після їхньої довгої подорожі. Це тяжка образа для нас і нашого імені, і ми цього не забудемо!"
  flavor_mlo.28.a: "Хай буде проклятий імператор, ми самі здобудемо наш титул!"
  flavor_mlo.28.b: "Ми не можемо ризикувати [target_character.GetHerHis] гнівом..."
  flavor_mlo.29.title: "[target_character.GetNameWithNoTooltip] відвідує [target_location.GetNameWithNoTooltip]"
  flavor_mlo.29.desc: "[target_character.GetName], також відомий як #Y Петрарка#!, видатний поет і вчений, широко відомий своїм винятковим внеском в італійську літературу. Його глибокий вплив на розвиток форми сонета та його ліричні вирази любові та природи назавжди змінили літературу.\nУ своїх споглядальних роздумах він часто висловлював своє палке бажання переїхати до славетного двору [target_location.GetName], де, на його думку, його таланти будуть плекатися, а його твори знайдуть більше визнання.\n\nЗ непохитною рішучістю Петрарка прагне зануритися в жваву культурну атмосферу [target_location.GetNameWithNoTooltip], прагнучи можливості співпрацювати з іншими інтелектуалами та розширити свої художні горизонти. Через свої позачасові твори та прагнення [target_character.GetNameWithNoTooltip] втілює незламний дух художнього пошуку та творчої досконалості."
  flavor_mlo.29.a: "Йому дуже раді!"
  flavor_mlo.29.b: "У нас є інші плани на наші монети..."
  flavor_mlo.30.title: "Металургійні центри [target_location.GetNameWithNoTooltip]"
  flavor_mlo.30.desc: "У [GetCurrentYear] металургійна промисловість у Мілані переживає значний розвиток. Кваліфіковані майстри та ремісники застосовують передові технології для видобутку та очищення металів, що призводить до процвітаючого виробництва якісного заліза. Місто стало непередбаченим центром металургійних інновацій, приваблюючи робітників та підприємців, які шукають можливості для зростання.\n\nОскільки попит на металеві вироби зростає, ми повинні вирішити, чи зробити [target_location.GetName] видатним центром металообробки, перемістивши наші основні виробничі центри з зерна на залізо. За словами видатних купців, які проживають у місті, розширення промисловості в [target_location.GetNameWithNoTooltip] у цей період сприятиме економічному процвітанню та сприятиме репутації міста як провідного центру ремесла, броні та зброї."
  flavor_mlo.30.a: "Залізо для наших армій та робітників!"
  flavor_mlo.30.b: "Ми не повинні відмовлятися від нашого дорогоцінного зерна..."
  flavor_mlo.31.title: "[target_province.GetNameWithNoTooltip] вимагає автономії"
  flavor_mlo.31.title.fallback: "Провінція вимагає автономії"
  flavor_mlo.31.desc: "У [GetCurrentYear], у найбурхливіший час, одна з наших провінцій, [target_province.GetName], вимагає від нас надати їй більше автономії на підставі нашого ослабленого стану та внутрішніх чвар. Вони прагнуть свободи від оподаткування та зобов'язань перед нашою короною, стверджуючи власне управління та правову базу. Провінція може переживати різні виклики та конфлікти у своєму прагненні до незалежності, але її народ залишається рішучим захищати свій суверенітет від нашого правління.\n\nЦе беззаперечний доказ того, що видатні особи в нашому домені вичікували, чекаючи нагоди завдати удару, коли ми найбільш вразливі! На жаль, ця образа не буде забута. Ми повинні приборкати ці непокірні елементи та зібрати людей на захист корони!"
  flavor_mlo.31.a: "Ми повинні придушити їхній опір."
  flavor_mlo.31.b: "Краще їх задобрити..."
  flavor_mlo.31.c: "Свобода? А як щодо батога?"
  flavor_mlo.32.title: "Людина сили та рішучості"
  flavor_mlo.32.desc: "[target_character.GetName] нещодавно здобув популярність як вправний командир найманців, відомий своєю тактичною геніальністю та непохитною вірністю. Його ім'я має вагу на полі бою, оскільки він вів свої війська з точністю та безстрашністю. З кожною переможною кампанією репутація [target_character.GetLastNameWithNoTooltip] зростає, привертаючи увагу двору [ROOT.GetCountry.GetName]. Тепер він стоїть перед впливовими особами нашого двору, вражаючи їх своєю харизмою та військовим досвідом, залишаючи незабутнє враження, коли він орієнтується у складному світі політики та влади."
  flavor_mlo.32.a: "Він стане чудовим доповненням до нашого двору."
  flavor_mlo.32.b: "Нам не бракує амбітних вояків..."
  flavor_mlo.33.title: "Реновація Палаццо Дукале"
  flavor_mlo.33.desc: "Протягом [GetCurrentYear] Палаццо Дукале в [target_location.GetName] планується піддати грандіозній реновації, що продемонструє багатство та мистецьку майстерність міста. Спочатку це було укріплення, а не палац, що слугувало укріпленою резиденцією династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], і настав час перетворити його на палац, гідний цієї назви. Вправні майстри ретельно складають плани з відновлення його складних фресок та витончених скульптур, бажаючи вдихнути нове життя в інтер'єр палацу. Було зібрано різних архітекторів для ретельного проектування та впровадження структурних покращень, а згодом для забезпечення стабільності та величі будівлі. Майстри мають прикрасити зали розкішними гобеленами та елегантними меблями, створюючи королівську атмосферу, гідну монархів. Запланований проект реновації має привернути захоплення та подив відвідувачів, зміцнюючи статус Палаццо Дукале як культурної та архітектурної перлини в [target_location.GetNameWithNoTooltip]."
  flavor_mlo.33.a: "Почати негайно!"
  flavor_mlo.33.b: "Ми не можемо собі цього дозволити."
  flavor_mlo.34.title: "Кінна статуя [target_character.GetNameWithNoTooltip]"
  flavor_mlo.34.desc: "[target_character.GetName] звернувся до наших радників із цікавою пропозицією. Він вважає, що міра пишноти та престижу династії вимірюється лише художнім та соціальним відбитком, який вона залишає. Таким чином, щоб допомогти зміцнити нашу присутність, він пропонує спорудити #italic кінну статую#! в [target_location.GetName] на честь нашого правлячого династичного голови. Його бачення грандіозної скульптури захоплює двір, оскільки [target_character.GetNameWithNoTooltip] пристрасно описує свій дизайн та значення, яке він матиме для престижу нашого міста.\n\nНаші найдовіреніші люди при дворі настійно закликають нас прийняти його пропозицію, визнаючи його геній та можливість залишити тривалу спадщину. Проект може незабаром розпочатися, а да Вінчі ретельно працюватиме над кожною деталлю, наповнюючи статую художнім блиском та повагою до правління нашої країни. Жителі [target_location.GetNameWithNoTooltip] з нетерпінням чекають завершення цієї чудової данини, знаючи, що вона назавжди залишиться символом влади та захоплення."
  flavor_mlo.34.a: "Ми профінансуємо це починання."
  flavor_mlo.34.b: "Ми не можемо собі цього дозволити."
  flavor_mlo.35.title: "Відповідь Імператора"
  flavor_mlo.35.desc: "Прибув посланець з королівського двору [target_character.GetName]! За словами вісника, імператор Священної Римської імперії вирішив визнати нашу претензію на Міланську корону. Це визнання зміцнює владу нашої держави та посилює нашу позицію в Імперії.\n\nДекларація Імператора приносить відчуття підтвердження та престижу правлінню нашого правителя, сприяючи відновленню почуття гордості та вірності серед народу [ROOT.GetCountry.GetName]. Завдяки цьому офіційному визнанню ми тепер можемо впевнено керувати та утвердити [target_location.GetName] як видатне місто в межах Священної Римської імперії."
  flavor_mlo.35.a: "Ми напишемо власну історію!"
  flavor_mlo.36.title: "Палаццо Реале ді [target_location.GetNameWithNoTooltip]"
  flavor_mlo.36.desc: "Палац [target_location.GetName] — це чудова споруда, що втілює велич середньовічної архітектури та протягом поколінь була резиденцією уряду нашої столиці. За належного фінансування він стане свідченням могутності та розкоші правлячої еліти. Його високі кам'яні стіни, прикрашені витонченим різьбленням та укріпленими вежами, викликатимуть почуття благоговіння та поваги у всіх, хто до нього наближається. У його священних залах з високих стель звисатимуть розкішні гобелени, а шляхетні особи в королівському вбранні займатимуться придворними справами. Палацові сади, зелений рай, пропонуватимуть відпочинок від гамірної міста, слугуючи притулком для роздумів та дозвілля. Споруда, справді гідна назви Палаццо Реале."
  flavor_mlo.36.a: "Чудова демонстрація нашого дому!"
  flavor_mlo.36.b: "Ми не можемо собі цього дозволити"
  flavor_mlo.37.title: "Пропозиція шлюбу для [target_character.GetLastNameWithNoTooltip]"
  flavor_mlo.37.desc: "[target_character.GetName] — амбітна особистість, а [target_character.GetHerHis] військові досягнення є видатними. Мати когось подібного до [target_character.GetHerHim] у нашій країні — це палиця з двома кінцями, бо так само швидко [target_character.GetSheHe] може допомогти нам досягти більших висот, як і [target_character.GetSheHe] може вирішити, що [target_character.GetSheHe] хоче всю країну для [target_character.GetHerselfHimself].\n\nМожливо, було б найкраще, якби ми поки що тримали [target_character.GetHerHim] задоволеним. Ми могли б запропонувати [target_character.GetHerHim] одружитися з [target_spouse.GetDaughterSon] [ROOT.GetCountry.GetGovernment.GetRuler.GetName], [target_spouse.GetName], щоб тримати [target_character.GetHerHim] задоволеним і контрольованим одночасно."
  flavor_mlo.37.a: "[target_character.GetNameWithNoTooltip] та [target_spouse.GetNameWithNoTooltip] одружаться."
  flavor_mlo.37.b: "Ми не хочемо, щоб [target_character.GetHerHim] був близько до нас."
  flavor_mlo.37.tt: "[target_character.GetNameWithNoTooltip] очікуватиме отримати [ROOT.GetCountry.GetName] у майбутньому"
  flavor_mlo.40.title: "Інтеграція [target_location.GetNameWithNoTooltip] та [target_location2.GetNameWithNoTooltip]"
  flavor_mlo.40.desc: "Посилення влади [target_character.GetDynasty.GetName] відчувається як тремтіння по всій північній [ShowRegionName('italy_region')] і особливо в [ShowAreaName('lombardy_area')]. Гегемонія династії, безумовно, незаперечна, і багато дисидентів нарешті починають схиляти коліна перед нами. Ми могли б використати цю тенденцію, щоб включити дві скромні комуни в [target_location.GetName] та [target_location2.GetName]."
  flavor_mlo.40.historical_info: "У 1347-1348 роках експансіоністська Синьйорія Мілана вторглася та інтегрувала два сусідні міста Алессандрію та Тортону разом з їхніми володіннями. Кампанії очолював кондотьєр Лукіно Вісконті, один із тодішніх володарів Мілана."
  flavor_mlo.40.a: "Зробити хід."
  flavor_mlo.40.b: "Залишити їх у спокої."
  flavor_mlo.41.title: "#italic Навільяччо#!"
  flavor_mlo.41.desc: "З'явилася абсолютно нова пропозиція з'єднати два найзначніші міста [ShowAreaName('lombardy_area')], великі поселення [target_location.GetName] та [target_location2.GetName]. Згідно з пропозицією, між двома містами буде побудовано штучний канал з дорогою, що пролягатиме поруч. Таке покращення може бути дуже корисним для згуртованості всієї провінції."
  flavor_mlo.41.historical_info: "#italic Навільяччо#! — це канал, побудований між Міланом і Павією з метою тіснішого з'єднання двох міст, а також для зрошення #italic Парку Вісконті#! на північ від Павії."
  flavor_mlo.41.a: "Продовжити виконання плану."
  flavor_mlo.41.b: "Коштів на такий процес немає."
  STATIC_MODIFIER_NAME_mlo_naviglaccio: "Канальне сполучення"
  flavor_mlo.42.title: "Придбання землі для Парку Вісконті"
  flavor_mlo.42.desc: "Наш маєток у [target_location.GetName] стабільно зростає. Архітектори виконують чудову роботу, і, схоже, палац буде цінуватися протягом багатьох років. Однак [target_ruler.GetName] вважає його недостатнім і вирішив, що жодна добра [ROOT.GetCountry.GetGovernment.GetAdjective] резиденція не є повною без мисливських угідь. Для цього [target_ruler.GetSheHe] має намір придбати землю з метою створення парку. Проте, запланована земля належить міським жителям."
  flavor_mlo.42.historical_info: "Парк Вісконті був ділянкою землі, придбаною лордом Мілана Вісконті для підвищення пишноти їхнього маєтку в Павії. Щоб придбати землю для мисливських угідь, Галеаццо II Вісконті довелося захопити території у місцевих міських жителів, що викликало широкі заворушення. Одним із громадян, чиї землі були конфісковані, був Бертоліно де' Сісті, чия втрата доходу призвела до спроби замаху на життя Галеаццо."
  flavor_mlo.42.a: "Примусити їх віддати землю."
  flavor_mlo.42.b: "Купити її, незважаючи на ціну."
  flavor_mlo.42.c: "Нам не потрібні марнославства!"
  STATIC_MODIFIER_NAME_mlo_royal_park: "Королівський парк"
  flavor_mlo.43.title: "Спроба замаху"
  flavor_mlo.43.desc: "Рішення конфіскувати землю у міських жителів обурило населення [target_location.GetName]. Під час одного з парадів у місті незадоволений громадянин здійснив спробу замаху на життя [target_ruler.GetName]. Нам потрібно негайно реагувати."
  flavor_mlo.43.historical_info: "$flavor_mlo.42.historical_info$"
  flavor_mlo.43.a: "Наказати охоронцям вступити в бій."
  flavor_mlo.43.b: "Бути обережними."
  flavor_mlo.44.title: "[mlo_dal_verme_scope.GetNameWithNoTooltip]"
  flavor_mlo.44.desc: "До нас дійшли чутки про виняткового кондотьєра на службі у наших суперників. [mlo_dal_verme_scope.GetHerHis|U] ім'я [mlo_dal_verme_scope.GetName], і [mlo_dal_verme_scope.GetSheHe] міг би стати великим активом для нашої армії. Більше того, наші вороги були б набагато слабшими, якби ми «переманили» [mlo_dal_verme_scope.GetHerHim] з їхніх рук."
  flavor_mlo.44.historical_info: "Якопо даль Верме був італійським кондотьєром з веронської шляхетної родини даль Верме. Як і більшість кондотьєрів, його наймали багато різних сторін, але він відзначився своєю роботою для міланських лордів Галеаццо II та Джан Галеаццо, останній призначив його генерал-капітаном."
  flavor_mlo.44.a: "Нам потрібен [mlo_dal_verme_scope.GetHimHer] у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_mlo.44.b: "Нічого виняткового, чесно кажучи."
  flavor_mlo.45.title: "[mlo_bernardino_corio_scope.GetNameWithNoTooltip]"
  flavor_mlo.45.desc: "Винятковий письменник, [mlo_bernardino_corio_scope.GetName], бажає приєднатися до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] як головний літописець. Якщо вірити амбіціям [mlo_bernardino_corio_scope.GetHerHis], [mlo_bernardino_corio_scope.GetSheHe] прагне створити повну працю, яка міститиме історію нашого великого міста від його заснування до сьогодення."
  flavor_mlo.45.a: "Нехай [mlo_bernardino_corio_scope .GetHimHer] приєднається до нас."
  flavor_mlo.45.b: "У нас немає коштів."
  flavor_mlo.46.title: "#italic $mlo_historia_patria$#!"
  flavor_mlo.46.desc: "Інвестування величезних сум золота в [target_character.GetName] нарешті окупилося. Хоча обіцянки [target_character.GetHerHis] спочатку могли здатися амбітними, схоже, довіра, яку ми висловили [target_character.GetHerHim], насправді принесла нам великі переваги. Сьогодні праця [target_character.GetHerHis] нарешті завершена і постійно оновлюється новими анналами, які [target_character.GetSheHe] переживає."
  flavor_mlo.46.a: "Продовжувати фінансувати цю хроніку!"
  flavor_mlo.46.b: "Ми б краще побудували новий палац."
  flavor_mlo.47.title: "[target_location.GetNameWithNoTooltip] у біді"
  flavor_mlo.47.desc: "[target_location.GetRank.GetName] [target_location.GetName] у небезпеці. Оточені могутніми ворогами, вони були покинуті своїми сюзеренами, які мають намір продати їх нам або іншому покупцеві. Безсилі та незахищені, їхній [target_location.GetRank.GetName] готовий до захоплення. Давайте візьмемо його під свій контроль."
  flavor_mlo.47.a: "Скористатися цією можливістю."
  flavor_mlo.47.b: "Зосередитися на внутрішніх справах."
  STATIC_MODIFIER_NAME_MLO_recent_diplomatic_play: "Недавня дипломатична гра"
  flavor_mlo.48.title: "Ліга проти [target_dynasty.GetNameWithNoTooltip]"
  flavor_mlo.48.desc: "Зарозумілі кроки династії [target_dynasty.GetName] на шахівниці [ShowRegionName('italy_region')] відштовхнули всіх інших гравців, спонукаючи опонентів до інтриг. Їхні нещодавні дії лише погіршили ситуацію, призвівши до формування коаліції проти них за участю багатьох видатних династій і держав на півночі регіону. [ROOT.GetCountry.GetLongName] є лише однією з держав, що прагнуть перемогти цього зростаючого гегемона. Разом з кількома іншими великими гравцями ми намагалися стримати експансію династії, але поки що без особливих результатів. Хоча бойові дії наразі могли припинитися, ми не можемо відмовитися від продовження боротьби."
  flavor_mlo.48.historical_info: "Експансія Делла Скала на початку XIV століття спонукала до формування коаліції проти них. Конфлікт проти цієї ліги «Антискалігері» був спровокований діями Верони проти Венеційської республіки в 1336 році. Незабаром після її формування приєдналися багато інших могутніх північноіталійських династій, і після 3 років конфлікту володіння родини Делла Скала були зменшені до міст Верона та Віченца."
  flavor_mlo.48.a: "Справді, ми повинні їх стримати."
  should_at_least_2_accept_we_will_declare_war_within_a_year_tt: "Якщо принаймні #Y 2#! з наступних [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] погодяться приєднатися до фронту проти [target_dynasty.GetName], війна спалахне #R протягом року#!"
  flavor_mlo.49.title: "$flavor_mlo.48.title$"
  flavor_mlo.49.desc: "$flavor_mlo.48.desc$"
  flavor_mlo.49.a: "Ми їх стримаємо!"
  flavor_mlo.49.b: "Ми не можемо дозволити собі могутніх ворогів."
  flavor_mlo.49.historical_info: "$flavor_mlo.48.historical_info$"
  should_we_accept_we_will_automatically_join_the_upcoming_war_within_next_year_tt: "Якщо ми погодимося, ми приєднаємося до майбутньої війни протягом #R наступного року#!"
  flavor_mlo.50.title: "$flavor_mlo.48.title$"
  flavor_mlo.50.desc: "Наші величезні володіння на півночі [ShowRegionName('italy_region')] призвели до створення коаліції проти нас. Дурні! Досі їхні обмежені кампанії принесли їм мало результатів. Сподіваємося, вони засвоїли урок і не повернуться. Однак, якщо вони повернуться, ми не пошкодуємо жодних витрат, щоб показати їм міць [target_dynasty.GetName]."
  flavor_mlo.50.historical_info: "$flavor_mlo.48.historical_info$"
  flavor_mlo.50.a: "Нехай приходять!"
  flavor_mlo.51.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] Палац"
  flavor_mlo.51.desc: "Наш поворот до більш центральної столиці та формування єдиної держави в [ShowAreaName('lombardy_area')] розривають наші тісні зв'язки з [milan_location.GetName]. З нашим фокусом на [target_location.GetRank.GetName] [target_location.GetName], безсумнівно, нам потрібна велична резиденція, щоб відповідати цьому. Таким чином, члени нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували заснувати новий палац, щоб ознаменувати початок нової ери."
  flavor_mlo.51.historical_info: "Після завоювання Павії в 1359 році, Вісконті вирішили заснувати там палац. Місце було обрано через його центральне розташування та роль столиці Ломбардського королівства - резиденція мала стати символом міланської гегемонії та духовної спадкоємності Королівства."
  flavor_mlo.51.a: "Фінансувати цей розвиток."
  flavor_mlo.51.b: "Це лише марнославство."
  flavor_mlo.52.title: "[target_character.GetDynasty.GetNameWithNoTooltip] Бібліотека"
  flavor_mlo.52.desc: "Щоб зміцнити престиж [target_location.GetName] та славетної династії [target_character.GetDynasty.GetName], що править ним, була висунута пропозиція зібрати найкращі твори [ROOT.GetCountry.GetName] у бібліотеці, створеній у збудованому #italic палаццо#!. План вже затверджено; однак, нам ще належить вирішити, на чому ми маємо зосередитися."
  flavor_mlo.52.a: "Зосередитися на зберіганні знань."
  flavor_mlo.52.b: "Зберегти наші славетні дні."
  STATIC_MODIFIER_NAME_MLO_library_arts: "Бібліотека мистецтв"
  STATIC_MODIFIER_NAME_MLO_library_research: "Бібліотека наук"
  MLO_can_be_seized_and_must_be_protected: "Бібліотека може бути захоплена будь-якою нацією, що окупує місце розташування [target_location.GetName], видаляючи модифікатори."
  flavor_mlo.53.title: "Бібліотека [target_location.GetNameWithNoTooltip]"
  flavor_mlo.53.desc: "Увійшовши до міста [target_location.GetName] та взявши під контроль провінцію, відомий місцевий палац та його скарбниця, якою є його бібліотека, також потрапили до наших рук. Хоча ми могли б пощадити бібліотеку, ми не бачимо вагомих причин не робити цього, окрім як намагатися запобігти подальшому напруженню наших відносин з її власниками."
  flavor_mlo.53.a: "Пограбувати її!"
  flavor_mlo.53.b: "Натомість зосередитися на пограбуванні міста."
  flavor_mlo.54.title: "Наша бібліотека зруйнована!"
  flavor_mlo.54.desc: "Ті негідники з [library_ruiner.GetName] порушили святість нашої скарбниці. Хоча такі дії очікувані від ворожої армії, ми не шукатимемо жодних виправдань, щоб виправдати їхню образу наукових традицій."
  flavor_mlo.54.a: "Вони заплатять за це!"
  flavor_mlo.55.title: "Кінець [target_dynasty.GetNameWithNoTooltip]"
  flavor_mlo.55.desc: "Тиски стиснулися, і наші побратими по зброї від [target_country_1.GetName] до [target_country_2.GetLongName] готові негайно завдати удару. [target_location.GetName] спливе кров'ю [target_character2.GetName]!"
  flavor_mlo.55.a: "$delhi_situation.12.a$"
  those_who_pledged_will_join_tt: "Ті, хто обіцяв приєднатися до наших військових зусиль, приєднаються до нас проти [target_enemy_country.GetName]"
  mlo_lodrisio_visconti_appeased_tt: "[target_character.GetName] буде задоволений за рахунок інших членів нашої правлячої родини"
  mlo_lodrisio_visconti_scorned_tt: "[target_character.GetName] втече з нашого двору"
  mlo_visconti_struggle: "Доки ми залишаємося роздробленими під Привілеєм знаті міст-держав Вісконті, наша легітимність і контроль над нашими територіями страждатимуть"
  mlo_waterways_estates_pay_tt: "Представники [GetCountry('MLO').GetGovernment.GetEstateName('burghers_estate')], [GetCountry('MLO').GetGovernment.GetEstateName('clergy_estate')] та [GetCountry('MLO').GetGovernment.GetEstateName('nobles_estate')] сплачуватимуть за утримання, страждаючи #R -20%#! [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  mlo_access_restore_kingdom_lombardy_cabinet_action_tt: "Ми отримаємо доступ до унікальної [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] дії [ShowCabinetActionName('mlo_restore_kingdom_lombardy')] на #Y 30#! років.\n\nЦя дія може інтегрувати території в [ShowAreaName('lombardy_area')], [ShowAreaName('emilia_area')], [ShowAreaName('piemonte_area')], [ShowAreaName('liguria_area')], [ShowAreaName('veneto_area')] та [ShowAreaName('tuscany_area')] [Concept('areas', 'CONCEPT_PLACEHOLDER')|e] значно швидше."
  mlo_every_location_italy_5_control_tt: "Наші локації в італійському [Concept('region', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('control_weak_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
