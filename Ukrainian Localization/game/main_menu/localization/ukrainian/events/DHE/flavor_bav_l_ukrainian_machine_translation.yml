l_english:
  flavor_bav.1.title: "Нарешті курфюрст!"
  flavor_bav.1.desc: "Зусилля та вірність нашого [target_ruler.GetName] нарешті були винагороджені [hre_emperor.GetName], який визнав нашу важливість і надав нам ранг курфюрста. Ми повинні відсвяткувати цей поворотний момент в історії [ROOT.GetCountry.GetName] і організувати великий бал."
  flavor_bav.1.a: "Не шкодувати коштів."
  flavor_bav.1.b: "Не час для святкувань."
  flavor_bav.2.title: "Новий закон для нової країни"
  flavor_bav.2.desc: "[ROOT.GetCountry.GetLongName] нарешті возз'єднана після багатьох років роз'єднання. Радість, принесена єдністю громадянам нової країни, створила можливість для [ruler_scope.GetName] скористатися моментом і змінити її найбільш усталені традиції. Настав час проголосити зміну в нашому законі про престолонаслідування та забезпечити, щоб земля [ROOT.GetCountry.GetNameWithNoTooltip] ніколи більше не була розділена."
  flavor_bav.2.a: "Старі привілеї мають бути скасовані."
  flavor_bav.2.b: "Покласти край традиції."
  flavor_bav.2.c: "Ми повинні поважати традиції."
  flavor_bav.3.title: "[GetCountry('LBV').GetLongNameWithNoTooltip]"
  flavor_bav.3.desc: "Герцог Нижньої Баварії [target_cousin.GetName] помер! Хоча він страждав від прокази, і його смерть не є несподіванкою, наша родина все ще в жалобі і має обговорити, що станеться з [GetCountry('LBV').GetName] після його смерті.\n\n[target_ruler.GetName] попросили виступити в ролі провідної фігури для молодого спадкоємця, і ми могли б використати це для роботи над возз'єднанням Баварії, довгоочікуваною метою для [target_ruler.GetNameWithNoTooltip]."
  flavor_bav.3.a: "Тісно приєднати її до себе."
  flavor_bav.3.b: "Анексувати її безпосередньо!"
  flavor_bav.3.c: "Не будемо втручатися в їхні справи."
  flavor_bav.4.title: "Наші суперники в [GetCountry('BOH').GetNameWithNoTooltip]"
  flavor_bav.4.desc: "Останні десятиліття були доміновані конфліктом між домами [target_ruler.GetName] та [target_rival.GetName], причому дім [target_ruler.GetDynasty.GetName] заперечував вплив [GetCountry('BOH').GetName] на півночі [GetUniqueInternationalOrganization('hre').GetName], призначаючи свою власну родину [GetCountry('BRA').GetGovernment.GetRulerTitle] [GetCountry('BRA').GetName]. Наші нещодавні відносини були досить стабільними, але новий конфлікт може виникнути в будь-який момент. Можливо, настав час поховати образи минулого та примирити наші відносини з [GetCountry('BOH').GetNameWithNoTooltip]."
  flavor_bav.4.a: "Спробувати примирити наші відносини."
  flavor_bav.4.b: "Вони наші вороги не без причини!"
  flavor_bav.5.title: "Південна загроза"
  flavor_bav.5.desc: "[target_rival.GetDynasty.GetName] не приховують своїх амбіцій претендувати на імператорську корону [GetUniqueInternationalOrganization('hre').GetName]. У часи нашого власного сходження на престол наша династія жорстоко зіткнулася з їхніми арміями і здобула перемогу лише після їхньої поразки в битві при [ShowLocationName('muhldorf')]. З періодом спокою останніх років, можливо, настав час подолати минулі конфлікти та примирити наші відносини."
  flavor_bav.5.a: "Ми полегшимо наші відносини з ними."
  flavor_bav.5.b: "Династія [target_rival.GetDynasty.GetNameWithNoTooltip] має бути стримана!"
  flavor_bav.6.title: "Сходження [hre_ruler.GetDynasty.GetNameWithNoTooltip]"
  flavor_bav.6.desc: "Хоча ми були беззаперечним лідером [GetUniqueInternationalOrganization('hre').GetName] у минулому, новий дім піднявся до домінуючої позиції в [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]. [hre_ruler.GetDynasty.GetName] взяв під контроль імператорську корону і не виявляє наміру відмовлятися від неї найближчим часом.\n\nМи повинні розглянути нашу позицію щодо їхнього правління та чи хочемо ми підтримувати їхній термін чи ні."
  flavor_bav.6.a: "Вони гідні нашої підтримки!"
  bav_reconcile_habsburg: "Примирення між нашими династіями"
  flavor_bav.6.b: "Опонують [hre_ruler.GetDynasty.GetNameWithNoTooltip] за кожної нагоди!"
  bav_against_habsburg: "Династичні конфлікти"
  flavor_bav.7.title: "Вісім питань про владу Папи"
  flavor_bav.7.desc: "Відомий францисканський чернець [william_ockham_scope.GetName], відлучений від церкви [GetCountry('PAP').GetGovernment.GetRulerTitle] і під захистом [hre_emperor.GetName], написав ще один трактат з політичної філософії, ставлячи під сумнів авторитет [GetCountry('PAP').GetGovernment.GetRulerTitle]: #italic Вісім питань про владу Папи#!.\n\nПоширення цих ідей може викликати незгоду та повстання проти релігійної влади."
  flavor_bav.7.a: "Поширити ідеї [william_ockham_scope.GetNameWithNoTooltip]."
  flavor_bav.7.b: "Ми не можемо цього дозволити."
  flavor_bav.8.title: "Нова мапа для [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_bav.8.desc: "Нам повідомили, що син відомого астронома, математика та картографа Петера Апіана, [philipp_apian_scope.GetName], повернувся зі своїх студій у [ShowLocationName('paris')] і зараз викладає в [ShowLocationName('tubingen')].\n\nМи можемо найняти його, щоб він намалював нову, більш детальну мапу наших володінь, але його відмова засудити [ShowReligionName('calvinist')] ймовірно розгніває частину нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_bav.8.a: "Найняти цю людину."
  flavor_bav.8.b: "Ми не найматимемо [ShowReligionAdjectiveWithNoTooltip('calvinist')]."
  flavor_bav.8.historical_info: "Філіп Апіан отримав наказ створити детальну мапу Баварського герцогства в 1554 році, завдання, яке він виконав протягом наступних семи років. Після створення оригінальної мапи, менші копії, названі #italic Bairische Landtafeln#!, були створені та продані Апіаном особисто в Інгольштадті. Його робота була перевершена лише в 19 столітті і використовувалася на шкоду Баварії під час Наполеонівських війн, коли її використовувала французька армія для вторгнення в Баварію."
  flavor_bav.9.title: "Стара Марієнкірхе"
  flavor_bav.9.desc: "Стара Марієнкірхе на північно-західній стороні міста, збудована біля старих міських стін, століттями служила улюбленою парафіяльною церквою для мешканців міста та місцем поховання мюнхенських [ShowDynastyName('wittelsbach_dynasty')].\n\nПроте, $BAV_ADJ$ архітектор на ім'я [george_halsbach_scope.GetName] запропонував грандіозний план нової катедри з червоної цегли, увінчаної двома масивними вежами, які будуть видні з будь-якої точки міста."
  flavor_bav.9.a: "Збудувати це диво."
  flavor_bav.9.b: "Ні, ми не замінюватимемо улюблений пам'ятник."
  flavor_bav.10.title: "Притулок єресі"
  flavor_bav.10.desc: "Злісні чутки почали поширюватися по багатьох дворах [ShowReligionAdjective('catholic')] королів. Чутки стверджують, що двір [hre_emperor.GetName] є притулком для єретиків та невіруючих, де закони Божі висміюються, а вчення Церкви ігноруються.\n\nМи повинні покласти край цим злим пліткам і відновити наш престиж, ми могли б вигнати відлученого від церкви ченця [william_ockham_scope.GetName] та [michael_cesena_scope.GetName], такий жест ревності, безсумнівно, заспокоїть чутки."
  flavor_bav.10.a: "Ні, ці люди під моїм захистом."
  flavor_bav.10.b: "Вигнати їх, показати всім нашу побожність."
  flavor_bav.10.historical_info: "Правління імператора Священної Римської імперії Людвіга IV «Баварця» було відзначене його конфліктом з Авіньйонським папством. Після його відлучення від церкви Папою Іоанном XXII у 1324 році та подальшого церковного збурення, його двір у Мюнхені, Альтер Гоф, став відомим як притулок для тих теологів, які критикували Католицьку Церкву та Папу і вважалися єретиками, таких як Вільям Оккамський або Михайло Чесенський."
  flavor_bav.11.title: "[target_artist.GetNameWithNoTooltip] та історія [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_bav.11.desc: "[target_artist.GetName] здобув собі ім'я як наставник при дворі [target_ruler.GetName] і написав [ShowLanguageName('latin_language')] граматику та інші посібники в цей час. В якості послуги за його працю, він тепер попросив [target_ruler.GetShortNameWithNoTooltip] спонсорувати його зусилля написати історію [ROOT.GetCountry.GetName], щоб задокументувати досягнення наших славетних попередників."
  flavor_bav.11.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_bav.11.b: "Це марна трата грошей!"
  flavor_bav.20.title: "[ShowPolicyNameWithNoTooltip('bav_codex_bavarica')]"
  flavor_bav.20.desc: "Натхненний правовими традиціями сусідніх регіонів, [target_ruler.GetName] запропонував створити єдиний кодекс законів, що перегукується з попередніми зусиллями [previous_ruler.GetName] щодо зміцнення [target_country.GetGovernment.GetAdjective] влади. Ця кодифікація [target_country.GetAdjective] законів у [ShowPolicyName('bav_codex_bavarica')] покращить управління [target_country.GetAdjective] [target_country.GetFlavorRank]. Чи варто нам розпочати монументальне завдання [ShowSocietyDirectionName('centralization')]?"
  flavor_bav.20.a: "Давайте створимо [ShowPolicyNameWithNoTooltip('bav_codex_bavarica')]!"
  flavor_bav.20.b: "Час для таких реформ ще не настав."
  flavor_bav.23.title: "Народження [target_country.GetAdjectiveWithNoTooltip] Академії наук"
  flavor_bav.23.desc: "З розквітом культурної сцени $enlightenment$ у [ShowContinentName('europe')], мислителі в [target_city.GetName] звернулися до [target_ruler.GetName] з проханням заснувати [ShowBuildingTypeName('academy_of_sciences')], подібну до інших академічних установ по всій [ShowContinentName('europe')]. Така установа могла б підвищити [target_country.GetAdjective] престиж, але за великі кошти. Чи варто нам інвестувати в майбутнє знань?"
  flavor_bav.23.a: "Підтримати академію – наука поведе [target_country.GetNameWithNoTooltip] вперед."
  flavor_bav.23.b: "Натомість інвестувати у військові досягнення."
  flavor_bav.24.title: "Вбивство в абатстві"
  flavor_bav.24.desc: "[ShowBuildingTypeName('scriptorium')] у невеликому селі поблизу [ShowLocationName('garmisch')] добре відомий своїми чудовими ілюстраторами та художниками. Нещодавно скандальна подія сколихнула абатство, коли незначний лорд був убитий на території цієї поважної установи. На щастя, [target_artist.GetName], який проживав у селі для [target_artist.GetHerHis] шедевру, зміг допомогти в розслідуванні. Такий талановитий художник, у поєднанні з гострим розумом детектива, безсумнівно, став би чудовим доповненням до нашої країни."
  flavor_bav.24.a: "Надіслати за [target_artist.GetNameWithNoTooltip] зараз!"
  flavor_bav.24.b: "[target_artist.GetSheHe|U] безсумнівно заробить статок самостійно."
  flavor_bav.25.title: "Райнхайтсгебот [GetCurrentYear] року"
  flavor_bav.25.desc: "У [GetCurrentYear] році [target_ruler.GetName] з [target_country.GetName] видав Райнхайтсгебот, новий закон, що регулює пивоваріння [ShowGoodsName('beer')] по всій [target_country.GetFlavorRank]. Обмежуючи інгредієнти ячменем, хмелем та водою, [target_country.GetGovernment.GetRulerTitle] прагне забезпечити якість [target_country.GetAdjectiveWithNoTooltip] пива та захистити своїх підданих від шкідливих добавок. Цей закон не тільки гарантує кращий смак [ShowGoodsNameWithNoTooltip('beer')], але й стабілізує ціни та зміцнює репутацію [target_country.GetAdjectiveWithNoTooltip] напоїв по всій [GetInternationalOrganization('hre').GetName]."
  flavor_bav.25.a: "[target_country.GetAdjectiveWithNoTooltip] [ShowGoodsNameWithNoTooltip('beer')] буде найкращим!"
  flavor_bav.25.b: "Такі обмеження можуть зашкодити творчості пивоварів."
  flavor_bav.1302.title: "[target_country.GetAdjectiveWithNoTooltip] Розділ [GetCurrentYear] року"
  flavor_bav.1302.desc: "Внутрішні чвари в родині [target_ruler.GetDynasty] знову призвели до поділу [target_country.GetAdjectiveWithNoTooltip] [target_country.GetFlavorRank] на кілька незалежних утворень. [rival_brother.GetName] погрожує відкритим повстанням, якщо [GetCountry('LBV').GetName] не отримає повної автономії. Отримана фрагментація загрожує єдності [target_country.GetFlavorRank] і відкриває двері для потенційного зовнішнього втручання. Чи варто нам підтримати поділ, щоб заспокоїти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], чи прагнути зберегти $BAV$ об'єднаним?"
  flavor_bav.1302.a: "Дозволити поділ $BAV$."
  flavor_bav.1302.b: "Боротися проти поділу $BAV$."
  flavor_bav.1302.c: "Спробувати зберегти єдність через поступки."
  flavor_bav.1302.historical_info: "Фрагментація баварських територій була повторюваною темою протягом пізнього середньовіччя та раннього нового часу. Династичні суперечки, особливо серед родини Віттельсбахів, часто призводили до поділу герцогства на менші, конкуруючі володіння. Ці поділи послаблювали центральну владу та піддавали Баварію іноземному впливу та внутрішнім чварам. XIV та XV століття бачили численні такі поділи, включаючи сумнозвісний поділ 1392 року, який призвів до виникнення окремих герцогств Баварія-Мюнхен, Баварія-Інгольштадт та Баварія-Ландсгут. Зусилля щодо збереження єдності часто підривалися інтересами знаті та традиціями успадкування, які віддавали перевагу поділу між спадкоємцями над первородством."
  flavor_bav.27.title: "Заснування Університету [target_location.GetNameWithNoTooltip]"
  flavor_bav.27.desc: "У [GetCurrentYear] році [target_ruler.GetName] просять профінансувати заснування [ShowBuildingTypeName('university')] [target_location.GetName], що принесе престиж та знання регіону. [ShowBuildingTypeNameWithNoTooltip('university')] обіцяє сприяти інноваціям та інтелектуальному зростанню, але його підтримка вимагатиме відволікання ресурсів від військових амбіцій."
  flavor_bav.27.a: "Профінансувати [target_location.GetNameWithNoTooltip] [ShowBuildingTypeNameWithNoTooltip('university')]!"
  flavor_bav.27.b: "Ми не можемо дозволити собі фінансування."
  flavor_bav.27.historical_info: "Інгольштадтський університет був заснований у 1472 році герцогом Людвігом IX Баварсько-Ландсгутським, що робить його одним із найдавніших університетів Священної Римської імперії. Створений за зразком Віденського університету, він став видатним центром католицької вченості та гуманістичної науки. Ця установа відіграла ключову роль в інтелектуальних течіях того часу, приймаючи діячів Німецького Відродження, а пізніше ставши оплотом Контрреформації. Її заснування ознаменувало значні інвестиції в освіту та культуру Баварії, яким часто надавали пріоритет навіть над військовими чи територіальними амбіціями."
  flavor_bav.28.title: "Піднесення до [ShowSpecialStatusNameWithNoTooltip('elector')]?"
  flavor_bav.28.desc: "[home_ruler.GetName] відправив посланців до [emperor_ruler.GetName], просячи піднесення до титулу [ShowSpecialStatusName('elector')]. Цей запит ґрунтується на вірній підтримці [bavaria_country.GetNameWithNoTooltip] під час триваючої [ShowSituationName('war_of_religions')]. Таке визнання значно збільшило б [bavaria_country.GetAdjectiveWithNoTooltip] вплив у [GetInternationalOrganization('hre').GetName]."
  flavor_bav.28.a: "Запросити піднесення [bavaria_country.GetNameWithNoTooltip]."
  flavor_bav.28.b: "Зосередитися на зміцненні нашої внутрішньої сили."
  flavor_bav.28.historical_info: "Протягом бурхливого періоду Тридцятилітньої війни Баварія, під проводом герцога Максиміліана I, відіграла ключову роль у підтримці католицької справи. На знак визнання цієї вірності та військової допомоги імператор Фердинанд II скликав Рейхстаг у Регенсбурзі в 1623 році, де він передав курфюрстську гідність від протестантського курфюрста Пфальцського, Фрідріха V, який був підданий імперській опалі за його роль у Богемському повстанні, герцогу Максиміліану I Баварському. Це піднесення не тільки посилило політичний вплив Баварії у Священній Римській імперії, але й зміцнило її статус як центральної сили в Католицькій лізі. Передача курфюрства стала значним зрушенням в імперській динаміці влади, відзначивши вершину імперської влади під час війни."
  flavor_bav.29.title: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] розглядає запит [bavaria_country.GetNameWithNoTooltip]"
  flavor_bav.29.desc: "Посланці [bavaria_country.GetName] представили свою справу [emperor_ruler.GetName], посилаючись на свою непохитну вірність під час [ShowSituationName('war_of_religions')]. Це рішення має велике значення, оскільки піднесення [bavaria_country.GetNameWithNoTooltip] означало б усунення існуючого [ShowSpecialStatusName('elector')] з [elector_at_war.GetName]."
  flavor_bav.29.a: "Надати [bavaria_country.GetNameWithNoTooltip] титул [ShowSpecialStatusNameWithNoTooltip('elector')]."
  flavor_bav.29.b: "Відхилити їхній запит і зберегти статус-кво."
  flavor_bav.29.historical_info: "У розпал Тридцятилітньої війни імператор Фердинанд II зіткнувся зі складним завданням винагородити вірних союзників, зберігаючи при цьому делікатний баланс сил у Священній Римській імперії. Герцог Максиміліан I Баварський відіграв ключову роль у підтримці католицької справи, зокрема завдяки своєму лідерству в Католицькій лізі та військовим внескам, таким як вирішальна перемога в битві на Білій Горі в 1620 році. На знак визнання цієї непохитної вірності та для зміцнення католицької позиції в Імперії Фердинанд II скликав Рейхстаг у Регенсбурзі в 1623 році. Там він офіційно передав курфюрстську гідність від протестантського курфюрста Пфальцського, Фрідріха V — який був підданий імперській опалі за його роль у Богемському повстанні — Максиміліану I. Це стратегічне рішення не тільки винагородило стійкого союзника, але й переформатувало курфюрстський ландшафт на користь католицької фракції, зміцнивши імперську владу в бурхливий період."
  flavor_bav.30.title: "[bavaria_country.GetNameWithNoTooltip] піднесено до [ShowSpecialStatusNameWithNoTooltip('elector')]"
  flavor_bav.30.desc: "[emperor_ruler.GetName] вирішив надати [home_ruler.GetName] та [bavaria_country.GetName] престижний титул [ShowSpecialStatusName('elector')]. Це знаменує ключовий момент для [bavaria_country.GetNameWithNoTooltip], оскільки вона підноситься до позиції значного впливу в [GetInternationalOrganization('hre').GetName]."
  flavor_bav.30.a: "Для [bavaria_country.GetName] починається нова ера!"
  flavor_bav.31.title: "Запит відхилено [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  flavor_bav.31.desc: "[emperor_ruler.GetName] вирішив відхилити піднесення [bavaria_country.GetName] до статусу [ShowSpecialStatusName('elector')]. Незважаючи на вірну підтримку [bavaria_country.GetNameWithNoTooltip] під час [ShowSituationName('war_of_religions')], баланс сил у [GetInternationalOrganization('hre').GetName] залишиться незмінним."
  flavor_bav.31.a: "Ми зміцнимося незалежно від цього рішення."
  flavor_bav.32.title: "Ми втрачаємо наш статус $elector$!"
  flavor_bav.32.desc: "Рішення [emperor_ruler.GetName] позбавило нас титулу [ShowSpecialStatusName('elector')]. Колегія курфюрстів [GetInternationalOrganization('hre').GetName] тепер вітає [bavaria_country.GetName] як свого найновішого [ShowSpecialStatusName('elector')]. Це знаменує значну зміну в балансі сил."
  flavor_bav.32.a: "Наша репутація заплямована."
  flavor_bav.33.title: "Реконструкція [ShowBuildingTypeNameWithNoTooltip('herrenchiemsee_abbey')]"
  flavor_bav.33.desc: "Барокова реконструкція [ShowBuildingTypeName('herrenchiemsee_abbey')] розпочалася за наказом [target_ruler.GetName], перетворюючи його на приголомшливий центральний елемент культурного та релігійного життя [target_country.GetName]. Абатство, спочатку засноване у 765 році н.е. згідно з традицією (хоча, ймовірно, існувало щонайменше за 100 років до того), буде відроджене величною архітектурою та художнім виразом, що втілює епоху бароко."
  flavor_bav.33.a: "Повністю інвестувати в реконструкцію [ShowBuildingTypeNameWithNoTooltip('herrenchiemsee_abbey')]!"
  flavor_bav.33.b: "Зосередити наші ресурси в іншому місці."
  flavor_bav.1000.title: "Секундогенітура [ShowLocationNameWithNoTooltip('cologne')]"
  flavor_bav.1000.desc: "Курфюрство [ShowLocationName('cologne')] нарешті перейшло під егіду нашої династії. Їхній новопризначений правитель [kol_ruler.GetName] безсумнівно буде набагато прихильнішим до цілей нашого дому, ніж його попередник. Безумовно, в наших інтересах сприяти сердечним стосункам між нашими країнами."
  flavor_bav.1000.desc_rival: "Наші закляті суперники, прокляте курфюрство [ShowLocationName('cologne')], нарешті перейшло під контроль нашої династії. Прихід [kol_ruler.GetName] безсумнівно призведе до кардинальних змін у політиці [GetCountry('KOL').GetName] і, очевидно, буде набагато прихильнішим до цілей нашого дому, ніж його попередник. Безумовно, в наших інтересах швидко покласти край нашій старій ворожнечі та почати налагоджувати кращі стосунки."
  flavor_bav.1000.a: "Покажіть їм нашу перевагу над ними."
  flavor_bav.1000.b: "Покладіть край цій ворожнечі та покажіть їм нашу велич."
  flavor_bav.1000.c: "Краще ні."
  flavor_bav.1001.title: "Наші родичі з [GetCountry('BAV').GetNameWithNoTooltip]"
  flavor_bav.1001.desc: "Правитель [GetCountry('BAV').GetName] [bav_ruler.GetName] надіслав нам люб'язний подарунок на честь сходження їхнього родича, нашого дорогого [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Безумовно, в наших інтересах сприяти сердечним стосункам між нашими країнами."
  flavor_bav.1001.desc_rival: "Наші колишні суперники з [GetCountry('BAV').GetName] надіслали подарунок на честь сходження їхнього родича, нашого дорогого [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Безумовно, в наших інтересах швидко покласти край нашій старій ворожнечі та почати налагоджувати кращі стосунки."
  flavor_bav.1001.desc_union: "[GetCountry('BAV').GetLongName] надіслали подарунок на честь сходження нашого дорогого [ROOT.GetCountry.GetGovernment.GetRuler.GetName] на їхній трон. Безумовно, в наших інтересах сприяти сердечним стосункам у нашому новоствореному союзі."
  flavor_bav.1001.a: "Прийняти подарунок."
  flavor_bav.1001.b: "Покласти край нашій безглуздій ворожнечі."
  flavor_bav.1001.c: "Відмовити їм."
  flavor_bav.1002.title: "Відмова від [GetCountry('KOL').GetNameWithNoTooltip]"
  flavor_bav.1002.desc: "Наш люб'язний подарунок і демонстрація підтримки [GetCountry('KOL').GetName] були відхилені самовпевненим [kol_ruler.GetName]."
  flavor_bav.1002.a: "Цей нахаба!"
  flavor_bav.1100.title: "Фортеця в [ShowLocationNameWithNoTooltip('ingolstadt')]"
  flavor_bav.1100.desc: "Наш радник [mil_advisor.GetName], досвідчений військовий лідер, пропонує укріпити [ShowLocationName('ingolstadt')]. Поселення розташоване в дуже стратегічно важливому місці, здатне контролювати перехрестя між [ShowLocationName('regensburg')] та [ShowLocationName('ulm')], а також [ShowLocationName('nuremberg')] та [ShowLocationName('augsburg')]."
  flavor_bav.1100.a: "Почати будівництво."
  flavor_bav.1100.b: "Це зайве."
  flavor_bav.1101.title: "[reginar_solms_scope.GetNameWithNoTooltip] в [ShowLocationNameWithNoTooltip('ingolstadt')]"
  flavor_bav.1101.desc: "Військовий інженер [reginar_solms_scope.GetName] відвідав укріплене місто [ShowLocationName('ingolstadt')] і запропонував нашому лідеру [target_ruler.GetName] проєкт, що пояснює модернізацію, оновлення та розширення укріплень міста. На його думку, щоб зберегти стратегічне значення [ShowLocationNameWithNoTooltip('ingolstadt')], його військова інфраструктура повинна бути оновлена, інакше вона може втратити свою здатність поширювати свій вплив на територію."
  flavor_bav.1101.a: "Запросити [reginar_solms_scope.GetShortNameWithNoTooltip] приєднатися до нашого двору та реалізувати його план."
  flavor_bav.1101.b: "Не звертати уваги на панікерів."
  flavor_bav.1101.reason: "Передові засоби захисту."
  flavor_bav.1102.title: "[ShowLocationNameWithNoTooltip('ingolstadt')], Місто 100 Веж"
  flavor_bav.1102.desc: "Укріплене місто [ShowLocationName('ingolstadt')] стоїть як гордий оплот нашої влади в регіоні, його міцні стіни поширюють наш вплив на важливе перехрестя, яке воно охороняє.\n\nНастав час розширити цю владу ще далі та модернізувати оборону міста, щоб наші потенційні вороги знали марність протистояння нам."
  flavor_bav.1102.a: "Розпочати будівництво."
  flavor_bav.1102.b: "Нам не потрібні ці розширення."
  flavor_bav.1200.title: "Театинська церква"
  flavor_bav.1200.desc: "[consort_scope.GetName] закликає [ruler_scope.GetName] пообіцяти фінансувати чудову церкву для Театинського ордену в [ShowLocationName('munich')]. Вона вже обрала болонського архітектора, [agostino_barelli_scope.GetName], для будівництва церкви у [ShowCultureGroupName('italian_group')] стилі високого бароко. Наша аристократія та заможні [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] цілком захоплені планами, які вона дозволила широко розповсюдити, оскільки вони є палкими шанувальниками модного [ShowCultureGroupNameWithNoTooltip('italian_group')] стилю."
  flavor_bav.1200.a: "Дуже добре, нехай буде так, як вона бажає."
  flavor_bav.1200.b: "Ні, це зайве."
  flavor_bav.1201.title: "Гнівний архітектор"
  flavor_bav.1201.desc: "[agostino_barelli_scope.GetName], новий архітектор, що будує Театинську церкву в [ShowLocationName('munich')], виявився надзвичайно складним у співпраці. Його постійні суперечки з керівником будівництва, театинським отцем, сповідником [consort_scope.GetName], спричинили численні проблеми на будівельному майданчику, а нещодавній бурхливий спалах нарешті призвів до падіння архітектора з милості.\n\nВигнання досвідченого архітектора залишило б нову церкву в руках його учня та заступника [henry_zuccalli_scope.GetName], оскільки він єдиний, хто має достатньо знань про проєкт, щоб продовжити його."
  flavor_bav.1201.a: "Вигнати його і призначити учня відповідальним."
  flavor_bav.1201.b: "Ігнорувати суперечки та залишити [agostino_barelli_scope.GetShortNameWithNoTooltip]."
  flavor_bav.1300.title: "Спадщина [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_bav.1300.desc: "Зі смертю [old_ruler.GetName] ми тепер стикаємося зі спадкуванням [old_ruler.GetHerHis] земель між [old_ruler.GetHerHis] спадкоємцями чоловічої статі згідно із законами [ShowCultureGroupName('german_group')]. Смерть [old_ruler.GetNameWithNoTooltip] настає в невдалий час для нашої країни, оскільки [target_ruler.GetHerHis] проєкт возз'єднання $BAV$ провалюється на фінальних етапах.\n\n[target_ruler.GetName] тепер доведеться працювати проти [target_ruler.GetHerHis] братів і сестер, щоб скасувати шкоду від розділення та проголосити [target_ruler.GetHerHis] суверенітет над Баварією."
  flavor_bav.1300.a: "Складне завдання!"
  flavor_bav.1301.title: "Возз'єднання [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_bav.1301.desc: "[target_ruler.GetName] нарешті тріумфував над [target_ruler.GetHerHis] родиною та централізував достатньо влади у [target_ruler.GetHerHis] власних руках, щоб проголосити [target_ruler.GetHerselfHimself] єдиним правителем [ROOT.GetCountry.GetName]. Серйозні помилки розділення [ROOT.GetCountry.GetCulture.GetName] земель між синами [target_ancestor.GetName] були виправлені, і країна зможе рухатися вперед, об'єднана під керівництвом [target_ruler.GetNameWithNoTooltip]."
  flavor_bav.1301.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_bav.1400.title: "Заснування [target_location.GetNameWithNoTooltip] Резиденції"
  flavor_bav.1400.desc: "Після міських заворушень [target_ruler.GetName] наказав побудувати нову фортецю на околиці [target_location.GetName], пізніше відому як Нойвесте [target_location.GetNameWithNoTooltip] Резиденції. Хоча спочатку [target_location.GetNameWithNoTooltip] Резиденція починалася як укріплення, вона буде використовуватися переважно як осередок влади та [target_ruler.GetNameWithNoTooltip]'s [target_country.GetGovernment.GetCourtTitle]."
  flavor_bav.1400.a: "Інвестувати в Резиденцію, щоб продемонструвати нашу силу."
  flavor_bav.1400.b: "Відкласти будівництво наразі."
  flavor_bav.1401.title: "[ShowInstitutionNameWithNoTooltip('renaissance')] Розширення [target_location.GetNameWithNoTooltip] Резиденції"
  flavor_bav.1401.desc: "З [ShowInstitutionName('renaissance')], що охопила [ShowContinentName('europe')], [target_ruler.GetName] передбачає розширення [target_location.GetNameWithNoTooltip] Резиденції до грандіозного палацу, який відображатиме зростаючий престиж [target_country.GetName]. Це нове крило слугуватиме галереєю для мистецтва та культури, зміцнюючи місце [target_country.GetGovernment.GetAdjective] родини серед покровителів мистецтв."
  flavor_bav.1401.a: "Розширити Резиденцію, щоб прийняти дух [ShowInstitutionNameWithNoTooltip('renaissance')]."
  flavor_bav.1401.b: "Відкласти розширення, щоб заощадити кошти."
  flavor_bav.1402.title: "Барокове розширення [target_location.GetNameWithNoTooltip] Резиденції"
  flavor_bav.1402.desc: "В епоху бароко, сповнену розкоші та величі, [target_ruler.GetName] прагне ще більше розширити [target_location.GetName] Резиденцію, прикрасивши її вишуканими декораціями та новими крилами, що відображають славу [target_country.GetName]. Це посилить пишність [target_country.GetAdjectiveWithNoTooltip] [target_country.GetGovernment.GetCourtTitle] та вразить високопоставлених гостей."
  flavor_bav.1402.a: "Розпочати барокове розширення, щоб підвищити наш престиж."
  flavor_bav.1402.b: "Наразі зосередитися на інших проєктах."