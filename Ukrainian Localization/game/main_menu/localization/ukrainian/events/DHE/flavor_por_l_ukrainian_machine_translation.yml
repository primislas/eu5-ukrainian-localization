l_english:
  flavor_por.1.title: "[columbus_scope.GetNameWithNoTooltip]"
  flavor_por.1.desc: "Прагнення морського шляху до $india$ охопило [ShowSubContinentName('western_europe')]. До нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] звернувся [ShowCultureName('ligurian')] навігатор, який стверджує, що західний шлях до $india$ є кращим варіантом, ніж пошук шляху навколо [ShowSubContinentName('southern_africa')]. Хоча деякі наші радники відкидають підстави його тверджень, це може виявитися вигідною інвестицією."
  flavor_por.1.a: "Відхилити його пропозицію"
  flavor_por.1.b: "Найняти Колумба"
  flavor_por.1.historical_info: "У 1492 році Христофор Колумб здійснив свою знамениту подорож для Кастилії і поплив на захід через Атлантику в пошуках західного шляху до Орієнту. Сім років раніше, у 1485 році, Христофор Колумб представив той самий план королю Португалії, Жуану II, який, після подання пропозиції своїм експертам, відхилив її. Колумб зробив ще одну спробу переконати короля у 1488 році, але оскільки португальський дослідник Бартоломеу Діаш приблизно в цей час успішно обігнув мис Доброї Надії, східний морський шлях до Азії здавався більш імовірним, і король знову відхилив пропозицію Колумба."
  flavor_por.2.title: "Атлантична работоргівля"
  flavor_por.2.desc: "Створення плантацій виявилося успішним починанням для [ROOT.GetCountry.GetName]. Зі зростанням попиту на товари цих спеціалізованих ферм зростає і попит на дешеву робочу силу. Завдяки нашим існуючим зв'язкам з африканською торгівлею ми маємо можливість розширити придбання [ShowPopTypeName('slaves')] з [ShowSubContinentName('west_africa')] для задоволення потреб плантацій."
  flavor_por.2.a: "Заохочувати работоргівлю з [ShowSubContinentName('west_africa')WithNoTooltip]"
  african_slave_trade_encouraged: "Работоргівля заохочується"
  flavor_por.2.b: "Корона не повинна втручатися"
  flavor_por.2.historical_info: "Експлуатація землі та ресурсів у колоніях Нового Світу призвела до широкого використання рабської праці. Оскільки значна частина корінного населення померла від перевтоми та хвороб, що поширилися з Європи, нестача робочої сили незабаром стала проблемою для колонізаторів. Кабальна служба дещо зменшила це, але не змогла забезпечити необхідну робочу силу. Це стало початком атлантичної работоргівлі, коли рабів, куплених уздовж узбережжя Західної Африки, транспортували до Бразилії. Понад 3 мільйони африканських рабів було відправлено до Бразилії, переважно для роботи на величезних цукрових плантаціях."
  flavor_por.3.title: "Місіонери на Островах Прянощів"
  flavor_por.3.desc: "З нашим відкриттям Островів Прянощів приходить не лише економічна вигода. Оскільки це праведно, ми повинні поширювати слово істинної віри і вести ці бідні душі до світла [ROOT.GetCountry.GetReligion.GetName]."
  flavor_por.3.a: "Поширювати [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] віру"
  flavor_por.3.historical_info: "Архіпелаг Молуккських островів історично був відомий як #italic Острови Прянощів#! і став важливою частиною португальської торгової мережі в Південно-Східній Азії протягом 16 століття. Після вигнання з Тернате португальці заснували свій новий торговий центр на острові Амбон, який був відкритий ними в 1513 році. Хоча португальці регулярно зазнавали нападів з боку місцевих мусульман регіону, місіонерам вдалося навернути велику кількість з них до християнства. До кінця 16 століття на Молуккських островах було понад 50 000 християн, більшість з них жили на Амбоні."
  flavor_por.4.title: "Casa da Índia"
  flavor_por.4.desc: "Нам потрібно ефективно наглядати та керувати [ROOT.GetCountry.GetAdjective] інтересами та володіннями в $india$ та [ShowContinentName('africa')]. Було запропоновано, що найкращий спосіб досягти цього — створити установу безпосередньо під [ROOT.GetCountry.GetGovernment.GetAdjective] Скарбником з монопольними правами на всі пов'язані торгові зв'язки та товари."
  flavor_por.4.a: "Звучить як гарний план."
  flavor_por.4.a.tt: "Розблоковує [ShowGovernmentReformName('por_casa_de_india')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_por.5.title: "Вежа Белен"
  flavor_por.5.desc: "Порт [ShowLocationName('lisbon')] значно зріс у важливості за останні десятиліття. У той час як порт і річка Тежу зростали у своєму значенні, наші укріплення вздовж гирла річки занепали. Ми отримали пропозицію від [ROOT.GetCountry.GetAdjective] архітектора побудувати нове укріплення вздовж берега річки для захисту міста."
  flavor_por.5.a: "Її треба побудувати"
  flavor_por.5.b: "У нас є інші пріоритети"
  flavor_por.5.historical_info: "Замовлена Мануелем I, Вежа Белен була побудована на початку 16 століття для захисту гирла річки Тежу. Вона була побудована в мануелінському, або португальському пізньоготичному, стилі. Вежа була покращена в 1571 році, але впала після лише кількох годин облоги в 1580 році перед силами іспанського герцога Альби. Підземелля Вежі пізніше служили в'язницею."
  flavor_por.6.title: "Монастир Жеронімуш"
  flavor_por.6.desc: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] вирішив, що [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] династія повинна отримати нове місце поховання. Для цього були розроблені дорогі плани монастиря, які тепер готові до виконання."
  flavor_por.6.a: "Це продемонструє нашу Славу"
  flavor_por.6.b: "Це занадто дорого"
  flavor_por.6.historical_info: "Будівництво монастиря Жеронімуш розпочалося в 1501 році і спочатку фінансувалося Мануелем I за рахунок доходів від податку #italic Vintena da Pimenta#! на товари з Африки та Далекого Сходу. Монастир також став місцем поховання Мануеля I та майбутніх португальських монархів з династій Авіш та Браганса. Роботи припинилися в 1580 році, коли Португалія, після смерті Себастьяна I Португальського та кризи престолонаслідування, увійшла в унію з Іспанією. Коли Португалія знову стала незалежною в 1640 році, монастир зазнав подальшого будівництва з додаванням золотої кахельної стелі в 1669 році та великих фресок, завершених наприкінці 18 століття. У 19 столітті до монастиря також були перенесені останки Васко да Гами та Луїша де Камоенса."
  flavor_por.7.title: "Дослідники досягають Індії"
  flavor_por.7.desc: "Наші дослідники досягли Індії і тепер активно займаються дрібномасштабною торгівлею з місцевими жителями. Тепер нам потрібно діяти швидко, щоб використати ці нові розробки та забезпечити собі торгові права в Індії. Землі навколо Гоа стали б ідеальним місцем для наших торгових операцій."
  flavor_por.7.a: "Чудово!"
  flavor_por.7.historical_info: "Васко да Гама став першим португальцем, який досяг Індії, коли він висадився поблизу Кожикоде (Калікут) 20 травня 1498 року. Незважаючи на протести арабських купців, да Гама зумів забезпечити торгові права з правителем Заморіном, але пізніше не зміг надати золото, необхідне для оплати митних зборів. Загалом, експедиція да Гами виявилася дуже прибутковою, оскільки вартість привезеного вантажу в шістдесят разів перевищувала вартість експедиції."
  flavor_por.8.title: "Генерал-губернаторство Бразилії"
  flavor_por.8.desc: "З того часу, як ми заснували капітанства в наших колоніях, ми мали проблеми з їхнім управлінням. Багато регіональних губернаторів і дворян, що боролися за владу, не змогли сформувати єдину відповідь на піратство та набіги тубільців на наші колонії. Тепер настав час створити нову посаду з владою над цими капітанствами та об'єднати наші колонії в Новому Світі. Генерал-губернаторство діятиме від імені нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] та встановить нашу владу в [ShowRegionName('brazil_region')]."
  flavor_por.8.a: "Заснувати його!"
  flavor_por.8.b: "Нам це не потрібно!"
  flavor_por.8.historical_info: "Генерал-губернаторство Бразилії було засноване в 1549 році королем Португалії Жуаном III. Цей урядовий орган мав діяти як єдина установа для капітанств, які організовували португальські колонії Бразилії."
  flavor_por.9.title: "Комерційний конфлікт в Індійському океані"
  flavor_por.9.desc: "З прибуттям португальських кораблів в Індійський та Аравійський океани ми нарешті маємо можливість спробувати порушити судноплавство [ShowCultureGroupName('arabian_group')] у цьому регіоні. Ми в змозі значно скоротити постачання спецій та шовку до [ShowLocationName('alexandria')], завдаючи шкоди нашій торговій конкуренції на Близькому Сході та в [ShowRegionName('italy_region')]."
  flavor_por.9.a: "Силою контролювати торгівлю спеціями"
  portuguese_privateers: "Португальські капери"
  flavor_por.9.b: "Шукати кращих відносин у регіоні"
  careful_trade_expansion: "Обережна торговельна експансія"
  flavor_por.10.title: "Губернатор Мартін Афонсу де Соуза"
  flavor_por.10.desc: "Наш колоніальний суб'єкт у [ShowRegionName('brazil_region')] нещодавно мав проблеми з пошуком єдиної відповіді на піратство вздовж узбережжя. Хоча ці проблеми зараз невеликі, ми повинні діяти зараз, щоб запобігти їхньому виходу з-під контролю. Призначення здібного губернатора було б першим кроком до цієї мети."
  flavor_por.10.a: "Призначити де Соузу"
  flavor_por.10.historical_info: "Провідним колоністам були надані смуги землі, що простягалися від бразильського узбережжя вглиб країни. Землевласники, часто капітани, розселяли колоністів у своїх відповідних капітанствах і повинні були забезпечувати їх захистом та правосуддям. Оскільки ці капітанства були незалежними, вони не могли захистити себе від іноземних піратів. Відправлений до Бразилії указом короля Португалії Жуана III, де Соуза успішно боровся з піратством та інтенсифікував колонізаційні зусилля вглиб Бразилії. У 1534 році він був призначений донатарним капітаном Сан-Вісенте за свої зусилля."
  flavor_por.11.title: "Експедиція [ROOT.GetCountry.GetGovernment.GetRulerTitle] до Північної Африки"
  flavor_por.11.desc: "За нашим узбережжям лежать землі, що перебувають у руках невірних. Щоб забезпечити наше становище в [ShowRegionName('north_atlantic_ocean_region')] та розширити наш контроль над більшою територією, ми повинні провести кампанію проти цих язичників на славу Божу."
  flavor_por.11.a: "Хрестовий похід проти язичників в Африці"
  prepares_crusade: "Готує хрестовий похід"
  flavor_por.11.b: "Нам слід зосередитися на іншому"
  flavor_por.11.historical_info: "У 1578 році король Португалії Себастьян вирушив в експедицію для завоювання Марокко, де Португалія вже володіла регіонами Танжер і Сеута. Невдовзі після його висадки, у битві при Ель-Каср-ель-Кебір, марокканські бербери Мулая Ісмаїла настільки розгромили португальську армію, що король загинув разом із більшістю португальської знаті, яка воювала з ним. Ця катастрофа призвела до іспанського контролю над Португалією і стала початком занепаду Португалії."
  flavor_por.12.title: "Метуенська угода"
  flavor_por.12.desc: "Англієць звернувся до нас на службі [target_country.GetName]. Він пропонує торговельну угоду між нашими націями для подальшого розвитку обох наших економік. Хоча це може збільшити деякі наші експортні поставки до їхньої країни, ми також імпортуватимемо товари, які не здатні виробляти самі."
  flavor_por.12.a: "Прийняти угоду"
  accepted_meuthen_agreement: "Метуенську угоду прийнято"
  flavor_por.12.b: "Денонсувати угоду"
  denounced_meuthen_agreement: "Метуенську угоду денонсовано"
  flavor_por.12.historical_info: "Джон Метуен народився 1650 року. Будучи вправним дипломатом, він добре запам'ятався завдяки договору, підписаному 1703 року між Англією та Португалією. Основною метою договору було дозволити вільне ввезення англійської вовни та тканин до Португалії в обмін на вільний вхід португальського вина до Англії (портвейн). Договір фактично зробив Португалію економічним і політичним сателітом Англії та діяв до 1750 року, коли король Жозе I вирішив ігнорувати його, хоча формально він залишався чинним до 1836 року. Джон Метуен помер 1706 року, невдовзі після свого найбільшого успіху."
  flavor_por.13.title: "Граф да Ерісейра"
  flavor_por.13.desc: "Видатна постать [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] пропонує свою пораду нашому [ROOT.GetCountry.GetGovernment.GetRulerTitle] у питаннях торгівлі. [target_character.GetName], граф Ерісейра, — талановита людина і твердий прихильник меркантилістичної політики. Хоча меркантилізм є його головною турботою, ми могли б залучити його до різних справ нашої держави."
  flavor_por.13.a: "Дотримуватися його поради!"
  flavor_por.13.b: "Відхилити його!"
  flavor_por.13.historical_info: "Дом Луїс де Менезес, граф да Ерісейра, був рішучим прихильником меркантилізму і допоміг реформувати португальську державу в напрямку посилення контролю над португальською торгівлею."
  flavor_por.17.title: "Період невизначеності"
  flavor_por.17.desc: "Неможливість народити живого спадкоємця чоловічої статі ставить майбутнє [ROOT.GetCountry.GetFlavorRank] під загрозу іноземного втручання. Якщо дочка [ROOT.GetCountry.GetGovernment.GetRuler.GetName] успадкує [ROOT.GetCountry.GetGovernment.GetRuler.GetHimHer], вона ризикує стати простою маріонеткою чоловіка, який замість неї правитиме [ROOT.GetCountry.GetName].\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] пропонують змінити закон про престолонаслідування, щоб виключити [heir.GetName] з успадкування корони. Вони об'єдналися у своїй справі, щоб обрати незаконнонародженого зведеного брата та дворянина [john_avis.GetName] на місце [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer], якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle] не зможе народити спадкоємця чоловічої статі."
  flavor_por.17.a: "Відмовитися від їхньої пропозиції."
  flavor_por.17.a.custom: "[ShowPopTypeName('burghers')] та [ShowPopTypeName('nobles')] у [GetCountry('POR').GetName] втрачають #R 90.00%#! [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_por.17.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] спробують посадити [john_avis.GetNameWithNoTooltip] на трон"
  flavor_por.17.tt2: "Відвага, виявлена [ROOT.GetCountry.GetGovernment.GetRulerTitle], визнана за зайняття позиції проти [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]"
  avis_supporters: "Прихильники Жуана Авіша"
  flavor_por.17.b: "Ми згодні."
  flavor_por.17.tt3: "[heir.GetName] буде виключено з лінії престолонаслідування"
  flavor_por.19.title: "Жуан Браганський"
  flavor_por.19.desc: "Вплив [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] слабшає, маючи незначну підтримку при [ROOT.GetCountry.GetGovernment.GetCourtTitle] та не маючи посад у [ROOT.GetCountry.GetGovernment.GetCabinetTitle], призначених їхньому стану. Наші шпигуни повідомляють, що провокаційний [joao_braganca.GetName] шукає підтримки, щоб повалити [ROOT.GetCountry.GetGovernment.GetRuler.GetName], відновивши владу та привілеї [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] взамін."
  flavor_por.19.desc_subject: "Вплив [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] слабшає, маючи незначне представництво при дворі та не маючи впливу у зовнішніх чи внутрішніх справах. Наші шпигуни повідомляють, що провокаційний [joao_braganca.GetName] планує повалити [overlord.GetCountry.GetAdjective] правління та відновити незалежність [ROOT.GetCountry.GetName]. [joao_braganca.GetSheHe] має підтримку групи, відомої як #italic Сорок змовників#!, серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], і очікується, що [joao_braganca.GetSheHe] завдасть удару будь-якої миті."
  flavor_por.19.a: "Зректися престолу на [joao_braganca.GetHisHer] користь."
  flavor_por.19.tt1: "[Concept('joao_braganca.GetNameWithNoTooltip] додається як [character', 'CONCEPT_PLACEHOLDER')|e] і захоплює трон за підтримки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_por.19.b: "Нехай [joao_braganca.GetNameWithNoTooltip] очолить боротьбу."
  flavor_por.19.tt2: "[joao_braganca.GetSheHe|U] згуртовує [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] на підтримку [joao_braganca.GetHisHer] боротьби за звільнення [target_root_country.GetName] від [GetCountry('SPA').GetAdjective] впливу"
  flavor_por.19.c: "Не йти на поступки."
  STATIC_MODIFIER_NAME_braganca_rebellion: "Повстання Браганси"
  flavor_por.19.d: "Ми не хочемо проблем."
  flavor_por.19.tt3: "Поступки, зроблені [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], вирішують справу"
  flavor_por.19.e: "Стратити бунтівника."
  braganca_supporters: "Прихильники Жуана де Браганси"
  flavor_por.19.tt4: "Повстання придушене після смерті Жуана де Браганси"
  flavor_por.21.title: "Лузіади"
  flavor_por.21.desc: "Луїс де Камойнш опублікував епічну поему, що згадує фантастичні подорожі наших співвітчизників до Індії. «Лузіади» — справжній шедевр [ROOT.GetCountry.GetCulture.GetName] мови та нашої культури, що пошириться далеко по всьому світу."
  flavor_por.21.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_por.21.historical_info: "$the_lusiads_desc$ Твір, опублікований у 1572 році, вважається національним епосом Португалії."
  flavor_por.22.title: "Васко да Гама пропонує свої послуги"
  flavor_por.22.desc: "Походячи з незнатного роду [ShowCultureName('portuguese')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [target_character.GetName] піднявся по службі у святому ордені і тепер пропонує свої послуги нашій короні для подальших досліджень у напрямку Індії. Вже очоливши незначні морські бої, він, здається, є вправним капітаном і добре підходить для керівництва новою експедицією."
  flavor_por.22.a: "Він добре нам послужить"
  flavor_por.22.historical_info: "До своєї знаменитої подорожі до Індії та висадки в Кожикоде (Калікуті), Васко да Гама служив в Ордені Сантьяго, який високо цінував король Жуан II, сам колишній магістр Ордену. Розпочавши свою подорож у 1497 році на 4 кораблях, Васко да Гама досяг Індії в травні 1498 року і повернувся до Португалії в 1499 році. Його подорож виявилася дуже прибутковою, принісши спеції і, що найважливіше, новий відкритий морський шлях до Індії."
  flavor_por.23.title: "Монастир Баталя"
  flavor_por.23.desc: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] пообіцяв Діві Марії монастир на її честь, якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] зуміє виграти війну проти [loser.GetName]. Війна була виграна, і тепер настав час виконати цю клятву."
  flavor_por.23.a: "За славу!"
  flavor_por.23.historical_info: "Після битви при Алжубарроті в 1385 році, де португальські війська розгромили кастильську армію, король Португалії Жуан I виконав свою обіцянку присвятити монастир Діві Марії за перемогу. $batalha_monastery_desc$"
  flavor_por.24.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Пантеон"
  flavor_por.24.desc: "Зі смертю нашого правителя настав час підготувати [old_ruler.GetHerHis] поховання, оскільки коридори [ROOT.GetCountry.GetGovernment.GetAdjective] палацу наповнюються плачем. Хоча [old_ruler.GetSheHe] чітко висловив [old_ruler.GetHerHis] бажання бути похованим у монастирі Алкобаса, мало інших вказівок відомо про те, як діяти далі. Занадто спартанське поховання може створити поганий імідж для [ROOT.GetCountry.GetFlavorRank], але занадто видовищне може зруйнувати наші фінанси для більш нагальних справ."
  flavor_por.24.a: "[old_ruler.GetShortNameWithNoTooltip] заслуговує на чудову гробницю."
  flavor_por.24.b: "Немає потреби вихвалятися."
  flavor_por.24.historical_info: "Монастир Алкобаса, заснований у 1153 році королем Португалії Афонсу I, протягом століть був місцем поховання португальських монархів і став одним з найбагатших та найвпливовіших, частково завдяки цій асоціації. Він також вважається найважливішим монастирем у Середньовіччі, поряд з монастирем Санта-Круш поблизу Коїмбри, та одним з найгарніших у Португалії."
  flavor_por.25.title: "Нова Обитель Ордену Христа"
  flavor_por.25.desc: "З завершенням Реконкісти та віддаленням боротьби з нашими [ShowReligionGroupAdjective('muslim')] ворогами від нашої території, присутність Ордену Христа в [ShowLocationName('tavira')] має мало сенсу. Крім того, прогресивна втрата престижу Ордену в цьому районі не допомагає.\n\nДеякі з наших радників запропонували перемістити Орден до попередньої обителі лицарів-тамплієрів і зайняти монастирсько-замковий комплекс Конвенту Христа на півночі [ShowProvinceDefinitionName('estremadura_province')]."
  flavor_por.25.a: "Вони використовуватимуть обитель тамплієрів у [ShowLocationNameWithNoTooltip('tomar')]."
  flavor_por.25.b: "Вони залишаються там, де є."
  flavor_por.25.historical_info: "Король Дініш I, реагуючи на придушення ордену тамплієрів у 1312 році, заснував #italic Christi Militia#! у 1317 році, що було схвалено Папою Іоанном XXII буллою #italic AD EA EX QVIBVS#! у 1319 році. Після переговорів, інша булла у 1323 році надала Дінішу повноваження передати власність тамплієрів Ордену Христа. Лицарі склали обітниці бідності, цнотливості та послуху, причому статус Ордену як наступника тамплієрів є джерелом історичних дебатів. Дом Жил Мартінш, перший Великий Магістр, походив з Ордену Авіш.\n\nСпочатку Орден базувався в Каштру-Маріні, Алгарве, а в 1357 році перемістився до Томара, поблизу Сантарена, колишньої обителі тамплієрів, що ознаменувало значний розділ у середньовічній історії Португалії."
  flavor_por.26.title: "Мадейрське вино"
  flavor_por.26.desc: "З моменту відкриття [ShowProvinceDefinitionName('madeira_province')] наш народ вирощував прибутковий цукровий очерет, користуючись сприятливим кліматом, що благословляє острів. Однак нещодавно, з розвитком цукрової промисловості в [ShowRegionName('brazil_region')], прибутковість мадейрського [ShowGoodsName('sugar')] знизилася, і багато хто задається питанням, чи настав час розвивати альтернативну культуру, наприклад, інвестувати в [ShowGoodsName('wine')]."
  flavor_por.26.a: "Ми перейдемо на вино."
  flavor_por.26.b: "Цукор кращий."
  flavor_por.26.historical_info: "Цукровий очерет домінував в економіці Мадейри, сприяючи економічному процвітанню Фуншала, приваблюючи європейських авантюристів і купців. У XV столітті Фуншал став ключовим портом на європейських торгових шляхах. Раби, включаючи гуанчів, берберів і західних африканців, використовувалися для вирощування цукрового очерету, хоча рабовласники становили меншість. Варварські корсари захопили 1200 людей у Порту-Санту в 1617 році. До XVI століття Мадейра процвітала як великий ринок цукру, ставши свідком раннього застосування рабської праці у виробництві цукру, що пізніше вплинуло на більші заморські території. Однак конкуренція з боку бразильських і сан-томейських плантацій призвела до занепаду виробництва цукру на Мадейрі, що вимагало імпорту цукру з інших португальських колоній. Колись процвітаючі цукрові заводи поступово зникли, звільнивши місце для альтернативних ринків на Мадейрі."
  flavor_por.27.title: "Християни святого Фоми"
  flavor_por.27.desc: "Коли ми вперше прибули на береги $india$, звістка про послідовників нашого Господа і Спасителя Ісуса Христа незабаром дійшла до наших вух. Вони стикалися з переслідуваннями з боку численніших [ShowReligionGroupAdjective('muslim')] народів та послідовників [ShowReligionName('hindu')], тому спільний інтерес до союзу між нами кристалізувався.\n\nОднак, коли наші люди почали жити з ними, вони незабаром усвідомили, що ті мають інші обряди та звичаї нашої релігії, які не завжди схвалюються. Багато голосів стверджують, що ми повинні втрутитися і повернути їх на правильний шлях, тоді як інші доводять, що їм слід дозволити продовжувати дотримуватися своїх обрядів."
  flavor_por.27.a: "Вони повинні приєднатися до нашої пастви."
  flavor_por.27.b: "Поки вони християни..."
  flavor_por.27.historical_info: "У 1498 році християни святого Фоми зустрілися з португальцями під час експедиції Васко да Гами, утворивши союз через своє нестійке становище серед політичної нестабільності та тиску з боку регіональних правителів. Португальці, прагнучи домінувати в торгівлі прянощами та поширювати своє християнство, заснували Падроадо Реал, надавши церковну владу на завойованих територіях. Спочатку помірковане, португальське підкорення християн святого Фоми посилилося після 1552 року, зі стратегічними кроками, що призвели до ізоляції громади від її ієрархії до 1575 року. У 1599 році архієпископ Гоа, Алейшо де Менезеш, забезпечив підкорення останнього митрополита, ініціювавши Синод у Діампері.\n\nСинод, скликаний Менезешем, впровадив літургійні реформи, анафематствував певні звичаї та офіційно привів християн святого Фоми до Католицької Церкви. Однак дії португальців, включаючи спалення сирійських текстів та ліквідацію кастового статусу, викликали обурення та розпалили відкритий опір у громаді протягом наступних років, ознаменувавши складний період культурних та релігійних зіткнень."
  flavor_por.28.title: "Заснування Португальської інквізиції"
  flavor_por.28.desc: "Коли наш правитель [target_character.GetName] був заручений з [ROOT.GetCountry.GetGovernment.GetConsort.GetName], однією з умов союзу було прийняття Інквізиції [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank], щоб переконатися, що численні навернені, які населяють нашу країну, не практикують свої старі вірування таємно.\n\nЗаснування нашої власної Інквізиції могло б принести численні переваги нашій нації, такі як гарантія лояльності тих підданих, які належали до інших релігій і яких не можна було вважати повністю лояльними. З іншого боку, цей захід міг би призвести до заворушень з боку тих самих народів, які могли б передбачити ворожість з нашого боку."
  flavor_por.28.a: "Ми заснуємо Португальську інквізицію."
  flavor_por.28.b: "Це не здається гарною ідеєю."
  flavor_por.28.historical_info: "Заснована в 1536 році королем Жуаном III на прохання Мануела I, Португальська інквізиція (#italic Inquisição Portuguesa#!), або Генеральна рада Священної канцелярії інквізиції в Португалії, почала своє існування. Схвалення Папи Павла III, відкладене до смерті Мануела I, призвело до її офіційного встановлення в 1536 році. Будучи частиною ширшої Християнської інквізиції, вона приєдналася до Іспанської та Римської інквізицій і була скасована в 1821 році."
  flavor_por.29.title: "Epistola de Victoria Contra Infideles"
  flavor_por.29.desc: "Наш правитель [target_character.GetName] постановив, що всі наші піддані, які сповідують [ShowReligionAdjective('judaism')] релігію, повинні навернутися до [ShowReligionName('catholic')] або зіткнутися з вигнанням. Указ, названий #italic Epistola de Victoria Contra Infideles#!, захищає необхідність [ROOT.GetCountry.GetName] стати справжньою [ShowReligionGroupName('christian')] нацією, щоб все її населення сповідувало ту саму віру."
  flavor_por.29.a: "Вони повинні стати християнами!"
  flavor_por.29.b: "Залиште їх у спокої."
  flavor_por.29.tt1: "Більшість сефардів у нашій нації будуть навернені до католицизму, а ті, хто відмовиться, будуть вигнані з країни."
  flavor_por.29.tt2: "Сефарди в нашій нації будуть щасливішими."
  flavor_por.29.historical_info: "5 грудня 1496 року король Португалії Мануел I, під тиском католицьких монархів Іспанії, видав указ про вигнання або навернення всіх євреїв як умову свого шлюбу з принцесою Ізабеллою. Було видано два укази, спочатку спрямовані на вигнання, але пізніше перетворені на примусове навернення в 1497 році. Португальські євреї були примусово хрещені, а ті, хто чинив опір, були депортовані до Сан-Томе і Принсіпі. Португальські конверсо зіткнулися з труднощами, з різаниною в Лісабоні в 1506 році та заснуванням Португальської інквізиції в 1536 році, що відображає бурхливий період релігійних переслідувань."
  flavor_por.30.title: "Лісабонська різанина"
  flavor_por.30.desc: "У [ShowLocationName('lisbon')] почався бунт, і тисячі розлючених громадян переслідують #italic Нових християн#! на вулицях нашого міста.\n\nЗа словами наших інформаторів, все почалося, коли вірні молилися під час меси в Каплиці Ісуса, і світло нібито випромінювалося з розп'яття. Один #italic Новий християнин#!, який був присутній, висміяв заяви про диво, і натовп розлютився, вбивши чоловіка на місці і почавши полювання на будь-якого #italic Нового християнина#! в полі зору.\n\nМісто у вогні, а вулиці повні крові як #italic Нових#!, так і #italic Старих християн#!."
  flavor_por.30.a: "Ми нічого не можемо зробити."
  flavor_por.30.b: "Зупиніть це божевілля."
  flavor_por.30.tt1: "#Y Величезна#! кількість Нових і Старих християн #R загине#!."
  flavor_por.30.tt2: "#Y Велика#! кількість Нових і Старих християн #R загине#!."
  flavor_por.30.tt3: "#Y Значна#! кількість Нових і Старих християн #R загине#!."
  flavor_por.30.tt4: "#Y Незначна#! кількість Нових і Старих християн #R загине#!."
  flavor_por.30.historical_info: "У неділю, 19 квітня 1506 року, спалахнула Лісабонська різанина, коли парафіяни напали на осіб, підозрюваних у єврействі, що переросло в загальноміський антисемітський бунт. Насильство призвело до загибелі багатьох #italic Нових християн#! (джерела припускають кількість жертв від 1000 до 4000 осіб), маючи на увазі євреїв, примусово навернених до християнства, а також значної кількості #italic Старих християн#!."
  flavor_por.31.title: "Вигнання мусульман з Португалії"
  flavor_por.31.desc: "Після завершення нашої Реконкісти в 1249 році, із захопленням [ShowProvinceDefinitionName('algarve_province')], наше королівство стало домом для тисяч [ShowReligionGroupAdjective('muslim')] підданих дещо сумнівної вірності. Як і в інших частинах [ShowRegionName('iberia_region')], наш [target_character.GetName] побоюється, що [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] люди, які населяють їхнє королівство, можуть бути не такими вірними підданими, якими вони здаються. Радники запропонували різні альтернативи, але всі вони, схоже, вказують на можливість ризиків, які можуть поставити під загрозу стабільність нашого [ROOT.GetCountry.GetFlavorRank] і все зруйнувати."
  flavor_por.31.a: "Просто виженіть їх."
  flavor_por.31.b: "Примусьте їх навернутися!"
  portuguese_muslim_uprising: "[ShowCultureNameWithNoTooltip('andalusi')] Повстання"
  flavor_por.31.c: "Вони вірні піддані."
  flavor_por.31.tt1: "Більшість мусульман у нашій нації будуть навернені до католицизму, а ті, хто відмовиться, будуть вигнані з країни. Існує велика ймовірність їхнього повстання. Сусідні мусульманські країни отримають Casus Belli проти нас і можуть напасти на нас."
  flavor_por.31.tt2: "Ми виженемо наших [ShowCultureName('andalusi')] мусульман з Португалії, оскільки не можемо ризикувати їхнім повстанням, якщо спробуємо їх навернути."
  flavor_por.31.tt3: "[ShowCultureName('andalusi')] люди в нашій державі будуть полегшені та задоволені нами."
  flavor_por.31.historical_info: "Вигнання мусульман з Португалії, часто затьмарене примусовим наверненням євреїв, відбулося в грудні 1496 року. Незважаючи на те, що Португалія виявляла більшу толерантність до мусульманських меншин, ніж інші європейські регіони, Мануел I наказав їм покинути країну без чіткої провокації. Спочатку розглядаючи примусове навернення або страту, португальський уряд, побоюючись помсти з боку північноафриканських мусульманських королівств, обрав депортацію. Мотиви наказу Мануела I залишаються незрозумілими, з теоріями, що варіюються від прагнень до релігійної однорідності, пов'язаних з «Католицькими монархами» Ізабеллою та Фердинандом, до амбіцій завоювання Марокко або впливу домініканського сповідника брата Жорже Вогадо. Більшість втекла до Північної Африки."
  flavor_por.32.title: "Хрестовий похід проти [GetCountry('POR').GetNameWithNoTooltip]"
  flavor_por.32.desc: "Підлий [target_character.GetName] з [GetCountry('POR').GetName] видав указ, що змушує всіх наших братів [ShowReligionGroupAdjective('muslim')] навернутися до [ShowReligionName('catholic')] або зіткнутися з вигнанням.\n\nЯк побожна [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] країна, ми зобов'язані нашим словом захищати наших братів по вірі, але багато хто стверджує, що це питання не повинно ставити під загрозу наше становище."
  flavor_por.32.a: "Ми повинні подумати про це."
  flavor_por.32.b: "Оголосити їм $jihad$."
  flavor_por.33.title: "Рібейра даш Науш"
  flavor_por.33.desc: "Незважаючи на традицію будівництва кораблів у районі #italic Tercenas#! в [ShowLocationName('lisbon')], нам бракувало належної верфі, на яку заслуговує поселення. Завдяки бажанню нашого [target_character.GetName] побудувати палац #italic Paço da Ribeira#! в районі, де була стара верф, ми тепер можемо звести належну верф в іншому місці.\n\nЦей новий район був названий #italic Ribeira das Naus#! тими, хто працює над його будівництвом, і, схоже, назва прижилася. Нові верфі безумовно допоможуть нам будувати кораблі промисловим способом, збільшуючи наш флот за потреби за короткий час."
  flavor_por.33.a: "Це нам допоможе."
  flavor_por.33.historical_info: "Місце Військово-морського арсеналу, колишня середньовічна військово-морська верф, що називалася «терсенас», зазнало змін під час будівництва королем Мануелом I палацу Пасу да Рібейра. Створення нових терсенас, відомих як «Рібейра даш Науш», на захід від королівського палацу, відіграло вирішальну роль у будівництві кораблів для португальських відкриттів. Ці верфі, найбільші в Португальській імперії, слугували моделлю для закордонних установ, зокрема в Гоа та Кочіні."
  flavor_por.34.title: "Передача [ShowBuildingTypeNameWithNoTooltip('university')] [current_location.GetNameWithNoTooltip]"
  flavor_por.34.desc: "[target_building_type.GetName] [current_location.GetName] спочатку було засновано як [target_building_type.GetNameWithNoTooltip] [target_location.GetName] [founder_of_university.GetName] ще в 1290 році. Йому було дано назву [ShowLawName('por_estudo_geral_law')], і воно залишалося в [target_location.GetRank.GetName] до 1308 року, коли його перенесли туди, де воно знаходиться сьогодні, через конфлікти з місцевими громадянами.\n\nОднак з тих пір ці конфлікти нарешті вщухли, і правління [target_character.GetName] могло б повернути [target_building_type.GetNameWithNoTooltip] до столиці [target_location.GetNameWithNoTooltip]."
  flavor_por.34.a: "Повернути [target_building_type.GetNameWithNoTooltip] до [target_location.GetNameWithNoTooltip]."
  flavor_por.34.b: "Ми не можемо дозволити цим конфліктам відновитися."
  flavor_por.35.title: "Меркантилістські ідеали [target_character.GetNameWithNoTooltip]"
  flavor_por.35.desc: "Один із членів нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle] та палкий прихильник теорії [ShowSocietyDirectionName('mercantilism')], [target_character.GetName], схоже, має багато чудових ідей щодо просування [ROOT.GetCountry.GetAdjective] вітчизняних галузей промисловості. Однак плани [target_character.GetHerHis] вимагатимуть багатьох радикальних змін у законодавстві, що може декого засмутити.\n\nВ основі амбіцій [target_character.GetNameWithNoTooltip] лежить ідея, що жоден [ROOT.GetCountry.GetAdjectiveWithNoTooltip] громадянин не повинен одягатися з використанням іноземних ресурсів. Цей акцент на галузях промисловості [ShowGoodsName('wool')] та [ShowGoodsName('cloth')] чинить великий тиск на [target_location.GetRank.GetName] [target_location.GetName], яке вважається центром [ShowGoodsNameWithNoTooltip('wool')] [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_por.35.a: "Прислухатися до порад [target_character.GetHerHis]!"
  flavor_por.35.b: "Це занадто ризикований план."
  flavor_por.36.title: "Амбіції [target_character.GetNameWithNoTooltip]"
  flavor_por.36.desc: "[ruler_scope.GetName] вважає, що [ROOT.GetCountry.GetLongName] повільно відстає від інших великих держав [ShowContinentName('europe')], зі зменшенням торговельного балансу та поступовою втратою актуальності. Щоб боротися з цим, [ruler_scope.GetHeShe] прагне знайти яскравих зірок для служби у [ruler_scope.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCabinetTitle], щоб привнести нові ідеї. Серед кандидатів — [target_character.GetName], освічений [target_character.GetWomanMan], який подорожував дворами [ShowContinentNameWithNoTooltip('europe')] і має багато політик, які [target_character.GetSheHe] бажає впровадити.\n\nСеред цих політик — аграрна та промислова реформи, а також створення нових компаній для торгівлі багатьма популярними товарами. Все це викличе гнів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], з якими потрібно буде розібратися."
  flavor_por.36.a: "Негайно впровадити ідеї [target_character.GetHerHis]!"
  flavor_por.36.b: "[ruler_scope.GetShortNameWithNoTooltip] має зосередитися на правлінні, а не слухати таких волоцюг."
  flavor_por.37.title: "[target_work_of_art.GetNameWithNoTooltip]"
  flavor_por.37.desc: "Один із наших видатних дослідників, [target_character.GetName], щойно створив твір великої майстерності. Під назвою [target_work_of_art.GetName], це [ShowWorkOfArtTypeName('treatise')] про космографію та навігацію, і він слугує компендіумом [ROOT.GetCountry.GetAdjective] знань про мореплавство та дослідження. Крім того, він детально описує історію наших відкриттів та методи, які були використані для цих відкриттів. Книга присвячена [ruler_scope.GetName], якому було надано можливість ознайомитися з твором до його публікації."
  flavor_por.37.a: "Приховати рукопис, щоб запобігти поширенню цих знань."
  flavor_por.37.b: "Опублікувати це, щоб підвищити наш престиж!"
  flavor_por.38.title: "[target_character.GetNameWithNoTooltip]"
  flavor_por.38.desc: "Наша нещодавня експедиція до $india$ повернулася з вельми цікавим персонажем на борту – [target_character.GetName]. [target_character.GetReligion.GetAdjective] мандрівник [GetCountry('POL').GetAdjective] походження, [target_character.GetSheHe] відзначив [target_character.GetHerselfHimself] знанням багатьох мов, і [target_character.GetSheHe] міг би служити [ROOT.GetCountry.GetGovernment.GetAdjective] тлумачем на сході."
  flavor_por.38.a: "Візьміть [target_character.GetHerHim] на наші кораблі!"
  flavor_por.38.b: "Є багато таких, як [target_character.GetHerHim]."
  flavor_por.39.title: "$por_geral_de_espanha$"
  flavor_por.39.desc: "[target_character.GetName], [ShowTraitName('bastard')] [target_character.GetDaughterSon] [target_character.GetFather.GetName], виявився мудрим [target_character.GetWomanMan] і великим радником [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Нещодавно, після [target_character.GetHerHis] участі у війні проти [GetCountry('MOR').GetLongName], [target_character.GetSheHe] створив велику [ShowWorkOfArtTypeName('chronicle')] про Реконкісту та [ROOT.GetCountry.GetAdjective] роль у ній."
  flavor_por.39.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_por.40.title: "[ShowPolicyNameWithNoTooltip('por_lei_mental')]"
  flavor_por.40.desc: "Боротьба між [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] є справді вічною. Кожен наступний [ROOT.GetCountry.GetGovernment.GetRulerTitle] у певний момент намагався впровадити політику [ShowSocietyDirectionName('centralization')], але часто йому це не вдавалося. Це призвело до сукупності багатьох різних законів, за якими мало хто може активно стежити, створюючи напругу для нашої бюрократії. Щоб покласти край цьому конфлікту, [target_character.GetName] планує запровадити [ShowPolicyName('por_lei_mental')] – визначну політику, яка допоможе покласти край цій боротьбі."
  flavor_por.40.a: "Запровадити закон."
  flavor_por.40.b: "Ми не можемо ризикувати розгнівати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]!"
  flavor_por.41.title: "Спільні родоводи"
  flavor_por.41.desc: "Багато різних домів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] є спільними для нас і нашого сусіда, [target_country.GetLongName]. Це включає найвидатніші династії [ROOT.GetCountry.GetName], зокрема Каштру, Менезеш, Албукерке та багато інших. Така відносна близькість дозволяє членам цих домів взаємодіяти з обома дворами одночасно та перетинати кордони за власним бажанням.\n\nНещодавнім бенефіціаром такого стану справ є [target_character.GetName], чия незгода з політикою [ROOT.GetCountry.GetNameWithNoTooltip] була настільки сильною, що [target_character.GetHeShe] вирішив [target_character.GetHeShe] покинути [ROOT.GetCountry.GetGovernment.GetCourtTitle] і вступити до [target_country.GetLongNameWithNoTooltip]."
  flavor_por.41.a: "Скатертиною дорога!"
  por_reason_for_flavor_por_41: "Якщо ми хочемо уникнути подібного явища в майбутньому, ми повинні будемо забезпечити, щоб [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] була понад #Y 30%#!."
  flavor_por.42.title: "[target_character.GetNameWithNoTooltip] переходить до [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_por.42.desc: "Член [origin_country.GetAdjective] [origin_country.GetGovernment.GetEstateName('nobles_estate')], [target_character.GetName], нещодавно перетнув кордон до [ROOT.GetCountry.GetName] і приєднався до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Причини цього невідомі, але, найімовірніше, це незгода з політикою осіб, що приймають рішення [origin_country.GetNameWithNoTooltip]."
  flavor_por.42.a: "Ласкаво просимо!"
  flavor_por.43.title: "$livro_das_cantigas$"
  flavor_por.43.desc: "[target_character.GetName], що нині мешкає у [target_character.GetHerHis] оселі в Ліламі, [target_location.GetName], є, мабуть, останнім великим трубадуром [ROOT.GetCountry.GetName]. Видатний байстрюк [target_character.GetDaughterSon] [target_character.GetFather.GetName], Короля-Поета, [target_character.GetSheHe] також створив багато #italic кантіг#!. Більше того, [target_character.GetSheHe] доклав багато зусиль, щоб увічнити їх на довгі роки, уклавши [target_work_of_art.GetName] – пісенник, що містить незліченну їх кількість. Відчуваючи наближення [target_character.GetHerHis] останніх днів, [target_character.GetSheHe] присвячує цю музичну збірку [target_character.GetHerHis] племіннику, [target_dedication_character.GetName] з [target_country.GetName]."
  flavor_por.43.a: "Вшанувати [target_character.GetHerHis] волю."
  flavor_por.43.b: "Ми повинні це зберегти!"
  flavor_por.44.title: "$flavor_por.43.title$"
  flavor_por.44.desc: "Чудова музична збірка, [target_work_of_art.GetName], була подарована її автором, [target_character.GetName], [target_dedication_character.GetName] з [target_country.GetName]. Ми дуже задоволені цим дивовижним витвором мистецтва!"
  flavor_por.44.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_por.45.title: "[ShowGovernmentReformNameWithNoTooltip('por_ordinances')]"
  flavor_por.45.desc: "Складне переплетення канонічних, римських та державних законів виявляється особливою проблемою для управління [ROOT.GetCountry.GetFlavorRank]. Щоб боротися з такою серйозною неефективністю, [target_character.GetName] вирішив створити нову збірку та формалізацію законів як [ShowGovernmentReformName('por_ordinances')]. Її буде скопійовано тисячі разів і розповсюджено по всій державі, забезпечуючи ефективніше управління."
  flavor_por.45.a: "Продовжити реформу."
  flavor_por.45.b: "Ми не готові до таких змін наразі."
  por_upgrade_ordinances: "[Concept('modifiers', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('por_ordinances')] буде змінено на #g +50.0%#!. Однак кількість [ShowGoodsName('paper')], яку вимагають наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], подвоїться."
  flavor_por.46.title: "[ShowInstitutionNameWithNoTooltip('printing_press')] та [ShowGovernmentReformNameWithNoTooltip('por_ordinances')]"
  flavor_por.46.desc: "З появою [ShowInstitutionName('printing_press')] ми отримуємо чудову нагоду оптимізувати розповсюдження [ShowGovernmentReformName('por_ordinances')]. Крім того, рукопис можна було б додатково консолідувати, і ми могли б запровадити кілька реформ, щоб позбутися багатьох застарілих законів, які втратили свою актуальність за останні десятиліття. Це було б великим успіхом для [ROOT.GetCountry.GetFlavorRank], але це коштувало б значних витрат."
  flavor_por.46.a: "Замовити нове видання."
  flavor_por.46.b: "Поточна система цілком задовільна."
  flavor_por.47.title: "Мізерікордія"
  flavor_por.47.desc: "Дотепер турбота про бідних і хворих здійснювалася установами, відомими як #italic albegarias#! та #italic hospitais#!. Однак це може скоро змінитися, оскільки кілька міщан [target_location.GetName] нещодавно заснували нове братство під назвою [ShowModifier('por_misericordia')]. На відміну від багатьох подій, більшість представників станів висловили повну підтримку цій організації та вступили до її лав, поширюючи її по всій [ROOT.GetCountry.GetName]. Останнім, хто ще не висловив свою думку щодо братства, є [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_por.47.a: "Надати йому покровительство!"
  flavor_por.47.b: "Ми маємо деякі сумніви."
  flavor_por.48.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] у [target_location.GetNameWithNoTooltip]"
  flavor_por.48.desc: "[ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] стали частими відвідувачами [target_location.GetName], що спонукало губернаторів надати їм додаткові привілеї. Це перетворило [target_location.GetRank.GetName] на одного з наших основних партнерів у Північній [ShowContinentName('europe')]. Таким чином, багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] просить нас побудувати новий [ShowBuildingTypeName('trade_office')] у [target_location.GetNameWithNoTooltip]."
  flavor_por.48.a: "Створити [ShowBuildingTypeNameWithNoTooltip('trade_office')]."
  flavor_por.48.b: "Натомість зосередитися на внутрішньому будівництві."
  flavor_por.49.title: "[target_character.GetNameWithNoTooltip]"
  flavor_por.49.desc: "[target_character.GetName] здобув чималу славу при [ROOT.GetCountry.GetGovernment.GetCourtTitle] завдяки [target_character.GetHerHis] таланту до письма. Насправді, [target_character.GetSheHe] створив багато історичних праць для вивчення майбутніми поколіннями, а завдяки [target_character.GetHerHis] участі у багатьох ключових подіях [ROOT.GetCountry.GetAdjective] недавньої історії, багато хто впевнений, що [target_character.GetSheHe] є правильною [target_character.GetWomanMan] для посади архіваріуса та хроніста."
  flavor_por.49.a: "Призначити [target_character.GetShortNameWithNoTooltip] головним хроністом."
  flavor_por.49.b: "Ми не надто вражені."
  flavor_por.50.title: "Верховенство над орденами"
  flavor_por.50.desc: "Епоха [target_religion.GetAdjective] [ShowGovernmentReformName('military_order_reform')] добігає кінця. Різні ордени мають все менше членів, і бути частиною одного з них вже не так престижно, як раніше. Таким чином, нам вдалося отримати дозвіл від [GetCountry('PAP').GetGovernment.GetRulerTitle] на призначення [target_character.GetName] Великим Магістром різних орденів, і тепер ми маємо над ними абсолютну владу."
  flavor_por.50.a: "Підпорядкувати їх нашому прямому контролю."
  flavor_por.50.b: "Розпустити ордени!"
  flavor_por.51.title: "Сан-Жоржі-да-Міна"
  flavor_por.51.desc: "Під час нашого нещодавнього плавання в [ShowAreaName('gulf_of_africa_sea')] ми зустріли групу тубільців у [target_location.GetName]. Хоча такі випадки досить поширені, цей був примітний тим, що вони були надто раді торгувати [ShowGoodsName('goods_gold')]. Це спонукало нашу експедицію встановити #italic padrão#! та розпочати будівництво невеликого форпосту. Однак готовність тубільців торгувати таким дорогоцінним товаром означає, що поблизу має бути набагато більше багатих джерел [ShowGoodsNameWithNoTooltip('goods_gold')], і встановлення більшої присутності може бути вигідним."
  flavor_por.51.a: "Ми повинні продовжувати цю торгівлю."
  flavor_por.51.b: "Ми знайдемо інше джерело [ShowGoodsNameWithNoTooltip('goods_gold')]."
  flavor_por.52.title: "Навігатор"
  flavor_por.52.desc: "[target_character.GetName] справді відзначив [target_character.GetHerselfHimself] серед усіх #italic infantes#! [ROOT.GetCountry.GetName]. Слід сказати, що [target_character.GetShortNameWithNoTooltip] є справжнім візіонером, який вірить, що дослідження – це майбутнє [ROOT.GetCountry.GetLongName], і тому готовий витратити значну частину [target_character.GetHerHis] статку на фінансування амбітних місій через [ShowRegionName('north_atlantic_ocean_region')]. Можливо, щоб ще більше заохотити ці починання, [target_character.GetSheHe] слід надати монополію."
  flavor_por.52.a: "Надати монополію!"
  flavor_por.52.b: "Ми цінуємо [target_character.GetHerHim], але не настільки."
  flavor_por.53.title: "[target_character.GetNameWithNoTooltip]"
  flavor_por.53.desc: "Один з наших моряків та учасник попередніх дослідницьких місій, [target_character.GetName] нещодавно здобув значну прихильність [ROOT.GetCountry.GetGovernment.GetRulerTitle]. [target_character.GetSheHe|U] отримав багато нових підвищень та щомісячну допомогу в очікуванні [target_character.GetHerHis] подальших проєктів. Багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажає, щоб [target_character.GetHerHim] став нашим наступним керівником місії."
  flavor_por.53.a: "Нам потрібен [target_character.GetHerHim] на чолі наших експедицій!"
  flavor_por.53.b: "Натомість ми повинні зосередитися на суші."
  flavor_por.54.title: "Формування терцій"
  flavor_por.54.desc: "Нові формування народжуються з постійних воєн у [ShowContinentName('europe')]. Одне з них, знамените [ShowAdvanceName('tercio')], є формуванням, давно бажаним у [ROOT.GetCountry.GetName], і [target_character.GetName] бажає використовувати їх у наших флотах, а не для домінування на суші."
  flavor_por.54.a: "Вони послужать чудовими морськими піхотинцями."
  flavor_por.54.b: "Використаймо їх натомість у сухопутній війні."
  flavor_por.54.historical_info: "На відміну від своїх іспанських колег, португальці використовували терції як морську силу. Ці терції згодом служили в битві при Алкасер-Кібірі проти османських і марокканських військ, і врешті-решт стали португальським корпусом морської піхоти."
  flavor_por.55.title: "[ShowBuildingTypeNameWithNoTooltip('por_feitoria')] [target_location.GetNameWithNoTooltip]"
  flavor_por.55.desc: "[target_location.GetName] розглядається [target_character.GetName] як життєво важливе місце для [ShowBuildingTypeName('por_feitoria')]. Як проміжна точка між [ShowRegionName('maghreb_region')] та [ShowRegionName('guinea_region')], вона могла б слугувати чудовим плацдармом, а також винятковим торговим форпостом. Отже, указ про перетворення [target_location.GetRank.GetName] на нову [ShowBuildingTypeNameWithNoTooltip('por_feitoria')] був би дуже вигідним."
  flavor_por.55.historical_info: "Аргім, перша факторія португальців на Африканському континенті, служив важливим торговим портом для рабів та золота, які вважалися особливо важливими. Він мав кілька переваг, а саме: його було легко захищати, він мав безпечну якірну стоянку, а територія, де він був розташований, часто відвідувалася транссахарськими торговцями для отримання солі. Однак він не отримав стільки уваги від корони, як інші факторії, і врешті-решт перейшов під голландське правління в 1633 році, коли сорок солдатів взяли під контроль форт там."
  flavor_por.55.a: "Це буде невеликий крок до великої мети."
  flavor_por.55.b: "Немає потреби створювати там [ShowBuildingTypeNameWithNoTooltip('por_feitoria')]."
  flavor_por.56.title: "[ShowBuildingTypeNameWithNoTooltip('por_feitoria')] [target_location.GetNameWithNoTooltip]"
  flavor_por.56.desc: "Відтоді, як ми придбали [target_location.GetRank.GetName] [target_location.GetName], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] бажали розширити свій вплив у $china$. Вони запропонували побудувати там [ShowBuildingTypeName('por_feitoria')], про що [target_character.GetName] вже думав."
  flavor_por.56.historical_info: "Отриманий від Мінь у 1557 році, Макао пережив свій золотий вік під португальським правлінням. Його розташування в Азії та торгівля з Китаєм дозволили короні, а також єзуїтам вкладати свої ресурси в порт, що призвело до процвітання торгівлі Нанбан до спаду торгівлі з Японією."
  flavor_por.56.a: "Ми повинні збільшити наш вплив у $china$."
  flavor_por.56.b: "Шляхи вільної торгівлі будуть тим, як ми здобудемо цей вплив."
  flavor_por.57.title: "Захист торгівлі в [target_location.GetNameWithNoTooltip]"
  flavor_por.57.desc: "Щоб належним чином спрямувати ресурси до [ROOT.GetCountry.GetCapital.GetMarket.GetName], ми повинні захистити порт [target_location.GetName]. [target_character.GetName] запропонував нам побудувати там [ShowBuildingTypeName('por_feitoria')], збільшивши вплив наших [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] в $india$."
  flavor_por.57.historical_info: "Придбана Афонсу де Альбукерке у 1510 році, Гоа служила базою для завоювань Малакки та Ормуза. Будучи головною військово-морською базою Португалії в Індійському океані, вона сприяла торгівлі прянощами та дозволяла широку португальську морську присутність."
  flavor_por.57.a: "Це чудова ідея."
  flavor_por.57.b: "[target_location.GetNameWithNoTooltip] призначений лише для торгівлі наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_por.58.title: "Укріплення [target_location.GetNameWithNoTooltip]"
  flavor_por.58.desc: "Острів [target_location.GetName] був визнаний важливим портом для нашої торгівлі в [ShowContinentName('asia')] через його розташування в [ShowLocationName('persian_gulf')]. [target_character.GetName] бажає зміцнити [target_location.GetRank.GetName] за допомогою [ShowBuildingTypeName('por_feitoria')], дозволяючи нашим [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] далі поширювати свою владу в сусідніх районах."
  flavor_por.58.historical_info: "Під час швидкого завоювання Ормуза під проводом Афонсу де Альбукерке, острів був під загрозою захоплення Сефевідами та Османами. Щоб цього не сталося, він побудував форт Носса Сеньора да Консейсан. Це дозволило Португалії зберігати контроль над Перською затокою до 1622 року, коли Сефевіди та Британська Ост-Індська компанія захопили його у них."
  flavor_por.58.a: "Ми зміцнимо [target_location.GetNameWithNoTooltip]."
  flavor_por.58.b: "Його природного положення достатньо."
  flavor_por.59.title: "Контроль над протоками [target_location.GetNameWithNoTooltip]"
  flavor_por.59.desc: "Щоб забезпечити наш безперервний доступ до торгівлі у східній [ShowContinentName('asia')], порт [target_location.GetName] потрібно буде укріпити. Вже зараз [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] готують кошти для цього заходу, дозволяючи побудувати там [ShowBuildingTypeName('por_feitoria')]."
  flavor_por.59.historical_info: "Малакка впала перед португальцями під час їхньої облоги у 1511 році. Під проводом Афонсу де Альбукерке йому вдалося захопити місто, яке стало одним з найважливіших форпостів Португалії. Знаючи, що сусідні держави спробують захопити протоку для себе, її було сильно укріплено, щоб цього не сталося. Малакка залишалася під португальським контролем до 1641 року, коли голландці змогли захопити порт."
  flavor_por.59.a: "Укріпимо протоки."
  flavor_por.59.b: "Немає потреби цього робити."
  flavor_por.60.title: "Далека фортеця"
  flavor_por.60.desc: "[target_location.GetName] була однією з наших найкращих баз для досліджень у [ShowRegionName('north_atlantic_ocean_region')] та [ShowRegionName('south_atlantic_region')]. Однак [target_location.GetRank.GetName] можна було б розширити, оскільки важливість західних маршрутів лише зростає. Саме з цієї причини [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонував вкласти додаткові кошти в порт."
  flavor_por.60.historical_info: "Завдяки своєму розташуванню як для дослідників, так і для купців, Ангра підняла своє становище в короні Португалії. Еліти фламандського, іспанського та генуезького походження допомагали сприяти її швидкому розвитку, все це очолював один заможний купець, відомий як Лукас де Касена. Лише на початку 1500-х років Жуан III вирішив піднести її до статусу міста."
  flavor_por.60.a: "Давайте інвестуємо в [target_location.GetNameWithNoTooltip]."
  flavor_por.60.b: "Ці кошти можна було б використати краще."
  flavor_por.61.title: "Усі погляди на [target_location.GetNameWithNoTooltip]"
  flavor_por.61.desc: "Щоб створити належну базу в [ShowRegionName('maghreb_region')], [target_character.GetName] консультувався з [ROOT.GetCountry.GetGovernment.GetCourtTitle], а також з військовою радою. Усі ідеї, здається, сходяться на завоюванні [target_location.GetName] для досягнення цієї мети. Ми можемо піти на війну з [target_country.GetName] і претендувати на [target_location.GetRank.GetName], але існує ризик приниження на полі бою."
  flavor_por.61.historical_info: "Невдовзі після перемоги в битві при Алжубарроті тодішній король Португалії Жуан I почав готуватися до експедиції із захоплення Сеути, щоб належним чином контролювати торгівлю, яку вона забезпечувала з Левантом, Єгиптом та Лівією. У швидкій війні вони змогли захопити місто, що ознаменувало початок Португальської імперії."
  flavor_por.61.a: "Ми вирушимо вперед і завоюємо."
  flavor_por.61.b: "Можливо, натомість ми зможемо здобути певний контроль через мир."
  flavor_por.62.title: "Амбіції [target_character.GetNameWithNoTooltip]"
  flavor_por.62.desc: "[target_character.GetName] звернувся до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], бажаючи підтримки в одній з [target_character.GetHerHis] найамбітніших ідей. Бажаючи зібрати флот кораблів для великої подорожі, [target_character.GetHeShe] прагне повністю обігнути земну кулю. Ця ідея досить смілива, але відмова такому [target_character.GetWomanMan] потенційно може призвести до того, що інші переманять [target_character.GetHerHim]."
  flavor_por.62.historical_info: "$flavor_por_magellan_historical_info$"
  flavor_por.62.a: "Негайно усуньмо [target_character.GetHerHim] з [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_por.62.b: "Відкидати такі амбіції було б марною тратою..."
  flavor_por_magellan_historical_info: "Експедиція Фернана де Магеллана, мабуть, одна з найвідоміших з Іберії. Спочатку він служив у Португальській Ост-Індії, допомагаючи Афонсу де Альбукерке в завоюванні Малакки. Однак після цього він почав планувати експедицію для пошуку Островів Прянощів. Незважаючи на те, що багато його пропозицій були відхилені королем Португалії, він вирішив спробувати щастя з Карлом I Іспанським, де він отримав би бажану підтримку."
  flavor_por.64.title: "Захист [target_location.GetNameWithNoTooltip]"
  flavor_por.64.desc: "Щоб належним чином забезпечити торговельні шляхи в [ShowRegionName('guinea_region')], [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонував звести [ShowBuildingTypeName('por_feitoria')] у [target_location.GetName]. [target_location.GetRank.GetName] був схвалений як [target_character.GetName], так і [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]. З цієї причини будь-які плани щодо укріплення цього місця отримають широку підтримку."
  flavor_por.64.historical_info: "Замок Ельміна є найвідомішою факторією в Африці. Заснований у 1481 році Енріке Мореплавцем, його план полягав у контролі торговельного шляху з Індії до Європи вздовж Золотого Берега. Багато торговців стікалися туди, як європейського, азійського, так і африканського походження. Португалія зберігала контроль над цією факторією до 1637 року, коли її захопили голландці."
  flavor_por.64.a: "Це слушна ідея."
  flavor_por.64.b: "Контролювати вітри торгівлі? Нехай вітри дмуть природно."
  flavor_por.1000.title: "Захоплення «Санта-Катаріни»"
  flavor_por.1000.desc: "Один з наших кораблів був захоплений підлими [ShowCultureName('low_franconian')] купцями. Адмірал, який піднявся на борт нашого корабля, заявляє про його приналежність до їхнього підприємства під приводом того, що моря вільні, і тому кожен має право претендувати на корабель. Тим часом наші купці стверджують, що «Санта-Катаріна» стояла на якорі в португальських водах, і закликають нас вимагати повернення корабля та вантажу."
  flavor_por.1000.a: "Вимагати повернення вантажу!"
  flavor_por.1000.b: "Не наполягати на цьому."
  flavor_por.1000.historical_info: "Португальська карака «Санта-Катаріна» була захоплена в лютому 1603 року біля узбережжя Сінгапуру трьома кораблями Голландської Ост-Індської компанії (V.O.C.). Вантаж, вартістю 2,2 мільйона гульденів, подвоїв капітал V.O.C., але законність утримання здобичі була сумнівною за голландським законодавством і призвела до протестів з боку Португалії. Цей інцидент став однією з причин Голландсько-португальської війни, що тривала між 1602 і 1663 роками."
  flavor_por.1001.title: "Захоплення «Санта-Катаріни»"
  flavor_por.1001.desc: "$flavor_por.5.desc$"
  flavor_por.1001.a: "Вантаж по праву наш!"
  flavor_por.1001.b: "Повернути вантаж"
  flavor_por.1002.title: "Голландці утримують вантаж"
  flavor_por.1002.desc: "Голландці відмовляються повернути захоплений вантаж з «Санта-Катаріни»!"
  flavor_por.1002.a: "Вони вимагають війни..."
  flavor_por.1003.title: "Повернення голландського вантажу"
  flavor_por.1003.desc: "Голландці визнали обґрунтованість нашого протесту та погодилися повернути вантаж."
  flavor_por.1003.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_por.2000.title: "[target_character.GetNameWithNoTooltip] приєднується до [ROOT.GetCountry.GetGovernment.GetCourtTitle|U]"
  flavor_por.2000.desc: "Одна з [target_country.GetAdjective] придворних, [target_character.GetName], нещодавно прибула до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Кажуть, вона є фрейліною нареченої одного з важливих радників [ROOT.GetCountry.GetName]. Сама по собі це не надто цікава новина. Але найцікавіше те, що, схоже, [target_character2.GetName] палко закоханий у [target_character.GetHerHim]."
  flavor_por.2000.a: "Сподіваємося, це лише тимчасово."
  flavor_por.2001.title: "Любовний роман"
  flavor_por.2001.desc: "По [ROOT.GetCountry.GetGovernment.GetCourtTitle] поширилися чутки, що [target_character2.GetName], спадкоємець престолу [ROOT.GetCountry.GetName], по-справжньому захопився [target_character.GetName], яка, схоже, відповідає йому взаємністю. Вони вже обмінялися численними любовними листами та мали кілька таємних зустрічей. Негативний розголос цього роману серйозно вплинув на легітимність династії [target_character2.GetDynasty.GetName], і попри спроби розлучити їх, ці закохані пташки все одно підтримують регулярний контакт."
  flavor_por.2001.a: "Напевно, вони набриднуть одне одному."
  flavor_por.2002.title: "Вплив Дому [target_character.GetDynasty.GetNameWithNoTooltip]"
  flavor_por.2002.desc: "Родичі [target_character.GetName] з Дому [target_character.GetDynasty.GetName], схоже, здобули вроджену довіру [target_character2.GetName] і стали [target_character2.GetHisHer] найближчими радниками. Дозволити такій могутній династії з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] диктувати нашу майбутню політику — принизливо і відверто небезпечно. Вважається, що ці родичі намагаються переконати [target_character2.GetNameWithNoTooltip] навіть претендувати на трон нашого сусіда, що може стати небезпечним."
  flavor_por.2002.a: "Досить, [target_character.GetNameWithNoTooltip] має померти."
  flavor_por.2002.b: "Нічого не можна зробити."
  flavor_por.2003.title: "Вбивство [target_character.GetNameWithNoTooltip]"
  flavor_por.2003.desc: "Як було наказано, наші вбивці увійшли до [ShowBuildingTypeName('monastery')], де мешкає [target_character.GetName], і без вагань виконали наказ, безжально вбивши [target_character.GetHerHim] на очах у інших мешканців та [target_character.GetHerHis] родини.\n\nНевідомо, чи був [target_character2.GetName] сповнений гніву чи горя, коли [target_character2.GetSheHe] дізнався про новину. Однак, безсумнівно, [target_character2.GetNameWithNoTooltip] точно знає, хто замовив цю страту, і прагне [target_character2.GetHerHis] помсти."
  flavor_por.2003.a: "Так має бути."
  flavor_por.2004.title: "Відкритий непослух"
  flavor_por.2004.desc: "Тепер відомо, що [target_character2.GetName] планував як [target_character2.GetHerHis] відплату. В акті відкритого непослуху до [target_character2.GetHerHis] батька, [target_character2.GetSheHe] очолив повстання [target_rebel.GetName], щоб скинути нібито тиранічного [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Це вийшло з-під нашого контролю, можливо, настав час зректися престолу."
  flavor_por.2004.a: "Цей лиходій не має шансів проти наших армій!"
  flavor_por.2004.b: "Нехай [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] зречеться престолу."
  flavor_por.2005.title: "Вступ на престол [target_character.GetNameWithNoTooltip]"
  flavor_por.2005.desc: "Тепер, коли [target_character.GetName] є [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_character.GetSheHe] вільний робити все, що [target_character.GetSheHe] забажає. А [target_character.GetSheHe] бажає вшанувати [target_character.GetHerHis] померлого коханого, [dead_lover.GetName]. Згодом [target_character.GetSheHe] провів грандіозну процесію від нинішнього місця поховання [dead_lover.GetShortNameWithNoTooltip] до новоствореного мавзолею, щоб [dead_lover.GetSheHe] міг спочивати у гідному місці. Крім того, офіційним едиктом [target_character.GetSheHe] оголосив, що [target_character.GetSheHe] таємно одружився з [dead_lover.GetNameWithNoTooltip] і що шлюб був офіційним. Тепер [target_character.GetShortNameWithNoTooltip] прагне відновити справедливість щодо вбивць."
  flavor_por.2005.a: "О, драма!"
  flavor_por.2006.title: "Справедливість відновлено"
  flavor_por.2006.desc: "Нарешті, [target_character.GetName] нарешті може здійснити правосуддя над убивцями [dead_lover.GetName]. Після місяців невпинної погоні [target_character.GetSheHe] зміг захопити останніх живих убивць і урочисто стратив їх. Серця вбивць були вирвані з їхніх холодних тіл, щоб символізувати, що вони ніколи їх і не мали. Сподіваємося, це останній приклад такої жорстокості, яку побачать від [target_character.GetNameWithNoTooltip]."
  flavor_por.2006.a: "Воістину трагічна історія."
  flavor_por.2007.title: "[target_character.GetDynasty.GetNameWithNoTooltip]"
  flavor_por.2007.desc: "Ми були абсолютно праві щодо шкідливого впливу династії [target_character.GetDynasty.GetName] на [target_character2.GetName]. Дотримуючись їхньої жахливої поради, [target_character2.GetSheHe] за власною ініціативою організував(ла) дезорганізовану кампанію проти наших сусідів і зумів(ла) потрапити в полон. Хоча [target_character2.GetSheHe] вдалося уникнути подальших неприємностей, заплативши викуп, приниження, яке ми пережили, є справді жахливим."
  flavor_por.2007.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_por.2100.title: "Контакт із [target_character2.GetNameWithNoTooltip]"
  flavor_por.2100.desc: "Наші відносини з [target_country.GetName] останнім часом страждають. [target_character.GetName] також помітив(ла) це і бажає виправити цей факт. Ми можемо досягти цього, надіславши листа [target_character2.GetName], в якому йдеться про [ROOT.GetCountry.GetAdjective] культуру та релігію. Можливо, це зацікавить [target_country.GetGovernment.GetRulerTitle] у більш дружніх стосунках."
  flavor_por.2100.historical_info: "Хоча такі плани ніколи не були повністю реалізовані, на початку XVI століття перський Шах контактував з португальцями. Бажаючи укласти з ними союз, тодішній Шах, Ісмаїл I, розглядав можливість переходу в католицизм, щоб забезпечити такий союз. Однак, перш ніж будь-яка угода була укладена, він помер, залишивши позаду всі надії на португальсько-сефевідський союз."
  flavor_por.2100.a: "Давайте викладемося на повну з цим листом!"
  flavor_por.2100.b: "Достатньо було б просто дружніх листів."
  por_persia_glorify_jesus_tt: "Ми обміняємося повідомленням з [target_country.GetName] про #Y Ісуса#!. Це може призвести до того, що їхній [target_country.GetGovernment.GetRulerTitle] зацікавиться [ROOT.GetCountry.GetReligion.GetName]"
  flavor_por.2101.title: "Лист від [prev_country.GetNameWithNoTooltip]"
  flavor_por.2101.desc: "[prev_country.GetGovernment.GetRulerTitle] з [prev_country.GetName] надіслав(ла) нам листа. У ньому йдеться про славу [prev_country.GetNameWithNoTooltip] та їхню культуру. Наголошуючи на [prev_country.GetAdjectiveWithNoTooltip] культурі та [prev_country.GetReligion.GetName], він заглиблюється в просування Ісуса Христа, але [target_character.GetName] також бажає отримати відповідь від [target_character2.GetName] в надії на встановлення дружніших стосунків."
  flavor_por.2101.historical_info: "$flavor_por.2100.historical_info$"
  flavor_por.2101.a: "Давайте встановимо ці дружні стосунки."
  flavor_por.2101.b: "Хвалите себе замість нас? Що це за глузування?"
  flavor_por.2101.c: "Знаєте, можливо, цей Ісус Христос був справжнім пророком."
  flavor_por.2200.title: "Набуття торгівлі в [ShowRegionNameWithNoTooltip('japan_region')]"
  flavor_por.2200.desc: "Відколи ми натрапили на [ShowRegionName('japan_region')], наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] виявили особливий інтерес до створення там торгового форпосту. Бажаючи поговорити з [target_character2.GetName] з цього приводу, можливо, ми зможемо створити торговельну мережу в усій морській [ShowContinentName('asia')], розширивши там свій вплив."
  flavor_por.2200.a: "Варто спробувати."
  flavor_por.2200.b: "Ось чому ми завоюємо [target_location.GetNameWithNoTooltip]."
  por_nanban_owner_must_accept_tt: "Власник [target_location.GetName] повинен прийняти нашу пропозицію, щоб ефекти набули чинності"
  flavor_por.2201.title: "Пропозиція від [prev_country.GetNameWithNoTooltip]"
  flavor_por.2201.desc: "[prev_country.GetGovernment.GetRulerTitle] з [prev_country.GetName] запропонував(ла) нам велику суму золота в обмін на портові права в [target_location.GetName]. Хоча ми могли б погодитися, це, безсумнівно, призведе до ослаблення нашого комерційного впливу в [ShowRegionName('japan_region')], хоча це підштовхнуло б нас до більш [ShowSocietyDirectionName('outward')] напрямку."
  flavor_por.2201.a: "Ми з радістю візьмемо золото."
  flavor_por.2201.b: "Цим [prev_country.GetAdjectiveWithNoTooltip] негідникам не можна довіряти."