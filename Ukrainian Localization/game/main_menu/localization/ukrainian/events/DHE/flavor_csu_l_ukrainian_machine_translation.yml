l_english:
  flavor_csu.100.title: "[ShowBuildingTypeNameWithNoTooltip('panaqa_building')] [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_csu.100.desc: "Зі смертю нашого останнього великого монарха королівська родина розподілила наші землі між старими [ShowBuildingTypeName('panaqa_building')]. Знову цикл розпочався наново, і нинішній [ROOT.GetCountry.GetGovernment.GetRulerTitle] має встановити [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] власну спадщину через завоювання."
  flavor_csu.100.a: "Як це наш звичай."
  add_panaqas_to_every_location_tt: "#R Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowBuildingTypeName('panaqa_building')].#!"
  flavor_csu.200.title: "Найкраща #italic aqha#! в Андах"
  flavor_csu.200.desc: "[concubine_poisoner.GetName], дружина нашого правителя, відома як одна з найкращих пивоварів #italic aqha#! в [ShowAreaName('acamama_area')]; її здатність перетворювати кукурудзяні зерна на смачний напій була однією з приємних умов, що допомогли укласти королівський шлюб між [ROOT.GetCountry.GetName] та [GetCountry('AYA').GetName], незважаючи на їхню довгу історію суперництва та прикордонних конфліктів.\n\nСьогодні [concubine_poisoner.GetShortNameWithNoTooltip] знову приготувала свою знамениту #italic aqha#!. Чи варто [ROOT.GetCountry.GetGovernment.GetRuler.GetName] насолоджуватися нею, як завжди?"
  flavor_csu.200.a: "Випити!"
  flavor_csu.200.b: "Вона щось замишляє! Вигнати її!"
  flavor_csu.200.c: "Напій отруєно. Затримати її!"
  flavor_csu.200.tt.c: "Змусити її зникнути тихо."
  flavor_csu.201.title: "Зрада!"
  flavor_csu_201_desc: "[concubine_poisoner.GetName] отруїла #italic aqha#! нашого [qusqu_ruler.GetName], і до того часу, як охоронці прийшли на допомогу [qusqu_ruler.GetHerHim], [qusqu_ruler.GetSheHe] вже лежав мертвий на підлозі тронної зали."
  flavor_csu.201.desc.a: "$flavor_csu_201_desc$\n\nАле підступність на цьому не закінчується, оскільки воїн [usurper_inka.GetName] скористався нагодою і замість покарання отруйниці [usurper_inka.GetSheHe] викрав трон для [usurper_inka.GetHerselfHimself] і почав називати [usurper_inka.GetHerselfHimself] #italic Sapa Inka#!"
  flavor_csu.201.tt.a: "У напою дивний присмак..."
  flavor_csu.201.desc.b: "$flavor_csu_201_desc$\n\nПідступну жінку схопили охоронці, і лише її статус принцеси [GetCountry('AYA').GetName] врятував її від ножа.\nЩо з нею робити?"
  flavor_csu.201.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] мертвий, хай живе [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_csu.201.b: "Зрадники! [old_heir.GetNameWithNoTooltip] – справжній [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  hanan_qusqu_rebels: "Повстанці Ханан Куско"
  hurin_qusqu_rebels: "Повстанці Хурін Куско"
  flavor_csu.201.c: "Вигнати її!"
  flavor_csu.201.d: "Помститися за нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_csu.202.title: "Наслідки"
  flavor_csu.202.desc: "Після того, як пил осів і наш новий [ROOT.GetCountry.GetGovernment.GetRuler.GetName] забезпечив [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] владу та нове становище [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] династії, настав час вирішити, що робити з родиною [ShowDynastyName('hurin_qusqu_dynasty')].\n\nЇхні зв'язки та досвід як священиків і бюрократів все ще можуть бути дуже корисними, але будь-які образи, що залишилися, можуть стати проблемою, якщо вони збережуть владні позиції в [ROOT.GetCountry.GetFlavorRank]."
  flavor_csu.202.a: "Вони збережуть лише свої обов'язки перед #italic Inti#!."
  flavor_csu.202.b: "Дурниці! Вигнати їх, як собак!"
  flavor_csu.202.c: "Ніхто не сміє загрожувати [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Убити їх усіх!"
  hurin_qusqu_privilege: "Верховне жрецтво Хурін Куску"
  hurin_qusqu_privilege_desc: "Хурін Куску зберігають обов'язок і привілей служити Інті безпосередньо як #italic Віллак Уму#!, Верховний Жрець Інті."
  flavor_csu.210.title: "Підступний план"
  flavor_csu.210.desc: "Наш радник [minister.GetName] представив нам можливість завдати удару нашим ненависним сусідам з [GetCountry('CSU').GetName]. [minister.GetHeShe|U] вдалося впровадити агента до їхнього двору та отримати доступ до [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] [kidnapped_heir.GetName]. Якщо ми вирішимо діяти, ми легко зможемо взяти [kidnapped_heir.GetHimHer] під нашу опіку та доставити [kidnapped_heir.GetHimHer] до [ROOT.GetCountry.GetCapital.GetName]. Як тільки справа буде зроблена, ми зможемо викупити [kidnapped_heir.GetHimHer] у [GetCountry('CSU').GetGovernment.GetRuler.GetName]."
  flavor_csu.210.a: "Дійте."
  flavor_csu.210.b: "Ми не монстри! Залиште двір."
  flavor_csu.211.title: "Викрадений спадкоємець"
  flavor_csu.211.desc: "Чудовисько, що править [GetCountry('AYA').GetName], [GetCountry('AYA').GetGovernment.GetRuler.GetName], надіслало агентів до нашої столиці. Їм вдалося викрасти нашого [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] [kidnapped_heir.GetName] і втекти з [kidnapped_heir.GetHimHer] назад до свого лігва в [ROOT.GetCountry.GetCapital.GetName]. Тепер вони вимагають велику суму золота в обмін на повернення [kidnapped_heir.GetHimHer] нам."
  flavor_csu.211.a: "Заплатити викуп."
  flavor_csu.211.b: "Ми не дамо їм того, чого вони прагнуть."
  flavor_csu.212.title: "Золото прибуває"
  flavor_csu.212.desc: "Боягузи з [GetCountry('CSU').GetName] нарешті здалися і надіслали золото, яке ми вимагали."
  flavor_csu.212.a: "Повернути дитину."
  flavor_csu.212.b: "Ідіоти! Ми залишимо обох."
  flavor_csu.213.title: "Зла дитина"
  flavor_csu.213.desc: "З моменту прибуття [GetCountry('CSU').GetAdjective] дитини до [ROOT.GetCountry.GetCapital.GetName] придворні нервували. Дитина не переставала плакати та скиглити з моменту [kidnapped_heir.GetHisHer] прибуття, до того, що їхні тюремники кажуть, що [kidnapped_heir.GetHeShe] почала плакати кривавими сльозами. Слуги палацу вірять, що дитина одержима злим духом і що [GetCountry('CSU').GetAdjectiveWithNoTooltip] правитель знав про це, і саме тому вони не намагалися її повернути."
  flavor_csu.213.a: "Поверніть цю злу дитину до [kidnapped_heir.GetHisHer] лігва, перш ніж щось інше станеться."
  flavor_csu.213.b: "Дурниці забобонних слуг."