l_english:
  flavor_ven.1.title: "Еволюція Комуни [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ven.1.desc: "Протягом багатьох століть Комуна [ROOT.GetCountry.GetName] — а з нею і Рада Сорока — служила [ROOT.GetCountry.GetFlavorRank] як верховний орган управління, водночас перетворюючи [ROOT.GetCountry.GetGovernment.GetRulerTitle] дедалі більше на номінального главу нації. Природно, такий розвиток подій суперечив намірам обраних правителів, які прагнули відігравати значну роль у внутрішній політиці держави.\n\nОскільки нові реформи знаходять свій шлях у [ROOT.GetCountry.GetAdjectiveWithNoTooltip] бюрократії, стара Комуна, а також Рада Сорока опинилися в положенні застарілих. Багато обов'язків ради було передано [ROOT.GetCountry.GetGovernment.GetParliament.GetName], а комуна більше не є адекватною для задоволення зростаючих бюрократичних потреб держави. Настав час повністю замінити обидві інституції новим урядовим органом, який також активніше залучає [ROOT.GetCountry.GetGovernment.GetRulerTitle] до внутрішньої політики."
  flavor_ven.1.a: "Створимо Синьйорію [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_ven.1.b: "Ми повинні ретельно обміркувати цей акт з [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  flavor_ven.2.title: "Стратіоти!"
  flavor_ven.2.desc: "Після падіння [ShowLocationName('constantinople')] велика кількість [ShowCultureName('greek_culture')|U] та [ShowCultureName('albanian')|U] солдатів приєдналася до справи [ROOT.GetCountry.GetLongName] для боротьби проти [GetCountry('TUR').GetAdjective]. Їх називали стратіотами, від [ShowCultureNameWithNoTooltip('greek_culture')|U] слова «солдат», і вони були грізною легкою кавалерією. Одним з їхніх найвидатніших лідерів був Граїцас Палеолог, який тримався як [GetCountry('BYZ').GetAdjective] командир до 1461 року."
  flavor_ven.2.a: "Їх боятимуться наші вороги!"
  flavor_ven.3.title: "Домініканська інквізиція"
  flavor_ven.3.desc: "Коли [GetCountry('PAP').GetGovernment.GetRulerTitle], маючи намір придушити єресі альбігойців та патаринів, намагався повсюдно в [ShowRegionName('italy_region')] встановити Домініканську інквізицію, [ROOT.GetCountry.GetFlavorRank] чинив опір її запровадженню в [ROOT.GetCountry.GetName]. Держава взяла на себе обов'язок виявляти єретиків, яких після затримання допитували Патріарх, Єпископ Кастелло або будь-який інший [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Ординарій. Суд, що проводив допит, обмежувався встановленням факту. Його завданням було констатувати, чи був допитуваний винен у єресі. Покарання залишалося за світською владою. Таке розташування не задовольнило Двір [ShowLocationName('rome')], інквізитора призначив [GetCountry('PAP').GetGovernment.GetRulerTitle], але йому потрібен був екзекватур [ROOT.GetCountry.GetGovernment.GetRulerTitle], перш ніж він міг діяти, і було створено раду з трьох [ROOT.GetCountry.GetAdjectiveWithNoTooltip] дворян, які засідали як асесори Священної Канцелярії. Їхнім обов'язком було охороняти права [ROOT.GetCountry.GetAdjectiveWithNoTooltip] громадян від церковних посягань, включаючи невтручання в релігійні питання в колоніях, без їхньої присутності та їхньої санкції жоден акт Священної Канцелярії не був дійсним у [ROOT.GetCountry.GetNameWithNoTooltip]. Інквізиція в [ROOT.GetCountry.GetNameWithNoTooltip] безумовно не була кровожерливим органом, безсумнівно, значною мірою завдяки незалежній позиції Держави, яка наполягала на присутності світських асесорів на кожному судовому процесі."
  flavor_ven.3.a: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]и передусім, [ShowReligionGroupAdjectiveWithNoTooltip('christian')|U]и по-друге"
  ven_venetian_first: "Венеційці передусім, християни по-друге"
  flavor_ven.3.b: "Ми справді [ShowReligionAdjectiveWithNoTooltip('catholic')]!"
  ven_christian_first: "[ShowReligionGroupAdjectiveWithNoTooltip('christian')|U] передусім!"
  flavor_ven.4.title: "Arte dell'Abbaco"
  flavor_ven.4.desc: "«Мене часто просили деякі юнаки, до яких я маю великий інтерес і які прагнуть до комерційної діяльності, записати фундаментальні принципи арифметики, яку зазвичай називають абаком». «Arte dell'Abbaco» була першою відомою друкованою книгою з математики в Європі, написаною [ROOT.GetCountry.GetAdjective] і надрукованою в [ShowLocationName('treviso')] у 1478 році."
  flavor_ven.4.a: "Це буде корисно!"
  flavor_ven.5.title: "Міністри водних шляхів"
  flavor_ven.5.desc: "Безпека та процвітання [ROOT.GetCountry.GetName] завжди залежали від його розташування в лагуні. У 1501 році, намагаючись зменшити замулення лагуни, Велика Рада створила комітет для відведення річок, що впадають у лагуну, відомий як «Savi alle Acque». Їхній успіх протягом багатьох років врятував Сереніссіму від катастрофи та продовжив процвітання міста.\n\nЩо ми будемо робити?"
  flavor_ven.5.a: "Це того варте!"
  flavor_ven.5.b: "[ROOT.GetCountry.GetNameWithNoTooltip] може вижити без цього!"
  flavor_ven.6.title: "Гетто"
  flavor_ven.6.desc: "Починаючи з 1516 року, [ROOT.GetCountry.GetFlavorRank] зобов'язав [ShowReligionAdjective('judaism')] громадян жити в районі міста, де в давнину розташовувалися ливарні, відомі [ROOT.GetCountry.GetAdjective] як «геті», носити ідентифікаційний знак і керувати міськими ломбардами за ставками, встановленими Сереніссімою. Було також включено багато інших обтяжливих правил, в обмін на які Спільноті було надано свободу сповідувати свою віру та захист у разі війни.\n\nЩо ми будемо робити?"
  flavor_ven.6.a: "Надати їм власне місце!"
  flavor_ven.6.b: "Не в моєму [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_ven.7.title: "Дослідник [target_character.GetNameWithNoTooltip]"
  flavor_ven.7.desc: "[target_character.GetName] був [ShowCultureGroupName('italian_group')] дослідником з [ShowLocationName('vicenza')]. [target_character.GetHeShe|U] подорожував у великій експедиції Фердинанда Магеллана під час його навколосвітньої подорожі. Під час експедиції [target_character.GetHeShe] був помічником Магеллана і написав про неї точний щоденник. [target_character.GetLastNameWithNoTooltip] був одним із лише 18 чоловіків, які повернулися до Іспанії з 240, що вирушили трьома роками раніше. Ця подорож була першим навколосвітнім плаванням, і [target_character.GetHisHer] щоденник є джерелом того, що ми знаємо сьогодні про цю експедицію."
  flavor_ven.7.a: "Світ справді круглий!"
  flavor_ven.8.title: "Морський призов"
  flavor_ven.8.desc: "Труднощі в пануванні на морі принесли подальші зміни. До 1545 року веслярі на галерах були вільними моряками, найнятими за платню. Спочатку вони були [ROOT.GetCountry.GetAdjective], але пізніше [ShowCultureName('dalmatian')|U], критяни та [ShowCultureName('greek_culture')|U] моряки приєдналися у великій кількості. Через труднощі з наймом достатньої кількості екіпажів, [ROOT.GetCountry.GetName] вдалася до призову, приковуючи веслярів до лав, як це вже робили інші флоти. Крістофоро да Канал був першим [ROOT.GetCountry.GetAdjectiveWithNoTooltip], хто командував такою галерою.\n\nЩо ми робитимемо?"
  flavor_ven.8.a: "Впровадити призов"
  flavor_ven.8.b: "Це суперечить [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip]!"
  flavor_ven.9.title: "Фортеця Сант'Андреа"
  flavor_ven.9.desc: "Форт Сант'Андреа був побудований у 1545 році для охорони головного входу до [ROOT.GetCountry.GetName] з [ShowProvinceDefinitionName('adriatic_sea_province')]. Форт був спроектований відомим архітектором Мікеле Санмікелі. Він, ймовірно, був єдиним [ShowCultureGroupName('italian_group')] архітектором століття, який мав можливість побачити [ShowCultureName('greek_culture')|U] архітектуру, оскільки він подорожував [ShowCultureNameWithNoTooltip('greek_culture')|U] володіннями [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetFlavorRank]. Фортеця стояла на захисті [ROOT.GetCountry.GetNameWithNoTooltip] понад триста років.\n\nЩо ми робитимемо?"
  flavor_ven.9.a: "Побудувати її!"
  flavor_ven.9.b: "Це занадто дорого"
  flavor_ven.10.title: "Міст Ріальто"
  flavor_ven.10.desc: "Міст Ріальто — один із чотирьох мостів, що перетинають Гранд-канал [ROOT.GetCountry.GetName]. Спочатку це був дерев'яний міст, але він згорів під час повстання 1310 року і обвалився в 1444 та 1524 роках. Відновлення мосту Ріальто було вперше запропоновано в 1503 році, і ідея полягала в тому, щоб відбудувати міст з каменю. Влада запросила пропозиції в 1551 році після того, як з 1503 року та наступних десятиліть було розглянуто кілька проектів. Відомі архітектори, такі як Якопо Сансовіно, Палладіо та Віньола, пропонували плани, але їхні пропозиції були визнані невідповідними ситуації, оскільки всі вони передбачали класичний підхід з кількома арками. Відомий художник Мікеланджело також розглядався як дизайнер мосту Ріальто, але пропозиція Антоніо да Понте зрештою перемогла інші завдяки його сміливому однопрольотному дизайну.\n\nЩо ми робитимемо?"
  flavor_ven.10.a: "Давайте побудуємо його!"
  flavor_ven.10.b: "Дерев'яний міст достатньо хороший"
  flavor_ven.11.title: "«Орфей» — перша опера"
  flavor_ven.11.desc: "Рання барокова опера [target_character.GetName] «Орфей» заснована на [ShowCultureName('greek_culture')|U] легенді про Орфея, музиканта, поета і пророка, який спустився до Аїду, щоб повернути свою померлу наречену Еврідіку. Опера була написана в 1607 році для придворної вистави під час щорічного карнавалу в [ShowLocationName('mantova')], а її партитура була опублікована в 1609 і 1615 роках [target_character.GetLastNameWithNoTooltip]. Сорок один різний інструмент, з окремими групами інструментів, що використовувалися для зображення певних сцен і персонажів, були перераховані в опублікованій партитурі [target_character.GetLastNameWithNoTooltip]."
  flavor_ven.11.a: "Чи втрачаєш ти мене через надмірну любов?"
  flavor_ven.12.title: "Народження сучасної науки"
  flavor_ven.12.desc: "[galileo_galilei_scope.GetName] більшість людей називають [galileo_galilei_scope.GetMotherFather] сучасної науки. У 1592 році [galileo_galilei_scope.GetHeShe] був призначений професором математики в Університеті [ShowProvinceDefinitionName('padua_province')]. Коли [galileo_galilei_scope.GetHeShe] дізнався про підзорну трубу, [galileo_galilei_scope.GetHeShe] сконструював [galileo_galilei_scope.GetHisHer] серію телескопів, набагато кращих за все, що було зроблено раніше, і почав досліджувати небо, відкриваючи гори на Місяці та чотири супутники, що обертаються навколо Юпітера. Разом зі своєю роботою над рухами та механікою, [galileo_galilei_scope.GetHeShe] заклав основи того, що стане сучасною наукою."
  flavor_ven.12.a: "Це велике благо!"
  flavor_ven.13.title: "[target_character.GetNameWithNoTooltip] та Альдінська друкарня"
  flavor_ven.13.desc: "[ROOT.GetCountry.GetName] є домом для одного з найвидатніших піонерів книгодрукування. Практика та мистецтво книгодрукування все ще є технікою в зародковому стані, але [target_character.GetName] і тим більше [target_character.GetHerHis] друкарня, Альдінська друкарня, здобула репутацію завдяки своїй послідовній та чіткій типографії та добре виконаним перекладам з латини. Курсив, а також послідовний спосіб використання крапок з комою є одними з внесків [target_character.GetShortNameWithNoTooltip] у галузь типографії. У галузі палітурної справи [target_character.GetHerHis] зробив внесок у легко керований формат октаво, забезпечуючи портативність класики, що виходить з його друкарні, замість того, щоб намагатися імітувати формат середньовічного рукопису."
  flavor_ven.13.a: "Поспішай повільно!"
  aldus_disappears_tt: "Майстерня [target_character.GetNameWithNoTooltip] закриється, і [target_character.GetSheHe] зникне"
  flavor_ven.14.title: "Зростання муранської [ShowGoodsNameWithNoTooltip('glass')|U] промисловості"
  flavor_ven.14.desc: "З кінця XIII століття [ROOT.GetCountry.GetAdjective] склоробна промисловість була обмежена островом Мурано, щоб зменшити ризик пожежі. Популярність муранського [ShowGoodsName('glass')] з того часу лише зростала, а склодуви стали як багатими, так і впливовими. Секрети виробництва таких вишуканих виробів відомі небагатьом за межами наших кордонів, і для збереження цих знань склодуви обмежені містом.\n\nОскільки популярність [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ShowGoodsNameWithNoTooltip('glass')] продовжує зростати, світ змінюється. З падінням [ShowLocationName('constantinople')] велика кількість людей, що володіють рідкісними навичками, необхідними у склоробстві, просять дозволу оселитися на Мурано."
  flavor_ven.14.a: "Вітаємо [GetCountry('BYZ').GetAdjectiveWithNoTooltip] склодувів."
  STATIC_MODIFIER_NAME_ven_murano_glass_industry: "Муранська скляна промисловість"
  STATIC_MODIFIER_DESC_ven_murano_glass_industry: "Венеційська склодувна промисловість на острові Мурано, що датується XIII століттям, є унікальною та однією з багатьох розкішних товарів, якими відома Венеція."
  flavor_ven.15.title: "Чіокка"
  flavor_ven.15.desc: "Особливо вправний муранський склодув на ім'я [target_character.GetName] зумів створити скляні предмети, не схожі ні на що бачене раніше в [ROOT.GetCountry.GetName]. Люстри Чіокка, зокрема, названі на честь квіткових букетів, на які вони схожі, набули величезної популярності серед заможних, і [ROOT.GetCountry.GetAdjectiveWithNoTooltip] скляна промисловість знову процвітає."
  flavor_ven.15.a: "Промисловість [target_location.GetNameWithNoTooltip] процвітатиме!"
  flavor_ven.15.b: "Нехай мистецтво прикрашає наше ім'я!"
  flavor_ven.16.title: "Суд над Веронікою Франко"
  flavor_ven.16.desc: "Одна з найвідоміших «чесних куртизанок» [ROOT.GetCountry.GetName], Вероніка Франко, тепер постає перед судом за чаклунство в місті. Відома своїм інтелектом, а також красою, Франко своїм впливом на клієнтів та відвертою участю в мистецькому та літературному житті [ROOT.GetCountry.GetNameWithNoTooltip] заробила собі багато ворогів.\n\nВиголосивши дуже красномовний захист перед Інквізицією, тепер залишається побачити, чи достатньо гострий інтелект Франко, щоб захистити її від охоронців моралі."
  flavor_ven.16.a: "Винна!"
  flavor_ven.16.b: "Невинна!"
  flavor_ven.17.title: "Гондольна екстравагантність"
  flavor_ven.17.desc: "Громадська мораль завжди повинна охоронятися [ROOT.GetCountry.GetAdjective] урядом, і тому час від часу створюються закони, щоб переконатися, що наш народ залишається вірним [ShowReligionGroupAdjective('christian')|U] ідеалам, на яких побудоване наше місто. Гондола — досить просте судно, і тисячі їх щодня перевозять людей каналами [ROOT.GetCountry.GetName]. Як це часто буває, багато багатих і впливових сімей нашого [ROOT.GetCountry.GetFlavorRank] важко опиралися спокусі виставляти напоказ своє багатство. Гондоли бувають різних розмірів і кольорів, а деякі настільки перевантажені прикрасами, що є образою для будь-якого справжнього [ShowReligionGroupAdjectiveWithNoTooltip('christian')|U] розуму.\n\nЗараз обговорюється, чи слід заборонити прикрашання цих гондол, оскільки для деяких вони є символом усього, що неправильно в нашому великому місті."
  flavor_ven.17.a: "Пофарбувати їх у чорний!"
  flavor_ven.17.b: "Не зважайте на моралістів, гондоли вражають."
  flavor_ven.18.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Школа"
  flavor_ven.18.desc: "[ROOT.GetCountry.GetName|U], протягом століть провідне місто друкарства та склоробства в [ShowRegionName('italy_region')], почало перевершувати або принаймні конкурувати з [ShowLocationName('rome')|U] як провідне місто мистецтва та музики. Великі художники, такі як Тінторетто, Тіціан, Веронезе, або музиканти, як Монтеверді, Габріелі чи Донаті, — це лише деякі з багатьох митців, які працюють і живуть у нашому місті. В [ShowRegionNameWithNoTooltip('italy_region')] та за кордоном [ROOT.GetCountry.GetNameWithNoTooltip] почало ставати синонімом мистецтва."
  flavor_ven.18.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ven.1000.title: "Торгівля [ShowGoodsNameWithNoTooltip('pepper')|U] під загрозою"
  flavor_ven.1000.desc: "[GetCountry('POR').GetAdjective] взяли під контроль торгівлю в [ShowRegionName('indian_ocean_region')], перенаправляючи торгівлю навколо [ShowContinentName('africa')] замість через [ShowLocationName('alexandria')]. Це серйозно вплинуло на наші шанси контролювати торгівлю [ShowGoodsName('pepper')|U]. Однак ми можемо спробувати надіслати допомогу [GetCountry('MAM').GetName]."
  flavor_ven.1000.a: "Надіслати допомогу до [ShowLocationNameWithNoTooltip('alexandria')]!"
  ven_helping_mamelukes: "Допомога $mamluks$"
  flavor_ven.1000.b: "Це не наша проблема"
  flavor_ven.1001.title: "[ven_scope.GetNameWithNoTooltip] надсилає допомогу"
  flavor_ven.1001.desc: "З [GetCountry('POR').GetAdjective] контролем над торгівлею в [ShowRegionName('indian_ocean_region')], торгове [ven_scope.GetGovernment.GetGovernmentType.GetName] [ven_scope.GetName] стало надзвичайно занепокоєним. Оскільки ми завжди мали досить добрі стосунки, вони надіслали нам допомогу, з [ShowGoodsName('lumber')] для будівництва нових кораблів та іншими ресурсами для наших купців."
  flavor_ven.1001.a: "Добрі новини!"
  venetian_help: "Венеційська допомога"
  flavor_ven.19.title: "Нечестивий союз"
  flavor_ven.19.desc: "[GetCountry('TUR').GetName|U] поклали око на [target_province.GetName] і тому розглядають можливість нападу на [target_country.GetName]. Несподіваним дипломатичним кроком вони пропонують нам укласти союз. Якщо ми надамо їм нашу морську силу та підтвердимо їхні претензії на півдні [ShowRegionName('italy_region')], вони обіцяють прийти нам на допомогу в майбутньому.\n\nЦе, безумовно, може виявитися вигідним, але чи наважимося ми спілкуватися з ворогами християнства?"
  flavor_ven.19.historical_info: "Хоча Венеція та Османська імперія часто були заклятими ворогами, у 1479 році османи запропонували союз проти Неаполітанського королівства. Синьйорія у Венеції зрештою відмовилася від цієї угоди, але їхній посол у Константинополі заохотив турків захопити Отранто та деякі інші південноіталійські міста."
  flavor_ven.19.a: "Надати лише дипломатичну підтримку."
  flavor_ven.19.b: "Погодитися на пропозицію."
  flavor_ven.19.c: "Відкинути язичників."
  flavor_ven.19.a.tt: "[GetCountry('TUR').GetNameWithNoTooltip|U] отримає [Concept('government_power', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_ven.19.b.tt: "Ми укладемо [alliance] з [GetCountry('TUR').GetNameWithNoTooltip|U]."
  flavor_ven.20.title: "Domini di Terraferma"
  flavor_ven.20.desc: "Хоча наша морська міць неперевершена, відсутність належної сухопутної буферної зони робить [ShowLocationName('venice')] вразливою ціллю для атак з материка. Щоб зменшити загрозу нападу на [ShowLocationNameWithNoTooltip('venice')] з берегів [ShowRegionName('italy_region')], були пропозиції тимчасово переключити нашу увагу на завоювання материкових володінь. Розширення нашого володіння далі в [ShowRegionNameWithNoTooltip('italy_region')] створило б належну лінію оборони та значно підвищило б безпеку [ShowLocationNameWithNoTooltip('venice')]."
  flavor_ven.20.a: "Давайте відстоювати наші претензії!"
  flavor_ven.20.b: "Ми не можемо дозволити собі вести війни на суші."
  flavor_ven.20.historical_info: "Щоб забезпечити торгові шляхи та підвищити безпеку Венеції, Республіка почала розширюватися на материкову Італію, захоплюючи землі у Верони. Це зрештою призвело до створення так званих «Domini di Terraferma»; «Материкових володінь». Вони служили буферною зоною між їхніми внутрішніми сусідами та Венецією."
  flavor_ven.21.title: "[ShowBuildingTypeNameWithNoTooltip('teatro_san_cassiano')]"
  flavor_ven.21.desc: "[ShowLocationName('venice')], вже блискуча перлина культурного ландшафту [ShowRegionName('italy_region')], давно є домом для процвітаючої спільноти художників та виконавців. Щоб ще більше закріпити її статус центру мистецької досконалості та надати грандіозну сцену для наших талановитих громадян, зростає заклик до будівництва чудового театру та оперного театру. Запропонований [ShowBuildingTypeName('teatro_san_cassiano')] стане маяком пишноти та багатства, демонструючи мистецький блиск [ShowLocationNameWithNoTooltip('venice')] та приваблюючи шанувальників звідусіль."
  flavor_ven.21.a: "Замовити його будівництво!"
  flavor_ven.21.b: "Ми не можемо собі цього дозволити."
  flavor_ven.21.historical_info: "Театр Сан-Кассіано, побудований у Венеції в 1637 році, був першим публічним оперним театром у світі, що стало значною віхою в історії виконавського мистецтва та зміцнило роль Венеції як провідного культурного центру."
  flavor_ven.23.title: "Зараження [ShowLocationNameWithNoTooltip('venice')]"
  flavor_ven.23.desc: "Наше рішення обмежити зусилля з реконструкції після руйнівного стихійного лиха мало жахливі наслідки. [ShowLocationName('venice')] залишається значною мірою в руїнах, багато будівель все ще в занедбаному стані, а вулиці заповнені сміттям. Відсутність належного відновлення та санітарії створила сприятливе середовище для хвороб та шкідників, загрожуючи здоров'ю та добробуту наших громадян.\n\nБрудні умови та тривалі руйнування призвели до спалахів хвороб, чума та мори швидко поширюються серед населення. Репутація та моральний дух [target_location.GetRank.GetName] сильно постраждали, і тепер потрібні термінові дії для вирішення цієї кризи, що погіршується. Ми повинні переглянути наш підхід та інвестувати в комплексні зусилля з очищення та відновлення, щоб відновити здоров'я, порядок та процвітання."
  flavor_ven.23.a: "Ми повинні діяти негайно!"
  flavor_ven.23.b: "Вже занадто пізно щось робити."
  flavor_ven.24.title: "Повінь у [ShowLocationNameWithNoTooltip('venice')]"
  flavor_ven.24.desc: "[ShowLocationName('venice')] спіткало непередбачене лихо, оскільки сильні дощі спричинили підйом Адріатичного моря, що призвело до сильної повені по всьому [target_location.GetRank.GetName]. Води затопили наші вулиці, будинки та життєво важливу інфраструктуру, завдавши значної шкоди та витіснивши незліченну кількість громадян. Невпинна злива порушила повсякденне життя, торгівлю та стабільність нашого улюбленого [target_location.GetRank.GetNameWithNoTooltip]. Масштаб цієї катастрофи вимагає швидких і рішучих дій для зменшення шкоди та запобігання подальшим руйнуванням."
  flavor_ven.24.a: "Впровадити заходи для зменшення шкоди."
  flavor_ven.24.b: "Місцеві жителі впораються."
  flavor_ven.25.title: "Падіння [ShowLocationNameWithNoTooltip('constantinople')]"
  flavor_ven.25.desc: "Ми здобули знаменну перемогу, оскільки могутні стіни [ShowLocationName('constantinople')] впали перед нашими силами, що нагадує про наш тріумф під час Четвертого хрестового походу. Це історичне завоювання відкриває нову главу для колись великого [target_location.GetRank.GetName]. Наші солдати, прагнучи отримати військові трофеї, наполягають на розграбуванні неперевершених скарбів [target_location.GetRank.GetNameWithNoTooltip], проте такі дії призведуть до широкомасштабних руйнувань і розгнівають місцеве населення.\n\nІнші пропонують сміливу стратегію: відновити [GetCountry('LAT').GetLongName], перетворивши [ShowLocationNameWithNoTooltip('constantinople')] на васальну державу під нашим контролем."
  flavor_ven.25.a: "Розграбувати [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_ven.25.b: "Проголосити це в [ShowLocationNameWithNoTooltip('constantinople')]."
  flavor_ven.25.b.tt: "[GetCountry('LAT').GetLongName] буде засновано як наш [ShowSubjectTypeName('vassal')] у [ShowLocationName('constantinople')]. Ми передамо їм право власності на [ShowLocationNameWithNoTooltip('constantinople')] та наше ядро там."
  flavor_ven.25.c: "Відновити його в ширшому регіоні."
  flavor_ven.25.c.tt: "[GetCountry('LAT').GetLongName] буде засновано як наш [ShowSubjectTypeName('vassal')] у всій [ShowAreaName('thrace_area')]. Ми передамо їм право власності на всі наші локації та ядра в [ShowAreaNameWithNoTooltip('thrace_area')]."
  flavor_ven.25.d: "Захоплення [ShowLocationNameWithNoTooltip('constantinople')] — це вже достатній тріумф."
  flavor_ven.26.title: "Визволення [ShowLocationNameWithNoTooltip('jerusalem')]"
  flavor_ven.26.desc: "Після століть іноземної окупації, прапори християнства, нашого [GetCountry('VEN').GetLongName], майорять над цим священним місцем. Це монументальне досягнення надихнуло велику повагу та гордість серед нашого народу, але воно також ставить перед нами глибоке рішення щодо майбутнього управління [ShowLocationName('jerusalem')].\n\nДеякі стверджують, що збереження прямого контролю над [ShowLocationNameWithNoTooltip('jerusalem')] під владою [ROOT.GetCountry.GetGovernment.GetRulerTitle] забезпечить наш вплив та захистить святість [target_location.GetRank.GetName]. Інші пропонують відновити [GetCountry('KOJ').GetName], створивши васальну державу, яка могла б керувати регіоном, одночасно слугуючи нашим інтересам та вшановуючи спадщину хрестових походів."
  flavor_ven.26.a: "[target_location.GetRank.GetNameWithNoTooltip] залишиться під нашим контролем."
  flavor_ven.26.b.tt: "[GetCountry('KOJ').GetLongName] буде засновано як наш [ShowSubjectTypeName('vassal')] у [ShowLocationName('jerusalem')]. Ми передамо їм право власності на [ShowLocationNameWithNoTooltip('jerusalem')] та наше ядро там."
  flavor_ven.26.b: "Проголосити це в [ShowLocationNameWithNoTooltip('jerusalem')]."
  flavor_ven.26.c.tt: "[GetCountry('KOJ').GetLongName] буде засновано як наш [ShowSubjectTypeName('vassal')] у всій [ShowAreaName('levant_area')]. Ми передамо їм право власності на всі наші локації та ядра в [ShowAreaNameWithNoTooltip('levant_area')]."
  flavor_ven.26.c: "Ми відновимо [GetCountry('KOJ').GetNameWithNoTooltip] у всій [ShowAreaNameWithNoTooltip('levant_area')]."
  flavor_ven.27.title: "Розширення [ShowBuildingTypeNameWithNoTooltip('doges_palace')]"
  flavor_ven.27.desc: "Будівництво [ShowBuildingTypeName('doges_palace')] у [ShowLocationName('venice')] розпочалося у IX столітті і тривало протягом наступних століть. Спочатку задуманий як фортеця, палац з часом перетворився на чудовий зразок готичної архітектури. Це архітектурне диво слугує подвійній меті: бути резиденцією [ROOT.GetCountry.GetGovernment.GetRulerTitle], видатного політичного лідера [GetCountry('VEN').GetLongNameWithNoTooltip], а також розміщувати різні урядові установи та суди.\n\nОднак з часом будівля помітно постаріла і потребує ремонту. Можливо, нам варто розглянути можливість перетворення її на палац, який затьмарив би навіть королівські резиденції західних королів."
  flavor_ven.27.a: "Гарна ідея!"
  flavor_ven.27.b: "Палац і так чудовий."
  flavor_ven.27.historical_info: "До XVI століття Палац Дожів зазнав значних реконструкцій та розширень, що призвело до значного збільшення його величі. Одним з найвизначніших досягнень було завершення його культового фасаду, що виходив на Гранд-канал, демонструючи архітектурну пишність палацу всім, хто наближався водою. Цей період реконструкції та розширення ще більше зміцнив статус палацу як незмінного символу венеціанської влади та авторитету. Його зали та палати, що характеризуються складними дизайнами та розкішними прикрасами, не тільки були свідками століть політичної діяльності, але й залишалися незмінним свідченням багатої історії міста та його постійного значення на світовій арені."
  flavor_ven.28.title: "[ShowBuildingTypeNameWithNoTooltip('venetian_arsenal')]"
  flavor_ven.28.desc: "Наші морські починання та легендарні навички суднобудування принесли нашим корабелам ім'я у цій галузі. Серцем наших операцій, пов'язаних із суднами, є не що інше, як [ShowBuildingTypeName('venetian_arsenal')], розташований у [ShowLocationName('venice')]. Цей морський комплекс, що має стратегічне розташування, відіграє життєво важливу роль у морській могутності міста. Від процвітаючої суднобудівної діяльності до інновацій та новаторства в озброєнні суден, це основа, яка забезпечує наше панування на морі."
  flavor_ven.28.a: "Прославлена частина нашої військово-морської спадщини!"
  flavor_ven.28.historical_info: "Венеційський Арсенал служив головною верф'ю та військово-морським депо Венеції, що було вирішальним для морського панування та військової могутності міста. Цей величезний комплекс відповідав за будівництво та обслуговування венеційського флоту, втілюючи передові технології суднобудування та промислову майстерність Республіки."
  flavor_ven.29.title: "Базиліка Санті Джованні е Паоло"
  flavor_ven.29.desc: "[ShowLocationName('venice')] прикрашена багатьма архітектурними дивами по всьому своєму міському домену. Від фресок до статуй та безлічі майбутніх художників, які бажають стояти на плечах гігантів і зробити собі ім'я. Останньою такою перлиною, що прикрашає нашу столицю, є не що інше, як мала базиліка $san_zanipolo$. Її велика цегляна споруда виконана в готичному стилі, а територія служить головною домініканською церквою нашого великого народу. Робота присвячена Івану та Павлу, двом легендарним мученикам, чия присутність була вперше каталогізована близько 4 століття."
  flavor_ven.29.a: "Чудово!"
  flavor_ven.30.title: "Середземноморська морська наддержава"
  flavor_ven.30.desc: "Мало які країни можуть засвідчити або навіть зрівнятися з нашим рівнем експертизи, коли йдеться про морські справи. Наша схильність до торгівлі та морських справ зробила нас одним із найбільших домінаторів Середземномор'я. Наша традиція походить від любові та обожнювання води, яка служить як нашим шляхом до величі, так і первинною обороною нашої великої столиці, у [ROOT.GetCountry.GetCapital.GetName]. Тепер, коли наш флот є беззаперечним гегемоном Середземномор'я, давайте проголосимо море Mare Nostrum – нашим морем!"
  flavor_ven.30.a: "Ми проголошуємо тебе, о море, знаком істинного і вічного панування."
  STATIC_MODIFIER_NAME_ven_mare_nostrum: "Mare Nostrum"
  flavor_ven.31.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.31.desc: "[target_character.GetName] виділяється як видатний художник [ShowCultureGroupName('italian_group')] [ShowInstitutionName('renaissance')], народжений у [ShowLocationName('pieve')], поблизу [ShowLocationName('venice')]. Відомий [target_character.GetHisHer] майстерним володінням кольором та новаторськими техніками мазка, [target_character.GetHisHer] мистецький шлях охоплює понад сім десятиліть. Протягом цього тривалого періоду [target_character.GetSheHe] створив велику кількість робіт, що охоплюють портрети, міфологічні наративи та релігійні композиції.\n\nСеред [target_character.GetHisHer] портретів, таких як '#italic Венера Урбінська#!', особливо відзначають їхню глибоку психологічну глибину та розкішні колірні схеми. Вплив [target_character.GetLastNameWithNoTooltip] на еволюцію як [ROOT.GetCountry.GetAdjectiveWithNoTooltip], так і європейського мистецтва є глибоким, а [target_character.GetHisHer] тривала спадщина позиціонує його як одного з найвидатніших художників [ShowInstitutionNameWithNoTooltip('renaissance')]."
  flavor_ven.31.a: "Яка блискуча людина!"
  flavor_ven.32.title: "[ROOT.GetCountry.GetNameWithNoTooltip] під час [ShowInstitutionNameWithNoTooltip('renaissance')]"
  flavor_ven.32.desc: "Під час [ShowInstitutionName('renaissance')] у [ROOT.GetCountry.GetName] мистецтво та архітектура досягли нових висот витонченості та пишності. [ROOT.GetCountry.GetAdjectiveWithNoTooltip] мистецтво, що характеризується яскравим кольором та емоційною глибиною, ілюструється роботами відомих художників, скульпторів та архітекторів.\n\nЦі художники чудово передають сутність своїх об'єктів за допомогою яскравих палітр та вражаючих технік світлотіні, що надає їхнім творінням неперевершеного відчуття реалізму. Портретний живопис є центральною темою, при цьому художники досягають чудових зображень характерів. Крім того, алегоричні та міфологічні сюжети стали популярними, демонструючи різноманітність та емоційний резонанс [ROOT.GetCountry.GetAdjectiveWithNoTooltip] мистецтва."
  flavor_ven.32.a: "Захоплююче!"
  flavor_ven.32.a.tt: "Кожна володіння з [ShowBuildingTypeName('library')] отримує [ShowNamedValue('prosperity_weak_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_ven.32.historical_info: "Під час Відродження Венеція стала яскравим культурним та мистецьким центром, приваблюючи деяких з найвідоміших художників тієї епохи. Тіціано Вечеллі, відомий як Тіціан, створив такі шедеври, як #italic Успіння Богородиці#! та #italic Вакх і Аріадна#!, які демонстрували його майстерне використання кольору та інноваційні композиції. Тінторетто, ще один венеційський майстер, прославився своїми драматичними та динамічними роботами, включаючи #italic Таємну вечерю#! та #italic Рай#!, остання з яких є однією з найбільших олійних картин у світі. Паоло Веронезе, відомий своїм розкішним та грандіозним стилем, створив такі знакові твори, як #italic Весілля в Кані#! та #italic Бенкет у домі Левія#!, які захоплюють своїми яскравими кольорами та складними деталями. Ці художники та їхні роботи значно сприяли репутації Венеції як центру мистецтва та культури Відродження."
  flavor_ven.33.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Карнавал"
  flavor_ven.33.desc: "Історія Карнавалу сягає 11 століття, коли він розпочався як святкування [ROOT.GetCountry.GetAdjective] перемоги над ворогами. З часом Карнавал перетворився на грандіозну та унікальну подію. Завдяки нашому поточному статусу великого торгового центру в [ShowContinentName('europe')], ми можемо накопичувати значні багатства, і це процвітання живить екстравагантність Карнавалу. Він став символом нашої розкоші та декадансу, приваблюючи відвідувачів з усієї [ShowContinentNameWithNoTooltip('europe')], які прагнуть взяти участь у маскарадних гуляннях. Маски, які носять під час Карнавалу, не тільки забезпечують анонімність, але й служать способом стерти соціальні відмінності, дозволяючи людям з різних верств суспільства вільно спілкуватися під час святкувань."
  flavor_ven.33.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven.33.a.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowLocationName('venice')] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ven.33.historical_info: "У 18 столітті Венеційський карнавал досяг свого зеніту, характеризуючись вишуканими костюмами, театральними виставами та складними дизайнами масок. Однак у 1797 році карнавал був заборонений окупаційними французькими військами і залишався в сплячому стані майже два століття. Лише наприкінці 20 століття карнавал був відроджений, ставши всесвітньо відомою подією, якою він є сьогодні. Сучасний Венеційський карнавал зберігає традиції минулого, демонструючи приголомшливі маски та костюми, вуличні вистави та жваву атмосферу, що робить його захоплюючою та ностальгічною подорожжю в багату історію та культуру міста."
  flavor_ven.34.title: "Перегляд [ShowGovernmentReformNameWithNoTooltip('promissione_ducale_reform')]"
  flavor_ven.34.desc: "[ShowGovernmentReformName('promissione_ducale_reform')] — це присяга, яку всі кандидати повинні скласти, щоб стати новим [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName]. Вона окреслює обов'язки [ROOT.GetCountry.GetGovernment.GetRulerTitle] і встановлює обмеження на повноваження [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nОднак з роками деякі з перевірок... дещо ослабли. Якби ми розробили нову Promissione Ducale, яка б більш твердо підтверджувала наші цінності та ролі, передбачені для [ROOT.GetCountry.GetGovernment.GetRulerTitle], то не тільки наш уряд зміцнився б, але й більш доброчесні кандидати на посаду могли б висунутися."
  flavor_ven.34.a: "Переглянути та інституціоналізувати."
  flavor_ven.34.b: "Присяга не потребує перегляду."
  flavor_ven.34.historical_info: "Promissione Ducale слугувала офіційною присягою та договірною угодою, яку кожен новообраний дож Венеції присягав дотримуватися. Цей документ окреслював обов'язки, обмеження та закони, яких дожі мали дотримуватися, забезпечуючи баланс влади та захист інтересів Республіки."
  flavor_ven.35.title: "Питання Relazioni"
  flavor_ven.35.desc: "«Relazioni» — це звіти, які наші посли надсилають уряду, деталізуючи політичний, фінансовий та соціальний стан країн, у яких вони служать. Ці документи є важливими як для наших власних дипломатичних зусиль, так і для підтримки конкурентної переваги наших купців за кордоном, але все частіше копії relazioni публікуються та стають доступними для будь-кого, хто готовий заплатити за них високу ціну. Це загроза нашій власній дипломатії та безпеці. Ми повинні припинити ці публікації та встановити спільну, безпечну систему для написання та розповсюдження relazioni."
  flavor_ven.35.a: "Ми повинні покласти край цій практиці!"
  flavor_ven.35.b: "У нас є більш нагальні справи."
  flavor_ven.36.title: "Золота Республіка"
  flavor_ven.36.desc: "Наші успіхи в галузі політики, торгівлі та наукових досліджень призвели до того, що багато хто проголошує нашу нинішню епоху «Ерою Золотої Республіки». Це, звичайно, посилається на зеніт нашого багатства, кульмінацію наших зусиль як народу та святкування нашої культури та мистецтва, як засіб увічнити нашу спадщину в книгах історії."
  flavor_ven.36.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven.36.b: "Це справді Золота Республіка!"
  flavor_ven.36.b.tt: "Колір країни зміниться на помаранчевий."
  flavor_ven.36.c: "Ми не менші за Імператорів!"
  flavor_ven.36.c.tt: "Колір країни зміниться на темно-фіолетовий."
  flavor_ven.38.title: "Лореданська академія"
  flavor_ven.38.desc: "Нещодавно академія, відома як «Incogniti», привернула впливових літературних діячів як у [ShowLocationName('venice')], так і за її межами, які дотримуються лібертинської програми та виступають за політичну та культурну незалежність міста. Ця таємна група відзначається використанням хитрощів, таких як парадокс та алегорія, щоб уникнути критики. Діючи непомітно, члени часто використовують таємну мову та публікують анонімно, а їхня філософія перебуває під впливом аристотелівського натуралізму з Університету [ShowLocationName('padova')].\n\nЦя таємна академія, незважаючи на цензуру та потрапляння її творів до Індексу, сміливо кидає виклик суспільним нормам через сатиричні композиції та гібридні жанри. Сформовані ідеологіями видатних мислителів, вони критикують тиранію в історичних працях. Дивно, але Accademia degli Incogniti стала ключовою силою у розвитку музичного театру в [ShowLocationNameWithNoTooltip('venice')], заснувавши Teatro Novissimo."
  flavor_ven.38.a: "Підтримаємо їхні зусилля!"
  flavor_ven.38.b: "Їм не потрібне фінансування."
  flavor_ven.38.historical_info: "Лореданська академія була видатною інтелектуальною спільнотою, заснованою у Венеції в 1630 році Джованні Франческо Лореданом та Гвідо Касоні. Ця академія була відома своїм авангардним мисленням та внеском її членів у літературу, драматургію та політичну думку в період бароко. Що стосується поглядів її членів, Incogniti кидали виклик традиційним нормам і часто брали участь у сміливих та суперечливих дискусіях, критикуючи як політику, так і релігію. Академія значно вплинула на культурний та інтелектуальний ландшафт Венеції 17 століття, залишивши спадщину літературних інновацій та критичної думки."
  flavor_ven.39.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')]"
  flavor_ven.39.desc: "[ShowLocationName('venice')] здавна була колискою культурної та мистецької геніальності, і тепер розквітаюча [ShowAdvanceName('ven_venetian_school_of_music')] шукає нашої підтримки, щоб підняти свої зусилля. Ця група талановитих композиторів та музикантів готова революціонізувати музичний ландшафт, принісши безпрецедентний престиж нашому місту. Однак підтримка їхніх починань вимагатиме значних інвестицій та ресурсів, хоча це обіцяє покращити культурну спадщину та глобальний вплив [ShowLocationNameWithNoTooltip('venice')]."
  flavor_ven.39.a: "Інвестування в це — наш давній інтерес."
  flavor_ven.39.b: "Вони, безперечно, зростатимуть навіть без нашої підтримки."
  flavor_ven.39.a.tt: "Дозволяє нам отримувати численні події про історичних особистостей, пов'язаних з Венеціанською школою музики."
  flavor_ven.40.title: "Падіння [ShowLocationNameWithNoTooltip('genoa')]"
  flavor_ven.40.desc: "Тривалий час [GetCountry('GEN').GetLongName] були терном у нашому боці, привласнюючи наше багатство та торгівлю для власного збагачення. З падінням [ShowLocationName('genoa')] сила їхньої нації почне руйнуватися, і те, що колись було могутньою нацією, здатною конкурувати з міццю наших флотів, перетвориться на звичайну сторінку в книгах історії."
  flavor_ven.40.a: "Ми стали справжнім гегемоном Середземномор'я!"
  flavor_ven.41.title: "Відданість [ShowLocationNameWithNoTooltip('verona')] до [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ven.41.desc: "Народ [ShowLocationName('verona')], невдоволений своїми старими правителями, вирішив присягнути на вірність [ROOT.GetCountry.GetName]. Посли з [ShowLocationNameWithNoTooltip('verona')] присягнули на повну вірність нашій справі, провіщаючи нову еру єдності та співпраці. Завдяки відсутності опору ми дозволили місцевим жителям зберегти різні свободи, сприяючи доброзичливості та забезпечуючи їхню активну підтримку.\n\nЦя добровільна відданість і безперешкодний перехід влади дозволять плавно інтегрувати [ShowLocationNameWithNoTooltip('verona')] до нашого [ROOT.GetCountry.GetFlavorRank]. Лояльність місцевого населення не лише зміцнює наш домен, але й демонструє привабливість [ROOT.GetCountry.GetAdjectiveWithNoTooltip] управління. Наша увага тепер має бути зосереджена на консолідації цієї нової території та забезпеченні її процвітання в межах нашої республіки."
  flavor_ven.41.a: "Відсвяткуйте вірність [ShowLocationNameWithNoTooltip('verona')] та офіційно інтегруйте їх!"
  flavor_ven.41.historical_info: "Відданість Верони Венеції відбулася в 1405 році, коли жителі Верони, розчаровані своєю правлячою родиною Каррара, добровільно присягнули на вірність Венеційській республіці. Цей мирний перехід дозволив Венеції розширити свою територію без конфліктів, забезпечивши лояльність веронців, надавши їм певні свободи та привілеї."
  flavor_ven.43.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.43.desc: "[target_character.GetName], видатний і вправний адмірал, відіграв вирішальну роль в успіху та силі [ROOT.GetCountry.GetAdjective] флоту. [target_character.GetHisHer|U] стратегічна проникливість та лідерство призвели до численних перемог на морі, забезпечивши наше морське панування та захистивши наші торгові шляхи. Однак з часом [target_character.GetSheHe] постарів, і тепер ми стоїмо перед рішенням щодо [target_character.GetHisHer] майбутньої служби [ROOT.GetCountry.GetFlavorRank]."
  flavor_ven.43.a: "Наш флот все ще міг би використовувати [target_character.GetHisHer] навички."
  flavor_ven.43.b: "Дайте [target_character.GetHimHer] заслужений відпочинок."
  flavor_ven.43.historical_info: "Лоренцо Марчелло був венеційським адміралом, який відіграв значну роль у морських конфліктах. Він воював проти Папського флоту та брав участь у турецько-венеційській війні. У червні 1656 року він привів об'єднаний венеційсько-мальтійський флот до перемоги в Третій битві при Дарданеллах, хоча сам загинув під час битви."
  flavor_ven.44.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] - [target_character.GetNameWithNoTooltip]"
  flavor_ven.44.desc: "[target_character.GetName] — візіонер і майстерний композитор, який глибоко сформував [ShowAdvanceName('ven_venetian_school_of_music')], заслуживши [target_character.GetHisHer] місце як її шанований засновник. [target_character.GetHisHer|U] інноваційні композиції та методи викладання підняли [ROOT.GetCountry.GetName] на нові висоти музичної досконалості, приваблюючи талановитих музикантів з усієї [ShowContinentName('europe')] для навчання та виступів тут. Внесок [target_character.GetLastNameWithNoTooltip], такий як привнесення франко-фламандського стилю до нашого [ROOT.GetCountry.GetFlavorRank], не лише збагатив нашу культурну спадщину, але й позиціонував [ROOT.GetCountry.GetNameWithNoTooltip] як провідний центр музичних інновацій та витонченості."
  flavor_ven.44.a: "[target_character.GetHisHer|U] внесок добре визнаний!"
  flavor_ven.45.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] - [target_character.GetNameWithNoTooltip]"
  flavor_ven.45.desc: "[target_character.GetName], видатний музичний теоретик і композитор, глибоко вплинув на [ShowAdvanceName('ven_venetian_school_of_music')] своєю новаторською роботою та вченнями. [target_character.GetHisHer|U] теоретичні інновації та композиції встановили нові стандарти в музичній гармонії та контрапункті, зміцнивши репутацію [ROOT.GetCountry.GetName] як центру музичної досконалості. Інтелектуальний внесок [target_character.GetLastNameWithNoTooltip] не лише збагатив нашу культурну спадщину, але оскільки [target_character.GetSheHe] служив Маестро ді Капелла собору Святого Марка, [target_character.GetSheHe] керував незліченною кількістю музикантів у їхніх мистецьких пошуках."
  flavor_ven.45.a: "[ROOT.GetCountry.GetFlavorRank] пощастило мати [target_character.GetHimHer]!"
  flavor_ven.46.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] - [target_character.GetNameWithNoTooltip]"
  flavor_ven.46.desc: "Шанований композитор та впливова постать у [ShowAdvanceName('ven_venetian_school_of_music')], [target_character.GetName] залишив незгладимий слід у музичній спадщині [ShowLocationName('venice')]. Як Маестро ді Капелла в Базиліці Святого Марка, [target_character.GetLastNameWithNoTooltip] значно сформував розвиток сакральної музики, тоді як [target_character.GetHisHer] внесок у жанр вілланелли вивів жвавий та сільський стиль на більшу популярність. [target_character.GetHisHer|U] робота збагатила культурну тканину [ROOT.GetCountry.GetName], демонструючи універсальність та жвавість нашої музичної традиції."
  flavor_ven.46.a: "Ми маємо честь мати [target_character.GetHimHer]!"
  flavor_ven.47.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] - [target_character.GetNameWithNoTooltip]"
  flavor_ven.47.desc: "[target_character.GetName] — відомий композитор і віртуозний органіст, значно вплинув на [ShowAdvanceName('ven_venetian_school_of_music')] своїм винятковим талантом та інноваційними творами. Служачи головним органістом у Базиліці Святого Марка, композиції та виступи [target_character.GetLastNameWithNoTooltip] встановили нові стандарти у сфері сакральної та світської музики. [target_character.GetHisHer|U] новаторські клавішні техніки та виразний стиль не лише піднесли музичний ландшафт [ROOT.GetCountry.GetName], але й надихнули музикантів по всій [ShowContinentName('europe')]."
  flavor_ven.47.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven.48.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] - [target_character.GetNameWithNoTooltip]"
  flavor_ven.48.desc: "[target_character.GetName], блискучий композитор та органіст, член [ShowAdvanceName('ven_venetian_school_of_music')], відомий [target_character.GetHisHer] майстерними композиціями та інноваційними техніками. Служачи органістом та композитором у Базиліці Святого Марка, робота [target_character.GetLastNameWithNoTooltip] започаткувала використання просторових ефектів у музиці, використовуючи унікальну акустику базиліки для створення приголомшливих поліхоральних композицій. [target_character.GetHisHer|U] внесок як у сакральну, так і в світську музику встановив нові стандарти музичного вираження та вплинув на незліченну кількість музикантів."
  flavor_ven.48.a: "Справжній майстер!"
  flavor_ven.49.title: "Повстання Святого Тита"
  flavor_ven.49.desc: "Серйозна ситуація виникла в нашому суб'єкті [GetCountry('CRT').GetName], де місцеві жителі взялися за зброю у значному повстанні, відомому як Повстання Святого Тита. Тривожно, що вперше навіть наші губернатори острова об'єдналися з повстанцями проти нашого правління. Ця несподівана єдність серед жителів острова становить серйозну загрозу для [ROOT.GetCountry.GetAdjective] контролю над [GetCountry('CRT').GetNameWithNoTooltip]."
  flavor_ven.49.a: "Ми нічого не можемо зробити."
  flavor_ven.49.b: "Ми повинні негайно надіслати допомогу!"
  flavor_ven.49.historical_info: "Повстання Святого Тита, що відбулося в 1363-1364 роках, було значним повстанням на острові Крит проти венеційського панування. Це був перший випадок, коли не лише місцеве грецьке населення, а й латинські губернатори брали участь у повстанні, об'єднані спільними скаргами проти венеційської влади. Незважаючи на грізний союз місцевих сил, повстання було зрештою придушене Венецією, що підтвердило її контроль над стратегічно важливим островом."
  flavor_ven.50.title: "Повстання Каллергісів"
  flavor_ven.50.desc: "$flavor_ven.49.title$ надихнув [ShowCultureName('greek_culture')] населення [GetCountry('CRT').GetName] піднятися на чергове повстання. Вони збираються під прапорами Каллергісів, які контролюють західні частини острова і все ще вірні [GetCountry('BYZ').GetName]. Якщо ми не діятимемо швидко, ми ризикуємо втратити життєво важливу частину нашої морської імперії, і сила нашого [ROOT.GetCountry.GetFlavorRank] буде значно ослаблена."
  flavor_ven.50.a: "Побачимо, чи вистачить їм сміливості протистояти нам."
  flavor_ven.50.b: "Поступитися їхнім вимогам."
  callergis_rebellion_joining: "Усі [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('aegean_archipelago_area')], що належать [GetCountry('CRT').GetName], приєднуються до [callergis_rebellion.GetName]"
  callergis_rebellion: "Повстання Каллергісів"
  flavor_ven.50.historical_info: "Повстання Каллергісів було повстанням на острові Крит, очолюваним видатною критською шляхетною родиною Каллергісів, проти венеційського панування. Мотивоване бажанням відновити місцеву автономію та вирішити скарги проти венеційського управління, повстання отримало широку підтримку серед критського населення. Незважаючи на початкові успіхи, повстання було зрештою придушене венеційськими силами, що призвело до жорстоких репресій та подальшої консолідації венеційського контролю над островом."
  flavor_ven.51.title: "[ShowBuildingTypeNameWithNoTooltip('piazza_san_marco')]"
  flavor_ven.51.desc: "Зростаюча сила та багатство нашого славетного [ROOT.GetCountry.GetFlavorRank] вимагають інвестицій у розвиток нашої столиці, забезпечуючи, щоб наше процвітання було наочно відображено у величі [ShowLocationName('venice')]. Була висунута пропозиція відремонтувати центральну площу, [ShowBuildingTypeName('piazza_san_marco')], перетворивши її за допомогою чудових арок та мармуру, щоб продемонструвати пишність нашої морської імперії. Такий ремонт покращить красу нашого міста та слугуватиме свідченням нашої незмінної могутності та культурної значущості."
  flavor_ven.51.a: "Ми профінансуємо ремонт."
  flavor_ven.51.b: "Ремонт занадто дорогий."
  flavor_ven.51.historical_info: "#italic Piazza San Marco#!, також відома як Площа Святого Марка, є головною публічною площею у Венеції, Італія, та однією з найвідоміших пам'яток міста. Площа, що розвивалася приблизно з IX століття та розширилася до своїх нинішніх розмірів у XII столітті, постійно покращувалася новими реконструкціями та новими пам'ятками. Вона оточена знаковими будівлями, включаючи Базиліку Святого Марка, Палац Дожів та Годинникову вежу Святого Марка, і протягом століть слугувала центральним місцем збору у Венеції, де проводилися політичні, релігійні та соціальні заходи."
  flavor_ven.52.title: "Годинникова вежа Святого Марка"
  flavor_ven.52.desc: "Хоча ми вже зробили значні інвестиції в реконструкцію [ShowBuildingTypeName('piazza_san_marco')], є нова пропозиція щодо подальшого покращення величі нашого міста. Запропоновано прикрасити площу чудовою годинниковою вежею, видимою як з міста, так і з моря. Ця годинникова вежа не тільки слугуватиме функціональним годинником, але й символом багатства та пишності нашого [ROOT.GetCountry.GetFlavorRank], видимим для всіх, хто наближається до [ShowLocationName('venice')] суходолом чи водою. Її присутність підвищить красу та престиж [ShowBuildingTypeNameWithNoTooltip('piazza_san_marco')] та зміцнить статус [ShowLocationNameWithNoTooltip('venice')] як перлини нашої морської імперії."
  flavor_ven.52.a: "Інвестувати в її будівництво."
  flavor_ven.52.b: "Наразі у нас інші пріоритети."
  flavor_ven.52.historical_info: "Годинникова вежа Святого Марка, або #italic Torre dell'Orologio#!, є історичною пам'яткою у Венеції, Італія, розташованою на #italic Piazza San Marco#!. Збудована між 1496 і 1499 роками, це вежа епохи Відродження, яка має великий астрономічний годинник. Цей годинник не тільки показує час, але й відображає фази місяця та знаки зодіаку. На вершині вежі дві бронзові фігури, відомі як «Маври», б'ють у дзвін, відзначаючи години. Годинникова вежа була розроблена, щоб продемонструвати багатство Венеції, її морську могутність та її зв'язок з космосом."
  flavor_ven.53.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Торгівля [ShowGoodsNameWithNoTooltip('salt')]"
  flavor_ven.53.desc: "Контроль над торгівлею [ShowGoodsName('salt')] здавна був наріжним каменем багатства та процвітання нашого [ROOT.GetCountry.GetFlavorRank]. Маючи майже монополію на цей життєво важливий торговий товар, наша Соляна контора ефективно управляє та регулює виробництво, розподіл та ціноутворення [ShowGoodsNameWithNoTooltip('salt')], забезпечуючи, щоб [ROOT.GetCountry.GetName] залишалася основним постачальником у регіоні. Ця прибуткова торгівля приносить значну частину нашого доходу, підтримуючи економічну стабільність та добробут нашої держави."
  flavor_ven.53.a: "[ShowGoodsNameWithNoTooltip('salt')] — це нове золото."
  flavor_ven.53.a.tt: "Кожна володіння, що виробляє [ShowGoodsName('salt')], отримує [ShowNamedValue('prosperity_severe_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_ven.54.title: "Геній [ven_tintoretto.GetNameWithNoTooltip]"
  flavor_ven.54.desc: "[ven_tintoretto.GetName], широко відомий як Тінторетто, є видатною постаттю Венеційської школи живопису. Прославлений за [ven_tintoretto.GetHisHer] видатне використання перспективи, драматичного освітлення та сміливих, динамічних композицій, запеклий та енергійний стиль [ven_tintoretto.GetLastNameWithNoTooltip] приніс [ven_tintoretto.GetHimHer] влучне прізвисько «il Furioso» – Шалений. [ven_tintoretto.GetHisHer|U] роботи, що характеризуються інтенсивними емоціями та інноваційними техніками, глибоко вплинули на художній ландшафт [ShowLocationName('venice')] та за її межами."
  flavor_ven.54.a: "[ven_tintoretto.GetSheHe|U] є гордістю [ROOT.GetCountry.GetFlavorRank]!"
  flavor_ven.55.title: "Розп'яття Тінторетто"
  flavor_ven.55.desc: "Ми маємо унікальну нагоду замовити [tintoretto.GetName], відомому як Тінторетто, створити величну картину Розп'яття Ісуса для Scuola Grande. [tintoretto.GetHisHer|U] запеклий і динамічний стиль обіцяє створити одну з наймонументальніших творів мистецтва, коли-небудь створених у [ShowLocationName('venice')], що відображатиме як велич нашого міста, так і нашу відданість його культурній та релігійній спадщині. Якщо ми приступимо до цього грандіозного проєкту, це піднесе художню репутацію [ShowLocationNameWithNoTooltip('venice')] на нові висоти. І навпаки, відмова може бути сприйнята як відсутність інтересу до просування пишноти та культурного значення нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_ven.55.a: "Замовити Тінторетто!"
  flavor_ven.55.b: "Ми повинні зосередитися на інших пріоритетах."
  flavor_ven.55.historical_info: "Розп'яття Тінторетто — монументальна картина, створена в 1565 році в рамках його роботи для #italic Scuola Grande di San Rocco#! у Венеції. Картина зображує розп'яття Христа з інтенсивним драматизмом та динамічною композицією, характерною для стилю Тінторетто. Вона містить величезну кількість фігур, що передають емоційне сум'яття сцени. Розп'яття є одним із шедеврів Тінторетто та ілюструє його здатність поєднувати реалізм з підвищеним відчуттям руху та світла. Робота є частиною більшої серії картин, що ілюструють життя Христа, замовлених для прикраси #italic Scuola#!, благодійної установи у Венеції."
  flavor_ven.56.title: "[ven_sansovino.GetNameWithNoTooltip]"
  flavor_ven.56.desc: "[ven_sansovino.GetName] — видатний скульптор та архітектор, відомий [ven_sansovino.GetHisHer] майстерною роботою над фасадами та мармуровими скульптурами, який залишив незгладимий слід на художньому ландшафті [GetCountry('FLO').GetName]. Прокуратори Сан-Марко, одні з найвпливовіших шляхетних родин у [ShowLocationName('venice')], пропонують запросити [ven_sansovino.GetLastNameWithNoTooltip] до [ShowLocationNameWithNoTooltip('venice')] та призначити [ven_sansovino.GetHimHer] головним архітектором та наглядачем за майном. [ven_sansovino.GetHisHer|U] виняткові навички та далекоглядний підхід могли б значно посилити архітектурну велич нашого міста та сприяти триваючій трансформації [ShowLocationNameWithNoTooltip('venice')] у маяк мистецтва."
  flavor_ven.56.a: "Зробити [ven_sansovino.GetHimHer] вигідну пропозицію."
  flavor_ven.56.b: "Найняти [ven_sansovino.GetHimHer] було б занадто дорого."
  flavor_ven.57.title: "Проєктування Дзекки [ShowLocationNameWithNoTooltip('venice')]"
  flavor_ven.57.desc: "З [sansovino.GetName], який тепер є нашим головним архітектором та наглядачем за майном, ми маємо унікальну можливість використати [sansovino.GetHisHer] досвід у проєктуванні будівництва Дзекки [ShowLocationName('venice')]. Цей життєво важливий монетний двір потребує міцної та вогнестійкої конструкції для забезпечення збереження наших монет та значного багатства [ROOT.GetCountry.GetFlavorRank]. Інноваційне архітектурне бачення [sansovino.GetLastNameWithNoTooltip] обіцяє забезпечити сучасний об'єкт, який не тільки задовольнить наші практичні потреби, але й відобразить велич та стабільність [ShowLocationNameWithNoTooltip('venice')]."
  flavor_ven.57.a: "Дозволити [sansovino.GetHimHer] наглядати за будівництвом."
  flavor_ven.57.b: "Нам бракує достатніх коштів для будівництва."
  flavor_ven.57.historical_info: "Дзекка Венеції була офіційним монетним двором Венеційської республіки, розташованим у самому серці Венеції. Вона відповідала за виробництво валюти Республіки, включаючи знамениті золоті дукати та срібні гроссо. Дзекка відігравала вирішальну роль в економіці Венеції, забезпечуючи стабільність та надійність її монетарної системи."
  flavor_ven.58.title: "Патріархат [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ven.58.desc: "У значному церковному розвитку, [GetCountry('PAP').GetAdjective] Булла #italic Regis Aeterni#! призвела до злиття Патріархату Градо з Єпископством Кастелло для утворення нового Патріархату [ShowLocationName('venice')]. Цей ключовий крок не тільки підвищує наш релігійний та політичний престиж, але й зміцнює наш вплив у [GetUniqueInternationalOrganization('catholic_church').GetName]. Консолідація цих важливих релігійних посад під юрисдикцією [ShowLocationNameWithNoTooltip('venice')] знаменує нову еру духовної значущості та інституційної влади для нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_ven.58.a: "Прийняти новий Патріархат."
  flavor_ven.59.title: "Захоплення влади [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_ven.59.desc: "Республіканські традиції [ROOT.GetCountry.GetLongName] були наріжним каменем нашого управління протягом століть, забезпечуючи баланс влади та спільне правління серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Однак ці традиції зараз під загрозою. Нинішній [ROOT.GetCountry.GetGovernment.GetRulerTitle], натхненний ерозією цих республіканських принципів, намагається централізувати владу та перетворити [ROOT.GetCountry.GetFlavorRank] на диктатуру під [target_ruler.GetHerHis] одноосібним командуванням. Цей сміливий крок ризикує занурити [ROOT.GetCountry.GetNameWithNoTooltip] у сум'яття, оскільки шляхта, що люто захищає свої привілеї, навряд чи погодиться на таку драматичну зміну влади."
  flavor_ven.59.a: "Підтримати прагнення [ROOT.GetCountry.GetGovernment.GetRulerTitle] до влади!"
  flavor_ven.59.b: "Захопити [ROOT.GetCountry.GetGovernment.GetRulerTitle] і усунути [target_ruler.GetHerHim] з посади."
  flavor_ven.59.c: "Кара за зраду – смерть!"
  flavor_ven.59.historical_info: "У 1355 році дож Маріно Фальєро спробував захопити контроль над Венеційською республікою. Незадоволений обмеженнями своєї влади та керований особистими образами, Фальєро змовився скинути встановлений уряд і встановити себе диктатором. Однак його змову було викрито до того, як вона могла здійснитися. Фальєро був заарештований, засуджений і страчений за зраду, що стало суворим нагадуванням про стійкість венеційського республіканізму та тяжкі наслідки для тих, хто намагався його підірвати."
  flavor_ven.60.title: "Укріплення [ShowLocationNameWithNoTooltip('dubrovnik')]"
  flavor_ven.60.desc: "[ShowLocationName('dubrovnik')] є головним торговим [target_location.GetRank.GetName] і одним з найцінніших активів нашої морської імперії. Попри свою важливість, оборона [ShowLocationNameWithNoTooltip('dubrovnik')] досить слабка, що робить його легкою здобиччю для наших ворогів, які вторгаються як з суші, так і з моря. Виділення золота на будівництво належних укріплень для його захисту, безумовно, не буде марним."
  flavor_ven.60.a: "[ShowLocationNameWithNoTooltip('dubrovnik')] має бути добре захищений."
  flavor_ven.60.b: "Його нинішні укріплення достатньо міцні."
  flavor_ven.60.historical_info: "Побудовані в XIV столітті, Стонські мури – це низка оборонних кам'яних стін, розташованих на півострові Пелєшац у Хорватії. Ці стіни слугують для захисту цінних соляних копалень та міста Стон. Простягаючись приблизно на 7 кілометрів, Стонські мури є одними з найдовших укріплень у Європі, відомими своєю вражаючою довжиною та стратегічним значенням у середньовіччі."
  flavor_ven.61.title: "[ven_platina.GetNameWithNoTooltip]"
  flavor_ven.61.desc: "Видатна кулінарна книга, #italic De honesta voluptate et valetudine#!, потрапила до [ShowLocationName('venice')], захопивши багатьох своїм проникливим поєднанням кулінарного мистецтва та гуманістичної філософії. Її автор, [ven_platina.GetName], відомий як значний гуманістичний письменник і гастроном. Однак кар'єра [ven_platina.GetHisHer] була затьмарена антигуманістичною політикою [GetCountry('PAP').GetAdjective] [GetCountry('PAP').GetGovernment.GetCourtTitle], де [ven_platina.GetSheHe] раніше служив, що призвело до ув'язнення та переслідування [ven_platina.GetHisHer]. Привітання [ven_platina.GetHimHer] у [ShowLocationNameWithNoTooltip('venice')] могло б запропонувати [ven_platina.GetHimHer] перепочинок від [ven_platina.GetHisHer] проблем і дозволити нашому [ROOT.GetCountry.GetFlavorRank] скористатися [ven_platina.GetHisHer] величезними знаннями."
  flavor_ven.61.a: "Запропонувати [ven_platina.GetHimHer] добрі гроші за посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ven.61.b: "Нас це не цікавить."
  flavor_ven.62.title: "Одруження з морем"
  flavor_ven.62.desc: "Однією з найважливіших і найтриваліших традицій [ROOT.GetCountry.GetName] є церемонія Одруження з морем, щорічна подія, що символізує морське панування та процвітання нашого [ROOT.GetCountry.GetFlavorRank]. Щороку на Вознесіння [ROOT.GetCountry.GetGovernment.GetRulerTitle] у супроводі величної процесії [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] відпливає в Адріатичне море на державній баржі, [target_art.GetName]. Серед вишуканих ритуалів і молитов освячений перстень кидають у воду. Цей акт підтверджує наш зв'язок з морем, визнаючи життєво важливу роль, яку воно відіграє в нашому багатстві, владі та виживанні."
  flavor_ven.62.a: "Ми повинні дотримуватися наших традицій!"
  flavor_ven.62.b: "Від цього слід відмовитися, щоб заощадити ресурси."
  flavor_ven.63.title: "Реновація [target_art.GetNameWithNoTooltip]"
  flavor_ven.63.desc: "[target_art.GetName], чудова державна баржа [ROOT.GetCountry.GetName], є символом нашого багатства, могутності та морської спадщини. Використовувана переважно для щорічної церемонії $flavor_ven.62.title$, де [ROOT.GetCountry.GetGovernment.GetRulerTitle] підтверджує наше панування над Адріатикою, [target_art.GetNameWithNoTooltip] є невід'ємною частиною нашої культурної та політичної ідентичності. Це величне судно, прикрашене витонченим різьбленням та золотими оздобленнями, слугує плавучим палацом, що представляє пишність та авторитет Ла Сереніссіми.\n\nОднак [target_art.GetNameWithNoTooltip] бачила кращі дні, і її велич згасає. Реновація цієї знакової баржі є вирішальною для підтримки нашого іміджу та забезпечення подальшого успіху нашої найважливішої церемоніальної події."
  flavor_ven.63.a: "Інвестувати в реновацію."
  flavor_ven.63.b: "Залишити як є."
  flavor_ven.64.title: "Подорож братів Дзено"
  flavor_ven.64.desc: "Ми нещодавно виявили захопливу карту, яка, як стверджується, базується на подорожі, здійсненій Ніколо та Антоніо Дзено багато десятиліть тому. Ця карта деталізує їхні ймовірні дослідження північних морів навколо [ShowAreaName('iceland_area')] та за її межами. Публікація викликала інтригу та суперечки в нашій республіці, оскільки вона передбачає потенційні нові морські шляхи та території далеко від нашого середземноморського серця.\n\nДеякі стверджують, що дослідження автентичності карти може надати цінну інформацію та відкрити нові можливості для [ROOT.GetCountry.GetAdjectiveWithNoTooltip] торгівлі та досліджень. Однак інші заперечують, що наші ресурси та увага повинні залишатися на Середземномор'ї, де міцно вкорінені наші сили та інтереси."
  flavor_ven.64.a: "Дослідити її автентичність."
  flavor_ven.64.a.tt: "Відкрити [ShowAreaName('greenland_area')], [ShowAreaName('eastern_greenland_sea_area')] та [ShowAreaName('western_greenland_sea_zones_area')]."
  flavor_ven.64.b: "Карта для нас нічого не варта."
  flavor_ven.64.historical_info: "Ніколо Дзено, венеційський сенатор, опублікував карту та супровідну розповідь, що деталізувала ймовірні подорожі його предків, Ніколо та Антоніо Дзено. Згідно з розповіддю, брати Дзено вирушили у велику подорож північними морями, нібито досягнувши районів навколо Ісландії, Гренландії та навіть частин Північної Америки. Карта стверджувала, що на ній зображені ці північні території та моря, хоча її точність та автентичність були предметом дебатів серед істориків. Попри суперечки, карта привернула значну увагу у Венеції та за її межами, оскільки вона спокушала дослідників та вчених можливістю невідкритих земель та навігаційних маршрутів у Північній Атлантиці."
  flavor_ven.65.title: "Кастелло а Маре"
  flavor_ven.65.desc: "[ShowLocationName('candia')], чудова перлина [ShowProvinceDefinitionName('crete_province')], є свідченням [ROOT.GetCountry.GetAdjective] панування в [ShowProvinceDefinitionName('aegean_sea_province')]. Цей процвітаючий [target_location.GetRank.GetName] не лише слугує важливим центром торгівлі та культури, але й стратегічною фортецею, що забезпечує наш вплив на східне Середземномор'я. Однак зростаюча важливість [ShowLocationNameWithNoTooltip('candia')] вимагає будівництва [ShowBuildingTypeName('castle')] для її захисту від потенційних загроз."
  flavor_ven.65.a: "Побудувати!"
  flavor_ven.65.b: "Розподілити ресурси в іншому місці."
  flavor_ven.65.historical_info: "Кастелло а Маре, також відома як фортеця Кулес, — венеційська фортеця, розташована біля входу до старої гавані Іракліона (історично відомого як Кандія) на острові Крит. Збудована в XVI столітті, вона слугувала ключовою оборонною спорудою для захисту міста від морських загроз та забезпечення венеційського панування в Егейському морі. Фортеця є видатним символом венеційської архітектурної та військової майстерності в регіоні."
  flavor_ven.66.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.66.desc: "[target_character.GetName], висококваліфікований генерал, здобув популярність, пропонуючи [target_character.GetHisHer] послуги [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank]. Відомий [target_character.GetHisHer] стратегічною проникливістю та лідерством на полі бою, [target_character.GetLastNameWithNoTooltip] може стати ключовим активом у наших постійних зусиллях із забезпечення та розширення наших територій. [target_character.GetHisHer|U] досвід обіцяє покращити наші військові можливості та наблизити нас до наших цілей морського панування та регіональної стабільності."
  flavor_ven.66.a: "Під [target_character.GetHisHer] командуванням наш флот буде непереможним!"
  flavor_ven.66.b: "Нехай [target_character.GetHimHer] краще служить у кабінеті."
  flavor_ven.66.historical_info: "П'єтро Лоредан, історично один із найвидатніших венеційських адміралів та військових лідерів, відіграв значну роль у XV столітті. Він відомий своїми перемогами над османами та внеском у венеційську морську імперію. Лідерство Лоредана було вирішальним під час битви при Галліполі в 1416 році, де він успішно відбив османські сили, забезпечивши венеційські інтереси в Егейському морі."
  flavor_ven.67.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.67.desc: "Відомий скульптор та архітектор, [target_character.GetName], запропонував [target_character.GetHisHer] виняткові навички на службу [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank]. Прославлений [target_character.GetHisHer] здатністю бездоганно переходити від готичної до ренесансної архітектури, роботи [target_character.GetLastNameWithNoTooltip] є прикладом елегантності та інновацій цих двох різних стилів. [target_character.GetHisHer|U] досвід міг би значно покращити естетичну та культурну велич [ShowLocationName('venice')], забезпечуючи, щоб наш [target_location.GetRank.GetName] залишався маяком художніх досягнень та архітектурної краси."
  flavor_ven.67.a: "Негайно найняти [target_character.GetHimHer]!"
  flavor_ven.67.b: "Ми не можемо дозволити собі [target_character.GetHisHer] послуги."
  flavor_ven.67.historical_info: "Бартоломео Боно був історично значущим завдяки своєму внеску в архітектурний ландшафт Венеції протягом XV століття. Його помітні роботи включають складну Порта делла Карта в Палаці дожів та чудовий Ка' д'Оро, обидва з яких демонструють його майстерність у поєднанні готичної витонченості з новими ідеалами Відродження."
  flavor_ven.68.title: "Геній [target_character.GetNameWithNoTooltip]"
  flavor_ven.68.desc: "[target_character.GetName] — блискучий композитор і віртуозний скрипаль, відомий [target_character.GetHisHer] інноваційними композиціями та чудовими виступами. Музика [target_character.GetLastNameWithNoTooltip] захоплює публіку та підвищує культурний престиж [ROOT.GetCountry.GetName]. Пропозиція [target_character.GetHimHer] місця при [ROOT.GetCountry.GetGovernment.GetCourtTitle] могла б значно покращити художню спадщину нашого [ROOT.GetCountry.GetFlavorRank] та позиціонувати нас як центр музичної досконалості."
  flavor_ven.68.a: "Ми не можемо дочекатися [target_character.GetHisHer] музичних починань!"
  flavor_ven.68.historical_info: "Антоніо Вівальді прославлений як один із найвидатніших композиторів бароко. Його плідна творчість включає понад 500 концертів, численні опери та духовну музику. Найвідоміший твір Вівальді, «Пори року», революціонізував форму концерту та продемонстрував його винахідливе використання мелодії, гармонії та оркестровки. Як маестро ді віоліно в Ospedale della Pietà, він перетворив заклад на відомий музичний центр, приваблюючи шанувальників з усієї Європи."
  flavor_ven.69.title: "Війна [GetCountry('PAD').GetNameWithNoTooltip]"
  flavor_ven.69.desc: "Знову наша улюблена [ROOT.GetCountry.GetFlavorRank] опиняється втягнутою у значний конфлікт, оскільки ми прагнемо утвердити своє панування та захистити свої інтереси в регіоні. Ця війна з [GetCountry('PAD').GetName] представляє як виклик, так і можливість для [ROOT.GetCountry.GetName] розширити свій вплив та забезпечити свої кордони. Наші сили повинні бути зібрані, а наші стратегії ретельно сплановані, щоб пройти цей бурхливий період і вийти переможцями."
  flavor_ven.69.a: "Зібрати наші сили та розпочати наступ!"
  flavor_ven.69.b: "Зосередитися на обороні наших земель."
  flavor_ven.69.historical_info: "Війна за Падую була ключовим конфліктом за участю Венеційської республіки та родини Каррара, яка правила Падуєю. Війна розпочалася, коли Франческо II да Каррара, лорд Падуї, прагнув розширити свої території за рахунок Венеції, загрожуючи інтересам республіки. Венеція, рішуче налаштована захистити свої торговельні шляхи та територіальну цілісність, розпочала військову кампанію проти Падуї. Конфлікт завершився рішучою перемогою Венеції, що призвело до анексії Падуї та консолідації венеційської влади в регіоні."
  flavor_ven.70.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.70.desc: "[target_character.GetName], композитор великого хисту, запропонував [target_character.GetHisHer] послуги [ROOT.GetCountry.GetFlavorRank]. Відомий витонченими композиціями та проникливими літературними творами, мистецький хист [target_character.GetLastNameWithNoTooltip] міг би значно підвищити культурний престиж [ROOT.GetCountry.GetName]. [target_character.GetHisHer|U] участь обіцяє піднести наш статус як центру музичної досконалості та інтелектуальної витонченості."
  flavor_ven.70.a: "[target_character.GetLastNameWithNoTooltip] отримає місце при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ven.70.b: "Нехай [target_character.GetHimHer] зосередиться на [target_character.GetHisHer] музиці."
  flavor_ven.70.historical_info: "Бенедетто Марчелло був видатною постаттю епохи барокової музики. Він найбільш відомий своїм твором \"Estro poetico-armonico\", збіркою з 50 псалмів, що поєднують глибокі релігійні тексти зі складними музичними композиціями. Твори Марчелло відзначаються елегантністю, ясністю та емоційною глибиною. Крім того, його сатиричні твори, такі як \"Il Teatro alla Moda\", надають проникливий коментар до сучасних музичних практик та оперної сцени його часу."
  flavor_ven.71.title: "Питання Конціо"
  flavor_ven.71.desc: "Історично, [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName] обирався Конціо, групою вільних громадян, що представляли населення міста. Однак, останнім часом [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] все частіше намагається узурпувати контроль над виборчим процесом. Цей зсув викликав заворушення серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які розглядають це як пряму загрозу своїм традиційним правам. Ситуація напружена, і ми повинні вирішити, чи стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], чи підтримати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], щоб запобігти подальшій ескалації."
  flavor_ven.71.a: "Стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_ven.71.b: "Стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_ven.71.historical_info: "Історично, Конціо відігравало вирішальну роль в управлінні Венецією, символізуючи відданість республіки залученню своїх вільних громадян до обрання Дожа. Однак, у міру зростання багатства та могутності Венеції, шляхта та впливові купецькі родини прагнули консолідувати свій контроль, виступаючи за зміни, які б обмежували виборчий процес до обраних. Оскільки Конціо постійно позбавляли влади, воно стало марним і було остаточно скасовано в 1423 році."
  flavor_ven.72.title: "Магістрат Саніта"
  flavor_ven.72.desc: "[ShowLocationName('venice')], жвавий центр торгівлі та культури, історично страждав від різних хвороб, що загрожували здоров'ю та добробуту наших громадян. У світлі нещодавніх спалахів зростає консенсус щодо необхідності вжиття проактивних заходів для управління громадським здоров'ям. Створення Магістрату Саніта, установи, присвяченої нагляду за санітарією, карантинними протоколами та профілактикою захворювань, може бути життєво важливим для захисту нашого населення та підтримки процвітання нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_ven.72.a: "Профінансувати його для захисту громадського здоров'я."
  flavor_ven.72.b: "Ми не можемо дозволити собі такі інвестиції."
  flavor_ven.72.historical_info: "Магістрат Саніта Венеційської республіки був спеціалізованим державним органом охорони здоров'я, створеним у 15 столітті для захисту Венеції від епідемій, зокрема чуми. Він відповідав за впровадження карантинних заходів, регулювання пересування людей та товарів, а також забезпечення громадського здоров'я шляхом інспекцій та санітарних заходів."
  flavor_ven.73.title: "Банко дель Джиро"
  flavor_ven.73.desc: "Фінансові потреби нашого [ROOT.GetCountry.GetFlavorRank] стають дедалі складнішими, що вимагає створення належного державного банку. Банко дель Джиро, під безпосереднім контролем Сенату, міг би наглядати за фінансами [ROOT.GetCountry.GetName], забезпечуючи більшу стабільність та ефективність у наших економічних справах. Ця установа не лише управляла б державними коштами, але й сприяла б торгівлі та комерції, а також зміцнювала б наші фінансові основи."
  flavor_ven.73.a: "Банк забезпечить наші фінанси."
  flavor_ven.73.b: "У ньому немає потреби."
  flavor_ven.74.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Свята Інквізиція"
  flavor_ven.74.desc: "Поширення єресей становить значну загрозу духовній та політичній стабільності нашого [ROOT.GetCountry.GetFlavorRank]. Для боротьби з цією зростаючою загрозою було запропоновано розширити Інквізицію в [ROOT.GetCountry.GetName] за підтримки [GetCountry('PAP').GetName]. Необхідно прийняти рішення, чи проводити радикальну інквізицію, більш поміркований підхід, чи взагалі уникнути створення інквізиції, зважуючи потенційні переваги та наслідки для нашого суспільства та управління."
  flavor_ven.74.a: "Провести радикальну інквізицію для викорінення єресі."
  flavor_ven.74.b: "Ми повинні підійти до цього обережніше."
  flavor_ven.74.c: "Не будемо втручатися в це."
  flavor_ven.75.title: "Підтримка конвоїв Муда"
  flavor_ven.75.desc: "Флотилія торгових суден «Конвої Муда» є життєдайною силою торгівлі [ROOT.GetCountry.GetName], що перетинає Середземномор'я, Левант і далі, щоб принести товари, людей, знання та процвітання до нашої столиці. Їхні подорожі є важливими для підтримки потоку комерції, що підтримує нашу економіку. Надаючи додаткову підтримку цим конвоям, ми можемо забезпечити, що вони принесуть ще більше багатства та ресурсів, підвищуючи наш статус як провідного торгового центру."
  flavor_ven.75.a: "Фінансувати їхні підприємства."
  flavor_ven.75.b: "Вони можуть впоратися самостійно."
  flavor_ven.76.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.76.desc: "[target_character.GetName] — майстерний скульптор і ливарник бронзи, відомий [target_character.GetHisHer] майстерністю та артистизмом. [target_character.GetLastNameWithNoTooltip] зголосився запропонувати [target_character.GetHisHer] послуги [ROOT.GetCountry.GetFlavorRank]. [target_character.GetHisHer|U] робота могла б посилити велич нашої столиці та зміцнити наш статус як центру [ShowInstitutionName('renaissance')] мистецтва та культури. Підтримка [target_character.GetHisHer] проєктів може коштувати дорого, але культурний престиж, який вона принесе, може бути безцінним."
  flavor_ven.76.a: "Замовити [target_character.GetHimHer]!"
  flavor_ven.76.b: "Ми не можемо собі цього дозволити."
  flavor_ven.76.historical_info: "Алессандро Леопарді був видатним італійським скульптором і бронзоливарником епохи Відродження, найбільш відомим за завершенням чудової бронзової кінної статуї Бартоломео Коллеоні у Венеції. Його технічна майстерність та художнє бачення високо цінувалися, і він відіграв значну роль у розвитку мистецтва бронзового лиття."
  flavor_ven.77.title: "Розширення Domini di Terraferma"
  flavor_ven.77.desc: "Наші військові перемоги забезпечили нам значний плацдарм у [ShowRegionName('italy_region')], ще більше розширивши так звані Domini di Terraferma — наші материкові володіння. Завоювання цих земель доводить, що ми є потужною силою як на морі, так і на суші, а створення цієї буферної зони значно підвищує безпеку [ShowLocationName('venice')]."
  flavor_ven.77.a: "Відсвяткувати цей успіх!"
  flavor_ven.77.b: "Натомість зосередитися на інтеграції цих провінцій."
  flavor_ven.78.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.78.desc: "[target_character.GetName], людина глибокого інтелекту та різнобічних знань, запропонував надати [target_character.GetHisHer] послуги [ROOT.GetCountry.GetFlavorRank]. Відомий [target_character.GetHisHer] майстерністю в праві, науці та теології, поради [target_character.GetLastNameWithNoTooltip] могли б значно покращити наше управління та дипломатичні стратегії. Прийняття [target_character.GetHisHer] керівництва може зміцнити наш політичний та інтелектуальний статус, посиливши роль [ROOT.GetCountry.GetName] як лідера в розумі та просвітництві, хоча ми, ймовірно, повинні бути обережними. [target_character.GetLastNameWithNoTooltip] дуже критично ставиться до [ShowReligionName('catholic')] Церкви, і [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] може не сподобатися наше рішення запросити [target_character.GetHimHer] до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ven.78.a: "Призначити [target_character.GetHimHer] нашим радником."
  flavor_ven.78.b: "Ми не повинні ризикувати розгнівати Церкву."
  flavor_ven.78.historical_info: "Паоло Сарпі був венеційським істориком, вченим і державним діячем, який відіграв вирішальну роль під час Венеційського інтердикту 1606-1607 років, конфлікту між Венецією та Папством. Твердий захист Сарпі автономії Республіки та його праці, що виступали за відокремлення Церкви від держави, були значними у формуванні політичного ландшафту того часу."
  flavor_ven.79.title: "[ShowProvinceDefinitionNameWithNoTooltip('cyprus_province')], плацдарм"
  flavor_ven.79.desc: "Острів [ShowProvinceDefinitionName('cyprus_province')] перейшов під наш повний контроль, що знаменує значне розширення нашого впливу в Середземному морі. Завдяки своєму стратегічному розташуванню, [ShowProvinceDefinitionNameWithNoTooltip('cyprus_province')] слугує ідеальною базою для проектування нашої влади по всьому регіону, дозволяючи нам домінувати на ключових торгових шляхах та чинити тиск на наших суперників. Це придбання забезпечує вирішальний плацдарм для потенційних майбутніх кампаній у [ShowAreaName('levant_area')] та [ShowRegionName('egypt_region')], забезпечуючи [ROOT.GetCountry.GetAdjective] інтереси далеко за межами наших поточних кордонів."
  flavor_ven.79.a: "Наші очі на [ShowLocationNameWithNoTooltip('alexandria')]."
  flavor_ven.79.b: "Ми повинні звільнити [ShowLocationNameWithNoTooltip('jerusalem')]."
  flavor_ven.79.c: "Давайте заявимо права на [ShowLocationNameWithNoTooltip('antioch')]."
  flavor_ven.79.d: "Натомість ми повинні зміцнити наше панування над [ShowProvinceDefinitionNameWithNoTooltip('cyprus_province')]."
  flavor_ven.80.title: "Божественне втручання"
  flavor_ven.80.desc: "Люта буря вразила [target_location.GetRank.GetName] [ShowLocationName('venice')], загрожуючи спустошити лагуну та її мешканців. Однак катастрофу вдалося відвернути, і багато хто стверджує, що шторм був дивовижним чином вгамований надприродним втручанням святих Марка, Георгія та Миколая, яких до [target_location.GetRank.GetNameWithNoTooltip] привіз скромний рибалка. Після того, як буря вщухла, три святі, як кажуть, подарували рибалці священний перстень, відомий як #italic Перстень Рибалки#!, що символізує їхній захист та прихильність до [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ven.80.a: "Наші святі покровителі врятували нас!"
  flavor_ven.80.b: "Люди не повинні бути такими забобонними."
  flavor_ven.80.historical_info: "Буря 1340 року була великим штормом, що завдав значної шкоди Венеції. Легендарна історія про божественне втручання підкреслює глибоке релігійне та культурне значення події, переплітаючись із венеційською ідентичністю та переказами. #italic Перстень Рибалки#! став символом чудесного порятунку міста та його нерозривного зв'язку зі святими покровителями."
  flavor_ven.81.title: "[target_character.GetNameWithNoTooltip] та Палац на Гранд-каналі"
  flavor_ven.81.desc: "Шляхетний [target_character.GetName], могутній патрицій нашого [ROOT.GetCountry.GetFlavorRank], розпочав будівництво нового чудового палацу — $ca_foscari$ — на берегах Гранд-каналу. Задуманий як символ багатства та незмінного впливу родини [target_character.GetLastNameWithNoTooltip], проєкт швидко привертає увагу. Деякі радники припускають, що внесок від держави міг би допомогти забезпечити лояльність родини [target_character.GetLastNameWithNoTooltip] та зміцнити наші політичні союзи в межах [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_ven.81.a: "Підтримаємо це починання."
  flavor_ven.81.a.tt: "Родина [target_character.GetLastName] пам'ятатиме це і відплатить за цю послугу, якщо член династії коли-небудь стане правителем."
  flavor_ven.81.b: "[target_character.GetNameWithNoTooltip] достатньо багатий, щоб побудувати його без допомоги."
  flavor_ven.81.historical_info: "Франческо Фоскарі був дожем Венеції з 1423 по 1457 рік. Він очолював одне з найдовших і найамбітніших правлінь в історії Венеції. Як покровитель мистецтв і рішучий прихильник експансії Венеції на італійському материку, він замовив будівництво #italic Ка' Фоскарі#!, грандіозного готичного палацу, що символізував престиж його родини."
  flavor_ven.82.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Статути"
  flavor_ven.82.desc: "Намагаючись зберегти цілісність нашого управління та адаптуватися до зростаючої складності [ROOT.GetCountry.GetAdjective] життя, [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує розробити масштабну реформу наших законів. Ці нові статути уніфікують та модернізують існуючі правові традиції, охоплюючи все: від комерційного регулювання та морського права до моральної поведінки та громадянських обов'язків."
  flavor_ven.82.a: "Прийняти та запровадити статути."
  flavor_ven.82.b: "Наразі нам слід уникати таких реформ."
  flavor_ven.82.historical_info: "Венеційські статути 1368 року були значною правовою кодифікацією, яка уніфікувала та реорганізувала правову систему Республіки. Статути стандартизували закони, що розвивалися протягом століть. Вони охоплювали торгівлю, кримінальне право, громадянські обов'язки та моральну поведінку, відображаючи потребу Венеції регулювати дедалі складніше суспільство та розширювану імперію."
  flavor_ven.83.title: "[target_character.GetNameWithNoTooltip] та Карта Світу"
  flavor_ven.83.desc: "[target_character.GetName] — відомий [ROOT.GetCountry.GetAdjective] чернець і картограф, який роками невтомно працював над картою світу. За словами [target_character.GetHimHer], ця карта є шедевром географічних знань і обіцяє надати неперевершене розуміння відомого світу, а також незвіданих територій за його межами. Однак [target_character.GetSheHe] потребує додаткового фінансування для завершення проєкту і звернувся до нас за підтримкою."
  flavor_ven.83.a: "Надати [target_character.GetHimHer] фінансову підтримку."
  flavor_ven.83.b: "Відхилити [target_character.GetHisHer] запит."
  flavor_ven.83.historical_info: "Фра Мауро був венеційським ченцем, відомим своєю картою світу, створеною близько 1450 року. Його карта була однією з найпередовіших свого часу, синтезуючи географічні знання з європейських, арабських та інших джерел, і була найдетальнішою картою світу до того моменту. Карта була однією з перших, яка ставила точність вище релігійних переконань, оскільки старіші карти розміщували Єрусалим у центрі карти або показували біблійний рай як фізичне місце; нічого з цього не було відображено на цій карті."
  flavor_ven.84.title: "[ruler_dynasty.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_ven.84.desc: "[target_ruler.GetName], член шанованої родини [ruler_dynasty.GetName], зійшов на посаду [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName]. [ruler_dynasty.GetNameWithNoTooltip] довгий час були могутньою та впливовою родиною в межах [ROOT.GetCountry.GetFlavorRank], і їхнє сходження на найвищу посаду є свідченням їхньої незмінної спадщини. Враховуючи нашу попередню підтримку їхньої родини, особливо під час будівництва [target_art.GetName], [ruler_dynasty.GetNameWithNoTooltip] тепер прагнуть повністю відплатити [ROOT.GetCountry.GetFlavorRank], пропонуючи свою лояльність та ресурси для подальшого зміцнення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] влади та престижу."
  flavor_ven.84.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven.84.historical_info: "Родина Фоскарі дала кілька видатних діячів венеційської політики, найвідомішим з яких був Франческо Фоскарі, який служив дожем Венеції з 1423 року до своєї вимушеної відставки та раптової смерті в 1457 році. Його правління відзначилося експансіоністською політикою та значними змінами у венеційських політичних структурах. Правління Франческо Фоскарі характеризувалося консолідацією венеційської влади у східному Середземномор'ї та участю у війнах проти Мілана та Османської імперії. Родина Фоскарі також відіграла важливу роль у посиленні впливу Венеції на торгівлю та її домінування в Середземномор'ї."
  flavor_ven.85.title: "$diarii$"
  flavor_ven.85.desc: "[target_character.GetName] невтомно укладає обширну хроніку [ROOT.GetCountry.GetAdjective] історії, політики та суспільства у монументальній праці під назвою $diarii$. Наближаючись до завершення праці свого життя, [target_character.GetLastNameWithNoTooltip] звернувся до уряду зі скромним проханням про фінансування для публікації [target_character.GetHisHer] томів, вважаючи, що збереження діянь [ROOT.GetCountry.GetFlavorRank] для майбутніх поколінь є послугою, гідною державної підтримки."
  flavor_ven.85.a: "Фінансувати публікацію."
  flavor_ven.85.b: "Ми не можемо виділити на це кошти."
  flavor_ven.85.historical_info: "Маріно Сануто був венеційським істориком, що вів щоденник, і членом Великої ради, який створив збірку історичних записів, відому як #italic Diarii#!. Це була 58-томна хроніка, що документувала політичні, дипломатичні та соціальні справи Республіки з 1496 по 1533 рік."
  flavor_ven.86.title: "Голос еллінів"
  flavor_ven.86.desc: "Оскільки [ShowInstitutionName('printing_press')] процвітає в [ROOT.GetCountry.GetFlavorRank], група вчених та [ShowReligionAdjective('orthodox')] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] звернулися до друку як засобу збереження [ShowCultureName('greek_culture')] літератури, релігійних творів та культурної ідентичності. Тепер вони звертаються до держави за фінансовою допомогою для розширення своїх друкарських зусиль, стверджуючи, що [ROOT.GetCountry.GetName], покровитель навчання та охоронець свободи, має бути маяком [ShowCultureNameWithNoTooltip('greek_culture')] культури в нашій країні."
  flavor_ven.86.a: "Підтримати їх та їхню благородну справу."
  flavor_ven.86.a.tt: "Усі наші [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowLocationName('venice')] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ven.86.b: "Жодних іноземних друкарень у [ROOT.GetCountry.GetFlavorRank]!"
  flavor_ven.86.b.tt: "Усі наші [ShowCultureName('greek_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowLocationName('venice')] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ven.86.historical_info: "Наприкінці 16 століття Венеція стала центром грецької православної науки, значною мірою завдяки свободі друку та великій грецькій емігрантській громаді, що тікала від османського панування. Місто розмістило першу у світі грецьку друкарню, яка видавала літургійні книги, класичні тексти та філософські праці."
  flavor_ven.87.title: "Вчена попри всі перешкоди"
  flavor_ven.87.desc: "[target_character.GetName], шляхтянка, яка увійшла в історію, ставши першою жінкою в [ShowContinentName('europe')], що здобула докторський ступінь з філософії в Університеті [ShowLocationName('padova')], повернулася до [ROOT.GetCountry.GetName] з великим визнанням. Вчені та реформаторські радники тепер пропонують підтримати [target_character.GetHimHer], дозволивши [target_character.GetHimHer] продовжувати поширювати [target_character.GetHisHer] мистецтво. Проте більш консервативні фракції стверджують, що дозвіл жінкам вільно поширювати мистецтво принесе ганьбу традиції."
  flavor_ven.87.a: "Це не місце для жінки."
  flavor_ven.87.b: "Дозволити [target_character.GetHimHer] продовжувати працювати."
  flavor_ven.87.historical_info: "Елена Корнаро Піскопія була першою жінкою в Європі, яка здобула університетський ступінь. Винятково обдарована у філософії, музиці та теології, вона отримала докторський ступінь з філософії в Падуанському університеті в 1678 році."
  flavor_ven.88.title: "Музичний міст"
  flavor_ven.88.desc: "[target_character.GetName] — талановитий композитор, який навчався у [ShowLocationName('venice')]. [target_character.GetSheHe|U] повернувся до [ROOT.GetCountry.GetFlavorRank] після років у [target_country.GetName], де [target_character.GetSheHe] служив при [target_country.GetGovernment.GetCourtTitle]. Відомий [target_character.GetHisHer] інноваціями в світській вокальній музиці, [target_character.GetSheHe] тепер пропонує заснувати консерваторію, яка б поєднала музичні традиції [target_country.GetNameWithNoTooltip] та [ShowRegionName('italy_region')]."
  flavor_ven.88.a: "Схвалити пропозицію."
  flavor_ven.88.b: "Ми не підтримуватимемо іноземну музику."
  flavor_ven.88.historical_info: "Анджело Нотарі був членом венеційського літературного гуртка, відомого як #italic Accademia degli Sprovisti#!, але пізніше він переїхав до Англії, де провів більшу частину свого життя. Там він вступив на службу до короля Карла I, а пізніше став придворним музикантом, виступаючи як співак і лютніст. Він відіграв важливу роль у просуванні італійської барокової музики в Англії."
  flavor_ven.89.title: "Експерименти [target_character.GetLastNameWithNoTooltip]"
  flavor_ven.89.desc: "[target_character.GetName], математик і учень [galileo_galilei_scope.GetName], нещодавно прибув до [ShowLocationName('venice')] з пропозицією. [target_character.GetSheHe|U] бажає провести серію експериментів, використовуючи наші канали, щоб перевірити теорії про потік води та гідравліку. Це може дати нам краще розуміння динаміки рідин і, можливо, навіть допомогти нам у боротьбі з повенями, покращенні канальних систем та зміцненні торговельної інфраструктури, хоча деякі побоюються, що [target_character.GetHisHer] неперевірені методи можуть пошкодити канали."
  flavor_ven.89.a: "Прогрес вартий ризику."
  flavor_ven.89.b: "Ми не можемо ризикувати пошкодженням каналів."
  flavor_ven.89.historical_info: "Бенедетто Кастеллі був математиком і вченим, який став професором Падуанського університету. Учень Галілея, він особливо цікавився геометрією та вимірюванням текучої води. Його дослідження сприяли розвитку сучасної гідродинаміки."
  flavor_ven.90.title: "[target_character.GetLastNameWithNoTooltip]"
  flavor_ven.90.desc: "Відомий драматург [target_character.GetName] запропонував нову серію опер, які будуть виконані в [ROOT.GetCountry.GetAdjective] [ShowBuildingTypeName('opera_house')], приносячи як розвагу, так і престиж [ROOT.GetCountry.GetFlavorRank]. Хоча ідея [target_character.GetHisHer] безсумнівно підвищить наш статус як покровителів мистецтв і культури, деякі члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], однак, заперечують проти зростаючої популярності опери, побоюючись, що вона розбещує душу і відвертає людей від віри."
  flavor_ven.90.a: "Фінансувати серію опер."
  flavor_ven.90.b: "Опера занадто декадентська для нас."
  flavor_ven.90.historical_info: "Ніколо Мінато був одним з провідних лібретистів Венеції і відіграв життєво важливу роль у розвитку ранньої опери. Його робота з іншими лібретистами допомогла популяризувати оперу як основну форму мистецтва у Венеції. Спочатку він служив Республіці, але пізніше переїхав до Відня і став придворним поетом Леопольда I."
  flavor_ven.91.title: "Розширення гетто [ShowLocationNameWithNoTooltip('venice')]"
  flavor_ven.91.desc: "Протягом останніх десятиліть у [ShowLocationName('venice')] спостерігається постійне зростання [ShowReligionAdjective('judaism')] населення. Спочатку обмежена невеликою, закритою територією, відомою як #italic Ghetto Nuovo#!, громада тепер включає людей з різних місць. Однак обмежений простір стає переповненим, що призводить до погіршення умов життя та напруги. Представники громади нещодавно звернулися до уряду [ROOT.GetCountry.GetFlavorRank] з проханням про фінансування розширення гетто для задоволення потреб громади."
  flavor_ven.91.a: "Розширити гетто."
  flavor_ven.91.a.tt: "Усі наші [ShowReligionAdjective('judaism')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowLocationName('venice')] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ven.91.b: "Закрити очі і нічого не робити."
  flavor_ven.91.b.tt: "Усі наші [ShowReligionAdjective('judaism')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowLocationName('venice')] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ven.91.historical_info: "Венеційське гетто було офіційно засноване в 1516 році як визначена територія, де єврейське населення Венеції повинно було жити. Незважаючи на обмеження їхнього пересування та професій, єврейські мешканці відігравали життєво важливу роль у комерційному та інтелектуальному житті міста. Гетто розширювалося поетапно, щоб вмістити зростаюче населення, особливо з прибуттям сефардських та левантійських євреїв, які шукали притулку від переслідувань або хотіли скористатися можливостями у процвітаючій економіці Венеції. Назва гетто може бути оманливою через те, що при його заснуванні #italic Ghetto Nuovo#! (Нове гетто) та #italic Ghetto Vecchio#! (Старе гетто) вже були існуючими термінами, заснованими на попередньому промисловому використанні ділянки, оскільки гетто спочатку означало ливарний цех. В результаті, #italic Ghetto Nuovo#! насправді було першою територією, де проживали євреї."
  flavor_ven.92.title: "Ботанічний сад [ShowLocationNameWithNoTooltip('padova')]"
  flavor_ven.92.desc: "Вчені [ShowBuildingTypeName('university')] у [ShowLocationName('padova')] запропонували створити спеціальний сад для вивчення рослин, як місцевих, так і екзотичних. Вони стверджують, що такий сад покращить медичні дослідження, ботанічну класифікацію та нашу репутацію як центру навчання."
  flavor_ven.92.a: "Фінансувати Ботанічний сад."
  flavor_ven.92.b: "Відмовитися від фінансування."
  flavor_ven.92.historical_info: "Ботанічний сад Падуї був заснований у 1545 році, що робить його найстарішим академічним ботанічним садом у світі. Він був замовлений Венеційським Сенатом і керувався Падуанським університетом. Сад був створений для допомоги у вирощуванні та вивченні лікарських рослин. Він став життєво важливим центром наукового прогресу та вивчення біорізноманіття, представивши незліченну кількість видів рослин з усього світу."
  flavor_ven.93.title: "Реформи Лазарету"
  flavor_ven.93.desc: "Занепокоєння щодо повторюваних епідемій у [ShowLocationName('venice')] призвело до того, що багато чиновників та лікарів закликали до капітального ремонту #italic Lazzaretto#!, нашої острівної карантинної станції. Пропозиції передбачають суворіше дотримання карантину, кращі умови для хворих та реформи у веденні обліку та медичному обслуговуванні."
  flavor_ven.93.a: "Інвестувати в реформування карантину та медичної практики."
  flavor_ven.93.b: "Підтримувати поточні практики."
  flavor_ven.93.historical_info: "Лазаретто Веккіо був однією з перших у світі карантинних станцій і мав вирішальне значення під час повторних спалахів чуми. Протягом 16-го та 17-го століть реформи покращили медичне обслуговування та адміністрацію. Завдяки цим зусиллям Венеція стала лідером у галузі громадського здоров'я та профілактики захворювань, особливо в часи морських інфекцій."
  flavor_ven.94.title: "Суперечка про кав'ярні"
  flavor_ven.94.desc: "Останніми роками [ShowGoodsName('cocoa')] надходило до [ShowLocationName('venice')] через іноземних купців, а разом з ним і зростання кав'ярень — закладів, де чоловіки з усіх верств суспільства збираються, щоб обговорювати політику, літературу, комерцію, а іноді й небезпечні ідеї. Ці жваві центри розмов стривожили членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які побоюються, що такий відкритий діалог може породити інакомислення або єресь."
  flavor_ven.94.a: "Заборонити їх, щоб відновити контроль."
  flavor_ven.94.b: "Ми не повинні боятися нових ідей."
  ven_coffeehouses_banned: "Кав'ярні заборонено"
  flavor_ven.94.historical_info: "Венеція була серед перших європейських міст, що прийняли каву, завезену з Османського світу на початку 17 століття. Хоча багато хто вітав нові кав'ярні як місця для комерції та інтелектуального обміну, влада почала побоюватися їхнього потенціалу для поширення підривної діяльності. Після Французької революції 1796 року венеціанський уряд наказав закрити ці кав'ярні, побоюючись, що революційні ідеї можуть поширюватися завдяки їхній міжнародній клієнтурі."
  flavor_ven.95.title: "Експедиція до [ShowProvinceDefinitionNameWithNoTooltip('north_dalmatia_province')]"
  flavor_ven.95.desc: "Амбітний натураліст і письменник, [target_character.GetName], подав петицію до уряду з проханням підтримати [target_character.GetHisHer] експедицію в гірські та часто ігноровані глибинки в [ShowProvinceDefinitionName('north_dalmatia_province')]. [target_character.GetHisHer|U] мета — задокументувати звичаї, мову та народну культуру горян, що живуть під нашим правлінням. Хоча дехто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] глузує з цього починання як з марної трати державних коштів, інші бачать у ньому можливість краще зрозуміти та керувати цими віддаленими підданими [ROOT.GetCountry.GetFlavorRank]."
  flavor_ven.95.a: "Розумна ідея!"
  flavor_ven.95.b: "Безглузда трата ресурсів!"
  flavor_ven.95.historical_info: "Альберто Фортіс був венеціанським письменником, мандрівником та етнографом, найбільш відомим своєю працею 1774 року #italic Viaggio in Dalmazia#!, яка документувала морлахів, слов'янське пастуше населення, що проживало у венеціанських глибинках. Завдяки перекладу його праці на різні мови, Фортіс відіграв значну роль у формуванні західноєвропейського сприйняття балканських народів."
  flavor_ven.96.title: "Виставка [target_character.GetNameWithNoTooltip]"
  flavor_ven.96.desc: "[target_character.GetName] — художниця-самоучка скромного походження, яка нещодавно здобула величезну славу по всій [ShowContinentName('europe')] завдяки [target_character.GetHisHer] витонченим і захоплюючим портретам. Тепер, будучи шанованим членом кількох іноземних художніх академій, [target_character.GetSheHe] повернулася до [ShowLocationName('venice')] з проханнями виставити [target_character.GetHisHer] роботи. Хоча [target_character.GetHisHer] пастельні портрети захоплювали іноземні двори, деякі члени істеблішменту залишаються незадоволеними ідеєю, що жінка здобуває таку популярність та вплив у сфері образотворчого мистецтва."
  flavor_ven.96.a: "Відсвяткуйте [target_character.GetHisHer] геній!"
  flavor_ven.96.b: "Мистецтво має бути справою справжніх чоловіків!"
  flavor_ven.96.historical_info: "Розальба Кар'єра була дуже впливовою венеціанською художницею рококо, відомою своїми пастельними портретами та мініатюрами. Вона стала значною фігурою в європейському мистецтві, особливо у Франції, де її портрети були затребувані при дворі Людовика XV. Її успіх як жінки-художниці у світі, де домінували чоловіки, був новаторським і часом суперечливим. Вона була членом Академії Святого Луки в Римі та Французької королівської академії."
  flavor_ven.97.title: "Придушення Рідотто"
  flavor_ven.97.desc: "Колись регульований гральний дім для сезону Карнавалу, #italic Ridotto#! став притулком скандалів та морального занепаду. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та іноземних відвідувачів вільно змішуються в азартних іграх, ризикуючи своїми статками та честю під золотими стелями Палаццо Дандоло. Хоча [ROOT.GetCountry.GetFlavorRank] давно отримував прибуток від оподаткування цих ігор, зростаюче невдоволення серед моральних та релігійних фракцій [ROOT.GetCountry.GetFlavorRank] тисне на [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб його закрити."
  flavor_ven.97.a: "Закрити його та конфіскувати його активи."
  flavor_ven.97.b: "Регулювати його."
  flavor_ven.97.c: "Залишити як є."
  flavor_ven.97.historical_info: "#italic Ridotto#! відкрився у 1638 році як перший у Європі державний гральний дім під час сезону Карнавалу. Хоча спочатку він мав контролювати пороки, він став символом елітної декаденції і зрештою асоціювався з корупцією та моральним занепадом. У 1774 році венеціанський уряд закрив його через тиск реформаторів та духовенства."
  flavor_ven.98.title: "Астраріум"
  flavor_ven.98.desc: "[target_character.GetName] — вчений лікар і годинникар, що працює в [ShowLocationName('padova')]. [target_character.GetSheHe|U] нещодавно сконструював годинник, який [target_character.GetSheHe] називає #italic Astrarium#!, і який [target_character.GetSheHe] описує як диво механіки, що з неймовірною точністю відображає рухи небесних тіл. [target_character.GetLastNameWithNoTooltip] тепер шукає підтримки у [ROOT.GetCountry.GetFlavorRank], щоб представити машину у [ShowLocationName('venice')], де її можна було б продемонструвати як доказ нашої геніальності в науках."
  flavor_ven.98.a: "Профінансувати виставку Астраріуму."
  flavor_ven.98.b: "Дозволити виставку, але без фінансування."
  flavor_ven.98.c: "Ми повинні зосередитися на більш нагальних питаннях."
  flavor_ven.98.historical_info: "Джованні Донді, син відомого Якопо Донді, був лікарем, астрономом та інженером. Він найбільш відомий розробкою #italic Astrarium#!, механічної моделі Сонячної системи, яка відображала рух планет та небесних тіл."
  flavor_ven.99.title: "[ShowBuildingTypeNameWithNoTooltip('the_cipher_secretary')]"
  flavor_ven.99.desc: "Останнім часом купці, посланці та дипломати почали значною мірою покладатися на закодовані листи та зашифровану кореспонденцію, особливо з огляду на те, що наші інтереси простягаються по всьому Середземномор'ю. Деякі в [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер пропонують офіційне створення державної криптографічної служби. [ShowBuildingTypeName('the_cipher_secretary')] професіоналізувала б це зростаюче мистецтво, щоб захистити наші інтереси та забезпечити життєво важливі розвідувальні дані для [ROOT.GetCountry.GetFlavorRank]."
  flavor_ven.99.a: "Заснувати її."
  flavor_ven.99.b: "Залишити шифрування купцям."
  flavor_ven.99.historical_info: "Вже в XV столітті венеційські купці кодували листи агентам за кордоном, використовуючи особисті шифри, змішуючи комерційну та військову розвідку. Визнаючи зростаючу потребу в системній таємності, Республіка заснувала офіційну посаду Секретаря з шифрів, що призвело до розробки дуже ефективної системи шифрування, дешифрування та криптоаналізу."
  flavor_ven.100.title: "Винаходи [target_character.GetNameWithNoTooltip]"
  flavor_ven.100.desc: "До нашої уваги дійшло, що з наших інтелектуальних кіл вийшов талановитий вчений. [target_character.GetName] є інженером, винахідником та лінгвістом, який запропонував низку новаторських ідей, включаючи покращену систему вимірювання, передові оптичні прилади та навіть проєкт літальної машини. Хоча ідеї [target_character.GetHisHer] є радикальними, дехто вважає, що підтримка роботи [target_character.GetHisHer] може вивести наш [ROOT.GetCountry.GetFlavorRank] на передові позиції наукових інновацій. Інші ставлять під сумнів цінність інвестування в такі високі мрії."
  flavor_ven.100.a: "Підтримати інновації [target_character.GetHisHer]."
  flavor_ven.100.b: "Відмовитися підтримувати такі спекулятивні винаходи."
  flavor_ven.100.historical_info: "Тіто Лівіо Бураттіні був важливим венеційським вченим, який подорожував Європою та Африкою, пізніше провівши значну частину свого життя, працюючи в Польщі та Литві. Бураттіні запропонував ранній прототип літальної машини під назвою «літаючий дракон», і хоча вона так і не піднялася в повітря з людиною на борту, це один з найраніших зафіксованих проєктів польоту людини. Він також зробив внесок у наукові вимірювання, ввівши термін «метр» як універсальну одиницю довжини, засновану на довжині маятника."