l_english:
  flavor_liv.1.title: "[target_government_reform.GetNameWithNoTooltip]"
  flavor_liv.1.desc: "Влада [ROOT.GetCountry.GetGovernment.GetRulerTitle] постійно слабшає, а вплив [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та підлеглих [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] сильніший, ніж будь-коли раніше. У такому випадку раніше неприйнятна пропозиція тепер стала прийнятним рішенням цієї кризи. [target_government_reform.GetName], як її називають, об'єднала б [ROOT.GetCountry.GetName] та її підданих у конфедерацію, надавши багато повноважень різним земельним єпископам та іншим васальним фігурам, які мали б більше повноважень у [ROOT.GetCountry.GetGovernment.GetParliament.GetName] [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_liv.1.historical_info: "Після битви під Укмерге в 1435 році керівництво Лівонського ордену було знищено через нестерпні втрати, зазнані в битві. Незабаром після цього, 4 грудня того ж року, було підписано угоду, що створила Лівонську конфедерацію та надала багато привілеїв різним єпископам та іншим васалам."
  flavor_liv.1.a: "Піддатися тиску."
  flavor_liv.1.b: "Чому вони не знайдуть іншого [ROOT.GetCountry.GetFlavorRank] для правління?"
  flavor_liv.2.title: "[target_character.GetNameWithNoTooltip]"
  flavor_liv.2.desc: "До нас дійшла звістка про певного клірика на ім'я [target_character.GetName], видатного [target_character.GetWomanMan] багатьох якостей. Народжений у [target_character.GetBirthLocation.GetName], [target_character.GetSheHe] є [target_character.GetArtistType.GetName] [target_character.GetCulture.GetName] походження, який, окрім щоденних проповідей, був би найбільш здатним створити [ShowWorkOfArtTypeName('chronicle')] історії [ShowAreaName('baltic_area')]."
  flavor_liv.2.a: "Замовити [ShowWorkOfArtTypeNameWithNoTooltip('chronicle')]."
  flavor_liv.2.b: "Нам не потрібні [target_character.GetHerHis] послуги."
  flavor_liv.3.title: "$chronica_provinz_lyfflandt$ завершено"
  flavor_liv.3.desc: "[ShowWorkOfArtTypeName('chronicle')] [target_character.GetName] нарешті опубліковано. [target_work_of_art.GetName], як її називають, охоплює історію [ShowAreaName('baltic_area')] від піднесення [GetCountry('LIV').GetLongName] до її нинішнього статусу під пильним впливом [ROOT.GetCountry.GetName]. Однак робота зовсім не об'єктивна щодо [ROOT.GetCountry.GetAdjectiveWithNoTooltip] правління, кидаючи багато тіні на нашу легітимність та добру волю нашого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], який володіє цими територіями."
  flavor_liv.3.a: "Така критика прийнятна."
  flavor_liv.3.b: "Вигнати [target_character.GetHerHim] та [target_character.GetHerHis] роботи!"