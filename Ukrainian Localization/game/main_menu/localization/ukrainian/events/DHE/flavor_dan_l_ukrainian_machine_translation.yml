l_english:
  flavor_dan.1.title: "Друге Велике Затоплення"
  flavor_dan.1.desc: "Жахлива повінь вразила наше узбережжя вздовж [ShowAreaName('north_sea_area')]! До нас дійшли повідомлення від місцевого населення, одне з яких, від [ShowCultureName('low_franconian')] наглядача місцевих меліоративних проектів, було особливо описовим:\n\n#italic 'Увечері з південного заходу з моря піднялася велика буря та негода. Вітер почав дути так сильно, що сон не міг торкнутися наших очей. Хвилі піднімалися біля морської дамби та на дах будинку. Це був дуже страшний звук.'#!\n\nРаптовий штормовий приплив, що обрушився на узбережжя від [ShowLocationName('ribe')] до [ShowLocationName('heide')], залишив місцеве населення та сільську місцевість спустошеними та без особливої надії. Деякі острови були повністю змиті, не залишивши нічого."
  flavor_dan.1.a: "Це має бути божественна кара!"
  flavor_dan.1.historical_info: "Штормовий приплив Бурхарді стався в жовтні 1634 року і спустошив узбережжя Північного моря Данії та Шлезвігу. Через триваючий конфлікт у Священній Римській імперії між протестантами та католиками в той час, дамби, що захищали північне фризьке узбережжя, занепали і не змогли забезпечити захист від наступаючих хвиль. Повінь спричинила приблизно від 8000 до 15000 смертей і мала серйозні довгострокові наслідки для регіону, спричинивши занедбання сільськогосподарських угідь та знищення старої норвезької різновидності північнофризької мови."
  flavor_dan.2.title: "[GetCountry('PAP').GetAdjectiveWithNoTooltip] Дозвіл на вищу освіту"
  flavor_dan.2.desc: "[GetCountry('PAP').GetGovernment.GetRuler.GetName] милостиво запропонував папську буллу нашому [ROOT.GetCountry.GetGovernment.GetRulerTitle], надаючи нам можливість розширити наші освітні заклади в [ShowLocationName('kobenhavn')]. Завдяки цій підтримці ми можемо створити вагому підставу для розширення наших факультетів у [ROOT.GetCountry.GetName] та створення нового центру для освічених людей нашої країни."
  flavor_dan.2.a: "Спонсорувати [ShowBuildingTypeNameWithNoTooltip('university')]!"
  flavor_dan.2.b: "Натомість використаймо наш вплив у Церкві."
  flavor_dan.2.historical_info: "Король Данії Кристіан I заснував Копенгагенський університет у 1479 році за згодою папської булли. Університет став центром римо-католицької теології, але також мав факультети для вивчення права, медицини та філософії. Університет був розпущений між 1531 і 1537 роками через наслідки протестантської Реформації в Данії, але знову став протестантським університетом за короля Кристіана III."
  flavor_dan.3.title: "Орден Святої Клари просить допомоги"
  flavor_dan.3.desc: "Хоча Орден Святої Клари вже деякий час присутній у [ROOT.GetCountry.GetName], наразі вони намагаються утримувати себе. Як побожному [ShowReligionAdjective('catholic')] [ROOT.GetCountry.GetFlavorRank], нам було б доречно допомогти їм у їхніх зусиллях та спонсорувати новий [ShowBuildingTypeName('monastery')] у безпосередній близькості від нашого власного володіння в [ShowLocationName('kobenhavn')]."
  flavor_dan.3.a: "Профінансувати їх."
  flavor_dan.3.b: "Нам не потрібно більше жебраків у [ShowLocationNameWithNoTooltip('kobenhavn')]."
  flavor_dan.3.historical_info: "Король Йоганн I та королева Христина заснували монастир Святої Клари в Копенгагені у 1497 році, подарувавши колишні королівські городи. Королева зробила пожертву в розмірі 40 рейнських гульденів на будівництво монастиря у 1498 році, яке було завершено через сім років. Монастир, що складався з гуртожитку, трапезної, церкви, лазарету, підвалів і надавав місце для світських сестер, був освячений у серпні 1505 року і діяв до 1536 року, коли знову став власністю корони."
  flavor_dan.4.title: "Реформи [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_dan.4.desc: "Наша держава повинна бути адаптивною та гнучкою у своєму підході до правового органу, що керує нашим народом. Наш [ROOT.GetCountry.GetGovernment.GetRuler.GetName] глибоко зацікавлений у реформуванні [ROOT.GetCountry.GetName] у модель сучасної держави, що керує не шляхетною кров'ю, а заслугами, незалежно від того, чи належить людина до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] чи [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]."
  flavor_dan.4.a: "Реформувати Країну!"
  flavor_dan.4.b: "Старі методи надійніші."
  flavor_dan.5.title: "Конституція для [ShowRegionNameWithNoTooltip('scandinavian_region')]"
  flavor_dan.5.desc: "Керувати величезним регіоном [ShowRegionName('scandinavian_region')] — непросте завдання, і чвари між [ShowEstateTypeName('nobles_estate')] [GetCountry('SWE').GetName], [GetCountry('DAN').GetName] та [GetCountry('NOR').GetName] є звичним явищем. Оскільки їхні інтереси рідко збігаються, ми повинні зосередитися на створенні Конституції для нашого союзу, яка змусить [ShowEstateType('nobles_estate')] співпрацювати, якщо консенсусу не буде досягнуто. Це був би величезний крок до централізації Кальмарської унії, але сторони, які скептично ставляться до нашого спільного [ROOT.GetCountry.GetGovernment.GetRulerTitle], сприймуть це як загрозу своїй автономії."
  flavor_dan.5.a: "Розробити Скандинавську Конституцію."
  opinion_enforced_scandinavian_constitution: "Запровадити Скандинавську Конституцію"
  flavor_dan.5.b: "Зберігати децентралізацію Унії."
  opinion_discarded_scandinavian_constitution: "Відкинути Скандинавську Конституцію"
  flavor_dan.6.title: "Нова Династія"
  flavor_dan.6.desc: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] має складне завдання попереду [target_character.GetHimHer]. Походячи з нової династії без безпосереднього зв'язку з домом [ShowDynastyName('estrid_dynasty')], [target_character.GetHeShe] доведеться довести свою спроможність як правителя в очах [ShowCultureName('danish')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які розглядають цього нового правителя як можливість зміцнити свій контроль над [ROOT.GetCountry.GetName]. Деякі представники [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вже звернулися до [ROOT.GetCountry.GetGovernment.GetRulerTitle] з ледь прихованими погрозами розширити свої надані привілеї, інакше вони виступатимуть проти [target_character.GetHerHis] правління."
  flavor_dan.6.a: "Шляхта повинна допомагати та радити, а не правити."
  flavor_dan.6.b: "Вони лише просять те, що є правильним."
  flavor_dan.7.title: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] Військово-морські Реформи"
  flavor_dan.7.desc: "Наша берегова лінія величезна, і її захист є життєво важливою частиною нашої військової стратегії. Нещодавно [rival_country.GetName] загрожує нашому морському пануванню, а отже, безпосередньо безпеці [ShowCultureName('danish')] народу. Їхні зусилля можна інтерпретувати лише одним способом, і ми повинні зробити все можливе, щоб відновити наше морське панування. З цією метою ми повинні запровадити реформи для нашого флоту та підвищити військову освіту, яку отримують наші військово-морські командири."
  flavor_dan.7.a: "Реформувати флот!"
  flavor_dan.7.b: "Армія повинна бути більшим пріоритетом."
  flavor_dan.7.c: "Реформи не потрібні."
  flavor_dan.8.title: "Спадкування [target_character.GetNameWithNoTooltip]"
  flavor_dan.8.desc: "Оскільки [target_character.GetName] не молодшає, королівська рада почала шукати відповідних спадкоємців у найширшому сенсі. Один з наших наймогутніших васалів, [count_of_holstein.GetName] з [GetCountry('SHL').GetName], висунув ідею, що [count_of_holstein.GetHerHis] [target_heir.GetName] був би підходящим кандидатом.\n\n[count_of_holstein.GetNameWithNoTooltip] також дав зрозуміти, що [count_of_holstein.GetSheHe] підтримає кандидатуру [target_heir.GetNameWithNoTooltip] власним коштом."
  flavor_dan.8.a: "Підходящий кандидат."
  flavor_dan.8.b: "Ми не можемо давати жодних обіцянок заздалегідь."
  flavor_dan.9.title: "Рибні ринки [ShowProvinceDefinitionNameWithNoTooltip('malmohus_province')]"
  flavor_dan.9.desc: "Щорічний рибний ринок у [ShowLocationName('malmo')] – це справді видовище. Купці з усієї [ShowContinentName('europe')] збираються на берегах [ShowLocationName('oresund')], щоб стати свідками надзвичайно великої кількості оселедця, що збирається у водах. Деякі відвідувачі навіть зауважували, що могли б різати рибу своїм кинджалом, просто зануривши його в море.\n\nХоча це було постійним явищем протягом останніх століть, тепер до нас дійшли панічні повідомлення про те, що щорічна осіння поява оселедця була жалюгідною, і рибний ринок не міг підтримувати себе. Цей руйнівний рік віщує кінець рибного ринку, якщо риба не повернеться в такій же кількості, як раніше, що було б не менше ніж дивом."
  flavor_dan.9.a: "Прикро."
  flavor_dan.10.title: "Велика пожежа в [ShowLocationNameWithNoTooltip('kobenhavn')]"
  flavor_dan.10.desc: "Запалена під час виливання свічок, пожежа в західному кварталі [ShowLocationName('kobenhavn')] швидко поширилася по всьому місту. Хоча точний збиток ще невідомий, більша частина міста спустошена та зруйнована. Багато населення залишилося без даху над головою через катастрофу, і значна кількість людей загинула у полум'ї.\n\nПоки населення все ще зайняте розчищенням завалів та попелу, ми повинні планувати майбутнє [ShowLocationNameWithNoTooltip('kobenhavn')]. Ми можемо скористатися можливістю відбудувати місто ще більш славним, ніж раніше, але це коштуватиме нам великої кількості золота."
  flavor_dan.10.a.tt: "[target_location.GetName] втратить [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратить [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], і деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] постраждають від пожежі"
  flavor_dan.10.a: "Йдемо з амбітним планом!"
  flavor_dan.10.b.tt: "[target_location.GetName] втратить [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратить [Concept('development', 'CONCEPT_PLACEHOLDER')|e], втратить [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], і деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] постраждають від пожежі"
  flavor_dan.10.b: "Робимо лише те, що необхідно!"
  flavor_dan.11.title: "Наші [ShowCultureNameWithNoTooltip('low_franconian')] Зв'язки"
  flavor_dan.11.desc: "Народ [ROOT.GetCountry.GetName] має глибокий і давній зв'язок з морем, який не поділяють багато народів [ShowContinentName('europe')]. Однією з культур, найближчих до цих зв'язків, є [ShowCultureName('low_franconian')] народ [ShowRegionName('north_german_region')], який також є частим гостем у [ShowLocationName('kobenhavn')] завдяки своїй торговельній діяльності в [ShowAreaName('baltic_area')]. Ми могли б використати цей зв'язок, щоб моделювати наш уряд ближче до урядів [ShowCultureNameWithNoTooltip('low_franconian')], що розширило б повноваження [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] і доручило б їм більшу частку в нашому урядовому органі."
  flavor_dan.11.a.tt: "Ми покращимо наші відносини з кожною [ShowCultureNameWithNoTooltip('low_franconian')] країною"
  flavor_dan.11.a: "Це майбутнє для нашої країни."
  flavor_dan.11.b: "Розірвати наші зв'язки з [ShowCultureNameWithNoTooltip('low_franconian')]"
  danish_dutch_inspiration: "Проголландська політика в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_dan.12.title: "[target_character.GetNameWithNoTooltip] починає проповідувати"
  flavor_dan.12.desc: "Після багаторічного навчання в таких містах, як [ShowLocationName('rostock')], [ShowLocationName('wittenberg')], [ShowLocationName('kobenhavn')] та [ShowLocationName('leuven')], [target_character.GetName] повернувся до [ROOT.GetCountry.GetName]. За роки навчання він, схоже, дуже полюбив реформаторів нашого часу і тепер починає проповідувати ідеї [ShowReligionName('lutheran')] у [ROOT.GetCountry.GetNameWithNoTooltip].\n\nВтручання нашого [ROOT.GetCountry.GetFlavorRank] є необхідним, якщо ми хочемо зберегти [ShowReligionAdjective('catholic')] віру в [ROOT.GetCountry.GetLongNameWithNoTooltip], тоді як наша підтримка забезпечить [ShowReligionAdjectiveWithNoTooltip('lutheran')] оплот у нашій країні."
  flavor_dan.12.a: "Підтримати його ідеї."
  flavor_dan.12.a.tt: "Багато [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ShowReligionName('lutheran')]"
  flavor_dan.12.b: "Ми не можемо зрадити [ShowReligionNameWithNoTooltip('catholic')]."
  flavor_dan.13.title: "Зростання торгівлі худобою"
  flavor_dan.13.desc: "Протягом століть Бичачий шлях переносив армії та купців до та з [ShowProvinceDefinitionName('western_jutland_provinces')]. Проте, понад усе, він використовується для перевезення тисяч голів худоби на великий ринок Веделя, поблизу [ShowLocationName('hamburg')], де худоба продається по всьому [ShowRegionName('north_german_region')]. З поточним зростанням населення в північній [ShowContinentName('europe')], ми могли б розширити нашу власну участь у торгівлі худобою на південь і збільшити наші прибутки. Однак деякі радники турбуються, що це посилить наших землевласників [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], зменшуючи при цьому свободу [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]."
  STATIC_MODIFIER_NAME_growth_of_the_cattle_trade: "Зростання торгівлі худобою"
  STATIC_MODIFIER_DESC_growth_of_the_cattle_trade: "Розширення нашої уваги до торгівлі худобою збільшить наші сільськогосподарські можливості, сприяючи інтересам [ShowEstateTypeName('nobles_estate')] з наслідками для свободи наших [ShowEstateTypeName('peasants_estate')]."
  flavor_dan.13.a: "Більше грошей ще нікому не завадило!"
  flavor_dan.13.b: "Ми не можемо цього дозволити."
  flavor_dan.14.title: "[target_artist.GetNameWithNoTooltip] заспокоює забобони"
  flavor_dan.14.desc: "[target_artist.GetName], що перебував на службі Церкви [ROOT.GetCountry.GetName], опублікував книгу у відповідь на хвилю забобонів, яка, здавалося, охопила місцевих жителів у [ShowLocationName('kobenhavn')]. Книга намагається пояснити, що дивні діяння, створені Богом чи дияволом, і те, що публіка сприймає як дива, здебільшого ґрунтуються на брехні."
  flavor_dan.14.a: "Підтримати його позиції."
  flavor_dan.14.b: "Забобони можуть бути нам корисними."
  flavor_dan.14.historical_info: "Єнс Дінесес Єрсін служив єпископом Данської лютеранської церкви. Він брав участь у освітніх реформах у Данії, пишучи латинські граматики для студентів мови. Пізніше він намагався боротися з забобонами, що поширилися в його єпархії, опублікувавши книгу #italicOn Miracles, Signs and Revelations and their Explanation.#!"
  flavor_dan.15.title: "[target_character.GetNameWithNoTooltip] пропонує свої послуги"
  flavor_dan.15.desc: "До нашого двору з'явився чоловік, який стверджував, що є здібним лідером та адміралом. Отримавши освіту в нашій країні, [target_character.GetName] раніше служив у іноземних флотах і вже здобув значну репутацію як вправний морський офіцер. Його майстерність незаперечна, але він міг би служити нам як адмірал або як член кабінету, консультуючи нас з морських та військових питань."
  flavor_dan.15.a: "Він служитиме нам адміралом на морі."
  flavor_dan.15.b: "Він стане чудовим членом нашого кабінету"
  flavor_dan.16.title: "Надзвичайний стан"
  flavor_dan.16.desc: "Наш безперервний стан війни останнім часом призвів до певного невдоволення серед наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. На нещодавніх зборах станів вони вимагали подальшого закріплення своїх привілеїв і щоб жодних подальших дій не вживалося без їхньої згоди. На щастя для нас, [target_character.GetName] досить популярний серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], і вони звернулися до нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] з пропозицією підтримки на випадок, якщо ми вирішимо позбавити влади дворян. За допомогою кількох хабарів доля наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] могла б бути вирішена, і наш [ROOT.GetCountry.GetFlavorRank] правив би без опозиції."
  flavor_dan.16.a: "Запустити план у дію."
  flavor_dan.16.b: "Ми повинні покладатися на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_dan.17.title: "[target_character.GetNameWithNoTooltip]"
  flavor_dan.17.desc: "[target_character.GetName] походить із заможної торгової родини Шумахерів і вже багато років чудово служить нашій країні. Завдяки нашим зусиллям із залучення найздібніших осіб із [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], він висунув аргументи на підтримку його подальшого просування та призначення на найвищі посади в нашому уряді."
  flavor_dan.17.a: "Нагородити його за відмінну службу!"
  flavor_dan.17.b: "Звільнити його."
  flavor_dan.18.title: "Праці [target_artist.GetNameWithNoTooltip]"
  flavor_dan.18.desc: "[target_artist.GetName], походячи з впливової шляхетної родини, щойно опублікував свою збірку астрономічних праць. Він присвятив своє дослідження положенням зірок і руху сонця. Ми повинні підтримати його всіма можливими способами, щоб сприяти його дослідженням і побачити, які інші дані він може зібрати."
  flavor_dan.18.a: "Ми вражені!"
  flavor_dan.19.title: "Вбивство [target_gerhard.GetNameWithNoTooltip]"
  flavor_dan.19.desc: "[target_gerhard.GetName] був ключовою фігурою в [ROOT.GetCountry.GetAdjective] політиці з того часу, як [target_gerhard.GetSheHe] почав брати в ній участь, зумівши бути рукою не лише одного, а двох королів. Після смерті [GetCharacter('dan_chistopher_ii').GetName], [target_gerhard.GetSheHe] фактично взяв контроль над країною. Це не сподобалося багатьом [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які почали надавати свою підтримку [target_valdemar.GetName].\n\nЗ роками ситуація ставала все більш напруженою, і загрози спроб замаху на життя [target_gerhard.GetShortNameWithNoTooltip] ставали все більш очевидними."
  flavor_dan.19.a: "[target_gerhard.GetSheHe|U], схоже, нажив забагато ворогів."
  flavor_dan.19.b: "Краще досягти компромісу, за певну ціну."
  flavor_dan.20.title: "Нова резиденція для [target_character.GetNameWithNoTooltip]"
  flavor_dan.20.desc: "[target_character.GetName] нещодавно придбав нові володіння в безпосередній близькості від [ShowLocationName('kobenhavn')] і вирішив, що це може бути чудовим моментом для заснування нової столиці для [ROOT.GetCountry.GetLongName]. Хоча це, безумовно, залишило б нашу нинішню резиденцію в тіні міста, що розвивається, це, безумовно, дало б більше можливостей для [ROOT.GetCountry.GetGovernment.GetRulerTitle] сформувати столицю на [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] розсуд."
  flavor_dan.20.a: "Продовжувати реалізацію планів!"
  flavor_dan.20.b: "Наше нинішнє місце розташування нас цілком влаштовує."
  flavor_dan.21.title: "Непокірний кадет"
  flavor_dan.21.desc: "Один з наших морських командирів, [target_character.GetName], неодноразово вступав у конфлікти з іноземними суднами, що могло призвести до прямого конфлікту з раніше дружніми країнами. [target_character.GetNameWithNoTooltip] стверджує, що всі його дії були у відповідності з [ROOT.GetCountry.GetAdjective] морським кодексом, а його остання морська битва була необхідною для захисту нашої країни. Зухвалий захист його вчинків захопив багатьох при нашому дворі, але дехто стверджує, що наше постійне заступництво може призвести до занепаду наших традиційних лідерських цінностей."
  flavor_dan.21.a: "Прийняти його на службу, незважаючи ні на що."
  flavor_dan.21.b: "Він не вартий клопоту!"
  flavor_dan.22.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_dan.22.desc: "[target_artist.GetName] був рекомендований нам одним з наших радників, який помітив його значний талант під час візиту до [ShowBuildingTypeName('theater')] у [ShowLocationName('kobenhavn')]. Історії [target_artist.GetNameWithNoTooltip] — це чарівні, прекрасні народні оповіді, що поєднують наші місцеві [ROOT.GetCountry.GetCulture.GetName] історії та народні казки з усієї [ShowContinentName('europe')]. Завдяки нашому спонсорству він міг би повністю присвятити себе написанню цих чудових казок."
  flavor_dan.22.a: "Нова епоха для [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] літератури!"
  flavor_dan.23.title: "П'єси [target_artist.GetNameWithNoTooltip]"
  flavor_dan.23.desc: "[target_artist.GetName] нещодавно повернувся до [ROOT.GetCountry.GetName] з-за кордону, з [ShowContinentName('europe')]. Під час своїх подорожей він глибоко зацікавився як [ShowLanguageName('latin_language')], так і [ShowCultureName('french')] комедіями, що надихнуло його писати п'єси для [ShowBuildingTypeName('theater')] у [ShowLocationName('kobenhavn')]."
  flavor_dan.23.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_dan.24.title: "Переклад Нового Заповіту"
  flavor_dan.24.desc: "Коли Реформація прокочується [ShowContinentName('europe')], її вплив починає вкорінюватися в наших землях. Багато наших людей, розчаровані старими звичаями, дедалі більше приваблюються вченням [ShowReligionName('lutheran')]. Нещодавно [target_character1.GetName] та [target_character2.GetName] завершили [ShowDialectName('danish_dialect')] переклад Нового Заповіту, зробивши святі писання доступними для простого люду їхньою власною мовою. Нове видання зустріли з надзвичайним ентузіазмом, воно швидко розпродається серед населення та ще більше сприяє поширенню [ShowReligionNameWithNoTooltip('lutheran')] у [ROOT.GetCountry.GetName]."
  flavor_dan.24.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_dan.24.a.tt: "#Y 30%#! усіх [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], які сповідують [ShowReligionName('catholic')] у [ShowAreaName('denmark_area')], приймають [ShowReligionName('lutheran')]."
  flavor_dan.24.b: "Занадто пізно діяти..."
  flavor_dan.24.b.tt: "#Y 30%#! усіх [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], які сповідують [ShowReligionName('catholic')] у [ShowAreaName('denmark_area')], приймають [ShowReligionName('lutheran')]."
  flavor_dan.24.c: "Негайно заборонити!"
  flavor_dan.24.c.tt: "#Y 10%#! усіх [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], які сповідують [ShowReligionName('catholic')] у [ShowAreaName('denmark_area')], приймають [ShowReligionName('lutheran')]."
  flavor_dan.24.c.tt.2: "Відносини з усіма [ShowReligionAdjectiveWithNoTooltip('lutheran')] націями в [ShowContinentNameWithNoTooltip('europe')] зменшилися на [ShowBiasValue('dan_banned_lutheran_bible')|0R]"
  flavor_dan.25.title: "Штурм Церкви Богоматері"
  flavor_dan.25.desc: "Вітри Реформації люто дмуть над [ShowLocationName('kobenhavn')], і напруга між реформаторами та послідовниками [ShowReligionName('catholic')] досягла критичної точки. Завзяті послідовники [ShowReligionName('lutheran')], підживлені своєю зростаючою зневагою до того, що вони вважають надмірностями [GetUniqueInternationalOrganization('catholic_church').GetName], штурмували Церкву Богоматері. У своїй завзятій люті вони повалили статуї, розбили вівтарі та знищили священні реліквії, засудивши їх як ідолів, негідних поклоніння. Цей акт осквернення викликав шок у [target_location.GetRank.GetName], поглибивши розкол між двома фракціями."
  flavor_dan.25.a: "Засудити насильство!"
  flavor_dan.25.b: "Ми не можемо їх зупинити..."
  flavor_dan.26.title: "[ShowWorkOfArtNameWithNoTooltip('chronica_jutensis')]"
  flavor_dan.26.desc: "У запиленому кутку бібліотеки старого монастиря було знайдено невеликий, але значний рукопис. [ShowWorkOfArtName('chronica_jutensis')], твір, що нагадує знамениту [ShowWorkOfArtName('gesta_danorum')], вийшов на світ. Ця хроніка розширює історію [ROOT.GetCountry.GetName], охоплюючи події та деталі, не включені в оригінальний твір. Хоча особа автора залишається таємницею, цей рукопис, схоже, є важливою частиною минулого нашої нації."
  flavor_dan.26.a: "Зберегти оригінал."
  flavor_dan.26.b: "Переконайтеся, що у нас є більше його копій!"
  flavor_dan.26.historical_info: "#italic Chronica Jutensis#!, також відома як #italic Chronica Danorum#!, була середньовічним латинським рукописом, що пропонував детальний опис данської історії, особливо зосереджуючись на подіях у Ютландії з кінця XIII до початку XIV століть. На відміну від інших тогочасних хронік, вона надавала унікальні перспективи на регіональні конфлікти, політичні справи та соціальні умови того часу."
  flavor_dan.27.title: "Переселення [ShowAreaNameWithNoTooltip('greenland_area')]"
  flavor_dan.27.desc: "Століття тому наші норвезькі предки-вікінги заснували поселення в [ShowAreaName('greenland_area')], прагнучи назавжди закріпити її за собою. Однак через суворі умови та різні труднощі ті ранні поселення здебільшого зазнали невдачі, і будь-які організовані спроби заселити [ShowAreaNameWithNoTooltip('greenland_area')] були залишені. Тепер, коли ми відновили контроль над її прибережними регіонами, настав час переглянути наш підхід. Відправивши більше людей для заселення [ShowAreaNameWithNoTooltip('greenland_area')], ми можемо посилити наш контроль над цією величезною та стратегічно важливою землею, забезпечивши її міцне перебування під нашим пануванням та потенційно відкривши нові можливості для досліджень та торгівлі."
  flavor_dan.27.a: "Відправити людей туди селитися."
  flavor_dan.27.b: "Ця безплідна пустка не варта наших ресурсів."
  flavor_dan.27.historical_info: "Історично колонізація Гренландії Данією розпочалася на початку XVIII століття, зумовлена поєднанням місіонерського запалу та економічних інтересів. У 1721 році дансько-норвезький місіонер Ганс Егеде заснував поселення в Гренландії, щоб навернути інуїтське населення до християнства та відновити контакт із втраченими норвезькими колоніями. Данська корона поступово розширила свій контроль над островом, зосереджуючись на торгівлі, зокрема китовим жиром та тюленячими шкурами, через Королівський Гренландський Торговий Департамент. До кінця XVIII століття Гренландія міцно перебувала під данським контролем, а корінне населення було значною мірою інтегроване в колоніальну систему."
  flavor_dan.28.title: "Повторне відкриття Вінланду"
  flavor_dan.28.desc: "Після століть легенд та переказів наші дослідники знову досягли казкових берегів Вінланду, землі, яку наші предки-вікінги колись описували у своїх сагах. Це знаменне відкриття не лише підтвердило давні оповіді, але й розпалило оновлений дух досліджень у нашій нації. Величезні та родючі землі пропонують нові можливості для експансії та торгівлі, а повторне відкриття викликало почуття гордості та пригод серед нашого народу."
  flavor_dan.28.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_dan.28.historical_info: "Вінланд, як описано в скандинавських сагах, був регіоном Північної Америки, дослідженим скандинавськими вікінгами близько 1000 року, і, як вважається, розташовувався на території сучасної Ньюфаундленду, Канада."
  flavor_dan.29.title: "[ShowBuildingTypeNameWithNoTooltip('kastellet')]"
  flavor_dan.29.desc: "Зі зростанням значення [ShowLocationName('kobenhavn')] як центрального вузла нашого [ROOT.GetCountry.GetFlavorRank] потреба у міцнішій обороні стала очевидною. Було запропоновано збудувати нову цитадель, відому як [ShowBuildingTypeName('kastellet')], щоб захистити місто від атак як з суші, так і з моря. Ця зіркоподібна фортеця буде збудована з п'ятьма бастіонами, з'єднаними товстими стінами, розробленими для забезпечення перекриваючих полів обстрілу, що зробить її майже неприступною для ворожих сил. Оточена ровом та обладнана казармами, арсеналами та провізією, [ShowBuildingTypeNameWithNoTooltip('kastellet')] слугуватиме основою оборони [ShowLocationNameWithNoTooltip('kobenhavn')], забезпечуючи безпеку нашої столиці та її мешканців."
  flavor_dan.29.a: "Це було б мудрим вкладенням."
  flavor_dan.29.b: "[ShowLocationNameWithNoTooltip('kobenhavn')] достатньо захищений."
  flavor_dan.29.historical_info: "Кастеллет є однією з найвражаючих фортець, коли-небудь збудованих у Північній Європі. Її дизайн відображає військові архітектурні інновації того часу, зосереджуючись на обороні як від артилерійських, так і від піхотних штурмів. Фортеця відіграла вирішальну роль в обороні Копенгагена протягом усієї його історії і залишається значним історичним об'єктом сьогодні."
  flavor_dan.30.title: "Збереження [ShowWorkOfArtNameWithNoTooltip('gesta_danorum')]"
  flavor_dan.30.desc: "З появою [ShowInstitutionName('printing_press')], що революціонізує спосіб збереження та поширення знань, з'явилася можливість захистити та покращити один з наших найцінніших історичних документів. [ShowWorkOfArtName('gesta_danorum')], наріжний камінь нашої національної спадщини, може значно виграти від цієї нової технології. Використовуючи друкарський верстат, ми можемо забезпечити збереження якості документа, виготовити кілька копій для розповсюдження та зробити цей безцінний опис нашої історії доступним для ширшої аудиторії."
  flavor_dan.30.a: "Зберегти та розповсюдити його у друкованій формі!"
  flavor_dan.30.b: "Ми не можемо собі цього дозволити."
  flavor_dan.31.title: "[ShowBuildingTypeNameWithNoTooltip('kronborg')]"
  flavor_dan.31.desc: "Наше стратегічне положення біля [ShowLocationName('oresund')] здавна забезпечувало значне джерело доходу завдяки миту з прохідних суден. Однак наш поточний рівень контролю є недостатнім, що призводить до втрати доходу, оскільки ми не можемо ефективно стягувати мито. Щоб вирішити цю проблему, було запропоновано збудувати грізну фортифікацію [ShowBuildingTypeName('kronborg')] у [ShowLocationName('helsingor')], яка посилить наш нагляд за протокою, забезпечить дотримання всіма суднами сплати мита та зміцнить нашу економічну та військову присутність у цьому важливому морському проході."
  flavor_dan.31.a: "Збудувати його!"
  flavor_dan.31.b: "Це коштуватиме більше, ніж ми могли б заробити на миті."
  flavor_dan.31.historical_info: "Кронборг був збудований у 1420-х роках королем Еріком Померанським як фортеця для контролю входу до Балтійського моря та збору мита з прохідних суден. Замок був перебудований та розширений наприкінці 16 століття королем Фредеріком II у палац у стилі Ренесансу."
  flavor_dan.32.title: "Пропозиція [target_character.GetNameWithNoTooltip]"
  flavor_dan.32.desc: "[target_character.GetName], відомий [target_character.GetHisHer] внеском у [ROOT.GetCountry.GetAdjective] історію та літературу, запропонував значну послугу нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetSheHe|U] пропонує перекласти наші шановані історичні хроніки з латини на [ShowDialectName('danish_dialect')], зробивши ці життєво важливі документи доступними для широкого загалу. [target_character.GetSheHe|U] обіцяє зміцнити нашу національну єдність, забезпечивши розуміння та оцінку нашої багатої історії всіма громадянами."
  flavor_dan.32.a: "Замовити [target_character.GetHimHer]."
  flavor_dan.32.b: "Ми не можемо дозволити собі [target_character.GetHisHer] послуги."
  flavor_dan.32.historical_info: "Андерс Сьоренсен Ведель був видатним данським істориком і перекладачем, найбільш відомим своїми зусиллями зробити данські історичні тексти більш доступними. Його переклади ключових історичних хронік, таких як Gesta Danorum Саксона Граматика, з латини на данську відіграли вирішальну роль у просуванні данської історії та культури."
  flavor_dan.33.title: "Морські інновації [target_character.GetNameWithNoTooltip]"
  flavor_dan.33.desc: "[target_character.GetName], видатний морський командир і стратег, представив низку інноваційних ідей для покращення наших військово-морських можливостей. [target_character.GetHisHer|U] пропозиції включають передові конструкції кораблів та покращену морську тактику, які могли б значно зміцнити наш флот та забезпечити наші морські інтереси. Інвестиції в ці інновації могли б зміцнити наше панування на морі та забезпечити захист наших торгових шляхів та територій."
  flavor_dan.33.a: "Найняти [target_character.GetHimHer] для модернізації нашого флоту."
  flavor_dan.33.b: "Нас це не цікавить."
  flavor_dan.34.title: "[dan_laxmand.GetNameWithNoTooltip]"
  flavor_dan.34.desc: "[dan_laxmand.GetName] є шерифом кількох важливих територій у [ROOT.GetCountry.GetName] і відомий тим, що керує ключовими територіями та займається важливими внутрішніми дипломатичними справами. Як власник численних ферм і маєтків, [dan_laxmand.GetSheHe] не тільки багатий і впливовий, але, безсумнівно, також дуже вправний – що робить [dan_laxmand.GetHimHer] привабливою особою для нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_dan.34.a: "Запропонувати [dan_laxmand.GetHimHer] посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_dan.34.b: "Залишити [dan_laxmand.GetHimHer] на [dan_laxmand.GetHisHer] власний розсуд."
  flavor_dan.35.title: "Вбивство [laxmand.GetNameWithNoTooltip]"
  flavor_dan.35.desc: "Очільника [ROOT.GetCountry.GetGovernment.GetAdjective] Ради та одного з найбагатших чоловіків країни, [laxmand.GetName], було вбито серед білого дня в [ShowLocationName('kobenhavn')]. За словами очевидців, двоє відомих шляхтичів напали на [laxmand.GetHimHer] з ножем, а потім кинули [laxmand.GetHimHer] у канал. Як очільник [ROOT.GetCountry.GetGovernment.GetAdjective] Ради, [laxmand.GetLastNameWithNoTooltip] був силою, з якою доводилося рахуватися, і не завжди був у добрих стосунках з [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nЄ підозри, що [laxmand.GetSheHe] не завжди служив на благо [ROOT.GetCountry.GetFlavorRank] перш за все. Ми могли б добре використати цей інцидент, щоб ще більше послабити прихильників [laxmand.GetHisHer] та конфіскувати [laxmand.GetHisHer] майно. Однак дуже ймовірно, що такі дії дуже погано відіб'ються на нас, і дехто подумає, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] міг стояти за вбивством."
  flavor_dan.35.a: "Розслідувати вбивство [laxmand.GetHisHer]."
  flavor_dan.35.b: "Ми не будемо цим перейматися."
  flavor_dan.36.title: "Спадщина Імперії Північного моря"
  flavor_dan.36.desc: "Коли [GetCharacter('eng_cnut_the_great').GetName] завоював [GetCountry('ENG').GetName], він забезпечив своє правління, керуючи [GetCountry('ENG').GetNameWithNoTooltip] з міста [ShowLocationName('london')], залишивши контроль над [GetCountry('DAN').GetName] та [GetCountry('NOR').GetName] своїй дружині. Після стількох століть наше правління над [GetCountry('ENG').GetNameWithNoTooltip] було відновлено знову, однак керування ним становитиме проблему через відстань між [ROOT.GetCountry.GetCapital.GetName] та [GetCountry('ENG').GetAdjectiveWithNoTooltip] землями. Можливо, варто знову перенести нашу столицю до [ShowLocationNameWithNoTooltip('london')]."
  flavor_dan.36.a: "[ShowLocationNameWithNoTooltip('london')] стане нашою новою столицею!"
  flavor_dan.36.b: "Натомість інвестувати в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_dan.37.title: "Занепад [GetCountry('HSA').GetNameWithNoTooltip]"
  flavor_dan.37.desc: "Після наших рішучих перемог у захопленні [ShowLocationName('lubeck')] та [ShowLocationName('hamburg')], двох найважливіших портів [GetCountry('HSA').GetName], влада та вплив нашого давнього торговельного суперника суттєво зменшилися. З [GetCountry('HSA').GetAdjectiveWithNoTooltip] поразкою наше панування над балтійською торгівлею зміцнилося, зробивши нас беззаперечним гегемоном комерції в регіоні."
  flavor_dan.37.a: "Балтійське багатство тепер тече виключно до нашої скарбниці!"
  STATIC_MODIFIER_NAME_dan_defeated_hansa: "Ганзейська ліга переможена"
  flavor_dan.38.title: "Лев Півночі"
  flavor_dan.38.desc: "Наше нещодавнє піднесення до [ROOT.GetCountry.GetGovernment.GetAdjective] статусу, у поєднанні з нашим контролем над [ShowLocationName('stockholm')] та [ShowLocationName('oslo')], зміцнило наше панування в регіоні. З нашою беззаперечною владою ми є беззаперечними правителями [ShowRegionName('scandinavian_region')], і наш вплив продовжує зростати. [ShowCultureName('danish')] лев тепер реве з неперевершеною силою, його відлуння чути по всій півночі."
  flavor_dan.38.a: "Наші вороги тремтітимуть перед нашою могутністю!"
  STATIC_MODIFIER_NAME_dan_lion_from_the_north: "Лев Півночі"
  flavor_dan.39.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Колоніальна імперія"
  flavor_dan.39.desc: "Дослідницький дух наших предків-вікінгів відродився, оскільки ми закріпилися в [ShowContinentName('america')], [ShowContinentName('africa')] та [ShowContinentName('asia')]. З цими новими територіями під нашим контролем ми зайняли своє законне місце серед великих колоніальних імперій світу. Наш вплив тепер поширюється на континенти, і його відчувають у далеких землях, забезпечуючи наше місце на світовій арені."
  flavor_dan.39.a: "Славно!"
  flavor_dan.39.historical_info: "Данія історично заснувала кілька заморських колоній між 17-м і 19-м століттями, ставши скромною колоніальною державою. В Америці вона колонізувала частини Карибського басейну, зокрема Данську Вест-Індію. В Африці було засновано кілька торгових постів і фортів на Золотому березі, а в Азії Данія володіла колонією Транкебар в Індії, що використовувалася переважно для торгівлі. Ці колонії були невеликими, але значущими в глобальній торговельній мережі Данії, сприяючи її економіці та впливу в той період."
  flavor_dan.40.title: "Відвоювання [ShowAreaNameWithNoTooltip('skaneland_area')]"
  flavor_dan.40.desc: "Правління [GetCharacter('dan_chistopher_ii').GetName] привело [ROOT.GetCountry.GetName] на межу краху, внутрішні чвари та іноземні вторгнення ледь не розпустили королівство. Його смерть залишила [ROOT.GetCountry.GetNameWithNoTooltip] ослабленим і призвела до втрати [ShowAreaName('skaneland_area')], регіону, не тільки багатого на ресурси, але й глибоко переплетеного з нашою культурою та спадщиною, на користь [GetCountry('SWE').GetName]. Однак після років боротьби та рішучості ми нарешті досягли успіху у відвоюванні [ShowAreaNameWithNoTooltip('skaneland_area')] та возз'єднанні його з рештою [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_dan.40.a: "Відсвяткуймо цю перемогу!"
  flavor_dan.40.b.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('skaneland_area')] отримає [ShowModifierEffect('dan_integrating_scania')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 20#! років"
  flavor_dan.40.b: "Зосередитися на реінтеграції регіону."
  flavor_dan.41.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Золота доба живопису"
  flavor_dan.41.desc: "[ROOT.GetCountry.GetName] нині переживає період розквіту мистецьких досягнень, що знаменує те, що тепер визнано [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Золотою добою живопису. Ця епоха, визначена глибоким почуттям національної гордості та зосередженістю на красі повсякденного життя, бачить піднесення виняткових художників, які вловлюють сутність нашої культури, пейзажів та людей. Оскільки мистецтво продовжує процвітати, стає очевидним, що цей рух не тільки відображає культурну спадщину [ROOT.GetCountry.GetNameWithNoTooltip], але й значно сприяє її національній ідентичності."
  flavor_dan.41.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_dan.41.historical_info: "Данська Золота доба живопису на початку 19 століття бачила піднесення ключових художників, які формували національне мистецтво. Крістоффер Вільгельм Екерсберг, якого вважають батьком данського живопису, запровадив реалістичний стиль, що вплинув на його учнів, включаючи Йохана Томаса Лундбю, П.К. Сковгаарда та Вільгельма Марстранда. Лундбю та Сковгаард були відомі своїми романтичними пейзажами, тоді як Марстранд відзначався зображенням жвавих сцен повсякденного життя. Мистецтво цієї епохи відображало сильне почуття національної гордості та красу данського життя та пейзажу."
  flavor_dan.42.title: "Знесення замку Абсалона [ShowBuildingTypeNameWithNoTooltip('castle')]"
  flavor_dan.42.desc: "Після нашої принизливої поразки [GetCountry('HSA').GetName] нав'язала [ROOT.GetCountry.GetName] суворі умови. Серед цих вимог – знесення замку Абсалона [ShowBuildingTypeName('castle')], стародавньої фортеці в [ShowLocationName('kobenhavn')]. Це укріплення, збудоване в 12 столітті єпископом Абсалоном, довго захищало [ShowLocationNameWithNoTooltip('kobenhavn')] і було вирішальним у нашому захисті міста, а також ключовим у забезпеченні Зундських мит – що робило його кісткою в горлі Ганзи."
  flavor_dan.42.a: "Це справді принизливо..."
  flavor_dan.43.title: "Заснування Крістіанстада"
  flavor_dan.43.desc: "Пристрасть нашого правителя до архітектури та містобудування, у поєднанні з бажанням залишити тривалу спадщину, призвела до сміливої пропозиції: заснування нового міста під назвою Крістіанстад у [ShowLocationName('solvesborg')]. Хоча цей амбітний проєкт обіцяє підвищити наш престиж і продемонструвати нашу відданість розвитку, серед наших радників точаться значні дебати. Деякі вважають це гідною інвестицією, яка увіковічить наше правління, тоді як інші попереджають, що це нерозумне використання наших ресурсів, яке може напружити наші фінанси."
  flavor_dan.43.a: "Продовжити заснування Крістіанстада."
  flavor_dan.43.b: "Відхилити пропозицію."
  flavor_dan.44.title: "[ShowLocationNameWithNoTooltip('solvesborg')] Церква Трійці"
  flavor_dan.44.desc: "Після заснування [ShowLocationName('solvesborg')] до нас звернувся відомий архітектор [steenwinckel.GetName]. [steenwinckel.GetSheHe|U] пропонує будівництво грандіозного собору, Церкви Трійці, в серці нового [target_location.GetRank.GetName]. Така чудова споруда підвищила б престиж [target_location.GetRank.GetNameWithNoTooltip], названого на честь нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_dan.44.a: "Схвалити будівництво."
  flavor_dan.44.b: "Ми можемо побудувати його дешевше."
  flavor_dan.44.c: "Ми повинні зосередитися на інших пріоритетах."
  flavor_dan.44.historical_info: "Церква Трійці в Крістіанстаді, завершена на початку 17 століття, була чудовим прикладом архітектури Відродження в Скандинавії. Спроектована видатним архітектором Лоренцом ван Стінвінкелем, церква мала грандіозний фасад та складні елементи дизайну, що відображало архітектурні амбіції епохи та підвищувало престиж міста, названого на честь данського короля."
  flavor_dan.46.title: "Розширення [ShowAdvanceNameWithNoTooltip('dan_royal_life_guards')]"
  flavor_dan.46.desc: "З моменту свого заснування як особиста гвардія правителя та церемоніальний підрозділ [ROOT.GetCountry.GetName], [ShowAdvanceName('dan_royal_life_guards')] відігравала життєво важливу роль у забезпеченні безпеки та гідності нашої [ROOT.GetCountry.GetGovernment.GetAdjective] родини. Її присутність не тільки захищала наших правителів, але й стала символом незмінної могутності [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName]. Однак, зі зростанням загроз як зсередини, так і ззовні наших кордонів, серед наших військових радників зростає думка, що [ShowAdvanceNameWithNoTooltip('dan_royal_life_guards')] можна розширити та посилити."
  flavor_dan.46.a: "Це, безумовно, принесе нам користь."
  flavor_dan.46.b: "[ShowAdvanceNameWithNoTooltip('dan_royal_life_guards')] є добрими такими, як вони є."
  flavor_dan.47.title: "[ShowAdvanceNameWithNoTooltip('dan_scanian_regiment')]"
  flavor_dan.47.desc: "Створення [ShowAdvanceName('dan_scanian_regiment')], спочатку сформованого для посилення нашої залежності від найманих сил, стало значним кроком до створення більш організованої та надійної постійної армії. Цей полк, набраний із загартованих чоловіків нашого [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], вже довів свою цінність на полі бою, демонструючи дисципліну та вірність, неперевершені найманцями. Однак зростаюча сила цієї [ROOT.GetCountry.GetGovernment.GetAdjective]-контрольованої сили викликала занепокоєння серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які побоюються, що розширення полку може занадто сильно змістити баланс сил на користь [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_dan.47.a: "Розширити його!"
  flavor_dan.47.a.tt: "Відкриває події про особистостей, що служать у [ShowAdvanceName('dan_scanian_regiment')]."
  flavor_dan.47.b: "Ми не можемо дозволити собі засмучувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_dan.48.title: "[target_character.GetNameWithNoTooltip]"
  flavor_dan.48.desc: "[target_character.GetName] — вправний і досвідчений офіцер у [ShowAdvanceName('dan_scanian_regiment')], який відзначився [target_character.GetHerselfHimself] завдяки [target_character.GetHisHer] винятковому лідерству та тактичній майстерності. [target_character.GetHisHer|U] служба не залишилася непоміченою, і зростає підтримка підвищення [target_character.GetLastNameWithNoTooltip] до більш помітної ролі в наших лавах."
  flavor_dan.48.a: "Наші армії отримають користь від [target_character.GetHisHer] лідерства."
  flavor_dan.48.b: "Запропонувати [target_character.GetHimHer] служити [ROOT.GetCountry.GetGovernment.GetCourtTitle] натомість."
  flavor_dan.48.historical_info: "Сер Ендрю Сінклер з Рейвенскрейга, відомий у Данії як Андерс Сінклар, був шотландцем, який відіграв значну роль у данській армії. Він був шляхетного походження і став данським таємним радником, посланцем до Англії, полковником та власником великих феодів. Сінклер відіграв ключову роль у дипломатичних відносинах між Данією та Англією за правління Кристіана IV."
  flavor_dan.49.title: "[target_character.GetNameWithNoTooltip]"
  flavor_dan.49.desc: "[target_character.GetName], видатний дворянин і військовий лідер, є ключовою фігурою [ShowAdvanceName('dan_scanian_regiment')]. З [target_character.GetHisHer] глибоким корінням у [ROOT.GetCountry.GetAdjective] аристократії та репутацією як стратегічної проникливості, так і сильного почуття обов'язку, [target_character.GetLastNameWithNoTooltip] виявився безцінним активом на полі бою. [target_character.GetHisHer|U] досвід у різних військових кампаніях зробив [target_character.GetHimHer] шанованим та впливовим лідером серед наших військ. Багато хто припускає, що [target_character.GetSheHe] заслуговує на більш важливу роль, і що або наша армія, або [ROOT.GetCountry.GetGovernment.GetCourtTitle] могли б значно виграти від [target_character.GetHisHer] досвіду."
  flavor_dan.49.a: "Армія використає [target_character.GetHisHer] навички."
  flavor_dan.49.b: "[target_character.GetSheHe|U] буде корисним для [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_dan.49.historical_info: "Фальк Люкке був данським дворянином, феодалом, полковником Сканського полку та кавалером ордена Слона. Він відіграв значну роль в історії Данії під час Кальмарської війни, де служив капітаном у піхотному полку Герта Ранцау. Після війни Люкке отримав Крістіанопель як феод. Пізніше він обміняв його на Вісборг, ставши відповідальним за весь острів Готланд."
  flavor_dan.50.title: "[ShowGovernmentReformNameWithNoTooltip('dan_the_kings_law')]"
  flavor_dan.50.desc: "Оскільки [ShowContinentName('europe')] спостерігає зростаючу тенденцію до абсолютних монархій, коли королі та імператори централізують владу та розробляють конституції для зміцнення своєї влади, виникає питання для нашого власного [ROOT.GetCountry.GetFlavorRank]: Чи повинна [ROOT.GetCountry.GetName] наслідувати цей приклад? Була запропонована ідея розробки [ShowGovernmentReformName('dan_the_kings_law')]. Це була б конституція, яка закріпила б [ROOT.GetCountry.GetGovernment.GetRulerTitle] як єдиного правителя, не оскаржуваного [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] або іншими інституціями. Це ознаменувало б значну трансформацію в нашому управлінні, централізуючи всю владу в руках [ROOT.GetCountry.GetGovernment.GetRulerTitle] та узгоджуючи [ROOT.GetCountry.GetNameWithNoTooltip] з абсолютистськими державами, що виникають на континенті."
  flavor_dan.50.a: "Розробити його."
  flavor_dan.50.b: "Зберегти статус-кво."
  flavor_dan.50.historical_info: "Королівський закон був основоположним правовим документом, що встановив абсолютну монархію в Данії. Він формалізував абсолютну владу короля, зробивши монарха верховним правителем з усіма законодавчими, виконавчими та судовими повноваженнями, зосередженими в його руках. Закон також визначав правила престолонаслідування і був одним з найекстремальніших прикладів абсолютистського законодавства в Європі, залишаючись чинним до конституції 1849 року."
  flavor_dan.51.title: "Відбудова Йомсборга"
  flavor_dan.51.desc: "Ми захопили контроль над [ShowLocationName('wolgast')] у дельті Одера, стратегічно важливому регіоні, де, за легендою, колись стояла стародавня фортеця вікінгів Йомсборг. Деякі радники бачать можливість відбудувати це легендарне місто, перетворивши його на грізну фортецю, яка могла б забезпечити наше панування над Балтійським морем. Однак інші застерігають, що відродження такого легендарного місця може розбурхати старі забобони та привернути небажану увагу."
  flavor_dan.51.a: "Це зміцнить нашу владу над регіоном."
  flavor_dan.51.b: "Ми не повинні підживлювати багатовікові легенди."
  flavor_dan.51.historical_info: "Йомсборг був легендарною фортецею вікінгів, яка, як вважається, розташовувалася на південному узбережжі Балтійського моря, поблизу гирла річки Одер. Вона, за чутками, була базою йомсвікінгів, напівміфічного загону елітних воїнів-вікінгів, відомих своїм суворим військовим кодексом і запеклою відданістю. Хоча її точне місцезнаходження та існування залишаються невизначеними, Йомсборг оспівується в скандинавських сагах і середньовічних хроніках як центр влади та впливу вікінгів у Балтійському регіоні."
  flavor_dan.52.title: "Канал Нюхавн"
  flavor_dan.52.desc: "Оскільки значення [ShowLocationName('kobenhavn')] як комерційного центру продовжує зростати, його інфраструктура потребує покращення, щоб відповідати його зростаючій важливості. Одним із запропонованих проектів є будівництво нових каналів, включаючи велике розширення каналу Нюхавн. Ця інвестиція має на меті покращити наші портові споруди, збільшити торгівлю та зміцнити статус [ShowLocationNameWithNoTooltip('kobenhavn')] як головного центру комерції в регіоні."
  flavor_dan.52.a: "Інвестувати в масштабну реконструкцію."
  flavor_dan.52.b: "Профінансувати скромнішу відбудову."
  flavor_dan.52.c: "У нас немає на це вільних грошей."
  flavor_dan.52.historical_info: "Побудований у XVII столітті королем Кристіаном V, канал Нюхавн слугував жвавим комерційним портом Копенгагена. Це була жвава територія, де швартувалися кораблі з усього світу, розвантажуючи вантажі та рибальський улов. Канал був обставлений складами та пивоварнями, що робило його жвавою частиною міста."
  flavor_dan.53.title: "Призначення Генерального Будівельного Майстра"
  flavor_dan.53.desc: "[target_ruler.GetName] останнім часом виявляє великий інтерес до архітектури. Щоб втілити грандіозні архітектурні задуми [ROOT.GetCountry.GetGovernment.GetRulerTitle] та наглядати за амбітними будівельними проектами, [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує заснувати посаду Генерального Будівельного Майстра. Ця роль буде вирішальною для забезпечення успішного виконання наших архітектурних планів.\n\nСеред потенційних кандидатів, [target_character.GetName], відомий [target_character.GetHisHer] винятковою роботою, настійно рекомендується як ідеальний вибір для цієї престижної посади. [target_character.GetHisHer|U] досвід та доведений талант можуть значно сприяти реалізації наших амбітних проектів."
  flavor_dan.53.a: "Запропонувати [target_character.GetHimHer] посаду."
  flavor_dan.53.b: "Найняти [target_character.GetHimHer] було б занадто дорого."
  flavor_dan.53.historical_info: "Ламберт ван Гавен був дансько-норвезьким архітектором, майстром-будівельником і художником. Він здобув популярність як перший офіційний Генеральний Будівельний Майстер Данії за часів Кристіана V. Його архітектурна спадщина включає вражаючу Церкву Спасителя в Копенгагені, побудовану в голландському бароковому стилі, та інтер'єри палацу Фредеріксборг. Крім того, він зробив внесок в інші проекти, такі як міська брама Ньоррепорт і, можливо, палац Шарлоттенборг."
  flavor_dan.54.title: "[target_character.GetNameWithNoTooltip]"
  flavor_dan.54.desc: "Серед кіл [ROOT.GetCountry.GetAdjective] архітекторів останнім часом значну увагу привертає одне ім'я. [target_character.GetName], архітектор-візіонер, відомий [target_character.GetHisHer] майстерністю неокласичного дизайну, вже залишив [target_character.GetHisHer] слід на [ROOT.GetCountry.GetNameWithNoTooltip] численними проектами. [target_character.GetHisHer|U] робота характеризується елегантною простотою та величчю, що робить [target_character.GetHimHer] ідеальним кандидатом для керівництва архітектурними амбіціями нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_dan.54.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_dan.55.title: "Палац Крістіансборг"
  flavor_dan.55.desc: "Оскільки [ROOT.GetCountry.GetName] продовжує зростати в могутності та престижі, стала очевидною потреба у великій [ROOT.GetCountry.GetGovernment.GetAdjective] резиденції, яка відображатиме наш статус. Нинішні [ROOT.GetCountry.GetGovernment.GetAdjective] приміщення є неадекватними для нашого [ROOT.GetCountry.GetFlavorRank], і багато хто пропонує замовити архітекторам роботу над новим палацом. З [frederik_hansen.GetName], одним з найкваліфікованіших архітекторів нашого часу, у нашому розпорядженні, ми маємо можливість замовити справді чудовий палац у серці [ShowLocationName('kobenhavn')]. Ця нова резиденція, палац Крістіансборг, стане символом нашої [ROOT.GetCountry.GetGovernment.GetAdjective] влади і затьмарить палаци в усьому [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_dan.55.a: "Гарна ідея."
  flavor_dan.55.b: "Ми повинні зосередитися на інших пріоритетах."
  flavor_dan.56.title: "Повернення [target_character.GetNameWithNoTooltip]"
  flavor_dan.56.desc: "[target_character.GetName], відомий [ROOT.GetCountry.GetAdjective] скульптор, який провів десятиліття в [ShowRegionName('italy_region')], вдосконалюючи [target_character.GetHisHer] майстерність під впливом місцевих майстрів-скульпторів, вирішив повернутися на [target_character.GetHisHer] батьківщину.\n\nЗдобувши величезне визнання та відточивши [target_character.GetHisHer] навички в мистецтві скульптури, [target_character.GetSheHe] прагне зробити внесок у культурну спадщину [ROOT.GetCountry.GetNameWithNoTooltip]. Повернення [target_character.GetLastNameWithNoTooltip] знаменує значний момент для мистецтва в [ROOT.GetCountry.GetNameWithNoTooltip], і [target_character.GetHisHer] роботи, як очікується, надихнуть майбутні покоління та принесуть престиж нації."
  flavor_dan.56.a: "Вітаємо [target_character.GetHimHer] вдома."
  flavor_dan.56.b: "Нам не потрібно більше придворних."
  flavor_dan.56.historical_info: "Бертель Торвальдсен був данським скульптором, відомим своєю майстерністю неокласицизму, яку він удосконалив під час тривалого перебування в Римі. Він був першим міжнародно визнаним данським художником і відіграв вирішальну роль у підвищенні культурного статусу Данії в Європі. Його роботи, включаючи монументальні скульптури, такі як статуя Христа в копенгагенській церкві Вор Фруе Кірке, значно вплинули на європейське мистецтво та надихнули майбутні покоління скульпторів."
  flavor_dan.57.title: "Музей [thorvaldsen.GetNameWithNoTooltip]"
  flavor_dan.57.desc: "[thorvaldsen.GetName], великий [ROOT.GetCountry.GetAdjective] скульптор, чиї роботи принесли [ROOT.GetCountry.GetNameWithNoTooltip] культурне визнання, відійшов у вічність. Проте [thorvaldsen.GetHisHer|U] спадщина живе в численних шедеврах, які [thorvaldsen.GetSheHe] залишив після себе. Багато хто в країні тепер закликає до великої данини, щоб вшанувати [thorvaldsen.GetHisHer] внесок. Зростає рух за розширення [ShowWorkOfArtName('christiansborg_palace')] для включення музею, присвяченого мистецтву [thorvaldsen.GetHisHer], забезпечуючи, щоб майбутні покоління визнавали та вшановували [thorvaldsen.GetHisHer] вплив на [ShowCultureName('danish')] культуру."
  flavor_dan.57.a: "Заслужена данина."
  flavor_dan.57.b: "Ми вшануємо [thorvaldsen.GetHimHer] інакше."
  flavor_dan.57.c: "Наша увага потрібна в іншому місці."
  flavor_dan.57.historical_info: "Музей Торвальдсена, розташований у Копенгагені, був побудований на честь життя та творчості відомого скульптора Бертеля Торвальдсена. Це був перший публічний музей у Данії, який містить велику колекцію його скульптур, малюнків та особистих артефактів. Він відзначається своєю архітектурою, натхненною античним грецьким дизайном, та унікальним використанням кольорів як всередині, так і зовні."
  flavor_dan.58.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Академія образотворчих мистецтв"
  flavor_dan.58.desc: "У прагненні сприяти розвитку мистецтв та підвищити культурний статус [ROOT.GetCountry.GetName] зростає рух за створення престижної установи, присвяченої образотворчим мистецтвам. Провідні діячі [ROOT.GetCountry.GetFlavorRank] культури та освіти пропонують створити [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Академію образотворчих мистецтв, школу, яка виховуватиме наступне покоління [ROOT.GetCountry.GetAdjectiveWithNoTooltip] художників та сприятиме подальшому художньому впливу нації по всій [ShowContinentName('europe')]."
  flavor_dan.58.a: "Заснувати її."
  flavor_dan.58.b: "Заснувати її та надати державне фінансування."
  flavor_dan.58.c: "У ній немає потреби."
  flavor_dan.59.title: "Падіння [ShowLocationNameWithNoTooltip('visby')]"
  flavor_dan.59.desc: "Після запеклої кампанії наші сили успішно захопили стратегічно важливе місто [ShowLocationName('visby')] на острові [ShowProvinceDefinitionName('gotland_province')]. З його потужними укріпленнями та центральним розташуванням у Балтійському морі, [ShowLocationNameWithNoTooltip('visby')] є перлиною, яка значно посилить наш контроль над регіоном. Однак тепер виникає питання: що нам робити з містом?"
  flavor_dan.59.a: "[ShowLocationNameWithNoTooltip('visby')] наше, і здобич багата!"
  flavor_dan.59.b: "Натомість обкласти їх високим податком."
  flavor_dan.59.c: "Залишити як є."
  flavor_dan.59.historical_info: "У 1361 році король Вальдемар Аттердаг вторгся на острів Готланд у рамках своїх зусиль з консолідації данського контролю над Балтійським регіоном та обмеження ганзейського впливу. Після захоплення Вісбю, замість того, щоб грабувати його, Вальдемар вимагав від місцевих жителів завантажити його кораблі золотом та іншими дорогоцінними матеріалами як плату за поселення."
  flavor_dan.60.title: "Затоплення скарбничого флоту"
  flavor_dan.60.desc: "До нас дійшли жахливі новини. Під час подорожі з [ShowLocationName('visby')] до [ROOT.GetCountry.GetCapital.GetName] один із кораблів зі скарбами, що перевозив здобич з [ShowProvinceDefinitionName('gotland_province')], затонув, і таким чином частина здобичі була втрачена разом із кораблем."
  flavor_dan.60.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_dan.60.historical_info: "Згідно з #italic Danmarckis Rigis Krønicke#!, один з кораблів Вальдемара, що перевозив здобич з Готланду до Данії, затонув поблизу Карлсьоарни."
  flavor_dan.61.title: "[ShowGovernmentReformNameWithNoTooltip('dan_college_of_missions')]"
  flavor_dan.61.desc: "З моменту нашого навернення до [ShowReligionName('lutheran')] завдання поширення істинної віри в усі куточки нашого [ROOT.GetCountry.GetFlavorRank] стало дедалі нагальнішим. Проте населення повільно приймає нові вчення, і неспокій нависає, оскільки залишки старої віри вперто тримаються своїх традицій. Багато хто в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] запропонували створити фінансований державою [ShowGovernmentReformName('dan_college_of_missions')] — організацію, присвячену підтримці місіонерських зусиль по всій країні."
  flavor_dan.61.a: "Заснувати її!"
  flavor_dan.61.b: "Ми не повинні ризикувати роздратувати релігійні меншини."
  flavor_dan.62.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] [ShowGoodsNameWithNoTooltip('porcelain')] Мануфактура"
  flavor_dan.62.desc: "Наші нещодавні інвестиції у виробництво [ShowGoodsName('porcelain')] призвели до значного збільшення імпорту цього цінного товару. Ринок [ShowGoodsNameWithNoTooltip('porcelain')], що розширюється в [ShowContinentName('europe')], не залишився непоміченим нашими [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які бачать вигідну можливість для подальшого зміцнення нашої економічної позиції. Це призвело до створення офіційної державної фабрики [ShowGoodsNameWithNoTooltip('porcelain')] для виробництва та розповсюдження високоякісного [ShowGoodsNameWithNoTooltip('porcelain')] в [ShowContinentNameWithNoTooltip('europe')]."
  flavor_dan.62.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_dan.62.historical_info: "Королівська порцелянова фабрика, заснована 1775 року в Копенгагені, Данія, була створена для використання зростаючого європейського попиту на порцеляну, розкішний товар, який став дуже затребуваним у XVIII столітті. Фабрика була заснована під патронатом королеви Юліани Марії з метою виробництва високоякісної порцеляни, яка могла б конкурувати з імпортом з Китаю та Майсена."
  flavor_dan.63.title: "Ворнедскаб"
  flavor_dan.63.desc: "Руйнівний вплив [ShowSituationName('black_death')] залишив величезні ділянки сільськогосподарських угідь [ROOT.GetCountry.GetName] покинутими, оскільки незліченна кількість селян загинула від чуми або втекла до відносної безпеки та можливостей міст. Це спричинило серйозний дефіцит робочої сили, загрожуючи сільськогосподарській основі нашої економіки. У відповідь [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] тиснуть на [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], щоб запровадити Ворнедскаб — систему кріпацтва, яка прив'язувала б [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] до землі, забезпечуючи стабільну робочу силу та запобігаючи подальшому знелюдненню сільської місцевості."
  flavor_dan.63.a: "Запровадити!"
  flavor_dan.63.b: "Ми повинні відстоювати свободу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  flavor_dan.63.historical_info: "Ворнедскаб був інститутом, подібним до кріпацтва, запровадженим у Данії наприкінці XIV століття. Він мав на меті забезпечити стабільну робочу силу для землевласників після того, як населення зменшилося через Чорну смерть. За Ворнедскабом селяни були прив'язані до свого місця народження і не могли шукати кращих умов або переїжджати до міст. Ця практика була скасована 1702 року."
  flavor_dan.64.title: "Набіг [ShowCultureGroupNameWithNoTooltip('amazigh_group')] на [ShowAreaNameWithNoTooltip('iceland_area')]"
  flavor_dan.64.desc: "У безпрецедентній та шокуючій події флот [ShowCultureGroupName('amazigh_group')] піратів висадився на віддалених берегах Західної [ShowAreaName('iceland_area')]. Ці безжальні нальотчики грабували міста та села, залишаючи за собою руйнування. Але найтяжчим наслідком було масове викрадення чоловіків, жінок та дітей, яких забрали в полон для продажу в рабство в далекі землі. Народ [ShowAreaNameWithNoTooltip('iceland_area')] перебуває в паніці, і їхні крики про захист та помсту лунають по всьому [ROOT.GetCountry.GetFlavorRank]."
  flavor_dan.64.a: "Надати місцевим жителям підтримку."
  flavor_dan.64.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_dan.64.historical_info: "Набіги POSTEDIT_Амазигів на Ісландію, також відомі як Турецькі викрадення, були серією набігів, здійснених піратами Магрибу, що базувалися в Алжирі. Під час цих набігів вони викрали сотні людей, включаючи місцевих жителів Ісландії та членів екіпажів захоплених данських торгових суден."
  flavor_dan.65.title: "Заколот [ShowAdvanceNameWithNoTooltip('dan_royal_life_guards')]"
  flavor_dan.65.desc: "Чутки поширюються серед наших збройних сил, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] планує скасувати престижну [ShowAdvanceName('dan_royal_life_guards')] як частину ширшої реформи [ROOT.GetCountry.GetAdjective] армії. Ці елітні солдати, які довго служили особистими охоронцями [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName], відчувають, що їхня честь і статус під загрозою. Коли ці чутки дійшли до вух [ShowAdvanceNameWithNoTooltip('dan_royal_life_guards')], вони були зустрінуті обуренням. Вважаючи потенційне скасування свого підрозділу зрадою, вони вдалися до рішучих дій і підняли відкритий заколот, вимагаючи, щоб [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] відмовилася від будь-яких таких планів."
  flavor_dan.65.a: "Їхній заколот буде придушено!"
  flavor_dan.65.b: "Заплатити їм, щоб вони відступили."
  flavor_dan.66.title: "Розширення [ShowBuildingTypeNameWithNoTooltip('copenhagen_dockyard')]"
  flavor_dan.66.desc: "Незважаючи на наші значні інвестиції у створення великої [ShowBuildingTypeName('copenhagen_dockyard')], зростає занепокоєння, що цей об'єкт все ще недостатній для підтримки нашого флоту, що розширюється. Адмірали та морські офіцери стверджують, що більш значна та добре обладнана військово-морська база є важливою для підтримки нашого панування на морях та забезпечення ефективної роботи та ремонту нашого флоту. Вони пропонують виділити додаткові кошти для розширення верфей та створення справді гідної бази для нашої військово-морської могутності."
  flavor_dan.66.a: "Нехай флот сам займається своїм розширенням."
  flavor_dan.66.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] профінансує відбудову."
  flavor_dan.66.c: "Нинішня верф більш ніж достатня."
  flavor_dan.67.title: "Фрески Ельмелунде"
  flavor_dan.67.desc: "У невеликому селі Ельмелунде в [ShowLocationName('vordingborg')] місцева церква довгий час була місцем скромної відданості та спільноти. Нещодавно стало відомо, що інтер'єр церкви прикрашений надзвичайною серією фресок невідомого майстра. Ці захоплюючі твори мистецтва, що зображують сцени біблійної величі та місцевого фольклору, роками захоплювали мешканців села, але новина про їхнє існування лише зараз дійшла до широкої публіки. Відкриття фресок Ельмелунде викликало великий інтерес та цікавість по всій країні, надаючи можливість відзначити цю приховану перлину [ROOT.GetCountry.GetAdjective] мистецтва."
  flavor_dan.67.a: "Захоплююче!"
  flavor_dan.68.title: "Dominium Maris Baltici"
  flavor_dan.68.desc: "Панування над Балтійським морем було предметом суперечок відтоді, як постали Скандинавські королівства. Але й нескандинавські держави виявляли свій інтерес до підкорення Балтійського моря. Однак наш флот, неперевершений за розміром і силою, тепер контролює життєво важливі торгові шляхи та морський доступ до цього вирішального регіону. Ця перевага, відома як #italic Dominium Maris Baltici#!, означає нашу повну гегемонію над Балтійськими водами. Оскільки жодна інша нація не може кинути виклик нашій морській владі, ми забезпечили собі стратегічну перевагу, яка зміцнить наше економічне та військове становище."
  flavor_dan.68.a: "Наша сила неперевершена!"
  STATIC_MODIFIER_NAME_dan_dominium_maris_baltici: "Dominium Maris Baltici"
  flavor_dan.1000.title: "База в $india$"
  flavor_dan.1000.desc: "До [ROOT.GetCountry.GetGovernment.GetRuler.GetName] звернулася група [ShowCultureName('danish')] купців, які бажають здійснити експедицію до $india$. Вони присягають на вірність [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName] і хочуть заснувати [ShowBuildingTypeName('trade_office')] для нашої країни. Хоча бажаний результат цієї експедиції далеко не гарантований, це може допомогти нам розширити свій вплив на вигідні торгові шляхи з [ShowContinentName('asia')], якщо ми ризикнемо."
  flavor_dan.1000.a: "До $india$!"
  flavor_dan.1000.tt: "Буде відправлено експедицію для заснування торгової місії в $india$. Якщо експедиція буде успішною, інвестиції будуть повернені разом із прибутком."
  flavor_dan.1000.b: "У нас є ближчі проблеми."
  flavor_dan.1001.title: "Посольство від [GetCountry('DAN').GetNameWithNoTooltip]"
  flavor_dan.1001.desc: "Група купців звернулася до [ROOT.GetCountry.GetGovernment.GetRuler.GetName] і стверджує, що представляє [GetCountry('DAN').GetGovernment.GetRulerTitle] [GetCountry('DAN').GetName]. Вони пропонують дозволити їм створити торгову факторію в нашому порту в [dansborg.GetName] за значну плату. Хоча їхні подальші обіцянки захисту звучать надто розпливчасто, щоб сприймати їх серйозно, [GetCountry('DAN').GetAdjective] інтерес до регіону може призвести до сприятливого для нас результату."
  flavor_dan.1001.a: "Чудова ідея!"
  opinion_dansborg: "Факторія в Дансборзі"
  flavor_dan.1001.b: "Ми не можемо довіряти цій дрібній рибі."
  flavor_dan.1002.title: "Новини з [danish_india_target.GetNameWithNoTooltip]"
  flavor_dan.1002.desc: "Наша перша експедиція до $india$ повернулася з добрими новинами. Здається, їм вдалося переконати місцевого [danish_india_target.GetGovernment.GetRulerTitle] [danish_india_target.GetName] погодитися на [ROOT.GetCountry.GetAdjective] колонію в загальній області [danish_india_target.GetNameWithNoTooltip].\n\nЗа словами доброго капітана, вже побудовано нову фортецю разом із невеликою, але прибутковою факторією."
  flavor_dan.1002.a: "Сподіваймося, це окупиться."
  flavor_dan.1003.title: "Провал експедиції до $india$"
  flavor_dan.1003.desc: "Наша експедиція до $india$ повернулася лише з поганими новинами. Здається, екіпаж знайшов шлях до острова [ShowAreaName('sailan_area')] і зайняв місцевий храм. У наступному конфлікті з місцевими військами їх вигнали та прогнали з острова.\nПід час наступної зупинки вздовж [ShowAreaName('tamil_land_area')] вони зіткнулися з подібними проблемами, що призвело до їхнього остаточного провалу."
  flavor_dan.1003.a: "Принаймні ми повернули частину грошей."
  flavor_dan.1100.title: "[target_character.GetNameWithNoTooltip] сперечається з [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_dan.1100.desc: "[target_character.GetName], один із наших державних радників, вступив у конфлікт із [ROOT.GetCountry.GetGovernment.GetRulerTitle] безпосередньо через майно. Хоча він уже виконував незначні ролі в нашій країні, цей конфлікт тепер вирішить його долю на службі [ROOT.GetCountry.GetLongName]. Чи варто нам вигнати порушника спокою за його непокору [ROOT.GetCountry.GetGovernment.GetRulerTitle], чи ми повинні пробачити його провини і дозволити йому піднятися далі?"
  flavor_dan.1100.a.tt: "[target_character.GetNameWithNoTooltip] переїде до [exile_destination.GetName]"
  flavor_dan.1100.a: "Геть його з моїх очей!"
  flavor_dan.1100.b: "Забудьмо про цю проблему."
  flavor_dan.1101.title: "[target_character.GetNameWithNoTooltip] пропонує свої послуги"
  flavor_dan.1101.desc: "Провівши минулі роки у вигнанні, [target_character.GetName] пильно спостерігав за ситуацією в [ROOT.GetCountry.GetName]. Попри його попередню сварку з [ROOT.GetCountry.GetGovernment.GetRulerTitle], він знову запропонував нам свої послуги, стверджуючи, що може допомогти та покращити кілька сфер нашого уряду."
  flavor_dan.1101.a.tt: "[target_character.GetNameWithNoTooltip] буде відкликано"
  flavor_dan.1101.a: "Повернути його на службу."
  flavor_dan.1101.b: "Він нам не потрібен."
  flavor_dan.1200.title: "Королівське весілля"
  flavor_dan.1200.desc: "[target_valdemar.GetName] уклав угоду з [GetCharacter('dan_valdemar_iii').GetName] з [GetCountry('SLV').GetName] про одруження з сестрою [GetCharacter('dan_valdemar_iii').GetShortNameWithNoTooltip], [target_helvig.GetName]. Цей союз не лише слугуватиме альянсом проти політичного контролю [ROOT.GetCountry.GetLongName] під проводом [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetName], але й поверне значні території безпосередньо короні. Укладення цього шлюбу дасть [target_valdemar.GetNameWithNoTooltip] потужну позицію, з якої можна буде відновити контроль над [target_valdemar.GetHerHis] власним [ROOT.GetCountry.GetFlavorRank]."
  flavor_dan.1200.a: "Укласти союз, як обіцяно."
  flavor_dan.1200.b: "Цей союз більше не вигідний."
  flavor_dan.1200.dan.tt: "Ми надішлемо повідомлення до [GetCountry('SLV').GetName], щоб підготувати весілля"
  flavor_dan.1200.slv.tt: "Це призведе до інтеграції нашої території в [GetCountry('DAN').GetLongName], щойно [target_valdemar.GetName] відновить [target_valdemar.GetHerHis] владу"
  flavor_dan.1200.historical_info: "Вальдемар, герцог Шлезвігу, раніше був королем Данії як Вальдемар III, маючи свого дядька Герхарда III, графа Гольштейн-Рендсбургу, як опікуна. Потім він домовився з майбутнім Вальдемаром IV, сином попереднього короля, виступити проти Герхарда III, і в обмін пообіцяв свою сестру в шлюб майбутньому королю. Вона принесе посаг у вигляді величезних територій у Північній Ютландії, що дасть йому потужну позицію для майбутніх кампаній з возз'єднання Данії та відновлення контролю над нею."
  flavor_dan.1201.desc: "Пропозиція шлюбу між [target_valdemar.GetName] та [target_helvig.GetName] була прийнята, як домовлено з [GetCountry('SLV').GetLongName]. Цей союз обов'язково принесе щастя та процвітання [ROOT.GetCountry.GetLongName], надавши [target_valdemar.GetShortNameWithNoTooltip] більше засобів для зміцнення [target_valdemar.GetHerHis] контролю над [ROOT.GetCountry.GetFlavorRank]."
  flavor_dan.1201.a: "Нехай Бог благословить цей союз."
  flavor_dan.1202.desc: "Свині з [GetCountry('SLV').GetName] вирішили скасувати обіцяні заручини між [target_valdemar.GetName] та [target_helvig.GetName]. Це назавжди залишиться плямою на їхній честі, і ми цього легко не забудемо."
  flavor_dan.1202.a: "Будьте вони прокляті."