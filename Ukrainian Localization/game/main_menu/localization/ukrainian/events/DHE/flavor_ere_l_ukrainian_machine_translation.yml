l_english:
  flavor_ere.1.title: "Боротьба за незалежність"
  flavor_ere.1.desc: "Надто довго наші східні володарі нав'язували свою волю нашому народу. Зі знищенням старого режиму та правлінням Ільханідів багато воєначальників прагнули розширити свою територію по всій [ShowRegionName('persia_region')] і навіть до [ShowRegionName('anatolia_region')]. Однак, оскільки наш домен досить великий, питання нашої незалежності стає нагальним..."
  flavor_ere.1.a: "Настав час позбутися наших [target_country.GetAdjectiveWithNoTooltip] кайданів!"
  flavor_ere.1.b: "Ще ні."
  declare_indep_war_tt: "Це може призвести до #italic Війни за незалежність#! проти них!"
  flavor_ere.2.title: "Неприємності в [ShowRegionNameWithNoTooltip('anatolia_region')]"
  flavor_ere.2.desc: "Попри всі наші спроби контролювати занепалий хаос після падіння Ільханідів, схоже, що наші піддані під владою [target_character.GetName] вирішили висунути нам ультиматум. Вони готові взятися за зброю, якщо ми не надамо їм беззастережну свободу і не звільнимо їх з-під нашої влади!"
  flavor_ere.2.a: "Буде війна!"
  flavor_ere.2.b: "Ми не можемо ризикувати відкритими бойовими діями, дуже добре..."
  flavor_ere.2.historical_info: "До середини XIV століття Еретніди ставали все більш автономними і прагнули зміцнити свою владу над Анатолією. Це призвело до зіткнень з Джалаїрідами, які намагалися встановити контроль над територіями, що колись управлялися Ільханатом. Під керівництвом Хасана Бузурга, а пізніше його наступника, Шейха Увайса, Джалаїріди прагнули розширити свій вплив на Анатолію та зберегти владу над тюркськими та монгольськими фракціями в цьому районі."
  flavor_ere.3.title: "Безбородий Пророк"
  flavor_ere.3.desc: "Жорстока війна за незалежність проти наших колишніх сюзеренів, [target_country.GetName], завершилася, і наша боротьба вирішена гучною перемогою! Парад на вулицях, люди святкують ім'я [target_character.GetName] і співають хвалу могутності та стійкості нашого правителя перед обличчям небезпеки. Такий розвиток подій, безперечно, є знаком божественної прихильності і, безумовно, прокладе шлях до піднесення могутнього Бейліка в [ShowRegionName('anatolia_region')]."
  flavor_ere.3.a: "Хай живе [target_character.GetSheHe]!"
  beardless_prophet: "Безбородий Пророк"
  flavor_ere.3.historical_info: "Здобувши владу в Центральній Анатолії після смерті Хасана Кучака, Еретна проголосив себе султаном і випустив монети зі своїм ім'ям. Він значно розширив свою територію, контролюючи регіони від Коньї до Ерзурума, включаючи такі міста, як Анкара, Кайсері та Сівас, які в різний час служили його столицями. Як здібний адміністратор, Еретна використав політичний хаос у $mamluk$ Єгипті та смерті конкуруючих лідерів для консолідації та розширення свого домену. Хоча він заручився підтримкою монгольських племен, відомих як Кара-татари, і підкреслив свою монгольську спадщину через свої монети, він стратегічно призначав мамлюків та місцевих турків на ключові посади, щоб уникнути монгольського відродження. Еретна, освічений і шанований правитель, підтримував порядок і стабільність під час свого правління."
  flavor_ere.4.title: "Перспективний Командир"
  flavor_ere.4.desc: "На полі бою швидкі дії та рішучість можуть розділяти нищівну поразку та престижну перемогу. Приймати найскладніші рішення та підтримувати тактичну перевагу – лише одна з багатьох сильних сторін [target_character.GetName]. Досвідчений солдат, [target_character.GetSheHe] брав участь у багатьох сутичках як піхотинець і нещодавно піднявся по службових сходах нашої армії."
  flavor_ere.4.a: "Надати йому командування підрозділом."
  flavor_ere.4.b: "У нас немає місця для селян!"
  target_character_will_make_fine_general_tt: "[target_character.GetShortNameWithNoTooltip] зможе служити генералом"
  flavor_ere.5.title: "[target_character2.GetNameWithNoTooltip] Вимагає Корону"
  flavor_ere.5.desc: "Протягом багатьох років [target_character2.GetName] вірно служив під нашим прапором. Однак останні бурхливі часи у сфері зовнішньої дипломатії та внутрішніх справ призвели до багатьох нещасть. Останнє і найбільше з них – не хто інший, як [target_character2.GetShortNameWithNoTooltip], який уявляє себе наступником за мечем проти [target_character.GetName].\n\nЙого популістське послання про відродження нашого народу та відновлення нашої сили знайшло відгук у багатьох, і біда чекає на нас звідусіль..."
  flavor_ere.5.a: "Дурень принесе загибель народу!"
  impacted_locations_var_tt: "Приблизно [ROOT.GetVariable('num_rebelling_locations').GetValue] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] приєднаються до справи [target_character2.GetNameWithNoTooltip]"
  burhan_al_din_pretenders: "[GetCharacter('ere_burhan_al_din').GetShortNameWithNoTooltip] Претенденти"
  flavor_ere.6.title: "Кьошкмедресе"
  flavor_ere.6.desc: "Нещасна смерть [ere_suli_scope.GetName] стала жахливим ударом для морального духу нашого дорогого правителя [ruler_scope.GetName] до такої міри, що звичайних похоронних ритуалів здається недостатньо, щоб вшанувати її пам'ять.\n\nВидатний [ShowCultureName('armenian_culture')] архітектор на ім'я [ere_kaluyan_scope.GetName] запропонував будівництво нової [ShowBuildingTypeName('madrasa')] у [ShowLocationName('kayseri')] на ім'я [ere_suli_scope.GetShortNameWithNoTooltip] як спосіб увічнити її назавжди."
  flavor_ere.6.a: "Найняти чоловіка і побудувати її."
  flavor_ere.6.b: "Ми не можемо собі це дозволити."