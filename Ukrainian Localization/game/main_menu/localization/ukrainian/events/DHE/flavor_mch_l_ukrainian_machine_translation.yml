l_english:
  flavor_mch.1.title: "Реформи [target_character.GetShortNameWithNoTooltip]"
  flavor_mch.1.desc: "У [GetCurrentYear] році [target_character.GetShortName] зумів(ла) об'єднати усі [ShowCultureName('jurchen_culture')] племена. [target_character.GetSheHe|U] також реформував(ла) уряд, адміністрацію та судову систему за зразком $china$."
  flavor_mch.1.a: "Ми обираємо Інноваційні реформи."
  flavor_mch.1.b: "Перевага надається Консервативним реформам."
  flavor_mch.2.title: "Сім кривд"
  flavor_mch.2.desc: "Століттями наш народ жив під чоботом династії, що править [target_country.GetName]. Століттями ми були підкорені їхній владі та принижені указами з далеких дворів, що суперечать нашій сутності.\\n\\nНаш народ тепер об'єднаний, і ми готові змінити хід подій. Маніфест, що містить сім кривд, яких зазнав наш народ, був голосно прочитаний нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle] перед нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle], оголошуючи, що незабаром ми будемо у стані війни з [target_country.GetNameWithNoTooltip].\\n\\nЦе ми або вони."
  flavor_mch.2.a: "Ми готові атакувати."
  flavor_mch.3.title: "Реформи [ROOT.GetCountry.GetAdjectiveWithNoTooltip] армії"
  flavor_mch.3.desc: "Тепер, коли ми міцно контролюємо [ShowRegionName('north_china_region')], можливо, настав час використати наш військовий досвід для реформування старої [ShowCultureGroupName('chinese_group')] армії.\\n\\nОднак це, ймовірно, буде дорого, і багато хто у війську буде обурюватися такою спробою. Що нам робити?"
  flavor_mch.3.a: "Так, реформувати військо, оскільки старі [ShowCultureGroupNameWithNoTooltip('chinese_group')] методи є гіршими."
  flavor_mch.3.b: "Ба! Чого варвари можуть навчити націю Сунь-Цзи?"
  flavor_mch.4.title: "Призначення [target_character.GetShortNameWithNoTooltip]"
  flavor_mch.4.desc: "Нещодавно нашу увагу привернув перспективний міністр. Його/Її ім'я — [target_character.GetShortName], і [target_character.GetSheHe] безумовно мудрий(а) у справах дипломатії та адміністрації.\\n\\nПроте, ходять чутки, що [target_character.GetSheHe] також надзвичайно корумпований(а), поєднуючи [target_character.GetHerHis] політичну майстерність з жадібністю та фаворитизмом. Чи варто нам зробити [target_character.GetHerHim] нашим головним міністром?"
  flavor_mch.4.a: "Призначити [target_character.GetHerHim] попри [target_character.GetHerHis] недоліки!"
  flavor_mch.4.b: "Ні, така корупція може зруйнувати державу!"
  flavor_mch.5.title: "Пізня Цзінь"
  flavor_mch.5.desc: "Кілька століть тому династія [ShowCultureName('jurchen_culture')] походження, династія Цзінь, зуміла досягти великого успіху завдяки своїм великим завоюванням [ShowRegionName('north_china_region')]. Хоча вони не змогли повністю претендувати на опіку над [GetInternationalOrganization('middle_kingdom').GetName], вони, тим не менш, змогли відбити вторгнення південної династії Сун, і, можливо, досягли б значного успіху, якби не вторгнення [GetCountry('MGE').GetLongName]. Можливо, як могутня [ROOT.GetCountry.GetAdjective] держава [ShowCultureNameWithNoTooltip('jurchen_culture')] походження, ми могли б взяти їхнє ім'я."
  flavor_mch.5.a: "Проголосити Пізню Цзінь."
  flavor_mch.5.b: "Ми передусім [ROOT.GetCountry.GetAdjectiveWithNoTooltip]."
  mch_warring_state_modifier_trigger: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e] належить до [ShowCultureGroupName('chinese_group')] [Concept('culture_group', 'CONCEPT_PLACEHOLDER')|e] і [Concept('owner', 'CONCEPT_PLACEHOLDER')|e] вдалося підкорити [GetCountry('KOR').GetName] через ланцюжок [Concept('event', 'CONCEPT_PLACEHOLDER')|e] $flavor_mch.10.title$."
  mch_lifan_yuan_modifier_trigger: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e] має [Concept('dominant_culture', 'CONCEPT_PLACEHOLDER')|e], яка не є ані прийнятою, ані належить до [ShowCultureGroupName('chinese_group')] або [ShowCultureGroupName('jurchen_group')] [Concept('culture_group', 'CONCEPT_PLACEHOLDER')|e]."
  unlocked_warring_state: "Розблоковано $warring_state$"
  map_QNG: "$QNG$ Жовтий"
  flavor_mch.6.title: "[ShowLawNameWithNoTooltip('mch_queue_hair')]"
  flavor_mch.6.desc: "З [ROOT.GetCountry.GetAdjective] елітою на чолі [GetInternationalOrganization('middle_kingdom').GetName], тепер меншість [ShowCultureName('jurchen_culture')] керує [ShowCultureGroupName('chinese_group')] більшістю. Ця проблемна ситуація глибоко турбує [target_character.GetName], який(а) вважає, що падіння династій [GetCountry('YUA').GetName] та Цзінь було спричинене їхньою асиміляцією. Таким чином, [target_character.GetSheHe] є прихильником(цею) політики [ShowPolicyName('enforce_queue_hair')], хоча значна частина [target_character.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle] радить [target_character.GetHerHim] дотримуватися концепції [ShowPolicyName('queue_hair_status_quo')]."
  flavor_mch.6.a: "Ухвалити [ShowLawNameWithNoTooltip('mch_queue_hair')]."
  flavor_mch.6.b: "То були не помилки, а пристосування до обставин!"
  flavor_mch.7.title: "[target_character.GetNameWithNoTooltip] Дракон-Тигр"
  flavor_mch.7.desc: "Незліченна кількість битв, виграних [target_character.GetName], принесла [target_character.GetHerHim] титул [ShowTraitName('dragon_tiger')]. З таким великим лідером на чолі, [ROOT.GetCountry.GetLongName] безперечно чекає золота доба."
  flavor_mch.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mch.8.title: "Вісім Прапорів [ShowRegionNameWithNoTooltip('mongolia_region')]"
  flavor_mch.8.desc: "Коли [ROOT.GetCountry.GetName] розширюється за межі [ShowRegionName('manchuria_region')] до багатих дворів $china$, багато національностей, що служать в [ShowCultureGroupName('chinese_group')] арміях, переходять на наш бік. Хоча спочатку ми змогли інтегрувати їх у нашу поточну військову структуру, стає очевидним, що нам доведеться розширити нашу концепцію прапорів, щоб включити також військових [target_location.GetDominantCulture.GetName]. Таким чином, ми сформували $flavor_mch.8.title$ у [target_location.GetName] під керівництвом [target_character.GetName]."
  flavor_mch.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mch.9.title: "Вісім Прапорів $china$"
  flavor_mch.9.desc: "Дії говорять голосніше за слова, і перехід [ShowCultureGroupName('chinese_group')] генералів багато говорить про долю претендентів, які заснували свої штаб-квартири в $china$. Дійсно, у міру нашого завоювання все більше і більше [ShowCultureGroupNameWithNoTooltip('chinese_group')] громадян приєднуються до наших армій, настільки, що стандартна система прапорів не може вмістити їх усіх. Таким чином, ми створили $flavor_mch.9.title$, які були організовані в [target_location.GetName] під керівництвом [target_character.GetName]."
  flavor_mch.9.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mch.10.title: "Доля [ShowRegionNameWithNoTooltip('korea_region')]"
  flavor_mch.10.desc: "[target_country.GetLongName] протягом багатьох століть був вірним підданим [GetInternationalOrganization('middle_kingdom').GetName]. Однак, схоже, для [target_country.GetAdjectiveWithNoTooltip] держави наша претензія на Мандат Неба має мало значення, оскільки вони відмовляються стати лояльним [ShowSubjectTypeName('tributary')] [ROOT.GetCountry.GetName]. Якщо ми не зможемо їх приборкати, наша претензія може бути поставлена під сумнів."
  flavor_mch.10.a: "Ми вимагаємо коутоу!"
  flavor_mch.10.b: "Їх буде підкорено з часом."
  mch_benefits_of_subjugating_korea: "У нас є 25 років, щоб перетворити [Concept('target_country.GetName] на нашого [subject', 'CONCEPT_PLACEHOLDER')|e]. Якщо ми досягнемо успіху, [ShowGovernmentReformName('warring_state')] надасть нам додаткові переваги."
  flavor_mch.11.success_title: "Падіння [target_country.GetNameWithNoTooltip]"
  flavor_mch.11.failure_title: "[target_country.GetNameWithNoTooltip] Стоїть Міцно"
  flavor_mch.11.success_desc: "Кампанія з підкорення [target_country.GetName] була гучним успіхом. Ми утвердилися як справжні володарі [GetInternationalOrganization('middle_kingdom').GetName], і з таким проявом влади інші непокірні монархи схиляють коліна перед нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_mch.11.failure_desc: "Нам не вдалося довести [target_country.GetAdjective] наскільки ми справді могутні. В очах [ShowCultureGroupName('chinese_group')] народу ми лише посміховисько, а бюрократи [target_country.GetNameWithNoTooltip] все ще міцно стоять у [target_country.GetCapital.GetName]."
  flavor_mch.11.a: "Це увійде в історію."
  mch_improve_warring_state_gov_reform: "[ShowGovernmentReformName('warring_state')] надасть нам додаткові переваги."
  flavor_mch.12.title: "[ShowGovernmentReformNameWithNoTooltip('lifan_yuan')]"
  flavor_mch.12.desc: "Управління територіями за межами основної юрисдикції [ShowCultureGroupName('chinese_group')] та [ShowCultureName('jurchen_culture')] людей стало досить клопітким. Таким чином, було внесено пропозицію створити [ShowGovernmentReformName('lifan_yuan')], агентство, призначене для того, щоб ми могли отримати більше від цих територій, а також для полегшення сепаратистських настроїв місцевого населення."
  flavor_mch.12.a: "Чудова пропозиція!"
  flavor_mch.12.b: "Ми не можемо підтримувати ці витрати наразі."
  flavor_mch.13.title: "Зростаючий [target_location.GetNameWithNoTooltip]"
  flavor_mch.13.desc: "Амбіції [target_character.GetName] лежать в основі [GetInternationalOrganization('middle_kingdom').GetName]. Однак ці цілі все ще далекі, оскільки [ROOT.GetCountry.GetName] ще занадто слабкий, щоб захопити $china$. Натомість, було б мудріше зміцнити [target_character.GetHerHis] [ROOT.GetCountry.GetFlavorRank], побудувавши нове місто з нуля, і місце для цього було обрано в [target_location.GetName]."
  flavor_mch.13.a: "Побудувати його."
  flavor_mch.13.b: "Це лише тимчасова турбота."
  flavor_mch.14.title: "Столиця, гідна [GetInternationalOrganization('middle_kingdom').GetNameWithNoTooltip]"
  flavor_mch.14.desc: "Наше нещодавнє придбання [target_location.GetName] викликало великий ентузіазм, оскільки це не звичайний [target_location.GetRank.GetName], адже він був столицею багатьох видатних династій. Якщо [ROOT.GetCountry.GetName] має стати новим Імператором $china$, було б найдоречніше перенести нашу столицю до [target_location.GetNameWithNoTooltip]."
  flavor_mch.14.a: "Так і буде."
  flavor_mch.14.b: "Ми переглянемо цей стандарт."
  flavor_mch.15.title: "[ShowPolicyNameWithNoTooltip('mch_green_standard_army')]"
  flavor_mch.15.desc: "У міру того, як наше завоювання $china$ прогресує, Вісім [ShowCultureGroupName('chinese_group')] Прапорів не в змозі підтримувати кількість нових рекрутів, які намагаються вступити до [ROOT.GetCountry.GetAdjective] армії. Ми не будемо відмовляти їм у призовних пунктах, бо це лише направить тих самих чоловіків у бік численних повстанців, які мучать нашу націю. Натомість, давайте створимо [ShowPolicyName('mch_green_standard_army')], яка утримуватиме цих рекрутів і допоможе нам контролювати наші завоювання в $china$."
  flavor_mch.15.a: "Негайно заснувати її!"
  flavor_mch.15.b: "Ми не можемо собі цього дозволити наразі."
  flavor_mch.16.title: "Прийняття Старого Режиму"
  flavor_mch.16.desc: "Ми лише ще одна лінія в роду божественних імператорів $china$. Різні династії до нас вже створили ефективні бюрократії, які змогли утримати разом масивне [GetInternationalOrganization('middle_kingdom').GetName]. Чому б нам не прийняти ці політики? Така дія зробила б нас більш [ShowSocietyDirectionName('sinicized')], але також зберегла б спадкоємність і зміцнила б нашу владу в очах простолюдинів."
  flavor_mch.16.a: "Ми приймемо ці інституції."
  flavor_mch.16.b: "Прихильність до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('tribes_estate')]."
  unlock_chinese_language_reforms: "Це розблокує [ShowGovernmentReformName('three_departments_system')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]."
  MCH_conditional_benefit: "Якщо ми не приймемо [ShowGovernmentReformName('three_departments_system')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e], [ShowEstatePrivilegeName('mch_tribal_favor')] надасть додаткові переваги."
  flavor_mch.17.title: "Проголошення $QNG$"
  flavor_mch.17.desc: "Нарешті, нам вдалося взяти під контроль Мандат Неба та [GetInternationalOrganization('middle_kingdom').GetName]. За звичаєм, ми приймемо ім'я для нової Династії, а [target_character.GetName] буде проголошений Сином Неба. Щодо назви Династії, було обрано ім'я $QNG$, що означає «чистий» і «незаплямований». Однак символіка золота не зникає з цим проголошенням, оскільки наш прапор все ще залишатиметься золотим."
  flavor_mch.17.a: "Дме Золотий вітер."
  flavor_mch.17.b: "Нам нічого з цього не потрібно!"
  flavor_mch.18.title: "[GetCountry('MCH').GetAdjectiveWithNoTooltip] Письмо"
  flavor_mch.18.desc: "У минулі віки [ShowLanguageName('jurchen_language')] мова записувалася спеціально розробленим письмом, яке було створено під час династії Цзінь і адаптовано з киданського письма. Однак після падіння цієї династії воно вийшло з ужитку, змушуючи нас записувати нашу історію способами, які були нам чужими. Таким чином, [target_character.GetName] видав указ про адаптацію [ShowLanguageName('mongolian_language')] письма до наших потреб і про те, щоб зробити його новим [ROOT.GetCountry.GetAdjective] письмом."
  flavor_mch.18.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mch.19.title: "Прийняття Нової Ідентичності"
  flavor_mch.19.desc: "Хоча для багатьох з нас наше [ShowCultureName('jurchen_culture')] походження є нашою гордістю, не можна заперечувати, що для встановлення [ROOT.GetCountry.GetAdjective] [GetInternationalOrganization('middle_kingdom').GetName] наше минуле як [ShowCultureGroupName('chinese_group')] підданих є великою ганьбою. Таким чином, було запропоновано відмовитися від цієї історії, натомість прийнявши нову ідентичність як $MCH$."
  flavor_mch.19.a: "Наше [ShowCultureNameWithNoTooltip('jurchen_culture')] походження є загрозою нашій легітимності."
  flavor_mch.19.b: "Ми не дозволимо зганьбити нашу традицію."