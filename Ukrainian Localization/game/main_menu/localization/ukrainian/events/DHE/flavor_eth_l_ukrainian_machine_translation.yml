l_english:
  flavor_eth.10.title: "[pero_covilha.GetNameWithNoTooltip]"
  flavor_eth.10.desc: "Дивний чоловік прибув на наші береги, але не маршрутом [ShowAreaName('red_sea_area')], яким зазвичай до нас подорожують чужинці. Він стверджує, що є частиною подорожі з півдня, подорожі, яка, наскільки нам відомо, ніколи раніше не здійснювалася. Він приносить вітання від побратимів-християнських монархів, хоча його молитва не схожа на ту, яку ми бачили раніше. Як нам ставитися до цього чоловіка?"
  flavor_eth.10.a: "Вшанувати його і заборонити йому від'їзд!"
  flavor_eth.10.a.desc: "Незабаром прибудуть нові відвідувачі з [GetCountry('POR').GetName]."
  flavor_eth.10.b: "Вигнати його!"
  flavor_eth.20.title: "Посольство тут!"
  flavor_eth.20.desc: "[francisco_alvares.GetName], представляючи ту саму країну, що й попередній емісар, бажає обговорити, що наші два режими можуть зробити разом. Він каже, що шукав #italic Пресвітера Йоана#!, і ми, очевидно, та країна, яку він шукає. Чи варто нам розпочати обмін?"
  flavor_eth.20.a: "Шукати допомоги проти [GetCountry('MAM').GetName]!"
  flavor_eth.20.tt: "[GetCountry('POR').GetName] буде запрошено надати військову допомогу"
  flavor_eth.20.b: "Запитати про культурний обмін?"
  flavor_eth.20.c: "Можливо, варто укласти торговельну угоду?"
  flavor_eth.21.title: "Пресвітер Йоан?"
  flavor_eth.21.desc: "[GetCountry('ETH').GetGovernment.GetRulerTitle] [GetCountry('ETH').GetName], який може бути або не бути легендарним Пресвітером Йоаном, очевидно, переживає важкі часи і благає нас допомогти [GetCountry('ETH').GetGovernment.GetRuler.GetHerHim] відновити [GetCountry('ETH').GetGovernment.GetRuler.GetHerHis] землі. [GetCountry('ETH').GetGovernment.GetRuler.GetSheHe] надіслав посла на ім'я [scope_mattheus.GetName]. [scope_mattheus.GetNameWithNoTooltip] є християнином, хоча такого роду, якого ми ніколи раніше не бачили, і благає нас відновити законні володіння його пана, але [GetCountry('MAM').GetAdjective] влада все ще загрожує, і це здається великим ризиком для сумнівного зиску. Чи варто нам допомагати [scope_mattheus.GetNameWithNoTooltip]?"
  flavor_eth.21.a: "Deus Vult!"
  opinion_military_aid: "Військова допомога"
  flavor_eth.21.b: "Я думав, Пресвітер Йоан мав допомагати нам, а не навпаки?"
  opinion_refused_military_aid: "Відмовлено в наданні допомоги"
  flavor_eth.22.title: "Допомога із Заходу"
  flavor_eth.22.desc: "Невеликий флот, що перевозив зброю та війська, прибув до наших берегів. Лідер цих [GetCountry('POR').GetAdjective] солдатів приносить лист від їхнього монарха, в якому сказано: «Ми обидва християнські монархи, об'єднані в нашій боротьбі проти невірних."
  flavor_eth.22.a: "Бог добрий!"
  STATIC_MODIFIER_NAME_eth_mil_aid_from_portugal: "Військова допомога від Португалії"
  STATIC_MODIFIER_DESC_eth_mil_aid_from_portugal: "Військова допомога від наших братів по вірі, проти невірних, яких ми маємо спільними ворогами"
  flavor_eth.23.title: "Нас занедбали"
  flavor_eth.23.desc: "Більше немає посольств від [GetCountry('POR').GetName], більше не приходять торговці, і немає відповіді на наш запит про допомогу."
  flavor_eth.23.a: "Ми самотні!"
  flavor_eth.30.title: "Реформи централізації [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip]"
  flavor_eth.30.desc: "Під опікою династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] [ROOT.GetCountry.GetName] перетворилася на велике царство. Однак різноманітні регіони під нашим правлінням не мають спільної мови, релігії чи адміністративної системи.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName], найздібніший правитель, якого [ROOT.GetCountry.GetNameWithNoTooltip] бачив за довгий час, підготував кілька реформ, що значно сприяли створенню більш уніфікованої держави."
  flavor_eth.30.a: "Ми повинні централізувати державу."
  flavor_eth.30.b: "Ми можемо централізувати пізніше."
  flavor_eth.40.title: "Мандрівна столиця"
  flavor_eth.40.desc: "Щоб контролювати різноманітну [ROOT.GetCountry.GetLongName], [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] ніколи не встановлювали постійної столиці. Натомість королівський двір подорожує від вождя до вождя кожні кілька місяців.\n\nХоча за таких обставин важко забезпечити адміністративну безперервність, мандрівний двір має свої переваги. Часті візити королівських дворів до всіх куточків Імперії сприяють зростанню спільної елітної культури на наших землях."
  flavor_eth.40.a: "Так було завжди."
  flavor_eth.40.b: "Активно заохочувати культурне навернення сільської місцевості."
  flavor_eth.50.title: "[ShowLocationNameWithNoTooltip('debra_berhan')] – Гора Світла"
  flavor_eth.50.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] мав видіння, в якому [ROOT.GetCountry.GetGovernment.GetRulerSheHe] було показано сяючу гору, на якій слід побудувати нову столицю [ROOT.GetCountry.GetName]. [ShowBuildingTypeName('temple')] вже було збудовано на цьому місці, і тепер держава має реалізувати мрію нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_eth.50.a: "Настав час для постійної столиці."
  flavor_eth.50.b: "Не порушуймо традицій."
  flavor_eth.60.title: "[ShowLocationName('debra_berhan')] розграбовано"
  flavor_eth.60.desc: "Старі традиції вмирають важко, і поки сільська місцевість [ShowLocationName('debra_berhan')] грабується, нову столицю покидають усі, від наших придворних до найнижчого конюха. У нас немає вибору, окрім як відновити звичай мати мандрівний двір."
  flavor_eth.60.a: "Ми повинні переїхати до провінцій."
  flavor_eth.70.title: "[ShowLocationNameWithNoTooltip('gonder')] – Нова столиця"
  flavor_eth.70.desc: "[target_character.GetName] проводить [target_character.GetHerselfHimself] все більше часу біля монастирів на [ShowLocationName('lake_tana')]. Завдяки постійному покровительству [ROOT.GetCountry.GetGovernment.GetRulerTitle] у цьому районі почало виникати невелике ринкове містечко, і дехто почав називати це місто вторинною столицею нашого [ROOT.GetCountry.GetFlavorRank].\n\nЦя ідея припала до душі тим, хто вірить, що постійна столиця тут може дозволити нам започаткувати нову духовну та архітектурну спадщину."
  flavor_eth.70.a: "Побудуймо нашу столицю тут."
  flavor_eth.70.b: "Ми не повинні прив'язувати себе до одного місця."
  flavor_eth.80.title: "Доля [ShowCultureNameWithNoTooltip('lower_egyptian_culture')] [ShowReligionAdjectiveWithNoTooltip('miaphysite')] народу"
  flavor_eth.80.desc: "До нас дійшли звістки з [ShowRegionName('egypt_region')] про те, що [GetCountry('MAM').GetAdjective] [GetCountry('MAM').GetGovernment.GetRulerTitle] переслідує [ShowReligionAdjective('miaphysite')] народ на своїх землях. Як споріднене царство під Патріархатом [ShowLocationName('alexandria')], наш обов'язок діяти. Той факт, що сам патріарх перебуває в [GetCountry('MAM').GetAdjectiveWithNoTooltip] руках, дещо ускладнює ситуацію, однак прямий напад може поставити під загрозу основи нашої Церкви."
  flavor_eth.80.a: "Надіслати суворо сформульованого листа [GetCountry('MAM').GetGovernment.GetRulerTitle]."
  flavor_eth.80.b: "Уникнути ризику розгнівати [GetCountry('MAM').GetNameWithNoTooltip]."
  flavor_eth.80.c: "Це привід для війни!"
  flavor_eth.81.title: "Прибуває лист від [target_from_country.GetNameWithNoTooltip]"
  flavor_eth.81.desc: "Сьогодні ми отримали листа від [target_ruler.GetName] з [target_from_country.GetLongName]. У повідомленні детально описано численні, на їхню думку, провини нашого [ROOT.GetCountry.GetFlavorRank] проти [ShowReligionAdjective('miaphysite')] народу, що проживає в наших кордонах.\n\nОднак, ймовірно, немає особливих причин для занепокоєння, оскільки патріарх як [ShowReligionAdjectiveWithNoTooltip('miaphysite')] народу в [ShowRegionName('egypt_region')], так і в [ShowRegionName('ethiopia_region')] є нашим заручником. Здається дуже малоймовірним, що [target_ruler.GetNameWithNoTooltip] ризикуватиме безпекою [target_ruler.GetHerHis] патріарха через таку справу."
  flavor_eth.81.a: "Надіслати саркастичну відповідь."
  flavor_eth.81.b: "Спробувати вибачитися та налагодити стосунки."
  opinion_improved_relations: "Покращені стосунки"
  flavor_eth.82.title: "Надійшов лист від [target_from_country.GetNameWithNoTooltip]"
  flavor_eth.82.desc: "Ми отримали звістку, що [target_ruler.GetName] з [target_from_country.GetName] вважає, що ми погано поводимося з [ShowReligionAdjective('miaphysite')] населенням на наших землях. [target_ruler.GetSheHe|U] чітко розглядає це як привід для війни, і є багато припущень, що напад з боку [target_from_country.GetNameWithNoTooltip] може бути неминучим."
  flavor_eth.82.a: "Вони не посміють."
  flavor_eth.83.title: "Посол від [target_mam.GetLongNameWithNoTooltip]"
  flavor_eth.83.desc: "Сьогодні до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] прибув посланець від [target_mam.GetName], який привіз відповідь [target_mam_ruler.GetName] на наші занепокоєння щодо [ShowReligionAdjective('miaphysite')] народу на [target_mam_ruler.GetHerHis] землях.\n\nОднак відповідь далека від вибачення, на яке ми очікували. [target_mam.GetGovernment.GetRulerTitle] вирішив виявити [target_mam_ruler.GetHerHis] зневагу до [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], і [target_mam_ruler.GetSheHe] висміює будь-яку форму відплати, яку ми могли б спробувати."
  flavor_eth.83.a: "Ув'язнити посла."
  flavor_eth.83.b: "Це привід для війни!"
  flavor_eth.83.c: "Давайте просто забудемо про це."
  flavor_eth.84.title: "[target_mam.GetNameWithNoTooltip] вибачається"
  flavor_eth.84.desc: "[target_mam.GetAdjective] [target_mam.GetGovernment.GetRulerTitle] надіслав звістку, що [target_mam_ruler.GetSheHe] вивчає ситуацію з [ShowReligionAdjective('miaphysite')] народом на [target_mam_ruler.GetHerHis] землях. [target_mam_ruler.GetSheHe|U] запевняє нас, що [target_mam_ruler.GetSheHe] має лише почуття дружби до [ROOT.GetCountry.GetAdjective] народу та [ShowReligionAdjectiveWithNoTooltip('miaphysite')] Церкви."
  flavor_eth.84.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_eth.85.title: "Посла затримано"
  flavor_eth.85.desc: "[target_from_country.GetAdjective] [target_from_country.GetGovernment.GetRulerTitle] був настільки незадоволений нашою відповіддю на [target_ruler.GetHerHis] лист, що [target_ruler.GetSheHe] затримав нашого посланця."
  flavor_eth.85.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_eth.90.title: "Смерть єпископа"
  flavor_eth.90.desc.a: "Єпископ [target_country.GetName] помер, і [target_country.GetAdjectiveWithNoTooltip] Церква запросила наступника від [ShowReligionAdjective('miaphysite')] Патріарха [ShowLocationName('alexandria')].\n\nХоча наступника було обрано Патріархом, це була б гарна нагода показати [target_country.GetAdjectiveWithNoTooltip] народу, хто тут головний. [target_ruler.GetName] з [target_country.GetNameWithNoTooltip] активно проводив політику навернення проти [target_ruler.GetHerHis] [ShowReligionName('sunni')] підданих, і [target_ruler.GetSheHe] досі утримує посла, якого ми відправили, щоб покарати [target_ruler.GetHerHis] минулого разу."
  flavor_eth.90.desc.b: "Єпископ [target_country.GetName] помер, і [target_country.GetAdjectiveWithNoTooltip] Церква запросила наступника від [ShowReligionAdjective('miaphysite')] Патріарха [ShowLocationName('alexandria')].\n\nХоча наступника було обрано Патріархом, це була б гарна нагода надіслати повідомлення та чітко дати зрозуміти [target_country.GetAdjectiveWithNoTooltip] народу, хто насправді тут головний."
  flavor_eth.90.a: "Запобігти призначенню нового єпископа."
  flavor_eth.90.b: "Ми не повинні втручатися в ці справи."
  flavor_eth.91.title: "Єпископ зник"
  flavor_eth.91.desc: "Минуло вже багато часу з того часу, як помер останній єпископ [ROOT.GetCountry.GetName], і ми запросили наступника з [ShowLocationName('alexandria')]. Чи може [GetCountry('MAM').GetName] втручатися?"
  flavor_eth.91.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_eth.100.title: "Монаші ордени"
  flavor_eth.100.desc: "Однією з найбільших сильних сторін [ROOT.GetCountry.GetAdjective] Церкви є велика кількість успішних монастирів, що розкидані по всій території нашої держави. Монаші ордени сприяли успіху нашої держави, засновуючи нові монастирі в новозавойованих областях і поширюючи там слово істинної віри. Монастирі [ROOT.GetCountry.GetNameWithNoTooltip] також є джерелом освіти для [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], її [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та її адміністраторів, і як такі вони значно сприяли відродженню [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Церкви в минулі роки.\n\nІншою стороною цієї медалі, однак, є те, що монастирі та ордени, які ними керують, стали як багатими, так і автономними."
  flavor_eth.100.a: "Спробувати приборкати їх."
  flavor_eth.100.b: "Захистити привілеї орденів."
  flavor_eth.110.title: "Незалежність від Патріархату"
  flavor_eth.110.desc: "Залежність [ROOT.GetCountry.GetAdjective] Церкви від Патріархату [ShowLocationName('alexandria')] завжди була тягарем для нашої країни. Можливо, колись існувала практична потреба в єпископах, духовенстві та духовному керівництві з-за кордону, але розширення [ROOT.GetFlavorRank] Церкви протягом останніх століть, однак, означає, що наш [ShowCountryRankName('ETH')] вже готує своїх [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], і існує сильна релігійна інфраструктура у вигляді церков і монастирів по всій нашій землі.\n\nОскільки Єгипетський Патріархат перебуває в заручниках у [ShowReligionName('muslim')] завойовників, нам часто доводиться довго чекати між смертю одного єпископа та призначенням наступного. Було б набагато ефективніше призначати наше релігійне керівництво з лав нашого [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_eth.110.a: "Ми не можемо зганьбити нашого Патріарха."
  flavor_eth.110.b: "Наша Церква має бути вільною від іноземного впливу."
  flavor_eth.120.title: "Кебра Нагаст"
  flavor_eth.120.desc: "#italic Кебра Нагаст#!, також відома як «Слава царів», є національним епосом [ROOT.GetCountry.GetName]. Її написав Небуре Ід Ішак з Аксуму під наглядом єпископа Абби Гіоргіса. Цей твір слугує сховищем наших національних і релігійних почуттів, маючи величезне історичне та культурне значення.\n\nВважається, що текст #italic Кебра Нагаст#! має багатовікову історію і займає особливе місце в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] літературі та культурі, хитромудро переплітаючи історію, релігію та походження династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], яка має велике значення в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ShowReligionAdjective('miaphysite')] Церкві.\n\nУ #italic Кебра Нагаст#! розгортається захоплива розповідь про зустріч цариці Савської та царя Соломона. Вона також оповідає захопливу історію про те, як їхній син, Менелік I (Менєлек), приніс шанований Ковчег Завіту до [ShowRegionName('ethiopia_region')]. Окрім цих чудових оповідей, епос досліджує глибокий зсув у релігійних віруваннях нашого народу, коли вони перейшли від поклоніння небесним тілам до прийняття віри в #italic Господа Бога Ізраїлю#!."
  flavor_eth.120.a: "Дізнатися, як наші предки керували своїми володіннями."
  flavor_eth.120.b: "Вивчити способи поводження з підданими."
  flavor_eth.120.c: "Застосувати старі тактики, показані в ній, до сучасних проблем."
  flavor_eth.130.title: "$lalibela_cross$"
  flavor_eth.130.desc: "$lalibela_cross$, один із найцінніших релігійних та історичних скарбів нашої нації, — це великий і витончено прикрашений процесійний хрест, який зберігається в Бет Медхане Алем у [ShowLocationName('lalibela')]. Священники часто використовують хрест, щоб благословляти або зцілювати вірян, обережно торкаючись ним до них.\n\nВиготовлений з цільного шматка металу, він зроблений з бронзи та золота, а його центральний хрест має подовжену спадаючу гілку та витончено розширені кінці, прикрашені витонченим орнаментом. Відмінною рисою Хреста є зображення #italic рук Адама#! біля основи, прикрашених під час свят яскравими та барвистими шматками тканини, що додає хресту величі та значущості."
  flavor_eth.130.a: "Ми повинні перенести його до нашої столиці."
  flavor_eth.130.b: "Ми розпочнемо паломництво, як і належить."
  flavor_eth.130.c: "Зробити церкву, що містить реліквію, ще величнішою."
  flavor_eth.130.a.tt: "Наші піддані [ShowCultureName('agaw_culture')] походження будуть дуже незадоволені"
  flavor_eth.140.title: "Правосуддя царів"
  flavor_eth.140.desc: "#italic Фета Негест#!, також відома як #italic Правосуддя царів#!, — це теократичний правовий кодекс, укладений близько 1240 року арабською мовою Абу'л-Фада'ілом ібн аль-Ассалом, єгипетським християнським письменником. Він черпав свої закони з апостольських писань та попередніх правових кодексів візантійських правителів.\n\nТекстуальна історія #italic Фета Негест#! розкриває дві її окремі частини. Перша частина переважно зосереджена на церковних питаннях, деталізуючи структуру церковної ієрархії та таїнств. Вона включає елементи з Біблії, праць ранніх Отців Церкви, таких як святий Василій та святий Іполит, а також канони, встановлені на соборах, таких як Нікейський собор та Антіохійський собор.\n\nДруга частина #italic Фета Негест#! стосується питань, що стосуються мирян, включаючи сімейне право, борги та цивільне управління. Хоча вона черпає з тих самих джерел, що й перша частина, її значною мірою приписують чотирьом книгам, відомим як #italic Канони імператорів#!. Ці книги включають #italic Прохейрон#! (також відомий як #italic Прохейрос Номос#!), арабську версію #italic Сиро-римської правової книги#!, арабську версію #italic Еклога#! та #italic Заповіді Старого Завіту#!.\n\nПротягом століть #italic Фета Негест#! слугувала авторитетним правовим посібником для [ShowReligionAdjective('miaphysite')] християн [ShowRegionName('egypt_region')]. Тепер її перекладено на [ROOT.GetCountry.GetCulture.GetLanguage.GetName] у [ShowRegionName('ethiopia_region')] та доповнено додатковими місцевими законами. Деякі судді в нашому королівстві цікавляться, чи варто нам її прийняти, і більшість серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] підтримують цю дію."
  flavor_eth.140.a: "Ми повинні її адаптувати."
  flavor_eth.140.b: "Зараз не час."
  flavor_eth.150.title: "$the_book_of_the_mysteries_of_the_heavens_and_the_earth$"
  flavor_eth.150.desc: "Зі зростанням популярності теології в [ROOT.GetCountry.GetName] все більше ченців надихаються писати про свої знання. Одним із таких ченців є [target_artist.GetName], видатний член [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], який бажає написати про створення людства та про те, як усе в цьому світі виникло."
  flavor_eth.150.a: "Давайте спонсоруємо [target_artist.GetHerHim]."
  flavor_eth.150.b: "Ми не можемо собі це дозволити."
  flavor_eth.151.title: "Повернення вигнаних ченців"
  flavor_eth.151.desc: "Під час правління [target_character3.GetName] [target_character3.GetSheHe] вів неортодоксальне життя, яке викликало ненависть ченців, таких як [target_character.GetName], які критикували [target_character3.GetHerHim] за такий спосіб життя. Через це [target_character.GetSheHe] був вигнаний разом з кількома іншими ченцями. Тепер, коли [target_character3.GetNameWithNoTooltip] помер, можливо, [target_character2.GetName] може скасувати їхнє вигнання."
  flavor_eth.151.a: "[target_character.GetHerHis|U] вигнання було несправедливим. Нехай [target_character.GetHerHim] повернеться."
  flavor_eth.151.b: "[target_character.GetSheHe|U] не повернеться, доки [target_character.GetSheHe] живий."
  flavor_eth.153.title: "Дебре Ігзіабхер"
  flavor_eth.153.desc: "Дебре Ігзіабхер — це стародавня церква [ROOT.GetCountry.GetName], але історія забула про неї. Дивлячись на озеро [target_location.GetName], [target_character.GetName] думав про її відбудову, щоб зміцнити [ROOT.GetCountry.GetReligion.GetAdjective] віру в [ROOT.GetCountry.GetFlavorRank]."
  flavor_eth.153.a: "Давайте відбудуємо цю церкву."
  flavor_eth.153.b: "Ми відмовляємося, навіть якщо це розгніває [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_eth.153.c: "Вона стане однією з найвеличніших церков у [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_eth.155.title: "Обмеження [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  flavor_eth.155.desc: "З моменту сходження [target_character.GetName] на трон [ROOT.GetCountry.GetName], [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] контролювали більшість земель. [target_character2.GetName] бажає скасувати це, значно зменшивши їхню владу. Це, однак, може їх засмутити."
  flavor_eth.155.a: "Землі належать [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_eth.155.b: "Ми не збираємося засмучувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_eth.156.title: "Повстання [rebels_scope.GetNameWithNoTooltip]"
  flavor_eth.156.desc: "[ShowReligionAdjective('judaism')] громади в [ROOT.GetCountry.GetName] стали бунтівними. Вони згуртувалися навколо руху під назвою [rebels_scope.GetName], бажаючи позбутися наших [ROOT.GetCountry.GetReligion.GetAdjective] звичаїв."
  flavor_eth.156.a: "Нам потрібно готуватися."
  flavor_eth.156.b: "Вони мають рацію. Давайте надамо їм деякі релігійні права."
  eth_make_all_jewish_pops_unhappy_tt: "Усі [ShowReligionAdjective('judaism')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  eth_make_all_jewish_pops_happier_tt: "Усі [ShowReligionAdjective('judaism')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|-=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  beta_israel: "Бета Ізраїль"
  flavor_eth.157.title: "Мандрівний двір"
  flavor_eth.157.desc: "Хоча столиця [ROOT.GetCountry.GetName] змінювалася протягом років через військові потреби, для правителів ніколи не було традицією переміщувати двори в різні місця. Будучи ближче до наших армій і розрізняючи села та міста, дозволяючи [target_character.GetName] та будь-якому майбутньому правителю обирати своє місце правління, а також забезпечуючи турботу [ROOT.GetCountry.GetGovernment.GetRulerTitle] про кожну частину країни, ми можемо виправдати це як життєздатну практику для [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_eth.157.a: "Дозвольмо цю зміну."
  flavor_eth.157.b: "Стаціонарна столиця найкраща."
  flavor_eth.160.title: "$book_of_light$"
  flavor_eth.160.desc: "Через науковий характер [target_character.GetName], [target_character.GetSheHe] був натхненний кількома іншими трактатами, зокрема тими, що походять з [ShowContinentName('europe')], і бажає присвятити [target_character.GetHerHis] час написанню низки книг, починаючи з $book_of_light$. [target_character.GetSheHe|U] сподівається, що вони сприятимуть поширенню [ROOT.GetCountry.GetReligion.GetName] у [ROOT.GetCountry.GetName]. Однак така практика не дозволить [target_character.GetHerHim] керувати так ефективно."
  flavor_eth.160.a: "[target_character.GetSheHe|U] створить шедевр!"
  flavor_eth.160.b: "[target_character.GetNameWithNoTooltip] буде правити, а не писати."
  flavor_eth.161.title: "$book_of_nativity$"
  flavor_eth.161.desc: "Після місяців писання [target_character.GetName] створив ще одну книгу для нашої колекції. Назвавши її $book_of_nativity$, він закликає до реформ у [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та захищає [target_character.GetHerHis] переконання з цього приводу."
  flavor_eth.161.a: "Ще один шедевр."
  flavor_eth.162.title: "$books_of_trinity$"
  flavor_eth.162.desc: "Залишок часу, який [target_character.GetName] присвятив писанню, [target_character.GetSheHe] створив [target_character.GetHerHis] останній шедевр. Назвавши його $books_of_trinity$, він слугує завершенням [target_character.GetHerHis] релігійних переконань у [ROOT.GetCountry.GetName], які були викладені в $book_of_light$ та $book_of_nativity$."
  flavor_eth.162.a: "Можливо, [target_character.GetNameWithNoTooltip] зможе реформувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]?"
  flavor_eth.163.title: "[ShowBuildingTypeNameWithNoTooltip('debere_meshwae')]"
  flavor_eth.163.desc: "Завдяки успішному правлінню [target_character.GetName], [target_character.GetSheHe] був натхненний створити [ShowBuildingTypeName('debere_meshwae')], церкву, величнішу за інші. Це може бути дорого, але спроба стримати [target_character.GetHerHim] у цьому проєкті може призвести до того, що [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] обернеться проти нас."
  flavor_eth.163.a: "Збудуймо її."
  flavor_eth.163.b: "Скільки церков потрібно [ROOT.GetCountry.GetNameWithNoTooltip]?"
  flavor_eth.164.title: "Іноземні натхнення"
  flavor_eth.164.desc: "Хоча [ROOT.GetCountry.GetCulture.GetName] була домінуючою силою в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], було кілька дебатів щодо того, щоб натомість подивитися назовні та переформувати її способами, натхненними іноземними націями. Це, безумовно, негативно вплине на [ROOT.GetCountry.GetName], але це варте зусилля, якщо ми хочемо запросити більше вчених."
  flavor_eth.164.a: "Це варте зусилля."
  flavor_eth.164.b: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] завжди очолюватиме [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_eth.165.title: "$confession_of_faith$"
  flavor_eth.165.desc: "Бажаючи захистити [ShowReligionAdjective('miaphysite')] віру, [target_character.GetName] бажає написати трактат під назвою $confession_of_faith$. [target_character.GetSheHe|U] каже, що він зміцнить ідеї, яким кожен віруючий вже слідує, такі як дотримання суботи та заборона свинини. Можливо, ми можемо дозволити [target_character.GetHerHim] написати його, але це коштуватиме [ROOT.GetCountry.GetName] частину її скарбниці."
  flavor_eth.165.a: "Все для [ShowReligionNameWithNoTooltip('miaphysite')]."
  flavor_eth.165.b: "Ми минули епоху релігійних дебатів."
  flavor_eth.200.title: "[ewostatewos.GetNameWithNoTooltip] Чернець"
  flavor_eth.200.desc: "Під час наших подорожей країною для відвідування наших вождів ми зустріли мудреця, який навчав простолюдинів. [ewostatewos.GetName] — монах і релігійний лідер з півночі нашого [ROOT.GetCountry.GetFlavorRank], [ewostatewos.GetSheHe] має монастир і невелику групу послідовників, але після кількох хвилин слухання [ewostatewos.GetHerHis] уроку наш єпископ швидко роздратувався [ewostatewos.GetHimHer].\n\n[ewostatewos.GetNameWithNoTooltip] проголошує захист давнього звичаю [GetCountry('ETH').GetAdjective] [ShowReligionName('miaphysite')] простолюдинів дотримуватися як суботи, так і неділі як святих днів. Наш єпископ натомість каже, що ця доктрина суперечить мандату нашого патріарха в [ShowLocationName('alexandria')] і може призвести до всіляких проблем. На його думку, єдиний спосіб — покарати [ewostatewos.GetNameWithNoTooltip] за це вчення, щоб це стало прикладом, і ніхто не пішов [ewostatewos.GetHerHis] хибним шляхом."
  flavor_eth.200.a: "Дотримуватися поради єпископа."
  flavor_eth.200.b: "Немає потреби в покаранні, [ewostatewos.GetSheHe] може піти кудись інде."
  flavor_eth.200.c: "[ewostatewos.GetShortNameWithNoTooltip] здається мудрішим за нашого єпископа, [ewostatewos.GetSheHe] може отримати цю посаду."
  flavor_eth.200.d: "Насправді ми також зацікавлені в тому, чого [ewostatewos.GetSheHe] може навчити."
  flavor_eth.201.title: "[ewostatewos.GetNameWithNoTooltip], [GetCountry('ETH').GetAdjectiveWithNoTooltip] монах"
  flavor_eth.201.desc: "[ewostatewos.GetName] — [ShowReligionAdjective('miaphysite')] монах з півночі [GetCountry('ETH').GetName]. Нам повідомляють, що він прибув до нашого [ROOT.GetCountry.GetFlavorRank], тікаючи від переслідувань за свої неортодоксальні вчення, і шукає визнання [ShowReligionAdjectiveWithNoTooltip('miaphysite')] лідерів у нашій столиці."
  flavor_eth.201.descB: "[ewostatewos.GetName] був [ShowReligionAdjective('miaphysite')] монахом з півночі [GetCountry('ETH').GetName]. Нам повідомляють, що він прибув до нашого [ROOT.GetCountry.GetFlavorRank], тікаючи від переслідувань за свої неортодоксальні вчення, і мав намір шукати визнання [ShowReligionAdjectiveWithNoTooltip('miaphysite')] лідерів у нашій столиці.\n\nАле удача була не на його боці, і нам повідомляють, що він загинув по дорозі сюди."
  flavor_eth.201.a: "Він може бути корисним, нехай буде."
  flavor_eth.201.b: "Нам не потрібні більше порушників спокою. Вигнати його."
  flavor_eth.201.c: "Його теологія підкріплена Старим Заповітом. Вислухаймо його."
  flavor_eth.201.d: "Чудово, нам не доведеться мати з ним справу зараз."
  flavor_eth.202.title: "Сім учнів [ewostatewos.GetNameWithNoTooltip]"
  flavor_eth.202.desc: "Послідовники [ewostatewos.GetName], невдоволеного монаха, майже зникли під час відсутності свого вчителя, і ми майже забули про нього, настільки, що їхнє повернення залишилося для нас непоміченим.\n\nТим часом вони відбудували його старий монастир і почали будувати власні. Ця нова чернеча фракція почала називати себе #italic Домом [ewostatewos.GetNameWithNoTooltip]#!"
  house_of_ewostatewos_name: "Дім Евостатевоса"
  flavor_eth.202.a: "Відправити священнослужителя [anorewos.GetName], щоб поговорити з ними."
  flavor_eth.202.b: "Вони посміли не підкоритися [ROOT.GetCountry.GetGovernment.GetRulerTitle]! Жодних других шансів!"
  flavor_eth.202.c: "Нам все ще байдуже."
  flavor_eth.203.title: "Розкол поглиблюється"
  flavor_eth.203.desc: "Катастрофа! Відправлення [anorewos.GetName] для обговорення напруженої ситуації з [ewostatewos.GetName] було жахливою помилкою. Нам повідомили, що переговори швидко переросли в гарячу теологічну суперечку, яка межувала з конфронтацією з монахами. На щастя, наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] були вигнані з монастиря, перш ніж ситуація загострилася ще більше."
  flavor_eth.203.a: "[anorewos.GetShortNameWithNoTooltip] розділить наш [ROOT.GetCountry.GetFlavorRank] своїми релігійними суперечками."
  flavor_eth.203.a.tt: "[anorewos.GetNameWithNoTooltip] буде публічно покараний"
  flavor_eth.203.a.tt2: "Вплив монаха поширюється лише на землі навколо їхніх монастирів."
  flavor_eth.203.b: "Ті, хто кривдить моїх представників, кривдять мене. Спалити його дотла!"
  flavor_eth.203.b.tt: "[ewostatewos.GetNameWithNoTooltip] стає мучеником, а його ідеї виходять за межі монастирів"
  flavor_eth.204.title: "Дім [ewostatewos.GetNameWithNoTooltip]"
  flavor_eth.204.desc: "Вплив монастирів, що належать до #italic Дому [ewostatewos.GetNameWithNoTooltip]#!, продовжував зростати, оскільки їхні вчення краще резонують із традиціями [ROOT.GetCountry.GetAdjective] народу, ніж доктрина, нав'язана Патріархатом [ShowLocationName('alexandria')], а їхня робота з освіти та благодійності для тих, хто перебуває на маргінесі суспільства, створила їм позитивний імідж у свідомості людей.\n\nНаш Абун звертає нашу увагу на нежиттєздатність ситуації: якщо ми дозволимо цій єресі продовжувати зростати, ми можемо бути відлучені Патріархом, або, в найгіршому випадку, [ROOT.GetCountry.GetFlavorRank] може бути занурений у громадянську війну."
  flavor_eth.204.a: "Покладімо цьому край. Спаліть монастирі."
  flavor_eth.204.a.tt: "Послідовники #italic Дому [ewostatewos.GetNameWithNoTooltip]#! повстають у гніві"
  flavor_eth.204.b: "Громадянської війни не буде, ми з нашим народом."
  flavor_eth.210.title: "Стела нового [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_eth.210.desc: "Протягом тисячі років стели старих царів [ShowLocationName('axum')] спостерігали за [ROOT.GetCountry.GetFlavorRank] і служили чудовим доказом могутності тих, хто похований під ними.\n\nНаш народ дивиться на ці стели з благоговінням і повагою. Збудувавши нову, що вшановує [ROOT.GetCountry.GetGovernment.GetRuler.GetName], ми можемо пов'язати цей престиж минулого з нашим новим правителем."
  flavor_eth.210.a: "Це язичницька традиція, добре, що ми відмовилися від неї."
  flavor_eth.210.b: "Ми збудуємо ще величніший пам'ятник!"
  flavor_eth.220.title: "Церква Святого Георгія в [target_location.GetNameWithNoTooltip]"
  flavor_eth.220.desc: "Кілька поколінь тому король Гебре Мескель Лалібела мав бачення міста, що носить його ім'я: бути дзеркальним відображенням Святого Міста [ShowLocationName('jerusalem')] і приваблювати паломників з усього християнського світу. Створені ним церкви є чудовими центрами віри, але ще багато роботи потрібно зробити, щоб досягти мрій Лалібели."
  flavor_eth.220.a: "Не шкодуймо витрат."
  flavor_eth.220.b: "Ми не можемо дозволити собі такі інвестиції."
  flavor_eth.230.title: "Кодифікація [ShowLawNameWithNoTooltip('double_sabbath_tenet')]"
  flavor_eth.230.desc: "Тепер, коли ми розірвали кайдани, що прив'язували нас до Патріархату [ShowLocationName('alexandria')], настав час кодифікувати догмати, які визначатимуть життя [ROOT.GetCountry.GetAdjective] народу під нашим новим Патріархатом."
  flavor_eth.230.a: "Створімо цю доктрину."
  flavor_eth.230.b: "Ні, ми збережемо наші традиції такими, якими вони є."
  flavor_eth.240.title: "Яскраве нове світло в небі"
  flavor_eth.240.desc: "Під час відвідування [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] володінь у [ShowLocationName('debra_berhan')] [ROOT.GetCountry.GetGovernment.GetRuler.GetName] став свідком появи нової зірки на небесах. Хоча зміни в небесній сфері змусили [ROOT.GetCountry.GetAdjective] народ нервувати, наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] бачить у цьому знак від Бога, що Він благоволить [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_eth.240.a: "Відсвяткуймо бенкет на честь цього доброго знамення."
  flavor_eth.240.b: "На цьому місці ми збудуємо нову церкву на Його честь."
  flavor_eth.240.c: "На цьому місці ми заснуємо нове місто."
  flavor_eth.240.d: "Тут ми збудуємо нове місто, а в ньому – церкву, гідну Його."
  can_revoke_double_sabbath_tt: "Стан Духовенства вдвічі могутніший за стан Селянства, або стан Селянства має менше 10% сили стану"
  flavor_eth_250_shared: "Запит ремісників"
  flavor_eth.250.title: "$flavor_eth_250_shared$"
  flavor_eth.250.desc: "Хоча [ROOT.GetCountry.GetCulture.GetName] культура призвела до багатьох великих проєктів у [ROOT.GetCountry.GetName], іноді потрібна допомога ззовні. [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонував, щоб ми запросили ремісників з [target_country.GetName]."
  flavor_eth.250.a: "Навіть якщо це шкодить [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] культурі, прогрес важливіший."
  flavor_eth.250.b: "Ми можемо обійтися без них."
  eth_target_country_must_accept_tt: "[target_country.GetName] має погодитися, щоб ефекти набули чинності"
  flavor_eth.251.title: "$flavor_eth_250_shared$"
  flavor_eth.251.desc: "Посли з [target_country2.GetName] прибули до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] з проханням надати ремісників для служби в їхньому [target_country2.GetFlavorRank]."
  flavor_eth.251.a: "Надішлемо їм декількох."
  flavor_eth.251.b: "Відішліть цих жебраків назад."
  flavor_eth_260_shared: "Таємниця нафту"
  flavor_eth.260.title: "$flavor_eth_260_shared$"
  flavor_eth.260.desc: "Хоча ми багато разів конфліктували з [ShowReligionGroupAdjective('muslim')] країнами, це не означає, що ми не можемо вчитися у них. Один з їхніх рідкісних винаходів, нафт, зацікавив наш [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Тепер вони бажають найняти радників з [target_country.GetName], які навчать нас його таємниці, дозволяючи нам використовувати його в нашій армії."
  flavor_eth.260.a: "Запитаймо їх."
  flavor_eth.260.b: "Нам не потрібні їхні винаходи."
  eth_no_offer_tt: "Жодної пропозиції не буде надіслано до [target_country.GetName]"
  flavor_eth.261.title: "$flavor_eth_260_shared$"
  flavor_eth.261.desc: "[target_country2.GetName] запропонувала нам суму грошей, якщо ми продамо їм частину нашої зброї, зокрема нафти. Ми можемо погодитися, але це дозволить їм потенційно використовувати їх проти нас."
  flavor_eth.261.a: "Це ніколи не обернеться проти нас."
  flavor_eth.261.b: "Вони не отримають нашої зброї!"
  flavor_eth_270_title_common: "Повстання [target_character2.GetNameWithNoTooltip]"
  flavor_eth.270.title: "$flavor_eth_270_title_common$"
  flavor_eth.270.desc: "Через зростання нашого [ShowReligionGroupAdjective('muslim')] населення в [ROOT.GetCountry.GetName], губернатор цих земель, [target_character2.GetName], послідовник [ShowReligionGroupNameWithNoTooltip('muslim')], бажає повстати проти [GetCountry('ETH').GetName]. [target_character2.GetSheHe|U] готовий(а) підняти меч проти [target_character2.GetHerHis] ворогів."
  flavor_eth.270.a: "Ми звільнимося."
  flavor_eth.270.b: "Це не варте зусиль."
  flavor_eth.271.title: "$flavor_eth_270_title_common$"
  flavor_eth.271.desc: "[target_character2.GetName] з [target_country.GetName] оголосив(ла) [target_character2.GetHerHis] землі незалежними від наших, проголосивши [ShowReligionGroupName('muslim')] офіційною релігією цієї території."
  flavor_eth.271.a: "Ми ніколи не дозволимо їм звільнитися!"
  flavor_eth.271.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"