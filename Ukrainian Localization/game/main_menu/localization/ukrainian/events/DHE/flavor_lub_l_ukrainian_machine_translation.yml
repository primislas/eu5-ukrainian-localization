l_english:
  flavor_lub.1.title: "Брама [target_location.GetNameWithNoTooltip]"
  flavor_lub.1.desc: "Найкращі інженери з усього нашого володіння зібралися в [target_location.GetName], щоб просунути свій план нової брами для нашого улюбленого [target_location.GetRank.GetNameWithNoTooltip]. Згідно з їхніми планами, вони бажають звести [ShowBuildingTypeName('hsa_burgtor')], що слугуватиме головною брамою нашої столиці.\n\nВодночас споруда буде прикрашена чудовою архітектурою. Її стратегічне розташування вздовж наших існуючих укріплень легко дозволить охоронцям контролювати та регулювати рух, що в'їжджає та виїжджає."
  flavor_lub.1.a: "Ми профінансуємо це!"
  flavor_lub.1.b: "Можливо, [target_country.GetNameWithNoTooltip] може заплатити за її будівництво?"
  flavor_lub.1.c: "Нам байдуже до таких витрат."
  flavor_lub.2.title: "Фінансова допомога для [target_country2.GetNameWithNoTooltip]"
  flavor_lub.2.desc: "Посланці з муніципального суду [target_country2.GetName] нещодавно звернулися до наших купців. Вони пропонують тіснішу співпрацю між нашими дипломатами через наше фінансування їхнього останнього інженерного проєкту. Вони бажають звести [ShowBuildingTypeName('hsa_burgtor')], що може слугувати головною брамою [target_location.GetRank.GetNameWithNoTooltip], і все, що вони просять, це скромний внесок..."
  flavor_lub.2.a: "Дуже добре..."
  flavor_lub.2.b: "Вони тримають нас за дурнів?"
  opinion_financed_burgtor_modifier: "Профінансовано $hsa_burgtor$"
  opinion_refused_to_finance_burgtor_modifier: "Відмовлено у фінансуванні $hsa_burgtor$"
  flavor_lub.3.title: "Відповідь [target_country.GetNameWithNoTooltip]"
  flavor_lub.3.desc: "Прибув посланець від асоціації [target_country.GetName], несучи запечатаний лист із відповіддю купців щодо нашого питання фінансування. Їхнє повідомлення малює картину продовження співпраці між нашими народами у сфері узгодження інтересів. Листування завершується рішенням Ліги з цього питання..."
  flavor_lub.3.a: "...вони профінансують це!"
  flavor_lub.3.b: "...вони вирішили не фінансувати це!"