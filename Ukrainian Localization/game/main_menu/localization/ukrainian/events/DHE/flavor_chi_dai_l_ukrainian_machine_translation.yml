l_english:
  DAI_NGU: "Đại Нгу"
  DAI_NGU_ADJ: "$DAI_NGU$"
  flavor_chi_dai.1.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi_dai.1.desc: "Завдяки ретельному політичному маневруванню та глибоким зв'язкам, певна особа на ім'я [target_character.GetName] зуміла прокласти [target_character.GetHerHis] шлях до [ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetName]. [target_character.GetHeShe|U] вважається здібним полководцем, але [target_character.GetHerHis] амбіції – це те, чого варто остерігатися. Багато хто вірить, що [target_character.GetSheHe] може стати загрозою для [ROOT.GetCountry.GetAdjectiveWithNoTooltip] стабільності. Сподіваймося, це лише плітки."
  flavor_chi_dai.ho_quy_ly_historical_info: "На зламі XV століття відбулося падіння $tran_dynasty$ від рук одного з їхніх міністрів, $ho_dynasty$ $name_quy$ $name_ly$. За переворотом послідувала війна з $MNG$, де китайці змогли встановити правління у В'єтнамі під провінцією $jiaozhi_province$. Ця окупація тривала до 1428 року, коли китайська армія була змушена відступити після років боротьби з в'єтнамськими повстаннями."
  flavor_chi_dai.1.a: "Цікаво."
  flavor_chi_dai.2.title: "Несподіваний переворот"
  flavor_chi_dai.2.desc: "Один з наших амбітних придворних, [target_character.GetName], здійснив безпрецедентний переворот проти [ousted_character.GetName] та Дому [ousted_character.GetDynasty.GetName]. Якщо наша інформація вірна, [ousted_character.GetShortNameWithNoTooltip] був запрошений [target_character.GetShortNameWithNoTooltip] для огляду запропонованого місця нової столиці. Саме тоді на [ousted_character.GetSheHe] раптово напав бунтівник, ледве уникнувши ув'язнення.\n\nЗайнявши трон, [target_character.GetNameWithNoTooltip] бажає реформувати [ROOT.GetCountry.GetFlavorRank] і вирішив перейменувати державу на $DAI_NGU$. Весь цей час полювання на [ousted_character.GetNameWithNoTooltip] триває."
  flavor_chi_dai.2.a: "[target_character.GetNameWithNoTooltip] реформує цю країну!"
  flavor_chi_dai.2.b: "Ми повинні забезпечити [ousted_character.GetNameWithNoTooltip] втечу від полону."
  flavor_chi_dai.3.title: "Переворот у [target_country.GetNameWithNoTooltip]"
  flavor_chi_dai.3.desc: "Один з наших данників, [target_country.GetLongName], нещодавно зазнав раптового та катастрофічного перевороту. Один з їхніх придворних, [target_character.GetName], захопив [target_country.GetFlavorRank] і заснував нову династію. Ми були досить неуважні до цього факту, доки один з претендентів на трон з колишньої династії, [claimant_character.GetName], не прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], шукаючи підтримки для відновлення старого порядку."
  flavor_chi_dai.3.a: "Вимагати відновлення."
  flavor_chi_dai.3.b: "Це не наша проблема."
  flavor_chi_dai.4.title: "Вимога [china_side.GetAdjectiveWithNoTooltip] Сторони"
  flavor_chi_dai.4.desc: "[china_side.GetLongName] прийняли одного з князів [ShowDynastyName('tran_dynasty')], [claimant_character.GetName], який нагодував їх брехнею та обманом про так зване узурпацію трону [target_character.GetName]. Обмануті, вони згодом вирішили вимагати від нас, щоб [claimant_character.GetShortNameWithNoTooltip] був повернутий на трон, скасувавши прогрес, якого ми досягли у реформуванні [ROOT.GetCountry.GetName].\n\nВважаючи нашу відповідь позитивною, вони вирушили до [ROOT.GetCountry.GetNameWithNoTooltip]. Наразі [claimant_character.GetNameWithNoTooltip] супроводжується контингентом [china_side.GetAdjectiveWithNoTooltip] військ до [ROOT.GetCountry.GetCapital.GetName]."
  flavor_chi_dai.4.a: "Влаштувати засідку на посланця."
  flavor_chi_dai.4.b: "Зважити на їхні вимоги."
  flavor_chi_dai.5.title: "Неповага до [target_country.GetNameWithNoTooltip]"
  flavor_chi_dai.5.desc: "Ми отримали тривожні новини з [target_country.GetName]. Наші вимоги щодо відновлення династії [ShowDynastyName('tran_dynasty')] були не лише проігноровані, але й наші посланці потрапили в засідку під час супроводу [claimant_character.GetName]. Таку неповагу до [ROOT.GetCountry.GetName] не можна терпіти."
  flavor_chi_dai.5.a: "Якщо ми їх не знищимо, для чого тоді армії?"
  flavor_chi_dai.5.b: "Поки вони платять данину, ми не втручатимемося."
  jiaozhi_province: "Цзяочжи"
  flavor_chi_dai.6.title: "Провінція $jiaozhi_province$"
  flavor_chi_dai.6.desc: "Один з наших генералів з кампанії в [ShowAreaName('red_river_delta_area')], [target_character.GetName], повідомляє про жорстокий опір, який зустріли з боку місцевого [ShowCultureName('vietnamese_culture')] населення. Щоб впоратися з цими заворушеннями, [target_character.GetSheHe] звернувся до історичних записів і виявив, що В'єтнам колись був під владою [ShowCultureGroupName('chinese_group')] династій. [target_character.GetSheHe|U] тепер стверджує, що [ShowAreaNameWithNoTooltip('red_river_delta_area')] має бути постійно інтегрована в [ROOT.GetCountry.GetName] як провінція $jiaozhi_province$."
  flavor_chi_dai.6.a: "Прагнімо ж інтегрувати ці території."
  flavor_chi_dai.6.b: "Минуле не слугуватиме прецедентом."
  flavor_chi_dai.7.title: "Доля $jiaozhi_province$"
  flavor_chi_dai.7.desc: "Опір у $jiaozhi_province$ значний, що сильно гнівить [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName]. Для подальшої інтеграції провінції міністри бажають ухвалити політику, яка сприятиме асиміляції та синізації [ShowCultureName('vietnamese_culture')] народу, а також залучить багато талановитих робітників до столиці."
  flavor_chi_dai.7.a: "Ухвалити політику."
  flavor_chi_dai.7.b: "Їх буде інтегровано з часом."
  flavor_chi_dai.8.title: "Повстання [target_character.GetNameWithNoTooltip]"
  flavor_chi_dai.8.desc: "Після багатьох років спроб інтегрувати [ShowCultureName('vietnamese_culture')] культуру ми мусимо визнати, що ці зусилля не були такими успішними, як ми сподівалися. Нещодавно спалахнуло чергове повстання, цього разу під проводом вискочки на ім'я [target_character.GetName]. На жаль, повстання досягло великого успіху, розгромивши наші місцеві гарнізони. Можливо, нам варто покласти край цій окупації."
  flavor_chi_dai.8.a: "Утримувати $jiaozhi_province$ — марна справа."
  flavor_chi_dai.8.b: "Розгромити цього вискочку!"
  flavor_chi_dai.9.title: "POSTEDIT_Транські лоялістські повстання"
  flavor_chi_dai.9.desc: "Наше правління в провінції $jiaozhi_province$ не цінується місцевим населенням, яке віддавало перевагу самоврядуванню під владою династії [ShowDynastyName('tran_dynasty')]. Багато з них тому згуртувалися під прапором [target_character.GetName], який обіцяє їм повернення до традиційного $DAI_ADJ$ правління."
  flavor_chi_dai.9.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_chi_dai.10.title: "Інтервенція в [target_country.GetNameWithNoTooltip]"
  flavor_chi_dai.10.desc: "[target_country.GetName] нещодавно став жертвою перевороту, який посварив їх з їхніми [china_side.GetAdjective] сюзеренами. Наслідував дипломатичний конфлікт, і дві країни тепер опинилися у стані війни, [target_war.GetName]. Оскільки [target_country.GetLongNameWithNoTooltip] загрожують [china_side.GetAdjectiveWithNoTooltip] сили, це може бути наш шанс повернути [ShowProvinceDefinitionName('hue_province')]."
  flavor_chi_dai.10.a: "На війну!"
  flavor_chi_dai.10.b: "У нас і так достатньо проблем."
  flavor_chi_dai.11.title: "Зламати [ShowCultureNameWithNoTooltip('vietnamese_culture')] Волю"
  flavor_chi_dai.11.desc: "До наших військ у [ShowAreaName('red_river_delta_area')] надійшов указ. [target_character.GetName] наказує нашим солдатам шукати [ShowCultureName('vietnamese_culture')] писання, щоб спалити їх, за єдиним винятком [ShowReligionGroupAdjective('buddhist')] та даоських книг. Попри це, багато солдатів все ще вагаються і схильні читати їх, перш ніж врешті-решт дозволити полум'ю поглинути тексти."
  flavor_chi_dai.11.a: "Ми повинні підвищити дисципліну!"
  flavor_chi_dai.11.b: "Скасувати указ!"