l_english:
  flavor_hun.100.title: "Сейм [GetCurrentYear] року"
  flavor_hun.100.desc: "Коли країна була на межі розпаду після катастрофічної битви під Варною, смерті короля Владислава та поразки від османів, воєвода Янош Гуняді скликав сейм у спробі знову об'єднати країну. Розкол був майже некерованим, і анархія була близько."
  flavor_hun.100.a: "Обрати Яноша Гуняді регентом"
  flavor_hun.100.b: "Залишити поточну раду"
  flavor_hun.100.c: "Янош Гуняді буде нашим новим королем."
  flavor_hun.110.title: "Реформи Матяша Корвіна"
  flavor_hun.110.desc: "Під час свого правління Матяш Корвін значно змінив угорську державу та суспільство. Йому вдалося різко збільшити королівські доходи, змусивши бідніших членів сейму, які не могли регулярно відвідувати його, погодитися надати податки на кілька років наперед, перехитривши високу знать, встановивши регулярну, функціональну систему збору податків та доручивши управління скарбницею фахівцям з окремими функціями."
  flavor_hun.110.a: "Зосередитися на адміністративних реформах"
  flavor_hun.110.b: "Зосередитися на соціальних реформах"
  flavor_hun.120.title: "Академія Істрополітана"
  flavor_hun.120.desc: "Академія Істрополітана в Пресбурзі була першим університетом Угорщини. Її заснував Папа Павло II на прохання короля Матяша Корвіна. В ній викладали багато відомих лекторів з Австрії та Італії, включаючи Галеотто Марціо та Йоганна Вітеза. На жаль, університет закрився після смерті Матяша Корвіна."
  flavor_hun.120.a: "Це принесе нам користь..."
  flavor_hun.130.title: "Друкарня в Буді"
  flavor_hun.130.desc: "1473 року в Угорщині було надруковано першу книгу, «Хроніка Угорщини», що розповідала історію Угорщини від найдавніших часів до коронації короля Матяша. Її надрукував Андраш Гесс у своїй новій друкарні."
  flavor_hun.130.a: "Це чудово!"
  flavor_hun.140.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Вампір"
  flavor_hun.140.desc: "Легенди про вампірів присутні в нашій країні протягом поколінь. Нещодавно в [ROOT.GetCountry.GetGovernment.GetCourtTitle] поширилися тривожні чутки щодо [target_character.GetName]. Очевидно, [target_character.GetSheHe] повністю захопився легендами про таких жахливих істот, навіть до того, що стверджує, що є однією з них. [target_character.GetSheHe|U] звинувачують у вбивстві та катуванні сотень людей, і, згідно з найекстремальнішими чутками, [target_character.GetSheHe] купається в крові незайманих, щоб зберегти [target_character.GetHerHis] молодість."
  flavor_hun.140.historical_info: "Ержебет Баторі була племінницею дворянина Іштвана Баторі, але її історія була жорстокою та кривавою. Нібито, вона намагалася жити як вампір і зарізала понад 600 незайманих у спробі оновити свою молодість, купаючись у їхній крові. Її судили та ув'язнили до її смерті в 1614 році. Однак, досі залишається відкритим питання, наскільки багато чуток та звинувачень були правдивими, а наскільки вони ґрунтувалися на простих політичних мотивах."
  flavor_hun.140.a: "Негайно зупинити [target_character.GetHerHis] тиранію!"
  flavor_hun.140.b: "Це лише селянські чутки"
  flavor_hun.150.title: "Наступ [target_country.GetLongNameWithNoTooltip]"
  flavor_hun.150.desc: "Наша нещодавня поразка від [target_country.GetLongName] викликала низку реакцій. На заході Габсбурги почали розглядати наш [ROOT.GetCountry.GetFlavorRank] як тягар, а [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] звертаються до [GetCountry('HAB').GetName], щоб забезпечити допомогу проти наших ворогів. Хоча [GetCountry('HAB').GetNameWithNoTooltip] не мають стільки друзів на сході, ті регіони, схоже, розраховують на лідерів [ShowAreaName('transylvania_area')]. Прикро, що [ROOT.GetCountry.GetLongNameWithNoTooltip] має бути настільки розділеною, коли наші вороги зараз такі сильні."
  flavor_hun.150.a: "Ми повинні об'єднатися проти ворогів Християнства!"
  flavor_hun.160.title: "Угорське селянське повстання"
  flavor_hun.160.desc: "План зібрати армію для майбутнього хрестового походу проти Османської імперії мав дуже погані наслідки. Завдання з набору та навчання військ було доручено Дьордю Дожі, досвідченому ветерану війн проти турків, але також найманцю зі сумнівною лояльністю. Дожа приступив до навчання та оснащення величезної армії, залучаючи найбідніші та найбільш позбавлені прав верстви угорського суспільства.\nЗі зброєю в руках та невеликою підготовкою ці селяни, студенти та сільські священики виявилися набагато більш охочими повстати проти своїх панів, ніж йти проти турків, і одне з найбільших селянських повстань в історії нашого королівства зараз у повному розпалі. Маєтки горять і грабуються, священнослужителів саджають на палі, а урядовців катують до смерті."
  flavor_hun.160.a: "Бунтівна наволоч!"
  flavor_hun.170.title: "Тамаш Бакоч"
  flavor_hun.170.desc: "Як єпископ, кардинал і член Королівської ради, динамічна особистість Тамаша Бакоча добре послужила нашому королівству. Після ґрунтовної освіти та кар'єри Бакоч став домінувати в угорській зовнішній політиці, а також у внутрішніх справах.\nОдним із наріжних каменів зовнішньої політики Бакоча є те, що ми повинні розвивати тісні зв'язки з австрійськими правителями у Відні, лише вони можуть допомогти нам проти турків."
  flavor_hun.170.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  hun_bakocz_foreign_policy: "Прогабсбурзька політика Тамаша Бакоча"
  flavor_hun.180.title: "Католики в [GetCountry('BOH').GetNameWithNoTooltip] шукають нашої допомоги"
  flavor_hun.180.desc: "Налякані відвертим фаворитизмом [GetCountry('BOH').GetGovernment.GetRuler.GetName] щодо єретичного [ShowReligionAdjective('hussite')] населення в [GetCountry('BOH').GetLongName], низка вірних [ShowReligionAdjective('catholic')] шляхетних родин повстала. З такими іменами, як фон Розенберг, Шванберг, Штернберг або Газенбург, повстанці не відчувають браку в сильному керівництві. Але, хоч це й може бути приємно Богові, досить невизначено, чи зможуть вони самостійно протистояти силам свого [GetCountry('BOH').GetGovernment.GetRulerTitle].\n\nВідчайдушно потребуючи допомоги, повстанці звернулися до [ROOT.GetCountry.GetGovernment.GetRuler.GetName] за порятунком і захистом. Тепер вони пропонують [GetCountry('BOH').GetFlavorRank] [ShowReligionAdjectiveWithNoTooltip('catholic')] [GetCountry('BOH').GetNameWithNoTooltip] нашому [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_hun.180.a: "Deus Vult!"
  hun_crowned_by_rebels: "Прийнята корона від повстанців"
  flavor_hun.180.b: "Ми ніколи не змогли б виступити проти [GetCountry('BOH').GetNameWithNoTooltip]..."
  hun_refused_to_help_rebels: "Відмовилися допомогти богемським католикам"
  flavor_hun.181.title: "Вибори в [ShowLocationNameWithNoTooltip('olomouc')]"
  flavor_hun.181.desc: "Відчайдушно потребуючи допомоги, наші [ShowReligionAdjective('catholic')] повстанці звернулися до [GetCountry('HUN').GetGovernment.GetRulerTitle] [GetCountry('HUN').GetName] за захистом. [ShowReligionAdjectiveWithNoTooltip('catholic')] стани тепер обрали [GetCountry('HUN').GetGovernment.GetRuler.GetName] своїм [GetCountry('BOH').GetGovernment.GetRulerTitle] і з нетерпінням чекають прибуття [GetCountry('HUN').GetAdjectiveWithNoTooltip] армій.\n\nОднак стани основних земель нашого [ROOT.GetCountry.GetFlavorRank] залишаються вірними [ROOT.GetCountry.GetGovernment.GetRuler.GetName] і засуджують дії [ShowReligionAdjectiveWithNoTooltip('catholic')] загарбників."
  flavor_hun.181.a: "Державна зрада!"
  flavor_hun.190.title: "Бандитизм у Верхній Угорщині"
  flavor_hun.190.desc: "Після Хрестового походу на Варну, гуситських війн та внутрішніх чвар Угорщини у 1430-х та 1440-х роках, велика кількість висококваліфікованих найманців опинилася без діла та безробітною. Не маючи змоги заробити на життя іншим способом, ці люди вирішили здобувати статки бандитизмом та грабунками. У деяких випадках місцеві дворяни приєдналися до бунтівників і, схоже, сподіваються використати цих солдатів для створення міцнішої владної бази для себе.\nНемає сумніву, що повстання буде подолано нашими місцевими силами з часом, але це може коштувати значних втрат для місцевої економіки."
  flavor_hun.190.a: "Ми повинні розгромити цих бандитів!"
  flavor_hun.190.b: "Залишити це на розсуд місцевих лордів."
  flavor_hun_show_rebels_tt: "Приблизно [ROOT.GetVariable('display_num_rebelling_pops_variable').GetValue|V0]#Y K#! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetVariable('display_num_locations_variable').GetValue|V0] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_location_slovakia_loses_prosperity_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')] втратить [ShowNamedValue('prosperity_extreme_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hun.200.title: "Армія [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_hun.200.desc: "Маючи сильних сусідів з усіх боків, [ROOT.GetCountry.GetLongName] часто потребувала сильної армії. У минулих війнах наші дворяни забезпечували більшість наших збройних сил найманськими загонами, найнятими для доповнення їхніх військ.\n\nСолдати за професією, ці найманці часто швидко переймають нову зброю та тактику і, як правило, мають підготовку, з якою мало хто з ополченців може конкурувати. Деякі з них служили нам роками, а в мирний час вдаються до бандитизму, щоб заробити на життя. Натхненний працями Юлія Цезаря, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] почав розважати ідею постійної найманської сили. Забезпечення постійного джерела доходу для солдатів, безсумнівно, утримало б їх від бандитизму і могло б дати нам силу неперевершеної міцності. Принаймні, якщо наші фінанси зможуть це підтримати..."
  flavor_hun.200.a: "Наша армія буде елітною силою."
  flavor_hun.210.title: "Ключ Угорщини"
  flavor_hun.210.desc: "Розташування [belgrade_localized.GetName] на злитті Дунаю та його притоки, Сави, робить його ідеальною оборонною позицією та першочерговою метою для будь-кого, хто вторгається в нашу країну з півдня. З цієї причини попередні королі придбали Банат [belgrade_localized.GetName] у сербського деспота Джураджа Бранковича. Сама фортеця, хоч і велична, гостро потребує ремонту та модернізації.\nНа жаль, угорська шляхта наразі не бажає робити внески на утримання фортеці в [belgrade_localized.GetName] або будь-яких інших прикордонних фортів нашого королівства. Вони не бачать [GetCountry('TUR').GetAdjective] загрози і кажуть, що це послабить їх і спонукає корону порушувати їхні права. Якщо ми хочемо, щоб наша оборонна лінія належним чином підтримувалася, [ROOT.GetCountry.GetGovernment.GetRulerTitle] доведеться платити за це безпосередньо з державної скарбниці."
  flavor_hun.210.a: "Ми мусимо спрямувати більше державних коштів."
  flavor_hun.210.b: "Наявних укріплень буде достатньо."
  flavor_hun.220.title: "Падіння Сербії"
  flavor_hun.220.desc: "З падінням Сербії велика кількість сербських біженців почала прибувати на наші кордони з півдня. Вони шукають нового дому в наших межах, і багато хто почав осідати в районі [belgrade_localized.GetName], щоб розпочати нове життя серед своїх співвітчизників, які вже користуються нашим захистом."
  flavor_hun.220.a: "Місця вистачить усім..."
  flavor_hun.230.title: "Синод [debrecen_province.GetName]"
  flavor_hun.230.desc: "Відколи кальвіністські мислителі почали поширювати свої релігійні ідеї, вони мали сильних прихильників у нашому королівстві. Кальвіністські ідеї, такі як приречення, знайшли відгук як серед шляхти, так і серед простолюдинів, а реформатські школи та коледжі почали з'являтися в багатьох наших провінціях. З обережним прийняттям Другої Гельветичної сповіді, [ROOT.GetCountry.GetAdjective] реформатські церкви також почали об'єднуватися з іншими реформатськими церквами нашого часу.\nКатолицьке духовенство, однак, завжди було сильними прихильниками королівської влади і дивиться на ці події з недовірою. Хоча сильна, Реформатська Церква залишається молодою та вразливою. Чи хочемо ми дати Реформатській Церкві простір для зростання, чи повинні ми спробувати викорінити її, поки не пізно?"
  flavor_hun.230.a: "Час запросити єзуїтів."
  hun_invited_jesuits: "Запрошені єзуїти"
  flavor_hun.230.b: "Настав час для реформ!"
  flavor_hun.240.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.240.desc: "Родина Надашді не є однією з наших найстаріших чи найвпливовіших шляхетних родин, але їй не бракує амбіцій. Завершивши освіту та гран-тур за кордоном, молодий [target_character.GetName] виявляє обіцянки як державний діяч, дипломат і полководець. За короткий час він зробив кар'єру, балансуючи численні вимоги угорських станів, зміцнюючи економіку, а також дбаючи про оборону нашої країни та пошук життєздатних союзників проти наших численних ворогів."
  flavor_hun.240.a: "Нам потрібен здібний адміністратор."
  flavor_hun.250.title: "Statuta Valachorum"
  flavor_hun.250.desc: "Наступ Османської імперії повністю змінив політичну географію Південно-Східної Європи, і багато слов'ян та румунів залишають свої старі домівки, щоб переселитися в прикордонні райони нашого [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName]. Прагнучи повернути свої старі домівки, ці люди, ймовірно, можуть стати лютими солдатами та партизанами. Якби ми гарантували їхні релігійні та культурні свободи, прикордонна зона може бути дещо некерованою, але населення, об'єднане у своїй ненависті до османів, могло б нам дуже добре послужити."
  flavor_hun.250.a: "Гарантуймо їхні права!"
  flavor_hun.250.b: "Ні, закон і порядок мають бути дотримані."
  flavor_hun.260.title: "Румунське повстання"
  flavor_hun.260.desc: "Румуни, або влахи, були частиною наших земель у Трансільванії протягом століть, але мали мало представництва в Трансільванських станах. Регіон завжди був дуже змішаним, з секеями, трансільванськими саксами та влахами, що співіснували в делікатному балансі сил.\nОднак нещодавно влахи почали вимагати прав та представництва. Деякі навіть взялися за зброю проти [ROOT.GetCountry.GetAdjective] влади."
  flavor_hun.260.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_hun.270.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.270.desc: "Королівство Хорватія було об'єднане з Угорщиною з 1102 року, і протягом цього часу місцева влада монархії була надана банам, щоб очолювати хорватську армію та парламент. Нещодавно призначений бан Хорватії, [target_character.GetName], виявився надзвичайно талановитим слугою корони та здібним полководцем. За його заслуги його родина була зроблена спадковими графами Вараждина, а сам Ердьоді був привітаний Папою після його перемоги над нашими ворогами."
  flavor_hun.270.a: "Держава потребує його послуг."
  flavor_hun.280.title: "Матіас Девай"
  flavor_hun.280.desc: "Минуло вже десятиліття з того часу, як Лютер прибив свої 95 тез до дверей церкви у Віттенберзі, але ідеї Реформації все ще поширюються континентом.\nНавчаючись у Віттенберзі як студент у Лютера, Матіас Девай переконаний, що його завдання — поширювати слово Реформації в [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] [ROOT.GetCountry.GetName].\nНе дивно, що цьому протистоять деякі члени нашого релігійного істеблішменту. Тамаш Салахазі, єпископ Ерлау, вжив заходів, щоб обмежити протестантський вплив і ув'язнити цього потенційного Лютера Угорщини."
  flavor_hun.280.a: "Його слід негайно звільнити!"
  flavor_hun.280.a.tt: "Багато [ShowCultureName('hungarian')] [ShowReligionAdjective('catholic')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у нашій країні стануть [ShowReligionAdjective('lutheran')]"
  flavor_hun.280.b: "Як і належить."
  flavor_hun.290.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_hun.290.desc: "Отримавши ґрунтовну ренесансну освіту з раннього віку, [target_artist.GetName] може принести з собою широку мережу контактів, а також значну бібліотеку до угорського [ROOT.GetCountry.GetGovernment.GetCourtTitle]. У своїй роботі він є постійним провідником гуманізму та нових ідеалів нашої епохи.\n\nЧи найняти його?"
  flavor_hun.290.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hun.290.b: "Нам не потрібні більше шарлатанів"
  flavor_hun.300.title: "Міські ліги Верхньої Угорщини"
  flavor_hun.300.desc: "Численні та багаті копальні Верхньої Угорщини багато в чому життєво важливі для наших економічних інтересів, і тому їм часто надавали набагато більші свободи, ніж ми терпимо для інших поселень у нашій країні. Німецьке прислів'я \"Stadtluft macht frei\" (Міське повітря звільняє) справедливе як для самих міст, так і для будь-яких кріпаків, які можуть знайти свій шлях до цих громад. Оскільки дорогоцінних металів бракує по всій Європі, міські ліги тепер багатші та впевненіші в собі, ніж будь-коли.\nОднак деякі наші дворяни стверджують, що ми надаємо їм занадто багато свободи, і що ми повинні принаймні вимагати від них забезпечення оборони нашої країни."
  flavor_hun.300.a: "Вони повинні робити внески, як і всі інші!"
  STATIC_MODIFIER_NAME_hun_city_league_obligation: "Оборона міських ліг"
  STATIC_MODIFIER_DESC_hun_city_league_obligation: "Місцевий видобуток корисних копалин зараз процвітає в цій провінції, і в обмін на експлуатацію місцеві міські ліги роблять внески в оборону країни."
  flavor_hun.300.b: "Ми захистимо їхні привілеї."
  STATIC_MODIFIER_NAME_hun_city_leagues_protected: "Процвітаюча гірничодобувна промисловість"
  STATIC_MODIFIER_DESC_hun_city_leagues_protected: "Завдяки широкому спектру свобод гірничодобувні громади цієї провінції значно зростають, і місцева економіка процвітає."
  flavor_hun.310.title: "Куруци та гайдуки"
  flavor_hun.310.desc: "Після воєн та конфліктів дедалі більше людей вдаються до бандитизму та партизанської війни. Розчаровані та збіднілі, ці люди не мають жодних сумнівів, чи завдають вони шкоди нам чи нашим ворогам, пересуваючись нашим королівством. Однак вони виявляються більшою проблемою для іноземних армій у багатьох аспектах. Якщо ми заплющимо очі на їхні провини, ці іррегулярні війська можуть навіть стати сильним доповненням до наших власних армій."
  flavor_hun.310.a: "Нам потрібен кожен чоловік, якого ми можемо отримати."
  flavor_hun.310.b: "Не будемо заохочувати цих бродячих кріпаків."
  flavor_hun.320.title: "Абсолютне правління [karoly_ruler.GetNameWithNoTooltip]"
  flavor_hun.320.desc: "[karoly_ruler.GetName] твердо дотримується принципів абсолютного правління, відмовляючись скликати сейми, централізуючи адміністрацію та консолідуючи [karoly_ruler.GetHerHis] владу над [ROOT.GetCountry.GetFlavorRank]. Хоча лояльність [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] слабшає зі зростанням авторитету корони, ефективність та міць держави помітно зростають під [karoly_ruler.GetHerHis] непохитним командуванням."
  flavor_hun.320.a: "Держава належить [karoly_ruler.GetHerHis] для правління."
  flavor_hun.320.b: "Влада [ROOT.GetCountry.GetGovernment.GetRulerTitle] повинна бути розділена."
  flavor_hun.330.title: "Вишеградський конгрес [GetCurrentYear] року"
  flavor_hun.330.desc: "У 14 столітті [GetCountry('HUN').GetName] та [GetCountry('POL').GetName] підтримували складні та часом бурхливі відносини. Вишеградський конгрес 1335 року мав на меті зміцнити дипломатичні зв'язки між двома націями. Саме під час цього конгресу було досягнуто ключової угоди, яка передбачала, що якщо [casimir_scope.GetName] або [karoly_ruler.GetName] помруть без спадкоємця чоловічої статі, їхнє володіння успадкує землі іншого. Тепер настав час закликати до цього пакту та забезпечити виконання цієї історичної угоди."
  flavor_hun.330.a: "Настав час закріпити цю угоду."
  flavor_hun.330.a.at: "#Y Ми зробимо пропозицію [GetCountry('POL').GetName], що спричинить такі наслідки, якщо вони погодяться:#!"
  flavor_hun.330.a.bt: "[GetCountry('HUN').GetName] укладає пакт з [GetCountry('POL').GetName], який змінює [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] обох країн на [ShowHeirSelectionName('union_of_crowns_succession')]. Якщо [Concept('casimir_scope.GetName] або [karoly_ruler.GetName] помре без належного спадкоємця, то інший [character', 'CONCEPT_PLACEHOLDER')|e] успадкує трон померлого, утворивши [Concept('union', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_hun.330.b: "Ми повинні відмовитися від цієї справи."
  flavor_hun.331.title: "Другий Вишеградський конгрес"
  flavor_hun.331.desc: "Другий Вишеградський конгрес скликано в [GetCurrentYear], і він може стати значною дипломатичною подією. Він закріплює зобов'язання між [GetCountry('HUN').GetName] та [GetCountry('POL').GetName] дотримуватися пакту, укладеного в 1335 році. Згода [GetCountry('POL').GetNameWithNoTooltip] на цей конгрес означає взаємну обіцянку підтримувати угоду про спадкування. Таким чином, обидві нації отримують вигоду від покращення дипломатичних відносин, зміцнення дружніх зв'язків та забезпечення спільної долі, якщо виникне така потреба."
  flavor_hun.331.a: "Ми повинні дотримуватися наших угод."
  flavor_hun.331.a.tt: "Якщо ми приймемо цю угоду, відбудуться такі наслідки:"
  flavor_hun.331.b: "Наше майбутнє не повинно бути пов'язане з [GetCountry('HUN').GetAdjectiveWithNoTooltip] долею."
  flavor_hun.331.b.tt: "Якщо ми відхилимо цю угоду, відбудуться такі наслідки:"
  flavor_hun.332.title: "Вишеградський конгрес [GetCurrentYear] року"
  flavor_hun.332.desc: "Наша держава радіє згоді [GetCountry('POL').GetName] на 2-й Вишеградський конгрес, що ще більше зміцнює історичні зв'язки між двома націями. Цей дипломатичний жест демонструє зобов'язання [GetCountry('POL').GetNameWithNoTooltip] дотримуватися угоди 1335 року, приносячи відчуття єдності та довіри між нашими державами. Це багатообіцяючий знак співпраці та спільної відповідальності за майбутнє."
  flavor_hun.332.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hun.18.title: "Вишеградський конгрес [GetCurrentYear] року"
  flavor_hun.18.desc: "Ми отримали невтішні новини про відмову [GetCountry('POL').GetName] прийняти 2-й Вишеградський конгрес. Ця відмова кидає тінь на історичний союз між двома націями та викликає занепокоєння щодо майбутнього угоди про спадкування, встановленої в 1335 році. Оптимізм щодо спільної долі та взаємної підтримки слабшає, залишаючи [GetCountry('HUN').GetName] розмірковувати над наслідками рішення [GetCountry('POL').GetNameWithNoTooltip]."
  flavor_hun.18.a: "Яка ганьба..."
  agreed_second_congress_of_visegrad: "Погоджений Другий Вишеградський конгрес"
  failed_second_congress_of_visegrad: "Невдалий Другий Вишеградський конгрес"
  flavor_hun.340.title: "Золото [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hun.340.desc: "Новокоронований [ruler_scope.GetName] знаходить наше королівство на роздоріжжі. [ruler_scope.GetHerHis|U] попередник, [karoly_scope.GetName], підтримував заборону на експорт золота та срібла, резервуючи доступ до цих дорогоцінних металів для обраних.\n\nЗ [karoly_scope.GetHerHis] смертю, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] прагнуть оцінити позицію нашого нового монарха, наполягаючи на скасуванні заборони, щоб уможливити необмежену торгівлю золотом та сріблом. Хоча такий крок може вплинути на наш торговельний вплив на ринках, перспектива заспокоєння цих станів та відкриття нових торговельних можливостей надає певну привабливість їхньому проханню..."
  flavor_hun.340.a: "Заборони більше немає."
  flavor_hun.340.b: "Натомість поновити заборону."
  flavor_hun.350.title: "Золота булла 1222 року"
  flavor_hun.350.desc.a: "З коронацією [ruler_scope.GetName] як нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] відчувають можливість зміцнити свою владу. На відміну від абсолютного правителя [karoly_ruler.GetName], [ruler_scope.GetNameWithNoTooltip] ще не має влади над [ROOT.GetCountry.GetGovernment.GetCourtTitle], і тому нещасні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] виступають проти правління свого законного [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nВідродження легендарної [ShowEstatePrivilegeName('golden_bull_of_1222')] може знову забезпечити їхню лояльність до держави, але також ще більше зміцнить їхнє становище..."
  flavor_hun.350.desc.b: "З коронацією [ruler_scope.GetShortName] як нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] відчувають можливість зміцнити свою владу. Як і його попередник [karoly_ruler.GetName] до [ruler_scope.GetHimHer], [ruler_scope.GetNameWithNoTooltip] дуже важко утвердити владу над нещасними [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], які виступають проти правління свого законного [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nВідродження легендарної [ShowEstatePrivilegeName('golden_bull_of_1222')] може знову забезпечити їхню лояльність до держави, але також ще більше зміцнить їхнє становище..."
  flavor_hun.350.a: "Відновити Золоту буллу."
  flavor_hun.350.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] з часом дізнаються своє місце."
  flavor_hun.350.historical_info: "Лайош I Угорський скликав сейм у 1351 році, підтвердивши більшість положень ключової Золотої булли 1222 року, яка встановлювала права угорської знаті. Зокрема, він змінив право дворян без спадкоємців чоловічої статі вільно заповідати маєтки, запровадивши систему майорату. Він також запровадив захід, що вимагав від землевласників збирати «дев'ятину» з селян, але зберіг право селян вільно переселятися. Ці зміни сформували угорську знать і селянство, сприяючи розвитку соціального та економічного ландшафту нації."
  flavor_hun.360.title: "[ShowPolicyNameWithNoTooltip('vlach_law_policy')]"
  flavor_hun.360.desc: "[ShowCultureName('transylvanian')] населення стало невід'ємною частиною нашого [ROOT.GetCountry.GetFlavorRank]. Колись традиційна [ShowPolicyName('vlach_law_policy')], що керувала [ShowCultureNameWithNoTooltip('transylvanian')] селянами, неухильно набирала популярності в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Тепер вона є грізним суперником інших усталених правових систем у нашому королівстві. Прийняття цього кодексу як нашого офіційного закону може завоювати лояльність наших румуномовних підданих, але це ризикує розпалити гнів еліти [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_hun.360.a: "Встановити [ShowPolicyNameWithNoTooltip('vlach_law_policy')] як наш [ShowLawNameWithNoTooltip('legal_code_law')]."
  flavor_hun.360.b: "Ми не можемо ризикувати нелояльністю [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  transylvanian_independence_fighter: "Трансильванські повстанці"
  flavor_hun.360.b.tt: "Кожен [ShowCultureName('transylvanian')] [ShowReligionAdjective('orthodox')] селянин в Угорщині.\n- Втрачає 90% задоволення населення\n- Приєднується до $transylvanian_independence_fighter$"
  flavor_hun.370.title: "Орден Святого Георгія"
  flavor_hun.370.desc: "Заснований [karoly_scope.GetName] у 1326 році, Орден Святого Георгія є одним з найдавніших світських лицарських орденів Європи, що втілює ідеали середньовічного лицарства. Членство в цьому поважному ордені є знаком честі та свідченням непохитної відданості лицарству.\n\nТепер, після смерті [karoly_scope.GetNameWithNoTooltip], доля Ордену Святого Георгія перебуває в руках нового [ruler_scope.GetName]. Хоча підтримка та розширення цього ордену може ще більше підвищити престиж [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [ROOT.GetCountry.GetFlavorRank], це пов'язано зі значними фінансовими витратами. Розпуск ордену, однак, може дати шанс поповнити нашу скарбницю раніше інвестованими ресурсами."
  flavor_hun.370.a: "Орден має бути розширений!"
  flavor_hun.370.b: "Розпустити орден."
  flavor_hun.380.title: "Placitum Regium"
  flavor_hun.380.desc: "[ruler_scope.GetName] тривалий час був залучений у суперечливі відносини з [GetCountry('PAP').GetAdjective] владою. Напруга зросла після нещодавнього прийняття [ruler_scope.GetHerHis] [ShowGenericActionName('placitum_regium')], указу, що дозволяє [ruler_scope.GetHerHis] королівству самостійно оцінювати вимоги Його Святості. Це призвело до напружених відносин між [ROOT.GetCountry.GetName] та Святим Престолом, особливо викликаючи занепокоєння у [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Сьогодні духовенство зібралося, щоб благати [ruler_scope.GetNameWithNoTooltip] переглянути суперечливий #italic Placitum Regium#! та шукати шлях до примирення між двома королівствами."
  flavor_hun.380.a: "Тримати [GetCountry('PAP').GetAdjectiveWithNoTooltip] владу обмеженою."
  flavor_hun.380.b: "Скасувати Placitum Regium."
  flavor_hun.380.historical_info: "Запроваджений через #italic Placitum Regium#! (відомий у чеській та угорській історії як «Placetum Regium»), Угорщина під правлінням Сигізмунда Люксембурзького видала ключовий указ у 1404 році. Цей указ обмежував повноваження папського [ROOT.GetCountry.GetGovernment.GetCourtTitle] в угорських бенефіціях, стверджуючи королівську прерогативу наглядати за призначенням та винагородою вищих священиків. Анулювавши папське право резервації, Сигізмунд зміцнив перевагу королівської волі, відзначивши значний зсув у балансі сил між угорською короною та папською владою."
  flavor_hun.390.title: "[toldi_scope.GetNameWithNoTooltip]"
  flavor_hun.390.desc: "[toldi_scope.GetName] — перспективний воїн, чий потенціал на майбутніх полях битв ще не розкритий. [toldi_scope.GetSheHe|U] присягає на вірність [ROOT.GetCountry.GetGovernment.GetRulerTitle] та державі [ROOT.GetCountry.GetName], і буде битися пліч-о-пліч з нашими військами."
  flavor_hun.390.a: "Ми побачимо, на що здатна ця [toldi_scope.GetWomanMan] на полі бою."
  flavor_hun.390.b: "[toldi_scope.GetSheHe|U] здається чудовим доповненням до нашого кабінету."
  flavor_hun.390.historical_info: "Довгий час вважався легендарною постаттю, нещодавні історичні знахідки підтверджують існування Міклоша Толді, який служив #italic alispán#! (віконтом), #italic várnagy#! (каштеляном) і навіть #italic főispán#! (лорд-лейтенантом графств) за королів Карла Роберта та Лайоша «Великого». Він ще більше зміцнив свою спадщину як лідер найманців в італійських кампаніях Лайоша «Великого», навіть придбавши левенят у Флоренції в 1359 році. Його вчинки та хоробрість продовжують оспівуватися у фольклорі, особливо в комітатах Ноград та Біхар."
  flavor_hun.400.title: "Університет [location_scope.GetNameWithNoTooltip]"
  flavor_hun.400.desc: "Університети — це установи академічного прогресу та інтелектуального зростання. Природно, що така будівля є вигідною для будівництва, щоб збільшити технологічний прогрес держави. [location_scope.GetRank.GetName] [location_scope.GetName] є чудовим місцем для заснування університету."
  flavor_hun.400.a: "Фінансувати будівництво університету."
  flavor_hun.400.b: "Ми не можемо собі це дозволити."
  flavor_hun.400.historical_info: "Заснований у 1367 році як один із найдавніших університетів Центральної Європи, з благословення Папи Урбана V та за впливу єпископа Вільяма фон Коппенбаха, він був перш за все створений для викладання церковного права та латини, позбавляючи угорських студентів необхідності навчатися за кордоном. Хоча й недовговічний, університет зробив значний внесок під керівництвом таких постатей, як Гальвано ді Болонья та єпископ Балінт Алшані, зрештою занепавши наприкінці XIV століття. Сучасний Університет Печа продовжує його інтелектуальну спадщину, а частина його середньовічної історії вшановується на спеціальній виставці історії університету."
  flavor_hun.410.title: "Орден Дракона"
  flavor_hun.410.desc: "[turkish_scope.GetAdjective] [turkish_scope.GetFlavorRank] становить зростаючу загрозу не лише для Балкан, а й для всього Християнського світу. Хоча існуюча [ShowPolicyName('order_of_saint_george_policy')] об'єднала багатьох шляхетних воїнів, її акцент залишається на лицарстві, а не на прямому протистоянні #italic Бичу Божому#!.\n\n[ruler_scope.GetName] скликав членів ордену та інших національних лідерів для обговорення заснування [ShowPolicyName('order_of_the_dragon_policy')]: нового #Y Лицарського Ордену#!, присвяченого підриву [turkish_scope.GetNameWithNoTooltip] та захисту Християнського світу в ці скрутні часи."
  flavor_hun.410.a: "Настав час для [ShowPolicyNameWithNoTooltip('order_of_the_dragon_policy')]."
  flavor_hun.410.a.tt: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що розмовляє #Y $romanian_language$#!, #Y $hungarian_language$#!, #Y $serbo_croatian_language$#! або #Y $albanian_language$#!, зможе приєднатися до [ShowPolicyName('order_of_the_dragon_policy')]"
  flavor_hun.410.b: "Ми можемо самостійно протистояти [turkish_scope.GetAdjectiveWithNoTooltip] загрозі!"
  flavor_hun.410.historical_info: "На тлі політичних заворушень та загроз як від іноземних, так і від внутрішніх супротивників, Сигізмунд Люксембурзький, король Угорщини, заснував Орден Дракона 12 грудня 1408 року разом зі своєю королевою, Барбарою фон Циллі. Спочатку задуманий як товариство, він прийняв Святого Георгія як свого покровителя та черпав натхнення з Ордену Святого Георгія, заснованого королем Угорщини Карлом I. Завданням ордену було захищати угорську монархію, Католицьку Церкву та саме Християнство, він об'єднав шляхту у спільній справі та став емблемою боротьби проти «підступного Ворога» — насамперед османських турків. Через свої символи уробороса та червоного хреста орден створив унікальну ідентичність, зобов'язуючи членів присягою на вірність королю, королеві та їхнім спадкоємцям, пропонуючи королівський захист, почесті та привілеї в обмін на їхню непохитну службу."
  flavor_hun.411.title: "$flavor_hun.410.title$"
  flavor_hun.411.desc: "[ruler_scope.GetName] з [founder_of_order_of_the_dragon.GetLongName] запросив [our_ruler.GetName] на велике обговорення: заснування [ShowPolicyName('order_of_the_dragon_policy')]. Його передбачувана мета — створити мережу членів ордену, які підтримуватимуть один одного проти зростаючої загрози [turkish_scope.GetAdjective] турків."
  flavor_hun.411.a: "Орден забезпечить наше майбутнє."
  flavor_hun.411.b: "Ми вже самі можемо впоратися з [turkish_scope.GetNameWithNoTooltip]."
  flavor_hun.420.title: "[tournament_victor.GetNameWithNoTooltip] перемагає в лицарському турнірі!"
  flavor_hun.420.title.fallback: "Кінець лицарського турніру!"
  flavor_hun.420.desc: "Нарешті, фінальний лицарський поєдинок між двома запеклими претендентами: [first_tournament_participant.GetName] та [second_tournament_participant.GetName] борються за славу та визнання! Проте, Доля може благословити лише одного з них.\n\nПісля кількох поєдинків та показових боїв, остаточний переможець визначений! Слава [tournament_victor.GetNameWithNoTooltip], новому #italic Лицарю [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]#!!"
  flavor_hun.420.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hun.420.a_tt: "Наш улюблений боєць переміг"
  flavor_hun.420.b: "Це прикрі новини..."
  flavor_hun.420.b_tt: "Наш улюблений боєць програв"
  flavor_hun.420.c: "Як весело!"
  flavor_hun.420.c.tt: "Невідповідний матч"
  flavor_hun.421.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Лицарський Турнір"
  flavor_hun.421.desc: "Хоча популярність лицарських турнірів у Європі зменшується, [ruler_scope.GetName] залишається відданим підтримці лицарської традиції. [ruler_scope.GetSheHe|U] розглядає турнір як маяк честі і навіть запровадив нові відзнаки для переможців.\n\nДотримуючись цієї традиції, [ROOT.GetCountry.GetGovernment.GetRulerTitle] цього року видав указ про проведення ще одного грандіозного турніру, надаючи платформу для найкращих серед наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] змагатися за [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHerFormal|U] прихильність. Два претенденти — [first_tournament_participant.GetName] та [second_tournament_participant.GetName] — зокрема, показали велику майстерність на турнірі. Їхній фінальний поєдинок наближається, і лише один з них може бути обраний [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_hun.421.a: "Віддати перевагу [first_tournament_participant.GetNameWithNoTooltip]."
  flavor_hun.421.a.tt: "Ми підтримаємо [Concept('first_tournament_participant.GetName] у двобої. Якщо [first_tournament_participant.GetSheHe] переможе, ми отримаємо додатковий поштовх до нашого [prestige', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hun.421.b: "Підтримати [second_tournament_participant.GetNameWithNoTooltip]."
  flavor_hun.421.b.tt: "Ми підтримаємо [Concept('second_tournament_participant.GetName] у двобої. Якщо [second_tournament_participant.GetSheHe] переможе, ми отримаємо додатковий поштовх до нашого [prestige', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hun.422.title: "Данина турніру"
  flavor_hun.422.desc: "Турнір завершився, проте його наслідки відчутні для двох учасників, [tournament_victor.GetName] та [tournament_loser.GetName].\n\n[tournament_victor.Custom('GetHungarianTournamentFate')]\n\n[tournament_loser.Custom('GetHungarianTournamentFate')]"
  flavor_hun.422.tournament_winning_character_big_gain: "Здається, бої на турнірі були не лише милосердними до [ROOT.GetCharacter.GetNameWithNoTooltip], але й дуже повчальними. Знання [ROOT.GetCharacter.GetHerHis|U] про битви розширилися, рефлекси [ROOT.GetCharacter.GetHerHis] покращилися, а рішучість [ROOT.GetCharacter.GetHerHis] перемогти попри все зросла до нових масштабів."
  flavor_hun.422.tournament_winning_character_small_gain: "Доля прихильна до [ROOT.GetCharacter.GetNameWithNoTooltip], оскільки турнірні бої активно покращили [ROOT.GetCharacter.GetHerHis] бойові навички. Нехай [ROOT.GetCharacter.GetHerHis] навички ведуть наші армії до перемоги!"
  flavor_hun.422.tournament_winning_character_small_loss: "Хоча й переможний, очевидно, що бої вимагали своєї данини від [ROOT.GetCharacter.GetNameWithNoTooltip]. Тілесна рана та подальша інфекція назавжди обмежать [ROOT.GetCharacter.GetHerHis] бойові навички, хоча й не набагато."
  flavor_hun.422.tournament_winning_character_big_loss: "Перемога дається великою ціною. Попри демонстрацію [ROOT.GetCharacter.GetNameWithNoTooltip] [ROOT.GetCharacter.GetHerHis] вищих навичок, доля мала інші плани щодо [ROOT.GetCharacter.GetHerHim]. Через невдале падіння під час лицарського турніру, ноги [ROOT.GetCharacter.GetNameWithNoTooltip] були непоправно пошкоджені, що змусило [ROOT.GetCharacter.GetHerHim] відійти від активного бою."
  flavor_hun.422.tournament_losing_character_big_gain: "Хоча й переможений, [ROOT.GetCharacter.GetNameWithNoTooltip] може вважати [ROOT.GetCharacter.GetHerselfHimself] щасливим. У той час як багато інших учасників були б поранені або навіть втратили б життя, [ROOT.GetCharacter.GetNameWithNoTooltip] відбувся легкою подряпиною та пошкодженою гордістю."
  flavor_hun.422.tournament_losing_character_small_gain: "Поразка на турнірі зазвичай також передбачає фізичні ушкодження. Попри [ROOT.GetCharacter.GetHerHis] найкращі спроби, [ROOT.GetCharacter.GetNameWithNoTooltip] не зміг витримати ударів свого супротивника і зрештою отримав тілесну рану, яка переросла в інфекцію. На [ROOT.GetCharacter.GetHerHis] щастя, хвороба пощадила [ROOT.GetCharacter.GetHerHis] життя, але майбутні бої спричинятимуть більшу втому для лицаря."
  flavor_hun.422.tournament_losing_character_small_loss: "Попри демонстрацію [ROOT.GetCharacter.GetNameWithNoTooltip] [ROOT.GetCharacter.GetHerHis] навичок, доля мала інші плани щодо [ROOT.GetCharacter.GetHerHim]. Через невдале падіння під час лицарського турніру, ноги [ROOT.GetCharacter.GetNameWithNoTooltip] були непоправно пошкоджені, що змусило [ROOT.GetCharacter.GetHerHim] відійти від активного бою."
  flavor_hun.422.tournament_losing_character_big_loss: "Участь у турнірі не є діяльністю без смертельного ризику. На жаль для [ROOT.GetCharacter.GetNameWithNoTooltip], програш на турнірі був не лише важким ударом по [ROOT.GetCharacter.GetHerHis] гордості як лицаря, але й кінцем [ROOT.GetCharacter.GetHerHis] життя. Прямий удар у двобої скинув [ROOT.GetCharacter.GetNameWithNoTooltip] з [ROOT.GetCharacter.GetHerHis] коня, який незабаром затоптав [ROOT.GetCharacter.GetHerHim] до смерті."
  flavor_hun.422.fallback: "[ROOT.GetCharacter.GetNameWithNoTooltip] розважався під час цих химерних занять."
  flavor_hun.422.a: "Таке колесо долі."
  flavor_hun.430.title: "Викривлена Свята Корона Угорщини"
  flavor_hun.430.desc: "[scope_holy_crown_of_hungary.GetName] була найважливішою регалією [ROOT.GetCountry.GetLongName] з часів старого короля Бели III і використовувалася для коронації всіх її правителів з тих пір.\n\nСьогодні, в день коронації [ROOT.GetCountry.GetGovernment.GetRuler.GetName], Свята Корона виявилася пошкодженою у своєму металевому скрині. Хрест на верхівці корони був зігнутий і тепер стоїть криво. Якийсь мерзенний слуга, мабуть, зберігав її без належної обережності і спотворив цей безцінний символ."
  flavor_hun.430.a: "Відкласти коронацію, доки корона не буде відновлена."
  flavor_hun.430.b: "Відкласти святкування та покращити вигляд корони."
  flavor_hun.430.c: "Залишити як є. Це знак згори."
  flavor_hun.430.d: "Знайти винуватця! Відшмагати його та всіх, хто скаржиться на стан корони!"
  flavor_hun.440.title: "Порушена традиція"
  flavor_hun.440.desc: "З часів старого короля Бели III, [scope_holy_crown_of_hungary.GetName] використовувалася для коронації кожного короля.\n\nЦя традиція закінчується сьогодні, оскільки [ruler_scope.GetName] сходить як новий [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName] з іншою короною на [ruler_scope.GetHisHer] голові.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] надзвичайно незадоволені відсутністю Святої Корони, і багато хто стверджує, що коронація не може бути справді легітимною без неї."
  flavor_hun.440.a: "Ми повинні повернути її за будь-яку ціну!"
  flavor_hun.450.title: "Розширення замку [ShowLocationNameWithNoTooltip('buda')]"
  flavor_hun.450.desc: "Зі зростанням впливу та могутності нашої нації виникає нагальна потреба в королівській резиденції, що відповідала б величі, багатству та престижу [GetCountry('HUN').GetName]. Замок [ShowLocationName('buda')], розташований на величних пагорбах, що височіють над нашою столицею, є символом нашого суверенітету та спадщини. Однак його нинішня структура блідне в порівнянні з багатьма королівськими палацами західних держав і більше не є гідною резиденцією, яка б відображала могутність і багатство нашої нації. Лунають заклики перетворити замок [ShowLocationNameWithNoTooltip('buda')] на розкішне місце королівської влади – таке, що применшило б навіть величні палаци західних монархів."
  flavor_hun.450.a: "Чудова ідея!"
  flavor_hun.450.b: "Це було б занадто дорого."
  flavor_hun.460.title: "Ілюмінована хроніка"
  flavor_hun.460.desc: "Визнаючи багату історію [ROOT.GetCountry.GetAdjective] та необхідність збереження нашої спадщини для майбутніх поколінь, [ROOT.GetCountry.GetGovernment.GetCourtTitle] розглядає можливість замовлення нової хроніки, яка б охопила нашу багатовікову історію. Створена найкращими істориками та художниками [ROOT.GetCountry.GetFlavorRank], ця грандіозна робота стане шедевром ілюстрацій, створених для зображення найважливіших подій, що сформували хід [ROOT.GetCountry.GetAdjectiveWithNoTooltip] історії. Така хроніка слугуватиме свідченням нашого минулого і буде незмінним символом нашої культурної ідентичності та національної гордості. Однак така монументальна робота також потребуватиме значного фінансування."
  flavor_hun.460.a: "Ми повинні віддати належне нашій багатій історії."
  flavor_hun.460.b: "Ми повинні інвестувати в щось важливіше."
  flavor_hun.460.historical_info: "#italic Ілюмінована хроніка#! — це розкішно ілюстрований рукопис, що документує ключові події угорської історії, замовлений королем Угорщини Людовиком I у XIV столітті."
  flavor_hun.470.title: "Privilegium Pro Slavis"
  flavor_hun.470.desc: "У нашому [ROOT.GetCountry.GetFlavorRank] спалахнув конфлікт між [ShowCultureName('slovak')] та [ShowCultureName('german_carpathian')] громадами через давню традицію чергування міських мерів та збереження рівної кількості місць у міських радах. Представники [ShowCultureNameWithNoTooltip('german_carpathian')], натхненні своїм зростаючим впливом та економічною могутністю, виявили зневагу до цих давніх звичаїв, що призвело до зростання напруги та невдоволення серед [ShowCultureNameWithNoTooltip('slovak')] населення. Необхідно прийняти рішення щодо нашої позиції в цій делікатній справі."
  flavor_hun.470.a: "Підтримати [ShowCultureNameWithNoTooltip('slovak')] сторону."
  flavor_hun.470.b: "Підтримати [ShowCultureNameWithNoTooltip('german_carpathian')] сторону."
  flavor_hun.470.c: "Ми не будемо втручатися в цю справу."
  support_slovak_side: "Усі [ShowCultureName('slovak')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')] отримують [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  support_german_carpathian_side: "Усі [ShowCultureName('german_carpathian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('slovakia_area')] отримують [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hun.470.historical_info: "#italic Privilegium Pro Slavis#! — це указ, виданий королем Людовиком I у 1381 році, що надавав привілеї словацькій громаді, яка скаржилася на те, що німці не поважають старі звичаї, такі як право чергувати міських мерів та зберігати рівну кількість місць у міських радах, що часто призводило до конфліктів, коли ці привілеї ігнорувалися або порушувалися."
  flavor_hun.480.title: "[GetCountry('HAB').GetAdjectiveWithNoTooltip] Шляхетське повстання"
  flavor_hun.480.desc: "Наше панування над [GetCountry('HAB').GetAdjective] землями стає дедалі важчим для підтримки через вимоги місцевих жителів щодо прав та представництва, а також їхнє відчуття відсутності голосу в державних справах як підкореної нації. Деякі припускають, що кризу можна вирішити шляхом відновлення [GetCountry('HAB').GetAdjectiveWithNoTooltip] автономного правління. Хоча така реформа та деволюція, безумовно, не є бажаним результатом з нашого боку, оскільки поступки повстанцям були б і ганьбою, і безчестям, глибока внутрішня криза, з якою ми зараз стикаємося, потребує вирішення."
  flavor_hun.480.a: "Абсолютно виключено!"
  flavor_hun.480.b: "Ми повинні поступитися їхнім вимогам."
  austrian_nobles: "Австрійське шляхетське повстання"
  austrian_nobles_joining: "Усі [ShowCultureName('danube_bavarian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] приєднаються до [austrian_nobles.GetName]"
  flavor_hun.490.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.490.desc: "[target_character.GetName] є ключовим командиром Чорної армії [ROOT.GetCountry.GetName], служивши баном [ShowAreaName('croatia_area')], [ShowAreaName('slavonia_area')], [ShowAreaName('bosnia_area')], воєводою [ShowAreaName('transylvania_area')] та капітаном Високогір'я. Бойова майстерність [target_character.GetLastNameWithNoTooltip] та вірність [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] відзначили [target_character.GetHimHer] в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] армії. [target_character.GetShortNameWithNoTooltip] відіграв значну роль у численних битвах по всій [ROOT.GetCountry.GetNameWithNoTooltip], [GetCountry('BOH').GetName] та [ShowRegionName('balkan_region')]. Чорна армія значно виграє від виняткового лідерства [target_character.GetLastNameWithNoTooltip], і тепер настав час нагородити цього героя [ROOT.GetCountry.GetNameWithNoTooltip] за роки служби, запропонувавши [target_character.GetHimHer] заслужену посаду та визнання."
  flavor_hun.490.a: "[target_character.GetSheHe|U] має знову очолити наші армії!"
  flavor_hun.490.b: "Ми скористаємося [target_character.GetHisHer] досвідом в іншому місці."
  flavor_hun.490.historical_info: "Балаж Мадяр, видатний полководець Чорної армії, відіграв вирішальну роль у військових силах короля Матяша Корвіна. Чорна армія, постійна наймана сила, завоювала значні частини Австрії та більше половини Богемської корони, здобувши значні перемоги над османами. Лідерство та стратегічний внесок Мадяра були ключовими у цих досягненнях, що зробило його важливою фігурою в угорській військовій історії."
  flavor_hun.500.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.500.desc: "[target_character.GetName] є легендарною постаттю наших армій, який деякий час служив [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Цей ветеран брав участь у численних битвах і здобув багато перемог проти [ShowCultureName('turkish_culture')] народів та інших, і завдяки [target_character.GetHisHer] винятковим військовим навичкам, [target_character.GetLastNameWithNoTooltip] ніколи не програвав битви за всю [target_character.GetHisHer] кар'єру. Досить тривалий час [target_character.GetHeShe] був єдиною особою, відповідальною за оборону величезних територій, що простягалися від [ShowAreaName('slavonia_area')] до [ShowAreaName('transylvania_area')], а також обіймав різні адміністративні посади. Оскільки [target_character.GetHisHer] військова кар'єра повільно добігає кінця, [ROOT.GetCountry.GetFlavorRank] має можливість використати його досвід в іншому місці. Як нам використати [target_character.GetHisHer] навички?"
  flavor_hun.500.a: "Нехай [target_character.GetHerHim] наглядає за армією."
  flavor_hun.500.b: "Запропонувати [target_character.GetHerHim] посаду при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_hun.500.historical_info: "Кініжі був одним із найталановитіших і найвідоміших генералів Чорної армії короля Матяша Корвіна. Його виняткове лідерство під час антиосманських кампаній наприкінці XV століття залишило тривалий вплив. Зокрема, Кініжі розгромив Алі Бея в битві при Хлібному полі у 1479 році, маючи втричі меншу кількість військ. Ця велика перемога гарантувала, що турки не наважаться напасти на Угорщину протягом багатьох років."
  flavor_hun.510.title: "[ShowBuildingTypeNameWithNoTooltip('bibliotheca_corviniana')]"
  flavor_hun.510.desc: "Оскільки [ShowInstitutionName('renaissance')] поширюється континентом, як лісова пожежа, розпалюючи полум'я знань та культурного відродження, наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] гуде від можливостей, які вона приносить. Вчені, художники та мислителі почали збиратися в наших містах, натхненні новою хвилею ідей, що прокочується через [ShowContinentName('europe')]. Була висунута пропозиція – побудувати велику бібліотеку в [ROOT.GetCountry.GetCapital.GetName] – таку, що приваблювала б вчених звідусіль і зробила б [GetCountry('HUN').GetName] оплотом [ShowInstitutionNameWithNoTooltip('renaissance')]. Однак фінансування такого амбітного проєкту було б досить дорогим. Чи варто нам інвестувати в будівництво [ShowBuildingTypeName('bibliotheca_corviniana')]?"
  flavor_hun.510.a: "Чудово!"
  flavor_hun.510.b: "Ми не можемо собі цього дозволити."
  flavor_hun.510.historical_info: "Матяш Корвін, на прізвисько Король Відродження, був великим покровителем мистецтв і наук. За його правління Угорщина стала першою країною за межами Італії, яка прийняла Відродження, а Бібліотека Корвініана стала одним з його найбільших внесків у культурне відродження в Угорщині. Вона служила центром наукового обміну та відігравала ключову роль у поширенні знань по всій країні. Вчені з усього континенту були приваблені до бібліотеки, сприяючи інтелектуальній жвавості Відродження. Вона служила символом інтелектуального запалу Відродження в Угорщині та сили покровительства у вихованні знань та інновацій."
  flavor_hun.520.title: "Замок Бран"
  flavor_hun.520.desc: "Хоча Карпатський гірський хребет забезпечує нам природну лінію оборони, гірські перевали є слабким місцем, яке потенційно може дати нашим ворогам легкий вхід до країни. Місцеве [ShowCultureName('german_transylvanian')] населення пропонує спільні інвестиції у будівництво замку в [ShowLocationName('brasov')] для захисту одного з гірських перевалів."
  flavor_hun.520.a: "Чудова ідея!"
  flavor_hun.520.b: "Було б мудріше посилити ширші оборонні споруди."
  flavor_hun.520.c: "Ми не можемо дозволити собі жодних інвестицій."
  flavor_hun.520.historical_info: "Замок Бран був побудований у XIV столітті трансільванськими німцями Кронштадта як фортеця для захисту стратегічного гірського перевалу та забезпечення контролю над регіоном."
  flavor_hun.530.title: "[ShowCultureNameWithNoTooltip('slovak')] Національне Пробудження"
  flavor_hun.530.desc: "Верхня [GetCountry('HUN').GetName] завжди була домом як для [ShowCultureName('slovak')] народу, так і для багатьох різних груп, які прийшли експлуатувати багаті копалини цього району. Натхненні зростаючим панслов'янським рухом та ідеалами [ShowInstitutionName('enlightenment')], [ShowCultureNameWithNoTooltip('slovak')] інтелектуали та візіонери мріють про об'єднану [ShowCultureNameWithNoTooltip('slovak')] націю, яка б користувалася особливим статусом та автономним правлінням у межах королівства. Вони невтомно працюють над кодифікацією та організацією [ShowCultureNameWithNoTooltip('slovak')] мови, закладаючи основи для окремої літературної традиції. Прийняття цього палкого духу національного відродження могло б сприяти почуттю єдності та гордості серед [ShowCultureNameWithNoTooltip('slovak')] народу, але поступки їхнім проханням про автономію можуть зрештою призвести до фрагментації нашої країни."
  flavor_hun.530.a: "Настав час надати [ShowCultureNameWithNoTooltip('slovak')] нації більші привілеї."
  flavor_hun.530.b: "Це створило б небезпечний прецедент."
  flavor_hun.530.historical_info: "Хоча Словацьке національне пробудження зрештою призвело до кодифікації словацької мови та розвитку кількох культурних інституцій, мрія про автономне правління так і не здійснилася, оскільки уряд відповів низкою репресивних законів, які прагнули просувати угорську мову та ідентичність за рахунок меншин країни."
  hungary_accepted_slovak_autonomy: "Усі [ShowCultureName('slovak')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримують [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  hungary_rejected_slovak_autonomy: "Усі [ShowCultureName('slovak')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_hun.540.title: "[target_character.GetNameWithNoTooltip]'s Mission"
  flavor_hun.540.desc: "[target_character.GetName] є ключовою фігурою в релігійному та інтелектуальному ландшафті [ShowAreaName('transylvania_area')], відіграючи значну роль у поширенні [ShowReligionName('lutheran')] серед [ShowCultureName('german_transylvanian')] населення. Народившись у [ShowLocationName('fagaras')], [target_character.GetShortNameWithNoTooltip] є вченим, гуманістом і священнослужителем, глибоко під впливом ідей Протестантської Реформації. Здобувши освіту в Німеччині та пройнявшись духом Реформації, він повернувся до [ShowAreaNameWithNoTooltip('transylvania_area')] з палкою відданістю поширенню принципів [ShowReligionNameWithNoTooltip('lutheran')]. Під впливом [target_character.GetShortNameWithNoTooltip] сакси [ShowAreaNameWithNoTooltip('transylvania_area')] починають приймати протестантські вчення. [target_character.GetHisHer|U] красномовні проповіді, наукові праці та невтомна адвокація реформ знайшли відгук у багатьох членів місцевої громади, що призвело до поступового, але значного відходу від традиційного [ShowReligionName('catholic')]."
  flavor_hun.540.a: "Хай буде так."
  hungary_transylvanian_germans_convert: "#Y 30%#! усіх [ShowCultureName('german_transylvanian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] приймають [ShowReligionName('lutheran')]."
  flavor_hun.540.historical_info: "Перехід саксів до протестантизму під керівництвом Гомтеруса мав глибокий вплив на релігійну та культурну ідентичність Трансільванії. Його вплив настільки зріс, що, за винятком деяких незначних районів, які залишаються непохитно католицькими, значна частина саксонських регіонів Трансільванії прийняла протестантизм."
  flavor_hun.550.title: "[ShowLocationNameWithNoTooltip('vienna')] - Нова столиця"
  flavor_hun.550.desc: "З нашим тріумфальним просуванням на територію [ShowAreaName('austria_area')] наші армії здобули гучну перемогу, захопивши імперське місто [ShowLocationName('vienna')]. Щоб встановити панування та забезпечити твердий контроль над регіоном та [GetUniqueInternationalOrganization('hre').GetName], дехто пропонує перенести наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] до міста. Хоча захоплення [ShowLocationNameWithNoTooltip('vienna')] справді є видатним досягненням, інші нагадують нам, що ми повинні бути обережними у своїх амбіціях. [ROOT.GetCountry.GetCapital.GetName] довго служила серцем нашої нації, і було б нерозумно відмовлятися від її історичного значення."
  flavor_hun.550.a: "Чудова ідея!"
  flavor_hun.550.b: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] добре нам служить."
  flavor_hun.550.historical_info: "Матвій Корвін переніс угорський [ROOT.GetCountry.GetGovernment.GetCourtTitle] до Відня в 1485 році, щоб зміцнити свій контроль над Австрією та централізувати владу, прагнучи розширити свій вплив і консолідувати своє правління над Священною Римською імперією."
  STATIC_MODIFIER_NAME_new_hungarian_capital: "Нова угорська столиця"
  flavor_hun.560.title: "Трипартитум"
  flavor_hun.560.desc: "Трипартитум, також відомий як #italic Opus Tripartitum#!, є значною юридичною працею, укладеною в [GetCountry('HUN').GetName]. Трипартитум служить всеосяжним правовим кодексом, що охоплює право всіх класів і станів нашого суспільства. Цей посібник із законодавства має на меті консолідувати та кодифікувати [GetCountry('HUN').GetAdjectiveWithNoTooltip] право, спираючись на раніше встановлене звичаєве право. Його укладання було монументальним завданням, що відображало прихильність [ROOT.GetCountry.GetGovernment.GetCourtTitle] до правової реформи та управління. Незважаючи на свій вплив, Трипартитум ще не отримав офіційного загальнодержавного визнання."
  flavor_hun.560.a: "Впровадити його!"
  flavor_hun.560.b: "Немає потреби в такому кодексі."
  flavor_hun.570.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.570.desc: "[target_character.GetName] — видатна особистість, яка обіймала посади юриста, імперсько-королівського радника [ROOT.GetCountry.GetGovernment.GetCourtTitle] та головного імперсько-королівського бібліотекаря. [target_character.GetSheHe|U] також є істориком та впливовим прихильником [GetUniqueInternationalOrganization('hre').GetName].\n\n[target_character.GetSheHe|U] провів/провела широкі дослідження в етнології, розвиваючи її як наукову дисципліну, і [target_character.GetHisHer] робота змушує багатьох людей бачити [target_character.GetHimHer] як піонера пан-[ShowCultureGroupName('slavic_group')] активізму.\n\nШкода, що така впливова особа, яка народилася в [ROOT.GetCountry.GetName], служить іноземній державі. Можливо, нам варто розглянути можливість запропонувати [target_character.GetHimHer] високу посаду при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб він/вона міг/могла служити [target_character.GetHisHer] батьківщині замість захисту іноземних інтересів."
  flavor_hun.570.a: "Ми знайдемо місце для [target_character.GetHimHer] при [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  flavor_hun.570.b: "Залиште його/її виконувати [target_character.GetHisHer] поточну роботу."
  flavor_hun.580.title: "Евакуація столиці"
  flavor_hun.580.desc: "З нещодавнім [GetCountry('TUR').GetAdjective] розширенням наша столиця [ROOT.GetCountry.GetCapital.GetName] опинилася в дуже вразливому становищі. Хоча [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] добре укріплена, навколишня місцевість не дає переваг захисникам, якщо місто коли-небудь буде обложене ворогом. Багато хто припускає, що було б розумніше перенести [ROOT.GetCountry.GetGovernment.GetCourtTitle] до іншого міста, подалі від кордону з [GetCountry('TUR').GetAdjectiveWithNoTooltip] ворогом. Верхнє [ROOT.GetCountry.GetAdjectiveWithNoTooltip] місто [ShowLocationName('bratislava')] здається найкращим кандидатом."
  flavor_hun.580.a: "Перенести [ROOT.GetCountry.GetGovernment.GetCourtTitle] до [ShowLocationNameWithNoTooltip('bratislava')]."
  flavor_hun.580.b: "Ми не можемо покинути [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]!"
  flavor_hun.580.historical_info: "Після нищівної поразки в битві при Могачі 1526 року угорська столиця була перенесена до міста Пресбург, нинішньої Братислави, і місто служило столицею нації понад 250 років."
  flavor_hun.590.title: "Походження гусарів"
  flavor_hun.590.desc: "У бурхливі роки після [GetCountry('TUR').GetAdjective] експансії на [ShowRegionName('balkan_region')] багато [ShowCultureName('serbian')] біженців покинули свою батьківщину, шукаючи безпеки та нових можливостей у [ROOT.GetCountry.GetLongName]. Серед цих вигнанців були досвідчені воїни, вигнані зі своїх земель, але не зі свого бойового духу. Оселившись у [GetCountry('HUN').GetNameWithNoTooltip], вони почали організовуватися в окремі військові підрозділи, давши початок грізним гусарам. Легкоброньовані, але дуже мобільні, вони відзначалися в нападах \"бий-біжи\", переслідуючи ворожі сили та вселяючи страх у серця своїх супротивників. Їхня ефективність на полі бою незабаром стала очевидною, і їхня репутація елітної кавалерії поширилася далеко й широко."
  flavor_hun.590.a: "Вони добре нам послужать."
  flavor_hun.590.b: "Давайте реорганізуємо їх у постійний підрозділ."
  flavor_hun.590.historical_info: "Зі свого скромного походження гусари стали одним з найвідоміших підрозділів центральноєвропейських держав, служачи в Чорній армії Угорщини та Тридцятилітній війні. Зрештою вони поширилися на Польщу, де стали однією з найвідоміших і наймогутніших кавалерій в історії – Крилатими гусарами."