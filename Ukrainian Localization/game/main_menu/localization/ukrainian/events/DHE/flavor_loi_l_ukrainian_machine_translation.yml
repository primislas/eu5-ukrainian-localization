l_english:
  flavor_loi.10.title: "Північні острови"
  flavor_loi.10.desc: "Народ [ROOT.GetCountry.GetLongName] довго жив у тіні своєї [ROOT.GetCountry.GetCulture.GetName] спадщини, але тепер, перед обличчям мінливих часів, ми знову розглядаємо можливість прийняти наше нордичне коріння. Оскільки ми все ближче і ближче до старих королівств [scandinavia.GetName], багато чого можна здобути, відновивши цю давню спадщину та уклавши нові союзи.\n\nЯкщо ми оберемо цей шлях, ми повинні бути готові відмовитися від деяких наших гельських традицій та звичаїв, але винагороди цієї подорожі можуть бути великими. Прийнявши наше нордичне коріння, ми можемо встановити нову та могутню [nordic_culture.GetName] ідентичність для народу цих островів і посісти наше місце серед Левів Півночі.\n\nЧи вирушимо ми в цю подорож відкриття?"
  flavor_loi.10.a: "Прийняти наше нордичне коріння."
  flavor_loi.10.b: "Чинити опір поклику Півночі."
  opinion_loi_10_adopted_our_culture: "Прийнята нордична культура"
  flavor_loi.20.title: "Конкурс суднобудування"
  flavor_loi.20.desc: "Вітри провінції [target_location.GetProvinceDefinition.GetName] несуть звук молотів, що б'ють по дубу та сосні, коли майстри-суднобудівники з усього регіону [target_location.GetArea.GetName] збираються, щоб змагатися у Великому [ROOT.GetCountry.GetAdjective] конкурсі суднобудування в [target_location.GetName].\n\nТрадиційне суднобудування є життєво важливим для нашого способу життя і потребує заохочення. Як представники [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], ми зобов'язані наглядати за цим змаганням."
  flavor_loi.20.a: "Замовити галеру, щоб взяти участь самим."
  flavor_loi.20.b: "Спонсорувати обраного учасника."
  flavor_loi.20.c: "Не звертати уваги на конкурс."