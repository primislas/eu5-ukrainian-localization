l_english:
  flavor_mal.1.title: "Зеніт [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_mal.1.desc: "Під час правління [mal_mansa_musa_ruler.GetName] [ROOT.GetCountry.GetLongName] досягла вершини могутності в $west_africa$. Воістину благословенний Аллахом, великий [ROOT.GetCountry.GetGovernment.GetRulerTitle] правив [ROOT.GetCountry.GetNameWithNoTooltip] із силою та мудрістю, і навіть показав велике багатство [ROOT.GetCountry.GetFlavorRank] решті світу під час [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] Хаджу.\n\nОднак колесо фортуни не може вічно обертатися на нашу користь. [mal_maghan_ruler.GetName] ніколи не мав великого значення, і [ROOT.GetCountry.GetFlavorRank] стикається із соціальними проблемами через присутність у державі такої кількості різноманітних культур.\n\nЛише час покаже, що станеться з [ROOT.GetCountry.GetLongNameWithNoTooltip]..."
  flavor_mal.1.a: "Нехай ці процвітаючі часи не знають кінця."
  flavor_mal.1.a.tt: "Ми можемо стати об'єктом [ShowDisasterName('decline_of_empire')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e], якщо наш [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над нашими землями занепаде під слабким керівництвом"
  flavor_mal.1_historical_info: "Як найвідоміший правитель імперії Малі, Манса Муса славиться своїм величезним багатством та впливом. Під його правлінням Малі стала центром торгівлі, культури та ісламської освіти, а Тімбукту процвітало як осередок вченості. Його легендарне паломництво до Мекки продемонструвало його величезні багатства, оскільки він роздав стільки золота, що це вплинуло на регіональні економіки. Муса розширив територію Малі, зміцнивши контроль над життєво важливими торговими шляхами. Його покровительство архітектурі та освіті залишило тривалу спадщину, з мечетями та медресе, які сформували історію Західної Африки. Його правління символізує вершину могутності та процвітання Малі."
  flavor_mal.2.title: "[mal_suleyman_ruler.GetNameWithNoTooltip], Брат [mal_mansa_musa_ruler.GetNameWithNoTooltip]"
  flavor_mal.2.desc: "Хоча [mal_maghan_ruler.GetName] не виявив жодних перспективних навичок для управління державою, його дядько [mal_suleyman_ruler.GetName] довів свої здібності під час великого Хаджу [mal_mansa_musa_ruler.GetName] як регент [ROOT.GetCountry.GetName]. Підтримка [mal_suleyman_ruler.GetNameWithNoTooltip] як нового [ROOT.GetCountry.GetGovernment.GetRulerTitle] є сильною. Однак [mal_maghan_ruler.GetNameWithNoTooltip] є нинішнім правителем нашої держави, і це суперечить традиційним законам [ROOT.GetCountry.GetNameWithNoTooltip] узурпувати [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHim]."
  flavor_mal.2.a: "Нехай [mal_suleyman_ruler.GetNameWithNoTooltip] править [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_mal.2.b: "[mal_maghan_ruler.GetNameWithNoTooltip] успадкував трон. [mal_maghan_ruler.GetHeShe|U] має спочатку довести [mal_maghan_ruler.GetHerselfHimself]."
  flavor_mal.3.title: "Трансформація [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Війська"
  flavor_mal.3.desc: "Армії [ROOT.GetCountry.GetName] раніше складалися з #italic Horons#! — «вільних людей», які приносили на битву власну зброю та були навчені військовому мистецтву. Зі зростанням використання [ShowUnitDefinitionName('a_sofa_infantry')] характер нашого війська змінюється. Державу захищають вже не наші добре навчені солдати-напівставки, а армія #italic Jonows#! — «рабів» — які колись були лише носіями військового спорядження.\n\nДумки розділилися щодо того, чи є такий розвиток нашою перевагою. Хоча якість нашої армії менш надійна, безперечно, що кількість військ Софа є силою, з якою слід рахуватися."
  flavor_mal.3.a: "Використаймо $a_sofa_infantry$ більше."
  flavor_mal.3.b: "Ми не повинні замінювати Горонів цими рабами."
  flavor_mal.4.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] та [GetCountry('POR').GetAdjectiveWithNoTooltip]"
  flavor_mal.4.desc: "Прийнявши менш насильницький підхід, [GetCountry('POR').GetAdjective] торговці стають все більш поширеним явищем уздовж наших західних кордонів. Багато в чому це є благом для нашої держави, оскільки дало нам набагато легший доступ до коней для наших армій та спосіб придбати цінні товари з багатьох екзотичних портів, які часто відвідують [GetCountry('POR').GetAdjectiveWithNoTooltip] купці. За золото чи рабів, мало що [GetCountry('POR').GetAdjectiveWithNoTooltip] не продали б нам; наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] процвітають завдяки цьому новому партнерству.\n\nОднак, у деяких таборах є невелике занепокоєння щодо цього розвитку, кількість рабів на одного коня, здається, зростає з кожним днем, і хоча наші власні трансокеанські підприємства не були такими успішними, здавалося б, нерозумно повністю покладатися на цих іноземних купців, оскільки вони, безперечно, не можуть мати на увазі наших найкращих інтересів."
  flavor_mal.4.a: "Плідне співробітництво для всіх...?"
  flavor_mal.5.title: "[GetCountry('POR').GetAdjectiveWithNoTooltip] Втручання"
  flavor_mal.5.desc: "[GetCountry('POR').GetAdjective] торговці на нашому західному узбережжі останнім часом стали справжньою неприємністю. Хоча коні, яких вони привозять для наших армій, та екзотичні товари з далеких країн дуже корисні для нас, здається, вони не можуть не втручатися в місцеву політику. Очевидно, що кількох вождів, які контактують з [GetCountry('POR').GetAdjectiveWithNoTooltip], заохочували розширювати свою особисту владу та повільно намагатися розірвати зв'язки з нашою центральною адміністрацією.\n\nЩоб впоратися з цим, ми могли б або вдарити по самим вождям, або спробувати обмежити вплив [GetCountry('POR').GetAdjectiveWithNoTooltip]."
  flavor_mal.5.a: "Діяти рішуче, щоб обмежити [GetCountry('POR').GetAdjectiveWithNoTooltip] вплив."
  flavor_mal.5.b: "Проблема полягає в нелояльних вождях."
  flavor_mal.6.title: "Ісламізація [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  flavor_mal.6.desc: "Хоча наш [ROOT.GetCountry.GetFlavorRank] є ісламським за назвою, стара релігія наших предків все ще є силою, з якою слід рахуватися. Однак іслам останнім часом набирає все більше прихильників серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], а мандрівні марабути також стають все більш поширеним явищем навіть у найвіддаленіших куточках наших земель.\n\nУ минулому наші попередники уникали надмірного примусу до навернення своїх підданих, але якщо ми захочемо, ми, ймовірно, зможемо скористатися цими останніми подіями, щоб заохотити поширення істинної віри."
  flavor_mal.6.a: "Давайте навернемо наш народ!"
  flavor_mal.6.b: "Не будемо розхитувати човен."
  flavor_mal.7.title: "Доступ до порохової зброї"
  flavor_mal.7.desc: "Століттями наші чоловіки покладалися на дротики та луки. Такими були шляхи наших предків, і такими є шляхи нашого нинішнього покоління воїнів. Проте ті чужинці з [mal_arms_dealer.GetName] володіють зброєю, небаченою раніше в [ROOT.GetCountry.GetName]. Хоча наша власна традиційна зброя перевершує ті чужоземні знаряддя руйнування, очевидно, що ця «порохова зброя» має потенціал замінити лук. Військові радники рекомендують нам отримати доступ до цієї зброї, придбавши її у [mal_arms_dealer.GetAdjectiveWithNoTooltip] купців."
  flavor_mal.7.a: "Ми повинні запросити зброю у [mal_arms_dealer.GetNameWithNoTooltip]."
  flavor_mal.7.a.tt: "Ми спробуємо придбати порохову зброю у [mal_arms_dealer.GetName].\nЦіна становить #R [ROOT.GetVariable('mal_gun_price').GetValue|V2]#!, якщо [mal_arms_dealer.GetNameWithNoTooltip] погодиться. В обмін [mal_arms_buyer.GetAdjective] військова та воєнна економіка отримають значний поштовх."
  flavor_mal.7.b: "Зброя? Списи та стріли – це все, що нам потрібно!"
  mal_need_for_firearms: "Потреба в $firearms$"
  mal_rejection_of_firearms: "Відмова від $firearms$"
  flavor_mal.8.title: "[mal_arms_buyer.GetNameWithNoTooltip] запитує доступ до зброї"
  flavor_mal.8.desc: "Цікаві новини дійшли до нашого двору, оскільки купці з [mal_arms_buyer.GetName], надіслані їхнім [mal_arms_buyer.GetGovernment.GetRulerTitle] [mal_arms_buyer.GetGovernment.GetRuler.GetHerselfHimself], пропонують нам продати їм нашу вогнепальну зброю, а також наш досвід у зброярстві. Хоча надання їм доступу до нашого арсеналу може дати нам вдячного союзника в $west_africa$, це може загрожувати нашим видатним діловим можливостям з [mal_arms_buyer.GetNameWithNoTooltip]."
  flavor_mal.8.a: "Нам немає вигоди продавати їм зброю."
  flavor_mal.8.b: "Це може бути прибуткова справа."
  mal_granted_us_access_to_firearms: "Надав нам доступ до $firearms$"
  mal_rejected_us_access_to_firearms: "Відмовив нам у доступі до $firearms$"
  flavor_mal.9.title: "[mal_arms_dealer.GetNameWithNoTooltip] продає порохову зброю!"
  flavor_mal.9.desc: "Чудові новини дійшли до двору, оскільки купці з [mal_arms_dealer.GetName] погодилися продати порохову зброю, а також необхідні ресурси та знання для самостійного виробництва цієї зброї! Військові [ROOT.GetCountry.GetName] нарешті можуть адаптуватися до мінливої природи війни!"
  flavor_mal.9.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mal.10.title: "[mal_arms_dealer.GetNameWithNoTooltip] відмовляє в доступі до порохової зброї!"
  flavor_mal.10.desc: "Новини великого занепокоєння дійшли до двору, оскільки, незважаючи на всі наші спроби та обіцянки, підлі купці з [mal_arms_dealer.GetName] відмовляють у наших благаннях купити їхню порохову зброю. Вони відповідали лише проклятими виправданнями, вимагаючи вищої плати за додаткових рабів. Очевидно, що ці породження Джаханнаму не зацікавлені у виживанні свого ділового партнера."
  flavor_mal.10.a: "Ці підступні змії..."
  flavor_mal.11.title: "[ROOT.GetCountry.GetNameWithNoTooltip] в обороні"
  flavor_mal.11.desc: "Війни проти [ROOT.GetCountry.GetLongName] даються взнаки. Все більше території втрачається тим, хто прагне нашого знищення; все більше наших найхоробріших чоловіків змушені переходити в оборону, тоді як орди невдячних зрадників і мародерських племен просуваються в наші землі.\n\nЯкими б трагічними не були події, принаймні ці війни показують [ROOT.GetCountry.GetAdjectiveWithNoTooltip] завзятість. Однак голоси у військовому командуванні стверджують, що наша оборонна стратегія призведе до нашої загибелі. Перехід у наступ і перенесення боротьби на наших ворогів – єдиний спосіб відновити славу [ROOT.GetCountry.GetFlavorRank]."
  flavor_mal.11.a: "Це божевілля, армія просто не може покинути нашу землю."
  flavor_mal.11.b: "Вони праві! Захист лише відстрочить нашу загибель."
  flavor_mal.12.title: "Фаріма-Сура та Санкар-Зума"
  flavor_mal.12.desc: "Наші кордони часто небезпечні, і багато купців по всій території стали жертвами незаконного бандитизму та злочинності. Незважаючи на всі наші зусилля, ми не змогли встановити верховенство закону та наблизити наші прикордонні землі до нашого двору в [target_location.GetName].\n\nТаким чином, багато впливових членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] висловили свої занепокоєння та висунули ідеї щодо делегування їм певної влади, особливо навколо північного та південного кордонів."
  flavor_mal.12.a: "Фаріма-Сура служитиме нам вірно."
  flavor_mal.12.b: "Звернімося до Санкар-Зуми."
  flavor_mal.12.c: "Надаймо їм широкі привілеї!"
  flavor_mal.12.d: "Ми не можемо дозволити такий вплив у руках знаті!"
  flavor_mal.13.title: "Медресе Санкоре"
  flavor_mal.13.desc: "Мало які заклади та освітні центри є такими видатними та прославленими, як [ShowBuildingTypeName('madrasa')] у [target_location.GetName]. Спочатку збудоване навколо коренів [ShowBuildingTypeName('temple')] Санкоре, медресе було засноване за фінансової підтримки [ShowCultureName('mandinka')] жінки.\n\nВідтоді установа не лише процвітала під керівництвом великих людей, таких як [GetCharacter('mal_musa_keita').GetName], але й продовжує приймати численних студентів, які відвідують її приміщення з усіх куточків континенту, щоб здобути мудрість у її стінах."
  flavor_mal.13.a: "Це яскравий приклад нашої інноваційної думки!"
  flavor_mal.13.b: "Ми будемо захоплюватися ним, але не можемо фінансувати його ще більше..."
  flavor_mal.14.title: "Прагнення [target_subject_country.GetNameWithNoTooltip] до незалежності"
  flavor_mal.14.desc: "Попри наші спроби покращити життя всіх наших підданих, є серед нас ті, хто бажає бачити наше падіння, викорінити нашу спадщину. Вони плетуть інтриги в тіні, з кинджалами в руках, чекаючи, щоб завдати удару в моменти нашої слабкості...\n\nГолос незгоди [target_subject_country.GetName] — це не що інше, як вистава вередливої дитини, яка стала надто зухвалою та нетерплячою."
  flavor_mal.14.a: "Дуже добре, надайте їм незалежність."
  flavor_mal.14.b: "Якщо вони хочуть війни..."
  flavor_mal.14.b.tt: "Ми спробуємо приборкати [GetCountry('JOL').GetName].\n#italic Це може призвести до #R війни#! між нашими державами!#!"
  flavor_mal.15.title: "[target_overlord_country.GetNameWithNoTooltip] втручається"
  flavor_mal.15.desc: "Попри наші найкращі спроби переконати [target_overlord_country.GetName] та їхніх некультурних, свиноподібних монархів, що ми просто бажаємо співіснувати в мирі без будь-якого рабства, вони, схоже, вимагають нашого повного та абсолютного підкорення. Ця образа, безсумнівно, повинна стати паливом для розпалювання вогню незалежності по всій нашій території!"
  flavor_mal.15.a: "...так сказав би дурень!"
  flavor_mal.15.a.tt: "#italic Війна розпочнеться через #R 30#! днів, якщо [target_overlord_country.GetName] не надасть нам незалежності.#!"
  flavor_mal.15.b: "Ми повинні підкоритися і уникнути кровопролиття..."
  flavor_mal.16.title: "[target_country.GetNameWithNoTooltip] підкоряється"
  flavor_mal.16.desc: "Чудові новини! Зухвалі монархи, що стояли за змовою про незалежність у [target_country.GetNameWithNoTooltip], склали зброю та прийняли нашу беззаперечну владу!"
  flavor_mal.16.a: "Нехай вони радіють, бо сьогодні їх пощадили..."
  flavor_mal.17.title: "[target_country.GetNameWithNoTooltip] береться за зброю"
  flavor_mal.17.desc: "У відчайдушній спробі врятувати свої жалюгідні життя від повного знищення та підкорення, схоже, найдикіші серед двору [target_country.GetName] вирішили довести свій народ до повного руйнування, обравши погрозу тотальною війною, якщо ми відхилимо їхні вимоги..."
  flavor_mal.17.a: "Дуже добре, нехай ідуть..."
  flavor_mal.17.b: "Ми віддамо їх мечу, всіх їх!"
  flavor_mal.18.title: "Розрізнене царство"
  flavor_mal.18.desc: "Багато хто в наших лавах, здається, вірить, що наша велика нація розвалюється. Регіональні повстання, претенденти-самозванці та суворі погодні умови призвели до того, що багато хто припускає, що наш кінець близький. Додаючи солі до наших ран, тепер багато наших підданих на східних територіях вимагають повної незалежності від нашої влади після вигнання наших місцевих адміністраторів та страти місцевих представників корони!"
  flavor_mal.18.a: "Суворі умови, але ми приймемо..."
  flavor_mal.18.b: "Кров відплачується кров'ю, цикл насильства..."
  flavor_mal.18.c: "Можливо, настав час для [GetCountry('SON').GetNameWithNoTooltip] повстати."
  flavor_mal.19.title: "Копальні [target_location2.GetNameWithNoTooltip]"
  flavor_mal.19.desc: "Хоча копальні [target_location2.GetName] добре служили нам у минулому, нещодавно відбувся приплив інвестицій у [target_location.GetName]. До [target_character.GetName] звернулися [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] з проханням інвестувати в останнє."
  flavor_mal.19.historical_info: "Сіль в імперії Малі вважалася ціннішою за золото через її вартість на зовнішніх ринках. З цієї причини Тагаза та її копальні були прибутковими для будь-кого, хто мав для них робочу силу. У 16 столітті, через численні війни, копальні були покинуті на користь тих, що в Тауденні."
  flavor_mal.19.a: "Кілька золотих монет для [target_location.GetNameWithNoTooltip]."
  flavor_mal.19.b: "[target_location2.GetNameWithNoTooltip] завжди були нашими копальнями в цьому районі."
  flavor_mal.19.c: "Навіщо інвестувати в будь-яку з них?"
  flavor_mal.20.title: "Зміцнення [target_location.GetNameWithNoTooltip]"
  flavor_mal.20.desc: "[target_character.GetName] у попередні роки інвестував у [target_location.GetRank.GetName] [target_location.GetName]. Інші нації, здається, захоплені її зростанням і регулярно відвідують її. Можливо, ми можемо допомогти їй ще більше і показати нашим сусідам міць [ROOT.GetCountry.GetName]."
  flavor_mal.20.a: "[target_location.GetNameWithNoTooltip] буде величним."
  flavor_mal.20.b: "Немає потреби в цьому."
  flavor_mal.21.title: "Pax Mandinka"
  flavor_mal.21.desc: "Наше панування над більшою частиною [ShowRegionName('guinea_region')] дозволило нам ще більше розширити свій вплив, встановивши вічний мир у регіоні. Тепер це можливість зосередитися на власне [ROOT.GetCountry.GetName]."
  flavor_mal.21.a: "Нехай цей мир принесе багато караванів."
  flavor_mal.21.b: "Підтримання миру в [ROOT.GetCountry.GetNameWithNoTooltip] є важливим."
  flavor_mal.21.c: "Коли мир, готуйся до війни."
  flavor_mal.21.d: "[ROOT.GetCountry.GetCourtLanguage.GetNameWithNoTooltip] буде розмовляти скрізь."
  mal_every_location_with_a_market_gains_development_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що має [ShowBuildingTypeName('marketplace')], отримає [ShowNamedValue('development_mild_bonus')|+=] [Concept('development', 'CONCEPT_PLACEHOLDER')|e]."
  mal_every_armory_gains_an_extra_upgrade_if_possible_tt: "Кожна [ShowBuildingTypeName('armory')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e] буде покращена на #G 1#! рівень."
  flavor_mal.22.title: "Повернення [target_location.GetNameWithNoTooltip]"
  flavor_mal.22.desc: "У минулому ми контролювали [target_location.GetRank.GetName] [target_location.GetName], однак ми втратили його на користь народу [ShowCultureName('tuareg')]. Тепер, коли його нарешті повернуто, [target_character.GetName] та [target_character.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle] обговорюють, чи слід його укріпити, щоб запобігти ще одній втраті, чи слід зміцнити його копальні."
  flavor_mal.22.a: "Відправимо більше людей до копалень."
  flavor_mal.22.b: "Його потрібно укріпити."
  flavor_mal.23.title: "[ShowGoodsNameWithNoTooltip('livestock')] [ShowCultureNameWithNoTooltip('fulbe')]"
  flavor_mal.23.desc: "Хоча багато наших [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] зосереджені на сільському господарстві, певні меншини спеціалізуються на власних ремеслах. Прикладом є народ [ShowCultureName('fulbe')], який контролює значну частину [ShowGoodsName('livestock')] у [ShowRegionName('guinea_region')]. Ми можемо спробувати запропонувати їм проживання в наших поселеннях, або ж спробувати обкласти податком їхню худобу."
  flavor_mal.23.historical_info: "З моменту заснування імперії Малі, народ фульбе відповідав за розведення худоби [ROOT.GetCountry.GetFlavorRank]. Вони часто ділилися своїми землями з іншими сусідніми групами, а їхнє багатство вимірювалося розміром їхнього стада."
  flavor_mal.23.a: "Нехай вони служать нам у довгостроковій перспективі."
  flavor_mal.23.b: "Все золото належить [target_character.GetNameWithNoTooltip]."
  mal_unlock_fulani_cattle_rearing_pens_tt: "Відкриває [Concept('building', 'CONCEPT_PLACEHOLDER')|e] [ShowBuildingTypeName('fulani_cattle_rearing_pen')] для наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], що виробляють [ShowGoodsName('livestock')] у [ShowRegionName('guinea_region')]"
  flavor_mal.24.title: "Пошуки загубленої подорожі"
  flavor_mal.24.desc: "Хоча [target_character.GetName] вважав експедицію до [ShowRegionName('south_atlantic_region')] марною, [target_character2.GetName] думає інакше. [target_character2.GetSheHe|U] вважає, що на Заході має бути щось. Ми могли б спробувати інвестувати в нові подорожі, все заради занурення в невідоме."
  flavor_mal.24.historical_info: "Хоча це лише міф, що Ко Мамаді міг відкрити Америки під час своїх подорожей, можна сказати, що його нездатність повернутися сприяла піднесенню Манси Муси в імперії Малі та зосередженню на внутрішній стабільності, а не на відкриттях та інноваціях."
  flavor_mal.24.a: "У нас багато золота, ми можемо дозволити собі нові експедиції."
  flavor_mal.24.b: "Стабільність [ROOT.GetCountry.GetNameWithNoTooltip] має більше значення."
  mal_finding_america_yields_rewards_tt: "Якщо нам пощастить відкрити новий [Concept('continent', 'CONCEPT_PLACEHOLDER')|e], ми отримаємо можливість зміцнити наші #Y Зовнішні#! цінності."
  flavor_mal.25.title: "Земля помічена!"
  flavor_mal.25.desc: "Хоча ми так і не змогли дізнатися, що сталося із загубленим флотом, [target_character.GetName] знайшов нові землі. Це відкриття шокувало весь екіпаж, а також усіх у [ROOT.GetCountry.GetGovernment.GetCourtTitle], але воно дає нам нові можливості. Можливо, [target_character2.GetName] помилявся, можливо, є сенс дивитися назовні."
  flavor_mal.25.a: "Швидко, ці нові землі повинні бути заселені."
  flavor_mal.25.b: "Ми не поспішаємо. Нехай решта [ROOT.GetCountry.GetFlavorRank] знає."
  flavor_mal.26.title: "Рада домінує в політиці"
  flavor_mal.26.desc: "Оскільки слабкість [target_character.GetName] була очевидною для наших станів, вони вирішили цим скористатися. [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер домінує в управлінні [ROOT.GetCountry.GetName]."
  flavor_mal.26.a: "[ROOT.GetCountry.Custom('common_string_we_must_do_something')]"
  flavor_mal.27.title: "Продано Золотий Валун"
  flavor_mal.27.desc: "[target_character.GetName] та [target_character.GetHerHis] практики призвели до немислимого. Продаж Золотого Валуна, володіння, яке багато хто хотів би отримати за будь-яку ціну, за значно меншу вартість, ніж його початкова. Ця подія шокувала весь [ROOT.GetCountry.GetGovernment.GetCourtTitle], ставлячи під сумнів [target_character.GetHerHis] компетентність."
  flavor_mal.27.a: "Але ж економіка!"
  flavor_mal.28.title: "Відновлення данини"
  flavor_mal.28.desc: "У минулому основним джерелом золота для [ROOT.GetCountry.GetName] були не його копальні, а численні данини, які платили навколишні нації. Оскільки ця традиція повільно згасає, [target_character.GetName] запропонував відновити цю систему."
  flavor_mal.28.a: "Вимагаймо данину знову."
  flavor_mal.28.b: "Замість покладатися на старі методи, ми повинні зосередитися на централізації."
  flavor_mal.29.title: "Майстри Річки"
  flavor_mal.29.desc: "Народи річки Нігер принесли [ROOT.GetCountry.GetName] багато їжі завдяки своїм рибальським традиціям. Названі Майстрами Річки, вони допомогли створити такі поселення, як [target_location.GetName], і були невід'ємною частиною [ROOT.GetCountry.GetFlavorRank]. Можливо, ми можемо запропонувати їм більше допомоги."
  flavor_mal.29.a: "Вони можуть отримати трохи золота."
  flavor_mal.29.b: "Нехай так не буде."
  mal_every_pop_gains_20_satisfaction_tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] отримає [ShowNamedValue('pop_satisfaction_severe_bonus')|+2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mal.30.title: "Тиранічний Правитель"
  flavor_mal.30.desc: "[target_character.GetName] гнобить [target_character.GetHerHis] підданих, погано поводиться з ними і вважає їх лише пішаками. Хоча [target_character.GetSheHe] має владу робити це, весь [ROOT.GetCountry.GetName] шепоче про повалення [target_character.GetHerHim]."
  flavor_mal.30.a: "[target_character.GetNameWithNoTooltip] потрібно стримати."
  mal_all_pops_lose_15_satisfaction_tt: "Всі наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mal.31.title: "Зміщення до Узбережжя"
  flavor_mal.31.desc: "Хоча транссахарська торгівля принесла [ROOT.GetCountry.GetName] багато багатств у минулому, тепер зрозуміло, що відбувся зсув у бік морської торгівлі. [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонував, щоб ми натомість зосередилися на розвитку деяких наших прибережних поселень у [ShowRegionName('guinea_region')], таких як [target_location.GetName], щоб залишатися попереду в будь-яких економічних питаннях."
  flavor_mal.31.a: "[target_location.GetNameWithNoTooltip] отримає допомогу."
  flavor_mal.31.b: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] заслуговує на увагу натомість."
  flavor_mal.31.c: "Скарбницю потрібно зберегти."
  flavor_mal.32.title: "Падіння [ShowLocationNameWithNoTooltip('timbuktu')]"
  flavor_mal.32.desc: "[ShowLocationNameWithNoTooltip('timbuktu')], колись велика перлина [ROOT.GetCountry.GetName], впала до наших ворогів. Багато хто в [ROOT.GetCountry.GetNameWithNoTooltip] бачить це як знак того, що, можливо, [ROOT.GetCountry.GetRank.GetName] повільно розпадається."
  flavor_mal.32.a: "[ShowLocationNameWithNoTooltip('timbuktu')] буде відвойовано!"
  flavor_mal.32.b: "Нехай [target_character2.GetNameWithNoTooltip] висловиться з цього приводу."
  flavor_mal.32.c: "Звинуватімо натомість [target_character.GetNameWithNoTooltip]."
  flavor_mal.33.title: "Будівництво $timbuktu_palace$"
  flavor_mal.33.desc: "Щоб ще більше зміцнити золотий вік, який переживає [target_location.GetRank.GetName] [target_location.GetName], [target_character.GetName] передбачає будівництво грандіозного палацу, свідчення багатства та престижу нашого [ROOT.GetCountry.GetRank]. Натхненний процвітаючими дворами великих імперій, [target_character.GetSheHe] прагне створити архітектурний шедевр — такий, що зрівняється з найкращими спорудами в [ROOT.GetCountry.GetName]. Спроектований з витонченою майстерністю та прикрашений символами влади, палац слугуватиме як адміністративним центром, так і пам'ятником спадщини [target_character.GetNameWithNoTooltip], забезпечуючи, щоб [target_location.GetNameWithNoTooltip] залишався сяючою нотою в історії, маяком процвітання та культури."
  flavor_mal.33.a: "Допоможемо цьому будівництву."
  flavor_mal.33.b: "Немає потреби будувати ці марні будівлі."
  flavor_mal.33.c: "Грандіозний палац? Ви маєте на увазі ТОЙ грандіозний палац?"