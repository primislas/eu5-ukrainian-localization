l_english:
  ireland.10.title: "Їдка сатира"
  ireland.10.desc: "Бардівська поезія традиційно вважається надійним літописом історії [bard_country.GetCulture.GetName]; як така, вона може бути використана для політичної вигоди.\n\nОдин із бардів на службі у [bard_ruler.GetName] написав особливо нищівну сатиру на [neighbor_ruler.GetName], правителя [neighbor_ruler.GetCountry.GetName].\n\nОкрім дотепних та влучних образ, вона також ставить під сумнів родовід [neighbor_ruler.GetHisHer]."
  ireland.10.a: "Це зруйнує репутацію [neighbor_ruler.GetShortNameWithNoTooltip]!"
  ireland.10.b: "Заспівайте краще про славу [bard_ruler.GetShortNameWithNoTooltip]."
  ireland.11.title: "Їдка сатира"
  ireland.11.desc: "Бардівська поезія традиційно вважається надійним літописом історії [bard_country.GetCulture.GetName]; як така, вона може бути використана для політичної вигоди.\n\nОдин із бардів на службі у [bard_ruler.GetName], правителя [bard_country.GetName], написав особливо нищівну сатиру на нашого правителя, [neighbor_ruler.GetName].\n\nОкрім дотепних та влучних образ, вона також ставить під сумнів родовід [neighbor_ruler.GetHisHer]."
  ireland.11.a: "Репутація [neighbor_ruler.GetShortNameWithNoTooltip] зруйнована!"
  opinion_scathing_bardic_satire: "Їдка бардівська сатира"
  ireland.20.title: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вимагає реформ"
  ireland.20.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] відіграє другорядну роль у нашому суспільстві порівняно з бардівською кастою; коронації та шлюби проводяться вченими поетами, а генеалогії записуються традиційними істориками архаїчною [ROOT.GetCountry.GetCourtLanguage.GetName].\n\nСвященницький клас – звиклий бути провідними суспільними діячами в інших країнах – тепер публічно скаржиться (звісно, мовою [ROOT.GetCountry.GetReligion.GetLanguage.GetName]), що старі звичаї застаріли та є не-[ROOT.GetCountry.GetReligion.GetGroup.GetName]."
  ireland.20.a: "Повністю розпустити бардівський клас."
  ireland.20.b: "Відкупитися від духовенства."
  ireland.20.c: "Цей спосіб життя передує католицизму."
  ireland.30.title: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] скасовує Брегонське право"
  ireland.30.desc: "Надто довго традиційні кельтські звичаї мучили [ROOT.GetCountry.GetName]. Відколи священницький клас взяв під контроль регентство, вони зробили своєю головною метою усунення бардів та брегонів з суспільного життя."
  ireland.30.a: "Ми довіряємо [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] модернізувати [ROOT.GetCountry.GetNameWithNoTooltip]."
  ireland.30.b: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] має займатися молитвами."
  ireland.40.title: "Більш [native_culture.GetNameWithNoTooltip], ніж самі [native_culture.GetNameWithNoTooltip]"
  ireland.40.desc: "Покоління життя серед [native_culture.GetName] призвели до поступової, але визначеної зміни в нашому способі життя. [judgmental_culture.GetName] більше не вважають нас [judgmental_culture.GetNameWithNoTooltip], тоді як [native_culture.GetNameWithNoTooltip] більше не вважають нас прибульцями..."
  ireland.40.a: "Ми стали більш [native_culture.GetNameWithNoTooltip], ніж самі [native_culture.GetNameWithNoTooltip]!"
  ireland.40.b: "Ми повинні зберегти нашу спадщину в цій дикій землі!"
  opinion_gone_native: "Одичавілі"
  ireland.50.title: "Галлогласи"
  ireland.50.desc: "Флотилія [origin_pop.GetCulture.GetName] галер під проводом капітана [captain.GetName] прибула до порту [target_location.GetName].\n\n[captain.GetShortNameWithNoTooltip] стверджує, що його клан був позбавлений своїх рідних земель у [origin_location.GetName], і що його воїни готові служити нашій [ROOT.GetCountry.GetLongName] як вірні піддані, якщо ми дозволимо їм оселитися в [target_location.GetName]."
  ireland.50.a: "Дозвольте їм залишитися!"
  ireland.50.b: "Тут у нас не буде проблем!"