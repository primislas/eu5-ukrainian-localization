l_english:
  flavor_swi.1.title: "Досягнення [target_character.GetNameWithNoTooltip]"
  flavor_swi.1.desc: "Центральна опора у створенні [ShowCultureGroupName('swiss_group')] гвардії для Святого Престолу, [target_character.GetName] міг би послужити нам і в інших справах, якщо ми готові тісніше прив'язати його до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetNameWithNoTooltip], працюючи на наш уряд, міг би підвищити нашу репутацію та відкрити для нас дипломатичні шляхи, які раніше були закриті."
  flavor_swi.1.a: "Яка блискуча людина!"
  flavor_swi.1.b: "Це зовсім не звучить корисно."
  flavor_swi.1.historical_info: "Маттеус Ширнер, єпископ Сіттена з 1499 року, був головним ініціатором про-папської політики у Швейцарській Конфедерації під час Війни Священної Ліги. Завдяки його участі, швейцарські війська були постійно надані Папі, і він забезпечив Конфедерації володіння Беллінцоною."
  flavor_swi.2.title: "[target_character.GetNameWithNoTooltip]"
  flavor_swi.2.desc: "Чутки про мандрівного лікаря, народженого в позашлюбній лінії дрібного дворянства, досягли нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Досить незвичайна особистість, [target_character.GetName] народився в [ShowLocationName('schwyz')] і почав подорожувати, щоб продовжити свої дослідження. Якщо ми спонсоруємо його практику, ми зможемо назавжди забезпечити його послуги."
  flavor_swi.2.a: "Лише практика робить досконалим!"
  flavor_swi.2.b: "Його ставленню тут не місце."
  flavor_swi.2.historical_info: "Теофраст фон Гогенгайм, пізніше перейменувавши себе на Парацельса, був лікарем і філософом, який більшу частину свого життя присвятив пошуку універсальних знань. У 1527 та 1528 роках він провів час у Базелі, як лікар, так і викладач у Базельському університеті. Його змусили покинути місто після розбіжностей щодо його вчень, які він викладав німецькою мовою, а не звичайною латиною, та образ суддів під час судового процесу. Після від'їзду з Базеля він продовжив свої дослідження в Нюрнберзі, Мерано, Аугсбурзі та Зальцбурзі, де зрештою помер від отруєння ртуттю в 1541 році."
  flavor_swi.100.title: "Централізація [GetUniqueInternationalOrganization('swiss_confederation').GetNameWithNoTooltip]"
  flavor_swi.100.desc: "Спочатку альянс між багатьма [ShowCultureGroupName('swiss_group')] кантонами Швейцарського плато та Альп, [GetUniqueInternationalOrganization('swiss_confederation').GetName] перетворилася на функціонуючу державу з великою кількістю внутрішньої політики та зовнішнім, єдиним фронтом. Однак відтепер [GetUniqueInternationalOrganization('swiss_confederation').GetNameWithNoTooltip] буде не просто вільним союзом, а об'єднаною силою, очолюваною [target_character.GetName] з [target_country.GetName], відомою як [GetCountry('SWI').GetLongName]."
  flavor_swi.100.a: "Нехай це призведе до процвітаючого майбутнього!"
  sc_gain_cores_on_switzerland_proper_tt: "Ми отримуємо [Concept('core', 'CONCEPT_PLACEHOLDER')|e] у кожній локації в [ShowAreaName('central_switzerland_area')], [ShowAreaName('eastern_switzerland_area')] та [ShowAreaName('western_switzerland_area')]"
  sc_seize_subject_locations_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у цих [Concept('areas', 'CONCEPT_PLACEHOLDER')|e], що належить будь-якому з наших [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e], які НЕ є частиною [GetUniqueInternationalOrganization('swiss_confederation').GetName], захоплюється нами"
  sc_unify_the_cantons_tt: "Ми об'єднуємо [GetUniqueInternationalOrganization('swiss_confederation').GetName] в єдину сутність"
  flavor_swi.101.title: "$flavor_swi.100.title$"
  flavor_swi.101.desc: "Голоси були віддані. [ShowCultureGroupName('swiss_group')] народ висловив свою думку чітко і голосно. Стара [GetInternationalOrganizationType('swiss_confederation').GetName] буде об'єднана в єдину державу [GetCountry('SWI').GetName] під пильним керівництвом [target_character.GetName] — і ми станемо її частиною."
  flavor_swi.101.a: "Хай живе [GetCountry('SWI').GetFlavorRank]!"
  flavor_swi.101.b: "Ми ніколи ні перед ким не схилимо коліна!"
  sc_every_core_location_breaks_away_tt: "Кожна володіння, яке є [Concept('core', 'CONCEPT_PLACEHOLDER')|e] [target_country.GetName], відривається від нас"
  flavor_swi.110.title: "[GetUniqueInternationalOrganization('swiss_confederation').GetNameWithNoTooltip] та [ShowSituationNameWithNoTooltip('reformation')]"
  flavor_swi.110.desc: "[ShowSituationName('reformation')] поширюється [ShowContinentName('europe')] як лісова пожежа. Родини, друзі та сусіди — колись об'єднані у своїй вірі — стоять на протилежних фронтах. Релігійні конфлікти стали новою нормою, і навіть [GetUniqueInternationalOrganization('swiss_confederation').GetName] не оминула трагедія, оскільки [ShowCultureGroupName('swiss_group')] кантони обертаються один проти одного..."
  flavor_swi.110.historical_info: "Подібно до багатьох інших частин Європи, Швейцарія також сильно постраждала від Реформації, оскільки кілька кантонів прийняли її ідеї, тоді як інші зберегли прокатолицьку позицію. Вплив реформаторів, таких як Цвінглі та Кальвін, ще більше поглибив розрив між кантонами, що зрештою призвело до Першої (1529) та Другої (1531) Каппельських війн."
  flavor_swi.110.a: "Попереду невизначені часи..."
  sc_block_votes_on_non_religious_policies_tt: "Не можна пропонувати жодного [Concept('law', 'CONCEPT_PLACEHOLDER')|e], окрім [ShowLawName('sc_religious_affairs')]"
  sc_religious_chaos_tt: "#R Доки не ухвалено жодної [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] для [ShowLawName('sc_religious_affairs')], [ShowLawName('sc_internal_politics')] та [ShowLawName('sc_war_politics')] діють лише для членів, які сповідують [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] один одного!#"
  flavor_swi.111.title: "Війни [target_location.GetNameWithNoTooltip]"
  flavor_swi.111.desc: "Зростаючий вплив [target_character.GetName], а також нетолерантна політика [ShowPolicyName('sc_enforcing_religious_unity')] залишили [GetUniqueInternationalOrganization('swiss_confederation').GetName] у стані релігійного та політичного неспокою. $flavor_swi.111.desc.fallback$"
  flavor_swi.111.desc.fallback: "[ShowReligionAdjective('catholic')] та [ShowReligionAdjective('lutheran')] члени однаково вороже ставляться один до одного. Така зустріч зрештою переросла в конфлікт у [target_location.GetName], ставши спусковим гачком для того, що стане відомим як Війни [target_location.GetNameWithNoTooltip]."
  flavor_swi.111.historical_info: "Каппельські війни — це серія з двох збройних конфліктів поблизу Каппеля-на-Альбісі між католицькими та протестантськими кантонами. Перша війна (1529) була спровокована зростаючим впливом Ульріха Цвінглі та призвела до заснування Християнського союзу, тоді як друга війна (1531) була спричинена відмовою католиків допомогти протестантським кантонам у Муссоській війні проти Міланського герцогства. Відновлення відносин між католиками та протестантами не відбулося до кінця Зондербундської війни 1847 року."
  flavor_swi.111.a: "Скрутні часи для [GetUniqueInternationalOrganization('swiss_confederation').GetNameWithNoTooltip]"
  sc_every_member_gains_force_convert_cb_tt: "Кожен член отримує [ShowCasusBelliName('cb_heretic')] проти інших єретичних членів"
  flavor_swi.120.title: "[GetUniqueInternationalOrganization('swiss_confederation').GetNameWithNoTooltip] та [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
  flavor_swi.120.desc: "Із закінченням великих релігійних потрясінь, що охопили не лише [GetUniqueInternationalOrganization('hre').GetName], а й значну частину [ShowContinentName('europe')], кантони [GetUniqueInternationalOrganization('swiss_confederation').GetName] переглядають свої вільні стосунки з Імперією. Члени Конфедерації запропонували обговорити тему [ShowLawName('sc_relations_with_hre')]..."
  flavor_swi.120.historical_info: "Швейцарська Конфедерація де-юре була частиною Священної Римської імперії з моменту свого заснування. Однак швейцарські кантони з часом здобували все більшу автономію, зменшуючи вплив імператора Священної Римської імперії в регіоні, що зробило їх де-факто незалежними до 1499 року. Вестфальський мир 1648 року визнав незалежність Швейцарської Конфедерації та підтвердив, що швейцарські землі більше не є частиною Імперії."
  flavor_swi.120.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_swi.121.title: "[GetUniqueInternationalOrganization('swiss_confederation').GetNameWithNoTooltip] покидає Імперію!"
  flavor_swi.121.desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetName] покинула Імперію! Керуючись незадоволенням релігійним миром, а також ослабленням зв'язків з імперськими інституціями, [ShowCultureGroupName('swiss_group')] вирішили, що членство в [GetUniqueInternationalOrganization('hre').GetName] більше не відповідає їхнім інтересам."
  flavor_swi.121.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_swi.999.title: "[ShowCultureGroupNameWithNoTooltip('swiss_group')] Рух за об'єднання"
  flavor_swi.999.desc: "Недавні події в [ShowContinentName('europe')], а також у [ROOT.GetCountry.GetName] викликали безпрецедентний рух у районах, що є традиційними землями [GetUniqueInternationalOrganization('swiss_confederation').GetName]. Оскільки більшість не-[ShowCultureGroupName('swiss_group')] держав вигнано з [ShowAreaName('central_switzerland_area')], [ShowAreaName('eastern_switzerland_area')] та [ShowAreaName('western_switzerland_area')], народ висловив своє бажання щодо єдиної національної держави [GetCountry('SWI').GetName]."
  flavor_swi.999.historical_info: "Історично рух за об'єднання ніколи не існував для Швейцарської Конфедерації як такої. Натомість Швейцарія завжди була вільним союзом самоврядних кантонів до французького вторгнення до Швейцарії в 1798 році під час Французьких революційних війн. Хоча в результаті Гельветична Республіка та наступна Відновлена Швейцарська Конфедерація все ще дотримувалися принципів самоврядних кантонів, республіка на зовнішньому рівні мало чим відрізнялася від будь-якої іншої національної держави. Зі створенням федеральної конституції 12 вересня 1848 року швейцарський союз міст-держав породив першу справжню державу Швейцарії."
  flavor_swi.999.a: "Народ висловився!"
  flavor_swi_999_trigger_at: "Належить члену [GetUniqueInternationalOrganization('swiss_confederation').GetName]"
  sc_unification_movement_event_happens_tt: "Дозволяє [Concept('law', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('sc_unification')] для [GetUniqueInternationalOrganization('swiss_confederation').GetName]"
  flavor_swi.1000.title: "Гільдійська конституція [target_ruler.GetNameWithNoTooltip]"
  flavor_swi.1000.desc: "Гільдії [ShowLocationName('zurich')] здобули важливу перемогу з обранням [target_ruler.GetName] у 1336 році та досягли належного представництва в міській раді. [target_ruler.GetNameWithNoTooltip] швидко впровадив нову конституцію для захисту прав гільдій у міській раді та зламування монополії, яку старі еліти мали над нашою адміністрацією."
  flavor_swi.1000.a: "Гільдійська конституція керуватиме нашою країною."
  flavor_swi.1000.b: "Гільдії необхідно вилучити з ради."
  flavor_swi.1000.historical_info: "Міська рада Цюриха у 1335 році перебувала під домінуванням кількох шляхетних родин та лише найбагатших купців, золотарів, шовкоткачів і майстрів монетного двору. Після перевороту, організованого шляхтою та членами гільдій Цюриха 7 червня 1336 року, Рудольфа Бруна було обрано першим мером міста. Одразу після цього Брун впровадив Гільдійну Конституцію, яка реформувала та реорганізувала Міську раду зі збалансованим складом з 26 членів: 13 зі старої еліти купців і 13 з раніше виключених гільдій."
  flavor_swi.1001.title: "Ніч убивств у [ShowLocationNameWithNoTooltip('zurich')]"
  flavor_swi.1001.desc: "Старі правителі [ShowLocationName('zurich')] намагалися вбити нашого благословенного [target_ruler.GetName]!\n\nПісля їхньої втечі до Рапперсвіля, сусіднього міста, з'єднаного Цюрихським озером, вони задумували та планували свою помсту та повернення до [ShowLocationNameWithNoTooltip('zurich')]. На щастя, [target_ruler.GetNameWithNoTooltip] користується високою популярністю серед гільдій, яким [target_ruler.GetHeShe] надав представництво в раді. Особливо гільдія м'ясників з таким запалом згуртувалася проти зрадників, що ті не мали жодного шансу на успіх у своєму задумі."
  flavor_swi.1001.a: "[ROOT.GetCountry.GetReligion.GetGodName] благослови їхню криваву справу."
  flavor_swi.1001.historical_info: "Після Гільдійної революції 1336 року 22 попередніх членів Ради втекли з Цюриха до сусіднього, контрольованого Габсбургами, міста Рапперсвіль. Звідти вони докладали зусиль для дестабілізації уряду Рудольфа Бруна в Цюриху. Ці зусилля кульмінували в ніч на 24 лютого 1350 року, так звану Ніч убивств у Цюриху. Коли змовники увійшли до міста, впущені симпатиками з Цюриха, вони зустріли запеклий опір з боку Бруна та гільдій, які були заздалегідь поінформовані про змову. Після короткого, але запеклого бою змовники були розгромлені, а перемога Гільдійної революції була забезпечена."
  flavor_swi.1002.title: "Пограбування Рапперсвіля"
  flavor_swi.1002.desc: "Ми найдовше терпіли змовників, які втекли до Рапперсвіля, після нашої Гільдійної революції. Досі нам не потрібно було багато робити, оскільки ми були задоволені нашим правлінням над [ShowLocationName('zurich')]. Але з їхньою підлою агресією, намагаючись убити [target_ruler.GetName], можливо, нам слід викорінити проблему раз і назавжди. Оскільки Рапперсвіль перебуває під контролем [target_location.GetOwner.GetName], конфлікт може ще більше загостритися і накликати на нас їхній гнів."
  flavor_swi.1002.a: "Рапперсвіль має заплатити."
  swi_sacked_our_town: "Пограбували наше місто"
  flavor_swi.1002.b: "Це надто ризиковано."
  flavor_swi.1002.historical_info: "У прямій реакції на спробу перевороту Рудольф Брун вирушив на місто Рапперсвіль, яке підтримувало вигнанців Цюриха. Побоюючись за життя графа Рапперсвіля, Йоганнеса фон Габсбург-Лауфенбурга, місто здалося і було спустошене військами Бруна. За посередництва Людвіга фон Віттельсбаха, маркграфа Бранденбурзького, мир зрештою було відновлено."
  flavor_swi.1003.title: "Повернення вигнанців"
  flavor_swi.1003.desc: "З провалом реформ [target_ruler.GetName] вигнанці, які знайшли притулок у місті Рапперсвіль, здобули значну підтримку серед членів ради [ShowLocationName('zurich')]. Хмарної ночі вони силою увійшли до міста і вбили [target_ruler.GetNameWithNoTooltip] у [target_ruler.GetHerHis] сні. Після смерті [target_ruler.GetNameWithNoTooltip] вигнанці піднесли [target_new_ruler.GetNameWithNoTooltip] до керівництва [ShowLocationNameWithNoTooltip('zurich')] та нашим урядом."
  flavor_swi.1003.a: "Старий порядок нарешті відновлено."
  flavor_swi.1100.title: "[target_character.GetNameWithNoTooltip]"
  flavor_swi.1100.desc: "Зазвичай місцеві священики [ROOT.GetCountry.GetName] призначаються нашим єпископом, однак іноді місцеві жителі відхиляють цю рекомендацію та обирають свого улюбленця. Хоча це не рідкість, призначення [target_character.GetName] виділяється. [target_character.GetNameWithNoTooltip], народжений серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], високо цінується серед наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] за його прості, але зрозумілі проповіді та швидко здобув місцеву славу."
  flavor_swi.1100.a: "Який вправний теолог!"
  flavor_swi.1100.b: "Вправний чи ні, ми повинні слідувати належним правилам."
  flavor_swi.1100.historical_info: "Ульріх Цвінглі був призначений місцевим священиком для парафії Гларус у 1506 році. Його призначили на вимогу місцевого населення, проти рекомендованого Генріха Гьольді з Цюриха, якого населення Гларус побоювалося, що він зацікавлений лише в грошовій експлуатації парафії. Народившись у місцевій селянській родині та показавши себе доступним священиком, Цвінглі швидко здобув високу популярність."
  flavor_swi.1101.title: "[target_character.GetNameWithNoTooltip] Звинувачений у єресі"
  flavor_swi.1101.desc: "Проповіді [target_character.GetName] змінилися за останні кілька років. Якщо спочатку він проповідував відповідно до нашої доктрини, то тепер він схиляється до значного відхилення від неї. Все частіше його промови включають критику наших ритуалів, таких як піст і целібат духовенства. Конфронтація щодо його дій може викликати обурення серед його послідовників, але може бути необхідною, якщо ми хочемо зберегти цілісність нашої віри."
  flavor_swi.1101.a: "Ми повинні провести чесну диспутацію."
  flavor_swi.1101.b: "Усуньте його з посади вже!"
  flavor_swi.conversion.tt: "Деякі з наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ROOT.GetCountry.GetName] перейдуть у [ShowReligionName('lutheran')]."
  flavor_swi.1101.historical_info: "Через кілька років після того, як він почав проповідувати у Швейцарії, Ульріха Цвінглі було звинувачено в єресі членами Домініканського ордену Цюриха. Щоб розслідувати ці суворі звинувачення, велика рада Цюриха скликала диспутацію 29 січня 1523 року. Зібравшись перед 600 теологами, включаючи відомого Йоганна Фабера, Цвінглі зміг захистити свою позицію і був проголошений переможцем дебатів радою."
  flavor_swi.1102.title: "Диспут у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_swi.1102.desc: "[target_character.GetName] блискуче захистив свої тези перед іншими членами нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Його опоненти, захисники [ROOT.GetCountry.GetReligion.GetAdjective] віри, змогли аргументувати лише на основі авторитету традицій та звичаїв, що було абсолютно непереконливо для наших суддів."
  flavor_swi.1102.a: "Гучний успіх для [target_character.GetNameWithNoTooltip]!"
  flavor_swi.1102.b: "Ми не можемо цього прийняти!"
  flavor_swi.large_conversion.tt: "Багато наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetName] перейдуть у [ShowReligionName('lutheran')]."
  flavor_swi.1103.title: "Вплив [target_character.GetNameWithNoTooltip] поширюється"
  flavor_swi.1103.desc: "Завдяки безперервному впливу [target_character.GetName] та інших проповідників, які приєдналися до його справи, [ROOT.GetCountry.GetName] тепер є переважно [ShowReligionAdjective('lutheran')] країною. Через їхній широкий вплив ми не матимемо іншого вибору, окрім як проголосити [ShowReligionNameWithNoTooltip('lutheran')] нашою вірою."
  flavor_swi.1103.a: "Це було неминуче."
  flavor_swi.1104.title: "[ShowReligionAdjectiveWithNoTooltip('lutheran')] підтримка [target_character.GetNameWithNoTooltip]"
  flavor_swi.1104.desc: "Наше населення не схвалило нашого ворожого ставлення до [target_character.GetName]. Вони організували свої протести та почали знищувати релігійні образи та статуї у церквах нашої землі. Ці іконоборці вимагають, щоб [target_character.GetNameWithNoTooltip] був звільнений і йому дозволили знову проповідувати."
  flavor_swi.1104.a: "Ми придушимо повстання!"
  flavor_swi.1104.b: "Поступитися їхнім вимогам."
  zwingli_support_rebels: "Іконоборче повстання Цвінглі"
  zwingli_support_rebels_joining: "Усі [ShowReligionAdjective('lutheran')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetNameWithNoTooltip] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [target_zwingli_support_rebels.GetName]."
  flavor_swi.1200.title: "[ShowBuildingTypeNameWithNoTooltip('swi_collegium_helveticum')]"
  flavor_swi.1200.desc: "Нашому народу бракувало належної установи для навчання членів нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. На щастя, було запропоновано угоду про створення окремої установи, присвяченої теологічній освіті [ShowCultureName('high_alemannic')] народу у [ShowLocationName('milano')]."
  flavor_swi.1200.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  swi_collegium_helveticum_explanation_tt: "Поки існує ця будівля, з'являтимуться талановиті священнослужителі для [ShowCultureGroupName('swiss_group')] країн."
  flavor_swi.1200.b: "Ми повинні розглянути інші варіанти."
  flavor_swi.1200.historical_info: "Освіта швейцарських священнослужителів у Мілані розпочалася з ініціативи міланського архієпископа Карло Борромео та Папи Пія V у 1568 році. Колегіум Гельветікум був пізніше заснований Папою Григорієм XIII. Відбір до 75 слухачів повністю перебував у руках католицьких швейцарських кантонів."
  flavor_swi.1201.title: "Випускник [ShowBuildingTypeNameWithNoTooltip('swi_collegium_helveticum')]"
  flavor_swi.1201.desc: "Ми відправили кількох талановитих членів нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] до [ShowBuildingTypeName('swi_collegium_helveticum')], як дозволяє наша угода. Тепер один з них закінчив навчання і повертається до нас, готовий служити нашим потребам."
  flavor_swi.1201.a: "[ROOT.GetCountry.Custom('common_string_positive')]"