l_english:
  flavor_kie.1.title: "[ShowLocationNameWithNoTooltip('kyiv')] Академія Культури"
  flavor_kie.1.desc: "Задля збереження стовпів [ShowCultureName('ruthenian')] історії та традицій, [target_ruler.GetName] запропонував [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] [ShowLocationName('kyiv')] надати спонсорство для нового [ShowBuildingTypeName('university')] у [target_location.GetRank.GetName]. Планується, що [ShowLocationNameWithNoTooltip('kyiv')] Братство прийматиме цей освітній центр, відкриваючи двері для багатьох громадян у [ROOT.GetCountry.GetName] та за кордоном, щоб їх навчали історії [target_location.GetRank.GetNameWithNoTooltip].\n\nЦе, безперечно, зміцнить [ShowRegionName('ruthenia_region')], але водночас це буде дорога справа. Можливо, [target_ruler.GetNameWithNoTooltip] слід дозволити побудувати такий [ShowBuildingTypeNameWithNoTooltip('university')] з часом, без будь-якого патронажу з боку [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_kie.1.historical_info: "Заснована у 1615 році Київським братством, Києво-Могилянська академія служила однією з небагатьох богословських шкіл православних християн у Рутенії. Хоча спочатку вона не була визнана такою, Гадяцький договір 1658 року підняв її до статусу університету. Після завоювання міста Росією, Петро 'Великий' вирішив не тільки зберегти її, але й дозволив студентам від Санкт-Петербурга до Греції відвідувати там заняття. Лише у 1817 році її закрили, а у 1834 році цар Микола I створив на її місці новий університет – Університет Святого Володимира."
  flavor_kie.1.a: "Наші скарбниці завжди готові до прогресу [ShowLocationNameWithNoTooltip('kyiv')]."
  flavor_kie.1.b: "Вони не мають нашого дозволу на його будівництво."
  flavor_kie.1.c: "Ми використаємо всі наші скарбниці, щоб допомогти їм."
  flavor_kie.1.d: "Вони можуть побудувати його, лише якщо ми за це не платимо."
  flavor_kie.2.title: "Майбутнє класу холопів"
  flavor_kie.2.desc: "До холопів завжди ставилися не краще, ніж до [ShowPopTypeName('slaves')], залишаючи занадто багато наших [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] у [ShowRegionName('ruthenia_region')] страждати від жорстокого поводження вищих класів, таких як [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. У [ROOT.GetCountry.GetName] зростає прагнення скасувати цю експлуатацію, яка шкодить панщинній економіці. Це не сподобається могутньому [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], але це, безперечно, підвищить народну думку про [target_character.GetName]."
  flavor_kie.2.historical_info: "Холопи були основою рутенської економіки з XI століття. Будучи близькими до рабів, власник мав над ними необмежену владу, але також відповідав за їхні дії. У Києві вони становили більшість нижчого класу, до XV століття, коли їм було надано більше прав, і вони стали ближчими до європейських кріпаків."
  flavor_kie.2.a: "Якщо вони хочуть кращого ставлення, то ми їм це гарантуємо."
  flavor_kie.2.b: "Ми тут не для того, щоб накликати гнів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_kie.2.c: "Ці кріпаки вимагають забагато, будьмо до них суворішими!"
  flavor_kie.2.d: "Ця реформа буде нашим найвищим пріоритетом."
  flavor_kie.3.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kie.3.desc_common: "З потребою здобути вплив над [target_location.GetName], наша нація шукала нового Митрополита, щоб правити [target_location.GetRank.GetName]. Одним з таких кандидатів є [target_character.GetName], уродженець місцевого народу."
  flavor_kie.3.desc_RUS: "$flavor_kie.3.desc_common$ Багато хто в [ROOT.GetCountry.GetFlavorRank] вважає, що така [target_character.GetWomanMan] буде згубною для наших зусиль зі зміцнення впливу над [target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip]. Ось чому виникла вимога поставити [target_character.GetHerHim] на чолі Митрополії там."
  flavor_kie.3.desc_ZAZ: "$flavor_kie.3.desc_common$ Будучи прихильним до [target_character2.GetName], багато хто вважає, що така [target_character.GetWomanMan] стане чудовим Митрополитом, вірним підданим, який дозволить нам краще контролювати [target_location.GetNameWithNoTooltip] та краще розвивати його вулиці."
  flavor_kie.3.desc: "$flavor_kie.3.desc_common$ [ROOT.GetCountry.GetGovernment.GetCourtTitle] вважає, що така постать також буде чудовою для нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle], хоча підтримувати [target_character.GetHerHis] позицію в обох місцях може бути дорого."
  flavor_kie.3.a: "Наймімо [target_character.GetHerHim]."
  flavor_kie.3.b: "Нам не потрібен новий Митрополит."
  flavor_kie.3.c: "Мати прихильність як [target_character2.GetNameWithNoTooltip], так і [target_location.GetNameWithNoTooltip] — велика перевага."
  flavor_kie.3.d: "[target_character.GetSheHe|U] допоможе нам підірвати вплив [target_location.GetNameWithNoTooltip]."
  flavor_kie.4.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kie.4.desc: "Оскільки [target_location.GetName] перетворюється на культурний центр, який можуть побачити всі [ROOT.GetCountry.GetAdjective] люди, це також сприяло появі багатьох митців. Одним з них є [target_character.GetName], відомий [ShowArtistTypeName('iconographer')] у [ShowReligionName('orthodox')] громаді [target_location.GetRank.GetName]. Бажаючи відійти від традиційних іконографічних канонів і розвинути [target_character.GetHerHis] новий стиль, [target_character.GetSheHe] тепер бажає бути найнятим у наш [ROOT.GetCountry.GetGovernment.GetCourtTitle], потенційно, щоб здобути нашу прихильність, щоб [target_character.GetSheHe] міг створити [target_character.GetHerHis] власну мистецьку установу в [ROOT.GetCountry.GetNameWithNoTooltip], а також допомогти поширити [ROOT.GetCountry.GetCulture.GetName] культуру по всій [ShowContinentName('europe')]."
  flavor_kie.4.a: "Ми приймаємо всі види мистецтва, навіть ті, що не ідеально пасують [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_kie.4.b: "[target_character.GetSheHe|U] матиме [target_character.GetHerHis] інституцію."
  flavor_kie.4.c: "[target_character.GetSheHe|U] не дозволено в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_kie.5.title: "$st_andrew_church$"
  flavor_kie.5.desc: "Оскільки народ [ROOT.GetCountry.GetName] пишається своїми [ROOT.GetCountry.GetReligion.GetAdjective] звичаями, надійшов запит від громадян, що проживають у [target_location.GetRank.GetName] [target_location.GetName], щоб ми збудували для них нову церкву для молитви до [ROOT.GetCountry.GetReligion.GetGodName]. Ця ідея зацікавила [target_character2.GetName], який хотів би облаштувати там нову резиденцію. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] також підтримують це і рекомендують найняти [target_character.GetName], відомого [target_character.GetArtistType.GetName], щоб допомогти нам спроєктувати такий пам'ятник.\n\nПрисвячений святому Андрію, Апостолу Русі, він також принесе нам прихильність Патріарха та покаже нашу відданість іншим [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] націям."
  flavor_kie.5.a: "Ми допоможемо з будівництвом цієї нової церкви."
  flavor_kie.5.b: "Такий проєкт був би занадто дорогим."
  flavor_kie.6.title: "Митрополія всієї Русі"
  flavor_kie.6.desc: "Зростання [target_location.GetName] привабило багатьох людей [ShowReligionAdjective('orthodox')] та [ShowReligionAdjective('catholic')] віросповідань. Хоча вони обидва вірять в одного [ROOT.GetCountry.GetReligion.GetGodName], релігійні доктрини ніколи не дозволяли їм належним чином співіснувати, зазвичай конфліктуючи через свої вірування щодо Святої Трійці. [target_character.GetName] бажає змінити це, натомість посилюючи [ShowCultureName('ruthenian')] [ShowReligionNameWithNoTooltip('orthodox')] Церкву, віддаляючи її від [ShowCultureGroupName('russian_group')] звичаїв."
  flavor_kie.6.a: "Давайте зміцнимо [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_kie.6.b: "Ми повинні просто залишити це релігійною справою."
  flavor_kie.7.title: "Проблеми в [ShowLocationNameWithNoTooltip('kyiv')]"
  flavor_kie.7.desc: "Недавні розслідування в [target_location.GetRank.GetName] [target_location.GetName] показали, що Митрополит, призначений [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], втратив прихильність місцевого населення. Причиною є права, які ми у них відібрали, ставлячись до цього так, ніби ми були нетерпимими до їхніх [ShowReligionName('orthodox')] звичаїв. Тепер вони бажають відокремитися від [ROOT.GetCountry.GetName] і приєднатися до будь-якого [ShowReligionNameWithNoTooltip('orthodox')] царства, яке захистить їхні права."
  flavor_kie.7.a: "Ми будемо дотримуватися нашої позиції в [target_location.GetNameWithNoTooltip]."
  flavor_kie.7.b: "Можливо, настав час послабити наш контроль над Митрополитом."
  kie_all_kiev_pops_become_angrier_tt: "Усі [ShowReligionAdjective('orthodox')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_kie.8.title: "Новий Митрополит для [ShowLocationNameWithNoTooltip('kyiv')]"
  flavor_kie.8.desc: "[ShowRegionName('ruthenia_region')] довго бракувало Митрополита, щоб керувати своїм народом. Прагнучи виправити це, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] звернулися до [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] з проханням призначити одного зі своїх. Вони стверджують, що це єдиний спосіб забезпечити належне управління регіоном без втручання держави. Ми могли б надати їм цю владу, хоча це ризикувало б збільшити їхній вплив у [target_location.GetName]."
  flavor_kie.8.a: "Якщо вони вимагають, ми виконаємо."
  flavor_kie.8.b: "Ми не дозволимо їм контролювати [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_kie.9.title: "Піднесення неокласичного живопису в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_kie.9.desc: "У [ROOT.GetCountry.GetName] низка менш відомих художників прагнула розвинути новий художній стиль, натхненний естетикою античності. Серед них [target_character.GetName], німий з [ShowLocationName('hlukhiv')], який вивчав і створив кілька визначних робіт. Прагнучи допомогти поширити зростаючий неокласичний рух, [target_character.GetSheHe] тепер шукає роботу під керівництвом [target_character2.GetName] у [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_kie.9.a: "Давайте наймемо цього [target_character.GetWomanMan]."
  flavor_kie.9.b: "Нехай [target_character.GetHerHim] розпише весь [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_kie.9.c: "Ми зупинимо цей рух від руйнування нашого мистецтва, починаючи з [target_character.GetHerHim]."