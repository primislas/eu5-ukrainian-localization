l_english:
  flavor_wittelsbach_house_union.1.title: "Договір у [ShowLocationNameWithNoTooltip('pavia')]"
  flavor_wittelsbach_house_union.1.desc: "Хоча династичний договір, підписаний у 1329 році в [ShowLocationName('pavia')], стабілізував наші династичні відносини, позиція [target_ruler.GetName] з того часу покращилася, і ми тепер можемо спробувати збільшити нашу владу над [target_character.GetName] та [GetCountry('PAL').GetName]. Це зробить нас ненадійним союзником і тиранічним лідером [GetUniqueInternationalOrganization('hre').GetName]. Дотримання договору збереже наш дипломатичний статус і репутацію та дозволить нам мирно об'єднати гілки династії [target_ruler.GetDynasty.GetName] у майбутньому."
  flavor_wittelsbach_house_union.1.a: "Дотриматися Договору!"
  flavor_wittelsbach_house_union.1.a.tt: "Якщо будь-яка сторона договору опиниться в міжцарів'ї, інша сторона зможе успадкувати землю та виборчий статус країни."
  flavor_wittelsbach_house_union.1.b: "Нав'язати нашу перевагу [GetCountry('PAL').GetNameWithNoTooltip]."
  flavor_wittelsbach_house_union.1.historical_info: "Павійський договір 1329 року став основою поділу дому Віттельсбахів на баварську та пфальцьку лінії, які відповідно правили територіями Віттельсбахів. Окрім поділу між двома гілками, договір також намагався вирішити питання курфюрства. Хоча початкове правило передбачало чергування курфюрства між Пфальцем та Герцогством Верхня Баварія, роль курфюрста пізніше була підтверджена за Пфальцем Рейнським. Договір також включав угоду про те, що будь-яка династична лінія перейде до іншої, якщо поточний правитель не матиме прямих спадкоємців чоловічої статі."
  flavor_wittelsbach_house_union.2.title: "[GetCountry('UBV').GetNameWithNoTooltip] Підтверджує старі Договори"
  flavor_wittelsbach_house_union.2.desc: "Договори нашої династії, підписані у 1329 році в [ShowLocationName('pavia')], були знову підтверджені [GetCountry('UBV').GetName]. Дотримання договору здається найвигіднішим для нас, але ми можемо спробувати претендувати на землі, що належать нашим родичам у [GetCountry('UBV').GetNameWithNoTooltip]."
  flavor_wittelsbach_house_union.2.a: "Договір покращить наші відносини."
  flavor_wittelsbach_house_union.2.b: "[ROOT.GetCountry.GetNameWithNoTooltip] пануватиме!"
  flavor_wittelsbach_house_union.3.title: "[GetCountry('PAL').GetNameWithNoTooltip] Переходить до наших рук"
  flavor_wittelsbach_house_union.3.desc: "Зі смертю [target_character.GetName] династія [target_character.GetDynasty.GetName] з [GetCountry('PAL').GetName] вимерла, і трон залишається незайнятим. Згідно з угодами, укладеними в старому Договорі в [ShowLocationName('pavia')], ми маємо сильні претензії на їхні землі і можемо наполягати на об'єднанні стародавніх земель [target_ruler.GetDynasty.GetName] в єдину країну."
  flavor_wittelsbach_house_union.3.a: "Землі [target_ruler.GetDynasty.GetNameWithNoTooltip] ніколи не повинні бути розділені знову."
  flavor_wittelsbach_house_union.3.historical_info: "У 1777 році баварський курфюрст і герцог Максиміліан III Йосиф помер, не залишивши спадкоємця чоловічої статі, щоб успадкувати його володіння. Згідно з Павійським договором та кількома іншими династичними договорами між Баварією та Пфальцем, його титули тепер перейшли до Карла IV Теодора з пфальцької гілки дому Віттельсбахів. Хоча це спричинило Війну за баварську спадщину, народилася нова держава, що складалася з двох попередніх курфюрств. Це об'єднане курфюрство згодом перетворилося на Королівство Баварія."
  flavor_wittelsbach_house_union.4.title: "Смерть [GetCountry('BAV').GetAdjectiveWithNoTooltip] [GetCountry('BAV').GetGovernment.GetRulerTitle]"
  flavor_wittelsbach_house_union.4.desc: "[GetCountry('BAV').GetGovernment.GetRulerTitle] [GetCountry('BAV').GetName] помер без гідного спадкоємця! Згідно зі старими Договорами, підписаними в [ShowLocationName('pavia')], ми тепер маємо сильні претензії на їхні землі і є наступними в черзі на успадкування їхніх володінь."
  flavor_wittelsbach_house_union.4.a: "Настав час об'єднати землі [target_ruler.GetDynasty.GetNameWithNoTooltip]!"
  flavor_wittelsbach_house_union.5.title: "Підкорення [palatine_country.GetAdjective] лінії"
  flavor_wittelsbach_house_union.5.desc: "Складна політика [GetInternationalOrganization('hre').GetName] змінилася. [palatine_country.GetName], керована гілкою династії [bavaria_ruler.GetDynasty], стала підданою [bavaria_country.GetName]. Ця консолідація влади порушує важливе питання щодо представництва династії [bavaria_ruler.GetDynasty] в [GetInternationalOrganization('hre').GetName]. Оскільки [palatine_country.GetName] тепер під [bavaria_country.GetAdjectiveWithNoTooltip] контролем, було вирішено передати титул [ShowSpecialStatusName('elector')] до [bavaria_country.GetName]."
  flavor_wittelsbach_house_union.5.a: "Нехай [bavaria_country.GetNameWithNoTooltip] займе своє законне місце як [ShowSpecialStatusName('elector')]."
  flavor_wittelsbach_house_union.6.title: "Підкорення [bavaria_country.GetAdjective] лінії"
  flavor_wittelsbach_house_union.6.desc: "Тонкий баланс сил у [GetInternationalOrganization('hre').GetName] змінився. [bavaria_country.GetName], керована гілкою династії [palatine_ruler.GetDynasty], була підкорена [palatine_country.GetName]. Цей зворотний розвиток подій порушує ключове питання щодо представництва династії [palatine_ruler.GetDynasty] у [GetInternationalOrganization('hre').GetName]. Оскільки [bavaria_country.GetName] тепер під [palatine_country.GetAdjectiveWithNoTooltip] контролем, було вирішено передати титул [ShowSpecialStatusName('elector')] до [bavaria_country.GetName]."
  flavor_wittelsbach_house_union.6.a: "Нехай [palatine_country.GetNameWithNoTooltip] займе своє законне місце як [ShowSpecialStatusName('elector')]."