l_english:
  flavor_eng.1.title: "[ShowReligionAdjectiveWithNoTooltip('lollardy')] Єресь"
  flavor_eng.1.desc: "У священних залах [target_location.GetName] виник новий релігійний рух, що кидає виклик усталеному порядку. [john_wycliffe.GetName], шанований філософ, виступає за радикальне бачення [ShowReligionGroupName('christian')], спрямоване на розширення прав і можливостей [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] при придушенні корумпованого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та їхньої непристойної ієрархії.\n\nВчення [john_wycliffe.GetHerHis|U] є унікальним тим, що він закликає перекласти Біблію на [ROOT.GetCountry.GetCulture.GetLanguage.GetName], щоб її могли читати та розуміти прості люди.\n\nМи стоїмо перед вибором: активно придушувати єретиків або просто ігнорувати нешкідливі роздуми."
  flavor_eng.1.a: "Зупинити єретиків."
  lots_of_lollards: "Багато наших [ROOT.GetCountry.GetCulture.GetName] [ShowReligionAdjective('catholic')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('great_britain_region')] навернуться до [ShowReligionName('lollardy')]"
  eng_opposes_lollards: "Протистояння лолардам"
  flavor_eng.1.b: "Нехай буде так."
  flavor_eng.1.tt2: "Зусилля, спрямовані на протидію [john_wycliffe.GetHimHer], можуть уповільнити поточне поширення [ShowReligionName('lollardy')]"
  flavor_eng.1.tt3: "Толерована присутність [john_wycliffe.GetHisHer|U] у [target_root_country.GetName], ймовірно, сприятиме поточному поширенню [ShowReligionName('lollardy')]"
  eng_tolerates_lollards: "Толерує лолардів"
  flavor_eng.1.historical_info: "Рух лолардів був релігійним реформаторським рухом в Англії, який набув популярності в чотирнадцятому та п'ятнадцятому століттях, передуючи Реформації. Натхненні вченням Джона Вікліфа, його послідовники прагнули реформувати сприйняту корупцію Католицької Церкви. Лоларди зазнавали переслідувань, а деякі були страчені за свої переконання."
  flavor_eng.2.title: "Кінець Столітньої війни"
  flavor_eng.2.desc: "Територіальні володіння, що колись належали [ROOT.GetCountry.GetName] у [ShowRegionName('france_region')], були втрачені, завдавши нищівного удару нашим амбіціям підкорити [GetCountry('FRA').GetName] та створити велику трансканальну імперію. Ми можемо вистояти та спробувати ще одне відвоювання, або змиритися з гіркою реальністю, що наші грандіозні прагнення можуть зникати."
  flavor_eng.2.a: "Прийняти неминуче."
  eng_no_english_in_france: "Жодного англійця у Франції"
  flavor_eng.2.b: "Ми ніколи не відмовимося від цього!"
  eng_refuse_to_give_up_france: "Відмовитися від Франції"
  flavor_eng.2.c: "Обернути це на нашу користь."
  flavor_eng.2.tt1: "Красномовна та переконлива манера [ROOT.GetCountry.GetGovernment.GetRuler.GetName] майстерно применшує нещодавні територіальні втрати"
  flavor_eng.2.historical_info: "Столітня війна була останньою великою середньовічною війною. Це була війна не лише між королями, але й менші дворяни могли переслідувати свої цілі, беручи участь у більшому конфлікті. Майбутні війни бачили набагато менше фракційності, принаймні в масштабах середньовічних конфліктів. Столітня війна складалася з десятків маленьких воєн і сотень битв та облог, що тривали понад століття, між 1337 і 1453 роками, доки обидві сторони не були виснажені. Хоча жодна сторона не перемогла в будь-якому реальному сенсі, результатом було те, що хоча на початку війни було два королівства, наприкінці їх було дві нації."
  flavor_eng.3.title: "Мирові судді"
  flavor_eng.3.desc: "Існує нагальна потреба посилити підтримання місцевого порядку та миру в громадах. Спори наразі вирішуються місцевими [ShowPopTypeName('nobles')], але їм бракує належної правової бази, що призводить до значного невдоволення з боку [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Щоб вирішити цю проблему, ми пропонуємо створити нову посаду, завданням якої буде вирішення дрібних скарг, усунення заворушень та забезпечення загального спокою в їхніх юрисдикціях."
  flavor_eng.3.a: "Так, вони нам потрібні."
  flavor_eng.3.b: "Ні, це робота дворян."
  flavor_eng.3.historical_info: "Посада мирового судді виникла в Англії у дванадцятому столітті, ймовірно, через Королівський Едикт короля Річарда I та архієпископа Кентерберійського у 1195 році. Спочатку їх називали #italic Custodes Pacis#!, пізніше перейменували на мирових суддів. У 1489 році акт зобов'язав суддів визнавати свої недоліки під час квартальних сесій. Цей акт також надав громадськості право скаржитися безпосередньо монарху або раді на дії суддів. Судді призначалися нерегулярно лордом-канцлером, що дозволяло потенційне усунення незговірливих осіб під час щорічного перевидання повноважень."
  flavor_eng.4.title: "Зростання бюрократів середнього класу"
  flavor_eng.4.desc: "Стає дедалі важче знайти талановитих чоловіків для урядових посад, і лунають голоси, що ми повинні розширити вибір, щоб охопити зростаючий середній клас, зокрема юристів, на додаток до членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Обидві сторони з нетерпінням чекають, чи запровадимо ми таку політику, щоб прислухатися до закликів до змін."
  flavor_eng.4.a: "Надайте їм нашу підтримку."
  enable_yorkist_tradition_policy: "Надає доступ до [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('yorkist_tradition_policy')]"
  flavor_eng.4.b: "Їм немає місця в управлінні."
  flavor_eng.4.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені їхнім постійним виключенням з управління"
  flavor_eng.4.historical_info: "Просування урядовців із середнього класу, насамперед священнослужителів та юристів, було давньою йоркською традицією в Англії. Цьому рішуче протистояли шляхта та духовенство, які вважали це привілеєм, унікальним для людей вищого соціального статусу або божественного призначення."
  flavor_eng.5.title: "Суд Зоряної палати"
  flavor_eng.5.desc: "Правосуддя наразі здійснюється з максимальною ефективністю [ShowPolicyName('common_law_policy')]. Проте судові процеси є надзвичайно повільними, оскільки вони покладаються на прецеденти та рішення суддів. Деякі справи тривають тижні, якщо не місяці, перш ніж буде винесено вердикт. Лунають заклики до створення вторинного судового органу з певною гнучкістю в його процедурах, що дозволить йому розглядати справи, які вважаються занадто чутливими або складними для звичайних судів. Однак потенційним, але скромним ефектом може бути розширення влади [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], придушення опозиції та покарання інакомислення за потреби."
  flavor_eng.5.a: "Невід'ємний інструмент."
  enable_court_of_the_star_chamber_reform: "Надає доступ до [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('court_of_the_star_chamber_reform')]"
  flavor_eng.5.b: "[ShowPolicyNameWithNoTooltip('common_law_policy')] буде достатньо."
  flavor_eng.5.historical_info: "Суд Зоряної палати виник із засідань Таємної ради короля, поступово набуваючи значення за правління Генріха VII. Його назва походить від зоряного візерунка, що прикрашав стелю Вестмінстерського палацу, де він збирався. У 1487 році Суд був заснований як окремий судовий орган, відокремлений від Ради, якому було доручено розглядати петиції про відшкодування."
  flavor_eng.6.title: "Рух обгороджування"
  flavor_eng.6.desc: "Широкі простори сільськогосподарських угідь домінують у сільській місцевості та традиційно використовувалися місцевими громадами для землеробства та випасу худоби. Останні події спонукали землевласників вжити заходів для обгороджування своїх земель з метою підвищення ефективності та продуктивності сільського господарства. Однак це призвело до згубних соціальних наслідків на користь економічної трансформації. Виник рух, що складається з цих землевласників, і вони шукають законодавчого схвалення для просування своїх зусиль."
  flavor_eng.6.a: "Підтримати рух."
  flavor_eng.6.b: "Протистояти руху."
  flavor_eng.6.historical_info: "За маноріальної системи населення Англії, переважно орендарі, рідко покидали свої місця народження. Рух обгороджування, керований аристократичними землевласниками, які прагнули прибутку, витіснив фермерів, що спричинило міграцію до міст. Урбанізація створила дешеву робочу силу для фабрик і шахт, але вона також призвела до бідності, штовхаючи деяких стати «законтрактованими слугами» та мігрувати до північноамериканських колоній."
  flavor_eng.7.title: "Акт про супрематію"
  flavor_eng.7.desc: "Небажання [current_wife.GetName] народити спадкоємця чоловічої статі залишається причиною великого занепокоєння для [ROOT.GetCountry.GetGovernment.GetRuler.GetName], який втомився і натомість захопився наполегливою [anne_boleyn.GetName]. У спробі забезпечити [anne_boleyn.GetHimHer] руку в шлюбі, [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] відправив посланця до [GetCountry('PAP').GetGovernment.GetRulerTitle] з проханням про дозвіл на анулювання [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] поточного шлюбу, що було негайно відхилено відповідно до канонічного права. Завзятий [ROOT.GetCountry.GetGovernment.GetRulerTitle] тепер розглядає більш рішучі кроки, щоб дозволити шлюб, включаючи повний розрив з [GetCountry('PAP').GetAdjective] владою."
  flavor_eng.7.a: "Візьміть командування Церквою."
  flavor_eng.7.a.tooltip: "Багато [ShowReligionAdjective('catholic')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навертаються до [ShowReligionName('anglican')]"
  flavor_eng.7.tt1: "[anne_boleyn.GetName] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.7.tt2: "[anne_boleyn.GetHimHer|U] наполегливий і амбітний характер, а також її участь у придворній політиці антагонізує [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]"
  flavor_eng.7.b: "Прийміть верховенство [GetCountry('PAP').GetNameWithNoTooltip]."
  flavor_eng.7.tt3: "[anne_boleyn.GetHimHer|U] усунення з двору грає на руку інтригам [thomas_wolsey.GetName], який бачить, як [thomas_wolsey.GetHisHer] вплив зростає"
  flavor_eng.7.tt4: "Згорьований [target_root_country.GetGovernment.GetRulerTitle] позбувається [target_root_country.GetGovernment.GetRuler.GetHisHer] нещасної коханки, оскільки перспективи шлюбного союзу зникають у небутті"
  accepted_supremacy_of_rome: "Прийнята верховенство Папи"
  flavor_eng.7.historical_info: "У 1521 році Генріх VIII Англійський отримав папський титул Захисника Віри за свій антилютеранський памфлет. Його увага переключилася на питання престолонаслідування у 1529 році, коли Папська Курія відхилила його пропозицію про розлучення з Катериною Арагонською. Згодом Генріх стратив папського легата, кардинала Волсі, і змусив англійське духовенство визнати його верховним главою Церкви. Забезпечивши своє розлучення у 1533 році, Генріх одружився з Анною Болейн, що стало другим з його шести шлюбів. Акт про верховенство закріпив його владу над Церквою."
  flavor_eng.8.title: "Адміралтейська рада"
  flavor_eng.8.desc: "Адміністративні справи флоту перебувають у віданні [ShowGovernmentReformName('navy_board_reform')], але повсякденні операції залишаються децентралізованими, часто делегованими кожному адміралу. Давайте централізуємо командування, створивши нову раду, відповідальну за нагляд за оперативним командуванням і контролем над нашим гордим флотом, залишивши деталі закупівель та адміністрування в руках бюрократів."
  flavor_eng.8.a: "Тлумачити та будувати."
  flavor_eng.8.b: "Давайте натомість заснуємо Армійську раду."
  flavor_eng.8.historical_info: "Адміралтейська рада, більш відома як Адміралтейство, була заснована, щоб надати зростаючій морській державі ефективне та сильне стратегічне керівництво на морі. Рада наглядала за всіма військовими кораблями, а Військово-морська рада займалася виробництвом та ремонтом, забезпечуючи безперервність. Крім того, Адміралтейство служило тренувальним майданчиком для військових лідерів та політичних діячів у Лондоні."
  flavor_eng.9.title: "[kett_rebellion.GetNameWithNoTooltip]"
  flavor_eng.9.desc: "Група незадоволених фермерів з [ShowProvinceDefinitionName('norfolk_province')] приєдналася до повстанського руху, очолюваного місцевим графом [robert_kett.GetName]. Вони протестують проти економічної нерівності, яку звинувачують у [ShowPolicyName('enclosure_allowed')], що призвело до обгородження громадських земель, витіснення традиційних фермерських громад та сприяло зростанню безробіття в сільській місцевості. Наразі вони шукають підтримки по всій країні, якщо ми не вживемо заходів, щоб зупинити рух, відновивши статус-кво."
  flavor_eng.9.a: "Це для їхнього ж блага."
  flavor_eng.9.tt2: "[ShowPopTypeName('peasants')] з [ShowProvinceDefinitionName('norfolk_province')] збирають незадоволених аграріїв по всій [ShowRegionName('great_britain_region')] і піднімаються на збройне повстання"
  kett_rebellion: "Повстання Кетта"
  flavor_eng.9.b: "Вимагати зняття всіх огорож."
  flavor_eng.9.tt3: "Землевласники [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] протестують проти порушення їхніх земельних привілеїв"
  flavor_eng.9.historical_info: "Повстання Кетта було народним повстанням у Норфолку, Англія. Повстання стало результатом обгородження сільськогосподарських угідь по всій Англії, що обмежувало доступ до землі та призвело до соціально-економічних невдоволень. Повстанці успішно захопили Норвіч, але зрештою були розгромлені, коли королівські війська прорвали міські стіни."
  every_location_norfolk_kett_rebellion_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowProvinceDefinitionName('norfolk_province')] отримує [ShowModifier('kett_rebellion')] на #W 5 років#!"
  flavor_eng.10.title: "Величні апартаменти"
  flavor_eng.10.desc: "Гамірний [target_location.GetRank.GetName] [target_location.GetName] є маяком процвітання та комерції, але [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] опиняється в пастці Вестмінстера, оточений могутніми [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які жадібно утримували особливі права над головним [target_location.GetRank.GetNameWithNoTooltip] з незапам'ятних часів. Ці купці та торговці захопили контроль над вулицями та ринками, використовуючи свій вплив для формування напрямку зростання та розвитку [target_location.GetRank.GetNameWithNoTooltip].\n\nЩоб відновити владу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] та порядок на вулицях, необхідно розробити сміливий новий план. Однією з можливостей є будівництво грандіозних апартаментів на березі річки для [target_ruler.GetName], поблизу величного Тауера [target_location.GetNameWithNoTooltip]. З цієї вигідної позиції [ROOT.GetCountry.GetGovernment.GetRulerTitle] може пильно стежити за містом і показати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], хто насправді тримає владу."
  flavor_eng.10.a: "Вражаючий і підступний вид."
  flavor_eng.10.b: "Поступитися владою в обмін на співпрацю."
  flavor_eng.10.c: "Відстоювати наше право силою."
  flavor_eng.10.historical_info: "Вежа Святого Томаса, широко відома як Ворота Зрадників, є історичною вежею, розташованою в комплексі Лондонського Тауера. Вона виходить на річку Темзу і служила водним входом до Тауера, куди човнами прибували в'язні, звинувачені у державній зраді. Побудована королем Едуардом I у тринадцятому столітті, її призначення було оборонним і забезпечувало прямий доступ з річки Темзи, але вона також служила житлом для королів і королев у певні періоди."
  flavor_eng.11.title: "Мінливі вірності [target_location.GetNameWithNoTooltip]-на-Твіді"
  flavor_eng.11.desc: "Нещодавно завойоване місто [target_location.GetName], розташоване на кордоні між [ROOT.GetCountry.GetName] та [GetCountry('SCO').GetLongName], довгий час було центром конфліктів та напруги. Незважаючи на це, воно зуміло процвітати та зростати, а його купці та торговці отримували вигоду від постійного потоку товарів та людей через кордон.\n\nОднак, оскільки напруженість між двома націями завжди висока, [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] стикається зі складним рішенням. Чи повинні ми продовжувати інвестувати в місто та сприяти його зростанню, чи слід обрати більш обережний підхід та готуватися до неминучого конфлікту?"
  flavor_eng.11.a: "Збудувати фортецю для захисту нашого кордону."
  flavor_eng.11.b: "Відродити місцеву економіку."
  flavor_eng.11.c: "Дозволити йому занепасти."
  flavor_eng.11.historical_info: "Бервік-апон-Твід — найпівнічніше місто Англії, сформоване його стратегічним розташуванням та неодноразовими прикордонними конфліктами між Англією та Шотландією. Власність переходила з рук в руки багато разів протягом Середньовіччя, і значні кошти були витрачені на зміцнення його оборонних можливостей під час Єлизаветинської епохи, з будівництвом нових валів за останніми досягненнями технологій. Конфлікт тривав до Унії 1707 року."
  flavor_eng.12.title: "Шоу Лорда-Хранителя"
  flavor_eng.12.desc: "Шоу Лорда-Хранителя, грандіозне морське видовище, організовується в будь-якому місці, де розташований [ShowBuildingTypeName('cinque_port')], щоб відсвяткувати їхню морську спадщину та продемонструвати їхню військово-морську майстерність. Ця подія, що проводиться кожні кілька років, приваблює відвідувачів зблизька та здалеку, включаючи іноземних високопосадовців та торговців. [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] має можливість зробити цьогорічне шоу в [target_location.GetName] ще більш вражаючим та зміцнити репутацію П'яти Портів як грізних морських захисників."
  flavor_eng.12.a: "Відсвяткувати портовиків з помпою та церемонією."
  flavor_eng.12.b: "Влаштувати захоплюючу морську виставу."
  flavor_eng.12.c: "Відремонтувати порти."
  flavor_eng.12.d: "Річ минулого."
  flavor_eng.12.tt1: "Усі порти занедбані внаслідок зміни настроїв щодо їхнього внеску разом зі скасуванням давніх святкувань"
  flavor_eng.12.tt2: "Порт занедбаний, оскільки сприймається як реліквія минулого"
  flavor_eng.12.tt3: "Традиція згасає"
  decline_of_cinque_ports_tt: "Будівлі [ShowBuildingTypeName('cinque_port')] занепадають"
  flavor_eng.12.historical_info: "Шоу Лорда-Хранителя — це процесія, пов'язана з Лордом-Хранителем П'яти Портів, і використовувалася як церемоніальна демонстрація його влади. Сьогодні воно проводиться щорічно та відзначає морську спадщину та історичне значення П'яти Портів."
  flavor_eng.13.title: "Великий Розкол"
  flavor_eng.13.desc: "Останнім часом багато хто на Півночі розчарувався в Півдні, вважаючи, що їхній регіон ігнорується та занедбується [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Цей розкол загрожує підірвати єдність країни. Ми могли б заспокоїти Північ, інвестуючи в інфраструктуру регіону та просуваючи його унікальну культуру решті [ROOT.GetCountry.GetLongNameWithNoTooltip], або зосередитися на Півдні, використовуючи його більше багатство та владу для зміцнення загальної сили країни."
  flavor_eng.13.a: "Інвестувати в Північ."
  flavor_eng.13.b: "Зміцнити Південь."
  flavor_eng.13.c: "Обрати золоту середину."
  flavor_eng.13.a.custom: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('northumbria_area')] отримує [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.13.b.custom: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('home_counties_area')] отримує [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.13.c.custom: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('midlands_area')] отримує [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.13.historical_info: "Протягом століть Королівство Нортумбрія стояло як могутнє північне царство, відокремлене від решти Англії як культурою, так і політикою. Хоча королівство зрештою впало, культурний розкол між Північчю та Півднем залишається й донині."
  flavor_eng.14.title: "Закриття іноземних пріоратів"
  flavor_eng.14.desc: "В умовах тривалих бойових дій з [GetCountry('FRA').GetLongName], [ROOT.GetCountry.GetGovernment.GetRuler.GetName] вирішив закрити всі іноземні пріорства в [ROOT.GetCountry.GetName]. Кожен згаданий [ShowBuildingTypeName('monastery')] перебував під контролем [GetCountry('FRA').GetAdjectiveWithNoTooltip] релігійних домів, і їхнє подальше існування розглядається як загроза безпеці королівства. Пріори та ченці, які служили в цих домах, будуть вигнані, а самі пріорства розпущені.\n\nОскільки доходи від цих пріорств більше не надходять до [GetCountry('FRA').GetNameWithNoTooltip], є можливість перенаправити їх на підтримку [ROOT.GetCountry.GetAdjectiveWithNoTooltip] релігійних домів. Або ж ці доходи можуть бути конфісковані [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], допомагаючи фінансувати поточні військові зусилля."
  flavor_eng.14.a: "Це має дістатися [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_eng.14.b: "Наші шпиталі гостро потребують допомоги."
  flavor_eng.14.c: "Конфіскувати це для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
  flavor_eng.14.historical_info: "Закриття іноземних пріорств відбувалося в періоди конфліктів або напруженості з Францією, коли англійська монархія прагнула усунути або зменшити вплив іноземних релігійних установ у країні. Закриття часто супроводжувалося вигнанням ченців або черниць та конфіскацією майна."
  flavor_eng.15.title: "Інтриги [jane_grey.GetNameWithNoTooltip]"
  flavor_eng.15.desc: "Будучи далекою кузиною [target_ruler.GetName] та проникливою послідовницею [ShowReligionName('anglican')], [jane_grey.GetName] ретельно маневрувала за допомогою амбітних родичів, щоб висунути [jane_grey.GetHimHer] претензії на [ROOT.GetCountry.GetAdjective] престол. Незважаючи на [jane_grey.GetHimHer] небажання та відсутність загальнонаціональної підтримки, [jane_grey.GetSheHe] зібрала значну кількість прихильників у [ShowProvinceDefinitionName('northumberland_province')], які готові застосувати силу, щоб забезпечити корону для Леді."
  flavor_eng.15.a: "Її претензія не буде визнана!"
  flavor_eng.15.tt1: "[jane_grey.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  jane_grey_support: "Прихильники Джейн Грей"
  STATIC_MODIFIER_NAME_grey_support: "Підтримка Джейн Грей"
  jane_grey_support_nobles_joining: "Всі [ShowReligionAdjective('anglican')] [ShowPopTypeName('nobles')] у [ShowAreaName('northumbria_area')] приєднаються до [jane_grey_support.GetName]"
  flavor_eng.15.b: "Запропонувати перспективу наступника."
  flavor_eng.15.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] виступають проти призначення єретика спадкоємцем"
  flavor_eng.15.c: "Тауер чекає на [jane_grey.GetHimHer]."
  flavor_eng.15.tt3: "Ефективність [ShowPolicyNameWithNoTooltip('secret_police_policy')] разом із владою, яку тримає могутній [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], призводить до ув'язнення та негайної страти неамбітної леді"
  flavor_eng.15.historical_info: "Леді Джейн Грей, онука молодшої сестри короля Генріха VIII Марії, мала претензії на англійський престол. У 1553 році її видали заміж проти її волі за лорда Гілфорда Дадлі, сина герцога Нортумберленда. Нортумберленд, регент короля Едуарда VI, маніпулював Джейн, щоб зберегти свою владу після смерті короля. Хвороба Едуарда VI змусила Нортумберленда підписати документ, що виключав дочок Генріха VIII, Марію I та Єлизавету I, з престолу на користь Джейн, яку проголосили королевою 10 липня 1553 року, але її правління тривало лише дев'ять днів. Католицькі претензії Марії на престол були підтримані країною, що призвело до розсіювання військ Нортумберленда вірними Марії військами."
  flavor_eng.16.title: "Кривавий Союз"
  flavor_eng.16.desc_common: "Блаженний договір між [ROOT.GetCountry.GetName] та [target_country.GetName] вивів на поверхню релігійні розбіжності, з [ShowReligionAdjective('catholic')] вірою, глибоко вкоріненою в серцях [target_country.GetAdjectiveWithNoTooltip] народу, тоді як панівною релігією на наших берегах залишається [religion.GetName]."
  flavor_eng.16.desc_castilian_power: "$flavor_eng.16.desc_common$ Через величезну силу [target_country.GetLongNameWithNoTooltip] ми можемо опинитися на шляху примусового переорієнтування наших лояльностей з [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle] та повернення до [ShowReligionAdjectiveWithNoTooltip('catholic')] лона, або ризикувати побачити наші договори анульованими з нашими папістськими партнерами."
  flavor_eng.16.desc_catholic_ruler: "$flavor_eng.16.desc_common$ [target_ruler.GetName] є побожним [ShowReligionAdjectiveWithNoTooltip('catholic')] і просуває заходи, які повернуть нас до [GetCountry('PAP').GetAdjective] лона, як засіб викорінення єресі та запобігання непоправній шкоді існуючим договорам з нашими папістськими партнерами."
  flavor_eng.16.a: "Відновити [GetCountry('PAP').GetAdjectiveWithNoTooltip] владу."
  flavor_eng.16.b: "Підтвердити релігійну свободу для всіх."
  eng_tolerates_religious_freedom: "Толерує релігійну свободу"
  flavor_eng.16.historical_info: "У 1554 році католицька королева Марія вийшла заміж за Феліпе Іспанського, союз, який відкрив великі можливості як для Англії, так і для Іспанії. Феліпе отримав титул короля Англії від Парламенту, але йому не дозволялося керувати країною. Але нагальне питання полягало в релігії. Акт про верховенство надав монарху контроль над духовенством, але народ Англії був розділений через релігію. Католики вимагали папської влади, тоді як протестанти хотіли ліберальних церковних законів. Марія вирішила приєднатися до фанатичних католиків, і почалася хвиля терору, що принесла їй прізвисько «Кривава Марія»."
  flavor_eng.17.title: "Московська торгова компанія"
  flavor_eng.17.desc: "Морська експедиція, що прямувала на північний схід у спробі досягти берегів [ShowContinentName('asia')], зазнала корабельної аварії біля узбережжя [ShowLocationName('arkhangelsk')], де вцілілі, очолювані відомим дослідником [richard_chancellor.GetName], як повідомляється, почали торгувати з місцевими слов'янами. Дозвольмо торговій компанії сприяти торгівлі з [target_country.GetAdjective] і забезпечити частку в прибутковій торгівлі [ShowGoodsName('fur')]."
  flavor_eng.17.a: "Справжня комерційна можливість."
  flavor_eng.17.tt1: "[richard_chancellor.GetNameWithNoTooltip] додано як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.17.b: "Залишити їх напризволяще."
  flavor_eng.17.tt2: "Доля [richard_chancellor.GetNameWithNoTooltip] залишається невизначеною"
  flavor_eng.17.historical_info: "У 1553 році компанія Merchant Adventurers відправила три кораблі, щоб дістатися до Китаю через Північно-Східний прохід. Хоча більшість кораблів флоту було втрачено, «Едвард Бонавентура» зумів дістатися до Білого моря і висадитися поблизу російського села Архангельськ. Там вони відкрили для себе багатства Росії і вирушили до Москви на санях. Незважаючи на розбіжності в інтересах, Московська торгова компанія була створена і виявилася успішною в російській торгівлі хутром."
  flavor_eng.18.title: "Тіньова робота [francis_walsingham.GetNameWithNoTooltip]"
  flavor_eng.18.desc: "Відомий як майстерний інтриган, [francis_walsingham.GetName] має широкі зв'язки по всій [ShowContinentName('europe')] і бажає використати їх для захисту [ROOT.GetCountry.GetName] від внутрішніх і зовнішніх загроз. Такий проникливий талант може бути необхідним для збереження нашого суверенітету, а [francis_walsingham.GetHisHer] безжальні тактики можуть відлякати будь-якого з наших супротивників від нападу на нас."
  flavor_eng.18.a: "Архітектор інтриг."
  flavor_eng.18.b: "[francis_walsingham.GetSheHe|U] не можна довіряти."
  flavor_eng.18.tt2: "Звільнення [francis_walsingham.GetNameWithNoTooltip] сприймається іншими державами як жест примирення"
  flavor_eng.18.historical_info: "Сер Френсіс Волсінгем був особистим секретарем королеви Єлизавети. Його головним досягненням була досконала організація таємної служби та шпигунської мережі, яка виявилася надзвичайно ефективною у запобіганні всіх змов проти життя королеви та всіх інших політичних і дипломатичних змов. Надзвичайно антиіспанський, він також був покровителем Дрейка і фінансував більшість ранніх експедицій знаменитого капера проти іберійської влади."
  flavor_eng.19.title: "Грошові реформи Томаса Грешема"
  flavor_eng.19.desc: "Фінансовий стратег [thomas_gresham.GetName] має багатий досвід у торгівлі, як внутрішній, так і за кордоном. Він підвищив обізнаність про небезпеку маніпуляцій зі складом валюти, таких як її знецінення або додавання дешевших металів. Натомість він виступає за стандартизацію складу, ваги та якості монет, щоб забезпечити їхню надійність та послідовність. Ми повинні знайти відповідну сферу, щоб повною мірою використати [thomas_gresham.GetHisHer] вправний талант у підтримці цілісності карбування та сприянні стабільності."
  flavor_eng.19.a: "Запросити його до двору."
  flavor_eng.19.tt1: "[thomas_gresham.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.19.b: "Простягнута рука закону."
  flavor_eng.19.tt2: "[thomas_gresham.GetSheHe|U] доручено забезпечувати дотримання законів проти фальшивомонетництва та шахрайства на валютному ринку, відновлюючи довіру громадськості до валюти та сприяючи її стабільності"
  flavor_eng.19.c: "Наш фінансовий агент за кордоном."
  flavor_eng.19.tt3: "[thomas_gresham.GetNameWithNoTooltip] відправлено за кордон до великих фінансових центрів, де він очолює делегацію для закладення основ сучасних монетарних систем"
  flavor_eng.19.d: "Нерішучий зволікач."
  flavor_eng.19.tt4: "[thomas_gresham.GetNameWithNoTooltip] шукає роботу в іншому місці"
  flavor_eng.19.historical_info: "Томас Грешем був англійським фінансистом епохи Тюдорів. Здобувши освіту в Кембриджському університеті, він розбагатів завдяки своїй винятковій діловій хватці і був призначений королівським агентом королем Едуардом VI у 1551 році, цю посаду він продовжував обіймати під час правління Єлизавети I. Грешем зіткнувся з труднощами через знецінення англійської валюти порівняно з іноземними валютами, що перешкоджало його завданням за кордоном. Незважаючи на ці перешкоди, йому вдалося стабілізувати фінансову систему Англії."
  flavor_eng.20.title: "[northern_rebellion.GetNameWithNoTooltip]"
  flavor_eng.20.desc: "THINK"
  flavor_eng.20.a: "The user wants me to translate English game script lines into Ukrainian."
  northern_rebellion: "I need to follow these rules:"
  flavor_eng.20.b: "- One-to-One Mapping: 1 input line -> 1 output line."
  flavor_eng.20.c: "- Variable Preservation: Do NOT translate or modify variables, engine constructs, or escape sequences."
  flavor_eng.20.tt3: "- Historical Tone: Formal, archaic, \"chronicle\" flair for narrative/events; modern technical for UI/mechanics."
  flavor_eng.20.historical_info: "- Specific Terms: \"placeholder\" -> \"заповнювач\". Use modern standard Ukrainian for geographic names, personal names."
  every_pop_in_province_pop_satisfaction_ultimate_penalty_and_northern_rebellion_tt: "- Low-Confidence Flagging: 'POSTEDIT_' for uncertain proper nouns (dynasty, ethnicity, culture)."
  flavor_eng.21.title: "- Format: Plain text output only."
  flavor_eng.21.desc: ""
  flavor_eng.21.a: "Let's go through each line:"
  flavor_eng.21.b: ""
  bawdy_trading: "1.  \"The arrest and subsequent imprisonment of influential [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] from [ShowProvinceDefinitionName('norfolk_province')] in the Tower of [ShowLocationName('london')] has sent shock waves across the political landscape. Their incarceration is an attempt to quell the growing [ShowReligionAdjective('catholic')] movement in [ShowProvinceDefinitionName('northumberland_province')] and [ShowProvinceDefinitionName('westmorland_province')], provinces which host a sizeable heretic population. In response to these arrests, two local members of the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] - [thomas_percy.GetName] and [charles_neville.GetName] - have raised a rebellion, vowing to restore the [ROOT.GetCountry.GetFlavorRank] to the true faith. We are now confronted with an armed uprising unless we release the imprisoned [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] or engage in dialogue with the rebel leaders.\""
  flavor_eng.21.historical_info: "    *   \"arrest and subsequent imprisonment\" -> \"арешт та подальше ув'язнення\""
  flavor_eng.22.title: "    *   \"influential [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]\" -> \"впливових [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]\" (nobles_estate is a variable, keep it)"
  flavor_eng.22.desc: "    *   \"sent shock waves across the political landscape\" -> \"сколихнув політичний ландшафт\""
  flavor_eng.22.historical_info: "    *   \"incarceration is an attempt to quell\" -> \"їхнє ув'язнення є спробою придушити\""
  flavor_eng.22.a: "    *   \"growing [ShowReligionAdjective('catholic')] movement\" -> \"зростаючий [ShowReligionAdjective('catholic')] рух\""
  flavor_eng.22.b: "    *   \"provinces which host a sizeable heretic population\" -> \"провінціях, що мають значну єретичну популяцію\""
  flavor_eng.23.title: "    *   \"In response to these arrests\" -> \"У відповідь на ці арешти\""
  flavor_eng.23.desc: "    *   \"two local members of the [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]\" -> \"два місцеві члени [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]\""
  flavor_eng.23.historical_info: "    *   \"have raised a rebellion, vowing to restore the [ROOT.GetCountry.GetFlavorRank] to the true faith\" -> \"підняли повстання, присягнувшись відновити [ROOT.GetCountry.GetFlavorRank] до істинної віри\""
  flavor_eng.23.a: "    *   \"We are now confronted with an armed uprising unless we release the imprisoned [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] or engage in dialogue with the rebel leaders.\" -> \"Тепер ми стоїмо перед збройним повстанням, якщо не звільнимо ув'язнених [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] або не вступимо в діалог з лідерами повстанців.\""
  irish_pops_rise_up_tt: "    *   Norfolk, London, Northumberland, Westmorland are geographic names, use modern Ukrainian."
  tyrone_rebellion: "    *   Thomas Percy, Charles Neville are names, use modern Ukrainian."
  flavor_eng.24.title: "[ShowGovernmentReformNameWithNoTooltip('petition_of_rights')]"
  flavor_eng.24.desc: "Напруга між [target_character.GetShortName] та [ROOT.GetCountry.GetGovernment.GetParliament.GetName] досягла кульмінації у вимогах наших станів, викладених у сміливому документі — [ShowGovernmentReformName('petition_of_rights')]. Законопроєкт вимагає обмеження [ROOT.GetCountry.GetGovernment.GetAdjective] влади, встановлюючи численні обмеження повноважень [target_character.GetNameWithNoTooltip], розквартирування солдатів у приватних будинках, використання воєнного стану в мирний час та ув'язнення без причини. Підписання його забезпечило б вкрай необхідну співпрацю, але також послабило б нашу владу. Відмова могла б утвердити [ROOT.GetCountry.GetGovernment.GetAdjective] владу, але з ризиком поглиблення розколу з [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  flavor_eng.24.historical_info: "У 1628 році англійський парламент ухвалив Петицію про права внаслідок зловживання владою королем Карлом I, довільних ув'язнень та фінансового безгосподарності. Згідно з її умовами, король не міг стягувати нові податки без згоди парламенту. Крім того, солдати не могли розквартировуватися в приватних будинках, а воєнний стан не міг бути введений у мирний час. Нарешті, Петиція про права забороняла ув'язнення осіб без причини."
  flavor_eng.24.a: "Підписати її."
  flavor_eng.24.b: "Відмовитися підписувати її!"
  flavor_eng.25.title: "Парламентський конфлікт"
  flavor_eng.25.desc: "Зростання напруги в нашому [ROOT.GetCountry.GetFlavorRank] відчувається з моменту прийняття нами абсолютистських тенденцій. Повідомлення про зловживання владою поширюються, оскільки [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер відкрито кидає виклик старим традиціям, встановленим членами [ROOT.GetCountry.GetGovernment.GetParliament.GetName] та станами.\n\nНамагаючись протистояти цьому, [ROOT.GetCountry.GetGovernment.GetRulerTitle] було висунуто ультиматум припинити [target_character.GetHerHis] автократичні тенденції. Багато хто побоюється, що це початок нашого падіння в анархію та потенційну громадянську війну, оскільки люди збираються під прапорами [target_rebel.GetName]."
  flavor_eng.25.historical_info: "У XVI столітті Палата громад зросла в розмірах та впливі, тоді як Палата лордів залишалася меншою. Єлизавета I врівноважувала парламент рішучістю та дипломатією, але її наступники, Яків I та Карл I, мали труднощі. Парламент виступав проти королівського контролю над релігією, правосуддям та податками, і напруга зросла, коли Яків шукав католицьких шлюбних союзів для свого сина. У 1628 році парламент видав Петицію про право, щоб обмежити королівську владу. Карл I розпустив парламент у 1629 році, правлячи одноосібно одинадцять років. Його автократичне правління призвело до Англійської громадянської війни в 1642 році, розділивши націю між роялістами та парламентаріями."
  flavor_eng.25.a: "Ми не будемо вести переговори з [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  flavor_eng.25.b: "Підкоритися [ROOT.GetCountry.GetGovernment.GetParliament.GetName]..."
  parliamentary_rebellion: "Парламентські повстанці"
  flavor_eng25_rebellion_tt: "Приблизно #Y [ROOT.GetVariable('total_rebel_pops_variable').GetValue|V0] тис.#! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] з [ROOT.GetVariable('total_affected_provinces_variable').GetValue] [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('great_britain_region')], таких як [target_province.GetName], приєднаються до [target_rebel.GetName]"
  flavor_eng.26.title: "[ShowPolicyNameWithNoTooltip('act_of_navigation')]"
  flavor_eng.26.desc: "Море — це життєва сила нашого [ROOT.GetCountry.GetFlavorRank], проте іноземні купці з [target_country.GetName] жиріють на нашій торгівлі, тоді як наші власні купці програють конкуренцію на спільних ринках. На таких ринках, як [ShowLocationName('london')], жадібні [target_country.GetAdjectiveWithNoTooltip] купці хижо вчепилися, отримуючи прибуток від торгівлі, яка інакше належала б нам. Тепер, під сильним керівництвом [target_character1.GetName], наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вимагають дій.\n\nБула розроблена смілива нова політика, [ShowPolicyName('act_of_navigation')]. Вона змінить наші ринки на меркантилістську позицію та негайно запровадить ембарго проти купців [target_character2.GetName]. Однак баланс сил та дипломатії є делікатним, і ми повинні вирішувати це питання з максимальною обережністю."
  flavor_eng.26.historical_info: "Кромвель, лорд-протектор Англійської Співдружності, у 1651 році ухвалив Навігаційний акт, спрямований проти голландської перевізної торгівлі, вимагаючи, щоб усі товари до Англії та з неї перевозилися на англійських суднах, посилюючи колоніальну винятковість Англії. Це безпосередньо призвело до англо-голландських воєн 1652-1654 та 1665-1667 років. За Бредським миром 1667 року Англія отримала Новий Амстердам, пізніше перейменований на Нью-Йорк, в обмін на Голландську Гвіану, і Акт був дещо змінений. Незважаючи на це, він залишався інструментальним у морському пануванні Англії та швидкому розширенні її колоніальної торгівлі."
  flavor_eng.26.a: "Ухвалити його!"
  flavor_eng.26.b: "Нинішня політика ідеальна, поки що..."
  flavor_eng.27.title: "Декрет про індульгенцію та Білль про присягу"
  flavor_eng.27.desc: "Бурхливі релігійні справи [ShowContinentName('europe')] мали каскадний ефект по всьому нашому [ROOT.GetCountry.GetFlavorRank]. З прийняттям [ROOT.GetCountry.GetReligion.GetName], суспільство, колись охоплене впливовою рукою [ShowReligionName('catholic')], тепер намагається стримати її вплив та приборкати її духовенство. Заклики до привласнення їхніх маєтків та зменшення їхньої релігійної свободи стають сміливішими, оскільки [ROOT.GetCountry.GetGovernment.GetCourtTitle] розколотий між збереженням атмосфери толерантності або повним прийняттям нашого релігійного запалу проти тих, хто інакше придушив би нашу віру, якби вони мали над нами владу..."
  flavor_eng.27.historical_info: "Карл II був таємним католиком, тоді як його брат Яків II був відкритим. У 1672 році Карл видав Декларацію про індульгенцію, щоб послабити обмеження для дисидентів та католиків, частково з особистих причин, а частково для забезпечення підтримки з боку Франції, як це міг зробити будь-який король, схильний до католицизму. Натомість він таємно отримав велику суму грошей від Франції за договором, укладеним без відома парламенту. Приблизно в той же час парламент ухвалив Акт про присягу, який забороняв неангліканцям, включаючи католиків, обіймати державні посади та дозволяв переслідування. Це підживило вимоги виключити Якова II з лінії престолонаслідування, хоча спроба зрештою провалилася."
  flavor_eng.27.a: "Релігійна свобода для всіх!"
  flavor_eng.27.b: "[ROOT.GetCountry.GetReligion.GetNameWithNoTooltip] пануватиме!"
  flavor_eng.27.c: "Ми повинні прийняти [ShowReligionNameWithNoTooltip('catholic')]."
  flavor_eng.28.title: "Створення нового банку"
  flavor_eng.28.desc: "Зі зростанням витрат на кожну нову війну та фінансами [ROOT.GetCountry.GetFlavorRank] у безладі, група заможних купців та фінансистів запропонувала створити національний банк. Ця установа надаватиме вкрай необхідні позики [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName], стабілізуватиме валюту та централізуватиме державний борг. Однак деякі в [ROOT.GetCountry.GetFlavorRank] виступають проти такого кроку, побоюючись, що це надасть занадто багато влади приватним фінансистам та підірве традиційні джерела кредиту."
  flavor_eng.28.historical_info: "Банк Англії було засновано 1694 року як відповідь на дорогі війни та зростаючу потребу в їх фінансуванні. Незабаром він здобув репутацію серйозності та надійності, зокрема щодо довіри до англійського фунта стерлінгів, у час, коли більшість інших валют були на милості державних банкрутств та знецінення монет. Ця стабільність була переважною у повільному, але постійному зростанні домінування Великої Британії у світовій економіці у XVIII та XIX століттях. Вона також дозволила британському уряду більшу гнучкість у залученні коштів для ведення війни."
  flavor_eng.28.a: "Заснувати його."
  flavor_eng.28.b: "Не поспішаймо."
  flavor_eng.29.title: "[jacobite_uprising.GetNameWithNoTooltip]"
  flavor_eng.29.desc: "Незламний дух [ShowCultureName('highland')] народу спонукав їх повстати під проводом [target_character.GetName]. Останнім часом тисячі стікаються під прапор [jacobite_uprising.GetName] справи. Вони вимагають трон для [target_character.GetShortNameWithNoTooltip], розпалюючи заворушення проти встановленого порядку під [target_sitting_ruler.GetName]. Це лише остання загроза нашому тривалому та процвітаючому правлінню, їхня приречена справа буде негайно розгромлена!"
  flavor_eng.29.historical_info: "Повстання якобітів під проводом графа Мара почалося 1715 року. До кінця вересня більша частина Гайленду була під його контролем, а його армія налічувала близько 5000 осіб, і щодня з'являлися нові. Але все це було зроблено навіть без повідомлення Короля, якого вони нібито підтримували. Старий Претендент, Король Яків III, ще навіть не знав про ситуацію. Слово було надіслано Королю, і чисельність війська продовжувала зростати. Граф зі своєю зростаючою армією рушив до Перта і заснував там свою базу після захоплення міста. Тим часом на півдні формувалася інша якобітська армія, Старий Претендент, почувши новини, почав готуватися до своєї поїздки до Шотландії та своєї коронації. До початку листопада північна якобітська армія налічувала близько 12 000 осіб, переважно клансменів з Гайленду. Тоді граф вирішив рушити на південь, де незабаром зустрів армію герцога Аргайла, єдині урядові війська, що залишилися в Шотландії. Якобітські сили були погано керовані та розділені. Південна армія рушила на південь, щоб підняти Ланкашир, замість того, щоб атакувати фланг герцога Аргайла, тоді як значно менші сили під командуванням герцога розгромили більшу північну армію якобітів при Шеріффмурі 13 листопада. Південна армія також була зустрінута та розгромлена при Престоні іншими урядовими силами в Англії. Якобіти були змушені відступити до Перта, все ще чекаючи прибуття свого лідера. Старий Претендент нарешті прибув до Шотландії 22 грудня, відпливши, що символічно, з Дюнкерка. Але справа вже була вирішена, оскільки герцог Аргайл вже отримував підкріплення досвідчених військ і готував переважні сили для походу на північ. Король, Яків III, знову був змушений відступити після шести похмурих тижнів у Шотландії."
  flavor_eng.29.a: "Ми їх розгромимо!"
  jacobite_uprising: "Якобітське повстання"
  jacobite_uprising_joining: "Усі [ShowCultureName('highland')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('scottish_highlands_area')] приєднуються до [jacobite_uprising.GetName]"
  flavor_eng.30.title: "[robert_walpole.GetNameWithNoTooltip]"
  flavor_eng.30.desc: "Державне управління — це складний танець між дипломатією та м'якою силою. Ті, хто може елегантно орієнтуватися в коридорах влади в [ROOT.GetCountry.GetCapital.GetName], незважаючи на смак солодкості влади, часто прокладають шлях до великих кар'єр у сфері політики. До нас дійшли чутки про дуже здібного члена нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] на ім'я [robert_walpole.GetName]. За свідченнями з перших рук, [robert_walpole.GetSheHe] виявив тверду, справедливу та дипломатичну позицію під час переговорів, довівши [robert_walpole.GetHerselfHimself] як голос розуму та адміністративної проникливості."
  flavor_eng.30.historical_info: "Роберт Волпол, граф Орфорд (1676–1745), був призначений військовим міністром у 1708 році, але втратив свою посаду після того, як його звинуватили в корупційному скандалі, пов'язаному з армійськими контрактами. Однак, зі сходженням Ганноверської династії у 1714 році, його було поновлено на посаді, і він швидко став ключовою політичною фігурою. Будучи рішучим прихильником збереження миру та балансу в Європі, він домінував в англійській політиці з 1721 по 1742 рік як Перший лорд казначейства та Канцлер казначейства — фактично виконуючи обов'язки першого прем'єр-міністра Британії, хоча ця посада тоді ще не існувала."
  flavor_eng.30.a: "[robert_walpole.GetSheHe|U] стане чудовим політиком."
  flavor_eng.31.title: "Вухо капітана Дженкінса"
  flavor_eng.31.desc: "До нас дійшли чутки про напружений обмін між одним із наших капітанів, якого затримало та допитало [target_country.GetAdjective] судно. За словами посланця, з нашим екіпажем жорстоко поводилися, а капітан навіть втратив одне вухо. Це лише останній раунд провокацій від огидного [target_character2.GetName], ми повинні продемонструвати силу!"
  flavor_eng.31.historical_info: "Війна за вухо Дженкінса, яка пізніше переросла у Війну за австрійську спадщину, виникла через незначний, але суперечливий інцидент у 1731 році між іспанськими Guardacostas та екіпажем брига «Глазго» «Ребекка». Капітан Дженкінс стверджував, що під час плавання в Карибському морі його корабель був захоплений, з його екіпажем жорстоко поводилися, а іспанці відрізали йому вухо. Він також заявляв про тортури та погрози смертю. Хоча війна не мала великих битв, вона призвела до відправлення ескадри Ансона, яка зрештою здійснила навколосвітню подорож, а флот адмірала Едварда Вернона розпочав атаки на іспанські території в Карибському морі."
  flavor_eng.31.a: "Око за око..."
  eng_captain_jenkins_incident: "Інцидент з капітаном Дженкінсом"
  flavor_eng.31.b: "Не ризикуймо відкритою війною."
  flavor_eng.32.title: "[jacobite_uprising.GetNameWithNoTooltip]"
  flavor_eng.32.desc: "У часи труднощів і війни можливість для повстання та зради є сприятливою. Відтоді, як ми включили [ShowCultureName('highland')] землі до нашого [ROOT.GetCountry.GetFlavorRank], місцеві жителі в [ShowAreaName('scottish_highlands_area')] шукали будь-якої нагоди, щоб саботувати наше правління. За підбурюванням [target_character.GetName], схоже, вони взялися за зброю проти нас!"
  flavor_eng.32.historical_info: "У 1745 році Карл Едуард Стюарт зі своїми якобітськими прихильниками висадився в Шотландії та здобув перемогу при Престонпансі. Потім він увійшов до Единбурга, оголосивши свого батька Якова королем Шотландії, і рушив до Англії, досягнувши Дербі. Однак обіцяна французька підтримка так і не надійшла, змусивши його відступити. Його армію переслідували британські війська, і в квітні 1746 року Карл був рішуче розгромлений у битві при Каллодені британською армією під командуванням Кумберленда. Ця поразка ознаменувала кінець якобітського повстання та останню серйозну спробу Стюартів повернути собі трон. Нездатність Карла прислухатися до порад своїх генералів вирішила долю династії."
  flavor_eng.32.a: "Ми їх розгромимо!"
  flavor_eng.33.title: "[pitt_the_older.GetNameWithNoTooltip]"
  flavor_eng.33.desc: "[pitt_the_older.GetName], державний діяч виняткової майстерності, нещодавно став домінуючою фігурою в [ROOT.GetCountry.GetAdjective] політиці. Відомий [pitt_the_older.GetHerHis] сильним лідерством у часи війни та [pitt_the_older.GetHerHis] відданістю розширенню [ROOT.GetCountry.GetAdjectiveWithNoTooltip] впливу за кордоном, політика та стратегічне бачення, які [pitt_the_older.GetSheHe] явно володіє, почали надихати інші нації. [pitt_the_older.GetHerHis|U] підхід до питань війни та дипломатії може змінити баланс сил у [ShowContinentName('europe')]."
  flavor_eng.33.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.33.historical_info: "Вільям Пітт, перший Пітт (1708-1778), був онуком губернатора Мадрасу. Спочатку призначений для військової кар'єри, він став депутатом Палати громад, членом партії вігів та палким патріотом. Прагнучи надати Англії світову морську імперію, він очолив коаліційний уряд 1757 року, незважаючи на глибоку ненависть Георга II, і досяг вирішальних результатів у Канаді та Індії. Його відставка у 1763 році врятувала Францію від найжорсткіших положень Паризького договору, що завершив Семирічну війну. Повернувшись до влади у 1766-1778 роках, незважаючи на погане здоров'я, він виступав за війну проти Франції у 1778 році."
  flavor_eng.34.title: "Ост-$india$ська компанія"
  flavor_eng.34.desc: "Багатства заморських берегів нещодавно набули цінності в очах [ROOT.GetCountry.GetAdjective] народу і [target_character1.GetName] зокрема. Завдяки різноманітним експедиціям та заснуванню [target_country.GetLongName] в $india$, ми тепер забезпечили собі плацдарм, з якого можемо розширювати наш територіальний та торговельний вплив!"
  flavor_eng.34.historical_info: "Заснована за два роки до свого голландського аналога, Англійська Ост-Індійська компанія боролася у перші роки свого існування. Її перші торгові пости на Молуккських островах, включаючи Амбоїну, та в Індонезії були незабаром захоплені та закриті голландцями, що змусило компанію переорієнтуватися на Індію, заснувавши бази в Мадрасі, Бомбеї та Калькутті. Там вона досягла найбільшого успіху, перетворившись з невеликих портових торгових постів на величезну Індійську імперію під керівництвом Воррена Гастінгса та Роберта Клайва з 1757 року, зрештою контролюючи більшу частину субконтиненту. Компанія пережила всіх конкурентів і проіснувала до того часу, поки британський уряд не взяв її під контроль у 1867 році після повстання сипаїв 1857 року."
  flavor_eng.34.a: "Ми скористаємося цим!"
  flavor_eng.35.title: "[target_child.GetNameWithNoTooltip]"
  flavor_eng.35.desc: "Йдучи слідами [target_child.GetHerHis] батька, [target_child.GetName] подає великі надії, оскільки одного дня [target_child.GetSheHe] має успадкувати впливову посаду як номінальний лідер у [ROOT.GetCountry.GetAdjective] політиці. Демонструючи чудовий набір навичок у дуже молодому віці, ми можемо бути впевнені, що наступне покоління радників та політиків буде очолювати блискуча молодь!"
  flavor_eng.35.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.35.historical_info: "Вільям Пітт був другим сином Вільяма Пітта, 1-го графа Четема. У грудні 1783 року король Георг III скористався нагодою розпустити коаліцію і попросив 24-річного Пітта сформувати уряд. Коли парламент знову зібрався в січні 1784 року, уряд одразу ж зазнав поразки 39 голосами за фактичну пропозицію про недовіру, але Пітт відмовився подати у відставку, і поступово більшість коаліції в парламенті почала розпадатися. До 8 березня більшість проти нього становила один голос, а 25 березня парламент було розпущено. У 1788 році він підписав Потрійний союз між Британією, Пруссією та Голландією, тим самим забезпечивши, що в майбутній війні його країна не залишиться без союзників, як це було під час Американської революції. У 1790 році він продемонстрував відновлену міць і престиж Британії, домовившись про мир між Австрією та Туреччиною. У 1784 році він прийняв власний Індійський акт, створивши раду контролю, що регулювала індійські справи та Ост-Індійську компанію. Нарешті, у 1791 році було прийнято Канадський конституційний акт. Лондон став відповідальним за уряд як Нижньої, так і Верхньої Канади, але обидві провінції отримали представницькі асамблеї."
  flavor_eng.36.title: "[target_character.GetLastNameWithNoTooltip]ська угода"
  flavor_eng.36.desc: "Важливість дипломатії та відкритої торгівлі часто може призвести до взаємовигідних результатів. Таким є випадок останнього раунду морських переговорів між [target_character.GetName] та [target_country.GetAdjective] делегацією. Завдяки ретельному розгляду та розробці нової торговельної угоди, [target_character.GetSheHe] вважає, що знайшов спільну мову зі своїми [target_country.GetAdjectiveWithNoTooltip] колегами."
  flavor_eng.36.historical_info: "Джон Метуен, народжений у 1650 році, був досвідченим дипломатом, найбільш відомим завдяки договору 1703 року між Англією та Португалією, який дозволяв вільне ввезення англійської вовни та сукна до Португалії в обмін на вільний ввіз португальського портвейну до Англії."
  flavor_eng.36.a: "Прийняти угоду."
  flavor_eng.36.b: "Ми повинні відмовитися."
  flavor_eng.37.title: "Порохова змова"
  flavor_eng.37.desc: "«Пам'ятай, пам'ятай,\nП'яте листопада,\nПорохова зрада і змова.\nЯ не знаю причини,\nЧому порохова зрада,\nМає бути забута.»\n\nВикрито змову з метою підірвати [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [ROOT.GetCountry.GetGovernment.GetParliament.GetName]! Змовники таємно зберігали бочки з порохом під [ROOT.GetCountry.GetGovernment.GetParliament.GetName] і планували підірвати їх під час засідання за присутності [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Їхньою метою було захопити контроль над урядом і повернути [ROOT.GetCountry.GetName] до [ShowReligionName('catholic')]. Хоча змовники, безсумнівно, зіткнуться зі стратою, як нам підійти до [ShowReligionNameWithNoTooltip('catholic')] в цілому?"
  flavor_eng.37.a: "Покарати кожного [ShowReligionAdjectiveWithNoTooltip('catholic')]!"
  eng_harsh_punishment_of_catholics: "Суворе покарання католиків"
  flavor_eng.37.b: "Покарати лише очевидних змовників"
  flavor_eng.37.a.all_cath_pops: "Усі [ShowReligionAdjective('catholic')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.37.historical_info: "Порохова змова була невдалою спробою вбити короля Англії Якова I під час урочистого відкриття парламенту. План підірвати Палату лордів було викрито та зірвано, а змовників заарештовано та страчено. Ця подія сьогодні відзначається як Ніч Гая Фокса феєрверками та багаттями."
  every_other_catholic_kingdom_or_pap_or_empire_lose_opinion_tt: "[GetCountry('PAP').GetName] та кожна [ShowReligionAdjective('catholic')] Імперія та Королівство [Concept('country', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowBiasValue('eng_harsh_punishment_of_catholics')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] про нас"
  flavor_eng.38.title: "[target_artist.GetLastName] публікує [ShowWorkOfArtNameWithNoTooltip('the_leviathan')]"
  flavor_eng.38.desc: "Руйнівні наслідки війни вдома та за кордоном нещодавно стали чудовою мотивацією для [target_artist.GetName] написати одну з [target_artist.GetHerHis] найвеличніших робіт, [ShowWorkOfArtName('the_leviathan')]. Коротко кажучи, публікація обговорює необхідність сильного центрального уряду для протидії насильству та нестабільності, спричиненим конфліктом між внутрішніми фракціями. Така робота, безумовно, посилить нашу владу та надасть нам авторитету щодо централізації [ROOT.GetCountry.GetFlavorRank]!"
  flavor_eng.38.historical_info: "Англійський філософ Томас Гоббс вважав, що природний стан був станом розбрату та хаосу, який міг бути припинений лише тоді, коли індивіди погоджувалися в «Суспільному договорі» віддати свою свободу в руки суверена. Суверен, зі свого боку, був зобов'язаний захищати своїх підданих. Невиконання цього дозволило б народу шукати нового правителя. Досить дивно, але Гоббсу вдалося образити обидві сторони в Англійській громадянській війні, і він провів 11 років у Парижі, перш ніж наважився знову ступити на землю Англії в 1651 році."
  flavor_eng.38.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.39.title: "[target_character.GetNameWithNoTooltip] публікує [ShowWorkOfArtNameWithNoTooltip('wealth_of_nations')]"
  flavor_eng.39.desc: "Широко визнаний піонером у філософії та економіці, [target_character.GetName] знову представив [target_character.GetHerHis] новаторську працю у формі нового трактату — [ShowWorkOfArtName('wealth_of_nations')]. Вона має на меті представити ключові революційні фінансові концепції та зробити сміливі заяви щодо мотивації індивідів у рамках вільного ринку. Така праця є справді зразковою і повинна бути справедливо захоплена як побічний продукт нашої майбутньої спадщини."
  flavor_eng.39.historical_info: "#italic Багатство народів#! було першою великою працею з політичної економії та наріжним каменем того, що пізніше стало відомим як капіталізм laissez-faire (Сміт називав його системою досконалої свободи). Шотландець запровадив концепцію «невидимої руки» — внутрішньої здатності системи досконалої свободи контролювати себе і все ще породжувати впорядковане суспільство через механізм конкуренції."
  flavor_eng.39.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.41.title: "[target_character.GetNameWithNoTooltip]"
  flavor_eng.41.desc: "Поновлені зусилля щодо підтримки інноваційних практик, мистецтв і наук досягли нових висот. Однією з наших провідних постатей у цих зусиллях є не хто інший, як [target_character.GetName], чиї ідеї почали поширюватися навіть за межі наших кордонів. [target_character.GetHerHis|U] теорії про природні права, суспільний договір та роль уряду в захисті свободи та власності надихають як інтелектуалів, так і політичних реформаторів."
  flavor_eng.41.historical_info: "Джон Локк був ініціатором Просвітництва в Англії та Франції, натхненником Конституції США та автором, серед інших праць, #italic Есе про людське розуміння#!. Локк вважав, що знання про світ можна отримати лише досвідом та роздумами над досвідом, і ці знання здобували Бойль, Сіденхем, Християн, Гюйгенс та Ньютон. Вони були справжніми філософами, які просували знання."
  flavor_eng.41.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.42.title: "[isaac_newton.GetNameWithNoTooltip]"
  flavor_eng.42.desc: "Відомий [ROOT.GetCountry.GetAdjective] вчений на ім'я [isaac_newton.GetName] оприлюднив новаторські теорії, які мають на меті змінити розуміння природного світу. Праця з гравітації, руху та математики неодмінно надихне інтелектуалів по всій [ShowContinentName('europe')], знаменуючи світанок нової ери в науковому прогресі та раціональній думці."
  flavor_eng.42.historical_info: "Англійський фізик і математик Ісаак Ньютон був кульмінаційною фігурою наукової революції XVII століття. В оптиці його відкриття складу білого світла інтегрувало явища кольорів у науку про світло і заклало основу сучасної фізичної оптики. У механіці його три закони руху, основні принципи сучасної фізики, призвели до формулювання закону всесвітнього тяжіння. У математиці він був першовідкривачем інфінітезимального числення."
  flavor_eng.42.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.43.title: "[william_shakespeare.GetNameWithNoTooltip]"
  flavor_eng.43.desc: "За всіма ознаками, [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] є домом для одних із найвідоміших митців світу. Від драматургів до поетів і навіть акторів. Усі ці діячі культури невтомно працювали, щоб піднести наше ім'я на золотих сторінках історії. Однак один [william_shakespeare.GetWomanMan] не тільки поєднав майстерність у всіх цих мистецтвах, але й нині прагне піднести їх до безпрецедентних висот. [william_shakespeare.GetName] є видатним прикладом найвищої поваги, чия праця в багатьох мистецьких галузях досліджувала людські та соціальні теми з новою глибиною."
  flavor_eng.43.historical_info: "Англійського поета, драматурга та актора Вільяма Шекспіра часто називають англійським національним поетом і багато хто вважає його найвеличнішим драматургом усіх часів. Його п'єси, написані наприкінці XVI та на початку XVII століть для невеликого репертуарного театру, тепер виконуються та читаються частіше та в більшій кількості країн, ніж будь-коли раніше. Пророцтво його великого сучасника, поета та драматурга Бена Джонсона, що Шекспір «був не для епохи, а для всіх часів», справдилося."
  flavor_eng.43.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.43.tt: "[william_shakespeare.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.43.b: "Немає потреби в погано написаних драмах."
  flavor_eng.44.title: "Шляхетні прихильники лолардів"
  flavor_eng.44.desc: "Рух лолардів здобув низку прихильників у [target_province.GetName] серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], причому деякі аристократи, такі як [target_character.GetName], відкрито виступають за їхнє радикальне послання соціальної справедливості та релігійної реформи.\n\nЦі шляхетні прихильники становлять потенційну загрозу встановленому порядку, оскільки вони мають владу та вплив для поширення лолардських ідей та підриву авторитету корони та Церкви."
  flavor_eng.44.a: "Розправитися зі шляхтою."
  flavor_eng.44.b: "Нехай лорди роблять, що забажають."
  flavor_eng.44.b.tt: "Багато [ShowReligionAdjective('catholic')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] навертаються до [ShowReligionName('lollardy')]"
  STATIC_MODIFIER_NAME_suppressing_heresy: "Придушення єресі"
  flavor_eng.45.title: "Заснування Дому [target_dynasty.GetNameWithNoTooltip]"
  flavor_eng.45.desc: "Численні шляхетні Доми, що населяють наш [ROOT.GetCountry.GetFlavorRank], здавна володіли величезною владою та впливом. Нещодавно з'явилася нова династія під назвою [target_dynasty.GetName], кадетська гілка династії [ShowDynastyNameWithNoTooltip('plantagenet_dynasty')], на чолі з [target_character.GetName]. Їхні амбіції ще не зрозумілі, але вони, схоже, стають серйозним претендентом у [ROOT.GetCountry.GetAdjective] політиці."
  flavor_eng.45.historical_info: "Дім Йорків, кадетська гілка Плантагенетів, дав трьох англійських королів у XV столітті: Едуарда IV, Едуарда V та Річарда III. Походячи від сина Едуарда III, Едмунда Ленглі, він мав сильні претензії на трон, що призвело до конфлікту з Ланкастерами у Війні Троянд. Едуард IV закріпив за собою трон, але правління Річарда III закінчилося при Босворті у 1485 році, започаткувавши епоху Тюдорів. Незважаючи на коротке правління, спадщина Йорків сформувала англійську монархію і залишається впливовою, особливо завдяки шлюбу Єлизавети Йоркської з Генріхом VII, що об'єднав ворогуючі фракції."
  flavor_eng.45.a: "Це може бути тільки на добро!"
  flavor_eng.46.title: "Дім [ShowDynastyNameWithNoTooltip('lancaster_dynasty')]"
  flavor_eng.46.desc: "Дім [ShowDynastyName('lancaster_dynasty')] є відгалуженням нашої власної династії [target.GetDynasty.GetName]. Встановивши шлюб між обома гілками через [target.GetName] та [target_female.GetName], ми можемо забезпечити тісніші стосунки з ними, і вони завжди сприятимуть та працюватимуть на благо [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetAdjective] Дому."
  flavor_eng.46.historical_info: "Другий Дім Ланкастерів був кадетською гілкою Дому Плантагенетів. Він був утворений третім сином короля Едуарда III, що вижив, Джоном Гонтом, який одружився зі своєю кузиною Бланкою Ланкастерською. Вона була дочкою одного з наймогутніших дворян Англії, Генрі Гросмонта, герцога Першого Дому Ланкастерів, гілки, що походила від короля Генріха III. Родина Ланкастерів дала трьох королів Англії, і їхній конфлікт з Домом Йорків за право правити Англією став відомий як Війна Троянд."
  flavor_eng.46.a: "Це може бути тільки на добро!"
  flavor_eng.48.title: "[isabella.GetNameWithNoTooltip] з [target_country.GetNameWithNoTooltip]"
  flavor_eng.48.desc: "Зі зростанням наших амбіцій в [ShowRegionName('iberia_region')] династія [target_dynasty.GetName] забезпечила собі ще один цінний союз. [target_head.GetName] взяв [isabella.GetName] за [target_head.GetHerHis] [isabella.GetWifeHusband], зміцнивши зв'язки династії зі спадщиною [target_country.GetLongName]. Цей новий шлюб ще більше легітимізує наш вплив та претензії на одну з найпрестижніших країн у [ShowContinentName('europe')]. Можливо, настав час забезпечити наше домінування у справах [ShowRegionNameWithNoTooltip('iberia_region')]."
  flavor_eng.48.a: "Біла Троянда!"
  flavor_eng.48.historical_info: "Шлюб у 1372 році Едмунда Ленглі, 1-го герцога Йоркського, та Ізабелли Кастильської, дочки короля Педро I Кастильського та його коханки Марії де Паділья, був політично мотивованим союзом, організованим старшим братом Едмунда, Джоном Гонтом. У той час Джон заявляв про свої претензії на кастильський трон через власний шлюб із сестрою Ізабелли, Констанцією, яка мала династичні права на кастильський трон як найстарша спадкоємиця Педро. Шлюб Ізабелли з Едмундом допоміг ще більше зміцнити амбіції Джона Гонта в Кастилії та посилити його зв'язки з прихильниками Петрістів-«легітимістів»."
  flavor_eng.49.title: "Доля Дому Плантагенетів"
  flavor_eng.49.desc: "Хоча [ROOT.GetCountry.GetGovernment.GetRuler.GetName] ще не має дітей, немає жодного занепокоєння щодо спадкоємності, оскільки існують дві сильні кадетські гілки: Дім [ShowDynastyName('york_dynasty')] та Дім [ShowDynastyName('lancaster_dynasty')].\n\nНапевно, ці Троянди ніколи не матимуть конфлікту..."
  flavor_eng.49.a: "Майбутнє в безпеці!"
  flavor_eng.49.a.tooltip: "Очевидно, це ніколи не може спричинити війну."
  flavor_eng.50.title: "Форма Кулінарії"
  flavor_eng.50.desc: "Майстри-кухарі [target_character.GetName] подарували нам величезну збірку рецептів, що охоплює все: від скромної печені до складних рагу з далеких прянощів.\n\nЦі ароматні страви були розроблені, щоб відповідати високим очікуванням престижних [ROOT.GetCountry.GetGovernment.GetAdjective] бенкетів, але ми могли б адаптувати ці рецепти для [ROOT.GetCountry.GetAdjective] мас як свого роду національну кухню.\n\nУ будь-якому випадку, ця чудова колекція доводить, що [ROOT.GetCountry.GetAdjectiveWithNoTooltip] їжа безперечно найкраща в [ROOT.GetCountry.GetCapital.GetProvince.GetContinent.GetName]."
  flavor_eng.50.historical_info: "«Форма Кулінарії» («cury» означає «кулінарія») була великою збіркою рецептів, написаних особистими кухарями Річарда II.\n\nБагато описаних страв були багаті на іноземні спеції та барвники, що було далеко за межами можливостей будь-якого звичайного кухаря того часу. Насправді, багато рецептів були навіть більш вишуканими та дорогими, ніж сучасні французькі королівські кулінарні книги. Через це було припущено, що екстравагантні кількості були нереалістичними, а натомість частиною пропагандистських зусиль для підвищення престижу англійського королівського двору за кордоном."
  flavor_eng.50.a: "Зберегти ексклюзивність."
  flavor_eng.50.b: "Представити це всім."
  eng_the_forme_of_cury_demand: "Форма Кулінарії"
  flavor_eng.51.title: "Орден Підв'язки"
  flavor_eng.51.desc: "Натхненний легендарними лицарями Круглого столу короля Артура, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] очікує сформувати [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] власне легендарне братство лицарів як [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] елітну свиту.\n\nМи, звичайно, могли б надати цю честь шляхетним фаворитам [ROOT.GetCountry.GetGovernment.GetRulerTitle], але в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] суспільстві є багато інших груп, які б отримали вигоду від такого покровительства."
  flavor_eng.51.a: "Призначити найближчих соратників [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_eng.51.b: "Звеличувати іноземних дворян."
  flavor_eng.51.c: "Заснувати наших духовних лідерів."
  flavor_eng.51.d: "Спонсорувати мистецтво."
  flavor_eng.51.e: "Вшановувати збіднілих ветеранів."
  flavor_eng.52.title: "Лист [target_character.GetLastNameWithNoTooltip]"
  flavor_eng.52.desc: "[target_character.GetName], [target_country.GetAdjective] нотаріус, стверджує, що [deadward.GetName] – наш колишній король, який, як вважалося, був жорстоко вбитий мерзенною династією [ShowDynastyName('mortimer_dynasty')] – насправді досі живий. [target_character.GetLastName] заявляє, що [deadward.GetHeSheFormal] успішно втік з полону і знайшов притулок у скиті поблизу [target_location.GetName], і прожив [deadward.GetHerHis] дні як монах.\n\nЛист виглядає справжнім, але ми не можемо бути впевнені у правдивості цих тверджень. [deadward.GetShortNameWithNoTooltip] широко вважався некомпетентним правителем, але [deadward.GetSheHe] мав могутніх прихильників. Якщо ці твердження виявляться правдивими, вони можуть бути руйнівними для нинішнього порядку."
  flavor_eng.52.historical_info: "У 1337 році Едуард III отримав таємничий лист від італійського священика, який стверджував, що його батько, покійний Едуард II, насправді уникнув своєї жахливої страти і жив як відлюдник на континенті. Наступного року, під час своїх європейських подорожей, сам король зустрівся з певним «Вільямом Валлійцем», якого дехто вважає його вигнаним батьком під виглядом.\n\nСправжня доля поваленого короля залишається під сумнівом донині..."
  flavor_eng.52.a: "Спробувати поховати ці зрадницькі чутки!"
  flavor_eng.52.b: "Дозволити чуткам розростатися."
  flavor_eng.53.title: "Ордонанс про робітників"
  flavor_eng.53.desc: "Цим Ордонансом про робітників відповідаємо на спалах Чорної Смерті в [ROOT.GetCountry.GetName].\n\nЗменшення населення призвело до нестачі робочої сили, що спричинило жорстку конкуренцію між землевласниками та послідовну інфляцію заробітної плати. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], що вижили, можуть вимагати вищих зарплат і більшої свободи, що, своєю чергою, призводить до дорожчого виробництва товарів.\n\nОрдонанс має на меті фіксувати заробітну плату та запровадити контроль над цінами, а також заборонити переманювання чужого слуги."
  flavor_eng.53.a: "Видати його."
  flavor_eng.53.b: "Жодного втручання не потрібно."
  flavor_eng.53.historical_info: "Ордонанс про робітників був законом, прийнятим у 1349 році як прямий наслідок нестачі робочої сили, спричиненої Чорною Смертю. Його метою було регулювання заробітної плати та запобігання виїзду робітників з домівок у пошуках краще оплачуваної роботи в інших місцях, що сприймалося як можливість покращити своє економічне та соціальне становище. Ордонанс також посилив існуючу феодальну систему, але зрештою не зміг забезпечити дотримання правил щодо заробітної плати і був згодом скасований."
  flavor_eng.54.title: "Селянське повстання"
  flavor_eng.54.desc: "Також відоме як повстання [wat_tyler.GetName], Селянське повстання виглядає як велике повстання проти спроби [ROOT.GetCountry.GetGovernment.GetRuler.GetName] сильно оподаткувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')], а також як реакція на соціально-економічні зміни, що відбулися після спалаху Чорної смерті.\n\nПовстання, якщо його не придушити, може призвести до розграбування Тауера [target_location.GetName] та страти кількох [ROOT.GetCountry.GetGovernment.GetAdjective] чиновників. Скасування непопулярного подушного податку разом із стратою лідерів повстанців може відновити порядок, однак низький рівень заворушень, ймовірно, триватиме ще кілька років."
  flavor_eng.54.a: "Це не стосується нас."
  flavor_eng.54.b: "Це не стосується нас."
  flavor_eng.54.c: "Піти на поступки."
  flavor_eng.54.tt: "[wat_tyler.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  wat_tyler_rebellion: "Повстання Вота Тайлера"
  flavor_eng.54.historical_info: "Селянське повстання було великим народним повстанням і вважається одним з найзначніших і найпоширеніших повстань в англійській історії. Широка бідність, високі податки та наслідки Чорної Смерті були факторами, що зробили життя нестерпним для селян, які вже боролися під жорсткою феодальною системою. Повстання було зрештою придушене, багатьох лідерів повстанців схопили та стратили."
  flavor_eng.55.title: "[simon_sudbury.GetNameWithNoTooltip]"
  flavor_eng.55.desc: "Теолог за покликанням, [simon_sudbury.GetName] провів більшу частину своїх років на службі Церкві, спочатку як єпископ [london.GetName], а потім як архієпископ [canterbury.GetName]. Його було призначено лордом-канцлером на велике розчарування [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')], які бачать у ньому головного винуватця своїх бід, оскільки він нещодавно запровадив подушний податок для фінансування поточних військових кампаній проти [GetCountry('FRA').GetName]."
  flavor_eng.55.a: "Природний вибір."
  flavor_eng.55.b: "Нехай [simon_sudbury.GetHimHer] зосередиться на церковних справах."
  flavor_eng.55.historical_info: "Саймон Садбері був релігійним діячем, який служив архієпископом, а пізніше канцлером під час Селянського повстання 1381 року. Під час повстання група повстанців увійшла до Лондона і напала на Лондонський Тауер, що призвело до його захоплення та страти повстанцями. Він став мішенню через його зв'язок з подушним податком та іншими непопулярними політиками, впровадженими під час його канцлерства."
  flavor_eng.56.title: "Пограбування Лондонського Тауера"
  flavor_eng.56.desc: "Повстанці зустріли незначний опір, увійшовши у ворота замку, можливо, тому, що охоронці були ними налякані, і почали грабувати обладунки та [ROOT.GetCountry.GetGovernment.GetAdjective] приладдя.\n\nКлючові члени кабінету [ROOT.GetCountry.GetGovernment.GetRulerTitle] були вистежені та негайно страчені шляхом обезголовлення. [ROOT.GetCountry.GetGovernment.GetRulerTitle] покинув замок раніше того дня, намагаючись домовитися про припинення повстання, натомість члени родини [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] були піддані глузуванням, але повстанці відпустили їх неушкодженими."
  flavor_eng.56.a: "Це не має значення."
  flavor_eng.56.b: "Підкупити повстанців, щоб ті пощадили членів кабінету."
  flavor_eng.57.title: "[geoffrey_chaucer.GetNameWithNoTooltip]"
  flavor_eng.57.desc: "Обіцяючий автор, відомий просто як батько [english.GetName] літератури за його численні літературні твори, такі як #italic Книга герцогині#! та #italic Дім слави#!, з'явився при дворі. [geoffrey_chaucer.GetName] походить з купецької родини і провів більшу частину своєї юності, подорожуючи Західною Європою, перш ніж повернутися до [ROOT.GetCountry.GetName], щоб вивчати право в Іннер Темпл, професійній асоціації адвокатів та суддів.\n\nОтримавши посаду, таку як #italic камердинер#! при [ROOT.GetCountry.GetGovernment.GetAdjective] дворі, це передбачало б кілька поїздок за кордон з широкими можливостями для зустрічей з додатковими вченими."
  flavor_eng.57.a: "Запросити його до двору."
  flavor_eng.57.b: "Нехай він викладає в [ShowLocationNameWithNoTooltip('oxford')]."
  flavor_eng.57.c: "Нехай він викладає в [ShowLocationNameWithNoTooltip('cambridge')]."
  flavor_eng.57.tt2: "[geoffrey_chaucer.GetNameWithNoTooltip] присвячує [geoffrey_chaucer.GetHisHer] час викладанню і навряд чи створить великі літературні твори"
  flavor_eng.57.historical_info: "Джеффрі Чосер найбільш відомий своїм знаковим твором «Кентерберійські оповідання», який вважається одним з найважливіших літературних творів англійською мовою. Його твори сприяли стандартизації англійської мови та її переходу від староанглійської до середньоанглійської. Також державний службовець, він обіймав кілька посад протягом свого життя, включаючи дипломата. Ця посада дозволила йому подорожувати та пізнавати різні культури, що мало глибокий вплив на його твори."
  flavor_eng.58.title: "Кентерберійські оповідання"
  flavor_eng.58.desc: "Збірка з двадцяти чотирьох оповідань, написаних середньою [english.GetName] мовою під назвою #italic Кентерберійські оповідання#!, була опублікована [geoffrey_chaucer.GetName]. Вони зображують історію групи паломників, що подорожують разом з [target_location.GetName] до святині Святого Томаса Бекета в [canterbury.GetName], показуючи різні соціальні класи 14 століття.\n\nТакий дивовижний твір середньовічної літератури міг би стати великим внеском у популяризацію [english.GetNameWithNoTooltip] народної мови в основній літературі. Проте оповідання, схоже, є незавершеним твором."
  flavor_eng.58.a: "Знайдіть нам копію."
  flavor_eng.58.b: "Опублікувати його попередню роботу."
  flavor_eng.58.historical_info: "#italic Кентерберійські оповідання#! були створені Джеффрі Чосером, поетом і філософом, що проживав в Англії протягом чотирнадцятого століття. Вони написані середньоанглійською мовою, яка була мовою простого народу того часу. Чосер мав намір написати сто двадцять оповідань, причому кожен паломник мав по два оповідання, однак твір містить лише двадцять чотири. Тим не менш, персонажі та техніки оповідання залишаються джерелом натхнення і продовжують вивчатися."
  flavor_eng.62.title: "Одкровення Божественної Любові"
  flavor_eng.62.desc: "За повідомленнями, затворниця, що живе в усамітненні поблизу церкви Святого Юліана в [target_location.GetName], отримує серію видінь Страстей Христових. [lady_julian.GetSheHe|U] відома лише як Леді Джуліан і вважається побожною та впливовою фігурою.\n\nНещодавно [lady_julian.GetSheHe|U] захворіла і, ймовірно, перебуває на [lady_julian.GetHisHer] смертному ложі, де, як стверджується, [lady_julian.GetSheHe] отримує ці свої видіння."
  flavor_eng.62.a: "Переконайтеся, що [lady_julian.GetHisHer] потреби задоволені."
  flavor_eng.62.tt1: "Леді Джуліан ще може одужати від своєї хвороби і записати свої переживання"
  flavor_eng.62.b: "[lady_julian.GetSheHe|U] має невелике значення."
  flavor_eng.62.tt2: "Леді Джуліан навряд чи переживе свою хворобу"
  flavor_eng.62.historical_info: "#italic Одкровення Божественної Любові#! вважається одним із найзначніших і найтриваліших творів християнського містицизму. Він ґрунтується на серії видінь, пережитих Юліаною Норвіцькою, яка стверджувала, що отримала їх від Бога під час серйозної хвороби. Видіння були записані поетичною мовою і мали глибокий вплив на християнський містицизм та теологію."
  flavor_eng.63.title: "День Святого Георгія"
  flavor_eng.63.desc: "Шанований як святий за відмову зректися своєї християнської віри під загрозою смерті, Георгій Ліддський не так шанований, як інші святі, такі як Едуард Сповідник та Едмунд Мученик. Ми повинні оголосити цей день святом і урочистістю, і піднести його до покровителя, щоб подякувати за благословення, отримане на полі бою."
  flavor_eng.63.a: "Дзвоніть у дзвони, нехай увесь світ знає."
  flavor_eng.63.b: "Збудувати каплицю на його честь у замку [windsor.GetName]."
  flavor_eng.63.c: "Звучить досить дорого."
  flavor_eng.63.historical_info: "День Святого Георгія є покровителем Англії з пізнього Середньовіччя. Він був оголошений національним святом у вісімнадцятому столітті і пов'язаний з культурною та історичною спадщиною Англії."
  flavor_eng.64.title: "[henry_yevele.GetNameWithNoTooltip]"
  flavor_eng.64.desc: "Нещодавно найнятий майстер-муляр [henry_yevele.GetName] привернув нашу увагу завдяки видатній якості [henry_yevele.GetHisHer] роботи. Такий вправний ремісник, безсумнівно, міг би бути використаний для підвищення пишності та вражаючості наших палаців."
  flavor_eng.64.a: "Представити [henry_yevele.GetHimHer] еліті."
  flavor_eng.64.tt1: "[henry_yevele.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e] і стає відомим своїми великими творами"
  flavor_eng.64.b: "Нехай [henry_yevele.GetHimHer] знайде [henry_yevele.GetHisHer] власний шлях."
  flavor_eng.64.tt2: "[henry_yevele.GetNameWithNoTooltip] шукає роботу в іншому місці"
  flavor_eng.64.historical_info: "Генрі Євель був англійським архітектором, який брав участь у будівництві та реконструкції кількох важливих будівель у пізньому Середньовіччі. Він був призначений «Королівським муляром», що дозволило йому здійснювати значні архітектурні проєкти. Деякі з його найвідоміших будівельних робіт включають Кентерберійський собор та зовнішню стіну та вежі Лондонського Тауера."
  flavor_eng.65.title: "Станнарний закон"
  flavor_eng.65.desc: "У 1201 році [john_lackland.GetName] надав Хартію Свобод шахтарям [ShowGoodsName('tin')] з [cornwall.GetName] та [devon.GetName], що підпорядкувало олов'яників лише юридичній юрисдикції Головного Наглядача та звільнило їх від зобов'язань кріпацтва за феодальної системи. Ця Хартія продовжувала оновлюватися, нещодавно з встановленням судових судів та імунітетом олов'яників від інших судів у [ROOT.GetCountry.GetName]."
  flavor_eng.65.a: "Прийняти його."
  flavor_eng.65.b: "Надати обмежену автономію."
  flavor_eng.65.c: "Абсурд."
  flavor_eng.65.historical_info: "Станнарний закон бере свій початок у середньовічний період і заснував Станнарні суди. Закони охоплювали низку сфер, таких як розташування олов'яних шахт, методи видобутку, заходи безпеки в шахтах та правила збору податків і зборів з виробництва олова. Він також включав кодекс, відомий як Закон Олов'яників, який окреслює обов'язки та права олов'яників, а також визначає такі питання, як розмір та якість олов'яних злитків."
  flavor_eng.66.title: "Станнарні суди"
  flavor_eng.66.desc: "Як було обумовлено, олов'яники [cornwall.GetName] та [devon.GetName] почали створювати власні незалежні [ShowBuildingTypeName('stannary_court')] з метою забезпечення станнарного закону. Вони, ймовірно, залишатимуться на місці до того часу, поки вони більше не служитимуть своїй меті."
  flavor_eng.66.a: "Погоджено."
  flavor_eng.66.a.custom: "[ShowBuildingTypeName('stannary_court')] також будується в кожному іншому [Concept('location', 'CONCEPT_PLACEHOLDER')|e] по всьому [ShowProvinceDefinitionName('cornwall_province')] та [ShowProvinceDefinitionName('devon_province')]"
  flavor_eng.66.historical_info: "Станнарні суди були правовими та адміністративними установами в Корнуоллі та Девоні, які мали багаті родовища олова та велику промисловість для підтримки його видобутку. Судам були надані особливі привілеї, що давали їм юрисдикцію над різними аспектами, що стосуються видобутку олова. Це охоплювало регулювання, оподаткування та правові питання."
  flavor_eng.67.title: "Комерціалізація видобутку олова"
  flavor_eng.67.desc: "Зростання комерціалізації видобутку [ShowGoodsName('tin')] разом із зростанням класу землевласників, представлених у [ShowBuildingTypeName('stannary_court')], призвело до зниження їхньої корисності як керівного інструменту. Судів більше не буде."
  flavor_eng.67.a: "Необхідна річ."
  flavor_eng.67.historical_info: "Експорт олова був значним джерелом доходу для Корони. Виробництво та торгівля оловом процвітали у сімнадцятому столітті після нових технологічних інновацій, однак у наступному столітті почали занепадати через виснаження родовищ та загальну диверсифікацію економіки. Це означало, що олов'яні суди більше не були потрібні для регулювання галузі."
  flavor_eng.68.title: "#italic Дім Слави#!"
  flavor_eng.68.desc: "З огляду на його посаду #italic камердинера#! при [ROOT.GetCountry.GetGovernment.GetAdjective] дворі, [geoffrey_chaucer.GetName] регулярно відправляється за кордон для зустрічей з іншими вченими. Деякі з них нещодавно познайомили його з середньовічною [italian.GetName] поезією, яка стала джерелом натхнення для його оповідань.\n\nЙого внесок досі був інструментальним у легітимізації літературного використання середньовічної [english.GetName], тоді як домінуючими літературними мовами в [ROOT.GetCountry.GetName] все ще були англо-нормандська [french.GetName] та [latin.GetName]."
  flavor_eng.68.a: "Вона належить до [ROOT.GetCountry.GetGovernment.GetAdjective] бібліотеки."
  flavor_eng.68.b: "Розповсюдити її по всій країні."
  flavor_eng.68.historical_info: "#italic Дім Слави#! — це наративна поема, написана Джеффрі Чосером. Вона є частиною збірки оповідань, відомої як #italic Кентерберійські оповідання#!, і розповідає історію самого Чосера, який засинає і бачить сон, у якому його переносять до чудового та фантастичного палацу під назвою Дім Слави. Поема так і не була закінчена, але все ще вважається цінною працею для вчених."
  flavor_eng.69.title: "Бритва Оккама"
  flavor_eng.69.desc: "Суперечливий філософ і теолог [william_ockham.GetName] нині присвячує себе філологічним дослідженням під патронатом [william_patron.GetName]. Він розробив новий принцип вирішення проблем, який наголошує на пошуку «пояснень, побудованих з найменшого можливого набору елементів».\n\nВін вкрай непопулярний серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] через [william_ockham.GetHisHer] опозицію до певних церковних доктрин та відстоювання відокремлення Церкви від держави. Проте його внесок був би корисним для наших великих мислителів."
  flavor_eng.69.a: "Заохочувати її впровадження."
  flavor_eng.69.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розгнівані єретичними вченнями, що посилюється [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_eng.69.b: "Позначити його вчення як єретичні."
  flavor_eng.69.historical_info: "Бритва Оккама — це принцип вирішення проблем та міркування. Вона вважається філософською концепцією, що використовується для прийняття рішень, пояснюючи, що найпростіше рішення є найімовірнішим. Принцип приписується Вільяму Оккаму, філософу та францисканському ченцю, який жив в Англії у чотирнадцятому столітті."
  flavor_eng.70.title: "Занепад [ShowBuildingTypeName('cinque_port')]"
  flavor_eng.70.desc: "Замулення гаваней, спричинене штормами, разом із постійним відступом моря зробило кожен [ShowBuildingTypeName('cinque_port')] у [ShowProvinceDefinitionName('kent_province')] непридатним для використання. Необхідно обрати нове місце, якщо ми хочемо належним чином захистити [ROOT.GetCountry.GetAdjective] узбережжя та зберегти традиції портів, а запропонованими місцями є [ShowLocationName('southampton')], [ShowLocationName('portsmouth')] або [ShowLocationName('rochester')]."
  flavor_eng.70.a: "[ShowLocationNameWithNoTooltip('southampton')]."
  flavor_eng.70.b: "[ShowLocationNameWithNoTooltip('portsmouth')]."
  flavor_eng.70.c: "[ShowLocationNameWithNoTooltip('rochester')]."
  flavor_eng.70.d: "Немає потреби."
  flavor_eng.70.tt1: "[ShowBuildingTypeName('cinque_port')] у [target_location.GetName] #R зруйновано#! і не замінено"
  flavor_eng.70.tt2: "Важливість портів занепадає і може призвести до їх демонтажу"
  flavor_eng.70.historical_info: "Значення П'яти Портів з часом зменшилося через кілька факторів, включаючи зміни у морській війні, створення Королівського флоту та зміни в прибережних районах. До сімнадцятого століття П'ять Портів мали незначне військове та економічне значення."
  flavor_eng.71.title: "Ворбелтон проти Горджеса"
  flavor_eng.71.desc: "Виникла суперечка між двома шляхетними родинами з [ShowProvinceDefinitionName('hampshire_province')] та [ShowProvinceDefinitionName('somerset_province')]. Схоже, члени їхніх відповідних домогосподарств зустрілися в битві під час облоги [calais.GetName], де стало очевидно, що вони мають однаковий герб.\n\nНе маючи змоги вирішити суперечку між собою, вони подали офіційну скаргу для вирішення справи."
  flavor_eng.71.a: "Віддати перевагу Ворбелтонам з [hampshire.GetNameWithNoTooltip]."
  flavor_eng.71.b: "Віддати перевагу Горжам з [somerset.GetNameWithNoTooltip]."
  flavor_eng.71.c: "Домовитися про грошове врегулювання."
  flavor_eng.71.historical_info: "Справа Ворбелтон проти Горжів — це історична судова справа 1347 року щодо гербів. У той час гербові знаки представляли саму ідентичність людини і мали величезне значення для неї та її родини, але вони також мали практичне призначення, оскільки дозволяли особисте розпізнавання в битвах та в юридичних питаннях. Справу виграли Ворбелтони, які змогли представити сильнішу претензію."
  flavor_eng.72.title: "Лорди-апелянти"
  flavor_eng.72.desc: "Група [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] з'явилася при дворі, звинувачуючи [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer|U] Величність у тому, що [ROOT.GetCountry.GetGovernment.GetRuler.GetHeShe] 'мирний, примхливий і тиранічний за своєю природою'. Вони посилаються на процедуру, відому як 'апеляція', щоб розпочати переслідування деяких наших фаворитів при дворі, звинувачуючи їх у непотизмі та державній зраді.\n\nЗа законом, це дозволило б їм створити [ShowGovernmentReformName('ruling_commission_of_england')], що мало б глибокий вплив на [ROOT.GetCountry.GetGovernment.GetAdjective] владу."
  flavor_eng.72.a: "Погодитися на їхні вимоги."
  flavor_eng.72.b: "Відмовитися."
  lords_appellant: "Прихильники бунтівних лордів"
  flavor_eng.72.historical_info: "Лорди-апелянти складалися з п'яти могутніх вельмож, які діяли через зростаюче невдоволення, що виникло через вплив королівських фаворитів та передбачуване погане управління королівством. Вони успішно кинули виклик владі короля та змінили політичний ландшафт Англії."
  flavor_eng.73.title: "Безжальний парламент"
  flavor_eng.73.desc: "Могутній альянс лордів-апелянтів змусив [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName] скликати парламентську сесію для розгляду підступної природи членів кабінету та передбачуваного фаворитизму [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Вони також бажають розглянути мирну позицію щодо [GetCountry('FRA').GetName]. Вони навіть натякають, що ведуться таємні переговори про здачу континентального плацдарму [ROOT.GetCountry.GetNameWithNoTooltip].\n\nПарламент відреагував вороже і засудив майже всіх причетних до смерті."
  flavor_eng.73.a: "Прийняти рішення."
  flavor_eng.73.tt1: "Члени кабінету страчені за їхню непохитну вірність [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_eng.73.b: "Підкупити достатньо перів, щоб забезпечити більшість."
  flavor_eng.73.c: "Досягти компромісу."
  flavor_eng.73.tt: "Комісія, створена лордами-апелянтами, розпущена. Член кабінету, вірний [ROOT.GetCountry.GetGovernment.GetRulerTitle], страчений"
  flavor_eng.73.historical_info: "Безжальний парламент зібрався за правління короля Річарда II, і його назва походить від жорстоких дій та чисток, проведених парламентом проти тих, хто вважався загрозою. Це включало радників та придворних фаворитів, яких судили та стратили, значно зменшивши виконавчу владу короля. Було також прийнято кілька актів, які прагнули обмежити вплив монарха на користь більшої парламентської влади."
  flavor_eng.74.title: "Чорний понеділок"
  flavor_eng.74.desc: "Під час кампанії на півночі [GetCountry('FRA').GetName] раптово починає формуватися шторм. Температура різко падає, б'ють блискавки, і величезні градини починають сипати на солдатів, спричиняючи численні смерті. Коні розбігаються, паніка поширюється, оскільки ті, хто вижив, відчайдушно шукають притулку. Деякі кажуть, що це божественна кара за триваючі звірства, інші говорять про диявольську роботу."
  flavor_eng.74.a: "Лихий день."
  flavor_eng.74.b: "Шукати притулку в сусідньому лісі."
  flavor_eng.74.historical_info: "XIV століття було періодом кліматичної нестабільності, спричиненої похолоданням, відомим як Малий льодовиковий період. Це призвело до екстремальних зим та штормів, і мало руйнівний вплив на англійську армію, що воювала у Франції в той час. Король побачив шторм як знак від Бога і поспішив укласти мир з Францією. Договір у Бретіньї був підписаний через кілька днів."
  flavor_eng.75.title: "Заворушення в день Святої Схоластики"
  flavor_eng.75.desc: "У [target_location.GetName] виникла сутичка в місцевому закладі між корчмарем та зібранням студентів із сусіднього [ShowBuildingTypeName('university')]. Сварка швидко загострюється, оскільки озброєні банди з сільської місцевості входять до міста, щоб допомогти містянам.\n\nУніверситет, і особливо його студенти, з роками стали досить непопулярними серед місцевих жителів через їхню, як вважається, зарозумілість та зневагу до простого життя, і вони не сприймуть жодного втручання з нашого боку."
  flavor_eng.75.a: "Покласти цьому край."
  flavor_eng.75.b: "Місцеві університетські бійки нас не стосуються."
  flavor_eng.75.historical_info: "Заворушення в день святої Схоластики було жорстоким протистоянням між студентами та містянами Оксфорда, що призвело до тривалої напруги між університетом та містянами. Воно швидко загострилося, і кілька студентів та містян загинули. Університет шукав справедливості через Папський суд, який виніс рішення на користь університету."
  flavor_eng.76.title: "Шепіт Залів"
  flavor_eng.76.desc: "До двору прибув емісар з, очевидно, дуже цінною інформацією. Подейкують, що група незадоволених [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], вірних попередньому режиму, таємно планує повалити [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nДеталі щодо спроби перевороту залишаються оповитими таємницею, але значна пожертва в потрібну кишеню може пролити світло на змову."
  flavor_eng.76.a: "Запропонувати монету за інформацію."
  flavor_eng.76.b: "Це чутки. Геть!"
  flavor_eng.76.tt: "Емісару #R відмовлено#!"
  flavor_eng.76.historical_info: "Повстання Богоявлення було невдалим повстанням проти короля Генріха IV. Король зіткнувся з численними повстаннями під час свого правління внаслідок того, що він насильно скинув і ув'язнив попереднього короля Річарда II. Повстання переконало короля, що скинутий, ув'язнений і живий Річард був для нього дуже небезпечною загрозою, і його заморили голодом під час ув'язнення."
  flavor_eng.77.title: "Таємне повстання"
  flavor_eng.77.desc: "Емісаром виявився не хто інший, як молодий [target_character.GetName]. Він продовжує пояснювати, що група [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] на чолі з [john_montagu.GetName] має злісні наміри щодо [ROOT.GetCountry.GetGovernment.GetRulerTitle] і має намір схопити та вбити [ROOT.GetCountry.GetGovernment.GetRuler.GetHimHer] під час запланованого турніру в [windsor.GetName] на свято Богоявлення."
  flavor_eng.77.a: "Прийнято до уваги."
  flavor_eng.78.title: "Свято Богоявлення"
  flavor_eng.78.desc: "І ось починається щорічне святкування на честь візиту волхвів до Дитяти Христа. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] з усього королівства збираються, щоб відвідати цю радісну подію. Богоявленські співи, крейдування дверей та розкішний турнір – це лише деякі з заходів, запланованих на візит [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_eng.78.a: "Таємно скасувати нашу присутність."
  flavor_eng.78.b: "Ми відвідуємо, як і планувалося."
  flavor_eng.78.historical_info: "Свято Богоявлення – це християнське свято, що відзначає візит Трьох Мудреців до немовляти Ісуса у Віфлеємі. Центральним у Богоявленні є хрещення та визнання Ісуса божественною фігурою."
  flavor_eng.79.title: "Повстання Богоявлення"
  flavor_eng.79.desc: "Повстанці прибули до замку [target_location.GetName], щоб виявити, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] відсутній на святкуваннях. Почувши, що їхній план розкрито, вони швидко покинули замок і намагаються підняти прапор повстання."
  flavor_eng.79.a: "Нехай місцева влада розбереться."
  flavor_eng.79.b: "Геть їхні голови!"
  epiphany_rebellion_support: "Повстання Богоявлення"
  flavor_eng.80.title: "Державний переворот"
  flavor_eng.80.desc: "Повстанці прибули до замку [target_location.GetName], щоб виявити, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] перебуває в розпалі святкувань. Їх супроводжують близько чотирьохсот озброєних людей, які швидко затримують [ROOT.GetCountry.GetGovernment.GetRuler.GetName]."
  flavor_eng.80.a: "Запропонувати поступки заради свободи."
  flavor_eng.80.b: "Стояти на своєму."
  flavor_eng.82.title: "Промова Короля"
  flavor_eng.82.desc: "[french.GetName] мова замінила староанглійську при дворі після [norman.GetName] вторгнення 1066 року. Вона залишалася домінуючою мовою в офіційних справах протягом століть, але нещодавно з'явилися заклики до [ROOT.GetCountry.GetGovernment.GetRulerTitle] використовувати натомість мову, широко поширену серед загального населення.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] припустив, що це був би слушний час для її запровадження під час наступного відкриття парламенту."
  flavor_eng.82.a: "Чудова ініціатива."
  flavor_eng.82.b: "Ні, ні, ні. Жахлива ідея."
  flavor_eng.82.historical_info: "Вперше англійська мова була використана для звернення до Англійського парламенту в офіційній якості під час правління короля Едуарда III. Традиційно в парламентських засіданнях використовувалися латина та французька. Причиною цього відступу від традиції, ймовірно, була спроба зменшити вплив французької мови під час конфлікту з Францією, а також засіб підкреслити його англійську спадщину."
  flavor_eng.83.title: "Винахід тенісу"
  flavor_eng.83.desc: "Новий вид ракеткового спорту став досить відомим серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [target_location.GetName]. Походить від англо-нормандського слова #italic Tenez#!, що означає 'тримай!', 'приймай!' або 'бери!', він має схожість зі 'спортом королів' з додатковою умовою, що в нього грають на відкритому повітрі."
  flavor_eng.83.a: "Доручити нашим дипломатам поширити звістку."
  flavor_eng.83.b: "Схвалити будівництво тенісних кортів."
  flavor_eng.83.historical_info: "Найраніша форма тенісу гралася у Франції та Англії в Середні віки. У неї грали на закритих критих кортах, і вона мала складні правила та різні стратегії."
  flavor_eng.84.title: "Золотий флорин"
  flavor_eng.84.desc: "Континентальний флорин використовується по всій Європі, щоб дозволити купцям торгувати по всьому континенту, використовуючи єдину валюту. Кілька країн також створили власну версію флорина, причому [GetCountry('FRA').GetAdjective] альтернатива переважно використовується нашими купцями.\n\nМи повинні запровадити альтернативну [ROOT.GetCountry.GetAdjective] монету, засновану на флорині, яку можна використовувати як всередині країни, так і за кордоном."
  flavor_eng.84.a: "Відкарбувати його."
  flavor_eng.84.b: "Продовжувати використовувати [GetCountry('FRA').GetAdjectiveWithNoTooltip] монету."
  flavor_eng.84.historical_info: "Золотий флорин був золотою монетою, запровадженою в Англії та вперше відкарбованою за правління короля Едуарда III. Його було запроваджено для сприяння міжнародній торгівлі, а також у відповідь на численні інші європейські золоті монети, що карбувалися в той час. Флорин не мав успіху всередині країни та вийшов з ужитку, за винятком міжнародної торгівлі, де він продовжував циркулювати деякий час як прийнятна форма валюти."
  flavor_eng.85.title: "Госпіс Святого Томаса"
  flavor_eng.85.desc: "Паломники з [ROOT.GetCountry.GetName] регулярно подорожують до [target_location.GetName] з надією отримати повну індульгенцію від [target_ruler.GetName]. Однак, нестача житла є постійною проблемою, оскільки відвідувачам доводиться зупинятися в переоцінених, вологих і брудних хостелах.\n\nНевелика громада [ROOT.GetCountry.GetAdjective] продавців розаріїв заснувала постійну присутність у святому місті та розглядає можливість придбання нерухомості, щоб мати змогу розміщувати та доглядати за 'бідними, немічними, нужденними та нещасними особами' з [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_eng.85.a: "Запропонувати королівське заступництво."
  flavor_eng.85.b: "Зробити пожертву."
  flavor_eng.85.c: "Подати милостиню бідним."
  flavor_eng.85.historical_info: "Англійський госпіс Пресвятої Трійці та Святого Томаса був заснований у Римі в 1362 році, коли англійська громада в Римі придбала будинок для розміщення численних паломників, які часто відвідували місто. Це була відповідь на непомірні ціни, що стягувалися за неякісне житло, пропоноване місцевими корчмарями, але насильство та перенаселеність були іншими факторами, що призвели до його заснування."
  flavor_eng.86.title: "Поліхронікон"
  flavor_eng.86.desc: "Бенедиктинський монах та [ROOT.GetCountry.GetAdjective] хроніст, що проживає в [ShowBuildingTypeName('monastery')] Святої Вербурги, уклав хроніку, що зображує найвичерпнішу універсальну історію до цього моменту, включаючи суперечливі твердження, такі як заява, що 'земля кругла, тому що вона відкидає круглу тінь на місяць під час затемнення'.\n\nМи повинні почати переписувати цей magnum opus і використовувати його величезні знання на благо [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_eng.86.a: "Пір'я напоготові."
  flavor_eng.86.b: "Він кишить сюжетними дірами."
  flavor_eng.86.historical_info: "#italic Поліхронікон#! — це середньовічна хроніка, що охоплює широкий спектр історичних подій та знань до 14 століття. Вона поділена на сім книг і сповнена захопливих ідей, що суперечать тому, що було відомо на час її створення. Католицька Церква вважала її єретичним твором."
  flavor_eng.89.title: "Дивний випадок [owain_glyndwr.GetNameWithNoTooltip]"
  flavor_eng.89.desc: "Видатний [GetCountry('WLS').GetAdjective] шляхтич, юрист і військовий командир був оголошений зрадником сусіднім [ROOT.GetCountry.GetAdjective] бароном за невиконання наказу про збір військ для служби.\n\nОфіційно відомий як [owain_glyndwr.GetName], він стверджує, що особисто написав [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] Величності, щоб викласти свою справу. Він також звертався до судів, які відмовилися його прийняти."
  flavor_eng.89.a: "Відмовитися читати листа."
  flavor_eng.89.tt: "[owain_glyndwr.GetNameWithNoTooltip] ймовірно звернеться до [GetCountry('WLS').GetAdjectiveWithNoTooltip] асамблеї"
  flavor_eng.89.b: "Скасувати рішення судів."
  flavor_eng.90.title: "Повстання Гліндура"
  flavor_eng.90.desc: "[GetCountry('WLS').GetAdjective] обрали нового лідера з бунтівними намірами. Називаючи себе просто «Овайн Гліндур», він зумів об'єднати [ShowEstateTypeName('nobles_estate')] і оголосив про плани відновити традиційне [GetCountry('WLS').GetAdjectiveWithNoTooltip] право, незалежну Церкву та скликання національного парламенту."
  flavor_eng.90.a: "Придушити повстання."
  flavor_eng.90.historical_info: "Також відоме як Валлійське повстання, Повстання Гліндура було бунтом, очолюваним Овайном Гліндуром, валлійським шляхтичем, нащадком князів Повісу. Його спровокувало невдоволення серед валлійського населення, яке відчувало себе маргіналізованим і погано трактованим. Коли повстання поширилося, він оголосив себе законним Принцом Уельсу і розпочав повстання проти англійського панування. З часом Англія успішно придушила повстання, і воно закінчилося невдачею."
  flavor_eng.91.title: "Шляхтич, захоплений [owain_glyndwr.GetNameWithNoTooltip]"
  flavor_eng.91.desc: "Нещодавня прикордонна сутичка з [GetCountry('WLS').GetAdjective] повстанцями призвела до захоплення одного з наших шляхтичів, [edmund_mortimer.GetName]. Почали поширюватися чутки, що він приєднався до [GetCountry('WLS').GetAdjectiveWithNoTooltip] справи з незбагненних для нас причин.\n\nШляхетний дім [percy_dynasty.GetName] з [northumberland.GetName], близькі друзі родини [mortimer_dynasty.GetName], просять дозволити їм викупити свого родича."
  flavor_eng.91.a: "Заборонити це. Конфіскувати маєтки [mortimer_dynasty.GetNameWithNoTooltip]."
  flavor_eng.91.tt1: "Родини [percy_dynasty.GetNameWithNoTooltip] та [mortimer_dynasty.GetNameWithNoTooltip] сильно ображені"
  flavor_eng.91.b: "Сплатити викуп."
  flavor_eng.91.tt2: "[edmund_mortimer.GetNameWithNoTooltip] звільнено"
  flavor_eng.91.historical_info: "Захоплення Едмунда Мортімера мало значні наслідки для політичного ландшафту того часу. Він мав претензії на англійський престол у час, коли Англія переживала політичні потрясіння, а його родина розглядалася як потенційні суперники короля. Його захоплення послабило будь-яку опозицію королю, оскільки зв'язок Мортімера з валлійським повстанням підірвав його легітимність і претензії."
  flavor_eng.92.title: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip] Імператор відвідує [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_eng.92.desc: "Лідер [GetCountry('BYZ').GetName] подорожує на захід у пошуках підтримки від інших християнських монархів, щоб допомогти їм у їхній боротьбі з [GetCountry('TUR').GetName].\n\nМісто [target_province.GetName] ймовірно впаде перед сарацинами, якщо не вдасться отримати достатньо золота для організації оборони."
  flavor_eng.92.a: "Запропонувати монети та притулок."
  flavor_eng.92.b: "Тут для [GetCountry('BYZ').GetGovernment.GetRuler.GetHimHer] нічого немає."
  flavor_eng.92.historical_info: "У грудні 1400 року візантійський імператор подорожував до Англії, щоб зустрітися з королем Генріхом IV. Це було частиною дипломатичного наступу, спрямованого на згуртування підтримки проти зростаючої загрози Османської імперії, яка небезпечно наблизилася до завоювання Константинополя, столиці Візантії. Візит мав помірний успіх, але не зміг забезпечити достатньо коштів для зміцнення імперії."
  flavor_eng.93.title: "De heretico comburendo"
  flavor_eng.93.desc: "Єресь залишається поширеною по всьому нашому володінню, причому рух [lollard.GetName] зокрема набирає обертів і виявляється важко викорінюваною. Ми повинні запропонувати новий закон, який карає тих, хто має інші вірування, очищенням вогнем, і посилити наші зусилля з пошуку та знищення всіх тих, хто ще не усвідомив помилковості своїх шляхів."
  flavor_eng.93.a: "Ухвалити його."
  flavor_eng.93.tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] посилюють свої зусилля з пошуку релігійних меншин і спалюють їх за бажанням"
  flavor_eng.93.b: "Ці заходи надто суворі."
  flavor_eng.93.historical_info: "#italic De heretico comburendo#! був законом, ухваленим в Англії наприкінці XIV століття. Він використовувався для переслідування та покарання єретиків і, зрештою, для виправдання спалення єретиків, чиї погляди суперечили офіційній доктрині Католицької Церкви."
  flavor_eng.94.title: "[john_capgrave.GetNameWithNoTooltip]"
  flavor_eng.94.desc: "Винятковий лектор і відомий теолог, праці [john_capgrave.GetName] включають збірку житій [ROOT.GetCountry.GetAdjective] святих. Зазвичай зосереджуючи свою роботу на різних аспектах релігійного життя, він нещодавно розпочав створення рамки для світової історії, використовуючи августинську систему як точку відліку. У цих працях він також моралізує на історичні події та зображення, намагаючись надати духовний і моральний орієнтир.\n\nБудучи дуже активною особистістю в багатьох освітніх колах і широко визнаним у всіх з них, його таланти могли б бути використані для натхнення деяких з наших найвидатніших умів."
  flavor_eng.94.a: "Бажане поповнення при дворі."
  flavor_eng.94.tt1: "[john_capgrave.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.94.b: "Дозволити йому вільно викладати свої тлумачення."
  flavor_eng.94.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлюють невдоволення через протидію [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.94.c: "Спалити його за єресь."
  flavor_eng.94.tt3: "[ShowPolicyName('de_heretico_comburendo')] наказує, що єретики повинні бути спалені"
  flavor_eng.94.historical_info: "Джон Капгрейв був істориком, теологом і письменником. Він найбільш відомий своїми історичними працями та теологічними трактатами, зокрема #italic Хронікою Англії#!, переказом історії Англії від її легендарних витоків до року її публікації. Його внесок у середньовічну літературу та історію був неоціненним для істориків і надає унікальне уявлення про повсякденне життя XV століття."
  flavor_eng.95.title: "Тристороння угода"
  flavor_eng.95.desc: "Родини [percy_dynasty.GetName] та [mortimer_dynasty.GetName] уклали угоду з [GetCountry('WLS').GetAdjective] лідером [GetCountry('WLS').GetGovernment.GetRuler.GetName], згідно з якою [ROOT.GetCountry.GetName] буде розділено між ними. Їхні об'єднані сили можуть становити серйозну загрозу територіальній цілісності нашої країни.\n\n[mortimer_dynasty.GetNameWithNoTooltip] спробують забезпечити північ, тоді як [percy_dynasty.GetNameWithNoTooltip] наступатимуть із заходу."
  flavor_eng.95.a: "Нечестивий союз, що не заслуговує на милосердя."
  flavor_eng.95.b: "Звернутися до родини [percy_dynasty.GetNameWithNoTooltip]."
  percy_uprising: "Повстанці Персі"
  flavor_eng.95.tt2: "Родина [percy_dynasty.GetNameWithNoTooltip] може скласти зброю в обмін на значну суму золота"
  flavor_eng.95.c: "Звернутися до родини [mortimer_dynasty.GetNameWithNoTooltip]."
  mortimer_uprising: "Повстанці Мортімера"
  flavor_eng.95.tt3: "Родина [mortimer_dynasty.GetNameWithNoTooltip] може скласти зброю в обмін на щедру пожертву"
  flavor_eng.95.tt4: "Родини [percy_dynasty.GetNameWithNoTooltip] та [mortimer_dynasty.GetNameWithNoTooltip] збирають свої армії у [ShowProvinceDefinitionName('northumberland_province')] та [ShowProvinceDefinitionName('staffordshire_province')]"
  flavor_eng.95.historical_info: "Тристороння угода була домовленістю про поділ Англії та Уельсу за рахунок правлячого монарха Генріха IV. У разі успіху вона розділила б Англію на три окремі королівства."
  flavor_eng.96.title: "[john_thornton.GetNameWithNoTooltip]"
  flavor_eng.96.desc: "Декан [target_location.GetName] нещодавно замовив скління [target_location.GetNameWithNoTooltip] [ShowBuildingTypeName('cathedral')], і роботу має виконати високо рекомендований скляр та художник вітражів [john_thornton.GetName]. Його високо рекомендують після створення одних із найкращих вітражів у країні, і [john_thornton.GetHisHer] внесок у готичний архітектурний стиль не залишився непоміченим."
  flavor_eng.96.a: "Поширте звістку про [john_thornton.GetHisHer] винятковий талант."
  flavor_eng.96.tt1: "[john_thornton.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.96.b: "Наш замок у [windsor.GetName] не завадило б оновити."
  flavor_eng.96.c: "Залиште [john_thornton.GetHimHer] у спокої."
  flavor_eng.96.tt2: "[john_thornton.GetNameWithNoTooltip] шукає роботу в іншому місці"
  flavor_eng.96.historical_info: "Джон Торнтон був художником вітражів і запам'ятався своєю роботою над Східним вікном Йоркського собору, одним із найбільших і найвеличніших зразків середньовічного вітражного мистецтва в Європі. Вона вважається шедевром середньовічного мистецтва."
  flavor_eng.97.title: "Біблія Вікліфа"
  flavor_eng.97.desc: "Наріжним каменем руху [ShowReligionName('lollardy')] є здатність читати та розуміти вчення Біблії. Оскільки [english.GetName] є загальноприйнятою мовою, має сенс перекласти слово нашого Господа, щоб допомогти християнам у вивченні Євангелія."
  flavor_eng.97.a: "Спробувати опублікувати її."
  flavor_eng.97.a.custom: "Перекладена копія опублікована на честь [john_wycliffe.GetName]"
  flavor_eng.97.a.custom2: "Публікацію перекладеної копії Біблії заборонено"
  flavor_eng.97.tt1: "Політика #italic De Heretico Comburendo#! забороняє цю публікацію, і спроби зробити це викличуть обурення"
  flavor_eng.97.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені цією публікацією через [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.97.b: "Вистежити призвідників."
  flavor_eng.97.tt3: "Політика #italic De Heretico Comburendo#! дозволяє [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] спалити винуватців цієї пропозиції"
  flavor_eng.97.c: "Виступити проти."
  flavor_eng.97.tt4: "Лоларди вважають це зрадою"
  flavor_eng.97.historical_info: "Біблія Джона Вікліфа була першим повним перекладом Біблії англійською мовою і відіграла значну роль у розвитку англійської мови та допомогла стандартизувати її. Переклад базувався на стандартній латинській версії Біблії, що використовувалася Римо-католицькою церквою. Вікліф прагнув зробити Біблію доступною для простих людей, які здебільшого не розмовляли і не розуміли латини."
  flavor_eng.98.title: "Справа останків Вікліфа"
  flavor_eng.98.desc: "Шановний [GetCountry('PAP').GetGovernment.GetRuler.GetName] наказав [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] виконати декрет Констанцького собору проти останків [john_wycliffe.GetName], як засудженого єретика. Це викликає чималий ажіотаж серед його послідовників, які розцінюють це як ворожий акт проти їхніх вірувань."
  flavor_eng.98.a: "Викопати його."
  flavor_eng.98.tt1: "Останки [john_wycliffe.GetNameWithNoTooltip] ексгумовані та кинуті в річку Ейвон"
  flavor_eng.98.b: "Дайте людині спокій."
  flavor_eng.98.historical_info: "Коли Джон Вікліф помер, його поховали на церковному подвір'ї, однак, понад 40 років після його смерті, рада Католицької Церкви оголосила його єретиком. Це призвело до ексгумації його тіла, а його кістки були спалені. Цей акт не усунув його впливу, натомість, ідеї Вікліфа продовжували знаходити послідовників, які відіграли значну роль у ранніх реформаторських рухах в Англії."
  flavor_eng.99.title: "Повстання лолардів"
  flavor_eng.99.desc: "Жорстокі переслідування та неодноразові спалення разом із оскверненням останків Вікліфа налаштували реформаторський рух [ShowReligionName('lollardy')] проти нас. Озброєні вилами та іншою зброєю, вони повстали у великій кількості, щоб боротися проти того, що вони сприймають як серйозну несправедливість щодо них."
  flavor_eng.99.desc_generic: "Тривалі ворожі дії та переслідування налаштували реформаторський рух [ShowReligionName('lollardy')] проти нас. Озброєні вилами та іншою зброєю, вони повстали у великій кількості, щоб боротися проти того, що вони сприймають як серйозну несправедливість щодо них."
  flavor_eng.99.a: "Незначна незручність."
  flavor_eng.99.tt: "Лоларди повстають у відкритому бунті"
  lollard_uprising: "Лолардські повстанці"
  flavor_eng.99.historical_info: "Повстання лолардів було релігійним і соціальним повстанням в Англії, зосередженим у південно-східних графствах. Повстання було спричинене поєднанням невдоволення релігійними практиками та соціальними образами. Повстанці вимагали усунення того, що вони вважали єретичними єпископами, а також припинення десятини, разом з іншими релігійними реформами. Повстанці зіткнулися зі значним військовим опором і втратили свій імпульс, коли багатьох їхніх лідерів було схоплено та страчено."
  flavor_eng.100.title: "Річка Темза замерзає"
  flavor_eng.100.desc: "Холодний період спричинив замерзання річки Темзи від [ShowProvinceDefinitionName('kent_province')] до [london.GetName], що паралізувало морську торгівлю з континентом. Ми стикаємося з дефіцитом ключових товарів, і торгівля [london.GetNameWithNoTooltip], ймовірно, залишатиметься порушеною протягом деякого часу, оскільки купці схильні встановлювати альтернативні маршрути для продовження торгівлі."
  flavor_eng.100.a: "Незначна незручність."
  STATIC_MODIFIER_NAME_wine_imports_banned: "Обмежений імпорт вина"
  STATIC_MODIFIER_NAME_wool_imports_banned: "Обмежений імпорт вовни"
  STATIC_MODIFIER_NAME_fur_imports_banned: "Обмежений імпорт хутра"
  STATIC_MODIFIER_NAME_cloth_exports_banned: "Обмежений експорт сукна"
  STATIC_MODIFIER_NAME_fine_cloth_exports_banned: "Обмежений експорт тонкого сукна"
  trade_impaired: "Торгівля порушена"
  flavor_eng.100.tt1: "Купцям, які використовують [london.GetName] як свій центр для континентальної торгівлі, доведеться фрахтувати транспорт до інших торгових портів"
  flavor_eng.100.b: "Надати фінансування для перенаправлення всієї торгівлі до [southampton.GetName]."
  flavor_eng.100.tt2: "Портові власті [southampton.GetName] будують торговий вузол та розширюють портову зону для розміщення більших обсягів торгівлі"
  flavor_eng.100.tt3: "Портові власті [southampton.GetName] розширюють портову зону для розміщення більших обсягів торгівлі"
  flavor_eng.100.c: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] фінансує перенаправлення торгівлі до [southampton.GetNameWithNoTooltip]."
  flavor_eng.100.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] будують торговий вузол та розширюють портову зону для розміщення більших обсягів торгівлі"
  flavor_eng.100.tt5: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] розширюють портову зону для розміщення більших обсягів торгівлі"
  flavor_eng.100.historical_info: "24 листопада 1434 року річка Темза замерзла. Це не було рідкістю до дев'ятнадцятого століття, коли були побудовані набережні, що зробило річку глибшою. Суворість цієї конкретної зими означала, що всілякі товари та припаси доводилося доставляти до міста суходолом."
  flavor_eng.101.title: "Релігійні меншини переслідуються"
  flavor_eng.101.desc_common: "Вогні чистилища чекають на тих, хто наважиться мислити інакше, але спочатку готується вогонь очищення, який, ймовірно, привабить велику аудиторію нещасних плебеїв."
  flavor_eng.101.desc_artist: "З прийняттям політики $de_heretico_comburendo$ [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] посилили свої зусилля з виявлення єретичних мислителів та противників церковної догми. Їхня старанність окупилася, оскільки радикаліста [target_artist.GetName] було затримано та засуджено.\n\n$flavor_eng.101.desc_common$"
  flavor_eng.101.desc_character: "З прийняттям політики $de_heretico_comburendo$ та непохитною підтримкою [ROOT.GetCountry.GetGovernment.GetRuler.GetName], [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] посилили свої зусилля з виявлення єретиків та противників [ShowReligionAdjective('catholic')] віри. Жоден чоловік чи жінка не пощаджені, за винятком [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')].\n\nСтаранність Церкви окупилася, оскільки радикаліста [target_character.GetName] було затримано та засуджено.\n\n$flavor_eng.101.desc_common$"
  flavor_eng.101.desc: "З прийняттям політики $de_heretico_comburendo$ [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] посилили свої зусилля з виявлення єретичних мислителів та противників церковної догми. Їхня старанність окупилася, оскільки кількох винуватців було виявлено в [target_location.GetName], і тих, хто не був убитий на місці за взяття до рук зброї, було затримано та засуджено.\n\n$flavor_eng.101.desc_common$"
  flavor_eng.101.a: "Нам потрібно більше розпалу."
  flavor_eng.101.b: "Категорично заперечую."
  flavor_eng.101.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не схвалює, коли ставиться під сумнів влада, надана #italic De Heretico Comburendo#!"
  flavor_eng.101.historical_info: "Одним із жорстоких методів покарання єретиків було спалення на вогнищі. Це використовувалося як засіб страти для осіб, визнаних винними в єресі. Інших засуджували до відлучення від церкви, ув'язнення та страти через обезголовлення."
  flavor_eng.102.title: "[john_oldcastle.GetNameWithNoTooltip]"
  flavor_eng.102.desc: "Відслуживши в кількох військових кампаніях, як мировий суддя та верховний шериф у своєму рідному графстві [ShowProvinceDefinitionName('herefordshire_province')], [john_oldcastle.GetName] має у своєму розпорядженні величезний набір навичок та досвіду.\n\nМи повинні залучити його до керівництва нашими збройними силами, незважаючи на його єретичні переконання."
  flavor_eng.102.a: "Використаймо його таланти з користю."
  flavor_eng.102.tt1: "[john_oldcastle.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.102.b: "Він заблукав і йому тут не раді."
  flavor_eng.102.tt2: "[john_oldcastle.GetNameWithNoTooltip] шукає роботу в іншому місці"
  flavor_eng.102.c: "Нехай [john_oldcastle.GetHimHer] служить в іншій якості."
  flavor_eng.102.historical_info: "Сер Джон Олдкасл був лицарем і запам'ятався своєю асоціацією з рухом лоллардів, попередником протестантської Реформації. Він брав участь у повстанні проти короля Генріха IV, відомому як повстання лоллардів, яке зрештою зазнало невдачі та призвело до його захоплення та подальшого суду за єресь та державну зраду. Його було засуджено до смерті."
  flavor_eng.103.title: "POSTEDIT_Ніколас з POSTEDIT_Герефорда"
  flavor_eng.103.desc: "Випускник [ShowLocationName('oxford')] та близький друг [john_wycliffe.GetName], [nicholas_of_hereford.GetShortName] з [ShowLocationName('hereford')] відкрито висловлювався про уявну розкіш Церкви та є рішучим прихильником «права кожного християнина досягти власної віри» шляхом читання Біблії.\n\nНещодавно вважається, що він співпрацює над перекладом нашої святої книги, щоб зробити її доступною для простої людини."
  flavor_eng.103.a: "Запросити його до двору."
  flavor_eng.103.tt1: "[nicholas_of_hereford.GetShortNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.103.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розлючені тим, що єретик служить при дворі через [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_eng.103.b: "Спалити його за єресь."
  flavor_eng.103.tt3: "[ShowPolicyName('de_heretico_comburendo')] наказує, що єретики повинні горіти"
  flavor_eng.103.c: "Нехай перекладає деінде."
  flavor_eng.103.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлює незадоволення через протидію [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.103.historical_info: "Ніколас з Герефорда був теологом і вченим, найбільш відомим своєю асоціацією з впливовим англійським філософом і теологом Джоном Вікліфом. Він залишався провідною фігурою в русі вікліфітів, метою якого було проведення релігійних і теологічних реформ у Католицькій Церкві."
  flavor_eng.104.title: "[margaret_beaufort.GetNameWithNoTooltip]"
  flavor_eng.104.desc: "Настав час обрати наречену для [brother.GetName], брата [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Нащадок [henry_iii.GetName], [margaret_beaufort.GetName] є хитрою та кмітливою і зміцнить претензії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] у малоймовірному випадку, якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не матиме законних спадкоємців після [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] смерті.\n\nЗаявляючи, що діє за божественним натхненням, [margaret_beaufort.GetSheHe] не користується прихильністю [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], які, безсумнівно, не схвалять цей шлюб."
  flavor_eng.104.a: "Нехай весільні дзвони лунають по всьому [ROOT.GetCountry.GetCapital.GetName]."
  flavor_eng.104.tt1: "[margaret_beaufort.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e] і народжує [henry_tudor.GetName]"
  flavor_eng.104.b: "Вона та ще й невдаха."
  flavor_eng.104.tt2: "[margaret_beaufort.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.104.historical_info: "Маргарет Бофорт була матір'ю Генріха VII, якого вона народила, коли їй було лише 13 років. Вона відіграла значну роль у його зусиллях захопити англійський престол і брала активну участь у змовах та планах, щоб зробити це можливим. Її також пам'ятають за її сильні релігійні переконання та відданість, а також за заснування Крайстс-коледжу та Сент-Джонс-коледжу в Кембриджському університеті."
  flavor_eng.105.title: "Прагнення [henry_tudor.GetNameWithNoTooltip]"
  flavor_eng.105.desc: "Прагнучи амбіцій для свого сина, [margaret_beaufort.GetName] почала таємно плести інтриги проти [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. За допомогою [henry_stafford.GetName], герцога [buckingham.GetName], [margaret_beaufort.GetSheHe] вдалося об'єднати незадоволених дворян і лоялістів родини [ShowDynastyName('lancaster_dynasty')], щоб організувати повстання.\n\nОдночасно [margaret_beaufort.GetSheHe] наказала своєму синові, [henry_tudor.GetName], очолити армію з [ShowAreaName('brittany_area')] у спробі захопити владу."
  flavor_eng.105.desc_henry: "Прагнучи амбіцій для себе, [henry_tudor.GetName] почав плести інтриги проти [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. [henry_tudor.GetSheHe|U] шукав підтримки у [GetCountry('FRA').GetName], а також у лоялістів родини [ShowDynastyName('lancaster_dynasty')]. Завдяки своєму [GetCountry('WLS').GetAdjectiveWithNoTooltip] походженню та родоводу, [henry_tudor.GetSheHe] також вдалося схилити значну кількість чоловіків у [GetCountry('WLS').GetName] на свою сторону."
  flavor_eng.105.a: "Ми зустрічаємося в битві."
  flavor_eng.105.a.tooltip1: "Герцог [buckingham.GetNameWithNoTooltip] збирає армію і приєднується до сил [henry_tudor.GetNameWithNoTooltip]"
  flavor_eng.105.a.tooltip2: "[henry_tudor.GetNameWithNoTooltip] відпливає з [ShowAreaName('brittany_area')] і приєднується до своїх прихильників серед знаті в [GetCountry('WLS').GetNameWithNoTooltip]"
  flavor_eng.105.b: "Ми зустрічаємося в битві."
  flavor_eng.105.b.custom: "[henry_tudor.GetNameWithNoTooltip] відпливає з [ShowAreaName('brittany_area')] і приєднується до своїх прихильників у [GetCountry('WLS').GetNameWithNoTooltip]"
  flavor_eng.105.c: "Зректися престолу на користь [henry_tudor.GetNameWithNoTooltip]."
  henry_tudor_support: "Прихильники Генріха Тюдора"
  flavor_eng.105.historical_info: "7 серпня 1485 року Генріх Тюдор висадився в Уельсі з невеликим загоном. Його висадка була стратегічним кроком, оскільки він сподівався заручитися підтримкою валлійців, з якими мав деякі родинні зв'язки. Після цього його війська почали похід з Уельсу, щоб протистояти Річарду III, тодішньому королю Англії. По дорозі він зібрав більше прихильників, включаючи валлійські війська та позбавлених спадщини йоркістських дворян."
  flavor_eng.106.title: "[william_caxton.GetNameWithNoTooltip]"
  flavor_eng.106.desc: "Піонери-купець та письменник [william_caxton.GetName] звернувся до місцевої влади [target_location.GetName] з проханням встановити друкарський верстат, що дозволить швидко копіювати книги. Цей пристрій вже використовується в Низьких Країнах і інноваційно змінить [ROOT.GetCountry.GetAdjective] друкарську промисловість."
  flavor_eng.106.a: "Нехай [william_caxton.GetHimHer] відкриє майстерню в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_eng.106.tt1: "[william_caxton.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.106.tt2: "[william_caxton.GetSheHe|U] засновує друкарню і починає перекладати численні твори з континенту"
  flavor_eng.106.tt3: "[william_caxton.GetHisHer|U] погані навички перекладу збільшують кількість іноземних слів, що вводяться в [english.GetName] мову"
  flavor_eng.106.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені через протидію [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.106.b: "Відмовити йому в проханні."
  flavor_eng.106.tt5: "[william_caxton.GetNameWithNoTooltip] шукає можливості в іншому місці"
  flavor_eng.106.historical_info: "Вільям Кекстон був першим англійцем, який заснував друкарський верстат в Англії, випустивши першу друковану книгу англійською мовою. Його публікації допомогли стандартизувати англійську мову та сприяли поширенню знань. Його робота фінансувалася переважно знаттю, включаючи матір короля, Маргарет Бофорт."
  flavor_eng.107.title: "Виклики завтрашнього дня"
  flavor_eng.107.desc_common: "успішно відновив владу та стабільність [ROOT.GetCountry.GetAdjective] монархії після Війни Троянд. Завдяки пильній увазі до деталей та протидії розкішним витратам, [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] увага, схоже, переключилася на збір нових доходів шляхом запровадження безжально ефективного механізму оподаткування."
  flavor_eng.107.desc: "Завдяки чудовому управлінню країною, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] $flavor_eng.107.desc_common$"
  flavor_eng.107.desc_henry: "[henry_tudor.GetName] $flavor_eng.107.desc_common$\n\nБудучи висококваліфікованим дипломатом, [henry_tudor.GetShortNameWithNoTooltip] здатен заспокоїти стани, одночасно запроваджуючи нові податки."
  flavor_eng.107.a: "Мир та економічне процвітання."
  flavor_eng.107.a.custom: "Надає доступ до [ShowGovernmentReformName('benevolence_tax_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.107.b: "Це забезпечить наше процвітання."
  flavor_eng.107.c: "Нехай ми насолоджуємося стабільністю, яку ми створили."
  flavor_eng.107.historical_info: "Правління Генріха VII допомогло стабілізувати фінанси королівства та зміцнило владу монархії. За допомогою свого канцлера, Джона Мортона, король запровадив сплату податку на благодійність, мотивуючи це тим, що той, хто живе скромно, повинен заощаджувати гроші, а отже, міг дозволити собі благодійність, тоді як той, хто живе екстравагантно, очевидно, був багатим, і тому також міг дозволити собі його сплатити."
  flavor_eng.109.title: "Рада Півночі"
  flavor_eng.109.desc: "Було висловлено припущення, що відсутність консиліарного правосуддя на півночі ще більше посилюється значною відстанню до [ROOT.GetCountry.GetCapital.GetName]. Створення незалежної ради в [target_location.GetName] для вирішення таких питань делегувало б частину повноважень в обмін на забезпечення дотримання правосуддя."
  flavor_eng.109.a: "Ми згодні."
  flavor_eng.109.b: "Бюрократія — не вихід."
  STATIC_MODIFIER_NAME_lack_of_conciliar_justice: "Брак консиліарного правосуддя"
  flavor_eng.109.historical_info: "Рада Півночі була адміністративним органом, створеним з метою здійснення більш прямого контролю над північними графствами. Основною функцією ради було підтримання закону та порядку та забезпечення лояльності найпівнічніших підданих Корони. Вона була остаточно скасована в 1641 році під час Англійської громадянської війни."
  flavor_eng.110.title: "[elizabeth_woodville.GetNameWithNoTooltip]"
  flavor_eng.110.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] закохався в молоду леді [elizabeth_woodville.GetName], дрібну дворянку та піддану корони. Цей шлюб, ймовірно, призведе до #italic cause célèbre#!, викликаючи ворожість з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], водночас забезпечуючи пусті плітки для [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')].\n\nПроте, вона вже має двох дітей від попереднього шлюбу і, як очікується, народить кількох спадкоємців для [ROOT.GetCountry.GetGovernment.GetRuler.GetName]."
  flavor_eng.110.a: "Одружитися з нею таємно."
  flavor_eng.110.tt1: "[elizabeth_woodville.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.110.tt2: "Вплив [elizabeth_woodville.GetNameWithNoTooltip] допомагає [target_root_country.GetGovernment.GetRulerTitle] у дипломатичних справах"
  flavor_eng.110.b: "Відкликати."
  flavor_eng.110.tt3: "Вбитий горем [target_root_country.GetGovernment.GetRulerTitle] бачить, як [target_root_country.GetGovernment.GetRuler.GetHisHer] здатність правити зменшується"
  flavor_eng.110.historical_info: "Єлизавета Вудвілл була англійською шляхтянкою, яка була одружена як з Йорками, так і з Ланкастерами під час Війни троянд. Її шлюб з Едуардом IV, йоркським претендентом на англійський престол, був суперечливим і призвів до політичних заворушень, оскільки розпалив триваючий конфлікт між Йорками та Ланкастерами. Однак її шлюб призвів до народження кількох дітей, які поклали край конфлікту та призвели до встановлення династії Тюдорів."
  flavor_eng.111.title: "Безпосередні труднощі [cornwall.GetNameWithNoTooltip]"
  flavor_eng.111.desc_common: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] зосередив [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] увагу на шахтарях [ShowGoodsName('tin')] з [cornwall.GetName] та [devon.GetName]. Привілеї, надані шахтарям, звільняють їх від певних королівських та місцевих податків, позбавляючи скарбницю життєво важливих доходів у скрутний час."
  flavor_eng.111.desc_indebted: "Зіткнувшись із фінансовими труднощами, $flavor_eng.111.desc_common$"
  flavor_eng.111.desc: "Зіткнувшись із фінансовими труднощами та триваючою війною, $flavor_eng.111.desc_common$"
  flavor_eng.111.a: "Ввести спеціальний субсидійний податок та примусові позики."
  flavor_eng.111.a.custom1: "[ShowPopTypeName('peasants')] та [ShowPopTypeName('burghers')] у [ShowProvinceDefinitionName('cornwall_province')] та [ShowProvinceDefinitionName('devon_province')] втрачають #R 90.00%#! [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.111.a.custom2: "[Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] зменшується на #R 50.00%#! у кожній володінні [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowProvinceDefinitionName('cornwall_province')] та [ShowProvinceDefinitionName('devon_province')]."
  flavor_eng.111.tt1: "Олов'яні шахтарі можуть діяти з відчаю"
  flavor_eng.111.b: "Тимчасово скасувати особливі привілеї."
  flavor_eng.111.b.custom: "Кожне володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowProvinceDefinitionName('cornwall_province')] та [ShowProvinceDefinitionName('devon_province')] отримує [ShowModifier('tin_mining_reduced')] та [ShowModifier('privileges_revoked')] на #W 4 роки#!"
  flavor_eng.111.tt2: "Олов'яні шахтарі незадоволені та менш продуктивні"
  flavor_eng.111.c: "$common_string_leave_them_be$"
  STATIC_MODIFIER_NAME_tin_mining_reduced: "Зменшення видобутку олова"
  STATIC_MODIFIER_NAME_privileges_revoked: "Привілеї олов'яних шахтарів скасовано"
  flavor_eng.111.historical_info: "Після розбіжностей щодо нових правил для олов'янодобувної промисловості, король Генріх VII призупинив діяльність та привілеї корнуольських олов'яних рудників, які на той час становили значну частину економіки графства. Причиною призупинення частково були триваючі війни зі Шотландією, на які короні бракувало достатніх коштів."
  flavor_eng.112.title: "Корнуольське повстання"
  flavor_eng.112.desc: "Несправедливі податки та порушення їхнього договору, укладеного з [GetCharacter('eng_edward_i').GetName] у 1305 році, змусили шахтарів [ShowGoodsName('tin')] з [cornwall.GetName] та [devon.GetName] взятися за зброю, щоб забезпечити своє виживання."
  flavor_eng.112.a: "Як вони сміють протистояти нам."
  flavor_eng.112.tt1: "Олов'яні шахтарі об'єднуються та піднімають збройне повстання"
  flavor_eng.112.b: "Скасувати примусові позики."
  flavor_eng.112.tt2: "Витончені дипломатичні навички [target_character.GetNameWithNoTooltip] дозволяють досягти мирного врегулювання"
  cornish_rebellion: "Корнуольське повстання"
  STATIC_MODIFIER_NAME_cornish_rebellion: "Корнволльське повстання"
  flavor_eng.112.historical_info: "Корнволльське повстання було великим повстанням, що відбулося в Корнволлі, спричинене спробою короля скасувати особливі привілеї, надані олов'яним шахтарям століттями раніше. Повстання було зрештою придушене, але привілеї шахтарів були врешті-решт відновлені й проіснували ще два століття."
  flavor_eng.114.title: "[thomas_wolsey.GetNameWithNoTooltip]"
  flavor_eng.114.desc: "Відомий капелан зі скромним походженням зробив собі значну кар'єру, що, безсумнівно, свідчить про його винятковий інтелект. З продемонстрованим талантом до дипломатії, адміністративними здібностями та репутацією людини, яка береться за найнудніші завдання, [thomas_wolsey.GetName] потенційно міг би бути дуже корисним для [ROOT.GetCountry.GetName]."
  flavor_eng.114.a: "Бажане поповнення при дворі."
  flavor_eng.114.tt1: "[thomas_wolsey.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.114.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] розлючені тим, що низькородний служить при дворі"
  flavor_eng.114.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] задоволені бачити людину церкви, яка має вплив при дворі"
  flavor_eng.114.b: "Нехай він служить у дорадчій якості."
  flavor_eng.114.tt4: "[thomas_wolsey.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e], але він не може служити при дворі"
  flavor_eng.114.tt5: "Він продовжує служити Церкві, одночасно консультуючи [target_root_country.GetGovernment.GetRulerTitle]"
  flavor_eng.114.c: "Нехай він представляє нас у [rome.GetName]."
  flavor_eng.114.historical_info: "Томас Волсі був англійським державним діячем і кардиналом, який служив лордом-канцлером під час правління короля Генріха VIII і фактично контролював уряд та королівський двір. Він активно брав участь у дипломатії та зовнішніх справах, включаючи питання розлучення короля з Катериною Арагонською. Його неспроможність отримати анулювання від Папи призвела до зменшення його становища при королі, і він був зрештою звільнений зі служби та помер незабаром після цього."
  flavor_eng.115.title: "Гемптон-Корт"
  flavor_eng.115.desc: "Завдяки своєму вигідному становищу при дворі, [thomas_wolsey.GetName] зміг накопичити значний статок під час своєї служби. Він став свого роду покровителем мистецтв, а також спонсором різних релігійних орденів та численних будівельних робіт.\n\nВін попросив ділянку землі, що раніше належала релігійному ордену, з метою будівництва ренесансного палацу, спроектованого [john_di_padova.GetName], який міг би конкурувати з найбільшими архітектурними досягненнями по всій Європі."
  flavor_eng.115.a: "Розкішний та королівський."
  eng_hampton_court_construction: "Будівництво Гемптон-Корту"
  flavor_eng.115.a.custom: "[thomas_wolsey.GetNameWithNoTooltip] створює палац Гемптон-Корт #W (Добре)#! у [ShowLocationName('london')]"
  flavor_eng.115.b: "Краще витратити це на бідних та немічних."
  flavor_eng.115.historical_info: "Палац Гемптон-Корт був спочатку побудований на початку 16 століття кардиналом Томасом Волсі. Він відомий своїми характерними архітектурними стилями Тюдорів та бароко і швидко став улюбленою резиденцією короля Генріха VIII після його придбання у кардинала. Він зазнав значних розширень та реконструкцій під час його правління, традиція, яка продовжуватиметься в наступні століття."
  flavor_eng.116.title: "[thomas_more.GetNameWithNoTooltip]"
  flavor_eng.116.desc: "Відомий гуманіст епохи Відродження та близький друг [ROOT.GetCountry.GetGovernment.GetRulerTitle] наразі служить архієпископу [canterbury.GetName], але нещодавно завершив юридичну підготовку за наполяганням свого батька. Випускник [oxford.GetName] університету з класичних студій, [thomas_more.GetName] також міг би стати підходящим членом кабінету та служити країні в будь-якій якості."
  flavor_eng.116.a: "Запросити його до двору."
  flavor_eng.116.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] задоволені бачити людину церкви, яка має вплив при дворі"
  flavor_eng.116.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені бачити єретика, який служить при дворі"
  flavor_eng.116.tt3: "[thomas_more.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.116.b: "Дозволити йому вільно дебатувати зі своїми опонентами."
  flavor_eng.116.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлює незадоволення через протистояння [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_eng.116.c: "Спалити його за єресь."
  flavor_eng.116.tt5: "[thomas_more.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e], але він не може служити при дворі"
  flavor_eng.116.tt6: "[ShowPolicyName('de_heretico_comburendo')] вимагає спалювати єретиків"
  flavor_eng.116.historical_info: "Томас Мор був юристом, державним діячем та філософом у період Тюдорів. Близький друг короля, він прийшов до влади після падіння кардинала Волсі, але зрештою втратив прихильність через релігійні розбіжності. Він був побожним римо-католиком і виступав проти Протестантської Реформації, тому відмовився прийняти розрив короля Генріха VIII з Римо-Католицькою Церквою."
  flavor_eng.117.title: "Клятва верховенства"
  flavor_eng.117.desc: "Клятва верховенства вимагає від кожного визнати [ROOT.GetCountry.GetGovernment.GetRuler.GetName] Верховним Правителем Церкви. Незважаючи на те, що відмова від клятви карається смертю, [thomas_more.GetName] відмовився її скласти. Будучи затятим противником Реформації та відділення від [ShowReligionAdjective('catholic')] Церкви, [thomas_more.GetLastNameWithNoTooltip] відчуває, що не може діяти проти своєї совісті."
  flavor_eng.117.a: "Засудити його за державну зраду."
  flavor_eng.117.tt1: "[target_root_country.GetGovernment.GetRulerTitle] сумує за втратою [target_root_country.GetGovernment.GetRuler.GetHisHer] найближчого друга"
  flavor_eng.117.b: "Зробити виняток."
  flavor_eng.117.tt2: "[target_root_country.GetGovernment.GetRulerTitle] звинувачують у фаворитизмі, і [target_root_country.GetGovernment.GetRuler.GetHisHer] легітимність ставиться під сумнів"
  flavor_eng.117.historical_info: "Клятва верховенства була клятвою вірності королю Генріху VIII. Вона була обов'язковою і вперше запроваджена під час Англійської Реформації. Клятва передбачала визнання монарха Верховним Главою Церкви Англії, тим самим відкидаючи авторитет Папи та Римо-Католицької Церкви."
  flavor_eng.118.title: "Сліпуче видовище могутності"
  flavor_eng.118.desc: "Красномовний майстер-дипломат [target_character.GetName] розробив досить дорогу, але ефективну пропозицію, яка дозволить продемонструвати багатство та могутність [ROOT.GetCountry.GetName], одночасно покращивши відносини з [GetCountry('FRA').GetName].\n\nЗустріч двох правителів відбудеться в [summit_location.GetName], поблизу [GetCountry('FRA').GetAdjectiveWithNoTooltip] кордону, з ретельними приготуваннями для розміщення обох.\n\nНамети, виткані золотими нитками, та зведення тимчасового палацу – ось деякі з ідей, що розглядаються."
  flavor_eng.118.a: "Чудова ідея."
  flavor_eng.118.tt1: "Саміт «Поле золотої парчі» пропонується [GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCountry('FRA').GetNameWithNoTooltip], за великі кошти"
  flavor_eng.118.tt2: "Дорога та потужна демонстрація покращує відносини та сприяє міжнародному становищу [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_eng.118.b: "Марна трата важко зароблених дукатів."
  flavor_eng.119.title: "Поле золотої парчі"
  flavor_eng.119.desc: "Два правителі епохи Відродження та їхні численні свити наближаються до долини, кожен з них сповнений рішучості перевершити іншого. Цікавість відіграє свою роль, але демонстрація багатства та пишноти залишається головним пунктом порядку денного.\n\nЧисленні намети, виткані золотою парчею, домінують на території, а прилеглі будівлі прикрашені золотими орнаментами та в найрозкішнішому стилі. На задньому плані встановлено понад 2800 наметів для менш знатних відвідувачів.\n\nБули організовані престижні турніри з супутніми бенкетами, призначені для королівських розваг.\n\nВоістину чудове видовище."
  flavor_eng.119.a: "Ми надзвичайно раді."
  flavor_eng.119.historical_info: "Поле золотої парчі — це зустріч, що відбулася 1520 року поблизу Кале у Франції, яка тоді перебувала під англійським контролем, між королем Англії Генріхом VIII та королем Франції Франциском I. Метою було покращити відносини між двома королівствами та запобігти тривалим ворожим діям. Протягом кількох днів демонструвалися багатство та влада, а намети були прикрашені багато вишитою золотою парчею. Подія вважалася успішною, але мало що зробила для запобігання майбутнім конфліктам."
  flavor_eng.121.title: "Паломництво Благодаті"
  flavor_eng.121.desc_dissolution_of_monasteries: "Заколот назріває в [ShowProvinceDefinitionName('northumberland_province')] як прямий наслідок триваючої ліквідації монастирів. Ми ризикуємо збройним повстанням, якщо не вживемо заходів для заспокоєння мас.\n\nЛідер повстанців [robert_aske.GetName] висунув список вимог, відомий як «Петиція простолюдинів», який передбачає знищення єретичних творів, засудження їхніх послідовників та негайне припинення руйнування монастирів."
  flavor_eng.121.desc: "Невдоволення серед наших [ShowReligionAdjective('catholic')] підданих у [ShowProvinceDefinitionName('northumberland_province')] зростає, і ми ризикуємо збройним повстанням, якщо не вживемо заходів для заспокоєння мас.\n\nЛідер повстанців [robert_aske.GetName] висунув список вимог, відомий як «Петиція простолюдинів», який передбачає знищення єретичних творів, засудження їхніх послідовників та негайне припинення руйнування монастирів."
  flavor_eng.121.custom: "[ShowReligionAdjectiveWithNoTooltip('catholic')] [ShowPopTypeName('peasants')] по всій [ShowProvinceDefinitionName('northumberland_province')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.121.a: "Дати фальшиву обіцянку."
  flavor_eng.121.tt1: "Повстанці розходяться і стають прикладом"
  flavor_eng.121.b: "Погодитися на їхні умови."
  flavor_eng.121.tt2: "Ліквідація монастирів припиняється"
  flavor_eng.121.tt3: "Зростає нетерпимість до не-[ShowReligionAdjectiveWithNoTooltip('catholic')] населення"
  flavor_eng.121.tt4: "Багато хто навертається назад до [ShowReligionName('catholic')] зі страху перед репресіями"
  flavor_eng.121.c: "Домовитися про мирне врегулювання."
  flavor_eng.121.c.custom1: "Ця опція доступна завдяки харизматичній рисі перемовника [ROOT.GetCountry.GetGovernment.GetRuler.GetName]"
  flavor_eng.121.c.custom2: "Ця опція доступна завдяки високій дипломатичній майстерності [ROOT.GetCountry.GetGovernment.GetRuler.GetName]"
  flavor_eng.121.d: "Силі треба відповідати силою."
  flavor_eng.121.tt5: "Повстанці мають бути розбиті силою"
  pilgrimage_of_grace_rebellion: "Повстання «Паломництво Благодаті»"
  STATIC_MODIFIER_NAME_pilgrimage_of_grace_rebellion: "Повстання «Паломництво Благодаті»"
  flavor_eng.121.historical_info: "«Паломництво Благодаті» було великим повстанням на півночі Англії наприкінці 1530-х років. Його спровокували релігійна політика та ліквідація монастирів, але загальне невдоволення Томасом Кромвелем та податковою політикою, яку він впроваджував, відіграло значну роль. Король Генріх VIII спочатку запропонував помилування, але потім відмовився від свого слова і жорстоко придушив повстання. Тисячі повстанців були страчені, і мало що було досягнуто, незважаючи на значну підтримку, яку воно здобуло."
  flavor_eng.122.title: "[thomas_cromwell.GetNameWithNoTooltip]"
  flavor_eng.122.desc: "Успішний юрист і нещодавно призначений парламентар, схоже, завойовує прихильність [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Він є рішучим прихильником Реформації, що триває, і активно бере участь у законодавстві, спрямованому на обмеження влади [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та подальше скасування влади Риму в [ROOT.GetCountry.GetName].\n\nЙого нещодавня пропозиція передбачає збільшення регулярних доходів Корони шляхом передачі багатства з монастирів до скарбниці."
  flavor_eng.122.a: "Бажане поповнення при дворі."
  flavor_eng.122.tt1: "[thomas_cromwell.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.122.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] розлючені тим, що простолюдин служить при дворі"
  flavor_eng.122.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] задоволені бачити, як людина торгівлі має вплив при дворі"
  flavor_eng.122.b: "Парламентарем він і залишиться."
  flavor_eng.122.tt4: "[thomas_cromwell.GetNameWithNoTooltip] продовжує представляти [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] у палаті громад"
  flavor_eng.122.tt5: "Законодавчі зусилля [thomas_cromwell.GetNameWithNoTooltip] щодо обмеження влади Церкви не подобаються [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]"
  flavor_eng.122.historical_info: "Томас Кромвель був вправним державним діячем, юристом і головним міністром короля Генріха VIII. Будучи низького походження, він здобув прихильність при дворі завдяки кардиналу Томасу Волсі і став однією з найвпливовіших фігур в Англії XVI століття. Кромвель відіграв ключову роль в Англійській Реформації та розпуску монастирів, що призвело до передачі величезних багатств і земель Короні."
  flavor_eng.123.title: "Реформування монастирів"
  flavor_eng.123.desc: "Надмірне багатство релігійних орденів у [ROOT.GetCountry.GetName] давно було кісткою в горлі реформаторів. Невдоволення серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] проти могутніх церковних інститутів є ще одним фактором, що сприяє прагненню до змін.\n\nМи могли б спробувати реформувати ці практики та повернути релігійні ордени до суворого та замкнутого ідеалу.\n\nЗагалом #Y [ROOT.GetVariable('num_of_monasteries').GetValue]#! монастирів з'являються в записах після візитацій."
  flavor_eng.123.a: "$common_string_leave_them_be$"
  flavor_eng.123.a.custom: "[ShowPopTypeName('clergy')] у чернечих орденах отримують [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.123.b: "Реформувати."
  flavor_eng.123.b.custom: "Чернечі ордени бачать вихід членів, які приєднуються до [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]"
  flavor_eng.123.tt: "Розпустити монастирі буде неможливо, якщо цей [Concept('privilege', 'CONCEPT_PLACEHOLDER')|e] не буде скасовано"
  flavor_eng.123.historical_info: "Реформація або розпуск монастирів була значною подією XVI століття після прийняття Англією Реформації. Томас Кромвель, головний міністр короля, спочатку прагнув демонтувати монастирську систему, яка розглядалася як продовження Римсько-католицької церкви. Подія завершилася закриттям релігійних будинків, включаючи монастирі, абатства та жіночі монастирі по всій Англії."
  flavor_eng.124.title: "Доля [anne_boleyn.GetNameWithNoTooltip]"
  flavor_eng.124.desc: "Королева [anne_boleyn.GetName] ще не народила спадкоємця чоловічої статі після свого весілля з [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. [ROOT.GetCountry.GetGovernment.GetRulerTitle] стає нетерплячим, і з чутками про подружню зраду та інцест королеви, можливо, буде доцільно знайти більш постійне рішення."
  flavor_eng.124.a: "Геть її голову."
  flavor_eng.124.b: "Вона ще може народити."
  flavor_eng.124.historical_info: "Анна Болейн була другою дружиною короля Англії Генріха VIII. Нездатність народити спадкоємця чоловічої статі призвела до звинувачень у подружній зраді, інцесті та державній зраді, і її заарештували та ув'язнили в Лондонському Тауері. Її визнали винною і обезголовили незабаром після суду."
  flavor_eng.125.title: "Переслідування [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip]"
  flavor_eng.125.desc: "Повернення до [target_religion.GetName] знову розпалило дебати про те, які віри слід терпіти серед наших підданих.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] робить рішучі спроби скасувати [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Реформацію, висуваючи законодавство, яке передбачало б придушення хибної доктрини вогнем."
  flavor_eng.125.desc_daughter_of_aragon: "Сходження [target_religion.GetAdjective] Королеви в переважно [target_religion.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetName] знову розпалило дебати про те, які віри слід терпіти серед наших підданих.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] робить рішучі спроби скасувати [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Реформацію, висуваючи законодавство, яке передбачало б придушення хибної доктрини вогнем або зреченням."
  flavor_eng.125.a: "Гріховні думки повинні бути очищені."
  flavor_eng.125.b: "Не потрібно."
  flavor_eng.125.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] задоволені заходами, вжитими для захисту нашої державної релігії"
  flavor_eng.125.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені відвертою зневагою до нашої державної релігії"
  flavor_eng.125.historical_info: "Маріанські переслідування були серією релігійних переслідувань, що відбулися в Англії під час правління Марії I Тюдор. Будучи побожною католичкою, вона намагалася відновити католицизм як державну релігію та повернути Англію під папський контроль, що призвело до частих переслідувань протестантів. Тисячі протестантів були заарештовані, і багато хто був страчений."
  flavor_eng.126.title: "[hans_holbein.GetNameWithNoTooltip] Молодший"
  flavor_eng.126.desc: "Блискучий художник і гравер [hans_holbein.GetName], відомий своїми реалістичними зображеннями, прибув до [ROOT.GetCountry.GetName] на прохання [thomas_more.GetName]. Зараз він шукає нового покровителя для спонсорування своєї подальшої роботи, де його універсальні навички можуть бути корисними.\n\nБудучи реформатором у душі, він також створив кілька релігійних памфлетів для просування реформаторської справи."
  flavor_eng.126.a: "Прийміть його до двору."
  flavor_eng.126.tt1: "[hans_holbein.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.126.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені тим, що єретику дозволено малювати при дворі через [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_eng.126.b: "Спалити його за єресь."
  flavor_eng.126.tt3: "[hans_holbein.GetNameWithNoTooltip] є протеже [thomas_more.GetNameWithNoTooltip] і тому захищений від переслідувань"
  flavor_eng.126.tt4: "[ShowPolicyName('de_heretico_comburendo')] вимагає спалювати єретиків"
  flavor_eng.126.c: "Нехай він зосередиться на реформаторській пропаганді."
  flavor_eng.126.c.custom: "Матеріали, створені [hans_holbein.GetNameWithNoTooltip], навертають значну частину грамотного населення до державної релігії"
  flavor_eng.126.tt5: "[hans_holbein.GetNameWithNoTooltip] навряд чи створить будь-які витвори мистецтва, оскільки присвячує себе іншим справам"
  flavor_eng.126.d: "Йому тут не місце."
  flavor_eng.126.tt6: "[hans_holbein.GetNameWithNoTooltip] шукає роботу в іншому місці"
  flavor_eng.126.historical_info: "Ганс Гольбейн Молодший був німецько-швейцарського походження і вважається одним з найвидатніших портретистів XVI століття. Працюючи переважно в таких стилях, як ренесансний гуманізм та пізня готика, його різнобічна творчість була високо оцінена за реалізм і охоплює від розписних фресок до книжкових ілюстрацій. Наприкінці своєї кар'єри він став активним у гуманістичних колах і знайшов роботу при англійському дворі після серії замовлень від сера Томаса Мора."
  flavor_eng.127.title: "Посли"
  flavor_eng.127.desc: "Ренесансний шедевр під назвою #italic Посли#!, створений [hans_holbein.GetName], завершено. Його сприйняття, здається, змінюється залежно від кута, під яким його розглядають. На ньому зображено кілька фігурок та витончених предметів разом з двома послами при дворі у відповідному вбранні, а досить зловісний фрагмент займає значну частину роботи."
  flavor_eng.127.a: "Виставити його."
  flavor_eng.127.b: "Нехай він натомість подорожує континентом."
  flavor_eng.127.historical_info: "«Посли» — відома картина епохи Відродження, створена Гансом Гольбейном Молодшим. На ній зображено двох впливових французьких послів при англійському дворі, і вважається, що її замовила королева Анна Болейн. Вона широко вважається одним з найвідоміших прикладів анаморфозу в живописі та втілює роздуми про людську смертність, а також інтригу з символізмом та перспективою, типовими для Відродження. Що робить картину справді відмінною, так це анаморфний череп, який видно лише під певним кутом."
  flavor_eng.128.title: "[john_cabot.GetNameWithNoTooltip]"
  flavor_eng.128.desc: "Навігатор та дослідник з [target_location.GetName] прибув до [ROOT.GetCountry.GetName] у пошуках фінансових спонсорів для атлантичної експедиції, що відпливає з порту [bristol.GetName], з перевагою до пошуку північного шляху до Азії.\n\nМи могли б найняти його, щоб він плавав під нашим прапором і використовував свої навички для пошуку втраченого острова Гі-Бразилія."
  flavor_eng.128.a: "Море чекає на нього."
  flavor_eng.128.tt: "[john_cabot.GetNameWithNoTooltip] додано як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.128.b: "Зараз не час."
  flavor_eng.128.historical_info: "Джон Кабот, народжений як Джованні Кабото в Неаполітанському королівстві, був італійським навігатором та дослідником, якого найняли плавати під англійським прапором наприкінці XV століття. Йому приписують відкриття частин Північної Америки, ймовірно, висадившись у Ньюфаундленді, що робить його одним з перших європейців, які досліджували континент після вікінгів. Його численні подорожі були інструментальними для претензій Англії в Новому Світі та уможливили майбутні експедиції та колонізацію."
  flavor_eng.129.title: "Морська рада"
  flavor_eng.129.desc_common1: "ми повинні здійснювати контроль над морями, що оточують наш острів, щоб запобігти будь-яким спробам посягання на наші землі."
  flavor_eng.129.desc_common2: "розширення наших логістичних можливостей та оптимізація управління нашим флотом"
  flavor_eng.129.desc: "Було визнано, що наші кордони дещо вразливі до іноземного вторгнення. Щоб убезпечити майбутнє [ROOT.GetCountry.GetName], $flavor_eng.129.desc_common1$\n\nЗавдяки $flavor_eng.129.desc_common2$, ми можемо посилити зусилля з кораблебудування, а також підтримувати більший флот зі зменшеними витратами."
  flavor_eng.129.desc_tudor: "[tudor_dynasty.GetName] [ROOT.GetCountry.GetGovernment.GetRulerTitle], побоюючись іноземного вторгнення, вважає, що $flavor_eng.129.desc_common1$ Цього можна досягти за допомогою $flavor_eng.129.desc_common2$, щоб посилити зусилля з кораблебудування, а також підтримувати більший флот зі зменшеними витратами.\n\nОсобисто [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] також розвинув талант до проектування кораблів і продовжує робити внески в модернізацію нашого флоту."
  flavor_eng.129.a: "Внести необхідні зміни."
  enable_navy_board_reform: "Надає доступ до [ShowGovernmentReformName('navy_board_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.129.b: "Армія – ось що має значення."
  flavor_eng.129.historical_info: "У XVI столітті, за правління короля Генріха VIII, було створено Військово-морську раду для нагляду за військово-морськими справами, включаючи кораблебудування та логістичне управління. Під керівництвом Генріха Військово-морська рада сприяла розширенню англійського флоту з метою перетворення його на силу, з якою слід рахуватися, та забезпечення безпеки Англії від іноземних вторгнень."
  flavor_eng.131.title: "Вайтхоллський палац"
  flavor_eng.131.desc: "Нинішні помешкання монархії були визнані невідповідними для [ROOT.GetCountry.GetGovernment.GetRuler.GetName], і плани щодо їх розширення вже розробляються.\n\nВідомий топографічний художник [anton_van_den_wyngaerde.GetName] надав кілька концептуальних ескізів, і роботи могли б розпочатися негайно за умови забезпечення фінансування."
  flavor_eng.131.a: "Ідеально підходить для сауни, басейну та місця для поні."
  flavor_eng.131.tt1: "[anton_van_den_wyngaerde.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.131.b: "Кілька ескізів буде достатньо."
  flavor_eng.131.tt2: "[anton_van_den_wyngaerde.GetNameWithNoTooltip] надихає інших художників своїми ретельними малюнками"
  flavor_eng.131.tt3: "[anton_van_den_wyngaerde.GetNameWithNoTooltip] переїжджає після завершення своєї роботи"
  flavor_eng.131.historical_info: "Спочатку великий маєток, що належав архієпископам Йоркським, Вайтхоллський палац був розширений, щоб стати найбільшим палацом у Європі, де розміщувалася таємна рада, проводилися театральні вистави, бенкети, і він служив основною королівською резиденцією. Він був адміністративним центром періодів Тюдорів та Стюартів і залишався таким до пожежі 1698 року, яка знищила більшу частину комплексу. Сьогодні залишився лише Банкетний дім."
  flavor_eng.132.title: "[charles_brandon.GetNameWithNoTooltip]"
  flavor_eng.132.desc: "Друг дитинства [ROOT.GetCountry.GetGovernment.GetRulerTitle], [charles_brandon.GetName] прагне приєднатися до життя при дворі та служити країні. Він виявив чудові здібності як у військових справах, так і в державних питаннях, проте очікується, що його призначення на посади в королівському дворі зустріне опір з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_eng.132.a: "Він може служити в армії з відзнакою."
  flavor_eng.132.tt1: "[charles_brandon.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.132.tt2: "Він не може служити при дворі"
  flavor_eng.132.b: "Дурниці. [ROOT.GetCountry.GetGovernment.GetAdjective] радник, так і буде."
  flavor_eng.132.c: "У нас достатньо друзів."
  flavor_eng.132.historical_info: "Чарльз Брендон був видатною фігурою в період Тюдорів в Англії. Близький друг короля Генріха VIII з дитинства, він зрештою служив у різних якостях, як дипломатичних, так і військових. Його військові досягнення та непохитна вірність королю зробили його впливовою людиною при дворі, на превеликий жаль таємної ради. Він викликав суперечки, коли таємно одружився з сестрою короля, що розгнівало короля, але пізніше він заслужив його прощення."
  flavor_eng.133.title: "Заборонений плід"
  flavor_eng.133.desc_common: "Відбувся таємний шлюб між [charles_brandon.GetName] та принцесою [sister.GetName]. Вони завжди захоплювалися одне одним здалеку, і, схоже, їхній зв'язок поглибився. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] наполягають, щоб [charles_brandon.GetShortNameWithNoTooltip] поніс суворі наслідки за порушення королівського протоколу"
  flavor_eng.133.desc_wolsey: "$flavor_eng.133.desc_common$, проте [thomas_wolsey.GetName], довірений радник [ROOT.GetCountry.GetGovernment.GetRulerTitle], закликає до стриманості та пропонує виступити посередником у суперечці.\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle], обурений тим, що сприймається як виклик [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] владі, мусить вирішити, якою буде відповідна відповідь."
  flavor_eng.133.desc: "$flavor_eng.133.desc_common$.\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle], обурений тим, що сприймається як виклик [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] владі, мусить вирішити, якою буде відповідна відповідь."
  flavor_eng.133.a: "Вигнати їх з двору!"
  flavor_eng.133.tt1: "[charles_brandon.GetNameWithNoTooltip] та [sister.GetNameWithNoTooltip] не зможуть служити [target_root_country.GetNameWithNoTooltip] деякий час"
  flavor_eng.133.tt2: "Вплив [thomas_wolsey.GetNameWithNoTooltip] заспокоює [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та захищає Корону від подальшого збентеження"
  flavor_eng.133.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] розлючені тим, що [target_root_country.GetGovernment.GetRulerTitle] не вживатиме рішучіших заходів"
  flavor_eng.133.b: "На ешафот і в монастир."
  flavor_eng.133.c: "Їм більше не раді в [target_root_country.GetNameWithNoTooltip]."
  flavor_eng.133.historical_info: "Таємний шлюб між Чарльзом Брендоном і Марією Тюдор відбувся у Франції в 1515 році, без відома чи дозволу короля Генріха VIII. Марія раніше була одружена з королем Франції Людовиком XII, але після його смерті вона та Чарльз заручилися перед поверненням до Англії. Шлюб вважався порушенням протоколу та королівської влади, що розлютило короля, який також сприйняв це як виклик його контролю над шлюбними союзами. Незважаючи на початковий гнів, король Генріх зрештою помилував Брендона та Марію, і вони повернулися до свого життя при дворі."
  flavor_eng.134.title: "Майбутнє [daughter_of_boleyn.GetNameWithNoTooltip]"
  flavor_eng.134.desc: "Гувернантка юної [daughter_of_boleyn.GetName] повідомляє, що її підопічна виявилася винятково здібною ученицею. Хоча від неї не очікується правління [ROOT.GetCountry.GetName], [daughter_of_boleyn.GetHisHer] природні таланти можуть зробити її відповідним радником при дворі."
  flavor_eng.134.a: "Знайдіть їй найкращих вчителів."
  flavor_eng.134.tt1: "[daughter_of_boleyn.GetNameWithNoTooltip] отримує всебічну королівську освіту, щоб підготувати її до потенційного майбутнього правління"
  flavor_eng.134.b: "Це нас не стосується. Видайте її заміж."
  flavor_eng.134.tt2: "[daughter_of_boleyn.GetNameWithNoTooltip] навряд чи правитиме [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_eng.134.historical_info: "Дочка короля Генріха VIII та Анни Болейн, Єлизавета отримала найкращу освіту, включаючи такі предмети, як історія, філософія, математика та мови, як-от латина, грецька та французька. На неї сильно вплинув розрив Англії з Католицькою Церквою, що змінило її погляд на питання віри. Її здатність розмовляти кількома мовами та розуміння міжнародних відносин виявилися б безцінними для майбутньої королеви."
  flavor_eng.136.title: "[francis_drake.GetNameWithNoTooltip]"
  flavor_eng.136.desc: "Відомий капер та військово-морський експерт [francis_drake.GetName] висловив бажання плавати під нашим прапором та допомогти утвердити [ROOT.GetCountry.GetName] як глобальну морську державу. Ходять чутки, що він майстер на всі руки та відомий своєю каперською діяльністю, яка включає захоплення ворожих кораблів та розграбування їхніх вантажів. Він висловив бажання досліджувати світ, хоча ми можемо мати інше застосування для його послуг."
  flavor_eng.136.a: "Принесіть нам світ."
  flavor_eng.136.tt1: "[francis_drake.GetNameWithNoTooltip] додано як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.136.tt2: "[francis_drake.GetSheHe|U] має талант до набігів на заморські колонії і може спробувати зробити це, якщо його призначать досліджувати Новий Світ"
  flavor_eng.136.b: "Флот вимагає, щоб [francis_drake.GetSheHe] служив."
  flavor_eng.136.tt3: "[francis_drake.GetNameWithNoTooltip] додано як [Concept('admiral', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.136.c: "Нікчемний работорговець і пірат."
  flavor_eng.136.historical_info: "Френсіс Дрейк найбільш відомий своїми зухвалими подвигами як військово-морський командир в епоху Єлизавети. Він здійснив навколосвітню подорож, атакував кілька колоній уздовж Іспанського материка та захопив низку кораблів зі скарбами, що прямували до Європи, завантажених золотом та сріблом, що допомогло послабити іспанську гегемонію в Новому Світі. Він відіграв вирішальну роль у захисті Англії від Іспанської Армади в 1588 році."
  flavor_eng.137.title: "[francis_drake.GetNameWithNoTooltip] грабує [target_location.GetNameWithNoTooltip]"
  flavor_eng.137.desc: "Очі [francis_drake.GetName] блищать від передчуття, коли [francis_drake.GetSheHe] стоїть біля керма «Золотої лані», [francis_drake.GetHisHer] вірного судна, що витримало незліченні шторми та бачило незліченні скарби. [francis_drake.GetHisHer|U] команда готується, їхні серця б'ються в ритм з хвилями, що розбиваються об корпус корабля.\n\nЖестом подається сигнал. Човни спускаються у воду, керовані екіпажем лютих чоловіків, спраглих до багатства. Вони швидко долають оборону колонії, будинки обшукуються, речі вилучаються, а скарби грабуються.\n\nЧерез кілька годин екіпаж повертається на свій корабель, обтяжений здобиччю, залишаючи позаду поселення, охоплене полум'ям, з тими, хто вижив, хто ще може розповісти цю історію."
  flavor_eng.137.a: "Продовжувати."
  flavor_eng.137.a.custom: "[target_location.GetName] розграбовано, втрачає процвітання, а всіх рабів звільнено"
  flavor_eng.137.tt1: "[francis_drake.GetNameWithNoTooltip] продовжує грабувати будь-які вразливі колонії, які він виявляє під час розвідки"
  flavor_eng.137.b: "Основна увага має бути на дослідженні."
  flavor_eng.137.tt2: "[francis_drake.GetNameWithNoTooltip] припиняє [francis_drake.GetHisHer] грабіжницькі дії під час цієї подорожі"
  flavor_eng.137.tt3: "Прибутки, що належать Короні, виплачуються після повернення [francis_drake.GetHisHer] до [target_root_country.GetNameWithNoTooltip]"
  flavor_eng.137.tt4: "Викрадено: #Y [ROOT.GetVariable('drake_loot').GetValue]#! дукатів"
  flavor_eng.137.historical_info: "Наприкінці 1500-х років Френсіс Дрейк очолював численні напади на іспанські поселення, порти та судна в Карибському морі, захоплюючи скарби та послаблюючи іспанське панування. Рейди зробили Дрейка багатою людиною та сприяли піднесенню Англії як морської держави."
  flavor_eng.138.title: "[francis_drake.GetNameWithNoTooltip] грабує [target_location.GetNameWithNoTooltip]"
  flavor_eng.138.desc: "Сумнозвісний [francis_drake.GetCulture.GetName] капер [francis_drake.GetName] здійснив зухвалий напад на одне з наших менш захищених поселень і завдав значної шкоди. Будівлі були підпалені, скарбниця розграбована, а всі захоплені [ShowPopTypeName('slaves')] були звільнені."
  flavor_eng.138.a: "Зміцнити оборону."
  flavor_eng.138.tt1: "[target_location.GetName] захищено від подальших нападів після завершення будівництва прибережної фортеці"
  flavor_eng.138.b: "Незначна незручність."
  flavor_eng.138.tt2: "[target_location.GetName] може бути атаковано знову"
  flavor_eng.138.historical_info: "$flavor_eng.137.historical_info$"
  flavor_eng.139.title: "[christopher_marlowe.GetNameWithNoTooltip]"
  flavor_eng.139.desc: "Сміливий та винахідливий драматург шукає нового покровителя, щоб продовжити свій внесок у галузь драми. [christopher_marlowe.GetName] часто хвалять колеги-митці, які називають [christopher_marlowe.GetHerHim] першопрохідцем та джерелом натхнення, і він відомий тим, що володіє різноманітними здібностями."
  flavor_eng.139.a: "Письменник повинен писати, і вільно."
  flavor_eng.139.tt1: "[christopher_marlowe.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.139.tt2: "[christopher_marlowe.GetSheHe|U] присвячує [christopher_marlowe.GetHisHer] час написанню і, ймовірно, створить численні п'єси для насолоди"
  flavor_eng.139.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені через протидію [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.139.b: "Нехай він шпигує для нас."
  flavor_eng.139.tt4: "[christopher_marlowe.GetNameWithNoTooltip] найнятий шпигуном [francis_walsingham.GetName]"
  flavor_eng.139.c: "Не потрібно. Ми віддаємо перевагу ляльковим виставам."
  flavor_eng.139.historical_info: "Крістофер Марлоу був впливовим англійським драматургом, поетом і перекладачем, який написав такі видатні твори, як #italic Геро і Леандр#! та #italic Едуард II#!. Він вважається провідним драматургом Лондона і був великим джерелом впливу для легендарного Вільяма Шекспіра. Марлоу помер у ранньому віці за загадкових обставин, серед потенційних причин називають гомосексуальні інтриги, зраду іншого драматурга та шпигунство з найвищих кіл."
  flavor_eng.140.title: "[walter_raleigh.GetNameWithNoTooltip]"
  flavor_eng.140.desc: "Дещо приборкувач повстань і улюбленець двору, [walter_raleigh.GetName] розглядає [walter_raleigh.GetHisHer] наступний кар'єрний крок після повернення з небезпечної подорожі, з якої він привіз із [walter_raleigh.GetHimHer] дивної форми їстівний плід та досить п'янку курильну речовину.\n\nВін звернувся до [ROOT.GetCountry.GetGovernment.GetRuler.GetName] з наміром обговорити це питання далі. [walter_raleigh.GetShortNameWithNoTooltip] не може приховати [walter_raleigh.GetHisHer] задоволення, коли спливає тема [walter_raleigh.GetHisHer] численних подорожей, однак він залишається на милість [ROOT.GetCountry.GetGovernment.GetRulerTitle] і може бути корисним в інших справах."
  flavor_eng.140.a: "Наші заморські прагнення чекають на [walter_raleigh.GetHisHer] керівництво."
  flavor_eng.140.tt1: "[walter_raleigh.GetNameWithNoTooltip] додано як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.140.tt2: "Він може поповнювати запаси будь-яких колоній у [ShowAreaName('southern_new_england_area')], якщо його призначено досліджувати Новий Світ"
  flavor_eng.140.b: "Ірландія потребує твердої руки."
  flavor_eng.140.custom: "Кожна володіння або підпорядкована [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('ireland_region')] отримує [ShowModifier('raleigh_firm_hand')]"
  flavor_eng.140.tt3: "[walter_raleigh.GetNameWithNoTooltip] додано як [Concept('general', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.140.tt4: "[walter_raleigh.GetHisHer|U] репутація щодо придушення повстань у [ShowRegionName('ireland_region')] зменшує ймовірність майбутніх заворушень"
  STATIC_MODIFIER_NAME_raleigh_firm_hand: "Тверда рука Релі"
  flavor_eng.140.c: "Державні справи йому добре підходять."
  flavor_eng.140.tt5: "[walter_raleigh.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.140.tt6: "[walter_raleigh.GetHisHer|U] присутність при дворі засліплює закоханого [target_root_country.GetGovernment.GetRuler.GetName]"
  flavor_eng.140.d: "Наші долі не переплетені."
  flavor_eng.140.tt7: "[walter_raleigh.GetNameWithNoTooltip] та [walter_raleigh.GetHisHer] таємничим культурам відмовлено в аудієнції"
  eng_raleighs_gifts: "Представлено [ShowGoodsName('potato')] та [ShowGoodsName('tobacco')]"
  flavor_eng.140.historical_info: "Сер Волтер Релі був англійським дослідником, солдатом, поетом і політиком. Він брав участь у кількох експедиціях до Нового Світу і відомий своїм авантюрним духом. Він відіграв важливу роль у заснуванні першої англійської колонії в Північній Америці, яку він назвав Вірджинією на честь королеви Єлизавети I. Релі залишався популярним у королеви, яка вважала його дотепним, чарівним і обдарованим літературними талантами."
  flavor_eng.141.title: "[thomas_tallis.GetNameWithNoTooltip]"
  flavor_eng.141.desc_common: "Про [thomas_tallis.GetName] високо відгукуються в музичних колах, які часто називають його джерелом натхнення, і він відомий своїм оригінальним голосом та використанням складних гармоній і мелодійної краси."
  flavor_eng.141.desc: "Висококваліфікований композитор, який працював над широким спектром сакральної музики, шукає нового покровителя, щоб продовжити свій внесок у хорові твори.\n\n$flavor_eng.141.desc_common$"
  flavor_eng.141.desc_dissolution_of_monasteries: "Після розпуску монастирів такі митці, як [thomas_tallis.GetName], які переважно були активними в релігійних колах, намагаються знайти роботу. Будучи винятково талановитим композитором, він тепер шукає щастя при дворі, де прагне покровительства, щоб продовжити свій внесок у галузь музики.\n\n$flavor_eng.141.desc_common$"
  flavor_eng.141.a: "Королівська капела чекає на нього."
  flavor_eng.141.tt1: "[thomas_tallis.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.141.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені тим, що єретику дозволено вільно творити через [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_eng.141.tt3: "Твори, створені [thomas_tallis.GetNameWithNoTooltip], надихають інших композиторів"
  flavor_eng.141.b: "Спалити його за єресь."
  flavor_eng.141.tt4: "[ShowPolicyName('de_heretico_comburendo')] вимагає спалення єретиків"
  flavor_eng.141.c: "Нехай налаштовує свої струни деінде."
  flavor_eng.141.tt5: "[thomas_tallis.GetNameWithNoTooltip] навряд чи створить значні твори, оскільки він намагається знайти роботу після розпуску монастирів"
  flavor_eng.141.historical_info: "Томас Талліс був англійським композитором, відомим своїми хоровими творами та майстерністю поліфонії — музичної техніки, що передбачає гармонійне поєднання кількох незалежних мелодій. Він став невід'ємною частиною формування англійської хорової традиції та вважається одним із найвидатніших композиторів Англії. Він служив при дворі як композитор та виконавець під час правління всіх монархів Тюдорів, за винятком Генріха VII."
  flavor_eng.142.title: "Spem in alium"
  flavor_eng.142.desc: "Шедевр-мотет був написаний [thomas_tallis.GetName], який готовий поділитися ним зі світом. Він сповнений складності та інновацій, і написаний для сорока окремих голосів, розділених на вісім хорів по п'ять голосів кожен, а саме: сопрано, альт, тенор, баритон та бас.\n\nРекомендується виконувати його у великих приміщеннях або соборах, оскільки це дозволить слухачеві повністю відчути занурюючий та обволікаючий ефект багатьох голосів."
  flavor_eng.142.a: "Музика для наших вух."
  flavor_eng.142.b: "Натомість просувати його інші роботи."
  flavor_eng.142.historical_info: "#italic Spem in alium #! був написаний близько 1570 року англійським композитором Томасом Таллісом і вважається монументальною хоровою композицією та вершиною ренесансної поліфонічної музики. Він був створений як демонстрація його композиторських навичок та для показу можливостей англійської хорової музики."
  flavor_eng.143.title: "[francis_drake.GetNameWithNoTooltip] повертається"
  flavor_eng.143.desc: "Великий авантюрист [francis_drake.GetName] повертається з трюмом, наповненим багатствами. Його нещодавня подорож до Нового Світу дозволила йому накопичити загалом #Y [ROOT.GetVariable('drake_loot').GetValue]#! дукатів, які мають бути доставлені до скарбниці, як було домовлено раніше."
  flavor_eng.143.a: "Вперед, великий досліднику."
  flavor_eng.143.tt1: "[francis_drake.GetNameWithNoTooltip] може продовжувати грабувати будь-які вразливі колонії, які він зустріне, якщо його призначити досліджувати Новий Світ"
  flavor_eng.143.b: "Покласти край рейдам."
  flavor_eng.143.tt2: "Майбутні подорожі [francis_drake.GetNameWithNoTooltip] будуть більш мирними"
  flavor_eng.143.historical_info: "Повернення Френсіса Дрейка до Англії після його першої подорожі до Карибського моря святкувалося по всьому королівству. Подорож вважалася значним досягненням в англійській розвідці та піратстві, що підняло англійський бойовий дух і сприяло зростаючому почуттю гордості та впевненості проти переважного супротивника."
  flavor_eng.144.title: "Плантація [ShowAreaNameWithNoTooltip('ulster_area')]"
  flavor_eng.144.desc: "Було розроблено сміливий план, який передбачає переселення поселенців з наших північних територій до ірландської провінції [ShowAreaName('ulster_area')] з наміром англізувати та водночас відвернути населення від хибної доктрини [ShowReligionAdjective('catholic')] Церкви.\n\nЙмовірно, це зустріне ворожість місцевих жителів, але вважається обов'язковим, якщо ми хочемо зміцнити наше панування над островом."
  flavor_eng.144.a: "Це має бути зроблено."
  flavor_eng.144.a.custom1: "Значна кількість [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] емігрують з [emigration_province_1.GetProvince.GetName] та [emigration_province_2.GetProvince.GetName], щоб заснувати плантації в [ShowAreaName('ulster_area')]"
  flavor_eng.144.a.custom2: "Міграція з [target_root_country.GetNameWithNoTooltip] сильно засмучує корінне населення, водночас збільшуючи вплив [target_root_country.GetAdjectiveWithNoTooltip] культури та релігії"
  flavor_eng.144.b: "Ми ризикуємо внутрішніми чварами."
  flavor_eng.144.historical_info: "Найпівнічніша ірландська провінція Ольстер становила виклик для англійської влади на острові, будучи менш культурно та релігійно впливовою, а її мешканці гордо проявляли себе як гельські католики. Щоб вирішити цю проблему та створити демографічний і культурний зсув у регіоні, Британська корона розробила план, відомий як Плантація Ольстера, щоб колонізувати його за підтримки заможних землевласників. Протестантів з північної Англії та південної Шотландії заохочували переїжджати та оселятися в Північній Ірландії, де землі конфісковувалися у бунтівних ірландських вождів та їхніх послідовників, щоб бути перерозподіленими серед новоприбулих поселенців."
  flavor_eng.145.title: "Левантійська торгова компанія"
  flavor_eng.145.desc: "Присутність [ROOT.GetCountry.GetAdjective] купців на левантійських територіях вкрай недостатня, і ми перебуваємо у владі інших середземноморських держав щодо торговельних можливостей у цьому регіоні.\n\nНагально необхідно створити торговельну компанію для захисту наших інтересів та забезпечення доступу до найкращих товарів зі Сходу."
  flavor_eng.145.a: "Чудова ідея."
  flavor_eng.145.b: "Вони не мають нічого цінного."
  flavor_eng.145.historical_info: "Компанія купців Англії, що торгувала з Левантом, була заснована після надання королівської хартії королевою Єлизаветою I, з метою торгівлі з Османською імперією та її сусідами. Обмін різноманітними товарами, включаючи текстиль, спеції та інші предмети розкоші, між Англією та левантійськими територіями був пріоритетом для компанії, яка згодом заснувала торгові пости по всьому східному Середземномор'ю."
  flavor_eng.147.title: "Дослідження [walter_raleigh.GetNameWithNoTooltip]"
  flavor_eng.147.desc: "Новий Світ картографується сумнозвісним дослідником [walter_raleigh.GetName], який великодушно зупинився, щоб поповнити запаси наших колоній у [ShowAreaName('southern_new_england_area')] на своєму шляху до [ROOT.GetCountry.GetName].\n\nЙого експедиція має невеликий штат, але добре оснащена для постачання колонії на короткий період часу. Це, на жаль, означає, що здобич від досліджень, призначена для [ROOT.GetCountry.GetGovernment.GetRuler.GetName], розподіляється серед колоністів."
  flavor_eng.147.a: "Така щедрість."
  flavor_eng.147.tt1: "Населення колоній у [target_colony.GetProvinceDefinition.GetName] незначно зростає внаслідок допомоги, наданої [walter_raleigh.GetNameWithNoTooltip]"
  flavor_eng.147.b: "$common_string_let_them_fend_for_themselves$"
  flavor_eng.147.historical_info: "Наприкінці 1580-х років Ралі спонсорував дві експедиції до Північної Америки з метою заснування англійської колонії в Новому Світі. Колонія була заснована, але не була забезпечена необхідним через початок англо-іспанської війни. Незважаючи на невдачу, дослідження Ралі проклали шлях до заснування колонії Джеймстаун у Вірджинії."
  flavor_eng.148.title: "Старий Мідноносий"
  flavor_eng.148.desc: "Постійні війни та надмірні витрати спричиняють дефіцит дорогоцінних металів, необхідних для карбування монет. Ми повинні прагнути зменшити кількість дорогоцінних металів у [ShowGoodsName('goods_gold')] та [ShowGoodsName('silver')] монетах або ризикувати постійним дефіцитом, доки витрати не будуть обмежені. Вигідною альтернативою буде [ShowGoodsName('copper')], який дешевий і легко доступний. Будь-яке знецінення, ймовірно, буде виявлено купцями, що призведе до падіння вартості нашої валюти."
  flavor_eng.148.a: "Ввести дешевший метал."
  flavor_eng.148.b: "Втручання не потрібне."
  flavor_eng.148.historical_info: "Велике знецінення було навмисною девальвацією англійської валюти під час правління Генріха VIII, яка передбачала зменшення кількості дорогоцінних металів у золотих і срібних монетах при збереженні їхньої номінальної вартості. Метою було отримання додаткових доходів для Корони, і в певний момент мідь становила такий високий відсоток, що тонкий шар срібла стирався з виступаючого носа портрета короля, за що король отримав прізвисько «Старий Мідноносий»."
  eng_lack_of_bullion: "Брак дорогоцінних металів для карбування"
  eng_copper_introduced: "Збільшення міді у виробництві монет"
  flavor_eng.149.title: "Змова Бабінгтона"
  flavor_eng.149.desc: "Нам стало відомо про змову, спрямовану на скинення [ROOT.GetCountry.GetGovernment.GetRuler.GetName] та заміну [ROOT.GetCountry.GetGovernment.GetRuler.GetHimHer] на [pretender.GetName]. План організовує [anthony_babington.GetName] і вже запущений, а [ShowReligionAdjective('catholic')] піддані по всьому [ROOT.GetCountry.GetName] готові приєднатися до повстанців."
  flavor_eng.149.a: "Ще один переворот зазнає краху."
  flavor_eng.149.tt1: "Складна шпигунська мережа [francis_walsingham.GetNameWithNoTooltip] зриває переворот, перш ніж він зможе розгорнутися"
  flavor_eng.149.b: "Тривожний поворот подій."
  flavor_eng.149.a.custom1: "Значна частина наших [ShowReligionAdjectiveWithNoTooltip('catholic')] підданих повстає на підтримку [pretender.GetNameWithNoTooltip]"
  flavor_eng.149.c: "Піти на значні поступки."
  flavor_eng.149.tt2: "[pretender.GetNameWithNoTooltip] та [anthony_babington.GetNameWithNoTooltip] гарантовано безпечний прохід з [ROOT.GetCountry.GetNameWithNoTooltip] і можуть спробувати інше повстання в майбутньому"
  babington_support: "Прихильники Бабінгтона"
  flavor_eng.149.historical_info: "Змова Бабінгтона була невдалим #italic державним переворотом#! з метою вбивства королеви Єлизавети I та заміни її на Марію, королеву Шотландії, побожну католичку. Змова була організована Ентоні Бабінгтоном і включала серію листів, якими обмінювалися Бабінгтон і Марія, деталізуючи та санкціонуючи переворот та його учасників. Листи були перехоплені великим шпигуном Єлизавети, Френсісом Волсінгемом, що зрештою призвело до арешту, суду та страти Марії."
  flavor_eng.150.title: "Тамерлан Великий"
  flavor_eng.150.desc: "Двочастинна п'єса, що черпає натхнення з життя легендарного імператора, була завершена [christopher_marlowe.GetName]. Написана, щоб кинути виклик попереднім п'єсам, які сильно покладаються на незграбні фрази та неструктурований сюжет, #italic Тамерлан Великий#! захоплює аудиторію своєю переконливою мовою та драматичними конфліктами. Наповнена сильними персонажами, поглинутими непереборними пристрастями, очікується, що вона приверне чималу публіку публіки після виходу."
  flavor_eng.150.a: "Ми зачаровані."
  flavor_eng.150.b: "Інші театральні роботи [christopher_marlowe.GetHisHer|U] заслуговують на визнання."
  flavor_eng.150.historical_info: "#italic Тамерлан Великий#! — відома єлизаветинська п'єса, написана Крістофером Марлоу. Вона розповідає про $tamburlaine_the_great_common$"
  flavor_eng.151.title: "[william_cecil.GetNameWithNoTooltip]"
  flavor_eng.151.desc: "Впевнений і рішучий на вигляд [william_cecil.GetName] входить до двору. Вага відповідальності, здається, зручно лежить на [william_cecil.GetHisHer] плечах, і його сприймають як людину, готову запропонувати [william_cecil.GetHisHer] пораду та досвід тим, хто при владі. Він володіє багатими знаннями та гострим стратегічним розумом, і міг би природно вписатися в державні справи."
  flavor_eng.151.a: "Приносить процвітання."
  flavor_eng.151.tt1: "[william_cecil.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.151.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] раді бачити поборника [target_root_country.GetReligion.GetName] віри при владі"
  flavor_eng.151.b: "Нехай [william_cecil.GetHimHer] служить парламентарем."
  flavor_eng.151.tt4: "[william_cecil.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e], але він не може служити при дворі"
  flavor_eng.151.tt5: "Він продовжує засідати в парламенті, щоб просувати порядок денний [target_root_country.GetGovernment.GetRulerTitle]"
  flavor_eng.151.c: "Нам не потрібні додаткові поради."
  STATIC_MODIFIER_NAME_working_from_within: "Працюючи зсередини"
  flavor_eng.151.historical_info: "Вільям Сесіл був впливовим радником королеви Єлизавети I і залишався одним з її найближчих і найнадійніших радників протягом усього її правління. Він обіймав кілька ключових посад, таких як Державний секретар, а пізніше Лорд-скарбник, і допоміг Англії пройти через внутрішні та міжнародні виклики. Він невтомно працював на протестантську справу та для зміцнення англійської монархії."
  flavor_eng.152.title: "Подвиги [john_hawkins.GetNameWithNoTooltip]"
  flavor_eng.152.desc: "Мореплавець і військово-морський командир [john_hawkins.GetName] запропонував подорож до [ShowRegionName('guinea_region')] з метою отримання поневолених африканців та встановлення регіональної присутності для наших купців. [ShowPopTypeName('slaves')] потім будуть транспортовані до колоній [slave_selling_location.GetOwner.GetName] в Америці, де їх можна буде продати з прибутком."
  flavor_eng.152.a: "Ми хочемо взяти участь."
  flavor_eng.152.tt1: "[john_hawkins.GetNameWithNoTooltip] додано як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.152.tt2: "Він фрахтує корабель у [target_root_country.GetGovernment.GetRuler.GetName] за значну плату"
  flavor_eng.152.tt3: "Він незаконно провозить рабів до [slave_selling_location.GetName], розлючуючи [slave_selling_location.GetOwner.GetName]"
  flavor_eng.152.b: "Ми не хочемо брати в цьому участь."
  flavor_eng.152.historical_info: "Джон Гокінс вважається першим англійським купцем, який отримав прибуток від трикутної торгівлі. У 1560-х роках він успішно обійшов торгове ембарго Іспанії проти Англії та продав кількох рабів колоніям у Карибському басейні, що зробило його багатою людиною. Він також брав участь у кількох ключових морських битвах, включаючи перемогу над Іспанською армадою, де він служив віце-адміралом англійського флоту."
  flavor_eng.153.title: "Люди [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_eng.153.desc: "Група акторів прагне ставити свої вистави під патронатом [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Вистави сприятимуть розвитку драми та літератури, а також забезпечуватимуть розваги для [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. П'єси варіюватимуться від комедій до трагедій та історичних драм."
  flavor_eng.153.a: "Сцена ваша."
  flavor_eng.153.a.custom: "Усі [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('great_britain_region')] з [ShowBuildingTypeName('theater')] отримують [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [ShowPopTypeName('peasants')] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.153.tt1: "Театральна трупа виступає лише в театрах"
  flavor_eng.153.b: "Встановіть тимчасові сцени."
  flavor_eng.153.b.custom: "Кожне місто та [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('great_britain_region')] з [ShowBuildingTypeName('theater')] отримують [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [ShowPopTypeName('peasants')] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.153.tt2: "Театральна трупа виступає у великих містах та театрах"
  flavor_eng.153.tt3: "Відданість [target_root_country.GetGovernment.GetRulerTitle] радувати публіку збільшує [target_root_country.GetGovernment.GetRuler.GetHisHer] популярність"
  flavor_eng.153.c: "Є інші пріоритети."
  flavor_eng.153.historical_info: "«Люди королеви Єлизавети» були однією з багатьох акторських груп, що виступали наприкінці 16-го та на початку 17-го століть. Вони допомогли популяризувати театр, що, своєю чергою, призвело до створення постійних театрів, таких як «Глобус». Актори виконували різноманітні п'єси, включаючи твори відомих драматургів, таких як Вільям Шекспір та Крістофер Марлоу."
  flavor_eng.154.title: "Ромео і Джульєтта"
  flavor_eng.154.desc: "Нова трагедія, написана [william_shakespeare.GetName], схоже, є темою розмов у місті. Під назвою #italic Ромео і Джульєтта#!, вона розгортається у [ShowLocationName('verona')] і обертається навколо пристрасної історії кохання двох юнаків з ворогуючих династій. Ходять чутки, що вона досить напружена і сповнена драматичних подій з несподіваним поворотом."
  flavor_eng.154.a: "Нарешті, щасливий кінець."
  flavor_eng.154.b: "Натомість виділіть інші його п'єси."
  flavor_eng.154.historical_info: "Одна з найвідоміших і найтриваліших п'єс Вільяма Шекспіра, «Ромео і Джульєтта», вважається шедевром світової літератури. Вважається, що вона була написана на початку його кар'єри, між 1591–1596 роками, і залишалася найпопулярнішою п'єсою, що виконувалася за його життя."
  flavor_eng.155.title: "[james_lancaster.GetNameWithNoTooltip]"
  flavor_eng.155.desc: "Капер і купець, добре обізнаний у морських справах, звернувся до нас з надією взяти участь у подорожі до Ост-Індії. [james_lancaster.GetName] стверджує, що [ROOT.GetCountry.GetName] повинна закріпитися поблизу Островів Прянощів, щоб скористатися вигідною торгівлею в [ShowRegionName('indonesia_region')].\n\nКрім того, він представляє результати свого нещодавнього польового дослідження, демонструючи, що споживання окремих [ShowGoodsName('fruit')] покращує здоров'я наших моряків і зменшує частоту так званої «хвороби моряків». Новини про це вже поширилися і, ймовірно, призведуть до зростання попиту на такі товари."
  flavor_eng.155.a: "Нам потрібні ці прянощі."
  flavor_eng.155.tt1: "[james_lancaster.GetNameWithNoTooltip] додано як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.155.tt2: "Він може заснувати [ShowBuildingTypeName('overseas_trading_post')] у [ShowRegionName('indonesia_region')], якщо його призначать досліджувати Ост-Індію"
  flavor_eng.155.b: "Відправте його в експедицію за [ShowGoodsNameWithNoTooltip('fruit')]."
  flavor_eng.155.tt3: "[james_lancaster.GetSheHe|U] засновує [ShowBuildingTypeName('overseas_trading_post')] на острові [ShowRegionName('madagascar_region')], щоб забезпечити постачання [ShowGoodsNameWithNoTooltip('fruit')]"
  flavor_eng.155.c: "Зараз не час для змін."
  flavor_eng.155.tt4: "[james_lancaster.GetNameWithNoTooltip] та його цитрусові роздуми відхилено в аудієнції"
  eng_lancasters_findings: "Протицингові властивості цитрусового соку"
  flavor_eng.155.historical_info: "Джеймс Ланкастер брав участь у кількох успішних експедиціях до Азії та був одним із засновників Британської Ост-Індської компанії. У 1600 році він командував експедицією до Ост-Індії, щоб забезпечити частку Англії у прибутковій торгівлі прянощами. Він провів значний час на острові Мадагаскар, де збирав фрукти для свого екіпажу. Вони виявилися ефективними проти цинги, руйнівної нестачі вітамінів, яка мучила моряків під час їхніх довгих подорожей. Його відкриття призвели до того, що Адміралтейство зобов'язало всіх моряків вживати лимонний сік."
  flavor_eng.156.title: "Ост-Індська факторія"
  flavor_eng.156.desc: "Відомий дослідник та експерт з цитрусових [james_lancaster.GetName] наразі досліджує Ост-Індію та встановив дипломатичні зв'язки з регіональною державою. [ROOT.GetCountry.GetName] тепер має шанс заснувати стратегічний [ShowBuildingTypeName('overseas_trading_post')] у регіоні, який має надати нам доступ до дуже бажаних островів [ShowAreaName('moluccas_area')]."
  flavor_eng.156.a: "Переконлива пропозиція."
  flavor_eng.156.b: "Мало що можна отримати."
  flavor_eng.156.historical_info: "Під час колоніальної ери європейські держави засновували торгові пости та факторії в різних частинах Південно-Східної Азії для полегшення торгівлі, особливо прянощами, такими як гвоздика, мускатний горіх та перець. Перша англійська факторія була заснована в місті Бантен під прапором Ост-Індської торгової компанії."
  flavor_eng.157.title: "Про магніт"
  flavor_eng.157.desc: "Просвітлений філософ і фізик [william_gilbert.GetName] наразі присвячує себе науковим експериментам з магнетизму в [target_location.GetName] [ShowBuildingTypeName('university')]. Використовуючи природно намагнічені мінерали, він дійшов висновку, що сама Земля є гігантським магнітом, що пояснює безперервну орбіту Місяця.\n\nВін узагальнив [william_gilbert.GetHisHer] висновки в книзі під назвою #italic De Magnete, Magneticisque Corporibus, et de Magno Magnete Tellure#!, яку він готовий надрукувати. Однак [william_gilbert.GetHisHer] ідеї глибоко непопулярні серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], але [william_gilbert.GetHisHer] внесок був би дуже корисним для нашої наукової спільноти."
  flavor_eng.157.a: "Опублікувати її."
  flavor_eng.157.tt1: "[william_gilbert.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.157.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розгнівані публікацією книги через [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.157.b: "Спалити його та його книгу."
  flavor_eng.157.tt3: "[ShowPolicyName('de_heretico_comburendo')] наказує спалювати єретиків"
  flavor_eng.157.c: "Запобігти публікації."
  flavor_eng.157.historical_info: "Найвідоміша праця Вільяма Гілберта вважається одним з основоположних текстів в історії магнетизму та електрики. Книга була революційною для свого часу, пропонуючи такі ідеї, як те, що сама Земля є гігантським магнітом. Вона мала глибокий вплив на наукову спільноту свого часу і стала натхненням для майбутніх вчених, таких як сер Ісаак Ньютон."
  flavor_eng.158.title: "Золота промова"
  flavor_eng.158.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] підготував ретельну промову, щоб вирішити деякі нагальні проблеми, які зараз турбують нашу країну. Очікується, що вона надихне та згуртує населення навколо [ROOT.GetCountry.GetGovernment.GetRuler.GetName] і зміцнить стабільність [ROOT.GetCountry.GetName]."
  flavor_eng.158.a: "Прочитати всю промову."
  flavor_eng.158.tt1: "Риторичні здібності [target_character.GetNameWithNoTooltip] торкаються всіх"
  flavor_eng.158.b: "Зосередитися на єдності та гармонії."
  flavor_eng.158.c: "Зосередитися на любові та відданості [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_eng.158.historical_info: "Золота промова була виголошена 30 листопада 1601 року королевою Єлизаветою I перед Парламентом. Цей період був відзначений політичними заворушеннями та напругою через питання престолонаслідування, триваючу англо-іспанську війну, а також фракційність та розбіжності всередині країни. Промова була добре сприйнята і вважається майстерним прикладом риторичних навичок королеви."
  flavor_eng.159.title: "Контрвибух проти [ShowGoodsNameWithNoTooltip('tobacco')]"
  flavor_eng.159.desc: "Відвертий [ROOT.GetCountry.GetGovernment.GetRuler.GetName] висловив [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] неприязнь до [ShowGoodsName('tobacco')], наголошуючи на його небезпеці для легень та засуджуючи його неприємний запах. [ROOT.GetCountry.GetGovernment.GetRulerTitle] бажає опублікувати трактат, щоб публічно вплинути на думки, але розглядаються більш рішучі заходи для боротьби з цією нібито небезпечною речовиною."
  flavor_eng.159.a: "Ввести тариф на імпорт [ShowGoodsNameWithNoTooltip('tobacco')]."
  flavor_eng.159.tt1: "Каральні заходи [target_character.GetNameWithNoTooltip] засмучують споживачів [ShowGoodsNameWithNoTooltip('tobacco')]"
  flavor_eng.159.b: "Ввести тимчасову заборону на імпорт [ShowGoodsNameWithNoTooltip('tobacco')]."
  flavor_eng.159.tt2: "Відмова від [ShowGoodsNameWithNoTooltip('tobacco')], яку відчувають споживачі, компенсується збільшенням споживання [ShowGoodsName('beer')]"
  flavor_eng.159.tt3: "Економічні наслідки заборони призводять до закриття плантацій [ShowGoodsNameWithNoTooltip('tobacco')] у колоніях"
  flavor_eng.159.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] незадоволені втручанням у торгівлю"
  STATIC_MODIFIER_NAME_tobacco_imports_banned: "Імпорт тютюну заборонено"
  STATIC_MODIFIER_NAME_tax_tobacco: "Оподаткований тютюн"
  eng_compensating_addictions: "Компенсація тютюнової залежності"
  eng_growing_addiction: "Популяризація тютюну"
  flavor_eng.159.c: "Задовольнитися публікацією трактату."
  flavor_eng.159.tt5: "Попит на [ShowGoodsNameWithNoTooltip('tobacco')] тимчасово зростає через відсутність державного втручання"
  flavor_eng.159.historical_info: "#italic Контрвибух проти тютюну#! був трактатом, написаним і опублікованим королем Яковом VI, що висловлював його опозицію та відразу до куріння тютюну. Його опозиція призвела до запровадження акцизного податку та тарифу на імпорт тютюну. Економічний ефект для колоній був загалом негативним, а втручання мало що зробило для зменшення попиту на тютюн в Англії."
  flavor_eng.160.title: "[luisa_carvajal.GetNameWithNoTooltip] і Мендоса"
  flavor_eng.160.desc: "Благочестива та поетична [luisa_carvajal.GetName] деякий час займалася прозелітичною діяльністю поблизу [ShowLocationName('london')] і була знову ув'язнена після того, як її спіймали на суперечці з населенням, захищаючи [ShowReligionName('catholic')] як істинну релігію.\n\nВона відома своєю значною роботою в благодійних колах і користується великою повагою у [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], але [luisa_carvajal.GetHisHer] повторювані провини ризикують налаштувати деяких наших менш знатних громадян проти нас, оскільки релігійні розбіжності часто призводили до конфронтацій."
  flavor_eng.160.a: "Негайно депортувати її."
  flavor_eng.160.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] засмучені припиненням благодійних послуг [luisa_carvajal.GetNameWithNoTooltip]"
  flavor_eng.160.b: "Спалити її за єресь."
  flavor_eng.160.tt2: "[ShowPolicyName('de_heretico_comburendo')] вимагає спалювати єретиків"
  flavor_eng.160.tt3: "[GetCountry('SPA').GetName] дуже ображене стратою одного зі своїх громадян"
  flavor_eng.160.c: "Трохи милосердя нікому не зашкодило."
  flavor_eng.160.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлюють незадоволення через протидію [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_eng.160.tt5: "[luisa_carvajal.GetNameWithNoTooltip] успішно навертає частину своїх послідовників до [ShowReligionAdjective('catholic')] віри"
  flavor_eng.160.historical_info: "Луїза Карвахаль-і-Мендоса була іспанською дворянкою та побожною католичкою наприкінці XVI – на початку XVII століть. Вона переїхала до Англії з єдиною метою навернення англіканців до католицизму, за що була готова померти. Її відвертий захист католицизму призвів до багаторазових ув'язнень, і зрештою вона померла від хвороби незабаром після того, як було прийнято рішення про її депортацію до Іспанії."
  flavor_eng.161.title: "Втеча графів"
  flavor_eng.161.desc: "Відчуваючи поразку та стикаючись зі зростаючим [ROOT.GetCountry.GetAdjective] контролем, ірландські графи зібралися, щоб обговорити можливість виїзду з Ірландії, аби уникнути подальших конфліктів та потенційної відплати.\n\nВони можуть спробувати шукати допомоги у [ShowReligionAdjective('catholic')] європейських держав, однак це навряд чи похитне наш контроль над регіоном. Ми могли б спробувати заспокоїти їх, запропонувавши певний рівень самоврядування, проте це, ймовірно, затримає наші зусилля щодо успішного підкорення острова."
  flavor_eng.161.a: "Нехай ідуть."
  flavor_eng.161.a.custom: "[ShowCultureName('irish')] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] з [ShowAreaName('ulster_area')] емігрують до [ShowProvinceDefinitionName('coruna_province')]"
  flavor_eng.161.b: "Надати додаткову автономію."
  flavor_eng.161.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] з [ShowProvinceDefinitionName('ulster_province')] заспокоєні"
  flavor_eng.161.historical_info: "Після поразки повстання Х'ю О'Ніла ірландські вожді та аристократи вирішили покинути Ірландію. Їхній від'їзд мав тривалий вплив на ірландське суспільство, політику та культуру і сприяв занепаду традиційної гельської аристократії. Метою було пошук іноземної підтримки для військової інтервенції, причому Іспанія була першим пунктом призначення."
  flavor_eng.162.title: "«Морська пригода»"
  flavor_eng.162.desc: "Перше спеціально спроектоване судно для емігрантів, призначене для поповнення колоній у [ShowAreaName('southern_new_england_area')], зазнало аварії на острові [ShowLocationName('bermuda')], залишивши моряків та колоністів на мілині. Вони стоять перед вибором: залишитися, або ж можна спробувати зібрати їх за допомогою другого судна, яке, своєю чергою, перевезе їх далі для виконання початкової місії #italic «Морської пригоди»#!.\n\nПотенційна скрута нависає над нашими колоніями в [ShowAreaNameWithNoTooltip('southern_new_england_area')], якщо їх не буде належним чином поповнено."
  flavor_eng.162.a: "Вони залишаться."
  flavor_eng.162.b: "Вони потрібні в колоніях."
  flavor_eng.162.historical_info: "#italic «Морська пригода»#! було судном постачання, що прямувало до колонії Джеймстаун у Вірджинії разом з вісьмома іншими кораблями. Його відправила Вірджинська компанія у 1609 році, везучи припаси та поселенців до поселення, що переживало труднощі. Корабель відірвався від решти флоту після урагану, був сильно пошкоджений і зазнав корабельної аварії на острові Бермуди, який на той час був безлюдним. Майже через рік після того, як вони опинилися на Бермудах, вцілілі з #italic «Морської пригоди»#! зуміли побудувати два нові кораблі та прибули до Джеймстауна. Їхнє прибуття було вирішальним для виживання колонії."
  flavor_eng.163.title: "Театр «Глобус»"
  flavor_eng.163.desc: "Талановитий [william_shakespeare.GetName] пропонує побудувати дерев'яний відкритий розважальний заклад на південному березі річки Темзи, щоб полегшити постановку багатьох [william_shakespeare.GetHisHer] п'єс.\n\nСаме будівництво буде переважно фінансуватися [william_shakespeare.GetHisHer] театральною трупою, «Слугами лорда-камергера», але близькість театру до річки робить його схильним до пошкоджень у разі повені під час особливо високих припливів. Тому слід побудувати набережну з піднятої землі з [ShowGoodsName('lumber')] укріпленнями, щоб підняти будівлю над передбачуваним рівнем повені."
  flavor_eng.163.a: "Чудовий запобіжний захід."
  flavor_eng.163.tt1: "Захисна набережна будується разом із театром"
  flavor_eng.163.b: "Тільки театр, панове."
  flavor_eng.163.tt2: "Театр «Глобус» буде схильний до затоплення"
  flavor_eng.163.c: "Накласти вето на його будівництво."
  flavor_eng.163.historical_info: "Оригінальний театр «Глобус» був театральним закладом у Лондоні, відомим завдяки Вільяму Шекспіру та його театральним постановкам. Його було спочатку побудовано в 1599 році, але він був знищений пожежею в 1613 році, лише для того, щоб бути відбудованим наступного року. Він розташовувався в районі Бенксайд у Лондоні, одразу за межами міста, оскільки театри не дозволялися в межах міських стін у той час."
  flavor_eng.164.title: "Великий контракт"
  flavor_eng.164.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] загруз у боргах, безсумнівно, спричинених розкішним способом життя та великим домогосподарством, яке потрібно забезпечувати. [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer|U] кабінет звертається до Парламенту з проханням надати щорічний грант в обмін на відмову [ROOT.GetCountry.GetGovernment.GetRulerTitle] від певних прав та повноважень.\n\nУгода, відома як «Великий контракт», збільшить дохід [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та позбавить його боргів. Нездатність досягти фінансового врегулювання заплямує нашу репутацію серед інвесторів та матиме згубний вплив на нашу майбутню здатність залучати кошти."
  flavor_eng.164.c: "Це неможливе завдання."
  flavor_eng.164.tt1: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] має фінансові труднощі, що важко позначається на [target_root_country.GetGovernment.GetRuler.GetHisHer] правлінні"
  flavor_eng.164.tt2: "Лихварі, побоюючись фінансової нестабільності, вимагають більшого забезпечення за будь-які надані позики"
  flavor_eng.164.b: "Переглянути умови."
  flavor_eng.164.tt3: "Переговорні навички [target_character.GetName] забезпечують помірнішу угоду"
  flavor_eng.164.a: "Ми дійшли згоди."
  STATIC_MODIFIER_NAME_great_contract: "Великий Контракт"
  STATIC_MODIFIER_NAME_great_contract_compromise: "Переглянутий Великий Контракт"
  STATIC_MODIFIER_NAME_lack_of_agreement: "Відсутність згоди"
  flavor_eng.164.historical_info: "Великий Контракт був спробою Роберта Сесіла домовитися про фінансування з Парламентом, щоб врегулювати непогашений борг Монархії. В обмін на це Корона мала б відмовитися від своїх феодальних прав опіки та реквізиції, а також від права накладати нові податки. Угода провалилася, оскільки ані Король Яків I, ані Парламент не змогли дійти згоди щодо умов."
  flavor_eng.165.title: "[thomas_harriot.GetNameWithNoTooltip]"
  flavor_eng.165.desc: "Видатний астроном і математик [thomas_harriot.GetName] нині навчається в [ShowLocationName('oxford')] [ShowBuildingTypeName('university')]. Використовуючи такі інструменти, як астролябія та секстанти, він дедалі більше цікавиться дослідженнями навігації та освоєнням Нового Світу.\n\nВін має вибір: або цілковито присвятити себе цій пристрасті [thomas_harriot.GetHisHer], або його можна найняти для продовження [thomas_harriot.GetHisHer] роботи в галузях, що охоплюються [thomas_harriot.GetHisHer] ступенем бакалавра."
  flavor_eng.165.a: "Життєво важливий для нашої наступної експедиції."
  flavor_eng.165.tt1: "[thomas_harriot.GetNameWithNoTooltip] додано як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.165.tt2: "Його перекладацькі навички значно покращують швидкість та успішність експедицій"
  STATIC_MODIFIER_NAME_wonder_translator: "Чудовий Перекладач"
  flavor_eng.165.b: "Отже, математик і астроном."
  flavor_eng.165.tt3: "Внесок [thomas_harriot.GetNameWithNoTooltip] має значну цінність для наукової спільноти"
  flavor_eng.165.c: "Ми чудово обійдемося без нього."
  flavor_eng.165.tt4: "[thomas_harriot.GetNameWithNoTooltip] та [thomas_harriot.GetHisHer] зоряні очі шукають роботу деінде"
  flavor_eng.165.historical_info: "Томас Гарріот зробив кілька внесків у різні галузі науки та досліджень наприкінці 16-го та на початку 17-го століть. Він був одним з перших, хто використав телескоп для астрономічних спостережень, роблячи детальні спостереження Місяця та інших планет. Будучи талановитим лінгвістом, він супроводжував сера Волтера Релі у його подорожах до Північної Америки та вивчив дві мови корінних американців, що зробило його вирішальною частиною експедиції."
  flavor_eng.166.title: "Велика вода [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_eng.166.desc: "Надходять повідомлення про повені по всій [ShowProvinceDefinitionName('cornwall_province')] після потужного припливного нагону, спричиненого штормовою погодою та високим весняним припливом. Втрати майна, сільськогосподарських угідь та життів є значними, деякі райони повністю затоплені.\n\nРічка Темза також постраждала від повені з деякими пошкодженнями в районі південного берега."
  flavor_eng.166.a: "Руйнівні новини."
  globe_repairs: "Ремонт «Глобуса»"
  flavor_eng.166.tt1: "Нещодавно збудована набережна захищає [ShowBuildingTypeName('globe_theatre')] від пошкоджень повінню"
  flavor_eng.166.tt2: "[ShowBuildingTypeName('globe_theatre')] потерпає від повені через відсутність захисної дамби"
  flavor_eng.166.b: "Нехай він занепаде."
  flavor_eng.166.historical_info: "Велика повінь Якова I — це назва, дана масштабній повені, що сталася в 1607 році, спричинивши припливну хвилю, яка пройшла вгору по Бристольському каналу, завдавши значної шкоди південному Уельсу та південно-західній Англії. Повінь підвищила обізнаність про необхідність захисту узбережжя від припливних хвиль та повеней і призвела до значних змін у підходах до управління прибережними зонами."
  flavor_eng.167.title: "Бунт на «Діскавері»"
  flavor_eng.167.desc_common: "Легендарного дослідника [henry_hudson.GetName] востаннє бачили під [ROOT.GetCountry.GetAdjective] прапором, що плив у північні широти, намагаючись знайти легендарний Північно-Західний прохід. Корабель, яким він командував, #italic Discovery#!, нещодавно повернувся до [ROOT.GetCountry.GetNameWithNoTooltip], але без свого капітана, а екіпаж натякав на його залишення через заколот."
  flavor_eng.167.desc_trade_company: "$flavor_eng.167.desc_common$\n\nНаша торгова компанія зацікавлена в безпечному поверненні [henry_hudson.GetHisHer] і просить розпочати пошуково-рятувальну операцію, щоб знайти [henry_hudson.GetHimHer]."
  flavor_eng.167.desc_colonial_nation: "$flavor_eng.167.desc_common$\n\nНаша колонія [target_colony.GetName] зацікавлена в безпечному поверненні [henry_hudson.GetHisHer] і просить розпочати пошуково-рятувальну операцію, щоб знайти [henry_hudson.GetHimHer]."
  flavor_eng.167.a: "Варто кожної копійки."
  flavor_eng.167.tt1: "[henry_hudson.GetNameWithNoTooltip] ніколи не знайдуть"
  flavor_eng.167.tt2: "[henry_hudson.GetNameWithNoTooltip], якщо його знайдуть, додається як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.167.tt3: "Експедиція детально нанесе на карту [ShowAreaName('hudson_bay_sea_zones_area')] під час пошуків зниклого дослідника"
  flavor_eng.167.b: "Бажаємо [henry_hudson.GetHimHer] успіху."
  flavor_eng.167.tt4: "[henry_hudson.GetNameWithNoTooltip] оголошено зниклим безвісти в морі"
  flavor_eng.167.historical_info: "Заколот на борту #italic Discovery#! був організований екіпажем капітана Генрі Гудзона після його бажання продовжувати плавання на захід. Екіпаж вже перезимував у Гудзоновій затоці і висловлював сильне бажання повернутися додому, чому Гудзон противився, що призвело до заколоту більшої частини екіпажу. Заколотники висадили Гудзона, його сина-підлітка Джона та сімох членів екіпажу в затоці, і їх більше ніколи не бачили."
  flavor_eng.168.title: "Олімпійські ігри Котсволда"
  flavor_eng.168.desc: "Було запропоновано організувати місцеве свято для сприяння доброзичливому ставленню простого народу до свого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Воно могло б об'єднати чоловіків і жінок різних класів, з такими заходами, як кінні перегони, танці, метання кувалди та штовхання гомілки, що були б частиною програми. [ShowGoodsName('wild_game')], [ShowGoodsName('fish')] та [ShowGoodsName('beer')] у достатку будуть надані всім присутнім, з кіосками та наметами, встановленими для проведення азартних ігор з невеликими ставками.\n\nБула запропонована відповідна дата, причому четвер та п'ятниця тижня Трійці були обрані як кращий варіант."
  flavor_eng.168.a: "Зробити це щорічною подією."
  flavor_eng.168.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] не схвалює таких святкувань, вважаючи їх язичницького походження"
  STATIC_MODIFIER_NAME_cotswold_olimpick_games: "Олімпійські ігри Котсволда"
  cotswold_olimpick_games: "Олімпійські ігри Котсволда"
  flavor_eng.168.b: "Одного разу буде достатньо."
  flavor_eng.168.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] задоволені та пропонують спонсорувати першу подію"
  flavor_eng.168.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] задоволені та пропонують спонсорувати подію"
  flavor_eng.168.c: "Класи не повинні змішуватися."
  flavor_eng.168.historical_info: "Олімпійські ігри Котсволда — це щорічна подія, що проводиться в регіоні Котсволдс у Глостерширі. Ігри вперше були організовані Робертом Довером, видатним юристом короля Якова I, черпаючи натхнення з давніх Олімпійських ігор Греції. Ігри були припинені після Англійської громадянської війни, але незабаром відновилися і існують донині."
  flavor_eng.169.title: "[inigo_jones.GetNameWithNoTooltip]"
  flavor_eng.169.desc: "Новаторський архітектор та театральний постановник [inigo_jones.GetName] тісно пов'язаний з двором і нещодавно повернувся зі [inigo_jones.GetHisHer] студій в [ShowRegionName('italy_region')]. Він переважно зайнятий організацією екстравагантних масок, але виявив хист до нового архітектурного стилю з впливами греко-римських культур."
  flavor_eng.169.a: "Призначити [inigo_jones.GetHimHer] на посаду Генерального інспектора."
  flavor_eng.169.tt1: "[inigo_jones.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  enable_inigo_architecture_advance: "Надає доступ до [ShowAdvanceName('inigo_architecture')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.169.b: "Сцена потребує [inigo_jones.GetHimHer]."
  flavor_eng.169.tt2: "[inigo_jones.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e], але повністю зосереджується на сцені"
  flavor_eng.169.c: "Дозволити [inigo_jones.GetHimHer] обрати [inigo_jones.GetHisHer] власний шлях."
  flavor_eng.169.historical_info: "Ініго Джонс був англійським архітектором, сценографом та художником і вважається головним впливовим діячем у розвитку англійської архітектури. Він запровадив класичну архітектуру в Англії і спроєктував такі будівлі, як Банкетний дім, Будинок Королеви та дизайн площі Ковент-Гарден. Він також відомий своїми інноваційними проєктами для театральних постановок, запровадивши мальовничі декорації та складні механізми."
  flavor_eng.172.title: "Тоннаж і Фунтаж"
  flavor_eng.172.desc: "Оподаткування імпортованих та експортованих товарів було стабільним джерелом доходу для корони з часів правління [edward_ii.GetName]. Парламент зазвичай надавав цей дохід правлячому монарху довічно, однак нещодавня парламентська сесія запропонувала, щоб тоннаж і фунтаж були надані [ROOT.GetCountry.GetGovernment.GetRulerTitle] на один рік, а не довічно."
  flavor_eng.172.a: "Стягнути податок без парламентської санкції."
  flavor_eng.172.tt1: "[target_root_country.GetGovernment.GetParliament.GetName] не забуде цього кричущого зловживання владою"
  flavor_eng.172.b: "Дозволити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] заблокувати пропозицію."
  flavor_eng.172.tt2: "[target_root_country.GetGovernment.GetParliament.GetName] утримує річний обсяг [Concept('taxes', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.172.c: "Відмовитися підписати."
  flavor_eng.172.tt3: "Питання залишається невирішеним до кінця поточного правління"
  STATIC_MODIFIER_NAME_tonnage_and_poundage_denied: "Тоннаж і Фунтаж Відхилено"
  STATIC_MODIFIER_NAME_abusing_royal_prerogative: "Зловживання Королівською прерогативою"
  flavor_eng.172.historical_info: "Тоннаж і фунтаж були митними зборами, накладеними на імпортовані та експортовані товари, такі як вино, що становили значне джерело доходу для англійської монархії. Тоннаж стосувався мита, що стягувалося на основі ваги або об'єму, тоді як фунтаж стягувався як відсоток від вартості імпортованих товарів. Тоннаж і Фунтаж були скасовані Законом про митні та акцизні збори 1787 року."
  flavor_eng.173.title: "Відновлена Золота Доба"
  flavor_eng.173.desc: "Запропоновано сліпучу маску, розроблену талановитим [inigo_jones.GetName], що включає широкий спектр персонажів, зокрема деяких з найбільших [ROOT.GetCountry.GetGovernment.GetAdjective] поетів минулого. З історією, що обертається навколо пробудження богині справедливості та Золотої Доби, #italic Астреї#!, та складною постановкою, що включає анти-маску з дванадцятьма злами, очікується, що вона порадує свою аудиторію."
  flavor_eng.173.a: "Оплатити рахунок."
  flavor_eng.173.tt1: "Додавання персонажа [geoffrey_chaucer.GetName] наповнює аудиторію радістю"
  flavor_eng.173.b: "Цілком марна трата часу."
  flavor_eng.173.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] занепали духом через відсутність розваг"
  flavor_eng.173.historical_info: "#italic Відновлений Золотий Вік#! — це була маска, створена в якобітську епоху Беном Джонсоном та Ініго Джонсом. Про цю маску мало що відомо через відсутність будь-яких збережених ескізів Ініго Джонса, однак деякі деталі сюжету збереглися. Маска досліджує тему реформування корумпованого двору, що було особливо актуально на той час через скандал, що тривав, за участю фаворита короля, який чекав суду за нещодавнє вбивство. Маска мала успіх і була виконана вдруге на прохання короля."
  flavor_eng.174.title: "[christopher_wren.GetNameWithNoTooltip]"
  flavor_eng.174.desc: "Багатозадачний архітектор, астроном, математик і фізик [christopher_wren.GetName] із ентузіазмом викладає в [ShowLocationName('oxford')] [ShowBuildingTypeName('university')], а також відвідує щотижневі зустрічі в [ShowLocationName('london')] з іншими інтелектуалами. Ходять чутки, що його можна переконати зайняти королівську посаду та допомогти сформувати архітектурне бачення [ROOT.GetCountry.GetName], або що він може докласти зусиль, щоб допомогти створити провідний орган для наукової спільноти."
  flavor_eng.174.a: "Залучити його як інспектора робіт."
  flavor_eng.174.tt1: "[christopher_wren.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.174.tt2: "Позиція [christopher_wren.GetHisHer] при дворі може дозволити [christopher_wren.GetHimHer] створювати значні будівельні роботи"
  flavor_eng.174.b: "Його внесок належить науковій спільноті."
  flavor_eng.174.tt3: "[christopher_wren.GetNameWithNoTooltip] зосереджує [christopher_wren.GetHisHer] зусилля на науковій роботі в кількох галузях"
  flavor_eng.174.c: "Ми мало використовуємо [christopher_wren.GetHisHer] таланти."
  flavor_eng.174.historical_info: "Сер Крістофер Рен був дуже впливовим англійським архітектором, математиком і вченим. Він був членом-засновником Королівського товариства, обіймаючи посаду голови протягом кількох років. Як вчений, він також зробив значний внесок у різні наукові галузі. Він відомий своїми численними архітектурними роботами, такими як собор Святого Павла в Лондоні."
  flavor_eng.175.title: "Собор Святого Павла"
  flavor_eng.175.desc_common: "Проектні плани були представлені відомим архітектором [christopher_wren.GetName], який пропонує кам'яний бароковий дизайн. Після завершення це буде найвища будівля в місті, що сягатиме ста одинадцяти метрів."
  flavor_eng.175.desc: "Пишність [ShowLocationName('london')] слід визнати будівництвом чудового собору. $flavor_eng.175.desc_common$"
  flavor_eng.175.desc_great_fire: "Руйнування, спричинені Великою пожежею, залишили лондонців без значного місця поклоніння. Оригінальний собор на цьому місці відігравав велику роль у ритуалах, що датуються його заснуванням у 606 році нашої ери. Ми повинні відновити пишність [ShowLocationName('london')] будівництвом чудового собору. $flavor_eng.175.desc_common$"
  flavor_eng.175.a: "Негайно розпочати будівництво."
  flavor_eng.175.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у захваті від перспективи великої релігійної [Concept('building', 'CONCEPT_PLACEHOLDER')|e] роботи"
  flavor_eng.175.b: "Місцевих парафій поки що буде достатньо."
  flavor_eng.175.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені відсутністю ентузіазму щодо нової материнської церкви"
  st_pauls_construction: "Будівництво собору Святого Павла"
  flavor_eng.175.historical_info: "Собор Святого Павла — знакова пам'ятка в центрі Лондона. Його задумав Крістофер Рен, який спроектував понад 50 церков лише в Лондоні після Великої пожежі. Собор відомий своїм елегантним та знаковим куполом, який був другим за величиною куполом у світі після завершення будівництва. Сам собор виконаний в англійському бароковому стилі."
  flavor_eng.176.title: "Велика пожежа"
  flavor_eng.176.desc_common: "Пожежа спалахнула в пекарні на Пуддінг-Лейн і швидко охоплює [ShowLocationName('london')]. Використання легкозаймистих будівельних матеріалів у багатьох будівлях, таких як [ShowGoodsName('lumber')], сприяє швидкому поширенню вогню. Вузькі провулки та сильна перенаселеність перешкоджають будь-яким ефективним заходам щодо уповільнення його просування."
  flavor_eng.176.desc_eastern_winds: "$flavor_eng.176.desc_common$\n\nСхідні вітри спричиняють поширення вогню до Лондонського Тауера [ShowLocationNameWithNoTooltip('london')], поглинаючи все на своєму шляху з масовими руйнуваннями в межах міських стін, однак, схоже, що сусіднє урядове місце Вестмінстера в безпеці."
  flavor_eng.176.desc: "$flavor_eng.176.desc_common$\n\nВітри змістилися на захід, спричинивши поширення вогню від більш щільно забудованих районів. Цей поворот подій обмежує розмір збитків, завданих [ShowLocationNameWithNoTooltip('london')], при цьому деякі руйнування замість цього спіткали урядове місце Вестмінстера."
  flavor_eng.176.a: "Порядок. Повинен бути порядок."
  flavor_eng.176.tt1: "Вогонь знищує кілька королівських палаців у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip], що викликає велике збентеження у [target_root_country.GetGovernment.GetRulerTitle]"
  flavor_eng.176.tt2: "Більшість [ShowPopTypeName('burghers')] бачать свої крамниці зруйнованими та покидають місто в пошуках кращої долі"
  flavor_eng.176.tt3: "Нещасні [ShowPopTypeName('peasants')] бачать свої домівки зруйнованими та змушені переселятися"
  flavor_eng.176.tt4: "[samuel_pepys.GetName] спостерігає за пожежею з берега річки"
  flavor_eng.176.historical_info: "Велика лондонська пожежа була катастрофічною пожежею, що знищила більшу частину міста в межах римських стін. Вона лютувала приблизно три дні та швидко поширювалася завдяки сухій погоді та сильним вітрам. Пожежа призвела до широкомасштабного руйнування будинків, підприємств та пам'яток, включаючи собор Святого Павла. Катастрофа призвела до значних змін у міському плануванні та суворіших будівельних норм."
  flavor_eng.177.title: "Покахонтас"
  flavor_eng.177.desc: "Постійна колоніальна присутність у [ShowAreaName('virginia_area')] налагодила дипломатичні відносини з сусіднім племенем [target_tribe.GetName]. Після нещодавньої сутички [rebecca_rolfe.GetName], дочка вождя, була захоплена поселенцями і згодом вийшла заміж за одного з них, а незабаром після цього було прийнято рішення повернутися до [ROOT.GetCountry.GetName].\n\nКоли пара прибуває до [ShowLocationName('london')] каретою, натовп роззяв вишиковується, щоб побачити сумнозвісну принцесу, яку часто називають «цивілізованою дикункою». Ми повинні скористатися цим незвичайним поворотом подій, використовуючи її присутність при дворі на нашу користь."
  flavor_eng.177.a: "Представити [rebecca_rolfe.GetHisHer] заможним інвесторам."
  flavor_eng.177.tt1: "Популярність [rebecca_rolfe.GetNameWithNoTooltip] стимулює збільшення інвестицій та заохочує еміграцію до колоній"
  flavor_eng.177.b: "Нехай [rebecca_rolfe.GetHisHer] залишиться при дворі."
  flavor_eng.177.tt2: "[rebecca_rolfe.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.177.tt3: "Постійна присутність [rebecca_rolfe.GetHisHer|U] продовжує розважати [ShowPopTypeName('nobles')]"
  flavor_eng.177.c: "Ретельно задокументувати історію [rebecca_rolfe.GetHisHer]."
  flavor_eng.177.tt4: "Оповідь про [rebecca_rolfe.GetNameWithNoTooltip] перетворюється на цінну культурну спадщину"
  flavor_eng.177.historical_info: "Ребекка Рольф, широко відома як Покахонтас, була корінною американкою, що належала до племені Похатан. Вона відома своїми взаємодіями з англійськими поселенцями у Вірджинії, включаючи зустрічі з капітаном Джоном Смітом та її пізніший шлюб з Джоном Рольфом. У 1616 році вона подорожувала до Англії зі своїм чоловіком і була прийнята у Вайтхолльському палаці, але захворіла під час підготовки до повернення і померла в Англії у 1617 році."
  flavor_eng.178.title: "Борода Ван Дейка"
  flavor_eng.178.desc: "Модний [flemish.GetName] художник [anton_van_dyck.GetName] прибув з [ShowLocationName('antwerp')] на прохання [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Він добре відомий своїми навичками володіння пензлем і має зайняти посаду придворного художника, проте його характерна рослинність на обличчі стала темою розмов і захоплення багатьох, ще до офіційного початку його обов'язків."
  flavor_eng.178.a: "Наполягати, щоб [anton_van_dyck.GetSheHe] залишився, і викликати королівського перукаря."
  flavor_eng.178.tt1: "[anton_van_dyck.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.178.tt2: "[anton_van_dyck.GetNameWithNoTooltip] переїжджає після завершення своєї роботи"
  flavor_eng.178.tt3: "Стиль бороди [anton_van_dyck.GetHisHer|U] впливає на інших джентльменів, заохочуючи їх прийняти подібну моду, кидаючи виклик панівному гладко поголеному вигляду тієї епохи"
  flavor_eng.178.b: "Назвемо це бородою «[ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip]»."
  grooming_equipment: "Високий попит на засоби для догляду"
  flavor_eng.178.historical_info: "Борода Ван Дейка виділяється як унікальний і модний стиль рослинності на обличчі, що характеризується поєднанням акуратно підстриженої, загостреної еспаньйолки та вусів, з чітким розділенням між ними. Її запровадив в Англії Антоніс ван Дейк, бароковий художник з Фландрії, чия робота як придворного портретиста стала домінуючим впливом на англійський портретний живопис. Цей стиль бороди був прийнятий королем Карлом II, який називав її «Чарлі»."
  flavor_eng.179.title: "Зла Біблія"
  flavor_eng.179.desc: "Помилка у коректурі призвела до публікації серії хибних біблій королівськими друкарями. Слово «не» було пропущено, внаслідок чого Заповідь читається як «Чини перелюб». Ця кричуща та скандальна помилка викликала негайне обурення як громадськості, так і релігійних авторитетів, з вимогами відкликати та виправити помилкові Біблії."
  flavor_eng.179.a: "Відкликати їхню ліцензію та накласти штраф."
  flavor_eng.179.b: "Чесна помилка."
  flavor_eng.179.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлюють незадоволення, виступаючи проти [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.179.tt2: "Спалахують заворушення, які знищують відповідальну [ShowBuildingTypeName('printing_press_shop')]"
  flavor_eng.179.historical_info: "Зла Біблія — це рідкісне видання, опубліковане 1631 року. Це найвідоміший приклад біблійних помилок, біблій, які часто знищувалися або придушувалися через те, що їхній зміст вважався єретичним. Видавці були суворо оштрафовані Зоряною палатою, а Архієпископ Кентерберійський наказав відкликати та виправити помилкові Біблії."
  flavor_eng.180.title: "[john_milton.GetNameWithNoTooltip]"
  flavor_eng.180.desc: "Видатний поет і політичний активіст [john_milton.GetName] давно є відкритим прихильником змін, що ставить [john_milton.GetHimHer] у суперечності з правлячою владою. [john_milton.GetSheHe|U] написав промову, відому як #italic Ареопагітика#!, засуджуючи додрукарську цензуру, водночас дружньо захищаючи свободу слова та свободу преси."
  flavor_eng.180.a: "Підтримати [john_milton.GetHisHer] слова."
  flavor_eng.180.tt1: "[john_milton.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.180.tt2: "Вплив [john_milton.GetName] надихає на значні зміни у свободі слова та преси."
  flavor_eng.180.b: "Він може говорити, але змін не потрібно."
  flavor_eng.180.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлюють незадоволення, виступаючи проти [ShowPolicyName('strict_censorship')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_eng.180.tt4: "Кілька парламентарів схиляються під впливом слів [john_milton.GetNameWithNoTooltip]"
  flavor_eng.180.c: "Спалити [john_milton.GetHimHer] за єресь"
  flavor_eng.180.tt5: "Часи змінюються. Слова [john_milton.GetNameWithNoTooltip] згуртовують парламентарів, які виступають проти цього курсу дій."
  flavor_eng.180.tt6: "[ShowPolicyName('de_heretico_comburendo')] наказує, що єретики повинні бути спалені."
  STATIC_MODIFIER_NAME_parliament_influenced: "Парламент під впливом"
  STATIC_MODIFIER_NAME_parliament_desires_change: "Парламент бажає змін"
  flavor_eng.180.historical_info: "Джон Мільтон був впливовим англійським поетом і державним службовцем під час Англійської громадянської війни та подальшої Співдружності та Протекторату під керівництвом Олівера Кромвеля. Він написав кілька памфлетів, що виступали за свободу та відокремлення Церкви від держави. Пізніше в житті він осліп, але це не завадило йому продовжувати свої літературні та політичні заняття."
  flavor_eng.181.title: "Компанія Гудзонової затоки"
  flavor_eng.181.desc_european_presence: "Двоє [target_country.GetAdjective] торговців звернулися до групи [ROOT.GetCountry.GetAdjective] колоніальних купців з пропозицією спільно дослідити [ShowAreaName('james_bay_lowlands_area')], щоб визначити доцільність налагодження прибуткової торгівлі [ShowGoodsName('fur')] уздовж узбережжя.\n\nТорговці вже звернулися до свого колоніального губернатора, який дорікнув їм через занепокоєння, що дослідження маршруту Гудзонової затоки може змістити фокус хутрової торгівлі від річки Святого Лаврентія."
  flavor_eng.181.desc: "Територія [ShowAreaName('james_bay_lowlands_area')] багата на дику природу, а розширена берегова лінія робить її придатною для створення прибуткової [ShowGoodsName('fur')] промисловості. Ми повинні забезпечити створення підприємства, щоб закріпити домінування над територією до прибуття інших європейських держав."
  flavor_eng.181.a: "Вони мають нашу монету та благословення."
  flavor_eng.181.tt1: "Приватні інвестори за підтримки державних субсидій намагаються заснувати торговельну компанію в [ShowAreaNameWithNoTooltip('james_bay_lowlands_area')]"
  flavor_eng.181.b: "Це не державна справа."
  flavor_eng.181.tt2: "Лише приватні інвестори намагаються закріпитися в [ShowAreaNameWithNoTooltip('james_bay_lowlands_area')]"
  flavor_eng.181.c: "Це нездійсненно і незахищено."
  flavor_eng.181.historical_info: "Компанія Гудзонової затоки була хутроторговельним підприємством протягом більшої частини свого існування, а сьогодні працює як роздрібна бізнес-група. Компанії було надано комерційну монополію в 1670 році на всю територію Гудзонової затоки. Докази потенціалу цієї території були представлені двома французькими купцями, які, повернувшись до Англії, шукали та отримали спонсорство принца Руперта."
  flavor_eng.182.title: "Лютий конкурент"
  flavor_eng.182.desc_james_bay_discovered: "Присутність [target_root_country.GetAdjective] торговців у [ShowAreaName('james_bay_lowlands_area')] становить значну загрозу нашим [ShowGoodsName('fur')] торговельним починанням у [ShowAreaName('lower_canada_area')]. Нам вкрай необхідно заснувати власну торговельну компанію на цій території та спробувати перевершити їх, інакше ризикуємо, що дослідження маршруту Гудзонової затоки змістить фокус торгівлі [ShowGoodsNameWithNoTooltip('fur')] від річки Святого Лаврентія."
  flavor_eng.182.desc: "Ширяться чутки, що [target_root_country.GetName] заснувала конкуруючу компанію з торгівлі [ShowGoodsName('fur')] у нерозвіданих районах на північ від [ShowAreaName('lower_canada_area')]. Ми повинні прагнути нанести на карту цю нерозвідану територію, інакше ризикуємо, що їхня присутність змістить фокус торгівлі [ShowGoodsNameWithNoTooltip('fur')] від річки Святого Лаврентія."
  flavor_eng.182.a: "Ми повинні поспішати!"
  flavor_eng.182.tt1: "Приватні інвестори за підтримки державних субсидій намагаються закріпитися в [ShowAreaNameWithNoTooltip('james_bay_lowlands_area')]"
  flavor_eng.182.b: "Яка зухвалість."
  flavor_eng.182.c: "Отримати карти від місцевих племен."
  flavor_eng.183.title: "Велика Ремонстрація"
  flavor_eng.183.desc_common1: "Представник Парламенту представив перелік скарг, які, на їхню думку, усунуть їхні занепокоєння щодо корупції та духовного впливу в державних справах."
  flavor_eng.183.desc_common2: "\n\nКрім того, існує питання королівських радників у [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], чия присутність розглядається як розширення впливу Церкви в державних справах. Була пропозиція заборонити членам духовенства брати участь у кабінеті. Натомість Парламент був би більш прихильним до майбутнього законодавства."
  flavor_eng.183.desc_abuse_of_power: "$flavor_eng.183.desc_common1$ Вони не забули стягнення податків без згоди парламенту [ROOT.GetCountry.GetGovernment.GetRuler.GetName] і прагнуть гарантій, що це більше не повториться. $flavor_eng.183.desc_common2$"
  flavor_eng.183.desc_tyranny: "$flavor_eng.183.desc_abuse_of_power$\n\nНарешті, вони зазначають, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] правив, не скликаючи Парламент протягом значного часу, і прагнуть зберегти свої права та привілеї, обмежуючи владу монархії."
  flavor_eng.183.desc: "$flavor_eng.183.desc_common1$ Вони зазначають, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] правив, не скликаючи Парламент протягом значного часу, і тепер прагнуть зберегти свої права та привілеї, обмежуючи владу монархії. $flavor_eng.183.desc_common2$"
  flavor_eng.183.a: "Скласти ретельно сформульовану відмову."
  flavor_eng.183.tt1: "Парламент може відреагувати вороже і спробувати обмежити королівські повноваження будь-якими необхідними засобами"
  flavor_eng.183.b: "Погодитися на умови."
  flavor_eng.183.b.custom: "[Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('grand_remonstrance_reform')] впроваджено"
  flavor_eng.183.c: "Спробувати досягти компромісу."
  flavor_eng.183.c.custom1: "Низька дипломатична майстерність [target_root_country.GetGovernment.GetRuler.GetName] робить успіх малоймовірним"
  flavor_eng.183.c.custom2: "Дипломатична майстерність [target_root_country.GetGovernment.GetRuler.GetName] може схилити на свій бік достатньо членів парламенту"
  flavor_eng.183.tt2: "Компроміс може не мати сприятливого результату"
  flavor_eng.183.d: "Слова — моя найгостріша зброя."
  flavor_eng.183.tt3: "«Срібний язик» [Concept('trait', 'CONCEPT_PLACEHOLDER')|e] [target_root_country.GetGovernment.GetRuler.GetName] роззброює опозицію"
  STATIC_MODIFIER_NAME_grand_remonstrance_refused: "Велику ремонстрацію відхилено"
  flavor_eng.183.historical_info: "Велика ремонстрація — це політичний документ, представлений парламентом королю Англії Карлу I у 1641 році. Він підкреслював їхнє розчарування королем і пропонував радикальні зміни, щоб обмежити його здатність втручатися в парламентські засідання. Він також стосувався побоювань щодо католицизму та висловлював занепокоєння щодо впливу королівських радників. Невдовзі після передачі Великої ремонстрації напруга між парламентом і королем загострилася, що призвело до початку Англійської громадянської війни."
  flavor_eng.184.title: "Великий компроміс"
  flavor_eng.184.desc_compromise_reached: "Досягнуто угоди після тривалих переговорів між [ROOT.GetCountry.GetGovernment.GetRuler.GetName] та представниками парламенту. Згідно з цією угодою, [ROOT.GetCountry.GetGovernment.GetRulerTitle] бачить [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] вплив зменшеним в обмін на посилену підтримку в законодавчих питаннях. Будь-які члени кабінету, що представляють Церкву, також будуть звільнені та позбавлені права служити, однак [ROOT.GetCountry.GetGovernment.GetRulerTitle] зберігає право призначати членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_eng.184.desc: "Угоди не досягнуто, попри тривалі переговори між [ROOT.GetCountry.GetGovernment.GetRuler.GetName] та представниками парламенту."
  flavor_eng.184.a: "Прийняти результат."
  flavor_eng.184.tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вважають [target_root_country.GetGovernment.GetRulerTitle] слабким за те, що він не зміг схилити достатньо членів парламенту на [target_root_country.GetGovernment.GetRuler.GetHisHer] бік"
  flavor_eng.184.b: "Відмовитися підписувати."
  STATIC_MODIFIER_NAME_grand_remonstrance_compromise: "Компроміс Великої ремонстрації"
  flavor_eng.185.title: "Гемптон-Кортська конференція"
  flavor_eng.185.desc: "Зустріч між [ROOT.GetCountry.GetGovernment.GetRuler.GetName] та представниками Англіканської церкви, включно з провідними [ROOT.GetCountry.GetAdjective] пуританами, має відбутися в [ShowWorkOfArtName('hampton_court')] для обговорення церковних питань. Сподіваємося вирішити релігійні суперечки в Церкві [ROOT.GetCountry.GetName] у спробі об'єднати різні фракції, а також вирішити проблеми, пов'язані з Книгою спільних молитов.\n\nНа жаль, архієпископ, який представляв Церкву, несподівано помер, а його наступник менш толерантний до пуританських поглядів і практик."
  flavor_eng.185.a: "Тиснути на пуритан, щоб вони підкорилися."
  flavor_eng.185.tt1: "Ця дія відштовхує пуритан і може змусити їх розглянути свої варіанти"
  flavor_eng.185.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] задоволені заходами, вжитими для придушення будь-якої роз'єднаності"
  flavor_eng.185.b: "Не вживати подальших дій."
  flavor_eng.185.b.custom1: "Усі [ShowReligionName('catholic')] та [ShowReligionName('anglican')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.185.b.custom2: "Усі [ShowReligionName('calvinist')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримують [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.185.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не задоволені тим, що подальша роз'єднаність толерується"
  flavor_eng.185.historical_info: "Гемптон-Кортська конференція була важливою подією в англійській історії, що відбулася в січні 1604 року під час правління короля Якова I. Конференція була скликана в палаці Гемптон-Корт королем Яковом I для вирішення релігійних питань та спроби врегулювати певні суперечки в Англіканській церкві. Конференція призвела до авторизації Біблії короля Якова, але також посилила авторитет Англіканської церкви, вимагаючи від пуритан дотримуватися Тридцяти дев'яти статей, узгоджених доктрин і практик Церкви. Конференція також не задовольнила всіх вимог пуритан щодо реформ."
  flavor_eng.186.title: "Велика міграція"
  flavor_eng.186.desc: "Наша нездатність знайти спільну мову з пуританським духовенством, яке відчуває себе відчуженим через відсутність змін у Церкві та бачить мало перспектив у релігійному та політичному середовищі, призводить до зростаючого виходу пуритан з [ROOT.GetCountry.GetName]. Вони зафрахтували значний флот, що складається з одинадцяти кораблів, який почав швидко перевозити пасажирів."
  flavor_eng.186.a: "Це було неминуче."
  flavor_eng.186.a.custom: "Пуритани масово покидають [target_root_country.GetNameWithNoTooltip]"
  flavor_eng.186.tt1: "Деякі починають нове життя в колоніях [ShowRegionName('east_coast_region')]"
  flavor_eng.186.tt2: "Велика кількість знаходить розраду в колоніях [ShowRegionName('caribbean_region')]"
  flavor_eng.186.tt3: "Деякі приєднуються до своїх родичів у [ShowAreaName('holland_area')]"
  flavor_eng.186.tt4: "Решта осідає в сусідньому [ShowRegionName('ireland_region')]"
  flavor_eng.186.b: "Вжити рішучих заходів."
  flavor_eng.186.historical_info: "Велика міграція відбулася між 1620 і 1640 роками і включала переселення десятків тисяч послідовників кальвінізму, широко відомих як пуритани, які жили в Англії. Вони довго прагнули реформувати Англіканську церкву, однак, зіткнувшись з мінімальним прогресом і зменшенням надії на реформи на батьківщині, вони обрали еміграцію. Більшість пуритан оселилися в американських колоніях, проте значна еміграція також відбулася до Ірландії, Нижніх країн та нещодавно заснованих колоній у Карибському басейні. Колоністи, що прибули, відіграли фундаментальну роль у формуванні ранніх американських колоній, а їхні ідеї та інститути сприяли унікальному характеру раннього американського суспільства."
  flavor_eng.187.title: "[robert_blake.GetNameWithNoTooltip]"
  flavor_eng.187.desc: "Військовий стратег і досвідчений моряк [robert_blake.GetName] нещодавно розробив перший в історії флоту звід правил і положень, а тепер взявся за грандіозне завдання перегляду військово-морської тактики, що застосовується Королівським флотом. Хоча [robert_blake.GetHisHer] тактика досить нетрадиційна, очікується, що вона революціонізує спосіб ведення морських битв."
  flavor_eng.187.a: "Давай, чоловіче."
  flavor_eng.187.tt1: "[robert_blake.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  enable_sailing_and_fighting_instructions_advance: "Надає доступ до [ShowAdvanceName('sailing_and_fighting_instructions')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.187.b: "Флот потребує [robert_blake.GetHimHer] в іншому місці."
  flavor_eng.187.tt2: "[robert_blake.GetNameWithNoTooltip] додано як [Concept('admiral', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.187.c: "Наша поточна тактика є обґрунтованою та надійною."
  flavor_eng.187.tt3: "[robert_blake.GetNameWithNoTooltip] шукає можливості в іншому місці"
  flavor_eng.187.historical_info: "Роберт Блейк був англійським військовим лідером, який служив під час Англійської громадянської війни та періоду Міжцарства. Його найважливіший внесок полягав у ролі адмірала, де він розпочав значне розширення розміру флоту та розробив кілька нових технік, заклавши основу для військово-морської тактики, що використовувалася в епоху вітрил, а також для будівництва та утримання найбільшого флоту, який країна коли-небудь знала."
  flavor_eng.188.title: "Загадкова страта Анни Грін"
  flavor_eng.188.desc: "Місцеву служницю в [ShowLocationName('oxford')] нещодавно засудили за дітовбивство. Вона стверджувала, що не знала про свою вагітність до викидня, незважаючи на те, що її виявили, коли вона намагалася приховати рештки плоду. Анну Грін визнали винною у вбивстві та повісили в Оксфордському замку, незважаючи на свідчення, що підтверджували проблеми, які виникли приблизно за місяць до викидня.\n\nХоча це було звично для засуджених, які померли, питання про те, чи слід дозволити лікарям розтинати її, потрібно вирішити, враховуючи опір місцевого [ShowPopTypeName('clergy')]."
  flavor_eng.188.a: "Підходящий кандидат для анатомічних досліджень."
  flavor_eng.188.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені святотатським актом розтину"
  flavor_eng.188.b: "Непозначеної могили буде достатньо."
  flavor_eng.188.historical_info: "Анна Грін була служницею в Англії у 17 столітті. Її пам'ятають через обставини, пов'язані з її стратою та подальшим виживанням. Після повішення за вироком її помістили в труну та готували до розтину, однак, у дивовижний поворот подій, її виявили живою, але без свідомості. Лікарі спробували кілька медичних процедур, таких як кровопускання, щоб розбудити її, і зрештою їй це вдалося. Подія призвела до значних дебатів щодо системи правосуддя та можливості неправомірних засуджень, а також до помилування Анни."
  flavor_eng.189.title: "Несподіване одужання"
  flavor_eng.189.desc: "Після подальшого розслідування нещодавно повішена Анна Грін виявляє слабкий пульс і ледь помітне дихання. Лікарі спробували низку процедур, таких як вливання гарячого кордіалу в горло та прикладання припарки до грудей, намагаючись розбудити молоду дівчину від її сну. Зрештою, їм це вдається, і очікується, що вона повністю одужає.\n\nБагато хто вірить, що рука Божа врятувала її, щоб продемонструвати її невинність, і закликають до помилування."
  flavor_eng.189.a: "Надати відстрочку від страти."
  flavor_eng.189.b: "Назад на шибеницю."
  flavor_eng.190.title: "Кав'ярня «Ангел»"
  flavor_eng.190.desc: "Вірменський купець, відомий як «Яків-єврей», подав пропозицію місцевій владі в [ShowLocationName('oxford')] з проханням відкрити унікальний заклад, який би слугував центром обміну ідеями, поширення новин та інформації, а також сприяння інтелектуальним дебатам. Буде представлено новий напій, відомий як «кава», який, очевидно, має неабияку силу."
  flavor_eng.190.a: "Дозвіл надано."
  flavor_eng.190.tt: "Заснування кав'ярні в [ShowLocationNameWithNoTooltip('oxford')] сприяє появі подібних закладів у різних інших містах, що ще більше посилює обмін ідеями."
  flavor_eng.190.b: "Шпигун серед нас намагається отруїти нас."
  the_angel: "Кав'ярня «Ангел»"
  flavor_eng.190.historical_info: "Кав'ярня «Ангел» часто вважається першою кав'ярнею в Англії та відіграла значну роль у впровадженні кави в країні. У той час кав'ярні були відносно новою концепцією в Європі, але швидко стали популярним місцем збору вчених, академіків, студентів та інтелектуалів з сусіднього університету, відіграючи важливу роль у поширенні знань."
  flavor_eng.191.title: "Панч і Джуді"
  flavor_eng.191.desc: "У [ShowLocationName('london')] відбувається комедійне маріонеткове шоу, на радість його глядачів. Це шоу сповнене фарсу і, здається, викликає шокований сміх, особливо під час витівок містера Панча. Вся вистава майстерно організована одним ляльководом у будці, який забезпечує голоси, а також музичний супровід."
  flavor_eng.191.a: "Ми любимо гарну виставу."
  flavor_eng.191.b: "Спонсорувати континентальний тур."
  flavor_eng.191.tt: "[samuel_pepys.GetName] насолоджується виставою"
  flavor_eng.191.historical_info: "Панч і Джуді — це традиційне лялькове шоу, яке стало популярним в Англії у 17 столітті. Воно мало широкий успіх і виконувалося в кількох місцях, включаючи Дублін і Париж. Персонажі Панч і Джуді зазвичай зображуються як сварлива подружня пара, а шоу складається з послідовності коротких сцен, що включають низку комедійних і часто жорстоких взаємодій між ними."
  flavor_eng.192.title: "Старанність [samuel_pepys.GetNameWithNoTooltip]"
  flavor_eng.192.desc: "Морський адміністратор демонструє великий потенціал, незважаючи на відсутність морського досвіду. Вплив, старанність і талант [samuel_pepys.GetName] могли б допомогти реформувати Адміралтейську раду та сприяти професіоналізації Королівського флоту."
  flavor_eng.192.desc_navy_board: "$flavor_eng.192.desc$\n\n[samuel_pepys.GetSheHe|U] обійняв посаду Клерка з актів у Військово-морській раді, де [samuel_pepys.GetSheHe] виявляється більш здібним та ефективним працівником, ніж колеги на вищих посадах."
  flavor_eng.192.a: "Призначити [samuel_pepys.GetHerHim] Секретарем Ради."
  flavor_eng.192.tt1: "[samuel_pepys.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  enable_overhauled_admiralty_reform: "Надає доступ до [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('overhauled_admiralty_reform')]"
  flavor_eng.192.b: "Пожинати плоди [samuel_pepys.GetHisHer] постійної праці."
  flavor_eng.192.tt2: "[samuel_pepys.GetNameWithNoTooltip] залишається на [samuel_pepys.GetHisHer] поточній посаді"
  flavor_eng.192.tt3: "[samuel_pepys.GetHisHer] робота у Військово-морській раді оптимізує оперативні можливості флоту"
  flavor_eng.192.tt4: "[samuel_pepys.GetHisHer|U] внесок у межах [samuel_pepys.GetHisHer] ролі призводить до покращення управління військово-морськими та державними справами"
  STATIC_MODIFIER_NAME_samuel_pepys_diligence: "Старанність Семюела Піпса"
  flavor_eng.192.c: "[samuel_pepys.GetSheHe|U] належить до моря."
  flavor_eng.192.historical_info: "Праця Семюела Піпса була невід'ємною частиною модернізації та реформування Королівського флоту протягом значного періоду його історії. Деякі зі змін включали покращення постачання та забезпечення флоту, а також встановлення системи регулярної оплати для моряків та офіцерів. Сьогодні його здебільшого пам'ятають за обширний щоденник, який він вів протягом десяти років, записуючи кожну деталь свого життя та надаючи ретельний запис історичних подій, таких як Велика пожежа та Велика чума в Лондоні."
  flavor_eng.193.title: "Начала"
  flavor_eng.193.desc: "Нещодавно опублікована книга під назвою #italic Principia#! від [isaac_newton.GetName] очікується, що вона революціонізує галузі фізики, математики та астрономії. У ній викладено закони руху та всесвітнього тяжіння, які пояснюють, як усі об'єкти з масою притягуються один до одного силою гравітації.\n\nБез сумніву, вона буде вважатися однією з найважливіших праць в історії науки."
  flavor_eng.193.a: "Шедевр, яким варто насолоджуватися."
  flavor_eng.193.b: "Зберіть наші найвидатніші уми, щоб обговорити це."
  flavor_eng.193.c: "Це лише книга."
  flavor_eng.193.tt: "Створення кав'ярень по всій Англії сприяє поширенню концепцій, викладених у #italic Principia#!, серед ширшої аудиторії"
  flavor_eng.193.historical_info: "«Математичні начала натуральної філософії», широко відомі як «Начала», вважаються найвидатнішою працею Ісаака Ньютона. Вона була спочатку опублікована латиною і є однією з найвпливовіших наукових книг, коли-небудь написаних."
  flavor_eng.195.title: "Криза виключення"
  flavor_eng.195.desc: "[catholic_relative.GetName], близький родич [ROOT.GetCountry.GetGovernment.GetRuler.GetName], відмовився скласти юридично обов'язкову присягу, яка вимагає від будь-кого, хто розглядається для державної служби, дотримуватися [ROOT.GetCountry.GetReligion.GetAdjective] практик, включаючи участь у причасті в установеній Церкві [ROOT.GetCountry.GetName]. Це підвищує ймовірність того, що [ShowReligionAdjective('catholic')] стане де-факто правителем, якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle] одного дня обере неконформістського наступника.\n\nПарламент пропонує змінити закон, щоб запобігти таким інцидентам та гарантувати плавний процес успадкування."
  flavor_eng.195.a: "Проти цієї безглуздості."
  flavor_eng.195.b: "Схилити парламентарів на нашу справу."
  flavor_eng.195.tt: "Достатньо парламентарів схилено, щоб запобігти прийняттю Акту"
  flavor_eng.195.c: "Логічний крок."
  STATIC_MODIFIER_NAME_opposed_parliament: "Опозиція Парламенту"
  flavor_eng.195.historical_info: "Криза виключення — це кілька спроб Парламенту виключити брата та ймовірного спадкоємця короля Карла II, Джеймса, герцога Йоркського, з престолів Англії, Шотландії та Ірландії через те, що він був католиком. Спроби були невдалими, але зрештою призвели до прийняття Акту про престолонаслідування в 1701 році, коли майбутній король був скинутий під час Славної революції."
  flavor_eng.196.title: "Комедія Реставрації"
  flavor_eng.196.desc: "Новий тип комедії популяризується провідними драматургами. Заохочується сексуально відверта мова, а п'єси утримуються від критики на теми азартних ігор, випивки та кохання, з наміром шокувати. Комедії, здається, приваблюють різноманітну аудиторію, включаючи аристократів та їхніх слуг, яких інтригують переписування в останню хвилину, бурхливі сюжети, знамениті актори та перше включення професійних актрис."
  flavor_eng.196.a: "Схвалено та заохочено."
  flavor_eng.196.tt1: "Це дозволяє брати участь акторкам та драматургиням"
  flavor_eng.196.tt2: "[samuel_pepys.GetName] бачили, як він насолоджується виставою"
  flavor_eng.196.b: "Немає місця для брудної мови."
  flavor_eng.196.historical_info: "Комедія Реставрації — це жанр англійської драми, який вперше з'явився в період, відомий як Англійська Реставрація. П'єси характеризуються гострим дотепом, гумором та сатиричними елементами. Після пуританського режиму Олівера Кромвеля, який призвів до закриття театрів, значний зсув в англійському суспільстві та культурі поступово змінив суспільні погляди та перспективи щодо моральних питань."
  flavor_eng.197.title: "[aphra_behn.GetNameWithNoTooltip]"
  flavor_eng.197.desc: "Шукаючи роботу, а також прагнучи здобути ім'я під час нещодавнього розквіту реставраційної комедії, драматургиня [aphra_behn.GetName] звернулася до Королівської трупи, видатної театральної групи, що спеціалізується на постановці театральних вистав. [aphra_behn.GetSheHe|U] загрузла в боргах і стикається з труднощами у досягненні успіху, однак комедія, схоже, їй більше до душі."
  flavor_eng.197.a: "Літературний взірець для наступних поколінь."
  flavor_eng.197.tt1: "[aphra_behn.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.197.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлює незадоволення через протидію [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  flavor_eng.197.b: "Моральність її п'єс сумнівна."
  flavor_eng.197.tt3: "[aphra_behn.GetSheHe|U] змушена публічно захищатися, заробляючи собі ім'я та більше визнання"
  flavor_eng.197.c: "Це невблаганні часи."
  flavor_eng.197.historical_info: "Афра Бен була англійською драматургинею, поетесою та романісткою, яка вважається однією з перших професійних письменниць в англійській літературі. Вона найбільш відома своїми п'єсами, особливо тими, що належать до жанру реставраційної комедії. Протягом своєї кар'єри вона стикалася з критикою, від якої захищалася, стверджуючи, що її виділяють через те, що вона жінка, тоді як чоловіки-драматурги могли вільно жити найскандальнішим життям і писати аморальні п'єси."
  flavor_eng.198.title: "Королівське товариство"
  flavor_eng.198.desc: "Зібрання наших найвидатніших наукових умів породило одні з найбільших винаходів у нашому суспільстві. Ми могли б створити незалежний орган, керований власною радою та розташований у [ROOT.GetCountry.GetCapital.GetName], щоб сприяти розвитку науки та її переваг, а також визнавати та підтримувати видатні наукові досягнення. Він також надаватиме наукові консультації з питань політики та освіти, зосереджуючи увагу на наших дослідницьких зусиллях."
  flavor_eng.198.a: "Чудова ідея."
  flavor_eng.198.tt1: "[target_root_country.GetGovernment.GetRuler.GetName] стає покровителем цього новоствореного вченого товариства"
  flavor_eng.198.b: "Натомість інвестуйте в наші університети."
  flavor_eng.198.c: "Звучить дорого та бюрократично."
  flavor_eng.198.historical_info: "Королівське товариство було засноване в 1660 році, за правління короля Англії Карла II. Його організаторами були провідні члени наукової спільноти, які були глибоко віддані розширенню меж наукового розуміння та забезпеченню розвитку науки. Метою було створення платформи, де вчені, науковці та інтелектуали могли б зустрічатися та обмінюватися своїми результатами досліджень, щоб перетворювати ідеї на відчутні результати."
  flavor_eng.199.title: "Філософські праці"
  flavor_eng.199.desc: "Перший у світі журнал, присвячений виключно науці, був запропонований [ShowBuildingTypeName('royal_society')]. Метою є публікація оригінальних дослідницьких статей, наукових відкриттів та наукових праць. Обмін цими результатами з ширшою аудиторією допоможе просунути людське розуміння в різних галузях, таких як фізика, хімія та астрономія. Товариство сподівається, що публікація стане свідченням невпинного прагнення до знань."
  flavor_eng.199.desc_no_printer: "$flavor_eng.199.desc$\n\nОднак відсутність [ShowBuildingTypeName('printing_press_shop')] у [ShowLocationName('london')] перешкоджатиме її публікації, якщо ситуацію не вдасться виправити."
  flavor_eng.199.a: "Друкуйте з нашим благословенням."
  flavor_eng.199.b: "Врегулюйте витрати."
  flavor_eng.199.tt1: "[ShowBuildingTypeName('printing_press_shop')] поспішно будується за рахунок уряду"
  STATIC_MODIFIER_NAME_philosophical_transactions: "Філософські праці Королівського товариства"
  flavor_eng.199.c: "Достатньо обмеженого видання."
  flavor_eng.199.tt2: "Один тираж публікується за допомогою Королівського друкаря"
  flavor_eng.199.historical_info: "Філософські праці Королівського товариства — це науковий журнал, що безперервно видається з 1665 року. Він охоплює кілька галузей науки і зробив значний внесок у поширення наукових знань та забезпечення запису важливих проривів. Багато опублікованих відкриттів надихнули на продовження досліджень та інновацій."
  flavor_eng.200.title: "Материна руїна"
  flavor_eng.200.desc: "У 1330 році зрадницька королева-мати [isabella.GetName] допомогла [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetName] у кровожерливому вбивстві її власного чоловіка, [GetCharacter('eng_edward_ii').GetName]. Зрештою ми спіймали [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetLastNameWithNoTooltip], і після його страти ми ув'язнили нашу королеву-матір під домашній арешт.\n\nХоча її репутація в [ROOT.GetCountry.GetName] є репутацією зрадниці, у [GetCountry('FRA').GetLongName] вона відома головним чином як старший член престижної династії [isabella.GetDynasty.GetName], яка все ще користується значною повагою серед [GetCountry('FRA').GetAdjectiveWithNoTooltip] знаті.\n\nЗ нашими поточними труднощами за протокою, можливо, було б корисно використати її видатну спадщину, доручивши їй вести переговори з [GetCountry('FRA').GetAdjectiveWithNoTooltip] емісарами від імені її сина."
  flavor_eng.200.a: "Час лікує всі рани."
  flavor_eng.200.b: "Нехай гниє."
  eng_capetian_mother: "Капетинська королева-мати"
  flavor_eng.201.title: "Королівський дотик"
  flavor_eng.201.desc: "З часів [GetCharacter('eng_edward_the_confessor').GetName] монархи [ROOT.GetCountry.GetName] унікально володіли чудодійною цілющою силою, відомою як «королівський дотик», яку зазвичай застосовували до десятків людей на великих церемоніях. Єдиними іншими монархами, які коли-небудь демонстрували таку здатність, були монархи [GetCountry('FRA').GetName].\n\nПогладивши людину, заражену золотухою — хворобою, при якій на шиї росте великий абсцес — [ROOT.GetCountry.GetGovernment.GetRulerTitle] виліковує хворобу, і постраждалий повертається до нормального здоров'я.\n\nОскільки божественні сили даруються Богом лише тим, хто має спадкове право на престол, виконання ритуалу буде беззаперечним доказом того, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] є законним [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_eng.201.a: "Підтримати ритуал."
  flavor_eng.201.b: "Містицизм не дає влади."
  flavor_eng.202.title: "[young_roger.GetNameWithNoTooltip]"
  flavor_eng.202.desc: "У 1327 році [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetName], один з найвпливовіших вельмож свого часу, зрадницьки повстав проти [GetCharacter('eng_edward_ii').GetShortName] і вбив його. Невдовзі після цього його повісили за його вчинок.\n\nЙого онук [young_roger.GetName] вижив як молодий, але зразковий лицар. Він став би чудовим командиром, хоча зробити з нього приклад могло б відбити охоту до майбутньої зради."
  flavor_eng.202.a: "Тримайте ворогів близько."
  flavor_eng.202.b: "Це надто небезпечно."
  flavor_eng.203.title: "Міст [target_location.GetNameWithNoTooltip] руйнується"
  flavor_eng.203.desc: "Жвавий міст [target_location.GetName] стояв як єдиний пункт перетину річки Темзи з 1209 року, але він також є однією з найжвавіших комерційних вулиць у всьому Місті. Прикрашений галантереями, рукавичниками та іншими модними бутіками, міст приваблює найбагатшу клієнтуру у всій [ROOT.GetCountry.GetName].\n\nОднак, через кілька днів після того, як мостові наглядачі виявили тріщини в муруванні, дві арки раптово обвалилися на південному кінці, завдавши непоправної шкоди оригінальній структурі.\n\nНа щастя, ніхто не загинув, але міст гостро потребує відбудови, інакше його доведеться повністю демонтувати. Якими матеріалами ми повинні відновити арки?"
  flavor_eng.203.a: "Дерево та глина."
  flavor_eng.203.b: "Залізо та камінь."
  flavor_eng.203.c: "Срібло та золото."
  flavor_eng.203.d: "Контролювати його неминучий крах."
  eng_london_bridge_wood_clay: "Лондонський міст — Дерево та глина"
  eng_london_bridge_iron_stone: "Лондонський міст — Залізо та камінь"
  eng_london_bridge_silver_gold: "Лондонський міст — Срібло та золото"
  flavor_eng.204.title: "Вимощено золотом"
  flavor_eng.204.desc: "Серед сільських [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] поширилася цікава чутка, що вулиці [target_location.GetName] вимощені золотом.\n\nХоча більшість розуміє, що це лише химерна метафора, ідея, що селянин може пройти шлях від бідності до багатства в цьому місті, надихає майже кожного."
  flavor_eng.204.a: "Дозволити чуткам ширитися."
  flavor_eng.204.b: "Вулиці вимощені вугіллям та брудом."
  flavor_eng.204.c: "Чому б нам насправді не вимостити вулиці золотом?"
  STATIC_MODIFIER_NAME_eng_paved_with_gold_rumor: "Ходять Чутки, Що Вимощені Золотом"
  STATIC_MODIFIER_NAME_eng_paved_with_gold_actually: "Насправді Вимощені Золотом"
  eng_paved_with_gold: "Вартість Мощення Золотом"
  flavor_eng.205.title: "[robert_boyle.GetNameWithNoTooltip]"
  flavor_eng.205.desc: "Ірландський філософ, хімік та фізик [robert_boyle.GetName] із захопленням проводить експериментальні дослідження у [robert_boyle.GetHisHer] резиденції в [ShowLocationName('oxford')]. [robert_boyle.GetSheHe|U] розробив(-ла) новаторську теорію про обернену залежність між тиском і об'ємом газу, коли температура залишається постійною. Будучи побожним(-ою) [ShowReligionName('anglican')], [robert_boyle.GetSheHe] вірить, що вивчення науки та природного світу може покращити розуміння Божого творіння, тему, про яку [robert_boyle.GetSheHe] багато пише між експериментами."
  flavor_eng.205.a: "Ми вітаємо [robert_boyle.GetHisHer] зусилля."
  flavor_eng.205.tt1: "[robert_boyle.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.205.tt2: "[robert_boyle.GetSheHe|U] часто відвідує зібрання інших інтелектуалів і може відіграти роль у формуванні провідного наукового товариства"
  flavor_eng.205.b: "Заохотити [robert_boyle.GetHimHer] поділитися [robert_boyle.GetHisHer] знахідками."
  flavor_eng.205.c: "Божевільний і єретик в одній особі."
  flavor_eng.205.historical_info: "Роберт Бойль вважається одним із найвпливовіших вчених 17 століття та ключовою фігурою наукової революції. Його часто називають одним із засновників сучасної хімії. Його найвідоміша праця, відома як «Закон Бойля», заклала основу для розробки закону ідеального газу."
  flavor_eng.206.title: "Гарненька, Дотепна Нелл"
  flavor_eng.206.desc: "Харизматична та приваблива театральна актриса, здатна захоплювати та полонити публіку, з'явилася в місцевих театрах. Попри [eleanor_gwyn.GetHisHer] скромне походження, [eleanor_gwyn.GetSheHe] вдалося досягти популярності та привернути увагу [target_root_country.GetGovernment.GetRulerTitle], який, схоже, із ентузіазмом пропонує [eleanor_gwyn.GetHisHer] можливість забезпечити королівські розваги."
  flavor_eng.206.a: "Найбільш підходяща коханка."
  flavor_eng.206.tt1: "[eleanor_gwyn.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.206.tt2: "[eleanor_gwyn.GetSheHe|U] народжує дитину [target_root_country.GetGovernment.GetRuler.GetName]"
  flavor_eng.206.tt3: "[eleanor_gwyn.GetSheHe|U] використовує [eleanor_gwyn.GetHisHer] вплив на [target_root_country.GetGovernment.GetRulerTitle] для просування інтересів акторів та драматургів"
  flavor_eng.206.tt4: "Суспільні норми стають більш розслабленими щодо особистої поведінки, оскільки [target_root_country.GetGovernment.GetRulerTitle] публічно бере собі коханку низького походження"
  STATIC_MODIFIER_NAME_influential_figurine: "Впливова Особа"
  flavor_eng.206.b: "Народжена лише для розваг."
  flavor_eng.206.b.custom: "Усі [ShowPopTypeName('nobles')], [ShowPopTypeName('burghers')] та [ShowPopTypeName('peasants')] у [ShowLocationName('london')] отримують [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.206.c: "Незвичайна сценічна присутність."
  STATIC_MODIFIER_NAME_absense_of_influential_figurine: "Відсутність впливової постаті"
  flavor_eng.206.tt5: "Права митців занепадають без провідного захисника, який би просував їхні інтереси"
  flavor_eng.206.historical_info: "Елеонор Гвін була театральною актрисою та знаменитістю наприкінці XVII століття. Народжена в бідності, вона рано вийшла на сцену, де її хвалили за комедійні виступи, і вона стала відомою завдяки своїй кмітливості та гумору, за що отримала прізвисько «Мила, дотепна Нелл». Найбільш відома своїми романтичними стосунками з королем Карлом II, які тривали майже 17 років і народили 2 позашлюбних дітей."
  flavor_eng.207.title: "Підводний монарх"
  flavor_eng.207.desc: "Винахідник-майстер [cornelius_debbel.GetName] оселився в [ROOT.GetCountry.GetName] на запрошення [ROOT.GetCountry.GetGovernment.GetRulerTitle], і [cornelius_debbel.GetSheHe] має представити [cornelius_debbel.GetHisHer] останній винахід натовпу, що зібрався.\n\nОсобливий підводний апарат був переміщений на Темзу, з твердженнями про його здатність перетинати річку повністю зануреним на глибину двох-трьох сажнів. Заплановано тестовий заїзд між Вестмінстером і Гринвічем, з особистим запрошенням [ROOT.GetCountry.GetGovernment.GetRuler.GetName] приєднатися як пасажир і стати свідком цього унікального видовища."
  flavor_eng.207.a: "Прийняти запрошення."
  flavor_eng.207.tt1: "[cornelius_debbel.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.207.a.custom: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] приєднується до [cornelius_debbel.GetNameWithNoTooltip] на борту імпровізованого підводного човна для дещо ризикованого тестового занурення"
  flavor_eng.207.tt2: "Глядачі вражені продемонстрованою мужністю [target_root_country.GetGovernment.GetRulerTitle]"
  flavor_eng.207.b: "Спостерігати за видовищем на суші."
  flavor_eng.207.tt3: "Глядачі не вражені продемонстрованою боягузтвом [target_root_country.GetGovernment.GetRulerTitle]"
  flavor_eng.207.historical_info: "Корнеліс Дреббель був голландським винахідником, який побудував перший навігаційний підводний човен у 1620 році, працюючи на Королівський флот. Між 1620 і 1624 роками він успішно побудував і випробував ще два підводні човни, а третя і остання версія була продемонстрована особисто королю Якову I та кільком тисячам лондонців. Підводний човен зміг залишатися зануреним протягом трьох годин і був випробуваний кілька разів. Незважаючи на успіх, Адміралтейство так і не впровадило цей дизайн через відсутність ентузіазму щодо його придатності."
  flavor_eng.208.title: "Перше плавання"
  flavor_eng.208.desc_successfully_submerged: "Підводний човен знову з'являється біля берегів Гринвіча, на превелику радість нетерплячих глядачів. [cornelius_debbel.GetName] та [ROOT.GetCountry.GetGovernment.GetRuler.GetName] зрештою висаджуються, зустрінуті захопленим хором вигуків та оплесків. Це справді надзвичайна демонстрація."
  flavor_eng.208.desc: "Підводний човен не з'являється біля берегів Гринвіча, на превелике розчарування нетерплячих глядачів. [cornelius_debbel.GetName] та [ROOT.GetCountry.GetGovernment.GetRuler.GetName] здається, перебувають у владі моря, і величезне почуття смутку охоплює натовп, що чекає. Це справді дуже сумна подія."
  flavor_eng.208.a: "Ура!"
  flavor_eng.208.b: "Немає слів."
  flavor_eng.208.tt1: "[target_root_country.GetGovernment.GetRulerTitle] вдається втекти з небезпечного пристрою і спливає на поверхню"
  flavor_eng.210.title: "Льодовий ярмарок"
  flavor_eng.210.desc: "Незвичайно холодна погода спричинила повне замерзання річки Темзи. Місцеві міщани запропонували влаштувати ярмарок на березі річки, з різноманітними кіосками та атракціонами, встановленими на льоду, включаючи продавців їжі, таверни, ігри та навіть невеликі магазини. Розваги, такі як катання на ковзанах, санках та перегони на конях і каретах, були б частиною святкувань.\n\nНавіть говорять про імпровізований міст, який дозволив би людям перетинати річку з одного боку на інший, не долаючи крижану поверхню."
  flavor_eng.210.a: "Творчий підхід."
  frost_fair: "Льодовий ярмарок"
  flavor_eng.210.b: "Ризикована справа."
  flavor_eng.210.historical_info: "Льодовий ярмарок 1683 року був значною подією, що тривала близько 2 місяців. Подія була широко задокументована, включаючи гравюри, памфлети та письмові свідчення. Це була чудова та пам'ятна подія в історії Лондона, і вона не повторювалася таким же чином з тих пір через зміни в течії річки та будівництво набережних."
  flavor_eng.211.title: "Двигун Севері"
  flavor_eng.211.desc: "Винахідник [thomas_savery.GetName] подав патент на паровий пристрій, призначений для комерційного використання. Пристрій використовується як насос і є революційним методом перекачування води, який може бути використаний для покращення дренажу шахт та зробити широкомасштабне громадське водопостачання практичним."
  flavor_eng.211.a: "Пріоритет водопостачанню."
  flavor_eng.211.tt1: "[thomas_savery.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.211.b: "Шахти – наше джерело існування."
  flavor_eng.211.c: "Використовувати як прототип для подальшого розвитку."
  flavor_eng.211.tt2: "[thomas_savery.GetNameWithNoTooltip] займає посаду в [ShowBuildingTypeName('royal_society')]"
  flavor_eng.212.title: "Унія Корон"
  flavor_eng.212.desc: "Після нещодавньої смерті [dying_monarch.GetName] трон [inherited_country.GetName] переходить до [inheriting_monarch.GetName], як було погоджено договором. [inheriting_country.GetName] та [inherited_country.GetName] наразі збережуть окремі парламенти та правові системи. Можливість повного об'єднання буде розглянута в майбутньому, якщо обставини цього вимагатимуть."
  flavor_eng.212.a: "Нарешті об'єднані."
  flavor_eng.212.historical_info: "Унія Корон стосується значної події 1603 року, коли Яків VI Шотландський також став Яковом I Англійським. До унії Англія та Шотландія були окремими, незалежними королівствами зі своїми монархами. Англією правила династія Тюдорів, тоді як Шотландія перебувала під владою династії Стюартів. Коли королева Єлизавета I Англійська померла без спадкоємця, її смерть підготувала ґрунт для унії."
  flavor_eng.213.title: "Зростання акціонерних товариств"
  flavor_eng.213.desc: "Постійне зростання нашої колоніальної імперії стикається з викликами через пов'язані витрати пропорційно до взятих ризиків. Ми могли б запровадити новий тип підприємства, що забезпечує фінансування шляхом випуску акцій, і зменшити частину ризику для приватних інвесторів. Альтернативно, можна розглянути збереження існуючої системи, щоб мінімізувати потенціал фінансової нестабільності та стримати надмірне ризикування."
  flavor_eng.213.a: "Ризикування – небезпечна справа."
  flavor_eng.213.b: "Чим ризикованіша дорога, тим більший прибуток."
  flavor_eng.213.historical_info: "Виникнення акціонерних торгових компаній було зумовлене необхідністю додаткового фінансування, оскільки ризики, пов'язані з колонізацією, стали настільки надзвичайно дорогими, що їх не міг фінансувати один інвестор. Акціонерна структура сприяла зростанню торгівлі як в Англії, так і на заморських територіях. Хоча ця нова бізнес-структура принесла значне економічне зростання та інновації, вона також мала кілька негативних аспектів та недоліків під час свого раннього розвитку."
  flavor_eng.214.title: "Перший роман"
  flavor_eng.214.desc: "Нещодавно врятований моряк, який зазнав корабельної аварії біля західного узбережжя безлюдного острова Мас-а-Тьєрра, надихнув на написання своєрідної автобіографії, що розповідає про подорожі «Робінзона Крузо», потерпілого, який проводить 28 років на віддаленому тропічному пустельному острові. Початкові відгуки помітно позитивні, і ця робота, схоже, знаменує початок реалістичної прози як літературного жанру.\n\nАвтором цього роману є не хто інший, як [daniel_defoe.GetName], різнобічний письменник, купець і політичний стратег, і очікується, що публікація стане великим хітом як у країні, так і за кордоном."
  flavor_eng.214.a: "Перо – [daniel_defoe.GetHisHer] головний союзник."
  flavor_eng.214.tt1: "[daniel_defoe.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.214.b: "Краще підходить для консультативної ролі."
  flavor_eng.214.tt2: "[daniel_defoe.GetNameWithNoTooltip] пише кілька плідних текстів, що відстоюють плани економічного та соціального покращення, включаючи ранню пропозицію щодо національної схеми страхування"
  flavor_eng.214.historical_info: "«Робінзон Крузо» — роман, написаний Даніелем Дефо, який розповідає про боротьбу головного героя за виживання, його зусилля адаптуватися до нового середовища та його подальше перетворення на винахідливу та самодостатню особистість. За кількістю перекладів роман поступається лише Біблії."
  flavor_eng.215.title: "Бульбашка Південних морів"
  flavor_eng.215.desc: "Акціонерна компанія, що пропонувала майже стовідсотковий прибуток, побачила обвал ціни своїх акцій. Сама компанія насправді не отримує й близько тих прибутків, які обіцяла, натомість обслуговує свої борги, даючи фальшиві обіцянки своїм власникам.\n\nІнвестори залишилися розореними, втративши тисячі, і спостерігається помітне зростання кількості самогубств. Широко поширений гнів і невдоволення панують на вулицях, громадськість вимагає пояснень."
  flavor_eng.215.a: "Це мало статися."
  flavor_eng.215.tt1: "Бульбашка спричиняє значну економічну кризу в [target_root_country.GetName]"
  flavor_eng.215.tt2: "Старанність [robert_walpole.GetNameWithNoTooltip] пом'якшує частину економічних збитків"
  flavor_eng.215.b: "Надати фінансову допомогу та компенсувати інвесторам."
  flavor_eng.215.tt3: "Державне втручання стабілізує економіку, але шкодить настроям інвесторів"
  STATIC_MODIFIER_NAME_south_sea_bubble: "Бульбашка Південних морів"
  STATIC_MODIFIER_NAME_restructuring: "Реструктуризація компанії"
  flavor_eng.215.historical_info: "Бульбашка Південних морів була однією з найраніших фінансових криз в історії. Вона почалася, коли була створена британська акціонерна компанія для консолідації, контролю та зменшення національного боргу, а також для допомоги Британії збільшити її торгівлю та прибутки в Америках. Спекуляції підняли ціну акцій до нестійких рівнів, і акції зрештою обвалилися, що призвело до розорення тисяч інвесторів."
  flavor_eng.216.title: "Спіталфілдські заворушення"
  flavor_eng.216.desc: "Спалахнули жорстокі сутички між місцевою владою та ткачами з району Спіталфілд щодо суперечок про заробітну плату та впровадження машин у виробничий процес, що, як очікується, порушить засоби до існування ткачів ручного верстата. Заворушення призвели до знищення щонайменше однієї [ShowBuildingTypeName('fine_cloth_guild')] та нападів на будинки роботодавців, при цьому бунтівники чинили опір будь-яким спробам арешту."
  flavor_eng.216.a: "Відповісти силою."
  flavor_eng.216.a.custom: "Будь-які засуджені бунтівники відправляються до віддаленої виправної колонії [ShowAreaName('eastern_australia_area')]."
  flavor_eng.216.b: "Призупинити імпорт на короткий час."
  flavor_eng.216.c: "Тимчасово покращити умови праці."
  flavor_eng.216.tt1: "Кілька ткачів убиті або спіймані в очікуванні суду"
  flavor_eng.216.tt2: "Прийнято тимчасове законодавство для умиротворення ткачів"
  STATIC_MODIFIER_NAME_improved_working_conditions_silk_weavers: "Покращені умови праці для ткачів шовку"
  STATIC_MODIFIER_NAME_fine_cloth_imports_banned: "Заборонено імпорт тонкої тканини"
  STATIC_MODIFIER_NAME_liquor_imports_banned: "Заборонено імпорт алкоголю"
  flavor_eng.216.historical_info: "Спіталфілдські заворушення були серією жорстоких протестів і заворушень у лондонському районі Спіталфілд наприкінці XVIII століття. Вони збіглися з економічними та соціальними викликами, які переживав робітничий клас на початку індустріалізації, особливо її впливом на традиційні ремісничі галузі. Це призвело до прийняття кількох урядових актів, спрямованих на забезпечення трудових прав та економічних змін."
  flavor_eng.217.title: "Джинова лихоманка"
  flavor_eng.217.desc: "Споживання джину неухильно зростає по всій країні, що призводить до крайньої бідності, публічного пияцтва, розпаду сімей та злочинності. Було відкрито кілька джинових крамниць, що ще більше загострює проблему.\n\nУряд повинен діяти та запровадити суворі заходи, перш ніж ситуація погіршиться ще більше."
  flavor_eng.217.a: "Прийняти тимчасове законодавство."
  flavor_eng.217.b: "Парламент приймає «Закон про джин»"
  flavor_eng.217.b.custom: "Кілька [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] по всій [target_root_country.GetName] отримують [ShowNamedValue('control_severe_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] завдяки зменшенню рівня злочинності."
  flavor_eng.217.tt1: "Виробництво джину регулюється та запроваджуються ліцензійні збори"
  flavor_eng.217.tt2: "Імпорт алкогольних напоїв тимчасово заборонено"
  flavor_eng.217.c: "Нехай мають свої напої."
  flavor_eng.217.c.custom: "Декілька [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] по всьому [target_root_country.GetName] втрачають [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] через зростання рівня злочинності."
  flavor_eng.217.tt3: "Соціальні проблеми продовжують накопичуватися зі зростанням залежності, психічних захворювань та фізичного занепаду."
  reduced_gin_consumption: "Зменшене споживання джину"
  excessive_gin_consumption: "Надмірне споживання джину"
  STATIC_MODIFIER_NAME_regulated_gin_production: "Регульоване виробництво джину"
  STATIC_MODIFIER_NAME_heavily_restricted_gin_production: "Суворо обмежене виробництво джину"
  flavor_eng.217.historical_info: "Джинова лихоманка була періодом надмірного споживання джину, спричиненого збільшенням внутрішнього виробництва та скороченням імпорту французького бренді внаслідок тривалих військових дій між Англією та Францією. Джин став улюбленим напоєм людей усіх соціальних класів, що призвело до його широкого споживання та руйнівного впливу на сімейне життя. Поєднання державного регулювання, зростання цін та зміни культурного сприйняття джину поступово зменшило його споживання."
  flavor_eng.218.title: "Обідній клуб"
  flavor_eng.218.desc: "Великий художник-стиліст [joshua_reynolds.GetName] заснував обідній клуб разом зі [joshua_reynolds.GetHisHer] наставником [random_artist.GetName], призначений для однодумців та осіб відповідного статусу. Його мета — об'єднати найвидатніших літературних та інтелектуальних діячів для обговорення літератури, політики, мистецтва та інших інтелектуальних тем, де дотепність та мудрість залишаються центральними для характеру клубу.\n\nВони планують щотижня зустрічатися в різних тавернах та кав'ярнях по всьому [ShowLocationName('london')] для жвавих дискусій."
  flavor_eng.218.a: "Величезна можливість."
  flavor_eng.218.tt1: "[joshua_reynolds.GetNameWithNoTooltip] додано як персонажа"
  flavor_eng.218.tt2: "Запрошення поширено серед [Concept('artists', 'CONCEPT_PLACEHOLDER')|e] у галузі літератури"
  flavor_eng.218.b: "Забезпечити включення політиків."
  flavor_eng.218.c: "Помпезне видовище з невеликим значенням."
  STATIC_MODIFIER_NAME_the_dining_club: "Обідній клуб"
  flavor_eng.218.historical_info: "Обідній клуб був відомим літературним клубом, який об'єднав найвидатніших літературних та інтелектуальних діячів того часу. Він відіграв значну роль у сприянні інтелектуальним дискусіям, дебатам та дружбі між його членами, а також мав значний вплив на культурне та інтелектуальне життя Британії. Він надавав простір провідним мислителям та митцям для обміну думками та співпраці над різними проєктами."
  flavor_eng.219.title: "Королівська академія мистецтв"
  flavor_eng.219.desc_joshua_reynolds: "$flavor_eng.219.desc_common$\n\nШановного [joshua_reynolds.GetName] запропоновано на посаду першого президента."
  flavor_eng.219.desc_random_artist: "$flavor_eng.219.desc_common$\n\n[random_artist.GetName] було запропоновано на посаду першого президента."
  flavor_eng.219.desc_common: "Було запропоновано створити установу, що має на меті сприяти творчості та розвитку мистецтв, з фінансуванням, наданим [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Вона повинна слугувати школою або академією дизайну для студентів мистецтв, з щорічною виставкою сучасного мистецтва, відкритою для всіх художників."
  flavor_eng.219.a: "Майстерно схвалено!"
  flavor_eng.219.b: "Краще витратити на освіту бідних."
  STATIC_MODIFIER_NAME_increased_educational_spending: "Збільшені витрати на освіту"
  flavor_eng.219.historical_info: "Королівська академія мистецтв — це приватно фінансована установа, присвячена просуванню візуальних мистецтв та архітектури. Вона була заснована в 1768 році групою художників, включаючи сера Джошуа Рейнольдса та сера Вільяма Чемберса, а король Георг III став першим королівським покровителем академії. Членство в Королівській академії є дуже престижним і присуджується художникам та архітекторам, які зробили значний внесок у свої відповідні галузі."
  flavor_eng.220.title: "Акт про обгороджування"
  flavor_eng.220.desc: "Власники фабрик і земель подають петиції до Парламенту, щоб дозволити подальшу приватизацію громадських земель, для прискорення міграції робочої сили з сільських місцевостей до міських районів. Хоча це, ймовірно, спричинить значне соціальне переміщення, це також забезпечить достатню наявність робочої сили та збільшить загальний обсяг сільськогосподарського виробництва."
  flavor_eng.220.a: "Переміщений працівник — продуктивний працівник."
  enable_enclosure_act_policy: "Надає доступ до [ShowPolicyName('enclosure_act')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.220.b: "Соціальні наслідки надто серйозні."
  flavor_eng.220.a.custom: "Ображені [ShowPopTypeName('peasants')] бунтують, і 10 сільських [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.220.tt: "Акт прискорює процес урбанізації та заохочує подальшу індустріалізацію за рахунок [ShowEstateTypeName('peasants_estate')]"
  STATIC_MODIFIER_NAME_obstructing_industrialization: "Перешкоджання індустріалізації"
  enclosure_riots: "Бунти через обгороджування"
  flavor_eng.220.historical_info: "Акти про обгороджування були серією законів, прийнятих в Англії, які дозволяли подальше обгороджування, або приватизацію, громадських земель та відкритих полів. Вони були частиною ширших економічних та сільськогосподарських перетворень, визнаних необхідними для підтримки зростання комерційного сільського господарства та розвитку індустріалізації. Акти сприяли соціальній нерівності та призвели до переміщення тисяч сільських робітників, які були змушені шукати роботу в містах. Це завершилося бунтами позбавлених землі фермерів та робітників, які чинили опір втраті своїх традиційних прав."
  flavor_eng.221.title: "Біглі з Боу-стріт"
  flavor_eng.221.desc: "Магістрати Боу-стріт, що базуються в Ковент-Гардені, запропонували створити організовану правоохоронну службу для протидії зростаючій злочинності та безладу в [ShowLocationName('london')]. Їхнім основним завданням має бути розслідування та активний пошук злочинців та їх затримання, з регулярною зарплатою для підтримки їхнього професіоналізму. Вибірковий набір є обов'язковим, щоб група складалася переважно з констеблів та офіцерів."
  flavor_eng.221.a: "План магістрату є обґрунтованим."
  flavor_eng.221.b: "Немає місця для загону пильних."
  STATIC_MODIFIER_NAME_bow_street_runners: "Біглі з Боу-стріт"
  STATIC_MODIFIER_NAME_rampant_crime: "Нестримна злочинність"
  flavor_eng.221.historical_info: "Біглі з Боу-стріт були організованою правоохоронною групою, яка заклала основу для подальшого розвитку поліції в Лондоні. Це зрештою призвело до створення Столичної поліцейської служби. Біглі відіграли важливу роль у розслідуванні злочинів та зборі доказів і були відомі своїми методами розслідування, такими як спостереження та інформатори."
  flavor_eng.222.title: "Бунти Дженні Спіннер"
  flavor_eng.222.desc: "У кількох містах спалахнули заворушення, під час яких нападники націлилися на майстерні, де розміщувалася [ShowBuildingTypeName('cloth_guild')], знищуючи або пошкоджуючи машини, такі як панчішні рами, які, як вони побоюються, призведуть до безробіття та зниження заробітної плати. Виробництво [ShowGoodsName('cloth')] вже скоротилося внаслідок завданих збитків і, ймовірно, продовжить знижуватися, якщо ситуація не буде вирішена."
  flavor_eng.222.a: "Сила буде зустрінута силою."
  flavor_eng.222.a.custom: "Усі [ShowPopTypeName('peasants')] у [ShowRegionName('great_britain_region')] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з [ShowBuildingTypeName('cloth_guild')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.222.tt1: "Прийнято закон, що забороняє знищення машин"
  flavor_eng.222.tt2: "Війська розгорнуті, а кількох бунтівників затримано та страчено"
  flavor_eng.222.tt3: "[ShowBuildingTypeName('cloth_guild')] по всьому [target_root_country.GetName] постраждали від [ShowModifier('jenny_spinner_riots')]"
  flavor_eng.222.b: "Забезпечити кращі умови."
  flavor_eng.222.b.custom: "Усі [ShowPopTypeName('peasants')] у [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] [ShowRegionName('great_britain_region')] з [ShowBuildingTypeName('cloth_guild')] отримують [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.222.tt4: "Жодного працівника не звільняють, оскільки машини впроваджуються у виробничий цикл, що перешкоджає продуктивності"
  flavor_eng.222.c: "Дати фальшиві обіцянки."
  flavor_eng.222.tt5: "Текстильники припиняють акти саботажу та відновлюють свою роботу"
  STATIC_MODIFIER_NAME_jenny_spinner_riots: "Бунти Дженні Спіннер"
  STATIC_MODIFIER_NAME_improved_working_conditions_cloth_makers: "Покращені умови праці для виробників тканини"
  flavor_eng.222.historical_info: "Бунти Дженні Спіннер або Луддитські бунти були серією протестів кваліфікованих робітників текстильної промисловості, які були стурбовані тим, що нові машини призведуть до безробіття та зниження заробітної плати для традиційних ручних працівників. Вони вдавалися до актів насильства та саботажу, вриваючись на фабрики, щоб знищити нові машини. Бунти були відносно неорганізованими та були жорстоко придушені Британським урядом, але подальші бунти відбуватимуться, оскільки більше роботи буде автоматизовано."
  flavor_eng.223.title: "[horatio_nelson.GetNameWithNoTooltip]"
  flavor_eng.223.desc: "Непохитний та натхненний морський офіцер здобув значну підтримку Адміралтейства та допоміг забезпечити кілька перемог для [ROOT.GetCountry.GetGovernment.GetAdjective|U] флоту. Нагально необхідно, щоб [horatio_nelson.GetName] було довірено [horatio_nelson.GetHisHer] власне командування, що дозволить [horatio_nelson.GetHimHer] використовувати виняткові таланти, якими він був обдарований."
  flavor_eng.223.a: "Флот – це те місце, де [horatio_nelson.GetHeShe] належить."
  flavor_eng.223.tt1: "[horatio_nelson.GetNameWithNoTooltip] додано як [Concept('admiral', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.223.b: "Є й інші способи служити."
  flavor_eng.223.tt2: "[horatio_nelson.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.223.c: "Морський капітан, що любить стріляти."
  flavor_eng.223.historical_info: "Гораціо Нельсон був британським морським офіцером. Він приєднався до Королівського флоту в молодому віці і швидко піднявся по службових сходах. Його виняткові тактики та стратегії у морській війні допомогли забезпечити перемогу Британії в битві при Трафальгарі, проклавши шлях до британського панування над морями та піднесення як світової наддержави."
  flavor_eng.224.title: "Здоровий глузд [thomas_paine.GetNameWithNoTooltip]"
  flavor_eng.224.desc: "Революційний та надихаючий письменник [thomas_paine.GetName] опублікував памфлет під назвою #italic Здоровий глузд#!, в якому закликає колонії відокремитися від [target_root_country.GetName]. [thomas_paine.GetSheHe|U] ставить під сумнів, чому американські колонії, які не мали прямого представництва в Парламенті, повинні підкорятися [target_root_country.GetAdjectiveWithNoTooltip] законам та податкам.\n\nНебезпека, яку він представляє, полягає головним чином у його простій та зрозумілій мові, яку можуть зрозуміти звичайні люди."
  flavor_eng.224.a: "Видати ордер на арешт [thomas_paine.GetHisHer]."
  flavor_eng.224.tt1: "Памфлет сильно критикує ідею монархії та спадкової наступності як за своєю суттю хибну та несправедливу"
  flavor_eng.224.tt2: "[thomas_paine.GetNameWithNoTooltip] відправляється з [target_root_country.GetName] до колоній за допомогою Королівського товариства"
  flavor_eng.224.tt3: "[thomas_paine.GetNameWithNoTooltip] заарештований і засуджений за підбурювальну наклеп, але продовжує публікувати [thomas_paine.GetHisHer] памфлети через пом'якшений закон про [ShowLawName('censorship')]"
  flavor_eng.224.tt4: "[thomas_paine.GetNameWithNoTooltip] заарештований і засуджений за підбурювальну наклеп і більше не може публікувати [thomas_paine.GetHisHer] памфлети через суворий закон про [ShowLawName('censorship')]"
  flavor_eng.224.b: "Кожному своє."
  flavor_eng.224.tt5: "Памфлети дозволено вільно поширювати, і вони набувають значної популярності"
  flavor_eng.224.historical_info: "Томас Пейн був письменником і політичним активістом, який відіграв важливу роль в Американській революції. Його впливові памфлети критикували спадкову монархію та захищали повну незалежність тринадцяти колоній, що допомогло схилити громадську думку в цьому питанні та вплинуло на політичних лідерів. Це також забезпечило міцну інтелектуальну основу для розробки Декларації незалежності."
  flavor_eng.225.title: "Права людини"
  flavor_eng.225.desc: "Радикальний діяч [thomas_paine.GetName] опублікував ще один зі [thomas_paine.GetHisHer] крамольних памфлетів, що виступає за скасування монархії та запровадження представницького парламенту. [thomas_paine.GetHisHer|U] слова є викликом соціальній стабільності [target_root_country.GetName] і вже знайшли вдячну аудиторію серед тих, хто виступає за політичні та соціальні реформи."
  flavor_eng.225.a: "Протистояти будь-яким змінам статус-кво."
  flavor_eng.225.tt1: "[thomas_paine.GetNameWithNoTooltip] тікає з [target_root_country.GetName], оскільки [thomas_paine.GetSheHe] звинувачують у підбурюванні до заколоту"
  flavor_eng.225.a.custom: "[ShowPopTypeName('peasants')] у [ShowRegionName('great_britain_region')] втрачають #R 50.00%#! [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.225.b: "Запровадити парламентську реформу."
  flavor_eng.225.tt2: "[ShowPopTypeName('burghers')] та [ShowPopTypeName('nobles')] нажахані спробою підірвати їхні соціальні привілеї"
  enable_representative_parliament_reform: "Надає доступ до [ShowGovernmentReformName('representative_parliament_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.225.historical_info: "#italic Права людини#! — це суперечливий памфлет, опублікований наприкінці XVIII століття Томасом Пейном. Його популярність стривожила британський уряд, який вжив заходів для придушення інакомислення та опозиції до статус-кво. Він вважається відправною точкою для дискусій про політичні реформи та права громадян і сприяв підвищенню обізнаності громадськості щодо питань, пов'язаних з демократією та важливістю рівного представництва."
  flavor_eng.226.title: "[james_cook.GetNameWithNoTooltip]"
  flavor_eng.226.desc: "Рішучий і винятковий навігатор, [james_cook.GetName] продемонстрував ненаситну жагу до досліджень і запропонував серію дослідницьких місій у Тихому океані, сподіваючись відкрити та заявити права на нові території. Також висловлено бажання проводити астрономічні спостереження та надавати точніші карти для Королівського флоту. [james_cook.GetSheHe|U] продемонстрував шанобливий і дипломатичний підхід і, ймовірно, є хорошим кандидатом для встановлення мирних відносин з місцевими племенами."
  flavor_eng.226.a: "Чудова ініціатива."
  flavor_eng.226.tt1: "[james_cook.GetNameWithNoTooltip] додано як [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.226.tt2: "[james_cook.GetSheHe|U] може проводити наукові дослідження в рамках місії, якщо йому доручено досліджувати Тихий океан"
  flavor_eng.226.b: "Надати [james_cook.GetHimHer] регулярне командування."
  flavor_eng.226.tt3: "[james_cook.GetNameWithNoTooltip] додано як [Concept('admiral', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.226.c: "Астрономічні спостереження? Яка дурість."
  flavor_eng.226.historical_info: "Подорожі Джеймса Кука заклали основу для подальших досліджень і колонізації в Тихому океані та за його межами, розширили наукові знання та відкрили нові торговельні шляхи. Його обширне картографування Нової Зеландії та Австралії призвело до того, що обидві території були заявлені Британією та згодом колонізовані."
  flavor_eng.227.title: "Дослідження [james_cook.GetNameWithNoTooltip]"
  flavor_eng.227.desc: "Незвідані води Тихого океану зараз досліджує сміливий авантюрист [james_cook.GetName]. Експедиція має безліч цілей, і капітан звернувся з проханням про керівництво, куди саме спрямувати їхню увагу."
  flavor_eng.227.a: "Сама природа цієї місії є науковою."
  flavor_eng.227.b: "Виправна колонія для небажаних."
  flavor_eng.227.c: "Торгівля є важливою для імперських амбіцій."
  flavor_eng.227.d: "Продовжити експедицію."
  flavor_eng.227.tt: "Капітан та його екіпаж роблять додаткові зупинки, щоб поповнити запаси"
  STATIC_MODIFIER_NAME_extended_expedition: "Розширена експедиція"
  flavor_eng.227.historical_info: "Капітан Джеймс Кук здійснив кілька подорожей до Тихого океану протягом вісімнадцятого століття, що допомогло поглибити розуміння географії, природної історії та культури Тихого океану. Спочатку місії були зосереджені на спостереженні за проходженням Венери через Сонце, але іншою ключовою метою було дослідження та картографування значною мірою незвіданих регіонів Південної частини Тихого океану."
  flavor_eng.228.title: "Податок на прибуток"
  flavor_eng.228.desc: "Фінансове становище країни залишається досить делікатним, що викликає дискусії щодо необхідності реформ. Переважає думка, що нинішні системи оподаткування непропорційно вигідні багатим, приносячи мало державних доходів. Член кабінету [william_pitt_the_younger.GetName] виступає за тимчасове оподаткування доходів, щоб зміцнити фінанси країни та перерозподілити багатство, пропозиція, яка не сподобається [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_eng.228.a: "Справедливий та прогресивний."
  STATIC_MODIFIER_NAME_temporary_income_tax: "Тимчасовий податок на прибуток"
  flavor_eng.228.b: "Митний збір та акцизи нас підтримають."
  flavor_eng.228.c: "Політична гаряча картопля."
  flavor_eng.228.tt: "Парламент незадоволений ігноруванням делікатного стану фінансової стабільності [target_root_country.GetNameWithNoTooltip]"
  flavor_eng.228.custom: "Надає доступ до [Concept('law', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('eng_taxation_law')]"
  flavor_eng.228.historical_info: "Податок на прибуток був запроваджений британським прем'єр-міністром Вільямом Піттом Молодшим для вирішення фінансових труднощів, спричинених триваючими Наполеонівськими війнами. Податок на прибуток Пітта був розроблений як прогресивний податок, що означало, що особи з вищими доходами сплачували більший відсоток свого доходу у вигляді податків. Він зіткнувся з опозицією з боку осіб з високими доходами і зрештою був скасований після закінчення війни."
  flavor_eng.229.title: "Щоденник Семюела Піпса"
  flavor_eng.229.desc: "Було знайдено щоденник військово-морського адміністратора сімнадцятого століття [samuel_pepys.GetName], який, очевидно, вів детальний запис особистих одкровень та свідчень очевидців значних подій протягом [samuel_pepys.GetHisHer] життя. Кілька сторінок вже розшифровано, але після схвалення ми могли б переписати весь щоденник простою [ROOT.GetCountry.GetCulture.GetLanguage.GetName]."
  flavor_eng.229.a: "Переписати та опублікувати."
  flavor_eng.229.tt1: "Рідкісні, але інформативні записи щоденника яскраво переказують життя в [target_root_country.GetName] протягом сімнадцятого століття"
  flavor_eng.229.tt2: "Кілька інформативних записів щоденника дають багаті описи життя в [target_root_country.GetName] протягом сімнадцятого століття"
  flavor_eng.229.tt3: "Численні записи щоденника дають яскраві та детальні описи життя в [target_root_country.GetName] протягом сімнадцятого століття"
  flavor_eng.229.tt4: "Багаті записи щоденника надають свідчення очевидців кількох великих подій і слугують першоджерелом життя в [target_root_country.GetName] протягом сімнадцятого століття"
  flavor_eng.229.b: "Поважати приватність родини."
  flavor_eng.229.historical_info: "Щоденник Семюела Піпса був написаний між 1660 і 1669 роками і містить детальний опис подій у Лондоні протягом цього періоду, включаючи особистий досвід, спостереження та думки самого Семюела Піпса. Він спостерігав за кількома ключовими подіями, такими як Велика лондонська пожежа, став членом Королівського товариства, а його посада в Адміралтействі дала йому уявлення про щоденні справи політичного життя."
  flavor_eng.230.title: "Фабричний акт"
  flavor_eng.230.desc: "Реформатори виступають за покращення трудових прав для фабричних робітників, які часто піддаються безперервній експлуатації, недостатньому захисту та низькій заробітній платі. Очікується, що будь-яка спроба змінити поточну ситуацію зіткнеться з опозицією та потенційно матиме несприятливі наслідки для економічного зростання та продуктивності. Проте ми ризикуємо відтоком робочої сили, якщо ситуація не покращиться."
  flavor_eng.230.a: "Бідні душі потребують полегшення."
  flavor_eng.230.custom: "Надає доступ до [Concept('law', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('factory_working_conditions_law')]"
  flavor_eng.230.b: "Робітники живлять економічний двигун."
  flavor_eng.230.c: "Невдячні могли б виявити трохи вдячності."
  flavor_eng.230.historical_info: "Закон про фабрики був значним законодавчим актом у Британії та став поворотним моментом у зусиллях покращити умови праці та захистити права фабричних робітників, особливо дітей, які інакше працювали б більшу частину дня за мізерну плату. Закон запровадив вікові обмеження, освітні вимоги та фабричні інспекції, а також змусив власників фабрик покращити загальну безпеку та вести облік зайнятості."
  flavor_eng.231.title: "[richard_arkwright.GetNameWithNoTooltip]"
  flavor_eng.231.desc: "Підприємець та винахідник з діловою хваткою [richard_arkwright.GetName] подав патент на новий тип виробничої машини, що використовує гідроенергію для приводу серії прядильних валиків. Це дозволяє безперервно виробляти бавовняну нитку, значно покращуючи ефективність та продуктивність. [richard_arkwright.GetSheHe|U], однак, стикається з деякими юридичними проблемами щодо оригінальності винаходу, процес вирішення яких може зайняти деякий час, затримуючи впровадження цього нового пристрою."
  flavor_eng.231.a: "Надати ексклюзивний патент."
  flavor_eng.231.tt1: "[richard_arkwright.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  enable_water_frame_advance: "Надає доступ до [ShowAdvanceName('water_frame')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.231.b: "Подальше розслідування виправдане."
  flavor_eng.231.tt2: "Судова битва завершується спільним патентом"
  flavor_eng.231.historical_info: "Річард Аркрайт був англійським винахідником, який зробив кілька інновацій для текстильної промисловості на початку індустріалізації. Його найважливішими внесками були прядильна машина та водяне колесо, які революціонізували виробництво бавовняної нитки та проклали шлях до переходу від домашньої системи текстильного виробництва до фабричної системи."
  flavor_eng.232.title: "Внески Дарбі"
  flavor_eng.232.desc: "Піонери-металурги [abraham_darby.GetName] розробили нове джерело палива, що використовується в доменних печах. Це паливо, відоме просто як «кокс», вважається менш летючим і здатним генерувати стабільно вищу температуру порівняно з поточним уподобанням промисловості – деревним вугіллям. [abraham_darby.GetNameWithNoTooltip] зараз проводить пробне впровадження на [abraham_darby.GetHisHer] сімейній [ShowBuildingTypeName('iron_foundry')] з багатообіцяючими результатами."
  flavor_eng.232.a: "Зробити це галузевою нормою."
  enable_coke_smelting_advance: "Надає доступ до [ShowAdvanceName('coke_smelting')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.232.b: "Поточний процес достатньо ефективний."
  flavor_eng.232.tt1: "[abraham_darby.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.232.tt2: "Нове джерело переробленого палива вимагає більших обсягів [ShowGoodsName('coal')]"
  flavor_eng.232.historical_info: "Процес коксування, винайдений Абрахамом Дарбі I, вважається головним каталізатором, який значно прискорив Промислову революцію. Його безпосередніми наслідками були фундаментальні зміни в техніках виробництва заліза, що дозволило широко впроваджувати залізо та сталь у різних галузях промисловості. Він також заклав основу для масового виробництва чавуну, що було вирішальним для Промислової революції."
  flavor_eng.233.title: "Чайний акт"
  flavor_eng.233.desc: "[east_india_trade_company.GetName] ризикує стати неплатоспроможною через неможливість продати свою надмірну кількість [ShowGoodsName('tea')]. Такі фактори, як надвиробництво та конкуренція з іншими європейськими чайними компаніями, призвели до надлишку, який ще більше посилюється тим фактом, що компанія переважно виробляє чорний чай, тоді як серед [ROOT.GetCountry.GetAdjective] споживачів зростає попит на зелений чай.\n\nМи могли б надати їм монополію на всі продажі в [thirteen_colonies.GetName], як спосіб перевершити іноземних виробників та стабілізувати компанію в процесі."
  flavor_eng.233.a: "Трохи протекціоністський, але необхідний."
  flavor_eng.233.b: "Ми не можемо накладати такі обмеження."
  STATIC_MODIFIER_NAME_no_market_for_goods: "Немає ринку для товарів"
  STATIC_MODIFIER_NAME_tea_imports_banned: "Імпорт чаю заборонено"
  flavor_eng.233.historical_info: "Основною метою Закону про чай було порятунок Британської Ост-Індської компанії, яка мала фінансові труднощі та надлишок чаю на складах. Закон запровадив монополію на продаж чаю американським колоніям, дозволяючи компанії знижувати ціни та доставляти чай безпосередньо, фактично витісняючи колоніальних торговців. Попри нижчу ціну, багато колоністів вважали цей Закон порушенням своїх прав."
  flavor_eng.234.title: "Досвідчена англійська домогосподарка"
  flavor_eng.234.desc: "Видатна авторка, кухарка та вправна домогосподарка [elizabeth_raffald.GetName] ретельно узагальнила свій кулінарний досвід та знання з ведення домашнього господарства. Це відображає її час, проведений у роботі в різних домогосподарствах, включно з тими, що належали видатним особам. Ця всеосяжна праця представляє інноваційні та практичні рецепти. Вона готова до друку та, як очікується, здобуде значне визнання."
  flavor_eng.234.a: "Кулінарна перлина."
  the_experienced_english_housekeeper: "Досвідчена англійська домогосподарка"
  flavor_eng.234.b: "Вправна домогосподарка не потребує порад."
  flavor_eng.234.tt1: "[elizabeth_raffald.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.234.tt2: "Книга стає популярною та впливовою працею не лише в [target_root_country.GetName], а й в американських колоніях"
  flavor_eng.234.historical_info: "#italic Досвідчена англійська домогосподарка#! була написана Елізабет Раффальд, яка представила інноваційні та практичні рецепти, деякі з яких користуються популярністю й досі. Вона містила рецепти різноманітних страв, від супів і жаркого до десертів, включно з найпершим рецептом крампета. Книга наголошувала на точності в кулінарії, наприклад, на використанні стандартизованих вимірювань, що було рідкістю для того часу."
  flavor_eng.235.title: "Бостонська різанина"
  flavor_eng.235.desc: "У колоніальному порту [ShowLocationName('boston')] стався інцидент між розквартированими військами та містянами, внаслідок якого загинуло п'ятеро колоністів. Більшість солдатів були виправдані або отримали м'які вироки на нещодавно завершеному судовому процесі. Місцеві газети почали зображувати [ROOT.GetCountry.GetAdjective] солдатів як агресорів, а колоністів як невинних жертв, що ще більше розпалило ситуацію.\n\nМи могли б спробувати зменшити напругу, зменшивши податковий тягар, або розглянути альтернативні заходи для вирішення проблеми."
  flavor_eng.235.a: "Висловити жаль та скасувати податки."
  flavor_eng.235.b: "Запустити пропагандистську машину."
  flavor_eng.235.tt1: "Монополія на продаж [ShowGoodsName('tea')] до [thirteen_colonies.GetName] скасована"
  flavor_eng.235.tt2: "Продовження монополії на продаж [ShowGoodsName('tea')] посилює анти-[target_root_country.GetAdjective] настрої"
  flavor_eng.235.tt3: "Присутність [target_root_country.GetAdjective] військ сприяє колоніальному невдоволенню"
  flavor_eng.235.historical_info: "Бостонська різанина була конфронтацією між групою жителів Бостона та невеликим загоном британських солдатів. Солдати, яких відправили до Бостона для підтримання порядку та забезпечення виконання британської політики, зазнали образ та глузувань, що призвело до посилення напруги та загибелі кількох колоністів, коли солдати відкрили вогонь. Інцидент був використаний обома сторонами в інтенсивній пропагандистській кампанії, що підлило масла у вогонь та посилило колоніальну опозицію британському правлінню."
  flavor_eng.236.title: "Перший флот"
  flavor_eng.236.desc: "Наразі ми боремося з надлишком засуджених, і було запропоновано перевезти частину цих чоловіків та жінок до далекої колонії, щоб полегшити цю проблему. Передбачається, що ці засуджені можуть бути реабілітовані та стати продуктивними членами суспільства після відбуття покарання.\n\nГрупа кораблів наразі готується до цієї значної експедиції з пропонованим місцем розташування нещодавно заснованої колонії [target_location.GetName]. Вона має відплисти найближчим часом."
  flavor_eng.236.a: "Підняти вітрила та вирушити в путь."
  flavor_eng.236.b: "Ми не можемо експортувати наші проблеми."
  STATIC_MODIFIER_NAME_overcrowded_prisons: "Переповнені в'язниці"
  flavor_eng.236.historical_info: "Перший флот складався з 11 кораблів, які перевезли понад тисячу засуджених, а також морських піхотинців, офіцерів та інший персонал. Він став першою групою європейських поселенців, які заснували постійну європейську присутність на континенті, що згодом стане Австралією. Однією з головних причин експедиції було створення виправної колонії, оскільки Британія зіткнулася з переповненістю своїх в'язниць. Іншою причиною було те, що засуджені могли б стати потенційним джерелом робочої сили для розвитку нової колонії."
  flavor_eng.237.title: "Лондонський монстр"
  flavor_eng.237.desc: "Таємнича особа вселяє страх у серця [ShowPopTypeName('nobles')] [ShowLocationName('london')], здійснюючи дивні та жорстокі напади на жінок високого соціального стану. Ці напади часто супроводжуються випадковими спалахами та неналежною поведінкою, такою як спроби обмацувати жертв або робити непристойні коментарі."
  flavor_eng.237.a: "Розгорнути війська на вулицях."
  flavor_eng.237.tt1: "Кілька [ShowPopTypeNameWithNoTooltip('nobles')] загинули від випадкових і жорстоких ножових поранень"
  flavor_eng.237.tt2: "Кількість нападів зменшується завдяки збільшеній присутності солдатів"
  flavor_eng.237.b: "Цим займуться Боу-стрітські бігуни."
  flavor_eng.237.tt3: "Кількість нападів значно зменшується завдяки збільшеній видимості Бігунів"
  flavor_eng.237.c: "[ShowPopTypeNameWithNoTooltip('nobles')] можуть дозволити собі приватних охоронців."
  flavor_eng.237.tt4: "Відсутність правопорядку псує настрій [ShowPopTypeNameWithNoTooltip('nobles')]"
  flavor_eng.237.historical_info: "Кампанія терору Лондонського Монстра викликала широку паніку та страх серед жінок Лондона, а про напади широко повідомлялося в газетах. Вибір жертв здавався випадковим, а мотиви нападів залишалися загадкою. Зрештою, ситуація закінчилася, коли молодого чоловіка з історією психічного захворювання було схоплено та засуджено."
  flavor_eng.238.title: "Закон про комбінації"
  flavor_eng.238.desc: "Жахливі умови праці фабричних робітників деякий час вважалися необхідним злом, щоб дозволити швидке розширення наших виробничих можливостей. Нещодавно робітники, втомлені від того, що вони вважають нелюдським ставленням, намагаються об'єднати зусилля та колективно домовитися про кращу оплату праці, покращену безпеку та меншу кількість годин.\n\nРепресивні заходи можуть бути необхідними для боротьби з цією моделлю поведінки, інакше ми ризикуємо зірвати швидку індустріалізацію, що відбувається по всій країні."
  flavor_eng.238.a: "Ця безглузда поведінка повинна припинитися."
  flavor_eng.238.custom: "Надає доступ до [ShowLawName('trade_unions_law')] [Concept('law', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.238.a.custom: "Незадоволені [ShowPopTypeName('peasants')] можуть об'єднатися, щоб протестувати проти порушення основних трудових прав"
  flavor_eng.238.b: "Зрештою, вони теж люди."
  disgruntled_factory_workers: "Незадоволені фабричні робітники"
  STATIC_MODIFIER_NAME_eng_disgruntled_factory_workers_rebellion: "Незадоволені фабричні робітники"
  flavor_eng.238.historical_info: "Закон про комбінації був прийнятий на ранніх етапах Промислової революції, коли робітники створювали профспілки для вирішення проблем поганих умов праці, низької заробітної плати та довгих годин. Закон мав на меті криміналізувати будь-яку форму організованої трудової діяльності та сприяв роботодавцям і власникам фабрик, але зустрів значний опір з боку фабричних робітників та деяку парламентську підтримку. Зрештою, зміна ставлення до прав робітників призвела до скасування Закону."
  flavor_eng.239.title: "Розетський камінь"
  flavor_eng.239.desc: "Значний артефакт розміром близько одного метра був знайдений у [target_location.GetName], імовірно, датується Птолемеївським періодом стародавнього Єгипту. На ньому викарбувано три різні мови, включаючи те, що здається серією піктографічних символів невідомого походження."
  flavor_eng.239.a: "Нехай його доставлять назад до [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_eng.239.b: "Пожертвувати його місцевій владі."
  flavor_eng.239.historical_info: "Відкриття Розетського каменю було зроблено в місті Розетта в дельті Нілу. На ньому були викарбувані три різні писемності: ієрогліфи, демотичне письмо та давньогрецька, що дозволило дослідникам вперше розшифрувати давньоєгипетські ієрогліфи."
  flavor_eng.240.title: "Залізний міст"
  flavor_eng.240.desc_common: "Відомий архітектор [thomas_pritchard.GetName] розробив геніальний проект новаторського мосту, повністю виготовленого з чавуну, демонструючи безмежні можливості цього чудового матеріалу."
  flavor_eng.240.desc_industrial_region: "$flavor_eng.240.desc_common$\n\nПропозиція рекомендує його будівництво в промисловій провінції [ShowProvinceDefinitionName('shropshire_province')]. Це стратегічне розташування не тільки задовольняє нагальну потребу в покращенні транспорту, але й підкреслює значення регіону як центру промислової діяльності. Це робить його ідеальним місцем для демонстрації новаторського дизайну мосту та його потенціалу для революції в інфраструктурі."
  flavor_eng.240.desc: "$flavor_eng.240.desc_common$\n\nПропозиція передбачає його будівництво в провінції [ShowProvinceDefinitionName('shropshire_province')], оскільки наразі існує потреба в переправі через річку в цій конкретній провінції, що сприятиме розвитку місцевої економіки та слугуватиме символом прогресу."
  flavor_eng.240.a: "Негайно розпочати будівництво."
  flavor_eng.240.tt1: "[thomas_pritchard.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.240.b: "Краще витратити на модернізацію текстильного виробництва."
  STATIC_MODIFIER_NAME_invested_in_textile_production: "Модернізоване текстильне виробництво"
  flavor_eng.240.c: "Натомість можна було б збільшити виробництво продуктів харчування."
  flavor_eng.240.d: "Немає нагальної потреби."
  STATIC_MODIFIER_NAME_invested_in_farming_output: "Модернізоване виробництво продуктів харчування"
  iron_bridge_construction: "Будівництво Залізного мосту"
  flavor_eng.240.historical_info: "Залізний міст — це чавунний міст, який вважається знаковим символом Промислової революції у Британії. Його було побудовано між 1777 і 1779 роками, що ознаменувало зміну в технології будівництва мостів, яка стала необхідною через транспортування важкої техніки та матеріалів."
  flavor_eng.241.title: "Гордонські заворушення"
  flavor_eng.241.desc_common: "Мирна демонстрація переросла в насильство в кількох районах [ShowLocationName('london')] із широкомасштабними заворушеннями та грабунками, що спричинило значні майнові збитки та людські жертви.\n\nПричиною цього повстання є антикатолицькі настрої, і воно розглядається як виклик"
  flavor_eng.241.desc_catholic_army: "$flavor_eng.241.desc_common$ дозволяючи [ShowReligionAdjective('catholic')] солдатам служити в армії, які сприймаються як загроза безпеці та ймовірно планують зраду."
  flavor_eng.241.desc: "$flavor_eng.241.desc_common$ дозволяючи [ShowReligionAdjective('catholic')] радникам служити в уряді, оскільки вони сприймаються як загроза безпеці та ймовірно віддаватимуть перевагу [ShowReligionName('catholic')] та впливатимуть на законодавство."
  flavor_eng.241.a: "Викликати військових."
  flavor_eng.241.tt1: "Кілька бунтівників загинули під час сутичок із солдатами"
  flavor_eng.241.tt2: "Заворушення шкодять репутації [target_root_country.GetName] по всій Європі"
  STATIC_MODIFIER_NAME_eng_gordon_riots: "Гордонські заворушення"
  opressing_catholic_population: "Пригнічення католицького населення"
  protestant_association: "Протестантська асоціація"
  flavor_eng.241.b: "Зрештою вони втомляться."
  flavor_eng.241.b.custom: "Кілька [ShowReligionAdjectiveWithNoTooltip('catholic')] посольств підпалено та пограбовано, що викликало сильну реакцію та гнів з боку іноземних урядів"
  flavor_eng.241.tt4: "Заворушення викликають велике збентеження уряду через його нездатність підтримувати контроль"
  flavor_eng.241.historical_info: "Гордонські заворушення були антикатолицьким та антиурядовим повстанням, що відбулося в Лондоні наприкінці вісімнадцятого століття. Ці заворушення були спровоковані запропонованим Актом, який мав послабити репресивні заходи щодо римо-католиків. Влада намагалася стримати насильство, що призвело до широкомасштабних руйнувань та тривалої шкоди міжнародній репутації Британії як стабільної та могутньої нації."
  flavor_eng.242.title: "Справа «Гаспі»"
  flavor_eng.242.desc: "Виникла дипломатична суперечка між [target_country.GetName] та [target_root_country.GetName], спричинена знищенням митного судна, розгорнутого для боротьби з широкомасштабною контрабандою колоніальних купців. Це кидає виклик суверенітету [target_root_country.GetAdjectiveWithNoTooltip], якщо верховенство права не може бути підтримане.\n\nКолоніальна адміністрація спробувала деескалувати ситуацію, склавши ретельно сформульовану петицію, підтверджуючи свою лояльність, водночас висловлюючи бажання мирного вирішення будь-яких розбіжностей."
  flavor_eng.242.a: "Розпочати негайне розслідування."
  STATIC_MODIFIER_NAME_committees_of_correspondence: "Комітет кореспонденції"
  flavor_eng.242.tt1: "Спроби притягнути до відповідальності винних колоністів викликають подальше обурення проти правління [target_root_country.GetAdjectiveWithNoTooltip]"
  flavor_eng.242.tt2: "Адміністрація [target_country.GetAdjective] створює мережу зв'язку та координації з метою сприяння єдності серед колоній та організації опору колоніальній політиці"
  flavor_eng.242.b: "Проігнорувати інцидент."
  flavor_eng.242.tt3: "Небажання [target_root_country.GetNameWithNoTooltip] підтримувати верховенство права заохочує подальшу контрабанду"
  flavor_eng.242.c: "Прийняти їхню петицію."
  flavor_eng.242.tt4: "Примирлива «Оливкова гілка петиції», складена адміністрацією [target_character.GetName], допомагає зменшити напругу"
  flavor_eng.242.historical_info: "«Гаспі» був британським митним судном, якому було доручено забезпечувати дотримання торговельних правил та запобігати контрабанді в американських колоніях. Під час рутинної місії він переслідував контрабандне судно і випадково сів на мілину. Розчаровані поточною політикою, кілька колоністів вирішили наблизитися до судна, вступили в коротку, але інтенсивну перестрілку з британським екіпажем і, нарешті, підпалили його."
  flavor_eng.243.title: "[elizabeth_montagu.GetNameWithNoTooltip]"
  flavor_eng.243.desc: "Впливова письменниця та літературна критикиня [elizabeth_montagu.GetName] вийшла заміж за видатного державного діяча, який представив [elizabeth_montagu.GetHimHer] вищій еліті суспільства. [elizabeth_montagu.GetSheHe|U] сподівається перетворити [elizabeth_montagu.GetHimHer] маєток на центр літературних та інтелектуальних зібрань, об'єднуючи письменників, художників, вчених та соціальних реформаторів."
  flavor_eng.243.a: "Справді незалежна жінка."
  flavor_eng.243.tt1: "[elizabeth_montagu.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.243.b: "[elizabeth_montagu.GetHimHer|U] бунтівна натура викликає занепокоєння."
  flavor_eng.243.historical_info: "Елізабет Монтегю була важливою фігурою в інтелектуальних та літературних колах Англії. Вона відіграла ключову роль в організації та керівництві Товариством Синіх Панчіх, неформальним жіночим соціальним та освітнім рухом. Її опубліковані роботи включають сатиру та «Діалоги мертвих», серію розмов між живими та видатними померлими, що слугували критикою суспільства XVIII століття."
  flavor_eng.244.title: "Товариство Синіх Панчіх"
  flavor_eng.244.desc: "Літературна критикиня та салонна дама [elizabeth_montagu.GetName] організувала товариство привілейованих жінок, які зустрічаються для обговорення літератури та мистецтва з метою сприяння рівним освітнім можливостям для жінок. Запрошення були розширені для освічених чоловіків для участі в інтелектуальних заходах, таких як читання та письмо.\n\nЯкщо дозволити цьому продовжуватися без втручання, це може розширити свій вплив, включивши адвокацію за жіночу освіту."
  flavor_eng.244.a: "Похвальна ініціатива."
  flavor_eng.244.tt1: "Товариство Синіх Панчіх регулярно збирається для сприяння рівній освіті, літературі та мистецтву"
  STATIC_MODIFIER_NAME_blue_stockings_society: "Товариство Синіх Панчіх"
  flavor_eng.244.b: "Знання здобуваються через розмови з чоловіками."
  flavor_eng.244.historical_info: "Товариство Синіх Панчіх було інтелектуальним та літературним товариством, заснованим Елізабет Монтегю, видатною жінкою, яка проводила неформальні зустрічі для сприяння рівній освіті, а також включенню як чоловіків, так і жінок, у час, коли формальна освіта для жінок була обмеженою. Їхні зусилля сприяли подальшому розвитку жіночої освіти в наступному столітті."
  flavor_eng.245.title: "[ShowLocationNameWithNoTooltip('london')] Пивний Потоп"
  flavor_eng.245.desc: "Резервуар, що містив тисячі літрів [ShowGoodsName('beer')], розірвався на пивоварні Meux and Company [ShowBuildingTypeName('brewery')] на Тоттенхем-Корт-Роуд, [ShowLocationName('london')], спричинивши катастрофічний витік [ShowGoodsNameWithNoTooltip('beer')]. Він прорвав стіни пивоварні та хлинув на прилеглі вулиці, пошкодивши або зруйнувавши кілька будівель, а кілька людей вважаються загиблими.\n\nНещодавнє розслідування встановило, що ніхто з пивоварні не може бути притягнутий до кримінальної відповідальності, а витрати на прибирання, ремонт та заміну втраченого товару, ймовірно, ляжуть на постраждалих власників бізнесу."
  flavor_eng.245.a: "Покрити всі витрати."
  flavor_eng.245.tt1: "Будь-яка шкода майну, а також значна втрата пива відшкодовується"
  flavor_eng.245.b: "[ShowPopTypeNameWithNoTooltip('burghers')] відповідальні."
  beer_flood: "Пивна повінь"
  flavor_eng.245.tt2: "Інцидент спричиняє нестачу [ShowGoodsNameWithNoTooltip('beer')], оскільки підприємства намагаються покрити тривалі збитки"
  flavor_eng.245.historical_info: "Лондонська пивна повінь була трагічним інцидентом, спричиненим розривом величезної діжки, що містила велику кількість пива. Це призвело до витоку понад 600 000 літрів, спричинивши масштабну повінь, пошкодження сусідніх будівель та загибель людей, оскільки люди були заблоковані або потонули. Після цього відбулося розслідування, яке визнало, що ніхто не може бути притягнутий до відповідальності, і це було офіційно визнано «актом Божим»."
  flavor_eng.246.title: "Вічна Дама"
  flavor_eng.246.desc: "Анонімна письменниця почала публікувати свої твори, ідентифікуючи себе лише під псевдонімом «Дама». Книги не здобули значної популярності, але вважаються дотепними та іронічними, незважаючи на обмежену формальну освіту, доступну жінкам. Вони, однак, також детально описують обмеження, накладені на жінок, на додаток до критики шлюбного ринку, боротьбу, з якою стикаються жінки того часу, та класові відмінності суспільства."
  flavor_eng.246.a: "Життя нудне без краплі гумору."
  flavor_eng.246.tt1: "[jane_austen.GetNameWithNoTooltip] додається як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.246.b: "Це не личить Дамі."
  flavor_eng.246.historical_info: "Джейн Остін була романісткою, відомою своїми творами романтичної прози. Вона є однією з найвідоміших авторок в історії англійської літератури і в основному відома своїми шістьма завершеними романами. Вона була вченою-самоучкою, оскільки освітні можливості були обмежені для жінок, і провела свої ранні роки, користуючись великою бібліотекою свого батька."
  flavor_eng.247.title: "Гордість і упередження"
  flavor_eng.247.desc: "Таємнича «Дама» розсипала свій літературний шарм у нещодавній публікації [jane_austen.GetHisHer] останнього роману. Він добре прийнятий деякими літературними критиками, але поки що не здобув миттєвої популярності. Наповнений дотепними та проникливими зауваженнями про суспільство та цінності, він ще може стати бестселером для майбутніх поколінь."
  flavor_eng.247.a: "Він практично сам перегортає свої сторінки."
  flavor_eng.247.b: "Він досить нудний і ненатхненний."
  flavor_eng.247.historical_info: "Гордість і упередження — це класичний роман, написаний Джейн Остін, з історією, що обертається навколо життя та романтичних пошуків Елізабет Беннет, однієї з п'яти сестер зі скромної сільської родини. Центральними темами, що досліджуються в романі, є соціальний клас, шлюб та наслідки поспішних суджень. Хоча не був миттєвим хітом, з часом репутація роману зросла, і з тих пір він став одним з найулюбленіших і найтриваліших класичних творів та одним з найзначніших творів Джейн Остін."
  flavor_eng.248.title: "Вакцина від коров'ячої віспи"
  flavor_eng.248.desc: "[ROOT.GetCountry.GetAdjective] лікар виступив із запропонованим лікуванням від руйнівної хвороби віспи, яка століттями знищувала наше населення. Шляхом зараження людини подібною хворобою, у цьому випадку хворобою коров'ячої віспи, яка поширена серед нашого поголів'я худоби, вони, здається, набувають деякого імунітету.\n\nЙого робота може закласти основу для подальших профілактичних заходів, і він навіть вигадав термін «вакцинація», від [latin.GetName] слова #italic vacca#!, що означає корова, для опису процесу використання коров'ячої віспи для захисту від віспи."
  flavor_eng.248.a: "Ці відкриття мають бути поширені."
  flavor_eng.248.tt1: "Результати публікуються [ShowBuildingTypeName('royal_society')] у їхньому науковому журналі «Philosophical Transactions», здобуваючи широке визнання"
  flavor_eng.248.tt2: "Результати поширюються серед медичної спільноти, здобуваючи певну підтримку та визнання"
  flavor_eng.248.b: "Богохульна нісенітниця."
  flavor_eng.248.historical_info: "Вакцина від коров'ячої віспи була запроваджена Едвардом Дженнером, який спостерігав, що доярки, які заразилися коров'ячою віспою, здавалося, набували імунітету до віспи. Він провів експеримент, щоб перевірити свою гіпотезу, взявши матеріал з виразки коров'ячої віспи на доярці та втерши його в руку молодого хлопчика. Після зараження хлопчик був підданий віспі, але не захворів."
  flavor_eng.249.title: "Індустріальний художник"
  flavor_eng.249.desc: "Широко подорожуючий портретист [godfrey_kneller.GetName] шукає покровительства в [ROOT.GetCountry.GetName], щоб заснувати академію живопису, яка б революціонізувала швидкість створення портретів, дотримуючись формульної моделі. Окрім обіцянок навчати початківців мистецтву портретного живопису, [godfrey_kneller.GetSheHe] запевняє покровителів у прискореній доставці без шкоди для непохитної відданості якості."
  flavor_eng.249.a: "Похвальна ініціатива."
  flavor_eng.249.tt1: "[godfrey_kneller.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng.249.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлює своє невдоволення перспективою того, що єретик-художник очолюватиме членів суспільства через [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('strict_censorship')]"
  STATIC_MODIFIER_NAME_industrial_painter: "Індустріальний художник"
  flavor_eng.249.b: "Спалити його за єресь."
  flavor_eng.249.tt3: "[ShowPolicyName('de_heretico_comburendo')] вимагає, щоб єретики горіли"
  flavor_eng.249.c: "Смертельний удар для індустрії."
  flavor_eng.249.tt4: "[godfrey_kneller.GetNameWithNoTooltip] утримується від опортуністичних ділових практик"
  flavor_eng.249.d: "Геть з наших очей."
  flavor_eng.249.historical_info: "Ґодфрі Кнеллер був німецьким художником, який став головним портретистом англійського двору. Він навчався в Амстердамі та Римі, перш ніж переїхати до Англії в 1676 році, де заснував Академію живопису та малювання для надання формальної освіти художникам. Академія сприяла розвитку мистецтв і принесла йому лицарське звання пізніше в житті."