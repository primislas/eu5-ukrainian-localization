l_english:
  flavor_nap.3.title: "Ренесанс у [ShowLocationNameWithNoTooltip('naples')]"
  flavor_nap.3.desc: "Велике місто [ShowLocationName('naples')] стає одним із найважливіших центрів Ренесансу в Італії. До нього приваблюються видатні мужі, і місто стає осередком нових видатних митців."
  flavor_nap.3.a: "Епоха Культури!"
  flavor_nap.3.b: "Епоха Слави!"
  flavor_nap.4.title: "Велике місто Бароко"
  flavor_nap.4.desc: "Перші десятиліття XVII століття описуються як Золота Доба в історії [target_location.GetName]. Місто перетворилося на сучасне і є прикладом для всіх інших міст навколо. Культура процвітає в місті, дозвілля та розваги стають все більш поширеними та витонченими."
  flavor_nap.4.a: "Місто, що може змагатися з будь-чим..."
  flavor_nap.6.title: "Доля [sold_country.GetNameWithNoTooltip]"
  flavor_nap.6.desc: "Десятиліття тому громадяни [sold_country.GetName] довірили правління над своїм [sold_country.GetFlavorRank] [robert_scope.GetName]. Сьогодні їхні біди є для нас лише відволіканням, а наш суверенітет над [sold_country.GetFlavorRank] не приносить нам нічого, крім клопотів. Можливо, ми могли б продати його [target_country.GetName]?"
  flavor_nap.6.historical_info: "На початку XIV століття місто Прато підкорилося владі Роберта Анжуйського, щоб захиститися від наступу флорентійців. Однак, лише через кілька десятиліть, у 1351 році, місто було продано Флорентійській республіці наступницею Роберта, Джоанною."
  flavor_nap.6.a: "Зробімо це."
  flavor_nap.6.b: "[sold_country.GetNameWithNoTooltip] може ще стати в пригоді."
  flavor_nap.7.title: "$flavor_nap.6.title$"
  flavor_nap.7.desc: "Посланець із [nap_from.GetName] щойно прибув. Після нашого теплого прийому вони повідомили нам про пропозицію придбати [sold_country.GetName] за не надто значну ціну. Отримати процвітаючий сусідній [sold_country.GetFlavorRank] за невелику ціну — чудова нагода розширити наш вплив."
  flavor_nap.7.historical_info: "$flavor_nap.6.historical_info$"
  flavor_nap.7.a: "Укладімо угоду."
  flavor_nap.7.b: "Якщо вони бажають його продати, це, мабуть, недобре."
  flavor_nap.8.title: "$flavor_nap.6.title$"
  flavor_nap.8.common_desc: "Ми нарешті отримали відповідь від [target_country.GetName]."
  flavor_nap.8.desc_success: "$flavor_nap.8.common_desc$ Нашу урочисту пропозицію зустріли з великим розголосом та радістю в [target_country.GetAdjectiveWithNoTooltip] [target_country.GetGovernment.GetCourtTitle]."
  flavor_nap.8.desc_failure: "$flavor_nap.8.common_desc$ На жаль, вони відхилили наш почесний підхід. Що ще гірше, наших посланців зустріли вибухом безглуздого сміху."
  flavor_nap.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_nap.8.b: "Вони заплатять!"
  flavor_nap.9.title: "[giambattista_della_porta_scope.GetNameWithNoTooltip]"
  flavor_nap.9.desc: "[giambattista_della_porta_scope.GetName] є вправним шляхтичем багатьох талантів. Багато членів нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] вже звернули увагу на [giambattista_della_porta_scope.GetHerHim], пропонуючи залучити [giambattista_della_porta_scope.GetShortNameWithNoTooltip] на службу як одного з наших митців."
  flavor_nap.9.historical_info: "Джамбаттіста делла Порта був вченим другої половини XVI століття, автором неймовірно популярної книги #italic Magia Naturalis#!, де він викладає багато різних фактів з наукового світу. Йому також приписують внесок у криптографію, фізіогноміку та технології. Окрім внеску в науку, він також написав понад 20 п'єс, що належать до традиції #italic commedia erudita#!."
  flavor_nap.9.a: "Найняти [giambattista_della_porta_scope.GetHerHim]!"
  flavor_nap.9.b: "Відкинути ці пропозиції."
  flavor_nap.10.title: "#italic Magia Naturalis#!"
  flavor_nap.10.desc: "Один з наших митців, нещодавно найнятий [target_character.GetName], створив твір великої слави. Книга #italic $magia_naturalis$#! виявилася надзвичайно популярною, її друкують масово, і є плани перекласти її іншими мовами, щоб зробити її більш доступною. Вона поширилася настільки, що пересічний громадянин став більш обізнаним у науках, ніж раніше."
  flavor_nap.10.a: "Воістину, досконалість натурфілософії та найвища наука."
  flavor_nap.11.title: "Прихильники фратічеллі"
  flavor_nap.11.desc: "Сьогодні надійшов ще один лист від [the_pope.GetName], знову благаючи [target_character.GetName] припинити виявляти симпатію до єретиків-фратічеллі. Хоча попередні листи мали змішані результати, можливо, цього разу [ROOT.GetCountry.GetGovernment.GetRulerTitle] змінить свою думку."
  flavor_nap.11.desc_with_felip: "$flavor_nap.11.desc$ В основі конфлікту лежить брат [GetCharacter('nap_sancha_aragon').GetName], [brother_of_queen.GetName], який є палким прихильником фратічеллі."
  flavor_nap.11.historical_info: "Під правлінням короля Роберта Анжуйського, Неаполітанське королівство було безпечним притулком для фратічеллі. Папа направив кілька листів Роберту в 1325, 1327, 1330 та 1331 роках, але всі вони не змогли змусити короля ув'язнити або обмежити свободу фратічеллі в його володіннях. Один з неаполітанських придворних, Філіп Майорканський, відкрито симпатизував духовним францисканцям і навіть відкрито засуджував папство."
  flavor_nap.11.a: "Ігнорувати листи."
  flavor_nap.11.b: "Що б не хотів [the_pope.GetNameWithNoTooltip]."
  nap_banned_fraticelli: "Заборонені фратічеллі"
  STATIC_MODIFIER_NAME_nap_fraticelli_sympathy: "Симпатія до фратічеллі"
  flavor_nap.12.title: "#italic Stato dei Presidi#!"
  flavor_nap.12.desc: "Прибережні смуги землі вздовж узбережжя [target_location.GetName] та [target_location2.GetName] утворюють невеликий, але необхідний компонент нашої гегемонії в [ShowRegionName('italy_region')]. Портові міста та острів Ельба слугують пристойними гаванями, що дозволяють нам контролювати сили північних держав та дозволяють нашим торговцям вести торгівлю далі від батьківщини."
  flavor_nap.12.historical_info: "Під час особистої унії з Іспанією, Неаполь отримав у володіння вузьку смугу землі вздовж решти узбережжя Сієнської республіки, пізніше названу $flavor_nap.12.title$, що означає \"Держава гарнізонів\". Вона залишалася під владою неаполітанців з 1557 до 1801 року, коли була передана Революційній Франції."
  flavor_nap.12.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_nap_state_of_the_presidi: "Держава Президій"
  flavor_nap.200.title: "Воля [target_character.GetNameWithNoTooltip]"
  flavor_nap.200.desc: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] старіє, і, на жаль, усі [target_character.GetHerHis] нащадки чоловічої статі загинули.\n\nТрадиція диктує, що сторона родини [ROOT.GetCountry.GetGovernment.GetHeir.GetName] має бути нашим наступним [ROOT.GetCountry.GetGovernment.GetRulerTitle], але передача країни іноземцю розлютить місцеву знать і може покласти край стабільності, яку [target_character.GetShortName] будував [target_character.GetHerHis] життя. Альтернативно, [alternative_heir.GetName] також може бути можливістю для розгляду..."
  flavor_nap.200.a: "Ми не віддамо [ROOT.GetCountry.GetNameWithNoTooltip], [alternative_heir.GetShortNameWithNoTooltip] буде правити."
  flavor_nap.200.b: "Ми поважатимемо традицію, [ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] успадкує."
  flavor_nap.201.title: "[GetCountry('NAP').GetAdjectiveWithNoTooltip] Закони"
  flavor_nap.201.desc: "Воля [target_character.GetName] викликала велике потрясіння в [GetCountry('NAP').GetLongName], змінивши закон про престолонаслідування. Якщо ми хочемо зберегти наш союз з [GetCountry('NAP').GetNameWithNoTooltip], ми будемо змушені узгодити наші закони з їхніми, що може змусити нас виглядати молодшим партнером в Унії."
  flavor_nap.201.a: "Ми збережемо Союз."
  flavor_nap.201.b: "[ROOT.GetCountry.GetNameWithNoTooltip] не є підлеглим."
  flavor_nap.210.title: "Інший Син Старого Короля"
  flavor_nap.210.desc: "[ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName] не мав жодних нащадків чоловічої статі по своїй лінії, але мав сина, байстрюка, який не мав права на спадкування [ROOT.GetCountry.GetName].\n\nЙого виховували як королівського байстрюка та навчали дипломатії й державному управлінню, і він став одним із найвидатніших членів [ROOT.GetCountry.GetAdjectiveWithNoTooltip] двору."
  flavor_nap.210.a: "Ми можемо скористатися його навичками."
  flavor_nap.210.b: "Ми не підемо слідами Старого Короля, звільніть його!"
  flavor_nap.220.title: "Корона Чоловіка"
  flavor_nap.220.desc: "[target_character.GetName] не задоволений [target_character.GetHerHis] становищем при [ROOT.GetCountry.GetAdjective] дворі, [target_character.GetHeShe] є [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetConsortTitle], але воля Старого [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName] надає повну владу [ROOT.GetCountry.GetGovernment.GetRulerTitle], залишаючи [target_character.GetHerHim] лише номінальною фігурою.\n\n[target_character.GetShortName] бажає просити [GetCountry('PAP').GetGovernment.GetRuler.GetName] про папський дозвіл, який виправить цю серйозну помилку та зробить [target_character.GetHerHis] титул рівним титулу [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip]."
  flavor_nap.220.a: "[target_character.GetHeShe|U] має рацію скаржитися, [target_character.GetHeShe] та [ROOT.GetCountry.GetGovernment.GetRulerTitle] є рівними."
  flavor_nap.220.a.tt: "Якщо [GetCountry('PAP').GetGovernment.GetRuler.GetName] схвалить це, [target_character.GetShortName] стане нашим правителем."
  flavor_nap.220.b: "[target_character.GetHeShe|U] є лише [ROOT.GetCountry.GetGovernment.GetConsortTitle] для [ROOT.GetCountry.GetGovernment.GetRulerTitle] і нічим більше!"
  flavor_nap.220.b.tt: "[target_character.GetShortName] запам'ятає цю образу."
  flavor_nap.221.title: "Безсилий Король"
  flavor_nap.221.desc: "Молодий правитель [GetCountry('NAP').GetName], [nap_ruler.GetName], бажає повідомити нам про невизначене становище [nap_ruler.GetHerHis] консорта [nap_consort.GetName] при [GetCountry('NAP').GetAdjectiveWithNoTooltip] дворі. Воля попереднього [GetCountry('NAP').GetGovernment.GetPreviousRuler.GetName] позбавляє [nap_consort.GetHimHer] влади Корони [GetCountry('NAP').GetNameWithNoTooltip], яка традиційно мала б бути надана [nap_consort.GetHimHer], і він просить нас надати [nap_consort.GetShortName] повний титул Короля.\n\nЗ іншого боку, ми повинні взяти до уваги, що [nap_consort.GetShortNameWithNoTooltip] є частиною [GetCountry('HUN').GetAdjective] королівської родини, і надання їм більшої влади на нашому південному кордоні може переслідувати нас у майбутньому."
  flavor_nap.221.a: "Ми не дозволимо [GetCountry('HUN').GetAdjectiveWithNoTooltip] правителям розширювати свій вплив."
  flavor_nap.221.b: "Це [nap_consort.GetShortNameWithNoTooltip] Богом дане право правити [GetCountry('NAP').GetNameWithNoTooltip]."
  flavor_nap.222.title: "Кривда Виправлена"
  flavor_nap.222.desc: "[pope_scope.GetRuler.GetName] побачив праведність нашого благання і виявив милосердя, щоб задовольнити його. [ROOT.GetCountry.GetGovernment.GetRuler.GetFirstSpouse.GetName] отримає свої права повністю відновленими та буде коронований Королем [ROOT.GetCountry.GetName]."
  flavor_nap.222.a: "Хай живе Король!"
  flavor_nap.223.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] Відхиляє Наше Прохання"
  flavor_nap.223.desc: "Посланець з [pope_scope.GetName] повертає нам наш дар і повідомляє нас, що [GetCountry('PAP').GetGovernment.GetRuler.GetHisHerFormal|U] відхилив наше прохання, воля Старого Короля має бути поважана."
  flavor_nap.223.a: "Прокляття!"
  flavor_nap.230.title: "[GetCountry('NAP').GetAdjectiveWithNoTooltip] Принц-Консорт"
  flavor_nap.230.desc: "[GetCountry('NAP').GetAdjective] Принц-Консорт [target_character.GetName], член нашої [ROOT.GetCountry.GetGovernment.GetAdjective] Родини, багато років жив при [GetCountry('NAP').GetAdjectiveWithNoTooltip] дворі, одружений з [GetCountry('NAP').GetGovernment.GetRuler.GetName], але всупереч будь-якому почуттю справедливості чи логіки його право правити як чоловік і як Король було відмовлено, і він не має влади над державними справами.\n\nВін люб'язно просить нас заступитися за нього перед [target_pope.GetName], щоб відновити свої права як Короля [GetCountry('NAP').GetNameWithNoTooltip]."
  flavor_nap.230.a: "Давайте попросимо [target_pope.GetNameWithNoTooltip] виправити цю несправедливість."
  flavor_nap.230.a.tt: "Якщо [target_pope.GetName] схвалить це, [target_character.GetName] стане новим [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] [GetCountry('NAP').GetName]"
  flavor_nap.230.b: "Ми не втручатимемося у справи [GetCountry('NAP').GetNameWithNoTooltip]."
  flavor_nap.231.title: "Родина безсилого короля"
  flavor_nap.231.desc: "Ситуація [GetCountry('NAP').GetAdjective] принца-консорта [prince_consort.GetName] доведена до нашого відома його близьким родичем [GetCountry('HUN').GetGovernment.GetRuler.GetName] з [GetCountry('HUN').GetName].\n\nЙого [GetCountry('HUN').GetGovernment.GetRuler.GetHisHer] родич продовжує терпіти приниження, не маючи реальної влади в [GetCountry('NAP').GetNameWithNoTooltip], хоча він і є законним королем, оскільки двір і знать керуються виключно [GetCountry('NAP').GetGovernment.GetRuler.GetName].\n\n[GetCountry('HUN').GetGovernment.GetRuler.GetNameWithNoTooltip] просить нас покласти край цій несправедливій ситуації та коронувати [prince_consort.GetNameWithNoTooltip]."
  flavor_nap.231.a: "Ця ситуація не може тривати. [prince_consort.GetShortNameWithNoTooltip] буде королем."
  flavor_nap.231.b: "Ми не дозволимо [GetCountry('HUN').GetGovernment.GetRuler.GetShortNameWithNoTooltip] втручатися у справи інших."
  flavor_nap.232.title: "[GetCountry('HUN').GetAdjectiveWithNoTooltip] король [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_nap.232.desc: "Чорні вісті! Принц-консорт [prince_consort.GetName] змовився зі своїм близьким родичем [GetCountry('HUN').GetGovernment.GetRuler.GetName], і разом вони підкупили [GetCountry('PAP').GetGovernment.GetRuler.GetName], просячи його коронувати [prince_consort.GetShortNameWithNoTooltip] королем [GetCountry('NAP').GetName]. Засліплений монетами, [GetCountry('PAP').GetGovernment.GetRuler.GetShortNameWithNoTooltip] погодився і вже оголосив дату коронації.\n\nЦе розлютило [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які відмовляються бути керованими іноземцем. Наші шпигуни виявили, що фракція цих розгніваних членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] формує змову та збирає ресурси, щоб убити [prince_consort.GetNameWithNoTooltip] до того, як відбудеться коронація.\n\nЩо нам робити?"
  flavor_nap.232.a: "[prince_consort.GetNameWithNoTooltip] змусив нас. Нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] діє."
  flavor_nap.232.b: "Якщо [GetCountry('PAP').GetGovernment.GetRuler.GetShortNameWithNoTooltip] вважає, що [prince_consort.GetShortNameWithNoTooltip] має бути королем, нехай так і буде!"
  flavor_nap.233.title: "[GetCountry('HUN').GetAdjectiveWithNoTooltip] втручання"
  flavor_nap.233.desc: "Наші інформатори приносять нам звістки про невдачу [GetCountry('HUN').GetAdjective] правителя [GetCountry('HUN').GetGovernment.GetRuler.GetName] схилити [GetCountry('PAP').GetGovernment.GetRuler.GetName] до коронації [prince_consort.GetName] повним королем [ROOT.GetCountry.GetName]. Наш зрадницький принц-консорт змовився зі своїм [GetCountry('HUN').GetAdjectiveWithNoTooltip] близьким родичем, і разом вони намагалися підкупити [GetCountry('PAP').GetGovernment.GetRuler.GetShortNameWithNoTooltip], але їхній план був марним, оскільки наш [GetCountry('PAP').GetGovernment.GetRulerTitle] занадто побожний, щоб піддатися таким спокусам, і відхилив їх."
  flavor_nap.233.a: "Боже, благослови [GetCountry('PAP').GetGovernment.GetRuler.GetNameWithNoTooltip]!"
  flavor_nap.234.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] відхиляє наш запит"
  flavor_nap.234.desc: "[GetCountry('PAP').GetGovernment.GetRulerTitle] відхилив щире прохання, яке ми зробили на підтримку [prince_consort.GetName], законного короля [GetCountry('NAP').GetName]. Йому байдуже, чи триватиме ця несправедливість і залишиться безкарною, тому він не залишає нам іншого вибору, окрім як розібратися з цим питанням самим. Чи вчинимо ми так само і заплющимо очі, чи будемо діяти, щоб виправити це?"
  flavor_nap.234.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_nap.240.title: "Правитель [target_location.GetNameWithNoTooltip]"
  flavor_nap.240.desc: "Місто [target_location.GetName] та його околиці перебували під владою [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName] з часів [charles_lame.GetName]. У 1309 році [GetCharacter('pap_clement_v').GetName] обрав його новою резиденцією [GetCountry('PAP').GetLongName], і король [ROOT.GetCountry.GetNameWithNoTooltip] милостиво дозволив це, перетворивши [target_location.GetNameWithNoTooltip] на нову столицю [GetCountry('PAP').GetNameWithNoTooltip] у всіх сенсах, окрім юридичного.\n\nТепер ситуація змінилася, ми могли б скористатися кількома скринями золота, а [GetCountry('PAP').GetGovernment.GetRuler.GetName] має його вдосталь, тож продаймо [GetCountry('PAP').GetGovernment.GetRuler.GetHimHer] права на місто, яке [GetCountry('PAP').GetGovernment.GetRuler.GetHeShe] вже контролює."
  flavor_nap.240.a: "Нам потрібне золото. Продаймо права!"
  flavor_nap.240.a.tt: "Якщо [GetCountry('PAP').GetGovernment.GetRuler.GetName] схвалить це, [target_location.GetName] більше не буде частиною наших [Concept('core', 'CONCEPT_PLACEHOLDER')|e] територій"
  flavor_nap.240.b: "Ми ніколи не відмовимося від наших прав!"
  flavor_nap.241.title: "Пропозиція щодо [target_location.GetNameWithNoTooltip]"
  flavor_nap.241.desc: "Місто [target_location.GetName] було резиденцією [ROOT.GetCountry.GetLongName] з того часу, як у 1309 році [old_pope_scope.GetName] обрав його на заміну [rome_location.GetName]. Воно повністю контролюється [ROOT.GetCountry.GetLongNameWithNoTooltip], але [GetCountry('NAP').GetGovernment.GetRulerTitle] [GetCountry('NAP').GetName] зберігає номінальне право керувати ним. Сьогодні прибув посланець з [GetCountry('NAP').GetNameWithNoTooltip], пропонуючи нам викупити це право за звичайне золото.\n\nЧи варто нам приймати цю угоду?"
  flavor_nap.241.a: "Так, ми приймемо це."
  flavor_nap.241.b: "Ні, ми не будемо платити за те, що вже є в нашому володінні."
  flavor_nap.242.title: "[GetCountry('PAP').GetAdjectiveWithNoTooltip] Місто"
  flavor_nap.242.desc: "[GetCountry('PAP').GetGovernment.GetRuler.GetName] прийняв нашу пропозицію продати місто [target_location.GetName], платіж вже в дорозі."
  flavor_nap.242.a: "Ці кошти допоможуть [ROOT.GetCountry.GetNameWithNoTooltip] більше, ніж якісь марні права."
  flavor_nap.243.title: "Вкрадене Місто"
  flavor_nap.243.desc: "[pope_scope.GetName] відхилив нашу щедру пропозицію і планує продовжувати контролювати місто [target_location.GetName] без будь-якого права на це."
  flavor_nap.243.a: "Будь проклятий злодійський [GetCountry('PAP').GetGovernment.GetRulerTitle]!"
  flavor_nap.250.title: "Суд над [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_nap.250.desc: "Вбивство [prince_consort.GetName] переслідує нас роками. Його родина не припиняє поширювати мерзенні чутки про зв'язок нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] зі змовниками та звинувачувати нас у його вбивстві, навіть якщо винуватців вже було знайдено, засуджено та покарано.\n\nВони переконали [GetCountry('PAP').GetGovernment.GetRuler.GetName] провести ще один суд і змусити [ROOT.GetCountry.GetGovernment.GetRuler.GetName] постати перед судом та захистити [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] невинність.\n\nНавіть якщо наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] має міцне алібі, а [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] виправдання майже гарантоване, ганьба від суду за змову на вбивство більш ніж достатня, щоб зіпсувати наші стосунки з підданими та зруйнувати наш престиж серед сусідів.\n\nЩо нам робити?"
  flavor_nap.250.a: "Справедливість на нашому боці. Ми підемо до суду і захистимо нашу невинність."
  flavor_nap.250.a.tt: "[GetCountry('NAP').GetGovernment.GetRuler.GetName] виправданий"
  flavor_nap.250.b: "Ми не будемо брати участь у цьому фарсі!"
  flavor_nap.250.c: "Репутація понад усе. [ROOT.GetCountry.GetGovernment.GetRulerTitle] зречеться престолу і прийме обітниці."
  flavor_nap.260.title: "[luigi_durazzo.GetNameWithNoTooltip], Колючка в Нашому Боці"
  flavor_nap.260.desc: "[luigi_durazzo.GetName] є членом [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ShowAreaName('apulia_area')], який з моменту свого звільнення з ув'язнення був постійною неприємністю для [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Він протистоїть [targer_character.GetName] у кожній справі і постійно намагається підірвати [ROOT.GetCountry.GetGovernment.GetAdjective] владу в [ShowAreaNameWithNoTooltip('apulia_area')].\n\nВін знову погрожує підняти повстання, якщо ми не надамо йому та його союзникам більшої автономії та не поважатимемо деякі права, які, як вони стверджують, належать лише їм.\n\nЩо нам робити?"
  flavor_nap.260.a: "Ми розчавимо його і покінчимо з цим раз і назавжди!"
  flavor_nap.260.b: "Даймо йому те, що він хоче. Поки що."
  flavor_nap.270.title: "Благочестивий [elzear_sabran.GetNameWithNoTooltip]"
  flavor_nap.270.desc: "Наш єпископ нагадує нам історію [elzear_sabran.GetName], наставника та кастеляна [carlo_anjou.GetName]. Він прожив зразкове благочестиве життя, зосереджуючись на молитві, умертвінні плоті та милосерді до бідних. Він виконав свій обов'язок перед своїм домом, одружившись з Дельфіною Гландевською, і навіть вирішив приєднатися до неї в її обітниці цнотливості, яку вони дотримувалися все життя."
  flavor_nap.270.a: "Запропонуймо його Курії як нового [GetCountry('NAP').GetAdjectiveWithNoTooltip] Святого."
  flavor_nap.270.b: "Ми не будемо витрачати час на ці казки."
  flavor_nap.280.title: "Дві Сицилії Возз'єднані!"
  flavor_nap.280.desc: "Народ радіє! Обидві Сицилії знову об'єднані під владою нашого великого [GetCountry('TWS').GetGovernment.GetRulerOrRegent.GetName].\n\nЗ часів Війни Сицилійської Вечірні королівство, створене Рожером II, було розділене, і ті, хто колись були братами, з часом перетворилися на чужинців, суперників і ворогів. Завдяки нашому [GetCountry('TWS').GetGovernment.GetRulerOrRegentTitle], той темний час закінчився, і ми знову можемо приєднатися до наших давно втрачених родичів як єдиний народ."
  flavor_nap.280.a: "Відновимо стародавню столицю Королівства!"
  flavor_nap.280.b: "Нова епоха вимагає нової столиці!"
  flavor_nap.280.c: "Союз нашого народу відгукнеться в історії."
  flavor_nap.290.title: "Ображений принц-консорт"
  flavor_nap.290.desc: "[prince_consort.GetName] продовжує обурюватися тим, що його титул не дає йому реальної влади при [GetCountry('NAP').GetAdjective] дворі. Його постійні спроби здобути вплив через змови та брехню є постійним відволіканням та занепокоєнням для членів двору."
  flavor_nap.290.a: "Цього досить! Ми покінчимо з цим тихо."
  flavor_nap.290.b: "Даймо йому те, чого він бажає."
  flavor_nap.290.c: "Він принц-консорт, нічого не вдієш."
  flavor_nap.300.title: "Воля нового [GetCountry('NAP').GetGovernment.GetRulerTitle]"
  flavor_nap.300.desc: "Наша дорога [GetCountry('NAP').GetGovernment.GetRuler.GetName] відчуває тягар довгих років служби [GetCountry('NAP').GetName] на своїх плечах так само, як і її дід, старий [old_king.GetName], вона готова відійти від справ, але боїться, що її спадщина може бути втрачена, оскільки у неї немає живих дітей, яких можна було б призначити беззаперечним спадкоємцем престолу. Вона бачить решту своєї родини як опортуністів і стерв'ятників, які знищать [GetCountry('NAP').GetNameWithNoTooltip] у своїй боротьбі за корону."
  flavor_nap.300.a: "[GetCountry('NAP').GetGovernment.GetHeir.GetNameWithNoTooltip] буде нашим новим правителем."
  flavor_nap.300.b: "[queen_sister_spouse.GetNameWithNoTooltip] є найкращим можливим наступником."
  flavor_nap.300.c: "Дві Сицилії будуть возз'єднані, [palermo_ruler.GetNameWithNoTooltip] успадкує нас."
  flavor_nap.300.d: "[french_ruler.GetName] з [GetCountry('FRA').GetNameWithNoTooltip] правитиме [GetCountry('NAP').GetNameWithNoTooltip]."
  flavor_nap.301.title: "[GetCountry('NAP').GetAdjectiveWithNoTooltip] Рішення"
  flavor_nap.301.desc: "[GetCountry('NAP').GetLongName] має нового правителя, і оскільки ми раніше були об'єднані особистою унією, якщо ми хочемо її зберегти, нам потрібно буде запросити [naples_ruler.GetName] також правити [ROOT.GetCountry.GetName]. Це може забезпечити унію, але також може змусити нас виглядати молодшим партнером."
  flavor_nap.301.a: "Ми й надалі ділитимемо долі."
  flavor_nap.301.b: "Настав час йти своїм шляхом."
  flavor_nap.2.title: "Зречення [GetCountry('NAP').GetGovernment.GetPreviousRuler.GetNameWithNoTooltip]"
  flavor_nap.2.desc: "Правитель [GetCountry('NAP').GetName], [GetCountry('NAP').GetGovernment.GetPreviousRuler.GetName], дуже постарів, але не має нащадка, якого можна було б назвати спадкоємцем. Оскільки ми маємо претензії на трон, нам запропонували Корону Неаполя."
  flavor_nap.2.a: "Слава [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_nap.101.title: "Знищення Амальфі"
  flavor_nap.101.desc: "Амальфі, місто в [target_location.GetName], щойно зазнало катастрофічного удару з океану. Спричинена потужним землетрусом під Тірренським морем, колосальна стіна води обрушилася на нічого не підозрююче місто. Серед оглушливого реву руйнувалися будівлі, кидало кораблі, гинули життя. Мальовничі вулиці перетворилися на водяний цвинтар, оскільки води назавжди змінили ландшафт. Жвава морська культура та жвава торгівля Амальфі залишилися в руїнах, що є яскравим нагадуванням про невблаганну силу природи. Шрами катастрофи [GetCurrentYear] назавжди відлунюватимуть в історії міста."
  flavor_nap.101.a: "[ROOT.GetCountry.GetReligion.GetGodName] змилуйся над ними."
  flavor_nap.101.b: "Надішліть допомогу тим, хто вижив, негайно!"
  flavor_nap.101.a.tt: "[target_location.GetName] та сусідні прибережні [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втратять [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] постраждають від цунамі"
  flavor_nap.101.b.tt: "[target_location.GetName] та сусідні прибережні [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] втратять [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], втратять [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] постраждають від цунамі.\nОскільки ми інвестуємо гроші, руйнування будуть меншими, оскільки ми швидше розпочнемо відновлення"
  flavor_nap_treaty_villeneuve_common: "[GetCountry('PAP').GetGovernment.GetRulerTitle] прагне виступити посередником у врегулюванні, яке забезпечить мир і стабільність у регіоні.\n\nЗапропонований договір розмежує території, визнаючи контроль [GetCountry('NAP').GetNameWithNoTooltip] над материком та контроль [GetCountry('SIC').GetNameWithNoTooltip] над островом. Умови включатимуть щорічні виплати данини від [GetCountry('SIC').GetNameWithNoTooltip], надання військових галер [GetCountry('NAP').GetNameWithNoTooltip] та військову підтримку від [GetCountry('SIC').GetNameWithNoTooltip] для [target_ruler.GetNameWithNoTooltip]'s [ROOT.GetCountry.GetFlavorRank]. [GetCountry('PAP').GetGovernment.GetRulerTitle] прагне створити єдине Королівство Сицилія під сюзеренітетом [GetCountry('NAP').GetNameWithNoTooltip] та [GetCountry('PAP').GetLongName], забезпечуючи співпрацю та уникаючи подальших конфліктів."
  flavor_nap.102.title: "Вільневський договір"
  flavor_nap.102.desc: "Представник [target_pope.GetName] звертається до [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName], [target_ruler.GetName], пропонуючи договір для врегулювання поточного спору з [GetCountry('SIC').GetLongName], яким править [target_sicily_ruler.GetName]. $flavor_nap_treaty_villeneuve_common$"
  flavor_nap.102.a: "[target_sicily_ruler.GetNameWithNoTooltip] може правити [GetCountry('SIC').GetNameWithNoTooltip], якщо [target_sicily_ruler.GetSheHe] віддасть шану."
  flavor_nap.102.a.tt1: "[GetCountry('SIC').GetName] отримає подію, щоб підкоритися нам. Вони вирішать, чи платитимуть нам щорічну данину, чи стануть васалом."
  flavor_nap.102.a.tt2: "Ми втратимо всі наші [Concept('cores', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('sicily_area')]."
  flavor_nap.102.b: "Ніколи. [ShowAreaNameWithNoTooltip('sicily_area')] наше!"
  flavor_nap.103.title: "$flavor_nap.102.title$"
  flavor_nap.103.desc: "Представник [target_pope.GetName] звертається до [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName], [target_sicily_ruler.GetName], пропонуючи договір для врегулювання поточного спору з [GetCountry('NAP').GetLongName], яким править [target_ruler.GetName]. $flavor_nap_treaty_villeneuve_common$"
  flavor_nap.103.a: "Ми підкоримося [GetCountry('NAP').GetLongNameWithNoTooltip]. Поки що."
  flavor_nap.103.b: "Сицилії знову будуть об'єднані."
  flavor_nap.103.c: "Вони програли війну. Вони нічого не отримують."
  flavor_nap.103.tt1: "[GetCountry('NAP').GetName] отримає нашу відповідь."
  flavor_nap.103.tt2: "[GetCountry('ARA').GetName] отримає нашу відповідь і може спробувати нав'язати нам [Concept('union', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_nap.104.title: "$flavor_nap.102.title$"
  flavor_nap.104.desc: "[GetCountry('SIC').GetGovernment.GetRuler.GetName] з [GetCountry('SIC').GetLongName] став васалом [GetCountry('NAP').GetLongName] за посередництва [GetCountry('PAP').GetGovernment.GetRuler.GetName]. Оскільки [GetCountry('SIC').GetLongNameWithNoTooltip] належала нашій родині з тих пір, як [GetCharacter('ara_pere_iii_arago').GetName] з [GetCountry('ARA').GetName] завоював острів, ми повинні щось зробити, інакше вона знову стане [GetCountry('NAP').GetCulture.GetName]."
  flavor_nap.104.a: "[GetCountry('SIC').GetNameWithNoTooltip] знову буде нашою."
  flavor_nap.104.b: "Як є, так є."
  flavor_nap.105.title: "[GetCountry('SIC').GetNameWithNoTooltip] стає васалом"
  flavor_nap.105.desc: "[GetCountry('SIC').GetGovernment.GetRuler.GetName] з [GetCountry('SIC').GetLongName] погодився стати підданим [GetCountry('NAP').GetLongName]."
  flavor_nap.105.a: "Вітаємо їх."
  flavor_nap.106.title: "[GetCountry('SIC').GetNameWithNoTooltip] погоджується віддати шану."
  flavor_nap.106.desc: "[GetCountry('SIC').GetGovernment.GetRuler.GetName] з [GetCountry('SIC').GetLongName] погодився віддати нам шану."
  flavor_nap.106.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_nap.107.title: "[GetCountry('SIC').GetNameWithNoTooltip] денонсує договір."
  flavor_nap.107.desc: "[GetCountry('SIC').GetGovernment.GetRuler.GetName] з [GetCountry('SIC').GetLongName] не підписав договір."
  flavor_nap.107.a: "[GetCountry('SIC').GetNameWithNoTooltip] знову в меню."
  flavor_nap.108.title: "Щорічна данина [GetCountry('NAP').GetLongNameWithNoTooltip]."
  flavor_nap.108.desc: "Як і кожного свята Петра і Павла, ми повинні надіслати нашу данину [GetCountry('NAP').GetLongName]."
  flavor_nap.108.a: "Ми сплатимо нашу данину, як і обіцяли."
  flavor_nap.108.b: "Час підкорення минув."
  flavor_nap.109.title: "[ShowBuildingTypeNameWithNoTooltip('library')] Анжуйських королів"
  flavor_nap.109.desc: "Відколи [ShowBuildingTypeName('library')] було засновано [charles_i.GetName], кожен анжуйський правитель на троні [GetCountry('NAP').GetLongName] присвячував ресурси для розширення колекції, що зберігалася в ній. Вченим з усього королівства та з-за кордону платили за переклад давньогрецьких та римських текстів."
  flavor_nap.109.a: "Незалежно від того, хто править, [ShowBuildingTypeNameWithNoTooltip('library')] ніколи не повинна припиняти зростати."
  flavor_nap.109.b: "Ми наймемо більше людей, щоб зробити нашу колекцію ще більш вражаючою."
  flavor_nap.109.c: "Мертві люди нічого не можуть нас навчити."
  flavor_nap.110.title: "Велика Курія Вікарія"
  flavor_nap.110.desc: "Велика Курія Вікарія, що виникла внаслідок злиття нормандської #italic Magna Curia#! та Курії Вікарія, заснованої [target_character.GetName], діє як суд для цивільних та кримінальних справ у [GetCountry('NAP').GetLongName].\n\nОстаннім часом до нас дійшли новини про деякі сутички в [target_location.GetName] між членами [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та деякими членами [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які вирішуються у Великій Курії. Можливо, нам слід вплинути на суд, щоб вирішити це якомога швидше."
  flavor_nap.110.a: "Стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_nap.110.b: "Стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_nap.110.c: "Спробувати досягти компромісу."
  flavor_nap.111.title: "Базиліка Санта-К'яра"
  flavor_nap.111.desc: "Один з найбільших монастирських комплексів міста [target_location.GetName], роботи над Базилікою Санта-К'яра розпочалися в 1310 році і були завершені в 1328 році. Побудована в провансальському готичному стилі, вона була замовлена [GetCharacter('nap_robert_i_anjou').GetName] та його дружиною, [GetCharacter('nap_sancha_aragon').GetName].\n\nНаш [ROOT.GetCountry.GetGovernment.GetRulerTitle] повинен вирішити, чи бажає [target_character.GetHeShe] бути похованим там, чи ні."
  flavor_nap.111.a: "Відтепер це буде місце спочинку для нашої династії."
  flavor_nap.111.b: "Натомість збудувати статую, присвячену Папі."
  flavor_nap.112.title: "Салернська медична школа"
  flavor_nap.112.desc: "Салернська медична школа, перша у своєму роді, вже не та, що була раніше. Те, що колись було еталоном для вчених усього світу, тепер втратило свою значущість на користь інших установ і майже впало в забуття. А разом з нею і майбутні покоління навчених медиків, які могли б врятувати сотні життів. Можливо, нам слід виділити ресурси, щоб відновити її."
  flavor_nap.112.a: "Будь-якою ціною відбудувати її."
  flavor_nap.112.b: "Вона все одно занепадала, просто залиште її як є."
  flavor_nap.113.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Палац [ShowLocationNameWithNoTooltip('caserta')]"
  flavor_nap.113.desc: "Архітектор [target_character.GetName] представляє проєкт великого палацу для [targer_ruler.GetName], який буде розташований на околицях [ShowLocationName('caserta')]. Хоча проєкт буде надзвичайно дорогим, він також стане найбільшим палацом у всій [ShowContinentName('europe')], зробивши наш [ROOT.GetCountry.GetFlavorRank] предметом заздрості всіх дворів."
  flavor_nap.113.a: "Збудувати."
  flavor_nap.113.b: "Нам не потрібен ще один палац."
  flavor_nap.114.title: "La Pudizia (Скромність)"
  flavor_nap.114.desc: "У [GetCurrentYear] році завершено #italic La Pudizia #!, майстерну скульптуру в стилі рококо, що прикрашає каплицю Сансеверо. Автор, [target_artist.GetName], з незрівнянною майстерністю вирізьбив у мармурі матір князя Сансеверо."
  flavor_nap.114.a: "Яке прекрасне видовище!"
  flavor_nap.115.title: "Експеримент Сан-Леучо"
  flavor_nap.115.desc: "У [GetCurrentYear] році [target_character.GetName] обрав Сан-Леучо, колишній королівський мисливський будиночок у [target_location.GetName], для інноваційного соціального та технологічного експерименту. Курорт Сан-Леучо стане центром розваг, полювання та виробництва [ShowGoodsName('silk')], з промисловими будівлями, робітничим селищем та передовими технологіями."
  flavor_nap.115.a: "[ShowGoodsName('silk')|U] найвищої якості буде вироблятися тут."
  flavor_nap.116.title: "Accademia Pontaniana тішить світ"
  flavor_nap.116.desc: "Accademia Pontaniana, спочатку відома як Accademia Antoniana, слугує вченим товариством для науковців та гуманістів, звідки народжуються знання, що збагачують нашу націю."
  flavor_nap.116.a: "Використаймо ці знання, щоб далі пізнавати таємниці світу."
  flavor_nap.116.b: "Ця академія та її мудрі члени змусять усіх дивитися на нас із благоговінням."
  flavor_nap.117.title: "[ShowCultureNameWithNoTooltip('albanian')] біженці"
  flavor_nap.117.desc: "Перед обличчям релігійного конфлікту, [ShowReligionAdjective('catholic')] [ShowCultureName('albanian')] біженці, керовані страхом і відчаєм, вирушають у небезпечну міграцію, тікаючи від наступаючих [ShowReligionAdjective('muslim')] армій. Їхні життя висять на волосині, коли вони долають підступні шляхи, шукаючи притулку та безпеки, з тягарем невизначеності, глибоко викарбуваним на їхніх душах."
  flavor_nap.117.a: "Наші брати по вірі завжди бажані."
  flavor_nap.117.b: "Їм доведеться шукати інше місце для втечі."
  flavor_nap.118.title: "[ShowCultureNameWithNoTooltip('croatian')] біженці"
  flavor_nap.118.desc: "У драматичній боротьбі за виживання [ShowCultureName('croatian')] біженці в муках тікають від невпинного натиску [ShowReligionAdjective('muslim')] загарбників. З важкими серцями та випробуваними духами вони прибувають до наших берегів, відчайдушно шукаючи притулку та проблиску надії серед хаосу, що охопив їхню батьківщину."
  flavor_nap.118.a: "Вони можуть залишатися з нами стільки, скільки забажають."
  flavor_nap.118.b: "На жаль, ми не можемо прийняти їх на наших землях."
  flavor_nap.119.title: "[target_robert.GetNameWithNoTooltip] та [target_petrarca.GetNameWithNoTooltip]"
  flavor_nap.119.desc: "Зі смертю [target_robert.GetName] [GetCountry('NAP').GetLongName] плаче в горі, оскільки звістка про смерть короля поширюється, як скорботний шепіт, її дворами. Зали відлунюють колективним болем, бо мудрий і доброзичливий правитель покинув світ, залишивши по собі царство, оповите меланхолією."
  flavor_nap.119.a: "Приведіть [target_petrarca.GetNameWithNoTooltip], відомого філософа, на його похорон."
  flavor_nap.119.b: "У нас є важливіші справи."
  flavor_nap.119.tt: "[GetCountry('PAP').GetLongName] отримає нашу петицію. Якщо ми досягнемо згоди, [target_petrarca.GetName] приєднається до нашого [Concept('court', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_nap.120.title: "[target_petrarca.GetNameWithNoTooltip] потрібен [GetCountry('NAP').GetNameWithNoTooltip]"
  flavor_nap.120.desc: "Серед скорботної нації [GetCountry('NAP').GetLongName] виникає урочисте прохання, що закликає країну надати [target_petrarca.GetName] честь допомогти в похованні [target_robert.GetName]. Визнаючи його глибоке захоплення монархом та його поетичну майстерність, вони прагнуть поєднати красномовство [target_petrarca.GetNameWithNoTooltip] з їхньою жалобою, забезпечуючи прощання, гідне королівської душі. Таким чином, країна прагне до єднання пера [target_petrarca.GetNameWithNoTooltip] та урочистості прощання з монархом."
  flavor_nap.120.a: "Відпустіть його."
  flavor_nap.120.b: "Він потрібен нам тут."
  flavor_nap.1201.title: "[target_petrarca.GetNameWithNoTooltip] прибуває"
  flavor_nap.1201.desc: "Великий [target_petrarca.GetName] прибув і приєднався до нашого двору, як ми й просили, щоб він міг оплакати смерть [target_robert.GetName]."
  flavor_nap.1201.a: "Ласкаво просимо, друже."
  flavor_nap.1202.title: "[target_petrarca.GetNameWithNoTooltip] не прийде"
  flavor_nap.1202.desc: "Незважаючи на наше прохання, [target_petrarca.GetName] не відвідає похорони на честь [target_robert.GetName]."
  flavor_nap.1202.a: "Ми будемо сумувати без нього."
  flavor_nap.121.title: "Борг родини [target_character.GetNameWithNoTooltip]"
  flavor_nap.121.desc: "З важким серцем і обтяженим духом [target_character.GetName], дуже талановитий художник нашого двору, був змушений раптово покинути свою улюблену [ROOT.GetCountry.GetName] і вирушити до [GetCountry('FLO').GetName]. Борги його батька кидають тінь фінансових негараздів, змушуючи його відмовитися від звичних обіймів дому та вирушити в невизначену подорож, де його перо слугує гірко-солодким супутником."
  flavor_nap.121.a: "$common_string_what_can_we_do$"
  flavor_nap.121.b: "Ми сплатимо борг, щоб він залишився з нами."
  flavor_nap.400.title: "Важке оподаткування"
  flavor_nap.400.desc: "Недавні війни значно виснажили нашу скарбницю. Щоб протидіяти економічному колапсу та зниженню рівня життя наших найважливіших соціальних верств, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], нам потрібно діяти швидко та запровадити додаткові податки на [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які, очевидно, недостатньо обробляли свої поля."
  flavor_nap.400.historical_info: "Повстання Томмазо Аньєлло 1647 року було короткочасним, хоча й успішним повстанням простолюдинів проти правління зневаженого герцога Аркоса. Повстання призвело до встановлення недовговічної Неаполітанської республіки."
  flavor_nap.400.a: "Так, оподаткуйте [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  flavor_nap.400.b: "Можливо, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] також слід обробляти поля?"
  STATIC_MODIFIER_NAME_nap_heavy_taxation: "Важке оподаткування селян"
  STATIC_MODIFIER_NAME_nap_insufficient_funds: "Недостатньо коштів"
  nap_every_peasant_pop_loses_5_satisfaction: "Кожен [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_nap.401.title: "Народне повстання в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_nap_masaniello: "Повстання Мазаньєлло"
  flavor_nap.401.desc: "Ситі по горло жорстокою податковою політикою [ROOT.GetCountry.GetFlavorRank] та її тиранічним правлінням, населення [ROOT.GetCountry.GetName] масово повстало під проводом дуже харизматичного, але неписьменного рибалки на ім'я [masaniello_scope.GetName], який раніше був відомий лише своїми подвигами в ухиленні від податків. Така непопулярність [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle], що повстання поширилося на значну частину сільської місцевості, загрожуючи переповнити наші армії своєю чисельністю."
  flavor_nap.401.historical_info: "$flavor_nap.400.historical_info$"
  flavor_nap.401.a: "Придушити селян силою!"
  flavor_nap.401.a.tt1: "Кожен [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] не [ROOT.GetCountry.GetCulture.GetName] культури в [ShowRegionName('italy_region')] втрачає [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднується до [rebel_target.GetName]."
  flavor_nap.401.a.tt2: "5 [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з найменшим [Concept('control', 'CONCEPT_PLACEHOLDER')|e] матимуть свої [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднаються до [rebel_target.GetName]."
  flavor_nap.401.b: "Ми досягнемо угоди."
  flavor_nap.402.title: "Нова Республіка"
  flavor_nap.402.desc: "[root_naples.GetAdjective] придушення селянського повстання [GetCharacter('nap_masaniello').GetName] лише призвело до подальших розбіжностей. Громадяни [republic_of_naples_capital.GetName] вийшли на вулиці, вигнали наш гарнізон і проголосили створення нової держави. Час покаже, чи призведе це повстання до чогось значного."
  flavor_nap.402.historical_info: "Світліша Республіка Неаполя була короткочасною державою, що існувала кілька місяців між 1647 і 1648 роками. Вона була стилізована під Венеційський уряд, перейнявши від нього своє прізвисько та титул правителя, водночас маючи монархічний аспект."
  flavor_nap.402.a: "Ми розчавимо їх, як вигнанців, якими вони є."
  flavor_nap.402.b: "Геть [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip]!"
  STATIC_MODIFIER_NAME_nap_struggle_for_independence: "Боротьба за незалежність"
  STATIC_MODIFIER_NAME_nap_favor_monarchy: "Прихильність до монархістів"
  STATIC_MODIFIER_NAME_nap_favor_republic: "Прихильність до республіканців"
  flavor_nap.403.title: "$flavor_nap.402.title$"
  flavor_nap.403.desc: "$flavor_nap.402.desc$"
  flavor_nap.403.historical_info: "$flavor_nap.402.historical_info$"
  flavor_nap.403.a: "Підтримати монархію."
  flavor_nap.403.b: "Підтримати республіканську фракцію!"