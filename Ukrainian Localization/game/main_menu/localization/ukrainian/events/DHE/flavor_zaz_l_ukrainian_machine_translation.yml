l_english:
  flavor_zaz.1.title: "Піднесення $ZAZ_ADJ$ Січі"
  flavor_zaz.1.desc: "Зі зростанням впливу [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] у [ROOT.GetCountry.GetName] численні воїни, кріпаки та племена повільно мігрували на землі [ShowAreaName('zaporizhzhia_area')]. Збудувавши кілька укріплень на Дніпрі, вони тепер мають намір залишитися там, сподіваючись одного дня досягти самоврядного статусу в [ROOT.GetCountry.GetNameWithNoTooltip].\n\nІнші нації також помітили це і тепер планують, як належним чином використати цей відчай нової Січі для повного контролю над територією."
  flavor_zaz.1.historical_info: "Запорозька Січ є найвідомішою з козацьких. Заснована між кінцем XV та XVI століття, її поява приписується будівництву Хортицького замку поблизу річки Дніпро. Вони служили Речі Посполитій проти зростаючих османів, але врешті-решт повстали і приєдналися до Російської імперії, але навіть тоді вони боролися за збереження своєї козацької ідентичності. Зрештою їх було розформовано, і до 1775 року їх замінила Дунайська Січ."
  flavor_zaz.1.a: "Ці [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] хочуть правити зараз?"
  flavor_zaz.1.b: "Вони стануть нашими добрими підданими."
  zaz_gains_cores_in_all_of_zaporizhzhia_area_tt: "$ZAZ$ отримає [Concept('cores', 'CONCEPT_PLACEHOLDER')|e] на всій [ShowAreaName('zaporizhzhia_area')] [Concept('area', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_zaz.2.title: "Наше майбутнє з [target_international_organization.GetNameWithNoTooltip]"
  flavor_zaz.2.desc: "Попри наш статус вірного [ROOT.GetCountry.GetReligion.GetAdjective] [ROOT.GetCountry.GetFlavorRank] у [target_international_organization.GetName], багато людей, включно з [target_character.GetName], помітили, наскільки [ROOT.GetCountry.GetName] віддалилася від [target_country.GetName]. Замість того, щоб сидіти склавши руки, дозволяючи цій тенденції тривати, члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажають усе це скасувати. Однак є й ті, хто вважає, що це шанс для [ROOT.GetCountry.GetNameWithNoTooltip] розвинути власну культуру, незалежну від втручання чиновників у [target_country.GetCapital.GetName]."
  flavor_zaz.2.a: "Даруймо їм подарунок на знак дружби."
  flavor_zaz.2.b: "Жодних подарунків [target_country.GetNameWithNoTooltip] не буде!"
  flavor_zaz.1000.title: "Випробування вірності"
  flavor_zaz.1000.desc: "Хоча багато людей у [ROOT.GetCountry.GetName] були задоволені [target_country.GetAdjective] правлінням, виникла невелика розбіжність між [target_character.GetName] та [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName], що призвело до того, що значна частина [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажає шукати нову альтернативу. Однією з них є [target_country2.GetLongName], яка прагне залучити наших [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] до своєї армії, а натомість вони допоможуть нам звільнитися від правління, під яким ми перебуваємо."
  flavor_zaz.1000.a: "Ми попросимо їх про допомогу."
  flavor_zaz.1000.b: "Повстання проти [target_country.GetNameWithNoTooltip] ризиковане, навіть за підтримки [target_character2.GetNameWithNoTooltip]."
  zaz_russia_will_declare_war_if_they_accept_tt: "Якщо [target_country2.GetName] прийме нашу пропозицію, ми станемо їхнім [ShowSubjectTypeName('vassal')] і оголосимо війну [target_country.GetName]"
  zaz_no_rebellion_tt: "Ми вирішимо не повставати проти [target_country.GetName]"
  flavor_zaz.1001.title: "$flavor_zaz.1000.title$"
  flavor_zaz.1001.desc: "Хоча між нами та [target_country.GetName] було багато конфліктів, вони завжди міцно контролювали своїх [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] підданих у [target_country3.GetName]. Однак останні події в їхній політиці змусили [target_character3.GetName] бажати змінити вірність, і [target_character3.GetSheHe] запропонував [target_character2.GetName] приєднатися до нас натомість, допомагаючи їм позбутися [target_country.GetAdjectiveWithFlagWithNoTooltip] правління, від якого вони страждали досить довго."
  flavor_zaz.1001.a: "Ми вирушаємо на світанку."
  flavor_zaz.1001.b: "Чому ми повинні довіряти цим кочівникам, що вони нас також не зрадять?"
  flavor_zaz.1100.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] Регалії"
  flavor_zaz.1100.desc: "Попри наші послуги у [target_country.GetAdjective] війську, нам ніколи не було надано жодної честі [target_country.GetGovernment.GetRulerTitle]. Натомість ми отримували лише переваги звичайних солдатів, такі як здобич та земля. [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName], а також [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажають вимагати регалії для [ROOT.GetCountry.GetAdjective] еліти, яка служила в багатьох кампаніях і принесла багато перемог [target_country.GetNameWithNoTooltip]. Можливо, якщо вони прислухаються до цього прохання, ми зможемо забезпечити відсутність невдоволення з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_zaz.1100.a: "Ми попросимо найкращі регалії."
  flavor_zaz.1100.b: "Наші досягнення та історії цінніші за кілька артефактів."
  zaz_request_work_of_art_from_overlord_tt: "Ми попросимо [Concept('target_country.GetName] створити для нас [work_of_art', 'CONCEPT_PLACEHOLDER')|e]"
  zaz_no_request_from_overlord_tt: "Ми не будемо надсилати запит до [target_country.GetName]"
  flavor_zaz.1101.title: "$flavor_zaz.1100.title$"
  flavor_zaz.1101.desc: "Наш підданий у [target_country2.GetName] був корисним для нас завдяки своїм [target_country2.GetGovernment.GetEstateName('cossacks_estate')] арміям, які служили [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] повною мірою. Однак вони вважають, що ми не винагородили їх достатньою кількістю подарунків, тому вони просять, щоб ми викували для їхньої еліти кілька регалій, щоб позначити їхню владу над рештою [target_country2.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]. Ми могли б поважати їхні вимоги та викувати їх, хоча багато хто сперечається, що скарбниця [ROOT.GetCountry.GetName] не повинна витрачатися на такі тривіальні випадки, а натомість повинна бути спрямована на покращення [ROOT.GetCountry.GetFlavorRank]."
  flavor_zaz.1101.a: "Умиротворимо нашого підданого."
  flavor_zaz.1101.b: "Ми не можемо дозволити собі такий запит."