l_english:
  flavor_mug.1.title: "[ShowReligiousSchoolNameWithNoTooltip('din_i_ilahi_school')]"
  flavor_mug.1.desc: "Оскільки [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank] є плавильним котлом різних вірувань, [target_character.GetName] розмірковував про відмову від шляхів [target_religious_school.GetName]. Натомість, [target_character.GetSheHe] бажає створити [target_character.GetHerHis] власну. Ця школа була б ближчою до нової релігії, де всі секти розглядаються як єдине ціле. Названа [ShowReligiousSchoolName('din_i_ilahi_school')], її мета — об'єднати людей, що проживають у [ROOT.GetCountry.GetFlavorRank]."
  flavor_mug.1.historical_info: "Мультикультурний та мультирелігійний характер Моголів відзначив правління Акбара «Великого». Він провів кілька реформ, щоб допомогти в цьому, і навіть створив власну віру. Вона була відома як Дін-і Ілагі, Релігія Бога, яка функціонувала подібно до Яси-е Чингізі Тимуридів, розглядаючи всі секти як єдине ціле."
  flavor_mug.1.a: "Релігія для всього нашого народу є найідеальнішою."
  flavor_mug.1.b: "Навіщо відмовлятися від шляхів [ROOT.GetCountry.GetReligiousSchool.GetNameWithNoTooltip]?"
  mug_enable_din_i_ilahi_school_tt: "[ShowReligiousSchoolName('din_i_ilahi_school')] буде розблоковано для всіх [ShowReligionAdjective('sunni')] та [ShowReligionAdjective('ibadi')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_mug.2.title: "Народження [ShowLawNameWithNoTooltip('dahsala_system')]"
  flavor_mug.2.desc: "Поточна система оподаткування стала складною через усі різні регіональні закони, які ми інтегрували з наших завоювань. Можна з упевненістю сказати, що вона дезорганізована, і для виправлення цього факту необхідно провести кілька реформ. [target_character.GetName] бажає організувати все це в [ShowLawName('dahsala_system')]. Вона призначена для належної організації оподаткування не-[ROOT.GetCountry.GetReligion.GetGroup.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], а не для дотримання їхніх місцевих законів."
  flavor_mug.2.historical_info: "Хаотична та дезорганізована система оподаткування під час правління Акбара призвела до значних втрат земельних доходів для Моголів. Саме з цієї причини тодішній міністр фінансів, Раджа Тодар Мал, вирішив реформувати їх усі в більш спрощену систему, Дахсалу. Існувало три способи оподаткування регіону: Забіті, Насак та Галла-Бакші."
  flavor_mug.2.a: "Система дозволить належним чином оподатковувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  flavor_mug.2.b: "Немає потреби в таких реформах."
  flavor_mug.3.title: "Організація Суби"
  flavor_mug.3.desc: "Через поточний розмір [ROOT.GetCountry.GetFlavorRank] неможливо керувати ним усім з [ROOT.GetCountry.GetCapital.GetName]. З цієї причини було запропоновано новий спосіб організації цих місць, а саме система [ShowGovernmentReformName('subah_organization_reform')], призначена для надання губернаторства будь-якому видному члену [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank]."
  flavor_mug.3.a: "Забезпечення контролю над усіма Субами є нашим пріоритетом."
  flavor_mug.3.b: "Усі наші регіони вже в порядку."
  flavor_mug.4.title: "Монетні реформи [target_character.GetNameWithNoTooltip]"
  flavor_mug.4.desc: "Щоб забезпечити фінансову стабільність [ROOT.GetCountry.GetFlavorRank], а також зменшити будь-які проблеми з інфляцією, з якими може зіткнутися наша економіка, [target_character.GetName] запропонував карбувати нову монету. Використовуючи величезні запаси [ShowGoodsName('goods_gold')] та [ShowGoodsName('silver')], це дозволить нам карбувати кілька варіантів цих монет. Однак [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] може бути не надто прихильним до таких економічних змін."
  flavor_mug.4.a: "Давайте карбувати ці нові монети."
  flavor_mug.4.b: "Немає потреби засмучувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_mug.5.title: "Захист сухопутної торгівлі"
  flavor_mug.5.desc: "Бандитизм був поширений на торгових шляхах у [ShowRegionName('hindustan_region')], купці часто повідомляли про втрату своїх товарів, коли їхні каравани проходили цими землями. Ці перебої в пересуванні неприйнятні в [ROOT.GetCountry.GetFlavorRank]. [target_character.GetName] бажає запобігти цьому, створивши нових дорожніх охоронців, відомих як [ShowBuildingTypeName('rahdar')], щоб захистити ці маршрути."
  flavor_mug.5.historical_info: "Через бандитизм у Індостані протягом 16 століття багато доріг були незахищеними. Це призводило до того, що багато іноземних купців втрачали свої товари, що змушувало місцевих адміністраторів компенсувати ці втрати. Щоб мінімізувати ці випадки, Акбар створив рахдарів, дорожню поліцію, яка забезпечувала б безпеку будь-якого мандрівника."
  flavor_mug.5.a: "Давайте створимо цих дорожніх охоронців."
  flavor_mug.5.b: "Немає потреби нічого контролювати."
  flavor_mug.6.title: "$taj_mahal$"
  flavor_mug.6.desc: "Смерть [target_character.GetName] залишила [target_character2.GetName] у скорботі. Бажаючи вшанувати пам'ять [target_character.GetHerHim], [target_character2.GetSheHe] найняв [target_artist.GetName] для розробки того, що [target_character2.GetNameWithNoTooltip] вважає magnum opus [ROOT.GetCountry.GetAdjective] архітектури. Назвавши його $taj_mahal$, його планується побудувати зі слонової кістки та білого мармуру, і де [target_character.GetNameWithNoTooltip] спочиватиме вічно."
  flavor_mug.6.historical_info: "Будучи одним з найпопулярніших прикладів архітектури Моголів, Тадж-Махал був побудований як меморіал дружини Шах Джахана. Він був натхненний Гур-і Аміром у Самарканді, який був мавзолеєм Тимура. Після смерті Шах Джахана його поховали поруч із дружиною."
  flavor_mug.6.a: "Пам'ять для [target_character.GetNameWithNoTooltip]!"
  flavor_mug.6.b: "[target_character.GetNameWithNoTooltip] вже пам'ятають."
  flavor_mug.7.title: "Впровадження [ShowPolicyNameWithNoTooltip('mansabdar_system')]"
  flavor_mug.7.desc: "Військова організація в [ROOT.GetCountry.GetName] довгий час не була тією, де перевага надавалася заслугам, а скоріше кількості земель, якими вони володіли. Натомість, повинна бути більш справедлива система, де заслуги та посади визначають кількість землі та багатства, які отримує людина. Це, безумовно, порушить баланс сил у [ROOT.GetCountry.GetFlavorRank], але це обов'язково значно покращить наші сухопутні війська."
  flavor_mug.7.a: "Давайте впровадимо цю систему."
  flavor_mug.7.b: "Нинішні керівники армії не будуть замінені."
  flavor_mug.8.title: "$peacock_throne$"
  flavor_mug.8.desc: "З [ROOT.GetCountry.GetAdjective] золотою добою в повному розпалі, [target_character.GetName] планує створити могутній трон для будь-якого майбутнього [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Заплановано прикрасити його танцюючими павичами ззаду, а також коштовностями, щоб продемонструвати нашу міць будь-якому відвідувачу [ROOT.GetCountry.GetGovernment.GetCourtTitle], це виявиться дорогим, але престижним одночасно."
  flavor_mug.8.a: "Це буде величний трон!"
  flavor_mug.8.b: "Витрачати ресурси на прості прикраси?"
  flavor_mug.9.title: "Діван Народу"
  flavor_mug.9.desc: "Незважаючи на те, що наш нинішній уряд достатньо служить масам, [ROOT.GetCountry.GetReligion.GetGroup.GetAdjective] еліти знаходять способи панувати над будь-якою іншою меншиною в [ROOT.GetCountry.GetName]. [target_character.GetName] бажав реформувати Діван, який би сприяв мультикультурній державі, дозволяючи нам збирати багатьох великих людей незалежно від їхніх особистих переконань."
  flavor_mug.9.a: "Настав час впровадити цю систему."
  flavor_mug.9.b: "Немає потреби реформувати працюючий уряд."
  flavor_mug.10.title: "[ShowBuildingTypeNameWithNoTooltip('ibadat_khana')] [target_location.GetNameWithNoTooltip]"
  flavor_mug.10.desc: "З домінуванням [ShowReligiousSchoolName('din_i_ilahi_school')] у [ROOT.GetCountry.GetName], багато хто запропонував створити молитовний дім для обговорень різних віросповідань. Відомий як [ShowBuildingTypeName('ibadat_khana')], він покликаний об'єднати людей [ROOT.GetCountry.GetNameWithNoTooltip] через віру, справді прийнявши [ShowSocietyDirectionName('humanist')] [ROOT.GetCountry.GetFlavorRank]."
  flavor_mug.10.a: "Давайте побудуємо цей дім знань."
  flavor_mug.10.b: "Немає потреби підривати [ROOT.GetCountry.GetReligion.GetGroup.GetNameWithNoTooltip]."
flavor_mug.11.title: "The [ShowBuildingTypeNameWithNoTooltip('red_fort')] of [target_location.GetNameWithNoTooltip]"
flavor_mug.11.desc: "In order to further strengthen our control over [target_location.GetName], [target_character.GetName] has suggested to build a grand fortress in the [target_location.GetRank.GetName]. Using the Yamunā River as a natural barrier, it would be a safer place for the [ROOT.GetCountry.GetGovernment.GetRulerTitle] to reside in."
flavor_mug.11.a: "Let us fortify the [target_location.GetRank.GetNameWithNoTooltip]."
flavor_mug.11.b: "There is no need for fortifications."
flavor_mug.12.title: "Founding of Fatehpur Sikrī"
flavor_mug.12.desc: "The [target_location.GetRank.GetName] of [target_location.GetName] has been growing lately, eventually leading to new districts being created. One of them is Fatehpur Sikrī, which has caught the attention of [target_character.GetName], wishing to transform it into the center of [ShowRegionName('hindustan_region')]. Whilst this will be helpful, it would also be costly."
flavor_mug.12.historical_info: "Founded in 1571 as the new capital of the Mughal Empire, Fatehpur Sikri received great attention from Emperor Akbar, who sought refuge from the busyness of Agra. He oversaw the construction of new gardens, temples, and commercial centers, transforming the city into a vibrant hub. Even monumental structures like the Buland Darwaza, the Door of Victory, were built during this time. Unfortunately, the town was completely abandoned in 1610 after the emperor lost interest in it."
flavor_mug.12.a: "Let this district prosper."
flavor_mug.12.b: "We should attend to more important matters."
flavor_mug.13.title: "Promotion of [ShowLanguageNameWithNoTooltip('rajasthani_language')]"
flavor_mug.13.desc: "The [ShowLanguageName('rajasthani_language')] language has been prominent within the [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Despite that, the [ROOT.GetCountry.GetGovernment.GetCourtTitle] has been lacking those people who are so versed in the ways of warfare. We could elevate them within the [ROOT.GetCountry.GetFlavorRank], but it runs the risk of angering the entrenched elites of the [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
flavor_mug.13.a: "Let us promote them."
flavor_mug.13.b: "No need to placate minorities."
mug_all_rajput_pops_lose_satisfaction_tt: "All [pops|e] that speak the [ShowLanguageName('rajasthani_language')] [language|e] will lose [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [pop_satisfaction|e]"
flavor_mug.14.title: "Aiding the Grand Trunk Road"
flavor_mug.14.desc: "Due to recent technological advancements, as well as negligence over trade within [ShowRegionName('hindustan_region')], the Grand Trunk Road has been in decline. Being the connection between [ShowRegionName('persia_region')] and [ShowRegionName('bengal_region')], it has led to it prospering in the past. [target_character.GetName] wishes to modernize this road, allowing for a grand road between [target_location.GetName] amd [target_location2.GetName]."
flavor_mug.14.a: "It shall be a grand road indeed."
flavor_mug.14.b: "Let us not spend resources improving ancient roads."
flavor_mug.15.title: "Founding of [target_location.GetNameWithNoTooltip]"
flavor_mug.15.desc: "The [ShowRegionName('bengal_region')] Sūbah has been on the decline for some time. Having lost our control in the region, [target_character.GetName] now wishes to establish a [ShowLocationRankName('city')] there from which [target_character.GetHerHis] governors will rule. The people there are in support of it, and would be rejoiced by such project, but it would also be costly."
flavor_mug.15.a: "Let us found it."
flavor_mug.15.b: "Empowering the governors there is not our priority."
mug_location_pops_gain_unrest_tt: "All [pops|e] in [target_location.GetName] will lose [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [pop_satisfaction|e]"