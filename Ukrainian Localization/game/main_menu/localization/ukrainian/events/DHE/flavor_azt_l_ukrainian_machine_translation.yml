l_english:
  flavor_azt.70.title: "Велика піраміда [ShowLocationNameWithNoTooltip('tenochtitlan')]"
  flavor_azt.70.desc: "Минуло вже кілька років відтоді, як наші предки скинули ярмо наших колишніх володарів у [ShowLocationName('azcapotzalco')] і натомість розширили свій вплив на сусідні міста-держави. Відтоді сила нашого народу значно зросла, і тепер наша держава контролює ключові місця в долині Мехіко. Міста-держави під нашим правлінням досі пам'ятають, що ми всі були рівними не так давно, і невідомо, наскільки ми можемо довіряти їхній вірності.\n\nОскільки завданням кожного правителя є будівництво нового етапу Великої піраміди [ShowLocationName('tenochtitlan')], ми маємо чудову нагоду перевірити вірність наших підданих. Будь-яке підлегле місто, яке зробить внесок у проєкт, буде занадто зайняте, щоб повстати, а будь-яке, що відмовиться, покаже свою цінність і може бути покаране."
  flavor_azt.70.a: "Усі повинні зробити внесок у Піраміду!"
  flavor_azt.70.b: "Нехай наші піддані внесуть свою належну частку."
  flavor_azt.70.c: "Проєкт на інший час, можливо."
  we_will_be_able_to_construct_the_building_later_tt: "Ми зможемо побудувати цю [Concept('building', 'CONCEPT_PLACEHOLDER')|e] пізніше"
  flavor_azt.70.historical_info: "У центрі Теночтітлана, Уей Текалі стоїть як високий символ відданості та могутності мешиків. Збудований поетапно з XIV століття, він має подвійні сходи, що ведуть до окремих храмів: один для Уїцилопочтлі, бога війни, інший для Тлалока, бога дощу та родючості. Поруч стоїть святилище Ехекатля, бога вітру. Храм став значною особливістю священного серця міста, де жерці здійснювали жертвоприношення та церемонії для підтримки космічного порядку."
  flavor_azt.80.title: "[target_character.GetNameWithNoTooltip]"
  flavor_azt.80.desc: "[target_character.GetName], провідний архітектор [ROOT.GetCountry.GetAdjective] Потрійного союзу та перша особа, яка отримала титул його Сіуакоатля, прем'єр-міністра, є незамінною силою в нашій державі. Прослуживши кільком Тлатоані, [target_character.GetNameWithNoTooltip] тепер залучений до управління майже кожною частиною нашої держави. Він організовує наші військові кампанії, керує нашими фінансами, а коли наш Тлатоані перебуває в полі, він діє замість нього.\n\nОднак, перш за все, [target_character.GetNameWithNoTooltip] є великим поборником поклоніння [ShowGodNameWithNoTooltip('huitzilopochtli_god')] і вжив низку заходів, щоб забезпечити належну повагу до нашого божества та бойових традицій, що його оточують."
  flavor_azt.80.a: "Піднести [ShowGodNameWithNoTooltip('huitzilopochtli_god')] як наше божество-покровителя."
  flavor_azt.80.b: "Настав час [ShowGodNameWithNoTooltip('quetzalcoatl_god')] очолити пантеон."
  flavor_azt.80.c: "Натомість звернімося до [ShowGodNameWithNoTooltip('tezcatlipoca_god')]."
  flavor_azt.80.historical_info: "Тлакаелель був ключовим архітектором Ацтекської імперії, маючи величезний вплив за троном під час правління кількох імператорів. Як верховний жрець і головний радник, він переосмислив ацтекську релігію, поставивши Уїцилопочтлі в її центр, і інституціоналізував людські жертвоприношення як священний обов'язок. Він ініціював Квіткові війни, щоб забезпечити постійний потік полонених, і стер старі історії, щоб створити більш єдину, міфічну ідентичність для Теночтітлана. Хоча він ніколи не був правителем, його бачення заклало основи ацтекської імперської влади."
  flavor_azt.90.title: "Рік Голоду Одного Кролика"
  flavor_azt.90.desc: "Час — це цикл, і те, що було, завжди повернеться. Настав рік одного кролика, а з ним і сніги, морози, а потім і посухи, пов'язані з ним.\n\nПогода цього року не буде до нас прихильною, і великий голод розриває наше суспільство. Оскільки відчайдушні чоловіки продають своїх дітей у рабство, щоб прогодувати свої сім'ї, що залишилися, дехто вимагає, щоб наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] звільнив їх від служіння йому і дозволив їм шукати нове життя в іншому місці."
  flavor_azt.90.a: "Ми просто повинні дозволити людям переселятися"
  flavor_azt.110.title: "Баланс сил Потрійного союзу"
  flavor_azt.110.desc: "Хоча [ROOT.GetCountry.GetAdjective] Імперія багато в чому може розглядатися як єдина держава, вона все ще технічно є союзом трьох міст [ShowLocationName('tenochtitlan')], [ShowLocationName('tetzcoco')] та [ShowLocationName('tlacopan')], розташованих поблизу [ShowLocationNameWithNoTooltip('tenochtitlan')]. Коли союз був створений, перші два можна було вважати рівними за силою, причому [ShowLocationNameWithNoTooltip('tenochtitlan')] був центром сильнішої військової культури, тоді як [ShowLocationNameWithNoTooltip('tetzcoco')] був центром права, інженерії та мистецтв. Ці ролі лише посилилися з ростом нашої імперії. [ShowLocationNameWithNoTooltip('tenochtitlan')], як домінуюче місто у всіх військових справах, тому піднялося до позиції вище інших, і багато наших підлеглих вождів тепер надсилають свою данину безпосередньо до [ShowLocationNameWithNoTooltip('tenochtitlan')]."
  flavor_azt.110.a: "Продовжувати централізувати владу в [ShowLocationNameWithNoTooltip('tenochtitlan')]."
  flavor_azt.110.b: "Спробувати посилити [ShowLocationNameWithNoTooltip('tetzcoco')] більшою мірою."
  flavor_azt.120.title: "Правова реформа Несауалькойотля"
  flavor_azt.120.desc: "Традиційно правові питання в месоамериканських державах залишаються на розсуд відповідних суддів підлеглих міст. Однак, оскільки [ROOT.GetCountry.GetAdjective] держава зросла, це призвело до значних відмінностей у її межах. Несауалькойотль, лідер [ShowLocationName('tetzcoco')], тому створив нову збірку законів із суворими правилами та визначеними покараннями за кожен злочин. Планується, що ці нові закони будуть впроваджені по всій [ROOT.GetCountry.GetAdjectiveWithNoTooltip] області, що призведе до більш уніфікованої [ROOT.GetCountry.GetAdjectiveWithNoTooltip] правової системи.\n\nЩоб переконатися, що місцеві судді дійсно використовують ці нові закони, деякі з них також стосуються покарання суддів, які не виконують своїх обов'язків відповідно до законів."
  flavor_azt.120.a: "Негайно впровадьмо ці закони!"
  flavor_azt.120.b: "Навіщо втручатися в те, що працювало поколіннями?"
  flavor_azt.130.title: "Європейські хвороби"
  flavor_azt.130.desc: "З часу прибуття європейців дивні та смертоносні хвороби швидко поширюються серед нашого народу. Оскільки все більше людей лежать хворі на лихоманку та пухирі, наше суспільство хитається в самій своїй основі. Чи накликали ми гнів божественний? Яка небезпека чекає на наш народ, коли ці жахливі часи огортають наше суспільство."
  flavor_azt.130.a: "Чи покинули нас боги?"
  flavor_azt.140.title: "Cocoliztli"
  flavor_azt.140.desc: "Нова дивна лихоманка почала поширюватися в наших землях. Вона набагато гірша за будь-яку хворобу, яку ми коли-небудь бачили, як до, так і після прибуття європейців. Лихоманка та кровотеча, що супроводжує її, призводять до смерті всього за кілька днів, а її швидке поширення серед нашого народу призвело до повсюдної паніки в нашому суспільстві. Забобонні серед нас провістили невдоволення та гнів богів..."
  flavor_azt.140.a: "Нехай боги змилуються над нами."
  flavor_azt.150.title: "Епідемія віспи"
  flavor_azt.150.desc: "З часу прибуття європейців дивні та смертоносні хвороби швидко поширюються серед нашого народу. Оскільки все більше людей лежать хворі на лихоманку та пухирі, наше суспільство хитається в самій своїй основі."
  flavor_azt.150.a: "Жахливо!"
  many_pops_will_perish_tt: "Багато наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] #R загинуть#! по всіх наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_azt.160.title: "Заснування нової династії"
  flavor_azt.160.desc: "Багато хто в наших залах намагався пов'язати наше походження з правлінням [ShowCultureName('toltec_culture')], які були до нас. Відомі своїми архітектурними звершеннями та красою своєї столиці Тули, поблизу [ShowLocationName('tenochtitlan')], вони вписали свою спадщину в історію золотими літерами. Багато хто припускав, що ми маємо законний зв'язок з цими людьми і могли б використати їхнє ім'я як сходинку до здобуття нашого місця під сонцем..."
  flavor_azt.160.a: "Ми є нащадками великої [ShowCultureNameWithNoTooltip('toltec_culture')]!"
  flavor_azt.160.b: "Створімо власну історію, на вершині піраміди слави та завоювань."
  52_year_cycle_title: "Церемонія Нового Вогню"
  52_year_cycle_desc: "У [GetCurrentYear] народ [ROOT.GetCountry.GetCulture.GetName] збирається в серці нашого великого міста [target_location.GetName], щоб провести священну Церемонію Нового Вогню. Передчуття відчутне, поки жерці ретельно готують жертовний вогнище. Коли сонце опускається за обрій, голоси стихають, наші серця б'ються в унісон. Повітря наповнене благоговінням, коли наші релігійні лідери, одягнені в складні пір'яні головні убори та яскраві церемоніальні шати, запалюють полум'я, використовуючи лише тертя своїх божественних інструментів. Свідки затамовують подих, знаючи, що доля нашого світу залежить від цього священного акту.\n\nПолум'я спалахує, кидаючи тепле, помаранчеве сяйво на обличчя нашого народу. У цей момент ми об'єднані у своїй вірі, пов'язані традицією та з'єднані з космосом. Церемонія нагадує нам про наш вічний обов'язок підтримувати космічний порядок, і, спостерігаючи, як вогонь танцює на тлі темніючого неба, ми шукаємо запевнення, що наша цивілізація продовжуватиме процвітати, смиренно приносячи свої данини нашим богам."
  52_year_cycle_a: "Шикуйте жертви, сонце повернеться!"
  52_year_cycle_b: "Доречна скромна церемонія."
  52_year_cycle_c: "Сонце буде поглинуте тисячею тіней."
  52_year_cycle_d: "Достаток багатства, щоб продемонструвати наше процвітання!"
