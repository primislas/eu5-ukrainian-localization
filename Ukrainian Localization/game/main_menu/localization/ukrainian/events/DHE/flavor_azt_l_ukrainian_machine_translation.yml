  flavor_azt.200.title: "Реконструкція [ShowBuildingTypeNameWithNoTooltip('great_temple_of_tenochtitlan')]"
  flavor_azt.200.desc: "Роками [ShowBuildingTypeName('great_temple_of_tenochtitlan')] гордо стояв у [target_location.GetName]. З кожною ітерацією храму наша велич відповідно зростає, оскільки ми приносимо свіжі жертви, щоб умилостивити божественне. Якщо ми хочемо продовжувати процвітати, ми повинні планувати наперед і потенційно замовити ще одне розширення храму, відповідно до наших звичаїв і календаря."
  flavor_azt.200.a: "Нехай розширення почнеться!"
  flavor_azt.200.b: "Ми не можемо собі цього дозволити..."
  flavor_azt.210.title: "Церемонії коронації [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_azt.210.desc: "Світло за обрієм тьмяніє, коли жерці запалюють вогні по всьому [ROOT.GetCountry.GetCapital.GetName]. Одягнений у вишуканий одяг, королівські регалії та головний убір, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] готується прийняти благословення, оскільки [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] правління починається.\n\nНайважливішою частиною церемоній є принесення в жертву захоплених воїнів. Багато вівтарів по всьому місту повинні бути залиті кров'ю, щоб заслужити прихильність богів, забезпечуючи процвітаюче правління."
  flavor_azt.210.a: "Нехай ця кров ознаменує початок процвітаючого правління!"
  flavor_azt.210.b: "Ми не можемо пожертвувати жертвами."
  flavor_azt.210.c: "Боги отримають своє..."
  coronation_sacrifice_tt: "Замість того, щоб приносити в жертву ворожих полонених, ми запропонуємо кров наших власних королів як спосіб умилостивити богів, вулиці [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] будуть залиті шляхетною кров'ю"
  flavor_azt.220.title: "Гнів [target_lake.GetNameWithNoTooltip]"
  flavor_azt.220.desc: "Без сумніву, [target_lake.GetName] ставилося до нашого народу з ніжністю, пропонуючи достаток їжі та допомагаючи нашому процвітаючому суспільству. Однак боги діють таємничими шляхами і можуть час від часу бажати нагадати нам про наше скромне місце в космосі. Так сталося з нещодавніми великими повенями по всьому озеру. На жаль, багато наших людей загинули, і наші жерці говорять про божественний гнів і покарання."
  flavor_azt.220.a: "Ми у владі стихій..."
  flavor_azt.220.b: "Фінансуймо відбудовчі роботи."
  flavor_azt.230.title: "Цомпантлі [target_location.GetNameWithNoTooltip]"
  flavor_azt.230.desc: "Перемоги над нашими ворогами даються дорогою ціною. Роками ми боролися, щоб зберегти наші володіння та забезпечити розширення й процвітання нашого народу. Боги були прихильні до нас, надаючи вдосталь плоті воїнів для жертвоприношень, захищаючи при цьому наших бійців.\n\nЯк наслідок, ми спорудили великий стяг із черепів, також відомий як #italic Цомпантлі#!, взятих у наших ворогів та тих, хто прагнув стримати наше розширення. Їхні голови тепер прикрашають наш стяг із черепів, нагадування про військовий шлях, яким ми йдемо, похмура реальність, що чекає на всіх, хто протистоїть нам."
  flavor_azt.230.a: "Ніхто не поставить під сумнів наше правління!"
  flavor_azt.230.b: "Наші вороги розсиплються, як пил на вітрі..."
  flavor_azt.240.title: "Піднесення [moctezuma_scope.GetShortNameWithNoTooltip]"
  flavor_azt.240.desc: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] не відчуває браку в здібних адміністраторах та проникливих лідерах. Однак, несподіванкою є те, що один член нашої родини, [moctezuma_scope.GetName], блискуче проявив [moctezuma_scope.GetHerHis] здібності при [ROOT.GetCountry.GetGovernment.GetCourtTitle], а також під час релігійних святкувань. За словами [moctezuma_scope.GetHerHis] наставників, у юному віці [moctezuma_scope.GetSheHe] був занурений у багаті культурні та релігійні традиції нашого народу, отримавши всебічну освіту з історії, військової справи та управління.\n\nНещодавно [moctezuma_scope.GetSheHe] виявив себе винятково талановитим вченим, демонструючи глибоке розуміння нашого складного календаря та релігійних ритуалів. Однак, майстерність [moctezuma_scope.GetShortNameWithNoTooltip] виходить за межі [moctezuma_scope.GetHerHis] інтелектуальних занять: [moctezuma_scope.GetSheHe] багато разів довів [moctezuma_scope.GetHerselfHimself] на полі бою."
  flavor_azt.240.a: "[moctezuma_scope.GetHerHis|U] правління буде легендарним!"
  flavor_azt.240.b: "[moctezuma_scope.GetHerHis|U] час настане незабаром."
  flavor_azt.240.historical_info: "Правління Монтесуми тривало близько 20 років, між 1502 та 1520 роками. Його термін ознаменувався досягненням імперією найбільшого територіального розширення, але також став початком її занепаду. Він централізував владу та розширив вимоги щодо данини, викликаючи заворушення через порушення традиційних відносин між ним та різними місцевими лордами, а також радами. Коли іспанські конкістадори на чолі з Ернаном Кортесом прибули у 1519 році, імператор вагався, можливо, вірячи, що Кортес був земним проявом бога Кетцалькоатля. Монтесума зрештою був узятий у заручники, що послабило владу ацтеків. Його правління закінчилося крахом ацтекського опору та початком іспанського завоювання. Як останній імператор ацтеків, Монтесума, як кажуть, був стурбований жахливими снами про комети, пожежі та дивні фігури, що віщували кінець його імперії."