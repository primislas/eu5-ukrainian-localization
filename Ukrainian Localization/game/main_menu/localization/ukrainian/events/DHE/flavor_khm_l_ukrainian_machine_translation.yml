l_english:
  flavor_khm.1000.title: "[ShowBuildingTypeNameWithNoTooltip('khmer_baray')] [target_location.GetNameWithNoTooltip]"
  flavor_khm.1000.desc: "[ShowBuildingTypeName('khmer_baray')] [target_location.GetName] забезпечує [target_location.GetRank.GetName] життєво важливим запасом води. Під час негараздів останніх десятиліть та успадкування [target_old_ruler.GetName] він не отримував необхідної уваги та догляду і повільно втрачає свою ефективність. Якщо ми не діятимемо зараз, велике водосховище може стати непридатним у майбутньому."
  flavor_khm.1000.a: "Це надто дорого."
  flavor_khm.1000.b: "Зробити необхідний ремонт."
  flavor_khm.1001.title: "Скрутне становище [ShowLocationNameWithNoTooltip('angkor')]"
  flavor_khm.1001.desc: "[ShowBuildingTypeName('khmer_baray')] тепер досяг такого жалюгідного стану занедбаності, що ми більше не зможемо використовувати його величезний запас води для постачання нашого народу."
  flavor_khm.1001.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_khm.1100.title: "Втрата [target_art.GetNameWithNoTooltip]"
  flavor_khm.1100.desc: "Під час облоги [target_location.GetName] війська [siege_leader.GetName] викрали один з наших найцінніших скарбів — [target_art.GetName]. Ми мало що можемо зробити, окрім як оплакувати втрату цієї прекрасної статуї, що демонструвала нашу релігійну відданість."
  flavor_khm.1100.a: "[ROOT.GetCountry.Custom('common_string_disappointing')]"
  flavor_khm.1101.title: "Захоплення [target_art.GetNameWithNoTooltip]"
  flavor_khm.1101.desc: "Під час облоги [target_location.GetName] ми захопили прекрасний витвір мистецтва — [target_art.GetName]. Відома статуя прямує до нашої столиці і займе своє місце у новому домі в [ROOT.GetCountry.GetCapital.GetName]."
  flavor_khm.1101.a: "[ROOT.GetCountry.Custom('common_string_positive')]"