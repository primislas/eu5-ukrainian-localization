l_english:
  flavor_sco.1.title: "Злам [target_character.GetDynasty.GetNameWithNoTooltip]"
  flavor_sco.1.desc: "Родина [target_character.GetDynasty.GetName] довгий час була в опозиції до [ROOT.GetCountry.GetFlavorRank]. Протистояння між [target_character.GetName] та [target_ruler.GetName] досягли нестерпної точки, і численні недавні спроби [ROOT.GetCountry.GetGovernment.GetRulerTitle] заспокоїти родину [target_character.GetDynasty.GetNameWithNoTooltip] були безуспішними.\n#NL![target_ruler.GetNameWithNoTooltip] успішно відновив контроль над багатьма іншими родинами серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], але досі [target_character.GetSheHe] не міг зробити жодного кроку проти [target_character.GetDynasty.GetNameWithNoTooltip]. Багато голосів при дворі стверджують, що необхідні більш рішучі заходи."
  flavor_sco.1.historical_info: "У 1449 році король Яків II досяг віку, щоб одружитися і повернути контроль над своїм королівством. Він негайно захопив маєтки Лівінгстонів, але був трохи поблажливішим до Дугласів. Однак у сварці 1452 року він сам зарізав Вільяма, 8-го графа Дугласа. Історично це був кінець влади родини Дугласів, і через 3 роки всі їхні землі були конфісковані, а їхні замки зруйновані."
  flavor_sco.1.a: "Зруйнувати замки та конфіскувати землі [target_character.GetDynasty.GetNameWithNoTooltip]."
  flavor_sco.1.b: "Укласти мир з родиною [target_character.GetDynasty.GetNameWithNoTooltip]."
  flavor_sco.2.title: "Старий Альянс"
  flavor_sco.2.desc: "Підписаний між [old_sco_ruler.GetName] та [old_fra_ruler.GetName] у 1295 році, Старий Альянс слугував оборонним союзом проти [GetCountry('ENG').GetName]. Оскільки [ROOT.GetCountry.GetName] тепер у мирі, дипломати з [GetCountry('FRA').GetName] прибули до [ROOT.GetCountry.GetCapital.GetName], щоб обговорити зміцнення альянсу перед обличчям зростаючої [GetCountry('ENG').GetAdjectiveWithNoTooltip] агресії."
  flavor_sco.2.a: "Зміцнімо наші відносини з [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_sco.2.b: "Ми не матимемо нічого спільного з [GetCountry('FRA').GetNameWithNoTooltip]!"
  flavor_sco.3.title: "Кардинал [target_character.GetNameWithNoTooltip]"
  flavor_sco.3.desc: "Видатний член нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [target_character.GetName] — дуже талановита особистість. Швидко піднявшись по кар'єрних сходах [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], [target_character.GetSheHe] здобув [target_character.GetHerselfHimself] ім'я одного з наших найвидатніших умів. Використання [target_character.GetHerHim] при нашому дворі не тільки надасть нам доступ до [target_character.GetHerHis] здібностей, але й забезпечить нам тісніші зв'язки з [ShowReligionName('catholic')]."
  flavor_sco.3.historical_info: "Як довірений радник Якова V, кардинал Девід Бітон зумів забезпечити, щоб Шотландія не пішла стопами Англії і не стала протестантською. Натомість він працював над зміцненням зв'язку з католицькою Францією і навіть зумів організувати два шлюби з французькими дворянками, які принесли значні посаги золотом до скарбниці шотландського двору."
  flavor_sco.3.a: "Чудовий міністр."
  flavor_sco.3.b: "Ми не маємо потреби в [target_character.GetHerHim]."
  flavor_sco.4.title: "[ShowReligionNameWithNoTooltip('calvinist')] Релігійні чвари"
  flavor_sco.4.desc: "Напруга між [ShowReligionAdjective('calvinist')] та [ShowReligionAdjective('catholic')] населенням досягає свого піку. Численні [ShowReligionAdjectiveWithNoTooltip('calvinist')] проповідники, що прибули до нашої країни, викликають неабиякий ажіотаж, і хоча наші [ShowReligionAdjectiveWithNoTooltip('catholic')] власті безжально переслідують цих єретиків, їхній вплив все ж поширюється.\n#NL!Один з цих проповідників, [target_character.GetName], став дедалі більшою проблемою, і [target_character.GetHerHis] вплив на загальне населення відчутний. Нам потрібно знайти спосіб вирішити цю проблему та обмежити [target_character.GetHerHis] вплив."
  flavor_sco.4.historical_info: "Джон Нокс став свого роду речником протестантизму в Шотландії у 1540-х роках. У червні 1547 року прибула французька допомога для боротьби з протестантами, і Нокса та інших забрали в рабство на французькі галери, але завдяки англійському втручанню Нокса звільнили. Однак він не міг повернутися до Шотландії і продовжувати свої проповіді, а мусив залишитися в Англії, де мав великий вплив на формування англійського пуританства. Він залишався там до того часу, як на престол зійшла католичка Марія Тюдор, після чого він вважав за розумне втекти на континент. У 1559 році він знову зміг повернутися до Шотландії і був вражений прогресом, досягнутим кальвіністською справою, та щирим прийомом, наданим йому всіма верствами суспільства."
  flavor_sco.4.a: "Вигнати [target_character.GetHerHim]."
  flavor_sco.4.b: "Ймовірно, нічого з цього не вийде."
  flavor_sco.4.tt_common: "[ShowBuildingTypeName('calvinist_preachers')] поширяться через наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_sco.4.a.tt: "$flavor_sco.4.tt_common$, хоча і в меншій мірі"
  flavor_sco.4.b.tt: "$flavor_sco.4.tt_common$"
  flavor_sco.5.title: "Перший Заповіт"
  flavor_sco.5.desc: "Могутня група [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], що називається Лордами Конгрегації, представила [ShowReligionName('calvinist')] прокламацію, яку вони називають #italic Перший Заповіт#!, закликаючи до вигнання [ShowReligionAdjective('catholic')] Церкви з [ROOT.GetCountry.GetName] та офіційного прийняття [ShowReligionAdjective('calvinist')] віри. Мотиви, однак, ймовірно, полягають набагато більше в можливості конфіскувати величезні багатства [ShowReligionAdjectiveWithNoTooltip('catholic')] Церкви в нашій країні, ніж у чисто істинній вірі."
  flavor_sco.5.a: "Підтримати Лордів Конгрегації."
  flavor_sco.5.b: "Виступити проти Лордів Конгрегації."
  sco_prevent_catholic_conversion: "[ShowModifier('sco_the_first_congregation')] вимикає [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('promote_religion')], якщо [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetName] є [ShowReligionAdjective('catholic')]."
  flavor_sco.6.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Ост-Індійська компанія"
  flavor_sco.6.desc: "Як і всі інші нації того часу, що мали вихід до моря, [ROOT.GetCountry.GetLongName] також вдалося повторити зусилля своїх заморських експансій і знайти шлях до Ост-Індії. Створення компанії для експлуатації її численних багатств, безсумнівно, буде нам на користь."
  flavor_sco.6.a: "Ми скористаємося цим!"
  flavor_sco.6.b: "Зосередьмося на батьківщині."
  flavor_sco.6.a.tt: "Розблоковує [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentReformName('east_india_trading_company')]"
  flavor_sco.7.title: "Велике дорожнє будівництво в Гайленді"
  flavor_sco.7.desc: "Покращення доріг і торговельних шляхів у північних частинах нашої країни може мати великий вплив на економіку цих районів, що призведе до збільшення торгівлі, а отже, і до вищих податкових надходжень. Однак розвиток таких сільських місць відбуватиметься за рахунок занедбання наших більш розвинених районів, тоді як наша увага могла б бути краще зосереджена в іншому місці."
  flavor_sco.7.a: "Інвестувати в дорожнє будівництво."
  flavor_sco.7.b: "Прагнути до [ROOT.GetCountry.GetFlavorRank] масштабного проєкту дорожнього будівництва."
  flavor_sco.7.c: "Нас це не цікавить."
  flavor_sco.7.tt: "[ShowRoadTypeName('modern_road')] буде побудовано в кожному [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в межах [Concept('area', 'CONCEPT_PLACEHOLDER')|e] [ShowAreaName('scottish_highlands_area')]. Кожен [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в межах [Concept('area', 'CONCEPT_PLACEHOLDER')|e] [ShowAreaNameWithNoTooltip('scottish_highlands_area')] отримує [Concept('development', 'CONCEPT_PLACEHOLDER')|e] [ShowNamedValue('development_mild_bonus')|+=]"
  flavor_sco.8.title: "[target_location.GetNameWithNoTooltip] Торгова палата"
  flavor_sco.8.desc: "Відкриття належної [ROOT.GetCountry.GetAdjective] Торгової палати могло б значно допомогти нашій торгівлі та стало б ключовим фактором у збереженні міцного контролю над нашою національною економікою. Деякі особистості з [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] разом із місцевим урядом [target_location.GetName] висунули пропозицію, пропонуючи його як кандидата на розміщення цієї Торгової палати."
  flavor_sco.8.a: "Гарна ідея, давайте впровадимо торговельну реформу."
  flavor_sco.8.b: "Краще віддати перевагу вільній торгівлі."
  flavor_sco.9.title: "[target_character.GetNameWithNoTooltip]"
  flavor_sco.9.desc: "Часи змінюються, і мінливі часи створюють цікавих людей. Одним із таких є [target_character.GetName], одна з найвидатніших особистостей серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] останнім часом. [target_character.GetSheHe|U] запропонував нові винаходи в техніках видобутку, включаючи нові форми дренажу, які дозволили б нам краще видобувати під водою. Ми могли б значно використати [target_character.GetHerHis] здібності при дворі."
  flavor_sco.9.historical_info: "Джордж Брюс з Карнока був шотландським купцем і гірничим інженером кінця 16 століття. Він запровадив багато нових інновацій у підводному видобутку, навіть отримавши візит від короля Якова VI. Він займався експлуатацією та торгівлею не тільки вугіллям і сріблом, а й сіллю та багатьма іншими продуктами."
  flavor_sco.9.a: "Найняти [target_character.GetHerHim]."
  flavor_sco.10.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Акт про чаклунство"
  flavor_sco.10.desc: "Зростаюча народна відраза до відьом і чаклунства все частіше привертає увагу двору. Повідомлення про діяльність відьом накопичуються перед [target_ruler.GetName], вимагаючи негайного вирішення. Повідомлення є широкими, від, здавалося б, нешкідливого місцевого цілителя, звинуваченого у варінні зілля, до ймовірних демонічних одержимостей. Є навіть фермер, який клянеться, що його одного разу перетворили на тритона, але він одужав.\n\nПропозиції щодо нового акту про переслідування відьом зростають, і [ROOT.GetCountry.GetGovernment.GetRulerTitle] також почав висловлювати [target_ruler.GetHerHis] власну думку з цього приводу."
  flavor_sco.10.historical_info: "Шотландський Акт про чаклунство 1563 року зробив як практику чаклунства, так і факт консультацій з відьмами злочинами, що караються смертю. Яків VI відіграв значну роль у цьому через свою участь у Норт-Бервікських процесах над відьмами, які були першою великою серією процесів за новим актом. Король опублікував захист полювання на відьом у «Демонології» в 1597 році, але пізніше став дедалі скептичнішим і вжив заходів для обмеження переслідувань. Шотландія судила приблизно 6000 людей за чаклунство, де сімдесят п'ять відсотків обвинувачених були жінками, і понад 1500 людей були страчені."
  flavor_sco.10.a: "Захистити Акт про чаклунство."
  flavor_sco.10.b: "Засудити це."
  flavor_sco.11.title: "Анексія [ShowLocationNameWithNoTooltip('london')]"
  flavor_sco.11.desc: "Захисники [ShowLocationName('london')] здали місто, і були підписані договори, що формально анексують його до [ROOT.GetCountry.GetName]. Залишається лише вирішити долю [ShowLocationNameWithNoTooltip('london')]. Чи варто залишити жителів [ShowLocationNameWithNoTooltip('london')] у спокої? Чи варто розграбувати місто та перевезти його скарби та установи до нашої столиці?"
  flavor_sco.11.a: "До [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]!"
  flavor_sco.11.b: "Залишити [ShowLocationNameWithNoTooltip('london')] у спокої."
  flavor_sco.12.title: "Повернення [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_sco.12.desc: "Змалку [young_king_david.GetName] жив у вигнанні як захист від постійної загрози [england.GetAdjective] полону. Тим часом оборона королівства була в умілих руках наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')].\n\nЗавдяки нещодавньому затишшю в боях, молодий [young_king_david.GetShortNameWithNoTooltip] розпочав свою подорож до [ROOT.GetCountry.GetCapital.GetName], щоб повернути своє законне місце на [ROOT.GetCountry.GetAdjective] престолі.\n\nХоча дехто може вважати його лише боягузливим дитям, він є первістком покійного героя, самого [young_king_david.GetFather.GetName]."
  flavor_sco.12.a: "Зустріти повернення [ROOT.GetCountry.GetGovernment.GetRulerTitle] з помпою та церемонією!"
  flavor_sco.12.b: "Небезпека ще не минула, і ми маємо сильного лідера в особі [guardian_of_scotland.GetShortNameWithNoTooltip]."
  flavor_sco.12.c: "[young_king_david.GetName] не придатний до правління, [guardian_of_scotland.GetShortNameWithNoTooltip] має взяти на себе роль [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_sco.13.title: "Наша Шотландія"
  flavor_sco.13.desc: "За своєю природою [ROOT.GetCountry.GetName] є плюралістичною землею, з різноманітним народом багатьох різних походжень.\n\nОднак дехто каже, що в цій різноманітності є слабкість, і нам було б краще об'єднатися та представити себе як один народ з одним голосом."
  flavor_sco.13.a: "Ця різноманітність робить нас тими, ким ми є."
  flavor_sco.13.b: "Безперечно, процвітаючі Низовини вкажуть шлях."
  flavor_sco.13.c: "Шляхетні клани Високогір'я роблять нас унікальними."
  flavor_sco.14.title: "Освіта [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_sco.14.desc: "Тихі голоси в нашому дворі шепочуть, що молодий [young_king_david.GetShortName] не переймає справжніх [ROOT.GetCountry.GetAdjective] почуттів, перебуваючи у вигнанні в [france.GetName]. Вони бояться, що після його повернення королівство буде керуватися іноземцем."
  flavor_sco.14.a: "Відправити вихователя з Низовин, щоб навчати його."
  flavor_sco.14.b: "Відправити вождя Високогір'я, щоб прищепити почуття обов'язку та мужності."
  flavor_sco.14.c: "Навчання [france.GetAdjectiveWithNoTooltip] придворного, безперечно, найшляхетніше з усіх."
  flavor_sco.15.title: "Лох-Неське чудовисько"
  flavor_sco.15.desc: "Протягом сотень років ходили чутки про великого звіра, що мешкає глибоко у водах Лох-Нессу; селяни, дворяни і навіть сам великий Святий Колумба стверджували, що бачили це невловиме чудовисько.\n\nОднак, низка нещодавніх спостережень викликала безпрецедентний галас по всьому [ROOT.GetCountry.GetLongName], оскільки багато хто бажає побачити істоту на власні очі."
  flavor_sco.15.a: "Заохочувати чутки, можливо, можна знайти вигоду!"
  flavor_sco.15.b: "Геть цю дурницю. Напевно, є розумне пояснення..."
  flavor_sco.16.title: "Монс Мег"
  flavor_sco.16.desc: "Працьовитий [gifter.GetLongName] надіслав нам подарунок у вигляді масивної семитонної бомбарди, чий ствол майже втричі довший за зріст людини, що лежить.\n\nЧоловіки вже почали називати її «$work_of_art_mons_meg$» на честь [gifter.GetAdjectiveWithNoTooltip] міста [origin.GetName], де її було викувано."
  flavor_sco.16.a: "Вона займе почесне місце в замку [destination.GetNameWithNoTooltip]."
  flavor_sco.16.b: "Вона зруйнує стіни інших замків."
  flavor_sco.16.c: "Переплавити її на брухт."
  flavor_sco.17.title: "[burns.GetNameWithNoTooltip]"
  flavor_sco.17.desc: "Бідний фермер з [origin.GetName] на ім'я [burns.GetName] прибув до [destination.GetName], продаючи антологію яскравих віршів про селянське життя.\n\nЛюдина з апетитом до пригод (і, схоже, до жінок), він збирає гроші, щоб подорожувати до Вест-Індії."
  flavor_sco.17.a: "Захоплива людина."
  flavor_sco.17.b: "Замовити ще кілька!"
  flavor_sco.18.title: "Вовк з [wolf_origin.GetNameWithNoTooltip]"
  flavor_sco.18.desc: "Після суперечки з єпископом [target_location.GetProvince.GetName] сумнозвісний чоловік з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], відомий як Вовк з [wolf_origin.GetName], здійснив жорстокий напад на собор [target_location.GetName], спаливши та пограбувавши поселення на своєму шляху.\n\nРуйнування, спричинені Вовком та його союзниками, приголомшили місцеве населення, але, можливо, гірше те, що політичні наслідки цього акту насильства, безсумнівно, відчуватимуться по всій [ROOT.GetCountry.GetLongName].\n\nМогутній [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] просто розлючений. З іншого боку, це створило прецедент, що ми можемо застосовувати насильство до священницького класу, щоб отримати те, що нам потрібно..."
  flavor_sco.18.a: "Покарати Вовка. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не вищі за закон."
  flavor_sco.18.b: "Надіслати допомогу до [target_location.GetNameWithNoTooltip]."
  flavor_sco.18.c: "Спалити ще один собор!"
  flavor_sco.19.title: "Фордун укладає «Chronica Gentis Scotorum»"
  flavor_sco.19.desc: "Священник [target_artist.GetName] нещодавно завершив свою працю під назвою #ITALIC Chronica Gentis Scotorum#!. Його робота розпочалася зі збору старих записів [ROOT.GetCountry.GetName] і розширення їх детальним спогадом про нашу недавню історію. Тепер, коли вона завершена, праця надає нам детальну інформацію про нашу країну за останні сто років і може слугувати легітимізацією нашого правління."
  flavor_sco.19.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_sco.19.historical_info: "«Chronica Gentis Scotorum» складається з двох частин: «Gesta Annalia I» та «Gesta Annalia II». «Gesta Annalia I» закінчується 1285 роком за правління [GetCharacter('sco_alexander_iii').GetNameWithNoTooltip]. Вона збирає записи попередніх хроністів і додається до праці Фордуна, «Gesta Annalia II». Його праця охоплює роки між 1285 та 1363. Окрім щорічних записів, праця містить передбачувану безперервну лінію шотландських королів до Фергуса Мора, міфологічного засновника Шотландії. Мотивована знищенням шотландських документів, ця праця сприяла розвитку шотландської національної ідентичності під час Шотландських війн за незалежність."
  flavor_sco.20.title: "Дикий хаґґіс"
  flavor_sco.20.desc: "Хаґґіс є важливою їжею для народу [ROOT.GetCountry.GetName], а його м'яке хутро використовується для виготовлення традиційних кілт-спорранів.\n\nОднак ця маленька пухнаста істота, що мешкає в [ShowAreaName('scottish_highlands_area')], останніми роками була драматично переловлена до такої міри, що її значною мірою вважають вимерлою в дикій природі. Лише кілька фермерів продовжують одомашнювати хаґґіс на своїх ділянках землі для місцевого споживання."
  flavor_sco.20.a: "Розробити замінник з баранячих субпродуктів та вівса."
  flavor_sco.20.b: "Започаткувати програму розведення хаґґіса."
  flavor_sco.1000.title: "Кінець [GetCountry('SCO').GetAdjectiveWithNoTooltip] громадянської війни"
  flavor_sco.1000.desc_common: "[GetCountry('SCO').GetAdjective] Війна за незалежність проти [ROOT.GetCountry.GetName] призвела до громадянської війни, коли [ROOT.GetCountry.GetGovernment.GetRuler.GetName] вирішив таємно підтримати претензії [balliol.GetName] на [GetCountry('SCO').GetAdjectiveWithNoTooltip] трон в обмін на майбутні територіальні поступки. Було підписано договір, згідно з яким [ROOT.GetCountry.GetNameWithNoTooltip] зрештою надала військову підтримку, оскільки [balliol.GetShortNameWithNoTooltip] не зміг забезпечити швидку перемогу, на яку вони сподівалися.\n\nВійна тепер закінчилася перемогою [GetCountry('SCO').GetGovernment.GetRuler.GetNameWithNoTooltip]."
  flavor_sco.1000.desc_no_balliol: "$flavor_sco.1000.desc_common$ Договір, однак, може бути нездійсненним, оскільки [balliol.GetShortNameWithNoTooltip] більше не при владі. Тим не менш, ми повинні спробувати наполягти на наших $flavor_sco.1000.desc.demands$"
  flavor_sco.1000.desc: "$flavor_sco.1000.desc_common$ Ми повинні скористатися нашою перевагою і $flavor_sco.1000.desc.demands$"
  flavor_sco.1000.desc.demands: "вимагати провінції [ShowProvinceDefinitionName('lothian_province')] та [ShowProvinceDefinitionName('teviotdale_province')], а також вимагати підкорення [GetCountry('SCO').GetNameWithNoTooltip], тим самим забезпечуючи наше панування над цими островами."
  flavor_sco.1000.a: "Застосувати договір."
  flavor_sco.1000.tt: "Буде висунуто вимогу, щоб [GetCountry('SCO').GetNameWithNoTooltip] дотримувався узгоджених умов"
  flavor_sco.1000.b: "Нехай залишать собі, поки що."
  flavor_sco.1000.historical_info: "Ньюкаслський договір був угодою між Королівством Англії та Едуардом Балліолом, претендентом на шотландський престол під час громадянської війни в Шотландії. Договір передбачав, що Балліол повинен підкоритися верховенству Англії, і значні частини Шотландії будуть передані Англії після його перемоги та подальшої коронації. Натомість Англія зобов'язалася надати військову підтримку."
  flavor_sco.1001.title: "Ньюкаслський договір"
  flavor_sco.1001.desc_common: "[GetCountry('ENG').GetName] вимагає негайної здачі провінцій [ShowProvinceDefinitionName('lothian_province')] та [ShowProvinceDefinitionName('teviotdale_province')]"
  flavor_sco.1001.desc_no_balliol: "$flavor_sco.1001.desc_common$, посилаючись на договір, підписаний з [balliol.GetName] під час його правління. Договір також передбачає, що ми повинні присягнути на вірність [GetCountry('ENG').GetGovernment.GetRuler.GetName]."
  flavor_sco.1001.desc: "$flavor_sco.1001.desc_common$ і що ми присягаємо на вірність [GetCountry('ENG').GetGovernment.GetRuler.GetName], в обмін на їхню життєво важливу підтримку у забезпеченні [ROOT.GetCountry.GetAdjective] престолу для [balliol.GetName]."
  flavor_sco.1001.a: "Погодитися на їхні умови."
  flavor_sco.1001.b: "Розірвати договір на шматки."
  flavor_sco.1001.tt: "[GetCountry('ENG').GetNameWithNoTooltip] не сприйме цю відмову прихильно і може вимагати провінції"
  flavor_sco.1100.title: "Прикордонні рейвери"
  flavor_sco.1100.desc: "Постійні війни між [GetCountry('ENG').GetName] та [GetCountry('SCO').GetName] мають руйнівний вплив на прикордонні регіони, оскільки вони першими страждають від ворожих армій. Це означає, що люди на кордонах постійно бачать загрозу своєму життю та домівкам.\n\nТруднощі життя в таких невизначених умовах змушують ці прикордонні громади намагатися отримати будь-яку перевагу, щоб забезпечити своє існування. Шукаючи безпеки через силу в кількості, вони без розбору здійснюють набіги на прикордонні регіони.\n\nЦі розбійники, відомі як прикордонні рейвери, були активними вздовж англо-шотландського кордону з кінця 13 століття, складаючись як з [GetCountry('SCO').GetAdjectiveWithNoTooltip], так і з [GetCountry('ENG').GetAdjectiveWithNoTooltip] людей. Набіги найчастіше здійснюються в ранні зимові місяці, користуючись довшими ночами та накопиченими після літа запасами їжі."
  flavor_sco.1100.a: "$common_string_let_them_fend_for_themselves$"
  flavor_sco.1100.tt_common: "Прикордонні набіги тепер #G увімкнено#!. Вони можуть відбуватися щоразу, коли [GetCountry('ENG').GetNameWithNoTooltip] та [GetCountry('SCO').GetNameWithNoTooltip] мають [truce] одне з одним."
  flavor_sco.1100.tt1: "$flavor_sco.1100.tt_common$"
  flavor_sco.1100.b: "Надати кошти для навчання місцевого ополчення."
  flavor_sco.1100.tt2: "$flavor_sco.1100.tt_common$. Вони завдаватимуть менше шкоди пограбованим місцям"
  flavor_sco.1100.tt3: "Рейвери з обох боків кордону незабаром почнуть нападати один на одного, завдаючи шкоди пограбованим місцям"
  flavor_sco.1100.historical_info: "Прикордонні рейвери були розбійниками та беззаконними кланами, що складалися з цивільних осіб, які населяли прикордонний регіон між Англією та Шотландією. Основною метою набігів були крадіжка худоби, грабунки та підпали, і часто вони були частиною тривалих ворожнеч між конкуруючими кланами. Люди в цьому регіоні жили в постійному страху перед набігами та нападами, укріплювали свої будинки та розвивали культуру самооборони."
  flavor_sco.1101.title: "$flavor_sco.1100.title$"
  flavor_sco.1101.desc: "$flavor_sco.1100.desc$"
  flavor_sco.1101.historical_info: "$flavor_sco.1100.historical_info$"
  flavor_sco.1101.a: "Вони можуть подбати про себе."
  flavor_sco.1101.tt1: "Прикордонні рейди тепер #G увімкнено#!"
  flavor_sco.1101.b: "Збільшити прикордонні патрулі."
  flavor_sco.1101.tt2: "Прикордонні рейди тепер #G увімкнено#!, але завдаватимуть менше шкоди місцям нападів"
  flavor_sco.1102.title: "Наближається прикордонний рейд"
  flavor_sco.1102.desc: "Загін розбійників з [raider_origin.GetName] переправився через замерзлу річку, діставшись до поселення [raided_location.GetName] якраз перед світанком. Було викрадено худобу та припаси, а будівлі підпалено."
  flavor_sco.1102.a: "Вони беруть те, що потрібно."
  flavor_sco.1102.tt: "[raided_location.GetName] зазнає шкоди. [raider_origin.GetName] отримає вигоду від рейду"
  flavor_sco.1103.title: "$flavor_sco.1102.title$"
  flavor_sco.1103.desc: "$flavor_sco.1102.desc$"
  flavor_sco.1103.a: "Це по праву їхнє."
  flavor_sco.1103.tt: "$flavor_sco.1102.tt$"
  flavor_sco.1104.title: "Прикордонні розбійники з [raider_origin.GetNameWithNoTooltip] здійснюють набіг на [raided_location.GetNameWithNoTooltip]"
  flavor_sco.1104.desc: "$flavor_sco.1102.desc$"
  flavor_sco.1104.a: "Сила у витривалості."
  flavor_sco.1104.b: "Організувати допомогу."
  flavor_sco.1200.title: "Договір про вічний мир"
  flavor_sco.1200.desc: "Настав час забезпечити довготривалий мир між [GetCountry('SCO').GetName] та [ROOT.GetCountry.GetName]. Після століть конфлікту ми могли б запропонувати договір, який започаткував би новий період миру та процвітання, і заспокоїв би [GetCountry('SCO').GetAdjectiveWithNoTooltip] та [ROOT.GetCountry.GetAdjectiveWithNoTooltip] прикордонні регіони. Договір також пропонуватиме династичний союз між нашими двома країнами."
  flavor_sco.1200.a: "Мир має бути забезпечений."
  flavor_sco.1200.b: "Анітрохи не зацікавлений."
  flavor_sco.1200.tt1: "Договір про вічний мир буде запропоновано [GetCountry('SCO').GetNameWithNoTooltip]"
  flavor_sco.1200.tt2: "Це, ймовірно, покладе край частим набігам, що здійснюються прикордонними розбійниками"
  flavor_sco.1200.tt3: "Це збільшить наші шанси на забезпечення тривалого миру з [GetCountry('SCO').GetNameWithNoTooltip]"
  flavor_sco.1200.tt4: "Він спробує забезпечити шлюб між [GetCountry('SCO').GetGovernment.GetRuler.GetName] та династією [target_root_country.GetGovernment.GetRuler.GetDynasty.GetName], за умови, що обидві сторони неодружені"
  flavor_sco.1200.historical_info: "Договір про вічний мир був історичною угодою, підписаною між Англійською короною та Королівством Шотландія. Його метою було покласти край століттям конфліктів та ворожнечі між двома сусідніми королівствами. Також було включено шлюбний союз між королем Шотландії Яковом IV та принцесою Маргаритою Тюдор, що пізніше сприяло остаточному об'єднанню корон."
  flavor_sco.1201.title: "Договір про вічний мир"
  flavor_sco.1201.desc: "Виникла дипломатична нагода укласти довготривалий мир між [GetCountry('ENG').GetName] та [ROOT.GetCountry.GetName]. Після століть конфлікту [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetRulerTitle] запропонував договір, що може започаткувати новий період миру та процвітання, та умиротворити [GetCountry('ENG').GetAdjectiveWithNoTooltip] і [ROOT.GetCountry.GetAdjectiveWithNoTooltip] прикордонні регіони. Договір також пропонує династичний союз між нашими двома країнами."
  flavor_sco.1201.a: "Підписати договір."
  flavor_sco.1201.tt1: "Договір, ймовірно, покладе край частим набігам прикордонних розбійників."
  flavor_sco.1201.b: "Слово [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetRulerTitle] має малу вагу."
  flavor_sco.1201.tt2: "Буде зроблено спробу укласти шлюб між династією [GetCountry('ENG').GetGovernment.GetRuler.GetDynasty.GetName] та [sender.GetGovernment.GetRuler.GetName], за умови, що обидві сторони неодружені"
  flavor_sco.1201.tt3: "[GetCountry('ENG').GetNameWithNoTooltip] не сприйме цю відмову прихильно."
  flavor_sco.1202.title: "Наближаються заручини"
  flavor_sco.1202.desc: "Настав час обрати гідну дружину для [GetCountry('SCO').GetGovernment.GetRulerTitle] [GetCountry('SCO').GetName], задля підтримки дипломатичних відносин та забезпечення миру.\n\nЯк було погоджено в Договорі про Вічний Мир, рука будь-якої неодруженої сестри [ROOT.GetCountry.GetGovernment.GetRuler.GetName] обіцяна [GetCountry('SCO').GetNameWithNoTooltip]. Тому було погоджено, що [suitable_sister.GetName] та [GetCountry('SCO').GetGovernment.GetRuler.GetName] мають одружитися, за умови схвалення."
  flavor_sco.1202.a: "Відправити посланця."
  flavor_sco.1202.tt1: "Буде запропоновано шлюбну угоду"
  flavor_sco.1202.tt2: "Ця угода збільшить ймовірність утворення Унії Корон"
  flavor_sco.1202.b: "Жахлива ідея."
  flavor_sco.1202.tt3: "[ROOT.GetCountry.GetName] зневажає Договір про Вічний Мир"
  flavor_sco.1202.historical_info: "Заручини Маргарет Тюдор, молодшої сестри короля Англії Генріха VIII, були спробою відновити мир та укласти дипломатичний союз між Англією та Шотландією. Це було частиною Договору про Вічний Мир, який обидва королі підписали роком раніше. Шлюб відбувся у 1503 році, коли Маргарет була ще дитиною, а король Шотландії був на початку свого четвертого десятка."
  flavor_sco.1203.title: "Справа шлюбу"
  flavor_sco.1203.desc_common: "Настав час для [GetCountry('SCO').GetGovernment.GetRulerTitle] [GetCountry('SCO').GetName] знайти собі пару, задля підтримки дипломатичних відносин та забезпечення миру.\n\nЯк було погоджено в Договорі про Вічний Мир, рука будь-якої неодруженої сестри [GetCountry('ENG').GetGovernment.GetRuler.GetName] обіцяна"
  flavor_sco.1203.desc: "$flavor_sco.1203.desc_common$ [GetCountry('SCO').GetNameWithNoTooltip]. Тому було запропоновано, щоб [suitable_sister.GetName] та [ROOT.GetCountry.GetGovernment.GetRuler.GetName] одружилися, за умови нашого схвалення."
  flavor_sco.1203.desc_marriage_refused: "$flavor_sco.1203.desc_common$ [GetCountry('SCO').GetGovernment.GetRuler.GetName], однак, вони в односторонньому порядку вирішили відмовитися від шлюбу та зневажити угоду."
  flavor_sco.1203.a: "Договір є договір."
  flavor_sco.1203.b: "Відмовитися від шлюбу."
  flavor_sco.1203.c: "Вони не мають честі."
  flavor_sco.1203.d: "Ми й не очікували іншого."
  flavor_sco.1203.tt1: "Запропонований шлюб збільшує ймовірність спрацювання Унії Корон."
  flavor_sco.1203.tt2: "Договір про Вічний Мир оголошено недійсним"
  flavor_sco.1300.title: "Час — це вогонь, у якому ми горимо"
  flavor_sco.1300.desc_common: "не має живого спадкоємця, і питання престолонаслідування викликає занепокоєння щодо подальшої стабільності нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_sco.1300.desc_england_inherit: "[GetCountry('SCO').GetGovernment.GetRulerTitle] [GetCountry('SCO').GetName] $flavor_sco.1300.desc_common$ Династії [ROOT.GetCountry.GetName] та [GetCountry('SCO').GetNameWithNoTooltip] $flavor_sco.1300.desc_after$"
  flavor_sco.1300.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] $flavor_sco.1300.desc_common$ Династії [ROOT.GetCountry.GetName] та [GetCountry('SCO').GetName] $flavor_sco.1300.desc_after$"
  flavor_sco.1300.desc_after: "мають спільне походження, і можна припустити, що настав час об'єднати наші дві країни в династичну унію, поклавши тим самим край століттям конфліктів і недовіри."
  flavor_sco.1300.a: "Відправити таємне повідомлення"
  flavor_sco.1300.tt1: "Унія Корон відбудеться після смерті [target_character.GetNameWithNoTooltip], за умови схвалення [GetCountry('SCO').GetAdjectiveWithNoTooltip] парламенту"
  flavor_sco.1300.tt2: "Унія зробить [GetCountry('SCO').GetNameWithNoTooltip] меншим партнером"
  flavor_sco.1300.tt3: "Унія Корон відбудеться після смерті [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip], за умови схвалення [GetCountry('SCO').GetAdjectiveWithNoTooltip] парламенту"
  flavor_sco.1300.tt4: "Унія зробить [ROOT.GetCountry.GetNameWithNoTooltip] меншим партнером"
  flavor_sco.1300.b: "Ми байдужі до цього."
  flavor_sco.1300.tt5: "Пропозиція Унії Корон більше не буде висуватися"
  flavor_sco.1300.historical_info: "Унія Корон відбулася в 1603 році, коли шотландський король зійшов на престол Королівства Англії як Яків I. Він успадкував англійський престол завдяки своєму походженню від Маргарити Тюдор, сестри Генріха VIII. Незважаючи на унію, вони продовжували мати окремі парламенти та правові системи до Актів про унію 1707 року."
  flavor_sco.1301.title: "Запропонована унія"
  flavor_sco.1301.desc: "[dying_monarch.GetName] не вдалося народити живого спадкоємця, і питання престолонаслідування наближається. Династії [ROOT.GetCountry.GetName] та [GetCountry('ENG').GetName] можуть бути назавжди пов'язані в одну, об'єднавши обидві наші країни та поклавши край століттям конфліктів і недовіри."
  flavor_sco.1301.a: "Ми повністю згодні."
  flavor_sco.1301.tt1: "Унія Корон відбудеться після смерті [dying_monarch.GetName], якщо [dying_monarch.GetSheHe] помре без спадкоємця"
  flavor_sco.1301.tt2: "Унія зробить [GetCountry('SCO').GetNameWithNoTooltip] меншим партнером"
  flavor_sco.1301.tt3: "Унія зробить [GetCountry('ENG').GetNameWithNoTooltip] меншим партнером"
  flavor_sco.1301.b: "Це цілковите божевілля."
  flavor_sco.1301.tt4: "Унії не буде"
  flavor_sco.1400.title: "Замок [target_location.GetNameWithNoTooltip]"
  flavor_sco.1400.desc: "Укріплення в [target_location.GetName] змогли перешкодити нашим спробам захопити його, і воно все ще залишається під твердим контролем [GetCountry('SCO').GetLongName]. Незважаючи на те, що це, здавалося б, відносно неважливе укріплення, воно стоїть на прямому шляху наших ліній постачання, і здатність наших військ поповнювати запаси буде порушена, доки [target_location.GetNameWithNoTooltip] не буде під нашим контролем."
  flavor_sco.1400.a: "Нам доведеться з цим розібратися."
  flavor_sco.1401.title: "$flavor_sco.1400.title$"
  flavor_sco.1401.desc: "Замок у [target_location.GetName] все ще тримається проти загарбників з [GetCountry('SBL').GetName], створюючи розрив посередині їхніх ліній постачання. Таким чином, він перетворився на ключову позицію, і доки на ньому майорить [ROOT.GetCountry.GetAdjective] прапор, здатність нашого ворога поповнювати запаси своїх військ буде порушена. Його захисники вже забарикадувалися всередині, а його близькість до моря дозволить йому витримати тривалу облогу, якщо це буде необхідно. Ми повинні переконатися, що він залишається в наших руках."
  flavor_sco.1401.a: "Ми його забезпечимо."
  flavor_sco.1402.title: "Вороги біля замку [target_location.GetNameWithNoTooltip]"
  flavor_sco.1402.desc.SBL: "Замок у [target_location.GetName] продовжує становити загрозу для наших ліній постачання. Наша нездатність належним чином впоратися з ним і взяти його під наш контроль призвела до того, що наші війська не можуть отримати належне постачання, і наслідки вже видно в їхньому загальному моральному стані. Нам потрібно швидко розібратися з цією надокучливою фортецею, інакше ми ризикуємо, що наслідки погіршаться."
  flavor_sco.1402.desc: "Замок у [target_location.GetName] упав і перебуває в руках нашого ворога. Це має сильний негативний вплив на наші війська, які бачать, як раніше сильна позиція посеред ворожих ліній постачання зведена нанівець. Без можливості паралізувати доступ ворога до їхніх припасів, наша армія відчуває зневіру, оскільки деякі з них вважають, що ми більше не здатні ефективно боротися з ними в довгостроковій перспективі."
  flavor_sco.1402.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_sco.1402.b: "Знайдіть припаси іншими засобами."
  flavor_sco.1403.title: "Облога замку [target_location.GetNameWithNoTooltip]"
  flavor_sco.1403.desc: "Замок [target_location.GetName] обложений [target_enemy.GetAdjective] свинями. Попри це, він поки що тримається, особливо завдяки місцевому [target_character.GetName].\n\n[target_character.GetSheHe|U] вдалося організувати опір замку і навіть вилізти на зубці, щоб викрикувати образи на адресу військ [target_enemy.GetNameWithNoTooltip]. Завдяки цьому ми виграли трохи часу, який можемо використати для подальшого поповнення запасів замку та надання [target_character.GetHerHim] більше інструментів, щоб допомогти замку не впасти."
  flavor_sco.1403.a: "Допоможіть [target_character.GetNameWithNoTooltip]."
  flavor_sco.1403.b: "Ми нічого не можемо для них зробити."
  flavor_sco.1404.title: "Падіння замку [target_location.GetNameWithNoTooltip]"
  flavor_sco.1404.desc.SBL: "З падінням замку в [target_location.GetName] і його безпечним перебуванням у наших руках, ми нарешті змогли усунути перебої в наших лініях постачання. Наші війська більше не боятимуться вичерпання припасів і зможуть належним чином воювати. Це забезпечить швидке припинення боротьби з нашими [GetCountry('SCO').GetAdjective] ворогами."
  flavor_sco.1404.desc: "Замок [target_location.GetName] знову в наших руках. Сором від його втрати більше не ганьбитиме наших військ, і прапор [ROOT.GetCountry.GetLongName] знову гордо майорітиме над його стінами. Це славний день для [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_sco.1404.a: "Нарешті він наш."
  flavor_sco.100.title: "Наслідки битви при Галідон-Гіллі"
  flavor_sco.100.desc: "Велике сум'яття охопило [ROOT.GetCountry.GetName] у роки після битви при Галідон-Гіллі в 1333 році, коли [sco_heir.GetName] був змушений виїхати у вигнання до [GetCountry('FRA').GetName] за підтримки [GetCountry('ENG').GetAdjective] [sbl_ruler.GetName]. Хоча [sbl_ruler.GetLastNameWithNoTooltip] був відновлений як [GetCountry('SCO').GetGovernment.GetRulerTitle] після вигнання [sco_heir.GetNameWithNoTooltip], солдати, вірні [sco_regent.GetName], зуміли відновити контроль над більшою частиною [ROOT.GetCountry.GetNameWithNoTooltip] і скинули [sbl_ruler.GetLastNameWithNoTooltip].\n\nХоча [sco_heir.GetShortNameWithNoTooltip] безпечно перебуває в гостях у [ROOT.GetCountry.GetGovernment.GetCourtTitle] наших [GetCountry('FRA').GetAdjectiveWithNoTooltip] союзників, [sco_regent.GetLastNameWithNoTooltip] встановив [sco_regent.GetHerselfHimself] себе регентом, доки не буде вирішено питання з рештою володінь [GetCountry('SBL').GetName].\n\nНавіть якщо сум'яття закінчиться, [GetCountry('ENG').GetNameWithNoTooltip] може знову захотіти підірвати незалежність [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_sco.100.a: "Ми переможемо [GetCountry('SBL').GetNameWithNoTooltip] і забезпечимо правління [sco_heir.GetShortNameWithNoTooltip]!"
  flavor_sco.100.b: "Ми змусимо [GetCountry('SBL').GetNameWithNoTooltip] діяти."
  flavor_sco.101.title: "Повстання [sco_regent.GetNameWithNoTooltip]"
  flavor_sco.101.desc: "Після смерті узурпатора [GetCharacter('sco_robert_the_bruce').GetName] багато незадоволених [GetCountry('SCO').GetAdjective] [GetCountry('SCO').GetGovernment.GetEstateName('nobles_estate')] протестували проти коронації його молодого сина, [sco_heir.GetName]. Побачивши нагоду, [sbl_ruler.GetName], за допомогою [GetCountry('SCO').GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та за підтримки [GetCharacter('eng_edward_iii').GetName], просунувся в [GetCountry('SCO').GetNameWithNoTooltip] у 1333 році та розгромив сили [sco_heir.GetShortNameWithNoTooltip] у битві при Галідон-Гіллі, змусивши [sco_heir.GetHimHer] виїхати у вигнання до [GetCountry('FRA').GetName].\n\nХоча [sbl_ruler.GetShortNameWithNoTooltip] тепер був законно коронований [GetCountry('SCO').GetGovernment.GetRulerTitle] [GetCountry('SCO').GetAdjectiveWithNoTooltip], багато прихильників [sco_heir.GetShortNameWithNoTooltip] зібралися під прапором [sco_regent.GetLastName], захопивши контроль над більшою частиною [GetCountry('SCO').GetNameWithNoTooltip].\n\nЯкщо [sbl_ruler.GetShortNameWithNoTooltip] бажає зберегти [sbl_ruler.GetHisHer] корону, рада повинна швидко розгромити сили [sco_regent.GetLastNameWithNoTooltip], перш ніж вони зможуть далі сіяти насіння повстання."
  flavor_sco.101.a: "Ми розгромимо цього зрадника і назавжди покінчимо з підтримкою [sco_heir.GetLastNameWithNoTooltip]!"
  flavor_sco.102.title: "Відродження проти узурпаторів"
  flavor_sco.102.desc: "Лідерство [sco_regent.GetName] та об'єднання [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] за [sco_heir.GetName] призвело до майже повного краху сил [GetCountry('SBL').GetName], з ознаками дезертирства. Хоча [sbl_ruler.GetName] все ще має підтримку військової скарбниці [GetCountry('ENG').GetAdjective], моральна підтримка [GetCountry('SBL').GetNameWithNoTooltip] повністю впала."
  flavor_sco.102.a: "Ми назавжди виженемо цю [GetCountry('ENG').GetAdjectiveWithNoTooltip] маріонетку!"
  flavor_sco.103.title: "Вшановуючи Старий Альянс"
  flavor_sco.103.desc: "Недавня війна між [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName] викликала жвавий інтерес у [sco_ruler.GetName] та інших членів [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Згідно з умовами Старого Альянсу, якщо одна сторона буде атакована [GetCountry('ENG').GetNameWithNoTooltip], інша сторона повинна буде розпочати вторгнення на [GetCountry('ENG').GetAdjectiveWithNoTooltip] території.\n\nХоча [ROOT.GetCountry.GetName] все ще оговтується від наслідків спроб [GetCharacter('sco_edward_balliol').GetDynasty.GetName] захопити корону, ситуація в [GetCountry('FRA').GetNameWithNoTooltip] надає можливість вшанувати наш альянс і розпочати вторгнення на [GetCountry('ENG').GetAdjectiveWithNoTooltip] території."
  flavor_sco.103.a: "Ми вшануємо наш альянс із [GetCountry('FRA').GetNameWithNoTooltip]!"
  flavor_sco.103.b: "Ми можемо вшанувати наш альянс іншими способами."
  flavor_sco.103.c: "Вторгнення в [GetCountry('ENG').GetNameWithNoTooltip] було б надто ризикованим, навіть зараз."
  flavor_sco.104.title: "Вільний та Незалежний [ROOT.GetCountry.GetFlavorRank]"
  flavor_sco.104.desc: "З моменту повернення до влади правління [sco_ruler.GetName] призвело до того, що [ROOT.GetCountry.GetFlavorRank] став найстабільнішим за багато років, особливо після тривалого конфлікту, який [ROOT.GetCountry.GetName] пережив з [GetCountry('ENG').GetName] в останні десятиліття. Однак тепер [sco_ruler.GetShortNameWithNoTooltip] започаткував еру фінансового процвітання разом зі співпрацею з різними кланами [GetCountry('SCO').GetGovernment.GetEstateName('nobles_estate')], створюючи видимість найбільш незалежного [ROOT.GetCountry.GetNameWithNoTooltip] за століття."
  flavor_sco.104.a: "Незалежність [ROOT.GetCountry.GetNameWithNoTooltip] нарешті забезпечена!"
  flavor_sco.104.b: "Настав час миру та процвітання."
  flavor_sco.105.title: "Піднесення династії [target_character.GetDynasty.GetNameWithNoTooltip]"
  flavor_sco.105.desc: "Хоча [sco_ruler.GetName] виявився здібним [ROOT.GetCountry.GetGovernment.GetRulerTitle], [sco_ruler.GetHisHer] вибір наступників викликав несхвалення багатьох у [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Побоюючись, що може статися, якщо правління [sco_ruler.GetNameWithNoTooltip] закінчиться, кілька радників у [ROOT.GetCountry.GetGovernment.GetCourtTitle] вважають, що [ROOT.GetCountry.GetName] може знову бути вкинутий у кризу, якщо [sco_ruler.GetHisHer] наступник буде слабким.\n\nПрагнучи запобігти черговій катастрофі, яка могла б підірвати [ROOT.GetCountry.GetAdjectiveWithNoTooltip] незалежність, кілька членів [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували назвати [target_character.GetName] новим спадкоємцем [sco_ruler.GetNameWithNoTooltip]. Зв'язок [target_character.GetNameWithNoTooltip] з родоводом [GetCharacter('sco_robert_the_bruce').GetDynasty.GetNameWithNoTooltip] через [target_character.GetHisHer] матір, [GetCharacter('sco_marjorie_bruce').GetName], також зміцнив би [target_character.GetHisHer] потенційне правління над [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_sco.105.a: "Назвати [target_character.GetNameWithNoTooltip] наступником."
  flavor_sco.105.b: "Спадкоємці [sco_ruler.GetNameWithNoTooltip] з часом доведуть свою спроможність."
  tooltip_house_of_stewart_council_succession: "Після смерті [sco_ruler.GetName] буде скликана рада для передачі трону [target_character.GetName]."
  flavor_sco.106.title: "Сходження династії [target_character.GetDynasty.GetNameWithNoTooltip]"
  flavor_sco.106.desc: "Смерть [sco_old_ruler.GetName] змусила [ROOT.GetCountry.GetGovernment.GetParliament.GetName] скликати раду для обговорення спадкоємства [target_character.GetName] на трон. Незважаючи на те, що [sco_old_ruler.GetShortNameWithNoTooltip] назвав [target_character.GetNameWithNoTooltip] спадкоємцем, його раптове сходження було розкритиковано кількома меншими [ROOT.GetCountry.GetAdjective] кланами, хоча більшість вирішила поважати бажання [sco_old_ruler.GetNameWithNoTooltip].\n\nЛише час покаже, чи зможе [target_character.GetShortNameWithNoTooltip] продовжити спадщину правління [sco_old_ruler.GetDynasty.GetNameWithNoTooltip] над [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_sco.106.a: "[target_character.GetNameWithNoTooltip] стане чудовим правителем."
  flavor_sco.107.title: "Догана від [ROOT.GetCountry.GetAdjectiveWithNoTooltip] кланів"
  flavor_sco.107.desc: "Хоча сходження дому [sco_ruler.GetDynasty.GetName] на трон спочатку отримало підтримку серед [ROOT.GetCountry.GetAdjective] кланів, деякі тепер почали засуджувати правління [sco_ruler.GetName], посилаючись на зростаючу консолідацію менших володінь, які безпосередньо належать дому [sco_ruler.GetDynasty.GetNameWithNoTooltip]. Хоча деякі члени ради пропонували запропонувати поступки, щоб заспокоїти ці непокірні клани, подальша консолідація за [ShowPolicyName('dynastic_holdings_conslidated')] лише погіршить відносини з кланами з часом."
  flavor_sco.107.a: "Ігнорувати їх, з часом вони зникнуть у невідомості."
  flavor_sco.107.b: "Запропонувати поступки, щоб заспокоїти їх наразі."
  flavor_sco.108.title: "Консолідація кланових володінь"
  flavor_sco.108.desc: "Прагнучи зміцнити владну базу [sco_ruler.GetDynasty.GetName] у [ROOT.GetCountry.GetName], [sco_ruler.GetName] доклав значних зусиль для консолідації багатьох слабших володінь і територій під прямим контролем дому [sco_ruler.GetDynasty.GetNameWithNoTooltip]. Хоча передача титулів досі не викликала обурення серед великих кланів, оскільки [sco_ruler.GetNameWithNoTooltip] винагородив попередніх власників титулів, деякі менші клани [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] почали висловлювати занепокоєння [ROOT.GetCountry.GetGovernment.GetCourtTitle] щодо того, що подальша консолідація загрожуватиме їхній автономії.\n\n[sco_ruler.GetShortNameWithNoTooltip] попросив [ROOT.GetCountry.GetGovernment.GetCourtTitle] підтримати [sco_ruler.GetHisHer] консолідацію титулів і територій до дому [sco_ruler.GetDynasty.GetNameWithNoTooltip], але зміна офіційної політики, ймовірно, почне викликати гнів великих кланів."
  flavor_sco.108.a: "Схвалити політику [sco_ruler.GetNameWithNoTooltip] та офіційно її прийняти."
  flavor_sco.108.b: "Запобігти подальшій консолідації титулів, щоб заспокоїти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_sco.109.title: "[ShowWorkOfArtNameWithNoTooltip('the_brus')]"
  flavor_sco.109.desc: "Прагнучи ще більше зміцнити правління [sco_ruler.GetDynasty.GetName] над [ROOT.GetCountry.GetName], [sco_ruler.GetName] за фінансової підтримки [ROOT.GetCountry.GetGovernment.GetCourtTitle] доручив [target_character.GetName] написати поему [ShowWorkOfArtName('the_brus')]. Основою поеми є розповідь про [GetCharacter('sco_robert_the_bruce').GetName] та боротьбу за [ROOT.GetCountry.GetAdjectiveWithNoTooltip] незалежність після битви при Баннокберні. Як спадкоємці королівства, збудованого [GetCharacter('sco_robert_the_bruce').GetNameWithNoTooltip], ця поема ще більше легітимізує правління [sco_ruler.GetDynasty.GetNameWithNoTooltip]."
  flavor_sco.109.a: "Це буде поема на віки."
  flavor_sco.109.b: "Нам не потрібна ця поема, щоб ще більше легітимізувати наше правління."
  flavor_sco.110.title: "Процвітаюче правління [sco_ruler.GetNameWithNoTooltip]"
  flavor_sco.110.desc: "Правління [sco_ruler.GetName] виявилося досить плідним, оскільки з моменту [sco_ruler.GetHisHer] коронації [ROOT.GetCountry.GetName] насолоджувалося періодом продуктивності та стабільності. Хоча початок століття виявився небезпечним часом для [ROOT.GetCountry.GetNameWithNoTooltip], що зазнало багатьох труднощів у війнах з [GetCountry('ENG').GetName], правління [sco_ruler.GetShortNameWithNoTooltip] принесло значне поповнення скарбниці, а також бум [ROOT.GetCountry.GetAdjectiveWithNoTooltip] вовняної промисловості.\n\nПрагнучи ще більше скористатися цими здобутками, [ROOT.GetCountry.GetGovernment.GetCourtTitle] поставив [sco_ruler.GetShortNameWithNoTooltip] питання про те, чи будуть кошти з розширеної скарбниці перерозподілені [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] для продовження цього економічного буму."
  flavor_sco.110.a: "Скористаємося перевагами цієї золотої доби."
  flavor_sco.110.b: "Використаємо [ROOT.GetCountry.GetGovernment.GetAdjective|U] скарбницю та винагородимо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  flavor_sco.111.title: "[GetCountry('ENG').GetAdjectiveWithNoTooltip] прикордонні анклави"
  flavor_sco.111.desc: "Хоча [ROOT.GetCountry.GetName] та [GetCountry('ENG').GetName] не воювали вже досить давно, [GetCountry('ENG').GetAdjectiveWithNoTooltip] вплив на наші території все ще залишається значним. Уздовж кордону з [GetCountry('ENG').GetNameWithNoTooltip] багато місцевих правителів міст і містечок почали називати [eng_ruler.GetName] своїм [eng_country.GetGovernment.GetRulerTitle], а також запрошувати [GetCountry('ENG').GetAdjectiveWithNoTooltip] гарнізони для їхнього захисту.\n\nЦі території все ще перебувають у прямій [ROOT.GetCountry.GetAdjectiveWithNoTooltip] власності, хоча [sco_ruler.GetName] та рада відкрито засудили цей анклав як загрозу [ROOT.GetCountry.GetAdjectiveWithNoTooltip] суверенітету. Прямі дії проти анклавів ризикують відновити конфлікт з [GetCountry('ENG').GetNameWithNoTooltip]."
  flavor_sco.111.a: "Ці анклави мають бути викорінені!"
  flavor_sco.111.b: "Залишимо анклави без оскарження наразі."
  flavor_sco.112.title: "[sco_ruler.GetShortNameWithNoTooltip] та сучасна артилерія"
  flavor_sco.112.desc: "Хоча запровадження гармати досить сильно змінило способи ведення війни, її використання в [ROOT.GetCountry.GetName] залишалося досить обмеженим, і багато [ROOT.GetCountry.GetAdjectiveWithNoTooltip] лідерів все ще покладалися на традиційну облогову зброю, таку як требушет.\n\nЗацікавившись використанням порохової зброї з нещодавніх війн між [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName], [sco_ruler.GetName] попросив раду розглянути можливість її запровадження в нашій армії."
  flavor_sco.112.a: "Приймімо цю потужну зброю!"
  flavor_sco.112.b: "Залишимося вірними традиційній війні!"
  flavor_sco.200.title: "Затвердження влади над [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  flavor_sco.200.desc: "З часів правління [GetCharacter('sco_david_i').GetName] [ROOT.GetCountry.GetName] та [GetCountry('PAP').GetName] підтримували тісні стосунки. Однак [sco_ruler.GetName] почав вважати початкову доброзичливість [GetCharacter('sco_david_i').GetShortNameWithNoTooltip] до [GetCountry('PAP').GetNameWithNoTooltip] занадто дорогою для [ROOT.GetCountry.GetNameWithNoTooltip], щоб її тепер нести.\n\nПрагнучи переосмислити вплив держави на [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [sco_ruler.GetNameWithNoTooltip] разом із прихильниками в раді розробили нову політику, яка підпорядковує багато інституцій [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] по всьому [ROOT.GetCountry.GetNameWithNoTooltip] безпосередній юрисдикції [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')].\n\nХоча деякі представники [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] висловили підтримку цій політиці, багато високопоставлених прелатів попросили зробити положення, яке дозволить їм зберегти обмежену взаємодію з [ShowSpecialStatusNameWithNoTooltip('curia')]."
  flavor_sco.200.a: "Юрисдикція [ROOT.GetCountry.GetNameWithNoTooltip] належить виключно [sco_ruler.GetNameWithNoTooltip]."
  flavor_sco.200.b: "Обмежити [GetCountry('PAP').GetAdjectiveWithNoTooltip] нагляд, але дозволити прелатам доступ до [ShowSpecialStatusNameWithNoTooltip('curia')]."
  flavor_sco.200.c: "Відхилити пропозицію повністю."
  flavor_sco.201.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] просить примирення з [sco_ruler.GetShortNameWithNoTooltip]"
  flavor_sco.201.desc: "Після прийняття [ShowPolicyName('crown_religious_jurisdiction')] відносини між [sco_ruler.GetName] та [GetCountry('PAP').GetName] погіршилися. Незважаючи на це, багато [ROOT.GetCountry.GetAdjective] високопоставлених прелатів все ще отримували запрошення від [GetCountry('PAP').GetNameWithNoTooltip] брати участь у справах, пов'язаних з [ShowSpecialStatusNameWithNoTooltip('curia')].\n\nПрагнучи примиритися з [sco_ruler.GetNameWithNoTooltip], [pap_ruler.GetName] запропонував значний вплив у [ShowSpecialStatusNameWithNoTooltip('curia')] разом з оновленою оливковою гілкою в обмін на скасування [ShowPolicyNameWithNoTooltip('crown_religious_jurisdiction')]."
  flavor_sco.201.a: "Погодитися на примирення з [pap_ruler.GetNameWithNoTooltip]."
  flavor_sco.201.b: "Ми збережемо власну юрисдикцію."
  flavor_sco.202.title: "Експедиції в Гайлендс"
  flavor_sco.202.desc: "Протягом правління [sco_ruler.GetName] багато лордів у Високогір'ї стали вороже ставитися до нинішнього [ROOT.GetCountry.GetGovernment.GetRulerTitle] і відмовлялися виконувати [sco_ruler.GetHisHer] вимоги.\n\nПрагнучи відновити владу над цими непокірними лордами, [sco_ruler.GetNameWithNoTooltip] попросив раду надати [sco_ruler.GetHimHer] кошти для організації експедиції у Високогір'я та приборкання цих лордів. Хоча більшість ради готові схвалити запит [ROOT.GetCountry.GetGovernment.GetRulerTitle], деякі побоюються, що експедиція може призвести до конфлікту для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], якщо експедиція перевищить свої цілі."
  flavor_sco.202.a: "Настав час розібратися з цими непокірними лордами."
  flavor_sco.202.b: "Експедиція несе занадто великий ризик для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
  flavor_sco.203.title: "Відновлення Старого Альянсу"
  flavor_sco.203.desc: "З моменту свого підписання у 1295 році Старий Альянс залишався одним із ключових наріжних каменів у тісних відносинах між [ROOT.GetCountry.GetName] та [GetCountry('FRA').GetName], причому обидві сторони продовжували поновлювати альянс.\n\nЗнову настав час для обох сторін поновити альянс, і хоча наші [GetCountry('FRA').GetAdjectiveWithNoTooltip] друзі залишаються відкритими для продовження альянсу, деякі радники в [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували ідею, що [ROOT.GetCountry.GetNameWithNoTooltip] має шукати інших союзників.\n\nХоча [GetCountry('FRA').GetNameWithNoTooltip] виявилася здібним союзником, вона також зробила [ROOT.GetCountry.GetNameWithNoTooltip] значною мірою залежною від [GetCountry('FRA').GetAdjectiveWithNoTooltip]."
  flavor_sco.203.a: "Продовжуймо підтримувати цей тісний альянс із [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_sco.203.b: "Настав час шукати інших європейських союзників."
  flavor_sco.203.historical_info: "У 1512 році Франція та Шотландія поновили свій «Старий Альянс» як противагу втручанню Англії в антифранцузькі схеми Папи Юлія II. Це пізніше втягнуло шотландців у катастрофічну війну проти англійців."
  flavor_sco.204.title: "Заснування [ShowLocationNameWithNoTooltip('aberdeen')] [ShowBuildingTypeNameWithNoTooltip('university')]"
  flavor_sco.204.desc: "Меценат мистецтв, [sco_ruler.GetName] попросив [ROOT.GetCountry.GetGovernment.GetCourtTitle] спонсорувати створення нового [ShowBuildingTypeName('university')] в [ShowLocationName('aberdeen')]. Хоча [ShowBuildingTypeNameWithNoTooltip('university')] вже отримав схвалення [pap_ruler.GetName] із санкцією золотої булли, багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] все ще турбується, що амбіції моделювати [ShowBuildingTypeNameWithNoTooltip('university')] за зразком тієї, що в [ShowLocationName('paris')], можуть виявитися занадто дорогими. Однак, якщо проєкт продовжиться, [ShowBuildingTypeNameWithNoTooltip('university')] має потенціал стати конкурентом багатьом іншим [ShowBuildingTypeNameWithNoTooltip('university')] по всій [ShowRegionName('great_britain_region')]."
  flavor_sco.204.a: "Побудувати [ShowBuildingTypeNameWithNoTooltip('university')]!"
  flavor_sco.204.b: "Проєкт буде занадто дорогим."
  flavor_sco.205.title: "Розширення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetAdjective|U] флоту"
  flavor_sco.205.desc: "Хоча [ROOT.GetCountry.GetName] підтримувала невеликий [ROOT.GetCountry.GetGovernment.GetAdjective] флот, він завжди бліднув у порівнянні з флотом [GetCountry('ENG').GetName]. Прагнучи відкрити шляхи через [ShowAreaName('north_sea_area')|U] до [ShowContinentName('europe')], [sco_ruler.GetName] запросив фінансування для потенційного розширення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetAdjective] флоту, що дозволить йому досягти здатності кинути виклик [GetCountry('ENG').GetNameWithNoTooltip].\n\nХоча деякі члени ради погоджуються з [sco_ruler.GetNameWithNoTooltip], інші запропонували, щоб [ROOT.GetCountry.GetNameWithNoTooltip] подвоїла свої армійські зусилля, щоб надалі запобігти вторгненню з [GetCountry('ENG').GetNameWithNoTooltip]. Однак, якщо новини про розширення флоту досягнуть [GetCountry('ENG').GetNameWithNoTooltip], [GetCountry('ENG').GetAdjectiveWithNoTooltip] може відчути потребу вжити заходів."
  flavor_sco.205.a: "Профінансувати розширення [ROOT.GetCountry.GetGovernment.GetAdjective] флоту!"
  flavor_sco.205.b: "Ці кошти краще витратити на нашу армію."
  flavor_sco.206.title: "Занепад [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  flavor_sco.206.desc: "Хоча засідання та консенсуси [ROOT.GetCountry.GetGovernment.GetParliament.GetName] за часів [GetCharacter('sco_robert_the_bruce').GetName] та [GetCharacter('sco_david_ii').GetName] проклали шлях до єдності та успіху, в останні десятиліття зростаюча консолідація влади до [sco_ruler.GetName] разом з ефективністю [sco_ruler.GetHisHer] правління призвела до того, що [ROOT.GetCountry.GetGovernment.GetParliament.GetName] скликався рідше. Хоча деякі члени ради запропонували, щоб [ROOT.GetCountry.GetGovernment.GetParliament.GetName] все ще скликався навіть для дрібних справ, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], більше не покладаючись на його поради, дозволив йому зрости у владі."
  flavor_sco.206.a: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName] буде скликатися лише за потреби."
  flavor_sco.206.b: "Давайте знову скликаємо [ROOT.GetCountry.GetGovernment.GetParliament.GetName], як у давні часи."
  flavor_sco.207.title: "[ShowBuildingTypeNameWithNoTooltip('sco_palace_of_holyroodhouse')]"
  flavor_sco.207.desc: "Місце [sco_ruler.GetHisHer] шлюбу з [sco_consort.GetName], [sco_ruler.GetName] запросив кошти на будівництво нового [ROOT.GetCountry.GetGovernment.GetAdjective] палацу на території Голірудгаусу в [ShowLocationName('edinburgh')]. Хоча замовлення нового палацу не є новим досягненням для [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetRulerTitle], [sco_ruler.GetShortNameWithNoTooltip] бажає, щоб цей новий палац став символом готичної архітектури, а також [sco_ruler.GetHisHer] правління.\n\nХоча будівництво палацу може виявитися дорогим порівняно з попередніми проєктами, [ShowBuildingTypeName('sco_palace_of_holyroodhouse')] може стати символом [ROOT.GetCountry.GetAdjectiveWithNoTooltip] престижу."
  flavor_sco.207.a: "Побудувати палац!"
  flavor_sco.207.b: "Відмовитися від планів щодо палацу та перерозподілити ресурси."
  flavor_sco.209.title: "Релігійний розкол [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_sco.209.desc: "Вчення [target_character.GetName] призвело до швидкого поширення [ShowReligionNameWithNoTooltip('calvinist')] по [ROOT.GetCountry.GetName]. Хоча багато [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] по всьому [ROOT.GetCountry.GetNameWithNoTooltip] прийняли вчення [target_character.GetLastNameWithNoTooltip], значна частина [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вирішила залишитися вірною [ShowReligionAdjectiveWithNoTooltip('catholic')] вірі. Хоча деякі великі клани були відкриті до вчень [target_character.GetLastNameWithNoTooltip], вони, ймовірно, навернулися б лише в тому випадку, якщо держава офіційно прийняла б [ShowReligionNameWithNoTooltip('calvinist')].\n\nХоча деякі члени ради пропонують вжити заходів для придушення вчень [target_character.GetLastNameWithNoTooltip], таке придушення також принесе ризики релігійного повстання. Інші члени ради запропонували політику толерантності та не вживати подальших дій проти [target_character.GetNameWithNoTooltip] та [target_character.GetHisHer] послідовників."
  flavor_sco.209.a: "Прийняти толерантну політику щодо послідовників [target_character.GetLastNameWithNoTooltip]"
  flavor_sco.209.b: "Прийняти вчення [target_character.GetLastNameWithNoTooltip]"
  flavor_sco.209.c: "Боротися проти єретиків!"
  flavor_sco.210.title: "Грубе залицяння"
  flavor_sco.210.desc: "Прагнучи розірвати давній союз між [ROOT.GetCountry.GetName] та [GetCountry('FRA').GetName], посол з [GetCountry('ENG').GetName] прибув з вимогами, щоб [ROOT.GetCountry.GetNameWithNoTooltip] припинила свої давні відносини з [GetCountry('FRA').GetNameWithNoTooltip]. Хоча Старий Альянс спочатку був задуманий як оборонний пакт проти [GetCountry('ENG').GetNameWithNoTooltip], вимоги, надіслані [eng_ruler.GetName], стверджують, що початкова мета зникла, і що альянс залишається виключно для того, щоб дозволити [GetCountry('FRA').GetNameWithNoTooltip] розпочати вторгнення в [GetCountry('ENG').GetNameWithNoTooltip] з [ROOT.GetCountry.GetNameWithNoTooltip].\n\nЗгідно з вимогами, [eng_ruler.GetNameWithNoTooltip] пообіцяв сердечні та мирні відносини з [ROOT.GetCountry.GetNameWithNoTooltip], якщо вона погодиться на його умови. Однак, якщо [ROOT.GetCountry.GetNameWithNoTooltip] відмовиться, [GetCountry('ENG').GetNameWithNoTooltip] вважатиме, що їй доведеться вжити заходів для захисту свого суверенітету."
  flavor_sco.210.a: "Відмовитися від [GetCountry('ENG').GetAdjectiveWithNoTooltip] вимог!"
  flavor_sco.210.b: "Задобрити [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetRulerTitle] і розірвати відносини з [GetCountry('FRA').GetNameWithNoTooltip]."
  flavor_sco.301.title: "Внутрішні розбіжності, старі вороги"
  flavor_sco.301.desc: "З моменту вступу на престол [sco_ruler.GetName] зіткнувся з важкою політикою, що вимагала балансувати відносини з [GetCountry('ENG').GetNameWithNoTooltip], одночасно керуючи внутрішньою нестабільністю, яка охопила [ROOT.GetCountry.GetName] з приходом Реформації з [target_character.GetName].\n\nХоча [sco_ruler.GetShortNameWithNoTooltip] доклав [sco_ruler.GetHisHer] максимум зусиль для врегулювання релігійного конфлікту в [ROOT.GetCountry.GetNameWithNoTooltip], багато хто в раді критикував [sco_ruler.GetHisHer] підхід, оскільки [ROOT.GetCountry.GetGovernment.GetRulerTitle] зберігав фіксацію на поточних справах [GetCountry('ENG').GetNameWithNoTooltip], що іноді шкодило внутрішній стабільності."
  flavor_sco.301.a: "[GetCountry('ENG').GetNameWithNoTooltip] залишається нашою найбільшою загрозою і має бути пріоритетом."
  flavor_sco.301.b: "Внутрішні справи [ROOT.GetCountry.GetNameWithNoTooltip] повинні бути пріоритетом [sco_ruler.GetNameWithNoTooltip]!"
  flavor_sco.302.title: "[ShowWorkOfArtNameWithNoTooltip('sco_true_law')] та [ShowWorkOfArtNameWithNoTooltip('sco_basilikon')]"
  flavor_sco.302.desc: "Прагнучи закласти теологічну основу для [ROOT.GetCountry.GetFlavorRank], [sco_ruler.GetName] завершив написання [ShowWorkOfArtName('sco_true_law')] та [ShowWorkOfArtName('sco_basilikon')]. У [ShowWorkOfArtNameWithNoTooltip('sco_true_law')] [sco_ruler.GetShortNameWithNoTooltip] стверджує, що кожен [ROOT.GetCountry.GetGovernment.GetRulerTitle] нації є найвищою особою влади на землі через Божественне право на правління. У той час як [ShowWorkOfArtNameWithNoTooltip('sco_true_law')] обґрунтовує владу [ROOT.GetCountry.GetGovernment.GetRulerTitle] на правління, у [ShowWorkOfArtNameWithNoTooltip('sco_basilikon')] [sco_ruler.GetShortNameWithNoTooltip] викладає основи того, як [ROOT.GetCountry.GetGovernment.GetRulerTitle] повинен правити, а також обов'язки, які несе [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nХоча багатьом у [ROOT.GetCountry.GetGovernment.GetCourtTitle] сподобалися твори [sco_ruler.GetShortNameWithNoTooltip], деякі запропонували ідею розповсюдження копій творів серед різних монархів [ShowContinentName('europe')], оскільки вони можуть похвалити твори [sco_ruler.GetShortNameWithNoTooltip]."
  flavor_sco.302.a: "Опублікувати твори [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  flavor_sco.302.b: "Поки що залишити твори [ROOT.GetCountry.GetGovernment.GetRulerTitle] як особливість [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_sco.303.title: "Статути Айони"
  flavor_sco.303.desc: "Хоча багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], що проживають у [ROOT.GetCountry.GetAdjective] низинах, віддають своїх спадкоємців на навчання до місцевих шкіл, багато з решти [ShowCultureName('highland')] кланів все ще дотримуються традиційної освіти.\n\nЗ часом це стало розглядатися як шкода для [ROOT.GetCountry.GetNameWithNoTooltip]. Деякі в [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували прийняти нову політику, яка змусить членів цих кланів записувати своїх спадкоємців до однієї з різних шкіл у низинах [ROOT.GetCountry.GetNameWithNoTooltip].\n\nЦя політика, безсумнівно, створить більш освічене покоління лідерів кланів, але деякі побоюються, що вона призведе до того, що [ShowCultureNameWithNoTooltip('highland')] клани стануть схожими на клани низин."
  flavor_sco.303.a: "Впровадити Статути."
  flavor_sco.303.b: "Дозволити кланам зберегти свою освітню автономію."
  flavor_sco.304.title: "[ShowWorkOfArtNameWithNoTooltip('sco_divine_art_of_poesie')]"
  flavor_sco.304.desc: "Прагнучи закласти основи [ShowCultureName('scottish')] поезії, [sco_ruler.GetName] опублікував [ShowWorkOfArtName('sco_divine_art_of_poesie')], викладаючи те, що [sco_ruler.GetHeShe] вважає стандартом поезії. Саме завдяки цій праці [sco_ruler.GetShortNameWithNoTooltip] сподівається вплинути на майбутнє [ShowCultureNameWithNoTooltip('scottish')] поезії, а [ShowWorkOfArtNameWithNoTooltip('sco_divine_art_of_poesie')] стане зразком для майбутніх поетів.\n\nХоча трактат написаний [ShowCultureNameWithNoTooltip('scottish')], кілька осіб у [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували подарувати копію, щоб викликати новий інтерес до [ShowCultureNameWithNoTooltip('scottish')] поезії."
  flavor_sco.304.a: "Чудовий посібник, якому варто слідувати [sco_ruler.GetNameWithNoTooltip]."
  flavor_sco.304.b: "Поширити посібник далеко і широко!"
  flavor_sco.400.title: "Експедиція до Нового Світу"
  flavor_sco.400.desc: "Хоча історії про Новий Світ були відомі [ROOT.GetCountry.GetName] вже досить давно, багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] застерігали від перспектив підприємств у новому світі. Посилаючись на те, що потенційні невдачі були б дорогими для [ROOT.GetCountry.GetAdjectiveWithNoTooltip] фінансів, ризик, який несуть ці колоніальні підприємства, залишив би державу у фінансовій руїні.\n\nОднак група інвесторів звернулася до [sco_ruler.GetName] з надією профінансувати підприємство в Новому Світі, надаючи [ROOT.GetCountry.GetNameWithNoTooltip] можливість стати колоніальною державою. Хоча [sco_ruler.GetShortNameWithNoTooltip] відкритий до цієї ідеї, якщо колонія буде заснована, вона повинна бути прибутковою, щоб [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] могла її підтримувати, інакше [ROOT.GetCountry.GetGovernment.GetAdjective] скарбниця ризикує постраждати."
  flavor_sco.400.a: "Ми розпочнемо експедицію за підтримки інвесторів!"
  flavor_sco.400.b: "Призупинити будь-які колоніальні амбіції наразі."
  flavor_sco.401.title: "[ShowWorkOfArtNameWithNoTooltip('treatise_of_human_nature')]"
  flavor_sco.401.desc: "Відомий філософ [target_character.GetHisHer] часу, [target_character.GetName] за останні роки здобув значну репутацію завдяки [target_character.GetHisHer] внеску в цю галузь. Прагнучи зробити ще один внесок, [target_character.GetShortNameWithNoTooltip] опублікував [target_character.GetHisHer] [ShowWorkOfArtName('treatise_of_human_nature')], заслуживши похвалу багатьох у цій галузі за глибокий аналіз того, що визначає людську природу.\n\nПрагнучи підтримати роботу філософа, деякі в [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували, щоб [ROOT.GetCountry.GetFlavorRank] допоміг у розповсюдженні роботи [target_character.GetLastNameWithNoTooltip]."
  flavor_sco.401.a: "Дозвольте нам зробити внесок у видання [ShowWorkOfArtNameWithNoTooltip('treatise_of_human_nature')]!"
  flavor_sco.401.b: "Держава не втручатиметься в роботу [target_character.GetLastNameWithNoTooltip]."