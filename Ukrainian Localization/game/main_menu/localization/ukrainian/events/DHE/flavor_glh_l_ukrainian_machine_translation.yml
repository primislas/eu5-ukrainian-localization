l_english:
  flavor_glh.1.title: "Татарське ярмо"
  flavor_glh.1.desc: "Після успішного вторгнення на руські землі ми підкорили тих, хто охоче відчинив свої ворота [ROOT.GetCountry.GetName]. Щоб зберегти контроль над [ShowCultureGroupName('russian_group')] князівствами, ми створили складну систему данини, вимагаючи щорічної данини монетами та боєздатними чоловіками, щоб запобігти будь-якому відродженню та придушити майбутні виклики нашій владі.\n\nЩоб заохотити міжусобиці серед князів, ми надаємо щедрий титул [GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle] тому, кого вважаємо гідним, хто, своєю чергою, збиратиме податки від нашого імені з решти данників."
  flavor_glh.1.a: "Що б не тримало їх у покорі."
  flavor_glh.1.tt: "[target_root_country.GetName] може обрати нового [ShowSpecialStatusName('tatar_tax_collector')] для [tatar_yoke.GetName] за запитом"
  flavor_glh.1.historical_info: "Татарське ярмо стосується панування та правління Золотої Орди над Східною Європою, яка вторглася в регіон у тринадцятому столітті та нав'язала форму системи данини східнослов'янським герцогствам та князівствам. Термін «ярмо» стосується данини, що належала монголам і татарам, але також став включати примусову військову службу, яка була обов'язковою для слов'янських підданих. Татарське ярмо проіснувало до того часу, як Золота Орда почала занепадати в п'ятнадцятому столітті."
  flavor_glh.2.title: "[target_root_country.GetGovernment.GetRuler.GetShortNameWithNoTooltip] «Калита» [target_root_country.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]"
  flavor_glh.2.desc_kalita_the_tax_collector: "[GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle] [GetUniqueInternationalOrganization('tatar_yoke').GetName], [target_root_country.GetGovernment.GetRuler.GetName], продовжує добре служити нам у забезпеченні збору всіх податків з наших підданих на руських землях. Однак було висловлено припущення, що данники можуть надати додаткові монети до нашої скарбниці, які [GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle] запропонував зібрати від нашого імені. Такі ініціативи, безумовно, будуть винагороджені дозволом [target_root_country.GetGovernment.GetRuler.GetHimHer] зберегти титул та супутні привілеї."
  flavor_glh.2.desc_discovered_treachery: "[GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle] [GetUniqueInternationalOrganization('tatar_yoke').GetName], [target_root_country.GetGovernment.GetRuler.GetName], був викритий у приховуванні життєво важливої інформації, яка була б дуже корисною для нас. Здається, що данники на руських землях можуть надати додаткові монети до нашої скарбниці, які [GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle] має повноваження збирати від нашого імені, проте цього не було зроблено. Таку зраду не слід залишати безкарною, і, можливо, було б доцільно розглянути нового власника титулу та його супутніх привілеїв."
  flavor_glh.2.desc: "[GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle] [GetUniqueInternationalOrganization('tatar_yoke').GetName], [target_root_country.GetGovernment.GetRuler.GetName], був викритий у приховуванні життєво важливої інформації від [GetCountry('GLH').GetGovernment.GetRulerTitle], яка була б дуже корисною для [ShowCultureGroupName('tatar_group')]. Здається, були плани зібрати з нас додаткову данину, яку [GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle] має повноваження збирати від імені [GetCountry('GLH').GetLongName], проте цього не було зроблено. Ми повинні похвалити цей акт хоробрості та молитися, щоб ця інформація залишалася прихованою."
  flavor_glh.2.a: "Очікується покора, але вона визнається."
  flavor_glh.2.tt1: "Довіра між [GetCountry('GLH').GetGovernment.GetRulerTitle] та [GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle] зростає"
  STATIC_MODIFIER_NAME_kalita: "Калита"
  flavor_glh.2.b: "Ми не прощаємо і не забуваємо."
  flavor_glh.2.c: "Несподіваний акт доброти."
  flavor_glh.3.title: "Битва князів"
  flavor_glh.3.desc_direct_appeal_to_khan: "Як член [GetUniqueInternationalOrganization('tatar_yoke').GetName], правителі князівств під нашим захистом традиційно підлягали затвердженню [ROOT.GetCountry.GetGovernment.GetRulerTitle] перед тим, як зайняти трон. Правитель [target_root_country.GetName], чиє право на правління вже було підтверджено, перебуває в розпалі боротьби за владу з близьким родичем, і тому надіслав емісара з проханням підтвердити призначення [target_root_country.GetGovernment.GetRuler.GetName]."
  flavor_glh.3.desc_endorses_ruler: "[GetCountry('GLH').GetGovernment.GetRulerTitle] [GetCountry('GLH').GetLongName] постановив, що [target_root_country.GetGovernment.GetRuler.GetName] зберігає прихильність [GetCountry('GLH').GetGovernment.GetRuler.GetName] щодо правління над [target_root_country.GetName]."
  flavor_glh.3.desc_endorses_pretender: "[GetCountry('GLH').GetGovernment.GetRulerTitle] [GetCountry('GLH').GetName] постановив, що [target_root_country.GetGovernment.GetRuler.GetName] більше не зберігає прихильність [GetCountry('GLH').GetGovernment.GetRuler.GetName] щодо правління над [target_root_country.GetName]. Натомість [GetCountry('GLH').GetGovernment.GetRulerTitle] віддає перевагу правлінню [pretender.GetName]."
  flavor_glh.3.a: "Підтримати лідерство [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip]."
  flavor_glh.3.tt1: "Це зменшить ймовірність війни за спадщину в [target_root_country.GetNameWithNoTooltip]"
  flavor_glh.3.b: "Підтримати лідерство [pretender.GetNameWithNoTooltip]."
  flavor_glh.3.tt2: "Це, ймовірно, призведе до війни за спадщину в [target_root_country.GetNameWithNoTooltip]"
  flavor_glh.3.c: "Прийняти рішення."
  flavor_glh.1000.title: "Новий [ShowSpecialStatusNameWithNoTooltip('tatar_tax_collector')]?"
  flavor_glh.1000.desc: "[actor.GetName] попросив надати йому посаду [ShowSpecialStatusName('tatar_tax_collector')], яку зараз займає [old_tax_collector.GetName]. Хоча це може порушити баланс у [GetInternationalOrganization('tatar_yoke').GetName] і змусити [old_tax_collector.GetNameWithNoTooltip] стати більш ворожим до нас, це може бути можливістю створити нового [ShowSpecialStatusNameWithNoTooltip('tatar_tax_collector')], більш лояльного, ніж попередній."
  flavor_glh.1000.a: "Ми милостиво надаємо їм новий титул."
  flavor_glh.1000.b: "Ми віддаємо перевагу [old_tax_collector.GetNameWithNoTooltip]"