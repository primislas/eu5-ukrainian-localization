l_english:
  flavor_teu.1.title: "Прусська конфедерація повстає"
  flavor_teu.1.desc: "Попри всі наші зусилля, ми не змогли приборкати спроби Прусської конфедерації підірвати [ROOT.GetCountry.GetAdjective] правління. Міста, що присягнули на вірність Конфедерації, зібрали армію та підняли відкрите повстання. Як ми й підозрювали, багато її членів мають зв’язки з Польщею і вже запросили польську інтервенцію в майбутній конфлікт. Здається, кривава боротьба в Пруссії неминуча, якщо ми не відмовимося від нашого правління над цими містами."
  flavor_teu.1.a: "Вбити кожного зрадника!"
  prussian_confederation_support: "Усі [ShowCultureName('prussian')] [ShowPopTypeName('nobles')] та [ShowPopTypeName('burghers')] в [ShowAreaName('prussia_area')] приєднаються до [prussian_confederation.GetName]"
  flavor_teu.1.tooltip: "[prussian_confederation.GetName] проситиме [GetCountry('POL').GetAdjective] підтримки"
  flavor_teu.1.b: "Це не та війна, яку ми можемо виграти."
  prussian_confederation: "Прусська конфедерація"
  flavor_teu.2.title: "Прусська конфедерація шукає польської підтримки"
  flavor_teu.2.desc: "Організація, що називає себе [prussian_confederation.GetName], повстала проти несправедливості тевтонського правління! Раніше ми давали її членам тихі запевнення, що підтримаємо їхню справу, якщо справа дійде до відкритої війни. В обмін Конфедерація погодилася, що прусські землі повинні бути під владою Польщі після вигнання тиранічних лицарів. Ми багато чого можемо отримати від цієї угоди, але ми повинні бути готові до кривавої боротьби."
  flavor_teu.2.a: "Вони отримають нашу повну підтримку. До бою!"
  flavor_teu.2.b: "Це не наша справа."
  flavor_teu.3.title: "Ящіркова ліга"
  flavor_teu.3.desc: "До нас дійшли чутки про те, що місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у [ShowProvinceDefinitionName('chelmno_province')] організувалися в об'єднання, відоме як «Ящірковий союз». Офіційною метою союзу є боротьба з беззаконням та захист їхніх інтересів. Хоча товариство може здаватися законним за духом, дехто вважає, що його близькість до [GetCountry('POL').GetAdjective] кордону може бути ознакою того, що воно таємно є сепаратистським рухом."
  flavor_teu.3.historical_info: "Ящіркова ліга, відома латиною як #italic Societas Lacertarum#!, була організацією прусських лицарів із Хелмінської землі, заснованою в 1397 році як лицарське братство. Пізніше, у 1410 році, під час Грюнвальдської битви, один із засновників, Ніколаус фон Реніс, опустив прапор Хелмінського полку, спровокувавши відступ. Після цього інциденту члени Союзу були затавровані як зрадники."
  flavor_teu.3.a: "Дозволити Лізі існувати."
  flavor_teu.3.b: "Вони замишляють щось недобре!"
  STATIC_MODIFIER_NAME_teu_lizard_league: "Eidechsenbund"
  flavor_teu.4.title: "Прусська присяга"
  flavor_teu.4.desc: "Поразка [GetCountry('TEU').GetLongName] ознаменувала повернення більшої частини Померелії до нашого лона, а також завоювання територій у [ShowAreaName('prussia_area')]. Хоча й розгромлені, [GetCountry('TEU').GetAdjectiveWithNoTooltip] лицарі все ще стоять і контролюють багато установ у цьому районі.\n\nОскільки території у Східній Пруссії можуть бути важкими для інтеграції, були пропозиції змусити існуючу еліту Ордену секуляризуватися та присягнути на вірність перед [pol_ruler.GetName]. За цією схемою старі території [GetCountry('TEU').GetName] будуть розділені на «[ROOT.GetCountry.GetGovernment.GetAdjective|U] Пруссію», безпосередньо включену до корони, та «Герцогську Пруссію», що перебуває під владою секуляризованих пруссів."
  flavor_teu.4.historical_info: "Після Тринадцятирічної війни проти Тевтонського ордену в 1454-1466 роках Пруссія була розділена на «Королівську Пруссію», що безпосередньо належала Королівству Польському, та східні провінції, які залишилися частиною ордену як васал, відомі як «Герцогська Пруссія». У 1525 році Тевтонська орденська держава була секуляризована її Гохмайстром, Альбрехтом фон Гогенцоллерном, і з того часу стала відома як «Герцогство Пруссія»."
  flavor_teu.4.a: "Змусити їх схилитися!"
  flavor_teu.4.b: "Зберегти статус-кво."
  flavor_teu.5.title: "Хрестоносний запал"
  flavor_teu.5.desc: "[ROOT.GetCountry.GetAdjective] лицарі були запрошені до [ShowAreaName('prussia_area')] у 1226 році на прохання [GetCharacter('maz_konrad_i_piast').GetName] з [ShowAreaName('mazovia_area')]. Їхньою метою було служити хрестоносцями проти язичницьких балтійських пруссів. Будучи наступниками тих відважних воїнів, ми повинні продовжити хрестовий похід проти останніх язичників [ShowContinentName('europe')] у [target_nation.GetLongName]!"
  flavor_teu.5.a: "#italic Christ ist erstanden!#!"
  flavor_teu.5.b: "Нам зараз не потрібен жоден конфлікт."
  flavor_teu.6.title: "[ShowReligionAdjectiveWithNoTooltip('romuva')] язичники в [target_location.GetNameWithNoTooltip]"
  flavor_teu.6.desc: "Підступне [ShowReligionAdjective('romuva')] язичництво не заслуговує на довіру. Ці мерзенні язичники, попри всю доброту та поблажливість, яку ми їм виявили, незважаючи на їхні вірування, влаштували нове повстання в [target_location.GetName]. Хоча воно невелике і не потребує негайної мобілізації наших сил, це все ж незручність для нашої святої місії, і тому його необхідно придушити. Якщо такі неорганізовані натовпи зберуться у більшу силу, [ROOT.GetCountry.GetAdjective] контроль над такими язичницькими провінціями може бути поставлений під загрозу."
  flavor_teu.6.a: "Побудувати [ShowBuildingTypeNameWithNoTooltip('castle')], щоб наглядати за [target_location.GetProvince.GetNameWithNoTooltip]."
  flavor_teu.6.b: "Примусити місцевого #italic Комтура#! розібратися з цим."
  teuton_6_event_trigger_information: "Ця [Concept('event', 'CONCEPT_PLACEHOLDER')|e] може статися через наступне:\n[ShowTriggerConditionsForScope('teu_event_6_trigger', SCOPE.sLocation('target_location').GetLocation.MakeScope.Self))]"
  flavor_teu.7.title: "Міські закони [target_location.GetNameWithNoTooltip]"
  flavor_teu.7.desc: "[target_location.GetRank.GetName] [target_location.GetName] є економічною опорою та головним торговим портом [ROOT.GetCountry.GetLongName]. Він, як і деякі інші, продовжує використовувати $lubeck$ Міський Закон через свої глибокі зв'язки з [target_country.GetLongName], що також є предметом суперечок з його [ROOT.GetCountry.GetGovernment.GetAdjective] сюзеренами. Щоб покласти край конфлікту, [ROOT.GetCountry.GetNameWithNoTooltip] готовий дозволити [target_location.GetNameWithNoTooltip] прийняти [ShowEstatePrivilegeName('kulm_law')], зберігаючи при цьому деякі привілеї поточного порядку, розширюючи повноваження місцевої ради та надаючи їй більшу автономію. Таке рішення дозволить [target_location.GetRank.GetNameWithNoTooltip] процвітати як комерційний центр у [target_location.GetMarket.GetName]."
  flavor_teu.7.a: "Просувати це рішення."
  flavor_teu.7.b: "Зберегти поточний порядок."
  flavor_teu.8.title: "Економічний спад"
  flavor_teu.8.desc: "Останні часи були важкими для [ROOT.GetCountry.GetLongName]. Економічний спад призвів до зубожіння багатьох [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], а скарбниця [ROOT.GetCountry.GetNameWithNoTooltip] тривожно порожніє. Такий сценарій вже є кошмаром, і він може ще більше погіршитися, якщо нічого не зробити. Щоб уникнути ситуації, коли нам доведеться брати більше боргів для фінансування існуючих виплат, ми могли б розглянути можливість запровадження нового податку на наші володіння, які присутні по всій [ShowContinentName('europe')]. Такий крок не був би безпрецедентним, але податок, що стягується, цілком міг би бути. Яка користь від [ShowBuildingTypeName('order_commandery')], якщо вона не приносить нам жодної вигоди?"
  flavor_teu.8.a: "Ввести значний податок."
  flavor_teu.8.b: "Оподаткувати їх помірною сумою."
  flavor_teu.8.c: "Ми знайдемо інше джерело доходу."
  flavor_teu.11.title: "Перегляд [ShowEstatePrivilegeNameWithNoTooltip('kulm_law')]"
  flavor_teu.11.desc: "[ShowSituationName('black_death')] спустошила весь континент [ShowContinentName('europe')], знищивши численні міста та перетворивши поселення на руїни. Хоча економічний вплив на [ROOT.GetCountry.GetLongName] був жахливим, гірше те, що зменшення чисельності населення в Німеччині знизило міграційний тиск, зменшивши зростання населення в [ShowAreaName('prussia_area')]. Якщо ми не надамо більше стимулів для міграції на [ROOT.GetCountry.GetAdjectiveWithNoTooltip] землі, ми незабаром залишимося без мігрантів, які є невід'ємною частиною нашої місії християнізації."
  flavor_teu.11.a: "Надати більше переваг мігрантам."
  flavor_teu.11.b: "Нам доведеться з цим миритися."
  flavor_teu.12.title: "Монополія на [ShowGoodsNameWithNoTooltip('amber')]"
  flavor_teu.12.desc: "[ROOT.GetCountry.GetLongName] володіє багатьма ресурсами та природними багатствами, проте мало які з них є такими значущими та затребуваними, як [target_goods.GetName]. Ось чому [ROOT.GetCountry.GetFlavorRank] передав його під [ROOT.GetCountry.GetGovernment.GetAdjective] юрисдикцію і продовжуватиме розглядати його як цінну монополію. Однак такий протекціонізм ризикує розгнівати [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які бажають бути включеними в цю торгівлю і могли б отримати велику вигоду від комерції з таким цінним ресурсом."
  flavor_teu.12.a: "Посилити наш контроль над ресурсом."
  flavor_teu.12.b: "Розкрити нашу монополію."
  flavor_teu.12.c: "Надати її [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] натомість."
  flavor_teu.13.title: "[target_character.GetNameWithNoTooltip]"
  flavor_teu.13.desc: "Надійшли вісті про певну затворницю на ім'я [target_character.GetName], яка здобула славу по всьому [ROOT.GetCountry.GetFlavorRank] завдяки своїм видінням. Протягом [target_character.GetHerHis] життя [target_character.GetShortNameWithNoTooltip] пережила багато одкровень, які привернули увагу всього [ROOT.GetCountry.GetLongName]. Проте багато хто вважає ці видіння фальшивими, тоді як інші вірять у їхню справжність. Є навіть люди, які хотіли б бачити [target_character.GetHerHim] спаленою на вогнищі за чаклунство.\n\nНаразі [target_character.GetNameWithNoTooltip] вже пережила один суд над відьмами, хоча це не зупинило [target_character.GetHisHer] ворогів від вимоги нового."
  flavor_teu.13.a: "Ці видіння справді захоплюючі."
  flavor_teu.13.b: "Прислухатися до закликів [target_character.GetHerHis] ворогів."
  flavor_teu.14.title: "[target_character.GetNameWithNoTooltip]"
  flavor_teu.14.desc: "Клірик великого потенціалу здобув [target_character.GetHerselfHimself] ім'я у [ROOT.GetCountry.GetFlavorRank]. Будучи частиною [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] протягом тривалого часу, [target_character.GetSheHe] відомий як вправний хроніст, який міг би допомогти створити працю, щоб заповнити прогалини в [target_work_of_art.GetName], що була створена ще в [target_work_of_art.GetCreationDate] [target_work_of_art.GetCreator.GetName]."
  flavor_teu.14.a: "Нам потрібні [target_character.GetHerHis] послуги!"
  flavor_teu.14.b: "Відхилити [target_character.GetHerHim]."
  teu_event_within_5_to_10_years: "[Concept('event', 'CONCEPT_PLACEHOLDER')|e] відбудеться протягом 5-10 років, якщо [target_character.GetName] буде ще жива."
  flavor_teu.15.title: "$chronik_des_land_preussens$"
  flavor_teu.15.desc: "Праця [target_character.GetName] нарешті окупилася, бо [target_character.GetSheHe] нарешті завершила [target_character.GetHerHis] справу життя, [target_work_of_art.GetName], [ShowWorkOfArtTypeName('chronicle')], що деталізує історію [ROOT.GetCountry.GetLongName] з 1360-х років до сьогодення."
  flavor_teu.15.a: "[ROOT.GetCountry.Custom('common_string_wonder')]"
  flavor_teu.16.title: "Гроссшеффер [ROOT.GetCountry.GetFlavorRank]"
  flavor_teu.16.desc: "Гроссшеффери — це керівники [ROOT.GetCountry.GetAdjective] торгових інтересів за кордоном. Вони мають величезні обов'язки та привілеї, а також ексклюзивне право торгувати [ShowGoodsName('wheat')] та [ShowGoodsName('amber')] у портах [ShowLocationName('gdansk')] та [ShowLocationName('konigsberg')] відповідно. Такі величезні привілеї та обсяг влади, надані їм, поставили їх під приціл [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які рішуче виступають проти грантів, наданих [ROOT.GetCountry.GetFlavorRank] цим міністрам, і хотіли б, щоб ці права були скасовані. З іншого боку, [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] дуже задоволений доходами, які приносять гроссшеффери, і хотів би бачити подальші привілеї."
  flavor_teu.16.a: "Зламати їхню монополію."
  flavor_teu.16.b: "Експлуатувати інституцію."
  flavor_teu.16.c: "Підтримувати статус-кво."
  flavor_teu.17.title: "[target_character.GetNameWithNoTooltip]"
  flavor_teu.17.desc: "[target_character.GetName] — це [target_character.GetArtistType.GetName], народжений у [target_character.GetBirthLocation.GetName]. Навчаючись в [ShowBuildingTypeName('university')] [ShowLocationName('krakow')], [target_character.GetSheHe] доступний для найму і працював для багатьох різних політичних діячів по всій [ShowContinentName('europe')]. Можливо, нам також варто скористатися [target_character.GetHerHis] послугами."
  flavor_teu.17.a: "Стати покровителем [target_character.GetArtistType.GetNameWithNoTooltip]."
  flavor_teu.17.b: "Ми не можемо виділити такі кошти."
  teu_impact_on_kulm_law: "[ShowEstatePrivilegeName('kulm_law')] буде змінено на:\n#g +10.0%#! [ShowModifierTypeName('rural_migration_attraction')]\n#r -10.0%#! [ShowModifierTypeName('burghers_estate_max_tax')]"
  teu_impact_on_kulm_law_not_revised: "[ShowEstatePrivilegeName('kulm_law')] буде змінено на:\n#r -50.0%#! [ShowModifierTypeName('german_migration_attraction_modifier')]"
  kulm_law_revised_tooltip: "Переглянув [ShowEstatePrivilegeName('kulm_law')] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e] $flavor_teu.11.title$."
  kulm_law_not_revised_tooltip: "Вирішив не переглядати [ShowEstatePrivilegeName('kulm_law')] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e] $flavor_teu.11.title$."
  flavor_teu.100.title: "Прусський хрестовий похід"
  flavor_teu.100.desc: "Роки тому славетні хрестоносці Балтики проголосили свій Прусський хрестовий похід на славу Христову. Багато чоловіків відгукнулися на його заклик, одним з них була гордість [ROOT.GetCountry.GetAdjective] Корони: [target.GetName]."
  flavor_teu.100.desc.crusader_returns: "$flavor_teu.100.desc$\n\nКров проливалася, Престиж здобувався, а Честь захищалася, поки невірні та лихі язичники тремтіли від страху перед [target.GetHerHis] святою люттю. Тепер [target.GetSheHe] повернувся до люблячих обіймів [target.GetHerHis] чудового [ROOT.GetCountry.GetFlavorRank]!"
  flavor_teu.100.desc.crusader_dead: "$flavor_teu.100.desc$\n\nХоча наш [ROOT.GetCountry.GetFlavorRank] покладав велику віру в лицаря, Господь мав інші плани для [target.GetHerHim]. Завдяки безжальним і підлим тактикам, прокляті язичники повалили могутнього хрестоносця. [ROOT.GetCountry.GetAdjectiveWithNoTooltip] народ плаче за [target.GetHerHis] смертю."
  flavor_teu.100.desc.fallback: "Легенди свідчать, що колись був лицар, обраний [ROOT.GetCountry.GetAdjective] короною для участі в Прусському хрестовому поході.\n\nОднак, як і з усіма легендами, ця історія є лише добре розказаною казкою."
  flavor_teu.100.a: "Нехай [target.GetSheHe] буде прикладом для багатьох інших лицарів!"
  flavor_teu.100.b: "Ці дикуни за це заплатять кров'ю!"
  flavor_teu.100.c: "Це чудова історія, однак."
  flavor_teu.101.title: "Смерть хрестоносця"
  target: "[target.GetName]"
  flavor_teu.101.desc.infection_death: "Популярний хрестоносець [target.GetName] вже кілька днів бореться з сильною лихоманкою. Хоча [ROOT.GetCountry.GetGovernment.GetRulerTitle] радив [target.GetHerHim] повернутися додому, хрестоносець наполягав на тому, щоб залишитися заради слави. Але врешті-решт, все, що [target.GetSheHe] здобув, були обійми Смерті."
  flavor_teu.101.desc.training_accident_death: "Трагедія сталася в [ROOT.GetCountry.GetAdjective] казармах! Під час тренувань хрестоносець [target.GetName] бився з зброєносцем, сподіваючись покращити [target.GetHerHis] та бойові навички зброєносця, і мав справжній бій на мечах з хлопчиком. На жаль для дворянина, зброєносець замахнувся мечем занадто високо і обезголовив [target.GetNameWithNoTooltip]. [target.GetSheHe|U] помер миттєво."
  flavor_teu.101.desc.river_drowning_death: "Однією з ключових характеристик наших лицарів є важка броня. Хоча вона робить наші війська практично невразливими до ударів, вона має свої певні недоліки. Один з них, який знову проявився, це її незручність на воді. Як тільки лицар падає в річку, металева броня стає його мокрою могилою.\n\nХрестоносець [target.GetName] засвоїв цей урок важким шляхом, коли [target.GetSheHe] та [target.GetHerHis] побратими-лицарі вирушили в похід, щоб грабувати села невірних. Під час [target.GetHerHis] подорожі [target.GetSheHe] впав з [target.GetHerHis] коня в річку і втонув."
  flavor_teu.101.desc.fallback: "Іноземний хрестоносець, [target.GetName], був знайдений мертвим у своєму ліжку цього ранку. Причина смерті є загадкою для всіх, оскільки [target.GetSheHe] був цілком живий і здоровий ще вчора ввечері, і немає жодних ознак насильницької смерті..."
  flavor_teu.101.a: "Нехай [target.GetHerHis] душа спочиває з миром."
  flavor_teu.101.b: "Принаймні ми знаємо, що зброєносець може ефективно володіти клинком."
  flavor_teu.101.c: "Нещасна, але поширена доля."
  flavor_teu.101.zzz: "Лише Господь знає, що сталося з [target.GetHerHim]..."
  flavor_teu.102.title: "$flavor_teu.101.title$"
  flavor_teu.102.desc: "$flavor_teu.100.desc.crusader_dead$"
  flavor_teu.102.a: "Це, безумовно, неприємні новини"
  flavor_pol_teu.1.title: "Суд 1339 року"
  flavor_pol_teu.1.desc: "У 1335 році ми подали скаргу на [GetCountry('TEU').GetName] до [GetCountry('PAP').GetAdjective] [GetCountry('PAP').GetGovernment.GetCourtTitle]. Після років очікування, [GetCountry('PAP').GetAdjectiveWithNoTooltip] комісія нарешті прибула, і процес обговорення розпочався. Як ми й очікували, судді погодилися з нашою урочистою скаргою і оголосили, що [GetCountry('TEU').GetNameWithNoTooltip] має повернути провінції [ShowProvinceDefinitionName('danzig_province')], [ShowProvinceDefinitionName('tuchola_province')], [ShowProvinceDefinitionName('kuyavia_province')], [ShowProvinceDefinitionName('dobrzyn_province')] та [ShowProvinceDefinitionName('stolp_province')]."
  flavor_pol_teu.1.historical_info: "Як у 1319, так і в 1335 роках польська сторона подавала скарги на Тевтонський орден до Папського суду, вимагаючи повернення «Гданського Помор'я» Польщі. У випадку скарги 1335 року комісія, надіслана Папською державою, визначила, що тевтонська агресія була несправедливою, і що землі повинні бути повернуті, а також має бути виплачена компенсація. Тевтонський орден оскаржив це рішення, і після папського обговорення їх змусили повернути лише окуповані території, Бидгощ і Добжинь."
  flavor_pol_teu.1.a: "А ми думали, що справедливість померла..."
  flavor_pol_teu.2.title: "$flavor_pol_teu.1.title$"
  flavor_pol_teu.2.desc: "Ще одне судове рішення! Як і в 1319 році, у 1335 році [pol_polish_side.GetName] подала ще одну скаргу до Святого Отця, сподіваючись отримати результат, який принизив би нас і змусив відмовитися від наших справедливих завоювань. Що ж, [GetCountry('PAP').GetAdjective] комісія, безсумнівно підкуплена, винесла ще одне сміховинне рішення, постановивши, що ми повинні повернути провінції [ShowProvinceDefinitionName('danzig_province')], [ShowProvinceDefinitionName('tuchola_province')], [ShowProvinceDefinitionName('dobrzyn_province')], [ShowProvinceDefinitionName('kuyavia_province')] та [ShowProvinceDefinitionName('stolp_province')] [pol_polish_side.GetLongNameWithNoTooltip]."
  flavor_pol_teu.2.a: "Це безглуздо! Ми повинні негайно звернутися до [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  flavor_pol_teu.2.b: "Ми не будемо оскаржувати легітимність [GetCountry('PAP').GetAdjectiveWithNoTooltip] комісії."
  flavor_pol_teu.2.c: "Ми нічого їм не поступимося!"
  flavor_pol_teu.3.title: "Конфлікт між [pol_polish_side.GetNameWithNoTooltip] та [pol_teutonic_side.GetNameWithNoTooltip]"
  flavor_pol_teu.3.desc: "Політика між [pol_polish_side.GetName] та [pol_teutonic_side.GetName] напружена як ніколи. [pol_teutonic_side.GetAdjectiveWithNoTooltip] захоплення Померелії залишило гіркий присмак у [pol_polish_side.GetAdjectiveWithNoTooltip] вустах, спонукаючи їх турбувати нас численними скаргами, поданими проти лицарів.\n\nНещодавнє розслідування нашої комісії в [pol_polish_side.GetNameWithNoTooltip] оголосило, що [pol_teutonic_side.GetAdjectiveWithNoTooltip] сторона повинна поступитися значними територіями [pol_polish_side.GetAdjectiveWithNoTooltip], що спонукало до апеляції. Ми повинні вирішити це питання мирним шляхом."
  flavor_pol_teu.3.a: "Шукаймо середній варіант."
  flavor_pol_teu.3.b: "Вони слуги Христові і їм прощено."
  flavor_pol_teu.3.c: "Хіба ви не можете прочитати рішення?"
  teu_supported_us: "Підтримали нас"
  teu_supported_other_side: "Відмовилися нас підтримати"
  flavor_pol_teu.4.title: "[pol_teutonic_side.GetAdjectiveWithNoTooltip] Відповідь"
  flavor_pol_teu.4.desc: "[pol_teutonic_side.GetAdjective] відповідь була щонайменше холодною."
  flavor_pol_teu.4.desc.a: "$flavor_pol_teu.4.desc$ Зіткнувшись із наявним вердиктом, вони вирішили, що найкращим курсом дій було не піддаватися справедливому суду [GetCountry('PAP').GetAdjective] комісії. Натомість вони вирішили турбувати Святого Отця апеляцією. Яка марна трата святого часу."
  flavor_pol_teu.4.desc.b: "$flavor_pol_teu.4.desc$ Зважаючи на це, тиск був занадто великим, щоб чинити опір, і вони нарешті піддалися нашим вимогам, повернувши нам території."
  flavor_pol_teu.4.desc.c: "$flavor_pol_teu.4.desc$ Зважаючи на це, вони піддалися частині наших вимог, хоча з мізерними для нас результатами. [GetCountry('PAP').GetAdjective] втручання зробило більшість наших скарг недійсними, вимагаючи повернути нам лише кілька прикордонних районів. Однак це все ще перемога в наших книгах."
  flavor_pol_teu.4.desc.d: "$flavor_pol_teu.4.desc$ Претензійні лицарі вирішили, що навіть свята воля не стосується їх, відкрито кинувши виклик рішенню комісії. Повідомлення чітке: ми не отримаємо цих територій, і єдиний варіант, що залишається, — це кривава війна. Війна, яку вони, безсумнівно, програють, ми про це подбаємо."
  flavor_pol_teu.4.desc.fallback: "$flavor_pol_teu.4.desc$ Ми не впевнені, що робити з їхньою реакцією, оскільки не можемо визначити їхні справжні наміри."
  flavor_pol_teu.4.a: "Нехай Святий Отець дізнається про їхні провини."
  flavor_pol_teu.4.b: "Безперечно, гарний вибір з їхнього боку."
  flavor_pol_teu.4.c: "Ми отримаємо те, що зможемо."
  flavor_pol_teu.4.d: "Вони зустрінуть нас на полі бою."
  flavor_pol_teu.5.title: "[GetCountry('PAP').GetAdjectiveWithNoTooltip] Похвала"
  flavor_pol_teu.5.desc: "Наша апеляція до Святого Отця мала гучний успіх. Наше звернення та подані докази змусили [the_pope.GetName] визначити, що ми праві і що [the_pope.GetHerHis] комісія діяла недобросовісно. Зневаживши [pol_polish_side.GetAdjective] сторону, [the_pope.GetSheHe] запевнив нас, що наші надбання справді належать [pol_teutonic_side.GetName]. Крім того, ми отримали похвалу за нашу відданість поширенню [ShowReligionGroupName('christian')] та постійні зусилля з навернення язичників до істинної віри."
  flavor_pol_teu.5.a: "І ми продовжимо хрестовий похід!"
  STATIC_MODIFIER_NAME_teu_papal_resolution: "Папська Резолюція"
  flavor_pol_teu.6.title: "[GetCountry('PAP').GetAdjectiveWithNoTooltip] Осуд"
  flavor_pol_teu.6.desc: "Надійшов лист від [GetCountry('PAP').GetName], що засуджує наше рішення не прислухатися до вироку 1339 року. Глибоко прикро, що [the_pope.GetName] вважає, що ми повинні довіряти суддям, які були очевидно підкуплені іншою стороною."
  flavor_pol_teu.6.a: "Як є, так є."
  flavor_pol_teu.6.b: "Ми вдамо, що не читали того листа."
  flavor_pol_teu.7.title: "Жалюгідний [GetCountry('PAP').GetAdjectiveWithNoTooltip] Вирок"
  flavor_pol_teu.7.desc: "Ніколи ми не відчували себе настільки зрадженими Святим Отцем. Лише кілька місяців тому [the_pope.GetSheHe] надіслав нам [the_pope.GetHerHis] суддів, які ретельно проаналізували кожен доказ і винесли справедливий вердикт у цьому тривожному конфлікті. Тепер це саме рішення було скасовано [the_pope.GetName] [the_pope.GetHerselfHimself] після апеляції [pol_teutonic_side.GetAdjective]. Справді розчаровуюче видовище."
  flavor_pol_teu.7.a: "І Святий Отець має бути непогрішним?"
  flavor_pol_teu.8.title: "Середина"
  flavor_pol_teu.8.desc: "Посланець від [GetCountry('PAP').GetLongName] нарешті повернувся, принісши інформацію про остаточне рішення Святого Отця щодо скрутного становища, в якому ми опинилися. На жаль, відповідь не повністю сприятлива для нас, але вона м'якша, ніж те, що ми мали б інакше."
  flavor_pol_teu.8.a: "Принаймні це краще, ніж те, що організували поляки."
  flavor_pol_teu.8.b: "Ми не здамо ні дюйма території, хто б не вимагав!"
  flavor_teu.300.title: "[GetCountry('POL').GetAdjectiveWithNoTooltip] Байдужість"
  flavor_teu.300.desc: "Протягом останніх кількох років напруженість з [GetCountry('POL').GetAdjective] зростала. Обидві сторони вважають, що війна між ними неминуча, проте жодна сторона не бажає бути тією, хто почне конфлікт. Впевнені в [GetCountry('POL').GetAdjectiveWithNoTooltip] намірах, багато високопоставлених чиновників почали закликати [teu_ruler.GetName] до того, щоб наша сторона представила їм провокаційні два оголені мечі."
  flavor_teu.300.historical_info: "У 1410 році Польща здобула свою найрішучішу перемогу над Тевтонським орденом у битві під Грюнвальдом під час так званої Великої війни. Кажуть, польська сторона намагалася виснажити іншу сторону, відпочиваючи в тіні сусідніх лісів, і почала лише після того, як тевтонці надіслали посланця з двома оголеними мечами, щоб запросити поляків до бою."
  flavor_teu.300.a: "Якщо їм бракує мечів, то ми надамо."
  flavor_teu.300.b: "Нехай буде так."
  flavor_teu.301.title: "Два оголені мечі"
  flavor_teu.301.desc: "Прибув посланець від [teu_from.GetLongName], шукаючи аудієнції у [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Надавши їм таку можливість, вони поклали два оголені мечі, адресовані від [teu_ruler.GetName], прямо перед [pol_ruler.GetName], ніби нам бракувало спорядження, необхідного для того, щоб стерти їхні зарозумілі обличчя з лиця цієї землі. Якщо [teu_from.GetAdjectiveWithNoTooltip] [teu_from.GetGovernment.GetRulerTitle] бажає війни, [teu_ruler.GetSheHe] її матиме."
  flavor_teu.301.a: "Така низька образа."
  POL_after_next_war_is_won: "Після того, як ми виграємо наступну війну з [teu_from.GetName], ми отримаємо:"
  flavor_teu.302.title: "Нові Регалії"
  flavor_teu.302.desc: "Пара оголених мечів, які ми отримали від [GetCountry('TEU').GetName], набула нового символічного значення. Знак [GetCountry('TEU').GetAdjectiveWithNoTooltip] зарозумілості, наша недавня каральна кампанія проти них призвела до того, що вони стали нагадуванням про наші перемоги. Вони стали частиною колекції [ROOT.GetCountry.GetGovernment.GetAdjective] інсигній."
  flavor_teu.302.a: "Перемога над ними вартувала пролитої крові."
  flavor_swe_teu.1.title: "[target_country.GetLongNameWithNoTooltip]"
  flavor_swe_teu.1.victual_brother_info: "Балтика була домом для піратства з незапам'ятних часів. Серед моряків та рибалок [target_location.GetName] є багато тих, хто намагається вести життя піратства та злочинності. Серед них, [target_character.GetName] та [target_character.GetHerHis] банда так званих Лікеділерів тепер піднімає чорний прапор над нашими морями, маючи намір збагатитися, грабуючи всіх, кому не пощастило їх зустріти. Деякі з цих негідників, так звані «Віталійські брати», тепер захопили острів [ShowProvinceDefinitionName('gotland_province')] і заснували свою столицю у [ShowLocationName('visby')]. Їхні дії призвели до спаду торгівлі в регіоні, а їхнє безперервне піратство зрештою призведе до повного занепаду нашої торгівлі."
  flavor_swe_teu.1.desc: "$flavor_swe_teu.1.victual_brother_info$ Нам потрібно розібратися з ними, перш ніж вони зможуть закріпитися на нашому острові."
  flavor_swe_teu.1.historical_info: "Клаус Штьортебекер був легендарним німецьким піратом кінця XIV століття, відомим своїми набігами на кораблі Ганзейського союзу. Він очолював «Віталійських братів», піратську групу, спочатку найняту як каперів герцогами Мекленбурзькими проти королеви Маргарити, але пізніше вони обернулися проти своїх наймачів. Захоплений у 1401 році поблизу Гельголанду, він та його екіпаж були страчені в Гамбурзі. За легендою, він уклав угоду: ті, повз кого він зможе пройти після обезголовлення, будуть помилувані. Нібито, він встиг пройти повз кількох своїх поплічників, перш ніж кат спіткнув його, ігноруючи угоду. Його ім'я, що означає '#italic випорожнити кухоль одним ковтком#!', відображає його сумнозвісну здатність до пиття."
  flavor_swe_teu.1.a: "Попросимо [fief_offer_target.GetNameWithNoTooltip] про допомогу."
  flavor_swe_teu.1.b: "Ми розберемося з ними самі, хоч би як дорого це не коштувало."
  STATIC_MODIFIER_NAME_teu_wrath_of_the_pirates: "Гнів Піратів"
  vtb_operates_in_the_baltic_tt: "[target_country.GetLongName] розпочне свої операції вздовж узбережжя [ShowAreaNameWithNoTooltip('baltic_area')]"
  flavor_swe_teu.2.title: "$flavor_swe_teu.1.title$"
  flavor_swe_teu.2.desc: "$flavor_swe_teu.1.victual_brother_info$ Щоб допомогти в цьому, [GetCountry('SWE').GetAdjective] запропонували нам право взяти острів під свій контроль замість них, за умови, що ми зможемо швидко вжити заходів проти цих мерзенних піратів."
  flavor_swe_teu.2.a: "Ми приймемо цей лен."
  flavor_swe_teu.2.b: "Це не наша проблема."
  flavor_swe_teu.3.title: "[fief_offer_target.GetAdjectiveWithNoTooltip] Відповідь"
  flavor_swe_teu.3.common_desc: "Посланець, що несе відповідь від [fief_offer_target.GetName], нарешті прибув."
  flavor_swe_teu.3.desc_success: "$flavor_swe_teu.3.common_desc$ [fief_offer_target.GetAdjectiveWithNoTooltip] еліта пообіцяла висадити свої війська на острові [ShowProvinceDefinitionName('gotland_province')], щоб розібратися з нашим спільним ворогом. Як і було обіцяно, ми не будемо заперечувати."
  flavor_swe_teu.3.desc_failure: "$flavor_swe_teu.3.common_desc$ На жаль, вони відхилили наше мирне запрошення розібратися з мерзенними піратами в [pirate_nation.GetName]. Схоже, нам доведеться розбиратися з цим самим, незалежно від того, наскільки ми зайняті в даний момент."
  flavor_swe_teu.3.a: "Тоді зосередимося на наших пріоритетах!"
  flavor_swe_teu.3.b: "Гаразд, ми зробимо це самі."
  flavor_swe_teu.4.title: "Віталійське Братство"
  flavor_swe_teu.4.desc: "Зраджені нашими [GetCountry('HSA').GetAdjective] партнерами, наша ліга мусила вдатися до більш мерзенного способу існування – піратства. Як базу для наших операцій ми обрали острів [ShowProvinceDefinitionName('gotland_province')]. Якщо світ проти нас, то ми протистоятимемо всьому світу. Нехай зарозумілі торговці тремтять, коли наші морські пси топчуть їхні мізерні торгові судна."
  flavor_swe_teu.4.a: "$pirate_events.1.a$"
  flavor_swe_teu.5.title: "Острів Суперечок"
  flavor_swe_teu.5.desc: "Розташований у серці Балтійського моря, острів [ShowProvinceDefinitionName('gotland_province')] є необхідним активом для будь-якої держави, яка прагне досягти мети #italic Dominium Maris Baltici#!. Таким чином, інші місцеві держави, безсумнівно, плетуть інтриги, щоб вирвати це цінне володіння з наших рук. З нашою слабшаючою морською міццю, ми, можливо, захочемо віддати острів одній з цих держав."
  flavor_swe_teu.5.a: "Запропонувати острів [first_offer.GetNameWithNoTooltip]."
  flavor_swe_teu.5.b: "[second_offer.GetNameWithNoTooltip] безсумнівно, прийме."
  flavor_swe_teu.5.c: "Ми не віддамо нашу землю."
  flavor_swe_teu.6.title: "Пильний погляд на [gutnish_province.GetNameWithNoTooltip]"
  flavor_swe_teu.6.desc: "Ми маємо великий інтерес до острова [ShowProvinceDefinitionName('gotland_province')]. Як одна з великих держав басейну Балтійського моря, ми отримали б велику вигоду, володіючи цим островом на перехресті торгових шляхів і в серці внутрішнього моря. Це може стати нашим першим кроком до того, щоб зробити це море нашим власним. На жаль, ми не самотні в цьому прагненні, і ми повинні поспішати, якщо хочемо захопити його для себе."
  flavor_swe_teu.6.a: "Балтика буде нашою."
  flavor_swe_teu.7.title: "Пропозиція щодо [gutnish_province.GetNameWithNoTooltip]"
  flavor_swe_teu.7.desc: "Ми отримали пропозицію від [gotland_province_owner.GetName]. За ціну багатьох фунтів золота вони готові відмовитися від свого контролю над островом [ShowProvinceDefinitionName('gotland_province')] на нашу користь. Хоча ми, безумовно, маємо можливість захопити його для себе, така мирна передача може вберегти нас від ганьби в очах ширшого світу та запобігти кровопролиттю."
  flavor_swe_teu.7.a: "Звучить як чесна угода."
  flavor_swe_teu.7.b: "Навіщо нам платити?"
  flavor_swe_teu.8.title: "$flavor_swe_teu.7.title$"
  flavor_swe_teu.8.common_desc: "Ми нарешті дізналися про результати нашої дипломатичної місії до [offer_nation.GetName]. Запропонувавши їм мирну передачу [gotland_province_owner.GetAdjective] острова, ми очікували позитивної та вдячної відповіді."
  flavor_swe_teu.8.desc_success: "$flavor_swe_teu.8.common_desc$ Це ми й отримали, оскільки [offer_nation.GetAdjectiveWithNoTooltip] були надто раді виконати наші бажання і повністю оплатили обмін."
  flavor_swe_teu.8.desc_failure: "$flavor_swe_teu.8.common_desc$ На жаль, наше розчарування було безмірним, оскільки наших посланців висміяли, і нас запевнили в амбіціях [offer_nation.GetAdjectiveWithNoTooltip] забрати острів у нас."
  flavor_swe_teu.8.a: "Сподіваємося, цей обмін розпалить мир."
  flavor_swe_teu.8.b: "Ми повинні залишатися пильними."
  teu_rejected_sale: "Відхилена пропозиція продажу"
  flavor_dan_teu.1.title: "Повстання Юрієвої ночі"
  flavor_dan_teu.1.desc: "Лихо спіткало наші володіння в [ShowProvinceDefinitionName('estonia_province')]. Місцеве [ShowCultureName('estonian')] населення, незадоволене тим, що ми показали їм Світло Христа всі ці десятиліття тому, підняло збройне повстання. У спокійний день вони здійснили смертоносну атаку на наші гарнізони та замки. З-поміж себе вони обрали чотирьох лідерів, яких сміють називати «королями». Більше того, щоб додати образи до травми, у своєму акті диявольської «помсти» вони почали вбивати своїх колишніх володарів і опікунів у язичницькій люті. Ми цього не потерпимо, і їхнє повстання буде придушене."
  flavor_dan_teu.1.historical_info: "У ніч Святого Юрія 1343 року місцеве естонське населення повстало проти своїх данських володарів та різних іноземних дворян, які правили ними. Щоб очолити повстання, вони обрали з-поміж себе «Чотирьох Королів», яких пізніше заманили в пастку і вбили. Повстання вийшло за межі данських кордонів і поширилося на території Лівонського ордену та острови Езель."
  flavor_dan_teu.1.a: "Будь вони прокляті!"
  TEU_st_georges_uprising: "Кожен [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [ShowCultureName('estonian')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у провінції [ShowProvinceDefinitionName('estonia_province')] втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднується до [estonian_uprising.GetName].\n#r 75.0%#! з них також змінили [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] на [ShowReligionName('muinaisusko')]."
  estonian_uprising: "Повстання Юрієвої ночі"
  STATIC_MODIFIER_NAME_teu_fervor_st_georges_night_uprising: "Повстання Юрієвої ночі"
  flavor_dan_teu.2.title: "Естонські повстанці атакують Лівонію"
  flavor_dan_teu.2.attack: "Вбиваючи кожного [ShowCultureName('german_baltic')] дворянина, якого бачать, їхня зневага до своїх панів та Ісуса Христа є жахливою. Вони відчують гнів небес."
  flavor_dan_teu.2.desc: "[ShowCultureName('estonian')] збройне повстання, зосереджене в [TEU_denmark_from.GetAdjective] [ShowProvinceDefinitionName('estonia_province')], почало наступ на наших [GetCountry('LIV').GetAdjective] підданих. $flavor_dan_teu.2.attack$"
  flavor_dan_teu.2.a: "Ми їх провчимо."
  flavor_dan_teu.3.title: "Доля гнобителів"
  flavor_dan_teu.3.desc: "Збройний контингент нещодавно придушив хвилю опору в [target_province.GetName]. Солдати, у пориві ненависті, почали без розбору вбивати [ShowCultureName('german_baltic')] населення через їхню прихильність до [ShowReligionAdjective('catholic')] віри."
  flavor_dan_teu.3.a: "Закрити на це очі."
  flavor_dan_teu.3.b: "Зараз не час для їхньої розплати."
  flavor_dan_teu.4.title: "Звірство в [target_province.GetNameWithNoTooltip]"
  flavor_dan_teu.4.desc: "Виродки в [teu_rebellion_tag.GetName] напали на невинне [ShowCultureName('german_baltic')] населення в [target_province.GetName], вбиваючи без розбору. Ми нічого не могли зробити, щоб їх зупинити."
  flavor_dan_teu.4.a: "Вони заплатять за свої гріхи в пеклі."
  flavor_dan_teu.5.title: "Наше повстання"
  flavor_dan_teu.5.desc: "Наші мерзенні [ShowCultureName('german_baltic')] володарі гнобили нас надто довго. Вони придушували наші релігійні переконання і нав'язували нам чужих богів надто довго, можливо, настав час їм натомість дізнатися про наших богів? Чи захочуть вони, чи ні, не має значення, значення має боротьба за звільнення від їхніх кайданів."
  flavor_dan_teu.5.a: "Ми не будемо рабами!"
  flavor_dan_teu.6.title: "$flavor_dan_teu.2.title$"
  flavor_dan_teu.6.desc: "[ShowCultureName('estonian')] збройне повстання, зосереджене в [TEU_denmark_from.GetAdjective] [ShowProvinceDefinitionName('estonia_province')], здійснило напад на наших союзників. $flavor_dan_teu.2.attack$"
  flavor_dan_teu.6.a: "Підняти ополчення!"
  flavor_dan_teu.7.title: "Наростання проблем"
  flavor_dan_teu.7.desc: "Наші володіння в [ShowProvinceDefinitionName('estonia_province')] стали лише терном у нашому боці. Відділені від нашої столиці величезними морями, наш контроль тут у кращому випадку хиткий. Тепер, після несподіваного нападу, здійсненого корінним [ShowCultureName('estonian')] населенням, який поширився на наших сусідів у [teu_receives_estonia.GetName], можливо, краще спробувати налагодити наші відносини з нашим сусідом і продати цю бідну провінцію, яка вже знаходиться у сфері впливу [teu_receives_estonia.GetNameWithNoTooltip]."
  flavor_dan_teu.7.desc_hyperlink: "$flavor_dan_teu.7.desc$ Поговорімо з особами, що приймають рішення, у [the_deciding_nation.GetName]."
  flavor_dan_teu.7.desc_no_hyperlink: "$flavor_dan_teu.7.desc$ Поговорімо з особами, що приймають рішення, у [the_deciding_nation.GetNameWithNoTooltip]."
  flavor_dan_teu.7.historical_info: "Після повстання Юрієвої ночі 1343 року данський намісник в Естонії та інші урядовці були ув'язнені пронімецькими васалами, і більша частина провінції потрапила під контроль Тевтонського ордену. Данський король, визнавши свої володіння неспроможними, вирішив продати Естонію лицарям за ціною 19 тисяч Кельнських марок."
  flavor_dan_teu.7.a: "Продати провінцію."
  flavor_dan_teu.7.b: "Ми впораємося з заворушеннями."
  teu_if_teutons_accept: "Якщо [the_deciding_nation.GetName] погоджується:"
  flavor_dan_teu.8.title: "Продаж Естонії"
  flavor_dan_teu.8.desc: "Зіткнувшись з нещодавнім повстанням у [ShowProvinceDefinitionName('estonia_province')], [TEU_denmark_from.GetAdjective] вирішили запропонувати нам свої володіння в [ShowProvinceDefinitionNameWithNoTooltip('estonia_province')]. Якщо ми приймемо пропозицію, ці території увійдуть до нашої сфери впливу, а [TEU_denmark_from.GetAdjectiveWithNoTooltip] відступлять від боротьби, залишивши нас самих розбиратися зі зрадниками."
  flavor_dan_teu.8.historical_info: "$flavor_dan_teu.7.historical_info$"
  flavor_dan_teu.8.a: "Ми приймемо їхню пропозицію."
  flavor_dan_teu.8.b: "Нам теж не потрібні ці проблеми!"
  flavor_dan_teu.9.title: "$flavor_dan_teu.8.title$"
  flavor_dan_teu.9.desc_common: "Ми нарешті отримали відповідь на нашу щедру пропозицію щодо прав на [ShowProvinceDefinitionName('estonia_province')]."
  flavor_dan_teu.9.desc_success: "$flavor_dan_teu.9.desc_common$ На нашу радість, [the_deciding_nation.GetName] прийняли пропозицію, звільнивши нас від обов'язку керувати цією землею, повною зрадників."
  flavor_dan_teu.9.desc_failure: "$flavor_dan_teu.9.desc_common$ На жаль, [the_deciding_nation.GetName] відхилили пропозицію, змусивши нас не лише перемогти це повстання, але й пережити наслідки та подальше невдоволення протягом десятиліть. Що ж, можливо, з достатніми зусиллями одного дня воно буде інтегроване."
  flavor_dan_teu.9.a: "Нам підходить!"
  flavor_dan_teu.9.b: "Чорт."
  teu_successful_dealings: "Успішні угоди"