l_english:
  flavor_ori.1.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] та культ Джаганнатхи"
  flavor_ori.1.desc: "Церемонії у великому храмі в [GetLocationName('puri')] та колода, в якій проявляється Джаганнатха, часом висміювалися та глузувалися іноземними правителями, але в [GetAreaName('orissa_area')] Джаганнатха, «Владика Всесвіту», є безперечно найпопулярнішим божеством.\n\nПідтримка Джаганнатхи та його жерців також була непохитною для [target_character.GetName]. Тепер настав час для династії [target_character.GetDynasty.GetName] відплатити цей борг, ми повинні підтримувати храм у [GetLocationNameWithNoTooltip('puri')] та піднести поклоніння Джаганнатсі як основний культ у нашому [ROOT.GetCountry.GetFlavorRank]."
  flavor_ori.1.a: "Хай буде слава Джаганнатсі!"
  flavor_ori.1.b: "Не варто класти всі яйця в один кошик."
  flavor_ori.2.title: "Ціна війни."
  flavor_ori.2.desc: "Недавні війни спричинили нестабільність у [ROOT.GetCountry.GetName]. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] повільно обертаються проти нас через наші дорогі війни, а кілька сезонів поганих врожаїв ще більше радикалізували їх. Після деяких опитувань ми виявили, що їхня головна скарга – це наші податки на сіль, життєво важливий ресурс для багатьох простих людей. [target_character.GetName] та [target_character.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували зменшити ці податки, щоб послабити заворушення."
  flavor_ori.2.historical_info: "Коли Капілендра Дева скинув останнього з королів Східної Ганги в 1434 році, Орісса перебувала в жалюгідному стані. Мусульманські вторгнення з півночі та заходу, а також суперництво з іншими сусідами на півдні значно зменшили королівство. З того часу Раджа Капілендра швидко змінив усе це. У послідовних війнах з Бенгалією, Редді з Андхри, султанами Бахмані та імперією Віджаянагара, Орісса зросла як у розмірах, так і в силі під його керівництвом. Однак ця постійна війна позначилася на населенні королівства, і в поєднанні з кількома сезонами поганих врожаїв призвела до народних заворушень у межах володінь."
  flavor_ori.2.a: "Нам не потрібен податок на сіль."
  flavor_ori.2.b: "Ми не можемо піддаватися громадському тиску."
  flavor_ori.3.title: "Народження [ShowLanguageNameWithNoTooltip('oriya_language')] літератури"
  flavor_ori.3.desc: "Дотепер [ShowLanguageName('sanskrit_language')] була єдиною мовою літератури в [ROOT.GetCountry.GetName], а розмовна [ShowLanguageName('oriya_language')] мова була зарезервована для [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та нижчих каст. Однак [sarala_dasa.GetName], відставний солдат з невеликою формальною освітою, почав змінювати це, перекладаючи [ShowAdvanceName('mahabarata')] на [ShowLanguageNameWithNoTooltip('oriya_language')]. Оригінальна робота [sarala_dasa.GetNameWithNoTooltip] також виключно на [ShowLanguageNameWithNoTooltip('oriya_language')], і інші поети тепер почали переймати цю практику."
  flavor_ori.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ori.3.b: "Нехай це буде мова [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_ori.4.title: "[achyutananda.GetNameWithNoTooltip]"
  flavor_ori.4.desc: "Поет, провидець і плідний автор здобуває популярність як святий [ShowPolicyName('vaishnavism')] у нашому [ROOT.GetCountry.GetFlavorRank]. Кажуть, що [achyutananda.GetName] може передбачати майбутнє, а його книги написані [ShowLanguageName('oriya_language')], мовою народу."
  flavor_ori.4.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ori.4.b: "Давайте просувати [achyutananda.GetHerHis] мистецтво."
  flavor_ori.5.title: "[target_character.GetNameWithNoTooltip] піднімається по службі"
  flavor_ori.5.desc: "Поки правління [target_character2.GetName] триває, нова фігура піднялася по службі в [ROOT.GetCountry.GetName]. [target_character.GetHerHis|U] ім'я — [target_character.GetName], завзятий і кмітливий стратег, сповнений рішучості захистити [ROOT.GetCountry.GetNameWithNoTooltip] від зовнішніх загроз. Однак чутки в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] свідчать, що [target_character.GetSheHe] може плести інтриги, щоб захопити трон, прагнучи узурпувати [target_character2.GetName] та усунути останні залишки династії [target_character2.GetDynasty.GetName] з [ShowAreaName('orissa_area')]."
  flavor_ori.5.a: "Амбітні люди – це все, що нам потрібно."
  flavor_ori.5.b: "Геть [target_character.GetHerHim]."
  ori_kapilendra_may_revolt_tt: "Поки [target_character.GetName] живий, [target_character.GetSheHe] може узурпувати трон [ROOT.GetCountry.GetName]"
  flavor_ori.6.title: "Повстання [target_character.GetNameWithNoTooltip]"
  flavor_ori.6.desc: "Зі зростанням популярності [target_character.GetName], [target_character.GetSheHe] вирішив(ла) налаштувати частину нації проти нас. Згуртувавши тисячі солдатів, здається неминучим, що [ROOT.GetCountry.GetName] зіткнеться з громадянською війною, якщо [target_character2.GetName] не зречеться престолу на користь [target_character.GetNameWithNoTooltip]."
  flavor_ori.6.a: "Настав час зректися престолу."
  flavor_ori.6.b: "Згуртуйте чоловіків. Ми розчавимо цих самозванців."
  kapilendra_rebels: "Прихильники $Kapilendra$"
  flavor_ori.7.title: "$kapilesvara_siva_temple$"
  flavor_ori.7.desc: "Зі зростанням могутності, яку [ROOT.GetCountry.GetName] пережила в останні роки, [target_character.GetName] планує будівництво додаткових храмів, присвячених [ShowReligionName('hindu')] божествам. Серед них – $kapilesvara_siva_temple$, який планується збудувати в [target_location.GetName], місці, що, за чутками, є батьківщиною [ShowGodName('shiva_god')]."
  flavor_ori.7.a: "Збудуймо цей храм."
  flavor_ori.7.b: "Це занадто дорого."
  flavor_ori.8.title: "[target_character2.GetNameWithNoTooltip]"
  flavor_ori.8.desc: "Маловідома постать у [ROOT.GetCountry.GetName], [target_character2.GetName] нещодавно привернула увагу [ROOT.GetCountry.GetGovernment.GetCourtTitle] [target_character.GetName]. Хоча [target_character2.GetHerHis] поеми, можливо, і не здобули популярності серед [ROOT.GetCountry.GetFlavorRank], вони втілюють саме те, чим прагне бути [ROOT.GetCountry.GetCourtLanguage.GetName] мова в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_ori.8.a: "Давайте просувати [target_character2.GetHerHis] твори."
  flavor_ori.8.b: "[target_character.GetHerHis|U] твори тут не дозволені."
  flavor_ori.9.title: "Занепад [ROOT.GetCountry.GetAdjectiveWithNoTooltip] мілітаризму"
  flavor_ori.9.desc: "Хоча колись ми йшли вперед і завойовували, зрозуміло, що ті славні часи вже далеко позаду. Багато громадян [ROOT.GetCountry.GetName] забули шляхи воїна, натомість прийнявши життя в мирі. Хоча це може не віщувати нічого доброго для сили нашої армії, можливо, настав час для нас прийняти більш мирний підхід до управління."
  flavor_ori.9.a: "[target_character.GetNameWithNoTooltip] стане адміністратором."
  flavor_ori.9.b: "Можливо, настав час знову йти на війну."
  flavor_ori.10.title: "Військові реформи [target_character.GetNameWithNoTooltip]"
  flavor_ori.10.desc: "З приходом [target_character.GetName] до керівництва [ROOT.GetCountry.GetName], [target_character.GetSheHe] окреслив плани реформування армії для кращої підтримки [target_character.GetHerHis] завоювань. Забезпечивши проникнення мілітаризму в кожен аспект [ROOT.GetCountry.GetAdjectiveWithNoTooltip] суспільства, буде створена постійна армія для захисту кордонів і потенційного початку вторгнень проти слабших сусідів."
  flavor_ori.10.a: "Давайте доведемо ці реформи до кінця."
  flavor_ori.10.b: "Немає потреби в більшому мілітаризмі."
  ori_every_location_in_orissa_with_armory_gains_2_dev: "Кожна [ShowBuildingTypeName('armory')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('orissa_area')] отримає [ShowNamedValue('development_weak_bonus')|+=] [Concept('development', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ori.11.title: "Занепад морської торгівлі"
  flavor_ori.11.desc: "Оскільки наші зв'язки з $china$ та [ShowSubContinentName('south_east_asia')] слабшають, так само слабшає і наша торгівля з ними. У минулому ми значною мірою покладалися на експорт нашої багатої тканини та солі до цих регіонів, але нещодавні зміни в [ROOT.GetCountry.GetName] та серед наших торгових партнерів спричинили цей занепад. [target_character.GetName] прагне протидіяти цій тенденції, запровадивши більш відкриту торговельну систему. Однак цей крок ризикує підірвати вплив [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] на інших ринках."
  flavor_ori.11.a: "Давайте впровадимо ці зміни."
  flavor_ori.11.b: "Ми не підірвемо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_ori.11.c: "Ми можемо трохи підсолодити їм угоду..."
  flavor_ori.12.title: "Полювання на [ShowGoodsNameWithNoTooltip('elephants')]"
  flavor_ori.12.desc: "З надлишком [ShowGoodsName('elephants')] у [ROOT.GetCountry.GetName] виникли дискусії щодо збільшення кількості полків, які використовують цих могутніх звірів. Однак нашим поточним [ShowBuildingTypeName('elephant_hunting_grounds')] бракує ресурсів, необхідних для належного розширення їхніх мисливських операцій та постачання відповідного обладнання. Можливо, настав час надати їм необхідну підтримку. [target_character.GetName] та [ROOT.GetCountry.GetGovernment.GetCourtTitle], зокрема, навіть готові виділити частину власних коштів, щоб це стало реальністю."
  flavor_ori.12.a: "Давайте спонсоруємо ці полювання."
  flavor_ori.12.b: "Немає потреби витрачати на це гроші."
  ori_double_elephant_hunting_ground_level_tt: "Максимальний рівень [Concept('building', 'CONCEPT_PLACEHOLDER')|e] [ShowBuildingTypeName('elephant_hunting_grounds')] буде збільшено на #G +2#!"
  INCREASED_MAX_LEVEL_ELEPHANT_HUNTING_GROUND: "Збільшено максимальний рівень від [Concept('events', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ori.13.title: "[ShowPolicyNameWithNoTooltip('vedic_education')]"
  flavor_ori.13.desc: "Хоча система [ShowPolicyName('vedic_education')] є давньою традицією, вона була значною мірою занедбана в $india$ після [ShowReligionGroupAdjective('muslim')] вторгнень. Замість того, щоб дозволити цій системі зникнути в безвісті, ми могли б спробувати відновити її. Однак це, ймовірно, викличе невдоволення [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_ori.13.a: "Повернімося до старої системи освіти."
  flavor_ori.13.b: "Нинішня працює так само добре."
  flavor_ori.14.title: "Божевільний [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ori.14.desc: "[target_character.GetName] здобув сумнівну репутацію серед [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Через [target_character.GetHerHis] особистість та некомпетентність як [ROOT.GetCountry.GetGovernment.GetRulerTitle], усі вважають, що [target_character.GetSheHe] може бути божевільним, приймаючи нові закони за примхою, що призводить до обурення з боку [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_ori.14.a: "Хто дозволив [target_character.GetNameWithNoTooltip] робити все, що [target_character.GetSheHe] забажає?"
  flavor_ori.14.b: "На щастя, ми можемо зупинити [target_character.GetHerHim], перш ніж буде завдано занадто багато шкоди."
  ori_nobles_lose_20_satisfaction: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ori.15.title: "Спонсорування архітектури Калінги"
  flavor_ori.15.desc: "Частина стародавньої архітектури [ROOT.GetCountry.GetName], архітектурний стиль Калінги відрізняє храми, присвячені кожному головному [ShowReligionName('hindu')] божеству, забезпечуючи кожному з них унікальний стиль. Хоча ми не в змозі присвятити більше храмів цим божествам, ми можемо принаймні забезпечити, щоб один із храмів отримав додаткове фінансування, зокрема той, що знаходиться в [target_location.GetName]."
  flavor_ori.15.a: "Ми можемо дозволити собі спонсорство."
  flavor_ori.15.b: "Храми в хорошому стані."
  flavor_ori.15.c: "Давайте зробимо їм щедрі пожертви."
  flavor_ori.16.title: "Просування [ShowPolicyNameWithNoTooltip('vaishnavism')]"
  flavor_ori.16.desc: "Послідовники [ShowPolicyNameWithNoTooltip('vaishnavism')] мали свої вірування, вкорінені в цих землях з моменту заснування нашої нації. На жаль, політичні конфлікти та релігійні заворушення змусили нас змінити наші шляхи, відводячи нашу націю від наших початкових вірувань. Хоча [ROOT.GetCountry.GetName] не обов'язково вірить, що [ShowGodName('vishnu_god')] є верховною істотою серед усіх божеств, маси думають інакше, нагадуючи нам, що культ Джаганнатхи є справді єдиними істинними словами в [ROOT.GetCountry.GetReligion.GetName]. Цей тиск сам по собі змусив [ROOT.GetCountry.GetGovernment.GetCourtTitle] переглянути свою позицію. Можливо, вони також повірять, що [ShowGodNameWithNoTooltip('vishnu_god')] є верховним, і що [ROOT.GetCountry.GetNameWithNoTooltip] потрібно змінити свою позицію щодо того, яка гілка [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip] є правильною."
  flavor_ori.16.a: "Повернімося до цієї секти!"
  flavor_ori.16.b: "Ми не схилимося перед масами."
  ori_all_hindu_clergy_pops_will_gain_20_satisfaction: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionName('hindu')] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_ori.1000.title: "Контакт з [GetCountry('POR').GetNameWithNoTooltip]"
  flavor_ori.1000.desc: "Прибуття [GetCountry('POR').GetAdjective] народу відкрило нові можливості як для нас, так і для наших ворогів. Їхні купці втручаються в ринок [target_market.GetName], купуючи наші товари, водночас збільшуючи свій вплив. Ми можемо спробувати покращити наші відносини з ними або саботувати їхній вплив на нашому ринку."
  flavor_ori.1000.a: "Ми вітаємо цих нових людей."
  flavor_ori.1000.b: "Вони не конкуруватимуть з нашими купцями."
  ori_sabotaged_merchants: "Саботовані купці"
  flavor_ori_1001_shared: "Запрошення [GetCountry('POR').GetAdjectiveWithNoTooltip] купців"
  flavor_ori.1001.title: "$flavor_ori_1001_shared$"
  flavor_ori.1001.desc: "Завдяки нашим зусиллям потоваришувати з [target_country2.GetAdjective] [target_country2.GetGovernment.GetRulerTitle], [target_character.GetName] висунув найгеніальнішу ідею. Використовуючи багаті землі [target_country.GetName], ми могли б залучити деяких їхніх купців оселитися в [target_location.GetName], і, використовуючи їхні кошти, ми можемо впевненіше забезпечити постійне процвітання [target_location.GetRank.GetName]."
  flavor_ori.1001.a: "Дійсно, найгеніальніша ідея."
  flavor_ori.1001.b: "Укладати угоду з ними не варте нашого часу."
  ori_por_must_accept_offer_tt: "[target_country2.GetName] має прийняти пропозицію, щоб ефекти набули чинності"
  ori_no_deal_with_portugal_tt: "Ми не надсилатимемо жодної угоди до [target_country2.GetName]"
  flavor_ori.1002.title: "$flavor_ori_1001_shared$"
  flavor_ori.1002.desc: "[target_country.GetName] звернулася до нас з угодою. Бажаючи залучити деяких [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], їм буде надано свободу торгувати та розвивати [target_location.GetName] на власний розсуд, бажано на нашу користь, а в обмін вони збережуть виробництво земель там."
  flavor_ori.1002.a: "Дозвольмо їм там."
  flavor_ori.1002.b: "Ми не будемо марнувати наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]!"