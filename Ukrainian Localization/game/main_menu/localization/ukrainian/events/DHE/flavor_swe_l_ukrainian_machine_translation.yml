l_english:
  flavor_swe.1.title: "Реформи централізації"
  flavor_swe.1.desc: "Наші погляди жадібно звертаються до [ShowAreaName('skaneland_area')] та [ShowProvinceDefinitionName('gotland_province')]. Захоплення цих багатих земель дало б нам стратегічний контроль над торгівлею в Балтійському морі та забезпечило б наш вразливий південний кордон, не кажучи вже про утвердження нашої влади. Можливо, настав час нам скинути ярмо [ShowCultureName('danish')] панування і повернути те, що по праву має належати [ROOT.GetCountry.GetName]..."
  flavor_swe.1.historical_info: "Після свого сходження на шведський престол Густав Ваза зіткнувся з, здавалося б, нескінченним списком невтішних завдань. Країна мала величезні борги перед Ганзою, яка погрожувала стати на бік Данії в її спробах відновити Унію, дворяни були ненадійними, а армія і флот були в руїнах. Найгіршим, однак, був незбалансований розподіл землі. Коронні землі були занадто малими, щоб забезпечити життєво важливі податки, необхідні для підтримки держави. Король виявився на висоті, і завдяки непопулярним скороченням та нав'язливому мікроменеджменту він поставив країну на ноги. На початку свого правління Густав також прагнув отримати графства Сконе та Готланд від Данії за допомогою Ганзи. Він не досяг успіху, але претензія була заявлена..."
  flavor_swe.1.a: "Реформувати та вимагати наші землі!"
  swe_claims_skane: "Претендує на Сконе"
  swe_claims_gotland: "Претендує на Готланд"
  flavor_swe.1.b: "Нехай усе залишається як є."
  flavor_swe.2.title: "Повстання Енгельбректа"
  flavor_swe.2.desc: "Народ [ShowProvinceDefinitionName('dalarna_province')] згуртовується навколо дрібного дворянина, чиї протести проти високих податків та економічних обмежень з боку корумпованого [ShowCultureName('danish')] уряду об'єднали [ShowCultureName('swedish')] людей усіх класів. Ми стоїмо на краю прірви: якщо ми дозволимо [ShowCultureNameWithNoTooltip('danish')] пануванню тривати, прихильники цього вискочки виступлять проти нас. Але якщо ми підтримаємо повстанців, ми зіткнемося з гнівом нашого правлячого класу. Наступний крок має бути ретельно обміркований..."
  flavor_swe.2.historical_info: "Енгельбрект Енгельбректссон — легендарна та загадкова постать у шведській середньовічній історії. У 1434 році селяни Даларна (Долини) у Швеції втомилися від нищівних податків короля Еріка та жорстоких методів правозастосування. Селяни та шахтарі, очолювані Енгельбректом та підтримані певними фракціями Церкви та дворянства, підняли відкрите повстання. Вони захоплювали замок за замком і незабаром контролювали більшу частину Швеції. Тим часом Ерік Пуке приєднався до Енгельбректа у повстанні у Фінляндії. Протягом двох років Енгельбрект був фактичним правителем Швеції, але інтриги серед дворян та міжусобиці між Енгельбректом, Еріком Пуке та Карлом Кнутссоном зрештою призвели до вбивства Енгельбректа руками Монса Бенгтссона Натт оч Даг."
  flavor_swe.2.a: "Вбити Енгельбректа..."
  flavor_swe.2.b: "Підтримати унію."
  swe_supports_the_union: "Підтримує Унію"
  flavor_swe.2.c: "Підніміть смолоскип свободи!"
  swe_renounced_the_union: "Відмовився від Унії"
  flavor_swe.3.title: "Кальмарський Рецес"
  flavor_swe.3.desc: "Нова тріщина з'явилася в одному з наших найкрихкіших союзів. Через бунтівні дії групи незадоволених селян викрилася кожна слабкість [ShowCultureName('danish')] військової могутності. Якщо [ShowCultureName('swedish')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] забажають, вони можуть відмовитися від раніше укладених угод з урядом, оскільки ці агресії є явним порушенням узгоджених умов. Насправді, можна сказати, що це ідеальний привід для цього..."
  flavor_swe.3.historical_info: "Після перемоги Швеції над Росією в 1497 році, підступний король Унії Ганс зрозумів, що йому потрібно приборкати владу шведського маршала Стена Стуре (старшого). Розгромивши шведів під Ротебро, він увійшов до Стокгольма і був коронований королем Швеції, але лише після надання амністії Стену Стуре та повстанцям. Ця подія отримала назву \"Кальмарський Рецес\". У 1500 році, після нищівної поразки короля Ганса від селянських повстанців у Дітмарші, Стен Стуре та шведські дворяни відкинули Кальмарський Рецес, стверджуючи, що Ганс не дотримувався угоди. Це мало ознаменувати початок кінця Кальмарської унії."
  flavor_swe.3.a: "Відкинути Кальмарський Рецес."
  swe_rejected_the_kalmar_recess: "Відкинув Кальмарський Рецес"
  flavor_swe.3.b: "Дотримуватися Угоди."
  swe_honored_the_kalmar_recess: "Дотримався Кальмарського Рецесу"
  flavor_swe.4.title: "Парламент [ShowLocationNameWithNoTooltip('vasteras')]"
  flavor_swe.4.desc: "Шукаючи спосіб зміцнити нашу економіку, один ініціативний член ради виявив цікаве рішення. Здається, багато правителів у нашій частині світу, натхненні [GetCharacter('martin_luther').GetName] та його 95 тезами, приймають нові релігійні ідеали і згодом захоплюють цінні активи, що раніше належали Церкві. Якби ми зробили те саме, це могло б стати можливістю не лише поповнити нашу скарбницю, але й більш рішуче консолідувати нашу владу."
  flavor_swe.4.historical_info: "Під час шведської визвольної війни Корона накопичила величезні борги перед Ганзейським союзом, і Густав Ваза терміново потребував грошей, щоб заспокоїти могутніх купців. На парламенті у Вестеросі влітку 1527 року він зробив перший крок до протестантизму, коли Церква була зобов'язана «позичити» державі гроші у вигляді срібних чаш, дзвонів та інших цінних предметів. Протягом наступних трьох десятиліть Швеція поступово перейшла до євангельської віри, незважаючи на кілька повстань."
  flavor_swe.4.a: "Це Єдина Істинна Віра!"
  flavor_swe.4.b: "Це не те, чого ми прагнемо..."
  flavor_swe.4.a.custom: "Багато [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у нашій країні стануть [ShowReligionName('lutheran')]"
  flavor_swe.5.title: "[swe_joran_person.GetNameWithNoTooltip]"
  flavor_swe.5.desc: "Один із наших радників, [swe_joran_person.GetName], швидко зарекомендував [swe_joran_person.GetHerselfHimself] як особливо надійного та ефективного союзника. Хоча багатьом його методи здаються неприємними, [swe_joran_person.GetNameWithNoTooltip] без вагань виконує огидні вчинки заради зростання могутності [ROOT.GetCountry.GetName]. Союзник, настільки відданий служінню, заслуговує на визнання."
  flavor_swe.5.historical_info: "Йоран Перссон був шведським державним діячем. На початку 1550-х років він вивчав право у Віттенберзькому університеті та повернувся до Швеції з рекомендаційним листом від німецького теолога та реформатора Філіппа Меланхтона. Він швидко відзначився і став найдовіренішим радником короля Еріка XIV, а також очолив королівську мережу шпигунів. Перссон також виконував обов'язки королівського прокурора і був відповідальним за велику кількість із трьохсот смертних вироків, винесених Вищим судом. Його широко вважали макіавеллістською фігурою, яка мала надто великий вплив на Еріка. Після усунення короля Еріка від влади Перссона заарештувала знать і стратила. Після обезголовлення його розчленоване тіло було виставлено на площі Брункеберг."
  flavor_swe.5.a: "Прийняти його політику!"
  flavor_swe.5.b: "Відкинути його політику!"
  flavor_swe.6.title: "[swe_per_brahe_older.GetNameWithNoTooltip]"
  flavor_swe.6.desc: "Наш радник [swe_per_brahe_older.GetName] відзначив [swe_per_brahe_older.GetHerselfHimself] незліченними способами, і час для визнання [swe_per_brahe_older.GetHisHer] надзвичайної служби давно настав. Ми повинні винагородити [swe_per_brahe_older.GetHisHer] вірність значними підвищеннями — піднесення [swe_per_brahe_older.GetHimHer] як у дворянстві, так і в уряді буде ще більшою перевагою для [ROOT.GetCountry.GetName], ніж для [swe_per_brahe_older.GetHimHer] та [swe_per_brahe_older.GetHisHer] родини."
  flavor_swe.6.historical_info: "Пер Браге Старший був шведським державним діячем і племінником короля Густава Вази. Браге високо цінувався королем і відзначився під час Дацького повстання. З 1540 року він обіймав посаду губернатора Стокгольмського замку, а в 1544 році отримав місце в Таємній раді. На коронації короля Еріка XIV у 1561 році Браге був призначений графом Вісінгсборзьким, а після вступу на престол короля Юхана III його призначили Верховним суддею Швеції та губернатором Норрланду."
  flavor_swe.6.a: "Чудовий міністр!"
  flavor_swe.7.title: "[ShowCultureNameWithNoTooltip('walloon')] у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_swe.7.desc: "Багато підприємливих [ShowCultureName('walloon')] шахтарів та металургів, прагнучи уникнути високого рівня безробіття в сусідніх регіонах, стікаються до [ROOT.GetCountry.GetName]. Хоча їхні дивні іноземні звичаї можуть бути неприйнятними для декого, такий приплив висококваліфікованих ремісників може відродити нашу металургійну промисловість. Можливо, нам варто дозволити більшій кількості цих талановитих [ShowCultureNameWithNoTooltip('walloon')] людей оселитися на наших землях."
  flavor_swe.7.historical_info: "У 1614 році валлонський підприємець Луї де Геєр заснував підприємство у Швеції та взявся за розвиток видобутку залізної руди та ливарних заводів у північній Швеції. Деякий час валлонські ремісники з регіонів Ено, Брабант та Люксембург вже тікали від безробіття та іммігрували до Швеції. Приплив майстрів-металургів та переробників руди оживив промисловість і призвів до значного покращення якості сталі — головної переваги у виробництві зброї. За кілька десятиліть Швеція стала великим експортером сталі та гармат, а також міді та заліза."
  flavor_swe.7.a: "Заохочувати валлонську імміграцію!"
  flavor_swe.7.b: "Нас це не цікавить."
  flavor_swe.8.title: "Час для військової реформи"
  flavor_swe.8.desc: "Наше військо, хоч і достатньо ефективне, потребує значних покращень. Один із наших високопоставлених чиновників розробив геніальну систему набору, яка об'єднує призовників з одного регіону в загони бійців, що називаються «полками». Маючи спільне походження, кожен полк буде міцно пов'язаний і більш мотивований дбати про безпеку один одного. Крім того, як наша технологія, так і наша тактика на полі бою могли б бути більш гнучкими, ніж зараз... Так, настав час реформувати наше військо в щось сучасне та унікально пристосоване до сильних сторін [ROOT.GetCountry.GetName]!"
  flavor_swe.8.historical_info: "На початку 17 століття шведський король Густав Адольф здійснив низку заходів для реформування шведської військової системи. Швеція мала створити професійну армію на основі призову солдатів за принципом спільного географічного походження (міста, хутори, села), що забезпечило б командний дух і згуртованість підрозділів, яких не існувало в більшості найманих армій того часу. Тактичні інновації включали більш мілкі та широкі формування для максимізації вогневої потужності, перехресне навчання між родами військ та легку, високоманеврену польову артилерію. Нова шведська тактична доктрина базувалася на вогневій потужності та мобільності, відмовляючись від важкої артилерії та повільних терцій."
  flavor_swe.8.a: "Завжди вперед!"
  flavor_swe.8.b: "Можливо, ні..."
  flavor_swe.9.title: "Затоплення «Вази»"
  flavor_swe.9.desc: "Коли великий військовий корабель «Ваза» вирушає у своє перше плавання, вся нація сповнюється гордістю. Виблискуючи вишуканими прикрасами та озброєний дивовижними шістдесятьма чотирма гарматами, у світі немає іншого такого судна. Коли «Ваза» розправляє вітрила і вперше граціозно розсікає воду, гавань наповнюється гучним вигуком. \n\nАле перший елегантний політ «Вази» триває не більше кількох хвилин. Перевантажений позолоченими гротесками та бронзовим озброєнням, безцінний військовий корабель піддається лише пориву вітру, шалено нахиляється на бік і майже одразу затоплює свою нижню гарматну палубу. На шок і жах спостерігачів, «Ваза» безповоротно тоне на дно моря, лише за кілька сотень футів від берега."
  flavor_swe.9.historical_info: "Шведський військовий корабель «Ваза» був побудований як символ військової та політичної могутності Швеції та авторитету Густава Адольфа як короля-воїна. На той час це був один з найбільших і найважче озброєних військових кораблів у світі. Побудований між 1626 і 1628 роками, на його оздоблення та оснащення не шкодували коштів, і він мав не менше 64 гармат. Проблема полягала в тому, що «Ваза» була побудована з надмірним верхнім навантаженням і мала недостатній баласт для підтримки такої кількості гармат. Під час свого першого плавання 10 серпня 1628 року корабель затонув біля Бекхольмена, пройшовши менше однієї морської милі."
  flavor_swe.9.a: "Наша репутація зруйнована!"
  flavor_swe.10.title: "[swe_per_brahe_younger.GetNameWithNoTooltip]"
  flavor_swe.10.desc: "[swe_per_brahe_younger.GetName] — видатний державний діяч: космополіт, високоосвічений, з вражаючим військовим досвідом. Хоча [swe_per_brahe_younger.GetHeShe] вже обіймає високу посаду в палаці, [swe_per_brahe_younger.GetHeShe] міг би зробити набагато більше на вищому ранзі. В наших інтересах винагородити [swe_per_brahe_younger.GetHisHer] чудову роботу."
  flavor_swe.10.historical_info: "Пер Браге Молодший був шведським офіцером і державним діячем. Після навчання за кордоном він став камергером Густава Адольфа. Між 1626 і 1628 роками він брав участь у війні проти Польщі, а пізніше супроводжував короля до Німеччини під час раннього етапу Тридцятилітньої війни. Він був призначений таємним радником і очолював мирні переговори з Польщею в 1635 році. Через два роки його призначили генерал-губернатором Фінляндії, а в 1641 році — лордом-розпорядником. Його внесок у розвиток Фінляндії включав запровадження поштової системи та заснування кількох міст, серед них Тавастехус і Нюслотт. Він також сприяв заснуванню Королівської академії в Обо."
  flavor_swe.10.a: "Чудовий міністр!"
  flavor_swe.11.title: "[swe_magnus_de_la_gardie.GetNameWithNoTooltip]"
  flavor_swe.11.desc: "Наш шляхетний військовий герой [swe_magnus_de_la_gardie.GetName] вирізняється як особливий улюбленець. [swe_magnus_de_la_gardie.GetHisHer|U] зірка рішуче сходить і має потенціал осяяти всю [ROOT.GetCountry.GetName]. Сподіваймося, вона не зайде надто рано..."
  flavor_swe.11.historical_info: "Магнус Де ла Гарді, син фельдмаршала Якоба Де ла Гарді, народився 15 жовтня 1622 року в Таллінні. Він отримав ґрунтовну освіту і провів деякий час у Франції та Нідерландах. У 1643 році він повернувся до Швеції, щоб взяти участь у Торстенсонській війні проти Данії, де служив під командуванням фельдмаршала Густава Горна. Колись улюбленець королеви Христини, пізніше він втратив її прихильність. Він став генерал-лейтенантом під командуванням свого шурина, короля Карла X Густава, і командував військами у війнах проти Польщі та Росії. Коли король Карл X Густав помер у 1660 році, Де ла Гарді був призначений членом регентської ради під час неповноліття Карла XI. Пізніше він втратив більше, ніж будь-який інший дворянин під час редукції Карла XI, і помер 26 квітня 1686 року."
  flavor_swe.11.a: "Чудовий міністр!"
  flavor_swe.12.title: "Меркантильні реформи"
  flavor_swe.12.desc: "Наша економічна ситуація вимагає значних реформ, і ми маємо два потенційні шляхи. Ми могли б прийняти меркантилістську політику, яка дала б уряду більше контролю та вищі доходи, або ми могли б прийняти політику вільної торгівлі та експортувати нашу сировину. Хоча останнє могло б принести значні прибутки, які надмірне регулювання задушило б, воно також було б набагато менш прибутковим для вищих класів. Це доленосне рішення, і його не слід приймати легковажно."
  flavor_swe.12.historical_info: "Протягом першої половини XVII століття новостворена велика держава Швеція шукала шляхи реформування своєї торгівлі так само ефективно, як і армії. Іноземні підприємці (переважно з Нижніх країн, як-от Луї де Геер) засновували процвітаючі підприємства та надавали чудові зразки для наслідування шведським купцям. Шведи навіть були переконані деякими голландцями розпочати прибуткові колоніальні підприємства, але спроби були нерішучими, оскільки Швеція натомість обрала агресивну континентальну політику. Шведська торгівля також ніколи по-справжньому не розвивалася через постійне меркантилістське втручання уряду, що страждав від нестачі грошей."
  flavor_swe.12.a: "Дотримуватися меркантилістської політики."
  flavor_swe.12.b: "Запровадити вільну торгівлю."
  flavor_swe.13.title: "Абсолютизм"
  flavor_swe.13.desc: "Нещодавні політичні тиски виявили суворий факт, що адміністрація цієї країни перебуває в хаосі. Найвпливовіші члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер зібралися, щоб визначити наш подальший шлях: підкоритися абсолютному правлінню або змусити нашого правителя шукати рішення від [ROOT.GetCountry.GetGovernment.GetParliament.GetName] перед прийняттям будь-яких постанов. Ми повинні вибрати правильно, інакше ризикуємо бути розірваними цією кризою."
  flavor_swe.13.historical_info: "Після катастрофічної війни 1674-79 років, до якої Швеція була більш-менш змушена Францією, Карл XI та широкі верстви шведської адміністрації усвідомили, що щось має змінитися. Король, на двох напрочуд безболісних сесіях парламенту в 1680 і 1682 роках, взяв одноосібний контроль над країною без зобов'язань прислухатися до парламенту чи Королівської ради. Так почався період Каролінського абсолютизму в Швеції, коли короля називали «Сірим плащем» за його скромність і прості звички, відповідальним лише перед Богом."
  flavor_swe.13.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] буде правити верховно!"
  flavor_swe.13.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] повинен прислухатися до [ROOT.GetCountry.GetGovernment.GetCourtTitle]..."
  flavor_swe.14.title: "[swe_axel_oxenstierna.GetNameWithNoTooltip]"
  flavor_swe.14.desc: "Серед наших державних діячів один виділяється понад усіх — [swe_axel_oxenstierna.GetNameWithNoTooltip]. Жоден з інших наших радників не має [swe_axel_oxenstierna.GetHisHer] адміністративних навичок; ані вони не можуть зрівнятися з [swe_axel_oxenstierna.GetHisHer] дипломатичною витонченістю. Ми передбачаємо довгу і славетну кар'єру попереду [swe_axel_oxenstierna.GetHimHer] в уряді."
  flavor_swe.14.historical_info: "Народився в 1583 році, Аксель Оксеншерна розпочав свою цивільну кар'єру для Шведської держави в 1602 році і став канцлером між 1612 і 1654 роками. Він виявився найздібнішим адміністратором, якого коли-небудь мала Швеція. Як і Карл IX, Оксеншерна був вражений кальвінізмом і плекав думки про прийняття принаймні елементів цієї віри. Будучи правою рукою Густава Адольфа, він боровся проти планів короля втрутитися в Тридцятилітню війну. Однак після смерті короля під Лютценом у 1632 році він взяв на себе керівництво протестантською справою і зумів переконати французів активно брати участь у конфлікті. Він завжди уважно стежив за внутрішньою політикою, але втратив більшу частину свого впливу після зречення королеви Христини, проти якого він виступав. Він помер у 1654 році, незабаром після коронації короля Карла X Густава."
  flavor_swe.14.a: "Чудовий міністр!"
  flavor_swe.15.title: "Апеляційний суд"
  flavor_swe.15.desc: "З часів вікінгів ми покладалися на регіональні суди тінгсрет для здійснення правосуддя. Хоча ця система працює на меншому рівні, вона також створює великі невідповідності по всій [ROOT.GetCountry.GetName], оскільки кожен регіон має свої унікальні закони та звичаї. Наша велика нація заслуговує на таку ж престижну судову систему — таку, яку ми всі можемо зрозуміти та дотримуватися."
  flavor_swe.15.historical_info: "Густав Адольф заснував перший шведський апеляційний суд, «Svea Hovrätt», у 1614 році як вищу інстанцію, ніж старі місцеві суди, або «tingsrätt». Сьогодні у Швеції є шість таких судів."
  flavor_swe.15.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_swe.16.title: "Регентство [swe_axel_oxenstierna.GetLastNameWithNoTooltip]"
  flavor_swe.16.desc: "Жодна регентська рада ніколи по-справжньому не служить інтересам [ROOT.GetCountry.GetFlavorRank], але наша нинішня рада поставила державу в нестійке становище. Міністри, лояльні до [ROOT.GetCountry.GetGovernment.GetRulerTitle], мусили працювати наполегливіше, ніж будь-коли, щоб переконати інших відкинути власні егоїстичні інтереси. Якщо їх не контролювати, ці ненажерливі аристократи становлять серйозну загрозу для нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], а отже, і для всієї нації. Умиротворення їх може мати наслідки, але деякі поступки зараз можуть допомогти запобігти перевороту пізніше.\n\nХоча [swe_axel_oxenstierna.GetName] є висококваліфікованим адміністратором, регентство може вдарити [swe_axel_oxenstierna.GetHisHer] у голову. Ми повинні ретельно обміркувати це."
  flavor_swe.16.historical_info: "Після не зовсім несподіваної, але дуже очікуваної смерті Густава Адольфа під Лютценом 6 листопада 1632 року Акселю Оксеншерні довелося взяти на себе весь тягар управління державою як головному регенту для шестирічної доньки Густава, Христини. Блискучий адміністратор забезпечив безперебійну роботу нації, але аристократичні тенденції, які стримував покійний король, були повністю розв'язані високими лордами регентства, що завдало великої шкоди нижчим класам і Короні. Одним з п'яти інших регентів був Карл Карлссон Гілленгієльм, позашлюбний брат Густава та верховний адмірал держави. З усіх він найменше переймався особистим багатством та привілеями."
  flavor_swe.16.a: "Надати аристократії нові привілеї."
  flavor_swe.16.b: "Чинити опір цим тенденціям."
  flavor_swe.17.title: "Питання про скорочення чверті"
  flavor_swe.17.desc: "Коли наш нинішній лідер прийшов до влади, були дані великі обіцянки нижчим класам щодо полегшення їхнього важкого податкового тягаря. Але ми не можемо не платити за наші військові зобов'язання, а це означає, що ці гроші повинні бути знайдені десь. Оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] майже нічого не платять, володіючи найпродуктивнішими землями, логічно, що вони повинні нести цей тягар, але, звичайно, ми не можемо очікувати, що вони приймуть це без нарікань.\n\nУ нас є три недосконалі рішення цієї проблеми. По-перше, ми можемо повернути землі, раніше надані певним [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], і таким чином знову перетворити їх на джерело [ROOT.GetCountry.GetGovernment.GetAdjective] доходів. Наш другий варіант полягав би в оподаткуванні вищих класів, хоча це досить неортодоксально. Нарешті, ми могли б відмовитися від наших попередніх обіцянок і дозволити речам продовжуватися так, як вони є зараз... принаймні, доки не виникне зворотна реакція, яка неминуче відбудеться."
  flavor_swe.17.historical_info: "Обрання Карла Густава кронпринцом відбулося лише за умови обіцянок змін для селян і міщан на Риксдазі 1650 року. Таким чином, коли він успадкував трон від Христини в 1654 році, він відчував зобов'язання полегшити їхній тягар, а також зміцнити державні фінанси. Як завжди, було лише два реальні способи досягти цього – скорочення або збільшення внесків від аристократії. З великим небажанням дворяни погодилися на обмежене скорочення. Зрештою, збільшення внесків було майже тим самим, що й сплата податків, чого дворяни просто не робили."
  flavor_swe.17.a: "Більше землі для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate)]!"
  flavor_swe.17.b: "Примусити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] робити більші внески."
  flavor_swe.17.c: "Приєднатися до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_swe.18.title: "Міркування щодо скорочення чверті"
  flavor_swe.18.desc: "Наші фінансові проблеми досягли критичної точки. Так не може тривати! Ми повинні прийняти рішуче рішення, інакше [ROOT.GetCountry.GetName] буде повністю збанкрутована. Або ми відберемо значні володіння у дворянських класів і накличемо їхній гнів, або ми продовжимо діяти так, як діяли, і просто сподіватимемося на краще. Жоден варіант не є ідеальним і має потенціал для серйозних наслідків у майбутньому, проте ми повинні щось зробити..."
  flavor_swe.18.historical_info: "Правління королеви Христини було обтяжене її боротьбою з високими лордами Ради, особливо з канцлером Акселем Оксеншерною. Незважаючи на його опозицію, вона була головним рушієм укладення Вестфальського миру (1648) та закінчення Тридцятилітньої війни. Завзятий політик, Христина змогла запобігти переростанню гірких класових протиріч, що спалахнули після війни, у громадянську війну, але не змогла вирішити відчайдушні фінансові проблеми, спричинені довгими роками боїв. Зрештою, їй довелося відкликати Оксеншерну та визнати провал своєї програми реформ."
  flavor_swe.18.a: "Більше землі для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate)]!"
  flavor_swe.18.b: "Приєднатися до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_swe.19.title: "Питання регентства"
  flavor_swe.19.desc: "Перед смертю наш попередній правитель розробив ретельні плани щодо майбутнього регентства з метою збереження політики, яка сприяє нижчим станам та обмежує аристократичне панування. Обраний [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle] присягнув дотримуватися цих планів до останньої літери, що, безумовно, не сподобається [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Якби ми замінили прихильників обраного [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle] на тих, хто має більш «гнучкі» погляди щодо виконання бажань померлого правителя, це принесло б нам схвалення від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], що могло б бути нам на користь."
  flavor_swe.19.historical_info: "На смертному ложі Карл X призначив регентів для свого сина Карла таким чином, щоб обмежити владу високої аристократії, аби уникнути ситуації, подібної до регентства Акселя Оксеншерни. Однак незабаром після його смерті Рада та Палата лордів зуміли замінити двох його найближчих прихильників, принца Адольфа Юхана та Германа Флемінга, на більш поступливих Ларса Кагга та Густава Бонде. Результатом стало повернення до урядових статутів 1634 року з політикою, тісно пов'язаною з інтересами земельних дворян."
  flavor_swe.19.a: "Замінити людей [ROOT.GetCountry.GetGoverment.GetRulerTitle]."
  flavor_swe.19.b: "Виконати волю померлого [ROOT.GetCountry.GetGoverment.GetRulerTitle]."
  flavor_swe.20.title: "Велика редукція"
  flavor_swe.20.desc: "Дворянські класи повинні працювати на підтримку правителя, але [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] дбають лише про власне піднесення та накопичення все більшої влади. Якщо їх не контролювати, їхні постійні інтриги та брудні угоди щодо золота та впливу можуть розірвати весь [ROOT.GetCountry.GetFlavorRank] на частини.\n\nНастав час нагадати їм, що лише [ROOT.GetCountry.GetReligion.GetGodName] вирішує, хто є правителем [ROOT.GetCountry.GetName], і що ця особа є першим і єдиним справжнім володарем цієї землі. Ми так ретельно утвердимо нашу владу, що ця нескінченна боротьба за владу між [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] нарешті буде покладена на спокій раз і назавжди!"
  flavor_swe.20.historical_info: "Шведські королі XVI та XVII століть чергували прийняття та несприйняття знаті. За часів Густава Вази було мало різниці між багатим фермером і дворянином, але ситуація змінилася наприкінці його життя. Ерік XIV тримав дворян на короткому повідку, тоді як його брат Юхан хотів розширити їхні привілеї. Третій брат, який мав стати Карлом IX, ненавидів знать з майже революційним запалом і оточив себе людьми нижчих класів, граючись з ідеями, нечуваними в його час. За Густава Адольфа та Акселя Оксеншерни маятник хитнувся в інший бік, і дворяни здобули як землю, так і владу. Ця тенденція різко припинилася з Карлом XI, який після принизливої поразки Швеції в 1679 році розпочав політику широкомасштабного скорочення земель і повноважень знаті, а також скасував особливі привілеї балтійських лордів."
  flavor_swe.20.a: "Настав час розплати для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]..."
  flavor_swe.20.b: "Натомість домовляйтеся з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_swe.21.title: "Велика реорганізація армії"
  flavor_swe.21.desc: "У минулому наші військові витрати були серйозним приводом для занепокоєння. Хоча деякі минулі правителі вирішували проблему шляхом конфіскації майна та інших спірних дій, ми розробили спосіб, щоб наші армії могли утримувати себе. Наші бійці не тільки вироблятимуть власні продукти харчування, але ми також розробили форму спонсорства, за якої звичайні фермери можуть підтримувати солдата в обмін на звільнення від податків та військової служби. Ця більш стійка система також усуває деякі існуючі класові бар'єри, зміцнюючи товариськість між нашими солдатами та стираючи старі образи. Залишилося лише офіційно впровадити ці нові настанови..."
  flavor_swe.21.historical_info: "Карл XI не був великим королем-воїном, як його батько та син, але він був великим реорганізатором та консолідатором. Окрім своїх зусиль з централізації та значного скорочення аристократичних землеволодінь, він також реформував армію. Найважливіше, він розробив геніальний «індельнінгсверк», або систему військового землеволодіння. Ця система була військовою організацією, де солдатам надавали хутір для проживання та обробітку (що стало можливим завдяки скороченню), а врожай служив їхньою платнею. Таким чином, країна могла утримувати велику армію як у мирний, так і у воєнний час. Якщо селянин брав на себе відповідальність за утримання призваного вершника, його коня та його спорядження, селянин звільнявся від призову та сплати податків. Селяни могли співпрацювати групами по 2-5 господарств та утримувати солдата чи моряка. Солдати були організовані в роти по 150 чоловік, і кожне графство мало виставити полк з 1200 чоловік. Нова система також не робила різниці між офіцерами шляхетного походження та простолюдинами."
  flavor_swe.21.a: "Реформувати армію."
  flavor_swe.21.b: "Використовувати стару систему."
  flavor_swe.22.title: "Пієтизм та Едикт про конвенти"
  flavor_swe.22.desc: "Новий релігійний рух набирає популярності серед нашого народу. Спочатку його прийняли солдати, які перебували в полоні і тому були змушені проводити власні релігійні служби; однак, основні релігійні лідери гірко не схвалюють несанкціонованих проповідей. Підписання запропонованого едикту зробить приватні релігійні зібрання протизаконними, що сподобається основним віруючим, але ризикує розгнівати прихильників нової віри."
  flavor_swe.22.historical_info: "Пієтизм був релігійним рухом, що зародився в Німеччині в другій половині XVII століття. Традиційно пієтистський рух розглядався як реакція на інтелектуалізм, поширений серед протестантських кіл, особливо в Лютеранській Церкві, в той період. Бідні шведські солдати, які провели довгі роки в полоні в Тобольську після битви під Полтавою, мусили проводити власні лютеранські меси, таким чином навчившись цінувати пієтизм. Саме з їхнім поверненням рух справді набрав обертів у Швеції. Однак Шведська Лютеранська Церква найрішучіше не схвалювала несанкціонованих проповідей, що призвело до Едикту про конвенти 1726 року, який забороняв будь-які релігійні зібрання поза рамками Церкви."
  flavor_swe.22.a: "Підписати Едикт про конвенти."
  flavor_swe.22.b: "Дозволити пієтизм."
  flavor_swe.23.title: "Аньяльська ліга"
  flavor_swe.23.desc: "Війна з [target_country.GetName] йшла досить добре, доки великий контингент [ShowCultureName('finnish')] дворян, які називали себе «Аньяльською лігою», не зрадив нас. Вони не лише таємно зустрічалися з нашими ворогами, але й робили це в надії, що [target_country.GetNameWithNoTooltip] підтримає їхню спробу створити незалежну [ShowCultureNameWithNoTooltip('finnish')] державу в обмін.\n\nТака підступність зазвичай вирішувалася б кількома заслуженими стратами, але ми не зможемо виграти цю війну без зразкового військового керівництва, яке надають ці офіцери. Проте, якщо ми капітулюємо, ми виглядатимемо слабкими, дозволивши нашим власним офіцерам висувати зрадницькі вимоги своєму суверену. Ми повинні ретельно вирішити, який результат є найменш руйнівним для позиції [ROOT.GetCountry.GetName] на світовій арені."
  flavor_swe.23.historical_info: "Густав III, «Король-театр», оголосив війну Росії влітку 1788 року. Його головними цілями були: відновити честь шведської армії, повернути деякі землі, втрачені Росії в попередніх війнах, і – можливо, найважливіше – покласти край безперервному російському втручанню у шведську політику. На той час Швеція мала чудовий флот і досить ефективну армію, але більшість офіцерів можна було описати як політиків, а не солдатів. Шведська армія почала наступ на Санкт-Петербург і виграла кілька незначних битв, незважаючи на компактний опір офіцерів. 12 серпня група зі 112 фінських дворян-офіцерів утворила «Аньяльську лігу» і розпочала переговори з росіянами, оголосивши війну незаконною та зондуючи можливість створення незалежної фінської держави. Ця подія фактично поклала край усім надіям на шведську перемогу, оскільки король був у поганому становищі, щоб стратити зрадників і замінити їх."
  flavor_swe.23.a: "Вести переговори зі зрадниками."
  flavor_swe.23.b: "Стратити зрадників!"
  flavor_swe.23.b.tt: "[target_country.GetName] може бути засмучений цим, а може й ні"
  flavor_swe.24.title: "Позбавлення престолу [former_ruler.GetNameWithNoTooltip]"
  flavor_swe.24.desc: "Переворот! Наш некомпетентний правитель приніс лише катастрофу [ROOT.GetCountry.GetName], і нарешті військові повстали проти [former_ruler.GetHerHim]. Це наша можливість поставити до влади когось більш здібного. Настав час прийняти доленосне рішення, яке матиме величезні наслідки для майбутнього [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_swe.24.historical_info: "Руйнівна втрата Фінляндії в 1809 році була широко приписана королю Густаву IV Адольфу, і 13 березня 1809 року він був скинутий в результаті державного перевороту деякими ліберальними чиновниками та офіцерами західної армії Швеції. Густав та його спадкоємці були позбавлені королівських титулів та заохочені залишити країну. Скинутий король зрештою оселився у Швейцарії під ім'ям полковника Густафссона. Поки тривали пошуки нового кронпринца, Швецією правив старий і бездітний дядько Густава Карл (XIII). Був обраний данський принц Крістіан Август, але раптово помер у 1810 році. Риксдаг відчайдушно шукав заміну і нарешті зупинився на французькому маршалі Жані-Батисті Бернадотті."
  flavor_swe.24.a: "Скинути [former_ruler.GetHerHim]!"
  flavor_swe.24.b: "Дозволити [former_ruler.GetHerHim] правити."
  flavor_swe.25.title: "Реформування марнотратної нації"
  flavor_swe.25.desc: "Надто багато дукатів було витрачено на надто багато вечірок, гостей та частувань. Досить! Такий надмір ніяк не приносить користі [ROOT.GetCountry.GetFlavorRank]. Хоча дехто може бути розчарований втратою цих мілкотних задоволень, усунення деяких із цих дискреційних витрат було б розсудливим."
  flavor_swe.25.historical_info: "Густав IV Адольф багато в чому був повною протилежністю свого батька. Зійшовши на престол, він негайно поклав край гламурним, але дорогим балам, державним обідам та вечіркам, які так любив Густав III. Дійсно, попри інші свої невдачі, Густав IV Адольф мав гостре почуття економії, і державні фінанси значно покращилися під його управлінням."
  flavor_swe.25.a: "Реформувати економіку."
  flavor_swe.25.b: "Продовжувати як раніше."
  flavor_swe.26.title: "Акт про унію та безпеку"
  flavor_swe.26.desc: "Запропонована поправка до нашої конституції встановила б абсолютистське правління, що позбавило б [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] багатьох привілеїв — податкових пільг, юридичних імунітетів та політичного впливу — яких бракує іншим.\n\nХоча ухвалення цього Акту завоювало б серця [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], воно абсолютно розлютило б [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], що є небезпечною річчю. Але мати один стан у розпалі обурення, безперечно, менш шкідливо, ніж три з них, що піняться одночасно... чи не так?"
  flavor_swe.26.historical_info: "У відповідь на зростаючий галас за більшу владу для аристократії, Густав III звернувся до трьох нижчих станів (духовенства, міщан та селян) Риксдагу і в 1789 році встановив нову конституцію, яка посилила королівську владу. Цей Акт про унію та безпеку був фактично поверненням до днів абсолютизму за Карла XI та XII. Однак для аристократії це виявилося занадто, і король був убитий під час перебування в Стокгольмській опері 16 березня 1792 року."
  flavor_swe.26.a: "Ухвалити Акт."
  flavor_swe.26.b: "Відмовитися від Акту."
  flavor_swe.27.title: "Велика аграрна реформа"
  flavor_swe.27.desc: "[ROOT.GetCountry.GetLongName] гостро потребує серйозних внутрішніх реформ, особливо щодо нашого врожаю. З цією метою ми найняли іноземного експерта, щоб він консультував нас щодо цих покращень. Радикальний план цього чоловіка повністю перебудовує нашу сільськогосподарську систему з нуля, включаючи все: від переселення селян до скасування традиційних громадських земель та прав на випас худоби на користь створення більших, ефективніших ферм. Впровадження цих реформ значно збільшило б наш сільськогосподарський вихід, хоча й за рахунок розгнівання [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_swe.27.historical_info: "Густава IV Адольфа завжди звинувачували у втраті Фінляндії та називали слабким і шалено впертим монархом. Час забув багато важливих реформ, які він запровадив — не останньою з яких була велика аграрна реформа під наглядом Рутгера Макліна. Маклін був суворою людиною, яка без вагань спалювала будинки селян, які відмовлялися переїжджати на призначені їм ділянки. Але зрештою фермери дякували йому, оскільки нові методи та більші поля призвели до більш рясних врожаїв, ніж будь-коли раніше."
  flavor_swe.27.a: "Розпочати реформу."
  flavor_swe.27.b: "Продовжувати як раніше."
  flavor_swe.28.title: "Великий Далекарлійський Танець"
  flavor_swe.28.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [ShowLocationName('dalarna_province')] нещодавно зазнали несправедливого тягаря труднощів, а наші нещодавні економічні обмеження втрутилися у відносну фіскальну автономію, якою вони традиційно користувалися. Якщо ми продовжимо застосовувати цей тиск, їхня можлива реакція може бути вибуховою."
  flavor_swe.28.historical_info: "Невдоволення урядом лордів зростало серед селян під час Епохи Свободи. Російська перемога у Російській війні фракції Капелюхів 1741-1743 років та питання спадкоємності після бездітного Фредеріка I були основними причинами. Невдоволення було ще сильнішим у провінції Даларна, де Капелюхи запровадили обмеження на вільну торгівлю далекарлійців з Норвегією. У 1743 році селяни Даларна повстали у тому, що стало відомим як Великий Далекарлійський Танець. До них приєднався місцевий полк, який зазнав важких втрат у кривавій битві при Вільманстранді у 1741 році. Обрання данського кронпринца Фредеріка королем та суворе розслідування проти генералів, відповідальних за катастрофічну Російську війну, стали головними цілями повстання. Натовп озброївся і 11 червня почав марш на Стокгольм."
  flavor_swe.28.a: "Продовжувати обмежувати їхню торгівлю."
  flavor_swe.28.b: "Підтвердити їхні традиційні торговельні права."
  flavor_swe.29.title: "Обдарований інженер"
  flavor_swe.29.desc: "Прагнучи покращити наші військові укріплення, ми знайшли та призначили блискучого інженера та ветерана для нагляду за цим процесом. Його проєкти не тільки виглядають ефективними, але й настільки майстерно інтегрують природний ландшафт [ROOT.GetCountry.GetName], що сама земля, здається, захищає свій народ. Сподіваємося, що для нього буде забезпечено достатньо ресурсів (не кажучи вже про достатньо золота), щоб укріпити всю нашу територію."
  flavor_swe.29.historical_info: "У 1679 році ветеран-кампаніст та військовий інженер Ерік Дальберг був призначений головою Шведського бюро фортифікацій. У той час Швеція перебувала на зеніті своєї могутності, а наступальна політика попередніх десятиліть залишила країну з довшими кордонами, ніж будь-коли. Ерік Дальберг та його команда розробили кілька грізних фортець та побудували їх у ключових точках по всій Імперії, майстерно використовуючи рельєф місцевості з максимально можливим ефектом. Великі форти Леєнет та Кронан у Гетеборзі, фортеця Варберг та фортеця Даларе є свідченнями його генія. На жаль, напружений бюджет не дозволив укріпити східні провінції, що виявиться катастрофічним у наступні роки..."
  flavor_swe.29.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swe.30.title: "[target_artist.GetNameWithNoTooltip] Публікує #italic $atland_eller_manheim$#!"
  flavor_swe.30.desc: "Ерудит-письменник [target_artist.GetName] нарешті завершив справу свого життя, #italic $atland_eller_manheim$#!, чудово деталізовану історію благородного походження [ROOT.GetCountry.GetName] як нібито втраченого королівства Атлантиди. Хоча сама ідея фантастична, безперечно, такий відомий вчений повідомляв би лише найправдивіші історії, і це пояснює, чому наш [ROOT.GetCountry.GetFlavorRank] займає таке вище становище в ієрархії націй. Незалежно від її правдивості, робота виявилася надзвичайно популярною."
  flavor_swe.30.historical_info: "Ботанік, архітектор, історик, астроном і музикант, Улоф Рудбек був академічним майстром на всі руки. Однак, перш за все, він був романтиком і патріотом. Його magnum opus був #italic $atland_eller_manheim$#!, масштабна історія, в якій він стверджував, що Швеція насправді була міфічною Атлантидою. Завдяки видатній репутації Рудбека та науковому характеру його дискурсу, грандіозна праця була напрочуд добре сприйнята. Усі культури, стверджував професор, походять зі Швеції."
  flavor_swe.30.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swe.31.title: "Від природничих до надприродних наук"
  flavor_swe.31.desc: "Один із наших найталановитіших природознавців зазнав дивної трансформації: після отримання, очевидно, божественних видінь, він став провідним експертом з чудес Небес і жахів Пекла. Теологічні дослідження такої глибини та складності, особливо від такого шанованого розуму, безсумнівно, виявляться надзвичайно впливовими. Ми можемо подякувати цьому вченому містику за зміцнення міжнародної репутації [ShowCultureName('swedish')] науки."
  flavor_swe.31.historical_info: "Емануель Сведенборг був одним із перших шведських природознавців, чиї ранні праці включали блискучі «Принципи природних речей», в яких він індуктивним шляхом дійшов кількох висновків, що дуже нагадують теорії сучасних вчених. Життя Сведенборга різко змінилося під час однієї з його подорожей. У нього були дивні сни та видіння, які змусили його відмовитися від природничих наук і звернутися до містицизму. У 1758 році він опублікував свою найвпливовішу працю – «Про Небеса та їхні чудеса, і про Пекло»."
  flavor_swe.31.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swe.32.title: "#italic Famam Extendere Factis#!"
  flavor_swe.32.desc: "Дослідження незвіданих територій нарешті виявилося плідним. Наші кораблі повертаються перевантажені екзотичними рослинами та істотами всіх видів, багатьох з яких ми ніколи раніше не бачили. Хоч би якими чудовими вони не були, ми намагаємося зрозуміти їхню дивну природу. Щоб краще зрозуміти, як вони порівнюються з більш знайомою флорою та фауною, один із наших найкращих наукових умів почав розробляти систему класифікації. Сподіваємося, її остаточне прийняття спростить ці складні біологічні питання."
  flavor_swe.32.historical_info: "Шведський ботанік Карл Лінней є батьком сучасної таксономії. Публікація його «Species Plantarum» у 1753 році ознаменувала початок епохи класифікації та відкриттів. Сам Лінней був переважно активним у Швеції, завзято каталогізуючи флору Північної Європи, але його учнів відправляли по всьому світу. Даніель Соландер навіть супроводжував капітана Джеймса Кука в його знаменитій першій подорожі навколо світу."
  flavor_swe.32.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swe.33.title: "Переоцінка абсолютизму"
  flavor_swe.33.desc: "[ROOT.GetCountry.GetName] перебуває на межі краху. Нинішній [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle] має стільки ж недоброзичливців, скільки й прихильників, щодня з'являються групи, які підтримують конкуруючих претендентів. Було стільки іноземного втручання в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] правління, що ми відчуваємо себе скоріше маріонетковою державою, ніж великою нацією, і люди всіх класів відкрито обурюються, несучи на собі нищівний тягар абсолютного правління.\n\nЗбереження повного контролю може виявитися фатальною помилкою з боку [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle]. Ми повинні готуватися до жорстокого опору будь-якому нашому вибору."
  flavor_swe.33.historical_info: "Смерть бездітного Карла XII залишила його молодшу сестру Ульріку Елеонору на чолі як королеву. Завзятий парламентарій, канцлер Арвід Горн, негайно скористався цією можливістю, щоб повалити абсолютизм і зміцнити повноваження парламенту. Хоча його демократичні нахили були певною мірою похвальними, його дії повністю дестабілізували Швецію і зробили її маріонеткою іноземних інтересів на наступні 50 років. Ця так звана «Епоха Свободи» також побачила, як аристократія відновила частину своїх втрачених позицій. Однак молода королева не бачила чіткої альтернативи, яка б не надто засмутила її втомлений від війни народ."
  flavor_swe.33.a: "Відмовитися від абсолютизму."
  swe_age_of_freedom_always: "Це заблокована реформа, яку не можна скасувати за вибором."
  flavor_swe.33.b: "Триматися за кермо..."
  flavor_swe.34.title: "Меркантильні реформи «Капелюхів»"
  flavor_swe.34.desc: "Прийняття меркантилізму допомогло б мінімізувати нашу залежність від іноземних товарів. Якби ми прийняли широкомасштабні методи промислового виробництва, такі як ті, що спостерігаються в інших країнах, ми б мінімізували нашу залежність від іноземних продуктів і налагодили вигідні партнерські відносини між урядом і виробниками. Можливо, варто розглянути це."
  flavor_swe.34.historical_info: "Шведська партія «Капелюхів», вражена великими мануфактурами в Нідерландах та Англії, вирішила прискорити індустріалізацію в Швеції, заснувавши низку державних підприємств у співпраці з фермером-картоплярем та промисловим магнатом Йонасом Альстремером. Успіх був обмеженим, але деякі мануфактури виявилися здатними приносити значний прибуток... з часом."
  flavor_swe.34.a: "Час експериментувати..."
  flavor_swe.34.b: "Меркантилізм мертвий!"
  flavor_swe.35.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  flavor_swe.35.desc: "Кожна сесія [ROOT.GetCountry.GetGovernment.GetParliament.GetName] перетворюється на запеклу суперечку між двома найбільшими — і найгучнішими — групами, «Шапками» та «Капелюхами». Замість того, щоб розділятися за політичними поглядами, дві групи сперечальників підтримують протилежні іноземні альянси, що подвійно дратує, коли вони зривають роботу з управління [ROOT.GetCountry.GetName], щоб влаштувати свої бійки. Від виснаження, якщо не від чогось іншого, ми повинні обрати сторону, інакше ми ризикуємо ніколи більше нічого не зробити!"
  flavor_swe.35.historical_info: "Шведська політика з 1721 по 1772 рік повністю домінувала паралізуюча суперечка між так званими партіями «Капелюхів» та «Шапок». «Шапки», спочатку очолювані Арвідом Горном, підтримувалися Росією та Англією, тоді як «Капелюхи» підтримувалися Францією. Іноземне втручання неухильно зростало, і коли Густав III захопив владу в 1772 році, найвпливовішою політичною фігурою в Швеції був російський посол. На Риксдагу 1738 року «Капелюхам» вдалося перехитрити миролюбного Арвіда Горна і захопити владу. Горн зробив помилку, поновивши оборонний союз 1724 року з Росією, водночас намагаючись домовитися про субсидійний договір з Францією, яка все ще офіційно підтримувала Станіслава Лещинського проти росіян у Польщі."
  flavor_swe.35.a: "Нехай «Капелюхи» переможуть."
  swedish_hats: "Шапки при владі"
  flavor_swe.35.b: "Нехай переможуть Ковпаки."
  swedish_caps: "Ковпаки при владі"
  flavor_swe.36.title: "Переворот [GetCurrentYear] року"
  flavor_swe.36.desc: "Бути «правителем» [ROOT.GetCountry.GetName] стало справжнім жартом. Національна рада — єдина справжня влада тут, і вона щойно заявила про своє панування найобразливішим способом: використовуючи власну печатку [ROOT.GetCountry.GetGovernment.GetRulerTitle] для затвердження документів, які [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] навіть не бачив! Таке нахабство не можна терпіти."
  flavor_swe.36.historical_info: "Шведський король Адольф Фредерік був зведений до маріонетки, яка мусила підписувати будь-який документ, який Національна рада клала йому на стіл. Проте король та його королева, Ловіса Ульріка, намагалися саботувати засідання ради та нав’язувати свою волю щоразу, коли мали нагоду. У 1756 році Рада повідомила королю, що вони почнуть використовувати королівську печатку на документах, які він відмовлявся підписувати. Розлючена цією кричущою образою, королева почала планувати державний переворот у червні, але її співучасників викрили та стратили. В результаті королівська влада була зменшена ще на одну сходинку."
  flavor_swe.36.a: "Підтвердити чинну Конституцію."
  flavor_swe.36.b: "Збільшити [ROOT.GetCountry.GetGovernment.GetAdjective] вплив."
  flavor_swe.37.title: "Державний переворот та Просвічений Деспот"
  flavor_swe.37.desc: "Тепер, коли при владі новий лідер, нескінченні чвари між Ковпаками та Шапками нарешті припиняться раз і назавжди! Це зайняло місяці ретельного вирощування, але ми створили велику, вірну армію прихильників — багато з яких є головами справжньої армії. Сподіваємося, що їхні руки обережно керуватимуть ситуацією, і ми забезпечимо безкровний переворот.\n\nШляхетний і божественно призначений правитель увійде і м'яко, але авторитетно, візьме повний контроль, відновить порядок і твердо поверне монархії її належну вагу. Заради [ROOT.GetCountry.GetName] це має бути зроблено. Це не автократія — це найсправжніша форма патріотизму!"
  flavor_swe.37.historical_info: "Густав III, зійшовши на шведський престол, побачив націю, що засмоктувалася у вир хаосу через паралізуючі чвари партій Шапок і Ковпаків. Щось потрібно було робити, і швидко, інакше Швеція могла б розділити долю бідної, нещасної Польщі. Тож, замість того, щоб стояти осторонь і спостерігати, як його націю розривають Сцилла і Харибда, король взяв справу у свої руки і захопив владу шляхом безкровного державного перевороту. Так розпочався Густавіанський період шведської історії."
  flavor_swe.37.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] буде правити!"
  flavor_swe.37.b: "Більше ніяких тиранів!"
  flavor_swe.38.title: "Срібна копальня [target_location.GetNameWithNoTooltip]"
  flavor_swe.38.desc: "Поки [ShowContinentName('europe')] крокує до сучасності, ненаситний попит на [ShowGoodsName('silver')] продовжує зростати, підживлюючи торгівлю та валюту. У серці [ROOT.GetCountry.GetLongName] відкриття значних покладів срібла в [target_location.GetName] привернуло увагу [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Копальні обіцяють величезне багатство, потенційно здатне зміцнити фінансове становище [ROOT.GetCountry.GetNameWithNoTooltip] на континенті. Однак видобуток дорогоцінного металу пов'язаний з численними труднощами, від затоплення тунелів до ризику обвалів, що вимагає значних інвестицій та кваліфікованої робочої сили."
  flavor_swe.38.historical_info: "Видобуток срібла в Салі розпочався в середині XV століття, але лише на початку XVI століття корона почала виявляти до нього інтерес. Шахтарі почали переговори зі Сванте Нільссоном Стуре на Різдво 1511 року і отримали свій королівський привілей, підписаний у 1512 році."
  flavor_swe.38.a: "Це наше і [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]'s."
  flavor_swe.38.b: "Нам не потрібне [ShowGoodsNameWithNoTooltip('silver')]."
  flavor_swe.39.title: "Срібло Наси"
  flavor_swe.39.desc: "Далеко на півночі, у суворих ландшафтах [ShowLocationName('silbojock')], було зроблено значне відкриття. Срібна копальня Насаф'єлль [ShowGoodsName('silver')], віддалене та важкодоступне місце, містить величезні запаси срібної руди. Це відкриття надає [ROOT.GetCountry.GetName] безпрецедентну можливість збільшити своє багатство та вплив у [ShowContinentName('europe')]. Однак суворий клімат, відстань від великих міст та потреба у кваліфікованих робітниках створюють унікальні виклики."
  flavor_swe.39.historical_info: "Срібло в Насаф'єллі було знайдено саамом Пером Олофссоном у 1634 році, який повідомив про це алмазному шахтарю на ім'я Йонс Перссон. У 1635 році розпочалися роботи з видобутку срібла за участю найнятих експертів з Бергслагена."
  flavor_swe.39.a: "Це гарна інвестиція!"
  flavor_swe.39.b: "$flavor_swe.38.b$"
  flavor_swe.40.title: "$swe_makalos$"
  flavor_swe.40.desc: "У серці [ShowLocationName('stockholm')] височіє диво архітектури, палац Макалос, відомий як «незрівнянний» за свою неперевершену красу та велич. Збудований як приватна резиденція шляхетної родини [ShowDynastyName('de_la_gardie_dynasty')], палац є символом культурних та архітектурних досягнень нації."
  flavor_swe.40.historical_info: "Палац був замовлений Якобом Делагарді у 1630 році, збудований по інший бік води від королівського палацу, набагато більший за будь-яку іншу будівлю в місті. Палац був завершений у 1653 році."
  flavor_swe.40.a: "Він стоятиме вічно!"
  flavor_swe.41.title: "Заснування Гетеборга"
  flavor_swe.41.desc: "Наша країна довго була зосереджена на Балтійському морі, але зі зростанням світу все більше торгівлі та багатства надходить із заходу. Нам потрібне велике місто на заході, щоб підтримати наші амбіції!"
  flavor_swe.41.historical_info: "Місто Гетеборг було засноване у 1621 році королем Густавом II Адольфом на південному березі річки Гета-Ельв. Більшість населення в перші дні становили голландські бюргери, а початкове планування міста було виконано з каналами."
  flavor_swe.41.a: "Це буде місто для Ангелів."
  flavor_swe.42.title: "[target_character.GetNameWithNoTooltip]"
  flavor_swe.42.desc: "З нашим прийняттям Реформації настав час перекласти Святу Біблію також на [ShowDialectName('finnish_dialect')] мову. Це буде великою перевагою для створення єдиної [ShowCultureName('finnish')] культури в нашій країні.\n\n'Навчіться тепер, старі й молоді, хто має свіже серце, Божих заповідей і розуму, щоб ви знали [ShowDialectNameWithNoTooltip('finnish_dialect')] мову.'"
  flavor_swe.42.historical_info: "Мікаель Агрікола народився в Нюланді та навчався у Виборзі, перш ніж стати єпископом Або. Йому приписують звання Батька писемної фінської мови, написання першої книги, абетки та Катехізису, а також молитовника, перш ніж перекласти Новий Заповіт фінською."
  flavor_swe.42.a: "Почати друкувати #italic Abckiria#!."
  flavor_swe.42.tt: "[ShowCultureName('tavastian')], [ShowCultureName('savonian')] та [ShowCultureName('kvens')] тепер вважатимуть себе [ShowCultureName('finnish')]."
  flavor_swe.42.b: "Це нас не цікавить."
  flavor_swe.43.title: "Перші надруковані книги!"
  flavor_swe.43.desc: "З нашим пристосуванням до дивовижного винаходу друкарського верстата з рухомими літерами, книги тепер можуть копіюватися у великих кількостях, поширюючи знання набагато швидше. Це можна використовувати як на добро, так і на зло: це може бути використано для сприяння розумінню Бога, але також може бути використано для спокуси людини до гріха..."
  flavor_swe.43.historical_info: "Книга «Dialogus Creaturarum Moralizatus» була першою книгою, надрукованою у Швеції. Це була не стільки книга, скільки збірка текстів про все в житті, від зірок до металів, тварин та іншого. Письменник був невідомий, але це була збірка текстів та багато посилань як на Біблію, так і на тексти Античності."
  flavor_swe.43.a: "Це навчить нас усьому."
  flavor_swe.43.b: "Можливо, нам слід обмежити те, що друкується?"
  flavor_swe.44.title: "Залізні копальні Оямо"
  flavor_swe.44.desc: "Можливо, у глибокому лісі поблизу озера Лох'ян'ярві є [ShowGoodsName('iron')]. Оямо має багаті жили залізної руди, ресурсу, який може виявитися безцінним для промисловості та військових амбіцій [ROOT.GetCountry.GetFlavorRank]. Десятиліттями цей регіон [ShowAreaName('finland_area')] цінувався за свою деревину та сільськогосподарські угіддя, але відкриття заліза в Оямо знаменує поворотний момент для майбутнього [ShowLocationName('lohja')]."
  flavor_swe.44.historical_info: "Король Густав Ваза надав серу Еріку Флеммінгу зі Сіунтіо дозвіл на видобуток залізної руди. У 1542 році залізна руда почала видобуватися в Оямо поблизу Лох'ї, створивши найстарішу відому залізну копальню у Фінляндії."
  flavor_swe.44.a: "Це може принести користь усій [ShowAreaName('finland_area')]!"
  flavor_swe.44.b: "У нас достатньо [ShowGoodsNameWithNoTooltip('iron')]."
  flavor_swe.45.title: "Велика Яма"
  flavor_swe.45.desc: "Велика катастрофа сталася в нашій [ShowGoodsName('copper')] копальні в [ShowLocationName('falun')], обваливши частини копальні у величезну яму. На щастя, жоден з [ShowPopTypeName('peasants')], що працювали в ній, не загинув."
  flavor_swe.45.historical_info: "Інтенсивна гірнича діяльність та неструктуроване розширення гірничих виробок завершилися катастрофічним обвалом у день літнього сонцестояння, 25 червня 1687 року. Попередній обвал у 1655 році вже спричинив злиття кількох старих гірничих виробок. Під час катастрофи 1687 року значна частина копальні обвалилася, об'єднавши три великі відкриті кар'єри у масивну «Stora Stöten», колосальну карстову вирву майже 2 кілометри в окружності та близько 100 метрів у глибину. Примітно, що жодне життя не було втрачено під час обвалу, оскільки день літнього сонцестояння — разом з неділями та днями молитов — був вихідним днем на копальні."
  flavor_swe.45.a: "Принаймні, жертв не було..."
  flavor_swe.46.title: "[swe_heliga_birgitta.GetNameWithNoTooltip] критикує [king_sweden.GetNameWithNoTooltip]"
  flavor_swe.46.desc: "Жінка з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [swe_heliga_birgitta.GetName] стверджує, що мала видіння від Бога. Вона є однією з найпобожніших жінок у нашій країні, здійснивши паломництва до кількох святих місць, тому, коли вона звинувачує [ROOT.GetCountry.GetGovernment.GetRulerTitle] у тому, що він недостатньо добрий [ShowReligionGroupAdjective('christian')], або навіть звинувачує [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHim] у гомосексуалізмі, багато хто слухає..."
  flavor_swe.46.historical_info: "Свята Біргітта, також відома як Свята Бригіда Шведська, була видатною містичкою, письменницею та засновницею Ордену бригідок. Вона є однією з найвідоміших середньовічних святих і була канонізована в 1391 році. Народившись у шляхетній родині, вона з раннього віку стала глибоко релігійною, переживаючи видіння, які приписувала божественним одкровенням.\n\nЇї праці та видіння часто містили гостру критику політичного та морального стану її часу, включаючи коментарі щодо дій та обов'язків правителів.\n\nОднією з її найвідоміших критик могла бути спрямована на короля Швеції Магнуса Ерікссона, який правив за її життя. Вона звинувачувала його в неефективному правлінні та критикувала екстравагантність і корупцію його двору. Ці праці відображають її бачення божественно встановленого політичного порядку, де правителі служили Божими управителями на Землі."
  flavor_swe.46.a: "Ну, це незручно..."
  flavor_swe.47.title: "Божевільний [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_swe.47.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] довго конфліктував з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], і вони ситі по горло [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] правлінням. Вони готові підтримати [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] брата, [pretender.GetName], щоб він став новим [ROOT.GetCountry.GetGovernment.GetRulerTitle] великої [ROOT.GetCountry.GetLongName]."
  flavor_swe.47.historical_info: "Ерік XIV Шведський, правитель великих амбіцій та інтелекту, став жертвою власної параної та непередбачуваної поведінки. Спочатку його прославляли за реформи та зусилля зі зміцнення шведської монархії, але пізніші роки були позначені підозрілістю та насильством. Вбивства Стуре 1567 року, коли він наказав убити видатних дворян, налаштували його двір проти нього. Звинувачення у психічній нестабільності та недовіра серед його дворян та родичів зрештою призвели до його скинення у 1568 році, очоленого його власними братами. Ерік провів решту свого життя в полоні, трагічне нагадування про те, як неконтрольована влада може поглинути свого володаря."
  flavor_swe.47.a: "[ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] брат буде кращим."
  flavor_swe.47.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetHeShe] є [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  flavor_swe.48.title: "Канонізація [birgitta_scope_for_ui.GetNameWithNoTooltip]"
  flavor_swe.48.desc: "Звістка про канонізацію [birgitta_scope_for_ui.GetName] досягла [ROOT.GetCountry.GetFlavorRank]! Відома своєю глибокою побожністю та містичними видіннями, її відданість та вплив поширилися далеко за межі її батьківщини. Канонізована Папою, вона стала символом [ROOT.GetCountry.GetAdjective] святості та джерелом натхнення для вірних. Ця подія зміцнює позиції [ROOT.GetCountry.GetNameWithNoTooltip] у християнському світі, але також піднімає питання про роль Церкви в королівстві. Як ми відреагуємо на цю знаменну подію?"
  flavor_swe.48.historical_info: "Біргітта Біргерсдоттер була канонізована Папою Боніфацієм IX у 1391 році та підтверджена у 1415 році Констанцьким собором. Її День Святої тепер відзначається 8 жовтня."
  flavor_swe.48.a: "Заохочувати паломництва до абатства [ShowLocationNameWithNoTooltip('vadstena')]."
  flavor_swe.48.b: "Святкувати її святість по всьому [ROOT.GetCountry.GetFlavorRank]!"
  vadstena_holy_site: "Абатство Вадстена"
  flavor_swe.49.title: "Нікельхарпа"
  flavor_swe.49.desc: "Ніжні, резонансні тони нікельхарпи промовляють до душі [ShowCultureName('swedish')] народу, несучи з собою оповіді нашої землі та історії. Її коріння можна простежити до серця середньовічної [ShowContinentName('europe')], проте вона розквітла як символ культурної творчості [ROOT.GetCountry.GetName]. Від сільських зібрань до священних залів шляхетних дворів, нікельхарпа резонує з гордістю та ідентичністю. Хоча її складний дизайн відображає майстерність наших ремісників, її музика нагадує нам про спільні радощі та боротьбу наших предків. Хоча дехто може вважати її легковажною розвагою, вона залишається свідченням творчості та культурного багатства [ROOT.GetCountry.GetNameNoTooltip], об'єднуючи минуле з сьогоденням у мелодії, що триває."
  flavor_swe.49.historical_info: "Ця клавішна скрипка, як стверджується, була винайдена на початку 14 століття в Уппланді, і з тих пір є важливою частиною традиційної музики країни."
  flavor_swe.49.a: "Це музика для душі!"
  flavor_swe.50.title: "Університет [ShowLocationNameNoTooltip('uppsala')]"
  flavor_swe.50.desc: "З заснуванням Університету [ShowLocationName('uppsala')] наша нація робить сміливий крок до більшої інтелектуальної та культурної значущості. Зали навчання випускатимуть вчених, адміністраторів та теологів, які формуватимуть майбутнє нашого [ROOT.GetCountry.GetFlavorRank] для майбутніх поколінь."
  flavor_swe.50.historical_info: "Університет в Упсалі був заснований у 1477 році за згодою Папи Сикста IV, ставши першим вищим навчальним закладом у Скандинавії. Заснований під керівництвом архієпископа Якоба Ульфссона, університет навчав вчених у галузі теології, права та філософії, зміцнюючи як Католицьку Церкву, так і адміністративні можливості Королівства Швеція."
  flavor_swe.50.a: "#italic Думати вільно — велике, але думати правильно — більше!#!"
  flavor_swe.50.b: "Освіта не є пріоритетом."
  flavor_swe.51.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_swe.51.desc: "Новий голос з'явився в культурному житті нашої нації. [target_artist.GetName], обдарований поет і музикант, полонив аудиторію [target_artist.GetHisHer] дотепними, меланхолійними та щирими піснями, що зображують життя як [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], так і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. [target_artist.GetHisHer] твори, що поєднують гумор і смуток, стали широко популярними як у тавернах, так і в королівських дворах. Оскільки слава [target_artist.GetHisHer] поширюється, ми повинні вирішити, як прийняти цей зростаючий художній талант."
  flavor_swe.51.historical_info: "Карл Міхаель Бельман був шведським поетом, музикантом і автором пісень 18 століття, найбільш відомим своїми жвавими та часто гумористичними описами життя в Стокгольмі. Його твори, зокрема «Послання Фредмана» та «Пісні Фредмана», поєднували сатиру, меланхолію та радість, відображаючи повсякденне життя як простолюдинів, так і знаті. Вшанований як національний бард Швеції, вплив Бельмана на шведську музику та літературу залишається глибоким і донині."
  flavor_swe.51.a: "#italic Підніми повний келих до своїх вуст!#!"
  flavor_swe.52.title: "#italic Systema Naturae#!"
  flavor_swe.52.desc: "[ShowCultureName('swedish')] ботанік розробив нову розумну систему для класифікації різних форм життя. Система, що називається «біноміальна номенклатура», використовує суміш [ShowLanguageName('latin_language')] та давньо[ShowLanguageName('greek_language')] термінології для сортування рослин і тварин усіх видів у акуратні категорії. Оскільки наш флот дослідників часто привозить нові трави та істоти, яких ми ніколи раніше не зустрічали, ця нова система полегшує класифікацію та розуміння цих таємничих відкриттів."
  flavor_swe.52.historical_info: "Карл фон Лінней, також відомий як Лінней, був шведським ботаніком, лікарем і зоологом 18 століття, який розробив сучасну систему біологічної класифікації. Його «Systema Naturae» запровадила біноміальну номенклатуру, метод, який досі використовується для назви та категоризації живих організмів. Завдяки своїм численним подорожам і дослідженням він підняв репутацію Швеції у науковому світі та заклав основу сучасної таксономії."
  flavor_swe.52.a: "Це змінить світ назавжди!"
  flavor_swe.52.b: "Це нас не цікавить."
  flavor_swe.53.title: "Закони [target_character.GetNameWithNoTooltip]"
  flavor_swe.53.desc: "Намагаючись уніфікувати та модернізувати правову базу нашого суспільства, [target_character.GetName] ухвалив всеосяжний правовий кодекс, відомий як Крайовий закон [target_character.GetShortNameWithNoTooltip]. Це законодавство замінює старі провінційні закони стандартизованою правовою системою, зміцнюючи [ROOT.GetCountry.GetGovernment.GetAdjective] владу та сприяючи справедливості по всій землі. Однак, хоча [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вітають правову ясність, деякі регіональні лорди чинять опір ерозії місцевих привілеїв. Як ми будемо впроваджувати цю правову реформу?"
  flavor_swe.53.historical_info: "«Ландслаг» Магнуса Еріксона, ухвалений у 1341 році, був першою спробою Швеції уніфікувати свою правову систему шляхом заміни старих провінційних законів стандартизованим кодексом. Він зміцнив королівську владу, сприяв справедливішій судовій практиці та покращив правову послідовність по всьому королівству. Хоча він модернізував управління, він зіткнувся з опором місцевих лордів, які неохоче відмовлялися від своїх традиційних привілеїв."
  flavor_swe.53.a: "Ухвалити закони!"
  flavor_swe.53.b: "Зберегти [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] задоволеними!"
  flavor_swe.54.title: "Вбивство [target_character.GetNameWithNoTooltip]"
  flavor_swe.54.desc: "На грандіозному балу-маскараді наш [target_character.GetName] був убитий кулею вбивці. [target_character.GetNameWithNoTooltip], відомий [target_character.GetHisHer] просвітницькими реформами та сильним правлінням, нажив багато ворогів серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] через [target_character.GetHisHer] централізацію влади. Змова проти [target_character.GetHimHer], очолювана незадоволеними членами [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], тепер здійснилася, кинувши [ROOT.GetCountry.GetFlavorRank] у політичну невизначеність. Як ми відповімо на цю кризу?"
  flavor_swe.54.historical_info: "Вбивство Густава III відбулося 16 березня 1792 року під час балу-маскараду в Стокгольмі, де його застрелив Якоб Йохан Анкарстрем, незадоволений дворянин, залучений до ширшої змови проти короля. Густав III, відомий своїм просвітницьким абсолютизмом і централізацією влади, нажив багато ворогів серед знаті, яка обурювалася його реформами. Хоча він пережив початковий напад, він помер від ран через два тижні, що призвело до політичних заворушень і зміни в управлінні Швецією."
  flavor_swe.54.a: "Суворо покарати змовників!"
  flavor_swe.54.b: "Обіцяти реформи."
  flavor_swe.55.title: "[GetCountry('HSA').GetAdjectiveWithNoTooltip] Вплив на [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Торгівлю"
  flavor_swe.55.desc: "Домінування [GetCountry('HSA').GetLongName] колись приносило економічну стабільність, але тепер розпалює розбрат у містах і портах [ROOT.GetCountry.GetName]. Настав час визначити, хто формуватиме майбутнє нашої торгівлі: іноземні купці, місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] чи баланс між ними."
  flavor_swe.55.historical_info: "Ганзейська ліга мала присутність у Вісбю, Стокгольмі та Кальмарі, контролюючи значну частину торгівлі. Король Ерік Померанський, який правив Швецією між 1396 і 1434 роками, намагався обмежити їхній вплив."
  flavor_swe.55.a: "Обмежити [GetCountry('HSA').GetAdjectiveWithNoTooltip] домінування."
  flavor_swe.55.b: "Підтвердити [GetCountry('HSA').GetAdjectiveWithNoTooltip] привілеї."
  swe_allows_hsa: "Ганзейський привілей у Швеції"
  swe_denies_hsa: "Ганза обмежена у Швеції"
  flavor_swe.56.title: "[ShowGoodsNameNoTooltip('copper')] Платіжні монети"
  flavor_swe.56.desc: "Намагаючись скористатися багатими запасами [ShowGoodsName('copper')] у [ROOT.GetCountry.GetName], уряд запровадив великі мідні платіжні монети, щоб доповнити [ShowGoodsName('silver')] валюту. Ці величезні монети, хоч і інноваційні, є громіздкими та непрактичними для повсякденного використання. Вони викликали велике розчарування серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], а також іноземних торговців. Чи варто нам подвоїти наші [ShowGoodsNameNoTooltip('copper')]-забезпечені гроші, чи повернутися до більш традиційних методів карбування?"
  flavor_swe.56.historical_info: "У середині 17 століття Швеція запровадила великі мідні платіжні монети, деякі з яких важили до 20 кілограмів, як спосіб використання своїх багатих мідних ресурсів та компенсації нестачі срібла. Ці монети були технічно дійсною валютою, але виявилися дуже непрактичними для щоденного використання через їх розмір та вагу. Хоча інноваційні, вони підкреслили виклики базування монетарної системи на недорогоцінних металах."
  flavor_swe.56.a: "Це була погана ідея..."
  flavor_swe.56.b: "Час покаже, що це було добре!"
  STATIC_MODIFIER_NAME_silver_based_coinage: "Карбування на основі срібла"
  flavor_swe.57.title: "Лісовий народ"
  flavor_swe.57.desc: "Зіткнувшись із тиском населення та привабливістю можливостей, велика кількість лісових мешканців з [ShowAreaName('finland_area')] почала осідати в лісових регіонах власне [ROOT.GetCountry.GetName]. Відомі своєю майстерністю у підсічно-вогневому землеробстві, ці [ShowCultureName('finnish')] поселенці приносять як цінні навички, так і незнайомі звичаї на нашу землю. Хоча деякі вітають їхню працьовитість, інші розглядають їх як чужинців, які порушують традиційний спосіб життя. [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] має вирішити, як впоратися з цією зростаючою міграцією."
  flavor_swe.57.historical_info: "Як король Карл IX, так і король Густав II Адольф активно сприяли міграції лісових фінів у межах свого королівства. Це не було випадковим явищем; скоріше, це представляло собою свідому політику створення поселень у малонаселених північних, східних та західних територіях, тим самим розвиваючи ці периферійні регіони."
  flavor_swe.57.a: "Заохочувати міграцію."
  flavor_swe.57.b: "Це треба зупинити!"
  STATIC_MODIFIER_NAME_slash_and_burn_foresting: "Підсічно-вогневе лісівництво"
  flavor_swe.58.title: "Можливе справжнє піратство"
  flavor_swe.58.desc: "Хоробрі досвідчені моряки просять [ROOT.GetCountry.GetGovernment.GetAdjective] дозволу на напад на кораблі наших ворогів. Діючи з порту [ShowLocationName('utlandet')], вони могли б вести свої кораблі, щоб переслідувати вороже судноплавство в Балтійському та Північному морях. Успішні операції могли б наповнити [ROOT.GetCountry.GetGovernment.GetAdjective] скарбницю та вселити страх у наших ворогів, але запропоновані методи розмивають межу між законністю та беззаконням..."
  flavor_swe.58.historical_info: "Ларс Гаттенгільм, відомий як Лассе і Гатан, був шведським капером, активним під час Великої Північної війни, діючи за королівським дозволом з Гетеборга. Хоча офіційно він націлювався на ворожі кораблі, особливо данських купців, його дії часто переходили в піратство. Деякі вважали його національним героєм, інші — морським розбійником, він став легендарною фігурою в морській історії Швеції."
  flavor_swe.58.a: "Видати каперські свідоцтва."
  flavor_swe.58.b: "Це нижче нашої гідності!"
  flavor_swe.59.title: "#italic Then Swänska Argus#!"
  flavor_swe.59.desc: "У серці [ShowLocationName('stockholm')] нова щотижнева газета під назвою #italicThen Swänska Argus#! набирає популярності. З дотепністю та ясністю видання критикує застарілі традиції та відстоює раціональне мислення, поміркованість та [ROOT.GetCountry.GetCulture.GetDialect.GetName] народну мову. Її вплив відчувається далеко й широко, надихаючи реформаторів та лінгвістів, тонко формуючи майбутнє королівства. Чи підтримаємо ми цей сміливий голос прогресу?"
  flavor_swe.59.historical_info: "Виданий у 1732 році Олофом фон Даліном, Then Swänska Argus ознаменував поворотний момент у шведській літературній історії. Написаний жвавим та доступним стилем, він відстоював ідеали Просвітництва та допоміг модернізувати шведську мову. Видання швидко стало культурним маяком, формуючи громадську думку та впливаючи на покоління шведських мислителів."
  flavor_swe.59.a: "Підтримати це бачення сучасної [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_swe.59.b: "Нам потрібно цензурувати пресу!"