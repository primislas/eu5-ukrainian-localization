l_english:
  flavor_orm_oma.1.title: "Контроль Набханів над Оманом"
  flavor_orm_oma.1.desc: "Оманське узбережжя, на яке наші предки поширили свою владу, є непокірним і бідним; ми маємо дуже низький [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над ним, що робить його джерелом проблем і повстань.\n\nНа додаток до цієї складної ситуації, [ShowDynastyName('nabhani_dynasty')] виявили до нього свій інтерес, посилюючи напругу на і без того хиткому кордоні. На щастя, наші дипломати впевнені, що зможуть укласти договір, який дозволить уникнути потенційного прикордонного конфлікту та заощадить наші фінанси в довгостроковій перспективі."
  flavor_orm_oma.1.a: "Віддати це Набхані"
  flavor_orm_oma.1.b: "Це наша земля!"
  flavor_orm_oma.2.title: "$flavor_orm_oma.1.title$"
  flavor_orm_oma.2.desc: "Дипломати з [GetCountry('ORM').GetLongName] звернулися до нашого двору з пропозицією. Щоб уникнути будь-яких прикордонних конфліктів між нашими народами, вони готові відмовитися від контролю над усіма [ShowCultureName('omani_culture')] землями, якими вони володіють. Натомість вони просять лише, щоб наші нації залишалися друзями і щоб мирне співіснування підтримувалося."
  flavor_orm_oma.2.a: "Ми люб'язно приймаємо"