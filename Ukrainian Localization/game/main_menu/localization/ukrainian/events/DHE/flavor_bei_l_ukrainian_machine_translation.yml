l_english:
  flavor_bei.1.title: "Султан Брунею"
  flavor_bei.1.desc: "Коли [ShowReligionGroupAdjective('muslim')] вірні поширювалися Південно-Східною Азією, амбітний [ROOT.GetCountry.GetGovernment.GetRuler.GetName] розчарувався в дипломатичних обмеженнях своєї традиційної [ROOT.GetCountry.GetGovernment.GetRuler.GetReligion.GetAdjective] віри.\n#NL![ROOT.GetCountry.GetGovernment.GetRuler.GetHeSheFormal|U] почав благати нас прийняти шляхи [ShowReligionGroupName('muslim')], оскільки це відкриє дипломатичні можливості та навіть шлюб з іншими вірними правителями.\n#NL!Звісно, серед наших вірних підданих є певна радість, але чи справді навернення — це правильний шлях?"
  flavor_bei.1.a: "Ми складемо шахаду."
  flavor_bei.1.b: "Старі звичаї мають бути вшановані."
  flavor_bei.1.historical_info: "У 1360-х роках Аванг Алак Бетатар, індуїстський раджа Брунею, навернувся в іслам. Він зробив це, щоб отримати право одружитися з іноземною принцесою, яка зазвичай вважається дочкою султана Джохору. Після його навернення колишній раджа став відомий як султан Мухаммад Шах. Його династія править Брунеєм і донині, що робить її однією з найшанованіших правлячих династій в історії."