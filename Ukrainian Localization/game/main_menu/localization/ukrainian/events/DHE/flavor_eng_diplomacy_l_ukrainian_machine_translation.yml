l_english:
  flavor_eng_diplomacy_success: "Наші дипломатичні зусилля, схоже, увінчалися успіхом."
  flavor_eng_diplomacy_failure: "Наші дипломатичні зусилля, схоже, були марними."
  flavor_eng_diplomacy.1.title: "[sender.GetGovernment.GetRulerTitle] [sender.GetNameWithNoTooltip] погоджується на запропоновані умови"
  flavor_eng_diplomacy.1.desc_matter_of_matrimony_dowry_paid: "[sender.GetGovernment.GetRulerTitle] [sender.GetName] погодився сплатити належний посаг. Таким чином, Медіна-дель-Кампоський договір шанується обома сторонами.\n\n$flavor_eng_diplomacy_success$"
  flavor_eng_diplomacy.1.desc_fields_of_the_cloth_of_gold_accepted: "[sender.GetGovernment.GetRulerTitle] [sender.GetName] погодився відвідати саміт. Підготовка триває і, як очікується, буде завершена за рік, якщо між нашими двома країнами не виникнуть військові дії.\n\n$flavor_eng_diplomacy_success$"
  field_of_the_cloth_of_gold: "Поле золотої парчі"
  flavor_eng_diplomacy.1.desc_treaty_of_windsor: "Наші спроби укласти тривалий договір із [sender.GetName] увінчалися успіхом, обидві сторони підписали Віндзорський договір. Безсумнівно, це знаменує початок процвітаючих відносин між нашими двома країнами та забезпечує наше виживання як незалежного [ROOT.GetCountry.GetFlavorRank].\n\nНаші дипломатичні зусилля, схоже, були вартісними."
  flavor_eng_diplomacy.1.desc_treaty_of_perpetual_peace_marriage: "[sender.GetGovernment.GetRulerTitle] [sender.GetName] погодився на пропозицію шлюбу. Таким чином, Договір про вічний мир шанується обома сторонами.\n\n$flavor_eng_diplomacy_success$"
  flavor_eng_diplomacy.1.desc_union_of_the_crowns: "[sender.GetGovernment.GetRuler.GetName] погодився на запропонований династичний союз між [GetCountry('SCO').GetName] та [GetCountry('ENG').GetName]. Два королівства можуть бути об'єднані після смерті [dying_monarch.GetName], за відсутності спадкоємця.\n\n$flavor_eng_diplomacy_success$"
  flavor_eng_diplomacy.1.desc_treaty_of_windsor_renegotiated: "Наші спроби укласти союз із [sender.GetName] увінчалися успіхом, обидві сторони підтвердили свою підтримку Віндзорського договору. Шлюбний контракт було погоджено, [suitable_daughter.GetName] вирушила в подорож, щоб одружитися з [sender.GetGovernment.GetRuler.GetName]. Безсумнівно, це знаменує початок тривалих відносин між нашими двома країнами та забезпечує збереження [ROOT.GetCountry.GetName] як незалежного [ROOT.GetCountry.GetFlavorRank].\n\nНаші дипломатичні зусилля, схоже, були вартісними."
  flavor_eng_diplomacy.1.desc_treaty_of_stjames: "Наші спроби укласти вигідний договір із [sender.GetName] увінчалися успіхом, обидві сторони підписали договір про співпрацю. [ROOT.GetCountry.GetName] надаватиме військову підготовку в обмін на вигідні торговельні права.\n\nНаші дипломатичні зусилля, схоже, були вартісними."
  flavor_eng_diplomacy.1.desc_generic_treaty: "Наші спроби укласти вигідний договір виявилися успішними, оскільки [sender.GetGovernment.GetRulerTitle] [sender.GetName] погодився підписати.\n\nНаші дипломатичні зусилля, схоже, були вартісними."
  flavor_eng_diplomacy.1.a: "Безсумнівно, вдала партія."
  flavor_eng_diplomacy.1.b: "Нехай почнуться приготування."
  flavor_eng_diplomacy.1.c: "Принесіть портвейн."
  flavor_eng_diplomacy.1.d: "Це добрий знак."
  flavor_eng_diplomacy.1.tt1: "Унія Корон може бути запропонована, якщо правителі [GetCountry('ENG').GetName] та [GetCountry('SCO').GetName] мають спільне походження без очевидного спадкоємця"
  flavor_eng_diplomacy.1.e: "Нарешті об'єднані."
  flavor_eng_diplomacy.1.tt2: "Унія Корон відбудеться після смерті [dying_monarch.GetName], якщо [dying_monarch.GetSheHe] помре без спадкоємця"
  flavor_eng_diplomacy.1.f: "Негайно розгорніть наших солдатів."
  flavor_eng_diplomacy.1.g: "Послуга за послугу."
  flavor_eng_diplomacy.1.tt3: "[ceded_location.GetName] передано [sender.GetName]"
  flavor_eng_diplomacy.1.tt4: "[suitable_daughter.GetName] одружена з [sender.GetGovernment.GetRuler.GetName]"
  flavor_eng_diplomacy.1.h: "Формується грізна сила."
  eng_accepted_alliance_with_us: "Прийнятий союз з нами"
  flavor_eng_diplomacy.1.i: "Все гаразд."
  flavor_eng_diplomacy.2.title: "[target_character.GetNameWithNoTooltip] з [sender.GetNameWithNoTooltip] відхиляє дипломатичну пропозицію"
  flavor_eng_diplomacy.2.desc_fields_of_the_cloth_of_gold_declined: "Наші спроби організувати пишний прийом виявилися марними, оскільки [sender.GetGovernment.GetRulerTitle] з [sender.GetName] відмовляється бути присутнім.\n\n$flavor_eng_diplomacy_failure$"
  flavor_eng_diplomacy.2.desc_union_of_the_crowns_declined: "Наші спроби забезпечити союз між [GetCountry('SCO').GetName] та [GetCountry('ENG').GetName] були безуспішними, оскільки [sender.GetGovernment.GetRulerTitle] з [sender.GetNameWithNoTooltip] відмовився від запропонованої угоди.\n\n$flavor_eng_diplomacy_failure$"
  flavor_eng_diplomacy.2.desc_treaty_of_newcastle_declined: "Нашу спробу забезпечити виконання Ньюкаслського договору між [GetCountry('SCO').GetName] та [GetCountry('ENG').GetName] було відхилено [target_character.GetName].\n\n$flavor_eng_diplomacy_failure$"
  flavor_eng_diplomacy.2.desc_generic_treaty: "Наші спроби укласти вигідний договір виявилися марними, оскільки [sender.GetGovernment.GetRulerTitle] з [sender.GetName] відмовляється його підписувати.\n\n$flavor_eng_diplomacy_failure$"
  flavor_eng_diplomacy.2.a: "Втрачена можливість."
  flavor_eng_diplomacy.2.b: "Наші зусилля були марними."
  flavor_eng_diplomacy.2.c: "Вони не мають честі."
  flavor_eng_diplomacy.2.d: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_eng_diplomacy.2.tt: "Довіра, надана [sender.GetName], втрачена"
  flavor_eng_diplomacy.1000.title: "[suitable_daughter.GetNameWithNoTooltip] з [GetCountry('ARA').GetNameWithNoTooltip]"
  flavor_eng_diplomacy.1000.desc: "Настав час обрати гідну дружину для [ROOT.GetCountry.GetGovernment.GetHeir.GetName], щоб підтримувати дипломатичні відносини та забезпечити лінію престолонаслідування. Як було домовлено в Медіна-дель-Кампському договорі, обіцяна рука майбутньої дочки [GetCountry('ARA').GetGovernment.GetRulerTitle] з [GetCountry('ARA').GetName]. Тому було погоджено, що [suitable_daughter.GetName] та [ROOT.GetCountry.GetGovernment.GetHeir.GetShortNameWithNoTooltip] поєднаються святим шлюбом.\n\nОднак залишається питання приданого, яке ще не виплачено..."
  flavor_eng_diplomacy.1000.a: "Відправити посла до [GetCountry('ARA').GetAdjectiveWithNoTooltip] двору."
  flavor_eng_diplomacy.1000.tt1: "Зроблено спробу витребувати невиплачене придане"
  flavor_eng_diplomacy.1000.b: "Відмовитися від приданого."
  flavor_eng_diplomacy.1000.tt2: "Добросердечність [target_root_country.GetGovernment.GetRuler.GetName] відзначена"
  flavor_eng_diplomacy.1000.c: "Це не вдалий шлюб."
  flavor_eng_diplomacy.1000.tt3: "[target_root_country.GetName] зневажає Медіна-дель-Кампський договір"
  flavor_eng_diplomacy.1000.historical_info: "Шлюб Генріха VIII, майбутнього короля Англії, та Катерини Арагонської, дочки іспанських монархів Фердинанда II Арагонського та Ізабелли I Кастильської, відбувся 1509 року. Шлюб спочатку був укладений з метою зміцнення союзу між Англією та Іспанією. Майбутня королева мала труднощі із зачаттям спадкоємця чоловічої статі, що стало значною проблемою і призвело до того, що Генріх домагався анулювання свого шлюбу."
  flavor_eng_diplomacy.1001.title: "Питання шлюбу"
  flavor_eng_diplomacy.1001.desc_common: "Настав час виконати наші зобов'язання. Як було домовлено в Медіна-дель-Кампському договорі, рука майбутньої дочки [ROOT.GetCountry.GetGovernment.GetRuler.GetName] обіцяна [target_root_country.GetName]."
  flavor_eng_diplomacy.1001.desc: "$flavor_eng_diplomacy.1001.desc_common$ Тому було запропоновано, щоб [suitable_daughter.GetName] та [target_root_country.GetGovernment.GetHeir.GetName] поєдналися святим шлюбом.\n\nОднак залишається питання приданого, яке ми ще маємо виплатити згідно з договором."
  flavor_eng_diplomacy.1001.desc_dowry_foregone: "$flavor_eng_diplomacy.1001.desc_common$ Тому було запропоновано, щоб [suitable_daughter.GetName] та [target_root_country.GetGovernment.GetHeir.GetName] поєдналися святим шлюбом.\n\nОднак залишається питання приданого, від якого [target_root_country.GetName] великодушно вирішила відмовитися."
  flavor_eng_diplomacy.1001.desc_marriage_refused: "$flavor_eng_diplomacy.1001.desc_common$ Однак вони в односторонньому порядку вирішили відмовитися від шлюбу та зневажити угоду."
  flavor_eng_diplomacy.1001.desc_dowry_refused: "[GetCountry('ARA').GetAdjectiveWithNoTooltip] посол поспіхом проходить повз ворота Вайтхоллу, несучи лихі вісті. Він повідомляє [ROOT.GetCountry.GetGovernment.GetRulerTitle], що [GetCountry('ARA').GetGovernment.GetRuler.GetName], на жаль, вирішив не сплачувати несплачену суму посагу за [suitable_daughter.GetName] після її шлюбу з [heir.GetName].\n\nПосол віддаляється, безсумнівно, усвідомлюючи шкоду, завдану щойно висловленими словами."
  flavor_eng_diplomacy.1001.a: "Відмовитися платити."
  flavor_eng_diplomacy.1001.b: "Передати наші сердечні побажання."
  flavor_eng_diplomacy.1001.c: "Вони не мають честі."
  flavor_eng_diplomacy.1001.d: "Контракт є контракт."
  flavor_eng_diplomacy.1001.e: "Ми залишаємо дівчину."
  flavor_eng_diplomacy.1001.tt: "Договір Медіна-дель-Кампо оголошується недійсним"
  flavor_eng_diplomacy.1100.title: "Договір Медіна-дель-Кампо"
  flavor_eng_diplomacy.1100.desc: "Виникла нагода для дипломатії, що пропонує шанс встановити тривалий мир та потенційного союзника в майбутньому. [overlord.GetName], стомлений подальшими ворожими діями з боку [GetCountry('FRA').GetName], може бути переконаний укласти договір, який об'єднає наші дві династії, представляючи єдиний фронт."
  flavor_eng_diplomacy.1100.a: "Запропонувати договір."
  flavor_eng_diplomacy.1100.b: "Це нам не принесе користі."
  flavor_eng_diplomacy.1100.tt1: "Договір Медіна-дель-Кампо запропоновано [overlord.GetNameWithNoTooltip]"
  flavor_eng_diplomacy.1100.tt2: "Це збільшує наші шанси на забезпечення тривалого миру з [overlord.GetNameWithNoTooltip]"
  flavor_eng_diplomacy.1100.tt3: "Це зменшує наші шанси на дипломатичні відносини з [GetCountry('FRA').GetNameWithNoTooltip]"
  flavor_eng_diplomacy.1100.tt4: "Це забезпечує руку будь-якої майбутньої дочки [lesser_partner.GetGovernment.GetRulerTitle] з [lesser_partner.GetNameWithNoTooltip]"
  flavor_eng_diplomacy.1100.tt5: "[GetCountry('FRA').GetNameWithNoTooltip] вважає це жестом доброї волі"
  signed_medina_del_campo_treaty: "Підписаний договір Медіна-дель-Кампо"
  flavor_eng_diplomacy.1100.historical_info: "Договір Медіна-дель-Кампо був значною угодою, підписаною між католицькими монархами Іспанії, Ізабеллою та Фердинандом, і королем Англії Генріхом VII. Він врегулював деталі запропонованого шлюбу між інфантою Катериною, їхньою дочкою, та Артуром, старшим сином англійського короля. Він також призвів до взаємного зниження тарифів між двома країнами з додатковою метою встановлення єдиної політики проти Франції."
  flavor_eng_diplomacy.1101.title: "Договір Медіна-дель-Кампо"
  flavor_eng_diplomacy.1101.desc: "Виникла дипломатична можливість забезпечити довготривалу угоду між [target_root_country.GetName] та [ROOT.GetCountry.GetName]. [target_root_country.GetAdjectiveWithNoTooltip] [target_root_country.GetGovernment.GetRulerTitle] запропонував договір, який передбачає спільну політику щодо [GetCountry('FRA').GetName] разом із майбутнім шлюбним союзом між нашими двома династіями."
  flavor_eng_diplomacy.1101.a: "Підписати договір."
  flavor_eng_diplomacy.1101.b: "Від цього мало що можна отримати."
  flavor_eng_diplomacy.1101.tt1: "[target_root_country.GetNameWithNoTooltip] не сприйме цю відмову прихильно"
  flavor_eng_diplomacy.1101.tt2: "[GetCountry('FRA').GetNameWithNoTooltip] вважатиме це жестом доброї волі"
  flavor_eng_diplomacy.1200.title: "Договір Віндзора"
  flavor_eng_diplomacy.1200.desc_common: "Ми мусимо дивитися на північ, аби забезпечити наше виживання як незалежного королівства, зміцнивши дипломатичні зв'язки з [target_root_country.GetName]. Договір забезпечив би міжнародне визнання нашої династії як беззаперечних правителів [GetCountry('POR').GetNameWithNoTooltip]."
  flavor_eng_diplomacy.1200.desc_no_male_heir: "Питання престолонаслідування залишається проблемою для [ROOT.GetCountry.GetName]. Відсутність спадкоємця чоловічої статі може спонукати сусідню [GetCountry('CAS').GetName] спробувати захопити [ROOT.GetCountry.GetAdjectiveWithNoTooltip] трон.\n\n$flavor_eng_diplomacy.1200.desc_common$"
  flavor_eng_diplomacy.1200.desc: "Легітимність династії [GetCountry('POR').GetGovernment.GetRuler.GetDynasty.GetName] залишається проблемою для стабільності [GetCountry('POR').GetName]. Спірне правління може спонукати сусідню [GetCountry('CAS').GetName] спробувати захопити [ROOT.GetCountry.GetAdjectiveWithNoTooltip] трон.\n\n$flavor_eng_diplomacy.1200.desc_common$"
  flavor_eng_diplomacy.1200.a: "Доставте його швидко."
  flavor_eng_diplomacy.1200.tt: "Буде запропоновано договір"
  flavor_eng_diplomacy.1200.b: "Нам не потрібне підтвердження."
  flavor_eng_diplomacy.1201.title: "Віндзорський договір"
  flavor_eng_diplomacy.1201.desc_common: "[GetCountry('POR').GetAdjectiveWithNoTooltip] посол доставив повідомлення, що пропонує зміцнення дипломатичних зв'язків шляхом встановлення пакту взаємної підтримки між країнами.\n\nДоговір також передбачає визнання [ROOT.GetCountry.GetName] династії [GetCountry('POR').GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] як беззаперечних правителів [GetCountry('POR').GetNameWithNoTooltip]."
  flavor_eng_diplomacy.1201.desc_no_male_heir: "У [GetCountry('POR').GetName] виникла суперечка щодо питання престолонаслідування. Відсутність спадкоємця чоловічої статі може спонукати сусідню [GetCountry('CAS').GetName] спробувати захопити трон. $flavor_eng_diplomacy.1201.desc_common$"
  flavor_eng_diplomacy.1201.desc_low_legitimacy: "У [GetCountry('POR').GetName] виникла суперечка щодо легітимності династії [GetCountry('POR').GetGovernment.GetRuler.GetDynasty.GetName]. Відсутність підтримки може спонукати сусідню [GetCountry('CAS').GetName] спробувати захопити трон. $flavor_eng_diplomacy.1201.desc_common$"
  flavor_eng_diplomacy.1201.a: "Ми однієї думки."
  flavor_eng_diplomacy.1201.b: "Це не відповідає нашим інтересам."
  flavor_eng_diplomacy.1201.historical_info: "Віндзорський договір був історичною угодою, підписаною 9 травня 1386 року між Англією та Португалією. Він сприяв дипломатичним відносинам та військовій співпраці між двома королівствами в той час, коли Англія відчувала наслідки дипломатичної ізоляції, а Португалія боролася за збереження своєї незалежності. Угода сприяла обміну торгівлею, дозволяючи купцям обох націй вільніше вести справи на своїх відповідних територіях."
  flavor_eng_diplomacy.1300.title: "Незмінна дружба"
  flavor_eng_diplomacy.1300.desc: "Союз між [target_root_country.GetName] та [ROOT.GetCountry.GetName] розірвано, проте завдяки Віндзорському договору міцно закладено основу для перспективних відносин між нашими країнами. Ми повинні розглянути пропозицію про королівський шлюб з [target_root_country.GetGovernment.GetRuler.GetName], який залишається неодруженим, з доданими умовами підписаного союзу. Це супроводжувалося б цінним земельним наділом як частина приданого, пропозиція, якій важко було б чинити опір.\n\nСтратегічне розташування [ShowLocationName('tangier')] створює виклики та значні витрати на оборону, і може бути запропоноване як стратегічний порт для служіння прагненням [target_root_country.GetNameWithNoTooltip]."
  flavor_eng_diplomacy.1300.a: "Підготуйте необхідні документи."
  flavor_eng_diplomacy.1300.a.custom: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] не дуже задоволені запропонованою здачею [ShowLocationNameWithNoTooltip('tangier')]"
  flavor_eng_diplomacy.1300.b: "Замість цього запропонуйте їм місцевість [overseas_location.GetName]."
  flavor_eng_diplomacy.1300.c: "Немає потреби в такому домовленості."
  flavor_eng_diplomacy.1301.title: "Відроджена незмінна дружба"
  flavor_eng_diplomacy.1301.desc: "[GetCountry('POR').GetAdjective] посол доставив повідомлення, що пропонує зміцнення дипломатичних зв'язків шляхом укладення союзу в обмін на територіальні поступки та пропонуючи руку [suitable_daughter.GetName] у шлюбі з [ROOT.GetCountry.GetGovernment.GetRuler.GetName], який залишається неодруженим.\n\nВони запропонували стратегічне розташування [ceded_location.GetName] як частину приданого, що може або не може служити нашим прагненням."
  flavor_eng_diplomacy.1301.a: "Умови прийнятні."
  flavor_eng_diplomacy.1301.b: "Безглузда пропозиція."
  flavor_eng_diplomacy.1301.historical_info: "Шлюб між королем Англії Карлом II та Катериною Браганською, дочкою короля Португалії, був запропонований у спробі відновити союз після португальської війни за незалежність від Іспанської імперії. Португалія боролася за захист своєї величезної заморської імперії та шукала гарантій та військової підтримки від Англії. В обмін було зроблено кілька поступок, таких як здача островів Бомбей, провінції Танжер та торговельні привілеї в Бразилії та Португальській Ост-Індії."
  flavor_eng_diplomacy.1400.title: "Нонсачський договір"
  flavor_eng_diplomacy.1400.desc: "Зіткнувшись із постійною загрозою вторгнення від грізного сусіда, [GetCountry('NED').GetName] виявляють свою вразливість і можуть розглянути можливість звернення до найманців або пошуку захисту могутнього союзника, щоб адекватно захистити свої кордони.\n\nМи маємо нагоду простягнути руку допомоги та надати людей для їхніх оборонних зусиль. В обмін ми могли б домовитися про вигідні умови для наших купців на окремих територіях, щоб посилити наше панування над протокою."
  flavor_eng_diplomacy.1400.a: "Чудова пропозиція."
  flavor_eng_diplomacy.1400.tt1: "Пропонується договір"
  flavor_eng_diplomacy.1400.b: "Наші люди потрібні тут."
  STATIC_MODIFIER_NAME_favoring_own_interests: "Відстоювання власних інтересів"
  flavor_eng_diplomacy.1400.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] радіють, що вигідна торговельна можливість висунута"
  flavor_eng_diplomacy.1400.tt3: "Якщо договір буде прийнято, 5000 [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] буде відправлено для зміцнення оборони [GetCountry('NED').GetNameWithNoTooltip]"
  flavor_eng_diplomacy.1400.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] розчаровані, що вигідна торговельна можливість відхилена"
  signed_nonsuch_treaty: "Підписано Нонсацький договір"
  flavor_eng_diplomacy.1401.title: "Нонсацький договір"
  flavor_eng_diplomacy.1401.desc: "Виникла дипломатична можливість забезпечити наші кордони від грізних сусідніх загроз та встановити потенційне партнерство, яке може забезпечити майбутню безпеку. [target_root_country.GetName], прагнучи просувати свою континентальну торгівлю, пропонує договір, який забезпечить нас солдатами в обмін на ексклюзивні привілеї для їхніх купців на окремих територіях по всій нашій країні."
  flavor_eng_diplomacy.1401.a: "Вигідна угода."
  flavor_eng_diplomacy.1401.tt1: "Кілька будівель [ShowBuildingTypeNameWithNoTooltip('trade_office')] буде збудовано [target_root_country.GetAdjective] купцями в [ShowAreaName('holland_area')]"
  flavor_eng_diplomacy.1401.b: "Це не відповідає нашим інтересам."
  flavor_eng_diplomacy.1500.title: "Договір у Тагілде"
  flavor_eng_diplomacy.1500.desc: "Виникла дипломатична можливість забезпечити довготривалий мир та потенційного союзника в майбутньому. [GetCountry('POR').GetName], стомлена від подальших прикордонних вторгнень свого [GetCountry('CAS').GetAdjective] сусіда, потенційно може бути схилена до підписання договору, який надає можливість утвердити свою незалежність проти втручання з боку [GetCountry('CAS').GetNameWithNoTooltip]."
  flavor_eng_diplomacy.1500.a: "Підписати та доставити."
  flavor_eng_diplomacy.1500.tt: "Пропонується договір"
  signed_tagilde_treaty: "Підписано Договір у Тагілде"
  flavor_eng_diplomacy.1500.b: "Ми не можемо ризикувати конфліктом з [GetCountry('CAS').GetNameWithNoTooltip]."
  declined_advantageous_treaty: "Відхилено вигідний договір"
  flavor_eng_diplomacy.1500.historical_info: "Договір у Тагілде, підписаний між Португалією та Англією, вважається першим кроком до підписання Англо-португальського альянсу, який діє й досі. Це було нагальною справою для Португалії, яка на той час намагалася утвердити свою незалежність від сусідньої Кастилії, але договір також був важливим для Англії, яка мала мало друзів серед європейських монархів на континенті."
  flavor_eng_diplomacy.1501.title: "Договір у Тагілде"
  flavor_eng_diplomacy.1501.desc: "Виникла дипломатична можливість забезпечити довготривалий мир та потенційного союзника. [target_root_country.GetName], стомлена від ізоляції, запропонувала договір, який міг би допомогти утвердити нашу незалежність проти втручання з боку [GetCountry('CAS').GetName]."
  flavor_eng_diplomacy.1501.a: "Підписати договір."
  flavor_eng_diplomacy.1501.b: "Ми не можемо ризикувати подальшим конфліктом з [GetCountry('CAS').GetNameWithNoTooltip]."
  flavor_eng_diplomacy.1600.title: "Пригоди [robert_shirley.GetNameWithNoTooltip]"
  flavor_eng_diplomacy.1600.desc: "Мандрівник і майстер дипломатичного впливу [robert_shirley.GetName] висунув ідею, що [robert_shirley.GetSheHe] має очолити дипломатичне посольство на Далекий Схід. Основна мета цього починання – здійснити модернізацію та посилення військових сил [GetCountry('IRA').GetAdjective] армії. Молода імперія стикається з грізним сусідом в особі [GetCountry('TUR').GetName], імперії, яка також становить значну загрозу для наших європейських сусідів.\n\nНатомість ми можемо вимагати вигідних торгових привілеїв і працювати над встановленням регіональної присутності для наших купців."
  flavor_eng_diplomacy.1600.a: "Відправити [robert_shirley.GetHimHer] у його щасливу путь."
  flavor_eng_diplomacy.1600.tt1: "[robert_shirley.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng_diplomacy.1600.tt2: "[robert_shirley.GetSheHe|U] намагається завоювати прихильність [GetCountry('IRA').GetGovernment.GetRulerOrRegent.GetName] в обмін на торгові поступки"
  flavor_eng_diplomacy.1600.b: "Виключено."
  flavor_eng_diplomacy.1600.tt3: "[robert_shirley.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e] і він залишається в [target_root_country.GetName]"
  flavor_eng_diplomacy.1600.historical_info: "Роберт Ширлі був англійським дипломатом і авантюристом, відомим своїми подорожами на Близькому Сході. Він відіграв ключову роль у встановленні відносин між Англією та Сефевідською імперією Персії. Він став довіреним радником і дипломатом шаха та допоміг модернізувати перську армію, що призвело до того, що Сефевіди стали рівною силою своєму ворогу, Османській імперії."
  flavor_eng_diplomacy.1601.title: "Реформи Рузбеха Ширазі"
  flavor_eng_diplomacy.1601.desc: "Нас відвідує військовий стратег і дипломат [robert_shirley.GetName], який представив справді інтригуючу пропозицію. [robert_shirley.GetSheHe] пропонує обмін військовими досягненнями та щоб [robert_shirley.GetHisHer] співвітчизники взяли на себе важливу відповідальність за перенавчання нашої великої армії для протидії експансіоністським амбіціям [GetCountry('TUR').GetName].\n\nНатомість ми повинні надати безпечний притулок для єретиків, щоб вони могли вести свої справи, що, безсумнівно, є спробою посягнути на наші торгові відносини зі Сходом."
  flavor_eng_diplomacy.1601.a: "Необхідне зло."
  flavor_eng_diplomacy.1601.tt1: "[robert_shirley.GetNameWithNoTooltip] додано як [Concept('character', 'CONCEPT_PLACEHOLDER')|e]"
  STATIC_MODIFIER_NAME_modernizer: "Модернізатор"
  flavor_eng_diplomacy.1601.tt2: "[robert_shirley.GetSheHe|U] надасть додаткові переваги, якщо буде призначений на посаду [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_eng_diplomacy.1601.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] буде незадоволене, побачивши єретика на службі при дворі"
  flavor_eng_diplomacy.1601.b: "Непотрібних порад не потрібно."
  enable_european_militia_reform: "Надає доступ до [ShowGovernmentReformName('european_militia_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]"