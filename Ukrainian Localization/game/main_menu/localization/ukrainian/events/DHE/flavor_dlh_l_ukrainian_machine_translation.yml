l_english:
  play_as_revolter: "Мій час настав!"
  flavor_dlh.1.title: "[ShowCultureNameWithNoTooltip('marathi_culture')]"
  flavor_dlh.1.desc: "Довго служачи різним володарям [ShowRegionName('deccan_region')], [ShowCultureName('marathi_culture')] досконало опанували партизанську тактику війни цього плато. Зростаючий вплив [ShowCultureNameWithNoTooltip('marathi_culture')] воєначальників у наших лавах, а також розвиток [ShowCultureNameWithNoTooltip('marathi_culture')] літературної мови надихнули на зростаюче почуття сепаратизму в їхніх рядах. Багатьом здається, що їхній час настав."
  flavor_dlh.1.a: "Не на нашій землі!"
  flavor_dlh.1.a.tt: "Кожен [ShowCultureNameWithNoTooltip('marathi_culture')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] втратить [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.1.b: "Піддатися їхнім вимогам"
  flavor_dlh.2.title: "Губернатор [target_location.GetNameWithNoTooltip] Оголошує Незалежність!"
  flavor_dlh.2.desc: "Неспокій, породжений останніми роками нестабільності, породив багатьох претендентів на завоювання. Ці жадібні гієни дивляться на наші володіння з великим голодом, оголошуючи тотальну війну проти нашого великого [ROOT.GetCountry.GetFlavorRank], оскільки лихі часи віщують біду для нашого народу...\n\nМісцевий губернатор у [target_location.GetName], на ім'я [target_character.GetName], оголосив нас безсилими, узурпувавши наші території у [target_character.GetHerHis] нове володіння. Ця зухвалість не може залишитися без відповіді, і чутки поширилися двором про нездатність [target_character2.GetShortName] керувати нашою великою країною в ці темні часи..."
  flavor_dlh.2.a: "Ми отримаємо [target_character.GetHerHis] голову!"
  flavor_dlh.2.b: "Давайте деескалуємо ситуацію..."
  flavor_dlh.2.c: "$play_as_revolter$"
  flavor_dlh.3.title: "Прагнення [target_malwa_revolter_scope.GetNameWithNoTooltip] до Незалежності"
  flavor_dlh.3.desc: "У відчайдушній спробі відновити контроль над ситуацією, наші радники вважали за потрібне довірити опіку над нашими територіями навколо [target_location.GetName] людині на ім'я [target_character.GetName]. Однак, [target_character.GetHerHis] жага до влади у поєднанні з безпечною відстанню від наших основних територій у [ROOT.GetCountry.GetCapital.GetName] дали перевагу голосам незгоди та сепаратизму. Ситуацію не покращує місцеве населення, яке оголосило збройну підтримку боротьби [target_character.GetShortNameWithNoTooltip] проти влади [target_character2.GetShortName]..."
  flavor_dlh.3.a: "Змії, усі ви!"
  flavor_dlh.3.b: "Ми не можемо дозволити собі сперечатися з ними."
  flavor_dlh.3.c: "$play_as_revolter$"
  flavor_dlh.4.title: "Губернатор [target_gujarat_revolter_scope.GetNameWithNoTooltip]"
  flavor_dlh.4.desc: "Зрада — це історія, стара як світ. При першій ознаці біди та місцевої нестабільності, стерв'ятники та шакали, яким було надано губернаторство над нашими територіями навколо [target_location.GetName], виступили, висуваючи абсурдні вимоги незалежності.\n\nНайвидатніший з цих паразитів — не хто інший, як [target_character.GetName], чиї підступні шляхи принесли [target_character.GetHerHim] двір, повний негідників і головорізів. Ця гординя проти легітимності [target_character2.GetShortName] не може бути терпимою!"
  flavor_dlh.4.a: "[target_character.GetHerHis|U] голова покотиться!"
  flavor_dlh.4.b: "Ми вичікуватимемо..."
  flavor_dlh.4.c: "$play_as_revolter$"
  flavor_dlh.5.title: "[target_jaunpur_revolter_scope.GetNameWithNoTooltip] Кидає виклик нашій владі"
  flavor_dlh.5.desc: "Незважаючи на те, що наша найщедріша рука благословила [target_character.GetName] губернаторством над нашими територіями навколо [target_location.GetName], [target_character.GetHerHis] справжня природа та жага до влади взяли гору! Дикі вимоги номінального контролю та декларації незалежності проти нашої влади породили багатьох селян та місцевих лордів, що підтримують самозванця та надають [target_character.GetHerHim] хибне відчуття влади."
  flavor_dlh.5.a: "Знищити [target_character.GetHerHim] з усією нашою міццю!"
  flavor_dlh.5.b: "Нехай він ще трохи пограє правителя..."
  flavor_dlh.5.c: "$play_as_revolter$"
  flavor_dlh.6.title: "Повстання [target_subject.GetCulture.GetNameWithNoTooltip] [target_subject.GetFlavorRank]"
  flavor_dlh.6.desc: "У той час як наші вороги зростають у кількості по той бік кордонів у всіх напрямках, так само зростає і кількість владолюбних губернаторів наших [target_subject.GetCulture.GetNameWithNoTooltip] територій. Могутні чоловіки з сильними арміями, вони наважилися надіслати ультиматум [target_character2.GetShortName], вимагаючи своєї свободи в обмін на мир у наш час. Без тіні сумніву, ці ниці душі просто користуються нашою поточною ситуацією, використовуючи багатство своїх провінцій для здобуття незалежності..."
  flavor_dlh.6.a: "Хай буде так."
  flavor_dlh.6.b: "Ми надішлемо щедрий подарунок, сподіваючись їх задобрити."
  flavor_dlh.6.c: "Вони сміють...?"
  mithilaarea_hazaribagh_province_granted_to_target_subject: "Ми передамо контроль над [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], якими ми володіємо в [ShowProvinceDefinitionName('hazaribagh_province')|U], а також над [ShowAreaName('mithila_area')|U] [target_subject.GetNameWithNoTooltip]..."
  flavor_dlh.7.title: "Утримання влади"
  flavor_dlh.7.desc: "Наш так званий зловмисний володар хворий і помирає. Її [GetCountry('DLH').GetFlavorRank] — не що інше, як бліда тінь її колишньої сутності. У спробі забезпечити нашу вірність і захистити життєво важливу торгівлю [ShowGoodsName('silver')], вони вирішили надіслати найвидатніший караван посланців і сановників, що несуть новини з серця [GetCountry('DLH').GetCapital.GetName]..."
  flavor_dlh.7.a: "Подарунок для забезпечення нашої вірності? Хм..."
  flavor_dlh.7.b: "Вони бажають відкритого повстання?"
  gained_delhi_lands_tt: "[GetCountry('DLH').GetName] передасть нам свої території в [ShowAreaName('bengal_area')|U] як знак примирення та подальшої співпраці"
  flavor_dlh.8.title: "Місячний Володар [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_dlh.8.desc: "Наша історія побудована на плечах казок, старих як світ. Є багато прикладів людей, які піднялися з низів, від бідності до багатства. Жоден приклад не є таким яскравим, як [GetCharacter('dlh_qutb_ud_in_aibak').GetName]. Його історія є чудовим прикладом того, яких висот може досягти заслуга в нашому суспільстві, оскільки він пройшов шлях від раба до засновника нашого великого [ROOT.GetCountry.GetFlavorRank]. На жаль, цей наратив не дуже добре сприймається [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які бажають зберегти жорсткий і захищений соціальний клас для себе..."
  flavor_dlh.8.historical_info: "Згідно з легендою, засновником великого Делійського султанату був не хто інший, як раб на ім'я Кутб уд-Дін Айбак. Народившись у 1150 році та походячи з Туркестану, у дитинстві він був розлучений зі своєю родиною, опинившись на ринку в Нішапурі. Юний Айбак був проданий Фахруддіну Абдулу Азізу Куфі, відомому каді та нащадку теолога Абу Ханіфи. Під час перебування при дворі магістра він отримав ґрунтовну освіту і навіть став вважатися сином великого каді.\n\nЙого таланти в юному віці включали стрільбу з лука та верхову їзду. Незважаючи на своє походження та скромне виховання, дитина відзначилася в мистецтві війни та придворного етикету, що забезпечило йому місце в султанському дворі. Зрештою, йому було надано посаду Амір-і Ахура, офіцера королівських стаєнь. Роками пізніше, коли його доля зіткнулася з кількома перешкодами, Айбак пройшов шлях від в'язня до генерала Гурідської армії, здобувши кілька ключових перемог. Завершивши серію успішних кампаній по всій Індії, він зрештою був визнаний засновником Делійського султанату."
  flavor_dlh.8.a: "Ми залишимося вірними своєму походженню."
  flavor_dlh.8.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] необхідно задобрити..."
  delhi_lose_5_support_tt: "Наша [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] зменшиться на #R -5%#!"
  flavor_dlh.9.title: "Султан Джалалат ад-Дунія валь-Дін"
  flavor_dlh.9.desc: "Одним з наших найвідоміших і найпопулярніших правителів минулого століття є не хто інший, як [GetCharacter('dlh_jalalat_ud_din_razia').GetName]. Вшанована як перша жінка-правителька [ShowReligionGroupAdjective('muslim')] $india$, вона відома своїми адміністративними здібностями. Багато хто з [ShowEstateTypeName('nobles_estate')], хто спочатку чинив опір її сходженню на трон, зрештою були або переконані, або повністю позбавлені влади.\n\nЗрозуміло, що нинішні видатні голови [ShowEstateTypeName('nobles_estate')] бояться другої жінки-правительки і виступили з ультиматумом."
  flavor_dlh.9.a: "Ми не заплямуємо репутацію [GetCharacter('dlh_jalalat_ud_din_razia').GetHerHis]! [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] отруйні!"
  flavor_dlh.9.b: "Давайте поки що дамо туманні обіцянки..."
  flavor_dlh.9.historical_info: "Народившись дочкою султана мамлюків Шамсуддіна Ілтутмиша, Раззія виявила свої видатні навички у веденні державних справ під час відсутності батька через закордонні завоювання та кампанії. Природно, її сходження було ветоване кількома видатними членами знаті. На щастя, Раззія користувалася величезною прихильністю громадськості, про що свідчить той факт, що вона просила людей скинути її, якщо вона не виправдає їхніх очікувань."
  flavor_dlh.10.title: "Божевільна кампанія проти [target_country.GetNameWithNoTooltip]"
  flavor_dlh.10.desc: "[target_character2.GetName] планує найамбітнішу кампанію останніми місяцями. Бачачи слабкість [target_country.GetName], [target_character2.GetSheHe] тепер збирає війська та будь-яку підтримку, яку [target_character2.GetSheHe] може отримати, а також забезпечує доступ, щоб захопити [target_location.GetName] та все [GetInternationalOrganization('middle_kingdom').GetName]. Цей план здається божевіллям для [target_country2.GetAdjectiveWithNoTooltip] [target_country2.GetGovernment.GetCourtTitle], але [target_character2.GetNameWithNoTooltip] пообіцяла, що це заради слави [target_country2.GetName]."
  flavor_dlh.10.historical_info: "Хоча ніколи не було справжньої війни між Делійським султанатом та династією Юань Китаю, султан Мухаммад ібн Туглак планував перетнути Гімалаї та завоювати Китай. Ці плани були швидко зупинені місцевими жителями Хімачалу, які відбили його армію."
  flavor_dlh.10.a: "Вперед до [target_location.GetNameWithNoTooltip]!"
  flavor_dlh.10.b: "Цей план — божевілля!"
  flavor_dlh.11.title: "Божевільна кампанія [target_country2.GetNameWithNoTooltip]"
  flavor_dlh.11.desc: "Дипломати повідомили нам про дії [target_country2.GetName]. Їхній лідер, [target_character2.GetName], бажає вторгнутися до [GetInternationalOrganization('middle_kingdom').GetName], захопивши при цьому [target_location.GetName] і поклавши край нашому пануванню над $china$."
  flavor_dlh.11.a: "Вони божевільні?"
  flavor_dlh.12.title: "[GetDynasty('lodi_dynasty').GetNameWithNoTooltip] племена"
  flavor_dlh.12.desc: "Видатне плем'я нашого [ShowCultureName('afghan_culture')] народу, династія [GetDynasty('lodi_dynasty').GetName] виявилася досить ефективною в управлінні невеликими поселеннями в межах [target_province.GetName]. Завдяки їхній старанності, [target_character2.GetName] розмірковував про надання їм управління над землями, якщо вони будуть готові виконувати [target_character2.GetHerHis] накази."
  flavor_dlh.12.a: "Їм дозволено керувати."
  flavor_dlh.12.b: "Ми не довіряємо їм цю землю."
  dlh_release_lodi_as_governors_tt: "Династія [GetDynasty('lodi_dynasty').GetName] отримає контроль над усією [target_province.GetName] [Concept('province', 'CONCEPT_PLACEHOLDER')|e] як наш [ShowSubjectTypeName('vassal')]"
  dlh_all_afghani_pops_in_province_lose_30_satisfaction: "Усі [ShowCultureName('afghan_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] [Concept('province', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.13.title: "Розширення володінь [GetDynasty('lodi_dynasty').GetNameWithNoTooltip]"
  flavor_dlh.13.desc: "Зі зростанням впливу династії [GetDynasty('lodi_dynasty').GetName] вони згуртували більше підтримки у своєму володінні, поширивши свою владу на всю [target_area.GetName]. Ми можемо піддатися їхнім вимогам, але це невелике [ShowCultureName('afghan_culture')] плем'я повільно перетворюється на претендента на трон [ROOT.GetCountry.GetName]."
  flavor_dlh.13.a: "Яка шкода від більшої кількості вірних васалів?"
  flavor_dlh.13.b: "Вони вже мають забагато."
  dlh_give_entire_area_to_lodi_tt: "Ми надамо всю [target_area.GetName] [Concept('area', 'CONCEPT_PLACEHOLDER')|e] [target_country.GetName]"
  flavor_dlh.14.title: "Падіння династії [GetDynasty('lodi_dynasty').GetNameWithNoTooltip]"
  flavor_dlh.14.desc: "Після стримування родини [GetDynasty('lodi_dynasty').GetName] та захоплення їхніх територій, нам вдалося відновити віру в [target_character.GetName]. Більше [target_character.GetSheHe] не мусить розглядатися як співправитель з іншими впливовими династіями, а як справжній правитель усього [ROOT.GetCountry.GetName]."
  flavor_dlh.14.a: "Нехай [target_character.GetNameWithNoTooltip] забере всю славу."
  flavor_dlh.14.b: "Використаймо цей шанс для централізації."
  dlh_all_afghan_locations_gain_prosperity_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що має [ShowCultureName('afghan_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], отримає [ShowNamedValue('prosperity_mild_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.15.title: "Адміністрація [GetDynasty('lodi_dynasty').GetNameWithNoTooltip]"
  flavor_dlh.15.desc: "Досвід управління [GetDynasty('lodi_dynasty').GetName] може бути ефективним, але він широко непопулярний у [ROOT.GetCountry.GetName]. [target_character.GetName] розглядається не як законний правитель, а як узурпатор, який переслідує лише [target_character.GetHerHis] власні бажання, хоча все це лише опозиційні розмови."
  flavor_dlh.15.a: "Дозвольмо їм сумніватися в нас."
  flavor_dlh.15.b: "Золото — гарний спосіб змусити опозицію замовкнути."
  flavor_dlh.15.c: "[target_character.GetNameWithNoTooltip] є найзаконнішим правителем [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_dlh.16.title: "Некомпетентність [target_character.GetNameWithNoTooltip]"
  flavor_dlh.16.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetName] спостерігав за нещодавніми політиками, прийнятими [target_character.GetName]. Усі вони неефективні, послаблюють економіку та стабільність [ROOT.GetCountry.GetFlavorRank]. Це повільно переростає в повстання в деяких наших провінціях."
  flavor_dlh.16.a: "Нам потрібно швидко заспокоїти маси."
  flavor_dlh.16.b: "Економіка та стабільність повинні бути захищені в першу чергу."
  dlh_all_pops_lose_10_satisfaction_tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.17.title: "Гробниця для [target_character.GetNameWithNoTooltip]"
  flavor_dlh.17.desc: "Зі смертю [target_character.GetName] плаче весь [ROOT.GetCountry.GetName]. З переходом влади до [target_character2.GetName], [target_character2.GetSheHe] планує побудувати велику гробницю для [target_character.GetHerHim], натхненну Куполом Скелі в [ShowLocationName('jerusalem')]."
  flavor_dlh.17.a: "Велика гробниця для [target_character.GetNameWithNoTooltip]"
  flavor_dlh.17.b: "Наші ресурси не будуть витрачені на це."
  flavor_dlh.18.title: "Смерть [target_character.GetNameWithNoTooltip]"
  flavor_dlh.18.desc: "Наш попередній правитель, [target_character.GetName], на жаль, помер. Проте [target_character.GetHerHis|U] одержимість технологічними дослідженнями не буде марною. [target_character2.GetName] планує створити гробницю для [target_character.GetHerHim], наповнену багатою бібліотекою, відкритою для відвідування."
  flavor_dlh.18.a: "Нехай ця гробниця стане пам'ятником для будь-якого вченого."
  flavor_dlh.18.b: "Немає потреби в більшій кількості таких гробниць."
  flavor_dlh.19.title: "Гробниця [target_character.GetNameWithNoTooltip]"
  flavor_dlh.19.desc: "[target_character.GetName], член династії [GetDynasty('lodi_dynasty').GetName] і популярний серед [ShowCultureName('afghan_culture')] народу, помер. Передавши трон [target_character2.GetName], народ [target_location.GetName] тепер вимагає побудувати гробницю на честь [target_character.GetHerHis]."
  flavor_dlh.19.a: "[target_character.GetSheHe|U] буде пам'ятати."
  flavor_dlh.19.b: "Ми проігноруємо їхні прохання."
  flavor_dlh.20.title: "$hisar_e_firoza$"
  flavor_dlh.20.desc: "[target_location.GetRank.GetName] [target_location.GetName] привернув увагу [target_character.GetName]. [target_character.GetHerHis|U] очі милуються цим місцем, бачачи в ньому ідеальне місце для одного з [target_character.GetHerHis] особистих проєктів. Виконуючи роль як палацу, так і форту, $hisar_e_firoza$ планується мати все. П'ять воріт, [ROOT.GetCountry.GetGovernment.GetAdjective] стайні, мечеть для будь-якого доброго [ShowReligionGroupAdjective('muslim')] для молитви та сам [ROOT.GetCountry.GetGovernment.GetAdjective] палац."
  flavor_dlh.20.a: "Побудуймо цей палац!"
  flavor_dlh.20.b: "Цей проєкт не вартий зусиль."
  flavor_dlh.20.c: "Подвоїмо зусилля для $hisar_e_firoza$."
  flavor_dlh.20.d: "Місцеві жителі оплатять усі витрати."
  flavor_dlh.21.title: "Укріплення [target_location.GetNameWithNoTooltip]"
  flavor_dlh.21.desc: "[target_location.GetName] останнім часом бракувало укріплень. [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує інвестувати частину наших поточних коштів, щоб укріпити [target_location.GetRank.GetName]."
  flavor_dlh.21.a: "Перенаправимо частину наших коштів на це."
  flavor_dlh.21.b: "Немає потреби в укріпленнях, коли ми в наступі."
  flavor_dlh.21.c: "[target_character.GetNameWithNoTooltip] спланує цю нову фортецю."
  flavor_dlh.22.title: "Реновація [target_location.GetNameWithNoTooltip]"
  flavor_dlh.22.desc: "Стародавній [target_location.GetRank.GetName] [target_location.GetName] занепадав останніми роками. Заснований, як стверджують, ще до легенд про [ShowAvatarName('krishna_avatar')] та [ShowAdvanceName('mahabarata')], він тепер загублений для світу. [target_character.GetName] все ж бажає зробити його одним із найвеличніших міст $india$."
  flavor_dlh.22.a: "Нехай [target_location.GetRank.GetNameWithNoTooltip] процвітає!"
  flavor_dlh.22.b: "Нам не потрібно інвестувати в стародавні місця."
  flavor_dlh.22.c: "Навіщо обмежувати архітектурне бачення [target_character.GetNameWithNoTooltip]?"
  flavor_dlh.23.title: "$lahdjat_sikandar_shahi_wa_lata_if_i_la_mutanahi$"
  flavor_dlh.23.desc: "З огляду на різноманітні музичні стилі в $india$ та цікавість [target_character.GetName], [target_character.GetSheHe] працював над музичною композицією, яка поєднує всі ці стилі, щоб створити щось справді унікальне. Багато вчених зацікавлені в [target_character.GetHerHis] відданості таким витонченим мистецтвам, але [ROOT.GetCountry.GetGovernment.GetCourtTitle] стурбований, що [target_character.GetNameWithNoTooltip] стане більше художником, ніж [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_dlh.23.a: "Мистецтво має створюватися всіма, навіть [target_character.GetNameWithNoTooltip]."
  flavor_dlh.23.b: "[target_character.GetNameWithNoTooltip] — це [ROOT.GetCountry.GetGovernment.GetRulerTitle], а не художник."
  flavor_dlh.24.title: "Меценатство [ShowReligionGroupNameWithNoTooltip('muslim')] Вченості"
  flavor_dlh.24.desc: "Хоча зеніт [ShowReligionGroupAdjective('muslim')] золотого віку минув, все ще є багато тих, хто робить внесок у його культурний вплив у світі. Один із них — [target_character.GetName], побожний послідовник [ShowReligionGroupName('muslim')] і вчений у душі. Бажаючи привабити митців з кожної культури та віри, [target_character.GetSheHe] планує побудувати [ShowBuildingTypeName('university')] у центрі [target_location.GetName]."
  flavor_dlh.24.a: "Вчених слід підтримувати в [target_location.GetNameWithNoTooltip]."
  flavor_dlh.24.b: "Немає потреби в таких заняттях."
  flavor_dlh.25.title: "Старе Сидіння [ROOT.GetCountry.GetFlavorRank]"
  flavor_dlh.25.desc: "Через чуму, що спіткала [target_location2.GetRank.GetName] [target_location2.GetName], ми були змушені перенести столицю до [target_location.GetName], сподіваючись уникнути смерті когось важливого в [ROOT.GetCountry.GetFlavorRank]. Тепер, коли чума позаду, ми повинні планувати відновлення цієї старої столиці та перенесення [ROOT.GetCountry.GetGovernment.GetCourtTitle] туди."
  flavor_dlh.25.a: "[target_location2.GetNameWithNoTooltip] — справжня столиця."
  flavor_dlh.25.b: "[target_location.GetNameWithNoTooltip] залишиться центром [ROOT.GetCountry.GetFlavorRank]."
  flavor_dlh.26.title: "$lodi_gardens$"
  flavor_dlh.26.desc: "На піку [GetDynasty('lodi_dynasty').GetName] у [ROOT.GetCountry.GetName], [target_character2.GetName] розробляв плани грандіозного саду в центрі [target_location.GetName]. Найнявши [target_character.GetName] головним архітектором, [target_character2.GetSheHe] планує не шкодувати коштів на цей проєкт."
  flavor_dlh.26.historical_info: "Побудовані на піку правління Лоді в Делі, ці сади є одними з небагатьох залишків архітектури Лоді. Вони містять Бара Гумбад, мечеть з трьома куполами, та Шиш Гумбад, гробницю, де було поховано багатьох членів династії."
  flavor_dlh.26.a: "Це будуть найвеличніші сади."
  flavor_dlh.26.b: "На цей проєкт не буде витрачено коштів."
  mad_sultan_historical_info: "Правління Мухаммада ібн Туґлака було сумнозвісним. Хоча він був освічений у справах ісламу, медицини та літератури, його особистість призвела до багатьох невдач у Делі. Бувши добрим до своїх союзників і суворим до ворогів, він відплачував за будь-який дарунок, що був йому наданий, утричі більшою вартістю. Монети, які він карбував, стали такими ж нікчемними, як камінь, а кілька його експедицій закінчилися катастрофою через поспішні приготування."
  flavor_dlh.27.title: "Шалений [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_dlh.27.desc: "З правлінням [target_character.GetName], що триває, [target_character.GetHerHis] дії ще більше занурюються в безумство. Приймаються все більш несправедливі закони, вносяться все більш довільні зміни, розпочинаються кампанії без будь-якого планування. Хоча це не є чимось незвичайним для [target_character.GetHerHis] правління, це, безумовно, проблема, яка вийде з-під контролю, доки [target_character.GetNameWithNoTooltip] залишається на троні."
  flavor_dlh.27.historical_info: "$mad_sultan_historical_info$"
  flavor_dlh.27.a: "Заради [ROOT.GetCountry.GetReligion.GetGodName], це мусить припинитися."
  dlh_unique_mad_sultan_events_tt: "Доки [target_character.GetName] є [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetName], [Concept('events', 'CONCEPT_PLACEHOLDER')|e] навколо [target_character.GetHerHim] будуть спрацьовувати"
  flavor_dlh.28.title: "Пограбування [target_location.GetNameWithNoTooltip]"
  flavor_dlh.28.desc: "Коли сили [ROOT.GetCountry.GetName] штурмували вулиці [target_location.GetName], [target_character2.GetName] наказав пограбувати [target_location.GetRank.GetName], сподіваючись компенсувати брак скарбниці в останні роки."
  flavor_dlh.28.historical_info: "$mad_sultan_historical_info$"
  flavor_dlh.28.a: "Це не сприяє процвітанню [target_location.GetNameWithNoTooltip]."
  flavor_dlh.29.title: "Податки Збільшено в [target_area.GetNameWithNoTooltip]"
  flavor_dlh.29.desc: "[target_character.GetName] вирішив, що губернатор [target_area.GetName] не сплачував свою справедливу частку податків, стверджуючи, що серед тамтешнього народу панує корупція, і що потрібне пряме втручання з боку [ROOT.GetCountry.GetName]."
  flavor_dlh.29.a: "Податки буде збільшено."
  flavor_dlh.29.b: "Обмежити безумство [target_character.GetNameWithNoTooltip]."
  flavor_dlh.29.historical_info: "$mad_sultan_historical_info$"
  dlh_every_location_in_area_gets_following_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] отримає [ShowModifier('dlh_increased_taxes')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], а також втратить [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.30.title: "Благочестя [target_character.GetNameWithNoTooltip]"
  flavor_dlh.30.desc: "[target_character.GetName] вважає [target_character.GetHerselfHimself] вірним слугою [ROOT.GetCountry.GetReligion.GetGodName], готовим навіть піти на значні жертви, щоб показати цю відданість. Бажаючи на деякий час відійти від справ, [target_character.GetSheHe] прагне більше вивчати святі писання, залишаючись при цьому ідолом [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_dlh.30.a: "Нехай [target_character.GetHerHim] робить, що [target_character.GetSheHe] забажає."
  flavor_dlh.30.historical_info: "$mad_sultan_historical_info$"
  flavor_dlh.31.title: "[target_area.GetNameWithNoTooltip] Відмовляється Сплачувати Податки"
  flavor_dlh.31.desc: "Хоча [target_area.GetName] дотримувався законів [ROOT.GetCountry.GetName], [target_character.GetName] вирішив збільшити там податки, сподіваючись компенсувати втрачені доходи. Хоча ми могли б це зупинити, місцеві жителі вже відмовилися від цього кроку і вже намагаються стати більш автономними від нашого правління."
  flavor_dlh.31.a: "Це недобре."
  flavor_dlh.31.historical_info: "$mad_sultan_historical_info$"
  dlh_every_location_in_area_loses_control_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] втратить [ShowNamedValue('control_extreme_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.32.title: "Приборкання [ShowReligionAdjectiveWithNoTooltip('shia')] Населення"
  flavor_dlh.32.desc: "Хоча [ROOT.GetCountry.GetName] намагається бути якомога толерантнішим, [ShowReligionAdjective('shia')] люди в [ROOT.GetCountry.GetFlavorRank] спричиняють заворушення. Не будучи толерованими населенням, вони не дотримуються більшості законів. Ми повинні щось з цим зробити."
  flavor_dlh.32.a: "Вимагаймо навернення."
  flavor_dlh.32.b: "Немає потреби спричиняти більше внутрішніх конфліктів."
  dlh_15_percent_of_shia_pops_convert_to_root_religion_tt: "#Y 15%#! наших [ShowReligionName('shia')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ROOT.GetCountry.GetReligion.GetName], але втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.33.title: "Права рука [target_character2.GetNameWithNoTooltip]"
  flavor_dlh.33.desc: "Попередня політика залишила [ROOT.GetCountry.GetName] у небезпечному становищі. Численні повстання, економічні проблеми, релігійні конфлікти, а також зовнішні загрози не можуть бути вирішені однією людиною. На щастя, [target_character.GetName], видатний генерал [target_character2.GetName], запропонував [target_character.GetHerHis] підтримку в управлінні всіма цими проблемами."
  flavor_dlh.33.a: "[target_character.GetSheHe|U] допоможе нам."
  flavor_dlh.33.b: "Це звучить підозріло..."
  dlh_character_grants_positive_events_as_long_as_they_are_in_cabinet_tt: "Поки [target_character.GetName] перебуває в нашому [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e], [target_character.GetSheHe] надаватиме нам різні [Concept('events', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.34.title: "Допомога в каналі Ямуна"
  flavor_dlh.34.desc: "Канал Ямуна в [ShowAreaName('doab_area')] залишився без підтримки. Такі місця, як [target_location.GetName], [target_location2.GetName] та [target_location3.GetName], страждають і гостро потребують додаткового фінансування. [target_character.GetName] запропонував нам перерозподілити частину наших коштів для допомоги населенню там."
  flavor_dlh.34.a: "Інвестуймо в ці місця."
  flavor_dlh.34.b: "Нам не потрібно витрачати наше золото."
  flavor_dlh.35.title: "Боротьба з голодом у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_dlh.35.desc: "Через те, що кілька провінцій у [ROOT.GetCountry.GetName] зазнали кількох неврожаїв, вони тепер залишилися майже без їжі. [target_character.GetName] запропонував [ROOT.GetCountry.GetGovernment.GetCourtTitle] щось з цим зробити, відправивши допомогу в місця, які її найбільше потребують."
  flavor_dlh.35.a: "[target_character.GetSheHe|U] може очолити цю політику."
  flavor_dlh.35.b: "Чи [target_character.GetSheHe] думає, що [target_character.GetSheHe] є [ROOT.GetCountry.GetGovernment.GetRulerTitle]?"
  dlh_whilst_grand_vizier_is_in_council_or_ruler_allow_combat_famine_parliament_debate_tt: "Поки [target_character.GetName] перебуває в [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] або є [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetName], ми зможемо використовувати [ShowParliamentIssueType('dlh_famine_reductions')] [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_dlh.36.title: "Заборона тортур"
  flavor_dlh.36.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] завжди використовували тортури проти нижчих верств населення [ROOT.GetCountry.GetName], щоб домогтися свого, а також для залякування. [target_character.GetName] розмірковував про заборону цієї практики, щоб належним чином приборкати будь-яких недобросовісних виконавців, а також відновити порядок у системі правосуддя."
  flavor_dlh.36.a: "Практика тортур буде заборонена."
  flavor_dlh.36.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не слухатимуть простого візира!"
  flavor_dlh.36.historical_info: "Під час правління Фіруза Шаха Туглака в Делі він та його великий візир Малік Макбул провели кілька реформ. Однією з них було скасування тортур. Багато із заборонених методів можна знайти в його мемуарах, які включали такі методи, як ампутації та спалення людей."
  flavor_dlh.37.title: "Примусове оподаткування [ShowReligionAdjectiveWithNoTooltip('hindu')] громадян"
  flavor_dlh.37.desc: "Оскільки більшість нашого населення сповідує [ShowReligionAdjective('hindu')] віру, [target_character.GetName] запропонував встановити для них високий податок. Це не тільки збільшить наші доходи, але й наверне частину їх до [ROOT.GetCountry.GetReligion.GetName]."
  flavor_dlh.37.a: "Давайте запровадимо цей новий податок."
  flavor_dlh.37.b: "Не будемо їх засмучувати."
  dlh_5_percent_of_pops_convert_to_our_religion_tt: "#Y 5%#! [ShowReligionAdjective('hindu')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ROOT.GetCountry.GetReligion.GetName]"
  flavor_dlh.37.historical_info: "Попри процвітання, що прийшло до Делі за правління Фіруза Шаха Туглака, одними з найрадикальніших реформ були ті, що не лише запровадили закон $шаріату$ для індуїстських громадян, але й очолили кампанію примусового навернення на субконтиненті. Кожного, хто чинив йому опір, він посилав свої армії, щоб вирізати тисячі індусів та осквернити храми в цьому районі."
  flavor_dlh.38.title: "Переворот [target_character2.GetNameWithNoTooltip]"
  flavor_dlh.38.desc: "Зі зростаючою підтримкою [target_character2.GetName] з боку армії та [ROOT.GetCountry.GetGovernment.GetCourtTitle] стало зрозуміло, що [target_character2.GetSheHe] прагне претендувати на трон [ROOT.GetCountry.GetName]. [target_character.GetName] лише дозволив цьому самозванцю піднятися і надав [target_character2.GetHerHim] всю владу в [ROOT.GetCountry.GetFlavorRank]. Тепер [target_character.GetName] змушений зректися престолу з ганьбою."
  flavor_dlh.38.a: "Правління [target_character2.GetNameWithNoTooltip] принесе нам процвітання!"
  flavor_dlh.39.title: "Падіння династії [GetDynasty('tughlaq_dynasty').GetNameWithNoTooltip]"
  flavor_dlh.39.desc: "Династія [GetDynasty('tughlaq_dynasty').GetName] була усунена від влади в [ROOT.GetCountry.GetName]. Це дозволило більш ліберальну соціальну мобільність, звільнивши багатьох рабів у [ROOT.GetCountry.GetFlavorRank]. [target_character.GetName] [target_character.GetHerselfHimself] просуває це, попри можливий негативний резонанс."
  flavor_dlh.39.a: "Позбудемося минулих впливів."
  dlh_20_percent_of_slaves_become_peasants_tt: "#Y 20%#! наших [ShowPopTypeName('slaves')] будуть підвищені до [ShowPopTypeName('peasants')]"
  flavor_dlh.40.title: "Заснування Гуламанів-і-Фіруз-Шахі"
  flavor_dlh.40.desc: "Завдяки великій кількості рабів у [ROOT.GetCountry.GetName] та перебуванню династії [GetDynasty('tughlaq_dynasty').GetName] на троні, [target_character.GetName] розробляв плани створення постійної армії. Невеликий загін елітних рабів, названий Гуламанами-і-Фіруз-Шахі, призначений для охорони [ROOT.GetCountry.GetGovernment.GetRulerTitle] від будь-якої небезпеки."
  flavor_dlh.40.a: "Давайте створимо цю силу."
  flavor_dlh.40.b: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] охоронці не славляться захистом своїх правителів..."
  flavor_dlh.41.title: "Корупція в рабській гвардії"
  flavor_dlh.41.desc: "Через некомпетентність [target_character.GetNameWithNoTooltip] поширюються чутки про те, що Гуламани-і-Фіруз-Шахі намагаються здійснити переворот проти [ROOT.GetCountry.GetGovernment.GetRulerTitle] і замінити [target_character.GetHerHim] більш сприятливим кандидатом, якого вони зможуть контролювати."
  flavor_dlh.41.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_dlh.41.b: "Трохи золота нагадає їм про їхню роль."
  flavor_dlh.42.title: "Архітектура [GetDynasty('tughlaq_dynasty').GetNameWithNoTooltip]"
  flavor_dlh.42.desc: "[target_character.GetName] приносить культурне процвітання [ROOT.GetCountry.GetName]. Спонсоруючи багатьох архітекторів, [target_character.GetSheHe] заслуговує похвали за реновацію [target_location.GetRank.GetName] [target_location.GetName]."
  flavor_dlh.42.a: "Давайте спонсорувати це ще більше."
  flavor_dlh.42.b: "Нам тут не потрібно більше архітекторів."
  flavor_dlh.43.title: "Землетрус у $qutb_minar$"
  flavor_dlh.43.desc: "До нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] надійшли новини, що [target_location.GetName] став жертвою сильного землетрусу. Зокрема, $qutb_minar$, Вежа Перемоги, постраждала найбільше. Хоча ми могли б дозволити їй впасти, ми також могли б виділити кошти на ремонт цієї вежі, навіть якщо не до її первісної слави."
  flavor_dlh.43.a: "Нехай вона впаде."
  flavor_dlh.43.b: "Відремонтуймо її."
  flavor_dlh.44.title: "Ремонт $qutb_minar$"
  flavor_dlh.44.desc: "Після нещодавнього землетрусу, що стався в [target_location.GetName], [ROOT.GetCountry.GetGovernment.GetCourtTitle] планує провести нові реновації $qutb_minar$. Під керівництвом [target_character.GetName], [target_character.GetSheHe] бажає додати п'ятий поверх до вежі."
  flavor_dlh.44.a: "Дозвольмо [target_character.GetHerHim] це зробити."
  flavor_dlh.44.b: "Ми не дозволимо [target_character.GetHerHim]."
  flavor_dlh.45.title: "Скасування Монетних Реформ [target_character.GetNameWithNoTooltip]"
  flavor_dlh.45.desc: "Монети, викарбувані за правління [target_character.GetName], були, м'яко кажучи, катастрофою. Вони спричинили шалену інфляцію в [ROOT.GetCountry.GetName], що призвело до значного занепаду економіки. [target_character.GetNameWithNoTooltip] бажає скасувати ці реформи, але це вимагатиме тонн золота, а також суперечитиме [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]."
  flavor_dlh.45.a: "Скасуймо цю катастрофічну реформу."
  flavor_dlh.45.b: "Ми не будемо з цим боротися."
  flavor_dlh.46.title: "Відродження Поезії та Музики"
  flavor_dlh.46.desc: "Завдяки покровительству багатьох митців з боку [target_character.GetName], для [ROOT.GetCountry.GetName] та [ROOT.GetCountry.GetCulture.GetName] культури в цілому настала нова епоха. Завдяки цьому ми можемо виправдати інвестування більших коштів у це відродження."
  flavor_dlh.46.a: "[ROOT.GetCountry.GetReligion.GetGodName] свідчить, ми інвестуємо."
  flavor_dlh.46.b: "Немає потреби інвестувати більше."
  flavor_dlh.47.title: "Невдоволення серед пуштунських вельмож"
  flavor_dlh.47.desc: "Пуштунські вельможі, вельми впливові [ShowCultureName('afghan_culture')] родини в [ROOT.GetCountry.GetName], стають все більш і більш бунтівними. Бачачи, як наше суспільство починає менше їх підтримувати, вони збирають людей у [target_area.GetName], зокрема в [target_location.GetName], сподіваючись отримати більше автономії."
  flavor_dlh.47.a: "Нехай приходять."
  flavor_dlh.47.b: "Вони можуть мати більше привілеїв, ніж інші вельможі."
  dlh_afghan_unrest_tt: "Усі [ShowCultureName('afghan_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetName] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  dlh_afghan_control_tt: "Усі володіння [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetName] втратять [ShowNamedValue('control_extreme_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_dlh.48.title: "[target_character.GetNameWithNoTooltip]"
  flavor_dlh.48.desc: "З огляду на владу, яку [target_country.GetName] має над [ROOT.GetCountry.GetName], губернатори приходять і йдуть з [ROOT.GetCountry.GetCapital.GetName]. Останнім є [target_character.GetName], частина династії [GetDynasty('sayyid_dynasty').GetName], яка стверджує, що [target_character.GetSheHe] є нащадком Мухаммада, великого пророка [ShowReligionGroupName('muslim')]."
  flavor_dlh.48.a: "[target_character.GetNameWithNoTooltip] буде новим губернатором."
  flavor_dlh.48.b: "[target_character.GetSheHe|U] звучить як звичайний самозванець."
  flavor_dlh.50.title: "Відновлення Сахана-і-Манді"
  flavor_dlh.50.desc: "Наші попередні правителі намагалися запровадити контроль над цінами на ринках [ROOT.GetCountry.GetName], але ці заходи зазвичай швидко скасовувалися після їхньої смерті. Ці реформи мали на меті підкорити [ShowReligionAdjective('hindu')] народ, а також дозволити набір більшої армії. Тепер, коли [target_character.GetName] при владі, може з'явитися надія відновити ці регуляції."
  flavor_dlh.50.a: "Настав час їх запровадити."
  flavor_dlh.50.b: "Не будемо гнобити наші меншини."
  flavor_dlh.51.title: "[target_character.GetNameWithNoTooltip] убитий!"
  flavor_dlh.51.desc: "Гуляман-і-Фіруз-Шахі з [ROOT.GetCountry.GetName] показали свої справжні кольори решті [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Бажаючи позбутися [target_character.GetName], вони успішно вбили [target_character.GetHerHim], дозволивши [target_character.GetHerHis] наступнику більш належним чином правити [ROOT.GetCountry.GetFlavorRank]."
  flavor_dlh.51.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_dlh.52.title: "Призначення Мандрівника"
  flavor_dlh.52.desc: "Становище [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetRulerTitle] у кращому випадку хитке. [ROOT.GetCountry.GetFlavorRank] охоплений багатьма внутрішніми проблемами, багато з яких спричинені правлінням впливових членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. З такими могутніми адміністраторами та їхніми глибокими зв'язками, можливо, було б краще залучити свіжу кров, таку як [target_character.GetName], справді видатну постать, яка зараз подорожує [ROOT.GetCountry.GetNameWithNoTooltip]. Допомога [target_character.GetShortNameWithNoTooltip] допомогла б зменшити владу нинішнього [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_dlh.52.a: "Дуже добре, нехай [target_character.GetHerHim] буде призначений."
  flavor_dlh.52.b: "Нам не потрібен [target_character.GetNameWithNoTooltip]."
  flavor_dlh.53.title: "Звільнення з посади"
  flavor_dlh.53.desc: "Відносини між [target_character2.GetName] та [target_character.GetName] були теплими донедавна. Однак, [ROOT.GetCountry.GetGovernment.GetRulerTitle] боїться за [target_character2.GetHisHer] схильність підозрювати повстання навіть у найвірніших [target_character2.GetHerHis] членах кабінету. [target_character.GetShortNameWithNoTooltip] не є винятком з цього правила, і зробивши деякі мовчазні зауваження, що не схвалюють [target_character2.GetShortNameWithNoTooltip], [target_character.GetSheHe] тепер підозрюється у зраді і може зіткнутися зі звільненням з посади, або, можливо, навіть зі смертю."
  flavor_dlh.53.a: "Скатертиною дорога."
  flavor_dlh.53.b: "[target_character.GetNameWithNoTooltip] нічого поганого не зробив!"
  flavor_dlh.54.title: "Доповідь від раба"
  flavor_dlh.54.desc: "Ефективний шпигунство та розвідувальний зв'язок є важливими для підтримки авторитету [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Різні мамелюки перебувають на службі у наших міністрів та збирачів податків [ShowLawName('iqta_law')], від яких потім очікується повідомлення про будь-яку нелояльність та зраду уряду. Система працює належним чином, адже один з рабів на службі у [target_character.GetName] викрив [target_character.GetHerHim] як зрадника, який незабаром повстане в [target_province.GetName], якщо щось не буде зроблено негайно."
  flavor_dlh.54.a: "Негайно ув'язнити [target_character.GetNameWithNoTooltip]."
  flavor_dlh.54.b: "Без більш конкретних доказів ув'язнення може бути тиранічним."
  flavor_dlh.55.title: "Власник [ShowLawNameWithNoTooltip('iqta_law')] не може виконати квоту"
  flavor_dlh.55.desc: "Один з наших збирачів податків, [target_character.GetName], за повідомленнями, не виконує [target_character.GetHerHis] квоти зі збору податків. Не маючи змоги заробити достатньо золота для виконання державних вимог, [target_character.GetShortNameWithNoTooltip] боїться за [target_character.GetHerHis] життя через чутки, що [ShowModifier('dlh_the_mad_sultan')] розправляється з такою неефективністю з жорстокістю. Поставлений у таке жахливе становище, [target_character.GetShortNameWithNoTooltip] вирішив взятися за зброю у [target_character.GetHerHis] провінції [target_province.GetName] проти [target_character2.GetName]."
  flavor_dlh.55.a: "Ми зітремо [target_character.GetHerHim] з лиця землі!"
  flavor_dlh.55.b: "Спробувати домовитися з [target_character.GetNameWithNoTooltip]."
  flavor_dlh.56.title: "Мінлива вірність [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_dlh.56.desc: "Настали важкі часи для [ROOT.GetCountry.GetLongName]. [ShowSituationName('fall_of_delhi')] у розпалі, і повстання чекають на нас на кожному кроці. У провінціях панує бандитизм, податкові надходження падають, а [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] зраджують нас за першої ж нагоди. Щоб відтермінувати [ShowDisasterName('dissolution_of_delhi')], ми надавали посади в [ShowLawName('iqta_law')] у спадок, що для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] стало нормою, а не винятком."
  flavor_dlh.56.a: "Тоді зробіть це стандартом!"
  flavor_dlh.56.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] повинні знати своє місце."
  flavor_dlh.57.title: "[ShowGovernmentReformNameWithNoTooltip('diwan_i_bandagan')]"
  flavor_dlh.57.desc: "В останні роки [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] набував все більше рабів для армії, а також для служби охоронцями [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Настільки, що міністри пропонують запровадити [ShowGovernmentReformName('diwan_i_bandagan')], спеціальний департамент, відповідальний за закупівлю та управління рабами."
  flavor_dlh.57.a: "Створити департамент."
  flavor_dlh.57.b: "Такі заходи не потрібні, принаймні поки що."
  flavor_dlh.58.title: "Набір мамлюків"
  flavor_dlh.58.desc: "Набір [ShowCultureGroupName('turkic_group')] рабів не є чимось незвичайним для [ROOT.GetCountry.GetLongName]. Насправді, саме мамлюки заснували першу династію, яка правила [ROOT.GetCountry.GetFlavorRank]. Враховуючи це, [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] колективно вирішив, що потрібно закупити більше мамлюків."
  flavor_dlh.58.a: "Включити їх до нашої армії."
  flavor_dlh.58.b: "Вони могли б допомогти в адміністрації."
  flavor_dlh.59.title: "Провал Карачілу"
  flavor_dlh.59.desc: "Ще в 1333 році [target_character.GetName] очолив експедицію проти [ShowReligionAdjective('hindu')] держав [target_area.GetName]. Однак, незважаючи на військову доблесть нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], наші сили зазнали катастрофічної поразки, заплямувавши ім'я [ROOT.GetCountry.GetName] по всій $india$. Тепер, коли насувається [ShowSituationName('fall_of_delhi')], ми можемо вважати за необхідне помститися за нашу поразку."
  flavor_dlh.59.a: "Ми ще не закінчили."
  flavor_dlh.59.b: "Друга невдача заб'є цвях у нашу труну."
  dlh_benefits_of_subjugating: "Якщо ми [Concept('conquer', 'CONCEPT_PLACEHOLDER')|e] та [Concept('own', 'CONCEPT_PLACEHOLDER')|e] принаймні [FixedPointToInt(Add_CFixedPoint(Multiply_CFixedPoint(IntToFixedPoint(target_area.GetNumLocations), '(CFixedPoint)0.3'), '(CFixedPoint)1'))] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetName] за 10 років, ми отримаємо наступне:"
  flavor_dlh.60.title: "Успіх Карачілу"
  flavor_dlh.60.desc: "Навчившись на помилках 1333 року, віддані [ROOT.GetCountry.GetAdjective] генерали стерли з карт державні утворення західного [ShowAreaName('nepal_area')]. Хоча ми, можливо, і не завоювали більшу частину території, багато наших колишніх ворогів були принижені, а віра в [ROOT.GetCountry.GetFlavorRank] була відновлена."
  flavor_dlh.60.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_dlh.61.title: "Друге лихо в Карачілі"
  flavor_dlh.61.desc: "Незважаючи на наші рішучі зобов'язання щодо підкорення [ShowReligionAdjective('hindu')] держав [ShowAreaName('nepal_area')], за десять років, що минули, було досягнуто незначного прогресу. Дозволити цим дрібним графствам існувати так довго – це провал нашої адміністрації, який відгукнеться як велика невдача по всій $india$."
  flavor_dlh.61.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_dlh.62.title: "Вдала нагода"
  flavor_dlh.62.desc: "У недалекому минулому ми розглядали можливість експансії в [ShowAreaName('eastern_khorasan_area')] та інші землі за Індом. Хоча ми значною мірою відмовилися від цієї ідеї, ми все ще дотримуємося політики запрошення різних іноземних талантів, надаючи їм значні земельні гранти. Можливо, нам слід також запросити [target_character.GetName], який міг би бути надзвичайно корисним, якщо ми коли-небудь захочемо вести переговори або вторгнутися в [target_country.GetName]."
  flavor_dlh.62.a: "Запросити [target_character.GetShortNameWithNoTooltip]."
  flavor_dlh.62.b: "Нам не потрібен [target_character.GetHerHim]."
  flavor_dlh.63.title: "[target_character.GetNameWithNoTooltip] мігрує до [from_country.GetNameWithNoTooltip]"
  flavor_dlh.63.desc: "Один із членів правлячої династії, [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], був підкуплений, щоб покинути нашу країну! Ми не знаємо мети цього, але це, безумовно, не може бути позитивним видовищем. Сподіваємося, що земельний грант, який [target_character.GetName] прийняв, був вартий зради [target_character.GetHerHis] родичів."
  flavor_dlh.63.a: "Що це може означати?"
  flavor_dlh.64.title: "[target_work_of_art.GetNameWithNoTooltip] уражено блискавкою"
  flavor_dlh.64.desc: "Жахливі новини щойно дійшли до [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Під час однієї з нещодавніх бур, [target_work_of_art.GetName] було уражено блискавкою, що спричинило значні пошкодження верхнього поверху. З того, що повідомили очевидці, це [target_work_of_art.GetDefinition.GetName] стоїть на межі руїни і може бути знищено, якщо ремонт не буде зроблено негайно. Більше того, якщо ремонт буде зроблено, це ідеальна можливість для розширення та прикрашення верхніх поверхів [ShowGoodsName('marble')]."
  flavor_dlh.64.a: "Зробити необхідний ремонт."
  flavor_dlh.64.b: "Облаштувати верхні поверхи [ShowGoodsNameWithNoTooltip('marble')]"
  flavor_dlh.64.c: "Нехай воно впаде."
  flavor_dlh.65.title: "Конфлікт з [target_country.GetLongNameWithNoTooltip]"
  flavor_dlh.65.desc: "Кордон з [target_country.GetAdjective] монголами та їхніми підданими є динамічним. Прикордонні суперечки часті, і відбуваються спорадичні прикордонні набіги на [ROOT.GetCountry.GetAdjective] території. Хоча більшість з них проводилися в невеликих масштабах, ця неприємність все ще достатня, щоб виправдати війну. Таким чином, останні кілька років спостерігалася зростаюча підтримка для початку каральної експедиції проти [target_country.GetAdjectiveWithNoTooltip] [target_country.GetFlavorRank]."
  flavor_dlh.65.a: "Виконати ці військові плани."
  flavor_dlh.65.b: "Ми не в змозі воювати."
  flavor_dlh.66.title: "Важкі податки, накладені на [target_province.GetNameWithNoTooltip]"
  flavor_dlh.66.desc: "Наш економічний спад змусив [ROOT.GetCountry.GetGovernment.GetAdjective] міністрів збільшити податки по всій країні. Однак, через наш поганий контроль над рештою володінь, податки найбільше відчувалися в районах [ShowAreaName('doab_area')] та [ShowAreaName('awadh_area')], де [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] вдалися до бандитизму та повстання. Ситуація в [target_province.GetName] наразі є найкритичнішою, і необхідно вжити заходів."
  flavor_dlh.66.a: "Надати деякі податкові пільги."
  flavor_dlh.66.b: "Затягнути повідок."
  flavor_dlh_1000_title_shared: "Повстання династії [target_dynasty.GetNameWithNoTooltip]"
  flavor_dlh.1000.title: "$flavor_dlh_1000_title_shared$"
  flavor_dlh.1000.desc: "Завдяки нашому зростанню впливу в [target_country.GetName], ми нарешті змогли отримати достатню підтримку, щоб скинути [target_character.GetName] і замінити [target_character.GetHerHim] членом династії [target_dynasty.GetName]."
  flavor_dlh.1000.a: "Давайте звільнимося!"
  flavor_dlh.1000.b: "Ми не повстанці, лише намісники."
  flavor_dlh.1000.historical_info: "Бахлул Хан Лоді, тодішній губернатор Сірхінда, був першим правителем Лоді в Делі. Використовуючи свої попередні досягнення як генерал за Мухаммада Шаха IV, він отримав губернаторство значної частини Пенджабу. Після смерті свого сюзерена та зречення Ала ад-Діна Алама Шаха, його запросили дворяни до столиці, де він був проголошений султаном."
  flavor_dlh.1001.title: "$flavor_dlh_1000_title_shared$"
  flavor_dlh.1001.desc: "[target_dynasty.GetName] нарешті показали своє справжнє обличчя. Після років збирання підтримки, вони тепер планують повалити [target_character.GetName] і замінити його на [target_character2.GetName]. Ми не будемо стояти осторонь, поки це відбувається."
  flavor_dlh.1001.a: "До зброї!"
  flavor_dlh.1001.b: "Можливо, [ROOT.GetCountry.GetGovernment.GetCourtTitle] віддає перевагу [target_character2.GetNameWithNoTooltip]..."
  flavor_dlh.1002.title: "Тріумф [target_dynasty.GetNameWithNoTooltip]"
  flavor_dlh.1002.desc: "З падінням $DLH$ ми нарешті можемо захопити владу в $india$. [target_dynasty.GetName] тепер стоїть над рештою претендентів."
  flavor_dlh.1002.a: "Тепер час для миру."
  flavor_dlh_1100_title: "Намісництво [ShowRegionNameWithNoTooltip('bengal_region')]"
  flavor_dlh.1100.title: "$flavor_dlh_1100_title$"
  flavor_dlh.1100.desc: "Землі [ShowRegionName('bengal_region')] керуються численними намісниками, усі з різною вірністю до [ROOT.GetCountry.GetName]. Замість того, щоб розбиратися з цим безладом, ми могли б запропонувати весь регіон [target_character.GetName] з [target_country.GetName]."
  flavor_dlh.1100.a: "[target_country.GetNameWithNoTooltip] стануть чудовими намісниками."
  flavor_dlh.1100.b: "Не будемо порушувати там геополітичну ситуацію."
  flavor_dlh.1101.title: "$flavor_dlh_1100_title$"
  flavor_dlh.1101.desc: "[target_country2.GetName] запропонувала нам намісництво над [ShowRegionName('bengal_region')], дозволяючи нам захопити землі решти намісників."
  flavor_dlh.1101.a: "Ми із задоволенням приймемо цю можливість."
  flavor_dlh.1101.b: "Лише привід для повстання."
  dlh_demand_annexation_of_other_bengali_subjects_tt: "Решті [target_country2.GetName] [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('bengal_region')] буде запропоновано анексувати нами"
  flavor_dlh.1102.title: "$flavor_dlh_1100_title$"
  flavor_dlh.1102.desc: "[target_country.GetName] було оголошено намісником [ShowRegionName('bengal_region')]. Тепер вони вимагають, щоб ми віддали їм наші землі"
  flavor_dlh.1102.a: "Ми не будемо кидати виклик нашому сюзерену."
  flavor_dlh.1102.b: "Віддати наші землі? Ніколи!"
  flavor_dlh_1200_title_shared: "Підрив [target_country.GetAdjectiveWithNoTooltip] правління"
  flavor_dlh.1200.title: "$flavor_dlh_1200_title_shared$"
  flavor_dlh.1200.desc: "Будучи не більше ніж простими намісниками для [target_country.GetName], зростають настрої щодо відновлення суверенітету [ROOT.GetCountry.GetName]. [target_character.GetName] вже намагався зібрати прихильників для цього, але чи варто ризикувати гнівом [target_character2.GetName] заради цього?"
  flavor_dlh.1200.a: "Ми більше ніж просто намісники!"
  flavor_dlh.1200.b: "Схилити коліно наразі є єдиним шляхом."
  dlh_start_undermining_timurid_rule_tt: "Ми продовжимо підривати [target_country.GetName], але є ймовірність, що вони відхилять нашу пропозицію, що може призвести до #Y оголошення ними війни#! нам"
  flavor_dlh.1201.title: "$flavor_dlh_1200_title_shared$"
  flavor_dlh.1201.desc: "Оскільки наші зусилля з підриву [target_country.GetName] міцнішають серед простого люду в [ROOT.GetCountry.GetName], дрібні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] з'являються, щоб допомогти нам завдати удару, коли настане слушний час. Двоє з них, [target_supporter.GetName] та [target_supporter2.GetName], вже присягнули на вірність [target_character.GetName], бажаючи бути прийнятими на службу до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_dlh.1201.a: "Нехай вони служать нам."
  flavor_dlh.1201.b: "Більше не завжди краще."
  flavor_dlh.1202.title: "$flavor_dlh_1200_title_shared$"
  flavor_dlh.1202.desc: "З нашими приготуваннями до звільнення від [target_country.GetName], залишається лише надіслати наш ультиматум. [target_character2.GetName] та [ROOT.GetCountry.GetGovernment.GetCourtTitle] доклали всіх зусиль, щоб ці приготування були максимально ефективними, і тепер збирають свої сили на випадок, якщо їхні вимоги не будуть задоволені. Ми могли б бути готові вимагати нашої незалежності, але водночас ризик війни може загрожувати процвітанню [target_country2.GetName]."
  flavor_dlh.1202.a: "Вимагаймо нашої свободи."
  flavor_dlh.1202.b: "Немає сенсу продовжувати це, коли зрозуміло, що виникне лише конфлікт."
  dlh_abandon_rebellion_plans_tt: "Ми відмовимося від наших планів з підриву [target_country.GetName]"
  flavor_dlh.1203.title: "$flavor_dlh_1200_title_shared$"
  flavor_dlh.1203.desc: "[target_country2.GetName] вимагає надати їм свободу. Вони стверджують, що не задоволені нашим правлінням і що [target_country2.GetNameWithNoTooltip] має правити [target_character.GetName] замість простого завойовника."
  flavor_dlh.1203.a: "Хто ми такі, щоб кидати їм виклик?"
  flavor_dlh.1203.b: "Вони здобудуть свою свободу лише кров'ю!"
  flavor_dlh.1204.title: "$flavor_dlh_1200_title_shared$"
  flavor_dlh.1204.desc: "[target_country.GetName] зробили свій вибір. Вони не дозволять нам керувати собою, не зіткнувшись з ними на полі бою. Тепер залишається підготувати полки для захисту [ROOT.GetCountry.GetFlavorRank]."
  flavor_dlh.1204.a: "До зброї!"