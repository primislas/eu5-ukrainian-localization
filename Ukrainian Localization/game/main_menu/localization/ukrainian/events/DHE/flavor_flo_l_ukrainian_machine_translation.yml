l_english:
  flavor_flo.1.title: "[target_artist.GetShortNameWithNoTooltip]"
  flavor_flo.1.desc: "Вважаючись одним із найвидатніших живих художників, [target_artist.GetShortName] здобув неабияку репутацію. Низка його робіт у живописі, скульптурі та архітектурі належить до найвідоміших у світі. Хоча він вважає себе насамперед скульптором, він однаково вправний у малюванні фресок чи проектуванні архітектурно вражаючих будівель. Такий художник справді є втіленням духу Відродження."
  flavor_flo.1.a: "Справді обдарована людина."
  flavor_flo.2.title: "Імператор засуджує піднесення [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_flo.2.desc: "Сила [ROOT.GetCountry.GetName] зростала протягом тривалого часу, і цілком справедливо, що Папа нарешті визнає досягнення [ROOT.GetCountry.GetLongName]. [GetCountry('PAP').GetGovernment.GetRuler.GetName] проголосив нашу державу Великим Герцогством, а шановного [ROOT.GetCountry.GetGovernment.GetRuler.GetName] — її Великим Герцогом. Однак проголошення зустріло опір.\n\nХоча лише номінально, Імператор все ще розглядає [ROOT.GetCountry.GetNameWithNoTooltip] як імперський феод і стверджує, що проголошення Папи є незаконним!"
  flavor_flo.2.a: "Імператор не стане на шляху Божої волі."
  opinion_emperor_tus_refused: "Відмовилися підкоритися Імператору"
  opinion_papal_tus_refused: "Відмовилися підкоритися Імператору"
  flavor_flo.2.b: "Ми повинні підкоритися звичному праву Імператора."
  opinion_emperor_tus_yielded: "Підкорилися Імператору"
  opinion_papal_tus_yielded: "Підкорилися Імператору"
  flavor_flo.3.title: "Імператор підтверджує піднесення [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_flo.3.desc: "Наші дипломати працювали день і ніч, щоб Імператор переглянув [target_emperor.GetHerHis] позицію щодо статусу нашого [ROOT.GetCountry.GetFlavorRank]. Тепер [target_emperor.GetSheHe] нарешті усвідомив, що [target_emperor.GetSheHe] не може стояти на шляху Божої волі. Новим проголошенням [target_emperor.GetSheHe] підтвердив статус [ROOT.GetCountry.GetName] як Великого Герцогства. З Папою та Імператором на нашому боці ніхто не може заперечити нашу славу."
  flavor_flo.3.a: "Все гаразд."
  flavor_flo.4.title: "Будівельні проекти [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_flo.4.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] присвятив [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] правління покращенню життя [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] підданих, а отже, і [ROOT.GetCountry.GetAdjectiveWithNoTooltip] держави. Одним із [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] великих починань було проведення масштабних проектів розвитку в [ROOT.GetCountry.GetName].\n\nПід [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] правлінням дороги були покращені та розвинені по всьому [ROOT.GetCountry.GetFlavorRank]. Ще важливіше, [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] запропонував осушити значні [ROOT.GetCountry.GetAdjectiveWithNoTooltip] болота навколо [ShowLocationName('pisa')], відкриваючи нові землі для поселення та промисловості. Це буде зроблено, серед іншого, шляхом відведення річки Арно в канал Навільйо, що сприятиме покращенню торгівлі між [ShowLocationName('florence')] та [ShowLocationName('pisa')]."
  flavor_flo.4.a: "Повністю реалізувати проекти."
  flavor_flo.5.title: "Скарбниця [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_flo.5.desc: "[ROOT.GetCountry.GetName] під [ShowDynastyName('medici_dynasty')] є фінансовою великою державою в Італії, вовна тече з міста, а золото тече всередину, не в останню чергу через банк Медічі. Банк, разом із володінням значною частиною місцевої промисловості, означає, що правитель Медічі здійснює величезний контроль над економікою [ROOT.GetCountry.GetFlavorRank]. Зрештою, широке володіння призвело до того, що відмінність між державними коштами та особистим багатством [ROOT.GetCountry.GetGovernment.GetRulerTitle] значною мірою незначна. Наприклад, [ROOT.GetCountry.GetGovernment.GetRulerTitle] має виключні права на державний видобуток солі та мінералів, але ці кошти, як очікується, безпосередньо принесуть користь державі та місту.\n\nОднак, за такого великого особистого контролю, що є державними грошима, а що сімейними грошима, значною мірою залежить від кожного [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_flo.5.a: "Те, що в інтересах Медічі, в інтересах [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_flo.5.b: "Медічі правлять для [ROOT.GetCountry.GetAdjectiveWithNoTooltip] народу."
  flavor_flo.6.title: "Реформи [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_flo.6.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetShortName] [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] непопулярний з незвичайної причини. [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe|U] запровадив широкі соціальні, правові та фінансові реформи в [ROOT.GetCountry.GetNameWithNoTooltip], але зустрів значний опір з боку всіх верств суспільства, оскільки реформи вважалися надто ліберальними.\n\nРеформування податкової системи для полегшення тягаря для громадян та проведення прибуткових громадських робіт були добре сприйняті, але [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] спроби зменшити владу [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] були зупинені опозицією з боку Папи та його політичних союзників. Незважаючи на виклики на кожному кроці, багато [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] цілей було досягнуто, таких як гарантування законних прав для громадян, покращення ставлення до психічно хворих та одна з найперших програм щеплення від віспи.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] також намагався запровадити конституцію в [ROOT.GetCountry.GetNameWithNoTooltip]. Це передбачало б надання більших прав її громадянам та забезпечення балансу між законодавчою та виконавчою владою. Однак конституція зустріла запеклий опір, навіть з боку тих, хто міг би від неї виграти, і так і не була введена в дію."
  flavor_flo.6.a: "Ми впровадимо ці реформи, чого б це не коштувало!"
  flavor_flo.6.b: "Якщо люди не хочуть реформ, ми повинні спрямувати наші зусилля в інше русло."
  flavor_flo.8.title: "Східна друкарня Медічі"
  flavor_flo.8.desc: "Східна друкарня Медічі — це друкарня, заснована родиною [ShowDynastyName('medici_dynasty')]. Її метою є друк християнських творів арабською мовою в надії навернути мусульман, і Папа надав їй монополію на друк книг «іноземними мовами».\nДрукарня опублікувала одні з найперших друкованих творів арабською мовою, а також почала включати численні нерелігійні твори. Наукові праці арабською мовою друкувалися для поширення серед європейських вчених, а також давньогрецькі твори, які збереглися лише в арабському перекладі."
  flavor_flo.8.a: "Тільки не кажіть Папі."
  STATIC_MODIFIER_NAME_oriental_press: "Східна друкарня Медічі"
  STATIC_MODIFIER_DESC_oriental_press: "Східна друкарня друкує твори арабською мовою, сприяючи кращому спілкуванню з мусульманськими вченими та філософами. З метою навернення їх, звичайно."
  flavor_flo.20.title: "Змова [target_dynasty.GetNameWithNoTooltip]"
  flavor_flo.20.desc: "Банківська родина [target_dynasty.GetName], закляті суперники родини [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] та [ROOT.GetCountry.GetGovernment.GetRulerTitle], змовилися, щоб повалити уряд [ROOT.GetCountry.GetFlavorRank] та встановити себе правителями [ROOT.GetCountry.GetName]. Багато найвпливовіших постатей у [ROOT.GetCountry.GetAdjectiveWithNoTooltip] політиці є учасниками цієї підлої змови, від купців до священнослужителів та дворян.\n\nПлан [target_dynasty.GetNameWithNoTooltip] полягає в тому, щоб убити [ROOT.GetCountry.GetGovernment.GetRuler.GetName] під час Високої Меси в Дуомо, а потім захопити Палаццо делла Синьйорія та взяти кермо влади. Однак, якщо змова провалиться, більшість політичних ворогів [ROOT.GetCountry.GetFlavorRank] будуть оголошені злочинцями, і [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] правитиме практично безперешкодно."
  flavor_flo.20.a: "Повісити їх на Палаццо!"
  flavor_flo.20.b: "Підтримати переворот [target_dynasty.GetNameWithNoTooltip]."
  flavor_flo.27.title: "Годинникова вежа Палаццо делла Синьйорія"
  flavor_flo.27.desc: "Протягом багатьох років #italic Палаццо делла Синьйорія#! височів, гордо демонструючи наші найкращі якості та увагу до деталей як емблема нашої країни. Нещодавно до нас дійшло, що кілька незначних архітекторів з [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] висловили бажання спроектувати нову годинникову вежу для нашого палацу. Хоча вартість проекту, безумовно, не дешева, це значно підвищить наш престиж та довіру як справжньої влади в [target_location.GetName]."
  flavor_flo.27.a: "Профінансувати годинникову вежу."
  flavor_flo.27.b: "Гроші слід використати на благодійність."
  flavor_flo.27.c: "Ми не можемо собі цього дозволити..."
  flavor_flo.28.title: "Флорентійський собор"
  flavor_flo.28.desc: "Деякий час [ShowBuildingTypeName('cathedral')] у [target_location.GetName] залишався здебільшого бездіяльним. Попередні спроби розширити купол та складні елементи будівлі зупинялися або через брак таланту, або коштів.\n\n[target_character.GetName] звернувся до нас з амбітними проектами завершення решти собору та його належного оздоблення. Однак робота була б досить дорогою, і тому багато наших радників наполягають, що ми повинні натомість зосередитися на підтримці існуючої будівлі в її нинішньому стані."
  flavor_flo.28.a: "Ми подбаємо про те, щоб [ShowBuildingTypeNameWithNoTooltip('cathedral')] у [target_location.GetNameWithNoTooltip] було завершено."
  flavor_flo.28.b: "Давайте зосередимося на підтримці існуючих фундаментів."
  flavor_flo.28.c: "Ми не можемо собі цього дозволити..."
  flavor_flo.29.title: "Перший сучасний інженер"
  flavor_flo.29.desc: "[target_artist.GetName] — відомий італійський архітектор та інженер. Він найвідоміший своїми новаторськими архітектурними досягненнями, які дають йому право називатися батьком-засновником архітектури Відродження, і широко визнаний піонером інженерії. Інноваційне використання Брунеллескі геометричних принципів та інженерних технік має на меті революціонізувати архітектуру, надихаючи наші майбутні покоління архітекторів.\n\nВін також є майстром у використанні лінійної перспективи, техніки, яка трансформувала представлення простору в мистецтві. Його видатний внесок в архітектуру та мистецтво закладе основу для архітектурних та художніх досягнень Відродження."
  flavor_flo.29.a: "Ми повинні прийняти його до нашого двору!"
  flavor_flo.29.b: "Хоч би яким вправним він був, наші гроші краще витратити деінде..."
  flavor_flo.30.title: "Великий італійський художник"
  flavor_flo.30.desc: "Одна з найвпливовіших постатей Відродження в Італії, [target_artist.GetName] представився при нашому дворі. Його портфоліо попередніх робіт може похвалитися чудовою серією природних зображень, тривимірних дизайнів та лінійної перспективи в його картинах, зафіксованих на полотні. Його обіцянка неперевершених та престижних творів мистецтва є гарним доповненням до нашого зростаючого кола талановитих особистостей, присутніх при нашому дворі."
  flavor_flo.30.a: "Ми мусимо прийняти його до нашого двору!"
  flavor_flo.30.b: "Хоч би яким вправним він був, наші гроші краще витратити на щось інше..."
  flavor_flo.31.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_flo.31.desc: "[target_artist.GetName] — італійський живописець, кресляр, скульптор, архітектор та інженер, чий геній, можливо, більше, ніж будь-якої іншої постаті, уособлюватиме гуманістичний ідеал Відродження. Його роботи є одними з найпопулярніших та найвпливовіших картин у світі мистецтва. Його записники розкривають дух наукового дослідження та механічну винахідливість, що є безпрецедентними в наш час."
  flavor_flo.31.a: "Справжній чоловік Відродження!"
  flavor_flo.31.b: "Нам не потрібні такі люди при дворі..."
  flavor_flo.32.title: "[target_artist.GetNameWithNoTooltip] переїжджає до [target_location.GetNameWithNoTooltip]"
  flavor_flo.32.desc: "Здається, [target_artist.GetName] переніс свою майстерню до [target_location.GetName]. Після отримання замовлень на кілька нових проєктів, обіцянка значної зарплати та щедрого фінансування схилила його залишити наш двір. Що б не сталося, ми завжди будемо цінувати його присутність при нашому дворі та його майстерний талант."
  flavor_flo.32.a: "Прощавай, друже."
  flavor_flo.32.b: "Ми не дозволимо, щоб наших людей так переманювали!"
  flavor_flo.33.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_flo.33.desc: "[target_artist.GetName] — відомий художник, знаний своїми винятковими роботами, що зображують міфологічні та релігійні сюжети. Досягнення Боттічеллі включають створення культових шедеврів, які залишили тривалий вплив на майбутню історію мистецтва. Серед його відомих робіт — «#italic Народження Венери#!» та «#italic Весна#!», які демонструють його майстерність у зображенні витончених фігур, ніжних кольорів та складних деталей. Мистецтво Боттічеллі втілює ідеали Відродження з його акцентом на гуманізм та красу. Його внесок у світ мистецтва, безсумнівно, продовжуватиме викликати захоплення та цінуватися за його позачасову елегантність та емоційну глибину протягом багатьох років."
  flavor_flo.33.a: "Він стане чудовим доповненням до нашої колекції."
  flavor_flo.33.b: "Ми не можемо собі його дозволити..."
  flavor_flo.34.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_flo.34.desc: "[target_artist.GetName], широко відомий як Поджо, — італійський гуманіст і вчений. Його досягнення включають те, що він був видатною фігурою у відновленні та збереженні стародавніх римських текстів, особливо завдяки його навичкам мисливця та колекціонера рукописів. Роботи Поджо як писаря та бібліотекаря мають відіграти життєво важливу роль у відродженні класичної літератури та ідей. Його найзначнішим досягненням на сьогодні є відкриття та подальше копіювання кількох втрачених творів стародавніх авторів, включаючи листи Цицерона та «#italic Institutio Oratoria#!» Квінтіліана. Зусилля Поджо з перевідкриття та поширення цих текстів значно сприяють відродженню класичної освіти та прокладуть шлях для розквіту гуманізму."
  flavor_flo.34.a: "Ми покращуємо наше майбутнє, оберігаючи наше минуле."
  flavor_flo.34.b: "Його робота може бути великою, але його зарплата значно більша..."
  flavor_flo.35.title: "[target_artist.GetNameWithNoTooltip] Відвідує наш двір"
  flavor_flo.35.desc: "Спочатку, з 1394 року, у подорожі разом із візантійськими вченими, [target_artist.GetName] мандрував далеко й широко багатьма дворами Європи, перекладаючи твори Гомера та Платона, а також навчаючи грецької багатьох аристократів, які могли дозволити собі його послуги. Його остання зупинка, наш двір у [target_location.GetName], настільки його захопила та переконала, що він надіслав прохання нашим радникам. Він бажає бути найнятим до нашого двору та вільно поширювати свої знання та переклади в межах [target_location.GetNameWithNoTooltip]."
  flavor_flo.35.a: "Людина культури та знань, він найбажаніший гість!"
  flavor_flo.35.b: "Не будемо з ним зв'язуватися."
  flavor_flo.36.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_flo.36.desc: "[target_artist.GetName] — впливовий італійський вчений та гуманіст. Будучи відомим як колекціонер книг та популяризатор стародавніх знань, його велика колекція рукописів є однією з найзначніших приватних бібліотек цього часу. Його роботи як писаря та переписувача високо цінуються за їхню точність та увагу до деталей, що робить його ключовою фігурою у розвитку гуманістичного почерку, впливаючи на еволюцію #italic курсивного письма#!. Його внесок у збереження та поширення класичних текстів допоможе відродити інтерес до класичної літератури та закладе основу для інтелектуального відродження Ренесансу."
  flavor_flo.36.a: "Ми маємо застосування для таких людей!"
  flavor_flo.36.b: "Геть звідси!"
  flavor_flo.37.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_flo.37.desc: "[target_artist.GetName], широко відомий як Донателло, є видатним італійським скульптором, відомим революцією в мистецтві скульптури завдяки своїм інноваційним технікам та реалістичним зображенням. Його роботи характеризуються винятковою майстерністю та увагою до деталей, а його знамениті скульптури, такі як '#italic Давид#!' та '#italic Бенкет Ірода#!', демонструють його майстерність у передачі людських емоцій та виразів. Його внесок у світ мистецтва мав глибокий вплив, впливаючи на майбутні покоління скульпторів, а його роботи постійно відзначаються за їхню красу, реалізм та значну роль у розвитку мистецтва Відродження."
  flavor_flo.37.a: "Він дуже бажаний, щоб прикрасити наш двір"
  flavor_flo.37.b: "Нам не потрібні вигадливі різьбярі по каменю!"
  flavor_flo.38.title: "[target_character.GetNameWithNoTooltip] пише #italic Nuova Cronica#!"
  flavor_flo.38.desc: "Під час своїх подорожей навколо [target_location_rome.GetName] [target_character.GetName] усвідомив яскраву та прекрасну історію, пов'язану зі старою столицею регіону. З цією метою він благав нас спонсорувати його останнє творіння, #italic Nuova Cronica#!, всеосяжний опис історії міста та всього регіону. Хроніка, безсумнівно, стане цінним джерелом інформації про життя видатних діячів, конфлікти та суспільні зміни того часу."
  flavor_flo.38.a: "Гроші ніколи не є проблемою, коли йдеться про історію!"
  flavor_flo.38.b: "Це буде чудовий подарунок для [target_location_rome.GetNameWithNoTooltip]."
  flavor_flo.38.c: "Ми не можемо дозволити собі його спонсорувати..."
  flavor_flo.39.title: "Перший сучасний історик"
  flavor_flo.39.desc: "Італійський гуманіст та історик, [target_artist.GetName] народився у видатній флорентійській родині, де отримав чудову освіту, яка розвинула його інтелектуальну цікавість та любов до навчання. Відомий своїми винятковими лінгвістичними здібностями, [target_artist.GetNameWithNoTooltip] вільно володів латиною та грецькою, що дозволяло йому глибоко занурюватися в класичні тексти та ідеї. Заможне та освічене виховання сприяло формуванню його сильних рис характеру: допитливості, критичного мислення та пристрасті до знань. Його ненаситна жага до розуміння минулого та його відданість збереженню та просуванню класичної освіти, безсумнівно, робить його видатною фігурою в гуманістичному русі, залишаючи тривалий вплив на інтелектуальну думку Відродження."
  flavor_flo.39.a: "Цікава особистість, приведіть його до нашого двору!"
  flavor_flo.39.b: "Ми не можемо дозволити собі його роботи."
  flavor_flo.40.title: "Історія флорентійського народу від [target_character.GetNameWithNoTooltip]"
  flavor_flo.40.desc: "Керуючись своєю пристрастю до історичної науки та бажанням задокументувати багату спадщину [ROOT.GetCountry.GetName], [target_character.GetName] звернувся до нашого двору з проханням про спонсорство його останніх починань. Публікація, яку він має намір написати, стане всеосяжним описом політичної, соціальної та культурної історії [target_location.GetName].\n\nЙого ретельні дослідження та красномовний стиль письма, безсумнівно, захоплять читачів, надаючи цінні відомості про піднесення та падіння впливових родин, еволюцію управління та розвиток [ROOT.GetCountry.GetAdjectiveWithNoTooltip] суспільства. За словами багатьох наших найвпливовіших радників, #italic Історія флорентійського народу#! має продемонструвати глибоке розуміння Бруні класичних та гуманістичних ідей, а також його відданість збереженню історичних знань для майбутніх поколінь."
  flavor_flo.40.a: "Збереження нашої історії має першочергове значення!"
  flavor_flo.40.b: "Це робота, яку ми не можемо собі дозволити..."
  flavor_flo.42.title: "Societas Aluminum"
  flavor_flo.42.desc: "Квасці – це матеріал, що використовується в багатьох галузях промисловості, що робить їх життєво важливим товаром. Вони мають вирішальне значення у виробництві тканини з вовни для очищення її від жиру, у процесі фарбування для закріплення барвників, а також у багатьох інших галузях, таких як склоробство та дублення. Їх високий попит та відносна рідкість роблять їх дуже затребуваним товаром, що призводить до високих цін та вигод від їх торгівлі. Еліти [ROOT.GetCountry.GetName] завжди шукали альтернативні доступні джерела квасців для експлуатації та отримання вигоди. Одна така можливість виникла нещодавно, з відкриттям невикористаного родовища квасців на [target_country.GetAdjective] землях [target_location.GetName]. Якщо ми зможемо домовитися про придбання ексклюзивних прав на видобуток на цьому місці та створити організацію для нагляду за його видобутком, ми зможемо посилити наш контроль над торгівлею квасцями, а отже, і наші вигоди від неї."
  flavor_flo.42.a: "Купити права на видобуток."
  flavor_flo.42.b: "Наші гроші краще витратити деінде."
  flavor_flo.43.title: "[target_location.GetNameWithNoTooltip] Квасцевий рудник"
  flavor_flo.43.desc: "З нещодавнім відкриттям квасцевого рудника у [ShowLocationName('viterbo')] та нашим придбанням прав на його експлуатацію, ми, безсумнівно, посилили наш контроль над торгівлею квасцями. Водночас, сусідній рудник у [target_location.GetName] став дещо надлишковим і потенційно збитковим у майбутньому. Щоб він продовжував працювати, нам потрібно було б виділити частину бюджету на нього, без впевненості у будь-якій віддачі від інвестицій. З іншого боку, якщо ми вирішимо його закрити, ми скоротимо будь-які потенційні втрати, але ми впевнені, що це викличе невдоволення серед людей, які будуть змушені шукати інші методи працевлаштування."
  flavor_flo.43.a: "Залишити рудник, зосередитися на кар'єрах."
  flavor_flo.43.b: "Збільшити видобуток."
  flavor_flo.44.title: "Нова система реєстрації міського планування"
  flavor_flo.44.desc: "Протягом [GetCurrentYear] рада [ROOT.GetCountry.GetName] активно висловлювалася щодо впровадження нової системи реєстрації міського планування в [target_location.GetName] та прилеглих поселеннях, яка має на меті регулювати та організовувати міський розвиток. Розроблена нашими найкращими радниками та архітекторами, вона передбачає документування та реєстрацію власності, вулиць та будівель для встановлення кращого контролю над розширенням міста. Система також включає правила зонування та рекомендації щодо будівництва, забезпечуючи більш упорядкований та плановий ріст міста. Як жест у бік більш консолідованої централізації та урбанізації, ця система відображатиме зусилля міста з управління своїм ростом та підтримки його архітектурних та естетичних стандартів."
  flavor_flo.44.a: "Фінансувати планувальні роботи!"
  flavor_flo.44.b: "Ми не можемо собі цього дозволити..."
  flavor_flo.45.title: "[target_artist.GetNameWithNoTooltip] просить нашого спонсорства"
  flavor_flo.45.desc: "[target_artist.GetName], відомий художник, просить спонсорства в [target_location.GetName] для написання #italic $mona_lisa$#!. Очікується, що вона стане символом художнього генія [target_artist.GetLastNameWithNoTooltip], і він шукає фінансової підтримки, щоб повністю присвятити себе цьому майбутньому шедевру. Репутація [target_artist.GetShortNameWithNoTooltip] як вправного художника та його інноваційний підхід роблять його ідеальним кандидатом для меценатства, оскільки ми також можемо отримати вигоду від того, що будемо його покровителями. Цей запит підкреслює значення спонсорства у наданні художникам можливості створювати довговічні твори мистецтва, а якість його робіт, безсумнівно, підвищить наш престиж в очах світу вдома та за кордоном."
  flavor_flo.45.a: "Він отримає це!"
  flavor_flo.45.b: "Ми не можемо дозволити собі замовлення..."
  flavor_flo.46.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_flo.46.desc: "[target_artist.GetName] є одним з найважливіших письменників сучасності, а також служить дипломатом для [ROOT.GetCountry.GetLongName]. [target_artist.GetSheHe|U] здебільшого пам'ятають як засновника сучасної політичної науки, але також писав комедії та поезію."
  flavor_flo.46.a: "Можливо, [target_artist.GetSheHe] напише для нас книгу"
  flavor_flo.4601.title: "[target_artist.GetNameWithNoTooltip] публікує шедевр!"
  flavor_flo.4601.desc: "Великий син [ROOT.GetCountry.GetName] опублікував книгу під назвою [target_art.GetName]. $the_prince_desc$"
  flavor_flo.4601.a: "Це говорить нам усе"
  flavor_flo.4602.title: "Похвала від [target_artist.GetNameWithNoTooltip]"
  flavor_flo.4602.desc: "Наш великий [ROOT.GetCountry.GetFlavorRank] кілька разів згадується в книзі [target_artist.GetName] [target_art.GetName] і загалом хвалиться за нашу здатність утримувати країну, а також як попередження не покладатися на наймані війська."
  flavor_flo.4602.a: "Ми робимо щось правильно"
  flavor_flo.47.title: "Золотий вік [target_character.GetNameWithNoTooltip]"
  flavor_flo.47.desc: "Багато особистостей протягом століть залишили свій слід, будь то правителі чи полководці. [target_character.GetName] показав великий потенціал бути видатним правителем, оскільки [target_character.GetSheHe] продовжує здобувати популярність у [target_location.GetName]. [target_character.GetSheHe|U] став відомим покровителем мистецтв та видатною фігурою в політичному ландшафті міста. Як член могутньої родини [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], [target_character.GetNameWithNoTooltip] був вихований у привілеях та отримав виняткову освіту.\n\nЗанурений у інтелектуальні та мистецькі кола [ROOT.GetCountry.GetNameWithNoTooltip], [target_character.GetSheHe] розвинув глибоке розуміння літератури, філософії та образотворчого мистецтва. Виховання та освіта [target_character.GetHerHis|U] безсумнівно закладуть основу для [target_character.GetHerHis] майбутніх досягнень як великого покровителя та впливової фігури в ренесансній [ROOT.GetCountry.GetNameWithNoTooltip], започаткувавши золоту еру для нашої культури та мистецтв."
  flavor_flo.47.a: "Зосередимося на досягненні успіху в адміністративних питаннях."
  flavor_flo.47.b: "Ми повинні покращити наші дипломатичні та культурні зусилля!"
  flavor_flo.47.c: "Потужна армія повинна бути пріоритетом."
  flavor_flo.47.d: "Збалансований підхід найкращий."
  flavor_flo.48.title: "Славетна академія [target_location.GetNameWithNoTooltip]"
  flavor_flo.48.desc: "#italic Accademia delle Arti del Disegno#! є однією з наших найважливіших культурних та мистецьких установ, заснованих у [target_location.GetName], що слугує місцем збору для художників, архітекторів та ремісників. Її основна мета — просувати та підтримувати мистецтво, наголошуючи на малюванні як фундаментальній навичці, і вона відіграє життєво важливу роль у сприянні мистецькій досконалості, надаючи платформу для мистецького обміну та співпраці. Її вплив поширюється за межі [target_location.GetNameWithNoTooltip], формуючи мистецькі практики та плекаючи таланти відомих художників по всій нашій країні."
  flavor_flo.48.a: "Академія повинна зосередитися на відточуванні та просуванні наших культурних амбіцій!"
  flavor_flo.48.b: "Накажіть майстрам просувати наукову думку."
  flavor_flo.48.c: "Нехай академія слугує форумом думки для всіх!"
  flavor_flo.49.title: "Консолідація влади"
  flavor_flo.49.desc: "Вже досить давно наш двір процвітає під майстерним керівництвом [target_character.GetName]. Ніщо інше, як майстер-клас з адміністрування, дипломатії та військових справ, привело нас до періоду процвітання та стабільності.\n\nОднак, одна перешкода все ще стоїть між нашим сходженням до зеніту королівської влади та нашою поточною ситуацією. Дрібні лорди, члени сенату, шляхта та заможні купці висувають безперервні вимоги до авторитету [target_character.GetNameWithNoTooltip], і, можливо, настав час вирішити цю болючу проблему..."
  flavor_flo.49.a: "Час для реформ настав."
  flavor_flo.49.b: "Цей крок може виявитися занадто ризикованим..."
  flavor_flo.50.title: "Управління Ночі"
  flavor_flo.50.desc: "Спочатку подане для початку активної служби в [GetCurrentYear], Управління Ночі має на меті наглядати за безперебійною роботою нічних закладів, таких як таверни, гральні заклади та інші подібні морально сумнівні установи. Кілька членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] підтримують ідею, що регулювання нічного життя в межах наших кордонів є життєво важливим аспектом уряду та чудовим проявом благочестя, тоді як багато хто в наших мистецьких колах протестує проти регулювання їхнього нічного способу життя, виправдовуючи це тим, що це суперечитиме нашим основним переконанням як любителів мистецтва, розваг, гордині та культурних інновацій."
  flavor_flo.50.a: "Дозволити управлінню працювати."
  flavor_flo.50.b: "Нами не керуватиме стадо старих чоловіків у рясах."
  flavor_flo.51.title: "Високий дар"
  flavor_flo.51.desc: "Багатий [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetRulerTitle] завжди шукає можливості розширити [country_ruler.GetHerHis] звіринець. [country_ruler.GetName] мав би тоді радіти, коли посланець від [country_ruler.GetHerHis] посла в [egyptian_tag.GetName] повідомив [country_ruler.GetHerHim] про чудову жирафу, що перебуває в їхньому володінні. Той самий посол вже домовився про передачу звіра до [ROOT.GetCountry.GetNameWithNoTooltip] як вияв вдячності за комерційну співпрацю між двома націями."
  flavor_flo.51.a: "Ми приймемо цей дар."
  flavor_flo.51.b: "Ми не прийматимемо дари від язичників!"
  STATIC_MODIFIER_NAME_flo_medici_giraffe_renown: "Відомий дар"
  flo_medici_giraffe_opinion: "Дар жирафи"
  flo_not_accepting_gifts_from_heathens: "Відмовляється від дарів язичників"
  flavor_flo.52.title: "Жирафа помирає"
  flavor_flo.52.desc: "Жирафа з [egyptian_tag.GetName] змогла витримати підступну подорож з [ShowRegionName('egypt_region')] до [ShowRegionName('italy_region')]. Коли вона прибула, це викликало велике хвилювання серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які ніколи не бачили такого звіра. Після її представлення у звіринці, вона слугувала чудовим показником багатства, яким володіє [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nОднак, ці дні добігли кінця, оскільки ми отримали жахливу звістку про трагічний кінець звіра. Керівники звіринця стверджують, що жирафа застрягла шиєю в сараї, де її тримали, і після паніки зламала собі шию, що призвело до її передчасної смерті."
  flavor_flo.52.a: "Тепер ніхто більше не говоритиме про [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_flo.53.title: "Банківська криза"
  flavor_flo.53.desc: "Кредитна політика [GetCountry('PRZ').GetAdjective] та [GetCountry('BRD').GetAdjective] банків у [ShowAreaName('tuscany_area')] призвела до економічної кризи в наших руках. Банки позичили величезні суми золота особам, яким явно не варто було довіряти. Коли ці особи згодом не виконали своїх зобов'язань за кредитами, обидва підприємства зіткнулися з втратою своїх активів та втратою довіри серед своїх клієнтів, які тепер не можуть отримати доступ до своїх збережених коштів."
  flavor_flo.53.historical_info: "Тосканська банківська криза 1340-х років проявилася у банкрутстві трьох могутніх флорентійських банків: родин Барді, Перуцці та Аччаюолі. Економічна криза була спричинена багатьма факторами, найважливішими з яких були проблеми, в яких опинилася Флорентійська республіка після війни проти Делла Скала у 1337/1338 роках та пізнішої кампанії проти Пізанської республіки. Ще одним значним фактором, що сприяв кризі, було надмірне кредитування короля Англії Едуарда III, який не зміг погасити позики."
  flavor_flo.53.a: "Це кінець банківської справи, як ми її знаємо!"
  flavor_flo.53.b: "Врятувати банки!"
  flavor_flo.53.c: "Їхній крах відповідає нашим планам."
  STATIC_MODIFIER_NAME_flo_economic_downturn: "Хвилі економічного спаду"
  flavor_flo.54.title: "Наші кредитори в кризі"
  flavor_flo.54.desc: "Недавня банківська криза в [ShowAreaName('tuscany_area')] призвела до краху одного з банків, що позичали нам своє золото. У цьому фінансовому хаосі ми вважаємо, що можемо уникнути повернення позик тому, що залишилося від банку. Однак така дія, безумовно, негативно вплине на нашу репутацію."
  flavor_flo.54.historical_info: "$flavor_flo.53.historical_info$"
  flavor_flo.54.a: "Скористатися цим хаосом!"
  flavor_flo.54.b: "Позики є позики."
  STATIC_MODIFIER_NAME_flo_lack_of_financial_credibility: "Брак фінансової довіри"
  flavor_flo.55.title: "Зміна власника"
  flavor_flo.55.desc: "Недавня банківська криза в [ShowAreaName('tuscany_area')] призвела до великого хаосу у світі міжнародних фінансів. На щастя, швидкі та рішучі дії [target_country.GetAdjective] істеблішменту змогли врятувати банки від повного краху. Однак, як частина угоди між двома сторонами, позики, які ми заборгували банкам, тепер належать [target_country.GetLongNameWithNoTooltip]."
  flavor_flo.55.historical_info: "$flavor_flo.53.historical_info$"
  flavor_flo.55.a: "Зрозуміло."
  flavor_flo.56.title: "Наші кредитори повністю збанкрутували"
  flavor_flo.56.desc: "Недавня банківська криза в [ShowAreaName('tuscany_area')] призвела до повного банкрутства банків, що позичали нам свої активи. У хаосі банківські книги були втрачені, і тому, схоже, ці підприємства не вимагатимуть від нас повернення коштів."
  flavor_flo.56.historical_info: "$flavor_flo.53.historical_info$"
  flavor_flo.56.a: "Ха-ха! Нам слід позичати частіше!"
  flavor_flo.57.title: "Банк [medici_dynasty.GetNameWithNoTooltip]"
  flavor_flo.57.desc: "Офіційне заснування міжнародного банку [medici_dynasty.GetName] нас не дивує. Протягом десятиліть члени родини [medici_dynasty.GetNameWithNoTooltip] брали участь у банківській справі в меншому масштабі. Їхня наполеглива праця, відмінне управління та чудові зв'язки надали їм можливість засяяти серед зірок. Оскільки їхні конкуренти зазнали фінансового краху десятиліття тому, новий банк може заповнити порожнечу, що залишилася після кризи."
  flavor_flo.57.historical_info: "Банк Медічі, заснований у 1397 році, був одним із найвпливовіших міжнародних банків, а родина, що володіла ним, була однією з найбагатших. Один із власників підприємства, Козімо де Медічі, зумів здобути достатній політичний вплив, щоб утвердити себе та свою родину як правителів Флорентійської республіки, а пізніше й Тосканського герцогства на наступні кілька століть."
  flavor_flo.57.a: "Зрозуміло."
  flavor_flo.57.b: "Життя банкіра для мене!"
  flavor_flo.58.title: "$flavor_flo.57.title$"
  flavor_flo.58.desc: "$flavor_flo.57.desc$"
  flavor_flo.58.historical_info: "$flavor_flo.57.historical_info$"
  flavor_flo.58.a: "Час здобути трохи золота."
  flavor_flo.59.title: "Засновано нову філію"
  flavor_flo.59.desc: "Ми співпрацюємо з колегою-банкіром у [target_location.GetName], щоб заснувати нову філію нашого знаменитого [ROOT.GetCountry.GetName]. Сподіваємося, що це партнерство принесе великі багатства."
  flavor_flo.59.a: "Ми цінуватимемо це протягом багатьох років!"
  flo_good_business: "Гарний бізнес"
  flavor_flo.60.title: "Запрошення [target_character.GetNameWithNoTooltip]"
  flavor_flo.60.desc: "Недавні економічні проблеми в [ROOT.GetCountry.GetName] вже досить давно турбують громадян. У пошуках видатної особистості, яка б взяла на себе керівництво та врятувала нас від хаосу, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вдалося знайти чудового кандидата в особі [target_character.GetName]. Хоча запрошення [target_character.GetShortName] мало бути тимчасовим, [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] більш ніж щасливі, що [target_character.GetHerHim] правитиме довічно."
  flavor_flo.60.a: "Підтримати цю ідею."
  flavor_flo.60.b: "Вони нічого не знають."
  STATIC_MODIFIER_NAME_flo_harsh_economic_policies: "Жорстка економічна політика"
  flavor_flo.61.title: "Деспотичне правління [target_character.GetNameWithNoTooltip]"
  flavor_flo.61.desc: "Правління [target_character.GetName] виявилося автократичним, але ефективним. Ніхто не може заперечити успіх [target_character.GetHerHis] економічної політики, але слід визнати, що її впровадження позбавило багатьох свобод і привілеїв [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], чого не можна допустити в [ROOT.GetCountry.GetFlavorRank]. Таким чином, громадяни [capital_location.GetName] розпочали змову, щоб позбутися [target_character.GetHerHim]."
  flavor_flo.61.a: "Лінчувати [target_character.GetHerHim]! Вигнати [target_character.GetHerHim]! Просто вигнати [target_character.GetHerHim] звідси!"
  flavor_flo.61.b: "Ми повинні зупинити цю змову!"
  flavor_flo.62.title: "Впливовий банкір"
  flavor_flo.62.desc: "Лідер [target_country.GetName], наш поважний громадянин [target_character.GetName], представив [target_character.GetHerselfHimself] як здібного менеджера та вправного політика, чиї глибокі кишені та зв'язки принесли [target_character.GetHerHim] багато союзників у [ROOT.GetCountry.GetFlavorRank]. Якщо нічого не зробити з [target_character.GetHerHim], [target_character.GetSheHe] неодмінно буде обраний [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_flo.62.historical_info: "Козімо де Медічі був найвпливовішим політиком у флорентійській політиці середини XV століття. Вирішальним для його впливу був його банк Медічі, заснований його батьком, Джованні ді Біччі де Медічі, у 1397 році. Завдяки багатству Козімо та хитрим шлюбам родини Медічі, банкір зміг стати володарем Флоренції та заснувати Медічі як синьйорів Флоренції на десятиліття вперед."
  flavor_flo.62.a: "Ми вітаємо [target_character.GetNameWithNoTooltip] з розкритими обіймами."
  flavor_flo.62.b: "Багата кишеня не є основою для системи правління."
  flavor_flo.63.title: "[target_character.GetNameWithNoTooltip]"
  flavor_flo.63.desc: "[target_character.GetName] — вправний солдат удачі з [ShowRegionName('great_britain_region')]. Набувши великого досвіду під час боротьби за [target_character.GetHerHis] сюзерена, [target_character.GetSheHe] тепер шукає роботу серед багатих республік [ShowRegionName('italy_region')]. Цей #italic кондотьєр#! тепер пропонує нам [target_character.GetHerHis] послуги."
  flavor_flo.63.a: "Найняти [target_character.GetHerHim]."
  flavor_flo.63.b: "Наші кишені недостатньо глибокі."
  flavor_vlt.1.title: "Нова Синьйорія"
  flavor_vlt.1.desc_expel: "Громадяни, незадоволені правлінням [expelled_ruler.GetName] та [expelled_ruler.GetHerHis] родини, вирішили, що родину [expelled_ruler.GetLastName] необхідно вигнати. Згодом вони вирішили, що [belforti_candidate.GetName] та [belforti_candidate.GetHerHis] родина з [belforti_candidate.GetDynasty.GetName] повинні правити державою за іншою системою, [ShowGovernmentReformName('dynastic_signoria_reform')]."
  flavor_vlt.1.desc_signoria: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] нещодавно вигнали родину, яка завдала їм багато занепокоєння та клопотів. На їхнє місце вони отримали нових людей, які мають правити державою за іншою системою, [ShowGovernmentReformName('dynastic_signoria_reform')]."
  flavor_vlt.1.historical_info: "У 1340 році громадяни Вольтерри вигнали родину Аллегретті, і влада над містом перейшла до Бельфорті, які правили містом як синьйори. Спочатку ним правив Оттавіано Бельфорті, якого пізніше змінив його син Боккіно, який намагався продати місто пізанцям, що спричинило народне повстання та втручання Флорентійської республіки, яка завоювала місто. Під владою флорентійців місто отримало значну автономію до 1427 року, коли воно було підпорядковане законам своїх сюзеренів."
  flavor_vlt.1.a: "Геть!"
  flavor_vlt.1.b: "Скасувати це!"
  flavor_vlt.2.title: "Зрадник"
  flavor_vlt.2.desc: "Щойно стало відомо, що [target_character.GetName] намагався продати [target_country.GetFlavorRank] сусідній державі. Реакція громадян була, м'яко кажучи, неоднозначною. Настільки неоднозначною, що [target_country.GetGovernment.GetRulerTitle] був захоплений розлюченим натовпом, який планує лінчувати [target_character.GetHerHim]."
  flavor_vlt.2.historical_info: "$flavor_vlt.1.historical_info$"
  flavor_vlt.2.a: "Повісити [target_character.GetHerHim]!"
  flavor_vlt.2.b: "Заворушення навчать [target_character.GetHerHim] уроку."
  flavor_vlt.3.title: "Хаос у [target_country.GetNameWithNoTooltip]"
  flavor_vlt.3.desc_consul_dead: "Громадяни [target_country.GetName] повстали проти свого [target_country.GetGovernment.GetRulerTitle] після того, як [target_character.GetSheHe] спробував продати країну іноземній державі. Наразі [target_character.GetName] мертвий, а держава фактично беззаконна."
  flavor_vlt.3.desc: "Громадяни [target_country.GetName] повстали проти свого [target_country.GetGovernment.GetRulerTitle] після того, як [target_character.GetSheHe] спробував продати країну нам! На щастя, [target_character.GetName] пережив скрутне становище, і захист [target_character.GetHerHis] є достатньою причиною для вторгнення в країну."
  flavor_vlt.3.a: "Рушаймо."
  FLO_this_will_cease_existing: "[THIS.GetCountry.GetName] припинить своє існування."
  FLO_medici_will_be_stronger: "Коли банк [GetDynasty('medici_dynasty').GetName] почне існувати, він отримає до #g 1000#! [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] додаткових коштів."
  FLO_every_borrower_from_the_banks: "Кожна [Concept('nation', 'CONCEPT_PLACEHOLDER')|e], яка позичила гроші в одному з банків, що руйнуються, отримає наступну [Concept('event', 'CONCEPT_PLACEHOLDER')|e]:"
  FLO_events_will_fire_to_give_more_banks: "Кожні 2-4 роки ми отримуватимемо [Concept('event', 'CONCEPT_PLACEHOLDER')|e] для створення нового [ShowBuildingTypeName('banking_office')] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  FLO_end_of_events: "Більше не буде [Concept('event', 'CONCEPT_PLACEHOLDER')|e], що додає [ShowBuildingTypeName('banking_office')] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  FLO_giraffe_death_information: "Жираф не житиме вічно. Ми оцінюємо, що він може прожити від 90 до 180 днів."