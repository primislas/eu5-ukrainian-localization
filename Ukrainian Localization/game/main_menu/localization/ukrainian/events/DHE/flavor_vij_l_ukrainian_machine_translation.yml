l_english:
  flavor_vij.1.title: "Адміністрація Держави"
  flavor_vij.1.desc: "Під вмілим правлінням [ROOT.GetCountry.GetGovernment.GetRuler.GetName] ми розширилися в південну частину $india$ і тепер керуємо [ShowCultureName('telugu')] та [ShowCultureName('tamil')] народами та їхніми унікальними мовами. Щоб забезпечити стабільність нашого [ROOT.GetCountry.GetFlavorRank], ми повинні інтегрувати цих людей далі в нього, замість того, щоб ставитися до них як до віддалених підданих. Першим кроком у цьому напрямку може бути надання їм права звертатися до суду їхньою мовою, незалежно від нашого [ShowCultureName('kannadiga')] двору."
  flavor_vij.1.a: "Надати їм права."
  unlock_vij_language_rights.tt: "Розблоковує Закон [ShowLawName('language_of_pleading')] незалежно від нашої [Concept('court_language', 'CONCEPT_PLACEHOLDER')|e] та Політику [ShowPolicyName('multi_lingual_court')] для нашої країни"
  flavor_vij.1.b: "Нічого їм не давати!"
  flavor_vij.2.title: "Канака Даса"
  flavor_vij.2.desc: "Рух Харідаса південної $india$ вже обдарував нас подарунками у вигляді музичних творів та філософських трактатів. Тепер ім'я людини поширюється по землі, що може вплинути на нашу культуру на століття вперед. Ми повинні спонсорувати та підтримувати цю людину, щоб вона могла реалізувати свій потенціал."
  flavor_vij.2.historical_info: "Поета, філософа, музиканта та композитора Канаку Дасу називали Тіммаппа Наяка, доки він, ще хлопчиком, не знайшов скарбницю золота і став відомим як Канака Наяка — Канака означає золото в каннада — хоча він ніколи не використовував золото для себе. Його повне ім'я, Канака Даса, дав йому вчений В'ясараджа, учнем якого був Канака Даса. Народившись у спільноті воїнів, Канака Даса відмовився від своєї професії воїна, коли отримав серйозне поранення на війні і був дивом врятований. Він присвятив своє життя створенню музики та літератури з філософією, поясненою мовою простої людини. Його основні твори включають #italic Nalacharitre#!, #italic Haribhaktisara#!, #italic Nrisimhastava#!, #italic Ramadhanyacharitre#! та #italic Mohanatarangini#!."
  flavor_vij.2.a: "Його музика житиме вічно!"
  flavor_vij.2.b: "Його філософія триватиме!"
  flavor_vij.3.title: "Додда Ганешана Гуді"
  flavor_vij.3.desc: "[target_character.GetName], місцевий правитель у [ROOT.GetCountry.GetName], представляє нам плани будівництва храму для поклоніння Нанді, священному бику та близькому відданому й супутнику [ShowGodName('shiva_god')], в [ROOT.GetCountry.GetCulture.GetName] архітектурному стилі. Хоча храм складатиметься лише зі святилища, перед яким буде ґанок та великий гранітний моноліт Нанді, розміщений на плінті у храмовому святилищі, це буде одна з найбільших мурті, що коли-небудь існували. Скромний Кемпе Говда також попросив невелику пожертву, щоб допомогти фінансувати це будівництво."
  flavor_vij.3.a: "Спонсорувати храм"
  flavor_vij.3.b: "У нас немає коштів на це"
  flavor_vij.4.title: "Храм Вірабхадра"
  flavor_vij.4.desc: "Храм Вірабхадра стане чудовим прикладом [ROOT.GetCountry.GetAdjective] архітектурного стилю та мистецтва. Вішвакарма Брахмана стапатхі вже погодилися виліпити храм, присвячений божеству Вірабхадра. Всередині святилища буде вишукано, з безліччю чудових скульптур у складних мандапамах. Один мандапам матиме колони з повнорозмірними зображеннями танцюристів, музикантів та інших скульптур, створених майстрами нашої імперії. Величезний гранітний бик Нанді, обіцяний Вішвакарма Брахмана стапатхі, буде вирізаний з одного каменю, а стелі матимуть захоплююче красиві фрески. Хоча ці плани вже розроблені та готові до виконання, вони вимагатимуть значних коштів."
  flavor_vij.4.a: "Побудувати храм"
  flavor_vij.4.b: "У нас немає коштів на це"
  flavor_vij.5.title: "Форт Веллор"
  flavor_vij.5.desc: "Околиці [ShowLocationName('vellore')] підходять для великого фортифікаційного комплексу, що слугуватиме притулком для нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. За умови належних інвестицій, [ShowLocationNameWithNoTooltip('vellore')] можна було б прикрасити та перетворити на велику столицю для нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_vij.5.historical_info: "У 1566 році форт Веллор був побудований Чинною Боммі Наяком та Тіммою Редді Наяком, вождями імперії Віджаянагара. Його величні вали, широкий рів та міцна кам'яна кладка зробили його відомим, а побудований він був з граніту з сусідніх кар'єрів в округах Аркот та Читтор. Всередині форту знаходиться храм, присвячений Джалагандісвару, який відомий своїми скульптурами."
  flavor_vij.5.a: "Побудувати форт і зробити його нашою столицею!"
  flavor_vij.5.b: "Форт у цьому районі добре нам послужить."
  flavor_vij.5.c: "Ігнорувати це!"
  flavor_vij.6.title: "Володар Каннадської імперії"
  flavor_vij.6.desc: "З усіма зусиллями нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] попередників ми нарешті досягли домінуючого становища над усіма іншими державами південної $india$. Завдяки нашим успіхам як у військовій справі, так і в економічній стабільності, ми тепер можемо проголосити себе Імператорами [ROOT.GetCountry.GetCulture.GetName] народу та забезпечити наше лідерство над народами південної $india$."
  flavor_vij.6.historical_info: "Великий імператор Віджаянаґари Крішна Дева Рая заслужив титули Андхра Бходжа, Моору Раяра Ґанда – «Король трьох королів» – та Каннада Радж’я Рама Рамана – «Володар імперії Каннада». Перемігши султанів Біджапуру, Голконди та раджу Одіші, Крішна Дева Рая став наймогутнішим правителем південного півострова Індії. Король був не лише здібним адміністратором, а й чудовим полководцем, який вів у бій з передової та навіть доглядав за пораненими. Разом зі своїм прем'єр-міністром Тіммарусу король добре керував Королівством, підтримував мир у країні та збільшував добробут народу."
  flavor_vij.6.a: "Боги посміхаються нам!"
  flavor_vij.7.title: "Молла"
  flavor_vij.7.desc: "Поетеса [vij_atukuri_molla.GetName] народилася в родині гончарів у Кадапі та бажає перекласти [ShowLanguageName('sanskrit_language')] $ramayana$ на [ShowLanguageName('telugu_language')]. Вона називає Господа [ShowGodName('shiva_god')] своїм Гуру та черпає натхнення від поета Потани, який написав Бхагавата Пурану на [ShowLanguageNameWithNoTooltip('telugu_language')]. Вона просить нашого спонсорства, але відмовляється присвячувати свої твори будь-якому королю, згідно із загальною практикою для поетів. Чи повинні ми спонсорувати її, незважаючи на її переконання не присвячувати свою роботу нашому наймилостивішому [ROOT.GetCountry.GetGovernment.GetRulerTitle]?"
  flavor_vij.7.historical_info: "Імператор Віджаянаґари, Крішнадеварая, запросив Атукурі Моллу до свого королівського двору, де вона декламувала $ramayana$ перед ним та його поетами. Молла переважно використовувала просту телугу і дуже рідко вживала санскритські слова, а її твір, відомий як Молла $ramayana$, написаний телугу. Вступний вірш у Молла $ramayana$ говорить: «$ramayana$ була написана багато разів. Чи хтось перестає їсти, тому що їв щодня? Так само і історія Рами, і її можна писати, читати та любити стільки разів, скільки можливо»."
  flavor_vij.7.a: "Підтримати поетесу"
  flavor_vij.7.b: "Ігнорувати її"
  flavor_vij.8.title: "Таллапака Тірумаламма"
  flavor_vij.8.desc: "Вважається однією з перших [ShowCultureName('telugu')] поетес, [vij_tallapaka_tirumalamma.GetName] народилася в родині [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] і почала писати рідною мовою [ShowLanguageName('telugu_language')]. Нещодавно вона опублікувала «Субхадра Кальянам», твір, що містить 1170 віршів про шлюб Арджуни та Субхадри. З її вже встановленою майстерністю, було б корисно для нас підтримати її далі."
  flavor_vij.8.a: "Підтримати її роботу."
  flavor_vij.8.b: "Ігнорувати її"
  flavor_vij.9.title: "Аштадіґґаджаси"
  flavor_vij.9.desc: "Під час правління нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ShowCultureName('telugu')] культура пережила золотий вік, кульмінацією якого стали твори восьми [ShowCultureNameWithNoTooltip('telugu')] поетів, названих Аштадіґґаджасами. Ми повинні використати цей поточний стан і впровадити систему для збереження нашої унікальної культури для майбутніх поколінь."
  flavor_vij.9.historical_info: "Імператор Шрі Крішна Дева Рая правив імперією Віджаянаґара з 1509 року до своєї смерті у 1529 році, протягом якого він був покровителем восьми поетів телугу, названих Аштадіґґаджасами. Вісім поетів: Алласані Педдана, Нанді Тхіммана, Мадайяґарі Маллана, Дхурджаті, Айялараджу Рамамбхадруду, Пінґалі Сурана, Рамараджабхушануду та Теналі Рамакрішнуду вважалися вісьмома стовпами його літературної асамблеї. Епоха Прабандхи, як називають епоху Аштадіґґаджаси, тривала з 1540 по 1600 рік, протягом якої двір поетів також називався Бхувана Віджаям або Завоювання Світу."
  flavor_vij.9.a: "Нехай розпочнеться епоха Прабандхи!"
  flavor_vij.9.b: "Вони нам не потрібні"
  STATIC_MODIFIER_NAME_vij_astadiggajas_modifier: "Епоха Прабандхи"
  STATIC_MODIFIER_DESC_vij_astadiggajas_modifier: "Покровительство поетам нашої країни підносить нашу культуру на нові висоти."
  flavor_vij.10.title: "В'ясатіртха"
  flavor_vij.10.desc: "Вчений [vij_vyasatirtha.GetName] вже визнаний одним із трьох духовних світил, або мунітраям, Двайта-Веданти. Навіть його опоненти захоплюються його чітким розумінням та викладом їхніх шкіл думки. Ми повинні використати його досвід і найняти його до нашого двору, перш ніж це зроблять інші."
  flavor_vij.10.historical_info: "Майстер дебатів та діалогів у логіці та філософії, В'ясатіртха мав великий вплив на імперію Віджаянаґара за правління Шрі Крішнадевараї. Король мав найбільшу повагу до В'ясатіртхи, вважаючи його не менше ніж своїм куладевата та Гуру. Серед відомих праць В'ясатіртхи: Ньяямрута – Нектар Логіки, Таркатандава – Танець Логіки, Татпар'я Чандріка – Місячні Промені Коментарів, Маявада Кхандана Мандараманжарі, Упадхі Кхандана Мандараманжарі, Прапанча Мітх'ятванумана Кхандана Мандараманжарі, Таттвавівека Мандараманжарі, Бхедоджджівана та Саттаркавіласа."
  flavor_vij.10.a: "Нехай його мудрість веде нас!"
  flavor_vij.11.title: "Тамільські торгові гільдії"
  flavor_vij.11.desc: "Хоча витоки нашого [ROOT.GetCountry.GetFlavorRank] лежать у сухих верхніх землях [ShowAreaName('karnakassala_area')], наші нещодавні розширення привели багаті торгові міста [ShowAreaName('tamil_land_area')] під наш контроль. Зі зростанням нашої влади в цьому районі ми вступили в конфлікт з місцевими [ShowCultureName('tamil')] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]. Тепер вони звернулися до нас з проханням закріпити їхні торгові привілеї. Хоча це забезпечило б нам їхню співпрацю в майбутньому, нам довелося б поступитися нашим важко здобутим контролем у [ShowAreaNameWithNoTooltip('tamil_land_area')]."
  flavor_vij.11.a: "Надаймо їм те, що вони просили."
  flavor_vij.11.b: "Нам не потрібна їхня співпраця."
  flavor_vij.12.title: "Купці в [ShowLocationNameWithNoTooltip('pazhaverkadu')] процвітають"
  flavor_vij.12.desc: "Після нашого завоювання провінції [ShowProvinceDefinitionName('kosta')] наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вклали багато грошей у розвиток порту [ShowLocationName('pazhaverkadu')] у головний пункт призначення для кораблів з усіх азійських морів."
  flavor_vij.12.historical_info: "Північне узбережжя Короманделу, і місто Пажаверкаду зокрема, було життєво важливим для імперії Віджаянагара. Саме через цю прибережну смугу всі товари Сходу досягали імперської столиці. Після спустошення, спричиненого війнами проти Королівства Орісса, територія навколо Пажаверкаду вступила в економічну золоту добу."
  flavor_vij.12.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_vij.13.title: "Храм Венкатешвари"
  flavor_vij.13.desc: "У серці нашого [ROOT.GetCountry.GetFlavorRank], у поселеннях [ShowLocationName('penukonda')], лежить Храм, присвячений Венкатешварі, одній з форм нашого найшанованішого Бога [ShowGodName('vishnu_god')]. Протягом століть до нас правителі цієї землі робили щедрі пожертви храмовому комплексу, щоб показати свою щедрість у поклонінні [ShowGodNameWithNoTooltip('vishnu_god')]. Оскільки ми завоювали цю територію не так давно, ми повинні вирішити, як підходити до пожертв храму під час нашого правління."
  flavor_vij.13.a: "Зробити велику пожертву."
  flavor_vij.13.b: "Зберігаймо наші внески скромнішими."
  flavor_vij.14.title: "Пророцтво [target_character.GetNameWithNoTooltip]"
  flavor_vij.14.desc: "Відтоді, як [target_character.GetName] та його брат втекли з [ShowLocationName('delhi')] після поразки Короля [ShowLocationName('warangal')], вони поспішили на плато [ShowRegionName('deccan_region')], де заснували [ROOT.GetCountry.GetLongName]. Тепер, з великим [target_character.GetNameWithNoTooltip] як нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle], ми можемо забезпечити, що наш контроль у Південній $india$ пошириться за межі [ShowLocationName('vijayanagar')], Міста Перемоги."
  flavor_vij.14.a: "Нехай [ROOT.GetCountry.GetNameWithNoTooltip] повстане!"
  flavor_vij.14.historical_info: "Хоча мало що відомо про раннє життя Харіхари I та Букки Раї, існує кілька теорій щодо їхнього походження. Одна припускає, що вони були пастухами, і брахман сказав Букці, що одного дня він стане Імператором усього Бхаратварша. Інша теорія стверджує, що Харіхара і Букка були командирами під керівництвом Какатія, і після нищівної поразки від Мухаммада ібн Туглака їх відправили до Делі, де вони прийняли іслам. Після їхньої втечі, під керівництвом мудреця Від'яраньї, вони заснували імперію Віджаянагара."
  flavor_vij.15.title: "Смерть [target_character2.GetNameWithNoTooltip]"
  flavor_vij.15.desc: "Зі смертю [target_character2.GetName] та сходженням [target_character.GetName] на [ROOT.GetCountry.GetAdjective] престол, [ROOT.GetCountry.GetNameWithNoTooltip] тепер готове вступити в нову епоху процвітання. [target_character.GetSheHe|U] вже розробив плани щодо просування багатьох вчених у [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_vij.15.a: "Нехай [target_character.GetHerHis] правління принесе нам процвітання."
  flavor_vij.16.title: "Місто Знань"
  flavor_vij.16.desc: "З нашим піднесенням в $india$ та необхідністю зміцнити наш [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetName] розробив плани щодо ще більшого розвитку [target_location.GetName]. [target_character.GetSheHe|U] вже має плани підняти [target_location.GetRank.GetName] на нові висоти, вже називаючи його #italic Містом Знань#!, щоб запросити більше вчених."
  flavor_vij.16.a: "Допоможемо цьому зусиллю."
  flavor_vij.16.b: "Це досить дорого..."
  flavor_vij.17.title: "[target_location.GetNameWithNoTooltip], Місто Перемоги"
  flavor_vij.17.desc: "[target_character.GetName] та [target_character.GetHerHis] зусилля зі зміцнення [target_location.GetName] призвели до того, що [target_location.GetRank.GetName] стало центром багатьох різних релігій, а також зберегло свій статус [target_location.GetRank.GetNameWithNoTooltip], де багато [ShowReligionAdjective('hindu')] вчених можуть навчатися. Можливо, ми можемо ще більше сприяти цьому починанню."
  flavor_vij.17.a: "Вся $india$ дізнається про [target_location.GetNameWithNoTooltip]!"
  flavor_vij.17.b: "Ми не повинні розорятися через це."
  flavor_vij.17.historical_info: "Віджаянагар, що перекладається як Місто Перемоги, був найзаселенішим і найпрестижнішим містом Індії того часу. Заснований Харіхарою та Буккою Раєю, він повільно став центральним осередком для кожного індуїстського громадянина на субконтиненті. Це не означає, що це було релігійне місто, оскільки багато пам'яток були багаторелігійними. Протягом 16 століття він був захоплений і розграбований протягом 6 місяців коаліцією мусульманських султанатів."
  flavor_vij.18.title: "Падіння [target_location.GetNameWithNoTooltip]"
  flavor_vij.18.desc: "Коли наші сили штурмували [target_location.GetName] і зайняли його вулиці, багато наших солдатів почали грабувати його величезні багатства. Хоча ми можемо дозволити їм і отримати їхнє багатство для себе, можливо, найкраще було б зберегти [target_location.GetRank.GetName]."
  flavor_vij.18.a: "Візьміть військові трофеї!"
  flavor_vij.18.b: "Збережімо [target_location.GetRank.GetNameWithNoTooltip]."
  flavor_vij.19.title: "$madhura_vijayam$"
  flavor_vij.19.desc: "Зі смертю засновників нашої великої нації, [GetCharacter('vij_harihara_sangama').GetName] та [GetCharacter('vij_bukka_raya_sangama').GetName], про них було написано багато нових оповідей та поем. Однією з таких поем є #italic $madhura_vijayam$#!, що деталізує падіння [ShowLocationName('madurai')]. Можливо, ми можемо спробувати опублікувати ці твори."
  flavor_vij.19.historical_info: "Хоча більшість її змісту було втрачено з часом, Мадхура Віджая деталізує життя Кумари Кампани, сина Букки Раї I, і містить подробиці про падіння Мадурайського султанату. З цієї причини це не лише поема, а й частина історичної інформації. Її було відкрито заново у 1916 році, що дозволило її надрукувати та опублікувати для решти світу."
  flavor_vij.19.a: "Ми можемо дозволити собі таке починання."
  flavor_vij.19.b: "Витрачати гроші на якісь поеми? Це занадто дорого."
  flavor_vij.20.title: "[target_character.GetNameWithNoTooltip]"
  flavor_vij.20.desc: "Через численну кількість поем, написаних різними мовами в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], виник попит на перекладачів. Одним з них є [target_character.GetName], людина скромного походження, але великого таланту. Він прибув, щоб допомогти нам у наших перекладацьких зусиллях."
  flavor_vij.20.a: "Давайте наймемо його."
  flavor_vij.20.b: "Перекладати? Такі люди не потрібні в [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_vij.21.title: "Наукове життя в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_vij.21.desc: "З багатьма творами мистецтва в [ROOT.GetCountry.GetCapital.GetName] та багатьма новими вченими, поетами та перекладачами, що стікаються до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetName] розмірковував про зміну способу роботи [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Замість того, щоб на нього впливав [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], можливо, це має бути окремий орган, демонстрація престижу, а не адміністративний орган."
  flavor_vij.21.a: "Потрібен більш науковий підхід у [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_vij.21.b: "Ми не повинні гнівити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_vij.22.title: "Навчання у [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] воїнів."
  flavor_vij.22.desc: "Хоча ми перебували в постійному конфлікті з [ShowReligionGroupAdjective('muslim')] націями, ми не повинні бути обмеженими щодо їхніх способів боротьби. Їхні вершники більш вправні, ніж наші, завжди створюючи проблеми нашій піхоті. Можливо, ми можемо перейняти деякі з їхніх тактик і інтегрувати їх до [ROOT.GetCountry.GetAdjective] армії."
  flavor_vij.22.a: "Ця інновація принесе нам багато перемог."
  flavor_vij.22.b: "Жодному [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] не буде дозволено служити в армії."
  vijay_riders_may_only_be_recruited_from_muslim_provinces: "[ShowUnitDefinitionName('a_muslim_riders_vijay')] можуть бути набрані лише з [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], де домінує [ShowReligionGroupName('muslim')] віра."
  flavor_vij.23.title: "Допомога [ShowLanguageNameWithNoTooltip('kannada_language')] літературі"
  flavor_vij.23.desc: "Більшість наших літературних творів, і багато наших великих поетів, написали свої твори [ShowLanguageName('kannada_language')] мовою, звідки походить термін #italic [ShowLanguageNameWithNoTooltip('kannada_language')] література#! в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Однак [target_character.GetName] розмірковував про допомогу цій формі літератури, оскільки [target_character.GetSheHe] захоплений усіма великими історіями, які вона містить."
  flavor_vij.23.a: "[ROOT.GetCountry.GetNameWithNoTooltip] матиме всі великі поеми!"
  flavor_vij.23.b: "Це не варте наших зусиль."
  flavor_vij.24.title: "Попит на воду в [target_location.GetNameWithNoTooltip]"
  flavor_vij.24.desc: "Якщо [target_location.GetName] має процвітати, йому потрібне стабільне постачання води. Зараз постійно зростаюче населення [target_location.GetRank.GetName] може підтримуватися лише за умови, що ми зможемо забезпечити його всіма основними потребами. З цих причин [target_character.GetName] розробив плани зі своїм [target_character.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCabinetTitle] щодо зміцнення іригації в [target_location.GetNameWithNoTooltip]."
  flavor_vij.24.a: "Місто Перемоги процвітатиме!"
  flavor_vij.24.b: "Ми не повинні надмірно витрачати нашу скарбницю на такі проєкти."
  flavor_vij.25.title: "Підхід [target_character.GetNameWithNoTooltip]"
  flavor_vij.25.desc: "З початком правління [target_character.GetName] у [ROOT.GetCountry.GetName] настав час, коли [target_character.GetSheHe] обирає підхід до питання синкретизму. З різними культурами в $india$, можливо, краще обрати більш толерантний підхід, але для консолідації влади, можливо, найкраще підкорити їх як наших підлеглих."
  flavor_vij.25.a: "Не будемо засмучувати жодні культурні меншини."
  flavor_vij.25.b: "Щодо [ROOT.GetCountry.GetNameWithNoTooltip], вони схилять перед нами коліна."
  flavor_vij.26.title: "Завоювання [ShowCultureNameWithNoTooltip('tamil')] народу"
  flavor_vij.26.desc: "З падінням [ShowCultureName('tamil')] земель, багато хто в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] обговорював їхнє становище в нашій країні. Хоча на півдні $india$ між нами та ними було кілька конфліктів, вони все ще є цінним об'єктом для експлуатації. Їхні [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] є, мабуть, одними з найбагатших у регіоні. Однак те, що ми з ними зробимо, може змінити їхнє ставлення до нас у майбутньому."
  flavor_vij.26.a: "Ми завойовники, а не варвари."
  flavor_vij.26.b: "Їхнє багатство належить нам."
  VIJ_EVERY_TAMIL_POP_GAINS_SATISFACTION_BUT_LOSES_CONTROL: "Усі [ShowCultureName('tamil')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], але кожна локація з принаймні #Y 5%#! [ShowCultureName('tamil')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратить [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]."
  VIJ_EVERY_TAMIL_POP_LOSES_SATISFACTION: "Усі [ShowCultureName('tamil')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_vij.27.title: "Міграція народу Вадуган"
  flavor_vij.27.desc: "З нашими завоюваннями в [ShowAreaName('tamil_land_area')] та [ShowCultureName('telugu')] народом, що шукає кращого життя, вони вирішили мігрувати на південь, де проживає [ShowCultureName('tamil')] народ. Названі народом Вадуган, вони спричинили нестабільність у [ShowCultureNameWithNoTooltip('tamil')] землях. Можливо, ми можемо спробувати пом'якшити частину цієї міграції, щоб забезпечити культурну стабільність."
  flavor_vij.27.a: "Нехай вони рухаються на південь."
  flavor_vij.27.b: "Ми можемо спробувати їх обмежити."
  VIJ_EVERY_TAMIL_POP_GAINS_20_SATISFACTION: "Усі [ShowCultureName('tamil')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_vij.28.title: "Розширення $ranganathaswamy_temple$"
  flavor_vij.28.desc: "Через конфлікти, що відбулися в $india$, храм у [ShowLocationName('srirangam')] був повністю спустошений. [ShowReligionGroupAdjective('muslim')] правителі ніколи не звертали на нього уваги, але тепер, коли ми контролюємо це святе місце, можливо, ми зможемо відновити храм до його колишньої слави."
  flavor_vij.28.historical_info: "Побудований правителем Чола Дхармавармою, храм Ранганатхасвамі є найстарішим збереженим храмовим комплексом у Південній Індії. Хоча він процвітав у перші роки, у 14 столітті мусульманський полководець Малік Кафур пограбував його і відправив його золоту ікону назад до Делі. Знадобилося шість десятиліть, щоб храм був повернутий, і саме під правлінням Віджаянагари храм пережив 200 років процвітання, оскільки Імперія зосередилася на ремонті та перевстановленні своїх старих ікон Вішну та Лакшмі."
  flavor_vij.28.a: "За [ShowGodNameWithNoTooltip('vishnu_god')], відбудуймо його!"
  flavor_vij.28.b: "Це не варте зусиль та грошей."
  flavor_vij.29.title: "Захисники [ShowReligionAdjectiveWithNoTooltip('hindu')] Практик"
  flavor_vij.29.desc: "З нашим приходом до влади в Південній $india$ ми залишаємося одним із небагатьох великих [ShowReligionAdjective('hindu')] царств, що стоять як оплот проти [ShowReligionGroupAdjective('muslim')] орд. Хоча, замість того, щоб дивитися назовні, можливо, настав час подивитися всередину, на різні секти та віри в межах [ROOT.GetCountry.GetName]. Замість того, щоб бути маяком надії лише для [ShowReligionAdjectiveWithNoTooltip('hindu')] людей, ми можемо спробувати захистити права інших віросповідань."
  flavor_vij.29.a: "Захистимо всіх наших [ShowReligionAdjectiveWithNoTooltip('hindu')] громадян."
  flavor_vij.29.b: "Свобода релігійної практики має пріоритет."
  flavor_vij.30.title: "Храмовий комплекс Тірупаті-Тірумала"
  flavor_vij.30.desc: "Мабуть, найбільший храм з усіх у наших землях, великий храм Венкатешвари та пов'язаний з ним храм Тірупаті все частіше асоціюється з правителями нашої держави. Протягом багатьох років він виріс від великого місця паломництва до одного з найбільших храмів $india$. Храм підтримується пожертвами незліченних скарбів, а також понад сорока сіл, що забезпечують його їжею та доходом. Однак ми не повинні задовольнятися цим. Збільшивши нашу підтримку, надавши йому ще більше сіл та пожертв, ми могли б забезпечити, щоб він став найбільшим храмом у всій Південній $india$."
  flavor_vij.30.historical_info: "Хоча храм Венкатешвари в Тірумалі існував з давніх часів, саме під час його контролю імперією Віджаянагара він міг інтенсивно процвітати. Імператор Крішнадеварая часто робив йому пожертви, що дозволило позолотити внутрішнє святилище, і він навіть замовив свою статую всередині нього."
  flavor_vij.30.a: "Зробімо щедрі пожертви."
  flavor_vij.30.b: "Зберігаймо наші внески скромнішими."
  flavor_vij.31.title: "[target_location.GetNameWithNoTooltip]"
  flavor_vij.31.desc: "Північне узбережжя Короманделу та [target_location.GetRank.GetName] [target_location.GetName] зокрема є життєво важливими для нашого царства. Саме через цю прибережну смугу всі товари зі сходу досягають вимогливих душ у нашій столиці. Оскільки територія відновлюється після нашої окупації, і оскільки наш [ROOT.GetCountry.GetFlavorRank] продовжує зростати, порт там вступив у золотий вік."
  flavor_vij.31.a: "Нехай порт там процвітає!"
  flavor_vij.31.b: "Його природного зростання достатньо."
  flavor_vij.32.title: "[ShowProvinceDefinitionNameWithNoTooltip('mysore_plateau')] Заворушення"
  flavor_vij.32.desc: "Незважаючи на те, що наше правління в [ShowProvinceDefinitionName('mysore_plateau')] принесло порядок у регіон, люди там все ще незадоволені нами. Вони висловили свою опозицію до нас і готуються до повстання."
  flavor_vij.32.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_vij.32.b: "Ми повинні спробувати обмежити ці заворушення."
  VIJ_ALL_MYSORE_POPS_LOSE_50_SATISFACTION: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('mysore_plateau')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  VIJ_ALL_MYSORE_POPS_LOSE_20_SATISFACTION_AND_10_CONTROL: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('mysore_plateau')] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], і кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] там втратить [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_vij.33.title: "Укріплення [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_vij.33.desc: "[ROOT.GetCountry.GetName] наповнена багатьма великими фортами та замками. Форти, такі як ті, що в [target_location.GetName] та [target_location2.GetName], дозволили населенню жити в достатку, оскільки вони захищені від будь-яких набігів чи нападів. Це піднесло ці місця на нові висоти."
  flavor_vij.33.a: "Нехай вони процвітають."
  flavor_vij.33.b: "Використовуймо їх для ефективнішого контролю над навколишніми територіями."
  flavor_vij.33.c: "Інвестуймо ще більше в ці місця."
  VIJ_ALL_DEFENSE_PROVINCES_GAIN_DEVELOPMENT: "Кожна локація, що має #Y Оборонну#! [Concept('building', 'CONCEPT_PLACEHOLDER')|e], отримає [ShowNamedValue('development_mild_bonus')|+=] [Concept('development', 'CONCEPT_PLACEHOLDER')|e]."
  VIJ_ALL_DEFENSE_PROVINCES_GAIN_CONTROL: "Кожна локація, що має #Y Оборонну#! [Concept('building', 'CONCEPT_PLACEHOLDER')|e], отримає [ShowNamedValue('control_mild_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_vij.1000.title: "Храми [target_country.GetNameWithNoTooltip]"
  flavor_vij.1000.desc: "[ShowReligionGroupAdjective('muslim')] правитель [target_country.GetName] контролює одне з наших найшанованіших духовних місць. Хоча це може бути прийнятним, ситуація надто нестабільна, щоб залишатися пасивними. Ми повинні вимагати їхнього підкорення та готувати вторгнення, щоб ці храми ніколи не були осквернені язичниками."
  flavor_vij.1000.historical_info: "Хоча значна частина Індії може бути заселена індусами, більшість їхніх найсвященніших храмів лежить у південній частині субконтиненту. Це, разом із нестабільністю мусульманських султанатів у цьому районі, дозволило Харіхарі та Букці Раї консолідувати ці території, слугуючи оплотом проти північних султанатів."
  flavor_vij.1000.a: "Настав час перейти в наступ"
  flavor_vij.1000.b: "Ми повинні утримуватися від таких ворожих дій."
  flavor_vij.1001.title: "[ROOT_country.GetNameWithNoTooltip] вимагає підкорення"
  flavor_vij.1001.desc: "[ROOT_country.GetLongName] вимагає нашого підкорення! Якщо ми не підкоримося, вони погрожують нам вторгненням. Їхнім хитким приводом для цієї агресії, схоже, є [ShowReligionAdjective('hindu')] святі храми в нашій країні."
  flavor_vij.1001.a: "Нехай приходять"
  flavor_vij.1001.b: "Ми повинні підкоритися їхньому правлінню"
  flavor_vij.1002.title: "[target_country.GetNameWithNoTooltip] відмовляється"
  flavor_vij.1002.desc: "На жаль, хоча й не дивно, [target_country.GetName] відмовляється від нашої вимоги про підкорення."
  flavor_vij.1002.a: "Готуйте армію!"
  flavor_vij.1003.title: "[target_country.GetNameWithNoTooltip] поступається"
  flavor_vij.1003.desc: "[target_country.GetName] прийняв нашу вимогу про підкорення і тепер офіційно діятиме як наш васал."
  flavor_vij.1003.a: "Приємний сюрприз"
  flavor_vij.1100.title: "Чутки про [ShowCultureNameWithNoTooltip('tamil')] повстання"
  flavor_vij.1100.desc: "Хоча ми підкорили [ShowCultureName('tamil')] нашому правлінню, багато з них незадоволені нами. Поширюються чутки, що під проводом [target_character2.GetName] збирається буря, готова занурити [ROOT.GetCountry.GetName] у громадянську війну. Наші радники благають нас вислати [target_character2.GetHerHim], але якщо ми це зробимо, ми ризикуємо розгнівати наш [ShowCultureName('tamil')] народ."
  flavor_vij.1100.a: "Ми позбудемося цієї зради!"
  VIJ_REVOLT_IN_15_YEARS_UNLESS_IF_WE_MANAGE_TO_KEEP_TAMILS_SATISFIED: "Якщо ми не зможемо отримати #G 80%#! [Concept('control', 'CONCEPT_PLACEHOLDER')|e] або [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('tamil_land_area')], або вислати #Y лідера тамільського повстання#! протягом 20 років, [ShowCultureName('tamil')] землі повстануть."
  flavor_vij.1101.title: "$flavor_vij.1100.title$"
  flavor_vij.1101.desc.a: "Завдяки нашій політиці стримування [ShowCultureName('tamil')] повстання, ми заспокоїли більшість цих повстанців. Вони знову задоволені нашим правлінням, і що ще краще, вони схопили зрадника, який організував це повстання. [target_character.GetName] тепер схоплений нашими силами, і всі прагнуть вигнати [target_character2.GetHerHim]."
  flavor_vij.1101.desc.b: "Не зумівши стримати [ShowCultureName('tamil')] повстання, лідер цього зрадницького війська показує [target_character.GetHerHis] обличчя. [target_character.GetName] замишляв отримати підтримку та викроїти [target_character.GetHerHis] володіння, незалежне від [ROOT.GetCountry.GetName], [target_character.GetHeShe] вів переговори з [ShowCultureNameWithNoTooltip('tamil')] народом. Тепер залишається лише розгромити цих повстанців."
  flavor_vij.1101.a: "Геть [target_character.GetHerHim]! Зрадникам не місце в [ROOT.GetCountry.GetName]!"
  flavor_vij.1101.b: "До зброї, мужі! Здолаймо [target_character.GetNameWithNoTooltip] та [target_character.GetHerHis] натовп!"
  tamil_uprising: "Тамільське повстання"
  VIJ_ALL_TAMILS_LOSE_90_SATISFACTION: "Усі [ShowCultureName('tamil')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_vij.1102.title: "$flavor_vij.1100.title$"
  flavor_vij.1102.desc: "За підтримки [ROOT.GetCountry.GetGovernment.GetCourtTitle] нам вдалося захопити лідера [ShowCultureName('tamil')] повстання. Амбіції [target_character.GetName] щодо створення [target_character.GetHerHis] власного володіння були розтрощені, і тепер [target_character.GetHerHis] вигнано з [ROOT.GetCountry.GetName]. Однак [ShowCultureNameWithNoTooltip('tamil')] народ не забуде вигнання свого лідера..."
  flavor_vij.1102.a: "Щоб захистити [ROOT.GetCountry.GetNameWithNoTooltip], це було необхідно."
  VIJ_EVERY_TAMIL_POP_LOSES_10_SATISFACTION: "Усі [ShowCultureName('tamil')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_vij.1103.title: "$flavor_vij.1100.title$"
  flavor_vij.1103.desc: "[target.GetName] помер. Після подальшого розслідування та з огляду на реакцію [ShowCultureName('tamil')] населення, повстання майже придушене. Їхні спроби відокремитися від нашого володіння були припинені."
  flavor_vij.1103.a: "Усе [ROOT.GetCountry.GetNameWithNoTooltip] зітхає з полегшенням."
  VIJ_EVERY_TAMIL_POP_GAINS_10_SATISFACTION: "Усі [ShowCultureName('tamil')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_vij.1200.title: "[ShowReligionGroupAdjectiveWithNoTooltip('muslim')] Немезида"
  flavor_vij.1200.desc: "Зі зменшенням впливу [GetCountry('DLH').GetName] в $india$ та повним визволенням [ShowRegionName('deccan_region')] постали нові сили. Однією з них є [target_country.GetName], що стоїть як наш головний супротивник за об'єднання $india$."
  flavor_vij.1200.a: "Приготуймося розтрощити їх."
  flavor_vij.1200.b: "Ми ще не готові..."
  flavor_vij.1201.title: "$flavor_vij.1200.title$"
  flavor_vij.1201.desc: "[target_country2.GetName] планує розширитися на наші землі, готові зрівняти [ROOT.GetCountry.GetCapital.GetName] із землею. Ми повинні захистити наше володіння!"
  flavor_vij.1201.a: "Ми готові до бою!"
  flavor_vij_1200_shared_title: "Падіння [target_location.GetNameWithNoTooltip]"
  flavor_vij_1200_shared_desc: "Столиця нашого суперника, [target_location.GetName], впала після тривалої облоги. Її населення тепер у нашій владі. Ми могли б розграбувати [target_location.GetRank.GetName] і вимагати її багатства для себе, або ми могли б поважати її та розвивати до нових висот."
  flavor_vij_1200_response_shared_desc: "[target_country.GetName] зрівняла нашу столицю із землею. Не поважаючи тамтешнє населення, вони вирішили принизити його, спричинивши нестабільність у [ROOT.GetCountry.GetName]."
  flavor_vij_1200_shared_opt_1: "Зрівняти із землею!"
  flavor_vij_1200_shared_opt_2: "Збережімо [target_location.GetNameWithNoTooltip]."
