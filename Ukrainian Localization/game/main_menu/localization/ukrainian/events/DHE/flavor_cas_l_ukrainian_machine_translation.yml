l_english:
  flavor_cas.1.title: "[columbus_scope.GetNameWithNoTooltip]"
  flavor_cas.1.desc: "Після невдалої спроби переконати [GetCountry('POR').GetGovernment.GetRuler.GetName] у своєму плані, [columbus_scope.GetName] тепер звернувся до нашого двору. Його твердження про західний шлях до $india$, уникаючи довгої подорожі навколо [ShowSubContinentName('southern_africa')], може здатися сумнівним, але це може стати для нас чудовою можливістю посилити власні дослідницькі зусилля."
  flavor_cas.1.a: "Фінансувати його експедицію!"
  flavor_cas.1.b: "Яка нісенітниця!"
  flavor_cas.1.historical_info: "Після відмови короля Португалії Жуана II, Христофор Колумб намагався знайти підтримку для своєї запланованої подорожі в іншому місці. Хоча його ідеї спочатку були відхилені радниками королеви Ізабелли I Кастильської, його не відкинули повністю. Після завоювання Гранади в 1492 році королева Ізабелла та її чоловік, король Фердинанд II Арагонський, нарешті погодилися фінансувати його експедицію. Колумб вирушив з Палос-де-ла-Фронтера в серпні 1492 року на чолі каравел «Пінта» та «Нінья», а також нао «Санта-Марія», прибувши до «Гуанахані», ймовірно, на Багамських островах, 12 жовтня."
  flavor_cas.2.title: "[target_artist.GetNameWithNoTooltip] публікує #italic Граматику [ROOT.GetCountry.GetCourtLanguage.GetNameWithNoTooltip] мови#!"
  flavor_cas.2.desc: "[target_artist.GetName] доклав значних зусиль для укладання книги, що стосується граматики [ROOT.GetCountry.GetCulture.GetName] народу. Його праця може слугувати нагодою для стандартизації нашої мови, а книга — основним збірником правил для неї.\n\nНа ґрунтовні запитання [target_character.GetName], [target_artist.GetNameWithNoTooltip] виступив за використання книги та [ShowLanguageName('spanish_language')] як інструменту для умиротворення та інтеграції завойованих народів у наше суспільство, що сформувало б нашу країну в справжній [ROOT.GetCountry.GetCourtLanguage.GetNameWithNoTooltip] [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.2.a: "Стандартизувати мову [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] народу!"
  flavor_cas.2.b: "Мови не потребують таких жорстких правил."
  flavor_cas.3.title: "Нова іспанська столиця"
  flavor_cas.3.desc: "[ROOT.GetCountry.GetLongName] — це королівство, що складається з багатьох колишніх держав, що призвело до наявності безлічі резиденцій для наших правителів. Однак наші радники запропонували створити нову столицю, щоб покращити її адміністрацію.\n\n[ShowLocationName('madrid')], часте місце призначення наших правителів для полювання, виглядає як ідеальне місце через своє центральне розташування, пропонуючи можливість містобудівникам нашого королівства сформувати нове місто, зробивши його належною столицею, а його місцевий Алькасар — належним палацом."
  flavor_cas.3.a: "Тільки Мадрид — двір!"
  flavor_cas.3.b: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] залишиться столицею нашої династії."
  flavor_cas.4.title: "Новий Заповіт перекладено [ShowLanguageNameWithNoTooltip('spanish_language')]"
  flavor_cas.4.desc: "[ShowCultureName('castilian')] гуманіст на ім'я [target_artist.GetName] нещодавно приєднався до кола [ShowReligionAdjective('lutheran')] реформаторів у [ShowLocationName('wittenberg')] після того, як його навчання привело його до контактів з ідеями Реформації. Він присвятив свій час перекладу Нового Заповіту на [ShowLanguageName('spanish_language')] і надіслав примірник своєї праці, адресований та присвячений [target_character.GetName]. Після нашого огляду роботи стало зрозуміло, що широке видання цього перекладу може призвести до того, що більше наших людей приймуть ідеї [ShowReligionName('lutheran')]."
  flavor_cas.4.a: "Зупинити поширення цієї єресі якомога швидше!"
  denied_bible_translation: "Відмовлено в поширенні перекладеного Нового Заповіту в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_cas.4.b: "Запросити його до [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_cas.4.tt1: "Частина нашого населення навернеться до [ShowReligionNameWithNoTooltip('lutheran')]"
  flavor_cas.4.historical_info: "Народившись у заможній купецькій родині, Франсіско де Енсінас навчався разом зі своїм братом Дієго в Collegium Trilingue в Лувені, де він познайомився з гуманістичною наукою і почав перекладати твори Реформації на іспанську мову. У 1541 році він вступив до Віттенберзького університету, де переклав Новий Заповіт на іспанську. Цю роботу він присвятив імператору Карлу V і надіслав йому перший друкований примірник."
  flavor_cas.5.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.5.desc: "[target_character.GetName] здобув репутацію компетентного дипломата під час своєї служби за кордоном для [ROOT.GetCountry.GetName]. З його поверненням до [ROOT.GetCountry.GetCapital.GetName] було б чудовою нагодою викликати його до нашого двору, щоб безпосередньо залучити його до нашого кабінету."
  flavor_cas.5.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.5.b: "Він нам не потрібен."
  flavor_cas.6.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.6.desc: "[target_character.GetName] зі своєю безкомпромісною трудовою етикою та пристрастю до адміністрації швидко здобув прихильність та прихильників при дворі [ROOT.GetCountry.GetName]. Нам було б добре залучити його та підвищити далі, надавши йому більший контроль над державними справами."
  flavor_cas.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.6.b: "Він нам не потрібен."
  flavor_cas.7.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.7.desc: "[target_character.GetName], вправний дипломат та посланець, прибув до нашого двору. Хоча він є відданим слугою [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], він міг би стати чудовим радником та членом кабінету для [ROOT.GetCountry.GetName], якщо ми вирішимо його далі спонсорувати."
  flavor_cas.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.7.b: "Відправити його."
  flavor_cas.8.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.8.desc: "Видатний кримінальний прокурор та відомий прихильник ліберальних реформ, [target_character.GetName] тепер проголосив своє бажання служити в кабінеті [ROOT.GetCountry.GetName]. Ми могли б забезпечити значну підтримку нашим реформам, якби ми його найняли."
  flavor_cas.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.8.b: "Він нічого не зможе покращити."
  flavor_cas.9.title: "Конституція для [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_cas.9.desc: "Оскільки наша легітимність останнім часом постраждала, ми змушені більше покладатися на наші стани для зміцнення нашого правління над [ROOT.GetCountry.GetName]. З цією метою колективне представництво наших станів представило нам Конституцію. Згідно з поступками Конституції, вони підтримали б наше правління, але це супроводжувалося б кількома обмеженнями, накладеними на владу нашого правителя."
  flavor_cas.9.a: "У нас немає вибору, окрім як прийняти!"
  flavor_cas.9.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] повинен панувати безроздільно!"
  flavor_cas.10.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_cas.10.desc: "Після життя солдата, [target_artist.GetName] присвятив своє життя літературній кар'єрі і тепер досяг визнання та популярності своїм нещодавнім романом #italic Дон Кіхот де ла Манча#! по всьому [ROOT.GetCountry.GetName]. Завдяки спонсорству [target_character.GetNameWithNoTooltip] він міг би створити тривалу літературну спадщину для [ROOT.GetCountry.GetCulture.GetLanguage.GetName] мови."
  flavor_cas.10.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.11.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_cas.11.desc: "[target_artist.GetName] досяг слави в [ShowReligionAdjective('catholic')] світі завдяки своєму майстерному створенню сакральної музики. Провівши роки на службі [GetCountry('PAP').GetName], він тепер попросив повернутися до свого дому в [ROOT.GetCountry.GetName], щоб далі вдосконалювати свою роботу."
  flavor_cas.11.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.11.b: "Відмовити йому в проханні."
  flavor_cas.12.title: "Ель Греко пропонує послуги"
  flavor_cas.12.desc: "Після формального навчання в провінції [ShowProvinceDefinitionName('crete_province')] та короткого перебування в [ShowLocationName('rome')], [target_artist.GetName] тепер обрав [ShowLocationName('toledo')] своєю новою резиденцією. Зі зростанням його слави в [ROOT.GetCountry.GetName], він заслужив [target_artist.GetHerselfHimself] прізвисько #italic Ель Греко#! і тепер просить спонсорства [target_ruler.GetName] [ROOT.GetCountry.GetGovernment.GetRuler.GetHerselfHimself]."
  flavor_cas.12.a: "Негайно найняти його!"
  flavor_cas.12.b: "Відпустити його."
  flavor_cas.13.title: "Орден Стрічки розширюється"
  flavor_cas.13.desc: "Під час нещодавньої Громадянської війни жінки [ROOT.GetCountry.GetName] відзначилися як здібні воїни під час облоги, де вони відбили армію загарбників без будь-якої сторонньої допомоги. Деякі з наших радників рекомендують розширити членство в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ShowPolicyName('order_of_the_band_policy')], включивши до нього жінок як нагороду за видатну службу в ім'я [target_ruler.GetName]."
  flavor_cas.13.a: "Чудова ідея."
  flavor_cas.13.a.tt: "Це дозволить жінкам приєднуватися до [ShowPolicyNameWithNoTooltip('order_of_the_band_policy')]"
  flavor_cas.13.b: "Зберегти орден виключно для чоловіків."
  flavor_cas.14.title: "[ROOT.GetCountry.GetGovernment.GetHeirTitle] Астурії"
  flavor_cas.14.desc: "Щоб поглибити освіту [target_heir.GetName] і дозволити [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHim] здобути цінний досвід як правителю, ми могли б створити титул [ROOT.GetCountry.GetGovernment.GetHeirTitle] Астурії та надати його спадкоємцю [ROOT.GetCountry.GetName]. [target_heir.GetNameWithNoTooltip] керував би Астурією від нашого імені і, зійшовши на трон, передав би титул наступному спадкоємцю [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_cas.14.a: "Надати [target_heir.GetNameWithNoTooltip] контроль над Астурією."
  flavor_cas.14.b: "Відмовити [target_heir.GetNameWithNoTooltip] у титулі."
  flavor_cas.15.title: "Життя [target_ruler.GetNameWithNoTooltip]"
  flavor_cas.15.desc: "Насичене правління [target_ruler.GetName] та його праведна боротьба проти [GetCountry('MOR').GetReligion.GetAdjective] присутності в [ShowRegionName('iberia_region')] слугують ідеальним прикладом справжнього [ShowReligionAdjective('catholic')] правителя. Щоб зберегти життя та досягнення [target_ruler.GetNameWithNoTooltip], ми повинні доручити [target_artist.GetName] створити хроніку для [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_cas.15.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.15.b: "Відпустити його"
  flavor_cas.16.title: "#italic Книга доброї любові$#!"
  flavor_cas.16.desc: "Один з наших священиків інтенсивно вивчав тему кохання та відмінності між тим, що він називає доброю та дурною любов'ю. [target_artist.GetName] тепер опублікував перероблену збірку цього матеріалу. Рукопис містить автобіографію автора, моральні уроки у формі байок, розповіді про любовні романи та пародійні описи середньовічних діянь."
  flavor_cas.16.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.16.b: "Відкинути цей непотріб."
  flavor_cas.17.title: "Книга полювання"
  flavor_cas.17.desc: "[target_artist.GetName] зібрав вражаючу інформацію про стан мисливських угідь [ROOT.GetCountry.GetName] та розведення собак для тієї ж мети. Ця обширна документація є не лише вираженням здібностей нашого правителя, але й буде корисною для покращення можливостей видобутку [ShowGoodsName('wild_game')] у нашому володінні."
  flavor_cas.17.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.18.title: "Наступництво [target_ruler.GetNameWithNoTooltip]"
  flavor_cas.18.desc: "[ruler_father.GetName] був добре відомий своїм компетентним правлінням над [target_country.GetName]. Однак, жнець не щадить нікого, і [target_country.GetAdjectiveWithNoTooltip] корона дісталася його синові, [target_ruler.GetName].\n\nХоча він є законним правителем за правом наступництва, цілком очевидно, що його рішення викликають занепокоєння у [target_country.GetGovernment.GetEstateName('nobles_estate')]. Хаотичні рішення з неясними або нечіткими поясненнями залишили двір у подиві та розгубленості, оскільки новий [target_country.GetGovernment.GetRulerTitle] здійснює свою владу..."
  flavor_cas.18.a: "Нехай його дії все ж таки матимуть мудрість."
  flavor_cas.19.title: "[GetCountry('POR').GetAdjectiveWithNoTooltip] Міжцарів'я"
  flavor_cas.19.desc: "[GetCountry('POR').GetName] охопило сум'яття, оскільки закони про престолонаслідування були змінені на користь незаконного претендента, обійшовши наші династичні зв'язки з поваленої династії. Стани [GetCountry('POR').GetNameWithNoTooltip] вирішили коронувати [portuguese_ruler.GetName] своїм новим королем, побоюючись, що якщо корона перейде до нас, країна буде поглинена [ROOT.GetCountry.GetName] і перетвориться на звичайну провінцію. Багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] закликає [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] вжити заходів і відстояти наші династичні претензії, щоб скинути узурпатора."
  flavor_cas.19.a: "Жоден король не править вічно..."
  flavor_cas.19.b: "Відступимо."
  flavor_cas.19.historical_info: "Португальське міжкоролів'я було періодом політичної кризи та громадянської війни, що вибухнула після смерті короля Португалії Фердинанда I. Єдина дитина Фердинанда, Беатріс, була одружена з королем Кастилії Хуаном I, і багато хто побоювався, що її вступ на престол призведе до поглинання Португалії Кастилією. Це занепокоєння викликало опір з боку португальської знаті та містян, які згуртувалися навколо Хуана Авізького, незаконнонародженого сина короля Португалії Педру I. Це призвело до війни за спадщину, в якій португальці перемогли, забезпечили свою незалежність, а Хуан Авізький був коронований як Хуан I Португальський."
  flavor_cas.20.title: "Невдала спроба отримати [GetCountry('POR').GetAdjectiveWithNoTooltip] трон"
  flavor_cas.20.desc: "Наша спроба претендувати на трон [GetCountry('POR').GetName] закінчилася катастрофою. Втрата розбила наші амбіції об'єднати іберійські корони та завдала серйозного удару по нашому престижу. Незважаючи на те, що саме ми наполягали на цьому, багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер ставлять під сумнів мудрість цієї війни та витрати, які вона завдала нашій нації."
  flavor_cas.20.a: "Ми оговтаємося."
  flavor_cas.20.historical_info: "Поразка Кастилії під час Португальського міжкоролів'я була здебільшого спричинена втратами, яких вона зазнала в битві при Алжубарроті. Кастильські війська очолював король Кастилії Хуан I, який прагнув забезпечити португальський трон для своєї дружини, Беатріс Португальської. Їм протистояла значно менша армія, очолювана Хуаном, магістром Військового ордену Авізу, та його англійськими союзниками. Більша кастильська армія здійснювала повторні штурми, але була рішуче розгромлена через погану координацію та ефективний португальський опір, перетворивши день на кастильську катастрофу."
  flavor_cas.21.title: "Трон [GetCountry('POR').GetNameWithNoTooltip] забезпечено"
  flavor_cas.21.desc: "Наше втручання в [GetCountry('POR').GetName] було успішним. Після важкої війни [GetCountry('POR').GetAdjectiveWithNoTooltip] корона тепер надійно в наших руках, об'єднуючи два іберійські королівства під владою [ROOT.GetCountry.GetName]."
  flavor_cas.21.a: "Святкувати перемогу."
  flavor_cas.21.b: "Вшанувати перемогу, присвятивши їй [ShowBuildingTypeNameWithNoTooltip('monastery')] у [ShowLocationName('guadalupe')]."
  flavor_cas.22.title: "Титул [ShowReligionAdjectiveWithNoTooltip('catholic')] королів"
  flavor_cas.22.desc: "Наш непохитний захист [ShowReligionAdjective('catholic')] віри та непохитна підтримка Святого Престолу не залишилися непоміченими. На знак визнання нашої побожності та впливу в християнському світі [pope.GetName] видав [GetCountry('PAP').GetAdjective] буллу, що надає нам престижний титул Католицьких Монархів."
  flavor_cas.22.a: "Прийняти його!"
  flavor_cas.22.a.tt: "Наші правителі відтепер прийматимуть титули Найкатолицьких Королів та Найкатолицьких Королев відповідно."
  flavor_cas.22.b: "Нам не потрібні такі титули."
  flavor_cas.22.historical_info: "Титул Католицьких Монархів був наданий Папою Олександром VI королеві Кастилії Ізабеллі та королю Арагону Фердинанду в 1493 році через Папську буллу #italic Inter caetera#!. Майбутні правителі Іспанії не використовували цей титул, але й не відмовлялися від нього."
  flavor_cas.23.title: "[ShowEstatePrivilegeNameWithNoTooltip('cas_fuero_viejo')]"
  flavor_cas.23.desc: "Правові традиції нашого [ROOT.GetCountry.GetFlavorRank] розкидані по численних місцевих статутах. Незважаючи на існування [ShowEstatePrivilegeName('cas_fuero_viejo')], що є правовою збіркою, розробленою в 1248 році, документ має несистематичну форму і навряд чи може бути корисним для всього [ROOT.GetCountry.GetFlavorRank]. Деякі при [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонують нам зібрати ці закони в єдиний, систематичний правовий текст, щоб зміцнити авторитет нашої правової системи, зберігаючи при цьому традиції [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  flavor_cas.23.a: "Централізувати владу, розробивши новий об'єднуючий кодекс."
  flavor_cas.23.b: "Нам це не потрібно."
  flavor_cas.23.historical_info: "#italic Fuero Viejo de Castilla#! була правовою збіркою, розробленою для об'єднання розрізнених законів і звичаїв середньовічної Кастилії, особливо тих, що стосувалися знаті. Її створення відображало зусилля з кодифікації їхніх привілеїв, які мали слугувати наріжним каменем їхнього статусу в королівстві."
  flavor_cas.24.title: "Орденамієнто де Алькала"
  flavor_cas.24.desc: "Правові традиції нашого [ROOT.GetCountry.GetFlavorRank] залишаються фрагментованими, з місцевими звичаями, привілеями знаті та старими статутами, що часто конфліктують з [ROOT.GetCountry.GetGovernment.GetAdjective] владою. Можливо, настав час розробити єдиний правовий кодекс, який спростить управління та прояснить закони для всіх підданих під [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_cas.24.a: "Розробити новий правовий кодекс."
  flavor_cas.24.b: "Залишити правову систему як є."
  flavor_cas.24.historical_info: "Орденамієнто де Алькала, виданий у 1348 році за правління Альфонсо XI Кастильського, був значною правовою реформою, яка прагнула об'єднати різноманітні правові традиції Кастилії, оскільки #italic Siete Partidas#!, правовий кодекс, виданий королем Альфонсо X (прадідом Альфонсо XI), не був повністю прийнятий. Цей королівський кодекс підніс авторитет #italic Fuero Real#!, іншого кодексу, просуваного Альфонсо X, над старими місцевими законами, утверджуючи верховенство королівського права по всьому королівству. Він мав на меті оптимізувати управління шляхом вирішення суперечностей між місцевими статутами та встановлення чіткіших судових настанов."
  flavor_cas.25.title: "Інвентаризація Бегетрій"
  flavor_cas.25.desc: "Зростаюча влада [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та економічна напруга, спричинена нещодавніми епідеміями, викликали дебати щодо прав та привілеїв [ROOT.GetCountry.GetAdjective]'s #italic behetrías#! — міст, де [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] могли обирати своїх власних сеньйорів. Під зростаючим тиском аристократії, [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] запропонувала створити всеосяжний опис цих земель для документування їхнього статусу, прав та обов'язків. Це могло б стати життєво важливим інструментом у визначенні майбутнього цих міст та уточненні балансу сил між [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] та аристократією."
  flavor_cas.25.a: "Авторизувати інвентаризацію."
  flavor_cas.25.b: "Залишити Бегетрії їхнім традиціям."
  flavor_cas.25.historical_info: "#italic Libro Becerro de las Merindades de Castilla#!, більш відомий як #italic Libro Becerro de las Behetrías#!, був замовлений королем Педро I Кастильським на Кортесах Вальядоліда 1351 року і завершений через рік, у відповідь на вимоги знаті щодо перетворення #italic behetrías#! на поміщицькі землі. Села #italic behetría#!, розташовані переважно в північних регіонах Кастилії, були унікальними за своїм правовим статусом, оскільки селяни зберігали право обирати своїх сеньйорів. Після Чорної Смерті та подальших економічних потрясінь знать прагнула посилити свій контроль над цими землями, підриваючи традиційні права на користь маноріалізму."
  flavor_cas.26.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.26.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] чула про [target_character.GetName], відомого вченого, історика, поета та державного діяча, чий гострий інтелект та красномовство зробили [target_character.GetHerHim] однією з найшанованіших постатей у [ROOT.GetCountry.GetName]. Деякі пропонували запросити [target_character.GetHerHim] служити нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle] художником, оскільки [target_character.GetHisHer] таланти могли б бути неоціненними у літописанні політики та подій нашого часу, забезпечуючи, щоб наші досягнення пам'яталися поколіннями."
  flavor_cas.26.a: "Найняти [target_character.GetHerHim] [ROOT.GetCountry.GetGovernment.GetCourtTitle] художником."
  flavor_cas.26.b: "Ми не можемо дозволити собі [target_character.GetHerHis] послуги."
  flavor_cas.26.historical_info: "Педро Лопес де Аяла був сином Фернана Переса де Аяли, сеньйора Аяли в Алаві. Його виховував кардинал Педро Гомес Барросо, його двоюрідний дід, що визначило його вступ на службу до короля Педро I як чиновника при королівському дворі. Коли почалися відкриті бойові дії між Педро I та його позашлюбним зведеним братом, Енріке де Трастамара, він вступив на службу до останнього і служив йому протягом трьох років, поки тривала війна за спадщину. Перемога Енріке змусила його нагородити Педро Лопеса де Аялу як одного з найвірніших васалів, надавши йому різні гранти та посади, що досягло піку за правління сина Енріке, Хуана I, під час якого Педро був «Camarero mayor del rey» — «Великим камергером двору». Під час своєї служби різним королям він писав хроніки для кожного правління, відомі як #italic Crónicas de los reyes de Castilla#! — #italic Хроніки королів Кастилії#!, що мало довготривалий вплив на знання цього періоду."
  flavor_cas.27.title: "[target_character.GetNameWithNoTooltip] та Хроніки [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_cas.27.desc: "Маючи [target_character.GetName] у нашому розпорядженні, дехто запропонував використати [target_character.GetHerHis] надзвичайний талант до літописання історії. Замовивши [target_character.GetHerHim] написати детальний опис історії [ROOT.GetCountry.GetName] та її недавніх правителів. За достатнього фінансування ми могли б забезпечити, щоб нова праця стала гідним наступником [ShowWorkOfArtName('estoria_de_espana')], зберігаючи спадщину нашого правління та гарантуючи, що майбутні покоління зрозуміють боротьбу та тріумфи, які сформували наш [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.27.a: "Підтримати це починання."
  flavor_cas.27.b: "Це занадто дорого за малу вигоду."
  flavor_cas.27.historical_info: "Педро Лопес де Аяла був сином Фернана Переса де Аяли, сеньйора Аяли в Алаві. Його виховував кардинал Педро Гомес Барросо, його двоюрідний дід, що визначило його вступ на службу до короля Педро I як чиновника при королівському дворі. Коли почалися відкриті бойові дії між Педро I та його позашлюбним зведеним братом, Енріке де Трастамара, він вступив на службу до останнього і служив йому протягом трьох років, поки тривала війна за спадщину. Перемога Енріке змусила його нагородити Педро Лопеса де Аялу як одного з найвірніших васалів, надавши йому різні гранти та посади, що досягло піку за правління сина Енріке, Хуана I, під час якого Педро був «Camarero mayor del rey» — «Великим камергером двору». Під час своєї служби різним королям він писав хроніки для кожного правління, відомі як #italic Crónicas de los reyes de Castilla#! — #italic Хроніки королів Кастилії#!, що мало довготривалий вплив на знання цього періоду."
  flavor_cas.28.title: "Експедиція Магеллана"
  flavor_cas.28.desc: "[target_character.GetName], вправний навігатор та дослідник, запропонував амбітний план досягти Островів Прянощів, проклавши західний маршрут через невідомі моря. [target_character.GetHerHis|U] бачення могло б встановити швидший та пряміший торговий шлях до цих прибуткових островів, оминаючи традиційний шлях навколо [ShowContinentName('africa')]. Хоча [GetCountry('POR').GetAdjective] Корона відхилила [target_character.GetHerHis] пропозицію, [target_character.GetLastNameWithNoTooltip] тепер шукає нашої підтримки для фінансування [target_character.GetHerHis] сміливої експедиції."
  flavor_cas.28.a: "Дати [target_character.GetLastNameWithNoTooltip] усе, що [target_character.GetSheHe] просить!"
  flavor_cas.28.b: "Відхилити пропозицію."
  flavor_cas.28.historical_info: "Фернан де Магальяйнш, більш відомий як Фердинанд Магеллан, був португальським навігатором, який запропонував амбітний план досягти Островів Прянощів, пливучи на захід, прагнучи встановити новий шлях до прибуткової торгівлі прянощами. Під іспанським патронатом його експедиція вирушила у 1519 році на п'яти кораблях, досягнувши новаторського успіху в дослідженні, оскільки вона не тільки проклала маршрут для плавання з Атлантичного океану до Ост-Індії через мис Горн, але й виявила, що величезний Тихий океан є прохідним, і що навколосвітня подорож можлива."
  flavor_cas.29.title: "Магеллан загинув під час подорожі"
  flavor_cas.29.desc: "Тривожні новини досягли нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] з далеких Островів Прянощів. [target_character.GetName], лідер нашої сміливої експедиції з прокладання західного маршруту до цих островів, був убитий під час сутички з місцевими племенами. [target_character.GetHerHis|U] смерть є трагічним ударом по нашим амбіціям, залишаючи [target_character.GetHerHis] екіпаж під керівництвом [target_elcano.GetName] перед обличчям небезпечних морів та невизначених умов."
  flavor_cas.29.a: "Моліться за безпечне повернення експедиції."
  flavor_cas.29.a.tt: "[target_elcano.GetName] стане лідером експедиції."
  flavor_cas.29.historical_info: "Магеллан зустрів свою передчасну смерть 27 квітня 1521 року під час сутички на острові Мактан на Філіппінах. Намагаючись допомогти місцевому союзнику в конфлікті, Магеллан та його невеликий загін зіткнулися з жорстоким опором Лапу-Лапу, місцевого вождя. Недооцінивши силу протиборчих сил, Магеллан був убитий воїнами, озброєними списами та мечами. Хоча його смерть стала значною невдачею, Хуан Себастьян Елькано очолив експедицію і продовжив шлях, зрештою завершивши перше навколосвітнє плавання 6 вересня 1522 року."
  flavor_cas.30.title: "Суперництво у відкритому морі"
  flavor_cas.30.desc: "До нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] дійшли новини, що [GetCountry('POR').GetName] найняла [magellan_scope.GetName], вправного навігатора, щоб очолити сміливу експедицію в пошуках західного шляху до прибуткових Островів Прянощів. Ця подія загрожує змінити баланс сил у гонці за домінування в торгівлі та колонізації. Багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] закликає до швидких дій, щоб протистояти [GetCountry('POR').GetAdjectiveWithNoTooltip] амбіціям. Вони пропонують розпочати власну експедицію, щоб перевершити їхні зусилля та закріпити наше місце як провідної морської держави. Щоб очолити таке підприємство, ми могли б звернутися до досвідченого моряка та судновласника [target_character.GetName], чиї знання морів та перевірені навички роблять [target_character.GetHimHer] ідеальним кандидатом."
  flavor_cas.30.a: "Розпочати експедицію під проводом [target_character.GetLastNameWithNoTooltip]."
  flavor_cas.30.b: "Їхні зусилля не становлять для нас загрози."
  flavor_cas.31.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.31.desc: "[target_character.GetName] — людина глибокого інтелекту та щирої віри, яка здобула велике визнання як кардинал і дипломат. [target_character.GetHisHer|U] досвід як у релігійних, так і в політичних питаннях змусив багатьох запропонувати найняти [target_character.GetHimHer] як радника. За [target_character.GetHisHer] керівництва ми могли б зміцнити наші зв'язки з [GetUniqueInternationalOrganization('catholic_church').GetName], врегульовувати суперечки та просувати інтереси [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_cas.31.a: "Привести Мендосу до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_cas.31.b: "Нам не потрібні [target_character.GetHisHer] послуги."
  flavor_cas.31.historical_info: "Педро Гонсалес де Мендоса був іспанським кардиналом і державним діячем, який відіграв центральну роль під час правління Католицьких монархів, Ізабелли I Кастильської та Фердинанда II Арагонського. Як кардинал, Мендоса зміцнив зв'язки Корони з Папством, сприяючи релігійним реформам Католицьких монархів та їхній остаточній Реконкісті Гранади. Його вплив поширювався за межі Церкви; він був глибоко залучений до формування внутрішньої та зовнішньої політики, за що отримав неофіційний титул «Третій король Іспанії»."
  flavor_cas.32.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.32.desc: "[target_character.GetName], вчений та впливовий архієпископ, відомий [target_character.GetHisHer] винятковим внеском у [GetUniqueInternationalOrganization('catholic_church').GetName] та [target_character.GetHisHer] зусиллями з розширення інтелектуальних та культурних занять у [ROOT.GetCountry.GetName]. [target_character.GetHisHer|U] адміністративний досвід та міцні зв'язки в [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] роблять [target_character.GetHimHer] дуже затребуваною фігурою при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Багато хто вважає, що [target_character.GetHisHer] навички могли б значно покращити наше управління та допомогти зміцнити наш вплив як у духовних, так і в світських справах."
  flavor_cas.32.a: "Нагородити [target_character.GetHisHer] службу посадою при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_cas.32.b: "Ми не зацікавлені."
  flavor_cas.32.historical_info: "Алонсо III де Фонсека був видатним іспанським священнослужителем, який служив архієпископом Сантьяго-де-Компостела, а пізніше архієпископом Толедо, найпрестижніших церковних посад в Іспанії. Ключовий прихильник ренесансного гуманізму, Фонсека сприяв освіті та мистецтву, допомагаючи розвивати інтелектуальний клімат іспанської Церкви. Завдяки його внеску Університет Сантьяго-де-Компостела був перетворений на видатний центр навчання."
  flavor_cas.33.title: "Заснування Complutensis Universitas"
  flavor_cas.33.desc: "Кардинал [target_character.GetName] запропонував створити великий університет у [ShowLocationName('alcala_de_henares')] з метою сприяння освіті, духовності та інтелектуальному зростанню по всій нашій [ROOT.GetCountry.GetFlavorRank]. Відомий як #italic Complutensis Universitas#!, [target_character.GetLastNameWithNoTooltip] уявляє його як перший у світі спеціально побудований університетський кампус, змодельований за зразком Civitas Dei — Міста Божого. За підтримки папства та ресурсів, які [target_character.GetSheHe] сподівається, надасть [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], цей університет може стати маяком знань і, зрештою, принести користь усій [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.33.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] допоможе [target_character.GetHerHim] його профінансувати."
  flavor_cas.33.b: "Ми не зацікавлені у його фінансуванні."
  flavor_cas.33.historical_info: "Університет Алькали, також відомий як Complutensis Universitas, був заснований у 1499 році кардиналом Сіснеросом за папськими буллами, наданими Папою Олександром VI. Він став одним із найпрестижніших центрів академічної досконалості протягом XVI та XVII століть."
  flavor_cas.34.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.34.desc: "[target_character.GetName] здобув величезну славу завдяки [target_character.GetHisHer] військовій доблесті та інноваційним стратегіям під час [target_character.GetHisHer] довгої кампанії як генерала, навіть заслуживши [target_character.GetHimHer] прізвисько #italic El Gran Capitán#!. [target_character.GetHisHer|U] майстерність тактики на полі бою та здатність реформувати армії зробили [target_character.GetHimHer] легендарною фігурою у військовій справі. Тепер [target_character.GetSheHe] готовий надати [target_character.GetHisHer] досвід [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
  flavor_cas.34.a: "Ми добре використаємо [target_character.GetHisHer] навички."
  flavor_cas.34.b: "Нам не потрібні генерали."
  flavor_cas.34.historical_info: "Гонсало Фернандес де Кордова, відомий як #italic Ель Гран Капітан#!, був кастильським генералом, який здобув популярність під час Італійських війн, де він трансформував європейську війну завдяки своїй інноваційній тактиці, що наголошувала на гнучкості та інтеграції піхоти, кавалерії та артилерії як комбінованих родів військ. Його перемоги в Черіньолі та Гарільяно проти французів продемонстрували його геній, що призвело до створення терцій через кілька років після його смерті, військового формування, яке домінуватиме на полях битв Європи протягом півтора століття."
  flavor_cas.35.title: "Експедиція [target_character.GetLastNameWithNoTooltip]"
  flavor_cas.35.desc: "[target_character.GetName], амбітний і відважний конкістадор, звернувся до двору з розповідями про незліченні багатства та родючі землі в далеких краях Нового Світу. З [target_character.GetHisHer] доведеною мужністю та рішучістю, [target_character.GetSheHe] шукає підтримки [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] для експедиції, щоб дослідити та завоювати ці таємничі території в Андах."
  flavor_cas.35.a: "Профінансувати експедицію."
  flavor_cas.35.b: "У нас немає ресурсів для цього підприємства."
  flavor_cas.35.historical_info: "Франсіско Пісарро був іспанським конкістадором, який став однією з найважливіших фігур у колонізації Америки. У 1532 році він очолив невелику експедицію до Імперії інків, використовуючи хитру дипломатію та передову зброю, щоб захопити імператора Атауальпу в битві при Кахамарці. Завоювання інків Пісарро призвело до падіння однієї з наймогутніших цивілізацій в Америці, принісши Іспанії величезне багатство у золоті та сріблі."
  flavor_cas.36.title: "Амбіції [target_character.GetNameWithNoTooltip]"
  flavor_cas.36.desc: "[target_character.GetName] — конкістадор, який здобув популярність завдяки [target_character.GetHisHer] сміливим діям у Новому Світі. [target_character.GetLastNameWithNoTooltip] відомий [target_character.GetHisHer] амбіціями розширити вплив [ROOT.GetCountry.GetName] у [ShowRegionName('mesoamerica_region')], оскільки [target_character.GetSheHe] полює на [ShowLocationName('tenochtitlan')]. [target_character.GetSheHe|U] тепер шукає нашої підтримки для подальших підприємств. З розповідями про величезне багатство та незліченні можливості, дехто припускає, що підтримка [target_character.GetHimHer] може принести неперевершену славу та багатство [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_cas.36.a: "Підтримати [target_character.GetLastNameWithNoTooltip] та його експедицію."
  flavor_cas.36.b: "Ми не можемо собі цього дозволити."
  flavor_cas.36.historical_info: "Ернан Кортес був іспанським конкістадором, який найвідоміший тим, що очолив експедицію, яка призвела до падіння імперії ацтеків. У 1519 році, з невеликою армією, Кортес відплив до Мексики, де стратегічно уклав союзи з корінними племенами, що протистояли ацтекам. У 1521 році він успішно захопив Теночтітлан, столицю ацтеків, і скинув імператора Монтесуму II."
  flavor_cas.37.title: "Запит [target_character.GetNameWithNoTooltip]"
  flavor_cas.37.desc: "[target_character.GetName] звернувся до [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] зі сміливою пропозицією: створити найдетальнішу карту Нового Світу, яка коли-небудь була зроблена. [target_character.GetSheHe|U] — досвідчений моряк, дослідник і картограф, який довів [target_character.GetHisHer] цінність у подорожах до Нового Світу і добре відомий [target_character.GetHisHer] винятковими навичками в навігації та картографії. Якщо ми вирішимо підтримати [target_character.GetHimHer], то ця карта, як він стверджує, зміцнить нашу морську перевагу та спрямує майбутні експедиції до успіху."
  flavor_cas.37.a: "Підтримати [target_character.GetHisHer] зусилля з картографування Нового Світу."
  flavor_cas.37.b: "У нас є інші пріоритети."
  flavor_cas.37.historical_info: "Хуан де ла Коса був одним з найвидатніших навігаторів і картографів Епохи великих географічних відкриттів. Досвідчений моряк, він був власником і пілотом «Санта-Марії», найбільшого корабля в першій подорожі Колумба до Америки в 1492 році. Досвід де ла Коси в навігації приніс йому репутацію одного з найнадійніших дослідників Іспанії, він брав участь у численних експедиціях до Нового Світу, включаючи експедиції Алонсо де Охеди та Амеріго Веспуччі."
  flavor_cas.38.title: "Карта Нового Світу [target_character.GetNameWithNoTooltip]"
  flavor_cas.38.desc: "Завдяки фінансуванню [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], [target_character.GetName] завершив [target_character.GetHisHer] надзвичайну карту відомого світу, яка є першою, що зображує нововідкриті землі Нового Світу, і надає нам безцінні відомості для навігації. Завдяки такому інструменту наші дослідники будуть краще підготовлені до картографування невідомих вод, розширення наших територій та забезпечення нашого домінування в дослідженні."
  flavor_cas.38.a: "Привід для святкування!"
  flavor_cas.38.historical_info: "Карта Хуана де ла Коси є знаковою в історії картографії та свідченням досягнень іспанських досліджень. Це найраніша відома карта, що представляє Америку як частину світу, і перша морська карта, що зображує екватор і тропік Рака."
  flavor_cas.39.title: "Створення Padrón Real"
  flavor_cas.39.desc: "[ShowGovernmentReformName('casa_de_contratacion')] запропонувала створити офіційну та стандартизовану карту, яка буде використовуватися як шаблон для всіх карт на борту наших кораблів. Ця уніфікована карта включатиме останні географічні відкриття та оновлення, забезпечуючи безпеку та ефективність наших моряків, що прямують до Нового Світу та з нього."
  flavor_cas.39.a: "Схвалити її створення для уніфікації наших навігаційних зусиль."
  flavor_cas.39.b: "Нехай наші моряки продовжують використовувати власні карти."
  flavor_cas.39.historical_info: "Padrón Real був монументальною морською картою, створеною та підтримуваною Casa de Contratación у Севільї. Заснована в 1508 році, вона слугувала офіційною картою Іспанської Корони, регулярно оновлюючись для включення нових відкриттів дослідників та картографів. Вона включала такі інновації, як точні широти та берегові лінії для нововідкритих територій. Padrón Real трималася в таємниці, щоб запобігти доступу суперників до найважливіших географічних відомостей Корони."
  flavor_cas.40.title: "Поет епохи [ShowInstitutionNameWithNoTooltip('renaissance')]"
  flavor_cas.40.desc: "Обдарований поет і воїн, [target_character.GetName] прославився завдяки [target_character.GetHisHer] майстерності в літературі та [target_character.GetHisHer] глибокому розумінню людських емоцій. [target_character.GetSheHe|U] відомий тим, що черпає натхнення з класичних традицій [ShowRegionName('italy_region')] і поєднує їх із [ShowCultureName('castilian')] культурою, [target_character.GetHisHer] твори славляться своєю елегантністю та новаторством. Деякі з наших радників пропонують запросити [target_character.GetHimHer] на нашу службу, щоб піднести престиж нашого/нашої [ROOT.GetCountry.GetGovernment.GetCourtTitle] та допомогти поширити ідеї [ShowInstitutionName('renaissance')]."
  flavor_cas.40.a: "Найняти [target_character.GetHimHer], щоб піднести мистецтво при [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_cas.40.b: "Нас це не цікавить."
  flavor_cas.40.historical_info: "Гарсіласо де ла Вега був провідною постаттю Іспанського Відродження і широко вважається одним з найважливіших поетів в іспанській літературній історії. Він був людиною пера і меча. Гарсіласо служив у війську під керівництвом Карла V, тоді як його поезія, під впливом італійських поетів Відродження, таких як Петрарка, запровадила нові форми Відродження в іспанську літературу, що ознаменувало поворотний момент у культурній історії Іспанії."
  flavor_cas.41.title: "[target_character.GetLastNameWithNoTooltip]'s Сільськогосподарська інновація"
  flavor_cas.41.desc: "[target_character.GetName] — вчений агроном, який нещодавно завершив трактат про сільське господарство, #italic Obra de Agricultura#!. Замовлена під патронатом [cardinal_cisneros.GetName], ця праця поєднує як класичні знання, так і власні спостереження [target_character.GetLastNameWithNoTooltip], щоб надати вичерпні поради щодо методів землеробства, іригації, сівозміни та догляду за худобою. Ця новаторська праця могла б значно підвищити сільськогосподарську продуктивність на наших землях."
  flavor_cas.41.a: "Скористатися [target_character.GetHisHer] відкриттями."
  flavor_cas.41.b: "Нам бракує ресурсів, щоб використати ці знання."
  flavor_cas.41.historical_info: "Габріель Алонсо де Еррера був іспанським агрономом і теологом, чий трактат, #italic Obra de Agricultura#!, став наріжним каменем аграрної науки в Іспанії та Європі. Спираючись на класичні джерела, такі як Колумелла та Палладій, а також на власні спостереження, праця Еррери торкалася життєво важливих тем, таких як управління ґрунтом, іригація, боротьба зі шкідниками, сівозміна та інше."
  flavor_cas.42.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.42.desc: "[target_character.GetName] запропонував/запропонувала [target_character.GetHisHer] послуги при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetSheHe|U] — блискучий вчений, лікар і теолог, відомий/відома своїми новаторськими дослідженнями в медицині, географії та теології, [target_character.GetLastNameWithNoTooltip] володіє гострим інтелектом і готовністю кидати виклик усталеним нормам. [target_character.GetHisHer|U] досвід міг би виявитися безцінним у просуванні нашого розуміння науки та управління."
  flavor_cas.42.a: "[target_character.GetHisHer|U] знання послужать нам добре."
  flavor_cas.42.b: "[target_character.GetHisHer|U] ідеї надто суперечливі."
  flavor_cas.42.historical_info: "Мігель Сервет був ерудитом, який зробив значний внесок у різні галузі, включаючи теологію, медицину та географію. Він найбільш відомий своєю працею в анатомії, зокрема описом легеневого кровообігу, що передувало відкриттям Вільяма Гарвея. Сервет також був суперечливим теологом, який кидав виклик традиційним християнським доктринам, зокрема концепції Трійці, що призвело до його засудження як католицькою, так і протестантською владою, будучи засудженим до смерті в Женеві в 1553 році за наказом Кальвіна."
  flavor_cas.43.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.43.desc: "[target_character.GetName] прославляється як один з найкращих художників нашого часу. [target_character.GetSheHe|U] здобув/здобула популярність завдяки [target_character.GetHisHer] чудовому/чудовій поєднанню реалізму та впливів [ShowInstitutionName('renaissance')]. [target_character.GetHisHer|U] художній талант привернув увагу [ROOT.GetCountry.GetGovernment.GetCourtTitle], і багато хто припускає, що найняття його/її як нашого офіційного/офіційної художника/художниці [ROOT.GetCountry.GetGovernment.GetCourtTitle] могло б піднести престиж нашого/нашої [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.43.a: "[target_character.GetHisHer|U] мистецтво прославить наше правління."
  flavor_cas.43.b: "Мистецтво не є пріоритетом на даний момент."
  flavor_cas.43.historical_info: "Педро Берругете був іспанським художником, чиї роботи славляться поєднанням готичного стилю та стилю Відродження. Він вважається одним із перших художників, що запровадили мистецтво Відродження в Іспанії після подорожі до Італії, де на нього вплинули роботи таких майстрів, як П'єро делла Франческа."
  flavor_cas.44.title: "Архів [ROOT.GetCountry.GetFlavorRank]"
  flavor_cas.44.desc: "Багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] обговорювали способи централізації та збереження життєво важливих державних документів, щоб зміцнити наші адміністративні можливості та забезпечити ретельний облік нашого управління. Однією з пропозицій є створення першого офіційного архіву [ROOT.GetCountry.GetFlavorRank], де зберігатимуться всі документи, такі як королівські укази, листування тощо."
  flavor_cas.44.a: "Розумна ідея."
  flavor_cas.44.b: "Це не є необхідним."
  flavor_cas.44.historical_info: "Генеральний архів Сіманкас, заснований у 1540 році Карлом I Іспанським, був першим офіційним державним архівом у Європі. Архів розміщувався в замку Сіманкас, фортеці, стратегічно розташованій поблизу Вальядоліда. Архів Сіманкас став зразком для інших європейських країн і символізував модернізацію державного управління."
  flavor_cas.45.title: "Пошук Архітектора Великого Бачення"
  flavor_cas.45.desc: "[target_ruler.GetName] давно мріяв про грандіозні архітектурні проєкти, які стануть вічними символами могутності та слави нашого [ROOT.GetCountry.GetFlavorRank]. Щоб здійснити ці амбіції, [ROOT.GetCountry.GetGovernment.GetCourtTitle] почав шукати майстра-архітектора, здатного проєктувати та керувати такими монументальними починаннями. Серед потенційних кандидатів — [target_character.GetName], вправний архітектор, чиї інноваційні ідеї та майстерність геометрії могли б втілити ці бачення в життя."
  flavor_cas.45.a: "Найняти його для керівництва нашими проєктами."
  flavor_cas.45.b: "Ми шукатимемо деінде."
  flavor_cas.45.historical_info: "Хуан де Еррера був архітектором, математиком і геометром, який розпочав свою службу королю Філіпу II, коли той був принцом, як лицар, але пізніше став головним архітектором з титулом «Інспектор пам'яток Корони». У 1572 році йому було доручено завершити роботи над палацом-монастирем Ель-Ескоріал, які були закінчені в 1584 році. Його керівництво численними громадськими роботами за наказом короля залишило тривалу спадщину в архітектурному стилі, відомому як «ерреріанський»."
  flavor_cas.46.title: "Палац [ShowBuildingTypeNameWithNoTooltip('el_escorial_palace')]"
  flavor_cas.46.desc: "Довіривши [target_character.GetName] архітектурні прагнення [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], настав час розпочати перший з багатьох монументальних проєктів. Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] замовив будівництво [ShowBuildingTypeName('el_escorial_palace')], великої королівської резиденції та монастиря, що слугуватиме центром управління та духовності, який відображатиме могутність нашої монархії та побожність нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.46.a: "Нехай будівництво розпочнеться негайно!"
  flavor_cas.46.b: "Такий проєкт надто дорогий."
  flavor_cas.46.historical_info: "Королівський монастир Сан-Лоренсо-де-Ель-Ескоріал був замовлений королем Філіпом II як королівська резиденція та мавзолей для його батька, Карла V. Комплекс став вічним символом Іспанської Золотої доби та поєднує стиль Відродження з власною суворою естетикою Еррери, нині відомою як «ерреріанський стиль»."
  flavor_cas.47.title: "[ShowBuildingTypeNameWithNoTooltip('school_of_salamanca')]"
  flavor_cas.47.desc: "Університет [ShowLocationName('salamanca')] довгий час був центром навчання та дебатів, але останніми роками в його стінах з'явилася чудова група вчених. Вони закладають інтелектуальні основи того, що тепер відоме як [ShowBuildingTypeName('school_of_salamanca')], рух, який прагне переосмислити філософію, економіку, право та теологію через розум і моральні принципи."
  flavor_cas.47.a: "Підтримати їхні зусилля."
  flavor_cas.47.tt.a: "Відкриває більше подій про [ShowBuildingTypeNameWithNoTooltip('school_of_salamanca')] та історичних особистостей, пов'язаних з нею."
  flavor_cas.47.b: "Ми не зацікавлені в цьому."
  flavor_cas.47.historical_info: "Саламанкська школа виникла в XVI столітті і відіграла ключову роль у формуванні сучасної думки. Вона заклала основи міжнародного права, поставила під сумнів етику колоніалізму та розробила ранні економічні теорії."
  flavor_cas.48.title: "[ShowPolicyNameWithNoTooltip('leyes_de_toro_policy')]"
  flavor_cas.48.desc: "[ROOT.GetCountry.GetName] завжди мав підтримку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], але через розкол серед них настав час почати просувати деякі з цих родин. Запропонований [target_location.GetRank.GetName] [target_location.GetName], [ShowPolicyName('leyes_de_toro_policy')] дозволить [target_character.GetName] досягти саме цього, віддаючи перевагу родинам, які все ще вірні [ROOT.GetCountry.GetFlavorRank], дозволяючи нам забезпечити лояльність серед людей, що мають владу."
  flavor_cas.48.historical_info: "Наслідки Війни за кастильську спадщину 1479 року призвели до значного розколу серед знаті. Однак, завдяки тріумфу Ізабелли над Хуаною в конфлікті, це також дозволило їй належним чином встановити набір законів, які ще більше зміцнили б владу знаті, що її підтримувала. Ці закони стали б Leyes de Toro, і хоча вони не були б повністю впроваджені під час її правління, саме під час правління її наступниці, Хуани I, вони були кодифіковані."
  flavor_cas.48.a: "Давайте впровадимо ці закони."
  flavor_cas.48.b: "Зараз, можливо, не найкращий час."
  flavor_cas.49.title: "[ShowPolicyNameWithNoTooltip('nueva_recopilacion_policy')]"
  flavor_cas.49.desc: "Через різні регіони, які займав [ROOT.GetCountry.GetName], кожен з них має свій набір законів, незалежний від законів [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Це спричинило багато юридичних проблем, таких як жорстоке поводження з багатьма [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. [target_character.GetName] бажає виправити це, зібравши всі ці закони в один, [ShowPolicyName('nueva_recopilacion_policy')]."
  flavor_cas.49.historical_info: "Через бурхливу політичну історію Кастильської Корони в пізньому Середньовіччі бракувало єдиного правового корпусу для королівства. Саме з цієї причини Кортеси, що відбулися в Мадриді в 1534 році, визначили необхідність його очищення та реструктуризації. Лише в 1567 році ця правова компіляція була санкціонована та затверджена королем Філіпом II, що дозволило всім судам Кастильської Корони та американським віце-королям застосовувати більш систематичне законодавство, що діяло понад два століття."
  flavor_cas.49.a: "Зберемо їх зараз."
  flavor_cas.49.b: "Ми можемо відкласти це на потім."
  flavor_cas.50.title: "Novísima Recopilación"
  flavor_cas.50.desc: "Попри те, що [ShowAdvanceName('enlightenment_advance')] підкрадається до [ROOT.GetCountry.GetName], багато наших законів застаріли, зокрема [ShowPolicyName('nueva_recopilacion_policy')]. Бачачи це, [target_character.GetName] бажає позбутися будь-яких традиціоналістських ідей, переписавши їх, щоб відійти від римського канонічного права. Це допомогло б просвітити маси, навчивши їх більше, ніж просто [ROOT.GetCountry.GetReligion.GetAdjective] вірі, яка домінувала в нашій правовій системі."
  flavor_cas.50.historical_info: "Удосконалення Nueva Recopilación, Novísima Recopilación відійшла від римського канонічного характеру, який мала попередня версія. Натомість, вона стала сходинкою для об'єднання Кастилії та Арагону в межах іспанського королівства. Впроваджені у 1805 році, ці закони стали б предметом вивчення будь-яких судових справ в Іспанії, але вони не були б такими сучасними, як тодішній Наполеонівський кодекс, що зароджувався."
  spa_alter_nueva_recopilacion_policy_tt: "[Concept('policy', 'CONCEPT_PLACEHOLDER')|e] бонуси [ShowPolicyName('nueva_recopilacion_policy')] тепер зосереджуватимуться на [Concept('research', 'CONCEPT_PLACEHOLDER')|e] і масштабуватимуться з [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_cas.50.a: "Ми дозволимо цим ідеям прогресу процвітати."
  flavor_cas.50.b: "Не відступаймо від наших традицій."
  flavor_cas.51.title: "Теорія економіки [target_character.GetNameWithNoTooltip]"
  flavor_cas.51.desc: "Наше рішення підтримати [ShowBuildingTypeName('school_of_salamanca')] повільно окупає наші інвестиції. [target_character.GetName], який є членом Школи, здобув широке визнання за [target_character.GetHisHer] новаторську роботу в галузі економіки та моральної теології. [target_character.GetHisHer|U] спостереження за взаємозв'язком між пропозицією грошей та їхньою вартістю мають потенціал революціонізувати наше розуміння фінансів та торгівлі."
  flavor_cas.51.a: "[target_character.GetHisHer|U] дослідження принесуть користь [ROOT.GetCountry.GetFlavorRank]!"
  flavor_cas.51.historical_info: "Мартін де Аспількуета, також відомий як Доктор Наваррус, був видатною постаттю та одним з головних мислителів Саламанкської школи. Його новаторські економічні теорії, зокрема щодо кількості грошей та їхнього впливу на ціни, зробили його попередником сучасної економіки. Він запровадив ідею, що збільшення пропозиції грошей призводить до інфляції, спостереження, яке стало життєво важливим для розуміння світової торгівлі та монетарних систем."
  flavor_cas.52.title: "[target_character.GetNameWithNoTooltip] та Принципи Справедливості"
  flavor_cas.52.desc: "[target_character.GetName], видатний теолог і філософ, нещодавно став одним з головних мислителів новоствореної [ShowBuildingTypeName('school_of_salamanca')]. [target_character.GetSheHe|U] запропонував інноваційні ідеї щодо справедливості, праці та прав особистості, які могли б покращити наше управління та правові системи."
  flavor_cas.52.a: "Підтримаємо ідеї де [target_character.GetLastNameWithNoTooltip]!"
  flavor_cas.52.historical_info: "Домінго де Сото був провідним мислителем Саламанкської школи. Він був відомий своїм внеском у природне право та соціальну справедливість. Де Сото стверджував, що всі люди мають вроджену гідність і що праця повинна бути справедливо винагороджена. Його праці значно вплинули на розвиток прав людини та економічної справедливості."
  flavor_cas.53.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.53.desc: "[target_character.GetName], який є домініканським ченцем і видатним членом [ShowBuildingTypeName('school_of_salamanca')], запропонував радикальні ідеї щодо міжнародного права та етики колоніалізму. [target_character.GetSheHe|U] ставить під сумнів легітимність завоювання без справедливої причини та наголошує на правах корінних народів. Ці погляди можуть змінити наш підхід до управління нашими заморськими територіями, але не всі при [ROOT.GetCountry.GetGovernment.GetCourtTitle] їх схвалюють."
  flavor_cas.53.a: "Підтримайте [target_character.GetHisHer] революційні принципи!"
  flavor_cas.53.b: "[target_character.GetHisHer|U] ідеї суперечать нашим зусиллям."
  flavor_cas.53.historical_info: "Франсіско де Віторія часто вважається батьком міжнародного права. Його праці заклали основи сучасних правових принципів, що регулюють війну, мир і суверенітет. Завзятий захисник прав корінних народів, він виступав проти експлуатації Америки та ставив під сумнів моральність несправедливих завоювань."
  flavor_cas.54.title: "Ідеї молінізму"
  flavor_cas.54.desc: "[target_character.GetName], відомий єзуїтський теолог, створив нову інтерпретацію вільної волі та божественного передбачення, відому як молінізм. [target_character.GetHisHer|U] праця надає теологічну основу, яка підкреслює людську свободу та відповідальність, що може вплинути на моральні засади нашої політики. Можливо, надання [target_character.GetHimHer] ресурсів для подальших [target_character.GetHisHer] досліджень також принесе нам користь."
  flavor_cas.54.a: "Ми підтримаємо [target_character.GetHisHer] ідеї."
  flavor_cas.54.b: "[target_character.GetHisHer|U] погляди надто суперечливі, щоб їх підтримувати."
  flavor_cas.54.historical_info: "Луїс де Моліна був видатним членом Саламанкської школи та творцем молінізму, теологічної системи, яка примиряє божественне передбачення з людською вільною волею. Його ідеї викликали значні дебати в Католицькій Церкві та вплинули на дискусії про індивідуальну свободу та моральну відповідальність."
  flavor_cas.55.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.55.desc: "[target_character.GetName] є єзуїтським теологом та відомим членом [ShowBuildingTypeName('school_of_salamanca')]. Нещодавно [target_character.GetSheHe] поширював [target_character.GetHisHer] теорії про суверенітет та взаємозв'язок між правителем та керованими. [target_character.GetHisHer|U] аргументи щодо згоди керованих та обмежень державної влади могли б зміцнити моральну легітимність нашого правління, але [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує уникати [target_character.GetHisHer] ідей, оскільки вони можуть підірвати нашу легітимність."
  flavor_cas.55.a: "Прийняти [target_character.GetHisHer] ідеї."
  flavor_cas.55.b: "Підтримувати [target_character.GetLastNameWithNoTooltip] надто небезпечно."
  flavor_cas.55.historical_info: "Франсіско Суарес був одним із найвпливовіших мислителів Саламанкської школи, здобувши визнання як піонер сучасної політичної теорії. Він стверджував, що суверенітет походить від народу і довіряється правителям. Деякі вважали його ідеї надто революційними, оскільки вони суперечили божественним правам монархів на правління."
  flavor_cas.56.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.56.desc: "Блискучий вчений Ордену Єзуїтів, [target_character.GetName], також відомий як Белломонтанус, привернув увагу нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHisHer|U] гострий інтелект та інноваційні підходи до складних питань принесли [target_character.GetHimHer] захоплення багатьох у [ShowBuildingTypeName('school_of_salamanca')]. Завдяки [target_character.GetHisHer] досвіду ми могли б глибше дослідити моральну теологію та уточнити наше розуміння управління, закону та меж людського розуму. Можливо, нам слід підтримати [target_character.GetHimHer] та забезпечити, щоб [target_character.GetHisHer] праця сприяла більшій славі нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.56.a: "[target_character.GetHisHer|U] знання просунуть нашу науку!"
  flavor_cas.56.b: "Ідеї [target_character.GetLastNameWithNoTooltip] мають мало практичного застосування."
  flavor_cas.56.historical_info: "Габріель Васкес був однією з найвидатніших постатей пізньої Саламанкської школи, відомий своєю інноваційною працею в моральній теології, метафізиці та епістемології. Васкес прагнув уточнити та розвинути ідеї попередніх вчених, таких як Тома Аквінський та Франсіско Суарес, хоча він був головним академічним опонентом останнього. Йому вдалося загострити увагу на питаннях людського розуму, морального судження та взаємозв'язку між божественною благодаттю та людською свободою."
  flavor_cas.57.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.57.desc: "[target_character.GetName] з [ShowBuildingTypeName('school_of_salamanca')] став провідним голосом у теологічній реформі. [target_character.GetHisHer|U] інноваційний підхід до теології поєднує схоластику з практичним розумінням природного розуму та людських справ. [target_character.GetLastNameWithNoTooltip] запропонував створити рамки, що поєднують священну доктрину зі світським управлінням. Можливо, субсидування зусиль [target_character.GetLastNameWithNoTooltip] призведе до зміцнення морального хребта [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.57.a: "Підтримати [target_character.GetHisHer] починання."
  flavor_cas.57.b: "Наразі у нас інші пріоритети."
  flavor_cas.57.historical_info: "Мельчор Кано був одним із найвпливовіших теологів Саламанкської школи, відомий своєю працею #italic De Locis Theologicis#!, яка систематизувала теологічне мислення. Його внесок виходив за межі академії, оскільки він консультував правителів щодо взаємодії між релігією та політикою."
  flavor_cas.58.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.58.desc: "Блискучий правознавець і теолог [ShowBuildingTypeName('school_of_salamanca')], [target_character.GetName] нещодавно публікував трактати, що заглиблюються в принципи управління, права власності та обов'язки правителів. [target_character.GetSheHe|U] запропонував [target_character.GetHisHer] послуги [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], обіцяючи розробити правові рамки, які підтримують справедливість, забезпечуючи при цьому процвітання [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.58.a: "Найняти [target_character.GetLastNameWithNoTooltip] як юридичного радника."
  flavor_cas.58.b: "Ми не потребуємо правової реформи."
  flavor_cas.58.historical_info: "Дієго де Коваррубіас і Лейва був видатним юристом і теологом, який обіймав посаду президента Кастильської ради та архієпископа Сеговії. Його правова філософія наголошувала на важливості природного права та моральних обов'язків правителів."
  flavor_cas.59.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.59.desc: "[target_character.GetName], член [ShowBuildingTypeName('school_of_salamanca')], нещодавно викликав інтенсивні дебати через [target_character.GetHisHer] запровадження принципу пробабілізму, новаторської моральної концепції, що припускає, що особи можуть дотримуватися ймовірної думки в моральних дилемах, навіть якщо протилежна є більш ймовірною. [target_character.GetHisHer|U] ідеї викликали як похвалу, так і критику, але вони мають потенціал впливати на прийняття рішень як у духовних, так і в мирських справах."
  flavor_cas.59.a: "Фінансувати [target_character.GetHisHer] дослідження."
  flavor_cas.59.b: "Краще триматися від цього подалі."
  flavor_cas.59.historical_info: "Бартоломе де Медіна найкраще запам'ятався тим, що запровадив принцип пробабілізму в моральній теології, який дозволив більшу гнучкість у прийнятті моральних рішень, вплинувши на підхід Церкви до етичних дилем."
  flavor_cas.60.title: "Congregatio de Auxiliis"
  flavor_cas.60.desc: "Між домініканцями та єзуїтами виникла запекла теологічна суперечка, зосереджена навколо божественної благодаті та свободи волі. Домініканці, дотримуючись томістської доктрини, стверджують, що Божа благодать є непереборною та визначальною, тоді як єзуїти, очолювані такими теологами, як [target_character.GetName], наполягають на сумісності свободи волі з божественною благодаттю. [GetUniqueInternationalOrganization('catholic_church').GetName] скликала #italic Congregatio de Auxiliis#! для вирішення цього питання."
  flavor_cas.60.a: "Підтримати домініканців і відстояти томістську доктрину."
  flavor_cas.60.b: "Стати на бік єзуїтів і відстоювати молінізм."
  flavor_cas.60.historical_info: "#italic Congregatio de Auxiliis#! – це серія теологічних дебатів, проведених Католицькою Церквою між 1598 і 1607 роками для вирішення суперечок між єзуїтами та домініканцями щодо божественної благодаті та людської свободи волі. Єзуїти, очолювані такими теологами, як Луїс де Моліна, наголошували на людській співпраці з божественною благодаттю, тоді як домініканці виступали за Боже передвизначення людських дій. Папа Павло V зрештою призупинив дискусії, не винісши остаточного рішення."
  flavor_cas.61.title: "Захисник томізму"
  flavor_cas.61.desc: "Через наше рішення захищати томістську доктрину під час $flavor_cas.60.title$, [target_character.GetName] зголосився запропонувати [target_character.GetHisHer] послуги [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. [target_character.GetLastNameWithNoTooltip] є грізним захисником доктрини, особливо в питаннях божественної благодаті та свободи волі. [target_character.GetHisHer|U] ретельний аналіз і рішуча опозиція єзуїтським моліністам зробили [target_character.GetHimHer] центральною фігурою в сучасних теологічних дебатах."
  flavor_cas.61.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.61.historical_info: "Домінго Баньєс був провідним теологом Саламанкської школи та рішучим захисником томістського погляду на передвизначення та благодать. Його наукова строгість і дебати з єзуїтськими теологами, такими як Луїс де Моліна, поставили його в центр #italic Congregatio de Auxiliis#!."
  flavor_cas.62.title: "Вчений віри та поезії"
  flavor_cas.62.desc: "[target_character.GetName], відомий теолог, поет і вчений [ShowLanguageName('hebrew_language')], здобув популярність завдяки [target_character.GetHisHer] майстерним перекладам біблійних текстів та [target_character.GetHisHer] елегантній поезії. [target_character.GetHisHer|U] досвід як у священній, так і в світській літературі зробив [target_character.GetHimHer] відомою фігурою в [ShowBuildingTypeName('school_of_salamanca')]. Хоча [target_character.GetHisHer] відверті погляди іноді викликали суперечки, блиск [target_character.GetLastNameWithNoTooltip] як мислителя та вчителя незаперечний. Наші радники при [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджують, що залучення [target_character.GetHimHer] значно покращить наші культурні та теологічні починання."
  flavor_cas.62.a: "Призначити [target_character.GetHimHer] радником [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]!"
  flavor_cas.62.b: "[target_character.GetHisHer|U] погляди можуть привернути небажану увагу."
  flavor_cas.62.historical_info: "Луїс де Леон був однією з найвидатніших постатей Саламанкської школи. Його переклади Пісні Пісень та коментарі до єврейської Біблії були новаторськими. Однак його академічна кар'єра була перервана інквізицією, яка звинуватила його в єресі через його сміливі теологічні позиції. Незважаючи на ці виклики, він залишив тривалу спадщину як теолог, поет і професор."
  flavor_cas.63.title: "[ShowBuildingTypeNameWithNoTooltip('segovia_artillery_academy')]"
  flavor_cas.63.desc: "Наші військові радники запропонували створити установу, присвячену науці артилерії. Запропонована [ShowBuildingTypeName('segovia_artillery_academy')] слугуватиме новаторським центром для вивчення та розробки передових артилерійських методів та підготовки офіцерів у мистецтві сучасної війни."
  flavor_cas.63.a: "Військова модернізація має бути нашим пріоритетом!"
  flavor_cas.63.b: "Ми не можемо дозволити собі такі інвестиції."
  flavor_cas.63.historical_info: "Академія артилерії Сеговії, заснована в 1764 році, вважається найстарішою у світі діючою військовою академією, присвяченою артилерії. Вона відіграла вирішальну роль у професіоналізації військової освіти, впроваджуючи інновації в балістичні розрахунки та розробку сучасної зброї."
  flavor_cas.64.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] ботанічна експедиція до Нової Гранади"
  flavor_cas.64.desc: "До нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] надійшла амбітна пропозиція організувати [ROOT.GetCountry.GetGovernment.GetAdjective|U] ботанічну експедицію до Нової Гранади. Це підприємство, очолюване досвідченими натуралістами, має на меті каталогізувати величезну флору та фауну регіону, шукаючи цінні рослини та ліки, які могли б принести користь нашому [ROOT.GetCountry.GetFlavorRank]. Така експедиція вимагатиме значного фінансування та підтримки, але обіцяє великі наукові винагороди."
  flavor_cas.64.a: "Профінансувати експедицію."
  flavor_cas.64.b: "Наші ресурси краще витратити деінде."
  flavor_cas.64.historical_info: "Королівська ботанічна експедиція до Нової Гранади була одним із найзначніших наукових починань іспанського Просвітництва. Хоча спочатку її двічі відхиляли, пізніше її схвалили в 1783 році, і протягом майже 30 років експедиція задокументувала надзвичайне біорізноманіття регіону. Наукова команда створила тисячі детальних ботанічних ілюстрацій та ідентифікувала численні нові види."
  flavor_cas.65.title: "Рехім'єнто"
  flavor_cas.65.desc: "Уряд міст і містечок [ROOT.GetCountry.GetFlavorRank] поволі вислизав з-під контролю [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], міцно закріпившись у руках [ShowEstatePrivilegeName('cas_caballeros_villanos')]. Це ситуація, яку [target_character.GetName] прагне змінити, призначаючи довірених осіб [target_character.GetHerHis] радниками всіх міст і містечок."
  flavor_cas.65.a: "Ми встановимо цю нову систему."
  flavor_cas.65.b: "Краще не змінювати поточну систему."
  flavor_cas.65.historical_info: "Міста та містечка Кастилії та Леону управлялися системою, що називалася #italic concejo abierto#! – «відкрита рада». Ця рада обиралася щорічно, зазвичай розподілялася між парафіями (районами) місцевості, і відповідала за обрання, своєю чергою, ключових магістратів року, таких як мер та судді. Ця система поступово концентрувала призначення в руках низки родин, зазвичай з лав #italic caballeros villanos#!, які контролювали щорічні вибори ради та її призначених посад. У 1345 році король Альфонсо XI запровадив нову систему управління для міст та містечок королівства. Названа #italic Regimiento#!, вона була зосереджена навколо #italic regidores#!, радників, безпосередньо обраних королем з числа найвищих за рангом у кожному місці. Ця система, яка спочатку ставила монархію на чолі муніципального уряду, була підірвана в наступному столітті, оскільки найбагатші та найвпливовіші родини захопили посади, зазвичай за підтримки певних шляхетних родин, які стали реальною владою в королівських містах та містечках."
  flavor_cas.66.title: "[ROOT.GetCountry.GetCulture.GetLanguage.GetNameWithNoTooltip] долар"
  flavor_cas.66.desc: "Валюти, що використовуються в нашому [ROOT.GetCountry.GetFlavorRank], перетворилися на безлад, оскільки основна з них, мараведі, має дуже мало застосувань, окрім бухгалтерського обліку. Наші експерти стверджують, що якби ми створили дві нові валюти, одну золоту та одну срібну, і забезпечили їх чистою якістю, наша економіка в цілому виграла б від цього кроку, особливо далека торгівля.\n\nМи також маємо можливість зберегти стару і скористатися подальшою девальвацією тієї ж, карбуючи більше низькоякісних мараведі, що збільшило б наш дохід у короткостроковій перспективі."
  flavor_cas.66.a: "Покажіть мені [ROOT.GetCountry.GetCulture.GetLanguage.GetNameWithNoTooltip] долари!"
  flavor_cas.66.b: "Поточної валюти цілком достатньо."
  flavor_cas.66.historical_info: "Грошова система Кастильської Корони у другій половині XV століття була дуже складною в експлуатації. Мараведі, основна розрахункова одиниця, безперервно девальвувалася з XIII століття. Крім того, в іберійських королівствах існували різні регіональні валюти, що ускладнювало економіку політичного об'єднання, розпочатого з весілля королеви Ізабелли I Кастильської та короля Фердинанда II Арагонського. Тому в 1497 році була розпочата грошова реформа, що встановила нову золоту монету, дукат, і нову срібну монету, реал, для використання в обох королівствах. З огляду на несподіваний приплив срібла з Америки в наступні десятиліття, використання «реала де а очо» різко зросло, що незабаром стало широко відомим як «іспанський долар». Він вважається першою світовою валютою, оскільки його приймали торговці по всьому світу, від Африки до Америки та від Європи до Азії."
  flavor_cas.67.title: "[target_character.GetNameWithNoTooltip] і відродження флоту"
  flavor_cas.67.desc: "Морський інженер [target_character.GetName] представив план модернізації нашого занепадаючого флоту, використовуючи передові методи в кораблебудуванні. [target_character.GetSheHe|U] обіцяє міцніші, швидші та маневреніші кораблі. Адміралтейство підтримує бачення [target_character.GetHisHer], але його реалізація вимагатиме значних інвестицій та довгострокових зобов'язань."
  flavor_cas.67.a: "Флот – наш найвищий пріоритет!"
  flavor_cas.67.a.tt: "Ми збудуємо флот з #G [ROOT.GetVariable('total_gained_ships_variable').GetValue]#! важких [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName]"
  flavor_cas.67.b: "Занадто дорого в ці часи."
  flavor_cas.67.historical_info: "Хосе Антоніо де Гастаньєта був провідною фігурою іспанського морського відродження. Кораблебудівник та інноваційний морський командир, Гастаньєта пережив морські поразки та усвідомив слабкість іспанського флоту. Таким чином, він реформував флот, і його проекти були широко прийняті та виявилися вирішальними під час Війни за іспанську спадщину."
  flavor_cas.68.title: "Морські реформи [target_character.GetNameWithNoTooltip]"
  flavor_cas.68.desc: "[target_character.GetName] — блискучий морський офіцер, математик та астроном. Нещодавно повернувшись з експедиції до [ShowSubContinentName('south_america')], [target_character.GetNameWithNoTooltip] представив [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] пропозицію щодо революціонізації наших морських можливостей. Спираючись на [target_character.GetHisHer] дослідження з іноземними інженерами та [target_character.GetHisHer] спостереження за останніми морськими тенденціями, [target_character.GetSheHe] виступає за масштабні реформи в кораблебудуванні, картографії та освіті офіцерів. [target_character.GetSheHe|U] стверджує, що впровадження [target_character.GetHisHer] реформ поверне [ROOT.GetCountry.GetName] морське домінування."
  flavor_cas.68.a: "Фінансувати ініціативи [target_character.GetHisHer]."
  flavor_cas.68.b: "Відхилити реформи [target_character.GetHisHer]."
  flavor_cas.68.historical_info: "Хорхе Хуан і Сантасілія був однією з найвидатніших постатей іспанського Просвітництва. У складі франко-іспанської геодезичної місії до Еквадору він допоміг виміряти дугу земного меридіана поблизу екватора. Після повернення до Іспанії він очолив масштабну реформу іспанського флоту, запровадивши сучасні методи кораблебудування та реорганізувавши морську освіту."
  flavor_cas.69.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.69.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] завжди був місцем величі та видовищ, а мистецтво, що прикрашає його стіни, красномовно свідчить про його могутність. Нещодавно [target_character.GetName] привернув увагу наших радників завдяки [target_character.GetHisHer] чудовій роботі в ризниці [ShowBuildingTypeName('el_escorial_palace')]. Через це багато хто рекомендував найняти [target_character.GetHimHer] як нашого придворного художника [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_cas.69.a: "[target_character.GetSheHe|U] заслуговує на цю посаду."
  flavor_cas.69.b: "Ми не можемо дозволити собі витрачати монети на марнославство."
  flavor_cas.69.historical_info: "Клаудіо Коельо був одним з останніх великих іспанських художників бароко, відомим як релігійними, так і королівськими замовленнями. Він служив придворним художником Карла II і залишив після себе спадщину монументальних робіт, що поєднували іспанський реалізм з італійськими та фламандськими впливами."
  flavor_cas.70.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.70.desc: "[target_character.GetName] здобув визнання по всій [ShowLocationName('sevilla')] за [target_character.GetHisHer] майстерні релігійні композиції та співчутливі зображення бідних і дітей. [target_character.GetLastNameWithNoTooltip] отримав заступництво від релігійних орденів та громадських лідерів, і тепер [target_character.GetSheHe] шукає нашої підтримки, щоб продовжувати прикрашати церкви надихаючими творами. Однак дехто стверджує, що кошти можна було б краще витратити на важливіші справи."
  flavor_cas.70.a: "Ми повинні підтримати [target_character.GetHisHer] божественне бачення!"
  flavor_cas.70.b: "Це розкіш, яку ми не можемо собі дозволити."
  flavor_cas.70.historical_info: "Бартоломе Естебан Мурільйо був одним з найвидатніших художників бароко Іспанії, відомим своїми релігійними картинами та теплими, ідеалізованими зображеннями повсякденного життя. Його роботи замовляли церкви, лікарні та приватні меценати, і вони допомогли сформувати візуальну ідентичність іспанського католицизму під час Контрреформації."
  flavor_cas.71.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.71.desc: "Попри тяжкі рани, отримані в попередніх битвах, через які [target_character.GetSheHe] отримав прізвисько #italic Патапало#!, Одноногий, талант [target_character.GetName] на морі не постраждав. Бачивши [target_character.GetHerHis] чимало битв, вік [target_character.GetHerHis] виходу на пенсію наближається. Хоча дехто припускає, що наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] отримає користь від [target_character.GetHerHis] знань, інші пропонують відкласти вихід [target_character.GetHerHis] на пенсію, і Одноногий повинен продовжувати служити флоту."
  flavor_cas.71.a: "Нашому флоту потрібні [target_character.GetHerHis] навички."
  flavor_cas.71.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] отримає користь від [target_character.GetHerHis] знань."
  flavor_cas.71.historical_info: "Блас де Лесо-і-Олаваррієта був одним з найстійкіших і найблискучіших іспанських флотоводців. Попри отримані руйнівні травми, включаючи втрату ноги в битві при Велес-Малазі, ока під час облоги Тулона та руки в битві при Барселоні, він продовжував служити Іспанії з лютою відданістю. Його найвідоміша перемога відбулася в 1741 році, під час битви при Картахені-де-Індіас, де він очолив оборону ключового колоніального порту проти величезного британського флоту під командуванням адмірала Едварда Вернона. Хоча Лесо значно поступався чисельністю, його тактичний геній і майстерність морської війни призвели до катастрофічної поразки британців."
  flavor_cas.72.title: "Етика комерції"
  flavor_cas.72.desc: "Чернець [target_character.GetName] випустив трактат про справедливе ціноутворення та чесну торгівлю, застерігаючи від необмеженої спекуляції та несправедливого збагачення на зростаючих світових ринках. [target_character.GetSheHe|U] стверджує, що надмірний прибуток від монополій та експлуатації порушує [ShowReligionGroupAdjective('christian')|U] моральний закон. Деякі [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] протестують проти [target_character.GetHerHis] втручання, тоді як [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] хвалять [target_character.GetHerHis] голос совісті."
  flavor_cas.72.a: "[target_character.GetHerHis|U] праці повинні керувати нашою політикою."
  flavor_cas.72.b: "[target_character.GetHerHis|U] думка нерелевантна."
  flavor_cas.72.historical_info: "Томас де Меркадо був домініканським ченцем і моральним богословом, який досліджував перетин християнської етики та комерції. Його головна праця, #italic Suma de Tratos y Contratos#!, написана в 1571 році, стала впливовим текстом у католицькій Європі. Він аналізував цінові механізми, справедливу заробітну плату та моральні межі прибутку в світовій торгівлі, що було особливо актуально, коли Іспанія розширювала свою імперію. Він також критикував работоргівлю та монополістичні зловживання."
  flavor_cas.73.title: "[target_character.GetNameWithNoTooltip] та мораль відсотка"
  flavor_cas.73.desc: "[target_character.GetName] привернув увагу в наших колах своїм аргументом, що позичання грошей під відсотки, яке довго вважалося гріховним, є морально виправданим за певних економічних обставин. [target_character.GetHerHis|U] ідеї змінюють позицію Церкви щодо банківської справи, кредиту та інвестицій. [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] тепер має вирішити, чи підтримати цей мінливий моральний погляд для стабілізації фінансів, чи ризикувати відштовхнути консервативний [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  flavor_cas.73.a: "Підтримати [target_character.GetHerHis] погляди."
  flavor_cas.73.b: "Лихварство — це гріх."
  flavor_cas.73.historical_info: "Леонардус Лессіус був економістом єзуїтського ордену, який мав значний вплив на іберійську моральну та економічну думку. У своїй праці #italic De Iustitia et Iure#! він стверджував, що стягнення відсотків не є за своєю суттю аморальним, якщо кредитор несе альтернативні витрати або ризики."
  flavor_cas.74.title: "Подорож [target_character.GetNameWithNoTooltip]"
  flavor_cas.74.desc: "Амбітна експедиція планується під командуванням [target_character.GetName], морського офіцера та вченого, глибоко натхненного ідеалами [ShowInstitutionName('enlightenment')]. [target_character.GetHerHis|U] мета — нанести на карту наші володіння по всьому світу, зібрати наукові дані та доповісти про колоніальну адміністрацію."
  flavor_cas.74.a: "Підтримати подорож."
  flavor_cas.74.b: "Це занадто дорого."
  flavor_cas.74.historical_info: "Алехандро Маласпіна був іспанським морським офіцером та дослідником італійського походження, який очолив експедицію Маласпіни – масштабну наукову та політичну місію через Іспанську імперію, від Південної Америки до Філіппін. Вона прагнула наслідувати досягнення таких капітанів, як Лаперуз і Кук, одночасно оцінюючи стан заморських володінь імперії."
  flavor_cas.75.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.75.desc: "Здібний та амбітний військовий лідер, [target_character.GetName], написав до [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] із запитом про підкріплення. З огляду на зростання напруги в Новому Світі, [target_character.GetSheHe] вважає, що настав час завдати удару по нашим [target_rival.GetAdjective] суперникам та відновити вплив в Америках. Хоча дехто стверджує, що підтримка [target_character.GetHerHis] сміливої ініціативи може принести великі стратегічні винагороди, [ROOT.GetCountry.GetGovernment.GetCourtTitle] не впевнений, чи є проведення агресивної політики гарною ідеєю."
  flavor_cas.75.a: "Підтримати ініціативу."
  flavor_cas.75.b: "Ми не хочемо ризикувати роздратувати [target_rival.GetNameWithNoTooltip]."
  flavor_cas.75.historical_info: "Бернардо де Гальвес був іспанським військовим лідером та колоніальним губернатором, який відіграв вирішальну роль в Американській революційній війні, воюючи в успішних кампаніях проти британців у Мексиканській затоці. Його перемоги допомогли послабити британський контроль в Америках та принесли йому рідкісну честь – фразу #italic 'Yo Solo'#!, що означає 'Я сам', було додано до його герба, символізуючи його ініціативу у веденні військ у бій."
  flavor_cas.76.title: "Героїзм [target_character.GetNameWithNoTooltip]"
  flavor_cas.76.desc: "До [ROOT.GetCountry.GetGovernment.GetCourtTitle] дійшли новини, що під час морської битви біля [target_location.GetName] наш морський командир [target_character.GetName] був смертельно поранений під час битви, але [target_character.GetSheHe] заборонив [target_character.GetHerHis] офіцерам здаватися і продовжував віддавати накази до [target_character.GetHisHer] смерті. Хоча [target_character.GetHisHer] корабель зрештою був втрачений, новини про [target_character.GetHisHer] героїзм швидко поширюються, і наші моряки вшановують [target_character.GetHimHer] як справжнього героя, який загинув, борючись за [target_character.GetHisHer] націю."
  flavor_cas.76.a: "Вшанувати [target_character.GetLastNameWithNoTooltip] як героя."
  flavor_cas.76.historical_info: "Косме Даміан Чуррука був баскським морським офіцером, який загинув під час битви при Трафальгарі, командуючи кораблем #italic San Juan Nepomuceno#!. Чуррука чинив опір британській атаці до самого кінця, продовжуючи командувати навіть після смертельного поранення. Його жертва була визнана посмертним підвищенням до адмірала та наданням його кузену титулу графа Чурруки."
  flavor_cas.77.title: "Прорив братів Ельуяр"
  flavor_cas.77.desc: "Брати-хіміки [target_character.GetShortName] та [target_character2.GetName] здійснили прорив у мінералогії. Їм вдалося виділити вольфрам, важкий та неймовірно міцний метал. Це відкриття може революціонізувати металургію та хімію в наших володіннях. Брати пропонують створити спеціальну дослідницьку програму під нашим патронатом для подальшого вивчення його властивостей та дослідження його промислового потенціалу."
  flavor_cas.77.a: "Профінансувати дослідження."
  flavor_cas.77.b: "Ми не можемо собі цього дозволити."
  flavor_cas.77.historical_info: "У 1783 році Хуан Хосе та Фаусто де Ельуяр, два іспанські хіміки, успішно виділили елемент вольфраму з мінералу вольфраміту. Їхнє відкриття стало значним досягненням в історії хімії та металургії. Унікальні властивості вольфраму, такі як його висока щільність та температура плавлення, пізніше стали незамінними в промислових та військових застосуваннях."
  flavor_cas.78.title: "Філантропічна вакцинаційна експедиція"
  flavor_cas.78.desc: "[target_character.GetName] – лікар, який пропонує безпрецедентну гуманітарну та наукову місію: транспортувати нововідкриту вакцину від віспи через наші володіння для захисту корінного та колоніального населення. Хоча це дорого, цей проєкт може врятувати незліченну кількість життів."
  flavor_cas.78.a: "Схвалити та повністю профінансувати експедицію."
  flavor_cas.78.b: "Схвалити її з частковим фінансуванням."
  flavor_cas.78.c: "Відхилити пропозицію."
  flavor_cas.78.historical_info: "Запущена в 1803 році, експедиція Бальміса була першою у світі міжнародною кампанією з вакцинації. Франсіско Хав'єр де Бальміс очолив місію з транспортування вакцини від віспи по всій Іспанській Америці та Філіппінах, використовуючи хлопчиків-сиріт як живих носіїв вірусу."
  flavor_cas.79.title: "Промислові реформи [target_character.GetNameWithNoTooltip]"
  flavor_cas.79.desc: "[target_character.GetName] нещодавно виступав за економічне відродження [ROOT.GetCountry.GetAdjective] держави. Реформатор та економіст за покликанням, [target_character.GetSheHe] пропонує відродити традиційні галузі промисловості, послабити обмеження гільдій та розширити повноваження регіональних торговельних асоціацій. [target_character.GetHerHis|U] пропозиції кидають виклик усталеним інтересам, але обіцяють економічну життєздатність, особливо для наших міст та виробників."
  flavor_cas.79.a: "Стимулювати промислову реформу."
  flavor_cas.79.b: "Зараз не час для експериментів."
  flavor_cas.79.historical_info: "Педро Родрігес був провідним економістом і державним діячем Іспанії XVIII століття. Він був ключовим радником під час правління Карла III, виступаючи за економічну модернізацію, антиклерикальну реформу та лібералізацію гільдійських монополій. Його праці вплинули на Бурбонські реформи та заклали основу для поступового переходу Іспанії до більш економічно раціоналістичної держави."
  flavor_cas.80.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.80.desc: "[target_character.GetName] — блискучий юрист, економіст і письменник, який став видатним голосом просвітницьких реформ у нашому [ROOT.GetCountry.GetFlavorRank]. [target_character.GetSheHe|U] пропонує амбітний план правових, освітніх та аграрних реформ, спрямованих на збалансування традицій з раціональним прогресом."
  flavor_cas.80.a: "Це надто ідеалістично."
  flavor_cas.80.b: "Просувати реформу."
  flavor_cas.80.historical_info: "Гаспар Мельчор де Ховельянос був ерудитом і державним діячем, який виступав за судову реформу, світську освіту, аграрну модернізацію та економічну лібералізацію. Хоча він зіткнувся з політичним опором і навіть ув'язненням як за монархії, так і за наполеонівського правління, його праці та реформаторський запал залишили тривалу спадщину в іспанській думці та управлінні."
  flavor_cas.81.title: "Космографія [target_character.GetNameWithNoTooltip]"
  flavor_cas.81.desc: "Картограф [target_character.GetName], вчений з [ShowGovernmentReformName('casa_de_contratacion')], представив нам монументальний проєкт. [target_character.GetLastNameWithNoTooltip] бажає створити нову та уніфіковану космографію світу на основі нещодавніх досліджень та наукового методу. Амбіція [target_character.GetHerHis|U] полягає не лише в картографуванні території, а й у структуруванні імперських знань. Однак для досягнення своїх цілей [target_character.GetSheHe] потребуватиме фінансування."
  flavor_cas.81.a: "Забезпечити [target_character.GetHerHim] тим, що [target_character.GetSheHe] потребує."
  flavor_cas.81.b: "У нас вже достатньо карт."
  flavor_cas.81.historical_info: "Алонсо де Санта Крус був істориком, космографом і картографом на службі іспанської корони. Працюючи під керівництвом Карла V та Філіпа II, він намагався створити всеосяжну історію та карту світу, інтегруючи інформацію з іспанських досліджень. Його зусилля сприяли створенню #italic Padrón Real#!, офіційної та надзвичайно секретної головної карти, що використовувалася іспанським флотом."
  flavor_cas.82.title: "Непереможний [target_character.GetNameWithNoTooltip]"
  flavor_cas.82.desc: "Знаменитий адмірал [target_character.GetName] довів [target_character.GetHerselfHimself] як неперевершений морський командир. Протягом своєї кар'єри [target_character.GetSheHe] здобув грандіозні перемоги, які піднесли [target_character.GetHerHim] до легенди. Хоча його майстерність у морському бою високо цінується, дехто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] обговорював надання [target_character.GetHerHim] урядової посади, де його знання та навички могли б бути застосовані ширше."
  flavor_cas.82.a: "Нехай [target_character.GetHerHim] командує флотом."
  flavor_cas.82.b: "[target_character.GetSheHe|U] краще підходить для урядової посади."
  flavor_cas.82.historical_info: "Альваро де Базан був одним із найвидатніших морських командирів Іспанії. Він брав участь у ключових битвах, таких як Лепанто, і розгромив французькі та османські флоти. Відомий тим, що ніколи не програвав битв, він відіграв важливу роль у плануванні Іспанської армади до своєї передчасної смерті."
  flavor_cas.83.title: "Канонізація [target_ruler.GetNameWithNoTooltip]"
  flavor_cas.83.desc: "Пам'ять про [target_ruler.GetName] продовжує надихати відданість по всій землі. Правління [target_ruler.GetHerHis|U] принесло порядок, справедливість та розширення нашій країні. З його побожністю, що зрівнялася лише з його відданістю [ROOT.GetCountry.GetFlavorRank], [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] запропонували офіційно визнати його святість. Тепер [GetUniqueInternationalOrganization('catholic_church').GetName] розглядає можливість надання найвищої честі: канонізації."
  flavor_cas.83.a: "Нехай світ вшанує його святе правління."
  flavor_cas.83.b: "Канонізація непотрібна."
  flavor_cas.83.historical_info: "Фердинанд III Кастильський був канонізований у 1671 році Папою Климентом X за його виняткову відданість католицькій вірі та його роль у християнській Реконкісті Піренейського півострова. Він об'єднав королівства Кастилії та Леону та розширив християнське правління глибоко в Андалусію. Перемоги, яких він досяг проти Халіфату, принесли йому титул «Чемпіона Христа»."
  flavor_cas.84.title: "[ROOT.GetCountry.GetNameWithNoTooltip] та Римська Корона"
  flavor_cas.84.desc: "Завдяки вправній дипломатії, міцним родинним союзам та глибокому резерву впливу, [target_ruler.GetName] забезпечив собі обрання [GetUniqueInternationalOrganization('hre').GetLeaderTitle] [GetUniqueInternationalOrganization('hre').GetName]. Ця честь зміцнить нашу перевагу по всій [ShowContinentName('europe')], але вона також приносить нові обов'язки та небезпеки."
  flavor_cas.84.a: "Ми приймемо нашу імперську долю!"
  flavor_cas.84.historical_info: "Першим іспанським монархом, який став імператором Священної Римської імперії, був Карл V, обраний у 1519 році. Член могутнього дому Габсбургів, Карл успадкував колекцію володінь завдяки шлюбам своїх бабусі та дідуся, католицьких монархів Фердинанда II Арагонського та Ізабелли I Кастильської, а також своєї батьківської габсбурзької лінії. Як імператор, Карл V зіткнувся з величезними викликами: релігійними чварами після реформ Мартіна Лютера, війнами проти Франції та захистом Європи від османської експансії. Його правління ознаменувало пік могутності Габсбургів. Ближче до кінця свого життя, виснажений нескінченними конфліктами, Карл зрікся престолу в 1556 році, розділивши свою імперію між своїм братом Фердинандом, який став римським імператором, і своїм сином Філіпом II, який правив Іспанією та її заморськими володіннями."
  flavor_cas.85.title: "Піренейська унія"
  flavor_cas.85.desc: "Із завершенням Реконкісти та вигнанням маврів з наших земель ми здійснили об’єднання [ShowReligionGroupAdjective('christian')|U] корон [ShowRegionName('iberia_region')] під владою єдиного монарха. Такої єдності не було з часів вестготських королів. Від [ShowLocationName('lisbon')] до [ShowLocationName('barcelona')] усі тепер схиляються перед єдиним суверенним Хрестом та [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_cas.85.a: "Керувати нашими володіннями з повагою до їхніх традицій."
  flavor_cas.85.b: "Ми повинні прагнути централізувати корони."
  flavor_cas.85.historical_info: "Піренейська унія була династичним союзом між Іспанією та Португалією, що тривав з 1580 по 1640 рік. Вона була спричинена смертю короля Португалії Себастьяна та його літнього наступника Генріха, що залишило Португалію без явного спадкоємця. Король Іспанії Філіп II, онук Мануеля I Португальського, заявив свої права на португальський трон через свою материнську лінію. Філіп II був визнаний королем Португалії після короткої військової кампанії, об'єднавши корони Кастилії, Арагону та Португалії під іспанськими Габсбургами. Однак Португалія зберегла окремі адміністративні установи, закони та колоніальні володіння. Унія закінчилася через Португальську реставраційну війну 1640-1668 років, яка відновила португальську незалежність під владою Браганської династії."
  flavor_cas.86.title: "[target_character.GetNameWithNoTooltip] та місія Нового Світу"
  flavor_cas.86.desc: "Брат [target_character.GetName] звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle] з незвичайною пропозицією. Натхненний гуманістичними ідеалами знань та розуміння, [target_character.GetSheHe] бажає вирушити в подорож до Нового Світу. [target_character.GetHerHis|U] мета — вивчити традиції, мови та звичаї наших [ShowCultureName('nahua_culture')] підданих у [ShowRegionNameWithNoTooltip('mesoamerica_region')]. Хоча таке починання може здатися незвичайним, глибше розуміння людей, якими ми керуємо, може допомогти їхній кращій інтеграції в [ShowReligionGroupAdjective('christian')|U] світ."
  flavor_cas.86.a: "Надати [target_character.GetHerHim] прохід."
  flavor_cas.86.b: "Відмовити в проханні."
  flavor_cas.86.historical_info: "Бернардіно де Саагун був іспанським францисканським ченцем, місіонером та етнографом. Після подорожі до Нової Іспанії у 1529 році він присвятив себе не лише наверненню корінних народів, а й безпрецедентному вивченню їхньої культури, вірувань, історії та мов. Його глибока повага до місцевих традицій відрізняла його від багатьох сучасників. Саагун опанував мову науатль і вірив, що розуміння їхньої культури є ключовим для справжнього навернення їх до християнства, а не лише для нав'язування віри силою."
  flavor_cas.87.title: "$florentine_codex$"
  flavor_cas.87.desc: "Після років досліджень, збору свідчень та вивчення мов наших [ShowCultureName('nahua_culture')] підданих, [target_character.GetName] опублікував свою велику працю: $florentine_codex$. Цей надзвичайний рукопис каталогізує звичаї, соціальну структуру, міфологію та повсякденне життя [ShowCultureNameWithNoTooltip('nahua_culture')] народів з небаченою раніше глибиною. Однак дехто з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] побоюється, що таке співчутливе зображення язичницьких звичаїв може бути небезпечним."
  flavor_cas.87.a: "Це допоможе нам краще зрозуміти наших підданих."
  flavor_cas.87.b: "Язичницькі звичаї мають бути забуті, а не збережені."
  flavor_cas.87.historical_info: "#italic Historia general de las Cosas de Nueva España#!, нині більш відома як Флорентійський кодекс, є magnum opus Бернардіно де Саагуна. Це монументальна дванадцятитомна етнографічна енциклопедія народів Мексики, що розмовляли науатлем. Складена в середині-кінці XVI століття, праця документувала все: від богів і релігійних ритуалів до економічних практик і повсякденного життя. Написана як іспанською, так і науатлем, вона вважається неперевершеним джерелом з доколумбової та ранньої колоніальної історії Мексики."
  flavor_cas.88.title: "Експедиція [target_character.GetNameWithNoTooltip]"
  flavor_cas.88.desc: "Досвідчений моряк та августинський чернець, [target_character.GetName], запропонував сміливе підприємство. [target_character.GetSheHe|U] бажає прокласти безпечний зворотний шлях через Тихий океан від [ShowRegionName('indonesia_region')] до [ShowRegionName('mesoamerica_region')]. [target_character.GetHerHis|U] величезний досвід у дослідженні може забезпечити нам життєво важливу комерційну та стратегічну перевагу на морях."
  flavor_cas.88.a: "Фінансувати [target_character.GetHerHis] експедицію."
  flavor_cas.88.b: "Це не варте ризику."
  flavor_cas.88.historical_info: "Андрес де Урданета був іспанським навігатором і ченцем, який відомий тим, що відкрив східний зворотний шлях через Тихий океан, відомий як Маршрут Урданети або #italic Торнавіахе#!. Його відкриття було вирішальним для встановлення торгівлі манільськими галеонами, що зв'язувала Азію з Америкою, а потім з Іспанією."
  flavor_cas.89.title: "Ель Дівино"
  flavor_cas.89.desc: "[target_character.GetName], вчений поет, відомий у [ShowLocationName('sevilla')] як #italic Ель Дівино#!, став провідною фігурою в місцевій літературі. [target_character.GetHerHis|U] майстерність петрарківського вірша, наукові коментарі та патріотичні оди, що прославляють наші перемоги, принесли [target_character.GetHerHim] як захоплення, так і заздрість серед літературної еліти. Дехто з [ROOT.GetCountry.GetGovernment.GetCourtTitle] закликає нас офіційно визнати [target_character.GetHerHis] геній, запропонувавши [target_character.GetHerHim] наше покровительство."
  flavor_cas.89.a: "Запропонувати [target_character.GetHerHim] покровительство."
  flavor_cas.89.b: "Ми повинні зосередитися на важливіших справах."
  flavor_cas.89.historical_info: "Фернандо де Еррера, відомий як #italic Ель Дівино#!, був важливою літературною та інтелектуальною фігурою Золотого віку Іспанії. Його творчість поєднувала емоційну тонкість з інтелектуальною вагою. Сонети, оди та елегії Еррери оспівували як особисті почуття, так і національний героїзм. Його відданість удосконаленню мови та піднесенню іспанської поезії зробила його однією з найважливіших літературних постатей свого часу."
  flavor_cas.90.title: "Орфографічна реформа [target_character.GetLastNameWithNoTooltip]"
  flavor_cas.90.desc: "[target_character.GetName], якому ми раніше надавали заступництво, виступив із пропозицією великої орфографічної реформи нашої мови. Спираючись на класичну [ShowLanguageName('latin_language')] та глибоке прагнення до ясності, [target_character.GetLastNameWithNoTooltip] виступає за більш раціональну, фонетичну орфографію. [target_character.GetHerHis|U] пропозиції включають спрощене використання приголосних, чіткіше розрізнення між голосними та напівголосними, і навіть використання апострофів для кращої імітації витонченої поетичної елізії. Хоча деякі вчені зустріли це з захопленням, інші вважають пропозицію руйнівною або непотрібною, побоюючись, що впровадження цих реформ буде не тільки дорогим, але й потенційно матиме дестабілізуючий характер через значне втручання в мову."
  flavor_cas.90.a: "Нехай мова розвивається своїм шляхом."
  flavor_cas.90.b: "Просувати реформу."
  flavor_cas.90.c: "Заборонити це! Мова – це традиція, а не експеримент!"
  flavor_cas.90.historical_info: "На додаток до свого внеску в поезію іспанського Золотого віку, Фернандо де Еррера був амбітним реформатором іспанської мови. Еррера вірив, що елегантність і точність поезії вимагають більш послідовної та раціональної орфографії. У своїх #italic Algunas obras#! він запропонував кілька орфографічних змін, але його ідеї не отримали широкого визнання."
  flavor_cas.91.title: "Сатиричне перо [target_character.GetNameWithNoTooltip]"
  flavor_cas.91.desc: "[target_character.GetName], майстер дотепності та сатири, здобув славу по всій землі завдяки [target_character.GetHerHis] нищівній критиці корупції та морального занепаду. [target_character.GetSheHe|U] звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle], пропонуючи [target_character.GetHerHis] послуги як хроніста та пропагандиста. Однак [target_character.GetHerHis] гострий язик міг би так само легко обернутися проти нас, якщо не поводитися обережно."
  flavor_cas.91.a: "Вітаємо [target_character.GetHerHim] у [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_cas.91.b: "Нам краще триматися подалі від [target_character.GetHerHim]."
  flavor_cas.91.historical_info: "Франсіско де Кеведо був іспанським дворянином, політиком і одним з найвидатніших письменників Золотого віку Іспанії. Його твори включали їдкі сатири, барокову поезію та нищівні політичні коментарі, які відображали бурхливість його часів. Хоча Кеведо був глибоко відданий Іспанії, він часто критикував і натякав на моральний та політичний занепад, свідком якого він був. У своїх творах він часто виявляв антипатію до різних груп людей, що робило його як знаменитим, так і суперечливим протягом його життя."
  flavor_cas.92.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.92.desc: "[target_character.GetName], офіцер, що став священиком і драматургом, є видатним митцем, якого багато хто вважає наступником найвеличніших митців нашого минулого. [target_character.GetHerHis|U] драматичні твори торкаються питань долі, честі та людської душі. [target_character.GetHerHis|U] п'єси в [ShowBuildingTypeName('theater')] [ROOT.GetCountry.GetCapital.GetName] широко користуються популярністю серед мас, а [target_character.GetHerHis] майстерність цього мистецтва привнесла глибоку філософську глибину на сцену. Через це багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонують надати [target_character.GetHerHim] заступництво."
  flavor_cas.92.a: "[target_character.GetHerHis|U] драми – національний скарб!"
  flavor_cas.92.b: "Занадто похмуро для нашого смаку."
  flavor_cas.92.historical_info: "Педро Кальдерон де ла Барка часто вважається останньою великою фігурою Золотого віку іспанської літератури. Кальдерон досліджував такі теми, як доля, честь та напруга між ілюзією та реальністю. Його шедевр #italic La vida es sueño#! залишається однією з найвпливовіших п'єс у світовій літературі. Призначений офіційним придворним драматургом, Кальдерон також написав численні релігійні алегорії, що виконувалися під час #italic Corpus Christi#!. Його прозвали «іспанським Шекспіром» і він є одним з національних поетів Іспанії."
  flavor_cas.93.title: "Фенікс дотепності"
  flavor_cas.93.desc: "Оскільки театральні вистави стають масовою культурою, [target_character.GetName] здобуває широку популярність. [target_character.GetSheHe|U] є плідним драматургом, поетом і солдатом, якому вдалося вразити націю [target_character.GetHerHis] літературним доробком та емоційною глибиною [target_character.GetHerHis] п'єс. [target_character.GetHerHis|U] популярні твори, безсумнівно, трансформують сцену і допомагають донести культуру до [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] і навіть до [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які досі не виявляли великого інтересу до культури. Можливо, нам варто розглянути можливість підтримки [target_character.GetHerHim] у [target_character.GetHerHis] зусиллях."
  flavor_cas.93.a: "Відсвяткувати [target_character.GetHerHis] геній."
  flavor_cas.93.b: "Такі п'єси – лише відволікання."
  flavor_cas.93.historical_info: "Лопе де Вега був одним з найплідніших драматургів в європейській історії, автором понад 1800 п'єс, сотень сонетів, а також незліченних новел і релігійних творів. Він був майстром #italic Comedia Nueva#! і допоміг переосмислити іспанську драму, поєднавши класичну структуру з популярністю."
  flavor_cas.94.title: "Зіткнення культеранізму та концептізму"
  flavor_cas.94.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] опинився втягнутим у запеклий літературний конфлікт, що виходить далеко за межі простих слів. З одного боку стоїть [target_character.GetName], майстер #italic Culteranismo#!, чиї витончені метафори та естетична велич п'янять [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] і спантеличують [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Йому протистоїть [target_character2.GetName], поборник #italic Conceptismo#!, гостроязикий сатирик і філософський поет, чий лаконічний дотеп і колюча мова вражають з хірургічною точністю. Те, що починалося як літературна дискусія, перетворилося на публічні глузування, наклепницькі памфлети та дуельні сонети, і тому настав час для [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] втрутитися та знайти рішення."
  flavor_cas.94.a: "Ми станемо на бік [target_character.GetNameWithNoTooltip]."
  flavor_cas.94.b: "Натомість підтримати [target_character2.GetNameWithNoTooltip]."
  flavor_cas.94.historical_info: "У XVI та XVII століттях іспанська літературна культура була під впливом двох протилежних стилів: #italic культеранізму#!, який наголошував на витіюватій, піднесеній мові та метафорі, та #italic концептуалізму#!, який цінував гострий дотеп, стислість та концептуальне багатство. Суперництво між їхніми представниками було легендарним. Ці полеміки були не лише літературними, оскільки вони відображали глибші напруження між аристократичним смаком та суспільною доступністю, ідеалізмом та реалізмом."
  flavor_cas.95.title: "Небезпечні публікації [target_character.GetNameWithNoTooltip]"
  flavor_cas.95.desc: "Вчений єзуїт [target_character.GetName] опублікував сміливий трактат, у якому припускає, що тиранічних правителів можна справедливо скинути, навіть убити. Хоча праці [target_character.GetHerHis] приховані в схоластичних міркуваннях та теології, їхні наслідки є глибоко політичними. Дехто каже, що ідеї [target_character.GetHerHis] небезпечні, тоді як інші називають їх необхідними для притягнення правителів до моральної відповідальності."
  flavor_cas.95.a: "Заборонити цю радикальну доктрину."
  flavor_cas.95.b: "Прийняти бачення [target_character.GetHerHis] відповідальності в монархії."
  flavor_cas.95.historical_info: "Хуан де Маріана був єзуїтським істориком і політичним мислителем, чия найвідоміша праця, #italic De Rege et Regis Institutione#!, виправдовувала тирановбивство з моральних і теологічних міркувань. Його аргумент, що народ може чинити опір або навіть усувати несправедливих королів, вважався радикальним у ранньомодерній Європі."
  flavor_cas.96.title: "Реформаторська ревність [target_character.GetNameWithNoTooltip]"
  flavor_cas.96.desc: "Кармелітська черниця, [target_character.GetName], здобула популярність завдяки [target_character.GetHerHis] невтомній відданості, глибоким містичним творам та невпинному бажанню відновити духовну чистоту в чернечому житті. Рух [target_character.GetHerHis|U] реформ, відомий як Босі Кармеліти, закликає до повернення до суворого аскетизму, спільної бідності та споглядальної молитви. Хоча деякі в [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] чинять опір впливу [target_character.GetHerHis], багато інших бачать у [target_character.GetHerHim] маяк духовного оновлення, який має бути підтриманий [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_cas.96.a: "Підтримати реформи [target_character.GetHerHis]."
  flavor_cas.96.b: "Дозволити Церкві вирішувати це самостійно."
  flavor_cas.96.historical_info: "Тереза Авільська була містиком, реформатором і засновницею руху Босих Кармелітів, який наголошував на бідності, молитві та духовній дисципліні. Її праці, включаючи «Шлях досконалості» та «Внутрішній замок», принесли їй як визнання, так і підозри. Пізніше до неї приєдналися та підтримали союзники, такі як Іван від Хреста, і її реформи поширилися по всій Іспанії, незважаючи на опір консервативних церковних властей. Їй навіть протистояла інквізиція, але жодних звинувачень не було висунуто, і її зусилля зрештою призвели до розколу її ордену."
  flavor_cas.97.title: "Канонізація [target_character.GetNameWithNoTooltip]"
  flavor_cas.97.desc: "Через багато років після смерті [target_character.GetHerHis], [target_character.GetName] все ще викликає благоговіння серед вірних. Твори [target_character.GetHerHis|U] продовжують живити душу, духовні реформи [target_character.GetHerHis] пережили опір, а розповіді про чудотворне заступництво оточують гробницю [target_character.GetHerHis]. Зі зростаючим шануванням настав час розглянути офіційне визнання святості [target_character.GetHerHis]."
  flavor_cas.97.a: "Нехай усе християнство знає ім'я [target_character.GetHerHis]!"
  flavor_cas.97.b: "Канонізація непотрібна."
  flavor_cas.97.historical_info: "Тереза Авільська була канонізована 1622 року Папою Григорієм XV і проголошена Вчителем Церкви 1970 року Папою Павлом VI. Її містична теологія та реформаторський рух глибоко вплинули на іспанський католицизм під час Контрреформації. Навіть століттями пізніше її праці та духовні прозріння залишаються впливовими в усьому католицькому світі."
  flavor_cas.98.title: "Канонізація [target_character.GetNameWithNoTooltip]"
  flavor_cas.98.desc: "Після десятиліть проповідування, написання та заснування семінарій по всьому світу, вплив [target_character.GetName] залишається непохитним. Послідовники [target_character.GetHerHis|U] формували університети, радили королям та чинили опір єретичній хвилі. [ROOT.GetCountry.GetGovernment.GetCourtTitle] було повідомлено, що [GetUniqueInternationalOrganization('catholic_church').GetName] відкрила шлях до канонізації, тому, можливо, було б мудро підтримати це піднесення."
  flavor_cas.98.a: "[target_character.GetSheHe|U] був святим [target_character.GetWomanMan], який цього заслуговує."
  flavor_cas.98.b: "Нехай єзуїти продовжують спадщину [target_character.GetHerHis] без святості."
  flavor_cas.98.historical_info: "Ігнатій був канонізований 1622 року Папою Григорієм XV. Його «Духовні вправи» стали основоположним текстом для католицької побожності, а єзуїтський орден сформував глобальне поширення католицизму. Він залишається однією з найвпливовіших постатей Католицької Реформації та глобальної релігійної освіти."
  flavor_cas.99.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.99.desc: "Кармелітський чернець, [target_character.GetName], більш відомий як Хуан де Санто Матіа, став поетичною душею реформаторського духу. [target_character.GetSheHe|U] є супутником [target_character.GetName2], і [target_character.GetSheHe] відстоює рух Босих [target_character2.GetHerHis] з жорсткою дисципліною та божественним містицизмом. [target_character.GetSheHe|U] опублікував багато праць про сходження душі крізь темряву до божественного єднання, теологію як глибоку, так і суперечливу. Хоча ми раніше підтримували наставника [target_character.GetHerHis], багато хто побоюється, що подальша підтримка їхнього містицизму межує з єрессю."
  flavor_cas.99.a: "Продовжувати підтримувати ці містичні вчення."
  flavor_cas.99.b: "Придушити такий містицизм, перш ніж він поширить плутанину."
  flavor_cas.99.historical_info: "Хуан де Єпес Альварес був іспанським містиком, поетом і реформатором, чиї духовні твори змінили кармелітську теологію. Ув'язнений і переслідуваний нереформованими ченцями, він став символом духовної стійкості та літературного блиску, пізніше визнаний одним із найвидатніших поетів іспанської мови."
  flavor_cas.100.title: "Канонізація [target_character.GetNameWithNoTooltip]"
  flavor_cas.100.desc: "Через роки після [target_character.GetHerHis] смерті слова [target_character.GetName] продовжують лунати в наших церквах і монастирях. [target_character.GetHerHis|U] містична теологія здобула схвалення навіть у серці [GetUniqueInternationalOrganization('catholic_church').GetName]. [target_character.GetHerHis|U] поезія шанується, а [target_character.GetHerHis] послідовники виступають за канонізацію."
  flavor_cas.100.a: "[target_character.GetHerHis|U] праця осяяла весь [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_cas.100.b: "Немає потреби в канонізації."
  flavor_cas.100.historical_info: "Хуан де Єпес і Альварес, який пізніше став відомим як Святий Іван від Хреста, був канонізований у 1726 році Папою Бенедиктом XIII. Його містичні твори, такі як «Темна ніч душі», «Духовний гімн» та «Сходження на гору Кармель», стали стовпами католицької побожної літератури та були високо оцінені за їхню поетичну та теологічну геніальність."
  flavor_cas.101.title: "[ShowGovernmentReformNameWithNoTooltip('royal_council_of_castile')]"
  flavor_cas.101.desc: "Занадто довго [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] було скуто примхами дрібних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та неефективною сукупністю місцевих юрисдикцій. [ShowGovernmentReformName('royal_council_of_castile')], запропонована [target_character.GetName] та підтримана як реформаторами, так і роялістами, пропонує бачення більш централізованої, професійно керованої держави. Надавши раді повноваження наглядати за збором податків, судовими справами та призначеннями, ми могли б краще спрямовувати ресурси [ROOT.GetCountry.GetFlavorRank] на національні інтереси, а не на поблажливість місцевих губернаторів."
  flavor_cas.101.a: "Нехай рада наглядає за [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.101.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не терпітиме такого втручання."
  flavor_cas.101.historical_info: "Королівська та Верховна Рада Кастилії була заснована наприкінці XV століття за часів Католицьких Монархів, Фердинанда II Арагонського та Ізабелли I Кастильської. Спочатку середньовічний дорадчий орган, Рада була перетворена на центральний інструмент королівської влади. Вона служила для обмеження влади високої знаті, обходу місцевих привілеїв та професіоналізації управління через призначення юристів та бюрократів з університетською освітою, які служили інтересам королівства."
  flavor_cas.102.title: "Декрети [ShowGovernmentReformNameWithNoTooltip('nueva_planta')]"
  flavor_cas.102.desc: "Оскільки нинішня епоха характеризується зусиллями з централізації влади, багато хто припускає, що настав час нарешті об'єднати нашу сукупність королівств під єдиною правовою та адміністративною системою. Традиційні #italic Фуерос#! та привілеї [ShowAreaName('aragon_area')], [ShowAreaName('catalonia_area')] та [ShowAreaName('valencia_area')] довго чинили опір [ROOT.GetCountry.GetGovernment.GetAdjective] владі, але смілива законодавча реформа, [ShowGovernmentReformName('nueva_planta')], ліквідувала б ці окремі закони та повністю інтегрувала їх у централізовану [ROOT.GetCountry.GetAdjective] державу."
  flavor_cas.102.a: "Ми повинні централізувати націю."
  flavor_cas.102.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('aragon_area')], [ShowAreaName('catalonia_area')] та [ShowAreaName('valencia_area')] отримає [ShowModifier('spa_implemented_nueva_planta')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 20#! років"
  flavor_cas.102.b: "Зберегти традиційні регіональні свободи."
  flavor_cas.102.historical_info: "Декрети Нової Планта були серією законів, прийнятих Філіпом V між 1707 і 1716 роками після Війни за іспанську спадщину, спрямованих на об'єднання Іспанії під бурбонським абсолютизмом. Ці реформи скасували окремі правові системи та інститути Арагонської Корони та фактично ліквідували їхні історичні привілеї."
  flavor_cas.103.title: "Майстер священного реалізму"
  flavor_cas.103.desc: "Видатний художник, [target_character.GetName] здобуває славу завдяки [target_character.GetHerHis] глибоко духовним композиціям та дуже інноваційному використанню світлотіні. [target_character.GetHerHis|U] картини зображують монастирське життя, біблійні сцени та мучеництво з урочистістю. Деякі пропонують надати [target_character.GetHerHim] замовлення на прикрашання наших церков та сприяння релігійній побожності по всьому [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.103.a: "Нехай [target_character.GetHerHim] прославляє нашу віру на полотні!"
  flavor_cas.103.b: "Ми не можемо дозволити собі меценатство в цей час."
  flavor_cas.103.historical_info: "Франсіско де Сурбаран був іспанським художником бароко, переважно пов'язаним з духовними картинами та акцентом Контрреформації на візуальній побожності. Стиль Сурбарана поєднував реалізм з містичним освітленням, а його здатність зображувати тихе споглядання робила його роботи дуже унікальними навіть серед мистецтва іспанського Золотого віку."
  flavor_cas.104.title: "Винахідливий [target_character.GetNameWithNoTooltip]"
  flavor_cas.104.desc: "До нашої уваги було доведено, що [target_character.GetName] запропонував низку неймовірних парових машин, призначених для відкачування води з шахт. [target_character.GetHerHis|U] робота охоплює металургію, гідрологію та навіть водолазні костюми. Хоча деякі при [ROOT.GetCountry.GetGovernment.GetCourtTitle] сміються з [target_character.GetHerHis] механічних пристроїв, інші шепочуть, що [target_character.GetSheHe] може випереджати [target_character.GetHerHis] час, пропонуючи нам розглянути можливість субсидування [target_character.GetHerHis] досліджень."
  flavor_cas.104.a: "Підтримати [target_character.GetHerHis] революційні двигуни."
  flavor_cas.104.b: "Цікавість, але не більше."
  flavor_cas.104.historical_info: "Херонімо де Аянс-і-Беаумонт був солдатом, винахідником та адміністратором, найбільш відомим завдяки створенню раннього парового пристрою в 1606 році. Він використовував свої винаходи для покращення безпеки та ефективності шахт на багатих мінералами територіях Іспанії. Його розробки випередили Промислову революцію більш ніж на століття."
  flavor_cas.105.title: "Спалах [ShowDiseaseNameWithNoTooltip('smallpox')|U] у [ShowRegionNameWithNoTooltip('mesoamerica_region')]"
  flavor_cas.105.desc: "Страшні новини з наших територій у Новому Світі розповідають про масову загибель серед корінних народів. [ShowDiseaseName('smallpox')|U], жахлива хвороба, ймовірно, завезена через океан нашими власними людьми, лютує в поселеннях [ShowRegionName('mesoamerica_region')]. Уражені гинуть натовпами, і, ймовірно, цілі поселення будуть стерті з карти, якщо ми не діятимемо швидко."
  flavor_cas.105.a: "Нам бракує будь-яких засобів, щоб зупинити це."
  flavor_cas.105.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('mesoamerica_region')], що належить [ROOT.GetCountry.GetName] або нашим [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e], отримає [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] [ShowModifier('spa_severe_smallpox_outbreak')] на #Y 20#! років"
  flavor_cas.105.b: "Ми повинні зробити все можливе, щоб зупинити поширення!"
  flavor_cas.105.b.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('mesoamerica_region')], що належить [ROOT.GetCountry.GetName] або нашим [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e], отримає [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] [ShowModifier('spa_mild_smallpox_outbreak')] на #Y 20#! років"
  flavor_cas.105.historical_info: "Запровадження хвороб Старого Світу, таких як віспа, кір та грип, спустошило корінне населення Америки. Ці хвороби швидко поширювалися, і за оцінками, від 50% до 90% корінного мезоамериканського населення загинуло в десятиліття після контакту."
  flavor_cas.106.title: "Завоювання [ShowLocationNameWithNoTooltip('tenochtitlan')]"
  flavor_cas.106.desc: "[ShowLocationName('tenochtitlan')], колись сліпучий мегаполіс високих храмів, широких каналів та процвітаючих ринків, тепер лежить у руїнах. Захисники билися з відчайдушною відвагою, але вони не змогли протистояти об'єднаній силі нашої зброї. Із захопленням їхньої столиці та смертю їхніх лідерів, їхня владна структура була непоправно зруйнована."
  flavor_cas.106.a: "Новий світанок для [ShowRegionNameWithNoTooltip('mesoamerica_region')]."
  flavor_cas.106.historical_info: "Падіння Теночтітлана в 1521 році ознаменувало крах імперії ацтеків. Ернан Кортес, за допомогою тисяч корінних союзників, облягав місто місяцями. Після жорстокого фінального штурму останній імператор ацтеків Куаутемок був схоплений, а колись славетна острівна столиця перетворилася на руїни."
  flavor_cas.107.title: "Завоювання [ShowLocationNameWithNoTooltip('qusqu')]"
  flavor_cas.107.desc: "Наші сили взяли [ShowLocationName('qusqu')], священний [target_location.GetRank.GetName] [ShowCultureName('inka_culture')]. Незважаючи на міць та організованість андських народів, наша сталь та коні перемогли. Скарбів, захоплених лише з Храму Сонця, достатньо, щоб профінансувати цілі експедиції. Оскільки останні залишки імперського правління [ShowCultureNameWithNoTooltip('inka_culture')] були знищені, наше панування над [ShowRegionName('andes_region')] більше не зіткнеться з опором корінних народів."
  flavor_cas.107.a: "Тріумфальна перемога!"
  flavor_cas.107.historical_info: "Куско, столиця імперії інків, було захоплено іспанцями під проводом Франсіско Пісарро в 1533 році після захоплення та страти імператора Атауальпи. Завоювання було відзначене зрадою, внутрішньою громадянською війною інків та приголомшливим грабунком. Падіння Куско стало останнім ударом по найбільшій імперії доколумбової Південної Америки."
  flavor_cas.108.title: "Заснування Мехіко"
  flavor_cas.108.desc: "Зі старою столицею [ShowCultureName('nahua_culture')], перетвореною на руїни, та їхнім імперським порядком, що розпався, настав час почати все заново. Багато хто пропонував перетворити руїни старого міста на центр нашої влади в регіоні, який відображатиме не криваві жертвоприношення та язичницьке ідолопоклонство, а славу християнства та силу [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_cas.108.a: "Нехай воно буде відоме як $mexico_city$."
  flavor_cas.108.b: "Залишити як є."
  flavor_cas.108.historical_info: "Після завоювання імперії ацтеків у 1521 році іспанська корона зіткнулася із завданням встановлення постійного контролю над своїми величезними новими володіннями. У 1524 році Сьюдад-де-Мехіко було офіційно засновано на руїнах Теночтітлана і швидко стало політичною, релігійною та економічною столицею Нової Іспанії."
  flavor_cas.109.title: "Нова столиця Перу"
  flavor_cas.109.desc: "Оскільки наш плацдарм у [ShowRegionName('andes_region')] зміцнюється, настав час заснувати місто, яке слугуватиме центром адміністрації та торгівлі. Місце поблизу річки Рімак пропонує м'який клімат, родючий ґрунт та доступ до Тихого океану – ідеальні умови для нової столиці."
  flavor_cas.109.a: "Заснувати новий центр влади."
  flavor_cas.109.b: "Такий проєкт надто дорогий."
  flavor_cas.109.historical_info: "Ліма була заснована Франсіско Пісарро в 1535 році, щоб служити адміністративною столицею Віцекоролівства Перу. Тоді вона була відома як #italic Ciudad de los Reyes#!, названа на честь дня Богоявлення, в який вона була заснована. Її стратегічне розташування на тихоокеанському узбережжі зробило її головним центром влади в іспанській Південній Америці. З часом Ліма перетворилася на одне з найбагатших і найвпливовіших міст Нового Світу."
  flavor_cas.110.title: "Поклади [ShowGoodsNameWithNoTooltip('silver')|U] в [ShowRegionNameWithNoTooltip('andes_region')]"
  flavor_cas.110.desc: "Наші шахтарі повідомляють про виявлення величезних покладів [ShowGoodsName('silver')] поблизу [ShowLocationName('sumaq_urqu_mountains')]. За належних інвестицій ми могли б перетворити це безлюдне високогір'я на серце імперських фінансів. Однак організація місцевої праці, забезпечення транспортування та створення інфраструктури для виплавки вимагатимуть значних інвестицій."
  flavor_cas.110.a: "Негайно розпочати видобувні роботи."
  flavor_cas.110.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('andes_region')], що виробляє [ShowGoodsName('silver')], отримає [ShowModifier('spa_potosi_silver')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 20#! років"
  flavor_cas.110.b: "Не будемо порушувати місцевий ландшафт."
  flavor_cas.110.b.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('andes_region')], що виробляє [ShowGoodsName('silver')], отримає [ShowNamedValue('prosperity_severe_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_cas.110.historical_info: "У 1545 році тубілець на ім'я Дієго Гуальпа виявив срібло біля підніжжя гори Серро-Ріко, поблизу сучасного Потосі в Болівії. Ця знахідка швидко стала найбагатшим родовищем срібла у світі, яке живило іспанську економіку понад два століття."
  flavor_cas.111.title: "Піднесення Потосі"
  flavor_cas.111.desc: "Оскільки невпинна привабливість [ShowGoodsName('silver')] продовжує змінювати [ShowRegionName('andes_region')], люди з усього [ROOT.GetCountry.GetFlavorRank] стікаються до [target_location.GetName], яке стало гірничодобувною столицею регіону. [target_location.GetRank.GetName] тепер розростається будівлями та пульсує комерцією, явно заслуживши назву #italic Cerro Rico#!, «Багата Гора»."
  flavor_cas.111.a: "Нехай Потосі стане міським серцем регіону!"
  flavor_cas.111.historical_info: "До кінця 16 століття Потосі перетворилося з гірничого табору на одне з найлюдніших і найкосмополітичніших міст Америки. З орієнтовною чисельністю населення, що наближалася до 150 000 на піку, воно стало магнітом для шукачів щастя, адміністраторів, духовенства, а також примусової праці корінних народів."
  flavor_cas.112.title: "Запровадження [ShowEstatePrivilegeNameWithNoTooltip('cas_mita_system')]"
  flavor_cas.112.desc: "Щоб підвищити ефективність нашого видобутку, колоніальні адміністратори розглядають можливість запровадження стародавніх звичаїв [ShowCultureName('inka_culture')] для вирішення проблеми. [ShowEstatePrivilegeName('cas_mita_system')], ротаційна система примусової праці, яку вони використовували протягом поколінь, стала прецедентом для організації величезної кількості корінної робочої сили. Адаптувавши цю систему, ми можемо значно збільшити видобуток срібла, хоча багато хто побоюється, що це призведе до великих людських втрат і широкомасштабних заворушень."
  flavor_cas.112.a: "Адаптувати систему для власного використання."
  flavor_cas.112.b: "Ми не вдаватимемося до такої жорстокості."
  flavor_cas.112.historical_info: "Щоб підтримувати величезне виробництво срібла на #italic Cerro Rico#! в Потосі, іспанська колоніальна влада адаптувала доколумбову систему Міта, спочатку використовувану інками для громадських робіт. Система змушувала тисячі корінних чоловіків до жорстоких циклів примусової праці. Хоча це допомогло Потосі стати одним з економічних двигунів Іспанської імперії, втрати серед корінного населення були руйнівними, багато хто гинув через суворі умови."
  flavor_cas.113.title: "Забутий Відкривач"
  flavor_cas.113.desc: "Чоловік [ShowCultureName('charka_culture')] на ім'я [target_character.GetName] першим виявив багаті срібні жили в горах поблизу [ShowLocationName('colquechaca')]. Ходять чутки, що [target_character.GetSheHe] натрапив на срібло, шукаючи загублену ламу, і розвів вогонь, щоб зігрітися, лише щоб знайти розплавлене срібло, що виблискувало у вугіллі. Проте, незважаючи на значущість [target_character.GetHisHer] відкриття, [target_character.GetLastNameWithNoTooltip] не отримав ані пошани, ані нагороди. Багато наших власних відкидають [target_character.GetHisHer] роль і приписують славу нашим капітанам, тоді як [target_character.GetHisHer] співвітчизники засуджують [target_character.GetHimHer] як зрадника за розкриття багатства священної гори чужим рукам."
  flavor_cas.113.a: "[target_character.GetSheHe|U] виконав [target_character.GetHisHer] призначення для нас."
  flavor_cas.113.b: "Компенсувати [target_character.GetHimHer] за відкриття та надати [target_character.GetHimHer] захист."
  flavor_cas.113.historical_info: "Дієго де Уальпа приписують випадкове відкриття срібних жил у Серро-Ріко в Потосі близько 1545 року. Його знахідка, спричинена вогнем, розведеним холодної ночі, стала основою однієї з найбагатших срібних копалень у світовій історії. Проте він отримав мало визнання. Його внесок применшувався іспанською владою, а лідери опору корінних народів засуджували та погрожували йому за розкриття священної гори."
  flavor_cas.114.title: "Королівські мануфактури"
  flavor_cas.114.desc: "Наші радники представили сміливу економічну пропозицію для подальшого розвитку меркантилістських реформ. [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] створить мережу королівських мануфактур, присвячених виробництву предметів розкоші, текстилю, порцеляни, зброї та інших стратегічних матеріалів. Очікується, що ця реформа як зменшить нашу залежність від іноземного імпорту, так і стимулюватиме внутрішнє виробництво."
  flavor_cas.114.a: "Ухвалити реформу."
  flavor_cas.114.b: "Залишити це приватним підприємствам та гільдіям."
  flavor_cas.114.c: "Нам нічого з цього не потрібно."
  flavor_cas.114.historical_info: "Королівські мануфактури були централізованими промисловими об'єктами, створеними в рамках меркантилістської політики, натхненної французьким #italic Ancien Régime#!. В Іспанії бурбонські монархи заснували або спонсорували десятки королівських мануфактур, що виробляли все: від порцеляни, шовку та тканини до зброї, тютюну та лікеру. Черпаючи натхнення з кольбертизму, ця економічна доктрина прагнула стимулювати вітчизняне виробництво, зменшити імпорт та покращити торговельний баланс шляхом експорту продуктів з доданою вартістю."
  flavor_cas.115.title: "Арбітристи"
  flavor_cas.115.desc: "Останніми роками зростаюча кількість вчених мужів, відомих як #italic Арбітристи#!, подає нам звіти про хворий стан економіки нашого [ROOT.GetCountry.GetFlavorRank]. Вони виступають за різні засоби, включаючи стимулювання вітчизняного виробництва, регулювання імпорту, покращення торговельної політики, підвищення продуктивності сільського господарства та боротьбу з надмірним впливом неробних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та непродуктивного землеволодіння."
  flavor_cas.115.a: "Ми повинні підтримати їхні пропозиції."
  flavor_cas.115.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не сприйняли б це добре."
  flavor_cas.115.historical_info: "Арбітристи були іспанськими інтелектуалами та бюрократами, які з'явилися наприкінці XVI – на початку XVII століть у відповідь на економічний та адміністративний занепад Іспанії. Вони писали трактати, діагностуючи такі проблеми, як інфляція, спричинена сріблом, залежність від імпорту, занепад сільського господарства та домінування неробної знаті."
  flavor_cas.116.title: "Кастісизм"
  flavor_cas.116.desc: "Реакційний рух, що протистоїть поширенню ідей [ShowInstitutionName('enlightenment')], шириться по всьому [ROOT.GetCountry.GetFlavorRank]. Цей рух відстоює повернення до традиційних цінностей та способу життя, так званого #italic кастісо#! способу життя. Він виступає за збереження старих звичаїв, релігійної ортодоксії, традиційного одягу, кориди та нашої мови в її найчистішій формі. Хоча багато хто висловив підтримку руху, інші побоюються, що це може серйозно перешкодити реформам та сучасному мисленню."
  flavor_cas.116.a: "Ми не повинні дозволити ностальгії блокувати наш прогрес."
  flavor_cas.116.b: "Ми повинні зберегти нашу спадщину."
  flavor_cas.116.historical_info: "#italic Кастісизм#! був культурним та ідеологічним рухом, що виник в Іспанії у XVIII столітті. Він зосереджувався на протистоянні просвітницьким ідеям раціоналізму та іноземним, особливо французьким, звичаям. Він оспівував унікальні іспанські традиції, включаючи мову, релігію та моду, які розглядалися як вираження національної ідентичності."
  flavor_cas.117.title: "Бібліотека монастиря Сан-Лоренсо"
  flavor_cas.117.desc: "[target_ruler.GetName], глибоко відданий розвитку культури, висловив бажання розширити [ROOT.GetCountry.GetGovernment.GetAdjective] комплекс [ShowBuildingTypeName('el_escorial_palace')] великою бібліотекою, яка має вмістити тисячі томів, рукописів та текстів з усього [ROOT.GetCountry.GetFlavorRank]. Хоча це починання, як очікується, коштуватиме дорого, воно зміцнить наш [ROOT.GetCountry.GetFlavorRank] як центр навчання та культури."
  flavor_cas.117.a: "Побудувати бібліотеку."
  flavor_cas.117.b: "Ми не можемо дозволити собі такі інвестиції."
  flavor_cas.117.historical_info: "Монастир Сан-Лоренсо де Ель Ескоріал, замовлений королем Іспанії Філіпом II наприкінці XVI століття, був однією з найважливіших бібліотек ранньомодерної Європи. Бібліотека стала сховищем рідкісних рукописів, класичних текстів та праць з теології, науки та філософії. Філіп II особисто контролював її зростання, набуваючи твори з усієї Європи та ісламського світу."
  flavor_cas.118.title: "[ShowBuildingTypeNameWithNoTooltip('sevilla_bullfighting_school')]"
  flavor_cas.118.desc: "Оскільки популярність кориди зростає, дехто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує заснувати офіційну установу, присвячену цьому мистецтву. Вона навчатиме молодих матадорів як техніці, так і дисципліні, та формалізує це мистецтво, яке досі передавалося лише неофіційно. Хоча ініціатива викликала народний інтерес, місцеві жителі не дуже задоволені, оскільки [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує, щоб [ShowBuildingTypeName('sevilla_bullfighting_school')] фінансувалася з провінційних податків."
  flavor_cas.118.a: "Нехай школа процвітає!"
  flavor_cas.118.b: "Державні кошти повинні служити більшим потребам."
  flavor_cas.118.historical_info: "Севільська школа кориди була заснована королівським указом 28 травня 1830 року за короля Іспанії Фердинанда VII, за пропозицією Міністерства фінансів. Вона стала першою офіційною установою, присвяченою систематичній підготовці тореадорів. Оскільки вона фінансувалася за рахунок зборів з міст, що мали кавалерійські об'єкти, школа зіткнулася з фінансовим та політичним опором."
  flavor_cas.119.title: "Опозиція до [ShowBuildingTypeNameWithNoTooltip('sevilla_bullfighting_school')]"
  flavor_cas.119.desc: "Нещодавно відкрита [ShowBuildingTypeName('sevilla_bullfighting_school')] оповита суперечками від самого свого створення. Постійне фінансування установи через податки, стягнуті з провінційних міст, що мають кавалерійські споруди, викликало гостру критику. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] тепер протестують, що витрати є нежиттєздатними та несправедливими."
  flavor_cas.119.a: "Вони стверджують, що державні кошти мають служити ширшим суспільним потребам."
  flavor_cas.119.b: "Добре. Нехай школу буде закрито."
  flavor_cas.119.historical_info: "Ми не поступимося народному тиску у справі національної культури."
  flavor_cas.120.title: "Хоча Севільська школа кориди, заснована 1830 року королівським указом Фердинанда VII, була першою офіційною установою Іспанії, присвяченою підготовці тореро, вона проіснувала лише чотири роки. Фінансована податком на провінційні столиці та міста, що розміщували кавалерійські вишколи, фінансовий тягар швидко став непопулярним. Зі смертю Фердинанда VII та регентством Марії Христини пріоритети змінилися, і 1834 року школу було офіційно розпущено, а її кошти були перенаправлені на освіту та допомогу бідним."
  flavor_cas.120.desc: "Літописець [ShowRegionNameWithNoTooltip('andes_region')]"
  flavor_cas.120.a: "Продовжуючи нашу експансію в [ShowRegionName('andes_region')], багато людей переселяються в регіон у пошуках різноманітних речей. Серед них стоїть [target_character.GetName], який висловив бажання написати всеосяжну хроніку земель і народів Нового Світу. На відміну від багатьох конкістадорів, [target_character.GetLastNameWithNoTooltip] глибоко зацікавлений у документуванні звичаїв, географії та історій корінних народів та збереженні цінних знань, що вже зникають. Однак [target_character.GetSheHe] бракує ресурсів для продовження [target_character.GetHisHer] дослідницьких та видавничих зусиль."
  flavor_cas.120.b: "Фінансувати роботу."
  flavor_cas.120.historical_info: "Ми не маємо часу на писак та пусті байки."
  flavor_cas.121.title: "Педро Сьєса де Леон був іспанським конкістадором і літописцем раннього колоніального періоду в Перу. На відміну від багатьох своїх сучасників, Сьєса більше цікавився записом, ніж завоюванням. Його головна праця, #italic Crónica del Perú#!, є одним з найцінніших ранніх джерел про цивілізацію інків, географію та ранню колоніальну адміністрацію. Його праці пропонують детальні етнографічні та географічні спостереження, зберігаючи багатство інформації про доіспанські культури, які інакше були б втрачені."
  flavor_cas.121.desc: "$elegies_of_illustrious_men$"
  flavor_cas.121.a: "[target_character.GetName] є колишнім солдатом, що став священиком, який подорожував нашими володіннями в Новому Світі і документував [target_character.GetHisHer] досвід у розлогій епопеї під назвою #italic $elegies_of_illustrious_men$#!. Цей величезний літературний твір прославляє чоловіків, які збудували наші заморські володіння, і має на меті зберегти їхню пам’ять у поетичній формі."
  flavor_cas.121.b: "Підтримати цю епопею завоювань та честі."
  flavor_cas.121.historical_info: "Меч і хрест будують імперії, а не поезія."
  flavor_cas.122.title: "Хуан де Кастельянос був іспанським солдатом, а пізніше священиком у Новій Гранаді. Він є автором #italic Elegías de varones ilustres de Indias#!, однієї з найдовших поем, коли-небудь написаних іспанською мовою, з понад 113 000 рядків. Його праця хронікує іспанське завоювання Америки в унікальному поєднанні поезії та історії."
  flavor_cas.122.desc: "[ROOT.GetCountry.GetGovernment.GetAdjective] [ShowGoodsNameWithNoTooltip('tobacco')] Фабрика"
  flavor_cas.122.a: "[ShowGoodsName('tobacco')] став продуктом величезної цінності та попиту по всій [ShowContinentName('europe')]. Щоб взяти під контроль його величезний потенціал, [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] пропонує будівництво нової [ROOT.GetCountry.GetGovernment.GetAdjective] [ShowGoodsNameWithNoTooltip('tobacco')] Фабрики у [ShowLocationName('sevilla')]. Вона консолідує обробку та розповсюдження [ShowGoodsNameWithNoTooltip('tobacco')] під нашою монополією, приборкуючи контрабанду та збільшуючи доходи."
  flavor_cas.122.a.tt: "Заснуймо її."
  flavor_cas.122.b: "Кожна [ShowSubjectTypeName('colonial_nation')], що виробляє [ShowGoodsName('tobacco')], також отримає [ShowModifier('spa_royal_tobacco_factory')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 20#! років"
  flavor_cas.122.historical_info: "Не варто вливати наші кошти в це."
  flavor_cas.125.title: "Хоча присутність тютюну в Севільї сягає ранніх днів колонізації Америки, лише у XVIII столітті уряд вирішив побудувати установу, яка була б присвячена виробництву тютюнових виробів. Після завершення будівництва вона стала другою за величиною будівлею в Іспанії на той час, перевершеною лише палацом Ель-Ескоріал."
  flavor_cas.125.desc: "Пірати [ShowRegionNameWithNoTooltip('caribbean_region')]"
  flavor_cas.125.a: "Наші купці в [ShowRegionName('caribbean_region')] стурбовані присутністю [pirate_country.GetName], яка, як відомо, здійснює набіги на торгові флоти та гавані, значно порушуючи нашу торгівлю в регіоні. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] виступили з проханням інвестувати в укріплення наших прибережних поселень, щоб відлякати піратів від нападу."
  flavor_cas.125.b: "Інвестувати в укріплення."
  flavor_cas.125.historical_info: "Вони ніколи не наважаться напасти на нас."
  flavor_cas.126.title: "Відродження кухні"
  flavor_cas.126.desc: "Повільне, але неухильне впровадження екзотичних культур з-за морів поступово змінює наші столи. Такі товари, як [ShowGoodsName('potato')] та [ShowGoodsName('maize')], колись вважалися простою їжею для [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], але тепер їх прийняла вся нація. У [ShowAreaName('castile_area')] та [ShowAreaName('leon_area')] [ShowGoodsNameWithNoTooltip('potato')] тепер варять, смажать і тушкують у стравах як скромних, так і шляхетних. У [ShowAreaName('valencia_area')] та [ShowAreaName('aragon_area')] [ShowGoodsName('rice')] став основою яскравих нових рецептів, якими діляться на гамірних площах. Ці інгредієнти, народжені в далеких землях, знайшли новий дім у наших горщиках та на наших піднебіннях."
  flavor_cas.126.a: "Смачного!"
  flavor_cas.126.historical_info: "Впровадження таких культур, як картопля, кукурудза та рис, до Іспанії після Колумбового обміну змінило іберійське сільське господарство та дієту. Ці товари стали центральними для деяких з найвідоміших іспанських страв, таких як #italic паелья#! у Валенсії, тоді як картопля, імпортована з Анд, зрештою стала наріжним каменем таких страв, як #italic тортилья де пататас#! та #italic пататас бравас#!."
  flavor_cas.127.title: "Захисниця освічених жінок"
  flavor_cas.127.desc: "[target_character.GetName] — вчена, яка нещодавно здобула славу завдяки [target_character.GetHisHer] публікаціям аргументів на користь доступу жінок до освіти та інтелектуального життя. Хоча [target_character.GetHisHer] погляди є суперечливими в деяких колах, інші хвалять [target_character.GetHimHer] як маяк чесноти та реформи [ShowInstitutionName('enlightenment')]. [ROOT.GetCountry.GetGovernment.GetCourtTitle] розривається між тим, щоб змусити [target_character.GetHimHer] замовкнути або дозволити [target_character.GetHimHer] вільно публікуватися."
  flavor_cas.127.a: "Нехай [target_character.GetHisHer] твори поширюються."
  flavor_cas.127.b: "Ми не можемо йти проти традицій."
  flavor_cas.127.historical_info: "Хосефа Амар і Борбон була однією з найважливіших мислительок Просвітництва в Іспанії та однією з перших, хто систематично виступав за освіту та інтелектуальну самостійність жінок. Вона стверджувала, що жінки мають рівні інтелектуальні здібності з чоловіками і повинні мати доступ до освіти та посад."
  flavor_cas.128.title: "Перо проти влади"
  flavor_cas.128.desc: "Збірка оповідань [target_character.GetName] поширюється по всій країні та привертає увагу в наших літературних колах. Хоча багато хто хвалить [target_character.GetHisHer] за елегантну прозу, інші бачать гостру критику ролі жінок, яка добре прихована між [target_character.GetHisHer] рядками. Оскільки [target_character.GetHisHer] слова викликають незручні питання, багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] задається питанням, чи варто дозволяти таким словам поширюватися."
  flavor_cas.128.a: "Мистецтво відображає життя, нехай [target_character.GetHisHer] історії читають."
  flavor_cas.128.b: "Це лише поширює незгоду."
  flavor_cas.128.historical_info: "Марія де Саяс була письменницею художньої та феміністичної літератури під час Золотого віку Іспанії. Її твори критикували мізогінію, насильство та лицемірство в чоловічому суспільстві. Вона вважається однією з найперших феміністичних голосів Іспанії в літературі."
  flavor_cas.129.title: "Судова справа [target_character.GetNameWithNoTooltip]"
  flavor_cas.129.desc: "Судова справа в [ShowLocationName('alcala_de_henares')] привернула увагу всієї країни. [target_character.GetName], скромна жінка без приданого, багатства чи політичного впливу, зуміла заручитися підтримкою вчених з Університету [ShowLocationNameWithNoTooltip('alcala_de_henares')], які передали [target_character.GetHisHer] справу до церковного суду. На подив багатьох, суд виніс рішення на [target_character.GetHisHer] користь і дозволив [target_character.GetHisHer] розлучитися з [target_character.GetHisHer] чоловіком. [target_character.GetHisHer|U] справа викликала бурхливі дискусії серед як юридичних, так і церковних авторитетів, багато хто побоюється, що це надихне жінок на подальшу незгоду."
  flavor_cas.129.a: "Замовкнути справу."
  flavor_cas.129.b: "[target_character.GetHisHer|U] хоробрість має бути підтримана."
  flavor_cas.129.historical_info: "Франциска де Педраса визнана однією з перших жінок в Іспанії, яка законно звільнилася від жорстокого шлюбу. Це сталося в церковному суді Університету Алькали, в той час, коли жінки практично не мали прав у шлюбі, не кажучи вже про юридичну автономію звинувачувати або розлучатися зі своїми чоловіками. Її перемога була надзвичайною в епоху, коли жорстокість часто вважалася приватною справою, а правових засобів захисту для жінок не існувало."
  flavor_cas.130.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.130.desc: "У надзвичайному рішенні жінці було надано право читати лекції в Університеті [ShowLocationName('salamanca')]. Вона перевершила всі очікування, ставши лектором з [ShowLanguageName('latin_language')] та філософії. Хоча багато хто в наших академічних колах натхненний [target_character.GetHimHer], є й ті, хто розглядає [target_character.GetHisHer] присутність як виклик традиційним нормам, навіть заходячи так далеко, що пропонують нам тихо дозволити [target_character.GetHimHer] зникнути в безвісті."
  flavor_cas.130.a: "Підтримати [target_character.GetHimHer] як маяк прогресу."
  flavor_cas.130.b: "Такі речі не слід заохочувати."
  flavor_cas.130.historical_info: "Луїза де Медрано відзначається як одна з перших жінок-професорів у Європі. У 1508 році, у віці 24 років, її запросили читати лекції в Університеті Саламанки. Спеціалізуючись на латинській та класичній філології, вона читала лекції з риторики та філософії, предметів, традиційно зарезервованих для чоловіків. Її відзначали як одну з #italic Puellae Doctae#!, вчених дівчат, і вона стала символом жіночих академічних досягнень."
  flavor_cas.131.title: "Кадастр Енсенади"
  flavor_cas.131.desc: "Багато вчених, незадоволених поточним станом справ у державі, висунули численні пропозиції щодо покращення ситуації. Одним із таких є [target_character.GetName], який вважає, що ми повинні провести масштабний перепис населення, спрямований на підвищення ефективності оподаткування. Хоча це обіцяє виявити справжні джерела національного багатства, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] відчувають занепокоєння, оскільки вони довго користувалися різними пільгами."
  flavor_cas.131.a: "Нехай правда стане відомою."
  flavor_cas.131.b: "Це лише розгніває впливових людей."
  flavor_cas.131.historical_info: "Катастро Енсенади, розпочатий у 1749 році за правління Фердинанда VI і керований Зеноном де Сомодевільєю, маркізом Енсенади, був однією з найамбітніших адміністративних реформ Іспанії XVIII століття. Він мав на меті встановити єдину, справедливу податкову систему шляхом проведення всебічного обстеження землевласництва, населення, виробництва та доходів по всій Кастилії."
  flavor_cas.132.title: "Піднесення альондіг"
  flavor_cas.132.desc: "Для забезпечення ефективнішого розподілу сільськогосподарських товарів влада пропонує розширити систему #italic alhóndiga#!, яка є публічними ринками, де фермери здають свій урожай, і де продукти динамічно продаються на аукціоні місцевим #italic almudí#! через систему торгів на пониження. Метою запропонованого розширення є об'єднання попиту та пропозиції таким чином, щоб збільшити обсяг, зменшити псування та підвищити продуктивність. Взамін, #italic almudí#! братиме невелику комісію, що може принести користь місцевим доходам."
  flavor_cas.132.a: "Нехай зерно тече!"
  flavor_cas.132.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('iberia_region')], що виробляє [ShowGoodsName('wheat')], отримає [ShowNamedValue('prosperity_severe_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] та [ShowModifier('spa_efficient_market_system')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 10#! років"
  flavor_cas.132.b: "У нас є нагальніші потреби, ніж реформи зерносховищ."
  flavor_cas.132.historical_info: "Система альондіг в Іспанії розвивалася як практичне рішення для регулювання продажу та розподілу зерна та інших продуктів харчування, особливо в міських центрах. Ці будівлі слугували регульованими зерновими біржами, де виробники здавали свій урожай, а міські чиновники наглядали за аукціонами, часто продаючи товари найнижчому прийнятному учаснику торгів, щоб запобігти спекуляції та накопиченню."
  flavor_cas.133.title: "Бунти Ескілаче"
  flavor_cas.133.desc: "У спробі модернізувати наші міста та покращити громадську безпеку, наші міністри запропонували нові правила одягу, щоб усунути довгі плащі та широкополі капелюхи. Ці предмети одягу, дуже популярні серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], як кажуть, приховують кинджали та сприяють вуличним злочинам. Ці зусилля з упорядкування зовнішнього вигляду та приведення його у відповідність до сучасної моди викликали народний гнів."
  flavor_cas.133.a: "Запровадити нові закони про моду."
  flavor_cas.133.b: "Ми повинні захищати традиційний одяг."
  flavor_cas.133.historical_info: "Бунти Ескілаче 1766 року були спровоковані реформами, запровадженими за короля Карла III. Один з його найсуперечливіших указів мав на меті заборонити довгі плащі та широкі капелюхи, які були емблемою традиційного іспанського вбрання, але також звинувачувалися у приховуванні зброї та сприянні злочинності. Хоча заходи були спрямовані на очищення та забезпечення безпеки міського життя, вони викликали інтенсивну негативну реакцію серед робітничих класів, які розцінили їх як напад на іспанську ідентичність."
  flavor_cas.134.title: "[ShowAdvanceNameWithNoTooltip('spa_siglo_de_oro')]"
  flavor_cas.134.desc: "Наш [ROOT.GetCountry.GetFlavorRank] неухильно піднімається до вершини впливу. Великі уми процвітають у наших містах, художники та письменники прославляються на всіх континентах, а наша мова та віра формують землі далеко за нашими кордонами. Цей момент може бути згаданий як справжня золота доба [ROOT.GetCountry.GetName]."
  flavor_cas.134.a: "Справді золота доба!"
  flavor_cas.134.historical_info: "#italic Siglo de Oro#!, або Золоте століття, відноситься до періоду в іспанській історії, що охоплює приблизно з кінця XV століття до кінця XVII століття. Він був відзначений видатними досягненнями в літературі, мистецтві та глобальній експансії. Іспанія досягла свого територіального зеніту, а її вплив у політиці та Церкві підніс її до статусу першої глобальної наддержави."
  flavor_cas.135.title: "Суд над Алюмбрадос"
  flavor_cas.135.desc: "Рух #italic Alumbrados#! поширюється по [ROOT.GetCountry.GetFlavorRank], і їхні вірування привернули увагу Інквізиції. Вони заявляють про божественне просвітлення та духовне єднання з Богом, відмовляючись від потреби у священиках, таїнствах або навіть самій [GetUniqueInternationalOrganization('catholic_church').GetName]. Хоча багато з них є лише споглядальниками, які стверджують, що шукають духовного екстазу, інші шепочуть небезпечні ідеї, що межують з єрессю. Через це Священна Канцелярія вимагає офіційного розслідування та суду."
  flavor_cas.135.a: "Віддати їх під суд."
  flavor_cas.135.b: "Вони лише шукають духовної істини."
  flavor_cas.135.historical_info: "#italic Alumbrados#! були містичним релігійним рухом на початку XVI століття в Іспанії, який наголошував на внутрішньому духовному просвітленні та прямому спілкуванні з Богом, незалежно від таїнств чи ієрархії Церкви. Рух здобув популярність завдяки своїй пропозиції, що духовний екстаз робить гріх неактуальним, що призвело до їх переслідування Інквізицією."
  flavor_cas.136.title: "Велика пожежа у [ShowLocationNameWithNoTooltip('valladolid')]"
  flavor_cas.136.desc: "Руйнівна пожежа, рознесена мінливими вітрами, охопила [ShowLocationName('valladolid')]. Сотні будинків та ключових ремісничих кварталів було втрачено, і відбудова буде складним завданням. Однак дехто серед [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджує, що це також є нагодою. Чисте полотно, на якому ми можемо спланувати більш упорядковане та сучасне місто."
  flavor_cas.136.a: "Відбудувати його заново."
  flavor_cas.136.b: "Надати кошти для полегшення збитків."
  flavor_cas.136.c: "Ми не можемо дозволити собі допомогти їм."
  flavor_cas.136.historical_info: "Пожежа у Вальядоліді 21 вересня 1561 року знищила десяту частину міста, включаючи понад 440 будинків, багато ремісничих майстерень та ринковий район. Після пожежі король Філіп II наказав його відбудувати, і це архітектурне зусилля ознаменувало піднесення нових архітектурних стилів, таких як еррерський та бароко. Завдяки архітекторам, які використовували найновіші методи містобудування, Вальядолід перетворився на сучасне місто."
  flavor_cas.137.title: "Заснування [ShowBuildingTypeNameWithNoTooltip('royal_audience_and_chancery')]"
  flavor_cas.137.desc: "Багато хто по всьому [ROOT.GetCountry.GetFlavorRank] скаржиться, що наша судова система стає неефективною. Щоб вирішити цю проблему, [ROOT.GetCountry.GetGovernment.GetCourtTitle] виступив із пропозицією заснувати [ShowBuildingTypeName('royal_audience_and_chancery')]. Цей високий суд забезпечував би послідовні судові рішення, розглядав апеляції та наглядав за місцевим здійсненням правосуддя. [ShowLocationName('valladolid')] було запропоновано як його місцеперебування, враховуючи його центральне розташування та зростаюче політичне значення."
  flavor_cas.137.a: "Нехай [ShowLocationNameWithNoTooltip('valladolid')] його прийме."
  flavor_cas.137.b: "Наша судова система і так чудова."
  flavor_cas.137.historical_info: "#italic Real Audiencia y Chancillería de Valladolid#!, заснована 1371 року, служила високим апеляційним судом та наглядовим органом над місцевими суддями, дозволяючи монархії централізувати юридичну владу та обмежувати дворянську та муніципальну правову автономію."
  flavor_cas.138.title: "Розширення [ShowBuildingTypeNameWithNoTooltip('royal_audience_and_chancery')]"
  flavor_cas.138.desc: "[ShowBuildingTypeName('royal_audience_and_chancery')] у [ShowLocationName('valladolid')] обтяжена обсягом та віддаленістю судових справ по всьому [ROOT.GetCountry.GetFlavorRank]. Щоб усунути цю неефективність, радники запропонували розширити установу до південної частини [ROOT.GetCountry.GetFlavorRank]. [ShowLocationName('ciudad_real')] було запропоновано через його стратегічне розташування на південь від річки Тахо, що також розділило б їхню юрисдикцію. Північ керувалася б [ShowLocationNameWithNoTooltip('valladolid')], а південь — [ShowLocationNameWithNoTooltip('ciudad_real')]."
  flavor_cas.138.a: "Чудова ідея!"
  flavor_cas.138.b: "Ми можемо обійтися лише одним з них."
  flavor_cas.138.historical_info: "У 1494 році Католицькі монархи розділили юрисдикцію оригінальної Вальядолідської Аудієнсії, створивши #italic Real Audiencia y Chancillería de Ciudad Real#!. Це розширення установи отримало владу на південь від річки Тахо. Однак установа була недовговічною. До 1500 року було вирішено перенести Аудієнсію до Гранади, міста, що зростало в значенні після завоювання 1492 року. Передача була завершена в 1505 році за наказом королеви Хуани."
  flavor_cas.139.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.139.desc: "[target_character.GetName] нещодавно склав те, що багато хто називає зворушливим поетичним шедевром: $laberinto_de_fortuna$. У творі [target_character.GetSheHe] возвеличує божественну прихильність, даровану нашій [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], і закликає до єдності під [ROOT.GetCountry.GetGovernment.GetAdjective] чеснотою. Деякі члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] тепер пропонують допомогти в його поширенні, бо це може зміцнити вірність [ROOT.GetCountry.GetGovernment.GetGovermentType.GetName]."
  flavor_cas.139.a: "Фінансувати поширення твору."
  flavor_cas.139.b: "Мистецтво найкраще, коли воно знаходить свій власний шлях."
  flavor_cas.139.historical_info: "Хуан де Мена був придворним поетом за часів правління короля Хуана II Кастильського і вважається однією з найважливіших літературних постатей Іспанії XV століття. Його найвідоміший твір, #italic Laberinto de Fortuna#!, поєднує класичні посилання з християнською та політичною алегорією і зображує Долю як силу, керовану божественним провидінням, яка зрештою прихильна до законного короля. Поема була монархічною пропагандою, яка вихваляла корону та заохочувала єдність під королівською владою."
  flavor_cas.140.title: "[target_character.GetNameWithNoTooltip]"
  flavor_cas.140.desc: "Глибоко зворушлива елегія під назвою $coplas_por_la_muerte_de_su_padre$ від [target_character.GetName] поширюється по всьому [ROOT.GetCountry.GetFlavorRank]. Твір розмірковує про мораль, спадщину та мирську славу, але також вшановує життя [target_character.GetHisHer] батька, який був відомим воїном Реконкісти. Дехто пропонує допомогти поширити цей твір як акт благородної данини та спосіб просування його цінностей."
  flavor_cas.140.a: "Ці строфи варті того, щоб їх прочитав кожен."
  flavor_cas.140.b: "Нехай це залишиться приватним актом жалоби."
  flavor_cas.140.historical_info: "Хорхе Манріке був кастильським поетом, якого пам'ятають як одного з великих поетів іспанської літератури. Його #italic Coplas por la muerte de su padre#!, або #italic Вірші на смерть його батька#!, широко вважається шедевром середньовічної іспанської поезії. Вона розмірковує про смерть як великого зрівнювача, що перевершує мирську славу, і оспівує спадщину доброчесного життя, втілену його батьком, який був шанованим військовим лідером Реконкісти."
  flavor_cas.141.title: "Каплиця Нових Королів"
  flavor_cas.141.desc: "Дехто з нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висунув пропозицію збудувати нову каплицю в [ShowLocationName('toledo')], яка слугуватиме місцем вічного вшанування династії [target_dynasty.GetName]. Вони посилаються на прецедент старих королівських гробниць, що зберігаються в соборах, і стверджують, що ми не повинні відставати у вшануванні нашого роду."
  flavor_cas.141.a: "Замовити каплицю."
  flavor_cas.141.b: "Зараз не час для такої величі."
  flavor_cas.141.historical_info: "#italic Capilla de los Reyes Nuevos#!, або Каплиця Нових Королів, була задумана як династична поховальна каплиця в Толедському соборі Генріхом II Кастильським, засновником династії Трастамара. Генріх II прагнув пов'язати своє правління зі священною та історичною владою Кастилії, побудувавши королівське місце спочинку поблизу гробниць попередніх монархів, таких як Санчо IV та Альфонсо VII."
  flavor_cas.1000.title: "[inquisitor_torquemada.GetNameWithNoTooltip] та [ShowLanguageNameWithNoTooltip('spanish_language')] Інквізиція"
  flavor_cas.1000.desc: "Останнім часом фракція нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] на чолі з [inquisitor_torquemada.GetName] здобуває все більшу владу в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Сам [inquisitor_torquemada.GetNameWithNoTooltip] має тісні стосунки з [target_character.GetName] ще до сходження [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] на престол і має значний вплив. Якби ми доручили [inquisitor_torquemada.GetNameWithNoTooltip] підтримувати [ShowReligionAdjective('catholic')] релігійну ортодоксію в [ROOT.GetCountry.GetName], ми могли б створити інституцію, яка забезпечить [ShowReligionAdjectiveWithNoTooltip('catholic')] панування над [ShowRegionName('iberia_region')] на наступні століття. Хоча є деякі повідомлення про фанатичну ревність, яку ця фракція іноді виявляє, розгнівати їх також може мати жахливі наслідки."
  flavor_cas.1000.a: "Надати [inquisitor_torquemada.GetNameWithNoTooltip] нашу підтримку."
  flavor_cas.1000.b: "Це може мати несподівані наслідки."
  flavor_cas.1001.title: "Альгамбрський декрет"
  flavor_cas.1001.desc: "З південними землями [ShowRegionName('iberia_region')] у наших руках ми тепер стикаємося зі складним питанням. Наше придбання нових язичницьких підданих тепер висунуло дискусію про наших [ShowCultureName('sephardi')] підданих на найважливішу тему для [target_character.GetName]. Деякі з наших радників, члени Інквізиції, займають жорстку позицію щодо цих людей, навіть висловлюючи занепокоєння щодо [ShowCultureNameWithNoTooltip('sephardi')], які навернулися до [ShowReligionName('catholic')]. Вигнання [ShowCultureNameWithNoTooltip('sephardi')] народу забезпечило б [ShowReligionAdjective('catholic')] панування над [ShowRegionNameWithNoTooltip('iberia_region')], але могло б посилити наших ворогів, які охоче прийняли б вигнаних як своїх нових підданих."
  flavor_cas.1001.a: "Вигнання або навернення!"
  flavor_cas.1001.tt1: "Кілька [ShowCultureNameWithNoTooltip('sephardi')] у нашій нації навернуться до [ShowReligionNameWithNoTooltip('catholic')], а ті, хто відмовиться, будуть вигнані з країни."
  flavor_cas.1001.b: "Дозволити їм залишитися."
  flavor_cas.1001.tt2: "[ShowCultureNameWithNoTooltip('sephardi')] у нашій нації будуть щасливішими."
  flavor_cas.1002.title: "Навернення [ShowCultureNameWithNoTooltip('andalusi')] народу"
  flavor_cas.1002.desc: "Після нашого завоювання [ShowAreaName('granada_area')] та [ShowAreaName('andalusia_area')] ми стикаємося зі значним населенням [ShowCultureName('andalusi')] та [ShowReligionGroupAdjective('muslim')] людей як наших підданих. Інквізиція вже розпочала розширення своєї діяльності в цьому районі, щоб забезпечити безперешкодне навернення людей. Якщо [target_character.GetName] особисто не втрутиться проти інквізиції, це забезпечить навернення більшості [ShowCultureNameWithNoTooltip('andalusi')] людей, тоді як ті, хто відмовиться від навернення, будуть вигнані з країни."
  flavor_cas.1002.a: "Навернути їх силою!"
  flavor_cas.1002.tt1: "Більшість [ShowCultureNameWithNoTooltip('andalusi')] у нашій нації навернуться до [ShowReligionNameWithNoTooltip('catholic')], а ті, хто відмовиться, будуть вигнані з країни."
  flavor_cas.1002.b: "Обмежити вплив Інквізиції."
  flavor_cas.1003.title: "Повстання в Альпухаррах"
  flavor_cas.1003.desc: "З наверненням [ShowCultureName('andalusi')] народу ми стикаємося з опором у районах [ShowAreaName('andalusia_area')] та [ShowAreaName('granada_area')]. Дехто стверджує, що зусилля Інквізиції порушують договори, укладені між [ROOT.GetCountry.GetName] та [ShowCultureNameWithNoTooltip('andalusi')] народом після [ROOT.GetCountry.GetCulture.GetName] завоювання цієї території, і прагнуть усунути вплив Інквізиції.\n\nЗ напругою, що досягла найвищого рівня, лише невеликий інцидент може розпалити широкомасштабне повстання в південних провінціях."
  flavor_cas.1003.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  alpujarras_rebels: "Альпухаррські повстанці"
  alpujarras_rebels_joining: "Усі [ShowCultureName('andalusi')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('granada_area')] та [ShowAreaName('andalusia_area')] приєднуються до [alpujarras_rebels.GetName]"
  flavor_cas.1004.title: "Війна в Альпухаррах"
  flavor_cas.1004.desc: "Наші південні провінції в [ShowAreaName('andalusia_area')] та [ShowAreaName('granada_area')] залишаються нестабільною територією. Навіть через кілька десятиліть після офіційного навернення [ShowCultureName('andalusi')] народу конфлікти між чиновниками Інквізиції та місцевими жителями залишаються звичним явищем.\n\nНове повстання здається неминучим на цьому етапі, і ми повинні відповідно підготуватися."
  flavor_cas.1004.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_cas.1005.title: "Вигнання [ShowCultureNameWithNoTooltip('andalusi')] народу"
  flavor_cas.1005.desc: "Після нещодавніх повстань та заворушень у наших південних провінціях ми змушені покласти край цій нестабільності. Ми можемо або вигнати всіх [ShowCultureName('andalusi')] з наших земель, або раз і назавжди позбутися впливу Інквізиції."
  flavor_cas.1005.a: "Вигнати [ShowCultureNameWithNoTooltip('andalusi')] народ!"
  flavor_cas.1005.tt1: "[ShowCultureNameWithNoTooltip('andalusi')] народ мігрує до інших країн."
  flavor_cas.1005.b: "Інквізицію потрібно зупинити!"
  flavor_cas.1006.title: "[ShowGovernmentReformNameWithNoTooltip('spanish_tolerance')]"
  flavor_cas.1006.desc: "$spanish_tolerance_desc$"
  flavor_cas.1006.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.1007.title: "Ми здобули нашу незалежність!"
  flavor_cas.1007.desc: "З нашою перемогою над північними загарбниками ми забезпечили нашу незалежність і тепер можемо повернутися до наших коренів та вільно навернутися до [ShowReligionName('sunni')] віри!"
  flavor_cas.1007.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.1007.tt1: "Більшість нашого населення навернеться до [ShowReligionName('sunni')]"
  flavor_cas.1100.title: "[target_character.GetNameWithNoTooltip] та [ShowLawNameWithNoTooltip('society_of_jesus')]"
  flavor_cas.1100.desc: "Відслуживши солдатом в [ROOT.GetCountry.GetAdjective] арміях, [target_character.GetName] вступив до [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] після отримання серйозного поранення. Під час своїх теологічних студій він заснував новий релігійний орден під назвою [ShowLawName('society_of_jesus')], який нещодавно отримав [GetCountry('PAP').GetAdjective] визнання. Нам, безумовно, було б вигідно найняти таку здібну людину до нашого двору на благо [ShowReligionName('catholic')]."
  flavor_cas.1100.a: "Покликати його до [target_ruler.GetNameWithNoTooltip]!"
  flavor_cas.1100.b: "Нам не потрібні його послуги."
  flavor_cas.1101.title: "Проблемне [ShowLawNameWithNoTooltip('society_of_jesus')]"
  flavor_cas.1101.desc: "Залежність від [ShowLawName('society_of_jesus')] стала більш проблематичною для нашої держави останнім часом. Якщо колись вони були могутнім союзником у наверненні язичників, то тепер вони перешкоджають інтересам наших землевласників у колоніях своєю захисною позицією щодо тубільців. Ми отримали численні скарги від [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] з вимогою усунути цих єзуїтів від влади та вигнати їх з наших земель."
  flavor_cas.1101.a: "Вигнати всіх єзуїтів та продати їхнє майно з аукціону."
  flavor_cas.1101.b: "Їхній внесок у суспільство є більш корисним."
  flavor_cas.1200.title: "Вплив [ShowLawNameWithNoTooltip('mesta_council_law')]"
  flavor_cas.1200.desc: "Міграційні овечі стада [ShowRegionName('iberia_region')] протягом століть мали сильний вплив на [ROOT.GetCountry.GetAdjective] економіку. Офіційно організована в [ShowLawName('mesta_council_law')], ця асоціація володіє значною владою, щоб подати петицію [target_character.GetName] для підтвердження та підтримки їхніх прав та привілеїв. Хоча [ShowLawNameWithNoTooltip('mesta_council_law')] отримала свій статут у 1273 році від [GetCharacter('cas_alfonso_x_burgundy').GetName], це закріпило б та забезпечило її позицію в нашому королівстві."
  flavor_cas.1200.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.1200.a.tt: "Усі [ShowGoodsNameWithNoTooltip('wool')] місцевості, якими ми володіємо в [ShowRegionName('iberia_region')], отримають модифікатор [ShowModifier('merino_wool')] назавжди"
  flavor_cas.1200.b: "Відмовити їхній петиції."
  flavor_cas.1200.b.tt: "Усі [ShowGoodsNameWithNoTooltip('wool')] місцевості в [ShowRegionName('iberia_region')] отримають модифікатор [ShowModifier('refused_merino_wool')] на 100 років"
  STATIC_MODIFIER_NAME_merino_wool: "Мериносова вовна"
  STATIC_MODIFIER_NAME_refused_merino_wool: "Відмовлено у співпраці з [ShowLawNameWithNoTooltip('mesta_council_law')]"
  flavor_cas.1201.title: "[ShowPolicyNameWithNoTooltip('right_of_possesion')]"
  flavor_cas.1201.desc: "Під невпинним керівництвом [ShowLawName('mesta_council_law')] наша [ShowGoodsName('wool')] процвітала та розширювала свій вплив на [ROOT.GetCountry.GetAdjective] землі. Щоб організація процвітала та залишалася під контролем, було б вигідно запровадити [ShowPolicyName('right_of_possesion')], закон, який регулював би використання пасовищ і встановлював розумну межу необхідних орендних платежів."
  flavor_cas.1201.a: "Запровадити [ShowPolicyNameWithNoTooltip('right_of_possesion')]."
  flavor_cas.1201.b: "Поточна ситуація є кращою."
  flavor_cas.1201.c: "Скасувати [ShowLawNameWithNoTooltip('mesta_council_law')]!"
  flavor_cas.1201.c.tt: "Усі [ShowGoodsNameWithNoTooltip('wool')] місцевості, якими ми володіємо в [ShowRegionName('iberia_region')], втратять модифікатор [ShowModifier('merino_wool')] назавжди"
  flavor_cas.1202.title: "Репутація мериносової [ShowGoodsNameWithNoTooltip('wool')]"
  flavor_cas.1202.desc: "Підвищена якість нашої [ShowGoodsName('wool')] також підвищила її репутацію на інших європейських ринках і збільшила попит з-за кордону. Це може зробити галузь, очолювану [ShowLawName('mesta_council_law')], дуже прибутковим експортом для нас, якщо ми її підтримаємо. Деякі члени [ShowLawNameWithNoTooltip('mesta_council_law')] також стверджують, що цю якісну [ShowGoodsNameWithNoTooltip('wool')] слід використовувати як основу для створення [ROOT.GetCountry.GetAdjective] промисловості [ShowGoodsName('fine_cloth')] та заснування сильної [ROOT.GetCountry.GetCulture.GetName] текстильної промисловості!"
  flavor_cas.1202.a: "Зосередитися на експорті!"
  flavor_cas.1202.a.tt: "Усі [ShowGoodsNameWithNoTooltip('wool')] місцевості, якими ми володіємо в [ShowRegionName('iberia_region')], отримають модифікатор [ShowModifier('quality_merino_wool')] на 50 років"
  flavor_cas.1202.b: "Підтримати нашу вітчизняну промисловість."
  flavor_cas.1202.b.tt: "Розблоковує іспанські методи виробництва тканини для [ShowBuildingTypeNameWithNoTooltip('fine_cloth_guild')]."
  has_unlocked_spanish_cloth_industry: "Підтримав іспанську текстильну промисловість у події"
  STATIC_MODIFIER_NAME_quality_merino_wool: "Якісна мериносова вовна"
  flavor_cas.1203.title: "Місце [ShowLawNameWithNoTooltip('mesta_council_law')]"
  flavor_cas.1203.desc: "З поширенням нових ідей [ShowInstitutionName('enlightenment')] у [ROOT.GetCountry.GetName] інститут [ShowLawName('mesta_council_law')] здається пережитком минулої епохи. Зі зростанням політичної влади в руках ліберальних [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] заклики до скасування стають все частішими."
  flavor_cas.1203.a: "Скасувати [ShowLawNameWithNoTooltip('mesta_council_law')]!"
  flavor_cas.1203.a.tt: "Усі [ShowGoodsNameWithNoTooltip('wool')] місцевості, якими ми володіємо в [ShowRegionName('iberia_region')], втратять модифікатор [ShowModifier('merino_wool')] назавжди"
  flavor_cas.1203.b: "Зберегти [ShowLawNameWithNoTooltip('mesta_council_law')] недоторканим."
  flavor_cas.1300.title: "[ShowPolicyNameWithNoTooltip('laws_of_burgos')]"
  flavor_cas.1300.desc: "Ми міцно закріпилися в [ShowContinentName('america')] і тепер стоїмо перед завданням кодифікувати ставлення до наших нових підданих, оскільки вони не є частиною [ShowPolicyName('civil_law_policy')] [ROOT.GetCountry.GetName]. Наші радники розробили пропозицію, яка забезпечує корінному населенню належну [ShowReligionAdjective('catholic')] освіту та їхню свободу, водночас організовуючи їх нашими губернаторами в [ShowPolicyName('encomienda_system_policy')]. Хоча деякі наші колоніальні чиновники протестують проти цього як помилки, що сповільнить колоніальні зусилля, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] підтримує [ShowPolicyNameWithNoTooltip('laws_of_burgos')]"
  flavor_cas.1300.a: "Розробити ці закони для наших колоній!"
  flavor_cas.1300.a.tt: "Кожна [ShowSubjectTypeName('colonial_nation')] прийме [ShowPolicyNameWithNoTooltip('laws_of_burgos')]"
  flavor_cas.1300.b: "Ми правимо правом Завойовника!"
  flavor_cas.1301.title: "[ShowPolicyNameWithNoTooltip('new_laws_indies')]"
  flavor_cas.1301.desc: "[ShowPolicyName('laws_of_burgos')] виявилися недостатнім [ShowLawName('legal_code_law')] для наших колоніальних володінь в [ShowContinentName('america')]. Повідомлення про зловживання щодо корінного населення є поширеними, і наш [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] часто скаржиться, що бенефіціари [ShowPolicyName('encomienda_system_policy')] перешкоджають їхній місіонерській роботі. Якщо ми хочемо ефективно керувати цими величезними землями, нам потрібно розробити новий набір законів і суворіше застосовувати їх до наших колоністів."
  flavor_cas.1301.a: "Примусити [ShowPolicyNameWithNoTooltip('new_laws_indies')]!"
  flavor_cas.1301.a.tt: "Кожна [ShowSubjectTypeName('colonial_nation')] прийме [ShowPolicyNameWithNoTooltip('new_laws_indies')]"
  flavor_cas.1301.b: "Ми не можемо ризикувати розгнівати наших колоністів."
  flavor_cas.1302.title: "Вальядолідська дискусія"
  flavor_cas.1302.desc: "Моральні наслідки нашої діяльності в [ShowContinentName('america')] викликали широку дискусію щодо використання нами [ShowPolicyName('encomienda_system_policy')]. З повторними повідомленнями про зловживання, яких зазнають тубільці від наших місцевих чиновників, ми більше не можемо ігнорувати цю триваючу дискусію. Багато інтелектуалів нашої країни зібралися у [ShowLocationName('valladolid')], щоб представити свої позиції з цього питання. У ході дискусій сформувалися дві фракції: одну очолив [target_character_sepulveda.GetName], а іншу – [target_character_casas.GetName]. Хоча дебати наразі не мають остаточного результату, наше втручання може надати легітимності будь-якій позиції."
  flavor_cas.1302.a: "Хороша дискусія завжди цінна сама по собі."
  flavor_cas.1302.b: "Підемо за [target_character_sepulveda.GetNameWithNoTooltip]."
  flavor_cas.1302.c: "Підемо за [target_character_casas.GetNameWithNoTooltip]."
  flavor_cas.1302.historical_info: "Вальядолідська дискусія 1550 року, що відбулася в Колегіо-де-Сан-Грегоріо в цьому місті, була моральною дискусією про ставлення до корінного населення в іспанських колоніях після початкових завоювань і колонізації Америки. Основна суперечка відбулася між священнослужителями Бартоломе де лас Касасом і Хуаном Хінесом де Сепульведою щодо позиції, яку іспанська адміністрація повинна зайняти щодо корінного населення. Де лас Касас виступав проти примусового навернення та системи енком'єнд, що застосовувалася в колоніях, тоді як Сепульведа підтримував систему і виступав за використання війни проти тубільців, які практикували людські жертвоприношення та канібалізм. Хоча дебати були безрезультатними, вони закріпили впровадження «Нових законів Індій», виданих королем Іспанії Карлом I у 1542 році."
  flavor_cas.1400.title: "Конфлікт у [ShowRegionNameWithNoTooltip('italy_region')]"
  flavor_cas.1400.desc: "Наші закляті вороги в [italian_rival.GetName] займають території в [ShowRegionName('italy_region')], які є життєво важливими для наших власних інтересів. Ми повинні претендувати на їхні землі та готуватися до війни за першої ж нагоди, щоб забезпечити нашу позицію в [ShowRegionNameWithNoTooltip('italy_region')] та навколо неї."
  flavor_cas.1400.a: "Заявити права на всі [italian_rival.GetAdjectiveWithNoTooltip] землі в [ShowRegionNameWithNoTooltip('italy_region')]!"
  flavor_cas.1400.b: "[ShowRegionNameWithNoTooltip('italy_region')] не має для нас значення."
  flavor_cas.1400.historical_info: "Італійські війни — це серія війн між 1494 і 1559 роками, в яких брали участь більшість італійських міст-держав, Папська держава, а часом і великі держави, такі як Франція, Іспанія або Священна Римська імперія. Іспанія вступила у війну після смерті Максиміліана I Габсбурга під керівництвом Карла I Іспанського в 1521 році."
  flavor_cas.1401.title: "[from.GetAdjectiveWithNoTooltip] Агресія в [ShowRegionNameWithNoTooltip('italy_region')]"
  flavor_cas.1401.desc: "[from.GetName] сміливо заявив права на наші території в [ShowRegionName('italy_region')]! Відкрите оголошення їхніх амбіцій розкриває їхні плани оголосити нам війну та їхній намір невиправдано окупувати наші землі. Ми повинні підготуватися та, у свою чергу, заявити права на їхні землі в [ShowRegionNameWithNoTooltip('italy_region')], щоб усунути цю загрозу з наших провінцій!"
  flavor_cas.1401.a: "Тоді висунути зустрічні претензії на всі [from.GetAdjectiveWithNoTooltip] землі!"
  flavor_cas.1401.b: "Це лише чутки."
  flavor_cas.1402.title: "Ескалація в [ShowRegionNameWithNoTooltip('italy_region')]"
  flavor_cas.1402.desc: "Наш крок із висунення претензій на всі [italian_rival.GetAdjectiveWithNoTooltip] провінції в [ShowRegionName('italy_region')] зустрів відповідь від [italian_rival.GetName]. Вони, своєю чергою, висунули претензії на всі наші провінції в [ShowRegionNameWithNoTooltip('italy_region')]!"
  flavor_cas.1402.a: "Жалюгідна спроба показати силу."
  claimed_italy: "Заявлена Італія"
  flavor_cas.1500.title: "[ShowGovernmentReformNameWithNoTooltip('casa_de_contratacion')]"
  flavor_cas.1500.desc: "З нашою заморською експансією наша бюрократія також потребує зростання, щоб задовольнити адміністративні потреби розвідки та торгівлі. Порт [ShowLocationName('sevilla')] слугував би чудовим місцем для заснування [ShowGovernmentReformName('casa_de_contratacion')] і надання Агентству контролю над нашими морськими справами."
  flavor_cas.1500.a: "Ми повинні заснувати його в [ShowLocationNameWithNoTooltip('sevilla')]"
  flavor_cas.1500.b: "Ми повинні заснувати його в [ShowLocationNameWithNoTooltip('cadiz')]"
  flavor_cas.1500.c: "Ми повинні заснувати його в [ShowLocationNameWithNoTooltip('lisbon')]"
  flavor_cas.1500.d: "Ми повинні заснувати його в [target_location.GetNameWithNoTooltip]"
  flavor_cas.1500.e: "Нам це не потрібно."
  flavor_cas.1500.historical_info: "Casa de Contratación була заснована Ізабеллою I Кастильською в 1503 році як урядове агентство для нагляду за всією іспанською колонізацією. Подорожі розвідки та торгівлі мали бути схвалені нею, і всі колоніальні податки збиралися нею. Casa також було доручено намагатися захистити секретну інформацію про нові торгові шляхи та відкриття."
  flavor_cas.1501.title: "Світовий порт [trade_center_location.GetNameWithNoTooltip]"
  flavor_cas.1501.desc: "[trade_center_location.GetRank.GetName] [trade_center_location.GetName] тепер є пунктом призначення для великої кількості купців з усього світу. Незважаючи на труднощі навігації [ShowRegionName('north_atlantic_ocean_region')], порт [trade_center_location.GetNameWithNoTooltip] сприяє зростанню [trade_center_location.GetRank.GetNameWithNoTooltip] і віщує світанок золотої доби для [trade_center_location.GetNameWithNoTooltip]."
  flavor_cas.1501.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.1502.title: "Сонце ніколи не заходить"
  flavor_cas.1502.desc: "Наші невпинні зусилля з розширення кордонів нашої імперії як у [ShowContinentName('europe')], так і за океаном, швидко підвищили нашу репутацію. Особливо з нашою присутністю в [ShowContinentName('asia')] та [ShowContinentName('america')] ми тепер відомі як імперія, над якою сонце ніколи не заходить!"
  flavor_cas.1502.a: "Насолоджуйтесь славою нашої репутації!"
  flavor_cas.1503.title: "[ShowBuildingTypeNameWithNoTooltip('archive_of_the_indies')]"
  flavor_cas.1503.desc: "[ShowGovernmentReformName('casa_de_contratacion')] у [trade_center_location.GetName] довгий час функціонувала на децентралізованій основі. Історик [target_character.GetName] тепер запропонував зібрати всі документи, що стосуються нашої торговельної та адміністративної діяльності за кордоном, і об'єднати їх в одній будівлі, яка вже використовувалася [ShowGovernmentReformNameWithNoTooltip('casa_de_contratacion')]."
  flavor_cas.1503.a: "Чудовий план!"
  flavor_cas.1503.b: "Залишити [ShowGovernmentReformNameWithNoTooltip('casa_de_contratacion')] децентралізованою."
  flavor_cas.1600.title: "Експедиція до [ShowProvinceDefinitionNameWithNoTooltip('oran_province')]"
  flavor_cas.1600.desc: "[inquisitor_cisneros.GetName] тривалий час тиснув на [target_character.GetName], щоб розширити [ShowReligionAdjective('catholic')] володіння [ROOT.GetCountry.GetName] на землі [ShowRegionName('maghreb_region')]. Його плани завоювання конкретно націлені на територію навколо [ShowLocationName('oran')], яка слугувала б придатним центром для [ROOT.GetCountry.GetAdjective] адміністрації та зусиль з поширення [ShowReligionAdjectiveWithNoTooltip('catholic')] місії на інший континент."
  flavor_cas.1600.a: "Негайно захопити [ShowLocationNameWithNoTooltip('oran')]!"
  flavor_cas.1600.b: "Нам слід зосередитися на внутрішніх справах."
  flavor_cas.1600.historical_info: "Захоплення Мерс-ель-Кебіра в 1505 році та подальше завоювання Орана в 1509 році були першими іспанськими кампаніями в Північній Африці, які встановили постійний плацдарм для Іберійської монархії. Очолювана та фінансована кардиналом і Великим інквізитором Сіснеросом, експедиція мала на меті обмежити піратську діяльність проти іспанських суден та поширити місіонерський запал Інквізиції в Північній Африці."
  flavor_cas.1601.title: "Можливість у [GetCountry('TUN').GetNameWithNoTooltip]"
  flavor_cas.1601.desc: "У нашій постійній боротьбі за панування над [ShowAreaName('western_mediterranean_sea_area')] виникла нова можливість! [GetCountry('TUN').GetName] розташована в центральній точці конфлікту, і контроль над гаванню та містом [ShowLocationName('tunis')] розширив би наш вплив у Середземному морі.\n\nНа щастя, деякі радники [GetCountry('TUN').GetNameWithNoTooltip] звернулися до нас за допомогою, побоюючись неминучого перевороту з боку членів двору, що схиляються до [ShowCultureName('turkish_culture')]. Якби ми скористалися цією ситуацією, ми могли б мати справедливу причину для вторгнення та підкорення [GetCountry('TUN').GetNameWithNoTooltip]."
  flavor_cas.1601.a: "Готуйте флот!"
  supporting_tunisian_claimant: "Загрожені інтереси в [ShowAreaNameWithNoTooltip('western_mediterranean_sea_area')]."
  flavor_cas.1601.b: "Наші інтереси лежать в іншому."
  turned_down_tunisian_claimant: "Відмовлено туніському претенденту."
  flavor_cas.1700.title: "Іберійське весілля"
  flavor_cas.1700.desc: "Наш союз із [GetCountry('ARA').GetName] — це можливість створити міцний зв'язок між ними та [ROOT.GetCountry.GetName]. Хоча союз народився з політичної потреби, як [target_character.GetName], так і [target_spouse.GetName] здаються цілком щасливими у своєму шлюбі та працюють разом над стабілізацією Союзу, щоб побудувати міцну політичну конструкцію, яку можна вважати великою державою на [ShowContinentName('europe')] сцені."
  flavor_cas.1700.a: "Забезпечимо тривалу спадщину для союзу."
  spa_iberian_wedding: "Іберійське весілля"
  flavor_cas.1800.title: "Комунерос організовуються"
  flavor_cas.1800.desc: "Міське населення центральної [ShowRegionName('iberia_region')] нещодавно стало дуже незадоволеним [ROOT.GetCountry.GetGovernment.GetRulerTitle] через постійно зростаючі вимоги, висунуті в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Хоча вони ще не настільки незадоволені, щоб піднятися на відкритий заколот, нам доведеться ретельно стежити за ситуацією, щоб уникнути подальших проблем."
  comuneros_rebels: "Повстанці Комунерос"
  comuneros_rebels_joining: "Усі [ShowCultureName('castilian')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('leon_area')], [ShowAreaName('castile_area')], [ShowProvinceDefinitionName('madrid_province')], [ShowProvinceDefinitionName('toledo_province')] приєднуються до [comuneros_rebels.GetName]."
  flavor_cas.1800.a: "Ігнорувати ці зухвалі вимоги!"
  flavor_cas.1800.b: "Надати поступки простолюдинам"
  flavor_cas.1801.title: "Комунерос висувають вимоги"
  flavor_cas.1801.desc: "Комунерос підготували повстання проти [ROOT.GetCountry.GetGovernment.GetRulerTitle] і взяли під контроль міські центри центральної [ShowRegionName('iberia_region')]! Якщо ми негайно не поступимося їхнім вимогам, нам доведеться зустрітися з ними на полі бою, щоб придушити цей заколот."
  flavor_cas.1801.a: "Придушити селянський набрід!"
  flavor_cas.1801.b: "Їхні вимоги розумні."
  flavor_cas.1802.title: "Комунерос переможені"
  flavor_cas.1802.desc: "З комунерос, розчавленими нашою залізною рукою, [target_ruler.GetName] тепер перебуває в ідеальному становищі, щоб зміцнити [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] владу над [ROOT.GetCountry.GetGovernment.GetParliament.GetName] і дозволити йому зайняти належне місце під волею правителя."
  flavor_cas.1802.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] панує безроздільно!"
  flavor_cas.1803.title: "Компроміс із Комунерос"
  flavor_cas.1803.desc: "Після кількох перемовин ми досягли компромісу з Комунерос та реформували права [ROOT.GetCountry.GetGovernment.GetParliament.GetName], щоб взяти більший контроль над [ROOT.GetCountry.GetName]. З цим приходить влада відсунути на другий план [target_ruler.GetName] та заблокувати більшість влади, що походить від позиції [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_cas.1803.a: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName] знатиме, що краще."
  flavor_cas.2000.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_cas.2000.desc: "Нещодавно картина, створена відомим художником [target_artist.GetName], потрапила у володіння [target_ruler.GetName]. Картину було вилучено у непокірного дворянина, і вона блискуче демонструє майстерність [target_artist.GetNameWithNoTooltip]."
  flavor_cas.2000.a: "Найняти [target_artist.GetNameWithNoTooltip] до двору!"
  flavor_cas.2000.b: "Це нічого не варте."
  flavor_cas.2001.title: "[target_artist.GetNameWithNoTooltip] Реакція на війну"
  flavor_cas.2001.desc: "Недавній стан війни мотивував [target_artist.GetName] зосередити свій художній хист на зображенні війни, що, схоже, має на нього тривалий вплив. Лихо, яке війна може принести людям, здається, є головним натхненням для його роботи. Ми повинні спонсорувати його починання, щоб забезпечити його внесок у нашу культуру."
  flavor_cas.2001.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.2001.b: "Відпустити його."
  flavor_cas.2100.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_cas.2100.desc: "[target_artist.GetName] отримав значне визнання як художник у стилі бароко після закінчення його учнівства в [ShowLocationName('sevilla')] та подорожі до двору [ROOT.GetCountry.GetName]. Завдяки нашому постійному спонсорству він міг би принести нову славу репутації [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_cas.2100.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.2100.b: "Відпустити його."
  flavor_cas.2101.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_cas.2101.desc: "Щоб увічнити нашу нещодавню перемогу та створити тривале нагадування про нашу славу, ми повинні замовити роботу у [target_artist.GetName]. Картина підписання миру та нашого милостивого прийняття тривалого миру для нашої країни була б лише доречною."
  flavor_cas.2101.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_cas.2101.b: "Відпустити його."
  flavor_cas.2200.title: "Іберійське весілля"
  flavor_cas.2200.desc: "Питання спадкоємності важко висить над нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle], оскільки наша принцеса [castile_heir.GetName] все ще незаміжня. [ROOT.GetCountry.GetGovernment.GetCourtTitle] тисне на [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та [castile_ruler.GetName], щоб ті шукали королівський шлюб для забезпечення спадкоємності, і було запропоновано, щоб ми прагнули об'єднати наші долі або з [GetCountry('POR').GetName], або з [GetCountry('ARA').GetName]. Без сильного наступника [ROOT.GetCountry.GetName] може зіткнутися з заворушеннями, суперниками-претендентами або навіть іноземним втручанням."
  flavor_cas.2200.a: "Надіслати пропозицію шлюбу до [GetCountry('ARA').GetNameWithNoTooltip]."
  flavor_cas.2200.b: "Натомість звернутися до [GetCountry('POR').GetNameWithNoTooltip]."
  flavor_cas.2200.c: "Ми знайдемо інший шлях."
  flavor_cas.2200.historical_info: "Так зване Іберійське весілля відображає спадкоємність Генріха IV Кастильського. Після його смерті за трон змагалися дві претендентки: Ізабелла Кастильська, підтримана її чоловіком Фердинандом Арагонським, та її племінниця Хуана, підтримана Португалією. Конфлікт закінчився перемогою Ізабелли та Фердинанда, забезпечивши правління Ізабелли та ознаменувавши початок правління знаменитих Католицьких Монархів. Цей союз Кастилії та Арагону пізніше призвів до створення об'єднаної Іспанії."
  flavor_cas.2201.title: "Іберійське весілля"
  flavor_cas.2201.desc: "Посланець від [GetCountry('CAS').GetName] прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [castile_ruler.GetName] пропонує династичний шлюб між [castile_heir.GetName] та членом нашої династії, щоб об'єднати наші володіння. Їхня пропозиція обіцяє взаємне процвітання та стабільність, проте деякі наші радники ставляться до неї зі скептицизмом. Хоча такий союз міг би забезпечити альянс проти спільних ворогів і потенційно призвести до об'єднання корон, інші попереджають, що це може загрожувати нашій незалежності в довгостроковій перспективі."
  flavor_cas.2201.a: "Нам нічого втрачати."
  flavor_cas.2201.b: "Було б мудріше відхилити пропозицію."
  flavor_cas.2202.title: "Королівський шлюб прийнято"
  flavor_cas.2202.desc: "Шлюб між нашим королівським домом та [target_country.GetName] було погоджено. Цей союз не лише зміцнює наші зв'язки, але й відкриває можливість об'єднання наших корон під одним прапором у майбутньому. Найважливіше, він забезпечує спадкоємність, оскільки [castile_heir.GetName] та її чоловік мають зійти на трон безперешкодно."
  flavor_cas.2202.a: "Радісна подія!"
  flavor_cas.2203.title: "Королівський шлюб відхилено"
  flavor_cas.2203.desc: "Нашу пропозицію шлюбу відхилила [target_country.GetName]. Хоча це рішення, безсумнівно, заплямує наші стосунки на роки вперед, найважливіше, що воно все ще залишає питання нашої спадкоємності невирішеним."
  flavor_cas.2203.a: "Ми знайдемо інше рішення."
  flavor_cas.2204.title: "Іберійське весілля"
  flavor_cas.2204.desc: "До нашого двору дійшли новини, що [GetCountry('CAS').GetName] вирішило проігнорувати нашого кандидата у справі спадкоємності [castile_heir.GetName]. Це не можна ігнорувати, оскільки рішення [castile_ruler.GetName] підриває наше становище в Іберії та ставить під загрозу баланс сил. Багато хто при дворі тепер стверджує, що ми повинні висунути власні претензії на [GetCountry('CAS').GetAdjectiveWithNoTooltip] трон, забезпечуючи, щоб ми не залишилися на милість їхнього зростаючого впливу."
  flavor_cas.2204.a: "Ми повинні відстоювати свої претензії!"
  flavor_cas.2204.b: "Відступимо."
  flavor_cas.2205.title: "[claimant_country.GetNameWithNoTooltip] претендує на наш трон"
  flavor_cas.2205.desc.a: "На наш подив, [claimant_country.GetNameWithNoTooltip] заявило про свій намір претендувати на наш трон через наше рішення проігнорувати їхнього кандидата у справі спадкоємності [castile_heir.GetName]. Крім того, вони уклали королівський шлюб з [marriage_candidate.GetName], членом нашої правлячої династії, сподіваючись протистояти претензіям [castile_heir.GetName]. Хоча невідомо, чи будуть вони відстоювати свої претензії, ми повинні бути готові до найгіршого і готуватися захищати наш суверенітет."
  flavor_cas.2205.desc.b: "На наш подив, [claimant_country.GetNameWithNoTooltip] заявило про свій намір претендувати на наш трон через наше рішення проігнорувати їхнього кандидата у справі спадкоємності [castile_heir.GetName]. Хоча невідомо, чи будуть вони відстоювати свої претензії, ми повинні бути готові до найгіршого і готуватися захищати наш суверенітет."
  flavor_cas.2205.a: "Ми захищатимемо нашу корону, якщо буде потрібно!"
  flavor_cas.2300.title: "Повстання ірмандіньо"
  flavor_cas.2300.desc: "#italic Ірмандіньо#!, організована ліга [ShowPopTypeName('peasants')], ремісників та нижчих [ShowPopTypeNameWithNoTooltip('nobles')] у [ShowAreaName('galicia_area')], повстали у відповідь на жорстоке феодальне гноблення [noble_leader.GetName]. Ширяться чутки, що повстанці вже вигнали кількох [ShowPopTypeName('nobles')] і мають на меті взяти в облогу їхні форти. [ShowPopTypeNameWithNoTooltip('nobles')] з [ShowAreaNameWithNoTooltip('galicia_area')] просять, щоб [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] втрутилася, щоб допомогти їм у боротьбі та придушити повстанців."
  first_irmandino_revolt: "Повстання ірмандіньо"
  flavor_cas.2300.a: "Втрутитися та придушити повстання."
  flavor_cas.2300.a.tt: "Усі [ShowPopTypeName('peasants')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('galicia_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [first_irmandino_scope.GetName]"
  flavor_cas.2300.b: "Захистити права [ShowPopTypeNameWithNoTooltip('peasants')] натомість."
  flavor_cas.2300.historical_info: "Перше повстання ірмандіньо, також відоме як Шалене братство, виникло у 1431 році на землях Нуньо Фрейре де Андраде у відповідь на його жорстоке поводження зі своїми підданими. Ірмандіньо об'єднали селян, ремісників і навіть деяких дрібних дворян у своїй боротьбі проти феодального гноблення, що стало одним із найраніших організованих повстань у Галісії проти аристократичної тиранії."
  flavor_cas.2301.title: "Ірмандінське повстання придушене"
  flavor_cas.2301.desc: "$flavor_cas.2300.title$ було рішуче придушене. Об'єднані сили [ShowPopTypeName('nobles')] та [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] приборкали повстання. Однак придушення повстання обійшлося дорого: села були спалені, поля знищені, а багато [ShowPopTypeName('peasants')] страчені або ув'язнені. Дехто пропонує поблажливість та реформи, щоб запобігти майбутнім повстанням, тоді як інші вимагають суворих заходів, аби така непокора ніколи не повторилася."
  flavor_cas.2301.a: "Вжити суворих заходів і вистежити ватажків повстанців."
  flavor_cas.2301.b: "Надати поступки, щоб уникнути подальших повстань."
  flavor_cas.2301.b.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('galicia_area')] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2301.historical_info: "Перше Ірмандінське повстання зрештою закінчилося невдачею. Попри швидке поширення та початкові успіхи, повстання було придушене об'єднаними силами галісійської знаті, яка об'єдналася для захисту своїх привілеїв та маєтків."
  flavor_cas.2302.title: "Ватажка повстанців схоплено"
  flavor_cas.2302.desc: "Під час суворих репресій, що послідували за придушенням Ірмандінського повстання, нашим військам вдалося схопити [target_character.GetName], який, за чутками, є розшукуваним ватажком повстанців. Наші солдати взяли [target_character.GetHimHer] у полон і чекають подальших інструкцій щодо [target_character.GetHisHer] долі."
  flavor_cas.2302.a: "Стратити [target_character.GetHimHer]."
  flavor_cas.2302.b: "Помилувати [target_character.GetHimHer]."
  flavor_cas.2302.historical_info: "Рой Шордо, ватажок руху, був схоплений у 1437 році поблизу Пуентедеуме та страчений. Його смерть ознаменувала кінець Шаленого Братства та першого Ірмандінського повстання."
  flavor_cas.2303.title: "Друге Ірмандінське повстання"
  flavor_cas.2303.desc: "Останнім часом у [ShowAreaName('galicia_area')] зростає невдоволення, оскільки до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] надходять повідомлення про соціальні скарги, поганий урожай та хвороби. Люди багатьох станів об'єдналися в цьому русі, утворивши загальне братство, яке прагне покласти край гнітючому правлінню місцевих [ShowPopTypeNameWithNoTooltip('nobles')]. З тисячами, що піднялися зі зброєю, існує серйозний ризик, що це невелике повстання може поширитися і спричинити велику громадянську війну."
  flavor_cas.2303.a: "Втрутитися і придушити повстанців, поки не пізно."
  flavor_cas.2303.a.tt: "Усі [ShowPopTypeName('peasants')] та [ShowPopTypeName('burghers')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('galicia_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [great_irmandino_scope.GetName]"
  great_irmandino_revolt: "Друге Ірмандінське повстання"
  flavor_cas.2303.b: "Надати їм поступки, щоб уникнути боїв."
  flavor_cas.2303.b.tt: "Ми втратимо [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над усіма [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('galicia_area')]"
  flavor_cas.2303.historical_info: "Друге Ірмандінське повстання, також відоме як Велика Ірмандінська війна, було масштабним повстанням, яке згодом набуло рис повномасштабної громадянської війни. Ірмандіньйоси націлилися на вищу знать та їхню гнітючу систему, знищивши близько 130 замків та фортець, що належали могутнім родинам. Однак розбіжності всередині руху та потужна контратака знаті та корони призвели до краху повстання."
  flavor_cas.2304.title: "Наслідки повстань"
  flavor_cas.2304.desc: "[ShowAreaName('galicia_area')] виявилася постійною завадою для [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Протягом останніх кількох десятиліть вона була епіцентром двох великих повстань, коли бунтівні братства збирали тисячі проти знаті та [ROOT.GetCountry.GetGovernment.GetAdjective] влади. Руйнування, спричинені цими повстаннями, залишили регіон у безладі та викрили слабкі місця в нагляді [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]. Через це дехто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджує, що автономія [ShowAreaNameWithNoTooltip('galicia_area')] дозволила цим рухам розростатися, і регіон слід взяти під суворіший центральний контроль."
  flavor_cas.2304.a: "Ми повинні централізувати наше правління над регіоном."
  flavor_cas.2304.a.tt: "Ми отримаємо [ShowNamedValue('control_severe_bonus')|+=2%] контролю над усіма [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('galicia_area')]\n\nУсі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('galicia_area')] втрачають [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2304.b: "Ми надамо їм більше автономії, щоб уникнути подальших заворушень."
  flavor_cas.2304.b.tt: "Ми втратимо [ShowNamedValue('control_severe_penalty')|+=2%] контролю над усіма [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('galicia_area')]\n\nУсі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('galicia_area')] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2304.historical_info: "Усвідомлюючи необхідність обмежити владу галісійської шляхти та запобігти майбутнім повстанням, корона впровадила масштабні реформи. Було призначено губернатора-генерал-капітана для нагляду за регіоном та засновано королівський суд у Галісії для централізації відправлення правосуддя, позбавивши місцевих лордів судової влади. Щоб ще більше послабити шляхту, корона постановила, що жоден із замків, зруйнованих під час повстань, не може бути відбудований, і передала галісійські монастирі під контроль кастильських чернечих орденів."
  flavor_cas.2400.title: "Війна Банд"
  flavor_cas.2400.desc: "Регіон [ShowAreaName('navarre_area')] охоплений сум'яттям. Протягом досить тривалого часу [ShowPopTypeName('nobles')] зав'язли у жорстоких чварах, які місцево стали відомі як Війна Банд. Ворогуючі шляхетські фракції [target_location_1.GetName] та [target_location_2.GetName] занурили регіон у хаос, грабуючи села та фортеці, змагаючись за панування. Це заворушення підриває владу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')], оскільки місцеві лідери відмовляються дотримуватися [ROOT.GetCountry.GetGovernment.GetAdjective] правосуддя."
  flavor_cas.2400.a: "Стати на бік [target_location_1.GetNameWithNoTooltip]."
  flavor_cas.2400.b: "Натомість підтримати фракцію [target_location_2.GetNameWithNoTooltip]."
  flavor_cas.2400.c: "Втрутитися і зупинити їх обох."
  flavor_cas.2400.c.tt: "Усі [ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location_1.GetName] та [target_location_2.GetName] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], а також локації втрачають [ShowNamedValue('prosperity_ultimate_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2400.d: "Нас це не стосується."
  flavor_cas.2400.historical_info: "Війна Банд була тривалою ворожнечею між ворогуючими шляхетськими фракціями в баскських провінціях Біскайя, Алава та Гіпускоа, що також зачепила сусіднє Королівство Наварра. Підживлювана конкуренцією за ресурси, слабкою королівською владою та загальним занепадом після Кастильської громадянської війни, вона дестабілізувала регіон нападами, насильством та беззаконням. Ці протистояння припинилися лише з встановленням королівської влади Фердинандом та Ізабеллою."
  flavor_cas.2401.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Втручання"
  flavor_cas.2401.desc: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] вирішила діяти рішуче проти ворогуючих шляхетських фракцій у [ShowAreaNameWithNoTooltip('navarre_area')]. [ROOT.GetCountry.GetGovernment.GetAdjective] сили були відправлені для умиротворення регіону, демонтажу фортець бунтівних шляхтичів та забезпечення [ROOT.GetCountry.GetGovernment.GetAdjective] правосуддя. Однак це втручання розгнівало багатьох місцевих [ShowPopTypeName('nobles')], які вважають це образою своїх давніх привілеїв."
  flavor_cas.2401.a: "Запровадити владу залізною рукою."
  flavor_cas.2401.a.tt: "Ми отримаємо [ShowNamedValue('control_severe_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над усіма [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('navarre_area')]\n\nУсі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('navarre_area')] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2401.b: "Вести переговори з місцевою шляхтою."
  flavor_cas.2401.b.tt: "Ми втратимо [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над усіма [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('navarre_area')]\n\nУсі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('navarre_area')] отримують [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2402.title: "[ShowPopTypeNameWithNoTooltip('nobles')] Об'єднуються Проти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]"
  flavor_cas.2402.desc: "[ShowPopTypeName('nobles')] у [ShowAreaName('navarre_area')] повстали наперекір спробі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] запровадити свою владу. Вони відкинули свої дрібні конфлікти та взялися за зброю, згуртувавши свої сили, щоб чинити опір [ROOT.GetCountry.GetGovernment.GetAdjective] втручанню. Якщо ми не зможемо швидко придушити це повстання, воно може надихнути на заворушення в інших регіонах нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.2402.a: "Підняти [ROOT.GetCountry.GetGovernment.GetAdjective] прапори та придушити повстання!"
  flavor_cas.2402.a.tt: "Усі [ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('navarre_area')] приєднуються до [bands_of_navarra_rebels.GetName]"
  flavor_cas.2402.b: "Потрібно було вести переговори з ними раніше..."
  flavor_cas.2402.b.tt: "Ми втратимо [ShowNamedValue('control_ultimate_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над усіма [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('navarre_area')]"
  bands_of_navarra: "Шляхетські Банди Наварри"
  flavor_cas.2403.title: "Банди Умиротворені"
  flavor_cas.2403.desc: "З поразкою останньої повстанської армії Війна Банд нарешті добігла кінця. З придушенням фракцій [ShowPopTypeName('nobles')] та умиротворенням регіону [ShowAreaName('navarre_area')], [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] тепер має можливість реструктурувати управління цими провінціями, щоб забезпечити, що такий хаос більше не повториться."
  flavor_cas.2403.a: "Посилити [ROOT.GetCountry.GetGovernment.GetAdjective] нагляд над регіоном."
  flavor_cas.2403.a.tt: "Кожна [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('navarre_area')] втрачає [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_cas.2403.b: "Забезпечити лояльність поступками."
  flavor_cas.2403.b.tt: "Кожна [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('navarre_area')] отримує [ShowNamedValue('prosperity_weak_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_cas.2403.historical_info: "Вирішення Війни Банд стало значним поворотним моментом для регіону, оскільки Католицькі Монархи використали наслідки конфлікту для зміцнення королівської влади. Централізувавши управління, вони придушили автономію ворогуючих шляхетних домів і призначили королівських губернаторів для підтримання порядку. Була заснована #italic Santa Hermandad#!, військова миротворча установа, для забезпечення ефективного правопорядку, тоді як регіональні збори потрапили під пильніший королівський нагляд."
  flavor_cas.2500.title: "Вороги [target_enemy.GetNameWithNoTooltip]"
  flavor_cas.2500.desc: "До нашої уваги дійшло, що багато тубільців у [ShowRegionName('mesoamerica_region')] бояться правління [target_enemy.GetName], цивілізації, яка накладає важку данину, проводить жорстокі ритуали та тримає навколишні племена у стані страху та обурення. Наші емісари повідомляють, що [target_country.GetName] охоче підтримала б будь-кого, хто міг би повалити цього тирана. Можливо, ми могли б спробувати об'єднатися з цими місцевими силами, щоб повалити [target_enemy.GetAdjectiveWithNoTooltip] правління."
  flavor_cas.2500.a: "Надіслати послів до [target_country.GetNameWithNoTooltip] і запропонувати їм союз."
  flavor_cas.2500.b: "Не будемо втручатися в регіональну політику."
  flavor_cas.2500.historical_info: "Коли Ернан Кортес прибув до Мезоамерики в 1519 році, іспанці значно поступалися чисельністю могутній Ацтекській імперії. Проте не лише іспанська зброя спричинила її падіння. Щоб отримати перевагу над ацтеками, Кортес вміло використав поширене невдоволення серед васальних держав та суперників ацтеків, зокрема тласкальців, тотонаків та уексотцинків, які довго страждали під ацтекським пануванням, примусовими данинами та людськими жертвоприношеннями. Ці місцеві союзники виявилися вирішальними, оскільки вони надали десятки тисяч корінних воїнів, які приєдналися до іспанської справи."
  flavor_cas.2501.title: "Повалення [target_enemy.GetNameWithNoTooltip]"
  flavor_cas.2501.desc: "До нас звернувся посланець з [root_country.GetName], які дізналися про наше невдоволення [target_enemy.GetName]. Вони говорять про союз і взаємодопомогу, про свободу від данини та жертвоприношень. Деякі з нас бачать шанс на визволення, тоді як інші попереджають, що довіра до цих прибульців може призвести до руїни."
  flavor_cas.2501.a: "Наша свобода може бути з [root_country.GetNameWithNoTooltip]..."
  flavor_cas.2501.b: "Ми не довірятимемо чужинцям."
  flavor_cas.2502.title: "Іноземні змови"
  flavor_cas.2502.desc: "Наші шпигуни повідомляють про [root_country.GetAdjective] послів, що пересуваються серед менших племен. Ці іноземні втручальники пропонують обіцянки союзу та зброї тим, хто занадто слабкий, щоб стояти самостійно. За повідомленнями, [target_country.GetName] вже висловили бажання об'єднатися з іноземцями, що становить загрозу нашому регіональному домінуванню. Деякі радники закликають до превентивного удару, щоб придушити інакомислення, перш ніж воно об'єднається з чужинцями."
  flavor_cas.2502.a: "Ми будемо чекати і спостерігати."
  flavor_cas.2502.b: "Розчавити їх, поки не пізно!"
  flavor_cas.2503.title: "Укладений пакт"
  flavor_cas.2503.desc: "Народ [target_country.GetName] погодився об'єднати з нами сили. Разом ми тепер готові завдати удару в серце [target_enemy.GetName]. Їхнє знання місцевості, їхні воїни та їхнє бажання помсти стануть великими перевагами в майбутній кампанії."
  flavor_cas.2503.a: "Чудово. Ми йдемо разом!"
  flavor_cas.2504.title: "Відхилена пропозиція"
  flavor_cas.2504.desc: "Нашу пропозицію союзу було відхилено. Чи то зі страху, гордості, чи помилкової лояльності, [target_country.GetName] відмовилися об'єднатися з нами проти [target_enemy.GetName]. Хоча багато хто вважає це провалом нашої дипломатії, це навряд чи матиме значний вплив на нашу позицію в [ShowRegionName('mesoamerica_region')]."
  flavor_cas.2504.a: "Їхня втрата."
  flavor_cas.2600.title: "Реформи [target_ruler.GetNameWithNoTooltip]"
  flavor_cas.2600.desc: "Величезний розмах нашого [ROOT.GetCountry.GetFlavorRank], з впливом як у старому, так і в новому світі, напружує межі нашої існуючої адміністрації. Корупція серед колоніальних чиновників, військова неефективність та застарілі податкові системи позбавляють [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] належного. [target_ruler.GetName] та багато наших радників запропонували далекосяжні плани щодо централізації адміністрації та модернізації управління на всіх наших володіннях."
  flavor_cas.2600.a: "Негайно розпочати ці реформи."
  flavor_cas.2600.a.tt: "Розпочинає низку подій, спрямованих на реформування нашої адміністрації."
  flavor_cas.2600.b: "Система працює добре, як є."
  flavor_cas.2600.historical_info: "Після Війни за іспанську спадщину та сходження династії Бурбонів Іспанія виявилася керуючою занепадаючою та неефективною імперією. Центральній адміністрації бракувало контролю над віддаленими колоніальними володіннями, де віце-королі та місцеві еліти правили майже автономно. Отже, Корона стала на шлях амбітних державотворчих реформ, спрямованих на модернізацію іспанської імперської адміністрації, натхненних французькими абсолютистськими принципами та централізаторською політикою Людовика XIV."
  flavor_cas.2601.title: "Корупція при [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_cas.2601.desc: "Реформаторський шлях, який ми розпочали, має на меті викорінення корупції з нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Багато хто підозрював [target_advisor.GetName] у марнотратстві грошей з нашої скарбниці та надсиланні їх для просування [target_advisor.GetHisHer] сімейних інтересів у [corrupt_advisor_location.GetName]."
  flavor_cas.2601.a: "Негайно усунути [target_advisor.GetHimHer] з [target_advisor.GetHisHer] посади."
  flavor_cas.2601.b: "Стратити [target_advisor.GetHimHer] як попередження для всіх."
  flavor_cas.2601.c: "[target_advisor.GetSheHe|U] надто цінний, щоб його усувати."
  flavor_cas.2601.historical_info: "У рамках Бурбонських реформ Іспанія прагнула посилити контроль Корони над своїми радниками та чиновниками. Багато хто, кого вважали нелояльними, корумпованими або неефективними, були усунені від влади та часто замінені лояльними бюрократами, призначеними безпосередньо Короною."
  flavor_cas.2602.title: "[ShowGovernmentReformNameWithNoTooltip('intendancy_system')]"
  flavor_cas.2602.desc: "Для подальшого проведення реформ [ROOT.GetCountry.GetFlavorRank] деякі з наших найдосвідченіших радників, лояльних до [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], пропонують створення так званої [ShowGovernmentReformName('intendancy_system')]. Вона служитиме безпосередньо під нашою владою, таким чином обходячи вкорінені місцеві еліти, які часто є корумпованими та діють у власних інтересах, а не захищають благо [ROOT.GetCountry.GetFlavorRank]."
  flavor_cas.2602.a: "Запровадити її!"
  flavor_cas.2602.b: "Зберегти поточну структуру."
  flavor_cas.2602.historical_info: "Система інтендантств була наріжним каменем Бурбонських реформ. Вона була розроблена для централізації королівської влади та модернізації державного управління як в Іспанії, так і в її імперії. Інтенданти призначалися безпосередньо Короною для нагляду за провінційним управлінням, особливо у фінансових питаннях, таких як збір податків та боротьба з корупцією. Система була розроблена для зменшення влади місцевих еліт та мала на меті стимулювати економічне зростання."
  flavor_cas.2603.title: "Нав'язування [ShowGovernmentReformNameWithNoTooltip('intendancy_system')] колоніям"
  flavor_cas.2603.desc: "Незважаючи на невдоволення станів, широко поширена думка, що прийняття [ShowGovernmentReformName('intendancy_system')] було успішним. Оскільки реформи закріплюються на материку, наші радники пропонують розпочати впровадження тих самих заходів у наших заморських володіннях."
  flavor_cas.2603.a: "Запровадити наші реформи."
  flavor_cas.2603.a.tt: "Кожна [ShowSubjectTypeName('colonial_nation')] прийме [ShowGovernmentReformNameWithNoTooltip('intendancy_system')] та отримає [ShowNamedValue('liberty_desire_severe_plus')|-=2%] [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2603.b: "Ми не можемо ризикувати повстаннями в Новому Світі."
  flavor_cas.2603.historical_info: "З 1764 року система інтендантств була впроваджена в іспанських заморських володіннях, починаючи з Куби та поширюючись на Мексику, Перу, Чилі, Ріо-де-ла-Плата та Філіппіни. Хоча система покращила ефективність та державні доходи, вона часто викликала напруженість з віце-королями, губернаторами та колоніальними елітами."
  flavor_cas.2604.title: "Колоніальне невдоволення"
  flavor_cas.2604.desc: "Наші зусилля з раціоналізації та модернізації колоніальної адміністрації шляхом запровадження [ShowGovernmentReformName('intendancy_system')] та централізованого нагляду спровокували хвилю заворушень у наших заморських володіннях. Місцеві еліти, колись звиклі до значної автономії та привілеїв, відкрито чинять опір тому, що вони сприймають як посягання на їхні встановлені права."
  flavor_cas.2604.a: "Ми не відмовимося від наших зусиль."
  flavor_cas.2604.a.tt: "Кожна [ShowSubjectTypeName('colonial_nation')] з реформою [ShowGovernmentReformNameWithNoTooltip('intendancy_system')] отримує [ShowNamedValue('liberty_desire_severe_plus')|-=2%] [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2604.b: "Було б мудріше відступити."
  flavor_cas.2604.b.tt: "Кожна [ShowSubjectTypeName('colonial_nation')] з реформою [ShowGovernmentReformNameWithNoTooltip('intendancy_system')] скасує її та отримає [ShowNamedValue('liberty_desire_mild_minus')|-=2%] [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2604.historical_info: "Наслідки Бурбонських реформ були одним з основних факторів, що спонукали іспанські колоніальні суб'єкти до незалежності. Ці реформи позбавили місцеві еліти адміністративних повноважень і передали владу призначеним короною чиновникам. Хоча з фінансової точки зору реформи досягли своєї мети, вони відштовхнули місцеві еліти, які відчували себе позбавленими прав. У поєднанні зі зростаючим економічним тягарем ці реформи значно підірвали колоніальну лояльність. Широке невдоволення зрештою сприяло рухам за незалежність по всій Іспанській Америці на початку 19 століття."
  flavor_cas.2605.title: "Заклик до незалежності"
  flavor_cas.2605.desc: "Через жорстокі реформи, прийняті [overlord_country.GetName], та їхні зусилля нав'язати їх нам, наш народ дедалі більше незадоволений нашим сюзереном, і все суспільство, здається, штовхає колоніальний уряд скинути обтяжливе ярмо [overlord_country.GetNameWithNoTooltip]. Якщо ми не діятимемо зараз, ми можемо ніколи не отримати іншого шансу."
  flavor_cas.2605.a: "Нехай почнеться війна за незалежність!"
  flavor_cas.2605.b: "Зараз не час для війни."
  flavor_cas.2605.historical_info: "Іспано-американські війни за незалежність були серією конфліктів з різними каталізаторами, будь то жорстокі реформи, прийняті династією Бурбонів, або наслідки Піренейської війни, розв'язаної Наполеоном. Колоніальні еліти та корінне населення, раніше лояльні, були розчаровані нестабільністю Іспанії та змогли згуртувати майже всіх до своєї справи. Результатом став майже повний розпад іспанського колоніального панування в Америці протягом кількох десятиліть."
  flavor_cas.2606.title: "Американська війна за незалежність"
  flavor_cas.2606.desc: "[colonial_country.GetName], один з наших колоніальних суб'єктів, оголосив нам війну. Вони відкидають нашу владу і проголошують свій намір звільнитися від нашого правління. Шок зради глибоко ранить, але зараз не час для скорботи. Ми повинні зібрати наші сили і зробити все можливе, щоб повернути колонії під наше законне правління."
  flavor_cas.2606.a: "Вони заплатять за свою зраду!"
  flavor_cas.2700.title: "Вплив [overlord_country.GetGoverment.GetEstateNameWithNoTooltip('crown_estate')]"
  flavor_cas.2700.desc: "Материкові власті знову посилили свій контроль над нашою адміністрацією. З впровадженням нової [ShowGovernmentReformName('intendancy_system')] місцеві владні структури відсуваються на другий план на користь чиновників, призначених [overlord_country.GetGoverment.GetEstateName('crown_estate')]. Економічний тягар також зріс, оскільки податки підвищуються, а данина суворо стягується."
  flavor_cas.2700.a: "Ми повинні підкоритися їхній волі."
  flavor_cas.2700.b: "Ми не підкоримося їхнім рішенням!"
  flavor_cas.2700.historical_info: "У середині-кінці 18 століття іспанська корона ініціювала Бурбонські реформи, які були серією централізуючих політик, розроблених для підвищення ефективності колоніального управління. Одним з найбільш руйнівних заходів було прийняття системи інтендантства, яка замінила старі, більш автономні місцеві органи влади чиновниками, лояльними до Корони. У таких місцях, як Перу, ці реформи підірвали вплив як місцевих еліт, так і корінних влад, викликаючи невдоволення як серед вищих, так і серед нижчих класів."
  flavor_cas.2701.title: "Голос з високогір'я"
  flavor_cas.2701.desc: "Місцевий житель на ім'я Хосе Габріель Кондорканкі, який стверджує, що походить від стародавніх імператорів інків, почав збурювати людей високогір'я. Взявши ім'я [target_character.GetName], [target_character.GetSheHe] засуджує нові податки, зловживання щодо корінних народів та знищення місцевої автономії. [target_character.GetSheHe|U] погрожує розпочати повномасштабне повстання, оскільки [target_character.GetHisHer] справу підтримують тисячі місцевих жителів."
  flavor_cas.2701.a: "[target_character.GetSheHe|U] — ніхто. Ігнорувати [target_character.GetHerHim]."
  flavor_cas.2701.a.tt: "Усі [ShowCultureName('aimara_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('andes_region')] [Concept('region', 'CONCEPT_PLACEHOLDER')|e] приєднуються до [tupac_rebellion.GetName]"
  flavor_cas.2701.b: "Давайте відступимо."
  flavor_cas.2701.historical_info: "У 1780 році Хосе Габріель Кондорканкі, метис, який стверджував про походження від інків, взяв ім'я Тупак Амару II і розпочав повстання поблизу Куско. Розчарований зловживаннями владою та стражданнями корінного населення, він прагнув покласти край системам примусової праці та іншим колоніальним утискам. Повстання привернуло десятки тисяч корінних бійців, торговців та позбавлених прав місцевих жителів."
  flavor_cas.2702.title: "Повстання придушене"
  flavor_cas.2702.desc: "Нашим силам вдалося розгромити повстанців, які загрожували повалити встановлений порядок у [ShowRegionName('andes_region')]. Пам'ять про це повстання не згасне легко, і його відлуння ще може викликати заворушення в майбутньому."
  flavor_cas.2702.a: "Тубільці заплатять за свою зраду."
  flavor_cas.2702.a.tt: "Усі [ShowCultureName('aimara_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('andes_region')] [Concept('region', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2702.b: "Ми повинні залишити минуле позаду."
  flavor_cas.2702.b.tt: "Усі [ShowCultureName('aimara_culture')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('andes_region')] [Concept('region', 'CONCEPT_PLACEHOLDER')|e] отримують [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_cas.2702.historical_info: "Повстання під проводом Тупака Амару II, хоча спочатку було успішним у згуртуванні тисяч корінних та метисних прихильників по всьому Південному та Верхньому Перу, зрештою було придушене вищою військовою силою та організаційним охопленням іспанських колоніальних властей. Для корінного населення поразка була дуже трагічною. Багато хто сподівався на відновлення автономії або принаймні полегшення від колоніальних зловживань, але замість цього опинилися під ще більшими репресіями, з культурними проявами інкської ідентичності та місцевими лідерськими структурами, які все частіше заборонялися або демонтувалися державою."
  flavor_cas.2703.title: "Доля [target_character.GetNameWithNoTooltip]"
  flavor_cas.2703.desc: "[target_character.GetName], лідера придушеного повстання, було схоплено. Хоча багато хто закликає до милосердя, інші вимагають справедливості за пролиту кров наших вірних підданих. Колоніальна еліта розділена між тим, щоб зробити з [target_character.GetHimHer] приклад або відпустити [target_character.GetHimHer], але це пов'язано з ризиком, що [target_character.GetHisHer] спадщина може розпалити більше заворушень у наступні роки."
  flavor_cas.2703.a: "Стерти [target_character.GetHisHer] ім'я з пам'яті."
  flavor_cas.2703.b: "Вислати [target_character.GetHimHer]."
  flavor_cas.2703.historical_info: "Тупака Амару II було схоплено, публічно страчено в Куско, і змушено спостерігати за смертю своєї родини та союзників. Його страта була задумана як жорстоке попередження іншим. Незважаючи на це, він став вічним символом опору корінних народів."