l_english:
  bra_hre_hyperlink: "[GetUniqueInternationalOrganization('hre').GetName]"
  bra_hre_hyperlink_no_tt: "[GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
  bra_hre_emperor_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  bra_hre_emperor_country_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]"
  bra_wittelsbach_hyperlink: "[ShowDynastyName('wittelsbach_dynasty')]"
  bra_wittelsbach_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('wittelsbach_dynasty')]"
  bra_askanier_hyperlink: "[ShowDynastyName('askanier_dynasty')]"
  bra_askanier_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('askanier_dynasty')]"
  bra_variable_counter: "(наразі: #Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_investment_var').GetValue]#!)"
  bra_wittelsbacher_investment_var: "#Y Інвестиції Віттельсбахів#!"
  bra_change_investment_score_add: "Ми отримуємо $VALUE|G0$ $bra_wittelsbacher_investment_var$ $bra_variable_counter$"
  bra_change_investment_score_subtract: "Ми втрачаємо $VALUE|R0$ $bra_wittelsbacher_investment_var$ $bra_variable_counter$"
  flavor_bra_dynasty.1.title: "[root_dynasty.GetNameWithNoTooltip] з [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_bra_dynasty.1.desc.start: "Зі смертю останнього члена $bra_askanier_hyperlink$ з [ROOT.GetCountry.GetName], [GetCharacter('bra_heinrich_ii_askanier').GetName], у 1320 році, [ROOT.GetCountry.GetAdjectiveWithNoTooltip] землі перейшли до рук [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName], обраного імператора $bra_hre_hyperlink$. Щоб зберегти північну [ShowCultureGroupName('german_group')] територію під управлінням, [GetCharacter('ubv_ludwig_iv_wittelsbach').GetShortNameWithNoTooltip] призначив [ROOT.GetCountry.GetAdjectiveWithNoTooltip] марку [GetCharacter('ubv_ludwig_iv_wittelsbach').GetHisHer] [GetCharacter('bra_ludwig_v_wittelsbach').GetDaughterSon], [GetCharacter('bra_ludwig_v_wittelsbach').GetName]."
  flavor_bra_dynasty.1.desc: "$flavor_bra_dynasty.1.desc.start$\n\nЦе початок ери $bra_wittelsbach_hyperlink$ у [ROOT.GetCountry.GetNameWithNoTooltip] та період негараздів, оскільки [ROOT.GetCountry.GetGovernment.GetRulerTitle] був поставлений правителем у молодому віці, залишивши більшу частину уряду в руках [GetCharacter('hnb_berthold_iv_henneberg_schleusingen').GetName]. Барони-розбійники, економічні проблеми та загальне невдоволення населення своїм [ROOT.GetCountry.GetGovernment.GetRulerTitle] переслідують правління [GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip], а $bra_wittelsbach_hyperlink_no_tt$, здається, мало дбають про свої володіння на півночі..."
  flavor_bra_dynasty.1.desc.fallback: "$flavor_bra_dynasty.1.desc.start$\n\nПравління [GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip], однак, було недовгим, і [root_ruler.GetName] взяв контроль над [ROOT.GetCountry.GetNameWithNoTooltip]. Проте, економічні проблеми, а також барони-розбійники все одно заплямовують авторитет [ROOT.GetCountry.GetGovernment.GetRulerTitle], а $bra_wittelsbach_hyperlink$ виявляють мало інтересу до зміни поточного стану недорозвиненої марки..."
  flavor_bra_dynasty.1.a: "[ROOT.GetCountry.GetNameWithNoTooltip] переможе!"
  flavor_bra_dynasty.1.a.at: "Цей модифікатор активний, доки ми не перестанемо бути під владою $bra_wittelsbach_hyperlink$ або доки не спрацює [Concept('event', 'CONCEPT_PLACEHOLDER')|e] '#Y $flavor_bra_dynasty.8.title$#!'."
  flavor_bra_dynasty.1.a.bt: "Щоб досягти цієї події, ми повинні набрати #Y 7#! $bra_variable_counter$ очок $bra_wittelsbacher_investment_var$."
  flavor_bra_dynasty.1.a.ct: "Ми отримуватимемо [Concept('events', 'CONCEPT_PLACEHOLDER')|e], які дозволять нам змінювати рахунок в будь-якому напрямку. При #Y -20#! подія '#Y $flavor_bra_dynasty.1100.title$#!' стане доступною для спрацювання, усуваючи $bra_wittelsbach_hyperlink_no_tt$ від влади"
  flavor_bra_dynasty.2.title: "Кінець періоду $bra_wittelsbach_hyperlink_no_tt$"
  flavor_bra_dynasty.2.desc: "Оскільки жоден член династії $bra_wittelsbach_hyperlink$ не має монархічної влади над [ROOT.GetCountry.GetName], ера економічної стагнації та постійної занедбаності нарешті знайшла свій кінець. Тепер у руках нових правителів принести час процвітання нашому народу."
  flavor_bra_dynasty.2.a: "Нехай це буде початком Золотого Віку."
  flavor_bra_dynasty.3.title: "Фальшивий $name_waldemar$"
  flavor_bra_dynasty.3.desc: "Спочатку історія [target_character.GetHisHer] звучить реалістично, хоч і трохи дивно: правитель, який інсценує [target_character.GetHisHer] власний похорон, щоб безперешкодно вирушити в паломництво. Але в міру того, як [target_character.GetHisHer] кампанія за трон триває, [target_character.GetHisHer] обличчя почало тріскатися. Ті, хто знав [GetCharacter('bra_waldemar_askanier').GetName] до 1320 року, відзначили незрозумілі зміни в особистості. Пізніше цього дня нарешті було виявлено, що [target_character.GetName] є лише самозванцем найшанованішого маркграфа!\n\nВ одну мить будь-яка підтримка, яку претендент називав [target_character.GetHisHer] власною, зникла, і правління [ROOT.GetCountry.GetGovernment.GetRuler.GetName] знову стало беззаперечним."
  flavor_bra_dynasty.3.a: "Самозванець серед нас... хто б міг знати?"
  flavor_bra_dynasty.4.title: "Тиранія баронів-розбійників"
  flavor_bra_dynasty.4.desc: "Захищені правовим статусом своїх феодів, барони-розбійники [ROOT.GetCountry.GetName] є членами [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які накладають непомірні мита та податки на місцеве населення. Хоча їхні причини можуть бути відчаєм, їхні дії перешкоджають розвитку [ROOT.GetCountry.GetAdjectiveWithNoTooltip] земель, якщо ми дозволимо цьому тривати..."
  flavor_bra_dynasty.4.a: "Боротися з баронами-розбійниками."
  flavor_bra_dynasty.4.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  bra_peasants_revolt: "Селянське повстання"
  flavor_bra_dynasty.5.title: "Повстання [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]"
  flavor_bra_dynasty.5.desc: "Економічний занепад [ROOT.GetCountry.GetName] залишив багатьох членів [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] озлобленими та засмученими. Вони відмовляються працювати на полях, доки не будуть виконані їхні вимоги щодо покращення їхнього становища під тиранією корисливих лицарів-розбійників..."
  flavor_bra_dynasty.5.a: "Покращити їхнє становище."
  flavor_bra_dynasty.5.b: "Це всього лише селяни. Вони не створять жодних проблем."
  flavor_bra_dynasty.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] беруть контроль"
  flavor_bra_dynasty.6.desc: "Хоча влада $bra_wittelsbach_hyperlink$ присутня на папері, фактична влада над людьми знаходиться в руках тих, кого маси обрали наслідувати. У сільських поселеннях це буде [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Якщо ми хочемо отримати будь-яку владу на нашій власній землі, ми повинні відкликати владу духовенства..."
  flavor_bra_dynasty.6.a: "Відкликати їхню владу."
  flavor_bra_dynasty.6.b: "Ми не повинні зв'язуватися з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  flavor_bra_dynasty.7.title: "Відмова від міських податків"
  flavor_bra_dynasty.7.desc: "[ROOT.GetCountry.GetName] знаходиться в несприятливому середовищі. Землі малонаселені, і ще менш розвинені. Більшість [ROOT.GetCountry.GetAdjectiveWithNoTooltip] формується за рахунок податків з міст і містечок. Однак [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] відмовляються платити свою частину нашій державі, оскільки вони бачать мало причин визнавати $bra_wittelsbach_hyperlink$ своїм сувереном..."
  flavor_bra_dynasty.7.a: "Приборкати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  flavor_bra_dynasty.7.b: "$common_string_leave_them_be$"
  flavor_bra_dynasty.8.title: "$bra_wittelsbach_hyperlink_no_tt$ оживляють [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_bra_dynasty.8.desc: "Після років бідності та спустошення; років автономних станів та тиранії баронів-розбійників; років викликів та претендентів, Дім $bra_wittelsbach_hyperlink$ переміг, і [ROOT.GetCountry.GetFlavorRank] [ROOT.GetCountry.GetName] став перлиною в [ShowRegionName('north_german_region')]. Хай довго живе правління [target_character.GetName]!"
  flavor_bra_dynasty.8.a: "[ROOT.GetCountry.GetNameWithNoTooltip] стане гордістю $bra_wittelsbach_hyperlink_no_tt$."
  flavor_bra_dynasty.9.title: "Таємниця [target_character.GetNameWithNoTooltip]"
  flavor_bra_dynasty.9.desc: "[target_character.GetHisHer|U] смерть настала швидко й несподівано, проте [target_character.GetHisHer] спадщина досі переслідує [ROOT.GetCountry.GetName]. [target_character.GetName], ймовірний $bra_askanier_hyperlink$, який правив нашим [ROOT.GetCountry.GetFlavorRank] до 1320 року, виявився найпідступнішим самозванцем і інтриганом в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] історії. На [target_character.GetHisHer] похоронах [target_character.GetHisHer] стару могилу розкопали, щоб [target_character.GetHeShe] міг спочивати вічно. Однак церемонія передчасно завершилася, коли було виявлено скелет [GetCharacter('bra_waldemar_askanier').GetName] — #italic $name_waldemar$#! —.\n\nЦе, природно, викликало велику ганьбу для [ROOT.GetCountry.GetNameWithNoTooltip], оскільки проста людина зуміла обдурити цілу країну..."
  flavor_bra_dynasty.9.a: "Як це могло статися? Ми розумніші за це..."
  flavor_bra_dynasty.1000.title: "Повернення [target_character.GetNameWithNoTooltip]"
  flavor_bra_dynasty.1000.desc: "Оскільки жоден імператор $bra_hre_hyperlink$ більше не пов'язаний з правлячим $bra_wittelsbach_hyperlink$, легітимність [bra_ruler.GetName] знову під питанням. Народ [ROOT.GetCountry.GetName] тужить за роками правління $bra_askanier_hyperlink$. Як того бажає доля, вважався мертвим [target_character.GetName] публічно оголосив про своє прибуття. Заявляючи, що його похорон був лише інсценований на користь його паломництва до Святої Землі, [target_character.GetShortNameWithNoTooltip] повернувся, щоб вимагати [ROOT.GetCountry.GetAdjective] трон у [bra_ruler.GetShortNameWithNoTooltip]."
  flavor_bra_dynasty.1000.desc.emperor_supports: "$flavor_bra_dynasty.1000.desc$\n\nНа щастя, відносини між [emperor_ruler.GetName] та [bra_ruler.GetShortNameWithNoTooltip] доброзичливі. Таким чином, $bra_hre_emperor_hyperlink$ підтримує дім $bra_wittelsbach_hyperlink_no_tt$ проти претендента."
  flavor_bra_dynasty.1000.desc.emperor_rejects: "$flavor_bra_dynasty.1000.desc$\n\nНа жаль, $bra_hre_emperor_hyperlink$ віддає перевагу дому $bra_askanier_hyperlink_no_tt$ перед $bra_wittelsbach_hyperlink_no_tt$. Таким чином, [emperor_ruler.GetName] надав право правити [bra_country.GetNameWithNoTooltip] [target_character.GetShortNameWithNoTooltip]. Лише угода з [emperor_ruler.GetNameWithNoTooltip] може вирішити загрозу від [target_character.GetShortNameWithNoTooltip]..."
  flavor_bra_dynasty.1000.a: "Зв'язатися з $bra_hre_emperor_hyperlink$!"
  flavor_bra_dynasty.1000.a.at: "Кожна країна, яка має члена династії $bra_wittelsbach_hyperlink$ як свого правителя, отримує [ShowBiasValue('opinion_support_our_dynasty_member')|+0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [ROOT.GetCountry.GetName]"
  flavor_bra_dynasty.1000.a.tt: "Ми звернемося до [Concept('emperor_country.GetName] і попросимо їхньої допомоги у боротьбі з претендентом. Це займе у нас #Y 2 роки#!, і ми будемо змушені виконувати умови $bra_hre_emperor_hyperlink$, якщо їхня [opinion', 'CONCEPT_PLACEHOLDER')|e] до нас не перевищує #Y 100#!"
  flavor_bra_dynasty.1000.b: "Стратити претендента власноруч!"
  flavor_bra_dynasty.1000.b.tt: "Ми спробуємо стратити [Concept('target_character.GetName]. Якщо це вдасться, легітимність [bra_ruler.GetName] буде відновлена, і ми отримаємо #Y +5#! бонус до нашого $bra_wittelsbacher_investment_var$ $bra_variable_counter$.\nЯкщо це не вдасться, спалахне [civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_bra_dynasty.1000.c: "Зректися престолу на користь справжнього правителя [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_bra_dynasty.1000.c.at: "Кожна країна, яка має члена династії $bra_wittelsbach_hyperlink$ як свого правителя, отримує [ShowBiasValue('opinion_ousted_our_dynasty_member')|+0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [ROOT.GetCountry.GetName]"
  flavor_bra_dynasty.false_waldemar_rebel.tt: "[ShowPopTypeName('nobles')] до #Y 4#! найбільш населених, володінь отримують наступні ефекти:\n- Втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]\n- Приєднується до [false_waldemar_rebel.GetName]"
  flavor_bra_dynasty.1001.title: "Повстання [target_character.GetShortNameWithNoTooltip] у [bra_country.GetNameWithNoTooltip]"
  flavor_bra_dynasty.1001.desc.imposter_revealed: "Посол з [bra_country.GetName] прибув до нашого великого двору, щоб просити нашої підтримки проти зростаючого претендента та суперника [bra_ruler.GetName]. Очевидно, самопроголошений '[target_character.GetName]' стверджує, що повернувся з паломництва до Святої Землі, і тепер вимагає [bra_country.GetAdjectiveWithNoTooltip] трон.\n\nОднак, до нас дійшли новини про обман, оскільки цей '$name_waldemar$' є лише претендентом."
  flavor_bra_dynasty.1001.desc: "Посол з [bra_country.GetName] прибув до нашого двору, щоб просити нашої підтримки у династичному конфлікті. Колишній правитель [bra_country.GetNameWithNoTooltip], [target_character.GetName] повернувся з довгого паломництва до Святої Землі, і тепер знову вимагає [bra_country.GetAdjective] трон для себе. [bra_ruler.GetName] знаходить мало підтримки серед своїх підданих і висловив свою готовність вести переговори з нами в обмін на нашу підтримку проти претендента."
  flavor_bra_dynasty.1001.help.tt: "[Concept('target_character.GetName] буде вигнаний з [bra_country.GetName], а [modifier', 'CONCEPT_PLACEHOLDER')|e] [ShowModifier('bra_waldemar_rallies_nobility')] буде з них знятий"
  flavor_bra_dynasty.1001.a: "Ми підтримаємо їхню справу в обмін на золото."
  flavor_bra_dynasty.1001.a.tt: "Ми отримаємо [ROOT.GetVariable('bra_gold_tooltip_var').GetValue|+=2] [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] від [bra_country.GetName] через #Y 1 рік#!"
  flavor_bra_dynasty.1001.b: "Одна рука миє іншу. Допоможіть їм!"
  flavor_bra_dynasty.1001.b.tt: "[bra_country.GetName] проголосує за нас через #Y 1 рік#!"
  flavor_bra_dynasty.1001.c: "Ми допоможемо $bra_wittelsbach_hyperlink_no_tt$ за їхню політичну прихильність."
  flavor_bra_dynasty.1001.c.tt: "Ми отримаємо [ShowBiasValue('opinion_supported_the_wittelsbacher')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] з усіма [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які мають $bra_wittelsbach_hyperlink$ [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] при владі через #Y 1 рік#!"
  flavor_bra_dynasty.1001.d: "$bra_wittelsbach_hyperlink_no_tt$ буде підтриманий."
  flavor_bra_dynasty.1001.d.tt: "Ми нічого не проситимемо взамін"
  flavor_bra_dynasty.1001.e: "Ми нічого не отримаємо від допомоги $bra_wittelsbach_hyperlink_no_tt$."
  flavor_bra_dynasty.1001.e.tt: "Ми відмовимося підтримувати $bra_wittelsbach_hyperlink$, зменшивши [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] всіх [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] з $bra_wittelsbach_hyperlink_no_tt$ як їхньою правлячою [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] на [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0], але покращивши думку всіх країн з династією $bra_askanier_hyperlink$ на [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] через #Y 1 рік#!"
  flavor_bra_dynasty.1001.zzz: "[bra_ruler.GetShortNameWithNoTooltip] буде дозволено вершити правосуддя, як [bra_ruler.GetHeShe] вважає за потрібне."
  flavor_bra_dynasty.1001.zzz.tt: "[bra_country.GetName] буде дозволено розібратися з [target_character.GetName] на власний розсуд"
  flavor_bra_dynasty.1002.title: "Підтримка від $bra_hre_emperor_hyperlink$"
  flavor_bra_dynasty.1002.desc: "Чудові новини досягли нашого двору! $bra_hre_emperor_hyperlink$, [emperor_ruler.GetName] з [emperor_country.GetName], висловив свою щиру підтримку [bra_ruler.GetName] у [bra_ruler.GetHisHer] боротьбі проти самозванця [target_character.GetName]!"
  flavor_bra_dynasty.1002.desc.gold: "$flavor_bra_dynasty.1002.desc$\n\nЗвісно, така підтримка не є безкоштовною. [emperor_ruler.GetShortNameWithNoTooltip] висловив фінансовий тягар, який [emperor_ruler.GetHisHer] підтримка накладає на [emperor_ruler.GetHisHer] скарбницю. Таким чином, [emperor_ruler.GetHeShe] вимагає данину в розмірі [ROOT.GetVariable('bra_owes_gold').GetValue|V2] золота в обмін."
  flavor_bra_dynasty.1002.desc.loyalty: "$flavor_bra_dynasty.1002.desc$\n\nЗвісно, така підтримка не є безкоштовною. [emperor_ruler.GetShortNameWithNoTooltip] стурбований [emperor_ruler.GetHisHer] спадкоємністю в $bra_hre_hyperlink$ і бажає нашої повної лояльності до справи [emperor_ruler.GetHisHer] родини для забезпечення Імператорського Престолу."
  flavor_bra_dynasty.1002.desc.relations: "$flavor_bra_dynasty.1002.desc$\n\nЗвісно, така підтримка не є безкоштовною. [emperor_ruler.GetShortNameWithNoTooltip] бажає, щоб ми стали їхнім вісником у $bra_wittelsbach_hyperlink$, демонструючи кожному члену династії славу [emperor_country.GetNameWithNoTooltip]."
  flavor_bra_dynasty.1002.desc.free: "$flavor_bra_dynasty.1002.desc$\n\nНа наш подив, $bra_hre_emperor_hyperlink$ не висунув жодних вимог в обмін. Їхня допомога походить від доброї волі і без будь-яких умов."
  flavor_bra_dynasty.1002.a: "Нарешті. Влада $bra_wittelsbach_hyperlink_no_tt$ відновлена!"
  flavor_bra_dynasty.1002.a.tt: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] з $bra_wittelsbach_hyperlink$ як правлячою [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowBiasValue('opinion_supported_the_wittelsbacher')|0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [emperor_country.GetName]"
  flavor_bra_dynasty.1003.title: "Відмовляється від підтримки $bra_hre_emperor_hyperlink$"
  flavor_bra_dynasty.1003.desc.dead: "До нас дійшли новини від $bra_hre_emperor_hyperlink$. Протягом [emperor_ruler.GetHisHer] життя [emperor_ruler.GetName] вирішив зайняти антагоністичну позицію в нашому внутрішньому конфлікті з причин, відомих лише [emperor_ruler.GetHisHer] творцю. [target_character.GetName] залишається безперечним..."
  flavor_bra_dynasty.1003.desc.wittelsbach: "Жахливі новини досягли нашого двору! Поки хаос, спричинений [target_character.GetName], зростає в інтенсивності, $bra_hre_emperor_hyperlink$ нарешті розкрив [emperor_country.GetAdjective] позицію в цьому питанні. Попри [emperor_ruler.GetHisHer] зв'язок з родоводом, [emperor_ruler.GetName] відмовляється підтримувати [bra_ruler.GetName] і відкрито протистоїть [emperor_ruler.GetHisHer] власній династії!"
  flavor_bra_dynasty.1003.desc: "Жахливі новини досягли нашого двору! Поки хаос, спричинений [target_character.GetName], зростає в інтенсивності, $bra_hre_emperor_hyperlink$ нарешті розкрив [emperor_country.GetAdjective] позицію в цьому питанні: [emperor_ruler.GetName] відмовляється підтримувати [bra_ruler.GetName] і відкрито протистоїть $bra_wittelsbach_hyperlink_no_tt$!"
  flavor_bra_dynasty.1003.a: "Який жахливий день бути [ROOT.GetCountry.GetGovernment.GetRulerTitle]..."
  flavor_bra_dynasty.1003.a.tt: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] з $bra_wittelsbach_hyperlink$ як правлячою [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [emperor_country.GetName], тоді як кожна країна з правлячою династією $bra_askanier_hyperlink$ отримує [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] думки про них"
  flavor_bra_dynasty.1004.title: "Безумовна підтримка від $bra_hre_emperor_hyperlink$"
  flavor_bra_dynasty.1004.desc: "До нашого двору дійшли новини від $bra_hre_emperor_country_hyperlink$. Через ганебні дії [target_character.GetName], $bra_hre_emperor_hyperlink$ надав нам безумовне право розібратися з самозванцем на власний розсуд."
  flavor_bra_dynasty.1004.a: "Вигнати [target_character.GetHimHer]."
  flavor_bra_dynasty.1004.b: "Стратити [target_character.GetHimHer]."
  flavor_bra_dynasty.1004.c: "[target_character.GetHisHer|U] здібності можуть нам знадобитися..."
  flavor_bra_dynasty.1004.c.tt: "[target_character.GetName] отримує новий шанс і тепер буде доступний для нашого кабінету"
  flavor_bra_dynasty.1005.title: "Сумнівна автентичність"
  flavor_bra_dynasty.1005.desc: "Правління $bra_wittelsbach_hyperlink$ закінчилося, і славетні $bra_askanier_hyperlink$ нарешті повернулися до [bra_country.GetName]. Проте підозра падає на новокоронованого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. [target_character.GetName] не може згадати досягнень [target_character.GetHisHer] часу до [target_character.GetHisHer] очевидно-інсценованого похорону, члени $bra_askanier_hyperlink_no_tt$ відзначають незрозумілі візуальні зміни у їхнього улюбленого члена родини, і навіть [target_character.GetHisHer] стиль правління помітно відрізняється від [target_character.GetHimHer]. [target_character.GetShortNameWithNoTooltip] пояснює ці невідповідності досвідом, який [target_character.GetHeShe] отримав під час [target_character.GetHisHer] паломництва до Святої Землі..."
  flavor_bra_dynasty.1005.a: "Розпочати розслідування [target_character.GetHisHer] історії."
  flavor_bra_dynasty.1005.a.tt: "Розпочинається розслідування щодо історії [target_character.GetName], розкриваючи [target_character.GetHisHer] справжній зв'язок з $bra_askanier_hyperlink$..."
  flavor_bra_dynasty.1005.b: "Це лише необґрунтовані чутки..."
  flavor_bra_dynasty.1006.title: "Розслідування проти [target_character.GetShortNameWithNoTooltip]"
  flavor_bra_dynasty.1006.desc: "Після 2 років досліджень, розслідувань та порівняння документів, справа про справжність [target_character.GetName], нинішнього [ROOT.GetCountry.GetGovernment.GetRulerTitle], нарешті дійшла свого кінця."
  flavor_bra_dynasty.1006.desc.true_askanier: "$flavor_bra_dynasty.1006.desc$\n\nЗгідно з розслідуваннями, [target_character.GetName] справді є членом $bra_askanier_hyperlink$, хоча й не справжнім [GetCharacter('bra_waldemar_askanier').GetName], за якого [target_character.GetHeShe] себе видавав/видавала. Дійсно, [target_character.GetHeShe] носить те саме ім'я, що й наш покійний маркграф багато років тому, але виявилося, що [target_character.GetHisHer] випадково сплутали з іншим $name_waldemar$."
  flavor_bra_dynasty.1006.desc.false_askanier: "$flavor_bra_dynasty.1006.desc$\n\nПопри всі [target_character.GetHisHer] зусилля прикидатися, [target_character.GetHisHer] обман нарешті розкрився, коли [target_character.GetHeShe] зіткнувся/зіткнулася з фактами. [target_character.GetShortNameWithNoTooltip] — не хто інший, як самозванець/самозванка, що обманював/обманювала всіх при дворі та навіть членів $bra_askanier_hyperlink$, змушуючи їх думати, що [GetCharacter('bra_waldemar_askanier').GetName] знову живий і здоровий. Таким чином, обурення при [bra_country.GetAdjectiveWithNoTooltip] дворі досить гучне, і різні частини уряду вимагають вирішення."
  flavor_bra_dynasty.1006.a: "Подібності були настільки разючими."
  flavor_bra_dynasty.1006.a.tt: "[Concept('target_character.GetName] та кожен нащадок змінить свою [dynasty', 'CONCEPT_PLACEHOLDER')|e] на $bra_askanier_hyperlink$"
  flavor_bra_dynasty.1006.b: "Принаймні [target_character.GetHeShe] не є $bra_wittelsbach_hyperlink_no_tt$..."
  flavor_bra_dynasty.1006.b.tt: "[Concept('target_character.GetName] та кожен нащадок змінить свою [dynasty', 'CONCEPT_PLACEHOLDER')|e] на [target_dynasty.GetName]"
  flavor_bra_dynasty.1006.c: "Видалити цього самозванця серед нас!"
  flavor_bra_dynasty.1007.title: "Страта фальшивого/фальшивої [target_character.GetNameWithNoTooltip]"
  flavor_bra_dynasty.1007.desc.successful_execution: "[target_character.GetName] був/була успішно схоплений/схоплена та ув'язнений/ув'язнена тими, хто вірний [bra_ruler.GetName]. Як виявилося, [target_character.GetShortNameWithNoTooltip] не є $bra_askanier_hyperlink$ — навіть не членом нашого престижного [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. [target_character.GetSheHe|U] був/була звинувачений/звинувачена у самозванстві, зраді та загрозі стабільності [bra_country.GetName] і визнаний/визнана винним/винною..."
  flavor_bra_dynasty.1007.desc.failed_execution: "Серед ночі [target_character.GetName] був/була схоплений/схоплена та ув'язнений/ув'язнена в [bra_country.GetCapital.GetName] для [target_character.GetHisHer] передбачуваної страти на світанку. Однак [target_character.GetShortNameWithNoTooltip] виявив/виявила себе хитрим/хитрою, оскільки [target_character.GetHeShe] передбачив/передбачила наші дії. Після викрадення велика група шляхтичів — членів нашого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] — штурмувала палацові підземелля та звільнила самозванця/самозванку.\n\nТепер [bra_country.GetName] загрожує громадянська війна непередбачуваних масштабів..."
  flavor_bra_dynasty.1007.a: "Ще одну кризу успішно відвернуто."
  flavor_bra_dynasty.1007.b: "До зброї!"
  bra_true_waldemar_identity_reveal_tt: "#italic Справжня особа [target_character.GetName] буде розкрита...#!"
  flavor_bra_dynasty.false_waldemar_big_rebel.tt: "[ShowPopTypeName('nobles')] до #Y 12#! найбільш населених, володінь отримують наступні ефекти:\n- Втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]\n- Приєднується до [false_waldemar_rebel.GetName]"
  false_waldemar_rebel: "Прихильники $name_waldemar$"
  flavor_bra_dynasty.1100.title: "Занедбаність [root_country.GetNameWithNoTooltip]"
  flavor_bra_dynasty.1100.desc: "Землі [root_country.GetName] завжди були досить нерозвиненими. Проте, навіть у найгірші часи, [root_country.GetNameWithNoTooltip] ніколи не був настільки занедбаним, як під владою $bra_wittelsbach_hyperlink$.\n\nНовини про цю погану ситуацію дійшли до $bra_hre_emperor_hyperlink$. Доля [root_ruler.GetName] та [root_ruler.GetHisHer] правління над цими землями висить на волосині..."
  flavor_bra_dynasty.1100.a: "Безперечно, $bra_hre_emperor_hyperlink$ зрозуміє нашу ситуацію."
  flavor_bra_dynasty.1101.title: "$bra_wittelsbach_hyperlink_no_tt$ підводять $bra_hre_hyperlink_no_tt$"
  flavor_bra_dynasty.1101.desc: "Ситуація одного з наших курфюрстів, [root_country.GetFlavorRank] [root_country.GetName], виявилася досить похмурою. Місцева тиранія баронів-розбійників, повністю зруйнована економіка та недбалий [root_country.GetGovernment.GetRulerTitle], [root_ruler.GetName], спустошують ці землі, перетворюючи їх на більмо в оці $bra_hre_hyperlink$. Як наш обов'язок $bra_hre_emperor_hyperlink$ $bra_hre_hyperlink_no_tt$, ми не повинні дозволяти такому серйозному безгосподарності тривати."
  flavor_bra_dynasty.1101.a: "Взяти прямий контроль над [root_country.GetFlavorRank]."
  flavor_bra_dynasty.1101.a.tt: "Ми поставимо [Concept('emperor_ruler.GetName] як нового [ruler', 'CONCEPT_PLACEHOLDER')|e] країни [Concept('root_country.GetName], утворивши з ними [union', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_bra_dynasty.1101.b: "Нехай [dynasty_character.GetNameWithNoTooltip] править над [root_country.GetNameWithNoTooltip]."
  flavor_bra_dynasty.1101.b.tt: "Ми поставимо [Concept('dynasty_character.GetName] як нового [ruler', 'CONCEPT_PLACEHOLDER')|e] країни [root_country.GetName]"
  flavor_bra_dynasty.1101.c: "[cabinet_character.GetName] правитиме над нею від нашого імені."
  flavor_bra_dynasty.1101.c.tt: "Ми поставимо [Concept('cabinet_character.GetName] як нового [ruler', 'CONCEPT_PLACEHOLDER')|e] країни [root_country.GetName], перетворивши їх на нашого [ShowSubjectTypeName('vassal')], але спричинивши [ShowBiasValue('subjugated_elector_antagonism')|-=0] [Concept('antagonism', 'CONCEPT_PLACEHOLDER')|e] з кожним членом [GetUniqueInternationalOrganization('hre').GetName]"
  subjugated_elector_antagonism: "Підкорений Курфюрст"
  flavor_bra_dynasty.1101.d: "Один з наших придворних радників виправить [root_country.GetAdjectiveWithNoTooltip] ситуацію."
  flavor_bra_dynasty.1101.d.tt: "Ми поставимо місцевого радника з нашого двору як нового [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] країни [root_country.GetName]"
  flavor_bra_dynasty.1101.e: "Нехай $bra_wittelsbach_hyperlink_no_tt$ буде, вони можуть це відновити."
  flavor_bra_dynasty.1101.e.tt: "Ми залишимо $bra_wittelsbach_hyperlink$ у спокої, дозволивши їм продовжувати правити над [root_country.GetName]"
  flavor_bra_dynasty.1102.title: "Відповідь $bra_hre_emperor_hyperlink$"
  flavor_bra_dynasty.1102.desc.wittelsbach: "Посол з [emperor_country.GetName] прибув до нашого двору. Він проголошує, що землі [root_country.GetName] будуть об'єднані з [emperor_country.GetNameWithNoTooltip] з [emperor_ruler.GetName] як спільним правителем."
  flavor_bra_dynasty.1102.desc: "Посол з [emperor_country.GetName] прибув до нашого двору. Він проголошує, що $bra_wittelsbach_hyperlink$ більше не при владі від цього дня. Землі [root_country.GetName] переходять у прямі руки [emperor_ruler.GetName], змушуючи нас до персональної унії з [emperor_country.GetNameWithNoTooltip]."
  flavor_bra_dynasty.1102.a: "Хай живе $bra_hre_emperor_hyperlink$!"
  flavor_bra_dynasty.1102.b: "Сподіваємося, цього разу $bra_wittelsbach_hyperlink_no_tt$ зможе втриматися."
  flavor_bra_dynasty.1103.title: "$flavor_bra_dynasty.1102.title$"
  flavor_bra_dynasty.1103.desc.wittelsbach: "Посол з [emperor_country.GetName] прибув до нашого двору. Він проголошує, що землі [root_country.GetName] будуть правитися [dynasty_character.GetName]."
  flavor_bra_dynasty.1103.desc: "Посол з [emperor_country.GetName] прибув до нашого двору. Він проголошує, що $bra_wittelsbach_hyperlink$ більше не при владі від цього дня. Землі [root_country.GetName] переходять у прямі руки [dynasty_character.GetName]."
  flavor_bra_dynasty.1103.a: "Нехай [dynasty_character.GetShortNameWithNoTooltip] править з силою."
  flavor_bra_dynasty.1103.b: "Новий шанс для $bra_wittelsbach_hyperlink_no_tt$, здається."
  flavor_bra_dynasty.1104.title: "$flavor_bra_dynasty.1102.title$"
  flavor_bra_dynasty.1104.desc.wittelsbach: "Посол з [emperor_country.GetName] прибув до нашого двору. Він проголошує, що землі правитимуться новим членом династії $bra_wittelsbach_hyperlink$ - тим, хто вже довів [cabinet_character.GetHerselfHimself] свою надійність у минулому. [root_country.GetName] тепер під опікою [cabinet_character.GetName], найвірнішого з [emperor_country.GetAdjectiveWithNoTooltip] васалів."
  flavor_bra_dynasty.1104.desc: "Посол з [emperor_country.GetName] прибув до нашого двору. Він проголошує, що $bra_wittelsbach_hyperlink$ більше не при владі від цього дня. Землі [root_country.GetName] переходять у прямі руки [cabinet_character.GetName], найвірнішого з [emperor_country.GetAdjectiveWithNoTooltip] васалів."
  flavor_bra_dynasty.1104.a: "Принаймні це не $bra_wittelsbach_hyperlink_no_tt$."
  flavor_bra_dynasty.1104.b: "О, чудово... $bra_wittelsbach_hyperlink_no_tt$ повернулися..."
  flavor_bra_dynasty.1104.c: "Ми не будемо схиляти коліно перед [emperor_country.GetNameWithNoTooltip]!"
  flavor_bra_dynasty.1105.title: "$flavor_bra_dynasty.1102.title$"
  flavor_bra_dynasty.1105.desc: "Посол від [emperor_country.GetName] прибув до нашого двору. Він проголошує, що $bra_wittelsbach_hyperlink$ від цього дня більше не при владі. Землі [root_country.GetName] переходять у прямі руки [hohenzollern_character.GetName], довіреного радника $bra_wittelsbach_hyperlink_no_tt$."
  flavor_bra_dynasty.1105.a: "Нехай [hohenzollern_character.GetHeShe] править з мудрістю."
  flavor_bra_dynasty.1106.title: "$flavor_bra_dynasty.1102.title$"
  flavor_bra_dynasty.1106.desc: "Посол від [emperor_country.GetName] прибув до нашого двору. Він проголошує, що правителі $bra_wittelsbach_hyperlink$ отримають імперське попередження, але збережуть [root_country.GetFlavorRank]."
  flavor_bra_dynasty.1106.a: "[root_country.GetNameWithNoTooltip] навіки залишиться власністю $bra_wittelsbach_hyperlink_no_tt$..."
  flavor_bra_dynasty.1107.title: "Опір [root_country.GetNameWithNoTooltip]"
  flavor_bra_dynasty.1107.desc: "Уперта неспроможність держави, [root_country.GetName], відмовляється схилитися перед нами та нашою допомогою. Більш ніж очевидно, що їхнє некомпетентне керівництво позбавлене бачення, і тому ми маємо більш ніж достатньо підстав підкорити їх силою."
  flavor_bra_dynasty.1107.a: "Ми не терпимо зрадників!"
  flavor_bra_dynasty.1200.title: "[bra_country.GetAdjectiveWithNoTooltip] Тягар"
  flavor_bra_dynasty.1200.desc: "Після років $bra_wittelsbach_hyperlink$ безгосподарності, дім [emperor_dynasty.GetName] перейняв проблеми [bra_country.GetName]. Хоча наші наміри щодо [bra_country.GetFlavorRank] є щирими та в їхніх найкращих інтересах, очевидно, що наше правління недостатньо, аби виправити шкоду, завдану цим землям недбалістю $bra_wittelsbach_hyperlink_no_tt$.\n\nОдин з радників нашого двору, [hohenzollern_character.GetName], виявив велику компетентність у питаннях управління та дипломатії. Призначення [hohenzollern_character.GetHimHer] та надання [hohenzollern_character.GetHimHer] необхідної автономії може допомогти [bra_country.GetNameWithNoTooltip] відновитися."
  flavor_bra_dynasty.1200.a: "Ми довіримо [hohenzollern_character.GetShortNameWithNoTooltip] [bra_country.GetFlavorRank]."
  flavor_bra_dynasty.1200.a.tt: "[Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] [bra_country.GetName] буде замінений на [hohenzollern_character.GetName]"
  flavor_bra_dynasty.1200.b: "Дурниці. Ми все ще можемо керувати [bra_country.GetNameWithNoTooltip] самі."
  flavor_bra_dynasty.1201.title: "[target_character.GetNameWithNoTooltip] - Новий Правитель [bra_country.GetNameWithNoTooltip]"
  flavor_bra_dynasty.1201.desc: "Після років $bra_wittelsbach_hyperlink$ безгосподарності, володарі [emperor_country.GetName] перейняли [bra_country.GetName]. Хоча їхні наміри в наших найкращих інтересах, їхні обов'язки перед $bra_hre_hyperlink$ унеможливили для них правління нашими землями з більшою відданістю, ніж у найзавзятішого члена династії $bra_wittelsbach_hyperlink_no_tt$.\n\nНа щастя для нас, [emperor_ruler.GetName] усвідомлює ситуацію і відправив [emperor_ruler.GetHisHer] найталановитішого радника, [hohenzollern_character.GetName], керувати [bra_country.GetNameWithNoTooltip] автономно."
  flavor_bra_dynasty.1201.a: "Нехай [hohenzollern_character.GetHeShe] править з мудрістю та силою."
