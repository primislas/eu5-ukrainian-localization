l_english:
  flavor_tim.1.title: "Смерть [target_timur.GetNameWithNoTooltip]"
  flavor_tim.1.desc.common: "Після стрімкого злету та життя, сповненого війн і залізної руки, [target_timur.GetName] нарешті відійшов у вічність. Почавши як незначний член династії [ShowDynastyName('borjigin_dynasty')], [target_timur.GetNameWithNoTooltip] завдяки своїй неперевершеній силі волі та військовій майстерності зумів викувати спадщину, яка дозволила [target_timur.GetHerHim] стояти на одному рівні з $genghis_khan_name$ [GetCharacter('genghis_khan').GetHerselfHimself]."
  flavor_tim.1.desc: "$flavor_tim.1.desc.common$\n\nХоча [target_timur.GetSheHe] більше не веде наші славні армії в бій, [target_timur.GetHerHis] дух і полум'яне серце залишаться серед нас назавжди."
  flavor_tim.1.a: "[target_timur.GetHerHis|U] спадщина залишиться!"
  flavor_tim.2.title: "$flavor_tim.1.title$"
  flavor_tim.2.desc: "$flavor_tim.1.desc.common$\n\nТепер, коли ми нарешті вільні від [target_timur.GetHerHis] буйства, ми можемо скористатися вакуумом влади, який спричинила [target_timur.GetHerHis] смерть."
  flavor_tim.2.a: "[target_ruler.GetNameWithNoTooltip] є [target_timur.GetHerHis] законним спадкоємцем!"
  flavor_tim.2.b: "Хай вони довго розколюються."
  flavor_tim.3.title: "Обсерваторія [target_heir.GetNameWithNoTooltip]"
  flavor_tim.3.desc: "Наш видатний [target_heir.GetName] завжди мав допитливий розум, і [target_heir.GetHerHis] схильність до наукового світу переконала багатьох у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] призначити [target_heir.GetHerHim] правителем [target_location.GetName]. Тепер [target_heir.GetSheHe] висловив [target_heir.GetHerHis] бажання побудувати велику обсерваторію, щоб [target_location.GetRank.GetName] стала центром астрономічних знань для всього світу."
  flavor_tim.3.a: "Побудувати її!"
  flavor_tim.3.b: "У нас немає ні часу, ні грошей на таку дурість!"
  flavor_tim.3.historical_info: "Улугбек, онук Тимура, став правителем Самарканда у шістнадцять років. Навіть у підлітковому віці він виявляв великий інтерес до науки і хотів перетворити місто на інтелектуальний центр. Він побудував медресе, а пізніше обсерваторію, обидва з яких збереглися до наших днів. Обсерваторія Улугбека здобула популярність у всьому ісламському світі, і завдяки своїм спостереженням він зумів виявити кілька помилок у відкриттях Птолемея, які використовувалися в той час. Він також зумів точніше, ніж Коперник, обчислити тривалість тропічного року і навіть нахил земної осі."
  flavor_tim.4.title: "Посольство [target_artist.GetNameWithNoTooltip] до [target_country.GetNameWithNoTooltip]"
  flavor_tim.4.desc: "[target_artist.GetName], видатна постать у нашій країні, звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle], пропонуючи [target_artist.GetHerHis] послуги як посла до [target_country.GetName]. [target_artist.GetSheHe|U] стверджує, що про цю чужу землю можна багато чого дізнатися, і що місія посольства дозволить [target_artist.GetHerHim] написати детальну хроніку всіх відносин та взаємодій між нашою країною та ними, а також точний опис усіх цих чужих територій."
  flavor_tim.4.a: "Відправити [target_artist.GetHerHim] до [target_country.GetNameWithNoTooltip]."
  flavor_tim.4.b: "Немає потреби в такому посольстві."
  flavor_tim.4.historical_info: "Абд-аль-Раззак Самарканді був членом Тимуридського посольства до Кожикоде в 1440-х роках, де він писав про все, що бачив там. Хроніка включає детальні описи життя та подій, що відбувалися в місті, а також зі стародавнього міста Віджаянагара, та розповіді про торгівлю та торгові судна, що заходили туди. Його праці є цінним вікном у культуру суспільства цього регіону в XV столітті."
  flavor_tim.5.title: "$flavor_tim.4.title$"
  flavor_tim.5.desc: "[target_country.GetLongName] є спадкоємцем тисячолітньої культурної спадщини, яка приваблювала погляди всієї [ShowContinentName('asia')]. Підтримка наших відносин з ними буде першочерговою, якщо ми хочемо піднятися до того ж рівня культурної значущості. З цією метою [target_artist.GetName] нещодавно запропонував [target_artist.GetHerHis] послуги перед [ROOT.GetCountry.GetGovernment.GetCourtTitle] для проведення посольства до [target_country.GetCapital.GetName]. [target_artist.GetHerHis|U] розповіді про подорож та про життя в [target_country.GetNameWithNoTooltip] підвищать сприйняття нас людьми, і ми могли б багато чого навчитися з [target_artist.GetHerHis] знахідок там."
  flavor_tim.5.a: "$flavor_tim.4.a$"
  flavor_tim.5.b: "$flavor_tim.4.b$"
  flavor_tim.5.historical_info: "Гіяс ад-Дін Наккаш був членом Тимуридського посольства до двору імператора Мін Юнле в 1420-х роках. Його щоденник і праці містять докладні описи життя в столиці та при дворі, надаючи уявлення про придворні церемонії та здійснення правосуддя. Він також пропонує інформацію про логістику, транспорт та дипломатичну систему Китаю того часу, і став дуже популярним у мусульманському світі свого часу завдяки численним перським та тюркським перекладам."
  flavor_tim.6.title: "[target_timur.GetNameWithNoTooltip] Кульгавий"
  flavor_tim.6.desc: "Здається, [target_timur.GetName] не повністю залишив позаду безрозсудні дні своєї юності. Як і в молодості, він схильний збиратися з однодумцями та самостійно займатися грабунками. Однак під час однієї з його нещодавніх витівок, щоб вкрасти овець у місцевого пастуха, його спіймали на місці злочину і поранили двома стрілами, пошкодивши йому праву ногу та відірвавши два пальці правої руки.\n\nХоча, на щастя, ці травми не були смертельними, вони супроводжуватимуть його назавжди, зробивши його калікою на все життя. В результаті деякі люди вже почали називати його [target_timur.GetShortNameWithNoTooltip] #italic Ланг#!, або [target_timur.GetShortNameWithNoTooltip] Кульгавий, через його кульгавість."
  flavor_tim.6.a: "Це не вгамує його палкого духу."
  flavor_tim.7.title: "Зафарнама"
  flavor_tim.7.desc: "Безсумнівно, наша династія гідна пошани та поваги. Тому багато хто бажає дізнатися про її історію та походження, і в наших інтересах дозволити їм це. Один з наших митців, [target_artist.GetName], звернувся до нас із пропозицією створити велику книгу під назвою #italic Книга Перемог#! або #italic Зафарнама#!, яка переповість історію нашого славетного засновника. Будучи досвідченим вченим, [target_artist.GetSheHe] безсумнівно зможе створити безпрецедентний витвір мистецтва, але [target_artist.GetSheHe] також напевно попросить трохи винагороди."
  flavor_tim.7.a: "Звучить як чудова ідея."
  flavor_tim.7.b: "Це буде лише марна трата грошей."
  flavor_tim.7.historical_info: "Як засновник династії Тимуридів, життя та розширення влади Тимура привернули великий інтерес. Нізам ад-Дін Шамі був тим, хто написав першу хроніку та біографію Тимура, і вона послужила основою для іншої біографії Тимура Шарафа ад-Діна Алі Язді, яка досі є одним з найкращих джерел про життя великого завойовника."
  flavor_tim.8.title: "Піднесення [target_character.GetShortNameWithNoTooltip]"
  flavor_tim.8.desc: "[target_character.GetName] — військовий геній, який прагне відновлення колись славетної [GetCountry('MGE').GetLongName]. Зі [target_character.GetHerHis] вірними солдатами, [target_character.GetSheHe] захопив [target_location.GetName] та навколишні землі, щоб заснувати [target_country.GetLongName]."
  flavor_tim.8.a: "Це обурливо! Це несправедливо!"
  flavor_tim.8.a.at: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] навколо [target_location.GetName] звільняється і стає частиною [target_country.GetName]"
  flavor_tim.8.a.bt: "Звільнити [target_country.GetName]"
  flavor_tim.8.b: "Ми спостерігатимемо за [target_character.GetHerHis] кар'єрою з великим інтересом."
  flavor_tim.81.title: "$flavor_tim.8.title$"
  flavor_tim.81.desc: "$flavor_tim.8.desc$\n\nМи маємо можливість приєднатися до [target_character.GetHerHim] на [target_character.GetHerHis] шляху завоювань, але це буде коштувати нам автономії. Альтернативно, ми можемо протистояти [target_character.GetHerHim], але це, безумовно, призведе до війни."
  flavor_tim.81.a: "За [target_country.GetFlavorRank]!"
  flavor_tim.81.b: "Ми будемо битися з [target_character.GetHerHim], якщо буде потрібно."
  flavor_tim.9.title: "Інтеграція з [ShowCultureGroupNameWithNoTooltip('iranian_group')] народом"
  flavor_tim.9.desc: "Землі, які колись завоював [target_character.GetName], були величезними та багатими. [target_character.GetSheHe|U] був більше завойовником, ніж адміністратором. Тепер, коли значна частина нашої влади зосереджена серед [ShowCultureGroupName('iranian_group')] народу, можливо, настав час для зміни правління. [target_character2.GetName] планує реструктуризувати [ROOT.GetCountry.GetFlavorRank] у більш бюрократичну державу, призначивши [target_character.GetHerHis] нащадків губернаторами, сподіваючись надати їм досвіду правління. Крім того, це вимагатиме від нас злиття з [ShowCultureGroupNameWithNoTooltip('iranian_group')] адміністрацією, що може засмутити нашу [ROOT.GetCountry.GetCulture.GetName] еліту."
  flavor_tim.9.historical_info: "На піку Тимуридської імперії значна частина Ірану перебувала під їхнім правлінням. Незважаючи на це, тимуридське право було більше схоже на право монгольських держав, а не на $sharia$ попередніх правителів регіону. Коли Шахрух став правителем імперії, він кардинально змінив адміністрацію, наблизивши її до інших мусульманських держав. Це включало посилення судів $sharia$ над монгольськими трибуналами."
  flavor_tim.9.a: "Ми прагнемо правити, а не завойовувати."
  flavor_tim.9.b: "Ми не відмовимося від наших старих традицій."
  timurid_renaissance_historical_info: "Через завоювання Тимура відбувся приплив ремісників з численних міст, які він пограбував. Усі ці ремісники були відправлені до Самарканда, двору Імперії, де вони познайомилися з монгольським мистецтвом. Це, поряд з різними ідеями численних ремісників, зрештою призвело до розквіту Тимуридського Відродження в Ірані."
  flavor_tim.10.title: "[ROOT.GetCountry.GetNameWithNoTooltip] Відродження"
  flavor_tim.10.desc: "Хоча [ShowReligionGroupAdjective('muslim')] Золота Доба є славою минулого, це не завадило різним правителям дозволити розвиток власних мистецтв. Одним з них є [target_character.GetName], чий [ROOT.GetCountry.GetFlavorRank] переживає культурне відродження. [target_character.GetSheHe|U] бажає надалі просувати цей новий рух, залучаючи ремісників з усього [target_character.GetHerHis] [ROOT.GetCountry.GetFlavorRank]."
  flavor_tim.10.historical_info: "$timurid_renaissance_historical_info$"
  flavor_tim.10.a: "Ми спонсоруємо це."
  flavor_tim.10.b: "Воно розквітне саме по собі."
  flavor_tim.10.c: "Ми дотримуватимемося нашої ролі завойовників."
  flavor_tim.11.title: "Народження [ROOT.GetCountry.GetAdjectiveWithNoTooltip] архітектури"
  flavor_tim.11.desc: "Завдяки нашому посиленому покровительству [ROOT.GetCountry.GetAdjective] Ренесансу, в [ROOT.GetCountry.GetFlavorRank] розвинувся новий архітектурний стиль. Будучи сумішшю багатьох культур, з яких походили наші майстри, він тепер є видатною архітектурою в усьому [ShowReligionGroupAdjective('muslim')] світі."
  flavor_tim.11.historical_info: "$timurid_renaissance_historical_info$"
  flavor_tim.11.a: "Нехай [target_location.GetNameWithNoTooltip] відчує цю нову архітектуру."
  flavor_tim.11.b: "Вони можуть використовувати її для своїх власних будівель."
  flavor_tim.11.c: "[target_character.GetNameWithNoTooltip] очолить цю нову архітектуру!"
  flavor_tim.12.title: "Розробка $tamerlane_chess$"
  flavor_tim.12.desc: "Оскільки шахи популярні як на наших завойованих територіях, так і серед наших сусідів, [target_character.GetName] розробив їх більш складний варіант. Окрім стандартної розстановки, він також додає різні фігури та різні початкові формації. Багато наших придворних вже грають у цей варіант, стверджуючи, що він складніший і цікавіший за звичайний."
  flavor_tim.12.historical_info: "Варіант «Шахи Тамерлана» — це більш складний і стратегічний варіант шахів. Він має три початкові формації: чоловічу, жіночу та третю розстановку, а також містить різні фігури, такі як візир, слон і бойова машина. Він став домінуючим в Ірані за часів Тимура. Хоча багато рукописів зараз втрачено, все ще існує приблизне уявлення про те, як грається цей варіант."
  flavor_tim.12.a: "Не завадило б [target_character.GetNameWithNoTooltip] трохи пограти."
  flavor_tim.12.b: "Нехай вони грають у цю славетну гру."
  flavor_tim.13.title: "Скасування [ShowPolicyNameWithNoTooltip('mongol_law_policy')]"
  flavor_tim.13.desc: "Будучи провідним законом у [ROOT.GetCountry.GetName], [ShowPolicyName('mongol_law_policy')] дозволив нам завоювати значну частину нашого нинішнього [ROOT.GetCountry.GetFlavorRank], але оскільки нам потрібно належним чином осісти на цих землях, попит на належний закон зростає. Багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажає, щоб ми впровадили [ShowPolicyName('sharia_law_policy')], керуючи людьми релігійними законами, а не старими звичаями."
  flavor_tim.13.historical_info: "Хоча і $sharia$, і монгольське право були присутні в імперії Тимуридів за часів правління Тимура, останнє домінувало в адміністрації. Його таємність та довільні закони дозволяли розвивати тиранічні практики. Саме з цієї причини в 1411 році Шахрух скасував Яргуський трибунал з усіх куточків імперії, і замість нього впровадив $sharia$."
  flavor_tim.13.a: "Давайте впровадимо [ShowPolicyNameWithNoTooltip('sharia_law_policy')]."
  flavor_tim.13.b: "[ShowPolicyNameWithNoTooltip('mongol_law_policy')] нам найкраще підходить."
  flavor_tim.14.title: "Перлина [target_region.GetNameWithNoTooltip]"
  flavor_tim.14.desc: "[target_location.GetName] отримує багато уваги від [target_character.GetName], що змушує багатьох вірити, що [target_location.GetRank.GetName] переживає культурний ренесанс. Деякі навіть починають називати його Перлиною [target_region.GetName], що змусило більшу частину нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] повірити, що він більше підходить для столиці, ніж [ROOT.GetCountry.GetCapital.GetName]. Можливо, настав час нам переїхати до [target_location.GetNameWithNoTooltip]."
  flavor_tim.14.historical_info: "Хоча славні дні Герата минули, сини Тимура бажали піднести місто, зробивши його центром Імперії. Однією з особливих постатей, яка очолювала всі ці проєкти, був Шахрух, наймолодший син. Як тільки йому було надано губернаторство над цією територією, він, а також його радники, зосередилися на розвитку її до нових висот за допомогою інтенсивного королівського патронажу, будівельної діяльності та сприяння виробництву та торгівлі."
  flavor_tim.14.a: "Нове життя в [target_location.GetNameWithNoTooltip]."
  flavor_tim.14.b: "Ми не покинемо [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_tim.15.title: "[target_character2.GetNameWithNoTooltip]"
  flavor_tim.15.desc: "Під час розквіту правління [target_character.GetName], [target_character.GetSheHe] зустрів(-ла) досить своєрідного коханця. [target_character2.GetHerHis|U] ім'я — [target_character2.GetName], частина династії [target_character2.GetDynasty.GetName], і [target_character2.GetSheHe] виявився(-лася) досить здібним адміністратором, можливо, ідеальним подружжям для [target_character.GetNameWithNoTooltip]."
  flavor_tim.15.historical_info: "Дружина Шахруха, Гаухар Шад, вважалася справжньою адміністрацією під час його правління. Підносячи перську культуру та мову як головний елемент у династії Тимуридів, вона очолила культурний ренесанс в Ірані. Під час хвороби чоловіка вона правила імперією замість нього, хоча її рішення зрештою призвели до повстань її синів та розпаду Тимуридів."
  flavor_tim.15.a: "Ідеальне подружжя для [target_character.GetNameWithNoTooltip]!"
  flavor_tim.15.b: "Навіщо одружуватися з місцевими [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]?"
  flavor_tim.16.title: "[target_character.GetNameWithNoTooltip]"
  flavor_tim.16.desc: "З епохою мистецтва та науки в [ROOT.GetCountry.GetName] багато великих людей стікалися до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Один із них — [target_character.GetName], відомий астроном і математик. [target_character.GetSheHe|U] тепер шукає роботу в [ROOT.GetCountry.GetFlavorRank]. Без сумніву, [target_character.GetSheHe] досить добре знається на мистецтві геометрії, той, хто може вирішити навіть найскладніші проблеми."
  flavor_tim.16.a: "Наймімо [target_character.GetHerHim]."
  flavor_tim.16.b: "Лише порожні обіцянки."
  flavor_tim.17.title: "$gur_e_amir$"
  flavor_tim.17.desc: "Смерть [target_character.GetName] залишила націю в жалобі. Багато наших людей зібралися в [target_location.GetName] на [target_character.GetHerHis] похорон. Як засновник [ROOT.GetCountry.GetName], [target_character2.GetName] бажає вшанувати [target_character.GetHerHis] починання, побудувавши гробницю, гідну [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Назвавши її $gur_e_amir$, планується, що це буде найбільша гробниця в усьому [target_region.GetName]."
  flavor_tim.17.a: "Вшануймо [target_character.GetNameWithNoTooltip]."
  flavor_tim.17.b: "Нам не потрібна така грандіозна гробниця."
  flavor_tim.18.title: "[target_character.GetNameWithNoTooltip]"
  flavor_tim.18.desc: "Під впливом [ShowLanguageName('karluk_language')] на [ROOT.GetCountry.GetName] нові поети та філософи стікаються до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Один із них — [target_character.GetName], відомий [ShowReligiousSchoolName('hanafi_school')] вчений, містик, письменник і художник. Зустрівшись з [target_character2.GetName], [target_character.GetSheHe] бажає служити [ROOT.GetCountry.GetFlavorRank] за певну плату."
  flavor_tim.18.historical_info: "Під час розквіту правління Шахруха над Тимуридами домінували дві мови серед народу та при дворі: перська та чагатайська. Хоча він віддавав перевагу перській культурі, ігноруючи свою еліту, чагатайська література також процвітала. Одним із таких письменників був Нізам ад-Дін Алі Шир Гераві, найбільший представник цієї літератури. Пишучи тюркською, вони змогли вплинути на таких людей, як Сулейман Пишний, до Бабура I з Моголів."
  flavor_tim.18.a: "Дозвольмо [target_character.GetHerHim]."
  flavor_tim.18.b: "Нам не потрібно більше вчених."
  flavor_tim.19.title: "$goharshad_mosque$"
  flavor_tim.19.desc: "Людям [target_location.GetName] бракувало підтримки від [ROOT.GetCountry.GetFlavorRank], факт, який привернув увагу [target_character.GetName]. [target_character.GetSheHe|U] тепер бажає наказати відомому архітектору [target_character2.GetName] створити нову мечеть, названу на честь [target_character.GetNameWithNoTooltip], що називатиметься $goharshad_mosque$."
  flavor_tim.19.a: "Збудуймо цю мечеть."
  flavor_tim.19.b: "[ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetNameWithNoTooltip] править [ROOT.GetCountry.GetFlavorRank]."
  flavor_tim.20.title: "[target_character.GetNameWithNoTooltip]"
  flavor_tim.20.desc: "Народившись як частина [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], [target_character.GetName] з'явився(-лася) в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Вже [target_character.GetSheHe] довів(-вела), що [target_character.GetSheHe] обізнаний(-а) в історії [target_character2.GetName] та всього [ROOT.GetCountry.GetFlavorRank]. Бажаючи записати все це як історик [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetSheHe] тепер просить про працевлаштування."
  flavor_tim.20.a: "Це чудова нагода записати нашу історію."
  flavor_tim.20.b: "Нам не потрібні письменники, щоб нашу спадщину пам'ятали."
  flavor_tim.1000.title: "Проблемна Особистість"
  flavor_tim.1000.desc: "[target_father.GetName] є цінним членом нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] і був ним протягом багатьох років. Однак його син [target_timur.GetName] зростає, вже викликаючи деякі побоювання. Те, що дехто вже описує як його абсолютну нездатність сидіти на місці, вже привернуло суворі коментарі та критику.\n\nНещодавно, під час візиту до [target_location.GetName], йому вдалося вислизнути з-під нагляду батька під покровом ночі та об'єднатися з місцевими розбишаками, щоб викрасти овець. На жаль для нього, його спіймали на гарячому, і для багатьох це вже було занадто."
  flavor_tim.1000.a: "Покарати його."
  flavor_tim.1000.b: "Він лише вчиться шляху розбійника."
  flavor_tim.1000.c: "Такі речі трапляються, просто компенсуйте пастуху."
  flavor_tim.1001.title: "[target_timur.GetNameWithNoTooltip] Заспокоюється"
  flavor_tim.1001.desc: "Після доган, які отримав [target_timur.GetName], він, здається, трохи заспокоївся. Він, схоже, засвоїв цінність стриманості і більше не буде вдаватися до ворожих дій, як звичайний розбишака. Натомість він зосередить свої зусилля та починання на інших заняттях, більш корисних для його майбутнього."
  flavor_tim.1001.a: "Стриманість – ключ."
  flavor_tim.1001.b: "Лише б він засвоїв урок."
  flavor_tim.1002.title: "[target_timur.GetNameWithNoTooltip] Бунтує"
  flavor_tim.1002.desc: "Наші зусилля прищепити якийсь глузд [target_timur.GetName] не принесли плодів. Насправді, вони скоріше мали протилежний ефект, оскільки він став ще зухвалішим, ніж будь-коли раніше. Його ескапади стають частішими та сміливішими, і все більше людей починають вважати його великою неприємністю, а не просто незначною незручністю."
  flavor_tim.1002.a: "Досить цього!"
  flavor_tim.1002.b: "Насправді ми нічого не можемо зробити."
  flavor_tim.1003.title: "[target_timur.GetNameWithNoTooltip] Продовжує Бушувати"
  flavor_tim.1003.desc: "Усі спроби приборкати буйні нахили [target_timur.GetName], здається, не знаходять відгуку, оскільки він продовжує незворушно ігнорувати будь-які скарги чи критику. Історії про його нічні набіги та його нестримну поведінку стали досить поширеними, і занепокоєння щодо його присутності стає повсюдним."
  flavor_tim.1003.a: "$flavor_tim.1000.a$"
  flavor_tim.1003.b: "Це просто невихований хлопчисько."
  flavor_tim.1004.title: "[target_timur.GetNameWithNoTooltip] Вчиться Правильних Манер"
  flavor_tim.1004.desc: "Нарешті, [target_timur.GetName], здається, залишив позаду свої дні буйства і натомість присвячує своє життя більш академічним заняттям. Він навіть вибачився перед деякими членами [ROOT.GetCountry.GetGovernment.GetCourtTitle], постраждалими від його попередніх дій, і знову почав здобувати повагу своїх однолітків."
  flavor_tim.1004.a: "Мир нарешті."
  flavor_tim_1100_shared: "Піднесення [target_character.GetNameWithNoTooltip]"
  flavor_tim.1100.title: "$flavor_tim_1100_shared$"
  flavor_tim.1100.desc: "Рух Ḥurūfī значно зріс, ставши новою релігійною силою в [ROOT.GetCountry.GetName]. Очолюваний [target_character.GetName], [target_character.GetSheHe] заявив, що [target_character.GetSheHe] є втіленням [target_character.GetReligion.GetGodName], і що [target_character.GetSheHe] з'явиться як Махді в Судний день. Усе це божевільні розмови, але страта [target_character.GetHerHim] може призвести до повстання."
  flavor_tim.1100.a: "[target_character.GetSheHe|U] може залишитися."
  flavor_tim.1100.b: "Негайно вислати [target_character.GetHerHim]!"
  flavor_tim.1100.c: "Ми не ризикуватимемо, навіть якщо це спровокує повстання."
  tim_banish_character_tt: "Вигнати [target_character.GetName] до [target_country.GetName]"
  flavor_tim.1101.title: "$flavor_tim_1100_shared$"
  flavor_tim.1101.desc: "Вигнаний з [target_country2.GetName], [target_character.GetName] тепер шукає притулку в [ROOT.GetCountry.GetName]. Заявляючи, що [target_character.GetSheHe] є втіленням [target_character.GetReligion.GetGod.GetName], [target_character.GetHerHis] послідовники йдуть усюди, куди [target_character.GetSheHe] прямує."
  flavor_tim.1101.a: "[target_character.GetSheHe|U] тут раді."
  flavor_tim.1101.b: "Негайно вигнати [target_character.GetHerHim]!"
  flavor_tim.1101.c: "Стратити [target_character.GetHerHim]."
  flavor_tim.1102.title: "$flavor_tim_1100_shared$"
  flavor_tim.1102.desc: "Через посилений вплив [target_character.GetName] значна частина нашого населення приєдналася до руху Ḥurūfī. Наче приплив, це почало турбувати багатьох людей у [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Тепер [target_character.GetNameWithNoTooltip] та [target_character.GetHerHis] послідовники стоять прямо біля нашої столиці, вимагаючи відставки [target_character2.GetNameWithNoTooltip]."
  flavor_tim.1102.a: "Нехай приходять!"
  flavor_tim.1102.b: "Можливо, є потреба в новому керівництві."