l_english:
  flavor_jap_kor.1.title: "Небесна Амбіція"
  flavor_jap_kor.1.desc: "Возз'єднання [ShowRegionName('japan_region')] нарешті завершено під пильним поглядом [ROOT.GetCountry.GetName]. Не маючи більше ворогів для боротьби, наші [ShowGovernmentReformName('daimyo')] можуть вдатися до внутрішніх чвар, або, що ще гірше, об'єднатися проти нас, щоб звільнитися від нашого панування. Ми не можемо цього допустити, і тому вкрай важливо знайти новий конфлікт для ведення, і який інший конфлікт, окрім як завоювати $china$ та вигнати [target_country2.GetAdjective]. Однак, щоб це зробити, нам потрібно буде завоювати [target_country.GetName]."
  flavor_jap_kor.1.a: "До війни!"
  flavor_jap_kor.1.b: "Ми повинні підготуватися до конфлікту."
  flavor_jap_kor.1.c: "Ми не будемо затівати чвари з нашими сусідами."
  flavor_jap_kor.2.title: "Війна на порозі"
  flavor_jap_kor.2.desc: "Якщо возз'єднання [ShowRegionName('japan_region')] саме по собі не було достатньо тривожним, то наші найгірші побоювання справдилися – войовнича [from_country.GetAdjective] держава оголосила нам війну! Ми повинні підготувати війська та флот до їхньої неминучої висадки в [ShowRegionName('korea_region')]. Хоча їхні мотиви незрозумілі, одне ми знаємо точно: вони розглядають нас лише як перешкоду для своєї справжньої мети – [GetInternationalOrganization('middle_kingdom').GetName]."
  flavor_jap_kor.2.a: "Ми не пропустимо їх!"