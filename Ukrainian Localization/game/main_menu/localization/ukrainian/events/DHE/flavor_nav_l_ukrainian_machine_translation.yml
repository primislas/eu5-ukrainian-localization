l_english:
  flavor_nav.10.title: "Поклик Церкви"
  flavor_nav.10.desc: "[target_character.GetName], перша і найстарша донька нашого [ROOT.GetCountry.GetGovernment.GetRuler.GetName], чекає на почт, який супроводжуватиме [target_character.GetHerHis] до [target_character.GetHerHis] нового життя в [ShowLocationName('paris')].\n\nКоли [target_character.GetSheHe] народилася, зірки, здавалося, посміхалися [target_character.GetHerHis], адже [target_character.GetSheHe] була спадкоємицею всього, чим володіли [target_character.GetHerHis] батьки, але вже ні. [target_character.GetHerHis|U] шлюб з [GetCountry('ARA').GetGovernment.GetRuler.GetName] було скасовано, і [target_character.GetSheHe] стала перешкодою для [target_character.GetHerHis] молодшої сестри [target_sister.GetShortName].\n\nТепер [target_character.GetSheHe] приєднається до [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у [ShowLocationNameWithNoTooltip('paris')] і служитиме нашому Господу і Спасителю.\n\nОднак дехто дивується, чи не могла б [target_character.GetSheHe] бути ще корисною для королівства і стати можливим активом в інших дипломатичних переговорах."
  flavor_nav.10.a: "[target_character.GetSheHe|U] стане черницею."
  flavor_nav.10.b: "[target_character.GetSheHe|U] все ще може бути корисною."
  flavor_nav.10.historical_info: "Незважаючи на те, що Жанна була заручена з Педро IV Арагонським, шлюб так і не відбувся. Історики стверджують, що вона могла мати якийсь дефект, або, можливо, була хвора, що зробило її менш привабливою як дружину для її майбутнього чоловіка. У будь-якому випадку, Марія, її молодша сестра, зайняла її місце і вийшла заміж за Педро.\n\nЩоб шлюб відбувся, Жанна була змушена відмовитися від своїх прав на спадкування і вступила до Францисканського абатства Лоншан, поблизу Парижа, як бідна клариска."
  flavor_nav.20.title: "Сан-Франциско-де-Оліте"
  flavor_nav.20.desc: "Як побожна особа, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не може змиритися з повільним просуванням робіт у монастирі Сан-Франциско в [ShowLocationName('olite')].\n\nМонастир був заснований понад століття тому і досі не може вважатися завершеним.\n\nНезважаючи на можливий вплив прискорення робіт на нашу скарбницю, це місце та наш престиж могли б значно виграти."
  flavor_nav.20.a: "Слава Богу!"
  flavor_nav.20.b: "Він чекав, він може чекати й далі."
  flavor_nav.20.historical_info: "Згідно з легендою, святий Франциск Ассізький заснував монастир Оліте під час свого паломництва до Сантьяго-де-Компостела (близько 1213-1214 рр.).\n\nЗаснований королем Теобальдом II, пізніші наваррські монархи, особливо Жанна II та Карл II, підтримували орден фінансово та духовно, сприяючи його зростанню та відданості.\n\nЗ часом монастир зазнав змін, ставши «Апостольським коледжем» для навчання та відправлення місіонерів до Іспанії та Америки, або служив шпиталем під час Війни Конвенції у 1795 році."
  flavor_nav.30.title: "Іригаційні Проекти в Туделі"
  flavor_nav.30.desc: "Навіть коли наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] проводить багато [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] часу у [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] володіннях у [ShowRegionName('france_region')], [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] завжди знаходить час для розробки нових проектів у [ROOT.GetCountry.GetLongName].\n\nПівденні частини [ROOT.GetCountry.GetFlavorRank], навколо [ShowLocationName('tudela')], відомі своєю родючістю, але також і сухістю, і прокопування кількох каналів для покращення зрошення полів може зробити врожай сильнішим."
  flavor_nav.30.a: "Місцевість стане набагато продуктивнішою."
  flavor_nav.30.b: "Ми не можемо дозволити собі такі витрати."
  flavor_nav.30.historical_info: "Під час свого правління Жанна II та Філіп III здійснили кілька проектів економічного розвитку по всьому Королівству Наварра, включаючи розширення іригаційних систем навколо Тудели, найважливішого міста на півдні Королівства."
  flavor_nav.40.title: "Копія Фуерос Наварри"
  flavor_nav.40.desc: "Оскільки залучення [ROOT.GetCountry.GetGovernment.GetRulerTitle] до щоденних обов'язків королівства стає все більш поширеним, для [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] було замовлено копію #italic Фуерос Наварри#!.\n\nЗапропонована копія буде чудово прикрашена, матиме гарну шкіряну обкладинку найкращої якості та буде написана наймайстернішими переписувачами королівства. Як це традиційно, текст буде написаний [spanish_language.GetName], з цікавими [basque_language.GetName] термінами тут і там.\n\nНа жаль, наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] розмовляє [french_language.GetName] і не володіє наваррською романською мовою."
  flavor_nav.40.a: "Буде додано переклад на [french_language.GetNameWithNoTooltip]."
  flavor_nav.40.b: "Можливо, настав час нашим правителям вивчити мову землі."
  flavor_nav.40.c: "Баскська повинна бути офіційною мовою, якщо вона є найпоширенішою."
  flavor_nav.40.historical_info: "Хоча ймовірно, що більшість населення Королівства Наварра мала баскську (#italic Lingua Navarrorum#!) як рідну мову, офіційна документація королівства здебільшого писалася наварро-арагонською (#italic Ydiomate Navarre Terrae#!, #italic Ydiomate Navarre#! або #italic Lengoage de Navarra#!), оскільки окситанська занепадала.\n\nКрім того, французькі варіанти також були поширеними з того часу, як перші французькі династії увійшли до королівства, починаючи з дому Шампань у 1234 році."
  flavor_nav.50.title: "Облога Альхесіраса"
  flavor_nav.50.desc: "Звістки про війну на [target_country.GetAdjective] кордоні досягли королівства. [GetCountry('CAS').GetName] відновило Хрестовий похід проти [target_country.GetNameWithNoTooltip], і [target_character.GetName] швидко повернувся до [ROOT.GetCountry.GetName], щоб взяти участь у боях.\n\nНезважаючи на очевидну відсутність вигоди для нашого [ROOT.GetCountry.GetFlavorRank], ми завжди вважали своїм обов'язком допомагати нашим сусідам вигнати [ShowReligionGroupAdjective('muslim')] з [ShowRegionName('iberia_region')]."
  flavor_nav.50.a: "[target_character.GetShortNameWithNoTooltip] командуватиме нашими бійцями."
  flavor_nav.50.b: "Ми повинні відправити людей на Хрестовий похід, але ми не повинні відправляти [target_character.GetShortNameWithNoTooltip]."
  flavor_nav.50.c: "Це не справа [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_nav.50.historical_info: "У 1343 році король Філіпп Наваррський готувався приєднатися до хрестового походу проти Гранади, підкреслюючи свій обов'язок як правителя іберійського королівства. Його присутність під час облоги Альхесіраса, підтримана провізією з Біскайської затоки, була вирішальною, незважаючи на невеликі військові сили. На жаль, Філіпп захворів, що призвело до його смерті у вересні 1343 року. Його тіло було повернуто до Памплони для поховання, тоді як його серце знайшло свій спочинок у Парижі. Жанна, його вдова, отримала співчуття від Папи Климента VI. Альхесірас зрештою впав, і Жанна продовжувала правити до своєї смерті в 1349 році, залишивши корону їхньому синові, Карлу II."
  flavor_nav.60.title: "Заповіт королеви"
  flavor_nav.60.desc: "[target_character.GetName] помер(ла), і [target_character.GetHerHis] заповіт було прочитано. У ньому [target_character.GetHeSheFormal] просить [target_character.GetHerHis] наступника додати каплицю до церкви Санта-Марія-ла-Реаль у [ShowLocationName('olite')].\n\nСеред придворних були пропозиції присвятити каплицю Зачаттю Пресвятої Діви Марії. Наш правитель, [ROOT.GetCountry.GetGovernment.GetRuler.GetName], цілком переконаний у цій ідеї, оскільки [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] знає, наскільки відданою була [target_character.GetShortNameWithNoTooltip]."
  flavor_nav.60.a: "Заповіт матері має бути виконаний."
  flavor_nav.60.b: "У нас є кращі ідеї щодо використання цих грошей."
  flavor_nav.60.historical_info: "Коли королева Жанна II померла від Чорної Смерті у 1349 році, її останній заповіт було прочитано, і серед її прохань вона попросила свого сина Карла II профінансувати каплицю в готичній церкві Санта-Марія-ла-Реаль-де-Оліте.\n\nЦя церква використовувалася домом Евре у їхніх релігійних актах, і на її стиль вплинула Паризька Катедра Нотр-Дам."
  flavor_nav.70.title: "Камара де Комптос"
  flavor_nav.70.desc: "Фінанси держави – серйозна справа, і наш [ROOT.GetCountry.GetGovernment.GetRuler.GetName] вважає, що [ROOT.GetCountry.GetLongName] отримає велику користь, якщо ми заснуємо постійну установу для вирішення цих питань.\n\nЧерпаючи натхнення з подібних установ у [GetCountry('FRA').GetLongName], ми зробимо нашу націю більш економічно життєздатною та здатною краще справлятися з можливими фінансовими труднощами, з якими може зіткнутися наша делікатна ситуація."
  flavor_nav.70.a: "Буде засновано постійний суд."
  flavor_nav.70.historical_info: "Походження Камара де Комптос можна знайти в #italic oidores#! (від дієслова #italic oir#!, «чути»), посадових особах, які управляли та наглядали за королівськими фінансами щонайменше з 1258 року, коли датується перша Книга Комптос. Ця установа, глибоко під впливом подібних французьких (як #italic Chambre des Comptes#! Парижа), була зроблена постійною королем Карлом II і виконувала обов'язок контролювати витрати королівства та консультувати правителів у фінансових питаннях.\n\nВона вважається найстарішим Рахунковим судом Іспанії і досі використовується, обслуговуючи Парламент Хартії Спільноти Наварри."