l_english:
  flavor_mor_maghrebi_wars.1000.title: "Амбітний брат"
  flavor_mor_maghrebi_wars.1000.desc: "Після смерті улюбленого [old_ruler.GetName] його син [new_ruler.GetName] зійшов на престол [GetCountry('TUN').GetName] згідно з бажаннями [old_ruler.GetShortNameWithNoTooltip].\n\nЗамість того, щоб шанобливо визнати законне становище нового правителя, його брат [usurper_scope.GetName] здійснив переворот і захопив владу для себе. На жах присутніх [ShowEstateTypeName('nobles_estate')] узурпатор стратив свого брата, усунувши будь-який шанс на відновлення законного [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nЄдиний варіант, що залишився для лоялістів, — запросити іноземну державу в країну, щоб допомогти їм усунути узурпатора."
  flavor_mor_maghrebi_wars.1000.historical_info: "Після смерті хафсідського султана Абу Ях'ї Абу Бакра, розпочалася придворна криза з коронацією узурпатора Абу Хафса Умара, який наказав убити всіх своїх братів, забезпечивши собі єдине право на престол."
  flavor_mor_maghrebi_wars.1000.a: "Запросити [GetCountry('MOR').GetLongNameWithNoTooltip]"
  flavor_mor_maghrebi_wars.1000.b: "Запросити [ally_scope.GetName]"
  flavor_mor_maghrebi_wars.1000.c: "Згуртуватися за [usurper_scope.GetNameWithNoTooltip]"
  flavor_mor_maghrebi_wars.1001.title: "[GetCountry('TUN').GetAdjectiveWithNoTooltip] Спадкоємність"
  flavor_mor_maghrebi_wars.1001.p1: "Після смерті [old_ruler.GetName] його син [new_ruler.GetName] мав би зійти на престол [GetCountry('TUN').GetName]. Натомість його брат [usurper_scope.GetName] убив його і захопив владу для себе, на жах присутніх [ShowEstateTypeName('nobles_estate')]."
  flavor_mor_maghrebi_wars.1001.desc: "$flavor_mor_maghrebi_wars.1001.p1$\n\nТепер лоялісти, що вижили, запросили нас до країни, щоб допомогти їм усунути узурпатора."
  flavor_mor_maghrebi_wars.1001.a: "Їхнє лихо — наша вигода."
  flavor_mor_maghrebi_wars.1001.b: "Ми не будемо ставити під загрозу наш союз."
  flavor_mor_maghrebi_wars.1002.title: "$flavor_mor_maghrebi_wars.1001.title$"
  flavor_mor_maghrebi_wars.1002.desc: "На радість тим, хто все ще вірний [dead_ruler_scope.GetName], наш колишній союзник [ally_scope.GetName] вирішив прийняти їхню пропозицію про анексію і тепер готує свої війська до вторгнення."
  flavor_mor_maghrebi_wars.1002.a: "[ROOT.GetCountry.Custom('common_string_negative')]."
  flavor_mor_maghrebi_wars.1003.title: "$flavor_mor_maghrebi_wars.1001.title$"
  flavor_mor_maghrebi_wars.1003.desc: "На розпач тих, хто все ще вірний [dead_ruler_scope.GetName], наш мудрий союзник [ally_scope.GetName] вирішив відхилити їхню пропозицію про анексію."
  flavor_mor_maghrebi_wars.1003.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mor_maghrebi_wars.1004.title: "Доля [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_mor_maghrebi_wars.1004.desc: "$flavor_mor_maghrebi_wars.1001.p1$\n\nЛоялісти, що вижили, запросили нас до країни, щоб допомогти їм усунути узурпатора. Після обмірковування цієї пропозиції нашому мудрому правителю [ruler_scope.GetName] стало зрозуміло, що наша доля — об'єднати всі території в [ShowRegionName('maghreb_region')] і контролювати сахаранську торгівлю, як це було за часів Альмохадів."
  flavor_mor_maghrebi_wars.1004.a: "Ми поїдемо до слави."
  flavor_mor_maghrebi_wars.1004.b: "Ні, ми займатимемося своїми справами."
  flavor_mor_maghrebi_wars.1004.historical_info: "Династія Маринідів була на той час гарантом хафсідської спадкоємності, і тому, коли узурпатор Абу Хафс Умар зійшов на престол Тунісу, маринідська армія вторглася, щоб вигнати його. Після захоплення та страти узурпатора, маринідський султан Абу'л Хасан тріумфально увійшов до столиці Тунісу та об'єднав державу під своїм прапором."
  flavor_mor_maghrebi_wars.1100.title: "Новий правитель [ShowRegionNameWithNoTooltip('maghreb_region')]"
  flavor_mor_maghrebi_wars.1100.desc: "Ми нарешті об'єднали землі [ShowRegionName('maghreb_region')], як вони колись були під династією Альмохадів. Сахаранська торгівля нарешті під нашим контролем, новий період процвітання настав для нас і всього [religion_scope.GetAdjective] світу."
  flavor_mor_maghrebi_wars.1100.a: "Наші однолітки надсилають свої привітання."
  flavor_mor_maghrebi_wars.1100.tt: "Усі [Concept('religion_scope.GetAdjectiveWithNoTooltip] країни в нашому [diplomatic_range', 'CONCEPT_PLACEHOLDER')|e] покращують свою думку про нас."