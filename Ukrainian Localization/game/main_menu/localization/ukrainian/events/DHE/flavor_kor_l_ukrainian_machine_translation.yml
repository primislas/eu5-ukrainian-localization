l_english:
  flavor_kor.1.title: "Монгольське панування"
  flavor_kor.1.desc: "У жахливому 1231 році монголи розпочали свою 39-річну боротьбу з [ROOT.GetCountry.GetAdjective] народом. З роками ресурси та людська сила [ROOT.GetCountry.GetNameWithNoTooltip] більше не могли протистояти загарбникам, і наш улюблений [ROOT.GetCountry.GetFlavorRank] упав, ставши васалом династії [GetCountry('CHI').GetLongName].\n\nВідтоді [GetCountry('MGE').GetAdjective] аристократи стали звичним явищем на ключових керівних посадах у нашому уряді, диктуючи політику та напрямки в державі та нав'язуючи [ShowGovernmentReformName('son_in_law_rule')] нашій державі.\n\nАле жодна імперія не панує вічно, і тому сам час стукає по [GetCountry('CHI').GetNameWithNoTooltip]. Її неминучий занепад близько, але ми ніколи не будемо по-справжньому вільними від [GetCountry('MGE').GetAdjectiveWithNoTooltip] кайданів, доки не позбудемося ляльководів зсередини."
  flavor_kor.1.a: "Ми звільнимося від їхнього варварського панування!"
  kor_hostile_attitude: "Взаємна ворожа позиція"
  flavor_kor.1.b: "Що станеться без монгольського керівництва?"
  kor_friendly_attitude: "Взаємна позитивна позиція"
  flavor_kor.1.a.at: "#R Доки будь-який [ShowCultureName('mongolian_culture')] [Concept('character', 'CONCEPT_PLACEHOLDER')|e] з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] перебуває при нашому дворі, періодично відбуватимуться [Concept('events', 'CONCEPT_PLACEHOLDER')|e], які обмежуватимуть наш уряд та спричинятимуть втрати ресурсів.#!"
  flavor_kor.1.a.tt: "Ми займаємо ворожу позицію щодо [GetCountry('CHI').GetName], зменшуючи взаємну думку на [ShowBiasValue('kor_hostile_attitude')|0]. Якщо ми усунемо всіх [ShowCultureName('mongolian_culture')] [THIS.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] з країни, ми зможемо скасувати [ShowGovernmentReformName('son_in_law_rule')]"
  flavor_kor.1.b.tt: "Ми займаємо більш про-[GetCountry('CHI').GetName] позицію, збільшуючи взаємну думку на [ShowBiasValue('kor_friendly_attitude')|0]. Якщо ми задовольнимо вимоги [ShowCultureName('mongolian_culture')] [THIS.GetCountry.GetGovernment.GetEstateName('nobles_estate')], ми зможемо зміцнити зв'язки між нашими державами"
  flavor_kor.1.a.TIP: "[Concept('character_interactions', 'CONCEPT_PLACEHOLDER')|e] [ShowCharacterInteractionName('banish_character')] можна використовувати для усунення прихильників [GetCountry('CHI').GetNameWithNoTooltip]."
  flavor_kor.2.title: "Вимоги монгольських аристократів"
  flavor_kor.2.desc: "З важливими ключовими посадами, зайнятими [ShowCultureName('mongolian_culture')] аристократами, ресурси держави знаходяться в їхній владі..."
  flavor_kor.2.desc.demand: "[target_character.GetName], нинішній представник [target_country.GetName] у нашій державі, оголосив нову вимогу від імені [target_character.GetHerHis] володарів."
  flavor_kor.2.desc.gold: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ Висунуто вимогу щодо наших золотих запасів для підтримки цілей [target_country.GetGovernment.GetRulerTitle]."
  flavor_kor.2.desc.prestige: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ [target_country.GetAdjectiveWithNoTooltip] поклали око на наші найцінніші артефакти. Вони бажають отримати їх для себе, щоб збільшити власний престиж."
  flavor_kor.2.desc.diplomatic_actions: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ Наші дипломати потрібні при [target_country.GetAdjectiveWithNoTooltip] дворі."
  flavor_kor.2.desc.estate_satisfaction: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ Стани повинні служити [target_country.GetGovernment.GetRulerTitle] [target_country.GetNameWithNoTooltip]. Звісно, така дія надто сильно засмутить наші вірні касти."
  flavor_kor.2.desc.government_power: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ Прохання є нічим іншим, як принизливим, оскільки наш власний [ROOT.GetCountry.GetGovernment.GetRulerTitle] повинен вирушити до [target_country.GetCapital.GetName], щоб публічно вклонитися перед [target_country.GetGovernment.GetRuler.GetName]."
  flavor_kor.2.a: "Як бажає [target_country.GetGovernment.GetRulerTitle]."
  flavor_kor.2.b: "Ми не схиляємося перед монголами!"
  flavor_kor.3.title: "Прибуває новий [ShowCultureNameWithNoTooltip('mongolian_culture')] аристократ"
  flavor_kor.3.desc: "Двір [target_country.GetName] знову відправив одного зі своїх вельмож, [mongol_aristocrat.GetName], до [ROOT.GetCountry.GetCapital.GetName], щоб контролювати наш уряд."
  flavor_kor.3.a: "Вітаємо [mongol_aristocrat.GetHimHer] при нашому дворі."
  flavor_kor.3.b: "Нам не потрібно більше шпигунів від [target_country.GetGovernment.GetRulerTitle]."
  flavor_kor.4.title: "Монгольські кайдани розірвано"
  flavor_kor.4.desc: "Після століття під ярмом [ShowCultureName('mongolian_culture')] панування над [ROOT.GetCountry.GetName], наша нація нарешті вирвалася на волю! Завойовники степів більше не мають впливу на [ROOT.GetCountry.GetAdjectiveWithNoTooltip] політику, і наша культура та уряд знову процвітають!\n\nЗвісно, ситуація в Китаї залишається відкритим питанням, і ще належить побачити, в якому напрямку [target_character.GetName] поведе нас, але наразі ми насолоджуватимемося суверенітетом і свободою!"
  flavor_kor.4.a: "Хай живе [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_kor.5.title: "Зміцнені зв'язки з монголами"
  flavor_kor.5.desc: "Наша поступливість і підтримка [target_country.GetAdjective] престолу здобули нам довіру та прихильність як [ShowCultureName('mongolian_culture')] правителів, так і народу. Доля [ROOT.GetCountry.GetName] і [target_country.GetNameWithNoTooltip] пов'язані одна з одною на краще чи на гірше."
  flavor_kor.5.a: "Нехай наша вірність буде винагороджена відповідно."
  kor_upgrade_son_in_law: "[ShowGovernmentReformName('son_in_law_rule')] буде посилено, усуваючи кілька штрафів і додаючи нові переваги."
  has_upgraded_son_in_law: "Оновив [ShowGovernmentReformName('son_in_law_rule')] за допомогою [Concept('event', 'CONCEPT_PLACEHOLDER')|e] $flavor_kor.5.title$."
  not_has_upgraded_son_in_law: "НЕ оновив [ShowGovernmentReformName('son_in_law_rule')] за допомогою [Concept('event', 'CONCEPT_PLACEHOLDER')|e] $flavor_kor.5.title$."
  flavor_kor.6.title: "[target_character.GetNameWithNoTooltip] з [target_country.GetNameWithNoTooltip]"
  flavor_kor.6.desc: "[target_character.GetName], [target_character.GetDaughterSon] з [from_country.GetName], взяв владу над [target_country.GetName]. Завдяки [target_character.GetHisHer] зв'язкам з [from_country.GetAdjectiveWithNoTooltip] батьківщиною, [target_character.GetHeShe] має сильні почуття та інтереси щодо добробуту нашого [from_country.GetFlavorRank]. Ми маємо унікальну можливість нагадати [target_character.GetHimHer] про [target_character.GetHisHer] походження та попросити великий подарунок від Небесної Імперії."
  flavor_kor.6.historical_info: "Народжена в Хенджу (сучасний Коян), Корьо, пані Кі з роду Кі стала наложницею імператора Юань Тоґон-Темура, полонивши його своєю красою та талантами попри опозицію. Маневруючи в придворній політиці, вона забезпечила своєму синові статус спадкоємця, оскільки її вплив зростав, коли Тоґон-Темур відійшов від управління. Її дії спричинили напругу між Корьо та Юань, особливо її спроба забезпечити спадкоємство сина, що призвело до конфлікту та поставило під загрозу стабільність Корьо.\n\nКоли боротьба за владу посилилася, король Корьо Конмін розірвав зв'язки з Юань, що викликало помсту імператриці Кі. Попри її подальше сходження до статусу головної імператриці через внутрішні чвари в Юань, крах династії в 1368 році змусив її втекти, переплітаючи її долю з загибеллю Юань. Попри швидкоплинні моменти як Великої Імператриці, остаточне місцеперебування імператриці Кі стало таємницею після смерті Тоґон-Темура, зникнувши з історичних записів."
  flavor_kor.6.a: "Ми зробимо запит!"
  flavor_kor.6.b: "Нам не потрібна підтримка [target_country.GetGovernment.GetRulerTitle]."
  flavor_kor.7.title: "Прохання [from_country.GetNameWithNoTooltip]"
  flavor_kor.7.desc: "[target_character.GetName] став правлячою владою над [target_country.GetName], але все ще є [target_character.GetDaughterSon] з [from_country.GetName], провінційним [from_country.GetFlavorRank] для нашого великого [target_country.GetFlavorRank]. Таким чином, [target_character.GetHisHer] зв'язки з [from_country.GetAdjectiveWithNoTooltip] землями все ще сильні, попри [target_character.GetHisHer] нову позицію влади в [target_country.GetNameWithNoTooltip].\n\n[from_country.GetGovernment.GetRuler.GetName] зробив запит на подарунок, який підтримає [from_country.GetNameWithNoTooltip]."
  flavor_kor.7.a: "Золото чудово послужить [from_country.GetNameWithNoTooltip]."
  flavor_kor.7.a.tt: "[from_country.GetName] отримає [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_kor.7.b: "Давайте подаруємо їм наші дорогоцінні артефакти."
  flavor_kor.7.b.tt: "[from_country.GetName] отримає [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_kor.7.zzz: "Їм не потрібен жоден подарунок."
  flavor_kor.8.title: "Подарунок від [target_country.GetGovernment.GetRulerTitle]"
  flavor_kor.8.desc: "Граціозний [target_country.GetGovernment.GetRulerTitle], [target_country.GetGovernment.GetRulerOrRegent.GetShortName], надіслав [target_country.GetGovernment.GetRulerOrRegent.GetHisHer] вітання!"
  flavor_kor.8.desc.gold: "$flavor_kor.8.desc$ Скриня золота в незмірній кількості прибула до нашого двору. З нею скарбниці [from_country.GetName] наповнені на десятиліття вперед."
  flavor_kor.8.desc.prestige: "$flavor_kor.8.desc$ Дорогоцінні та вражаючі артефакти з серця Китаю прибули до нашого двору. Такий символ престижу в нашому володінні, безсумнівно, значно покращить нашу публічну презентацію."
  flavor_kor.8.a: "Хвала [target_country.GetGovernment.GetRuler.GetShortNameWithNoTooltip], справжньому [target_country.GetGovernment.GetRuler.GetDaughterSon] з [from_country.GetNameWithNoTooltip]!"
  flavor_kor.9.title: "[target_country.GetGovernment.GetRulerTitle] Відмовляється!"
  flavor_kor.9.desc: "Новини з [target_country.GetCapital.GetName] нарешті дійшли до нашого двору. [target_country.GetGovernment.GetRuler.GetName] висловив небажання надсилати будь-які подарунки чи підтримку своїй рідній країні, повністю відмовившись від свого [from_country.GetAdjective] коріння."
  flavor_kor.9.a: "Яка ганебна демонстрація зради..."
  flavor_kor.10.title: "Довгоочікувана Можливість"
  flavor_kor.10.desc: "Удача знову на нашому боці! Один з наших генералів повідомляє, що через таємні канали та підступність йому вдалося заручитися підтримкою союзника при [GetCountry('SSG').GetAdjective] дворі.\n\nНастав час для швидкого та рішучого удару по північних територіях, щоб повернути землі, які колись були у нас викрадені, перш ніж бюрократи з [GetCountry('CHI').GetName] матимуть шанс втрутитися."
  flavor_kor.10.a: "Кличте армії!"
  flavor_kor.10.b: "Ні, ми не будемо нападати без провокації."
  flavor_kor.11.title: "Північ Відвойовано"
  flavor_kor.11.desc: "Нарешті! Після надто багатьох десятиліть принижень північна провінція [ShowProvinceDefinitionName('hwaju_province')] знову під прапором [GetCountry('KOR').GetName], а з огидними загарбниками з [GetCountry('SSG').GetName] покінчено.\n\nНастав час для святкування та веселощів. У нашій столиці організовано вражаючий парад нашої могутньої армії, щоб відзначити цю подію та дозволити народу нашої країни побачити та зустріти своїх героїв."
  flavor_kor.11.a: "Чудово!"
  flavor_kor.12.title: "Рецепт Чорного Пороху"
  flavor_kor.12.desc: "#italic Бум#!! Весь двір був вражений вибуховою демонстрацією [choe_scope.GetName]. Яскрава людина, спонукана до дії постійними набігами [target_country.GetAdjective] піратів та натхненна феєрверками [GetCountry('CHI').GetAdjective] дипломатів. Він поставив собі за мету покращити можливості нашої армії та відкрити рецепт Чорного Пороху.\n\nЗавдяки великій хитрості та експериментам його зусилля окупилися, і він продемонстрував здатність створювати його з сировини, передавши один з найретельніше збережених секретів [GetCountry('CHI').GetNameWithNoTooltip] нашому [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_kor.12.a: "Чудово, фінансуйте його дослідження та побудуйте йому майстерню."
  flavor_kor.12.b: "Ми не зрадимо довіри [GetCountry('CHI').GetNameWithNoTooltip], виженемо його"
  flavor_kor.13.title: "Поширення Конфуціанства"
  flavor_kor.13.desc: "[ShowReligionName('mahayana')] була державною релігією та моральним компасом [ROOT.GetCountry.GetName] протягом століть. Вплив та статус [ShowReligionGroupName('buddhist')] виходять далеко за межі простої релігії; вона стала самостійною організацією, де члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] здобули великий вплив, владу та землі в межах нашого [ROOT.GetCountry.GetFlavorRank].\n\nЗ того часу, як [ROOT.GetCountry.GetNameWithNoTooltip] підпала під монгольське вторгнення, видатне становище [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] було замінено старою знаттю, яку ми колись мали, утворивши стан [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Однак, з піднесенням цього нового стану прийшов також інтерес до давньої китайської літератури – та інтерес до вчень Конфуція. Драматичний розвиток у нашій системі вірувань та наших обрядах може стати майбутнім, оскільки конфуціанські ідеї поширюються по нашій країні..."
  flavor_kor.13.a: "Давайте спостерігати, як розвивається ситуація..."
  flavor_kor.13.a.tt: "Ми стаємо придатними для отримання більшої кількості #Y Конфуціанство#!-пов'язаних [Concept('events', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_kor.14.title: "Піднесення Неоконфуціанців"
  flavor_kor.14.desc: "Політична стабільність [ROOT.GetCountry.GetLongName] була порушена появою нової групи, відомої як неоконфуціанці. Це вчені з сільської місцевості, які традиційно не були частиною консервативної еліти [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], що керувала країною. Їхні очевидні заслуги заохочують [ROOT.GetCountry.GetGovernment.GetRulerTitle] наймати їх на державну службу; однак їхні реформістські ідеї разом із конкуренцією з істеблішментом [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] за землю та посади призвели до все частіших зіткнень між різними фракціями в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] політиці."
  flavor_kor.14.a: "Нас чекають неспокійні часи..."
  flavor_kor.14.a.tt: "Розблокувати наступне:\n- [ShowAdvanceName('confucian_academy_advance')] [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] для #Y $age_2_renaissance$#!\n- [ShowEstatePrivilegeName('petty_bureaucracy')] та [ShowEstatePrivilegeName('scholar_officials')] [Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e]\n- [ShowLawName('imperial_examination_law')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('bureaucracy_law')] [Concept('law', 'CONCEPT_PLACEHOLDER')|e]"
  has_neo_confucianism_tt: "Мав #Y Піднесення Неоконфуціанців#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_kor.15.title: "Переворот у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_kor.15.desc: "Режим [old_ruler.GetName] виявився настільки незадовільним, що населення [ROOT.GetCountry.GetName] відкидає [ROOT.GetCountry.GetGovernment.GetRulerTitle] і шукає [target_character.GetName], перспективного генерала, який здобув популярність як серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], так і серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')].\n\nСьогодні [target_character.GetShortNameWithNoTooltip] завдав удару, оскільки його армія розпочала переворот проти [old_ruler.GetShortNameWithNoTooltip]."
  flavor_kor.15.a: "Це кінець старої династії..."
  flavor_kor.15.b: "Ми не можемо дозволити цьому зраднику перемогти!"
  flavor_kor.15.b.tt: "Наступні ефекти відбуваються з усіма [ShowPopTypeName('nobles')] у кожній [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з понад #Y 75.0%#! місцевої культурної єдності:"
  joseon_pretender: "Армія самозванця Ї"
  joseon_pretender_scope: "Армія самозванця Ї"
  flavor_kor.16.title: "Кьонгук Теджон"
  flavor_kor.16.desc: "Закони [ROOT.GetCountry.GetName] зібрані та укладені у великий #italic Кьондже Юкджон#! – #italic Шість кодексів управління#!. Хоча його закони та кодекси все ще застосовні до сучасних національних справ, він починає показувати свій вік. Нова компіляція книги була б дуже корисною для держави, щоб оновити, переглянути та видалити деякі старі закони на благо [ROOT.GetCountry.GetAdjectiveWithNoTooltip] народу. Вчені та бюрократи готові створити #italic Кьонгук Теджон#! – #italic Національний кодекс#!. Однак цей процес буде дорогим і вимагатиме інвестицій з нашого боку."
  flavor_kor.16.a: "Інвестувати в компіляцію."
  flavor_kor.16.b: "Ми не можемо собі цього дозволити."
  flavor_kor.17.title: "$samsa_system$"
  flavor_kor.17.desc: "$samsa_system_desc$ Вона слугує заміною старим Трьом Департаментам, які домінували в [ROOT.GetCountry.GetAdjective] бюрократії протягом кількох десятиліть. Однак впровадження такої реформи вимагатиме значної урядової заміни як фінансового, так і адміністративного характеру."
  flavor_kor.17.a: "Забезпечити наших бюрократів необхідними ресурсами."
  flavor_kor.17.b: "Ми не можемо собі цього дозволити."
  flavor_kor.18.title: "Праведна армія"
  flavor_kor.18.desc: "У відповідь на спустошення, спричинене [target_war.GetName], громадяни [target_location.GetProvince.GetName] вирішили зібратися разом, щоб сформувати так звану #italic $flavor_kor.18.title$#!. Ця подібна до ополчення сила складається з членів [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які готові заплатити найвищу ціну за захист своєї батьківщини. Ми не можемо не захоплюватися тим, що знову і знову простолюдини готові виступати в солідарності з усією нацією. [ROOT.GetCountry.GetName] не забуде їхню жертву."
  flavor_kor.18.a: "Герої, ось хто вони."
  flavor_kor.18.b: "Немає потреби в усьому цьому."
  flavor_kor.19.title: "Крадіжка насіння [ShowGoodsNameWithNoTooltip('cotton')]"
  flavor_kor.19.desc: "Один з наших посланців, [target_character.GetName], нещодавно повернувся з [target_character.GetHerHis] місії до [target_country.GetName], де [target_character.GetSheHe] був частиною дипломатичної місії. Це саме по собі похвально, але ще більш гідним захоплення є [target_character.GetHerHis] імпорт нового сорту [ShowGoodsName('cotton')], який краще пристосований до клімату [ROOT.GetCountry.GetName]. [target_character.GetNameWithNoTooltip|U] вже посіяв його у [target_character.GetHerHis] рідному місті [target_location.GetName], і ми повинні розглянути можливість поширення його по всій країні."
  flavor_kor.19.a: "Вирощувати його."
  flavor_kor.19.b: "Натомість затримати дипломата!"
  flavor_kor.20.title: "Фракційна боротьба"
  flavor_kor.20.desc: "Настав час обрати новий напрямок для [ROOT.GetCountry.GetLongName]. Якій фракції [new_ruler.GetName] віддаватиме перевагу під час [new_ruler.GetHerHis] правління?"
  flavor_kor.20.common_introduction: "Наразі дві фракції борються за владу в [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  flavor_kor.20.desc_sarim_hungu: "$flavor_kor.20.desc$\n\n$flavor_kor.20.common_introduction$, [ShowModifier('kor_support_sarim_modifier')], та [ShowModifier('kor_support_hungu_modifier')]. Перші – це ортодоксальні вчені, які активно підтримують неоконфуціанство, тоді як останні об'єднані в сильній підтримці зміцнення [ROOT.GetCountry.GetGovernment.GetAdjective] влади."
  kor_description_of_early_factions: "$flavor_kor.20.common_introduction$, [ShowModifier('kor_support_gwan_hak_modifier')] та [ShowModifier('kor_support_jeol_eui_modifier')]. Перші представляють усталених вчених з ефективною бюрократією, що прагнуть інновацій. Вони також є непохитними прихильниками гармонії між [ROOT.GetCountry.GetGovernment.GetCabinetTitle] та [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Остання фракція, з іншого боку, віддає перевагу існуючому устрою і, безумовно, є [ShowSocietyDirectionName('traditionalist')]."
  flavor_kor.20.desc_gwan_hak_jeol_eui: "$flavor_kor.20.desc$\n\n$kor_description_of_early_factions$"
  flavor_kor.20.a: "Ми маємо своїх улюбленців."
  flavor_kor.20.b: "Вибір вже зроблено!"
  kor_until_ruler_death: "час до обрання іншої корейської фракції"
  kor_faction_name_sarim: "Сарім"
  kor_faction_name_hungu: "Хунгу"
  kor_faction_name_jeol_eui: "Чоль-И"
  kor_faction_name_gwan_hak: "Кван-Хак"
  flavor_kor.21.title: "Формування $kor_faction_name_jeol_eui$ та $kor_faction_name_gwan_hak$"
  flavor_kor.21.desc: "Недавні зміни при [ROOT.GetCountry.GetGovernment.GetCourtTitle] призвели до розколу серед бюрократів за ідеологічними лініями, що спричинило формування двох дуже різних фракцій. $kor_description_of_early_factions$"
  flavor_kor.21.a: "Ми це врахуємо."
  flavor_kor.22.title: "Формування фракцій $kor_faction_name_sarim$ та $kor_faction_name_hungu$"
  flavor_kor.22.desc: "Недавні події призвели до розпаду фракції [ShowModifier('kor_support_gwan_hak_modifier')]. Багато колишніх членів пішли, щоб сформувати [ShowModifier('kor_support_hungu_modifier')], нову фракцію, яка поєднує принципи $kor_faction_name_gwan_hak$, але з сильним акцентом на авторитет [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Решта $kor_faction_name_hungu$ приєдналися до колишньої фракції [ShowModifier('kor_support_jeol_eui_modifier')], яка зазнала змін, що призвели до її перетворення на нову фракцію [ShowModifier('kor_support_sarim_modifier')]."
  flavor_kor.22.a: "$flavor_kor.21.a$"
  flavor_kor.23.title: "Південна столиця"
  flavor_kor.23.desc: "[target_location.GetRank.GetName] [target_location.GetName] переживає еру безпрецедентного зростання. За таких обставин дехто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує перенести туди столицю та перейменувати [target_location.GetRank.GetNameWithNoTooltip] на $hanseong$. Хоча, слід зазначити, що є також переваги у тому, щоб залишатися в [current_capital.GetName]."
  flavor_kor.23.a: "Переїхати до Південної столиці назавжди."
  flavor_kor.23.b: "Залишитися в [current_capital.GetNameWithNoTooltip]"
  flavor_kor.24.title: "Кампанія проти [target_country.GetNameWithNoTooltip]"
  flavor_kor.24.desc: "Після падіння держави Бохай, значна частина старої [ShowCultureName('korean_culture')] півночі була захоплена [ShowCultureGroupName('mongolian_group')] та [ShowCultureName('jurchen_culture')] племенами. Зі скинутими кайданами та новою волею до розширення нашого панування, ми вступили в конфлікт з [target_country.GetName], чиї землі в [target_province.GetName] лежать на нашому шляху до просування до північного гірського хребта."
  flavor_kor.24.a: "Тоді ми повинні будемо їх вигнати!"
  flavor_kor.24.b: "Така війна призведе лише до страждань [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  flavor_kor.25.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kor.25.desc: "Один із відомих митців при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] нещодавно створив ще один вірш. [target_character.GetHerHis|U] ім'я — [target_character.GetName], і [target_character.GetSheHe] створив багато великих творів протягом [target_character.GetHerHis] присутності при [ROOT.GetCountry.GetGovernment.GetCourtTitle]. З [target_character.GetHerHis] дитинства [target_character.GetSheHe] вважався вундеркіндом, але [target_character.GetHerHis] статус [target_character.GetWomanMan] був перешкодою для просування в нашому суспільстві. Ми не повинні дозволяти такому таланту марнуватися."
  flavor_kor.25.a: "Запропонувати [target_character.GetHerHis] наше заступництво."
  flavor_kor.25.b: "Цікаво, але не зовсім варте використання наших монет."
  flavor_kor.26.title: "Єдиний поземельний податок"
  flavor_kor.26.desc: "Наша застаріла податкова система виснажує [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], які непропорційно постраждали. Щоб виправити це, було запропоновано реформу під назвою [ShowGovernmentReformName('kor_daedongbeob')], або Закон про єдиний поземельний податок, яка покращить податковий режим і дозволить державі отримувати більше від зібраних податків. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] більше не потрібно буде продавати свою землю [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] в надії вийти з податкового реєстру."
  flavor_kor.26.historical_info: "Корейська економіка була в дуже поганому стані до 17 століття, і щоб виправити це, головний державний радник І Вон-ік поступово запровадив раніше ігноровані реформи в податковій системі. Податкова данина, що стягувалася з домогосподарств, була замінена єдиним податком на орні землі. Податок на товари був обмежений квотою, що дозволило підприємливим селянам і оптовикам виробляти та продавати надлишки товарів. Чистий ефект полягав у зниженні податків для селян, збільшенні доходів держави та зростанні торгівлі."
  flavor_kor.26.a: "Запровадити реформу."
  flavor_kor.26.b: "Ми розглянемо це пізніше."
  flavor_kor.27.title: "Фінансове майбутнє [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_kor.27.desc: "За словами членів нашого кабінету, схоже, що суспільство [ROOT.GetCountry.GetName] переходить до більш аграрного. Срібні вази під назвою #italic инбьонг#! стають справою минулого, і є потреба у фіскальній реформі, щоб запобігти розпаду нашої економіки. Наразі нашій економічній ситуації допомагає [ShowPolicyName('kor_chinese_currency')], яку ми могли б використовувати частіше. В іншому випадку, можливо, було б корисно встановити власну валюту у формі [ShowPolicyName('kor_metal_coinage')]. Ми також могли б застосувати зовсім інший підхід, а саме створити паперову валюту, [ShowPolicyName('kor_jeohwa')], в надії сприяти більш комерційному середовищу. Нарешті, якщо ці заходи приречені на провал, [ShowPolicyName('kor_barter_economy')] не так вже й погано, як здається."
  flavor_kor.27.a: "Давайте перейдемо до [ShowPolicyNameWithNoTooltip('kor_metal_coinage')]."
  flavor_kor.27.b: "Імпорт [ShowPolicyNameWithNoTooltip('kor_chinese_currency')] може бути необхідним."
  flavor_kor.27.c: "Надрукувати [ShowPolicyNameWithNoTooltip('kor_jeohwa')]."
  flavor_kor.27.d: "[ShowPolicyNameWithNoTooltip('kor_barter_economy')|U] — не така вже й жахлива доля."
  flavor_kor.28.title: "$STATIC_MODIFIER_NAME_kor_hall_of_worthies_modifier$"
  flavor_kor.28.desc: "Щоб служити керівним принципом для [target_character.GetName] та [target_character.GetHerHis] наступників, [ROOT.GetCountry.GetGovernment.GetRulerTitle] бажає створити інститут [ShowModifier('kor_hall_of_worthies_modifier')], дослідницький інститут, що складається з найвидатніших та найдосконаліших вчених [ROOT.GetCountry.GetFlavorRank]. За належного фінансування ми зможемо досягти великих успіхів у науці та державному управлінні."
  flavor_kor.28.a: "Заснувати $flavor_kor.28.title$."
  flavor_kor.28.b: "Ми не можемо витрачати додаткові кошти."
  flavor_kor.29.title: "$veritable_records_of_joseon$"
  flavor_kor.29.desc: "Могутні держави $china$ створюють і зберігають детальні записи історії попередніх династій, що називаються «Правдиві записи». Створення таких праць дозволяє наступним правителям [GetInternationalOrganization('middle_kingdom').GetName] критично аналізувати невдачі та успіхи своїх попередників. Ми також могли б використовувати [ShowWorkOfArtTypeName('chronicle')] для зберігання інформації про правління нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Однак, на відміну від наших сусідів, ми б підтримували його на регулярній основі."
  flavor_kor.29.a: "Фінансувати [ShowWorkOfArtTypeNameWithNoTooltip('chronicle')]."
  flavor_kor.29.b: "Ми не можемо дозволити собі подальші витрати."
  flavor_kor.30.title: "[target_character.GetNameWithNoTooltip] падає з коня"
  flavor_kor.30.desc: "Це був звичайний день. [target_character.GetName] полював, осідлавши [target_character.GetHerHis] коня. Все йшло гладко, як завжди, доки [ROOT.GetCountry.GetGovernment.GetAdjective] кінь раптом не спіткнувся, скинувши [target_character.GetShortNameWithNoTooltip] на землю у справді видовищний спосіб. [target_character.GetSheHe|U], звичайно, супроводжував [target_character.GetHerHis] двір, включаючи головного літописця. Звичайно, це має бути записано в [target_work_of_art.GetName], хоч би як це було незручно. Однак [ROOT.GetCountry.GetGovernment.GetRulerTitle] волів би, щоб ця подія не була включена."
  flavor_kor.30.a: "«І [target_character.GetNameWithNoTooltip] просив, щоб це не було записано»."
  flavor_kor.30.b: "Заборонити літописцю записувати це!"
  flavor_kor.31.title: "Сонгюнгван"
  flavor_kor.31.desc: "[ShowLawName('imperial_examination_law')] потребує нових студентів. Щоб виконати квоту набору на державні посади, давайте створимо установу в [target_location.GetName], нашій столиці, щоб вона слугувала місцем, де меритократія може яскраво сяяти, а найкращі з найкращих будуть відібрані."
  flavor_kor.31.a: "Заснувати установу."
  flavor_kor.31.b: "Ми не можемо виділити кошти."
  flavor_kor.32.title: "Небезпечний заколот"
  flavor_kor.32.desc: "Один з наших генералів, [target_character.GetName], глибоко розчарований діями [ROOT.GetCountry.GetGovernment.GetRuler.GetName], вирішив взяти кермо влади у [target_character.GetHerHis] власні руки та підняв зброю у жорстокому заколоті проти [ROOT.GetCountry.GetFlavorRank]! [target_country.GetLongName] тепер повстали проти нас у [target_location.GetName]."
  flavor_kor.32.a: "Прокляті зрадники!"
  kor_mutiny: "[target_character.GetName] розпочав заколот у [target_country.GetName]."
  flavor_kor.33.title: "$tongguk_tonggam$"
  flavor_kor.33.desc: "Рання історія [ROOT.GetCountry.GetName] залишається оповитою багатьма таємницями, і факти продовжуватимуть вислизати із загальних знань, якщо нічого не буде зроблено. Щоб протистояти цьому, [target_character.GetName] розпочав процес укладання ранньої історії [ShowRegionName('korea_region')], але потребує додаткових коштів для завершення. Отримана [ShowWorkOfArtTypeName('chronicle')] матиме назву $tongguk_tonggam$."
  flavor_kor.33.a: "Підтримати [target_character.GetShortNameWithNoTooltip]."
  flavor_kor.33.b: "Зосередитися на інших справах."
  flavor_kor.34.title: "Заворушення трьох портів"
  flavor_kor.34.desc: "Ми дозволяємо [ShowCultureGroupName('japanese_group')] купцям здійснювати обмежену торгівлю в кількох південних портах [ShowRegionName('korea_region')], найпомітнішим з яких є [target_location.GetRank.GetName] [target_location.GetName]. Незважаючи на нашу доброзичливість, місцеві приїжджі купці залишаються невдячними і взялися за зброю після їх виключення з наших податкових пільг. На щастя, цей кривавий бунт був придушений нашими військовими, і ми відновили контроль над [target_location.GetRank.GetNameWithNoTooltip]. Однак цього недостатньо для наших [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які закликають до більш жорстких заходів проти бунтівників."
  flavor_kor.34.a: "Зменшити торгові привілеї [ShowCultureGroupNameWithNoTooltip('japanese_group')]."
  flavor_kor.34.b: "Спробувати розрядити напругу."
  kor_japanese_riot: "Бунт [ShowCultureGroupNameWithNoTooltip('japanese_group')]"
  flavor_kor.35.title: "$kor_cloud_dream_of_nine$"
  flavor_kor.35.desc: "[ShowWorkOfArtTypeName('novel')] під назвою $kor_cloud_dream_of_nine$ почав поширюватися при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Написаний [ShowAdvanceName('kor_hangeul_alphabet')], він став досить відомим серед наших вчених. Його автор невідомий, але широко вважається, що це [target_character.GetName], який з тих пір заперечував усі приписування авторства. Хоча це вважається добре написаним твором мистецтва, акт написання фентезійного роману цим алфавітом не буде сприйнятий надто позитивно."
  flavor_kor.35.a: "Це справді чудово!"
  flavor_kor.35.b: "Справді ганебно! Ми не можемо дозволити порушувати такі межі."
  flavor_kor.36.title: "Бюро перекладачів"
  flavor_kor.36.desc: "Незважаючи на всю культурну асиміляцію, [ROOT.GetCountry.GetCulture.GetLanguage.GetName] мова залишається чужою для всіх наших сусідів. Через відсутність зрозумілості дипломатія з іншими державами досить складна, і всі наші місії туди й назад повинні супроводжуватися перекладачами, які можуть подолати ці труднощі. Це настільки важливий аспект, що [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] дійшов висновку, що нам потрібна професійна установа для підготовки перекладачів для допомоги нашим дипломатичним і данинним місіям."
  flavor_kor.36.a: "Заснувати [ShowModifierWithNoTooltip('kor_sayeogwon')]."
  flavor_kor.36.b: "Ми обійдемося без них."
  flavor_kor.37.title: "Критика [ShowReligionGroupNameWithNoTooltip('buddhist')]"
  flavor_kor.37.desc: "Один із наших вчених, пов'язаний з [target_international_organization.GetName], нещодавно створив великий трактат, що викладає багато різних полемічних аргументів проти догматів [ShowReligionGroupName('buddhist')]. Вихід «Масиву критик буддизму» знаменує собою поворотний момент, адже тепер ми можемо бути впевнені, що [ROOT.GetCountry.GetAdjective] суспільство повільно звертається до вірувань [target_international_organization.GetNameWithNoTooltip]."
  flavor_kor.37.a: "Поширювати трактати далеко й широко."
  flavor_kor.37.b: "Засудити працю."
  KOR_increase_favor_of_confucianism: "$sect_favor$ [Concept('international_organization_variable', 'CONCEPT_PLACEHOLDER')|e] [target_international_organization.GetName] буде збільшено на #g +5.0%#!."
  flavor_kor.38.title: "Міжусобиця князів"
  flavor_kor.38.desc: "Наступництво [ROOT.GetCountry.GetGovernment.GetRuler.GetName] далеко не забезпечене. Хоча [target_character2.GetName] номінально залишається [ROOT.GetCountry.GetGovernment.GetHeirTitle], напруга в [ROOT.GetCountry.GetGovernment.GetCourtTitle] залишається високою. Це тому, що багато міністрів вважають, що [target_character.GetName] має вищі амбіції, ніж [target_character.GetHerHis] родич. Хоча насильства ще не було, ці двоє гарантовано зіткнуться, якщо нічого не зробити заздалегідь."
  flavor_kor.38.a: "Підтримати [target_character.GetShortNameWithNoTooltip]."
  flavor_kor.38.b: "Натомість віддати перевагу [ROOT.GetCountry.GetGovernment.GetHeirTitle], [target_character2.GetNameWithNoTooltip]."
  flavor_kor.39.title: "Служіння [GetInternationalOrganization('middle_kingdom').GetNameWithNoTooltip]"
  flavor_kor.39.desc: "Протягом більшої частини минулих століть попередники [ROOT.GetCountry.GetName] жили та діяли в підпорядкуванні державам у $china$. Це має сенс, оскільки ресурси, якими володіє [GetInternationalOrganization('middle_kingdom').GetName], величезні, і відкрита ворожість лише зашкодила б інтересам обох сторін. Таке підпорядкування було взаємовигідним для обох сторін, але також поставило нас у принизливе становище меншої сторони, наближаючи [ShowCultureName('korean_culture')] культуру до [ShowCultureGroupName('chinese_group')], а не навпаки."
  flavor_kor.39.a: "Прийняти політику щиро."
  flavor_kor.39.b: "Ми більше не будемо лежати в тіні $china$."
  flavor_kor.40.title: "Заборона приватних армій"
  flavor_kor.40.desc: "Наразі військові [ROOT.GetCountry.GetName], переважно члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], мають повне право володіти та керувати приватними арміями. Це становить значний ризик для [ROOT.GetCountry.GetFlavorRank] і може призвести до переворотів, громадянських воєн та інших форм безладу в майбутньому. Такий стан справ був у центрі уваги політики [ShowSocietyDirectionName('centralization')], яку очолює уряд [target_character.GetName]. [ShowEstatePrivilegeName('noble_armies')] необхідно обмежити."
  flavor_kor.40.a: "Продовжити обмеження."
  flavor_kor.40.b: "Це необхідно зупинити."
  flavor_kor.41.title: "Протидія [ShowAdvanceNameWithNoTooltip('kor_hangeul_alphabet')]"
  flavor_kor.41.desc: "Винахід [ShowAdvanceName('kor_hangeul_alphabet')] приніс велику користь простолюдинам [ROOT.GetCountry.GetAdjective] суспільства. На відміну від іноземного [ShowCultureGroupName('chinese_group')] письма, відомого в [ROOT.GetCountry.GetNameWithNoTooltip] як #italic Hanja#!, алфавіт легко вивчити, що покращує рівень грамотності по всьому [ROOT.GetCountry.GetFlavorRank]. Однак це поширення таких базових навичок не обійшлося без протидії, адже еліти, переважно члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], чинили опір новому винаходу."
  flavor_kor.41.a: "Ігнорувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_kor.41.b: "Задобрити еліти."
  flavor_kor.100.title: "Північна експедиція [korRuler.GetNameWithNoTooltip]"
  flavor_kor.100.desc: "[korRuler.GetName] планує розпочати північну експедицію, щоб покарати [ShowCultureName('jurchen_culture')] народ. Це вимагатиме значних приготувань, коштів, і це неможливо зберегти в таємниці. [korRuler.GetSheHe|U] планує зміцнити оборону Кореї, збільшивши та покращивши навчання та модернізувавши наші фортеці."
  flavor_kor.100.a: "Готуватися до війни."
  flavor_kor.101.title: "Перша чистка літераторів"
  flavor_kor.101.desc: "Служачи Третім Цензором у [GetCurrentYear] році, неоконфуціанець [target_character.GetName], колишній державний історик, довів [target_character.GetHerselfHimself], що є людиною, готовою йти на великі жертви, критикуючи урядовців та еліту [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Багато опонентів [target_character.GetHisHer|U] виявили певні натяки, зроблені в [target_character.GetHisHer] чернетці #italic Літопису короля Сонджона#!, які вони вважають зрадницькими. Вони вимагають негайної страти [target_character.GetHisHer] та вигнання або страти його прихильників серед неоконфуціанців."
  flavor_kor.101.a: "Стратити його!"
  flavor_kor.101.b: "Натомість провести чистку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]!"
  flavor_kor.101.c: "Ми повинні підтримувати політичний баланс."
  flavor_kor.102.title: "Друга чистка літераторів"
  flavor_kor.102.desc: "Під час державного бенкету міністр обрядів [target_character.GetName] пролив вино на шати [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Оскільки це сталося після періоду інтенсивного фракційного суперництва та критики королівської влади, опоненти [target_character.GetNameWithNoTooltip] швидко інтерпретували цю подію як злочин проти суверена і, отже, як зраду. Вони вимагають чистки [target_character.GetNameWithNoTooltip] та його численних союзників, які належать до різних фракцій. Дійсно, це, схоже, надає чудову нагоду позбутися уряду тих, хто ставить під сумнів королівську владу."
  flavor_kor.102.a: "Провести чистку всіх, хто нам протистоїть."
  flavor_kor.102.b: "Ми повинні підтримувати політичний баланс."
  flavor_kor.103.title: "Третя чистка літераторів"
  flavor_kor.103.desc: "[jo_gwang_jo.GetName], неоконфуціанський реформатор, намагався формувати уряд відповідно до конфуціанських ідеалів. Однак його початкові успіхи в реформах, схоже, обернулися проти нього після того, як він зайшов занадто далеко, атакуючи старий порядок [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], послабивши їхню владу, забезпечивши перевагу неоконфуціанців в уряді та розлютивши їх запропонованими конфіскаціями земель.\n\n[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] тепер стверджують, що [jo_gwang_jo.GetNameWithNoTooltip] є зрадником, який планує спробувати зійти на трон, а також стверджують, що його реформи є помилковими і завдадуть шкоди суспільству та самим основам держави. Зі свого боку, [jo_gwang_jo.GetNameWithNoTooltip] наполягає, що єдиним правильним курсом дій є продовження реформ з усією поспішністю, незважаючи на опозицію. На чий бік ми повинні стати?"
  flavor_kor.103.a: "Провести чистку неоконфуціанців!"
  flavor_kor.103.b: "Реформи повинні тривати — чого б це не коштувало!"
  flavor_kor.104.title: "[yi_sun_sin.GetNameWithNoTooltip]"
  flavor_kor.104.desc: "Нещодавно суд над [yi_sun_sin.GetName] привернув багато уваги у вищих ешелонах нашої армії. Звинувачений у дезертирстві та недбалості, [yi_sun_sin.GetLastNameWithNoTooltip] перебуває у в'язниці вже деякий час; проте, незважаючи на часті тортури, він все ще відмовляється визнати [yi_sun_sin.GetHerHis] провину.\n\nБільше того, [yi_sun_sin.GetWomanMan], схоже, має природне розуміння військових справ, а [yi_sun_sin.GetHerHis] послужний список свідчить про низку видатних успіхів у відбитті набігів з-за наших кордонів. Репутація [yi_sun_sin.GetLastNameWithNoTooltip] як дисциплінованого та хороброго не відповідає звинуваченням, висунутим проти [yi_sun_sin.GetHerHim], і тому весь судовий процес смердить змовою з метою підставити [yi_sun_sin.GetWomanMan].\n\nЙдеться про пониження [yi_sun_sin.GetHerHim] до рангу звичайного піхотинця, але, безперечно, таланти [yi_sun_sin.GetWomanMan] не повинні бути змарновані на такій низькій посаді."
  flavor_kor.104.a: "[yi_sun_sin.GetSheHe|U] має бути негайно відновлений на посаді лідера."
  flavor_kor.104.b: "Краще не втручатися в систему правосуддя."
  flavor_kor.200.title: "Полководець-поет"
  flavor_kor.200.desc: "При дворі поширюються чутки про блискучого юнака з [ShowLocationName('gongju')]. Придворні кажуть, що він талановитий воєначальник і дивовижний поет, чий талант марнується на неважливій бюрократичній посаді в провінціях.\n\nЧи варто запросити його служити безпосередньо [ROOT.GetCountry.GetGovernment.GetRulerTitle]?"
  flavor_kor.200.a: "Запросити його до двору."
  flavor_kor.200.b: "Нам не потрібні нові вискочки"
  flavor_kor.201.title: "Історія [ROOT.GetCountry.GetName]"
  flavor_kor.201.desc: "[jong_seo.GetName] звернувся до трону з пропозицією. Він бажає найняти групу вчених, щоб допомогти йому скласти історію нашої великої [ROOT.GetCountry.GetLongName]. Його слова сповнені наукової пристрасті, і він стверджує, що такий трактат є не лише благом для майбутніх поколінь, а й можливістю підвищити наш престиж."
  flavor_kor.201.a: "Фінансувати його дослідження"
  flavor_kor.201.b: "Ми не будемо витрачати наше золото на марні книги"
  kor_acted_against_yuan: "Діяли проти інтересів $YUA$"
  kor_mongol_mutual_historical_friends: "Історичні тісні зв'язки"
  kor_mongol_soured_relations: "Зіпсовані відносини"