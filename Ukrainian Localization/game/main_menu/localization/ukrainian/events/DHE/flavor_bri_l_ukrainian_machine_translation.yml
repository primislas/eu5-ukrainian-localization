l_english:
  flavor_bri.1.title: "Catholicon Armoricum"
  flavor_bri.1.desc: "У 1464 році Жан Лагадек написав перший тримовний словник, що містив слова латинською, бретонською та французькою мовами."
  flavor_bri.1.a: "Ця дивовижна книга була першим словником як бретонською, так і французькою мовами."