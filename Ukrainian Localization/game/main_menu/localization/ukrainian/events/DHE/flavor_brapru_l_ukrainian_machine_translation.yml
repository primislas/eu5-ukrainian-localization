l_english:
  flavor_brapru.1.title: "Кінець міст-близнюків Берліна та Кельна"
  flavor_brapru.1.desc: "Річка Шпрее слугувала кордоном між Кельном і Берліном з моменту їх заснування, але #italic Mühlendamm#!, гребля, що розділяє Шпрее навпіл, стала зв'язком, який назавжди об'єднав #italic Міста-близнюки#!. Діючи як сіамські близнюки, два міста завжди прикривали одне одному спини і виступали єдиним фронтом, протистоячи владі правителів [ROOT.GetCountry.GetFlavorRank]. Незважаючи на численні спроби правителів нав'язати їм свою владу, вони вперто чинили опір будь-яким спробам підкорити їх. Тепер [target_character.GetName] має засоби, щоб забезпечити цей союз і покласти край свободам двох міст, перетворивши об'єднане місто на справжню столицю нашої нації."
  flavor_brapru.1.a: "Відтепер вони будуть унікальним містом."
  flavor_brapru.1.b: "Ми дозволимо їм бути розділеними."
  flavor_brapru.1.historical_info: "У 1307 році Берлін і Кельн утворили союз з іншими містами маркграфства, такими як Бранденбург-на-Гафелі, Франкфурт-на-Одері та Зальцведель. Цей союз був укладений для колективного захисту своїх прав проти тодішнього суверена, Генріха I. Однак автономії Кельна та Берліна поклав край курфюрст Бранденбургу Фрідріх II Залізний Зуб у 1451 році, коли він оголосив місто-близнюк своєю офіційною резиденцією.\n\nУ 1710 році, за указом короля Фрідріха I, міста-близнюки Кельн і старий Берлін були об'єднані. Результатом цього об'єднання стало заснування столиці Пруссії. Примітно, що значний розмір Альтберліна, який був удвічі більшим за Кельн, призвів до того, що нове місто було названо Берліном."
  flavor_brapru.2.title: "Будівництво Бранденбурзьких воріт"
  flavor_brapru.2.desc: "Щоб відсвяткувати наші нещодавні військові перемоги та зберегти наше становище серед держав [ShowContinentName('europe')], ми могли б найняти вправного художника неокласичного стилю, щоб він спроектував і побудував нам пам'ятник, гідний великої європейської столиці. [target_artist.GetName] вже розробив плани щодо грандіозних воріт, які можна було б розмістити біля західного входу до [ShowLocationName('berlin')], з'єднавши нашу нинішню резиденцію влади зі стародавньою столицею [ShowLocationName('brandenburg')]."
  flavor_brapru.2.a: "Вшанувати перемогу Воротами."
  flavor_brapru.2.b: "Гроші в скарбниці в порядку."
  flavor_brapru.2.historical_info: "Бранденбурзькі ворота були побудовані між 1789 і 1793 роками. Хоча Ворота були спроектовані художником Карлом Готтгардом Ланггансом, у їх оздобленні брали участь багато інших художників. Квадрига, що зображує римську богиню Вікторію, була створена скульптором Йоганом Готфрідом Шадовим, а інші долучилися до рельєфів і фризів, причому оздоблення було звернене до самого міста. Ворота, спроектовані в стилі неокласицизму, були побудовані на тодішніх кордонах міста Берліна, в районі Доротеенштадт, щоб вшанувати прусську перемогу над голландським народним повстанням та утворення союзу з країнами Нідерландів та Великої Британії."
  flavor_brapru.3.title: "Колоніальна хартія для [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_brapru.3.desc: "З припливом нових ідей та торговців із [ShowSubContinentName('western_europe')] з'являється все більше радників, які виступають за заснування Торгової компанії для експлуатації трансатлантичної торгівлі для нас самих, замість того, щоб покладатися на іноземних торговців. Хоча [target_character.GetName] прислухається до цих ідей, це було б ризикованою інвестицією, і ми, можливо, захочемо зосередити наші зусилля з розширення ближче до нашої власної території."
  flavor_brapru.3.a: "Ми скористаємося цим!"
  flavor_brapru.3.b: "Марна справа."
  flavor_brapru.3.historical_info: "У пізніші роки свого життя #italic Великий курфюрст#! Фрідріх Вільгельм намагався розширити заморські володіння Бранденбургу, наслідуючи колоніальні зусилля голландського колоніалізму. Ці зусилля швидко досягли своєї межі через обмежені військово-морські можливості Бранденбургу-Пруссії на той час. Незважаючи на це, #italic Бранденбурзько-Африканська компанія#! принесла значні короткострокові прибутки від трансатлантичної работоргівлі та принесла нове багатство вищому класу Берліна."
  flavor_brapru.4.title: "[target_artist.GetNameWithNoTooltip] публікує #italic «Призове есе»#!"
  flavor_brapru.4.desc: "[target_artist.GetName] є одним із провідних мислителів Просвітництва і вже отримав похвалу як один із найвидатніших філософів нашого часу. Нещодавно він опублікував свою працю #italic «Дослідження щодо відмінності принципів природної теології та моралі»#!, яку вже зазвичай називають #italic «Призове есе»#!. Незважаючи на свої публікації, [target_artist.GetNameWithNoTooltip] залишається відданим вдосконаленню та публікації майбутніх робіт, розширюючи межі того, що ми вважаємо філософією."
  flavor_brapru.4.a: "Що таке Просвітництво?"
  flavor_brapru.5.title: "Епоха короля-солдата"
  flavor_brapru.5.desc: "З [target_character.GetName] на троні наша країна вступила в нову еру. Були впроваджені значні реформи та консолідація національного бюджету, а також забезпечено фінансування гідної армії. Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] привернув міжнародну увагу своїм ощадливим підходом до придворних розваг та надмірностей, натомість інвестуючи більшу частину доступних коштів у подальше розширення армії."
  flavor_brapru.5.a: "Бог підняв тебе на Трон, щоб працювати!"
  flavor_brapru.5.historical_info: "Зі сходженням Фрідріха Вільгельма на прусський трон країна вступила в нову еру. Він радикально реформував державний бюджет, скоротивши витрати на двір майже до нуля, водночас значно інвестуючи в розширення армії та адміністрації держави. Хоча армія Пруссії зросла до 80 000 чоловік, він скоротив придворні посади до третини від попередніх, щоб заощадити кошти та зменшити борг, який Пруссія накопичила за правління його батька. Його реформи перетворили Пруссію на абсолютну та мілітаристську державу, яка піднялася до статусу великої держави протягом XVIII століття."
  flavor_brapru.6.title: "[ShowPolicyNameWithNoTooltip('canton_system_policy')] [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_brapru.6.desc: "Наші нинішні методи вербування більше не здатні підтримувати бажане зростання армії! З кожним місяцем до нашого двору надходить все більше скарг на нелюдські умови системи вербування. Хоча це природний обов'язок [ROOT.GetCountry.GetAdjective] підданих служити [ROOT.GetCountry.GetGovernment.GetRulerTitle], у скаргах є частка правди, і якщо не що інше, то ці обставини перешкоджають надійному вербуванню солдатів. З цією метою [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] радники розробили нову реформу, [ShowPolicyName('canton_system_policy')]. Завдяки цій системі ми могли б регулювати вербування та забезпечити правову основу для призову солдатів."
  flavor_brapru.6.a: "Впровадити реформу!"
  flavor_brapru.6.b: "Покладайтеся на старі методи!"
  flavor_brapru.7.title: "Зростають вимоги щодо [ShowPolicyNameWithNoTooltip('canton_system_policy')]!"
  flavor_brapru.7.desc: "Ми надто довго дозволяли проблемам з нашою системою рекрутування гноїтися, і тепер Реформа здається єдиним виходом. Плани щодо [ShowPolicyName('canton_system_policy')] все ще існують, і наші радники, прихильні до реформ, все ще радять нам впровадити цю політику для регулювання рекрутування."
  flavor_brapru.7.a: "Піддатися вимогам."
  flavor_brapru.7.b: "Ігнорувати ці скарги."
  flavor_brapru.8.title: "Реформи Великого Курфюрста"
  flavor_brapru.8.desc: "Наш найздібніший правитель, [target_character.GetName], розробив численні плани щодо реформування [ROOT.GetCountry.GetLongName] у сучасну державу. Серед [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] планів — радикальна реформа та розширення армії, покращення для [ShowLocationName('berlin')] та мрії про потужний флот для [ROOT.GetCountry.GetNameWithNoTooltip]. Хоча все це піднесло б нас серед країн [ShowRegionName('north_german_region')], ми повинні вирішити, куди зараз розподілити наші ресурси."
  flavor_brapru.8.a: "Розширити армію."
  flavor_brapru.8.b: "Зосередитися на [ShowLocationNameWithNoTooltip('berlin')]."
  flavor_brapru.8.c: "Розширити флот."
  flavor_brapru.8.d: "Нам не потрібні жодні реформи."
  flavor_brapru.8.historical_info: "Фрідріх Вільгельм фон Гогенцоллерн зійшов на престол Курфюрства Бранденбург у 1640 році в бурхливий час Тридцятилітньої війни, яка принесла спустошення землям Курфюрства. Під час Вестфальського миру він зміг закріпити деякі територіальні розширення для Бранденбурга як у Рейнланді, так і в Померанії. За час свого правління він заклав основи як військових, так і адміністративних можливостей для Бранденбурзько-Прусської держави, що пізніше піднесло Пруссію до великої сили в європейських справах. Ці зусилля та його військові успіхи у Шведсько-Бранденбурзьких війнах принесли йому прізвисько #italic Великий Курфюрст#!."
  flavor_brapru.9.title: "Нова столиця для [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_brapru.9.desc: "З моменту заснування [ROOT.GetCountry.GetLongName] [GetCharacter('bra_albrecht_i_askanier').GetName] ми правили територією [ShowLocationName('berlin')]. Деякі з наших радників рекомендували нам перенести столицю до [ShowLocationNameWithNoTooltip('berlin')], яка, здається, добре підходить для того, щоб служити столицею, гідною наших амбіцій. Це послужило б нам слушним моментом, щоб також захопити контроль над [ShowBuildingTypeName('hanseatic_kontor')], послабивши іноземні впливи на наших землях."
  flavor_brapru.9.a: "Перенести двір до [ShowLocationNameWithNoTooltip('berlin')]"
  flavor_brapru.9.b: "Зміцнімо нашу владу в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_brapru.10.title: "[ShowReligiousAspectNameWithNoTooltip('pietism')] у [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_brapru.10.desc: "[ShowReligiousAspectName('pietism')] та його представники мають сильний вплив на чиновників [ROOT.GetCountry.GetName]. Якби ми зараз прийняли їхні позиції та підтримали їхні зусилля, ми могли б вкорінити їхню мораль у кожен куточок нашого суспільства та вести належне [ShowReligionGroupAdjective('christian')] життя."
  flavor_brapru.10.a: "Нехай вони будуть відомі як прусські чесноти!"
  flavor_brapru.10.b: "Розірвати зв'язки з цими проповідниками!"
  flavor_brapru.11.title: "[ShowBuildingTypeNameWithNoTooltip('university')] у [ShowLocationNameWithNoTooltip('konigsberg')]"
  flavor_brapru.11.desc: "З Реформацією, що охопила наші землі, нам потрібно буде вирішити важливе питання освіти, тепер, коли старі [ShowReligionName('catholic')] інституції відмовляються співпрацювати з нами. Для цього ми повинні закласти фундамент для абсолютно нового [ShowBuildingTypeName('university')] у нашому місті [ShowLocationName('konigsberg')], залучаючи важливих членів Реформації та навчаючи наш народ згідно з принципами нашої нової віри."
  flavor_brapru.11.a: "Спонсорувати [ShowBuildingTypeNameWithNoTooltip('university')]!"
  flavor_brapru.11.b: "Це того не варте."
  flavor_brapru.historical_info: "Після того, як Альбрехт фон Гогенцоллерн секуляризував Тевтонський орден у Прусське герцогство, він далі дотримувався порад протестантських проповідників, таких як Мартін Лютер, і заклав основи для вищого навчального закладу. З цією метою у 1544 році було засновано Кенігсберзький університет. Розташований за межами Священної Римської імперії, це був перший університет, побудований без попереднього папського чи імперського дозволу."
  flavor_brapru.12.title: "Прутенські таблиці"
  flavor_brapru.12.desc: "Математик та астроном, [target_artist.GetName] прибув до нашого двору, щоб дізнатися про можливе спонсорство нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] для його роботи. Під час свого перебування в [ShowBuildingTypeName('university')] [ShowLocationName('wittenberg')] він розрахував новий набір астрономічних таблиць, які, як він стверджує, є точнішими за попередні розрахунки."
  flavor_brapru.12.a: "Фінансувати друк."
  flavor_brapru.12.b: "Відхилити його!"
  flavor_brapru.12.historical_info: "Астроном Еразм Рейнгольд був підтриманий та фінансований Альбрехтом фон Гогенцоллерном, герцогом Пруссії, який також фінансував друк Прутенських таблиць.$prutenic_tables_desc$ Прутенські таблиці використовувалися для календарної реформи, запровадженої Папою Григорієм XIII, і згодом замінили Альфонсинські таблиці, що використовувалися астрономами."
  flavor_brapru.13.title: "Потсдамський едикт"
  flavor_brapru.13.desc: "Довгий час [ShowContinentName('europe')] страждала від розбрату між [ShowReligionName('catholic')] та тими, хто прийняв ідеї Реформації. Якби ми запросили пригноблених [ShowReligionName('lutheran')] та [ShowReligionName('calvinist')] людей [ShowContinentNameWithNoTooltip('europe')] оселитися на наших землях, ми б, безумовно, могли отримати вигоду від притоку нових підданих. Але така прокламація викликала б гнів держав [ShowContinentNameWithNoTooltip('europe')], чиїх підданих ми заохочуємо мігрувати до нас."
  flavor_brapru.13.a: "Нехай буде відомо, що вони можуть оселитися в [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_brapru.13.a.tt: "Відносини з усіма [ShowReligionAdjectiveWithNoTooltip('catholic')] правителями в [ShowContinentNameWithNoTooltip('europe')] зменшилися на [ShowBiasValue('pru_edict_of_potsdam_opinion')|0R]"
  pru_edict_of_potsdam_opinion: "Потсдамський едикт"
  flavor_brapru.13.b: "Ми не повинні ризикувати цим."
  flavor_brapru.14.title: "[ShowPopTypeNameWithNoTooltip('burghers')] [ShowLocationNameWithNoTooltip('konigsberg')]"
  flavor_brapru.14.desc: "Наші амбіції правити без допомоги станів не обійшлися без опозиції. Тепер ми отримали вирішальні докази змови [ShowPopTypeName('burghers')] проти нашої держави, шляхом листування з [some_neighbor_country.GetGovernment.GetRulerTitle] [some_neighbor_country.GetGovernment.GetRuler.GetName] з [some_neighbor_country.GetName], щоб повалити наше правління в [ShowLocationName('konigsberg')]. Якщо ми хочемо підтвердити наш контроль над [ShowLocationNameWithNoTooltip('konigsberg')], ми повинні швидко відреагувати на цей виклик нашій владі та вирішити ситуацію."
  flavor_brapru.14.a: "Відправити армію, щоб підтвердити нашу владу."
  flavor_brapru.14.b: "Досягти компромісу з містом."
  flavor_brapru.14.historical_info: "Єронім Рот, член Кенігсберзької міської ради та юрист, очолив організовану опозицію до #italic Великого Курфюрста#! Фрідріха Вільгельма фон Гогенцоллерна. Після того, як курфюрст оголосив себе та герцогську Пруссію повністю незалежними від Королівства Польського у 1660 році, Рот та його союзники в Раді Кенігсберга звернулися до короля Польщі, Яна II Казимира Вази, з проханням знову прийняти землі Східної Пруссії під його владу. Мовчання польського короля та вступ Фрідріха Вільгельма до Кенігсберга у жовтні 1662 року поклали край назріваючому повстанню, а Рот був заарештований та ув'язнений довічно."
  flavor_brapru.15.title: "Praxis Pietatis Melica"
  flavor_brapru.15.desc: "Кантор і вчитель гімназії Zum Grauen Kloster в [ShowLocationName('berlin')], [target_artist.GetName], здобув значну популярність як композитор концертів та плідний автор праць з музичної освіти. Під час свого перебування на посаді кантора, [target_artist.GetNameWithNoTooltip] також уклав книгу з понад 240 гімнів, відому як Praxis Pietatis Melica або «Практика благочестя». Його намір, щоб нові гімни були додані на благо багатьох вірних по всій німецькій землі, є похвальним, і ми повинні підтримати публікацію його праці."
  flavor_brapru.15.a: "Nun danket alle Gott."
  flavor_brapru.16.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_brapru.16.desc: "[target_artist.GetName], багатомовний єврейський вчений і філософ, має скромне походження. Спочатку він мав стати рабином, однак його релігійна освіта привела його до [berlin_province.GetName], де він натомість став опублікованим автором, високо шанованим серед [ShowReligionGroupAdjective('christian')] та [ShowReligionGroupAdjective('israelite_group')] людей. Його праці та публікації, які написані як [ShowLanguageName('german_language')], так і [ShowLanguageName('hebrew_language')], разом з відкритими дискусіями, що відбуваються навіть у його власному домі, прокладають шлях до толерантності між людьми в масштабах, небачених у [ROOT.GetCountry.GetName] раніше."
  flavor_brapru.16.a: "Такий цінний актив!"
  flavor_brapru.17.title: "[target_artist.GetNameWithNoTooltip] у Реформації"
  flavor_brapru.17.desc: "[target_artist.GetName] є одним з найвидатніших представників ранньої Реформації. Однак він вступив у конфлікт з іншими реформаторами щодо питання Мойсеєвого Закону та того, в яких аспектах він застосовується до [ShowReligionGroupAdjective('christian')] людей. Його позиція щодо Євангелія як єдиного джерела побожної [ShowReligionGroupAdjectiveWithNoTooltip('christian')] поведінки суперечить багатьом його одноліткам, викликаючи у нього певну неприязнь у Реформаторському русі, які навчають про актуальність Старого Завіту, Мойсеєвого Закону. [target_artist.GetNameWithNoTooltip], звинувачений у #italic антиномізмі#! звернувся до нашого двору за спонсорством та безпечним місцем для вдосконалення власної доктрини."
  flavor_brapru.17.a: "Спонсорувати його!"
  agricolas_reputation: "Репутація Агріколи"
  flavor_brapru.17.b: "Ми не можемо змиритися з його примирливими поглядами."
  flavor_brapru.18.title: "Університет Франкфурта"
  flavor_brapru.18.desc: "Нас люб'язно спонсорували для будівництва [ShowBuildingTypeName('university')] поблизу [ShowLocationName('lebus')]. Ця нова освітня установа буде збудована в сусідньому місті Франкфурт-на-Одері та призведе до зміщення влади в бік Міста, що було збудоване на берегах річки Одер."
  flavor_brapru.18.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_brapru.19.title: "Хоробрість Шпандау"
  flavor_brapru.19.desc: "Те, що мало бути задоволенням для всіх мешканців нашого прекрасного [ShowLocationName('berlin')], переросло в конфлікт всупереч бажанням нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. У добре продуманій показовій битві, яка мала показати, як населення Берліна-Кьольна перемагає своїх сусідів зі Шпандау, учасники зі Шпандау повстали проти результату і перемогли наших фаворитів! Це повстання демонструє їхню пряму зневагу до нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] і не повинно бути терпимим."
  flavor_brapru.19.a: "Це має бути покарано!"
  flavor_brapru.19.b: "Нехай вони розважаються"
  flavor_brapru.19.historical_info: "Маневр, організований курфюрстом Йоахімом II Гектором фон Гогенцоллерном у серпні 1567 року між мешканцями Берліна-Кьольна та Шпандау, поселення, тоді незалежного від самого Берліна, пізніше став відомий як #italic Knüppelkrieg#!, коли мешканці Шпандау повстали проти бажаного курфюрстом результату, перемоги берлінських громадян. Підштовхнуті запалом та інтенсивністю маневру, учасники зі Шпандау пішли проти бажань курфюрста і рішуче перемогли сторону Берліна-Кьольна. Розлючений цим результатом, Йоахім II Гектор погрожував їм гарматами, хоча вони не були заряджені, і ув'язнив мера Шпандау на кілька місяців."
  flavor_brapru.20.title: "[target_artist.GetNameWithNoTooltip] просить притулку"
  flavor_brapru.20.desc: "[target_artist.GetName], викладач [ShowBuildingTypeName('university')] в [ShowLocationName('apolda')], викликав гнів світу [ShowReligionName('lutheran')], проводячи лекції, що небезпечно наближаються до атеїзму! Ми щойно отримали нову інформацію, яка свідчить про те, що він шукає новий дім з гарантією дозволу продовжувати свою роботу. Це була б чудова нагода зміцнити наші власні університети його внеском."
  flavor_brapru.20.a: "Просвітницько!"
  flavor_brapru.20.b: "Відішліть його!"
  flavor_brapru.21.title: "[target_artist.GetNameWithNoTooltip] глузує з ефекту Вертера!"
  flavor_brapru.21.desc: "[target_artist.GetName] опублікував найскандальніший твір, сатиризуючи твори авторів, які вважають себе частиною руху #italic Sturm und Drang#! у [ShowCultureGroupName('german_group')] літературі. [target_artist.GetNameWithNoTooltip] критикує саме екстремальні реакції на #italic Страждання молодого Вертера#! та їхній вплив на суспільство, уявляючи щасливий кінець для бідного Вертера."
  flavor_brapru.21.a: "О, радість романтики!"
  flavor_brapru.21.b: "Трагедія така романтична!"
  flavor_brapru.22.title: "[target_artist.GetNameWithNoTooltip] хоче реформувати освіту"
  flavor_brapru.22.desc: "Дивлячись на стан освіти в нашій столиці, [target_artist.GetName], визнаний лінгвіст і філософ, запропонував свою допомогу в реформуванні освітньої системи нашої столиці та країни в маяк індивідуальних можливостей. [target_artist.GetName], вивчивши [ShowLanguageName('basque_language')] і послуживши дипломатом у [ROOT.GetCountry.GetAdjectiveWithNoTooltip] посольствах в іноземних країнах, приносить із собою величезний обсяг знань з різних предметів та досвід управління установами."
  flavor_brapru.22.a: "Спонсоруйте його!"
  flavor_brapru.22.b: "Він не пропонує нічого цінного."
  flavor_brapru.23.title: "[target_artist.GetNameWithNoTooltip] публікує #italic Натан Мудрий#!"
  flavor_brapru.23.desc: "П'єса #italic Натан Мудрий#! демонструє майстерне використання Притчі про перстень, щоб показати послання толерантності між авраамічними вірами світу. [target_artist.GetName] змоделював свого головного героя за образом давнього друга та довіреної особи, з яким він поділяв свої погляди на толерантність. Якщо ми дозволимо, прем'єра п'єси відбудеться в [ShowLocationName('berlin')]."
  flavor_brapru.23.a: "Усі повинні прагнути толерантності!"
  flavor_brapru.23.b: "Марна благання про толерантність."
  flavor_brapru.24.title: "[ShowPolicyNameWithNoTooltip('order_of_the_swan_policy')]"
  flavor_brapru.24.desc: "Значна частина [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вважає зусилля [country_ruler.GetName] щодо поширення благочестя досить неадекватними. Очевидно, вони вірять, що створення нового лицарського ордену для поширення культу Діви Марії виправить цю [ROOT.GetCountry.GetGovernment.GetAdjective] байдужість. Вітчизняний лицарський орден призвів би до духовного зростання членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та їхніх кріпаків.\n\nХоча створення такого ордену було б досить витратним, воно значно сприяло б зростанню престижу [ROOT.GetCountry.GetFlavorRank]. Спокушений цими причинами, [country_ruler.GetNameWithNoTooltip] був переконаний принаймні розглянути таку можливість. Таким чином, [country_ruler.GetSheHe] дозволив зробити кілька пропозицій, але лише та, що стосується [ShowPolicyName('order_of_the_swan_policy')], схоже, припала до смаку [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_brapru.24.historical_info: "Бранденбурзький #italic Schwanenorden#! був заснований у 1440 році курфюрстом Фрідріхом II. Його #italic modus operandi#! полягав у сприянні благочестю та поширенні культу Діви Марії. Засновники налічували 37 осіб, але Орден швидко розрісся до сотень."
  flavor_brapru.24.a: "Заохотити це заснування."
  flavor_brapru.24.b: "Навіщо нам турбуватися?"
  flavor_brapru.25.title: "$flavor_brapru.24.title$"
  flavor_brapru.25.desc: "[country_ruler.GetName] нещодавно заснував [ShowPolicyName('order_of_the_swan_policy')] з метою сприяння благочестю та культу Діви Марії у [country_ruler.GetHerHis] країні. Завдяки нашим династичним зв'язкам, багатьом нашим [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] було запропоновано членство в лицарському закладі. Це може бути чудовою нагодою для просування наших власних інтересів."
  flavor_brapru.25.historical_info: "$flavor_brapru.24.historical_info$"
  flavor_brapru.25.a: "Ми повинні дозволити [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] приєднатися до цього ордену."
  flavor_brapru.25.b: "Добре, що вони є."
  flavor_brapru.26.title: "[ShowPolicyNameWithNoTooltip('order_of_the_black_eagle_policy')]"
  flavor_brapru.26.desc: "Оскільки мілітаризація нашої країни зростає, і ми все більше схиляємося до [ShowSocietyDirectionName('quality')], ми виявляємо, що нам бракує нагород, гідних наших видатних генералів. Хоча земельні наділи та прямі виплати є хорошими нагородами самі по собі, заснування нового, світського військового ордену значно сприяло б просуванню доброго імені наших героїв війни. Хоча й дорогий, [ShowPolicyName('order_of_the_black_eagle_policy')] сприяв би більшій дисципліні та заслугам."
  flavor_brapru.26.historical_info: "Курфюрст Фрідріх III заснував Орден Чорного Орла, військовий орден, до якого входили більшість правлячих членів та родичів правлячої династії Гогенцоллернів, а також багато іноземних королівських осіб, 17 січня 1701 року, напередодні коронації королем Пруссії. Окрім нагородження королівських осіб, його також присуджували кваліфікованому військовому персоналу, сприяючи меритократії в процесі."
  flavor_brapru.26.a: "Ми профінансуємо заснування."
  flavor_brapru.26.b: "Такі марнославства не стосуються нас чи наших генералів!"
  flavor_brapru.27.title: "Колонізація [ShowAreaNameWithNoTooltip('silesia_area')|U]"
  flavor_brapru.27.desc: "З моменту її завоювання територія [ShowAreaName('silesia_area')] залишалася відносно спустошеною та зруйнованою наслідками війн. Не бажаючи витрачати багато на інвестиції та з постійно зростаючим запалом асимілювати єретичні провінції в країні, дехто запропонував запросити [ROOT.GetCountry.GetReligion.GetAdjective] поселенців у цю територію, щоб як стимулювати місцеву економіку, так і асимілювати територію в нашу країну."
  flavor_brapru.27.historical_info: "Після придбання Сілезії в 1742 році Прусська держава запровадила політику, щоб заохотити протестантське заселення Східної Сілезії, яка була переважно католицькою та польськомовною. У 1773 році було видано едикт, щоб заохотити подальших поселенців жити в Сілезії."
  flavor_brapru.27.a: "Заохотити [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] поселенців оселитися в [ShowAreaNameWithNoTooltip('silesia_area')]"
  flavor_brapru.27.b: "Вони самі відновляться."
  STATIC_MODIFIER_NAME_PRU_settlers_in_silesia: "Нові протестантські поселенці"
  BRA_move_away_from_prosperity_silesia_tt: "Кожна [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('silesia_area')] віддаляється на #r -25.0%#! від [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_brapru.28.title: "Претензія на королівську [ShowAreaNameWithNoTooltip('prussia_area')|U]"
  flavor_brapru.28.desc: "Коридор між [ROOT.GetCountry.GetAdjective] [ShowAreaName('pomerania_area')] та [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ShowAreaName('prussia_area')] став би необхідною складовою нашої держави, якби він був у наших руках. Щоб наші території могли спілкуватися між собою, їм потрібно спілкуватися через іноземні кордони або за допомогою кораблів. Такі фактори роблять наш контроль над [ShowAreaNameWithNoTooltip('prussia_area')] у кращому випадку слабким."
  flavor_brapru.28.a: "З'єднання наших територій є серйозною справою."
  flavor_brapru.28.b: "Ми не можемо ризикувати порушити статус-кво."
  STATIC_MODIFIER_NAME_PRU_justifying_conquest_of_royal_prussia: "Обґрунтування завоювання Королівської Пруссії"
  flavor_brapru.29.title: "Розширення замку Тангермюнде"
  flavor_brapru.29.desc: "[ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetGovernment.GetCourtTitle] резиденція в Тангермюнде існувала багато років. Однак, оскільки наша увага зміщувалася на схід, установа занепала і стала лише тінню свого колишнього вигляду. Можливо, було б доречним провести ремонт та розширення."
  flavor_brapru.29.historical_info: "Замок Тангермюнде — замок, збудований у X столітті в гирлі річки Тангер, у Тангермюнде. Під правлінням Асканіїв замок Тангермюнде був однією з улюблених резиденцій Бранденбурзьких маркграфів. У 1373 році новий маркграф, також імператор Священної Римської імперії, Карл IV, переїхав до замку і значно розширив його, перетворивши на #italic Кайзерпфальц#!."
  flavor_brapru.29.a: "Це варте інвестицій."
  flavor_brapru.29.b: "Не зараз і вже точно не пізніше."
  STATIC_MODIFIER_NAME_PRU_secondary_capital_tangermunde: "Вторинний маєток у Тангермюнде"
  flavor_brapru.30.title: "Прикордонна суперечка з [pomeranian_target.GetNameWithNoTooltip]"
  flavor_brapru.30.desc: "Протягом десятиліть ми намагалися утвердити наше сюзеренство над [ShowAreaName('pomerania_area')] державами на півночі. Постійно ворогуючи за місцевості та міста в [ShowProvinceDefinitionName('uckermark_province')] та вздовж інших прикордонних пунктів, жодна зі сторін не може повністю здобути перевагу. Однак наступного разу переможемо ми. І така можливість вже на горизонті, оскільки сталася прикордонна суперечка з [pomeranian_target.GetName]."
  flavor_brapru.30.historical_info: "Прикордонні суперечки між різними герцогами Грифами Померанії та Маркграфством Бранденбург часто відбувалися протягом століть. В основі суперечки лежали спроби бранденбуржців утвердити себе як номінальних сюзеренів над померанцями, а також спроби обох сторін претендувати на прикордонні міста Пренцлау, Нойбранденбург в Укермарку."
  flavor_brapru.30.a: "Натиснути на них."
  flavor_brapru.30.b: "Війна нам не підходить."
  STATIC_MODIFIER_NAME_PRU_fabrication: "Сфабрикована суперечка"
  flavor_brapru.31.title: "Екуменічна дискусія в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_brapru.31.desc: "На знак протесту проти несправедливих дій [ShowReligionAdjective('catholic')] Церкви утворилося багато різних незалежних церков, більшість з яких дотримуються або [ShowReligionAdjective('lutheran')], або [ShowReligionAdjective('calvinist')] традицій. Оскільки обидві ці віри присутні в країні, [opposing_religion.GetAdjectiveWithNoTooltip] [ShowEstateTypeName('clergy_estate')] почали закликати до більш толерантного ставлення та до екуменічних переговорів з державною релігією, сподіваючись зблизити дві церкви."
  flavor_brapru.31.historical_info: "Берлінські релігійні переговори відбулися з вересня 1662 року по травень 1663 року. Метою цих зустрічей було зблизити лютеранську та кальвіністську віри та сприяти екуменізму. Каталізатором цих подій стали дії курфюрста Бранденбургу Фрідріха Вільгельма, який був кальвіністським правителем переважно лютеранської країни."
  flavor_brapru.31.a: "Дозволити їм зібратися."
  flavor_brapru.31.b: "[ROOT.GetCountry.GetReligion.GetNameWithNoTooltip] — єдина істинна віра."
  PRU_may_push_toleranzedikt_in_the_future_with_following_effects: "Завдяки цій [Concept('event', 'CONCEPT_PLACEHOLDER')|e] ми зможемо в майбутньому запровадити Едикт про толерантність:"
  PRU_every_pop_of_other_protestant_denomination: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] [opposing_religion.GetAdjective] віросповідання отримує [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_brapru.32.title: "Дас Толеранцедікт"
  flavor_brapru.32.desc: "Екуменічні переговори між [ShowReligionAdjective('lutheran')] та [ShowReligionAdjective('calvinist')] вірами були дещо успішними. Хоча вони, безумовно, призвели до більшого почуття єдності в протестантському світі, значна частина нашого [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] залишається нетерпимою та протилежною цій ідеї. У такому випадку [opposing_religion.GetAdjectiveWithNoTooltip] віряни почали закликати до едикту про толерантність, що забезпечує толерантність їхньої віри в [ROOT.GetCountry.GetFlavorRank]."
  flavor_brapru.32.historical_info: "16 вересня 1664 року курфюрст Бранденбургу Фрідріх Вільгельм видав Едикт про толерантність. Згідно з виданим едиктом, взаємна критика лютеранської та кальвіністської церков була заборонена, що викликало невдоволення встановленого лютеранського духовенства, яке було розлючене втручанням кальвіністського курфюрста в державну Церкву."
  flavor_brapru.32.a: "Видати едикт."
  flavor_brapru.32.b: "Ігнорувати благання."
  STATIC_MODIFIER_NAME_PRU_toleranzedikt: "Едикт про толерантність"
  flavor_brapru.33.title: "Картопляний [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_brapru.33.desc: "[ShowGoodsName('potato')] поширилася з Нового Світу до [ShowContinentName('europe')], але мало хто, особливо серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], вважає її особливо корисною, попри її якості та здатність годувати маси. [target_ruler.GetName] запропонував новий підхід, який, якщо буде успішним, може змусити наше вперте населення прийняти [ShowGoodsNameWithNoTooltip('potato')] і, можливо, навіть вирішити періодичні голоди. [ROOT.GetCountry.GetGovernment.GetRulerTitle] пропонує садити поля [ShowGoodsNameWithNoTooltip('potato')] поблизу [ROOT.GetCountry.GetGovernment.GetAdjective] земель, які постійно охоронятимуться. Намір, однак, не захист, а переконання. Чого люди не можуть мати, того вони раптом бажають."
  flavor_brapru.33.a: "Нехай люди прагнуть [ShowGoodsNameWithNoTooltip('potato')]."
  flavor_brapru.33.b: "Це божевілля."
  flavor_brapru.33.historical_info: "Фрідріх II Прусський отримав ім'я Фрідріх Великий, але це був не єдиний титул, яким він був відомий. У Німеччині його ласкаво пам'ятають як #italic Der Kartoffelkönig#! – Картопляний Король. Фрідріх відіграв ключову роль у популяризації картоплі в Німеччині XVIII століття. Він нібито наказав вирощувати королівські картопляні поля та охороняти їх солдатами не для захисту, а для створення враження, що вони цінні. Вдаючи дефіцит та ексклюзивність, селяни почали припускати, що врожай має бути цінним. Деякі навіть почали красти картоплю вночі, допомагаючи поширити її вирощування по всій Пруссії."
  flavor_brapru.34.title: "Планові поселення"
  flavor_brapru.34.desc: "Амбітна пропозиція щодо вирішення проблеми малонаселених районів у [ROOT.GetCountry.GetName] надійшла до [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Запропонована [ShowGovernmentReformName('peuplierung_system')] була б ініціативою, контрольованою [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], для заселення цих земель. Пропозиція включає щедрі пропозиції релігійної толерантності, податкових пільг та державної підтримки для охочих мігрантів, особливо кваліфікованих іноземних робітників та переслідуваних релігійних громад."
  flavor_brapru.34.a: "Нехай приходять!"
  flavor_brapru.34.b: "Ця політика послабить наш контроль."
  flavor_brapru.34.historical_info: "#italic Peuplierung#! була королівською політикою заселення, що практикувалася по всій Пруссії у XVII та XVIII століттях. Вона мала на меті відновити населення в районах, спустошених війною та хворобами, пропонуючи стимули іммігрантам. Фрідріх Великий відомо проголосив, що він прийматиме людей усіх віросповідань у Пруссії, доки люди, які їх сповідують, чесні."
  flavor_brapru.35.title: "Остання воля [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_brapru.35.desc: "Наш старіючий [ROOT.GetCountry.GetGovernment.GetRulerTitle] вирішив записати останню волю, яка шокувала [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_ruler.GetName] оголосив, що [target_ruler.GetHisHer] молодший син [favorite_child.GetName] має успадкувати [target_ruler.GetHimHer], ігноруючи усталену традицію первородства. [target_ruler.GetSheHe|U] стверджує в документі, що [target_heir.GetName] бракує чеснот лідерства, тоді як [favorite_child.GetNameWithNoTooltip] має стриманість і мудрість для правління. Багато хто побоюється, що якщо це буде прийнято, [ShowEstateTypeName('nobles_estate')] можуть бути сильно засмучені."
  flavor_brapru.35.a: "Вшанувати [target_ruler.GetHisHer] волю."
  flavor_brapru.35.b: "Це порушує закони престолонаслідування!"
  flavor_brapru.35.historical_info: "Фрідріх I, перший Гогенцоллернський курфюрст Бранденбургу, викликав хвилювання своїм суперечливим заповітом, назвавши свого другого сина, Фрідріха II, своїм наступником замість первістка. Це рішення порушило закон первородства, який диктував, що найстарший спадкоємець чоловічої статі повинен успадкувати всі титули та землі."
  flavor_brapru.36.title: "Боротьба з чумою"
  flavor_brapru.36.desc: "Періодичні чуми, що спустошують [ROOT.GetCountry.GetName], давно турбували нас, але нещодавно була висунута пропозиція створити карантинний пункт за межами стін [ShowLocationName('berlin')]. Передбачувана [ShowBuildingTypeName('charite_of_berlin')] поєднала б благодійну місію боротьби з чумою та хворобами з науковими амбіціями."
  flavor_brapru.36.a: "Схвалити пропозицію."
  flavor_brapru.36.b: "Ми не можемо собі цього дозволити."
  flavor_brapru.36.historical_info: "Лікарня Шаріте спочатку була замовлена в 1709 році королем Фрідріхом I Прусським під час періодичних загроз чуми. Спочатку запланована як карантинний пункт за межами міських стін Берліна, вона незабаром перетворилася на повноцінну лікарню і, зрештою, на одну з провідних медичних дослідницьких установ Європи. У пізніші століття вона навчила б багатьох найвідоміших німецьких лікарів, патологоанатомів та вчених."
  flavor_brapru.37.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.37.desc: "Вчений з видатним інтелектом та невгамовною цікавістю, [target_character.GetName], здобуває славу по всій [ROOT.GetCountry.GetName]. Навчаючись як гірничий інженер, [target_character.GetLastNameWithNoTooltip] розвинув пристрасть до наукових досліджень, географії та вивчення природи. [target_character.GetSheHe|U] нещодавно запропонував експедиції до далеких земель, які мають на меті каталогізувати світові екосистеми та клімати як єдину взаємопов'язану систему, але йому бракує фінансування для їхнього запуску."
  flavor_brapru.37.a: "Фінансувати [target_character.GetHisHer] експедиції!"
  flavor_brapru.37.b: "Нехай приватні меценати фінансують [target_character.GetHisHer] жагу до мандрів."
  flavor_brapru.37.historical_info: "Александр фон Гумбольдт був ерудитом, географом, ботаніком, геологом та піонером екології. Його п'ятирічна латиноамериканська експедиція змінила глобальне розуміння кліматичних зон, взаємозв'язку екосистем та геології. Його обширні дослідження допомогли закласти основи екологічної науки."
  flavor_brapru.38.title: "[target_character.GetNameWithNoTooltip]'s $humboldts_cosmos$"
  flavor_brapru.38.desc: "Після десятиліть навчання, досліджень та листування з найвидатнішими умами [target_character.GetHisHer] часу, [target_character.GetName] почав(-ла) збирати [target_character.GetHisHer] дослідження в багатотомну працю, яка намагається не менше, ніж синтезувати всі відомі природничі науки. Однак, [target_character.GetSheHe] побоюється, що завершення цієї роботи займе десятиліття, і [target_character.GetSheHe] може навіть не дожити до її публікації."
  flavor_brapru.38.a: "Ми вже достатньо підтримали [target_character.GetHerHim]."
  flavor_brapru.38.b: "Ми повинні зробити все можливе, щоб допомогти [target_character.GetHerHim]."
  flavor_brapru.38.historical_info: "У 1828 році Гумбольдт почав формулювати свій досвід та бачення в те, що пізніше стане #italic Космосом#!. Однак, через свій похилий вік, він сам відчував, що написання цієї праці було гонкою зі смертю. Хоча книга писалася двадцять п'ять років, і він не дожив до її завершення, вона революціонізувала розуміння людьми природного світу. Це було його найвище наукове досягнення, що надихнуло покоління вчених, включаючи Дарвіна, і допомогло утвердити географію та екологічну науку як сучасні академічні галузі."
  flavor_brapru.39.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.39.desc: "[target_character.GetName] є грізним мислителем, який здобуває славу завдяки [target_character.GetHisHer] опозиції до вкоріненого дуалізму сучасної думки. Натомість, [target_character.GetLastNameWithNoTooltip] намагається побудувати філософію іманентності, засновану на досвіді та розумі, розглядаючи протиріччя не як невдачу, а як рушій розвитку. [target_character.GetSheHe|U] стверджує, що людська свобода та розум не даються, а здобуваються через історію."
  flavor_brapru.39.a: "[target_character.GetHisHer|U] думка має вести нас!"
  flavor_brapru.39.b: "Ці абстракції не підходять для державного управління."
  flavor_brapru.39.historical_info: "Георг Вільгельм Фрідріх Гегель був важливим німецьким ідеалістом, який прагнув подолати хибні протиставлення сучасної філософії, такі як конфлікти розуму та емоцій, свободи та необхідності, або розуму та тіла. Він наполягав, що істина повинна виникати з іманентної критики самих ідей, а не з зовнішньо нав'язаних передумов. Його філософія мала величезний вплив на подальші філософські ідеї, які були розвинені численними філософами, на яких він вплинув."
  flavor_brapru.40.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.40.desc: "[target_character.GetName] здобуває популярність у світі мистецтва. [target_character.GetHisHer|U] робота, поєднання барокової величі та [ShowInstitutionName('enlightenment')] чуттєвості, заслужила захоплення по всій [ShowContinentName('europe')]. Незважаючи на інституційні бар'єри, [target_character.GetSheHe] здобув(-ла) членство в різних престижних організаціях, і тепер [target_character.GetSheHe] бажає повернутися до [ShowLocationName('berlin')] та пропонує стати нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle] художником(-цею)."
  flavor_brapru.40.a: "Найняти [target_character.GetHerHim]."
  flavor_brapru.40.b: "Жінки повинні триматися подалі від мистецтва."
  flavor_brapru.40.historical_info: "Анна Доротея Тербуш прорвалася крізь жорсткі художні та гендерні бар'єри, щоб стати однією з найдосвідченіших портретисток свого покоління, у час, коли мало жінок могли отримати формальну освіту. Запрошена до Парижа, вона приєдналася до Королівської академії та створювала портрети діячів Просвітництва та знаті. Коли вона повернулася до Пруссії, вона стала портретисткою Фрідріха Великого, а також прикрасила його палац Сан-Сусі."
  flavor_brapru.41.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.41.desc: "[target_character.GetName] — філософ, відомий(-а) своєю систематизацією знань, пропонуючи логічну, майже математичну структуру для теології, етики, політики і навіть метафізики. Хоча [target_character.GetHerHis] ранні зіткнення з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], за які його/її навіть вигнали, були досить суперечливими, [target_character.GetHerHis] реабілітація цілком може керувати нашими бюрократами, юристами і навіть [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  flavor_brapru.41.a: "Реабілітувати [target_character.GetHerHim]."
  flavor_brapru.41.b: "[target_character.GetSheHe|U] занадто суперечливий(-а), щоб бути найнятим(-ою)."
  flavor_brapru.41.historical_info: "Крістіан Вольф був однією з центральних фігур німецької філософії Просвітництва. Відомий своїми енциклопедичними працями та пропагандою раціоналістичного методу, він прагнув застосувати розум до всіх галузей знання. Незважаючи на ранні зіткнення з релігійними авторитетами, його спадщина була реабілітована за Фрідріха Великого, і він став наріжним каменем прусського інтелектуального життя, значно вплинувши на прусських правителів, які прагнули раціонального державного управління."
  flavor_brapru.42.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.42.desc: "Наші військові офіцери хвалять [target_character.GetName] як великого полководця, який значно сприяв кільком нашим перемогам завдяки [target_character.GetHerHis] неперевершеному командуванню на полі бою. [target_character.GetHerHis|U] присутність надихає наших чоловіків і нагадує як друзям, так і ворогам, що [ROOT.GetCountry.GetAdjective] зброя кується не лише монархами. Було запропоновано підвищити [target_character.GetHerHim] до генерала, щоб наша армія могла краще скористатися [target_character.GetHerHis] навичками."
  flavor_brapru.42.a: "Підвищити [target_character.GetHerHim], щоб надати [target_character.GetHerHim] більше повноважень."
  flavor_brapru.42.b: "Нас це не цікавить."
  flavor_brapru.42.historical_info: "Курт фон Шверін пройшов шлях через численні європейські армії, щоб стати фельдмаршалом Пруссії. У битві при Мольвіці його лідерство, ймовірно, врятувало кампанію молодого Фрідріха Великого. Завзято відданий і непохитний перед обличчям небезпеки, Шверін був смертельно поранений під Прагою, особисто згуртувавши війська. Він широко вважається одним з найздібніших і найвідданіших генералів Фрідріха Великого."
  flavor_brapru.43.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.43.desc: "Останнім часом візуальний образ [ShowLocationName('berlin')] перетворюється завдяки [target_character.GetName], якого вважають великим архітектором і візіонером. Майстерно володіючи як скульптурою, так і архітектурою, [target_character.GetSheHe] поєднує барокову велич з військовим символізмом, щоб відобразити міць нашої держави. [target_character.GetSheHe|U] хвалять за здатність перетворити будь-яку будівлю на пам'ятник суверенітету та влади. Багато хто пропонує найняти [target_character.GetHerHim] як [ROOT.GetCountry.GetGovernment.GetCourtTitle] архітектора, щоб дозволити [target_character.GetHerHim] створити образ майбутньої [ROOT.GetCountry.GetName]."
  flavor_brapru.43.a: "Найняти [target_character.GetHerHim]!"
  flavor_brapru.43.b: "Ми не можемо дозволити собі художню екстравагантність."
  flavor_brapru.43.historical_info: "Андреас Шлютер служив як придворним скульптором, так і королівським архітектором, перетворюючи Берлін на символ нової прусської могутності. Він виліпив військових героїв у динамічній формі в Цейхгаузі та спроектував Берлінський палац як королівську резиденцію, гідну найбільших монархій Європи."
  flavor_brapru.1000.title: "[GetCountry('TEU').GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] з [GetCountry('TEU').GetLongNameWithNoTooltip]"
  flavor_brapru.1000.desc: "[GetCountry('TEU').GetLongName] становив для нас особливий інтерес відтоді, як [ShowCultureGroupName('german_group')] народ став домінувати в районі [ShowAreaName('prussia_area')]. Завдяки нашому зміцненому контролю над [ROOT.GetCountry.GetLongName] ми змогли поширити членів [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] на інші трони [ShowContinentName('europe')], і це також включає [GetCountry('TEU').GetLongNameWithNoTooltip], яким править [target_character.GetName]. Ми могли б проявити нашу владу та інтегрувати їх ближче до адміністрації основного домену нашої династії в [ROOT.GetCountry.GetLongNameWithNoTooltip]. Однак це могло б привернути увагу інших держав, зацікавлених у регіоні $poland$, і зробити нас мішенню."
  flavor_brapru.1000.a: "Вирівняти їх!"
  flavor_brapru.1000.b: "Зосередимося на іншому."
  flavor_brapru.1000.historical_info: "Після часткової секуляризації Тевтонського ордену під молодшою гілкою династії фон Гогенцоллернів у 1525 році та надання Бранденбурзькій лінії прав на спадщину у 1563 році, Герцогство Пруссія зрештою було успадковане Йоганном Сигізмундом, курфюрстом Бранденбургу, у 1618 році. Це заклало основу для подальшого утворення Королівства Пруссія у 1701 році."
  flavor_brapru.1001.title: "[GetCountry('BRA').GetNameWithNoTooltip] править нами."
  flavor_brapru.1001.desc: "Оскільки нами править та ж династія, що й [GetCountry('BRA').GetName], вони вирішили проявити свою владу над нами та тісніше пов'язати нас з династичним центром [GetCountry('BRA').GetCapital.GetName]. З цим зміщенням влади наші піддані вирішили проголосити свою незалежність. Без схвалення від [GetCountry('BRA').GetCapital.GetNameWithNoTooltip] ми нічого не можемо зробити з цією ситуацією."
  flavor_brapru.1001.a: "Прикро."
  flavor_brapru.1100.title: "Нова резиденція для нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  flavor_brapru.1100.desc: "Наша столиця [ShowLocationName('berlin')] заслуговує на гідну резиденцію для [ROOT.GetCountry.GetGovernment.GetRulerTitle]! З новим палацом посеред міста ми могли б набагато швидше здійснювати наш контроль над [ROOT.GetCountry.GetFlavorRank] і працювати над позбавленням влади місцевих станів. Але буде певний ризик, який слід врахувати щодо ставлення жителів [ShowLocationNameWithNoTooltip('berlin')] до цього проекту."
  flavor_brapru.1100.a: "Побудувати Палац."
  flavor_brapru.1100.b: "Не провокувати людей."
  flavor_brapru.1101.title: "Берлінське невдоволення"
  flavor_brapru.1101.desc: "Як ми й побоювалися, місцеве населення [ShowLocationName('berlin')] повстає в опозиції та висуває вимоги закріпити свої привілеї, незважаючи на наші Богом дані права керувати містом. Нам потрібно буде вирішити, чи хочемо ми вийти за межі їхніх вимог, чи поступитися їхнім вимогам щодо закріплення їхніх привілеїв."
  flavor_brapru.1101.a: "Ігнорувати натовп."
  flavor_brapru.1101.b: "Досягти компромісу з населенням."
  flavor_brapru.1200.title: "Реформа Закону"
  flavor_brapru.1200.desc: "Така держава, як наша, повинна завжди пристосовуватися до змін. Нині перспективний кандидат піднімається щаблями нашої правової системи, який міг би очолити вкрай необхідні реформи нашої правової системи. Цей [target_character.GetName] працював президентом #italic Kammergericht#! і розробив плани реформування правової системи по всій [ROOT.GetCountry.GetName]. Якщо ми підтримаємо його зусилля, це може призвести до швидкої та радикальної реформації нашої країни."
  flavor_brapru.1200.a: "Підтримати його реформи!"
  flavor_brapru.1200.b: "Приборкати його амбіції."
  flavor_brapru.1201.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Правова Система"
  flavor_brapru.1201.desc: "З моменту прийняття на службу [target_character.GetName] наша правова система зазнала величезних змін. Настав час кодифікувати ці зміни в стандартизований правовий кодекс, який керуватиме всіма майбутніми поколіннями щодо того, як управлятимуться землі [ROOT.GetCountry.GetName]. Це забезпечить справедливе ставлення до всіх наших підданих згідно з одним стандартом, замість місцевих невідповідностей, які раніше були звичайними явищами."
  flavor_brapru.1201.a: "Впровадити негайно!"
  flavor_brapru.1201.b: "Нам потрібно ретельно це обміркувати."
  flavor_brapru.1300.title: "Піднесення [target_character.GetNameWithNoTooltip]"
  flavor_brapru.1300.desc: "Ми отримали повідомлення про талановитого чоловіка на службі нашої армії, який вразив своїх командирів своїм розумінням теорії війни. Цей [target_character.GetName] міг би чудово служити нашому кабінету та армії, якщо ми вирішимо його найняти."
  flavor_brapru.1300.a: "Найняти його."
  flavor_brapru.1300.historical_info: "Карл фон Клаузевіц народився в родині, яка претендувала на титул барона в прусській провінції Магдебург. Будучи четвертим сином у родині, він вступив на військову службу до прусської армії у віці 12 років як єфрейтор. До вступу до Прусської військової академії в 1801 році він служив під час Рейнських кампаній Пруссії та був частиною прусської армії, яка вторглася до Франції під час Французької революції. Під час свого перебування в Берліні він вивчав праці філософів Іммануїла Канта та Йоганна Готліба Фіхте і встановив контакти з тодішнім генералом Герхардом фон Шарнгорстом, який за допомогою Клаузевіца впровадив реформи в прусській армії. Служачи під час Наполеонівських війн, Клаузевіц був змушений залишити прусську армію та вступити до Німецького легіону Російської імператорської армії у боротьбі проти сил Наполеона. Після його повернення до прусської армії та поразки Наполеона при Ватерлоо він служив директором Прусської військової академії, доки його не призначили начальником штабу в 1830 році під час Листопадового повстання в Польщі."
  flavor_brapru.1301.title: "Праця [target_character.GetNameWithNoTooltip]"
  flavor_brapru.1301.desc: "Під час своєї служби в [ROOT.GetCountry.GetName] [target_character.GetName] зібрав матеріали, до яких ми тепер маємо доступ. Він писав про Теорію війни, збираючи власний досвід та спостереження на полі бою, і виклав те, що він вважав основними ідеями ведення війни."
  flavor_brapru.1301.a: "Нам потрібно це вивчити!"
  flavor_brapru.1400.title: "Безтурботно"
  flavor_brapru.1400.desc: "Наш [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] почав відчувати зростання просвітницького прагнення до витончених речей у житті, таких як філософія, мистецтво та музика. Наш власний [ROOT.GetCountry.GetGovernment.GetRulerTitle] часто розважає [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] гостей музикою, написаною [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [ROOT.GetCountry.GetGovernment.GetRuler.GetHerselfHimself].\nОднак ці заходи не дуже підходять для зайнятого двору [ROOT.GetCountry.GetCapital.GetName], постійно оточеного та перериваного щоденними справами країни. Для цього нам потрібна літня резиденція, sans souci, без турбот, подалі від зайнятого придворного життя в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip], і [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] вже особисто доручив архітектору [target_artist.GetName] зробити ескізи скромної одноповерхової будівлі, оточеної чудовим садом."
  flavor_brapru.1400.a: "Нехай [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] матиме [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] Сан-Сусі."
  flavor_brapru.1400.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] вже має будинок у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_brapru.1401.title: "Палац Сан-Сусі"
  flavor_brapru.1401.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] був у захваті з того часу, як завершилося будівництво [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] літнього палацу та реалізувалося бачення [target_character.GetName]. За умови, що [target_character.GetNameWithNoTooltip] не залучений до найважливіших державних справ, [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] проводитиме [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] літні дні в новій резиденції, розважаючи найяскравіші уми нашої епохи, чи то політичними дебатами, чи філософськими дискусіями. Соціальна еліта [ROOT.GetCountry.GetName] дуже вражена цим новим палацом і буде зацікавлена проводити свій час відтепер у безпосередній близькості від [potsdam_province.GetName]."
  flavor_brapru.1401.a: "Народжується новий центр культури для [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_brapru.1401.historical_info: "Палац Сан-Сусі був побудований у прусському стилі рококо між 1745 і 1747 роками за наказом прусського короля Фрідріха Великого. Розташований на вершині пагорба, вкритого виноградниками, палац пропонує мешканцям широкий вид на Потсдам та околиці. Порівняно зі своїми аналогами у Версалі чи Санкт-Петербурзі, Сан-Сусі з його одноповерховим дизайном має лише 10 кімнат, включаючи кімнати для персоналу. Метою літнього палацу, де Фрідріх проводив час з квітня по жовтень, було викликати відчуття інтимності та служити місцем усамітнення для короля. #italic Маленький виноградний будиночок#!, як ласкаво називав його Фрідріх, був особистим проектом короля, і після його смерті у віці 74 років у кріслі в Сан-Сусі палац відійшов на другий план на користь нових палаців, побудованих у неокласичному стилі."
  flavor_brapru.1500.title: "Канали до [berlin_province.GetNameWithNoTooltip]"
  flavor_brapru.1500.desc: "Хоча річка Шпрее добре сполучена на захід, з судноплавними шляхами до річок Гафель та Ельба, транспортні шляхи нашої країни також значною мірою залежать від річки Одер на сході. Через відсутність нашого контролю над гирлом Одера в [ShowLocationName('stettin')], наша торговельна мережа перебуває на милості власників [ShowLocationNameWithNoTooltip('stettin')] та мит, які вони можуть накладати на наших [ShowPopTypeName('burghers')]. Якби ми змогли з'єднати річки Одер та Шпрее каналом, ми могли б діяти більш незалежно від поточної політичної ситуації та запропонувати більше можливостей нашим [ShowPopTypeNameWithNoTooltip('burghers')]"
  flavor_brapru.1500.a: "Побудувати канал!"
  flavor_brapru.1500.b: "Розвивати лише місцеву інфраструктуру району."
  flavor_brapru.1500.c: "Це не потребує інвестицій."
  flavor_brapru.1501.title: "Одерсько-Шпрейський канал приносить процвітання"
  flavor_brapru.1501.desc: "Ми завершили будівництво каналу, що з'єднує річки Одер і Шпрее! Невдовзі після завершення урочистого відкриття [ROOT.GetCountry.GetGovernment.GetRulerTitle] позитивні наслідки для економіки як [ShowLocationName('berlin')], так і [ShowLocationName('lebus')] стали помітними. Канал, схоже, є дивовижним успіхом у відродженні місцевої економіки [ROOT.GetCountry.GetName]."
  flavor_brapru.1501.a: "Хай живе [target_character.GetNameWithNoTooltip] та [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] канал!"
  flavor_brapru.1600.title: "Фінансові прерогативи Кредитверку"
  flavor_brapru.1600.desc: "Наші мізерні фінансові резерви залишають нашу [ROOT.GetCountry.GetLongName] у скрутному фінансовому становищі, з невеликою кількістю доступних нам варіантів у разі надзвичайної ситуації. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] тепер звернулися до нас із пропозицією полегшити цю проблему. Надавши їм подальші права на королівські фінанси, вони нададуть свою підтримку в часи потреби. Однак цей привілей ще більше посилить залежність [target_character.GetName] від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] [ROOT.GetCountry.GetNameWithNoTooltip]. Наразі у нас немає вибору, окрім як поступитися їм, але ми повинні бути обережними щодо можливостей у майбутньому повернути статус Кредитверку."
  flavor_brapru.1600.a: "Надати повноваження Кредитверку."
  flavor_brapru.1601.title: "Банкрутство Кредитверку"
  flavor_brapru.1601.desc: "Незважаючи на повноваження, надані Кредитверку, установа зуміла потрапити у великі борги, значною мірою неправильно керуючи нашими фінансами. Оскільки ми зараз зіткнулися з негайним банкрутством Кредитверку, нам доведеться прийняти рішення щодо його майбутнього. Серед наших радників формуються численні фракції, деякі радять реформувати Кредитверк і передати його під пряме управління корони, тоді як інші рекомендують повне скасування установи."
  flavor_brapru.1601.a: "Реформувати установу під короною"
  flavor_brapru.1601.b: "Давайте позбудемося цього зла."
  flavor_brapru.1601.c: "Виручити його і дозволити йому продовжувати."
  flavor_brapru_teu.1.title: "Заклад [ShowProvinceDefinitionNameWithNoTooltip('neumark_province')]"
  flavor_brapru_teu.1.desc: "Наші східні території в [ShowProvinceDefinitionName('neumark_province')] занадто далеко, щоб ми могли належним чином контролювати їх з нашої столиці. Заражені розгулом баронів-розбійників, можливо, було б вигідно для нас закласти їх іншій сутності, яка не мала б природного інтересу до наших територій і, отже, могла б бути довіреною."
  flavor_brapru_teu.1.historical_info: "Провінція Ноймарк, постійно турбована баронами-розбійниками, була закладена Тевтонському ордену в 1402 році. Сподівалися, що орден зможе приборкати місцеву злочинність, але він не зміг цього зробити, і провінція залишалася збіднілою, поки її врешті-решт не продали назад бранденбурзьким курфюрстам у 1450-х роках."
  flavor_brapru_teu.1.a: "Закласти його [GetCountry('TEU').GetNameWithNoTooltip]"
  flavor_brapru_teu.1.b: "Ми самі з ними розберемося."
  TEU_pawn_neumark_to_teutons: "Ми запропонуємо [GetCountry('TEU').GetName] наступні локації, якщо вони погодяться:"
  STATIC_MODIFIER_NAME_PRU_crime_ridden: "Місцевість, охоплена злочинністю"
  TEU_rejected_sale: "Відхилена покупка"
  flavor_brapru_teu.2.title: "$flavor_brapru_teu.1.title$"
  flavor_brapru_teu.2.desc: "[teu_from.GetLongName] явно занадто некомпетентні, щоб впоратися з баронами-розбійниками на своїх східних територіях у [ShowProvinceDefinitionName('neumark_province')]. У спробі втекти від цієї проблеми вони запропонували нам провінцію за значну суму золота."
  flavor_brapru_teu.2.historical_info: "$flavor_brapru_teu.1.historical_info$"
  flavor_brapru_teu.2.a: "Ми приймемо."
  flavor_brapru_teu.2.b: "Ми не матимемо справи з їхніми проблемами."
  flavor_brapru_teu.3.title: "Доля [ShowProvinceDefinitionNameWithNoTooltip('neumark_province')]"
  flavor_brapru_teu.3.desc: "Придбавши [ShowProvinceDefinitionName('neumark_province')] багато років тому, ми так і не змогли успішно подолати проблеми, що пронизували провінцію. Натомість, єдина вигода, яку ми отримали від цієї території, полягає в тому, що вона слугує нашим збірним пунктом для найманців, що прибувають із Заходу."
  flavor_brapru_teu.3.historical_info: "Провінція Ноймарк, постійно обтяжена розбійницькими баронами, була закладена Тевтонському ордену в 1402 році бранденбурзькими курфюрстами. Під владою Ордену провінція залишалася збіднілою, і Магістр Ордену, спробувавши продати її Польщі, зумів продати її назад Бранденбургу в 1455 році як частину Кьольнського та Мевеського договорів."
  flavor_brapru_teu.3.a: "Нам слід розглянути можливість продати її назад [GetCountry('BRA').GetNameWithNoTooltip]."
  flavor_brapru_teu.3.b: "Або, можливо, [GetCountry('POL').GetNameWithNoTooltip] було б краще."
  flavor_brapru_teu.3.c: "Що наше, те наше."
  TEU_sell_neumark_back_to_brandenburg: "Ми запропонуємо [GetCountry('BRA').GetName] наступні місцевості, якщо вони погодяться:"
  TEU_sell_neumark_back_to_poland: "Ми запропонуємо [GetCountry('POL').GetName] наступні місцевості, якщо вони погодяться:"
  flavor_brapru_teu.4.title: "Кьольнський договір"
  flavor_brapru_teu.4.desc: "Десятиліття тому ми продали [ShowProvinceDefinitionName('neumark_province')] [teu_from.GetName], сподіваючись позбутися проблеми розбійницьких баронів, що шкодила нашому престижу і створювала нам більше клопотів, ніж користі. Після всіх цих років [teu_from.GetAdjectiveWithNoTooltip] держава не тільки не вирішила проблему, але й посилила бідність у провінції. Здавшись на своєму відкритому фланзі, вони пропонують нам ці землі назад."
  flavor_brapru_teu.4.desc_other: "Ми отримали пропозицію про продаж провінції з несподіваного джерела – від [teu_from.GetLongName]. Йдеться про [ShowProvinceDefinitionName('neumark_province')] – нам слід серйозно розглянути цю пропозицію."
  flavor_brapru_teu.4.historical_info: "$flavor_brapru_teu.3.historical_info$"
  flavor_brapru_teu.4.a: "Груба некомпетентність... Ми приймемо."
  flavor_brapru_teu.4.b: "Завоювання було б менш витратним."
  flavor_brapru_teu.4.c: "Вона все ще повна розбійницьких баронів!"
  flavor_brapru_teu.5.title: "Нашу пропозицію відхилено"
  flavor_brapru_teu.5.desc: "Нашу урочисту пропозицію продати провінцію [ShowProvinceDefinitionName('neumark_province')] було відхилено. На жаль, нам доведеться самотужки розбиратися з дорогими проблемами, що пронизують провінцію."
  flavor_brapru_teu.5.a: "Це просто дуже прикро."
  flavor_brapru.1800.title: "Неприємності на троні"
  flavor_brapru.1800.desc: "Тронна зала [pru_from.GetName] останнім часом була хаотичною. Кілька некомпетентних рішень з боку [pru_from.GetGovernment.GetRulerTitle] та [our_ruler.GetHerHis] придворних призвели до кризи, яка загрожує самій цілісності держави. У цьому випадку стани [pru_from.GetNameWithNoTooltip] почали розглядати іноземних кандидатів, включаючи [target_character.GetNameWithNoTooltip]."
  flavor_brapru.1800.a: "Воістину, [target_character.GetNameWithNoTooltip] має правити нами."
  flavor_brapru.1800.b: "Невдоволення з часом зникне."
  BRA_dynastic_connections: "Династичні зв'язки"
  flavor_brapru.1801.title: "[target_character.GetDynasty.GetNameWithNoTooltip] на [pru_from.GetAdjectiveWithNoTooltip] троні"
  flavor_brapru.1801.desc: "Один із членів династії [target_character.GetDynasty.GetName] опинився на троні [pru_from.GetName]. Ми могли б отримати вигоду з цього в майбутньому, враховуючи позитивні стосунки між нашими родичами."
  flavor_brapru.1801.a: "Справді цікаво."
  PRU_information_about_event_chain: "У майбутньому ми зможемо сформувати [Concept('union', 'CONCEPT_PLACEHOLDER')|e] з [pru_from.GetName]."
  flavor_brapru.1802.title: "Розумовий занепад [insane_individual.GetNameWithNoTooltip]"
  flavor_brapru.1802.desc: "Викликів у керуванні країною чимало. Хоча більшість готові до таких важких завдань, деякі не витримують тиску. Очевидно, однією з таких людей був [insane_individual.GetName], оскільки [insane_individual.GetSheHe] почав виявляти ознаки розумового занепаду. Більшість членів [ROOT.GetCountry.GetGovernment.GetCourtTitle] та станів оголосили [insane_individual.GetHerHim] непридатним для правління."
  flavor_brapru.1802.a: "Лише [proposed_regent.GetNameWithNoTooltip] може нам допомогти."
  flavor_brapru.1803.title: "$flavor_brapru.1802.title$"
  flavor_brapru.1803.desc: "Ми отримали звістку від нашого підданого в [pru_from.GetName] про їхні політичні негаразди. Їхній уряд залишився без правителя через розумовий занепад [insane_individual.GetName]. У ті темні часи вони звернулися до свого родича, [proposed_regent.GetName]. Якщо [proposed_regent.GetNameWithNoTooltip] стане регентом, утвориться персональна унія, що призведе до проблем на горизонті для нас. Ми могли б нав'язати власного регента, але це зустріло б обурення в [pru_from.GetNameWithNoTooltip]."
  flavor_brapru.1803.a: "Не звертаймо на це уваги."
  flavor_brapru.1803.b: "[proposed_regent_of_poland.GetNameWithNoTooltip] впорався б набагато краще."
  flavor_brapru.1804.title: "Правління в [pru_from.GetNameWithNoTooltip]"
  flavor_brapru.1804.desc: "[proposed_regent.GetName] благополучно прибув до [pru_from.GetCapital.GetName], столиці [pru_from.GetName], і відбулася церемонія, яка перетворила [proposed_regent.GetHimHer] на регента держави і, на практиці, сформувала персональну унію між [ROOT.GetCountry.GetName] та [pru_from.GetNameWithNoTooltip]. Однак це означає, що [proposed_regent.GetNameWithNoTooltip] тепер повинен присягнути на вірність [pru_from.GetDiplomacy.GetOverlord.GetLongName] за [proposed_regent.GetHisHer] новонабуті території."
  flavor_brapru.1804.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  PRU_we_have_formed_personal_union_with_PRU_subject: "Ми сформували [Concept('union', 'CONCEPT_PLACEHOLDER')|e] з [pru_from.GetName]."
  flavor_brapru.1805.title: "[intervening_tag.GetAdjectiveWithNoTooltip] Інтервенція"
  flavor_brapru.1805.desc: "Наші сюзерени в [intervening_tag.GetName] помітили наші проблеми та наше запрошення [proposed_regent.GetName]. Вирішивши, що це їхнє право призначати регента, вони надіслали [proposed_regent_of_poland.GetShortName], якого ми були змушені прийняти як нового [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetLongName]."
  flavor_brapru.1805.a: "Яка катастрофа!"
  PRU_poland_enforced_regent: "[Concept('intervening_tag.GetName] нав'язав свого регента [pru_from.GetName]. [union', 'CONCEPT_PLACEHOLDER')|e] з [pru_from.GetName] не утвориться."
  flavor_brapru.1806.title: "$flavor_brapru.1805.title$"
  flavor_brapru.1806.desc: "[pru_from.GetAdjective] сюзерени в [intervening_tag.GetName] помітили їхні проблеми та їхнє запрошення [proposed_regent.GetName]. Вирішивши, що це їхнє право призначати регента, вони надіслали [proposed_regent_of_poland.GetShortName], який став новим [pru_from.GetGovernment.GetRulerTitle]. Нам по суті заборонили набувати новий [pru_from.GetFlavorRank] на сході. Вони пізнають наш гнів!"
  flavor_brapru.1806.a: "Їх буде покарано за втручання!"
  flavor_brapru.1807.title: "Договір у [wehlau_loc.GetNameWithNoTooltip]"
  flavor_brapru.1807.desc: "З моменту нашого успадкування в [GetCountry('PRU').GetName] ми повільно набирали силу відносно нашого часткового сюзерена в [GetCountry('PRU').GetDiplomacy.GetOverlord.GetName]. Сьогодні, коли наша відносна сила до [GetCountry('PRU').GetDiplomacy.GetOverlord.GetLongNameWithNoTooltip] є сприятливішою, ніж будь-коли, ми повинні запропонувати договір між двома націями, пропонуючи [GetCountry('PRU').GetDiplomacy.GetOverlord.GetAdjectiveWithNoTooltip] обіцянку миру в обмін на їхню відмову від [GetCountry('PRU').GetNameWithNoTooltip] як свого підданого."
  flavor_brapru.1807.historical_info: "Веляуський договір був принизливим пактом між Королівством Польським та Гогенцоллернським герцогством Пруссія, згідно з яким перше відмовилося від свого сюзеренітету над останнім, отримавши натомість військову підтримку Гогенцоллернів проти шведів. Каталізатором цього договору стало катастрофічне вторгнення до Польщі, відоме як #italic Шведський потоп#!."
  flavor_brapru.1807.a: "Давайте запропонуємо цю ідею."
  flavor_brapru.1807.b: "Ми позбудемося того сюзерена іншим разом."
  STATIC_MODIFIER_NAME_PRU_increase_power_projection_rating: "Прусське Піднесення"
  PRU_if_poland_accepts: "Якщо [GetCountry('PRU').GetDiplomacy.GetOverlord.GetName] погоджується:"
  PRU_if_poland_refuses: "Якщо [GetCountry('PRU').GetDiplomacy.GetOverlord.GetName] відмовляється:"
  flavor_brapru.1808.title: "$flavor_brapru.1807.title$"
  flavor_brapru.1808.desc: "Наш сусід, що підноситься в [bra_from.GetName], стає напрочуд могутнім порівняно з нами, а їхня особиста унія в [GetCountry('PRU').GetName] робить їх небезпекою для нашої держави на західному фланзі. Насправді, якби вони напали на нас сьогодні, ми вважаємо, що поразка була б гарантована. Щоб забезпечити мир між двома націями, вони вимагають від нас відмовитися від герцогського [GetCountry('PRU').GetNameWithNoTooltip] як нашого підданого. Якщо ми цього не зробимо, вони покажуть нам міць своєї сталі."
  flavor_brapru.1808.historical_info: "$flavor_brapru.1807.historical_info$"
  flavor_brapru.1808.a: "Можливо, у нас немає вибору."
  flavor_brapru.1808.b: "Безглузда пропозиція! Ми не будемо принижені."
  flavor_brapru.1809.title: "$flavor_brapru.1807.title$"
  flavor_brapru.1809.desc_success: "Усвідомивши своє скрутне становище, [overlord_of_prussia.GetName] прийняв угоду. Згодом наші сторони зустрілися в [wehlau_loc.GetName] і ратифікували договір. З підписанням [GetCountry('PRU').GetLongName] більше не є підданим [overlord_of_prussia.GetNameWithNoTooltip]."
  flavor_brapru.1809.desc_failure: "На превеликий жаль, [overlord_of_prussia.GetName] відмовилися підписати запропонований договір, і тому ми повинні будемо змусити їх зіткнутися з наслідками своїх дій. Довівши світові наші наміри вирішити питання мирним шляхом, ми вільні йти на війну."
  flavor_brapru.1809.historical_info: "$flavor_brapru.1807.historical_info$"
  flavor_brapru.1809.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_brapru.1809.b: "Досить прикро для [GetCountry('PRU').GetDiplomacy.GetOverlord.GetNameWithNoTooltip]."
  flavor_brapru.1810.title: "Пропозиція регентства"
  flavor_brapru.1810.desc: "Психічний занепад [pru_from.GetAdjective] [insane_individual.GetName] призвів до того, що [pru_from.GetAdjectiveWithNoTooltip] [pru_from.GetGovernment.GetCourtTitle] намагається знайти регента для управління країною замість [insane_individual.GetHerHis]. Якщо їм це не вдасться, вони ризикують зіткнутися з хаосом і беззаконням. Ось чому вони обрали єдиного розумного кандидата на регентство, [insane_individual.GetHerHis] родича, [proposed_regent.GetName]. Ми бачимо мало причин відмовлятися від цієї пропозиції, хоча це може поставити нас під загрозу війни з їхніми сюзеренами в [pru_from.GetDiplomacy.GetOverlord.GetName]."
  flavor_brapru.1810.a: "Дійсно, ми могли б це зробити."
  flavor_brapru.1810.b: "Це може втягнути нас у непотрібний конфлікт."
  PRU_our_chance_to_get_union: "Це призведе до [Concept('union', 'CONCEPT_PLACEHOLDER')|e] між двома націями."
  flavor_brapru.1811.title: "Секуляризація [ROOT.GetCountry.GetFlavorRank]"
  flavor_brapru.1811.desc: "З Реформацією в повному розпалі ми зробили важкий вибір, щоб перейти від [ShowReligionName('catholic')] до [ROOT.GetCountry.GetReligion.GetName]. З того часу ми залишилися з більшою кількістю питань, ніж відповідей. Ніхто, жодна душа, здається, не знає, хто наш справжній сюзерен, яку місію ми виконуємо, і які навіть аспекти нашої віри. Чи має існування [ROOT.GetCountry.GetLongName] все ще сенс?"
  flavor_brapru.1811.historical_info: "У 1525 році католицький Тевтонський орден був секуляризований у лютеранське герцогство великим магістром Альбрехтом Гогенцоллерном. Колишній великий магістр віддав шану королю Польщі і йому було дозволено продовжувати правити як герцогу Пруссії. Це був перший випадок відкритого прийняття лютеранства як державної релігії."
  flavor_brapru.1811.a: "Часи змінилися."
  flavor_brapru.1811.b: "Ми подолаємо ці труднощі."
  STATIC_MODIFIER_NAME_PRU_crisis_of_the_theocracy: "Криза Теократії"
  flavor_brapru.1900.title: "Піднесення баронів-розбійників"
  flavor_brapru.1900.desc: "Слабкий контроль [ROOT.GetCountry.GetGovernment.GetRulerTitle] та загальне беззаконня призвели до піднесення баронів-розбійників — шляхтичів, що живуть цим беззаконням і ведуть злочинне життя. Їхня присутність лише послаблює наш контроль та підриває авторитет [target_ruler.GetName]. Наразі їхній вплив найсильніший у [robber_baron_province.GetName]."
  flavor_brapru.1900.a: "Ми розберемося з ними свого часу."
  STATIC_MODIFIER_NAME_PRU_robber_barons: "Барони-розбійники"
  PRU_use_cabinet_action_to_get_rid_of_barons: "[ShowCabinetActionName('pru_deal_with_robber_barons')] доступна для боротьби з баронами-розбійниками у провінції."
  remove_PRU_robber_barons_modifier: "[Concept('province', 'CONCEPT_PLACEHOLDER')|e] втрачає ефект [GetModifier('PRU_robber_barons').GetNameWithTooltip]"
  flavor_brapru.1901.title: "Барони-розбійники у [robber_baron_province.GetNameWithNoTooltip]"
  flavor_brapru.1901.desc: "Чума, якою є присутність баронів-розбійників, поширилася на провінцію [robber_baron_province.GetName]. Їхні злочини та зарозумілість — це як плювок нам в обличчя. Час провчити їх, щоб відновити центральну владу в країні."
  flavor_brapru.1901.a: "Ми розберемося з ними свого часу."
  flavor_brapru.1902.title: "Фон Квіцов"
  flavor_brapru.1902.desc: "Серед усіх баронів-розбійників мало хто може зрівнятися за впливом із родиною фон Квіцов. Їхні володіння численні по всій території [ShowProvinceDefinitionName('mittelmark_province')] і вони володіють величезними маєтками. Попри все це, вони все одно вдалися до злочинного життя. Ми розтопчемо їх і знищимо їхні маєтки, перш ніж вони спричинять повний хаос."
  flavor_brapru.1902.a: "Ми повинні розібратися з ними!"
  flavor_brapru.1902.b: "Нам краще застосувати обережний підхід."
  flavor_brapru.1902.historical_info: "Родина фон Квіцов була найвпливовішою шляхетною родиною Бранденбургу початку XV століття. Під час централізації Марки Фрідріхом I фон Гогенцоллерном у 1411-1415 роках, двоє братів Ганс і Дітріх, відомі барони-розбійники, стали мішенню нового курфюрста, який завоював їхні замки та поклав край епосі панування фон Квіцов у Бранденбурзі."
  STATIC_MODIFIER_NAME_PRU_quitzow_modifier: "Вплив фон Квіцов"
  STATIC_MODIFIER_NAME_PRU_quitzow_repressed_modifier: "Придушення фон Квіцов"
  bra_quitzow_revolt: "Повстання Квіцов"
  flavor_brapru.1903.title: "Завершення правління баронів-розбійників"
  flavor_brapru.1903.desc: "Хоча це зайняло багато років і кампаній, ми нарешті змогли приборкати зухвалу [ShowEstateTypeName('nobles_estate')]. Відтепер усі торговельні шляхи в країні безпечні від розбійників шляхетного походження, і жодній простій людині нічого боятися. Тепер пересічний селянин більше не платить данину за захист [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_brapru.1903.a: "[ROOT.GetCountry.GetFlavorRank] знову ціле."
  STATIC_MODIFIER_NAME_PRU_end_of_robber_barons: "Кінець епохи баронів-розбійників"
  flavor_brapru.1904.title: "Покарання баронів-розбійників"
  flavor_brapru.1904.desc: "Хоча ми змогли перемогти в нашій боротьбі проти повсталої [ShowEstateTypeName('nobles_estate')], багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] вважає, що проста перемога над ними нічого не дає, і що [ROOT.GetCountry.GetGovernment.GetRulerTitle] має змусити їх заплатити за їхню зраду. Хоча багато хто підтримує цей стимул, інші вважають, що подальше відчуження не є необхідним, особливо з огляду на те, що ми вже відновили свій контроль."
  flavor_brapru.1904.a: "Вони заплатять за свою зраду!"
  flavor_brapru.1904.b: "Покарати їх помірно."
  flavor_brapru.1904.c: "Немає потреби у подальшому покаранні."
  flavor_brapru.2000.title: "Період Відбудови"
  flavor_brapru.2000.desc: "Недавні заворушення щодо спадкоємства в [ROOT.GetCountry.GetName] добігли кінця. Ми бачили, до чого може призвести недбальство у виконанні обов'язків, і якщо ми хочемо зберегти [root_dynasty.GetName] на троні, ми повинні зробити все, що в наших силах, щоб запобігти повторенню такої кризи. [ROOT.GetCountry.GetFlavorRank] лежить спустошений міжусобицями та ослаблений непевною вірністю. Настав час відбудовуватися."
  flavor_brapru.2000.a: "Спершу примирімося зі станами."
  flavor_brapru.2000.b: "Зосередитися на підтвердженні нашого правління."
  flavor_brapru.2000.c: "Надати пріоритет стабілізації [ROOT.GetCountry.GetFlavorRank]."
  flavor_brapru.2000.d: "Ми повинні працювати над модернізацією."
  flavor_brapru.2001.title: "Зміна вірності"
  flavor_brapru.2001.desc: "Після утвердження нашого правління над [ROOT.GetCountry.GetName], наша дипломатична позиція була поставлена під сумнів. Хоча ми раніше покладалися на наших старих союзників, таких як [target_country.GetName], багато хто вважає, що недавні події могли зробити їх обережними, і що наші старі вороги можуть стати корисними партнерами."
  flavor_brapru.2001.a: "Шукаймо союзу з [emperor_country.GetNameWithNoTooltip]."
  flavor_brapru.2001.b: "Ми не можемо відвернутися від наших старих союзників."
  flavor_brapru.2001.historical_info: "Після сходження Гогенцоллернів вірність Бранденбургу змінилася. Фрідріх I тісніше зблизився з імператором Сигізмундом та іншими імперськими інтересами, що контрастувало з колишніми регіональними союзами."
  flavor_brapru.2002.title: "Пропозиція союзу"
  flavor_brapru.2002.desc: "Прибув посланець з [root_country.GetName] до [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Династія [root_dynasty.GetName] бажає зміцнити свій контроль над [root_country.GetNameWithNoTooltip] та забезпечити свою дипломатичну позицію, відмовившись від регіональних союзів на користь тісного узгодження з інтересами [GetUniqueInternationalOrganization('hre').GetName]."
  flavor_brapru.2002.a: "Вони будуть цінним союзником."
  flavor_brapru.2002.b: "Чи зрештою вони також відвернуться від нас?"