l_english:
  flavor_fra_sco.101.title: "[GetCountry('SCO').GetAdjectiveWithNoTooltip] Король у вигнанні"
  flavor_fra_sco.101.desc: "Відколи відбулася битва при Гелідон-Гіллі в 1333 році, [GetCharacter('sco_david_ii').GetName] та його найближчі радники жили у вигнанні у [GetCountry('FRA').GetName] під захистом [GetCharacter('fra_philip_vi_valois').GetName]. За роки вигнання [GetCharacter('sco_david_ii').GetShortNameWithNoTooltip] претендент [GetCharacter('sco_edward_balliol').GetName], підтримуваний [GetCountry('ENG').GetName], боровся проти сил, вірних [GetCharacter('sco_david_ii').GetShortNameWithNoTooltip] у [GetCountry('SCO').GetName], намагаючись захопити $scottish_group$ трон для себе.\n\nЗ моменту підписання Старого Альянсу в 1295 році [GetCountry('SCO').GetNameWithNoTooltip] та [GetCountry('FRA').GetNameWithNoTooltip] підтримували тісні стосунки. Якщо [GetCountry('SBL').GetNameWithNoTooltip] досягне успіху в [GetCountry('SCO').GetNameWithNoTooltip], це, безсумнівно, призведе до того, що Королівство знову підкориться [GetCountry('ENG').GetAdjectiveWithNoTooltip] впливу. Якщо фракція, вірна [GetCharacter('sco_david_ii').GetShortNameWithNoTooltip], має досягти успіху, їй знадобиться підтримка [GetCountry('FRA').GetAdjectiveWithNoTooltip] двору."
  flavor_fra_sco.101.b: "Надати [GetCharacter('sco_david_ii').GetNameWithNoTooltip] ресурси Двору."
  flavor_fra_sco.101.a: "Ми підтримаємо [GetCharacter('sco_david_ii').GetNameWithNoTooltip] та його справу."
  flavor_fra_sco.101.c: "[GetCountry('SCO').GetAdjectiveWithNoTooltip] справа програна, [GetCharacter('sco_david_ii').GetNameWithNoTooltip] мусить повернутися."
  flavor_fra_sco.101.d: "Запропонувати [GetCharacter('sco_david_ii').GetNameWithNoTooltip] [GetCharacter('sco_edward_balliol').GetShortNameWithNoTooltip] в обмін на підтримку."
  flavor_fra_sco.102.title: "[GetCharacter('sco_david_ii').GetNameWithNoTooltip] досягає повноліття"
  flavor_fra_sco.102.ballioldefeated.desc: "Протягом останніх кількох років [GetCharacter('sco_david_ii').GetName] залишався почесним гостем при [GetCountry('FRA').GetAdjectiveWithNoTooltip] дворі, отримуючи освіту, гідну [GetCountry('FRA').GetAdjectiveWithNoTooltip] Принца. Тепер, коли молодий Король досяг повноліття, він чітко заявив про свій намір незабаром повернутися до [GetCountry('SCO').GetName], щоб правити, але запевнив [ROOT.GetCountry.GetGovernment.GetRuler.GetName], що щедрість, виявлена до нього та його радників, ніколи не буде забута. Однак, щоб забезпечити стабілізацію його правління, [GetCharacter('sco_david_ii').GetNameWithNoTooltip] попросив нас надати йому кількох [GetCountry('FRA').GetAdjectiveWithNoTooltip] міністрів для допомоги в його правлінні."
  flavor_fra_sco.102.warongoing.desc: "Протягом останніх кількох років [GetCharacter('sco_david_ii').GetName] залишався почесним гостем при [GetCountry('FRA').GetAdjectiveWithNoTooltip] дворі, отримуючи освіту, гідну [GetCountry('FRA').GetAdjectiveWithNoTooltip] Принца. Тепер, коли молодий Король досяг повноліття, він чітко заявив про свій намір незабаром повернутися до [GetCountry('SCO').GetName], щоб придушити претендентів [GetCountry('SBL').GetName], але запевнив [ROOT.GetCountry.GetGovernment.GetRuler.GetName], що щедрість, виявлена до нього та його радників, ніколи не буде забута. Однак [GetCharacter('sco_david_ii').GetNameWithNoTooltip] зробив останнє прохання до [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip]. Щоб забезпечити успіх його справи після повернення, він попросив, щоб [GetCountry('FRA').GetAdjectiveWithNoTooltip] свита приєдналася до нього в його поверненні до [GetCountry('SCO').GetNameWithNoTooltip]."
  flavor_fra_sco.102.a: "Ми виконаємо останнє прохання [GetCharacter('sco_david_ii').GetShortNameWithNoTooltip]"
  flavor_fra_sco.102.b: "[GetCharacter('sco_david_ii').GetShortNameWithNoTooltip] отримає наших найкращих воїнів"
  flavor_fra_sco.102.c: "Ми надали все, що могли, [GetCharacter('sco_david_ii').GetShortNameWithNoTooltip] мусить впоратися далі сам"
  flavor_fra_sco.102.d: "Ми запропонуємо контингент ополчення, щоб допомогти йому"
  flavor_fra_sco.102.e: "Ми надали все, що могли, [GetCharacter('sco_david_ii').GetShortNameWithNoTooltip] мусить впоратися далі сам"
  flavor_fra_sco.103.title: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] Делегація пропонує [GetCharacter('sco_david_ii').GetNameWithNoTooltip] за підтримку"
  flavor_fra_sco.103.desc: "Двір [GetCountry('SBL').GetName] був здивований, коли сьогодні до двору прибула [GetCountry('FRA').GetAdjectiveWithNoTooltip] делегація разом із спірним Королем [GetCountry('SCO').GetAdjective], [GetCharacter('sco_david_ii').GetName]. З часів битви при Гелідон-Гіллі [GetCharacter('sco_david_ii').GetNameWithNoTooltip] перебував у вигнанні у [GetCountry('FRA').GetName], і хоча [GetCountry('FRA').GetAdjectiveWithNoTooltip] емісари раніше намагалися укласти угоду, ті переговори зрештою ні до чого не призвели. Цього разу [GetCountry('FRA').GetAdjectiveWithNoTooltip] делегація пропонує натомість визнати [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] де-факто правителем [GetCountry('SCO').GetName], якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] відмовиться від своєї підтримки [GetCountry('ENG').GetName] і натомість прийме [GetCountry('FRA').GetAdjectiveWithNoTooltip] підтримку. В обмін вони пропонують опіку над [GetCharacter('sco_david_ii').GetNameWithNoTooltip], що майже повністю знищило б моральний дух його прихильників."
  flavor_fra_sco.103.a: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] були б більшим активом, ніж [GetCountry('ENG').GetAdjectiveWithNoTooltip]"
  flavor_fra_sco.103.b: "Відмовитися від пропозиції, але дозволити делегації піти вільно"
  flavor_fra_sco.103.c: "Стратити делегацію разом із [GetCharacter('sco_david_ii').GetNameWithNoTooltip]!"
  flavor_fra_sco.104.title: "[GetCountry('SBL').GetNameWithNoTooltip] приймає пропозицію про підтримку"
  flavor_fra_sco.104.desc: "Наша делегація до [GetCountry('SBL').GetName] повернулася і принесла чудові новини про те, що [GetCountry('SBL').GetGovernment.GetRuler.GetName] люб'язно прийняв нашу пропозицію про підтримку. Тепер, коли [GetCharacter('sco_david_ii').GetName] перебуває в руках [GetCountry('SBL').GetGovernment.GetRuler.GetShortNameWithNoTooltip], його підтримка, ймовірно, зменшиться в [GetCountry('SCO').GetName] і дасть [GetCountry('SBL').GetNameWithNoTooltip] перевагу."
  flavor_fra_sco.104.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_fra_sco.105.title: "[GetCountry('SBL').GetNameWithNoTooltip] відмовляється від пропозиції"
  flavor_fra_sco.105.balliol_refuses.desc: "Наша делегація до [GetCountry('SBL').GetName] повернулася з невдачею, переговори з [GetCountry('SBL').GetGovernment.GetRuler.GetName] знову зірвалися без жодної угоди. Незважаючи на нашу пропозицію обміняти опіку над [GetCharacter('sco_david_ii').GetName] в обмін на відмову [GetCountry('SBL').GetNameWithNoTooltip] від підтримки [GetCountry('ENG').GetName] та прийняття [GetCountry('FRA').GetAdjectiveWithNoTooltip] підтримки, він наполягав на збереженні підтримки від [GetCountry('ENG').GetAdjectiveWithNoTooltip]. Крім того, [GetCharacter('sco_david_ii').GetShortNameWithNoTooltip] та його радники скористалися нагодою повернутися до [GetCountry('SCO').GetName], розлючені спробами [GetCountry('FRA').GetAdjectiveWithNoTooltip] двору обміняти їх своєму ворогу."
  flavor_fra_sco.105.balliol_executes_delegation.desc: "Наша делегація до [GetCountry('SBL').GetName] закінчилася повним провалом: [GetCountry('SBL').GetGovernment.GetRuler.GetName] не тільки відмовився від нашої пропозиції про підтримку, але й стратив більшість нашої делегації разом із [GetCountry('SCO').GetAdjectiveWithNoTooltip] Королем [GetCharacter('sco_david_ii').GetName]. Решта [GetCountry('SCO').GetAdjectiveWithNoTooltip] радників, присутніх при [GetCountry('FRA').GetAdjectiveWithNoTooltip] дворі, повернулися до [GetCountry('SCO').GetName], розлючені нашим поводженням із ситуацією, а також дали зрозуміти, що Старий Альянс майже розірвано."
  flavor_fra_sco.105.a: "Це був повний провал!"
  flavor_fra_sco.106.title: "[GetCountry('SBL').GetNameWithNoTooltip] отримує опіку над [GetCharacter('sco_david_ii').GetNameWithNoTooltip]"
  flavor_fra_sco.106.desc: "Лорди [GetCountry('SBL').GetName] захопили [GetCharacter('sco_david_ii').GetName]! Хоча наші вигнані лоялісти в [GetCountry('FRA').GetName] погодилися взяти участь у відновлених мирних переговорах з [GetCountry('SBL').GetNameWithNoTooltip], не очікувалося, що [GetCountry('FRA').GetAdjectiveWithNoTooltip] завдадуть нам удару в спину і передадуть [GetCharacter('sco_david_ii').GetNameWithNoTooltip] як полоненого. Можна лише припустити, що [GetCountry('FRA').GetAdjectiveWithNoTooltip] вирішили перейти на бік [GetCountry('SBL').GetNameWithNoTooltip] у цій тривалій війні."
  flavor_fra_sco.106.a: "Ми переможемо [GetCountry('SBL').GetNameWithNoTooltip] без підтримки [GetCountry('FRA').GetAdjectiveWithNoTooltip]"
  flavor_fra_sco.107.title: "[GetCharacter('sco_david_ii').GetNameWithNoTooltip] убитий [GetCountry('SBL').GetNameWithNoTooltip]"
  flavor_fra_sco.107.desc: "Трагедія! Після домовленості про відновлення мирних переговорів між [GetCountry('SBL').GetName] та [GetCountry('SCO').GetName], за посередництва [GetCountry('FRA').GetName], прибуття делегації [GetCountry('SBL').GetNameWithNoTooltip] замість привітання зустріло зраду, коли [GetCountry('SBL').GetGovernment.GetRuler.GetName] убив значну частину делегації, включаючи [GetCharacter('sco_david_ii').GetNameWithNoTooltip]. Наразі [target_regent.GetName] продовжить правити як регент, але нового короля потрібно буде обрати. Проте [GetCountry('SBL').GetGovernment.GetRuler.GetNameWithNoTooltip] має бути розгромлений за вбивство короля."
  flavor_fra_sco.107.a: "[GetCountry('SBL').GetNameWithNoTooltip] заплатить за це!"
  flavor_fra_sco.108.title: "[GetCountry('FRA').GetNameWithNoTooltip] надсилає підтримку"
  flavor_fra_sco.108.desc: "Поки [GetCountry('FRA').GetAdjectiveWithNoTooltip] корона охороняє [GetCharacter('sco_david_ii').GetName] та його найближчих радників, вони надіслали свиту з додатковими коштами, підтверджуючи свою відданість [GetCountry('FRA').GetAdjectiveWithNoTooltip]-[GetCountry('SCO').GetAdjectiveWithNoTooltip] зв'язкам."
  flavor_fra_sco.108.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_fra_sco.109.title: "[GetCountry('FRA').GetNameWithNoTooltip] припиняє притулок [GetCharacter('sco_david_ii').GetNameWithNoTooltip]"
  flavor_fra_sco.109.desc: "Втікши з [GetCountry('SCO').GetName] після битви при Галідон-Гілл у 1333 році, [GetCountry('FRA').GetAdjectiveWithNoTooltip] двір надав [GetCharacter('sco_david_ii').GetName] притулок у [GetCountry('FRA').GetName]. Хоча намір полягав у тому, щоб [GetCharacter('sco_david_ii').GetNameWithNoTooltip] був у безпеці до закінчення конфлікту в [GetCountry('SCO').GetNameWithNoTooltip], він натомість повернувся зі своїми радниками, незважаючи на триваючий конфлікт. Здається, двір [GetCountry('FRA').GetNameWithNoTooltip] більше не цікавиться [GetCountry('SCO').GetAdjectiveWithNoTooltip] справами."
  flavor_fra_sco.109.desc_b: "Втікши з [GetCountry('SCO').GetName] після битви при Галідон-Гілл у 1333 році, [GetCountry('FRA').GetAdjectiveWithNoTooltip] двір надав [GetCharacter('sco_david_ii').GetName] притулок у [GetCountry('FRA').GetName]. Хоча намір полягав у тому, щоб [GetCharacter('sco_david_ii').GetNameWithNoTooltip] був у безпеці до закінчення конфлікту в [GetCountry('SCO').GetNameWithNoTooltip], [GetCharacter('sco_david_ii').GetShortNameWithNoTooltip] натомість повернувся зі своїми радниками, незважаючи на триваючий конфлікт. Після спроб встановити новий мир з [GetCountry('SBL').GetName], [GetCountry('FRA').GetAdjectiveWithNoTooltip] переговорники запропонували [GetCharacter('sco_david_ii').GetNameWithNoTooltip] як заручника, що [GetCountry('SCO').GetAdjectiveWithNoTooltip] делегація відмовилася виконати. У дусі переговорів, [GetCountry('SBL').GetNameWithNoTooltip] дозволив [GetCountry('SCO').GetAdjectiveWithNoTooltip] делегації безпечно повернутися до [ROOT.GetCountry.GetCapital.GetName], незважаючи на триваючий конфлікт."
  flavor_fra_sco.109.a: "здається, Старий союз тепер недійсний"
  flavor_fra_sco.109.b: "Як сміють [GetCountry('FRA').GetAdjectiveWithNoTooltip] використовувати нашого Короля як розмінну монету!"
  flavor_fra_sco.110.title: "[GetCountry('SBL').GetGovernment.GetRuler.GetNameWithNoTooltip] перемагає в [GetCountry('SCO').GetNameWithNoTooltip]"
  flavor_fra_sco.110.a: "Ми повинні шукати союзу з [GetCountry('SBL').GetGovernment.GetRuler.GetNameWithNoTooltip]"
  flavor_fra_sco.110.desc: "Наша підтримка повстання [GetCountry('SBL').GetGovernment.GetRuler.GetName] у [GetCountry('SCO').GetName] призвела до їхньої перемоги. Ми раніше обіцяли підтримати їх і утворити союз, якщо вони досягнуть успіху в боротьбі."
  flavor_fra_sco.111.title: "[GetCountry('SBL').GetGovernment.GetRuler.GetShortNameWithNoTooltip] перемагає!"
  flavor_fra_sco.111.a: "[GetCountry('FRA').GetNameWithNoTooltip] буде цінним союзником у майбутньому"
  flavor_fra_sco.111.desc: "Перемога [GetCountry('SBL').GetGovernment.GetRuler.GetName] у [GetCountry('SCO').GetAdjective] громадянській війні нарешті знову об'єднала королівство. Після закінчення війни двір [GetCountry('FRA').GetName] запросив офіційно укласти з нами союз, прагнучи вшанувати свої попередні зобов'язання, якщо ми вийдемо переможцями."
  lord_balliol_recieves_david_ii_tt: "[david_ii_bruce.GetNameWithNoTooltip] та його радники перейдуть під опіку Баліола в надії схилити лорда Баліола на нашу справу"
  fra_grant_sco_large_levy_tt: "[GetCountry('SCO').GetNameWithNoTooltip] отримає армію, що складається з 2500 феодальних ополченців у своїй столиці"
  fra_grant_sco_footmen_regiments_tt: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] отримає армію, що складається з 1000 піхотних одиниць у своїй столиці"
  fra_one_french_advisors_for_david_tt: "Держава надасть добре навченого [GetCountry('FRA').GetAdjectiveWithNoTooltip] радника, щоб приєднатися до [david_ii_bruce.GetNameWithNoTooltip] при дворі в [GetCountry('SCO').GetNameWithNoTooltip]"
  fra_two_french_advisors_for_david_tt: "Держава надасть двох добре навчених [GetCountry('FRA').GetAdjectiveWithNoTooltip] радників, щоб приєднатися до [david_ii_bruce.GetNameWithNoTooltip] при дворі в [GetCountry('SCO').GetNameWithNoTooltip]"
  fra_three_french_advisors_for_david_tt: "Держава надасть трьох добре навчених [GetCountry('FRA').GetAdjectiveWithNoTooltip] радників, щоб приєднатися до [david_ii_bruce.GetNameWithNoTooltip] при дворі в [GetCountry('SCO').GetNameWithNoTooltip]"
  sco_fra_court_education_of_david_II_tt: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] двір забезпечить [david_ii_bruce.GetNameWithNoTooltip] міцною освітою!"
  sco_will_be_angry_for_using_david_tt: "Якщо Баліол відмовиться, [GetCountry('SCO').GetAdjectiveWithNoTooltip] двір буде дуже розгніваний тим, що ми намагалися використати їхнього Короля як розмінну монету"