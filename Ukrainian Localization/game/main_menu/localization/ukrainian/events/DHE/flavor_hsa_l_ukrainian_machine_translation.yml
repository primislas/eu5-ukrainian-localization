l_english:
  flavor_hsa.1.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hsa.1.desc: "Купець [target_character.GetName], який раніше працював у [ShowLocationName('london')] як член Ганзейської ліги, повернувся до [ShowLocationName('gdansk')]. Він має одружитися з Христиною Крюгер, донькою престижного громадянина Данцига, і зараз шукає нову нагоду."
  flavor_hsa.1.a: "Найняти його"
  flavor_hsa.1.b: "Ігнорувати його"
  flavor_hsa.2.title: "Технологія суднобудування"
  flavor_hsa.2.desc: "Ми, Ганза, продаємо кораблі по всій Європі, включно з Італією, і контролюємо більшу частину ринку суднобудування, головним чином у Любеку та Данцигу. Голландія хоче сприяти Брюгге як величезному ринку товарів наприкінці торгового шляху і починає ставати нашим конкурентом у суднобудуванні. Чи варто нам зупинити потік технологій суднобудування з ганзейських міст до Голландії?"
  flavor_hsa.2.a: "Зупинити потік технологій суднобудування!"
  STATIC_MODIFIER_NAME_hsa_stop_shipbuilding_technology: "Припинити поширення технологій суднобудування"
  STATIC_MODIFIER_DESC_hsa_stop_shipbuilding_technology: "Нідерланди стали конкурентом Ганзи, і тому Ганза припинила поширення своїх технологій суднобудування."
  flavor_hsa.2.b: "Поширювати технології суднобудування"
  STATIC_MODIFIER_NAME_hsa_spread_shipbuilding_technology: "Поширювати технології суднобудування"
  STATIC_MODIFIER_DESC_hsa_spread_shipbuilding_technology: "Ганза погодилася поширювати свої технології суднобудування, хоча Голландія стала її конкурентом."
  flavor_hsa.3.title: "Тагфарт"
  flavor_hsa.3.desc: "Коли проголошується новий правитель, зазвичай проводиться [ROOT.GetCountry.GetGovernment.GetParliament.GetName], куди запрошуються члени ліги для участі в центральному засіданні. Громади-члени обрали #italic Ratssendeboten#! або посланців, щоб представляти їхній місцевий консенсус щодо питання на [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Цей раунд обговорень виявив деякі проблеми з торгівлею, адміністрацією та нашими військовими зусиллями вдома та за кордоном. Оскільки посланці не змогли дійти висновку щодо того, яку з цих справ ми повинні вирішити, і хоча формування консенсусу на [ROOT.GetCountry.GetGovernment.GetParliament.GetName] має слідувати нижньосаксонській традиції Einung, наш обов'язок вирішити, яку справу вирішити."
  flavor_hsa.3.a: "Зосередитися на справах [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_hsa.3.b: "Подбати про [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], нашу життєву силу."
  flavor_hsa.3.c: "Ми вислухаємо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  flavor_hsa.3.d: "У нас не буде фаворитів!"
  flavor_hsa.4.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hsa.4.desc: "Чиновник Ганзейської ліги з [ShowLocationName('cologne')], [target_character.GetName], був обраний на посаду Синдика в 1556 році. Він став постійним чиновником з юридичною освітою, який працював над захистом та розширенням дипломатичних угод ганзейських міст-членів."
  flavor_hsa.4.a: "Він міг би зробити багато доброго в [ROOT.GetCountry.GetName]"
  flavor_hsa.5.title: "Печатка Ліги"
  flavor_hsa.5.desc: "Союз, під яким діють наші численні купці, процвітає вже деякий час. Бізнес та достаток вільно течуть з наших торгових центрів по всій [ShowContinentName('europe')]. Щоб ще більше зміцнити наш вплив на наш дипломатичний статус, незважаючи на нашу децентралізовану природу, наші члени вирішили бути представленими спільною печаткою, щоб символізувати нашу єдність."
  flavor_hsa.5.a: "Ми приймемо печатку [target_location.GetNameWithNoTooltip]."
  flavor_hsa.5.b: "Купці [target_location2.GetNameWithNoTooltip] представлятимуть нас."
  flavor_hsa.5.c: "А як щодо [target_location3.GetNameWithNoTooltip]?"
  flavor_hsa.6.title: "Паперова фабрика [target_location.GetNameWithNoTooltip]"
  flavor_hsa.6.desc: "Прогрес на континенті дав поштовх до вдосконалення виробничих технік та нових способів отримання прибутку. До наших залів дійшла звістка, що успішний купець на ім'я [target_character.GetName] з [ShowLocationName('nuremberg')] багато років тому почав використовувати новий метод виробництва паперу, застосовуючи деревну масу, старі ганчірки та інші інгредієнти. Ця інновація, безперечно, принесе нам прибуток у довгостроковій перспективі, однак вона вимагає невеликих початкових інвестицій..."
  flavor_hsa.6.desc.a: "Прогрес на континенті дав поштовх до вдосконалення виробничих технік та нових способів отримання прибутку. До наших залів дійшла звістка, що успішний купець з [ShowLocationName('nuremberg')] багато років тому почав використовувати новий метод виробництва паперу, застосовуючи деревну масу, старі ганчірки та інші інгредієнти. Ця інновація, безперечно, принесе нам прибуток у довгостроковій перспективі, однак вона вимагає невеликих початкових інвестицій..."
  flavor_hsa.6.a: "Нехай люди мають [ShowGoodsName('paper')]!"
  flavor_hsa.6.b: "Ми не можемо собі цього дозволити."
  flavor_hsa.7.title: "[target_country.GetAdjectiveWithNoTooltip] Ратуша"
  flavor_hsa.7.desc: "Заснована у XIII столітті, наша [ShowBuildingTypeName('hanseatic_town_hall')] нещодавно зазнала значних оновлень, розширивши свої зали та можливості для проведення нарад та дебатів. З моменту свого розширення вона слугувала як муніципальним центром місцевої адміністрації, так і місцем зустрічей для кількох наших зборів для [ROOT.GetCountry.GetGovernment.GetParliament.GetName].\n\nБудівля стала символом могутності наших купців і, таким чином, наділила нас великими дипломатичними можливостями завдяки нашому статусу та багатству."
  flavor_hsa.7.a: "Ще одна перемога наших дипломатичних зусиль!"
  opinion_diplomacy_with_the_hansa_modifier: "Могутні ганзейські дипломати"
  every_known_country_hansa_tt: "Кожна нейтральна або дружня країна, на землях якої розташована одна з наших будівель (наприклад, [target_country2.GetName]), отримає [ShowBiasValue('opinion_diplomacy_with_the_hansa_modifier')|+=0] думки щодо нас"
  flavor_hsa.7.historical_info: "Розташована в історичному ганзейському місті Любек, Німеччина, ця Ратуша має історію, що сягає XIII століття. Спочатку збудована в період розквіту міста як могутнього члена Ганзейського союзу, Ратуша є прикладом готичної архітектури з її складними кам'яними різьбленнями та скульптурами. Слугуючи резиденцією муніципального управління, вона вміщувала адміністративні офіси, зали ради та зали засідань, відображаючи економічне процвітання та політичну автономію."
  flavor_hsa.8.title: "[GetCharacter('bernt_notke_script').GetNameWithNoTooltip]"
  flavor_hsa.8.desc: "Піднесення [ShowInstitutionName('renaissance')] дало поштовх багатьом новим інноваціям та появі свіжого мистецтва в залах [ShowContinentName('europe')]. Коли течії несуть цю дивовижну нову епоху далі на північ, наш народ потрапив у полон чарівності піонерів, які варіюються від художників до винахідників і навіть запровадження паперових грошей.\n\nМистецтво, зокрема, переживає золотий вік у наших володіннях, про що свідчить наша увага до його належного фінансування та наш підвищений престиж. Це, своєю чергою, породило нових художників, таких як [GetCharacter('bernt_notke_script').GetName], який прагне зробити ім'я для [target_country.GetAdjective] таланту."
  flavor_hsa.8.a: "[GetCharacter('bernt_notke_script').GetSheHe|U] дуже бажаний!"
  flavor_hsa.8.b: "Навіть художники, здається, схильні до жадібності..."
  hsa_bernt_notke_tt: "#italic Залучення [GetCharacter('bernt_notke_script').GetShortNameWithNoTooltip] може призвести до цікавого художнього творіння протягом [GetCharacter('bernt_notke_script').GetHerHis] життя.#!"
  flavor_hsa.9.title: "[GetCharacter('bernt_notke_script').GetNameWithNoTooltip]'s [ShowWorkOfArtNameWithNoTooltip('danse_macabre_art')]"
  flavor_hsa.9.desc: "Добре відомо, що художники, як правило, досить ексцентричні люди. [GetCharacter('bernt_notke_script').GetName] є цінним прикладом цього, демонструючи чудову художню майстерність у зображенні найдепресивнішої теми з усіх; смерті. Воістину, [GetCharacter('bernt_notke_script').GetHerHis] навички закарбовують моторошний танець Смерті, коли він виконує свої обов'язки, без розбору пожинаючи життя всіх, від найвищого Імператора та Папи до найнижчого селянина.\n\nТворіння названо [ShowWorkOfArtName('danse_macabre_art')] і воно охоплює кілька десятків метрів завширшки, що є свідченням душі та таланту художника, викарбуваних у чорнилі..."
  flavor_hsa.9.a: "Ми просто мусимо це мати!"
  flavor_hsa.9.b: "Занадто моторошно для нашого смаку."