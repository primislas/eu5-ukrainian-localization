l_english:
  flavor_sca.1.title: "Об'єднання [ShowRegionNameWithNoTooltip('scandinavian_region')]"
  flavor_sca.1.desc: "Вперше в історії усі королівства [ShowRegionName('scandinavian_region')] об'єдналися під владою єдиного суверена. Це монументальне об'єднання знаменує нову еру в нашій історії, утверджуючи нас як грізну велику державу на європейській арені. З консолідацією цих північних володінь ми не лише об'єднали наш культурний та політичний вплив, але й зміцнили нашу позицію в міжнародних справах."
  flavor_sca.1.a: "Тріумфальний успіх!"
  flavor_sca.1.historical_info: "Історично, об'єднання Скандинавії в єдине, централізоване королівство ніколи не було повністю реалізовано. Хоча різні унії між королівствами, такі як Кальмарська унія наприкінці XIV та на початку XV століть, та зусилля Шведської імперії у XVII столітті, являли собою значні спроби консолідувати скандинавську владу під єдиним правлінням, вони зрештою були недовговічними або неефективними."