l_english:
  flavor_wls.10.title: "Ейстедвод у [target_location.GetNameWithNoTooltip]"
  flavor_wls.10.desc: "Ейстедвод — це [target_location.GetDominantCulture.GetName] культурний фестиваль стародавнього походження, популярне змагання, де барди та менестрелі демонструють дивовижні музичні та поетичні здібності. Цього року фестиваль має відбутися в [target_location.GetName].\n\nХоча фестиваль є святом [target_location.GetDominantCulture.GetNameWithNoTooltip] мистецтва та культури, ми побоюємося, що він може розпалити анти-[ROOT.GetCountry.GetCulture.GetName] настрої та послабити наш контроль над [target_location.GetProvince.GetName].\n\nХоча ми могли б просто ігнорувати фестиваль як звичайний сільський ярмарок, ми також могли б приглушити політичні послання, забезпечивши виступ лише ліцензованих бардів (які співають схвалені пісні).\n\nМи, звичайно, також могли б розігнати цей сільський безлад за допомогою загону озброєних головорізів."
  flavor_wls.10.a: "Надати організаторам повну свободу дій."
  flavor_wls.10.b: "Ліцензувати бардів."
  flavor_wls.10.c: "Припинити цей безглуздий захід."
  flavor_wls.11.title: "Овайн Гліндур"
  flavor_wls.11.desc: "Винятково обдарований валлієць, нащадок дозавойовницької місцевої королівської династії [mathrafal_dynasty.GetName], став дещо обговорюваною особою в місті. Демонструючи талант до лідерства та натхнення, він одного дня може звільнити нас від кайданів нашого сюзерена."
  flavor_wls.11.desc_subject: "Винятково обдарований валлієць, нащадок дозавойовницької місцевої королівської династії [mathrafal_dynasty.GetName], став дещо обговорюваною особою в місті. Демонструючи талант до лідерства та натхнення, він одного дня може спричинити проблеми між нашими [GetCountry('ENG').GetAdjective] братами та [GetCountry('WLS').GetAdjective] народом."
  flavor_wls.11.a: "Вільний дух не потребує керівництва."
  flavor_wls.11.tt1: "[owain_glyndwr.GetNameWithNoTooltip] додається як персонаж і обирає свій власний шлях"
  flavor_wls.11.b: "Спонсорувати кар'єру в юриспруденції."
  flavor_wls.11.tt2: "[owain_glyndwr.GetNameWithNoTooltip] додається як персонаж і вивчає право"
  flavor_wls.11.c: "Зарахувати його на військову службу."
  flavor_wls.11.tt3: "[owain_glyndwr.GetNameWithNoTooltip] додається як персонаж і стає зброєносцем [GetCountry('ENG').GetGovernment.GetRuler.GetName]"
  flavor_wls.12.title: "Звернутися до [GetCountry('ENG').GetGovernment.GetRulerTitle]"
  flavor_wls.12.desc: "Видатний [owain_glyndwr.GetName] нещодавно втратив частину своїх земель, захоплених сусіднім [GetCountry('ENG').GetAdjective] бароном. Крім того, він також стверджує, що був дезінформований щодо виклику для збору феодальних військ для прикордонної служби [GetCountry('SCO').GetAdjective] і був названий зрадником [GetCountry('ENG').GetAdjectiveWithNoTooltip] судами.\n\nЩоб врегулювати суперечку, він бажає звернутися безпосередньо до [GetCountry('ENG').GetGovernment.GetRuler.GetName] з [GetCountry('ENG').GetNameWithNoTooltip]."
  flavor_wls.12.a: "Відправити листа."
  flavor_wls.12.tt: "[GetCountry('ENG').GetName] отримає листа, що містить особисте прохання про справедливість."
  flavor_wls.12.b: "Компенсувати йому за його клопоти."
  flavor_wls.13.title: "В аудієнції відмовлено"
  flavor_wls.13.desc: "[GetCountry('ENG').GetAdjective] [GetCountry('ENG').GetGovernment.GetRulerTitle] відхилив прохання про зустріч з [owain_glyndwr.GetName] для врегулювання територіальної суперечки та питання наклепу на його честь. Таким чином, рішення судів залишається в силі, залишаючи його вразливим до подальших репресій.\n\nВражений таким ставленням, Овайн оголосив себе «Принцом Уельським» і піднімає повстання, намагаючись повалити [GetCountry('ENG').GetAdjectiveWithNoTooltip] правління."
  owain_glyndar_rebels: "Повстання Гліндура"
  flavor_wls.13.a: "Роздавити зрадника!"
  flavor_wls.13.tt1: "[owain_glyndwr.GetName] розпочне [ShowCultureName('welsh')] [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти нас. Будь-які [Concept('disloyal_subjects', 'CONCEPT_PLACEHOLDER')|e] приєднаються до нього. Якщо вони переможуть, [owain_glyndwr.GetShortNameWithNoTooltip] стане незалежним."
  flavor_wls.13.b: "Приєднатися до справи!"
  flavor_wls.13.tt2: "[owain_glyndwr.GetName] розпочне [ShowCultureName('welsh')] [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e], і ми приєднаємося до неї! Будь-які [Concept('loyal_subjects', 'CONCEPT_PLACEHOLDER')|e] підуть за нами. Якщо ми переможемо, ми станемо незалежними."
  flavor_wls.14.title: "Земля та честь відновлені"
  flavor_wls.14.desc: "[GetCountry('ENG').GetAdjective] [GetCountry('ENG').GetGovernment.GetRulerTitle] скасував судове рішення [owain_glyndwr.GetName], щоб врегулювати територіальну суперечку та питання наклепу на його честь."
  flavor_wls.14.a: "Ми пробачимо, але не забудемо."
  flavor_wls.14.tt: "[owain_glyndwr.GetNameWithNoTooltip] бачить відновлення своїх статків"
  flavor_wls.15.title: "[GetCountry('ENG').GetAdjectiveWithNoTooltip] шляхтич захоплений"
  flavor_wls.15.desc: "Шляхтич і полководець на ім'я [edmund_mortimer.GetName] був нещодавно захоплений у прикордонній сутичці, і [GetCountry('ENG').GetGovernment.GetRulerTitle] [GetCountry('ENG').GetName] відмовився надати кошти, необхідні для забезпечення його свободи.\n\nРодина [percy_dynasty.GetName] з [northumberland.GetName] та родина [mortimer_dynasty.GetName] з [shropshire.GetName] звернулися до нас із пропозицією, яка звільнила б [edmund_mortimer.GetNameWithNoTooltip] з полону, розділивши [GetCountry('ENG').GetNameWithNoTooltip] між собою, при цьому [ROOT.GetCountry.GetName] отримала б кілька західних провінцій."
  flavor_wls.15.desc_ransom_paid: "Нещодавня прикордонна сутичка призвела до захоплення [GetCountry('ENG').GetAdjective] генерала та шляхтича, відомого як [edmund_mortimer.GetName].\n#NL![GetCountry('ENG').GetNameWithNoTooltip] погодилася заплатити викуп за його негайне повернення."
  flavor_wls.15.a: "Погодитися на умови."
  flavor_wls.15.tt1: "Повстанці завдадуть удару, щойно ми оголосимо війну [GetCountry('ENG').GetNameWithNoTooltip]"
  flavor_wls.15.tt2: "Повстанці завдадуть удару миттєво"
  flavor_wls.15.b: "Погодитися на умови та запропонувати додаткову монету."
  flavor_wls.15.tt3: "Повстанці завдадуть удару, щойно ми оголосимо війну [GetCountry('ENG').GetNameWithNoTooltip], і з більшою ймовірністю дотримаються угоди"
  flavor_wls.15.tt4: "Повстанці завдадуть удару миттєво, і з більшою ймовірністю дотримаються угоди"
  flavor_wls.15.c: "Їм не можна довіряти."
  flavor_wls.15.tt5: "Шляхтичам буде відмовлено"
  flavor_wls.15.d: "Звільнити його."
  flavor_wls.15.tt6: "[edmund_mortimer.GetNameWithNoTooltip] буде звільнений"
  flavor_wls.16.title: "Доповідь шпигуна"
  flavor_wls.16.desc_england_success: "Родина [dishonorable_dynasty.GetName] похвалила [GetCountry('ENG').GetGovernment.GetRuler.GetName] за прояв щедрості та погодилася скласти зброю. Наші шпигуни підтверджують розпуск їхніх армій."
  flavor_wls.16.desc_england_failure: "Родина [dishonorable_dynasty.GetName] відмовилася від спроби підкупу з боку [GetCountry('ENG').GetGovernment.GetRuler.GetName]. Подальше кровопролиття здається неминучим."
  flavor_wls.16.desc: "Наші шпигуни повідомляють, що [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetRulerTitle] шукав угоди з родиною [dishonorable_dynasty.GetName], яка погодилася скласти зброю. Нам радять діяти швидко, якщо ми хочемо досягти успіху."
  flavor_wls.16.a: "Зрадницькі пси."
  flavor_wls.16.tt1: "Повстанці [dishonorable_dynasty.GetNameWithNoTooltip] розпустяться"
  flavor_wls.16.b: "Як і очікувалося."
  flavor_wls.16.c: "Варто було спробувати."
  flavor_wls.16.tt2: "Повстанці залишаються вірними [owain_glyndwr.GetName]"