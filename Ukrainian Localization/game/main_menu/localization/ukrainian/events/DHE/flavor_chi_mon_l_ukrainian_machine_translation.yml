l_english:
  flavor_chi_mon.1.title: "Перемога при [target_location.GetNameWithNoTooltip]"
  flavor_chi_mon.1.desc: "Славні вісті прибули до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName]. Ми не лише здобули перемогу в битві при [target_location.GetName], як і очікували, але наша перемога була настільки абсолютною, що нам вдалося захопити [captured_emperor.GetName], лідера, що стояв на чолі [GetInternationalOrganizationType('middle_kingdom').GetName]. Якщо ми скористаємося нашою перевагою, то зможемо отримати великі поступки від [target_war.GetName]."
  flavor_chi_mon.1.a: "Скористатися нашою перевагою."
  flavor_chi_mon.1.b: "Запропонувати [target_country.GetNameWithNoTooltip] викуп за [captured_emperor.GetNameWithNoTooltip]."
  mon_pushing_advantage: "[ShowModifier('chi_tumu_crisis_benefit')] триватиме, доки [captured_emperor.GetName] залишається ув'язненим у [ROOT.GetCountry.GetName] і живим.\nЯкщо ми захопимо [location_for_capture.GetName], ми отримаємо такі переваги:"
  mon_offer_ransom: "Запропонувати [target_country.GetName] викуп за [captured_emperor.GetName] вартістю [SCOPE.GetLocalVariable('ransom_value')|=+]"
  flavor_chi_mon.2.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] захоплений!"
  flavor_chi_mon.2.desc: "Битва при [target_location.GetName] обернулася катастрофічною поразкою для наших військ. Гірше того, [captured_emperor.GetName], наш улюблений [ROOT.GetCountry.GetGovernment.GetRulerTitle], був захоплений посеред [capturing_country.GetAdjective] розгрому, зануривши наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] у паніку. Невідомо, хто очолить [GetInternationalOrganizationType('middle_kingdom').GetName] відтепер."
  flavor_chi_mon.2.a: "Зберегти статус-кво."
  flavor_chi_mon.2.b: "[sibling_candidate.GetSisterBrother] [captured_emperor.GetNameWithNoTooltip] може правити [ROOT.GetCountry.GetFlavorRank]."
  flavor_chi_mon.2.c: "Дитина [ROOT.GetCountry.GetGovernment.GetRulerTitle] ідеальна."
  flavor_chi_mon.2.d: "[dynasty_candidate.GetNameWithNoTooltip] — ідеальний варіант."
  chi_recapture_emperor_tt: "[captured_emperor.GetName] має бути відвойований за допомогою [ShowPeaceTreatyTypeName('chi_recapture_emperor')] [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]. Якщо [captured_emperor.GetName] помре в полоні, ми отримаємо такі штрафи:"
  flavor_chi_mon.3.title: "[target.GetNameWithNoTooltip] помирає у в'язниці"
  flavor_chi_mon.3.desc: "Наш найбільший актив, [target.GetName], колишній правитель [target_country.GetName], загинув у нашому полоні. Ми справді втратили великого [target.GetManWoman], який назавжди залишиться в пам'яті як наш квиток до величі."
  flavor_chi_mon.3.a: "Прокляття!"
  flavor_chi_mon.4.title: "Смерть [target.GetNameWithNoTooltip]"
  flavor_chi_mon.4.desc: "[ROOT.GetCountry.GetName] щойно спіткало лихо. Наш улюблений правитель, [target.GetSonDaughter] неба, [target.GetName], як повідомляється, помер у полоні [target.GetOwner.GetAdjective] негідників. Трагічно, що [target.GetShortNameWithNoTooltip] так і не дожив до того, щоб бути відвойованим і повернутим до [target.GetHerHis] дорогоцінної країни."
  flavor_chi_mon.4.a: "[target.GetShortNameWithNoTooltip] не був гідний такої смерті."
  flavor_chi_mon.5.title: "Пропозиція викупу"
  flavor_chi_mon.5.desc: "На диво, негідники в [capturing_country.GetName] зробили нам пропозицію викупу. Велика сума золота за безпечне повернення нашого улюбленого полоненого [captured_emperor.GetName]. Ми також повинні визнати, що, хоча ми вважаємо [captured_emperor.GetHerHis] життя безцінним, нам приємно знати, що наші вороги так недооцінюють його."
  flavor_chi_mon.5.a: "Прийняти пропозицію."
  flavor_chi_mon.5.b: "Це пастка! Не надсилати відповіді."
  flavor_chi_mon.6.title: "Захоплення [target_location.GetNameWithNoTooltip]"
  flavor_chi_mon.6.desc: "[target_location.GetRank.GetName] [target_location.GetName] нарешті потрапив до наших рук. Деморалізований гарнізон не витримав натиску [ROOT.GetCountry.GetAdjective] сил і поступився контролем над нашою ціллю. Більше того, їхній [target_character.GetName] все ще залишається під нашою опікою, занурюючи [target_location.GetOwner.GetAdjective] [target_location.GetOwner.GetGovernment.GetCourtTitle] у паніку."
  flavor_chi_mon.6.a: "Це увійде в історію."
  flavor_chi_mon.7.title: "Повернення [target_emperor.GetNameWithNoTooltip]"
  flavor_chi_mon.7.desc: "[target_emperor.GetName], колишній правитель [ROOT.GetCountry.GetName], нарешті повернувся до [ROOT.GetCountry.GetFlavorRank]. Бувши тепло прийнятим громадянами [ROOT.GetCountry.GetCapital.GetName], не всі задоволені [target_emperor.GetHerHis] поверненням. У [ROOT.GetCountry.GetGovernment.GetCourtTitle] сформувалися фракції, деякі з яких віддають перевагу тому, щоб [target_emperor.GetNameWithNoTooltip] зрікся престолу."
  flavor_chi_mon.7.a: "Законний правитель повернувся."
  flavor_chi_mon.7.b: "[ROOT.GetCountry.GetGovernment.GetRulerOrHeirIfRegent.GetNameWithNoTooltip] має правити замість нього."