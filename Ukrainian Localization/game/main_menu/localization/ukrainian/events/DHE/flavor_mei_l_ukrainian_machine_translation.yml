l_english:
  flavor_mei.1.title: "Срібна лихоманка у [ShowLocationNameWithNoTooltip('freiberg')]"
  flavor_mei.1.desc: "Новознайдені поклади [ShowGoodsName('silver')] спричинили справжню бурю переселення людей в район навколо [ShowLocationName('freiberg')], які намагаються отримати прибуток від процвітаючої гірничої промисловості в [ShowProvinceDefinitionName('erzgebirge_province')]. Зростання інтересу до наших гірничих міст може бути лише нашою перевагою."
  flavor_mei.1.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mei.1.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з гірничою [Concept('raw_material', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowModifier('freiberger_berggeschrey')]."
  STATIC_MODIFIER_NAME_freiberger_berggeschrey: "Фрайберзький Берґґешрай"
  flavor_mei.2.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.2.desc: "Талановитий драматург і поет, [target_character.GetName] вирішив обрати нашу країну як [target_character.GetHerHis] резиденцію і продовжити свої літературні зусилля з наших земель. [target_character.GetSheHe|U] вже є досвідченим письменником, але не виявляє ознак зупинки."
  flavor_mei.2.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mei.2.b: "Йому краще поїхати до [target_banish_country.GetNameWithNoTooltip]."
  flavor_mei.10.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.10.desc: "[target_character.GetName], доброчесний композитор з [ShowLocationName('eisenach')], а нині мешканець [ShowLocationName('leipzig')], скаржився на високу вартість життя в [ShowLocationNameWithNoTooltip('leipzig')] та низьку зарплату, яку [target_character.GetSheHe] отримує як #italic Thomaskantor#!. [target_character.GetSheHe|U] також висловив [target_character.GetHerHis] бажання стати придворним музикантом у нашій столиці."
  flavor_mei.10.a: "Привести [target_character.GetHerHim] до двору."
  flavor_mei.10.b: "Нам не потрібен [target_character.GetHerHim]."
  flavor_mei.10.historical_info: "Йоганн Себастьян Бах був композитором епохи бароко та найвідомішим членом великої родини північнонімецьких музикантів. Хоча сучасники захоплювалися ним насамперед як видатним клавесиністом, органістом та експертом з будівництва органів, Бах нині загальновизнаний одним із найвеличніших композиторів усіх часів."
  flavor_mei.20.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.20.desc: "Як близький друг Лютера, [target_character.GetName] палко прийняв [ShowReligionName('lutheran')], але завжди був відкритий до співпраці з [ShowReligionName('catholic')] меценатами.\n\nЯк придворний художник, ми задаємося питанням, чи не можуть ці взаємодії з обома сторонами стати для нас проблемою. По всьому континенту [ShowReligionNameWithNoTooltip('lutheran')] та [ShowReligionNameWithNoTooltip('catholic')] борються один з одним у кривавому конфлікті, який може вплинути на нас."
  flavor_mei.20.a: "Ми всі брати у Христі."
  flavor_mei.20.b: "[target_character.GetSheHe|U] повинен зосередитися на одній вірі."
  flavor_mei.20.historical_info: "Лукас Кранах #italic Старший#!, відомий своїми винятковими художніми талантами, був німецьким художником епохи Відродження та гравером, що спеціалізувався на гравюрі на дереві та міді. Він був придворним художником курфюрстів Саксонії та відомий тим, що втілював сутність німецьких князів та видатних лідерів Протестантської Реформації.\n\nВін також був близьким довіреним Мартіна Лютера, справу якого він пристрасно підтримував. Хоча його сюжети варіювалися від релігійних тем у католицькій традиції до інноваційних зображень лютеранських релігійних питань, він послідовно включав міфологічні та релігійні оголені фігури у свої захоплюючі твори мистецтва.\n\nЙого велика майстерня створила численні версії його шедеврів, і навіть після його смерті його син Лукас Кранах Молодший та інші продовжували відтворювати його блискучі роботи, зміцнюючи його спадщину як одного з найвпливовіших та найвидатніших німецьких художників свого часу."
  flavor_mei.30.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.30.desc: "[target_character.GetName] прожив насичене життя, будучи математиком, філософом, вченим і дипломатом. [target_character.GetSheHe|U] сяяв у кожній з цих галузей і став гордістю нації.\n\nНа жаль, [target_character.GetHerHis] характер, допитливий і завжди шукаючий нових викликів, робить [target_character.GetHerHim] майже кочівником, що постійно пересувається по всій Німеччині. Якщо ми хочемо зберегти [target_character.GetHerHis] геній, нам потрібно буде фінансувати [target_character.GetHerHis] роботу і тримати [target_character.GetHerHim] у нашій нації."
  flavor_mei.30.a: "Фінансувати [target_character.GetHerHis] роботу."
  flavor_mei.30.b: "Наша скарбниця повинна бути використана для інших речей."
  flavor_mei.30.historical_info: "Готфрід Вільгельм Лейбніц, блискучий ерудит 17-го та 18-го століть, зробив значний внесок у різні галузі знань, включаючи математику, філософію та науку. Відомий своєю новаторською роботою в обчисленні, він самостійно розробив принципи диференціального та інтегрального числення, заклавши основи сучасної математики. Лейбніц також заглибився в метафізику, запропонувавши концепцію монад та виступаючи за ідею заздалегідь встановленої гармонії у всесвіті."
  flavor_mei.40.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.40.desc: "[target_character.GetName] — відомий мандрівний хірург, що пропонував [target_character.GetHerHis] послуги в [ShowAreaName('upper_saxony_area')], [ShowAreaName('bohemia_area')] та [ShowAreaName('silesia_area')].\n#NL![target_character.GetHerHis|U] навички, безсумнівно, вражають, але [target_character.GetSheHe] також відомий тим, що вірить у магію, яку [target_character.GetSheHe] вважає пов'язаною з медициною, і це може стати причиною скандалу."
  flavor_mei.40.a: "Зробити [target_character.GetHerHim] нашим придворним окулістом."
  flavor_mei.40.b: "[target_character.GetSheHe|U] вірить у дивні речі, і [target_character.GetSheHe] не повинен наближатися до нашого правителя."
  flavor_mei.40.historical_info: "Георг Бартіш, видатний німецький лікар і хірург, відомий своїм значним внеском в офтальмологію. У XVI столітті він написав одну з найперших всеосяжних книг про хвороби очей та їх лікування під назвою «Ophthalmodouleia», яка стала знаковою працею в цій галузі. Новаторські спостереження Бартіша та інноваційні хірургічні методики сприяли розумінню та догляду за різними очними захворюваннями, залишивши тривалий вплив на розвиток офтальмології як медичної дисципліни."
  flavor_mei.50.title: "Піднесення [ShowLocationNameWithNoTooltip('dresden')]"
  flavor_mei.50.desc: "З незначного поселення [ShowLocationName('dresden')] повільно, але неухильно зростало з моменту отримання права складу в 1455 році.\n\nЙого розташування на річці Ельба робить його цікавим місцем для торгівлі, і воно знаходиться близько до багатих шахт в Рудних горах. Дехто задається питанням, чи не може це бути гарною нагодою для будівництва нової столиці."
  flavor_mei.50.a: "[ShowLocationNameWithNoTooltip('dresden')] буде нашою новою столицею."
  flavor_mei.50.b: "[ShowLocationNameWithNoTooltip('dresden')] стало достатньо важливим!"
  flavor_mei.50.historical_info: "Хоча Дрезден не був важливим містом, доки його не зробили герцогською резиденцією саксонських правителів у 1485 році, він став центром культури та одним з найважливіших міст Священної Римської імперії."
  flavor_mei.60.title: "Різдвяний подарунок"
  flavor_mei.60.desc: "Щороку місто [ShowLocationName('dresden')] святкує Різдвяний ярмарок під назвою #italic Dresden Striezelmarkt#!, де мешканці та люди з сусідніх міст збираються, щоб купити або продати різні види товарів. Цей ярмарок святкується з 1434 року, коли міській раді було видано привілей.\n\nХоча ринок є прибутковим, цьогорічні прибутки виявилися вищими, ніж очікувалося, і міська рада вирішила подарувати нам частину прибутків, отриманих від зборів. Наші радники обговорюють, що нам робити з цими грошима."
  flavor_mei.60.a: "Більше грошей завжди вітається."
  flavor_mei.60.b: "Ми повинні реінвестувати ці гроші в [ShowLocationNameWithNoTooltip('dresden')]."
  flavor_mei.60.historical_info: "Дрезденський Штріцельмаркт — найстаріший задокументований різдвяний ринок у Німеччині та одна з центральних атракцій міста Дрезден."
  flavor_mei.70.title: "Вимоги щодо нової #italic Фрауенкірхе#!"
  flavor_mei.70.desc: "Громадяни [ShowLocationName('dresden')], хоча й загалом лояльні піддані, останнім часом були схвильовані. Вони переважно сповідують іншу віру, ніж наша, і вимагають мати власний храм для сповідування своєї релігії, як вони вважають за потрібне.\n\nДля цього вони готові знести церкву #italic Фрауенкірхе#! і відбудувати її у своєму стилі. Хоча вони готові платити за це, ми підозрюємо, що це спричинить нові витрати, не кажучи вже про створення прецеденту, який може стати для нас проблематичним."
  flavor_mei.70.a: "Дозволити їм знести церкву і відбудувати її у своїй вірі."
  flavor_mei.70.b: "Вони повинні навернутися натомість."
  flavor_mei.70.historical_info: "У дореформаційну епоху Фрауенкірхе служила резиденцією архіпресвітера в Мейсенській єпархії. Однак з приходом Реформації вона перетворилася на протестантську церкву. Оригінальна Фрауенкірхе була знесена в 1727 році, щоб звільнити місце для грандіознішої заміни зі збільшеною місткістю. Громадяни взяли на себе відповідальність за її відбудову як лютеранської парафіяльної церкви, отримавши несподівану підтримку від курфюрста Саксонії Фрідріха Августа I, який навернувся в католицизм, щоб стати королем Польщі. Його підтримка не тільки прикрасила горизонт Дрездена вражаючим куполом, але й запевнила народ Саксонії, що їх не примушуватимуть до принципу #italic cuius regio, eius religio#!."
  flavor_mei.80.title: "Страждання молодого Вертера"
  flavor_mei.80.desc: "Молодий письменник на ім'я [target_character.GetName] став знаменитістю в літературних колах після публікації [target_character.GetHerHis] твору #italic «Страждання молодого Вертера»#!. Цей роман критикували деякі за реакцію, яку мали деякі читачі після його прочитання. Намагаючись наслідувати головного героя роману та його трагічне нерозділене кохання, кілька людей покінчили життя самогубством так само, як і він. З літературної точки зору, роман, безперечно, є чудовим твором, але вплив, який він має на вразливих людей, може бути небезпечним."
  flavor_mei.80.a: "Привести [target_character.GetHerHim] до нашого двору, незважаючи ні на що."
  flavor_mei.80.b: "[target_character.GetSheHe|U] має погану репутацію, він нам не потрібен."
  flavor_mei.80.historical_info: "«Страждання молодого Вертера» Гете — роман, що зображує інтенсивні емоції та трагічну долю свого головного героя, Вертера. Опублікований у 1774 році, він став літературною сенсацією, надихнувши культурний феномен, відомий як #italic «Ефект Вертера»#!. Цей термін стосується сплеску самогубств та імітаційної поведінки, викликаних романтичним зображенням саморуйнівного кохання в романі. Глибокий вплив книги на емоції та дії читачів викликав дискусії про відповідальність мистецтва та літератури в суспільстві."
  flavor_mei.90.title: "Трагедія Фауста"
  flavor_mei.90.desc: "Протягом останніх місяців наш придворний художник [target_character.GetName] працював над п'єсою, натхненною легендою про Йоганна Георга Фауста.\n\n$faust_desc$"
  flavor_mei.90.a: "Яка чудова п'єса!"
  flavor_mei.90.historical_info: "#italic Фауст#! Йоганна Вольфганга фон Ґете — відома трагічна п'єса у двох частинах: #italic Фауст, Частина перша#! та #italic Фауст, Частина друга#!. Найраніші версії, відомі як #italic Урфауст#!, були створені між 1772 і 1775 роками, але точний розвиток залишається незрозумілим. #italic Урфауст#! складається з двадцяти двох сцен, що поєднують прозу та римовані вірші. Хоча оригінальний рукопис втрачено, копія з'явилася у 1886 році.\n\nУ 1790 році вперше надруковано #italic Фауст, Фрагмент#!. Потім Ґете завершив #italic Частину першу#! у 1806 році, після чого її опублікували у 1808 році, а перероблене видання — у 1828–29 роках. #italic Фауст, Частина друга#!, завершена у 1831 році, зосереджується на різноманітних темах, таких як психологія, історія, політика, містичні та філософські питання, що робить її кульмінацією пізніх років Ґете. #italic Частина перша#! та більша частина #italic Частини другої#! написані римованим віршем і займають чільне місце на німецькомовних сценах. Вважаючись magnum opus Ґете та шедевром німецької літератури, #italic Фауст#! сплітає захопливу історію."
  flavor_mei.100.title: "Нова ратуша в Лейпцигу"
  flavor_mei.100.desc: "Міська рада [ShowLocationName('leipzig')] звертається до нас із проханням допомогти у ремонті їхньої Старої ратуші. У XIV столітті наші предки фінансували створення будівлі, де представники міста могли збиратися та керувати ним.\n\nМинуло 200 років з того часу, як цей проєкт був зведений у південній частині центрального ринку [ShowLocationNameWithNoTooltip('leipzig')], і будівля здається занадто малою, щоб задовольнити потреби ради.\n\nНам представили новий проєкт, виконаний у саксонському ренесансному стилі, разом із запрошенням взяти участь у фінансуванні будівлі. Якщо ми внесемо гроші, то братимемо участь у будівництві однієї з найвражаючих ратуш у нашій державі."
  flavor_mei.100.a: "Ми допоможемо з проєктом."
  flavor_mei.100.b: "Їхня будівля, їхні витрати."
  flavor_mei.100.historical_info: "Стара ратуша Лейпцига, розташована в самому серці міста, є історичною та мальовничою будівлею, що датується XVI століттям. Її приголомшлива ренесансна архітектура вирізняється вражаючим фасадом, прикрашеним витонченими скульптурами та декораціями. Ратуша слугувала центром політичної та адміністративної діяльності, а її прекрасна вежа пропонує панорамні краєвиди міста. Сьогодні вона є символом багатої історії та культурної спадщини Лейпцига."
  flavor_mei.110.title: "Цвінґер"
  flavor_mei.110.desc: "Спостерігаючи за пишністю палаців, які збудували деякі правителі по всьому континенту, наш правитель [ROOT.GetCountry.GetGovernment.GetRuler.GetName] замислився над ідеєю розпочати [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] власний проєкт.\n\nЗа деякими вказівками нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] придворний архітектор представив амбітний план створення грандіозного палацово-паркового комплексу з інтер'єрами, які слугуватимуть виставковими галереями та бібліотечними залами. Наш правитель у захваті, але дехто сумнівається, чи варто витрачати гроші на цей величезний проєкт."
  flavor_mei.110.a: "Заради слави!"
  flavor_mei.110.b: "Ще один палац?"
  flavor_mei.110.historical_info: "Цвінґер, палацовий комплекс із садами в Дрездені, Німеччина, є вінцем досягнень епохи бароко. Спроєктований архітектором Маттеусом Даніелем Пеппельманом, він розділяє славу з культовою Фрауенкірхе як один із найвідоміших архітектурних пам'яток Дрездена. Спочатку Цвінґер служив оранжереєю, садом і місцем святкових зібрань під час правління Августа Сильного, а його грандіозні павільйони, галереї, прикрашені скульптурами, та витончені вази демонструють розкіш тієї епохи.\n\nХоча спочатку Цвінґер був задуманий як передній двір для нового замку, який так і не був реалізований, він з часом розвивався, зрештою набувши значення музейного комплексу в XIX столітті, особливо з додаванням Галереї Земпера, що виходить на річку Ельбу.\n\nЗруйнований під час бомбардування Дрездена в 1945 році, Цвінґер зазнав ретельної реконструкції в наступні десятиліття. Сьогодні в ньому розміщуються відома Галерея старих майстрів, Дрезденська колекція порцеляни та Математично-фізичний салон, що відкриває свої двері для відвідувачів і занурює їх у пишність історії та культури."
  flavor_mei.120.title: "Придбання [GetCountry('LDB').GetNameWithNoTooltip]"
  flavor_mei.120.desc: "[target_character.GetName] успадкував [GetCountry('LDB').GetLongName] після [target_character.GetHerHis] шлюбу з [target_spouse.GetName] і хоче продати його нам.\n\nЗемлі [GetCountry('LDB').GetNameWithNoTooltip] належали нам не так давно, і це може бути нагодою повернути їх. Що нам робити?"
  flavor_mei.120.a: "Земля належить нам."
  flavor_mei.120.b: "Її продали не просто так."
  flavor_mei.120.historical_info: "Спочатку маркграфство Ландсберг було землею Веттінів, але в 1291 році його продали дому Асканіїв. У 1347 році герцог Магнус I Брауншвейг-Люнебурзький продав маркграфство, яке він успадкував після шлюбу з Софією Бранденбург-Штендальською, маркграфинею Ландсберзькою, назад маркграфу Фрідріху II Мейсенському, знову об'єднавши землі Веттінів."
  flavor_mei.130.title: "Імперська пропозиція"
  flavor_mei.130.desc: "[GetCountry('SWB').GetName]'s [target_character.GetName] помер без спадкоємців, і [GetCountry('SWB').GetFlavorRank] залишився вакантним.\n\nОскільки це місце не може залишатися незайнятим, нам потрібен новий володар цієї гідності.\n\nСеред кількох кандидатів наші радники запропонували [GetCountry('MEI').GetGovernment.GetRulerTitle] [GetCountry('MEI').GetName] як хороший вибір. Якщо ми вирішимо піднести [GetCountry('MEI').GetGovernment.GetRuler.GetHerHim] до [GetCountry('SWB').GetGovernment.GetRulerTitle], ми можемо отримати нового друга в цьому районі."
  flavor_mei.130.a: "Гарна ідея!"
  flavor_mei.130.b: "Вони не гідні."
  flavor_mei.130.historical_info: "У 1423 році Фрідріх Сварливий, маркграф Мейсенський, придбав герцогство Саксонія-Віттенберг разом з курфюрстською гідністю, що призвело до злиття маркграфства Мейсенського з курфюрством Саксонія, втративши свій статус незалежного князівства."
  flavor_mei.131.title: "Імперська пропозиція"
  flavor_mei.131.desc: "Правитель [GetCountry('SWB').GetLongName] помер без спадкоємців, залишивши [GetCountry('SWB').GetFlavorRank] порожнім. Імператор [target_emperor.GetName] запропонував нам стати новим курфюрстом."
  flavor_mei.131.a: "Ми приймаємо це з честю."
  flavor_mei.131.tt: "Ми станемо Курфюрством Саксонії"
  flavor_mei.140.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.140.desc: "[target_ruler.GetName] виступав за призначення [target_character.GetName], одного з [target_ruler.GetHisHer] найближчих особистих радників, до [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Однак багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] стурбовані, оскільки ходять чутки, що [target_character.GetLastNameWithNoTooltip] володіє більшою владою, ніж [target_ruler.GetNameWithNoTooltip] [target_ruler.GetHerselfHimself], що може дати [target_character.GetLastNameWithNoTooltip] неперевершені дипломатичні важелі та призвести до зловживання владою для здійснення [target_character.GetHisHer] амбіцій."
  flavor_mei.140.a: "Нехай [target_character.GetHisHer] керує нашими справами."
  flavor_mei.140.b: "Ми не можемо дозволити [target_character.GetHimHer] стати сірим кардиналом."
  flavor_mei.140.historical_info: "Генріх фон Брюль був впливовим головним міністром Саксонії та Польщі за часів правління Фрідріха Августа II, також відомого як Август III Польський. Як дипломат і придворний, Брюль ефективно контролював саксонську та польську політику протягом десятиліть, керуючи союзами та державними призначеннями. Йому вдалося настільки централізувати двір під своїм правлінням, що до короля можна було дістатися лише через нього."
  flavor_mei.150.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.150.desc: "[target_character.GetName] здобуває славу завдяки [target_character.GetHisHer] майстерно виготовленим органам, які, як кажуть, мають неперевершену чистоту звучання та здобувають популярність по всій країні. Багато членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловили бажання найняти [target_character.GetLastNameWithNoTooltip], щоб піднести наші церкви та прославити нашу віру, але їм бракує коштів, необхідних для замовлення [target_character.GetHimHer]."
  flavor_mei.150.a: "[target_character.GetHisHer|U] мистецтво возвеличить нашу побожність."
  flavor_mei.150.b: "Ми не можемо дозволити собі таку розкіш."
  flavor_mei.150.historical_info: "Готфрід Зільберманн був одним із найвідоміших майстрів органів епохи бароко. Працюючи переважно в Саксонії, Зільберманн побудував понад 50 органів, відомих своєю тональною яскравістю та механічними інноваціями. Зільберманн удосконалив ранні французькі та німецькі конструкції, поєднавши майстерність з акустичною інженерією. Його органи заслужили захоплення багатьох важливих особистостей, включаючи Йоганна Себастьяна Баха та Фрідріха Великого."
  flavor_mei.160.title: "Заснування Леукореї"
  flavor_mei.160.desc: "Наш регіон давно потребував великої навчальної установи. Деякі представники [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] виступили з пропозицією заснувати [ShowBuildingTypeName('university')] у [target_location.GetName], яка була б присвячена юристам, лікарям та священнослужителям. Вони готові фінансувати її, але не можуть дозволити собі замовити її будівництво самостійно, тому потрібна співпраця з [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_mei.160.a: "Нехай вона сяє знаннями!"
  flavor_mei.160.b: "У нас немає вільних коштів для її підтримки."
  flavor_mei.160.historical_info: "Віттенберзький університет, також відомий як Леукорея, був заснований у 1502 році курфюрстом Саксонії Фрідріхом Мудрим, з королівською хартією, наданою імператором Максиміліаном I. Призначений для підготовки адміністраторів, теологів та юристів для Ернестинського курфюрства, він незабаром став колискою Лютеранської Реформації, особливо після того, як Мартін Лютер був призначений професором у 1508 році, а незабаром за ним пішов Філіп Меланхтон."
  flavor_mei.170.title: "[ShowBuildingTypeNameWithNoTooltip('university')] [ShowLocationNameWithNoTooltip('freiberg')]"
  flavor_mei.170.desc: "Багатство наших гір полягає не лише в руді, а й у знаннях, необхідних для її видобутку. Оскільки традиційні методи видобутку починають хитатися перед викликами глибших шахт і складної геології, [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує переорієнтувати [ShowModifier('freiberg_base')] і замість цього заснувати [ShowBuildingTypeName('university')], яка зосередиться на сучасних промислових методах видобутку та навчатиме наступне покоління інженерів."
  flavor_mei.170.a: "[ShowLocationNameWithNoTooltip('freiberg')] стане кузнею наукового видобутку!"
  flavor_mei.170.b: "Розширимо краще традиційні методи."
  flavor_mei.170.c: "Ми не можемо дозволити собі ні те, ні інше."
  flavor_mei.170.historical_info: "Фрайберзький гірничо-технічний університет, заснований у 1765 році, є найстарішим у світі діючим університетом гірничої справи та металургії. Він був заснований у відповідь на зростаючу складність видобутку в Рудних горах та прагнення Просвітництва замінити традиції емпіричними знаннями. Університет незабаром став зразковою установою для гірничої освіти по всій Європі, а його студенти навіть відкрили два нові елементи – Індій та Германій."
  flavor_mei.180.title: "Централізація карбування"
  flavor_mei.180.desc: "Протягом століть монетний двір [ShowLocationName('freiberg')] був одним із найпрестижніших і найпродуктивніших у нашому [ROOT.GetCountry.GetFlavorRank], перетворюючи [ShowGoodsName('silver')] з [ShowProvinceDefinitionName('erzgebirge_province')] на валюту, що циркулювала по всьому [ROOT.GetCountry.GetFlavorRank]. Однак вимоги сучасної адміністрації та монетарної послідовності спонукали наших радників запропонувати централізацію нашого карбування. Вони пропонують конфіскувати всі монетні двори в [ROOT.GetCountry.GetName] і заснувати єдиний у [ShowLocationName('dresden')], з наглядом за всією нацією."
  flavor_mei.180.a: "Централізувати карбування монет."
  flavor_mei.180.b: "Нехай кожен регіон карбує власні монети."
  flavor_mei.180.historical_info: "У 1556 році курфюрст Саксонії Август закрив довго домінуючий монетний двір Фрайберга та переніс усі операції з карбування до Дрездена після виявлення широкомасштабного псування валюти на регіональних монетних дворах. Заснування монетного двору поблизу його резиденції забезпечило прямий контроль над якістю срібла та фінансовою політикою."
  flavor_mei.190.title: "[ShowLocationNameWithNoTooltip('leipzig')] Дебати"
  flavor_mei.190.desc: "Напружена академічна дискусія розгорнулася в [ShowLocationName('leipzig')] між [target_character.GetName], радикальним теологом і професором з [ShowLocationName('wittenberg')], та відомим схоластом [target_character2.GetName]. Вони обговорюють нові твердження, представлені прихильниками Реформації, такі як те, що влада повинна походити зі Святого Письма, а не з традиції, що [GetUniqueInternationalOrganization('catholic_church').GetName] помилилася в доктрині, і що [GetCountry('PAP').GetGovernment.GetRulerTitle] не володіє верховною владою за божественним правом."
  flavor_mei.190.a: "Ми повинні триматися осторонь."
  flavor_mei.190.b: "Підтримати традиційні погляди [target_character2.GetNameWithNoTooltip]."
  flavor_mei.190.c: "[target_character.GetNameWithNoTooltip] висуває слушні занепокоєння."
  flavor_mei.190.historical_info: "Лейпцизькі дебати 1519 року були академічною суперечкою, що відбулася в Лейпцизькому університеті між Йоганном Екком та Андреасом Карлштадтом. Дебати були ініційовані негативним коментарем Екка щодо 95 тез Лютера і спочатку зосереджувалися на питаннях вільної волі та церковної влади. Незабаром вони розширилися до повноцінного обговорення легітимності Церкви, верховенства Святого Письма над традицією та природи папської влади. Хоча консенсусу не було досягнуто, дебати значно підвищили авторитет реформаторських ідей та прискорили зростаючі теологічні та політичні розбіжності в межах Священної Римської імперії."
  flavor_mei.200.title: "Справедлива винагорода"
  flavor_mei.200.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis|U] величність зять, [son_in_law.GetName] правитель [target_country.GetName], був великою допомогою в недавніх негараздах у [GetCountry('BRA').GetName]. Було б доречно, щоб Імператор щедро винагородив тих, хто добре служить [GetUniqueInternationalOrganization('hre').GetName]."
  flavor_mei.200.a: "Осипати [son_in_law.GetHerHim] багатствами."
  flavor_mei.200.b: "Служіння Імператору – достатня винагорода."
  flavor_mei.200.historical_info: "Фрідріх II з династії Веттінів був вірним союзником імператора Людвіга IV під час його правління. Одружений з дочкою Людвіга Матильдою, він був ключовим союзником у стабілізації Маркграфства Бранденбург після його придбання династією Віттельсбахів. За його працю та постійну підтримку імператорства Віттельсбахів він був винагороджений підтримкою у його зусиллях як у Тюрингії, так і в Мейсені."
  flavor_mei.201.title: "Подарунок від Імператора"
  flavor_mei.201.desc: "[target_emperor.GetName], Імператор [GetUniqueInternationalOrganization('hre').GetName] та тесть нашого правителя [ROOT.GetCountry.GetGovernment.GetRuler.GetName], надіслав щедру винагороду за нашу вірність. [target_emperor.GetSheHe] особливо дякує нам за наші зусилля у стабілізації [GetCountry('BRA').GetName] та нашу підтримку в [target_emperor.GetHerHis] імператорстві."
  flavor_mei.201.a: "Додати це до нашої скарбниці."
  flavor_mei.201.b: "Використаймо це для карбування нової монети, Мейсенського гроша."
  STATIC_MODIFIER_NAME_meissen_groschen: "Мейсенський грош"
  STATIC_MODIFIER_DESC_meissen_groschen: "Нова монета покращує економіку [GetCountry('MEI').GetName], полегшуючи транзакції та згладжуючи переказ капіталу."
  flavor_mei.210.title: "Мануфактура [ShowGoodsNameWithNoTooltip('porcelain')] у [ShowLocationNameWithNoTooltip('meissen')]"
  flavor_mei.210.desc: "[ShowGoodsName('porcelain')] довгий час був головним об'єктом інтересу, з багатьма невдалими спробами відтворити таємне мистецтво його виробництва в його справжній формі. Однак, завдяки численним експериментам наших найкращих вчених та винахідників, ми змогли відтворити перший [ShowGoodsNameWithNoTooltip('porcelain')] [ShowContinentName('europe')]. Щоб захистити цю дорогоцінну інновацію та отримати з неї вигоду, багато хто пропонує заснувати державну мануфактуру в [ShowLocationName('meissen')]."
  flavor_mei.210.a: "Заснувати її!"
  flavor_mei.210.b: "Ми повинні зосередитися на традиційному виробництві."
  flavor_mei.210.historical_info: "Мейсенська порцелянова мануфактура була заснована в 1710 році та фінансована Августом Сильним у замку Альбрехтсбург. Вона була першою в Європі, що виробляла тверду порцеляну, раніше імпортовану лише з Китаю. Ця інновація мала величезний економічний та культурний вплив, перетворивши Саксонію на провідного виробника порцеляни та зміцнивши її престиж по всій Європі."
  flavor_mei.220.title: "Геній [target_character.GetNameWithNoTooltip]"
  flavor_mei.220.desc: "[target_character.GetName] вразив [ROOT.GetCountry.GetFlavorRank] своїми витонченими та майстерними творіннями, такими як складне золотарство, що поєднує мистецтво з технічною точністю. Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] пропонує надати [target_character.GetHimHer] заступництво, оскільки вони вірять, що за належного фінансування [target_character.GetLastNameWithNoTooltip] значно підвищить наш культурний престиж."
  flavor_mei.220.a: "Запропонувати [target_character.GetHimHer] заступництво."
  flavor_mei.220.b: "[target_character.GetHisHer|U] послуги були б занадто дорогими."
  flavor_mei.220.historical_info: "Йоганн Мельхіор Дінґлінґер був одним із найвидатніших золотарів свого часу. Його розкішні роботи, часто інкрустовані тисячами дорогоцінних каменів, були символами саксонської придворної пишноти. Його часто замовляв Август Сильний, і він значно сприяв естетиці барокової Саксонії."
  flavor_mei.230.title: "Теорія нептунізму"
  flavor_mei.230.desc: "У Гірничій академії [ShowLocationName('freiberg')] професор [target_character.GetName] представив революційну теорію геологічного формування, яку [target_character.GetSheHe] називає нептунізмом. За [target_character.GetHimHer] словами, усі породи колись випали з первісного океану через процес кристалізації. Хоча [target_character.GetHisHer] лекції приваблюють багатьох людей, чимало критиків відкидають [target_character.GetHimHer] ідеї, які дедалі більше набувають академічного визнання."
  flavor_mei.230.a: "Підтримати розвиток нептунізму!"
  flavor_mei.230.b: "Це спекулятивні роздуми."
  flavor_mei.230.historical_info: "Абрагам Ґоттлоб Вернер був піонером геології та одним із засновників сучасної мінералогії. Його нептуністська теорія, хоча згодом і була витіснена плутонізмом, що приписував утворення порід вулканічній діяльності, глибоко вплинула на наукову думку по всій Європі та привабила студентів до Фрайберга."
  flavor_mei.240.title: "Прибуття [target_character.GetLastNameWithNoTooltip]"
  flavor_mei.240.desc: "Визначна подія прикрасила [ShowLocationName('dresden')], коли [target_character.GetName], один із найвідоміших композиторів опери-серіа в [ShowContinentName('europe')], прибув, щоб представити [target_character.GetHisHer] останній твір. Коли люди стікаються дивитися [target_character.GetHisHer] виступи, багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] шепоче, що [target_character.GetLastNameWithNoTooltip] можна було б переконати залишитися, якщо ми надамо наше заступництво та вшануємо [target_character.GetHisHer] геній."
  flavor_mei.240.a: "Ми зробимо все можливе, щоб [target_character.GetHimHer] залишився!"
  flavor_mei.240.b: "[target_character.GetSheHe|U] — лише черговий музикант."
  flavor_mei.240.historical_info: "Йоганн Адольф Гассе був значним композитором німецького бароко. Його прибуття до Дрездена ознаменувало золотий вік музики при саксонському дворі, особливо під заступництвом курфюрстини Марії Йозефи та курфюрста Августа III. Пізніше він служив капельмейстером і відіграв важливу роль у перетворенні Дрездена на центр італійської опери на півночі Німеччини."
  flavor_mei.1000.title: "Назріває буря"
  flavor_mei.1000.desc: "Відтоді, як наш дім заявив права на трон [GetCountry('THU').GetName] від Лудовінгів, напруга тліла між нами та меншими володарями регіону. Ми давно прагнули підпорядкувати всю [GetCountry('THU').GetNameWithNoTooltip] сюзеренітету династії [ShowDynastyName('wettin_dynasty')], і місцеві графи запекло протистояли нам у цьому прагненні. Можливо, настав час нарешті почати працювати над досягненням цієї амбіції, і претензія на [target_country.GetName] здається ідеальним кроком."
  flavor_mei.1000.a: "Ми повинні наполягати на своїх претензіях."
  flavor_mei.1000.a.tt: "Наша відкрита ворожість може підштовхнути [target_country.GetName] до пошуку іноземної підтримки."
  flavor_mei.1000.b: "Зараз не час для війни."
  flavor_mei.1000.historical_info: "У 1247 році династія Лудовінгів у Тюрингії вимерла, і трон був заявлений Генріхом Мейсенським, членом династії Веттінів. З моменту захоплення влади Веттінами вони намагалися об'єднати регіон під сюзеренітетом своєї династії, але це відштовхнуло інших князів регіону. У 1342 році місцеві доми зібралися в місті Арнштадт і уклали союз, який мав протистояти Веттінам. Конфлікт між двома протиборчими групами призвів до Тюринзької графської війни, яка, хоча спочатку була успішною у протистоянні Веттінам, закінчилася їхньою перемогою та посиленням контролю над регіоном."
  flavor_mei.1001.title: "Загроза [ShowDynastyNameWithNoTooltip('wettin_dynasty')]"
  flavor_mei.1001.desc: "Відтоді, як династія [ShowDynastyName('wettin_dynasty')] закріпила за собою [GetCountry('THU').GetName], напруга тліла між ними та меншими володарями регіону. [root_country.GetName] нещодавно відкрито заявила про своє прагнення об'єднати регіон під своїм правлінням, і ширяться чутки, що ми можемо стати однією з їхніх перших цілей. [ROOT.GetCountry.GetGovernment.GetCourtTitle] зібрався і тисне на [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], щоб вжити заходів, поки не пізно. Вони пропонують відправити послів до сусідніх країн і запропонувати їм союз, щоб протистояти загрозі, яку становить [GetCountry('THU').GetNameWithNoTooltip]."
  flavor_mei.1001.a: "Ми повинні діяти швидко."
  flavor_mei.1001.a.tt: "Наші зусилля зі створення альянсів проти [root_country.GetName] можуть призвести до превентивної війни."
  flavor_mei.1001.b: "Ми нічого не можемо вдіяти."
  flavor_mei.1002.title: "Загроза [ShowDynastyNameWithNoTooltip('wettin_dynasty')]"
  flavor_mei.1002.desc: "Посланець із [target_country.GetName] прибув до [ROOT.GetCountry.GetGovernment.GetCourtTitle], говорячи про величезну загрозу, яку становлять амбіції династії [ShowDynastyName('wettin_dynasty')], що прагне об'єднати весь регіон під своїм правлінням, загрожуючи як незалежності [target_country.GetNameWithNoTooltip], так і [ROOT.GetCountry.GetName]. Вони пропонують союз, який має стримати їх від нападу на будь-кого з нас."
  flavor_mei.1002.a: "Мудра пропозиція."
  flavor_mei.1002.b: "Ми не можемо укладати союзи на основі чуток."
  flavor_mei.1003.title: "Війна тюринзьких графів"
  flavor_mei.1003.desc: "Тривожні новини дійшли до [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Менші володарі регіону збираються під прапором [target_country.GetName] у спробі сформувати коаліцію, щоб зупинити наші плани регіонального об'єднання. Хоча дехто припускає, що нам краще відмовитися від наших планів, інші підштовхують [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] завдати удару, перш ніж [target_country.GetNameWithNoTooltip] вдасться зібрати всіх володарів під свою справу."
  flavor_mei.1003.a: "Ми повинні діяти швидко."
  flavor_mei.1003.b: "Опозиція надто сильна."
  flavor_mei.1003.historical_info: "Після підписання пакту в Арнштадті 1342 року, менші володарі регіону воювали проти Веттінів, у якій вони прагнули кинути виклик їхнім амбіціям регіонального панування. Хоча спочатку успішні, Веттіни застосували стратегію укладання окремих мирних договорів, виводячи дрібних володарів з війни одного за одним. Зрештою, Веттінам вдалося перетворити їхні землі на свої феоди, фактично перетворивши їх на васалів і досягнувши своїх цілей регіонального об'єднання під династією Веттінів."
  flavor_mei.1004.title: "Війна тюринзьких графів"
  flavor_mei.1004.desc: "Хоча здавалося б, що наші дипломатичні зусилля були успішними у запобіганні [target_country.GetName] від здійснення їхніх амбіцій регіонального об'єднання, багато хто в [ROOT.GetCountry.GetGovernment.GetCourtTitle] вважає, що цього недостатньо. Вони припускають, що ми повинні використати наших союзників, щоб умиротворити династію [ShowDynastyName('wettin_dynasty')] і змусити їх назавжди відмовитися від своїх амбіцій."
  flavor_mei.1004.a: "Найкращий захист – це напад."
  flavor_mei.1004.b: "Ми вже забезпечили нашу безпеку."