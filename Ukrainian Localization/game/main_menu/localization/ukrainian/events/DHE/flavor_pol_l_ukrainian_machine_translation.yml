l_english:
  flavor_pol.1.title: "Флот Речі Посполитої"
  flavor_pol.1.desc: "Наші зіткнення з суперниками та ворогами по всій [ShowContinentName('europe')] породили нову потребу. Щоб зберегти наш суверенітет і кинути виклик тим, хто прагне панувати над нашим народом, було подано пропозицію створити новий флот під [ROOT.GetCountry.GetAdjective] командуванням. Доки ми обговорюємо дрібні деталі цієї справи, стає очевидним, що прихильники впливового [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], схоже, не бажають підтримувати цю ідею через витрати, пов'язані з таким підприємством. На щастя, член [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] на ім'я [target_character.GetName] виступив, щоб допомогти нам фінансувати це починання."
  flavor_pol.1.a: "Ця пропозиція має сенс."
  flavor_pol.1.b: "Це не пріоритет!"
  flavor_pol.2.title: "Колона [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip]"
  flavor_pol.2.desc: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] наказав збудувати монументальну колону в місті [ShowLocationName('warsaw')] на честь величі [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] попередника [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName].\n\nМи знайшли двох відомих [ShowCultureGroupName('italian_group')] митців, архітектора [constant_tencalla_scope.GetName] та скульптора [clement_molli_scope.GetName], які можуть бути найкращими для цього замовлення."
  flavor_pol.2.historical_info: "Син і наступник Сигізмунда III Вази, король Владислав IV Ваза, наказав збудувати Колону Сигізмунда, яка була споруджена між 1643 і 1644 роками. Італійські архітектор Константіно Тенкалла та скульптор Клементе Моллі спроєктували колону. Розташована у Варшаві, ця колона коринфського стилю виготовлена з червоного мармуру, висотою 8,5 м, на якій розміщена скульптура Сигізмунда III Вази висотою 2,75 метра. Колона прикрашена чотирма орлами, а король одягнений у обладунки, тримаючи хрест в одній руці та меч в іншій."
  flavor_pol.2.a: "Найняти цих людей і збудувати її."
  flavor_pol.2.b: "З іншого боку, немає потреби вшановувати [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip]."
  flavor_pol.3.title: "Merkuriusz Polski Ordynaryjny"
  flavor_pol.3.desc: "З поширенням регулярних видань, що називаються газетами, по всій Європі, настав час для [ROOT.GetCountry.GetLongName] друкувати власну.\n\nКоролівський секретар і дипломат [hieronymus_pinocci_scope.GetName] може бути найкращою людиною, щоб очолити її та зробити її відомою, престижною та лояльною. Поєднання здібностей [hieronymus_pinocci_scope.GetNameWithNoTooltip] з офіційною підтримкою від [ROOT.GetCountry.GetGovernment.GetRuler.GetName] забезпечить успіх нової газети по всій [ROOT.GetCountry.GetNameWithNoTooltip]."
  flavor_pol.3.historical_info: "Королева Марія Луїза Гонзага та король Ян II Казимир Польський спонсорували газету #italic Merkuriusz Polski Ordynaryjny#!, що виходила щотижня і була присвячена сучасній політиці, європейським династичним справам та військовим кампаніям монархів. Вона пропагувала політичні реформи та зміцнення монархічної влади, редагувалася Ієронімом Піноччі та видавалася друкарнею Я. А. Горчина."
  flavor_pol.3.a: "Спонсорувати газету"
  flavor_pol.3.b: "Дозволити це"
  flavor_pol.3.c: "Нам потрібен [hieronymus_pinocci_scope.GetNameWithNoTooltip] при дворі."
  flavor_pol.3.d: "Заборонити це"
  flavor_pol.4.title: "Вільнюський університет"
  flavor_pol.4.desc: "[ShowCultureGroupName('lithuanian_group')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] нашого [ROOT.GetCountry.GetFlavorRank] втомилися від сумного стану вищої освіти, доступної в їхніх головних містах, і попросили єзуїтів створити новий [ShowBuildingTypeName('university')] у [ShowLocationName('vilnius')] або [ShowLocationName('kaunas')].\n\nЦе чудова нагода проявити себе та вплинути на регіон. Ми можемо надіслати листа єпископу [ShowLocationNameWithNoTooltip('vilnius')] і переконати його бачити це питання так само, як і ми."
  flavor_pol.4.historical_info: "Валеріан Протасевич, єпископ Вільнюський, придбав кілька будівель у центрі міста та заснував Вільнюську академію у 1569 році. Три відділи академії були гуманітарні науки, філософія та теологія. У 1570 році була заснована бібліотека, 2500 книг були подаровані новому коледжу Сигізмундом II Августом, і перші студенти вступили до Академії. Стефан Баторій, король Польщі та Великий князь Литовський, надав академії рівний статус з Краківською академією 1 квітня 1579 року."
  flavor_pol.4.a: "Дозволити єзуїтам обрати."
  flavor_pol.4.b: "Заблокувати єзуїтів і спонсорувати університет у [ShowLocationNameWithNoTooltip('vilnius')]."
  flavor_pol.4.c: "Заблокувати єзуїтів і спонсорувати університет у [ShowLocationNameWithNoTooltip('kaunas')]."
  flavor_pol.4.d: "Зупинити проєкт та вплив єзуїтів."
  flavor_pol.5.title: "Ян Брожек"
  flavor_pol.5.desc: "[john_brozek_scope.GetName], ректор Краківської академії, справжній ерудит і відомий вчений, привернув увагу [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName]. Його дивовижні дослідження та захист Миколая Коперника зробили його дуже відомим у світі академії.\n\nЯкщо ми запросимо його приєднатися до нашого кабінету, [ROOT.GetCountry.GetFlavorRank] може значно виграти від його здібностей."
  flavor_pol.5.historical_info: "Ян Брожек був польським математиком, астрономом, лікарем, поетом, письменником, музикантом і ректором Краківської академії. Він працював над теорією чисел і геометрією, розв'язавши проблему, чому бджоли створюють шестикутні стільники, продемонструвавши, що шестикутна форма є ефективним способом використання воску та зберігання меду. Брожек був дописувачем теорій Миколая Коперника, палким прихильником і раннім потенційним біографом Коперника. Колегіум Брозека в Ягеллонському університеті названо на честь Брожека."
  flavor_pol.5.a: "Найняти його радником."
  flavor_pol.5.b: "Ігнорувати його."
  flavor_pol.6.title: "Наречений [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_pol.6.desc: "Через численні нещастя, з якими [ROOT.GetCountry.GetLongName] довелося зіткнутися в останні десятиліття, на троні опинилася жінка-[ROOT.GetCountry.GetGovernment.GetRulerTitle], [new_ruler.GetName]. Питання її майбутнього чоловіка має ключове значення, і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] дозволить їй вийти заміж лише за кандидата, який має їхнє схвалення.\n\nПісля обрання нареченого [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] наполягає на закріпленні цієї процедури в законі, щоб вони й надалі обирали свого наступного правителя."
  flavor_pol.6.a: "Одружитися з [lithuania_groom_country.GetName]."
  flavor_pol.6.b: "Одружитися з [first_groom_country.GetName]."
  flavor_pol.6.c: "Одружитися з [second_groom_country.GetName]."
  flavor_pol.6.d: "Одружитися з [third_groom_country.GetName]."
  flavor_pol.6.e: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не має права втручатися."
  flavor_pol.7.title: "Одружений з [GetCountry('POL').GetAdjectiveWithNoTooltip] [GetCountry('POL').GetGovernment.GetRulerTitle]"
  flavor_pol.7.desc: "Через численні нещастя, з якими [GetCountry('POL').GetLongName] довелося зіткнутися в останні десятиліття, на троні опинилася жінка-[GetCountry('POL').GetGovernment.GetRulerTitle], [pol_queen_scope.GetName]. Той факт, що вона незаміжня, став для нас чудовою нагодою, оскільки нашим дипломатам вдалося влаштувати її шлюб з [new_ruler.GetName], створивши міцний союз між [ROOT.GetCountry.GetName] та [GetCountry('POL').GetAdjectiveWithNoTooltip] троном."
  flavor_pol.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_pol.8.title: "Статут Пйотркува"
  flavor_pol.8.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] подали петицію про кодифікацію своїх привілеїв у законі, посилаючись на необхідність підтримання соціального порядку та захисту [ROOT.GetCountry.GetFlavorRank]. [ShowEstatePrivilegeName('statutes_of_piotrkow')] обмежив би владу міщан і прив'язав би [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] до землі, забороняючи їм залишати її без згоди [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Такий набір статутів, безумовно, зміцнить їхній зростаючий вплив і може прокласти шлях до подальшого підриву тієї центральної влади, що у нас залишилася."
  flavor_pol.8.a: "З неохотою, ми мусимо погодитися."
  flavor_pol.8.b: "Ми не підемо на компроміс з такими, як [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]!"
  flavor_pol.8.historical_info: "За правління Яна I Ольбрахта, сина Казимира IV, політика надання поступок шляхті тривала. У 1496 році було запроваджено Пйотрковський статут. Він передбачав зміцнення та законодавче закріплення кріпацтва. Він забороняв усім працівникам переїжджати зі своїх сіл, за винятком одного на рік. Пізніше його було розширено до шестиденної робочої повинності на тиждень. На цьому етапі польські селяни втратили не лише всю владу, а й свою свободу. Влада перебувала в руках шляхти."
  flavor_pol.9.title: "[ShowEstatePrivilegeNameWithNoTooltip('nieszawa_privileges')]"
  flavor_pol.9.desc: "Після попередніх поступок [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та під час нашої поточної боротьби за владу, [target_character.GetName] знову був змушений вступити з ними в нові переговори. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] пропонує угоду для збору військ, серед них і найманців. Прагнучи вирішити нагальні проблеми [target_character.GetNameWithNoTooltip], [target_character.GetSheHe] мусить прийняти [ShowEstatePrivilegeNameWithNoTooltip('nieszawa_privileges')], що означає, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] мав право проводити місцеві #italic Conventiones Particulares#!, без яких не можна було збирати війська та стягувати податки. Таким чином, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] отримав ефективну та потужну організацію зі спільним взаємним інтересом та владою над військовою та податковою законодавчою процедурою."
  flavor_pol.9.a: "Прийняти Конвенції"
  flavor_pol.9.b: "Відмовитися підписувати його і кинути виклик [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]!"
  flavor_pol.10.title: "Король єзуїтів"
  flavor_pol.10.desc: "Поширення [ShowReligionName('lutheran')] є однією з великих невдач [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName]. [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetHisHer] політика релігійної вседозволеності та теологічного хаосу дозволила сотням [ShowCultureName('polish')] душ збитися на жахливу єресь. Лише сила єзуїтського ордену може повернути втрачені позиції в умах [ShowCultureNameWithNoTooltip('polish')] пастви.\n\nДавайте спонсоруємо орден і надамо йому ресурси для протидії хвилі єресі, що загрожує нашим підданим."
  flavor_pol.10.historical_info: "Сигізмунд III був сином короля Швеції Юхана III. Його батько був правителем суворо протестантської країни, але з особистим схилом до католицизму. Сигізмунд виховувався єзуїтами і віддавав перевагу їхньому товариству. Релігія була для нього такою ж важливою, як і політика, і однією з його великих одержимостей було зробити католицизм державною релігією Польщі. Це було, мабуть, найнеможливішим завданням для людини, навіть короля, здійснити в Польщі. Свобода віросповідання та ідеологічний принцип релігійної толерантності були основою польського суспільства. Сигізмунд був вольовим і впертим, тому він все ж спробував. Звісно, вся країна була проти нього, і він зазнав невдачі. Ці дії також створили йому багато ворогів, що завадило йому реформувати уряд і зміцнити королівську владу в першому десятилітті 17 століття."
  flavor_pol.10.a: "Хай живе Король Єзуїтів!"
  flavor_pol.10.b: "Католицька віра — перша серед рівних"
  flavor_pol.10.c: "Ні, польський народ вільний і толерантний."
  opinion_pol_true_faith: "Польська Істинна Віра"
  opinion_pol_religious_freedom: "Польська Релігійна Свобода"
  flavor_pol.11.title: "Pacta Conventa та Генріхові статті"
  flavor_pol.11.desc: "Наш новий [new_ruler_scope.GetName] щойно отримав [new_ruler_scope.GetHisHer] титул, але [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] не чекатиме й дня і вже тисне на [new_ruler_scope.GetHimHer], щоб [new_ruler_scope.GetHimHer] підписав широкі привілеї, які зроблять їх несприйнятливими до центральної влади. Їхня влада настільки переважна, що нам залишилися лише найекстремальніші дії, щоб захистити [ROOT.GetCountry.GetGovernment.GetRulerTitle] від їхніх зазіхань."
  flavor_pol.11.historical_info: "У 1572 році династія Ягеллонів вимерла, і мав бути обраний новий король. Його ім'я було Генріх д'Анжу. Після свого обрання він був змушений підписати те, що пізніше назвали Генріховими статтями, які закріплювали, що Польща відтоді є виборною монархією. Він також підписав #italic Pacta Conventa#!, що було офіційним договором між обраним монархом і Сеймом. На практиці монарх втратив усю владу над своєю країною. Він не мав влади над урядовими чиновниками і мав лише 3000 чоловік Королівської армії. Щоб отримати щось додаткове, він мусив благати Сейм про дозвіл. У цей момент Польща фактично перестала бути монархією, оскільки монарх був лише номінальною фігурою, і натомість стала справжньою Шляхетською Республікою."
  flavor_pol.11.a: "Ми клянемося."
  flavor_pol.11.b: "Це закінчується тут! До зброї!"
  flavor_pol.12.title: "Армійські реформи [new_ruler_scope.GetShortNameWithNoTooltip]"
  flavor_pol.12.desc: "Наш новий правитель [new_ruler_scope.GetName] дуже вправний у військових справах і після приходу до влади зосередився на модернізації та пожвавленні наших застійних збройних сил.\n\nМи можемо звернутися до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] і реформувати наші об'єднані сили, або підірвати їхній вплив новою, центральною та сучасною силою."
  flavor_pol.12.historical_info: "Коли Ян Собеський став королем у 1674 році, він уже був відомим і славетним військовим лідером. Фактично, він починав як генерал, а закінчив як король. Його реформа польської армії почалася задовго до того, як він став королем, але саме під його королівським керівництвом сильні ефекти реформ залишили тривалий слід в історії. Нова польська армія врятувала Відень від навали османів і назавжди зупинила їхній наступ. На жаль, у довгостроковій перспективі це допомогло Австрії більше, ніж Польщі."
  flavor_pol.12.a: "Реформувати армію."
  flavor_pol.12.b: "Реформувати армію та підірвати владу [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  flavor_pol.14.title: "Колегіум Гозіанум"
  flavor_pol.14.desc: "Деякі з наших найпобожніших кардиналів та єпископів [ShowLocationName('olsztyn')] турбуються про духовне благополуччя нашого [ROOT.GetCountry.GetFlavorRank]. Щоб протистояти поширенню єретичних ідей серед [ShowCultureGroupName('polish_group')] [ShowPopTypeName('burghers')] та [ShowPopTypeName('nobles')], вони звернулися за допомогою до єзуїтів. Разом вони розробили план створення елітної школи в дієцезії [ShowLocationNameWithNoTooltip('olsztyn')]. Кожен, хто пройде тут навчання, дізнається все, що можна навчити про те, як протистояти аргументам реформаторів і як рекатолізувати регіони, які вже були втрачені для наших духовних ворогів."
  flavor_pol.14.historical_info: "Заснований у 1565 році під патронатом кардинала Станіслава Гозія, Колегіум Гозіанум став однією з найвпливовіших єзуїтських установ у Речі Посполитій. Розташований у місті Браунсберг, він служив центром католицької освіти та стратегічним оплотом Контрреформації в Північній Європі. Коледж пропонував освіту в галузі гуманітарних наук, філософії та теології, приваблюючи студентів з усієї Речі Посполитої та за її межами. Його навчальна програма та дисципліна відображали суворі педагогічні ідеали Товариства Ісуса, формуючи покоління духовенства та інтелектуалів, які згодом захищали католицьку доктрину в часи глибоких релігійних потрясінь."
  flavor_pol.14.a: "Від такого жесту може бути лише добро."
  flavor_pol.14.b: "Ми не можемо дозволити єзуїтський вплив у наших кордонах."
  flavor_pol.15.title: "[ROOT.GetCountry.GetCulture.GetLanguage.GetNameWithNoTooltip] Біблія"
  flavor_pol.15.desc: "Група [ShowReligionAdjective('calvinist')] вчених завершила переклад Біблії на [ROOT.GetCountry.GetCulture.GetLanguage.GetName], створивши таким чином [target_art.GetName]. Вчені працювали з найоригінальніших відомих джерел, і немає сумніву, що це чудова праця. Однак перспектива ще більшої доступності [ShowReligionAdjectiveWithNoTooltip('calvinist')] ідей для [ShowCultureGroupName('polish_group')] населення є лякаючою. [ShowReligionNameWithNoTooltip('calvinist')] вже встановив свій вплив над деякими з наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], загрожуючи зруйнувати спокійний статус-кво нашої віри."
  flavor_pol.15.historical_info: "Надрукована в 1563 році в Бересті-Литовському під патронатом князя Миколая Радзивілла Чорного, Радзивіллівська Біблія, також відома як Берестейська Біблія, ознаменувала визначальний момент у поширенні Реформації в Речі Посполитій. Як перший повний польський переклад Біблії з оригінальних єврейських та грецьких текстів, вона відображала як лінгвістичні амбіції, так і релігійний запал кальвіністського руху. Більше ніж теологічна праця, це було культурне досягнення, яке сприяло розвитку польської літературної мови. Хоча Контрреформація пізніше призвела до її придушення, Берестейська Біблія залишається потужним символом релігійного плюралізму та шляхетського патронату під час трансформаційної епохи в історії Речі Посполитої."
  10_percent_of_pops_in_target_area_become_calvinist_tt: "Приблизно #Y 7%#! наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetName] приймуть [ShowReligionName('calvinist')]"
  flavor_pol.15.b: "Цю книгу треба спалити!"
  flavor_pol.15.a: "Цікаво..."
  flavor_pol.16.title: "Виборна монархія в Польщі"
  flavor_pol.16.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], впевнені у своїх привілеях, почали посилатися на свої давні претензії. Посилаючись на історичний прецедент, дедалі більше серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] стверджують своє невід'ємне право обирати наступників [ROOT.GetCountry.GetFlavorRank]. І хоча ми хотіли б протистояти таким безглуздим претензіям, ми не можемо не помітити зростаючого авторитету [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] за рахунок [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. На жаль, хочемо ми того чи ні, нам доведеться висловити їм довіру щодо обрання майбутніх монархів."
  flavor_pol.16.historical_info: "З безліччю привілеїв у XIV та XV століттях право обирати правителя Польщі було поширено на польську шляхту. Спочатку різні спадкоємці Ягеллонів не оскаржували своє правонаступництво, і тому вибори були лише формальністю. Це змінилося із закінченням династії Ягеллонів, що спричинило перші вибори, де шляхта мала обирати з-поміж різних іноземних шляхтичів. Справжні королівські вибори розпочалися 1573 року з обрання Генріха Валуа, і наступні монархи обиралися з іноземних кандидатів до кінця Речі Посполитої у XVIII столітті."
  flavor_pol.16.a: "Ми довіримося Сейму!"
  flavor_pol.17.title: "Велика Північна Війна"
  flavor_pol.17.desc: "Наші вороги в [target_country.GetName] неухильно розширювали свій вплив, наближаючись дедалі ближче до наших кордонів. Їхня зростаюча присутність у [ShowAreaName('baltic_area')] загрожує не лише нашим стратегічним інтересам, а й безпеці нашого [ROOT.GetCountry.GetFlavorRank]. Якщо ми залишатимемося пасивними, війна може застати нас непідготовленими, спричинивши спустошення в наших серцевинах. Замість того, щоб чекати, поки вони завдадуть удару, ми повинні взяти ініціативу! Зберімо наші сили, перейдімо на їхні землі та нагадаємо їм, що наш народ не підкоряється північним амбіціям."
  flavor_pol.17.a: "На війну!"
  opinion_polish_aggressions: "Польські агресії"
  flavor_pol.17.b: "Сцена ще не зовсім готова..."
  flavor_pol.17.historical_info: "У 1697 році 15-річний Карл XII зійшов на шведський престол. Скориставшись нагодою, російський цар Петро I уклав союз з Данією та Польщею-Саксонією у 1699 році. Однак, за британської та голландської військово-морської допомоги, Карл XII висадився на Зеландії та швидко розгромив данців, потім перемістився до Естляндії, де його значно менші за чисельністю шведи (1 до 5) здобули нищівну перемогу над росіянами. Замість того, щоб добити росіян, Карл рушив проти Августа II Польсько-Саксонського і вигнав його з Польщі у 1704 році (обравши про-шведського Станіслава Лещинського королем), потім підкоривши Саксонію у 1706 році. Поки росіяни розпочали будівництво Санкт-Петербурга (1703) та відбудовували свої армії, вони також захопили частини Естляндії (1704-1706). Потім Карл вирішив йти на Москву через Україну, де козаки під проводом Івана Мазепи знову повстали (1708). Сувора зима та російські рейди знищили його армію, і він був остаточно розбитий у битві під Полтавою у 1709 році. Поранений король втік до османів. Росіяни були оточені османами на річці Прут, але Петро за допомогою хабарів зумів отримати безпечний прохід в обмін на Азов. Поки Карл все ще був у вигнанні в Туреччині, російські, данські, ганноверські та навіть прусські війська захопили більшу частину шведських земель навколо Балтики. Вийшовши з турецького інтернування, Карл був убитий у 1718 році перед норвезькою фортецею Фредріксгальд. У мирних договорах, що послідували, Швеція втратила більшу частину своєї Балтійської імперії."
  flavor_pol.18.title: "[GetCountry('TUR').GetAdjectiveWithNoTooltip] Напруженість"
  flavor_pol.18.desc: "Експансіоністські тенденції [GetCountry('TUR').GetName] призвели до нової хвилі добровольців, які приєднуються до наших полків, щоб захистити свою [ShowReligionGroupAdjective('christian')] віру від наступу язичників."
  flavor_pol.18.a: "Ми захищатимемо Християнство."
  flavor_pol.18.historical_info: "Польща та Османська імперія вступили в конфлікт у 1670-х та 80-х роках, коли козаки в польській частині розділеної України підкорилися Османській імперії та закликали татарську допомогу проти Польщі. Перемоги, здобуті гетьманом Яном Собеським, лише тимчасово відстрочили загрозу, і в 1672 році Річ Посполита зіткнулася з великим вторгненням Османської імперії. Падіння ключової прикордонної фортеці Кам'янець-Подільський супроводжувалося принизливим Бучацьким миром. У 1683 році Собеський очолив армію допомоги до Відня, обложеного османами, і як верховний головнокомандувач союзних сил здобув гучну перемогу, що ознаменувала початок відступу османів з Європи."
  pol_stag_maybe_more: "Можливо, пізніше буде більше шансів."
  flavor_pol.19.title: "Припинення стагнації"
  flavor_pol.19.desc: "Наше поточне розділення влади з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [ROOT.GetCountry.GetName] має давню традицію в нашій адміністрації. Деякі з наших радників радять нам докласти зусиль для зміни цієї ситуації на користь нашого [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], тоді як інші виступають за збереження статус-кво."
  flavor_pol.19.a: "Ні, змінювати ситуацію надто проблематично."
  flavor_pol.19.b: "Змінимо цю гнітючу ситуацію."
  flavor_pol.19.historical_info: "Коли Ян Собеський став королем Польщі та здобув репутацію рятівника Відня під час облоги міста османськими військами у 1683 році, він також користувався досить незвичною підтримкою польського Сейму. Однак ця підтримка не призвела до зміни балансу сил між польською шляхтою та монархом."
  flavor_pol.20.title: "Припинення стагнації"
  flavor_pol.20.desc: "$flavor_pol.19.desc$"
  flavor_pol.20.a: "Ні, змінювати ситуацію надто проблематично."
  flavor_pol.20.b: "Змінимо цю гнітючу ситуацію."
  flavor_pol.20.historical_info: "Коли Август II зійшов на польський престол у 1697 році, він прибув до Польщі з великими амбіціями щодо централізованої держави та об'єднаної держави між його саксонською батьківщиною та Польщею. Однак ці цілі зазнали невдачі через тривалий конфлікт та опір польського Сейму."
  flavor_pol.21.title: "Подолання застою"
  flavor_pol.21.desc: "$flavor_pol.19.desc$"
  flavor_pol.21.a: "Ні, змінювати ситуацію надто проблематично."
  flavor_pol.21.b: "Змінимо цю гнітючу ситуацію."
  flavor_pol.21.historical_info: "Після сходження Станіслава Августа Понятовського на польський престол у 1764 році він ініціював хвилю конституційних реформ, включаючи заплановане скасування старих шляхетських привілеїв. Однак ці плани розвалилися через іноземне втручання Пруссії та Росії, які погрожували війною."
  flavor_pol.22.title: "Подолання застою"
  flavor_pol.22.desc: "$flavor_pol.19.desc$"
  flavor_pol.22.a: "Ні, змінювати ситуацію надто проблематично"
  flavor_pol.22.b: "Змінимо цю гнітючу ситуацію"
  flavor_pol.22.historical_info: "Станіслав Понятовський здійснив другу спробу реформувати польську державу в 1787 році, звернувшись до Росії за союзом в обмін на підтримку створення польської армії. Ця пропозиція була відхилена Катериною Великою і призвела до подальшого поділу Польщі."
  flavor_pol.23.title: "[ROOT.GetCountry.GetGovernment.GetParliament.GetNameWithNoTooltip] дотримується нашої політики"
  flavor_pol.23.desc: "На щастя, політика нашої держави знайшла відгук у [ROOT.GetCountry.GetGovernment.GetParliament.GetName], який вирішив підтримати наші зусилля під час поточної сесії."
  flavor_pol.23.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_pol.23.historical_info: "Саме вето було лише найочевиднішим симптомом політичної хвороби, яка сягала набагато глибше. Перше вето не повторювалося сімнадцять років, друге – ще десять. Потім воно стало ендемічним у парламентському житті. Право накладати вето перетворилося на фетиш, особливо серед дрібної шляхти, яка бачила в ньому символ своєї особистої участі у Речі Посполитій, а також остаточну гарантію своїх свобод. Те, що король дивився на це інакше, очевидно. Слід знати, що формування політики в Польщі не було заморожене через силу вето. Король мусив створювати Великі Компроміси, щоб забезпечити принаймні прийнятний результат. Однак, оскільки польське суспільство повільно втрачало свій консенсус, досягти компромісу ставало все важче. Це було особливо обтяжливо, коли планування та інтриги тривали багато місяців, і раптом в останню хвилину ухвалення пропозиції в Сеймі хтось піднімався і накладав вето."
  flavor_pol.24.title: "Сейм ветує всю нашу політику"
  flavor_pol.24.desc: "На жаль, політика нашої держави не знайшла відгуку у [ROOT.GetCountry.GetGovernment.GetParliament.GetName], який вирішив підірвати наші зусилля під час поточної сесії."
  flavor_pol.24.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_pol.24.b: "Діяти за їхньою спиною."
  flavor_pol.25.title: "Університет [target_location.GetNameWithNoTooltip]"
  flavor_pol.25.desc: "Мало які країни мали честь приймати такі передові навчальні заклади, як ми. Зі зведенням великого [ShowBuildingTypeName('university')] у [target_location.GetName] ми досягли нової висоти у величі, ставши передовим центром ренесансної думки. Головні спонсори закладу нещодавно звернулися до нашого великого [target_character.GetName] з проханням про офіційне та повне покровительство [ROOT.GetCountry.GetAdjectiveWithNoTooltip] королівської родини та підтримку [ROOT.GetCountry.GetReligion.GetAdjective] Церкви."
  flavor_pol.25.a: "Цінна установа під нашою опікою!"
  flavor_pol.25.b: "Вона не потребує особливого ставлення."
  flavor_pol.25.historical_info: "Краківський університет, заснований у 1364 році королем Казимиром III «Великим» як Краківська академія, швидко став маяком інтелектуальної могутності в Центральній Європі. Наслідуючи Паризький університет, він пропонував всебічну освіту, що охоплювала гуманітарні науки, медицину, право та теологію. Обдарований королівською прихильністю та підтриманий Католицькою Церквою, заклад розквітнув, приваблюючи до своїх залів світил з усієї Європи.\n\nСеред Відродження університет досяг свого апогею, розквітнувши в горнило гуманістичної думки, наукових досліджень та міжкультурного діалогу. Це була золота доба, коли його коридорами ходили такі уми, як Коперник, архітектор геліоцентричної моделі, та Ян Кохановський, видатний поет тієї епохи. Краківський університет став відомим центром інтелектуального бродіння, плекаючи дух дослідження та інновацій, що характеризував епоху Відродження."
  flavor_pol.26.title: "Місто [target_location.GetNameWithNoTooltip]"
  flavor_pol.26.desc: "Узбережжя [ShowAreaName('baltic_area')] є домом для одних із найпроцвітаючих торгових спільнот, відомих у [ShowContinentName('europe')]. Однією з таких спільнот був місцевий уряд та члени [ShowEstateTypeName('burghers_estate')] у [target_location.GetName]. Під [GetCountry('TEU').GetAdjective] керівництвом місто сильно постраждало, оскільки їхні колишні пани прагнули придушити незалежний дух його народу шляхом безладних вбивств та зникнень його чиновників, а також скасування місцевого самоврядування.\n\nТепер, коли [target_location.GetNameWithNoTooltip] надійно в наших руках, а його люди радіють своєму визволенню, багато видатних діячів міста виступили з проханням про відновлення місцевого самоврядування та визнання прав на карбування монет від імені [ShowEstateTypeName('burghers_estate')]."
  flavor_pol.26.a: "Дуже добре. Ми дозволимо це."
  flavor_pol.26.b: "Визволено? Ні. Під новим керівництвом? Так."
  flavor_pol.27.title: "Розширення Кварцяного війська"
  flavor_pol.27.desc: "Було закладено основи регулярної армії в [ROOT.GetCountry.GetName] у переході від звичайних армій до більш модернізованої та оперативної сили, для захисту наших прикордонних земель від іноземних набігів.\n\nЦю систему було розширено в [GetCurrentYear], коли [target_character.GetName] уклав угоду з [ROOT.GetCountry.GetGovernment.GetParliament.GetName] про її фінансування чвертю всіх доходів, зібраних з королівських земель, звідки вона й отримала свою назву – Кварцяне військо.\n\nТепер, щоб захистити наш народ, оберегти наші інтереси та підтримувати наш ріст і процвітання, ми повинні йти в ногу з часом і приймати всі корисні технологічні досягнення, особливо у військовій сфері та веденні війни. Наш вибір у цьому питанні, безсумнівно, відгукнеться в залах історії."
  flavor_pol.27.a: "Загальна реформа добре б пасувала нашій армії!"
  flavor_pol.27.b: "Ми не можемо собі цього дозволити."
  scales_with_army_tradition_tt: "Ця зміна масштабується з нашою [Concept('army_tradition', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_pol.28.title: "Реконструкція Університету [target_location.GetNameWithNoTooltip]"
  flavor_pol.28.desc: "Багатство та спадщина є потужними інструментами, коли їх використовують на благо суспільства. Така історія найвідомішого та найстарішого університету в [ROOT.GetCountry.GetName]. Сутність мислячої нації, увібрана в прекрасні стіни незабаром реконструйованої та розширеної будівлі в стилі Ренесансу, прокладе шлях нашим славетним умам та їхньому шляху до зірок, пропонуючи знання та розвиток великим людям, які, безсумнівно, формуватимуть нашу історію."
  flavor_pol.28.a: "Славетний заклад для виховання майбутніх поколінь!"
  flavor_pol.28.b: "Установа не потребує подальшого розширення."
  flavor_pol.29.title: "Реформи процвітання [target_character.GetShortNameWithNoTooltip]"
  flavor_pol.29.desc: "Географічне положення нашого володіння в поєднанні з його пишною продукцією та родючими рівнинами робить його бажаною ціллю для експансії. Щоб зберегти наш суверенітет та забезпечити захист нашого народу, наш великий [target_character.GetName] доручив [target_character.GetHerHis] радникам розробити пропозицію щодо створення низки укріплень по всій нашій землі, які слугуватимуть захисними щитами та центрами процвітання для нашого народу."
  flavor_pol.29.a: "Приступайте до реформ."
  flavor_pol.29.b: "Ми не потребуємо цього."
  every_location_with_fortifications_gains_5_prosperity_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowBuildingTypeName('stockade')] або [ShowBuildingTypeName('castle')] отримає [ShowNamedValue('prosperity_very_weak_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_pol.30.title: "Статути [target_character.GetNameWithNoTooltip]"
  flavor_pol.30.desc: "Незважаючи на закінчення періоду роздробленості лише кілька десятиліть тому, значні ділянки нашої землі залишаються під контролем автономних суб'єктів та свавільних губернаторів. Щоб змінити цей небезпечний статус-кво, рада наших радників отримала завдання розробити наш перший звід правових статутів у спробі реформувати нашу законодавчу базу та розпочати процес централізації.\n\nПропозиція містить статті, що впливають на всі аспекти нашого суспільства, такі як судові процеси та кримінальне право. Однак такий сміливий крок до підриву місцевого встановленого правління, безсумнівно, виявиться складним у боротьбі з різними вкоріненими станами."
  flavor_pol.30.a: "Потрібні радикальні реформи!"
  flavor_pol.30.b: "Нам не потрібно порушувати статус-кво..."
  pol_start_deliberation_for_statutes_tt: "Це розпочинає процес обговорення, який сформує #Y Статути#! на основі наших виборів"
  reforms_option1: "Нам потрібні радикальні реформи!"
  reforms_option2: "Масштабні реформи принесуть нам користь у довгостроковій перспективі."
  reforms_option3: "Реформуймо лише те, що абсолютно необхідно."
  flavor_pol.31.title: "[target_character.GetNameWithNoTooltip] реформує соціальну систему"
  flavor_pol.31.desc: "Як і будь-яке інше суспільство, [ROOT.GetCountry.GetLongName] функціонує під постійно зростаючим впливом могутнього [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], чиї грошові та військові засоби підтримують нашу зовнішню експансію та підтримують внутрішній мир.\n\nНа жаль для них, розроблені статути під керівництвом [target_character.GetName] включають сміливий зсув у бік захисту менш привілейованих груп та встановлення нових привілеїв для [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] за рахунок їхніх панів."
  flavor_pol.31.a: "$reforms_option1$"
  flavor_pol.31.b: "$reforms_option2$"
  flavor_pol.31.c: "$reforms_option3$"
  flavor_pol.32.title: "Реформи приватного права"
  flavor_pol.32.desc: "У питаннях приватного права наші радники ретельно розробили низку статей, що стосуються уніфікованих стандартів виробництва комерційних товарів у межах наших правових кордонів. На наше невдоволення, ця реформа зустрічає багато перешкод серед тих, хто прагне більшої автономії під нашим правлінням, та членів [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]."
  flavor_pol.32.a: "$reforms_option1$"
  flavor_pol.32.b: "$reforms_option2$"
  flavor_pol.32.c: "$reforms_option3$"
  flavor_pol.33.title: "Реформа судових проваджень"
  flavor_pol.33.desc: "Представництво є чутливою і часто небезпечною темою для такого суспільства, як наше. Оскільки ми значною мірою покладаємося на різні могутні стани, нерідко доводиться віддавати права та привілеї, які, своєю чергою, обмежують свободи [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Не дивно, що надання прав представництва нашим найбіднішим людям похитне основу влади усталеної еліти, а отже, і ядро нашого суспільства."
  flavor_pol.33.a: "$reforms_option1$"
  flavor_pol.33.b: "$reforms_option2$"
  flavor_pol.33.c: "$reforms_option3$"
  greatly_increase_the_positive_gain_from_reforms_tt: "Цей варіант #G значно#! збільшить прибуток від цих реформ"
  mild_increase_the_positive_gain_from_reforms_tt: "Цей варіант #G дещо#! збільшить прибуток від цих реформ"
  minor_increase_the_positive_gain_from_reforms_tt: "Цей варіант #G ледь#! збільшить прибуток від цих реформ"
  flavor_pol.34.title: "Завершення обговорень реформ"
  flavor_pol.34.desc: "Після циклів обговорень, таємних угод та місяців дипломатичних зусиль нам вдалося забезпечити остаточний проект наших законодавчих реформ, що мають певну легітимність та можливість примусового виконання. Час покаже, чи стане це нашим кроком до величі, чи початком внутрішніх чвар..."
  flavor_pol.34.a: "Ми рухатимемося вперед, сильніші!"
  based_on_reform_choices_tt: "Вплив попередніх відповідних подій"
  flavor_pol.35.title: "Смерть [target_character2.GetNameWithNoTooltip]"
  flavor_pol.35.desc: "Держави часто пов'язують правителя з іноземною королівською родиною в гонитві за політичною вигодою та поширенням свого впливу. Так сталося з [target_character.GetShortName] та [target_character2.GetShortName]. Те, що починалося як звичайна дипломатія, зрештою розквітло у справжній роман, який святкували по всьому нашому королівству.\n#NL![target_character2.GetShortNameWithNoTooltip] виявилася справжньою супутницею для [target_character.GetShortNameWithNoTooltip], радивши [target_character.GetHerHim] у внутрішніх справах та надаючи життєво важливу підтримку. Відома [target_character2.GetHerHim] здібностями та любов'ю до музики, [target_character2.GetSheHe] завжди супроводжували музиканти та художники великої слави.\n\nПриймаючи цю велику втрату, дозвольмо нашому народу приділити час, щоб оцінити та з любов'ю згадати великий дух блискучої жінки."
  flavor_pol.35.a: "Нехай [target_character2.GetSheHe] спочиває з миром."
  casimir_less_interested_in_love_tooltip: "[target_character.GetShortNameWithNoTooltip] не шукатиме кохання найближчим часом."
  flavor_pol.36.title: "[ShowReligionAdjectiveWithNoTooltip('judaism')] Коханка"
  flavor_pol.36.desc: "[target_character.GetShortName] не чужий різним коханкам. Однак з роками ця шлюбна нестабільність почала впливати на державу, оскільки наш лідер повинен встановлювати стандарти та подавати приклад.\n\nНезважаючи на таке екстравагантне життя, повне романтичних пригод, жодна дама не полонила погляд [target_character.GetShortNameWithNoTooltip] так, як [target_character2.GetShortName]. Елегантна, красива та розумна не за роками, [target_character2.GetSheHe] стала впливовим голосом поруч із нашим монархом.\n\nСоюз між ними, хоч і може задовольнити бажання [target_character.GetShortNameWithNoTooltip] до кохання та романтики, безумовно, налаштує наш двір проти [ShowReligionAdjective('catholic')] влади вдома та за кордоном..."
  flavor_pol.36.a: "Кохання не знає релігійних меж!"
  flavor_pol.36.b: "Ми не можемо узаконити такий союз..."
  flavor_pol.36.c: "Нехай [target_character2.GetHerHim] зникне."
  target_character_2_vanishes_tt: "[target_character2.GetNameWithNoTooltip] зникне безслідно..."
  ruler_gains_fertility_tt: "[target_character.GetShortNameWithNoTooltip] матиме кращі шанси на народження спадкоємця"
  flavor_pol.37.title: "Стрілецькі Товариства"
  flavor_pol.37.desc: "Життя часто сповнене небезпек та іноземних загарбників, які бажають узурпувати наші процвітаючі землі. Щоб підтримати оборонні зусилля свого дому, багато членів [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] взялися за заснування стрілецького товариства в [ShowLocationName('krakow')], спрямованого на підтримку процвітання та виховання здібного корпусу стрілецької міліції.\n\nУ міру розширення наших володінь та народу, нові містечка та міста прагнуть заснувати власні стрілецькі товариства, і тому багато їхніх представників офіційно звернулися з проханням про офіційну підтримку заснування таких товариств у кожному місті."
  flavor_pol.37.historical_info: "Відоме як Товариство Півня, походження назви в Братстві сягає їхніх ранніх стрілецьких змагань. Спочатку вони використовували живих курей та півнів як мішені, з часом перейшовши до дерев'яних фігур півнів, відомих як #italic кур#!. Цей перехід призвів до встановлення оригінальної назви, #italic Братство Кура#!, оскільки #italic кур#! означає #italic півень#! у розмовній польській мові.\n\nЗ появою вогнепальної зброї, схожість між курком та головою півня стала вражаючою. Коли стрільці готувалися до пострілу, відтягуючи курок, цю дію описували як \"зведення\" вогнепальної зброї, що закріпило асоціацію з назвою півня."
  flavor_pol.37.a: "Стріляти по півнях – це не #italic жарт#! – це вимагає точності та майстерності!"
  flavor_pol.37.b: "Того, що засноване в [ShowLocationNameWithNoTooltip('krakow')], буде достатньо."
  flavor_pol.37.c: "Давайте прагнути кращого використання наших коштів..."
  flavor_pol.38.title: "Забезпечення нашого місця в [target_country1.GetNameWithNoTooltip]"
  flavor_pol.38.desc: "Оскільки [target_character.GetName] прагне утримати [target_character.GetHerHis] місце на [target_country1.GetAdjective] троні, стало очевидним, що нам знадобиться допомога могутніх [target_country1.GetAdjectiveWithNoTooltip] дворян. Їхнє становище вигідне, і їхня підтримка цілком може визначити міцність нашої позиції на їхньому троні. Все, що вони просять, це набір привілеїв у їхніх володіннях, подалі від наших..."
  flavor_pol.38.a: "Вони матимуть свої привілеї."
  flavor_pol.38.b: "Ми не слуги примх будь-яких дрібних дворян."
  flavor_pol.39.title: "Гра влади"
  flavor_pol.39.desc: "До нашої уваги дійшло, що [target_character.GetName], у жалюгідній спробі забезпечити [target_character.GetHerHis] позицію нашого сюзерена, пішов на абсолютно недипломатичну та незаконну обіцянку привілеїв, змову, з нашими власними [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Цей крок є безпрецедентним і явно порушує наше суверенне правління!"
  flavor_pol.39.a: "Як вони сміють?"
  flavor_pol.40.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_pol.40.desc: "Управління величезним королівством та спроби підтримувати порядок часто є непростим завданням. Незважаючи на всі наші зусилля, здається, що люди оскаржують наше правління, а наша легітимність часто ставиться під сумнів, іноді навіть відкрито.\n\nУ відповідь на ситуацію та щоб уникнути подальшого погіршення цієї вже занепалої ситуації, члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] виступили з цікавою та інтригуючою пропозицією. Обмін на привілеї, щоб вони могли передавати наше слово та встановлювати порядок за нашим дорученням."
  flavor_pol.40.a: "Нам потрібен їхній вплив, щоб стабілізувати наше правління..."
  flavor_pol.40.b: "Ми не ведемо переговорів з щурами!"
  flavor_pol.41.title: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName] [GetCurrentYear] року"
  flavor_pol.41.desc: "Сесії обговорень у [ROOT.GetCountry.GetGovernment.GetParliament.GetName] породили невпинну потребу з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вимагати більше привілеїв у міру зростання їхньої влади. Їхні останні вимоги зосереджені навколо консолідації влади аристократії в наших палатах."
  flavor_pol.41.a: "Ми мусимо задовольнити їхні вимоги."
  flavor_pol.41.b: "Чинити опір їхнім мерзенним вимогам!"
  flavor_pol.42.title: "Завіша Чорний"
  flavor_pol.42.desc: "До [ruler_scope.GetName] дійшла звістка про видатного лицаря, який здобув собі ім'я в різних куточках [ROOT.GetCountry.GetFlavorRank]. Беручи участь у численних лицарських турнірах та різноманітних кампаніях, він здобув велику славу, ставши ідеалом для наслідування іншими лицарями. Його ім'я [target_character.GetName], і його військові та дипломатичні навички зробили б його чудовим кандидатом для [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_pol.42.a: "Ми мусимо прагнути його дипломатичної та військової майстерності."
  flavor_pol.42.b: "Він, безперечно, цікава постать."
  STATIC_MODIFIER_NAME_pol_paragon_of_chivalric_values_modifier: "Взірець лицарських цінностей"
  flavor_pol.43.title: "[ShowLocationNameWithNoTooltip('warsaw')]ська конфедерація"
  flavor_pol.43.desc: "Поки великий [ShowReligionAdjective('lutheran')] розкол у [ShowReligionAdjective('catholic')] Церкві лютує, ми не можемо не помітити, що наш власний [ROOT.GetCountry.GetFlavorRank] також постраждав. Оскільки багато наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вже навернулися, вони почали вимагати законодавчого акту, який би гарантував їхню релігійну свободу та право навертати своїх підданих. Законодавчий акт, який би це дозволив, був названий '$warsaw_confederation$', і до [ruler_scope.GetName] вже звернулися з проханням підписати його. Більшість [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вже підписали його, але твердо [ShowReligionAdjectiveWithNoTooltip('catholic')] члени [ROOT.GetCountry.GetFlavorRank] вже отримали прохання підписати його, і більшість з них відмовляються це робити."
  flavor_pol.43.historical_info: "Варшавська конфедерація була однією з визначальних політик Польсько-Литовської Виборної Монархії. Вона надала шляхті релігійну свободу в часи європейських релігійних чвар. Включена до Генріхових артикулів, кожен наступний виборний король мусив її підписати."
  flavor_pol.43.a: "Вони мають наше схвалення."
  flavor_pol.43.b: "Стати на бік духовенства."
  flavor_pol.44.title: "Кошицький привілей"
  flavor_pol.44.desc: "[ruler_scope.GetName] звернувся до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] з проханням, щоб у разі смерті без чоловічого потомства, дочка могла успадкувати трон. Для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] це чудова нагода отримати подальші привілеї від [ROOT.GetCountry.GetGovernment.GetRulerTitle], на що всі вони можуть погодитися. З таким привілеєм податок, сплачуваний [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], буде зменшено, а подальші податки не будуть встановлюватися без їхньої згоди. Крім того, будь-який майбутній [ROOT.GetCountry.GetGovernment.GetRulerTitle] мусив би оплачувати витрати на свій візит, що, безумовно, принизливо для [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  flavor_pol.44.historical_info: "Кошицький привілей був наданий шляхті Людовиком I, монархом, що правив Угорщиною та Польщею в особистій унії. Завдяки цьому привілею було забезпечено спадкоємність однієї з його дочок, але ціною численних привілеїв для шляхти, що спрямувало Польщу на шлях до становлення «Шляхетської демократії» в майбутньому. Спадкоємність його дочки, Ядвіги, призвела до подальшого шлюбу з литовським великим князем Ягайлом, що призвело до особистої унії між Польщею та Литвою та формування Речі Посполитої в майбутньому."
  flavor_pol.44.a: "Ми виконаємо."
  flavor_pol.44.b: "Такі угоди з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] лише поведуть нас темним шляхом."
  POL_may_form_union_with_lit_at_later_date: "З ухваленням [ShowEstatePrivilegeName('privilege_of_koszyce')], [ROOT.GetCountry.GetName] зможе утворити унію з [GetCountry('LIT').GetName] завдяки події $flavor_pol.55.title$."
  flavor_pol.45.title: "Нова династія"
  flavor_pol.45.desc: "Об'єднання [pol_country.GetLongName] та [lit_country.GetLongName] під єдиним правителем призвело до появи нової великої сили в [ShowContinentName('europe')]. [pol_dynasty_founder.GetName] широко визнаний як правитель, з яким слід рахуватися, і безсумнівно, що [pol_dynasty_founder.GetHisHer] нащадки будуть шановані протягом століть. Це принесло [pol_dynasty_founder.GetShortNameWithNoTooltip] повагу, і багато хто вважає [pol_dynasty_founder.GetHimHer] прабатьком нової династії."
  flavor_pol.45.historical_info: "Ягеллонська династія була заснована в 1386 році Владиславом II Ягайлом його шлюбом з королевою Ядвігою Польською, що об'єднав два королівства Польщі та Литви в особисту унію. Династія правила двома країнами до 1572 року, коли рід вимер, і Польсько-Литовська унія стала управлятися монархами, обраними шляхом Виборної Монархії."
  flavor_pol.45.a: "Це початок нової ери."
  flavor_pol.46.title: "Заручини розірвані"
  flavor_pol.46.desc.a: "Дійшла до нас звістка про прикру смерть [dead_character.GetName]. Глибоко сумуємо з цієї втрати та втраченої нагоди ще більше зблизити дві династії. Само собою зрозуміло, що з цією подією заручини між [polish_candidate.GetNameWithNoTooltip] та [lithuanian_candidate.GetName] розірвано."
  flavor_pol.46.desc.b: "Політика династичного об'єднання між [polish_candidate.GetDynasty.GetName] та [lithuanian_candidate.GetDynasty.GetName] є вторинною щодо нашої внутрішньої політики. Тому ми вирішили одружити [polish_candidate.GetName] з кимось іншим, що буде для нас набагато вигідніше."
  flavor_pol.46.desc.c: "Звістка про передчасний шлюб [lithuanian_candidate.GetName] безумовно порушила план династичного об'єднання між [polish_candidate.GetDynasty.GetName] та [lithuanian_candidate.GetDynasty.GetName]. Хай їм грець за їхні порушені обіцянки. Тепер, коли заручини між [polish_candidate.GetNameWithNoTooltip] та [lithuanian_candidate.GetNameWithNoTooltip] розірвано, нам доведеться знайти інший спосіб привести [GetCountry('LIT').GetName] до нашої сфери впливу."
  flavor_pol.46.desc.d: "Дійшла до нас звістка, що заручини між [polish_candidate.GetName] та [lithuanian_candidate.GetName] розірвано. Посли не пояснили причину цілком зрозуміло, і жоден тиск не змусив би їх надати інформацію, тому ми залишаємося в невіданні щодо справжніх причин."
  flavor_pol.46.a: "Глибоко прикро."
  POL_betrothal_is_broken: "[lithuanian_candidate.GetName] та [polish_candidate.GetDynasty.GetName] більше не заручені й можуть одружуватися."
  flavor_pol.47.title: "Кревська унія"
  flavor_pol.47.desc: "Церковні дзвони в [ROOT.GetCountry.GetCapital.GetName] милостиво дзвонять, коли [ROOT.GetCountry.GetGovernment.GetAdjective] пара прямує до [ROOT.GetCountry.GetGovernment.GetAdjective] замку, щоб завершити формальності, які пов'язують [polish_candidate.GetDynasty.GetName] та [lithuanian_candidate.GetDynasty.GetName]. Лише кілька годин тому [lithuanian_candidate.GetName] було охрещено, що закріпило навернення [lithuanian_candidate.GetHerHis] держави до [ROOT.GetCountry.GetReligion.GetName]. Тепер, коли пара входить до [ROOT.GetCountry.GetGovernment.GetAdjective] двору, у Східній Європі формується новий блок влади."
  flavor_pol.47.historical_info: "Кревська унія була підписана тодішнім Великим князем Литовським Ягайлом, щоб уточнити та ратифікувати його зобов'язання перед польськими та литовськими панами. Ягайло мав навернутися до католицизму разом зі своїм двором, а різні польські в'язні мали бути звільнені. Ягайло також обіцяв включити литовські землі та Русь до польської корони."
  flavor_pol.47.a: "Ратифікувати Унію та відсвяткувати весілля!"
  flavor_pol.47.b: "Ми не можемо собі цього дозволити."
  flavor_pol.48.title: "Краківські жупи"
  flavor_pol.48.desc: "Один з наших управителів висунув пропозицію перетворити дві важливі [ShowGoodsName('salt')] копальні [ShowLocationName('wieliczka')] на [ROOT.GetCountry.GetGovernment.GetAdjective] компанію, передавши їх під контроль більш спеціалізованої установи. Крім того, статут кодифікував би всі формальності щодо видобутку [ShowGoodsNameWithNoTooltip('salt')], його використання у виробленій продукції, його експорту та податків на всі згадані теми. Такий акт може призвести до збільшення доходу, дозволяючи реалізовувати більш амбітні проєкти та кампанії в майбутньому."
  flavor_pol.48.historical_info: "Дві головні соляні копальні Малопольського регіону знаходяться у Величці та Бохні. 21 квітня 1368 року король Казимир підписав статут, який передав дві копальні під управління Королівської компанії. Вважається, що дохід від соляних копалень становив третину доходу Корони."
  STATIC_MODIFIER_NAME_pol_cracovian_salt_mines: "Великі соляні копальні"
  flavor_pol.48.a: "Ми доведемо це до кінця."
  flavor_pol.48.b: "Такі дрібниці!"
  flavor_pol.49.title: "Перспективний діяч"
  flavor_pol.49.desc: "В одній з наших нещодавніх сутичок було здійснено несподіваний напад на [ruler_scope.GetName]. У розпал моменту здавалося, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] загине, але хороброму солдату на ім'я [target_character.GetName] вдалося цьому запобігти. Намагаючись врятувати [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip], він убив нападника. Цей вчинок заборонив йому стати лицарем, але [ROOT.GetCountry.GetGovernment.GetRulerTitle] взяв його під [ruler_scope.GetHisHer] покровительство. Нині [target_character.GetNameWithNoTooltip] є висококваліфікованим єпископом-міністром, який намагається здобути собі кардинальське місце."
  flavor_pol.49.historical_info: "Збігнєв Олесницький був дуже впливовою постаттю в Королівстві Польському на початку XV століття. Він служив радником при двох королях і брав участь у різних дипломатичних місіях. У певний момент він став настільки впливовим, що був єдиною особою, яка керувала зовнішньою політикою королівства."
  flavor_pol.49.a: "Він має стати одним з наших придворних."
  flavor_pol.49.b: "Кожен повинен мати таке чудове походження."
  flavor_pol.50.title: "Ворожа конфедерація"
  flavor_pol.50.desc: "Дійшла до нас звістка, що під керівництвом [pol_macko_borkowic_scope.GetName] кілька видатних родин місцевої [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] об'єдналися, щоб утворити Конфедерацію в [ShowLocationName('poznan')]. Причини цього прості – нещодавні призначення на посаду сенешаля цих територій. Роздратовані вибором і відчуваючи себе приниженими, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] [ShowAreaName('greater_poland_area')] відкрито протистоять нашим губернаторам."
  flavor_pol.50.historical_info: "Шляхта Великопольщі об'єдналася в 1352 році, щоб протистояти призначенню генерального губернатора – Вєжбєнти з Паневіц. Повстання очолив Мацько Борковіц, один з попередніх губернаторів. В основі конфлікту лежало невдоволення шляхти з Великої Польщі через перенесення столиці до Малої Польщі та подальшу передачу влади."
  flavor_pol.50.a: "Ніхто не зневажатиме цілісність [ROOT.GetCountry.GetFlavorRank]."
  flavor_pol.50.b: "Поступіться їхнім вимогам."
  greater_polish_uprising: "Повстання Великої Польщі"
  POL_every_location_in_pomerania_wielkopolska_brandenburg: "Кожен [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] в областях [ShowAreaName('greater_poland_area')], [ShowAreaName('pomerania_area')] та [ShowAreaName('brandenburg_area')] втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_pol.51.title: "Nihil Novi"
  flavor_pol.51.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] висунули найбезглуздішу пропозицію на нещодавньому [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Їхні ілюзії [ROOT.GetCountry.GetGovernment.GetAdjective] адекватності змушують їх вірити, що вони заслуговують на право не мати жодних законів, прийнятих щодо них без їхньої згоди. Безглуздо! Проте без їхньої підтримки ми не зможемо фінансувати наші подальші кампанії. Тому ми повинні розглянути їхню пропозицію, якою б абсурдною вона не здавалася. Крім того, вони бажають обмежити права містян та заборонити свободу пересування для своїх кріпаків. Можливо, ми будемо змушені прийняти петицію [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_pol.51.historical_info: "#italic Nihil novi nisi commune consensu#! — це назва конституції Польського Сейму 1505 року, яка передбачала, що жоден новий закон не буде встановлений без спільної згоди шляхти. Вона вважається початком Шляхетської Демократії в Польщі та була одним з наріжних каменів для пізнішої #italic Золотої Вольності#!."
  flavor_pol.51.a: "Нехай вони мають свої дрібні права."
  flavor_pol.51.b: "Тоді ми не матимемо для них нових прав."
  flavor_pol.52.title: "Сумнівна лояльність у [MOL_tag.GetNameWithNoTooltip]"
  flavor_pol.52.desc: "Наші шпигуни знову повідомили нам про дивну поведінку [MOL_tag.GetAdjective] [MOL_tag.GetGovernment.GetRulerTitle]. У спробі забезпечити [POL_disloyal_vassal.GetHerselfHimself] безпеку, [POL_disloyal_vassal.GetHeShe] постійно змінює вірність і присягає бути підданим будь-якої могутньої держави, що межує з [POL_disloyal_vassal.GetHisHer] [MOL_tag.GetFlavorRank]. Очевидно, що цього дволикого зрадника необхідно переконати в нашій силі та нашій здатності захистити [POL_disloyal_vassal.GetHimHer]."
  flavor_pol.52.a: "Ми очікуємо, що [POL_disloyal_vassal.GetHerHim] присягне на вірність навіть самому Сатані."
  flavor_pol.54.title: "Конфлікт за [target_location.GetNameWithNoTooltip]"
  flavor_pol.54.desc: "Землі навколо міста [target_location.GetName] традиційно приписувалися до [ShowAreaName('greater_poland_area')], яка міцно перебуває під нашим контролем. Однак після того, як [ROOT.GetCountry.GetAdjective] Королівство розпалося на безліч дрібних герцогств, територія була завойована [ShowCultureName('silesian')] династією [ShowDynastyName('piast_dynasty')]. Проте, з вибухом конфліктів у [POL_boh_scope.GetAdjective] [ShowAreaName('silesia_area')], ми могли б скористатися цією миттєвою слабкістю, щоб захопити провінцію."
  flavor_pol.54.historical_info: "У 1343 році герцог Жагані, Генріх V «Залізний», відмовився присягнути на вірність королю Богемії Яну і спробував повернути Глогову. Польський король Казимир III «Великий» скористався цим конфліктом і окупував місто Генріха Всхову для Королівства Польського."
  flavor_pol.54.a: "Не вагаймося!"
  flavor_pol.54.b: "Наші претензії давно закінчилися."
  flavor_pol.55.title: "Пропозиція шлюбу"
  flavor_pol.55.desc: "Спільний ворог у [POL_common_enemy.GetName] об'єднав інтереси [ROOT.GetCountry.GetLongName] та [POL_partner_country.GetLongName]. Донедавна дві держави переживали надто поширену історію двох суперницьких держав, що змагалися за гегемонію у своїй місцевості. Тепер, з ворогом, який може перемогти будь-яку з них у будь-який момент, дві країни ближчі, ніж будь-коли. Щоб закріпити цей стан справ, [POL_partner_country.GetAdjective] [POL_partner_country.GetGovernment.GetEstateName('nobles_estate')] запропонували шлюб між [POL_proposed_polish_candidate.GetName] та [POL_proposed_lithuanian_candidate.GetName]."
  flavor_pol.55.a: "За будь-яку ціну!"
  flavor_pol.55.b: "Це лише тимчасовий захід."
  STATIC_MODIFIER_NAME_pol_blocked_from_marriage_betrothal: "Заручини"
  POL_accept_marriage: "Ми приймемо пропозицію шлюбу, що призведе до Персональної унії між двома націями."
  POL_accept_betrothal: "Ми приймемо пропозицію заручин, що призведе до Персональної унії між двома націями, коли двоє персонажів зможуть одружитися."
  flavor_pol.56.title: "Загроза на Півдні"
  flavor_pol.56.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] [ROOT.GetCountry.GetName] завжди мовчазно усвідомлював загрозу, яку може становити [POL_TUR_tag.GetName]. Повільне, але послідовне зростання [POL_TUR_tag.GetLongNameWithNoTooltip] за рахунок [GetCountry('BYZ').GetName] завжди викликало занепокоєння, хоча лише тепер ми усвідомлюємо, якого монстра ми дозволили вирости. З встановленим кордоном з могутнім [POL_TUR_tag.GetFlavorRank], ми відчуваємо, як загроза дихає нам у спину, спостерігаючи за кожним нашим кроком, щоб вони могли здійснити ще одну кампанію на [ShowReligionGroupAdjective('christian')] землі. Якщо ми не зможемо стримати цю силу, одного дня [POL_TUR_tag.GetNameWithNoTooltip] стане нестримним."
  flavor_pol.56.a: "Якщо до цього дійде, ми будемо Оплотом Християнства."
  flavor_pol.57.title: "[target_character.GetNameWithNoTooltip]"
  flavor_pol.57.desc: "Базиліка Святої Марії в [pol_basilica_location.GetName] потребує модернізації та покращень. Для цього ми вирішили шукати митців, які могли б використати свої навички в такому завданні, звичайно, за справедливу ціну. І така постать була знайдена, оскільки наші придворні повідомили нам про певного [target_character.GetName], який володіє величезними навичками, набутими на його батьківщині в Південно-Західній Німеччині. Оскільки [target_character.GetNameWithNoTooltip] прожив у [pol_basilica_location.GetNameWithNoTooltip] кілька років, нас запевнили, що він достатньо надійний, щоб йому можна було довірити таке завдання."
  flavor_pol.57.historical_info: "Віт Ствош був видатним німецьким скульптором з Горб-ам-Неккара, який найбільше відомий створенням вівтаря в Базиліці Святої Марії в Кракові та кількох надгробків для багатьох важливих членів польського двору. Його стиль описували як \"пізньоготичне бароко\"."
  flavor_pol.57.a: "Осиплемо його золотом!"
  flavor_pol.57.b: "Ми знайдемо когось іншого."
  flavor_pol.58.title: "Мода на [ShowRegionNameWithNoTooltip('italy_region')]"
  flavor_pol.58.desc: "Зі зростанням [ShowInstitutionName('renaissance')] в [ShowRegionName('italy_region')], цей новий рух почав поширюватися по всьому континенту. Він революціонізував мистецтво та думку, а також приніс нову хвилю наукових відкриттів, перетворивши серце руху – [ShowRegionNameWithNoTooltip('italy_region')] – на символ високої культури та процвітаючого суспільства. У такому випадку не дивно, що з одруженням [pol_ruler.GetShortName] на [pol_queen.GetShortName], придворні [ROOT.GetCountry.GetGovernment.GetRulerTitle] стали одержимими [ShowCultureGroupName('italian_group')] культурою. З такою модою багато традицій Ренесансної [ShowRegionNameWithNoTooltip('italy_region')] були принесені до [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  flavor_pol.58.historical_info: "Під впливом дружини Сигізмунда I, Бони Сфорци, італійська культура стала модною в столиці Польщі, Кракові. Таким чином, до Польщі були запрошені відомі італійські художники, і в країні почав розквітати Ренесанс."
  flavor_pol.58.a: "Просувати це захоплення!"
  flavor_pol.58.b: "Нам не потрібні ці нудні тенденції."
  flavor_pol.1000.title: "Міхал Сєндзівой"
  flavor_pol.1000.desc: "Нещодавно повернувшись з [ShowLocationName('prague')], з двору [praha_owner.GetGovernment.GetRuler.GetName], до [capital_scope.GetName] прибув відомий алхімік [michael_sedziwoj_scope.GetName].\n\nЙого науковий розум міг би стати великим благом для майбутнього [ROOT.GetCountry.GetName], спонсорування його експериментів могло б принести багато відкриттів. З іншого боку, його численні контакти по всій Європі зробили б його чудовим дипломатом."
  flavor_pol.1000.historical_info: "Польський алхімік, філософ і лікар Міхал Сєндзівой був піонером хімії. Він розробив способи очищення та створення різних кислот, металів та інших хімічних сполук. Король Сигізмунд III Ваза був ентузіастом алхімії та проводив експерименти з Сєндзівоєм. Сєндзівой проектував шахти та металургійні заводи і написав багато книг, найвідомішою з яких є #italic Нове хімічне світло#!. Книга була написана алхімічною мовою, зрозумілою лише іншим алхімікам. Сєндзівой відкрив кисень за 170 років до подібних відкриттів Шееле та Прістлі, назвавши його \"їжею життя\"."
  flavor_pol.1000.a: "Спонсорувати його експерименти."
  flavor_pol.1000.b: "Найняти його радником."
  flavor_pol.1000.c: "Ігнорувати його."
  flavor_pol.1001.title: "Нове хімічне світло"
  flavor_pol.1001.desc: "Численні алхімічні експерименти [michael_sedziwoj_scope.GetName] є насолодою для допитливого [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Але для [ShowEstateTypeName('nobles_estate')] вони є неприємністю та дорогою і зайвою тратою золота для скарбниці [ROOT.GetCountry.GetFlavorRank].\n\nЧи варто нам продовжувати фінансувати роботу [michael_sedziwoj_scope.GetNameWithNoTooltip]?"
  flavor_pol.1001.a: "Продовжувати спонсорувати його експерименти."
  flavor_pol.1001.b: "Прислухатися до шляхти."
  flavor_pol.1100.title: "Ян Замойський"
  flavor_pol.1100.desc: "Син дому [ShowDynastyName('zamoyski_dynasty')], [john_zamoyski_scope.GetName] нещодавно повернувся до [ROOT.GetCountry.GetFlavorRank]. Він провів свою юність, навчаючись за кордоном, у [ShowLocationName('paris')], [ShowLocationName('strasbourg')], отримав докторський ступінь з права в Університеті [ShowLocationName('padova')] і навіть обійняв посаду ректора юридичного факультету цього Університету. Його знання та контакти можуть зробити його надзвичайним державним діячем.\n\nЧи варто нам запросити його приєднатися до нашого двору та служити [ROOT.GetCountry.GetLongName]?"
  flavor_pol.1100.a: "Найняти його радником."
  flavor_pol.1100.b: "Ігнорувати його."
  flavor_pol.1101.title: "Замойська академія"
  flavor_pol.1101.desc: "[john_zamoyski_scope.GetName] шукає нашої допомоги у створенні нового [ShowBuildingTypeName('university')] у [ShowLocationName('krasnystaw')]. Він уявляє академію для молодих [ShowEstateTypeName('nobles_estate')], де їх навчатимуть [ShowSocietyDirectionName('humanist')] культурі та готуватимуть до обов'язків державного діяча. За зразком Академії [ShowLocationName('strasbourg')] вона навчатиме своїх студентів вільним мистецтвам, праву та медицині."
  flavor_pol.1101.historical_info: "Польський коронний канцлер Ян Замойський заснував Замойську академію в 1594 році, яка стала четвертим вищим навчальним закладом, заснованим у Речі Посполитій. Поет Шимон Шимонович, також відомий як Симон Симонідес, допомагав Яну Замойському із заснуванням і став одним із викладачів Академії. Папа Климент VIII схвалив заснування, як і єпископ Холмський Станіслав Гомолінський. Академія відкрилася 15 березня 1595 року, а король Польщі Сигізмунд III Ваза підтвердив акт у 1601 році. Три факультети академії були: вільні мистецтва, право та медицина. Вона мала сім професорських посад, а з 1637 року школа отримала право присуджувати дипломи доктора філософії."
  flavor_pol.1101.a: "Спонсорувати університет."
  flavor_pol.1101.b: "Нічого не робити."
  flavor_pol.1102.title: "Ідеальне місто - $zamosc$"
  flavor_pol.1102.desc: "[john_zamoyski_scope.GetName], натхненний теоріями «ідеального міста» [ShowCultureGroupName('italian_group')] [ShowInstitutionName('renaissance')], почав уявляти будівництво нового міста, яке було б спроектоване з урахуванням цих ідеалів. Допомогти в цьому процесі покликаний [pol_bernardo_morando_scope.GetName], який вже служив у [ShowLocationName('warsaw')]. Ми могли б надати [john_zamoyski_scope.GetNameWithNoTooltip] додаткові кошти, що забезпечило б успішне виконання цього проекту та заслужило б прихильність [pol_bernardo_morando_scope.GetNameWithNoTooltip]."
  flavor_pol.1102.historical_info: "Замостя було засноване польським коронним канцлером Яном Замойським у 1579 році та отримало міські права роком пізніше. Наміром засновників було спроектувати «ідеальне місто» згідно з ідеалами Відродження. Для допомоги в цьому процесі був запрошений Бернардо Морандо з Венеціанської республіки. Ці зусилля окупилися, оскільки Замостя вважається «Падуєю Півночі»."
  flavor_pol.1102.a: "Надати кошти."
  flavor_pol.1102.b: "Нічого не робити."
  flavor_pol.1200.title: "[nicholas_copernicus_scope.GetNameWithNoTooltip]"
  flavor_pol.1200.desc: "Після років навчання в [ShowRegionName('italy_region')] молодий племінник єпископа [ShowLocationName('lidzbark')], [nicholas_copernicus_scope.GetName], вступив до нього на службу секретарем і лікарем. Під час кількох сесій [ROOT.GetCountry.GetGovernment.GetParliament.GetName] молодий чоловік відзначився як дуже здібний та інтелігентний адміністратор."
  flavor_pol.1200.a: "Ігнорувати його."
  flavor_pol.1200.b: "[nicholas_copernicus_scope.GetHerHis|U] присутність є перлиною для [capital_scope.GetNameWithNoTooltip]"
  flavor_pol.1201.title: "$revolution_spheres$"
  flavor_pol.1201.desc: "[nicholas_copernicus_scope.GetName] неохоче опублікував дивовижний і полемічний астрономічний трактат. У ньому [nicholas_copernicus_scope.GetShortNameWithNoTooltip] стверджує, що Земля не є центром Творіння, а натомість обертається навколо Сонця разом з іншими планетами. Навіть якщо технічна сутність тексту обмежила його поширення серед найобізнаніших астрономів та академіків, він вже почав викликати крики про єресь, оскільки його теорії суперечать птолемеївським ідеям, які відповідали Святому Письму."
  flavor_pol.1201.historical_info: "У 1543 році, році своєї смерті, Миколай Коперник опублікував працю «Про обертання небесних сфер». #italic праця#! обстоювала геліоцентричну модель всесвіту на противагу поширеному птолемеївському погляду на всесвіт, центрований на Землі. Ця #italic праця#! загрожувала буквальній істині Біблії, а також давно усталеному геоцентричному погляду на всесвіт. Коперник не мав математичного обґрунтування для свого аргументу, але це було надано пізнішими поколіннями астрономів і математиків."
  flavor_pol.1201.a: "Вилучити її з обігу."
  flavor_pol.1201.b: "Знищити єретичну книгу."
  flavor_pol.1201.c: "Дозволити їй продовжувати друкуватися."
  flavor_pol.1300.title: "[target_character.GetNameWithNoTooltip]"
  flavor_pol.1300.desc: "Певна висхідна зірка здобула собі ім'я. [target_character.GetName] — поет, який нещодавно почав створювати амбітні твори, що принесли йому славу в [ROOT.GetCountry.GetName]. Подорожуючи по всій $poland$ та її околицях, [target_character.GetShortNameWithNoTooltip] безумовно є освіченою людиною, яка ідеально підійшла б для [ROOT.GetCountry.GetGovernment.GetCourtTitle] [ruler_scope.GetName]."
  flavor_pol.1300.historical_info: "Ян Кохановський вважається одним із найвидатніших польських поетів Відродження. Окрім внеску в мистецтво, він також був секретарем самого короля та перекладачем."
  flavor_pol.1300.a: "Його навички будуть корисними."
  flavor_pol.1300.b: "У нас і так достатньо придворних."
  flavor_pol.1301.title: "Тренодії [target_character.GetNameWithNoTooltip]"
  flavor_pol.1301.desc: "[target_character.GetName] створив прекрасну, але сумну серію з дев'ятнадцяти елегій, присвячених втраті близьких, що мало величезний вплив на добробут нашого поета. Ми, безумовно, сподіваємося, що слава його тренодій дозволить йому знайти внутрішній спокій, оскільки його трагедія буде відома протягом десятиліть."
  flavor_pol.1301.historical_info: "«Ламенти» Кохановського 1580 року, безумовно, є одним з найвпливовіших і найпопулярніших творів поета та польського Відродження в цілому. Вишукана літературна форма віршів є видатною, і вони стали прикладом для наслідування в наступні десятиліття."
  flavor_pol.1301.a: "Це водночас гнітюче та дивовижне."
  flavor_pol.1400.title: "[target_character.GetNameWithNoTooltip]"
  flavor_pol.1400.desc: "[target_character.GetName] звернувся до [ruler_scope.GetName] з цікавою пропозицією. Навчаючись у Краківській академії в 1428 році, він захопився працями [GetCharacter('pol_wincenty_kadlubek').GetName], літописця 12 століття. Натхненний цим, він вирішив присвятити себе створенню хроніки [ROOT.GetCountry.GetLongName]. Окрім того, що [target_character.GetShortNameWithNoTooltip] є літописцем, він має багато інших навичок і міг би служити дипломатом або адміністратором."
  flavor_pol.1400.historical_info: "Ян Длугош, народжений 1415 року, є важливим літописцем 15 століття Польщі. Син Яна Длугоша, який брав участь у битві під Грюнвальдом, він є найвідомішим з усіх чотирнадцяти своїх синів, двоє з яких, крім нього, також носили ім'я Ян. Він служив секретарем, дипломатом і літописцем польських королів."
  flavor_pol.1400.a: "За будь-яких обставин ми допоможемо йому."
  flavor_pol.1400.b: "У нас і так достатньо придворних."
  flavor_pol.1401.title: "Annales Seu Cronicae Incliti Regni Poloniae"
  flavor_pol.1401.desc: "Життєва праця [target_character.GetName], безумовно, — це його знамениті хроніки, що охоплюють історію [ROOT.GetCountry.GetName] від легендарного заснування герцогства до сучасності. У роботі також міститься огляд поточного стану, в якому перебуває [ROOT.GetCountry.GetFlavorRank], що включає географічний огляд та гідрографію держави, а також інші деталі, які інакше були б втрачені з часом."
  flavor_pol.1401.a: "[ROOT.GetCountry.GetNameWithNoTooltip] не буде забута в анналах історії."
  flavor_pol.1500.title: "[mikolaj_rej_scope.GetNameWithNoTooltip]"
  flavor_pol.1500.desc: "[mikolaj_rej_scope.GetName] став дещо відомою постаттю в [ROOT.GetCountry.GetLongName]. Син шляхтича, він волів проводити час у гулянках, аніж у навчанні. У пізніші роки, поза Краківською академією, [mikolaj_rej_scope.GetLastNameWithNoTooltip] не лише набув поетичних навичок, але й став дуже активним у політичному житті [ROOT.GetCountry.GetFlavorRank]. Служачи під керівництвом [ShowReligionAdjective('calvinist')] шляхтича, він також потрапив під вплив [ShowReligionName('lutheran')] та [ShowReligionNameWithNoTooltip('calvinist')]. Цей протестантизм прив'язав його до написання творів [ShowDialectName('polish_dialect')]."
  flavor_pol.1500.historical_info: "Миколай Рей зазвичай вважається автором праць, спрямованих на популяризацію використання польської мови як літературної. Переважно писавши цією мовою, його вірш 1562 року був увічнений у прислів'ї: «Поляки не гуси, вони мають свою мову»."
  flavor_pol.1500.a: "Будь-який поет вітається!"
  flavor_pol.1500.b: "У нас і так достатньо придворних."
  flavor_pol.1501.title: "Твори [target_character.GetNameWithNoTooltip]"
  flavor_pol.1501.desc: "Працевлаштування [target_character.GetName] є непростою справою для [ShowReligionAdjective('catholic')] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Хоча мало хто може заперечити його майстерність у письмі, для багатьох антиклерикалізм та неповага до [ShowReligionAdjectiveWithNoTooltip('catholic')] релігії є помилкою в літературі. Яскравим прикладом цього є поетичний діалог під назвою «#italic Коротка розмова між трьома особами: паном, війтом і священиком#!»."
  flavor_pol.1501.historical_info: "$flavor_pol.1500.historical_info$"
  flavor_pol.1501.a: "Ми вільна країна і не будемо цензурувати цей твір."
  flavor_pol.1501.b: "Цього не можна допустити!"
  POL_every_lutheran_calvinist_hussite_pop_displeased_tt: "Кожен [ShowReligionAdjective('calvinist')] та [ShowReligionAdjective('lutheran')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  flavor_pol.1600.title: "Застава [ShowProvinceDefinitionNameWithNoTooltip('szepes_province')]"
  flavor_pol.1600.desc: "Наші нещодавні подвиги залишили нашу скарбницю справді спустошеною. Наш військовий скарб не тільки вичерпаний, але ми маємо дефіцит, який незабаром зробить нас безпорадними проти наших багатших ворогів. У такому випадку ми могли б звернутися до наших друзів у [pol_the_loan_provider.GetLongName]. Завдяки їхній грошовій підтримці ми могли б отримати додаткові кошти, не маючи справу з нашими владолюбними станами, завжди охочими забезпечити собі додаткові права за їхній «доброзичливий» дозвіл на запровадження додаткових податків. Позика від співправителя, безсумнівно, буде надійнішою."
  flavor_pol.1600.a: "Ми запропонуємо [pol_the_loan_provider.GetAdjectiveWithNoTooltip] села в [ShowProvinceDefinitionNameWithNoTooltip('szepes_province')]."
  flavor_pol.1600.b: "Ми можемо впоратися з нашими дефіцитами самостійно."
  flavor_pol.1601.title: "$flavor_pol.1600.title$"
  flavor_pol.1601.desc: "Прибули посланці з [pol_requesting_nation.GetLongName], які просять грошової підтримки у вигляді позики. На жаль, вірність, навіть серед союзників, часто досить мінлива. Ось чому [pol_requesting_nation_ruler.GetName] з [pol_requesting_nation.GetNameWithNoTooltip] запропонував кілька сіл у районі [ShowProvinceDefinitionName('szepes_province')] як гарантію повернення позики. Це підприємство може бути досить ризикованим, але з їхніми територіями під нашим контролем ми можемо бути впевнені, що вони двічі подумають, перш ніж не виконати зобов'язання."
  flavor_pol.1601.a: "Звучить добре!"
  flavor_pol.1601.b: "Ми не можемо позичати тому, хто не може керувати своїми фінансами."
  LOAN_TITLE_pledge_of_spisz: "Застава Спишу"
  LOAN_SHORT_NAME_pledge_of_spisz_L: "Застава Спишу"
  LOAN_SHORT_NAME_pledge_of_spisz_B: "Застава Спишу"
  LOAN_NAME_pledge_of_spisz_L: "Застава Спишу"
  LOAN_NAME_pledge_of_spisz_B: "Застава Спишу"
  LOAN_TOOLTIP_pledge_of_spisz: "Угода між двома сторонами, згідно з якою [Concept('lender', 'CONCEPT_PLACEHOLDER')|e], [LOAN.GetLender.GetName], утримує [Concept('location', 'CONCEPT_PLACEHOLDER')|e] [ShowLocationName('lubica')], доки [Concept('borrower', 'CONCEPT_PLACEHOLDER')|e], [LOAN.GetBorrower.GetName], не поверне позику."
  flavor_pol.1602.title: "Позику повернено"
  flavor_pol.1602.desc: "У минулі часи ми позичили [loan_repayer.GetLongName] багато коштів у позику, яка була забезпечена заставою сіл [ShowProvinceDefinitionName('szepes_province')] нам, внаслідок чого ми отримали територію в [loan_pledge.GetName]. Сьогодні озброєні посланці прибули з [loan_repayer.GetNameWithNoTooltip], несучи кошти, які [loan_repayer.GetFlavorRank] нам заборгував. Згідно з угодою, ми повинні повернути [loan_pledge.GetNameWithNoTooltip], хоча це ризикувало б засмутити [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які вже влаштувалися в цьому районі. Альтернативно, ми могли б спробувати представити їм дуже законний документ, який виправдовує наше рішення залишити села в наших руках."
  flavor_pol.1602.a: "Ми повернемо [loan_pledge.GetNameWithNoTooltip]."
  flavor_pol.1602.b: "Будь ласка, прийміть цей законний пакт, що виправдовує наше постійне володіння."
  STATIC_MODIFIER_NAME_pol_honored_agreement: "Дотримано Застави [ShowProvinceDefinitionName('szepes_province')] Угоди"
  flavor_pol.1603.title: "Доля позики"
  flavor_pol.1603.desc.a: "Ми повністю розрахувалися з [loan_giver.GetAdjective], проте вони відмовляються повернути нам села [ShowProvinceDefinitionName('szepes_province')]. Посилаючись на якийсь вигаданий пакт, який вони, безсумнівно, сфабрикували, вони намагалися запевнити нас, що [loan_pledge.GetName] залишається у них. Як безглуздо! Їхня оманлива тактика призведе їх до загибелі."
  flavor_pol.1603.desc.b: "Посланці, яких ми відправили до [loan_giver.GetLongName], несучи суму, яку ми їм заборгували, прибули благополучно і повністю все сплатили. Згідно з угодою, місцевий губернатор [loan_giver.GetNameWithNoTooltip] відступив, дозволивши нашому кандидату взяти правління. [loan_pledge.GetName|U] тепер під нашим контролем."
  flavor_pol.1603.b: "[ROOT.GetCountry.GetReligion.GetGodName] судитиме їх."
  flavor_pol.1603.a: "Гарні справи!"