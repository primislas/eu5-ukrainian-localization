l_english:
  flavor_bng.1.title: "Вплив [target_artist.GetNameWithNoTooltip]"
  flavor_bng.1.desc: "[target_artist.GetName], походячи з впливової родини, здобув широке визнання як вчений та письменник, зберігаючи вчення суфійського ордену Чишті в [ROOT.GetCountry.GetName]. З його зростаючою славою серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], ми могли б підвищити наш власний авторитет серед населення, запросивши його до двору та спонсоруючи його. Це ще більше посилило б вплив ордену в нашій країні, закріпивши їхні цінності в нашому суспільстві."
  flavor_bng.1.a: "Заступімося за нього!"
  flavor_bng.1.b: "Він нам не потрібен."
  flavor_bng.1.historical_info: "Нур Кутб Алам був лідером суфійського ордену Чишті в Бенгалії наприкінці XIV та на початку XV століття. Орден Чишті користувався довготривалим заступництвом мусульманських правителів Бенгалії. Під його керівництвом орден зберіг мусульманську присутність під час правління Раджі Ганеші, індуса."
  flavor_bng.2.title: "Літературні починання [target_artist.GetNameWithNoTooltip]"
  flavor_bng.2.desc: "Під нашим постійним заступництвом [ROOT.GetCountry.GetCulture.GetName] культура процвітає, і численні митці зробили [ROOT.GetCountry.GetCapital.GetName] своєю постійною резиденцією. [target_artist.GetName] працював над епосом про пророків [ShowReligionGroupName('muslim')]. Ця праця є перекладом #italic Qaṣaṣ al-anbiyā'#! на [ShowLanguageName('bengali_language')] мову, і якщо ми спонсоруємо публікацію, це може піднести наші рідні літературні твори на нові висоти."
  flavor_bng.2.a: "Це ознаменує початок нової літературної епохи!"
  flavor_bng.2.b: "Ми не повинні витрачати гроші на це."
  flavor_bng.3.title: "Місто мечетей [target_character.GetNameWithNoTooltip]"
  flavor_bng.3.desc: "Походячи з нашого регіонального [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [target_character.GetName] перетворив територію навколо [ShowLocationName('khalifatabad')] на прекрасне місто мечетей та мостів. Оскільки місто розташоване в дельті Гангу, це було непростим завданням. Незважаючи на це, в його вмілих руках [ShowLocationNameWithNoTooltip('khalifatabad')] швидко стає видатним центром серед наших монетних міст."
  flavor_bng.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_bng.4.title: "Монетні міста [ShowAreaNameWithNoTooltip('bengal_area')] процвітають"
  flavor_bng.4.desc: "З впровадженням нових монетних дворів у районі [ShowAreaName('bengal_area')] приходить велике економічне зростання. Стабільне постачання монет призводить не тільки до відомої міцної валюти, але й до переваги іноземних купців торгувати в наших портах та містах."
  flavor_bng.4.a: "Ми багаті!"
  flavor_bng.5.title: "Мечеть Адіна в [ShowLocationNameWithNoTooltip('pandua')]"
  flavor_bng.5.desc: "[target_character.GetName] бажає відсвяткувати нашу важко здобуту незалежність від тиранічного правління [GetCountry('DLH').GetName] шляхом прикрашання нещодавно замовленої [ShowBuildingTypeName('cathedral')] в [ShowLocationName('pandua')]. Для цього монументального починання ми повинні найняти лише найкращих архітекторів, обізнаних у стилях [ShowRegionName('persia_region')] та [ShowRegionName('crescent_region')]. Хоча це було б досить дорого, це показало б нашу пишність і закріпило б нашу спадщину на століття вперед."
  flavor_bng.5.historical_info: "Мечеть Адіна була замовлена Сікандаром Шахом у 1373 році. Розташована в імперській столиці Пандуа, мечеть імітувала дизайн сасанідської перської архітектури з подальшим натхненням для будівлі, що походило від Великої мечеті Дамаска. Вона була розроблена для підтвердження імперських амбіцій Бенгальського султанату та для прославлення перемог над Делійським султанатом у XIV столітті, забезпечуючи незалежність молодої країни."
  flavor_bng.5.a: "Чудовий план."
  flavor_bng.5.b: "У нас немає грошей на такі розкішні будівлі."
  flavor_bng.6.title: "Сусідні держави"
  flavor_bng.6.desc: "Оскільки [target_character.GetName] бажає об'єднати [ShowRegionName('bengal_region')], [target_character.GetHeShe] почав збирати армію та спричиняти прикордонні конфлікти з навколишніми державами, сподіваючись спровокувати їх на війну."
  flavor_bng.6.a: "Об'єднаймо [ShowRegionNameWithNoTooltip('bengal_region')]!"
  flavor_bng.6.b: "Підтримувати стабільність краще."
  flavor_bng.7.title: "[target_location.GetNameWithNoTooltip]"
  flavor_bng.7.desc: "[target_location.GetRank.GetName] [target_location.GetName] був центром суфійських вчених у [ShowRegionName('bengal_region')], що дозволило його вулицям і населенню процвітати. Під нашим контролем ми, можливо, зможемо зробити його столицею [ROOT.GetCountry.GetName]."
  flavor_bng.7.a: "Нехай [target_location.GetNameWithNoTooltip] процвітає!"
  flavor_bng.7.b: "[target_character.GetNameWithNoTooltip] віддає перевагу осідку [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_bng.8.title: "[ShowReligionAdjectiveWithNoTooltip('hindu')] Претендент"
  flavor_bng.8.desc: "[ShowReligionAdjective('hindu')] населення в [ROOT.GetCountry.GetName] згуртувалося навколо місцевого губернатора. Його/її ім'я — [target_character.GetName], простолюдин скромного походження, який втомився від [ShowReligionGroupAdjective('muslim')] правління в [ROOT.GetCountry.GetNameWithNoTooltip], бажаючи узурпувати трон [ROOT.GetCountry.GetNameWithNoTooltip] у [target_character2.GetName]."
  flavor_bng.8.a: "Можливо, настав час для нового керівництва..."
  flavor_bng.8.b: "До зброї!"
  bng_muslim_nobles_become_disloyal_tt: "Усі наші не-[ShowReligionAdjective('hindu')] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  bng_hindus_become_disloyal_tt: "Усі [ShowReligionAdjective('hindu')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  flavor_bng.9.title: "Просування суфізму"
  flavor_bng.9.desc: "Суфійські практики набули популярності в [ROOT.GetCountry.GetName]. Багато святинь було присвячено їм, і навіть кілька людей у [ROOT.GetCountry.GetGovernment.GetCourtTitle] дотримуються їхніх ідей. Можливо, ми зможемо спонсорувати їх ще більше."
  flavor_bng.9.a: "Ми будемо просувати суфійські практики."
  flavor_bng.9.b: "Немає потреби витрачати ресурси на це."
  flavor_bng.10.title: "Пріоритет [ShowRegionNameWithNoTooltip('bengal_region')]"
  flavor_bng.10.desc: "Землі регіону [ShowRegionName('bengal_region')] багаті на ресурси. [target_character.GetName] та його/її [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажають експлуатувати ці ресурси, створюючи нові міста та утверджуючи [ROOT.GetCountry.GetName] як економічного гегемона."
  flavor_bng.10.a: "Почнімо внутрішню експансію."
  flavor_bng.10.b: "Ми вже маємо хороше економічне становище."
  flavor_bng.11.title: "Традиції суднобудування"
  flavor_bng.11.desc: "[ROOT.GetCountry.GetCulture.GetName] народ мав значну присутність у [ShowProvinceDefinitionName('bengal_high_sea_zones_province')] у минулому, забезпечуючи контроль над узбережжям та торговими шляхами. Ми підтримували один із найсильніших флотів в $india$ і мали спадщину суднобудування в регіоні. Ми повинні також просувати цю традицію, зміцнюючи наш порт у [target_location.GetName]."
  flavor_bng.11.a: "Наш флот процвітатиме."
  flavor_bng.11.b: "Зміцнення нашої землі важливіше."
  bng_buff_naval_parliament_debate_tt: "Протягом #Y 20#! років, [ShowParliamentIssueType('increase_naval_spending')] тепер надаватиме #G +5%#! [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e] до [ShowSocietyDirectionName('naval')]"
  flavor_bng.12.title: "$firoz_minar$"
  flavor_bng.12.desc: "З одержимістю [target_character.GetName] архітектурою, він/вона вирішив/ла створити вежу, натхненну архітектурою [ShowDynastyName('tughlaq_dynasty')]. Названа $firoz_minar$, вона має на меті вшанувати перемоги [target_character.GetNameWithNoTooltip]."
  flavor_bng.12.a: "Головний архітектор зробить її найвищою вежею!"
  flavor_bng.12.b: "Яку мету слугує проста вежа?"
  flavor_bng.13.title: "$dakhil_darwaza$"
  flavor_bng.13.desc: "Щоб укріпити цитадель [target_location.GetName], [target_character.GetName] бажає створити новий головний вхід для [target_location.GetRank.GetName], назвавши його $dakhil_darwaza$. [target_character.GetSheHe|U] прагне перетворити його на найелегантніші та найбільші ворота в межах $india$. Це було б дорого, але славно."
  flavor_bng.13.a: "Нехай ці ворота будуть збудовані."
  flavor_bng.13.b: "[target_location.GetNameWithNoTooltip] вже укріплено."
  flavor_bng.14.title: "$kusumba_mosque$"
  flavor_bng.14.desc: "Кілька мечетей у [ShowRegionName('bengal_region')] наслідували архітектуру [target_character.GetDynasty.GetName], багато з них вже були збудовані в цьому стилі. [target_character.GetName] був одержимий створенням нової, у зовсім іншому стилі. Назвавши її $kusumba_mosque$, [target_character.GetSheHe] стверджує, що вона стане чорною перлиною [ShowRegionNameWithNoTooltip('bengal_region')]."
  flavor_bng.14.historical_info: "Під час розквіту правління Сурі над Бенгалією, кілька мечетей було збудовано цими правителями по всьому володінню. Хоча більшість з них наслідували той самий стиль, мечеть Кусумба наслідувала стиль старіших, незалежний від стилю афганських правителів."
  flavor_bng.14.a: "Це буде велична мечеть."
  flavor_bng.14.b: "$india$ не потребує більше таких."
  flavor_bng.14.c: "Вона буде найвеличнішою в усьому [ShowReligionGroupNameWithNoTooltip('muslim')]."
  flavor_bng_1000_shared: "Відносини з $china$"
  flavor_bng.1000.title: "$flavor_bng_1000_shared$"
  flavor_bng.1000.desc: "[GetInternationalOrganization('middle_kingdom').GetName] на чолі з [target_country.GetName] може виявитися цінними союзниками. Хоча не зовсім певно, чи зможемо ми переконати їх підтримати нас у будь-якому конфлікті, ми можемо, принаймні, відправити до них емісарів, щоб зміцнити відносини між обома володіннями."
  flavor_bng.1000.a: "Це варте зусиль."
  flavor_bng.1000.b: "Немає потреби робити їх нашими союзниками"
  bng_no_diplomatic_ties_tt: "Ми не відправимо жодного посольства до [target_country.GetName]"
  flavor_bng.1001.title: "$flavor_bng_1000_shared$"
  flavor_bng.1001.desc: "[target_country2.GetName] відправило посольство до [ROOT.GetCountry.GetCapital.GetName], сподіваючись встановити кращі відносини та, можливо, дізнатися про способи нашого управління. Хоча ми могли б збільшити наш вплив там, ділитися нашими способами з чужинцями може бути не найкращою ідеєю."
  flavor_bng.1001.a: "Вітаймо їх!"
  flavor_bng.1001.b: "Їх тут не приймають."
  bng_rejected_agreement_tt: "[target_country2.GetName] не отримає жодних бонусів"