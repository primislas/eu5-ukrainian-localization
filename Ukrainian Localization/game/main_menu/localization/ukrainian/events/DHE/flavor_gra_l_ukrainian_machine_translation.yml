l_english:
  flavor_gra.1.title: "Мавританські біженці"
  flavor_gra.1.desc: "В ім'я Аллаха, Милостивого, Милосердного. Гранада впала до рук невірних! Остання перлина аль-Андалусу, маяк знань, тепер у кастильських руках. Поки ісламський світ оговтується від цієї втрати, мавританські біженці стікаються до мусульманських міст і дворів Північної Африки та Близького Сходу, приносячи з собою знання, праці видатних вчених, таких як Абу аль-Валід ібн Рушд, Абу аль-Касім аль-Захраві та Абу Бакр ібн Туфайл. Запрошення цих біженців до [ROOT.GetCountry.GetName] може значно посилити наші власні зусилля в галузі науки та культури."
  flavor_gra.1.a: "Будь-що, запросіть їх до [ROOT.GetCountry.GetName]!"
  flavor_gra.1.b: "Ні, вони нам не потрібні."
  flavor_gra.2.title: "Емірат Сицилія"
  flavor_gra.2.desc: "У минулі віки Емірат Сицилія був непохитним бастіоном нашої віри; міцно тримався, доки хрестоносці не завоювали острів у 1087 році.\n\nТепер, коли ми володіємо цією бажаною землею, ми більше не втратимо над нею контроль!"
  flavor_gra.2.a: "Абсолютна влада вимагає абсолютного правління."
  STATIC_MODIFIER_NAME_sicily_in_safe_hands: "Адміністративні інвестиції"
  STATIC_MODIFIER_NAME_DESC_sicily_in_safe_hands: "Сицилія краще служить нам під нашим прямим контролем – таким чином, ми можемо інвестувати більше ресурсів у заохочення острова до процвітання."
  flavor_gra.3.title: "Допомога від [GetCountry('TUR').GetNameWithNoTooltip]"
  flavor_gra.3.desc: "Оскільки ми зараз перебуваємо у війні проти [GetCountry('CAS').GetName], яка може виявитися безнадійною, ми повинні відправити відчайдушні благання вірним за морем про допомогу. [GetCountry('TUR').GetGovernment.GetRuler.GetDynasty.GetName] може прийти нам на допомогу, якщо ми тільки зможемо витримати приниження прохання до них!"
  flavor_gra.3.a: "Вони наша єдина надія!"
  flavor_gra.3.tt: "[GetCountry('TUR').GetNameWithNoTooltip|U] може захистити нас від [GetCountry('CAS').GetNameWithNoTooltip]"
  flavor_gra.3.b: "Ми повинні стояти самі."
  flavor_gra.3.historical_info: "Насрідські правителі Гранади відправили послів як до османів, так і до $mamluks$, щоб шукати допомоги проти Кастилії. Османи посилювали свою присутність у Західному Середземномор'ї, і Гранада з ентузіазмом планувала висадку 200 000 турецьких військ у Валенсії для їх підтримки."
  flavor_gra.4.title: "Невтішна відповідь"
  flavor_gra.4.desc: "Ми отримали звістку від [GetCountry('TUR').GetName], що вони #italic не#! прийдуть нам на допомогу. Хоч як би вони того бажали, вони стверджують, що мають інші нагальні справи, але у своєму листі вони красномовно хвалили давню славу аль-Андалусу – чого б це не вартувало зараз."
  flavor_gra.4.a: "Ми повинні боротися далі!"
  flavor_gra.4.historical_info: "Правителі Гранади відчайдушно сподівалися на османську та $mamluk$ підтримку. Однак османи та $mamluks$ незабаром втягнулися у війну один проти одного і не змогли надати значної прямої допомоги. Турки відправили флот під командуванням Кемаля Рейса, який здійснював набіги на кастильські володіння в Західному Середземномор'ї, і цей флот пізніше допоміг переправити багатьох біженців через море."
  ibn_khaldun_patronage: "Людина надзвичайного інтелекту та репутації прибула до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetName], відомий історик і філософ, шукає покровительства, щоб продовжити [target_character.GetHerHis] навчання та праці. Відомий [target_character.GetHerHis] проникливими поглядами на управління, економіку, а також піднесення та падіння імперій, [target_character.GetHerHis] присутність могла б підняти престиж нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] та надати нам безцінні поради. Чи надамо ми [target_character.GetHerHim] бажану посаду?"
  flavor_gra.5.title: "[target_character.GetNameWithNoTooltip] Просить покровительства"
  flavor_gra.5.desc: "$ibn_khaldun_patronage$"
  flavor_gra.5.a: "Дуже добре."
  flavor_gra.5.b: "Нам байдуже до таких марнотратних витрат!"