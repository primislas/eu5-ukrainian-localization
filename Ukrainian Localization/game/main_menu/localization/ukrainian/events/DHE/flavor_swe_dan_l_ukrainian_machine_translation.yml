l_english:
  flavor_swe_dan.1.title: "Доля Південного Галланду"
  flavor_swe_dan.1.desc: "[GetCountry('DAN').GetLongName] досі в боргах, а ми маємо зайві кошти. Ми могли б запропонувати купити [ShowLocationName('laholm')] та [ShowLocationName('asbo')] у них, щоб об'єднати наші землі в Сканії."
  flavor_swe_dan.1.historical_info: "У 1341 році король Швеції Магнус IV Ерікссон придбав південний Галланд у збіднілих данців. Купівля стала дипломатичною та стратегічною перемогою, забезпечивши Швеції сильнішу присутність на західному узбережжі та ближчий доступ до ключових торговельних шляхів. Хоча Галланд пізніше став полем битви між Данією та Швецією, це придбання ознаменувало раннє утвердження шведського впливу в регіоні."
  flavor_swe_dan.1.a: "Зробити пропозицію!"
  flavor_swe_dan.1.b: "Ми можемо краще витратити гроші деінде."
  flavor_swe_dan_offer: "Якщо вони погодяться, ми заплатимо #Y 250#!@gold!"
  flavor_swe_dan.2.title: "$flavor_swe_dan.1.title$"
  flavor_swe_dan.2.desc: "Ми досі в боргах, і тепер [GetCountry('SWE').GetLongName] запропонувала купити [ShowLocationName('laholm')] та [ShowLocationName('asbo')]. Що нам робити?"
  flavor_swe_dan.2.a: "Нам потрібні гроші!"
  flavor_swe_dan.2.b: "Це наша земля!"
  flavor_swe_dan.3.title: "Данці погоджуються"
  flavor_swe_dan.3.desc: "[GetCountry('DAN').GetLongName] прийняли нашу пропозицію купити [ShowLocationName('laholm')] та [ShowLocationName('asbo')]. Тепер наші землі в Сканії об'єднані."
  flavor_swe_dan.3.a: "Вони будуть нашими назавжди..."
  flavor_swe_dan.4.title: "Данці відмовляються"
  flavor_swe_dan.4.desc: "[GetCountry('DAN').GetLongName] відмовилися від нашої пропозиції купити [ShowLocationName('laholm')] та [ShowLocationName('asbo')]. Це заслуговує на військову відповідь!"
  flavor_swe_dan.4.a: "Це означає війну!"