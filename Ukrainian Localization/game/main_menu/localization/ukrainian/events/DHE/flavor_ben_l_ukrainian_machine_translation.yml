l_english:
  flavor_ben.1.title: "$walls_of_benin$"
  flavor_ben.1.desc: "Процвітання [target_location.GetName] залежить від її стін. З цієї причини [target_character.GetName] вирішив, що настав час їх розширити. Такий проєкт буде коштовним, але він дозволить [target_location.GetRank.GetName] досягти нових висот."
  flavor_ben.1.a: "Збудуймо ці стіни."
  flavor_ben.1.b: "Рівів достатньо, щоб захистити [target_location.GetNameWithNoTooltip]."
  flavor_ben.2.title: "Адміністрація в містах"
  flavor_ben.2.desc: "[ROOT.GetCountry.GetName] було централізовано в [ROOT.GetCountry.GetCapital.GetName] замість численних локацій всередині неї. Замість того, щоб просто пропонувати їм захист, ми можемо створити адміністрацію, яка безпосередньо підкоряється [target_character.GetName]. Вони будуть керуватися через [GetBuildingName('eghabho_nore_mansion')], де проживають урядовці, які безпосередньо підкоряються [target_character.GetNameWithNoTooltip]."
  flavor_ben.2.a: "[ROOT.GetCountry.GetNameWithNoTooltip] буде централізовано!"
  flavor_ben.2.b: "Поточна система є прийнятною."
  flavor_ben.3.title: "Обмеження [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  flavor_ben.3.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] занадто довго вирішували питання престолонаслідування в [ROOT.GetCountry.GetName]. Їхній вплив порушує стабільність [ROOT.GetCountry.GetFlavorRank] заради власних інтересів. [target_character.GetName] та [target_character.GetHerHis] лоялісти втомилися від цієї олігархії і бажають її скасувати. Вони планують організувати кілька вбивств цих впливових людей, які перешкоджають правлінню [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]. Однак такі дії можуть призвести до їхнього повстання."
  flavor_ben.3.a: "Кілька «нещасних випадків» можна влаштувати."
  flavor_ben.3.b: "Так не можна поводитися з підданими!"
  ben_purge_non_innocent_nobles_tt: "#Y 5%#! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] в [ROOT.GetCountry.GetCapital.GetName] буде #R вбито#!"
  flavor_ben.4.title: "Повстання [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]!"
  flavor_ben.4.desc: "Через наші дії проти [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], вони об'єдналися і повстали проти [target_character.GetName]. Тепер вони бажають позбутися [target_character.GetHerHis] впливу, повернувши [ROOT.GetCountry.GetFlavorRank] до своїх рук. Це справді перетворилося на кризу, але чи повинні прихильники [target_character.GetNameWithNoTooltip] повстати, чи вони повинні схилити коліна перед вимогами [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]?"
  flavor_ben.4.a: "До зброї!"
  flavor_ben.4.b: "Можливо, вони мають рацію..."
  ben_all_nobles_join_revolt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] приєднаються до [target_rebel.GetName]"
  uzama_revolt: "Повстання Узами"
  flavor_ben.5.title: "Громадянські заворушення в [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_ben.5.desc: "Зростаючі заворушення в [ROOT.GetCountry.GetName] призвели до того, що країна повільно розривається зсередини. Народ бачив занепад [ROOT.GetCountry.GetFlavorRank] під час правління [target_character.GetName] і тепер стає на бік обіцянок, які дають члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], а також [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Це вирішальний момент в історії [ROOT.GetCountry.GetNameWithNoTooltip], і кризу необхідно відвернути."
  flavor_ben.5.a: "[ROOT.GetCountry.GetNameWithNoTooltip] буде відновлено."
  flavor_ben.6.title: "Спонсорування работоргівлі"
  flavor_ben.6.desc: "Практика рабства принесла багато прибутку [ROOT.GetCountry.GetName]. Це практика, від якої виграв увесь [ROOT.GetCountry.GetFlavorRank], за винятком кількох нещасних. Тепер, завдяки нашим контактам за межами [ShowRegionName('guinea_region')], обговорюється розширення цієї практики. Передусім, зосередитися на розширенні нашого [ShowBuildingTypeName('slave_market')]. Хоча [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] може не мати можливості втручатися безпосередньо, він може принаймні надати права на його розширення."
  flavor_ben.6.a: "Прибутки від такої практики мають бути збільшені."
  flavor_ben.6.b: "Практика рабства має бути поступово скасована."
  ben_slave_building_upgrade_tt: "Максимальний рівень [Concept('building', 'CONCEPT_PLACEHOLDER')|e] [ShowBuildingTypeName('slave_market')] буде #G Подвоєно#!"