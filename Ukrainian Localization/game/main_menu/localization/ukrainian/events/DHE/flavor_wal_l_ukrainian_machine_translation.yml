l_english:
  flavor_wal.1.title: "Влад Цепеш"
  flavor_wal.1.desc: "Відчувши слабкість у волоському правлінні, претендент на Князівство повернувся на чолі армії після років, проведених у турецькому полоні. Влад Дракулешті, Син Дракона, є людиною кровожерливої та жорстокої вдачі. Його прибуття було відзначене жахливим насадженням на палі послів, відправлених для переговорів з ним, даючи зрозуміти, що він застосує велике насильство до будь-кого, хто чинитиме опір його правлінню."
  flavor_wal.1.a: "Ми нічого не винні туркам! Нехай вони корчаться на палях!"
  flavor_wal.1.b: "Вибачитися перед Султаном"