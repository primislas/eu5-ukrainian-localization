l_english:
  flavor_hab_tir.1.title: "[GetCountry('BOH').GetAdjectiveWithNoTooltip] Вплив"
  flavor_hab_tir.1.desc: "[target_spouse.GetName], молодий чоловік [target_ruler.GetName], приносить із собою впливи зі своєї батьківщини [GetCountry('BOH').GetName]. Не лише його власні манери дещо чужі нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], але й його почет [GetCountry('BOH').GetAdjective] [GetCountry('BOH').GetGovernment.GetEstateName('nobles_estate')] намагається накопичити владу на [ROOT.GetCountry.GetAdjective] землях. Наші власні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] щодня дедалі більше занепокоєні тим, який вплив це може мати на наш [ROOT.GetCountry.GetFlavorRank], якщо народиться спадкоємець [target_spouse.GetDynasty.GetName]."
  flavor_hab_tir.1.a: "Обмежити їхній вплив якомога більше."
  flavor_hab_tir.1.b: "Дозволити їм продовжувати безперешкодно."
  flavor_hab_tir.2.title: "Новий чоловік для [target_ruler.GetShortNameWithNoTooltip]"
  flavor_hab_tir.2.desc: "Оскільки [target_ruler.GetName] тепер звільнена від попереднього шлюбу, ми повинні поспішити, щоб забезпечити їй нового чоловіка. [ROOT.GetCountry.GetName] все ще перебуває в небезпечному становищі і відчайдушно потребує стабільності. Кілька династій розглядають наш [ROOT.GetCountry.GetFlavorRank] як приз, і міцний зв'язок з однією з них міг би відбити інших. Особливо [GetDynasty('wittelsbach_dynasty').GetName] та [GetDynasty('habsburg_dynasty').GetName] зацікавлені в забезпеченні наших земель і могли б стати чудовими союзниками... або призвести до падіння нашого [ROOT.GetCountry.GetFlavorRank]."
  flavor_hab_tir.2.a: "Нам потрібно швидко знайти підходящого чоловіка."
  flavor_hab_tir.2.a.tt: "Без папського схвалення нам буде важко самостійно організувати королівський шлюб. Однак зацікавлені залицяльники незабаром попросять про шлюб."
  flavor_hab_tir.2.b: "Немає потреби поспішати."
  flavor_hab_tir.3.title: "Чоловік [target_ruler.GetShortNameWithNoTooltip]"
  flavor_hab_tir.3.desc: "Знайдено прийнятного кандидата, і ми могли б оформити новий шлюб [target_ruler.GetName]. Це вирішить долю нашої династії на найближче майбутнє."
  flavor_hab_tir.3.a: "[GetDynasty('wittelsbach_dynasty').GetNameWithNoTooltip] ідеальний."
  flavor_hab_tir.3.b: "Ми віддаємо перевагу кандидату [GetDynasty('habsburg_dynasty').GetNameWithNoTooltip]."
  flavor_hab_tir.4.title: "Нова династія для [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_hab_tir.4.desc: "[target_ruler.GetDynasty.GetName] тепер зійшла на престол [ROOT.GetCountry.GetName]! Хоча багато хто все ще оплакує дні улюбленої [GetCharacter('tir_margarete_von_tirol').GetShortName], ми повинні рухатися далі і орієнтуватися в цій новій політичній ситуації. З нашими родичами, готовими допомогти нашому молодому правлінню, ми зможемо його забезпечити і закріпити наше законне становище в династії [target_ruler.GetDynasty.GetNameWithNoTooltip]."
  flavor_hab_tir.4.a: "[target_ruler.GetDynasty.GetNameWithNoTooltip] заслуговують довіри!"
  flavor_hab_tir.4.b: "Слава [target_ruler.GetDynasty.GetNameWithNoTooltip]!"
  flavor_hab_tir.4.c: "[target_ruler.GetDynasty.GetNameWithNoTooltip] зрештою полюблять!"
  flavor_hab_tir.5.title: "Нова династія для [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  flavor_hab_tir.5.desc: "Підступні [target_ruler.GetDynasty.GetName] тепер захопили трон [GetCountry('TIR').GetName]! За правом наших законів, [GetCountry('TIR').GetLongName] мали б перейти до наших рук, якби не втручання [target_ruler.GetDynasty.GetNameWithNoTooltip]. Обставини не залишають нам вибору, окрім як негайно поспішити і закріпити землі за собою, перш ніж [target_ruler.GetDynasty.GetNameWithNoTooltip] матимуть час встановити своє правління."
  flavor_hab_tir.5.a: "Нам не відмовлять у нашій частці!"
  flavor_hab_tir.5.b: "Ми не можемо ризикувати війною з [target_ruler.GetDynasty.GetNameWithNoTooltip]."
  flavor_hab_tir.1000.title: "Складний шлюб [target_ruler.GetShortNameWithNoTooltip]"
  flavor_hab_tir.1000.desc: "Нашу улюблену [target_ruler.GetName] проклято шлюбом з зухвалим [target_spouse.GetName]. Їхня взаємна неприязнь відома вже багато років, але тепер вона переросла з простої неприязні у відкриту ненависть. [target_spouse.GetNameWithNoTooltip] відкрито виявляє бажання діяти як офіційний правитель нашого [ROOT.GetCountry.GetFlavorRank]. Здається, все більш імовірним, що їхній шлюб залишиться бездітним, що може становити значну загрозу для [ROOT.GetCountry.GetName]. Однак малоймовірно, що ми отримаємо папську згоду на розлучення через політичну ситуацію, в якій зараз перебуває [GetUniqueInternationalOrganization('hre').GetName].\n\nЗа підтримки [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName] ми могли б форсувати розлучення, але ми б ще більше потрапили в їхню сферу інтересів."
  flavor_hab_tir.1000.a: "Нам потрібне розлучення, хай буде проклята папська згода!"
  flavor_hab_tir.1000.b: "Ми не можемо зрадити цей шлюб."
  flavor_hab_tir.1001.title: "[target_ruler.GetNameWithNoTooltip] відкидає [target_spouse.GetNameWithNoTooltip]"
  flavor_hab_tir.1001.desc: "Коли [target_spouse.GetName] повернувся з довгої мисливської поїздки до [target_spouse.GetHisHer] дружини, що чекала в [GetCountry('TIR').GetName], [target_spouse.GetHeShe] виявив, що ворота для [target_spouse.GetHimHer] зачинені. Незважаючи на [target_spouse.GetHisHer] гнівні крики з вимогою впустити, [GetCountry('TIR').GetAdjectiveWithNoTooltip] охоронці відмовили [target_spouse.GetHimHer]. Розчарований, [target_spouse.GetHeShe] мусив рушити далі, щоб знайти притулок в іншому замку. На його подив, кожен замок у [GetCountry('TIR').GetNameWithNoTooltip] відмовив [target_spouse.GetHimHer] у в'їзді, змусивши [target_spouse.GetHimHer] покинути графство та повернутися до [ROOT.GetCountry.GetName], після короткого притулку на півночі [ShowRegionName('italy_region')]. Невдовзі після [target_spouse.GetHisHer] прибуття до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], ми отримали звістку від [GetCountry('TIR').GetNameWithNoTooltip] про те, що [target_ruler.GetNameWithNoTooltip] розлучився з [target_spouse.GetHimHer] за згодою [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  flavor_hab_tir.1001.a: "Обурливо!"
  flavor_hab_tir.1100.title: "Справа [GetCountry('TIR').GetNameWithNoTooltip]"
  flavor_hab_tir.1100.desc: "[GetCountry('TIR').GetName], країна, що контролює життєво важливі перевали Альп, стикається з невизначеним майбутнім щодо спадкоємності [target_ruler.GetName]. Через наші родинні стосунки, ми повинні запропонувати [target_ruler.GetHerHim] нашу допомогу та чинити тиск на [target_ruler.GetHerHim], щоб вона призначила нас законними спадкоємцями [GetCountry('TIR').GetNameWithNoTooltip].\n\nЯкщо [target_ruler.GetSheHe] погодиться на ці умови, ми зможемо взяти під контроль як торгові шляхи альпійського регіону, так і багаті копальні, розташовані на їхній території."
  flavor_hab_tir.1100.a: "Немає шкоди у простому проханні."
  flavor_hab_tir.1100.b: "Це не варте зусиль."
  flavor_hab_tir.1101.title: "Майбутнє [ROOT.GetCountry.GetNameWithNoTooltip]"
  flavor_hab_tir.1101.desc: "[target_ruler.GetName] довго боролася за збереження незалежності [target_ruler.GetHerHis] улюбленої [ROOT.GetCountry.GetLongNameWithNoTooltip]. З [target_ruler.GetHerHis] похилим віком та відсутністю прямого спадкоємця, нам доведеться зрештою зіткнутися з похмурою реальністю [target_ruler.GetHerHis] спадщини. Близькі родичі [target_ruler.GetHerHis] в Австрії надали пропозицію, від якої ми навряд чи можемо відмовитися. Щоб забезпечити стабільну спадкоємність та безпеку [target_ruler.GetHerHis] улюблених [ROOT.GetCountry.GetAdjective] підданих, ми повинні розглянути їхню ідею."
  flavor_hab_tir.1101.a: "Нам потрібно приєднатися до їхньої династії."
  flavor_hab_tir.1101.b: "Ми зустрінемо цю кризу самотужки!"
  flavor_hab_tir.1102.title: "[GetCountry('TIR').GetNameWithNoTooltip] погоджується"
  flavor_hab_tir.1102.desc: "[target_ruler.GetName] погодилася на нашу пропозицію і надала нам пряме успадкування [target_ruler.GetHerHis] титулів. Щоб запобігти будь-яким непорозумінням або змінам у цих документах, ми повинні супроводити [target_ruler.GetHerHis] до нашої столиці та забезпечити їй мирне життя в [ROOT.GetCountry.GetCapital.GetName]."
  flavor_hab_tir.1102.a: "Слава [target_habsburg_ruler.GetDynasty.GetNameWithNoTooltip]!"