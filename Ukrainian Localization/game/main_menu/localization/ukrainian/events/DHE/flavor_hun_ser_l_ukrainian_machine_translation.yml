l_english:
  flavor_hun_ser.1000.title: "Пропозиція щодо [target_location.GetNameWithNoTooltip]"
  flavor_hun_ser.1000.desc: "Протягом століть [target_location.GetName] багато разів переходив з рук в руки. Кілька країн свого часу контролювали цей стратегічно важливий [target_location.GetRank.GetName], що дозволяло їм посилити свій вплив на ширший регіон навколо Дунаю. [ROOT.GetCountry.GetAdjective] контроль над [target_location.GetNameWithNoTooltip] закінчився в 1319 році, коли [target_location.GetRank.GetNameWithNoTooltip] був захоплений [target_country.GetName]. Оскільки ми тепер уклали з ними союз, можливо, ми могли б надіслати [target_country.GetNameWithNoTooltip] пропозицію – золото в обмін на [target_location.GetNameWithNoTooltip]. Багато хто сподівається, що є шанс домовитися про повернення [target_location.GetNameWithNoTooltip], оскільки передача його союзнику не поставить під загрозу безпеку [target_country.GetNameWithNoTooltip]."
  flavor_hun_ser.1000.a: "Нам нічого втрачати."
  flavor_hun_ser.1000.b: "Не будемо цього робити."
  flavor_hun_ser.1000.a.tt: "Ми надішлемо пропозицію [target_country.GetNameWithNoTooltip], запитуючи [target_location.GetNameWithNoTooltip] в обмін на золото. Якщо вони погодяться, станеться наступне:"
  flavor_hun_ser.1001.title: "Пропозиція щодо [target_location.GetNameWithNoTooltip]"
  flavor_hun_ser.1001.desc: "Цікава пропозиція від наших [from_country.GetAdjective] союзників щойно надійшла до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [from_country.GetNameWithNoTooltip] просить, щоб [target_location.GetRank.GetName] [target_location.GetName] та прилегла територія були передані назад [from_country.GetNameWithNoTooltip], оскільки [target_location.GetRank.GetNameWithNoTooltip] належав їм до 1319 року, і вони все ще вважають себе його законними власниками. Вони стверджують, що передача [target_location.GetRank.GetNameWithNoTooltip] союзнику не поставить під загрозу безпеку нашої нації."
  flavor_hun_ser.1001.a: "Звучить як гарна угода."
  flavor_hun_ser.1001.b: "Про це не може бути й мови!"
  flavor_hun_ser.1001.a.tt: "Ми передамо контроль над [target_location.GetNameWithNoTooltip] до [from_country.GetNameWithNoTooltip]."
  flavor_hun_ser_response_common: "Відповідь на нашу пропозицію обміну [target_location.GetName] на золото щойно надійшла до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName]."
  flavor_hun_ser.1002.title: "[target_country.GetNameWithNoTooltip] погоджується повернути [target_location.GetNameWithNoTooltip]"
  flavor_hun_ser.1002.desc: "$flavor_hun_ser_response_common$ Наші [target_country.GetAdjective] союзники, на щастя, прийняли пропозицію, і тому [target_location.GetNameWithNoTooltip] знову під [ROOT.GetCountry.GetAdjective] контролем."
  flavor_hun_ser.1002.a: "Чудово!"
  flavor_hun_ser.1003.title: "[target_country.GetNameWithNoTooltip] відмовляється повернути [target_location.GetNameWithNoTooltip]"
  flavor_hun_ser.1003.desc: "$flavor_hun_ser_response_common$ Наші [target_country.GetAdjective] союзники, на жаль, відхилили пропозицію, і тому [target_location.GetNameWithNoTooltip] залишається під їхнім контролем."
  flavor_hun_ser.1003.a: "Принаймні ми спробували..."
  flavor_hun_ser.1003.b: "Ми візьмемо [target_location.GetNameWithNoTooltip] силою!"