l_english:
  flavor_ayd.1.title: "Лютий Газі"
  flavor_ayd.1.desc: "Відомий своєю/своїм лютою вдачею та войовничою позицією щодо наших сусідніх бейликів, [target_character.GetName] здобув(ла) ім'я як завзятий Газі та відомий капер. Маючи потужний флот і міцну армію, його/її військова доблесть безсумнівно забезпечить багато великих перемог для нашого народу. Така його/її військова та морська майстерність, що наші вороги дали йому/їй прізвисько \"Лев\"."
  flavor_ayd.1.a: "Нехай вони бояться наших стягів!"
  flavor_ayd.1.historical_info: "Умур Газі є одним із найвідоміших анатолійських каперів. Зібравши потужну армію та флот, його пригоди Егейським морем стали легендами. Його каперська діяльність призвела до оголошення хрестового походу проти його володінь. Такою була його військова важливість, що він прийшов на допомогу візантійському імператору Іоанну Кантакузину, де Лев відіграв вирішальну роль у візантійській громадянській війні (1341-1347), надавши значну військову підтримку, включно з 380 кораблями та 28 000 солдатів."