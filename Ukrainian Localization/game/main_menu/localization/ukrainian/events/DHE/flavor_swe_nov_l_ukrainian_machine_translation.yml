l_english:
  flavor_swe_nov.1.title: "[swedish_theologian.GetNameWithNoTooltip] зі [sweden_country.GetNameWithNoTooltip]"
  flavor_swe_nov.1.desc: "Релігійна людина зі [sweden_country.GetName] здійснила довгу подорож. За наказом [swedish_theologian.GetHerHis] величності, [swedish_theologian.GetName] вирушив до далеких земель [byzantium_country.GetName] для Теологічної Дискусії, яка мала б показати перевагу Римсько-Католицької Церкви над Православ'ям.\n\nОднак, [byzantium_country.GetAdjectiveWithNoTooltip] виявилися досить переконливими, і святий посол навернувся до [byzantium_country.GetReligion.GetName]. Природно, що нерозумний [sweden_country.GetGovernment.GetRulerTitle] не міг прийняти видатного єретика до [sweden_country.GetGovernment.GetRuler.GetHerHis] двору і вигнав [swedish_theologian.GetNameWithNoTooltip]. Тепер [swedish_theologian.GetSheHe] прибув до нас, щоб знайти новий дім серед [swedish_theologian.GetHerHis] нових братів і сестер по вірі."
  flavor_swe_nov.1.a: "[swedish_theologian.GetSheHe|U] буде вітатися в нашому скромному королівстві!"
  flavor_swe_nov.2.title: "[sweden_country.GetAdjectiveWithNoTooltip] Вимоги щодо навернення [novgorod_country.GetAdjectiveWithNoTooltip]"
  flavor_swe_nov.2.desc: "Зростаюча напруга останніх років між [ROOT.GetCountry.GetName] та [novgorod_country.GetName] не обмежується лише прикордонними конфліктами, але й релігійним питанням, оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] кожної країни вважає іншу схизматичною. Ця тема прийшла на думку [ROOT.GetCountry.GetGovernment.GetRuler.GetName], який вирішив висунути ризиковану пропозицію для [novgorod_country.GetNameWithNoTooltip]: провести теологічну дискусію, щоб визначити, яка конфесія є правильною у своїй догмі, а країна, що програє, повинна буде навернутися до іншої.\n\nДеякі з [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] радників вважають це чудовою ідеєю, тоді як інші більш обережні щодо такого підходу до наших відносин з [novgorod_country.GetNameWithNoTooltip]."
  flavor_swe_nov.2.a: "Переконати [novgorod_country.GetNameWithNoTooltip] навернутися до [sweden_country.GetReligion.GetNameWithNoTooltip]."
  flavor_swe_nov.2.a.tt: "Ми викличемо [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [novgorod_country.GetName] на #Y Теологічну Дискусію#!! Ця дискусія вирішить релігійне майбутнє наших держав."
  flavor_swe_nov.2.b: "Вони просто брудні єретики."
  flavor_swe_nov.3.title: "Реакція [novgorod_country.GetNameWithNoTooltip]"
  flavor_swe_nov.3.desc: "[sweden_country.GetAdjective] прибули з сумнівною вимогою: вони хочуть провести теологічну дискусію між [swedish_theologian.GetName] та одним з наших богословів, щоб визначити, яка з наших конфесій є правильною, а країна, що програє, повинна буде навернутися до іншої.\n\nЦя вимога викликає бурхливі дебати серед нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], з різноманітністю думок щодо того, як на них відповісти."
  flavor_swe_nov.3.a: "Направити їх на дебати з [GetCountry('BYZ').GetNameWithNoTooltip]."
  flavor_swe_nov.3.tt: "#R Це може розгнівати [sweden_country.GetGovernment.GetRuler.GetName] зі [sweden_country.GetName], що потенційно призведе до війни між нашими державами.#!"
  flavor_swe_nov.3.b: "Висміяти богослова."
  flavor_swe_nov.3.c: "Прийняти теологічну дискусію!"
  flavor_swe_nov.3.c.tt: "Ми приймемо #Y Теологічну Дискусію#! проти [sweden_country.GetName]"
  can_choose_theologian_for_duel_tt: "Дебати відбудуться через #Y 1 рік#!, і ми повинні обрати [Concept('character', 'CONCEPT_PLACEHOLDER')|e], щоб представляти нас у дебатах.\n#Y [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] сторони, що програє, має навернутися до [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] сторони, що виграє.#!\nРозблокувати взаємодію з персонажем [ShowCharacterInteractionName('choose_theologian_duelist')]"
  flavor_swe_nov.4.title: "[novgorod_country.GetNameWithNoTooltip] направляє нас до [GetCountry('BYZ').GetNameWithNoTooltip]!"
  flavor_swe_nov.4.desc: "[novgorod_country.GetNameWithNoTooltip] ухилився від запропонованої теологічної дискусії, направивши нас відправити [swedish_theologian.GetName] до [target_location.GetName], щоб дебатувати з [GetCountry('BYZ').GetAdjectiveWithNoTooltip] богословами, відомими своєю складною релігійною аргументацією після століть безперервних дебатів про те, які вірування є [ShowReligionName('orthodox')], а які є єретичними."
  flavor_swe_nov.4.desc.no_byz: "[novgorod_country.GetNameWithNoTooltip] ухилився від запропонованої теологічної дискусії та образив нашу честь!"
  flavor_swe_nov.4.a: "Безглуздо! Замість цього відправити армію!"
  flavor_swe_nov.4.b: "Тоді відправимо нашого богослова до [target_location.GetNameWithNoTooltip]."
  flavor_swe_nov.4.b.tt: "[swedish_theologian.GetName] та інші богослови вирушать до [target_location.GetName] для релігійної дискусії з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [byzantium_country.GetName]"
  flavor_swe_nov.5.title: "[sweden_country.GetAdjectiveWithNoTooltip] Богослов відвідує нас"
  flavor_swe_nov.5.desc: "Цікавий персонаж з'явився при нашому дворі. [swedish_theologian.GetName] — [sweden_country.GetAdjective] богослов, направлений до нас [novgorod_country.GetNameWithNoTooltip] для дебатів про те, яка єдина істинна сповідь Христа, згідно з відомим досвідом [GetCountry('BYZ').GetAdjective] богословів у цих питаннях віри."
  flavor_swe_nov.5.a: "Пояснити йому, що таке [ShowReligionName('orthodox')]."
  flavor_swe_nov.5.a.at: "[swedish_theologian.GetName] визнає [swedish_theologian.GetHerHis] поразку в дебатах і навертається до [ROOT.GetCountry.GetReligion.GetName].\n[swedish_theologian.GetSheHe|U] повертається до [sweden_country.GetName], щоб проповідувати нашу віру."
  flavor_swe_nov.5.b: "Цікаво."
  swe_theologian_visit_received: "Візит теолога отримано"
  swe_theologian_visit_welcomed: "Візит теолога вітається"
  flavor_swe_nov.6.title: "Теолог повертається"
  flavor_swe_nov.6.desc: "[swedish_theologian.GetName] повернувся до нашої країни після дебатів з [GetCountry('BYZ').GetAdjective] теологами, оскільки його направили до них [novgorod_country.GetNameWithNoTooltip]. Це не призвело до того, як [ROOT.GetCountry.GetGovernment.GetRuler.GetName] уявляв, оскільки [swedish_theologian.GetNameWithNoTooltip] тепер захищає, що сповідання, яке практикується в [target_location.GetName], є істинним Христовим."
  flavor_swe_nov.6.a: "Можливо, ці [GetCountry('BYZ').GetAdjectiveWithNoTooltip] теологи мають рацію..."
  flavor_swe_nov.6.b: "Вигнати його!"
  flavor_swe_nov.7.title: "[novgorod_country.GetNameWithNoTooltip] погоджується!"
  flavor_swe_nov.7.desc: "[swedish_theologian.GetName] повернувся до нашої країни з чудовою новиною: [novgorod_country.GetNameWithNoTooltip] погоджується провести з ним теологічні дебати!"
  flavor_swe_nov.7.a: "Час для справжніх дебатів!"
  flavor_swe_nov.7.a.tt: "Ми приймемо #Y Теологічні Дебати#! проти [novgorod_country.GetName]"
  flavor_swe_nov.7.b: "Відступити..."
  flavor_swe_nov.8.title: "Теологічні Дебати"
  flavor_swe_nov.8.desc: "Дебати відбудуться між [swedish_theologian.GetName] та [novgorod_country.GetAdjective] теологом. Від їхнього теологічного розуміння та міркувань залежатиме доведення, яке є істинним сповіданням Христа."
  flavor_swe_nov.8.desc.unprepared_nov: "Господь з нами! Невірні [novgorod_country.GetName] не змогли призначити представника для своєї єресі. Таким чином, дебати є явною перемогою для [sweden_country.GetReligion.GetAdjective] віри!"
  flavor_swe_nov.8.desc.unprepared_swe: "Недбалість; Смерть; Руки Диявола – є багато причин, чому наша держава не змогла призначити представника для [sweden_country.GetReligion.GetAdjective] справи. Факт полягає в тому, що невірні [novgorod_country.GetAdjective] надіслали свого найкращого теолога, тоді як ми не могли навіть представити їм мішок пшениці.\n\nНехай Господь простить нас."
  flavor_swe_nov.8.desc.unprepared_both: "Можливо, це доля. Можливо, це навіть Воля Господа.\n\nСталося неймовірне: обидві сторони не змогли запропонувати представника для своїх вірувань! Дебати провалилися, перш ніж мали шанс розпочатися."
  flavor_swe_nov.8.desc.nov_is_dead: "Держава [GetCountry('NOV').GetName] була знищена з лиця світу! Які б Теологічні Дебати ми не сподівалися провести; будь-яка спроба зміцнити вплив Господа знайшла передчасний кінець."
  flavor_swe_nov.8.a: "Нехай переможе кращий Теологічний Дебатер!"
  flavor_swe_nov.8.a.tt: "[novgorodian_theologian.GetName] та [swedish_theologian.GetName] проведуть #Y 3-денні#! #Y Теологічні Дебати#!"
  flavor_swe_nov.8.b: "О Господи, ми вічно вдячні Тобі за цю перемогу!"
  flavor_swe_nov.8.b.tt: "Дебати завершуються перемогою для [sweden_country.GetName]"
  flavor_swe_nov.8.c: "Як це могло статися?"
  flavor_swe_nov.8.c.tt: "Дебати завершуються перемогою для [novgorod_country.GetName]"
  flavor_swe_nov.8.d: "Несподіваний поворот подій..."
  flavor_swe_nov.8.e: "Не та перемога, яку ми уявляли, але все ж перемога!"
  flavor_swe_nov.9.title: "Дебати завершено!"
  flavor_swe_nov.9.desc: "Дебати між [swedish_theologian.GetName] та [novgorod_country.GetAdjective] богословом завершилися. Це матиме наслідки для віросповідання кожної з країн."
  flavor_swe_nov.9.a: "Можливо, вони мають рацію..."
  flavor_swe_nov.9.a.tt: "Богословські дебати #Y#! завершаться за #Y 3 дні#!.\nНавички богослова [sweden_country.GetAdjectiveWithNoTooltip]: [swedish_theologian.GetTotalAbility]\nНавички богослова [novgorod_country.GetAdjectiveWithNoTooltip]: [novgorodian_theologian.GetTotalAbility]"
  flavor_swe_nov.10.title: "Дуель виграно!"
  flavor_swe_nov.10.desc: "Наш богослов виграв дебати! Це підтверджує, що наше віросповідання є істинним Христовим!"
  flavor_swe_nov.10.desc.auto_win: "Невірні не змогли взяти участь у дебатах! Це підтверджує, що наше віросповідання є істинним Христовим!"
  flavor_swe_nov.10.a: "Перемога наша!"
  flavor_swe_nov.10.a.nov: "[novgorod_country.GetGovernment.GetRuler.GetName], а також #R 10.0%#! населення в [novgorod_country.GetCapital.GetName] змінять свою релігію на [sweden_country.GetReligion.GetName]."
  flavor_swe_nov.10.a.swe: "[sweden_country.GetGovernment.GetRuler.GetName], а також #R 10.0%#! населення в [sweden_country.GetCapital.GetName] змінять свою релігію на [novgorod_country.GetReligion.GetName]."
  flavor_swe_nov.11.title: "Дуель програно!"
  flavor_swe_nov.11.desc: "Наш богослов програв дебати. Це дискредитувало наше віросповідання порівняно з віросповіданням богослова-суперника..."
  flavor_swe_nov.11.desc.no_participication: "Ми не змогли взяти участь у дебатах. Це дискредитувало наше віросповідання порівняно з віросповіданням богослова-суперника..."
  flavor_swe_nov.11.a: "Як таке могло статися..."