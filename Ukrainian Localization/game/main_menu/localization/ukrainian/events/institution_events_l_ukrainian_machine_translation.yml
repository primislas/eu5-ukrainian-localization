l_english:
  institution_events.1.title: "Вимога про васальний договір"
  institution_events.1.desc: "Правління [ROOT.GetCountry.GetGovernment.GetRulerTitle] було простим протягом століть. Клани присягають на вірність [ROOT.GetCountry.GetFlavorRank], і натомість їх захищають [ROOT.GetCountry.GetAdjective] воїни.\n\nПроте еліта [feudal_province.GetName] не задоволена таким вільним союзом, оскільки вони вважають свої привілеї та власність незахищеними. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] бажають укласти обов'язковий договір, який зміцнить відносини між ними, [target_ruler.GetName] та [ROOT.GetCountry.GetLongNameWithNoTooltip]."
  institution_events.1.a: "Підписати васальний договір з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  institution_events.1.b: "Немає потреби в такому договорі."
  institution_events.2.title: "Виклик елітам воїнів"
  institution_events.2.desc: "З часом нам вдалося зміцнити владу [target_character.GetName] над провінціями нашого [ROOT.GetCountry.GetFlavorRank]. Це призвело до того, що влада місцевих сильних людей та дрібних вождів стала сприйматися як загрожена. Зазвичай такі місцеві сили можна було б легко приборкати, але в [feudalism_location.GetName] може знадобитися застосування більш прямої сили, щоб нагадати іншим про наше право на правління."
  institution_events.2.a: "Розчавити їх!"
  institution_events.2.b: "Нам потрібна їхня підтримка."
  institution_events.3.title: "Зростаючий вплив міської шляхти"
  institution_events.3.desc: "Хоча вони не мають формального голосу в нашому уряді, багаті міські центри мають багато інших способів заявити про свій вплив. У деяких випадках міські центри можуть навіть об'єднатися, щоб ще більше посилити свою владу над провінцією. Лідери одного з таких об'єднань нещодавно зустрілися в [urban_location.GetName] і тепер звертаються до нас з проханням формалізувати методи, які вони використовують для здійснення влади над нашими провінціями. Союз з міськими центрами дозволив би нам просувати набагато міцніші системи управління, але ми, ймовірно, втратимо підтримку місцевих [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], на яких ми зараз покладаємося для військової підтримки."
  institution_events.3.a: "Ми з нетерпінням чекаємо цього партнерства з [urban_location.GetNameWithNoTooltip]."
  institution_events.3.b: "Про це не може бути й мови."
  institution_events.10.title: "Чужоземна концепція [ShowInstitutionNameWithNoTooltip('legalism')]"
  institution_events.10.desc.start: "Наш [ROOT.GetCountry.GetFlavorRank] має давні традиції, які забезпечують стабільність [ROOT.GetCountry.GetAdjective] суспільства.\n\nОднак ці старі правила перебувають під загрозою нових ідей, які поширюються в [legalism_location.GetName] з [legalism_country.GetName]."
  institution_events.10.desc.christians: "$institution_events.10.desc.start$ [legalism_country.GetAdjectiveWithNoTooltip] правовий кодекс, що бере свій початок у самій стародавній Римській імперії, знайшов позитивний відгук як у [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], так і у [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [legalism_location.GetNameWithNoTooltip].\n\n$institution_events.10.desc.end$"
  institution_events.10.desc.muslims: "$institution_events.10.desc.start$ Зокрема, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] висловили прихильність до побожності [legalism_country.GetNameWithNoTooltip]'s [ShowReligionGroupAdjective('muslim')] законів та їх взаємозв'язку з багатьма аспектами життя.\n\n$institution_events.10.desc.end$"
  institution_events.10.desc.eastern: "$institution_events.10.desc.start$ Закони та [ShowInstitutionName('legalism')] в цілому сприймаються в [legalism_country.GetNameWithNoTooltip] як філософія великої важливості та бюрократичної безпеки. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] виступають за просування концепцій Фацзя, оскільки це значно покращить законність та стабільність [legalism_location.GetNameWithNoTooltip]. Звісно, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] хочуть бути наглядачами цих нових ідей.\n\n$institution_events.10.desc.end$"
  institution_events.10.desc.dharmic: "$institution_events.10.desc.start$ [legalism_country.GetAdjectiveWithNoTooltip] концепції [ShowReligionGroupName('dharmic')] особливо знайшли великий відгук у тих, хто в нашому [ROOT.GetCountry.GetFlavorRank] бачить схожість [ROOT.GetCountry.GetAdjectiveWithNotooltip] традицій та традицій [ShowReligionGroupAdjective('dharmic')] релігії.\n\n$institution_events.10.desc.end$"
  institution_events.10.desc.fallback: "$institution_events.10.desc.start$\n\n$institution_events.10.desc.end$"
  institution_events.10.desc.end: "Хоча ці чужоземні концепції можуть принести велику користь, більшість у нашому [ROOT.GetCountry.GetFlavorRank] відчуває, що їхні старі звичаї під загрозою."
  institution_events.10.a: "Просувати ці чужоземні ідеї."
  institution_events.10.b: "Ми не можемо дозволити, щоб наші традиції були поставлені під загрозу."
  institution_events.11.title: "Брак бюрократії"
  institution_events.11.desc: "Іноді прогрес буде більшим далі від центру влади, де старі еліти занадто вкорінені, щоб бажати змін. Оскільки нові форми правління стають все більш поширеними в нашій країні, місцеві жителі все більше дратуються на еліти в [ROOT.GetCountry.GetCapital.GetName], які відмовляються формалізувати будь-які форми державних інститутів."
  institution_events.11.a: "Часи змінюються."
  institution_events.11.b: "Ми не можемо прискорити зміни."
  institution_events.12.title: "Зменшення неформальної влади"
  institution_events.12.desc: "Завдяки мудрій політиці та простому повторенню, влада та авторитет можуть настільки вкорінитися, що сприятимуть зростанню постійних урядових інституцій. З часом наші урядові практики перейшли від довільних демонстрацій сили до послідовного управління."
  institution_events.12.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  institution_events.20.title: "Поширення меритократичних ідей"
  institution_events.20.desc: "З ранніх днів нашого [ROOT.GetCountry.GetFlavorRank] владні посади були зарезервовані для тих, хто належить до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Соціальне походження особи має більше значення, ніж фактичні досягнення.\n\nНещодавні ідеї з [meritocracy_country.GetName] почали поширюватися в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle], ставлячи під сумнів правління крові та виступаючи за систему, яка винагороджує компетентність, а не право народження.\n\n[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] відчувають загрозу від цього нового розвитку і вимагають припинення цієї меритократичної думки."
  institution_events.20.a: "Лише ті, хто має хист, будуть правити."
  institution_events.20.b: "Ми повинні зупинити ці ідеї!"
  institution_events.21.title: "Перевірка місцевих губернаторів"
  institution_events.21.desc: "[ROOT.GetCountry.GetAdjective] контроль над [meritocracy_location.GetName] ледь існує. Хоча відстань та зв'язки відіграють роль у нашому низькому впливі на [meritocracy_location.GetNameWithNoTooltip], головною проблемою є місцева губернаторська адміністрація, яка, здається, зацікавлена лише в набиванні кишень своїх членів будь-якими засобами, незважаючи на страждання тих, хто живе в [meritocracy_location.GetRank.GetName].\n\nЧлени нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle] виступають за просування ідей з [meritocracy_country.GetName] шляхом запровадження перевірок місцевих губернаторів по всьому нашому [ROOT.GetCountry.GetFlavorRank]."
  institution_events.21.a: "Розумний план."
  institution_events.21.b: "Ми не можемо собі цього дозволити."
  institution_events.30.title: "Дзеркала для князів"
  institution_events.30.desc: "[target_character.GetName] виявив великий інтерес до [ShowInstitutionName('renaissance')], не лише через культурні та мистецькі заслуги, а й через політичні та наукові прориви, що відбуваються в [ShowCultureGroupName('italian_group')] державах. [target_heir.GetName], однак, здається, не звертає уваги на такі речі, що турбує нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Протягом багатьох поколінь спадкоємці держав по всій [ShowContinentName('europe')] могли поглиблювати свою освіту за допомогою книг про те, як поводитися як правитель. [ShowInstitutionNameWithNoTooltip('renaissance')|U] мислителі швидко узурпували цей жанр, і низка цих «Дзеркал для князів» тепер сповнена їхніх нових ідей. Ми повинні розглянути можливість зробити ці книги центральними в освіті [target_heir.GetNameWithNoTooltip]."
  institution_events.30.a: "Давайте виховаємо мудрого [ROOT.GetCountry.GetGovernment.GetHeirTitle]."
  institution_events.30.b: "Традиційний наставник цілком підійде."
  institution_events.31.title: "Культурний вплив [ShowInstitutionNameWithNoTooltip('renaissance')|U]"
  institution_events.31.desc: "З відродженням інтересу до мистецтв класичної епохи багато наших митців та вчених створюють нові твори мистецтва та науки на основі давньогрецької та римської літератури. Звісно, ці досягнення не лише мають великий престиж, але й додають додатковий шар до того, що означає бути [ROOT.GetCountry.GetCulture.GetName]."
  institution_events.31.a: "[ShowInstitutionNameWithNoTooltip('renaissance')] є частиною [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] традицій."
  institution_events.31.b: "Ці стародавні ідеї посилять [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] вплив."
  institution_events.40.title: "Поширення лихварства"
  institution_events.40.desc: "Дії з позичання грошей та надання позик дозволені в [ROOT.GetCountry.GetReligion.GetGroup.GetAdjective] вірах; натомість, отримання неетичного прибутку від позик через відсотки суворо заборонено. Таким чином, багато [ROOT.GetCountry.GetReligion.GetGroup.GetAdjectiveWithNoTooltip] купців, гільдій та королів змушені покладатися на євреїв та інших лихварів, які не зобов'язані дотримуватися таких правил.\n\nОднак релігійне засудження не зупиняє сім'ї купців, що прагнуть прибутку, від заснування лихварських підприємств. Лихварство стає все більш поширеним явищем, і, хоча є можливість скористатися їхніми послугами, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] бажає зупинити поширення цієї нечестивої практики."
  institution_events.40.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] явно перебільшують."
  institution_events.40.b: "Ці хижаки не відведуть нас від світла [ROOT.GetCountry.GetReligion.GetGodName]."
  institution_events.41.title: "Банківська родина [banking_location.GetNameWithNoTooltip]"
  institution_events.41.desc: "Оскільки складність світу та наше розуміння його зростають, зростає і важливість економіки. Природно, хитрі люди, що прагнуть багатства та влади, користуються нагодою для створення підприємств та банків.\n\nБанківська родина в [banking_location.GetName], зокрема, здобула славу, оскільки вони виявилися досить успішними у своїй справі. Їхнє багатство, хоч і вражаюче, стало загрозою для нашого контролю над [banking_location.GetNameWithNoTooltip], оскільки їхній вплив у [banking_location.GetRank.GetName] конкурує з нашим."
  institution_events.41.a: "Нехай буде так."
  institution_events.41.b: "Відновити наш контроль над [banking_location.GetNameWithNoTooltip], але надати родині певну автономію."
  institution_events.41.c: "Розпустити банк і привласнити їхні активи!"
  institution_events.50.title: "Позиція [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] під загрозою"
  institution_events.50.desc: "Армії [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] складаються з їхніх феодальних підданих, яких закликають до зброї та які борються за [ROOT.GetCountry.GetGovernment.GetRulerTitle] та Країну. Поки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] відточують свої військові навички, піхотинці ополчення є [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]; люди простого походження, які не живуть заради битв.\n\nОскільки [professional_armies_country.GetAdjective] ідеї професійної армії поширюються в нашій країні, це змусило [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] відчути, що їхня важливість у нашому суспільстві та військовій справі опинилася під загрозою. Час непідготовлених [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')], розміщених на фронтах, та елітних воїнів на конях наближається до кінця."
  institution_events.50.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] доведеться адаптуватися."
  institution_events.50.b: "Захистити роль [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  institution_events.51.title: "Вимоги професійної армії"
  institution_events.51.desc: "З введенням [professional_armies_country.GetName] професійної, постійної армії, попит на зброю та обладунки значно зріс. Цей розвиток впливає не лише на [professional_armies_country.GetAdjectiveWithNoTooltip] ринки, але й на наші власні, оскільки [professional_armies_country.GetAdjectiveWithNoTooltip] купці шукають клинки для свого [professional_armies_country.GetGovernment.GetRulerTitle] та [professional_armies_country.GetGovernment.GetRulerOrRegent.GetHerHis] зростаючої армії."
  institution_events.51.a: "Цікавий розвиток подій."
  institution_events.51.b: "Наша економіка не витримає [professional_armies_country.GetAdjectiveWithNoTooltip] загрози."
  institution_events.60.title: "Поширення [ShowInstitutionNameWithNoTooltip('new_world')] культур"
  institution_events.60.desc: "З відкриттям та колонізацією [ShowInstitutionName('new_world')] до економік [ShowContinentName('europe')] було введено низку нових культур. [ShowGoodsName('potato')], [ShowGoodsName('maize')] та помідори повільно почали поширюватися серед фермерів [ShowContinentNameWithNoTooltip('europe')], але старі звички важко викорінити, і досі ці нові високоврожайні культури поширюються дуже повільно.\n\nМи могли б спробувати стимулювати цей процес, використовуючи скарбницю нашого [ROOT.GetCountry.GetFlavorRank], але ті, хто зараз домінує на сільськогосподарських ринках, ймовірно, відчули б загрозу."
  institution_events.60.a: "Безумовно, варта інвестиція."
  institution_events.60.b: "Наші шлунки надто легко засмучуються!"
  institution_events.61.title: "Зростання морських потреб"
  institution_events.61.desc: "Оскільки [ShowInstitutionName('new_world')] стала об'єктом колонізації, важливість флоту значно зросла. Природно, попит на товари, необхідні для суднобудування, зріс до рівнів, якими важко керувати.\n\nМи могли б зменшити попит, реквізувавши торгові судна [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]."
  institution_events.61.a: "Ринок впорається сам."
  institution_events.61.b: "Реквізувати торгові судна."
  institution_events.70.title: "Розповсюдження ворожих публікацій"
  institution_events.70.desc: "Коли друк був новинкою, він спочатку приваблював тих, хто створював кодекси як великі твори мистецтва, або філантропів, які хотіли поширювати знання класики в більш доступному форматі. Однак незабаром до їхніх лав приєдналися інші, менш сумлінні люди, які заробляли на життя обмовлянням інших.\n\nВідтоді, як друк почав розвиватися як бізнес, друкарні по всій [ShowContinentName('europe')] стали доступними для демагогів, щоб плести свої павутини брехні. Стоси памфлетів лежать готовими до розповсюдження серед усіх, хто їм повірить, поки ми говоримо. Зокрема, в [target_location.GetName] ця інакше така багатообіцяюча технологія була використана як засіб для поширення злісних наклепів про нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] та підриву нашого [ROOT.GetCountry.GetFlavorRank]. Цього не можна терпіти!"
  institution_events.70.a: "Настав час цензури!"
  institution_events.70.b: "Ми не можемо контролювати вільне слово."
  institution_events.70.b.tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в межах [target_province.GetName], де почало поширюватися [ShowInstitutionName('printing_press')], отримає [ShowNamedValue('institution_progress_extreme_bonus')|+=] прийняття інституції"
  institution_events.71.title: "Амбітна [ShowInstitutionNameWithNoTooltip('printing_press')] у [printing_press_location.GetNameWithNoTooltip]"
  institution_events.71.desc: "[ShowInstitutionName('printing_press')] вплинула не лише на суспільство та вчених, але й проклала шлях для нового типу бізнесу. Там, де колись цілі рукописи доводилося копіювати вручну, тепер те саме завдання можна виконати швидше та легше за допомогою машини, ефективнішої за будь-якого навченого писаря.\n\nДеякі ділові члени [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] бачать чудову можливість примножити своє багатство, заснувавши нову друкарню в [printing_press_location.GetName]. Однак, на відміну від менших підприємств, ці виробники прагнуть до значно більшого обсягу виробництва, ніж є нормою, і загрожують стабільності цін на [ShowGoodsName('books')] та [ShowGoodsName('paper')], якщо залишаться нерегульованими."
  institution_events.71.a: "Дозволити їм вести свій бізнес."
  institution_events.71.b: "Регулювати їхню крамницю."
  institution_events.71.c: "Хто знає, що вони надрукують про наш [ROOT.GetCountry.GetFlavorRank]? Закрити її!"
  institution_events.71.d: "Дозволити їм діяти, але забезпечити сплату ними плати за захист свого бізнесу."
  institution_events.80.title: "Нова тактика на полі бою"
  institution_events.80.desc: "У горнилі нашого поточного конфлікту наша давня тактика зіткнулася з грізним викликом. Сумнозвісна формація [ShowInstitutionName('pike_and_shot')] дала про себе знати на полі бою. Ця інноваційна стратегія передбачає розгортання солдатів з піками для створення захисту від рукопашних бійців, що прикривають своїх товаришів, озброєних аркебузами. Ці стрільці використовують зазначений захист для перезарядки своєї зброї та атаки ворогів на відстані.\n\nХоча деяким нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle] бракує передбачливості, щоб розпізнати користь цієї нової стратегії, інші в наших військових більш ніж заінтриговані, щоб дослідити та розробити власну форму [ShowInstitutionNameWithNoTooltip('pike_and_shot')]. Однак їм знадобиться місце для навчання своїх військ, і хоча вони обрали [target_location.GetName] як своє тренувальне поле, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] висловили свою неприязнь до інвестування в «безглузду моду на полі бою»."
  institution_events.80.a: "Інтереси [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] схиляться перед інтересами наших військових."
  institution_events.80.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] мають рацію. Ця тактика все одно з часом зникне."
  institution_events.80.c: "Залучити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] до цих досліджень."
  institution_events.81.title: "Найманці приносять нову тактику"
  institution_events.81.desc.our_mercs: "$institution_events.81.desc$ $institution_events.81.our_mercs$\n\n$institution_events.81.closing_line$"
  institution_events.81.desc.their_mercs: "$institution_events.81.desc$ $institution_events.81.their_mercs$\n\n$institution_events.81.closing_line$"
  institution_events.81.desc.combined_mercs: "$institution_events.81.desc$ $institution_events.81.our_mercs$ Ці повідомлення додатково підтверджуються іншими спостереженнями. $institution_events.81.their_mercs$\n\n$institution_events.81.closing_line$"
  institution_events.81.desc: "Відома тактика [ShowInstitutionName('pike_and_shot')] поширюється в наших військових колах. Наші офіцери та [ROOT.GetCountry.GetGovernment.GetCourtTitle] однаково заінтриговані розповідями, які чоловіки приносять з поля бою."
  institution_events.81.our_mercs: "[rented_mercs.GetName], наші власні люди, які вирішили заробляти на життя як солдати удачі, стали свідками ефективності цієї нової стратегії, коли безрозсудна кавалерія була розірвана піками, а їхня піхотна підтримка знайшла жахливу смерть від ручної гармати."
  institution_events.81.their_mercs: "[hired_mercs.GetName], війська з земель [foreign_merc_country.GetName], розповідають історії про дисципліновані війська на полі бою, які залишалися у своєму строю навіть під сильним натиском. Ні вершники, ні неорганізовані атаки піхоти не могли прорватися."
  institution_events.81.closing_line: "Природно, ці анекдоти є вагомою причиною для наших військових для подальшого дослідження цієї тактики. Вже розроблені плани щодо проведення практичних занять у [target_location.GetName]."
  institution_events.81.a: "Справді інтригуючі історії."
  institution_events.81.d: "Ми повинні відпрацювати цю тактику в [target_location.GetNameWithNoTooltip]."
  institution_events.90.title: "Єресь [ROOT.GetCountry.GetReligion.GetGroup.GetNameWithNoTooltip] у [target_location.GetNameWithNoTooltip]"
  institution_events.90.desc: "У [target_location.GetName] безліч єретиків відкрито заявили про свою опозицію до вчень [ROOT.GetCountry.GetReligion.GetName]. Ці єретичні настрої розпалили зростаючу напругу, що призвело до значного підриву нашої влади в [target_location.GetNameWithNoTooltip].\n\nХоча відновлення нашого правління над [target_location.GetRank.GetName] може покласти край місцевій автономії, спричинені заворушення можуть розпалити вже існуюче невдоволення серед населення та занурити [target_location.GetNameWithNoTooltip] у відкрите повстання проти нас."
  institution_events.90.a: "Залишити людей [target_location.GetNameWithNoTooltip] напризволяще."
  institution_events.heretic.a.tt: "Кожен [Concept('heretic', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] отримає [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  institution_events.90.b: "Ми повинні відстояти нашу владу попри все!"
  institution_events.heretic.b.tt: "Кожен [Concept('heretic', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втратить [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  institution_events.90.c: "Умиротворити єретиків, надавши їм додаткову автономію."
  institution_events.heretic.c.tt: "Кожен [Concept('heretic', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] отримає [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  institution_events.90.d: "Примусити цих єретиків до істинної віри, тоді вони визнають наше правління."
  institution_events.heretic.d.tt: "Кожен [Concept('heretic', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втратить [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], #Y 10%#! навернеться до [Concept('ROOT.GetCountry.GetReligion] [religion', 'CONCEPT_PLACEHOLDER')|e], і #R 2%#! помре"
  institution_events.91.title: "Язичники [target_location.GetNameWithNoTooltip]"
  institution_events.91.desc: "[target_location.GetName] відомий своїм дуже не-[ROOT.GetCountry.GetReligion.GetGroup.GetAdjective] населенням. Навіть не єретики, які не погоджуються з деякими [ROOT.GetCountry.GetReligion.GetAdjective] вченнями, а відверті язичники, які не могли б бути далі від світла [ROOT.GetCountry.GetReligion.GetGodName], ці жалюгідні [ROOT.GetCountry.Custom('GetHeathenInsultPlural')] мають зухвалість підривати [ROOT.GetCountry.GetAdjective] владу над [target_location.GetRank.GetName].\n\nГолоси в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] гучні та чіткі: приборкати [target_location.GetNameWithNoTooltip]. Однак місцеві жителі вже виявили невдоволення нашим [ROOT.GetCountry.GetFlavorRank]. Застосування нашої влади може стати останньою іскрою, необхідною для того, щоб язичники повстали проти нас."
  institution_events.91.a: "[target_location.GetRank.GetNameWithNoTooltip] не вартий зусиль."
  institution_events.heathen.a.tt: "Кожен [Concept('heathen', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] отримає [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  institution_events.91.b: "Нагадати тим невірним, на чиїй землі вони живуть."
  institution_events.heathen.b.tt: "Кожен [Concept('heathen', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втратить [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  institution_events.91.c: "Нехай ці язичники правлять самі собою. Це може навіть покращити наші стосунки з ними."
  institution_events.heathen.c.tt: "Кожен [Concept('heathen', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] отримає [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  institution_events.91.d: "Ці заблудлі душі повинні бути приведені до [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] віри."
  institution_events.heathen.d.tt: "Кожен [Concept('heathen', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втратить [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], #Y 10%#! навернеться до [Concept('ROOT.GetCountry.GetReligion] [religion', 'CONCEPT_PLACEHOLDER')|e], і #R 2%#! помре"
  institution_events.92.title: "Теологічні суперечки"
  institution_events.92.desc: "Теологічні питання [ROOT.GetCountry.GetReligion.GetGroup.GetName] стали причиною багатьох пристрасних і гарячих суперечок у [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Особливо [true_faith_advisor.GetName] та [false_faith_advisor.GetName], два найближчі радники [target_ruler.GetHimHerFormal], [target_ruler.GetName], постійно сперечаються про численні деталі того, що робить добре, [ROOT.GetCountry.GetReligion.GetGroup.GetNameWithNoTooltip] життя. Для [ROOT.GetCountry.GetGovernment.GetRulerTitle] ці розмови мають невелику цінність, тоді як [target_ruler.GetHerHis] члени [ROOT.GetCountry.GetGovernment.GetCabinetTitle] вважають за необхідне переконати іншого у своїй вірі. Зрештою, вони звернулися до нашого мудрого [ROOT.GetCountry.GetGovernment.GetRulerTitle], щоб знайти рішення їхньої нескінченної суперечки."
  institution_events.92.a: "Стати на бік [true_faith_advisor.GetNameWithNoTooltip]."
  institution_events.92.b: "Очевидно, [false_faith_advisor.GetNameWithNoTooltip] має рацію."
  institution_events.92.c: "Спробувати знайти компроміс."
  institution_events.92.d: "Усунути обох з [ROOT.GetCountry.GetGovernment.GetCabinetTitle]."
  institution_events.100.title: "Великий тур"
  institution_events.100.desc: "Серед європейської молоді певного стану стало дедалі моднішим вирушати у великий тур, щоб побачити пам'ятки [ShowContinentName('europe')]. Таким чином, молоді нащадки великих європейських домів можуть віддати шану великим правителям, мислителям та установам нашого часу, а також принести нові ідеї та контакти додому. Ми повинні розглянути можливість відправлення [target_character.GetName] у таку подорож, щоб покращити [target_character.GetHerHis] освіту та майбутні перспективи нашого [ROOT.GetCountry.GetFlavorRank].\n\nЗвісно, очікується, що [target_character.GetNameWithNoTooltip] подорожуватиме у стилі, гідному нашого славетного [ROOT.GetCountry.GetFlavorRank]."
  institution_events.100.a: "Чудова ідея!"
  institution_events.100.b: "Нам нічого вчитися у чужинців."
  institution_events.101.title: "Великий тур [target_character.GetNameWithNoTooltip]"
  institution_events.101.desc: "Звичай диктує, що європейська молодь шляхетного походження повинна вирушити у великий тур по [ShowContinentName('europe')], щоб побачити дива свого часу, зустрітися з великими умами та впливовими людьми, і загалом дізнатися про світ та тих, хто в ньому живе. Наші [institution_country.GetAdjective] друзі з [institution_country.GetLongName] нещодавно попросили нас дозволити їм відправити [target_character.GetName] у подібну подорож, на що ми охоче погодилися. До певної міри, їхня пропозиція відгонила зарозумілістю, але взаємодії, які [target_character.GetHeSheFormal] матиме тут, можуть виявитися дуже цінними для нашого [ROOT.GetCountry.GetFlavorRank]."
  institution_events.101.a: "[target_character.GetNameWithNoTooltip] знайшов наш [ROOT.GetCountry.GetFlavorRank] захопливим місцем!"
  institution_events.101.b: "І [target_character.GetSheHe] вважає [marriage_target.GetNameWithNoTooltip] особливо захопливим..."
  institution_events.101.b.tt: "[target_character.GetName] попросить дозволу у [target_character.GetHerHis] родини в [institution_country.GetName] одружитися з [marriage_target.GetName]"
  institution_events.105.title: "Несподіваний запит"
  institution_events.105.desc: "Листи [target_character.GetName] про [target_character.GetHerHis] досвід у [toured_country.GetName] були предметом розмов у [ROOT.GetCountry.GetGovernment.GetCourtTitle] відтоді, як [target_character.GetHeSheFormal] поїхав до [toured_country.GetLongName]. Однак [target_character.GetHerHis|U] останній лист викликав неабиякий ажіотаж у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], оскільки виявилося, що під час перебування [target_character.GetNameWithNoTooltip] у [toured_capital.GetName], [target_character.GetHeSheFormal] закохався в чарівну [marriage_target.GetName]. [target_character.GetNameWithNoTooltip] попросив дозволу привезти [marriage_target.GetHerHim] назад до нашого [ROOT.GetCountry.GetFlavorRank], щоб вони могли одружитися, повністю ігноруючи стратегічні шлюби, які ми планували для [target_character.GetHerHim]!"
  institution_events.105.a: "Хто ми такі, щоб зупиняти справжнє кохання?"
  institution_events.105.b: "Це обурливо! Вимагайте, щоб [target_character.GetSheHe] негайно припинив цю дурість!"
  institution_events.102.title: "Розширення торгової факторії"
  institution_events.102.desc: "Торговці з [trade_company_country.GetLongName], які ведуть справи на наших землях, звернулися до місцевої влади в [trade_company_province.GetName] з проханням дозволити їм розширити існуючу факторію. Вони бажають побудувати форт і отримати дозвіл збирати податки з наших підданих, що проживають у певному радіусі від їхньої факторії. Ці іноземні торговці стверджують, що якщо ми надамо їм ці права, вони не тільки зможуть компенсувати нам фінансово, але й збільшення торгівлі та трафіку до наших портів у провінції призведе до загального зростання важливості регіону в міжнародній торгівлі.\n\nОднак ми дозволимо цим іноземцям розширюватися за рахунок наших власних купців."
  institution_events.102.a: "Надайте їм право розширювати свій бізнес."
  institution_events.102.b: "Ми не можемо цього дозволити!"
  institution_events.103.title: "Торгові поступки"
  institution_events.103.desc: "Підприємливі торговці, що діють у [trade_company_province.GetName], перспективному [target_country.GetAdjective] порту, зуміли отримати значні поступки від місцевого правителя. Вони розширили свою факторію та побудували невеликий форт, з якого контролюють частину регіону. Це нове розташування надає місцевому правителю доступ до глобальної торгової мережі, але також може бути використане як легкий привід для більш прямої експансії на [target_character.GetHerHis] землі."
  institution_events.103.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  institution_events.104.title: "Торговці скаржаться"
  institution_events.104.desc: "Підприємливі торговці, що діють у [trade_company_province.GetName], перспективному [target_country.GetAdjective] порту, намагалися отримати значні поступки від місцевого правителя. Їхні дії, схоже, були менш ніж дипломатичними, і закінчилися тим, що місцевий правитель засудив як їх, так і нас."
  institution_events.104.a: "[target_country.GetGovernment.GetRuler.GetSheHe|U] пошкодує про це."
  institution_events.110.title: "Нова артилерія"
  institution_events.110.desc: "[target_war.GetName] започаткувала нову еру війни, де [ShowGoodsName('cannons')], раніше призначені для облог, займають центральне місце на полі бою. Ця потужна зброя тепер підтримує наші атакуючі полки, обрушуючи руйнування на ворожі лави. Наші військові лідери прагнуть використати цей потенціал і розробити інноваційні тактики з цими готовими до бою гарматами. Вони визначили [target_location.GetName] та її величезні кузні як місце для цих експериментів, але забезпечення необхідного фінансування для придбання артилерії з війни залишається нагальною проблемою."
  institution_events.110.a: "Надайте їм необхідне фінансування."
  institution_events.110.b: "Ми не можемо собі цього дозволити."
  institution_events.110.c: "Інвестуйте ще більше в їхні ідеї."
  institution_events.111.title: "Розвиток артилерії"
  institution_events.111.desc: "Далекобійні, важкі гармати не є чимось новим в історії людства. Катапульти, балісти та інші військові машини все частіше замінювалися ранніми формами [ShowGoodsName('cannons')], які спочатку були протипіхотною зброєю. У міру розвитку війни та технологій, гармати також розвиваються у виробництві, використанні та ефективності.\n\nНастає нова ера війни. Артилерія відіграватиме в ній ключову роль, формуючи майбутню світову історію, оскільки гармати знищуватимуть як укріплення, так і ворожі ряди – і ми опиняємося в унікальному становищі, щоб стати піонерами в галузі розвитку артилерії, коли ми вступаємо в епоху, визначену гуркотом гармат – тобто, якщо ми погодимося інвестувати в її подальший розвиток."
  institution_events.111.a: "Гармата буде нашим майбутнім."
  institution_events.111.b: "Ми не можемо дозволити собі таке підприємство."
  until_artillery_institution_embraced: "невизначений проміжок часу, доки ми не приймемо [ShowInstitutionName('artillery_institution')] [Concept('institution', 'CONCEPT_PLACEHOLDER')|e]"
  institution_events.112.title: "Покращення мобільності"
  institution_events.112.desc: "Постійною проблемою, яка довго переслідувала артилерію, є її громіздкість, що робить її непрактичною для швидкого розгортання на полі бою. Маневрування [ShowGoodsName('cannons')] на позицію та підготовка їх до бою виявилися важким завданням, часто затримуючи їхню участь до майже кінця конфлікту. На щастя, піонерські зброярі в [target_location.GetName] стали на новий шлях, експериментуючи з компактними стволами, щоб полегшити навантаження артилерії, та покращуючи колеса для полегшення її мобільності."
  institution_events.112.a: "Приємно чути."
  institution_events.113.title: "Прорив в озброєнні"
  institution_events.113.desc: "Досвідчені зброярі [target_location.GetName] зробили подальші вдосконалення наших артилерійських моделей. Виготовляючи подовжені стволи та використовуючи більшу кількість зернистого, грубого пороху, вони значно підвищили руйнівну вогневу міць наших [ShowGoodsName('cannons')]. Крім того, їхня винахідливість породила моделі мортир, унікально придатних для облоги укріплень завдяки їхнім високотравним снарядам.\n\nПроте їхня відданість [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetRulerTitle] позначена фінансовим напруженням, оскільки ці досягнення не приносять негайних прибутків. Якщо ми хочемо використовувати їхню роботу в нашій армії, ми змушені щедро винагородити цих ковалів."
  institution_events.113.a: "Придбати нову артилерію для бою."
  institution_events.113.b: "Придбати їхні нові моделі мортир для облог."
  institution_events.113.c: "Заплатити за обидва винаходи."
  institution_events.113.d: "Вивчити їхні інновації, але нічого не купувати."
  institution_events.114.title: "Призначення гармати"
  institution_events.114.desc: "Спочатку задумані як протипіхотне озброєння, [ShowGoodsName('cannons')] з XIV століття і далі перевершили своє початкове призначення, демонструючи надзвичайну корисність в контексті облог, оскільки вони здатні з легкістю руйнувати цілі фортеці. Однак їхня майстерність виходить за межі наступальних облог, оскільки вони слугують грізним стримуючим фактором проти вторгнення, коли використовуються в обороні.\n\nФорт [target_location.GetName] надає чудову можливість проявити подвійну функціональність та міць цих гармат. Посилення оборонних можливостей укріплення шляхом озброєння його цими гарматами, або використання гармат проти самого форту, бомбардуючи його оборонні стіни, є чудовими способами продемонструвати силу гармат. Хоча останній варіант може послабити здатність форту протистояти загарбникам, знання, отримані з цього польового експерименту, можуть виявитися вирішальними для просування нашої військової технології."
  institution_events.114.a: "Доповнити оборону [target_location.GetNameWithNoTooltip] гарматами."
  institution_events.114.b: "Від фортеці [target_location.GetNameWithNoTooltip] нічого не повинно залишитися!"
  institution_events.114.c: "Жоден варіант не вартий витрат."
  institution_events.115.title: "Нова артилерія встановлена"
  institution_events.115.desc: "Роки експериментів, досліджень та стратегічних інвестицій принесли свої плоди. Наша непохитна відданість розвитку артилерії не лише зміцнила нашу інфраструктуру та військові доктрини, але й піднесла артилерію на нові висоти, надавши нам значну перевагу в облогах, битвах та логістичній ефективності над конкуруючими націями."
  institution_events.115.a: "Наші вороги тремтітимуть від наших гуркотливих гармат!"
  institution_events.120.title: "Протоіндустріалізація"
  institution_events.120.desc: "Протягом століть наші шахти та кузні були відомі за межами наших кордонів завдяки високій продуктивності та якості [ShowGoodsName('iron')], які вони виробляють. Вони також унікальні завдяки способу організації праці в цих галузях, але їхній метод роботи можна було б удосконалити, прийнявши останні інновації в галузях нашого [ROOT.GetCountry.GetFlavorRank]."
  institution_events.120.a: "Ми повинні поширити цей метод на всі частини нашого [ROOT.GetCountry.GetFlavorRank]."
  institution_events.120.b: "З другого погляду, це надто дорого."
  institution_events.121.title: "Перехід гільдій до мануфактур"
  institution_events.121.desc: "Хоча гільдії довго панували над економічним ландшафтом наших міських центрів, їхня постійна значущість ніколи не була гарантована. Вітри змін проносяться нашими землями, оскільки концепція [ShowInstitutionName('manufactories')] знаходить своє місце в нашому [ROOT.GetCountry.GetFlavorRank]. Ці заклади спрощують методи виробництва, витісняючи окремих ремісників, що працюють у традиційних гільдіях. Як і очікувалося, деякі гільдії чинять опір цьому виклику їхньому політичному впливу, тоді як інші визнають прибутковий потенціал і переорієнтовують свою діяльність на володіння мануфактурами.\n\nІнтерес нашого [ROOT.GetCountry.GetFlavorRank] до долі [target_location.GetRank.GetName] [target_location.GetName] може здатися мінімальним, проте опортуністичні члени нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] бачать спосіб використати цей розвиток, що зароджується. Вони пропонують два потенційні курси дій: подальші інвестиції в [target_location.GetRank.GetNameWithNoTooltip], щоб ще більше підвищити її продуктивність, або накладення податків на гільдії, що переходять на мануфактурну модель, для нашої власної вигоди."
  institution_events.121.a: "Інвестувати в мануфактури [target_location.GetNameWithNoTooltip]."
  institution_events.121.b: "Найкраще, якщо ми не будемо втручатися."
  institution_events.121.c: "Оподаткувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]!"
  institution_events.122.title: "Гільдії протистоять мануфактурам"
  institution_events.122.desc: "Протягом століть гільдії панували над політичною та соціальною структурою [target_location.GetName]. Забезпечуючи монополії на життєво важливі товари в [target_location.GetRank.GetName], дотримуючись регульованих виробничих практик, що запобігають перевершенню одного ремісника іншим, і рішуче чинячи опір будь-яким інноваціям, що загрожують статус-кво, [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] [target_location.GetNameWithNoTooltip] зміцнили свою позицію як де-факто правителів.\n\nНе дивно, що вони рішуче виступають проти впровадження [ShowInstitutionName('manufactories')] у [target_location.GetRank.GetNameWithNoTooltip], оскільки цей розвиток загрожує зруйнувати всю їхню структуру влади. Їхнє побоювання та ворожість становлять серйозну загрозу стабільності [target_location.GetRank.GetNameWithNoTooltip], оскільки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] можуть викликати невдоволення серед населення, якщо їхній вплив буде оскаржений."
  institution_events.122.a: "Піддатися гільдіям."
  institution_events.122.b: "Вони навіть не варті нашої уваги."
  institution_events.130.title: "[ShowInstitutionNameWithNoTooltip('scientific_revolution')]"
  institution_events.130.desc: "Вітри змін знову проносяться нашими землями. Візіонери та вчені тепер кидають виклик віковому порядку світу, шукаючи точні відповіді на фундаментальні питання світу та самої природи. Ненаситна цікавість людства досягла нового історичного максимуму, готового переформувати історію.\n\nНа цьому переломному етапі ми перебуваємо в найкращому становищі, щоб стати піонерами в галузі самої науки. Однак наша здатність скористатися цією можливістю залежить від готовності [ruler_scope.GetName] інвестувати в розвиток знань і технологій."
  institution_events.130.a: "Жодна ціна не є надто високою для майбутнього нашого народу."
  institution_events.130.a.tt: "Ми зможемо отримати додаткові [Concept('events', 'CONCEPT_PLACEHOLDER')|e], пов'язані з [ShowInstitutionName('scientific_revolution')]. Ці події потім запровадять подальші наукові прориви в нашій країні, і навіть нададуть нам, залежно від кількості проривів, потужний, тимчасовий [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], як тільки ми приймемо [ShowInstitutionNameWithNoTooltip('scientific_revolution')]"
  institution_events.130.b: "Яким би важливим це не було, ми не можемо дозволити собі брати участь."
  institution_events.131.title: "Ранні наукові методи"
  institution_events.131.desc: "Поняття використання встановлених наукових методів для раціонального пояснення роботи природи є концепцією, яка збереглася протягом анналів історії. Навіть у давні часи філософи брали участь у палких і постійних дебатах, проте консенсус залишався невловимим. Впровадження експериментального методу в ісламському світі в Середньовіччі вдихнуло нову силу в ці дискусії, об'єднавши теорію з практичним спостереженням.\n\nПроте визначення всеосяжної основи для наукових методів залишалося постійним, спірним питанням. Лише завдяки колективному прийняттю систематичного експериментування, індуктивного міркування, відмови від необґрунтованих припущень та прагнення до неупередженого спостереження ці методи зміцнили свою позицію як основу, на якій могли будувати свої споруди всі інші наукові дисципліни. У цій трансформації ми бачимо переломний момент в історії знань та науки."
  institution_events.131.a: "Якщо ці методи будуть використані, то великі відкриття не забаряться!"
  institution_events.132.title: "Запроваджено геліоцентричні світогляди"
  institution_events.132.desc: "Хоча сферична природа нашої планети є беззаперечною, припущення, що Земля не є центром всесвіту, залишалося предметом палких дебатів, навіть вважалося єретичним, особливо серед [ShowReligionGroupAdjective('christian')] вірувань. Проте вагу наукових досліджень та емпіричних спостережень не можна заперечувати, і концепція геліоцентричного світогляду невблаганно набула визнання."
  institution_events.132.a: "Це єресь!"
  institution_events.132.b: "Цікаво."
  institution_events.132.historical_info: "Новаторська праця Миколая Коперника (1473-1543), полімата епохи Відродження, революціонізувала розуміння космосу. Його новаторська модель всесвіту, викладена в '#italic De revolutionibus orbium coelestium#!' (Про обертання небесних сфер) у 1543 році, сміливо розмістила Сонце в центрі космосу, ознаменувавши початок Коперниківської революції. Внесок Коперника запалив Наукову революцію, кинувши виклик усталеним віруванням і змінивши траєкторію науки. Його багатогранні таланти та інтелектуальна майстерність охоплювали математику, астрономію, канонічне право та економіку, залишивши незгладний слід в анналах людських знань."
  institution_events.134.title: "Анатомія людини"
  institution_events.134.desc: "Розуміння анатомії людини традиційно ґрунтувалося на розтині трупів тварин, а ідея розтину людського тіла для наукового дослідження протягом століть була оповита табу для багатьох культур. Проте обрана група допитливих умів, керованих прагненням до глибшого знання фізіології людини, сміливо подолала цей давній бар'єр, щоб дослідити частини людського тіла. З часом знання, отримані з цих розтинів, були об'єднані та записані в єдиний доступний том, демократизуючи це нововідкрите знання для широкої публіки."
  institution_events.134.a: "Даймо ж цим блискучим мислителям руку допомоги."
  institution_events.134.historical_info: "Андреас Везалій (1514-1564), світило в історії медичної науки, переосмислив розуміння анатомії людини завдяки новаторській праці. Його шлях розпочався, коли він обійняв престижну посаду завідувача кафедри хірургії та анатомії в Падуанському університеті, роль, яка мала трансформувати анатомічні дослідження. Він кинув виклик усталеним нормам, виступаючи за систематичне розтин як центральний інструмент навчання та дискредитуючи класичні тексти, зокрема Галена. Його новаторський шедевр '#italic De humani corporis fabrica#!' ознаменував поворотний момент в історії медичного видавництва та утвердив анатомію як сучасну описову науку. Видатна спадщина Везалія збереглася, навіть коли його життя передчасно обірвалося на острові Закінф."
  institution_events.135.title: "Хімія під час [ShowInstitutionNameWithNoTooltip('scientific_revolution')]"
  institution_events.135.desc: "Хімія бере свій початок у стародавніх мистецтвах алхімії, хоча, на відміну від свого предка, сучасна хімія еволюціонувала в окрему наукову дисципліну. Хімічна філософія наголошує на активних властивостях матерії та відходить від містицизму. Практичні досягнення, особливо в металургії, сприяють цій трансформації."
  institution_events.135.a: "Ці відкриття стануть основою для багатьох рішень."
  institution_events.135.historical_info: "Роберт Бойль (1627-1691), англо-ірландський натурфілософ, хімік і фізик, вважається ключовою фігурою у становленні сучасної хімії та розвитку експериментальної наукової методології. Його відома праця, закон Бойля, пояснює обернену залежність між тиском газу та об'ємом, коли температура підтримується постійною в закритій системі. Серед його помітних внесків, \"#italic The Sceptical Chymist#!\" є наріжним каменем у галузі хімії. Хоча Бойль був глибоко відданий своїй англіканській вірі, його науковий підхід узгоджується з принципами Френсіса Бекона в #italic Novum Organum#!, наголошуючи на емпіричних доказах та уникаючи необґрунтованих гіпотез. Всебічне дослідження Бойля поширювалося на різноманітні наукові галузі, включаючи фізику, поширення звуку, розширювальну силу замерзаючої води, питомі ваги, заломлюючі сили, кристали, електрику, колір, гідростатику та багато іншого. Його відданість хімії та прагнення до знань призвели до життєво важливих уявлень про склад речовин, природу елементів та розрізнення між сумішами та сполуками. Його впливова праця заклала основу для сучасного розуміння фізичного світу та наукового дослідження."
  institution_events.136.title: "Математизація"
  institution_events.136.desc: "Відбувається глибокий зсув у підході до розуміння природного світу. Концепція «математизації» виникла, оскільки мудреці та люди знань все частіше використовують кількісні вимірювання для дослідження фізичних явищ на Землі. Цей перехід знаменує відхід від традиційної аристотелівської філософії та віщує нову еру наукового дослідження, де математика відтепер відіграватиме вирішальну роль у забезпеченні визначеності та розуміння всесвіту."
  institution_events.136.a: "Ми повинні розраховувати на їхню корисність."
  institution_events.137.title: "Концепція гравітації"
  institution_events.137.desc: "У галузі фізики та розуміння гравітації відбувається значна трансформація. Ми є свідками розвитку новаторських ідей щодо гравітаційних сил та їхніх ефектів. Ці нові концепції кидають виклик панівним науковим парадигмам і закладають основу для значних технологічних досягнень."
  institution_events.137.a: "Гравітація цього відчуватиметься десятиліттями."
  institution_events.137.historical_info: "У 1687 році сер Ісаак Ньютон (1642-1727) представив '#italic Philosophiæ Naturalis Principia Mathematica#!', знакову працю, яка заклала основи класичної механіки. На її сторінках Ньютон розкрив три універсальні закони руху, започаткувавши нову еру розуміння складних взаємозв'язків між об'єктами, силами, що ними керують, та їхніми подальшими рухами. Ці принципи спричинили сплеск прогресу під час Промислової революції, формуючи сучасний світ.\n\nІнтелектуальні внески Ньютона виходили за межі небесної механіки, охоплюючи інновації в геометричному аналізі, подібному до числення, та новаторську роботу в акустиці. Його праці про швидкість звуку, сплющеність Землі та прецесію рівнодень демонстрували його багатогранний геній.\n\nЗавдяки своїй незмінній спадщині Ньютон залишається іконою просвітництва, надихаючи покоління вчених і мислителів."
  institution_events.138.title: "Трактат про світло"
  institution_events.138.desc: "У [GetCurrentYear] було проведено фундаментальну роботу, що описує закон обернених квадратів інтенсивності світла, принципи відбиття та їхні астрономічні наслідки. Подальші внески поглиблюють наше розуміння заломлення та відбиття, а ключові дослідження заглибилися в природу світла, кольору та оптичних властивостей."
  institution_events.138.a: "Сяюче світло на наше буття."
  institution_events.138.historical_info: "На початку 17 століття Йоганн Кеплер (1571-1630) заглибився у всебічне дослідження оптичних явищ. Результат його невтомних досліджень, '#italic Astronomiae Pars Optica#!' (Оптична частина астрономії), був представлений імператору в 1604 році. Ця праця заклала основи сучасної оптики, пояснюючи такі принципи, як закон обернених квадратів інтенсивності світла та тонкощі відбиття плоскими та вигнутими дзеркалами. Новаторські дослідження Кеплера також заглибилися в людське око, де він розпізнав перевернуту проекцію зображень на сітківці.\n\nУ 1610 році Кеплер розширив свої внески в телескопічні лінзи, ретельно досліджуючи властивості подвійно-опуклих та подвійно-увігнутих лінз. Це дослідження завершилося його працею «Діоптрика», опублікованою в 1611 році. Трактат Кеплера не тільки пояснив теоретичні основи збіжних та розбіжних лінз, але й представив астрономічний або кеплерівський телескоп, використовуючи дві опуклі лінзи для досягнення більшого збільшення. Його новаторська оптична робота значно вплинула на розвиток телескопів, формуючи траєкторію астрономічних спостережень та революціонізуючи світ оптики."
  institution_events.139.title: "Кінець [ShowInstitutionNameWithNoTooltip('scientific_revolution')]"
  institution_events.139.desc: "Після тривалого періоду інновацій та ідей, хвиля прогресу спала. Хоча полум'я нашої цікавості та наукового прогресу все ще яскраво горить, темпи нових винаходів значно сповільнилися, встановившись у більш послідовний ритм. Проте наші зусилля під час [ShowInstitutionName('scientific_revolution')] залишили свій слід на нас, оскільки наше населення виявило безпрецедентний інтерес до грамотності та відкриттів."
  institution_events.139.a: "Ера [ShowInstitutionNameWithNoTooltip('enlightenment')] настала."
  institution_events.140.title: "Масовий попит на кременеві мушкети"
  institution_events.140.desc: "Створені десятиліття тому, кременеві мушкети, тим не менш, досить популярні. Зростання чисельності армій, розвиток нової тактики з акцентом на дальній бій та вік старомодних аркебуз збільшили попит на ці мушкети вдесятеро. Змінюються не лише наші тактики та стратегії у війні, але й наші власні економічні інтереси, на які впливає [ShowInstitutionName('military_revolution')], що відбувається в нашому [ROOT.GetCountry.GetFlavorRank]."
  institution_events.140.a: "Зброя! Зброя! Зброя для всіх!"
  institution_events.141.title: "Військова теорія генерала"
  institution_events.141.desc: "У постійно мінливій сфері військової стратегії наші традиційні тактики виявляють ознаки застарілості. Поява революційного строю [ShowInstitutionName('pike_and_shot')] знаменує ще одну віху в постійному прогресі у війні, проте незабаром він сам стане предметом заміни. Генерал [target_character.GetName] оселився в [target_location.GetName], щоб створити впливовий трактат, викладаючи інноваційні доктрини, які обіцяють сформувати майбутнє нашої армії.\n\nПроте, де є блиск, там є і заздрість. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] висловили свою незгоду, стверджуючи про достатність наших поточних методів. Прийняття теорій генерала може просунути нашу військову майстерність вперед, але може викликати гнів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  institution_events.141.a: "Втілити ідеї генерала."
  institution_events.141.b: "Нам краще не провокувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] надалі."
  institution_events.142.title: "Розширення військової адміністрації"
  institution_events.142.desc: "Військові справи виходять за межі простого зіткнення армій на полі бою, охоплюючи багатогранну сферу, сповнену складної бюрократії та логістичних тонкощів. Забезпечення наявності солдатів, озброєння та провізії є першочерговим для підготовки наших сил до битви. [target_location.GetName], зокрема, став перспективним кандидатом на роль нового логістичного центру для нашої армії, за умови, що ми вирішимо зробити необхідні інвестиції."
  institution_events.142.a: "Інвестувати в [target_location.GetNameWithNoTooltip]."
  institution_events.142.b: "Нехай цим займаються військові."
  institution_events.142.c: "Перебрати військові фінанси для їхнього нового центру."
  institution_events.150.title: "Філософія [target_artist.GetNameWithNoTooltip]"
  institution_events.150.desc: "Хвилі [ShowInstitutionName('enlightenment')] нарешті досягли [ROOT.GetCountry.GetName], і разом з ними приходить хвиля думок, ідей та філософій. [target_artist.GetName] та [target_artist.GetHerHis] філософія вже здобули популярність у [target_location.GetName]."
  institution_events.150.a: "Запросити [target_artist.GetHerHim] до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  institution_events.150.b: "[target_artist.GetHerHis|U] ідеї є нічим іншим, як загрозою для нас."
  institution_events.151.title: "Філософія [target_artist.GetNameWithNoTooltip]"
  institution_events.151.desc: "Відтоді, як [target_artist.GetName] знайшов [target_artist.GetHerHis] місце на впливових посадах у нашому [ROOT.GetCountry.GetFlavorRank], [target_artist.GetHerHis] філософія перетворилася на справжній феномен. Досліджуючи природу уряду та право на правління, а також позицію вільної волі та людського самовизначення, дисертація [target_artist.GetNameWithNoTooltip] викликала великі дискусії серед еліти [ROOT.GetCountry.GetLongName]. Хоча це корисно для загальної свідомості нашого народу, вплив та ідеї філософа можуть становити велику загрозу для влади [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  institution_events.151.tt: "Кожен [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetName] отримує [ShowNamedValue('institution_progress_severe_bonus')|+=2%] прогресу до [ShowInstitutionName('enlightenment')]"
  institution_events.151.a: "[target_artist.GetHerHis|U] думки на краще для нашого [ROOT.GetCountry.GetFlavorRank]."
  institution_events.151.b: "[target.artist.GetNameWithNoTooltip] є загрозою для нашої стабільності!"
  institution_events.152.title: "Апостоли [ShowInstitutionNameWithNoTooltip('enlightenment')|U]"
  institution_events.152.desc: "Сьогодні до [ROOT.GetCountry.GetCapital.GetName] прибула надзвичайно незвичайна група людей, які просили аудієнції у нашого [ROOT.GetCountry.Custom('GetRulerOrRegentTitle')], представившись як представники навчального закладу з далекої країни. Вони заявляють, що їхня місія на наших землях полягає в документуванні, вимірюванні та категоризації наших рослин, дикої природи та суспільства. Вони бажають дізнатися все, що можуть, про наш [ROOT.GetCountry.GetFlavorRank], а потім передати ці знання в інші місця, щоб інші могли порівняти те, що вони знайдуть, з іншими частинами світу.\n\nЦілком очевидно, що це вчені люди, і ми, ймовірно, могли б використати частину цих знань. Однак, якщо ми дозволимо їм вільно подорожувати нашими землями, ми ризикуємо, що небезпечна інформація потрапить до рук тих, хто цілком може бути іноземними шпигунами."
  institution_events.152.a: "Ми повинні вчитися у цих дивовижних людей."
  institution_events.152.b: "Ми не можемо дозволити їм проникнути в нашу глибинку."
  institution_events.153.title: "Здорова критика?"
  institution_events.153.desc: "Громадські будинки, кав'ярні та інші місця, де публіка може збиратися та обговорювати, традиційно також були осередками критики та невдоволення нашим урядом. Однак останнім часом це змінилося, оскільки політична дискусія стала більш поширеною серед більш залученого загального населення. Хоча значна частина дискусії не спрямована суто на критику [ROOT.GetCountry.GetAdjective] уряду, здається, вона все ще часто дуже погано відбивається на нас.\n\nДеякі сказали б, що ми могли б отримати користь від цієї вільної дискусії, але інші рекомендують негайно закрити ці громадські місця."
  institution_events.153.a: "Ми не можемо контролювати, що думають люди."
  institution_events.153.b: "Ми не можемо цього терпіти."
  institution_events.160.title: "Запроваджено нові методи виробництва"
  institution_events.160.desc: "Залізоробники в [industrialization_province.GetName] змогли значно збільшити виробництво чавуну та кованого заліза, прийнявши нові методи, започатковані за кордоном. Це значне благо для всіляких виробників, які потребують міцного заліза, дозволяючи їм збільшити своє виробництво за меншу ціну. Бачачи цей успіх, було запропоновано, що інші частини нашого [ROOT.GetCountry.GetFlavorRank] могли б отримати вигоду від впровадження цих методів."
  institution_events.160.a: "Це змінює все!"
  institution_events.161.title: "Урбанізація"
  institution_events.161.desc: "Сім'ї ремісників із сільських поселень мігрували до [target_location.GetRank.GetName] [target_location.GetName], щоб працювати на одній із багатьох процвітаючих мануфактур. З часом [target_location.GetNameWithNoTooltip] стало ще привабливішим місцем призначення для багатьох інших. Цей так званий #italic процес урбанізації#!, здається, не сповільниться найближчим часом, оскільки ще одна хвиля сімей вже прямує з провінції [rural_province.GetName] до [urbanization_province.GetName]."
  institution_events.161.a: "Звичайний процес, як і має бути."
  institution_events.161.b: "Ми повинні негайно зупинити цю хвилю міграції."
  institution_events.170.title: "Відчуття всезагальної спільноти"
  institution_events.170.desc: "Захист нашого [ROOT.GetCountry.GetFlavorRank] був турботою лише правлячих еліт та їхніх озброєних слуг. Прості [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] мало дбали про тих, хто отримував вигоду від їхніх податків. Однак, зі зростанням військової могутності нашого [ROOT.GetCountry.GetFlavorRank], кількості його солдатів на полі бою та поширенням почуття національної єдності та гордості, ставлення простолюдинів до безпеки нашого [ROOT.GetCountry.GetFlavorRank] змінилося. Інтереси та захист нації тепер є відповідальністю народу, і таким чином відчуття всезагальної спільноти стало присутньою силою в сучасному дусі часу."
  institution_events.170.a: "Мужність народу буде нашою зброєю."
  institution_events.170.b: "Наполеглива праця народу буде нашим здоров'ям."
  institution_events.170.c: "Послух народу буде нашою силою."
  institution_events.171.title: "Загальний заклик до оборони"
  institution_events.171.desc: "[ROOT.GetCountry.GetLongName] перебуває під атакою своїх підлих [ROOT.GetCountry.GetCulture.GetName] ворогів! Наші вербувальники вже розпочали пошук чоловіків, готових до військової служби, щоб протистояти цій загрозі. Народ [target_province.GetName] особливо виявив великий ентузіазм приєднатися до наших сил та допомогти нашому [ROOT.GetCountry.GetFlavorRank] проти іноземних загарбників."
  institution_events.171.a: "За [ROOT.GetCountry.Custom('GetMotherlandFatherland')]!"
  institution_events.172.title: "Дезертирство в [target_location.GetNameWithNoTooltip]"
  institution_events.172.desc: "Зі зростанням військової адміністрації зростає і наша здатність забезпечувати маси солдатів на полі бою, щоб вони марширували та вмирали за свою [ROOT.GetCountry.Custom('GetMotherlandFatherland')]. Однак нам також потрібні чоловіки, щоб носити нашу форму, і не кожен особливо прагне пожертвувати своїм життям заради [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n#NL![target_location.GetName] особливо відмовляється передавати своїх чоловіків для нашого призову. Крім того, багато дезертирів втекли до [target_location.GetNameWithNoTooltip], щоб знайти притулок від наших вербувальників."
  institution_events.172.a: "Заберіть цих чоловіків до нашого війська. Нам потрібен кожен у наших лавах!"
  institution_events.172.b: "Закрийте очі на цю справу. У нас достатньо людей, щоб заповнити полки."
  add_scientific_breakthrough_of_type_general_science: "Ми робимо прорив у справах #Y Науки#!!"
  add_scientific_breakthrough_of_type_optics: "Ми робимо прорив у справах #Y Оптики#!!"
  add_scientific_breakthrough_of_type_chemistry: "Ми робимо прорив у справах #Y Хімії#!!"
