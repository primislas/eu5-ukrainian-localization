l_english:
  STATIC_MODIFIER_NAME_arrested_character: "Ув'язнений"
  court_flavor_events.1.title: "Радник-посередник"
  court_flavor_events.1.desc: "[advisor.GetName] вразив багатьох у країні своєю ініціативністю та вмілими лідерськими якостями, а також своїми зусиллями влитися до [ROOT.GetCountry.GetAdjective] двору. Однак, схоже, [advisor.GetSheHe] не розірвав усіх зв'язків зі своїми співвітчизниками в [advisor_liaisons_target_country.GetLongName]. [advisor.GetSheHe|U] наполягав на покращенні відносин зі своєю батьківщиною, [advisor_liaisons_target_country.GetLongNameWithNoTooltip], і запропонував використати свої контакти при [advisor_liaisons_target_country.GetAdjectiveWithNoTooltip] дворі, щоб спонукати [advisor_liaisons_target_country.GetGovernment.GetRulerTitle] зайняти більш дружню позицію щодо нас."
  court_flavor_events.1.a: "Зробімо це."
  court_flavor_events.1.A.tooltip: "[advisor.GetName] звернеться до [advisor_liaisons_target_country.GetLongName] для покращення відносин."
  court_flavor_events.1.b: "Нам не потрібні кращі відносини з ними."
  court_flavor_events.2.title: "Зближення з [from.GetLongNameWithNoTooltip]?"
  court_flavor_events.2.desc: "[advisor.GetName], вправний [advisor.GetCulture.GetName] [from.GetGovernment.GetCabinetMemberTitle], який служить при [from.GetAdjective] [from.GetGovernment.GetCourtTitle], звернувся до своїх старих соратників у нашій країні з планом сприяти покращенню відносин між [from.GetLongNameWithNoTooltip] та [ROOT.GetCountry.GetLongName]. [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] звернувся до [ROOT.GetCountry.GetGovernment.GetRuler.GetName] з [from.GetAdjectiveWithNoTooltip] посланням, яке говорить про їхнє бажання дружби між нашими народами."
  court_flavor_events.2.a: "Кращі відносини справді можуть бути нам на користь."
  opinion_court_events_accept: "Зближення"
  court_flavor_events.2.b: "Кращі відносини не в наших інтересах."
  opinion_court_events_rebuke_1: "Відмова у зближенні"
  court_flavor_events.2.c: "Дружба? Геть з очей моїх!"
  opinion_court_events_rebuke: "Відмова у зближенні"
  court_flavor_events.3.title: "Успішне зближення"
  court_flavor_events.3.desc: "Контакти [advisor.GetName] у [advisor_liaisons_target_country.GetLongName] представили нашу справу [advisor_liaisons_target_country.GetGovernment.GetRulerTitle] [advisor_liaisons_target_country.GetGovernment.GetRuler.GetName] і отримали сприятливу відповідь. [advisor_liaisons_target_country.GetGovernment.GetRulerTitle] каже, що [advisor_liaisons_target_country.GetGovernment.GetRuler.GetSheHe] з нетерпінням чекає нової ери дружби між нашими країнами."
  court_flavor_events.3.a: "$common_string_good$"
  court_flavor_events.4.title: "Невдале зближення"
  court_flavor_events.4.desc: "Контакти [advisor.GetName], схоже, не змогли досягти значного успіху при [advisor_liaisons_target_country.GetAdjectiveWithNoTooltip] дворі. [advisor_liaisons_target_country.GetGovernment.GetRulerTitle] [advisor_liaisons_target_country.GetGovernment.GetRuler.GetName] повідомив їм, що [advisor_liaisons_target_country.GetLongName] не зацікавлений у кращих відносинах з [ROOT.GetCountry.GetLongName]."
  court_flavor_events.4.a: "$common_string_this_is_not_good$"
  court_flavor_events.5.title: "Рішуча відмова у зближенні"
  court_flavor_events.5.desc: "Контакти [advisor.GetName] не змогли досягти успіху при [advisor_liaisons_target_country.GetAdjective] дворі. Насправді, відповідь, яку вони отримали, була відкрито ворожою. Їм не тільки недвозначно повідомили, що [advisor_liaisons_target_country.GetLongName] не зацікавлений у кращих відносинах з [advisor_liaisons_target_country.GetLongName], але й [advisor.GetName] дали зрозуміти, що [advisor.GetSheHe] відтепер небажаний у [advisor_liaisons_target_country.GetLongName]. Серед анти-[ROOT.GetCountry.GetAdjective] настроїв, [advisor_liaisons_target_country.GetGovernment.GetRulerTitle] [advisor_liaisons_target_country.GetGovernment.GetRuler.GetName] навіть зайшов так далеко, що вигнав кількох соратників нашого радника зі свого двору."
  court_flavor_events.5.a: "Хай буде так."
  court_flavor_events.10.title: "Звинувачення у нелояльності"
  court_flavor_events.10.desc: "Не всі задоволені планом доручити [advisor.GetName] пошук кращих відносин з [advisor_liaisons_target_country.GetLongName]. З посиленням незгоди при [ROOT.GetCountry.GetAdjective] дворі, інший [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle], який раніше підтримував дружнє суперництво з [advisor.GetHerHim] за увагу [ROOT.GetCountry.GetGovernment.GetRuler.GetName], висунув звинувачення у нелояльності. Він стверджує, що розслідував діяльність [advisor.GetNameWithNoTooltip] і виявив, що вона зводиться до не більше ніж передачі державних таємниць [advisor_liaisons_target_country.GetLongNameWithNoTooltip] під виглядом пошуку зближення.\n\nЗі свого боку, [advisor.GetNameWithNoTooltip] заперечує, що докази, висунуті проти [advisor.GetHerHim], є фабрикацією, натхненною заздрістю його суперника до його успіху. [advisor.GetSheHe|U] клянеться, що [advisor.GetSheHe] лояльний і принесе позитивні результати, якщо йому буде надана наша повна довіра."
  court_flavor_events.10.a: "[advisor.GetSheHe|U] має нашу повну довіру."
  court_flavor_events.10.A.tt1: "[advisor.GetName] залишається вірним."
  court_flavor_events.10.A.tt2: "[advisor.GetName] зраджує нашу довіру."
  court_flavor_events.10.b: "Краще не ризикувати. Заарештувати їх!"
  court_flavor_events.10.B.tt: "[advisor_liaisons_target_country.GetLongName] може протестувати проти цього курсу дій."
  court_flavor_events.11.title: "Зрада"
  court_flavor_events.11.desc: "[advisor.GetName] зрадив нас! Один із його суперників виявив неспростовні докази того, що [advisor.GetSheHe] розкрив різноманітні державні таємниці [advisor_liaisons_target_country.GetLongName], прикидаючись представником наших інтересів. На жаль, [advisor.GetSheHe] втік через кордон, перш ніж ми змогли заарештувати [advisor.GetHerHim]."
  court_flavor_events.11.a: "$common_string_this_is_not_good$"
  court_flavor_events.12.title: "[from.GetAdjectiveWithNoTooltip] Перебіжчик!"
  court_flavor_events.12.desc: "Особа постала перед [ROOT.GetCountry.GetGovernment.GetRulerTitle], наполягаючи на тому, що її необхідно вислухати. За його словами, він служив [from.GetAdjectiveWithNoTooltip] [from.GetGovernment.GetRulerTitle] і дізнався інформацію, що становить життєвий інтерес як для нас, так і для [from.GetLongName]. Заявляючи, що він [ROOT.GetCountry.GetAdjective] патріот, він тепер пропонує нам свої послуги разом з інформацією, яка, за його словами, була майстерно зібрана з найпотаємніших кіл [from.GetAdjectiveWithNoTooltip] двору і доставлена нам з значним ризиком для його життя."
  court_flavor_events.12.a: "Його послуги будуть пам'ятані — і винагороджені."
  opinion_court_events_annoyed: "Прийняли зрадника"
  court_flavor_events.12.b: "Нам не потрібні зрадники."
  opinion_court_events_grateful: "Відвернули зрадника"
  court_flavor_events.13.title: "Спійманий на гарячому"
  court_flavor_events.13.desc: "[advisor_liaisons_target_country.GetAdjective] посол повідомляє, що [advisor_liaisons_target_country.GetAdjective] влада заарештувала злочинця, [advisor.GetName], коли [advisor.GetSheHe] намагався зрадити нашу довіру та перебігти до [advisor_liaisons_target_country.GetLongName]. Він запевняє нас, що наші таємниці в безпеці, і що наш [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] діяв без [advisor_liaisons_target_country.GetAdjective] відома чи схвалення."
  court_flavor_events.13.a: "Наша вдячність буде вічною."
  court_flavor_events.15.title: "Ув'язнений співвітчизник у [from.GetLongNameWithNoTooltip]"
  court_flavor_events.15.desc: "До нашої уваги дійшло, що [advisor.GetName], один з наших співвітчизників, який працював при [from.GetAdjective] дворі, утримується під вартою за нібито планування витоку державних таємниць нам. Хоча ці звинувачення здаються правдивими, [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] взяв їхню справу і звертається до [ROOT.GetCountry.GetGovernment.GetRulerTitle]: «Чому вірний підданий має бути в'язнем у чужих залах?» — запитує [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle]. — «Ми повинні рішуче протестувати проти цієї дії та вимагати їхнього повернення до нас»."
  court_flavor_events.15.a: "Ми не можемо їх покинути."
  opinion_court_events_interfered: "Втрутилися в наші справи"
  court_flavor_events.15.b: "Ми не будемо втручатися."
  court_flavor_events.16.title: "[advisor_liaisons_target_country.GetAdjectiveWithNoTooltip] Вимоги"
  court_flavor_events.16.desc: "[advisor_liaisons_target_country.GetAdjective] [advisor_liaisons_target_country.GetGovernment.GetRulerTitle] надіслав нам гнівне послання з вимогою пояснень щодо арешту зрадника: «Ми чули, що ви тримаєте одного з наших співвітчизників ув'язненим за нібито зраду ваших інтересів на нашу вимогу. Ми можемо запевнити вас, що це не так. Ми вимагаємо негайно звільнити [advisor.GetHerHim]!»"
  court_flavor_events.16.a: "Гаразд. Хай буде так."
  opinion_court_events_released_compatriot: "Звільнений співвітчизник"
  court_flavor_events.16.b: "Ми не будемо діяти всупереч справедливості."
  opinion_court_events_held_compatriot: "Утримуваний співвітчизник у полоні"
  court_flavor_events.17.title: "[from.GetAdjective] Відповідь"
  court_flavor_events.17.desc: "[from.GetAdjectiveWithNoTooltip] [from.GetGovernment.GetRulerTitle] відповів на наші вимоги: «На знак доброї волі, попри значні викривальні докази проти цієї особи, ми звільнили [advisor.GetName]. Сподіваємося, що ви прихильно поставитеся до нас за цей вчинок»."
  court_flavor_events.17.a: "Це було лише справедливо."
  court_flavor_events.18.title: "[from.GetAdjective] Відповідь"
  court_flavor_events.18.desc: "[from.GetAdjectiveWithNoTooltip] [from.GetGovernment.GetRulerTitle] відповів на наші вимоги: «Ми не звільняємо винних у державній зраді. [advisor.GetName] залишиться під вартою»."
  court_flavor_events.18.a: "Ви пошкодуєте про це."
  court_flavor_events.20.title: "Сумнівні практики витрат"
  court_flavor_events.20.desc: "Витрати [advisor.GetName] викликали деякі запитання. [advisor.GetSheHe|U] витрачав(-ла) великі суми грошей — набагато більші, ніж ті, до яких особа на [advisor.GetHerHis] посаді повинна мати доступ — розподіляючи подарунки місцевому [advisor.GetEstateType.GetName] у [advisor.GetHerHis] рідному регіоні та покращуючи місцеву інфраструктуру. Розслідування виявило факти: замість того, щоб служити [ROOT.GetCountry.GetGovernment.GetRulerTitle] якнайкраще, відповідно до [advisor.GetHerHis] здібностей, [advisor.GetNameWithNoTooltip] перенаправляв(-ла) державні кошти до [corrupt_advisor_location.GetName], щоб підвищити [advisor.GetHerHis] популярність там. Хоча це було благом для місцевої економіки, такі практики можуть виявитися згубними для держави в цілому, якщо їх терпіти."
  court_flavor_events.20.a: "Закрити очі."
  court_flavor_events.20.b: "Заарештувати [advisor.GetHerHim]!"
  court_flavor_events.21.title: "Відхід за покликом совісті"
  court_flavor_events.21.desc: "Записка від [advisor.GetName] була знайдена серед паперів [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\n#F Мій [ROOT.GetCountry.GetGovernment.GetRulerTitle],\nЯ завжди служив(-ла) вам і [ROOT.GetCountry.GetLongName] якнайкраще, відповідно до моїх здібностей. Однак, з важким серцем я мушу оголосити про свою відставку з посади вашого [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle]. Оголошення війни [religious_enemy_country.GetLongName] перетнуло межу — я більше не можу мовчати перед вашими злочинами проти моїх релігійних братів.\n\nЗ повагою,\n[advisor.GetNameWithNoTooltip]#!\n\n\nСпроби знайти [advisor.GetHerHim] поки що виявилися безуспішними. Схоже, [advisor.GetSheHe] втік(-ла) з країни."
  court_flavor_events.21.a: "$common_string_this_is_not_good$"
  court_flavor_events.22.title: "Іноземна мудрість"
  court_flavor_events.22.desc: "Хоча [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] дещо стурбований(-а) ідеєю іноземця, який працює на їхнього [ROOT.GetCountry.GetGovernment.GetRulerTitle], наш [advisor.GetCulture.GetName] [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle], [advisor.GetName], був(-ла) широко похвалений(-а) за привнесення свіжих ідей та практик до двору. Здається, ми все ще можемо дечому навчитися від іноземних знань!"
  court_flavor_events.22.a: "$common_string_good$"
  court_flavor_events.25.title: "Кров густіша за воду?"
  court_flavor_events.25.desc: "Поточна війна з [advisor_enemy_country.GetLongName] викликала низку інтриг при [ROOT.GetCountry.GetAdjective] дворі. З одного боку, [advisor.GetName], наш [advisor.GetCulture.GetName] [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle], запропонував(-ла) отримати інформацію зі [advisor.GetHerHis] мережі контактів у [advisor_enemy_country.GetLongNameWithNoTooltip] — значної мережі, як [advisor.GetSheHe] стверджує, включаючи кілька контактів, близьких до [advisor_enemy_country.GetGovernment.GetRulerTitle], — щоб допомогти військовим зусиллям.\n\nЗ іншого боку, [advisor.GetHerHis] політичні опоненти висловили сумніви щодо [advisor.GetHerHis] лояльності. Вони стверджують, що, попри [advisor.GetHerHis] попередню зразкову службу, ми просто не можемо довіряти [advisor.GetCulture.GetNameWithNoTooltip] брати участь у обговореннях національного значення в цей час. Тому вони вимагають, щоб [advisor.GetSheHe] був(-ла) вигнаний(-а) з двору."
  court_flavor_events.25.a: "Вони мають рацію — вигнати [advisor.GetHerHim]!"
  court_flavor_events.25.b: "Залишити [advisor.GetHerHim] — [advisor.GetHerHis] інформація буде корисною."
  court_flavor_events.26.title: "Звіти про [advisor_enemy_country.GetAdjectiveWithNoTooltip] військові плани"
  court_flavor_events.26.desc: "Попри запитання щодо [advisor.GetHerHis] лояльності, [advisor.GetName], схоже, дотримав(-ла) [advisor.GetHerHis] слова. Надійшли перші звіти з [advisor.GetHerHis] мережі контактів, надаючи нам значну інформацію щодо [advisor_enemy_country.GetAdjective] військових планів."
  court_flavor_events.26.a: "$common_string_good$"
  court_flavor_events.27.title: "[from.GetAdjectiveWithNoTooltip] Перебіжчик!"
  court_flavor_events.27.desc: "Особа постала перед [ROOT.GetCountry.GetGovernment.GetRulerTitle], наполягаючи, що її мусять вислухати. Вона стверджує, що служила [from.GetAdjectiveWithNoTooltip] [from.GetGovernment.GetRulerTitle] і дізналася подробиці [from.GetAdjective] воєнних планів проти [ROOT.GetCountry.GetLongName], її батьківщини. Як самопроголошений [ROOT.GetCountry.GetAdjectiveWithNoTooltip] патріот, вона тепер пропонує нам свої послуги разом із цією інформацією, яка, за її словами, була майстерно здобута з найпотаємніших кіл [from.GetAdjectiveWithNoTooltip] двору та доставлена нам із значним ризиком для її життя."
  court_flavor_events.27.a: "Її послуги будуть пам'ятатися — і винагороджуватися."
  court_flavor_events.28.title: "Зрада"
  court_flavor_events.28.desc: "[advisor.GetName] зрадив нас! Попри пильні очі [advisor.GetHerHis] ворогів, [advisor.GetSheHe] зміг прослизнути через кордон із копіями важливих документів, що стосуються наших воєнних планів!"
  court_flavor_events.28.a: "$common_string_this_is_not_good$"
  court_flavor_events.30.title: "Зміна політики?"
  court_flavor_events.30.desc: "[advisor.GetName] здобув багато друзів при [ROOT.GetCountry.GetAdjective] дворі завдяки [advisor.GetHerHis] відданій службі як [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle]. Однак, схоже, зворотне так само вірно серед [advisor.GetHerHis] співвітчизників на службі у [advisor_antiliaisons_target_country.GetAdjective] [advisor_antiliaisons_target_country.GetGovernment.GetGovernmentType.GetName]: заздрячи [advisor.GetHerHis] становищу, вони дорікають [advisor.GetHerHim] за те, що він влаштувався на роботу серед ворогів [advisor.GetHerHis] народу, і почали поширювати чутки, що ставлять під сумнів [advisor.GetHerHis] надійність\nСтурбований [advisor.GetHerHis] становищем при [ROOT.GetCountry.GetAdjectiveWithNoTooltip] дворі, [advisor.GetNameWithNoTooltip] став затятим противником [advisor_antiliaisons_target_country.GetAdjectiveWithNoTooltip] [advisor_antiliaisons_target_country.GetGovernment.GetRulerTitle]. [advisor.GetSheHe|U] об'єднався з кількома однодумцями, щоб закликати до жорсткішої позиції щодо [advisor_antiliaisons_target_country.GetLongNameWithNoTooltip]."
  court_flavor_events.30.a: "[advisor.GetSheHe|U] має рацію — потрібна зміна політики."
  advisor_antiliaisons: "Жорстка позиція"
  advisor_spurious_accusations: "Неправдиві звинувачення"
  court_flavor_events.30.b: "Гірші відносини не в наших інтересах."
  court_flavor_events.31.title: "Настирливий радник"
  court_flavor_events.31.desc: "Наші очі та вуха в [from.GetLongName] повідомляють, що [from.GetAdjectiveWithNoTooltip] [from.GetGovernment.GetRulerTitle] нещодавно зайняв жорсткішу позицію щодо [ROOT.GetCountry.GetLongName]. Схоже, ця зміна політики була значною мірою спричинена [advisor.GetName], [from.GetAdjectiveWithNoTooltip] [from.GetGovernment.GetCabinetMemberTitle], який, стурбований [advisor.GetHerHis] становищем при [from.GetAdjectiveWithNoTooltip] дворі, висував різноманітні звинувачення проти нас і агітував за рішучу відповідь на наші передбачувані агресії."
  court_flavor_events.31.a: "Та що ж це за дрібниця!.."
  court_flavor_events.32.title: "Настирливий радник"
  court_flavor_events.32.desc: "Попри нашу відсутність підтримки [advisor.GetHerHis] проєкту щодо посіяти розбрат між нами та [advisor_antiliaisons_target_country.GetLongName], [advisor.GetName] не припинив [advisor.GetHerHis] зусиль. Схоже, [advisor.GetSheHe] привернув велику кількість впливових осіб, які підтримують [advisor.GetHerHis] позицію та терміново закликають до зміни політики. Вони поширюють своє послання, яке, схоже, сильно резонує серед простого люду, усіма доступними їм засобами. Йти проти їхньої волі може виявитися ризикованим."
  court_flavor_events.32.a: "Можливо, [advisor.GetSheHe] все-таки має рацію."
  court_flavor_events.32.b: "Ні означає ні."
  court_flavor_events.35.title: "[exile_country.GetAdjectiveWithNoTooltip] Вигнанець"
  court_flavor_events.35.desc: "[advisor.GetName], політичний вигнанець з [exile_country.GetLongName], з'явився при нашому дворі. Він пропонує свої послуги [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip] в обмін на захист від [exile_country.GetAdjectiveWithNoTooltip] [exile_country.GetGovernment.GetRulerTitle]. Чи варто нам його прийняти?"
  court_flavor_events.35.a: "Його послуги будуть корисними."
  opinion_took_in_exiles: "Прийняли вигнанців"
  court_flavor_events.35.b: "У нас немає для нього місця."
  opinion_turned_away_exiles: "Відмова вигнанцям"
  court_flavor_events.36.title: "[exile_country.GetAdjectiveWithNoTooltip] вигнанці"
  court_flavor_events.36.desc: "[advisor.GetName] вдячний за наданий притулок при [ROOT.GetCountry.GetAdjective] дворі. Однак [advisor.GetSheHe] нещодавно звернув увагу на те, що в [advisor.GetHerHis] становищі є багато інших [exile_country.GetAdjective] знатних осіб — людей великої мудрості та впливу, наполягає [advisor.GetSheHe]. Було б корисно дозволити їм приєднатися до нашого двору, якщо ми бажаємо посилити нашу опозицію до [exile_country.GetAdjectiveWithNoTooltip] амбіцій."
  court_flavor_events.36.a: "Ми приймемо їх."
  court_flavor_events.36.b: "У нас немає місця для більшої кількості вигнанців."
  court_flavor_events.37.title: "Вигнанці в [from.GetLongNameWithNoTooltip]"
  court_flavor_events.37.desc: "Наші очі та вуха в [from.GetLongName] повідомляють, що вони прийняли багатьох політичних ворогів нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], які раніше були вигнані з [ROOT.GetCountry.GetAdjective] двору або вирішили шукати можливості в іншому місці. Тепер вони наполягають на рішучих діях проти нинішнього [ROOT.GetCountry.GetAdjectiveWithNoTooltip] \"режиму\" і надають активну допомогу [from.GetAdjectiveWithNoTooltip] [from.GetGovernment.GetRulerTitle] для досягнення цієї мети."
  court_flavor_events.37.a: "Як вони сміють!"
  opinion_hosting_exiles: "Прийом вигнанців"
  court_flavor_events.39.title: "Єресь у [heathen_advisor_country.GetLongNameWithNoTooltip]"
  court_flavor_events.39.desc: "До нашої уваги дійшло, що [heathen_advisor_country.GetAdjective] [heathen_advisor_country.GetGovernment.GetRulerTitle] переховує єретика у [heathen_advisor_country.GetGovernment.GetRuler.GetHerHis] дворі. [heathen_advisor_country.GetGovernment.GetRuler.GetHerHis|U] [heathen_advisor_country.GetGovernment.GetCabinetMemberTitle], [advisor.GetName], відвернувся від вчень Папи і відкрито сповідує віру [advisor.GetReligion.GetName] — поширюючи при цьому підступну брехню проти Його Святості."
  court_flavor_events.39.a: "Нестерпно! Ми повинні висловити протест."
  opinion_interfering_pope: "Втручання Папи"
  court_flavor_events.39.b: "Ми заплющимо очі."
  court_flavor_events.40.title: "Папські вимоги"
  court_flavor_events.40.desc: "Прибула [GetCountry('PAP').GetAdjective] делегація. З серйозним виразом обличчя вони повідомляють нам, що до відома [target_pope.GetHisHerFormal] [target_pope.GetName] дійшло, що ми переховуємо єретика в нашому [ROOT.GetCountry.GetGovernment.GetFlavorRank]. Вони вимагають, щоб ми передали [advisor.GetHerHim] інквізиції. В іншому випадку [target_pope.GetShortNameWithNoTooltip] вважатиме, що ми відмовилися від Істинного Шляху, і буде змушений вжити всіх необхідних заходів проти нас."
  court_flavor_events.40.a: "Передати [advisor.GetHerHim]."
  opinion_bowed_to_papal_demand_advisor: "Підкорилися папським вимогам"
  court_flavor_events.40.b: "Ми не підкоримося папському тиску."
  opinion_rejected_papal_demand_advisor: "Прийом єретика"
  court_flavor_events.41.title: "[heathen_advisor_country.GetLongNameWithNoTooltip] підкоряється"
  court_flavor_events.41.desc: "[heathen_advisor_country.GetAdjective] [heathen_advisor_country.GetGovernment.GetRulerTitle] вибачається за наймання єретика, якого буде доставлено до нас у ланцюгах, а його брехня замовкне назавжди!"
  court_flavor_events.41.a: "$common_string_good$"
  court_flavor_events.42.title: "[heathen_advisor_country.GetLongNameWithNoTooltip] кидає виклик нашій владі"
  court_flavor_events.42.desc: "[heathen_advisor_country.GetAdjective] [heathen_advisor_country.GetGovernment.GetRulerTitle] висловлює гнів на наше прохання, яке [heathen_advisor_country.GetGovernment.GetRuler.GetSheHe] має зухвалість назвати перевищенням нашої влади — ніби Папа не є арбітром усіх духовних справ у християнському світі. Зло справді заволоділо [heathen_advisor_country.GetLongName]."
  court_flavor_events.42.a: "Їх збили зі шляху."