l_english:
  survive_string: "Якщо [target_character.GetLastName] переживе [target_character.GetHerHis] мандри, [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що прихистить [target_character.GetHerHim], дізнається про"
  ibn_battuta_events.1.title: "Мандрівник світу"
  ibn_battuta_events.1.desc: "Маючи вже багато земель за [target_character.GetHerHim], [target_character.GetLastName] тепер спрямовує [target_character.GetHerHis] погляд на далекий [GetCountry('YUA').GetLongName]. Розповіді про величезні міста, витончені звичаї та могутніх імператорів давно досягли [target_character.GetHerHis] вух. Прагнучи побачити дива Сходу та розширити [target_character.GetHerHis] знання про далекі двори та культури, [target_character.GetLastNameWithNoTooltip] готується до наступної та найамбітнішої частини [target_character.GetHerHis] подорожі. Шлях попереду довгий і невизначений, але [target_character.GetLastNameWithNoTooltip] мандрує з непохитною рішучістю та допитливим духом, справжній піонер нашого часу."
  ibn_battuta_events.1.a: "Спрямувати [target_character.GetHerHis] подорож до [target_location_1.GetNameWithNoTooltip]."
  ibn_battuta_events.1.b: "[target_character.GetSheHe|U] має відвідати [target_location_2.GetNameWithNoTooltip]!"
  ibn_battuta_events.1.c: "Порт [target_location_3.GetNameWithNoTooltip] — це видовище, варте уваги під час [target_character.GetHerHis] подорожей."
  ibn_battuta_events.1.d: "Відправити [target_character.GetHerHim] безпосередньо до [target_character.GetHerHis] пункту призначення."
  ibn_battuta_events.1.historical_info: "Ібн Баттута був марокканським мандрівником і вченим, народженим у Танжері на початку чотирнадцятого століття. Він покинув дім молодим чоловіком, щоб здійснити релігійну подорож до Мекки, але його мандри охопили більшу частину відомого світу. Протягом трьох десятиліть він відвідав землі Африки, Близького Сходу, Персії, Індії, Центральної Азії та навіть частини Китаю. По дорозі він обіймав посади юридичного експерта та судді в кількох мусульманських судах. Його детальний опис подорожі, відомий як Ріхла, дає рідкісний і багатий погляд на багато культур і суспільств того часу."
  ibn_battuta_will_islamic_texts_in_pasai_tt: "Перебуваючи в [target_location_1.GetName], [target_character.GetLastName] вивчатиме [ShowReligionGroupAdjective('muslim')] тексти. Наступні зупинки під час [target_character.GetHerHis] подорожі отримають бонуси до [Concept('piety', 'CONCEPT_PLACEHOLDER')|e]"
  when_ibn_battuta_drafts_rihla_he_will_remember_sumatra_tt: "$survive_string$ [target_location_1.GetArea.GetName]"
  ibn_battuta_will_admire_and_study_the_architecture_of_angkor_tt: "Перебуваючи в [target_location_2.GetName], [target_character.GetLastName] милуватиметься грандіозною архітектурою [target_location_2.GetRank.GetName]. Наступні зупинки під час [target_character.GetHerHis] подорожі отримають бонуси до [Concept('building', 'CONCEPT_PLACEHOLDER')|e]"
  when_ibn_battuta_drafts_rihla_he_will_remember_lower_mekong_tt: "$survive_string$ [target_location_2.GetArea.GetName]"
  ibn_battuta_trade_in_martaban_tt: "Перебуваючи в [target_location_3.GetName], [target_character.GetLastName] стане свідком його жвавого порту та стабільного потоку цінних товарів. Пізніші зупинки під час [target_character.GetHerHis] подорожі отримають бонуси до [Concept('trade_efficiency', 'CONCEPT_PLACEHOLDER')|e]."
  when_ibn_battuta_drafts_rihla_he_will_remember_irrawady_delta_area_tt: "$survive_string$ [target_location_3.GetArea.GetName]"
  ibn_battuta_events.2.title: "[target_character.GetLastNameWithNoTooltip] відвідує наші землі"
  ibn_battuta_events.2.desc: "Відомий [ShowCultureName('moroccan')] мандрівник [target_character.GetLastName], відправившись з $india$ за дипломатичним призначенням, тепер опиняється у жвавих і вологих землях нашого [ROOT.GetCountry.GetFlavorRank]. [target_character.GetHerHis|U] щоденники розповідають про гамірний [ShowReligionGroupAdjective('muslim')] порт, де заклик до молитви зустрічається з ароматом заморських прянощів.\n\nТепер [target_character.GetSheHe] прикрашає наші зали своєю присутністю в [target_location.GetName]. [target_character.GetSheHe|U] пише про правителів, які вшановують [target_character.GetHerHim] подарунками, про величні храми та місцеві звичаї, а також про людей, які прийняли нові віри, тримаючись за давні традиції. Хоча [target_character.GetHerHis] шлях залишається оповитим невизначеністю, одна істина є безсумнівною — [target_character.GetHerHis] подорож залишила відлуння в дворах і портах Сходу."
  ibn_battuta_events.2.a: "Цікавий чоловік!"
  ibn_studied_islamic_texts_in_pasai_tt: "Через те, що [target_character.GetLastName] вивчав [ShowReligionGroupAdjective('muslim')] тексти в [ShowLocationName('pasai')]:"
  angkor_ibn_battuta_effect: "Через те, що [target_character.GetLastName] вивчав архітектуру [ShowLocationName('angkor')]:"
  martaban_ibn_battuta_effect_tt: "Через те, що [target_character.GetLastName] вивчав торговельні шляхи великих портів у [ShowLocationName('martaban')]:"
  ibn_battuta_events.3.title: "[target_character.GetLastNameWithNoTooltip] досягає [GetCountry('CHI').GetNameWithNoTooltip]"
  ibn_battuta_events.3.desc: "Після років блукань морськими шляхами, дельтами та династіями, [target_character.GetLastName] прибув до легендарних земель нашого [ROOT.GetCountry.GetFlavorRank]. Хоча [target_character.GetHerHis] нотатки менш точні, ніж у попередніх записах, [target_character.GetSheHe] описує величні міста, що кишать активністю, цікаві звичаї, незнайомі [target_character.GetHerHim], та далеких правителів, чия влада поширюється на все їхнє царство.\n\nЧи привела [target_character.GetHerHis] подорож [target_character.GetHerHim] до [ROOT.GetCountry.GetCapital.GetName], чи лише до розлогих портів південного узбережжя, [target_character.GetSheHe] вражений масштабом і порядком [ShowCultureGroupName('chinese_group')] цивілізації. Іноземні письмена, храми та великі ринки незабаром можуть заповнити сторінки [target_character.GetHerHis] щоденника, свідчення мандрівника, який справді перетнув межі відомого світу."
  ibn_battuta_events.3.a: "Дозволити [target_character.GetHerHim] відвідувати наші церемонії та культурні заходи."
  ibn_battuta_events.3.b: "[target_character.GetSheHe|U] буде дозволено спостерігати та вивчати нашу правову систему."
  ibn_battuta_events.3.c: "[target_character.GetSheHe|U] — просто ще один відвідувач, без особливого ставлення!"
  ibn_battuta_observes_customs_tt: "Перебуваючи в [ROOT.GetCountry.GetCapital.GetName], [target_character.GetLastName] відзначить і вивчить наші місцеві звичаї. Наступні зупинки під час [target_character.GetHerHis] подорожі отримають вигоду від [Concept('cultural_influence', 'CONCEPT_PLACEHOLDER')|e] а також [Concept('cultural_tradition', 'CONCEPT_PLACEHOLDER')|e] бонусів"
  ibn_battuta_observes_chinese_laws_tt: "Перебуваючи в [ROOT.GetCountry.GetCapital.GetName], [target_character.GetLastName] відзначить і вивчить наші закони. Наступні зупинки під час [target_character.GetHerHis] подорожі отримають вигоду від бонусів, пов'язаних з їхнім [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]"
  when_ibn_battuta_drafts_rihla_he_will_remember_capital_region_tt: "$survive_string$ [ROOT.GetCountry.GetCapital.GetRegion.GetName]"
  ibn_battuta_will_simply_observe_while_hes_here_tt: "Перебуваючи в [ROOT.GetCountry.GetCapital.GetName], [target_character.GetLastName] просто блукатиме нашими ринками та краєвидами, не пропонуючи жодних бонусів наступним [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які можуть прийняти [target_character.GetHerHim]"
  ibn_battuta_next_destination_target_country_1_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [target_country_1.GetName] приблизно через #Y 2#! роки"
  ibn_battuta_events.4.title: "Прибуття [target_character.GetLastNameWithNoTooltip]"
  ibn_battuta_events.4.desc: "Після далеких подорожей через [ShowRegionName('indonesia_region')], і, можливо, навіть казкові міста [GetCountry('YUA').GetLongName], [target_character.GetLastName] тепер знаходить [target_character.GetHerselfHimself] десь у нашому [ROOT.GetCountry.GetFlavorRank]. Прийнятий згідно з нашими місцевими традиціями та звичаями, цей стомлений мандрівник прагне дослідити наше суспільство та записати все, що привертає [target_character.GetHerHis] увагу.\n\nПравду кажучи, [target_character.GetSheHe] несе з [target_character.GetHerHim] історії, подарунки та спостереження з-за східних морів. Розповіді про розлогі міста, дисципліновані бюрократії та торговельні мережі, що простягаються від [ShowRegionNameWithNoTooltip('indonesia_region')] до [GetCountry('CHI').GetCapital.GetName] тепер циркулюють серед наших вчених та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Чи то радить місцевому адміністратору, чи то дебатує в [ShowBuildingTypeName('sufi_mosque')], чи то мовчки розмірковує в тіні купола, [target_character.GetLastNameWithNoTooltip] знову виявляється посудиною далекої мудрості, що несеться непевними шляхами."
  ibn_battuta_events.4.a: "Обсиплемо [target_character.GetHerHis] подарунками, гідними знань, які [target_character.GetSheHe] нам приніс/принесла."
  ibn_battuta_events.4.b: "Ми виявимо гостинність, а не монети."
  ibn_battuta_events.4.c: ""
  ibn_studied_customs_of_china_tt: "Через те, що [target_character.GetLastName] вивчав/вивчала літературні та виразні звичаї [GetCountry('CHI').GetNameWithNoTooltip]:"
  chinese_laws_ibn_battuta_effect_tt: "Через те, що [target_character.GetLastName] вивчав/вивчала правові формальності та рамки [GetCountry('CHI').GetNameWithNoTooltip]:"
  ibn_battuta_will_carry_gifts_tt: "Перебуваючи в [ROOT.GetCountry.GetCapital.GetName], [target_character.GetLastName] отримає багато подарунків та монет від місцевих жителів. Наступні зупинки під час [target_character.GetHerHis] подорожі отримають вигоду від цього багатства через придбання частини [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]"
  next_stop_is_target_country_2_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [target_country_2.GetName] приблизно через #Y 2#! роки"
  ibn_battuta_events.5.title: "[target_character.GetLastNameWithNoTooltip] в [target_location_5.GetNameWithNoTooltip]"
  ibn_battuta_events.5.desc: "Перетнувши [ShowRegionName('indian_ocean_region')], [target_character.GetLastName] ступає на священні землі [target_location_5.GetName]. Заклик до молитви лунає долинами, а пил стародавніх пророків витає в кожному подиху вітру. Для [target_character.GetHerHim] це більше, ніж пункт призначення, це справді духовна вершина.\n\nКоли [target_character.GetSheHe] приєднується до каравану паломників, що рухаються на Захід, [target_character.GetHerHis] подорож переходить із зовнішнього світу у внутрішній. Тут [target_character.GetSheHe] має намір вивчати наше право, спілкуватися з вченими багатьох шкіл та розмірковувати про єдність віри, яка пов'язує стільки далеких народів. Священні міста, суворі пустелі та сувора краса [ShowRegionName('arabia_region')] залишають слід, який відлунюватиметься в усіх подальших працях [target_character.GetHerHis]."
  ibn_battuta_events.5.a: "Захоплююча особистість."
  next_stop_is_target_country_3_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [target_country_3.GetName] приблизно через #Y 2#! роки"
  mor_ibn_battuta_donates_coin_tt: "[target_character.GetLastName] пожертвує частину свого/своєї [target_character.GetHerHis] [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]:"
  ibn_battuta_events.6.title: "[target_character.GetLastNameWithNoTooltip] Досягає [ShowRegionNameWithNoTooltip('iberia_region')]"
  ibn_battuta_events.6.desc: "Після довгої та бурхливої подорожі через [ShowRegionName('arabia_region')], [target_character.GetLastName] тепер знаходить [target_character.GetHerselfHimself] на родючих пагорбах та в освічених містах [target_location_6.GetName]. Хоча значна частина [ShowRegionName('iberia_region')] бачила століття боїв між [ShowReligionGroupAdjective('christian')] та [ShowReligionGroupAdjective('muslim')] правителями, наш [ROOT.GetCountry.GetFlavorRank] сяє як перлина нашої культури. [target_character.GetLastName] прагне прогулятися садами та палацами, де поети та вчені процвітають під пильним оком [ROOT.GetCountry.GetAdjective] винятковості. [target_character.GetSheHe|U] дивуватиметься гармонії архітектури та природи, і відзначає нелегке співіснування між вірами, які колись ділили ці землі. Тут, на західному краю #italic Dār al-Islām#!, [target_character.GetHerHis] подорож набуває нового виміру; виміру пам'яті, краси та тихої стійкості."
  ibn_battuta_events.6.a: "Які історії [target_character.GetSheHe] має для нас?"
  next_stop_is_target_country_4_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [target_country_4.GetName] приблизно через #Y 2#! роки"
  ibn_battuta_events.7.title: "[target_character.GetLastNameWithNoTooltip] в [target_location_7.GetNameWithNoTooltip]"
  ibn_battuta_events.7.desc: "Довгі тіні [ShowAreaName('desert_area')] тепер залишилися позаду [target_character.GetLastName], який/яка перетнув/перетнула палючі дюни та солоні дороги, щоб дістатися до освітленого сонцем [ROOT.GetCountry.GetFlavorRank]. У серці [target_location_7.GetName], [target_character.GetSheHe] безсумнівно стане свідком світу, де золото тече вільно, справедливість проголошується вголос, а королівська влада оповита тихою гідністю.\n\n[target_character.GetLastNameWithNoTooltip] бажає відвідати двори, де священне писання читається поряд з місцевими традиціями, і захоплюватися ринками нашої столиці, де сходяться каравани верблюдів та річкові каное. Хоча далеко від мінаретів Сходу, [target_character.GetSheHe] знаходить [ShowReligionGroupName('muslim')] процвітаючим у ритмі вітрів [ShowRegionName('sahel_region')], злиття віри, багатства та усної спадщини, яке перо [target_character.GetHerHis] перенесе через піски назад до далеких земель."
  ibn_battuta_events.7.a: "Сядь біля вогню, чужинцю, розкажи нам історії далеких імперій."
  next_stop_is_target_country_5_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [target_country_5.GetName] приблизно через #Y 2#! роки"
  ibn_battuta_events.8.title: "Повернення [target_character.GetLastNameWithNoTooltip]"
  ibn_battuta_events.8.desc: "Після років мандрів далекими царствами, від мечетей [ShowLocationName('mecca')] до ринків [target_location_7.GetName], від престолів $india$ до портів [ShowRegionName('north_china_region')] — [target_character.GetLastName] нарешті повертається до [GetCountry('MOR').GetName]. Вулиці [target_location_8.GetName] водночас знайомі та чужі, бо [target_character.GetSheHe] був сформований світами далеко за його брамами.\n\nЙого родина, багатьох з якої вже немає, не почує цих історій; але писарі, вчені та правителі почують. З пилом на [target_character.GetHerHis] плащі та спогадами, що переповнюють [target_character.GetHerHis] розум, [target_character.GetSheHe] готується говорити та писати. Те, що починалося як подорож віри, стало хронікою цілого світу, знаннями з чужих царств та цікавими спостереженнями, все записане в [target_character.GetHerHis] [target_art.GetName]."
  ibn_battuta_events.8.a: "#italic Подорожі — вони позбавляють тебе мови, а потім перетворюють на оповідача.#!"
  ibn_battuta_composes_the_rihla_tt: "[target_character.GetLastName] створює [target_art.GetName], всебічну [ShowWorkOfArtTypeName('chronicle')] [target_character.GetHerHis] подорожей"
  travels_of_ibn_battuta_tt: "Ми відкриємо всі [Concept('areas', 'CONCEPT_PLACEHOLDER')|e], які відвідав [target_character.GetLastName], такі як [target_area.GetName]"
  next_stop_is_target_location_1_owner_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [target_location_1.GetOwner.GetName] приблизно через #Y 1#! рік"
  next_stop_is_target_location_2_owner_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [target_location_2.GetOwner.GetName] приблизно через #Y 1#! рік"
  next_stop_is_target_location_3_owner_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [target_location_3.GetOwner.GetName] приблизно через #Y 1#! рік"
  next_stop_is_china_tt: "[target_character.GetLastName] залишиться в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetHerHis|U] наступним пунктом призначення буде [GetCountry('CHI').GetName] приблизно через #Y 2#! роки"