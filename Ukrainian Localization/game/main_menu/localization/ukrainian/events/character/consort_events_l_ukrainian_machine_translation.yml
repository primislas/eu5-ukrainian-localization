l_english:
  consort_events.1.title: "Пропозиція шлюбу"
  consort_events.1.desc: "З деяким занепокоєнням могутні родини [ROOT.GetCountry.GetFlavorRank] спостерігали, як [target_ruler.GetName] дозволяв(-ла) рокам минати, не знайшовши собі пари. Ці почуття тепер перетворилися на відкрите розчарування, оскільки, попри відсутність чіткої лінії престолонаслідування у [ROOT.GetCountry.GetFlavorRank], наш(-а) [ROOT.GetCountry.GetGovernment.GetRulerTitle] не має планів знайти собі дружину/чоловіка, а також [target_ruler.GetHeSheFormal] не виявляє особливого інтересу до пропозицій, надісланих [target_ruler.GetHerHim].\n\nТепер дійшло до того, що двір очікує, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] прийме одну з наявних пропозицій. Подальша неспроможність забезпечити спадкоємність ставить під загрозу всю країну. На щастя, одна з найстаріших і найпрестижніших родин з [origin_of_queens_family.GetName], [target_consort.GetDynasty.GetName], запропонувала нам руку однієї зі своїх дочок у шлюбі разом зі щедрим приданим."
  consort_events.1.a: "Прийняти пропозицію."
  consort_events.1.a.tt: "Приймаючи цю пропозицію, розуміється, що родина нашого нового подружжя може очікувати певних послуг у майбутньому."
  consort_events.1.b: "[target_ruler.GetNameWithNoTooltip] мусить приберегти [target_ruler.GetHerselfHimself] для кращої пропозиції."
  consort_events.2.title: "Дім [target_consort.GetDynasty.GetNameWithNoTooltip]"
  consort_events.2.desc: "Зі союзом [target_ruler.GetName] та [target_consort.GetName] ми здобули не лише подружжя, а й нового союзника у [ROOT.GetCountry.GetFlavorRank]. [target_consort.GetDynasty.GetName] – це стара та впливова родина, а їхнє місце у [origin_of_queens_family.GetName] є перлиною [ROOT.GetCountry.GetFlavorRank].\n\nЗвісно, дружба має бути взаємною, і від [target_consort.GetName] очікуватимуть, що [target_consort.GetHerHis] говоритиме за свою рідню, тоді як наш(-а) [ROOT.GetCountry.GetGovernment.GetRulerTitle] має дуже ретельно розглядати такі поради."
  consort_events.2.a: "За вічну дружбу!"
  consort_events.3.title: "Великі очікування"
  consort_events.3.desc: "Політичний шлюб – це настільки ж союз родин, наскільки й договір взаємної підтримки. Родина [target_consort.GetDynasty.GetName] очікує, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] прислухатиметься до порад [ROOT.GetCountry.GetGovernment.GetConsortTitle] і активно дбатиме як про їхні, так і про інтереси [target_ruler.GetName]."
  consort_events.3.a: "Усе для нашого(-ї) дорогого(-ї) [ROOT.GetCountry.GetGovernment.GetConsortTitle]."
  consort_events.3.b: "Вибачте, жодних особливих послуг."
  consort_events.3.b.tt: "Це призведе до зменшення співпраці з боку [target_consort.GetDynasty.GetName] на місцевому рівні, і вони також пам'ятатимуть це проти нас у майбутньому."
  consort_events.4.title: "Подружнє щастя"
  consort_events.4.desc: "[ROOT.GetCountry.GetGovernment.GetConsortTitle], звісно, є постійним супутником(-цею) і добрим радником(-цею) сам(-а) по собі. Однак, окрім цієї ролі, наш(-а) [ROOT.GetCountry.GetGovernment.GetConsortTitle] також є представником(-цею) [ROOT.GetCountry.GetFlavorRank] при домі [target_consort.GetDynasty.GetName] і навпаки. Часом це не є домовленістю без переваг.\n\nСьогодні [target_consort.GetName] дуже радий(-а) оголосити, що [target_consort.GetHerHis] родина вирішила висловити свою підтримку [ROOT.GetCountry.GetGovernment.GetRulerTitle] та союзу [target_ruler.GetName] і [target_consort.GetNameWithNoTooltip]."
  consort_events.4.a: "Нехай цей союз принесе користь нам обом."
  consort_events.4.b: "Ми повинні уникати заборгованості перед родиною [target_consort.GetDynasty.GetName]."
  consort_events.6.title: "Кохати і бути коханим(-ою)"
  consort_events.6.desc: "[ROOT.GetCountry.GetGovernment.GetAdjective] шлюб рідко є справою кохання. Швидше, це дипломатична можливість, яку не можна втрачати. Також дуже важливо, щоб майбутній(-я) [ROOT.GetCountry.GetGovernment.GetConsortTitle] мав(-ла) відповідний статус, і вигідно, якщо він/вона є іноземцем(-кою), щоб не порушувати баланс внутрішньої політики.\n\nОднак навіть [ROOT.GetCountry.GetGovernment.GetRulerTitle] може закохатися. Коли це трапляється, всі такі справи, здається, зникають – принаймні з точки зору [target_ruler.GetHerHis].\n\nМісцевий(-а) житель(-ка) з провінції [ROOT.GetCountry.GetCapital.GetProvince.GetName] привернув(-ла) увагу [target_ruler.GetName]. [target_ruler.GetSheHe|U], здається, повністю і безмежно закоханий(-а) і щасливіший(-а), ніж будь-коли. Хоча наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та радники менш задоволені, союз між [target_ruler.GetNameWithNoTooltip] та [target_ruler.GetHerHis] коханим(-ою) має сильну підтримку серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] королівства."
  consort_events.6.a: "Нехай [ROOT.GetCountry.GetGovernment.GetRulerTitle] матиме те, чого прагне [target_ruler.GetHerHis] серце."
  consort_events.6.b: "Шлюб з простолюдином(-кою)? Абсолютно виключено!"
  consort_events.51.title: "Родинні зв'язки"
  consort_events.51.desc: "Протягом останніх кількох днів ми приймали гостей з [origin_country_of_consort.GetGovernment.GetAdjective] двору [origin_country_of_consort.GetName], колишнього дому [ROOT.GetCountry.GetGovernment.GetConsortTitle]. Після цілого тижня полювання, бенкетів та пліток з родиною, вони нарешті готуються повернутися до [origin_country_of_consort.GetCapital.GetName]. Вони запевняють нас, що чудово провели час і наполягають, що [ROOT.GetCountry.GetGovernment.GetAdjective] родина просто мусить незабаром відвідати [origin_country_of_consort.GetCapital.GetNameWithNoTooltip]. Вони обов'язково повідомлять усім вдома, наскільки [target_consort.GetName] щасливіший(-а) тут, ніж будь-коли раніше."
  consort_events.51.a: "Ось що означає бути ріднею."
  we_are_kin: "Ми рідня"
  consort_events.52.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Єретик"
  consort_events.52.desc: "Народ [ROOT.GetCountry.GetLongName] був задоволений, коли [target_ruler.GetName] оголосив [target_ruler.GetHerHis] шлюб з [target_consort.GetName]. Тоді мало що говорилося про [target_consort.GetHerHis] походження або [target_consort.GetHerHis] виховання в [origin_country_of_consort.GetCapital.GetName]. Для більшості простолюдинів у [ROOT.GetCountry.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetAdjective] родина є особливою породою, і вони мало дбають про такі деталі. Однак нещодавно почали поширюватися чутки, що виводять ці питання на перший план... Деякі кажуть, що [ROOT.GetCountry.GetGovernment.GetConsortTitle] відмовився відпустити [target_consort.GetHerHis] стару [origin_country_of_consort.GetReligion.GetAdjective] віру. Хоча люди можуть зрозуміти необхідність шлюбу з іноземцем, вони менш схильні бути такими поступливими, коли йдеться про правління єретика."
  consort_events.52.a: "Як вони сміють?"
  consort_events.54.title: "Навички [ROOT.GetCountry.GetGovernment.GetConsortTitle]"
  consort_events.54.desc: "З того часу, як [target_consort.GetName] прибув до двору, [target_consort.GetSheHe] виявив великий інтерес до адміністративних справ [ROOT.GetCountry.GetName]. Це дійшло до того, що [ROOT.GetCountry.GetGovernment.GetConsortTitle] став свого роду авторитетом у питаннях, що стосуються персоналу та управління замком, і йому довіряє не тільки [ROOT.GetCountry.GetGovernment.GetRulerTitle] [target_ruler.GetHerselfHimself], але й [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] загалом. Рідко [ROOT.GetCountry.GetFlavorRank] бачив таку ефективність."
  consort_events.54.a: "[target_consort.GetShortNameWithNoTooltip] — це благословення."
  consort_events.54.b: "Світ потребує більше таких людей, як [target_consort.GetShortNameWithNoTooltip]."
  consort_events.54.c: "Нам завжди потрібні стратеги."
  consort_events.54.d: "Який цінний актив цей [target_consort.GetShortNameWithNoTooltip]."
  consort_events.56.title: "Часи потреби"
  consort_events.56.desc: "Династія нашого шляхетного [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_ruler.GetDynasty.GetName], безумовно, є могутньою. Через [target_ruler.GetName] вони правлять нашою нацією і робитимуть це ще багато років, але навіть великі іноді потребують допомоги. На щастя, родина [target_ruler.GetDynasty.GetNameWithNoTooltip] зав'язала міцні зв'язки з іншими великими державами, такими як дім [target_foreign_ruler.GetDynasty.GetName] не кого іншого, як [target_foreign_ruler.GetName] з [marriage_partner.GetName]. [target_foreign_ruler.GetHerHis|U] милостива [target_foreign_consort.GetWifeHusband], [target_foreign_consort.GetName], є [target_foreign_consort.GetDaughterSon] нашого власного [ROOT.GetCountry.GetGovernment.GetAdjective] дому та безцінним контактом. Можливо, ми запитаємо [target_foreign_consort.GetHimHerFormal], чи може [target_foreign_consort.GetSheHe] вплинути на [target_foreign_consort.GetHerHis] [target_foreign_ruler.GetWifeHusband], щоб той простягнув нам руку допомоги?"
  consort_events.56.a: "Наші скарбниці стають тривожно легкими."
  consort_events.56.a.tt: "Надіслати листа [target_foreign_consort.GetName] з [marriage_partner.GetName], просячи [target_foreign_consort.GetHerHim] про гроші"
  consort_events.56.f: "Нам не потрібна допомога від [marriage_partner.GetNameWithNoTooltip] або дому [target_foreign_ruler.GetDynasty.GetNameWithNoTooltip]!"
  consort_events.57.title: "Друзі в біді"
  consort_events.57.desc: "[ROOT.GetCountry.GetGovernment.GetConsortTitle] нашого славетного [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_foreign_consort.GetName], нещодавно приніс нам прохання від [target_foreign_consort.GetHerHis] родини, дому [target_foreign_consort.GetDynasty.GetName] з [target_origin_country.GetName]. Очевидно, [target_ruler.GetName] гостро потребує грошей і запитав нас, '[target_ruler.GetHerHis] найдовіреніших друзів', чи можемо ми якось допомогти. [target_ruler.GetHerHis|U] лист сповнений компліментів нашій великій економіці."
  consort_events.57.a: "Ми, безумовно, можемо виділити трохи монет для наших [target_origin_country.GetAdjectiveWithNoTooltip] друзів."
  grateful_for_aid: "Вдячні за допомогу"
  consort_events.57.f: "І що ми отримаємо натомість? Ні, ніколи!"
  denied_aid: "Відмовлено в допомозі"
  outrageous_demands: "Обурливі вимоги"
  consort_events.58.title: "Рука допомоги"
  consort_events.58.desc: "Нарешті, ми отримали відповідь від найдорожчого [target_foreign_consort.GetName] щодо нашого прохання до [target_foreign_consort.GetHerHis] [target_foreign_ruler.GetWifeHusband]. Найшляхетніший [target_foreign_ruler.GetName] вирішив його задовольнити! Відповідь прийшла зі скринями, повними золота, щоб наповнити нашу порожніючу скарбницю. Лист подяки буде негайно надісланий щедрому [marriage_partner.GetGovernment.GetRulerTitle]. Хай [target_foreign_ruler.GetSheHe] править довго!"
  consort_events.58.a: "Ми завжди знали, що маємо друга в [target_foreign_ruler.GetHerHim]."
  consort_events.59.title: "Порушені обіцянки"
  consort_events.59.desc: "Коли ми одружили нашу [target_foreign_consort.GetName] з [marriage_partner.GetAdjective] [marriage_partner.GetGovernment.GetRulerTitle], ми гадали, що між нашими країнами утворився міцний зв'язок. Хоча ми ніколи не зганьбимо нашу частину цієї угоди, вочевидь, [target_foreign_ruler.GetName] не має таких сумнівів.\n\nЛист-відповідь від [target_foreign_consort.GetShortNameWithNoTooltip] надійшов до нас сьогодні. [target_foreign_ruler.GetShortNameWithNoTooltip] не лише відмовив у нашому проханні, [target_foreign_ruler.GetHeSheFormal] також мав нахабство дорікнути нам за наші «обурливі вимоги!»"
  consort_events.59.a: "Ця образа не буде забута."
  consort_events.61.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Вплив"
  consort_events.61.desc: "Зі шлюбом між [target_ruler.GetName] та [target_ruler.GetHerHis] [target_consort.GetWifeHusband] [target_consort.GetName], народ [ROOT.GetCountry.GetName] відчуває зростаючу прихильність до всього [origin_country_of_consort.GetAdjective]. Хоча певний культурний обмін був очікуваним, особливо з огляду на популярність [ROOT.GetCountry.GetGovernment.GetConsortTitle], наші радники з тривогою повідомляють, що в одній з наших провінцій відбулася релігійна зміна. Здається, вплив нашого [origin_country_of_consort.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetConsortTitle] проникає навіть у спосіб поклоніння наших підданих, оскільки слова [origin_country_of_consort.GetReligion.GetAdjective] вірян навернули дивовижну кількість нашого народу...\n\nКоли [target_consort.GetNameWithNoTooltip] зіткнулися з цим, [target_consort.GetSheHe] знизав плечима, стверджуючи, що [target_consort.GetSheHe] давно прийняв [ROOT.GetCountry.GetReligion.GetAdjective] віру, і [ROOT.GetCountry.GetGovernment.GetRulerTitle] мав би це знати."
  consort_events.61.a: "[target_consort.GetSheHe|U] має публічно засудити [origin_country_of_consort.GetReligion.GetNameWithNoTooltip]!"
  consort_events.61.b: "Хай буде так."
  consort_events.101.title: "Амбіції [ROOT.GetCountry.GetGovernment.GetConsortTitle]"
  consort_events.101.desc: "Не новина, що [target_consort.GetName] не має теплих почуттів до [ROOT.GetCountry.GetGovernment.GetHeir.GetName]. Відколи [target_consort.GetHeSheFormal] прибув до двору, тертя між ними було очевидним і лише погіршилося після народження першої дитини [ROOT.GetCountry.GetGovernment.GetConsortTitle]. Звісно, [target_consort.GetSheHe] волів би бачити на троні власне потомство. Досить довго [target_consort.GetSheHe] мовчки смикав за ниточки, щоб це сталося, переконуючи — або підкуповуючи — потрібних людей і виховуючи свою дитину якнайкраще. Однак лише вчора [target_consort.GetSheHe] зіткнувся з нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle] і зажадав, щоб було призначено нового [ROOT.GetCountry.GetGovernment.GetHeirTitle]."
  consort_events.101.a: "Дитина [target_consort.GetName] — законний вибір, у цьому немає сумнівів."
  consort_events.101.b: "Як [target_consort.GetSheHe] сміє ставити під сумнів претензії [ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] на трон?"
  consort_events.102.title: "Вибір улюбленців"
  consort_events.102.desc: "Кажуть, що любов батьків до дитини безмежна, але очевидно, що деякі любові більші за інші. Хоча [target_ruler.GetName] безумовно любить [ROOT.GetCountry.GetGovernment.GetHeir.GetName], всі знають, що [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHis] [favorite_child.GetSisterBrother] займає більше місце в серці [target_ruler.GetName]. [ROOT.GetCountry.GetGovernment.GetRulerTitle] обожнює [favorite_child.GetHerHim] і подбав про те, щоб [favorite_child.GetSheHe] отримав найкращу освіту. Тепер [target_consort.GetName] намагається переконати [ROOT.GetCountry.GetGovernment.GetRulerTitle] зробити [favorite_child.GetName] новим [ROOT.GetCountry.GetGovernment.GetHeirTitle] [ROOT.GetCountry.GetName]."
  consort_events.102.a: "Це непогана ідея. [favorite_child.GetNameWithNoTooltip] винятково розумний."
  consort_events.102.b: "$consort_events.101.b$"
  consort_events.104.title: "Який [target_consort.GetMotherFather|U], такий і [target_heir.GetDaughterSon|U]"
  consort_events.104.desc: "Протягом років наш шляхетний [target_consort.GetName] знову і знову вражав нас своїми чудовими знаннями та навичками. [target_consort.GetSheHe] явно освічена [target_consort.GetWomanMan], і її інтерес до навчання посіяв зерно в її [target_heir.GetDaughterSon], [target_heir.GetName]. Яблуко від яблуні недалеко падає, справді."
  consort_events.104.a: "[target_consort.GetShortNameWithNoTooltip] навчатиме [target_heir.GetShortNameWithNoTooltip] усім аспектам управління нашою нацією."
  consort_events.104.b: "[target_consort.GetShortNameWithNoTooltip] навчатиме [target_heir.GetShortNameWithNoTooltip] тонкощам політики."
  consort_events.104.c: "За допомогою [target_consort.GetShortNameWithNoTooltip] [target_heir.GetShortNameWithNoTooltip] стане великим полководцем."
  consort_events.303.title: "Дипломатичний підхід [target_consort.GetNameWithNoTooltip]"
  consort_events.303.desc: "Виростаючи в [origin_of_consort.GetName], [target_consort.GetName] любив вивчати людей. [target_consort.GetHeSheFormal|U] часто перетворював спроби передбачити дії оточуючих на гру, вважаючи це не тільки розвагою, але й дедалі кориснішою звичкою з роками. На щастя, переїзд до [ROOT.GetCountry.GetGovernment.GetAdjective] двору [ROOT.GetCountry.GetName] не змусив [target_consort.GetHerHim] відмовитися від його хисту до інтриг. Навпаки, [target_consort.GetSheHe] отримав багато практики — під час деяких наших нещодавніх переговорів з іноземними дипломатами ці навички виявилися надзвичайно цінними для ради."
  consort_events.303.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  consort_events.304.title: "Адміністративні ідеї [target_consort.GetNameWithNoTooltip]"
  consort_events.304.desc: "У поєднанні з сильним моральним компасом, [target_consort.GetName] завжди мав почуття порядку. Рішення, прийняті [target_consort.GetHerHim], є надійними, будь то поради щодо політичних питань чи пропозиції під час дружньої розмови. [ROOT.GetCountry.GetGovernment.GetConsortTitle] висловлює [target_consort.GetHerHis] думку красномовно, що принесло [target_consort.GetHerHim] певне захоплення навіть у його ранні дні в [origin_of_consort.GetName]. Однак, найголовніше, слова [ROOT.GetCountry.GetGovernment.GetConsortTitle] несуть у собі чесність, змушуючи навіть найупертіших членів двору прислухатися до будь-яких порад, які [target_consort.GetSheHe] пропонує."
  consort_events.304.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  consort_events.305.title: "Військові ідеї [target_consort.GetNameWithNoTooltip]"
  consort_events.305.desc: "[target_consort.GetName|U] виявляється безстрашним [target_consort.GetWomanMan]. Його/Її часто бачать за вивченням техніки воїнів під час їхніх тренувань, іноді [target_consort.GetHeSheFormal] навіть сам/сама наближається до тренувальних майданчиків [target_consort.GetHerselfHimself]. Хоча дехто спочатку вагався вступати в рукопашний бій з [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetConsortTitle], інші були зацікавлені навичками, які [target_consort.GetSheHe] міг/могла принести з [target_consort.GetHerHim] зі свого життя в [origin_of_consort.GetName]. Хоча для декого це було несподіванкою, репутація [target_consort.GetNameWithNoTooltip] як того, хто вміє постояти за [target_consort.GetHerselfHimself] у бою, не є безпідставною. Крім того, присутність [ROOT.GetCountry.GetGovernment.GetConsortTitle] має, здається, заохочувальний вплив на війська."
  consort_events.305.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  consort_events.306.title: "Спільний інтерес"
  consort_events.306.desc: "[target_ruler.GetName|U] відомий/відома своїм організаторським хистом. Забезпечення дотримання закону як народом, так і адміністрацією [ROOT.GetCountry.GetName], а також оновлення та пристосування системи до сучасних реалій, становить великий інтерес для [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Уявіть [target_ruler.GetHerHis] радість, коли [target_ruler.GetSheHe] усвідомив/усвідомила, що [target_ruler.GetHerHis] [target_consort.GetWifeHusband] поділяє багато з цих інтересів!\n\nДля [target_ruler.GetHerHim] розмова з [target_consort.GetName] є такою ж стимулюючою, як і будь-яке засідання ради. [target_consort.GetSheHe|U] відповідає на такі обговорення посмішкою, так само насолоджуючись спілкуванням з [target_consort.GetHerHis] [target_ruler.GetWifeHusband] щодо цих питань."
  consort_events.306.a: "Ці двоє чудово пасують одне одному."
  consort_events.309.title: "Успіх престолонаслідування"
  consort_events.309.desc: "З моменту смерті [target_char.GetHerHis] подружжя, [target_char.GetName] все більше освоюється на [target_char.GetHerHis] посаді, будучи як опікуном юного [ROOT.GetCountry.GetGovernment.GetHeirTitle], так і [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle] [ROOT.GetCountry.GetName]. Для широкої публіки очевидно, що ситуація є тимчасовою і просто політичною необхідністю, поки всі чекають сходження на престол маленького [target_char_heir.GetName]. Однак ходять чутки про інших осіб, які, як кажуть, беруть участь у таємних зустрічах, де обговорюють потенціал юного [ROOT.GetCountry.GetGovernment.GetHeirTitle], або його відсутність. Вони стверджують, що дозволити [target_char_heir.GetShortNameWithNoTooltip] правити було б рівнозначно тому, щоб поставити керувати слинявого недоумка, і це загрожує всій країні, тоді як [ROOT.GetCountry.GetGovernment.GetConsortTitle], безумовно, є набагато кращим варіантом в їхніх очах.\n\nХоча [ROOT.GetCountry.GetGovernment.GetConsortTitle] [target_char.GetHerselfHimself], безумовно, усвідомлює ці підступні сили, він/вона ще не зайняв/зайняла позицію щодо цього вкрай чутливого питання."
  consort_events.309.a: "Це цікаві часи..."
  consort_events.309.a.tt: "[ROOT.GetCountry.GetGovernment.GetConsortTitle] обговорить ці ідеї зі своєю найближчою радою"
  consort_events.309.b: "Яка зрада! Ми більше не потерпимо таких ідей."
  consort_events.309.b.tt: "Підбурювачі не будуть заохочені."
  consort_events.310.title: "Зміна влади"
  consort_events.310.desc: "Використовуючи поради [target_char.GetHerHis] найближчих радників і випробовуючи [target_char.GetHerHis] чарівність, [target_char.GetName] хитро маніпулював/маніпулювала значною кількістю членів двору, щоб вони погодилися: [target_heir.GetName], [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetHeirTitle] і наступний у черзі на правління, є слабоумним дурнем, негідним [target_heir.GetHerHis] спадщини. Однак є просте вирішення проблеми...\n\nПід час чергового екстравагантного бенкету, влаштованого з метою залучення [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [target_char.GetShortNameWithNoTooltip] та [target_char.GetHerHis] поплічники зуміли популяризувати ідею тримати юного [target_heir.GetShortNameWithNoTooltip] замкненим у [target_heir.GetHerHis] покоях. Деяка ізоляція дозволила б дитині зосередитися на [target_heir.GetHerHis] освіті, стверджується. Те, що юний [ROOT.GetCountry.GetGovernment.GetHeirTitle] може також зникнути з поля зору громадськості, є прикрим для [target_heir.GetHerHim], але зрештою є перевагою для [ROOT.GetCountry.GetName]."
  consort_events.310.a: "Нехай це станеться."
  consort_events.310.b: "Насправді, можливо, [target_heir.GetSheHe] все ж таки заслуговує на шанс."
  consort_events.311.title: "[ROOT.GetCountry.GetGovernment.GetConsortTitle|U] народу"
  consort_events.311.desc: "Нам стало зрозуміло, що [target_char.GetName] — це [target_char.GetWomanMan] із золотим серцем. [target_char.GetHeSheFormal|U] завжди робить [target_char.GetHerHis] усе можливе, щоб догодити [target_char.GetHerHis] [target_ruler.GetWifeHusband], [target_ruler.GetName], і ставиться до [target_char.GetHerHis] друзів з неперевершеною добротою. Під час нещодавньої подорожі до [poor_province.GetName], [target_char.GetShortNameWithNoTooltip] на власні очі побачив/побачила страждання найбідніших [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] цього регіону. Відтоді [target_char.GetSheHe] розробляє план допомоги [target_char.GetHerHis] найбіднішим підданим. Однак, щоб втілити ці ідеї в життя, [target_char.GetShortNameWithNoTooltip] потрібні кошти з державної скарбниці."
  consort_events.311.a: "Народ — це наша турбота. [target_char.GetSheHe|U] має нашу підтримку."
  consort_events.311.b: "У нас є важливіші справи, якими потрібно зайнятися."
  consort_events.313.title: "Диво життя"
  consort_events.313.desc: "У ці темні дні війни та смерті нагадування про нові починання може полегшити страждання нашого народу. Наш великий [target_ruler.GetName] та [target_ruler.GetHerHis] шляхетний/шляхетна [target_char.GetWifeHusband], [target_char.GetName], були благословенні ще однією дитиною. Поява дитини принесла нову надію та енергію [ROOT.GetCountry.GetGovernment.GetAdjective] парі, а отже, і їхньому двору та підданим. Багато людей мріють, що ця дитина виросте в кращому, світлішому майбутньому, і що всі бої зрештою будуть того варті."
  consort_events.313.a: "Хай будуть благословенні [target_ruler.GetShortNameWithNoTooltip], [target_char.GetShortNameWithNoTooltip] та їхня нова дитина!"
  consort_events.313.a.tt: "Народження нової дитини [target_ruler.GetName] оживляє народ [ROOT.GetName]."