l_english:
  artist_events.1.title: "Богословські праці [target_character.GetNameWithNoTooltip]"
  artist_events.1.desc: "Відомий своїми оповідальними здібностями, [target_character.GetName] нещодавно заглибився в літургійні та богословські праці, переплітаючи божественне з комедією та сатирою. Ці твори, хоч і їдкі до становища [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у нашому суспільстві, викликали хвилю [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] із зацікавленістю в культурі та писемному мистецтві. Тиск зростає, мотивований нашим зачепленим [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], щоб позбутися [target_character.GetNameWithNoTooltip] при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], аби не ризикувати гнівом [ROOT.GetCountry.GetReligion.GetGodName]."
  artist_events.1.a: "Усе дозволено в мистецтві та творінні."
  artist_events.1.b: "Надати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] права цензури над [target_character.GetHerHis] творами."
  artist_events.1.c: "Наші [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] мають рацію, геть [target_character.GetHerHis] голову!"
  artist_events.1.d: "Нас не залякають розпусні особи, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] чи інші!"
  artist_events.2.title: "Невмілість [target_character.GetNameWithNoTooltip]"
  artist_events.2.desc: "Натовп сміється над драмою? Сльози та крики над веселою виставою? Ніхто не міг би зазнати невдачі краще, ніж [target_character.GetName]! Дійсно, [target_character.GetHerHis] вміння ображати через розваги не має собі рівних. [target_character.GetHerHis|U] останні твори мали бути одою нашому великому народу, але закінчилися нищівною відповіддю, перераховуючи наші недоліки та найбільші невдачі!"
  artist_events.2.a: "Який абсолютний дурень!"
  artist_events.2.b: "Давайте профінансуємо зусилля [target_character.GetShortNameWithNoTooltip] щодо вдосконалення!"
  artist_events.2.c: "Кат допоможе з останньою виставою [target_character.GetShortNameWithNoTooltip]!"
  artist_events.3.title: "Меценатство [target_character.GetNameWithNoTooltip]"
  artist_events.3.desc: "Завзятий митець при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetName], звернувся до наших радників, шукаючи меценатства, бажаючи змінити свої літературні твори відповідно до будь-якої теми, яку ми вважаємо за потрібне. В обмін ми повинні були б розлучитися зі скромною сумою за [target_character.GetHerHis] послуги. Кажуть, що вміння [target_character.GetNameWithNoTooltip] різнобічні, і результат, ймовірно, задовольнить навіть наших найкультурніших та найартистичніших осіб."
  artist_events.3.a: "Використати [target_character.GetHerHis] вміння для прославлення нашого наукового прогресу!"
  artist_events.3.b: "Стійкість і завзятість нашого народу повинні бути прославлені."
  artist_events.3.c: "Улесливий лист до видатних фракційних діячів у нашому [ROOT.GetCountry.GetFlavorRank]."
  artist_events.3.d: "Прославити досконалість і витонченість наших культурних зв'язків."
  artist_events.3.e: "Геть звідси, мерзенний жебраку!"
  artist_events.4.title: "Голоси незгоди"
  artist_events.4.desc: "Днями шанувальники та видатні діячі мистецького світу вимагали, щоб ми фінансували починання [target_character.GetName]. Хоча вкладання наших важко зароблених монет у мистецтво є благородним жестом, ми повинні пам'ятати про голоси, які можуть впливати на напрямок, у якому рухається наша країна, оскільки вони не завжди можуть бути правильними."
  artist_events.4.a: "Гаразд, ми профінансуємо все, що [target_character.GetShortNameWithNoTooltip] захоче створити."
  artist_events.4.b: "Скарги? А як щодо смаку батога?"
  artist_events.4.c: "Таланти [target_character.GetNameWithNoTooltip] затребувані навіть нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  artist_events.5.title: "Чемпіон нових мистецтв"
  artist_events.5.desc: "Наш народ відомий своєю схильністю до витончених мистецтв, особливо тих, що стосуються письма, вписуючи наше ім'я та соціальний слід на сторінках історичних книг. Мало хто досяг такої видатності, як [target_character.GetName], чиї вміння з пером є легендарними і зворушують наш народ тисячами. [target_character.GetHerHis|U] остання робота прославляє нашу недавню історію, а також нашу шляхетну природу, оду нашим предкам та обмін знаннями для наших нащадків."
  artist_events.5.a: "Який час, щоб жити!"
  artist_events.5.tt: "Усі наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що мешкають у [Concept('province', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('capital', 'CONCEPT_PLACEHOLDER')|e], отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  artist_events.5.b: "Мистецтво [target_character.GetHerHis|U] принесе гарну ціну."
  artist_events.6.title: "Настінне мистецтво [target_character.GetNameWithNoTooltip]"
  artist_events.6.desc: "Багато кольорів, задіяних у створенні мистецтва, є другою натурою для багатьох художників, таких як [target_character.GetName]. Мазки [target_character.GetHerHis|U] приносять радість людям, об'єднуючи бідних і багатих, здорових і немічних, коли вони милуються витворами мистецтва, зображеними навколо центру [target_location.GetName]. Нещодавно ми отримуємо все більше запитів на подальше фінансування цього нового художнього стилю шляхом зведення більшої кількості стін, щоб [target_character.GetNameWithNoTooltip] міг їх прикрасити."
  artist_event.6.a: "Що слова не можуть сказати, те мистецтво висловить!"
  artist.events.6.b: "У нас є кращі речі, на які можна витратити наші монети."
  artist_events.7.title: "Забагато жарту"
  artist_events.7.desc: "Кажуть, що гумор є частим гостем у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], де блазні та комедіанти наповнюють наших сановників сміхом під час радісних подій. Однак навіть жарти іноді можуть зайти занадто далеко, і це, безумовно, стосується [target_character.GetName], який нещодавно дозволив [target_character.GetHerselfHimself] малювати непристойності на стінах палацу, спрямовані на нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] та видатних бюрократів. Цей непристойний вчинок, безсумнівно, підірве наш престиж, якщо винуватця не буде покарано."
  artist_events.7.a: "Можливо, це витончений жарт, який ми не можемо зрозуміти?"
  artist_events.7.b: "Цей жарт коштуватиме [target_character.GetNameWithNoTooltip] дуже дорого!"
  artist_events.8.title: "Увічнення образу"
  artist_events.8.desc: "Популярність будь-якої видатної особистості протягом століть пов'язана з її зображенням у різних творах мистецтва. Картини, фрески та історії продовжать спадщину наших найкращих і найяскравіших. Щоб просунути цю ідею, ми могли б замовити твір мистецтва в одного з наших найкращих і найздібніших художників, [target_character.GetName]."
  artist_events.8.a: "Увічнення в книгах історії звучить непогано."
  artist_events.8.b: "Ще краще, віддайте це людям!"
  artist_events.8.c: "Монета наша і тільки наша!"
  artist_events.9.title: "Випадкова образа"
  artist_events.9.desc: "У слабкій спробі вразити видатних діячів нашого суспільства, [target_character.GetName] очолив зусилля з написання складної сцени із зображенням лідерів різних станів. Однак через некомпетентність [target_character.GetHerHis] картина була сприйнята як наклеп, спрямований на висміювання фізичної зовнішності багатьох впливових чоловіків, що призвело до комічної втрати престижу з нашого боку."
  artist_events.9.a: "Чи повинні ми бути вражені такою демонстрацією некомпетентності?"
  artist_events.10.title: "Зв'язки [target_character.GetNameWithNoTooltip]"
  artist_events.10.desc: "Ім'я [target_character.GetName] на вустах у кожного, хто є кимось у світі мистецтва. Завдяки потужному прагненню та зв'язкам для створення витонченого та блискучого мистецтва, привабливість [target_character.GetNameWithNoTooltip] є глибокою. Таким чином, [target_character.GetNameWithNoTooltip] нещодавно звернувся до нас з пропозицією спонсорувати колегу-художника, [connection_character.GetName]."
  country_event.10.a: "Звісно, без тіні сумніву!"
  country_event.10.b: "У нас є краще застосування для цієї монети."
  artist_events.11.title: "Бережіть голову!"
  artist_events.11.desc: "Це факт, що [ROOT.GetCountry.GetCapital.GetName] є гамірним центром, повним життя та метушні. Звичайні люди постійно працюють на полях, їздять по численних ринках або безцільно розмовляють. Однак наше недавнє фінансування місцевих скульпторів призвело до зростання кількості нещасних випадків. Дійсно, багато наших людей повідомляють про випадки падіння уламків та шматків мармуру, оскільки скульптори маніакально працюють цілодобово, повністю нехтуючи безпекою."
  artist_events.11.a: "Приносимо вибачення за незручності."
  artist_events.11.b: "Мистецтво — це жертва."
  artist_events.12.title: "Прояв культури"
  artist_events.12.desc: "Камінь часто набуває дивовижних форм, його білий лик прикрашає наші зали. Як ода могутності та величі, небагато інших [ROOT.GetCountry.GetGovernment.GetAdjective] родів так закохані в бліду досконалість добре виліпленої статуї чи погруддя. Наш досвід та залучення здібних особистостей призвели до того, що багато хто взявся за роботи, спрямовані на піднесення нашого статусу та демонстрацію нашої любові до найвитонченіших мистецтв."
  artist_events.12.a: "Фінансувати це починання!"
  artist_events.12.b: "Цю монету краще витратити деінде."
  artist_events.12.c: "Ми очікуємо не менше, ніж шедевр."
  artist_events.13.title: "Відставка [target_character.GetNameWithNoTooltip]"
  artist_events.13.desc: "Протягом багатьох років ім'я [target_character.GetName] приносило нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName] великий престиж та смак до найвитонченіших мистецтв. На заході [target_character.GetHerHis] кар'єри ми вирішили забезпечити [target_character.GetHerHim] гідну відставку з достатньою кількістю монет та свободою для нових пригод."
  artist_events.13.a: "Ми вічно вдячні за вашу службу!"
  artist_events.13.tt: "[target_character.GetName] піде з нашої служби, живучи спокійним життям усамітнення в передмістях нашої сільської місцевості"
  artist_events.14.title: "Катастрофічна кампанія легітимності"
  artist_events.14.desc: "Наші нещодавні спроби легітимізувати нашу агресивність щодо сусідів зіткнулися з перешкодою. Можна стверджувати, що невдала спроба виправдати наші завоювання через створення мистецтва [target_character.GetName] була неймовірно неефективною, і, як наслідок, наші відносини з прикордонними країнами погіршилися."
  artist_events.14.a: "[target_character.GetNameWithNoTooltip], ти дурень!"
  artist_events.15.title: "Департамент скульптурних мистецтв"
  artist_events.15.desc: "Наша художня академія в прекрасному [ROOT.GetCountry.GetCapital.GetRank.GetName] [ROOT.GetCountry.GetCapital.GetName] нещодавно відкрила новий відділ, що демонструє різноманітні твори мистецтва з мармуру, дерева та глини. Один з наших найвидатніших скульпторів, [target_character.GetName], пожертвував значну кількість експонатів для виставки в залах цього нового відділу."
  artist_events.15.a: "Яка чудова виставка!"
  artist_events.16.title: "Майбутнє музики"
  artist_events.16.desc: "Наші зали завжди віддавали шану мистецтвам, залучаючи багатьох здібних особистостей до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetName] виділяється завдяки [target_character.GetHerHis] молодому віку та майстерності у створенні чудових мелодій. Безсумнівно, [target_character.GetSheHe] глибоко вплине на нашу пишність та престиж на довгі роки."
  artist_events.16.a: "Ми спостерігатимемо за вашою кар'єрою з великим інтересом!"
  artist_events.17.title: "Зали шуму"
  artist_events.17.desc: "День у день наші зали наповнені жахливою сумішшю криків, погано зіграних акордів та фальшивого співу. Можна було б припустити, що ми застосовуємо найжорстокіші тортури до наших в'язнів, але правда набагато жахливіша. [target_character.GetName] створює [target_character.GetHerHis] останній твір, на жаль..."
  artist_events.17.a: "Замовкніть цього дурня!"
  artist_events.17.b: "Краса в вухах слухача."
  artist_events.17.c: "Нам досить [target_character.GetNameWithNoTooltip]!"
  artist_events.18.title: "Музичні інновації [target_character.GetNameWithNoTooltip]"
  artist_events.18.desc: "Нещодавні композиції, опубліковані [target_character.GetName], викликали хвилювання в усьому мистецькому світі нашого суспільства. Поєднання нових мелодій, інструментів та вміле використання нових звуків дали початок новому поколінню культурних традицій та мелодій."
  artist_events.18.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  artist_events.19.title: "Музичний поєдинок"
  artist_events.19.desc: "Протягом останніх кількох тижнів наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] був полем битви між двома композиторами. Кожен, озброєний дотепністю та нотними аркушами, намагається перевершити іншого. Хоча [target_good_composer.GetName] є кращим і визнаним митцем, [target_bad_composer.GetName] невпинний і не припиняє докучати [ROOT.GetCountry.GetGovernment.GetCourtTitle] постійними проханнями порівняти [target_bad_composer.GetHerHis] роботу з роботою [target_bad_composer.GetHerHis] колеги."
  artist_events.19.a: "[target_good_composer.GetNameWithNoTooltip] явно кращий."
  artist_events.19.b: "Давайте натомість похвалимо тяжку працю [target_bad_composer.GetNameWithNoTooltip]."
  artist_events.19.c: "Це все нижче нашої гідності."
  artist_events.20.title: "Зростання витончених мистецтв"
  artist_events.20.desc: "Наші великі зали є джерелом великих творів мистецтва, на заздрість усьому світу. Нещодавній цикл музичних вистав, написаних [target_character.GetName], захопив велику аудиторію, оскільки мелодії бездоганно поєднуються одна з одною, створюючи мелодію, яка личить людям нашого престижу та становища."
  artist_events.20.a: "Кар'єра [target_character.GetNameWithNoTooltip] виглядає багатообіцяючою!"
  artist_events.21.title: "Життя в місті"
  artist_events.21.desc: "Розвиток міських центрів по всьому нашому [ROOT.GetCountry.GetFlavorRank] приніс багато благ нашому суспільству. Однак, разом із цією новою хвилею централізації приходять і недоліки життя у високоурбанізованому середовищі. Спочатку спроектований гільдією під керівництвом [target_character.GetName], [target_location.GetName] перетворився на жахливо тісне і відверто огидне місце для життя."
  artist_events.21.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  artist_events.21.tt: "Всі наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  artist_events.22.title: "Модернізований міський центр"
  artist_events.22.desc: "Багато поселень у наших володіннях прикрашені красивими та новозбудованими спорудами. Серед них, [target_location.GetName] нещодавно почав приваблювати багатьох людей здалеку, завдяки архітектурним роботам [target_character.GetName], чиє планування та проекти дали [target_location.GetNameWithNoTooltip] так необхідне покращення."
  artist_events.22.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  artist_events.23.title: "Розквіт [ShowInstitutionNameWithNoTooltip('renaissance')|U] Мистецтв"
  artist_events.23.desc: "Нові художні стилі, архітектурні рухи та культурні явища запроваджуються в нашому суспільстві завдяки чудовому обміну ідеями та інноваціями. Таким чином, один з наших архітекторів, [target_blooming_artist.GetName], попросив нас розглянути можливість спонсорування нового стилю архітектурного дизайну, застосованого до новозбудованих будівель у [ROOT.GetCountry.GetCapital.GetName]."
  artist_events.23.a: "Чудова ідея."
  artist_events.23.b: "Ми так не вважаємо."
  artist_events.24.title: "Помилка в розрахунках"
  artist_events.24.desc: "Наші постачальники будівельних матеріалів могли б присягнути, що їм було наказано відправити ще кілька караванів, повних заліза, мармуру, каменю та глини, згідно з інструкціями [target_character.GetName]. Виявляється, це замовлення було непотрібним, проте купці наполягають, що [ROOT.GetCountry.GetGovernment.GetCourtTitle] має відшкодувати вартість матеріалів та їхні дорожні витрати, як це передбачено їхнім гільдійським контрактом."
  artist_events.24.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  artist_events.24.b: "Це не наша помилка, яку слід виправляти."
  artist_events.25.title: "Мати навчання"
  artist_events.25.desc: "День у день, світло в майстерні [target_character.GetName] залишається запаленим. Невтомні спроби вдосконалити [target_character.GetHerHis] техніку, нескінченні ітерації покращення [target_character.GetHerHis] проєктів. Хоча [target_character.GetSheHe] може бути не найздібнішим архітектором, [target_character.GetNameWithNoTooltip] безперечно старається і з часом лише покращиться."
  artist_events.25.a: "[target_character.GetHerHis|U] жага до вдосконалення має слугувати натхненням для всіх нас!"
  country_events.25.tt: "[Concept('target_character.GetName] може отримати нову #G позитивну#! [trait', 'CONCEPT_PLACEHOLDER')|e]"
  artist_events.26.title: "Запеклі дебати"
  artist_events.26.desc: "Підвищені тони та гучні суперечки не є рідкістю в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Намагаючись приймати різних видатних осіб мистецького та теоретичного спрямування, ми повинні очікувати значного тертя між цими інтелектуалами. Однак нещодавні дебати навколо природи, виховання та людського розуму майже перетворили [target_character.GetName] на дикуна, який сердито ходить садами палацу, вказуючи на служниць або різних прохачів і ставлячи їм агресивні запитання, викликаючи їх на дебати."
  artist_events.26.a: "Ми кращі за це."
  artist_events.26.b: "Це лише ознака нашої яскравої культури та любові до інтелектуальних мистецтв!"
  artist_events.26.tt: "Суперечлива поведінка [target_character.GetName] є лише ознакою нашої інтелектуальної переваги над нашими некультурними сусідами та суперниками"
  artist_events.27.title: "[target_character.GetNameWithNoTooltip] Публікує Праці"
  artist_events.27.desc: "Була опублікована серія праць про потойбічне життя та наш час на цій площині, написаних під іменем [target_character.GetName]. Вражаючі, як завжди, [target_character.GetHerHis] праці мають на меті пояснити найглибші питання життя через теологічну призму. Ці писання, безсумнівно, будуть супроводжуватися ще кращими ітераціями з часом."
  artist_events.27.a: "Цікаве читання."
  artist_events.28.title: "Провокування Божого Гніву"
  artist_events.28.desc: "Праця філософів, таких як [target_character.GetName], часто балансує на тонкій межі між гординею та єрессю. Розмірковувати над найглибшими питаннями життя та ретельно досліджувати божественну природу — це завдання, якого більшість боїться. Таким чином, нещодавні запитання та дослідження [target_character.GetNameWithNoTooltip], схоже, викликали значну реакцію з боку наших авторитетів у [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  artist_events.28.a: "О ні."
  artist_events.28.b: "Вони не можуть розпізнати інтелект, що стоїть за працею [target_character.GetNameWithNoTooltip]!"
  artist_events.29.title: "[target_location.GetNameWithNoTooltip] Чинить Опір Філософським Вченням"
  artist_events.29.desc: "За словами [target_character.GetName], кидати виклик вірі та ставити навідні запитання — це сутність і втілення доброго та інтелектуального життя. Однак нещодавні публікації [target_character.GetHerHis] викликали гнів людей, що проживають у [target_location.GetName], оскільки вони сприймають [target_character.GetHerHis] праці не інакше як гординю."
  artist_events.29.a: "Вони просто не розуміють."
  artist_events.30.title: "Найінтелектуальніший [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  artist_events.30.desc: "Наші [ROOT.GetCountry.GetGovernment.GetAdjective] резиденції славляться своєю блискучою присутністю, сповненою жвавих митців та бурхливою розкішшю й багатством. Художники, філософи та інші приходять до наших дверей, щоб мати шанс продемонструвати свої вміння та здобути славу й багатство, прагнучи увічнити своє ім'я в книгах історії."
  artist_events.30.a: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] є колискою інновацій!"
  artist_events.31.title: "Іконографія [target_character.GetNameWithNoTooltip]"
  artist_events.31.desc: "Світло падає на портрет під таким кутом, що святий зображений майже живим на передньому плані, його туніка та німб сяють яскравими кольорами. Мистецтво та майстерність [target_character.GetName] проступають крізь полотно, возвеличуючи численні божественні постаті нашої віри."
  artist_events.31.a: "Твори [target_character.GetNameWithNoTooltip] є благословенням."
  artist_events.32.title: "Виставка нової іконографії в [target_location.GetNameWithNoTooltip]"
  artist_events.32.desc: "Твори віри та мистецтва мають значний вплив і владу в наших кордонах. Як наслідок, коли [target_character.GetName] представив [target_character.GetHerHis] нову лінію ікон, люди [ROOT.GetCountry.GetReligion.GetAdjective] віри в [target_location.GetName] раділи, побачивши таку надзвичайну красу."
  artist_events.32.a: "Це лише ознака нашого художнього інтелекту та глибокої сили віри."
  artist_events.32.tt: "Усі [Concept('ROOT.GetCountry.GetReligion.GetAdjective] [pops', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName] отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  artist_events.33.title: "Замовлення не тим людям"
  artist_events.33.desc: "Заможні члени нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] нещодавно замовили серію ікон у [target_character.GetName]. Незважаючи на те, що роботи були завершені дещо раніше, вони були надзвичайно гучними щодо відсутності турботи, професіоналізму та досвіду, що очевидно при погляді на роботу іконописця. Їхній гнів може призвести до непередбачених наслідків, оскільки вони мають великий вплив у релігійних питаннях у нашому суспільстві."
  artist_events.33.a: "Ми можемо покрити витрати іконописця від його імені."
  artist_events.33.b: "Це лише частина плану [ROOT.GetCountry.GetReligion.GetGodName], хто ми такі, щоб втручатися?"
  artist_events.34.title: "Про культуру та релігію"
  artist_events.34.desc: "Нещодавня серія робіт [target_character.GetName] захопила маси витонченим та майстерним використанням кольору, поз та нових технік живопису. Безперечно, це чудове видовище мистецтва є лише побічним продуктом наших вищих культурних та релігійних переконань. Все, що від нас вимагається, це подальше спонсорування створення мистецтва в обмін на престиж нашого імені та захоплюючі виставки ікон."
  artist_events.34.a: "Ми з радістю спонсоруємо [target_character.GetNameWithNoTooltip]!"
  artist_events.34.b: "Нам байдуже до таких дрібниць."
  artist_events.35.title: "Все, що сяє"
  artist_events.35.desc: "У [target_character.GetHerHis] аматорських спробах вловити божественну сутність нашого ансамблю святих, [target_character.GetName] створив серію дуже погано зроблених ікон неприродних пропорцій та облич, одягнених у одні з найяскравіших та найтривожніших золотих кольорів. Настільки велика їхня непривабливість, що багато [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] вдалися до кидання різноманітних фруктів як у художника, так і в самі твори мистецтва, що було справді ганебним видовищем."
  artist_events.35.a: "Як соромно!"
  artist_events.36.title: "Відточування навичок"
  artist_events.36.desc: "Досить довго [target_character.GetName] запитував про потенційне спонсорство, яке допомогло б [target_character.GetHerHis] металургійним навичкам. За словами [target_character.GetHerHim], набір уроків металообробки в [target_location.GetName] значно сприяв би розвитку ковальської справи. Багато наших радників досить відкриті до спонсорування цього пошуку знань, на який [target_character.GetShortNameWithNoTooltip] вирушив."
  artist_events.36.a: "Дуже добре, фінансуйте [target_character.GetHerHis] навчання!"
  artist_events.36.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  based_on_same_culture_highest_lit_pop_tt: "Отриманий [Concept('artistic_skill', 'CONCEPT_PLACEHOLDER')|e] залежить від середньої [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], які поділяють [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] [Concept('artist', 'CONCEPT_PLACEHOLDER')|e], наразі це [target_pop.GetName]"
  based_on_country_average_literacy_tt: "Отриманий [Concept('artistic_skill', 'CONCEPT_PLACEHOLDER')|e] залежить від середньої [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e]"
  artist_events.37.title: "[target_character.GetShortNameWithNoTooltip] пропонує покращення"
  artist_events.37.desc: "[target_character.GetName] нещодавно запропонував розроблений план для подальшого збільшення виробництва [target_material.GetName] в [target_location.GetName]. Під [target_character.GetHerHis] наглядом обсяг видобутої сировини, за прогнозами, значно покращиться протягом [target_character.GetHerHis] перебування в цьому місці. Однак [target_character.GetSheHe] не буде доступний для замовлення нашого мистецтва на вимогу, в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  artist_events.37.a: "Це гарна ідея."
  artist_events.37.b: "[target_character.GetHerHis|U] навички будуть використані в іншому місці."
  artist_busy_tt: "Поки [Concept('target_character.GetNameWithNoTooltip] працює над покращенням виробництва [raw_material', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetNameWithNoTooltip], ми #R не#! зможемо [ShowCharacterInteractionName('commission_art')] від [target_character.GetHerHim]"
  artist_events.38.title: "Використання шахт"
  artist_events.38.desc: "Наш [ROOT.GetCountry.GetFlavorRank] благословенний володінням кількома шахтами великої цінності, що містять високоякісні метали. Один з наших митців, металург на ім'я [target_character.GetName], запропонував використати [target_character.GetHerHis] навички для покращення нашої інфраструктури або гірничих технологій за допомогою витончено виготовлених металів під [target_character.GetHerHis] наглядом."
  artist_events.38.a: "[target_character.GetHerHis|U] робота доповнить наші наступальні зусилля."
  artist_events.38.b: "Прагнути покращити нашу інфраструктуру."
  artist_events.38.c: "Нехай наші вчені та митці вивчають і навчаються таким технікам."
  depends_on_prosp_artist_skill_and_control_tt: "Отриманий [Concept('development', 'CONCEPT_PLACEHOLDER')|e] залежить від [Concept('control', 'CONCEPT_PLACEHOLDER')|e] та [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], а також від майстерності [Concept('artist', 'CONCEPT_PLACEHOLDER')|e]"
  artist_events.39.title: "Оглушливий звук прогресу"
  artist_events.39.desc: "[target_character.GetName] став сумнозвісним через [target_character.GetHerHis] невпинне кування, що триває від світанку до сутінків. Хоча [target_character.GetHerHis] робота має беззаперечну якість, безперервний шум відволікає придворних, радників і навіть місцевих тварин.\n\nСкарги варіюються від безсонних ночей до зірваних поетичних читань. [target_character_2.GetName] вимагає перемістити або змусити замовкнути металурга, стверджуючи, що [target_character_2.GetHerHis] діяльність занадто цінна, щоб їй заважати."
  artist_events.39.a: "[target_character_2.GetShortNameWithNoTooltip] має навчитися цінувати мистецтво!"
  artist_events.39.b: "Ніхто в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] не може зосередитися."
  artist_events.40.title: "Важкий метал"
  artist_events.40.desc: "Години над відкритим вогнем, надання форми всіляким металам, ще гарячим під пресом, належать до багатьох обов'язків вправного металурга, проте фізична праця — це лише половина процесу, навіть якщо вона найважча. На кожну годину в кузні потрібно витрачати час на вдосконалення процесу. Таке життя [target_character.GetName], який став мудрим і досвідченим у [target_character.GetHerHis] ремеслі. Пекельне середовище кузні не для тих, хто має слабку волю.\n\nТаким чином, [target_character.GetShortNameWithNoTooltip] нещодавно запросив кошти на найм [target_character_2.GetName] як помічника, щоб допомогти розподілити навантаження [target_character.GetHerHis] багатьох проєктів, учня, який продовжить [target_character.GetHerHis] ремесло і навчиться [target_character.GetHerHis] мудрості. Така інвестиція значно підвищить наш престиж і допоможе передати знання від одного покоління до наступного."
  artist_events.40.a: "Це гарна інвестиція."
  artist_events.40.b: "[target_character.GetShortNameWithNoTooltip] має припинити скаржитися."
  strain_harder_at_the_forge_tt: "Напруга роботи позначиться на тривалості життя [target_character.GetShortNameWithNoTooltip]"
  artist_events.41.title: "На захист менш щасливих"
  artist_events.41.desc: "Література щодо експлуатації [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] циркулювала в [ROOT.GetCountry.GetCapital.GetName] протягом останніх кількох місяців, поширюючи невдоволення та нестабільність між [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та менш щасливими. Деякі з наших радників стверджують, що ці провокаційні твори є роботами не кого іншого, як [target_character.GetName], чий життєвий досвід призвів до їдкої ненависті до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]. Це широко сприймається як загроза нашому [ROOT.GetCountry.GetFlavorRank] і, відповідно, [target_character_2.GetName] [target_character_2.GetHerselfHimself]."
  artist_events.41.a: "Нехай [target_character.GetHerHim] продовжує писати."
  artist_events.41.b: "Замовкнути [target_character.GetHerHim]."
  artist_events.42.title: "[target_character.GetNameWithNoTooltip] підтримує зміну політики"
  artist_events.42.desc: "Внутрішня робота нашого уряду досить складна і часто залишає місце для зростання корупції та лобі. Останній виклик нашій владі походить не від кого іншого, як від [target_character.GetName]. Згідно з [target_character.GetHerHis] риторикою, [target_character_2.GetName] активно шкодить стабільності та ефективності нашої правової системи. У явній спробі виправити шкоду, [target_character.GetShortNameWithNoTooltip] пропонує впровадження '[target_policy.GetName]'. Однак зрозуміло, що [target_estate.GetName] говорить через [target_character.GetHerHim], як маріонетка."
  artist_events.42.a: "Законний погляд [target_character_2.GetShortNameWithNoTooltip] нищить корупцію."
  artist_events.42.b: "Ми не можемо ризикувати роздратувати [target_character.GetShortNameWithNoTooltip] та [target_character.GetHerHis] прихильників."
  artist_events.42.c: "[target_character.GetSheHe|U] забуває [target_character.GetHerHis] місце."
  depends_on_change_policy_cost_tt: "Виплачена [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] значною мірою залежить від поточних [Concept('costs', 'CONCEPT_PLACEHOLDER')|e] на зміну [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] в [Concept('law', 'CONCEPT_PLACEHOLDER')|e]"
  target_character_will_never_dare_again_tt: "Знання та ораторська майстерність [target_character_2.GetShortName] не залишають місця для скептиків, і тому [target_character.GetShortName] більше ніколи не спробує такого підступного кроку"
  artist_events.43.title: "Законно Добрий"
  artist_events.43.desc: "Наше суспільство давно формується нашою підтримкою мистецтв та міцністю правових засад. Відомий [target_character.GetHerHis] красномовними промовами та літературними досягненнями в галузі юриспруденції, [target_character.GetName] створив велику епоху прогресу в мистецьких сферах як великий юрист. Тому ми повинні обміркувати, як найкраще використати такий талант і залучити [target_character.GetHerHim] для максимізації нашого сприйнятого престижу та легітимності."
  artist_events.43.a: "[target_character.GetSheHe|U] є яскравим прикладом нашого здорового апарату."
  artist_events.43.b: "Використовувати [target_character.GetHerHis] послуги виключно в уряді."
  jurist_busy_tt: "[Concept('target_character.GetShortName] служитиме #Y 5#! років у нашому уряді, пасивно збільшуючи нашу [cabinet_efficiency', 'CONCEPT_PLACEHOLDER')|e] та [Concept('tax_efficiency', 'CONCEPT_PLACEHOLDER')|e] на #G +10%#!\nПоки [target_character.GetSheHe] служить, ми #R не#! зможемо [ShowCharacterInteractionName('commission_art')] від [target_character.GetHerHim]."
  artist_events.44.title: "Тягар Милосердя"
  artist_events.44.desc: "Наші закони справедливо керують нашим [ROOT.GetCountry.GetFlavorRank]. Навіть проти тих, хто прагне зруйнувати наш прогрес і знищити нас, юриспруденція пропонує добру руку без упереджень.\n\nТакий випадок [target_rebel.GetName] та їхніх прихильників. Продуманий підхід до правового захисту [target_character.GetName] допоміг відвернути багатьох від бунтарських тенденцій, даючи нам шанс впливати на них, як ми вважаємо за потрібне."
  artist_events.44.a: "Добрий пастир вітає загублених овець."
  artist_events.44.b: "Скористайтеся нагодою і нав'яжіть їм нашу культуру!"
  every_supporter_pop_gains_20_satisfaction_tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] на підтримку [Concept('target_rebel.GetName] [rebellion', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  artist_events.45.title: "Приємний Юридичний Збіг"
  artist_events.45.desc: "Здається, [target_character.GetName] нещодавно представляв видатних членів [target_estate.GetName] у суді, забезпечивши їм сприятливі результати. В нагороду вони зробили щедру пожертву до нашої скарбниці. Хоча ця грошова вигода, безсумнівно, збільшить наше багатство, наші радники прагнуть запропонувати незліченні способи належного інвестування наших новознайдених коштів."
  artist_events.45.a: "Ми дякуємо їм за їхній дар!"
  artist_events.45.b: "Інвестуйте монету, щоб посилити здібності [target_character.GetShortNameWithNoTooltip]."
  artist_events.46.title: "Несподіване Чхання"
  artist_events.46.desc: "Поки [target_artist.GetName] наполегливо працював над [target_artist.GetHerHis] замовленням, один з [target_artist.GetHerHis] помічників прийшов до [target_artist.GetHerHim], щоб представити останню партію [ShowGoodsName('pepper')]. На жаль, чорний перець змушує чхати, і раптовий вибух змусив [target_artist.GetNameWithNoTooltip] розлити чорнило по всьому. [target_artist.GetHerHis|U] робота була безповоротно зіпсована випадковими плямами та розводами, і всі раніше ретельно промальовані лінії втратили свої правильні форми, і, можливо, не залишиться іншого вибору, окрім як почати все з нуля."
  artist_events.46.a: "Ми забезпечимо [target_artist.GetNameWithNoTooltip] додатковими матеріалами."
  artist_events.46.b: "Цього не повинно повторитися, приберіть весь [ShowGoodsNameWithNoTooltip('pepper')] навколо [target_artist.GetHerHim]."
  artist_events.46.c: "Насправді, [target_artist.GetNameWithNoTooltip] стверджує, що [target_artist.GetSheHe] може з цим працювати."
  artist_events.47.title: "Пустотливий Кот"
  artist_events.47.desc: "[target_artist.GetName] завжди вважався визнаним [target_artist.GetArtistType.GetName], а [target_artist.GetHerHis] роботи були високо оцінені широкою публікою. Однак одна з [target_artist.GetHerHis] робіт, [target_art.GetName], стала головною темою обговорення при [ROOT.GetCountry.GetGovernment.GetCourtTitle], коли деякі уважні студенти роботи виявили на ній особливі чорнильні плями. Очевидно, кіт пройшовся по ній, ступивши на чорнило, залишивши свої лапи назавжди відбитими на творі.\n\nЦе викликало найцікавіші дебати при [ROOT.GetCountry.GetGovernment.GetCourtTitle], причому [cat_lovers.GetName] захоплювалися відвагою котячого, тоді як [cat_haters.GetName] нарікали, що тепер твір повністю зіпсований."
  artist_events.47.a: "Як кажуть [cat_haters.GetNameWithNoTooltip], кіт зіпсував його."
  artist_events.47.b: "Це не применшує твір, а навіть додає йому історії."
  artist_events.47.c: "Зрозуміло, що [target_art.GetNameWithNoTooltip] доведеться замінити."
  artist_events.48.title: "Нешанобливий [target_artist.GetArtistType.GetNameWithNoTooltip]"
  artist_events.48.desc: "Хоча [ROOT.GetCountry.GetReligion.GetName] чітко не заохочує художні зображення людей і тварин, щоб уникнути ідолопоклонства, вони не є явно забороненими. Часто художники знаходили спосіб уникнути зображень, використовуючи саму каліграфічну композицію, щоб натякнути на ідею зображень, а не явно їх малювати. Це не раз викликало здивування серед найзавзятіших [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Однак деякі межі ніколи не повинні бути перетнуті.\n#NL!Твір [target_artist.GetName] викликав у [target_artist.GetHerHim] більше, ніж просто здивування, адже він викликає найяскравіші образи не лише людей і тварин, а й навіть божественних пророків і посланців та самого Мухаммада, мир йому. Це викликало гнів більшості [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], які вимагають суворого засудження."
  artist_events.48.a: "Заборонити [target_artist.GetNameWithNoTooltip] створювати такі зображення знову."
  artist_events.48.b: "Від них немає жодної фактичної шкоди."
  artist_events.48.c: "[target_artist.GetNameWithNoTooltip] більше не бажаний у [ROOT.GetCountry.GetNameWithNoTooltip]."
  artist_events.48.d: "Ми не дозволимо слизького шляху єресі!"
  artist_events.49.title: "Жахливий почерк"
  artist_events.49.desc: "[target_artist.GetName] називає [target_artist.GetHerselfHimself] гордим [target_artist.GetArtistType.GetName]. Однак реальність така, що [target_artist.GetHerHis] почерк абсолютно жахливий, і багато хто при [ROOT.GetCountry.GetGovernment.GetCourtTitle] не може зрозуміти жодного слова з того, що [target_artist.GetSheHe] пише. [target_artist.GetHerHis|U] роботи часто викликають більше стурбованих виразів обличчя та спотворених гримас, ніж поглядів захоплення, факт, якого [target_artist.GetSheHe], здається, абсолютно не помічає, уявляючи [target_artist.GetHerselfHimself] натомість як незрозумілого художника через те, що [target_artist.GetHerHis] роботи занадто передові."
  artist_events.49.a: "Настав час для перевірки реальності."
  artist_events.49.b: "Плебеї не можуть зрозуміти справжнього мистецтва."
  artist_events.50.title: "Золоте чорнило"
  artist_events.50.desc: "[target_artist.GetName], здавалося, був достатньо задоволений [target_artist.GetHerHis] роботою в [target_art.GetName], але насправді [target_artist.GetSheHe] був внутрішньо розчарований нею. Тепер [target_artist.GetSheHe] прийшов до [ROOT.GetCountry.GetGovernment.GetCourtTitle] з ідеєю, як її покращити. [target_artist.GetSheHe|U] стверджує, що якщо ми надамо [target_artist.GetHerHim] трохи [ShowGoodsName('goods_gold')], [target_artist.GetSheHe] зможе перемалювати лінії спеціальною сумішшю чорнила та золотого порошку, значно збільшивши красу роботи."
  artist_events.50.a: "Дурниці, це чудова робота, як вона є зараз."
  artist_events.50.b: "Давайте дамо [target_artist.GetHerHim] трохи [ShowGoodsNameWithNoTooltip('goods_gold')]."
  artist_events.51.title: "Новий каліграфічний стиль"
  artist_events.51.desc: "Немає сумніву, що [target_artist.GetName] є відомим [target_artist.GetArtistType.GetName]. [target_artist.GetHerHis|U] написані слова завжди викликали захоплення, але, здається, [target_artist.GetSheHe] хотів піти далі. У [target_artist.GetHerHis] студії [target_artist.GetSheHe] почав використовувати новий стиль письма, який, як [target_artist.GetSheHe] стверджує, може стати новим стандартом, якщо його належним чином просувати та поширювати."
  artist_events.51.a: "Заохочувати просування цього нового стилю."
  artist_events.51.b: "У нас вже є стандарт, нового не потрібно."
  artist_events.52.title: "Письмова медитація"
  artist_events.52.desc: "[target_artist.GetName] завжди наполегливо працює, але [target_artist.GetHerHis] техніка привернула до [target_artist.GetHerHim] інтерес певної групи. Деякі серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розглядають [target_artist.GetHerHis] спосіб тихої та зосередженої роботи як форму рухомої медитації і хочуть просувати її серед решти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] як ще один спосіб допомогти слідувати шляху Будди."
  artist_events.52.a: "Це справді дуже духовна діяльність."
  artist_events.52.b: "Це спосіб створити прекрасне мистецтво, не більше."
  artist_events.53.title: "Майстер і учень"
  artist_events.53.desc: "У будь-якій мистецькій справі завжди є двоє: майстер і учень, і метою учня є зрештою перевершити майстра. З цією метою [target_apprentice.GetName] з'явився перед [ROOT.GetCountry.GetGovernment.GetCourtTitle], незадоволений [target_apprentice.GetHerHis] власними здібностями. [target_apprentice.GetSheHe|U] просить, щоб ми дозволили [target_apprentice.GetHerHim] стати учнем [target_artist.GetName], який є набагато відомішим і вправнішим [target_artist.GetArtistType.GetName]. Це, безумовно, допомогло б [target_apprentice.GetHerHim] покращити [target_artist.GetHerHis] здібності, але, безумовно, унеможливило б для [target_artist.GetNameWithNoTooltip] виконання [target_artist.GetHerHis] інших обов'язків."
  artist_events.53.a: "Дозволити [target_apprentice.GetHerHim] стати учнем."
  artist_events.53.b: "Навички [target_artist.GetNameWithNoTooltip] занадто цінні для такого учнівства."