l_english:
  personality_events.1.title: "Численні інтереси [target_ruler.GetNameWithNoTooltip]"
  personality_events.1.desc: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] дедалі більше цікавиться вищими інтелектуальними заняттями і може проводити дні, розмовляючи з ученими мужами нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_ruler.GetHeSheFormal|U] почав запрошувати вчених зблизька та здалеку, аби допомогти [target_ruler.GetHerHim] краще зрозуміти, як функціонує світ і люди в ньому.\n\nСудячи з того, як розвиваються події, [target_ruler.GetName] [target_ruler.GetHerselfHimself] міг би, ймовірно, сам стати авторитетом у [target_ruler.GetHerHis] галузі, якби [target_ruler.GetSheHe] міг приділяти достатньо часу та ресурсів обраним [target_ruler.GetHerHis] сферам."
  personality_events.1.a: "Ми повинні прагнути зрозуміти фізичний світ навколо нас."
  personality_events.1.a.tt: "Це може принести користь нашій країні, але, найімовірніше, коштуватиме нам [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]"
  personality_events.1.b: "Правитель повинен розуміти закони Бога та людей."
  personality_events.1.c: "Не будемо марнувати [target_ruler.GetHerHis] час і гроші на такі справи."
  personality_events.2.title: "Досягнення в Картографії"
  personality_events.2.desc: "Відданий дослідник світу навколо [target_ruler.GetHerHim], [target_ruler.GetName] став одержимий картами. [target_ruler.GetHerHis|U] палац у [ROOT.GetCountry.GetCapital.GetName] має кімнати, повністю присвячені [target_ruler.GetHerHis] колекції карт, і наш дорогий [ROOT.GetCountry.GetGovernment.GetRulerTitle] проводить чимало часу, розглядаючи та каталогізуючи їх.\n\nХоча це зробило [target_ruler.GetHerHim] дещо дивним в очах [target_ruler.GetHerHis] придворних (і [ROOT.GetCountry.GetGovernment.GetAdjective|U] скарбника), наша країна отримує вигоду від великого архіву, який [target_ruler.GetSheHe] створив про світ навколо нас."
  personality_events.2.a: "Світ такий великий."
  personality_events.3.title: "Досягнення в Зброярстві"
  personality_events.3.desc: "[target_ruler.GetName] виявив великий інтерес до функцій та форми зброї. Значні зусилля були витрачені на пошук незвичайних або інноваційних вогнепальних зразків, і [target_ruler.GetNameWithNoTooltip] із задоволенням розбиратиме та збиратиме будь-яку зброю, принесену [target_ruler.GetHerHim].\n\nДехто вважав би це захоплення хворобливим (не кажучи вже про дорожнечу), але в результаті цього довготривалого проєкту наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] створив те, що [target_ruler.GetSheHe] називає ідеальною вогнепальною зброєю."
  personality_events.3.a: "Нехай світ тремтить!"
  personality_events.4.title: "Пошуки золота"
  personality_events.4.desc: "[target_ruler.GetName] був поглинений можливістю створення золота ще з [target_ruler.GetHerHis] раннього дитинства, і з відкритими для [target_ruler.GetHerHim] державними скарбницями це перетворилося на одержимість. Кожна книга та кожен передбачуваний експерт були зібрані до [ROOT.GetCountry.GetCapital.GetName] для вивчення або допиту. [target_ruler.GetNameWithNoTooltip] [target_ruler.GetHerselfHimself] провів багато днів у [target_ruler.GetHerHis] лабораторії, але досі не наблизився до створення цього дорогоцінного металу.\n\nДехто назвав би це заняття марною справою, але воно, безумовно, покращило наші знання з хімії."
  personality_events.4.a: "Чудово, спробуймо тепер це приглушити."
  personality_events.4.b: "Повинен... Створити Золото..."
  personality_events.4.b.tt: "Дати нашому правителю повну свободу дій для занять алхімією. Шанси на успіх дуже невизначені."
  personality_events.5.title: "Захоплення хобі"
  personality_events.5.desc: "Хоча [target_ruler.GetName] виявляв великий інтерес до всіляких інтелектуальних занять протягом [target_ruler.GetHerHis] правління, схоже, [target_ruler.GetHerHis] амбіція здобути ім'я для [target_ruler.GetHerselfHimself] серед вчених світу не була дуже успішною. [target_ruler.GetHerHis|U] покровительство великим інтелектуалам не позбавлене заслуг для [ROOT.GetCountry.GetName] в цілому, навіть якщо [target_ruler.GetHerHis] невдала амбіція залишається болючим місцем для [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  personality_events.5.a: "#italic Dicitur nos esse quasi nanos, gigantium humeris insidentes.#!"
  personality_events.5.b: "[target_ruler.GetNameWithNoTooltip] оточить [target_ruler.GetHerselfHimself] великими умами нашого часу!"
  personality_events.6.title: "Кодифікація законів"
  personality_events.6.desc: "Після інтенсивного вивчення та дебатів, [target_ruler.GetName] з [ROOT.GetCountry.GetName] постановив, що низка місцевих законів та правових традицій з усього [ROOT.GetCountry.GetNameWithNoTooltip] буде замінена новим збірником законів, створених [target_ruler.GetHerHis].\n\nЦей збірник законів поєднує юриспруденцію з усього нашого [ROOT.GetCountry.GetFlavorRank], а також інших [ROOT.GetCountry.GetReligion.GetAdjective] країн, і [target_ruler.GetNameWithNoTooltip] вважає, що він слугуватиме прикладом для суддів на покоління вперед."
  personality_events.6.a: "Кожен має право на справедливий суд."
  personality_events.6.b: "Ми можемо до цього звикнути..."
  personality_events.7.title: "Велика дискусія у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  personality_events.7.desc: "Щоб повністю зрозуміти, які правила керують землею та її мешканцями, [target_ruler.GetName] занурив [target_ruler.GetHerselfHimself] у великі праці з теології та філософії. Велика кількість вчених також була запрошена до [ROOT.GetCountry.GetCapital.GetName], щоб висловити свою думку про порядок речей у світі.\n\nЦе прагнення до керівництва тепер завершилося великою дискусією, організованою нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle] [target_ruler.GetHerselfHimself] у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  personality_events.7.a: "Який чудовий день для навчання!"
  personality_events.7.b: "Ми повинні шукати відповіді далі."
  personality_events.8.title: "Що є правильним у війні та мирі"
  personality_events.8.desc: "У [target_ruler.GetHerHis] прагненні до справедливості, [target_ruler.GetName] зацікавив [target_ruler.GetHerselfHimself] у відносинах між великими державами. Поведінка держав під час війни, на морі або далеко від дому регулюється небагатьма законами, але багатьма традиціями. Вирішивши сформувати міжнародну дискусію з цих питань, [target_ruler.GetNameWithNoTooltip] використав усі матеріали, які [target_ruler.GetSheHe] зміг знайти, щоб написати книгу про закони війни, миру та міжнародної поведінки. Досі незрозуміло, чи це матиме той ефект, на який сподівається наш [ROOT.GetCountry.GetGovernment.GetRulerTitle], але це явно змінило становище нашої країни серед інших держав."
  personality_events.8.a: "Що становить дійсний Casus Belli?"
  personality_events.9.title: "Зілля мани?"
  personality_events.9.desc: "Секрет створення золота з менш цінного матеріалу продовжує вислизати від [target_ruler.GetName], але у [target_ruler.GetHerHis] експериментах [target_ruler.GetSheHe] вдалося створити щось, що [target_ruler.GetSheHe] називає «Зіллям мани». Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] наполягає, що випивання цього зілля принесе [target_ruler.GetHerHim] життя та життєву силу, не кажучи вже про силу робити великі справи для нашого [ROOT.GetCountry.GetFlavorRank]."
  personality_events.9.a: "[target_ruler.GetNameWithNoTooltip] вип'є зілля мани!"
  personality_events.10.title: "Провінційна ворожнеча"
  personality_events.10.desc: "Те, що почалося як незначна суперечка між місцевими можновладцями та деякими їхніми орендарями, якимось чином переросло у суперечку національного значення. З [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], вченими, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та вуличними демагогами, які якомога голосніше висловлювали свої думки, сторони ворожнечі нарешті звернулися до [target_ruler.GetName], щоб вирішити свій конфлікт.\n\nВислухавши їхні аргументи, наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] переконаний, що орендарі, хоч би якою жалюгідною була їхня ситуація, є винними. Справедливий і добре аргументований вердикт навряд чи когось засмутить, але досить спокусливо використати громадську думку, щоб збільшити нашу власну владу над провінцією за рахунок цих можновладців."
  personality_events.10.a: "Спробувати вирішити питання справедливо."
  personality_events.10.b: "Ми повинні використати цю ситуацію!"
  personality_events.11.title: "Праведний [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  personality_events.11.desc: "Мало хто з монархів може похвалитися такою палкою підтримкою, як [target_ruler.GetName]. Однак [target_ruler.GetHerHis] заступникам не завжди так щастить. У деяких випадках наші піддані просто відмовляються визнавати, що певний губернатор, збирач податків або інший урядовець діє від імені [target_ruler.GetNameWithNoTooltip]. До нас надійшла петиція про цілу губернаторську адміністрацію, яка, за народною думкою, зловживала нашою доброю волею, змушуючи людей страждати."
  personality_events.11.a: "Покарати губернаторську адміністрацію."
  personality_events.11.b: "Спробувати захистити губернаторську адміністрацію."
  personality_events.11.c: "Залишити це місцевим жителям."
  personality_events.12.title: "Чесноти [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  personality_events.12.desc: "Правління [target_ruler.GetName] відзначене чудовою співпрацею, від бюрократів до простих торговців і навіть республіканської аристократії, здається, кожен відчуває, що наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] дбає про їхнє благо. Однак є одна група, яка відчуває, що [target_ruler.GetNameWithNoTooltip] їх підвів. [target_ruler.GetHerHis|U] власна родина та прихильники вважають, що [target_ruler.GetSheHe] недостатньо використав [target_ruler.GetHerHis] посаду. Їхня власність та вплив значні, навіть якщо вони не сильно зросли за час [target_ruler.GetHerHis] перебування на посаді, і багато хто наполягає, що вони могли б зробити великі справи для республіки, якби їм надали таку можливість."
  personality_events.12.a: "Ми повинні боротися з усіма формами кумівства!"
  personality_events.12.b: "Власна кров і плоть нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] заслуговують довіри."
  personality_events.12.c: "Продовжувати уникати родичів [target_ruler.GetNameWithNoTooltip]."
  personality_events.13.title: "Довірлива натура [target_ruler.GetNameWithNoTooltip]"
  personality_events.13.desc: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] відомий своєю толерантністю до не-[ROOT.GetCountry.GetReligion.GetAdjective] спільнот у нашому [ROOT.GetCountry.GetFlavorRank]. Дехто навіть сказав би, що [target_ruler.GetHeSheFormal] надто довірливий і дозволяє цим невіруючим затьмарювати [target_ruler.GetHerHis] судження. Група близьких невірних довірених осіб [target_ruler.GetNameWithNoTooltip] особливо привернула багато заздрості та недоброзичливості. Почали циркулювати чутки, що фаворити нашого дорогого [ROOT.GetCountry.GetGovernment.GetRulerTitle] проникли в уряд, щоб змовитися проти вірних."
  personality_events.13.a: "Дурниці!"
  personality_events.13.b: "Як [target_ruler.GetNameWithNoTooltip] міг бути таким сліпим?"
  personality_events.14.title: "Руйнівні наслідки війни"
  personality_events.14.desc: "Війни залишають глибокі шрами, які довго зберігаються у нових підданих після завершення конфлікту. У районах, особливо сильно постраждалих від руйнівних наслідків війни, мало що може залишитися від попередніх урядових інститутів або навіть розширених родин місцевих жителів. [target_ruler.GetName] особисто висловив занепокоєння, що демагоги розпалюватимуть сепаратизм і розбрат у таких районах, перешкоджаючи їхній інтеграції в ширшу державу та спричиняючи надмірні страждання людям."
  personality_events.14.a: "Ми повинні допомогти цим бідним людям відновити своє життя!"
  personality_events.14.b: "Натомість використаймо спустошення на нашу користь!"
  personality_events.14.c: "Місцева влада цим займається."
  personality_events.15.title: "Єресіарх?"
  personality_events.15.desc: "Дивний чоловік на ім'я [heresiarch.GetName] був помічений у сільській місцевості в різних місцях нашого [ROOT.GetCountry.GetFlavorRank]. Він викладає найнеортодоксальнішу версію створення світу кожному, хто слухатиме його веселі балачки. За словами деяких, [heresiarch.GetNameWithNoTooltip] представляє небезпечну та мерзенну переінтерпретацію святих вчень, але багато наших підданих, схоже, були захоплені єрессю цього самозваного пророка та його ідеями.\n\nЗаінтригований репутацією [target_ruler.GetName] як вільнодумного [target_ruler.GetWomanMan], [heresiarch.GetNameWithNoTooltip] тепер вимагає аудієнції у нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], пропонуючи виступити радником у духовних справах."
  personality_events.15.a: "Світ як сир з черв'яками? Захоплива перспектива!"
  personality_events.15.b: "Ми не можемо дозволити [heresiarch.GetNameWithNoTooltip] глузувати з нашої віри!"
  personality_events.15.c: "Просто покажіть [heresiarch.GetNameWithNoTooltip] на двері."
  personality_events.16.title: "Динамічний [ROOT.GetCountry.GetGovernment.GetCabinetTitle|U] [target_ruler.GetNameWithNoTooltip]"
  personality_events.16.desc: "[target_ruler.GetName] зробив [target_ruler.GetHerHis] справою знати всіх чоловіків і жінок високої якості в наш час. Це дозволило [target_ruler.GetHerHim] зібрати найвражаючу [ROOT.GetCountry.GetGovernment.GetCabinetTitle] найяскравіших умів [ROOT.GetCountry.GetName]. Оскільки ті, хто оточує [target_ruler.GetHerHim], усвідомлюють, наскільки це може бути чудовим способом просунути кар'єру, до [target_ruler.GetNameWithNoTooltip] звернулися багато хто з [ROOT.GetCountry.GetGovernment.GetCabinetTitle], які просять, щоб [target_ruler.GetSheHe] звільнив місце для одного зі своїх протеже. Більшість не цікаві, але один особливо дотепний та розумний кандидат, [protege.GetName], може бути гідним місця в нашому внутрішньому колі."
  personality_events.16.a: "Чудовий розум, і ми хотіли б його розграбувати."
  personality_events.16.b: "Звісно, ми можемо знайти місце для [protege.GetNameWithNoTooltip] десь у нашій адміністрації?"
  personality_events.17.title: "Вести за прикладом"
  personality_events.17.desc: "[target_ruler.GetName] не та [target_ruler.GetWomanMan], що легко втрачає [target_ruler.GetHerHis] самовладання. У часи потрясінь, розбрату чи конфлікту [target_ruler.GetSheHe] завжди стояв твердо і міцно, уникаючи паніки та надихаючи інших зберігати спокій. З часом це поширилося на найнижчі рівні нашої адміністрації, і наша країна завдяки цьому стала набагато стабільнішою."
  personality_events.17.a: "Тримайтеся міцно."
  personality_events.18.title: "Обережне маневрування"
  personality_events.18.desc: "Як правителю амбітної держави, важко подружитися з усіма. Однак іноді уважне ставлення до того, що відбувається в міжнародній спільноті, дозволяє зменшити вплив минулих образ. У [target_ruler.GetHerHis] особистому листуванні з правителями сусідніх держав [target_ruler.GetName] сподівається крок за кроком покращити наше становище у світі."
  personality_events.18.a: "Нас просто неправильно зрозуміли."
  personality_events.18.a.tt: "Усі сусідні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які мають негативну думку про нашу країну, перебуваючи з нами в мирі, отримують [ShowBiasValue('careful_diplomatic_manouvering')|+=] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] про нас."
  personality_events.19.title: "Великий шифр [target_ruler.GetNameWithNoTooltip]"
  personality_events.19.desc: "З самого дитинства [target_ruler.GetName] захоплювався(-лася) криптографією, і з віком [target_ruler.GetHerHis] методи приховування [target_ruler.GetHerHis] таємниць ставали все досконалішими. Після виявлення серії розкритих листів стало зрозуміло, що небажані очі читають наше листування з провінційними намісниками. Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] впевнений(-а), що [target_ruler.GetSheHe] міг(-могла) б значно підвищити безпеку, якби [target_ruler.GetSheHe] отримав(-ла) для цього ресурси."
  personality_events.19.a: "Зробімо це нашим головним пріоритетом!"
  personality_events.19.b: "Не будемо витрачати на це енергію. Метод все одно з часом пошириться."
  personality_events.20.title: "Друзі в низьких місцях"
  personality_events.20.desc: "Кажуть, що кожен другий артист, художник чи злодій у столицях наших суперників насправді є інформатором [target_ruler.GetName]. З пильним особистим інтересом до приходів і відходів майже будь-кого, хто має вплив, наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] часто бачить можливості задовго до нашого начальника розвідки. Останнім часом контакти [target_ruler.GetNameWithNoTooltip] вказали, що існують можливості, які ми могли б використати в країнах, що нас цікавлять. Однак це вимагатиме від нас трохи відкрити державну скарбницю."
  personality_events.20.a: "Гроші – це лише число."
  personality_events.20.b: "Залишимо шпигунство професіоналам."
  personality_events.23.title: "Вчимося на чужих помилках"
  personality_events.23.desc: "[target_ruler.GetName] завжди вважав(-ла) чеснотою прислухатися до порад тих, хто був до [target_ruler.GetHerHim], і оточувати [target_ruler.GetHerselfHimself] досвідченими радниками. Однак [target_ruler.GetHerHim] турбує, що [target_heir.GetName] може не повністю усвідомлювати, що тягне за собою правління [ROOT.GetCountry.GetName]. У якийсь момент це відповідальність, яку [target_heir.GetNameWithNoTooltip] доведеться взяти на себе, і тоді, ймовірно, було б найкраще, якби [target_heir.GetSheHe] був(-ла) більш ретельно ознайомлений(-на) з викликами правління."
  personality_events.23.a: "Ми повинні навчити [target_heir.GetHerHim] адміністрації."
  personality_events.23.b: "Ми повинні навчити [target_heir.GetHerHim] зовнішніх справ."
  personality_events.23.c: "Ми повинні навчити [target_heir.GetHerHim] війні."
  personality_events.23.d: "[target_heir.GetNameWithNoTooltip] чудово підготовлений(-на) і так!"
  personality_events.24.title: "Ніколи не пізно вчитися?"
  personality_events.24.desc: "Усвідомлення власних недоліків та делегування повноважень компетентним людям, які доповнюють власні здібності, є одним з найважливіших аспектів мудрого правління. [target_ruler.GetName] твердо вірить у те, що потрібно прислухатися до добрих порад та вдосконалювати [target_ruler.GetHerselfHimself], слухаючи більш досвідчених. Однак з часом можна навчитися тому, що іншим дається природно. Якщо ми дозволимо [target_ruler.GetNameWithNoTooltip] повністю присвятити [target_ruler.GetHerselfHimself] себе, репетитор, ймовірно, зможе покращити [target_ruler.GetHerHis] розуміння деяких більш складних аспектів управління [ROOT.GetCountry.GetAdjective] державою."
  personality_events.24.a: "Нехай [target_ruler.GetHerHim] вивчає [ROOT.GetCountry.GetAdjectiveWithNoTooltip] адміністрацію."
  personality_events.24.b: "Нехай [target_ruler.GetHerHim] вивчає зовнішні справи."
  personality_events.24.c: "Нехай [target_ruler.GetHerHim] вивчає війну."
  personality_events.24.d: "[target_ruler.GetNameWithNoTooltip] не потрібен репетитор!"
  personality_events.25.title: "Несправедлива війна"
  personality_events.25.desc: "У міру наближення переговорів у нашій поточній війні, [target_ruler.GetName] був(-ла) зайнятий(-а) зустрічами з посланцями наших спільних друзів та суперників. Ми маємо симпатію міжнародної спільноти як захисники від несправедливої агресивної війни. Нічого ще не вирішено, але ми можемо бути впевнені, що матимемо багато важелів впливу в майбутніх переговорах."
  personality_events.25.a: "Час укладати угоду."
  personality_events.25.b: "Нам потрібна допомога у відбудові."
  personality_events.26.title: "Поширення [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|U] Віри"
  personality_events.26.desc: "[target_ruler.GetName] зробив(-ла) [target_ruler.GetHerHis] життєвою справою поширення [ROOT.GetCountry.GetReligion.GetAdjective] віри і швидко здобув(-ла) собі ім'я серед релігійних громад по всій нашій країні. [target_ruler.GetHerHis|U] тісні зв'язки з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] зробили релігійних вчених різних видів звичайним явищем у [ROOT.GetCountry.GetCapital.GetName] та впливовим голосом у залах влади.\n\nЗ часом слава нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] почала поширюватися навіть за межі наших кордонів. Тепер наші шпигуни повідомляють нам, що серед підданих наших суперників є релігійні меншини, які вітали б наші визвольні армії на своїх землях."
  personality_events.26.a: "Ми мусимо захистити наших релігійних братів!"
  personality_events.26.a.tt: "Усі сусідні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які сповідують [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] з іншої релігійної групи, ніж ми, отримують [ShowBiasValue('zealot_reputation_opinion')|+=] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас."
  personality_events.26.b: "Уникнімо зайвого кровопролиття."
  personality_events.27.title: "Підтримка побожних"
  personality_events.27.desc: "Багато хто робить свій невеликий внесок, щоб зміцнити нашу державу та нашого побожного лідера в [target_ruler.GetHerHis] боротьбі проти невірних. Наші місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] також повідомляють про сплеск добровольців, готових взятися за зброю, щоб боротися проти ворогів віри."
  personality_events.27.a: "Наші молитви були почуті."
  personality_events.27.b: "Найбільш працездатні служитимуть у наших арміях."
  personality_events.28.title: "Привабливість [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  personality_events.28.desc: "У кращому випадку, відносини васал-покровитель є взаємовигідною справою, де обидві сторони можуть отримати більші вигоди, ніж це було б можливо інакше. Під твердою рукою [target_ruler.GetName] багато країн, що користуються нашим захистом, процвітали. Однією з багатьох переваг, які це приносить нам, є те, що молоді принци та інші знатні особи з підвладних країн вважають [ROOT.GetCountry.GetName] гарним місцем для побудови кар'єри."
  personality_events.28.a: "Нехай вони змагаються за честь служити в нашій адміністрації."
  personality_events.28.b: "Найталановитішим буде надано право служити в наших арміях."
  personality_events.29.title: "Правова реформа"
  personality_events.29.desc: "Як і багато держав подібного розміру, зовнішня єдність [ROOT.GetCountry.GetName] частково є міражем. На місцевому рівні будь-яке місто, маєток чи навіть село можуть мати свої власні правила та закони з незапам'ятних часів. Прагнучи зменшити непослідовне законодавство в нашій країні, наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] відкликав привілеї та видав нові, загальнонаціональні директиви, щоб навести лад у хаосі. Однак це не завжди одразу успішно. З нещодавньою урядовою директивою, яка була відверто проігнорована в одній частині нашої країни, авторитет [target_ruler.GetName] поставлений під сумнів."
  personality_events.29.a: "Проаналізувати їхні заперечення та ретельно гармонізувати наше законодавство."
  personality_events.30.title: "Знаходячи гроші в несподіваних місцях"
  personality_events.30.desc: "[target_ruler.GetName] добре відомий [target_ruler.GetHerHis] неперевершеною здатністю знаходити нові джерела державного доходу в найнеймовірніших місцях. [target_ruler.GetHerHis|U] нещодавній аудит місцевих звітів виявив абсолютно нове джерело доходу в одній з наших провінцій, повільно, але впевнено збільшуючи потік грошей до державної скарбниці."
  personality_events.30.a: "Гроші!"
  personality_events.31.title: "Дотримуючись Кодексу"
  personality_events.31.desc: "Суворе дотримання та погляди [target_ruler.GetName] щодо етичної поведінки та корупції допомогли зробити нашу державу чеснішим місцем. Це також не приносить [target_ruler.GetHerHim] багато друзів серед наших адміністраторів та клерків. Хоча ми утримуємося від хабарів, багато хто активно працює над уповільненням роботи нашого уряду всіма доступними їм засобами."
  personality_events.31.a: "З часом ми викорінимо їх усіх."
  personality_events.31.b: "Ми можемо дозволити собі трохи поступитися нашими високими принципами."
  personality_events.32.title: "Школа [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  personality_events.32.desc: "Силует нашої столиці не був таким повним кранів, недобудованих веж та пам'ятників протягом поколінь. Правління [target_ruler.GetName] характеризувалося постійно зростаючою кількістю будівельних проектів як у [ROOT.GetCountry.GetCapital.GetName], так і в інших частинах нашого [ROOT.GetCountry.GetFlavorRank].\n\nЗростаюча кількість людей, зайнятих у плануванні та зведенні великих будівель на смак нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], призвела до розвитку нового та відмінного архітектурного стилю. Попит на великих архітекторів та будівельників школи [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] зростає на міжнародному рівні, і деякі іноземні міста тепер можуть конкурувати з нами у нашому власному стилі."
  personality_events.32.a: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] має залишатися найвеличнішим з міст!"
  personality_events.32.b: "Заохочуймо наших майстрів поширювати цей стиль далі за кордон."
  personality_events.33.title: "Принада легких грошей"
  personality_events.33.desc: "Кілька економічних інвесторів звернулися до [target_ruler.GetName] з проханням надати право на розвиток однієї з територій під нашим контролем. Вони готові заплатити одноразову суму за право отримувати дохід з наших земель, а потім вже самі збиратимуть гроші замість нас. Інвестори швидко вказують, що в їхніх інтересах інвестувати в місцеву інфраструктуру, щоб збільшити шанси отримати більше, ніж сума, яку вони заплатили за право на нашу землю."
  personality_events.33.a: "[target_ruler.GetNameWithNoTooltip] знає вигідну угоду, коли [target_ruler.GetSheHe] її бачить!"
  personality_events.33.b: "Краще перестрахуватися."
  personality_events.34.title: "Економіка [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  personality_events.34.desc: "[target_ruler.GetName] добре відомий [target_ruler.GetHerHis] невтомною енергією та працьовитістю. Мало годин уночі, коли світло в [target_ruler.GetHerHis] покоях не горить, а [ROOT.GetCountry.GetGovernment.GetAdjective] укази, як відомо, залишають [ROOT.GetCountry.GetCapital.GetName] як рано вранці, так і пізно ввечері. [target_ruler.GetSheHe|U] також, здається, постійно стежить за всіма секторами бізнесу в нашій країні. Іноземці іноді дивуються, дізнавшись, що [target_ruler.GetNameWithNoTooltip] особисто створюватиме правила навіть для абсолютно нових бізнес-проєктів у провінціях.\n\nОскільки наш дорогий [ROOT.GetCountry.GetGovernment.GetRulerTitle] отримує нові можливості для зростання в нашій країні, єдине питання полягає в тому, чи маємо ми ресурси, щоб зробити все, що [target_ruler.GetSheHe] бажає, одночасно."
  personality_events.34.a: "Гроші — не проблема."
  personality_events.34.b: "[target_ruler.GetNameWithNoTooltip] матиме те, що [target_ruler.GetSheHe] потребує, і навіть більше."
  personality_events.34.c: "Іншим разом, можливо."
  personality_events.35.title: "Принада Нових Світів"
  personality_events.35.desc: "З самого [target_ruler.GetHerHis] дитинства [target_ruler.GetName] був зачарований розповідями про далекі місця, і як [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_ruler.GetSheHe] активно сприяв подорожам відкриттів та колонізації. Оскільки наші колоніальні адміністратори тепер вимагають від нас більшої підтримки для здійснення наших заморських амбіцій, [target_ruler.GetSheHe] вирішив зібрати необхідні ресурси самостійно, не обтяжуючи державну скарбницю."
  personality_events.35.a: "Час спорядити експедицію!"
  personality_events.36.title: "Державне втручання"
  personality_events.36.desc: "Таланти [target_ruler.GetName] як перемовника та посередника зазвичай є перевагою в міжнародних переговорах, але іноді виникає можливість, яку можна використати на користь наших ринків. Нещодавня серія зустрічей з іноземними емісарами виявила можливість надати нашим вітчизняним купцям перевагу при експорті товарів на зовнішні ринки."
  personality_events.36.a: "Зосередитися на меркантилістській програмі."
  personality_events.36.b: "Сприяти вільній торгівлі."
  personality_events.36.c: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] вище таких справ."
  personality_events.37.title: "Страх і благоговіння"
  personality_events.37.desc: "Під час [target_ruler.GetHerHis] правління [target_ruler.GetName] як словом, так і ділом довів [target_ruler.GetHerHis] амбіції як Завойовника. Захоплений військами, імпровізований візит до армійського табору тепер вселяє славну мрію про перемогу в серця наших солдатів."
  personality_events.37.a: "Присутність [ROOT.GetCountry.GetGovernment.GetRulerTitle] поведе їх до тріумфу!"
  personality_events.37.b: "Ми повинні скласти маршові пісні на ім'я [target_ruler.GetNameWithNoTooltip]!"
  personality_events.38.title: "Мистецтво війни"
  personality_events.38.desc: "Ця епоха бачила небагатьох осіб з тактичним розумом, що міг би зрівнятися з нашим видатним [target_ruler.GetName]. [target_ruler.GetSheHe|U] революціонізував спосіб, яким ми підходимо до поля бою, і ми передбачаємо багато великих перемог у майбутньому нашого [ROOT.GetCountry.GetFlavorRank]. [target_ruler.GetNameWithNoTooltip] роздумує над написанням книги про [target_ruler.GetHerHis] методи. Хоча це допомогло б нам поширити знання про військову тактику в нашій власній армії, це, безсумнівно, досягло б і наших сусідів."
  personality_events.38.a: "Не ділитися цим прогресом було б злочином проти людства!"
  personality_events.38.a.tt: "Усі сусідні країни отримають [ShowNamedValue('army_tradition_mild_bonus')|+=0] [Concept('army_tradition', 'CONCEPT_PLACEHOLDER')|e]."
  personality_events.38.b: "Вони б святкували нас сьогодні, лише щоб завтра вдарити ножем у спину."
  personality_events.39.title: "Лише мир, а не гра"
  personality_events.39.desc: "[target_ruler.GetName] останнім часом ходить по [target_ruler.GetHerHis] покоях. Плітки кажуть, що це справи серця турбують [ROOT.GetCountry.GetGovernment.GetRulerTitle], але будь-хто, знайомий з [target_ruler.GetWomanMan], знав би, що насправді це нинішній мир [ROOT.GetCountry.GetFlavorRank] – такий хоробрий воїн, як [target_ruler.GetShortNameWithNoTooltip], почувається замкненим, як птах у [target_ruler.GetHerHis] кімнатах, коли немає війни, над якою можна було б розробляти стратегію. Зрештою, [target_ruler.GetSheHe] є [ROOT.GetCountry.GetGovernment.GetRulerTitle]..."
  personality_events.39.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] має влаштувати турнір!"
  personality_events.39.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] має приділяти більше часу тренуванню [target_ruler.GetHerHis] військ."
  personality_events.40.title: "Суворий етикет"
  personality_events.40.desc: "[target_heir.GetName] приєднався до [target_ruler.GetName] на вечерю одного вечора. Чутки кажуть, що це не пройшло добре. Те, що, очевидно, почалося як суперечка про етикет, незабаром призвело до того, що зазвичай вихований [ROOT.GetCountry.GetGovernment.GetHeirTitle] вибіг посеред трапези, а за ним слідом [target_ruler.GetName] кричав, що негідник намагався отруїти [target_ruler.GetHerHim]!"
  personality_events.40.a: "Цього не можна терпіти! [ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] заплатить за це."
  personality_events.40.b: "Ймовірно, це було непорозуміння."
  personality_events.41.title: "Сила риторики"
  personality_events.41.desc: "Стурбований поточним станом війни, [target_ruler.GetName] виголосив натхненну промову для [target_ruler.GetHerHis] стомлених армій. Тепер серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] і простолюдинів поширюються чутки – як маяк [target_ruler.GetSheHe] стояв перед ними, сонце відбивалося від [target_ruler.GetHerHis] обладунків, а [target_ruler.GetHerHis] слова вселяли солдатам нову надію."
  personality_events.41.a: "Ми міцніші, ніж вони думають."
  personality_events.42.title: "Нове покоління"
  personality_events.42.desc: "Протягом багатьох років [target_ruler.GetName] виявляв великий інтерес до формування нашої армії та особисто навчав багатьох талановитих молодих умів. Завдяки цим протеже [target_ruler.GetNameWithNoTooltip] зміг поширити [target_ruler.GetHerHis] ідеї серед наших військ. [ROOT.GetCountry.GetGovernment.GetRulerTitle] вважає, що настав час для [target_ruler.GetHerHis] найновішого учня, [protege.GetName], випробувати [protege.GetHerHis] крила. Тепер ми повинні вирішити, як найкраще [protege.GetSheHe] може принести користь нашому шляхетному [ROOT.GetCountry.GetFlavorRank]."
  personality_events.42.a: "[protege.GetNameWithNoTooltip] має зосередитися на реформах для покращення морального духу наших людей."
  personality_events.42.b: "Нам потрібен новий генерал."
  personality_events.44.title: "Жорсткі переговори"
  personality_events.44.desc: "Протягом багатьох років багато хто боявся [target_ruler.GetName] за столом переговорів. [target_ruler.GetSheHe|U] абсолютно невблаганний, лютий, як лев, і хитрий, як змія. Зрештою, більшість людей дають [target_ruler.GetNameWithNoTooltip] все, що [target_ruler.GetSheHe] хоче, лише щоб уникнути [target_ruler.GetHerHis] залізного погляду. Коли наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] викликав банкірів для перегляду національних позик, ми всі знали, чим це закінчиться."
  personality_events.44.a: "Банкіри будуть кидатися уві сні ще кілька місяців!"
  personality_events.45.title: "Остання крапля"
  personality_events.45.desc: "Довгий час наші дипломати були втомлені від [target_ruler.GetName] та [target_ruler.GetHerHis] схильності ображати всіх і все. Вони не мають ні хвилини спокою, оскільки їм доводиться прибирати всі безлади, які залишає наш [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Їхній останній головний біль виник, коли наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] настільки розлютив емісара [angry_ruler.GetName] з [angry_country.GetName], що [angry_ruler.GetSheHe] влаштував істерику під час [angry_ruler.GetHerHis] візиту. Ніколи ще таких образ не чули в наших великих залах!"
  personality_events.45.a: "Ми повинні захистити честь нашого [ROOT.GetCountry.GetFlavorRank]!"
  personality_events.46.title: "Немає хмари без золотого обідка"
  personality_events.46.desc: "Деякі з радників [target_ruler.GetName] нещодавно виявили, що з державної скарбниці зникли кошти. Вони не здивувалися, дізнавшись, до чиєї кишені пішли гроші. Хоча спочатку вони намагалися знайти рішення, не образивши [ROOT.GetCountry.GetGovernment.GetRulerTitle], тепер у них є цікава ідея. Чому б не використати «таланти» [ROOT.GetCountry.GetGovernment.GetRulerTitle] для поповнення скарбниці?"
  personality_events.46.a: "Це для блага [ROOT.GetCountry.GetFlavorRank]!"
  personality_events.46.b: "Два зла не творять добра."
  personality_events.48.title: "Праця та насолода"
  personality_events.48.desc: "Наш [target_ruler.GetName] відомий [target_ruler.GetHerHis] легковажним і часто скандальним способом життя. Дотепер найганебніші вчинки приховувалися за зачиненими дверима. Однак, схоже, все змінюється. [target_ruler.GetNameWithNoTooltip] привів [target_ruler.GetHerHis] улюбленого коханця, [lover.GetName], відомого шахрая, до [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  personality_events.48.a: "[lover.GetSheHe|U] очевидно має таланти. Дозвольмо [lover.GetHerHim] працювати."
  personality_events.49.title: "Ніч, яку варто запам'ятати"
  personality_events.49.desc: "[target_ruler.GetName] добре відомий – чи, радше, сумнозвісний – своєю поблажливою натурою та розкішним способом життя. Хоча наші адміністратори часто скаржаться на це виснаження державних коштів, вміння влаштовувати вражаючі вечірки є само по собі ресурсом. [target_ruler.GetNameWithNoTooltip] завдяки [target_ruler.GetHerHis] балам та бенкетам здобув багато друзів для нашого [ROOT.GetCountry.GetFlavorRank]. Тепер [target_ruler.GetSheHe] планує ще одну грандіозну подію, однак почесний гість ще не визначений."
  personality_events.49.a: "Це нежиттєздатно..."
  personality_events.50.title: "Отримання прибутку"
  personality_events.50.desc: "Хоча жадібність [target_ruler.GetName] безумовно зашкодила економіці нашої нації, [target_ruler.GetHerHis] нескінченна гонитва за швидкими грошима не завжди безплідна. Іноді бізнес-проекти, в які [target_ruler.GetSheHe] інвестує, окупаються, і сьогодні саме такий день."
  personality_events.50.a: "Жити моментом справді може бути солодко!"
  personality_events.51.title: "Залізна рука"
  personality_events.51.desc: "[target_ruler.GetName] був незадоволений останніми звітами з нашої провінції [lazy_province.GetName]. [target_ruler.GetSheHe|U] впевнений, що винні нікчемні селяни. Можливо, ми зробимо приклад з деяких з них, щоб заохотити інших працювати старанніше?"
  personality_events.51.a: "Покажіть їм ціну ліні!"
  personality_events.51.b: "Ми не можемо ризикувати повстанням, тоді ніхто не працюватиме."
  personality_events.52.title: "Роботодавець десятиліття"
  personality_events.52.desc: "З [target_ruler.GetName] не завжди легко мати справу – [target_ruler.GetHerHis] необдуманий підхід і повна відсутність розсудливості образили багатьох протягом років. Однак є одна група людей, які цінують наївність [target_ruler.GetNameWithNoTooltip]. [target_ruler.GetHerHis|U] радники зрозуміли, що нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] легко переконати, і він/вона захоплюється майже будь-якою пропозицією. Оскільки вони такі задоволені, а конкуренція за їхню посаду така велика, ми змогли дещо знизити їхні зарплати."
  personality_events.52.a: "Невелика конкуренція лише змусить їх працювати старанніше!"
  personality_events.54.title: "Випадковий комплімент"
  personality_events.54.desc: "Під час бенкету [target_ruler.GetName] вступив у дискусію про їжу та солодкі делікатеси. Хоча більшість учасників залишалися непохитними у своїй оцінці, обговорюючи переваги місцевої кухні, [ROOT.GetCountry.GetGovernment.GetRulerTitle] зробив незграбну заяву, коли [target_ruler.GetSheHe] проговорився [target_ruler.GetHerHis] думкою, що [SCOPE.sCountry('cool_neighbor_country').GetName] має найкращі сирні тарілки, а наші порівняно абсолютно несмачні!'\n\nХоча наш шеф-кухар був глибоко ображений, [SCOPE.sCountry('cool_neighbor_country').GetGovernment.GetRulerTitle] [SCOPE.sCountry('cool_neighbor_country').GetName], [cool_ruler.GetName], мабуть, мав шпигунів на заході, оскільки один з [cool_ruler.GetHerHis] емісарів пізніше доставив нам великий ящик сиру, абсолютно безкоштовно."
  personality_events.54.a: "О, цей неуважний [target_ruler.GetNameWithNoTooltip]!"
  personality_events.55.title: "Найкращі з [ROOT.GetCountry.GetNameWithNoTooltip]"
  personality_events.55.desc: "Для армій нашого великого [ROOT.GetCountry.GetFlavorRank] підійдуть лише найкращі [ROOT.GetCountry.GetAdjective] солдати! [target_ruler.GetName] провів багато безсонних ночей, розмірковуючи про майбутнє нашої армії, і дійшов висновку, що нам потрібно встановити вищі стандарти. Хоча кількість доступних чоловіків, безумовно, зменшиться, ми могли б очікувати більшого від наших солдатів у бою."
  personality_events.55.a: "Справді, ми матимемо якість, а не кількість!"
  personality_events.55.b: "Ми не можемо дозволити собі відмовляти працездатним чоловікам."
  personality_events.56.title: "Поради раднику"
  personality_events.56.desc: "Усім відомо, що наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] не надто популярний серед членів [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Хоча більшість людей терплять [target_ruler.GetHerHis] мстиву вдачу, ймовірно, через страх перед будь-якою іншою поведінкою, один радник нещодавно мав не одну суперечку з нашим правителем. Непереконливо стверджуючи, що 'це суто бізнес', [target_advisor.GetName] тепер погрожує покинути двір. Однак існує мова, яку розуміють усі адміністратори..."
  personality_events.56.a: "Нехай говорять наші гроші."
  personality_events.56.b: "Нам не потрібен [target_advisor.GetNameWithNoTooltip]."
  personality_events.57.t: "Комплекс неповноцінності спорядження"
  personality_events.57.desc: "[target_ruler.GetName] постійний страх, недооцінка та параноя щодо можливостей нашої армії порівняно з нашими 'спраглими до експансії' сусідами почали впливати на наших офіцерів.\n\nРаптом уся армія перебуває в поганому настрої, вважаючи, що якщо ми не отримаємо партію найновішої, найблискучішої, найдорожчої зброї на континенті, нас повністю поглинуть ті, хто межує з нами."
  personality_events.57.a: "Будь-що заради спокою."
  personality_events.57.b: "Нам не потрібне надлишкове спорядження."
  personality_events.58.t: "Сусідній тактичний геній"
  personality_events.58.desc: "[target_ruler.GetName] з [target_origin_country.GetName] нещодавно опублікував книгу про війну, якій необережно дозволили вийти за межі [target_origin_country.GetAdjectiveWithNoTooltip] кордонів. Хоча [target_origin_country.GetAdjectiveWithNoTooltip] тактиці традиційно не довіряли в нашому [ROOT.GetCountry.GetFlavorRank], книга дала нашим головним генералам нові ідеї, які, як вони стверджують, можуть бути включені до наших власних армій."
  personality_events.58.a: "Візьмімо найкращі ідеї для себе."
  personality_events.58.a.tt: "Ми отримали #G 5#! [Concept('army_tradition', 'CONCEPT_PLACEHOLDER')|e]."