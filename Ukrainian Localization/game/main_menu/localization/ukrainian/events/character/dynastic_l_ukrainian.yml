  dynastic.21.b: "Потішити одного з лордів історією з дитинства."
  dynastic.23.title: "З усіма."
  dynastic.23.desc: "Кількість інших синів"
  dynastic.23.a: "Наслідки наших дій"
  dynastic.23.b: "Здається, гуляння, якими нещодавно насолоджувався [ruler_char.GetName], не минули без наслідків, оскільки зустріч [ruler_char.GetHerHis] з [hookup_char.GetName] призвела до народження дитини. Тепер постає питання, як [ROOT.GetCountry.GetGovernment.GetCourtTitle] прийме [target_child.GetName]."
  dynastic.24.title: "Тепер усі знають про цю помилку."
  dynastic.24.desc: "Це, очевидно, [target_child.GetDaughterSon] [ROOT.GetCountry.GetGovernment.GetConsort.GetNameWithNoTooltip]."
  dynastic.24.a: "Що ми можемо зробити?"
  dynastic.24.b: "[target_child.GetNameWithNoTooltip|U] Захворів"
  dynastic.25.title: "[target_child.GetName|U] важко дихає. [target_child.GetHeSheFormal|U] лежить у ліжку вже три дні, і в краплях поту на [target_child.GetHerHis] чолі відбивається страх в очах [target_child.GetHerHis] доглядача за [target_child.GetHerHis] життя. [target_child.GetShortNameWithNoTooltip|U] може не пережити ніч, якщо нічого не зробити."
  dynastic.25.desc: "Послати за досвідченим медиком."
  opinion_dynastic_love: "Привести медика, навченого в Школі [target_location.GetNameWithNoTooltip]."
  dynastic.25.a: "Молитися за [target_child.GetHisHer] життя."
  opinion_dynastic_witchcraft: "Дитина в очереті"
  dynastic.25.b: "Раптом щось лякає тварину, і перш ніж [ROOT.GetCountry.GetGovernment.GetRulerTitle] встигає вистрілити, вона вже давно зникла. [ruler_char.GetSheHe|U] озирається. Вода в маленькому струмку відбиває сонячне світло ідеального дня, а очерет повільно колишеться від легкого вітерця. Чи це сміх? [ruler_char.GetSheHe|U] тепер розуміє, що налякало тварину. У колисці, що пливе серед очерету, лежить усміхнений маленький хлопчик. Судячи з його посмішки, можна сказати, що він ніколи в житті не знав страху."
  dynastic.26.title: "Усиновити його як власного [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  dynastic.26.desc: "Куди подівся той олень?"
  opinion_dynastic_united: "Лицарський турнір"
  dynastic.26.a: "Горді прапори [ROOT.GetCountry.GetName] майорять на вітрі, і позолочені труби грають чотири салюти, вшановуючи кінну еліту [ROOT.GetCountry.GetFlavorRank]. Повітря наповнене запахами смаженого мигдалю, коней та інтриг. Культурна та військова перевага [ROOT.GetCountry.GetAdjectiveWithNoTooltip] є справді великими благами, і ніде цей факт не є настільки реальним, як тут сьогодні."
  opinion_dynastic_refused: "Подивитися на герць [ROOT.GetCountry.GetGovernment.GetHeir.GetShortNameWithNoTooltip]."
  dynastic.26.b: "Хвалитися художніми досягненнями [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip]."
  dynastic.27.title: "Просто насолоджуватися днем."
  dynastic.27.desc: "Нещасний випадок на полюванні"
  dynastic.27.a: "[heir_char.GetHerHis|U] тіло було накрите, ким — ніхто не знає, білою тканиною, тепер заплямованою червоним від [heir_char.GetHerHis] втраченої життєвої сили. Кажуть, [heir_char.GetSheHe] знайшов [heir_char.GetHerHis] кінь на галявині в лісі. Ми знаємо місце, про яке вони говорять. [heir_char.GetHerHis|U] обличчя спокійне, майже безтурботне. Придворні простягають руки, щоб доторкнутися. Жахлива реальність ситуації доходить до всіх. Холод, який відчувають усі, — це холод смерті."
  dynastic.27.b: "[heir_char.GetName] помер"
  dynastic.28.title: "Смуток охоплює [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  dynastic.28.desc: "Сімейна таємниця?"
  dynastic.28.a: "Вперше [ruler_char.GetDynasty.GetName] відмахнувся, але коли це трапляється вдруге і втретє, починаєш замислюватися. Чому люди сміються, коли думають, що їх ніхто не чує? Після деякого розслідування, відповідь нарешті отримують від покоївки. Виявляється, [heir_char.GetShortName] бігав містом у вельми нехристиянський спосіб, і тепер [ROOT.GetCountry.GetGovernment.GetAdjective] родина стає посміховиськом [ROOT.GetCountry.GetCapital.GetProvince.GetContinent.GetName]."
  dynastic.28.b: "Публічно висварити [heir_char.GetHerHim]."
  dynastic.29.title: "[ruler_char.GetDynasty.GetNameWithNoTooltip] не переймаються такими дрібницями."
  dynastic.29.desc: "Слава [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]"
  dynastic.29.a: "Вчені виявили стародавні документи, що простежують спадщину династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] до самого Юлія Цезаря. Це необхідно використати на нашу користь."
  dynastic.29.b: "Використати це для зміцнення престолу."
  dynastic.30.title: "Опублікувати знання за кордоном."
  dynastic.30.desc: "[ruler_char.GetDynasty.GetNameWithNoTooltip]"
  dynastic.30.a: "В іншій країні інша гілка родини [ruler_char.GetDynasty.GetName] перебуває у скрутному становищі. З дестабілізованою країною, [other_ruler_char.GetName] тепер бореться за збереження влади. Якщо ми не допоможемо [other_ruler_char.GetHerHim] зараз, ситуація [other_ruler_char.GetHerHis] може значно погіршитися."