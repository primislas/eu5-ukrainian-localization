l_english:
  dynastic.1.title: "Гріхи плоті"
  dynastic.1.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] зачарований [Select_CString(devil_char.IsFemale, 'підступною спокусницею', 'підступним спокусником')], чия постать переслідує #L [ROOT.GetCountry.GetGovernment.GetAdjective]і#! зали вдень і сни [ROOT.GetCountry.GetGovernment.GetRulerTitle] вночі. Спокуса стає надто великою для [ruler_char.GetHerHim], але врешті-решт лише доля може вирішити, чи доведеться [ruler_char.GetShortName] шукати цієї неділі прощення лише за гріховні думки..."
  dynastic.1.a: "Потреба в новому [ROOT.GetCountry.GetGovernment.GetHeirTitle] важливіша за відпущення гріхів."
  dynastic.1.b: "Вона йде стежкою Диявола."
  dynastic.2.title: "Помирає улюблений [ROOT.GetCountry.GetGovernment.GetHeirTitle]"
  dynastic.2.desc: "Дивна лихоманка забрала життя улюбленого [ROOT.GetCountry.GetGovernment.GetHeirTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Коли [ROOT.GetCountry.GetGovernment.GetCourtTitle] міняє свій одяг на чорніші шати, всіх вражає, наскільки крихким і минущим може бути життя."
  dynastic.2.a: "Шукати розради в обіймах Господа."
  dynastic.3.title: "Палацовий переворот"
  dynastic.3.desc: "Меч [heir_char.GetShortName] вилітає з піхов; лезо скероване на [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Зробивши нарешті [heir_char.GetHerHis] хід проти трону, який на [heir_char.GetSheHe] думку давно був погано керований, [heir_char.GetShortNameWithNoTooltip] нервово дивиться на [heir_char.GetHerHis] співзмовників. Весь цей час потойбічне відчуття втоми охоплює [ROOT.GetCountry.GetGovernment.GetRulerTitle], який знає, що безболісного вирішення цієї кризи бути не може."
