l_english:
  dynastic.1.title: "THOUGHT"
  dynastic.1.desc: "The user wants English game script lines translated into Ukrainian."
  dynastic.1.a: "I need to follow all the rules:"
  dynastic.1.b: "- One-to-one mapping: 1 input line -> 1 output line."
  dynastic.2.title: "- Variable preservation: Keep `[square brackets]`, `$USD$`, `#L`, `#1`, `\\n` exactly as they are."
  dynastic.2.desc: "- Historical Tone: Formal, archaic, \"chronicle\" flair for narrative; modern technical for UI/mechanics."
  dynastic.2.a: "- Specific Terms: \"placeholder\" -> \"заповнювач\"."
  dynastic.3.title: "- Geographic/Names: Modern standard Ukrainian."
  dynastic.3.desc: "- Low-Confidence Flagging: `POSTEDIT_` for uncertain proper nouns."
  dynastic.3.a: "- Format: Plain text output only."
  dynastic.3.b: ""
  dynastic.4.title: "Let's go line by line."
  dynastic.4.desc: ""
  dynastic.4.a: "1.  **Carnal Sins**"
  dynastic.4.b: "    *   \"Carnal Sins\" - \"Гріхи плоті\" or \"Тілесні гріхи\". \"Гріхи плоті\" sounds more archaic/formal."
  dynastic.5.title: "    *   Output: Гріхи плоті"
  dynastic.5.desc: ""
  dynastic.5.a: "2.  **The [ROOT.GetCountry.GetGovernment.GetRulerTitle] has found [ruler_char.GetHerselfHimself] entranced by a certain [devil_char.GetName] whose figure haunts the [ROOT.GetCountry.GetGovernment.GetAdjective] halls by day and the [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s dreams by night. The temptation is becoming too much for [ruler_char.GetHerHim] to bear, but in the end, only fate can decide whether [ruler_char.GetShortName] will have to seek forgiveness for more than thoughts this Sunday.**"
  dynastic.5.b: "    *   \"[ROOT.GetCountry.GetGovernment.GetRulerTitle]\" - variable, keep."
  dynastic.5.c: "    *   \"has found [ruler_char.GetHerselfHimself] entranced by a certain [devil_char.GetName]\" - \"виявив [ruler_char.GetHerselfHimself] зачарованим певною [devil_char.GetName]\"."
  dynastic.6.title: "    *   \"whose figure haunts the [ROOT.GetCountry.GetGovernment.GetAdjective] halls by day and the [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s dreams by night.\" - \"чиї обриси переслідують [ROOT.GetCountry.GetGovernment.GetAdjective] зали вдень і сни [ROOT.GetCountry.GetGovernment.GetRulerTitle] вночі.\""
  dynastic_lires: "    *   \"The temptation is becoming too much for [ruler_char.GetHerHim] to bear\" - \"Спокуса стає надто великою для [ruler_char.GetHerHim], щоб витримати\"."
  dynastic_violins: "    *   \"but in the end, only fate can decide whether [ruler_char.GetShortName] will have to seek forgiveness for more than thoughts this Sunday.\" - \"але врешті-решт, лише доля може вирішити, чи доведеться [ruler_char.GetShortName] шукати прощення за щось більше, ніж думки, цієї неділі.\""
  dynastic.6.desc: "    *   Combine: [ROOT.GetCountry.GetGovernment.GetRulerTitle] виявив [ruler_char.GetHerselfHimself] зачарованим певною [devil_char.GetName], чиї обриси переслідують [ROOT.GetCountry.GetGovernment.GetAdjective] зали вдень і сни [ROOT.GetCountry.GetGovernment.GetRulerTitle] вночі. Спокуса стає надто великою для [ruler_char.GetHerHim], щоб витримати, але врешті-решт, лише доля може вирішити, чи доведеться [ruler_char.GetShortName] шукати прощення за щось більше, ніж думки, цієї неділі."
  dynastic.6.a: "    *   Output: [ROOT.GetCountry.GetGovernment.GetRulerTitle] виявив [ruler_char.GetHerselfHimself] зачарованим певною [devil_char.GetName], чиї обриси переслідують [ROOT.GetCountry.GetGovernment.GetAdjective] зали вдень і сни [ROOT.GetCountry.GetGovernment.GetRulerTitle] вночі. Спокуса стає надто великою для [ruler_char.GetHerHim], щоб витримати, але врешті-решт, лише доля може вирішити, чи доведеться [ruler_char.GetShortName] шукати прощення за щось більше, ніж думки, цієї неділі."
  dynastic.6.b: ""
  dynastic.6.c: "3.  **The need for a new [ROOT.GetCountry.GetGovernment.GetHeirTitle] goes before the need for absolution.**"
  other_sons: "    *   \"The need for a new [ROOT.GetCountry.GetGovernment.GetHeirTitle]\" - \"Потреба в новому [ROOT.GetCountry.GetGovernment.GetHeirTitle]\"."
  dynastic.6001.title: "    *   \"goes before the need for absolution.\" - \"передує потребі в відпущенні гріхів.\" (Absolution is a religious term, \"відпущення гріхів\" is appropriate)."
  dynastic.6001.desc: "    *   Output: Потреба в новому [ROOT.GetCountry.GetGovernment.GetHeirTitle] передує потребі в відпущенні гріхів."
  dynastic.6001.a: ""
  dynastic.6001.b: "4.  **The path she walks is the Devil's.**"
  dynastic.6001.c: "    *   \"The path she walks\" - \"Шлях, яким вона йде\"."
  dynastic.7.title: "    *   \"is the Devil's.\" - \"є диявольським.\""
  dynastic.7.desc: "    *   Output: Шлях, яким вона йде, є диявольським."
  dynastic.7.a: ""
  dynastic.7.b: "5.  **A Beloved [ROOT.GetCountry.GetGovernment.GetHeirTitle] Dies**"
  dynastic.7.c: "    *   \"A Beloved [ROOT.GetCountry.GetGovernment.GetHeirTitle]\" - \"Улюблений [ROOT.GetCountry.GetGovernment.GetHeirTitle]\"."
  dynastic.8.title: "    *   \"Dies\" - \"Помирає\"."
  dynastic.8.desc: "    *   Output: Улюблений [ROOT.GetCountry.GetGovernment.GetHeirTitle] помирає"
  dynastic.8.a: ""
  dynastic.8.b: "6.  **A strange fever has claimed the life of the [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s beloved [ROOT.GetCountry.GetGovernment.GetHeirTitle]. As the [ROOT.GetCountry.GetGovernment.GetCourtTitle] sheds its clothes for blacker garments, it strikes all what a frail and transient thing life can be.**"
  dynastic.9.title: "    *   \"A strange fever has claimed the life of the [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s beloved [ROOT.GetCountry.GetGovernment.GetHeirTitle].\" - \"Дивна лихоманка забрала життя улюбленого [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s [ROOT.GetCountry.GetGovernment.GetHeirTitle].\" (Or \"улюбленого [ROOT.GetCountry.GetGovernment.GetHeirTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle]\"). Let's use \"улюбленого [ROOT.GetCountry.GetGovernment.GetHeirTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle]\"."
  dynastic.9.desc: "    *   \"As the [ROOT.GetCountry.GetGovernment.GetCourtTitle] sheds its clothes for blacker garments\" - \"Коли [ROOT.GetCountry.GetGovernment.GetCourtTitle] змінює свій одяг на темніший\"."
  dynastic.9.a: "    *   \"it strikes all what a frail and transient thing life can be.\" - \"усіх вражає, наскільки крихким і минущим може бути життя.\""
  dynastic.9.b: "    *   Combine: Дивна лихоманка забрала життя улюбленого [ROOT.GetCountry.GetGovernment.GetHeirTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Коли [ROOT.GetCountry.GetGovernment.GetCourtTitle] змінює свій одяг на темніший, усіх вражає, наскільки крихким і минущим може бути життя."
  dynastic.9.c: "    *   Output: Дивна лихоманка забрала життя улюбленого [ROOT.GetCountry.GetGovernment.GetHeirTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Коли [ROOT.GetCountry.GetGovernment.GetCourtTitle] змінює свій одяг на темніший, усіх вражає, наскільки крихким і минущим може бути життя."
  dynastic.10.title: ""
  dynastic.10.desc: "7.  **One must find solace in the arms of the Lord.**"
  dynastic_10_a_helper: "    *   \"One must find solace\" - \"Треба шукати розради\"."
  dynastic.10.a: "    *   \"in the arms of the Lord.\" - \"в обіймах Господа.\""
  dynastic.11.title: "    *   Output: Треба шукати розради в обіймах Господа."
  dynastic.11.desc: ""
  dynastic.11.a: "8.  **Palace Coup**"
  dynastic.11.b: "    *   \"Palace Coup\" - \"Палацовий переворот\"."
  dynastic.12.title: "    *   Output: Палацовий переворот"
  dynastic.12.desc: ""
  dynastic.12.a: "9.  **[heir_char.GetShortName]'s sword sweeps out from its sheath; the blade now pointing squarely towards the [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Having finally made [heir_char.GetHerHis] move against the throne, which [heir_char.GetSheHe] believes to have long been mismanaged, [heir_char.GetShortNameWithNoTooltip] looks nervously at [heir_char.GetHerHis] co-conspirators. All the while, an other-worldly sense of fatigue washes over the [ROOT.GetCountry.GetGovernment.GetRulerTitle] who knows there can be no painless solution to this crisis.**"
  dynastic.12.b: "    *   \"[heir_char.GetShortName]'s sword sweeps out from its sheath\" - \"Меч [heir_char.GetShortName] вилітає з піхов\"."
  dynastic.13.title: "    *   \"the blade now pointing squarely towards the [ROOT.GetCountry.GetGovernment.GetRulerTitle].\" - \"лезо тепер прямо спрямоване на [ROOT.GetCountry.GetGovernment.GetRulerTitle].\""
  dynastic.13.desc: "    *   \"Having finally made [heir_char.GetHerHis] move against the throne, which [heir_char.GetSheHe] believes to have long been mismanaged\" - \"Зробивши нарешті [heir_char.GetHerHis] крок проти трону, який, на думку [heir_char.GetSheHe], давно був погано керований\"."
  dynastic.13.a: "    *   \"[heir_char.GetShortNameWithNoTooltip] looks nervously at [heir_char.GetHerHis] co-conspirators.\" - \"[heir_char.GetShortNameWithNoTooltip] нервово дивиться на [heir_char.GetHerHis] співзмовників.\""
  opinion_dynastic_helper: "    *   \"All the while, an other-worldly sense of fatigue washes over the [ROOT.GetCountry.GetGovernment.GetRulerTitle] who knows there can be no painless solution to this crisis.\" - \"Весь цей час неземне відчуття втоми охоплює [ROOT.GetCountry.GetGovernment.GetRulerTitle], який знає, що безболісного вирішення цієї кризи бути не може.\""
  dynastic.13.b: "    *   Combine: Меч [heir_char.GetShortName] вилітає з піхов; лезо тепер прямо спрямоване на [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Зробивши нарешті [heir_char.GetHerHis] крок проти трону, який, на думку [heir_char.GetSheHe], давно був погано керований, [heir_char.GetShortNameWithNoTooltip] нервово дивиться на [heir_char.GetHerHis] співзмовників. Весь цей час неземне відчуття втоми охоплює [ROOT.GetCountry.GetGovernment.GetRulerTitle], який знає, що безболісного вирішення цієї кризи бути не може."
  dynastic.14.title: "    *   Output: Меч [heir_char.GetShortName] вилітає з піхов; лезо тепер прямо спрямоване на [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Зробивши нарешті [heir_char.GetHerHis] крок проти трону, який, на думку [heir_char.GetSheHe], давно був погано керований, [heir_char.GetShortNameWithNoTooltip] нервово дивиться на [heir_char.GetHerHis] співзмовників. Весь цей час неземне відчуття втоми охоплює [ROOT.GetCountry.GetGovernment.GetRulerTitle], який знає, що безболісного вирішення цієї кризи бути не може."
  dynastic.14.desc: ""
  dynastic.14.a: "10. **[ruler_char.GetShortNameWithNoTooltip] does feel quite old.**"
  dynastic.14.a.nickname: "    *   \"[ruler_char.GetShortNameWithNoTooltip] does feel quite old.\" - \"[ruler_char.GetShortNameWithNoTooltip] почувається досить старим.\""
  dynastic.14.b: "    *   Output: [ruler_char.GetShortNameWithNoTooltip] почувається досить старим."
  dynastic.14.b.nickname: ""
  opinion_ignore_dynasty: "11. **[heir_char.GetShortNameWithNoTooltip], that spoiled little runt!**"
  dynastic.17.title: "    *   \"[heir_char.GetShortNameWithNoTooltip], that spoiled little runt!\" - \"[heir_char.GetShortNameWithNoTooltip], цей розпещений малий виродок!\" (Runt can be \"виродок\" or \"недоносок\", \"виродок\" sounds more aggressive/insulting)."
  dynastic.17.desc: "    *   Output: [heir_char.GetShortNameWithNoTooltip], цей розпещений малий виродок!"
  dynastic.17.a: ""
  dynastic.18.title: "12. **The Weeping Song**"
  dynastic.18.desc: "    *   \"The Weeping Song\" - \"Плачлива пісня\" або \"Пісня плачу\". \"Пісня плачу\" sounds more poetic/archaic."
  dynastic.18.a: "    *   Output: Пісня плачу"
  dynastic.19.title: ""
  dynastic.19.desc: "13. **The war has taken a heavy toll upon the mothers and wives of the [ROOT.GetCountry.GetFlavorRank], and as the [ROOT.GetCountry.GetGovernment.GetRulerTitle] and [ROOT.GetCountry.GetGovernment.GetHeirTitle] pass a ragged old widow where she sits, her face buried deep in her palmed hands, the [ROOT.GetCountry.GetGovernment.GetHeirTitle] asks why all the women are weeping.**"
  dynastic.19.a: "    *   \"The war has taken a heavy toll upon the mothers and wives of the [ROOT.GetCountry.GetFlavorRank]\" - \"Війна сильно позначилася на матерях і дружинах [ROOT.GetCountry.GetFlavorRank]\"."
  dynastic.19.b: "    *   \"and as the [ROOT.GetCountry.GetGovernment.GetRulerTitle] and [ROOT.GetCountry.GetGovernment.GetHeirTitle] pass a ragged old widow where she sits, her face buried deep in her palmed hands\" - \"і коли [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [ROOT.GetCountry.GetGovernment.GetHeirTitle] проходять повз обірвану стару вдову, що сидить, зануривши обличчя глибоко в долоні\"."
  dynastic.20.title: "    *   \"the [ROOT.GetCountry.GetGovernment.GetHeirTitle] asks why all the women are weeping.\" - \"[ROOT.GetCountry.GetGovernment.GetHeirTitle] запитує, чому всі жінки плачуть.\""
  dynastic.20.desc: "    *   Combine: Війна сильно позначилася на матерях і дружинах [ROOT.GetCountry.GetFlavorRank], і коли [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [ROOT.GetCountry.GetGovernment.GetHeirTitle] проходять повз обірвану стару вдову, що сидить, зануривши обличчя глибоко в долоні, [ROOT.GetCountry.GetGovernment.GetHeirTitle] запитує, чому всі жінки плачуть."
  dynastic.20.a: "    *   Output: Війна сильно позначилася на матерях і дружинах [ROOT.GetCountry.GetFlavorRank], і коли [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [ROOT.GetCountry.GetGovernment.GetHeirTitle] проходять повз обірвану стару вдову, що сидить, зануривши обличчя глибоко в долоні, [ROOT.GetCountry.GetGovernment.GetHeirTitle] запитує, чому всі жінки плачуть."
  dynastic.20.b: ""
  dynastic.21.title: "14. **They are all weeping for their men.**"
  dynastic.21.desc: "    *   \"They are all weeping for their men.\" - \"Вони всі плачуть за своїми чоловіками.\""
  dynastic.21.a: "    *   Output: Вони всі плачуть за своїми чоловіками."
  dynastic.21.b: ""
  dynastic.23.title: "15. **They are merely crying.**"
  dynastic.23.desc: "    *   \"They are merely crying.\" - \"Вони просто плачуть.\""
  dynastic.23.a: "    *   Output: Вони просто плачуть."
  dynastic.23.b: ""
  dynastic.24.title: "16. **A Silent Spring**"
  dynastic.24.desc: "    *   \"A Silent Spring\" - \"Тиха весна\"."
  dynastic.24.a: "    *   Output: Тиха весна"
  dynastic.24.b: ""
  dynastic.25.title: "17. **The [ROOT.GetCountry.GetGovernment.GetRulerTitle] looks at her laying patiently before [ruler_char.GetHerHim], finding a beauty unmatched in all of [ROOT.GetCountry.GetName] and even in realms beyond. [ruler_char.GetSheHe|U] says nothing. Spring is in the air, and as [ruler_char.GetSheHe] leans in toward her, with the intoxicating scent of her perfume painfully present, a thought crosses [ruler_char.GetHerHis] mind.**"
  dynastic.25.desc: "    *   \"The [ROOT.GetCountry.GetGovernment.GetRulerTitle] looks at her laying patiently before [ruler_char.GetHerHim]\" - \"[ROOT.GetCountry.GetGovernment.GetRulerTitle] дивиться на неї, що терпляче лежить перед [ruler_char.GetHerHim]\"."
  opinion_dynastic_love: "    *   \"finding a beauty unmatched in all of [ROOT.GetCountry.GetName] and even in realms beyond.\" - \"знаходячи красу, неперевершену в усьому [ROOT.GetCountry.GetName] і навіть у світах за його межами.\""
  dynastic.25.a: "    *   \"[ruler_char.GetSheHe|U] says nothing.\" - \"[ruler_char.GetSheHe|U] нічого не каже.\""
  opinion_dynastic_witchcraft: "    *   \"Spring is in the air\" - \"Весна витає в повітрі\"."
  dynastic.25.b: "    *   \"and as [ruler_char.GetSheHe] leans in toward her, with the intoxicating scent of her perfume painfully present\" - \"і коли [ruler_char.GetSheHe] нахиляється до неї, з болісно відчутним п'янким ароматом її парфумів\"."
  dynastic.26.title: "    *   \"a thought crosses [ruler_char.GetHerHis] mind.\" - \"думка пронизує [ruler_char.GetHerHis] розум.\""
  dynastic.26.desc: "    *   Combine: [ROOT.GetCountry.GetGovernment.GetRulerTitle] дивиться на неї, що терпляче лежить перед [ruler_char.GetHerHim], знаходячи красу, неперевершену в усьому [ROOT.GetCountry.GetName] і навіть у світах за його межами. [ruler_char.GetSheHe|U] нічого не каже. Весна витає в повітрі, і коли [ruler_char.GetSheHe] нахиляється до неї, з болісно відчутним п'янким ароматом її парфумів, думка пронизує [ruler_char.GetHerHis] розум."
  opinion_dynastic_united: "    *   Output: [ROOT.GetCountry.GetGovernment.GetRulerTitle] дивиться на неї, що терпляче лежить перед [ruler_char.GetHerHim], знаходячи красу, неперевершену в усьому [ROOT.GetCountry.GetName] і навіть у світах за його межами. [ruler_char.GetSheHe|U] нічого не каже. Весна витає в повітрі, і коли [ruler_char.GetSheHe] нахиляється до неї, з болісно відчутним п'янким ароматом її парфумів, думка пронизує [ruler_char.GetHerHis] розум."
  dynastic.26.a: ""
  opinion_dynastic_refused: "18. **Make [young_female.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetConsortTitle].**"
  dynastic.26.b: "    *   \"Make [young_female.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetConsortTitle].\" - \"Зробити [young_female.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetConsortTitle].\""
  dynastic.27.title: "    *   Output: Зробити [young_female.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetConsortTitle]."
  dynastic.27.desc: ""
  dynastic.27.a: "19. **Or a bargaining chip?**"
  dynastic.27.b: "    *   \"Or a bargaining chip?\" - \"Чи розмінна монета?\""
  dynastic.28.title: "    *   Output: Чи розмінна монета?"
  dynastic.28.desc: ""
  dynastic.28.a: "20. **Spring never lasts...**"
  dynastic.28.b: "    *   \"Spring never lasts...\" - \"Весна ніколи не триває вічно...\""
  dynastic.29.title: "    *   Output: Весна ніколи не триває вічно..."
  dynastic.29.desc: ""
  dynastic.29.a: "21. **Soirée**"
  dynastic.29.b: "    *   \"Soirée\" - \"Вечірка\" або \"Світський вечір\". \"Світський вечір\" sounds more formal/historical."
  dynastic.30.title: "    *   Output: Світський вечір"
  dynastic.30.desc: ""
  dynastic.30.a: "22. **lyres**"