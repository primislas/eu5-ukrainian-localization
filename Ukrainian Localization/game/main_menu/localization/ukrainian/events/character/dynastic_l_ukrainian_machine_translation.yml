l_english:
  dynastic.1.title: "THOUGHT"
  dynastic.1.desc: "The user wants English game script lines translated into Ukrainian."
  dynastic.1.a: "I need to follow all the rules:"
  dynastic.1.b: "- One-to-one mapping: 1 input line = 1 output line."
  dynastic.2.title: "- Variable preservation: Keep `[...], $...$, #L, #1` exactly as they are."
  dynastic.2.desc: "- Historical Tone: Formal, archaic, \"chronicle\" flair for narrative; modern for UI/mechanics."
  dynastic.2.a: "- Specific Terms: \"placeholder\" -> \"заповнювач\". Geographic/names -> modern Ukrainian."
  dynastic.3.title: "- Low-Confidence Flagging: `POSTEDIT_` for uncertain proper nouns."
  dynastic.3.desc: "- Format: Plain text output only."
  dynastic.3.a: ""
  dynastic.3.b: "Let's go line by line."
  dynastic.4.title: ""
  dynastic.4.desc: "1.  **Carnal Sins**"
  dynastic.4.a: "    *   \"Carnal Sins\" -> \"Гріхи плоті\" or \"Тілесні гріхи\". \"Гріхи плоті\" sounds more archaic/formal."
  dynastic.4.b: ""
  dynastic.5.title: "2.  **The [ROOT.GetCountry.GetGovernment.GetRulerTitle] has found [ruler_char.GetHerselfHimself] entranced by a certain [devil_char.GetName] whose figure haunts the [ROOT.GetCountry.GetGovernment.GetAdjective] halls by day and the [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s dreams by night. The temptation is becoming too much for [ruler_char.GetHerHim] to bear, but in the end, only fate can decide whether [ruler_char.GetShortName] will have to seek forgiveness for more than thoughts this Sunday.**"
  dynastic.5.desc: "    *   \"[ROOT.GetCountry.GetGovernment.GetRulerTitle] has found [ruler_char.GetHerselfHimself] entranced by a certain [devil_char.GetName]\" -> \"[ROOT.GetCountry.GetGovernment.GetRulerTitle] виявив [ruler_char.GetHerselfHimself] зачарованим певним [devil_char.GetName]\" (or \"зачарованою\")."
  dynastic.5.a: "    *   \"whose figure haunts the [ROOT.GetCountry.GetGovernment.GetAdjective] halls by day and the [ROOT.GetCountry.GetGovernment.GetRulerTitle]'s dreams by night.\" -> \"чиї обриси переслідують [ROOT.GetCountry.GetGovernment.GetAdjective] зали вдень і сни [ROOT.GetCountry.GetGovernment.GetRulerTitle] вночі.\""
  dynastic.5.b: "    *   \"The temptation is becoming too much for [ruler_char.GetHerHim] to bear\" -> \"Спокуса стає надто великою для [ruler_char.GetHerHim], щоб її витримати\" (or \"винести\")."
  dynastic.5.c: "    *   \"but in the end, only fate can decide whether [ruler_char.GetShortName] will have to seek forgiveness for more than thoughts this Sunday.\" -> \"але врешті-решт, лише доля може вирішити, чи доведеться [ruler_char.GetShortName] шукати прощення за щось більше, ніж думки цієї неділі.\""
  dynastic.6.title: "    *   Combine: \" [ROOT.GetCountry.GetGovernment.GetRulerTitle] виявив [ruler_char.GetHerselfHimself] зачарованим певним [devil_char.GetName], чиї обриси переслідують [ROOT.GetCountry.GetGovernment.GetAdjective] зали вдень і сни [ROOT.GetCountry.GetGovernment.GetRulerTitle] вночі. Спокуса стає надто великою для [ruler_char.GetHerHim], щоб її витримати, але врешті-решт, лише доля може вирішити, чи доведеться [ruler_char.GetShortName] шукати прощення за щось більше, ніж думки цієї неділі.\""
  dynastic_lires: ""
  dynastic_violins: "3.  **The need for a new [ROOT.GetCountry.GetGovernment.GetHeirTitle] goes before the need for absolution.**"
  dynastic.6.desc: "    *   \"The need for a new [ROOT.GetCountry.GetGovernment.GetHeirTitle] goes before the need for absolution.\" -> \"Потреба в новому [ROOT.GetCountry.GetGovernment.GetHeirTitle] передує потребі в відпущенні гріхів.\" (or \"абсолюції\" but \"відпущенні гріхів\" is more common/archaic)."
  dynastic.6.a: ""
  dynastic.6.b: "Потішити одного з лордів історією з дитинства."
  dynastic.6.c: "З усіма."
  other_sons: "Кількість інших синів"
  dynastic.6001.title: "Наслідки наших дій"
  dynastic.6001.desc: "Здається, гуляння, якими нещодавно насолоджувався [ruler_char.GetName], не минули без наслідків, оскільки зустріч [ruler_char.GetHerHis] з [hookup_char.GetName] призвела до народження дитини. Тепер постає питання, як [ROOT.GetCountry.GetGovernment.GetCourtTitle] прийме [target_child.GetName]."
  dynastic.6001.a: "Тепер усі знають про цю помилку."
  dynastic.6001.b: "Це, очевидно, [target_child.GetDaughterSon] [ROOT.GetCountry.GetGovernment.GetConsort.GetNameWithNoTooltip]."
  dynastic.6001.c: "Що ми можемо зробити?"
  dynastic.7.title: "[target_child.GetNameWithNoTooltip|U] Захворів"
  dynastic.7.desc: "[target_child.GetName|U] важко дихає. [target_child.GetHeSheFormal|U] лежить у ліжку вже три дні, і в краплях поту на [target_child.GetHerHis] чолі відбивається страх в очах [target_child.GetHerHis] доглядача за [target_child.GetHerHis] життя. [target_child.GetShortNameWithNoTooltip|U] може не пережити ніч, якщо нічого не зробити."
  dynastic.7.a: "Надіслати за кваліфікованим медиком."
  dynastic.7.b: "Привести медика, навченого в Школі [target_location.GetNameWithNoTooltip]."
  dynastic.7.c: "Молитися за [target_child.GetHisHer] життя."
  dynastic.8.title: "Дитина в очереті"
  dynastic.8.desc: "Раптом щось лякає тварину, і перш ніж [ROOT.GetCountry.GetGovernment.GetRulerTitle] встигає вистрілити, вона вже давно зникла. [ruler_char.GetSheHe|U] озирається. Вода в маленькому струмку відбиває сонячне світло ідеального дня, а очерет повільно колишеться від легкого вітерця. Чи це сміх? [ruler_char.GetSheHe|U] тепер розуміє, що налякало тварину. У колисці, що пливе серед очерету, лежить усміхнений маленький хлопчик. Судячи з його посмішки, можна сказати, що він ніколи в житті не знав страху."
  dynastic.8.a: "Усиновити його як власного [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  dynastic.8.b: "Куди подівся той олень?"
  dynastic.9.title: "Лицарський турнір"
  dynastic.9.desc: "Горді прапори [ROOT.GetCountry.GetName] майорять на вітрі, і позолочені труби грають чотири салюти, вшановуючи кінну еліту [ROOT.GetCountry.GetFlavorRank]. Повітря наповнене запахами смаженого мигдалю, коней та інтриг. [ROOT.GetCountry.GetAdjectiveWithNoTooltip] культурна та військова перевага є справді великими благами, і ніде цей факт не є таким реальним, як тут сьогодні."
  dynastic.9.a: "Спостерігати за двобоєм [ROOT.GetCountry.GetGovernment.GetHeir.GetShortNameWithNoTooltip]."
  dynastic.9.b: "Хвалитися [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] художніми досягненнями."
  dynastic.9.c: "Просто насолоджуватися днем."
  dynastic.10.title: "Нещасний випадок на полюванні"
  dynastic.10.desc: "[heir_char.GetHerHis|U] тіло було накрите, ким ніхто не знає, білою тканиною, тепер заплямованою червоним від [heir_char.GetHerHis] втраченої життєвої сили. Кажуть, [heir_char.GetSheHe] знайшли біля [heir_char.GetHerHis] коня, на галявині в лісі. Ми знаємо місце, про яке вони говорять. [heir_char.GetHerHis|U] обличчя спокійне, майже безтурботне. Придворні простягають руки, щоб доторкнутися. Жахлива реальність ситуації доходить до всіх. Холод, який відчувають усі, – це холод смерті."
  dynastic_10_a_helper: "[heir_char.GetName] помер"
  dynastic.10.a: "Смуток охоплює [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  dynastic.11.title: "Сімейна таємниця?"
  dynastic.11.desc: "Вперше [ruler_char.GetDynasty.GetName] відмахнувся від цього, але коли це стається вдруге і втретє, починаєш замислюватися. Чому люди сміються, коли думають, що їх ніхто не чує? Після деякого розслідування відповідь нарешті отримують від покоївки. Виявляється, [heir_char.GetShortName] бігав містом у вельми нехристиянський спосіб, і тепер [ROOT.GetCountry.GetGovernment.GetAdjective] родина стає посміховиськом [ROOT.GetCountry.GetCapital.GetProvince.GetContinent.GetName]."
  dynastic.11.a: "Публічно висварити [heir_char.GetHerHim]."
  dynastic.11.b: "[ruler_char.GetDynasty.GetNameWithNoTooltip] не переймаються такими дрібницями."
  dynastic.12.title: "Слава [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]"
  dynastic.12.desc: "Вчені виявили стародавні документи, що простежують спадщину династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] до самого Юлія Цезаря. Це потрібно використати на нашу користь."
  dynastic.12.a: "Використати це для зміцнення престолу."
  dynastic.12.b: "Опублікувати знання за кордоном."
  dynastic.13.title: "[ruler_char.GetDynasty.GetNameWithNoTooltip]"
  dynastic.13.desc: "В іншій країні інша гілка родини [ruler_char.GetDynasty.GetName] перебуває у скрутному становищі. З дестабілізованою країною [other_ruler_char.GetName] тепер намагається втриматися при владі. Якщо ми не допоможемо [other_ruler_char.GetHerHim] зараз, [other_ruler_char.GetHerHis] ситуація може значно погіршитися."
  dynastic.13.a: "Сім'я понад усе."
  opinion_dynastic_helper: "Допомогли нашій правлячій династії"
  dynastic.13.b: "Навіщо давати [other_ruler_char.GetHerHim] ще щось, щоб розтринькати?"
  dynastic.14.title: "Дім [ruler_char.GetDynasty.GetNameWithNoTooltip] похитнувся"
  dynastic.14.desc: "Здається, виникло непорозуміння щодо походження [disputee_char.GetMotherFather] [ruler_char.GetName]'s [target_parent.GetMotherFather]. Виявляється, справжнім батьком [disputee_char.GetName] був низькородний селянин з [ROOT.GetCountry.GetCapital.GetName]."
  dynastic.14.a: "Заперечувати це палко."
  dynastic.14.a.nickname: "Сумнівний"
  dynastic.14.b: "Визнати факт."
  dynastic.14.b.nickname: "Фальшивий"
  opinion_ignore_dynasty: "Ігнорували родину в біді"
  dynastic.17.title: "[ruler_char.GetDynasty.GetNameWithNoTooltip]"
  dynastic.17.desc: "Родина нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] у [dynasty_origin.GetName] надіслала нам допомогу в цей неспокійний час."
  dynastic.17.a: "[ruler_char.GetDynasty.GetNameWithNoTooltip] тримаються разом."
  dynastic.18.title: "[ruler_char.GetDynasty.GetNameWithNoTooltip]"
  dynastic.18.desc: "Рідні та близькі нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], його власна кров і плоть у [dynasty_origin.GetName], заявили, що не мають наміру приходити нам на допомогу в наш скрутний час. Нехай [ROOT.GetCountry.GetReligion.GetGodName] змилується над їхніми душами."
  dynastic.18.a: "Розділений дім не встоїть."
  dynastic.19.title: "Страх і огида в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  dynastic.19.desc: "Сутінки завжди жахливі. Хмари, що мчать колами по безмісячному небу, жорстокі зорі, підвішені, як уламки розбитого скла, і люстри, що кидають дивні тіні по [ROOT.GetCountry.GetGovernment.GetAdjective] палатах. Останнім часом на [ROOT.GetCountry.GetGovernment.GetRulerTitle] напало дивне відчуття, що з цим місцем щось не так. Його геометрія здається... хибною. Згадуючи... все почалося з народження [heir_char.GetName]."
  dynastic.19.a: "Господи [ROOT.GetCountry.GetReligion.GetGodName], Отче наш, що єси на небесах!"
  dynastic.19.b: "Тільки робота і ніяких розваг робить [ruler_char.GetShortNameWithNoTooltip] нудним хлопчиком"
  dynastic.20.title: "Відкриття"
  dynastic.20.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] миттєво відчуває, що щось не так у голосі служниці, коли вона покірно запитує про дивну стіну в [ROOT.GetCountry.GetGovernment.GetAdjective] замку. У її голосі щось є, прямо під поверхнею. Прихована зневага і страх.\n\n[ruler_char.GetSheHe|U] тепер чітко це пам'ятає. Яким маленьким здавалося тіло. Нести його до сирого льоху, класти цеглу. Це викликало у [ruler_char.GetHerHim] нудоту. Нудоту до глибини душі. Вбивство [ruler_char.GetHerHis] нащадка не було тим катарсисом, на який [ruler_char.GetSheHe] сподівався. На мить блискавичний спалах прозріння проноситься крізь розум [ruler_char.GetHerHis]..."
  dynastic.20.a: "Ось і [ruler_char.GetShortNameWithNoTooltip]!"
  dynastic.20.b: "Жахливо."
  dynastic.21.title: "Танець смерті"
  dynastic.21.desc: "Для [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetGovernment.GetAdjective] палата — це вируючий туман запахів і форм, що з'являються і зникають, як кольорові сніжинки. [ruler_char.GetSheHe|U] голодний. Дуже голодний. Ніби [ruler_char.GetSheHe] не їв місяцями. Зорі, що дивляться на [ruler_char.GetHerHim], все ще підвішені в безмісячному небі, сміються і танцюють. Вони здаються вільними і дикими. Є щось у цих зірках. Вони здаються такими... правильними. [ruler_char.GetSheHe|U] зовсім збожеволів."
  dynastic.21.a: "[ruler_char.GetShortNameWithNoTooltip] віддав би [ruler_char.GetHerHis] кляту душу за склянку пива."
  dynastic.21.b: "Не за волосся на [ruler_char.GetHerHis] підборідді!"
  dynastic.23.title: "Весільні дзвони"
  dynastic.23.desc: "Знову [advisor_char.GetShortName] перериває, [advisor_char.GetHerHis] нахмурені брови розповідають довгі історії про занепокоєння та безсонні ночі. [advisor_char.GetSheHe] безперестанку говорить про ті легковажні справи «спадкоємців» та «стабільних престолонаслідувань». Цей запилений старий кабінет і сухий голос радника, що резонує нудьгою та втраченим потенціалом, підкреслюють яскравість ясного дня за вікном. Чи [advisor_char.GetSheHe] коли-небудь зупиняється? Ніщо не могло переконати [bachelor_char.GetShortName], що шлюб кращий за обіцянку ясного неба. Зрештою, у природі перший крок, що веде тварину до могили, — це завжди розмноження."
  dynastic.23.a: "Природа завжди знаходить свій шлях."
  dynastic.23.b: "Запропонувати зіграти в шахи на веранді."
  dynastic.24.title: "Скромна пропозиція"
  dynastic.24.desc: "Хоча серед певного типу [bachelor_char.GetWomanMan] не є рідкістю бажання залишатися поза неминучими узами шлюбу, ці узи все ж неминучі. Дивлячись зі свого місця [ROOT.GetCountry.GetGovernment.GetRulerTitle], [ruler_char.GetSheHe] помічає [ruler_char.GetHerHis] здобич. [bachelor_char.GetName] з [bachelor_char.GetCountry.GetName] довгий час відкладав [bachelor_char.GetHerHis] шлюб, і [bachelor_char.GetHerHis] трон не має надійного престолонаслідування. Це може бути ідеальний час для формування династичного зв'язку між нашими країнами. Можливо, в наших інтересах відправити посольство, щоб спробувати видати нашу власну [bachelorette_char.GetName] заміж за цей іноземний [bachelor_country.GetGovernment.GetAdjective] дім."
  dynastic.24.a: "Дійсно, так і зробимо!"
  dynastic.24.b: "У нас є важливіші справи."
  dynastic.25.title: "Троянда з чужої землі"
  dynastic.25.desc: "Правитель [bachelorette_country.GetName] надіслав нам картину, що зображує молоду дівчину в [ruler_char.GetHerHis] [bachelorette_country.GetGovernment.GetCourtTitle]. [bachelorette_char.GetHerHis|U] очі екстравагантні, [bachelorette_char.GetHerHis] волосся неймовірне, і очі [ROOT.GetCountry.GetGovernment.GetRulerTitle] притягуються до картини, ніби до вакууму. Хитра посмішка з'являється на обличчі радника. Шум у кімнаті стихає. [bachelor_char.GetName] не знає, як довго [bachelor_char.GetSheHe] стоїть там, дивлячись на [bachelorette_country.GetHerHis] красу."
  opinion_dynastic_love: "Кохання між двома родинами"
  dynastic.25.a: "Не могло бути кращого кандидата."
  opinion_dynastic_witchcraft: "Назвав принцесу відьмою"
  dynastic.25.b: "Що це за мерзенне чаклунство? Геть!"
  dynastic.26.title: "Шип з чужої землі"
  dynastic.26.desc: "Хоча низька якість картини може дещо пояснити, факт залишається фактом: Творець не був надто щедрим, коли обдаровував цю дівчину її зовнішністю. [bachelorette_country.GetGovernment.GetRuler.GetName] з [bachelorette_country.GetName] запропонував її руку для шлюбу, і [ROOT.GetCountry.GetGovernment.GetRulerTitle] не впевнений, чи варто йому сміятися, чи почуватися ображеним. Знову ж таки, варто врахувати питання спадкоємності."
  opinion_dynastic_united: "Об'єднані династії"
  dynastic.26.a: "Добра [bachelorette_country.GetReligion.GetAdjectiveWithNoTooltip] жінка, без сумніву."
  opinion_dynastic_refused: "Відхилена пропозиція шлюбу"
  dynastic.26.b: "Це, очевидно, не годиться."
  dynastic.27.title: "Наслідки"
  dynastic.27.desc: "Гнів у голосі [ROOT.GetCountry.GetGovernment.GetHeir.GetShortName] безпомилковий, коли [heir_char.GetSheHe] критикує причетність [ROOT.GetCountry.GetGovernment.GetRulerTitle] до наших воєнних катастроф. Справді, під час нещодавніх конфліктів були допущені помилки, але всі вони навряд чи були провиною [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Крім того, [ROOT.GetCountry.GetGovernment.GetHeirTitle] також командував військами. Досягнувши справжньої мети своєї тиради, [heir_char.GetShortNameWithNoTooltip] нарешті вимагає «зречення» [ruler_char.GetName]."
  dynastic.27.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] візьме на себе відповідальність"
  dynastic.27.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] не терпітиме зухвальства у [ruler_char.GetHerHis] власному домі!"
  dynastic.28.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Місяць"
  dynastic.28.desc: "Сад омитий прохолодним світлом повного місяця. Повернувши за ріг і натрапивши на це видовище, [target_ruler.GetName] не очікував, але ось воно. Перед [target_ruler.GetHerHim] стоїть пам'ятник одній з наших колишніх війн. Краса полягає не у вишуканому мармурі чи навіть у майстерності виробу, а в тому, що навіть зараз, багато років потому, пам'ятник все ще усипаний тисячами й тисячами свіжих квітів. Тут, якщо ніде більше, пам'ять про наше минуле та пам'ять про полеглих все ще живе."
  dynastic.28.a: "Нехай пам'ять живе"
  dynastic.28.b: "Наш смуток доводить справедливість нашої справи."
  dynastic.29.title: "Успадковано [target_appanage.GetNameWithNoTooltip]"
  dynastic.29.desc: "Закони спадкування, що диктують політику в нашому [ROOT.GetCountry.GetFlavorRank], чіткі. Як тільки правитель [ShowSubjectTypeName('appanage')] буде піднесений на наш трон, його володіння будуть інтегровані в наші. Шлях для нас відкритий, щоб сприяти концентрації влади та земель у руках [target_ruler.GetName]."
  dynastic.29.a: "Дуже добре, настав час їх інтегрувати."
  dynastic.29.b: "Не поспішаймо."
  dynastic.30.title: "Піднесення [target_ruler.GetNameWithNoTooltip]"
  dynastic.30.desc: "Завдяки позитивному повороту долі, наш [target_ruler.GetName] опинився [target_ruler.GetHerselfHimself] на чолі нашого сюзерена, [target_overlord.GetLongName]. Через наш статус [ShowSubjectTypeName('appanage')] це переконливо свідчить про те, що наш [ROOT.GetCountry.GetFlavorRank] має бути інтегрований дипломатично."
  dynastic.30.a: "Вперед і вгору!"