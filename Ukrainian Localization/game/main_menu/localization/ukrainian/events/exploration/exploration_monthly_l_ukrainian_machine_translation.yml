l_english:
  exploration_monthly.1.title: "Випробування в [ROOT.GetExploration.GetArea.GetNameWithNoTooltip]"
  exploration_monthly.1.desc: "Під час нашої місії з пошуку придатних для колонізації провінцій ми натрапили на [ROOT.GetExploration.GetLocation.GetName]. Її тубільці здебільшого ворожі, але земля дуже родюча. Ми б багато виграли від торгівлі з цією провінцією. Хоча, можливо, доведеться підкупити одного-двох вождів..."
  exploration_monthly.1.a: "Укласти з ними чесну угоду."
  exploration_monthly.1.b: "Укласти з ними нечесну угоду."
  exploration_monthly.2.title: "Ворожі тубільці"
  exploration_monthly.2.desc: "Наша експедиція зіткнулася з ворожими тубільцями з [ROOT.GetExploration.GetLocation.GetName], що змусило їх тікати з місця.\n\nКілька моряків висадилися, щоб знайти прісну воду, і поверталися на корабель, коли з'явилися п'ять каное [pop.GetCulture.GetName] з озброєними чоловіками.\n\n[ROOT.GetExploration.GetOwner.GetAdjective] екіпаж розвернув свій човен і помчав назад до корабля, а каное були одразу за ними. Одне з каное майже наздогнало човен, але коли чоловіки готувалися до бою, каное сповільнилося, щоб дочекатися інших.\n\nКорабель втік, але деякі члени екіпажу були поранені. Отруєна стріла влучила одному з чоловіків у ногу, і хоча рану продезінфікували сечею та оливковою олією, ми не знаємо, чи виживе чоловік."
  exploration_monthly.2.a: "Подивитися, чи заспокоять тубільців якісь дешеві дрібнички."
  exploration_monthly.2.b: "Повернутися туди, вбити тубільців і забрати їхнє золото!"
  exploration_monthly.3.title: "Чужинець у чужій землі"
  exploration_monthly.3.desc: "Коли наш корабель наближається до [ROOT.GetExploration.GetLocation.GetName], велика кількість навантажених подарунками каное починає слідувати за ним. Мешканці каное безстрашно піднялися на судно, і двоє, здавалося б, важливих чоловіків намагаються переконати [ROOT.GetExploration.GetCharacter.GetName] слідувати за ними до [tribal_nation.GetCapital.GetName].\n\nЇхні наміри здаються невинними, і наші перекладачі можуть зрозуміти, що ми прибули якраз вчасно для якогось місцевого свята.\n\nФорма щогли нашого корабля, вітрила та оснащення нагадують певні значущі артефакти для тубільців, а наш рух за годинниковою стрілкою навколо острова відображав шлях, яким їхні процесії йдуть під час цього свята. Це переконало тубільців, що ми дружні — але один невірний рух, і все може змінитися..."
  exploration_monthly.3.a: "Прийняти їхні примітивні традиції."
  opinion_good_first_impression: "Гарне перше враження"
  exploration_monthly.3.b: "Триматися подалі від них і не висаджуватися на берег!"
  exploration_monthly.4.title: "Дорога Слави"
  exploration_monthly.4.desc: "Дозорний повідомляв про поодинокі житла, але без тубільців, поки нарешті не було помічено прибережне село в [ROOT.GetExploration.GetLocation.GetName].\n\nНевеликий загін висадився і був гостинно прийнятий [native_pop.GetCulture.GetName] селянами, що було приписано їхньому захопленню трьома [explorers_pop.GetCulture.GetName] моряками, які були бородатими та високими. Тубільці були безбородими, і з деякими труднощами їм вдалося повідомити, що їхні міфи та легенди пророкували час, коли їхні бородаті боги прийдуть з моря, щоб відвідати їх.\n\nТубільці подарували їжу та скарби, що вказало [target_character.GetName] на те, що провінція є процвітаючою і матиме велику цінність для нас."
  exploration_monthly.4.a: "Це перспективна земля!"
  exploration_monthly.5.title: "Корабель у літо"
  exploration_monthly.5.desc: "Слова Христофора Колумба ідеально описують плем'я, яке ми знайшли: «Вони торгували з нами і віддавали нам усе, що мали, з доброю волею... вони отримували велике задоволення, догоджаючи нам... Вони дуже лагідні і не знають, що таке зло, не вбивають і не крадуть... Ваша Високість може повірити, що в усьому світі не може бути кращих людей... Вони люблять своїх ближніх, як самих себе, і мають найсолодшу мову у світі, і лагідні, і завжди сміються»."
  exploration_monthly.5.a: "Скористатися ними!"
  angry_natives: "Експлуатовані!"
  exploration_monthly.5.b: "Добре використати їхню лагідність."
  friendly_natives: "Дружня зустріч"
  exploration_monthly.6.title: "Небажаний пасажир"
  exploration_monthly.6.desc: "Село поблизу [ROOT.GetExploration.GetLocation.GetName] було покинуте деякий час, невдалі врожаї свідчили про посуху, яка, мабуть, мучила цю місцевість досить довго.\n\nКоли експедиція поверталася на свій корабель, вони отримали жахливий шок — один з найбільших ведмедів, яких вони коли-небудь бачили, намагався залізти на корабель!\n\nМоряки вирішили спіймати голодного звіра з надією привезти його назад до [ROOT.GetExploration.GetOwner.GetLongName].\n\nЙого прив'язали і затягли на корабель, але ведмідь вирвався з мотузок, і екіпажу довелося його вбити. Цей напад і спустошений стан, в якому перебуває [ROOT.GetExploration.GetLocation.GetProvince.GetName], змусили [target_character.GetName] усвідомити, що пошуки в цій частині [ROOT.GetExploration.GetArea.GetName] є марною справою."
  exploration_monthly.6.a: "Справжня ганьба."
  exploration_monthly.7.title: "Зелені пагорби [ROOT.GetExploration.GetLocation.GetNameWithNoTooltip]"
  exploration_monthly.7.desc: "Тубільці в [ROOT.GetExploration.GetLocation.GetName] були захоплені скляними намистинами, латунними дзвіночками та тканиною, які [target_character.GetName] виміняв на свіжу рибу та оленину. Серед людей було дуже мало багатства, і вони здавалися мирними.\n\nВони покинули свої домівки однієї ночі, залишивши село для дослідження членами експедиції. Нічого особливого не було знайдено, але маленька брязкальце із золота, закопана серед рибальських сіток, свідчила, що [ROOT.GetExploration.GetArea.GetName] ще може принести нам якусь удачу."
  exploration_monthly.7.a: "Як чудово!"
  exploration_monthly.8.title: "За цим горизонтом"
  exploration_monthly.8.desc: "Поки наш дослідницький корабель стояв біля узбережжя [ROOT.GetExploration.GetLocation.GetName], кілька допитливих тубільців [ROOT.GetExploration.GetLocation.GetDominantCulture.GetName] на каное підпливли до корабля.\n\nЕкіпаж запросив їх на борт після обміну жестами, що виражали мирні наміри. Їжа та напої були розділені з тубільцями, перш ніж вони повернулися до своїх каное та відпливли до берега.\n\nЗаохочені звітом про початкову мирну зустріч, ще шість каное підпливли до каравели."
  exploration_monthly.8.a: "Вони дали нам великі знання!"
  exploration_monthly.9.title: "Загроза з [ROOT.GetExploration.GetLocation.GetNameWithNoTooltip]"
  exploration_monthly.9.desc: "Після досить бурхливого початку з тубільцями [ROOT.GetExploration.GetLocation.GetName], нам нарешті вдалося переконати їх у наших добрих намірах.\n\nКоли ми висадилися на берег, двоє чоловіків, один старий і один молодий, наблизилися до нашого корабля. Вони не були зацікавлені в наших подарунках, і коли ми зробили попереджувальний постріл над їхніми головами, він злегка поранив старшого чоловіка. [ROOT.GetExploration.GetCharacter.GetHeShe|U] побіг до своїх хатин і привів чоловіків, які кидали списи в наш екіпаж, поки їх не прогнали після ще двох пострілів.\n\nДорослі втекли в ліс, залишивши своїх дітей. Як жест дружби, деякі члени експедиції залишили дітям кілька дрібних дрібничок, перш ніж відступити до корабля."
  exploration_monthly.9.a: "Дайте їм зрозуміти, що ми не хотіли їм зла."
  exploration_monthly.10.title: "Звірі [ROOT.GetExploration.GetLocation.GetNameWithNoTooltip]"
  exploration_monthly.10.desc: "Перш ніж [ROOT.GetExploration.GetCharacter.GetName] вирушив у експедицію, [ROOT.GetExploration.GetCharacter.GetHeShe] чув розповіді про карфагенського дослідника на ім'я Ганнон, який знайшов острів, населений «волохатим і диким народом».\n\nГаннон намагався захопити самців, що не вдалося, але трьох самок було взято. Їхня люта природа змусила дослідника вбити їх. Щоб принести доказ звірів, їхні шкури були збережені для транспортування. Ці люди були названі «горилами» перекладачами, що подорожували з Ганноном.\n\nМи припускаємо, що мавпоподібні види, які ми знайшли в [ROOT.GetExploration.GetLocation.GetName], повинні бути тими горилами, про які говорив Ганнон."
  exploration_monthly.10.a: "Хапайте, що можете, і тікайте!"
  exploration_monthly.11.title: "[ROOT.GetExploration.GetNameWithNoTooltip]"
  exploration_monthly.11.desc: "За довгі місяці, проведені в дослідженні ландшафту навколо [marriage_location.GetName], наш дослідник [ROOT.GetExploration.GetCharacter.GetName] зблизився з [bride_pop.GetCulture.GetName] селянською родиною, і зокрема з їхньою неодруженою дочкою, [bride.GetName].\n\nСтавши частиною місцевої родини, безумовно, допоможе експедиції."
  exploration_monthly.11.a: "Капелан експедиції проводить весілля."
  exploration_monthly.11.b: "Дотримуйтесь місцевих весільних звичаїв."
  exploration_monthly.11.c: "Зараз не час для романтики."
  exploration_monthly.12.title: "П'яний дослідник"
  exploration_monthly.12.desc: "Один з членів нашої експедиції — [target_character.GetName], хто б міг подумати! — зумів потрапити в жахливо незручну ситуацію, коли [target_character.GetHeShe] переоцінив [target_character.GetHisHer] власну здатність впоратися з фруктовим лікером, який варять тубільці [ROOT.GetExploration.GetLocation.GetName].\n\nОгидні деталі не потраплять у цей звіт, але [target_character.GetHeShe] довго був хворий, як свиня. Тубільці вважали це забавою, сміючись над [target_character.GetHisHer] стражданнями, але чутки про цю подію дійшли до вух вищих світських осіб у [ROOT.GetExploration.GetOwner.GetName], які несхвально ставляться до такої поведінки."
  exploration_monthly.12.a: "Фруктовий лікер? Ви привезли трохи?"
  STATIC_MODIFIER_NAME_drunken_explorer: "П'яний дослідник"
  exploration_monthly.16.title: "Грабіжник храму"
  exploration_monthly.16.desc: "Після запрошення до місцевого релігійного місця в [ROOT.GetExploration.GetLocation.GetName], жадібність [target_character.GetName] взяла гору над [target_character.GetHimHer].\n\nУ той момент, коли священики [pop.GetReligion.GetName] відвернулися, [target_character.GetHeShe] засунув їхній дорогоцінний артефакт у [target_character.GetHisHer] куртку і поспішив геть, перш ніж вони навіть дізналися, що [target_character.GetHeShe] пішов."
  exploration_monthly.16.a: "$common_string_it_belongs_in_a_museum$"
  exploration_monthly.17.title: "Поїздка на річковому човні"
  exploration_monthly.17.desc: "Привітна група мисливців [pop.GetCulture.GetName] допомогла експедиції [target_character.GetName] в [ROOT.GetExploration.GetArea.GetName], переправляючи [target_character.GetHisHer] загін на дивних човнах вгору та вниз по річках і узбережжях."
  exploration_monthly.17.a: "Огляд визначних пам'яток завжди найкраще з місцевими!"
  exploration_monthly.18.title: "Штиль"
  exploration_monthly.18.desc: "Після кількох днів слабких вітрів експедиція ледь просунулася через [ROOT.GetExploration.GetArea.GetName]. [target_character.GetName] молиться, щоб вітри знову посилилися незабаром."
  exploration_monthly.18.a: "Ми втратили багато часу..."
  exploration_monthly.19.title: "Природне відкриття"
  exploration_monthly.19.desc: "Подорожуючи через [ROOT.GetExploration.GetArea.GetName], наш дослідник — натураліст [target_character.GetName] — стверджує, що [target_character.GetHeShe] зробив значне відкриття щодо місцевої флори.\n\nНаразі незрозуміло, що саме це таке, але одне безсумнівно: [target_character.GetHeShe] потрібно набагато більше часу, щоб написати повний звіт."
  exploration_monthly.19.a: "Це безсумнівно сприятиме розвитку природничих наук."
  exploration_monthly.19.b: "Ми підпорядковуємося вимогам служби."
  exploration_monthly.20.title: "Голоси в ночі"
  exploration_monthly.20.desc: "Подорожуючи через [ROOT.GetExploration.GetArea.GetName], серед членів експедиції виникли сумніви щодо здатності дослідника [target_character.GetName] правильно орієнтуватися. Навіть місцеві [pop.GetCulture.GetName] у [ROOT.GetExploration.GetLocation.GetName] стверджували, що їхні предкові духи застерігали їх від поточного напрямку [target_character.GetNameWithNoTooltip].\n#NL![target_character.GetHeShe|U] спочатку, очевидно, відкинув такі безглузді твердження, але [target_character.GetHeShe] прокинувся після минулої ночі, стверджуючи, що самі духи приходили відвідати [target_character.GetHimHer] вночі, оскільки [target_character.GetHeShe] чув голоси, які наказували [target_character.GetHimHer] змінити [target_character.GetHisHer] поточний маршрут. [target_character.GetHeShe|U] каже, що [target_character.GetHeShe] більше не може заперечувати знаки, але стверджує, що для проходження цим маршрутом знадобляться додаткові кошти, оскільки він складніший і потребуватиме додаткових припасів та обладнання."
  exploration_monthly.20.a: "[target_character.GetHisHer|U] інстинкт нас ще ніколи не підводив."
  exploration_monthly.20.b: "Голоси духів? Безглуздо."
  exploration_monthly.21.title: "Обдарований перекладач"
  exploration_monthly.21.desc: "Дослідження в [ROOT.GetExploration.GetArea.GetName] було призупинено на деякий час, але нещодавно до табору [ROOT.GetExploration.GetCharacter.GetName] підійшов член [pop.GetCulture.GetName], який розмовляв дещо ламаною, але зрозумілою [ROOT.GetExploration.GetOwner.GetCulture.GetLanguage.GetName]. [translator.GetHeShe|U] каже, що людина [ROOT.GetExploration.GetOwner.GetCulture.GetName] відвідала [translator.GetHisHer] село багато років тому, коли [translator.GetHeShe] був маленьким, і тоді зумів вивчити мову. [translator.GetHeShe|U] пропонує допомогти встановити подальший контакт зі [translator.GetHisHer] народом і додає, що [translator.GetHeShe] також може допомогти створити словник [translator.GetHisHer] мови, стверджуючи, що це буде дуже корисний інструмент."
  exploration_monthly.21.a: "Профінансувати словник."
  exploration_monthly.21.b: "Немає потреби."
  exploration_monthly.21.c: "Цей перекладач міг би бути корисним вдома."
  exploration_monthly.21.b.tt: "[translator.GetName] приєднається до нашого двору"
  exploration_monthly.22.title: "Сприятливий шторм"
  exploration_monthly.22.desc: "Під час плавання через [ROOT.GetExploration.GetArea.GetName] кораблі [target_character.GetName] потрапили у лютий шторм. Те, що могло закінчитися трагедією, натомість обернулося дивовижним щасливим випадком, оскільки, коли небо прояснилося, вони виявили, що не тільки не втратили жодного корабля, але й вітри віднесли їх значно далі за курсом, ніж очікувалося. Вітрила були повністю розірвані в процесі, і їм довелося використовувати запасні, але просування за запланованим графіком безумовно того вартувало."
  exploration_monthly.22.a: "Підняти вітрила!"
  exploration_monthly.23.title: "Пагорб Вітру"
  exploration_monthly.23.desc: "Під час дослідження [ROOT.GetExploration.GetArea.GetName], [target_leader.GetName] знайшов гарний пагорб у [target_location.GetName] з конічною вершиною, трохи сплющеною на маківці. З вершини [target_leader.GetHeShe] каже, що відкривається дуже вигідний вид на всі навколишні території. Це буде гарне місце для створення базового табору і слугуватиме як спостережним пунктом, так і легко впізнаваним орієнтиром. [target_leader.GetNameWithNoTooltip] звернув нашу увагу на те, що якщо ми надамо [target_leader.GetHimHer] необхідні ресурси, [target_leader.GetHeShe] побудує там більш постійну споруду, яка слугуватиме сторожовою вежею. [target_leader.GetHeShe|U] стверджує, що можливість чітко бачити далекі місця звідти значно покращить [target_leader.GetHisHer] логістику."
  exploration_monthly.23.a: "Побудуймо сторожову вежу."
  exploration_monthly.23.b: "Немає потреби."
  exploration_monthly.24.title: "Дружній пес"
  exploration_monthly.24.desc: "[explorer.GetName] отримав приємний сюрприз, досліджуючи [ROOT.GetExploration.GetArea.GetName]. Собака почав з'являтися нещодавно біля [explorer.GetHisHer] табору і здається досить дружнім. Собака постійно гавкає, але, схоже, робить це більше для привернення уваги [explorer.GetNameWithNoTooltip], ніж як загроза, оскільки до нього може підійти будь-хто без проблем. Здається, він намагається провести експедицію певним шляхом, але зрештою, це ж просто собака, чи не так?"
  exploration_monthly.24.a: "Бурмотіння дворняги має значення"
  exploration_monthly.24.a.tt: "[explorer.GetNameWithNoTooltip] залишить собаку як домашнього улюбленця і слідуватиме її вказівкам"
  exploration_monthly.24.b: "Хто хороший хлопчик?"
  exploration_monthly.24.b.tt: "[explorer.GetNameWithNoTooltip] погладить собаку. Можливо, трохи забагато"
  STATIC_MODIFIER_NAME_friendly_dog: "Дружній пес"
  exploration_monthly.25.title: "Найспокійніше море"
  exploration_monthly.25.desc: "[target_explorer.GetName] та [target_explorer.GetHerHis] корабель застрягли у відкритому морі [ROOT.GetExploration.GetArea.GetName] на деякий час, без вітру чи течії, щоб їх рухати. Запаси починають вичерпуватися, а екіпаж стає все більш збудженим. Деякі з тварин, яких вони взяли з собою, вже були або з'їдені, або викинуті за борт, щоб полегшити навантаження на воду та пайки. Якщо нічого не зробити, хто знає, як довго вони зможуть вижити."
  exploration_monthly.25.a: "Це поза людськими руками, ми повинні довіряти вищій силі."
  exploration_monthly.25.b: "Ми повинні щось зробити, спробувати все."
  exploration_monthly.26.title: "Птах-провідник"
  exploration_monthly.26.desc: "Монотонне плавання [target_explorer.GetName] та [target_explorer.GetHerHis] корабля в [ROOT.GetExploration.GetArea.GetName] залишалося незмінним протягом деякого часу. Без змін погоди чи будь-яких змін у вигляді навколишнього моря, екіпаж починає сумніватися, чи вони взагалі рухаються. На останньому сході сонця ті, хто був на палубі, були здивовані, побачивши чайку, що літала над судном, ніби намагаючись провести їх до найближчої землі. Деякі члени екіпажу кажуть, що це очевидна ознака присутності землі поблизу, і хочуть змінити курс корабля, щоб слідувати за нею туди, щоб хоча б розвіяти нудьгу, якщо не поповнити запаси."
  exploration_monthly.26.a: "Було б найкраще, якби ми слідували за нею."
  exploration_monthly.26.b: "Чайки вилітають у море лише помирати, чи не так?"
  exploration_monthly.27.title: "Бунт!"
  exploration_monthly.27.desc: "Напруга між [target_explorer.GetName] та [target_explorer.GetHerHis] екіпажем останнім часом зростає. Загальне невдоволення лідерством [target_explorer.GetShortNameWithNoTooltip] все більше і більше накопичувалося, проявляючись у підступних розмовах під палубою та пронизливих поглядах через неї. Очевидна зневага [target_explorer.GetHerHis|U] до ситуації виявилася [target_explorer.GetHerHis] падінням, оскільки екіпаж нарешті організувався і влаштував повномасштабний бунт."
  exploration_monthly.27.a: "Тобі дошка!"
  exploration_monthly.27.b: "Покращити умови екіпажу."
  exploration_monthly.27.c: "Вирішити ситуацію дипломатично."
  exploration_monthly.27.d: "Якщо ви хочете кровопролиття, ви його отримаєте."
  exploration_monthly.28.title: "Рибальська гра"
  exploration_monthly.28.desc: "Екіпаж, що пливе в [ROOT.GetExploration.GetArea.GetName], нещодавно винайшов дуже цікаву розвагу. Для моряків досить поширено ловити рибу в морі, щоб забезпечити себе додатковою їжею, але ті, хто супроводжує [target_explorer.GetName], розвинули це до того, що вигадали цілу гру навколо цієї діяльності.\n\nВони ведуть рахунок не тільки залежно від кількості риби, яку кожен спіймав, але й від її розмірів, і навіть точного виду риби. Різні види дають різну кількість очок, хоча не завжди більша риба є найціннішою. Вони тримають дошку на палубі, на якій відстежують рахунок кожного гравця, і підбивають повний підсумок наприкінці тижня. Рибалка з найвищим рахунком отримає перевагу при виборі пайків протягом наступного тижня.\n\nХоча підтримання високого морального духу екіпажу є важливим, безперечно, вони присвячують більше часу, ніж слід, таким легковажним заняттям, і загальне функціонування експедиції може постраждати."
  exploration_monthly.28.a: "Нехай вони розважаються."
  exploration_monthly.28.b: "Поки вони ще виконують свою роботу."
  exploration_monthly.28.c: "Повністю заборонити будь-яку риболовлю."
  exploration_monthly.29.title: "Уроки плавання"
  exploration_monthly.29.desc: "Під час дослідження узбережжя в [ROOT.GetExploration.GetArea.GetName] виникла проблема, яку було доведено до відома [target_explorer.GetName]. Попри те, що моряки багато часу проводять у морі, нерідко вони не вміють плавати, і, навпаки, зазвичай добре знайомі з огидним видовищем потонулих трупів. Таким чином, страх утоплення майже завжди присутній у будь-якого моряка.\n\nЩоб упоратися з цим, і враховуючи, що пляжі [ROOT.GetExploration.GetArea.GetNameWithNoTooltip] пропонують чудову можливість для безпечної практики плавання, один із членів екіпажу, який вміє плавати, запропонував [target_explorer.GetShortNameWithNoTooltip] можливість організувати уроки плавання для екіпажу. Попри очевидні та очікувані затримки в прогресі експедиції, ці уроки забезпечили б безпеку, принаймні душевну, екіпажу."
  exploration_monthly.29.a: "Провести ці уроки."
  exploration_monthly.29.b: "Це марна трата часу."
  exploration_monthly.30.title: "Дельфіни в [ROOT.GetExploration.GetArea.GetNameWithNoTooltip]"
  exploration_monthly.30.desc: "Екіпаж, що досліджує [ROOT.GetExploration.GetArea.GetName], отримав приємний сюрприз. Зграя дельфінів почала слідувати за кілем корабля, супроводжуючи його під час плавання. Хоча дельфіни нерідко плавають поруч із кораблями, ця конкретна зграя супроводжує експедицію надзвичайно довго, перебуваючи навколо корабля вже кілька днів. Моряки навіть починають розрізняти окремих членів зграї та давати їм імена."
  exploration_monthly.30.a: "Вони точно принесуть нам удачу."
  exploration_monthly.30.b: "Їх буде легко полювати на м'ясо."
  exploration_monthly.31.title: "Пісня сирени"
  exploration_monthly.31.desc: "Незвичайні чутки переслідують екіпаж [target_explorer.GetName] вже кілька днів, моряки клянуться, що останнім часом чули пісні здалеку вночі. Попри те, що вони перебувають у відкритому морі далеко від берега, ці повідомлення надходять ніч за ніччю, і навіть ті моряки, які не випили ні краплі алкоголю, стверджували, що чули пісні. За їхніми словами, це висока безперервна мелодія, без будь-яких розбірливих слів, але безпомилково жіночого походження. Вони запевняють, що це викликано сиренами, які слідують за кораблем, сподіваючись заманити екіпаж до їхньої певної смерті. Тому вони пропонують повернутися до порту, перш ніж ті зможуть захопити корабель."
  exploration_monthly.31.a: "Сирени? Це просто нісенітниця."
  exploration_monthly.31.b: "Ми повинні бути обережними з цими морськими істотами."
  exploration_monthly.31.c: "Ми повинні розслідувати джерело."
  exploration_monthly.31.d: "Ймовірно, це просто кити, давайте полювати на них."
  exploration_monthly.32.title: "Хмарна ніч"
  exploration_monthly.32.desc: "Експедиція [target_explorer.GetName] в [ROOT.GetExploration.GetArea.GetName] зіткнулася з деякими труднощами в останні кілька днів. Останніми ночами небо було повністю вкрите товстим шаром хмар, що унеможливлювало розрізнення будь-якої зірки чи навіть місяця. Хоча це досить поширене явище, той факт, що таких ночей було багато поспіль, ускладнює для екіпажу впевненість у тому, чи їхнє місцезнаходження відповідає їхнім припущенням. Корабель оснащений найновішими навігаційними технологіями, але навіть з ними плавання вночі без допомоги та керівництва зірок є непростим завданням."
  exploration_monthly.32.a: "Будемо молитися, щоб ми все ще були на курсі."
  exploration_monthly.32.b: "[target_explorer.GetNameWithNoTooltip] точно знає, де ми знаходимося."
  exploration_monthly.33.title: "Картограф на борту"
  exploration_monthly.33.desc: "Експедиція [target_explorer.GetName] в [ROOT.GetExploration.GetArea.GetName] проходить за планом, але [target_explorer.GetSheHe] вважає, що [target_explorer.GetHerHis] здібності до картографії не використовуються повною мірою. [target_explorer.GetSheHe|U] надіслав нам прохання покращити [target_explorer.GetHerHis] фінансування, щоб [target_explorer.GetSheHe] міг у свою чергу надати нам кращі та детальніші карти."
  exploration_monthly.33.a: "Із задоволенням, ми будемо вдячні за кращі карти."
  exploration_monthly.33.b: "Це занадто дорого."
  exploration_monthly.34.title: "Небезпечні скелі"
  exploration_monthly.34.desc: "Під час дослідження [ROOT.GetExploration.GetArea.GetName] корабель [target_explorer.GetName] натрапив на ділянку узбережжя, вкриту низькими гострими скелями. Хоча їх можна було б легко уникнути, це призвело б до значної зміни курсу, щоб обійти їх, і, як наслідок, затримало б експедицію. Однак, малоймовірно, що корабель залишиться неушкодженим, якщо його змусять плисти такими небезпечними водами."
  exploration_monthly.34.a: "Краще обійти їх."
  exploration_monthly.34.b: "Ми пропливемо крізь них, а потім полагодимо будь-які пошкодження."
  exploration_monthly.35.title: "Старий уламок"
  exploration_monthly.35.desc: "Несподіване видовище постало перед кораблем [target_explorer.GetName] у [ROOT.GetExploration.GetArea.GetName]. Залишки старого корабля були розкидані по пляжу, доказ безжальності моря. Деякі частини корпусу здаються ще цілими, і частина екіпажу стверджує, що це вимагає ближчого огляду, щоб врятувати будь-які товари, які він може містити. Однак, малоймовірно, що він має щось справді цінне, і затримка всієї експедиції заради цього може призвести лише до величезної втрати часу."
  exploration_monthly.35.a: "Хто знає, що ми там знайдемо, краще дослідити."
  exploration_monthly.35.b: "У нас немає на це часу."
  exploration_monthly.36.title: "Дим на узбережжі"
  exploration_monthly.36.desc: "Береги вздовж [ROOT.GetExploration.GetArea.GetName] здавалися непримітними, коли [target_explorer.GetName] плив уздовж них, але щось привернуло увагу екіпажу. На тому, що мало бути безлюдним берегом, піднімається безпомилковий дим. Де дим, там і вогонь, тому зрозуміло, що це узбережжя не таке безлюдне, як очікувалося. Швидкий огляд пляжу показує, що це просто хтось, хто пережив корабельну аварію попередньої експедиції і намагався вижити сам на цьому пляжі, намагаючись помітити будь-яке інше судно, що пропливає повз, і, очевидно, сповіщаючи їх димом, коли це нарешті сталося."
  exploration_monthly.36.a: "Вийти на берег і взяти вцілілого на борт."
  exploration_monthly.36.b: "Не наша провина, не наша проблема."
  exploration_monthly.37.title: "Корабель-привид"
  exploration_monthly.37.desc: "Розповіді про кораблі-привиди завжди були на вустах і в думках моряків. Історії про примарні явища посеред моря, кораблі, що пливуть навіть без вітру, тримаючись на плаву, незважаючи на розірваний корпус, екіпажі, що складаються зі скелетів і роздутих трупів. У цих історіях уява розгулюється, але є багато моряків, які клянуться, що зустрічали такі потойбічні судна.\n\nТакі історії присутні тепер навіть посеред експедиції [target_explorer.GetName] у [ROOT.GetExploration.GetArea.GetName]. Деякі члени екіпажу згадують, що бачили примарну фігуру корабля, що слідувала за їхнім власним кілем, з'являючись і зникаючи з поля зору, і не могли належним чином сфокусувати на ній погляд. Нервозність поширюється серед екіпажу, який починає боятися, що Смерть йде за ними."
  exploration_monthly.37.a: "Історії про привидів — це просто нісенітниця."
  exploration_monthly.37.b: "Будьмо обережні про всяк випадок."
  exploration_monthly.38.title: "Відкриття Нового Світу!"
  exploration_monthly.38.desc: "Після довгої та важкої подорожі одна з наших експедицій повернулася до [target_root_country.GetName] з дивовижним повідомленням. Вони висадилися на невеликому острові, де зустріли людей, які носили золоті прикраси та розмовляли іноземною мовою. Згідно з їхніми звітами, це може бути альтернативний шлях до Індії, але деякі почали обговорювати, що це може бути абсолютно невідомий континент. Ми могли б почати створювати форпости на цих островах, щоб зробити перший крок до колонії та подальших досліджень у цьому районі."
  exploration_monthly.38.a: "[target_root_country.Custom('common_string_positive')]"
  exploration_monthly.39.title: "Пекельні комахи"
  exploration_monthly.39.desc: "Невпинна атака рою чорних мух змусила нашу відважну експедицію повернутися з [ROOT.GetExploration.GetLocation.GetName].\n\nНаші дослідники знайшли величезну рівнину, заповнену численними річками та водними шляхами, що впадали у величезну солону затоку.\n\nНа їхній подив, коли вони наблизилися до узбережжя, на них напав нескінченний рій маленьких чорних мух, які кусали їх і пили їхню кров. Після багатьох болючих укусів вони були змушені відступити і тепер просять нас дозволити їм шукати інший шлях вперед."
  exploration_monthly.39.a: "[target_root_country.Custom('common_string_positive')]"
  exploration_monthly.39.b: "Повертайтеся туди, негайно!"
  exploration_monthly.40.desc: "Керуючись прагненням до незвіданих територій та таємниць невідомого, дослідники з [target_root_country.GetName] прибули на далекі береги. Ці землі населені корінними народами, що розмовляють незнайомими мовами та прикрашені вражаючими орнаментами. Це відкриття породжує більше запитань, ніж відповідей, і може змінити хід історії так, як ми ще не можемо передбачити. Новий світ чекає, його повний потенціал та виклики все ще оповиті таємницею."
  exploration_monthly.40.a: "Який чудовий час для життя!"
  exploration_monthly.40.historical_info: "У 1492 році Христофор Колумб вирушив у плавання, сподіваючись знайти новий шлях до Азії. Замість цього він натрапив на Америку, землю, яка вже була домом для мільйонів корінних народів. Цей момент ознаменував початок європейської розвідки та колонізації #italic Нового Світу#!, таким чином змінивши історію назавжди. Він приніс нові можливості, але також і спустошення, оскільки корінне населення зіткнулося із завоюванням, хворобами та культурними потрясіннями. Це відкриття має з'єднати два світи, переформувавши суспільства та глобальний баланс сил безпрецедентними способами."