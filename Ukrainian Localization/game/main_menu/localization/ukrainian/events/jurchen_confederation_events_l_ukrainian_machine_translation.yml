l_english:
  jurchen_confederation_events.1.title: "Часи змінюються"
  jurchen_confederation_events.1.desc: "Не так давно наші пращури та їхні батьки до них полювали та годували наш народ за допомогою коня, билися з ворогами та жили вільним життям. Тепер емісари від [target_jc_leader.GetName] бажають нас каструвати, притупити нашу гостроту та покінчити з нашими гордими традиціями як племінних володарів наших земель. Вони наполягають, що прийняття звичаїв наших південних сусідів – це шлях, що призведе до втрати нашої ідентичності."
  jurchen_confederation_events.1.a: "Злізьте з того високого коня і послухайте, вони мають рацію!"
  jurchen_confederation_events.1.b: "Ні! Геть звідси!"
  jurchen_confederation_events.2.title: "Гідний майстер коней"
  jurchen_confederation_events.2.desc: "Небагато хто відзначився на коні так, як [target_character.GetName]. [target_character.GetHerHis|U] навички стрільби з лука принесли нам багато престижних змагань, доводячи нашу бойову майстерність нашим войовничим сусідам. Однак наші радники при дворі стверджували, що [target_character.GetHeSheFormal] стане чудовим дипломатичним подарунком для лідерів нашої Конфедерації в [target_jc_leader.GetName]."
  jurchen_confederation_events.2.a: "Ба! [target_character.GetShortNameWithNoTooltip] тут вдома!"
  jurchen_confederation_events.2.b: "Дуже добре, сподіваємося, вони приймуть [target_character.GetHerHim]..."
  jurchen_confederation_events.3.title: "Подарунок від [target_member.GetNameWithNoTooltip]"
  jurchen_confederation_events.3.desc: "Прибули емісари від членів нашої конфедерації з [target_member.GetName], приносячи подарунки, щоб подружитися з нашим народом. Серед них – здібна особа, яка, як стверджують, виграла кілька турнірів зі стрільби з лука та верхової їзди на батьківщині. [target_character.GetShortName] прагне розпочати нову пригоду при новому дворі та з нетерпінням чекає на [target_character.GetHerHis] вступну церемонію."
  jurchen_confederation_events.3.a: "[target_character.GetSheHe|U] стане чудовим доповненням до наших лав, ласкаво просимо!"
  jurchen_confederation_events.3.b: "Геть звідси, мерзенний жебраку."
  jurchen_confederation_events.4.title: "Основа нашого суспільства"
  jurchen_confederation_events.4.desc: "Наш народ пережив турбулентність сотень років. Війни, голод та завойовники-шукачі не змогли загасити вогонь, що яскраво палає в наших серцях. Однак наше нещодавнє суперництво з [target_jurchen_country_2.GetName] почало ставати досить обтяжливим. Їхні вершники часто перетинали наші кордони, їдучи аж до наших сільськогосподарських угідь лише для того, щоб нібито красти та грабувати наш урожай, наражаючи на небезпеку наш народ. Таку поведінку не можна терпіти, і її не можна дозволяти!"
  jurchen_confederation_events.4.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  jurchen_confederation_events.4.b: "Негайно передайте скаргу нашому лідеру конфедерації!"
  jurchen_confederation_events.5.title: "Суперництво між [target_jurchen_country_1.GetNameWithNoTooltip] та [target_jurchen_country_2.GetNameWithNoTooltip]"
  jurchen_confederation_events.5.desc: "Немає сорому в гарячій крові, в будь-який інший день це була б якість, яку наш народ вітав би. Однак нещодавнє суперництво між лідерами [target_jurchen_country_1.GetName] та [target_jurchen_country_2.GetName] небезпечно переростає у повномасштабну війну. Нібито їхні патрулі часто відхиляються від маршруту і згодом грабують урожай один одного. Вони забули, хто це почав, і звернулися до нас за порадою, щоб врегулювати їхню суперечку."
  jurchen_confederation_events.5.a: "Вирішити на користь [target_jurchen_country_1.GetNameWithNoTooltip]."
  jurchen_confederation_events.5.b: "Люди [target_jurchen_country_2.GetNameWithNoTooltip] мають рацію!"
  jurchen_confederation_events.5.c: "Як щодо того, щоб ви обидва відмовилися від своїх нецивілізованих звичаїв?"
  jurchen_confederation_events.6.title: "Проблеми цивілізованого суспільства"
  jurchen_confederation_events.6.desc: "Що сталося з нашим народом? Ми були вільними, дикими і закоханими в природу та саме життя. Наші пращури були відомі своїми навичками пастки та верхової їзди, коли вони поширювали прапори Цзінь по всьому $china$, підкоряючи безліч людей під свої п'яти.\n\nЗараз все, що ми робимо, це турбуємося про бюджети, фінансові баланси, наші зобов'язання перед конфедерацією та придворний етикет. Що сталося з нашими колись гордими воїнами?"
  jurchen_confederation_events.6.a: "На жаль, це наше життя тепер..."
  jurchen_confederation_events.6.b: "Ми повинні чинити опір і захищати наші традиційні звичаї!"
  jurchen_confederation_events.7.title: "Наші воїни намагаються читати книги"
  jurchen_confederation_events.7.desc: "Спроби централізувати наше суспільство та перейняти звичаї наших південних сусідів принесли плоди. Багато наших воїнів взялися за томи літератури, намагаючись вивчити священні писання та пристосуватися до цих нових часів. Однак багато осіб на вищих посадах наполягають на збереженні старих звичаїв..."
  jurchen_confederation_events.7.a: "Можливо, їм потрібна більше муштра!"
  jurchen_confederation_events.7.b: "Читання – це майбутнє."
  jurchen_confederation_events.8.title: "Вимоги народу"
  jurchen_confederation_events.8.desc: "Наш народ прагне доступу до товарів, що надходять із чужих земель. Прославлені предмети та екзотичні товари завжди зачаровували наш народ. Багато хто в нашій адміністрації підтримує ідею сприяння торгівлі товарами, які найбільш близькі до наших племінних звичаїв, наголошуючи на протекціоністській позиції проти вітрів змін. Однак, можливо, було б мудро розглянути голоси, які підтримують відкритий підхід до майбутнього..."
  jurchen_confederation_events.8.a: "Ми горді воїни, нам потрібні коні та шкіра!"
  jurchen_confederation_events.8.b: "Не будемо соромитися приймати майбутнє!"
  jurchen_confederation_events.9.title: "Урок життя"
  jurchen_confederation_events.9.desc: "Мало хто з наших вершників опанував мистецтво граціозного галопу на нестримній швидкості. Тому не дивно, що знову [target_heir.GetName] впав(-ла) зі свого коня. Травма серйозна, і наш улюблений спадкоємець наразі отримує термінову медичну допомогу. Варто відзначити, що кінь [target_heir.GetShortNameWithNoTooltip] не залишив свого господаря. Очевидці, які бачили аварію, сказали, що кінь навіть намагався захистити свого вершника, пом'якшуючи удар від падіння..."
  jurchen_confederation_events.9.a: "Я б поцілував того коня!"
  jurchen_confederation_events.9.b: "Ха, те падіння, мабуть, виглядало смішно!"
  jurchen_confederation_events.10.title: "Занадто багато бійок"
  jurchen_confederation_events.10.desc: "Гарячність і запальний характер не чужі нашому народу. Багато жорстких сутичок відбувалося в тавернах за майже нескінченною кількістю випивки та розпусти. Однак нещодавня суперечка між могутніми вождями в [target_capital.GetName] вийшла з-під контролю. Пожежі охопили значну частину району, а повітря наповнене смердючою сумішшю криків, вогню та крові, оскільки суперечки переросли у відкриту війну за честь конкуруючих родин..."
  jurchen_confederation_events.10.a: "На жаль, ознака слабкого лідерства..."
  jurchen_confederation_events.10.b: "Ми покриємо збитки, це був чудовий прояв сили!"
  jurchen_confederation_events.11.title: "Наступні покоління"
  jurchen_confederation_events.11.desc: "Наші вчені та радники ретельно спланували майбутні плани для наступного покоління воїнів та співробітників нашої великої нації. Хоча наш кабінет та міністри підтримують розквіт нашої культури, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] рішуче підтримують ідею досконалої армії."
  jurchen_confederation_events.11.a: "Ми підтримаємо нашу культуру."
  jurchen_confederation_events.11.b: "Що таке народ без належної армії?"
  jurchen_confederation_events.12.title: "Опір новим шляхам"
  jurchen_confederation_events.12.desc: "Не секрет, що наші спроби кодифікувати закони по всій нашій конфедерації породили ворогів і шпигунів у кожному кутку. Будь то узурпатори чи суперники, ті, хто бажає нам зла, змовляються за зачиненими дверима, плануючи нашу загибель. Нещодавно голосна більшість наших радників виступила вперед, висунувши нам ультиматум. Вони вимагають негайного припинення наших спроб централізації, погрожуючи повстанням та нестабільністю, якщо ми продовжимо..."
  jurchen_confederation_events.12.a: "Дуже добре, ми в душі дикі вершники..."
  jurchen_confederation_events.12.b: "Нам не загрожуватиме дріб'язковість!"
  jurchen_sinicization_tt: "Відтепер, ухвалення будь-якого законодавства в межах нашої #G Конфедерації#! до кінця правління [target_ruler.GetName] призведе до #R -10#! [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] та #R -10#! [Concept('tribal_cohesion', 'CONCEPT_PLACEHOLDER')|e]"
  jurchen_confederation_events.13.title: "Вивчай Своїх Сусідів"
  jurchen_confederation_events.13.desc: "Не секрет, що наші південні сусіди володіють великими знаннями, прихованими в томах і бібліотеках по всьому їхньому славетному домену. Ідея встановлення зв'язку як засобу вивчення їхніх звичаїв є прибутковою, але дещо суперечливою..."
  jurchen_confederation_events.13.a: "Поширення знань понад усе."
  jurchen_confederation_events.13.b: "Ми не можемо ризикувати відчуженням нашого народу."
  jurchen_confederation_events.14.title: "Втілення Щастя"
  jurchen_confederation_events.14.desc: "Мало хто досяг щастя в цьому темному і сірому житті. Обтяжені хворобами, втратами та монотонністю щоденної рутини, більшість ведуть сумне і нудне життя. Того ж не можна сказати про членів нашого племені, оскільки ми вільно скачемо, грабуючи та воюючи з нашими нижчими сусідами. Однак представники [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] виступили вперед, зазначивши, що вони заслуговують на щедру частину нашого новознайденого багатства..."
  jurchen_confederation_events.14.a: "Ділитися — це турбота."
  jurchen_confederation_events.14.b: "Як щодо того, щоб вони поділилися вістрями нашої зброї?"
  jurchen_confederation_events.15.title: "Вдале Полювання"
  jurchen_confederation_events.15.desc: "Запах землі та пилу розноситься в повітрі, коли наші мисливці скачуть, гавкіт собак та щире очікування ідеального пострілу, що забезпечує здобич... Це деякі з елементів, що створюють міф про вдале полювання, традицію, яку ми перейняли від наших предків. Нещодавно група мисливців повернулася додому з багатою здобиччю, представивши її як подарунки двору..."
  jurchen_confederation_events.15.a: "Це найкраще в житті!"
  jurchen_confederation_events.15.b: "Ці практики належать минулому."
  jurchen_confederation_events.16.title: "Заявка [target_jc_leader.GetNameWithNoTooltip] на Об'єднання"
  jurchen_confederation_events.16.desc: "Наш час під захисним покровом нашої Конфедерації, здається, добігає кінця. Наш лідер зробив відвертий крок до обмеження нашої незалежності, на користь об'єднання під їхнім прапором."
  jurchen_confederation_events.16.a: "Об'єднані ми вознесемося!"
  jurchen_confederation_events.16.b: "Ми не можемо відмовитися від нашої незалежності..."
  jurchen_confederation_events.17.title: "Ера Великого Об'єднання"
  jurchen_confederation_events.17.desc: "Багато вождів, що складають нашу конфедерацію, користувалися відносною автономією та значним впливом у своїх відповідних володіннях. Однак, якщо ми хочемо вознестися і кинути виклик тим, хто бажає нашого подальшого підкорення, ми повинні об'єднатися під одним прапором. Сьогоднішній день знаменує собою день, коли ми успішно нав'язали свою волю іншим членам [target_io.GetName]."
  jurchen_confederation_events.17.a: "Наш час настав!"
  jurchen_confederation_unification_effort_tt: "Членам [target_io.GetNameWithNoTooltip] буде надано вибір: стати [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] під нашим командуванням або ризикнути надати нам [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти них"