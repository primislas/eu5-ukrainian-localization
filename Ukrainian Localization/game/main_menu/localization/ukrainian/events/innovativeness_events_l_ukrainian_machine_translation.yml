l_english:
  innovativeness_events.1.title: "Свобода преси"
  innovativeness_events.1.desc: "З поширенням народної грамотності велика кількість дешевих дрібних видань: памфлетів, лубочних книжок тощо, почала циркулювати у більшій кількості. Хоча багато з них є лише популярними баладами, історіями чи плітками, деякі є ледь завуальованими спробами критикувати стовпи нашої держави та релігійний істеблішмент.\nПоширення особливо аморальної та політичної балади призвело до вимог, щоб ми суворіше обмежили пресу та взяли нелояльних друкарів та їхню продукцію під нашу опіку."
  innovativeness_events.1.a: "Заборонити публікацію."
  innovativeness_events.1.b: "Це лише аркуш паперу."
  innovativeness_events.3.title: "Анатомічний театр"
  innovativeness_events.3.desc: "Місцеві лікарі в [SCOPE.sLocation('doctor_location').GetName] почали платити чималі гроші за вивчення свіжих трупів. Лікарі стверджують, що це дозволяє їм покращити свої знання про людське тіло, документуючи їх для блага людства. Однак покращення розуміння анатомії людини не є аргументом, який вражає місцевих жителів, коли вранці знаходять відкритими могили нещодавно померлих. Громадяни [SCOPE.sLocation('doctor_location').GetNameWithNoTooltip] тепер вимагають, щоб ми обмежили ці жахливі практики та поклали край грабіжникам могил."
  innovativeness_events.3.a: "Докорити та обмежити лікарів."
  innovativeness_events.3.b: "Вони можуть розтинати тіла засуджених."
  innovativeness_events.3.c: "Давайте працювати над забезпеченням постійного постачання тіл для їхньої роботи."
  innovativeness_events.4.title: "Іноземний винахідник"
  innovativeness_events.4.desc: "Блискучий [SCOPE.sCountry('inventor_country').GetAdjectiveWithNoTooltip] винахідник з [SCOPE.sCountry('inventor_country').GetName] прибув, щоб шукати нашого покровительства після розриву з [SCOPE.sCountry('inventor_country').GetGovernment.GetGovernmentType.GetName]. Деякі описують винахідника як один з великих умів цієї епохи, що створив багато механічних та хімічних винаходів, які виходять за межі розуміння більшості інших."
  innovativeness_events.4.a: "Приймімо його!"
  harbored_inventor: "Прихистили ворожого винахідника"
  innovativeness_events.4.b: "Ми б не ризикували гнівом наших сусідів."
  turned_away_inventor: "Відвернули винахідника"
  innovativeness_events.6.title: "Державне покровительство"
  innovativeness_events.6.desc: "Серед деяких [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] стало дедалі моднішим присвячувати час експериментам та філософії. Деякі почали формувати регулярні дискусійні групи, тоді як інші використовують листи для листування з іншими допитливими умами.\nОдна така група зв'язалася з нашим [ROOT.GetCountry.GetGovernment.GetRulerTitle], просячи покровительства та підтримки. Вони наполягають, що така підтримка принесе великі переваги [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] у найближчому майбутньому."
  innovativeness_events.6.a: "Вони матимуть нашу підтримку."
  innovativeness_events.6.b: "Яка марна трата часу!"
  innovativeness_events.7.title: "[ShowBuildingTypeNameWithNoTooltip('university')] [university_province.GetNameWithNoTooltip]"
  innovativeness_events.7.desc: "[ShowBuildingTypeName('university')] [university_province.GetName] привабив нову плеяду викладачів та студентів, які прагнуть модернізувати заклад. Вони просять фінансування для відкриття нового коледжу, де вони зможуть далі розвивати те, що вони називають «новою наукою», з більш експериментальним підходом і, як вони стверджують, менш догматичним поглядом на світ.\n\nЗвісно, в існуючій академії є певний опір цим потенційним реформаторам. Вони стверджують, що гроші можна було б краще витратити на підтримку існуючого закладу, оскільки нові ідеї не обов'язково є кращими ідеями."
  innovativeness_events.7.a: "Розширити [ShowBuildingTypeNameWithNoTooltip('university')]? Звучить як гарна ідея."
  innovativeness_events.7.b: "Давайте послухаємо консерваторів."
  innovativeness_events.8.title: "Інакодумні академії"
  innovativeness_events.8.desc: "Вищі навчальні заклади зазвичай обмежують набір адептами панівної віри. Це змушує неконформних потенційних студентів шукати освіту за межами державних університетів. На щастя для них, у [ROOT.GetCountry.GetName] було засновано низку неформальних академій, які обслуговують релігійних дисидентів різного роту, часто пропагуючи певну теологічну позицію. Такі академії можуть суворо суперечити закону, оскільки школи зазвичай вимагають згоди місцевих або національних релігійних органів, але вони надають освіту студентам, яким інакше було б відмовлено у вступі."
  innovativeness_events.8.a: "Нехай навчають, як їм заманеться."
  innovativeness_events.8.b: "Релігійна одноманітність має бути забезпечена."
  innovativeness_events.9.title: "Трактат про натурфілософію"
  innovativeness_events.9.desc: "Для одних багатообіцяючий мислитель, для інших небезпечний підбурювач, природознавець нещодавно опублікував нову працю з натурфілософії, показуючи, що дуже ймовірно, що багато речей, які ми досі вважали очевидними, насправді можуть бути хибними. Що ще гірше, мислитель також скористався нагодою, наданою публікацією, щоб висміяти релігійний істеблішмент. Усе це разом створило сильну відразу до цих нових ідей, причому деякі стверджують, що його слід ув'язнити та покарати, тоді як інші принаймні дистанціюються від тексту."
  innovativeness_events.9.a: "Це цікаві ідеї..."
  innovativeness_events.9.b: "Ми не можемо дозволити таке богохульство!"
  innovativeness_events.10.title: "Непопулярний математик"
  innovativeness_events.10.desc: "Як і багато правителів цієї епохи, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] хотів оточити [ROOT.GetCountry.GetGovernment.GetRuler.GetHerselfHimself] великими умами, які могли б обговорювати таємниці світу. Деякі мають велику дотепність і відмінно справляються з дебатами, тоді як інші більше підходять для самотніх експериментів або математичних розрахунків. Безсумнівно, іноді існує чимале суперництво, оскільки прихильність [ROOT.GetCountry.GetGovernment.GetRulerTitle] може бути дуже корисною річчю для будь-якого мислителя, вченого чи винахідника.\nОдин такий розумний дурень останнім часом став об'єктом глузувань багатьох колег. Він має чудовий розум для математики, але є помітно поганим дебатером, і дехто стверджував би, що репутація двору страждає від потурання такій роботі."
  innovativeness_events.10.a: "Нехай говорять."
  innovativeness_events.10.b: "Він нас ганьбить."
  innovativeness_events.11.title: "Terra Australis"
  innovativeness_events.11.desc: "Вчені ще з часів Аристотеля теоретизували, що на крайньому півдні світу має існувати великий невідомий континент. Тепер, коли подорожі навколо світу стали значно доступнішими, дослідники, картографи та вчені знову починають цікавитися зниклим континентом. Вони припускають, що деякі з островів, виявлених досі в регіоні, можуть бути кінцем великих архіпелагів. Експедиція на далекий південь була б дорогою, вимагала б великої підготовки та випробувала б межі нашої мореплавної технології."
  innovativeness_events.11.a: "Профінансувати дослідницьку та розвідувальну експедицію."
  innovativeness_events.11.b: "Це марна трата часу та ресурсів."
  innovativeness_events.12.title: "Кав'ярні"
  innovativeness_events.12.desc: "Запровадження кави в [ROOT.GetCountry.GetName] охопило націю шквалом, кав'ярні з'явилися в містах по всій країні. Мінімальна плата за вхід гарантує, що освічені та неосвічені, багаті та бідні можуть відвідати кав'ярню та приєднатися до жвавих дебатів. Популярні теми обговорення включають філософію, політику, плітки та фінанси. Природне місце зустрічі інтелектуалів, кав'ярня стає синонімом дебатів та навчання."
  innovativeness_events.12.a: "Заохочувати ці зібрання."
  innovativeness_events.12.b: "Поширюються небезпечні ідеї."
  innovativeness_events.13.title: "Наукові інструменти"
  innovativeness_events.13.desc: "З новими розробками в мистецтві склоробства та металообробки з'являється можливість створювати більш досконалі наукові інструменти. Лінзи, що збільшують дуже далеке та дуже мале, є безцінними для наших астрономів та натурфілософів, тоді як хіміки вдосконалюють свою майстерність за допомогою більш складних металевих інструментів. Недавні прориви дали [ROOT.GetCountry.GetName] наукову перевагу у виробництві цього обладнання. Ми можемо лише з нетерпінням чекати відкриттів, які стали можливими."
  innovativeness_events.13.a: "Чи можуть вони вже перетворити свинець на золото?"
  innovativeness_events.14.title: "Фізіократи"
  innovativeness_events.14.desc: "Новий напрямок економіки, відомий як фізіократія, стає популярним серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] . Фізіократи вважають, що основою багатства є сільськогосподарське виробництво, завдяки якому стає можливою вся цивілізація. Найважливішими членами суспільства, отже, є землевласники, які володіють полями та орендують землю. Фізіократи відкидають домінуючу економіку меркантилізму на користь аграрного підходу laissez faire; купці, звичайно, не генерують багатства, а лише транспортують зайву продукцію з місця на місце. Хоча багато хто вважає глибину їхньої економіки вражаючою, інші більше схиляються до відчутних переваг існуючої протекціоністської політики."
  innovativeness_events.14.a: "Можливо, це варто спробувати."
  innovativeness_events.14.b: "Землевласники вже мають занадто багато привілеїв."
  innovativeness_events.15.title: "Кабінет курйозів"
  innovativeness_events.15.desc: "Дослідження нових земель та відкриття торгівлі з далекими народами принесло на наші береги всілякі дивовижні предмети. Стало модно збирати колекції цих часто химерних речей і виставляти їх поряд із більш буденними скарбами, такими як портрети та релігійні ікони. Ці фантастичні колекції включають трофеї дивних або міфічних тварин, артефакти невідомих культур, рідкісні мінерали та яскраво забарвлені мушлі з чужих берегів. Ці кабінетні виставки відвідують не лише допитливі аристократи, а й натуралісти, зацікавлені в їхній науковій цінності. Звісно, іноді виявляється, що улюблений ріг єдинорога [ROOT.GetCountry.GetGovernment.GetRulerTitle] є просто бивнем нарвала."
  innovativeness_events.15.a: "Як це незвично. Негайно замовте один."
  innovativeness_events.15.b: "Це безглуздо. Краще підтримувати релігійні установи."
  innovativeness_events.16.t: "Філософський камінь"
  innovativeness_events.16.desc: "Групи алхіміків зібралися перед двором, бажаючи фінансування для розширення своїх досліджень. Їхня протонаукова мова, оповита містицизмом, говорить про великі багатства, золото з неблагородних металів, ліки від будь-якої чуми, еліксир життя, можливо, навіть відкриття Філософського каменю!\n\nЗвісно, придворні експерти радять не фінансувати цю групу, оскільки вони не мають досвіду корисних алхімічних відкриттів. Фінансування алхіміків, ймовірно, призведе до якогось відкриття, хоча важко сказати, чи справді вони досягнуть своїх заявлених дослідницьких цілей..."
  innovativeness_events.16.a: "Перетворити свинець на золото!"
  innovativeness_events.16.b: "Вилікувати будь-яку хворобу!"
  innovativeness_events.16.c: "Шукати Філософський камінь скрізь!"
  innovativeness_events.16.d: "Дурні! Ви не отримаєте від нас грошей!"
  innovativeness_events.16.event_notifier: "Алхіміки проводитимуть дослідження протягом 6 місяців..."
  innovativeness_events.17.desc: "Алхіміки повернулися з порожніми руками, витративши неймовірну кількість державних коштів на пошуки ілюзії. Зі страху покарання за свою дурість вони втекли до сусідньої країни. Ймовірно, щоб і там просити фінансування.\n\nАле це було не зовсім марне починання, їхня майстерня завалена непов'язаними, але корисними дослідженнями, поряд з великою кількістю сировини, яка, ймовірно, використовувалася для алхімічного завдання, яке ми їм доручили. Ми вже конфіскували їх, навіть якщо вони не можуть компенсувати понесені витрати."
  innovativeness_events.17.a: "Принаймні це не було повною марною тратою..."