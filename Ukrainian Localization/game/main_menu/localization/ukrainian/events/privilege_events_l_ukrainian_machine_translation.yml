l_english:
  privilege_events.100.title: "Запросити німецьких поселенців"
  privilege_events.100.desc: "Через чуму та війну наша країна здебільшого знелюдніла, а невелика кількість селян дуже розсіяна по наших величезних територіях, що ускладнює діяльність, яка вимагає великої кількості робітників, як-от збирання врожаю чи освоєння нових земель.\n\nМи можемо запросити нових поселенців та ремісників з німецьких земель приїхати та створити нові міста в наших володіннях, надавши їм допомогу та особливі привілеї, як-от право керуватися власними законами та нижчі податки."
  privilege_events.100.desc.kulm_law: "Досить перенаселена [german_province.GetName] стала занадто конкурентним середовищем для життя. Ось чому багато хто з [german_province.GetNameWithNoTooltip] та околиць вирішили шукати кращого життя в [target_province.GetName], спокушені нашими щедрими привілеями, наданими в рамках [ShowEstatePrivilegeName('kulm_law')]."
  privilege_events.100.a: "Вітати їх."
  privilege_events.100.b: "Допомогти їм оселитися безпосередньо."
  privilege_events.100.c: "Нам не потрібно більше іноземців."
  privilege_events.100.d: "Ми не можемо знайти більше людей, готових мігрувати."
  enough_migrants_tt: "Мігрантів достатньо"
  not_enough_migrants_tt: "Мігрантів більше немає"
  privilege_events.101.title: "Міграція до [target_province.GetNameWithNoTooltip]"
  privilege_events.101.desc: "Натхненні привілеями, наданими [migration_destination_country.GetLongName], багато поселенців з [scope_german_location.GetProvinceDefinition.GetName] покинули свої сім'ї в надії на краще життя в [target_province.GetName]. Хоча такі міграції дозволені нашими законами, багато таких міграцій можуть призвести до виснаження нашого населення."
  privilege_events.101.a: "Невже ми нічого не можемо зробити?"
  privilege_events.101.tt: "Ця [Concept('event', 'CONCEPT_PLACEHOLDER')|e] спрацювала через те, що [german_province.GetName] відповідає:\n[ShowTriggerConditionsForScope('privilege_events_100_is_in_bad_shape', SCOPE.sProvince('german_province').GetProvince.MakeScope.Self)]"
  privilege_events.110.title: "Нова родина для Книги"
  privilege_events.110.desc: "Новоспечена багата родина [target_dynasty.GetName] стала дуже впливовою у своєму домі [location_scope.GetName], але їхнє низьке походження завадить їм досягти справжньої влади в [ROOT.GetCountry.GetName].\n\nВони надіслали посланця до нашого двору з проханням дозволити додати їхню родину до #italic Libro d'Oro#!, що зробило б їх шляхетними та #italic патриціями#! [ROOT.GetCountry.GetNameWithNoTooltip].\n\nДодавання нової родини таким чином до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] безумовно розлютило б інших членів, але родина [target_dynasty.GetNameWithNoTooltip] також надіслала велику скриню, повну золота, щоб допомогти нам прийняти рішення."
  privilege_events.110.a: "Прийняти та запросити одного з них до двору."
  privilege_events.110.b: "Відкинути цих низькородних вискочок."