l_english:
  espionage_events.1.title: "Половина вірності, подвійний агент"
  espionage_events.1.desc: "Шпигунство може бути найважчим випробуванням на вірність своїй країні. Страх і спокуси постійно оточують шпигунів, і чим краще вони виконують свою роботу, тим вірніше вони з ними зіткнуться. Ці спокуси, звичайно, ми більш ніж охоче надаємо іноземним агентам.\n\nАгент з [espionage_event_country.GetName], країни, де корупція процвітає, нещодавно вирішив піддатися одній з цих спокус. Прагнучи отримати більший прибуток, ніж більшість може сподіватися заробити на хабарах, він запропонував діяти як подвійний агент для нас. Однак \"анонімний\" метод контакту, який він обрав, виявився менш анонімним, ніж очікувалося, тому ми тепер знаємо його ім'я. Як нам діяти?"
  espionage_events.1.a: "Прийняти пропозицію за меншу суму і пощадити його життя."
  espionage_events.1.b: "Стежити за ним кілька днів, перш ніж з ним станеться нещасний випадок."
  espionage_events.2.title: "Другий шанс для зрадника"
  espionage_events.2.desc: "Ми більш ніж усвідомлюємо корупцію, що вражає [ROOT.GetCountry.GetAdjective] суспільство, але ми принаймні сподівалися, що вона не виходить за межі обміну грошима між нашими власними громадянами. Ми помилялися. Співробітники агента, який підтримує нашу шпигунську мережу в [origin_country.GetName], нещодавно довели, що він прийняв суму грошей, яка могла надійти лише від [origin_country.GetAdjective] уряду. Ми повинні визнати, що один з наших найкращих був не таким вірним, як ми сподівалися.\n\nДеякі кажуть, що цю операцію ще можна врятувати. Якщо його зіткнути з доказами його зради, він може бути готовий повернутися до своєї початкової вірності – з додатковою перевагою мати довіру [origin_country.GetAdjectiveWithNoTooltip]. Чи вартий ризик?"
  espionage_events.2.a: "Він буде ще ціннішим для нас тепер."
  espionage_events.2.b: "Він вже завдав достатньо шкоди. Запросіть його додому востаннє."
  espionage_events.3.title: "Двічі зрадник?"
  espionage_events.3.desc: "Складність покладання на людей низького характеру полягає в тому, що їх рідко вдається переконати востаннє. [espionage_event_country.GetAdjective] шпигун, якому ми запропонували велику суму грошей і наше милосердя за те, що він став подвійним агентом проти своєї країни, схоже, був викритий тими, кого він зрадив. Наші інші шпигуни повідомляють, що йому запропонували продовжувати працювати для обох націй, але з його справжньою вірністю, що повернулася до його рідної країни.\n\nЩо пропозиція була зроблена, сумнівів немає. Те, що він вийшов з цього живим, означає, що він, принаймні, прикинувся, що прийняв. Незважаючи на це, він все ще може працювати на нас і може передавати ворогу лише символічну інформацію. Чи можемо ми дозволити собі ризикувати?"
  espionage_events.3.a: "Це стає смішно, як і думка довіряти йому."
  espionage_events.3.tt_1: "Якщо агент тепер вірний їм:"
  espionage_events.3.b: "Він знову їх обдурив? Він досить вправний."
  espionage_events.3.tt_2: "Якщо агент все ще вірний нам:"
  espionage_events.4.title: "Таємниця сповіді"
  espionage_events.4.desc: "Релігійні установи вважаються священними та вищими за дрібні змови та інтриги країн і шпигунів. Ось чому так важливо їх інфільтрувати. Багато таємниць, які ніколи б не були вимовлені вголос, розповідаються довірено релігійним авторитетам, що практика сповіді навіть перетворила на інституцію.\n\nЦерква в [victim_country.GetName], країні, на якій ми зосередили наші шпигунські зусилля, надала безпрецедентну можливість використати це. Одна з наших вірних агентів, що видає себе за черницю в місцевому монастирі, виявила, що вона може підслуховувати розмови з сповідалень, виконуючи домашні справи в церкві. Хоча вона, ймовірно, уникне виявлення, план обурив би релігійні авторитети, якщо б його виявили. Чи варто ризикувати?"
  espionage_events.4.a: "Їхні гріхи можуть бути цікавими, навіть якщо ми не можемо їх відпустити..."
  espionage_events.4.b: "Неймовірно! Вона повинна повідомити священикам, що їх чути."
  espionage_events.5.title: "Папа виявляє змову"
  espionage_events.5.desc: "Наш план використання інформації зі сповідалень для покращення збору розвідувальних даних у [victim_country.GetName] призвів до дипломатичної катастрофи з Папством, оскільки нашого агента виявили через кілька місяців після початку операції. Зіткнувшись з гнівом Церкви, вона зникла з монастиря разом зі своїми речами; чи це її власна дія, чи дії ворога, ми ніколи не дізнаємося.\n\nОднак ми можемо бути впевнені, що Церква дізналася достатньо, щоб зрозуміти, що ми стояли за тим, що сталося. Папа шокований тим, що ми експлуатували Церкву та її практики таким чином. [ROOT.GetCountry.GetGovernment.GetRulerTitle] користується деякою правдоподібною заперечністю, але репутація країни все одно безповоротно постраждала."
  espionage_events.5.a: "Чи не пізно просити прощення?"
  espionage_events.8.title: "Шпигун підозрює сусідів"
  espionage_events.8.desc: "Наявність шпигуна на нашій службі переважно сприяла збору розвідувальних даних за кордоном, але наш Шпигун іноді координує і контррозвідку. Нещодавно розслідування виявили змову, яка могла бути роботою лише однієї з наших сусідніх країн. Який саме сусід стоїть за цим, залишається незрозумілим, але постійний обмін інформацією вимагав би, щоб ті, хто стоїть за цим, були поруч.\n\nНаш шпигун підготувався затримати та жорстко допитати низку іноземних чиновників, які можуть бути причетні, але суперечливі теорії щодо винуватців залишають [ROOT.GetCountry.GetGovernment.GetRulerTitle] вирішувати, кого цілити. Наші сусіди, ймовірно, не оцінять звинувачень, але щось потрібно робити, і швидко."
  espionage_events.8.a: "З багатьох можливих підозрюваних, цей..."
  counterintelligence_operation: "Контррозвідувальна операція"
  espionage_events.8.b: "...або цей здається найвірогіднішим."
  espionage_events.9.title: "Таємниці в нашому союзі"
  espionage_events.9.desc: "Посли та дипломатичні посланці часто виконують роль шпигунів, або принаймні інформаторів, які виходять за межі своїх обов'язків, щоб збирати інформацію в країні, де вони повинні вести чесні переговори. Тож не дивно, що [spying_ambassador.GetAdjective] посла тут, у [ROOT.GetCountry.GetCapital.GetName], підозрюють у причетності до шпигунства. Завдання тепер полягає в тактовному вирішенні цього відкриття, оскільки лише ретельний перехресний допит може встановити вину."
  espionage_events.9.a: "Ми повинні докопатися до суті. Заарештувати посла."
  espionage_events.9.b: "Надіслати запит про його заміну."
  espionage_events.9.c: "Просто спробувати відсторонити його від важливих справ."
  espionage_events.10.title: "Посол зізнається"
  espionage_events.10.desc: "Після арешту та усунення з комфорту його посади, посол, якого ми підозрювали у причетності до шпигунства, швидко визнав свою провину під час допиту. Більше того, його зізнання вказує на те, що шпигунська мережа, частиною якої він був, була набагато ширшою, ніж підозрювалося раніше. Хоча це, безумовно, є ганьбою для [spying_ambassador.GetName], вони просять нас вирішити ситуацію мирно, негайно відправивши посла додому.\n\nХоча це добра практика не вбивати та не ув'язнювати дипломатів, коли цього можна уникнути, ця людина виявилася ворогом нашої нації. Що важливіше, він все ще може мати інформацію, яка є цінною для нас. Чи варто нам відпустити його, щоб залагодити ситуацію?"
  espionage_events.10.a: "Ні. Ворожий шпигун, який ламається під тиском, є цінним джерелом."
  imprisoned_ambassador: "Ув'язнений посол"
  espionage_events.10.b: "Ми всі шпигуємо один за одним. Ми можемо пробачити і забути."