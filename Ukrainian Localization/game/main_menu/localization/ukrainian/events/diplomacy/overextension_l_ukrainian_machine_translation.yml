l_english:
  overextension.1.title: "Дезертирство військ"
  overextension.1.desc: "Наша ганьба викликає широке обурення нашими військовими зусиллями. Чимало чоловіків просто тікають до лісу замість того, щоб з'явитися на службу."
  overextension.1.a: "Вони все одно були б боягузами."
  overextension.2.title: "Широкий опір"
  overextension.2.desc: "Наша нація надзвичайно сумнозвісна, і чимало людей у [ROOT.GetCountry.GetName] висловили своє несхвалення цьому."
  overextension.2.a: "Нам потрібні кращі батоги..."
  overextension.3.title: "Погана репутація!"
  overextension.3.desc: "Наша нещодавня стратегія вирізати нові провінції з тих, хто трапляється на шляху, напрочуд, схоже, мала дещо негативний вплив на наше становище серед інших націй."
  overextension.3.a: "Вони, як завжди, надмірно реагують!"
  overextension.4.title: "Інфляція"
  overextension.4.desc: "Стан постійної війни підірвав нашу економіку, і тепер інфляція виходить з-під контролю!"
  overextension.4.a: "Спробуйте карбувати більше монет!"
  overextension.5.title: "Дезертирство офіцерів"
  overextension.5.desc: "Розчаровані повторюваними та, здавалося б, безцільними війнами [ROOT.GetCountry.GetName], багато офіцерів в армії дезертували, щоб шукати кращих призначень в інших місцях."
  overextension.5.a: "Ба, у нас є інші офіцери!"
  overextension.6.title: "Ненависть до купців"
  overextension.6.desc: "Очевидно, посилаючись на огиду до нескінченних завойовницьких війн [ROOT.GetCountry.GetName], деякі ринки вирішили вигнати наших купців."
  overextension.6.a: "Тоді я завоюю і їх!"
  overextension.7.title: "Купців убито!"
  overextension.7.desc: "Деякі країни, очевидно, настільки вражені нашою зовнішньою політикою, що вирішили помститися, вбиваючи наших купців у спробі завдати удару по наших фінансах!\n\nЩо робить це ще більш шокуючим, так це те, що це відбувається навіть на наших власних ринках..."
  overextension.7.a: "Голови полетять! Сподіваюся, не моя..."
  overextension.8.title: "Легітимність під питанням"
  overextension.8.desc: "Кровожерливість, виявлена [target_ruler.GetName], зруйнувала репутацію [ROOT.GetCountry.GetName] в очах світу, і тепер наші власні піддані починають ставити під сумнів легітимність такого безжального правителя."
  overextension.8.a: "Це не ідеально..."
  overextension.9.title: "Магістрати подають у відставку"
  overextension.9.desc: "Магістрати є справжніми жилами країни, і, на жаль, усі наші подають у відставку!\n\nВони стверджують, що це протест проти тягаря нескінченних війн, який на них покладено."
  overextension.9.a: "Я сам можу зробити все, що вони робили!"
  overextension.10.title: "Радник подає у відставку"
  overextension.10.desc: "Жахнувшись нашою завойовницькою зовнішньою політикою, провідний придворний радник подав у відставку і відмовляється служити нашій країні!"
  overextension.10.a: "Типовий скептик... Скатертиною дорога!"
  merchant_recalled: "Купці обурені"
  overextension.11.title: "Стан [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] розчарований"
  overextension.11.desc: "Через наші ганебні вчинки, наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] помічають, що це впливає на їхні власні відносини зі шляхтою в інших країнах. Це явно не ідеальна ситуація!"
  overextension.11.a: "$common_string_what_can_we_do$"
  overextension.12.title: "Ганьба є [ROOT.GetCountry.GetReligion.GetSinPrefixName][ROOT.GetCountry.GetReligion.GetSinName|U]"
  overextension.12.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] досить голосно заявляє, що наш [Concept('antagonism', 'CONCEPT_PLACEHOLDER')|e], який створює нашу ганьбу в очах людей, також є [ROOT.GetCountry.GetReligion.GetSinPrefixName][ROOT.GetCountry.GetReligion.GetSinName]!"
  overextension.12.a: "Це воля [ROOT.GetCountry.GetReligion.GetGodName]"
  overextension.13.title: "Ганьба має наслідки!"
  overextension.13.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] стверджує, що наш [Concept('antagonism', 'CONCEPT_PLACEHOLDER')|e] призвів до зменшення можливостей для торгівлі, впливаючи на фінансове благополуччя нашої країни!"
  overextension.13.a: "Це компроміс, з яким ми можемо жити."
  overextension.14.title: "Ганьба суперечить [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Традиціям"
  overextension.14.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] стверджує, що наш [Concept('antagonism', 'CONCEPT_PLACEHOLDER')|e] суперечить традиціям нашої країни, і це не те, що ми мали в старі добрі часи."
  overextension.14.a: "Часи змінилися"