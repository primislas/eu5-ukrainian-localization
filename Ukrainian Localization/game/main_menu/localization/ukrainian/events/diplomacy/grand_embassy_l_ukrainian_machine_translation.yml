l_english:
  grand_embassy.1.title: "Велике посольство"
  grand_embassy.1.desc: "При дворі висунуто ідею відправити [ROOT.GetCountry.GetGovernment.GetRuler.GetName] у подорож Європою разом із великою делегацією — Великим посольством — аби налагодити кращі стосунки з іншими європейськими лідерами, особливо з тими, хто має спільних із нами ворогів. Ще однією перевагою може стати можливість вивчити технологічні досягнення, зроблені в [ShowSubContinentName('western_europe')], щоб допомогти нам модернізуватися."
  grand_embassy.1.a: "Вирушити в подорож Європою"
  grand_embassy.1.b: "Наша країна володіє знаннями, які нам потрібні"
  grand_embassy.2.title: "Велике посольство прибуває до [ROOT.GetCountry.GetCapital.GetName]"
  grand_embassy.2.desc: "Велике посольство прибуло з [from.GetName] на чолі з [from.GetGovernment.GetRuler.GetName] [from.GetGovernment.GetRuler.GetHerselfHimself]. [from.GetGovernment.GetRuler.GetSheHeCap] подорожує континентом, аби налагодити кращі стосунки з іншими європейськими державами, особливо з тими, хто має спільних ворогів. Як нам зустріти [from.GetGovernment.GetRuler.GetHerHim]?"
  grand_embassy.2.a: "Запросити [from.GetGovernment.GetRuler.GetHerHim] залишитися"
  received_grand_embassy: "Прийнято Велике посольство"
  grand_embassy.2.b: "Ввічливо відмовити [from.GetGovernment.GetRuler.GetHerHim]"
  rejected_grand_embassy: "Відхилено Велике посольство"
  grand_embassy.2.c: "Відправити [from.GetGovernment.GetRuler.GetHerHim] геть!"
  grand_embassy.3.title: "Велике посольство в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  grand_embassy.3.desc: "Приголомшений нашим теплим прийомом, [from.GetGovernment.GetRuler.GetName] повідомив нам, що бажає продовжити свій візит до [ROOT.GetCountry.GetCapital.GetName]. У [from.GetGovernment.GetRuler.GetHerHis] прагненні модернізувати [from.GetLongName], [from.GetGovernment.GetRuler.GetSheHe] дуже прагне отримати можливість вивчити технологічні досягнення [ShowSubContinentName('western_europe')]."
  grand_embassy.3.a: "Запросити [from.GetGovernment.GetRuler.GetHerHim] залишитися та вивчити наші державні установи"
  grand_embassy.3.a.tt: "[from.GetGovernment.GetRuler.GetName] дізнається про наші державні установи"
  invited_to_study_institutions: "Запрошено вивчати установи"
  grand_embassy.3.b: "Запросити [from.GetGovernment.GetRuler.GetHerHim] залишитися та вивчити нашу армію"
  grand_embassy.3.b.tt: "[from.GetGovernment.GetRuler.GetName] дізнається про організацію нашої армії"
  grand_embassy.3.c: "Запросити [from.GetGovernment.GetRuler.GetHerHim] залишитися та вивчити наш флот"
  grand_embassy.3.c.tt: "[from.GetGovernment.GetRuler.GetName] дізнається про організацію нашого флоту"
  grand_embassy.3.d: "[from.GetGovernment.GetRuler.GetSheHe|U] затримався(-лася) довше, ніж було бажано..."
  grand_embassy.4.title: "Щедра пропозиція залишитися"
  grand_embassy.4.desc: "Почувши про реформи [ROOT.GetCountry.GetGovernment.GetRuler.GetName] з модернізації [ROOT.GetCountry.GetLongName], [embassy_country.GetName] люб'язно запросило нас продовжити наше перебування в [embassy_country.GetCapital.GetName], щоб скористатися нагодою вивчити їхні технологічні досягнення."
  grand_embassy.4.a: "Залишимося та вивчимо [target_institution.GetNameWithNoTooltip]"
  grand_embassy.4.b: "Залишимося та вивчимо їхню армію"
  grand_embassy.4.c: "Дозвольте нам залишитися та вивчити їхній флот"
  grand_embassy.4.d: "Ні, ми маємо інші країни для відвідування"
  grand_embassy.4.e: "Настав час повертатися додому"
  grand_embassy.5.title: "Прохання про продовження перебування відхилено"
  grand_embassy.5.desc: "У наших спробах модернізувати [ROOT.GetCountry.GetName], вивчення технологічних досягнень у [ShowSubContinentName('western_europe')] могло б бути цінним. На жаль, прохання продовжити наше перебування в [embassy_country.GetCapital.GetName] з цією метою було відхилено."
  grand_embassy.5.a: "Дуже добре, ми маємо інші країни для відвідування"
  grand_embassy.5.b: "Настав час повертатися додому"
  grand_embassy.6.title: "Продовжений візит окупився"
  grand_embassy.6.desc: "Продовжений візит [ROOT.GetCountry.GetGovernment.GetRuler.GetName] до [embassy_country.GetCapital.GetName] для особистого вивчення їхніх технологічних досягнень, схоже, був вартий витраченого часу."
  grand_embassy.6.a: "Наші урядові установи отримають від цього користь!"
  grand_embassy.6.b: "Наші збройні сили отримають від цього користь!"
  grand_embassy.6.c: "Наш флот отримає від цього користь!"
  grand_embassy.7.title: "Велике посольство успішне"
  grand_embassy.7.desc: "Наш візит до [embassy_country.GetCapital.GetCapitalName] був успішним, але настав час рухатися далі. Питання в тому, куди?"
  grand_embassy.7.a: "Ми все ще маємо інші країни для відвідування"
  grand_embassy.7.b: "Настав час повертатися додому"