l_english:
  diplomatic_annex.1.title: "Анексія [target.GetNameWithNoTooltip]"
  diplomatic_annex.1.desc: "Інтеграція [target.GetLongName] зайняла чимало часу, але тепер, коли [target.GetCapital.GetName] є [ROOT.GetCountry.GetAdjective] [target.GetCapital.GetRank.GetNameWithNoTooltip], воно розкриє свій повний потенціал і змусить нашу націю процвітати ще більше.\n\nПроте є й інші країни, які не оцінили це розширення нашої території."
  diplomatic_annex.1.a: "Oderint dum metuant!"
  every_subject_hates_us_tt: "Наші [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] змінюють свою [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] щодо [ROOT.GetCountry.GetLongName] на [ShowBiasValue('opinion_annexed_other_subject')|+=0]"
  every_annex_target_neighbor_hates_us_tt: "Кожна сусідня [Concept('country', 'CONCEPT_PLACEHOLDER')|e] [Concept('target.GetName] змінює свою [opinion', 'CONCEPT_PLACEHOLDER')|e] щодо [ROOT.GetCountry.GetLongName] на [ShowBiasValue('opinion_annexed_neighbor')|+=0]"
  opinion_annexed_neighbor: "Анексований сусід"
  opinion_annexed_other_subject: "Анексовано іншого [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]"
  historical_rival_events.1.title: "[rivalling_country.GetAdjectiveWithNoTooltip]-[target_country.GetAdjectiveWithNoTooltip] Суперництво"
  historical_rival_events.1.desc: "Роки конфліктів, суперництва та ворожої конкуренції призвели до неминучого розвитку постійної ворожнечі [rivalling_country.GetLongName] проти [target_country.GetName]. Лише час покаже, чи зможуть [rivalling_country.GetAdjectiveWithNoTooltip]-[target_country.GetAdjectiveWithNoTooltip] відносини колись залікуватися, чи погіршаться на полі бою..."
  historical_rival_events.1.a: "Око за око, зуб за зуб!"
  historical_rival_events.1.b: "Прикрий розвиток подій..."
  historical_rival_events.2.title: "Кінець [rivalling_country.GetAdjectiveWithNoTooltip]-[target_country.GetAdjectiveWithNoTooltip] Суперництва"
  historical_rival_events.2.desc: "Багато років тому [rivalling_country.GetAdjective] та [target_country.GetAdjective] правителі могли спілкуватися лише образами та погрозами один до одного, поки їхні відповідні нації зіштовхувалися на полях битв, ринках, в посольствах і тому подібному. Однак нині ці конфлікти втратили своє значення, і [rivalling_country.GetNameWithNoTooltip] відкинув давні образи проти нас."
  historical_rival_events.2.a: "Настав час рухатися далі."
  historical_rival_events.2.b: "Ніколи не забувай. Ніколи не пробачай."