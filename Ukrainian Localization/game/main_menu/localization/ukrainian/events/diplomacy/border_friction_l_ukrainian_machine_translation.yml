l_english:
  border_friction.1.title: "Прикордонні тертя"
  border_friction.1.desc: "Не всі задоволені тим, що ми об'єдналися з [border_claim_country.GetLongName]. Впливова фракція наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] наполягає на припиненні союзу, зосереджуючись на провінції [border_claim_province.GetName], яка належить [border_claim_country.GetNameWithNoTooltip], але яку багато хто вважає по праву нашою. Їм вдалося викликати широке обурення ситуацією!"
  border_friction.1.a: "Можливо, настав час змінити політику..."
  border_friction_from_event: "Роздратовані через претензії"
  border_friction.1.b: "Погляньмо на речі позитивно!"
  border_friction.1.c: "Відмовитися від наших претензій."
  border_friction.2.title: "$border_friction.1.title$"
  border_friction.2.desc: "«[border_claim_province.GetName], наша законна територія, утримується іншими націями, і наш уряд, схоже, не докладає жодних зусиль для її повернення! Яка від них користь взагалі?» – проголошує газета, закликаючи до війни з [border_claim_country.GetLongName].\n\nПідбурювана цими інвективами, широка незадоволеність нашою неспроможністю повернути наші заявлені провінції охоплює націю."
  border_friction.2.a: "$border_friction.1.a$"
  border_friction.2.b: "$border_friction.1.b$"
  border_friction.2.c: "Відкликати претензію."