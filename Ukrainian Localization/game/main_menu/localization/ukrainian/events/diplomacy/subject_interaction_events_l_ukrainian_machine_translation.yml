l_english:
  subject_interaction_events.1.title: "Претендент повстає"
  subject_interaction_events.1.desc: "Колишній монарх [ROOT.GetCountry.GetName] мав [target_previous_ruler.GetHerHis] прихильників, і багато з них вважають, що вони мають кращі права на трон [ROOT.GetCountry.GetName], ніж [target_ruler.GetName]. Їм вдалося зібрати досить велику кількість послідовників, і вони йдуть до [ROOT.GetCountry.GetCapital.GetName], маючи намір посадити на трон 'справжнього' правителя."
  subject_interaction_events.1.a: "Попросити допомоги у [ROOT.GetCountry.GetDiplomacy.GetOverlord.GetLongNameWithNoTooltip]."
  subject_interaction_events.ask_overlord_for_help: "Ми відправимо посланця до нашого сюзерена, щоб благати про допомогу!"
  subject_interaction_events.1.b: "Впораємося самі."
  subject_interaction_events.2.title: "[subject_in_need.GetName] просить допомоги"
  subject_interaction_events.2.desc: "Повстанська армія на чолі з претендентом йде до столиці [subject_in_need.GetName] – [subject_in_need.GetCapital.GetName]! Членам родини скинутого монарха [subject_in_need.GetName] вдалося зібрати досить велику кількість послідовників, і тепер вони намагаються скинути [subject_in_need.GetGovernment.GetFullRulerName]."
  subject_interaction_events.2.a: "Надіслати їм золото та солдатів."
  opinion_sent_help: "Надіслано допомогу"
  subject_interaction_events.2.b: "Їм доведеться впоратися з цим самим."
  opinion_refused_send_help: "Відмовлено в допомозі в наш скрутний час"
  subject_interaction_events.3.title: "Допомога прибуває?"
  subject_interaction_events.3.desc: "Повстанці-претенденти наближаються до нас, і посланець, відправлений до [ROOT.GetCountry.GetDiplomacy.GetOverlord.GetName], має незабаром повернутися. Якщо нам пощастить, можливо, посланець привезе солдатів і золото від [ROOT.GetCountry.GetDiplomacy.GetOverlord.GetName], що допоможе нам відбити цих клятих повстанців!"
  subject_interaction_events.3.a: "[ROOT.GetCountry.GetDiplomacy.GetOverlord.GetGovernment.GetFullRulerName] надіслав нам золото та солдатів!"
  subject_interaction_events.3.b: "[ROOT.GetCountry.GetDiplomacy.GetOverlord.GetGovernment.GetFullRulerName] відмовився надіслати нам допомогу!"
  subject_interaction_events.4.title: "Некомпетентний родич"
  subject_interaction_events.4.desc: "Наш вельмишановний [subject_target.GetGovernment.GetFullRulerName], що править нашим суб'єктом [subject_target.GetName], виявився некомпетентним блазнем, який не може і не повинен правити жодною країною."
  subject_interaction_events.4.a: "Замінити їх на [better_ruler.GetName]"
  subject_interaction_events.4.b: "Це може лише принести безлад у країну. Залишити як є."
  subject_interaction_events.5.title: "Компетентний родич"
  subject_interaction_events.5.desc: "Було проведено реформи, звільнено непотрібних міністрів та радників, армія та флот ніколи не були кращими... Здається, наш [subject_target.GetGovernment.GetFullRulerName] добре служить нашому суб'єкту [subject_target.GetName], правлячи твердою рукою та приймаючи компетентні рішення."
  subject_interaction_events.5.a: "Якщо ми колись і мали сумніви, то тепер вони давно забуті."
  subject_interaction_events.7.title: "Військова підтримка використана не за призначенням"
  subject_interaction_events.7.desc: "Підтримка, яку ми надіслали нашій державі-суб'єкту, була використана так, як ми ніколи не могли передбачити! Чоловіків змушували будувати дороги та будівлі, прибирати міські площі від сміття та відходів, і жодного разу вони не бачили битви. Хоча дороги стали ширшими та кращими, будівлі міцнішими, а міські площі бездоганними, хіба так мали використовувати цих людей?"
  subject_interaction_events.7.a: "Вкажіть їм, як використовувати їх правильно!"
  opinion_reprimanded: "Відчитано за неправильне використання підтримки"
  subject_interaction_events.7.b: "Вони винахідливі, і це добре!"
  opinion_resourceful: "Використано підтримку винахідливо"
  subject_interaction_events.8.title: "Винахідливий чи відчитаний"
  subject_interaction_events.8.desc: "[our_overlord.GetGovernment.GetFullRulerName] з [our_overlord.GetName] надіслав нам ресурси для покращення нашої армії, але в ці мирні часи не було потреби в солдатах. Замість того, щоб байдикувати, нічого не роблячи, крім тренувань, їжі та сну, ми знайшли їм застосування. Вони будували дороги та будівлі, прибирали міські площі від сміття та інших значущих завдань, які інакше зайняли б більше часу та грошей, яких [ROOT.GetCountry.GetName] не має."
  subject_interaction_events.8.a: "[our_overlord.GetGovernment.GetFullRulerName] вважає, що ми змарнували робочу силу."
  subject_interaction_events.8.b: "[our_overlord.GetGovernment.GetFullRulerName] похвалив нас за винахідливість."
  subject_interaction_events.9.title: "Військова загроза"
  subject_interaction_events.9.desc: "Ми не мали нестачі в робочій силі з того часу, як наш сюзерен почав субсидувати нашу армію, але серед солдатів виникло багато проблем з прибуттям нових. Їхня культура, мова, традиції, а іноді навіть релігія відрізняються від наших власних солдатів, і це створює для нас багато проблем. Вони менш дисципліновані або просто відмовляються виконувати накази наших генералів."
  subject_interaction_events.9.a: "Відправити їх туди, звідки вони прийшли."
  opinion_purged_manpower: "Вичищено корисних, але погано дисциплінованих солдатів"
  subject_interaction_events.9.b: "Спробувати змусити їх поводитися."
  subject_interaction_events.10.title: "Солдати спричиняють безлад у [subject_target.GetName]"
  subject_interaction_events.10.desc: "Завжди виникають проблеми, коли люди з різних культур, з різними мовами, традиціями, а іноді навіть релігією збираються разом і повинні працювати як єдине ціле, навіть коли так багато речей відрізняються від них. Робоча сила, яку ми відправили до [subject_target.GetName], спричинила більше проблем, ніж [subject_target.GetGovernment.GetFullRulerName] був готовий вирішувати, і тому деяких чоловіків відправили назад до нас."
  subject_interaction_events.10.a: "Наші люди можуть виконувати накази, вони недостатньо старалися!"
  subject_interaction_events.14.title: "Ембарго та контрабандисти"
  subject_interaction_events.14.desc: "Нещодавні ембарго проти суперників нашого сюзерена можуть стати для нас фінансовим кінцем. На щастя, у [ROOT.GetCountry.GetName] є шановні особи, які люб'язно допоможуть нам з нашою торговою проблемою. Хоча це може бути безглуздо називати таку невелику операцію \"контрабандою\", це саме те, що це є, і оскільки ми можемо порушувати деякі ембарго, яких вимагав від нас наш сюзерен, вони, ймовірно, не будуть задоволені нашою неправомірною поведінкою."
  subject_interaction_events.14.a: "Така нагода рідко з'являється, ми повинні прийняти!"
  subject_interaction_events.14.ct: "Є невеликий шанс, що наш сюзерен може це помітити"
  subject_interaction_events.14.b: "Це не варте ризику гніву нашого сюзерена."
  subject_interaction_events.15.title: "Контрабандисти нашого васала"
  subject_interaction_events.15.desc: "Наші ембарго проти наших суперників працюють не так добре, як ми сподівалися, і однією з причин може бути те, що один з наших васалів все ще торгує з ними! Вони контрабандою перевозять товари туди-сюди, тим самим заважаючи нашим цілям і роблячи нас слабкими. Контрабанда дуже незначна, але може стати дуже шкідливою для нас.\nЗ іншого боку, потужні ділові інтереси були б готові заплатити за ігнорування контрабанди."
  subject_interaction_events.15.a: "Примусити їх негайно припинити контрабанду!"
  opinion_smuggling_hindered: "Перешкоджено контрабанді"
  subject_interaction_events.15.b: "Вони можуть продовжувати це невелике починання."
  opinion_small_smuggling_ok: "Контрабанда в малих масштабах дозволена"
  subject_interaction_events.16.title: "Викрито!"
  subject_interaction_events.16.desc: "Нашу контрабандну операцію викрила [From.Country.GetName], контрабандистів буквально спіймали на гарячому під час розвантаження товарів, які мали бути доставлені одному з суперників [From.Country.GetName]. Боягузи зізналися в усьому, навіть у тому, як довго тривала ця операція."
  subject_interaction_events.16.a: "Вони змушують нас припинити цю контрабанду!"
  subject_interaction_events.16.b: "Поки ми тримаємо її в малих масштабах, ми можемо продовжувати."
  subject_interaction_events.17.title: "Війна ніколи не змінюється"
  subject_interaction_events.17.desc: "В обмін на мир і спокій наші васали зобов'язані платити нам, своєму сюзерену, більше доходу. Їх не закликають до жодної з наших війн, що, на нашу думку, є чудовим компромісом – за деяке золото вони виключені майже з усіх війн. Один з наших васалів дивується, чи не було б краще, якби їх закликали до війн замість того, щоб платити ці – на їхню думку – «смішні суми»."
  subject_interaction_events.17.a: "Невдячні дурні!"
  subject_interaction_events.18.title: "Переваги щитових грошей"
  subject_interaction_events.18.desc: "Поки наші спустошені війною землі повільно відбудовуються, ми помітили погляд в очах посла нашого васала, погляд розуміння та страху, змішаний з деяким полегшенням від того, що земля, на яку вони дивляться, не їхня власна. «Тепер, – кажуть вони, – золото, яке ми платимо за щитові гроші, щоб уникнути призову на війну, здається невеликою сумою, чимось, з чим ми легко могли б розлучитися в обмін на мир»."
  subject_interaction_events.18.a: "Ми ж казали їм, що це спрацює!"
  opinion_scutage_benefits: "Переваги щитових грошей"
  subject_interaction_events.20.title: "Марнотратство лоялістів"
  subject_interaction_events.20.desc: "Ми платимо лоялістам, щоб підтримувати низький і керований рівень прагнення до свободи в країні нашого молодшого партнера, але останні звіти стають все більш відчайдушними у своїх благаннях про гроші. Гроші, які вони, мабуть, марнують, не використовуючи їх для забезпечення збереження відносин між нашою країною та їхньою!"
  subject_interaction_events.20.a: "Переконайте їх краще планувати щомісячні платежі."
  subject_interaction_events.20.b: "Надішліть їм невелику суму, щоб забезпечити їхню лояльність."
  subject_interaction_events.21.title: "Збентеження лоялістів"
  subject_interaction_events.21.desc: "Хоча ми всі цінуємо патріотів, лоялістів, тих, хто любить свою країну і захищатиме її за будь-яку ціну, коли їм вдається збентежити нас перед усім двором, їхня привабливість сильно зменшується. Це не те, за що ми платимо, та значна сума, яка щомісяця зникає в їхніх жадібних кишенях! Відносини, які ми намагаємося захистити, варті більше, ніж їхні голови, повні вошей."
  subject_interaction_events.21.a: "Геть їхні голови і повісити їх на стінах [ROOT.GetCountry.GetCapital.GetName]!"
  opinion_embarrasing_loyalists: "Промах лоялістів"
  subject_interaction_events.21.b: "Напевно, ми можемо щось зробити, щоб забути і пробачити цю прикру подію?"
  subject_interaction_events.22.title: "Успішні лоялісти"
  subject_interaction_events.22.desc: "Гроші, надіслані лоялістам в одній з країн, що є нашим суб'єктом, були витрачені добре, краще, ніж ми могли собі уявити та передбачити. Прагнення до свободи їхнього народу знизилося значно більше, ніж ми вважали можливим."
  subject_interaction_events.22.a: "Це приємний сюрприз!"
  subject_interaction_events.24.title: "Жорстока поведінка грубих офіцерів"
  subject_interaction_events.24.desc: "«Багато малих струмків створюють велику повінь» — прислів’я, що, на жаль, виявилося правдивим у нашому протектораті. Дрібні події, ледь помітні для нас, але великі образи для тих, хто їх бачив або зазнав, разом зі старими скаргами та гіркими спогадами з часів, коли країна стала нашим протекторатом, стали останньою краплею. Жахлива, ні, жорстока поведінка офіцерів, яких ми послали, призвела до розколу та поганих стосунків між нами та протекторатом."
  subject_interaction_events.24.a: "Нам потрібно навчити наших офіцерів, як стати джентльменами!"
  opinion_cruel_officers: "Жорстокі офіцери"
  subject_interaction_events.25.title: "Джентльмен і офіцер"
  subject_interaction_events.25.desc: "Кодекс поведінки, який ми намагалися вкарбувати в свідомість кожного офіцера, перш ніж вони залишили нашу країну, щоб працювати армійськими інструкторами в одному з наших протекторатів, можливо, не був марною тратою часу. Ми отримали повідомлення, що схвалює та висловлює захоплення поведінкою та суворою дисципліною, яку демонструють ці офіцери, і ми як ціла країна повинні пишатися тим, що нам вдалося зробити джентльменів з наших офіцерів."
  subject_interaction_events.25.a: "Ми не могли б пишатися більше."
  opinion_excellent_officers: "Чудові офіцери"
  subject_interaction_events.26.title: "Чим більше ми продаємо, тим більше ми сіємо, тим більше ми ростемо"
  subject_interaction_events.26.desc: "Ми контролюємо торгівлю нашого протекторату, і чим більше нам вдається експортувати всього, що вони вирощують і виробляють, тим більший урожай! Якимось чином нам вдалося збільшити як якість, так і кількість їхньої продукції, а також збільшити нашу торговельну силу."
  subject_interaction_events.26.a: "Кількість і якість – ось шлях."
  opinion_export_good: "Збільшення виробництва через експорт"
  subject_interaction_events.27.title: "Посилення ефектів експорту"
  subject_interaction_events.27.desc: "Торговці та купці наших протекторатів зазнали значного удару по своїй торгівлі, коли ми вирішили взяти під контроль торговельну силу їхньої країни. Їхні скарги на «труднощі», які ця меркантильна політика принесла їм, дійшли до правителя протекторату, який погоджується з ними і дав зрозуміти, що наші стосунки з ними страждають через це."
  subject_interaction_events.27.a: "Поки вони лише скаржаться, нам байдуже."
  opinion_export_bad: "Економіка страждає через перенаправлену торгівлю"
  subject_interaction_events.29.title: "Легітимність під питанням"
  subject_interaction_events.29.desc: "Хоча наша влада над троном [ROOT.GetCountry.GetName] може слабшати, а наша легітимність піддаватися сумніву, наша гордість і престиж постраждали, коли один з наших підданих публічно виступив проти нас. Вони стверджують, що ми не маємо права намагатися керувати ними, оскільки ледве справляємося з власною країною."
  subject_interaction_events.29.a: "Докорити їм за публічний виступ проти нас."
  opinion_low_legitimacy: "Низька легітимність"
  subject_interaction_events.29.b: "Можливо, вони мають рацію, і це не повинно впливати на їхню думку про нас."
  subject_interaction_events.30.title: "Яма під назвою «Банкрутство»"
  subject_interaction_events.30.desc: "Правитель, що прагне найкращого, що може надати країна, скарбниця, керована жадібними та некомпетентними особами, невдалі інвестиції та занадто багато позик... Ось як виривають яму під назвою «банкрутство», і, можливо, все це або лише одне з цього змусило одного з наших підданих спіткнутися в яму і впасти аж на дно. Ми можемо допомогти їм частково вибратися з цієї ями, пожертвувавши гроші, або проігнорувати це і змусити їх допомогти собі самим."
  subject_interaction_events.30.a: "Втрутитися, надіслати їм гроші та драбину!"
  opinion_money_sent: "Надіслали нам гроші в наш час потреби"
  subject_interaction_events.30.b: "Їм нема кого звинувачувати, крім себе!"
  opinion_no_money: "Не надіслали грошей у час нашої скрути"
  subject_interaction_events.32.title: "Піддані обертаються проти нас"
  subject_interaction_events.32.desc: "Наше розпалювання війни, як кажуть, викликало гнів серед наших підданих. За чутками, вони вважають, що ми мало дбаємо про справедливе правління, а більше про завоювання, як варвари. Хоч це й неправдиво та грубо, було б нерозумно залишити це без уваги."
  subject_interaction_events.32.a: "Покарати їх для прикладу."
  opinion_tyrant_overlord: "Тиран-сюзерен"
  subject_interaction_events.32.b: "Ми впевнені, що зможемо все владнати."
  subject_interaction_events.33.title: "Сюзерен карає нас для прикладу"
  subject_interaction_events.33.desc: "Через невдоволення наш сюзерен вважав за потрібне покарати нашу націю для прикладу. Це ганьба."
  subject_interaction_events.33.a: "Око за око..."
  subject_interaction_events.34.title: "Вірні піддані"
  subject_interaction_events.34.desc: "Добре відомо, що наші піддані є одними з найзадоволеніших і найвірніших у світі. Вбити клин між нами та ними, на щастя, практично неможливо, і це добре відображається на нашій нації."
  subject_interaction_events.34.a: "Цей час буде пам'ятним"
  subject_interaction_events.34.b: "Це слід використати"
  subject_interaction_events.35.title: "Невірні піддані"
  subject_interaction_events.35.desc: "Не секрет, що ворожнеча між нами та нашими підданими справді жахлива. У нашому дворі зали залиті кров'ю та чорні від таємниць, оскільки ненависть процвітає. Природно, з цим потрібно розібратися."
  subject_interaction_events.35.a: "Нехай буде так"
  subject_interaction_events.35.b: "Розберіться з цим"
  subject_interaction_events.36.title: "Гарматне м'ясо"
  subject_interaction_events.36.desc: "Здається, наша країна стає досить порожньою і відчуває нестачу дуже важливого ресурсу: гарматного м'яса. Не бійтеся! Хоча нам може бракувати цього ресурсу, один з наших підданих має вдосталь свіжого м'яса для полів битв. Якщо ми змусимо їх до служіння, вони будуть не дуже задоволені, але такий вже порядок речей."
  subject_interaction_events.36.a: "Гармати потребують людей, щоб стріляти з них"
  subject_interaction_events.36.b: "Ми не можемо ризикувати антагонізувати наших підданих"
  subject_interaction_events.37.title: "Гарматне м'ясо"
  subject_interaction_events.37.desc: "Здається, наш сюзерен вважав за потрібне примусити наших підданих до служіння, щоб компенсувати нерозумне керівництво. Наші поля порожніють і, ймовірно, залишаться такими."
  subject_interaction_events.37.a: "Це обурливо!"
  subject_interaction_events.38.title: "Додатковий податок"
  subject_interaction_events.38.desc: "Було б применшенням сказати, що наша економіка працює \"погано\", насправді дехто назвав би це катастрофою. Поки ми ледве зводимо кінці з кінцями, наші піддані, з усіх людей, почуваються більш ніж добре. Можливо, ми недостатньо їх оподатковуємо."
  subject_interaction_events.38.a: "Додатковий податок може допомогти"
  subject_interaction_events.38.b: "Ми не потребуємо їх"
  subject_interaction_events.39.title: "Додатковий Податок"
  subject_interaction_events.39.desc: "Наш сюзерен вимагав від нас сплатити велику суму золота, щоб допомогти відновити його занепадаючу економіку."
  subject_interaction_events.39.a: "Будь вони прокляті!"
  subject_interaction_events.43.title: "Підданий втомився від війни"
  subject_interaction_events.43.desc: "Здається, що через наші війни один з наших підданих був досить сильно дестабілізований. Звісно, ми могли б просто дозволити їм самим впоратися, але це було б проявом доброї волі, якби ми їм допомогли."
  subject_interaction_events.43.a: "Надіслати допомогу"
  opinion_benevolent_overlord: "Доброзичливий Верховний Правитель"
  subject_interaction_events.43.b: "$common_string_let_them_fend_for_themselves$"
  subject_interaction_events.44.title: "Сюзерен Надсилає Допомогу"
  subject_interaction_events.44.desc: "Наш сюзерен вважав за потрібне надіслати допомогу, щоб ми могли відбудувати нашу країну після воєн."
  subject_interaction_events.44.a: "Надіслати подяку"
  subject_interaction_events.45.title: "Економічна Свобода"
  subject_interaction_events.45.desc: "Тепер, коли ми більше не підкоряємося примхам іншої країни, ми можемо проводити власну торговельну політику і нам не доведеться жити за рахунок обходу торговельних правил та контрабанди."
  subject_interaction_events.45.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  subject_interaction_events.46.title: "Рівний Статус"
  subject_interaction_events.46.desc: "Представник з [target.GetName] передав нам проєкт пропозиції щодо об'єднання наших двох націй.\n\nВони готові негайно об'єднатися з [ROOT.GetCountry.GetLongName] за умови, що ми надамо народу [target.GetCulture.GetName] та їхнім традиціям такий самий захист, який ми надаємо своїм власним."
  subject_interaction_events.46.a: "Хай буде так."
  subject_interaction_events.46.b: "Вони приєднаються до нас згодом, але не як рівні!"
  subject_interaction_events.47.title: "Корумповані Дипломати"
  subject_interaction_events.47.desc: "Наші посланці в [target.GetCapital.GetName] виявили, що низка ключових [target.GetAdjective] дипломатів були б готові негайно просунути об'єднання наших країн — за певну ціну."
  subject_interaction_events.47.a: "Це просто бізнес."
  subject_interaction_events.47.b: "Ми повинні зробити це чесно, або взагалі ніяк!"
  subject_interaction_events.48.title: "[target.GetAdjectiveWithNoTooltip] Претендент"
  subject_interaction_events.48.desc: "Після тривалого вивчення стародавніх манускриптів, [target.GetAdjective] герольди в [target.GetCapital.GetName] почали стверджувати, що їхній [target.GetGovernment.GetRulerTitle], [new_king.GetName] має далеке, але чітке право на [ROOT.GetCountry.GetAdjective] трон.\n\nВони кажуть, що якщо ми погодимося посадити [new_king.GetHimHer], то наші країни нарешті будуть практично об'єднані."
  subject_interaction_events.48.a: "Проблему вирішено!"
  subject_interaction_events.48.b: "Ці докази дуже хисткі..."