l_english:
  unionevents.1.title: "Місцеві дворяни протестують"
  unionevents.1.desc: "Здається, [ROOT.GetCountry.GetGovernment.GetFullRulerName|U] віддає перевагу дворянам [ROOT.GetCountry.GetGovernment.GetRuler.GetCulture.GetName], а не дворянам [ROOT.GetCountry.GetCulture.GetName]. Наша існуюча шляхта засмучена тим, що їхні століття доброго походження безглуздо ігноруються. Це має деякі кардинальні наслідки для нашого королівства."
  unionevents.1.a: "Обезголовити кількох із них!"
  opinion_restrict_nobles: "Обмежена іноземна шляхта"
  unionevents.1.b: "Примиритися."
  opinion_reconcile: "Примирення"
  unionevents.2.title: "[target_ruler.GetNameWithNoTooltip|U] ігнорує [ROOT.GetCountry.GetNameWithNoTooltip]"
  unionevents.2.desc: "Наш спільний правитель дуже зосереджений на [target_ruler.GetHerHis] власному [union_target.GetFlavorRank] і, схоже, не приділяє достатньо часу справам нашого [ROOT.GetCountry.GetFlavorRank]. Очевидно, що це не те, що цінує наш народ."
  unionevents.2.a: "Це образа для [ROOT.GetCountry.GetNameWithNoTooltip]!"
  opinion_ignorant_monarch: "Невіглас-монарх"
  unionevents.2.b: "Запросити [target_ruler.GetHerHis] до нашої столиці!"
  opinion_supportive_monarch: "Підтримуючий монарх"
  unionevents.3.title: "[ROOT.GetCountry.GetName] занедбано економічно"
  unionevents.3.desc: "Хоча ми об'єднані в особі нашого суверена, купці нашої нації все ще розглядаються як іноземці. Це шкодить нашій нації економічно. [ROOT.GetCountry.GetGovernment.GetFullRulerName|U] повинен проводити більше часу в нашій країні та сприяти її процвітанню!"
  unionevents.3.a: "Це лише номінальний союз?"
  opinion_union_in_name: "Союз лише за назвою"
  unionevents.4.title: "Культурні відмінності"
  unionevents.4.desc: "Трагічно, але звичаї нашого нового монарха не такі цивілізовані, як наші власні. Однак [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] відсталий народ, схоже, ображений цим."
  unionevents.4.a: "Їм слід навчитися манер!"
  opinion_backward_monarch: "Відсталий монарх"
  unionevents.5.title: "Наш Союз має погану репутацію"
  unionevents.5.desc: "Наш монарх, якщо висловитися ввічливо, не вважається найкращою особою для сусідства. Насправді історія тієї нації — це історія експансії та завоювань. Трагічно, але, схоже, нас мажуть тією ж фарбою."
  unionevents.5.a: "Насправді, ми не однакові."
  opinion_bad_monarch: "Поганий монарх"
  unionevents.5.b: "Ми ЄДИНІ!"
  opinion_one_and_same: "Одне й те саме"
  unionevents.98.title: "[ROOT.GetCountry.GetDiplomacy.GetUnion.GetNameWithNoTooltip] та [ROOT.GetCountry.GetFlavorRank]"
  unionevents.98.title.fallback: "[GetInternationalOrganizationType('union').GetNameWithNoTooltip] та [ROOT.GetCountry.GetFlavorRank]"
  unionevents.98.desc: "Зі смертю [root_character.GetName], [ROOT.GetCountry.GetLongName] залишилася без правителя. Зазвичай, [ROOT.GetCountry.GetGovernment.GetHeirSelection.GetName] швидко знайшов би нам нового кандидата для правління державою. Однак обставини інші, оскільки ми є частиною [ROOT.GetCountry.GetDiplomacy.GetUnion.GetName], і тому [ROOT.GetCountry.GetFlavorRank] стоїть перед досить унікальним рішенням."
  unionevents.98.desc.union_has_leader: "$unionevents.98.desc$\n\n[target_character.GetName], нинішній лідер [ROOT.GetCountry.GetDiplomacy.GetUnion.GetNameWithNoTooltip], вимагає [ROOT.GetCountry.GetAdjectiveWithNoTooltip] престол. Якщо ми хочемо залишитися і, можливо, очолити [GetInternationalOrganizationType('union').GetName], обрання [target_character.GetShortNameWithNoTooltip] може бути слушним вибором, хоча це сильно суперечить цінностям [ShowGovernmentTypeName('republic')]."
  unionevents.98.desc.union_has_no_leader: "$unionevents.98.desc$\n\n[target_character.GetName] може зараз очолювати [ROOT.GetCountry.GetDiplomacy.GetUnion.GetNameWithNoTooltip], але жодним чином не є слушним кандидатом для [ROOT.GetCountry.GetAdjectiveWithNoTooltip] уряду. Щоб зберегти нашу позицію в [GetInternationalOrganizationType('union').GetName], можна було б зробити виняток для [target_character.GetHerHim], хоча багато наших людей втратять віру в [ShowGovernmentTypeName('republic')] внаслідок цього."
  unionevents.98.fallback: "Там, де колись був [GetInternationalOrganizationType('union').GetName], тепер лише дипломатичний та адміністративний безлад в установах [ROOT.GetCountry.GetLongName]. [ShowGovernmentTypeName('monarchy')] може приходити і йти, але [ShowGovernmentTypeName('republic')] триває."
  unionevents.98.a: "Оберіть [target_character.GetShortNameWithNoTooltip]!"
  unionevents.98.b: "Настав час нам відокремитися від [ROOT.GetCountry.GetDiplomacy.GetUnion.GetNameWithNoTooltip]."
  unionevents.98.c: "Хай живе [ROOT.GetCountry.GetLongNameWithNoTooltip]!"