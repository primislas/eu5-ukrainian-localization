l_english:
  haudenosaunee.1.title: "Непростима образа"
  haudenosaunee.1.desc: "Вони прийшли вночі. Їхні обличчя ледь освітлював місяць, а зброя яскраво блищала біля смолоскипів. Вони прийшли в тиші. Їхні кроки були м'якими та швидкими, як літній вітерець, майже нечутними. Потім тиша скінчилася, і ніч також.\n\nВони напали на наше село, спалюючи намети, крадучи їжу та забираючи полонених. Багато наших воїнів одразу прокинулися і спробували їх зупинити, але вони не були готові до нападу, тому багато хто загинув у бою. Вони вбили нас. Батьків, братів, синів. Вони вбили нас усіх.\nНехай вони не знають спокою, доки ми живі."
  haudenosaunee.1.a: "Наші серця вічно плакатимуть за їхніми втратами."
  opinion_haudenosaunee_affront: "Непростима образа"
  haudenosaunee.2.title: "Жалобні війни"
  haudenosaunee.2.desc: "Серед нашого народу існує традиція нападати на сусідні села в пошуках полонених, щоб замінити тих, хто покинув нас. Матері клану вимагають \"жалобної війни\", щоб втішити себе після нещодавньої смерті їхніх дітей, і наш обов'язок прийняти таку розумну петицію.\n\nЦієї ночі. Синьої ночі. Ночі після цієї частини ночі. Наші воїни успішно атакували [target_location.GetName] і, серед хаосу, зуміли влаштувати засідку на чималу кількість місцевих жителів."
  haudenosaunee.2.a: "Ми повинні взяти полонених."
  haudenosaunee.2.b: "Просто дайте їм знати, що ми могли б їх забрати."
  haudenosaunee.3.title: "Новий полонений"
  haudenosaunee.3.desc: "Наші воїни повернулися з полоненими зі свого попереднього рейду в [target_location.GetName]. Переможно вони постали перед [target_character.GetName] і поклали тіло дитини перед [target_character.GetHerHim]. \"Взамін за вашу втрату\", — почулося, і знову з'явилися сльози."
  haudenosaunee.3.a: "Відкинути його."
  haudenosaunee.3.b: "Усиновити його."
  haudenosaunee.4.title: "Виховання [target_child_character.GetNameWithNoTooltip]"
  haudenosaunee.4.desc: "Здається, ніби вчора [target_child_character.GetName] привезли до [target_child_character.GetHerHis] батька з чужої землі. [target_child_character.GetSheHe|U] тоді був лише немовлям, але відтоді [target_child_character.GetSheHe] зростав як ще один з наших [ROOT.GetCountry.GetFlavorRank]. [target_child_character.GetSheHe|U] ледь пам'ятає [target_child_character.GetHerHis] [target_child_character.GetCulture.GetName] походження, але невиразні спогади залишаються і змушують [target_child_character.GetHerHim] ставити запитання."
  haudenosaunee.4.a: "[target_child_character.GetSheHe|U] є одним з нас і більше не може називати [target_child_character.GetHerselfHimself] [target_child_character.GetCulture.GetNameWithNoTooltip]."
  haudenosaunee.4.b: "[target_child_character.GetSheHe|U] буде одним з нас, або [target_child_character.GetSheHe] помре."