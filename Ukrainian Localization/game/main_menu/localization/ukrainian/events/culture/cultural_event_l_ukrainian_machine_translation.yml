l_english:
  cultural_event.1.title: "Вистави Комедії дель арте"
  cultural_event.1.desc: "Слухайте, слухайте! Випустіть Панталоне, Арлекіна та всіх інших типових персонажів традиційної Комедії дель арте на наше нічого не підозрююче населення, і спостерігайте, як люди розважаються їхніми витівками та витівками. Хороша комедія може на деякий час змусити будь-кого забути про біди та втому життя. Крім того, це приносить велике задоволення!"
  cultural_event.1.a: "Зробіть це!"
  cultural_event.1.b: "Це безглузді відволікання."
  cultural_event.2.title: "Свобода, Рівність, Братерство"
  cultural_event.2.desc: "Наче могутній смолоскип, що несе світло розуму навіть у найтемніші куточки старого та нового світів, [ShowInstitutionName('enlightenment')] охоплює земну кулю. Подальше прийняття цього руху, безсумнівно, призведе до прогресу в науці та філософії, але уявлення руху про людську свободу та невід'ємні права людини можуть викликати невеликий бунтівний запал у нашій країні."
  cultural_event.2.a: "Давайте дослідимо, що пропонує [ShowInstitutionNameWithNoTooltip('enlightenment')]!"
  cultural_event.2.b: "Ні, це не варте ризику заворушень."
  cultural_event.3.title: "Біженці з [GetCountry('BYZ').GetNameWithNoTooltip]"
  cultural_event.3.desc: "[GetCountry('BYZ').GetName] впала, а разом з нею і останній бастіон Римської імперії, Місто Костянтина. Поки Християнський світ оговтується від шоку, [GetCountry('BYZ').GetAdjectiveWithNoTooltip] біженці стікаються до міст і дворів [ShowContinentName('europe')], приносячи з собою старі рукописи класичних знань, включаючи трактати Аристотеля, Платона та Галена, а також ґрунтовні знання як [ShowLanguageName('latin_language')], так і [ShowLanguageName('greek_language')]. \n\nЗапрошення цих біженців до [ROOT.GetCountry.GetName] може значно допомогти нашим власним зусиллям у галузі культури та науки."
  cultural_event.3.a: "Будь-якою ціною, нехай приходять!"
  cultural_event.3.b: "Ні, ми не можемо дозволити собі їхню присутність."
  cultural_event.4.title: "Підтримати $STATIC_MODIFIER_NAME_florentine_school$"
  cultural_event.4.desc: "Завдяки нашій відносній значущості, ми маємо змогу підтримати [ShowCultureGroupName('italian_group')] митців Флорентійської школи. Сприйняття нас як покровителів міжнародного мистецтва безперечно покращить ставлення людей до нас."
  cultural_event.4.a: "Звісно! Вони матимуть нашу підтримку!"
  cultural_event.4.b: "Ні, у нас достатньо проблем."
  cultural_event.5.title: "Останній лицарський турнір"
  cultural_event.5.desc: "Ми відчуваємо це у вітрі. Скоро наша кінна еліта стане лише мрією, яку згадуватимуть, оскільки лицарська традиція вимирає під натиском сучасності. Світ змінюється, але зараз, востаннє, нехай лицарі [ROOT.GetCountry.GetName] їдуть!"
  cultural_event.5.a: "Вперед, до слави!"
  cultural_event.5.b: "Ні, ми повинні адаптуватися до нашої нової ери."
  cultural_event.6.title: "Заснувати $STATIC_MODIFIER_NAME_guild_of_st_luke$"
  cultural_event.6.desc: "Гільдії художників, засновані в ім'я святого Луки, покровителя художників, з'являються по всій [ShowSubContinentName('western_europe')]. Заснування гільдії тут, у [ROOT.GetCountry.GetName], може бути досить дорогим, але культурна вигода буде очевидною для всіх. Розвиток бюрократії Гільдії також зміцнить нашу рідну бюрократичну традицію."
  cultural_event.6.a: "Звісно! Вони матимуть нашу підтримку."
  cultural_event.6.b: "Ні, ми не можемо собі цього дозволити."
  cultural_event.7.title: "Золотий вік живопису [target_location.GetNameWithNoTooltip]"
  cultural_event.7.desc: "Народ [target_location.GetName] нещодавно навернувся до [ROOT.GetCountry.GetReligion.GetName], зберігаючи при цьому сильні підводні течії гуманістичної думки та філософії в країні, що підготувало ґрунт для розриву зі встановленими художніми традиціями та ідеалами старої [ShowReligionAdjective('catholic')] [ShowContinentName('europe')]. Осідлавши багатство, що надходить від розвитку торгівлі в [target_location.GetNameWithNoTooltip], ми могли б допомогти започаткувати Золоту добу живопису!"
  cultural_event.7.a: "Звісно! Ми повинні підтримувати мистецтво!"
  cultural_event.7.b: "Ні, у нас достатньо проблем."
  cultural_event.8.title: "$STATIC_MODIFIER_NAME_diwani_script$"
  cultural_event.8.desc: "$STATIC_MODIFIER_NAME_diwani_script$ — це курсивний стиль [ShowLanguageName('arabic_language')] каліграфії, призначений для використання в королівських указах. Ми можемо зміцнити наше правління, проголошуючи наші едикти та слово [ROOT.GetCountry.GetReligion.GetGodName] у гармонії каліграфії."
  cultural_event.8.a: "Нехай буде так!"
  cultural_event.8.b: "Це не заслуговує нашої уваги."
  cultural_event.9.title: "Шлях Чаю"
  cultural_event.9.desc: "Хоча [ShowGoodsName('tea')] вирощувався в [ShowRegionName('japan_region')] протягом століть, деякі групи розвивають більш витончену естетику #italic Ча-но-Ю#!, Чайну Церемонію. Частково релігійна церемонія, частково культурна традиція, Шлях Чаю міг би стати невід'ємною частиною нашої культурної спадщини, якщо ми захочемо його підтримати."
  cultural_event.9.a: "Нехай буде так!"
  cultural_event.10.title: "Підтримати філософію [ShowInstitutionNameWithNoTooltip('renaissance')]"
  cultural_event.10.desc: "Нововиявлені філософії вхопилися за славу людини, проголошуючи велику здатність до людських досягнень. Просування цих гуманістичних ідеалів може надихнути на більші амбіції, креативність та продуктивність серед нашого народу, проте це може спонукати їх ставити під сумнів авторитет нашого правління."
  cultural_event.10.a: "Ці філософії матимуть нашу підтримку."
  cultural_event.10.b: "Ні, у нас достатньо проблем."
  cultural_event.11.title: "[ShowModifierWithNoTooltip('south_german_organ_tradition')]"
  cultural_event.11.desc: "Органні композитори з [ShowRegionName('south_german_region')] навчалися у [ShowCultureGroupName('italian_group')] майстрів, що надихнуло їх на створення власного унікального стилю. Наповнений імпровізаційними прелюдіями, чаконами та пасакаліями, цей новий стиль міг би стати гідною музичною та культурною традицією, якщо ми вирішимо його підтримати."
  cultural_event.11.a: "Звісно. Вони матимуть нашу підтримку."
  cultural_event.11.b: "Ні, у нас достатньо проблем."
  cultural_event.12.title: "Підтримати барокову музику"
  cultural_event.12.desc: "Ми ніколи не дізнаємося і ледве можемо уявити, скільки художнього таланту було втрачено через замало грошей, замало їжі та замало любові. Однак, якщо ми допоможемо композиторам, що борються в [ROOT.GetCountry.GetName], нашим заступництвом, то вони допоможуть нам у відповідь."
  cultural_event.12.a: "Звісно. Вони матимуть нашу підтримку."
  cultural_event.12.b: "Ні, у нас достатньо проблем."
  cultural_event.13.title: "Національний епос"
  cultural_event.13.desc: "Наш народ почав розповідати казки та легенди про [SCOPE.sCharacter('target_character').GetName]. Легенда свідчить, що в найтемнішу годину [ROOT.GetCountry.GetName] [SCOPE.sCharacter('target_character').GetSheHe] повернеться до нашої нації та визволить її від зла. Незалежно від правдивості цього твердження, ми могли б офіційно прийняти цей міф, щоб надихнути надію та надати легітимності нашому правлінню."
  cultural_event.13.a: "Так, народу потрібна гарна історія."
  cultural_event.13.b: "Ні, наш народ повинен зосередитися на сьогоденні."
  cultural_event.14.t: "Фінансування [ShowBuildingTypeNameWithNoTooltip('university')] [target_location.GetNameWithNoTooltip]"
  cultural_event.14.desc: "Інтелектуальний ландшафт, що постійно розширюється в [ShowBuildingTypeName('university')] [target_location.GetName], вимагає значного фінансування. Піднесення схоластики, гуманізму та відновлений голод за давно забутими класичними текстами не оплатять себе самі; їм потрібна державна скарбниця, щоб їх годувати!\n\nОбмежений у коштах [ShowBuildingTypeNameWithNoTooltip('university')] особисто запропонував надати одного зі своїх найкращих викладачів на службу державі в обмін на велику суму золота, яку вони можуть використати для подальших наукових пошуків. Ціна висока, але знання безцінні, і хороший вчитель міг би стати хорошим [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle]."
  cultural_event.14.a: "Голодні уми повинні бути нагодовані!"
  cultural_event.14.b: "Ми повинні відмовитися фінансувати цю установу."