l_english:
  culture_japan.1.title: "О-Іе Содо"
  culture_japan.1.desc: "Останнім часом суперечки між різними родинами [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] стають дедалі запеклішими, аж до того, що призводять до смертей серед них. Якщо вони триватимуть, то можуть становити серйозну загрозу стабільності політичної системи, і тому до них слід ставитися дуже серйозно.\n\nЦі чвари настільки вкоренилися в культурі, що люди вже починають називати їх «домашньою ворожнечею» або #italic О-Іе Содо#!. Поки це не стосується їх безпосередньо, люди розглядають ці конфлікти як звичайне явище, і навіть як певну форму розваги.\n\nТепер, схоже, [target_character.GetName] [target_character.GetHerselfHimself] виявився втягнутим в одну з цих суперечок, і люди вимагають голову [target_character.GetHerHis] на тарілці."
  culture_japan.1.a: "[target_character.GetSheHe|U] мав би знати краще!"
  culture_japan.1.b: "Відмовитися виконувати їхні вимоги."
  culture_japan.2.title: "Непокірні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  culture_japan.2.desc: "Панівний мир останніх кількох років залишив багатьох у касті [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] без активної роботи. Ці неробні руки тепер звернулися до експлуатації та гноблення місцевого населення [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. З ними потрібно буде розібратися."
  culture_japan.2.a: "Саме так вони підтримують свої бойові навички."
  culture_japan.2.b: "Їх буде суворо покарано."
  culture_japan.3.title: "Без спадкоємця"
  culture_japan.3.desc: "Оскільки [target_ruler.GetName] не зміг забезпечити нашого [ROOT.GetCountry.GetFlavorRank] відповідним [ROOT.GetCountry.GetGovernment.GetHeirTitle], спекуляції щодо майбутнього курсу нації поширюються. Ці дебати загрожують підірвати нашу позицію. [target_ruler.GetShortNameWithNoTooltip] міг би усиновити [target_character.GetName] як [target_ruler.GetHerHis] власного [target_character.GetDaughterSon] та [ROOT.GetCountry.GetGovernment.GetHeirTitle], але це може бути сприйнято як ознака слабкості."
  culture_japan.3.a: "Сила в розраді."
  culture_japan.3.b: "Усиновити та узаконити [target_character.GetNameWithNoTooltip]."
  culture_japan.4.title: "Втрата обличчя"
  culture_japan.4.desc: "Відносна нестабільність нашого [ROOT.GetCountry.GetFlavorRank] призвела до того, що інші почали ставити під сумнів нашу здатність підтримувати національну згуртованість. Лідерство та загальні управлінські навички [target_character.GetName] постійно ставляться під сумнів. Визнання того, що ситуація дещо вийшла з-під нашого контролю, буде серйозним ударом по нашій владі та впливу."
  culture_japan.4.a: "Визнати, що ситуація не є ідеальною."
  culture_japan.4.b: "Наполягати, що все гаразд!"
  culture_japan.5.title: "Лакований посуд для [target_emperor.GetGovernment.GetRulerTitle]"
  culture_japan.5.desc: "Прекрасна лакована скриня в нашому кабінеті привернула увагу імперського слуги, і чутки про цей фантастичний артефакт поширилися до імперського двору та до [target_emperor.GetGovernment.GetRulerTitle] [target_emperor_character.GetHerselfHimself]. Схоже, між нами та [target_emperor.GetGovernment.GetRulerTitle] виникло мовчазне порозуміння, що ця скриня має бути подарована [target_emperor_character.GetHerHim] від [target_emperor_character.GetHerHis] найвірнішого підданого."
  culture_japan.5.a: "Звісно, скриня буде подарунком для [target_emperor_character.GetHimHerFormal]!"
  culture_japan.5.b: "На жаль, ми не можемо дозволити собі такі подарунки."
  culture_japan.6.title: "Перше саке"
  culture_japan.6.desc: "Перше саке сезону готове, і традиційна дегустація відбудеться за кілька тижнів. Питання полягає в тому, чи варто запрошувати [target_boss.GetGovernment.GetRulerTitle] на святкову першу дегустацію, чи спробувати використати наше становище на ринку та продати раніше."
  culture_japan.6.a: "Ми дуже потребуємо прихильності [target_boss.GetGovernment.GetRulerTitle]."
  culture_japan.6.b: "Давайте випустимо цю партію на ринок!"
  culture_japan.6.c: "Це буде божественна пожертва."
  culture_japan.7.title: "Виняткові мечі"
  culture_japan.7.desc: "Новий коваль виготовив партію мечів неперевершеної якості для наших військ. Ми можемо або спорядити ними наші власні сили, або скористатися нагодою, щоб продати їх і отримати великий прибуток. Такі мечі, ймовірно, матимуть великий попит у наших сусідів..."
  culture_japan.7.a: "Наша армія завжди має першочергове право на спорядження."
  culture_japan.7.b: "Нам потрібні гроші понад усе!"
  culture_japan.8.title: "Спроба перевороту!"
  culture_japan.8.desc: "Здається, політичний клімат у [ROOT.GetCountry.GetLongName] не такий стабільний, як вважалося. Подорожуючи країною, [target_ruler.GetName] відпочивав у храмі поблизу [target_ruler.GetHerHis] військ, коли генерал армії побачив нагоду і оточив храмовий комплекс [target_character.GetHerHis] власними силами, стверджуючи, що «ворог всередині». Лише швидкі та рішучі дії лояльних військ призвели до своєчасного порятунку [ROOT.GetCountry.GetGovernment.GetRulerTitle] та захоплення зрадника.\n\nМотиви генерала незрозумілі, і [target_character.GetSheHe] міг бути мотивований чим завгодно, від бажання помсти до відвертої жаги до влади. Інцидент підтвердив контроль [target_ruler.GetShortNameWithNoTooltip] над військами, але коротка сутичка, що спалахнула, коштувала життя багатьом добрим людям, і зрозуміло, що потрібно буде знову зосередитися на внутрішній політиці, щоб це не повторилося."
  culture_japan.8.a: "Не буде пощади за цей безчесний вчинок!"
  culture_japan.8.b: "Амбіції слід винагороджувати, а не карати."
  culture_japan.9.title: "Поширення $jap_jokamachi$"
  culture_japan.9.desc: "Наші сусідні [target_neighbor.GetName] почали будувати нові форти, які вони оточують #italic $jap_jokamachi$#!, «замковими містами», що виникають навколо них. Їх заселяють [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] без поділу між соціальними групами та без регулярного розподілу, що забезпечує [ROOT.GetCountry.GetGovernment.GetRulerTitle] можливість підтримувати жорсткий контроль над класом [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')].\n\nІнші класи, у поєднанні зі створенням вільних ринків та відкритих гільдій, стимулюють торгівлю та комерцію, а отже, процвітання. Таким чином, $jap_jokamachi$ може стати засобом для [ROOT.GetCountry.GetGovernment.GetRulerTitle] для посилення контролю як у військовій, так і в економічній сферах, одночасно збільшуючи багатство домену."
  culture_japan.9.a: "Ми повинні заохочувати розвиток цих замкових міст."
  culture_japan.9.b: "У нас є важливіші речі, на яких слід зосередитися."
  culture_japan.10.title: "Піднесення міської культури"
  culture_japan.10.desc: "Зі збільшенням міського населення, жителі [ROOT.GetCountry.GetName] виявили підвищений інтерес до культурних заходів. Таким чином, багато з них процвітають, як-от театр Кабукі, мистецтво співу та танцю; та Укійо-е, гравюри на дереві або ксилографії та картини із зображенням пейзажів, історичних оповідей, театру та кварталів розваг. Можливо, [ROOT.GetCountry.GetGovernment.GetCourtTitle] також варто проявити інтерес до театру Кабукі або Укійо-е."
  culture_japan.10.a: "Це допомогло б їм краще зрозуміти людей."
  culture_japan.10.b: "Що вони могли б хотіти від цього?"
  culture_japan.11.title: "За"
  culture_japan.11.desc: "Завжди існували гільдії, або #italic За#!, у [ROOT.GetCountry.GetLongName], де купці співпрацювали з храмами та святилищами, щоб захистити себе від бандитів, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та воєначальників. Купці, що належать до цих гільдій, могли потім організовуватися в групи для подорожей та безпечніше транспортувати свої товари. Вони також мали домовленості, що дозволяли їм продавати свої товари на території храмів, надаючи їм захист самого храму.\n\nДеякі [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] у [ROOT.GetCountry.GetLongNameWithNoTooltip] вважають, що цих переваг недостатньо, і вони звернулися до [target_character.GetName], пропонуючи частку прибутку в обмін на захист, деякі податкові пільги та інші офіційні державні переваги."
  culture_japan.11.a: "Звучить як чудова угода."
  culture_japan.11.b: "Наразі це нас не цікавить."
  culture_japan.12.title: "Зростаюча сила За"
  culture_japan.12.desc: "За, торгові гільдії в [ROOT.GetCountry.GetLongName], стають все більшими та організованішими, до такої міри, що вони здатні самостійно захищати свою діяльність. Таким чином, вони достатньо впливові, щоб впливати на загальні ринкові ціни, і існує ризик, що вони домінуватимуть у деяких галузях торгівлі, отримуючи на них монополію. Були голоси, що закликали до вжиття заходів для обмеження їхнього впливу, щоб ми не ризикували, що вся наша економіка потрапить до їхніх рук."
  culture_japan.12.a: "Обмежити привілеї За."
  culture_japan.12.b: "Залишити як є."
  culture_japan.13.title: "$jap_jokamachi$"
  culture_japan.13.desc: "У світі, що стає дедалі ворожішим, безпека замку є водночас обіцянкою захисту та працевлаштування. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] роками покидали свої сільські будинки заради поселень під стінами замків своїх панів, разом із купцями та ремісниками. Наша столиця, [target_location.GetName], не є винятком, і її зростання викликає занепокоєння у наших адміністраторів.\n\nЙмовірно, знадобляться нові кошти для покращення інфраструктури, якщо ми хочемо мінімізувати такі проблеми, як пожежі та хвороби."
  culture_japan.13.a: "Вони матимуть те, що їм потрібно."
  culture_japan.13.b: "Нав'язати обмеження на те, хто може переїхати до [target_location.GetNameWithNoTooltip]."
  culture_japan.14.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Мігрують до [target_location.GetNameWithNoTooltip]"
  culture_japan.14.desc: "Зі зростанням населення в сільській місцевості розмір земельних ділянок під кожним фермером зменшувався з кожним успадкуванням. Хоча врожайність зростала, деякі фермери все ще не можуть прожити зі своєї землі. Багато хто натомість переїхав жити до столиці, що посилило проблеми зростання [target_location.GetName].\n\nЗемлевласники скаржаться і благають нас запровадити більше соціального порядку. Вони наполегливо пропонують нам запровадити закони, щоб перешкоджати пересуванню людей у межах нашого [ROOT.GetCountry.GetFlavorRank]."
  culture_japan.14.a: "Постановити, що жодна людина не може пересуватися без дозволу."
  culture_japan.14.b: "Ми не можемо зупинити зростання міст."
  culture_japan.15.title: "Торгові монополії"
  culture_japan.15.desc: "Зростання міст призвело до швидкого збільшення могутності стародавніх торгових гільдій За нашої країни. Загалом хаотична ситуація в нашому [ROOT.GetCountry.GetFlavorRank] також означала, що вони все більше покладаються на власні домовленості щодо безпеки. Гільдії тепер прив'язали до своєї справи храми, землевласників та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Але вони також нажили ворогів.\n\nДеякі благають нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] виступити проти гільдій і відкрити економіку для будь-кого, хто має здібності. Інші стверджують, що ми повинні принаймні надавати монополії та привілеї іншим, ніж гільдіям."
  culture_japan.15.a: "Ми скасуємо старі правила, що їх живлять!"
  culture_japan.15.b: "Монополії працюють добре, але ми не повинні надавати їх на основі традицій."
  culture_japan.15.c: "Ми повинні захищати домовленості наших предків."
  culture_japan.16.title: "Вако"
  culture_japan.16.desc: "Вако, пірати, що походять з різних численних островів навколо узбережжя [ShowRegionName('japan_region')], розгулялися в регіоні, здійснюючи набіги на береги як [ShowSubContinentName('east_asia')], так і [ShowRegionName('korea_region')], а також на наші власні. Попри це, труднощі торгівлі з $china$ означають, що ці пірати є нашим єдиним джерелом [ShowCultureGroupName('chinese_group')] та [ShowCultureName('korean_culture')] товарів. Зростаюча частота піратських нападів означає, що ми більше не можемо залишатися пасивними. Ми повинні прийняти рішення, як з ними боротися."
  culture_japan.16.a: "Фінансувати піратів."
  culture_japan.16.b: "Придушити піратство."
  culture_japan.17.title: "Пірати Вако та торгівля Бахан"
  culture_japan.17.desc: "У часи невизначеності рибалки та моряки цих земель часто вдавалися до піратства та набігів на узбережжя наших сусідів. Прибутки, які вони могли отримати від чесної торгівлі, зазвичай не такі великі, як ті, що вони могли отримати від простого грабунку та набігів, і термін «торгівля Бахан» почав використовуватися для позначення цих піратських набігів.\n\nЧаси та баланс сил, однак, схильні до змін, і торгівля Бахан знову стала дедалі поширенішим заняттям серед наших підданих. Деякі лорди самі почали або фінансувати, або активно брати участь у набігах. Тим часом жертви цих піратів Вако почали пропонувати титули та почесті тим, хто допомагає зупинити цю загрозу."
  culture_japan.17.a: "Ми повинні їх використати!"
  culture_japan.17.b: "Ми повинні зупинити ці набіги!"
  wako_raids: "Набіги Вако"
  culture_japan.18.title: "Реакції на Вако"
  culture_japan.18.desc: "Піратство та набіги продовжували зростати. Учасники варіюються від простих рибалок та дрібних лордів до тих, хто живе на самих іноземних узбережжях. З часом потужні інтереси, як вдома, так і за кордоном, почали покровительствувати успішним піратським ватажкам, і, схоже, піратські фортеці тепер усіяли наші острови та узбережжя.\n\nТепер сусідні держави почали вживати набагато жорсткіших заходів. Вони готуються до прибуття рейдерів та активно полюють на піратських лідерів. [target_ruler.GetName] [target_ruler.GetHerselfHimself] отримав чіткі погрози від іноземних посланців, що якщо ми не діятимемо рішуче, вони вважатимуть наші судна ворогами та припускатимуть, що вони серед піратів."
  culture_japan.18.a: "Це нас не стосується."
  culture_japan.18.a.tt: "Усі відомі [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в межах [Concept('trade_range', 'CONCEPT_PLACEHOLDER')|e] отримують [ShowBiasValue('opinion_pirate_supporters')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [ROOT.GetCountry.GetName]."
  culture_japan.18.b: "Допоможемо захистити іноземні країни."
  culture_japan.18.b.tt: "Усі відомі [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в межах [Concept('trade_range', 'CONCEPT_PLACEHOLDER')|e] отримують [ShowBiasValue('opinion_pirate_fighting')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [ROOT.GetCountry.GetName]."
  culture_japan.19.title: "Піратська твердиня в [target_location.GetNameWithNoTooltip]"
  culture_japan.19.desc: "Лорди в [target_location.GetName] стали відомими як безстрашні корсари, а вірність і багатство, якими вони командують, забезпечили їм великий вплив і владу. Там особливо успішний піратський лідер на ім'я [target_character.GetName] побудував твердиню, що повністю утримується за рахунок [target_character.GetHerHis] експедицій. Знищення такої фортеці, ймовірно, обійдеться дорого, але [target_character.GetSheHe] глузує з наших власних морських амбіцій."
  culture_japan.19.a: "Що нам до того, якщо [target_character.GetSheHe] живе за рахунок багатства іноземців?"
  culture_japan.19.b: "Можливо, [target_character.GetSheHe] можна було б зробити слугою нашої держави..."
  culture_japan.19.c: "Ми повинні вирвати ці бур'яни розпаду з нашого саду!"
  culture_japan.20.title: "Питання про місце проживання"
  culture_japan.20.desc: "[target_character.GetName] надіслав звістку, що [target_character.GetSheHe] вимагає нашої присутності поблизу столиці, відповідно до політики [ShowPolicyName('sankin_kotai_policy')]. Проживання в нашому власному [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName] цілий рік буде неприйнятним, і наша родина повинна натомість проживати в [target_country.GetCapital.GetName] цілий рік. Хоча це вже траплялося, цей [target_country.GetGovernment.GetAdjective] наказ залишає нам мало можливостей вирішувати самостійно. [target_own_ruler.GetName] повинен негайно вирушити до [target_country.GetGovernment.GetAdjective] [target_country.GetGovernment.GetCourtTitle] або зіткнутися з жахливими наслідками."
  culture_japan.20.a: "Будь-що, зробімо це."
  culture_japan.20.b: "[target_country.GetLongNameWithNoTooltip] слабка та безвольна."
  culture_japan.21.title: "Нова династія постає"
  culture_japan.21.desc: "З приходом до влади [new_ruler.GetName] влада старої [old_ruler.GetDynasty.GetName] добігла кінця. Це ознаменує нову еру для нашого [ROOT.GetCountry.GetFlavorRank], в якій навіть наша ідентичність може бути поставлена під сумнів. Зрештою, чи можемо ми справді називатися [ROOT.GetCountry.GetLongName] без династії [old_ruler.GetDynasty.GetNameWithNoTooltip]?"
  culture_japan.21.a: "Піднесення нового [ROOT.GetCountry.GetFlavorRank]."
  culture_japan.21.b: "Насправді, [old_ruler.GetShortNameWithNoTooltip] усиновив [new_ruler.GetShortNameWithNoTooltip] у [old_ruler.GetHerHis] заповіті."
  culture_japan.22.title: "Голови та підібганий хвіст"
  culture_japan.22.desc: "Щоб бути винагородженими за свої подвиги в битві, наші воїни виставляють напоказ відрубані голови ворогів, яких вони здолали. Чим вражаючіша голова, тим краща нагорода. Ми ведемо війну таким чином протягом поколінь, але завжди є люди, які хочуть цим скористатися. Голови нижчих солдатів або навіть місцевих селян, представлені як голови вищих чиновників, голови людей, яких вони насправді не вбивали, або будь-яка інша хитрість служить для збільшення їхніх очевидних подвигів.\n\nОдна така сумнівна поведінка, схоже, циркулює навколо [target_character.GetName], оскільки під час нещодавньої сутички [target_character.GetSheHe] покинув битву до її завершення, оскільки [target_character.GetHerHim] вже був задоволений кількістю взятих голів. Звісно, це не рідкість, оскільки багато хто віддає перевагу меншій нагороді, ніж ризикувати своїм життям, і тому залишає битву, як тільки задоволений своїми трофеями. Однак чутки навколо [target_character.GetNameWithNoTooltip] звинувачують [target_character.GetHerHim] у тому, що [target_character.GetSheHe] зробив це через страх перед ворогом, а не через задоволення від взятих голів, і вони навіть ставлять під сумнів автентичність цих голів."
  culture_japan.22.a: "Втеча з битви — ганебна вистава!"
  culture_japan.22.b: "[target_character.GetNameWithNoTooltip] — [target_character.GetWomanMan] честі."
  culture_japan.1000.title: "Кадастрова зйомка"
  culture_japan.1000.desc: "Після пережитих бурхливих часів наша влада над [GetUniqueInternationalOrganization('japanese_shogunate').GetName] не така сильна, як нам хотілося б. Щоб виправити це, ми могли б організувати національні кадастрові зйомки, щоб врахувати всіх людей і ресурси наших кланів, а також їхні внутрішні зв'язки та союзи. Це дозволило б нам перерозподіляти землі та титули за потреби, щоб зробити їх більш рівними між собою, і всі вони були б підпорядковані нам. Звісно, таке починання було б дуже дорогим і не особливо популярним серед них."
  culture_japan.1000.a: "Це абсолютно необхідно."
  culture_japan.1000.a.tt: "Усі [Concept('members', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('japanese_shogunate').GetName] відреагують на це."
  culture_japan.1000.b: "Не будемо турбувати осине гніздо."
  culture_japan.1001.title: "$culture_japan.1000.title$"
  culture_japan.1001.desc: "Намагаючись збільшити [target_ruler.GetHerHis] владу над [GetUniqueInternationalOrganization('japanese_shogunate').GetName], [target_ruler.GetName] проводив загальнонаціональні кадастрові обстеження. Це передбачає вимірювання та підрахунок усіх людей, ресурсів та відносин власності, а також їх переформатування відповідно до [target_ruler.GetHerHis] задуму. Це завдання, що належить до [target_ruler.GetHerHis] посади, але воно використовується для перевертання давніх владних відносин з ніг на голову.\n\nСьогодні настав час для такого обстеження для [ROOT.GetCountry.GetLongName]. До нас звернулися посланці [target_country.GetGovernment.GetAdjective] адміністрації з прокламацією, що феоди, надані васалам, зрештою належать державі, і що васали володіють землею лише тимчасово."
  culture_japan.1001.a: "Ніхто не торкнеться мого права збирати податки!"
  culture_japan.1001.b: "Вітаємо [target_country.GetGovernment.GetAdjective] адміністраторів."
  culture_japan.1100.title: "Призначення на [target_shogunate.GetGovernment.GetAdjective] посаду"
  culture_japan.1100.desc: "Багато кланів служать нашому [ROOT.GetCountry.GetFlavorRank]. Їхні лідери завжди є амбітними людьми, які постійно борються між собою за владу та перевагу. Проте їхній обов'язок – служити нам, і деякі виконують його старанніше за інших. Наразі в нашій адміністрації є вакансія, і ми могли б надати цей титул одному з кланів, надавши їм велику честь, але також ще більше прив'язавши їх до наших інтересів. Ми навіть можемо використати це як спосіб обмежити їхній вплив."
  culture_japan.1100.a: "Запропонуймо це [target_clan_1.GetLongNameWithNoTooltip]."
  culture_japan.1100.b: "[target_clan_2.GetLongNameWithNoTooltip] добре впорається."
  culture_japan.1100.c: "Краще тримати [target_clan_3.GetLongNameWithNoTooltip] близько."
  culture_japan.1100.d: "Немає потреби залучати клани."
  culture_japan.1101.title: "$culture_japan.1100.title$"
  culture_japan.1101.desc: "[target_shogunate.GetLongName] надіслав повідомлення, що [target_ruler.GetName] очікується на посаді [target_shogunate.GetGovernment.GetAdjective] чиновника. З огляду на щирість прохання, відмова була б виключена і могла б навіть розглядатися як ознака відкритого повстання та безчестя. Це також, очевидно, спосіб досягти престижу та впливу для [ROOT.GetCountry.GetFlavorRank], але це небезпечна честь. [target_shogunate.GetFlavorRank] останнім часом змінює чиновників з тривожною швидкістю. Не задовольняючись тим, щоб дозволяти своїм прихильникам та вірним васалам обіймати високі посади, вони тепер звільняють тих, хто не дає результатів, яких очікує [target_shogunate.GetGovernment.GetRulerTitle]. Для декого це система заслуг, але для багатьох чиновників на [target_shogunate.GetGovernment.GetAdjective] службі це означає постійний страх перед перевірками."
  culture_japan.1101.a: "Ми повинні служити [target_shogunate.GetGovernment.GetRulerTitle]."
  culture_japan.1101.a.tt: "[target_shogunate.GetName] може використати це, щоб обмежити наш вплив і зменшити наші володіння"
  culture_japan.1101.b: "Ми не можемо брати участь у цій виставі, відмовтеся від призначення."
  culture_japan.1101.b.tt: "[target_shogunate.GetName] може бути незадоволений цим"
  culture_japan.1102.title: "[target_clan.GetLongNameWithNoTooltip] погоджується служити"
  culture_japan.1102.desc: "[target_ruler.GetName] з [target_clan.GetLongName] сумлінно прийняв [target_ruler.GetHerHis] призначення на посаду нашого нового [ROOT.GetCountry.GetGovernment.GetAdjective] чиновника. Цим [target_ruler.GetSheHe] довів [target_ruler.GetHerHis] вірність нам, а також [target_ruler.GetHerHis] чесність та честь. Тепер ми зможемо тримати [target_ruler.GetHerHim] близько і стримувати вплив [target_clan.GetLongNameWithNoTooltip]."
  culture_japan.1102.a: "Обмежити пересування клану."
  culture_japan.1102.b: "Вимагати частину їхньої землі як компенсацію."
  culture_japan.1102.b.tt: "Це може їх антагонізувати і дати їм [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти нас"
  culture_japan.1102.c: "Вони служитимуть нам вірно."
  culture_japan.1103.title: "Перевищення повноважень"
  culture_japan.1103.desc: "[target_shogunate.GetLongName] перевищив свої повноваження, використовуючи привід нещодавнього призначення [target_ruler.GetName] на посаду [target_shogunate.GetGovernment.GetAdjective] чиновника, щоб забрати частину території, яка по праву повинна належати нам. Це образа, яку не слід терпіти, і ми повинні бути готові відповісти на неї."
  culture_japan.1103.a: "Ми захищатимемо наші інтереси силою, якщо це буде необхідно!"
  culture_japan.1103.b: "[target_shogun.GetNameWithNoTooltip] зрештою є [target_shogunate.GetGovernment.GetRulerTitle]."
  culture_japan.1104.title: "[target_clan.GetLongNameWithNoTooltip] Відмовляється служити!"
  culture_japan.1104.desc: "Наш васал, [target_ruler.GetName] з [target_clan.GetLongName], відмовився від [ROOT.GetCountry.GetGovernment.GetAdjective] виклику служити чиновником у нашій адміністрації. Було запропоновано слабке виправдання, але це явний виклик нашій владі."
  culture_japan.1104.a: "Тоді нам доведеться знайти когось іншого."
  culture_japan.1104.b: "Цього не можна допустити, ми повинні покарати [target_clan.GetNameWithNoTooltip]!"
  culture_japan.1105.title: "[target_shogun.GetNameWithNoTooltip] Відступає"
  culture_japan.1105.desc: "Довівши [target_shogun.GetHerselfHimself] таким слабким, як ми й підозрювали, [target_shogun.GetName] погодився відступити від вимоги про службу. [target_shogun.GetSheHe|U] віддав наказ заповнити посаду, від якої ми відмовилися, кимось іншим, але його влада сильно ослаблена, оскільки кожен міг бачити наслідки нашої відмови."
  culture_japan.1105.a: "Нехай слабкість [target_shogun.GetNameWithNoTooltip] буде очевидною для всіх!"
  culture_japan.1106.title: "[target_shogunate.GetFlavorRank] незадоволений"
  culture_japan.1106.desc: "Наша відмова служити [target_shogunate.GetLongName] не була добре сприйнята [target_shogunate.GetGovernment.GetAdjective] [target_shogunate.GetGovernment.GetCourtTitle], і вони висловили не лише своє розчарування, а й свій гнів через наше рішення. Було б не дивно, якби незабаром ми побачили [target_shogunate.GetGovernment.GetAdjective] армії, що стукають у наші двері."
  culture_japan.1106.a: "Це не ідеально."
  culture_japan.1200.title: "Занепад влади [target_shogunate.GetLongNameWithNoTooltip]"
  culture_japan.1200.desc: "У ці важкі часи влада нашого [ROOT.GetCountry.GetFlavorRank] під загрозою. Наше ім'я не викликає тієї поваги, яку мало б, а наші накази, як правило, зустрічають опір або відверто ігноруються. Саме в такі часи ми повинні покладатися на наші вірні клани, що підтримують нас, щоб вони виконали свій обов'язок і прийшли нам на допомогу. Однак вони можуть захотіти щось натомість."
  culture_japan.1200.a: "Попросити допомоги у [target_clan_1.GetLongNameWithNoTooltip]."
  culture_japan.1200.b: "Покластися на [target_clan_2.GetLongNameWithNoTooltip]."
  culture_japan.1200.c: "Напевно, [target_clan_3.GetLongNameWithNoTooltip] допоможе нам."
  culture_japan.1200.d: "Ми впораємося з цим самі."
  culture_japan.1201.title: "$culture_japan.1200.title$"
  culture_japan.1201.desc: "Слабкість [target_shogunate.GetLongName] очевидна для всіх, оскільки вони намагаються зберегти свою владу над кланами. У час їхньої потреби вони звернулися до нас за допомогою, до своїх найвірніших слуг. Наш обов'язок — відповісти на їхнє прохання, але ми могли б навіть скористатися нагодою і попросити щось натомість."
  culture_japan.1201.a: "Ми вірно виконаємо свій обов'язок!"
  culture_japan.1201.b: "Можливо, нас можна переконати."
  culture_japan.1201.c: "Наші власні проблеми важливіші."
  culture_japan.1201.c.tt: "Їм це не сподобається, і вони можуть отримати [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти нас"
  culture_japan.1202.title: "[target_clan.GetLongNameWithNoTooltip] Приходять на нашу підтримку"
  culture_japan.1202.desc: "[target_clan.GetLongName] сумлінно відповіли на наш виклик і прийшли нам на допомогу в час нашої потреби. Завдяки їхній допомозі наша влада буде дещо відновлена, а решта кланів, безсумнівно, будуть більш шанобливими до нашого слова."
  culture_japan.1202.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  culture_japan.1203.title: "[target_clan.GetLongNameWithNoTooltip] Просить Компенсацію"
  culture_japan.1203.desc: "Підступний [target_clan.GetName] наважився просити компенсацію за виконання свого обов'язку прийти нам на допомогу. Навіть якщо це правда, що ми потребуємо їхньої допомоги, їхній обов'язок — відповідати на наш заклик без потреби в будь-якій винагороді. Однак, ми маємо деякі землі в [target_location.GetName], які можуть бути використані для їхнього переконання."
  culture_japan.1203.a: "Обіцяти їм права на [target_location.GetNameWithNoTooltip]."
  culture_japan.1203.tt: "Якщо вони погодяться, ми збудуємо їм [ShowBuildingTypeName('yamashiro')] в [target_location.GetName]"
  culture_japan.1203.b: "Вони прийдуть, або ж ні."
  culture_japan.1203.c: "Все гаразд, вони нам все одно не були потрібні."
  culture_japan.1204.title: "Права на [target_location.GetNameWithNoTooltip]"
  culture_japan.1204.desc: "[target_shogunate.GetLongName] надіслав ще одного посланця, намагаючись переконати нас прийти їм на допомогу. Цього разу вони пропонують нам права на землі в [target_location.GetName], намагаючись схилити нашу прихильність до себе."
  culture_japan.1204.a: "Прийняти дар і надіслати нашу допомогу."
  culture_japan.1204.b: "Це неприйнятно."
  culture_japan.1205.title: "[target_shogunate.GetFlavorRank] Надсилає Погрозу"
  culture_japan.1205.desc: "[target_shogunate.GetLongNameWithNoTooltip] стали сміливішими у своїй зарозумілості, оскільки вони погрожували нам виконати наш обов'язок відповісти на їхній заклик, ризикуючи викликати їхній гнів. Якщо ми не підкоримося, вони можуть використати це як привід, щоб назвати нас зрадниками."
  culture_japan.1205.a: "Дуже добре, надіслати їм допомогу."
  culture_japan.1205.b: "Ми не дозволимо так принижувати себе!"
  culture_japan.1206.title: "[target_shogunate.GetFlavorRank] Відступає"
  culture_japan.1206.desc: "Здається, потреби [target_shogunate.GetLongNameWithNoTooltip] були не такими гострими, як здавалося, оскільки [target_shogunate.GetGovernment.GetAdjective] [target_shogunate.GetGovernment.GetCourtTitle] відкликав свою петицію про допомогу, стверджуючи, що насправді вони не потребують нашої допомоги."
  culture_japan.1206.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  culture_japan.1207.title: "[target_clan.GetLongNameWithNoTooltip] Відмовляється Прийти нам на Допомогу"
  culture_japan.1207.desc: "[target_clan.GetLongName] відверто відмовляється відповісти на наш заклик і відмовив нам у своїй допомозі. Вони ледь вигадали якісь виправдання про те, що зараз надто зайняті у своїх власних володіннях, але нам зрозуміло, що вони просто знехтували нашою владою і помилково вважають, що не зобов'язані нам."
  culture_japan.1207.a: "Можливо, нам доведеться змусити їх усвідомити свою помилку."
  culture_japan.1207.b: "$culture_japan.1203.c$"
  culture_japan.1300.title: "$culture_japan.1200.title$"
  culture_japan.1300.desc: "Влада [target_shogunate.GetLongName] не така велика, як колись, і їхня слабкість очевидна для всіх. Ми могли б скористатися таким занепадом їхнього керівництва, змусивши їх дати нам більше землі або привілеїв."
  culture_japan.1300.a: "Попросити більше землі для нашого [ROOT.GetCountry.GetFlavorRank]."
  culture_japan.1300.a.tt: "Ми надішлемо петицію про більше землі"
  culture_japan.1300.b: "Змусити їх визнати наше лідерство."
  culture_japan.1300.c: "Ми не скористаємося їхньою слабкістю."
  culture_japan.1301.title: "[target_clan.GetNameWithNoTooltip] Просить Землі"
  culture_japan.1301.desc: "[target_clan.GetLongName] прийшли до нас, вважаючи наше лідерство достатньо слабким, щоб не мати змоги відповісти, і попросили права на додаткові землі. Їхня зухвалість безпрецедентна, але це правда, що наш [ROOT.GetCountry.GetFlavorRank] не такий сильний, як нам хотілося б. Можливо, деякі поступки зараз дозволять уникнути нам додаткових проблем у майбутньому."
  culture_japan.1301.a: "Як вони сміють вимагати від нас?"
  culture_japan.1301.b: "Заспокоїти дипломатію іншими обіцянками."
  culture_japan.1301.c: "Дуже добре, надайте їм права на [target_location.GetNameWithNoTooltip]."
  culture_japan.1302.title: "$culture_japan.1205.title$"
  culture_japan.1302.desc: "[target_shogunate.GetLongName] справді не були задоволені нашим нещодавнім клопотанням про більше землі. Вони нагадують нам про наш обов'язок сумлінно служити їм без очікування додаткової винагороди, окрім належної. Таким чином, вони не мають наміру надавати нам жодних додаткових прав, на які ми вже не маємо права."
  culture_japan.1302.a: "Нам не потрібно дотримуватися їхніх правил."
  culture_japan.1302.b: "Здається, вони можуть бути не такими слабкими, як здавалися."
  culture_japan.1303.title: "$culture_japan.1204.title$"
  culture_japan.1303.desc: "[target_shogunate.GetLongName] піддалися нашому тиску і надали нам права на [target_location.GetName]. Це не тільки послужить збільшенню нашої влади та авторитету, але й чітко показує, наскільки впав авторитет [target_shogunate.GetFlavorRank]."
  culture_japan.1303.a: "[ROOT.GetCountry.Custom('common_string_positive')]"