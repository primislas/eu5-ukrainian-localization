l_english:
  culture_religion_events.1.title: "[target_heir.GetNameWithNoTooltip] та [teacher.GetCulture.GetNameWithNoTooltip] народ."
  culture_religion_events.1.desc: "Під час [target_heir.GetHerHis] навчання [target_heir.GetName] прив'язався до нашого [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle], [teacher.GetName], утворивши особливий зв'язок як із [teacher.GetHerHim], так і з [teacher.GetCulture.GetName] народом батьківщини [teacher.GetShortNameWithNoTooltip].\n\nПоїздки [target_heir.GetNameWithNoTooltip] до [teacher.GetCulture.GetNameWithNoTooltip] громад на наших землях зробили дива для популярності нашої династії, але також викликали багато подиву в [ROOT.GetCountry.GetCapital.GetName]. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] починають хвилюватися, що [target_heir.GetNameWithNoTooltip] віддаватиме перевагу [teacher.GetCulture.GetNameWithNoTooltip] підданим, коли [target_heir.GetSheHe] візьме кермо нашого [ROOT.GetCountry.GetFlavorRank], і почали змовлятися проти [target_heir.GetHerHim] та [teacher.GetNameWithNoTooltip] при [ROOT.GetCountry.GetGovernment.GetCourtTitle|U]. Вони вимагають, щоб ми покарали [ROOT.GetCountry.GetGovernment.GetHeirTitle] та гарантували права [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  culture_religion_events.1.a: "Настав час молодому [target_heir.GetShortNameWithNoTooltip] вивчити [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] звичаї."
  culture_religion_events.1.b: "[target_heir.GetShortNameWithNoTooltip] має наше благословення в цьому."
  culture_religion_events.2.title: "[target_ruler.GetNameWithNoTooltip] та [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] народ"
  culture_religion_events.2.desc: "Сходження [target_ruler.GetName] було дуже добре сприйняте [target_ruler.GetCulture.GetName] симпатиками в нашому [ROOT.GetCountry.GetFlavorRank], але багато [ROOT.GetCountry.GetCulture.GetName] місцевих жителів ставляться до свого нового [ROOT.GetCountry.GetGovernment.GetRulerTitle] з деякою недовірою. Для них [target_ruler.GetSheHe] багато в чому є [target_ruler.GetWomanMan] дивних звичаїв та іноземних манер."
  culture_religion_events.2.a: "З часом вони полюблять [target_ruler.GetHimHer]."
  culture_religion_events.2.a.tt: "Усі [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] [target_ruler.GetNameWithNoTooltip] [target_ruler.GetCulture.GetNameWithNoTooltip] культури отримують [ShowBiasValue('opinion_ruler_of_our_culture')|+=] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас."
  culture_religion_events.2.b: "Задобрити [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] народ."
  culture_religion_events.3.title: "Віра [target_ruler.GetNameWithNoTooltip]"
  culture_religion_events.3.desc: "Віра [target_ruler.GetName] довгий час була причиною занепокоєння серед провідних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] нашого [ROOT.GetCountry.GetFlavorRank]. Однак з часом [target_ruler.GetHerHis] вплив призвів до того, що деякі «нові люди» і навіть деякі з наших старих родин прийняли [target_ruler.GetReligion.GetAdjective] віру. Той факт, що [target_ruler.GetReligion.GetAdjectiveWithNoTooltip] обряд відкриває двері в [ROOT.GetCountry.GetCapital.GetName], разом із постійно зростаючою видимістю поклоніння [target_ruler.GetNameWithNoTooltip], призвів до поширення обряду по всій нашій країні, залучаючи нових навернених як зсередини, так і з інших частин світу."
  culture_religion_events.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  culture_religion_events.3.a.tt: "Десята частина наших не-[ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у кожній локації з менш ніж 50% [Concept('control', 'CONCEPT_PLACEHOLDER')|e] навернеться до [target_ruler.GetNameWithNoTooltip] [target_ruler.GetReligion.GetAdjectiveWithNoTooltip] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]."
  culture_religion_events.3.b: "[target_ruler.GetNameWithNoTooltip] [target_ruler.GetReligion.GetNameWithNoTooltip] розірве наш [ROOT.GetCountry.GetFlavorRank] на шматки!"
  culture_religion_events.4.title: "Поганий вплив"
  culture_religion_events.4.desc: "Багато хто серед праведних [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] давно погоджувалися, що єретичні вірування [target_ruler.GetName] отруюють [ROOT.GetCountry.GetFlavorRank] і наражають наш народ на небезпеку.\n\nРазом із місцевими священиками [rebel_province.GetName], особливо побожний нащадок однієї з наших старих родин зібрав армію в [rebel_province.GetName] і тепер марширує на столицю, щоб скинути мерзенного єретика в [ROOT.GetCountry.GetCapital.GetName]."
  culture_religion_events.4.a: "Зрадники повинні померти."
  culture_religion_events.5.title: "Язичницький [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  culture_religion_events.5.desc: "Присутність відкрито язичницького [target_ruler.GetReligion.GetGroup.GetAdjective] [ROOT.GetCountry.GetGovernment.GetRulerTitle] у [ROOT.GetCountry.GetCapital.GetName] не залишилася непоміченою серед [ROOT.GetCountry.GetReligion.GetAdjective] підданих у нашому [ROOT.GetCountry.GetFlavorRank]. Серед побожних це стало звичайною справою роздратування, а в районах з існуючою релігійною напруженістю це призвело до ще більшої частоти конфліктів. Повідомляється, що місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('clergy')] ще більше розпалили ситуацію в [rebel_province.GetName], неодноразово повертаючись до «розпусти [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]» у агітаційних промовах до народу [rebel_province.GetName]. На даний момент їх може бути важко усунути з посади без широкого застосування сили."
  culture_religion_events.5.a: "Широке застосування сили є лише доречним."
  culture_religion_events.5.b: "Трон вартий навернення!"
  culture_religion_events.6.title: "[target_ruler.GetReligion.GetAdjectiveWithNoTooltip|U] [ROOT.GetCountry.GetGovernment.GetCourtTitle] [target_ruler.GetNameWithNoTooltip]"
  culture_religion_events.6.desc: "Хоча багато хто вважає віру [target_ruler.GetName] образою всього святого, [target_ruler.GetSheHe] зробив [target_ruler.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle] справжнім притулком для [target_ruler.GetHerHis] сестер і братів по вірі. Використовуючи таким чином побудовану мережу контактів, ми можемо досягти багатьох, кого інакше ніколи б не змогли залучити. Один з цих контактів, [minister.GetName], тепер зазнав нападу з боку тих, хто більш вкорінений у правлячому істеблішменті нашого [ROOT.GetCountry.GetFlavorRank]."
  culture_religion_events.6.a: "[minister.GetHerHis|U] таланти потрібні!"
  culture_religion_events.6.b: "Усунути [minister.GetNameWithNoTooltip] з посади."
  culture_religion_events.7.title: "Конкуренція за прихильність [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  culture_religion_events.7.desc: "Не секрет, що [target_ruler.GetName] дорожить [target_ruler.GetCulture.GetName] народом і що [target_ruler.GetSheHe] розмовляє [ROOT.GetCountry.GetCulture.GetLanguage.GetName] мовою з виразним акцентом.\n#NL![target_ruler.GetNameWithNoTooltip] навіть оточує [target_ruler.GetHerselfHimself] [target_ruler.GetCulture.GetNameWithNoTooltip] радниками та придворними, що не залишилося непоміченим старими [ROOT.GetCountry.GetCulture.GetName] родинами в нашій країні. [minister.GetName], давній поборник традиційних [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] цінностей, дедалі більше розходиться з політикою [target_ruler.GetNameWithNoTooltip] і тепер збирається вийти з [ROOT.GetCountry.GetGovernment.GetAdjective|U] Ради."
  culture_religion_events.7.a: "Ми повинні спробувати виправити цю ситуацію."
  culture_religion_events.7.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  culture_religion_events.8.title: "Фаворитизм у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  culture_religion_events.8.desc: "Явний фаворитизм [target_ruler.GetName] до [target_ruler.GetCulture.GetName] культури не залишився непоміченим серед [ROOT.GetCountry.GetCulture.GetName] народу нашого [ROOT.GetCountry.GetFlavorRank]. Обструкціонізм стає все більш поширеним, оскільки ті, хто має владу, висловлюють своє розчарування нещодавньою політикою."
  culture_religion_events.8.a: "Такого фаворитизму немає."
  culture_religion_events.8.b: "Ми повинні показати, що вносимо деякі зміни."
  culture_religion_events.9.title: "Друзі за кордоном"
  culture_religion_events.9.desc: "Перевага [target_ruler.GetName] до [target_ruler.GetCulture.GetName] культури та мови багатьма розглядається як дещо ексцентрична, але це також відкрило для нас двері в ширшій спільноті [target_ruler.GetCulture.GetNameWithNoTooltip] країн. [target_ruler.GetNameWithNoTooltip] робить усе можливе, щоб налагодити тісніші зв'язки зі своїми [target_ruler.GetHerHis] співвітчизниками."
  culture_religion_events.9.a: "Ніколи не буває забагато друзів."
  culture_religion_events.9.b: "Вивчімо шляхи [advanced_country.GetAdjectiveWithNoTooltip] [advanced_country.GetFlavorRank]."
  culture_religion_events.10.title: "Інтриги в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  culture_religion_events.10.desc: "Піднесення [minister.GetCulture.GetName] чиновника, [minister.GetName], до високої посади розгнівало багатьох з найближчих до [target_ruler.GetName]. Деякі старші члени найстаріших [ROOT.GetCountry.GetCulture.GetName] родин у нашій країні звернулися до нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], вимагаючи, щоб ми звільнили [minister.GetShortNameWithNoTooltip] з [minister.GetHerHis] посади."
  culture_religion_events.10.a: "Ми повинні прислухатися до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] нашого [ROOT.GetCountry.GetFlavorRank]."
  culture_religion_events.10.b: "Безглуздо!"
  culture_religion_events.11.title: "Зростаюча підтримка серед [minister.GetCulture.GetNameWithNoTooltip] населення"
  culture_religion_events.11.desc: "Як провідна фігура [minister.GetCulture.GetName] спільноти, [minister.GetName] має як глибокі знання, так і сильний вплив далеко за межами ради, до якої [minister.GetSheHe] належить у [ROOT.GetCountry.GetCapital.GetName]. Цей факт [minister.GetSheHe] використала на нашу користь, значно підвищивши народну підтримку як нашого [ROOT.GetCountry.GetFlavorRank], так і [ROOT.GetCountry.GetCulture.GetName] народу, який ним править."
  culture_religion_events.11.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  culture_religion_events.12.title: "[minister.GetReligion.GetAdjectiveWithNoTooltip] Міністр"
  culture_religion_events.12.desc: "[minister.GetReligion.GetAdjective] вірні спостерігали за піднесенням нашого [minister.GetName] з цікавістю та ентузіазмом. Для багатьох [minister.GetSheHe] стала доказом того, що людина може досягти успіху в [ROOT.GetCountry.GetAdjective] державі, не належачи до державної релігії."
  culture_religion_events.12.a: "Одного дня ви всі можете піднестися до рівня [minister.GetNameWithNoTooltip]."
  culture_religion_events.12.a.tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], які сповідують [minister.GetReligion.GetAdjectiveWithNoTooltip] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  culture_religion_events.13.title: "Язичники на високих посадах"
  culture_religion_events.13.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] давно заперечували проти використання нами язичників на високих посадах. Коли [minister.GetName] був призначений до нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle], вони голосно заперечували, і їхні заперечення з часом не стали менш категоричними. Деякі провідні релігійні вчені, як вдома, так і за кордоном, тепер засуджують [ROOT.GetCountry.GetFlavorRank] за його явний фаворитизм до не-[ROOT.GetCountry.GetReligion.GetGroup.GetAdjective] чиновників."
  culture_religion_events.13.a: "Настав час відпустити [minister.GetNameWithNoTooltip]."
  culture_religion_events.13.b: "Ми не схиляємося перед вимогами дрібних дилетантів."
  culture_religion_events.13.b.tt: "Усі [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] нашої релігійної групи отримують [ShowBiasValue('entertaining_heathens')|+=] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас."
  entertaining_heathens: "Язичницькі схильності"
  culture_religion_events.14.title: "[minister.GetReligion.GetAdjectiveWithNoTooltip] Вплив у [ROOT.GetCountry.GetGovernment.GetCabinetTitle|U]"
  culture_religion_events.14.desc: "Багато наших вірних [ROOT.GetCountry.GetReligion.GetAdjective] підданих [ROOT.GetCountry.GetName] бачать [minister.GetName] як загрозу теологічній чистоті уряду. Побоюються, що через [minister.GetHerHis] вплив [target_ruler.GetName] буде переконаний надавати перевагу [minister.GetReligion.GetAdjective] чиновникам в уряді, або ж що [minister.GetSheHe] може відвернути [ROOT.GetCountry.GetGovernment.GetRulerTitle] [target_ruler.GetHerselfHimself] від істинної віри."
  culture_religion_events.14.a: "Настав час відпустити [minister.GetNameWithNoTooltip]."
  culture_religion_events.14.b: "Безглуздо."
  culture_religion_events.18.title: "[target_religion.GetAdjectiveWithNoTooltip|U] [ROOT.GetCountry.GetGovernment.GetHeirTitle]?"
  culture_religion_events.18.desc: "[target_heir.GetName] виявив сильний інтерес до [target_religion.GetAdjective] вчень. Як спадкоємець, [target_heir.GetSheHe], звичайно, повинен знати всіх наших підданих, але, можливо, не до такої міри, щоб обговорювати теологію та проводити дебати [target_heir.GetHerselfHimself] щодо [target_religion.GetName]. Провідні члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] тепер звернулися до [target_ruler.GetName], щоб висловити свої занепокоєння. Вони не бачать майбутнього для нашого [ROOT.GetCountry.GetGovernment.GetHeirTitle] у високому уряді, якщо ми не змусимо [target_heir.GetHerHim] прийти до [target_heir.GetHerHis] тями."
  culture_religion_events.18.a: "Настав час поговорити з [target_heir.GetNameWithNoTooltip]."
  culture_religion_events.18.b: "Це [ROOT.GetCountry.GetGovernment.GetRulerTitle] править цією країною."
  culture_religion_events.21.title: "Питання віри"
  culture_religion_events.21.desc: "Вже довгий час особисті переконання [target_ruler.GetName] суперечать релігійному устрою [ROOT.GetCountry.GetName]. Це спричинило як тертя, так і конфлікти з [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та провідними [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які тепер часто ставлять під сумнів [target_ruler.GetHerHis] правління. Однак є багато тих, хто тепер підтримує [target_ruler.GetHerHim] у його відданості [target_ruler.GetReligion.GetAdjective] вірі, як у [ROOT.GetCountry.GetCapital.GetName], так і в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] сільській місцевості.\n\nМожливо, настав час зробити велику зміну в тому, як функціонує [ROOT.GetCountry.GetFlavorRank] [ROOT.GetCountry.GetNameWithNoTooltip] до самої його суті? Звісно, захисники старих звичаїв не підуть добровільно, але якщо є воля, то є і шлях..."
  culture_religion_events.21.a: "[target_capital.GetNameWithNoTooltip] буде [target_ruler.GetReligion.GetAdjectiveWithNoTooltip] [target_capital.GetRank.GetNameWithNoTooltip]."
  culture_religion_events.21.a.tt: "Чверть наших [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] навернеться до [target_ruler.GetNameWithNoTooltip]'s [target_ruler.GetReligion.GetAdjectiveWithNoTooltip] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]."
  culture_religion_events.21.b: "Ми ніколи не могли б піти на такий ризик."
  culture_religion_events.22.title: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] [target_ruler.GetNameWithNoTooltip]"
  culture_religion_events.22.desc: "З самого початку правління [target_ruler.GetName] було зрозуміло, що [target_ruler.GetHerHis] серце належить [target_ruler.GetCulture.GetName]. З часом палацові зали [ROOT.GetCountry.GetCapital.GetName] почали відлунювати веселими святкуваннями, що проводилися повністю в традиційній [target_ruler.GetCulture.GetNameWithNoTooltip] манері, оскільки навіть [ROOT.GetCountry.GetCulture.GetName] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] перейняли дивні, але, здавалося б, модні звичаї [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nЗ такою великою підтримкою іноземних звичаїв, багато хто в нашому [ROOT.GetCountry.GetGovernment.GetCabinetTitle] вважає, що настав час кодифікувати особливий статус [target_ruler.GetCulture.GetNameWithNoTooltip] культури в нашому [ROOT.GetCountry.GetFlavorRank]."
  culture_religion_events.22.a: "Час справді настав."
  culture_religion_events.22.a.tt: "Чверть наших [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] прийме [target_ruler.GetNameWithNoTooltip]'s [target_ruler.GetCulture.GetNameWithNoTooltip] [Concept('culture', 'CONCEPT_PLACEHOLDER')|e]."
  culture_religion_events.22.b: "Ми ніколи не могли б зганьбити спадщину наших предків."