l_english:
  language.1.title: "Ворожа мова"
  language.1.desc: "Наше постійне використання [enemy_dialect.GetLanguage.GetName] як основної мови при дворі викликало деяке здивування через поточний конфлікт із [enemy_country.GetLongName]. Радники [ROOT.GetCountry.GetGovernment.GetRuler.GetName] запропонували нам вирішити це очевидне протиріччя."
  language.1.a: "Сприяти офіційному використанню нашої рідної мови."
  language.1.a.subject: "Наші [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] можуть вирішити наслідувати наш приклад."
  language.1.b: "Прийняти нашу літургійну мову."
  language.1.c: "Прийняти мову [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] — [ruler_language.GetNameWithNoTooltip]."
  language.1.d: "Наше використання [enemy_dialect.GetNameWithNoTooltip] передує цій дрібній суперечці."
  language.1.e: "Ми повинні продовжувати правити мовою Святого Письма."
  language.2.title: "$language.1.title$"
  language.2.desc: "Постійне використання [overlord.GetLongName] мови [enemy_dialect.GetName] як основної при дворі викликало деякі суперечки через поточний конфлікт із [enemy_country.GetLongName].\n\nЯк вирішення, вони натомість вирішили прийняти [new_language.GetName] як свою придворну мову. Чи повинні ми наслідувати їхній приклад?"
  language.2.a: "Ми також повинні сприяти офіційному використанню нашої рідної мови [common_dialect.GetNameWithNoTooltip]."
  language.2.b: "Ми також повинні прийняти [new_language.GetNameWithNoTooltip]."
  language.2.c: "Ні, але настав час самим прийняти мову [common_dialect.GetName]."
  language.2.d: "Ні, немає нічого поганого в [enemy_dialect.GetNameWithNoTooltip]."
  language.10.title: "Мова [country.GetGovernment.GetRulerTitle|U]"
  language.10.desc: "Ще одне засідання ради, ще один офіційний документ, і зрозуміло, що [ruler.GetShortName] не може належним чином поводитися [ruler.GetHerselfHimself] при дворі.\n\nЧерез [ruler.GetHisHer] [ruler_culture.GetName] виховання, [ruler.GetHisHer] володіння [court_language.GetName] залишає бажати кращого. [ruler.GetHisHer|U] помітний іноземний акцент нестерпний для рідних вух і постійне нагадування про те, що [ruler.GetSheHe] не є тим, хто справді повинен керувати [court_language.GetNameWithNoTooltip] двором."
  language.10.a: "Ми повинні прийняти [ruler.GetHisHer] мову [ruler_language.GetNameWithNoTooltip]."
  language.10.b: "[ruler.GetHisHer|U] брак розуміння може бути корисним."
  language.20.title: "Акт про прохання мовою [common_language.GetNameWithNoTooltip]"
  language.20.desc: "Звичайних [primary_culture.GetName] людей змушують проводити судові процеси мовою [court_language.GetName], мовою, якої вони не розуміють.\n\nЗростає галас щодо того, щоб судова система прийняла загальновживану [common_language.GetNameWithNoTooltip], щоб прохання та вироки були ширше зрозумілі."
  language.20.desc_ENG: "З часів нормандського завоювання 1066 року звичайних [primary_culture.GetName] людей змушували проводити судові процеси мовою [court_language.GetName], мовою, якої вони не розуміють.\n\nЗростає галас щодо того, щоб судова система прийняла загальновживану [common_language.GetNameWithNoTooltip], щоб прохання та вироки були ширше зрозумілі."
  language.20.desc_IRE: "POSTEDIT_Камбро-нормандське завоювання багато поколінь тому принесло мову [court_language.GetName] до [ireland_region.GetName], але прямий [norman_culture.GetName] вплив з тих пір ослаб у [ROOT.GetCountry.GetLongName]. Тепер [primary_culture.GetName] магістрати займають замки та будують міста.\n\nОднак звичайних людей все ще змушують проводити судові процеси мовою [court_language.GetNameWithNoTooltip], мовою, якої вони не розуміють.\n\nЗростає галас щодо того, щоб судова система прийняла загальновживану [common_language.GetNameWithNoTooltip], щоб прохання та вироки були ширше зрозумілі."
  language.20.a: "Повністю скасувати використання [court_language.GetNameWithNoTooltip] у нашому уряді."
  language.20.b: "Дозволити використовувати [common_language.GetNameWithNoTooltip] у загальних судах."
  language.20.c: "Зберегти [court_language.GetNameWithNoTooltip] як універсальну мову закону."