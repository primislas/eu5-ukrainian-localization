l_english:
  winter_events.4.title: "Холодні та мокрі поля"
  winter_events.4.desc: "Морози тримаються вже досить довго. У очах місцевого селянства врожай здається дедалі меншим, оскільки численні комори спустошуються з тривожною швидкістю. Останньою жертвою спалаху голоду стала [target_province_1.GetName]. Зі скороченням літа зернові, що потребують сонячного світла, не дають такого ж обсягу, як у попередні роки. Було б мудро спробувати полегшити ситуацію, інакше ми ризикуємо нещастям та неконтрольованим поширенням хвороб!"
  winter_events.4.a: "Така ціна, яку ми платимо за життя."
  winter_events.4.b: "Ми можемо принаймні компенсувати місцевим фермерам!"
  winter_events.4.c: "Надіслати продовольчу допомогу з [target_province_2.GetNameWithNoTooltip]!"
  due_to_no_road_network_and_distance_tt: "Через відсутність [Concept('road', 'CONCEPT_PLACEHOLDER')|e] та відстань між [Concept('target_location_1.GetName] та [target_location_2.GetName], частина [food', 'CONCEPT_PLACEHOLDER')|e] буде втрачена по дорозі"
  scales_with_target_province_1_province_food_percentage_tt: "Сума, що належить фермерам, буде розрахована на основі відсотка [Concept('food', 'CONCEPT_PLACEHOLDER')|e], що зараз зберігається в коморах [target_province_1.GetName]"
  winter_events.5.title: "Плаваючий лід"
  winter_events.5.desc: "Поширення зими та зниження температур вплинули на життєво важливі проходи, які кораблі використовують для перевезення товарів до та з [ShowProvinceDefinitionName('icelandic_coast_province')]. Прогрес льоду, здається, постійно розширюється, і весь острів, здається, оточений стінами білого.\n\nРибалки та китобої, які зазвичай перетинають ці води, повідомляють, що айсберги навколо острова більше не відступають з приходом весни, роблячи цю територію небезпечною для перетину цілий рік."
  winter_events.5.historical_info: "Під час #italic Малого льодовикового періоду#! узбережжя Ісландії часто забивалося дрейфуючим морським льодом, особливо з XVII століття. Цей лід, що приносився з Арктики, часто затримувався до самого літа, перекриваючи життєво важливі рибальські та торговельні шляхи.\n\nЧерез заблоковані судна постачання острів стикався з тривалими періодами ізоляції та труднощів, борючись з нестачею продовольства та економічною напругою. Море не замерзало повністю, але лід робив і без того важке існування Ісландії ще складнішим протягом тих холодніших століть."
  winter_events.5.a: "Фортеця морозу!"
  freeze_iceland_tt: "[Concept('seazones', 'CONCEPT_PLACEHOLDER')|e], що оточують [ShowProvinceDefinitionNameWithNoTooltip('icelandic_coast_province')], страждатимуть від [ShowModifier('floating_ices_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що розкладається"
  winter_events.6.title: "[ShowAreaNameWithNoTooltip('greenland_area')] у застої"
  winter_events.6.desc: "Типова зима в [ShowAreaName('greenland_area')] — це багато снігу та боротьба за виживання. З початку великих морозів ландшафт перетворився на майже непридатну для життя замерзлу рівнину. Льодовики, як замерзлі велетні, височіють навколо всього острова, блокуючи доступ до та з його небагатьох портів більшу частину року.\n\nКілька поселень на південному узбережжі острова тепер зменшуються, оскільки посилені зими роблять землеробство та розведення худоби майже неможливими."
  winter_events.6.historical_info: "Навіть інуїти, пристосовані до холодного клімату, вважали глибші морози та непередбачувану погоду складними. Гренландія стала землею, де виживання означало постійну боротьбу з наступаючим холодом та ізоляцією."
  winter_events.6.a: "Будемо сподіватися на тепліші часи..."
  freeze_greenland_tt: "[Concept('seazones', 'CONCEPT_PLACEHOLDER')|e], що оточують [ShowAreaNameWithNoTooltip('greenland_area')], страждатимуть від [ShowModifier('encroaching_cold_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що розкладається"
  winter_events.7.title: "Мертві пасовища в [ShowAreaNameWithNoTooltip('greenland_area')]"
  winter_events.7.desc: "Століття тому відважні моряки та поселенці, які вперше ступили на [ShowAreaName('greenland_area')], привезли з собою овець та кіз. Ці тварини паслися на пасовищах південного узбережжя острова, де клімат, хоч і холодний, все ж дозволяв пасовищне землеробство. Поселенці використовували [ShowGoodsName('wool')] для виготовлення одягу, ковдр та інших необхідних речей для виживання в суворих умовах.\n\nОднак останні кілька зим унеможливили підтримку належного поголів'я. Оскільки поля замерзають, наш колись стійкий вихід худоби тепер майже зник. Водночас косяки риб, які колись заповнювали наші береги, здається, зменшуються з кожним сезоном. Життя здається безбарвним і похмурим під час холодних зим у [ShowAreaNameWithNoTooltip('greenland_area')]."
  winter_events.7.historical_info: "Під час #italic Малого льодовикового періоду#! нижчі температури, а також коротші вегетаційні періоди та суворіші зими, робили все важче утримувати худобу. Пасовища, які колись підтримували овець та кіз, почали скорочуватися під наступаючим льодом та вічною мерзлотою, що призвело до зниження виробництва [ShowGoodsNameWithNoTooltip('wool')]. Водночас лід ускладнював підтримку місцевого рибальства, що призводило до значного голоду та різкого зменшення запасів продовольства."
  winter_events.7.a: "Безперечно, трагедія."
  winter_events.8.title: "Посуха в [target_province_1.GetNameWithNoTooltip]"
  winter_events.8.desc: "Останні кліматичні зміни не сприяли нашому народу. Відсутність дощів та постійні морози дестабілізували всю екосистему в [target_province_1.GetName], що призвело до періодів посухи. Це лише остання перешкода за десятиліття бурхливих зим, багато врожаїв загинуло, а голод є частим явищем.\n\nМісцеві жителі, зрозуміло, засмучені, багато хто вимагає відшкодування збитків, намагаючись захистити себе та свої сім'ї від голоду та передчасної смерті."
  winter_events.8.a: "Нехай голодують."
  winter_events.8.b: "Ми можемо пожертвувати трохи монет."
  outcome_base_key: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_province_1.GetName] постраждає"
  very_mild_outcome_variable_tt_a: "$outcome_base_key$ #R -5.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  mild_outcome_variable_tt_a: "$outcome_base_key$ #R -10.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  strong_outcome_variable_tt_a: "$outcome_base_key$ #R -15.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  very_strong_outcome_variable_tt_a: "$outcome_base_key$ #R -20.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  extreme_outcome_variable_tt_a: "$outcome_base_key$ #R -25.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  mild_outcome_variable_tt_b: "$outcome_base_key$ #R -5.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  strong_outcome_variable_tt_b: "$outcome_base_key$ #R -10.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  very_strong_outcome_variable_tt_b: "$outcome_base_key$ #R -15.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  extreme_outcome_variable_tt_b: "$outcome_base_key$ #R -20.00%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  winter_events.9.title: "Не залишилося клинків на рівнині"
  winter_events.9.desc: "Міграційні моделі [ShowGoodsName('livestock')] стали досить застійними за останні кілька років. Брак доступних пасовищ і постійно падаюча температура надзвичайно ускладнили підтримку наших пасовищ.\n\nЦе, своєю чергою, призвело до значного зниження виробництва в цьому секторі, від якого залежить багато наших людей. Ми не знаємо, коли ця хвиля морозу та льоду відступить, але ми можемо сподіватися і молитися за найкращий можливий результат попри всі труднощі."
  winter_events.9.a: "Ми нічого не можемо зробити, окрім як спостерігати за поширенням холоду..."
  livestock_provinces_suffer_tt: "Ця втрата [Concept('food', 'CONCEPT_PLACEHOLDER')|e] застосовуватиметься до [ROOT.GetVariable('num_affected_provinces_variable').GetValue] [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e], які виробляють [ShowGoodsName('livestock')], і масштабуватиметься залежно від їхнього провінційного [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  winter_events.10.title: "Невчасна посуха"
  winter_events.10.desc: "Обіцянка нової землі приносить теплі думки про нове майбутнє. Однак такі амбіції розбиваються, коли їх розчавлює вага холодного та сухого середовища. Так сталося з тими, хто шукав щастя, осідаючи на землях [target_charter.GetName]. Очікуючи зустріти добрий ґрунт та великі пасовища, наші поселенці були гірко розчаровані, побачивши стан місця поселення."
  winter_events.10.a: "Таке життя."
  winter_events.10.b: "Ми можемо організувати пожертви їжі з [target_province.GetNameWithNoTooltip]!"
  every_location_in_province_gets_dry_spell_modifier_tt: "Кожне місце в [Concept('province', 'CONCEPT_PLACEHOLDER')|e] [target_charter.GetName] страждатиме від [ShowModifier('dry_spell_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що занепадає"
  winter_events.11.title: "Діяння відьми"
  winter_events.11.desc: "Нещодавні суворі зими, гради та нескінченні морози завдали великої шкоди [target_peasants.GetName]. У такому негостинному середовищі, де люди доведені до крайнощів, вони часто вдаються до пошуку цапа-відбувайла, несправедливої причини, щоб виплеснути своє розчарування та осмислити свої жахливі обставини.\n\nАле це те, що думають вчені. Члени [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] виступили з пропозицією, що такі явища є не чим іншим, як чаклунством за наказом групи божевільних жінок, які тримають усе [target_location.GetName] під своїми чарами!"
  winter_events.11.a: "Спалити їх!"
  winter_events.11.b: "Чи забрав холод останній наш розум?"
  based_on_traditionalist_vs_innovative_tt: "Виходячи з нашої поточної позиції між [ShowSocietyDirectionName('traditionalist')] та [ShowSocietyDirectionName('innovative')]:"
  burn_witches_tt: "Буде спалено близько #R [ROOT.GetVariable('display_burned_witches_variable').GetValue]#! відьом!"
  cc_stance_on_witchcraft_tt: "Через позицію [GetUniqueInternationalOrganization('catholic_church').GetName] щодо чаклунства:"
  winter_events.12.title: "Порожній келих"
  winter_events.12.desc: "Сама основа багатьох суспільств і наріжний камінь радісних подій, від сумних поминань до святкувань будь-якого роду, — це наше [ShowGoodsName('wine')]. Виноградники, що колись простягалися, скільки сягало око, тепер лежать безплідні та марні.\n\nПогода більше не є сприятливою для вирощування нашої продукції, як це було, коли наші батьки будували ці маєтки. Зростаючий попит, у поєднанні зі зменшенням пропозиції від виноробень, що належать [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], призвів до багатьох голосів невдоволення, що поширюються так само швидко, як холод огортає наші землі."
  winter_events.12.a: "Спраглі вуста — іграшки диявола!"
  winter_events.12.b: "Ми можемо допомогти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  locations_affected_with_prosperity_loss_tt: "[ROOT.GetVariable('num_affected_locations_variable').GetValue] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], що виробляють [ShowGoodsNameWithNoTooltip('wine')] (як-от [target_location.GetName]), втратять [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  winter_events.13.title: "Марні праці"
  winter_events.13.desc: "Всеохоплюючий холод, що мучить наші землі, та мінливий стан клімату негативно вплинули на врожай [ShowGoodsName('fruit')] по всьому нашому домену. Фермери, що колись продавали незліченні мішки продукції, тепер голодують і спостерігають, як їхні господарства занепадають.\n\nБагато хто запропонував змінити їхні ферми, щоб пристосуватися до вирощування дешевших харчових альтернатив у спробі боротьби з голодом, особливо навколо полів у [target_location.GetName]. Це вимагатиме фінансування та зосереджених зусиль з боку нашого уряду."
  winter_events.13.a: "Ми не можемо дозволити собі такі легковажності."
  winter_events.13.b: "Давайте профінансуємо зміну виробництва."
  winter_events.14.title: "Глибока біла ковдра"
  winter_events.14.desc: "На жаль, остання зима виявилася надзвичайно суворою. Зниження температур до безпрецедентних рівнів призвело до снігових бур, що часто покривають цілі міста. [target_province.GetName] є останньою жертвою жорстокої природи, чий снігопад забрав життя багатьох, знищивши будинки, сім'ї та господарства, розташовані на нижніх рівнях провінції. Нещасні селяни звертаються по допомогу до сусідніх провінцій, але допомога ускладнена для сіл з обмеженим або відсутнім дорожнім доступом."
  winter_events.14.a: "Думки та молитви."
  devastation_helped_by_roads_tt: "Наявність [Concept('roads', 'CONCEPT_PLACEHOLDER')|e], що ведуть до [target_province.GetNameWithNoTooltip], #G зменшила#! вплив снігопаду"
  devastation_not_helped_by_roads_tt: "Якби [Concept('target_province.GetNameWithNoTooltip] мала адекватну [road', 'CONCEPT_PLACEHOLDER')|e] мережу, вплив снігопаду був би #R менш суворим#!"
  winter_events.15.title: "Гіркий холод у [target_location.GetNameWithNoTooltip]"
  winter_events.15.desc: "Стіна білої смерті та відчаю огорнула [target_location.GetName]. Дороги, що використовувалися для перевезення життєво важливих товарів, тепер майже повністю покриті по всій провінції, що призводить до дефіциту життєво важливих товарів, таких як їжа та ліки. Люди волають про допомогу, коли купи снігу огортають ландшафт, заморожуючи кінчики пальців і онімілі кінцівки.\n\nПоточна ситуація призвела до обвалу багатьох будівель, багато з яких, можливо, ніколи не будуть відновлені через брак фінансування. Відчай витає в повітрі, а спустошення, спричинене зимою, постійно поширюється. Ця хвиля морозу не схожа на жодну іншу, вона сіє лихо та хаос, поки ми молимося побачити кінець цієї зими, згуртувавшись біля вогнища."
  winter_events.15.a: "Ми вистоїмо."
  winter_events.15.b: "Надіслати допомогу!"
  scales_with_location_tax_base_tt: "Виплачена допомога масштабується з [Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName]"
  winter_events.100.title: "Голод робить злодієм будь-яку людину"
  winter_events.100.desc: "Нас пограбували!\n\nБанда злодіїв, за сприяння незадоволених охоронців, проникла до нашого палацу і розграбувала його на свій розсуд. Вони втекли з частиною нашої скарбниці та всіма нашими припасами.\n\nЗвістка про їхній грабунок швидко поширилася по всій нашій нації, оскільки розбійники сховалися в охопленій голодом [target_province_scope.GetName] і заслужили підтримку населення, поділившись своєю здобиччю з бідними та хворими.\nНаша репутація сильно постраждала, оскільки цей інцидент виставив нас тиранічними ідіотами, які накопичують їжу для себе, поки народ страждає."
  winter_events.100.a: "Знайдіть їх і повісьте!"
  winter_events.100.b: "Перекрутіть історію, надішліть їжу та золото бідним."
  winter_events.100.c: "Очистити охорону палацу."
  winter_events.100.rebel_name: "[ROOT.GetVariable('rebel_origin_province_variable').GetName] Повстанці"
  winter_events.101.title: "Божественна Чума"
  winter_events.101.desc: "Налякані фермери з [target_province_scope.GetName] повідомляють про жахливу чуму голубів та інших птахів, що спустошують поля провінції.\n\nМисливці та урядовці звинувачують у чумі брак трави та диких фруктів у цьому районі. Проте населення боїться, що [ROOT.GetCountry.GetName] карається Богом за свої провини."
  winter_events.101.a: "Надіслати духовенство, щоб заспокоїти їх."
  winter_events.101.b: "Надіслати кошти на відбудову."
  winter_events.101.c: "Ми не будемо слухати забобонні казки."
  winter_events.102.title: "Немає Іншого Вибору"
  winter_events.102.desc: "Безперервний потік гірко холодних років спустошив наші землі до такої міри, що наші основні продукти харчування більше не життєздатні. Багато фермерських родин безнадійно обробляють поля, які, як вони знають, цього року також не принесуть плодів.\n\nМи могли б наказати їм змінити основний продукт на більш [ShowGoodsName('millet')], але багато хто буде неохоче ризикувати засобами до існування своєї родини в неперевіреній зміні способу життя, без допомоги своїх лордів."
  winter_events.102.a: "Нехай роблять, що хочуть."
  winter_events.102.b: "Ми інвестуватимемо лише в [target_province_scope.GetNameWithNoTooltip]."
  winter_events.16.title: "Зима [GetCurrentYear] року"
  winter_events.16.desc: "Минулі зими завжди були обтяжливими. Наступ морозу часто забирав життя наших побратимів, врожай наших ферм. Однак цього року холод досяг неймовірного ступеня, вразивши весь континент силою, яка, здається, заморожує сам час. Гіркі вітри проносяться землею, оскільки, повільно, навіть найстійкіші тварини та рослини схиляються перед беззаперечним пануванням матері-природи.\n\nЦілі села поховані під снігом, а зерносховища, повні запасів, псуються за лічені дні. Навіть ті, хто тулиться біля вогню, ледь можуть стримувати невпинний холод, тоді як тварини замерзають там, де стоять, їхні тіла жорсткі та безжиттєві..."
  winter_events.16.historical_info: "Зима 1709 року, відома як #italic Великий Мороз#!, є однією з найхолодніших зим, коли-небудь зареєстрованих у Європі. Вона охопила значну частину континенту, особливо сильно вдаривши по Франції, Італії, Англії та Скандинавії. З кінця грудня 1708 року по березень 1709 року температура різко впала, вкривши землю снігом та льодом на тижні. Великі річки, такі як Темза в Англії та Сена у Франції, повністю замерзли, зупинивши торгівлю та подорожі. Глибокий мороз призвів до широкомасштабних труднощів, залишивши тривалий слід в європейській історії."
  winter_events.16.a: "Що ми зробили, щоб заслужити таке покарання!?"
  food_stockpiles_go_bad_depending_on_winter_tt: "Запаси [Concept('food', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] #R постраждають#! залежно від [Concept('winter_level', 'CONCEPT_PLACEHOLDER')|e] їхніх [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]"
  winter_events.17.title: "Холодний Марш"
  winter_events.17.desc: "Наші солдати [target_army.GetName] вже досить довго пробиралися важкою місцевістю. Їхній марш здається майже поетично вічним, оскільки вони переслідують фронт за фронтом. Зібравшись біля табірних вогнів у [target_location.GetName], мороз наздоганяє їх.\n\nВідморожені кінцівки, гангрена та зламаний бойовий дух віщують загибель нашої кампанії. Багато хто вже піддався великому морозу, усвідомивши, що наші зменшувані запаси їжі зіпсовані та гнилі. Їхні варіанти нечисленні..."
  winter_events.17.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  winter_events.17.b: "Фінансувати аварійну лінію постачання з [target_province.GetNameWithNoTooltip]!"
  target_province_loses_10_prosperity_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] втратить [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  winter_events.18.title: "Дефіцит [ShowGoodsNameWithNoTooltip('lumber')]"
  winter_events.18.desc: "Нещодавня зима завдала шкоди нашим людям, а також виробництву [ShowGoodsNameWithNoTooltip('lumber')] у всьому нашому [ROOT.GetCountry.GetFlavorRank]. З коротшими лініями постачання та частими нещасними випадками через холод, все більше людей піддаються суворості морозу.\n\nУ місцях, де зима ще суворіша, на жаль, було повідомлено про кілька нещасних випадків, трагічних смертей робітників через ворожі та невблаганні умови їхнього робочого місця."
  winter_events.18.a: "Це досить тривожно."
  workers_may_quit_or_have_accidents_here_tt: "Робітники на $lumber$ [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] у вищезгаданих [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] можуть постраждати від смертельних нещасних випадків або змінити свою професію"
  winter_events.103.title: "Холодне та Гірке Місце"
  winter_events.103.desc: "Пекучий холод і безплідна земля [target_province_scope.GetName] знищили моральний дух навіть найвитриваліших наших колоністів, багато з них вже почали повертатися додому, а ті, що залишилися, скаржаться, що територія є просто замерзлою пусткою, де немає чого вирощувати чи видобувати.\n\nКолонія приречена на провал без нових інвестицій у наші зусилля з дослідження ресурсів регіону."
  winter_events.103.a: "Надіслати необхідні кошти."
  winter_events.103.b: "Ми більше не можемо дозволити собі її підтримувати."
  winter_events.104.title: "Бенкет для Вовків"
  winter_events.104.desc: "Посушливе та вітряне літо цього року сильно послабило нашу худобу по всій країні, але провінція [target_province_scope.GetName] отримала левову частку жахливої невдачі. Її фермери повідомляють, що тепер, з приходом цієї ненависної зими, багато їхніх стад гинуть від хвороб, оскільки вони туляться разом у марній спробі відігнати лютий холод."
  winter_events.104.a: "Надіслати їм трохи золота для відбудови їхніх ферм."
  winter_events.104.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"