l_english:
  revolution_disaster.1.title: "Повстання в [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  revolution_disaster.1.desc: "Десятиліття феодального гніту, релігійної нетерпимості та несправедливого оподаткування — усе це сприяло революційним рухам, що почали виникати на наших землях. [target_ruler.GetName] відчайдушно шукав вирішення проблем, що постійно зростали, оскільки наша країна опинилася на милості дедалі амбітніших [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], підтримуваних обуреними [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')].\n\n [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] [ROOT.GetCountry.GetCapital.GetArea.GetName] приєдналися до [target_rebel.GetName] [ROOT.GetCountry.GetCapital.GetProvince.GetName]. Швидким ударом повстанці штурмували місцеву в'язницю [ROOT.GetCountry.GetCapital.GetName], озброївшись у процесі, і оголосили активний стан [ShowDisasterName('revolution_disaster')] проти Старого Режиму!"
  revolution_disaster.1.a: "Нас чекають лихі часи."
  revolution_disaster.1.a.tt: "Приблизно [ROOT.GetVariable('rev_rebelling_num_pops_var').GetValue|V0]#Y K#! наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у #Y [ROOT.GetVariable('rev_rebelling_num_provinces_var').GetValue]#! [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] приєднаються до справи [target_rebel.GetName]"
  revolution_disaster.2.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Революція"
  revolution_disaster.2.desc: "Після штурму та падіння [ROOT.GetCountry.GetCapital.GetName], [rebel.GetName] оголосили громадянську війну проти [target_ruler.GetName] та [ROOT.GetCountry.GetFlavorRank] загалом. [target.GetLongName] може бути лише тимчасовою асамблеєю, але сама її присутність є дуже реальною загрозою для [ROOT.GetCountry.GetLongName]. Якщо не впоратися швидко, вся наша держава може розвалитися..."
  revolution_disaster.2.a: "Ми повинні показати цим вискочкам їхнє місце!"
  revolution_disaster.2.b: "Можливо, вони мають рацію..."
  revolution_disaster.3.title: "Кінець [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Революції"
  revolution_disaster.3.desc: "Ми розгромили революційних вискочок! Більше не буде оскаржуватися правління [target_character.GetName], а революційних повстанців було віддано мечу за зраду проти [ROOT.GetCountry.GetLongName]."
  revolution_disaster.3.a: "Порядок відновлено."
  revolution_disaster.4.title: "Піднесення [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Революційної Держави"
  revolution_disaster.4.desc: "З перемогою наших революційних сил старого уряду більше немає. Будь-яка подоба єдності та захисту, яку він колись надавав, є давно забутим спогадом, тоді як його жахи та безгосподарність щодо [ROOT.GetCountry.GetAdjective] народу все ще зберігаються донині.\n\nПід обраним керівництвом [target_character.GetName] новостворена [ROOT.GetCountry.GetLongNameWithNoTooltip] принесе процвітання, розірве стародавні кайдани, які зв'язували [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] з їхніми панами, і змусить старий світовий порядок тремтіти!"
  revolution_disaster.4.a: "Хай живе Революція!"