l_english:
  aspiration_for_liberty.1.title: "Прагнення до свободи"
  aspiration_for_liberty.1.desc: "Сумнівне правління [target_character.GetName], прагнення народу до свободи та бажання втілення просвітницьких ідеалів спровокували революцію, що здається майже неминучою. Народ об'єднався та взявся за зброю, намагаючись скинути [ROOT.GetCountry.GetFlavorRank], тим самим розпочавши одну з найкривавіших революцій нашого часу."
  aspiration_for_liberty.1.a: "Нас чекають лихі часи."
  pops_lose_satisfaction_based_on_literacy_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що належать до [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] або [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], втратять [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] залежно від їхньої [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e]"
  aspiration_for_liberty.2.title: "Порядок відновлено"
  aspiration_for_liberty.2.desc.a: "Гнів, викликаний [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], зростав дедалі більше під безконтрольною владою [target_character.GetName]. Оскільки податки зростали, а особисті свободи зменшувалися, люди вимагали відновлення [ROOT.GetCountry.GetGovernment.GetParliament.GetName] для представлення їхніх інтересів. Вони вбачають у ньому запобіжник проти свавільного правління, що захищає їхні права та власність від надмірного втручання. Їхня політична влада змусила [target_character.GetShortNameWithNoTooltip] діяти, фактично відновивши [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  aspiration_for_liberty.2.desc.b: "У відповідь на повстання [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], [target_character.GetName] завзято тримався абсолютизму, сповнений рішучості запобігти будь-якому підриву [target_character.GetHerHis] влади.\n\nВважаючи [target_character.GetHerselfHimself] божественно призначеним, будь-яка поступка парламентській владі є загрозою для [target_character.GetHerHis] авторитету та стабільності [target_character.GetHerHis] правління. Застосувавши суворі заходи та придушивши численні повстання, ми знову зберегли мир у нашому [ROOT.GetCountry.GetFlavorRank]."
  aspiration_for_liberty.2.a: "Народ цього забажав."
  aspiration_for_liberty.2.b: "Не може бути жодного інакомислення!"
  aspiration_for_liberty.3.title: "Битви на чужій землі"
  aspiration_for_liberty.3.desc: "Наші перспективи фінансового успіху були винятково похмурими протягом останніх кількох років. Невпинні інвестиції [target_character.GetName] у дорогі війни на чужій землі виснажили державну скарбницю, залишивши мало для підтримки нагальних внутрішніх потреб. У поєднанні з безконтрольним урядовим безгосподарністю, фінансовою недбалістю та ескалацією політичної нестабільності, ці дії спустошили економіку, підірвавши довіру суспільства до правлячих кіл.\n\nМи зараз балансуємо на межі банкрутства, зі зростаючим невдоволенням серед громадян, які дедалі частіше ставлять під сумнів пріоритети [target_character.GetShortNameWithNoTooltip]. Ситуація стає критичною, оскільки борги накопичуються, і держава намагається підтримувати навіть базові функції на тлі насувається фіскального колапсу."
  aspiration_for_liberty.3.a: "Скарбниця навіть не близька до спустошення!"
  aspiration_for_liberty.3.b: "Скоротити військові витрати."
  aspiration_for_liberty.4.title: "Урядова некомпетентність"
  aspiration_for_liberty.4.desc: "Нездатність уряду керувати країною під час [ShowDisasterName('aspiration_for_liberty')] нашого народу призвела до широкого невдоволення, дозволивши виникнути новим повстанням по всій країні, таким як [target_rebel.GetName]. Громадське розчарування досягло критичної точки, оскільки багато хто виступає проти лідерів, яких вони вважають корумпованими та неефективними.\n\nВимога революції стає гучнішою з кожним днем, з людьми з усіх верств суспільства, що приєднуються до руху. Сподіваючись повернути контроль над своїм майбутнім, вони готові боротися за свої вимоги за будь-яку ціну, даючи зрозуміти, що вони не приймуть нічого меншого, ніж повна капітуляція перед їхніми вимогами."
  aspiration_for_liberty.4.a: "Немає про що турбуватися."
  aspiration_for_liberty.4.b: "Надати [target_rebel.GetNameWithNoTooltip] деякі поступки."
  lose_10_control_in_affected_locations_tt: "[Concept('locations', 'CONCEPT_PLACEHOLDER')|e], які наразі підтримують [Concept('target_rebel.GetNameWithNoTooltip] [rebellion', 'CONCEPT_PLACEHOLDER')|e], втратять [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  every_supporter_pop_gains_5_satisfaction_tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], що підтримує [Concept('target_rebel.GetNameWithNoTooltip] [rebellion', 'CONCEPT_PLACEHOLDER')|e], отримає [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"