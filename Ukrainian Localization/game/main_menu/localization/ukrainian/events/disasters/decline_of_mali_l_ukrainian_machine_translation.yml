l_english:
  decline_of_mali.1.title: "Занепад [ROOT.GetCountry.GetNameWithNoTooltip]"
  decline_of_mali.1.desc: "Це почалося непомітно, але день за днем, місяць за місяцем, рік за роком, неспокійне відчуття поширювалося землями [ROOT.GetCountry.GetLongName]. Трава на полях вже не така зелена, як раніше, товари, привезені купцями на ринки, стають дефіцитнішими, а подорожі за межами сіл та поселень стають дедалі небезпечнішими. Як [ROOT.GetCountry.GetGovernment.GetRulerTitle], сидячи при [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] дворі, зустріне цей зловісний період?"
  decline_of_mali.1.a: "Попереду темні часи..."
  decline_of_mali.2.title.a: "Нове Піднесення [ROOT.GetCountry.GetNameWithNoTooltip]"
  decline_of_mali.2.desc.a: "Наш [ROOT.GetCountry.GetFlavorRank] боровся роками, стикаючись із загрозами будь-якого типу та стану. Однак це зміцнило нашу країну, і, керовані праведним та справедливим правлінням нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], ми подолали важкі часи, готові зайняти місце, яке ми заслуговуємо у світі, ми, могутній [ROOT.GetCountry.GetLongName]!"
  decline_of_mali.2.title.b: "Падіння $MAL$"
  decline_of_mali.2.desc.b: "Наш [ROOT.GetCountry.GetFlavorRank] боровся роками, стикаючись із загрозами будь-якого типу та стану. Їх було надто багато і вони були надто обтяжливими, щоб відбити їх, і ми повільно втрачали контроль над нашими колишніми землями та народами, що їх населяли, перетворившись на тінь того, чим була наша колись могутня країна."
  decline_of_mali.2.title.zzz: "[ROOT.GetCountry.GetNameWithNoTooltip] Виживає!"
  decline_of_mali.2.desc.zzz: "Завдяки діям та щасливим подіям, [ROOT.GetCountry.GetName] пережила найгірше. Хоча ми більше не є імперією значного значення, ми принаймні забезпечили майбутнє для [ROOT.GetCountry.GetAdjectiveWithNoTooltip] народу."
  decline_of_mali.2.a: "Слава [ROOT.GetCountry.GetNameWithNoTooltip]!"
  decline_of_mali.2.b: "Зрештою, наша колись велика імперія впала..."
  decline_of_mali.2.zzz: "Принаймні нас не було знищено..."
  decline_of_mali.3.title: "Повстання Претендента"
  decline_of_mali.3.desc: "Серед вакууму влади харизматична особа з [target_location.GetName] виступає вперед, стверджуючи, що є давно втраченим родичем [ROOT.GetCountry.GetGovernment.GetRuler.GetName] та законним спадкоємцем престолу. Цей претендент здобуває підтримку від незадоволених фракцій у [ROOT.GetCountry.GetLongName], які розглядають цю особу як життєздатну альтернативу для управління країною, заручаючись підтримкою впливових дворян, військових командирів та релігійних діячів, які бачать можливість просунути власні інтереси."
  decline_of_mali.3.a: "Бийтеся з тим клятим претендентом!"
  decline_of_mali.3.a.tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [target_location.GetProvinceDefinition.GetName] приєднуються до [mal_pretender_rebels.GetName] і втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  decline_of_mali.3.b: "[mal_pretender_leader.GetNameWithNoTooltip] справді може мати кращі претензії..."
  mal_pretender_rebels: "Повстанці-Претенденти"
  decline_of_mali.4.title: "Ненадійна Армія"
  decline_of_mali.4.desc: "[target_country.GetLongName] була побудована на військових перемогах, здобутих її могутніми військами та хоробрими генералами. Однак нині некомпетентні військові командири піднімаються на владні позиції, призначені через кумівство або фаворитизм, а не за заслуги, вражаючи армію глибоко вкоріненим фракціоналізмом та внутрішніми розколами. Вірність розділяється, послаблюючи ефективність та єдність збройних сил, і спричиняючи подальші міжусобиці. Це стало значною проблемою в провінції [target_province.GetName], де некомпетентні, але впливові військові збираються в [target_location.GetName], щоб змовитися проти [target_country.GetFlavorRank]..."
  decline_of_mali.4.a: "Ці брудні зрадники!"
  decline_of_mali.4.b: "Підтвердити нашу владу над армією!"
  decline_of_mali.4.b.tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [target_province.GetName] приєднуються до [mal_provoked_military_forces.GetName] і втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  mal_provoked_military_forces: "Спровоковані Військові Сили"
  decline_of_mali.5.title: "Заворушення в [target_province.GetNameWithNoTooltip]"
  decline_of_mali.5.title.fallback: "Провінційні заворушення"
  decline_of_mali.5.desc: "У міру того, як центральна влада [ROOT.GetCountry.GetName] слабшає, незадоволені місцеві правителі та провінційна еліта починають кидати виклик контролю [ROOT.GetCountry.GetFlavorRank]. Вони вважають, що їхні ресурси та праця експлуатуються на користь інших регіонів, тоді як їхній власний економічний розвиток занедбаний. Це сприйняття породжує невдоволення та посилює їхні заворушення, змушуючи їх відмовлятися платити данину, вимагаючи, щоб їхні місцеві влади правили їхньою землею. Цей внутрішній розбрат ще більше руйнує єдність [ROOT.GetCountry.GetFlavorRank]."
  decline_of_mali.5.a: "Надати їм автономію."
  decline_of_mali.5.b: "Придушити їх."
  mal_separatists_rebels: "Сепаратисти"
  decline_of_mali.6.title: "Придворні інтриги в [ROOT.GetCountry.GetNameWithNoTooltip]"
  decline_of_mali.6.desc: "У розкішних залах двору розгортається павутина політичного суперництва, таємних союзів та боротьби за владу, що загрожує стабільності та цілісності [ROOT.GetCountry.GetLongName]. Формуються фракції, кожна з яких прагне впливу, влади та контролю над рішеннями [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Ці фракції складаються з амбітних дворян, радників та впливових осіб, які використовують маніпуляції, хабарництво та шантаж, щоб отримати владу, закріпити свої позиції та просувати свої особисті інтереси. Змовники ретельно стратегізують свої кроки, шукаючи можливості експлуатувати або маніпулювати довірою та рішеннями [ROOT.GetCountry.GetGovernment.GetRuler.GetName]."
  decline_of_mali.6.a: "Стратити [mal_target_character.GetNameWithNoTooltip] як головного змовника!"
  decline_of_mali.6.b: "Це нежиттєздатно, тікати зі столиці..."
  decline_of_mali.6.c: "Як жахливо!"
  decline_of_mali.7.title: "Легітимність під питанням"
  decline_of_mali.7.desc: "Виникають сумніви та суперечки щодо легітимності [ruler_character.GetName], кидаючи тінь невизначеності та нестабільності на [ROOT.GetCountry.GetLongName]. Серед населення циркулюють теорії змови, чутки, що натякають на таємні союзи, приховані особистості або незаконні засоби, використані для сходження на трон. Ці теорії змови набирають обертів серед людей, що призводить до широкого сумніву та недовіри до нашого правителя."
  decline_of_mali.7.a: "Ігнорувати ці заяви."
  decline_of_mali.7.b: "Продемонструвати силу."
  decline_of_mali.8.title: "Слабкість [GetCountry('MAL').GetNameWithNoTooltip]"
  decline_of_mali.8.desc: "Фортуна нам посміхається! Колись могутнє царство [GetCountry('MAL').GetName] переживає один із найскладніших часів – можливість, яку ми не можемо ігнорувати!"
  decline_of_mali.8.a: "Це наш момент для удару!"
  decline_of_mali.9.title: "Час відновлення"
  decline_of_mali.9.desc: "Громадянські чвари та міжусобиці, що спустошують нашу країну, тимчасово припинилися, оскільки ми змогли відновити певний порядок. Ми не знаємо, чи триватиме ця ситуація, чи наші вороги просто перегруповуються та набирають обіг, щоб знову кинути виклик нашому правлінню. У будь-якому випадку, ми повинні скористатися цією можливістю, намагаючись відновити частину нашої пошкодженої влади."
  decline_of_mali.9.a: "Стабілізувати країну."
  decline_of_mali.9.b: "Відновити нашу легітимність."
  decline_of_mali.9.c: "Покращити наші стосунки зі станами."
  decline_of_mali.10.title: "Узурпація Сандакі [GetCurrentYear]"
  decline_of_mali.10.desc: "Сандакі є найвищим радником нашого двору, займаючи найважливішу посаду в нашому кабінеті. Лише найвинятковіші та найвідданіші з наших слуг коли-небудь досягають цієї посади, оскільки вона є ключовою для управління країною. Однак загальна ситуація занепаду досягла і нашого двору, і тепер більше наших радників займають свої посади не через свої заслуги та відданість, а через маніпуляції, хабарництво та кумівство. На наш розпач, нинішній Сандакі [mal_pretender_leader.GetName] виявився саме таким, плетучи інтриги проти [ROOT.GetCountry.GetGovernment.GetRuler.GetName]!"
  decline_of_mali.10.a: "Зрадник!"
  decline_of_mali.10.b: "Захищайте палац!"
  decline_of_mali.11.title: "Набіги [ShowCultureNameWithNoTooltip('mossi')]"
  decline_of_mali.11.desc: "[ShowCultureName('mossi')] — це народ, який оселився деякий час тому на схід від нашої країни, за землями [ShowCultureName('bobo')], [ShowCultureName('bambara')] та [ShowCultureName('dogon')]. Їхні клани об'єднуються навколо кількох міст, хоча їхній традиційний спосіб життя є напівкочовим. Що відрізняє їх від інших сусідів, так це їхні звичайні набіги, які є невід'ємною частиною їхньої культури. І тепер наша черга страждати від них, оскільки вони намагаються скористатися нашою слабкістю..."
  decline_of_mali.11.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  decline_of_mali.11.b: "Негайно помститися!"
  decline_of_mali.12.title: "Повстання [ShowDynastyNameWithNoTooltip('diawara_dynasty')]"
  decline_of_mali.12.desc: "На північному заході нашої країни землі заселяють [ShowCultureName('soninke')], засновники давно зниклої імперії Гана. Навіть якщо їхня сила та вплив зменшилися, вони все ще є гордим народом, і ослаблення нашої влади не залишилося ними непоміченим. Один з їхніх лідерів, [diawara_ruler.GetName], зумів об'єднати [diawara_ruler.GetHerHis] народ, кинувши виклик нашому правлінню в регіоні."
  mal_separatists_rebels_soninke: "Сепаратисти $soninke$"
  decline_of_mali.12.a: "Ми повинні відновити нашу владу!"
  decline_of_mali.12.a.tt: "Кожен [ShowCultureName('soninke')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у кожній [Concept('location', 'CONCEPT_PLACEHOLDER')|e] [ShowAreaName('ghana_area')], які культурно доміновані [ShowCultureName('soninke')], приєднується до [mal_separatists_rebels.GetName] і втрачає [ShowNamedValue('pop_satisfaction_radical_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  decline_of_mali.12.b: "Нехай вони йдуть безперешкодно."
  decline_of_mali.12.b.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('ghana_area')], яка культурно домінована [ShowCultureName('soninke')], приєднується до новоствореної держави в [diawara_capital.GetName]"
  decline_of_mali.13.title: "Вторгнення [ShowCultureNameWithNoTooltip('tuareg')]"
  decline_of_mali.13.desc: "[ShowCultureName('tuareg')], кочовий народ амазигів, що населяє Сахару, повстає проти правління [ROOT.GetCountry.GetName]. Вони користуються ослабленим станом нашої країни, щоб утвердити свою незалежність і встановити власні володіння на північних територіях. Повстання створює додаткове навантаження на наші ресурси, ще більше зменшуючи наш вплив..."
  decline_of_mali.13.a: "Це недобре..."
  mal_separatists_rebels_tuareg: "Сепаратисти $tuareg$"
  decline_of_mali.14.title: "Піднесення [GetCountry('FUL').GetNameWithNoTooltip]"
  decline_of_mali.14.desc: "[ShowCultureName('fulbe')] — це переважно скотарський народ, що населяє середню течію річки Сенегал, з [ShowCultureName('wolof')] на заході та [ShowCultureName('soninke')] на сході. Їхній традиційний спосіб життя зробив їх легкою здобиччю для іноземного панування. Однак серед їхнього народу піднявся сильний лідер, [fulo_ruler.GetName], який вимагає нової землі для [fulo_ruler.GetHerHis] народу, названої [GetCountry('FUL').GetName]."
  decline_of_mali.14.a: "Придушити [ShowCultureNameWithNoTooltip('fulbe')]!"
  decline_of_mali.14.a.tt: "Кожен [ShowCultureName('fulbe')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у кожній [Concept('location', 'CONCEPT_PLACEHOLDER')|e] [ShowAreaName('futa_tooro_area')], які культурно доміновані [ShowCultureName('fulbe')], приєднується до [mal_separatists_rebels.GetName] і втрачає [ShowNamedValue('pop_satisfaction_radical_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  decline_of_mali.14.b: "Нехай вони мають свою маленьку державу."
  decline_of_mali.14.b.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('futa_tooro_area')], яка культурно домінована [ShowCultureName('fulbe')], приєднується до новоствореної держави [GetCountry('FUL').GetName]"
  mal_separatists_rebels_fulbe: "Сепаратисти $fulbe$"
  decline_of_mali.15.title: "Піднесення [GetCountry('KAB').GetNameWithNoTooltip]"
  decline_of_mali.15.desc: "Провінція [ShowProvinceDefinitionName('kaabu_province')] є домом для різних народів, таких як [ShowCultureName('fulbe')], [ShowCultureName('balanta')], [ShowCultureName('manjak')] та [ShowCultureName('jola')]. Її периферійне розташування призвело до того, що ослаблення центральної влади відчувається там ще інтенсивніше, майже без присутності влади. Очолювані [kaabu_ruler.GetName], ці різноманітні народи повстали, переконані, що вони самі визначатимуть свою долю."
  mal_separatists_rebels_balanta: "Сепаратисти $balanta$"
  mal_separatists_rebels_manjak: "Сепаратисти $manjak$"
  mal_separatists_rebels_jola: "Сепаратисти $jola$"
  decline_of_mali.15.a: "Відновити нашу владу в цьому регіоні!"
  decline_of_mali.15.a.tt: "Кожен [ShowCultureName('fulbe')], [ShowCultureName('balanta')], [ShowCultureName('manjak')] або [ShowCultureName('jola')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у кожній [Concept('location', 'CONCEPT_PLACEHOLDER')|e] [ShowAreaName('gambia_area')], що культурно доміновані [ShowCultureName('fulbe')], [ShowCultureName('balanta')], [ShowCultureName('manjak')] або [ShowCultureName('jola')], приєднуються до кількох фракцій, що представляють їхні культури, та втрачають [ShowNamedValue('pop_satisfaction_radical_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  decline_of_mali.15.b: "Це було лише питанням часу, доки цей регіон не звільниться."
  decline_of_mali.15.b.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('gambia_area')], що культурно домінована [ShowCultureName('fulbe')], [ShowCultureName('balanta')], [ShowCultureName('manjak')] або [ShowCultureName('jola')], приєднується до новоствореної держави [GetCountry('KAB').GetName]"
  decline_of_mali.16.title: "Відчай [GetCountry('MAL').GetNameWithNoTooltip]"
  decline_of_mali.16.desc: "Десятиліття війни поставили нашу країну на коліна. Відчайдушні часи вимагають відчайдушних заходів, тому [ruler_scope.GetName], правитель нашої колись гордої та могутньої імперії, прийняв безпрецедентне рішення. Ми плануємо відправити послів до однієї з найбільших держав, благаючи про підтримку. Тепер наш двір обговорює, яку країну ми повинні просити про допомогу..."
  decline_of_mali.16.a: "Шукати підтримки у [turkish_country.GetNameWithNoTooltip]."
  decline_of_mali.16.a.tt: "Ми спробуємо домовитися про [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] з [turkish_country.GetName]"
  decline_of_mali.16.b: "Шукати підтримки у [iberian_country.GetNameWithNoTooltip]."
  decline_of_mali.16.b.tt: "Ми спробуємо домовитися про [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] з [iberian_country.GetName]"
  decline_of_mali.16.c: "З іншого боку, ми можемо впоратися з нашими проблемами самі."
  decline_of_mali.17.title: "[from_country.GetNameWithNoTooltip] просить про союз"
  decline_of_mali.17.desc: "Колись горда та могутня [from_country.GetLongName] перебуває у відчайдушній ситуації після десятиліть внутрішніх проблем, міжусобиць та занепаду. Вони вдалися до відчайдушного заходу, відправивши до нас послів з проханням про допомогу, яка б допомогла їм відновити порядок у країні. Ми могли б отримати вигоду від надання їм допомоги, хоча відмова також може бути в наших інтересах."
  decline_of_mali.17.a: "Можливо, ми зможемо отримати вигоду з цієї ситуації."
  decline_of_mali.17.a.tt: "Ми приймемо [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] з [from_country.GetName]"
  mal_accepted_alliance: "Союз прийнято"
  decline_of_mali.17.b: "Ми мало що виграємо від виживання [from_country.GetNameWithNoTooltip]."
  decline_of_mali.17.b.tt: "Ми відхилимо [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] з [from_country.GetName]"
  mal_rejected_alliance: "Союз відхилено"
  decline_of_mali.18.title: "[ally_country.GetNameWithNoTooltip] приймає союз!"
  decline_of_mali.18.desc: "Наші друзі з [ally_country.GetName] прийняли наші благання! З їхньою допомогою ми, можливо, зможемо зупинити занепад нашої країни."
  decline_of_mali.18.a: "Нарешті добрі новини!"
  decline_of_mali.19.title: "[ally_country.GetNameWithNoTooltip] відхиляє союз"
  decline_of_mali.19.desc: "Незважаючи на зусилля наших послів, [ally_country.GetName] відмовилася надати нам будь-яку допомогу. Це, можливо, не наш кінець, але це, безумовно, штовхнуло нас на крок ближче до прірви."
  decline_of_mali.19.a: "Біда не приходить одна..."
  decline_of_mali.20.title: "[ShowLocationNameWithNoTooltip('gao')] повстає проти [ROOT.GetCountry.GetNameWithNoTooltip]"
  decline_of_mali.20.desc: "[ShowLocationName('gao')] є головним центром народу [ShowCultureName('songhai')], будучи головним містом після вигину річки Нігер аж до земель [ShowCultureName('hausa')]. [ShowCultureNameWithNoTooltip('songhai')] горді та люті, а безлад та міжусобиці, в які впала наша країна, переконали їхніх лідерів, що наше правління над ними добігло кінця. Це може стати небезпечною загрозою для нашого майбутнього, якщо вони досягнуть успіху у своєму повстанні..."
  decline_of_mali.20.a: "Відновити контроль над ситуацією!"
  decline_of_mali.20.a.tt: "[ShowCultureName('songhai')] населення кожної володіння в [ShowRegionName('sahel_region')] втрачає [ShowNamedValue('pop_satisfaction_radical_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднується до [mal_separatists_rebels.GetName]"
  mal_separatists_rebels_songhai: "Сепаратисти $songhai$"