l_english:
  muscovite_succession_war.17.title: "Московська війна за спадщину"
  muscovite_succession_war.17.desc: "Під час несподіваної атаки армія, вірна [pretender.GetName], безперешкодно входить у ворота [target_location.GetName] і захоплює контроль над її укріпленнями. Тепер ми стоїмо перед викликом відвоювати її, відбиваючись від подальших повстань, які, безсумнівно, були підбадьорені цією помилкою.\n\n[pretender.GetSheHe|U] оголосив себе [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName] і стратив усіх нелояльних солдатів, що залишилися в місті."
  muscovite_succession_war.17.a: "Епічна катастрофа!"
  STATIC_MODIFIER_NAME_demoralised_by_loss_of_capital: "Деморалізовані втратою столиці"
  muscovite_succession_war.17.b: "Запропонувати монети в обмін на відмову від контролю."
  muscovite_succession_war.17.c: "Применшити її стратегічну цінність."
  muscovite_succession_war.17.tt1: "Військові навички та сміливість, виявлені [target_root_country.GetGovernment.GetRuler.GetName], згуртовують армію"
  muscovite_succession_war.17.historical_info: "Захоплення Москви силами, вірними Юрію Дмитровичу, дядькові князя Василя II, стало серйозним ударом для молодого правителя, який був захоплений під час несподіваної атаки. Однак новий князь не виявив себе ефективним правителем і швидко відштовхнув підтримку як членів своєї родини, так і бояр."
  muscovite_succession_war.18.title: "Досвід вибивання очей"
  muscovite_succession_war.18.desc_captured_during_siege: "Під час поточної спроби відвоювати [target_location.GetName] [ROOT.GetCountry.GetGovernment.GetRuler.GetName] був захоплений діючим генералом, незважаючи на те, що той був під присягою вірності. Перед тим, як його звільнили, [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] був осліплений на обидва ока і залишений блукати назад до табору."
  muscovite_succession_war.18.desc_captured_by_cousin: "Під час візиту до сусіднього монастиря [ROOT.GetCountry.GetGovernment.GetRuler.GetName] був захоплений [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHer] двоюрідним братом, [target_cousin.GetName], який був під присягою вірності. Перед тим, як його звільнили, [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] був осліплений на обидва ока, а потім повернувся до [target_location.GetName]."
  muscovite_succession_war.18.a: "Варварський акт."
  muscovite_succession_war.18.historical_info: "Василь II був захоплений своїм двоюрідним братом Дмитром Шемякою, сином Юрія Дмитровича, під час візиту до Троїце-Сергієвої лаври. Його привезли до Москви, де осліпили та вислали, оскільки його двоюрідний брат ненадовго захопив владу над князівством."
  muscovite_succession_war.19.title: "Зрада"
  muscovite_succession_war.19.desc_common: "Додаткова підтримка повинна допомогти зміцнити претензії [ROOT.GetCountry.GetGovernment.GetRuler.GetName], або принаймні посіяти зерно розбрату між нашими ворогами."
  muscovite_succession_war.19.desc_child_defecting: "Надходять повідомлення про міжусобиці в родині [pretender.GetName] через незадоволення поточним керівництвом. Це може бути нагодою переконати [target_child.GetName] приєднатися до наших лав в обмін на значну суму та певні гарантії.\n\n$muscovite_succession_war.19.desc_common$"
  muscovite_succession_war.19.desc_sibling_defecting: "Надходять повідомлення про міжусобиці в родині [pretender.GetName] через суперництво між братами та сестрами та відсутність сильного керівництва. Це може бути нагодою переконати [target_sibling.GetName], брата [pretender.GetNameWithNoTooltip], приєднатися до наших лав в обмін на значну суму та певні гарантії.\n\n$muscovite_succession_war.19.desc_common$"
  muscovite_succession_war.19.a: "Авжеж!"
  muscovite_succession_war.19.b: "Немає спокути за таку скарбницю."
  muscovite_succession_war.19.tt1: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [target_location.GetName], звиклі до повстанського правління, починають переходити на бік [pretender.GetNameWithNoTooltip]"
  muscovite_succession_war.19.historical_info: "Після смерті Юрія Дмитровича його син, Василь Юрійович, продовжував претендувати на титул князя Московського. Однак його два брати передбачали, що він не зможе утримати контроль над Москвою, і стали на бік Василя II в обмін на територіальні поступки. Василь Юрійович був вигнаний з Москви і був змушений втекти з князівства."
  muscovite_succession_war.20.title: "Завершення"
  muscovite_succession_war.20.desc: "Внутрішні чвари, що спустошили нашу країну, нарешті закінчилися відвоюванням повстанських опорних пунктів разом зі смертю будь-яких членів династії, які відкрито виступили проти нас. Молімося, щоб цей ланцюг подій ніколи не повторився."
  muscovite_succession_war.20.a: "Помилувати всіх, хто залишився, прихильників."
  muscovite_succession_war.20.b: "Публічно присоромити тих, хто наважився протистояти нам."
  muscovite_succession_war.20.historical_info: "Московська війна за спадщину закінчилася, коли останній син Юрія Дмитровича був розгромлений у битві та згодом отруєний за наказом Василя II. Висока смертність у правлячій родині ускладнювала самозбереження династії, але зрештою їй вдалося втриматися при владі та правити Руссю до кінця шістнадцятого століття."