l_english:
  byzantine_succ_crisis.1.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Вимагають компенсації"
  byzantine_succ_crisis.1.desc: "У ці суворі часи стерв'ятники, що називають себе [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], нагадують нам, що [target_character2.GetName] є членом їхнього стану. З туманними погрозами та порожніми словами вони намагаються вимагати грошової винагороди в обмін на свою жалюгідну та слабнучу підтримку."
  byzantine_succ_crisis.1.a: "Гаразд."
  byzantine_succ_crisis.1.b: "Вони перейшли межу!"
  peasants_unhappy_tt: "Наші [ShowPopTypeName('peasants')] у кожній володінні [Concept('location', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  byz_every_noble_sides_with_pretender_tt: "[ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] по всіх наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і підтримають справу [target_character.GetName]"
  byzantine_succ_crisis.2.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Відмовляються платити податки"
  byzantine_succ_crisis.2.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] відомі своєю протидією владі [target_character2.GetName]. Під приводом відкритого повстання і скориставшись загальним заворушенням у наших володіннях, вони висунули офіційні вимоги зменшити або повністю скасувати деякі з повинностей, які ми на них наклали."
  byzantine_succ_crisis.2.a: "Дуже добре, ми їх потребуємо."
  byzantine_succ_crisis.2.b: "Ми не будемо домовлятися з такими, як вони!"
  byzantine_succ_crisis.3.title: "Наші [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Підтримують самозванця!"
  byzantine_succ_crisis.3.desc: "Неслухняні діти та свавільні, спраглі до влади [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] можливо, не мають багато спільного, але вони обидва процвітають у хаосі, що панує в нашому домі. Під приводом ослаблення центральної влади вони відкрито засудили [target_character2.GetShortName] на користь [target_character.GetName]!"
  byzantine_succ_crisis.3.a: "Ми їх не потребуємо."
  byzantine_succ_crisis.3.b: "Чи змінять їхню думку деякі привілеї?"
  byzantine_succ_crisis.4.title: "Гільдія мореплавців [ShowLocationNameWithNoTooltip('thessaloniki')]"
  byzantine_succ_crisis.4.desc: "Мало які володіння на наших землях стали таким великим скупченням заворушень і корупції, як [target_location.GetName]. Повідомлення про те, що люди повстають проти своїх панів, натовпи повстають, грабують і руйнують маєтки [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], стали щоденним явищем. Без тіні сумніву, [target_location.GetNameWithNoTooltip] наближається до відкритого повстання проти встановленого порядку."
  byzantine_succ_crisis.4.a: "Ми можемо вислухати їхні вимоги."
  byzantine_succ_crisis.4.b: "Їх буде приведено до порядку батогом!"
  thessaloniki_effect_1_tt: "[ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як [ShowPopTypeName('peasants')] та [ShowPopTypeName('burghers')] отримають [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%]\n[target_location.GetNameWithNoTooltip] втратить [ShowNamedValue('control_ultimate_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  thessaloniki_effect_2_tt: "[ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як [ShowPopTypeName('peasants')] та [ShowPopTypeName('burghers')] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%]\n[target_location.GetNameWithNoTooltip] втратить [ShowNamedValue('control_ultimate_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  byzantine_succ_crisis.5.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Вимагають чистки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  byzantine_succ_crisis.5.desc: "Ситуація в [target_location.GetName] досягла точки неповернення, оскільки банди [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] нишпорять землею, мов голодні звірі, піднімаючи кулаки та руки проти місцевих [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], яких вони звинувачують у недбалості та ненаситній жадібності. Якщо ми не втрутимося, ми ризикуємо чисткою місцевих [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], члени яких можуть бути готові підтримати нашу справу в обмін на свою безпеку..."
  byzantine_succ_crisis.5.a: "Втамувати спрагу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] за шляхетною кров'ю!"
  byzantine_succ_crisis.5.b: "Ми повинні захистити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]..."
  byzantine_succ_crisis.6.title: "Покидання своїх обов'язків"
  byzantine_succ_crisis.6.desc: "Це загальновідомий секрет, що [target_character2.GetName] часто ухиляється від військових обов'язків. Нерідко [target_character2.GetSheHe] можна знайти за питтям у покинутій таверні, а [target_character2.GetHerHis] війська — ненавченими, недисциплінованими та повністю деморалізованими. Це найганебніший образ, який можна демонструвати, тим паче в ці неспокійні часи..."
  byzantine_succ_crisis.6.a: "Офіційно дорікнути [target_character2.GetHerHim] та [target_character2.GetHerHis] одноліткам!"
  byzantine_succ_crisis.6.b: "Накласти штраф на [target_character2.GetHerHis] маєток."
  byzantine_succ_crisis.6.c: "[target_character2.GetSheHe|U] цього разу може бути виправданий."
  byz_character_might_cause_trouble_again_tt: "[target_character2.GetShortNameWithNoTooltip] може знову спричинити проблеми найближчим часом..."
  byzantine_succ_crisis.7.title: "Асамблея [ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  byzantine_succ_crisis.7.desc: "Ситуація, що нещодавно розвинулася, в якій [target_character.GetName] виступає претендентом на трон, спричинила низку військових кампаній для викорінення підтримки претендента. Багато видатних членів різних станів, таких як [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], давно підтримували ідею розширення повноважень [ROOT.GetCountry.GetGovernment.GetParliament.GetName] у спробі досягти більш сприятливих та впливових результатів..."
  byzantine_succ_crisis.7.a: "Їхні слова містять певну мудрість."
  byzantine_succ_crisis.7.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] завжди матиме останнє слово!"
  unlock_new_issues_about_civil_war_tt: "Усі нові [Concept('parliament_issues', 'CONCEPT_PLACEHOLDER')|e] будуть посилені на час [ShowDisasterName('succession_crisis')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  scales_with_crown_power_tt: "Цей [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] масштабується з нашою [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e]"
  byzantine_succ_crisis.8.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] відкидає претендента"
  byzantine_succ_crisis.8.desc: "Релігійні товариства по всій нашій нації давно несхвально ставляться до ситуації, що розвивається, та відкритого повстання, поширюваного [target_character2.GetName]. Вони вважають, що це соціальне заворушення загрожуватиме людям і суперечить догматичному погляду на єдине товариство. Таким чином, вони прагнуть допомогти нам у легітимізації нашої боротьби проти цієї внутрішньої загрози."
  byzantine_succ_crisis.8.a: "Їхні зусилля допоможуть [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]."
  byzantine_succ_crisis.8.b: "Хто проти правління [target_character2.GetShortNameWithNoTooltip], ризикує накликати божественний гнів."
  scales_with_clergy_estate_power_tt: "Цей приріст масштабується з [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] нашого [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  province_pops_gain_satisfaction_tt: "Багато наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] з незадоволеними [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують [ROOT.GetCountry.GetReligion.GetName], отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  byzantine_succ_crisis.9.title: "Руйнівні наслідки нестабільності"
  byzantine_succ_crisis.9.desc: "Хворі пасовища, недужі тварини та спалені посіви — це лише найпоширеніший краєвид у ці неспокійні часи. Скарги від імені [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] накопичуються, оскільки заворушення охоплюють сільську місцевість. Розбійники, злодії та мародерствуючі найманці обернулися один проти одного, знову руйнуючи колись прекрасну сільську місцевість [target_province.GetName]..."
  byzantine_succ_crisis.9.a: "Не бійтеся, ми профінансуємо відновлення!"
  byzantine_succ_crisis.9.b: "Цього разу ми не можемо собі цього дозволити..."
  pops_in_target_province_join_succession_crisis_pretender_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і можуть приєднатися до справи [target_character.GetName]!"
  byzantine_succ_crisis.10.title: "Легітимізація лихварства"
  byzantine_succ_crisis.10.desc: "Природа людини оголюється під час суворих умов, спричинених руйнівними наслідками триваючого конфлікту. До нашої уваги дійшло, що [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у [target_location.GetName] заманили місцевих жителів у позики грошей за непомірними ставками. Це тривало так довго, що перетворилося на статус-кво ведення бізнесу по всій провінції. Благання від імені [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] дійшли до наших вух, вимагаючи покласти край цій злій практиці, що охопила їхній дім."
  byzantine_succ_crisis.10.a: "Ми не можемо порушити їхній соціальний порядок..."
  byzantine_succ_crisis.10.b: "Але ми можемо з цього зискувати!"
  byzantine_succ_crisis.10.c: "Видати штрафи та попередження для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  byzantine_succ_crisis.10.d: "Тимчасово легалізувати лихварство в [target_location.GetNameWithNoTooltip]"
  nobles_burghers_10_satisfaction_at_the_expense_of_peasants_tt: "Наші [ShowPopTypeName('nobles')] та [ShowPopTypeName('burghers')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], а [ShowPopTypeName('peasants')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%]"
  byzantine_succ_crisis.11.title: "Привілеї іноземних купців"
  byzantine_succ_crisis.11.desc: "[target_location.GetName] є домом для процвітаючої спільноти торговців, до наших портів прибувають купці з найвіддаленіших куточків світу, прагнучи торгувати та обмінюватися багатством зі своїми іноземними колегами. На жаль, схоже, що наші торговельні та морські справи не поділяють пишноти наших предків, що є видимою ознакою ослаблення морської влади та втрати престижу. Оскільки [target_character.GetName] погрожує узурпувати корону, а наші кошти вичерпуються, до нас звернулися представники [GetCountry('VEN').GetName] та [GetCountry('GEN').GetName], які виступили з пропозицією фінансувати наш флот в обмін на привілеї на наших ринках..."
  byzantine_succ_crisis.11.a: "Підписати угоду з [GetCountry('VEN').GetNameWithNoTooltip]."
  byzantine_succ_crisis.11.b: "Ми попросимо допомоги у [GetCountry('GEN').GetNameWithNoTooltip]."
  byzantine_succ_crisis.11.c: "Ми можемо підписати з обома."
  byzantine_succ_crisis.11.d: "Ці п'явки замишляють щось недобре!"
  italian_merchants_favored_key: "[ShowCultureGroupName('italian_group')] Купці в фаворі"
  byzantine_succ_crisis.11.historical_info: "Під час візантійської громадянської війни 1341 року імперія була розділена між регентством молодого Іоанна V Палеолога та претендентом Іоанном VI Кантакузеном. Конфлікт втягнув Венецію та Геную, які використали війну для просування своїх конкуруючих комерційних інтересів. Генуя підтримала претендента, сподіваючись забезпечити торговельне домінування в Чорному морі, і була винагороджена привілеями та морським впливом, особливо в Галаті. Венеція, рішуче налаштована протидіяти генуезькій експансії, підтримала регентство. Це перетворило потенційну громадянську війну на опосередковану боротьбу між двома морськими республіками, що ще більше послабило Візантію та поглибило її залежність від іноземних держав у морських та комерційних питаннях."
  byzantine_succ_crisis.12.title: "[target_country.GetNameWithNoTooltip] пропонує торговельні привілеї"
  byzantine_succ_crisis.12.desc: "У відчайдушній спробі покрити свої морські та військово-морські нестачі, володарі [target_location.GetName] виступили та запропонували нашим [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] особливі привілеї та доступ до їхнього прибуткового ринку в обмін на їхню військово-морську підтримку в їхній поточній боротьбі."
  byzantine_succ_crisis.12.a: "Я люблю гроші!"
  byzantine_succ_crisis.13.title: "[target_country.GetNameWithNoTooltip] відмовляє нашим купцям"
  byzantine_succ_crisis.13.desc: "Ми дізналися, що нещодавно члени нашого [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] листувалися з [target_country.GetName] у спробі забезпечити особливий доступ до їхнього ринку в [target_location.GetName]. На жаль, переговори зірвалися, що призвело лише до марної трати часу..."
  byzantine_succ_crisis.13.a: "Вони пошкодують про це."
  byzantine_succ_crisis.14.title: "Опортуністичні вимоги"
  byzantine_succ_crisis.14.desc: "У міру розвитку ситуації навколо відкритого конфлікту між [target_character2.GetName] та [target_character.GetName] стало очевидним, що час для удару настав. Наші радники підтримують ідею висунення наших вимог щодо грошової компенсації до [GetCountry('BYZ').GetName], що, ймовірно, принесе нам великі прибутки та профінансує наші майбутні кампанії розширення."
  byzantine_succ_crisis.14.a: "Вони заплатять!"
  byzantine_succ_crisis.14.b: "Не будемо порушувати мир."
  sc_this_may_bring_us_into_conflict_tt: "#R Це може втягнути нас у конфлікт проти [GetCountry('BYZ').GetNameWithNoTooltip]#!"
  byzantine_succ_crisis.15.title: "Вимоги [GetCountry('TUR').GetNameWithNoTooltip]"
  byzantine_succ_crisis.15.desc: "Ми отримали звістку від цих мерзенних невірних, [GetCountry('TUR').GetNameWithNoTooltip]. За словами їхніх емісарів, вони вимагають від нас сплатити величезну суму грошей в обмін на їхні туманні та марні обіцянки миру. Вони посилаються на нашу поточну боротьбу проти [target_character.GetName] і обґрунтовують свою справу навколо безпечного східного фронту."
  byzantine_succ_crisis.15.a: "У нас немає вибору..."
  byzantine_succ_crisis.15.b: "Ні!"
  byzantine_succ_crisis.16.title: "Посланець з [GetCountry('BYZ').GetNameWithNoTooltip]"
  byzantine_succ_crisis.16.desc.a: "Ми отримали звістку, що прибув посланець з [GetCountry('BYZ').GetName]. Розумним кроком вони вирішили забезпечити слабке перемир'я між нашими народами в обмін на надмірну суму монет, прямо з їхньої скарбниці!"
  byzantine_succ_crisis.16.desc.b: "Ми отримали звістку, що прибув посланець з [GetCountry('BYZ').GetName]. Всупереч логіці та здоровому глузду, вони вирішили не забезпечувати нашу добру волю мізерною платою. Дорога до [target_location.GetName] відкрита!"
  byzantine_succ_crisis.16.a: "Розумію..."