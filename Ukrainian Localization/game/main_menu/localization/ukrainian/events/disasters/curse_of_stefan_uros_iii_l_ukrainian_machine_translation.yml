l_english:
  curse_of_stefan_uros_iii.1.title: "Прокляття [GetCountry('SER').GetNameWithNoTooltip]"
  curse_of_stefan_uros_iii.1.desc: "Настали лихі часи! Прокляття [GetCharacter('ser_stefan_decanski').GetName] охопило нашу націю, наші придворні та радники говорять про кінець епохи і занурення нашої великої країни в темний період..."
  curse_of_stefan_uros_iii.1.a: "Це не може бути кінцем, не таким чином..."
  curse_of_stefan_uros_iii.2.title: "Нова ера для [GetCountry('SER').GetNameWithNoTooltip]"
  curse_of_stefan_uros_iii.2.desc: "Блакитне небо над нашою великою нацією знову сяє радісним світлом надії та нового дня. Попри нещодавні негаразди та забобони, ми подолали всі перешкоди, і наш народ вийшов переможцем та став стійкішим, ніж будь-коли!"
  curse_of_stefan_uros_iii.2.a: "Об'єднані та сильніші ми рухаємося вперед."
  curse_of_stefan_uros_iii.3.title: "Вимоги автономії"
  curse_of_stefan_uros_iii.3.desc: "Нещодавні зміни в нашій занепадаючій адміністрації призвели до того, що багато незгодних голосів повстали, аби узурпувати свою незалежність від нашого стягу. Останні петиції щодо представництва та місцевої автономії надходять від [target_province.GetName]. Поширилася чутка, що наша влада ослабла, і в результаті вони прийшли зі зброєю, висуваючи абсурдні вимоги та говорячи про чуже поняття, відоме як свобода."
  curse_of_stefan_uros_iii.3.a: "Вони отримають її."
  curse_of_stefan_uros_iii.3.b: "Познайомте їх із місцевим поняттям батога!"
  curse_of_stefan_uros_iii.4.title: "Сусіди як стерв'ятники"
  curse_of_stefan_uros_iii.4.desc: "Підступні негідники при дворі [target_country.GetName] не гаяли часу, плетучи інтриги та готуючись пожерти нашу територію, при першій ознаці нашої уявної слабкості. Ця стерв'ятницька політика не буде терпітися, і ми повинні нагадати їм, що робить [GetCountry('SER').GetLongName] силою, з якою слід рахуватися."
  curse_of_stefan_uros_iii.4.a: "Нехай спробують!"
  curse_of_stefan_uros_iii.5.title: "Селянське повстання"
  curse_of_stefan_uros_iii.5.desc: "Наша слабнуча влада в ці буремні часи надала сміливості селянству по всій нашій нації вимагати фінансової допомоги та піднесення за рахунок двору. Селянські ватажки в [target_location.GetName] висунули свої вимоги під загрозою повсюдного спустошення та обурення!"
  curse_of_stefan_uros_iii.5.a: "Ми не ведемо переговорів із селянами!"
  curse_of_stefan_uros_iii.5.b: "Невже ми не можемо знайти компроміс?"
  curse_of_stefan_uros_iii.6.title: "Провінція оголошує незалежність!"
  curse_of_stefan_uros_iii.6.desc: "Низинні мешканці тіней у [target_location.GetName] наважилися показати свої кігті та підняти голови проти нашої влади. У найгротескнішому прояві фальшивої влади вони оголосили себе відокремленими від корони і навіть висунули свою претензію на наш трон!"
  curse_of_stefan_uros_iii.6.a: "Їхні останки допоможуть зрости добробуту на наших полях!"
  curse_of_stefan_uros_iii.6.b: "Залиште їх у спокої..."
  people_of_target_province_will_declare_war_on_us_tt: "Народ [target_province.GetNameWithNoTooltip] оголосить [Concept('war', 'CONCEPT_PLACEHOLDER')|e] нам!"