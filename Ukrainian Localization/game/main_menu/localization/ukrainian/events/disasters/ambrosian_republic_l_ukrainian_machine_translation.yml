l_english:
  ambrosian_republic.1.title: "Стабільний уряд у [ROOT.GetCountry.GetNameWithNoTooltip]"
  ambrosian_republic.1.desc: "Заснування Золотої Амброзіанської Республіки не обійшлося без труднощів, але нарешті запанувала стабільність. Переживши такі бурхливі часи, наша нація була справді викувана вогнем і постала сильнішою, ніж будь-коли раніше. Мир, справедливість і свобода панують по всьому [ROOT.GetCountry.GetName]."
  ambrosian_republic.1.b.desc: "Відновлення порядку під владою [target_country.GetName] не обійшлося без труднощів, але нарешті запанує спокій. Хай там що, наше майбутнє в безпеці під нашим старшим партнером. Мир, справедливість і свобода панують по всьому [ROOT.GetCountry.GetName]."
  ambrosian_republic.1.a: "Хвала святому Амвросію!"
  ambrosian_republic.2.title: "[GetCountry('MLO').GetAdjectiveWithNoTooltip] Спадщина"
  ambrosian_republic.2.desc: "Оскільки трон [ROOT.GetCountry.GetName] залишився вакантним, як [GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCountry('FRA').GetName], так і [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRulerTitle] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName] як Імператор [GetUniqueInternationalOrganization('hre').GetName] відкрито обговорюють свої претензії на трон. [GetCountry('FRA').GetAdjectiveWithNoTooltip] претензія ґрунтується на шлюбних зв'язках зі старою династією [ShowDynastyName('visconti_dynasty')]. Хоча претензія не є сильною, [GetCountry('FRA').GetNameWithNoTooltip] вже досить давно має наміри щодо [ShowRegionName('italy_region')], і мало хто має силу протистояти [GetCountry('FRA').GetAdjectiveWithNoTooltip] [GetCountry('FRA').GetGovernment.GetRulerTitle]. Тим часом Імператор стверджує, що за відсутності явного спадкоємця титул [ROOT.GetCountry.GetNameWithNoTooltip] має бути наданий Імператору згідно з Імперським законом."
  ambrosian_republic.2.a: "Ми повинні бути готові захищати нашу свободу."
  ambrosian_republic.3.title: "$ambrosian_republic.2.title$"
  ambrosian_republic.3.desc: "[GetCountry('MLO').GetName] поринув у політичний хаос. Трон вакантний, і вискочка [GetCountry('MLO').GetGovernment.GetGovernmentType.GetName] марно намагається встановити порядок. Це був би чудовий час, щоб заявити про наші претензії на їхній титул, що ґрунтуються на наших шлюбних зв'язках із нині вимерлим домом [ShowDynastyName('visconti_dynasty')]."
  ambrosian_republic.3.a: "Трон належить нам!"
  ambrosian_republic.3.b: "Ми не маємо інтересу до [GetCountry('MLO').GetNameWithNoTooltip]"
  ambrosian_republic.4.title: "$ambrosian_republic.2.title$"
  ambrosian_republic.4.desc: "[GetCountry('MLO').GetName] поринув у політичний хаос. Трон вакантний, і вискочка [GetCountry('MLO').GetGovernment.GetGovernmentType.GetName] марно намагається встановити порядок. Згідно з Імперським законом, їхній титул має перейти до Імператора [ROOT.GetCountry.GetGovernment.GetRuler.GetHerselfHimself], коли лінія [GetCountry('MLO').GetNameWithNoTooltip] згасне. Якщо ми бажаємо нав'язати цей закон і претендувати на [GetCountry('MLO').GetNameWithNoTooltip] для себе, ми повинні діяти швидко, щоб скинути так звану Золоту Амброзіанську Республіку."
  ambrosian_republic.4.a: "Трон належить нам!"
  ambrosian_republic.4.b: "$ambrosian_republic.3.b$"
  ambrosian_republic.5.title: "Пропозиція для [target_character.GetLastNameWithNoTooltip]"
  ambrosian_republic.5.title.fallback: "Пропозиція для генерала"
  ambrosian_republic.5.desc: "[target_character.GetName] є одним із найвидатніших військових генералів нашого часу та видатним лідером кондотьєрів. Дуже прикро, що ми опинилися в протиріччі з [target_character.GetHerHim] у нашій боротьбі за придушення повстанців. Однак [target_character.GetLastNameWithNoTooltip] популярний серед [ROOT.GetCountry.GetAdjective] народу і навіть має претензії на трон.\n\nФракція в розділеному уряді написала [target_character.GetHerHim] із щедрою пропозицією: якщо [target_character.GetSheHe] припинить усі контакти з нашими ворогами та приєднається до нашої справи, [ROOT.GetCountry.GetNameWithNoTooltip] запропонує [target_character.GetHerHim] багато землі, а також посаду Капітана та Захисника. [target_character.GetLastNameWithNoTooltip] міг би стати великим надбанням для [ROOT.GetCountry.GetFlavorRank], але багато хто сумнівається, чи його/її вірність нам переважить його/її особисті амбіції."
  ambrosian_republic.5.a: "Ми призначимо [target_character.GetHerHim] командувачем наших армій."
  ambrosian_republic.5.b: "Ми не можемо ризикувати ще одним потенційним тираном!"
  ambrosian_republic.6.title: "[target_character.GetLastNameWithNoTooltip] Зіткнення з [ROOT.GetCountry.GetFlavorRank]"
  ambrosian_republic.6.desc: "[target_character.GetName] має багато суперників у [ROOT.GetCountry.GetLongName]. Більш ідеалістичні та вчені політики, які заснували [ROOT.GetCountry.GetFlavorRank], підозрюють [target_character.GetHerHim] у змові з метою захоплення трону, тоді як більш прагматичні політики обурюються його/її популярністю серед народу.\n\n[target_character.GetLastNameWithNoTooltip] нещодавно дізнався/дізналася про змову з метою позбавити його/її військового командування та усунути його/її з посади в уряді. Обурений/Обурена, [target_character.GetLastNameWithNoTooltip] висуває ультиматум державі: прийняти його/її абсолютне військове правління або знову зустрітися з ним/нею на полі бою."
  ambrosian_republic.6.a: "Встановити військове правління під [target_character.GetLastNameWithNoTooltip]."
  ambrosian_republic.6.b: "Чинити опір тиранії [target_character.GetLastNameWithNoTooltip]. Ми боремося за свободу!"
  sforza_rebellion: "Повстання Сфорца"
  sforza_gains_support.tt: "[target_character.GetLastNameWithNoTooltip] збере свою/його підтримку і повстане проти нас"
  ambrosian_republic.7.title: "[target_character.GetLastNameWithNoTooltip] Захоплює Трон"
  ambrosian_republic.7.desc: "Завжди амбітний опортуніст, [target_character.GetName] зрадив [ROOT.GetCountry.GetFlavorRank] і оголосив себе законним правителем [ROOT.GetCountry.GetName]! Його/Її популярність серед народу та залізна хватка над армією та механізмами держави роблять опір його/її правлінню приреченою справою. Можливо, ми повинні прийняти встановлення його/її монархії. Або, можливо, свобода варта будь-якої ціни."
  ambrosian_republic.7.a: "Хай живе [target_character.GetLastNameWithNoTooltip]!"
  ambrosian_republic.7.b: "Неприйнятно! Ми будемо боротися з [target_character.GetHerHim], якщо доведеться."
  ambrosian_republic.7.c: "Ніколи! Відновимо [ROOT.GetCountry.GetFlavorRank], як і задумували засновники."