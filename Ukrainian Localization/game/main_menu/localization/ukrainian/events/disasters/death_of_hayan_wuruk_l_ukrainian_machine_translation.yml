l_english:
  death_of_hayan_wuruk.1.title: "Смерть [target_hayan.GetNameWithNoTooltip]"
  death_of_hayan_wuruk.1.desc: "Один із найвеличніших правителів в історії [target_country.GetLongName], [target_hayan.GetName], відійшов у вічність. Шепіт у темряві та серед наших підданих перетворився на вимоги автономії перед обличчям нашої слабнучої влади. У такий вирішальний момент ми повинні проявити силу та тримати наших сусідів, а також наш народ, у покорі!"
  death_of_hayan_wuruk.1.a: "Ми втратили великого лідера..."
  death_of_hayan_wuruk.1.historical_info: "Гаям Вурук, правитель імперії Маджапагіт з 1350 по 1389 рік, привів імперію до вершини могутності, розширивши її вплив по всій Південно-Східній Азії за допомогою свого прем'єр-міністра Гаджі Мади. Його смерть у 1389 році призвела до боротьби за владу та спадщину. Цей конфлікт завершився війною Парегрег, що послабила імперію зсередини. Внутрішні чвари, поряд із піднесенням ісламських султанатів, поступово призвели до занепаду Маджапагіту в наступні століття."
  death_of_hayan_wuruk.2.title: "Вимоги автономії"
  death_of_hayan_wuruk.2.desc: "Надійшли повідомлення від наших підданих у [target_location.GetName] про рухи за незалежність, що назрівають проти нашої влади. Бувши поінформованими про смерть [target_hayan.GetName], схоже, прагнення до автономії знову розгорілися. Незалежно від достовірності цих повідомлень та того, наскільки [target_subject.GetAdjective] народ готовий взятися за зброю проти нас, ми повинні вжити заходів для підтримання порядку!"
  death_of_hayan_wuruk.2.a: "Вимагати від них присяги на вірність."
  death_of_hayan_wuruk.2.b: "Ми не можемо їм протистояти, надамо їм певну автономію."
  death_of_hayan_wuruk.3.title: "[target_overlord.GetNameWithNoTooltip] вимагає нашої вірності"
  death_of_hayan_wuruk.3.desc: "Невдовзі після смерті великого [target_hayan.GetName], так званий [target_overlord.GetLongName] повільно занурюється в безумство та хаос. Посеред їхньої бурхливої спадкоємності вони прийшли вимагати від нас демонстрації вірності. Це агресивний крок, явно образлива демонстрація сили за наш рахунок від занепалого [target_overlord.GetGovernment.GetAdjective] дому, що відчайдушно чіпляється за владу."
  death_of_hayan_wuruk.3.a: "Ми підкоримося."
  death_of_hayan_wuruk.3.b: "Настав час їм слідувати за [target_hayan.GetShortNameWithNoTooltip] у могилу!"
  death_of_hayan_wuruk.4.title: "[target_subject.GetNameWithNoTooltip] оскаржує нашу владу"
  death_of_hayan_wuruk.4.desc: "У безпрецедентному кроці народ [target_subject.GetName] плюнув нам в обличчя, відмовившись від наших вимог! Попри наші стосунки та доброзичливість як їхніх сюзеренів, смерть нашого покійного правителя [target_hayan.GetName] посіяла насіння незалежності та бажання свободи проти нас!"
  death_of_hayan_wuruk.4.a: "Вони заплатять за це."
  maj_scope_subject_country_will_fight_for_their_freedom_tt: "[target_subject.GetNameWithNoTooltip] боротиметься за свою незалежність"
  death_of_hayan_wuruk.5.title: "[target_subject.GetNameWithNoTooltip] демонструє свою вірність"
  death_of_hayan_wuruk.5.desc: "Майстерним дипломатичним кроком наші посли в [target_location.GetName] успішно змусили [target_subject.GetName] схилити коліно та визнати нашу владу над їхніми справами!"
  death_of_hayan_wuruk.5.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  death_of_hayan_wuruk.6.title: "Поширення [ShowReligionGroupNameWithNoTooltip('muslim')] у [GetCountry('MAJ').GetNameWithNoTooltip]"
  death_of_hayan_wuruk.6.desc: "Далекі купці та ослаблення нашої центральної влади призвели до того, що наш народ у [target_province.GetName] навернувся до [ShowReligionName('sunni')]. Поширення різних вчень ніколи не було проблемою. Однак культивування вірувань, що не співіснують з нашими, у час турбулентності та нестабільності, є небезпечним прецедентом."
  death_of_hayan_wuruk.6.a: "Цікавий розвиток подій."
  death_of_hayan_wuruk.7.title: "Криза [GetCountry('MAJ').GetLongNameWithNoTooltip] закінчується"
  death_of_hayan_wuruk.7.desc.a: "Минуло десятиліття з моменту смерті нашого великого лідера, [target_hayan.GetName]. Попри всі наші зусилля пом'якшити кризу та продемонструвати силу зовні, ми не змогли відновити верховенство права. Що це означає для нашого народу, покаже лише час..."
  death_of_hayan_wuruk.7.desc.b: "Попри спроби зовнішніх та внутрішніх дестабілізуючих факторів, нам вдалося відновити порядок після смерті великого [target_hayan.GetName]. Нестабільність та чутки про повстання – це лише спогади минулого, оскільки ми дивимося вперед у нову епоху."
  death_of_hayan_wuruk.7.a: "На жаль, це може бути кінець."
  death_of_hayan_wuruk.7.b: "Чи були коли-небудь сумніви?"