l_english:
  crisis_of_the_sayfawa_dynasty.1.title: "$crisis_of_the_sayfawa_dynasty$"
  crisis_of_the_sayfawa_dynasty.1.desc: "Настали лихі часи! Небо розколоте червоними хмарами, а посухи та голод охопили землю, поки ми готуємося до неминучого. Ворогів у нас багато, але наша рішучість вижити встоїть. Ми повинні озброїтися мужністю, щоб захистити наші сім'ї та народ від цієї нової катастрофи.\n\nОднак багато радників при нашому дворі заперечують наш палкий заклик до дії і натомість підтримують ідею віддати частину нашої нікчемної землі в ім'я миру..."
  crisis_of_the_sayfawa_dynasty.1.a: "Ми воїни, ми будемо битися!"
  crisis_of_the_sayfawa_dynasty.1.b: "Не варто гинути за клаптики землі..."
  crisis_of_the_sayfawa_dynasty.2.title: "Повстання претендента"
  crisis_of_the_sayfawa_dynasty.2.desc: "Справді, [ROOT.GetCountry.GetGovernment.GetAdjective] сім'ям не чужі жадібність і жага до влади. На жаль, наша не є винятком, оскільки один із членів родини нашого правителя, [pretender_character_scope.GetName], об'єднав багатьох [pretender_character_scope.GetHerHis] прихильників за прагненням до трону. Що б ми не робили, ми не можемо здаватися слабкими перед нашим народом у такий важкий час. Наші найдовіреніші генерали та радники пропонують нам відкинути цих змій і позбавити їх титулів, щоб вони не проковтнули нас цілком.\n\nХоча це може бути правдою, багато хто серед нас припускає, що новий кандидат може принести більше стабільності та легітимності короні..."
  crisis_of_the_sayfawa_dynasty.2.a: "Прокляті змії, всі ви!"
  crisis_of_the_sayfawa_dynasty.2.b: "Час іти, [target_character.GetNameWithNoTooltip]."
  rival_branch_sayfawa: "POSTEDIT_Сайфавська гілка суперників"
  csd_every_pop_satisfaction_tt: "Усі попи в [target_province.GetName]:\nВтрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]\nПриєднуються до [rival_branch_sayfawa_scope.GetName]"
  crisis_of_the_sayfawa_dynasty.3.title: "Міжродинні чвари"
  crisis_of_the_sayfawa_dynasty.3.desc: "Нерідко [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та особи [ROOT.GetCountry.GetGovernment.GetAdjective] походження сперечаються та б'ються за крихти влади. Для принца благородного походження стало традицією піднімати зброю проти брата, особливо в нинішні бурхливі часи. Це кричуще ігнорування [ROOT.GetCountry.GetGovernment.GetAdjective] етикету змусило нас виглядати некультурними та занепалими в очах світу.\n\nЯкщо ми не зможемо привести нашу родину до ладу, ми обов'язково понесемо наслідки в майбутньому. Наш [ROOT.GetCountry.GetGovernment.GetAdjective] дім повинен відновити свою колишню велич і позбутися дрібних образ та жадібних до влади блазнів."
  crisis_of_the_sayfawa_dynasty.3.a: "Ми повинні поставити їх на місце."
  crisis_of_the_sayfawa_dynasty.3.b: "Зрештою, вони ж родина..."
  crisis_of_the_sayfawa_dynasty.4.title: "Сила через єдність"
  crisis_of_the_sayfawa_dynasty.4.desc: "[ROOT.GetCountry.GetReligion.GetName] панувала в нашому регіоні протягом останніх кількох століть. Через неї нас навчили шляхам божественності, і ми навчилися цінувати прекрасне відчуття прийняття істинної віри. Коли ми занурюємося глибше в наш нинішній хаотичний період, багато хто припускає, що ми повинні шукати силу в нашій вірі, оскільки вона буде опорою для нашого вознесіння та спасіння."
  crisis_of_the_sayfawa_dynasty.4.a: "Наша віра проведе нас крізь це."
  crisis_of_the_sayfawa_dynasty.4.b: "Наше служіння — народу, а не [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  crisis_of_the_sayfawa_dynasty.4.c: "Ми не можемо дозволити собі монету..."
  crisis_of_the_sayfawa_dynasty.5.title: "Воїн постає"
  crisis_of_the_sayfawa_dynasty.5.desc: "Чи правда, що важкі часи створюють сильних чоловіків? Хай там як, але молодий перспективний воїн на ім'я [kbo_strong_general_scope.GetName] виступив уперед. [kbo_strong_general_scope.GetSheHe|U] оплакує узурпаторів і бажає пронизати [kbo_strong_general_scope.GetHerHis] списом тіла наших ворогів. Проти всього зла, що походить з наших кордонів, тих, хто бажає пожерти нашу територію, і підлості наших ворогів, ми згуртуємося лише за [kbo_strong_general_scope.GetHerHim] і дамо [kbo_strong_general_scope.GetHerHim] шанс..."
  crisis_of_the_sayfawa_dynasty.5.a: "...вести наші війська до славної та кривавої перемоги!"
  crisis_of_the_sayfawa_dynasty.5.b: "...розривати та рвати як солдат під нашим прапором."
  crisis_of_the_sayfawa_dynasty.6.title: "Кінець кризи [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]"
  crisis_of_the_sayfawa_dynasty.6.a.desc: "Попри всі зусилля наших ворогів, ми не піддалися їхнім мерзенним спробам узурпувати наші землі. Наш народ витримав випробування часом і вийшов переможцем. По всьому нашому домену відбуваються святкування з приводу остаточного позбавлення від тих, хто бажав зла нашому народу. Нехай сонце світить нам, коли ми вступаємо в нову епоху процвітання та спокою. Нехай ті, хто скористався нашою нацією під час нашого ослаблення, тремтять, коли ми відновлюємо свої позиції."
  crisis_of_the_sayfawa_dynasty.6.b.desc: "Політичні чвари та постійні докучання набігів [ShowCultureName('bilala_culture')] виявилися надто обтяжливими для нас. Народ $bilala_culture$ проник глибоко на нашу територію, навіть до нашої столиці [ShowLocationName('njimi')]. Ми більше не можемо претендувати на владу над цією територією і були змушені переселитися. Багато хто може назвати нас слабкими за пожертвування нашими землями заради подальшого існування нашого народу. Однак, мало хто знає, що ми вичікуватимемо слушного часу і плануватимемо наше повернення до влади. Це не поразка, а лише стратегічний маневр, поки ми збираємо наші війська та готуємося повернути втрачені території."
  crisis_of_the_sayfawa_dynasty.6.a: "Ми перемогли!"
  crisis_of_the_sayfawa_dynasty.6.b: "Ми вистоїмо і з часом відновимо наші сили..."
  crisis_of_the_sayfawa_dynasty.7.title: "Набіг $bilala_culture$"
  crisis_of_the_sayfawa_dynasty.7.desc: "Народ [ShowCultureName('bilala_culture')] був терном у нашому боці протягом довгого часу. Їхні безперервні набіги на нашу країну стають дедалі зухвалішими з кожним днем, а їхня присутність серед нашого власного народу починає досягати проблемного рівня. Їхнє нещодавнє вторгнення до [target_location.GetName] лише заохотило інших з їхнього роду оселитися глибше в наших кордонах. Якщо це триватиме, вони стануть нестримною напастю."
  crisis_of_the_sayfawa_dynasty.7.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  crisis_of_the_sayfawa_dynasty.7.b: "Заплатити їм, щоб вони пішли."
  gave_autonomy_to_the_bulala_and_sao_tt: "Надано автономію народу #Y $bilala_culture$#! та народу #Y $sao_culture$#!"
  kbo_join_tt: "[kbo_strong_general_scope.GetNameWithNoTooltip] очолить наші війська і забезпечить загибель наших ворогів"
  sao_and_bilala_reduced_control_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ShowCultureName('bilala_culture')] або [ShowCultureName('sao_culture')] втратить [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  had_csd_disaster_variable_tt: "Ця катастрофа ще не траплялася"