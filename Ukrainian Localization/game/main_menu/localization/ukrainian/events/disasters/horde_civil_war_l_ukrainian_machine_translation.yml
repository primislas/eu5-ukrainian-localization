l_english:
  horde_civil_war.1.title: "Криза спадкоємності [ShowGovernmentTypeNameWithNoTooltip('steppe_horde')]"
  horde_civil_war.1.desc: "Смерть нашого попереднього правителя залишила [target_country.GetLongName] у небезпечному становищі. Новий [target_country.Custom('GetRulerOrRegentTitle')] міг би зайняти [target_country.GetAdjectiveWithNoTooltip] престол, проте [target_character.GetSheHe] бракує єдності та підтримки [target_character.GetHerHis] воїнів. Таким чином, [scope_pretender.GetName], воєначальник у наших кордонах, почав збирати лоялістів, щоб кинути виклик [target_character.GetName] за [target_character.GetHerHis] престол..."
  horde_civil_war.1.a: "Принесіть мені [scope_pretender.GetHerHis] голову на списі!"
  horde_civil_war.1.tt: "Кілька наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e], незадоволених нашим правлінням, приєднаються до справи [scope_pretender.GetNameWithNoTooltip]"
  horde_civil_war.2.title: "З'являється новий [target_country.GetGovernment.GetRulerTitle]!"
  horde_civil_war.2.desc: "З раптовою смертю [dead_ruler.GetName], [target_country.GetLongName] стає свідком швидкої низки кривавих спадкоємств."
  horde_civil_war.2.desc.normal_succession: "$horde_civil_war.2.desc$ Хоча [target_ruler.GetName] є законним спадкоємцем за нашим законом, [target_character.GetName] намагається використати хаос спадкоємності та спробувати узурпувати престол. Протистояння [target_character.GetHerHim] може уникнути смерті [target_ruler.GetShortNameWithNoTooltip], але призведе до громадянської війни..."
  horde_civil_war.2.desc.pretender_ruler: "$horde_civil_war.2.desc$ Хоча [target_character.GetNameWithNoTooltip] був суперником правління [dead_ruler.GetShortName] за [dead_ruler.GetHerHis] життя, [target_character.GetNameWithNoTooltip] був обраний законним [target_country.GetGovernment.GetRulerTitle] [target_country.GetFlavorRank].\n\nАле [target_character.GetHerHis] сходження на престол не залишається без виклику, оскільки [scope_pretender.GetName] зібрав воїнів, щоб висунути [scope_pretender.GetHerHis] власні претензії на [target_country.GetAdjectiveWithNoTooltip] престол."
  horde_civil_war.2.a: "Тільки через наші мертві, гниючі тіла!"
  horde_civil_war.2.b: "Такі закони степів."
  horde_civil_war.2.c: "І так боротьба триває..."
  horde_civil_war.3.title: "Повстання нового воєначальника"
  horde_civil_war.3.desc: "Суперник [target.GetName] знайшов [target.GetHerHis] кінець! Однак, дуже реальна загроза все ж залишається, оскільки неспокійні воїни збираються під прапором нового амбітного воєначальника. [scope_pretender.GetName] має намір продовжити війну за [target_country.GetAdjective] престол!"
  horde_civil_war.3.a: "Жодна криза спадкоємності не знаходить легкого кінця..."
  horde_civil_war.4.title: "Перемога [target_country.GetGovernment.GetRulerTitle]!"
  horde_civil_war.4.desc: "Довга боротьба проти нашого заклятого ворога, [target_character.GetName], нарешті завершилася. З повною анексією [target.GetName], [target_country.GetLongName] перемагає, і влада [target_ruler.GetName] відновлена! [target_character.GetShortNameWithNoTooltip] був притягнутий до відповідальності, а незабаром і до меча, як [target_character.GetSheHe] того заслуговує."
  horde_civil_war.4.desc.new: "$horde_civil_war.4.desc$\n\nПроте, щойно одного воєначальника переможено, новий прагне продовжити [target_character.GetHerHis] зусилля. [scope_pretender.GetName] зібрав розрізнених воїнів під [scope_pretender.GetHerHis] прапором, щоб знову кинути виклик [target_country.GetGovernment.GetRulerTitle]."
  horde_civil_war.4.desc.end: "$horde_civil_war.4.desc$\n\nПісля такої нищівної поразки від претендента, будь-які подальші спроби на [target_country.GetAdjectiveWithNoTooltip] престол, здається, припинилися. Стабільність знову повернулася до [target_country.GetName]."
  horde_civil_war.4.a: "Ще один стерв'ятник, який намагається претендувати на престол."
  horde_civil_war.4.b: "Наша влада майже повністю відновлена!"
  horde_civil_war.5.title: "Поразка [target_country.GetGovernment.GetRulerTitle]!"
  horde_civil_war.5.desc: "Незважаючи на всі зусилля [target_ruler.GetName], неспокійні воїни [target_character.GetName] були занадто сильними для [target_ruler.GetHerHim]. Зрештою, колись великий [target_country.GetLongName] впав під невпинним натиском своїх претендентів, завершивши [target_country.GetAdjectiveWithNoTooltip] громадянську війну нищівною поразкою для [target_country.GetGovernment.GetRulerTitle]..."
  horde_civil_war.5.a: "Нехай цей мерзенний претендент задихнеться від [target_character.GetHerHis] гордості."
  horde_civil_war.5.b: "Це кінець [target_country.GetNameWithNoTooltip]..."
  horde_civil_war.6.title: "Правління [target_character.GetShortNameWithNoTooltip]"
  horde_civil_war.6.desc: "Старий порядок [target_country.GetLongName] більше не існує, і [target_character.GetName] став новим правителем степів. Однак його/її дії спричинили багато страждань та кровопролиття, і інші воєначальники можуть спробувати власні перевороти проти нового [target.GetGovernment.GetRulerTitle]..."
  horde_civil_war.6.a: "Нехай приходять!"
  horde_civil_war.7.title: "Повстання в [target_province.GetNameWithNoTooltip]"
  horde_civil_war.7.title.generic: "Провінційне повстання"
  horde_civil_war.7.desc: "Конфлікт між [target_ruler.GetName] та претендентом [target_character.GetName] завдав удару по зусиллях централізувати [target_country.GetName]. Воїни [target_province.GetName] вимагають своєї автономії незалежно від [target_country.GetGovernment.GetRulerTitle] і погрожують повстанням, якщо [target_ruler.GetShortNameWithNoTooltip] не погодиться."
  horde_civil_war.7.a: "Ми ні перед ким не схиляємося!"
  horde_civil_war.7.a.tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] приєднується до [target_rebel.GetName]"
  horde_civil_war.7.b: "У нас немає іншого вибору..."
  horde_civil_war.8.title: "Вбивство [target_ruler.GetNameWithNoTooltip]"
  horde_civil_war.8.title.generic: "Політичне вбивство"
  horde_civil_war.8.desc: "Лише мить необережності; частка секунди неуважності, і полум'я життя гасне вмить. Такою є доля [target_ruler.GetName], чиє життя було обірване стрілою в горло від [target_character.GetName]. Хоча це трагічно для будь-якої меншої держави, для [target_country.GetLongName] це стало нормою."
  horde_civil_war.8.a: "Такі правила степів."
  horde_civil_war.9.title: "Крах торгівлі"
  horde_civil_war.9.desc: "Зазвичай, степи в межах нашого [target_country.GetFlavorRank] є безпечними шляхами для [target_country.GetAdjective] торговців та їхніх ділових партнерів. Однак, з ескалацією ворожих дій між [target_ruler.GetName] та [target_character.GetName], каравани стали мішенями для мародерів-повстанців. Природно, наш [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] менш толерантний до поточної ситуації і вимагає компенсації."
  horde_civil_war.9.a: "Відшкодувати їхній втрачений прибуток."
  horde_civil_war.9.b: "Вони можуть багато вимагати, коли день довгий."
  horde_civil_war.10.title: "Вірність воїнів"
  horde_civil_war.10.desc: "З триваючою жорстокою громадянською війною багато підступних солдатів довели свою невірність, приєднавшись до [target_character.GetName]. Однак, на кожного зрадника знайдеться справжній воїн [target_country.GetLongName]. Ті, хто залишився вірним, присягнули на вірність [target_ruler.GetName] і зібралися в [target_location.GetName], щоб шукати натхнення у свого великого [target_country.GetGovernment.GetRulerTitle]."
  horde_civil_war.10.a: "Виголосити надихаючу промову!"
  horde_civil_war.10.b: "Показати їм силу в бою!"
  horde_civil_war.10.c: "Ознайомити воїнів з нашими бойовими планами."
  horde_civil_war.1000.title: "Незахищені кордони"
  horde_civil_war.1000.desc: "Зазвичай кордони [from_country.GetName] регулярно патрулюються нашими кінними розвідниками. Однак хаос, спричинений амбіціями [target_character.GetName], підриває нашу прикордонну безпеку. Це лише питання часу, перш ніж будь-яка новостворена [ShowGovernmentTypeName('steppe_horde')] або інша держава опиниться в наших володіннях без попередження..."
  horde_civil_war.1000.a: "Посилити ці патрулі!"
  horde_civil_war.1000.b: "Нам доведеться жити без цього..."
  horde_civil_war.1000.b.tt: "Кожна сусідня [Concept('country', 'CONCEPT_PLACEHOLDER')|e] дізнається про наше поточне слабке становище..."
  horde_civil_war.1001.title: "Слабкість [from_country.GetNameWithNoTooltip]"
  horde_civil_war.1001.desc: "Наш сусід, [from_country.GetLongName], переживає [ShowDisasterName('horde_civil_war')]. Хоча це трагічно для їхнього [from_country.GetGovernment.GetRulerTitle], для нас це чудова нагода. Їхні кордони позбавлені будь-якого захисту чи розвідувальних патрулів; їхні землі дозріли для набігу... чи, можливо, для повномасштабного вторгнення?"
  horde_civil_war.1001.a: "Давайте поки що обмежимося звичайними набігами."
  horde_civil_war.1001.a.tt: "[ShowScriptedEffectForScope('horde_raid_location',SCOPE.sLocation('target').GetLocation.MakeScope.Self)]\n#Y Ці ефекти також застосовуються до всіх інших сусідніх [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] [from_country.GetName]#!"
  horde_civil_war.1001.b: "Ми повинні завдати удару, поки вони слабкі!"
  horde_civil_war.1002.title: "Внутрішні чвари [from_country.GetNameWithNoTooltip]"
  horde_civil_war.1002.desc: "Варвари [from_country.GetLongName] борються у своїй [ShowDisasterName('horde_civil_war')]. Наші кордони, колись тероризовані їхніми постійними набігами, нарешті можуть відновитися. Деякі з наших радників, однак, хочуть піти далі: на їхню думку, єдиний спосіб підтримувати мир — це знищити [from_country.GetLongNameWithNoTooltip] раз і назавжди."
  horde_civil_war.1002.a: "Вони мають рацію. Ми повинні готуватися до війни!"
  horde_civil_war.1002.b: "Ми не можемо собі цього дозволити у нашій поточній ситуації."
  horde_civil_war.1002.b.tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що межує з [from_country.GetName], отримує [ShowModifier('recovering_from_raids')] на #Y 4 роки#!, надаючи такі ефекти:\n[ShowModifierEffect('recovering_from_raids')]"
  horde_civil_war.100.title: "Кінець Кризи спадкоємності [ShowGovernmentTypeNameWithNoTooltip('steppe_horde')]"
  horde_civil_war.100.desc.no_horde: "Старі закони орд більше не діють! [target_ruler.GetName] заснував [target_country.GetLongName], скасувавши багато старих традицій [ShowGovernmentTypeName('steppe_horde')] і зміцнивши позицію [target_country.GetGovernment.GetRulerTitle]. Внаслідок цього, стара криза спадкоємності з наших кочових часів була вирішена."
  horde_civil_war.100.desc: "Нарешті, період міжусобиць та громадянських війн добіг кінця. Під твердим правлінням [target_ruler.GetName], [target_country.GetLongName] стабілізувалася в державу, що може витримати випробування часом."
  horde_civil_war.100.a: "Хай живе [target_country.GetGovernment.GetRulerTitle]!"
  horde_civil_war.100.a.tt: "Виходячи з нашої [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e] ми отримаємо наступне:"