l_english:
  reform_society.1.title: "Реформи [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Суспільства"
  reform_society.1.desc: "Надто довго ми були підвладні примхам дрібних місцевих правителів в інших містах-державах. З нашим зростаючим впливом у регіоні та військовою міццю, що підкріплює наші претензії, ми започаткуємо новий тип уряду та об'єднаємо наші володіння під одним прапором, усуваючи незгоду та прагнення до децентралізації."
  reform_society.1.a: "Ми вистоїмо..."
  has_completed_all_religious_focuses_tt: "Завершено кожен можливий [Concept('religious_focus', 'CONCEPT_PLACEHOLDER')|e]"
  reform_society.2.title: "Нова ера для [ROOT.GetCountry.GetNameWithNoTooltip]"
  reform_society.2.desc: "Попри опір з різних джерел, таких як наші вороги та навіть видатні члени станів у нашій країні, наші реформи, спрямовані на централізацію нашого володіння, мали чудовий успіх. Це, безсумнівно, призведе до безпрецедентного контролю та нової ери влади, оскільки наша нація відкидає старі звичаї та приймає нові, інноваційні форми правління. Наше майбутнє буде лише світлим, рухаючись вперед..."
  reform_society.2.a: "Це наш час."
  reform_society.3.title: "Протести зсередини"
  reform_society.3.desc: "Багато видатних голосів з нашого володіння відкрито протестували проти централізації та законодавчих реформ, які були нещодавно запроваджені. Вбачаючи в цьому не що інше, як заколот і повстання проти нашої влади, вони вимагають умиротворення, якщо ми бажаємо просуватися вперед із прийняттям життєво важливих правових рамок для реалізації наших цілей."
  reform_society.3.a: "Вони сміють нам погрожувати?"
  reform_society.3.b: "Ми можемо домовитися та умиротворити їх."
  reform_society.3.c: "Час для реформ настав!"
  annex_all_altepetls_tt: "Усі наші піддані з типом уряду [ShowGovernmentReformName('altepetl')] будуть анексовані"
  reform_society.4.title: "Вогонь у нічному небі"
  reform_society.4.desc: "Щоночі, протягом трохи більше року, палаючий вогонь спалахує в нічному небі над [target_location.GetName]. Це вражаюче видовище, з широкою основою, що звужується до загостреного кінця, ніби воно стікало вогнем по небесах. Деякі описують це небесне явище як палаючий качан кукурудзи у тверді небесній. Більшість істориків, у своїй інтерпретації, вважають це появою комети. Це вогняне видовище розгортається на тлі суспільства, що обмірковує радикальні реформи, можливо, знак божественного несхвалення? Коли люди дивляться вгору, вони не можуть не відчувати тягар невизначеності, розмірковуючи, чи є ця космічна подія передвісником неминучих змін, чи знаком з всесвіту, що розпалює розмови та викликає палкі дискусії про майбутнє."
  reform_society.4.a: "Чи розгнівали ми богів?"
  reform_society.4.b: "Не дивіться на небо!"
  reform_society.4.c: "Богів необхідно умиротворити..."
  reform_society.5.title: "Знищення [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  reform_society.5.desc: "Все почалося з шепоту, шелесту листя, коли атмосфера навколо нашої столиці стала важкою, майже так, ніби палець богів тиснув на нас. [target_location.GetName], колись процвітаюче місто, прикрашене величними храмами та гамірними ринками, тепер бачить свою загибель. Самі небеса, здається, плачуть, коли зливи обрушуються на священний мегаполіс, заповнюючи його вулиці невпинною повінню.\n\nГрім реве, як розгніваний голос POSTEDIT_Уїцилопочтлі, тоді як полум'я пожирає будівлі, як гнівний вогонь POSTEDIT_Шіутекутлі. Земля тремтить під ногами переляканих мешканців, ніби POSTEDIT_Тлалок вимагає відплати. Кінець [target_location.GetNameWithNoTooltip] відчувається як жахливе прокляття від богів, остаточний суд, що знищує наш колись могутній народ і залишає нас у руїнах."
  reform_society.5.a: "Рятуйтеся втечею!"
  reform_society.5.b: "Ми можемо полегшити частину руйнувань..."
  reform_society.5.c: "Пошана та благочестя врятують нас."
  reform_society.6.title: "Велика пожежа серед білого дня"
  reform_society.6.desc: "У серці [target_location.GetName] височіє та шанується величний храм POSTEDIT_Уїцилопочтлі, символ нашої відданості богам. Але одного доленосного дня дивний знак кидає тінь на місто. Смуга вогню спалахує в небі, яскраво палаючи серед білого дня, її походження – на далекому західному обрії. Ніби керована божественними руками, вогняна смуга розколюється на три, кожен фрагмент залишає за собою іскри неприборканої енергії. Паніка охопила наших людей, коли вони спостерігають це небесне видовище, побоюючись, що це зловісний знак від самого POSTEDIT_Уїцилопочтлі.\n\nШепіт шириться вулицями, розповіді про неминучу загибель, оскільки священні полум'я храму невизначено мерехтять. Попри наші зусилля, полум'я всередині храму неможливо приборкати, і храм нашого шанованого бога піддається незрозумілому пеклу, залишаючи нас у жалобі, ставлячи під сумнів волю бога сонця та війни."
  reform_society.6.a: "Чи боги несхвально ставляться до наших реформ?"
  reform_society.6.b: "Ми довіримося тлумаченням жерців."
  reform_society.6.c: "Єдиний шлях – уперед!"
  reform_society.7.title: "Плач у темряві"
  reform_society.7.desc: "Під безтурботним місячним сяйвом лунає скорботний звук, що викликає тремтіння на вулицях [target_location.GetName]. Ніч за ніччю жіночий голос пронизує темряву, її крики сповнені нагальної благання про дії. Вона благає їх, кажучи: \"Мої діти, ми повинні піти\", і \"Мої діти, куди ви підете?\" Ці нав'язливі фрази невпинно відлунюють, викликаючи страх і розгубленість серед людей, які ставлять під сумнів наше втручання та спроби реформувати наше суспільство, ніби самі боги вказують на своє невдоволення. Керуючись як цікавістю, так і жахом, вони збираються, щоб розшифрувати послання таємничого голосу, борючись із загадковим походженням цієї примарної присутності, голосу, якого вони ніколи раніше не чули.\n\nЗ плином ночей крики продовжуються, стаючи все більш інтенсивними та відчайдушними, переконуючи їх, що це божественне послання, зловісне пророцтво, яке не можна ігнорувати. Їхня доля переплітається з нав'язливими закликами, змушуючи їх зіткнутися з критичним рішенням: слідувати закликам примарної жінки та вирушити в невизначену подорож, або залишитися на своїй батьківщині, зіткнувшись із тінню насувається загибелі, що нависає в ночі.\n\nЗ кожною наступною ніччю таємничі крики стають голоснішими та відчайдушнішими. Люди, тепер переконані в божественному посланні, починають прислухатися до попередження примарної жінки, розуміючи, що їхня доля переплетена з її нав'язливими благаннями. На горизонті маячить рішення — чи прислухатися до її слів і вирушити в невизначену подорож, чи залишитися, ризикуючи невідомим і насувається загибеллю, що, здається, затримується в ночі."
  reform_society.7.a: "Затуліть вуха, ми вистоїмо!"
  reform_society.7.b: "Ми приречені!"
  reform_society.7.c: "Люди не прислухатимуться до міських легенд!"
  reform_society.8.title: "Віддзеркалення зірок"
  reform_society.8.desc: "У болотах навколо [target_location.GetName] вмілий мисливець заплутав у сіті дивного сірого птаха, чиє пір'я нагадувало похмурі відтінки похмурого неба. Цей дивовижний птах мав характерну особливість: темну, дзеркальну прикрасу, що гніздилася на його чолі. Коли мисливці наважилися зазирнути в це магічне дзеркало, їх охопило здивування, коли вони побачили зірки та безмежний простір нічного неба, що відбивалися в ньому.\n\nВизнаючи глибоке значення цього загадкового відкриття, птаха представили [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Коли [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] дивився в дзеркало, перед його очима розгорнулося чарівне видовище. [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe|U] побачив безліч воїнів верхи на величних істотах, що нагадували колосальних оленів, видовище водночас бентежне та захоплююче. Вирішивши розшифрувати прихований сенс цієї містичної зустрічі, [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] довірив птаха та його дзеркало шанованим верховним жерцям, з урочистим завданням розгадати цю небесну загадку.\n\nПроте, коли верховні жерці по черзі зазирали в дзеркало, їхні щирі зусилля приносили лише розчарування та збентеження. На їхній подив, дзеркало залишалося вперто порожнім, приховуючи небесне видіння, яке захопило їхнього лідера. Незважаючи на свою глибоку мудрість і непохитну відданість, верховні жерці виявилися нездатними запропонувати пораду або розгадати загадку, яка захопила уяву [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip], приписуючи це поганому знаменню, пов'язаному з радикальними реформами, які нещодавно охопили наш народ."
  reform_society.8.a: "Чи втратили ми контроль над владою?"
  reform_society.8.b: "Це має бути знак..."
  reform_society.8.c: "Кріпіться!"
  all_subjects_20_ld_tt: "Усі наші [ShowGovernmentReformName('altepetl')] піддані отримають [ShowNamedValue('liberty_desire_severe_plus')|+=2%] [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e]"
  every_location_10_control_reduction_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] втратить [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"