l_english:
  reverse_key: "Змінимо наш курс."
  nonsense_key: "Нісенітниця!"
  estate_intro_paragraph: "Не дивно, що [target_emperor_scope.GetAdjective] сановники не знайшли прихильності серед впливових осіб у нашій країні. Зовнішні сили, що вторгаються в наш [ROOT.GetCountry.GetFlavorRank], рідко залишалися в добрих стосунках із усталеним порядком речей."
  continuation_key: "чиїй опір цим впливам загрожує дестабілізувати все наше суспільство."
  sinicization_disaster.1.title: "Баланс сил"
  sinicization_disaster.1.desc: "Те, що починалося як невинні стосунки між нашим народом та [target_emperor_scope.GetLongName], тепер загрожує нашій незалежності. Їхня зростаюча влада загрожує затьмарити наш власний політичний вплив. Міру іноземного втручання в наші справи необхідно приборкати, інакше ми станемо лише черговим підданим великого дракона..."
  sinicization_disaster.1.a: "Наша вірність належить [target_emperor_scope.GetNameWithNoTooltip]."
  sinicization_disaster.1.b: "Ми повинні захистити наш суверенітет!"
  chi_may_be_sympathetic_tt: "#Y [target_emperor_scope.GetNameWithNoTooltip]#! може бути прихильним до нас у ці буремні часи"
  sinicization_disaster.2.title: "Іноземні симпатії"
  sinicization_disaster.2.desc: "Шепіт при дворі розповідає історію незаконної таємниці. Він розповідає про тіньові угоди та подарунки в обмін на позитивний вплив. Об'єкт обговорення — не хто інший, як член нашого кабінету, [target_character.GetName], чиї нещодавні політичні погляди багато в чому збігаються з позицією [target_emperor_scope.GetAdjectiveWithNoTooltip] представників."
  sinicization_disaster.2.a: "Ми дозволимо це поки що..."
  sinicization_disaster.2.b: "[target_character.GetSheHe|U] буде вигнано."
  sinicization_disaster.2.c: "Організуйте [target_character.GetHerHis] страту!"
  sinicization_disaster.3.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] Опираються [target_emperor_scope.GetAdjectiveWithNoTooltip] Впливам"
  sinicization_disaster.3.desc: "$estate_intro_paragraph$\n\nТакий випадок із [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], $continuation_key$"
  sinicization_disaster.3.a: "$reverse_key$"
  sinicization_disaster.3.b: "$nonsense_key$"
  sinicization_disaster.4.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Опираються [target_emperor_scope.GetAdjectiveWithNoTooltip] Впливам"
  sinicization_disaster.4.desc: "$estate_intro_paragraph$\n\nТакий випадок із [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], $continuation_key$"
  sinicization_disaster.4.a: "$reverse_key$"
  sinicization_disaster.4.b: "$nonsense_key$"
  sinicization_disaster.5.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] Опираються [target_emperor_scope.GetAdjectiveWithNoTooltip] Впливам"
  sinicization_disaster.5.desc: "$estate_intro_paragraph$\n\nТакий випадок із [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], $continuation_key$"
  sinicization_disaster.5.a: "$reverse_key$"
  sinicization_disaster.5.b: "$nonsense_key$"
  sinicization_disaster.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Опираються [target_emperor_scope.GetAdjectiveWithNoTooltip] Впливам"
  sinicization_disaster.6.desc: "$estate_intro_paragraph$\n\nТак само і з [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], $continuation_key$"
  sinicization_disaster.6.a: "$reverse_key$"
  sinicization_disaster.6.b: "$nonsense_key$"
  sinicization_disaster.7.title: "Данини Вимагають"
  sinicization_disaster.7.desc: "Ніколи раніше представники [target_emperor_scope.GetLongName] не висували таких зухвалих вимог щодо данини. Нехтуючи нашими попередніми домовленостями, вони увірвалися до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] з обурливими вимогами подальшого фінансування аморальної поведінки [target_emperor_scope.GetAdjectiveWithNoTooltip] [target_emperor_scope.GetGovernment.GetCourtTitle]. Це, безумовно, остання помилка в серії невдалих дипломатичних комунікацій і ознака того, що вони просто не поважають нас..."
  sinicization_disaster.7.a: "Викиньте їх з вікна!"
  sinicization_disaster.7.b: "Гаразд, цього разу ми заплатимо."
  sinicization_disaster.8.title: "Наша Позиція Серед Небезпеки"
  sinicization_disaster.8.desc: "Різні радники, і навіть придворні, висловили свою позицію щодо поточної ситуації в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Деякі підтримують впливи, поширювані нашими [target_emperor_scope.GetAdjective] сусідами, тоді як інші бачать у цьому явну загрозу нашій незалежності..."
  sinicization_disaster.8.a: "Спробуймо чинити їм опір, поки що."
  sinicization_disaster.8.b: "Ми довірятимемо [target_emperor_scope.GetNameWithNoTooltip]."
  until_disaster_ends: "доки не закінчиться поточна [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  sinicization_disaster.100.title: "Наші Стосунки з [target_emperor_scope.GetNameWithNoTooltip]"
  sinicization_disaster.100.desc.a: "Кажуть, що довіряти лютому тигру, що він не вкусить, — це вкрай нерозумний підхід до життя. Однак наші стосунки з [target_emperor_scope.GetName] є живим прикладом протилежного. Наша залежність від наших дружніх сусідів сприяла новій ері для обох наших народів, ері тісної співпраці та нової довіри у спільних справах!"
  sinicization_disaster.100.desc.b: "Остерігайтеся блискучих подарунків, загорнутих у гарні шкури. Наша позиція щодо спроб скасувати вплив [target_emperor_scope.GetAdjective] рук у наших внутрішніх справах досягла кульмінації у остаточній прокламації нашого відокремлення від їхньої сфери впливу."
  sinicization_disaster.100.desc.c: "На світанку нашої великої нації, нашого польоту серед зірок і розквіту нашої великої ери, ми зневажливо дивимося на такі жалюгідні спроби підірвати нашу стабільність і відкидаємо їх. Спроби проникнення в наше суспільство [target_emperor_scope.GetAdjective] сановників були зустрінуті сміхом і відмовою. Лев не переймається думкою овець."
  sinicization_disaster.100.desc.d: "На жаль, дари та спілкування між нами та [target_emperor_scope.GetLongName] були нічим іншим, як їхнім способом проникнення в наші спільні справи, вписуючи їхню грошову допомогу та підтримку в наші соціальні структури. Здається, нас обдурили, і тепер ми повинні схилитися перед нашими новими володарями..."
  sinicization_disaster.100.desc.e: "Часи іноземного впливу від $china$ добігли кінця. Що б не принесло майбутнє, ми намагатимемося захистити наш народ і наші традиції, зберігаючи наші інтереси в наших серцях."
  sinicization_disaster.100.a: "Це закінчиться добре, безсумнівно!"
  sinicization_disaster.100.b: "Ми не схилимо коліна!"
  sinicization_disaster.100.c: "Чи нас розірвуть між двома силами?"
  sinicization_disaster.100.d: "У нас вже є володар."
  sinicization_disaster.100.e: "Їхні спроби вплинути на нас були в кращому випадку смішними."
  sinicization_disaster.100.f: "Ми стали лише виноскою в їхній великій історії..."
  sinicization_disaster.100.g: "Ми вистояли ще одну катастрофу!"
  this_may_lead_to_war_tt: "Цей наслідок розгніває [target_emperor_scope.GetAdjectiveWithNoTooltip] і може призвести до війни"
  make_us_tributary_tt: "Ми станемо #Y данником#! [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] під владою великого [target_emperor_scope.GetLongNameWithNoTooltip]"
  gains_cultural_bonuses_tt: "Цей наслідок піде на користь культурі [target_emperor_scope.GetCulture.GetName]"
  sinicization_disaster.101.title: "Новини з [target_sinicized_country.GetNameWithNoTooltip]"
  sinicization_disaster.101.desc: "Наші сановники, що перебували при дворі [target_sinicized_country.GetName], повернулися, принісши звістки про ситуацію за кордоном. За їхніми словами, останні роки нашого зростаючого впливу в [target_sinicized_country.GetLongNameWithNoTooltip] вкинули їхній народ у бурхливий час, сприятливий для експлуатації..."
  sinicization_disaster.101.a: "Вони схилять коліно!"
  sinicization_disaster.101.b: "Ласкаво просимо, [target_sinicized_country.GetNameWithNoTooltip]!"
  sinicization_disaster.101.c: "Схоже, ми вплинули на їхню культуру."
  sinicization_disaster.101.d: "Вони не мали жодного шансу проти нашої величі."