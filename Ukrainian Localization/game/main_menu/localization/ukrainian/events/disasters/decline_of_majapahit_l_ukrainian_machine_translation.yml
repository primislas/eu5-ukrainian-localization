l_english:
  decline_of_majapahit.1.title: "Занепад [ROOT.GetCountry.GetNameWithNoTooltip]"
  decline_of_majapahit.1.desc: "[ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetFlavorRank] у передсмертних муках. Колись центр величезної мережі [ShowSubjectTypeName('vassal')] королівств та [ShowSubjectTypeName('tributary')] держав, [ROOT.GetCountry.GetNameWithNoTooltip] тепер має мало влади за межами [ROOT.GetCountry.GetCapital.GetName]. Купці все частіше відвідують наших [ShowReligionAdjective('sunni')] суперників, і релігія повільно закріплюється на півночі [ShowAreaName('java_area')]. Гірше того, внутрішні чвари за спадщину загрожують розірвати залишки [ROOT.GetCountry.GetFlavorRank] зсередини."
  decline_of_majapahit.1.a: "Це темні часи."
  maj_disaster_tt: "Якщо ми не стримаємо поширення [ShowReligionGroupName('muslim')] у нашій країні, навернені [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] можуть зрештою повстати як $DEM$."
  decline_of_majapahit.2.title: "Нелояльність до [ROOT.GetCountry.GetNameWithNoTooltip]"
  decline_of_majapahit.2.desc: "Правителі [maj_tributary_country.GetName] все частіше ігнорували [ROOT.GetCountry.GetAdjective] правління. Тепер вони перетнули межу відвертої непокори, утримуючи данину та зневажаючи наших емісарів."
  decline_of_majapahit.2.a: "Вони пошкодують про це."
  decline_of_majapahit.2.b: "Піти на поступки, щоб відновити їхню лояльність."
  decline_of_majapahit.3.title: "Затемнення [ROOT.GetCountry.GetNameWithNoTooltip]"
  decline_of_majapahit.3.desc: "У недалекому минулому [ROOT.GetCountry.GetLongName] був єдиним гегемоном [ShowRegionName('indonesia_region')]. На жаль, ті дні слави давно минули, і існує безліч держав, які здобувають більше поваги в наших водах. Однією з таких націй є [target_country.GetLongName], держава, яка кидає нам неофіційний виклик."
  decline_of_majapahit.3.a: "Виправдати кампанію відплати."
  decline_of_majapahit.3.b: "Зосередитися на наших внутрішніх проблемах."
  decline_of_majapahit.4.title: "Місцеве невдоволення"
  decline_of_majapahit.4.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] у [target_province.GetName] підняли зброю, ворогуючи з силами місцевого Адіпаті. Місцевий гарнізон не в змозі стримати повстання, і провінція перебуває у стані хаосу."
  decline_of_majapahit.4.a: "Перечекати."
  decline_of_majapahit.4.b: "Умиротворити повстанців золотом."
  decline_of_majapahit.5.title: "Претендент кидає виклик трону"
  decline_of_majapahit.5.desc: "Боротьба за спадщину стала звичним явищем у [ROOT.GetCountry.GetName]. Цього разу принц на ім'я [target_character.GetName] зібрав армію і розпочав [target_character.GetHerHis] похід на столицю, щоб повалити [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  decline_of_majapahit.5.a: "Ми розгромимо цього вискочку."
  maj_every_pop_in_capital_province: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] [Concept('province', 'CONCEPT_PLACEHOLDER')|e], [ROOT.GetCountry.GetCapital.GetProvince.GetName]:"
  decline_of_majapahit.6.title: "[target_religion.GetAdjectiveWithNoTooltip] Втеча до [target_province.GetNameWithNoTooltip]"
  decline_of_majapahit.6.desc: "[target_religion.GetAdjective] істеблішмент повільно викорінюється наступом [target_religion2.GetAdjective] торговців. Щодня все більше і більше простолюдинів навертаються до [target_religion2.GetGroup.GetName], і в межах [ROOT.GetCountry.GetName] більшість більше не складає [target_religion.GetNameWithNoTooltip]. Цей процес мав безпрецедентний вплив на [ROOT.GetCountry.GetFlavorRank] та його суспільство, викликаючи широке занепокоєння у [target_religion.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Багато хто з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] називають це кінцем [ROOT.GetCountry.GetAdjectiveWithNoTooltip] правління і тікають до [target_province.GetName]."
  decline_of_majapahit.6.a: "Чи це падіння імперії?"
  decline_of_majapahit.7.title: "Адіпаті [target_location.GetNameWithNoTooltip] навертається"
  decline_of_majapahit.7.desc: "Наш місцевий губернатор у [target_location.GetName] вирішив навернутися до [ShowReligionName('sunni')]. Вважається, що поштовхом для такого поспішного рішення було диво, здійснене місцевим [ShowReligionGroupAdjective('muslim')] святим. Ми ж, однак, вважаємо, що це лише хитре політичне рішення, щоб здобути прихильність [ShowReligionAdjectiveWithNoTooltip('sunni')] купців."
  decline_of_majapahit.7.a: "Сподіваймося, губернатор не спробує нічого радикальнішого."
  decline_of_majapahit.8.title: "Пропозиція допомоги"
  decline_of_majapahit.8.desc: "Ситуація в [ROOT.GetCountry.GetName] є жахливою, але, схоже, ще не все втрачено. Група заможних [ShowReligionGroupAdjective('muslim')] купців звернулася до [ROOT.GetCountry.GetGovernment.GetRulerTitle] з пропозицією. Вони щедро заплатять нам за торгові привілеї в наших портах та гарантії вільного сповідування їхньої релігії в [ROOT.GetCountry.GetName]. Бхаттара Саптапрабху попереджає, що нестабільність імперії може привабити наш народ до чужої віри купців, відкинувши засадничі традиції [ROOT.GetCountry.GetAdjectiveWithNoTooltip] імперії. Срібло, однак, є своїм власним контраргументом."
  decline_of_majapahit.8.a: "Їхня допомога є дуже бажаною."
  decline_of_majapahit.8.b: "Нам не потрібно приймати допомогу від язичників!"
  maj_muslim_aid_impact: "Поки [ShowModifier('maj_muslim_aid')], [Concept('event', 'CONCEPT_PLACEHOLDER')|e] '$death_of_hayan_wuruk.6.title$' спрацьовуватиме втричі частіше."
  decline_of_majapahit.100.title: "Новий світанок для [ROOT.GetCountry.GetNameWithNoTooltip]"
  decline_of_majapahit.100.desc: "Попри всі труднощі, [ROOT.GetCountry.GetName] вийшла з десятиліть заворушень і занепаду як нова відроджена сила. Стабільний [ROOT.GetCountry.GetGovernment.GetCourtTitle], вірні піддані та спільна [ROOT.GetCountry.GetReligion.GetAdjective] віра зміцнюють нашу рішучість, коли ми згадуємо клятву [target_character.GetName]: що одного дня [ROOT.GetCountry.GetNameWithNoTooltip] правитиме всією Нусантарою."
  decline_of_majapahit.100.a: "Ми повернулися з краю прірви."
  decline_of_majapahit_timer_tt: "Минуло щонайменше 10950 днів з початку [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] [ShowDisasterName('decline_of_majapahit')]. Залишилося [ROOT.GetCountry.MakeScope.VarRemaining('decline_of_majapahit_timer')] днів."
  decline_of_majapahit.101.title: "Піднесення $MTM$"
  decline_of_majapahit.101.desc: "[target_religion.GetAdjective] [ROOT.GetCountry.GetLongName] виявила свою нездатність керувати навіть своїми володіннями на [ShowAreaName('java_area')]. Під тиском з усіх боків та з перевагами навернення, [ROOT.GetCountry.GetAdjectiveWithNoTooltip] керівники вирішили навернутися до [ROOT.GetCountry.GetReligion.GetName]. Хоча це може допомогти покласти край [ShowDisasterName('decline_of_majapahit')], це також назавжди заплямує престиж [ROOT.GetCountry.GetName]."
  decline_of_majapahit.101.a: "Нам довелося зробити те, що довелося."
  decline_of_majapahit.102.title: "Піднесення [target_country.GetNameWithNoTooltip]"
  decline_of_majapahit.102.desc: "Дедалі автономніша [ShowReligionGroupAdjective('muslim')] громада знайшла свого захисника в особі принца-відступника [target_character.GetName], який, як кажуть, є далеким родичем [ROOT.GetCountry.GetAdjective] правлячої родини. [target_character.GetNameWithNoTooltip] не лише проголосив незалежність [target_country.GetAdjective] [target_country.GetFlavorRank], але й прагне захопити трон [ROOT.GetCountry.GetNameWithNoTooltip] для себе. Зв'язані нашими численними труднощами, ми мало що можемо зробити, поки [target_country.GetNameWithNoTooltip] збирає свої сили."
  decline_of_majapahit.102.a: "Зрадники! Зустріньте їх на полі бою!"
  decline_of_majapahit.102.b: "Ми відвоюємо ці території свого часу."