l_english:
  rise_of_the_szlachta.1.title: "Піднесення [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  rise_of_the_szlachta.1.desc: "Махінації внутрішньої політики часто переплітаються з одвічним прагненням до влади. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] завжди вважали себе головними захисниками нашого королівства, завжди прагнучи тримати [ROOT.GetCountry.GetName] та її інтереси на першому плані.\n\nОднак, схоже, що абсолютна влада абсолютно розбещує, і вони також стали жертвами своїх наївних амбіцій. Вони не лише відкинули наше верховенство, але й відверто поставили під сумнів саму легітимність наших засад!"
  rise_of_the_szlachta.1.a: "Як вони сміють?"
  rise_of_the_szlachta.2.title: "Привілейовані вимоги"
  rise_of_the_szlachta.2.desc: "Голодні шуліки, такі як [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], завжди шукають способів встромити свої жадібні пазурі в соковиту плоть влади та впливу. Через наш нинішній ослаблений статус щодо різних впливових діячів нашого королівства, представники обох цих станів знову опинилися при нашому дворі, прагнучи розширення своєї вже закріпленої влади."
  rise_of_the_szlachta.2.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] отримають їх."
  rise_of_the_szlachta.2.b: "Краще підтримати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  rise_of_the_szlachta.2.c: "Ми не зважаємо на виття скажених псів!"
  rise_of_the_szlachta.3.title: "Суперечки станів"
  rise_of_the_szlachta.3.desc: "Боротьба за владу ніколи не буває тихою справою. Досить часто зіткнення між найвидатнішими станами переростають у відкритий конфлікт. Такий невдалий випадок стався, коли члени [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] погрожують відкритим повстанням, якщо їхні взаємовиключні вимоги будуть задоволені, у [target_location.GetName]."
  rise_of_the_szlachta.3.a: "Ми надамо перевагу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  rise_of_the_szlachta.3.b: "Станьмо на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  based_on_burghers_estate_power_tt: "Виходячи з [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]:"
  based_on_burghers_estate_satisfaction_tt: "Виходячи з поточної [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]:"
  based_on_nobles_estate_power_tt: "Виходячи з поточної [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]:"
  estate_satisfaction_burghers_tt: "Під впливом поточної задоволеності стану"
  rise_of_the_szlachta.4.title: "Народна підтримка"
  rise_of_the_szlachta.4.desc: "Дебати — це жвавий спорт між різними станами, які граються з долею нашого народу. Прагнучи провести життєво важливі реформи під жадібним наглядом присутніх під час обговорень, ми не можемо не помітити, що процес був би помітно легшим, якби ми вирішили дотримуватися деяких пунктів порядку денного, запропонованих нам цими впливовими людьми."
  rise_of_the_szlachta.4.a: "Покладімося на [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  rise_of_the_szlachta.4.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] допоможе нам."
  rise_of_the_szlachta.4.c: "Нам не потрібні милиці."
  rise_of_the_szlachta.5.title: "Стани вимагають скликання [ROOT.GetCountry.GetGovernment.GetParliament.GetName] сесії"
  rise_of_the_szlachta.5.desc: "Політика при дворах різних впливових діячів у межах наших кордонів значною мірою залежить від обговорень нашого [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Той факт, що ми досить давно не проводили сесії, почав викликати невдоволення різних [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')]."
  rise_of_the_szlachta.5.a: "Дуже добре, ми вислухаємо їх."
  rise_of_the_szlachta.5.b: "Сесія — так, але не для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]!"
  rise_of_the_szlachta.5.c: "Ми не приймаємо наказів від дрібних куртизанок."
  based_on_crown_estate_power_tt: "На основі [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] з боку [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]:"
  rise_of_the_szlachta.6.title: "Тріумф [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  rise_of_the_szlachta.6.desc: "Роки міжусобиць призвели до виснаження [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], тіні колишньої величі. Через махінації, закулісні угоди та неприборкану корупцію [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] успішно утвердили себе як єдину та найвищу владу в нашій країні."
  rise_of_the_szlachta.6.a: "Що це означає для нашого народу?"
  rise_of_the_szlachta.7.title: "Тріумф [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  rise_of_the_szlachta.7.desc: "Те, що почалося як переворот за рахунок [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] на вимогу [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], швидко виявило, що багато членів [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] діяли в тіні. Рішучим ударом та нестримним впливом [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] узурпували владу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та встановили себе як головну владу наших земель, на краще чи на гірше."
  rise_of_the_szlachta.7.a: "Цікавий поворот подій..."
  rise_of_the_szlachta.8.title: "Тріумф Корони"
  rise_of_the_szlachta.8.desc: "Мало хто очікував, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] вийде неушкодженою з цього випробування. Однак, попри всі труднощі та в драматичному повороті подій, [target_character.GetName] не тільки відбив вплив [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], але й відновив віру в нашу центральну владу, започаткувавши нову еру для [ROOT.GetCountry.GetName] та її народу."
  rise_of_the_szlachta.8.a: "Нарешті!"
  has_had_struggle_for_royal_power_disaster_tt: "Успішно завершив(ла) #Y Struggle for Royal Power#! [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"