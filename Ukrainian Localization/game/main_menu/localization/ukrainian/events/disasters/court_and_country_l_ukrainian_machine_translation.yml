l_english:
  court_and_country.1.title: "Конфлікт двору та країни"
  court_and_country.1.desc: "Посягання [ROOT.GetCountry.GetAdjective] держави на володіння, що традиційно перебували під домінуванням регіональних аристократів, місцевих судів чи інших груп інтересів, призвело до широкого невдоволення [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [target_location.GetName] [ROOT.GetCountry.GetGovernment.GetCourtTitle].\n\nЦі групи тепер об'єдналися та сформували альянси для боротьби з центральною владою. Сьогодні ми отримали низку заперечень щодо нашого останнього податкового указу, посилаючись на стародавні права та аморальну поведінку представників цих вискочок. Очевидно, що подальші спроби зміцнити нашу владу будуть перешкоджати при кожній нагоді."
  court_and_country.1.a: "Вони схилять коліна перед центральною владою!"
  court_and_country.1.b: "Спробувати домовитися з цими фрондерськими елементами."
  court_and_country.2.title: "Кінець ворожнечі між двором та країною"
  court_and_country.2.desc: "Період широкого перешкоджання владі в провінціях нарешті добіг кінця. Те, як ми впоралися з цією кризою, визначить, як місцеві владні структури взаємодіятимуть з урядом у [target_location.GetName] у найближчому майбутньому."
  court_and_country.2.a: "Держава тріумфує!"
  court_and_country.2.b: "Можливо, тепер ми нарешті зможемо працювати разом."
  court_and_country.2.c: "[target_location.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle] спустошений."
  legitimacy_yields_more_crown_power_tt: "[Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e] тепер надаватиме більше [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e] завдяки нашому успіху в [ShowDisasterName('court_and_country')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country.3.title: "Влада [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  court_and_country.3.desc: "Прагнучи зміцнити нашу владу всередині, стало очевидним, що нам потрібно стримати вплив [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Епоха абсолютизму готується ознаменувати великий перехід від феодальних владних структур, де [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] мали значну регіональну владу, до нашої мрії про централізовану та могутню інституцію під беззаперечною юрисдикцією [target_character.GetName]."
  court_and_country.3.a: "Відкликати їхні привілеї!"
  court_and_country.3.b: "Втрутитися на місцевому рівні."
  court_and_country.3.c: "Позбавити їх місць у [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  court_and_country.4.title: "Влада [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  court_and_country.4.desc: "Протягом багатьох років наш клас [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] здобув значний вплив у наших політичних справах. Через комерцію та спонсорство місцевої політики вони часто кидали виклик нашій владі. Щоб покращити наше становище на вершині ієрархії, ми прагнемо встановити їхнє належне місце під нашим прапором."
  court_and_country.5.title: "Влада [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  court_and_country.5.desc: "Влада над божественним духом у наших громадах, а також питання нашої віри, надали величезний вплив [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Їхнє слово часто конкурує зі словом [target_character.GetName], оскільки вони колись володіли значними частинами нашої землі. Шляхом захоплення церковних активів та забезпечення верховенства держави в релігійних справах, ми прагнемо контролювати їхню владу."
  court_and_country.6.title: "Влада [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]"
  court_and_country.6.desc: "Основою нашого великого суспільства є не хто інший, як [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Ці величезні нижчі верстви населення є центральними для нашої економіки, але їхня місцева лояльність та традиційні права іноді конфліктують з централізованою владою. Щоб забезпечити наше правління та встановити тверду руку над народом, доцільно вжити активних кроків для обмеження їхньої влади."
  court_and_country.7.title: "Провінція відмовляється платити податки"
  court_and_country.7.desc: "Напруга зростає в [target_province.GetName], оскільки місцеві лідери непохитно відмовляються виконувати низку нещодавніх постанов та податків, затверджених [target_character.GetName]. Замість того, щоб тихо підкоритися, ці лідери об'єдналися, щоб надіслати офіційне звернення до [target_capital.GetName], закликаючи до негайної заміни кількох податкових інспекторів, розміщених у їхній провінції. Вони стверджують, що ці [ROOT.GetCountry.GetGovernment.GetAdjective] агенти перевищили свої повноваження, зловживаючи своєю владою та ігноруючи стародавні права та привілеї, які давно поважалися в регіоні.\n\nСкарги численні та серйозні; розповіді про надмірні збори, накладені на вже обтяжених фермерів, раптові вилучення товарів без законної причини та майже кричуще ігнорування місцевих звичаїв. Такі дії, стверджують вони, не лише посіяли невдоволення, але й загрожують порушити делікатний баланс порядку та лояльності в усій провінції. Люди розцінюють це як образу своєї гідності, і без швидких дій шепіт незгоди може перерости в силу, яку буде набагато важче придушити."
  court_and_country.7.a: "Заарештувати їхніх лідерів!"
  court_and_country.7.b: "Ми можемо домовитися."
  gain_modifier_loc_key: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e] отримає"
  every_pop_in_target_province_loses_20_satisfaction_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_location_in_target_province_gets_cnc_local_authority_asserted_tt: "$gain_modifier_loc_key$ [ShowModifier('cnc_local_authority_asserted')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_in_target_province_gains_20_satisfaction_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_location_in_target_province_gets_cnc_refused_to_pay_taxes_tt: "$gain_modifier_loc_key$ [ShowModifier('cnc_refused_to_pay_taxes')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country.8.title: "Назріває незгода"
  court_and_country.8.desc: "Спроби [target_character.GetName] уніфікувати правові традиції, податки та зобов'язання провінцій у [ROOT.GetCountry.GetLongName] призвели до того, що лідери [target_rebel.GetName] закликали своїх співвітчизників до зброї. Вони стверджують, що ми порушили правила, які присягалися дотримуватися, коли їхні землі перейшли під наш контроль, і що у них немає іншого вибору, окрім як знову підняти бунтівні прапори.\n\nНаші місцеві представники благають нас укласти угоду з нашого місця влади в [target_location.GetName], поки не пізно. Якщо ми гарантуємо збереження частини їхньої автономії, їх ще можна переконати у скасуванні іншої."
  court_and_country.8.a: "Цей заколот має бути придушений!"
  court_and_country.8.b: "Ми купимо їхню вірність."
  rebel_pops_in_target_province_lose_10_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що підтримують [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip], втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  non_rebel_pops_in_target_province_lose_5_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що #Y не#! підтримують [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip], втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  rebel_pops_in_target_province_gain_10_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що підтримують [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip], отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  non_rebel_pops_in_target_province_gain_5_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що #Y не#! підтримують [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip], отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country.9.title: "Сварливі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  court_and_country.9.desc: "Деякі члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] почали обурюватися новими ідеалами шляхетності. Вони втратили вплив і владу в [target_location.GetName], але все ще мають значний місцевий вплив, володіючи величезними маєтками та глибокими кишенями. Тужачи за часами, коли вони були стовпами королівства, а не слугами [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [target_character.GetHerHis] міністрів, вони ставали все більш сварливими та впертими.\n\nЗдається, одна з таких груп готувала змову, щоб відновити свої старі привілеї та повернути традиції та гідність до [target_location.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Використовуючи свої сільські володіння як базу, вони зібрали армію, щоб нав'язати нам свою волю."
  court_and_country.9.a: "Ми зустрінемо їх з мечем у руці."
  court_and_country.9.b: "Спробуймо задовольнити їхні вимоги."
  every_supporter_pop_loses_5_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що підтримують [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e], втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country.10.title: "Ліга [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] чинить опір"
  court_and_country.10.desc: "В останні роки міста та гільдії, що складаються з [target_rebel_pop.GetName], боролися під тягарем зростаючих податків та зобов'язань, підкоряючись, незважаючи на зростаюче невдоволення. Однак ситуація досягла критичної точки в [target_location.GetName], де провідні [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], об'єднавшись під місцевими лідерами, тепер відкрито кидають виклик [ROOT.GetCountry.GetGovernment.GetAdjective] мандату.\n\nОб'єднані потужними гільдіями та спільними скаргами, вони вимагають права стягувати власні податки, застосовувати власні закони та керувати з безпрецедентною автономією. Керуючись своєю справою, вони силою вигнали наших чиновників з провінції. З неспокоєм, що вирує по всій країні, ми стоїмо перед вирішальним вибором: або поступитися їхнім вимогам, або нав'язати свою волю для відновлення контролю."
  court_and_country.10.a: "Придушимо цих бунтівників!"
  court_and_country.10.b: "Ми можемо зробити деякі винятки."
  every_pop_in_location_loses_5_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_in_target_location_10_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country.11.title: "Нелояльні офіцери"
  court_and_country.11.desc: "У часи війни армія пропонує унікальні можливості для просування. Проте, у цей період внутрішніх чвар, ми повинні пам'ятати, що багато здібних воїнів все ще мають зв'язки з незадоволеними та нелояльними фракціями в межах [ROOT.GetCountry.GetFlavorRank].\n\nМіністри, близькі до [ROOT.GetCountry.GetGovernment.GetRulerTitle], тепер ставлять під сумнів лояльність наших збройних сил, закликаючи нас очистити всіх чоловіків, пов'язаних з групами та родинами, які протистоять нам."
  court_and_country.11.a: "Нам потрібні вірні воїни."
  court_and_country.11.b: "Це чистка, яку ми не можемо собі дозволити."
  court_and_country.12.title: "Прихильники [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  court_and_country.12.desc: "Не всі втрачають від нового порядку в межах [ROOT.GetCountry.GetFlavorRank]! Деякі тепер можуть зробити оплачувану кар'єру на військовій службі або як функціонер в одній з багатьох нових державних установ. Інші ж залишаються вірними [ROOT.GetCountry.GetGovernment.GetRulerTitle] через своє почуття честі та традиції. Хоча опір дедалі жорсткішому правлінню [target_location.GetName] [ROOT.GetCountry.GetGovernment.GetCourtTitle] є поширеним у нашій країні, ми нещодавно спостерігали сплеск прихильників."
  court_and_country.12.a: "Чудова нагода зміцнити наші лави!"
  court_and_country.12.b: "Їхня вірність буде винагороджена."
  court_and_country.12.c: "Здійснювати владу з повагою до старих інститутів."