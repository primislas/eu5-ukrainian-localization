l_english:
  savonarola.1.title: "POSTEDIT_Савонарола: Опис лиха"
  savonarola.1.desc: "\n\nНам надійшла пропозиція запросити цього проповідника, [GetCharacter('flo_savonarola').GetName], до [ROOT.GetCountry.GetCapital.GetName], стверджуючи, що ми могли б багато чого отримати від його присутності в місті. Принаймні, ми б точно виграли від впливу його слів на маси."
  savonarola.1.a: "Запросити його."
  savonarola.1.b: "Відіслати його."
  savonarola.2.title: "Савонарола проповідує"
  savonarola.2.desc: "Підживлений своїми переконаннями, [GetCharacter('flo_savonarola').GetName] непохитний у своїх проповідях. Його постійно можна побачити на головній площі, де він доносить своє послання. Чим довше він проповідує, тим більший натовп збирається навколо нього. Хоча не всі з них є його прихильниками, вплив його послання незаперечний.\n\nЗаохочений зростаючою підтримкою, його проповіді стають сміливішими. Завжди зосереджуючись на покаянні та реформах, його нападки на зловживання владою та розпусту правителів Європи та самої Церкви стають менш завуальованими."
  savonarola.2.a: "Дозволити йому проповідувати."
  savonarola.2.b: "Обмежити його."
  savonarola.3.title: "Формування П'яньйоні"
  savonarola.3.desc: "Зі зростаючим впливом [GetCharacter('flo_savonarola').GetName], його послідовники почали об'єднуватися в групи, які називаються П'яньйоні, що означає «плакальники» або «стогнальники». Ці групи слідують за ним, куди б він не йшов, уважно прислухаючись до кожного його слова та закарбовуючи його послання у своїх серцях.\n\nЗалишені напризволяще, ці П'яньйоні незабаром перетворяться на нестримну хвилю підтримки Савонароли."
  savonarola.3.a: "Залишити їх."
  savonarola.3.b: "Заборонити їх."
  savonarola.4.title: "Слава Савонароли зростає"
  savonarola.4.desc: "[GetCharacter('flo_savonarola').GetName] стає більшою фігурою, ніж спочатку передбачалося. Хоча він проповідує переважно в [ROOT.GetCountry.GetCapital.GetName], новини про його послання поширюються по всій нашій країні і навіть далі. Надійшли повідомлення, що вказують на зростаючу підтримку серед населення [target_location.GetName], де люди почали збиратися, щоб обговорити його послання, і навіть приїжджають до столиці, щоб почути його особисто.\n\nМи не можемо заперечувати силу його проповіді та вплив, який він здобуває серед населення, оскільки щодня все більше і більше людей висловлюють свою відкриту підтримку його посланню. Якщо це продовжиться, він може стати для нас занозою, яку буде надто важко видалити."
  savonarola.4.a: "Він нешкідливий."
  savonarola.4.b: "Він стає проблемою."
  savonarola.5.title: "Савонарола бере контроль"
  savonarola.5.desc: "Вплив [GetCharacter('flo_savonarola').GetName] більший, ніж будь-коли. Оскільки з кожним днем ​​все більше і більше людей збирається навколо нього, а ситуація в [ROOT.GetCountry.GetName] стає все більш жахливою, його нападки на Церкву та [ROOT.GetCountry.GetGovernment.GetRulerTitle] [target_character.GetName] стають все більш інтенсивними. Він називає себе «Реформатором Церкви», і люди закликають до вигнання [target_character.GetNameWithNoTooltip] та встановлення [GetCharacter('flo_savonarola').GetNameWithNoTooltip] як лідера [ROOT.GetCountry.GetNameWithNoTooltip] під керівництвом Бога.\n\nХоча наш здібний [ROOT.GetCountry.GetGovernment.GetRulerTitle] безсумнівно здатний вивести нашу країну з цього скрутного становища власними силами, незаперечно, що значна частина нашого населення вимагає змін."
  savonarola.5.a: "Дозволити йому взяти контроль."
  savonarola.5.b: "Його ідеологія хороша, але він не правитель."
  savonarola.5.c: "Ми з ним покінчили."
  savonarola.6.title: "Закони Савонароли"
  savonarola.6.desc: "З його нещодавнім встановленням як правителя [ROOT.GetCountry.GetLongName], [GetCharacter('flo_savonarola').GetName] починає втілювати в життя реформи, про які він проповідував. Будучи організованим зі своїми послідовниками в політичну партію, він тепер домінує в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] політиці, і його реформи проходять безперешкодно. Пропонуються нові закони, що засуджують пороки та надмірності. Будь-яке моральне порушення тепер буде вважатися незаконним, і будуть організовані вуличні патрулі, щоб переконатися, що місто вільне від будь-якої безсоромної поведінки чи одягу.\n\nВиконання цих реформ забезпечить, що наша нація буде улюбленицею Бога, але це спричинить величезні зміни у способі життя наших людей."
  savonarola.6.a: "Прийняти ці реформи."
  savonarola.6.b: "Це трохи екстремально."
  savonarola.7.title: "Савонаролу викликано до Риму"
  savonarola.7.desc: "[GetCharacter('flo_savonarola').GetName] справив великий вплив, проповідуючи народу [ROOT.GetCountry.GetLongName], і він запровадив багато змін у наше суспільство з того часу, як його обрали очолити його. Хоча спочатку Святий Престол був дещо збентежений його критикою Церкви, він залишався прихильним до його політики. Однак його постійні розбіжності з [GetCountry('PAP').GetGovernment.GetRulerTitle] у поєднанні з його дедалі більшою надмірною ревністю напружили їхні стосунки до тривожного ступеня.\n\nВін намагався запобігти подальшому розриву, надсилаючи листи до [GetCountry('PAP').GetGovernment.GetRulerTitle], але ці спроби зрештою виявилися безуспішними. [GetCountry('PAP').GetGovernment.GetRulerTitle] [GetCountry('PAP').GetGovernment.GetRuler.GetName] нарешті вирішив викликати його до Риму, щоб раз і назавжди покласти край цій суперечці."
  savonarola.7.a: "Підкоритися [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  savonarola.7.b: "Ігнорувати [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  savonarola.8.title: "Багаття марнославства Савонароли"
  savonarola.8.desc: "Багаття марнославства не є незвичайним явищем у Європі. Ревні священики постійно прагнуть засуджувати надмірності та пороки, і щоб довести свою точку зору, вони не бояться влаштувати якомога видовищніше шоу. Спалювання косметики, дзеркал, суконь та всього, що вважається здатним спокусити людей до гріха, є одним із найпомітніших способів засудження марнославства. Ці предмети постійно перебувають під загрозою стати жертвою очисного вогню віри.\n\n[GetCharacter('flo_savonarola').GetName] взяв на себе відповідальність влаштувати таке багаття, щоб позбавити добрих людей [ROOT.GetCountry.GetName] від гріха. Величезне багаття буде розпалено на головній площі [ROOT.GetCountry.GetCapital.GetName], і буде подано приклад для наслідування всім."
  savonarola.8.a: "Спалити їх усіх!"
  savonarola.8.b: "Це зайшло занадто далеко."
  savonarola.9.title: "Відлучення Савонароли"
  savonarola.9.desc: "Розбіжності між [GetCharacter('flo_savonarola').GetName] та [GetCountry('PAP').GetGovernment.GetRulerTitle] [GetCountry('PAP').GetGovernment.GetRuler.GetName] досягли точки неповернення. Зростаюча надмірна ревність Савонароли та його постійні напади на авторитет Церкви викликали занепокоєння Святого Престолу. Вимоги [GetCountry('PAP').GetGovernment.GetRulerTitle] неодноразово ігнорувалися, а звинувачення в єресі та заколоті накопичуються.\n\nЗрештою, [GetCountry('PAP').GetGovernment.GetRulerTitle] вирішив вжити крайніх заходів і відлучив його від церкви, погрожуючи кожному, хто може його прихистити."
  savonarola.9.a: "Це він помиляється!"
  savonarola.10.title: "Випробування вогнем"
  savonarola.10.desc: "Ревність [GetCharacter('flo_savonarola').GetName] досягла безпрецедентного рівня. Його звинувачення проти Церкви вийшли далеко за межі простих завуальованих нападів і перетворилися на відкрито висловлену наклеп. Його останні публікації також стали більш радикальними, намагаючись спростувати звинувачення в єресі в них. Він навіть почав робити заяви про свою здатність творити дива, що, безсумнівно, показало б, що його веде Бог, якби вони були правдою. Щоб довести ці нібито дива, йому було запропоновано пройти випробування вогнем, тест, під час якого він мав би пройти крізь палаючий вогонь. Якби він справді був здатний на дива і його вів Бог, вогонь не зміг би його спалити, і він пройшов би крізь нього неушкодженим.\n\nУ призначений для випробування день величезний натовп зібрався на головній площі, прагнучи побачити результат. Очікування та нервозність відчувалися в повітрі, і з плином часу, коли нічого не починалося, настрій натовпу дедалі більше псувався. Нарешті, все випробування довелося скасувати через раптовий дощ, і люди змушені були повернутися додому розгніваними, звинувачуючи Савонаролу в невдалому тесті."
  savonarola.10.a: "Він явно єретик, заарештувати та стратити його."
  savonarola.10.b: "Він не згорів, тож Бог явно на його боці."
  savonarola.11.title: "Спадщина Савонароли"
  savonarola.11.desc: "Смерть [GetCharacter('flo_savonarola').GetName] потрясла нашу країну так само, як і його життя. Незалежно від того, погоджувалися вони з його проповідями чи ні, безперечно, що він залишив слід у всіх людей [ROOT.GetCountry.GetLongName]. Його смерть знаменує кінець усього збудження, яке він викликав, і хоча багато його послідовників все ще поширюють те саме послання, вони не представляють тієї ж сили змін, якою був він.\n\n[ROOT.GetCountry.GetFlavorRank] витримав землетрус, яким був [GetCharacter('flo_savonarola').GetNameWithNoTooltip], і вийшов з нього сильнішим, ніж був."
  savonarola.11.theocracy.desc: "[GetCharacter('flo_savonarola').GetName] повністю потряс нашу країну. Його Богом керований шлях приніс благословення Всевишнього, щоб засяяти над нашою славною країною. Ми підемо за ним, щоб зробити [ROOT.GetCountry.GetLongName] Богом обраним.\n\nПід Його керівництвом славна нація [ROOT.GetCountry.GetNameWithNoTooltip] стане світлом Небес на Землі, маяком спасіння для всіх душ і прикладом для них."
  savonarola.11.a: "Відновимо порядок [ROOT.GetCountry.GetFlavorRank]."
  savonarola.11.b: "Ми підемо його божественним шляхом."
  savonarola.12.title: "Медічі завдають удару у відповідь"
  savonarola.12.desc: "Після страти [GetCharacter('flo_savonarola').GetName], [GetCharacter('flo_piero_soderini').GetName] був призначений керувати [ROOT.GetCountry.GetLongName] для відновлення порядку. Хоча його правління досі було досить успішним, воно не було позбавлене перешкод, і серед населення є деякі люди, які не задоволені тим, що він керує. Однією з таких груп людей є родина [ShowDynastyName('medici_dynasty')]. Раніше одна з найвпливовіших родин, що керувала урядом [ROOT.GetCountry.GetNameWithNoTooltip], вони побачили себе витісненими, коли Савонарола взяв контроль.\n\nТепер, коли порядок відновлено під керівництвом [GetCharacter('flo_piero_soderini').GetNameWithNoTooltip], вони бачать свій шанс повернути контроль над урядом [ROOT.GetCountry.GetFlavorRank]. Вони мають достатню підтримку, щоб це сталося і було прийнято без особливих скарг з боку населення."
  savonarola.12.a: "Повернути їх."
  savonarola.12.b: "Це нормально."
  savonarola.13.title: "Савонарола повертається"
  savonarola.13.desc: "Ми думали, що позбулися [GetCharacter('flo_savonarola').GetName], вигнавши його з [ROOT.GetCountry.GetName], але, схоже, його проповіді ще не закінчилися. Не задоволений тим ажіотажем, який він вже викликав, він вирішив повернутися і продовжити поширювати свою доктрину в нашій країні. Його знову бачили посеред [ROOT.GetCountry.GetCapital.GetName] в оточенні величезного натовпу, який слухав кожне його слово."
  savonarola.13.a: "Набридлива особа."