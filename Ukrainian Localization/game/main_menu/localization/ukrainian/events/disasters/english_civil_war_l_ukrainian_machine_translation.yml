l_english:
  english_civil_war.250.title: "[target_character.GetNameWithNoTooltip]"
  english_civil_war.250.desc: "Недавні зміни у владі в [ROOT.GetCountry.GetLongName] вивели на передній план багатьох нових людей, готових взяти на себе відповідальність і керувати своїми маєтками. Одним із таких людей є [target_character.GetName], чий вплив і слово у питаннях юрисдикції в [target_location.GetName] нещодавно зросли.\n\nОзброєні амбіціями та силою, що походить від [target_character.GetHerHis] віри, [target_character.GetSheHe] та [target_character.GetHerHis] однодумці, безсумнівно, формуватимуть майбутнє нашого народу, на краще чи на гірше."
  english_civil_war.250.a: "Цікаво."
  more_likely_to_fire_disaster_tt: "[Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] «[ShowDisasterName('english_civil_war')]» буде #R більш імовірним#!. Якщо воно спалахне, поки [target_character.GetName] живий, [target_character.GetSheHe] очолить його"
  english_civil_war.250.historical_info: "Олівер Кромвель був ключовою фігурою Англійської громадянської війни та подальшого республіканського періоду. Будучи відданим пуританином, він привів парламентські сили до вирішальних перемог, що завершилося стратою короля Карла I та формуванням Співдружності. Як лорд-протектор, Кромвель правив з авторитетом, просуваючи пуританські цінності та консолідуючи контроль над Англією, Шотландією та Ірландією. Його військові кампанії, особливо в Ірландії, відомі своєю жорстокістю та тривалим впливом."
  english_civil_war.251.title: "Повстання [english_civil_war_rebels_scope.GetNameWithNoTooltip]"
  english_civil_war.251.desc: "Напруга між [target_character_1.GetName] та [english_civil_war_rebels_scope.GetName] досягла критичної точки. Невдоволення центральною владою, оподаткуванням та релігійною політикою згуртувало фракції в [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle], що призвело до відкритого повстання.\n\nПарламентські повстанці, на підтримку [target_character_2.GetName], взялися за зброю проти [ROOT.GetCountry.GetGovernment.GetAdjective] статус-кво, вимагаючи більшого впливу та обмеження державних прерогатив. Їхня справа здобула значну підтримку серед впливових [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та невдоволених мас. Майбутнє [ROOT.GetCountry.GetName] тепер висить на волосині, оскільки нація занурюється у вир громадянської війни."
  english_civil_war.251.a: "Повстанське сміття!"
  provinces_will_align_with_rebels_tt: "Кілька [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] в [ROOT.GetCountry.GetCapital.GetRegion.GetName] змінять свою вірність на користь [english_civil_war_rebels_scope.GetName]"
  english_civil_war.251.historical_info: "Англійська громадянська війна (1642-1651) виникла через конфлікти між королем Карлом I та парламентом щодо королівської влади, оподаткування та релігійних реформ. Автократичне правління Карла, ігнорування процедур та нав'язування непопулярної політики викликали широке невдоволення.\n\nВійна зіштовхнула роялістів (прихильників монархії) з парламентаріями, які виступали за конституційне правління. Вона призвела до страти Карла I, скасування монархії та встановлення Співдружності під керівництвом Олівера Кромвеля. Зрештою, конфлікт змінив англійську політичну структуру, послабивши владу монархії та заклавши основи сучасної парламентської демократії, хоча напруга зберігалася до відновлення монархії в 1660 році."
  english_civil_war.252.title: "Парламентарії тріумфують у [ShowDisasterNameWithNoTooltip('english_civil_war')]"
  english_civil_war.252.desc: "Після років запеклого конфлікту сили [target_character.GetName] здобули перемогу, розгромивши роялістські армії та поклавши край [ShowDisasterNameWithNoTooltip('english_civil_war')]. Тріумф парламентаріїв знаменує монументальний зсув у балансі сил у [ROOT.GetCountry.GetFlavorRank].\n\nСтарий статус-кво було розтрощено, і встановлюються нові принципи управління, зосереджені на парламентському правлінні та волі народу, під сильним керівництвом [target_character.GetShortNameWithNoTooltip], звісно. [ROOT.GetCountry.GetFlavorRank] тепер стикається з викликом відбудови та переосмислення своєї ідентичності за цього нового порядку, оскільки відлуння революції формують майбутнє [ROOT.GetCountry.GetName]."
  english_civil_war.252.a: "Який поворот подій!"
  english_civil_war.253.title: "Роялісти тріумфують у [ShowDisasterNameWithNoTooltip('english_civil_war')]"
  english_civil_war.253.desc: "Зіткнення між [ROOT.GetCountry.GetFlavorRank] та парламентаріями закінчилося рішучою перемогою сил [target_character.GetName]. Сили, вірні [ROOT.GetCountry.GetGovernment.GetAdjective], розгромили повстанське сміття, відновивши владу [target_character.GetShortNameWithNoTooltip] над [ROOT.GetCountry.GetFlavorRank].\n\nЗ поразкою повстанців наша позиція підтверджена, а ідеали парламентського правління придушені. Тепер ми повинні залікувати рани громадянської війни, оскільки наші сили консолідують контроль і прагнуть забезпечити, щоб такі виклики нашій владі ніколи більше не виникали."
  english_civil_war.253.a: "Хай живе [target_character.GetNameWithNoTooltip]!"
  english_civil_war.254.title: "Вибух [ShowDisasterNameWithNoTooltip('english_civil_war')]"
  english_civil_war.254.desc: "Розчаровані [ROOT.GetCountry.GetGovernment.GetAdjective] надмірним втручанням і сповнені рішучості відстояти свою владу, парламентські фракції офіційно оголосили війну [target_character.GetName] та статус-кво. Їхні армії мобілізовані, марширують під прапорами, що проголошують зарозумілість та представницьке правління.\n\nБитви незабаром розгоряться по всьому [ROOT.GetCountry.GetFlavorRank], оскільки парламентські сили зіткнуться з роялістськими військами, кожна сторона прагне сформувати майбутнє [ROOT.GetCountry.GetName]. Нація охоплена заворушеннями, і результат цієї боротьби вирішить, чи збереже [target_character.GetShortNameWithNoTooltip] [target_character.GetHerHis] абсолютну владу, чи переможе бачення повстанців щодо управління."
  english_civil_war.254.a: "Стати на бік парламентаріїв!"
  english_civil_war.254.b: "Роялісти переможуть."
  english_civil_war.255.title: "Провінція приєднується до парламентаріїв"
  english_civil_war.255.desc: "Вітри війни змінилися в [target_province.GetName]. Розчаровані королівською політикою та жорстким правлінням, місцеві лідери та впливові родини відкрито заявили про свою підтримку парламентської справи. Були зібрані ополчення, укріплені фортифікації, і прапори [ROOT.GetCountry.GetGovernment.GetParliament.GetName] тепер майорять над ратушами та замками. Цей стратегічний регіон, багатий на ресурси та робочу силу, став критично важливим оплотом для повстанців. Корона повинна діяти швидко, щоб придушити цей опір, або ризикує втратити більше території зростаючому повстанню."
  english_civil_war.255.a: "Прокляті зрадники!"
  every_location_loses_scaling_sat_and_joins_rebel_tt: "Невдоволені [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і стануть на бік [Concept('english_civil_war_rebels_scope.GetName], якщо спалахне [civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  continue_playing_as_root_tt: "Ми вирушимо у [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] як [ROOT.GetCountry.GetLongName]"
  english_civil_war.256.title: "[ShowParliamentIssueTypeNameWithNoTooltip('new_model_army_pi')]"
  english_civil_war.256.desc: "Пропозиція щодо підвищення якості армії незабаром буде обговорюватися в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Традиційно військове командування довірялося членам [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], багато з яких мають невеликий військовий досвід. [ShowParliamentIssueTypeName('new_model_army_pi')] прагне виправити це, заборонивши недосвідченим членам [ROOT.GetCountry.GetGovernment.GetParliament.GetName] обіймати командні посади в армії чи на флоті протягом громадянської війни. Замість цього збройні сили будуть реструктуровані в Армію нового зразка, яку очолить досвідчений і здібний [target_character_2.GetName]."
  english_civil_war.256.a: "Слухайте, слухайте!"
  english_civil_war.256.b: "Можливо, не зараз."
  pi_will_be_available_for_10_years_tt: "[Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e] [ShowParliamentIssueTypeNameWithNoTooltip('new_model_army_pi')] буде доступний протягом наступних #Y 10#! років"
  target_character_2_goes_away_tt: "[target_character_2.GetShortNameWithNoTooltip] зникне"
  english_civil_war.257.title: "Повстання піднімається"
  english_civil_war.257.desc: "У вирі [ShowDisasterName('english_civil_war')] [target_area.GetName] загрожує приєднатися до [english_civil_war_rebels_scope.GetName]. Розчарування [ROOT.GetCountry.GetGovernment.GetAdjective] правлінням переросло в кипіння, що призвело до того, що населення згуртувалося за справу повстанців. Міщани та місцеві ополченці захопили ключові опорні пункти, вимагаючи вищої платні та меншого центрального контролю. Контроль над територією висить на волосині, і полум'я незгоди загрожує поширитися далі."
  english_civil_war.257.a: "Нехай повстають."
  english_civil_war.257.b: "Розподіліть їм кошти."
  pops_in_target_area_lose_90_sat_and_join_parliamentarists_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та підтримають справу [english_civil_war_rebels_scope.GetNameWithNoTooltip]"
  target_area_suffers_33_control_penalty_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetNameWithNoTooltip] втратять [ShowNamedValue('control_extreme_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  english_civil_war.258.title: "Наші піддані та [ShowDisasterNameWithNoTooltip('english_civil_war')]"
  english_civil_war.258.desc: "У вирі хаосу криється можливість для багатьох наших підданих, які колись схиляли коліна, повстати та поглинути нашу спадщину. Поки [ShowDisasterName('english_civil_war')] лютує, напруга між нами та [target_subject.GetLongName] зростає. Їхні лідери залишаються ледь лояльними на поверхні, але все більше розчаровані вимогами [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] щодо додаткових податків для фінансування майбутнього зіткнення проти [english_civil_war_rebels_scope.GetName].\n\nДеякі радники закликають [target_character_1.GetName] стягнути додаткові збори для підтримки армії, тоді як інші попереджають, що надмірний тиск може штовхнути нашого підданого в обійми [english_civil_war_rebels_scope.GetNameWithNoTooltip]. Ми повинні вирішити: або зміцнити військову скарбницю, або полегшити тягар, щоб зберегти лояльність."
  english_civil_war.258.a: "Ми не можемо ризикувати напружувати наші стосунки."
  english_civil_war.258.b: "Продовжуйте стягувати з них вищі податки."
  target_subject_will_appreciate_this_tt: "[target_subject.GetLongNameWithNoTooltip] оцінить цей жест"
  english_civil_war.259.title: "Добрі стосунки серед [ShowDisasterNameWithNoTooltip('english_civil_war')]"
  english_civil_war.259.desc: "Народ [target_overlord.GetName] нині переживає потрясіння, спричинені [ShowDisasterName('english_civil_war')]. Щоб протидіяти розривам у наших стосунках, [target_character_1.GetName] прагне забезпечити нашу постійну лояльність. Визнаючи тягар важкого оподаткування та зростаючі заворушення в регіоні, [target_overlord.GetAdjective] [target_overlord.GetGovernment.GetCourtTitle] вирішив послабити податкові вимоги та надіслати щедрий подарунок нашому [ROOT.GetCountry.GetFlavorRank]. Цей акт доброї волі має на меті зміцнити нашу вірність та забезпечити нашу непохитну підтримку їхньої справи в ці неспокійні часи."
  english_civil_war.259.a: "Шахівниця в повному русі."
  english_civil_war.260.title: "Тиск дипломатії"
  english_civil_war.260.desc: "Поки [ShowDisasterName('english_civil_war')] лютує в [target_overlord.GetLongName], їхнє вже й так важке оподаткування продовжує руйнувати наші фінанси. Незважаючи на те, що деякі з їхніх радників рекомендували послабити податковий тягар для нашого [ROOT.GetCountry.GetFlavorRank], вони вирішили продовжувати політику статус-кво.\n\nНа жаль, наші благання були зустрінуті з презирством. [target_character_1.GetName] не тільки відмовився зменшити податки, але й завдав образливої ​​образи, відкинувши наші занепокоєння як нелояльне бурчання. Цей акт зарозумілості поглибив обурення, і наша лояльність тепер висить на волосині."
  english_civil_war.260.a: "Це не закінчиться для них добре!"
  english_civil_war.261.title: "Повстанці набирають впливу"
  english_civil_war.261.desc: "Недавні повстання та відчутне почуття нестабільності призвели до поширення паніки. Серед цієї паніки [english_civil_war_rebels_scope.GetName] поповнили свої лави новими рекрутами, які прагнуть підняти зброю проти нас і статус-кво!"
  english_civil_war.261.a: "Будь прокляті ці повстанці!"