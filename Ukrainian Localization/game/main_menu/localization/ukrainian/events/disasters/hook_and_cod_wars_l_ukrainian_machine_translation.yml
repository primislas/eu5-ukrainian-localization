  good_add_2_points_to_hook_tt: "Фракція #Y Гаків#! отримує #G +2#! бали до свого показника впливу $GetHookFactionInfluence$"
  good_add_1_points_to_cod_tt: "Фракція #Y Трісок#! отримує #G +1#! бал до свого показника впливу $GetCodFactionInfluence$"
  good_add_2_points_to_cod_tt: "Фракція #Y Трісок#! отримує #G +2#! бали до свого показника впливу $GetCodFactionInfluence$"
  bad_add_1_points_to_hook_tt: "Фракція #Y Гаків#! отримує #R +1#! бал до свого показника впливу $GetHookFactionInfluence$"
  bad_add_2_points_to_hook_tt: "Фракція #Y Гаків#! отримує #R +2#! бали до свого показника впливу $GetHookFactionInfluence$"
  bad_add_1_points_to_cod_tt: "Фракція #Y Трісок#! отримує #R +1#! бал до свого показника впливу $GetCodFactionInfluence$"
  bad_add_2_points_to_cod_tt: "Фракція #Y Трісок#! отримує #R +2#! бали до свого показника впливу $GetCodFactionInfluence$"
  hacw_allegience_to_hook_tt: "[THIS.GetCharacter.GetName] приєднується до фракції #Y Гаків#!"
  hacw_allegience_to_cod_tt: "[THIS.GetCharacter.GetName] приєднується до фракції #Y Трісок#!"
  hacw_hook_faction: "Фракція Гаків"
  hacw_cod_faction: "Фракція Трісок"
  hacw_our_faction: "наша фракція"
  hacw_enemy_faction: "ворожа фракція"
  hacw_hook_faction_short: "Гак"
  hacw_cod_faction_short: "Тріска"
  hacw_hook_faction_disaster: "#t Фракція Гаків#!"
  hacw_cod_faction_disaster: "#t Фракція Трісок#!"
  hacw_current_score_hook: "Поточний рахунок: [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_hook_faction_power').GetValue]/20"
  hacw_current_score_cod: "Поточний рахунок: [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_cod_faction_power').GetValue]/20"
  hacw_remove_country_from_hook_faction_tt: "[THIS.GetCountry.GetName] видаляється з #Y $hacw_hook_faction$#!"
  hacw_remove_country_from_cod_faction_tt: "[THIS.GetCountry.GetName] видаляється з фракції #Y $hacw_cod_faction$#!"
  hook_and_cod_wars.1.title: "Анархія в [target_location.GetNameWithNoTooltip]"
  hook_and_cod_wars.1.title.fallback: "Анархія в місцевості"
  hook_and_cod_wars.1.desc: "Поки [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] бореться за свого обраного претендента, сільське поселення [target_location.GetName] занурилося в повну анархію."
  hook_and_cod_wars.1.desc.hook: "$hook_and_cod_wars.1.desc$ Це дає нам чудову нагоду вдарити по [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] у їхньому найвразливішому місці, згуртувавши [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] під нашим прапором і надавши їм додаткову владу на деякий час."
  hook_and_cod_wars.1.desc.cod: "$hook_and_cod_wars.1.desc$ [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] відмовляються платити данину нашій стороні, зменшуючи ресурси, які [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] мають для перемоги у війнах. Затвердження нашої влади вирішило б проблему, але гарантовані заворушення селян можуть стати для нас загрозою..."
  hook_and_cod_wars.1.a: "Надати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] більше автономії."
  hook_and_cod_wars.1.b: "Затвердити нашу владу."
  hook_and_cod_wars.2.title: "Непокора [target_location.GetNameWithNoTooltip]"
  hook_and_cod_wars.2.title.fallback: "Непокора міста"
  hook_and_cod_wars.2.desc: "Міста [ROOT.GetCountry.GetName] бачать, як наша поточна ситуація вислизає з-під контролю будь-якої зі сторін. Зокрема, [target_location.GetRank.GetName] [target_location.GetName] виявив непокору."
  hook_and_cod_wars.2.desc.hook: "$hook_and_cod_wars.2.desc$ Ця непокора підриває зусилля #Y Трісок#!. Виплативши [target_location.GetRank.GetNameWithNoTooltip], ми, можливо, зможемо схилити його на свій бік."
  hook_and_cod_wars.2.desc.cod: "$hook_and_cod_wars.2.desc$ Хоча це підриває легітимність нинішньої держави, ця відмова платити податки #Y Гакам#! стає нам у пригоді. Надавши [target_location.GetRank.GetNameWithNoTooltip] додаткову автономію, ми можемо розширити нашу перевагу над ворогами."
  hook_and_cod_wars.2.a: "Виплатити [target_location.GetRank.GetNameWithNoTooltip]."
  hook_and_cod_wars.2.a.fallback: "Виплатити місту."
  hook_and_cod_wars.2.b: "Надати [target_location.GetRank.GetNameWithNoTooltip] більше автономії."
  hook_and_cod_wars.2.b.fallback: "Надати місту більше автономії."
  hook_and_cod_wars.3.title: "$hacw_nobility_rebellion$"
  hook_and_cod_wars.3.desc: "#Y Тріски#! зібрали повстанські сили, щоб боротися з #Y Гаками#!. Багато членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] бачать для себе можливість вимагати більше привілеїв від Гаків, або зустрітися з ними на полі бою."
  hook_and_cod_wars.3.a: "Надати їм деякі привілеї..."
  hook_and_cod_wars.3.b: "Не давати їм пощади!"
  hook_and_cod_wars.3.c: "Вітати підкріплення для нашої справи."
  hacw_nobility_rebellion: "Повстання знаті"
  hook_and_cod_wars.4.title: "$hacw_burghers_rebellion$"
  hook_and_cod_wars.4.desc: "#Y Гаки#! зібрали повстанські сили, щоб боротися з #Y Трісками#!. Багато членів [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] бачать для себе можливість вимагати більше привілеїв від Трісок, або зустрітися з ними на полі бою."
  hook_and_cod_wars.4.a: "Надати їм деякі привілеї..."
  hook_and_cod_wars.4.b: "Не давати їм пощади!"
  hook_and_cod_wars.4.c: "Вітаємо підкріплення до нашої справи."
  hacw_burghers_rebellion: "Повстання міщан"
  hook_and_cod_wars.1000.title: "Спадкування [holland.GetNameWithNoTooltip]"
  hook_and_cod_wars.1000.desc: "Зі смертю нашого попереднього правителя, [holland_previous_ruler.GetName], спадкування [holland.GetName] висить на волосині, оскільки не визначено чіткого, беззаперечного наступника. [hacw_contender_1.GetName] є першим законним претендентом на трон за законом, проте [hacw_contender_1.GetHisHer] претензія оскаржується [hacw_contender_2.GetName]. [holland.GetNameWithNoTooltip] стоїть на порозі кривавого конфлікту, якщо суперечка [hollands_dynasty.GetName] не буде вирішена найближчим часом..."
  hook_and_cod_wars.1000.historical_info: "Відсутність сина у Вільгельма IV призвела до суперечки про спадкування, і імператор Людвіг Баварський зрештою передав феоди своїй дружині, Маргариті II, графині Ено, що викликало напругу серед різних претендентів. Спроби Маргарити консолідувати владу зіткнулися з викликами, включаючи повстання, фінансові труднощі та конфлікти з єпископом Утрехтським. Вбивство видатного лорда розпалило відкриті бойові дії між фракціями, що призвело до подальшої нестабільності та змов. Зусилля Маргарити відновити порядок шляхом переговорів та союзів, зокрема з Едуардом III Англійським, ознаменували період політичного маневрування та невизначеності в Голландії, Зеландії та Фрісландії."
  hook_and_cod_wars.1000.a: "Будемо сподіватися на краще..."
  hook_and_cod_wars.1001.title: "Претензія [hollands_dynasty.GetNameWithNoTooltip]"
  hook_and_cod_wars.1001.desc: "[holland_previous_ruler.GetName], попередній правитель [holland.GetName], помер і не залишив чіткого наступника державі. Таким чином, члени [hollands_dynasty.GetName] усі претендують на [holland.GetAdjectiveWithNoTooltip] трон. Одним із тих, хто має право успадкувати ці землі, є [hacw_claimant.GetName]. За нашої підтримки ми можемо допомогти [hacw_claimant.GetHimHer] перемогти будь-якого іншого претендента та захопити трон [holland.GetNameWithNoTooltip] від нашого імені."
  hook_and_cod_wars.1001.a: "Ми будемо правити [holland.GetNameWithNoTooltip] або побачимо його перетвореним на попіл."
  hook_and_cod_wars.1001.b: "Ми нічого не отримаємо від втручання у [holland.GetAdjectiveWithNoTooltip] справи."
  hook_and_cod_wars.1001.c: "Ми підтримаємо претензії нашого спадкоємця."
  hook_and_cod_wars.1001.d: "Це не стосується жодних [ROOT.GetCountry.GetAdjectiveWithNoTooltip] справ."
  hook_and_cod_wars.1001.e: "[hacw_claimant.GetShortNameWithNoTooltip] має підтримку [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ROOT.GetCountry.GetFlavorRank]."
  hook_and_cod_wars.1001.f: "[hacw_claimant.GetShortNameWithNoTooltip] потрібен у нашому дворі."
  hook_and_cod_wars.1002.title: "Претенденти на Голландію"
  hook_and_cod_wars.1002.desc.domestic: "$hook_and_cod_wars.1002.desc$ [hacw_domestic_claimant.GetNameWithNoTooltip] вже заявив про спадкування [holland.GetNameWithNoTooltip], проте [hacw_domestic_claimant.GetHisHer] право оскаржується [hacw_foreign_claimant.GetShortNameWithNoTooltip], який подорожував аж із [hacw_foreign_country_origin.GetName]. $hook_and_cod_wars.1002.desc.end$"
  hook_and_cod_wars.1002.desc.foreign: "$hook_and_cod_wars.1002.desc$ Хоча [hacw_contender_1.GetShortNameWithNoTooltip] походить з [hacw_contender_1_origin_country.GetName], [hacw_contender_2.GetShortNameWithNoTooltip] називає [hacw_contender_2_origin_country.GetName] своїм домом. Проте обидва подорожували до [holland.GetNameWithNoTooltip] в надії виграти [holland.GetFlavorRank] для себе. $hook_and_cod_wars.1002.desc.end$"
  hook_and_cod_wars.1002.desc: "Невизначеність панує в [holland.GetName], оскільки два претенденти на [holland.GetAdjectiveWithNoTooltip] трон прийшли до влади: [hacw_contender_1.GetName] та [hacw_contender_2.GetName]."
  hook_and_cod_wars.1002.desc.end: "Тепер обидва збирають прихильників своєї справи і загрожують розпочати період кровопролиття в [holland.GetNameWithNoTooltip]..."
  hook_and_cod_wars.1002.a: "Це справді жахливі новини..."
  hook_and_cod_wars.1003.title: "Спадкування [holland.GetNameWithNoTooltip]"
  hook_and_cod_wars.1003.desc: "Після періоду невизначеності та тривоги при дворі питання спадкування [holland.GetName] нарешті було вирішено. Хоча два претенденти, [hacw_contender_1.GetName] та [hacw_contender_2.GetName], мали можливість претендувати на трон для себе, зрештою правитиме лише [holland_new_ruler.GetShortNameWithNoTooltip]."
  hook_and_cod_wars.1003.a: "Кризу відвернуто."
  hook_and_cod_wars.1004.title: "Невпевнене успадкування"
  hook_and_cod_wars.1004.desc: "З невідомих і незбагненних для нас причин жоден компетентний член [hollands_dynasty.GetName] чи його нащадків не висунув претензій на [holland.GetAdjective] трон. Успадкування залишається оповитим невизначеністю..."
  hook_and_cod_wars.1004.a: "Сподіваємося, це не спричинить іншої кризи..."
  hook_and_cod_wars.1004.a.tt: "[ShowDisasterName('succession_crisis')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] тепер може спрацювати замість [ShowDisasterName('hook_and_cod_wars')]"
  hol_trigger_sc_instead_of_hacw_tt: "Чи замінено [ShowDisasterName('hook_and_cod_wars')] на [ShowDisasterName('succession_crisis')]"
  hook_and_cod_wars.1005.title: "Претенденти на [holland.GetNameWithNoTooltip]"
  hook_and_cod_wars.1005.desc: "Новини від двох наступників досягли [holland.GetName]: ні [hacw_contender_1.GetName], ні [hacw_contender_2.GetName] не мають наміру відмовлятися від своїх претензій на [holland.GetAdjectiveWithNoTooltip] трон. На цьому етапі конфлікт між ними неминучий..."
  hook_and_cod_wars.1005.a: "На нас чекають темні часи..."
  hook_and_cod_wars.1006.title: "Претенденти [hollands_dynasty.GetNameWithNoTooltip]"
  hook_and_cod_wars.1006.desc: "Зі смертю [holland_previous_ruler.GetName], попереднього правителя [holland.GetName], [holland.GetFlavorRank] бракує законного наступника. Жоден член [hollands_dynasty.GetName] там не присутній, і, схоже, ситуація не вирішиться найближчим часом.\n\nНа щастя для нас, двоє найкомпетентніших членів династії перебувають при нашому дворі: [hacw_contender_1.GetName] та [hacw_contender_2.GetName]. Ми можемо відправити будь-кого з них до [holland.GetNameWithNoTooltip], щоб збільшити наш вплив у межах [holland.GetAdjectiveWithNoTooltip] кордонів."
  hook_and_cod_wars.1006.a: "Відправити [hacw_contender_1.GetShortNameWithNoTooltip]."
  hook_and_cod_wars.1006.b: "Відправити [hacw_contender_2.GetShortNameWithNoTooltip]."
  hook_and_cod_wars.1006.c: "Ми не можемо дозволити собі втратити жодного з них."
  hook_and_cod_wars.1007.title: "Новий правитель [holland.GetNameWithNoTooltip]"
  hook_and_cod_wars.1007.desc: "Через відсутність належного спадкоємця, успадкування [holland.GetAdjective] трону було в кращому випадку неоднозначним, а в гіршому — серйозним ризиком для стабільності країни. На щастя, [holland_new_ruler.GetName] з [from_country.GetName] заявив(ла) про свої права на корону для [holland_new_ruler.GetHerselfHimself]. Хоча [holland_new_ruler.GetName] не є дитиною [holland.GetName], [holland_new_ruler.GetHisHer] правління принаймні забезпечує стабільність для держави."
  hook_and_cod_wars.1007: "Хай живе [holland_new_ruler.GetShortNameWithNoTooltip]!"
  hook_and_cod_wars.1008.title: "Криза успадкування [holland.GetNameWithNoTooltip]"
  hook_and_cod_wars.1008.desc: "Два могутні претенденти прийшли до влади в [holland.GetName]: [hacw_contender_1.GetName] та [hacw_contender_2.GetName]. Кожен з них тепер збирає союзників та прихильників як з [holland.GetGovernment.GetEstateName('burghers_estate')], так і з [holland.GetGovernment.GetEstateName('nobles_estate')], і готується до загальнодержавного конфлікту."
  hook_and_cod_wars.1008.a: "Готуйтеся до кризи..."
  hook_and_cod_wars.1100.title: "[ShowDisasterNameWithNoTooltip('hook_and_cod_wars')]"
  hook_and_cod_wars.1100.desc.completely_international: "Втручання іноземних країн у [holland.GetName] досягло свого абсолютного піку. [hacw_contender_1.GetName] та [hacw_contender_2.GetName], жоден з яких не є резидентом [holland.GetNameWithNoTooltip], вирішили нашу долю: кривавий конфлікт за [holland.GetAdjectiveWithNoTooltip] трон.\n\n$hook_and_cod_wars.1100.desc$"
  hook_and_cod_wars.1100.desc.semi_international: "Успадкування [own_pretender.GetName] на трон є законним і відповідає всім [holland.GetAdjective] законам. Однак воно не є безспірним, оскільки амбітний претендент, [foreign_pretender.GetName], розпочав кампанію в [holland.GetNameWithNoTooltip] за [semi_foreign_country_scope.GetAdjective] підтримки, щоб заявити про свої права на трон для [foreign_pretender.GetHerselfHimself].\n\n$hook_and_cod_wars.1100.desc$"
  hook_and_cod_wars.1100.desc.completely_internal: "Незважаючи на всі зусилля мирно вирішити питання успадкування, зрештою, такого рішення знайти не вдалося. [hacw_contender_1.GetName] та [hacw_contender_2.GetName], обидва горді громадяни [holland.GetName], сповнені рішучості боротися за [holland.GetAdjectiveWithNoTooltip] трон — навіть якщо це означає пролиття крові на [holland.GetAdjectiveWithNoTooltip] землі.\n\n$hook_and_cod_wars.1100.desc$"
  hook_and_cod_wars.1100.desc: "У розпал кризи королівського успадкування самі стани ведуть конфлікт один проти одного, щоб розширити свій вплив та привілеї. Крім того, два претенденти знайшли зовнішніх та внутрішніх прихильників своєї справи. [hacw_contender_2.GetShortNameWithNoTooltip] здобув популярність [holland.GetGovernment.GetEstateName('burghers_estate')], а також лояльність міст, і заснував фракцію #Y Тріска#!.\n\nЗ іншого боку, [hacw_contender_1.GetShortNameWithNoTooltip] вдалося завоювати лояльність [holland.GetGovernment.GetEstateName('nobles_estate')], які бачать [hacw_contender_1.GetHimHer] як законного наступника трону. Ця група дворян заснувала фракцію #Y Гачок#!, щоб захистити свою позицію від Тріски."
  hook_and_cod_wars.1100.a: "Стати на бік Гачків"
  hook_and_cod_wars.1100.b: "Стати на бік Трісок"
  hook_and_cod_wars.1100.hook.tt: "Ми станемо на бік #Y Гаків#!, віддаючи їм перевагу над іншою фракцією. $hook_and_cod_wars_bonus_tooltip$"
  hook_and_cod_wars.1100.cod.tt: "Ми станемо на бік #Y Трісок#!, віддаючи їм перевагу над іншою фракцією. $hook_and_cod_wars_bonus_tooltip$"
  hook_and_cod_wars_bonus_tooltip: "Ми отримаємо додаткові бонуси, якщо наша улюблена фракція переможе в загальному конфлікті, водночас отримаємо додаткові штрафи у випадку перемоги ворожої фракції."
  hook_and_cod_wars.1100.gain_burghers_loyalty: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e], яке є або [Concept('town_or_city', 'CONCEPT_PLACEHOLDER')|e] і має щонайменше #Y 20.0%#! свого населення як [ShowPopTypeName('burghers')], отримує [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як до #Y 4#! [Concept('location', 'CONCEPT_PLACEHOLDER')|e], які не є ні містом, ні містечком і мають менше ніж #Y 20.0%#! свого населення як [ShowPopTypeName('burghers')], втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднуються до [hacw_cod_faction.GetName] [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e]"
  hook_and_cod_wars.1100.gain_nobles_loyalty: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e], яке не є [Concept('town_or_city', 'CONCEPT_PLACEHOLDER')|e] і має менше ніж #Y 20.0%#! свого населення як [ShowPopTypeName('burghers')], отримує [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як до #Y 4#! [Concept('location', 'CONCEPT_PLACEHOLDER')|e], які є або містом, або містечком і мають щонайменше #Y 20.0%#! свого населення як [ShowPopTypeName('burghers')], втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і приєднуються до [hacw_hook_faction.GetName] [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e]"
  hook_and_cod_wars.1101.title: "[ShowDisasterNameWithNoTooltip('hook_and_cod_wars')] у [holland.GetNameWithNoTooltip]"
  hook_and_cod_wars.1101.desc.hook: "$hook_and_cod_wars.1101.desc$ Чи то завдяки харизмі, чи то завдяки удачі, [our_claimant_character.GetName] здобув(ла) прихильність фракції Гаків. Подальша підтримка їх могла б збільшити шанси [our_claimant_character.GetShortNameWithNoTooltip] на здобуття [holland.GetAdjectiveWithNoTooltip] корони."
  hook_and_cod_wars.1101.desc.cod: "$hook_and_cod_wars.1101.desc$ Чи то завдяки харизмі, чи то завдяки удачі, [our_claimant_character.GetName] здобув(ла) прихильність фракції Трісок. Подальша підтримка їх могла б збільшити шанси [our_claimant_character.GetShortNameWithNoTooltip] на здобуття [holland.GetAdjectiveWithNoTooltip] корони."
  hook_and_cod_wars.1101.desc: "Конфлікт за [holland.GetAdjective] престол став кривавим, оскільки дві фракції здобули владу для підтримки своїх претендентів. #Y Тріски#! представляють [holland.GetGovernment.GetEstateName('burghers_estate')] та міські інтереси [holland.GetNameWithNoTooltip], тоді як #Y Гаки#! складаються з [holland.GetGovernment.GetEstateName('nobles_estate')] та більш сільських сил."
  hook_and_cod_wars.1101.a: "Ми підтримаємо [our_claimant_character.GetHisHer] амбіції!"
  hook_and_cod_wars.1101.b: "Це буде цікаво..."
  hook_and_cod_wars.1102.title: "Втручання [supporter_country.GetNameWithNoTooltip]"
  hook_and_cod_wars.1102.desc.hook.support: "$hook_and_cod_wars.1102.desc$ Вони надсилають свою підтримку нашій стороні, #Y фракції Гаків#!! Їхні дії прямо протилежні #Y фракції Трісок#!, допомагаючи нашій улюбленій стороні."
  hook_and_cod_wars.1102.desc.hook.sabotage: "$hook_and_cod_wars.1102.desc$ Вони надсилають свою підтримку нашим ворогам, #Y фракції Гаків#!! Їхні дії прямо протилежні #Y фракції Трісок#!, підриваючи нашу улюблену сторону."
  hook_and_cod_wars.1102.desc.cod.support: "$hook_and_cod_wars.1102.desc$ Вони надсилають свою підтримку нашій стороні, #Y фракції Трісок#!! Їхні дії прямо протилежні #Y фракції Гаків#!, допомагаючи нашій улюбленій стороні."
  hook_and_cod_wars.1102.desc.cod.sabotage: "$hook_and_cod_wars.1102.desc$ Вони надсилають свою підтримку нашим ворогам, #Y фракції Трісок#!! Їхні дії прямо протилежні #Y фракції Гаків#!, підриваючи нашу улюблену сторону."
  hook_and_cod_wars.1102.desc: "До нас дійшли новини з [supporter_country.GetName]!"
  hook_and_cod_wars.1102.a: "Що вони отримають від цього?"
  hook_and_cod_wars.1200.title: "Смерть претендента"
  hook_and_cod_wars.1200.desc.hook.ally: "$hook_and_cod_wars.1200.desc$ Гаки отримають значну перевагу над нашими ворогами."
  hook_and_cod_wars.1200.desc.hook.enemy: "$hook_and_cod_wars.1200.desc$ Гаки отримають значну перевагу над нашою улюбленою стороною, #Y Трісками#!. Повинен з'явитися новий кандидат; новий очільник нашої фракції, інакше ми будемо змушені прийняти Гаків на [holland.GetAdjectiveWithNoTooltip] престолі."
  hook_and_cod_wars.1200.desc.cod.enemy: "$hook_and_cod_wars.1200.desc$ Тріски отримають значну перевагу над нашою улюбленою стороною, #Y Гаками#!. Повинен з'явитися новий кандидат; новий очільник нашої фракції, інакше ми будемо змушені прийняти Трісок на [holland.GetAdjectiveWithNoTooltip] престолі."
  hook_and_cod_wars.1200.desc.cod.ally: "$hook_and_cod_wars.1200.desc$ Тріски отримають значну перевагу над нашими ворогами."
  hook_and_cod_wars.1200.desc: "Одна з рушійних сил [ShowDisasterName('hook_and_cod_wars')] і претендент(ка) на престол [holland.GetName], [dead_claimant.GetName] помер(ла)! Таким чином, [alive_claimant.GetName] є беззаперечним(ою) у [alive_claimant.GetHisHer] претензії на корону."
  hook_and_cod_wars.1200.desc.hacw_the_impossible_has_happened: "У химерному повороті подій обидва претенденти, [hacw_contender_1.GetName] та [hacw_contender_2.GetName], померли одночасно. Ані фракція #Y Гака#!, ані фракція #Y Тріски#! більше не мають лідера, і тому їхні організації відповідно розпадаються."
  hook_and_cod_wars.1200.a: "Запропонувати [new_claimant_character.GetNameWithNoTooltip] як нового правителя!"
  hook_and_cod_wars.1200.a.tt: "[new_claimant_character.GetName] стає новим лідером нашої фракції"
  hook_and_cod_wars.1200.b: "Завершимо цю війну нарешті..."
  hook_and_cod_wars.1200.c: "Химерний поворот подій..."
  hook_and_cod_wars.1200.d: "Що тепер?"
  hook_and_cod_wars.1201.title: "Наш претендент на [holland.GetNameWithNoTooltip] помер!"
  hook_and_cod_wars.1201.desc: "Дійшли до нас вісті з [holland.GetName], повідомляючи про смерть нашого лідера фракції та претендента на [holland.GetAdjectiveWithNoTooltip] престол, [dead_claimant.GetName]! Тепер наша підтримувана сторона відчайдушно шукає нового лідера, який міг би претендувати на престол..."
  hook_and_cod_wars.1201.a: "[holland.GetAdjectiveWithNoTooltip] престол належить [target_character.GetShortNameWithNoTooltip]"
  hook_and_cod_wars.1201.a.tt: "[target_character.GetName] стане новим лідером нашої фракції у [holland.GetName], надаючи [target_character.GetHimHer] шанс претендувати на [holland.GetAdjectiveWithNoTooltip] престол"
  hook_and_cod_wars.1201.b: "Ми підтримаємо [foreign_character.GetShortNameWithNoTooltip] у [foreign_character.GetHisHer] амбіціях."
  hook_and_cod_wars.1201.b.tt: "[foreign_character.GetName] стане новим лідером нашої фракції у [holland.GetName], надаючи [foreign_character.GetHimHer] шанс претендувати на [holland.GetAdjectiveWithNoTooltip] престол"
  hook_and_cod_wars.1201.c: "[ruler_character.GetShortNameWithNoTooltip] здобуде престол для [ROOT.GetCountry.GetNameWithNoTooltip]."
  hook_and_cod_wars.1201.c.tt: "[ruler_character.GetName] стане новим лідером нашої фракції у [holland.GetName], надаючи [ruler_character.GetHimHer] шанс претендувати на [holland.GetAdjectiveWithNoTooltip] престол"
  hook_and_cod_wars.1201.d: "Залишити справу."
  hook_and_cod_wars.1201.d.tt: "Ми не пропонуватимемо замінного претендента, дозволяючи дострокове завершення [ShowDisasterName('hook_and_cod_wars')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] для [holland.GetName]"
  hook_and_cod_wars.1202.title: "Новий претендент"
  hook_and_cod_wars.1202.desc: "Зі смертю їхнього попереднього лідера з'явився новий претендент на [holland.GetAdjective] корону: [new_claimant.GetName] з [dead_claimant_country.GetName]."
  hook_and_cod_wars.1202.a: "І таким чином, [ShowDisasterNameWithNoTooltip('hook_and_cod_wars')] тривають..."
  hook_and_cod_wars.1202.a.at: "[new_claimant.GetName] стає новим опозиційним претендентом"
  hook_and_cod_wars.1202.a.bt: "[new_claimant.GetName] стає новим підтримуваним претендентом"
  hook_and_cod_wars.1203.title: "Дострокове завершення Війн"
  hook_and_cod_wars.1203.desc: "Зі смертю їхнього попереднього лідера та відсутністю будь-кого іншого, хто міг би кинути виклик [alive_claimant.GetHerHim], [ShowDisasterName('hook_and_cod_wars')] нарешті знайшли своє завершення з [alive_claimant.GetName] як новим правителем [holland.GetName]."
  hook_and_cod_wars.1203.a: "Нарешті війни знайшли своє завершення."
  hook_and_cod_wars.1300.title: "Іноземне втручання"
  hook_and_cod_wars.1300.desc: "Оскільки [ShowDisasterName('hook_and_cod_wars')] тривають, інші сусідні країни виявили зацікавленість у наших внутрішніх справах. Зокрема, шпигуни [neighbor_country.GetName] спостерігали за конфліктом, але залишалися нейтральними. Однак очевидно, що це лише питання часу, доки вони приєднаються до однієї зі сторін..."
  hook_and_cod_wars.1300.a: "Підкупити їх, щоб вони приєдналися до [ROOT.GetCountry.Custom('GetHaCWFaction')]."
  hook_and_cod_wars.1300.a.tt: "Ми підкупимо [neighbor_country.GetName], щоб вони приєдналися до #Y [ROOT.GetCountry.Custom('GetHaCWFaction')]#!, що збільшить показник впливу #Y [ROOT.GetCountry.Custom('GetHaCWFactionShort')]#! на #G +1#!"
  hook_and_cod_wars.1300.b: "Вони самі оберуть правильну сторону."
  hook_and_cod_wars.1300.b.tt: "Ми не будемо намагатися переконати [neighbor_country.GetName] приєднатися до будь-якої фракції"
  hook_and_cod_wars.1301.title: "[ShowDisasterNameWithNoTooltip('hook_and_cod_wars')] [holland.GetNameWithNoTooltip]"
  hook_and_cod_wars.1301.desc.bribe: "$hook_and_cod_wars.1301.desc$\n\nДо нас було відправлено посла з [holland.GetNameWithNoTooltip], щоб ще більше мотивувати нас або підтримати #Y [holland.Custom('GetHaCWFaction')]#!, або принаймні повністю ігнорувати конфлікт."
  hook_and_cod_wars.1301.desc: "[ShowDisasterName('hook_and_cod_wars')] вже досить довго турбують [holland.GetName]. [hacw_contender_1.GetName] та [hacw_contender_2.GetName], лідери фракцій #Y Гачків#! та #Y Тріски#! відповідно, борються один з одним за [holland.GetAdjectiveWithNoTooltip] престол, і, за даними наших шпигунів, схоже, цей конфлікт не знайде кінця найближчим часом. Хоча це ганьба для [holland.GetAdjectiveWithNoTooltip] [holland.GetFlavorRank], це може бути для нас можливістю втрутитися в нього."
  hook_and_cod_wars.1301.a: "Ми з [hacw_contender_2.GetShortNameWithNoTooltip] та [holland.Custom('GetHaCWEnemyFaction')]."
  hook_and_cod_wars.1301.a.tt: "Ми приєднаємося до #Y [holland.Custom('GetHaCWEnemyFaction')]#!, підтримуючи [hacw_contender_2.GetName] у [hacw_contender_2.GetHisHer] амбіціях"
  hook_and_cod_wars.1301.b: "Ми повинні підтримати [hacw_contender_1.GetShortNameWithNoTooltip] та [holland.Custom('GetHaCWFaction')]."
  hook_and_cod_wars.1301.b.tt: "Ми приєднаємося до #Y [holland.Custom('GetHaCWFaction')]#!, підтримуючи [hacw_contender_1.GetName] у [hacw_contender_1.GetHisHer] амбіціях"
  hook_and_cod_wars.1301.c: "Це не наша справа."
  hook_and_cod_wars.1301.c.tt: "Ми залишимося нейтральними в цьому конфлікті"
  hook_and_cod_wars.1302.title: "[neighbor_country.GetNameWithNoTooltip] приєднується до [holland.Custom('GetHaCWFaction')]"
  hook_and_cod_wars.1302.desc: "До нас дійшли новини з [neighbor_country.GetAdjective] двору! [neighbor_country.GetAdjectiveWithNoTooltip] [neighbor_country.GetFlavorRank] приєднався до нас та #Y [holland.Custom('GetHaCWFaction')]#!!"
  hook_and_cod_wars.1302.a: "Перемога для [holland.Custom('GetHaCWFactionShort')]!"
  hook_and_cod_wars.1303.title: "[neighbor_country.GetNameWithNoTooltip] приєднується до [holland.Custom('GetHaCWEnemyFaction')]"
  hook_and_cod_wars.1303.desc: "До нас дійшли новини з [neighbor_country.GetAdjective] двору! [neighbor_country.GetAdjectiveWithNoTooltip] [neighbor_country.GetFlavorRank] приєднався до наших ворогів, #Y [holland.Custom('GetHaCWEnemyFaction')]#!!"
  hook_and_cod_wars.1303.a: "Ще один [holland.Custom('GetHaCWEnemyFactionShort')]..."
  hook_and_cod_wars.1304.title: "[neighbor_country.GetNameWithNoTooltip] залишається нейтральним"
  hook_and_cod_wars.1304.desc: "Хоча вони спочатку виявили зацікавленість, дипломати з [neighbor_country.GetName] запевнили нас, що вони не братимуть участі в [ShowDisasterName('hook_and_cod_wars')], не підтримуючи жодну зі сторін конфлікту."
  hook_and_cod_wars.1304.a: "Принаймні вони не створюють нам проблем."
  hook_and_cod_wars.1400.title: "Підтримка Альянсу"
  hook_and_cod_wars.1400.desc: "Наші союзники з #Y [ROOT.GetCountry.Custom('GetHaCWFaction')]#! потребують додаткових ресурсів проти #Y [ROOT.GetCountry.Custom('GetHaCWEnemyFaction')]#!. На щастя для нас, ми не єдині, хто підтримує [ROOT.GetCountry.Custom('GetHaCWFaction')]. [faction_ally_country.GetName] пообіцяла свою підтримку нашій справі. Можливо, варто попросити нашого довіреного союзника підтримати нашу справу."
  hook_and_cod_wars.1400.a: "Кожен мусить нести свою ношу."
  hook_and_cod_wars.1400.b: "Ми можемо заплатити за це самі."
  hook_and_cod_wars.1400.c: "Нам доведеться обійтися без золота..."
  hook_and_cod_wars.1401.title: "Підтримка Альянсу"
  hook_and_cod_wars.1401.desc: "[holland.GetName], наш союзник і побратим по #Y [ROOT.GetCountry.Custom('GetHaCWFaction')]#!, надіслав офіційний запит на додаткове золото для підтримки військових зусиль. Хоча запитувана сума значна, це може допомогти нам схилити шальки терезів на нашу користь."
  hook_and_cod_wars.1401.a: "Підтримати [ROOT.GetCountry.Custom('GetHaCWFaction')]."
  hook_and_cod_wars.1401.a.tt: "Фракція #Y [ROOT.GetCountry.Custom('GetHaCWFactionShort')]#! отримує #G +2#! очки до свого показника впливу [holland.Custom('GetHaCWOwnFactionScore')]"
  hook_and_cod_wars.1401.b: "Ми не можемо собі цього дозволити."
  hook_and_cod_wars.1401.b.tt: "Фракція #Y [ROOT.GetCountry.Custom('GetHaCWEnemyFactionShort')]#! отримує #R +2#! очки до свого показника впливу [holland.Custom('GetHaCWEnemyFactionScore')]"
  hook_and_cod_wars.1401.b.bt: "#R Нас буде виключено з#! фракції #Y [ROOT.GetCountry.Custom('GetHaCWFactionShort')]#!"
  hook_and_cod_wars.1402.title: "Підтримка від [faction_ally_country.GetNameWithNoTooltip]"
  hook_and_cod_wars.1402.desc: "Наш запит на додаткову підтримку було почуто! Народ [faction_ally_country.GetName] надіслав нам щедру кількість золота для підтримки фракції #Y [ROOT.GetCountry.Custom('GetHaCWFactionShort')]#!!"
  hook_and_cod_wars.1402.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hook_and_cod_wars.1403.title: "[faction_ally_country.GetNameWithNoTooltip] нас підвів"
  hook_and_cod_wars.1403.desc: "Наш запит на додаткову грошову підтримку було почуто, але відхилено. Підступний [faction_ally_country.GetLongName] відмовляється сприяти справі фракції #Y [ROOT.GetCountry.Custom('GetHaCWFactionShort')]#!!"
  hook_and_cod_wars.1403.a: "Тоді ми обійдемося без них."
  hook_and_cod_wars.1404.title: "Підтримка фракції [ROOT.GetCountry.Custom('GetHaCWEnemyFactionShort')]"
  hook_and_cod_wars.1404.desc: "Війна [ShowDisasterName('hook_and_cod_wars')] у [holland.GetName] у розпалі, обидві сторони ще відмовляються поступатися троном. Наші вороги, фракція #Y [ROOT.GetCountry.Custom('GetHaCWEnemyFaction')]#!, отримали значний приплив золота. Хоча їхні джерела нам невідомі, очевидно, що їхній вплив зростає, перетворюючись на більшу загрозу для фракції #Y [ROOT.GetCountry.Custom('GetHaCWFaction')]#!."
  hook_and_cod_wars.1404.a: "Ми не можемо дозволити собі відступити!"
  hook_and_cod_wars.1404.a.tt: "Фракція #Y [ROOT.GetCountry.Custom('GetHaCWFactionShort')]#! отримує #G +2#! очки до свого показника впливу [holland.Custom('GetHaCWEnemyFactionScore')]"
  hook_and_cod_wars.1404.b: "Фракція [ROOT.GetCountry.Custom('GetHaCWEnemyFactionShort')] врешті-решт впаде."
  hook_and_cod_wars.1404.b.tt: "Фракція #Y [ROOT.GetCountry.Custom('GetHaCWEnemyFactionShort')]#! отримує #R +2#! очки до свого показника впливу [holland.Custom('GetHaCWOwnFactionScore')]"
  hook_and_cod_wars.1405.title: "Підтримка фракції [ROOT.GetCountry.Custom('GetHaCWEnemyFactionShort')]"
  hook_and_cod_wars.1405.desc: "Фракція #Y [ROOT.GetCountry.Custom('GetHaCWEnemyFaction')]#!, вороги нашої улюбленої сторони, отримала додаткову підтримку від [faction_enemy_country.GetName], підриваючи будь-яку перевагу, яку фракція #Y [ROOT.GetCountry.Custom('GetHaCWFactionShort')]#! мала над ними."
  hook_and_cod_wars.1405.a: "[faction_enemy_country.GetLongNameWithNoTooltip] заплатить за це."
  hook_and_cod_wars.100.title: "Кінець [ShowDisasterNameWithNoTooltip('hook_and_cod_wars')]"
  hook_and_cod_wars.100.desc.a: "$hook_and_cod_wars.100.desc$ Попри всі наші спроби, #Y Гаки#! не змогли подолати вплив та владу #Y Трісок#!. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] правлять сільськими землями залізною рукою, тоді як наш новий правитель, [new_ruler.GetName], схиляє [new_ruler.GetHisHer] коліно перед іноземними державами..."
  hook_and_cod_wars.100.desc.b: "$hook_and_cod_wars.100.desc$ Попри всі спроби #Y Трісок#!, вони, зрештою, не змогли протистояти #Y Гакам#!, які здобули повну перемогу в цьому конфлікті. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] радіють, оскільки їхні інтереси тепер захищені справедливим правителем [new_ruler.GetName]."
  hook_and_cod_wars.100.desc.c: "$hook_and_cod_wars.100.desc$ Попри всі спроби #Y Гаків#!, вони, зрештою, не змогли протистояти #Y Тріскам#!, які здобули повну перемогу в цьому конфлікті. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] радіють, оскільки їхні інтереси тепер захищені справедливим правителем [new_ruler.GetName]."
  hook_and_cod_wars.100.desc.d: "$hook_and_cod_wars.100.desc$ Попри всі наші спроби, #Y Тріски#! не змогли подолати вплив та владу #Y Гаків#!. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] правлять містами та селищами залізною рукою, тоді як наш новий правитель, [new_ruler.GetName], схиляє [new_ruler.GetHisHer] коліно перед іноземними державами..."
  hook_and_cod_wars.100.desc.e: "Чи то доля, чи божественне втручання [ROOT.GetCountry.GetReligion.GetGodName], чи чиста вдача, але з причин, що перевищують людське розуміння, обидві фракції обрали [new_ruler.GetName] своїм представником. Таким чином, заворушення в нашій державі припиняються, оскільки ми знайшли нашого законного наступника."
  hook_and_cod_wars.100.desc: "Нарешті, [ShowDisasterName('hook_and_cod_wars')] знайшли свій кінець. Наступність [ROOT.GetCountry.GetName] нарешті забезпечена, і фракції припиняють ворожі дії."
  hook_and_cod_wars.100.a: "Принаймні, на вулицях панує мир..."
  hacw_claim_holland_tt: "[hacw_claimant.GetName] спробує забезпечити трон [holland.GetName] для [hacw_claimant.GetHerselfHimself]. Якщо інший член [hollands_dynasty.GetName] заявить права на трон, [ShowDisasterName('hook_and_cod_wars')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] може бути спровокована для [holland.GetName]"
  hacw_ignore_claim_on_holland_throne_tt: "[hacw_claimant.GetName] ігноруватиме претензію на трон [holland.GetName]. Це усуне можливість виникнення [ShowDisasterName('hook_and_cod_wars')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] для [holland.GetName]"
