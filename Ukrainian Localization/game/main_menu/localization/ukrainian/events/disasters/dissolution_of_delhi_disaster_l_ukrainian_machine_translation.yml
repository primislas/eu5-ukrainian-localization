l_english:
  dissolution_of_delhi.1.title: "Розпад [GetCountry('DLH').GetNameWithNoTooltip]"
  dissolution_of_delhi.1.desc: "Десятиліття урочистих спроб зберегти величезні володіння нашого колись великого [ROOT.GetCountry.GetFlavorRank] не принесли плодів. Постійні інтриги наших ворожих сусідів, їхні безперервні спроби підірвати нашу владу та скасувати наші престижні завоювання нарешті здійснилися. Народ втратив віру в керівництво [target_character.GetName], що призвело до повстань, голоду та навіть відкритих бойових дій між поселеннями під нашим прапором. Ситуація не може бути більш жахливою, і наші радники швидко вичерпують пропозиції щодо багатьох проблем, з якими ми стикаємося."
  dissolution_of_delhi.1.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  all_estates_lose_20_loyalty_tt: "[Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] усіх наших [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] буде зменшено на [ShowNamedValue('estate_satisfaction_extreme_penalty')|+=2%]"
  dissolution_of_delhi.2.title: "Провінційні Справи"
  dissolution_of_delhi.2.desc: "Народ [target_location.GetName] забув про атмосферу влади та командування, яку колись надихав наш прапор. Розмови про автономію та незалежність наповнюють повітря, оскільки володіння повільно вислизає з наших рук. Сплата місцевих податків, набір ополчення та збір товарів є одними з найважливіших аспектів володіння [target_location.GetNameWithNoTooltip]. Стало зрозуміло, що наші адміністратори повинні отримати інструкції та допомогу, якщо вони хочуть зберегти, принаймні номінально, контроль над цими землями."
  dissolution_of_delhi.2.a: "Дозволити [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] управляти [target_location.GetNameWithNoTooltip]."
  dissolution_of_delhi.2.b: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] цим займеться."
  dissolution_of_delhi.2.c: "Якщо ми не можемо впоратися самі, то ми цього не заслуговуємо!"
  dissolution_of_delhi.3.title: "Шепіт при Дворі"
  dissolution_of_delhi.3.desc: "Вже досить давно чутки заволоділи увагою наших найвищих радників. Розмови про те, що деякі з наших найвидатніших діячів незадоволені та несхвально ставляться до наших нещодавніх адміністративних заходів, стають все гучнішими. Нам було б добре розслідувати цю справу та дістатися до її суті. За словами нашого дипломатичного делегата між різними станами та нашим двором, на такому важливому перехресті нашого правління ми повинні добре подбати, щоб не розгнівати жодного з них..."
  dissolution_of_delhi.3.a: "Можливо, цей подарунок їх заспокоїть?"
  dissolution_of_delhi.3.b: "Це нижче нашої гідності!"
  dissolution_of_delhi.4.title: "Скарги [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]"
  dissolution_of_delhi.4.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] з [target_province.GetName] виступили з проханням. За словами їхнього посланця, їхній народ страждає від низької якості харчування та нестачі їжі. Він каже, що хоча провінція не страждає від нестачі їжі, доступні варіанти є як неякісними, так і ненатхненними. Якщо ми мотивуємо себе надати їм якусь форму допомоги, можливо, ми зможемо завоювати прихильність місцевих жителів?"
  dissolution_of_delhi.4.a: "Організувати передачу різноманітної продукції з [target_province2.GetNameWithNoTooltip]!"
  dissolution_of_delhi.4.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  target_province_peasants_get_20_satisfaction_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  target_province_peasants_lose_10_satisfaction_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  target_province_nobles_lose_25_satisfaction_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  target_province_nobles_gain_20_satisfaction_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  target_province_peasants_lose_25_satisfaction_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  dissolution_of_delhi.5.title: "Зловживання Владою"
  dissolution_of_delhi.5.desc: "До [ROOT.GetCountry.GetCapital.GetName] дійшли новини про махінації [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] навколо [target_province.GetName]. Здається, вони розпустили місцеві збори та встановили свої закони, намагаючись скасувати нашу центральну владу, у відповідь на нещодавні труднощі, з якими зіткнулися наші володіння. Наші радники підтримують ідею стратити місцевих [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], як попередження будь-яким іншим провінціям, які бажають втручатися в наш шлях..."
  dissolution_of_delhi.5.a: "Геть їхні голови!"
  dissolution_of_delhi.5.b: "Ми потребуємо їх."
  dissolution_of_delhi.6.title: "Валюта втрачає цінність"
  dissolution_of_delhi.6.desc: "Торгівля в межах нашого [ROOT.GetCountry.GetFlavorRank] завжди підтримувала єдину валюту, об'єднану та підкріплену міццю нашої армії та прапора. Однак, оскільки наша влада слабшає, а наш престиж згасає, так само слабшає і сила нашої монети. Нестача [ShowGoodsName('silver')], дорогоцінного каміння та необхідних матеріалів для виготовлення офіційної валюти призвела до дефіциту та загального невдоволення серед населення. Багато поселень вдалися до використання бартерних угод, повністю заперечуючи верховенство закону, яке ми встановили..."
  dissolution_of_delhi.6.a: "Підтримувати поточну ситуацію."
  dissolution_of_delhi.6.b: "Інтегрувати ці бартерні ринки в нашу офіційну адміністрацію!"
  dissolution_of_delhi.6.c: "Реформуйте валюту, дурні!"
  dissolution_of_delhi.7.title: "Виживання після наслідків"
  dissolution_of_delhi.7.desc: "Наш народ не чужий лиху. Протягом років труднощів, припливів і відпливів нашої влади та відновлення колись великого народу, ми витримали випробування часом, вийшовши переможцями та сильнішими, ніж будь-коли. Ті, хто колись протистояв нам, незабаром відчують усю лють могутньої [ROOT.GetCountry.GetAdjective] армії, і наше ім'я знову похитне основи $india$."
  dissolution_of_delhi.7.a: "Ми відроджені..."
  STATIC_MODIFIER_NAME_dlh_restored_authority_modifier: "Відновлена влада"
  STATIC_MODIFIER_NAME_dlh_coinage_reforms_modifier: "Монетні реформи"
  STATIC_MODIFIER_NAME_allowed_provincial_barter_markets: "Дозволені провінційні бартерні ринки"
  opposers_at_least_80_sop_tt: "Наша опозиція має щонайменше #R 80%#! [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] під час [ShowSituationName('fall_of_delhi')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  opposers_at_least_95_sop_tt: "Наша опозиція має щонайменше #R 95%#! [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] під час [ShowSituationName('fall_of_delhi')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"