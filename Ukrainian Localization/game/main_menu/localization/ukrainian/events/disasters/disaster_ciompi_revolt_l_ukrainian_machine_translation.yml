l_english:
  ciompi_revolt.1.title: "Повстання Чомпі"
  ciompi_revolt.1.desc: "Дзвони наших церков б'ють на сполох, коли тисячі незадоволених селян і купців заповнюють вулиці [target_location.GetName], що в [target_location.GetAreaName]. Значне повстання нижчих класів проти правлячої олігархії, повстання підживлюється соціальними та економічними образами, включаючи високі податки та погані умови праці. Чомпі, що складаються переважно з робітників вовняної промисловості та інших ремісників, вимагають політичного представництва та кращих прав. Повстання загрожує потенційно призвести до тимчасової реформації флорентійського уряду, якщо його не придушить правляча еліта."
  ciompi_revolt.1.a: "Попереду важкі часи..."
  ciompi_revolt.2.title: "Gente Nuova"
  ciompi_revolt.2.desc: "Серед бурхливих часів [GetCurrentYear] року, нове покоління мігрантів-купців та громадян, #italic Gente Nuova#!, виникло як політична фракція в наших політичних колах. Вони відомі своїми прогресивними ідеалами та виступають за політичні та соціальні реформи, прагнучи кинути виклик правлячій олігархії та створити більш інклюзивний уряд. З кожним днем вони здобувають підтримку середнього та нижчого класів, які незадоволені існуючою структурою влади. Вплив фракції неухильно зростає, оскільки вони прагнуть просувати своє бачення більш справедливого суспільства."
  ciompi_revolt.2.a: "Ми охоче спонсоруємо нове покоління підприємців."
  ciompi_revolt.2.b: "Це не те, що ми можемо собі дозволити в часи кризи!"
  ciompi_revolt.2.c: "[target_character.GetNameWithNoTooltip] домовиться про кращі умови."
  ciompi_revolt.3.title: "#italic Popolo Minuto#!"
  ciompi_revolt.3.desc: "Під час повстань Чомпі [GetCurrentYear] року сформувалася нова фракція незадоволених громадян, #italic Popolo Minuto#!. Складаючись з робітників нижчого класу та ремісників, вони приєдналися до повстання, щоб протестувати проти правлячої олігархії, відіграючи помітну роль у ці непевні часи. #italic Popolo Minuto#! прагнуть покращення умов праці, вищих зарплат та більшого політичного представництва. Вони відомі тим, що беруть участь у вуличних боях та демонстраціях, борючись за свої права та вимагаючи справедливішого суспільства. Їхня участь у повстанні підкреслює соціальні та економічні нерівності, з якими стикалися нижчі класи в цей період."
  ciompi_revolt.3.a: "Необхідні деякі кошти для забезпечення їхньої вірності."
  ciompi_revolt.3.b: "Вони теж повинні затягнути паски..."
  ciompi_revolt.3.c: "Народ довіряє [target_character.GetNameWithNoTooltip]!"
  ciompi_revolt.4.title: "Поширення #italic Miserabiles#!"
  ciompi_revolt.4.desc: "Складаючись з найбідніших верств суспільства, так звані #italic Miserabiles#! приєдналися до повстання разом з #italic Popolo Minuto#!. Вони вимагають полегшення від крайньої бідності та злиднів, а також справедливішого розподілу багатства. Вони часто беруть участь у протестах та демонстраціях, шукаючи соціальних та економічних реформ для покращення своїх жахливих умов життя. Їхня присутність підкреслює відчайдушне становище найбільш маргіналізованих членів суспільства під час бурхливого періоду повстань Чомпі."
  ciompi_revolt.4.a: "Ми повинні полегшити їхні труднощі..."
  ciompi_revolt.4.b: "Вони самі по собі!"
  ciompi_revolt.4.c: "Виконавчі повноваження [target_character.GetNameWithNoTooltip] подбають про всіх."
  ciompi_revolt.5.title: "Робітники тікають від податкового тягаря"
  ciompi_revolt.5.desc: "Внаслідок витрат, накопичених за останні кілька років, робітники тікають з наших володінь через високі податки. Важке оподаткування, накладене правлячою олігархією, стало нестерпним для робітничого класу і навіть купців у наших портах. Зіткнувшись з економічними труднощами, багато робітників вирішують покинути свої домівки в пошуках кращих можливостей в інших місцях. Вихід робітників посилює соціальну та економічну напругу в [ROOT.GetCountry.GetName], ще більше підживлюючи образи, що призводять до повстання."
  ciompi_revolt.5.a: "Нехай ідуть."
  ciompi_revolt.5.b: "Ми можемо їх компенсувати."
  ciompi_revolt.5.c: "[target_character.GetNameWithNoTooltip] — співчутливий правитель..."
  ciompi_revolt_allowed_migration_effect_tt: "Через нашу політику дозволу [Concept('migration', 'CONCEPT_PLACEHOLDER')|e] або [ShowPopTypeName('peasants')], або [ShowPopTypeName('laborers')], кількість мігруючих [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] буде збільшена"
  ciompi_revolt.6.title: "Можновладці"
  ciompi_revolt.6.desc: "Визнаючи скарги нижчих верств, численні радники [target_character.GetName] вимагають, щоб [target_character.GetSheHe] спробував(-ла) послабити вплив правлячої олігархії та усунути соціальні й економічні нерівності, кинувши виклик оплотам шляхетської влади в країні. Кілька кроків для впровадження політичних реформ та забезпечення представництва робітничого класу були ретельно сплановані, оскільки влада окремих шляхтичів зростає в цей час кризи. Кинувши виклик їхній владі та впливу, ми прагнутимемо створити більш справедливе суспільство та полегшити скарги, що розпалили повстання."
  ciompi_revolt.6.a: "Вони можуть зберегти свої права, наразі..."
  ciompi_revolt.6.b: "Кинути виклик їхній владі!"
  ciompi_revolt.6.c: "[target_character.GetNameWithNoTooltip] вірить у народ, а не в багатих шляхтичів."
  ciompi_revolt.7.title: "Тиск і реформи"
  ciompi_revolt.7.desc: "Руйнування, спричинені повстаннями Чомпі, викарбувані на шкірі нашого народу. Сім'ї голодують, громадяни вдаються до злочинності та повстань, тоді як могутні та впливові особи продовжують процвітати в ці суворі часи. Як наслідок, численні голоси, як в уряді, так і поза ним, вимагали радикальних реформ для вирішення їхніх проблем щодо представництва, меритократії та рівності."
  ciompi_revolt.7.a: "Селяни повинні знати своє місце..."
  ciompi_revolt.7.b: "Голос народу має бути почутий!"
  ciompi_revolt.7.c: "Доброзичливість [target_character.GetNameWithNoTooltip] проявляється повною мірою!"
  ciompi_revolt.8.title: "Криза та зміни"
  ciompi_revolt.8.desc: "Після тривалого періоду нестабільності та повстань нам вдалося пережити ці важкі часи. Труднощі, поразки та перешкоди лише зміцнять нашу рішучість і піднесуть нас вище, ніж ми коли-небудь досягали. Часи нестабільності позаду, і ми з нетерпінням дивимося в майбутнє, що б воно не принесло під новим керівництвом."
  ciompi_revolt.8.a: "Наш народ витримав випробування історії."
  ciompi_revolt.8.b: "Нам потрібне сильне керівництво могутнього чоловіка!"
  every_location_capital_area_tt: "Кожна належна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в області [target_capital_area.GetName] отримає наступне:"
  random_owned_non_rural_location_tt: "Випадкова належна міська локація зазнає наступного:"
  end_disaster_tt: "Це завершить поточну [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  every_location_pops_dissatisfaction_tt: "Населення кожної [Concept('location', 'CONCEPT_PLACEHOLDER')|e] зазнає наступного:"