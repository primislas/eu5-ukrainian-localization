l_english:
  peasants_war.1.title: "Селянська війна"
  peasants_war.1.desc: "Селянство вже деякий час вимагало економічних, релігійних та політичних змін. Їхнє невдоволення зросло до такої міри, що жорстокі повстання стали повсякденною практикою. Хоча немає центрального керівництва і їм бракує належного озброєння, селяни все ж зуміли кинути виклик владі. Кілька важливих будівель, як релігійних, так і інших, були спалені та розграбовані на знак протесту."
  peasants_war.1.a: "Лихі часи попереду"
  peasants_war.1.a.tt: "Наші [ShowPopTypeName('peasants')], [ShowPopTypeName('laborers')] та [ShowPopTypeName('soldiers')] у [ROOT.GetCountry.GetCapital.GetRegion.GetName] приєднаються до [target_rebel.GetName]"
  peasants_war.2.title: "Селянські протести"
  peasants_war.2.desc: "Регіональні повстання та протести спалахують по всій нашій державі. Розлючені селяни вимагають негайних реформ соціального та політичного ладу. Тягар важких податків та жорстокість їхніх землевласників нарешті довели їх до краю."
  peasants_war.2.a: "Посилити кріпацтво"
  peasants_war.2.b: "Обмежити кріпацтво"
  peasants_war.3.title: "Релігійне повстання"
  peasants_war.3.desc: "Ідеї Реформації привабили значну частину пригнобленого селянства. Привабливість у багатьох випадках ґрунтується на соціальних мотивах, багато хто вірить, що вони отримають підтримку і їхні труднощі зменшаться. Це не обов'язково так, оскільки повстання набрало обертів, а звірства з боку селян стали більш поширеними, реформатори почали протистояти 'вбивчим селянам'."
  peasants_war.3.a: "Придушити їх!"
  peasants_war.3.b: "Дозволити їм обрати власну віру"
  opinion_pope_religious_tolerance: "Ваша релігійна толерантність розгнівала Папу"
  peasants_war.5.title: "Національна децентралізація"
  peasants_war.5.desc: "На перших етапах Селянської війни повстанці здобули перевагу, просто переважаючи лордів та лицарів. Через нашу вже політично децентралізовану державу те, що починалося як кілька менших, місцевих повстань, поширилося за провінційні кордони та охопило більшу частину нашої держави."
  peasants_war.5.a: "Придушити повстанців"
  peasants_war.5.b: "Ми повинні домовитися про рішення"
  peasants_war.6.title: "Кінець Селянської війни"
  peasants_war.6.desc: "Нестабільність минулих років тепер нарешті, здається, закінчилася! Нам більше не потрібно турбуватися про селян, які борються за реформи. Їхня воля до боротьби вичерпана."
  peasants_war.6.a: "Відновити порядок"