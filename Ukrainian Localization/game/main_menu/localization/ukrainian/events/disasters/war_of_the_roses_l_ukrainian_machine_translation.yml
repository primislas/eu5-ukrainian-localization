l_english:
  war_of_the_roses.1.title: "Війна троянд"
  war_of_the_roses.1.desc: "Дві молодші гілки дому Плантагенетів, дім Ланкастерів та дім Йорків, обидві претендують на законне право на англійський престол. Окремі сутички між їхніми прихильниками вже спалахнули в кількох провінціях по всій країні.\n\nЇхні геральдичні символи, червона та біла троянди, вже стали синонімами конфлікту, нині відомого як Війна троянд."
  war_of_the_roses.1.a: "Підтримати дім Ланкастерів."
  york_rebels_joining: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('north_riding_province')] приєднаються до [york_rebel.GetName]"
  war_of_the_roses.1.b: "Підтримати дім Йорків."
  york_rebel_name: "Йоркські претенденти"
  lancaster_rebel_name: "Ланкастерські претенденти"
  lancaster_rebels_joining: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('lancashire_province')] приєднаються до [lancaster_rebel.GetName]"
  war_of_the_roses.2.title: "Підтримка Корони"
  war_of_the_roses.2.desc: "Місцева підтримка Корони у Війні троянд зростає серед народу, оскільки [target_pop.GetName] збираються під нашим прапором!"
  war_of_the_roses.2.a: "Це дуже бажано."
  wotr_support_for_pretenders: "Декларація для претендентів"
  war_of_the_roses.3.title: "Декларація для ланкастерських претендентів!"
  war_of_the_roses.3.desc: "Шляхта [disloyal_target.GetName] довгий час була розділена щодо Війни троянд, але тепер фракція, що підтримує дім Ланкастерів, перемогла і відкрито заявляє про свою підтримку повстанців."
  war_of_the_roses.3.a: "Жахливі новини."
  war_of_the_roses.4.title: "Декларація для йоркських претендентів!"
  war_of_the_roses.4.desc: "Шляхта [disloyal_target.GetName] довгий час була розділена щодо Війни троянд, але тепер фракція, що підтримує дім Йорків, перемогла і відкрито заявляє про свою підтримку повстанців."
  war_of_the_roses.4.a: "Жахливі новини."
  war_of_the_roses.5.title: "Незадоволені шляхтичі"
  war_of_the_roses.5.desc: "Шляхтичі досі стояли на боці корони під час Війни троянд, очікуючи щедрої винагороди. Але серед багатьох з них зростає думка, що їхня вірність досі мало визнавалася."
  war_of_the_roses.5.a: "Ці подарунки мають показати нашу вдячність."
  war_of_the_roses.5.b: "Це лише їхній обов'язок."
  war_of_the_roses.6.title: "Творець королів"
  war_of_the_roses.6.desc: "Могутні шляхтичі відіграють ключові ролі у Війні троянд, підтримуючи то дім [ShowDynastyName('york_dynasty')], то дім [ShowDynastyName('lancaster_dynasty')]. Тепер [kingmaker.GetName] намагається зіграти роль творця королів, потенційно змінюючи баланс сил в Англії."
  war_of_the_roses.6.a: "Він мерзенний зрадник!"
  war_of_the_roses.6.b: "Він вірний слуга корони!"
  war_of_the_roses.8.title: "Легітимність під питанням"
  war_of_the_roses.8.desc: "Навіть наші власні командири та солдати починають ставити під сумнів легітимність нинішнього правління."
  war_of_the_roses.8.a: "Купити їхню подальшу підтримку."
  war_of_the_roses.8.b: "Як вони сміють ставити мене під сумнів?"
  war_of_the_roses.9.title: "Чутки про велике повстання на континенті"
  war_of_the_roses.9.desc: "Багато з тих, хто був змушений тікати з країни під час Війни Троянд, знайшли притулок на континенті, і місцева влада повідомляє про чутки, що збройне повстання може бути неминучим. Якщо ми не зупинимо це, вони зможуть збудувати там фортецю, яка зможе забезпечити підтримку для подальшого заколоту."
  war_of_the_roses.9.a: "Надіслати гроші на допомогу місцевій владі."
  war_of_the_roses.9.b: "Гроші потрібні більше ближче до дому."
  wotr_foreign_power_intervenes: "Іноземна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] втручається"
  wotr_lan_rebels_will_progress: "[lancaster_rebel.GetName] отримає [ShowNamedValue('rebel_progress_weak_bonus')|-=2%] прогресу"
  wotr_yor_rebels_will_progress: "[york_rebel.GetName] отримає [ShowNamedValue('rebel_progress_weak_bonus')|-=2%] прогресу"
  war_of_the_roses.12.title: "Підтримка дому Ланкастерів"
  war_of_the_roses.12.desc: "В Англії вирує громадянська війна за спадщину престолу, конфлікт, що став відомим як Війна Троянд. Повсталий дім Ланкастерів шукає іноземної допомоги і надіслав нам посланця з проханням про війська. Якщо їм вдасться захопити трон, наша допомога, безсумнівно, буде пам'ятатися, покращуючи наші відносини з Англією."
  war_of_the_roses.12.a: "Надіслати їм символічний загін."
  war_of_the_roses.12.b: "Надіслати їм трохи грошей."
  war_of_the_roses.12.c: "Ми не будемо підтримувати повстанців."
  war_of_the_roses.13.title: "Підтримка дому Йорків"
  war_of_the_roses.13.desc: "В Англії вирує громадянська війна за спадщину престолу, конфлікт, що став відомим як Війна Троянд. Повсталий дім Йорків шукає іноземної допомоги і надіслав нам посланця з проханням про війська. Деяка підтримка може бути способом запобігти тому, щоб сильна та об'єднана Англія вела проти нас війну, і якщо повстанцям вдасться захопити трон, наша допомога, безсумнівно, буде пам'ятатися, покращуючи наші відносини з Англією."
  war_of_the_roses.13.a: "Надіслати їм символічний загін."
  war_of_the_roses.13.b: "Надіслати їм трохи грошей."
  war_of_the_roses.13.c: "Ми не будемо підтримувати повстанців."
  war_of_the_roses.14.title: "[from.GetNameWithNoTooltip] втручається!"
  war_of_the_roses.14.desc: "Повстанці шукали іноземної підтримки для свого повстання і зуміли переконати [from.GetLongName] допомогти їм!\n\nЦе не ідеально, але ми переможемо!"
  war_of_the_roses.14.a: "Як вони сміють!"
  wotr_support_for_pretender_deeepens: "Підтримка претендентів зростає"
  war_of_the_roses.15.title: "Підтримка Ланкастерів зростає в [disloyal_target.GetNameWithNoTooltip]!"
  war_of_the_roses.15.title.fallback: "Підтримка Ланкастерів зростає!"
  war_of_the_roses.15.desc: "Усе населення [disloyal_target.GetName] тепер виступило на підтримку [lancaster_rebel.GetName].\n\nКоролівську армію неодмінно доведеться розширити!"
  war_of_the_roses.15.a: "Жахливі новини."
  war_of_the_roses.16.title: "Підтримка Йорків зростає в [disloyal_target.GetNameWithNoTooltip]!"
  war_of_the_roses.16.title.fallback: "Підтримка Йорків зростає!"
  war_of_the_roses.16.desc: "Усе населення [disloyal_target.GetName] тепер виступило на підтримку [york_rebel.GetName].\n\nКоролівську армію неодмінно доведеться розширити!"
  war_of_the_roses.16.a: "Жахливі новини."
  war_of_the_roses.17.title: "Захисники [target_siege.GetNameWithNoTooltip]"
  war_of_the_roses.17.desc: "Руйнівні наслідки тривалої громадянської війни завдали великої шкоди нашому [ROOT.GetCountry.GetFlavorRank]. Пустельні вулиці, голод і спустошення стали близькими супутниками людей у [target_siege.GetName]. Після ретельних переговорів гарнізон прийняв наші умови та має намір вийти, залишивши місцевий форт без охорони для захоплення нашими арміями."
  war_of_the_roses.17.a: "Ще один крок уперед."
  war_of_the_roses.18.title: "Конфлікт [ShowDisasterNameWithNoTooltip('war_of_the_roses')]"
  war_of_the_roses.18.desc: "Претенденти вичікували свого часу, накопичуючи підтримку в нелояльних провінціях по всьому [ROOT.GetCountry.GetFlavorRank]. На жаль, тепер вони відкрито повстали проти нашої влади, заперечуючи легітимність [target_character.GetName], становлячи загрозу для лінії [target_dynasty.GetName]."
  war_of_the_roses.18.a: "Розчавити їх!"
  wotr_explain_action_tt: "Під час [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] фази [ShowDisasterName('war_of_the_roses')] ми отримаємо доступ до [ShowGenericActionName('wotr_bribe_garrison')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] [Concept('action', 'CONCEPT_PLACEHOLDER')|e]"
  war_of_the_roses.100.title: "Кінець Війни троянд"
  war_of_the_roses.100.desc: "Збройний конфлікт за спадкування англійського престолу нарешті закінчився, оскільки [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] перемагає суперників!"
  war_of_the_roses.100.a: "Порядок нарешті відновлено."
  war_of_the_roses.103.title: "Покращені відносини з [GetCountry('ENG').GetNameWithNoTooltip]"
  war_of_the_roses.103.desc: "Новий правитель Англії, [GetCountry('ENG').GetGovernment.GetRuler.GetName], не забув нашої допомоги під час Війни троянд. Як і очікувалося, відносини між нашими країнами значно покращилися."
  war_of_the_roses.103.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  eng_support_during_war_of_the_roses: "Підтримка під час Війни троянд"
  war_of_the_roses.104.title: "Відносини з Англією погіршуються"
  war_of_the_roses.104.desc: "Після остаточного придушення повстання Дому Ланкастерів, [GetCountry('ENG').GetGovernment.GetRuler.GetName] тепер звернув свою увагу на тих, хто підтримував заколот, як внутрішньо, так і зовнішньо."
  war_of_the_roses.104.a: "Ох..."
  eng_supported_rebels_during_war_of_the_roses: "Підтримували повстанців під час Війни троянд"
  war_of_the_roses.104.b: "Добре, що ми цього не зробили!"
  eng_didnt_support_rebels: "Не підтримували повстанців під час Війни троянд"
  war_of_the_roses.105.title: "Відносини з Англією погіршуються"
  war_of_the_roses.105.desc: "Після остаточного придушення повстання Дому Йорків, [GetCountry('ENG').GetGovernment.GetRuler.GetName] тепер звернув свою увагу на тих, хто підтримував заколот, як внутрішньо, так і зовнішньо."
  war_of_the_roses.105.a: "Ох..."
  war_of_the_roses.105.b: "Добре, що ми цього не зробили!"