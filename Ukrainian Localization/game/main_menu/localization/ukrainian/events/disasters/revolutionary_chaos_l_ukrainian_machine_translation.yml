l_english:
  revolution_side: "Революція"
  monarchists_side: "Монархічний рух"
  revolutionary_chaos_sided_with_revolution_tt: "#Y Ефекти вище відбуваються тому, що ми стали на бік $revolution_side$#!\n"
  revolutionary_chaos_sided_with_monarchists_tt: "#Y Ефекти вище відбуваються тому, що ми стали на бік $monarchists_side$#!\n"
  revolutionary_chaos.1.title: "Хаос у [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  revolutionary_chaos.1.desc: "Ті, хто вважав, що Революція та [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] стануть відповідями на нестабільність [ROOT.GetCountry.GetName], дедалі більше розчаровуються. Зростаючі заворушення, що охоплюють нашу націю, спричиняють широкі страждання як серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], так і серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')].\n\nПрихильники Революції стають дедалі завзятішими, звинувачуючи в недоліках нового режиму «Ворогів Революції», незалежно від їхньої фактичної приналежності до консервативних поглядів. Тим часом контрреволюційний рух, очолюваний залишками старої [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], має на меті відновити стару [ShowGovernmentTypeName('monarchy')]."
  revolutionary_chaos.1.a: "Революція має перемогти!"
  revolutionary_chaos.1.a.tt: "Ми станемо на бік #Y $revolution_side$#!, що дозволить [Concept('events', 'CONCEPT_PLACEHOLDER')|e] щодо протистояння $monarchists_side$"
  revolutionary_chaos.1.b: "Займемо більш консервативний підхід до нашої ситуації."
  revolutionary_chaos.1.b.tt: "Ми станемо на бік #Y $monarchists_side$#!, що дозволить [Concept('events', 'CONCEPT_PLACEHOLDER')|e] щодо протистояння $revolution_side$"
  revolutionary_chaos.2.title: "Релігійна нетерпимість"
  revolutionary_chaos.2.desc: "З поширенням нових ідей у нашій нації виникли жваві дебати щодо становища релігійних меншин у [ROOT.GetCountry.GetName]. У той час як прихильники релігійної свободи скористалися нагодою закликати до реформ для покращення становища послідовників [target_location.GetDominantReligion.GetAdjective] віри та інших меншин у країні, реакціонери наполягають на повномасштабному придушенні їх. Ймовірні жорстокі зіткнення, якщо це питання не буде вирішено належним чином."
  revolutionary_chaos.2.a: "Одна нація, одна віра."
  revolutionary_chaos.2.b: "Терпіти всі вірування."
  revolutionary_chaos.3.title: "$serfdom_focus$"
  revolutionary_chaos.3.desc: "Серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] нашого суспільства назріває невдоволення через важкий тягар, покладений на їхні плечі. Їхній спротив маноріалізму, високим податкам та нестачі продовольства призвів до кількох повстань по всій країні."
  revolutionary_chaos.3.a: "Обмежити $serfdom_focus$."
  revolutionary_chaos.3.a.tt: "[ShowPopTypeName('peasants')] та [ShowPopTypeName('laborers')] у [ROOT.GetCountry.GetCapital.GetRegion.GetName] приєднуються до [target_rebel.GetName] та втрачають [target_pop_for_loc.MakeScope.ScriptValue('pop_satisfaction_ultimate_penalty')|+2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  revolutionary_chaos.3.b: "Тримати маси в ланцюгах."
  revolutionary_chaos.4.title: "Соціальна реформа"
  revolutionary_chaos.4.desc: "Жваві дискусії серед наших філософів про соціальні реформи та чесноти розуму мали великий вплив на значну частину нашого населення. [target_character.GetName] починає побоюватися, що деякі з них будуть занадто легко піддаватися впливу смутьянів, і що їхні бунтівні дії ще більше збільшать нестабільність нашої країни."
  revolutionary_chaos.4.a: "Придушити вільнодумців."
  revolutionary_chaos.4.b: "Вони навряд чи становлять загрозу."
  revolutionary_chaos.5.title: "Бюрократія [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip]"
  revolutionary_chaos.5.desc: "Роки безгосподарності залишили наш централізований уряд у дуже корумпованому та роздутому стані, що ускладнює прийняття будь-яких політик для покращення ситуації. Однією з ключових революційних вимог є децентралізація влади та послаблення бюрократії, щоб не придушувати підприємницькі класи. Звісно, такі дії занепокоять реакціонерів, але бездіяльність може викликати гнів ентузіастів Революції."
  revolutionary_chaos.5.a: "Зменшити бюрократію."
  revolutionary_chaos.5.b: "Розширити бюрократію."
  revolutionary_chaos.6.title: "$STATIC_MODIFIER_NAME_the_reign_of_terror$ у [ROOT.GetCountry.GetNameWithNoTooltip]"
  revolutionary_chaos.6.desc: "Не всі задоволені курсом, який взяла Революція. Реакціонери повсюди, завжди шукають нагоди повалити [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName]. Це привело до влади в Національній Асамблеї войовничо-радикальну фракцію на чолі з певним [target_character.GetName]. Вони агітують за кампанію з викорінення «ворога всередині» шляхом масових арештів «імовірних» роялістських симпатиків та широкого застосування мадам Гільйотини."
  revolutionary_chaos.6.a: "Стратити ворогів Революції!"
  reign_of_terror_tt: "Ми вмикаємо додаткові [Concept('events', 'CONCEPT_PLACEHOLDER')|e] про переслідування ворогів революції"
  revolutionary_chaos.6.b: "Проявити поблажливість."
  revolutionary_chaos.7.title: "Кінець Терору"
  revolutionary_chaos.7.desc: "[ShowModifier('the_reign_of_terror')] призвів до масових вбивств незліченної кількості людей [ROOT.GetCountry.GetLongName] в ім'я [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName]. Щойно одна загроза була усунена, як наступна була ідентифікована та знищена."
  revolutionary_chaos.7.desc.robespierre: "$revolutionary_chaos.7.desc$ Нещодавно [target_character.GetName] виголосив(-ла) особливо жорстоку промову, в якій [target_character.GetSheHe] засудив(-ла) і вимагав(-ла) арешту зрадників у Комітетах громадської безпеки та загальної безпеки. Це викликало широкий страх і обурення серед лідерів Революції, які побоюються чергової чистки своїх лав. Національна Асамблея вже рухається до того, щоб вимагати [target_character.GetHerHis] арешту та приборкати найгірші ексцеси [target_character.GetHerHis] Правління Терору, повернувши стабільність до королівства та забезпечивши, щоб ніхто не міг використати хаос як привід для відновлення монархії.\n\nОднак, схоже, що [target_character.GetLastNameWithNoTooltip] все ще має багато прихильників, які, безсумнівно, прагнутимуть захистити [target_character.GetHerHim], якщо ми не діятимемо швидко."
  revolutionary_chaos.7.desc.fallback: "$revolutionary_chaos.7.desc$ Побоюючись, що вони можуть бути наступними – адже це «Сьогодні ти, завтра я» – Національна Асамблея об'єдналася, щоб покласти край Терору, скинувши [target_character.GetName] та заснувавши Директорію, яка поверне стабільність до королівства та забезпечить, щоб ніхто не міг використати хаос як привід для відновлення монархії."
  revolutionary_chaos.7.a: "Хто з мечем прийде, той від меча й загине."
  revolutionary_chaos.7.b: "Арештувати [target_character.GetLastNameWithNoTooltip]!"
  revolutionary_chaos.7.c: "Терор триватиме. Вороги Народу, стережіться!"
  revolutionary_chaos.8.title: "$STATIC_MODIFIER_NAME_the_counter_revolution$ у [ROOT.GetCountry.GetNameWithNoTooltip]"
  revolutionary_chaos.8.desc: "З моменту прийняття ідеалів революції анархія в [ROOT.GetCountry.GetName] лише посилилася. Щоб протидіяти цьому, наш уряд обрав більш консервативних членів старого суспільства, щоб провести крихку [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] через важкі часи. Ці контрреволюціонери, очолювані [target_character.GetName], тепер закріпилися в Національній Асамблеї і намагаються відновити порядок шляхом широкого застосування різноманітних методів страти, щоб приборкати бездумні маси."
  revolutionary_chaos.8.a: "Порядок має бути відновлений за будь-яку ціну!"
  counter_revolution_tt: "Ми вмикаємо додаткові [Concept('events', 'CONCEPT_PLACEHOLDER')|e] про боротьбу проти фанатиків революції"
  revolutionary_chaos.8.b: "Ми не можемо повернутися назад. Революція повинна просуватися!"
  revolutionary_chaos.9.title: "Кінець $STATIC_MODIFIER_NAME_the_counter_revolution$"
  revolutionary_chaos.9.desc: "[ShowModifier('the_counter_revolution')] намагався приборкати анархію та руйнування, спричинені Революцією. Однак, зрештою, революційні, антимонархічні настрої сильні як ніколи, і будь-яка форма порядку була лише замінена безцільними масовими арештами та стратами. Контрреволюціонери Національної Асамблеї звинувачують у цих невдачах [target_character.GetName] і вимагають [target_character.GetHerHis] негайного вигнання. Тим часом інші консервативні сили в асамблеї стверджують, що методи [target_character.GetShortNameWithNoTooltip] працюють, і звинувачують асамблею в тому, що вона наповнена революціонерами. Ця роз'єднаність може призвести до припинення контрреволюційних зусиль, якщо не вжити швидких заходів."
  revolutionary_chaos.9.a: "$STATIC_MODIFIER_NAME_the_counter_revolution$ явно підвів(-ла) нас усіх."
  revolutionary_chaos.9.b: "Доки хоч одна революційна думка активна, $STATIC_MODIFIER_NAME_the_counter_revolution$ має тривати!"
  revolutionary_chaos.101.title: "Зрада проти Революції"
  revolutionary_chaos.101.desc: "[target_character.GetName], найдовіреніший радник [ROOT.GetCountry.GetFlavorRank], часто критикував(-ла) Правління Терору, розв'язане [target_robespierre.GetName] та революційним урядом. В очах Комітету громадської безпеки це робить [target_character.GetHerHim] небезпечним реакціонером і Ворогом Народу, якого небезпечно залишати живим."
  revolutionary_chaos.101.a: "Ще одна душа для гільйотини."
  revolutionary_chaos.101.b: "Ми пощадимо [target_character.GetHerHim]."
  revolutionary_chaos.102.title: "Вороги в [target_province.GetNameWithNoTooltip]"
  revolutionary_chaos.102.title.fallback: "Вороги в провінції"
  revolutionary_chaos.102.desc: "Небезпечні, контрреволюційні думки поширюються в [target_province.GetName]! Ходять чутки, що вони планують організувати повстання проти славетної [ROOT.GetCountry.GetLongName] і знову спробувати встановити #italic ancien régime#!"
  revolutionary_chaos.102.a: "Виносьте гільйотини!"
  mass_pops_execution_tt: "#R 10%#! [Concept('population', 'CONCEPT_PLACEHOLDER')|e] в [target_province.GetName] страчується за зраду Революції"
  counter_revolutionaries: "Контрреволюціонери"
  revolutionary_chaos.102.b: "Це лише чутки"
  counter_rev_rebellion_might_start_tt: "Може спалахнути #R контрреволюційне#! [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e]"
  revolutionary_chaos.103.title: "Панування Терору"
  revolutionary_chaos.103.desc: "Часті чистки змусили ворогів Революції тремтіти від жаху. Ніхто не наважується підняти голос проти курсу, встановленого урядом, залишаючи країну єдиною, як ніколи раніше. Вся хвала [target_character.GetName]!"
  revolutionary_chaos.103.a: "Якщо вони не можуть любити нас, нехай бояться нас."
  revolutionary_chaos.104.title: "Чистка придворних"
  revolutionary_chaos.104.desc: "[target_character.GetName] знайшов більше ворогів [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] у наших власних лавах! Багато придворних – слуг уряду – виявилися ненадійними, і тому відчують милість клинка."
  revolutionary_chaos.104.a: "На гільйотину їх. Легко і просто."
  revolutionary_chaos.201.title: "Республіканізм під питанням"
  revolutionary_chaos.201.desc: "Консервативні погляди [target_character.GetName] можливо, знайшли визнання у [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], але принесли велике розчарування членам колишнього Третього стану. Багато хто сумнівається, чи є наша держава справді [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] ще."
  revolutionary_chaos.201.a: "Але, звісно, ми є!"
  revolutionary_chaos.202.title: "Революціонери [target_province.GetName]"
  revolutionary_chaos.202.title.fallback: "Революціонери провінції"
  revolutionary_chaos.202.desc: "Революціонери зібралися в [target_province.GetName], щоб підірвати нашу владу. Вони вимагають зміни курсу або погрожують захопити [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] і відрубати нам голови."
  revolutionary_chaos.202.a: "Підемо на компроміси з ними."
  revolutionary_chaos.202.b: "Нехай повстають. Ми залишаємося вірними нашій справі."
  rev_rebellion_might_start_tt: "Усі [ShowPopTypeName('burghers')] та [ShowPopTypeName('peasants')] з [target_province.GetName] приєднуються до [target_rebel.GetName] і втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  revolutionary_rebels: "Революційні повстанці"
  revolutionary_chaos.203.title: "Піднесення [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  revolutionary_chaos.203.desc: "Завдяки колективним зусиллям Національної Асамблеї щодо підтримання порядку, стара соціальна ієрархія почала оговтуватися від жахів Революції. Особливо [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] присягають на вірність [target_character.GetName]."
  revolutionary_chaos.203.a: "Нехай це призведе до швидкого відновлення держави."
  revolutionary_chaos.204.title: "Революціонери покидають країну"
  revolutionary_chaos.204.desc: "[target_character.GetName] та багато наших компетентних та впливових радників і придворних були досить розчаровані нашим підходом і вирішили покинути [ROOT.GetCountry.GetLongName]. Іронія їхньої втечі до монархій, очевидно, для них втрачена."
  revolutionary_chaos.204.a: "Скатертиною дорога!"
  revolutionary_chaos.205.title: "Заснування [ShowGovernmentTypeNameWithNoTooltip('monarchy')]"
  revolutionary_chaos.205.desc: "Контрреволюція досягла значного прогресу у стримуванні та послабленні анархічних ідеалів сліпої маси. Завдяки хірургічному використанню шантажу, розкрадання та погроз насильства, романтизовані ідеї Революції є лише макабричним жартом у [ROOT.GetCountry.GetName]. Внаслідок мертвої Революції, голоси закликають до встановлення класичної [ShowGovernmentTypeName('monarchy')] у нашій країні."
  revolutionary_chaos.205.a: "Повернімо [target_character.GetNameWithNoTooltip]!"
  revolutionary_chaos.205.b: "[target_character.GetNameWithNoTooltip] правитиме [ROOT.GetCountry.GetNameWithNoTooltip]!"
  revolutionary_chaos.205.c: "Можливо, ми втратили з поля зору, що повинна означати Революція."
  revolutionary_chaos.1000.title: "Доля правителя"
  revolutionary_chaos.1000.desc: "З часів Революції, [target_character.GetName] та решта правлячого класу старого режиму перебували під домашнім арештом у своєму палаці, де [target_character.GetSheHe] перетворився на неохочого маріонетку нового уряду. Хоча [target_character.GetSheHe] обіцяв гарантувати соціальні досягнення Революції, [target_character.GetSheHe] не приховував [target_character.GetHerHis] презирства до [target_character.GetHerHis] великої втрати влади, і натомість планував втекти та шукати притулку у наших ворогів у [target_country.GetName], звідки [target_character.GetSheHe] сподівався, що [target_character.GetSheHe] може бути відновлений як правитель [ROOT.GetCountry.GetName]. Однак, революційні сили перехопили [target_character.GetHerHim] до того, як [target_character.GetSheHe] зміг перетнути кордон.\n\nЦе надихнуло всіх тих, хто зневажає #italic ancien régime#! і бажає назавжди позбавити нас їхнього лиха. Вони притягли [target_character.GetHerHim] перед Національну Асамблею, щоб судити за звинуваченнями у змові з іноземними державами і, таким чином, у зраді. Якщо [target_character.GetSheHe] буде визнаний винним, [target_character.GetSheHe] буде змушений зректися престолу, позбавлений усіх титулів і засуджений до страти на гільйотині. Однак, напруга зростає, і голосування, ймовірно, буде дуже близьким."
  revolutionary_chaos.1000.a: "361 голос за і 360 проти страти."
  every_non_revolutionary_monarchy_dislikes_us_tt: "Кожна відома [ShowGovernmentTypeName('monarchy')] змінює свою [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] щодо [ROOT.GetCountry.GetName] на [ShowBiasValue('opinion_guelphs_support_imperial_rivals')|-0]"
  revolutionary_chaos.1000.b: "361 голос проти і 360 за страту."
  revolutionary_chaos.1001.title: "Контрреволюційне повстання"
  revolutionary_chaos.1001.title.FRA: "Шуанське повстання"
  revolutionary_chaos.1001.desc: "Невдоволення ходом Революції досягло апогею зі стратою попереднього правителя. Багато хто тепер шкодує про повалення старого режиму, який пропонував відносну стабільність, якщо не свободу. Члени [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у [target_area.GetName] об'єдналися, щоб розпочати широкомасштабне повстання проти нинішнього режиму у підступній змові з метою повалення [ROOT.GetCountry.GetLongName]!"
  revolutionary_chaos.1001.a: "Ми їх розчавимо."
  rev_revolting_area_tt: "Кожен не-[ShowPopTypeName('burghers')] у [target_area.GetName] приєднується до [target_rebel.GetName] і втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  revolutionary_chaos.1100.title.specific: "[target_character.GetNameWithNoTooltip]"
  revolutionary_chaos.1100.title: "Виникає великий військовий лідер"
  revolutionary_chaos.1100.desc: "Хаос Революції та загрози іноземного втручання дали амбітним молодим офіцерам шанс проявити себе – шанс, який повністю використав [target_character.GetName], [target_character.GetCulture.GetName] лейтенант артилерії. [target_character.GetHerHis|U] успіх у кількох боях приніс [target_character.GetHerHim] популярність. Нещодавно [target_character.GetSheHe] самотужки придушив монархічне повстання у [ROOT.GetCountry.GetCapital.GetName], розгорнувши важкі гармати на вулицях міста, успіх цієї рішучої дії приніс [target_character.GetHerHim] обожнювання народу. Вже багато лідерів Революції прихильно ставляться до [target_character.GetHerHim] і наполягають на підвищенні [target_character.GetHerHim] до високої посади. Однак, [target_character.GetSheHe] – [target_character.GetWomanMan] великих амбіцій, який може не задовольнитися лише званням генерала."
  revolutionary_chaos.1100.a: "Станьмо свідками [target_character.GetHerHis] досягнень!"
  revolutionary_chaos.1101.title: "[ShowGovernmentReformNameWithNoTooltip('revolutionary_autocracy')]"
  revolutionary_chaos.1101.desc: "Поточна [ShowDisasterName('revolutionary_chaos')] залишила [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] пораненою та понівеченою. Було багато голосів проти революційних ідеалів; багато спроб відновити #italic ancien régime#!.\n\nТим часом [target_character.GetName] продовжує служити [ROOT.GetCountry.GetLongName] не лише з вірністю, але й з видатними результатами. [target_character.GetSheHe|U] здобуває все більше прихильників серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] та військових, надаючи [target_character.GetHerHim] непередбачений політичний вплив. [target_character.GetWomanMan] як [target_character.GetHerHim] неодмінно скористається нагодою, щоб взяти владу в державі."
  revolutionary_chaos.1101.a: "Хай буде так! Нехай [target_character.GetShortNameWithNoTooltip] править [ROOT.GetCountry.GetNameWithNoTooltip]!"
  revolutionary_chaos.1101.b: "Нам не потрібен ще один Цезар!"
  bonaparte_rebels: "Повстанці перевороту"
  bonaparte_rebels_rise_up_tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [ROOT.GetCountry.GetCapital.GetArea.GetName] приєднується до [target_rebel.GetName] і втрачає [ShowNamedValue('pop_satisfaction_radical_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  revolutionary_chaos.1102.title: "Пекельна машина"
  revolutionary_chaos.1102.desc.middle_part: "Роялістські змовники сховали свою бомбу в бочці на возі, припаркованому неподалік від місця, де [target_character.GetShortName] мав пройти дорогою до театру, щоб насолодитися спокоєм. Названа «Пекельною машиною», бомба була наповнена порохом, легкозаймистими матеріалами та кулями, і приведена в дію за допомогою довгого запалу."
  revolutionary_chaos.1102.desc.dead_napoleon: "Нашого улюбленого [ROOT.GetCountry.GetGovernment.GetRulerTitle] було вбито! $revolutionary_chaos.1102.desc.middle_part$ Вибух пролунав саме тоді, коли [target_character.GetShortNameWithNoTooltip] наблизився, миттєво вбивши [target_character.GetHerHim]."
  revolutionary_chaos.1102.desc: "Була спроба замаху на життя нашого улюбленого [ROOT.GetCountry.GetGovernment.GetRulerTitle]! $revolutionary_chaos.1102.desc.middle_part$ Вибух убив кількох перехожих, але не зашкодив [target_character.GetShortNameWithNoTooltip]."
  revolutionary_chaos.1102.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  revolutionary_chaos.1102.b: "Щаслива втеча."
  revolutionary_chaos.1103.title: "Прагнення імперії"
  revolutionary_chaos.1103.desc: "Не задовольняючись лише тим, що є правителем [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName], [target_character.GetName] пропонує, щоб [target_character.GetSheHe] був коронований [target_character.Custom('GetEmpressEmperor')] [ROOT.GetCountry.GetCulture.GetName]. [target_character.GetSheHe|U] виправдовує це тим, що відновлення спадкової наступності ускладнило б повернення колишнього правителя [ROOT.GetCountry.GetNameWithNoTooltip] до влади — зрештою, було кілька роялістських змов на життя [target_character.GetHerHis] — але мало сумнівів, що головною мотивацією [target_character.GetHerHis] є подальше просування [target_character.GetHerHis] власних амбіцій щодо верховної влади. Пропозиція зустріла широку підтримку серед населення, яке прагне відносної стабільності дореволюційних років; однак, запеклі прихильники Революції висловлюють занепокоєння цією спробою зосередити ще більше влади в руках [target_character.GetShortNameWithNoTooltip]."
  revolutionary_chaos.1103.a: "[ROOT.GetCountry.GetNameWithNoTooltip] буде [ShowGovernmentReformNameWithNoTooltip('revolutionary_empire')]!"
  revolutionary_chaos.1103.b: "Революція має тривати!"
  revolutionary_chaos.300.title: "Спокійніші часи"
  revolutionary_chaos.300.desc.rev_republic: "Час повстань і постійної нестабільності, здається, позаду. Революція успішно трансформувала наше суспільство, змела старе і оновила державу. Речі ніколи не будуть такими, як раніше. [ROOT.GetCountry.GetLongName] перемагає у світі, де домінують абсолютні монархії!"
  revolutionary_chaos.300.desc.rev_autocracy: "Велика [ROOT.GetCountry.GetLongName] нарешті позбулася своєї політичної та економічної нестабільності завдяки масштабним реформам та авторитету [target_character.GetName]. Хоча дехто може сказати, що мало різниці між [target_character.GetShortNameWithNoTooltip] та звичайним абсолютним монархом, [target_character.GetHerHis] результати говорять про [target_character.GetHerHis] компетентність як лідера [ROOT.GetCountry.GetAdjectiveWithNoTooltip] народу."
  revolutionary_chaos.300.desc.failed_rev: "Час повстань і постійної нестабільності, здається, позаду. Революція зазнала цілковитої невдачі, оскільки лише деякі зі старих проблем третього стану були справді вирішені, тоді як страждання [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] були значною мірою проігноровані. Через внутрішні та зовнішні недоліки ідеали Революції більше не існують, і багато наших людей обтрушують символи #italic ancien régime#!."
  revolutionary_chaos.300.desc: "Повстання нарешті закінчилися. Хоча збитки поточної [ROOT.GetCountry.GetLongName] ще належить виміряти, конфлікт між революціонерами та реакціонерами залишив нас у вразливому становищі на багато років вперед."
  revolutionary_chaos.300.a: "Хай живе [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip]!"
  revolutionary_chaos.300.b: "Хай живе [target_character.GetShortNameWithNoTooltip]!"
  revolutionary_chaos.300.c: "Принаймні конфлікт закінчився."