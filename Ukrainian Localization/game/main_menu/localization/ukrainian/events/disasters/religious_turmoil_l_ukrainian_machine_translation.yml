l_english:
  religious_turmoil.1.title: "Релігійні громадянські заворушення"
  religious_turmoil.1.desc: "Попри зусилля країни щодо посередництва між різними релігійними групами в нашій державі, конфлікти спалахують регулярно. Ситуація погіршилася, і без рішучих заходів ми незабаром будемо охоплені релігійною громадянською війною."
  religious_turmoil.1.a: "Викорінити єретиків, щоб принести мир"
  religious_turmoil.1.b: "Ми повинні прагнути до толерантного суспільства"
  religious_turmoil.2.title: "Кінець релігійних заворушень"
  religious_turmoil.2.desc: "Наша країна оговталася від згубних розколів релігійних заворушень і тепер є єдиним цілим."
  religious_turmoil.2.a: "Одна Віра!"
  religious_turmoil.3.title: "Зростаюча кількість єретиків"
  religious_turmoil.3.desc: "Попри суворі спроби викорінити єресь, населення деяких наших провінцій міцно прив'язане до своєї віри і все ще чинить опір наверненню."
  religious_turmoil.3.a: "Вигнати нонконформістів"
  religious_turmoil.3.a.tt: "Деякі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що не сповідують [ROOT.GetCountry.GetReligion.GetName], втрачають [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  religious_turmoil.3.b: "Збільшити фінансування для навернення єретиків"
  religious_turmoil.4.title: "Підкорення єретиків"
  religious_turmoil.4.desc: "Жорстоке підкорення єретиків нашою країною не принесло очікуваних результатів. Замість відновлення порядку та об'єднання нашої нації під однією релігійною вірою, наші дії ще більше розбурхали населення, що призвело до зростання насильства та актів жорстокості."
  religious_turmoil.4.a: "Збільшити фінансування для придушення єретиків"
  religious_turmoil.4.b: "Ігнорувати їх"
  religious_turmoil.5.title: "Зростання релігійної нетерпимості"
  religious_turmoil.5.desc: "Хоча були зроблені спроби перетворити наше суспільство на більш толерантне, спалахи насильства та заворушення стають все частішими. Насильство загострилося, і звірства чиняться з обох сторін, розширюючи релігійну прірву та загрожуючи розірвати нашу країну зсередини."
  religious_turmoil.5.a: "Єретики повинні бути придушені"
  religious_turmoil.5.b: "Ми повинні навернути їх до єдиної істинної віри"
  religious_turmoil.6.title: "Пусті слова"
  religious_turmoil.6.desc: "Едикт про толерантність, проголошений зовсім нещодавно, виявився не більше ніж порожніми словами. З моменту декларації сталося кілька насильницьких інцидентів та звірств проти релігійних меншин, де [ROOT.GetCountry.GetName] зайняла позицію повного ігнорування."
  religious_turmoil.6.a: "Наш час краще витратити на щось інше"
  religious_turmoil.6.b: "Видати новий едикт"