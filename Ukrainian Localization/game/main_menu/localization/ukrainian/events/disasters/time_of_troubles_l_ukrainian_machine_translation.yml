l_english:
  time_of_troubles.1.title: "[ShowDisasterNameWithNoTooltip('time_of_troubles')]"
  time_of_troubles.1.desc: "Повітря важчає від відчаю, коли шепіт повстання шириться, мов лісова пожежа. Колись могутній [ROOT.GetCountry.GetFlavorRank] хитається під тягарем слабкого керівництва та неврожаїв. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], неспокійні та осмілілі, плетуть інтриги проти [ROOT.GetCountry.GetGovernment.GetCourtTitle], тоді як селянство, голодне та зневірене, піднімається на повстання. Іноземні держави кружляють, мов стерв'ятники, прагнучи скористатися хаосом. Коли тіні згущуються над землею, починається [ShowDisasterName('time_of_troubles')], бурхлива епоха, яка випробує мужність і стійкість народу. Чи вистоїть нація, чи буде зметена бурею безладу?"
  time_of_troubles.1.historical_info: "Смутні часи тривали від смерті останнього царя 700-річної династії Рюриковичів, Федора Івановича, у 1598 році, до сходження на престол Михайла Федоровича з династії Романових у 1613 році. Голод, чума, громадські заворушення та поява самозванців занурили країну в десятиліття потрясінь, оскільки сусідні держави, такі як Швеція та Польща, побачили свій шанс втрутитися."
  time_of_troubles.1.a: "Наша завзятість допоможе нам вистояти."
  time_of_troubles.2.title: "Безумство"
  time_of_troubles.2.desc: "Протягом останніх кількох місяців непередбачувана поведінка [target_character.GetShortName] стає дедалі більшою проблемою для [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ROOT.GetCountry.GetFlavorRank] загалом. Те, що починалося як незначні дивацтва, переросло в непередбачувані та часто руйнівні дії, які залишають радників і придворних у стані неспокою.\n\nДеякі пошепки говорять, що [target_character.GetSheHe] повністю втратив [target_character.GetHerHis] розум, вказуючи на дивні спалахи, химерні рішення та очевидну відірваність від реальності. Тепер над нацією важко висить питання: як довго може тривати ця нестабільність, перш ніж вона почне руйнувати структуру управління?"
  time_of_troubles.2.a: "Нехай [target_character.GetShortNameWithNoTooltip] тримається за владу."
  time_of_troubles.2.b: "Ми довіримося [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], які підтримують [target_character_2.GetShortNameWithNoTooltip]!"
  time_of_troubles.3.title: "Заповідні літа"
  time_of_troubles.3.desc: "Наш великий [ROOT.GetCountry.GetFlavorRank] міцно стиснутий внутрішніми силами, що мають великий вплив. Ті з нас, хто прагне примножити свої статки, роблять це, часто тиснучи на [target_character.GetName], намагаючись спрямувати [target_character.GetHerHis] політичні рішення.\n\nНещодавно група, що складається з могутніх [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], виступила з вимогою безпрецедентного скорочення прав [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Їхнє виправдання обертається навколо очевидної необхідності стабілізації землеволодінь у часи фінансових труднощів. Такий захід, безумовно, пройде крізь наше суспільство, формуючи [ROOT.GetCountry.GetFlavorRank] на роки вперед."
  time_of_troubles.3.a: "Схвалити захід."
  time_of_troubles.3.b: "Це зрада нашого народу!"
  time_of_troubles.3.historical_info: "Закріпачення російських селян у XVI столітті було поступовим процесом, зумовленим державною політикою та соціально-економічними змінами. Спочатку селяни мали певну свободу пересування між маєтками, особливо під час сільськогосподарського сезону. Однак у 1581 році Іван IV запровадив #italic Заповідні літа#! (заповідні літа), тимчасово обмежуючи пересування селян для стабілізації податкових надходжень та забезпечення робочої сили для землевласників. На жаль, з часом ці заходи стали постійними."
  time_of_troubles.4.title: "Голод спускається на нас"
  time_of_troubles.4.desc: "Останні роки мали жахливий вплив на багатьох [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Розбійники, чума та економічна нестабільність тероризують землю. Тепер, неврожаї та несезонна погода, схоже, спричинили жахливий голод у [target_area.GetName]. Незабаром настане масове голодування, і наші радники прогнозують багато смертей від цього нещастя.\n\nВідчайдушні біженці стікаються до [target_province.GetName], включаючи [target_location.GetName], перевантажуючи місцеві ресурси та поширюючи хаос. Масштаби катастрофи посилюють економічний колапс і поглиблюють заворушення, створюючи сприятливий ґрунт для повстань по всьому [ROOT.GetCountry.GetFlavorRank]."
  time_of_troubles.4.a: "Ми не допоможемо їм."
  time_of_troubles.4.b: "Надішліть усі припаси, які ми можемо виділити!"
  pops_in_target_area_suffer_10_sat_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  time_of_troubles.5.title: "Жах розбійників"
  time_of_troubles.5.desc: "Недавні голоди та руйнівні спалахи чуми занурили більшу частину країни в хаос, залишивши цілі райони на милість долі. У [target_area.GetName] крах порядку перетворив територію на беззаконну пустку.\n\nБанди озброєних розбійників тепер безконтрольно бродять сільською місцевістю, грабуючи села, влаштовуючи засідки на мандрівників і тероризуючи вже й так зневірене місцеве населення. Відсутність влади залишила людей напризволяще, з невеликою надією на допомогу, оскільки решта [ROOT.GetCountry.GetFlavorRank] намагається оговтатися від власних потрясінь."
  time_of_troubles.5.a: "Нехай роблять, що хочуть."
  time_of_troubles.5.b: "Надіслати кошти для допомоги місцевим чиновникам."
  time_of_troubles.5.c: "Можливо, їхнього лідера можна було б схилити на свій бік посадою чи титулом?"
  every_location_in_area_severe_penalty_control_and_10_pop_sat_loss_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetNameWithNoTooltip] втратить [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e], а її [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_location_in_area_mild_penalty_control_tt: "Наше [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetNameWithNoTooltip] втратить лише [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] завдяки отриманій допомозі"
  every_location_in_area_mild_penalty_control_brigand_leader_tt: "В обмін на посаду в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character_2.GetShortName] здебільшого припинить незаконну діяльність у [target_area.GetNameWithNoTooltip]"
  time_of_troubles.6.title: "Фальшивий спадкоємець"
  time_of_troubles.6.desc: "[target_character_2.GetWomanMan], на ім'я [target_character_2.GetShortName], з'явився і стверджує, що є нібито померлим молодшим [target_character_2.GetSisterBrother] [target_dead_heir.GetName] – і, таким чином, законним претендентом на [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Цей [target_character_2.GetShortNameWithNoTooltip] швидко привернув прихильників по всьому [ROOT.GetCountry.GetFlavorRank] і особливо серед наших суперників.\n\nПротягом останніх місяців [target_character_2.GetShortNameWithNoTooltip] перетнув кордон до [ROOT.GetCountry.GetNameWithNoTooltip] разом із загоном іноземних та місцевих військ. Здається, [target_character_2.GetSheHe] вже має сильну підтримку від тих, хто бажає нашої поразки."
  time_of_troubles.6.historical_info: "У 1604 році, під час хаотичної Смути в Росії, з'явилася таємнича постать, яка стверджувала, що є Дмитром, давно померлим сином Івана Грозного. Цей «Лжедмитрій», підтриманий польськими шляхтичами та Католицькою Церквою, пронісся Росією з обіцянками стабільності. Багато хто вірив йому, відчайдушно прагнучи порядку серед голоду та боротьби за владу. Зрештою, він був коронований царем у 1605 році, хоча його правління було коротким. Його іноземні прихильники та розкішні реформи відштовхнули московську еліту. Всього через рік жорстокий переворот обірвав його життя. Однак легенда про Лжедмитрія збереглася, породивши більше самозванців, оскільки Росія занурювалася глибше в безлад."
  time_of_troubles.6.a: "[target_character_2.GetHerHis|U] претензія є образою для нас."
  fake_dmitry_pretender_rebels: "Повстанці-фальшиві претенденти"
  rebellion_may_attract_foreign_aid_tt: "[target_rebel.GetName] може запросити допомогу проти нас з-за кордону"
  time_of_troubles.7.title: "Продовольчі бунти"
  time_of_troubles.7.desc: "Інтенсивна зміна клімату, у поєднанні з роками аномальних морозів, перетворила багато наших колись родючих полів на безплідні пустки. Фермери, які залежать від сільськогосподарської продукції, майже втратили свою гідність і той невеликий соціальний статус, який вони колись мали. Розлючені натовпи тепер блукають вулицями ключових поселень по всьому [target_area.GetName], висловлюючи своє невдоволення правлінням [target_character.GetName], погрожуючи відкрито повстати."
  time_of_troubles.7.a: "Прокляті селяни!"
  every_pop_in_area_loses_15_sat_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  time_of_troubles.8.title: "Повстання Хлопка"
  time_of_troubles.8.desc: "Закріпачення [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], у поєднанні з голодом, чумою та неконтрольованим розбоєм, призвело до кульмінації великого повстання, яке загрожує дестабілізувати та охопити весь [ROOT.GetCountry.GetFlavorRank]."
  time_of_troubles.8.a: "Прокляття!"
  time_of_troubles.8.historical_info: "Повстання Хлопка 1603 року було селянським повстанням у Росії під час Смутного часу. Очолюване Хлопком Косолапом, повстання охопило селян, втікачів-кріпаків та козаків, які протестували проти жорсткої політики закріпачення та економічних труднощів. Вони нападали на маєтки та звільняли кріпаків, кидаючи виклик дворянській владі."
  khlopko_rebellion: "Повстання Хлопка"
  time_of_troubles.9.title: "Справедлива справа?"
  time_of_troubles.9.desc: "[target_character_3.GetWomanMan], яка стверджує, що належить до династії [target_dynasty.GetName], давно втрачена сестра/брат [target_character_2.GetName], з'явилася в [target_country.GetName], кидаючи виклик владі [target_character.GetName]. [target_character_3.GetSheHe|U] надіслала посланців, шукаючи нашої допомоги, обіцяючи завдати смертельного удару нашому ворогу. Підтримка цієї справи може послабити нашого суперника, але це може спровокувати жорстоку відповідь від [target_location.GetName]. Чи варто нам ризикувати [target_character_3.GetHerHis] успіхом?"
  time_of_troubles.9.a: "Щедро фінансувати [target_character_3.GetHerHis] зусилля!"
  time_of_troubles.9.b: "Ми можемо пожертвувати трохи монет, так."
  time_of_troubles.9.c: "Переговори з повстанцями нижче нашої гідності."
  tot_we_may_not_get_another_chance_tt: "Ми можемо не отримати іншого шансу підтримати цю справу"
  time_of_troubles.10.title: "Криза в [target_country.GetNameWithNoTooltip]"
  time_of_troubles.10.desc: "[ShowDisasterName('time_of_troubles')] охопила [target_country.GetName], залишивши її армії ослабленими, а кордони вразливими. Оскільки в їхньому [target_country.GetFlavorRank] панує хаос, [target_province.GetName], стратегічна провінція на нашому кордоні, залишається відкритою. Висунення наших претензій зараз може розширити наш [ROOT.GetCountry.GetFlavorRank] і зміцнити нашу позицію, але це також може викликати гнів нашого ворога, коли вони відновляться."
  time_of_troubles.10.a: "Через кризу приходить можливість!"
  time_of_troubles.11.title: "Хвороба забирає ще одну провінцію"
  time_of_troubles.11.desc: "Смертельна хвороба вразила [target_province.GetName], забравши незліченну кількість жертв. Вулиці [target_location.GetName] наповнені криками хворих та скорботних родин, тоді як місцева влада намагається стримати спалах. Торгівля зупинилася, поля лежать необроблені, а страх охопив населення, оскільки кількість загиблих зростає щодня. Колись процвітаюча провінція тепер є місцем відчаю, її люди шукають допомоги у корони, оскільки епідемія загрожує спустошити як життя, так і економіку."
  time_of_troubles.11.a: "Чи може ситуація стати ще гіршою?"
  weak_penalty_outcome_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('prosperity_very_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], і ми втратимо приблизно #Y 2%#! наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e]"
  mild_penalty_outcome_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], і ми втратимо приблизно #Y 5%#! наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e]"
  strong_penalty_outcome_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('prosperity_severe_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e], і ми втратимо приблизно #Y 7.5%#! наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e]"
  time_of_troubles.12.title: "Смерть [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetDynasty.GetNameWithNoTooltip]"
  time_of_troubles.12.desc: "Тихого дня [GetCurrentYear] трагедія спіткала [ROOT.GetCountry.GetCapital.GetName]. [target_heir.GetName], спадкоємця великого потенціалу, знайшли мертвим за загадкових обставин разом з багатьма іншими членами [target_heir.GetHerHis] родини. Офіційна версія стверджує, що це був нещасний випадок — напад під час гри з ножем — але чутки про нечесну гру поширилися, мов лісова пожежа. Багато хто підозрює руку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], що прагне поширити свою владу та вплив.\n\nСмерть [target_heir.GetShortNameWithNoTooltip] залишила шрам на [ROOT.GetCountry.GetFlavorRank]. [target_heir.GetHerHis|U] смерть похитнула основи [ROOT.GetCountry.GetLongName], посиливши недовіру до [ROOT.GetCountry.GetGovernment.GetCourtTitle] та підбадьоривши фракції, що прагнуть захопити владу. Чи була це трагічна втрата дитини, чи прорахований хід амбітного регента? Правда може ніколи не стати відомою, але наслідки відчуватимуться ще багато років."
  time_of_troubles.12.a: "Жахливий день..."
  time_of_troubles.12.historical_info: "У 1591 році молодий Дмитро, останній син Івана Грозного, помер за загадкових обставин в Угличі; офіційно це вважалося нещасним випадком, але широко підозрювалося вбивство, можливо, організоване Борисом Годуновим. Його смерть залишила Росію без явного спадкоємця, що спричинило династичний хаос. З'явилися Лжедмитрі (самозванці, які стверджували, що є дивом вцілілим царевичем), експлуатуючи народне невдоволення. Ці претенденти розпалили повстання та запросили іноземні інтервенції, зануривши Росію в Смутний час — період голоду, політичної нестабільності та війни. Смерть Дмитра символізувала крах центральної влади, поглибивши недовіру та розколовши державу, доки Романови не відновили порядок у 1613 році."
  time_of_troubles.13.title: "Кінець [ShowDisasterNameWithNoTooltip('time_of_troubles')]"
  time_of_troubles.13.desc: "Стабільність і мир нарешті повернулися до [ROOT.GetCountry.GetLongName], знаменуючи кінець довгого та бурхливого періоду, відомого як [ShowDisasterName('time_of_troubles')]. Роки голоду, внутрішніх воєн та політичного хаосу, що спустошили землю та її народ, поступилися місцем оновленому відчуттю порядку та надії. Під керівництвом [target_character.GetName] для народу настає новий день."
  time_of_troubles.13.a: "Народ знову продемонстрував свою стійкість!"
  time_of_troubles.13.historical_info: "Кінець Смутного часу в 1613 році ознаменував прихід династії Романових, відновивши стабільність після років хаосу. Правління Михайла Романова відновило центральну владу, приборкавши внутрішні заворушення та відбудувавши економіку. Держава розширила кріпацтво для стабілізації сільського господарства, тоді як територіальна консолідація зміцнила її кордони. Цей період відновлення заклав основу для централізованого та самодержавного уряду, дозволивши Росії перетворитися на могутню імперію. Прихід Романових став поворотним моментом, сформувавши національну ідентичність та підготувавши ґрунт для її майбутнього як домінуючої сили у Східній Європі та за її межами."