l_english:
  castilian_civil_war.1.title: "[target_country.GetAdjectiveWithNoTooltip] Громадянська війна"
  castilian_civil_war.1.desc: "Хоча [previous_ruler.GetName] вже деякий час не був при владі, [previous_ruler.GetHerHis] спадщина продовжує жити. [previous_ruler.GetHerHis|U] [ccw_legitimate_ruler.GetDaughterSon], [ccw_legitimate_ruler.GetName] та [target_country.Custom('GetRulerOrHeirTitle')] [target_country.GetName], є не єдиною дитиною нашого попереднього правителя, оскільки [previous_ruler.GetSheHe] [previous_ruler.Custom('GetBoreSired')] багато байстрюків.\n\nНа превеликий жаль [ccw_legitimate_ruler.GetNameWithNoTooltip], один із байстрюків, [ccw_bastard_ruler.GetName], насправді наважується кинути виклик легітимності [ccw_legitimate_ruler.GetShortNameWithNoTooltip]. Найгірше те, що багато підступних членів нашого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] підтримують прагнення претендента та домагаються примусового зречення нашого [target_country.Custom('GetRulerOrHeirTitle')]..."
  castilian_civil_war.1.a: "За правом успадкування, [ccw_legitimate_ruler.GetShortNameWithNoTooltip] переможе!"
  castilian_civil_war.1.nobility_joins_bastard: "[target_country.GetGovernment.GetEstateName('nobles_estate')] приєднується до [ccw_bastard_ruler.GetName]. [ShowPopTypeName('nobles')] #Y 3#! володіє [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з найбільшою кількістю населення, що приєднується до [succession_crisis_pretender_scope.GetName]."
  castilian_civil_war.1.b: "[ccw_bastard_ruler.GetShortNameWithNoTooltip] натомість правитиме [target_country.GetNameWithNoTooltip]."
  castilian_civil_war.1.commoners_join_legitimate_ruler: "[target_country.GetGovernment.GetEstateName('burghers_estate')] та [target_country.GetGovernment.GetEstateName('peasants_estate')] приєднуються до [ccw_bastard_ruler.GetName]. [ShowPopTypeName('peasants')] та [ShowPopTypeName('burghers')] #Y 3#! володіє [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з найбільшою кількістю населення, що приєднується до [succession_crisis_pretender_scope.GetName]."
  ccw_side_against_ruler.ccw_bastard_ruler: "Кілька наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e], незадоволених нашим правлінням, приєднаються до справи [ccw_bastard_ruler.GetName]"
  ccw_side_against_ruler.ccw_legitimate_ruler: "Кілька наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e], незадоволених нашим правлінням, приєднаються до справи [ccw_legitimate_ruler.GetName]"
  castilian_civil_war.2.title: "[target_province.GetNameWithNoTooltip] приєднується до [target_rebels.GetNameWithNoTooltip]"
  castilian_civil_war.2.title.fallback: "Провінція приєднується до повстанців-претендентів"
  castilian_civil_war.2.desc: "Поки [target_ruler.GetName] насолоджується розкошами королівського двору, народ [target_province.GetName] збирається під прапори підступного [target_pretender.GetName] та [target_rebels.GetName]. Члени [target_estate.GetName] стікаються під прапор претендента, якщо корона не втрутиться..."
  castilian_civil_war.2.a: "Придбати лояльність [target_estate.GetNameWithNoTooltip]."
  castilian_civil_war.2.b: "Провінція є втраченою справою."
  castilian_civil_war.2.b.at: "Усі [ShowPopTypeName('peasants')] та [ShowPopTypeName('burghers')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [target_rebels.GetName]"
  castilian_civil_war.2.b.bt: "Усі [ShowPopTypeName('peasants')] та [ShowPopTypeName('nobles')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] та приєднуються до [target_rebels.GetName]"
  castilian_civil_war.3.title: "Зрада [target_estate.GetNameWithNoTooltip]"
  castilian_civil_war.3.title.fallback: "Зрада стану"
  castilian_civil_war.3.desc: "Вірність закінчується на особистих вигодах та амбіціях тих, хто прагне влади. На превеликий жаль двору та [target_ruler.GetName], [target_estate.GetName] виявили себе досить владолюбними, оскільки вони шукали підтримки [target_pretender.GetName] для подальшого посилення свого впливу."
  castilian_civil_war.3.a: "Вони нас не стосуються."
  castilian_civil_war.3.b: "Можливо, деякі привілеї можуть задовольнити [target_estate.GetNameWithNoTooltip]."
  castilian_civil_war.3.c: "Вирізати цих зрадників!"
  castilian_civil_war.100.title: "Кінець кризи престолонаслідування"
  castilian_civil_war.100.title.war: "[from_country.GetAdjectiveWithNoTooltip] Громадянська війна"
  castilian_civil_war.100.desc.war: "Розбрат між [target_ruler.GetName] та [target_pretender.GetName] припинився, щоб бути заміненим гарячою громадянською війною [from_country.GetLongName]. Кожен [from_country.Custom('GetSibling')] підготував свою сторону сцени. Були укладені союзи; війська були навчені, і тепер доля [from_country.GetAdjectiveWithNoTooltip] країни буде вирішена на полі бою."
  castilian_civil_war.100.desc.inheritance: "Хоча [target_ruler.GetName] був готовий до важкої громадянської війни, напруга при дворі та постійні зради з боку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] залишили його в стані психічного розладу. Зрештою, психічне виснаження виявилося занадто великим для [target_ruler.GetHerHim], і [target_ruler.GetShortNameWithNoTooltip] був змушений зректися престолу, зробивши [target_pretender.GetName] законним правителем [from_country.GetName]."
  castilian_civil_war.100.desc.ruler_death: "Після періоду нестабільності, смерть [target_ruler.GetName] поступилася місцем претензії [target_pretender.GetName] на [from_country.GetAdjective] трон. На краще чи на гірше, колишній претендент поведе [from_country.GetNameWithNoTooltip] у нове майбутнє."
  castilian_civil_war.100.desc.pretender_death: "На жаль, божественне дарувало [target_ruler.GetName] руку благодаті. [target_pretender.GetName], лідер назріваючого повстання, що загрожувало вкинути всю [from_country.GetAdjective] державу в громадянську війну, загинув. Знак втручання чи випадковий кидок кубика? На краще чи на гірше, [from_country.GetNameWithNoTooltip] відновила контроль над своїми внутрішніми справами."
  castilian_civil_war.100.desc.fallback: "Громадянські чвари, відкриті повстання та безліч інших проклять спіткали [from_country.GetAdjective] народ. Однак жодне з них не змогло зламати державу, і довгий конфлікт між [target_ruler.GetName] та [target_pretender.GetName] нарешті знайшов своє завершення."
  castilian_civil_war.100.war: "До зброї!"
  castilian_civil_war.100.peace: "Катастрофи ледь вдалося уникнути."
  castilian_civil_war.101.a: "А як щодо наших угод?"
  castilian_civil_war.101.a.tt: "Усі зобов'язання та винагороди щодо [from_country.GetName] та їхнього конфлікту між [target_ruler.GetName] та [target_pretender.GetName] анулюються"
  castilian_civil_war.200.join_war: "Приєднаймося до цієї війни у всій її славі!"
  castilian_civil_war.200.mercs: "Надішліть значну символічну армію, яка допоможе нашому союзнику!"
  castilian_civil_war.200.gold: "Наш союзник оцінить додаткове фінансування"
  castilian_civil_war.200.coward: "Ми не можемо дозволити собі втручатися в це."
  ccw_ara_company: "$ARA_ADJ$ Кондотьєри"
  ccw_por_company: "$POR_ADJ$ Кондотьєри"
  ccw_fra_company: "$FRA_ADJ$ Кондотьєри"
  ccw_eng_company: "$ENG_ADJ$ Кондотьєри"
  ccw_nav_company: "$NAV_ADJ$ Кондотьєри"
  ccw_fallback_company: "Кондотьєри громадянської війни"
  ccw_from_country_joins_target_country_in_100yw_issues_tt: "[from_country.GetName] приєднується до [target_country.GetName] у всіх конфліктах, пов'язаних з [ShowSituationName('hundred_years_war')]"
  castilian_civil_war.201.desc.common: "Новини з [target_country.GetName] досягли нашого двору!"
  castilian_civil_war.201.title: "Підтримка від [target_country.GetNameWithNoTooltip]"
  castilian_civil_war.201.desc: "$castilian_civil_war.201.desc.common$ Наші довірені, [target_country.GetAdjectiveWithNoTooltip] союзники виконали свою обіцянку і надіслали нам підтримку!"
  castilian_civil_war.201.desc.join_war: "$castilian_civil_war.201.desc$ Вони приєдналися до війни на боці [target_ruler.GetName] і готові повністю присвятити себе нашій справі!"
  castilian_civil_war.201.desc.mercs: "$castilian_civil_war.201.desc$ Вони надіслали нам значний символічний загін як вільних найманців, які перебувають під нашим командуванням!"
  castilian_civil_war.201.desc.gold: "$castilian_civil_war.201.desc$ Вони обдарували нас щедрою купою золота, яка повинна допомогти нам у наших військових зусиллях!"
  castilian_civil_war.201.a: "Їхня підтримка більш ніж вдячна."
  castilian_civil_war.202.title: "[target_country.GetNameWithNoTooltip] покидає Нас!"
  castilian_civil_war.202.desc: "$castilian_civil_war.201.desc.common$ Наші нещасні, [target_country.GetAdjectiveWithNoTooltip] союзники порушили свою обіцянку і зрадили [from_country.GetAdjective] корону! Наші зобов'язання перед ними більше не діють."
  castilian_civil_war.202.a: "Вони пошкодують про цю зраду!"
  castilian_civil_war.301.title: "[target_country.GetNameWithNoTooltip] приєднується до повстанців!"
  castilian_civil_war.301.desc: "$castilian_civil_war.201.desc.common$ Проклята [target_country.GetLongNameWithNoTooltip] шанує свій союз із [target_pretender.GetName] і вже надіслала свою підтримку повстанцям."
  castilian_civil_war.301.desc.join_war: "$castilian_civil_war.301.desc$ Вони приєдналися до війни на боці [target_pretender.GetNameWithNoTooltip] і готові повністю присвятити себе справі повстанців!"
  castilian_civil_war.301.desc.mercs: "$castilian_civil_war.301.desc$ Вони надіслали значний символічний загін як вільних найманців повстанцям!"
  castilian_civil_war.301.desc.gold: "$castilian_civil_war.301.desc$ Вони обдарували їх щедрою купою золота, яка повинна допомогти повстанцям у їхніх військових зусиллях!"
  castilian_civil_war.301.a: "Прокляті повстанці!"
  ccw_hire_mercs_tt: "[THIS.GetCountry.GetName] наймає [Concept('mercenaries', 'CONCEPT_PLACEHOLDER')|e] з [target_country.GetName]"
  castilian_civil_war.302.title: "Нейтралітет [target_country.GetNameWithNoTooltip]"
  castilian_civil_war.302.desc: "$castilian_civil_war.201.desc.common$ Очевидно, справа [target_pretender.GetName] не змогла переконати [target_country.GetAdjectiveWithNoTooltip] народ. Тому вони вирішили залишатися нейтральними під час нашого конфлікту."
  castilian_civil_war.302.a: "Більш ніж приємний сюрприз."
  castilian_civil_war.400.title: "Наслідки [from_country.GetAdjectiveWithNoTooltip] громадянської війни"
  castilian_civil_war.400.desc: "Нарешті, звуки битви затихли. Лоялісти [target_loser.GetName] підкоряються нищівній силі військ [target_winner.GetName], і [from_country.GetAdjective] трон був захищений від [target_winner.GetHerHis] підступної [target_loser.GetSisterBrother]. [target_loser.GetShortNameWithNoTooltip] знайшов [target_loser.GetHerHis] кінець від рук і меча [target_winner.GetShortNameWithNoTooltip], і разом з цим помилки їхнього батька, [target_father.GetName], були забуті."
  castilian_civil_war.400.a: "Хай живе [target_winner.GetShortNameWithNoTooltip]!"
  castilian_civil_war.401.desc: "Нарешті, звуки битви затихли. Хоча війська [target_loser.GetName] чинили відважний опір, вони не змогли встояти проти [target_winner.GetName] та [target_winner.GetHerHis] союзників. [target_winner.GetShortNameWithNoTooltip] відвідав [target_loser.GetShortNameWithNoTooltip] у [target_loser.GetHerHis] наметі на полі бою, щоб домовитися про мир, але коли [target_loser.GetShortNameWithNoTooltip] вперше зустрівся поглядом зі своїм [target_winner.GetSisterBrother], стало зрозуміло, що [target_winner.GetShortNameWithNoTooltip] мав на думці лише вбивство. Швидкий удар обірвав життя [target_loser.GetNameWithNoTooltip] і [from_country.GetAdjective] громадянську війну."
  castilian_civil_war.401.a: "Принаймні війна закінчилася..."
  castilian_civil_war.410.title: "Перемога [target_winner.GetShortNameWithNoTooltip]"
  castilian_civil_war.410.desc: "Хоча і кривава, [from_country.GetAdjective] громадянська війна нарешті завершилася тим, що [target_winner.GetName] розгромив війська [target_loser.GetName] у гучній, вирішальній битві. Звісно, [target_winner.GetSheHe] ніколи не зміг би здійснити такий подвиг без нашої щедрої підтримки. Ми повинні нагадати [target_winner.GetHerHim] дотриматися [target_winner.GetHerHis] частини угоди."
  castilian_civil_war.410.a: "Час висувати наші вимоги!"
  castilian_civil_war.410.a.at: "Ми можемо висунути наші вимоги, які є частиною угоди з [target_winner.GetName]. Якщо [from_country.GetName] погодиться, відбудуться такі ефекти:"
  castilian_civil_war.410.a.bt: "Якщо [from_country.GetName] відмовиться задовольнити наші вимоги, замість цього відбудуться такі ефекти:"
  castilian_civil_war.410.b: "Слава їхньої перемоги є для нас достатньою нагородою."
  castilian_civil_war.411.title: "[target_country.GetNameWithNoTooltip] відмовляється від вимог"
  castilian_civil_war.411.desc.common: "Перемога [target_winner.GetName], хоч і дивовижна, була б неможлива без підтримки [target_country.GetLongName] — підтримки, що є частиною угоди, укладеної [target_winner.GetShortNameWithNoTooltip] з [target_country.GetAdjectiveWithNoTooltip] короною."
  castilian_civil_war.411.desc: "$castilian_civil_war.411.desc.common$ На щастя для нас, [target_ruler.GetName] почувається досить щедрим і висловив намір відмовитися від будь-яких претензій, що випливали з угоди."
  castilian_civil_war.411.a: "Воістину [target_ruler.GetWomanMan] честі!"
  castilian_civil_war.412.title: "[target_country.GetNameWithNoTooltip] висуває вимоги"
  castilian_civil_war.412.desc: "$castilian_civil_war.411.desc.common$ Тепер [target_ruler.GetName] висуває вимоги та претензії до [target_winner.GetShortNameWithNoTooltip] і погрожує наслідками, якщо ми не дотримаємо свого слова..."
  castilian_civil_war.412.a: "Звісно. Вірність буде винагороджена справедливо."
  castilian_civil_war.412.a.tt: "Відбудеться наступне:"
  castilian_civil_war.412.b: "Ми не в змозі виконати жодну з цих вимог."
  castilian_civil_war.413.title: "[from_country.GetNameWithNoTooltip] приймає вимоги"
  castilian_civil_war.413.desc: "Звістки з [from_country.GetName] досягли нашого двору. [target_winner.GetName] прийняв наші вимоги! Ми незабаром отримаємо нашу заслужену винагороду."
  castilian_civil_war.413.a: "Ми раді це чути."
  castilian_civil_war.414.title: "[from_country.GetNameWithNoTooltip] відхиляє вимоги"
  castilian_civil_war.414.desc: "Звістки з [from_country.GetName] досягли нашого двору. [target_winner.GetName] відмовився виконати наші вимоги! Цей акт порушеної довіри заплямує наші відносини на століття..."
  castilian_civil_war.414.a: "Ті кляті пси!"
  castilian_civil_war.420.title: "Поразка [target_loser.GetShortNameWithNoTooltip]"
  castilian_civil_war.420.desc: "Попри всі наші зусилля, [from_country.GetAdjective] громадянська війна завершилася принизливою поразкою для [target_loser.GetName]. [target_winner.GetName] розгромив об'єднані сили [target_loser.GetShortNameWithNoTooltip] і вбив [target_loser.GetHerHim]. Оскільки нікому виконувати наші вимоги при владі, усі обіцянки, дані нам [target_loser.GetShortNameWithNoTooltip], анульовано."
  castilian_civil_war.420.a: "Яка ганьба..."
  castilian_civil_war.1000.title: "[from_country.GetAdjectiveWithNoTooltip] коронний конфлікт"
  castilian_civil_war.1000.desc.common: "Роки стосунків [from_father.GetName] з [from_father.GetHerHis] [from_mother.Custom('GetLover')] нарешті показали свої наслідки. Хоча [from_father.GetHerHis] [target_legitimate.GetDaughterSon], [target_legitimate.GetName], може бути законним правителем [from_country.GetName], [target_legitimate.GetHerHis] байстрюк [target_bastard.GetSisterBrother], [target_bastard.GetName], зібрав армію, щоб претендувати на трон для [target_bastard.GetHerselfHimself]."
  castilian_civil_war.1000.desc: "$castilian_civil_war.1000.desc.common$\n\nУ ці часи напруги [target_pretender.GetNameWithNoTooltip] звернувся до [target_country.GetAdjective] [target_country.GetFlavorRank], щоб просити нашої підтримки у висуненні [target_pretender.GetHerHis] претензій проти [target_pretender.GetHerHis] [target_ruler.GetSisterBrother] — звісно, з належною компенсацією за наші зусилля."
  castilian_civil_war.1000.a: "Це буде чудова нагода для нашого [target_country.GetFlavorRank]!"
  castilian_civil_war.1000.a.tt: "Ми підтримаємо [target_rebels.GetName] проти [from_country.GetName], щойно спалахне [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  castilian_civil_war.rebels_join_reward: "Відбудуться наступні ефекти після того, як [target_country.GetName] приєднається до сторони [target_rebels.GetName] і [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] буде виграна на їхньому боці:"
  castilian_civil_war.loyalists_join_reward_for_root: "Відбудуться наступні ефекти після того, як [ROOT.GetCountry.GetName] приєднається до сторони [from_country.GetName] і [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] буде виграна на їхньому боці:"
  castilian_civil_war.rebels_join_reward_for_root: "Відбудуться наступні ефекти після того, як [ROOT.GetCountry.GetName] приєднається до сторони [target_rebels.GetName] і [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] буде виграна на їхньому боці:"
  castilian_civil_war.loyalists_join_reward: "Наступні ефекти відбудуться після того, як [target_country.GetName] приєднається до сторони [from_country.GetName] і [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] буде виграна на їхній стороні:"
  castilian_civil_war.1000.a.tt.100yw: "[from_country.GetName] приєднається до [ShowSituationName('hundred_years_war')] на нашій стороні, якщо [target_pretender.GetName] виграє [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  castilian_civil_war.1000.b: "Нам нічого здобувати, втручаючись у справи [from_country.GetAdjectiveWithNoTooltip] народу."
  castilian_civil_war.1000.b.tt: "Ми залишимося #Y Нейтральними#! у [from_country.GetAdjective] [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти [target_rebels.GetName]"
  castilian_civil_war.1001.title: "[target_country.GetAdjectiveWithNoTooltip] Інтервенція"
  castilian_civil_war.1001.common.desc: "Нещасний зрадник і претендент, [target_pretender.GetName], звернувся до [target_country.GetName], щоб отримати їхню підтримку в майбутній громадянській війні проти [target_ruler.GetName]."
  castilian_civil_war.1001.desc: "$castilian_civil_war.1001.common.desc$ Ми побачимо [target_country.GetAdjectiveWithNoTooltip] прапори на полі бою!"
  castilian_civil_war.1001.a: "Тоді їх поховають поруч із [target_pretender.GetHerHis] могилою!"
  castilian_civil_war.1002.title: "[target_country.GetAdjectiveWithNoTooltip] Нейтралітет"
  castilian_civil_war.1002.desc: "$castilian_civil_war.1001.common.desc$ На щастя, їхня мудрість не покинула їх, оскільки вони відхилили [target_pretender.GetHerHis] звернення."
  castilian_civil_war.1002.a: "Нарешті добрі новини."
  castilian_civil_war.1002.a.tt: "[target_country.GetName] залишається #y Нейтральним#! у потенційній [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти [target_rebels.GetName]"
  castilian_civil_war.1003.desc.common: "Конфлікт між двома зведеними братами/сестрами, [target_ruler.GetName] та [target_pretender.GetName], зростає в [from_country.GetName] у напрузі. Обидві сторони шукають підтримки проти свого конкурента для майбутньої війни за [from_country.GetAdjectiveWithNoTooltip] Корону."
  castilian_civil_war.1003.desc: "$castilian_civil_war.1003.desc.common$ Наш найшановніший союзник, [target_country.GetName], висловив свою волю допомогти [target_pretender.GetShortNameWithNoTooltip] в обмін на послуги та землі в [ShowRegionName('iberia_region')]. Приєднання до [target_country.GetNameWithNoTooltip] у цьому конфлікті може надати нам можливість претендувати на деякі [from_country.GetAdjectiveWithNoTooltip] землі для себе, а також зміцнити наш зв'язок з [target_country.GetAdjectiveWithNoTooltip] [target_country.GetFlavorRank]. Це якщо претендент виграє майбутню громадянську війну..."
  castilian_civil_war.1003.a: "Ми повинні скористатися цим шансом для себе!"
  castilian_civil_war.1003.a.tt: "Ми приєднаємося до [target_country.GetName] та [target_rebels.GetName] у [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти [from_country.GetName]"
  castilian_civil_war.1003.b: "Ми не можемо дозволити собі конфлікт з [from_country.GetAdjectiveWithNoTooltip] Короною."
  castilian_civil_war.1004.title: "[root_country.GetAdjectiveWithNoTooltip] Інтервенція"
  castilian_civil_war.1004.desc.common: "Визнаючи нерозумне рішення [target_country.GetAdjective] [target_country.GetFlavorRank], [root_country.GetName] розглянув можливість втрутитися в назріваючий конфлікт."
  castilian_civil_war.1004.desc: "$castilian_civil_war.1004.desc.common$ Всупереч здоровому глузду, підлий [root_country.GetAdjectiveWithNoTooltip] народ вирішив підтримати [target_pretender.GetName] проти [target_ruler.GetName]."
  castilian_civil_war.1004.a: "Цей пакт стане їхньою загибеллю!"
  castilian_civil_war.1004.a.tt: "#R [root_country.GetName] приєднується до сторони [target_rebels.GetName], якщо спалахне [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]#!\nЯкщо [target_pretender.GetName] захопить трон, [root_country.GetName] вимагатиме [Concept('province', 'CONCEPT_PLACEHOLDER')|e] [target_province_definition.GetName], а також [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] [target_location_1.GetName] та [target_location_2.GetName] для себе"
  castilian_civil_war.1005.title: "[root_country.GetAdjectiveWithNoTooltip] Нейтралітет"
  castilian_civil_war.1005.desc: "$castilian_civil_war.1004.desc.common$ На наш приємний подив, поважний [root_country.GetAdjectiveWithNoTooltip] народ вирішив залишитися нейтральним у майбутньому конфлікті між [target_pretender.GetName] та [target_ruler.GetName]."
  castilian_civil_war.1005.a: "Мудре рішення."
  castilian_civil_war.1005.a.tt: "[root_country.GetName] залишається #y Нейтральною#! у потенційній [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти [target_rebels.GetName]"
  castilian_civil_war.1020.title: "Доля [pretender_mother.GetNameWithNoTooltip]"
  castilian_civil_war.1020.title.fallback: "Доля матері претендента"
  castilian_civil_war.1020.desc.legal_heir: "$castilian_civil_war.1020.desc$ З [alfonso_scope.GetHerHis] [alfonso_scope.Custom('GetAbdicationDeath')] та [target_ruler.GetNameWithNoTooltip] при владі, [pretender_mother.GetNameWithNoTooltip] більше не захищена від гніву [ruler_mother.GetShortNameWithNoTooltip]. [ruler_mother.GetWomanMan], розчарована нещасливим шлюбом та озлоблена ревнощами, більш ніж охоче бачить голову [pretender_mother.GetShortNameWithNoTooltip] на пласі, оскільки [ruler_mother.GetSheHe] таврує [ruler_mother.GetHerHis] суперницю як зрадницю та вимагає від [target_ruler.GetShortNameWithNoTooltip] стратити [pretender_mother.GetNameWithNoTooltip]."
  castilian_civil_war.1020.desc.bastard_heir: "$castilian_civil_war.1020.desc$ Оскільки [alfonso_scope.GetShortNameWithNoTooltip] більше не при владі, а [alfonso_scope.GetHerHis] байстрюк [target_ruler.GetDaughterSon] є правителем [from_country.GetName], вплив та політична влада, які колись мала [pretender_mother.GetNameWithNoTooltip], є лише спогадом. Налякана за [ruler_mother.GetHerselfHimself] та [ruler_mother.GetHerHis] дітей, [ruler_mother.GetNameWithNoTooltip] бажає вигнання [pretender_mother.GetShortNameWithNoTooltip]."
  castilian_civil_war.1020.desc: "Розбрат між [target_ruler.GetName] та [target_pretender.GetName] — це не просто конфлікт між двома зведеними [from_country.Custom('GetSiblings')], а глибше суперництво між [maria_scope.GetName] та [leonor_scope.GetName], [leonor_scope.Custom('GetLover')] [alfonso_scope.GetName]."
  castilian_civil_war.1020.a: "[pretender_mother.GetSheHe|U] буде страчена за зраду проти [from_country.GetNameWithNoTooltip]!"
  castilian_civil_war.1020.b: "[pretender_mother.GetHerHis|U] злочини не варті смерті."
  castilian_civil_war.1020.b.tt: "До #Y 3#! наших найкращих [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] залишать [from_country.GetName] з [ruler_mother.GetName]"
  castilian_civil_war.1020.c: "[pretender_mother.GetShortNameWithNoTooltip] буде вигнана з [from_country.GetNameWithNoTooltip]!"
  castilian_civil_war.1020.d: "[pretender_mother.GetSheHe|U] лише гавкає. [pretender_mother.GetHerHis|U] навички все ще потрібні тут."
  castilian_civil_war.1020.d.tt: "Це може мати наслідки для [ruler_mother.GetName] та [ruler_mother.GetHerHis] дітей..."
  castilian_civil_war.1020.f: "На щастя, у [from_country.GetNameWithNoTooltip] немає конфлікту."
  castilian_civil_war.1021.title: "Вбивство при дворі"
  castilian_civil_war.1021.desc: "Трагедія спіткала двір! [target_character.GetName] було вбито холоднокровно! Хоча пошуки винуватця все ще тривають, усі ранні ознаки вказують на причетність [murderer_character.GetName] до цієї справи."
  castilian_civil_war.1021.a: "Вигнати [murderer_character.GetShortNameWithNoTooltip] з двору!"
  castilian_civil_war.1021.b: "Смерть може бути відплачена лише стратою!"
  castilian_civil_war.1021.c: "Нам не слід поспішати з висновками..."
  castilian_civil_war.1022.title: "Вигнання [maria_scope.GetNameWithNoTooltip]"
  castilian_civil_war.1022.desc: "[maria_scope.GetName], дитя [target_country.GetName], було вигнано з [from_country.GetName]. [maria_scope.GetHerHis|U] шлюб з колись великим [alfonso_scope.GetName] більше не міг утримувати наші держави разом."
  castilian_civil_war.1022.a: "Нехай [maria_scope.GetSheHe] знайде розраду хоча б у [maria_scope.GetHerHis] домі."
  castilian_civil_war.1023.title: "Страта [maria_scope.GetNameWithNoTooltip]"
  castilian_civil_war.1023.desc: "[maria_scope.GetName], дитя [target_country.GetName], було вбито в [from_country.GetName]! Звинувачена у зраді та зневажена як чудовисько, [maria_scope.GetHerHis|U] шлюб з колись великим [alfonso_scope.GetName] не зміг захистити [maria_scope.GetHerHim] від того, кого [from_country.GetAdjectiveWithNoTooltip] народ називає своїм [from_country.Custom('GetRulerOrHeirTitle')]."
  castilian_civil_war.1023.a: "Нехай [maria_scope.GetSheHe] спочиває з миром."
  castilian_civil_war.1024.title: "Чутки про нову змову..."
  castilian_civil_war.1024.desc: "Шепіт у залах; швидкоплинні тіні в ночі. Загальне відчуття неспокою охоплює двір. Ні лояліст, ні змовник не висловлюють відкритого слова. Чути лише невиразні чутки.\n\n\"Кров заплямує підлогу двору...\""
  castilian_civil_war.1024.a: "Лише параноїдальне бурмотіння. Нема про що турбуватися."
  castilian_civil_war.1025.title: "Повернення [maria_scope.GetNameWithNoTooltip]"
  castilian_civil_war.1025.desc: "Одружена з [alfonso_scope.GetName] з 15 років, стосунки між [maria_scope.GetName] та [alfonso_scope.GetHerHim] були лише нещасливими. [from_country.GetAdjective] правитель знайшов [alfonso_scope.GetHerHis] кохання в обіймах [alfonso_scope.GetHerHis] [leonor_scope.Custom('GetLover')], тоді як [maria_scope.GetShortNameWithNoTooltip] мала лише [maria_scope.GetHerHis] [target_ruler.GetDaughterSon] за компанію. Однак навіть [target_ruler.GetSheHe] виявився зрадницьким в очах прекрасної [maria_scope.Custom('GetLadyLord')] [maria_scope.GetShortName]. На жаль, [maria_scope.GetSheHe], улюблене дитя [target_country.GetName], повернувся до [maria_scope.GetHerHis] дому."
  castilian_civil_war.1025.a: "Ласкаво просимо додому, [maria_scope.GetShortNameWithNoTooltip]."
  castilian_civil_war.1030.title: "Союзники Корони"
  castilian_civil_war.1030.desc: "Бунтівний [target_pretender.Custom('GetPrincessPrince')], [target_pretender.GetName], продовжує встановлювати дипломатичні відносини з тими, хто прагне посилити свою владу в [ShowRegionName('iberia_region')]. Але не всі можуть підтримати [target_pretender.GetHerHis] ідею [from_country.GetName] над ідеями [target_ruler.GetName]. Нашим хитрим дипломатам вдалося закласти основу для союзу з [target_country.GetLongName]."
  castilian_civil_war.1030.a: "Зверніться до [target_country.GetAdjectiveWithNoTooltip] [target_country.Custom('GetRulerOrRegentTitle')]. Нам є що обговорити."
  castilian_civil_war.1030.a.tt: "Ми домовимося про [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] з [target_country.GetName] на випадок, якщо [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти [target_rebels.GetName] спалахне"
  castilian_civil_war.1030.b: "Нам не потрібна допомога сторонніх."
  castilian_civil_war.1031.title: "[from_country.GetAdjectiveWithNoTooltip] Союз"
  castilian_civil_war.1031.desc: "$castilian_civil_war.1000.desc.common$\n\nУ ті часи напруги [target_ruler.GetNameWithNoTooltip] звернувся до [target_country.GetLongName], щоб попросити нашої підтримки для захисту [target_ruler.GetHerHim] від [target_ruler.GetHerHis] [target_pretender.GetSisterBrother]. Звісно, ми могли б підтримати їх з доброти серця, але розширення нашого впливу в [ShowRegionName('iberia_region')] не менш привабливе..."
  castilian_civil_war.1031.a.tt: "Ми зробимо наступну пропозицію [target_ruler.GetName]:"
  castilian_civil_war.1031.a.tt.join_war: "[target_country.GetName] підтримає [from_country.GetName] проти [target_rebels.GetName], як тільки [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] спалахне"
  castilian_civil_war.1031.a.tt.100yw: "[from_country.GetName] приєднається до [ShowSituationName('hundred_years_war')] на боці [target_country.GetName], якщо [target_ruler.GetName] виграє [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  castilian_civil_war.1031.b: "Справа не в здобичі, а в славі бою. [target_ruler.GetShortNameWithNoTooltip] отримає наші клинки!"
  castilian_civil_war.1031.b.tt: "Ми підтримаємо [from_country.GetName] проти [target_rebels.GetName], як тільки [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] спалахне"
  castilian_civil_war.1032.title: "Умови [target_country.GetNameWithNoTooltip]"
  castilian_civil_war.1032.desc: "Новини з [target_country.GetName] дійшли до нашого двору. Хоча [target_country.GetAdjectiveWithNoTooltip] [target_country.Custom('GetRulerOrRegentTitle')] співчуває [target_ruler.GetName] та [target_ruler.GetHerHis] справі, він підкреслює ризик, на який їм довелося б піти, і тому вимагає обіцяної компенсації, якщо їхня допомога знадобиться нам."
  castilian_civil_war.1032.a: "Ми приймаємо їхнє розумне прохання."
  castilian_civil_war.1032.a.tt: "Ми приймемо умови. Тоді станеться наступне:"
  castilian_civil_war.1032.b: "Їхні вимоги жодним чином неприйнятні. Нам не потрібна їхня допомога."
  castilian_civil_war.1032.b.tt: "Ми відхилимо їхні умови. [target_country.GetName] залишиться #Y Нейтральним#! під час [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]."
  castilian_civil_war.1033.title: "[from_country.GetNameWithNoTooltip] приймає наші Умови!"
  castilian_civil_war.1033.desc: "Новини з [from_country.GetName] дійшли до нашого двору. Шановний [target_ruler.GetName] прийняв умови і присягнув нашому новому союзу."
  castilian_civil_war.1033.a: "Зрештою, це був їхній єдиний вибір."
  castilian_civil_war.1034.title: "[from_country.GetNameWithNoTooltip] відхиляє наші умови"
  castilian_civil_war.1034.desc: "Новини з [from_country.GetName] досягли нашого двору. У [target_ruler.GetHisHer] «безмежній мудрості» [target_ruler.GetName] відхиляє нашу допомогу, називаючи наші розумні вимоги обурливими. Очевидно, що їхній заклик про підтримку був настільки ж серйозним, наскільки вони хотіли, щоб ми думали."
  castilian_civil_war.1034.a: "Нехай буде так."
  castilian_civil_war.1035.title: "Союз із [root_country.GetNameWithNoTooltip]?"
  castilian_civil_war.1035.desc: "Поки наша дипломатія була зосереджена на встановленні зв’язків із [target_country.GetName] для майбутньої війни проти [target_pretender.GetName], зрозуміло, що одна держава, зокрема, буде зацікавлена приєднатися до будь-якої сторони: [root_country.GetName]. Однак через їхній тісний союз із [target_country.GetName] [root_country.GetAdjectiveWithNoTooltip] Корона може бачити мало цінності в підтримці нас, якщо ми не пообіцяємо їм певні [ShowCultureName('basque')] землі."
  castilian_civil_war.1035.a: "Північні землі можуть бути їхніми, якщо вони нам допоможуть."
  castilian_civil_war.1035.a.tt: "Ми пропонуємо [root_country.GetName] володіння [target_province_definition.GetName], [target_location_1.GetName] та [target_location_2.GetName], якщо вони приєднаються до нас проти [target_rebels.GetName] у майбутній [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  castilian_civil_war.1035.b: "Вони не варті таких обіцянок."
  castilian_civil_war.1036.desc: "$castilian_civil_war.1003.desc.common$ Наш найшановніший союзник, [target_country.GetName], висловив свою волю допомогти [target_ruler.GetShortNameWithNoTooltip], і навіть [from_country.GetLongNameWithNoTooltip] звернувся, щоб здобути нашу прихильність."
  castilian_civil_war.1036.a: "Ми підтримаємо наших [from_country.GetAdjectiveWithNoTooltip] сусідів, звичайно."
  castilian_civil_war.1036.a.tt: "Ми приєднаємося до [target_country.GetName] та [from_country.GetName] у [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти [target_rebels.GetName] та їхніх союзників\nЯкщо [target_ruler.GetName] виграє громадянську війну, [root_country.GetName] може претендувати на [Concept('province', 'CONCEPT_PLACEHOLDER')|e] [target_province_definition.GetName], а також на [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] [target_location_1.GetName] та [target_location_2.GetName]"
  castilian_civil_war.1036.b: "Це не наш конфлікт."
  castilian_civil_war.1037.title: "[root_country.GetNameWithNoTooltip] приймає союз!"
  castilian_civil_war.1037.desc: "Новини з [root_country.GetName] досягли нашого двору. Як і передбачалося, [root_country.Custom('GetRulerOrRegentTitle')] [root_country.GetNameWithNoTooltip] прийняв нашу пропозицію. Вони будуть нашими союзниками у війні проти повстанців."
  castilian_civil_war.1037.a: "Будемо сподіватися, що їхній внесок вартий витрат."
  castilian_civil_war.1037.a.tt: "[root_country.GetName] приєднується до нас проти [target_rebels.GetName], якщо спалахне [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]\nЯкщо [target_ruler.GetName] захистить трон, [root_country.GetName] вимагатиме [Concept('province', 'CONCEPT_PLACEHOLDER')|e] [target_province_definition.GetName], а також [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] [target_location_1.GetName] та [target_location_2.GetName] для себе"
  castilian_civil_war.1038.title: "[root_country.GetNameWithNoTooltip] відхиляє союз"
  castilian_civil_war.1038.desc: "Новини з [root_country.GetName] досягли нашого двору. З причин, що виходять за межі розуміння нашого посла, [root_country.Custom('GetRulerOrRegentTitle')] [root_country.GetNameWithNoTooltip] відхилив нашу пропозицію. Вони залишаться нейтральними у майбутньому конфлікті."
  castilian_civil_war.1038.a: "У них алергія на експансію?"
  castilian_civil_war.1039.title: "[target_country.GetNameWithNoTooltip] приймає союз!"
  castilian_civil_war.1039.desc: "Новини з [target_country.GetName] досягли нашого двору. Співчуваючи [target_ruler.GetName] та [target_ruler.GetHerHis] справі, [target_country.GetAdjectiveWithNoTooltip] [target_country.Custom('GetRulerOrRegentTitle')] присягнув на вірність [target_ruler.GetShortNameWithNoTooltip] у майбутній війні проти повстанця-претендента без будь-яких подальших вимог."
  castilian_civil_war.1039.a: "І вони кажуть, що лицарство померло."
  castilian_civil_war.1040.title: "[target_country.GetNameWithNoTooltip] відхиляє союз"
  castilian_civil_war.1040.desc: "Новини з [target_country.GetName] досягли нашого двору. [target_country.GetLongNameWithNoTooltip] відхиляє союз. Їхні міркування нам незрозумілі, хоча дехто шепоче, що цей союз був би вигідним лише для нашої справи."
  castilian_civil_war.1040.a: "[ROOT.GetCountry.Custom('common_string_disappointing')]"
  castilian_civil_war.1050.title: "[ShowRegionNameWithNoTooltip('iberia_region')] Королівства"
  castilian_civil_war.1050.desc.portugal: "$castilian_civil_war.1050.desc$ [target_country.GetName], зокрема, зацікавлена в наших справах, оскільки вона є домом для [maria_scope.GetName], [maria_scope.GetMotherFather] [target_ruler.GetShortNameWithNoTooltip] та [maria_scope.Custom('GetPrincessPrince')] [target_country.GetAdjectiveWithNoTooltip] корони. Було б мудрим рішенням обговорити союз з [target_country.GetAdjectiveWithNoTooltip] народом."
  castilian_civil_war.1050.desc.aragon: "$castilian_civil_war.1050.desc$ Поки [target_pretender.GetShortNameWithNoTooltip] шукає союзників серед [target_pretender.GetHerHis] кровних родичів, [target_country.GetLongName] висловила великий інтерес до наших справ. Хоча вони, очевидно, зацікавлені в поширенні свого впливу в [ShowRegionNameWithNoTooltip('iberia_region')], [target_country.GetAdjectiveWithNoTooltip] сила може бути саме тим, що нам потрібно проти повстанської загрози."
  castilian_civil_war.1050.desc: "Конфлікт між [target_ruler.GetName] та [target_pretender.GetName] зростає в напрузі. Природно, наші сусіди в [ShowRegionName('iberia_region')] повністю усвідомлюють внутрішні чвари, що охопили [from_country.GetName]."