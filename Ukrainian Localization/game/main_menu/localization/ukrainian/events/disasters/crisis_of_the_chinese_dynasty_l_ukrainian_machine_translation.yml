l_english:
  crisis_of_the_chinese_dynasty.1.title: "Втрата авторитету [GetCountry('CHI').GetLongNameWithNoTooltip]"
  crisis_of_the_chinese_dynasty.1.desc: "[ROOT.GetCountry.GetLongName] стикається з жахливою кризою. Ми не змогли правити згідно з Мандатом Небес і втратили благословення та добру славу, які дарує Мандат.\n\nБезгосподарність і чвари панують у $china$, а невдоволення швидко поширюється серед народу; вже великі маси повстали. Ми повинні думати про наших предків і прагнути виховувати чесноти, бо великий Мандат нелегко зберегти."
  crisis_of_the_chinese_dynasty.1.a: "Нехай Мандат не закінчиться з нами."
  every_member_of_mkio_loses_20_opinion_tt: "Кожен [Concept('member', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('middle_kingdom').GetName] втратить [ShowBiasValue('opinion_internal_crisis')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] з нами"
  crisis_of_the_chinese_dynasty.2.title: "Гіркий кінець"
  crisis_of_the_chinese_dynasty.2.desc: "Ми не змогли відновити владу на наших землях, наш народ тепер розбитий і деморалізований. Будь-які спроби виправити ситуацію були далекими від ефективних, що призвело до втрати нашого престижу та нашого місця як володарів нашого великого [ROOT.GetCountry.GetFlavorRank]. Це новий мінімум для нас, оскільки ми намагаємося усвідомити реальність нашої жахливої ситуації."
  crisis_of_the_chinese_dynasty.2.a: "Яка темрява чекає на нас?"
  crisis_of_the_chinese_dynasty.3.title: "Прихильність Небес"
  crisis_of_the_chinese_dynasty.3.desc: "Період нестабільності закінчився! Ті, хто колись замишляв нашу загибель і радів нашому падінню, тепер тікають назад у тінь! Часи негараздів загартували наш народ, щоб вижити навіть у божественних випробуваннях.\n\nПосмішка, спостерігаючи за заходом сонця, зустрічаючи наступний день з тим самим голодом, який колись поставив нас на вершину великого [ROOT.GetCountry.GetFlavorRank]."
  crisis_of_the_chinese_dynasty.3.a: "Ми вижили!"
  based_on_current_celestial_authority_tt: "На основі нашого поточного значення [Concept('celestial_authority_gc', 'CONCEPT_PLACEHOLDER')|e]:"
  crisis_of_the_chinese_dynasty.4.title: "Селяни відмовляються від оподаткування"
  crisis_of_the_chinese_dynasty.4.desc: "Навіть у найкращі часи люди [target_province.GetName] ледве зводили кінці з кінцями. Недавні потрясіння, що охопили [ROOT.GetCountry.GetGovernment.GetCourtTitle], поширилися майже на кожну провінцію нашого [ROOT.GetCountry.GetFlavorRank]. В результаті, ті, хто колись схиляв коліна перед [target_character.GetName], тепер відмовляються навіть від найм'якшої форми оподаткування та данини їжею."
  crisis_of_the_chinese_dynasty.4.a: "Примусово стягнути данину їжею."
  crisis_of_the_chinese_dynasty.4.b: "Небеса милостиві."
  pops_in_target_province_lose_10_satisfaction_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_in_target_province_gains_5_satisfaction_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] [Concept('province', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_location_in_target_province_suffers_10_devastation_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] втрачають [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  crisis_of_the_chinese_dynasty.5.title: "Поширення спустошення"
  crisis_of_the_chinese_dynasty.5.desc: "Часи були немилосердними до наших людей у [target_province.GetName]. Колись жвавий центр гамірних ринків і багатих полів, провінція нещодавно стала жертвою розгулу бандитизму, грабежів, порожніх зерносховищ і палаючих домівок. Місцеві жителі благають про допомогу [target_character.GetName] у цей бурхливий період.\n\nОскільки врожаї залишаються без догляду, а канали занепадають, майбутнє виглядає все темнішим. Ця остання новина про поширення спустошення є тривожним знаком нашого послаблення контролю, що похитує громадську довіру по всьому нашому [ROOT.GetCountry.GetFlavorRank]."
  crisis_of_the_chinese_dynasty.5.a: "Ми можемо заплатити, щоб відновити їхнє постачання їжі."
  every_location_in_target_province_5_prosperity_tt: "[Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] отримують [ShowNamedValue('prosperity_very_weak_bonus')|+=2%] [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  crisis_of_the_chinese_dynasty.5.b: "Надіслати [target_character_1.GetNameWithNoTooltip]!"
  every_location_in_target_province_scales_with_character_tt: "[target_character_1.GetName] вирушить до [target_province.GetNameWithNoTooltip], щоб наглядати за зусиллями з відновлення. Протягом цього часу [target_character_1.GetSheHe] не буде частиною нашого [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e].\n\nЗавдяки [target_character_1.GetHerHis] [Concept('total_ability', 'CONCEPT_PLACEHOLDER')|e], кожне [Concept('location', 'CONCEPT_PLACEHOLDER')|e], яким ми володіємо в [target_province.GetNameWithNoTooltip], отримає #G [ROOT.GetVariable('display_character_ability_variable').GetValue]%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  crisis_of_the_chinese_dynasty.5.c: "Відшкодувати місцевим жителям."
  crisis_of_the_chinese_dynasty.5.d: "Нам байдуже до долі цих селян!"
  crisis_of_the_chinese_dynasty.6.title: "Переговори з повстанцями"
  crisis_of_the_chinese_dynasty.6.desc: "Коли наш великий народ переживає бурхливий період, відомий як $crisis_of_the_chinese_dynasty$, стало очевидним, що тягар цілого [actor.GetFlavorRank] важкий для плечей [target_character.GetName]. Недавні події призвели до того, що рух [target_rebel.GetName] набрав значної сили, змусивши нас сісти за стіл переговорів."
  pops_supporting_target_rebel_will_gain_30_satisfaction_and_cease_their_support_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що підтримують [target_rebel.GetNameWithNoTooltip], отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і, ймовірно, знову перейдуть на наш бік"
  locations_with_rebel_pops_lose_20_control_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що підтримує [target_rebel.GetNameWithNoTooltip] [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e], матиме [Concept('control', 'CONCEPT_PLACEHOLDER')|e] зменшений на [ShowNamedValue('control_extreme_penalty')|+=2%]"
  refund_the_cost_of_the_action_tt: "Вартість цієї [Concept('action', 'CONCEPT_PLACEHOLDER')|e] буде відшкодована."
  crisis_of_the_chinese_dynasty.6.a: "Добре, зменшіть їхнє оподаткування."
  crisis_of_the_chinese_dynasty.6.b: "Підемо на деякі поступки."
  crisis_of_the_chinese_dynasty.6.c: "Надайте їм тимчасову автономію."
  crisis_of_the_chinese_dynasty.6.d: "Ми вислухаємо їхні вимоги."
  crisis_of_the_chinese_dynasty.6.e: "Якщо подумати..."
  crisis_of_the_chinese_dynasty.7.title: "Податкова реформа [GetCurrentYear]"
  crisis_of_the_chinese_dynasty.7.desc: "Недавня криза мала глибокий вплив як на фінансовий, так і на політичний світ у межах наших кордонів. Цей бурхливий час випробував міцність наших інститутів, і наша бюрократія нарешті вийшла переможцем!\n\nПісля напружених п'яти років ми завершили перепис нашого народу, а також переглянутий податковий кодекс, який виглядає дуже багатообіцяючим. Різні аристократи та чиновники, які колись жили в розкоші, знаходили лазівки, щоб уникнути сплати податків, що зрештою призвело до ерозії центрального уряду.\n\nСміливі заходи, запроваджені під керівництвом [target_character.GetName], призвели до поновлення надходжень до скарбниці з різних куточків, які тепер визнають нашу владу."
  crisis_of_the_chinese_dynasty.7.a: "На крок ближче до запобігання катастрофі!"
  we_can_now_complete_reform_tax_action_tt: "Тепер ми можемо завершити [ShowGenericActionName('cmd_revise_the_tax_code')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e] через інтерфейс [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  crisis_of_the_chinese_dynasty.8.title: "Стабільні справи в [GetCountry('CHI').GetFlavorRank]"
  crisis_of_the_chinese_dynasty.8.desc: "Наш великий [ROOT.GetCountry.GetFlavorRank] не з чуток знає, як відбивати тих, хто зазіхає на наше багатство. Ті, хто прагне дестабілізувати нашу владу над $china$, численні, їхні тіні кидають сумнів і розклад на наші справи. Суперечки про спадщину, корупція в бюрократії, економічна нерівність і постійна загроза північних вторгнень створювали атмосферу невизначеності.\n\nОднак тріумфальне сходження [target_character.GetName] пролило світло на найтемніші тіні, вигнавши багато дестабілізуючих факторів з нашого уряду."
  crisis_of_the_chinese_dynasty.8.a: "Ми стабільні, поки що."
  crisis_of_the_chinese_dynasty.9.title: "Сильний $china$"
  crisis_of_the_chinese_dynasty.9.desc: "Наш авторитет неодноразово ставився під сумнів протягом цього бурхливого періоду, з яким ми стикаємося. Неефективне керівництво, а також зростаючі заворушення давно підірвали довіру громадськості до престолу. Підживлюваний низкою зловмисних бюрократів і могутніх [ROOT.GetCountry.GetGovernment.GetCourtTitle] чиновників, цикл занепаду справді закріпився в наших лавах.\n\nЗавдяки політиці та під керівництвом [target_character.GetName] ми успішно подолали цю небезпечну ситуацію. Відновлення легітимності та віри тепер веде до справедливого управління та нашої відновленої здатності вирішувати різні проблеми, що турбують наш [ROOT.GetCountry.GetFlavorRank]."
  crisis_of_the_chinese_dynasty.9.a: "Престол знову сильний, поки що."