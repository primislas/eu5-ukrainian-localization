l_english:
  war_of_the_aragonese_union_disaster.1.title: "Відродження Союзу"
  war_of_the_aragonese_union_disaster.1.desc: "[ruler_brother.GetName] був вигнаний з [target_location.GetName] та йому заборонено в'їзд до [ShowAreaName('catalonia_area')] та [ShowLocationName('zaragoza')], щоб запобігти поширенню його отрути на інших шляхтичів. Натомість, він насміхався над наказами нашого Короля та скликав своїх співзмовників зустрітися з ним за межами міста [ShowLocationNameWithNoTooltip('zaragoza')], і разом вони знову розпалили повстання, що принизило [scope_alfons_iii.GetName], #italic Союз Арагону#!.\n\nБрехня [ruler_brother.GetNameWithNoTooltip] змішується зі старими образами, які [GetCountry('ARA').GetAdjective] шляхта та міста мають проти Корони, створюючи багаття, що швидко поширюється по всій [ShowLocationNameWithNoTooltip('zaragoza')]."
  war_of_the_aragonese_union_disaster.1.a: "Вислухаймо їхні вимоги, можливо, питання можна вирішити мирно."
  war_of_the_aragonese_union_disaster.1.b: "Ми не будемо слухати повстанців та зрадників."
  war_of_the_aragonese_union_disaster.1.b.tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [ShowProvinceDefinitionName('zaragoza_province')] приєднаються до [union_of_aragon.GetName]"
  union_of_aragon_name: "Союз Арагону"
  war_of_the_aragonese_union_disaster.2.title: "Старі вимоги"
  war_of_the_aragonese_union_disaster.2.desc: "Лідери #italic Союзу Арагону#! відгукнулися на запрошення Короля та мирно прибули до двору. Вони відмовилися від усіх вимог щодо спадкоємства королівства, але зовсім не поступляться у своїй боротьбі за розширені права. Лише прийнявши їхні вимоги, що залишилися, ми зупинимо конфлікт."
  war_of_the_aragonese_union_disaster.2.a: "Як вони сміють так ображати Корону?; вигнати їх!"
  war_of_the_aragonese_union_disaster.2.b: "Іншого способу покласти цьому край немає, я приймаю їхнє прохання."
  war_of_the_aragonese_union_disaster.3.title.a: "Принижений [GetCountry('ARA').GetGovernment.GetRulerTitle]"
  war_of_the_aragonese_union_disaster.3.desc.a: "Повстання Союзів добігло кінця, [aragon_ruler.GetName] був змушений визнати, що [aragon_ruler.GetHisHer] васали, колись об'єднані під одним прапором, сильніші за саму [GetCountry('ARA').GetFlavorRank].\n\nНовий привілей захищатиме права шляхтичів та міщан від примх [GetCountry('ARA').GetFlavorRank] та кодифікує їхні рівноправні відносини назавжди."
  war_of_the_aragonese_union_disaster.3.title.b: "До зброї!"
  war_of_the_aragonese_union_disaster.3.desc.b: "Дипломатія зазнала невдачі. Зрадники #italic Союзу Арагону#! повстали зі зброєю та беруть під контроль свої міста й фортеці, зраджуючи свої клятви та вбиваючи наших вірних підданих. Єдиний варіант, що залишився, — зустріти їх на полі бою та покарати їхню зраду мечем."
  war_of_the_aragonese_union_disaster.3.title.c: "Мудрий [GetCountry('ARA').GetGovernment.GetRulerTitle]"
  war_of_the_aragonese_union_disaster.3.desc.c: "Дипломатія тріумфувала. Попри всі труднощі, наш хитрий правитель зумів впоратися з повстанцями #italic Союзу Арагону#!, не поступаючись жодними правами, але водночас балансуючи фракції та претендентів, щоб уникнути початку Громадянської війни."
  war_of_the_aragonese_union_disaster.3.a: "Це темні дні для [GetCountry('ARA').GetFlavorRank]."
  war_of_the_aragonese_union_disaster.3.b: "Хай живе [GetCountry('ARA').GetGovernment.GetRulerTitle]."
  war_of_the_aragonese_union_disaster.4.title: "Шанс на мир"
  war_of_the_aragonese_union_disaster.4.desc: "Посланець, відправлений повстанськими силами #italic Союзу Арагону#!, прибув до наших воріт. Перш ніж ситуація загостриться ще більше, вони відкриті до аудієнції з [GetCountry('ARA').GetGovernment.GetRulerTitle] та обговорення своїх скарг, за умови, що [GetCountry('ARA').GetGovernment.GetRuler.GetHeShe] готовий запросити їх до [GetCountry('ARA').GetGovernment.GetRuler.GetHisHer] двору та забезпечити їхню безпеку протягом цих переговорів."
  war_of_the_aragonese_union_disaster.4.a: "Нехай прийдуть з миром і поговорять."
  war_of_the_aragonese_union_disaster.4.b: "Вигнати цього чоловіка. Ми зустрінемо зрадників на полі бою."
  war_of_the_aragonese_union_disaster.4.b.tt: "Невдоволення поширюється далі"
  war_of_the_aragonese_union_disaster.5.title: "Союз розширюється"
  war_of_the_aragonese_union_disaster.5.desc: "#italic Союз Арагону#! продовжує розширювати свої щупальця на землях [ShowAreaName('aragon')] та [ShowAreaName('valencia')], оскільки звинувачення уніоністів заглиблюються в минуле кожного міста й містечка, виносячи на світло старі образи та ревнощі проти [GetCountry('ARA').GetFlavorRank]."
  war_of_the_aragonese_union_disaster.5.a: "Відправити посланця. Ми вестимемо переговори з їхніми лідерами."
  war_of_the_aragonese_union_disaster.5.b: "Є важливіші справи, які варто вирішити."
  war_of_the_aragonese_union_disaster.6.title: "Лігво лева"
  war_of_the_aragonese_union_disaster.6.desc: "Лідери #italic Арагонського союзу#! надіслали до нас посланця, наполегливо пропонуючи [GetCountry('ARA').GetGovernment.GetRulerTitle] скликати надзвичайний парламент у поважній столиці [ShowLocationName('zaragoza')]. Вони висловлюють переконання, що може бути досягнуто консенсусу та вирішено їхні спільні скарги, але місто перебуває під їхнім фактичним контролем, і лише Бог знає, що може статися, якщо переговори підуть не так."
  war_of_the_aragonese_union_disaster.6.a: "Вони не наважаться підняти свій голос проти свого [GetCountry('ARA').GetGovernment.GetRulerTitle]"
  war_of_the_aragonese_union_disaster.6.b: "Це очевидна пастка, краще уникнути того міста."
  war_of_the_aragonese_union_disaster.7.title: "Парламент погроз"
  war_of_the_aragonese_union_disaster.7.desc: "Сили #italic Арагонського союзу#! та [GetCountry('ARA').GetGovernment.GetRulerTitle] підтримують напружений мир на вулицях стародавнього міста [ShowLocationName('zaragoza')], поки в Парламенті панував хаос.\n\nЗ самого початку обговорень уніоністи взяли контроль і агресивно вимагають від [GetCountry('ARA').GetGovernment.GetRulerTitle] закріпити довгі списки нових прав і привілеїв у законі. Ситуація надзвичайно небезпечна, оскільки багато лордів озброєні, і загроза обрання нового [GetCountry('ARA').GetGovernment.GetRulerTitle] вже нависає над нашими головами."
  war_of_the_aragonese_union_disaster.7.a: "Змушені страхом за своє життя, ми схвалюємо цей несправедливий привілей."
  war_of_the_aragonese_union_disaster.7.b: "Ми не схилимося і не поступимося."
  war_of_the_aragonese_union_disaster.7.c: "Варта, прокладіть нам шлях з цієї пастки."
  war_of_the_aragonese_union_disaster.8.title: "Валенсія повстає"
  war_of_the_aragonese_union_disaster.8.desc: "Вогні повстання поширюються на землі річки Турія і знову розпалюють #italic Валенсійський союз#!. Різниця у статусі та правах між Коронами спонукає людей [ShowAreaName('valencia')] приєднатися до повстання з надією отримати бажані привілеї."
  war_of_the_aragonese_union_disaster.8.a: "Прокляття!"