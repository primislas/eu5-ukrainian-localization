l_english:
  french_wars_religion.1.title: "Релігійні війни в [ROOT.GetCountry.GetName]"
  french_wars_religion.1.desc: "Зі швидким поширенням нових вірувань серед населення та зростаючою зухвалістю їхніх лідерів, багато традиційних вірян починають відчувати неспокій щодо ситуації в [ROOT.GetCountry.GetFlavorRank]. Зростаюча напруга між різними групами досягла апогею з формуванням релігійних повстань та воєнізованих організацій, що прагнуть домінувати в нашій країні.\n\nЯкщо це не вдасться, вони вимагають значних прав і свобод для забезпечення свого майбутнього. Тим часом лідери [ROOT.GetCountry.GetReligion.GetAdjective] віри стають дедалі роздратованішими і застерігають від поступок, натякаючи, що насильство може спалахнути, якщо [target_character.GetName] буде сприйнятий як той, хто відвертається від старих вчень."
  french_wars_religion.1.a: "На нас чекає смута."
  fra_lutheran_rebels_explanation_tt: "[ShowReligionAdjective('lutheran')] [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] повстануть проти нас"
  fra_calvinist_rebels_explanation_tt: "[ShowReligionAdjective('calvinist')] [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] повстануть проти нас"
  fra_catholic_rebels_explanation_tt: "[ShowReligionAdjective('catholic')] [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] повстануть проти нас"
  french_wars_religion.1.historical_info: "Французькі релігійні війни були серією жорстоких конфліктів між католицькою більшістю та протестантськими гугенотами, спричинених релігійними розбіжностями та політичними амбіціями. Впливові дворянські родини, такі як Гізи та Бурбони, використовували хаос для здобуття влади. Війни призвели до жорстоких масових вбивств, змін альянсів та широкомасштабних руйнувань. Королівська влада ослабла, але стабільність почала повертатися, коли Генріх IV, колишній протестант, навернувся до католицизму та видав Нантський едикт, що надавав релігійну толерантність гугенотам. Цей компроміс допоміг об'єднати Францію та поклав край десятиліттям смути."
  french_wars_religion.2.title: "Релігійні тертя в [target_province_start.GetNameWithNoTooltip]"
  french_wars_religion.2.desc: "Оскільки релігійна смута охопила наш [ROOT.GetCountry.GetFlavorRank], стало звичним явищем, коли релігійні розбіжності переростають у відкритий конфлікт між прихильниками [ROOT.GetCountry.GetReligion.GetName] та [target_religion.GetName]. Останні з цих сутичок відбулися в провінції [target_province_start.GetName], де місцева влада вжила заходів проти єретиків.\n\nНаші радники пропонують безліч рішень цієї проблеми. Деякі вважають, що вигнання — єдиний вихід, хоча багато єретиків все ще є нашими співвітчизниками, які прожили все своє життя в мирі."
  french_wars_religion.2.a: "Дозволити їм мігрувати до [target_country.GetLongNameWithNoTooltip]."
  french_wars_religion.2.b: "Надати [target_migrants.GetNameWithNoTooltip] тимчасові свободи."
  french_wars_religion.2.c: "Запобігти їхньому вигнанню, але вимагати навернення."
  pops_of_target_religion_in_target_province_25_sat_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [Concept('target_province_start.GetNameWithNoTooltip], що сповідують [target_religion.GetAdjectiveWithNoTooltip] [religion', 'CONCEPT_PLACEHOLDER')|e], отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  pops_of_target_religion_in_target_province_lose_15_sat_tt: "Наші решта [Concept('target_religion.GetAdjectiveWithNoTooltip] [pops', 'CONCEPT_PLACEHOLDER')|e] в [target_province_start.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  french_wars_religion.3.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Релігійна ліга"
  french_wars_religion.3.desc: "Ліга, що представляє лідерів [ROOT.GetCountry.GetReligion.GetAdjective] віри, була заснована в [target_location.GetName]. Її основна функція — захищати всіх істинних вірян від підривного впливу єретиків та зберігати [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] виключно для прихильників нашої істинної віри.\n\nОчолювана [target_character.GetName], ліга стала потужним гравцем у [ShowDisasterName('french_wars_of_religion')] і діє незалежно від порядку денного [ROOT.GetCountry.GetFlavorRank]. Незалежно від того, чи вирішимо ми відкрито підтримати цю новостворену лігу, чи повністю відкинути її, це, безсумнівно, сформує майбутнє нашого народу."
  french_wars_religion.3.a: "Відкрито підтримати [target_character.GetShortNameWithNoTooltip] та лігу."
  french_wars_religion.3.b: "Надати лізі деякі поверхневі поступки."
  french_wars_religion.3.c: "Нами не можуть керувати релігійні фанатики."
  french_wars_religion.4.title: "[target_location.GetNameWithNoTooltip] вартий...?"
  french_wars_religion.4.desc: "Збройні релігійні конфлікти, що спустошували [ROOT.GetCountry.GetLongName] протягом останнього десятиліття, продовжують дестабілізувати націю, не показуючи ознак вирішення. Ці триваючі боротьби завдали величезних страждань населенню та підірвали основи нашого суспільства. В центрі цього безладу лежить сама столиця, плавильний котел релігійних фанатиків та єретиків, які своїми розбіжностями постійно кидають виклик владі [target_character.GetName].\n\nНезважаючи на виклики, є проблиск надії. Було запропоновано, що об'єднуючий жест [target_character.GetNameWithNoTooltip] міг би стати каталізатором миру. Проводячи велику та інклюзивну месу в [target_location.GetName], [target_character.GetSheHe] міг би подолати розкол між ворогуючими фракціями.\n\nЦей символічний акт примирення має потенціал надихнути на діалог, сприяти взаєморозумінню та привести нас до взаємовигідного вирішення. Такий крок не тільки підтвердить владу [target_character.GetNameWithNoTooltip], але й стане значним кроком до припинення безглуздого кровопролиття, що спустошує нашу землю."
  french_wars_religion.4.a: "[target_location.GetNameWithNoTooltip] вартий меси."
  french_wars_religion.4.b: "Будемо сподіватися, що так."
  french_wars_religion.4.c: "Ніколи! Єретики впадуть від меча!"
  french_wars_religion.4.historical_info: "Фраза #italic Париж вартий меси#! стосується події у французькій історії за участю Генріха IV, протестанта, який навернувся до католицизму в 1593 році, щоб забезпечити свої претензії на французький престол. Франція, глибоко розділена релігійними війнами між католиками та протестантами (гугенотами), потребувала католицького монарха для підтримки стабільності та легітимності. Генріх, усвідомлюючи це, навернувся і відомо виправдав своє рішення прагматичним твердженням, припускаючи, що правління Францією та встановлення миру було важливішим, ніж особиста релігійна прихильність. Цей акт проклав шлях до його правління та подальшого Нантського едикту 1598 року, який надав релігійну толерантність протестантам."
  pops_target_province_gain_sat_based_on_religion_a_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName], що сповідують [ROOT.GetCountry.GetReligion.GetName], втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують інші [ShowReligionGroupAdjective('christian')] віри, отримають [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  pops_target_province_gain_sat_based_on_religion_b_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName], що сповідують [ROOT.GetCountry.GetReligion.GetName], втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують інші [ShowReligionGroupAdjective('christian')] віри, отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  pops_target_province_gain_sat_based_on_religion_c_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName], що сповідують [ROOT.GetCountry.GetReligion.GetName], отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують інші [ShowReligionGroupAdjective('christian')] віри, втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  french_wars_religion.5.title: "Різанина у [target_province.GetNameWithNoTooltip]"
  french_wars_religion.5.desc: "Релігійна ворожнеча, що роками охоплювала нашу націю, не виявляє ознак вщухання. У [target_province.GetName] місцеві фанатики, керовані своїми ревними переконаннями, взяли справу у свої руки. З благословення місцевого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вони почали винищувати тих, кого вважали єретиками. Багатьох безжально вистежили та стратили під час публічних проявів благочестя. Повітря густе від страху та ненависті, а кровопролиття триває безперервно."
  french_wars_religion.5.a: "Немає звіра лютішого за людину."
  french_wars_religion.5.b: "Ми повинні бути кращими за це."
  french_wars_religion.6.title: "День барикад"
  french_wars_religion.6.desc: "Масове повстання спалахнуло у [target_location.GetName], зануривши столицю в хаос. Розлючена уявною поблажливістю [target_character.GetName] у поводженні з єретиками, [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetReligion.GetAdjective] Ліга спровокувала заворушення, згуртувавши населення під прапором [target_character2.GetName]. Чутки про [ROOT.GetCountry.GetGovernment.GetAdjective] змову з метою арешту [target_character2.GetShortNameWithNoTooltip] лише розпалили полум'я. У приголомшливому акті непокори озброєні ополченці та розлючені громадяни спорудили барикади, паралізувавши цілі райони, щоб зупинити наступ Gardes-Françaises.\n\nЗі зростаючим тиском на [target_character.GetShortNameWithNoTooltip] щодо втечі зі столиці, Ліга тепер має неперевершений вплив у [target_province.GetName]. Крихкий баланс сил все ближче до краху."
  french_wars_religion.6.historical_info: "12 травня 1588 року Париж вибухнув повстанням громадян, вірних герцогу де Гізу та Католицькій лізі, проти короля Генріха III. Зводячи барикади на вулицях, вони заблокували королівські війська, змусивши короля втекти з міста. Це драматичне повстання передало контроль над Парижем Гізу та змусило короля підписати Едикт про Унію, зміцнивши владу Ліги. Проте тріумф посіяв майбутній хаос, оскільки Генріх III пізніше наказав убити Гіза, що спровокувало подальший конфлікт. День барикад став поворотним моментом, продемонструвавши силу міського повстання в релігійних та політичних потрясіннях Франції."
  french_wars_religion.6.a: "Залишитися і битися!"
  french_wars_religion.6.b: "Втекти!"
  every_pop_cap_province_true_faith_loses_25_sat_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('target_province.GetNameWithNoTooltip], що сповідують [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] [religion', 'CONCEPT_PLACEHOLDER')|e], втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  may_lead_to_target_character_assassination_tt: "#italic Це може призвести до вбивства [target_character.GetNameWithNoTooltip]#!"
  french_wars_religion.7.title: "Вбивство [target_character.GetNameWithNoTooltip]"
  french_wars_religion.7.desc: "Після Дня барикад напруга між [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] та [ROOT.GetCountry.GetReligion.GetAdjective] Лігою вилилася у зраду. Заявляючи, що діє на захист віри, [target_character2.GetName], голова Ліги, організував вбивство [target_character.GetName], вразивши [target_character.GetHerHim] у [target_location.GetName].\n\nЦей зухвалий вчинок зруйнував крихкий мир, зануривши [ROOT.GetCountry.GetLongName] у хаос, оскільки конкуруючі фракції боролися за владу. Хоча Ліга проголосила свою божественну місію, інші бачили лише зраду, розпалюючи заворушення по всьому [ROOT.GetCountry.GetFlavorRank]. Вбивство стало поворотним моментом, розпаливши подальше кровопролиття в і без того нестабільних [ShowDisasterName('french_wars_of_religion')]."
  french_wars_religion.7.a: "Чи є кінець цій нестабільності?"
  french_wars_religion.8.title: "Весілля серед хаосу"
  french_wars_religion.8.desc: "У сміливій спробі залікувати релігійні розбіжності [ROOT.GetCountry.GetFlavorRank], [target_character.GetName] запропонував одружитися з [target_character2.GetName], [target_character2.GetWomanMan], що сповідує [target_religion.GetName]. Хоча це було задумано як жест примирення для припинення [ShowDisasterName('french_wars_of_religion')], цей союз викликав обурення серед побожних членів [ROOT.GetCountry.GetReligion.GetName], які розцінюють його як зраду віри.\n\nФанатики по всій землі стають неспокійними, і напруга загрожує вибухнути. Якщо не керувати цим обережно, цей ризикований крок може обернутися невдачею, зануривши країну в ще більший хаос або навіть спровокувавши руйнівну різанину, ще більше поглибивши внутрішні розколи."
  french_wars_religion.8.a: "Хай дзвонять весільні дзвони!"
  french_wars_religion.8.b: "Нам байдуже до порожнього символізму."
  this_may_lead_to_massacre_tt: "#Y Це може спровокувати велику різанину проти #![Concept('heretics', 'CONCEPT_PLACEHOLDER')|e]"
  french_wars_religion.9.title: "Варфоломіївська ніч"
  french_wars_religion.9.desc: "Те, що мало бути символом єдності, перетворилося на неймовірний жах. Шлюб між [target_character.GetShortName] та [target_character2.GetShortName], покликаний подолати розкол між вірними та єретиками, натомість розпалив бурю. У ніч весілля чутки про змови поширилися, як лісова пожежа. Підживлювані страхом і ненавистю, натовпи фанатиків лютували по всій країні, відкрито вбиваючи єретиків.\n\nРізанина швидко вийшла з-під контролю, зануривши [ROOT.GetCountry.GetFlavorRank] у кровопролиття. Тисячі загинули, довіра між громадами зруйнована, а мрія про єдність похована під тілами, що вкривають вулиці."
  french_wars_religion.9.a: "Жахливий поворот долі."
  french_wars_religion.9.historical_info: "У серпні 1572 року відбулася Варфоломіївська ніч, коли в Парижі спалахнуло насильство після весілля протестанта Генріха Наваррського з католичкою Маргаритою Валуа. Спочатку шлюб розглядався як спроба миру, але він викликав побоювання серед католицьких лідерів щодо зростання впливу гугенотів. У швидкій і жорстокій відповіді видатних гугенотів було вбито, а натовпи накинулися на протестантів по всьому місту. Те, що почалося як цілеспрямовані вбивства, швидко поширилося по всій Франції, залишивши тисячі загиблих. Різанина розпалила релігійну напругу, продовживши Французькі релігійні війни."
  french_wars_religion.10.title: "[ShowPolicyNameWithNoTooltip('edict_of_nantes')]"
  french_wars_religion.10.desc: "Після років релігійних заворушень між [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] та єретиками, остаточний релігійний едикт незабаром буде підписаний [target_character.GetShortName] та винесений на затвердження [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Згідно з [ShowPolicyName('edict_of_nantes')], єретикам будуть надані релігійні права, які більше не вважатимуть їх переслідуваними, а також будуть зняті релігійні обмеження, накладені на державні посади та установи.\n\nПопередні роки чинили великий тиск на переважно [ROOT.GetCountry.GetReligion.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], і прийняття такої політики може стати викликом авторитету старої еліти."
  french_wars_religion.10.a: "Релігійний розкол незабаром остаточно закінчиться!"
  french_wars_religion.11.title: "[target_religion.GetNameWithNoTooltip] укріплює [target_location.GetNameWithNoTooltip]"
  french_wars_religion.11.desc: "Група фанатиків, що належать до [target_religion.GetAdjective] віри, захопила контроль над [target_location.GetName], укріпивши місцевість, щоб чинити опір будь-яким спробам її відвоювання. Вони поширюють свої єретичні вірування далеко й широко, здобуваючи вірність місцевого населення. Укріплення роблять прямий штурм дорогим, тоді як залишення їх без контролю ризикує подальшим поширенням єресі."
  french_wars_religion.11.a: "Поважати їхню автономію."
  french_wars_religion.11.a.tt: "[pop|s] у [target_province.GetName] навернуться до [target_religion.GetName]"
  french_wars_religion.11.b: "Рушити, щоб розгромити їх."
  french_wars_religion.11.c: "Залишатися нейтральним."
  enable_the_edict_of_nantes_debate_tt: "Це розпочне дебати в [ROOT.GetCountry.GetGovernment.GetParliament.GetName] щодо прийняття [ShowPolicyName('edict_of_nantes')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] та завершення [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  french_wars_religion.12.title: "Кінець [ShowDisasterNameWithNoTooltip('french_wars_of_religion')]"
  french_wars_religion.12.desc: "Після років кривавого конфлікту між послідовниками різних конфесій [ShowReligionGroupName('christian')], [target_character.GetName] успішно провів дебати щодо [ShowPolicyName('edict_of_nantes')] через [ROOT.GetCountry.GetGovernment.GetParliament.GetName], поклавши край [ShowDisasterName('french_wars_of_religion')]. Цей ключовий указ надає гугенотам обмежену толерантність, дозволяючи їм свободу віросповідання у визначених районах, одночасно підтверджуючи [ROOT.GetCountry.GetReligion.GetName] як офіційну релігію. Хоча мир крихкий, едикт обіцяє нову еру стабільності для нашого [ROOT.GetCountry.GetFlavorRank]."
  french_wars_religion.12.a: "Нехай буде мир, хоч і крихкий."
  french_wars_of_religion.12.historical_info: "Французькі релігійні війни закінчилися в 1598 році підписанням Нантського едикту королем Генріхом IV, колишнім гугенотом, що навернувся в католицизм. Цей указ приніс мир після тривалого конфлікту між католиками та протестантами. Він надав гугенотам обмежені права та контроль над укріпленими містами для захисту, одночасно закріпивши католицизм як державну релігію. Хоча едикт зустрів опір екстремістів з обох сторін, він забезпечив крихку основу для співіснування. Він ознаменував початок відновлення Франції після років спустошення, відображаючи прагматичне бачення Генріха IV щодо єдності та стабільності його королівства."
  heretic_pops_gain_33_satisfaction_tt: "[Concept('heretics', 'CONCEPT_PLACEHOLDER')|e], що належать до [ShowReligionGroupAdjectiveWithNoTooltip('christian')] [Concept('religion_group', 'CONCEPT_PLACEHOLDER')|e], отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  french_wars_religion.13.desc: "Завдяки чистій силі та благочестю ми подолали всі перешкоди в нашій боротьбі за звільнення [ROOT.GetCountry.GetFlavorRank] від єретиків, що спустошують землю. Навернення, чи то за книгою, чи жорсткішими засобами, нарешті окупилися, оскільки наш народ тепер приймає єдину істинну віру, [ROOT.GetCountry.GetReligion.GetName]. Сяючий маяк [ShowReligionGroupName('christian')], [target_character.GetName] буде проголошений захисником віри, розпалюючи страхи єретиків по всьому світу."
  french_wars_religion.13.a: "Один народ, одна віра!"
  french_wars_religion.14.title: "Тимчасовий статус-кво у [ShowDisasterNameWithNoTooltip('french_wars_of_religion')]"
  french_wars_religion.14.desc: "Наші спроби схилити наш великий [ROOT.GetCountry.GetFlavorRank] до толерантності або навернення єретиків були безуспішними. Роки турбулентності, повстань та загального невдоволення населення стали похмурою нормою, оскільки люди звикають до цієї нової реальності. Ми не можемо знати, яке майбутнє чекає на нас, якщо така трагедія повториться."
  status_heretics_unresolved_10_years_cd_tt: "Лихо завершилося #R невирішеним#! і може повторитися через #Y 10#! років"
  french_wars_religion.14.a: "Тривожний розвиток подій."