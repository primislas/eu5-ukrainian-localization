l_english:
  succession_crisis.1.title: "Боротьба за [ROOT.GetCountry.GetAdjectiveWithNoTooltip] Корону"
  succession_crisis.1.desc: "Роки безгосподарності, придворних інтриг та нестабільного правління посіяли насіння нашої загибелі! Немов тіні в сутінках, багато видатних осіб з [ROOT.GetCountry.GetGovernment.GetAdjective] прагненнями зібралися у дрібній спробі підтримати [scope_pretender.GetName] як законного правителя [ROOT.GetCountry.GetLongName]."
  succession_crisis.1.a: "Принесіть мені [scope_pretender.GetHerHis] голову на списі!"
  succession_crisis.1.tt: "Низка наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e], незадоволених нашим правлінням, приєднається до справи [scope_pretender.GetNameWithNoTooltip]"
  succession_crisis.2.title: "Місцева опозиція"
  succession_crisis.2.desc: "Хоча правління [target_ruler.GetName] залишає бажати кращого, ситуація в таких місцях, як [target_province.GetName], досягла нового дна. Худоба худіша за сіно, голод і розпуста панують на вулицях колись великої провінції. З цією метою селяни взялися за зброю, вимагаючи прямої компенсації від самої корони!"
  succession_crisis.2.a: "Прокляті зрадники!"
  succession_crisis.2.b: "Ми мусимо поступитися їхнім вимогам..."
  every_location_loses_sat_and_joins_rebel_tt: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_province.GetName] втратить [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і підтримає претензію [scope_pretender.GetName] на наш трон"
  succession_crisis.3.title: "Винахідливий міністр"
  succession_crisis.3.desc: "Можна сказати, що попри всі зусилля нашого правителя, більшість корисних політик походить від наших радників. Такі особи, як [target_character.GetName], взяли на себе відповідальність провести [ROOT.GetCountry.GetLongName] через цей неспокійний час..."
  succession_crisis.3.a: "[target_character.GetHerHis|U] зусилля зміцнять [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')]!"
  succession_crisis.3.b: "Дозволити [target_character.GetShortNameWithNoTooltip] продовжувати працювати в наших провінціях."
  succession_crisis.4.title: "Випробування мужності"
  succession_crisis.4.desc: "Людина справді є продуктом своєї природи та виховання. Таким чином, нещодавня ситуація за нашими кордонами породила багато труднощів, оскільки повстання охоплюють наш народ. Однак надія не втрачена, бо з вогню постає здібне нове обличчя, готове служити та допомагати нам у ці важкі часи."
  succession_crisis.4.a: "Надати [target_character.GetHerHim] посаду в нашій адміністрації."
  succession_crisis.4.b: "[target_character.GetSheHe|U] краще проявить себе у війську."
  succession_crisis.5.title: "Підтримка нашої влади"
  succession_crisis.5.desc: "Попри всі зусилля нашої центральної влади саботувати те, що залишилося від нашої репутації в наших провінціях, багато наших нещодавніх змін у політиці не залишилися без уваги. Люди, особливо в домені [target_province.GetName], звернули увагу і надіслали відповіді, дякуючи нам за те, що ми почули їхнє прохання та подбали про них та їхні родини, заявляючи про свою вірність [ROOT.GetCountry.GetGovernment.GetRuler.GetName]."
  succession_crisis.5.a: "Вони мають рацію, довіряючи нам!"
  succession_crisis.5.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] є законним власником нашої корони!"
  every_location_gains_sat_and_loses_rebel_tt: "Кожна володіння в [target_province.GetName] отримає [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] і засудить свою підтримку [target_character.GetName] на нашому троні"
  succession_crisis.6.title: "Прохання до [target_country.GetNameWithNoTooltip]"
  succession_crisis.6.desc: "[ROOT.GetCountry.GetLongName] наразі переживає дуже бурхливий період, оскільки наша [ROOT.GetCountry.GetAdjectiveWithNoTooltip] [ShowDisasterName('succession_crisis')] загрожує розірвати [ROOT.GetCountry.GetFlavorRank] на частини. Претенденти набирають сили, і незабаром вони можуть вдарити в серце нашого [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName]. Відчайдушні часи вимагають союзників, і тому ми можемо ще надіслати посланця до [target_country.GetName], благаючи про допомогу. Якщо наш [ROOT.GetCountry.GetFlavorRank] впаде, це означатиме руїну та загибель для [target_character1.GetName] та [target_character1.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  succession_crisis.6.a: "Запросити конкурентну позику."
  succession_crisis.6.b: "Запропонувати нашу територію в обмін."
  succession_crisis.6.c: "Нам не потрібна допомога."
  if_they_accept_a_tt: "Якщо вони погодяться, станеться наступне:"
  sc_seek_foreign_aid_tt: "Обрана [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може запропонувати умовну підтримку або перемир'я в обмін на щось"
  succession_crisis.7.title: "Прохання про допомогу"
  succession_crisis.7.desc: "Прибув посланець від [target_character1.GetName], просячи допомоги у [target_character1.GetHerHis] зусиллях придушити поточну [ShowDisasterName('succession_crisis')] в [target_country2.GetName]. У часи труднощів та нестабільності життєво важливо встановлювати та підтримувати міцні стосунки з нашими впливовими сусідами. Через [target_character1.GetHerHis] посланця, [target_character1.GetShortNameWithNoTooltip] запропонував(-ла) умови, за яких [target_character1.GetSheHe] може отримати таку необхідну допомогу."
  succession_crisis.7.a: "Підписати пропозицію."
  succession_crisis.7.c: "Ми не можемо цього прийняти."
  succession_crisis.8.title: "Оспівування Нашої Династичної Історії"
  succession_crisis.8.desc: "Працюючи невтомно днями й ночами, [target_character2.GetName] вдалося створити чудове літературне досягнення, що оповідає славетну історію про найвеличніші моменти династії [target_dynasty.GetName]. Віддзеркалення нашої величі, пишноти та хисту до мистецтв, це лише останній вияв нашої вищої культури, щоб пам'ятати нашу історію та забезпечити наше майбутнє проти всіх, хто бажає скинути [target_character1.GetName]."
  succession_crisis.8.a: "Сподіваймося, це зміцнить нашу владу."
  scales_with_art_quality_tt: "Кількість отриманої [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e] значною мірою залежить від якості [Concept('work_of_art', 'CONCEPT_PLACEHOLDER')|e], створеного [target_characterGetNameWithNoTooltip]"
  succession_crisis.9.title: "Допомога від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  succession_crisis.9.desc: "Рух [succession_crisis_pretender_scope.GetName] набрав обертів у нашому [ROOT.GetCountry.GetFlavorRank], який хитається на межі краху. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], що колись підтримували наш трон, були змушені усвідомити небезпеки, спричинені зростаючим повстанням. Багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] визнають, що їхні землі та привілеї пов'язані з продовженням нашої [ROOT.GetCountry.GetGovernment.GetAdjective] лінії, і тому фракція згуртувалася на наш захист. Зі своїми особистими почтами та вірними прапороносцями вони пропонують підтримку проти сил претендентів. Однак, натомість вони очікують більшого впливу на наше управління."
  succession_crisis.9.a: "Вони нам потрібні."
  succession_crisis.9.b: "Не обмінюймо одну небезпеку на іншу!"
  succession_crisis_9_tt: "Багато членів [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] $shared_conditional_support_key$"
  shared_conditional_support_key: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що підтримують претендента, змінять свою вірність в обмін на новий [Concept('estate_privilege', 'CONCEPT_PLACEHOLDER')|e] для їхнього [Concept('estate', 'CONCEPT_PLACEHOLDER')|e]"
  succession_crisis.10.title: "Допомога від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  succession_crisis.10.desc: "Навіть коли наш народ розділений у своїй підтримці [succession_crisis_pretender_scope.GetName], вірні звертаються до [ROOT.GetCountry.GetGovernment.GetEstateNameWith('clergy_estate')] за настановою. Визнаючи небезпеку, яку становить розколотий [ROOT.GetCountry.GetFlavorRank], їхні лідери тепер виступили, пропонуючи свою підтримку.\n\nВ обмін на новий привілей їхні проповідники засудять претендента як узурпатора, закликаючи народ підтвердити свою вірність [target_character1.GetName]. Вони стверджують, що лише через віру [ROOT.GetCountry.GetFlavorRank] може бути збережений і відновлений."
  succession_crisis.10.a: "Який у нас вибір?"
  succession_crisis.10.b: "Ми не можемо дозволити собі ці поступки!"
  succession_crisis_10_tt: "Багато членів [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')] $shared_conditional_support_key$"
  succession_crisis.11.title: "Допомога від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  succession_crisis.11.desc: "Поки [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] гострять свої кинджали, а [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] проповідують про божественний порядок, [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] займають більш прагматичний підхід. Розглядаючи кризу як загрозу торгівлі та процвітанню, вони пропонують рішення.\n\nЗа словами їхніх найвпливовіших і найбунтівніших членів, їх можна було б легко заспокоїти, щоб вони перейшли на наш бік. Натомість вони вимагають нових привілеїв, створюючи міцну базу підтримки при [ROOT.GetCountry.GetGovernment.GetCourtTitle] [target_character1.GetName]. Спокуслива пропозиція, але така, що може послабити центральну владу в довгостроковій перспективі"
  succession_crisis.11.a: "Ми поступимося."
  succession_crisis.11.b: "Вони забули своє місце!"
  succession_crisis_11_tt: "Багато членів [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')] $shared_conditional_support_key$"
  succession_crisis.100.title: "Кінець кризи престолонаслідування"
  succession_crisis.100.desc.a: "Міжусобиці по всій [ROOT.GetCountry.GetLongName] закінчилися лише для того, щоб спалахнула ескалація громадянської війни. Матері, діти та невинні заповнюють вулиці криками жаху, коли вогонь і метал охоплюють увесь домен..."
  succession_crisis.100.desc.b: "Після періоду нестабільності, смерть нашого старого правителя поступилася місцем претензіям [ROOT.GetCountry.GetGovernment.GetRuler.GetName] на наш трон. На краще чи на гірше, це шлях, яким ми маємо йти..."
  succession_crisis.100.desc.c: "На жаль, божественне простягнуло нам руку благодаті. Лідер повстання, що назрівало і загрожувало вкинути весь наш домен у громадянську війну, загинув. Знак втручання чи випадковий кидок долі? На краще чи на гірше, ми відновили контроль над нашими внутрішніми справами, але наскільки довго?"
  succession_crisis.100.desc.d: "Громадянські чвари, відкриті повстання та незліченна кількість інших проклять спіткали наш народ. Однак жодне з них не змогло зламати наш дух, і під керівництвом [ROOT.GetCountry.GetGovernment.GetRuler.GetName] ми врятували велику [ROOT.GetCountry.GetLongName] від неминучої загибелі!"
  succession_crisis.100.a: "Ми покладатимемося на видатних членів нашого двору."
  succession_crisis.100.b: "Ми впораємося самі!"
  succession_crisis.100.c: "Чи були коли-небудь сумніви?"
  based_on_our_crownpower_and_prestige_tt: "Виходячи з нашої [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e] та [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e], ми отримаємо наступне:"