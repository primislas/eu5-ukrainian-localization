l_english:
  coup_attempt.1.title: "Залізо та Зрада"
  coup_attempt.1.desc: "Повітря густе від шепоту зради. Змова пустила коріння в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], маючи на меті скинути правління [target_character.GetName]. Придворні шепочуться за зачиненими дверима, і самі основи нашого [ROOT.GetCountry.GetFlavorRank] хитаються. Ми повинні діяти швидко та рішуче, перш ніж зрада обернеться кровопролиттям. Якщо ми не мобілізуємо наших довірених осіб, змовники лише наберуть сміливості, завдавши удару, коли ми будемо найбільш вразливими, спричинивши тривалу нестабільність."
  coup_attempt.1.a: "Викрити змовників і розгромити їх!"
  explain_coup_attempt_tt: "Надає доступ до [ShowGenericActionName('conduct_investigation')], [ShowGenericActionName('call_private_council')] та [ShowGenericActionName('execute_court_member')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] [Concept('actions', 'CONCEPT_PLACEHOLDER')|e]\n"
  explain_coup_attempt_2tt: "Ми можемо вийти переможцями з цього [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] або збільшивши нашу [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e], або усунувши всіх змовників протягом #Y 5#! років, або перш ніж вони встигнуть убити [target_character.GetNameWithNoTooltip]"
  coup_attempt.2.title: "Змова Зростає"
  coup_attempt.2.desc: "Повідомлення про зраду множаться, і наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] стає кублом гадюк. Кожен день приносить чутки про нових перебіжчиків та приховані союзи. Ті, хто колись присягав на вірність, тепер змовляються в затінених залах. Криза поглиблюється, і незабаром вона може вийти з-під нашого контролю. Настав час діяти і вигнати тих, хто прагне поширити свою отруту!"
  coup_attempt.2.a: "Стерв'ятники кружляють над троном."
  conspiracy_grows_tt: "Один з наших [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] приєднався до [ShowDisasterName('coup_attempt')] проти нас"
  coup_attempt.3.title: "Змовник Викритий"
  coup_attempt.3.desc: "Шпигун у наших лавах викрив ключову фігуру в змові проти [target_character_2.GetName]. Зрадник, [target_character_1.GetName], таємно працював, щоб підірвати наше правління, але [target_character_1.GetHerHis] доля тепер у наших руках. Чи зробимо ми з [target_character_1.GetHerHim] приклад, сподіваючись відлякати інших, чи витягнемо більше інформації? Ми ще можемо розкрити глибші корені цієї зради."
  coup_attempt.3.a: "Стратити [target_character_1.GetHerHim]!"
  coup_attempt.3.b: "Пощадити [target_character_1.GetHerHis] життя."
  coup_attempt.3.c: "Примусити [target_character_1.GetHerHim] розкрити потенційних співзмовників!"
  coup_attempts_3_b_tt: "[target_character_1.GetShortNameWithNoTooltip] припинить [target_character_1.GetHerHis] підтримку перевороту та призведе до страти двох #Y потенційних#! співзмовників [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  conspirators_exposed_tt: "Буде проведено розслідування для виявлення потенційних змовників"
  target_character_1_flees: "[target_character_1.GetSheHe|U] тікає за кордон"
  cease_activities_and_stay: "\n[target_character_1.GetSheHe|U] залишається в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] і припиняє [target_character_1.GetHerHis] змовницьку діяльність"
  coup_attempt.4.title: "Розслідування в [SCOPE.sCountry('actor').GetGovernment.GetCourtTitle]"
  coup_attempt.4.desc: "Наші агенти, під пильним оком [target_character_2.GetName], розпочали глибоке та небезпечне розслідування. Вони елегантно обшукують зали, прислухаючись до пошепки та спостерігаючи за найменшим промахом. Кожна взаємодія ретельно перевіряється, і ніхто не вище підозри. Але чим глибше вони копають, тим більше ворогів ми наживаємо. Їхні останні знахідки справді вражаючі, вони малюють [target_character_1.GetName] як важливого члена змови!"
  target_character_1_ends_support_tt: "[target_character_1.GetNameWithNoTooltip] мирно припинить [target_character_1.GetHerHis] підтримку перевороту"
  coup_attempt.5.title: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Зрада"
  coup_attempt.5.desc: "Шокуюче викриття сколихнуло [ROOT.GetCountry.GetGovernment.GetCourtTitle]! Виявляється, наш власний [target_character_2.GetName] є серед змовників. Сам рід був отруєний зрадою. Чи можемо ми ризикнути викрити [target_character_2.GetHerHis] підступні дії, чи [target_character_2.GetHerHis] страта розірве [ROOT.GetCountry.GetFlavorRank] на частини?"
  coup_attempt.5.a: "Викрити [target_character_2.GetHerHis] схеми."
  coup_attempt.5.b: "Геть [target_character_2.GetHerHis] голову!"
  coup_attempt.5.c: "Ми не можемо ризикувати [ROOT.GetCountry.GetGovernment.GetAdjective] лінією."
  coup_attempt.6.title: "Таємна Рада [GetCurrentYear] року"
  coup_attempt.6.desc: "Було організовано таємну зустріч найвпливовіших членів станів, де секретні угоди та тихі переговори можуть вирішити долю нашого [ROOT.GetCountry.GetFlavorRank]. Деякі вимагають монети та привілеїв, інші пропонують компроміс. Яке б рішення ми не прийняли, ми повинні збалансувати нашу внутрішню стабільність та нашу владу. Вибір покладатися на цю раду, безумовно, розкриє імена деяких змовників, одночасно зміцнюючи владу станів у довгостроковій перспективі."
  coup_attempt.6.a: "Дуже добре, ціна варта того, щоб її заплатити."
  coup_attempt.6.b: "Подумавши ще раз..."
  conspirator_names_exposed_tt: "Імена деяких змовників будуть розкриті в наступній [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  coup_attempt.7.title: "Імена змовників розкрито"
  coup_attempt.7.desc: "Завдяки махінаціям таємної ради, у поєднанні з хабарництвом та ретельним розслідуванням, ми отримали імена тих, хто змовився проти нас. Їхні долі тепер у наших руках. Деякі з наших радників підтримують ідею швидкої чистки змовників, таких як [target_character_2.GetName] та [target_character_2.GetHerHis] поплічники. Однак інші пропонують шлях милосердя, тримаючи цих небезпечних осіб близько, щоб маніпулювати ними пізніше?"
  coup_attempt.7.desc_b: "Завдяки зусиллям таємної ради ми розкрили особу зрадника, що змовився проти нас. [target_character_2.GetName] тепер у нашій владі. Деякі радники наполягають на негайній страті, стверджуючи, що залишати таку загрозу живою надто небезпечно. Інші, однак, пропонують більш виважений підхід, вважаючи, що збереження [target_character_2.GetHisHer] життя може дозволити нам маніпулювати [target_character_2.GetHerHim] на нашу користь."
  coup_attempt.7.a: "Вбити їх. Вбити їх усіх!"
  coup_attempt.7.b: "Дарувати їм милосердя, вони нам потрібні."
  coup_attempt.7.c: "Вбити [target_character_2.GetHerHim]!"
  coup_attempt.7.d: "Дарувати [target_character_2.GetHerHim] милосердя."
  conspirators_will_stick_around_absolved_tt: "Вищезгадані змовники будуть звільнені від своїх злочинів, їхні голови залишаться на плечах, поки що..."
  conspirators_will_stick_around_absolved_2_tt: "[target_character_2.GetNameWithNoTooltip] буде звільнений від [target_character_2.GetHisHer] злочинів, [target_character_2.GetHisHer] голова залишиться на [target_character_2.GetHisHer] плечах, поки що..."
  coup_attempt.8.title: "Спроба вбивства"
  coup_attempt.8.desc: "Загін вбивць, безсумнівно, фінансований тіньовими змовниками, здійснив зухвалу спробу на життя [target_character_1.GetName]! Діючи як кульмінація місяців зусиль, ці негідники мають на меті дестабілізувати наше правління та покласти край пануванню [target_character_1.GetShortNameWithNoTooltip]!"
  coup_attempt.8.a: "Негідники!"
  this_will_end_the_coup_disaster_tt: "Це завершить [ShowDisasterName('coup_attempt')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] #R негативно#!"
  coup_attempt.9.title: "Страта змовника?"
  coup_attempt.9.desc.conspirator: "[target_character_2.GetName] було страчено. Народ радіє покаранню відомого зрадника, і наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] дихає легше тепер, коли справедливість відновлено. Це, ймовірно, не остання голова, яка повинна скотитися, щоб трон був у безпеці під [target_character.GetName], але це все ж крок у правильному напрямку."
  coup_attempt.9.desc.innocent: "На жаль! Кат був надто радий опустити сокиру на невинну шию, і таким чином було допущено серйозну помилку! Здається, [target_character_2.GetName] був невинний, але [target_character_2.GetHerHis] голова тепер лежить біля наших ніг. [ROOT.GetCountry.GetGovernment.GetCourtTitle] шепочеться в страху, і довіра до правління [target_character.GetName] похитнулася."
  coup_attempt.9.a: "Що ми наробили? [target_character_2.GetSheHe|U] був невинний!"
  coup_attempt.9.b: "Голова зрадника прикрасить нашу стіну!"
  because_they_are_consort_or_heir_tt: "Через важливість невинного [target_character_2.GetShortNameWithNoTooltip]:"
  coup_attempt.100.title: "Затяжні тіні"
  coup_attempt.100.desc: "Заколот не було придушено, а невдоволення продовжує розростатися та гноїтися в тіні. Змовники, можливо, затаїлися, але їхні ідеї живуть, отруюючи розуми тих, хто залишився. Якщо ми не будемо пильними, історія може повторитися."
  coup_attempt.100.a: "Нам доведеться готуватися до їхньої наступної спроби."
  inconclusive_end_5_years_tt: "Змовників не було усунуто вчасно, проте вони також не діяли проти [target_character.GetName]. [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] завершується #R безрезультатно#! і може знову розпочатися через #Y 5#! років"
  murdered_ending_tt: "Змовникам вдалося вбити [target_character_2.GetName]. Лише час покаже, чи є [target_character.GetName] маріонеткою змовників."
  coup_attempt.101.title: "Кінець змови"
  coup_attempt.101.desc: "З відновленням легітимності правління [target_character.GetName] стоїть міцно. Народ гуртується за нами, і ніхто не наважується оскаржувати наше право. Ми вийшли з темряви сильнішими, ніж будь-коли!"
  coup_attempt.101.a: "Ніхто не наважується оскаржувати наше ім'я!"
  coup_attempt.200.title: "Світанок нової ери"
  coup_attempt.200.desc: "Старий порядок розпався, і з попелу постає нове бачення для нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Змова, хоч і кривава, змінила шлях попереду, скинувши владу та вплив старої монархії. Тепер ми повинні скористатися цим моментом і прокласти наш курс у невизначене завтра, яким би дивовижним і привабливим воно не здавалося!"
  coup_attempt.200.a: "Майбутнє незвідане!"