l_english:
  decline_of_empire.1.title: "Занепад [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  decline_of_empire.1.desc: "Коли [ROOT.GetCountry.GetLongName] розтягнулася, починають з'являтися тріщини. [ROOT.GetCountry.GetGovernment.GetCourtTitle] паралізований слабким керівництвом, його зали сповнені корупції та нерішучості. Віддалені провінції, навіть у [target_region.GetName], страждають від занедбаності, тоді як невдоволення поширюється серцевинними землями. Шепіт повстання лунає вулицями, а колись могутня бюрократія під [target_character.GetName] намагається зберегти контроль.\n\n[ROOT.GetCountry.GetFlavorRank] хитається на краю прірви. Народ стає неспокійним, голод та економічний занепад розпалюють їхній гнів, а амбітні суперники бачать слабкість. Якщо порядок не буде відновлено, крах неминучий. Наступні роки випробують нашу стійкість як ніколи раніше. Те, що було збудовано кров'ю та працею, тепер стоїть перед повною руїною, оскільки час протистоїть ще одному [ROOT.GetCountry.GetFlavorRank]."
  decline_of_empire.1.a: "Падають зірки, разом із нашими серцями."
  during_decline_of_empire_explanation_tt: "Під час цього [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e], [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] з [Concept('non_accepted_culture', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] або низьким [Concept('control', 'CONCEPT_PLACEHOLDER')|e] можуть прагнути незалежності. Тим часом, іноземні суперники можуть скористатися нашою слабкістю, щоб розширити свої кордони."
  decline_of_empire.2.title: "Кінець занепаду"
  decline_of_empire.2.desc: "Коли вогні кризи згасають, [ROOT.GetCountry.GetLongName] починає відбудовуватися. Порядок відновлено, а тріщини, що колись загрожували розірвати [ROOT.GetCountry.GetFlavorRank], були залагоджені. Чи то через посилення контролю, чи через прийняття культурної єдності, хаос, що охопив наш народ, було приборкано.\n\nШепіт повстання замовкає, колись неспокійні провінції повертаються до складу, а [ROOT.GetCountry.GetGovernment.GetCourtTitle] знову утверджує свою владу. Хоча шрами залишаються, найгірше минуло. Ми успішно пережили бурю і вийшли, якщо не неушкодженими, то принаймні незламними."
  decline_of_empire.2.a: "Найгірше позаду!"
  pops_accepted_or_primary_culture_gain_10_satisfaction_home_region_tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] з [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] або [Concept('accepted_culture', 'CONCEPT_PLACEHOLDER')|e] у [target_region.GetName] [Concept('region', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  decline_of_empire.3.title: "Вогні незалежності"
  decline_of_empire.3.desc: "Заворушення, що охопили [ROOT.GetCountry.GetLongName], нарешті принесли свої неминучі наслідки; [target_country.GetName] вирвалася на волю. Ослаблені внутрішніми чварами, наш контроль над регіоном послабився, і місцеві правителі скористалися нагодою, щоб скинути наше панування. Їхні прапори майорять високо, їхні лідери говорять про суверенітет, а їхні армії готові захищати свою новонабуту свободу.\n\nТепер ми стоїмо перед вибором: зібрати залишки сил, щоб придушити це повстання і повернути те, що наше, або прийняти втрату і зосередитися всередині, забезпечивши, щоб решта [ROOT.GetCountry.GetFlavorRank] не пішла тим самим шляхом."
  decline_of_empire.3.a: "Придушити їх!"
  decline_of_empire.3.b: "Надати їм свободу, поки що."
  target_country_allowed_to_slip_from_grasp_tt: "[target_country.GetNameWithNoTooltip] проголосить безкровну незалежність.\nМи #R втратимо#! наші [Concept('cores', 'CONCEPT_PLACEHOLDER')|e] у їхніх [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]"
  decline_of_empire.4.desc: "Серед хаосу, що охопив наші землі, [target_country.GetName] скористалася моментом і проголосила свою незалежність. Наша ослаблена влада виявилася недостатньою, щоб утримати їхні непокірні провінції разом, і тепер повстання стоїть зухвало. Їхні сили збираються під власним прапором, а їхні лідери сміливо заявляють про автономію, назавжди відмовляючись від нашого правління.\n\nПитання надання їм незалежності є складною темою через наше поточне скрутне становище. Підкорення їхнім вимогам може призвести до зникнення наших претензій на їхні землі, але це також забезпечило б можливість зосередити нашу увагу на більш нагальних справах в іншому місці."
  decline_of_empire.4.a: "Вони забули, кому служать, до зброї!"
  decline_of_empire.4.b: "Нам байдуже до дрібних чвар віддалених [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  decline_of_empire.5.title: "Вмираюча імперія"
  decline_of_empire.5.desc: "Наші сусіди в [target_country.GetName] паралізовані кризою та занепадом, їхній [target_country.GetFlavorRank] руйнується під повстаннями та безладом. Їхні армії розтягнуті, їхні провінції вислизають з їхніх рук, а їхні лідери намагаються утримати свій [target_country.GetGovernment.GetCourtTitle] разом. З їхніми розділеними силами та увагою, зосередженою в іншому місці, ми маємо рідкісну можливість. Швидка кампанія могла б забезпечити ключові території, перш ніж вони відновляться — але якщо ми діятимемо занадто пізно, ми можемо зіткнутися з дорогою війною."
  decline_of_empire.5.a: "Куй залізо, поки гаряче!"
  decline_of_empire.5.b: "Ми почекаємо свого часу, поки що."
  decline_of_empire.6.title: "Вимоги народу"
  decline_of_empire.6.desc: "Після заворушень народ [target_culture.GetName] почав висловлювати свої вимоги щодо більшої автономії. Невдоволення, що прокотилося [ROOT.GetCountry.GetFlavorRank], підживило їхнє бажання мати більше контролю над власними справами, і тепер вони закликають до реформ, які надали б їм більшу незалежність від нашого центрального правління.\n\nВідмова у їхньому проханні може виявитися небезпечною! Зростає обурення, і сіються зерна повстання. Якщо ми проігноруємо їхнє прохання, ми ризикуємо відштовхнути частину нашого населення та спровокувати ще більше заворушень по всьому [ROOT.GetCountry.GetFlavorRank]. Натомість, пропозиція поступок могла б послабити напругу та підтримати стабільність, але це може коштувати ослаблення нашого контролю."
  decline_of_empire.6.a: "Надати їм деяку автономію."
  decline_of_empire.6.b: "Вони забули своє місце!"
  explain_decline_of_empires_events.6_tt: "Зменшення нашого [Concept('control', 'CONCEPT_PLACEHOLDER')|e] у цих [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] зашкодить нашому загальному контролю в короткостроковій перспективі. Однак, збільшення [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] наших [target_culture.GetNameWithNoTooltip] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] може призвести до довгострокових здобутків у [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  show_num_pops_affected_a_tt: "Приблизно [ROOT.GetVariable('pop_size_variable').GetValue|V0]#Y K#! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] з [target_culture.GetNameWithNoTooltip] [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  showcase_affected_locations_num_tt: "Приблизно #Y [ROOT.GetVariable('num_locations_affected_variable').GetValue]#! [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з [target_culture.GetNameWithNoTooltip] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  show_num_pops_affected_b_tt: "Приблизно [ROOT.GetVariable('pop_size_variable').GetValue|V0]#Y K#! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] з [target_culture.GetNameWithNoTooltip] [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"