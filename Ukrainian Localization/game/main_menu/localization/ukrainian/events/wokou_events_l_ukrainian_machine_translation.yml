l_english:
  wokou_name_wako: "Вако"
  wokou_name_waegu: "Ваегу"
  wokou_name_wokou: "Вокоу"
  wokou_events.1.title: "[ROOT.GetCountry.Custom('GetWokouName')|U] Рейд!"
  wokou_events.1.desc: "Грізні [ROOT.GetCountry.Custom('GetWokouName')] щойно здійснили напад на нашу провінцію [target_province.GetName], а особливо на порт [target_location.GetName]. Хоча ми хотіли б сказати, що ми відбили цих загарбників, правда набагато гірша. На жаль, наш місцевий гарнізон просто не зміг вчасно відреагувати, що призвело до значних руйнувань у [target_province.GetNameWithNoTooltip]. Спалені будинки, поневолені родини, викрадені товари — все це лихо обрушилося на бідних [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')]. Ми повинні змусити цих піратів заплатити."
  wokou_events.1.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  wokou_events.2.title: "Наш рейд на [target_province.GetNameWithNoTooltip]"
  wokou_events.2.desc: "Наше приховане вторгнення в [target_province.GetName] було гучним успіхом! Протягом кількох днів ми змогли захопити багато багатств з прибережних поселень і захопили багато рабів. Крім того, ми захопили величезну кількість товарів, особливо [ShowGoodsName('silk')], які ми, безсумнівно, продамо за гідну ціну."
  wokou_events.2.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  wokou_amount_of_slaves_gained: "Загалом [SCOPE.GetLocalVariable('slaves_amount').GetValue|0] [ShowPopTypeName('slaves')] було отримано в [ROOT.GetCountry.GetCapital.GetName]."
  wokou_events.3.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] тікають до [target_country.GetNameWithNoTooltip]"
  wokou_events.3.desc: "Не всі [ROOT.GetCountry.GetAdjective] громадяни такі щасливі, як наші придворні або [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], які всі живуть дуже повноцінним життям. Багато хто, особливо [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] з [target_location.GetName], живуть у жахливих або навіть жалюгідних умовах. Не дивно тоді, що багато з них звертаються до злочинності, щоб уникнути бідності. Багато [target_pop.GetName], наприклад, здається, втекли зі своїх домівок, щоб приєднатися до [target_country.GetLongName]."
  wokou_events.3.a: "Їхнє життя достатньо хороше! Їхня втеча — справжня боягузтво."
  wokou_events.4.title: "Скрутне становище [target_location.GetNameWithNoTooltip]"
  wokou_events.4.desc: "За останні кілька місяців до [ROOT.GetCountry.GetCapital.GetName] прибула велика кількість [target_pop.GetName]. Вони тікають з [target_location.GetName], де вони зіткнулися з абсолютною бідністю та злиднями. Саме тому вони прийняли надзвичайно важке рішення залишити своє минуле життя позаду і відвезти свої сім'ї до [ROOT.GetCountry.GetName], де вони розпочнуть нове життя злочинності, але праведної злочинності."
  wokou_events.4.a: "Вони прийняли правильне рішення."
  wokou_events.5.title: "Рейд на [target_country.GetAdjectiveWithNoTooltip] флот"
  wokou_events.5.desc: "Наразі флотилія [target_country.GetAdjective] кораблів повертається додому з закордонної місії, везучи багато товарів і багатств, які ми, безумовно, могли б використати краще. На відміну від багатьох торгових суден, вони не надто легко охороняються, і ми обов'язково зазнаємо деяких втрат. Однак потенційний прибуток вартий пов'язаних ризиків."
  wokou_events.5.a: "Розпочати атаку."
  wokou_events.5.b: "Ми не можемо ризикувати гнівом [target_country.GetNameWithNoTooltip]."
  wokou_events.6.title: "Рейд на наш флот!"
  wokou_events.6.desc: "Негідники [ROOT.GetCountry.Custom('GetWokouName')] з [prev_country.GetName] здійснили напад на наші флоти, які поверталися з урядової місії. Хоча ми й дали їм бій, вони змогли захопити та пограбувати кілька кораблів, що коштувало нам значної кількості цінного тоннажу."
  wokou_events.6.a: "Негідники!"
  wokou_events.100.title: "Банда піратів"
  wokou_events.100.desc: "Жахливі умови життя та злидні — ось як найкраще характеризуються острови західної [ShowRegionName('japan_region')]. Незважаючи на наші благородні зусилля, наш контроль там у кращому випадку слабкий, а місцеві клани не завжди можуть зупинити місцевих жителів від злочинності, що призводить до розгулу піратства, яке впливає не лише на наші внутрішні води в [ShowProvinceDefinitionName('seto_sea')], але й на міжнародні води, що оточують [ShowRegionName('korea_region')] та $china$.\n\nЦя проблема, що існувала досі, стала серйознішою, оскільки певному воєначальнику вдалося централізувати владу та об'єднатися, щоб сформувати [target_country.GetLongName], які заснували базу в [target_location.GetName]."
  wokou_events.100.a: "Сподіваймося, ми не станемо мішенню."
  wokou_events.100.b: "Ми б хотіли жити таким життям."
  wokou_warning_tt: "[ROOT.GetCountry.Custom('GetWokouName')] нації мають [ShowGovernmentReformName('pirate_brethren_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e], і їхнє існування поблизу нас спричинить негативні [Concept('events', 'CONCEPT_PLACEHOLDER')|e]."
  wokou_events.101.title: "Запровадження [ShowPolicyNameWithNoTooltip('haijin_policy')]"
  wokou_events.101.desc: "Хоча протягом багатьох років ми дотримувалися політики [ShowPolicyName('haijin_policy')], лише нещодавно, за правління [target_character.GetShortName], її почали суворо дотримуватися. Після нещодавнього указу ми взялися належним чином патрулювати узбережжя [ROOT.GetCountry.GetName] і в процесі стратили багатьох контрабандистів та дисидентів. Сподіваємося, це послужить прикладом, щоб не кидати виклик [ROOT.GetCountry.GetAdjective] політиці."
  wokou_events.101.a: "Сподіваємося, це не матиме жодних негативних наслідків."
  later_era_of_wokou_tt: "Нові [ROOT.GetCountry.Custom('GetWokouName')] нації почнуть з'являтися в [ShowAreaName('taiwan_area')] та навколо неї, на північ від [ShowAreaName('luzon_area')] та [ShowAreaName('ryuukyuu_area')]."
  wokou_events.102.title: "Родина стає на шлях піратства"
  wokou_events.102.desc: "Після нашого суворішого запровадження Хайцзінь, одна з родин, яка раніше займалася контрабандою, тепер звернулася до піратства на все життя, не бачачи перспектив жити за законом. Вони взяли свої кораблі та своїх спільників і вирушили у відкрите море, заснувавши [ShowBuildingTypeName('pirate_stronghold')] у [target_location.GetName] під прапором [target_country.GetLongName]."
  wokou_events.102.a: "Ми суворо їх покараємо."
  wokou_events.102.b: "$wokou_events.100.b$"
  wokou_events.200.title: "Невпинні [ROOT.GetCountry.Custom('GetWokouName')|U] рейди"
  wokou_events.200.desc: "Підлі пірати [pirate_country.GetName] невпинно грабували наші узбережжя останні кілька років. Хоча [ROOT.GetCountry.Custom('GetWokouName')|l] активність нам не чужа, цього разу все інакше, оскільки цим негідникам вдалося заручитися підтримкою покровителя, [target_country.GetName]. Ми повинні вжити заходів і чинити тиск на [target_country.GetAdjectiveWithNoTooltip] [target_country.GetGovernment.GetRulerTitle], щоб піратство ніколи більше не загрожувало водам [ROOT.GetCountry.GetNameWithNoTooltip]."
  wokou_events.200.a: "Погрожувати [target_country.GetLongNameWithNoTooltip] відплатою."
  wokou_events.200.b: "Ми не в змозі висувати такі вимоги."
  wokou_events.201.title: "Вимоги від [prev_country.GetNameWithNoTooltip]"
  wokou_events.201.desc: "Обурені нашим мовчазним схваленням [pirate_country.GetAdjective] рейдів, [prev_country.GetLongName] вимагає, щоб ми припинили наше спонсорство [ROOT.GetCountry.Custom('GetWokouName')|l]. Згідно з цими вимогами, ми повинні екстрадувати членів [pirate_country.GetAdjectiveWithNoTooltip] керівництва до [prev_country.GetNameWithNoTooltip], фактично припинивши їхні операції. Якщо ми цього не зробимо, [prev_country.GetNameWithNoTooltip] розглядатиме це як привід для війни, і мішенню може стати не лише [pirate_country.GetNameWithNoTooltip], а й [ROOT.GetCountry.GetName]."
  wokou_events.201.a: "Підкоритися, принаймні наразі."
  wokou_events.201.b: "[ROOT.GetCountry.Custom('GetWokouName')|l] – це не наша проблема."
  wokou_events.202.title: "Покарані пірати"
  wokou_events.202.desc: "[target_country.GetName] позитивно відреагувала на наші вимоги, не лише припинивши своє спонсорство над [pirate_country.GetName], але й надіславши нам одного з піратських лідерів для суду в [ROOT.GetCountry.GetName]. Наразі підлий пірат [target_character.GetName] вже отримав смертний вирок і був зварений живцем у [target_location.GetName], як і належить."
  wokou_events.202.a: "Сподіваємося, це відлякає інших."
  wokou_events.203.title: "[target_country.GetNameWithNoTooltip] зухвала"
  wokou_events.203.desc: "[target_country.GetName] відмовилася виконати наші прохання про екстрадицію [ROOT.GetCountry.Custom('GetWokouName')|l] лідерів. Невже вони не розуміють, що це означає війну з [pirate_country.GetName] і, можливо, навіть з їхнім [target_country.GetFlavorRank]?"
  wokou_events.203.a: "Нам доведеться очищати моря самим."