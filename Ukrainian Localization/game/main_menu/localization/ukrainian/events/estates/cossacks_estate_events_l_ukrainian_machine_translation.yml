l_english:
  cossack_estate_events.1.title: "Колонізація Степів"
  cossack_estate_events.1.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] скаржаться, що дедалі більше кріпаків покидають безпечні домівки, надані їм, щоб шукати щастя серед [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] степів. Вони вважають, що ми винні, оскільки дозволили [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] стати надто могутніми, і це надихає кріпаків залишати своїх законних панів.\n\nПредставники великих родин [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] тепер вимагають, щоб ми обмежили владу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')], аби самі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] могли натомість розширити свої латифундії в регіонах, що межують зі степом. Таким чином, стверджують вони, дикі поля можна приборкати, а закони держави підтримувати."
  cossack_estate_events.1.a: "Цих кріпаків треба повернути."
  cossack_estate_events.1.b: "Ми не можемо дозволити собі гнівити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]."
  cossack_estate_events.2.title: "Зростання Влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]"
  cossack_estate_events.2.desc: "Хоча мало хто заперечував би їхній вплив у степах, [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] мають багато перешкод на шляху до здобуття впливу в коридорах влади. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] зневажають їх і хотіли б бачити їх усіх як кріпаків на своїх латифундіях, а їхні манери не принесли їм багато друзів у [ROOT.GetCountry.GetCapital.GetName].\n\nОднак останнім часом справи йдуть на їхню користь. Їм вдалося захистити свої поселення, а їхні послуги державі як рейдерів є безперечними."
  cossack_estate_events.2.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  cossack_estate_events.3.title: "Занепад Влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]"
  cossack_estate_events.3.desc: "Вільний характер [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] та відстань між ними та коридорами влади в [ROOT.GetCountry.GetCapital.GetName] завжди були для них проблемою. Через відсутність спадкових привілеїв кількість [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')], що мали достатній вплив, аби впливати на події [ROOT.GetCountry.GetGovernment.GetCourtTitle], неухильно зменшувалася."
  cossack_estate_events.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  cossack_estate_events.4.title: "Клопотання про Привілеї"
  cossack_estate_events.4.desc: "Не всі [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] отримують однакові привілеї від держави. Традиційно, права надаються певним [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')], які готові надавати великі послуги державі у воєнний час. Оскільки ці права не передаються після смерті, це означає, що вплив [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] може значно змінюватися з часом. На думку [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')], настав час надати їм подальші привілеї, щоб збільшити нашу чисельність."
  cossack_estate_events.4.a: "Нам потрібно більше [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] в армії!"
  cossack_estate_events.4.b: "Нам потрібно більше реєстрових [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]!"
  cossack_estate_events.4.c: "Нехай вони дбають про свої степи."
  cossack_estate_events.5.title: "Припаси для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]"
  cossack_estate_events.5.desc: "Життя на кордоні може бути суворим, і хоча [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] звикли вести власні битви, невелика допомога з центральної скарбниці, ймовірно, була б доречною. Минулий сезон був надзвичайно суворим, і разом зі зростанням кількості набігів та вторгнень бандитів, багато [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] тепер відчувають гостру нестачу продовольства на найближчі місяці. Якби ми постачали [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] продовольство, а також військове спорядження, таке як зброя та уніформа, ми б не тільки безпосередньо зміцнили наших захисників у степах, але й, ймовірно, тісніше пов'язали б їх з нашою державою."
  cossack_estate_events.5.a: "Надіслати їм те, що їм потрібно."
  cossack_estate_events.5.b: "Їм доведеться обходитися самотужки."
  cossack_estate_events.6.title: "Торговельні Збурення"
  cossack_estate_events.6.desc: "Завжди існувала напруга між [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] та іншими станами, хоча б через їхні незвичайні манери та різноманітне походження. Однак останнім часом вона значно зросла. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] стурбовані набігами [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] і стверджують, що ті націлені на їхні вантажі. Самі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] стверджують, що вони нападають лише на бандитів та розбійників у цьому районі, і що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] просто помиляються.\n\nОскільки в цьому районі мало урядового представництва, важко встановити істину, але між цими двома групами явно існує тертя, і ми повинні або дорікнути, або покарати одну зі сторін у цьому конфлікті."
  cossack_estate_events.6.a: "Підтримати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]."
  cossack_estate_events.6.b: "Підтримати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  cossack_estate_events.7.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] Поселенці в [target_cossacks_destination.GetNameWithNoTooltip]"
  cossack_estate_events.7.desc: "Життя в степах привчило [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] до прикордонного існування. Постійні загрози як від суворого клімату на необжитій землі, так і від іноземних рейдерів зробили [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] як грізними воїнами, так і витривалими поселенцями.\n\nКоли ми звертаємо свій погляд на землі [target_cossacks_destination.GetName], стає очевидним, що життя на кордоні не надто відрізняється від життя в степах, які ми вже контролюємо."
  cossack_estate_events.7.a: "Залучити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] поселенців."
  cossack_estate_events.7.b: "Ми не можемо довіряти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]."
  cossack_estate_events.8.title: "Заворушення серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]"
  cossack_estate_events.8.desc: "Глибока недовіра [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] до держави загалом і до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] зокрема призвела до повного краху влади на їхніх територіях. Громади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] відкрито ворожі до наших емісарів і де-факто тепер діють повністю незалежно від центральної влади."
  cossack_estate_events.8.a: "Залишити їх у спокої, відносини з часом покращаться."
  cossack_estate_events.8.b: "Придушити інакодумців."
  cossack_estate_events.9.title: "Експансія [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] у [target_location.GetNameWithNoTooltip]"
  cossack_estate_events.9.desc: "Кордони часто можуть бути теоретичними речами, особливо в диких полях. Здається, [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] швидко розширилися в [target_location.GetName], і тепер їхня власна влада там поважається більше, ніж наша. Ми могли б спробувати змінити цей розвиток, але [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] навряд чи доброзичливо сприймуть виселення з землі, яку вони наполегливо освоювали."
  cossack_estate_events.9.a: "Прийняти новий статус-кво."
  cossack_estate_events.9.b: "Повернути землю від [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]."
  cossack_estate_events.10.title: "Вимоги щодо розширених привілеїв"
  cossack_estate_events.10.desc: "Стара мрія [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] завжди полягала в тому, щоб їх прийняли як рівних усталеним станам, таким як [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] або [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Ніколи ця мрія не була ближчою до реалізації, ніж зараз. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] досягли великого впливу в нашій державі, і ми багато в чому покладаємося на їхню підтримку.\n\nВраховуючи сприятливі обставини, багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] тепер висловлюють свої старі вимоги щодо офіційного визнання та привілеїв."
  cossack_estate_events.10.a: "Безглуздо."
  cossack_estate_events.10.b: "Піддатися їхнім вимогам."
  cossack_estate_events.11.title: "Люди переселяються до степів"
  cossack_estate_events.11.desc: "З такою великою кількістю степових земель у наших кордонах, багато хто серед нашого народу думає про можливості, які ці землі можуть принести. Звісно, [ShowCultureGroupName('tatar_group')] люди жили там з тих пір, як прийшли зі Сходу, але їхній спосіб життя досить відрізняється від способу життя нашого населення. Проте, регіон навколо [target_migration_province.GetName], здається, привернув увагу багатьох, оскільки вже є помітна кількість людей у нашому [ROOT.GetCountry.GetFlavorRank], які вирішили переселитися туди і шукати свою долю на цій новій землі."
  cossack_estate_events.11.a: "Сміливий крок, справді."
  cossack_estate_events.11.b: "Дурниці, ніхто не рухається, якщо ми не дозволимо."
  cossack_estate_events.12.title: "Виникнення [ShowCultureNameWithNoTooltip('cossack_culture')] культури"
  cossack_estate_events.12.desc: "Оскільки наш народ освоював степові регіони в межах наших кордонів, йому довелося пристосовуватися до суворих умов. Успадкувавши від [ShowCultureGroupName('tatar_group')], що кочували цими землями, вони повільно змінювали свої традиції та спосіб життя, до того, що стали чимось новим і відмінним. Таким чином, люди в [target_cossack_conversion.GetName] почали називати себе [ShowCultureName('cossack_culture')]."
  cossack_estate_events.12.a: "Цікавий розвиток."
  cossack_estate_events.12.tt: "Багато наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_cossack_conversion.GetName] стануть [ShowCultureName('cossack_culture')] [ShowPopTypeName('tribesmen')]"
  cossack_estate_events.1000.title: "Агресія [cossack_origin_country.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')]"
  cossack_estate_events.1000.desc: "Швидко пересуваючись човном або верхи, [cossack_origin_country.GetGovernment.GetEstateName('cossacks_estate')] степів є дуже вправними набіжниками. Кілька таких набігів останнім часом спустошили нашу сільську місцевість і навіть поселення на деякій відстані від наших кордонів, розоривши [cossack_target_location.GetRank.GetName] [cossack_target_location.GetName]. Після здійснення набігів ці грабіжники відступають назад за кордони [cossack_origin_country.GetName] так само швидко, як і прийшли.\n\nЯк [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], так і [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] мають інтереси в постраждалих районах, і обидві групи тепер вимагають, щоб ми щось зробили."
  cossack_estate_events.1000.a: "Вимагати, щоб ці [cossack_origin_country.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] були притягнуті до відповідальності!"
  cossack_estate_events.1000.b: "Нам доведеться просто пропустити це."
  cossack_estate_events.1001.title: "$cossack_estate_events.1000.title$"
  cossack_estate_events.1001.desc: "Не секрет, що наші [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] вільно блукають і перейняли деякі тактики грабунку та мародерства. Нещодавно надійшли повідомлення, що деякі з цих набігів вийшли за межі наших кордонів, і вони спустошили [target_root_country.GetAdjective] сільську місцевість у [cossack_target_location.GetName].\n\nОскільки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')], відповідальні за це, базуються в межах наших кордонів, [target_root_country.GetLongNameWithNoTooltip] тепер вимагають як компенсації, так і притягнення винних до відповідальності."
  cossack_estate_events.1001.a: "Ця справа поза нашим контролем."
  cossack_estate_events.1001.b: "Притягнути їх до відповідальності!"
  cossack_estate_events.1002.title: "[cossack_origin_country.GetAdjectiveWithNoTooltip] Відповідь"
  cossack_estate_events.1002.desc: "[cossack_origin_country.GetAdjective] відповідь полягає в тому, що вони відмовляються брати на себе відповідальність за набіги на нашу країну, стверджуючи, що самі не можуть контролювати [cossack_origin_country.GetGovernment.GetEstateName('cossacks_estate')]."
  cossack_estate_events.1002.a: "Нас мало цікавлять такі виправдання."
  cossack_estate_events.1003.title: "$cossack_estate_events.1002.title$"
  cossack_estate_events.1003.desc: "[cossack_origin_country.GetAdjective] відповідь полягала у надсиланні грошової компенсації за набіги їхніх [cossack_origin_country.GetGovernment.GetEstateName('cossacks_estate')], що відшкодувало збитки майну. Вони також стверджують, що притягнули винних до відповідальності."
  cossack_estate_events.1003.a: "Якби ми тільки могли в це повірити."