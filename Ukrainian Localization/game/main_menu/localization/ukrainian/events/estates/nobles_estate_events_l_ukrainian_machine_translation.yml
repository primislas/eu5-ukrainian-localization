l_english:
  nobles_estate_events.1.title: "Шляхетне походження"
  nobles_estate_events.1.desc: "Багато родин [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] здобули своє нинішнє становище завдяки діянням предка, який служив державі у часи війни. Для більшості їхніх синів життя у війську є, отже, єдиною можливою кар'єрою. Проте, з модернізацією армії, звичайні офіцери вже не є цілком незвичним явищем. Члени [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] тепер звернулися до нас, просячи гарантувати те, що вони вважають правом свого стану. Жодна людина не повинна мати змоги служити командиром у [ROOT.GetCountry.GetAdjective] арміях, якщо вона не шляхетного походження!"
  nobles_estate_events.1.a: "Гарантувати їхнє право командувати нашими арміями."
  nobles_estate_events.1.b: "Ми не можемо давати таких обіцянок."
  nobles_estate_events.2.title: "Піднесення [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  nobles_estate_events.2.desc: "Держава не є єдиним джерелом впливу в нашій країні. Протягом останніх кількох десятиліть харизматичний поборник [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] успішно зумів збільшити владу провідних родин [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] над більшістю інституцій нашої країни.\n\nКонтакти та привілеї можуть бути могутніми речами, особливо у поєднанні з амбіціями."
  nobles_estate_events.2.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nobles_estate_events.3.title: "Зазіхання [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] у [noble_encroachment.GetNameWithNoTooltip]"
  nobles_estate_events.3.desc: "Важко постійно стежити за всіма всюди, а межі між окремими земельними володіннями часто ґрунтуються на давніх традиціях або документах, написаних тоді, коли ландшафт міг виглядати зовсім інакше. Для того, хто має відповідні ресурси, це може бути використано. Кілька видатних родин [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] використали свій значний вплив у [ROOT.GetCountry.GetCapital.GetName], щоб значно розширити свої володіння у [noble_encroachment.GetName]. Якщо ми хочемо захистити власність держави, ми повинні діяти негайно."
  nobles_estate_events.3.a: "$common_string_let_it_slide$"
  nobles_estate_events.3.b: "Вимагати повернення землі."
  nobles_estate_events.4.title: "Тиранічні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  nobles_estate_events.4.desc: "Представник народу, що мешкає в області, де домінує одна з найвидатніших родин [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], сьогодні звернувся до [ROOT.GetCountry.GetGovernment.GetCourtTitle], благаючи [ROOT.GetCountry.GetGovernment.GetRulerTitle] вжити заходів проти того, що він називає систематичними зловживаннями владою проти тамтешнього народу. Як правитель [ROOT.GetCountry.GetName], [target_character.GetName] несе відповідальність за захист [target_character.GetHerHis] народу. Невиконання цього зробить нас слабкими і може зашкодити довгостроковому зростанню провінції. Проте, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] навряд чи схвально сприйме покарання такого могутнього члена своїх лав."
  nobles_estate_events.4.a: "Закрити очі на ці зловживання."
  nobles_estate_events.4.b: "Покарати землевласника."
  nobles_estate_events.5.title: "Занепад влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  nobles_estate_events.5.desc: "Як впливові землевласники та традиційний військовий стан у нашій державі, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] останнім часом не мали успіху. Через поєднання надмірних внутрішніх чвар та погано скоординованих ігор влади, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] втратили вплив у [ROOT.GetCountry.GetCapital.GetName], і багато хто відійшов до своїх володінь у сільській місцевості."
  nobles_estate_events.5.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nobles_estate_events.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вимагають суворіших законів про розкіш"
  nobles_estate_events.6.desc: "Дорогий одяг, пишні бенкети та вражаючі палаци є одними з найпомітніших символів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], але ступінь, до якого одна родина має гроші на такі речі, може значно відрізнятися. У деяких випадках [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] нашої країни можуть витрачати так само розкішно, якщо не більше, ніж пересічний шляхтич. Хоча існують старі правила та традиції, що обмежують такі речі для тих, хто має менш шляхетне походження, ці закони важко ефективно застосовувати. Це неприйнятно для могутніх [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] нашої країни, які тепер вимагають, щоб ми оновили наші закони щодо того, що сторонній може і не може носити. Тепер вони пропонують накласти низку великих штрафів на будь-кого, хто показово намагається піднятися вище за своїх вищих."
  nobles_estate_events.6.a: "Підкоритися бажанням [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  nobles_estate_events.6.b: "Відмовитися підкорятися [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  nobles_estate_events.7.title: "Леве"
  nobles_estate_events.7.desc: "З часом багато повсякденних подій у житті [target_character.GetName] та [target_character.GetHerHis] попередників стали предметом церемонії. Наприклад, можливість бути присутнім у спальні [ROOT.GetCountry.GetGovernment.GetRulerTitle], коли [target_character.GetSheHe] одягається, багатьма вважається найкращим способом здобути [target_character.GetHerHis] прихильність. Пишне придворне життя, безумовно, обмежить владу наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] плести змови проти нас у їхніх сільських володіннях, але воно також може виявитися досить дорогим. Повне ж позбавлення їх права бути частиною повсякденного життя нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], з іншого боку, обмежило б їхній вплив, але [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], ймовірно, обурилися б цим."
  nobles_estate_events.7.a: "Провести пишну та тривалу церемонію для найвпливовіших осіб."
  nobles_estate_events.7.b: "Нам не потрібні такі речі."
  nobles_estate_events.8.title: "Погіршення відносин з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  nobles_estate_events.8.desc: "Відносини між [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetRulerTitle] навряд чи могли бути гіршими. Велике почуття недовіри чітко видно по майже безлюдному [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName], оскільки більшість видатних родин тримаються своїх заміських маєтків. Якщо ми не зробимо щось незабаром, державна влада погіршиться в районах, контрольованих [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], але будь-які вимоги з боку держави, ймовірно, будуть зустрінуті зі зброєю в руках на цьому етапі."
  nobles_estate_events.8.a: "$common_string_leave_them_be$"
  nobles_estate_events.8.b: "Примусити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] прийняти державну владу."
  nobles_estate_events.9.title: "Непокірні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  nobles_estate_events.9.desc: "Жоден з наших підданих не асоціюється з війною більше, ніж [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Покоління тому їхні родини служили нам або державам до нас і здобули свій нинішній статус на полі бою. З тих пір більшість з них зберегли свої старі традиції, тренуючись для життя в полі та налагоджуючи зв'язки з іншими, хто має такі ж схильності.\n\nОднак нинішній стан справ у нашій країні залишив нас з невеликою кількістю членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], готових боротися в наших битвах. Непокора стала поширеною серед наших вищих офіцерів, і ми маємо вагомі підстави підозрювати, що чимало з них сподіваються на невдалу війну."
  nobles_estate_events.9.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  nobles_estate_events.9.b: "Настав час замінити їх людьми справжніх здібностей."
  nobles_estate_events.10.title: "Зростання адміністрації"
  nobles_estate_events.10.desc: "Зі зростанням держави та її бюрократії постійно зростає потреба в людях для нагляду та адміністрування різних земель та функцій. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] очікують бути першими в черзі, коли роздаються державні посади, тоді як [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] стверджують, що ми повинні призначати людей відповідно до індивідуальних заслуг.\n\nНесподівана смерть довіреного секретаря залишила вакантну посаду, яку потрібно заповнити в центрі цього конфлікту, причому [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] підтримують одного кандидата, а [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] очікують, що ми оберемо іншого. Хоча обидва кандидати є талановитими людьми, це має бути політичне рішення."
  nobles_estate_events.10.a: "З великим родоводом приходять великі здібності."
  nobles_estate_events.10.b: "Саморобні люди – це те, що нам потрібно для управління цією країною."
  nobles_estate_events.10.c: "Натомість звернімося до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  nobles_estate_events.11.title: "Традиція служіння"
  nobles_estate_events.11.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] мають давню традицію служіння державі як військові лідери або, нещодавно, як надійні адміністратори. У державі, де [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] настільки міцно вкорінені та лояльні, як у нас, це означає, що час від часу з'являтимуться дворяни великого таланту та лояльності, щоб вести країну до величі."
  nobles_estate_events.11.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_disloyal_noble_officer: "Нелояльний офіцер"