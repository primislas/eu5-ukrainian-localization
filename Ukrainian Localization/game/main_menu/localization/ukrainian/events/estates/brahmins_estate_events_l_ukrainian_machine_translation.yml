l_english:
  brahmins_estate_events.2.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] вимагають формалізації придворних посад"
  brahmins_estate_events.2.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] часто прагнуть світської влади, а не лише духовної. Останнім часом вони стали дуже впливовими в [ROOT.GetCountry.GetName], і багато важливих посад в адміністрації тепер займають [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]. Звикши до своїх високих призначень, ці [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] звернулися до [ROOT.GetCountry.GetGovernment.GetRulerTitle] із низкою вимог. Вони вимагають, щоб певні адміністративні посади були за законом довірені [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], щоб звичаї [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] стали обов'язковими при дворі, і навіть щоб кілька найвищих міністерських посад займали родини [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] за спадковістю. Хоч ці вимоги й обурливі, вплив [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] такий, що відмова може серйозно завадити нашій здатності керувати."
  brahmins_estate_events.2.a: "Прийняти їхню владу."
  STATIC_MODIFIER_NAME_religious_court_life: "Духовне панування"
  STATIC_MODIFIER_DESC_religious_court_life: "Наш двір перебуває під пануванням жрецької касти та правил їхніх священних писань. Ці суворі правила необхідні для збереження прихильності нашого сильного духовенства, але багато наших підданих, як високого, так і низького стану, відчувають відчуження через цей архаїчний спосіб життя."
  brahmins_estate_events.2.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] повинні повернутися до своїх молитов."
  brahmins_estate_events.3.title: "Брахманізм"
  brahmins_estate_events.3.desc: "Суспільні настрої серед [ROOT.GetCountry.GetReligion.GetAdjective] вірян [ROOT.GetCountry.GetName] змістилися в бік брахманізму, погляду, що каста [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] повинна бути шанована як духовна, так і світська влада.\n\n[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] ревно охороняють свою монополію на санскритську освіту, зберігаючи за собою виключне право проповідувати Веди. Їхній соціальний та релігійний авторитет робить їх могутніми, а чудові стосунки [ROOT.GetCountry.GetGovernment.GetRuler.GetShortName] з жрецькою кастою допомагають підтримувати стабільний соціальний порядок по всьому [ROOT.GetCountry.GetName]."
  brahmins_estate_events.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  brahmins_estate_events.4.title: "Піднесення касти [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  brahmins_estate_events.4.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [ROOT.GetCountry.GetName] є зростаючою силою. Вони заручилися народною підтримкою [ROOT.GetCountry.GetReligion.GetAdjective] населення завдяки своєму становищу божественно призначеної жрецької касти та займають кілька ключових посад в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] адміністрації."
  brahmins_estate_events.4.a: "Гаразд."
  est_val_brahmin_advance: "Піднесення брахманів"
  brahmins_estate_events.5.title: "Занепад влади брахманів"
  brahmins_estate_events.5.desc: "Більше, ніж будь-яка інша каста, вплив [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] залежить від їхнього становища серед [ROOT.GetCountry.GetReligion.GetAdjective] вірян. Важко визначити точну причину, але їх стали сприймати не стільки як зберігачів ведичної доктрини, скільки як багатих і корумпованих інтриганів.\n\nУ поєднанні з поганим політичним маневруванням та відсутністю прихильності в очах [ROOT.GetCountry.GetGovernment.GetRulerTitle], [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] втрачають як владу, так і вплив."
  brahmins_estate_events.5.a: "Гаразд."
  brahmins_estate_events.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] підбурюють народне повстання"
  brahmins_estate_events.6.desc: "Відносини держави з кастою [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] досягли критичної точки. Пуджарі відкрито засуджують [ROOT.GetCountry.GetGovernment.GetRuler.GetShortName] під час церемоній, а родини [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] відмовляються співпрацювати в управлінні нашими [ROOT.GetCountry.GetReligion.GetAdjective] підданими.\n\nНедавній релігійний промах з боку [ROOT.GetCountry.GetGovernment.GetRulerTitle] перетворив просте обурення на відкрите повстання. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] підбурили народ повстати проти нашого правління!"
  brahmins_estate_events.6.a: "Гаразд."
  brahmins_estate_events.7.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] відчужують купців у [brahmin_trade_province.GetName]"
  brahmins_estate_events.7.desc: "Місто [brahmin_trade_province.GetName] є важливим регіональним торговим центром для [ROOT.GetCountry.GetName]. Його часто відвідують мусульманські торговці з Гуджарату, Аравії та Персії, і [brahmin_trade_province.GetName] отримувало прибуток від міцних комерційних зв'язків з цими купцями.\n\n[brahmin_trade_province.GetNameWithNoTooltip] стало управлятися групою [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] священнослужителів, чий вплив відчувався на всіх рівнях суспільства. Вони запровадили низку політик і створили соціальну атмосферу, яка є далеко не дружньою з точки зору приїжджих мусульманських торговців. В результаті, багато з цих відчужених торговців вирішили вести свій бізнес в іншому місці.\n\n[brahmin_trade_province.GetNameWithNoTooltip] ризикує втратити свій статус торгового центру, якщо нічого не буде зроблено для залучення торгівлі назад до міста."
  brahmins_estate_events.7.a: "Проблеми купців нижчих каст нас не стосуються."
  brahmins_estate_events.7.b: "Передати місто лідерам, які більше дбають про торговельні відносини."
  brahmins_estate_events.9.title: "Нерелігійні рухи [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  brahmins_estate_events.9.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] традиційно мали монополію на [ROOT.GetCountry.GetReligion.GetAdjective] релігійну владу, але іноді виникають релігійні рухи, які кидають виклик брахманізму. Такі рухи стають популярними по всьому [ROOT.GetCountry.GetName], незважаючи на зусилля [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] їх придушити.\n\nПрихильники народної релігії стверджують, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] стерли священні знаки зі своїх чол і відмовилися від своїх духовних обов'язків, щоб зайняти місця світської влади та чинити несправедливість бідним. Вони заявляють, що самовіддана відданість є єдиним шляхом до спасіння, чеснотою, яку може досягти будь-яка достатньо ревна [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] людина.\n\nГрупа впливових [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] звернулася до [ROOT.GetCountry.GetGovernment.GetRulerTitle] з проханням про [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] допомогу у відновленні суспільної довіри до влади [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та придушенні не-[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] рухів."
  brahmins_estate_events.9.a: "Дозволити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] забезпечувати ортодоксію."
  STATIC_MODIFIER_NAME_brahmin_orthodoxy_enforced: "Брахманська ортодоксія забезпечена"
  STATIC_MODIFIER_DESC_brahmin_orthodoxy_enforced: "Небрахманські релігійні рухи приводяться у відповідність до брахманської ортодоксії."
  brahmins_estate_events.9.b: "Заохочувати народні релігійні рухи."
  STATIC_MODIFIER_NAME_nonbrahmin_movements: "Небрахманські релігійні рухи"
  STATIC_MODIFIER_DESC_nonbrahmin_movements: "Простий народ бере участь у індуїстських релігійних рухах, які применшують авторитет брахманів."
  brahmins_estate_events.10.title: "Проблеми у форті в [brahmin_fort_province.GetNameWithNoTooltip]"
  brahmins_estate_events.10.desc: "Двір [ROOT.GetCountry.GetName] втягнувся у конфлікт між [ROOT.GetCountry.GetGovernment.GetRulerTitle] та військовими кастами. На тлі зростання цієї напруги питання управління фортом привернуло нашу увагу. Форт [brahmin_fort_province.GetName], який нині утримує особливо суперечливий комендант, розташований у провінції, де [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] здобувають власний вплив.\n\nПередбачаючи потенційне переростання напруги у бойові дії, було б мудро передати контроль над цим важливим фортом від суперечливого генерала до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]. Хоча [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] менш вправні у облоговій справі, ніж військові, вони принаймні лояльні до [ROOT.GetCountry.GetGovernment.GetRulerTitle].\n\nАльтернативно, коменданта можна було б переконати змінити своє ставлення в обмін на збереження його привілеїв у [brahmin_fort_province.GetNameWithNoTooltip]."
  brahmins_estate_events.10.a: "Передати форт [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  brahmins_estate_events.10.b: "Дозволити знаті утримувати форт, доки вони залишаються лояльними."