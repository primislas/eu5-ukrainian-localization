l_english:
  character_estates.1.title: "[target_character.GetNameWithNoTooltip] Втрачає статки"
  character_estates.1.desc: "Після низки невдалих інвестицій [target_character.GetName] залишився без гроша. Як член нашого двору, [target_character.GetHeShe] надіслав нам відчайдушне благання, щоб ми надали [target_character.GetHimHer] фінансову допомогу, аби [target_character.GetHimHer] знову став на ноги, інакше [target_character.GetHeShe] проведе [target_character.GetHisHer] дні на вулиці."
  character_estates.1.a: "Приватні статки нас не стосуються."
  character_estates.1.b: "Ми повинні визволити [target_character.GetHimHer]."
  character_estates.2.title: "Несподіваний спадкоємець"
  character_estates.2.desc: "Земельний член [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] помер, не залишивши безпосереднього спадкоємця. Наші герольди встановили, що, згідно з [ROOT.GetCountry.GetAdjectiveWithNoTooltip] законом, існуючий титул перейшов би до низького [target_character.GetName], дуже далекого родича.\n\nНезважаючи на [target_character.GetHisHer] кровний зв'язок, [target_character.GetHeShe] явно не благородного походження, тому було б краще об'єднати титул з [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')]."
  character_estates.2.a: "Надати титул новому дворянину."
  character_estates.2.b: "Узурпувати титул для себе."
  character_estates.3.title: "Щасливий селянин"
  character_estates.3.desc: "Завдяки зв'язкам, які [target_character.GetHeShe] встановив у нашому дворі, а також деяким мудрим діловим рішенням, селянин [target_character.GetName] зумів накопичити значний статок, що конкурує навіть з успішними серед наших [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')].\n\nБільшість вже припускає, що він належить до них, але чи справді це те повідомлення, яке ми повинні надіслати?"
  character_estates.3.a: "Надіслати привітання."
  character_estates.3.b: "Багатий селянин все ще селянин."
  character_estates.4.title: "Поклик Божий"
  character_estates.4.desc: "Як і багато побожних людей, що шукають духовного способу життя, наш придворний [target_character.GetName] вирішив приєднатися до [ROOT.GetCountry.GetReligion.GetAdjective] релігійного ордену.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] буде, звичайно, радий прийняти людину такого політичного становища до своїх орденів, але ми можемо заблокувати цей процес, якщо це не входить до наших планів."
  character_estates.4.a: "Дозволити [target_character.GetHimHer]."
  character_estates.4.b: "Заборонити це."
  character_estates.5.title: "Військове підвищення"
  character_estates.5.desc: "Кожен, високий і низький, погоджується, що [target_character.GetName] служив з відзнакою в [target_character.GetUnitPointer.GetName]. Незвично, але [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] прагнуть бути пов'язаними з [target_character.GetHisHer] героїзмом і рекомендували нам надати [target_character.GetHimHer] найвищі аристократичні почесті."
  character_estates.5.a: "Надати йому титул."
  character_estates.5.b: "Ми не повинні легковажно нагороджувати солдатів."