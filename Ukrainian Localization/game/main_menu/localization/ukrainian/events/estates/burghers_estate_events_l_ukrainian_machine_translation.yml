l_english:
  burghers_estate_events.1.title: "Поступ [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  burghers_estate_events.1.desc: "Становище [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] не ґрунтується на тих самих старих традиціях, що й [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] чи [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Натомість їм довелося самотужки здобувати статки, старанно працюючи, а потім ризикуючи своїми прибутками, щоб знову розширити свій бізнес. Однак, як правило, останнім часом це їм дуже добре вдавалося. Хоча й не такий престижний, бізнес багато в чому є основою нашої економіки, і, завдяки контролю над монетою, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] зуміли збільшити свою владу над нашою країною."
  burghers_estate_events.1.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  burghers_estate_events.2.title: "Барони-розбійники"
  burghers_estate_events.2.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] занепокоєні великим впливом [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у нашій державі. Вони стверджують, що багато нижчих членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] нехтують миром і законами країни, використовуючи свої владні позиції та землі, якими вони володіють, щоб накладати необґрунтовані мита та податки на проїжджих торговців. Деякі, як кажуть, навіть нападають на купців і грабують або вимагають у них гроші.\n\nПредставники [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] тепер стверджують, що економічний розвиток нашої країни стримується цими надмірностями. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], з іншого боку, стверджують, що вони просто стягують розумну плату за користування своїми дорогами та власністю. Деякі з них готові віддати державі частку грошей, які вони отримують."
  burghers_estate_events.2.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] беруть лише те, що їм належить за правом."
  burghers_estate_events.2.b: "Ми повинні приборкати такі надмірності!"
  burghers_estate_events.3.title: "Занепад купецьких станів"
  burghers_estate_events.3.desc: "Без старих привілеїв та родоводу інших фракцій, статус та вплив [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] рідко буває таким же надійним, як у тих, хто народився у владі. Останнім часом поєднання фінансових невдач та неправильно спрямованих політичних амбіцій призвело до втрати влади та впливу для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] [ROOT.GetCountry.GetName]."
  burghers_estate_events.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  burghers_estate_events.4.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] [growing_city.GetNameWithNoTooltip]"
  burghers_estate_events.4.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] [growing_city.GetName], що є дедалі важливішим торговим [growing_city.GetRank.GetName], сьогодні звернулися до [ROOT.GetCountry.GetGovernment.GetRulerTitle] з проханням надати їм більші повноваження, щоб регіон процвітав без перешкод багатьох наших звичайних податків. Якщо ми надамо їм ці засоби для зростання, вони запевняють нас, що економіка регіону швидко покращиться, що призведе до збільшення багатства для держави."
  burghers_estate_events.4.a: "Ми приймемо їхню петицію."
  burghers_estate_events.4.b: "Ми повинні відхилити їхню петицію."
  STATIC_MODIFIER_NAME_local_burgher_rights: "Місцеві привілеї міщан"
  burghers_estate_events.5.title: "Аморальні ціни"
  burghers_estate_events.5.desc: "Ціни на пшеницю, як відомо, нестабільні, оскільки будь-що, від погоди в місці її вирощування до інцидентів, що шкодять її розподілу, може раптово спричинити значне зростання ціни.\n\nВнаслідок однієї з таких раптових змін, наразі спостерігається гострий дефіцит пшениці в багатьох наших великих містах. Відчайдушно намагаючись прогодуватися, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] спрямовують свій гнів на [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], які, на їхню думку, експлуатують цю ситуацію, щоб завищувати ціни на свої товари.\n\nСамі ж купці, з іншого боку, стверджують, що ці ціни є природним наслідком дефіциту, і що просто не вистачає хліба на всіх."
  burghers_estate_events.5.a: "Ми змусимо [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] знизити ціни."
  burghers_estate_events.5.b: "Ми не повинні втручатися в ці справи."
  wheat_prices_forcibly_reduced: "Знижені ціни на пшеницю"
  burghers_estate_events.6.title: "Паралельна влада"
  burghers_estate_events.6.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] не є єдиною владою у своїх містах, оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] також має сильну присутність у більшості великих міст, що сягає часів заснування кожного міста. Конфлікти іноді виникають, коли ради [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] впроваджують правила, які не схвалюють [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')].\n\nТакі конфлікти стають дедалі частішими, і члени [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] відкрито діють наперекір різним правилам, узгодженим [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] у своїх містах. Делегати з різних міст, де домінують [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], тепер закликають нас прояснити ситуацію."
  burghers_estate_events.6.a: "Ми повинні стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  burghers_estate_events.6.b: "Ми повинні стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  burghers_estate_events.7.title: "Розширені привілеї для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  burghers_estate_events.7.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вважають, що їх надмірно оподатковують та регулюють, незважаючи на велике значення їхньої праці для нашої країни. Мита, податки та різноманітні тарифи заважають їм досягати ще більших успіхів, і вони без вагань використають весь свій вплив, щоб скасувати такі обмеження."
  burghers_estate_events.7.a: "Усуньмо ці перешкоди!"
  burghers_estate_events.7.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] повинні знати своє місце!"
  burghers_estate_events.8.title: "Шкідлива торговельна політика"
  burghers_estate_events.8.desc: "Інтереси видатних купецьких родин страждають від нашої репресивної торговельної політики щодо інших країн. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] підтримують ці родини і тепер звернулися до нас з проханням компенсувати їхні втрати, принаймні послабивши деякі інші торговельні обмеження."
  burghers_estate_events.8.a: "Ми повинні підтримати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  burghers_estate_events.8.b: "Ми не можемо дозволити цим торгашам диктувати нашу торговельну політику."
  burghers_estate_events.9.title: "Домашня промисловість"
  burghers_estate_events.9.desc: "Економічний розвиток не завжди відбувається без конфліктів. Здається, багаті купці в деяких наших містах, де домінують [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], намагалися обійти різні привілеї гільдій, передаючи роботу на аутсорсинг до домівок сімей, що живуть за межами міста. Той факт, що ця «розсіювальна система» була дуже прибутковою стратегією, лише посилює гнів ремісників у місті, які відчувають, що їхні стародавні права були розтоптані, а ретельно керовані ціни на їхні продукти постраждають. [ROOT.GetCountry.GetAdjective] ремісники тепер звертаються до [ROOT.GetCountry.GetGovernment.GetRulerTitle] з проханням захистити їхні привілеї, оскільки міська рада не змогла придушити конкуренцію з-за меж міста."
  burghers_estate_events.9.a: "Ми не можемо стояти на шляху прогресу."
  burghers_estate_events.9.b: "Ми повинні захистити привілеї гільдій."
  burghers_estate_events.10.title: "Соціальна мобільність"
  burghers_estate_events.10.desc: "Зростаюча влада [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] призвела до того, що окремі особи з їхніх лав шукають щастя в сферах, традиційно домінованих іншими групами. Сини сімей середнього та низького достатку з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] тепер мають освіту та амбіції, щоб відповідати більш привілейованим класам, і, як наслідок, все більше з них тепер працюють адміністраторами, юристами та офіцерами, а також на інших посадах, традиційно домінованих іншим станом. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] все ще відчувають, що їх несправедливо стримують архаїчні права та привілеї іншої епохи, але їхні супротивники дуже втомлюються від нинішньої «неприродної» соціальної мобільності.\n\nЯкщо ми нічого не зробимо, ми ризикуємо втратити підтримку привілейованих класів, але якщо ми відмовимося від підтримки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] на цьому етапі, це, ймовірно, матиме серйозні наслідки для наших відносин з ними."
  burghers_estate_events.10.a: "Ми не повинні стояти на шляху цих нових людей."
  burghers_estate_events.10.b: "Ми повинні захистити стародавні права інших станів."
  burghers_estate_events.11.title: "Зростання економіки"
  burghers_estate_events.11.desc: "Наша політика співпраці з [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] принесла плоди у вигляді економічного розвитку в багатьох галузях. Міста [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] процвітають, і наш вплив у міжнародній торгівлі швидко зростає."
  burghers_estate_events.11.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  burghers_estate_events.12.title: "Ризики торгівлі"
  burghers_estate_events.12.desc: "Торгівля на великі відстані може бути ризикованою, хоча й прибутковою. Погода, розбійники та пірати залишаються загрозою як на суші, так і на воді.\n\nЗазвичай [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] можуть впоратися з певною кількістю невдач, і вони мають власні способи захисту та страхування свого вантажу.\n\nОднак останнім часом справи йдуть погано для великої кількості купецьких родин, і деякі з них перебувають на межі банкрутства. Можливо, було б розумно запропонувати деяку фінансову компенсацію, щоб допомогти їм знову стати на ноги."
  burghers_estate_events.12.a: "Компенсувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]."
  burghers_estate_events.12.b: "Вони знали, на що йдуть."
  burghers_estate_events.13.title: "Урбанізація"
  burghers_estate_events.13.desc: "Хоча лише невелика частина нашого населення живе в містах, зростаюче процвітання [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] приваблює все більше людей із сільської місцевості. Деякі міста зростають так швидко, що існуючі проблеми з санітарією та перенаселенням перетворилися з тривожних на катастрофічні, за словами [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]. Бідні оселилися за межами міських стін, де виникли брудні передмістя і процвітають хвороби.\n\n[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] вважають ситуацію нестерпною і тепер вимагають, щоб держава втрутилася, щоб надати допомогу, як у вигляді ресурсів, так і у вигляді забезпечення дотримання правил за межами стін. Вони стверджують, що лише державне втручання може перетворити цю бурхливу урбанізацію на позитивну зміну."
  burghers_estate_events.13.a: "Ми повинні спробувати покращити умови."
  burghers_estate_events.13.b: "Це нічого незвичайного. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] можуть з цим впоратися."
  burghers_estate_events.14.title: "Економічна політика"
  burghers_estate_events.14.desc: "Оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] зростають у владі, їхні заклики до зменшення торговельних регуляцій та податків стають все частішими. Багато хто вважає, що наша країна має застарілу та репресивну торговельну політику, і що ми виграли б від зменшення кількості податків та мит, які перешкоджають комерції."
  burghers_estate_events.14.a: "Зменшити [ShowSocietyDirectionName('mercantilism')]."
  burghers_estate_events.14.b: "Відмовитися втручатися в [ShowSocietyDirectionName('free_trade')]."
  burghers_estate_events.15.t: "Велика гільдія зазнає невдачі"
  burghers_estate_events.15.desc: "Гільдія в [golden_parachute_location.GetName] виявила, що має недостатньо коштів для покриття збитків від втраченого в морі вантажу і стоїть перед можливістю розпуску.\n\nЗа звичайних обставин це навряд чи є турботою держави, але [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] просять про фінансову допомогу, вимагаючи, щоб уряд сплатив збитки для підтримки стабільності регіону. Дозвіл на закриття гільдії може значно порушити соціальний порядок [golden_parachute_location.GetNameWithNoTooltip]."
  burghers_estate_events.15.a: "Нація не втручатиметься у приватні справи."
  burghers_estate_events.15.b: "Ми надамо їм фінансову допомогу. Добробут торговців — це добробут нації."
  burghers_estate_events.15.c: "Погодитися фінансувати гільдію, якщо гільдія перейде під національний контроль."