l_english:
  clergy_events_common: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] здавна були однією з найважливіших опор [ROOT.GetCountry.GetLongName], а їхні члени надавали не лише духовне керівництво, а й служили адміністраторами, суддями та дипломатами на благо нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  clergy_estate_common_ending: "Часи, однак, стають суворими, і держава мусить покривати дедалі більшу кількість витрат. Пропозиції, що, можливо, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] могли б зробити добровільний внесок, не були сприйняті прихильно."
  clergy_estate_events.1.title: "Libertas Ecclesiae"
  clergy_estate_events.1.desc: "$clergy_events_common$ В обмін на ці великі послуги жоден церковний маєток, монастир чи інше володіння не сплачує податків державі, а світська влада не втручається у внутрішні справи [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')].\n\n$clergy_estate_common_ending$"
  clergy_estate_events.1.a: "Дати зрозуміти, що вони повинні зробити внесок."
  clergy_estate_events.1.b: "Ми знайдемо гроші в іншому місці."
  clergy_estate_events.101.title: "Землі храмів"
  clergy_estate_events.101.desc: "$clergy_events_common$ В обмін на ці великі послуги протягом багатьох років було зроблено багато пожертвувань, як державою, так і іншими, у вигляді сіл для підтримки громад [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]. Ці Брахмадеї протягом століть зробили наш [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] досить багатим.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.101.a: "Дати зрозуміти, що вони повинні зробити внесок."
  clergy_estate_events.101.b: "Ми знайдемо гроші в іншому місці."
  clergy_estate_events.102.title: "Багатства [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  clergy_estate_events.102.desc: "$clergy_events_common$ В обмін на ці великі послуги протягом багатьох років було зроблено багато пожертвувань, як державою, так і іншими, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та богам, яким вони служать. Ці дари протягом століть зробили [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] досить багатим та впливовим.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.102.a: "Дати зрозуміти, що вони повинні зробити внесок."
  clergy_estate_events.102.b: "Ми знайдемо гроші в іншому місці."
  clergy_estate_events.103.title: "Багатства [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  clergy_estate_events.103.desc: "$clergy_events_common$ В обмін на ці великі послуги багато земель було відведено як релігійні володіння, звільнені від більшості наших податків. Це забезпечує [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та багато чудових проєктів, які вони підтримують.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.103.a: "Дати зрозуміти, що вони повинні зробити внесок."
  clergy_estate_events.103.b: "Ми знайдемо гроші в іншому місці."
  clergy_estate_events.104.title: "Багатства [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  clergy_estate_events.104.desc: "$clergy_events_common$ В обмін на ці великі послуги протягом багатьох років було зроблено багато пожертвувань, як державою, так і іншими, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]. Ці дари протягом століть зробили їх досить багатими та впливовими.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.104.a: "Дати зрозуміти, що вони повинні зробити внесок."
  clergy_estate_events.104.b: "Ми знайдемо гроші в іншому місці."
  clergy_estate_events.105.title: "Багатства [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  clergy_estate_events.105.desc: "$clergy_events_common$ В обмін на ці великі послуги протягом багатьох років було зроблено багато пожертвувань, як державою, так і іншими, великим [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та їхнім великим земельним володінням. Ці дари протягом століть зробили [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] досить багатим та впливовим.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.105.a: "Дати зрозуміти, що вони повинні зробити внесок."
  clergy_estate_events.105.b: "Кошти знайдемо деінде."
  clergy_estate_events.2.title: "Піднесення [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  clergy_estate_events.2.desc: "Влада [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] ніколи не покладалася на саму державу. Навпаки, багато в чому саме [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] надають легітимності [ROOT.GetCountry.GetGovernment.GetRulerTitle] через свої зв'язки з духовним світом. Поєднання вправного політичного маневрування, розпалювання страху та щедрих пожертв від наших підданих останнім часом зміцнило владу цього стану."
  clergy_estate_events.2.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  clergy_estate_events.3.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] втрачає вплив"
  clergy_estate_events.3.desc: "Більше, ніж будь-який інший стан, вплив [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] залежить від їхнього становища серед простолюду. Важко точно визначити, чому, але за останні кілька років [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] стали сприйматися менше як духовні охоронці нашої країни, а більше як багаті та корумповані інтригани. У поєднанні з деякими невдалими інвестиціями у власні маєтки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та поганим політичним маневруванням, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] втрачають як владу, так і вплив. На жаль, вони, схоже, перекладають провину і замість цього критикують уряд за втрату свого становища."
  clergy_estate_events.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  clergy_estate_events.4.title: "Антиклерикалізм"
  clergy_estate_events.4.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] здобули репутацію жадібних та лінивих серед нашого народу в кількох видатних містах. На знак протесту проти особливо кричущого зловживання владою священства, побожні простолюдини та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] тепер утримують свої десятини.\n\n[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] розлючені та вимагають, щоб ми оштрафували [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], яких вони вважають ініціаторами цього руху."
  clergy_estate_events.4.a: "Ми мусимо змусити їх платити!"
  clergy_estate_events.4.b: "М'якої догани буде достатньо."
  clergy_estate_events.5.title: "Погіршення відносин з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  clergy_estate_events.5.desc: "Відносини між державою та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] настільки погіршилися, що їхня взаємодія з нами повністю характеризується недовірою та навіть відкритою непокорою. Святі місця нашої нації стали центрами опору проти [ROOT.GetCountry.GetGovernment.GetRulerTitle], і більшість вірних у наших землях ставлять під сумнів легітимність нашого правління.\n\nЗа нинішнього стану справ, найменші промахи та уявні образи призводять до загострення напруги. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] тепер повстають по всій нашій країні, а [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] підбурюють їх і спрямовують їхній гнів на нас."
  clergy_estate_events.5.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  clergy_estate_events.6.title: "Тріумф [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]?"
  clergy_estate_events.6.desc: "Хоча ніхто відкрито не кинув би виклик [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], мало держав, де вони були б настільки впливовими, як у [ROOT.GetCountry.GetName]. У нашій країні немає жодної установи, вільної від впливу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], і влада нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] залежить від них зараз більше, ніж будь-коли.\n\nМожливо, цілком природно, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] тепер також бажає відігравати активнішу роль у практичному управлінні нашою країною. Останнім часом їхні представники зробили низку пропозицій щодо подальшого узгодження наших законів і традицій з законами та традиціями духовного світу. Їхня амбіція полягає в тому, щоб очистити культуру нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] від будь-якої неортодоксальності та забезпечити управління країною відповідно до релігійно обґрунтованих правил та ідеалів."
  clergy_estate_events.6.a: "Дотримуватися рекомендацій [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  clergy_estate_events.6.b: "Відхилити їхні пропозиції."
  clergy_estate_events.7.title: "Сильні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  clergy_estate_events.7.desc: "Хоча багато правителів можуть покладатися на підтримку [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], мало хто має таких сильних прихильників, як ми. Довга традиція тісної співпраці та лояльності між нами та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] призвела до того, що їхнє керівництво вважає себе частиною державної адміністрації, а не незалежним актором. По всій нашій державі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] поширюють звістку про велич та духовну силу нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  clergy_estate_events.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  clergy_estate_events.8.title: "Крадіжка землі"
  clergy_estate_events.8.desc: "Багато земельних пожертв є досить давніми, і хоча вони завжди документуються, як ландшафти, так і назви в них цілком могли змінитися з моменту первісної пожертви. Нещодавно [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] звинуватили кількох членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у відвертій крадіжці землі у формі посягання на землі, пожертвувані [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] давно. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], з іншого боку, стверджують, що саме [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] намагаються захопити землі, на які вони не мають жодних прав.\n\nТой, кого ми вирішимо підтримати, стане основним землевласником у цьому районі."
  clergy_estate_events.8.a: "Ми мусимо стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  clergy_estate_events.8.b: "Ми мусимо стати на бік [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  clergy_estate_events.8.c: "Ми не можемо віддати перевагу жодній зі сторін."