l_english:
  hre.privilege_revoked.intro_desc: "У рік Господній, [GetCurrentYear], найвеличніший Август [target_character.GetName], Імператор Римлян, коронований Богом, знову скликав Стани [GetUniqueInternationalOrganization('hre').GetName]."
  hre.100.title: "Привілеї скасовано"
  hre.100.desc: "$hre.privilege_revoked.intro_desc$ Імперський Сейм погодився на пропозицію централізувати зовнішню політику та військові дії, зобов'язавши всі держави-члени підкоритися прямому васалітету під [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  hre.100.a: "Вимагати присяги на вірність."
  hre.100.ctt: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] повинні скласти #g Присягу на вірність#! або #r Залишити#! Імперію! Усі [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] членів, що відмовляються, які є частиною [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip], залишать її та стануть [Concept('core', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]"
  hre.101.title: "Привілеї скасовано"
  hre.101.desc: "Імперський Сейм ухвалив реформу, і наші права вести війну в межах [GetUniqueInternationalOrganization('hre').GetName] більше не діють. Це лише питання часу, доки [GetUniqueInternationalOrganization('hre').GetLeaderTitle] скасує нашу автономію."
  hre.101.a: "Скласти присягу на вірність."
  hre.101.b: "[target_emperor.GetSheHe|U] може забрати наші життя, але [target_emperor.GetSheHe] ніколи не забере нашу свободу."
  hre.101.b.tt: "Усі наші [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], що є частиною [GetUniqueInternationalOrganization('hre').GetName], залишать її та стануть [Concept('core', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]"
  hre.102.title: "Renovatio Imperii Romanorum"
  hre.102.desc: "$hre.privilege_revoked.intro_desc$ Імперський Сейм погодився на пропозицію об'єднати розрізнені держави Імперії в національну державу та перекоронувати [GetUniqueInternationalOrganization('hre').GetName] як її спадкового правителя."
  hre.102.a: "Заявити права на корону!"
  hre_unify_the_empire_tt: "Кожен [Concept('member', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetName] інтегрується [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]"
  hre.103.title: "Renovatio Imperii Romanorum"
  hre.103.desc: "Імперський Сейм ухвалив реформу, і наш час як держави минув. Коли наші провінції переходять до рук [GetUniqueInternationalOrganization('hre').GetLeaderTitle], ми знаходимо розраду в тому, що є частиною чогось більшого."
  hre.103.a: "Ave Caesar!"
  hre.104.title: "Обмежена автономія вільних міст!"
  hre.104.desc: "$hre.privilege_revoked.intro_desc$ Імперський Сейм погодився обмежити автономію будь-якого [ShowSpecialStatusName('free_city')], консолідуючи владу [GetUniqueInternationalOrganization('hre').GetLeaderTitle] в Імперії."
  hre.104.a: "Приборкати міста."
  antagonism_hre_subjugated_free_cities: "Підкорені вільні міста"
  hre_subjugate_every_free_city_tt: "Кожне [ShowSpecialStatusName('free_city')] у [GetUniqueInternationalOrganization('hre').GetName] стане нашим [ShowSubjectTypeName('imperial_free_city')] [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]"
  hre_subjugate_every_direct_free_city_tt: "Кожне [ShowSpecialStatusName('free_city')] у [GetUniqueInternationalOrganization('hre').GetName] стане нашим [ShowSubjectTypeName('direct_imperial_free_city')] [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]"
  hre.105.title: "Обмежена автономія вільних міст!"
  hre.105.desc: "Імперський Сейм ухвалив реформу, яка значно обмежила нашу автономію як [ShowSpecialStatusName('free_city')]."
  hre.105.a: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] Захищає!"
  hre.106.title: "Скасована автономія Вільних Міст!"
  hre.106.desc: "$hre.privilege_revoked.intro_desc$ Імперський Сейм погодився ще більше обмежити автономію будь-якого [ShowSpecialStatusName('free_city')], зміцнюючи владу [GetUniqueInternationalOrganization('hre').GetLeaderTitle] в межах [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]."
  hre.106.a: "Інкорпорувати Вільні Міста."
  hre.107.title: "Скасована автономія Вільних Міст!"
  hre_subjugate_every_free_city_directly_tt: "Кожне [ShowSpecialStatusName('free_city')] в [GetUniqueInternationalOrganization('hre').GetName] стане нашим [ShowSubjectTypeName('direct_imperial_free_city')] [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]"
  hre.107.desc: "Імперський Сейм ухвалив реформу, яка призвела до повного скасування нашої автономії як [ShowSpecialStatusName('free_city')]. Відтепер усі дипломатичні справи нашої держави вирішуються при дворі [target_country.GetCapital.GetName]."
  hre.107.a: "Наше Місто служить [GetUniqueInternationalOrganization('hre').GetLeaderTitle]!"
  hre.900.title: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] помер..."
  hre.900.desc: "Хай живе [GetUniqueInternationalOrganization('hre').GetLeaderTitle]! Виборці вирішили зберегти свою віру в нас, і Імперська Корона залишається в [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]. Оскільки наша країна посилює свій контроль над Імперською Короною, і Князі починають бачити нас як природних володарів, наша влада в межах [GetUniqueInternationalOrganization('hre').GetName] зростає."
  hre.900.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.imperial_authority_change.tt: "[GetUniqueInternationalOrganization('hre').GetName] отримує [ROOT.GetVariable('imperial_authority_change').GetValue] #Y $imperial_authority$#!"
  hre.901.title: "Відновлений Князь"
  hre.901.desc: "Немов фенікс, [released_country.GetName] повстав з попелу і знову приєднався до Князів [GetUniqueInternationalOrganization('hre').GetName]!"
  hre.901.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.902.title: "Князь-єретик"
  hre.902.desc: "[heretic_country.GetName], Князь [GetUniqueInternationalOrganization('hre').GetName], перейшов у єретичну віру! [hre_ruler.GetName] не може терпіти цю єресь!"
  hre.902.a: "Нестерпно!"
  hre.903.title: "Заблудла вівця повертається"
  hre.903.desc: "[true_faith_country.GetName], Князь [GetUniqueInternationalOrganization('hre').GetName], перейшов у Істинну Віру!"
  hre.903.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.904.title: "Слава [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]!"
  hre.904.desc: "[GetUniqueInternationalOrganization('hre').GetName] тріумфував проти жорстоких агресорів [loser.GetName]!"
  hre.904.a: "Ми це передбачали..."
  hre.905.title: "Повалений Князь"
  hre.905.desc: "[annexed.GetName], князь [GetUniqueInternationalOrganization('hre').GetName], був анексований іноземною державою!"
  hre.905.a: "На жаль!"
  hre.907.title: "Звільнений князь"
  hre.907.desc: "[released_country.GetName], князь [GetUniqueInternationalOrganization('hre').GetName], був звільнений від іноземної васальної залежності!"
  hre.907.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.908.title: "На захист [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]!"
  hre.908.desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] поспішив на захист [actor.GetName] проти іноземної агресії!"
  hre.908.a: "Природно, [hre_ruler.GetHeShe] мусить захищати [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]!"
  hre.909.title: "Безчесний [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  hre.909.desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] не зміг захистити [actor.GetName] проти іноземної агресії."
  hre.909.a: "Безчесно? Скоріше, розсудливо!"
  hre.950.title: "Імперське відвоювання"
  hre.950.desc: "[conquered_location.GetName] було звільнено з лап [loser.GetName] і повернено до [GetUniqueInternationalOrganization('hre').GetName]. Наша служба [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip] була визнана [hre_ruler.GetName] і [hre_ruler.GetHeShe] надав нам повні права на відвойовані імперські території."
  hre.950.a: "Як і було заплановано."
  hre.6.title: "Прийнято Постійний Рейхстаг"
  hre.6.desc: "Імперський Рейхстаг [GetUniqueInternationalOrganization('hre').GetName] ухвалив закон про встановлення постійного місця проведення. Для початку, він буде проводитися в [diet_location.GetName]."
  hre.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.7.title: "Постійний Рейхстаг [diet_location.GetNameWithNoTooltip]"
  hre.7.desc: "Віднині і надалі, Імперський Рейхстаг засідатиме безперервно в [diet_location.GetRank.GetName] [diet_location.GetName], а не на тимчасовій основі, як раніше. Цей крок, безсумнівно, посилить згуртованість [GetUniqueInternationalOrganization('hre').GetName] і допоможе формалізувати відносини між [GetUniqueInternationalOrganization('hre').GetLeaderTitle] та князями. З іншого боку, це також робить [diet_location.GetNameWithNoTooltip] головною мішенню для тих, хто бажає завдати шкоди [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]..."
  hre.7.a: "За безпечну та надійну Імперію!"
  hre.15.title: "Кінець [GetInternationalOrganizationType('hre').GetNameWithNoTooltip]"
  hre.15.desc: "З падінням [old_emperor.GetCapital.GetName], [old_emperor_ruler.GetName] мусив прийняти [old_emperor_ruler.GetHerHis] остаточну поразку від [hre_destroyer.GetAdjective] сил. У році [GetCurrentYear] колись престижний [old_emperor.GetGovernment.GetRulerTitle] підписав [old_emperor_ruler.GetHerHis] зречення від престолу [GetInternationalOrganizationType('hre').GetName] і звільнив усі імперські держави та чиновників від їхніх присяг та зобов'язань перед імперією.\n\n[GetInternationalOrganizationType('hre').GetNameWithNoTooltip] більше не існує, і [hre_destroyer_ruler.GetName] назавжди запам'ятається як її руйнівник."
  hre.15.a: "Імперія, нарешті, знайшла свій заслужений спокій."
  hre.800.title: "Імперська коронація"
  hre.800.desc: "Ми зійшли на престол [GetInternationalOrganization('hre').GetName]! З нашою коронацією ми також отримали у володіння Імперські Регалії, що стане знаком нашого законного правління."
  hre.800.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.801.title: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] помер..."
  hre.801.desc: "[previous_emperor.GetName] нещодавно помер. Тепер [ShowSpecialStatusNamePlural('elector')] та [ShowSpecialStatusNamePlural('archbishop_elector')] збираються в Колегії виборців, щоб обрати наступного, хто зійде на Імперський Престол."
  hre.801.a: "Сумний день для Імперії!"