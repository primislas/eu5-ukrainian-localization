l_english:
  great_pirate_era.1.title: "[target_country.GetNameWithNoTooltip] повстає"
  great_pirate_era.1.desc: "[target_location.GetName] став жертвою розгулу піратства! Місцеві головорізи зайшли так далеко, що проголосили [target_country.GetLongName]. Осмілені відсутністю законної влади на острові, вони захопили форт і оголосили піратську республіку.\n\nНа чолі стоять сумнозвісні піратські капітани [target_character.GetName] та [target_character2.GetName], чия крихка влада над бандою розбійників острова постійно випробовується їхніми безжальними лейтенантами, які прагнуть використати будь-яку ознаку слабкості.\n\nЦя так звана республіка є не лише порушенням нашого суверенітету над [ShowProvinceDefinitionName('bahamas_province')], але й прямим викликом порядку та цінностям усіх цивілізованих націй. Хаос тепер панує в [target_country.GetNameWithNoTooltip]."
  great_pirate_era.1.a: "Піратське життя для мене!"
  great_pirate_era.1.b: "Вони за це повісять!"
  target_country_rises_in_target_location_tt: "[target_country.GetLongNameWithNoTooltip] буде засновано в [target_location.GetNameWithNoTooltip]"
  great_pirate_era.1.historical_info: "Нью-Провіденс, острів на Багамах, став сумнозвісним піратським притулком на початку XVIII століття. Після падіння британського контролю пірати, такі як Чорна Борода та Чарльз Вейн, перетворили його на базу для набігів на карибські торгові шляхи. Деякий час Нью-Провіденс був хаотичною піратською республікою, що кидала виклик європейським державам, доки британці не відновили контроль у 1718 році під керівництвом губернатора Вудса Роджерса, поклавши край її золотому віку."
  great_pirate_era.2.title: "Заснування [target_country.GetNameWithNoTooltip]"
  great_pirate_era.2.desc: "Неймовірний союз між піратськими капітанами [target_character.GetLastName] та [target_character2.GetLastName] об'єднав піратів [ShowRegionName('madagascar_region')] в єдину спільноту. Назвавши свою республіку [target_country.GetName], пірати дотримуються утопічної доктрини радикальної свободи та комуналізму.\n\nВони відкидають рабство та державне управління, керуючи шляхом голосування більшістю та вербуючи звільнених рабів з сусідніх портів для зміцнення своїх лав. Хоча ця розрізнена республіка, безсумнівно, викличе гнів колоніальних держав [ShowContinentName('europe')], чиї торгові судна вони атакують, ці ідеалісти спробують процвітати попри всі труднощі."
  great_pirate_era.2.historical_info: "Ліберталія, легендарна піратська колонія, за переказами, була заснована капітаном Джеймсом Міссоном на Мадагаскарі наприкінці XVII століття. Вона була задумана як утопія радикальної свободи, де пірати відкидали рабство та державне правління, керуючи демократичними засобами. Хоча більшість істориків вважають Ліберталію скоріше міфом, ніж фактом, її ідеали свободи та комуналізму залишаються потужним символом опору авторитаризму."
  great_pirate_era.3.title: "[target_country.GetLongNameWithNoTooltip]"
  great_pirate_era.3.desc: "Завзяте витіснення меншин, вірних [ShowReligionGroupName('muslim')], по всій [ShowRegionName('iberia_region')] тепер включає навернених, підозрюваних у таємному збереженні своєї старої віри. Це привело нових людей на наші землі, і одна з багатих родин, що нещодавно прибула, зробила це під загрозою переслідування у своєму колишньому домі. Оселившись у [target_location.GetName], вони покинули своє старе життя заради піратства у відкритому морі, об'єднавши зусилля з піратськими работорговцями.\n\nНовостворена [target_country.GetName] очолюється [target_character.GetName], нещодавнім наверненим з [ShowLocationName('the_hague')]. Цей розвиток, безсумнівно, є побічним ефектом розквіту піратської ери!"
  great_pirate_era.3.historical_info: "Республіка Сале, заснована на початку XVII століття на марокканському узбережжі, очолювалася піратами-відступниками, включаючи голландця Яна Янсзона, який прийняв ім'я Мурат Рейс після навернення в іслам. Вона стала сумнозвісною базою для берберських корсарів, які нападали на європейські кораблі та прибережні міста. Сале процвітала як піратська республіка протягом кількох десятиліть, її керівництво складалося з суміші марокканської еліти та іноземних відступників, перш ніж вона була поглинена місцевим марокканським правлінням."
  great_pirate_era.4.title: "Рейдери в [target_country.GetNameWithNoTooltip]"
  great_pirate_era.4.desc: "[target_country.GetLongName], союзник [ShowCultureName('turkish_culture')] корсарів у [ShowLocationName('bay_algiers')], є могутньою фігурою в [ShowAreaName('western_mediterranean_sea_area')].\n\nЦі загартовані морські вовки часто отримують іноземну та місцеву підтримку, оскільки вони діють руйнівно проти іноземних купців, захоплюючи їхній вантаж та моряків. Пішаки політики та дипломатії, їхні каперські здібності є потужним активом проти будь-якого супротивника."
  great_pirate_era.4.historical_info: "Пірати Тетуана були активними у XVI та XVII століттях, базуючись у марокканському місті Тетуан. Засновані андалузькими біженцями, або морисками, вигнаними з Іспанії, вони переважно нападали на іспанські та португальські кораблі в Середземному морі.\n\nЦі пірати були частиною ширшого берберського піратства вздовж Північної Африки, нападаючи на судна та захоплюючи рабів для місцевих ринків. Їх іноді підтримували місцеві правителі та Османська імперія, що робило їх значною загрозою для європейської торгівлі. Зрештою, європейські військово-морські сили, особливо іспанські, вжили заходів для придушення їхньої діяльності."
  great_pirate_era.5.title: "Пірати в [target_country.GetNameWithNoTooltip]"
  great_pirate_era.5.desc: "Кілька каперських патентів було видано підприємливим каперам у [ShowRegionName('caribbean_region')] з метою порушення конкурентної торгівлі та судноплавства. Багато з цих каперів оселилися в [target_country.GetName] у [target_location.GetName], де вони знайшли широкі можливості для грабунку.\n\nМісцева влада, готова торгувати краденим, також привабила піратів, які діють без каперського патенту чи вірності будь-якому суверену. Це зростаюче беззаконня спокусило все більше каперів відмовитися від своїх повноважень і самим стати піратами. Ходять чутки, що [target_country.GetNameWithNoTooltip] став піратським притулком, «#italic Содомом Нового Світу#!»."
  great_pirate_era.5.historical_info: "У середині XVII століття, після англійського завоювання Ямайки в Іспанії в 1655 році, почали підніматися пірати Порт-Рояла. Розташований на південному узбережжі Ямайки, Порт-Роял швидко став притулком для піратів, каперів і буканьєрів, головним чином через його стратегічне положення в Карибському морі та поблажливе управління, що там панувало. Щоб захистити колонію та послабити іспанський вплив, англійський уряд підтримував каперів, надаючи їм каперські патенти, що дозволяли їм нападати на іспанські кораблі та поселення. Видатні особистості, такі як Генрі Морган, відіграли ключову роль у перетворенні Порт-Рояла на відомий центр піратської діяльності. До кінця 1600-х років місто було сумнозвісним своєю багатством, пороками та беззаконням, заслуживши репутацію піратського притулку. Однак значення Порт-Рояла закінчилося після катастрофічного землетрусу 1692 року."
  great_pirate_era.6.title: "Братство Берега"
  great_pirate_era.6.desc: "На острові біля узбережжя [target_location.GetName] збирається таємна асамблея піратів і каперів на своє перше засідання. Усередині імпровізованої каюти капітани співпрацюють над важливою угодою. Через кілька годин вони виходять, щоб представити Піратський Кодекс Братства, встановлюючи єдиний фронт під спільними Статтями поведінки, адаптованими для різних екіпажів. З [target_location.GetNameWithNoTooltip] як своїм операційним центром, Братство Берега обіцяє плавати під чорними вітрилами, готове сіяти терор по всьому [ShowRegionName('caribbean_region')]. Цей момент знаменує світанок нової ери піратства в усьому регіоні."
  great_pirate_era.6.historical_info: "У XVII столітті Тортуга, невеликий острів біля північно-західного узбережжя Гаїті, стала видатним піратським притулком, особливо в 1650-х і 1660-х роках. Її стратегічне розташування приваблювало піратів і каперів, які нападали на іспанські судна та уникали колоніальних властей, грабуючи прибуткові торгові шляхи.\n\nБратство Берега було альянсом, сформованим серед цих піратів, що об'єднував різні екіпажі під спільним кодексом поведінки, відомим як Піратський Кодекс Братства. Цей кодекс встановлював правила поведінки, розподілу здобичі та вирішення конфліктів, сприяючи почуттю товариства серед моряків.\n\nВидатні особистості, такі як Генрі Морган і Бартоломью Робертс, демонстрували зухвалі подвиги Братства проти іспанських поселень і скарбів. Діяльність Братства сприяла легендарному образу піратства в Карибському морі, зробивши Тортугу ключовим центром таких починань."
  great_pirate_era.100.title: "Велика епоха піратів"
  great_pirate_era.100.desc_a: "Світ думав, що наша епоха мине, як дика буря поступається ясному небу. Проте ми тут, вітрила все ще ловлять вітер, прапор [ROOT.GetCountry.GetLongName] все ще майорить високо. Купці все ще шепочуть наші імена зі страхом, а флоти все ще намагаються нас стримати. Так звані світові держави не змогли нас знищити, і в своїй невдачі ми викарбували нашу легенду на хвилях семи морів. Це вже не [ShowSituationName('golden_age_of_piracy')]. Це початок нової ери, під надійним керівництвом [target_character.GetName]."
  great_pirate_era.100.desc_b: "Так звана [ShowSituationName('golden_age_of_piracy')] мала згоріти сама по собі, спалах бунту та жадібності, приречений на крах під вагою власного хаосу. Однак вогні цього нещасного руху все ще яскраво горять у портах [target_pirate_country.GetLongName].\n\nПротягом десятиліть вони зміцнювали свою владу під керівництвом [target_character.GetName] та [target_character.GetHerHis] попередників, досягнувши вершини своєї піраміди жадібності, процвітаючи на здобичі, накопиченій під час їхніх численних подорожей. Їхні кораблі швидші, їхні моряки загартовані, а їхні капітани сміливіші, ніж будь-коли. Торгові конвої змінюють маршрути зі страху, прибережні поселення зміцнюють свої стіни, а флоти світу готуються до більшої крові. [target_pirate_country.GetAdjectiveWithNoTooltip] перемогли."
  great_pirate_era.100.a: "Жоден берег не є безпечним!"
  great_pirate_era.100.b: "Це початок нашої золотої доби!"
  end_situation_gaop_tt: "[Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [ShowSituationName('golden_age_of_piracy')] закінчується"
  great_pirate_era.200.title: "Кінець [ShowSituationNameWithNoTooltip('golden_age_of_piracy')]"
  great_pirate_era.200.desc: "Десятиліттями лихо піратства переслідувало узбережжя, заражаючи торгові шляхи, якими часто перевозилися життєво важливі та цінні товари. На щастя, завдяки спільним зусиллям, останні піратські притулки були зруйновані, а їхні лідери чекають швидкої зустрічі з катом.\n\nТак звані екіпажі відступників-шукачів фортуни тепер схиляються перед коронами або гниють у неглибоких могилах. [ShowSituationName('golden_age_of_piracy')] закінчилася. Їхня епоха завершена, і океани знову в безпеці від їхнього хаотичного панування."
  great_pirate_era.200.a: "Шкідників більше немає!"
  great_pirate_era.300.title: "[ShowSituationNameWithNoTooltip('golden_age_of_piracy')]"
  great_pirate_era.300.desc: "Моря вирують хаосом мінливих сил, руйнуючих торгових монополій та невгамовної амбіції. Поки сили [ShowContinentName('europe')] ведуть нескінченні війни за панування, їхні торгові флоти жиріють і стають самовдоволеними — легкою здобиччю для сміливих чоловіків з гострими абордажними шаблями та швидшими кораблями.\n\nУ найвіддаленіших куточках колоніальних форпостів та беззаконних гаваней з'являється новий вид мореплавців. Вигнанці, капери, дезертири та мрійники, приваблені багатством і свободою, тепер збираються під чорними прапорами. Ці розбійники звертаються до піратства не лише заради здобичі, а й заради мети.\n\nВід вологих бухт [ShowRegionName('caribbean_region')] до бурхливих вод [ShowContinentName('africa')] ширяться чутки про зростаючу хвилю піратства, епоху не королів чи корон, а вітрил, сталі та рому. Золота доба грабунків, випивки та морських пригод."
  great_pirate_era.300.historical_info: "Золота доба піратства тривала з середини 1600-х до початку 1700-х років. Вона почалася, коли конкуруючі імперії розширювалися морями, використовуючи каперів для нападу на ворожу торгівлю. Коли настав мир, багато з цих людей відмовилися від прибутків і свободи набігів, звернувшись до піратства.\n\nВійськово-морські флоти були розтягнуті, і багато узбереж залишалися погано захищеними. У таких місцях, як Карибський басейн і Західна Африка, пірати знаходили безпечні гавані та охочих новобранців. Екіпажі кораблів часто складалися з колишніх моряків, втікачів-рабів та вигнанців, які формували спільноти, що відкидали правила королів і купців.\n\nТакі постаті, як Генрі Морган, Чорна Борода та Бартоломью Робертс, стали легендами тієї епохи. Хоча зрештою їх розгромили скоординовані морські кампанії, їхнє правління ознаменувало одну з найсміливіших і найбеззаконніших глав у морській історії."
  great_pirate_era.300.a: "Епоха каперства та шахрайства настала!"
  situation_gaop_start_tt: "[Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [ShowSituationName('golden_age_of_piracy')] розпочалася"