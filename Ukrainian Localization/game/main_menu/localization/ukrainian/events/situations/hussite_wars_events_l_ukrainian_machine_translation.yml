l_english:
  hussite_wars: "Гуситські війни"
  hussite_wars_desc: "Серія конфліктів між послідовниками [ShowReligionName('hussite')] та [ShowReligionName('catholic')], що швидко переросла у повномасштабну війну за саму ідентичність країни."
  recognized_hussites_tt: "Ми вийшли переможцями з #Y Гуситських війн#!"
  has_not_had_this_situation_before_tt: "Ця [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] раніше не траплялася"
  DEFENDERS_CATHOLICISM: "Оборонний [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] проти $BOH$"
  DEFENDERS_HUSSITISM: "Оборонний [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] проти $PAP$"
  hussite_wars.1.title: "Конгрегація [jan_zelivsky_scope.GetNameWithNoTooltip]"
  HUSSITE_WARS_SIDE_BOHEMIA: "[THIS.GetLocation.GetOwner.GetLongName|Y] підтримує [GetCountry('BOH').GetLongName] у [ShowSituationName('hussite_wars')]!"
  HUSSITE_WARS_SIDE_POPE: "[THIS.GetLocation.GetOwner.GetLongName|Y] протистоїть [GetCountry('BOH').GetLongName] у [ShowSituationName('hussite_wars')]!"
  pope_hw_tt: "Це [GetCountry('PAP').GetGovernment.GetRulerTitle], що прагне знищити [ShowReligionName('hussite')]!"
  boh_hw_tt: "Це [GetCountry('BOH').GetLongName], захисники [ShowReligionName('hussite')]!"
  convert_heretics_hw_action: "Примусові навернення"
  convert_heretics_hw_action_desc: "Зовнішній тиск на нас від єретичних ворогів не може залишитися без відповіді! Ми повинні захищати наші [ShowReligionAdjective('hussite')] традиції та віру, запроваджуючи сувору дисципліну та практики по всьому нашому [actor.GetFlavorRank]."
  demand_donation_key: "Часи війни та сутичок чекають на наш народ, оскільки ми прагнемо зайняти своє місце та захистити наші кордони. З цією метою ми вимагатимемо пожертвування від найзаможніших членів"
  demand_noble_donations_hw_action: "Вимагати пожертвування від знаті"
  demand_noble_donations_hw_action_desc: "$demand_donation_key$ знаті."
  demand_clergy_donations_hw_action: "Вимагати пожертвування від духовенства"
  demand_clergy_donations_hw_action_desc: "$demand_donation_key$ духовенства."
  demand_burgher_donations_hw_action: "Вимагати пожертвування від купців"
  demand_burgher_donations_hw_action_desc: "$demand_donation_key$ міщан."
  prepare_defenses_hw_action: "Підготувати оборону"
  prepare_defenses_hw_action_desc: "Орди [ShowReligionName('catholic')] незабаром спустошать наші землі у своєму божевільному прагненні до релігійного панування. Було б мудро для нас забезпечити захист кожної провінції міцними укріпленнями."
  align_with_moderates_help_hw_action: "Приєднатися до поміркованих"
  align_with_moderates_help_hw_action_desc: "Шлях дипломатії та толерантності, безсумнівно, приверне більш прихильний погляд до нашої справи, навіть з боку країн, що схиляються перед [ShowReligionName('catholic')]."
  align_with_radicals_help_hw_action: "Приєднатися до радикалів"
  align_with_radicals_help_hw_action_desc: "Ми самі проти моря єретиків, їхні щелепи жадібно гризуть краї нашої території. Люди повинні приготуватися і прийняти політику нульової толерантності та фанатизму щодо наших ворогів."
  join_the_papal_side_hw_action: "Стати на бік [GetCountry('PAP').GetLongNameWithNoTooltip]"
  join_the_papal_side_hw_action_desc: "Наш обов'язок — приєднатися до [GetCountry('PAP').GetLongName] у їхній боротьбі за викорінення єресі з лиця [ShowContinentName('europe')]!"
  join_the_hussite_side_hw_action: "Стати на бік [GetCountry('BOH').GetLongNameWithNoTooltip]"
  join_the_hussite_side_hw_action_desc: "Ми не повинні стояти осторонь, поки [GetCountry('PAP').GetLongName] чинить жахливі звірства проти менш щасливих. Тому ми повинні захистити [GetCountry('BOH').GetLongName] і покласти край необґрунтованим [GetCountry('PAP').GetAdjectiveWithNoTooltip] хрестовим походам!"
  hw_province_gains_hw_heretic_conversions_modifier_tt: "Визначена [Concept('province', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowModifier('hw_heretic_conversions_modifier')] на #Y 10#! років"
  prepare_defenses_hw_action_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у визначеній [Concept('province', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowModifier('hw_prepared_defenses_modifier')] на #Y 15#! років, і, якщо можливо, [ShowBuildingTypeName('castle')] буде збудовано в [Concept('province_capital', 'CONCEPT_PLACEHOLDER')|e] за #G -90%#! від базової вартості"
  countries_less_likely_to_join_against_us_tt: "Наші сусідні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] будуть #G менш схильні#! приєднуватися до війни проти нас, поки [ShowModifier('promoted_moderates_modifier')] залишається активним"
  countries_more_likely_to_join_against_us_tt: "Наші сусідні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] будуть #R більш схильні#! приєднуватися до війни проти нас, поки [ShowModifier('promoted_radicals_modifier')] залишається активним"
  catholic_victory_tt: "[ShowReligionAdjectiveWithNoTooltip('catholic')] Перемога"
  hussite_victory_tt: "[ShowReligionAdjectiveWithNoTooltip('hussite')] Перемога"
  reignite_the_fires_of_crusade_tt: "Відносини між [GetCountry('BOH').GetLongNameWithNoTooltip] та [ShowReligionAdjectiveWithNoTooltip('catholic')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] погіршаться, і багато хто з часом може приєднатися до нашої справи"
  income_depends_on_estate_power_tt: "Отримане [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] значною мірою залежатиме від [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] цього [Concept('estate', 'CONCEPT_PLACEHOLDER')|e]"
  hussite_wars.1.desc: "Розлючені натовпи на чолі з [jan_zelivsky_scope.GetName] заполонили вулиці [target_boh_capital_scope.GetName], вимагаючи розширення прав та відпущення кількох [ShowReligionAdjective('hussite')] в'язнів міською радою. На жаль, суддя та його оточення відхилили вимоги протестувальників, що призвело до спалаху насильства у порочному колі затягування реформ та повстань натовпу. Можливо, настав час розірвати це коло..."
  hussite_wars.1.a: "Смерть [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle]!"
  hussite_wars.1.b: "Ми не можемо дозволити собі розірвати [ShowReligionNameWithNoTooltip('catholic')]..."
  hussite_wars.1.c: "Настав час взятися за меч проти зрадників серед нас!"
  end_hussite_wars_situation_tt: "Це запобігне [ShowSituationName('hussite_wars')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  catholics_upset_tt: "Відносини між нами та країнами, що сповідують [ShowReligionAdjective('catholic')] віру, сильно погіршаться"
  pap_gets_hussite_wars.2_tt: "Подія '#Y Гуситські протести в [target_boh_capital_scope.GetNameWithNoTooltip]#!' відбувається для [target_pope_country.GetName]"
  boh_every_neighboring_country_tt: "Кожна не-союзна [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що межує з нами або будь-яким з наших [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e], втратить [ShowBiasValue('violated_congress_of_visegrad_modifier')|-=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас"
  hussite_rebellion_tooltip: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], що сповідує [ShowReligionName('hussite')], збере свої сили та підтримає [hussite_rebel_scope.GetName]"
  hussite_wars.2.title: "[ShowReligionAdjectiveWithNoTooltip('hussite')] Протести в [target_boh_capital_scope.GetNameWithNoTooltip]"
  hussite_wars.2.desc: "Надійшла звістка з [target_country.GetLongName] про те, що заворушення охопили весь домен! Незадоволені послідовники [ShowReligionName('hussite')] вийшли на вулиці, дефенеструючи своїх чиновників і вимагаючи справедливості та визнання від імені Святого Престолу.\n\nЯкщо не втрутитися, ситуація може вийти з-під контролю і викликати хвилювання по всьому [ShowReligionAdjective('catholic')] світу, ми не можемо дозволити собі виявляти слабкість, поки світ спостерігає..."
  hussite_wars.2.a: "Ми очистимо їхню єресь!"
  hussite_wars.2.b: "Розпізнаймо їхній рух..."
  every_neighbor_of_bohemia_gets_hussite_wars.3_tt: "Подія '#Y Благочестивий заклик до зброї#!' відбувається для кожної [ShowReligionAdjective('catholic')] не-союзної сусідньої країни [target_country.GetName]"
  hussite_wars.6_happens_for_catholic_champion_scope_tt: "Подія '#Y Меч [ShowReligionName('catholic')]#!' відбувається для [catholic_champion_scope.GetName]"
  hussite_supremacy_tt: "Гусити здобудуть перемогу в [ShowSituationName('hussite_wars')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  hussite_wars.3.title: "Благочестивий заклик до зброї"
  hussite_wars.3.desc: "У спробі викорінити єресь, [GetCountry('PAP').GetGovernment.GetRulerTitle] взяв(ла)ся за зброю проти народу [target_country.GetName]. Він(Вона) вимагає, щоб ми виконали наш [ShowReligionAdjective('catholic')] обов'язок і взялися за зброю проти цієї мерзенної єресі. Що б ми не вирішили, ми повинні остерігатися, щоб не нажити могутніх ворогів у марній гонитві за благочестивою славою."
  hussite_wars.3.a: "До зброї!"
  hussite_wars.3.b: "Не поспішаймо діяти."
  hussite_wars.4.title: "Мир у [target_capital.GetNameWithNoTooltip]"
  hussite_wars.4.a.desc: "Наша боротьба за рівне ставлення та визнання з боку [ShowReligionAdjective('catholic')] влади увінчалася успіхом. Захист нашого народу та віри був успішним, і тепер ми займаємо своє місце за європейським столом як рівні."
  hussite_wars.4.b.desc: "Гіркий присмак поразки на наших вустах, оскільки ми були змушені визнати верховну владу [ShowReligionAdjective('catholic')] Церкви. Ми мали мрію, яку вважали справедливою, але перед обличчям корупції та зла ми здригнулися, на жаль, цьому не судилося бути..."
  hussite_wars.4.a: "Наша істинна віра перемогла!"
  hussite_wars.4.b: "Все чесно, у вірі та війні..."
  hussite_wars.5.title: "Одноокий [target_character.GetLastNameWithNoTooltip]"
  hussite_wars.5.desc: "Один з наших найвидатніших лідерів на полі бою, [target_character.GetName] має історію служіння нашому народу в ці важкі часи. По таборах ходять чутки, що [target_character.GetHerHim] втратив(ла) око від стріли ворожого солдата. За свідченнями очевидців, замість того, щоб відступити чи здатися, [target_character.GetSheHe] просто витягнув(ла) стрілу і продовжив(ла) битися.\n\nНезважаючи на поранення, [target_character.GetSheHe] став(ла) грізним командиром і тепер бажає отримати підвищення та вести більше військ до великих перемог. Якщо ми бажаємо завдати страшного удару нашим ворогам, ми повинні серйозно розглянути можливість проголошення [target_character.GetHerHim] національним героєм, символом нашого опору проти [ShowReligionName('catholic')]."
  hussite_wars.5.a: "Великий герой у нашу годину потреби."
  hussite_wars.5.historical_info: "Також відомий як Ян Жижка з Троцнова і Каліха, він був видатним військовим лідером у 15 столітті, проголошений однією з найвидатніших постатей гуситського руху. Він привів гуситів до численних перемог, використовуючи інноваційну військову тактику, включаючи використання бойових возів для мобільної оборони. Його стратегічний геній та харизматичне лідерство були ключовими для їхніх успіхів проти численних хрестових походів, розпочатих Католицькою Церквою."
  hussite_wars.6.title: "Меч [ShowReligionNameWithNoTooltip('catholic')]"
  hussite_wars.6.desc: "У скрутні часи, коли наша віра загрожена зовнішніми єретиками, на наші плечі лягає тягар відновленого хрестового походу проти тих, хто бажає завдати шкоди нашому благочестивому народу.\n\nТаким чином, сам глава [ShowReligionName('catholic')] попросив нас підняти прапори ревної та справедливої війни у їхній боротьбі проти [GetCountry('BOH').GetLongName]."
  hussite_wars.6.a: "Ми викорінимо цих єретиків!"
  hussite_wars.6.b: "Ми не папські посіпаки!"
  hussite_wars.7.title: "Скрута [ShowReligionAdjectiveWithNoTooltip('hussite')] вірних"
  hussite_wars.7.desc: "Побитий вісник дістався до нашого двору. Він приносить звістку про мерзенний хрестовий похід [GetCountry('PAP').GetName] проти [GetCountry('BOH').GetName]. Розповіді про жорстокість, випалену землю та безперервні бої заполонили вулиці, оскільки солдати та селяни стикаються один з одним.\n\nВісник оспівує хвалу зв'язку, який тримають наші дві нації, як брати, оскільки він просить нас прийти на допомогу його скривавленому народу. [GetCountry('BOH').GetNameWithNoTooltip] кличе на допомогу!"
  hussite_wars.7.a: "І [GetCountry('POL').GetNameWithNoTooltip] відповість. Збирайте вершників!"
  hussite_wars.7.b: "Це нерозумно..."
  teutons_hussite_wars_tt: "Подія '#Y Благочестивий заклик до зброї#!' відбувається для [GetCountry('TEU').GetLongName]"
  hussite_wars.8.title: "Спільний ворог"
  hussite_wars.8.desc: "Наші співвітчизники у відчаї. Коли єретичні армії б'ють у наші ворота, багато старих гірких суперництв між видатними діячами було відкинуто, оскільки ми об'єднуємося проти жадібності та недалекоглядності наших ворогів. Сила нашої рішучості та нашої побожності забезпечить, що ми подолаємо цю підступну перешкоду, переможемо тих, хто бажає завдати шкоди нашому народу та нашій вірі, вийшовши переможцями та відновивши нашу стару велич і належну повагу."
  hussite_wars.8.a: "Боріться, сини та дочки [GetCountry('BOH').GetNameWithNoTooltip]!"
  boh_clergy_donation_tt: "Ця пожертва від [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] має на меті підняти дух нашого народу"
  hussite_wars.8.b: "Ми посилимо поширення наших вчень проти [ShowReligionNameWithNoTooltip('catholic')]."
  hussite_wars.8.c: "Зверніться до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] у ці важкі часи..."
  hussite_wars.9.title: "Відновлений хрестовий похід проти [ShowReligionNameWithNoTooltip('hussite')]"
  hussite_wars.9.desc: "Лихо, відоме як [ShowReligionName('hussite')], є образою нашого шанованого та побожного світу, небезпечною чумою, що загрожує єдності віри та божественному порядку. Їхні єретичні вчення сіють розбрат і оскверняють священні доктрини, які [ShowReligionName('catholic')] підтримувала протягом поколінь. Таке зухвальство не може бути терпимим. Наш священний обов'язок — негайно зібрати армії [ShowReligionNameWithNoTooltip('catholic')], вирушаючи з непохитною рішучістю, щоб загасити цю єресь, перш ніж вона розростеться далі. Викорінюючи їхній вплив, ми збережемо чистоту наших вірувань і відновимо божественну гармонію на землях під нашою святою опікою."
  hussite_wars.9.a: "На війну!"
  hussite_wars.9.b: "Наразі ми можемо вичікувати."
  explain_situation_peace_treaty_tt: "Під час цієї [Concept('war', 'CONCEPT_PLACEHOLDER')|e] ми можемо викорінити [ShowReligionName('hussite')] за допомогою [ShowPeaceTreatyTypeName('force_convert')] та [ShowPeaceTreatyTypeName('supress_hussite_faith')] [Concept('peace_treaties', 'CONCEPT_PLACEHOLDER')|e] і покласти край [ShowSituationName('hussite_wars')]"
  hussite_wars.10.title: "[ShowSituationNameWithNoTooltip('hussite_wars')]"
  hussite_wars.10.desc: "Піднесення [ShowReligionName('hussite')] зробило [target_bohemia.GetName] ізгоєм [ShowReligionAdjective('catholic')] світу, оскільки вона хитається на межі. Страта [GetCharacter('boh_jan_hus').GetName] не придушила інакомислення, а навпаки, підбадьорила його. Єретичні проповідники тепер збирають [GetCountry('BOH').GetGovernment.GetEstateName('peasants')] та [GetCountry('BOH').GetGovernment.GetEstateName('nobles_estate')] разом, закликаючи до нової Церкви, вільної від влади [target_location1.GetName].\n\n [GetCountry('BOH').GetFlavorRank] занурюється в заворушення, оскільки [target_location2.GetName] палає реформаторським запалом. Для членів [GetUniqueInternationalOrganization('hre').GetName] це не просто повстання. Це єресь з арміями, повстання з метою. Якщо [target_bohemia.GetNameWithNoTooltip] переможе, інфекція може поширитися за її межі, загрожуючи самій єдності [ShowReligionGroupName('christian')]."
  hussite_wars.10.a: "До зброї, люди віри!"
  hussite_wars.10.historical_info: "Гуситські війни (1419–1434) — це серія релігійних та громадянських конфліктів у Богемії, спричинених стратою Яна Гуса, чеського реформатора, який критикував Католицьку Церкву. Його послідовники, відомі як гусити, вимагали реформ, включаючи причастя для всіх та національну Церкву, незалежну від Риму. Війни зіштовхнули радикальні гуситські фракції з католицькими лоялістами та хрестоносними арміями, надісланими імператором Священної Римської імперії та Папою. Незважаючи на чисельну перевагу, гусити використовували інноваційну тактику та внутрішню єдність, щоб неодноразово перемагати своїх ворогів, змушуючи Церкву зрештою вести переговори та надавати обмежені поступки."
  hussite_rebellion: "Гуситське повстання"