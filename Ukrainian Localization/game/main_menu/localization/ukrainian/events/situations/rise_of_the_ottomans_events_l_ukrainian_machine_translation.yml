l_english:
  rise_of_the_ottomans.1.title: "Загроза [ShowCultureNameWithNoTooltip('turkish_culture')]"
  rise_of_the_ottomans.1.desc: "Народжена з попелу вмираючого Сельджуцького султанату, невелика територія [target_character.GetName] спочатку була затьмарена могутнішими сусідами. Однак бачення та амбіції [target_country.GetName] виявилися далекосяжними, оскільки вони нещодавно стали на шлях експансії та консолідації, виборюючи своє місце в бурхливому гобелені фрагментованої [ShowRegionNameWithNoTooltip('anatolia_region')].\n#NL![target_character.GetShortNameWithNoTooltip] та [target_character.GetHerHis] наступники вміло скористалися пануючим хаосом і розколами в регіоні. З кожною перемогою [target_country.GetAdjectiveWithNoTooltip] князівство стає сильнішим, приваблюючи воїнів, вчених та амбітні уми, які прагнуть взяти участь у цій зростаючій силі. Їхні стратегічні шлюби, хитромудрі союзи та військова доблесть поступово перетворили скромну державу на імперію, що формується."
  rise_of_the_ottomans.1.a: "Їх треба зупинити!"
  rise_of_the_ottomans.2.title: "Піднесення [target_country.GetNameWithNoTooltip]"
  rise_of_the_ottomans.2.a: "Це наша доля!"
  rise_of_the_ottomans.3.title: "Кінець турків"
  rise_of_the_ottomans.3.desc: "Мрія залишків князівств у [ShowRegionName('anatolia_region')] так і не здійснилася, оскільки перше з них тепер відкладено на невизначений термін після того, як їхня експансія не змогла відповідати їхнім амбіціям. Напевно, не буде Імперії, яка могла б заповнити їхню порожнечу..."
  rise_of_the_ottomans.3.a: "Це було на краще!"
  rise_of_the_ottomans.4.title: "Піднесення [target_country.GetNameWithNoTooltip]"
  rise_of_the_ottomans.4.desc: "Мрія [target_character.GetName] тепер здійснилася, і світ тремтить від могутності [target_country.GetLongName]. Хто зможе протистояти їм?"
  rise_of_the_ottomans.4.a: "$common_string_what_can_we_do$"
  rise_of_the_ottomans.5.title: "Піднесення турків"
  rise_of_the_ottomans.5.desc: "Ми досягли навіть найсміливіших амбіцій та мрій засновника нашої династії. Куди ми можемо піти далі?"
  rise_of_the_ottomans.5.a: "Це триватиме вічно!"
  ability_to_form_rum_tt: "Отримати можливість відновити Рум"
  history_rewritten_tt: "#italic І так, історія переписується. Стоячи на світанку нашої зростаючої країни, ми успадкуємо спадщину та славу тих, хто проклав шлях до нашого сходження.#!"
  rise_of_the_ottomans.6.title: "Піднесення [ROOT.GetCountry.GetNameWithNoTooltip]"
  rise_of_the_ottomans.6.desc: "Наша боротьба за подолання небезпек наших сусідів призвела до того, що ми зайняли міцну позицію у внутрішніх та зовнішніх справах по всій [ShowRegionName('anatolia_region')]. З нашим новонабутим впливом ми, безсумнівно, зможемо змусити навіть наших найбільших ворогів схилитися!"
  rise_of_the_ottomans.6.a: "Ми скористаємося цією можливістю!"
  rise_of_the_ottomans.6.b: "Давайте почекаємо..."
  tur_choose_reform_later_tt: "[Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] буде доступна для нас, доки ми зберігаємо свою першість у [ShowSituationName('rise_of_the_ottomans')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  rise_of_the_ottomans.100.title: "Кампанія проти [target_country.GetNameWithNoTooltip]"
  rise_of_the_ottomans.100.desc: "Коли [ROOT.GetCountry.GetGovernment.GetRulerTitle] обмірковує наступний крок у [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] грандіозному задумі, [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] спостерігає, як тріумфальні [ROOT.GetCountry.GetAdjective] прапори майорять на вітрі. Навіть зараз сусідні території виглядають готовими до включення до зростаючого [ROOT.GetCountry.GetFlavorRank].\n#NL!Якщо ми захопимо [target.GetProvince.GetName], це зміцнить наш контроль над [target.GetArea.GetName] і ще більше розширить наш вплив у регіоні. Настав час розпочати нову військову кампанію!"
  rise_of_the_ottomans.100.a: "[target.GetNameWithNoTooltip] скоро буде нашим!"
  rise_of_the_ottomans.101.title: "[target_country.GetLongNameWithNoTooltip] та [target_country2.GetNameWithNoTooltip]"
  rise_of_the_ottomans.101.desc: "Не кожне розширення нашого [ROOT.GetCountry.GetFlavorRank] вимагає військового завоювання. Іноді емісар може домовитися про договір, що є вигідним для обох сторін, і без кровопролиття розширить наші кордони."
  rise_of_the_ottomans.101.a: "Зробіть їм пропозицію, від якої вони не зможуть відмовитись..."
  rise_of_the_ottomans.101.b: "Нас не обходять їхні справи!"
  rise_of_the_ottomans.101.tt: "[target_country.GetName] може бути переконано стати нашим [ShowSubjectTypeName('vassal')]"
  rise_of_the_ottomans.102.title: "Вимагати від [target_country2.GetName]"
  rise_of_the_ottomans.102.desc: "[target_country2.GetAdjective] [target_country2.GetGovernment.GetFullRulerName] надіслав емісара, який вимагає нашої покори їм, фактично приєднавшись до їхнього [target_country2.GetFlavorRank] як [ShowSubjectTypeName('vassal')]."
  rise_of_the_ottomans.102.a: "Прийняти вимоги."
  rise_of_the_ottomans.102.b: "Ми не будемо розглядати ці пропозиції."
  rise_of_the_ottomans.103.title: "[target_country.GetAdjectiveWithNoTooltip] відповідь"
  rise_of_the_ottomans.103.desc: "Емісар повернувся з [target_country.GetCapital.GetName], принісши звістку, що [target_country.GetLongName] погодилося підкоритися нашій владі та стати нашим [ShowSubjectTypeName('vassal')]. Зіткнувшись зі зростаючими загрозами та визнавши міць нашого [ROOT.GetCountry.GetFlavorRank], [target_country.GetAdjectiveWithNoTooltip] правителі вирішили присягнути на вірність в обмін на наш захист.\n\nЦе знаменує рішучий крок до об'єднання роздроблених бейликів [ShowRegionName('anatolia_region')] під нашим прапором, оскільки наш вплив поширюється, а наша доля як домінуючої сили в регіоні стає все очевиднішою."
  rise_of_the_ottomans.103.a: "Зрештою, кожен схилить коліно!"
  rise_of_the_ottomans.104.title: "[target_country.GetLongNameWithNoTooltip] відмовляється!"
  rise_of_the_ottomans.104.desc: "Завжди було зрозуміло, що негідникам у [target_country.GetCapital.GetName] бракує далекоглядності. Лише наші милосердні серця змусили нас дати їм можливість підкоритися добровільно, можливість, від якої вони тепер відмовилися!"
  rise_of_the_ottomans.104.a: "Ми зустрінемо їх на полі бою!"
  rise_of_the_ottomans.105.title: "Інтеграція [target_province.GetNameWithNoTooltip]"
  rise_of_the_ottomans.105.desc: "З [target_province.GetName] тепер під нашим контролем, Двір опиняється на критичному етапі. Делікатний процес асиміляції завойованої землі у велике полотно імперії має бути проведений з точністю та далекоглядністю. Доля провінції висить на волосині, з потенціалом стати невід'ємною частиною [GetCountry('TUR').GetLongName] або джерелом заворушень та невдоволення.\n\nДвір обговорює найкращий підхід для забезпечення успішної інтеграції. З'являються різні голоси, пропонуючи поради щодо подальшого шляху. Деякі радять швидке запровадження османських законів та інститутів для встановлення централізованого контролю, сприяючи почуттю єдності та лояльності серед населення. Інші виступають за більш обережний підхід, закликаючи поважати місцеві звичаї та традиції, щоб завоювати довіру завойованого народу."
  rise_of_the_ottomans.105.a: "Сприяти почуттю єдності та лояльності"
  rise_of_the_ottomans.105.b: "Застосувати більш обережний підхід"
  rise_of_the_ottomans.106.title: "[actor.GetNameWithNoTooltip] вимагає дипломатичних зв'язків"
  rise_of_the_ottomans.106.desc: "Шлях до влади часто відрізняється для тих, хто прагне її прийняти та довести до кінця. Для нас він усіяний перешкодами та дипломатичними маневрами, оскільки ми боремося за збереження нашого суверенітету. Останнє питання, що привернуло нашу увагу, надійшло у формі офіційного дипломатичного запиту від [actor.GetName].\n\nЗгідно з їхнім красномовно написаним листом, вони пропонують нам руку своєї найславетнішої династії [target_country1.GetGovernment.GetRuler.GetDynasty.GetName], в обмін на деяку територію на нашому спільному кордоні. Мати такого могутнього сусіда, що гарантує нашу незалежність і ставиться до нас прихильно, є великою перевагою, але що ж з нашою територіальною цілісністю...?"
  rise_of_the_ottomans.106.a: "Ми приймемо їхню пропозицію."
  rise_of_the_ottomans.106.b: "Вигнати їхнього дипломата та відхилити їхні вимоги!"
  rise_of_the_ottomans.107.title: "[target_country2.GetAdjectiveWithNoTooltip] відповідь"
  rise_of_the_ottomans.107.desc_a: "Незважаючи на нашу великодушну пропозицію до двору [target_country2.GetName], вони незрозуміло відхилили нашу велику пропозицію! Це свідчить про те, що їхні дипломатичні здібності сильно бракують, враховуючи, що вони не можуть визнати нашу вроджену перевагу над ними. Це образа, яку ми не можемо залишити без покарання!"
  rise_of_the_ottomans.107.desc_b: "Одружена пара повернулася до [target_location2.GetName] у супроводі великої кількості музикантів, придворних та радісних звуків, яких можна було очікувати від такого престижного союзу. Але, що важливіше, вони також приносять із собою документи на [target_location.GetName], яка відтепер вважатиметься частиною нашої інтегрованої території."
  rise_of_the_ottomans.107.a: "Я люблю дипломатію!"
  rise_of_the_ottomans.107.b: "Країни горіли й за менше."
  rise_of_the_ottomans.207.desc: "Наші завоювання принесли нечуване багатство нашому народу. Тому захист такого достатку став життєво важливим пріоритетом. [target_location.GetName] — це перлина нашої корони, яскравий приклад нашого успіху та символ нашої зростаючої влади в регіоні. Завершення будівництва місцевої [ShowBuildingTypeName('bey_fortress')] ще більше піднесло місто, його важливість тепер підкреслена крізь віки."
  rise_of_the_ottomans.200.title: "Столиця Старої Імперії"
  rise_of_the_ottomans.200.a: "Нехай це прокладе шлях до більших висот!"
  based_on_target_location_splendor_and_importance_tt: "Виходячи з її [Concept('location_importance', 'CONCEPT_PLACEHOLDER')|e], [target_location.GetNameWithNoTooltip]:"
  rise_of_the_ottomans.108.title: "Дипломатія з [GetCountry('BYZ').GetNameWithNoTooltip]"
  rise_of_the_ottomans.108.desc: "Протягом більшої частини нашої історії ми так чи інакше взаємодіяли з [GetCountry('BYZ').GetLongName]. Хоча їхня пишність і могутність, можливо, вже не ті, що були колись, вони, тим не менш, мають потужну присутність по всьому [ShowLocationName('bosphorus')]. Однак через дисбаланс сил між нашими дворами ми перебуваємо в унікальному становищі, щоб висувати їм вимоги та потенційно отримати більший статус у нашому власному регіоні..."
  rise_of_the_ottomans.108.a: "Вони повинні визнати наш вплив у [ShowRegionNameWithNoTooltip('anatolia_region')]."
  rise_of_the_ottomans.108.b: "Їхня монета забезпечить процвітаючі відносини."
  rise_of_the_ottomans.108.c: "Напевно, вони можуть пожертвувати королівські подарунки!"
  rise_of_the_ottomans.108.d: "Неважливо."
  gain_recognition_tt: "Якщо вони погодяться та визнають наш суверенітет над нашим регіоном, ми отримаємо [ShowModifier('sovereign_of_anatolia')] на #Y 10#! років"
  gain_money_tt: "Якщо вони погодяться, ми отримаємо частину їхнього доходу"
  gain_court_official_tt: "Якщо вони погодяться, один з їхніх найздібніших адміністраторів приєднається до нашого двору"
  rise_of_the_ottomans.109.title: "Прохання від [actor.GetNameWithNoTooltip]"
  rise_of_the_ottomans.109.desc: "Серед боротьби за владу, яка охопила весь [ShowRegionNameWithNoTooltip('anatolia_region')] у сум'яття, прибули посланці від [actor.GetLongName], не гаючи часу, щоб передати прохання від свого сюзерена..."
  rise_of_the_ottomans.109.a: "Ми повинні погодитися."
  rise_of_the_ottomans.109.b: "Ким вони себе вважають!?"
  rise_of_the_ottomans.110.title: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip] Відповідь"
  rise_of_the_ottomans.110.desc: "Невдовзі після того, як ми відправили посланця до двору [GetCountry('BYZ').GetAdjective], наш емісар повертається, тримаючи лист, що має печатку колись могутньої Імперії, забутої в пісках часу..."
  rise_of_the_ottomans.110.a: "Дуже добре."
  rise_of_the_ottomans.110.b: "Як вони сміють!?"
  byz_accepted_proposal_tt: "Вони прийняли нашу пропозицію"
  byz_declined_proposal_tt: "Вони відхилили нашу пропозицію"
  rise_of_the_ottomans.201.title: "[target_location.GetNameWithNoTooltip] - Доля та Історія"
  rise_of_the_ottomans.202.title: "[target_location.GetNameWithNoTooltip] - Тінь Сельджуків"
  rise_of_the_ottomans.203.title: "[target_location.GetNameWithNoTooltip] - Місто Боротьби"
  rise_of_the_ottomans.204.title: "[target_location.GetNameWithNoTooltip] - Культурне Перехрестя"
  rise_of_the_ottomans.205.title: "[target_location.GetNameWithNoTooltip] - Вплив на Сході"
  rise_of_the_ottomans.206.title: "[target_location.GetNameWithNoTooltip] невірних"
  rise_of_the_ottomans.208.title: "Падіння [target.GetNameWithNoTooltip]"
  rise_of_the_ottomans.208.desc: "Те, що колись було нашою гордою перлиною та одним із найважливіших міст, [target.GetName], впало до рук ворога. Ворожі армії успішно зламали захисників і увійшли до внутрішнього центру, сіючи хаос та винищуючи місцеве населення..."
  rise_of_the_ottomans.208.a: "Це жахіття!"
  rise_of_the_ottomans.209.title: "Завоювання [Location.GetNameWithNoTooltip]"
  rise_of_the_ottomans.209.desc: "Попри всі наші спроби захистити наші володіння, ми, на жаль, не змогли зберегти контроль над [Location.GetName], однією з наших твердинь та найважливішим містом. Це чорний день для нашого народу, що ще більше загрожує нашому вже ослабленому становищу в регіоні..."
  rise_of_the_ottomans.209.a: "Чи це кінець?"
  growing_influence_text: "Доказ нашого зростаючого впливу та процвітання!"
  rise_of_the_ottomans.201.a: "$growing_influence_text$"
  rise_of_the_ottomans.202.a: "$growing_influence_text$"
  rise_of_the_ottomans.203.a: "$growing_influence_text$"
  rise_of_the_ottomans.204.a: "$growing_influence_text$"
  rise_of_the_ottomans.205.a: "$growing_influence_text$"
  rise_of_the_ottomans.206.a: "$growing_influence_text$"
  rise_of_the_ottomans.207.title: "Зростання Могутності"
  rise_of_the_ottomans.200.historical_info: "Життєво важливе місто з римських часів, Ізміт лежить на берегах багатої затоки, згодом перетворившись на процвітаючий торговий центр та перехрестя культур. Його значення було настільки великим, що Діоклетіан гордо проголосив його столицею східного регіону Риму. Пізніше його казарми приймали як хрестоносців, так і Ġuzāt, коли його володіння перейшло від перших до останніх на початку XIII століття. Остаточно його захопили османські війська під час облоги у 1337 році."
  rise_of_the_ottomans.201.historical_info: "Відома своєю багатою історією та тим, що була першою столицею Османської імперії, Бурса може похвалитися чудово витканим історичним гобеленом. У її володіннях знаходяться архітектурні дива, такі як Єшиль Тюрбе та Велика Мечеть, свідчення славетної історії."
  rise_of_the_ottomans.202.historical_info: "Процвітаючи як культурний та політичний центр за сельджуцького режиму, Конья була колискою багатьох цивілізацій. Її правителі використовували місто як унікальний плавильний котел різних культур, що слугувало основою для самобутнього мистецтва та величних споруд, таких як її зовнішня фортеця, мечеть Алааддіна, медресе Сірчалі та кілька менших мечетей і гробниць, що втілюють архітектурну елегантність сельджуцької епохи."
  rise_of_the_ottomans.203.historical_info: "Протягом своєї історії Анкара була ареною численних битв, оскільки армії боролися за контроль. За римської доби місто процвітало як центр культури, торгівлі та мистецтв. Пізніше, за османського панування, воно стало ключовим пунктом на східних караванних торгових шляхах. У XIV столітті Анкара слугувала центром влади республіканського купецького братства, що було цікавою дивиною в регіоні ворогуючих бейликів."
  rise_of_the_ottomans.204.historical_info: "Починаючи з часів хетів, Кайсері служило життєво важливим пунктом знаменитого Шовкового шляху. У давнину місто було резиденцією каппадокійських царів, а за перського панування воно стало свідком нищівної могутності Олександра Великого. Місто пережило три золоті віки: як торговий пост між ассирійцями та хетами близько 2000 року до н.е., за римського панування з I по XI століття, і за сельджуків з 1178 по 1243 рік. Попри свою бурхливу історію облог і битв, місто гордо демонструє архітектурну витонченість, слугуючи місцем розташування таких пам'яток, як Хунад Хатун Кюллієсі та мечеть Кілідж Арслан."
  rise_of_the_ottomans.205.historical_info: "За свідченнями багатьох істориків того часу, Сівас був одним із найважливіших поселень регіону, будучи серцем прекрасної мечеті та відомої лікарні, що була при ній. Місто зрештою перейшло під османське правління в 1516 році, де воно служило санджаком."
  rise_of_the_ottomans.206.historical_info: "Історія Смірни сягає тисячоліть, місто служило одним із головних давньогрецьких поселень у західній Анатолії. В останні століття воно було спустошене турецькими арміями, що його облягали, доки не було відбудоване одним з імператорів Нікеї, Іоанном III Дукою Ватацем, у 1222 році. Смірна стала мішенню хрестового походу, очолюваного лицарями Родосу та Кіпрським королівством у 1344 році, що призвело до перемоги, в результаті якої місто перейшло до рук родоських хрестоносців. Саме тут у 1403 році лицарі-госпітальєри зазнали нищівної поразки від Тимура, що призвело до того, що великий завойовник завдав місту значних руйнувань. Незважаючи на це, грецький вплив міста був все ще достатньо сильним, щоб османи назвали місто «Смірна невірних»."
  rise_of_the_ottomans.300.title: "[target_location.GetNameWithNoTooltip] Занепадає"
  rise_of_the_ottomans.300.desc: "Незважаючи на всі зусилля гарнізону, схоже, що наші укріплення в [target_location.GetName] занепали через недбалість та відсутність догляду. Місцеві жителі почали легковажити своїми обов'язками щодо патрулювання та інспекції стін, що призвело до величезних прогалин у нашій обороні. Це, безумовно, дуже тривожне видовище для жителів [target_location.GetNameWithNoTooltip] та навколишніх поселень..."
  rise_of_the_ottomans.300.a: "Їх слід привести до порядку!"
  rise_of_the_ottomans.210.title: "Падіння [target_location.GetNameWithNoTooltip]"
  rise_of_the_ottomans.210.desc: "Після місяців битв та тривалої оборони з боку варти в [target_location.GetName], ми отримали прикру звістку про те, що форт перейшов до [target_country.GetAdjective] рук. Це жахливий розвиток подій, оскільки наша влада по всій [ShowRegionName('anatolia_region')] слабшає, голоси, що співають про нашу загибель, стають голоснішими..."
  rise_of_the_ottomans.210.a: "Справді, жахливі новини."
  rise_of_the_ottomans.211.desc: "Після тривалого бою на мостах, біля воріт та в околицях форту в [target_location.GetName], нашим солдатам нарешті вдалося прорватися до цитаделі та закріпити один з останніх [target_country.GetAdjective] плацдармів у регіоні. Це останнє свідчення того, що наш вплив та сила затьмарили [target_country.GetNameWithNoTooltip]!"
  rise_of_the_ottomans.211.a: "Ми повстанемо!"
  rise_of_the_ottomans.212.title: "Інтервенція в [target_country.GetNameWithNoTooltip]"
  rise_of_the_ottomans.212.desc: "Роки безгосподарності за рахунок народу, [target_character2.GetName] привів [target_country.GetName] до періоду нестабільності та невизначеності. Селяни по всій сільській місцевості стають жертвами мародерів, суди в безладді, а центральної влади ніде не знайти. На щастя, [target_character.GetName], член нашого двору, має законні претензії на [target_country.GetAdjectiveWithNoTooltip] престол, через що ми можемо відновити мир і процвітання для їхнього народу..."
  rise_of_the_ottomans.212.a: "Ми є арбітрами стабільності та миру."
  rise_of_the_ottomans.212.b: "Не поспішаймо."
  rise_of_the_ottomans.213.title: "Магістральний шлях до [ShowLocationNameWithNoTooltip('erzurum')]"
  rise_of_the_ottomans.213.desc: "Стародавній шлях, що з'єднує [ShowLocationName('konya')], [ShowLocationName('erzurum')], [ShowLocationName('sivas')] та [ShowLocationName('tabriz')], довгий час був життєво важливою артерією для торгівлі та домінування по всій [ShowRegionName('anatolia_region')]. Простягаючись як через пересічену місцевість, так і через родючі рівнини, цей магістральний шлях століттями сприяв потоку товарів, ідей та армій. Його стратегічне значення неможливо переоцінити, оскільки наші радники закликають нас контролювати всі життєво важливі точки на ньому.\n\nПоки каравани, навантажені численними товарами та іншими скарбами, долають цей маршрут, дорога продовжує об'єднувати регіон, формуючи долю імперій. Хоча попереднє століття бачило будівництво ключової інфраструктури у східній частині дороги, розширення дорожньої мережі лише сприятиме зростанню багатства нашого народу, як тільки вона міцно опиниться в наших руках."
  rise_of_the_ottomans.213.historical_info: "Анатолійський магістральний шлях, що з'єднував Конью, Ерзурум, Сівас та Тебриз у XIII-XIV століттях, був життєво важливим торговим та військовим маршрутом через Анатолію. Він сприяв обміну товарами, такими як чай та килими, і відіграв ключову роль у кампанії султана Кайхусрава II 1243 року, що завершилася битвою при Кьосе-Дазі. Будівництво мосту Чобандеде поблизу Ерзурума у 1289 році ще більше посилило його значення, зміцнивши Ерзурум як центр торгівлі та логістики. Ця дорога з'єднувала імперії, культури та економіки, залишивши тривалий спадок в історії Анатолії."
  rise_of_the_ottomans.213.a: "Багатство [ShowRegionNameWithNoTooltip('anatolia_region')] у нас на долоні?"
  control_of_the_erzurum_trunk_road_tt: "Пряме володіння [ShowLocationName('konya')], [ShowLocationName('erzurum')], [ShowLocationName('sivas')] або [ShowLocationName('tabriz')] надасть нам доступ до [ShowEstatePrivilegeName('trunk_road_to_erzurum_privilege')] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] [Concept('estate_privilege', 'CONCEPT_PLACEHOLDER')|e].\n\nКожна додаткова [Concept('location', 'CONCEPT_PLACEHOLDER')|e] серед цих, якою ми безпосередньо володіємо, ще більше посилить цей [Concept('privilege', 'CONCEPT_PLACEHOLDER')|e]."
  rise_of_the_ottomans.214.title: "Монетні двори Старого Султанату"
  rise_of_the_ottomans.214.desc: "[ShowLocationName('konya')] та [ShowLocationName('sivas')] є домом для життєво важливого [ShowBuildingTypeName('seljuk_mint')]. Великий символ багатства та влади, їхні майстерні гудуть ритмічними ударами молотів, що перетворюють цінну руду на монети, які циркулюють по всьому регіону. Культовий мотив лева та сонця, що прикрашає ці монети, говорить про силу, суверенітет та небесні сили, які, як вважалося, керують правителями та їхніми володіннями. Стратегічно розташовані в серці [ShowRegionName('anatolia_region')], ці монетні двори є не просто місцями торгівлі — вони є інструментами контролю, їхня валюта пов'язує віддалені провінції з волею тих, хто ними командує. Володіти цими монетними дворами означає володіти економічним домінуванням, фінансувати армії та проектувати владу, роблячи їх наріжним каменем будь-яких амбіцій щодо правління регіоном."
  rise_of_the_ottomans.214.a: "Вони будуть нашими."
  silver_dirhams_explanation_tt: "Обидві [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] є домом для [ShowBuildingTypeName('seljuk_mint')], що значно збільшує цінність цих земель"
  rise_of_the_ottomans.214.historical_info: "Монетні двори Сіваса та Коньї були центрами економічних та художніх інновацій, виробляючи вражаючі срібні дирхами, прикрашені мотивом лева та сонця. Хоча ісламські традиції часто не заохочували зображення живих істот, ці монети відображали поєднання культурних впливів та політичного символізму. Лев і сонце могли представляти небесні зв'язки, такі як сузір'я Лева, або символізувати союз могутнього правителя та його дружини. Окрім своєї художньої цінності, ці монети були інструментами економічного контролю, широко циркулюючи для зміцнення влади Сельджуцького султанату. Монетні двори не лише сприяли торгівлі, але й проектували владу, роблячи їх життєво важливими для процвітання та стабільності регіону."
  rise_of_the_ottomans.215.title: "Велика [ShowCultureGroupNameWithNoTooltip('turkic_group')] міграція"
  rise_of_the_ottomans.215.desc: "З більшою частиною [ShowRegionName('anatolia_region')] під нашим правлінням, земля все ще несе відбиток свого [GetCountry('BYZ').GetAdjective] минулого, з багатьма ключовими прибережними локаціями, що залишаються переважно [ShowCultureName('greek_culture')] за культурою. Проте, припливи змін невпинні. Занепад Сельджуцького султанату та наслідки [ShowCultureGroupName('mongolian_group')] вторгнень спричинили хвилі [ShowCultureGroupName('turkic_group')] мігрантів на захід, у пошуках нових земель та можливостей. Ці поселенці шукатимуть захисту та лідерства у нашого великого [ROOT.GetCountry.GetFlavorRank].\n\nБачачи можливість переформувати регіон, ми повинні заохочувати ці міграції, заселяючи узбережжя [ShowRegionNameWithNoTooltip('anatolia_region')] та забезпечуючи наше правління над цими землями. З кожним новим поселенням, тканина регіону змінюється, перетворюючи його на серцевину нашого зростаючого [ROOT.GetCountry.GetFlavorRank]. Ця [ShowCultureGroupNameWithNoTooltip('turkic_group')] присутність зміцнює нашу армію та адміністрацію, забезпечуючи, що основи нашої держави міцно спираються на лояльний народ, який поділяє наше коріння."
  rise_of_the_ottomans.215.historical_info: "На рубежі XIV століття відбулася значна міграція тюрків на османські землі, значною мірою спричинена занепадом Сельджуцької імперії та розширенням османської влади. Коли Сельджуцький султанат Руму ослаб після монгольських вторгнень наприкінці XIII століття, багато тюркських племен, зокрема огузи, почали мігрувати на захід до Анатолії. Ці племена шукали нових земель та можливостей, часто осідаючи в регіонах, які пізніше стали частиною Османської імперії."
  rise_of_the_ottomans.215.a: "Ми приймемо їх з розкритими обіймами!"
  enable_turkic_migration_tt: "Оскільки наш вплив на [ShowRegionNameWithNoTooltip('anatolia_region')] значно зріс, ми тепер маємо доступ до [ShowGenericActionName('invite_turkic_migration')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e] у [ShowSituationName('rise_of_the_ottomans')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  rise_of_the_ottomans.216.title: "[target_culture.GetNameWithNoTooltip] Мігранти стікаються до [target_province_destination.GetNameWithNoTooltip]"
  rise_of_the_ottomans.216.desc: "Серед [target_culture.GetName] населення [target_province_origin.GetName] поширилася звістка про нові можливості, що чекають у [target_province_destination.GetName]. Релігійні лідери та місцеві чиновники почали заохочувати родини до подорожі, обіцяючи родючі землі, економічне процвітання та шанс зміцнити нашу культурну присутність у провінції. Ця міграція, якщо вона відбудеться, може змінити демографію обох провінцій, сприяючи подальшому просуванню нашої програми та консолідації контролю над нашими землями."
  rise_of_the_ottomans.216.a: "Ми приймемо їх з розкритими обіймами!"
  target_province_destination_already_has_tt: "Оскільки [target_province_destination.GetName] вже має [ShowModifier('cultural_intermixing_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], його ефекти подвояться на наступні #Y 2 роки"
  rise_of_the_ottomans.217.title: "Новий [ShowSubjectTypeNameWithNoTooltip('uc_bey')]"
  rise_of_the_ottomans.217.desc: "Щоб забезпечити наш кордон і захистити [ROOT.GetCountry.GetFlavorRank] від зовнішніх загроз, [target_character.GetName] був призначений наглядати за [ShowSubjectTypeName('uc_bey')] [target_country.GetName]. Завданням [target_character.GetShortNameWithNoTooltip] буде захист нашого кордону, утримання постійної армії, нагляд за будівництвом та обслуговуванням укріплень, а також забезпечення безпеки наших земель. Це призначення є критичним кроком у зміцненні нашої оборони та утвердженні нашої влади в регіоні. Нехай [target_character.GetSheHe] служить з пильністю та честю!"
  rise_of_the_ottomans.217.a: "[target_province.GetNameWithNoTooltip] у надійних руках."
  uc_bey_spawns_tt: "[target_country.GetLongName] захищатиме наш кордон у [target_province.GetName]"
  create_uc_bey_tt: "Призначена [Concept('province', 'CONCEPT_PLACEHOLDER')|e] належатиме новому [ShowSubjectTypeName('uc_bey')] підданому"
  rise_of_the_ottomans.218.title: "Наш торговий вплив зростає в [ShowRegionNameWithNoTooltip('anatolia_region')]"
  rise_of_the_ottomans.218.desc: "Наші нещодавні завоювання по всій [ShowRegionName('anatolia_region')] мали величезний вплив на зміщення балансу сил у всьому регіоні. Наші останні кампанії призвели до того, що частини знаменитої магістралі до [ShowLocationName('erzurum')], включаючи важливий її вузол, перейшли під нашу пряму юрисдикцію. Цей розвиток, безсумнівно, зміцнить наш [ROOT.GetCountry.GetFlavorRank] як великого претендента під час поточної [ShowSituationName('rise_of_the_ottomans')] і, сподіваємося, захистить наш народ від іноземних завоювань.\n\nКрім того, наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] схоже, прагнуть отримати контроль над цими важливими торговими центрами вздовж магістралі, що покращило б наш прибуток за рахунок їхнього зростаючого впливу. Це делікатне питання, і [target_character.GetName] може не захотіти ризикувати розгнівати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')], щоб не ризикувати нестабільністю та [target_character.GetHerHis] владою."
  rise_of_the_ottomans.218.b: "Ми не можемо ризикувати поширенням їхнього впливу!"
  rise_of_the_ottomans.400.title: "Балканські війни"
  rise_of_the_ottomans.400.desc: "Наше панування над [ShowRegionName('anatolia_region')] стало беззаперечним. Ті, хто колись намагався затьмарити нашу владу, тремтять за своїми стінами.\n\nНаше стрімке зростання до влади часто приписують божественній волі, однак, нашу військову та тактичну майстерність не можна ігнорувати. Наші радники підтримують ідею розширити наші кампанії на [ShowRegionName('balkan_region')], скориставшись нашим поточним імпульсом."
  rise_of_the_ottomans.400.a: "Наші гармати затьмарять сонце!"
  tur_press_claims_expanded_tt: "Поки ми безпосередньо володіємо #Y 120#! [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] загалом і маємо присутність у [ShowRegionNameWithNoTooltip('balkan_region')], [ShowGenericActionName('press_claims')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e] у [ShowSituationName('rise_of_the_ottomans')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] #italic також#! дозволить нам отримати [Concept('casus_bellis', 'CONCEPT_PLACEHOLDER')|e] проти [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionNameWithNoTooltip('balkan_region')]"
  rise_of_the_ottomans.500.title: "Застій турків"
  rise_of_the_ottomans.500.desc: "Політичні інтриги та дипломатичні ігри не змогли подолати розрив між нашими зовнішніми амбіціями та мріями про завоювання. Після десятиліть територіального застою, колись грізний марш армій [ShowRegionName('anatolia_region')] зупинився. Через поєднання іноземного втручання, могутність наших ворогів загасила те, що колись було яскравим полум'ям, наше законне місце серед великих держав.\n\nРеальність нашої ситуації ставить нас у небезпечне становище. Наша невдала спроба піднятися тепер відкриває двері для нестабільності під пильним оком наших суперників. Лише час покаже, чи судилося нам вижити, чи стати виноскою в книгах історії."
  rise_of_the_ottomans.500.a: "Прикрий поворот подій."
  rise_of_the_ottomans.600.title: "Класична епоха [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  rise_of_the_ottomans.600.desc: "Барабани завоювань звучать тріумфально, і прапори [GetCountry('TUR').GetLongName] тепер розтягнулися по континентах. З попелу [GetCountry('BYZ').GetName], через упокорені бейліки [ShowRegionName('anatolia_region')] і до розбитих твердинь [ShowReligionGroupName('christian')], могутність наших армій переформувала світ. [target_character.GetName] тепер стоїть як беззаперечний правитель цих величезних земель, захисник [ShowReligionGroupName('muslim')] і охоронець найсвятіших міст нашої віри.\n\nМечем ми завоювали. Законом ми будемо правити. Коли [ROOT.GetCountry.GetFlavorRank] переходить від вогню експансії до золотого віку управління; вчені, архітектори та державні діячі збираються у великих залах [target_location.GetName], прагнучи створити спадщину, яка стоятиме століттями. Настав час удосконалити наше панування — не просто як завойовники, а як архітектори тривалої спадщини."
  rise_of_the_ottomans.600.historical_info: "Османська класична епоха тривала приблизно з 1453 по 1600 рік. Вона ознаменувала пік військової, політичної та культурної домінації імперії. Під керівництвом султанів, таких як Мехмед II, Селім I та Сулейман «Пишний», османи розширили свої володіння в Європі, на Близькому Сході та в Північній Африці, перемігши візантійців, мамлюків та угорців. Централізоване управління, правова система #italic Кануннаме#! та військові інновації, такі як яничари, зміцнили їхнє правління. Стамбул процвітав як імперська столиця з величними мечетями та культурними досягненнями. Імперія контролювала життєво важливі торгові шляхи, домінувала в Середземномор'ї та претендувала на Халіфат, утверджуючи релігійну та політичну владу над ісламським світом."
  rise_of_the_ottomans.600.a: "#italic Ми є [ROOT.GetCountry.GetGovernment.GetRulerTitle] земель і морів, тінь [ROOT.GetCountry.GetReligion.GetGodName] на землі.#!"
  we_are_now_empire_tt: "Ми приймемо [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e] [ShowCountryRankName('rank_empire')]"