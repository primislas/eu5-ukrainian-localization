l_english:
  italian_wars.1.title: "Італійські війни"
  italian_wars.1.desc.a: "Темні руки за зачиненими дверима та нескінченні інтриги інших великих націй навколо [ShowRegionName('italy_region')] призвели до безпрецедентного дипломатичного провалу. Як наслідок, наше панування на півострові та наш вплив на нього поставлені під сумнів. У цей час небезпеки ми не повинні хитатися. Перемога в [ShowRegionNameWithNoTooltip('italy_region')] безсумнівно забезпечить наше місце серед великих держав!"
  italian_wars.1.desc.b: "Війна прийшла до [ShowRegionName('italy_region')]. Прапори іноземних завойовників злітаються, щоб узурпувати великі багатства, що зберігаються на нашому півострові. Ніколи раніше наш регіон не потрапляв у таку боротьбу за владу, коли великі держави кружляють над нашим домом, як голодні стерв'ятники. Настав час для нашого народу взяти меч і щит на захист своєї свободи, щоб ми не стали жертвою експансіоністських тенденцій чужинців..."
  italian_wars.1.a: "Жереб кинуто."
  italian_wars_explanation_tooltip1: "Протягом цього часу держави в [ShowRegionNameWithNoTooltip('italy_region')] зможуть захищатися, приєднавшись до #italic Італійської Ліги#!.\n"
  italian_wars_explanation_tooltip2: "Іноземні країни можуть створювати власні #italic Іноземні Ліги#!, намагаючись розширити свій вплив у регіоні.\n"
  italian_wars_explanation_tooltip3: "[Concept('rivals', 'CONCEPT_PLACEHOLDER')|e] та [Concept('enemies', 'CONCEPT_PLACEHOLDER')|e] лідерів #italic Іноземної Ліги#! можуть втрутитися, щоб допомогти #italic Італійським Лігам#! через війну або допомогу у вигляді грошей та людей\n"
  italian_wars_explanation_tooltip4: "Лідери кожної Ліги отримують доступ до [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e] [ShowPeaceTreatyTypeName('dissolve_league_peace_deal')]"
  italian_wars.1.historical_info: "Італійські війни (1494-1559) були серією жорстоких конфліктів за панування над Італією, головним чином між Францією та Іспанією, з істотною участю Європи в цьому зіткненні держав. Вони почалися, коли Карл VIII Французький вторгся до Італії в 1494 році, захопивши Неаполь, але Максиміліан I Габсбург, Ізабелла Кастильська та Фердинанд Арагонський, Католицькі королі Іспанії, поспішили на допомогу Папі, щоб вигнати його. Король Франції потім знову захопив Мілан, Геную та Неаполь у 1499 році, але Іспанія вигнала їх з Неаполя в 1503 році, утвердивши свій контроль над Південною Італією, а Папа Юлій II сформував альянс, щоб витіснити французів з Північної Італії. Через кілька років Франциск I Французький відновив французькі претензії на Мілан, який був захоплений у 1515 році, але в 1525 році він програв вирішальну битву при Павії імператору Карлу V, також королю Карлу I Іспанському, і був захоплений у полон. Франциск I був звільнений після офіційної відмови від усіх французьких претензій в Італії, але потім він об'єднався з Англією, Папою, Венецією та Флоренцією, що призвело до розграбування Риму німецькими ландскнехтами Карла V у 1527 році, миру з Папою та імператорської коронації Карла V у Болоньї в 1529 році. Війни остаточно закінчилися в 1559 році Като-Камбрезьким миром, залишивши іспанських Габсбургів домінуючою силою в Італії на 150 років."
  italian_wars.2.title: "Кінець ворожнечі"
  italian_wars.2.desc: "Під залізною рукою [target_character.GetName] стерв'ятники [target.GetName] погодилися підписати білий мир під загрозою іноземного вторгнення армій [actor.GetName]..."
  italian_wars.2.a: "Цікавий результат."
  iw_we_are_safe_for_now_tt: "Ми в безпеці, поки що..."
  italian_wars.4.title: "Запрошення до Ліги"
  italian_wars.4.desc: "Напруга зростає в нашому регіоні, і реальність війни стала надто похмурою для нашого народу. У відповідь на навалу терору, спричинену іноземними загарбниками, [actor.GetName] вирішив заснувати [target_io.GetName]. Відтоді вони надіслали нам запрошення, що є справою надзвичайної дипломатичної важливості..."
  italian_wars.4.a: "Ми приймаємо!"
  italian_wars.4.b: "Ми не можемо ризикувати нашим нейтралітетом."
  italian_wars.4.c: "Ми вірні [target_country.GetNameWithNoTooltip]!"
  italian_wars.5.title: "Іноземне втручання"
  italian_wars.5.desc: "Здається, наша нинішня боротьба проти могутньої іноземної ліги привернула увагу іншого великого гравця. Таким чином, [target_character.GetName] погодився приєднатися до нашої боротьби проти [target.GetName]."
  italian_wars.5.a: "Цікавий поворот подій!"
  italian_wars.7.title: "[actor.GetNameWithNoTooltip] втручається!"
  italian_wars.7.desc: "Прокляті пси, що називають себе [actor.GetLongName], надіслали нам ультиматум. Очевидно, наша війна проти [target_country.GetName] спонукала їх до дії проти нас! Вони вимагають негайного білого миру, інакше вони приєднаються до наших ворогів!"
  italian_wars.7.a: "Буде кровопролиття."
  italian_wars.7.b: "Ми неохоче погоджуємося..."
  italian_wars.9.title: "Допомога від [actor.GetNameWithNoTooltip]"
  italian_wars.9.desc: "Посланець від [actor.GetName] прибув до нашого двору, принісши звістку про їхню допомогу в нашій поточній оборонній війні. Вони, схоже, стурбовані балансом сил і тому виявили готовність допомогти нам."
  italian_wars.9.a: "Ми об'єднуємося проти спільного ворога, поки що..."
  italian_wars.10.title: "Врівноваження терезів"
  italian_wars.10.desc: "Триваюча війна, що спустошує землі [target.GetName], загрожує балансу сил у [ShowRegionName('italy_region')]. Ми не можемо дозволити іншій Лізі створити опорний пункт у регіоні за наш рахунок. Тому ми вирішили надіслати допомогу [target.GetLongNameWithNoTooltip], щоб підтримати їхню справу захисту своїх земель від наших ворогів."
  italian_wars.10.a: "Надіслати їм людей для їхніх армій."
  italian_wars.10.b: "Вони отримають цінну монету."
  italian_wars.100.title: "Кінець Італійських війн"
  italian_wars.100.desc: "Десятиліття боротьби та нескінченних чвар за захист нашого регіону добігли кінця під егідою нашої могутньої Ліги. Тінь чужоземних загарбників більше не спустошує наші кордони, оскільки наш народ дивиться в майбутнє, прокладаючи процвітаючий шлях крізь віки!"
  italian_wars.100.a: "Fortius quo fidelius!"
  iw_gain_5_trust_with_every_member_tt: "Ми отримаємо #G 5#! [Concept('trust', 'CONCEPT_PLACEHOLDER')|e] з кожним іншим [Concept('member', 'CONCEPT_PLACEHOLDER')|e] нашої #italic Італійської Ліги#!"
  iw_send_aid_tt: "Ми вирішимо допомогти обраній [Concept('country', 'CONCEPT_PLACEHOLDER')|e] за допомогою символічної кількості [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] або [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]"
  italian_wars.200.desc: "Довгоочікуване завершення Італійських війн добігло кінця. З розпуском усіх чужоземних ліг, що прагнули підкорити наші землі, мир і процвітання повернулися на наш півострів. Шлях прокладено для нашого власного сходження як справжніх володарів [ShowRegionName('italy_region')]."
  italian_wars.200.a: "Ера [target_country.GetNameWithNoTooltip] щойно розпочалася!"
  italian_wars.300.title: "Перемога [target_io.GetNameWithNoTooltip] у [ShowRegionNameWithNoTooltip('italy_region')]"
  italian_wars.300.desc: "Попри запеклий і непохитний опір протягом десятиліть, [ShowRegionName('italy_region')] тепер міцно і значною мірою перебуває в наших руках. Ті, хто прагнув втрутитися в наші плани, тепер ховаються за високими мурами, тікаючи від маршу наших великих армій. Сьогодні знаменує нову епоху регіону та нашу беззаперечну претензію на нього!"
  italian_wars.300.a: "Хай живе [target_character.GetNameWithNoTooltip]!"
  italian_wars.400.title: "[ShowCultureGroupNameWithNoTooltip('italian_group')] Патова ситуація"
  italian_wars.400.desc: "Попри всі наші зусилля змінити ситуацію під час розгортання [ShowSituationName('italian_wars')], здається, що держави в ній, а також будь-які чужоземні загарбники, не змогли об'єднати регіон або навіть суттєво посилити свій вплив..."
  italian_wars.400.a: "Війна, для чого вона потрібна?"
  end_the_italian_wars_stalemate_tt: "[ShowSituationNameWithNoTooltip('italian_wars')] закінчиться патовою ситуацією..."