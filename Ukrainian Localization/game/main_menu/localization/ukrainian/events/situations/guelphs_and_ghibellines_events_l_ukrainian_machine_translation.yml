l_english:
  guelphs_and_ghibellines.1.title: "Політичний ландшафт [ShowRegionNameWithNoTooltip('italy_region')]"
  guelphs_and_ghibellines.1.desc: "$guelphs_and_ghibellines_desc$"
  guelphs_and_ghibellines.1.a: "Нас чекають цікаві часи."
  guelphs_and_ghibellines.1.tt: "У цій ситуації можна об'єднатися з [GetCountry('PAP').GetName] або лідером [GetUniqueInternationalOrganization('hre').GetName] у їхній боротьбі за панування над [ShowRegionNameWithNoTooltip('italy_region')]."
  guelphs_and_ghibellines.2.title: "[GetUniqueInternationalOrganization('guelphs_io').GetNameWithNoTooltip] та [GetUniqueInternationalOrganization('ghibellines_io').GetNameWithNoTooltip]"
  guelphs_and_ghibellines.2.desc: "Хоча для кожної важливої родини зазвичай прийнято приєднуватися або до [GetUniqueInternationalOrganization('guelphs_io').GetName], або до [GetUniqueInternationalOrganization('ghibellines_io').GetName], нерідко трапляється, що особливо опортуністичні особи переходять з одного боку на інший і намагаються переконати інші держави, силою чи дипломатичною хитрістю, стати на бік праведних... або, можливо, просто на бік тих, хто має більше вигоди?"
  guelphs_and_ghibellines.2.a: "Для [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  guelphs_and_ghibellines.2.a.tt: "Вибір цього варіанту приєднає нас до [GetUniqueInternationalOrganization('ghibellines_io').GetNameWithNoTooltip]"
  guelphs_and_ghibellines.2.b: "Стати на бік [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle]."
  guelphs_and_ghibellines.2.b.tt: "Вибір цього варіанту приєднає нас до [GetUniqueInternationalOrganization('guelphs_io').GetNameWithNoTooltip]"
  guelphs_and_ghibellines.2.c: "Ми нічого не будемо змінювати зараз."
  guelphs_and_ghibellines.2.c.tt: "Вибір цього варіанту не змінить нашої вірності."
  guelphs_and_ghibellines.3.title: "Наш вплив у [ShowRegionNameWithNoTooltip('italy_region')]"
  guelphs_and_ghibellines.3.desc: "З часів нашого конфлікту з [GetCharacter('ogk_heinrich_v_salier').GetName] регіон [ShowRegionName('italy_region')] бачив чимало війн та боротьби за панування між [GetUniqueInternationalOrganization('guelphs_io').GetName] та [GetUniqueInternationalOrganization('ghibellines_io').GetName]. Хоча ми сподівалися, що конфлікт закінчиться остаточно з вигнанням [ShowDynastyName('hohenstaufen_dynasty')] з південної [ShowRegionNameWithNoTooltip('italy_region')], [GetUniqueInternationalOrganization('ghibellines_io').GetNameWithNoTooltip] все ще тримаються за свої фортеці та свою безнадійну справу."
  guelphs_and_ghibellines.3.a: "За Віру!"
  guelphs_and_ghibellines.3.a.tt: "Як [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle], нам буде дозволено підтримувати лише сторону [GetUniqueInternationalOrganization('guelphs_io').GetName], оскільки вони підтримують нашу власну справу."
  guelphs_and_ghibellines.4.title: "Тріумф [target_io.GetNameWithNoTooltip]"
  guelphs_and_ghibellines.4.desc: "[target_io.GetName] нарешті досягли повного панування над [rival_io.GetName] і звільнили [ShowRegionName('italy_region')] від тиранії [GetUniqueInternationalOrganization('hre').GetName]. Тепер ми зможемо насолоджуватися нашою новознайденою свободою без іноземного та відірваного від нас володаря."
  guelphs_and_ghibellines.4.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  guelphs_and_ghibellines.4.a.tt: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] зі своєю [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] в [Concept('region', 'CONCEPT_PLACEHOLDER')|e] [ShowRegionName('italy_region')] покине [GetUniqueInternationalOrganization('hre').GetName] і вилучить з неї кожну [Concept('location', 'CONCEPT_PLACEHOLDER')|e], якою вона володіє."
  guelphs_and_ghibellines.5.title: "Розгромна поразка"
  guelphs_and_ghibellines.5.desc: "[rival_io.GetName] рішуче перемогли нас і нав'язали свої вимоги щодо звільнення від зобов'язань перед [GetUniqueInternationalOrganization('hre').GetName]. Ми, [target_io.GetName], не матимемо іншого вибору, окрім як підкоритися їхній волі та знайти своє місце в цій новій [ShowRegionName('italy_region')]."
  guelphs_and_ghibellines.5.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  guelphs_and_ghibellines.6.title: "Перемога [target_io.GetNameWithNoTooltip]"
  guelphs_and_ghibellines.6.desc: "Протягом останніх століть ми підтримували та захищали права [GetUniqueInternationalOrganization('hre').GetName] як законного володаря [ShowRegionName('italy_region')] як гордий член [target_io.GetName]. Тепер [rival_io.GetName] нарешті поступилися своїми мізерними вимогами та схилили коліна під праведним імперським правлінням."
  guelphs_and_ghibellines.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  guelphs_and_ghibellines.6.a.tt: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] зі своєю [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] в [Concept('region', 'CONCEPT_PLACEHOLDER')|e] [ShowRegionName('italy_region')], але не в [ShowAreaName('lazio_area')], [ShowAreaName('campania_area')], [ShowAreaName('apulia_area')], [ShowAreaName('basilicata_area')] та [ShowAreaName('sicily_area')], приєднається до [GetUniqueInternationalOrganization('hre').GetName] та додасть до неї кожну [Concept('location', 'CONCEPT_PLACEHOLDER')|e], якою володіє."
  guelphs_and_ghibellines.7.title: "Розбита мрія"
  guelphs_and_ghibellines.7.desc: "Наша мрія про [ShowRegionName('italy_region')], вільну від п'яти чужоземного імператора на північ від Альп, розбита під кулаком [rival_io.GetName]. Нам доведеться жити зі своїм статусом у [GetUniqueInternationalOrganization('hre').GetName] та прийняти нижчий статус, який їхній лідер призначив для нас."
  guelphs_and_ghibellines.7.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  guelphs_and_ghibellines.8.title: "Затяжний конфлікт"
  guelphs_and_ghibellines.8.desc: "Хоча ми століттями боролися з нашими суперниками, кожен учасник втомився та апатичний перед обличчям патової ситуації, що склалася в [ShowRegionName('italy_region')]. Виснажені армії відмовляються боротися за нашу справу, і подібні історії чути від наших суперників. У цій ситуації, здається, найкращим курсом дій є припинити бойові дії та відновити наші сили, щоб боротися іншого дня."
  guelphs_and_ghibellines.8.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  guelphs_and_ghibellines.8.tt: "Кожен член [GetUniqueInternationalOrganization('guelphs_io').GetName] зі своєю столицею в [ShowRegionName('italy_region')] залишає [GetUniqueInternationalOrganization('hre').GetName] та вилучає з неї всі свої [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]."
  guelphs_and_ghibellines.9.title: "Тиск ситуації"
  guelphs_and_ghibellines.9.desc: "У поточному конфлікті, що триває, ми досі вирішили залишатися нейтральними. Зі зростаючим тиском з боку дипломатів обох сторін, можливо, настав час нам обрати сторону та приєднатися або до [GetUniqueInternationalOrganization('guelphs_io').GetName], або до [GetUniqueInternationalOrganization('ghibellines_io').GetName]."
  guelphs_and_ghibellines.9.a: "Стати на бік [GetUniqueInternationalOrganization('ghibellines_io').GetNameWithNoTooltip]."
  guelphs_and_ghibellines.9.a.tt: "Ми приєднаємося до [GetUniqueInternationalOrganization('ghibellines_io').GetName]"
  guelphs_and_ghibellines.9.b: "Стати на бік [GetUniqueInternationalOrganization('guelphs_io').GetNameWithNoTooltip]."
  guelphs_and_ghibellines.9.b.tt: "Ми приєднаємося до [GetUniqueInternationalOrganization('guelphs_io').GetName]"
  guelphs_and_ghibellines.9.c: "Нейтралітет добре нам послужив."
  guelphs_and_ghibellines.9.c.tt: "Ми не приєднаємося до жодної сторони в поточному конфлікті."
  guelphs_and_ghibellines.10.title: "Кінець $guelphs_io$ та $ghibellines_io$"
  guelphs_and_ghibellines.10.desc: "Нарешті, конфлікт між двома ворогуючими фракціями [GetUniqueInternationalOrganization('guelphs_io').GetName] та [GetUniqueInternationalOrganization('ghibellines_io').GetName] в [ShowRegionName('italy_region')] добіг кінця."
  guelphs_and_ghibellines.10.desc.specific: "$guelphs_and_ghibellines.10.desc$ Попри всі зусилля [loser_io.GetNameWithNoTooltip], об'єднана політична та економічна міць [winner_io.GetNameWithNoTooltip] перевершила їхні амбіції та зуміла здобути панування в [ShowRegionNameWithNoTooltip('italy_region')]."
  guelphs_and_ghibellines.10.a: "Принаймні, деякий мир повертається до [ShowRegionNameWithNoTooltip('italy_region')]."
  guelphs_and_ghibellines.100.title: "[ShowSituationNameWithNoTooltip('guelphs_and_ghibellines')]"
  guelphs_and_ghibellines.100.desc: "З коронацією [target_character.GetName] як наступного [GetUniqueInternationalOrganization('hre').GetLeaderTitle] [GetUniqueInternationalOrganization('hre').GetName], ситуація з [ShowSituationName('guelphs_and_ghibellines')] стала [target_country.GetAdjective] проблемою. [GetUniqueInternationalOrganization('ghibellines_io').GetName], зокрема, підтримує імперську корону та її владу в [ShowRegionName('italy_region')]."
  guelphs_and_ghibellines.100.a: "Ми повинні привести [GetUniqueInternationalOrganization('ghibellines_io').GetNameWithNoTooltip] до перемоги!"
  guelphs_and_ghibellines.100.b: "Справи [ShowRegionNameWithNoTooltip('italy_region')] не є нашою проблемою."
  guelphs_and_ghibellines.100.b.tt: "Ми НЕ зможемо очолити [GetUniqueInternationalOrganization('ghibellines_io').GetName], доки не вийдемо та не приєднаємося до фракції знову"
  guelphs_and_ghibellines.100.c: "Ми поведемо [GetUniqueInternationalOrganization('ghibellines_io').GetNameWithNoTooltip] до перемоги!"
  guelphs_and_ghibellines.1000.title: "[target.GetNameWithNoTooltip]"
  guelphs_and_ghibellines.1000.desc: "Посли з [actor.GetName] звернулися до нас. Вони просять нашої підтримки у їхньому поточному конфлікті [target.GetName] і наполягають на нашому обов'язку приєднатися, оскільки ми є співчленами [target_1.Custom('GetGAGOwnFaction')]."
  guelphs_and_ghibellines.1000.a: "Звісно, ми їм допоможемо."
  guelphs_and_ghibellines.1000.b: "У цьому конфлікті немає чого здобувати."
  guelphs_and_ghibellines.1001.title: "[target_1.GetNameWithNoTooltip] приєднується до нашої Сторони!"
  guelphs_and_ghibellines.1001.desc: "Ми отримали звіт від послів. [target_1.GetName] вирішив приєднатися до нас у [target.GetName] на нашому боці!"
  guelphs_and_ghibellines.1001.a: "За [target_1.Custom('GetGAGOwnFactionWithNoTooltip')]!"
  guelphs_and_ghibellines.1002.title: "[target_1.GetNameWithNoTooltip] відмовляється приєднатися до нашої Сторони"
  guelphs_and_ghibellines.1002.desc: "Ми отримали звіт від послів. [target_1.GetName] відмовився приєднатися до нас у [target.GetName]."
  guelphs_and_ghibellines.1002.a: "Підступні пси!"
  guelphs_and_ghibellines.1100.title: "Імперська підтримка"
  guelphs_and_ghibellines.1100.desc: "Горда [actor.Custom('GetGAGOwnFaction')] вважає себе пов'язаною з [GetUniqueInternationalOrganization('hre').GetName]. Таким чином, ми маємо привілей просити Імперську Підтримку від [target_country.GetName], нинішнього [GetUniqueInternationalOrganization('hre').GetLeaderTitle] Імперії. Але спочатку ми повинні вирішити, який запит ми повинні зробити..."
  guelphs_and_ghibellines.1100.desc.fallback: "Знову ж таки, [actor.Custom('GetGAGOwnFaction')] потребує підтримки. Проте... нічого. І тоді нікого не залишилося."
  guelphs_and_ghibellines.1100.a: "Наші скарбниці гостро потребують підтримки."
  guelphs_and_ghibellines.1100.a.tt: "Ми запросимо [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] від [target_country.GetName] (вони наразі мають #Y [target_country.GetCurrencyValue('gold')]#! і передадуть #G [root_country.MakeScope.GetVariable('gold_to_transfer').GetValue|2]#! нам)"
  guelphs_and_ghibellines.1100.b: "Нам потрібно більше солдатів."
  guelphs_and_ghibellines.1100.b.tt: "Ми запросимо [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] від [target_country.GetName] (вони наразі мають #Y [target_country.GetCurrencyValue('manpower')]#! і передадуть #G [root_country.MakeScope.GetVariable('manpower_to_transfer').GetValue]#! нам)"
  guelphs_and_ghibellines.1100.c: "Дипломатичний союз був би більш ніж бажаним."
  guelphs_and_ghibellines.1100.c.tt: "Ми запросимо [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] від [target_country.GetName]"
  guelphs_and_ghibellines.1100.zzz: "З іншого боку..."
  guelphs_and_ghibellines.1100.zzz.at: "Ми нічого не проситимемо від [target_country.GetName]"
  guelphs_and_ghibellines.1100.zzz.bt: "Час, необхідний для виконання [Concept('situation_action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('ghibellines_petition_for_imperial_support')], скорочується до #Y 1 року#!"
  guelphs_and_ghibellines.1101.title: "[root_country.GetNameWithNoTooltip] Запитує Імперську Підтримку"
  guelphs_and_ghibellines.1101.title.fallback: "Імперський Запит"
  guelphs_and_ghibellines.1101.desc.gold: "$guelphs_and_ghibellines.1101.desc$ Вони бажають додаткового золота за їхні зусилля проти [root_country.Custom('GetGAGEnemyFaction')]."
  guelphs_and_ghibellines.1101.desc.manpower: "$guelphs_and_ghibellines.1101.desc$ Вони бажають додаткових вояків для їхніх конфліктів проти [root_country.Custom('GetGAGEnemyFaction')]."
  guelphs_and_ghibellines.1101.desc.alliance: "$guelphs_and_ghibellines.1101.desc$ Вони бажають дипломатичного союзу, щоб підірвати [root_country.Custom('GetGAGEnemyFaction')]."
  guelphs_and_ghibellines.1101.desc: "Держава [root_country.GetLongName], могутній член [root_country.Custom('GetGAGOwnFaction')], просить нашої підтримки."
  guelphs_and_ghibellines.1101.a: "Розумний запит."
  guelphs_and_ghibellines.1101.b: "Ми нічого не виграємо від допомоги їм."
  guelphs_and_ghibellines.1102.title: "Імперська Підтримка"
  guelphs_and_ghibellines.1102.desc.gold: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] погоджується з нашим бажанням і надіслав нам підтримку від [GetUniqueInternationalOrganization('hre').GetName] у вигляді безцінного золота!"
  guelphs_and_ghibellines.1102.desc.manpower: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] погоджується з нашим бажанням і надіслав нам підтримку від [GetUniqueInternationalOrganization('hre').GetName] у вигляді вояків для зміцнення наших військ!"
  guelphs_and_ghibellines.1102.desc.alliance: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] погоджується з нашим дипломатичним ходом і підписав союз з нами!"
  guelphs_and_ghibellines.1102.desc: "Добрі вісті з [target_country.GetName] дійшли до нашого двору!"
  guelphs_and_ghibellines.1102.a: "Воістину чудові вісті!"
  guelphs_and_ghibellines.1103.title: "Імперська Підтримка"
  guelphs_and_ghibellines.1103.desc: "Вісті з [target_country.GetName] дійшли до нас. Попри нашу вірність [GetUniqueInternationalOrganization('hre').GetName], наше благання про Імперську Підтримку зустріло лише глухі вуха..."
  guelphs_and_ghibellines.1103.a: "Це заплямує нашу вірність на роки вперед..."