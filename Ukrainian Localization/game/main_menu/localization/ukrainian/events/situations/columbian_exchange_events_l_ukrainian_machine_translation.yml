l_english:
  columbian_exchange.1.title: "Колумбів обмін"
  columbian_exchange.1.desc: "Наші дослідники повідомляють нам, що вони вступили в контакт з дивними новими людьми, які стверджують, що прибули з-за океану, вони носять дивний одяг і мають дивну зброю.\n\nВони пропонують нам обміняти свої екзотичні предмети в обмін на провідництво нашою землею та будь-які дорогоцінні металеві предмети, які носять наші люди."
  columbian_exchange.1.descB: "Наші дослідники повідомляють нам, що під час дослідження [ShowContinentName('america')] вони вступили в контакт з дивними новими людьми.\n\nВони здаються неосвіченими та нецивілізованими, але вирощують багато дивних культур і розводять невідомих тварин. Будь-що з цього може виявитися дуже прибутковим вдома, якщо належним чином представити це нашим людям."
  columbian_exchange.1.historical_info: "Колумбів обмін був історичною подією, що відбулася у 15-му та 16-му століттях, коли Старий Світ і Новий Світ вперше вступили в контакт. Цей період був відзначений обміном людьми, рослинами, тваринами та ідеями між двома півкулями, що призвело до значних змін на обох континентах.\n\nУ Європі поява нових культур, таких як кукурудза, картопля та помідори, допомогла прогодувати зростаюче населення, тоді як тютюн і какао стали популярними товарами. Тим часом, запровадження нових хвороб в Америці мало руйнівний вплив на корінне населення, яке не мало імунітету до таких хвороб, як віспа та грип."
  columbian_exchange.1.a: "Цей обмін буде корисним для всіх."