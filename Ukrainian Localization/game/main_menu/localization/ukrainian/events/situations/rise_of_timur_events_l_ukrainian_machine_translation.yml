l_english:
  rise_of_timur.1.title: "[ShowSituationNameWithNoTooltip('rise_of_timur')]"
  rise_of_timur.1.desc: "Керований амбіціями перевершити занепалі Халіфати та відновити велику [GetCountry('MGE').GetLongName], [target_character.GetName] з жменькою вірних воїнів заклав основу [GetCountry('TIM').GetLongName]. Хоча наразі здається незначним, [GetCountry('TIM').GetGovernment.GetRulerTitle] має намір використати [target_character.GetHerHis] неперевершене розуміння військової справи та [target_character.GetHerHis] елітні війська, щоб розширити [GetCountry('TIM').GetFlavorRank] з безжальною ефективністю..."
  rise_of_timur.1.a: "Завойовувати означає жити!"
  rise_of_timur.2.title: "[ShowSituationNameWithNoTooltip('rise_of_timur')]"
  rise_of_timur.2.a: "Їх треба зупинити!"
  rise_of_timur.3.title: "Падіння [tim_country.GetNameWithNoTooltip]"
  rise_of_timur.3.desc.dead_timur: "$rise_of_timur.3.desc$ З моменту смерті [target_character.GetName], [tim_country.GetAdjectiveWithNoTooltip] армія втратила свою перевагу над ворогами. $rise_of_timur.3.desc.end$"
  rise_of_timur.3.desc.alive_timur: "$rise_of_timur.3.desc$ Навіть могутній [target_character.GetName] не зміг запобігти його падінню. Із захопленням [target_location.GetName], [target_character.GetNameWithNoTooltip] було схоплено та швидко віддано мечу, щоб раз і назавжди покласти край [tim_country.GetAdjectiveWithNoTooltip] загрозі. $rise_of_timur.3.desc.end$"
  rise_of_timur.3.desc: "Колись жахливий бич [ShowSubContinentName('central_asia')], горезвісний [tim_country.GetLongName] більше не існує!"
  rise_of_timur.3.desc.end: "З часом зовнішні сили, а також військові кампанії [target_country.GetName] проти [tim_country.GetNameWithNoTooltip] звели [tim_country.GetFlavorRank] до залишкової держави, доки вона зрештою не впала від рук [target_country.GetLongNameWithNoTooltip]."
  rise_of_timur.3.a: "Нарешті кінець [target_character.GetHerHis] кровожерливості."
  rise_of_timur.4.title: "Падіння [tim_country.GetNameWithNoTooltip]"
  rise_of_timur.4.desc.dead_timur: "$rise_of_timur.3.desc.dead_timur$"
  rise_of_timur.4.desc.alive_timur: "$rise_of_timur.3.desc.alive_timur$"
  rise_of_timur.4.desc: "$rise_of_timur.3.desc$"
  rise_of_timur.4.a: "Сподіваємося, [target_country.GetNameWithNoTooltip] не перетвориться на нову загрозу..."
  remove_all_timmy_cbs_tt: "[GetCountry('TIM').GetName] втрачає [ShowCasusBelliName('cb_timurs_conquests')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e]"
  rise_of_timur.5.title: "Підкорення [GetCountry('TIM').GetNameWithNoTooltip]"
  rise_of_timur.5.desc.dead_timur: "$rise_of_timur.5.desc$ Відколи [target_character.GetName] спіткала [target_character.GetHerHis] передчасна загибель, [target_character.GetHerHis] наступники не змогли протистояти численним ворогам, яких [target_character.GetNameWithNoTooltip] нажив.$rise_of_timur.5.desc.end$"
  rise_of_timur.5.desc.alive_timur: "$rise_of_timur.5.desc$ Попри [target_character.GetHerHis] найкращі зусилля та блискучу тактику, численні вороги, яких [target_character.GetName] нажив під час [target_character.GetHerHis] кампаній, були надто численними, щоб з ними впоратися. Нарешті, [ROOT.GetCountry.GetNameWithNoTooltip] підкорило [GetCountry('TIM').GetFlavorRank], убивши [target_character.GetNameWithNoTooltip] у процесі.$rise_of_timur.5.desc.end$"
  rise_of_timur.5.desc: "Хоча колись грізний [GetCountry('TIM').GetFlavorRank], що тримав у страху всіх своїх сусідів, нікчемний [GetCountry('TIM').GetLongName] став не більше ніж простим підданим [ROOT.GetCountry.GetName]."
  rise_of_timur.5.desc.end: "\n\nТепер [GetCountry('TIM').GetAdjective] схиляють коліна перед [ROOT.GetCountry.GetLongNameWithNoTooltip], поклавши край загрозі, яку [GetCountry('TIM').GetAdjectiveWithNoTooltip] становили, раз і назавжди."
  rise_of_timur.5.a: "Нарешті кінець [target_character.GetHerHis] кровожерливості."
  rise_of_timur.6.title: "Підкорення [GetCountry('TIM').GetNameWithNoTooltip]"
  rise_of_timur.6.desc.dead_timur: "$rise_of_timur.5.desc.dead_timur$"
  rise_of_timur.6.desc.alive_timur: "$rise_of_timur.5.desc.alive_timur$"
  rise_of_timur.6.desc: "$rise_of_timur.5.desc$"
  rise_of_timur.6.a: "Сподіваймося, [GetCountry('TIM').GetNameWithNoTooltip] не перетвориться на нову загрозу..."
  rise_of_timur.7.title: "Застій [tim_country.GetLongNameWithNoTooltip]"
  rise_of_timur_7_desc_common: "Метеоритний злет і швидке розширення [tim_country.GetLongName] здавалися нестримними, але нещодавно, схоже, вони зупинилися. Лідерство [target_character.GetName], схоже, не має рівних, оскільки"
  rise_of_timur.7.desc_ruler: "$rise_of_timur_7_desc_common$ [target_ruler.GetName] явно не зміг(ла) заповнити місце свого попередника. [target_ruler.GetHerHis|U] нездатність виправдати очікування [target_ruler.GetHerHis|U] народу призвела до $rise_of_timur.7.desc_end$"
  rise_of_timur.7.desc: "$rise_of_timur_7_desc_common$ ніхто не може заповнити місце [target_character.GetHerHis] і піднятися до керівництва [ROOT.GetCountry.GetFlavorRank]. Таким чином, ситуація призвела до $rise_of_timur.7.desc_end$"
  rise_of_timur.7.desc_end: "вся країна розвалилася сама на себе і вступила в період застою, коли [tim_country.GetGovernment.GetCourtTitle] насправді мало чого досягає."
  rise_of_timur.7.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  rise_of_timur.8.title: "$rise_of_timur.7.title$"
  rise_of_timur.8.desc: "Нашому народу більше не доведеться боятися експансії та кровопролиття [tim_country.GetLongName]. Дні метеоритного злету [target_character.GetName] вже в минулому, оскільки ніхто, схоже, не зміг заповнити місце [target_character.GetHerHis] і піднятися до ефективного керівництва [tim_country.GetFlavorRank]. Тепер вони просто безцільно блукають без військово-стратегічного бачення свого попередника, і таким чином це призвело до $rise_of_timur.7.desc_end$"
  rise_of_timur.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  rise_of_timur.9.title: "Відновлення [GetCountry('MGE').GetLongNameWithNoTooltip]"
  rise_of_timur.9.desc: "Багато хто вважав, що славні дні великого $genghis_khan_name$ та його світорозширювального [GetCountry('MGE').GetLongName] залишилися в минулому. Однак мрії [target_character.GetName] про його відродження стали реальністю, оскільки нам вдалося возз'єднати території Великого $rank_empire_horde_ruler_suffix_male$, і ми можемо проголосити відродження нового великого [GetCountry('MGE').GetLongNameWithNoTooltip]."
  rise_of_timur.9.a: "Слава нам!"
  rise_of_timur.10.title: "Відновлення [GetCountry('MGE').GetLongNameWithNoTooltip]"
  rise_of_timur.10.desc: "Століття тому $genghis_khan_name$ зумів завоювати півсвіту, розширюючи свою імперію. Тепер [target_character.GetName] пішов(ла) стопами свого попередника і зумів(ла) створити імперію, яка розширилася до тих самих меж, що й імперія Великого $rank_empire_horde_ruler_suffix_male$. Світ знову стане свідком завоювань новонародженого [GetCountry('MGE').GetLongName]."
  rise_of_timur.10.a: "Чи зможе світ пережити це вдруге?"
  rise_of_timur.11.title: "[ShowSituationNameWithNoTooltip('fall_of_delhi')]"
  rise_of_timur.11.desc: "$india$ завжди була джерелом багатств і культури для всього світу. Багато завойовників минулого намагалися здобути її багатства, підкоривши її, але всі зазнали невдачі. [target_character.GetName] також мав(ла) свої погляди на $india$ для [target_character.GetHerHis] розширювального [ROOT.GetCountry.GetLongName], і нам вдалося здійснити ці мрії тепер, коли [GetCountry('DLH').GetName] втратив(ла) своє попереднє видатне становище на субконтиненті. Наше завоювання [ShowLocationName('delhi')] стане ще одним кроком на нашому шляху до безсмертної слави."
  rise_of_timur.11.a: "Вся $india$ схилиться перед нами!"
  rise_of_timur.12.title: "Багатства $china$"
  rise_of_timur.12.desc: "$china$ була центром світу в [ShowContinentName('asia')] з давніх-давен. Вона підкорилася владі великого $genghis_khan_name$ та його нащадка [GetCharacter('kublai_khan').GetName], але, схоже, знову переживає період боротьби. Нащадки $genghis_khan_name_no_tooltip$ більше не поширюють свою територію на весь $china$, і тому вона відкрита для завоювання новим великим завойовником під нашим прапором."
  rise_of_timur.12.a: "$china$ впаде перед нами."
  rise_of_timur.13.title: "Наша спадщина"
  rise_of_timur.13.desc: "Піднесення [target_character.GetName] від простого полководця до правителя [ROOT.GetCountry.GetLongName] та [target_character.GetHerHis] подальше розширення [ROOT.GetCountry.GetFlavorRank] є беззаперечним. Однак дехто може поставити під сумнів обґрунтованість [target_character.GetHerHis] претензій на легітимне правління, окрім суто військової могутності. [target_character.GetSheHe|U] не міг претендувати на титул $rank_empire_muslim_ruler_male$, але є інші способи, якими [target_character.GetSheHe] може обґрунтувати походження [target_character.GetHerHis] влади."
  rise_of_timur.13.a: "[target_character.GetHerHis|U] завоювання були призначені [ROOT.GetCountry.GetReligion.GetGodName] як Сахіб Кіран."
  rise_of_timur.13.b: "[target_character.GetNameWithNoTooltip] є спадкоємцем $genghis_khan_name_no_tooltip$."
  rise_of_timur.13.c: "[target_character.GetNameWithNoTooltip] є [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  rise_of_timur.14.title: "Завоювання [ShowRegionNameWithNoTooltip('persia_region')]"
  rise_of_timur.14.desc: "[ShowRegionName('persia_region')] століттями була центром [ShowReligionGroupAdjective('muslim')] світу, слугуючи мостом між [ShowContinentName('europe')] та [ShowContinentName('asia')]. Багато імперій поставали і падали на цих землях, і тепер наша велика [ROOT.GetCountry.GetLongName] знову стоїть на її порозі. Вони не зможуть встояти перед нашими нестримними арміями, бо наша доля — панувати над цими землями."
  rise_of_timur.14.a: "[ShowRegionNameWithNoTooltip('persia_region')] схилиться перед нами."
  rise_of_timur.14.a.tt: "Отримати [ShowCasusBelliName('cb_timurs_conquests')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] на кожну [Concept('country', 'CONCEPT_PLACEHOLDER')|e] зі столицею в [ShowRegionName('persia_region')]"
  rise_of_timur.15.title: "Завоювання [ShowRegionNameWithNoTooltip('anatolia_region')]"
  rise_of_timur.15.desc: "[ShowCultureGroupName('turkic_group')] народи пройшли довгий шлях з моменту виходу з азійських степів. Століття тому деякі з [ShowCultureGroupNameWithNoTooltip('turkic_group')] груп у формі Сельджуцької імперії домінували на землях [ShowRegionName('persia_region')] і глибоко проникли на [GetCountry('BYZ').GetAdjective] територію [ShowRegionName('anatolia_region')]. Тепер настала черга народу [ShowRegionNameWithNoTooltip('anatolia_region')] знову об'єднатися під новим великим [ShowCultureGroupNameWithNoTooltip('turkic_group')] [ROOT.GetCountry.GetFlavorRank]."
  rise_of_timur.15.a: "[ShowRegionNameWithNoTooltip('anatolia_region')] схилиться перед нами."
  rise_of_timur.100.title: "Набіги в [target_country.GetNameWithNoTooltip]"
  rise_of_timur.100.title.generic: "Набіги на чужі землі"
  rise_of_timur.100.desc: "Чоловіки стають неспокійними. Остання кампанія [target_character.GetName] закінчилася більше року тому, і [root_country.GetAdjective] воїни прагнуть, щоб повітря знову наповнилося звуками битви. Прагнучи знову вступити в бій, ці солдати організувалися в загони, які регулярно грабують сільську місцевість [target_country.GetName]. Хоча їхні дії були несанкціонованими, землі [target_country.GetNameWithNoTooltip] продемонстрували слабкість [target_country.GetCulture.GetName] народу. Їхні багатства та території готові до захоплення!"
  rise_of_timur.100.a: "[target_country.GetNameWithNoTooltip] паде!"
  rise_of_timur.100.b: "Ми ще не можемо дозволити собі вторгнення в [target_country.GetNameWithNoTooltip]."
  rise_of_timur.101.title: "Культурний розвиток [target_country.GetNameWithNoTooltip]"
  rise_of_timur.101.title.generic: "Культурний розвиток"
  rise_of_timur.101.desc: "Хоча наш [target_country.GetFlavorRank] побудований на завоюваннях та військових кампаніях, [target_character.GetName] дуже любить культурні аспекти держави. Багато культурних цінностей потрапили до [target_country.GetName] як військові трофеї, що демонструє нашу військову міць і слугує натхненням для нашого народу."
  rise_of_timur.101.a: "Вони можуть допомогти нам покращити нашу репутацію."
  rise_of_timur.101.b: "Вони є ознакою наших військових досягнень."
  rise_of_timur.101.c: "Нехай наша культура процвітає."
  rise_of_timur.102.title: "Чоловіки стікаються до армій [target_character.GetShortNameWithNoTooltip]"
  rise_of_timur.102.title.generic: "Чоловіки стікаються до наших армій"
  rise_of_timur.102.desc: "Військові кампанії [target_character.GetName] приваблюють велику кількість здібних чоловіків, які шукають багатства від військових трофеїв. Цього року, зокрема, спостерігається значна кількість нових рекрутів з різних верств суспільства, які приєднуються до [target_country.GetAdjective] армій."
  rise_of_timur.102.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  rise_of_timur.1000.title: "[target_country.GetAdjectiveWithNoTooltip]-[from_country.GetAdjectiveWithNoTooltip] Альянс"
  rise_of_timur.1000.title.generic: "Альянс Орд"
  rise_of_timur.1000.desc: "[target_country.GetLongName] та його володар, [target_character.GetName], є нащадками спадщини $genghis_khan_name$. Оскільки [from_character.GetName] заявляє про кровні зв'язки з великим полководцем, не дивно, що обидва наші володіння поділяють зв'язок, який міг би слугувати основою для вигідного альянсу."
  rise_of_timur.1000.a: "Звернутися до [target_character.GetNameWithNoTooltip]."
  rise_of_timur.1000.a.tt: "Ми запросимо [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] у [target_country.GetName]"
  rise_of_timur.1000.b: "Такий альянс нам не принесе користі."
  rise_of_timur.1000.b.tt: "Ми не будемо обтяжувати себе такими, як [target_country.GetLongNameWithNoTooltip]"
  rise_of_timur.1001.title: "[from_character.GetNameWithNoTooltip] просить про альянс"
  rise_of_timur.1001.desc: "Звістки з [from_country.GetName] дійшли до [target_character.GetName]. Здається, [from_character.GetName], посилаючись на наше спільне походження з родини [GetDynasty('borjigin_dynasty').GetName], бажає альянсу між нашими двома володіннями."
  rise_of_timur.1001.a: "[target_character.GetShortNameWithNoTooltip] виглядає досить багатообіцяюче..."
  rise_of_timur.1001.b: "[target_character.GetSheHe|U] навіть не є дитиною $genghis_khan_name_no_tooltip$!"
  rise_of_timur.1001.b.tt: "Ми відхилимо пропозицію [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] від [from_country.GetName]"
  rise_of_timur.1002.title: "Альянс прийнято"
  rise_of_timur.1002.desc: "Звістки з [target_country.GetName] дійшли до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Здається, [target_character.GetName] має достатньо проникливості, щоб визнати військову доблесть [from_character.GetName], і прийняв нашу пропозицію альянсу."
  rise_of_timur.1002.a: "Воістину мудрий вибір."
  rise_of_timur.1003.title: "Альянс відхилено"
  rise_of_timur.1003.desc: "Звістки з [target_country.GetName] дійшли до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Здається, [target_character.GetName] не здатен розпізнати геніальність навіть у її найочевиднішому прояві. Заявляючи, що [from_character.GetName] не є справжнім спадкоємцем $genghis_khan_name$, [target_character.GetSheHe] відхилив нашу пропозицію альянсу."
  rise_of_timur.1003.a: "Тоді вони зустрінуть свій кінець на полі бою."
  rise_of_timur.1010.title: "[from_country.GetAdjectiveWithNoTooltip]-[target_country.GetAdjectiveWithNoTooltip] Конфлікти"
  rise_of_timur.1010.title.generic: "Крихкий альянс"
  rise_of_timur.1010.desc: "У той час як наше володіння йде шляхом зростання та експансії, наш союзник, [target_country.GetLongName], демонструє лише занепад. Наш альянс з [target_character.GetName] все частіше ставиться під сумнів вірними послідовниками [from_character.GetName], оскільки ми отримуємо мало вигоди від збереження наших зв'язків з ними..."
  rise_of_timur.1010.a: "Настав час анулювати наші договори."
  rise_of_timur.1010.b: "Вони все ще корисніші як наш союзник."
  rise_of_timur.1011.title: "Зрада [from_character.GetShortNameWithNoTooltip]"
  rise_of_timur.1011.desc: "Надійшли новини з [from_country.GetName]: мерзенний зрадник, [from_character.GetName], розірвав наш союз і приготував [from_character.GetHerHis] війська для вторгнення на нашу землю!"
  rise_of_timur.1011.a: "Ці мерзенні зрадники..."
  rise_of_timur.1020.title: "Туркомани [ShowRegionNameWithNoTooltip('anatolia_region')]"
  rise_of_timur.1020.desc: "[ShowCultureGroupName('turkic_group')] Сельджуцька імперія давнини зуміла об'єднати не лише [ShowCultureGroupNameWithNoTooltip('turkic_group')] та [ShowCultureGroupName('iranian_group')] народи [ShowRegionName('persia_region')], але й поширила свій вплив на землі [ShowRegionName('anatolia_region')], де досі проживає багато [ShowCultureGroupNameWithNoTooltip('turkic_group')] людей. Так само війська $genghis_khan_name$ та його нащадків з $ilkhanate$ поширили свій вплив на півострів. Розширивши наш вплив над ними, ми можемо відновити славу тих імперій."
  rise_of_timur.1020.a: "Спадщина тих імперій лежить на нас!"
  rise_of_timur.1020.a.tt: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] зі столицею в [ShowRegionName('anatolia_region')], яка межує з нами або з будь-яким з наших [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e], отримує можливість стати [ShowSubjectTypeName('vassal')] [from_country.GetName]"
  rise_of_timur.1020.b: "[ROOT.GetCountry.GetLongNameWithNoTooltip] не схожа на ті невдалі імперії."
  rise_of_timur.1020.b.tt: "Отримайте [ShowCasusBelliName('cb_timurs_conquests')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] на кожну [Concept('country', 'CONCEPT_PLACEHOLDER')|e] зі столицею в [ShowRegionName('anatolia_region')]"
  rise_of_timur.1021.title: "Пропозиція [from_country.GetNameWithNoTooltip]"
  rise_of_timur.1021.desc: "Експансія та військова міць [from_country.GetLongName] незаперечні. Тепер, коли вони почали поширювати свої щупальця на [ShowRegionName('anatolia_region')], вони звернулися до нас з пропозицією. Вони пропонують нам можливість добровільно схилити коліна перед ними і стати одним з їхніх підданих. Якщо ми відмовимося, зрозуміло, що вони вдадуться до інших засобів, щоб забезпечити своє панування над нашою територією."
  rise_of_timur.1021.a: "Ми схилимо коліна."
  rise_of_timur.1021.b: "Вони можуть прийти, щоб висунути свої вимоги на полі бою."
  rise_of_timur.1022.title: "[target_country.GetNameWithNoTooltip] Приймає Нашу Пропозицію Васалізації"
  rise_of_timur.1022.desc: "Виявивши великий здоровий глузд, [target_country.GetLongName] вирішили прийняти нашу пропозицію і присягнути нам на вірність. Завдяки цьому наш вплив у [ShowRegionName('anatolia_region')] зріс, а наша законна претензія на цю територію зміцніла."
  rise_of_timur.1022.a: "Вони обрали мудро."
  rise_of_timur.1023.title: "[target_country.GetNameWithNoTooltip] Відмовляється Від Нашої Пропозиції Васалізації"
  rise_of_timur.1023.desc: "Дурні люди [target_country.GetName] не змогли зрозуміти розуму і натомість відмовилися від нашої щедрої пропозиції васалізації. Цим вони відкрито протиставили себе нам і змусили нас зустрітися з ними на полі бою."
  rise_of_timur.1023.a: "Вони обрали погано."
  rise_of_timur.1030.title: "[target_country.GetAdjectiveWithNoTooltip] Опозиція"
  rise_of_timur.1030.title.generic: "Опозиція в Анатолії"
  rise_of_timur.1030.desc: "Слава нашої великої [ROOT.GetCountry.GetLongName] незаперечна, і наше право панувати над усіма землями [ShowRegionName('anatolia_region')] має бути беззаперечним. Однак дурні люди [target_country.GetName] чинять опір у своїй боротьбі та своїй необґрунтованій претензії бути найсильнішими [ShowCultureGroupName('turkic_group')] у регіоні. Зрозуміло, що нам доведеться поставити їх на місце і дати їм знати, хто є справжнім [ShowCultureGroupNameWithNoTooltip('turkic_group')]."
  rise_of_timur.1030.a: "Скажіть їм, хто тут головний!"
  rise_of_timur.1030.a.at: "Ми висуваємо суворі вимоги до [Concept('target_country.GetName], які призведуть до [war', 'CONCEPT_PLACEHOLDER')|e], якщо вони не погодяться\nМи висуваємо такі вимоги до [target_country.GetName]:"
  rise_of_timur.1030.b: "[ShowRegionNameWithNoTooltip('anatolia_region')] достатньо велика для нас обох."
  timurs_demands_at: "Усі [Concept('target_country.GetAdjective] [subjects', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('anatolia_region')] стають [ShowSubjectTypeName('tributary')] [from_country.GetName]"
  rise_of_timur.1031.title: "[from_country.GetAdjectiveWithNoTooltip] Загроза"
  rise_of_timur.1031.desc: "Експансія [from_country.GetName] здається нестримною, і тепер вони стукають у наші двері. Їхні амбіції поширюються на весь регіон [ShowRegionName('anatolia_region')], і вони, схоже, не переймаються труднощами, з якими ми самі стикалися, щоб стати найвидатнішою [ShowCultureGroupName('turkic_group')] силою в регіоні, оскільки вони хочуть привласнити цей титул собі. Якщо ми не приєднаємося до них і не поступимося їм своїм місцем, вони, безсумнівно, спробують нав'язати це своєю військовою міццю."
  rise_of_timur.1031.a: "У наших інтересах підкоритися."
  rise_of_timur.1031.a.tt: "Якщо ми схилимо коліно, [from_country.GetName] нав'яже нам наступне:"
  rise_of_timur.1031.b: "Їхня пихатість не знає меж."
  rise_of_timur.1032.title: "[target_country.GetNameWithNoTooltip] Підкоритися"
  rise_of_timur.1032.desc: "Мудрі люди [target_country.GetName] побачили помилку у своїх діях і визнали нас наймогутнішою [ShowCultureGroupName('turkic_group')] [ROOT.GetCountry.GetFlavorRank] у [ShowRegionName('anatolia_region')]. Таким чином, вони вирішили підкоритися нашому великодушному правлінню і пообіцяли слідувати нашим інтересам."
  rise_of_timur.1032.a: "Мудре рішення."
  rise_of_timur.1033.title: "[target_country.GetNameWithNoTooltip] Обрали Війну"
  rise_of_timur.1033.desc: "Дурні з [target_country.GetName] не змогли побачити свою очевидну неповноцінність перед міццю нашого славетного [ROOT.GetCountry.GetFlavorRank]. Вони вірять, що мають шанс протистояти нам, і вирішили відмовитися від нашої милостивої пропозиції та готують свої армії, щоб зустріти нас на полі бою. Ми повинні будемо силою показати їм помилковість їхніх шляхів."
  rise_of_timur.1033.a: "Отже, війна."
  rise_of_timur.1040.title: "Захоплення [target_character.GetNameWithNoTooltip]"
  rise_of_timur.1040.title.generic: "Велике Захоплення"
  rise_of_timur.1040.desc: "[target_character.GetName], [target_country.GetGovernment.GetRulerTitle] великої [target_country.GetLongName] був захоплений у [target_location.GetName]. [target_character.GetHerHis|U] володіння, можливо, і було господарем [ShowRegionName('anatolia_region')], але воно не могло зрівнятися з тактичним генієм [from_character.GetName] та [from_country.GetAdjective] силами. Колись впливовий [target_country.GetGovernment.GetRulerTitle] тепер слугуватиме сувеніром для [from_character.GetShortNameWithNoTitle] у [from_character.GetHerHis] [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  rise_of_timur.1040.desc.historical_info: "У 1398 році Баязид «Блискавка» I вперше вступив у конфлікт з Імперією Тимуридів, коли завоював Емірат Джанік і порушив угоду з турко-монгольським еміром Тимуром. Після кількох місяців обміну словесними ударами у вигляді образливих листів, сили Баязида і Тимура зіткнулися один з одним у доленосній битві при Анкарі 1402 року. Незважаючи на гучні військові досягнення султана в минулому, битва проти Тимура закінчилася фатальною поразкою, що призвело до його полону та Османського міжцарів'я."
  rise_of_timur.1040.a: "[target_country.GetGovernment.GetRulerTitle] стане чудовими меблями."
  rise_of_timur.1041.title: "Захоплення [target_character.GetNameWithNoTooltip]"
  rise_of_timur.1041.desc: "Падіння [target_location.GetName] від рук [from_country.GetLongName] є не лише трагедією для людей, що там живуть, але й для всієї [target_country.GetLongName]. [target_character.GetName] був захоплений [from_character.GetName] і ув'язнений у [from_country.GetAdjectiveWithNoTooltip] [from_country.GetGovernment.GetCourtTitle]!"
  rise_of_timur.1041.a: "Це катастрофа!"