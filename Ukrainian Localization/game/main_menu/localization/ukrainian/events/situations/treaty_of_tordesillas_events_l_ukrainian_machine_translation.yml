l_english:
  treaty_of_tordesillas.1.common_phrase: "конкурент за найкращі землі та гавані узбережжя [ShowContinentName('america')].\n\nЯкщо нічого не буде зроблено, ситуація неминуче призведе до конфлікту між нашими країнами, оскільки обидві прагнуть отримати найкращі торговельні шляхи та ресурси."
  treaty_of_tordesillas.1.title: "Наша частка світу"
  treaty_of_tordesillas.1.desc: "Наше розширення на нові землі [target_location.GetName] не залишилося непоміченим народом [other_country_scope.GetLongName]. Вони також розширюють свої володіння в [other_country_colony_scope.GetName] і швидко стають $treaty_of_tordesillas.1.common_phrase$ Натомість ми могли б провести зустріч, де дипломати та державні діячі зможуть розробити рішення, яке справедливо розділить нові землі та задовольнить обидві сторони."
  treaty_of_tordesillas.1.historical_info: "Тордесільяський договір був підписаний 7 червня 1494 року в кастильському місті Тордесільяс дипломатами Ізабелли I Кастильської, Фердинанда II Арагонського та короля Жуана II Португальського. Ця угода розділила нововідкриті землі Нового Світу та води Атлантичного океану уявною лінією за 370 миль на захід від Кабо-Верде, щоб уникнути конфлікту між обома фракціями.\n\nЦей договір визначав території на захід від лінії як такі, що по праву належать Кастилії, а землі на схід від неї — Португалії, незважаючи на будь-які корінні народи, що вже жили на них."
  treaty_of_tordesillas.1.a: "[capital_scope.GetNameWithNoTooltip] — найкраще місце для зустрічі."
  treaty_of_tordesillas.1.b: "Ми поїдемо до їхньої столиці, [other_capital_scope.GetNameWithNoTooltip]."
  treaty_of_tordesillas.1.c: "[random_location_scope.GetNameWithNoTooltip] було б найкраще."
  treaty_of_tordesillas.1.d: "Ми обираємо американське поселення, [american_location_scope.GetNameWithNoTooltip]."
  treaty_of_tordesillas.1.e: "[border_location_scope.GetNameWithNoTooltip] буде найзручнішим."
  treaty_of_tordesillas.2.desc: "Наше розширення на нові землі [other_country_colony_scope.GetName] не залишилося непоміченим народом [first_country_scope.GetLongName]. Вони також розширюють свої володіння в [target_location.GetName] і швидко стають $treaty_of_tordesillas.1.common_phrase$ Натомість вони пропонують провести зустріч у [chosen_location_scope.GetName], де дипломати та державні діячі зможуть розробити рішення, яке справедливо розділить нові землі та задовольнить обидві сторони."
  treaty_of_tordesillas.2.a: "Ми приєднаємося до цієї зустрічі."
  treaty_of_tordesillas.2.a.tt: "Усі [ShowReligionAdjective('catholic')] країни почують про це."
  treaty_of_tordesillas.3.title: "[GetSituationByKey('treaty_of_tordesillas').GetNameWithNoTooltip]"
  treaty_of_tordesillas.3.desc: "Після тривалих обговорень у [chosen_location_scope.GetRank.GetName] [chosen_location_scope.GetName] було підписано нову угоду між [first_country_scope.GetLongName] та [other_country_scope.GetLongName], яка встановила правила поділу нововідкритих земель на континенті [ShowContinentName('america')].\n\nЦя угода, надалі відома як [GetSituationByKey('treaty_of_tordesillas').GetName], окреслює процес претендування на величезні ділянки нової території та призначає [GetInternationalOrganization('catholic_church').GetLeaderTitle] посередником і гарантом у будь-яких суперечках, що можуть виникнути."
  treaty_of_tordesillas.3.a: "Чому нам відмовляють у праві керувати тим, що ми відкриваємо?"
  treaty_of_tordesillas.3.b: "Нам байдуже до їхніх справ за морем."
  treaty_of_tordesillas.3.c: "Світ наш, щоб його завойовувати!"
  treaty_of_tordesillas.4.title: "Кінець $treaty_of_tordesillas$"
  treaty_of_tordesillas.4.desc: "Як це завжди буває зі старими та суперечливими законами, поєднання застарілих постанов та відсутності примусу перетворило колись могутній [GetSituationByKey('treaty_of_tordesillas').GetName] на стос безглуздих паперів.\n\nНа розчарування [first_country_scope.GetLongName] та [other_country_scope.GetLongName], підписантів договору, їхні минулі зобов'язання більше не мають жодної сили, оскільки навіть їхні власні колонії вважають його обмежувальним та ігнорують його настільки, наскільки це можливо."
  treaty_of_tordesillas.4.a: "Настав час розширюватися!"
  treaty_of_tordesillas.4.b: "Ми ніколи не були пов'язані тим тиранічним договором."
  treaty_of_tordesillas.4.c: "Неважливо, нові договори можуть бути підписані після нього."
  treaty_of_tordesillas.4.d: "Нам більше немає в ньому потреби."
  treaty_of_tordesillas.5.title: "[actor.GetAdjective] Вимога"
  treaty_of_tordesillas.5.desc: "Дипломат з [actor.GetLongName] приніс нам обурливу вимогу. Вони стверджують, що $treaty_of_tordesillas$ дає їм право колонізувати та керувати провінцією [selected_province.GetName], навіть якщо ці землі зараз перебувають під нашим контролем.\n\nВони рішуче вимагають, щоб ми негайно передали їм наші володіння в [selected_province.GetNameWithNoTooltip] або зіткнулися з наслідками."
  treaty_of_tordesillas.5.a: "Ми зі жалем погодимося на їхні вимоги."
  treaty_of_tordesillas.5.b: "Ми не приймемо їхній тиранічний ультиматум."
  treaty_of_tordesillas.5.c: "Надіслати повідомлення до [overlord.GetName], настав час їм прийти нам на допомогу."
  treaty_of_tordesillas.6.title: "Поправка до $treaty_of_tordesillas$"
  treaty_of_tordesillas.6.desc: "Ми отримали пропозицію від [actor.GetLongName]. Їм відомо про наші претензії на територію [target_recipient_area.GetName], регіон, який вони прагнуть отримати для себе і який межує з їхніми претензіями на [target_actor_area.GetName].\n\nВони пропонують обмін цими претензіями, так що ми матимемо претензії на [target_actor_area.GetNameWithNoTooltip], а вони претендуватимуть на [target_recipient_area.GetNameWithNoTooltip].\n\nЯк дружнє прохання, ми вільні відхилити його, але їм це може не сподобатися."
  treaty_of_tordesillas.6.a: "Ми приймаємо цю угоду."
  treaty_of_tordesillas.6.b: "Ні, це безглузде прохання."
  treaty_of_tordesillas.7.title: "Великий Обмін"
  treaty_of_tordesillas.7.desc: "Незвичайна пропозиція надійшла від [actor.GetLongName], вони пропонують нам обмінятися тим, яку сторону світу кожен з нас отримає після ратифікації $treaty_of_tordesillas$.\n\nПропозиція такого масштабу може мати значні наслідки для статус-кво і повинна бути ретельно розглянута."
  treaty_of_tordesillas.7.a: "Будемо сміливими і приймемо їхню пропозицію."
  treaty_of_tordesillas.7.a.tt: "[GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetLongName] та [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetLongName] обміняються тим, яку сторону світу кожен з них претендує."
  treaty_of_tordesillas.7.b: "Ми не приймемо це безглузде прохання."