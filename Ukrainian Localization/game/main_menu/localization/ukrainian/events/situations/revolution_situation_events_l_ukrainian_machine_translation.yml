l_english:
  the_revolution.1.title: "[target_of_rev_scope.GetAdjectiveWithNoTooltip] Революція"
  the_revolution.1.desc.a: "Керовані широким невдоволенням проти монархії, економічними труднощами та соціальною нерівністю, наш народ нарешті скинув свої кайдани та взяв владу у власні руки. Поширення нових ідей та грамотності призвело до радикальних змін у нашому суспільстві.\n\nКолись могутні дворяни, що тримали владу, тепер ховаються за своїми палацами жадібності та відчаю, коли ми беремося за зброю проти тиранії та монархії вдома та за кордоном."
  the_revolution.1.desc.b: "У безпрецедентному повороті подій, народ [target_of_rev_scope.GetName], схоже, узурпував владу у своїх панів, ефективно послабивши багатовікові інституції. Такий крок, безсумнівно, викличе хвилювання по всьому континенту і може ще похитнути основи наймогутніших монархів світу. Ми є свідками творення історії!"
  the_revolution.1.historical_info: "У 1789 році у Франції розпочалася Революція. Підживлювана широким невдоволенням проти монархії, низьким рівнем життя та жорсткою класовою системою, ситуація лише погіршувалася дорогими війнами та королівською розкішшю, що призвело до зростання цін на хліб та голоду.\n\nІдеї Просвітництва, що пропагували свободу та рівність, ще більше розпалили заворушення, і у 1789 році скликано Генеральні штати, де Третій стан утворив Національні збори, кинувши виклик монархії. Це зрештою призвело до штурму Бастилії, символу народного опору.\n\nНезабаром після цього послідувала #italic Декларація прав людини і громадянина#!, проголошуючи свободу, рівність та братерство центральними принципами Революції."
  the_revolution.1.a: "Вперед, щоб поширювати ідеали Революції!"
  the_revolution.1.b: "На нас чекають цікаві часи."
  revolution_info_tt: "Під час [ShowSituationNameWithNoTooltip('the_revolution')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] майже кожна [ShowGovernmentTypeName('monarchy')] зіткнеться з викликом своєму правлінню з боку народу та тих, хто пригноблений феодальним статус-кво.\n\n[Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що #G підтримують#! Революцію, зможуть допомагати своїм товаришам вдома та за кордоном за допомогою унікальних дій.\n\n[Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що прагнуть #R придушити#! її, зможуть це зробити або через [ShowCasusBelliName('crush_the_revolution_cb')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e], або за допомогою нових дій.\n"
  explain_revolutionary_and_counter_characters_tt: "Ми отримаємо доступ до різних нових дій, таких як [ShowGenericActionName('institute_governmental_purges')], [ShowGenericActionName('demote_local_aristocracy')] та інших, через панель [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  the_revolution.2.title: "Страта [target_character.GetNameWithNoTooltip]"
  the_revolution.2.desc.a: "Волочений у ланцюгах, брикаючись і кричачи про [target_character.GetHerHis] невинність, [target_character.GetShortName] постає перед [target_ruler.GetName]. Одяг у лахмітті, побитий і закривавлений, [target_character.GetSheHe] протестує, що жодного разу ідеали Революції не були зраджені під [target_character.GetHerHim]. Але, звісно, свиня верещить найголосніше ближче до забою. Побачимо, за яку справу цей зрадник проллє кров!"
  the_revolution.2.desc.b: "Підозрюваний у революційних настроях протягом досить тривалого часу, [target_character.GetName] затриманий за наказом [target_ruler.GetName] за підозрою у розпалюванні ненависті та пропаганди проти центральної влади. Коли [target_character.GetHerHis] страта здійснюється, [target_character.GetSheHe] проголошує вірність [target_ruler.GetShortNameWithNoTooltip] в останній спробі вплинути на [target_ruler.GetHerHim], а також на натовп."
  the_revolution.2.a: "Скатертиною дорога, незалежно від вірності!"
  target_character_was_revolutionary_and_thus_tt: "[target_character.GetNameWithNoTooltip] мав революційні настрої, і тому:"
  target_character_was_neutral_and_thus_tt: "[target_character.GetNameWithNoTooltip] не мав ні революційних, ні контрреволюційних настроїв, і тому:"
  target_character_was_against_the_revolution_and_thus_tt: "[target_character.GetNameWithNoTooltip] мав контрреволюційні настрої, і тому:"
  the_revolution.3.title: "Іноземна допомога [target.GetNameWithNoTooltip]"
  the_revolution.3.desc: "У час потреби дух товариства сяє найяскравіше. Оскільки [target.GetLongName] захищає ідеали Революції, на нас лягає обов'язок зробити свій внесок і підтримати їх якнайкраще."
  the_revolution.3.a: "Надіслати їм символічний загін."
  the_revolution.3.b: "Ми розділимо їхню боротьбу та активно захищатимемо їх."
  the_revolution.4.title: "Розпалювання заворушень у [target_province.GetNameWithNoTooltip]"
  the_revolution.4.desc: "Схоже, один із членів нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] взяв на [target_character.GetHerselfHimself] поширення заворушень в одній із наших провінцій. Невідомо, що передбачає [target_character.GetHerHis] програма. Деякі підтримують ідею, що [target_character.GetSheHe] приховує лють проти поточного стану справ, чи то через поширення революційних ідей, чи через поточну боротьбу нашого народу, зрозуміло, що [target_character.GetHerHis] завзяття зайшло занадто далеко!"
  the_revolution.4.a: "Ми нічого не можемо зробити."
  the_revolution.4.b: "В'язниця чекає на [target_character.GetHerHim]."
  nobles_lose_10_pop_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  peasants_lose_10_pop_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  target_province_every_pop_5_satisfaction_loss_tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  the_revolution.5.title: "Політичні звинувачення"
  the_revolution.5.desc.a: "Крики та розбіжності не є чужими для поведінки нашої нової революційної держави та громадських справ. Зрештою, дух народу та його прагнення до представництва не можуть бути стримані жодною центральною владою.\n\nОднак нещодавні звинувачення викликали хвилювання в політичній сфері. Здається, [target_character_1.GetName] підозрює [target_character_2.GetName] у контрреволюційних настроях, звинувачуючи [target_character_2.GetHerHim] у таємній співпраці з ворогом! Обидва члени [ROOT.GetCountry.GetGovernment.GetCourtTitle] вимагають ув'язнення іншого, їхнім розбіжностям, здається, немає кінця."
  the_revolution.5.desc.desc.b: "Серед хаосу процвітають розбіжності та напруга. Такий випадок між деякими членами [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Остання драма розгортається навколо [target_character_1.GetName] та [target_character_2.GetName]. Здається, розбіжності в політиці та поведінці на посаді призвели до того, що обидва звинувачують один одного в приховуванні таємних революційних настроїв! Ми не можемо знати, чи правдиві ці чутки, але ця ситуація загрожує дестабілізувати наші внутрішні справи."
  the_revolution.5.a: "Досить! Заарештувати [target_character_1.GetNameWithNoTooltip]!"
  the_revolution.5.b: "Охоронці можуть супроводити [target_character_2.GetNameWithNoTooltip] до камери!"
  the_revolution.5.c: "У в'язниці достатньо камер для обох!"
  the_revolution.5.d: "Ситуація заспокоїться сама по собі."
  these_characters_may_cause_an_uproar_again_soon_tt: "#italic Ці [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] можуть спричинити іншу проблему в майбутньому#!"
  the_revolution.6.title: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName]"
  the_revolution.6.desc: "З поширенням революційних ідей по [ROOT.GetCountry.GetCapital.GetContinent.GetName] та після десятиліть високих податків і поганих врожаїв, широке невдоволення абсолютистським правлінням [target_character.GetName] більше не можна ігнорувати. Через великі вимоги [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], [target_character.GetShortNameWithNoTooltip] був змушений скликати [ROOT.GetCountry.GetGovernment.GetParliament.GetName], щоб депутати розробили програму реформ, яка прокладе шлях вперед для [ROOT.GetCountry.GetName]. Однак компроміс між різними фракціями, безсумнівно, виявиться складним, і вже зараз розбіжності між старим порядком та радикальними групами загрожують вибухнути конфліктом!"
  the_revolution.6.a: "Провести урядові реформи силою."
  reactionary_revolt_tt: "Усі [ShowPopTypeName('nobles')] у [ROOT.GetCountry.GetCapital.GetRegion.GetName] приєднуються до [target_rebel.GetName] і втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  the_revolution.6.b: "Зобов'язати консервативні фракції."
  easier_revolution_disaster_tt: "#R [ShowDisasterName('revolution_disaster')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] стає легше спровокувати#!"
  rev_reactionary_rebels: "[COUNTRY.GetAdjectiveWithNoTooltip] Реакціонери"
  the_revolution.7.title: "Винахід гільйотини"
  the_revolution.7.desc: "«Злочинця буде обезголовлено; це буде зроблено виключно за допомогою простого механізму», — такими були слова [target_character.GetName], який запропонував ідею швидкого та якомога безболіснішого методу страти. Хоча [target_character.GetSheHe] ніколи не був безпосередньо залучений до розробки чи будівництва пристрою, його назва «гільйотина» походить від імені лікаря [target_character.GetHerselfHimself]. Тепер вона стала символом самої Революції, оскільки її ворогів масово страчують за допомогою гільйотини."
  the_revolution.7.historical_info: "Насправді гільйотина була винайдена та сконструйована Антуаном Луї – придворним хірургом та фізіологом самого короля Людовика XVI – та німецьким інженером Тобіасом Шмідтом. Спочатку її назва була #italic луїзетта#!, але була перейменована на гільйотину, що походить від Жозефа-Ігнаса Гільйотена, який запропонував ідею нового, швидкого методу страти."
  the_revolution.7.a: "Справді передова технологія!"
  the_revolution.8.title: "[ShowSituationNameWithNoTooltip('the_revolution')] придушено"
  the_revolution.8.desc: "Вітри змін, що колись пронеслися континентами, обіцяючи свободу та рівність, були згашені. Значна частина революційного запалу, що загрожував перевернути старий порядок, була зустрінута рішучою силою. Чи то через зіткнення зброї, втручання іноземних держав, чи через крах революційного керівництва, мрія про нове суспільство була розчавлена під чоботами традиції та влади. Вулиці, колись наповнені криками про свободу, тепер мовчать, а старі інститути знову утверджують своє панування. Шрами цього конфлікту залишаться, і люди не скоро забудуть."
  the_revolution.8.a: "Статус-кво переважає."
  end_revolution_tt: "[ShowSituationName('the_revolution')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] завершилася"
  the_revolution.9.title: "Революція в [ROOT.GetCountry.GetNameWithNoTooltip]"
  the_revolution.9.desc: "Оскільки світ навколо нас вибухає революційним запалом, вітри змін досягають навіть найвіддаленіших куточків нашого [ROOT.GetCountry.GetFlavorRank]. Натхненні закликами до свободи, рівності та братерства, наш вибір прийняти мінливі часи відгукнеться крізь віки. Заклик до реформ гучний, але наслідки прийняття такого перевороту невідомі.\n\nНарод розділений, еліти бояться втрати своїх привілеїв, а іноземні держави спостерігають із занепокоєнням. Однак обіцянка більш справедливого та егалітарного суспільства вабить. Ми могли б очолити боротьбу за новий порядок, незважаючи на небезпечні виклики з усіх боків."
  the_revolution.9.a: "Ми боремося за народ!"
  explain_revolution_benefits_tt: "Доки ми залишаємося [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e], ми отримуватимемо такі переваги:\n\n[ShowAutoModifierEffect('revolutionary')]"
  the_revolution.10.title: "Вісник Революції"
  the_revolution.10.desc: "Настав час, і світ змінюється. По всій [ShowContinentName('europe')] старі порядки монархій та аристократій руйнуються під вагою революційних ідеалів. Люди вимагають змін, і вітри повстання дмуть з кожним днем сильніше. Як новий лідер цього руху, ми стоїмо на передовій революції, що обіцяє свободу, рівність і братерство.\n\nНарод збирається під нашим прапором, натхненний ідеєю світу, не скутого традиціями та привілеями. Проте, з великою владою приходить велика відповідальність і небезпечний ризик. Ті, хто змовився проти нас, незабаром вийдуть з тіні. Майбутнє нашої нації, а можливо, й світу, у наших руках."
  the_revolution.10.a: "Ми захищатимемо наші ідеали!"
  explain_revolutionary_target_benefits_tt: "Доки ми залишаємося [Concept('revolutionary_target', 'CONCEPT_PLACEHOLDER')|e], ми зберігатимемо переваги статусу [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e], а також:\n\n[ShowAutoModifierEffect('revolution_target')]"
  the_revolution.11.title: "[actor.GetNameWithNoTooltip] роздмухує полум'я революції"
  the_revolution.11.desc: "Шепіт заворушень стає голоснішим у нашому [ROOT.GetCountry.GetFlavorRank], і тепер правда починає виходити на поверхню! Здається, [actor.GetName] підозрюють у сприянні поширенню [target_rebel.GetName] на наших землях. Чи то через таємне фінансування, запальну риторику, чи приховування дисидентів, їхні дії підбадьорили революціонерів і підживили нестабільність у наших провінціях. Те, що колись здавалося ізольованим збуренням, тепер має ознаки навмисної кампанії, яка справді може підштовхнути наш народ до межі знищення."
  the_revolution.11.a: "Ці втручальні революціонери!"
  the_revolution.12.title: "Війна проти [target_country.GetLongNameWithNoTooltip]"
  the_revolution.12.desc: "Нестабільність охопила наш [ROOT.GetCountry.GetFlavorRank]. Небезпечні ідеї, такі як відмова від центральної влади, феодалізм та [ShowInstitutionName('enlightenment')], здається, виходять від таких, як [target_country.GetName]. За словами наших радників, їхні шпигуни, як провідники зла, поширили свої отруйні щупальця далеко за межі своїх кордонів, намагаючись заразити сусідів небезпечними ідеями повалення вищого класу. Без сумніву, ми повинні втрутитися і покласти край цьому зухвалому прояву опору!"
  the_revolution.12.a: "До зброї!"
  the_revolution.12.b: "Найкраще поважати їхню силу, принаймні зараз."