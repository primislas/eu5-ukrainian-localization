l_english:
  colonial_revolution.1.title: "Без оподаткування немає представництва"
  colonial_revolution.1.desc: "Відколи нашу територію було засновано, ми існували лише для збагачення заморської [target_country.GetName]. На жаль, ми не отримали рівного представництва ані в [target_country.GetAdjectiveWithNoTooltip] справах, ані в справах наших власних земель. Деякі з наших найшанованіших співвітчизників, натхненні [ShowInstitutionName('enlightenment')], говорять про можливі варіанти тиску на нашого сюзерена, щоб той відмовився від влади, що може перерости в конфлікт."
  colonial_revolution.1.a: "Ідеї [ShowInstitutionNameWithNoTooltip('enlightenment')] переможуть!"
  colonial_revolution.1.a.tt: "У цій ситуації колоніальний [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] може сформувати [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] однодумних колоній, намагаючись змусити свого сюзерена відмовитися від контролю над ними або безпосередньо досягти незалежності."
  colonial_revolution.2.title: "Непокірні колонії"
  colonial_revolution.2.desc: "З поширенням ідей [ShowInstitutionName('enlightenment')] по всьому світу, як лісова пожежа, ми отримали тривожні новини з наших колоніальних володінь. Вони, здається, обговорюють тривожні ідеї, такі як представництво та самовизначення. Хоча ми не впевнені, звідки взялися ці ідеї, оскільки ми завжди діяли в їхніх найкращих інтересах, здається ймовірним, що це буде нелегко ігнорувати. Ми повинні очікувати значно більше проблем у відносинах з нашими колоніальними володіннями в майбутньому."
  colonial_revolution.2.a: "Ми можемо лише жаліти тих людей, які відкидають наше правління."
  colonial_revolution.3.title: "У пошуках свободи"
  colonial_revolution.3.desc: "Після тривалого періоду колоніального безгосподарності ми досягли стану розбіжності. Культурні, соціальні та політичні відмінності та постійна експлуатація змусили поселенців втратити віру в [target_overlord.GetName]. Відмінності між групами, що підтримують [target_overlord.Custom('GetMotherlandFatherland')], та поселенцями, які віддають перевагу управлінню, вільному від заморського впливу, стають дедалі помітнішими та глибшими з кожним днем, і конфлікт здається майже неминучим."
  colonial_revolution.3.a: "Це серйозна справа."
  colonial_revolution.3.b: "Вірність [target_overlord.Custom('GetMotherlandFatherland')] послужить нам добре."
  colonial_revolution.4.title: "Торговельні обмеження"
  colonial_revolution.4.desc: "Відносини з нашими колоніями вже деякий час були хиткими. Економічні потреби [ROOT.GetCountry.GetName] не можна ігнорувати, і вони вимагають постійного потоку товарів з-за моря. Однак наша спроба встановити жорсткий економічний контроль над нашими підданими зустріла запеклий опір. Деякі колоністи звернулися до нас з проханням послабити наш суворий контроль над товарами, що залишають та надходять на їхні ринки, та надати їм більше місцевого контролю."
  colonial_revolution.4.a: "Вони повинні підняти це питання в [ROOT.GetCountry.GetGovernment.GetParliament.GetName]."
  colonial_revolution.4.b: "Піддатися їхнім вимогам."
  colonial_revolution.5.title: "Чутки про повстання"
  colonial_revolution.5.desc: "Незважаючи на свій нижчий статус, наші колонії є домом для багатьох яскравих і харизматичних особистостей. Ми отримали кілька повідомлень про те, що ці люди зустрічаються в так званих колоніальних зборах, обговорюючи політику свого статусу підданих і, нібито, можливість оголошення незалежності без нашої згоди. Хоча це лише чутки, бездіяльність зараз може залишити нас у слабшій позиції пізніше."
  colonial_revolution.5.a: "Спробувати знайти дипломатичне рішення."
  colonial_revolution.5.b: "Вони не можуть цього вирішувати!"
  colonial_revolution.6.title: "Голос [target_character.GetNameWithNoTooltip]"
  colonial_revolution.6.desc: "[target_character.GetName], полум'яний оратор і впливова постать, почав розпалювати заворушення в [target_country.GetName]. Через промови, листи та підбурювання громадськості вимагати більшого представництва, [target_character.GetSheHe] ставить під сумнів нашу владу та згуртовує інших шукати незалежності від [target_overlord.GetLongName]. Хоча [target_character.GetSheHe] ще не відкрито закликав до повстання, [target_character.GetHerHis] вплив зростає з кожним днем."
  colonial_revolution.6.a: "Вимагати екстрадиції [target_character.GetHerHis] від колоніальної влади."
  colonial_revolution.6.b: "Нехай [target_character.GetHerHim] говорить. Самі слова не можуть нас повалити."
  colonial_revolution.6.c: "Організувати таємне вбивство."
  assassination_of_target_character_tt: "Ми спробуємо вбити [target_character.GetName]"
  colonial_revolution.7.title: "[target_overlord.GetNameWithNoTooltip] Вимагає екстрадиції [target_character.GetLastNameWithNoTooltip]"
  colonial_revolution.7.desc: "Надійшла офіційна вимога від [target_overlord.GetName]. Вони вимагають негайної екстрадиції [target_character.GetName], посилаючись на заколот та підбурювання проти [target_overlord.GetFlavorRank]. Чутки свідчать, що справжня мета — швидко та публічно стратити [target_character.GetHerHim]. Наші радники розділилися: одні бачать у [target_character.GetHerHim] небезпечного агітатора, інші — голос свободи."
  colonial_revolution.7.a: "Поки що ми мусимо погодитися."
  colonial_revolution.7.b: "Ніколи!"
  colonial_revolution.8.title: "[target_overlord.GetNameWithNoTooltip] Діє проти нашого суверенітету"
  colonial_revolution.8.desc: "[target_character.GetName] мертвий/мертва, убитий/убита в тому, що спочатку здавалося випадковим актом насильства. Але з'явилися докази, що пов'язують змову з агентами за наказом [target_overlord.GetName]. Це відкриття викликало шок у нашому [target_country.GetFlavorRank], де [target_character.GetSheHe] став/стала символом значущості в [ROOT.GetCountry.GetGovernment.GetCabinetTitle|U]. Мучеництво тепер живить той самий рух, який вони прагнули замовкнути."
  colonial_revolution.8.a: "Ті кляті дурні в [target_overlord.GetNameWithNoTooltip]!"
  colonial_revolution.9.title: "Невдалий замах на [target_character.GetLastNameWithNoTooltip]"
  colonial_revolution.9.desc: "Була зроблена спроба замаху на життя [target_character.GetName], але [target_character.GetSheHe] ледве врятувався/врятувалася. Невдалий вбивця був схоплений і під час допиту зізнався у зв'язках з агентами [target_overlord.GetName], нашого сюзерена! Змова лише посилила вплив [target_character.GetShortNameWithNoTooltip], перетворивши [target_character.GetHerHim] на живу легенду, водночас виставляючи [target_overlord.GetNameWithNoTooltip] лиходієм в очах багатьох у [target_country.GetFlavorRank]."
  colonial_revolution.10.title: "Вимога про усунення"
  colonial_revolution.10.desc: "Зростаюча фракція в нашому [ROOT.GetCountry.GetFlavorRank] закликала до усунення [target_character.GetName], члена [ROOT.GetCountry.GetGovernment.GetCabinetTitle], якого/яку вважають надмірно лояльним/лояльною до [target_overlord.GetName] та ворожим/ворожою до місцевої автономії. Звинувачення варіюються від корупції до відвертого шпигунства. Вимога чітка: [target_character.GetSheHe] має бути звільнений/звільнена та переданий/передана [target_overlord.GetName]."
  colonial_revolution.10.a: "Надіслати листа з нашим проханням."
  colonial_revolution.10.b: "Ми вирішимо це питання внутрішньо."
  colonial_revolution.11.title: "[target_country.GetNameWithNoTooltip] Вимагає екстрадиції [target_character.GetLastNameWithNoTooltip]"
  colonial_revolution.11.desc: "Надійшла офіційна вимога від [target_country.GetName]. Вони вимагають негайної екстрадиції [target_character.GetName], посилаючись на заколот та підбурювання проти [target_country.GetFlavorRank]. Чутки свідчать, що справжня мета — швидко позбутися [target_character.GetHerHim] у спробі поширити революційні настрої. Наші радники розділилися: одні бачать у [target_character.GetHerHim] важливого губернатора, інші прагнуть заспокоїти нашого колоніального підданого."
  colonial_revolution.11.a: "Екстрадувати [target_character.GetHerHim]."
  colonial_revolution.11.b: "Ми не будемо розглядати вимоги простої колонії!"
  scales_with_character_abilities_tt: "Втрата [Concept('government_power', 'CONCEPT_PLACEHOLDER')|e] буде масштабуватися відповідно до впливу та [Concept('total_ability', 'CONCEPT_PLACEHOLDER')|e] [target_character.GetName]"
  colonial_revolution.12.title: "Народне правління"
  colonial_revolution.12.desc: "Поки світ охоплений бажанням колоній відокремитися від своїх сюзеренів, стабільне та тверде правління [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не залишилося непоміченим нашими підданими. Захоплення, викликане [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHim] у наших підданих, призводить до того, що багато хто задоволений нашим правлінням."
  colonial_revolution.12.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  colonial_revolution.13.title: "Без лідера"
  colonial_revolution.13.desc: "Зазвичай наші піддані можуть згуртуватися навколо об'єднуючої фігури нашого правителя. На жаль, з моменту смерті [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName] ми залишилися без чіткого керівництва, і наші піддані можуть мати небезпечні ідеї щодо свободи та суверенітету."
  colonial_revolution.13.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  colonial_revolution.14.title: "Мирний шлях уперед"
  colonial_revolution.14.desc: "В епоху [ShowSituationName('colonial_revolution')] конфлікти між сюзереном та підданими є звичними і загрожують розпалити нове кровопролиття за кожної нагоди. Група людей, що складається як з поселенців у [target_colony.GetName], так і на наших власних землях, виступила з пропозицією вберегти обидві наші країни від цього жахливого майбутнього. Звільнивши [target_colony.GetNameWithNoTooltip] від їхніх зобов'язань та підписавши офіційну декларацію про союз, ми можемо забезпечити процвітаюче майбутнє як для нас, так і для [target_colony.GetNameWithNoTooltip]."
  colonial_revolution.14.a: "Ми зустрінемо майбутнє разом."
  colonial_revolution.14.b: "Ми воліли б зберегти наші відносини як є."
  colonial_revolution.15.desc.generic: "На нещодавньому засіданні [ROOT.GetCountry.GetGovernment.GetCabinetTitle] спалахнула жорстока суперечка між [target_character.GetName] та [target_character_2.GetName]."
  colonial_revolution.15.desc.generic_2: "Зрозуміло, що ми більше не можемо підтримувати обох у нашому [ROOT.GetCountry.GetGovernment.GetCabinetTitle] і муситимемо взяти на себе зобов'язання покарати когось із них."
  colonial_revolution.15.title: "Фракційність у [ROOT.GetCountry.GetGovernment.GetCabinetTitle]"
  colonial_revolution.15.desc.subject: "$colonial_revolution.15.desc.generic$ [target_character.GetNameWithNoTooltip], затятий прихильник нашого сюзерена, звинуватив [target_character_2.GetNameWithNoTooltip] у нелояльності та саботажі наших спільних відносин. [target_character_2.GetNameWithNoTooltip] у свою чергу відповів звинуваченнями в експлуатації нашого простого люду в чужих інтересах. $colonial_revolution.15.desc.generic_2$"
  colonial_revolution.15.desc.overlord: "$colonial_revolution.15.desc.generic$ [target_character.GetNameWithNoTooltip] раніше висловлював дуже примирливі погляди щодо наших колоній і виступав за зміну нашої позиції на менш експлуататорську. За це [target_character.GetSheHe] зустрів сильний опір з боку [target_character_2.GetNameWithNoTooltip], який стверджував про необхідність експлуатації для нашого власного процвітання. $colonial_revolution.15.desc.generic_2$"
  colonial_revolution.15.a: "[target_character.GetNameWithNoTooltip] має кращі аргументи."
  colonial_revolution.15.b: "Ми переконані позицією [target_character_2.GetNameWithNoTooltip]."
  colonial_revolution.1000.title: "Свобода потребує підтримки"
  colonial_revolution.1000.desc: "Наша боротьба за свободу не може бути досягнута самотужки і потребує значних коштів. На щастя, підлі [target_overlord.GetLongName] самі нажили собі багато ворогів. Один з їхніх ворогів, [target_rival.GetName], сподіваємося, готовий інвестувати в загибель своїх суперників. Трохи переконавши їх, ми могли б отримати значні кошти для наших інтересів."
  colonial_revolution.1000.a: "Гроші – найважливіший ресурс, який нам потрібен."
  colonial_revolution.1000.b: "Нам потрібно більше військ, щоб боротися за нашу свободу."
  colonial_revolution.1000.c: "Вони повинні приєднатися до наших військових зусиль."
  colonial_revolution.1000.d: "Зваживши, ми не потребуємо їхньої допомоги."
  ar_gain_money_tt: "Якщо вони погодяться, ми отримаємо частину їхнього доходу"
  ar_gain_manpower_tt: "Якщо вони погодяться, ми отримаємо частину їхньої робочої сили"
  ar_gain_alliance_tt: "Якщо вони погодяться, ми укладемо з ними союз"
  colonial_revolution.1001.title: "[target_colony.GetNameWithNoTooltip] просить допомоги"
  colonial_revolution.1001.desc: "Бідний люд [target_colony.GetName] страждає під тиранічним правлінням [target_overlord.GetName]. Дипломатична делегація [target_colony.GetNameWithNoTooltip] тепер звернулася до нас з проханням підтримати їхні зусилля за незалежність, але вони просять значного внеску, і ми не впевнені, чи зможемо їх підтримати."
  colonial_revolution.1001.a: "Усе, щоб послабити наших суперників."
  colonial_revolution.1001.b: "Ні, ми б не хотіли, щоб їхні ідеї свободи поширювалися на нас."
  colonial_revolution.1002.title: "Відповідь [target_rival.GetNameWithNoTooltip]"
  colonial_revolution.1002.desc.common: "Дипломати [target_rival.GetNameWithNoTooltip] мають відповідь для нас щодо нашого запиту про підтримку."
  colonial_revolution.1002.accepted.desc: "$colonial_revolution.1002.desc.common$ Вони пообіцяли стояти поруч з нами в нашій боротьбі проти [target_overlord.GetName]. Разом ми знищимо кайдани гніту, що зв'язують нас з нашим сюзереном."
  colonial_revolution.1002.desc: "$colonial_revolution.1002.desc.common$ Боягузи відмовляються надати нам свою підтримку і залишили нас напризволяще в нашій боротьбі проти [target_overlord.GetAdjective] гніту."
  colonial_revolution.1002.a: "Вони є цінним союзником нашої справи."
  colonial_revolution.1002.b: "Нам вони все одно не потрібні."
  got_aid_tt: "Ми отримали допомогу"
  not_got_aid_tt: "Ми не отримали допомоги"