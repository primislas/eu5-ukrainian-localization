l_english:
  war_of_religions.generals.generic: "Перспективний полководець, [target_character.GetName] прослужив у нашому війську кілька років, піднявшись по службових сходах. Народжений у [target_location.GetName], [target_character.GetSheHe] був би ідеальним кандидатом, щоб очолити наші армії у війні проти наших ворогів."
  war_of_religions.1.a: "Нам потрібна [target_character.GetHerHis] служба."
  war_of_religions.1.c: "[target_character.GetHerHis|U] навички тут не потрібні."
  war_of_religions.1.title: "[target_character.GetNameWithNoTooltip]"
  war_of_religions.1.desc: "[target_character.GetNameWithNoTooltip] виріс у [ShowRegionName('italy_region')] і приєднався до нашого генерального штабу під час поточної війни. [target_character.GetSheHe|U] здається талановитим, але амбітний [target_character.GetWomanMan], як [target_character.GetHerHim], зрештою може спричинити нам проблеми."
  war_of_religions.1.b: "[target_character.GetSheHe|U] змагатиметься з [target_wallenstein.GetNameWithNoTooltip]."
  war_of_religions.2.desc: "$war_of_religions.generals.generic$"
  war_of_religions.3.desc: "Вправний полководець, відомий [target_character.GetHerHis] здатністю виснажувати [target_character.GetHerHis] супротивників, [target_character.GetName] вже здобув собі ім'я і тепер готовий взяти повне командування нашими арміями та вести нас у поточній війні."
  war_of_religions.4.desc: "$war_of_religions.generals.generic$"
  war_of_religions.5.desc: "$war_of_religions.generals.generic$"
  war_of_religions.6.desc: "$war_of_religions.generals.generic$"
  war_of_religions.7.desc: "$war_of_religions.generals.generic$"
  war_of_religions.8.desc: "$war_of_religions.generals.generic$"
  war_of_religions.9.desc: "$war_of_religions.generals.generic$"
  war_of_religions.10.desc: "$war_of_religions.generals.generic$"
  war_of_religions.11.desc: "$war_of_religions.generals.generic$"
  war_of_religions.12.desc: "$war_of_religions.generals.generic$"
  war_of_religions.13.desc: "$war_of_religions.generals.generic$"
  war_of_religions.14.desc: "$war_of_religions.generals.generic$"
  war_of_religions.15.desc: "$war_of_religions.generals.generic$"
  war_of_religions.16.desc: "$war_of_religions.generals.generic$"
  war_of_religions.17.title: "Пограбування [target_location.GetNameWithNoTooltip]"
  war_of_religions.17.desc: "[target_location.GetRank.GetName] [target_location.GetName] був осередком опору нашій справі. Цей бастіон [ROOT.GetCountry.Custom('GetEnemyReligiousLeagueName')] та їхньої віри нарешті піддався облозі наших військ. Наш полководець віддав рішучий наказ зробити приклад з [target_location.GetRank.GetNameWithNoTooltip] і розграбувати його без будь-яких обмежень. Хоча це жорстоко, це може запобігти приєднанню більшої кількості людей до [ROOT.GetCountry.Custom('GetEnemyReligiousLeagueName')] через страх нашої відплати."
  war_of_religions.17.a: "Необхідне зло."
  war_of_religions.18.title: "Пограбування [target_location.GetNameWithNoTooltip]"
  war_of_religions.18.desc: "[target_location.GetRank.GetName] [target_location.GetName] є домом для прекрасної [ShowBuildingTypeName('library')], що містить кілька творів, які вважаються одними з найкращих, що [target_location.GetOwner.GetCulture.GetLanguage] коли-небудь викладав на папері. Оскільки [target_location.GetNameWithNoTooltip] тепер під нашим контролем, ми також маємо право претендувати на військові трофеї. Так сталося, що ці книги стали б чудовим доповненням до [target_book_donation.GetOwner.GetCourtTitle] у [target_book_donation.GetName]."
  war_of_religions.18.a: "Воїни, можливо, не читають книг, але вони знають їхню цінність."
  opinion_gifted_heidelberg_books: "Подаровані Дорогоцінні Книги"
  war_of_religions.19.title: "Остання атака [target_ruler.GetNameWithNoTooltip]?"
  war_of_religions.19.desc: "[target_ruler.GetName] повів [target_unit.GetName] у битву при [target_location.GetName] з надією завдати вирішального удару нашим ворогам з [ROOT.GetCountry.Custom('GetEnemyReligiousLeagueName')]. Однак незабаром після початку битви [target_ruler.GetSheHe] зник(ла) у густому тумані, поза полем зору будь-якого дружнього підрозділу, який міг би допомогти [target_ruler.GetHerHim]. Хоча [target_ruler.GetHerHis] доля наразі залишається невизначеною, ймовірно, [target_ruler.GetSheHe] більше ніколи не з'явиться."
  war_of_religions.19.a: "Нам потрібно буде знайти [target_ruler.GetHerHim] за будь-яку ціну!"
  war_of_religions.19.a.tt: "У випадку, якщо [target_ruler.GetNameWithNoTooltip] не з'явиться знову, ми покращимо думку наших братів і сестер по вірі, бо [target_ruler.GetSheHe] заплатив(ла) найвищу ціну за захист нашої віри."
  defender_of_our_faith: "Захисник нашої Віри"
  war_of_religions.1000.title: "Тріщини в Релігійному Мирі"
  war_of_religions.1000.desc: "Відтоді, як Реформація охопила [GetInternationalOrganization('hre').GetName], релігійний мир був нестабільним, якщо не повністю порушеним князями. Ситуація досягла критичної точки, і як [ShowReligionAdjective('catholic')], так і реформовані країни почали формувати фракції заради захисту своєї віри. Зростаюча конфесіоналізація імперських князів є тривожним розвитком подій, який може досить швидко радикалізувати їхні позиції. У ці часи недовіри та занепокоєння здається неможливим уникнути конфронтації обох сторін."
  war_of_religions.1000.a: "Імперія повинна вистояти!"
  war_of_religions.1000.a.tt: "У [ShowSituationName('war_of_religions')] можна приєднатися до інтересів [ShowReligionAdjective('catholic')] держав [GetInternationalOrganization('hre').GetName] або протилежних протестантських держав."
  war_of_religions.1001.title: "Унія та Ліга"
  war_of_religions.1001.desc: "Нам стало очевидно, що [GetInternationalOrganization('hre').GetName] не змогла задовільно вирішити релігійні проблеми імперії. З кожним роком ми чуємо історії про князів-єретиків, які зловживають своєю владою та пригнічують вірних, як у своїх, так і за їхніми межами. Ми повинні переконатися, що вони не зможуть викорінити вірних і згуртувати наших братів і сестер по вірі."
  war_of_religions.1001.a: "Ми повинні захистити нашу віру!"
  war_of_religions.1002.title: "Розбрат у [GetInternationalOrganization('hre').GetNameWithNoTooltip]"
  war_of_religions.1002.desc: "Князі [GetInternationalOrganization('hre').GetName] розірвали себе на частини в хаотичній ситуації після Реформації. Їхній занепад у конфесії та релігійні фракції послабив імперію в цілому і міг би відкрити для нас вікно можливостей... або втягнути нас у конфлікт масштабу, що далеко перевершує нашу уяву."
  war_of_religions.1002.a: "Ми будемо уважно стежити за цим."
  war_of_religions.1200.title: "[target_character.GetLastNameWithNoTooltip]"
  war_of_religions.1200.desc: "$war_of_religions.generals.generic$ [target_character.GetNameWithNoTooltip] надав(ла) нам щедру суму грошей для збору армії, якщо ми маємо намір надати [target_character.GetHerHim] звання командувача наших армій."
  war_of_religions.1201.title: "[target_character.GetNameWithNoTooltip], Зрадник?"
  war_of_religions.1201.desc_generic: "надав(ла) нам численні звіти щодо лояльності [target_character.GetName], припускаючи, що [target_character.GetSheHe] більше не вірний(а) нашій справі і домовився(лася) про мирні умови з нашими ворогами. Фракція, що підтримує, закликає нас усунути [target_character.GetNameWithNoTooltip] з [target_character.GetHisHer] посади, позбавити [target_character.GetHerHim] будь-якого офіційного звання та наказати [target_character.GetHerHis] стратити."
  war_of_religions.1201.desc.a: "[target_piccolomini.GetName] та [target_gallas.GetName] мають $war_of_religions.1201.desc_generic$"
  war_of_religions.1201.desc.b: "[target_piccolomini.GetName] має $war_of_religions.1201.desc_generic$"
  war_of_religions.1201.desc.c: "[target_gallas.GetName] має $war_of_religions.1201.desc_generic$"
  war_of_religions.1201.desc.d: "Деякі з наших генералів мають $war_of_religions.1201.desc_generic$"
  war_of_religions.1201.a: "Вони мають рацію, [target_character.GetNameWithNoTooltip] є небезпекою для нашої справи."
  war_of_religions.1201.b: "[target_character.GetNameWithNoTooltip] незамінний!"
  war_of_religions.1202.title: "Порятунок [target_character.GetNameWithNoTooltip]"
  war_of_religions.1202.desc: "[target_character.GetName], один з наших найзапекліших супротивників, схоже, впав у немилість! Ми отримали повідомлення про [target_character.GetHerHis] ув'язнення в [target_location.GetName], де [target_character.GetSheHe] очікує [target_character.GetHerHis] страти за шість місяців. Якщо ми діятимемо швидко і поспішимо до [target_location.GetNameWithNoTooltip], ми зможемо звільнити [target_character.GetHerHim] і потенційно переконати [target_character.GetHerHim] приєднатися до нас. Небезпечне завдання, але [ShowReligionAdjective('catholic')] генерал, що бореться за нашу справу, може виявитися великим надбанням."
  war_of_religions.1202.a: "[target_character.GetSheHe|U] справді стане цінним союзником."
  war_of_religions.1202.a.tt: "Якщо ми займемо [target_location.GetName] протягом 6 місяців, ми матимемо можливість найняти [target_character.GetName] самі."
  war_of_religions.1203.title: "[target_character.GetNameWithNoTooltip] Звільнений"
  war_of_religions.1203.desc: "Ми звільнили славетного генерала [target_character.GetName]. Колись наш ворог, а тепер у немилості, [target_character.GetSheHe] тепер працюватиме на нас і швидко завершить війну."
  war_of_religions.1203.a: "Це безперечно змінить хід війни!"
  war_of_religions.1204.title: "Страта [target_character.GetNameWithNoTooltip]"
  war_of_religions.1204.desc: "[target_character.GetName] зустрів [target_character.GetHerHis] кінець як зганьблений, зрадницький змій у [target_location.GetName]! Тепер, коли ми нарешті позбулися [target_character.GetHerHis] впливу, ми можемо знову повністю зосередитися на наших військових зусиллях."
  war_of_religions.1204.a: "Нарешті спокій для нас."
  war_of_religions.1205.desc: "Ми не змогли вчасно врятувати [target_character.GetName] з [target_character.GetHerHis] ув'язнення в [target_location.GetName], щоб запобігти [target_character.GetHerHis] страті. Лише час покаже, чи буде відмова від можливості звільнити [target_character.GetHerHim] правильним рішенням."
  war_of_religions.1205.a: "Грізний ворог загинув найгіршим чином."
  war_of_religions.1300.title: "Вестфальський мир"
  war_of_religions.1300.desc: "Після довгого та виснажливого періоду війни мирні переговори нарешті принесли плоди та завершилися прийнятним станом для всіх учасників. Звістка про мир швидко поширюється в [GetInternationalOrganization('hre').GetName], залишаючи народ імперії полегшеним, оскільки їхні розірвані війною країни нарешті можуть почати відновлюватися від мародерських та грабіжницьких армій будь-якої з фракцій. Члени як [GetInternationalOrganization('protestant_union').GetName], так і [GetInternationalOrganization('catholic_league').GetName] здаються задоволеними компромісом, оскільки їхній початковий ентузіазм щодо перемоги вичерпався, досягнувши принаймні статус-кво та релігійної свободи як для своїх власних територій, так і для імперських підданих їхньої віри."
  war_of_religions.1300.a: "Перемога дипломатії!"
  war_of_religions.1400.title: "[target_artist.GetNameWithNoTooltip]"
  war_of_religions.1400.desc: "Доля малих дітей, розлучених з батьками, стала звичним явищем під час нинішньої війни між [GetInternationalOrganization('protestant_union').GetName] та [GetInternationalOrganization('catholic_league').GetName]. [target_artist.GetName] є однією з тих бідних душ, оскільки [target_artist.GetSheHe] був викрадений грабіжницькою армією і прожив довше в таборах армій, ніж у [target_artist.GetHerHis] рідному місті [ShowLocationName('hanau')]. [target_artist.GetSheHe|U] тепер знайшов [target_artist.GetHerHis] шлях до нашої країни і почав відточувати [target_artist.GetHerHis] майстерність як письменник. Ходять чутки, що [target_artist.GetSheHe] вже відповідальний за кілька опублікованих книг, але жодна книга ще не носить [target_artist.GetHerHis] власного імені."
  war_of_religions.1400.a: "Подивимося, що [target_artist.GetSheHe] опублікує під [target_artist.GetHerHis] ім'ям."
  war_of_religions.1400.b: "[target_artist.GetSheHe|U] має повернутися до [target_artist.GetHerHis] бродячого життя!"
  war_of_religions.1401.title: "$simplicius_simplicissimus$"
  war_of_religions.1401.desc: "[target_artist.GetName] нарешті опублікував те, що [target_artist.GetSheHe] називає [target_artist.GetHerHis] magnum opus, #italic Der Abentheuerliche Simplicissimus Teutsch#!, або скорочено $simplicius_simplicissimus$.\n\nДеталізуючи пригодницьке життя чоловіка, який втратив сім'ю в дитинстві, служив під час релігійної війни [GetInternationalOrganization('hre').GetName], його численні подвиги під час подорожей по всій [ShowContinentName('europe')] та його остаточне прийняття життя відлюдника. Роман [target_artist.GetNameWithNoTooltip] є сатиричним описом воєн, які раніше розкололи імперію, і ми повинні прикрасити [target_artist.GetHerHis] зусилля для [ShowLanguageName('german_language')] мови."
  war_of_religions.1401.a: "Яка чудова і безглузда історія!"