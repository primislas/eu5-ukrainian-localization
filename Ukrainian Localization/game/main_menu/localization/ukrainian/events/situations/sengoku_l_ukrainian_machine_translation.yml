l_english:
  sengoku.1.title: "Війна Онін"
  sengoku.1.desc.shogun: "Напруга між різними кланами та нами вийшла з-під контролю, і тепер спалахнула війна. Наслідки цього відчуваються на всіх японських островах, оскільки наші побратими $daimyo$ починають обирати сторони, і вступають у дію союзи.\n\nХто б не переміг у цій громадянській війні, однак, зрозуміло, що нинішня [ROOT.GetCountry.GetLongName] була занадто слабкою, щоб запобігти їй. Ми не єдині, хто це помітив, і цілком імовірно, що ця велика війна періоду Онін призведе до тривалого періоду чвар і воєн між різними японськими державами."
  sengoku.1.desc: "[GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] виявився нездатним керувати кланами. Поступова поблажливість і делегування повноважень місцевим правителям стали причиною падіння Сьогунату, і багато конфліктів, що назрівали століттями, тепер вийшли на поверхню. Практично незалежні від будь-якої центральної влади, багато $daimyo$ панують у своїх володіннях. Ми не можемо відставати, інакше ризикуємо бути знищеними полум'ям війни, яке незабаром охопить усю країну."
  sengoku.1.a: "Сенгоку Дзідай побачить нас переможцями!"
  sengoku.1.b: "Ми вичікуватимемо."
  turn_japanese_clan_into_normal_tag.tt: "Ми отримаємо автономію як територіальний $daimyo$"
  sengoku.2.title: "Кінець Сенгоку Дзідай"
  sengoku.2.desc.common: "Конфлікти Сенгоку Дзідай залишилися в минулому. Після багатьох років безперервних воєн, острови [ShowRegionName('japan_region')] знову об'єднані під"
  sengoku.2.desc.absolute: "$sengoku.2.desc.common$ нашим прапором. Жоден клан більше не зможе ставити під сумнів наше лідерство, і ми поведемо країну в еру миру та процвітання, якої ще ніколи не було. Уся [ShowRegionNameWithNoTooltip('japan_region')] схиляється перед нами!"
  sengoku.2.desc: "$sengoku.2.desc.common$ владою центрального [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]. Дрібні чвари різних кланів ніколи більше не применшать правління центрального уряду."
  sengoku.2.a: "Ми перемогли!"
  sengoku.2.b: "Навіть Імператорська родина не може кинути виклик нашій владі."
  sengoku.3.title: "Розширення [ROOT.GetCountry.GetFlavorRank]"
  sengoku.3.desc: "Країна переживає час потрясінь. Багато кланів почали встановлювати своє правління незалежно від влади [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]. Зрозуміло, що двір у [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderCountry.GetCapital] не має достатньо влади, щоб змусити клани підкоритися йому. Ми можемо скористатися цією ситуацією та розширити нашу [ROOT.GetCountry.GetFlavorRank] автономію, фактично ставши власними господарями, але ми ризикуємо накликати гнів [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]."
  sengoku.3.a: "Ми прокладемо власний шлях."
  sengoku.3.b: "Ми не можемо ризикувати гнівом [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]."
  sengoku.4.title: "Момент слабкості"
  sengoku.4.desc: "Це час постійних конфліктів. [target_enemy.GetLongName] нещодавно намагалися розширити свій вплив за рахунок інших кланів, але вони також демонстрували свою частку слабкості. Ми могли б скористатися такою слабкістю та використати її на свою користь, розширюючи власну територію. У такі часи, коли вся країна воює, хто скаржився б, якби ми розпочали ще одну?"
  sengoku.4.a: "Вони слабкі, і вони повинні впасти."
  sengoku.5.title: "Момент істини"
  sengoku.5.desc: "[target_enemy.GetLongName] знову і знову доводили свою надокучливість. Ми повинні вже розібратися з ними і розширити власну територію за їхній рахунок. У постійному стані війни $sengoku$ природно, що слабкі гинуть і годують сильних. Тільки перемігши всіх, ми можемо забезпечити своє виживання, тому ми завжди будемо полювати на слабких."
  sengoku.5.a: "Вони впадуть перед нами."
  sengoku.5.b: "Ми нічого не отримаємо, виступаючи проти них."
  sengoku.6.title: "[actor.GetLongNameWithNoTooltip] просить миру"
  sengoku.6.desc: "Наш конфлікт у [target_war.GetName] привернув увагу [actor.GetGovernment.GetRulerTitle] у [actor.GetCapital.GetName]. Ми отримали офіційну [actor.GetGovernment.GetAdjective] місію, яка закликає нас припинити всі бойові дії, аргументуючи це необхідністю підтримувати мир і стабільність у країні. Хоча влада [actor.GetGovernment.GetRulerTitle] є беззаперечною, ми все ще сподіваємося отримати вигоду від цього конфлікту."
  sengoku.6.a: "Ми не можемо не підкоритися."
  sengoku.6.b: "Скажіть їм, що нам потрібен час, аби розглянути петицію."
  sengoku.7.title: "[target_country.GetLongNameWithNoTooltip] прийняв(-ла) нашу петицію"
  sengoku.7.desc: "[target_country.GetLongName] довели, що є справжніми захисниками [ROOT.GetCountry.GetGovernment.GetRulerTitle], прийнявши нашу [ROOT.GetCountry.GetGovernment.GetAdjective] грамоту та прислухавшись до нашого прохання припинити їхнє безглузде кровопролиття."
  sengoku.7.a: "Як і має бути."
  sengoku.8.title: "[target_country.GetLongNameWithNoTooltip] відхилив(-ла) нашу петицію"
  sengoku.8.desc: "[target_country.GetLongName] довели, що є зрадниками влади [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Вони стверджують, що ретельно розглядають нашу [ROOT.GetCountry.GetGovernment.GetAdjective] петицію щодо припинення їхнього конфлікту, але це, вочевидь, лише хитрість, аби відверто її ігнорувати."
  sengoku.8.a: "Ми оточені зрадниками."
  sengoku.9.title: "Петиція щодо [target_location.GetNameWithNoTooltip]"
  sengoku.9.desc: "[actor.GetLongNameWithNoTooltip] звернувся(-лася) до нас із найзухвалішим проханням. Посилаючись на свою владу як правителів [GetUniqueInternationalOrganization('japanese_shogunate').GetName], нас попросили повернути наші права на землі [target_location.GetName] до рук [actor.GetNameWithNoTooltip]. Це, вочевидь, перевищення [actor.GetGovernment.GetAdjective] влади, і нам слід добре обміркувати, як відповісти на це."
  sengoku.9.a: "Ми мусимо підкоритися [actor.GetFlavorRank]."
  sengoku.9.b: "Ці землі по праву наші!"
  sengoku.10.title: "$sengoku.7.title$"
  sengoku.10.desc: "[target_country.GetName] довели, що мають слушні міркування, і прийняли нашу вимогу щодо повернення частини їхніх земель під нашу владу, і вони схиляються перед нашим керівництвом."
  sengoku.10.a: "Як і має бути."
  sengoku.11.title: "$sengoku.8.title$"
  sengoku.11.desc: "Зухвалі [target_country.GetName] оскаржили нашу петицію щодо землі, стверджуючи, що вони мають належні права на неї і відмовляються її віддати. Таку явну неповагу до нашої [ROOT.GetCountry.GetGovernment.GetAdjective] влади не можна ігнорувати."
  sengoku.11.a: "Нам доведеться поставити їх на місце силою."
  sengoku.12.title: "[actor.GetLongNameWithNoTooltip] вимагає підкорення"
  sengoku.12.desc: "Влада [actor.GetLongNameWithNoTooltip] звернулася до нас із надзвичайною петицією. Ми маємо відмовитися від нашої автономії, і всі наші землі знову перейдуть у пряму власність [actor.GetFlavorRank], а ми будемо лише їхніми призначеними чиновниками під їхнім керівництвом. Це обмежило б усі наші індивідуальні досягнення [ROOT.GetCountry.GetFlavorRank], але, безумовно, сприяло б стабільності землі."
  sengoku.12.a: "$sengoku.9.a$"
  sengoku.12.b: "$sengoku.9.b$"
  sengoku.13.title: "Пропозиція заручника"
  sengoku.13.desc: "Посланці від [actor.GetLongNameWithNoTooltip] звернулися до нас, пропонуючи [target_character.GetName] як заручника. Маючи [target_character.GetHerHim] під нашою опікою, ми могли б налагодити тісніші стосунки та довіру між обома нашими кланами, доки [target_character.GetSheHe] живе серед нас, але це також може виявитися палицею з двома кінцями врешті-решт."
  sengoku.13.a: "[target_character.GetNameWithNoTooltip] буде під нашою опікою."
  sengoku.13.b: "На жаль, ми не можемо прийняти [target_character.GetHerHim]."
  sengoku.14.title: "[target_country.GetNameWithNoTooltip] Приймає [target_character.GetNameWithNoTooltip]"
  sengoku.14.desc: "[target_country.GetLongName] погоджується зміцнити зв'язки між нашими кланами та прийняв [target_character.GetName] серед себе. Доки [target_character.GetSheHe] перебуватиме під їхньою опікою, обидва клани розділятимуть тісні узи довіри та дружби."
  sengoku.14.a: "Радісна подія."
  sengoku.15.title: "[target_country.GetNameWithNoTooltip] Відмовляє [target_character.GetNameWithNoTooltip]"
  sengoku.15.desc: "[target_country.GetAdjective] посланці повертаються до нас із гіркими новинами, оскільки вони відхилили пропозицію прийняти [target_character.GetName] серед себе. Стверджуючи, що наразі вони не мають можливості розмістити [target_character.GetHerHim], їхня відмова чітко означає, що вони не бажають встановлювати тісні зв'язки з нами."
  sengoku.15.a: "Це їхня втрата."
  sengoku.16.title: "Прохання про Заручника"
  sengoku.16.desc: "Посланці з [actor.GetLongNameWithNoTooltip] звернулися до нас, питаючи, чи могли б вони зробити нам честь, прийнявши [target_character.GetName] серед себе. Вони кажуть, що хочуть запропонувати [target_character.GetHerHim] гостинність та розваги на знак поваги та вдячності за наш [ROOT.GetCountry.GetFlavorRank]. Звісно, вони запевняють нас у безпеці [target_character.GetHerHis] і гарантують, що це послужить встановленню тісніших стосунків та довіри між обома нашими кланами."
  sengoku.16.a: "Відправити [target_character.GetNameWithNoTooltip] до них."
  sengoku.16.b: "Як вони сміють просити таке від нас?"
  sengoku.17.title: "[target_country.GetNameWithNoTooltip] Приймає наше Прохання"
  sengoku.17.desc: "[target_country.GetLongNameWithNoTooltip] погодилися встановити тісніші стосунки між нашими кланами і таким чином погодилися відправити [target_character.GetName] під нашу опіку. Це збільшить довіру між нашими родинами та зблизить нас, доки [target_character.GetSheHe] перебуватиме в безпеці серед нас."
  sengoku.17.a: "$sengoku.14.a$"
  sengoku.18.title: "[target_country.GetNameWithNoTooltip] Відмовляє нашому Проханню"
  sengoku.18.desc: "[target_country.GetLongName] отримали наше прохання про розміщення [target_character.GetName] у нашому [ROOT.GetCountry.GetFlavorRank] і сприйняли це як хитрість з нашого боку, щоб отримати над ними перевагу. На жаль, наші щирі спроби зміцнити тісніші стосунки та довіру між нашими кланами, схоже, завдали більше шкоди, ніж користі."
  sengoku.18.a: "$sengoku.15.a$"
  sengoku.19.title: "[actor.GetGovernment.GetAdjective] [actor.GetGovernment.GetCourtTitle] Виклик"
  sengoku.19.desc: "Очевидно, що влада [actor.GetLongName] над землею слабшає, оскільки все більше кланів діють незалежно від їхньої влади. У спробі тримати клани під контролем, [actor.GetFlavorRank] не має іншого вибору, окрім як викликати лідерів кланів до столиці, щоб вимагати конкретних обґрунтувань їхніх дій. Такий виклик надійшов тепер для [target_ruler.GetName], вимагаючи [target_ruler.GetHerHim] з'явитися перед [actor.GetGovernment.GetAdjective] [actor.GetGovernment.GetCourtTitle]. Наш обов'язок — підкоритися, але це безумовно поставить чорну пляму на нашій власній владі."
  sengoku.19.a: "У нас немає іншого вибору, окрім як підкоритися."
  sengoku.19.b: "Так... ми підемо, зрештою..."
  sengoku.20.title: "[target_country.GetNameWithNoTooltip] Приймає Виклик"
  sengoku.20.desc: "[target_ruler.GetName] з [target_country.GetLongName] прислухався до нашого виклику і прийшов перед нами, щоб пояснити дії [target_ruler.GetHerHis] [target_country.GetFlavorRank]. Це дає зрозуміти, що наша влада все ще поширюється на клани, незважаючи на їхні спроби діяти незалежно."
  sengoku.20.a: "Ми все ж таки їхній правитель."
  sengoku.21.title: "[target_country.GetNameWithNoTooltip] Відмовляє Виклику"
  sengoku.21.desc: "[target_ruler.GetName] з [target_country.GetLongName] довів [target_ruler.GetHerHis] дурість та зрадницьку поведінку, відмовившись виконати наш виклик для присутності [target_ruler.GetHerHim] перед [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Хоча [target_ruler.GetSheHe] запевняє нас, що [target_ruler.GetSheHe] безумовно готується до поїздки, але підготовка займе деякий час, [target_ruler.GetHerHis] затримка чітко вказує на [target_ruler.GetHerHis] небажання та бунтарство. Таку очевидну зневагу до нашої влади не можна допускати."
  sengoku.21.a: "Нам доведеться поставити [target_country.GetNameWithNoTooltip] на місце."
  sengoku.22.title: "[actor.GetLongNameWithNoTooltip] Повстає проти [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]"
  sengoku.22.desc: "Роль [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] полягає в тому, щоб правити землею від імені [ShowSpecialStatusName('japanese_emperor')], звільняючи Хризантемовий Трон від клопоту прямого управління. Однак [actor.GetLongName] скористався цими бурхливими часами і зібрав достатньо підтримки, щоб засудити нашу владу та спробувати відновити пряму владу під Імперською лінією. Нас таврували як зрадників та повстанців проти справжнього правителя [ShowRegionName('japan_region')]."
  sengoku.22.a: "Чи ми лиходії?"
  sengoku.23.title: "$sengoku.22.title$"
  sengoku.23.desc: "Це справді бурхливі часи. Хоча ми повинні бути маяком порядку для всього [ShowRegionName('japan_region')], все більше кланів сумніваються в нашій владі. Останнє зухвальство — це [actor.GetName], які відкрито виступили проти нашого правління і оголосили свої землі незалежними від нього. Цього не можна терпіти, оскільки ми повинні поставити на місце будь-який клан, який вважає, що він нам нічого не винен, інакше ми побачимо, як ми самі та наша країна зануримося в ще більший хаос."
  sengoku.23.a: "Цвях, що стирчить, має бути забитий."