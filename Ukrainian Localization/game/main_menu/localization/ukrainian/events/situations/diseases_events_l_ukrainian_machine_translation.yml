l_english:
  diseases.1.title: "Новий Спалах"
  diseases.1.desc: "Мешканці [location_scope.GetName] впадають у відчай, коли їхні родини та сусіди піддаються невпинному спалаху [disease.GetName], що нині шириться по всій окрузі. Квартали, що колись вирували життям, тепер відлунюють тривогою та невизначеністю.\n\nНа жаль, ми мало що можемо зробити, аби зупинити поширення хвороби на нашу територію."
  diseases.1.a: "[ROOT.GetCountry.Custom('common_string_negative')]"