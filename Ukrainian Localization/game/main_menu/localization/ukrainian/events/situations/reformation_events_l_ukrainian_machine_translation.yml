l_english:
  reformation.1.title: "Лютеранська Реформація"
  reformation.1.desc: "Думки несхвалення щодо Римської [GetUniqueInternationalOrganization('catholic_church').GetName] поширюються по всій [ShowContinentName('europe')] після зростання практики індульгенцій, що викликає питання щодо жадібності Церкви.\n\nХоча ці звинувачення поки що залишалися досить широкими та загальними, певний інцидент у [target_location.GetName] спонукав скромного ченця на ім'я [target_character.GetName] написати та опублікувати тезу про природу істинного поклоніння та природу нашої віри. [target_character.GetSheHe|U] конкретно націлений на продаж індульгенцій, ганьблячи їх як жадібні та непотрібні, а також оскаржуючи авторитет [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle] продавати те саме прощення, яке може дарувати лише Бог."
  reformation.1.a: "Лише час покаже, що це може принести."
  reformation.2.title: "Переклад Біблії"
  reformation.2.desc: "Священник у [ROOT.GetCountry.GetCapital.GetName] переклав Біблію на [ROOT.GetCountry.GetCourtLanguage.GetName] і почав розповсюджувати її копії по сусідніх селах по всій [ROOT.GetCountry.GetName]. Вони стверджують, що переклад Біблії іншими мовами, ніж [ROOT.GetCountry.GetLiturgicalLanguage.GetName], дає людям найкращий ресурс для пізнання Бога мовою, яка промовляє до їхніх розумів і сердець. Однак Церква протистоїть цьому, оскільки це явно суперечить волі Божій!"
  reformation.2.a: "Єресь! Спалити священика та його книги!"
  reformation.2.b: "Чудові новини! Поширюйте ці Біблії далеко й широко"
  reformation.3.title: "Реформатор [target_character.GetNameWithNoTooltip]"
  reformation.3.desc: "Реформація охопила [ShowContinentName('europe')] полум'ям! Теологи в кожному [ShowBuildingTypeName('university')] та кожній церкві не мають іншої теми, окрім як коментувати працю [target_luther.GetName].\n\nНа нашій власній території, в установах [target_location.GetName], виникла група реформаторів, очолювана [target_character.GetName]. [target_character.GetSheHe|U] проповідує про корупцію [ShowReligionName('catholic')] та про нагальну потребу реформ не лише в [ROOT.GetCountry.GetName], але й у [GetInternationalOrganization('catholic_church').GetName], з підтримкою чи без підтримки всієї Церкви."
  reformation.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  reformation.12.title: "Переконання [target_character.GetNameWithNoTooltip]"
  reformation.12.desc: "Те, що колись було шепотом пліток у [ROOT.GetCountry.GetGovernment.GetCourtTitle], тепер виявилося прямим зізнанням [target_character.GetHerHim]. [target_character.GetSheHe|U], здається, більше не може проголошувати [target_character.GetHerHis] віру в єдиного істинного [ROOT.GetCountry.GetReligion.GetGodName] і натомість захоплюється єресями."
  reformation.12.a: "[target_character.GetSheHe|U] вільний обирати [target_character.GetHerHis] сповідання."
  reformation.12.b: "Ми повинні порадити [target_character.GetHerHim] покинути країну."
  reformation.13.title: "Вихід з [target_location.GetNameWithNoTooltip]"
  reformation.13.desc: "Люди [target_location.GetName] більше не відчувають, що мають майбутнє в нашій країні через наші релігійні розбіжності. Проповіді місцевого священика [target_location.GetNameWithNoTooltip] більше не знаходять відгуку, і деякі вже почали залишати цю територію в пошуках більш сприятливих умов."
  reformation.13.a: "Скатертиною дорога цим єретикам!"
  reformation.13.b: "Замінити священика, щоб догодити їм."
  reformation.14.title: "Єретик у нашому [ShowBuildingTypeNameWithNoTooltip('university')]"
  reformation.14.desc: "[target_character.GetName], досить важливий член нашого [ShowBuildingTypeName('university')] у [target_location.GetName], публічно сповідує [target_character.GetReligion.GetName], а [target_character.GetHerHis] вчення відображають думки, які навряд чи відповідають [ROOT.GetCountry.GetReligion.GetAdjective] доктрині. Якщо ми не усунемо [target_character.GetHerHim] з [target_character.GetHerHis] посади, це може перетворити [ShowBuildingTypeNameWithNoTooltip('university')] [target_location.GetNameWithNoTooltip] на бастіон єресі в майбутньому."
  reformation.14.a: "У [ShowBuildingTypeNameWithNoTooltip('university')] немає місця для єретиків."
  reformation.14.b: "[target_character.GetSheHe|U] не становить жодної загрози нашій вірі."
  reformation.15.title: "[ShowBuildingTypeNameWithNoTooltip('monastery')] приєднується до Реформації"
  reformation.15.desc: "[ShowBuildingTypeName('monastery')] у [target_location.GetName] добровільно приєднався до Реформації! Ченці, які раніше населяли маєток, перепрофілювали будівлю як центр [ShowReligionAdjective('lutheran')] вчень. Ці [ShowBuildingTypeName('lutheran_preachers')] можуть розірвати єдність нашої країни своїми єресями, якщо нічого не зробити!"
  reformation.15.a: "Ми просто побудуємо новий [ShowBuildingTypeNameWithNoTooltip('monastery')]."
  reformation.15.b: "Ми не зацікавлені в тому, щоб їх турбувати."
  reformation.15.c: "Єзуїти завжди шукають більше роботи!"
  reformation.16.title: "Світські потреби Реформації"
  reformation.16.desc: "Хоча ми зробили найрадикальніші кроки до прийняття ідей [target_luther.GetName] і стверджуємо, що є резиденцією деяких найважливіших реформаторів нашого часу, наша робота не може бути завершена цим. Реформатори, як і [target_luther.GetNameWithNoTooltip] [target_luther.GetHerselfHimself], часто борються за фінансові кошти для продовження своєї роботи. Ми повинні підтримати їх, якщо ми справді зацікавлені в виживанні [ShowReligionName('lutheran')]."
  reformation.16.a: "Дайте їм те, що вони просять."
  reformation.16.b: "Бог, безсумнівно, забезпечить їх."