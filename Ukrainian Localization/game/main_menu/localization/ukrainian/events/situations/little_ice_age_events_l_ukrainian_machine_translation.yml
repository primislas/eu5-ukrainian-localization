l_english:
  little_ice_age.1.title: "Малий льодовиковий період"
  little_ice_age.1.desc: "Останні роки принесли низку зим, значно суворіших, ніж зазвичай. Неврожаї, голод та наступаючий холод зробили життя в [ROOT.GetCountry.GetLongName] справжнім випробуванням. Посеред цього наші хлібороби почали помічати менші врожаї, оскільки комори небезпечно порожніють. Народ не відає, який гріх спричинив такий божественний гнів, але, на жаль, ми зберігаємо надію, що сонце повернеться до своєї повної слави."
  little_ice_age.1.historical_info: "Відзначений низкою періодів похолодання, що охопили значну частину Північної півкулі, початок #italic Малого льодовикового періоду#!, ймовірно, був спричинений поєднанням факторів, включаючи зниження сонячної активності, збільшення вулканічних вивержень та зміни океанських течій. Зі зниженням температури настали довші та суворіші зими, що призвело до унікальних подій, таких як замерзання Темзи в Лондоні, що збіглося з вулканічною зимою, спричиненою виверженням Уайнапутіни. У поєднанні з голодом по всій Європі цей період відомий одними з найнижчих температур за кілька століть."
  little_ice_age.1.a: "З невеликою молитвою ми побачимо кращі дні, незабаром..."
  start_of_little_ice_age_tt: "Зими триватимуть довше, а запаси [Concept('food', 'CONCEPT_PLACEHOLDER')|e] постраждають, оскільки #italic голод#! та #italic нестача#!, ймовірно, з'являться протягом цього періоду"
  little_ice_age.100.title: "Кінець Малого льодовикового періоду"
  little_ice_age.100.desc: "Десятиліття після того, як наш світ почав замерзати, ми все ще боремося з голодом та виробництвом їжі. Попри негаразди, спричинені [ShowSituationName('little_ice_age')], ми вижили, подолавши останню перешкоду в низці труднощів. Крижаний ландшафт по всьому нашому [ROOT.GetCountry.GetFlavorRank], можливо, ще не повністю відступає, але найгірша частина позаду. Життя було досить суворим, оскільки врожаї постійно гинули, загроза голоду підштовхнула багатьох на межу відмови від своєї людяності. Попри це, ми зустрічаємо наступний день з теплою посмішкою та наміром вистояти!"
  little_ice_age.100.a: "Ми дивимося в бік тепліших днів, потроху."
  end_of_little_ice_age_tt: "Наші [Concept('areas', 'CONCEPT_PLACEHOLDER')|e] більше не будуть страждати від тривалої [Concept('winter', 'CONCEPT_PLACEHOLDER')|e]. Це завершує [ShowSituationNameWithNoTooltip('little_ice_age')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"