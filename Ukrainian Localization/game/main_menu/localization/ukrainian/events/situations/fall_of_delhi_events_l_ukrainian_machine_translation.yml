l_english:
  delhi_situation.1.title: "Розтягнуті віжки влади"
  delhi_situation.1.desc: "Колеса влади колись були прихильними до нас. Наші попередники, POSTEDIT_Халджі, впали під натиском нашої династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] у 1320 році. Відтоді величезні простори земель в $india$ підкорилися нашій могутності. Однак, з плином часу, ми втратили прихильність нашого народу. Ті, кому ми колись дарували милості та намісництва, тепер стали зміями в траві, вичікуючи свого часу та розшифровуючи історію нашого знищення.\n\nПопереду на нас чекає бурхливий і небезпечний шлях. Виживання нашого великого [GetCountry('DLH').GetFlavorRank] висить на волосині між знищенням та повним пануванням. Насувається буря..."
  delhi_situation.1.a: "Ми переживемо цю бурю."
  delhi_situation.2.title: "Насувається буря"
  delhi_situation.2.desc: "Звістки про слабкість колись великої династії [GetCountry('DLH').GetGovernment.GetRuler.GetDynasty.GetName] дійшли до наших вух у [target_capital.GetName]. Попереду на нас чекає складний вибір. Ми могли б набратися мужності та виступити проти загарбників [GetCountry('DLH').GetName]. Такий крок, безумовно, розгнівав би їх і ризикував би накликати їхній гнів. Однак багато наших радників вважають, що гігант сповільнився і занепав, перемога вислизнула від них, і тому вони палко підтримують ідею протистояння такій силі в надії, що нам вдасться розширити наші володіння."
  delhi_situation.2.a: "Терпіння, наш час настане."
  delhi_situation.2.b: "Ми простягнемо руку допомоги в їхній скрутний час."
  delhi_situation.2.c: "Поки що не будемо втручатися..."
  side_with_opposers_tt: "Ми станемо #R проти#! [GetCountry('DLH').GetNameWithNoTooltip] у [GetSituationByKey('fall_of_delhi').GetName] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  side_with_delhi_tt: "Ми станемо #G на бік#! [GetCountry('DLH').GetNameWithNoTooltip] у [GetSituationByKey('fall_of_delhi').GetName] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  delhi_situation.3.title: "Найтемніша година"
  delhi_situation.3.desc: "На жаль, роки занепаду, безгосподарності та надмірного розширення нашої королівської влади призвели до цього моменту. Ненавмисно і з темними бажаннями, ті, хто бажає поживитися нашими землями, вийшли з тіні і проголосили свої наміри. Наступні кілька десятиліть, безсумнівно, будуть сповнені небезпек, оскільки лише наша віра та майстерність допоможуть нам вистояти.\n\nПроте ми гордий народ, чия спадщина – це завоювання величезної імперії, якої, ймовірно, наша історія ще не бачила. Ми не загинемо без бою!"
  delhi_situation.3.a: "Найгірше ще попереду..."
  dlh_situation_commences_tt: "Деякі з наших сусідів та підданих вирішили взятися за зброю проти нас. Якщо ми переможемо їх або успішно захистимо наш суверенітет, це значно допоможе нам пережити цю катастрофу."
  delhi_situation.4.title: "Спадкоємці [GetCountry('DLH').GetNameWithNoTooltip]"
  delhi_situation.4.desc: "Великого звіра вбито! Десятиліттями генерали-завойовники [GetCountry('DLH').GetName] сіяли руйнування по всій $india$. Як поранений тигр, вони чіплялися і відчайдушно трималися за свою згасаючу владу, оскільки їхні території повільно ставали здобиччю сусідніх воєначальників. Тепер регіон лежить у руїнах і хаосі, але настав час наступників минулої імперії, готових викарбувати своє ім'я в книгах історії..."
  delhi_situation.4.a: "Наш час настав!"
  dlh_double_duration_tt: "Оскільки [ShowSituationName('fall_of_delhi')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] завершилася, поки ми очолювали опозицію до [GetCountry('DLH').GetNameWithNoTooltip], тривалість [ShowModifierWithNoTooltip('dlh_heirs_of_delhi_modifier')] подвоюється."
  delhi_situation.5.title: "Гіркий кінець"
  delhi_situation.5.desc: "Наш [ROOT.GetCountry.GetFlavorRank] зростав протягом століть, невпинно розширюючи свою територію. На жаль, схоже, ми втратили божественну прихильність. Оскільки наші території повільно розпадаються і вислизають з наших рук, ми стоїмо на краю найнебезпечнішої катастрофи нашого народу. Ніхто не наважується вгадати, що може принести майбутнє, оскільки ми зберігаємо лише достатньо надії на світле майбутнє..."
  delhi_situation.5.a: "Як могутні впали..."
  delhi_situation.6.title: "Влада відновлена"
  delhi_situation.6.desc: "Через випробування та негаразди наш великий народ був випробуваний віками. Катастрофи, лиха та армія іноземних завойовників не змогли придушити яскраве світло, яке ми несемо в собі. Друзів, які прагнули захистити нас під час нашої нестабільності, ми винагородимо. Тих, хто прагнув протистояти нам і вкрасти наше, ми познайомимо з мечем..."
  delhi_situation.6.a: "Наше правління знову беззаперечне!"
  delhi_situation.7.title: "Втручання опонентів"
  delhi_situation.7.desc: "Наші легендарні завоювання по всій $india$ принесли нам велику кількість [ShowReligionGroupAdjective('dharmic')] підданих та ворогів. Наша адміністрація розтягнулася далеко за межі своїх можливостей, що призвело до того, що наші прикордонні території стали практично незалежними та вийшли з-під нашого контролю. Водночас ті, хто прагне протистояти нам і спровокувати наше падіння, почали діяти в тіні, плануючи нашу загибель..."
  delhi_situation.7.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  until_end_of_fod_situation_tt: "тривалість [ShowSituationName('fall_of_delhi')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  delhi_situation.8.title: "Назріває повстання"
  delhi_situation.8.desc: "Недавні заворушення по всьому нашому володінню, безсумнівно, є результатом зовнішнього втручання. Останньою провінцією, що повстала, є не хто інший, як [target_province.GetName], чиї місцеві видатні члени відкинули нашу владу збройним шляхом. Цього не можна допустити, ми повинні негайно розгромити цих вискочнів!"
  delhi_situation.8.a: "Їх змусять стати на коліна."
  delhi_situation.8.b: "Надати їм автономію під короною."
  target_province_debuffs_dlh_tt: "[Concept('target_province.GetNameWithNoTooltip] матиме свій [control', 'CONCEPT_PLACEHOLDER')|e] зменшений на [ShowNamedValue('control_mild_penalty')|+=2%], а його населення втратить [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  delhi_situation.9.title: "Втрачаємо контроль"
  delhi_situation.9.desc: "Коли ми вирішили протистояти [GetCountry('DLH').GetName] і взяти меч проти них, ми ніколи не думали про той день, коли інший рівний нам перевершить нас. До нашої уваги дійшло, що наше ім'я більше не викликає престижу та поваги, коли про нього говорять ті, хто бажає бачити падіння [GetCountry('DLH').GetAdjectiveWithNoTooltip] [GetCountry('DLH').GetFlavorRank]. На жаль, сподіваємося, що це лише перешкода, яку ми повинні подолати, а не наш остаточний кінець..."
  delhi_situation.9.a: "Наша сила слабшає..."
  delhi_situation.10.title: "Зміна варти"
  delhi_situation.10.desc: "Величезна влада, яку колись тримав [GetCountry('DLH').GetName], тепер лише тінь свого колишнього \"я\". Змінювані припливи дипломатії та війни знову сприяли нам. В результаті, наше ім'я тепер на вустах у всіх, коли говорять про людей, найбільш готових замінити [GetCountry('DLH').GetAdjectiveWithNoTooltip] [GetCountry('DLH').GetFlavorRank] як наступного могутнього домінатора величезних регіонів під їхнім контролем..."
  delhi_situation.10.a: "Наш час настав!"
  delhi_situation.11.title: "Велика перемога для [target_country.GetNameWithNoTooltip]"
  delhi_situation.11.desc: "Попри зухвалу поведінку тих, хто бажає нам протистояти, істина, що влада говорить найголосніше, залишається незмінною. Вкотре ми успішно розгромили наших ворогів і остаточно довели, що ми не тільки не повністю занепали, але й рішуче здатні захищати свій титул і територію як володарі $india$."
  delhi_situation.11.a: "Наше панування не буде оскаржене!"
  lose_1_sop_tt: "Наша [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] зменшиться на #R -1%#!"
  lose_5_sop_tt: "Наша [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] зменшиться на #R -5%#!"
  gain_1_sop_tt: "Наша [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] збільшиться на #G +1%#!"
  gain_5_sop_tt: "Наша [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] збільшиться на #G +5%#!"
  gain_3_sop_tt: "Наша [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] збільшиться на #G +3%#!"
  opposers_lose_5_sop_tt: "[Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] наших опонентів постраждає на #R -5%#!"
  opposers_lose_1_sop_tt: "[Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] наших опонентів постраждає на #R -1%#!"
  delhi_situation.12.title: "Перемога над [target_country2.GetNameWithNoTooltip]"
  delhi_situation.12.desc: "Правда, що велетні не падають за один день. Однак сьогодні знаменує віху, що закріплює занепад, який охопив зали [GetCountry('DLH').GetName]. Наша нещодавня перемога за їхній рахунок породила шепіт і чутки, що говорять про кінець їхнього великого [GetCountry('DLH').GetFlavorRank]. Наше єдине бажання, щоб наше сходження до величі було збудоване на їхній загибелі!"
  delhi_situation.12.a: "Їхній кінець наближається..."
  delhi_loses_opposers_gain_1_tt: "Наш [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] збільшиться на #G 5%#! за рахунок [Concept('target_country2.GetNameWithNoTooltip]. Якщо він досягне #R 50%#!, [disaster', 'CONCEPT_PLACEHOLDER')|e] [ShowDisasterName('dissolution_of_delhi')] може статися для [target_country2.GetNameWithNoTooltip]"
  delhi_situation.13.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Чинить опір нашому правлінню"
  delhi_situation.13.desc: "Стан наших справ, без сумніву, далекий від ідеального. Мандрівні розбійники, що маскуються під членів [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], почали відкрито критикувати та протистояти нашим адміністративним рішенням на місцевому рівні. Насправді, вони палко вимагають, щоб ми віддавали їм перевагу над іншими фракціями при дворі, крок, який, безумовно, був би для нас дорогим, не кажучи вже про створення небезпечного прецеденту..."
  delhi_situation.13.a: "Ми поступимося."
  delhi_situation.13.b: "Вони забули, кому служать!"
  delhi_situation.14.title: "Дипломатичні кроки [target_country.GetNameWithNoTooltip]"
  delhi_situation.14.desc: "Поведінка [target_country.GetAdjective] дипломатів при нашому дворі досягла критичної точки. Вигукування образ на адресу наших придворних та образи наших релігійних традицій переросли у відкриті заяви про суперництво та ворожість. Досить сказати, що відносини між нами та [target_country.GetLongNameWithNoTooltip] досягли найнижчої точки, оскільки вони заявили про свою готовність протистояти нам у наших спробах контролювати величезні регіони під нашим пануванням..."
  delhi_situation.14.a: "Негайно вимагати офіційних вибачень!"
  delhi_situation.14.b: "Ми мусимо це терпіти..."
  potential_ramifications_tt: "#R Це може мати дипломатичні наслідки між нами та країнами, які вже протистоять нам#!"
  delhi_lose_half_percentage_support_tt: "Наш [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] зменшиться на #R -0.5%#!"
  opposers_gain_1_percentage_support_tt: "[Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e] наших опонентів збільшиться на #R +0.5%#!"
  delhi_situation.15.title: "Дипломатичні тертя з [target_country2.GetNameWithNoTooltip]"
  delhi_situation.15.desc: "До нашої уваги дійшло, що наша присутність у дипломатичних каналах [target_country2.GetLongName] викликала заворушення. Які б спроби умиротворення та примирення ми не робили, вони обертаються проти нас через відверто брутальну природу цих зовнішніх завойовників. Стало абсолютно зрозуміло, що вони не зацікавлені у підтримці миру і навіть зайшли так далеко, що вимагають офіційних вибачень за нібито непристойну поведінку наших дипломатів під час їхнього перебування при їхньому дворі!"
  delhi_situation.15.a: "Вони б не посміли..."
  delhi_situation.15.b: "Це не та дипломатична авантюра, яку ми можемо собі дозволити."
  delhi_damages_relations_with_several_countries_tt: "Відносини між [target_country2.GetNameWithNoTooltip] та кількома могутніми країнами, що їм протистоять, погіршаться внаслідок їхньої агресивної політики щодо нас, тим самим посилюючи їхню опозицію."
  delhi_situation.16.title: "Наша влада руйнується"
  delhi_situation.16.desc: "Протягом років наша адміністрація робила кілька спроб придушити заворушення та знайти рішення для проблем наших різноманітних підданих. Однак нещодавні події підтвердили думку, що наш великий [GetCountry('DLH').GetFlavorRank] може наближатися до свого кінця...\n\nУ міру зростання могутності тих, хто нам протистоїть, наша влада згасає і слабшає, ефективно перетворюючись на тінь свого колишнього \"я\". Попереду нас чекають темні часи, і багато впливових голосів при нашому дворі в [ROOT.GetCountry.GetCapital.GetName] виступають за те, щоб просто відпустити наші землі, вважаючи, що боротьба за них навряд чи варта будь-яких зусиль."
  delhi_situation.16.a: "У нас немає вибору..."
  delhi_situation.16.b: "Ситуація ще може покращитися!"
  end_situation_badly_tt: "[Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [ShowSituationName('fall_of_delhi')] закінчиться"
  we_will_lose_all_cores_tt: "Ми відмовимося від усіх [Concept('cores', 'CONCEPT_PLACEHOLDER')|e] в $india$, якими ми не володіємо безпосередньо"
  gain_10_progress_for_claimants_tt: "Наші вороги отримають #R +10%#! #Y Частки влади#! під час [GetSituationByKey('fall_of_delhi').GetName] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  powerful_warlords_will_rise_tt: "Могутні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] заповнять вакуум влади після нашого падіння в $india$"
  delhi_situation.17.title: "Іригаційні роботи через Ямуну"
  delhi_situation.17.desc: "Річка Ямуна здавна була джерелом життя для сільського господарства та торгівлі на наших землях. Визнаючи її потенціал, наші радники та місцеві губернатори бажають здійснити масштабні іригаційні проєкти в [target_province.GetName], щоб забезпечити процвітання її полів та добробут її народу. Покращене водопостачання, безсумнівно, збільшить місцеві врожаї, зменшить ризики голоду та зміцнить нашу владу над провінцією та в [target_province_capital.GetName], столиці провінції, чий народ радітиме."
  delhi_situation.17.a: "Фінансувати іригаційні роботи."
  delhi_situation.17.b: "Ми не можемо собі цього дозволити."
  dev_gain_scales_with_control_and_prov_capital_gains_pop_satisfaction_tt: "Отриманий [Concept('development', 'CONCEPT_PLACEHOLDER')|e] залежатиме від [Concept('control', 'CONCEPT_PLACEHOLDER')|e] кожної [Concept('location', 'CONCEPT_PLACEHOLDER')|e]\nНаші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_province_capital.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  delhi_situation.18.title: "Найманці зі Сходу"
  delhi_situation.18.desc: "Могутні кінні володарі та воїни завжди були затребувані для служби та захисту кордонів нашого [ROOT.GetCountry.GetFlavorRank]. Оскільки ми прагнемо зберегти наш контроль над нашими територіями, стало очевидним, що ми можемо значно виграти від зовнішньої допомоги.\n\nНа щастя, групи [ShowCultureGroupName('mongolian_group')] вершників, які нещодавно навернулися до нашої віри, бажають мігрувати та знайти новий дім навколо нашої столиці, в [ROOT.GetCountry.GetCapital.GetName]. Хоча наші радники застерігають нас від надмірної залежності від людей, які воюють за монету, це, можливо, шанс, який ми не можемо проґавити."
  delhi_situation.18.a: "Запропонувати їм новий дім."
  delhi_situation.18.b: "Нам байдуже до такого втручання сторонніх."
  mongol_converts_name: "[ShowCultureGroupNameWithNoTooltip('mongolian_group')] Новонавернені"
  delhi_situation.18.historical_info: "На початку історії Делійського султанату монгольські набіги становили загрозу, проте багато монголів дезертирували або були захоплені та інтегровані до війська. Їхні військові навички, особливо у верховій їзді та степовій війні, посилили кавалерію Султанату, деякі з них стали частиною елітних полків. З часом багато монголів навернулися до ісламу, прийнявши місцеві культурні та адміністративні практики. Деякі з них далі займали стратегічні посади, вливаючись у бюрократичні та дипломатичні системи та приносячи цінні знання завдяки своєму унікальному походженню."
  delhi_situation.19.title: "Дипломатія з [target_country.GetNameWithNoTooltip]"
  delhi_situation.19.desc: "Поки ми боремося, щоб стримати наших ворогів на всіх фронтах, важливо не нехтувати нашими дипломатичними зусиллями. Нещодавно посланці з [target_country.GetName] прибули до [ROOT.GetCountry.GetCapital.GetName], пропонуючи дивовижний шлях до співпраці в обмін на монету. Хоча дехто розглядає це як підступну спробу пограбувати нас, інші вважають, що задоволення цих вимог є яскравою демонстрацією нашого багатства та могутності."
  delhi_situation.19.a: "Подарунок на знак нашої великодушності."
  delhi_situation.19.b: "Прогнати їх."
  delhi_situation.20.title: "Піднесення Хабші"
  delhi_situation.20.desc: "Правда, що жодна людина не може бути господарем своєї долі протягом усього життя. Це ще більш очевидно для тих, кого жорстока доля кинула в рабство. Однак, на відміну від більшості рабів зі [ShowSubContinentName('east_africa')], хабші повільно здобувають вплив у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Грамотні в адміністративних питаннях та обдаровані у військовій справі, вони поступово стають невід'ємною частиною нашого [ROOT.GetCountry.GetFlavorRank]. Зразковий [target_character2.GetWomanMan] такого походження на ім'я [target_character2.GetName] нещодавно з'явився, готовий вірно служити нам."
  delhi_situation.20.historical_info: "Хабші, африканці, що походили з Абісинії, вперше прибули до Індії як військові раби та слуги за ранніх ісламських правителів. Хоча деякі, як Джамал-уд-Дін Якут, здобули популярність у Делі, їхній значний політичний вплив виявився пізніше — особливо в Бенгалії в середині XV століття. Піднявшись від рабства до влади, ці грізні солдати та адміністратори залишили незгладимий слід в історії субконтиненту, символізуючи унікальне злиття африканської спадщини з південноазіатською культурою та політикою."
  delhi_situation.20.a: "Вони стануть цінними активами в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  periodically_gain_habshi_advisors_tt: "Поки ця [Concept('estate_privilege', 'CONCEPT_PLACEHOLDER')|e] залишається активною, обдаровані раби хабші з'являтимуться через [Concept('events', 'CONCEPT_PLACEHOLDER')|e] протягом [ShowSituationName('fall_of_delhi')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  delhi_situation.21.title: "[target_character.GetNameWithNoTooltip]"
  delhi_situation.21.desc: "Прибуття рабів хабші значно принесло користь нашому зростаючому [ROOT.GetCountry.GetFlavorRank]. Від здібних адміністраторів до грізних генералів, вони продовжують залишати значний слід. Однією з таких особистостей є [target_character.GetName], чиї добре розвинені навички, безсумнівно, будуть великою цінністю як [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle]."
  delhi_situation.21.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  great_diplomat_tt: "Завдяки [Concept('target_character.GetHerHis] [dip', 'CONCEPT_PLACEHOLDER')|e], [target_character.GetShortNameWithNoTooltip] стане великим дипломатом, і як наслідок:"
  great_person_tt: "Завдяки [Concept('target_character.GetHerHis] [total_ability', 'CONCEPT_PLACEHOLDER')|e], [target_character.GetShortNameWithNoTooltip] буде легендарним [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle], і як наслідок:"
  great_administrator_tt: "Завдяки [Concept('target_character.GetHerHis] [adm', 'CONCEPT_PLACEHOLDER')|e], [target_character.GetShortNameWithNoTooltip] засяє як адміністратор, і як наслідок:"
  great_general_tt: "Завдяки [Concept('target_character.GetHerHis] [mil', 'CONCEPT_PLACEHOLDER')|e], [target_character.GetShortNameWithNoTooltip] покращить нашу армію, і як наслідок:"
  delhi_situation.22.title: "Скрутне становище [target_rebel.GetNameWithNoTooltip]"
  delhi_situation.22.desc: "Буремний період, що розгорнувся за останні кілька років, призвів до того, що багато наших людей підняли прапори повстання проти нас. Через боротьбу, кров і піт вони прагнуть скасувати наші славетні завоювання минулого та спричинити падіння [ROOT.GetCountry.GetFlavorRank].\n\nОстанні події в наших кордонах свідчать про потужне повстання, [target_rebel.GetName]. Підтримувані популістською риторикою та прагнучи взятися за меч, вони висувають нам чіткі вимоги. За словами їхніх посланців, ми повинні негайно підкоритися їхнім вимогам, інакше ризикуємо відкритою непокорою."
  delhi_situation.22.a: "Ми повинні задовольнити їхні вимоги."
  delhi_situation.22.b: "Відкупитися від їхніх прихильників."
  delhi_situation.22.c: "Це явно нижче нашої гідності."
  every_supporting_pop_gains_25_satisfaction: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], що слідує за [target_rebel.GetNameWithNoTooltip], отримає [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]. Це може ефективно припинити [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e] залежно від [ShowModifierTypeName('pop_leave_rebels_threshold')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"