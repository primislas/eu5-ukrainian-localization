l_english:
  red_turban_rebellions.1.title: "[ShowSituationNameWithNoTooltip('red_turban_rebellions')]"
  red_turban_rebellions.1.desc: "У 1328 році держава [target_country.GetName] стала свідком великого фракційного конфлікту між прихильниками [target_country.GetCulture.GetName] володарів та групою послідовників [ShowPolicyName('confucianism_policy')] з [ShowCultureGroupName('chinese_group')], що завершився перемогою [target_ruler.GetName]. Однак це було лише зерно, що заклало основу для майбутньої бурі.\n\nБрак безпеки та віри в [target_country.Custom('GetRulerOrRegentTitle')], а також жорстоке оподаткування, втрата стабільності в державі та стихійні лиха обурили [target_country.GetAdjectiveWithNoTooltip] підданих [target_country.GetGovernment.GetRulerTitle]. [ShowReligionAdjective('mahayana')] монах, [target_character.GetName], зібрав тих, хто виступає проти способу [target_country.GetFlavorRank] поводження з [ShowCultureGroupNameWithNoTooltip('chinese_group')]. Так починаються [ShowSituationName('red_turban_rebellions')]..."
  red_turban_rebellions.1.a: "Лише незначне повстання. Вони скоро дізнаються своє місце."
  red_turban_rebellions.1.a.tt: "[ShowSituationName('red_turban_rebellions')] починаються. Протягом наступних #Y 20 років#! [target_country.GetName] зіткнеться з #R воєначальниками#!, що відриваються від держави. Щоб вирішити ситуацію, кожен воєначальник має бути або відвойований, або підкуплений, щоб стати #Y лоялістом#! [target_country.GetNameWithNoTooltip]. Крім того, для припинення [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] потрібно #Y 90#! [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e], #Y 30#! [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] та #Y 50#! Небесної влади."
  red_turban_rebellions.1.a.at: "Кожна [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] країна отримує [ShowNamedValue('liberty_desire_severe_plus')|-=2] [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e]"
  red_turban_rebellions.2.a: "Що може статися з Мандатом?"
  red_turban_rebellions.release_tag.title: "Повстання [target_country.GetNameWithNoTooltip]"
  red_turban_rebellions.release_loyalist.title: "Лоялісти [target_country.GetNameWithNoTooltip]"
  red_turban_rebellions.release_culture.title: "Повстання [target_culture.GetNameWithNoTooltip]"
  red_turban_rebellions.3.desc: "Хоча його переслідували наші урядові органи, [GetCharacter('chi_yingyu_peng').GetName] вдалося втекти від заслуженої страти та поширити свої вчення в подальших частинах наших земель, зрештою досягнувши [target_location.GetRank.GetName] [target_location.GetName]. [target_character.GetName] та його радник, [target_character_2.GetName], були натхненні монахом і зібрали навколо себе незадоволених селян.\n\nЦі повстанці тепер проголошують кінець династії [ROOT.GetCountry.GetName] і називають себе династією [target_country.GetName] – попередницею нинішнього [ShowCultureName('mongolian_culture')] правління над $china$."
  red_turban_rebellions.3.a: "Їхні претензії не захистять їх від [ROOT.GetCountry.GetAdjectiveWithNoTooltip] гніву!"
  red_turban_rebellions.4.desc: "Поки [GetInternationalOrganizationType('red_turban_rebels').GetName] ведуть свою боротьбу проти нас на основних територіях [ShowCultureGroupNameWithNoTooltip('chinese_group')], [target_culture.GetName] народ [target_location.GetName] бачить можливість вирватися з наших рук. [target_character.GetName] зібрав тих, хто присягає на вірність [target_character.GetHimHer], і оголосив державу [target_country.GetName] у відкритому повстанні проти [ROOT.GetCountry.GetCulture.GetName] правління."
  red_turban_rebellions.4.a: "[target_character.GetHisHer|U] голова полетить за це..."
  red_turban_rebellions.5.desc.peng: "[ShowSituationName('red_turban_rebellions')] лютують, а [monk_character.GetName] продовжує уникати покарання. [monk_character.GetHeShe|U] та [monk_character.GetHisHer] головний військовий послідовник, [target_character_1.GetName], зуміли втекти до [target_location.GetName], де вони знайшли торговця тканинами [target_character.GetName]. Завдяки харизматичності [target_character.GetNameWithNoTooltip], монах та [monk_character.GetHisHer] послідовники вирішили перетворити скромного торговця на номінального лідера повстання [target_country.GetName]."
  red_turban_rebellions.5.desc: "[GetCharacter('chi_yingyu_peng').GetName] мертвий, проте [GetCharacter('chi_yingyu_peng').GetHisHer] вплив у триваючих [ShowSituationName('red_turban_rebellions')] не припинився. [GetCharacter('chi_yingyu_peng').GetHisHer|U] найнадійніший військовий радник, [target_character_1.GetName], знайшов нового лідера в торговці тканинами [target_character.GetName] для продовження повстання. Разом вони проголосили піднесення нової, конкуруючої держави династії [target_country.GetName]."
  red_turban_rebellions.5.a: "Цей монах стає справжньою неприємністю..."
  red_turban_rebellions.6.desc: "Бурхливі часи настали не лише на наших землях, а й у наших заклятих ворогів. $red_turban_rebellions.34.desc$"
  red_turban_rebellions.6.a: "Принаймні у воєначальників теж є свої внутрішні проблеми..."
  red_turban_rebellions.7.desc: "[ShowSituationName('red_turban_rebellions')] лютують по всьому $china$. Сміливі воєначальники проголошують себе спадкоємцями минулих династій, починаючи відкриті повстання та кидаючи виклик [GetCountry('CHI').GetAdjective] владі. Серед цих повстанців є бандити, які бачать можливість у нашому слабшаючому контролі над $china$: [target_character.GetName] та 18 [target_character.GetHisHer] послідовників втекли до [target_location.GetName] і зайнялися розбійництвом. Протягом кількох тижнів [target_character.GetNameWithNoTooltip] набрав ще тисячі бандитів, і незабаром [target_character.GetSheHe] оголосив про заснування [target_country.GetName]."
  red_turban_rebellions.7.a: "Це лише тимчасова невдача."
  red_turban_rebellions.8.desc: "Поки бандити грабують внутрішні райони, [target_location.GetRank.GetName] [target_location.GetName] та її прилеглі прибережні землі страждають від рук [target_character.GetName] та [target_character.GetHisHer] піратів. Незважаючи на всі зусилля [GetCountry('CHI').GetAdjective], [target_location.GetNameWithNoTooltip] повністю вийшов з-під контролю [GetCountry('CHI').GetCulture.GetName] і став столицею новоствореної [target_country.GetName]."
  red_turban_rebellions.8.a: "Піратська смерть буде [target_character.GetHisHer]!"
  red_turban_rebellions.9.desc: "Ще один воєначальник прийшов до влади на наших землях! [target_character.GetName] та [target_character.GetHisHer] супутники зайняли [target_location.GetName] і завоювали навколишні землі. [target_character.GetHeShe|U] незабаром після цього проголосив піднесення [target_country.GetName], розпочавши відкрите повстання проти [GetCountry('CHI').GetName]."
  red_turban_rebellions.9.a: "Незначне заворушення, не більше."
  red_turban_rebellions.10.desc: "Після зради [che_youliang_chen.GetName] проти [GetCharacter('ctw_shouhui_xu').GetName], [GetCountry('CHE').GetName] стала регіональною державою та головною загрозою для [GetCountry('CHI').GetName]. Проте не всі схиляють коліна перед [che_youliang_chen.GetNameWithNoTooltip].\n\n[target_character.GetName] відмовляється визнавати [GetCountry('CHE').GetLongNameWithNoTooltip] як могутнього лідера для [GetInternationalOrganizationType('red_turban_rebels').GetName]. У [target_location.GetName] [target_character.GetNameWithNoTooltip] оголосив свою власну [ShowGovernmentReformName('warring_state')] [target_country.GetName], вступивши в конфлікт з [GetCountry('CHE').GetNameWithNoTooltip] та [GetCountry('CHI').GetNameWithNoTooltip].\n\nТим не менш, їхнім головним антагоністом залишається [GetCountry('CHI').GetName], і тому [target_country.GetNameWithNoTooltip] повстає проти [GetCountry('CHI').GetCulture.GetName] правління."
  red_turban_rebellions.10.desc.fallback: "Після зради [che_youliang_chen.GetName] проти [GetCharacter('ctw_shouhui_xu').GetName], [GetCountry('CHE').GetNameWithNoTooltip] стала регіональною державою та головною загрозою для [GetCountry('CHI').GetName]. Проте їхня міць не змогла захистити їх від гніву [GetCountry('CHI').GetName].\n\n[target_character.GetName], свідком жорстокості [GetCountry('CHI').GetCulture.GetName] воїнів, зібрав [target_character.GetHerHis] власних лоялістів, які оголосять свою [ShowGovernmentReformName('warring_state')] [target_country.GetName], повставши проти свого колишнього сюзерена."
  red_turban_rebellions.10.a: "Це, сподіваюся, припинить повстання..."
  red_turban_rebellions.10.b: "Прокляті селяни!"
  red_turban_rebellions.11.desc: "У міру того, як громадянська війна за панування над $china$ просувається, новий воєначальник вирішив оголосити відкрите повстання проти [GetCountry('CHI').GetName]. [target_character.GetName], один з командирів інших повстанських груп, зібрав понад 700 чоловік зі свого села [target_character.GetHisHer] і зайняв [target_location.GetName]. Це знаменує народження [target_country.GetName] і ще один біль у нашому боці..."
  red_turban_rebellions.11.a: "Ситуація стає критичною..."
  red_turban_rebellions.12.title: "Піднесення [target_country.GetNameWithNoTooltip]"
  red_turban_rebellions.12.desc: "[target_character.GetName], колишній жебракуючий монах, який на власні очі бачив жахи [ShowSituationName('red_turban_rebellions')], приєднався до [cgu_zixing_guo.GetName] та [cgu_zixing_guo.GetHisHer] військ, коли його монастир [target_character.GetHisHer] був спалений [GetCountry('CHI').GetAdjective] рейдерами. Під командуванням [cgu_zixing_guo.GetNameWithNoTooltip], [target_character.GetNameWithNoTooltip] проявив [target_character.GetHerselfHimself] себе як компетентний військовий лідер і навіть заслужив руку [mng_xiuying_ma.GetName], прийомної дочки [cgu_zixing_guo.GetNameWithNoTooltip].\n\nДосягнення [target_character.GetNameWithNoTooltip] зрештою принесли [target_character.GetHimHer] командування власним батальйоном військ. Успішне захоплення [target_location.GetName] та навколишньої сільської місцевості дозволило йому оголосити про створення [target_country.GetName], надійного союзника [GetCountry('CGU').GetName]."
  red_turban_rebellions.12.a: "Вони не повинні бути союзниками!"
  red_turban_rebellions.13.desc: "Не всі [ShowCultureGroupName('chinese_group')] є ворогами [ROOT.GetCountry.GetName]. [target_character.GetName], відданий лояліст [ruler_character.GetName] і генерал [ROOT.GetCountry.GetAdjectiveWithNoTooltip] сил, повів [target_character.GetHisHer] війська до [target_location.GetName], щоб заснувати автономну [ShowGovernmentReformName('warring_state')] і очолити контрнаступ проти [GetInternationalOrganizationType('red_turban_rebels').GetName]."
  red_turban_rebellions.13.a: "Нарешті лояліст з ініціативою!"
  red_turban_rebellions.release_loyalist.desc: "Ситуація [ROOT.GetCountry.GetName] є похмурою, але її все ще можна врятувати. Компетентний генерал, [target_character.GetName] запропонував [target_character.GetHisHer] підтримку, щоб протистояти [GetInternationalOrganizationType('red_turban_rebels').GetName], заснувавши [ShowGovernmentReformName('warring_state')] [target_country.GetName] у [target_location.GetName]. Все, що їм потрібно, це слово [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  red_turban_rebellions.release_loyalist.a: "Надати [target_character.GetHimHer] автономію, якої [target_character.GetHeShe] потребує."
  red_turban_rebellions.release_loyalist.b: "Ми не можемо дозволити втратити більше землі, навіть якщо вона дістанеться лоялісту."
  red_turban_rebellions.18.desc: "$red_turban_rebellions.18.desc.fallback$ Одним з таких місць є [target_location.GetRank.GetName] [target_location.GetName], що представляє [target_culture.GetName]. Вони вважають наше правління неадекватним і заснували [ShowGovernmentReformName('warring_state')] [target_country.GetName]. Їхній лідер, [target_character.GetName], навіть погрожує приєднатися до [GetInternationalOrganizationType('red_turban_rebels').GetName], якщо ми не... переконаємо їх інакше."
  red_turban_rebellions.18.desc.fallback: "Влада [ROOT.GetCountry.GetCulture.GetName] над $china$ слабшає ще більше. Території, які колись були під нашою суворою владою, тепер оголошені напівнезалежними через їхню новознайдену автономію."
  red_turban_rebellions.18.a: "Підкупити [target_country.GetNameWithNoTooltip]."
  red_turban_rebellions.18.b: "Нехай буде так..."
  red_turban_rebellions.19.title: "Повстання проти [GetCountry('CHI').GetNameWithNoTooltip]"
  red_turban_rebellions.19.desc: "[ShowGovernmentReformName('warring_state')] [target_country.GetName] є однією з багатьох країн, які оголосили свою автономію від [GetCountry('CHI').GetName]. Наша доля пов'язана з нашими рішеннями залишатися вірними нашому [GetCountry('CHI').GetCulture.GetName] сюзерену, або приєднатися до [GetInternationalOrganizationType('red_turban_rebels').GetName] і спробувати захопити [GetInternationalOrganization('middle_kingdom').GetName] для себе...\n\nЗрештою, доля [target_country.GetNameWithNoTooltip] знаходиться в руках [target_character.GetName] та [target_character.GetHisHer] довірених радників."
  red_turban_rebellions.19.a: "Ми напишемо нову історію!"
  red_turban_rebellions.19.a.tt: "[target_country.GetName] є [ShowGovernmentReformName('warring_state')] і частиною [ShowSituationName('red_turban_rebellions')]. Хоча ми можемо почати як повстанці проти [GetCountry('CHI').GetName], наша дипломатична позиція щодо [GetInternationalOrganizationType('red_turban_rebels').GetName] зображена нашою #Y $rtr_yuan_allegiance$#! (наразі: #Y [target_country.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!). Якщо [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] закінчиться [GetCountry('CHI').GetAdjectiveWithNoTooltip] перемогою, а ми матимемо більше 50 $rtr_yuan_allegiance$, нас буде #R анексовано#! [GetCountry('CHI').GetNameWithNoTooltip]!"
  red_turban_rebellions.20.title: "Селянське повстання"
  red_turban_rebellions.20.desc: "Великі воєначальники $china$ ведуть свою війну проти [ROOT.GetCountry.GetName] з різних причин, проте вони не відображають потреб і бажань простого селянства. Кровопролиття [ShowSituationName('red_turban_rebellions')] призвело до невдоволених рухів селян, які готові оголосити нам власну війну, якщо ми негайно не покращимо їхнє становище."
  red_turban_rebellions.20.a: "Ми не можемо собі цього дозволити."
  red_turban_rebellions.20.b: "Надіслати їм фінансову підтримку."
  red_turban_rebellions.21.title: "Мандат піддано сумніву"
  red_turban_rebellions.21.desc: "Представники [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] спостерігали за занепадом нашої держави та піддають сумніву владу [ROOT.GetCountry.Custom('GetRulerOrRegentTitle')]. Амбітні шляхтичі вже плетуть інтриги проти Небесного Престолу..."
  red_turban_rebellions.21.a: "Ми їх придушимо!"
  noble_enemies_to_the_mandate: "Шляхетні вороги Мандату"
  red_turban_rebellions.21.b: "Надання їм деяких привілеїв може покласти край їхній змові."
  red_turban_rebellions.22.title: "Підтримане правління [target_character.GetNameWithNoTooltip]"
  red_turban_rebellions.22.desc: "З нашою новознайденою незалежністю від [from_country.GetName], [target_country.GetLongName] тепер йде власним шляхом під керівництвом [target_character.GetName]. Багато наших людей виглядають оптимістично щодо [target_character.GetHerHis] правління і присягнули на абсолютну вірність у нашій боротьбі проти [ShowSituationName('red_turban_rebellions')]."
  red_turban_rebellions.22.a: "Лише об'єднані ми зможемо витримати будь-яку боротьбу!"
  red_turban_rebellions.22.a.tt: "Усі наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] отримують максимально можливий рівень [Concept('control', 'CONCEPT_PLACEHOLDER')|e]"
  red_turban_rebellions.22.char.tt: "#Y 10#! нових [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] з'явиться у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  red_turban_rebellions.30.title: "Полювання на [target_character.GetNameWithNoTooltip]"
  red_turban_rebellions.30.desc: "Поки [target_character.GetName] користується підтримкою [GetInternationalOrganizationType('red_turban_rebels').GetName], агенти [GetCountry('CHI').GetName] роблять усе можливе, щоб якнайшвидше схопити та стратити [target_character.HimHer], аби припинити повстання, перш ніж воно розростеться ще більше.\n\nХодять чутки, що напад на [target_location.GetName] неминучий протягом наступних кількох днів. Переховування може забезпечити виживання нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], але [target_character.GetHisHer] легітимність та претензії на походження з династії [ROOT.GetCountry.GetName] можуть бути заплямовані після такого ганебного прояву боягузтва..."
  red_turban_rebellions.30.a: "[target_character.GetNameWithNoTooltip] стоятиме до [target_character.GetHisHer] останнього подиху!"
  red_turban_rebellions.30.b: "Мертвий [target_character.GetWomanMan] не може очолити повстання."
  red_turban_rebellions.31.title: "Страта [target_character.GetNameWithNoTooltip]"
  red_turban_rebellions.raid_deas: "Серед ночі [GetDateString], [GetCountry('CHI').GetCulture.GetName] нападники штурмували [target_location.GetRank.GetName] [target_location.GetName], вбиваючи кожного, кого вважали частиною [ShowSituationName('red_turban_rebellions')]."
  red_turban_rebellions.31.desc: "$red_turban_rebellions.raid_deas$\n\nПопри всі [target_character.GetHisHer] зусилля відбити нападників, несподіваний напад виявився надто сильним для [target_character.GetName]. [GetCountry('CHI').GetAdjective] вершники захопили нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Після показового суду доля [target_character.GetNameWithNoTooltip] була вирішена, і [target_character.GetHeShe] був негайно страчений тієї ж ночі.\n\nТепер майбутнє [ROOT.GetCountry.GetName] лежить у руках [target_heir.GetName] та [target_heir.GetHisHer] радника [target_advisor.GetName]..."
  red_turban_rebellions.31.a: "Юний [ROOT.GetCountry.GetGovernment.GetHeirTitle] Сяйва очолить [ROOT.GetCountry.GetNameWithNoTooltip]!"
  red_turban_rebellions.32.title: "Напад на [target_location.GetNameWithNoTooltip]"
  red_turban_rebellions.32.desc: "$red_turban_rebellions.raid_deas$\n\nНа щастя, [target_character.GetName] вдалося пережити цей замах на [target_character.GetHisHer] життя і забезпечити збереження стабільності повстання. Однак шкода, завдана [target_location.GetName], зберігатиметься в найближчому майбутньому..."
  red_turban_rebellions.32.a: "Вони заплатять за це!"
  red_turban_rebellions.33.title: "Вторгнення Червоних пов'язок у [target_country.GetNameWithNoTooltip]"
  red_turban_rebellions.33.desc: "Наша позиція в [ShowRegionName('manchuria_region')] значно відрізняється від інших повстанців, які борються з [GetCountry('CHI').GetName] у власне $china$. Хоча вони мають доступ до ресурсів та військ для своїх сил, ми маємо лише підтримку [target_culture.GetName] повстанців. Хоча це може виявитися ризикованим кроком, швидка та рішуча війна проти нашого нового південного сусіда, [target_country.GetName], може надати нам доступ до матеріалів, які допоможуть нам у наших військових зусиллях проти [GetCountry('CHI').GetNameWithNoTooltip]."
  red_turban_rebellions.33.a: "Ми повинні спочатку спланувати наші наступні кроки."
  red_turban_rebellions.33.b: "Давайте вторгнемося в [target_country.GetNameWithNoTooltip], поки вони не підозрюють!"
  red_turban_rebellions.34.title: "Піднесення [target_country.GetNameWithNoTooltip]"
  red_turban_rebellions.34.desc: "У швидкому вирі подій [ctw_pusheng_zou.GetName] був убитий у битві. [ctw_pusheng_zou.GetHisHer|U] наступник, [ctw_wenjun_ni.GetName], перейняв командування військом і продовжив [target_country_2.GetAdjective] військові зусилля проти [GetCountry('CHI').GetName]. Проте, [ctw_wenjun_ni.GetHisHer] успіх був недовгим, оскільки [ctw_wenjun_ni.GetHisHer] амбіції взяли гору над [ctw_wenjun_ni.GetHimHer]. У спробі вбити [ctw_shouhui_xu.GetName], [ctw_wenjun_ni.GetHeShe] був схоплений і страчений [target_character.GetName].\n#NL![target_character.GetNameWithNoTooltip] продовжив кампанію [target_country_2.GetNameWithNoTooltip] з великим успіхом, захопивши [target_location.GetName] та навколишні території. Тим часом, [target_character.GetHeShe] планував [target_character.GetHisHer] майбутнє успадкування [target_country_2.GetNameWithNoTooltip]. Фатальної ночі генерал убив [ctw_shouhui_xu.GetNameWithNoTooltip], заявив права на [target_country_2.GetAdjectiveWithNoTooltip] трон для [target_character.GetHerselfHimself] і перейменував [target_country_2.GetFlavorRank] на [target_country.GetName]."
  red_turban_rebellions.34.a: "Хай живе [target_character.GetNameWithNoTooltip]!"
  red_turban_rebellions.34.a.tt: "[target_country_2.GetName] буде #R анексовано#! до [target_country.GetName]"
  red_turban_rebellions.34.b: "Лише під правлінням [target_character.GetNameWithNoTooltip] може [target_country_2.GetNameWithNoTooltip] вижити."
  red_turban_rebellions.34.c: "Ми не можемо дозволити цій зраді залишитися безкарною!"
  red_turban_rebellions.35.title: "Повстання [target_character.GetNameWithNoTooltip]"
  red_turban_rebellions.35.a: "Цілкові дурні!"
  red_turban_rebellions.36.title: "Лідерство [target_character.GetNameWithNoTooltip]"
  red_turban_rebellions.36.desc: "[target_character.GetName] не є [target_character.GetWomanMan] освіченою чи високого статусу. [target_character.GetHisHer|U] виховання було найнижчим можливим у [GetCountry('CHI').GetName], проте [target_character.GetHisHer] розум був яскравим. [target_character.GetNameWithNoTooltip] наголошує, що [target_character.GetHisHer] дії спрямовані на відновлення порядку та миру в $china$. Щоразу, коли [target_country.GetName] здобуває нові землі, [target_country.GetGovernment.GetRulerTitle] забезпечує подорожі до завойованих земель для вивчення місцевих проблем та набору вчених і адміністраторів."
  red_turban_rebellions.36.a: "Нехай [target_character.GetHisHer] правління буде сповнене процвітання!"
  red_turban_rebellions.37.title: "Передчасна загибель [cgu_zixing_guo.GetNameWithNoTooltip]"
  red_turban_rebellions.37.desc: "[ShowSituationName('red_turban_rebellions')] є підступним ланцюгом подій. Жоден чоловік, жінка чи дитина не захищені від неминучої долі, якою є сама смерть. На жаль для [annex_target_country.GetLongName], така доля спіткала [cgu_zixing_guo.GetName], коли [cgu_zixing_guo.GetHeShe] загинув під час однієї з сутичок проти [GetCountry('CHI').GetAdjective] сил."
  red_turban_rebellions.37.desc.heirless: "$red_turban_rebellions.37.desc$\n\nОскільки [cgu_zixing_guo.GetNameWithNoTooltip] загинув без дійсного спадкоємця, єдиним дійсним [target_character.GetWomanMan], що залишився, який може очолити [annex_target_country.GetNameWithNoTooltip], є полководець [target_character.GetName]. [annex_target_country.GetAdjectiveWithNoTooltip] трон відтепер буде правитися з [target_location.GetName], великого [target_location.GetRank.GetName] [target_country.GetName]."
  red_turban_rebellions.37.a: "Нехай [target_character.GetNameWithNoTooltip] править із силою та мудрістю."
  red_turban_rebellions.37.b: "Ні. Ми не можемо дозволити [target_country.GetNameWithNoTooltip] більше зростати."
  red_turban_rebellions.38.a: "[target_country.GetNameWithNoTooltip] добре скористається цими землями!"
  red_turban_rebellions.40.title: "Ротація військ"
  red_turban_rebellions.40.desc: "У ці важкі часи ризик зради та повстання супроводжує нас на кожному кроці. Щоб зменшити цей ризик масового дезертирства та подальшої громадянської війни, один з наших [ROOT.GetCountry.GetGovernment.GetCabinetTitle] міністрів, [target_character.GetName], запропонував запровадити концепцію [ShowModifier('yua_troop_rotation')]. Згідно з цією політикою, генерали, а також їхні війська, постійно обмінювалися б між різними регіонами, щоб запобігти надмірному впливу одного лідера. Це, однак, очевидно, вплинуло б на ефективність наших сил на полі бою.\n\nЧи вартий ризик? Чи справді це завадить генералам одягнути Червоний Тюрбан?"
  red_turban_rebellions.40.a: "Будь-що, щоб запобігти подальшому повстанню."
  red_turban_rebellions.40.b: "Ми не можемо дозволити собі військових поразок."
  red_turban_rebellions.41.title: "Часи відчаю"
  red_turban_rebellions.41.desc: "[ShowSituationName('red_turban_rebellions')] сильно виснажили наші ресурси. З десятками повстань по всьому [ROOT.GetCountry.GetFlavorRank] очевидно, що наших сил недостатньо, щоб протистояти їм безпосередньо. Щоб дозволити собі більшу армію, ми могли б надрукувати більше нашої паперової валюти. Однак необхідні обсяги, безсумнівно, призведуть до її подальшої девальвації на роки вперед."
  red_turban_rebellions.41.a: "Надрукувати додаткові кошти."
  red_turban_rebellions.41.b: "Економіка й так жахлива."
  red_turban_rebellions.42.title: "[ShowRegionNameWithNoTooltip('manchuria_region')] Відколюється!"
  red_turban_rebellions.42.desc: "[ShowSituationName('red_turban_rebellions')] зачіпає не лише всі основні регіони [ROOT.GetCountry.GetName], але й довгі прикордонні території [ROOT.GetCountry.GetFlavorRank]. Найбільш помітними є віддалені землі [ShowRegionName('manchuria_region')], які були завойовані нашими попередниками. Хоча номінально вони перебувають під нашим контролем, через киплячий конфлікт у нашому серці країни ніхто не може забезпечити наше панування над [ShowRegionNameWithNoTooltip('manchuria_region')], що фактично робить їх покинутими."
  red_turban_rebellions.42.a: "О, це просто чудово..."
  red_turban_rebellions.42.a.tt: "#R Усі наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('manchuria_region')] стають покинутими#!"
  red_turban_rebellions.42.b.tt: "#R Кожен [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] зі своєю [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('manchuria_region')] стає незалежним#!"
  red_turban_rebellions.43.title: "Відкликання [ShowCultureNameWithNoTooltip('mongolian_culture')] Генералів"
  red_turban_rebellions.43.desc: "Оскільки повстанці загрожують нам подальшим розколом нашої держави, потреба в компетентних кадрах стає все більш очевидною. На щастя для нас, багато вірних [ShowCultureName('mongolian_culture')] офіцерів все ще присутні в [target_country.GetName]. Ми могли б відкликати їх, щоб зміцнити нашу армію, ціною підвищеного ризику того, що [ShowCultureName('korean_culture')] народ відколеться від нас у майбутньому."
  red_turban_rebellions.43.a: "Нам потрібні ці офіцери негайно!"
  red_turban_rebellions.43.a.at: "Половина [ShowCultureName('mongolian_culture')] [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] у [target_country.GetName] переміщуються до [ROOT.GetCountry.GetName], даючи #G 1#! [Concept('army_tradition', 'CONCEPT_PLACEHOLDER')|e] та #G 1#! [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] за персонажа"
  red_turban_rebellions.43.a.bt: "#R [target_country.GetName] стає більш схильним відколотися від нас#!"
  red_turban_rebellions.43.b: "Вони не повинні залишати свою позицію в [target_country.GetNameWithNoTooltip]."
  red_turban_rebellions.44.title: "Втрата контролю над [ShowRegionNameWithNoTooltip('tibet_region')]"
  red_turban_rebellions.44.desc: "Хаос, спричинений [ShowSituationName('red_turban_rebellions')], призвів до непередбаченого занепаду нашої бюрократії. [ShowRegionName('tibet_region')], регіон, досі підвладний нам, відмовляється визнавати наш вплив та контроль, і тепер практично незалежний від нашої влади."
  red_turban_rebellions.44.a: "Вони можуть заявити про незалежність, але вони повернуться до [ROOT.GetCountry.GetNameWithNoTooltip]."
  red_turban_rebellions.100.title: "Піднесення [target_country.GetNameWithNoTooltip]"
  red_turban_rebellions.end_desc: "[ShowSituationName('red_turban_rebellions')] нарешті закінчилося!"
  red_turban_rebellions.100.desc: "$red_turban_rebellions.end_desc$ [target_character.GetName], [target_country.Custom('GetRulerOrRegentTitle')] [target_country.GetName] заявляє про перемогу над [china_character.GetName] та династією [china_country.GetName]! [target_country.GetLongNameWithNoTooltip] взяла під контроль Небесний Трон і тепер приймає владу [GetInternationalOrganizationType('middle_kingdom').GetName]!"
  red_turban_rebellions.100.a: "Хай живе новий [target_character.Custom('GetEmpressEmperor')]!"
  red_turban_rebellions.101.a: "Нарешті, $china$ більше не розірвана війною."
  red_turban_rebellions.102.a: "Ганебна вистава..."
  red_turban_rebellions.103.title: "[target_country.GetNameWithNoTooltip] Тримається!"
  red_turban_rebellions.103.desc: "$red_turban_rebellions.end_desc$ Незважаючи на жорстоку громадянську війну, сили [GetInternationalOrganizationType('red_turban_rebels').GetName] не змогли зламати [target_country.GetNameWithNoTooltip] зрештою! Останні залишки повстанців вистежуються [target_country.GetCulture.GetName] рейдерами, поки [target_character.GetName] працює над відновленням авторитету Мандату Небес."
  red_turban_rebellions.103.a: "Нехай наше майбутнє буде менш кривавим."
  red_turban_rebellions.104.desc: "$red_turban_rebellions.103.desc$\n\nОднією з перших дій [target_character.GetHisHer] є реінтеграція тих, хто присягнув на вірність [target_country.GetNameWithNoTooltip]. Таким чином, [ROOT.GetCountry.GetName] виконала свою мету."
  red_turban_rebellions.104.a: "Хай живе [target_character.Custom('GetEmpressEmperor')]!"
  red_turban_rebellions.105.title: "Кінець Мандату"
  red_turban_rebellions.105.desc: "У несподіваному повороті подій [GetInternationalOrganizationType('middle_kingdom').GetName] — сам Мандат Небес — піддався впливам, що виходять за межі нашого розуміння. [ShowSituationName('red_turban_rebellions')] більше не служать жодній меті, оскільки доля [GetCountry('CHI').GetName] була змінена силами, що знаходяться поза досяжністю [GetInternationalOrganizationType('red_turban_rebels').GetName]..."
  red_turban_rebellions.105.a: "Ніхто цього не передбачав..."
  red_turban_rebellions.play_as_tag: "Цікаво, що майбутнє готує для [target_country.GetNameWithNoTooltip]..."
  red_turban_rebellions.106.title: "Застій Повстання"
  red_turban_rebellions.106.desc: "Минули десятиліття відтоді, як перші повстанці повстали проти [ShowCultureName('mongolian_culture')] панування над $china$, і незліченні життя були втрачені в конфліктах. Проте [GetCountry('CHI').GetName] тримається, тоді як бунтівні воєначальники зберігають свою владу над своїми територіями. Зрештою, повстання закінчується застоєм, коли жодна зі сторін не здатна об'єднати землю."
  red_turban_rebellions.106.a: "Королівство, роздроблене назавжди..."
  red_turban_rebellions.1000.title: "Удаваний Вплив у [ShowRegionNameWithNoTooltip('korea_region')]"
  red_turban_rebellions.1000.desc: "Через [ShowSituationName('red_turban_rebellions')] у [target_country.GetName], їхній вплив на нас ледь помітний нині. Ми можемо використати їхній момент великої слабкості та оголосити незалежність від цього рабства їхньому недолугому правлінню."
  red_turban_rebellions.1000.a: "Незалежність для нас нарешті!"
  red_turban_rebellions.1000.a.at: "Ми оголосимо незалежність від [target_country.GetName]"
  red_turban_rebellions.1000.a.bt: "#R [target_country.GetName] може розцінити це як війну за [ShowCasusBelliName('cb_independence_war')] проти них!#!"
  red_turban_rebellions.1000.b: "Зараз не найкращий час для таких ризиків."
  red_turban_rebellions.1001.desc: "Підступні піддані [target_region.GetName] відчули нашу тимчасову слабкість і бачать себе у вигідному становищі. Наш колись міцний вплив на їхні землі тепер лише тінь колишньої слави, і [root_country.GetCulture.GetName] народ оголосив де-факто незалежність від [target_country.GetName]."
  red_turban_rebellions.1001.a: "Ми не можемо дозволити собі ще одну війну зараз."
  red_turban_rebellions.1001.b: "Їхні голови прикрасять наші списи, коли ми покінчимо з повстанцями..."
  rtr_yuan_allegiance: "Вірність Юань"
  rtr_release_warlord_country_tt: "Звільнити [ShowGovernmentReformName('warring_state')] [target_country.GetName]"
  rtr_lose_competent_characters: "До #R 8#! найкомпетентніших [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] [CULTURE.GetName] культури переїжджають до [TARGET_COUNTRY.GetName]"
  first_rtr_lose_competent_characters: "До #R 8#! наших найкомпетентніших [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] [CULTURE.GetName] культури переїжджають до [TARGET_COUNTRY.GetName]"
  third_rtr_lose_competent_characters: "До #R 8#! найкомпетентніших [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] [COUNTRY.GetName] [CULTURE.GetName] культури переїжджають до [TARGET_COUNTRY.GetName]"
  past_rtr_lose_competent_characters: "До #R 8#! наших найкомпетентніших [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] [CULTURE.GetName] культури переїхали до [TARGET_COUNTRY.GetName]"
  first_past_rtr_lose_competent_characters: "До #R 8#! наших найкомпетентніших [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] [CULTURE.GetName] культури переїхали до [TARGET_COUNTRY.GetName]"
  third_past_rtr_lose_competent_characters: "До #R 8#! найкомпетентніших [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] [COUNTRY.GetName] [CULTURE.GetName] культури переїхали до [TARGET_COUNTRY.GetName]"
  rtr_release_warlord_tag_biggest_pop_culture_release_tt: "Звільнити [ShowGovernmentReformName('warring_state')] [target_culture.GetName] культури в [target_location.GetName]"
  rtr_release_cultural_warlord_tag_tt: "Звільнити [target_culture.GetName] [ShowGovernmentReformName('warring_state')] від [target_country.GetName] у [target_location.GetName]"
  rtr_change_allegiance_points: "Збільшити його #Y $rtr_yuan_allegiance$#! на $VALUE|G$ (поточне значення: #Y [COUNTRY.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!)"
  neg_rtr_change_allegiance_points: "Зменшити його #Y $rtr_yuan_allegiance$#! на $VALUE|R$ (поточне значення: #Y [COUNTRY.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!)"
  first_rtr_change_allegiance_points: "Ми збільшуємо нашу #Y $rtr_yuan_allegiance$#! на $VALUE|G$ (поточне значення: #Y [COUNTRY.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!)"
  first_neg_rtr_change_allegiance_points: "Ми зменшуємо нашу #Y $rtr_yuan_allegiance$#! на $VALUE|R$ (поточне значення: #Y [COUNTRY.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!)"
