l_english:
  black_death.1.title: "[ShowSituationNameWithNoTooltip('black_death')] у [GetDisease('bubonic_plague').GetOrigin.GetNameWithNoTooltip]"
  black_death.1.desc: "Тривожні новини дійшли до нас із [GetDisease('bubonic_plague').GetOrigin.GetName], оскільки нещодавно ми отримали звідти наступний звіт.\n\nНа жаль! Наші кораблі входять у порт, але з тисячі моряків ледве десять врятовані. Ми дістаємося до наших домівок; наші родичі та сусіди приходять звідусіль, щоб відвідати нас. Горе нам, бо ми кидаємо в них стріли смерті! Поки ми говорили з ними, поки вони обіймали нас і цілували, ми розсіювали отруту з наших вуст. Повернувшись до своїх домівок, вони, у свою чергу, незабаром заразили всі свої родини, які за три дні померли і були поховані в одній спільній могилі. Священики та лікарі, відвідуючи хворих, поверталися зі своїх обов'язків хворими і незабаром були зараховані до мертвих. О смерть! Жорстока, гірка, безбожна смерть! Яка так розриває узи прихильності та розділяє батька й матір, брата й сестру, чоловіка й дружину. Оплакуючи наше нещастя, ми боялися втікати, але не наважувалися залишатися."
  black_death.1.a: "Щури!"
  black_death.1.a.tt: "[ShowSituationName('black_death')] почала своє поширення з [GetDisease('bubonic_plague').GetOrigin.GetName]"
  black_death.1026.title: "Ще один помирає..."
  black_death.1026.desc: "Багатії, не довіряйте багатству,\nЗолото не купить вам здоров'я;\nСам лікар мусить зів'янути.\nУсьому приходить кінець,\nЧума швидко минає;\nЯ хворий, я мушу померти."
  black_death.1026.a: "Господи, помилуй нас!"
  black_death.2.title: "Чорна смерть поширюється!"
  black_death.2.desc: "Чорна смерть, вбивця людства, кара за наші гріхи, прийшла в нашу країну! Що ми можемо зробити, окрім як молитися?"
  black_death.2.a: "$common_string_what_can_we_do$"
  black_death.100.title: "Кінець Чорної смерті"
  black_death.100.desc: "Здається, останні залишки чуми нарешті зникли. Чи ті з нас, хто вижив, прокляті чи благословенні?"
  black_death.100.a: "Чи хтось вижив?"
  total_death_toll_tt: "Протягом [ShowSituationName('black_death')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e], #R Жнець#! забрав душі [ROOT.GetVariable('bd_total_death_toll_variable').GetValue|V0] #Y тисяч#! наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]"
  black_death.101.t: "Чума як покарання"
  black_death.101.desc: "Настали останні часи! Принаймні так стверджують дедалі численніші групи флагелянтів, які блукають сільською місцевістю, проводячи процесії та проповідуючи про прийдешні апокаліптичні події як покарання за нашу гординю, яку ми можемо розвіяти лише через гнів Христа у вигляді бичування.\n\nХоча спочатку ці групи мали підтримку Церкви, вони надто відхилилися від доктрини, щоб їх можна було й надалі санкціонувати. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вважає, що їх необхідно викорінити, щоб запобігти підриву стабільності."
  black_death.101.a: "Наказати місцевим гарнізонам розігнати будь-які зібрання флагелянтів."
  black_death.101.b: "Не зважайте на Церкву, можливо, вони щось знають!"
  plague_lessen_spread_piss_off_peasants_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e], якою ми володіємо в [target_province.GetName], матиме поширення [GetDisease('bubonic_plague').GetName] зменшене на #G -5%#! за рахунок [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] для її селян"
  black_death.102.t: "Чума фіксації заробітної плати"
  black_death.102.desc: "Природно, гільдії мають велику владу над економікою. Загалом, вони є позитивною силою для суспільства, забезпечуючи громадськості довіру до продуктів, гарантуючи стабільність ринку та контролюючи зростання конкуренції, серед іншого. Тепер, коли чума проникла в нашу націю, поширюючись по всій землі, як ніколи важливо, щоб гільдії забезпечували стабільність цін і безперебійне постачання робочої сили.\n\nОднак, щоб забезпечити це, гільдії контролювали заробітну плату, зберігаючи її такою, якою вона завжди була, незважаючи на дефіцит робочої сили, спричинений смертю навколо нас. Багато членів гільдій стали дуже незадоволеними, знаючи, що вони могли б заробляти більше, але були б розчавлені гільдією, якби стали незалежними. Ми зараз на переломному моменті і повинні вирішити між стабільним ринком або заспокоєнням робітників."
  black_death.102.a: "Невдячним робітникам треба показати їхнє місце."
  black_death.102.b: "Обмін ринку на суспільну стабільність є прийнятним."
  plague_every_pop_in_province_30_satisfaction_tt: "[Concept('target_location.GetName] та кожна сусідня [location', 'CONCEPT_PLACEHOLDER')|e], що належить нам, втратить [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  black_death.103.t: "Уроки чуми"
  black_death.103.desc: "Придворні лікарі та університетська інтелігенція вважають, що нам слід стандартизувати успішні методи лікування та профілактики чуми, щоб полегшити ситуацію. Наразі лікуванням та профілактикою чуми займається децентралізована мережа місцевих чумних лікарів та медичних працівників, що робить це дорогим, хоча потенційно вартим зусиль, щоб забезпечити всіх наших лікарів найновішим обладнанням та методологією. Такі речі, як носіння халатів та рукавичок, трав'яні мішечки та легка доступність ртуті та миш'яку, можуть допомогти забезпечити безпеку та здоров'я деяких наших людей."
  black_death.103.a: "Наполягати на стандартизації."
  black_death.103.b: "Кожен лікар повинен мати право вибору."
  black_death.1001.t: "Втеча до сільської місцевості"
  black_death.1001.desc: "Налякані смертю, що швидко поширюється в наших населених пунктах, люди почали масовий вихід з міських поселень у сільські, сподіваючись відгородитися від світу та хвороби, що його спустошує.\n\nХоча така реакція може бути прийнятною для [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та інших вищих верств суспільства, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] є життєвою силою нашої країни, і їхній відхід з виробничих центрів завдасть шкоди економіці! Можливо, необхідні рішучі заходи для захисту нашої економіки."
  black_death.1001.a: "Дозволити їм. Вони просто хочуть бути в безпеці."
  black_death.1001.b: "Запечатати міста, ніхто не виходить без перепустки!"
  STATIC_MODIFIER_NAME_black_death_exodus_ruralization_attraction: "Сільський вихід"
  STATIC_MODIFIER_NAME_fleeing_pops_modifier: "Втеча від Чорної Смерті"
  black_death.1002.t: "Конфлікт примх"
  black_death.1002.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] однаково ведуть культурну війну за найкращу поведінку для відвернення чуми. Деякі замикаються вдома, мало їдять і багато моляться, сподіваючись, що аскеза їх врятує. Інші вриваються в покинуті будинки, п'ють так, ніби чума забере їх завтра, і віддаються гріху до сходу сонця.\n\nМи не знаємо, чи полегшить будь-яка з цих поведінок чуму, але підтримка однієї з них може виявитися корисною для держави."
  black_death.1002.a: "Аскеза збереже нас побожними та в безпеці!"
  black_death.1002.b: "Самопотурання збереже нас щасливими та в безпеці!"
  STATIC_MODIFIER_NAME_black_death_austerity_movement: "Рух за аскезу"
  plague_satisfaction_and_spread_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e], якою ми володіємо в [target_province.GetName], що ще не подолала хворобу, матиме поширення [GetDisease('bubonic_plague').GetName] збільшене на #R 10%#!, одночасно збільшуючи [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] її селян на #G 10%#!"
  black_death.1003.t: "Чорна Смерть забирає трон"
  black_death.1003.desc: "[target_portrait_character.GetName] деякий час приховував симптоми. Але, на жаль, на смертному ложі стає зрозуміло, що і він/вона піддався/піддалася цій жахливій недузі, що переслідує [ROOT.GetCountry.GetFlavorRank].\n\nМало що можна зробити для [target_portrait_character.GetHerHim] зараз, лише темрява чекає, на [target_portrait_character.GetHerHim] і на нас."
  black_death.1003.a: "Спочивай з миром..."
  black_death.1003.b: "Зібрати всіх лікарів у столиці!"
  black_death.1004.t: "Страшна Смерть"
  black_death.1004.desc: "Селяни з усього [target_location.GetName] почали організовувати зусилля, щоб закрити отвори в землі, з яких походить чумна міазма, систематично запечатуючи великі та малі щілини по всій своїй землі.\n\nСеляни впевнені, що це вирішить проблему, але експерти в [ROOT.GetCountry.GetCapital.GetName] попереджають, що це лише зашкодить якості ґрунту регіону."
  black_death.1004.a: "Засипати кожну дірку!"
  black_death.1004.b: "Припинити! Ґрунт повинен залишатися придатним для обробітку!"
  STATIC_MODIFIER_NAME_damaged_soil: "Пошкоджений ґрунт"
  black_death.1005.t: "У пошуках причини"
  black_death.1005.desc: "Гнів і страх у населення досягли точки, коли їх більше не можна стримувати всередині, і вони повинні бути спрямовані назовні, на інших. Хтось має стати причиною чуми, і цей хтось мусить заплатити.\n\nБудь то бідні, потворні чи будь-які меншини, маси вимагають, щоб групу вистежили та переслідували за те, що вона накликала на нас гнів Божий. Ми можемо або допомогти організувати цю подію та контролювати її, або спробувати зупинити насильство між кастами, лише щоб воно було спрямоване на нас."
  black_death.1005.a: "Організувати полювання!"
  black_death.1005.b: "Не звинувачуйте інших у божественній карі!"
  plague_masses_appeased_tt: "Маси будуть задоволені, поки що..."
  black_death.1006.t: "Набір служниць"
  black_death.1006.desc: "Страх заразитися чумою, служачи хворому дворянину, надто великий для нижчих класів, незалежно від того, наскільки можуть бути підвищені зарплати!\n\nНаші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] тепер вимагають права призивати [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] на службу, змушуючи їх ризикувати хворобою, щоб задовольняти свої потреби."
  black_death.1006.a: "Запровадити призов!"
  black_death.1006.b: "Безглуздо! Прибирайте власні маєтки!"
  black_death.1007.t: "Дилема Делі"
  black_death.1007.desc: "Наш [ROOT.GetCountry.GetLongName] подібний до вишуканого килима, зітканого з багатьох етнічних та релігійних груп, які працюють в унісон, але з приходом цієї катастрофічної біди цей килим починає розходитися по швах...\n\nРізні релігійні групи в нашому [ROOT.GetCountry.GetFlavorRank] тепер гризуться між собою, звинувачуючи одна одну та своїх божеств у спалаху. Якщо це не буде контрольовано найближчим часом, це призведе до кровопролиття."
  black_death.1007.a: "Вони сміють?"
  black_death.1007.b: "Доручити місцевим релігійним лідерам вирішити проблему"
  black_death.1007.b.tl: "Зроблено спробу придушити заворушення, передавши контроль місцевим релігійним лідерам."
  black_death.1007.c: "Запровадити суворий військовий нагляд як загрозу"
  black_death.1008.t: "Корабель-привид викинуло на берег"
  black_death.1008.desc: "На берегах [target_location.GetName] викинуло на берег корабель-привид. Це торгове судно прибуло однієї ночі і з тих пір залишається там, недоторкане місцевими жителями.\n\nМіщани надто бояться, що судно може бути заражене чумою, щоб наблизитися до нього. Вміст і останки екіпажу залишаються цілими. Вони попросили [ROOT.GetCountry.GetFlavorRank] спалити корабель для безпеки."
  black_death.1008.a: "Спалити прокляте судно!"
  black_death.1008.b: "Пахне здобиччю, обшукати його на предмет трофеїв!"
  custom_tooltip_generic_nothing_happens: "Нічого не відбувається..."
  black_death.1009.t: "Проблеми кампанії"
  black_death.1009.desc: "Серед рядового складу однієї з наших польових армій спалахнула хвороба. Чумові лікарі попереджають, що якщо армію не розпустити для лікування, весь підрозділ може загинути від небезпек хвороби.\n\nЗвісно, розпуск активного підрозділу може бути тактично нерозумним маневром, тому ми повинні зважити цінність життя наших солдатів проти цінності їхньої почесної смерті заради [ROOT.GetCountry.GetFlavorRank]."
  black_death.1009.a: "Хвороба чи ні, ми йдемо далі!"
  black_death.1009.b: "Напевно, жителі [target_location.GetNameWithNoTooltip] охоче пожертвують..."
  black_death.1010.t: "Вірменський бруд"
  black_death.1010.desc: "Лікарі з усього Сходу переконалися, що існує лише один ефективний засіб від цієї жахливої хвороби, яка нас усіх мучить: бруд, видобутий із земель [ShowAreaName('armenia_area')|U].\n\nНа жаль, інші суверенні держави також дізналися про це, ми повинні запастися великою кількістю бруду, перш ніж вони зможуть, інакше ми ризикуємо залишитися без нього..."
  black_death.1010.a: "Імпортувати багно, за будь-яку ціну!"
  black_death.1010.b: "Багно? Ні, ми імпортуємо справжні ліки!"
  black_death.1010.c: "Ніщо не вилікує цього, ми нічого не імпортуємо!"
  black_death.1011.t: "Біженці біля брам"
  black_death.1011.desc: "Біженці, що тікають від чуми, прибули у великій кількості до [target_location.GetName]. Вони відчайдушні та голодні, шукають безпеки в місці, ще не торкнутому жахливою смертю.\n\nПрийняття їх збільшить наше населення, цінний ресурс у час таких великих втрат, але вони також несуть ризик занести хворобу прямо в місто. Більшість відвернулася б від них, але їхній відчай може призвести до необдуманих дій. У будь-якому разі, щось потрібно зробити з цією ордою біженців."
  black_death.1011.a: "Прийняти біженців."
  black_death.1011.b: "Влаштувати чумні табори для біженців."
  black_death.1011.c: "Відвернути біженців."
  pops_lose_10_satisfaction_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  black_death.1012.t: "Папське попередження"
  black_death.1012.desc: "Надійшла звістка про офіційний указ [target_character.GetName], який застерігає правителів та громадських лідерів уникати розпалювання ненависті до меншин. Чорна Смерть, без сумніву, є актом Божим. Кожен, хто стверджує протилежне, чинить богохульство і може бути відлучений від церкви.\n\nНа жаль, меншини є чудовими цапами-відбувайлами та мішенями для гніву, коли трапляється велика трагедія. Чи вирішимо ми продовжувати отримувати вигоду з цього, чи прислухаємося до папського попередження – залежить від нас."
  black_death.1012.a: "Згоден, це акт Божий!"
  black_death.1012.b: "Меншини, мабуть, контролюють [target_character.GetHerHim]!"
  black_death.1013.t: "Податковий тягар чуми"
  black_death.1013.desc: "Тягар, спричинений чумою навколо сільських поселень у [target_location.GetName], призвів до того, що вони припинили сплачувати податки. Ті, хто ще не піддався чумі, ледве задовольняють власні потреби, не кажучи вже про вимоги [ROOT.GetCountry.GetFlavorRank].\n\nЗвісно, біди [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] навряд чи можна порівняти зі шкодою, яку нестача коштів може завдати населенню в цілому, тому наші збирачі податків були досить агресивними, нагадуючи місцевим жителям про сплату їхніх боргів. На жаль, на це відповіли тим же."
  black_death.1013.a: "Сердитий натовп чи ні, платіж належить!"
  black_death.1013.b: "У важкі часи податки слід знизити..."
  black_death.1013.c: "Жодних податків для тих, хто страждає!"
  every_pop_25_satisfaction_loss_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_10_satisfaction_gain_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('target_location.GetName] [location', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  black_death.1014.t: "Епідемічне перенапруження"
  black_death.1014.desc: "[target_country.GetLongName] є величезною та гордою. Але наш розмір ускладнює одночасне реагування на спалахи епідемії в різних куточках нашого [ROOT.GetCountry.GetFlavorRank];\n\nПеред нами лежать два варіанти. Ми можемо або підтримувати централізований контроль над реагуванням, що буде менш ефективним, або ми можемо надати повноваження місцевим органам влади для боротьби з їхніми власними спалахами. У будь-якому разі, [ROOT.GetCountry.GetFlavorRank] виживе, ми просто повинні примиритися з питанням, чи краще в ці темні часи пожертвувати кров'ю, чи політичною владою."
  black_death.1014.a: "Ми повинні підтримувати центральний контроль за будь-яку ціну!"
  black_death.1014.b: "Ми можемо дозволити певну місцеву автономію..."
  far_away_locations_with_plague_loses_10_control_tt: "Наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], що розташовані найдалі від [Concept('ROOT.GetCountry.GetCapital.GetName], такі як [target_location.GetName], матимуть свій [control', 'CONCEPT_PLACEHOLDER')|e] зменшений на #R -10%#!"
  STATIC_MODIFIER_NAME_enforced_central_control_modifier: "Посилені протиепідемічні заходи"
  black_death.1015.t: "Термін придатності [ShowGoodsNameWithNoTooltip('medicaments')] закінчився"
  black_death.1015.desc: "Лікарі та інші фахівці в галузі санітарії почали попереджати, що майже половина [ShowGoodsName('medicaments')] на наших ринках прострочена або забруднена наповнювачами, призначеними для збільшення чистої ваги проданого товару.\n\nЦі прострочені товари становлять не лише ризик для здоров'я, але й можуть призвести до подальшого поширення чорної смерті. Є лише одне рішення: ми повинні спалити або іншим чином знищити всі прострочені [ShowGoodsNameWithNoTooltip('medicaments')] на наших складах."
  black_death.1015.a: "Спалити прострочені ліки!"
  black_death.1015.b: "Дозволити лікам залишитися..."
  black_death.1015.c: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] заплатить за прострочені товари."
  black_death.1015.b.nospamtooltip: "Кожна володіння з понад #N 20%#! присутністю [GetDisease('bubonic_plague').GetName] має #V 50%#! шанс отримати додаткові #N 50%#! [GetDisease('bubonic_plague').GetName]"
  every_location_with_plague_gets_10_more_tt: "Присутність [GetDisease('bubonic_plague').GetNameWithNoTooltip] у вже уражених [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] буде збільшена на #R +10%#!"
  reduce_plague_by_10_in_every_location_tt: "Присутність [GetDisease('bubonic_plague').GetName] буде зменшена на #G -5%#! у кожному володінні в [ROOT.GetCountry.GetCapital.GetRegion.GetName]"
  black_death.1016.t: "Соціальні прагнення"
  black_death.1016.desc: "З моменту приходу чуми багато хто уникав великих зібрань та публічних свят зі страху. Але з часом навіть найасоціальніші особистості зрештою прагнутимуть взаємодіяти з іншими.\n\nНарікання та скарги [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] стають дедалі гучнішими з кожним днем. Подальше стримування та відмова від святкувань може спричинити значні соціальні потрясіння."
  black_death.1016.a: "Підтримання соціального порядку важливіше за санітарію."
  black_death.1016.b: "Ми не можемо ризикувати поширенням!"
  black_death.1017.t: "Чумні ями"
  black_death.1017.desc: "Жах, завданий нашому народу смертельною хваткою [GetDisease('bubonic_plague').GetName], справив захопливий вплив на наших медичних працівників у [target_location.GetName]. Піонери, що одягають халати та рукавички, готові підняти наші медичні знання на нові висоти. Їхнє єдине прохання полягає в тому, щоб їм надали доступ до незліченної кількості піддослідних з числа наших нещодавно померлих..."
  black_death.1017.a: "Добре, надайте їм доступ..."
  black_death.1017.b: "Нічого доброго з цього не вийде!"
  black_death.1018.t: "Іноземна допомога"
  black_death.1018.desc: "Нещодавно братство закуповувало оптові товари на наших ринках, щоб доставити їх до [charity_target.GetName].\n\nОднак, дивно, вони, здається, купують більше товарів, ніж дозволяють їхні пожертви; що важливіше, вилучення такої великої кількості товарів може зробити наш [ROOT.GetCountry.GetFlavorRank] вразливим, якщо «страшна смерть» стане ще страшнішою..."
  black_death.1018.a: "Нехай роблять, що хочуть."
  black_death.1018.b: "Заборонити благодійній організації експортувати допомогу."
  black_death.1018.c: "Експропріювати іноземну допомогу."
  black_death.1020.t: "Чумні цапи-відбувайли"
  black_death.1020.desc: "Народ стає некерованим, травма від втрати стількох близьких, страх знати, що вони можуть бути наступними, і гнів через відсутність причин та засобів лікування штовхають їх за межу, навіть до того, щоб звалити провину на плечі наших [target_culture.GetName] підданих.\n\nІнакше кажучи, [ROOT.GetCountry.GetFlavorRank] — це порохова бочка, готова спалахнути від найменшої іскри. Важко сказати, чи вистачить нам сил пережити таку подію, але ми могли б розглянути можливість вжиття превентивних заходів, перенаправивши страх і гнів проти пригнобленої меншини, у таких місцях, як [target_location.GetName]..."
  black_death.1020.a: "Ми не можемо використовувати моїх підданих як цапів-відбувайлів."
  black_death.1020.b: "Поширювати чутки та звинувачення проти меншин."
  STATIC_MODIFIER_NAME_minorities_used_as_scapegoats: "Меншини використовуються як цапи-відбувайли"
  every_location_with_target_culture_receives_changes_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] [target_culture.GetName], отримають [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetCulture.GetName], втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] у [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], де проживають обидві культури"
  every_location_with_target_culture_receives_changes2_tt: "Ми дозволимо переслідування меншин [Concept('target_culture.GetName]. Наші [pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetCulture.GetName], отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], тоді як наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що сповідують [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] [target_culture.GetNameWithNoTooltip], втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] у [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], де проживають обидві культури"
  black_death.1021.t: "Чумові спекулянти"
  black_death.1021.desc: "Останнім часом група [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] скуповує всі запаси найважливіших товарів, таких як ліки, прянощі та консервовані продукти.\n\nНемає чіткого закону, який би забороняв таку поведінку, але дозвіл їм вимагати та морити голодом [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] може призвести до подальшого поширення чуми..."
  black_death.1021.a: "Ми конфіскуємо їхні запаси!"
  black_death.1021.b: "Нехай залишать собі..."
  black_death.1021.c: "Запровадити тимчасовий податок на накопичення товарів."
  black_death.1023.t: "Кожен є загрозою"
  black_death.1023.desc: "Оскільки чума продовжує поширюватися з неконтрольованою швидкістю, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] по всьому нашому [ROOT.GetCountry.GetFlavorRank] починають вимагати права формувати та утримувати частину своїх ополчень для захисту своїх маєтків та безпеки. Вони, здається, вірять у якусь фантазію, що хворі маси нападуть на їхні домівки, щоб заразити і, можливо, навіть убити їх із заздрощів до того, що вони здорові та ситі. Одним із таких прикладів є [target_location.GetName], чиї [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], схоже, погрожують місцевим можновладцям відкритим насильством.\n\nЗвісно, це здебільшого смішно, і задоволення їхнього прохання послабило б армію. Але як ніколи раніше, підтримка знаті є першочерговою для стабільності..."
  black_death.1023.a: "Дозволити їм..."
  black_death.1023.b: "Заборонити!"
  black_death.1024.t: "Криза [ShowGoodsNameWithNoTooltip('silk')] Шляху"
  black_death.1024.desc: "Кількість караванів, що наважуються ступати [ShowGoodsName('silk')] Шляхом, стає все меншою, оскільки хвороба спустошує регіон. Смерть перетинає кожен шлях і ховається в кожному селі. Жодне багатство під час чуми не могло бути достатньо великим, щоб переконати купців підтримувати потік товарів через наші ринки. Якщо ми не вживемо заходів для пожвавлення торгівлі, наша економіка може дуже добре занепасти...\n\nСпонсорування караванів могло б допомогти полегшити проблему, але спроба знайти альтернативні маршрути, що захищають від хвороб, може бути кращим довгостроковим рішенням."
  black_death.1024.a: "Дозволити альтернативні маршрути."
  black_death.1024.b: "Навіщо торгувати ззовні, коли наш [ShowGoodsNameWithNoTooltip('silk')] є кращим?"
  STATIC_MODIFIER_NAME_open_silk_trade_modifier: "Відкрита торгівля шовком"
  STATIC_MODIFIER_NAME_state_textiles_modifier: "Привілейоване виробництво"
  black_death.1025.t: "Чумові заворушення"
  black_death.1025.desc: "Спалах був надто некомпетентно врегульований. Хвороба лютує, вбиваючи друзів та близьких тих, кому пощастило залишитися.\n\nЯкщо ми негайно не виправимо курс, населення наших найбільш постраждалих районів повстане і підпалить наш [ROOT.GetCountry.GetFlavorRank]. Ми повинні придушити їхній гнів або принаймні перенаправити його на щось інше!"
  black_death.1025.a: "Ми розберемося з повстанцями безпосередньо."
  black_death.1025.b: "Швидко, надрукуйте нашу пропаганду!"
  black_death.1025.c: "Звинуватити [blame_target.GetAdjectiveWithNoTooltip] народ."
  every_location_with_plague_scaling_satisfaction_loss_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що населяють [Concept('location', 'CONCEPT_PLACEHOLDER')|e], нині уражені [GetDisease('bubonic_plague').GetNameWithNoTooltip], постраждають від зниження [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] залежно від наявності хвороби"