l_english:
  great_pestilence.1.title: "[ShowSituationNameWithNoTooltip('great_pestilence')]"
  great_pestilence.1.repeatedText: "Хвороба непередбачувана та смертоносна, іноді викликає лихоманку та висип, іноді блювоту чи марення, і майже завжди закінчується смертю."
  great_pestilence.1.desc: "Таємнича чума спустошує наш народ у [diseased_location_scope.GetName]. Вона вражає всіх, незалежно від їхнього класу, благочестя чи духовного захисту. $great_pestilence.1.repeatedText$\n\nУсі відомі ліки виявляються марними проти цієї диявольської недуги, і жодні молитви чи жертви, здається, не спонукають [ROOT.GetCountry.GetReligion.GetGodName] надіслати свій захист на наш народ."
  great_pestilence.1.descB: "Таємнича чума спустошує тубільців у [diseased_location_scope.GetName]. Вона вражає корінне населення з тривожною швидкістю, незалежно від їхнього класу чи благочестя. $great_pestilence.1.repeatedText$\n\nШвидкість зараження та смертоносність симптомів залишають наших лікарів спантеличеними та безсилими.\n\nНам залишається небагато, окрім як здійснювати останні обряди та копати могили."
  great_pestilence.1.a: "Це кінець світу!"
  great_pestilence.1.a2: "Бідні душі!"
  great_pestilence.2.title: "На порозі смерті"
  great_pestilence.2.desc: "[ShowSituationName('great_pestilence')] пройшла безперешкодно. Вона принесла смерть і спустошення цілому континенту, не зважаючи на мораль чи кордони.\n\nТепер багато колись пишних і жвавих міст лежать покинутими та занепалими, королівства та імперії руйнуються, готові бути знищеними своїми ворогами, якщо такі ще залишилися."
  great_pestilence.2.a: "Нам не стане краще..."
  great_pestilence.3.title: "Хтось винен!"
  great_pestilence.3.desc: "Жорстокість [ShowSituationName('great_pestilence')] вбиває наш народ і доводить тих, хто вижив, до божевілля від чистого горя.\n\nГрупа селян, що вижили з [location_scope.GetName], повністю втратили розум і напали та вбили групу членів нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] за те, що вони не запобігли цій катастрофі, вчасно не умилостививши [ROOT.GetCountry.GetReligion.GetGodName].\n\nІнша група найпобожніших їхніх сусідів напала на них у відповідь, щоб переконатися, що ми не накликали гнів [ROOT.GetCountry.GetReligion.GetGodName] цим проявом насильства проти їхніх посланців, і настав хаос."
  great_pestilence.3.a: "Надіслати охорону, щоб покарати нападників."
  great_pestilence.3.b: "Краще нам не втручатися."
  great_pestilence.4.title: "Єдність, що руйнується"
  great_pestilence.4.desc: "Оскільки [ShowSituationName('great_pestilence')] охоплює наше населення в [infected_location.GetName], наші зусилля з припинення її просування виявляються марними, і багато наляканих сімей по всій нашій країні вирішили покинути поселення та міста та ізолюватися на пагорбах і в лісах, нехтуючи своїми обов'язками перед своїми фермами та урядом.\n\nЦе розповсюдження селян дуже ускладнить нашим представникам утвердження волі держави над ними."
  great_pestilence.4.a: "Примусити їх повернутися до роботи!"
  great_pestilence.4.b: "Нехай роблять, що хочуть."
  great_pestilence.5.t: "У пошуках причини"
  great_pestilence.5.desc: "Гнів і страх у населення [target_location.GetName] досягли точки, коли їх більше не можна стримувати, і вони повинні бути спрямовані на інших. Хтось повинен стати причиною чуми, і цей хтось повинен заплатити.\n\nБудь то бідні, потворні або будь-яка кількість меншин, маси вимагають, щоб групу вистежили та переслідували за те, що вони накликали на нас цю чуму. Ми можемо або допомогти організувати цю подію та контролювати її, або спробувати зупинити насильство між кастами, лише для того, щоб воно було спрямоване на нас."
  great_pestilence.5.a: "Організувати полювання!"
  great_pestilence.5.b: "Не звинувачуйте інших у нашій долі!"
  great_pestilence.6.t: "Потреба в монетах"
  great_pestilence.6.desc: "Руйнівна ситуація, спричинена [ShowSituationName('great_pestilence')] у багатьох селах [target_location.GetName], призвела до того, що вони припинили сплачувати податки.\n\nБагато хто вже загинув або захворів, а ті, хто ще не піддався чумі, намагаються задовольнити власні потреби, не кажучи вже про вимоги [ROOT.GetCountry.GetFlavorRank].\n\nПроте, шкода, яку відсутність коштів може завдати народу в цілому, виходить далеко за межі злиднів невеликої групи сіл, тому наші податкові інспектори були досить агресивними, нагадуючи місцевим жителям про сплату їхніх боргів. На жаль, на це відповіли тим же."
  great_pestilence.6.a: "Розлючений натовп чи ні, платіж належить!"
  great_pestilence.6.b: "У важкі часи податки слід знизити..."
  great_pestilence.6.c: "Жодних податків для тих, хто страждає!"
  great_pestilence.7.t: "Назавжди втрачені"
  great_pestilence.7.desc: "Гнів [ShowSituationName('great_pestilence')] знищує всі касти в [target_location.GetName], навіть святі люди нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не захищені від хвороби.\n\nЇхня втрата відчувається подвійно, оскільки багато сіл більше не мають нікого, хто міг би проводити належні похоронні обряди, прирікаючи новопомерлих блукати загубленими як мстиві духи і нездатними перейти у велике потойбіччя."
  great_pestilence.7.a: "Ми допоможемо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  great_pestilence.7.b: "Ми нічого не можемо зробити."