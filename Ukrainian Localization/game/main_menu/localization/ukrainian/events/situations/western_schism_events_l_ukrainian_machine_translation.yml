l_english:
  western_schism.1.title: "Схизма в Католицькій Церкві"
  western_schism.1.desc: "Схизма вразила [ShowReligionName('catholic')] і вкинула $curia$ у дрібне фракційне протистояння!\n\nНавіть якщо Церква вже була розділена раніше, ця Схизма здається іншої природи. Після смерті останнього [GetInternationalOrganization('catholic_church').GetLeaderTitle] фракція [ShowCultureGroupName('italian_group')] кардиналів прагне повернути Святий Престол під свій контроль, чого вони бажали з того часу, як Папство потрапило під [ShowCultureGroupName('french_group')] контроль. Проти них, [ShowCultureGroupNameWithNoTooltip('french_group')] фракція наполягає на тому, щоб новий [GetInternationalOrganization('catholic_church').GetLeaderTitle] залишався під їхнім контролем. Вимоги обох фракцій здаються непримиренними, і [ShowReligionAdjectiveWithNoTooltip('catholic')] світ швидко занурюється у фракційне протистояння, залишаючи добрих [ShowReligionAdjectiveWithNoTooltip('catholic')] людей [GetInternationalOrganization('catholic_church').GetName] без їхніх пастирів. Доки цей поділ триватиме, їм доведеться орієнтуватися у світі без їхньої звичної влади та самим вирішувати, хто є справжнім представником божественної волі."
  western_schism.1.a: "Це недобре..."
  western_schism.3.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] незадоволені Схизмою"
  western_schism.3.desc: "Ми досі не обрали сторону у Схизмі між [target_schism_pope_cardinal.GetName] та [target_schism_opponent_cardinal.GetName]. Наші кардинали закликають нас ухвалити офіційне рішення, кого підтримати."
  western_schism.3.a: "Це рішення може зачекати..."
  western_schism.4.title: "[jan_hus.GetNameWithNoTooltip]"
  western_schism.4.desc: "У серці [ROOT.GetCountry.GetCapital.GetArea.GetName] спалахує полум'я релігійного інакомислення, роздмухуване потужними вітрами змін. [jan_hus.GetName], харизматичний [ShowCultureName('czech')] священик і вчений, виступив проти сприйнятої корупції [GetInternationalOrganization('catholic_church').GetName]. [jan_hus.GetHerHis|U] слова знаходять відгук у простого люду, і нова віра, [ShowReligionAdjective('hussite')] віра, починає пускати коріння.\n\n[jan_hus.GetNameWithNoTooltip] проповідує проти розкоші та надмірностей [GetInternationalOrganization('catholic_church').GetNameWithNoTooltip], закликаючи до повернення до простоти та чистоти раннього християнства. [jan_hus.GetHerHis|U] послідовники, відомі як [ShowReligionAdjectiveWithNoTooltip('hussite')], приймають [jan_hus.GetHerHis] вчення, їхня ревність зростає з кожним днем. Встановлений порядок тремтить, бо слова [jan_hus.GetLastNameWithNoTooltip] кидають виклик авторитету [GetInternationalOrganization('catholic_church').GetNameWithNoTooltip] та [GetInternationalOrganization('hre').GetName]."
  western_schism.4.historical_info: "Ян Гус, також відомий як Йоганнес Гус, був теологом і філософом, який став одним із перших реформаторів католицизму. Він був натхненником гуситської віри, попередниці лютеранства. Він народився в бідній родині, але був висвячений на священника, намагаючись уникнути бідності. Служачи священником, він виступав проти багатьох аспектів Католицької Церкви в Богемії. Коли Олександра V було обрано Папою, він видав папську буллу про його відлучення, а під час Констанцького собору, коли закінчилася Західна Схизма, Ян Гус прибув, щоб представити свої погляди на розбіжності з Церквою, але був негайно заарештований і ув'язнений. Він відмовився відректися від своїх поглядів, і 6 липня 1415 року його спалили на вогнищі за єресь. Його послідовники утворили нову релігію і протягом наступних кількох десятиліть боролися проти п'яти різних хрестових походів. Гуситська віра проіснувала майже два століття в Богемії."
  western_schism.4.a: "Він має цікаві вчення..."
  lots_of_hussites_tt: "Багато [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [Concept('ROOT.GetCountry.GetCapital.GetArea.GetName] [area', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ShowReligionName('hussite')]"
  western_schism.5.title: "Ерозія Віри"
  western_schism.5.desc: "Плутанина, спричинена конфліктом між [target_schism_pope_cardinal.GetName] та [target_schism_opponent_cardinal.GetName], серйозно вплинула на стабільність нашого [ROOT.GetCountry.GetFlavorRank]. Невизначеність щодо зайняття Святого Престолу поширює сумніви щодо належного церковного служіння і повільно руйнує віру народу."
  western_schism.5.a: "Ми молитимемося за швидке припинення їхніх чвар."
  western_schism.5.b: "Можливо, нашим людям варто дослідити деякі альтернативи."
  western_schism.6.title: "Зіткнення між [opponent_support_location.GetNameWithNoTooltip] та [pope_support_location.GetNameWithNoTooltip]"
  western_schism.6.desc: "Люди [opponent_support_location.GetName], вірні прихильники [target_schism_opponent_cardinal.GetName], нещодавно зіткнулися з [pope_support_location.GetName], завзятими послідовниками [target_schism_pope_cardinal.GetName]. Обидві фракції тепер звернулися до [target_ruler.GetName] з проханням зайняти чітку позицію на чиємусь боці."
  western_schism.6.a: "[opponent_support_location.GetNameWithNoTooltip] явно має рацію."
  western_schism.6.b: "Підтримати людей [pope_support_location.GetNameWithNoTooltip]."
  western_schism.6.c: "Вони можуть вирішити ці дрібні чвари між собою."
  western_schism_resolution_impact_positive.tt: "Обрана сторона отримає певну підтримку в $western_schism$"
  western_schism_resolution_impact_negative.tt: "Обрана сторона втратить певну підтримку в $western_schism$"
  western_schism.7.title: "Процвітаюча торгівля [ShowRegionNameWithNoTooltip('italy_region')]"
  western_schism.7.desc: "Завдяки зусиллям [target_schism_pope_cardinal.GetName] в [ShowRegionName('italy_region')] торгівля з регіоном процвітає. Наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] дуже задоволені таким станом справ та своїми забезпеченими інтересами в регіоні."
  western_schism.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  italian_trade: "Зв'язки з [ShowRegionNameWithNoTooltip('italy_region')]"
  western_schism_8_10_common_string: "Наша позиція в [GetSituationByKey('western_schism').GetName] спричинила народне обурення в деяких частинах нашої країни. Народ [target_location.GetName] почав озброюватися і вимагає, щоб ми підтримали фракцію"
  western_schism.8.title: "Народна підтримка [target_schism_opponent_cardinal.GetNameWithNoTooltip]"
  western_schism.8.desc: "$western_schism_8_10_common_string$ [target_schism_opponent_cardinal.GetName] натомість."
  western_schism.8.a: "Ми не піддамося таким дріб'язковим вимогам."
  western_schism.8.b: "[target_schism_opponent_cardinal.GetNameWithNoTooltip] може виявитися найкращим вибором для нас зрештою."
  western_schism.9.title: "[target_schism_opponent_cardinal.GetNameWithNoTooltip] Нагороджує вірність"
  western_schism.9.desc: "[target_schism_opponent_cardinal.GetName], єдиний і справжній [GetInternationalOrganization('catholic_church').GetLeaderTitle], винагородив нашу вірність особливим грантом, надавши нам більші права в межах [GetInternationalOrganization('catholic_church').GetName]."
  western_schism.9.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  western_schism.10.title: "Народна підтримка [target_schism_pope_cardinal.GetNameWithNoTooltip]"
  western_schism.10.desc: "$western_schism_8_10_common_string$ [target_schism_pope_cardinal.GetName] натомість."
  western_schism.10.a: "Нехай спробують."
  western_schism.10.b: "Вони наводять вагомі аргументи."
  western_schism_11_12_common_string: "у тривалій боротьбі за лідерство в [GetInternationalOrganization('catholic_church').GetName], [target_country.GetName] похвалила наш народ! Вони вихваляють стійкість [ROOT.GetCountry.GetName] та міцну віру, яку ми виявляємо в такі нестабільні часи.\n\nХоча їхні солодкі слова є очевидною хитрістю, щоб забезпечити нашу підтримку, це все ж може виявитися корисним для нас, незалежно від того, чи відкрито ми виявляємо свою підтримку"
  western_schism_11_12_common_string_2: "або використовуємо цю похвалу для власної програми в межах [GetInternationalOrganization('catholic_church').GetNameWithNoTooltip]."
  western_schism.11.title: "[target_country.GetNameWithNoTooltip] Хвалить нашу Переконаність"
  western_schism.11.desc: "Рішучий прихильник [target_schism_pope_cardinal.GetName], $western_schism_11_12_common_string$ [target_schism_pope_cardinal.GetNameWithNoTooltip], $western_schism_11_12_common_string_2$"
  western_schism.11.a: "[target_schism_pope_cardinal.GetNameWithNoTooltip] є нашим [GetInternationalOrganization('catholic_church').GetLeaderTitle]!"
  western_schism.11.b: "Використайте цю похвалу в Церкві."
  western_schism.12.desc: "Рішучий прихильник [target_schism_opponent_cardinal.GetName], $western_schism_11_12_common_string$ [target_schism_opponent_cardinal.GetNameWithNoTooltip], $western_schism_11_12_common_string_2$"
  western_schism.12.a: "[target_schism_opponent_cardinal.GetNameWithNoTooltip] є нашим [GetInternationalOrganization('catholic_church').GetLeaderTitle]!"
  western_schism_13_14_common_string: "і в опозиції до решти станів. Цей внутрішній розкол, спричинений розколом, що проходить крізь саму [GetInternationalOrganization('catholic_church').GetName], загрожує розколоти нашу країну на кілька фракцій, якщо ми не будемо діяти обережно."
  western_schism.13.title: "Всупереч усім обставинам"
  western_schism.13.desc: "Стан [target_estate.GetName], складений з [ROOT.GetCountry.GetReligion.GetGodName]-богобоязливих людей, виявив себе таким, що підтримує [target_schism_pope_cardinal.GetName] $western_schism_13_14_common_string$"
  western_schism.13.a: "Стати на бік [target_estate.GetNameWithNoTooltip]."
  western_schism.13.b: "Ми станемо на бік більшості."
  western_schism.14.desc: "[target_estate.GetName], що складається з людей, які бояться [ROOT.GetCountry.GetReligion.GetGodName], підтримав [target_schism_opponent_cardinal.GetName] $western_schism_13_14_common_string$"
  western_schism.15.title: "Мандрівний проповідник"
  western_schism.15.desc: "Ерозія нашої віри, спричинена [ShowSituationName('western_schism')], глибоко підірвала довіру народу [unrest_province.GetName]. У цей вакуум довіри та стабільності прийшов [target_character.GetName] зі [target_character.GetHerHis] проповідями єресі та звинуваченнями в корупції. Хоча [target_character.GetSheHe] стверджує, що є справжнім [ROOT.GetCountry.GetReligion.GetAdjective], [target_character.GetHerHis] лекції заохотили декого в [unrest_province.GetNameWithNoTooltip] звернутися до небезпечних ідей, і ми, можливо, захочемо діяти швидко, щоб не дати цій єресі поширитися далі."
  western_schism.15.a: "[target_character.GetHerHis|U] ідеї не звучать так вже й погано."
  western_schism.15.b: "Ми не можемо дозволити [target_character.GetNameWithNoTooltip] продовжувати."
  western_schism.1000.title: "Ціна #italic Oboedientia#!"
  western_schism_action_event_tt: "Ми попросимо одного з кандидатів допомогти нам фінансово."
  western_schism.1001.desc: "[target.GetName] винагородив нашу вірність у спосіб, що личить такому важливому та престижному [ROOT.GetCountry.GetFlavorRank], як ми. З нашою підтримкою кожен, безсумнівно, прийме [target.GetNameWithNoTooltip] як справжнього [GetInternationalOrganization('catholic_church').GetLeaderTitle]."
  western_schism.1001.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  western_schism.1002.desc: "[target.GetName] знехтував нашою підтримкою та відмовився ставитися до нас з належною повагою. Ця обурлива образа не може залишитися безкарною, і ми повинні серйозно переглянути наші зобов'язання, оскільки нас явно не цінують."
  western_schism.1002.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  western_schism.1100.title: "Хибна підтримка [target_country.GetNameWithNoTooltip]"
  western_schism.1100.desc: "Наші відносини з [target_country.GetName] напружені, і вони ще більше постраждали під час [ShowSituationName('western_schism')]. Хоча наш вплив у [GetInternationalOrganization('catholic_church').GetName] не безмежний, ми могли б використати його, щоб схилити шальки терезів на наш бік."
  western_schism.1100.a: "Ми матимемо вплив, на який заслуговуємо!"
  western_schism.1100.b: "Ми повинні намагатися не посилювати ворожнечу."
  western_schism.1101.title: "Серйозна образа"
  western_schism.1101.desc: "Морально розбещені дипломати [origin_country.GetName] працювали над зменшенням нашого впливу на [GetInternationalOrganization('catholic_church').GetName]. Ця образа не може залишитися безкарною, і ми повинні розглядати це як виправдання, щоб показати їм їхнє місце."
  western_schism.1101.a: "[ROOT.GetCountry.Custom('common_string_we_must_do_something')]"
  western_schism.1200.title: "[target_country.GetNameWithNoTooltip] викликає підозру"
  western_schism.1200.desc: "Триваючий [ShowSituationName('western_schism')] спричинив нестабільність у [GetInternationalOrganization('catholic_church').GetName], а існування фальшивого [GetInternationalOrganization('catholic_church').GetLeaderTitle] внесло невизначеність серед вірних. Нещодавно [target_ruler.GetName] з [target_country.GetLongName] привернув нашу увагу дипломатичним інцидентом, який натякає, що [target_ruler.GetHerHis] вірність лежить на боці самозванця, а не нашому. Ми повинні відправити делегацію, щоб допитати [target_ruler.GetHerHis] наміри та переконатися, що [target_ruler.GetSheHe] на праведному шляху."
  western_schism.1200.a: "Відправити делегацію до [target_country.GetNameWithNoTooltip]."
  western_schism.1200.b: "У нас є важливіші справи."
  western_schism.1201.title: "Папська делегація"
  western_schism.1201.desc: "Дипломат [target_schism_pope_cardinal.GetName] прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Хоча ми ще не впевнені в їхній заявленій меті, ймовірно, вони хочуть, щоб їх розглядали як офіційну делегацію [GetInternationalOrganization('catholic_church').GetLeaderTitle] і хочуть розслідувати наші власні зобов'язання в рамках [ShowSituationName('western_schism')]. Хоча ми не можемо відмовити їм безпосередньо, ми все одно зможемо без сумніву продемонструвати нашу вірність."
  western_schism.1201.a: "Звісно, [target_schism_pope_cardinal.GetNameWithNoTooltip] є справжнім [GetInternationalOrganization('catholic_church').GetLeaderTitle]"
  western_schism.1201.b: "Ми вірні [target_schism_opponent_cardinal.GetNameWithNoTooltip]."
  western_schism.1300.title: "Заклик до Собору"
  western_schism.1300.desc: "Завдяки нашому поточному вигідному становищу в Курії, ми зібрали достатньо підтримки, щоб скликати собор у [target_location.GetName]. Хоча легітимність собору, безсумнівно, буде поставлена під сумнів багатьма в [GetInternationalOrganization('catholic_church').GetName], його буде дотримано нашими прихильниками, демонструючи як нашу владу, так і підтримку більшості кардиналів. Хоча ми не можемо покласти край [ShowSituationName('western_schism')], ми доведемо авторитет нашого [GetInternationalOrganization('catholic_church').GetLeaderTitle] і зробимо важливий крок до вирішення цього конфлікту на нашу користь."
  western_schism.1300.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  western_schism.1300.a.tt: "Кожен член віри [THIS.GetReligion.GetName] змінює свою думку про [ROOT.GetCountry.GetName] на [ShowBiasValue('schism_called_council')|+=0]"
  western_schism.1301.title: "Собор у [target_location.GetNameWithNoTooltip]"
  western_schism.1301.desc: "Дипломати [council_country.GetName] прибули до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], викликаючи представників нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] для участі в соборі в [target_location.GetName]. Хоча легітимність собору вже ставиться під сумнів їхніми опонентами, це може стати важливою віхою у вирішенні [ShowSituationName('western_schism')]."
  western_schism.1301.a: "Давайте відвідаємо собор на підтримку."
  western_schism.1301.b: "Ми повинні визнати авторитет собору."
  western_schism.1301.c: "Ми відкидаємо зухвалість цих самозванців."
  western_schism.2000.title: "Католицька Церква Знову Об'єднана!"
  western_schism.2000.desc: "Після Собору Церква знову об'єдналася зусиллями [winner_country.GetName] під новим [GetInternationalOrganization('catholic_church').GetLeaderTitle]. [GetInternationalOrganization('catholic_church').GetName] залишається цілою та непорушною, але авторитет [GetInternationalOrganization('catholic_church').GetLeaderTitle] значно ослаб за цей період. Сподіваємося, це не завдало непоправної шкоди нашій вірі. Будемо сподіватися, що [target_character.GetName] є здібним [GetInternationalOrganization('catholic_church').GetLeaderTitle]."
  western_schism.2000.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  western_schism.2100.title: "Новий [GetInternationalOrganization('catholic_church').GetLeaderTitle] для Церкви"
  western_schism.2100.desc.common: "Завдяки нашим неодноразовим зусиллям вирішити [ShowSituationName('western_schism')] під час собору, стало зрозуміло, що наш кандидат є справді легітимним [GetInternationalOrganization('catholic_church').GetLeaderTitle]. Хоча дехто все ще чіпляється за єретичного самозванця, ми зібрали переважну більшість підтримки, щоб оголосити [ShowSituationName('western_schism')] залагодженим."
  western_schism.2100.desc.a: "$western_schism.2100.desc.common$\n\nРазом із накопиченою підтримкою буде легко обрати відповідного кандидата з наших власних лав, повернувши папську владу до вічного міста [ShowLocationName('rome')]."
  western_schism.2100.desc.b: "$western_schism.2100.desc.common$\n\nЗавдяки нашому впливу на курію, ми зможемо зберегти встановлений звичай [ShowLocationName('avignon')] Папства."
  western_schism.2100.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  western_schism.2200.desc: "Останнім зусиллям ми знайшли просте, але елегантне рішення проблем, спричинених [ShowSituationName('western_schism')]. Примусивши обидві сторони відмовитися від своїх претензій на Святий Престол і провести нові вибори, ми можемо знову встановити легітимного [GetInternationalOrganization('catholic_church').GetLeaderTitle] і зосередитися на загоєнні ран, спричинених цим періодом розбрату. Новий [GetInternationalOrganization('catholic_church').GetLeaderTitle], безсумнівно, чудово впорається із завданням, об'єднавши відчужених священиків і підтвердивши справжню доктрину віри."