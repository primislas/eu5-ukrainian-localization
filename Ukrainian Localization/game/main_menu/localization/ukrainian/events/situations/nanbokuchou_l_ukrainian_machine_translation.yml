l_english:
  nanbokuchou.1.title: "$nanbokuchou$"
  nanbokuchou.1.desc.common: "Часи невизначеності настали, оскільки імператорська лінія розділена. І [target_koumyou.GetName] з [GetCountry('NTC').GetAdjective] лінії в [GetCountry('NTC').GetCapital.GetName], і [target_go_daigo.GetName] з [GetCountry('STC').GetAdjective] лінії в [GetCountry('STC').GetCapital.GetName] претендують на те, щоб бути законними правителями Хризантемового Трону."
  nanbokuchou.1.desc.north: "$nanbokuchou.1.desc.common$\n\nВідтоді, як [target_go_daigo.GetNameWithNoTooltip] втік від [target_ashikaga.GetName] і усамітнив [target_go_daigo.GetHerselfHimself] у [ShowLocationNameWithNoTooltip('yoshino')], [target_go_daigo.GetSheHe] був кісткою в горлі для влади [GetUniqueInternationalOrganization('japanese_shogunate').GetName]."
  nanbokuchou.1.desc.south: "$nanbokuchou.1.desc.common$\n\nІмператор [target_go_daigo.GetNameWithNoTooltip] був змушений тікати від [target_ashikaga.GetName], а [target_koumyou.GetNameWithNoTooltip] був зведений на трон замість [target_go_daigo.GetHerHis]."
  nanbokuchou.1.desc.neutral: "$nanbokuchou.1.desc.common$\n\nОбидва імператори мають своїх прихильників, і зіткнення між обома сторонами неминуче. Деякі невеликі зміни у вірності можуть бути достатніми, щоб схилити шальки терезів на ту чи іншу сторону. Ми зберігали нейтралітет, не присягаючи жодній зі сторін, але ми могли б легко це змінити."
  nanbokuchou.1.a: "Ми твердо стоїмо на своїй позиції."
  nanbokuchou.1.b: "Насправді, вони здаються більш перспективними."
  nanbokuchou.1.c: "Краще не приєднуватися до жодної сторони."
  nanbokuchou.1.d: "Ми підтримаємо [GetCountry('NTC').GetLongNameWithNoTooltip] у [GetCountry('NTC').GetCapital.GetNameWithNoTooltip]."
  nanbokuchou.1.e: "Ми підтримаємо [GetCountry('STC').GetLongNameWithNoTooltip] у [GetCountry('STC').GetCapital.GetNameWithNoTooltip]."
  nanbokucho_neutrality: "Ми оголосимо нейтралітет, не підтримуючи жодного Двору."
  nanbokuchou.2.title: "Кінець $nanbokuchou$"
  nanbokuchou.2.desc: "Бурхливі часи розділеного двору закінчилися. Постійні чвари, ініційовані [GetCharacter('jap_go_daigo_tenno').GetName], були вирішені об'єднанням під [target_emperor.GetLongName]. Більше наша країна не буде розділена через численні конфліктуючі лояльності. Легітимність [target_emperor.GetGovernment.GetRuler.GetName] беззаперечна, і люди згуртуються під [target_emperor.GetGovernment.GetRuler.GetHerHis] владою та владою [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]. Більше не буде внутрішніх чвар і розколів, і всі клани будуть об'єднані заради спільної мети."
  nanbokuchou.2.a: "Нарешті мир і стабільність."
  nanbokuchou.3.title: "Вікно можливостей"
  nanbokuchou.3.desc: "Поточний конфлікт між [target_supported_court.GetLongName] та [target_enemy_court.GetLongName] вже деякий час потрясає [GetUniqueInternationalOrganization('japanese_shogunate').GetName]. [target_shogun.GetGovernment.GetRuler.GetName] та [GetCountry('NTC').GetGovernment.GetRuler.GetName] продовжують протистояти претензіям на трон [GetCountry('STC').GetGovernment.GetRuler.GetName]. Досі ми також надавали свою вірну підтримку [target_supported_court.GetLongNameWithNoTooltip], але на горизонті віють вітри змін.\n\nВтомлені від такої боротьби, обидві сторони, здається, сприймають свою підтримку як належне, і це не подобається багатьом серед наших [ROOT.GetCountry.GetFlavorRank]. Посланці з [target_enemy_court.GetLongNameWithNoTooltip] звернулися до нас, і [target_enemy_court.GetGovernment.GetRuler.GetNameWithNoTooltip] обіцяє кращі винагороди, якщо ми запропонуємо свою вірність [target_enemy_court.GetGovernment.GetRuler.GetHerHim]."
  nanbokuchou.3.a: "Ми ніколи не зрадимо свого слова."
  nanbokuchou.3.b: "Ми повинні скористатися цією можливістю."
  refused_changing_court_support: "Відмовилися підтримати наш [ROOT.GetCountry.GetFlavorRank]"
  betrayed_court_support: "Зрадили свою вірність нам"
  nanbokuchou.4.title: "Зрада"
  nanbokuchou.4.desc: "Підлі щури з [target_betrayer.GetLongName] — просто тварини без честі. Бачачи наші постійні труднощі з [target_enemy_court.GetLongName], вони розірвали свої узи вірності до нас і втекли на їхній бік, спокушені фальшивими обіцянками [target_enemy_court.GetGovernment.GetRuler.GetName]. Вони, безсумнівно, вважають нашу позицію слабкою і думають, що можуть скористатися ситуацією, але ми доведемо їм протилежне. Тепер ми зустрінемося на полі бою."
  nanbokuchou.4.a: "Зрадники!"
  nanbokuchou.5.title: "Ціна війни"
  nanbokuchou.5.desc: "Постійні чвари між [GetCountry('NTC').GetLongName] та [GetCountry('STC').GetLongName] вже деякий час охоплюють усі клани. Пролилася кров і загинули вправні воїни, але боротьба триває. Цей поділ Імператорської лінії є шрамом на нашій нації, який заживатиме довго, якщо взагалі заживе. Наразі конфлікт триває, але, можливо, було б корисно, якби ми знайшли альтернативний спосіб його вирішення."
  nanbokuchou.5.a: "Нісенітниця, ми продовжуємо боротьбу!"
  nanbokuchou.5.b: "Обачність – краща стратегія."
  nanbokuchou.6.title: "Час конфлікту"
  nanbokuchou.6.desc: "Вся країна охоплена конфліктом через лінії Імперського Престолу [GetCountry('NTC').GetName] та [GetCountry('STC').GetName]. У цей час розбрату нерідко клани користуються нагодою, щоб розширити власні інтереси. Один з наших ворогів, [target_enemy.GetLongName], безперечно, був би способом для нас розширити наші."
  nanbokuchou.6.a: "Їхній клан має стати нашим."
  nanbokuchou.7.title: "Час завдати удару"
  nanbokuchou.7.desc: "[target_enemy.GetLongName] занадто довго протистояли нам, але постійна боротьба $nanbokuchou$ дає нам найкращу нагоду для відплати. Настав час звернути нашу увагу на них і показати їм наслідки непокори нашому клану, використовуючи їх для власної експансії."
  nanbokuchou.7.a: "Їхні території стануть нашими."
  nanbokuchou.7.b: "Зараз не час."
  nanbokuchou.8.title: "Нова імперська лінія"
  nanbokuchou.8.common: "Боротьба між лініями [GetCountry('NTC').GetName] та [GetCountry('STC').GetName] перегорнула нову сторінку, оскільки з'явилася нова лінія."
  nanbokuchou.8.imperial.desc: "$nanbokuchou.8.common$ Будучи [target_new_emperor_ruler.GetName] також з [target_new_emperor_ruler.GetDynasty.GetName], ми також є претендентами на Хризантемовий Трон. Якщо ми отримаємо достатню підтримку, ми зможемо висунути свої претензії на нього."
  nanbokuchou.8.desc: "$nanbokuchou.8.common$ Явний новий претендент на Хризантемовий Трон, [target_new_emperor_ruler.GetName] з [target_new_emperor.GetLongName], міг би легко отримати трон, якби [target_new_emperor_ruler.GetSheHe] отримав(-ла) достатню підтримку."
  nanbokuchou.8.a: "Ми згуртуємося за цією новою лінією."
  nanbokuchou.8.b: "Ми не визнаємо навіть іншої лінії."
  nanbokuchou.8.tt: "Ми підтримаємо нову лінію Імператорської Родини"