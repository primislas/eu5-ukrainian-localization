l_english:
  golden_age_of_piracy.100.title: "Сильний фронт проти піратства"
  golden_age_of_piracy.100.desc: "Дипломат з [actor.GetName] прибув до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] і благає нас змінити наш [ShowLawName('piracy_law')] на політику [ShowPolicyName('anti_piracy_policy')], щоб разом з [actor.GetNameWithNoTooltip] та багатьма іншими ми могли боротися з лихом піратства, доки його не буде викорінено з морів."
  golden_age_of_piracy.100.a: "Так, ми змінимо закон."
  golden_age_of_piracy.100.b: "Ні, ми не підкоримося зовнішнім впливам."
  golden_age_of_piracy.101.title: "$golden_age_of_piracy.100.title$"
  golden_age_of_piracy.101.desc: "Наші дипломати повертаються, приносячи добрі вісті. Вони успішно переконали [target_country_scope.GetName] змінити свої закони і припинити дозволяти піратам ховатися та знаходити притулок у своїх водах. Завдяки цим зусиллям води світу стали трохи безпечнішими, а торгівля може протікати безперешкодно."
  golden_age_of_piracy.101.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  golden_age_of_piracy.102.title: "$golden_age_of_piracy.100.title$"
  golden_age_of_piracy.102.desc: "Наші дипломати повертаються з [target_country_scope.GetName], приносячи гіркі вісті. Їм не вдалося привести людей до тями, і наші кореспонденти відмовилися припинити дозволяти піратам ховатися та знаходити притулок у своїх водах. Якщо нічого не буде зроблено, їхня скверна неодмінно пошириться і обов'язково досягне наших власних вод."
  golden_age_of_piracy.102.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  golden_age_of_piracy.110.title: "Нація піратів"
  golden_age_of_piracy.110.desc: "Після видачі нового каперського свідоцтва [actor.GetName], велика група розбійників та головорізів зібралася навколо огидної постаті [pirate_ruler_scope.GetName] у [target_location.GetName].\n\nУсім, хто слідує за [pirate_ruler_scope.GetHerHim], відомо, що намір [pirate_ruler_scope.GetHerHis] полягає у створенні піратської нації, яка тероризуватиме моря і, найголовніше, зробить усіх їх нечувано багатими."
  golden_age_of_piracy.110.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  golden_age_of_piracy.110.b: "Піратське життя для мене!"
  golden_age_of_piracy.110.tt: "Ми продовжуємо грати за [ROOT.GetCountry.GetNameWithNoTooltip]"