l_english:
  hundred_years_war.1.title: "[ShowSituationNameWithNoTooltip('hundred_years_war')]"
  hundred_years_war.1.desc: "У році [GetCurrentYear] напруга між [GetCountry('ENG').GetLongName] та [GetCountry('FRA').GetLongName] досягла критичної точки. Давні суперечки щодо територій та претензії на [GetCountry('FRA').GetAdjectiveWithNoTooltip] престол вибухнули у відкриті бойові дії, що ознаменувало початок [ShowSituationName('hundred_years_war')].\n\nОбидві нації тепер готуються до затяжного конфлікту, який визначить долю [ShowSubContinentName('western_europe')]. Світ спостерігає, як ці дві великі держави готуються до неминучого зіткнення на полі бою."
  hundred_years_war.1.a: "Сподіваюся, це швидко закінчиться."
  hundred_years_war_tt: "[Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [ShowSituationName('hundred_years_war')] розпочалася. Ми можемо стати на бік [GetCountry('FRA').GetLongName] або [GetCountry('ENG').GetLongName], або ж залишитися нейтральними."
  explain_subject_interactions_tt: "Як [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] [GetCountry('FRA').GetNameWithNoTooltip], наша [Concept('subject_loyalty', 'CONCEPT_PLACEHOLDER')|e] визначить, чи будемо ми покликані до зброї на захист нашого сюзерена. Протягом [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] ми можемо отримати доступ до унікальних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowGenericActionName('demand_autonomy')] та [ShowGenericActionName('demand_appanage_promotion')] через панель [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]."
  hundred_years_war_historical_info: "Столітня війна була довгим і жорстоким конфліктом між Англією та Францією, що тривав з 1337 по 1453 рік. Вона почалася, коли англійський король заявив про свої права на французьку корону, посилаючись на свою материнську кровну лінію, тоді як французи відхилили це згідно зі своїми законами. Обидві сторони вже мали пересічні території у Франції, що лише підливало масла у вогонь. Далі була затяжна, періодична війна, сповнена битв, зрад і мінливих альянсів, яка тривала понад століття і назавжди змінила геополітичний ландшафт усієї Західної Європи."
  hundred_years_war.2.title: "Корона [GetCountry('FRA').GetNameWithNoTooltip]"
  hundred_years_war.2.desc: "Ми більше не можемо ігнорувати той факт, що [GetCountry('FRA').GetAdjective] стверджують, що їхній [ShowHeirSelectionName('salic_law')] робить [GetCharacter('fra_philip_vi_valois').GetName] [GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCountry('FRA').GetNameWithNoTooltip], коли це явно має бути [GetCharacter('eng_edward_iii').GetName], оскільки [GetCharacter('eng_edward_iii').GetHerHis] мати [GetCharacter('eng_isabella_of_france').GetName] була сестрою [GetCharacter('fra_charles_iv_capet').GetName]."
  hundred_years_war.2.a: "Ми є законним [GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCountry('FRA').GetNameWithNoTooltip]"
  explain_eng_interactions_tt: "Ми отримаємо доступ до унікальних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowGenericActionName('fra_diplomacy_with_subjects')] та [ShowGenericActionName('request_papal_delegates')] через панель [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]."
  hundred_years_war.3.title: "Корона [GetCountry('FRA').GetNameWithNoTooltip]"
  hundred_years_war.3.desc: "[target_eng_ruler.GetName], [GetCountry('ENG').GetGovernment.GetRulerTitle] [GetCountry('ENG').GetName], відкидає твердження, що трон [GetCountry('FRA').GetLongName] має вирішуватися за [ShowHeirSelectionName('salic_law')]. За [target_eng_ruler.GetHerHis] вказівкою, [GetCountry('ENG').GetAdjectiveWithNoTooltip] стверджують, що [target_eng_ruler.GetSheHe] має сильніше право як спадкоємець володінь [GetCharacter('eng_isabella_of_france').GetName], сестри покійного [GetCharacter('fra_charles_iv_capet').GetName]. Натомість, [GetCharacter('fra_philip_vi_valois').GetName] є більш далеким родичем, і тому [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetCourtTitle] розглядає це успадкування як образу справедливості та привід для війни!"
  hundred_years_war.3.a: "[GetCountry('ENG').GetAdjectiveWithNoTooltip] — дурні!"
  explain_fra_interactions_tt: "Ми отримаємо доступ до унікальних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowGenericActionName('influence_french_subject')] та [ShowGenericActionName('request_papal_delegates')] через панель [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]."
  hundred_years_war.10.title: "Питання не вирішене"
  hundred_years_war.10.desc: "Ми все ще не згодні з [GetCountry('FRA').GetAdjective] позицією щодо того, хто має правити [ShowRegionName('france_region')]. Наші претензії сильні, і наші армії чітко покажуть нашу праведність."
  hundred_years_war.10.a: "Ми є законним [GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCountry('FRA').GetNameWithNoTooltip]"
  hundred_years_war.11.title: "Підступний Альбіон!"
  hundred_years_war.11.desc: "[GetCountry('ENG').GetAdjective] все ще контролюють частини [ShowRegionName('france_region')]. Це явно не те, що задумав Бог, і ми проженемо їх з нашої країни!"
  hundred_years_war.11.a: "[GetCountry('ENG').GetAdjectiveWithNoTooltip] — дурні!"
  hundred_years_war.20.title: "Час для війни"
  hundred_years_war.20.desc: "Ми маємо претензії на трон [GetCountry('FRA').GetName] і наразі можемо утвердити своє панування в регіоні.\nНастав час відновити бойові дії у Столітній війні. Напруга з [GetCountry('FRA').GetLongNameWithNoTooltip] знову загострилася, і ми готові до чергової фази цього тривалого конфлікту."
  hundred_years_war.20.a: "І війна буде!"
  hundred_years_war.20.b: "Зараз не час"
  hundred_years_war.21.title: "Час для війни"
  hundred_years_war.21.desc: "Нам потрібно усунути [GetCountry('ENG').GetAdjective] присутність з [ShowRegionName('france_region')], і ми зараз у змозі відновити бойові дії у Столітній війні. Напруга з [GetCountry('ENG').GetLongNameWithNoTooltip] знову загострилася, і ми готові до чергової фази цього тривалого конфлікту."
  hundred_years_war.21.a: "І буде війна!"
  hundred_years_war.21.b: "Зараз не час"
  hundred_years_war.100.title: "[GetCountry('ENG').GetNameWithNoTooltip] перемагає у [ShowSituationNameWithNoTooltip('hundred_years_war')]"
  hundred_years_war.100.desc: "У дивовижному повороті подій [GetCountry('ENG').GetLongName] здобула перемогу в довгому та гіркому конфлікті, відомому як Столітня війна. [GetCountry('FRA').GetAdjective] корона була змушена визнати [GetCountry('ENG').GetAdjectiveWithNoTooltip] територіальні претензії та піти на значні поступки. Ця перемога принесла нову престиж та вплив [GetCountry('ENG').GetAdjectiveWithNoTooltip] трону.\n\n[GetCountry('ENG').GetNameWithNoTooltip] тепер має шанс встановити більш значну присутність у [ShowRegionName('france_region')] та закріпити свої територіальні здобутки. Світ спостерігає, як [GetCountry('ENG').GetNameWithNoTooltip] використовуватиме свою новонабуту владу в регіоні."
  hundred_years_war.100.a: "Це було очікувано."
  hundred_years_war.101.title: "[GetCountry('FRA').GetNameWithNoTooltip] перемагає у [ShowSituationNameWithNoTooltip('hundred_years_war')]"
  hundred_years_war.101.desc: "У знаменному повороті подій [GetCountry('FRA').GetLongName] здобула перемогу у важкій та затяжній [ShowSituationName('hundred_years_war')]. [GetCountry('ENG').GetLongName] була змушена визнати [GetCountry('FRA').GetAdjectiveWithNoTooltip] територіальну цілісність та піти на значні поступки. Цей тріумф значно підвищив престиж та вплив [GetCountry('FRA').GetNameWithNoTooltip] на сцені [ShowContinentName('europe')].\n\n[target_char.GetName] має шанс консолідувати [target_char.GetHerHis] повернені території, зміцнити [target_char.GetHerHis] королівську владу та утвердити [target_char.GetHerselfHimself] як провідну силу в регіоні."
  hundred_years_war.101.a: "Це було очікувано."
  hundred_years_war.101.b: "Кому потрібна [ShowContinentNameWithNoTooltip('europe')] взагалі?"
  hundred_years_war.101_tt: "Це завершує [ShowSituationName('hundred_years_war')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  hundred_years_war.200.title: "[fugitive_robert_de_artois.GetNameWithNoTooltip] тікає до [GetCountry('ENG').GetNameWithNoTooltip]"
  hundred_years_war.200.desc: "[GetCountry('ENG').GetGovernment.GetRuler.GetName] з [GetCountry('ENG').GetName] надав притулок опальному лорду [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortName]. Протягом останніх кількох років [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] уникав виклику [ROOT.GetCountry.GetGovernment.GetRuler.GetName] за [fugitive_robert_de_artois.GetHerHis] злочини підробки у спробі захопити [GetCountry('ARS').GetLongName]. Хоча [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] є правителем [GetCountry('ENG').GetNameWithNoTooltip], [fugitive_robert_de_artois.GetSheHe] також є нашим васалом через [fugitive_robert_de_artois.GetHerHis] правління над [GetCountry('AQN').GetName]. Таким чином, переховування втікача [SCOPE.sCharacter('fugitive_robert_de_artois').GetNameWithNoTooltip] створило б виправдання для захоплення [GetCountry('AQN').GetLongNameWithNoTooltip], якщо [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] відмовиться виконати вимогу про видачу [SCOPE.sCharacter('fugitive_robert_de_artois').GetHerHim]. Однак така прихована загроза на адресу [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetCourtTitle] несе ризик початку конфлікту."
  hundred_years_war.200.a: "Вимагати від [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] видати лорда-втікача."
  hundred_years_war.200.b: "Провокувати [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetCourtTitle] було б нерозумно."
  hundred_years_war.201.title: "[GetCountry('FRA').GetNameWithNoTooltip] вимагає [fugitive_robert_de_artois.GetNameWithNoTooltip]"
  hundred_years_war.201.desc: "[GetCountry('FRA').GetGovernment.GetRulerTitle] з [GetCountry('FRA').GetName] вимагає, щоб ми повернули [SCOPE.sCharacter('fugitive_robert_de_artois').GetName], який знайшов притулок у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] і останнім часом став довіреним радником для [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Якщо ми діятимемо всупереч [GetCountry('FRA').GetAdjectiveWithNoTooltip] [GetCountry('FRA').GetGovernment.GetRulerTitle], вони можуть конфіскувати [GetCountry('AQN').GetLongName].\n\nПід час [fugitive_robert_de_artois.GetHerHis] перебування в [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetGovernment.GetCourtTitle], [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] стверджував, що [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] має бути законним правителем [GetCountry('FRA').GetNameWithNoTooltip], маючи [target_character.GetHerHis] Капетинський родовід через [target_character.GetHerHis] матір, [GetCharacter('eng_isabella_of_france').GetName], і що попередня декларація [ShowHeirSelectionName('salic_law')] про зведення на трон [GetCharacter('fra_philip_vi_valois').GetName] була нелегітимною. Таким чином, це може слугувати можливістю заявити про свої права на трон [GetCountry('FRA').GetNameWithNoTooltip]."
  hundred_years_war.201.a: "Кинути виклик [GetCountry('FRA').GetAdjectiveWithNoTooltip] [GetCountry('FRA').GetGovernment.GetRulerTitle] і готуватися до вторгнення в [GetCountry('FRA').GetNameWithNoTooltip]."
  hundred_years_war.201.b: "Поточний статус-кво має бути дотриманий, видати [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip]."
  hundred_years_war.202.title: "[GetCountry('ENG').GetNameWithNoTooltip] відмовляється видати [fugitive_robert_de_artois.GetNameWithNoTooltip]"
  hundred_years_war.202.desc: "[GetCountry('ENG').GetGovernment.GetCourtTitle] з [GetCountry('ENG').GetName] відмовився від нашого запиту про екстрадицію злочинця [SCOPE.sCharacter('fugitive_robert_de_artois').GetName], незважаючи на наші попередження, що непокора призведе до конфіскації [GetCountry('AQN').GetLongName]. Було б найкраще припустити, що лорди [GetCountry('ENG').GetNameWithNoTooltip] готуються до війни з [GetCountry('FRA').GetNameWithNoTooltip], щоб відбити будь-які спроби захопити [GetCountry('AQN').GetNameWithNoTooltip] або навіть спробувати претендувати на [GetCountry('FRA').GetAdjectiveWithNoTooltip] трон!"
  hundred_years_war.202.a: "[GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] відмовив нам, піднімайте прапори!"
  hundred_years_war.202.b: "Зупинити будь-яку подальшу агресію проти [GetCountry('ENG').GetNameWithNoTooltip]"
  hundred_years_war.203.title: "[GetCountry('ENG').GetNameWithNoTooltip] видає [fugitive_robert_de_artois.GetNameWithNoTooltip]"
  hundred_years_war.203.desc: "[GetCountry('ENG').GetAdjective] [GetCountry('ENG').GetGovernment.GetCourtTitle] прийняв наш запит про повернення втікача [SCOPE.sCharacter('fugitive_robert_de_artois').GetName] до [GetCountry('FRA').GetName]. Не маючи куди бігти, [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] тепер стоїть перед [GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCharacter('fra_philip_vi_valois').GetName], щоб бути засудженим за його злочини та спроби незаконно захопити [GetCountry('ARS').GetLongName]."
  hundred_years_war.203.a: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] буде ув'язнений"
  hundred_years_war.203.b: "Такі злочини непрощенні. Стратити [SCOPE.sCharacter('fugitive_robert_de_artois').GetHimHer]!"
  hundred_years_war.203.c: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] спокутує [fugitive_robert_de_artois.GetHerselfHimself] службою нам у [ROOT.GetCountry.GetGovernment.GetCabinetTitle]"
  hundred_years_war.203.d: "Рішення [fugitive_robert_de_artois.GetShortName] були виправдані, надати [fugitive_robert_de_artois.GetHerHim] [GetCountry('ARS').GetLongNameWithNoTooltip]!"
  hundred_years_war.204.title: "[fugitive_robert_de_artois.GetNameWithNoTooltip] та [GetCountry('FRA').GetAdjectiveWithNoTooltip] Корона"
  hundred_years_war.204.desc: "З моменту прибуття [SCOPE.sCharacter('fugitive_robert_de_artois').GetHisHer] до [GetCountry('ENG').GetName], [SCOPE.sCharacter('fugitive_robert_de_artois').GetName] служив вірним радником та близьким другом [GetCountry('ENG').GetGovernment.GetRuler.GetShortName]. Однак, останніми місяцями [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] все частіше піднімав питання про спадкоємність у [GetCountry('FRA').GetName], де у 1328 році [GetCharacter('fra_philip_vi_valois').GetName] був коронований як наступник замість [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip], посилаючись на давній [ShowHeirSelectionName('salic_law')]. Хоча тоді [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] спочатку відмовився від [GetCountry('ENG').GetGovernment.GetRuler.GetHerHis] претензії, відносини між [GetCountry('FRA').GetAdjectiveWithNoTooltip] та [GetCountry('ENG').GetAdjectiveWithNoTooltip] дворами з того часу зіпсувалися. Тепер [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] прагне довести, що [GetCountry('FRA').GetAdjectiveWithNoTooltip] знать вкрала трон у [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip], а посилання на [ShowHeirSelectionNameWithNoTooltip('salic_law')] було нелегітимним. [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] також претендує на [GetCountry('ARS').GetLongName] у [GetCountry('FRA').GetNameWithNoTooltip] і стане цінним союзником, якщо спробує здійснити [fugitive_robert_de_artois.GetHerHis] план захоплення [GetCountry('FRA').GetAdjectiveWithNoTooltip] трону."
  hundred_years_war.204.a: "[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] правитиме на троні [GetCountry('FRA').GetNameWithNoTooltip]!"
  hundred_years_war.204.b: "Справа [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] справедлива, хоча війна з [GetCountry('FRA').GetNameWithNoTooltip] була б нерозумною."
  hundred_years_war.204.c: "Амбіції [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] принесуть війну до [GetCountry('ENG').GetNameWithNoTooltip], стратити [SCOPE.sCharacter('fugitive_robert_de_artois').GetHimHer]!"
  hundred_years_war.205.title: "Лорд [GetCountry('ARS').GetNameWithNoTooltip]"
  hundred_years_war.205.desc: "Під час нашої нещодавньої війни з [GetCountry('FRA').GetName] ми змогли захопити частини [GetCountry('ARS').GetLongName], землі, на які претендував [SCOPE.sCharacter('fugitive_robert_de_artois').GetName]. Оскільки [fugitive_robert_de_artois.GetSheHe] досі виявився безцінним союзником, можливо, нам слід надати [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] ці нещодавно завойовані території."
  hundred_years_war.205.a: "Це [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] право народження."
  hundred_years_war.205.b: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] правитиме, але ми збережемо контроль над [ShowLocationNameWithNoTooltip('calais')]"
  hundred_years_war.205.c: "Ці землі краще керуватимуться нами безпосередньо."
  hundred_years_war.206.title: "Вимоги [actor.GetNameWithNoTooltip]"
  hundred_years_war.206.desc: "Настав час нам вимагати особливих привілеїв від [GetCountry('FRA').GetLongName] у наших зусиллях забезпечити більшу автономію та вплив для наших станів. Чи то для політичної, економічної, чи військової переваги, ці вимоги, безумовно, чинитимуть тиск на нашого сюзерена. Зрештою, це залежатиме від того, як [target_character2.GetName] вирішить відповісти на цей виклик. Чи може [target_character2.GetSheHe] ризикувати нашим потраплянням під [GetCountry('ENG').GetAdjective] вплив?"
  hundred_years_war.206.a: "Вимагати зменшення платежів та символічний подарунок!"
  hundred_years_war.206.b: "Нам має бути дозволено розширювати наші землі за рахунок інших підданих."
  hundred_years_war.206.c: "Запросити звільнення від майбутніх наступальних війн."
  hundred_years_war.206.d: "Неважливо."
  hundred_years_war.207.title: "[actor.GetNameWithNoTooltip] вимагає [GetCountry('PAP').GetAdjectiveWithNoTooltip] посередництва"
  hundred_years_war.207.desc: "Занадто довго війна між [GetCountry('ENG').GetName] та [GetCountry('FRA').GetName] приносила спустошення [ShowReligionGroupName('christian')]. Як вісники [ShowReligionName('catholic')], ми не можемо дозволити цьому кровопролиттю тривати. Ми повинні видати урочистий указ, закликаючи обидва королівства скласти зброю та шукати миру в ім'я віри та єдності. Залишається побачити, чи прислухаються ці правителі до нашої святої поради, чи їхня гордість приведе їх до подальшої руїни, якщо ми вирішимо вимагати припинення бойових дій."
  hundred_years_war.207.a: "Давайте покладемо край безглуздому насильству потужним указом!"
  hundred_years_war.207.b: "Ми не можемо ризикувати подальшим втручанням у цей конфлікт."
  hundred_years_war.208.desc: "[actor.GetName] шукає особливих привілеїв від нас, сподіваючись забезпечити більшу автономію та вплив. Чи то для політичної, економічної, чи військової переваги, ці вимоги кидають виклик владі [GetCountry('FRA').GetName]. [target_character1.GetName] очолює цей тиск на поступки, тоді як наш правитель, [target_character2.GetName], повинен вирішити, як відповісти. Якщо ми поступимося занадто багато, чи можуть вони вислизнути в обійми [GetCountry('ENG').GetName]?"
  hundred_years_war.208.a: "Надати їм символічний дар."
  hundred_years_war.208.b: "Ми мусимо терпіти їхні експансіоністські тенденції."
  hundred_years_war.208.c: "Ми мусимо прийняти."
  hundred_years_war.208.d: "Ніколи!"
  scope_actor_allowed_to_attack_other_subjects_of_fra_tt: "[actor.GetName] буде дозволено оголошувати війну нашим іншим підданим без нашого втручання протягом #Y 20 років#!"
  scope_actor_exempted_from_offensive_wars_tt: "[actor.GetNameWithNoTooltip] буде звільнено від будь-яких наступальних війн, які [GetCountry('FRA').GetNameWithNoTooltip] може вести протягом наступних 20 #Y років#!"
  hundred_years_war.209.title: "[actor.GetNameWithNoTooltip] наближається до [target_subject.GetName]"
  hundred_years_war.209.desc: "[GetCountry('ENG').GetName] звернулася до нас, підданого [GetCountry('FRA').GetName], прагнучи відвернути нас від нашого сюзерена. Вони пропонують компенсацію в обмін на наш нейтралітет, гарантуючи, що ми не візьмемося за зброю в будь-яких майбутніх оборонних війнах, в яких може опинитися [GetCountry('FRA').GetNameWithNoTooltip]. Прийняття може принести безпеку та багатство — але якою ціною для нашої вірності?"
  hundred_years_war.209.a: "Їхня пожертва вітається."
  hundred_years_war.209.b: "Ми ніколи не можемо зрадити нашу справжню вірність!"
  hundred_years_war.210.title: "Вплив [actor.GetNameWithNoTooltip]"
  hundred_years_war.210.desc: "[actor.GetName] офіційно звернувся до нас, [GetCountry('FRA').GetLongName], вимагаючи визнання як [ShowSubjectTypeName('appanage')]. [target_character1.GetName] прагне правити [target_character1.GetHerHis] землями з більшою незалежністю, зберігаючи [target_character1.GetHerHis] зв'язки з нашими прапорами. Надання такого статусу може стабілізувати відносини, але також може створити небезпечний прецедент для інших, хто прагне того ж."
  hundred_years_war.210.a: "Прийняти їхні вимоги."
  hundred_years_war.210.b: "Ми мусимо шанобливо відмовити."
  inherit_in_case_of_no_heir_tt: "Якщо їхній [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] помре без [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e], ми негайно успадкуємо [actor.GetName]"
  hundred_years_war.211.title: "Найманці у [ShowSituationNameWithNoTooltip('hundred_years_war')]"
  hundred_years_war.211.desc: "Наймана компанія [target_merc.GetName] зібралася в [target_location.GetName], приваблена кровопролиттям між [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName]. Відчуваючи можливість нажитися на хаосі, вони пропонують свої послуги тому, хто запропонує найвищу ціну. Зі вправними воїнами під їхнім командуванням, їхня вірність може схилити шальки терезів у цьому затяжному конфлікті."
  hundred_years_war.211.a: "Нехай вони воюють за нашу монету."
  hundred_years_war.211.b: "Відпустити їх."
  merc_company: "Наймана компанія"
  root_mercenaries_name: "Мала $merc_company$"
  larger_root_mercenaries_name: "Велика $merc_company$"
  root_mercenaries_cav_name: "Змішана $merc_company$"
  genoese_mercs_name: "$ligurian$ $merc_company$"
  catalan_mercs_name: "$catalan$ $merc_company$"
  hundred_years_war.212.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] припиняє конфлікт"
  hundred_years_war.212.desc: "Прибув посланець із [GetCountry('PAP').GetCapital.GetName], який приніс указ від [GetCountry('PAP').GetGovernment.GetRulerOrRegent.GetName]. Владою $papacy_reform$ усі бойові дії між [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName] мають негайно припинитися. Війна, що спустошила наші землі та людей, має бути негайно зупинена."
  hundred_years_war.212.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hundred_years_war.212.b: "Хай буде проклятий [GetCountry('PAP').GetGovernment.GetRulerTitle], війна триватиме!"
  armies_demoralized_tt: "[Concept('morale', 'CONCEPT_PLACEHOLDER')|e] наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] постраждає"
  hundred_years_war.213.title: "[actor.GetNameWithNoTooltip] вимагає [target_location.GetNameWithNoTooltip]"
  hundred_years_war.213.desc: "Напруга зростає у [GetCountry('FRA').GetAdjectiveWithNoTooltip] сфері, оскільки [target_character1.GetName] висунув офіційну вимогу щодо повернення [target_location.GetName], що нині перебуває під нашим контролем. Вони стверджують, що ця територія є історичною та культурною частиною їхнього законного [actor.GetGovernment.GetGovernmentType.GetName] і звинувачують [target_character2.GetName] у незаконній окупації. Хоча відкритого конфлікту не виникло, вимога має вагу і може змусити нас прийняти важке рішення — підкоритися або передати справу [GetCountry('FRA').GetName]."
  hundred_years_war.213.a: "Гаразд, ми повинні погодитися."
  hundred_years_war.213.b: "Ми оскаржуємо претензію, нехай [GetCountry('FRA').GetNameWithNoTooltip] вирішує!"
  hundred_years_war.214.title: "Прикордонна сутичка в [target_location.GetNameWithNoTooltip]"
  hundred_years_war.214.desc: "[target_character2.GetName], наш підданий, звернувся до нас щодо вимоги [target_character1.GetName] надати [target_location.GetName]. [target_character2.GetShortNameWithNoTooltip] стверджує, що територія є законною частиною [target_character2.GetHerHis] володінь, і просить нас втрутитися, а не дозволяти примус між нашими підданими. Суперечка загрожує внутрішній стабільності, і наша відповідь може сформувати майбутній баланс сил у регіоні."
  hundred_years_war.214.a: "Надати землю [actor.GetNameWithNoTooltip]."
  hundred_years_war.214.b: "Ця земля є безперечною частиною [target_loser_country.GetNameWithNoTooltip]!"
  hundred_years_war.215.title: "Зміна вірності"
  hundred_years_war.215.desc: "Досить тривалий час статус [target_war.GetName] залишав нас дуже незадоволеними. Попри запевнення від [scuffed_side_country.GetName], багато наших радників підтримують ідею виступити проти них. Хід війни ще може змінитися, і нам було б добре бути готовими. Відправивши пропозицію до [potential_new_ally.GetName], можливо, ми зможемо подолати наші розбіжності та змінити баланс сил?"
  hundred_years_war.215.a: "Було б мудро вийти з цього конфлікту."
  hundred_years_war.215.b: "Ми не можемо дозволити собі ще одного ворожого сусіда!"
  subject_100_yw_215_effect_tt: "Якщо вони погодяться, ми отримаємо [Concept('white_peace', 'CONCEPT_PLACEHOLDER')|e] у поточній війні"
  sovereign_100_yw_215_effect_tt: "Якщо вони погодяться, ми приєднаємося до них проти [scuffed_side_country.GetName] у поточній війні"
  hundred_years_war.215.b.tt: "[Concept('action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('betray_our_allegiance')] буде доступна знову через #Y 2#! роки"
  hundred_years_war.216.title: "[wormtongue_country.GetAdjectiveWithNoTooltip] Перевертні"
  hundred_years_war.216.desc: "Надійшов лист, запечатаний і під охороною. Здається, [wormtongue_country.GetName] переглядає свої варіанти у поточній [target_war.GetName]. За словами їхніх посланців, вони готові зрадити [scuffed_side_country.GetName] на нашу користь під час цього конфлікту. Незалежно від того, приймемо ми це чи ні, це важливий зсув у геополітичній ситуації, що оточує [ShowSituationName('hundred_years_war')]. Отже, це питання надзвичайної важливості і вимагає нашої повної уваги наразі."
  hundred_years_war.216.a: "Ми вітаємо їхню зміну думки."
  hundred_years_war.216.b: "У наших лавах немає місця для підступних дурнів!"
  hundred_years_war.216.b.tt: "Ми розтрощимо їхні зрадницькі черепи на полі бою!"
  hundred_years_war.200.tt.a: "Якщо [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] відмовить, ми можемо заявити свої права на [GetCountry('AQN').GetNameWithNoTooltip], надаючи нам претензії.\nЦе наблизить нас до війни проти [GetCountry('ENG').GetNameWithNoTooltip]!"
  hundred_years_war.200.tt.b: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] може заохотити [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] висунути свої претензії на [GetCountry('FRA').GetNameWithNoTooltip] через [GetCharacter('eng_isabella_of_france').GetName] проти нашого [ShowHeirSelectionName('salic_law')]!"
  hundred_years_war.201.tt.a: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] Двір розцінить це як порушення васальних зобов'язань Едуарда III і може вдатися до конфіскації [GetCountry('AQN').GetLongName], надаючи їм претензії на всі [GetCountry('AQN').GetAdjectiveWithNoTooltip] території."
  hundred_years_war.201.tt.b: "Відносини між [GetCountry('ENG').GetAdjectiveWithNoTooltip] та [GetCountry('FRA').GetAdjectiveWithNoTooltip] дворами стабілізуються, наразі."
  hundred_years_war.202.tt.a: "Це спричинить ситуацію #W Столітня війна#! розпочатися раніше!\nМи отримаємо претензії на всі території, що належать [GetCountry('AQN').GetLongName]."
  hundred_years_war.203.tt.a: "Статус шляхтича [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] буде поважатися, і він не буде страчений."
  hundred_years_war.203.tt.d: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] стане Лордом [GetCountry('ARS').GetLongNameWithNoTooltip], створивши нового васала з [GetCountry('BUR').GetAdjective] земель!"
  may_grant_robert_artois_tt: "Ми отримаємо претензії на претензії [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] в [GetCountry('ARS').GetLongName] у провінції Аррас, разом із провінцією Ам'єн.\nЯкщо ми завоюємо частини Артуа, ми можемо надати [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] ці території та зробити [SCOPE.sCharacter('fugitive_robert_de_artois').GetHimHer] васалом."
  may_still_trigger_hyw_tt: "Ситуація #W Столітня війна#! все ще може розпочатися."
  hundred_years_war.217.title: "Заклик до зброї"
  hundred_years_war.217.desc: "Коли вогні війни охоплюють поля [GetCountry('ENG').GetAdjective] та [GetCountry('FRA').GetAdjective] земель, вісник від [actor.GetName] прибуває до нашого двору. Ретельно підбираючи слова та з прихованою терміновістю, вони говорять про спільних ворогів, праведні справи та шляхетні зв'язки.\n\nЗа риторикою криється чітке прохання. Вони справді шукають нашої підтримки у своїй боротьбі, пропонуючи монету в обмін на наші прапори. Чи то з вірності, чи з нагоди, чи з амбіцій, вибір тепер за нами."
  hundred_years_war.217.a: "Ми будемо битися поруч із ними."
  hundred_years_war.217.b: "Їхня війна нас не стосується."
  hundred_years_war.218.title: "Пакт обережності"
  hundred_years_war.218.desc: "[target_asker.GetGovernment.GetCourtTitle] [target_asker.GetName] звернувся до нас з офіційною пропозицією: перемир'я, народженого не битвою, а передбачливістю. Хоча наші нації зараз не воюють, хвилі поточного конфлікту в [ShowRegionName('france_region')] загрожують втягнути нас у свою течію. Щоб запобігти такій долі, вони пропонують золото та обіцянку миру. Їхнє повідомлення чітке: вони не шукають сварки, лише дистанції від можливих ускладнень. Питання, що стоїть перед нами, полягає в тому, чи цінуємо ми обережність більше за можливості. Наші радники підтримують думку, що такий жест може бути формою дипломатичної гри! Дійсно, [target_character1.GetName] можливо, бажає забезпечити [target_character1.GetHerHis] кордон проти [target_character2.GetName] у підготовці до військової кампанії деінде..."
  hundred_years_war.218.a: "Дбаймо про мир, наразі."
  hundred_years_war.218.b: "Ми не можемо дати такої обіцянки."
  hundred_years_war.219.title: "Наш статус під [GetCountry('FRA').GetAdjectiveWithNoTooltip] Короною"
  hundred_years_war.219.desc: "Хоча минули десятиліття відтоді, як королі [ShowDynastyName('plantagenet_dynasty')] востаннє правили з [ShowLocationName('rouen')], тінь їхньої спадщини висить над [ROOT.GetCountry.GetName]. Колись серцевина трансканальних королівств, [ROOT.GetCountry.GetFlavorRank] тепер стоїть як приз і провокація — заявлена однією короною, бажана іншою.\n\nЗі зростанням напруги між [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName], питання нашого майбутнього знову виходить на перший план. [GetCountry('FRA').GetAdjectiveWithNoTooltip] спадкоємець, [target_character.GetName], щойно наділений владою, тепер повинен або підтвердити [target_character.GetHerHis] претензії на [GetCountry('FRA').GetFlavorRank], або вказати новий напрямок — той, що може підбадьорити саме того суперника, який їм найбільше загрожує. [ROOT.GetCountry.GetNameWithNoTooltip] це більше, ніж земля. Це пам'ять, амбіції та спадщина. І коли насувається війна, її доля вже не є лише символічною."
  hundred_years_war.219.historical_info: "Нормандія колись була наріжним каменем Англо-Нормандського королівства, керована англійськими монархами відтоді, як Вільгельм Завойовник заявив свої права на англійський престол з цих самих земель. Її стратегічне та економічне значення зробило її постійним джерелом тертя між Англією та Францією. Хоча вона була відвойована французькою короною за Філіпа II на початку XIII століття, англійці ніколи повністю не відмовлялися від своїх претензій. На початку Столітньої війни ці старі образи знову спливли, з англійськими королями, що заявляли свої права не лише на французький престол, а й на давно втрачені території — Нормандія передусім серед них. Подвійна спадщина регіону поставила його в центр династичного суперництва і зробила його гарячою точкою в майбутньому конфлікті."
  hundred_years_war.219.a: "Ми стоїмо з [GetCountry('FRA').GetNameWithNoTooltip]!"
  hundred_years_war.219.b: "Відкиньмо слабкість, звернімося до [GetCountry('ENG').GetNameWithNoTooltip] натомість."
  hundred_years_war.220.title: "Пивовар [ShowLocationNameWithNoTooltip('ghent')]"
  hundred_years_war.220.desc: "Поки [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName] готуються занурити значну частину [ShowSubContinentName('western_europe')] у війну, міста [ROOT.GetCountry.GetName] стоять на порозі політичного розрахунку. Хоча номінально пов'язані з нашим [GetCountry('FRA').GetAdjective] сюзереном, процвітання [ShowLocationName('ghent')], [ShowLocationName('bruges')] та [ShowLocationName('ypres')] залежить від набагато віддаленішої сили: [GetCountry('ENG').GetAdjective] [ShowGoodsName('wool')], без якої наші ткацькі верстати замовкли б, а ринки занепали. Серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] один голос підноситься над рештою: [target_character2.GetName], харизматичний пивовар, який користується повагою як ремісників, так і [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] однаково. З війною на горизонті, [target_character2.GetHerHis] заклики переорієнтувати наш [ROOT.GetCountry.GetFlavorRank] та політику [target_character.GetName] з [GetCountry('ENG').GetAdjectiveWithNoTooltip] [GetCountry('ENG').GetFlavorRank] стають дедалі гучнішими з кожним днем."
  hundred_years_war.220.historical_info: "Якоб ван Артевельде, заможний купець і пивовар з Гента, став політичним лідером на ранніх етапах Столітньої війни. Фландрія, хоча й була васалом французької корони, сильно залежала від англійської вовни для підтримки своєї потужної текстильної економіки. Коли напруга між Францією та Англією зростала, ван Артевельде відстоював проанглійську позицію, забезпечуючи торгівлю та внутрішню автономію, чинячи опір прямому французькому контролю. Його лідерство ненадовго стабілізувало фламандські міста, але його зростаюча влада зробила його мішенню. У 1345 році він був убитий натовпом у Генті, звинувачений у спробі занадто прямого нав'язування англійського правління."
  hundred_years_war.220.a: "[target_character2.GetShortNameWithNoTooltip] має рацію, ми повинні захистити нашу промисловість насамперед."
  hundred_years_war.220.b: "Це насувається катастрофа..."
  hundred_years_war.1537.title: "Пат у [ShowSituationNameWithNoTooltip('hundred_years_war')]"
  hundred_years_war.1537.desc: "Протягом сотень років армії [GetCountry('ENG').GetName] та [GetCountry('FRA').GetName] зіштовхувалися на полях битв по всій [ShowSubContinentName('western_europe')]. Хоча часом здавалося, що конфлікт добіжить кінця, жодна сторона не змогла повністю знищити іншу. Тепер, сотні років потому, навіть [target_character1.GetName] та [target_character2.GetName] забули першопричину війни. Жорстокість багатьох воєн між ними повільно зникає з пам'яті."
  war_what_is_it_good_for_tt: "[ShowSituationName('hundred_years_war')] завершилася патом"
  based_on_current_relative_strength_with_our_opponent_in_hyw_tt: "Виходячи з [Concept('country_strength', 'CONCEPT_PLACEHOLDER')|e] між нами та нашим опонентом у [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]:"