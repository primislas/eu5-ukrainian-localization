l_english:
  imperial_examination_events.1.title: "Призначення нового бюрократа"
  imperial_examination_events.1.desc: "Мало хто може похвалитися такою системою бюрократичного просування, як у нас. Використовуючи адміністративну систему [ShowLawName('imperial_examination_law')], ми з гордістю спостерігаємо за соціальною мобільністю осіб з великими інтелектуальними здібностями.\n\nНайновіший кандидат, який успішно склав іспит, прославлений за [target_character.GetHerHis] знання Чотирьох Книг та П'яти Класиків, а також класичної літератури та поезії, є не хто інший, як [target_character.GetName]."
  imperial_examination_events.1.a: "Ми будемо спостерігати за вашою кар'єрою з великим інтересом, [target_character.GetShortNameWithNoTooltip]!"
  imperial_examination_events.7.title: "Найяскравіші з покоління"
  imperial_examination_events.7.desc: "Наша мудра екзаменаційна система, #italic [ROOT.GetCountry.Custom('GetExaminationSystemPolicyName')]#!, заохочує наше населення до навчання та самовдосконалення, щоб стати великими лідерами та бюрократами, здатними взяти на себе честь обіймати посаду у великій [ROOT.GetCountry.GetLongName].\n\nНове покоління яскравих умів відзначилося в наших численних центрах мудрості та пропонує свої послуги нашому [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  imperial_examination_events.7.a: "Запросити [adm_bureocrat.GetName] до нашого двору"
  imperial_examination_events.7.a.tt: "[adm_bureocrat.GetName] приєднується до нашого двору"
  imperial_examination_events.7.b: "Запросити [dip_bureocrat.GetName] до нашого двору"
  imperial_examination_events.7.b.tt: "[dip_bureocrat.GetName] приєднується до нашого двору"
  imperial_examination_events.7.c: "Запросити [mil_bureocrat.GetName] до нашого двору"
  imperial_examination_events.7.c.tt: "[mil_bureocrat.GetName] приєднується до нашого двору"
  imperial_examination_events.2.historical_info: "POSTEDIT_Лю Бовен, видатна постать пізніх династій Юань та ранніх Мін, піднявся зі скромних початків, щоб стати відомим завдяки своєму винятковому інтелекту, стратегічній майстерності та політичній далекоглядності. Він відіграв вирішальну роль у поваленні монгольської династії Юань та заснуванні династії Мін, значно сприяючи військовим кампаніям, що призвели до приходу Мін до влади. Окрім військових досягнень, Лю також був відомий своїми літературними та науковими внесками в китайську літературу та філософію, залишивши тривалу спадщину як багатогранна постать в історії Китаю."
  imperial_examination_events.3.historical_info: "POSTEDIT_Юй Цянь розпочав свою кар'єру на державній службі Мін у 1421 році після складання імперського іспиту як цзіньші. Його відданість і служба призвели до призначення його Великим Координатором Шаньсі та Хенані імператором Сюаньде. Незважаючи на ув'язнення через конфлікти з впливовими фігурами, під час правління імператора Мін Інцзуна він був відновлений на посаді та зрештою підвищений до міністра війни. Вирішальна роль Юй Цяня в захисті Пекіна від нападів ойратських монголів у 1449 році принесла йому подальше визнання, але пізніше він був страчений за передбачувану зраду під час політичних потрясінь, що послідували."
  imperial_examination_events.4.historical_info: "Після отримання ступеня цзіньші у 1442 році, POSTEDIT_Хань Юн служив цензором, перш ніж бути підвищеним до провінційного інспектора Цзянсі у 1452 році. Під час свого перебування на посаді він керував відновленням павільйону Тен Ван. У 1465 році він відіграв ключову роль як військовий інспектор у кампанії Чжао Фу проти повстання народів Мяо в Датен Ся. Після успішного завершення кампанії, Хань Юн був призначений віце-королем Лянгуан, щоб продовжити свої зусилля з умиротворення регіону, хоча зрештою він пішов у відставку через напади своїх підлеглих."
  imperial_examination_events.5.historical_info: "POSTEDIT_Сюй Пу, видатний політичний діяч династії Мін, продемонстрував надзвичайну наукову майстерність, здобувши престижний титул цзіньші у 1454 році. Сумлінно працюючи на різних адміністративних посадах, він, зокрема, взяв на себе завдання зі складання Зібрання статутів династії Мін, значного юридичного підприємства, дорученого йому у 1497 році. Незважаючи на труднощі у стримуванні впливу певних фракцій, перебування Сюй Пу на посаді стало прикладом відданості компромісу та доброзичливого управління. Окрім його політичної діяльності, спадщина Сюй Пу зберігається завдяки його благодійним актам, прикладом яких є його заповіт безподаткової землі для допомоги збіднілим членам його клану, що принесло йому посмертне визнання як Вень Цзін."
  imperial_examination_events.6.historical_info: "POSTEDIT_Ван Янмін, багатогранна постать династії Мін, став ключовим неоконфуціанським мислителем, кинувши виклик ортодоксальній філософії Чжу Сі, наголошуючи на інтуїтивному розумінні над раціоналістичним дуалізмом. Походячи з роду наукової відзнаки, військові подвиги Вана як генерала відзначалися суворою дисципліною та співчутливим підходом до придушення повстань, виступаючи за амністію під час конфлікту. Центральним у його філософських внесках була концепція вродженого знання, що постулює, що індивіди володіють вродженим розумінням моралі від народження. Його заснування школи Лу-Ван, разом з Лу Цзююанем, поширило його вплив по всьому Китаю та Японії, де його вчення надихало видатних діячів і навіть вплинуло на розвиток бусідо. Тривала спадщина Ван Янміна виходить за межі його епохи, формуючи конфуціанську думку та етичний дискурс аж до сучасності, як у Китаї, так і в Японії, де його глибокий вплив продовжує відлунювати в інтелектуальних та політичних сферах."
  chi_while_han_yong_cabinet_tengwang_pavilion_tt: "Поки [target_character.GetNameWithNoTooltip] служить у кабінеті, є шанс, що відбудеться подія $flavor_chi.21.title$"