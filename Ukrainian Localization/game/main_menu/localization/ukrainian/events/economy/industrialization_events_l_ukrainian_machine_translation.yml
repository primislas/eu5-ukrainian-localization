l_english:
  industrialization_events.1.title: "Атмосферний двигун"
  industrialization_events.1.desc: "Хоча використання пари як рушійної сили для двигуна відоме з глибокої давнини, нещодавні розробки дозволяють використовувати її для більш практичних застосувань. Спираючись на старі експериментальні повітряні насоси, [target_scientist.GetName] створив у [invention_province.GetName] новий тип двигуна, який використовує тиск пари для переміщення циліндра та відкачування води з мокрих шахт. Атмосферний двигун тепер дозволяє видобуток там, де раніше це було неможливо, і його впровадження значно підвищить ефективність шахт у нашій країні."
  industrialization_events.1.a: "Ми відчуваємо подих прогресу."
  industrialization_events.2.title: "Паровий доменний процес"
  industrialization_events.2.desc: "Хоча [ShowAdvanceName('coke_blast_furnace')] був значним покращенням у металургійному процесі, домішки коксу зазвичай створюють більше проблем, ніж переваг. Нещодавно в [invention_province.GetName] були проведені дослідження для вирішення цих проблем, і використання парових двигунів для подачі повітря в піч показало великий потенціал. Хоча багато наших найяскравіших умів погоджуються, що ще є багато можливостей для вдосконалення, ці нові методи вже значно покращили наші металургійні процеси."
  industrialization_events.2.a: "Це вибух у майбутнє."
  industrialization_events.3.title: "Удосконалений паровий двигун"
  industrialization_events.3.desc: "Удосконалюючи конструкцію ранніх атмосферних двигунів, підприємець та винахідник [target_scientist.GetName] зумів створити в [invention_province.GetName] новий тип машини, яка використовує окремий конденсатор та обертальний рух замість коливального, як у попередніх двигунів. Працюючи трохи вище атмосферного тиску, паровий двигун [target_scientist.GetLastNameWithNoTooltip] обіцяє бути вдвічі продуктивнішим за попередні моделі та виявиться безцінним засобом для приводу машин у всіх типах промислових підприємств."
  industrialization_events.3.a: "Ідеальний двигун, щоб рухати нас вперед."
  industrialization_events.4.title: "Самозаточувальні плуги"
  industrialization_events.4.desc: "[ShowAdvanceName('rotherham_plough')] покращив ключовий інструмент для сільського господарства, який залишався практично незмінним з часів Римської імперії. Тепер плуги можуть бути легшими та менше обтяжувати тварин, що їх тягнуть. Ця нова модель не тільки поширилася по всій нашій країні, але й викликала інтерес до пошуку способів покращення інструментів, незалежно від того, наскільки усталеними є їхні конструкції.\n\nВже були зроблені покращення в [invention_province.GetName], де завдяки процесу контакту розплавленого та холодного металу, процесу, що називається литтям у холодильні форми, плуги стають настільки гострими, що їх називають самозаточувальними."
  industrialization_events.4.a: "Це прокладе нові шляхи для нашої економіки."
  industrialization_events.5.title: "Летючий човник"
  industrialization_events.5.desc: "[target_scientist.GetName], місцевий винахідник, що працює в [invention_province.GetName], запатентував нову конструкцію «колісного» човника, який, як [target_scientist.GetSheHe] обіцяє, революціонізує ткацтво, усуваючи потребу в другій особі для ловлі човника, коли він проходить крізь нитки основи. Хоча продуктивність все ще обмежена швидкістю, з якою можна прясти нитки, ця нова модель човника швидко поширюється серед ткачів по всій країні, вже покращуючи основне вузьке місце у виробництві текстилю."
  industrialization_events.5.a: "Продуктивність злетить до небес."
  industrialization_events.6.title: "Прялка «Дженні»"
  industrialization_events.6.desc: "Основною перешкодою для продуктивності ткацтва довгий час була швидкість, з якою можна прясти нитки. Ще до впровадження летючого човника одному ткачеві потрібно було чотири прядильники для обслуговування ткацького верстата. Щоб подолати цю перешкоду, [target_scientist.GetName] розробив у [invention_province.GetName] машину, що дозволяє одному працівнику виконувати роботу багатьох прядильників. Разом з летючим човником ця машина обіцяє значно покращити ефективність ткацтва в найближчому майбутньому."
  industrialization_events.6.a: "Нитки нашої долі виглядають золотими."
  industrialization_events.7.title: "Потік товарів"
  industrialization_events.7.desc: "Нещодавні досягнення та винаходи дозволили нам значно покращити нашу продуктивність. Однак, незалежно від того, скільки люди виробляють, це не принесе реальної вигоди, якщо товарам не дозволено достатньо вільно переміщатися через неадекватну інфраструктуру. У [industrial_province.GetName] деякі люди вже почали брати ініціативу на себе, щоб підтримувати та розширювати дорожню мережу, і вони навіть почали впроваджувати платні дороги для оплати таких покращень та обслуговування. Також існують далекосяжні плани будівництва потенційних транспортних каналів та спеціалізованих доріг для подальшого полегшення місцевого потоку товарів."
  industrialization_events.7.a: "Гідна мета, вони матимуть наше заступництво!"
  industrialization_events.7.tt_common: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] отримує [ShowModifier('improved_flow_of_goods')]"
  industrialization_events.7.a.tt: "$industrialization_events.7.tt_common$ протягом #Y 20#! років"
  industrialization_events.7.b: "Чудова ініціатива, але державі не варто втручатися."
  industrialization_events.7.b.tt: "$industrialization_events.7.tt_common$ протягом #Y 10#! років"
  industrialization_events.8.title: "Насіння Величі"
  industrialization_events.8.desc: "Взявши до серця уроки [ShowInstitutionName('industrialization')], група заможних землевласників почала працювати над підвищенням ефективності сільського господарства. Завдяки новаторським винаходам у використанні машин для розподілу насіння, новим культурам, новим формам сівозміни та селекції, місцеві землевласники [agricultural_province.GetName] змогли значно покращити місцевий вихід продовольства."
  industrialization_events.8.a: "Вигоди проростуть скрізь."
  industrialization_events.8.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] отримує [ShowModifier('agricultural_revolution')] на #Y 10#! років"
  industrialization_events.9.title: "Економічний Розвиток"
  industrialization_events.9.desc: "Застосовуючи останні технологічні інновації в галузі машинобудування, місцеві підприємці планують значно покращити свій випуск продукції в [industrialization_province.GetName]. В результаті, багато хто тепер бажає подорожувати туди з інших частин нашої країни, прагнучи знайти нову роботу в потенційно зростаючому морі можливостей."
  industrialization_events.9.a: "[industrialization_province.GetNameWithNoTooltip] стане для них чудовим домом."
  industrialization_events.9.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_area.GetName] отримує [ShowModifier('economic_urbanization_modifier')] на #Y 10#! років"
  industrialization_events.9.b: "Навіщо намагатися змінити те, що вже працює?"
  industrialization_events.10.title: "Зростання Текстильної Промисловості в [target_location.GetNameWithNoTooltip]"
  industrialization_events.10.common_start: "Завдяки використанню сучасного обладнання та методів роботи, місцевий ткацький бізнес [target_location.GetName]"
  industrialization_events.10.common_ending: "Однак це також викликало деякі побоювання, оскільки багато хто боїться збільшення кількості низькоякісних продуктів, які, на їхню думку, заполонять ринок."
  industrialization_events.10.desc: "$industrialization_events.10.common_start$ перетворився на значно масштабніший бізнес. Там, де колись експортувалася лише проста тканина, тепер процвітає сектор виробництва сукна, що значно допомагає місцевій економіці. $industrialization_events.10.common_ending$"
  industrialization_events.10.rural.desc: "$industrialization_events.10.common_start$ зміг покращити свої раніше обмежені можливості. Місцеві та знайомі майстерні забезпечуються найновішими винаходами навіть у найвіддаленіших селах, що уможливлює створення більш спеціалізованих бізнес-підприємств. $industrialization_events.10.common_ending$"
  industrialization_events.10.a: "Час нікого не чекає."
  industrialization_events.11.title: "Зростання [ShowGoodsNameWithNoTooltip('paper')] Промисловості"
  industrialization_events.11.desc: "Деякий час місцеве виробництво [ShowGoodsName('paper')] було присутнє в [industrialization_province.GetName]. Використовуючи нові технології виробництва, деякі підприємці побачили можливості цієї галузі, і деякі об'єкти для виробництва [ShowGoodsNameWithNoTooltip('paper')] там вже створюються та розширюються. Незабаром вони можуть навіть стати основним експортом [industrialization_province.GetNameWithNoTooltip]!"
  industrialization_events.11.a: "Письмове слово живе."
  industrialization_events.12.title: "Зростання [ShowGoodsNameWithNoTooltip('glass')] Промисловості"
  industrialization_events.12.desc: "[industrialization_province.GetName] завжди мала деяке місцеве виробництво лісового скла, але з останніми досягненнями у виробництві [ShowGoodsName('glass')] ця провінція привернула інтерес багатьох бізнесменів. Намагаючись скористатися рухом цих мінливих часів, багато нових [ShowGoodsNameWithNoTooltip('glass')] промисловостей починають створюватися в [industrialization_province.GetNameWithNoTooltip]."
  industrialization_events.12.a: "Їхнє майбутнє кришталево чисте."
  industrialization_events.13.title: "Промислова Урбанізація"
  industrialization_events.13.desc: "Останні зміни у виробничих та промислових техніках призвели до того, що економіка [urbanization_province.GetName] почала приваблювати людей з усього [ROOT.GetCountry.GetFlavorRank] у пошуках потенційних можливостей для роботи. Постійний потік людей залишає сільську місцевість, щоб шукати нові можливості для роботи та нове життя в [urbanization_province.GetRank.GetName] [urbanization_province.GetNameWithNoTooltip]."
  industrialization_events.13.a: "Приходьте всі, приходьте всі!"
  industrialization_events.13.b: "[urbanization_province.GetNameWithNoTooltip] вже має достатньо людей."
  industrialization_events.14.title: "Металургійні заводи [iron_province.GetNameWithNoTooltip]"
  industrialization_events.14.desc: "Запровадження сучасних промислових машин, таких як коксові печі, парові залізниці та насоси, значно сприяло зростанню місцевої економіки в [iron_province.GetName]. Місцеві металургійні заводи тепер є одними з найкращих у регіоні, і багато людей хочуть переїхати туди, щоб насолодитися процвітанням промисловості."
  industrialization_events.14.a: "Це світанок нової ери."
  industrialization_events.14.b: "Промисловість – це добре, але нам потрібні люди й в інших місцях."
  industrialization_events.15.title: "Текстильні фабрики [textile_province.GetNameWithNoTooltip]"
  industrialization_events.15.desc: "Зростаючий попит на текстиль та впровадження нових методів і машин дозволили текстильному сектору в [textile_province.GetName] зростати та процвітати протягом останніх кількох років. Це, своєю чергою, призвело до економічного підйому для всього регіону, і багато хто тепер готовий переїхати з сільської місцевості на нові фабрики."
  industrialization_events.15.a: "Ці верстати одягнуть націю."
  industrialization_events.15.b: "Вони малюють занадто гарну картину."
  industrialization_events.16.title: "Верфі [ship_province.GetNameWithNoTooltip]"
  industrialization_events.16.desc: "Нові досягнення в організації праці, а також технічні інновації призвели до швидкого зростання верфей [ship_province.GetName]. Кораблі та військово-морське спорядження тепер виробляються ефективніше, і внаслідок цього економічного підйому провінція приваблює більше людей для роботи на місцевих верфях."
  industrialization_events.16.a: "[ROOT.GetCountry.GetNameWithNoTooltip] править хвилями."
  industrialization_events.16.b: "Немає потреби затоплювати це місце людьми."
  industrialization_events.17.title: "Ворожість до нових методів виробництва"
  industrialization_events.17.desc: "Зміни у методах виробництва, які приніс технологічний прогрес, не всі зустріли з радістю. Деякі відчувають, що їхній засіб до існування під загрозою через зростаючу механізацію, і створюють проблеми через протести та саботаж. У [luddite_province.GetName] ситуація загрожує перерости у повномасштабне повстання серед ремісників."
  industrialization_events.17.a: "Луддити!"
  industrialization_events.17.a.tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] втрачає [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  industrialization_events.17.b: "Нам доведеться домовлятися."
  industrialization_events.18.title: "Збіднілі ремісники"
  industrialization_events.18.desc: "Нові методи виробництва призвели до зростання перспективної промисловості в нашій країні, але це зростання залишило позаду багато старих ремісничих родин. Багато хто тепер бідний і мусить шукати набагато менш прибуткову роботу в зростаючій промисловості."
  industrialization_events.18.a: "Такий вже хід речей."
  industrialization_events.18.b: "Зробімо все можливе, щоб підтримати цих людей."
  industrialization_events.19.title: "Поширення хвороби в [disease_province.GetNameWithNoTooltip]"
  industrialization_events.19.desc: "[disease_province.GetRank.GetName] [disease_province.GetName] зазнав величезного зростання за останні кілька років, і колись такий амбітний план для [disease_province.GetRank.GetNameWithNoTooltip] був повністю підірваний. Багато хто живе в нетрях з дуже поганими санітарними умовами, що призводить до швидкого поширення хвороб у [disease_province.GetRank.GetNameWithNoTooltip]."
  industrialization_events.19.a: "[ROOT.GetCountry.Custom('common_string_we_must_do_something')]"
  industrialization_events.19.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  industrialization_events.20.title: "Аварія на шахті у [mining_province.GetNameWithNoTooltip]"
  industrialization_events.20.desc: "Нові технології дозволили значно розширити шахти [mining_province.GetName], і тепер вони працюють з ефективністю, яка б шокувала наших предків. Однак нове обладнання не позбавлене ризиків. Вибух у місцевій шахті призвів до обвалу, який заблокував багатьох шахтарів, а також спричинив значний спад виробництва."
  industrialization_events.20.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  industrialization_events.21.title: "Пожежа у [fire_province.GetNameWithNoTooltip]"
  industrialization_events.21.desc: "Пожежа, що почалася на місцевій фабриці, швидко поширилася серед тісних будинків [fire_province.GetName] і спустошила [fire_province.GetRank.GetName]. Дехто вбачає в цьому ще одну проблему зростаючої урбанізації та індустріалізації нашого часу."
  industrialization_events.21.a: "Власники фабрик повинні зробити внесок у відбудову [fire_province.GetRank.GetNameWithNoTooltip]."
  industrialization_events.21.a.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [target_area.GetName] отримує [ShowModifier('fire_compensation')] на #Y 10#! років"
  industrialization_events.21.b: "Ми повинні допомогти цим бідним людям."
  industrialization_events.22.title: "Місцеве виробництво розгромлено"
  industrialization_events.22.desc: "Наша політика видобутку сировини з наших далеких провінцій для підживлення індустріалізації на батьківщині призвела до нищівного економічного розвитку у [overseas_production_province.GetName]. Незважаючи на славну історію продуктивності там, регіон тепер зведений до експорту неочищених продуктів, що є не більше ніж сировиною для переробки іншими."
  industrialization_events.22.a: "Ми повинні підтримати місцевих ремісників."
  industrialization_events.22.b: "Такий шлях прогресу."