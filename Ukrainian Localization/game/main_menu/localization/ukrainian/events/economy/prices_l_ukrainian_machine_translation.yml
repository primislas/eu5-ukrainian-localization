l_english:
  prices.1.title: "Трикутна торгівля"
  prices.1.desc: "Коли європейські нації почали колонізувати Північну та Південну Америку, вони створили великі плантації для виробництва бавовни, тютюну та цукру. Спочатку вони намагалися використовувати місцеве населення як рабів, але там, де це було спробувано, вони швидко вимирали. Тоді рабів імпортували з Африки, що створило трикутну торговельну систему. Європа продавала текстиль, ром та промислові товари до Африки, Африка продавала рабів до Америки, а Америка продавала бавовну, цукор та тютюн до Європи."
  prices.1.a: "Це збільшить попит на рабів."
  triangle_trade_africa: "Трикутна торгівля"
  triangle_trade_america: "Трикутна торгівля"
  triangle_trade_europe: "Трикутна торгівля"
  prices.2.title: "Європейські торговці в Китаї"
  prices.2.desc: "Зі значним контингентом європейських торговців у Китаї попит на китайську порцеляну стрімко зріс. Китайська порцеляна користується попитом у всій Європі, а китайці приймають лише срібло або золото як оплату."
  prices.2.a: "Це збільшить попит на порцеляну."
  porcelain_from_china: "Китайська порцеляна в Європі"
  prices.3.title: "Порцеляна в Мейсені"
  prices.3.desc: "Наші винахідники витратили деякий час на вивчення зразків порцеляни, які наші торговці привезли з Китаю. Вони стверджують, що відкрили секрети її виробництва. Зразки, які вони представили [ROOT.GetCountry.GetGovernment.GetRuler.GetName], безумовно, дуже витончені і принесуть значне багатство, якщо їх можна буде виробляти у великих кількостях. Тепер вони просять наших інвестицій для створення порцелянової мануфактури, яка, за їхніми словами, дозволить їм захопити німецький ринок фарфорових виробів."
  prices.3.a: "Порцеляна стане нашим шляхом до багатства."
  STATIC_MODIFIER_NAME_johan_friedrich_bottger: "Методи Йогана Фрідріха Беттгера"
  prices.4.title: "Укорінення протестантизму"
  prices.4.desc: "З поширенням протестантизму у все більшій кількості католицьких країн, менше людей дотримуються Великого посту. Без 40 днів, коли жоден справжній католик не може їсти м'ясо і змушений їсти рибу, попит на рибу різко падає."
  prices.4.a: "Це зменшить попит на рибу."
  lutheran_dont_eat_fish: "Лютерани не їдять рибу"
  prices.5.title: "Кавовий бум"
  prices.5.desc: "Спочатку напій, значною мірою пов'язаний з мусульманським світом, кава стає все більш поширеною навіть серед християн у Європі. У світі, що все більше взаємопов'язаний, придбання чого завгодно, включаючи каву, вже не так важко, як колись. В результаті, кав'ярні все частіше відкриваються в Європі, а екзотичні зерна користуються все більшим попитом."
  prices.5.a: "Це збільшить ціну на каву."
  coffee_boom_happened: "Кавовий бум"
  prices.6.title: "Імпорт бавовни"
  prices.6.desc: "Під час Відродження індійські бавовняні тканини ставали все більш популярними в Європі. Зрештою, [ROOT.GetCountry.GetAdjective] вовняна промисловість зазнала сильного тиску і вимагала заборони імпорту бавовни."
  prices.6.a: "Ми не обмежуватимемо вільну торгівлю."
  prices.6.b: "Заборонити імпорт бавовни!"
  STATIC_MODIFIER_NAME_cotton_imports_banned: "Імпорт бавовни заборонено"
  prices.7.title: "Про чай та цукор"
  prices.7.desc: "Чай, що походив з Китаю, швидко став новим [ROOT.GetCountry.GetAdjectiveWithNoTooltip] національним напоєм після його запровадження в [ROOT.GetCountry.GetName]. Змішаний з цукром, його споживають багаті, бідні та навіть [ROOT.GetCountry.GetGovernment.GetRuler.GetName]."
  prices.7.a: "Це збільшить попит на чай та цукор."
  tea_and_sugar_for_britain: "Потреби чаювання!"
  prices.8.title: "Торгівля прянощами"
  prices.8.desc: "Відкриття Східноіндійського торгового шляху започаткувало епоху торгівлі прянощами. З появою нових торгових шляхів контроль над потоком прянощів, таких як перець або кориця, став важливішим, ніж будь-коли."
  prices.8.a: "Це збільшить ціну на прянощі."
  spice_trade: "Торгівля прянощами"
  prices.10.title: "Виверження Уайнапутіни"
  prices.10.desc: "У лютому 1600 року перуанський вулкан, відомий як Уайнапутіна, вивергнувся потужним вибухом. Наслідки виверження відчувалися по всьому світу, де голод забрав мільйони життів, а торгівля зерном та вином занепала."
  prices.10.a: "Це буде погано для всього світу"
  STATIC_MODIFIER_NAME_eruption_of_huaynaputina: "Виверження Уайнапутіни"
  STATIC_MODIFIER_DESC_eruption_of_huaynaputina: "Найбільше зафіксоване виверження вулкана в Південній Америці спричинило глобальну вулканічну зиму."
  prices.11.title: "Найхолодніший період Малого льодовикового періоду"
  prices.11.desc: "Зими стають довшими та холоднішими, скільки сягає пам'ять. Оскільки лід та сніг цієї зими знову просуваються далі на південь, врожаї гинуть, вино псується, а риба почала мігрувати до тепліших вод."
  prices.11.a: "Бррр."
  STATIC_MODIFIER_NAME_the_little_ice_age: "Малий льодовиковий період"
  prices.15.title: "Рибальство на Великих банках"
  prices.15.desc: "Наші дослідники повідомляють, що над Великими банками Ньюфаундленду вони виявили води, киплячі тисячами й тисячами риб, які тільки й чекають, щоб їх спіймали! Рибальські експедиції прямують до цих вод у дедалі більшій кількості, а ринки переповнені неймовірною кількістю риби."
  prices.15.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  grand_bank_fisheries: "Рибальство на Великих банках"
  prices.16.title: "Каліко та інші бавовняні тканини"
  prices.16.desc: "Постійне постачання індійської бавовни почало призводити до значних змін у споживанні тканин у Європі. Муслін, каліко та інші бавовняні тканини продаються за дедалі вищими цінами на європейських ринках."
  prices.16.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  calicoes: "Каліко"
  prices.18.title: "Фетрові капелюхи"
  prices.18.desc: "Боброве хутро — чудовий матеріал для виготовлення капелюхів. Воно добре зберігає тепло та форму навіть у сувору погоду та протягом тривалого часу. Зростаючий попит на фетрові капелюхи разом зі складним процесом їх виготовлення призвів до зростання здорового сектору капелюшництва в нашій економіці."
  prices.18.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  felt_hats: "Фетрові капелюхи"
  prices.19.title: "Постійні флоти"
  prices.19.desc: "Постійні флоти перетворилися з виняткових випадків на норму. Інституції, присвячені контролю над цими новими флотами, починають брати набагато активнішу участь у закупівлі припасів для будівництва, нормування та утримання своїх кораблів."
  prices.19.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  professional_navies: "Професійні флоти"
  prices.20.title: "Бронзові гармати"
  prices.20.desc: "Бронзова гармата з'явилася на полі бою і залишиться тут надовго. Матеріали, необхідні для живлення зростаючих галузей гарматного виробництва, призвели до вибухового зростання попиту на мідь протягом останніх кількох років, і в результаті ціни зросли."
  prices.20.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  bronze_cannons: "Бронзові гармати"
  prices.21.title: "Японська чайна культура"
  prices.21.desc: "Чаювання далеко не новий елемент у японській культурі. Однак постійний розвиток японської чайної церемонії протягом 16-го століття призвів до того, що напій тепер став звичним явищем у всьому японському суспільстві."
  prices.21.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  japanese_tea_ceremonies: "Чайні церемонії"
  prices.22.title: "Занепад торгівлі прянощами"
  prices.22.desc: "Зі зростанням кількості конкурентів на ринку прянощів доступність колись надзвичайно рідкісних східних прянощів різко зросла на заході. Хоча деякі намагалися стабілізувати ціни на прянощі, спалюючи те, що вони виробляють, або запроваджуючи суворіші правила для їх експорту, тепер стає зрозуміло, що прибутковість цього бізнесу зазнала постійного спаду."
  prices.22.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  decline_of_spices: "Занепад прянощів"
  prices.23.title: "Зміна моделей споживання"
  prices.23.desc: "Цукор колись був рідкісною розкішшю, яку доводилося імпортувати з Магрибу або Близького Сходу. Оскільки світ відкрився, а купівельна спроможність нашого міського класу зросла, цукор все ще може вважатися розкішшю, але досить доступною."
  prices.23.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  popularization_of_sugar: "Популяризація цукру"
  prices.24.title: "Популяризація шовкових тканин"
  prices.24.desc: "Протягом століть [ShowGoodsName('silk')] був символом багатства та витонченості, бажаним для еліт по всій [ShowContinentName('asia')], на [ShowRegionName('middle_east')] та в [ShowContinentName('europe')]. Його привабливість відіграла вирішальну роль у формуванні торговельних шляхів та глобальних досліджень, особливо під час [ShowAgeName('age_3_discovery')]. Тепер, завдяки вдосконаленням у виробництві та торгівлі, як сирий шовк, так і ткані вироби стають доступнішими, ніж будь-коли раніше. Ця нововиявлена доступність спричинила сплеск попиту на багатьох нових ринках, де [ShowGoodsNameWithNoTooltip('silk')] швидко перетворюється з предмета розкоші на модний товар серед зростаючих міських середніх класів."
  prices.24.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  popularization_of_silk: "Популяризація шовку"
  prices.27.title: "Скорочення популяції слонів у Південно-Східній Азії"
  prices.27.desc: "Після багатьох років повільного скорочення популяція слонів у Південно-Східній Азії зараз перебуває на рекордно низькому рівні. Попит на слонів та вироби зі слонової кістки як у Південно-Східній Азії, так і в Китаї, однак, ніколи не слабшав, і в результаті ціна на слонів та їхню слонову кістку зростає."
  prices.27.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  prices.28.title: "Розвиток залізоробної справи"
  prices.28.desc: "Різноманітні досягнення у залізоробній справі призвели до того, що залізна гармата тепер є ефективнішою та надійнішою, ніж старі бронзові гармати. Оскільки залізні вироби також все частіше замінюють мідь в інших галузях, наприклад, для столового приладдя, ціна на мідь падає, тоді як попит на залізо зростає."
  prices.28.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  iron_cannons: "Залізні гармати"
  prices.29.title: "Гарячий шоколад"
  prices.29.desc: "Використання какао для створення гарячого напою — це звичай, успадкований від американських тубільців. Хоча новий напій швидко прижився в деяких частинах європейського суспільства, знадобився деякий час і велика кількість цукру, перш ніж він отримав ширше визнання. Однак, після цього, попит на шоколад тепер неухильно зростає у Старому Світі."
  prices.29.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  hot_chocolate: "Гарячий шоколад"
  prices.30.title: "Зростаюча популярність тютюну"
  prices.30.desc: "Спочатку тютюн продавався як лікарська рослина, але згодом він став дедалі популярнішим як у християнському, так і в мусульманському світі завдяки своїм рекреаційним цілям. Від Парижа до Бенгалії ця звичка поширилася настільки, що тютюновий бізнес стає досить прибутковим."
  prices.30.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  popularization_of_tobacco: "Популяризація тютюну"