l_english:
  slave_trade.1.title: "Торговці рабами"
  slave_trade.1.desc: "Кількість [slaver_country.GetAdjectiveWithNoTooltip] купців, що шукають наші ринки, зросла від струмочка до постійного потоку. Їхній головний інтерес, схоже, полягає в отриманні рабів або безпосередньо, або шляхом придбання наших товарів, які можна обміняти на рабів. Досі це збагатило кількох місцевих вождів, що є небезпечним розвитком подій, оскільки це як посилює цих місцевих можновладців, так і зубожує навколишні поселення.\n\nТорговці рабами з [ROOT.GetCountry.GetCapital.GetName] просять нас створити більш послідовну систему та регулювати торгівлю через королівські монополії. Самі торговці з [slaver_country.GetLongName] також, схоже, зацікавлені в більш формальних і постійних домовленостях."
  slave_trade.1.a: "Укласти угоду з торговцями."
  slave_trade.1.b: "Ми не можемо терпіти продаж людських життів."
  STATIC_MODIFIER_NAME_protecting_against_slave_trade: "Захист від работоргівлі"
  STATIC_MODIFIER_NAME_accepting_slave_trade: "Підтримка работоргівлі"
  slave_trade_obstructed: "Работоргівля перешкоджена"
  slave_trade.5.title: "Швидка втрата авторитету"
  slave_trade.5.desc: "Рабовласники спустошили сільську місцевість [ROOT.GetCountry.GetName]. Як прямий наслідок несанкціонованих набігів, рабовласники з нашої столиці обернулися проти власного населення, щоб набити власні кишені. Ці торговці не тільки руйнують наші власні населені пункти, вони створюють для себе базу влади, яка в довгостроковій перспективі буде найбільш небезпечною."
  slave_trade.5.a: "Ще одна велика незручність..."
  slave_trade.5.b: "Ми повинні відновити порядок!"
  slave_trade.6.title: "Центр рабства спалено"
  slave_trade.6.desc: "Народ [from.GetLongName] спалив наш [ShowBuildingTypeName('slave_center')] у [slave_location.GetName]. Це законна причина для війни!"
  slave_trade.6.a: "І це може бути так..."