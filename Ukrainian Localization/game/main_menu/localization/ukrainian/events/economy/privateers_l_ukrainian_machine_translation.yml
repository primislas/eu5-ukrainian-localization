l_english:
  privateers.1.title: "Місцеві торговці вимагають допомоги"
  privateers.1.desc: "Купці та капітани торгових суден у [ROOT.GetCountry.GetName] надіслали представника до уряду, описуючи свою батьківщину як дедалі більш беззаконну землю, де процвітає піратство, а кораблі та порти регулярно грабуються каперами. Вони стверджують, що уряд нехтував ними, і просять фінансування для будівництва оборонних споруд проти зростаючих загроз. Якщо це прохання не буде задоволено, багато хто відчуває, що вони вже занадто багато втратили, і переведуть свій бізнес в інше місце."
  privateers.1.a: "Надішліть їм усе, що їм потрібно."
  privateers.1.b: "Вони мають достатньо грошей, щоб самостійно фінансувати ці оборонні споруди."
  refused_aid_traders: "Відмовлено в допомозі торговцям"
  privateers.2.title: "Недійсний каперський патент?"
  privateers.2.desc: "Каперство завжди є складним дипломатичним питанням, особливо коли не ведеться відкрита війна, і відмінність між ворогом, який повинен підкорятися певним правилам війни, і беззаконним піратом не завжди чітка. Ще менше це стосується нещодавно захопленого судна, яке пред'явило каперський патент, виданий [privateer_country.GetGovernment.GetRulerTitle] з сумнівними повноваженнями.\n\nХоча цей так званий капер виглядає для нас як простий пірат, визнання патенту дійсним може дозволити нам підтримувати кращу дипломатію з його господарями."
  privateers.2.a: "Цей хиткий привід не може врятувати його від шибениці!"
  privateers.2.b: "Ми можемо дозволити собі проявити деяку поблажливість у цьому рідкісному випадку."
  privateers.3.title: "Недійсний каперський патент?"
  privateers.3.desc: "Пірати є постійним лихом для наших купців, і успішне їх затримання зазвичай є великою перемогою не тільки для нас, але й для наших торгових партнерів. Наше останнє захоплення так званого пірата, з іншого боку, перетворилося на дипломатичний інцидент, оскільки він стверджує, що грабував кораблі від імені одного з наших підданих.\n\nКапітан пред'явив каперський патент, виданий від імені [ROOT.GetCountry.GetGovernment.GetRulerTitle], але [privateer_country.GetGovernment.GetRulerTitle]. Нібито будь-яка агресія проти нас була трагічним непорозумінням. Відчайдушно намагаючись уникнути шибениці, капітан благає нас вирішити справу з губернатором."
  privateers.3.a: "Губернатор перевищив свої повноваження. Цей пірат буде повішений."
  privateers.3.b: "Патент, виданий від нашого імені, дійсний, навіть від підданого."
  privateers.4.title: "Нерозсудливий капер"
  privateers.4.desc: "Залучення каперів для руйнування торгових зусиль наших супротивників виявилося для нас вигідним, але також має тенденцію приваблювати ненадійних і підступних ділових партнерів. Один капітан став сумнозвісним через те, що обходив правила та ігнорував договори, яких наші капери повинні дотримуватися, але також виявився дуже ефективним у рейдах на ворожі кораблі.\n\nМожливо, ці дві риси пов'язані, можливо, ні. Незалежно від цього, відкликання каперського патенту капітана було б дипломатично безпечним варіантом, але ми втратили б нашого найкращого капера."
  privateers.4.a: "Закони та договори — це, скоріше, рекомендації..."
  STATIC_MODIFIER_NAME_reckless_privateer: "Нерозсудливий капер"
  STATIC_MODIFIER_DESC_reckless_privateer: "Безжальному каперу було дозволено діяти на власний розсуд, що призвело до того, що інші капери намагалися здійснювати сміливіші рейди."
  privateers.4.b: "Ми не терпітимемо злочинців на нашій службі!"
  STATIC_MODIFIER_NAME_curtailed_privateer: "Обмежений капер"
  STATIC_MODIFIER_DESC_curtailed_privateer: "Безжального капера було звільнено з нашої служби, що змусило інших каперів бути обережнішими у своїх методах."
  privateers.5.title: "Капітан каперів стає розбійником"
  privateers.5.desc: "Існує дуже тонка межа між каперством і піратством, особливо в мирний час. Капітан і екіпаж однієї з наших каперських операцій нещодавно перетнули цю межу, коли вирішили напасти та пограбувати одного з наших власних торговців. Гірше того, нас повідомили, що цей акт відкритої непокори був лише початком їхніх подвигів, і що ці зрадники тепер вирушили, щоб заробити власне багатство... переважно, здається, з нашого багатства."
  privateers.5.a: "Ми відрубаємо їм голови за це!"
  privateers.6.title: "Океани поза каперством"
  privateers.6.desc: "Один з наших найдосвідченіших каперів здійснює набіги не лише у ворожі води, а й у ті частини світу, про які ми ледь знали, що вони під їхнім контролем. Його навички навігатора можна було б краще використати, якби ми надали кошти для довшої експедиції, щоб виявити, як далеко сягає рука ворога, можливо, навіть сягнувши далі, завоювавши нові землі для [ROOT.GetCountry.GetName] в ім'я віри [ROOT.GetCountry.GetReligion.GetName]."
  privateers.6.a: "Нехай він веде. Наші кораблі обійдуть світ."
  privateers.6.b: "Капери повинні шукати гроші у наших ворогів, а не у нас."
  privateers.7.title: "Пірати прагнуть союзу"
  privateers.7.desc: "Наше використання каперства для зміцнення нашої позиції на океанах не залишилося непоміченим неприємними особами, які грабують кораблі без благословення [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Хоча ми воліємо не бачити багато подібностей між нашими законними дозволами на відплату та цими шкідниками, деякі з них бачать чимало.\n\nДеякі з більш успішних піратів у нашій сфері інтересів прагнуть отримати підтримку [ROOT.GetCountry.GetName] більш-менш офіційно. Вони також натякають, через грубі інсинуації, що якщо ми не приймемо їхню пропозицію, хтось інший може це зробити."
  privateers.7.a: "Ми могли б використати безжальних мореплавців на нашій службі."
  privateers.7.b: "Це вимагання. Ми не будемо мати справ з піратами."
  privateers.8.title: "Пірати прагнуть союзу"
  privateers.8.desc: "Група піратів нещодавно звернулася до одного з наших каперів, запитуючи [ROOT.GetCountry.GetAdjective] підтримки у їхніх зусиллях грабувати та розбійничати. Звісно, як тільки вони отримають нашу підтримку, наші власні кораблі будуть у безпеці від них."
  privateers.8.a: "Вони можуть вважати себе серед наших каперів."
  privateers.8.b: "Ми відкидаємо цю напасть на чесних торговців."
  privateers.9.title: "Захоплені работорговці"
  privateers.9.desc: "Один з наших каперів захопив корабель, що містив те, що його власники вважали вантажем, але що ми вважаємо людьми: рабів. [ROOT.GetCountry.GetName] заборонила огидну практику рабства, але інші нації не такі просвітлені.\n\nРаби здобули свою свободу, але все ще триває дискусія про те, що робити з тими, хто їх перевозив. Проявити поблажливість і ставитися до них як до торговців, хоча вони діяли під іншим прапором та законодавством, було б дипломатичним варіантом. Однак наші закони та моральні почуття підказують, що работорговців завжди слід розглядати як піратів і викрадачів і відповідно до них ставитися."
  privateers.9.a: "Ті, хто торгує людськими життями, є піратами і нічим більше."
  privateers.9.b: "Ми відпустимо їх поки що."
  privateers.10.title: "Правдоподібне заперечення"
  privateers.10.desc: "Проведення будь-яких форм нападів на ворожі кораблі в мирний час, чи то шляхом санкціонування відплатних дій, чи приватних війн, чи таємної підтримки піратства, мало для нас багато переваг, але не обійшлося без проблем. Одна з наших каперських операцій нещодавно була скомпрометована, а кораблі та екіпаж захоплені. Як на щастя, вони втратили свій каперський патент, доводячи, що вони працюють з нашого дозволу, і будь-який доказ, що пов'язує їх з нами, є суто непрямим.\n\nЯк останній засіб, капітан тепер зв'язався з нами, сподіваючись, що ми визнаємо нашу офіційну підтримку, щоб це можна було використати як важіль впливу на майбутньому судовому процесі."
  privateers.10.a: "Це законні торговці, які відплачують за іноземні агресії!"
  opinion_angry: "Розлючений"
  privateers.10.b: "Ми ніколи раніше не бачили цих мародерів. Мені вони здаються піратами-відступниками."