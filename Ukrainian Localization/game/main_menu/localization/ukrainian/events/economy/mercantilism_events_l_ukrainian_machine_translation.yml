l_english:
  mercantilism_events.1.title: "Імпорт продовольства для боротьби з голодом"
  mercantilism_events.1.desc: "Недавня нестача продовольства в деяких частинах нашої нації змусила багатьох серед [ROOT.GetCountry.GetAdjective] поставити під сумнів ті торговельні політики, що перешкоджають імпорту життєво важливих товарів. Люди закликають послабити торговельні бар'єри, сподіваючись, що кризу можна пом'якшити, купуючи продовольство у заможніших націй."
  mercantilism_events.1.a: "У цей скрутний час життя важливіші за політику."
  mercantilism_events.1.b: "Ми повинні прагнути бути самодостатніми, навіть коли ми такими не є."
  mercantilism_events.2.title: "Імпорт конкурує з якісними товарами [ROOT.GetCountry.GetAdjectiveWithNoTooltip]"
  mercantilism_events.2.desc: "Наші сусіди заснували значну колоніальну присутність у Новому Світі. Експорт із цієї далекої землі неухильно зростає, а деякі з більш екзотичних товарів стали ходовими, навіть серед тих, хто мав би бути розумнішим, ніж захоплюватися диковинками.\n\nНещодавно наші сусіди пішли далі, відкрито підживлюючи цей інтерес. Заохочуючи людей 'купувати американське', вони просувають більше імпорту з колоній, витісняючи наші власні товари та позбавляючи добрих [ROOT.GetCountry.GetAdjective] людей роботи. Ми могли б отримати прибуток від цього припливу іноземної торгівлі, але найбезпечнішим варіантом було б звести бар'єри, щоб зменшити його."
  mercantilism_events.2.a: "Погляньмо, що можуть запропонувати колонії."
  opinion_pleased: "Задоволені"
  mercantilism_events.2.b: "Нічого пристойної якості не може походити від тих відсталих вискочок."
  opinion_insulted: "Ображені"
  mercantilism_events.3.title: "Імпорт заліза"
  mercantilism_events.3.desc: "Ми прагнемо підтримувати [ROOT.GetCountry.GetAdjective] військову міць сильною, сучасною та підтримуваною всередині країни, але іноді наші пріоритети конфліктують між собою. Не маючи багатих залізних рудників наших сусідів, деякі з наших грандіозніших планів щодо майбутнього військового розвитку не будуть можливими так швидко, як ми того бажаємо. Збільшення імпорту є спокусливим рішенням, але покладання на іноземну підтримку може скомпрометувати нашу торговельну політику. Знову ж таки, ніж у спині нашого сусіда був би тим більш блискуче підступним, якби він був зроблений з їхньої власної сталі..."
  mercantilism_events.3.a: "Нам потрібне імпортне залізо для нашого війська."
  mercantilism_events.3.b: "Ми повинні покладатися на власні ресурси. Серце важливіше за залізо."
  mercantilism_events.4.title: "Імпорт морських припасів"
  mercantilism_events.4.desc: "Амбіції щодо покращення флоту нашої нації нещодавно застопорилися. [ROOT.GetCountry.GetAdjective] суднобудівники не бракують ні ідей, ні планів, але їм бракує припасів. Деякі з них не можуть не відзначати досить голосно, що наш сусід має надлишок матеріалів, які були б корисними для оснащення сучасного флоту. Ми намагаємося не робити наш флот залежним від іноземної підтримки, але якщо ця політика стоїть на шляху прогресу, можливо, ми могли б імпортувати достатньо матеріалів, щоб випробувати нові техніки суднобудування."
  mercantilism_events.4.a: "Ми можемо піти на компроміс, якщо це запустить деякі плани."
  mercantilism_events.4.b: "Кораблі з іноземної деревини? Було б безпечніше виготовити їх зі скелі!"
  mercantilism_events.5.title: "Суперечливий протекціонізм"
  mercantilism_events.5.desc: "Відколи наші радники почали впливати на розвиток торгівлі в [ROOT.GetCountry.GetName], внутрішня торгівля була посилена ціною скорочення імпорту та посилення державного регулювання. Хоча рішення радників щодо покращення інфраструктури були оцінені, недавні пропозиції змусили багатьох впливових людей поставити під сумнів їхню філософію. Недоброзичливці стверджують, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] занадто легко приймає поради своїх радників, і що ми повинні шукати взаємовигідні угоди з іншими націями, а не прагнути домінувати в кожній сфері торгівлі."
  mercantilism_events.5.a: "Їхні методи допомагали нам досі."
  mercantilism_events.5.b: "Адміністрація повинна сприяти вільній торгівлі, а не обмежувати її."
  mercantilism_events.6.title: "Радикальні реформи"
  mercantilism_events.6.desc: "Деякі з наших найдовіреніших радників останнім часом багато розмовляли приватно. Змовляються, кажуть одні; розробляють плани на майбутнє [ROOT.GetCountry.GetName], кажуть інші. Що б вони не обговорювали, це явно досить суперечливо, щоб виправдати певну таємність.\n\nНарешті, вони нарешті звернулися до [ROOT.GetCountry.GetGovernment.GetCourtTitle], щоб представити результати своїх конференцій. Товста стопка паперів, яку вони пропонують, містить плани радикальних змін у торговельній практиці нації, включаючи посилення протекціонізму, додаткове регулювання та змінену промислову політику."
  mercantilism_events.6.a: "Це радикально для простіших умів, можливо, але не для нашого [ROOT.GetCountry.GetFlavorRank]."
  mercantilism_events.6.b: "Чи вони натякають, що наша поточна політика неефективна?"
  mercantilism_events.7.title: "Міжколоніальна торгівля"
  mercantilism_events.7.desc: "Заснування колоніальних володінь за морем дозволило нам розширити торгівлю, зберігаючи контроль, імпортуючи товари із земель, що по суті перебувають під [ROOT.GetCountry.GetAdjective] правлінням. Доки ми забезпечуємо наші колонії тим, що їм потрібно, вони не мають причин передавати золото в руки наших ворогів.\n\nНа жаль, поселенці іноді мають іншу думку, ніж наш [ROOT.GetCountry.GetGovernment.GetRulerTitle], щодо того, що саме їм 'потрібно'. Таким чином, вони почали торгувати з сусідніми колоніями та тубільцями, обходячи торговельні бар'єри, які ми встановили для захисту інтересів нашої нації. Це, безперечно, вигідно поселенцям, але чи вигідно це нам, вельми сумнівно."
  mercantilism_events.7.a: "Вони є підданими [ROOT.GetCountry.GetNameWithNoTooltip]. Наші інтереси переважають їхні."
  mercantilism_events.7.b: "Вони є частиною [ROOT.GetCountry.GetNameWithNoTooltip]. Те, що відповідає їхнім найкращим інтересам, вигідно і нам."
  mercantilism_events.8.title: "Імпорт шоколаду"
  mercantilism_events.8.desc: "Видатні економісти останнім часом аналізують стрімке зростання імпорту шоколаду до нашої нації. Відтоді, як один із наших сусідів отримав контроль над значною частиною відомих світових запасів какао завдяки вправній торговельній практиці, їхні кондитерські вироби стали дуже популярними навіть серед [ROOT.GetCountry.GetAdjectiveWithNoTooltip] людей. Політики-протекціоністи тепер ставлять під сумнів, чи вигідний такий імпорт предметів розкоші для [ROOT.GetCountry.GetName], стверджуючи, що зростаюча залежність від товару, який контролюють наші сусіди, призводить до відтоку золота з нашої нації."
  mercantilism_events.8.a: "Але ж ріка солодкого, солодкого шоколаду тече до нашої нації."
  mercantilism_events.8.b: "Обмежити імпорт цієї гріховної розкоші."
  mercantilism_events.9.title: "Імпорт кави"
  mercantilism_events.9.desc: "Видатні економісти останнім часом аналізують стрімке зростання імпорту кави до нашої нації. Відтоді, як один із наших сусідів отримав контроль над значною частиною відомих світових запасів кавових зерен завдяки вправній торговельній практиці, їхні напої стали дуже популярними навіть серед [ROOT.GetCountry.GetAdjective] людей. Політики-протекціоністи тепер ставлять під сумнів, чи вигідний такий імпорт предметів розкоші для [ROOT.GetCountry.GetName], стверджуючи, що зростаюча залежність від товару, який контролюють наші сусіди, послаблює нашу економічну позицію."
  mercantilism_events.9.a: "Чи доводиться цим так званим економістам мати справу з ранками?"
  mercantilism_events.9.b: "Ми повинні обмежити поширення цього неприродного наркотику."
  mercantilism_events.9.c: "Ми, [ROOT.GetCountry.GetAdjective], — чаєлюбний народ. Ми цього не потерпимо."
  mercantilism_events.10.title: "Імпорт чаю"
  mercantilism_events.10.desc: "Видатні економісти останнім часом аналізують стрімке зростання імпорту чаю до нашої нації. Відтоді, як один із наших сусідів отримав контроль над значною частиною відомих світових запасів чаю завдяки вправній торговельній практиці, їхні напої стали дуже популярними навіть серед [ROOT.GetCountry.GetAdjectiveWithNoTooltip] людей. Політики-протекціоністи тепер ставлять під сумнів, чи вигідний такий імпорт предметів розкоші для [ROOT.GetCountry.GetName], стверджуючи, що зростаюча залежність від товару, який контролюють наші сусіди, послаблює нашу економічну позицію."
  mercantilism_events.10.a: "Якщо ми відмовимося від чаю, цивілізація швидко піде слідом."
  mercantilism_events.10.b: "Ми повинні скинути їхній чай в океан!"