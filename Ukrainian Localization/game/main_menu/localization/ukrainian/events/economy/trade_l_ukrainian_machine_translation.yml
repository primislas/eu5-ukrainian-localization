l_english:
  trade.1.title: "Поважайте наш прапор"
  trade.1.desc: "Ми дали всім знати, що наш флот є Володарем Морів, однак, дійшли до нас вісті, що певна країна не змогла вчасно виявити належну повагу, і це призвело до сутички. Країна вимагає війни."
  trade.1.a: "Ми мусимо готуватися"
  trade.1.b: "Це безглуздо"
  trade.2.title: "Цього не можна терпіти"
  trade.2.desc: "Пірати напали на деякі наші судна. Вони катували, а потім жорстоко вбили чоловіків-пасажирів, а щодо жінок-пасажирів, то розповіді про це шокують усіх цивілізованих людей. Одна з пасажирок була дочкою важливого шляхтича, і він волає про помсту. Є серйозні натяки, що ці пірати перебувають під чиїмось захистом."
  trade.2.a: "Вистежити їх!"
  trade.2.b: "Це надто дорого"
  trade.3.title: "Вигнання купців"
  trade.3.desc: "Наші купці в [target_market.GetName] були надто успішними в торгівлі, і [target_market.GetCenterLocation.GetOwner.GetLongName] дотримуються своїх меркантилістських ідеалів і тепер намагаються обмежити і навіть вигнати наших купців з ринку."
  trade.3.a: "Вони залишаються!"
  merchants_too_succesful: "Надто успішні купці"
  trade.3.b: "Купці триматимуться скромніше"
  merchants_standing_down: "Купці знижують активність"
  trade.4.title: "Торговельна криза"
  trade.4.desc: "Наші купці повідомляють, що вони стикаються зі зростаючим опором у спробах продати свої товари. Вони говорять так, ніби це кінець світу, і бояться, що ніколи більше не зароблять жодної мідної монети в житті."
  trade.4.a: "Це лише купці"
  STATIC_MODIFIER_NAME_severe_trade_crisis: "Серйозна торговельна криза"
  STATIC_MODIFIER_DESC_severe_trade_crisis: "Ми стикаємося з серйозними проблемами в нашій торгівлі. Через це страждає дохід."
  trade.4.b: "Спробувати полегшити їх"
  trade.5.title: "Купець збанкрутував!"
  trade.5.desc: "Один з наших купців у [target_market.GetName] повернувся додому жебраком, втративши кожен дукат. Він збанкрутував, і ми більше не отримуватимемо вигоди від його торгівлі."
  bankrupt_merchant: "Купець-банкрут"
  trade.5.a: "Він просто не зміг..."
  trade.5.b: "Врятувати його"
  trade.6.title: "Торговельне судно зазнало аварії!"
  trade.6.desc: "Купець загинув у морі під час торгівлі на [target_market.GetName], забравши всі свої товари на дно морське."
  trade.6.a: "Шкода"
  trade.7.title: "Купці страждають"
  trade.7.desc: "Наше зосередження на меркантилізмі ускладнює життя нашим купцям, які торгують у чужих краях. Ефективність нашого експорту [target_trade.GetGoods.GetName] до [target_trade.GetToMarket.GetName] страждає."
  trade.7.a: "Надати їм підтримку"
  trade.7.b: "Їм слід було залишитися вдома"
  trade.8.title: "Ніхто не хоче працювати"
  trade.8.desc: "Завдяки щедрим свободам, які ми надали нашим купцям, ми опинилися в ситуації, коли люди просто не хочуть більше займатися чесною працею."
  trade.8.a: "Це було не зовсім за планом"
  trade.10.title: "Брак захисту"
  trade.10.desc: "Наша рішучість прийняти вільну торгівлю призвела до того, що вітчизняні купці програють [Concept('rivals', 'CONCEPT_PLACEHOLDER')|e] з інших країн. Домінування [rival_country.GetName] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e] [ROOT.GetCountry.GetCapital.GetMarket.GetName] є для нас ганьбою."
  trade.10.a: "Це більше ніж ганьба"
  trade.11.title: "Купці відходять"
  trade.11.desc: "З послабленням обмежень для іноземних купців, деякі наші власні торговці відчувають, що не отримують достатньої державної підтримки, і вирішили змінити кар'єру."
  trade.11.a: "Мені байдуже"
  STATIC_MODIFIER_NAME_bad_free_trade_merchants: "Без обмежень для іноземних купців"
  STATIC_MODIFIER_DESC_bad_free_trade_merchants: "З послабленням обмежень для іноземних купців, деякі наші власні купці відчувають, що не отримують достатньої державної підтримки, і вирішили змінити кар'єру."
  trade.13.title: "Наша меркантилістська політика зміцнює торгівлю"
  trade.13.desc: "Наше прийняття меркантилістської політики ускладнює конкуренцію інших націй з нашими купцями, що означає більше прибутків для нас."
  trade.13.a: "Мені подобаються прибутки."
  trade.13.b: "Але це може бути не на нашу користь..."
  trade.14.title: "Купець-перебіжчик"
  trade.14.desc: "Наше використання меркантилістської політики виявляється розчаровуючим для деяких наших купців, змушуючи деяких перебігати до інших країн."
  trade.14.a: "Меркантилізм правильний."
  trade.14.b: "Невелике послаблення політики може бути відповіддю."
  trade.15.title: "Переваги вільної торгівлі"
  trade.15.desc: "Наша політика вільної торгівлі дозволяє нашим купцям справді отримувати високі прибутки. [target_trade.GetName] зокрема була дуже вигідною для нашої країни."
  trade.15.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  trade.16.title: "Купці стурбовані відсутністю захисту"
  trade.16.desc: "З нашим акцентом на вільній торгівлі наші купці стурбовані, що вони не отримують підтримки, яку вони отримали б за більш меркантилістської політики."
  trade.16.a: "Ось чому це називається вільна торгівля."
  trade.16.b: "Що ж, можливо, ми можемо щось зробити."
  trade.17.t: "Правильне ставлення до гільдій"
  trade.17.desc: "Не секрет, що гільдії найбільше зростають, коли їм допомагає держава, чи то через фінансування, ексклюзивні угоди, чи особливі привілеї, їхні організації значно виграють від державної допомоги і, своєю чергою, допомагають керувати економікою на користь нації.\n\nСьогодні кілька гільдій борються за державну підтримку поблизу [random_town_place.GetName]. У нас є різні гільдії на вибір, але лише ресурси, щоб надати привілеї одній з них. Кожен вибір має набір переваг, ми найкраще оберемо той, що відповідає нашим загальним національним інтересам."
  trade.17.a: "Гільдія мірошників"
  trade.17.b: "Гільдія шахтарів"
  trade.17.c: "Торгова гільдія"
  trade.17.d: "Гільдія... поезії?"