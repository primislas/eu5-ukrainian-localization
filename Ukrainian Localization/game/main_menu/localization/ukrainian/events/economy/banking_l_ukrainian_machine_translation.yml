l_english:
  banking.1.title: "Піднесення Фуґґерів"
  banking.1.desc: "Родина Фуґґерів, що походила з купецького патриціату Ауґсбурґа, стала однією з найвидатніших груп європейських банкірів протягом XV та XVI століть. Значна частина європейської економіки перебувала під їхнім контролем, і вони зрештою здобули майже повну монополію на ринку міді. Історично вони були тісно пов'язані з домом Габсбурґів, чиє піднесення до світової могутності вони фінансували."
  banking.1.a: "Це благо для Ауґсбурґа!"
  banking.2.a: "Це може принести користь... Нам?"
  the_fuggers_appear_in_augsburg_tt: "[the_fuggers.GetName] тепер відкриті для бізнесу в [ShowLocationName('augsburg')]"
  banking.3.title: "Родина Вельзерів"
  banking.3.desc: "Вельзери були німецькою купецькою та банківською родиною з Нюрнберґа та Ауґсбурґа, яка стверджувала, що походить від візантійського полководця Велізарія. Вони надавали багато банківських послуг для зростання імперії Габсбурґів, що зробило їх надзвичайно заможними. До Доби великих географічних відкриттів вони мали торгові пости в Антверпені, Мадриді, Лісабоні, Римі, Ліоні та багатьох інших містах."
  banking.3.a: "Це поставить Нюрнберґ на мапу!"
  banking.4.a: "Це може принести користь... Нам?"
  the_welsers_appear_in_augsburg_tt: "[the_welsers.GetName] тепер відкриті для бізнесу в [ShowLocationName('nuremberg')]"