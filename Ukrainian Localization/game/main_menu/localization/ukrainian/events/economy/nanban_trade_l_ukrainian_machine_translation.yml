l_english:
  nanban_trade.1.title: "Нанбан Боекі"
  nanban_trade.1.desc: "Чужинці з грубими манерами, що нехтують гігієною та нездатні зрозуміти письмо [ROOT.GetCountry.GetCulture.GetLanguage.GetName], висадилися в землі [ROOT.GetCountry.GetName] з місць, які вони називають такими смішними іменами, як [target_nanban.GetName]. Ці чужинці приносять із собою дослідників, місіонерів та купців, і їхня присутність вже почала впливати на наш народ."
  nanban_trade.1.a: "Вітаємо цих торговців."
  nanban_trade.1.b: "Хто знає, що принесе їхня присутність."
  enable_kirishitan_monks.tt: "Тепер ми маємо доступ до [Concept('religious_faction', 'CONCEPT_PLACEHOLDER')|e] $kirishitan_monks$"
  nanban_trade.2.title: "$nanban_trade.1.title$"
  nanban_trade.2.desc: "Ми отримали звістку, що якісь дивні чужинці висадилися на берегах [target_country.GetName]. Вони стверджують, що походять із землі [target_nanban.GetName], і, очевидно, обіцяють вигідну торгівлю всім, хто з ними взаємодіє. Однак їхні манери та культура явно залишають бажати кращого, і вони можуть погано вплинути на весь [GetUniqueInternationalOrganization('japanese_shogunate').GetName]."
  nanban_trade.2.a: "$nanban_trade.1.a$"
  nanban_trade.2.b: "$nanban_trade.1.b$"
  nanban_trade.3.title: "Прибуття європейських торговців"
  nanban_trade.3.desc: "З прибуттям кораблів із заходу ми спостерігаємо наплив дуже затребуваних товарів не лише з [ShowContinentName('europe')], а й з різних куточків [ShowContinentName('asia')], які часто відвідують західні торговці. Великі кораблі стають все більш поширеним явищем уздовж наших берегових ліній, і для всіх, хто їх вітає, вони обіцяють великі багатства.\n\nКапітан такого корабля нещодавно прибув до [nanban_traders_here.GetName], просячи дозволити їм періодично швартуватися в сусідній гавані для продажу західних товарів."
  nanban_trade.3.a: "Заохочуйте їх зробити це постійною зупинкою."
  nanban_trade.3.b: "Ми приймемо їхні товари, але не даємо жодних гарантій на майбутнє."
  nanban_trade.3.c: "Ми запровадимо суворі правила щодо того, з ким вони можуть зустрічатися або вести справи."
  nanban_trade.4.title: "Дволикість серед європейських торговців"
  nanban_trade.4.desc: "З моменту прибуття західників деякі ставилися до них з недовірою. Їхні кишені глибокі, їхня зброя потужна, а для декого їхня культура здається захопливою. Однак ті, хто має справу з цими торговцями, повідомляють, що європейці постійно плетуть інтриги один проти одного. Рідко яка зустріч з іноземними емісарами проходить без того, щоб вони не попереджали нас про якусь змову чи схему своїх супротивників. Зрозуміло, що ми маємо справу з людьми, яким не можна довіряти.\n\nОскільки нова група торговців просить нас збільшити їхні привілеї, наші радники застерігають нас ретельно розглянути пропозицію."
  nanban_trade.4.a: "Ми дозволимо їм розширити свою присутність."
  nanban_trade.4.b: "Обмежити їхній вплив кількома додатковими портами."
  nanban_trade.4.c: "Їхня діяльність повинна бути обмежена [nanban_traders_here.GetNameWithNoTooltip]."
  nanban_trade.5.title: "Західні знання"
  nanban_trade.5.desc: "Після прибуття західників порт у [nanban_traders_here.GetName] почав приваблювати не лише купців, а й вчених та інтелектуалів. Для цих людей книги, які привозять чужинці, набагато цінніші за товари, які вони хочуть продати. Вивчення західної науки та культури перетворюється на окрему дисципліну, і, за словами прихильників, нам є чому повчитися. Однак багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] скептично налаштовані, як і деякі традиціоналістські вчені."
  nanban_trade.5.a: "Ми повинні зробити все можливе, щоб заохотити поширення західної науки."
  nanban_trade.5.b: "Нам нічого в них вчитися."
  nanban_trade.6.title: "Іноземний вплив"
  nanban_trade.6.desc: "Деякі стверджують, що ми надто залежимо від іноземних торговців. Наші власні ремісники, безперечно, не менш обдаровані, ніж за кордоном, і замість того, щоб витрачати цілий статок на імпорт промислових товарів із зовнішнього світу, ми могли б виробляти багато з них. Тоді ми могли б самі отримувати прибуток від їхнього перепродажу.\n\nЧас не підходить для повного припинення торгівлі, але якщо ми залучимо наших найкращих майстрів до роботи, то з часом нам, можливо, більше не доведеться так тривожно чекати прибуття наступного торгового судна."
  nanban_trade.6.a: "Немає потреби намагатися робити те, що інші роблять краще."
  nanban_trade.6.b: "Чудова інвестиція!"
  nanban_trade.7.title: "Танегасімський Теппо"
  nanban_trade.7.desc: "Чужинці, що прибувають до наших земель, приносять із собою дивну зброю. Нещодавно, коли двох західних шукачів пригод, що пливли на [ShowCultureGroupName('chinese_group')] кораблі, буря змусила пристати до острова Танегасіма в [target_location.GetName], місцеві рибалки були вражені, коли один із західняків вистрілив у повітря, здивований їхнім виглядом. Місцевій владі вдалося придбати цю зброю у західняків, перш ніж вони відпливли назад, і ковалі вже вивчають її виробництво.\n\nХоча порох і вогнепальна зброя давно відомі нам, кременевий механізм цього західного зразка є значним покращенням порівняно з [ShowCultureGroupNameWithNoTooltip('chinese_group')] ручними гарматами, і він виявиться набагато зручнішим у використанні."
  nanban_trade.7.a: "Спробуймо відтворити це."
  nanban_trade.8.title: "$nanban_trade.7.title$"
  nanban_trade.8.desc: "$nanban_trade.7.desc$"
  nanban_trade.8.a: "Ми також повинні спробувати їх придбати."
  nanban_trade.8.b: "Напевно, вони не такі добрі, як наша власна зброя."
  nanban_trade.9.title: "Доступ до вогнепальної зброї"
  nanban_trade.9.desc: "З прибуттям західних торговців, їхні кременеві аркебузи потрапили до нашого [ROOT.GetCountry.GetFlavorRank]. Ця зброя є значним покращенням порівняно з пороховою зброєю, відомою тут раніше, і обіцяє революціонізувати війну, якщо вона стане широко розповсюдженою. Однак, придбати достатню кількість такої зброї не так просто, як може здатися. Аркебузи користуються великим попитом серед тих, хто бачив їхню силу, але перспектива того, що вони можуть зробити в руках наших ворогів, або навіть неслухняної селянської громади, також досить тривожна.\n\nКоли ми почнемо виробляти та навчати наших солдатів користуватися цією зброєю, нам потрібно буде вирішити, хто матиме до неї доступ і скільки ми її виготовимо."
  nanban_trade.9.a: "Сила в кількості! Виробляймо стільки, скільки зможемо."
  nanban_trade.9.b: "Ми виготовимо достатньо лише для невеликого загону довірених людей."
  nanban_trade.10.title: "Поширення вогнепальної зброї"
  nanban_trade.10.desc: "Кременеві аркебузи, привезені нам чужинцями, виявилися легшими у масовому виробництві, ніж ми могли сподіватися. Оскільки все більше і більше наших військ може бути оснащено цією зброєю, стає зрозуміло, що ми не зможемо дуже ефективно обмежити її поширення ні серед наших ворогів, ні серед простого люду. Якщо ми дійсно бажаємо зменшити кількість вогнепальної зброї в обігу, нам доведеться незабаром вжити дуже рішучих заходів."
  nanban_trade.10.a: "Це лише послабить наші армії."
  nanban_trade.10.b: "Повністю заборонити використання зброї для простолюдинів."
  nanban_trade.11.title: "Еволюція озброєння"
  nanban_trade.11.desc: "З постійним зростанням використання вогнепальної зброї стало зрозуміло, що для збереження переваги необхідне постійне вдосконалення. Завдяки тренуванням ми, безперечно, можемо підвищити її ефективність, а деякі наші ковалі також запропонували способи покращення самої зброї. Інші стверджують, що ми повинні витрачати час як наших ковалів, так і наших солдатів на більш традиційну зброю. Списи та луки не повністю зникли з полів битв, і ми, можливо, добре зробимо, якщо наші війська будуть добре навчені і в них також."
  nanban_trade.11.a: "Нам потрібна краща зброя!"
  nanban_trade.11.b: "Наші армії все ще ефективні зі списами."
  nanban_trade.12.title: "Військова революція"
  nanban_trade.12.desc: "З того часу, як перші кременеві рушниці почали з'являтися в наших землях, вони перетворилися з новинки на одну з найпоширеніших видів зброї. Деякі навіть стверджують, що ми виробляємо більше і кращої зброї, ніж країни, звідки вона походить. Це поставило небезпечну зброю в руки кожного, хто протистояв би нашому правлінню, але швидке прийняття рушниць також зробило наші армії більш шанованою силою, ніж багато інших.\n\nТакож почали впроваджуватися деякі нові тактики, наприклад, поєднання лучників та аркебузирів в одному полку, щоб вони могли захищати один одного та діяти на різних відстанях."
  nanban_trade.12.a: "Наші армії будуть непереможні!"