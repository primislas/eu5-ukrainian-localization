l_english:
  corruption_event.1.title: "Чесні купці [ROOT.GetCountry.GetNameWithNoTooltip]"
  corruption_event.1.desc: "Хоча багато торговців відомі тим, що брешуть про якість своїх товарів і дають шахрайські обіцянки як іноземцям, так і співвітчизникам, [ROOT.GetCountry.GetAdjective] купці добре відомі своєю надійністю, хоч і конкурентоспроможністю. Хоча наші купці іноді укладають угоди, які вигідні їм самим, а не їхнім торговим партнерам, вони рідко брешуть або беруть хабарі. Це зробило [ROOT.GetCountry.GetNameWithNoTooltip] першим вибором торговців по всьому світу."
  corruption_event.1.a: "Навіщо нам брехати, коли ми маємо найкращі пропозиції?"
  corruption_event.2.title: "Довіряй своєму ближньому"
  corruption_event.2.desc: "Хоча громадян заохочують діяти добросовісно під час обмінів, реальність у багатьох країнах така, що довіряти іншим — це ризик, який багато людей не можуть собі дозволити. Однак це не стосується [ROOT.GetCountry.GetName].\n\nМи успішно викорінили корупцію на багатьох рівнях суспільства, тому наші люди не тільки довіряють чиновникам виконувати свою роботу (без додаткової допомоги хабара), але й більше довіряють один одному в повсякденних обмінах. Віра в чесність інших — це та нитка, з якої виткана тканина суспільства, і наша країна є яскравим прикладом цього."
  corruption_event.2.a: "Це передбачено в [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] вченнях."
  corruption_event.3.title: "Ретельні дослідники"
  corruption_event.3.desc: "Академічні установи не застраховані від корупції, і прибутки, які можна отримати, зловживаючи позиціями великого впливу, можуть перешкоджати створенню середовища, сприятливого для досліджень. Однак [ROOT.GetCountry.GetAdjective] вчені значною мірою вищі за це, надаючи пріоритет справжнім інтелектуальним досягненням над титулами та фінансовою вигодою. Відсутність корупції в нашому суспільстві дозволяє нам досліджувати та винаходити, не будучи обмеженими егоїстичними інтересами."
  corruption_event.3.a: "Прагнення до знань має цінуватися саме по собі."
  corruption_event.4.title: "Почесний народ"
  corruption_event.4.desc: "Мало країн у світі, які не заявляють про цінність честі та справедливості, але ще менше тих країн, які насправді відповідають цим ідеалам. Однак відсутність як великомасштабної, так і повсякденної корупції в [ROOT.GetCountry.GetName] зробила її одним із тих рідкісних місць, де принципи переважають над особистою вигодою. Навіть за кордоном [ROOT.GetCountry.GetAdjectiveWithNoTooltip] емігрантів шукають на довірені посади, оскільки наш народ відомий своєю відданістю обов'язку та відмовою від спроб хабарів. Хто ще може стверджувати, що відповідає цим принципам?"
  corruption_event.4.a: "Дійсно, мало хто."
  corruption_event.5.title: "Непідкупні"
  corruption_event.5.desc: "Не кожен, хто допомагає ворогу, знає справжній масштаб своїх власних проступків. Шпигуни можуть бути вірними іноземним державам, але багато їхніх інформаторів — це люди, яким просто добре платять за розголошення таємниць, яких вони не повинні розголошувати, не розуміючи, хто ними користується і як. Проте, в [ROOT.GetCountry.GetName] корупція була майже повністю викорінена. Шпигуни, які нещодавно намагалися скомпрометувати нашу адміністрацію за допомогою хабарництва та вимагання, виявилися повідомленими, а не підтриманими нашими чиновниками, і тепер перебувають у нашій владі."
  corruption_event.5.a: "Смерть шпигунам!"
  corruption_event.6.title: "Корумповані податківці"
  corruption_event.6.desc: "Ті, хто має справу з великими сумами грошей, завжди спокушалися вимагати більше, ніж їм належить, і податкові інспектори не є винятком. Однак, хоча ми можемо дозволити собі деякі гроші, що «губляться» по дорозі, заможні громадяни нещодавно виявили, що вони можуть взагалі уникнути деяких податків, сплачуючи великі хабарі податківцям. Наразі ця схема, схоже, підтримується деякими старшими інспекторами, які намагаються комфортно вийти на пенсію. Хоча мовчазне дозволення цієї практики є дорогим, ми можемо уникнути витрат часу та зусиль на детальне розслідування і замість цього просто перечекати."
  corruption_event.6.a: "Негайно розслідувати та замінити корумпованих податківців."
  corruption_event.6.b: "Нехай виходять на пенсію. Вони добре служили нам у минулому."
  corruption_event.7.title: "Корумпований радник"
  corruption_event.7.desc: "[ROOT.GetCountry.GetName] може бути охоплена корупцією, але ми намагаємося забезпечити, щоб ті, хто найближче до [ROOT.GetCountry.GetGovernment.GetRulerTitle], могли бути довіреними, принаймні. Що ж, схоже, ми намагаємося і зазнаємо невдачі, оскільки один із радників [ROOT.GetCountry.GetGovernment.GetRuler.GetName], [SCOPE.sCharacter('minister').GetName], нещодавно був спійманий на отриманні великих хабарів від людей, які вже мають великий вплив у нашій країні, що схиляло [SCOPE.sCharacter('minister').GetHerHim] до надання уряду порад, які були спрямовані на просування інтересів багатих і могутніх."
  corruption_event.7.a: "Ми публічно викриємо цю брехню та підготуємо страту."
  corruption_event.7.b: "Ми можемо організувати тиху відставку під домашнім арештом."
  corruption_event.7.c: "Догана раднику. Упереджена порада — це все одно порада."
  corruption_event.8.title: "Хитрі контрабандисти"
  corruption_event.8.desc: "Контрабанда — це діяльність, яку може вирішити зайнятися навіть найпростіша людина. Єдина відмінність між розумним контрабандистом і поганим полягає в тому, що останнього ловлять. Більш тривожними є ті, хто має справжній талант знати, кого підкупити і яку брехню розповісти, щоб уникнути захоплення. На жаль, оскільки контрабанда стає все більш прибутковою, кількість таких людей має тенденцію зростати.\n\nМи нещодавно йшли по сліду особливо хитрої банди контрабандистів, і павутина обману, яку їм вдалося сплести для підтримки своїх операцій, продовжує нас дивувати."
  corruption_event.8.a: "Призначити наших найкращих людей для відстеження їхніх спільників."
  corruption_event.8.b: "Відправити агента, щоб завербувати їх як шпигунів."
  corruption_event.8.c: "Ігнорувати їх поки що."
  corruption_event.9.title: "[SCOPE.sLocation('culture_location').GetDominantCulture.GetNameWithNoTooltip] Спільнота Не Довіряє Нам"
  corruption_event.9.desc: "[ROOT.GetCountry.GetName] може й не бути домом для найзапекліших брехунів і зрадників у світі, але порівняно з деякими іншими країнами, наші люди схильні бути трохи легше підкупленими для зловживання своєю владою. Більшість [ROOT.GetCountry.GetAdjectiveWithNoTooltip] населення приймає труднощі та, для нечесних, випадкові переваги, які це приносить.\n\nПроте [SCOPE.sLocation('culture_location').GetDominantCulture.GetName] люди в [SCOPE.sLocation('culture_location').GetName] бачать речі інакше. Вони нарікають на цей стан справ як на наслідок дозволу легко корумпованим [ROOT.GetCulture.GetName] людям керувати нацією, стверджуючи, що країна, керована їхніми власними людьми, не страждає від такої ж злочинності. Деякі з них припускають, що їм було б краще відокремитися."
  corruption_event.9.a: "Вибачитися за нашу невдачу та пообіцяти покращити ситуацію."
  corruption_event.9.b: "Відкинути ці твердження як неосвічений упередження."
  corruption_event.10.title: "Корумповані Посли"
  corruption_event.10.desc: "Наші представники в інших країнах повинні втілювати найкраще з нашого народу, але, на жаль, це не завжди так. Іноді чиновників призначають послами, тому що адміністрація хоче їх подалі, і, час від часу, для цього є вагома причина.\n\nЯк виявилося, деякі посли витратили своє добре оплачуване вигнання на подальше збагачення за допомогою хабарів. Хоча це не покращило нашу репутацію серед місцевих жителів, ці посли підтримували важливі зв'язки тут, вдома, і не будуть звільнені без спричинення деяких проблем."
  corruption_event.10.a: "Ці посли спричинили занадто багато проблем. Позбутися їх."
  corruption_event.10.b: "Місцевим доведеться звикнути до цього."
  corrupt_ambassador: "Корумповані Посли"
  corruption_event.11.title: "[SCOPE.sLocation('trade_goods_location').GetRawMaterial.GetNameWithNoTooltip] «Зникає»"
  corruption_event.11.desc: "З постійним зростанням корупції в [ROOT.GetCountry.GetName], все більша кількість [SCOPE.sLocation('trade_goods_location').GetRawMaterial.GetName] зникає з наших законних торговельних мереж на чорний ринок. Хоча дехто звинувачує надмірно обмежувальні правила та тарифи, частина проблеми полягає в тому, що ці злочини просто занадто легко залишаються безкарними. Коли мовчання легко купити, секрети легко зберігати, і ці секрети стають все дорожчими для [ROOT.GetCountry.GetNameWithNoTooltip]."
  corruption_event.11.a: "Ми повинні відновити контроль над ринком [SCOPE.sLocation('trade_goods_location').GetRawMaterial.GetNameWithNoTooltip]."
  corruption_event.12.title: "Корумповані Генерали"
  corruption_event.12.desc: "Військовий досвід та експертиза повинні бути головними, якщо не єдиними, факторами, що впливають на те, хто піднімається по службових сходах [ROOT.GetCountry.GetAdjective] армії. Однак, оскільки наше суспільство ставало все більш корумпованим, наші практики просування по службі все далі відходили від цього ідеалу.\n\nРеальність сьогодення полягає в тому, що посада генерала несе багато престижу. Ті, хто має гроші або зв'язки, більш ніж готові використовувати і те, і інше, щоб забезпечити собі таку посаду, і вони можуть це зробити, тому що існуюче керівництво легко піддається впливу таких методів. Час від часу хтось може піднятися по службових сходах, хто дійсно заслужив своє звання, але, в іншому випадку, багато наших найкращих стратегічних умів ніколи не матимуть шансу надати нам свої навички."
  corruption_event.12.a: "Такий несправедливий світ..."
  corruption_event.13.title: "Корумповані Адмірали"
  corruption_event.13.desc: "Ті, хто командує нашими кораблями в бою, і ті, кого [ROOT.GetCountry.GetGovernment.GetRulerTitle] посилає досліджувати та завойовувати нові землі, повинні бути обрані з найхоробріших і наймудріших у нашому флоті. У сучасному світі це не так. З першого дня на кораблі моряки бачать, як гроші незаконно переходять з рук в руки, а протокол порушується як само собою зрозуміле. Моряки швидко дізнаються, що як буква, так і дух закону мають малу вагу в [ROOT.GetCountry.GetName], коли срібло кладуть на іншу чашу терезів. Ті, хто не вчиться швидко, наживають ворогів.\n\nЩоб просуватися по службових сходах [ROOT.GetCountry.GetAdjectiveWithNoTooltip] флоту, потрібно навчитися грати за системою, і ті, хто піднімається на вершину, рідко є тими, кого ми хотіли б там бачити."
  corruption_event.13.a: "Не дивно, що у нас бунти."
  corruption_event.14.title: "Іноземні Купці Не Довіряють Нам"
  corruption_event.14.desc: "Кожна адміністрація намагається укладати угоди, які будуть їй вигідні, і багато хто готовий трохи спотворити правду, щоб досягти своїх цілей. Хоча це очікувано, купці з [ROOT.GetCountry.GetName] мають за кордоном репутацію, яка сягає відвертої брехні та шахрайства. Корупція, яка стала частиною того, як ми ведемо бізнес, може шокувати сторонніх, що призвело до того, що торговці по всьому світу обирають уникати нас, коли це можливо.\n\nЗанадто пізно щось робити з нашим нинішнім іміджем, оскільки шкода вже завдана, але, можливо, ми зможемо запобігти повторенню цього, якщо викорінимо повсякденну корупцію в нашому суспільстві."
  corruption_event.14.a: "Ми не нечесні, просто прагматичні!"
  corruption_event.15.title: "Урядові функції руйнуються"
  corruption_event.15.desc: "Корумпована адміністрація працює менше для самозбереження, а більше для збагачення своїх членів. Отже, коли уряд починає розвалюватися, негайна реакція багатьох чиновників полягає не в тому, щоб врятувати те, що вони всі можуть втратити, а в тому, щоб схопити якомога більше, поки це триває.\n\n[ROOT.GetCountry.GetName] може й не перебуває на межі повного краху, але сильна корупція, що сягає від найнижчого клерка до найближчих до [ROOT.GetCountry.GetGovernment.GetRulerTitle] осіб, роз'їла кілька ключових урядових функцій, що призвело до широкомасштабної дестабілізації країни. Це назрівало давно, і ми всі заплатимо за це."
  corruption_event.15.a: "Цьому не можна дозволити тривати."
  corruption_event.16.title: "Найманці вимагають гроші у місцевих"
  corruption_event.16.desc: "Під час війни солдати удачі часто знаходять способи повернутися додому з трохи більшим, ніж їм платять, грабуючи землі, куди їх відправляють воювати. Зазвичай це не є проблемою для нас, коли їх відправляють за кордон тероризувати наших ворогів, але іноді цю звичку важко зламати, навіть у мирний час. Деякі фермери та мандрівники в [SCOPE.sLocation('hired_mercs_victim_area').GetProvince.GetName] скаржилися, що [hired_merc_band.GetName], найманський загін, який перебуває у нас на службі, грабує та вимагає у них гроші, незважаючи на – або, можливо, через – той факт, що навіть війни не ведеться.\n\nВтручання в ряди найманців, навіть тих, кого ми найняли, завжди є складною справою. Їхні обвинувачі навряд чи будуть далі розслідувати справу, якщо ми дозволимо цьому зійти нанівець, але залишається питання, як зміниться наше суспільство, якщо ми дозволимо такій вимагацтву тривати."
  corruption_event.16.a: "Очистити ряди найманців від таких головорізів."
  corruption_event.16.b: "Це частина ціни, яку наша країна платить за їхню службу."
  corruption_event.17.title: "Корумпований, але компетентний адміністратор"
  corruption_event.17.desc: "Питання урядової організації ніколи не були сильною стороною [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Хороший лідер компенсує такі недоліки делегуванням, і саме це зробив наш [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Однак люди, які займалися адміністрацією замість [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis], виявилися більш компетентними, ніж чесними. Уряд працює досить добре, але він повільно зміщує свої пріоритети до питань, які вважають важливими благодійники таких незамінних чиновників.\n\nОскільки [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] [ROOT.GetCountry.GetGovernment.GetRuler.GetHerselfHimself] не може повністю осягнути тонкощі відповідних питань, винних сторін нелегко виявити або усунути з посади. Наразі нам просто доведеться страждати від наслідків їхніх дій."
  corruption_event.17.a: "Шкода, що майстерність і честь не завжди йдуть рука об руку."
  corruption_event.18.title: "Надмірне розширення використано"
  corruption_event.18.desc: "Швидке розширення [ROOT.GetCountry.GetAdjective] кордонів є дуже вдалим, але приносить із собою нові адміністративні виклики. Як знає кожен, хто знайомий з оптимістичними евфемізмами, «виклики» — це солодше слово для «проблем». Наша країна ще не повністю пристосувалася до свого нового розмаху, і менш сумлінні люди, які помітили як плутанину, так і погано виконувані закони в цих нових придбаннях, пожинають плоди.\n\nЦе беззаконня може з часом минути, але наші поточні адміністративні випробування, схоже, створюють нестабільний фундамент для майбутнього. Потрібен час і гроші, щоб позбавити наше суспільство недовіри, що формується внаслідок нинішньої ситуації."
  corruption_event.18.a: "Нам доведеться адаптуватися якнайкраще."
  corruption_event.19.title: "Корумповані зв'язки"
  corruption_event.19.desc: "Ми намагаємося утримувати нашу адміністрацію вільною від нечесних осіб, але не завжди можемо врахувати друзів та контакти, які привели наших чиновників до їхніх посад. [target_ruler.GetName], на жаль, виявився яскравим прикладом проблем, що можуть виникнути з цього, оскільки [target_ruler.GetSheHe] є вправним та приємним у спілкуванні, але дещо довірливим у [target_ruler.GetHerHis] виборі соратників.\n\nНедавні розслідування виявили, що значна частина нашої добре побудованої торгової мережі покладалася на хабарі, контрабанду та інші сумнівні дії, щоб досягти свого поточного рівня ефективності. [target_ruler.GetNameWithNoTooltip] стверджує, що нічого про це не знав, що, ймовірно, правда. Проте, якщо ми вирішимо викрити та припинити цю практику, відповідальність буде [target_ruler.GetHersHis]."
  corruption_event.19.a: "Неможливість розпізнати брехню все одно є невдачею."
  corruption_event.19.b: "Якщо працює, не чіпай."
  corruption_event.20.title: "Хабарі стають все більш прийнятними"
  corruption_event.20.desc: "«Яка різниця між чесною людиною та дурнем? Дурень не знає, що його обманюють».\n\nЦе все більш поширений вислів у [ROOT.GetCountry.GetName], дух якого підтверджується більш зловісною зміною в нашій соціальній структурі. Хабарі починають розглядатися як природний наслідок ринку, де кожна транзакція має свою ціну. Тих, хто відмовляється брати хабарі, вважають дурнями, як припускає приказка, або гірше. Наслідком цього цинізму є те, що будь-яка форма влади розбещує, і ніхто, хто вірить у це, не застрахований, навіть [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  corruption_event.20.a: "Це просто приказка."