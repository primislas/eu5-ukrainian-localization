l_english:
  kirishitan.1.title: "Новий Будда?"
  kirishitan.1.desc: "З прибуттям європейців ми зіткнулися з новою культурою та новою релігією. Де в чому вона здається схожою на нашу, але в інших аспектах вона абсолютно чужа. Група чоловіків прибула до [ROOT.GetCountry.GetCapital.GetName], намагаючись проповідувати євангеліє свого кірішітанського бога. Однак їхнє послання здається дуже дивним, ймовірно, через некомпетентних або зловмисних перекладачів.\n\nУ своєму прагненні заручитися покровительством [target_ruler.GetName] місіонери з'явилися без подарунків і виголошували нісенітниці. Це є серйозною неповагою до нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle], проте дехто застерігає, що ці промахи означають, що вони відчайдушно потребують нашої допомоги."
  kirishitan.1.a: "Безглуздо! Їм тут не місце!"
  kirishitan.1.b: "Ми дозволимо їм залишитися, доки вони поводяться пристойно."
  kirishitan.1.c: "Давайте послухаємо, чого їхній Бог може нас навчити."
  kirishitan.2.title: "Місії в [target_location.GetNameWithNoTooltip]"
  kirishitan.2.desc: "Група кірішітан сьогодні прибула до [ROOT.GetCountry.GetGovernment.GetCourtTitle] у [ROOT.GetCountry.GetCapital.GetName], просячи дозволу створити невелику громаду вірних у нашому великому [target_location.GetRank.GetName]. Вони б тоді дбали про бідних і навчали тих, хто слухатиме, про свого бога.\n\nМісіонери також пропонують навчати [target_heir.GetName] шляхам Бога, а також дисциплінам [ShowReligionGroupAdjective('christian')] науки. [ROOT.GetCountry.GetReligion.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], а також деякі з наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], застерігають нас, оскільки вони вважають це образою наших стародавніх традицій, тоді як торговці в нашому [ROOT.GetCountry.GetFlavorRank] сподіваються укласти вигідні торгові угоди із західняками, якщо ми дозволимо їм залишитися."
  kirishitan.2.a: "[target_heir.GetNameWithNoTooltip] буде радий дізнатися про їхнього бога."
  kirishitan.2.b: "Ми можемо дозволити їм поширювати свою віру тут."
  kirishitan.2.c: "Ми повинні захищати віру наших предків!"
  catholic_pop_conversion.tt: "Вони навернуть деяких [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] з [target_location.GetName] до [ShowReligionName('catholic')]"
  kirishitan.3.title: "Торгові привілеї"
  kirishitan.3.desc: "Група кірішітанських місіонерів звернулася до [target_ruler.GetName] з пропозицією перенаправити великі торгові кораблі їхньої батьківщини до наших портів, якщо ми дозволимо їм створити приморську громаду для кірішітанських навернених. Ця пропозиція має значну цінність для наших купців."
  kirishitan.3.a: "Нехай приходять!"
  kirishitan.3.b: "Ми не можемо цього дозволити."
  kirishitan.4.title: "Рекомендаційний лист"
  kirishitan.4.desc: "Кірішітанські проповідники в нашій землі поводилися добре з того часу, як прийшли сюди оселитися. Вони поважають закони, і все більше чоловіків та жінок почали бачити світло їхнього бога. Їхній лідер, [target_character.GetName], здобув репутацію чудового посередника і, ймовірно, став би чудовим міністром. [target_character.GetSheHe|U] навіть має рекомендаційний лист для цього зі своєї рідної країни.\n\nЗвісно, наші більш традиціоналістські васали сприйняли б призначення [target_character.GetHerHis] як образу як традиції, так і їх самих."
  kirishitan.4.a: "Прийняти [target_character.GetNameWithNoTooltip] на нашу службу."
  kirishitan.4.b: "Ми не можемо цього зробити."
  kirishitan.5.title: "[ShowReligionGroupNameWithNoTooltip('christian')] під судом"
  kirishitan.5.desc: "До нас звернулася велика кількість наших найцінніших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], а також високопосадовці [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] з храмових громад на наших землях. Усі вони вимагають, щоб ми дослідили підривні якості [ShowReligionGroupName('christian')]. Вони вважають, що ця чужа релігія руйнує наші традиції та ображає наших предків, і вони вимагають, щоб ми віддали віру під суд, дозволивши довіреним людям честі та якості дослідити це."
  kirishitan.5.a: "Тоді вони матимуть інквізицію."
  kirishitan.5.a.tt: "Результати можуть відрізнятися залежно від того, що знайде інквізиція."
  kirishitan.5.b: "Це не їхнє місце. Розум не може міркувати про віру."
  kirishitan.6.title: "Природа Бога"
  kirishitan.6.desc: "Тихе розслідування природи [ShowReligionGroupName('christian')] набуло найшокуючішого повороту, оскільки самі судді повернулися з вимогою хрещення. Оскільки ці люди були обрані як стовпи суспільства, це несподіваний розвиток подій для всіх нас."
  kirishitan.6.a: "Тоді ми повинні будемо дозволити це."
  kirishitan.6.b: "Безглуздо!"
  kirishitan.7.title: "[ShowReligionGroupNameWithNoTooltip('christian')] висміяно"
  kirishitan.7.desc: "Розслідування природи [ShowReligionGroupName('christian')], що не дивно, призвело до того, що релігія виявилася недостатньою з точки зору поваги та дотримання традицій нашої культури. Вчені та поважні чоловіки, яких ми призначили відповідальними за розслідування, заявили, що хоча релігія може здаватися спокусливою, насправді вона є небезпекою для нашого суспільства."
  kirishitan.7.a: "Це земля [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip]!"
  kirishitan.7.b: "Хоча ми поважаємо їхнє рішення, західники повинні залишитися."
  kirishitan.8.title: "Атаковано громаду кірішітан"
  kirishitan.8.desc: "Склади кірішітанських купців у [christian_port_event_target.GetName] загорялися більше одного разу цього місяця, і хоча місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] стверджують, що це була низка нещасних випадків, здається, не всі так прихильно ставляться до прибуття західників на наші береги, як ми."
  kirishitan.8.a: "Провести розслідування для покарання винних."
  kirishitan.8.b: "Ми мало що можемо зробити з нещасними випадками."
  kirishitan.9.title: "Розрив із традицією?"
  kirishitan.9.desc: "Не секрет, що [target_ruler.GetName] та [target_ruler.GetHerHis] рід особисто залучилися до [ShowReligionGroupAdjective('christian')] віри. З часом [ShowReligionGroupAdjectiveWithNoTooltip('christian')] почала витісняти [ROOT.GetCountry.GetReligion.GetAdjective] традиції [ROOT.GetCountry.GetName], і це є провідною ідеологією для нашої держави. Тепер, коли ми є більш об'єднаним і впорядкованим суспільством, можливо, настав час завершити перехід і прийняти [ShowReligionName('catholic')] як релігію нашої держави?"
  kirishitan.9.a: "Ні, ми ніколи не зможемо повністю відвернутися від традицій!"
  kirishitan.9.b: "Настав час змін."
  kirishitan.10.title: "Кірішітанське царство"
  kirishitan.10.desc: "Ми взяли послідовників [ShowReligionGroupAdjective('christian')] бога під своє крило і дозволили їм захист нашої держави. Куди б вони не йшли в нашому [ROOT.GetCountry.GetFlavorRank], кожен знає, що ці кірішітани мають право жити, працювати та прозелітизувати. [ShowReligionGroupAdjectiveWithNoTooltip('christian')] купці є звичайним явищем у наших містах, а при [ROOT.GetCountry.GetGovernment.GetCourtTitle] це стало все більш поширеною релігією серед наших міністрів та слуг."
  kirishitan.10.a: "#italic Gloria Deo#!."
  kirishitan.11.title: "[ShowReligionGroupNameWithNoTooltip('christian')] відбито"
  kirishitan.11.desc: "Незважаючи на те, що нанбанські іноземці намагалися поширити свою кірішітанську віру, нам вдалося підірвати її небезпечний вплив у нашому суспільстві. Ми тримали їхніх місіонерів на відстані витягнутої руки і закрили наш [ROOT.GetCountry.GetFlavorRank] для їхніх послідовників, дійшовши до того, що вистежували будь-яких підозрюваних прихильників у наших кордонах. В результаті, нас хвалять як наші слуги, так і [ROOT.GetCountry.GetReligion.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у нашому [ROOT.GetCountry.GetFlavorRank] як захисника шляху наших предків."
  kirishitan.11.a: "[ROOT.GetCountry.GetReligion.GetNameWithNoTooltip] переможе!"
  kirishitan.12.title: "Охрестити [target_ruler.GetNameWithNoTooltip]"
  kirishitan.12.desc: "Зацікавлені у поширенні своєї віри, кірішітанські проповідники звернулися до [target_ruler.GetName]. Хоча [target_ruler.GetSheHe] цікавився їхньою вірою, проповідники сприйняли це як знак того, що [target_ruler.GetSheHe] був відкритий до відмови від [target_ruler.GetReligion.GetName] та прийняття [ShowReligionName('catholic')], і тому запропонували [target_ruler.GetHerHim] ритуал хрещення. Це, очевидно, допомогло б збільшити їхню взаємодію з нами, але [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не буде задоволений таким рішенням."
  kirishitan.12.a: "Охрестити [target_ruler.GetHerHim]."
  kirishitan.12.b: "Ми не приймемо чужої віри."
  kirishitan.13.title: "$kirishitan_monks$"
  kirishitan.13.desc: "З прибуттям іноземних торговців до [target_country.GetAdjective] земель, з ними прибули монахи їхньої іноземної віри. Нам доведеться вирішити, як ми хочемо взаємодіяти з ними, оскільки ця іноземна віра може бути ключем, який відкриє нам гаманці іноземців, або наші їм."
  kirishitan.13.a: "Давайте уважно спостерігати за цими монахами."
  kirishitan_enabled.tt: "Тепер ми маємо доступ до $kirishitan_monks$ [Concept('religious_faction', 'CONCEPT_PLACEHOLDER')|e]"