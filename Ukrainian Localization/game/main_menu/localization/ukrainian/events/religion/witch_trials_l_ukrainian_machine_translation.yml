l_english:
  witch_trials.1.title: "Відьмацтво"
  witch_trials.1.desc: "Мешканці роздертого війною міста [target_location.GetName] шукають причини нещасть, що спіткали їх. На щастя, вони не знайшли їх пов'язаними з нашим правлінням, але, на жаль, те, що вони знайшли, викликало неабиякий переполох. Тривалі наслідки війни та те, як вони, здається, впливають на одних більше, ніж на інших, стверджують вони, можуть бути лише справою тих, хто практикує відьмацтво та чаклунство.\n\nЗвинувачення сипалися щедро, і є місцеві органи влади, готові організувати належні суди за ці злочини. Настільки належні, наскільки суди за магію взагалі можуть бути в [ROOT.GetCountry.GetName]."
  witch_trials.1.a: "Дозволити їм продовжити місцеві суди."
  witch_trials.1.b: "Наш інквізитор може зайнятися цими справами більш організовано."
  witch_trials.1.c: "Таким дурним забобонам немає місця в [ROOT.GetCountry.GetNameWithNoTooltip]!"
  witch_trials.1000.title: "Суди над відьмами в [target_location.GetNameWithNoTooltip]"
  witch_trials.1000.desc: "Люди в провінціях, що страждають від голоду, хвороб та нещасних подій, стверджують, що за їхніми стражданнями стоять чаклунство та відьмацтво. Жінок, дітей та чоловіків звинувачували в тому, що вони відьми, поклоняються Дияволу та є загрозою для Християнства. Дійшло до того, що люди в [target_location.GetName] лінчували ймовірних відьом без належного суду!"
  witch_trials.1000.a: "Немає таких речей, як чаклунство та відьми!"
  witch_trials.1000.b: "Ми не будемо втручатися, не зараз."
  witch_trials.1000.c: "Надіслати посланця до [GetCountry('PAP').GetGovernment.GetRulerTitle], щоб попросити поради."
  witch_trials.1000.d: "Домініканська інквізиція подбає про них."
  witch_trials.1001.title: "Крик про допомогу"
  witch_trials.1001.desc: "[target_ruler.GetName] просить [ROOT.GetCountry.GetGovernment.GetRulerTitle] поради щодо нещодавніх полювань та судів над відьмами. Люди [target_ruler.GetHerHis] країни звинувачують у своїх нещастях та стражданнях чаклунство та відьмацтво. Їхній гнів призвів до того, що жінок, дітей та чоловіків звинувачували в поклонінні Дияволу, у загрозі Християнству та добробуту вірних. Чи слід заборонити ці полювання та суди над відьмами, чи слід дозволити людям полювати, переслідувати, звинувачувати та карати людей, які можуть бути винними чи невинними у відьмацтві?"
  witch_trials.1001.a: "Засудити полювання та суди над відьмами!"
  witch_trials.1001.b: "Людям слід дозволити продовжувати цю практику."
  witch_trials.1002.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] засуджує суди над відьмами"
  witch_trials.1002.desc: "Запитавши [GetCountry('PAP').GetGovernment.GetRuler.GetName] поради щодо всієї ситуації з відьмами, щодо того, чи слід нам продовжувати наші полювання та суди над відьмами, ми довго чекали відповіді. Вона нарешті надійшла, з підписом [GetCountry('PAP').GetGovernment.GetRulerTitle] в кінці офіційного документа. «Негайно припиніть полювання та суди над відьмами!»"
  witch_trials.1002.a: "Ми підкоряємося."
  witch_trials.1002.b: "Ми відмовляємося."
  opinion_witchtrials_good: "Дотримувався доктрини."
  opinion_witchtrials_bad: "Не підкорився доктрині."
  witch_trials.1003.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] дозволяє суди над відьмами"
  witch_trials.1003.desc: "Повідомлення від [GetCountry('PAP').GetGovernment.GetRuler.GetName] було дуже чітким: чаклунство та відьмацтво слід переслідувати, обвинувачених судити, а винних карати за їхні гріховні вчинки. Усі, хто поклоняється Дияволу, відвідує відьомські шабаші та загрожує Християнству, горітимуть у Пеклі!"
  witch_trials.1003.a: "Ми розуміємо і приймаємо."
  witch_trials.1003.b: "Ні, ми відмовляємося дозволити забобонам розірвати нашу землю!"
  witch_trials.remove_modifiers.tt: "Суди над відьмами перервано!"