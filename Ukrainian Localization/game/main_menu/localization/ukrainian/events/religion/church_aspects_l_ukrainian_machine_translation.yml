l_english:
  church_aspects.1.title: "Пацифісти заперечують війні"
  church_aspects.1.desc: "Зростаючий пацифістський рух охоплює [ROOT.GetCountry.GetAdjective] народ і навіть до певної міри підтримується державою. Попри це, ми опинилися у загарбницькій війні. Хоча ми, безперечно, мали вагомі причини для нападу, пацифісти не погоджуються з війною і відмовляються воювати."
  church_aspects.1.a: "Ми поважатимемо їхні переконання."
  church_aspects.1.b: "Усі покликані мусять служити."
  church_aspects.2.title: "Блаженні миротворці"
  church_aspects.2.desc: "Роки миру сприяли зростанню пацифістського руху в [ROOT.GetCountry.GetReligion.GetAdjective] вірі в [ROOT.GetCountry.GetName]. Шанований пацифістський богослов виступив перед народом на підтримку нашого доброзичливого режиму і закликає всіх справжніх християн наслідувати праведний приклад [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  church_aspects.2.a: "Ми всі діти Божі."
  church_aspects.3.title: "Обітниці бідності"
  church_aspects.3.desc: "Багато [ROOT.GetCountry.GetReligion.GetAdjective] сект відкидають накопичення церковного багатства, асоціюючи його з гріховною розпустою Католицької Церкви. Обітниці бідності серед священиків стають звичними, і [ROOT.GetCountry.GetAdjective] Церква все більше обмежується духовними справами та утримується від втручання у світські справи держави чи землі."
  church_aspects.3.a: "Заохочувати обітниці духовенства."
  church_aspects.3.b: "Є переваги у могутній Церкві."
  church_aspects.4.title: "Грішний шляхтич"
  church_aspects.4.desc: "[ROOT.GetCountry.GetAdjective] Церква вірить, що ніхто, незалежно від багатства чи статусу, не стоїть вище законів Божих. Усі, хто грішить, повинні бути покарані відповідно.\n\n[sinful_noble.GetName] публічно і безсоромно вчинив гріх жадібності, тяжко образивши духовенство та викликавши заклики до покарання."
  church_aspects.4.a: "Ніхто не стоїть вище законів Божих."
  church_aspects.4.b: "Зробити покарання суто символічним."
  church_aspects.5.title: "Жадібність"
  church_aspects.5.desc: "Деякі члени нашої Державної Церкви сильно постраждали через надмірно високі відсоткові ставки, лунають голоси та поширюються памфлети, що засуджують «Лихварство та Шахрайство» та стверджують, що дрібних брокерів можна побачити на кожній вулиці.\n\nНа думку нашої Держави та її Церкви, стягнення відсотків сумісне з тим, щоб бути добрим християнином, проте в деяких випадках це, здається, може призвести до надмірностей. Можливо, було б найкраще ще більше зменшити дозволену суму відсотків, щоб приборкати найгірші випадки."
  church_aspects.5.a: "Ігнорувати недоброзичливців."
  church_aspects.5.b: "Зменшимо ліміт відсотків на деякий час."
  church_aspects.6.title: "Критика офіційної Біблії"
  church_aspects.6.desc: "Переклад Біблії, санкціонований державою, багато зробив для об'єднання [ROOT.GetCountry.GetReligion.GetAdjective] віри в нашій країні, і, на думку як широкої громадськості, так і більшості богословів, наш переклад призвів до книги, набагато вірнішої витокам нашої релігії.\n\nОднак є й ті, хто вважає офіційний переклад Біблії дуже недосконалим. Хоча одна група стверджує, що він просто застарів і потребує модернізації, інші вважають, що він занадто прихильний до правлячої держави і що ми намагалися використати його для умиротворення наших підданих. Інші ж просто бачать, що він недостатньо далеко зайшов і все ще зберігає багато помилок, які накопичилися за роки в попередніх версіях Біблії."
  church_aspects.6.a: "Дотримуватися існуючої версії."
  church_aspects.6.b: "Замовити новий переклад."
  church_aspects.7.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] інвестують свої прибутки"
  church_aspects.7.desc: "Наше сміливе відхилення від загальної [ShowReligionGroupAdjective('christian')] доктрини, що дозволяє лихварство, принесло великі плоди. Наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] багатші, ніж будь-коли раніше, і процвітають завдяки відсоткам, які їм дозволено стягувати. На знак вдячності [target_ruler.GetName] вони вирішили спонсорувати проєкт у [target_location.GetName]."
  church_aspects.7.a: "Новий [ShowBuildingTypeNameWithNoTooltip('university')] буде бажаним доповненням."
  church_aspects.7.b: "Будівництво нового [ShowBuildingTypeNameWithNoTooltip('cathedral')] безперечно втішить [ROOT.GetCountry.GetReligion.GetGodName]."
  church_aspects.8.title: "Проповідь у бідності"
  church_aspects.8.desc: "Відколи [ShowReligiousAspectName('clerical_poverty')] стало поширеним серед нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], нашим проповідникам стало легше доносити своє послання до простого люду наших земель. Життя в бідності, схоже, зробило наших священнослужителів ближчими до народу, а наших підданих – більш відкритими."
  church_aspects.8.a: "Ми всі рівні в очах Божих."
  church_aspects.8.b: "Хваліть цих проповідників за їхню працю."
  church_aspects.9.title: "Рівне покарання"
  church_aspects.9.desc: "Покарання всіх грішників, незалежно від їхнього соціального стану, принесло [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] багато похвал, і завдяки нашій церковній службі народ [ROOT.GetCountry.GetName] почувається рівним перед Богом. З невеликим керівництвом це почуття може призвести до зменшення бар'єрів у нашій соціальній структурі."
  church_aspects.9.a: "Ми можемо скористатися цією ситуацією."
  church_aspects.9.b: "Це стабілізує [ROOT.GetCountry.GetNameWithNoTooltip]."
  church_aspects.10.title: "Місцеве [ShowGoodsNameWithNoTooltip('wine')] для наших служб"
  church_aspects.10.desc: "Врожаї в [ROOT.GetCountry.GetCapital.GetMarket.GetName] були рясними, і тому наші запаси [ShowGoodsName('wine')] повні. Це означає, що в осяжному майбутньому наша Церква зможе широко проводити Господню Вечерю без будь-якого страху вичерпання винних льохів [ShowGoodsNameWithNoTooltip('wine')]."
  church_aspects.10.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] буде в захваті."
  church_aspects.10.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] має бути щасливим."
  church_aspects.11.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip] Церкви благають про допомогу"
  church_aspects.11.desc: "Ми отримали кілька повідомлень від нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] про жахливий стан постачання причасного [ShowGoodsName('wine')]. Через нещодавні погані врожаї церкви по всій країні намагаються надійно проводити Причастя під обома видами."
  church_aspects.11.a: "Спробуйте допомогти щедрою пожертвою."
  church_aspects.11.b: "Вони впораються без допомоги."
  church_aspects.12.title: "Достатність Писання"
  church_aspects.12.desc: "Наша Церква вірить, що вивчення Біблії – це все, що потрібно людині, щоб вести справжнє [ShowReligionGroupAdjective('christian')] життя. З розвитком друкарських технік та подальшою доступністю Біблій, ця мета здається більш досяжною, ніж будь-коли, для нашого народу. Ці віддані дослідження забезпечують нам стабільність та задоволене населення."
  church_aspects.12.a: "Нехай вони вивчають."
  church_aspects.12.b: "Сприяти стабільності королівства."
  church_aspects.13.title: "Неспроможність Писання"
  church_aspects.13.desc: "Наша доктрина [ShowReligiousAspectName('sola_scriptura')] не приносить користі, якщо наше населення не може вивчати Біблію, щоб досягти Спасіння. Без належної інструкції, як читати та писати, наш народ не зможе покладатися на Святу Книгу для заспокоєння. Як суверен, ми повинні вирішити цю проблему."
  church_aspects.13.a: "Звинуватити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  church_aspects.13.b: "Інвестуймо в нашу освіту."
  church_aspects.14.title: "Адаміти в суспільстві"
  church_aspects.14.desc: "Серед незліченних сект реформаторських рухів адаміти вважаються одними з найрадикальніших. Навіть крім відмови від одягу, їхня відмова від причастя та священства в цілому може викликати багато конфліктів як з їхніми співвітчизниками, так і з іноземними державами. Проте, сміливе прийняття цієї доктрини приносить нам деякі переваги. Їхні оголені церковні служби та спосіб життя руйнують статус особистості та сприяють спільному розумінню."
  church_aspects.14.a: "Заради вищого блага."
  church_aspects.14.b: "Ми створимо гостинну спільноту"
  church_aspects.15.title: "Занепад продуктивності"
  church_aspects.15.desc: "Наше широке прийняття адамітських громад у [ROOT.GetCountry.GetName] призвело до занепаду нашої капіталістичної економіки та закріплення більш традиційного підходу до виробництва."
  church_aspects.15.a: "Ми повинні це прийняти."
  church_aspects.15.b: "Відштовхнути цю тенденцію назад."
  church_aspects.16.title: "Адаміти порушують Вечерю"
  church_aspects.16.desc: "Адамітська доктрина наказує нам відмовлятися від Господньої Вечері, яка зазвичай відбувається під час наших зібрань. Оскільки [ROOT.GetCountry.GetAdjective] Церква піднесла як адамітів, так і причастя хлібом і вином, ці погляди тепер призвели до жорстоких сутичок між адамітами та звичайними вірянами під час служб."
  church_aspects.16.a: "Ми мали це передбачити."
  church_aspects.17.title: "Світлий священик"
  church_aspects.17.desc: "Свобода ділитися богословськими поглядами, безумовно, має свої переваги. Наші люди не бояться переслідувань за свої переконання і можуть здійснювати свої починання без страху. Нещодавно до нас дійшли повідомлення про невеликі наукові прориви, зроблені місцевим священиком і дослідником, якого за старого релігійного порядку вважали б єретиком."
  church_aspects.17.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  church_aspects.17.b: "Яка виняткова особистість."
  church_aspects.18.title: "Дисиденти перешкоджають нашим проповідникам"
  church_aspects.18.desc: "Наше рішення дозволити кожній людині вільно ділитися та нести свою версію істинної віри не лише викликає симпатії серед нашого усталеного [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Численні церкви скаржаться на суперечливих проповідників, які перешкоджають їхнім зусиллям встановити єдину церковну доктрину для нашої країни."
  church_aspects.18.a: "Це цілком природно."
  church_aspects.18.b: "Задобрити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] пожертвою."
  church_aspects.19.title: "Аскетична трудова етика"
  church_aspects.19.desc: "Хоча ми відвернулися від більшості старих практик, [ShowReligiousAspectName('asceticism')] залишається в центрі нашої віри. Наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] адаптували ці вчення у своє повсякденне життя і працюють ревно та суворо."
  church_aspects.19.a: "Це, безперечно, сформує наше суспільство."
  church_aspects.19.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] закріпить поміркованість у нашому суспільстві."
  church_aspects.20.title: "Реакція проти аскетичних громад"
  church_aspects.20.desc: "З часу встановлення [ShowReligiousAspectName('asceticism')] у [ROOT.GetCountry.GetAdjective] Церкві виникли дрібні конфлікти між аскетичними сектами та іншими громадами нашої віри. Групи [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] зіштовхуються, звинувачуючи одна одну в хибному поклонінні. Ми повинні діяти швидко, якщо не хочемо здатися слабкими перед нашими підданими."
  church_aspects.20.a: "Покарати цих [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  church_aspects.20.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] візьме на себе відповідальність."
  church_aspects.21.title: "[location_monastery.GetNameWithNoTooltip] користується з [ShowBuildingTypeNameWithNoTooltip('monastery')]"
  church_aspects.21.desc: "Наша місцева адміністрація в [location_monastery.GetName] повідомила про зростання місцевої промисловості. Відновлення монастирів у нашій країні, схоже, сприяє збільшенню видобутку сировини та допомагає процвітати місцевій економіці."
  church_aspects.21.a: "Нехай ці ченці продовжують свою справу вдома."
  church_aspects.21.b: "Люди повинні наслідувати їхній приклад."
  church_aspects.22.title: "Страх перед криптокатоликами"
  church_aspects.22.desc: "Заснування нового [ShowBuildingTypeName('monastery')] розглядається нашою Церквою як незвичайний вчинок. Ці установи можуть призвести до скасування реформаторських зусиль у [ROOT.GetCountry.GetName] та відродження [ShowReligionAdjective('catholic')] вірувань. Якщо ми не будемо обережними та не будемо пильно стежити за цими громадами, це може загостритися ще більше."
  church_aspects.22.a: "Обмежити права [ShowBuildingTypeNameWithNoTooltip('monastery')]."
  church_aspects.22.b: "Немає потреби хвилюватися."
  church_aspects.23.title: "[target_country.GetNameWithNoTooltip] наслідує наш приклад"
  church_aspects.23.desc: "Друкар у [target_country.GetName] опублікував власну версію Біблії. Для цієї кропіткої праці він використав нашу Біблію як основу, перекладаючи з нашого попереднього досягнення. Це велика честь для наших перекладачів і підкреслює наш статус у русі Реформації."
  church_aspects.23.a: "Використати це для світських справ."
  church_aspects.23.b: "Нехай воно говорить саме за себе, немає потреби пишатися."
  source_of_translation: "Піонери перекладу"
  church_aspects.24.title: "Масові навернення в [target_province.GetNameWithNoTooltip]"
  church_aspects.24.desc: "Наша практика хрещення дорослих, схоже, спонукала більше людей у [target_province.GetName] зробити останній крок у наверненні до [ROOT.GetCountry.GetReligion.GetName]. Схоже, наша наполегливість у хрещенні лише тих, хто відповідає за власне сповідання віри, значно полегшує мирне переконання людей приєднатися до нашої Церкви."
  church_aspects.24.a: "Просувати це ще далі в [target_province.GetNameWithNoTooltip]."
  church_aspects.24.b: "[ROOT.GetCountry.Custom('common_string_positive')]"
  church_aspects.25.title: "Вигнанець у [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] Реформації"
  church_aspects.25.desc: "Наша позиція щодо хрещення віруючих, схоже, дуже непопулярна в інших регіонах [ROOT.GetCountry.GetReligion.GetAdjective] Реформації. Інші країни стають ворожими, щойно чують про нашу відмову хрестити немовлят і займають позицію, яку вони не зайняли б навіть проти проклятих [ShowReligionAdjective('catholic')] дурнів."
  church_aspects.25.a: "Завжди вперед, ніколи назад!"
  church_aspects.25.b: "Нам доведеться пристосуватися до них."
  too_radical_reformation: "Радикальні реформатори"
  church_aspects.26.title: "Єдина віра під [target_ruler.GetNameWithNoTooltip]"
  church_aspects.26.desc: "У ролі глави віри, [target_ruler.GetName] об'єднав істинних віруючих у міцний союз. Наш улюблений [ROOT.GetCountry.GetGovernment.GetRulerTitle] працював день і ніч, щоб прояснити нашу доктрину та шукати лише найкращих теологів як [target_ruler.GetHerHis] радників у цьому питанні."
  church_aspects.26.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  church_aspects.26.b: "Ми не можемо зупинити роботу зараз."
  church_aspects.27.title: "Віра без лідера"
  church_aspects.27.desc: "Відсутність лідера в нашій країні серйозно впливає на здатність нашої Церкви функціонувати. Сильна централізація наших церковних справ під [ROOT.GetCountry.GetGovernment.GetRulerTitle] тепер переслідує нас, оскільки наша країна без лідера. Без будь-яких інвестицій віра народу може розвалитися, якщо ми не зміцнимо їхню рішучість."
  church_aspects.27.a: "Нам потрібно діяти."
  church_aspects.27.b: "Воно само собою владнається."
  church_aspects.28.title: "Кредо проти [target_ruler.GetNameWithNoTooltip]"
  church_aspects.28.desc: "Група людей у [target_location.GetName] опублікувала нове кредо, яке закінчується декларацією про невідповідність указу [ROOT.GetCountry.GetGovernment.GetRulerTitle] у релігійних питаннях. Якщо ми не діятимемо, їхнє кредо може поширитися в [target_location.GetNameWithNoTooltip] і підірвати наш контроль."
  church_aspects.28.a: "Нехай роблять, що хочуть."
  church_aspects.28.b: "Видалити їх з [target_location.GetNameWithNoTooltip]."
  church_aspects.29.title: "Кредо приживається"
  church_aspects.29.desc: "Наше дозволення кожному віруючому обирати своє кредо породило справді вражаюче сповідання. Походячи з [target_location.GetName], нове сповідання віри швидко прижилося і надихнуло наш народ. Хоча ми пропагуємо свободу особистості, це сповідання зміцнило віру [ROOT.GetCountry.GetName], як мало що інше раніше."
  church_aspects.29.a: "Відсвяткуймо досягнення нашого народу."
  church_aspects.29.b: "[ROOT.GetCountry.Custom('common_string_positive')]"
  church_aspects.30.title: "Нове джерело віри"
  church_aspects.30.desc: "Спільнота вірних віруючих у [target_location.GetName] стверджує про нове джерело божественного одкровення. Ця нова традиція, яка, ймовірно, виникла з нашого просування доктрини [ShowReligiousAspectName('prima_scriptura')], сформувала сильне ядро віруючих у [target_location.GetNameWithNoTooltip], що призвело до мирної та процвітаючої спільноти."
  church_aspects.30.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  church_aspects.31.title: "Традиція кидає виклик [target_ruler.GetNameWithNoTooltip]"
  church_aspects.31.desc: "Один з наших пасторів у [target_location.GetName], здається, далеко відійшов від нашої визначеної доктрини. Хоча ми й пропагуємо інші джерела божественної істини, окрім самої Біблії, [target_character.GetSheHe] , здається, повністю відкидає її у [target_character.GetHerHis] проповідях, зосереджуючись на інших темах. Якщо ми не хочемо ризикувати поширенням єресі, нам, ймовірно, слід усунути [target_character.GetHerHim] з [target_character.GetHerHis] посади."
  church_aspects.31.a: "[target_character.GetSheHe|U] — явний єретик!"
  church_aspects.31.b: "[target_character.GetSheHe|U] може виявитися корисним."
  church_aspects.32.title: "Пієтисти хвалять нашу Церкву"
  church_aspects.32.desc: "Видатний пієтист, який оселився в нашій країні, хвалить нашу непокору ортодоксальній доктрині нашої віри та наше прийняття нових форм віри. [target_character.GetSheHe|U] пропонує нам [target_character.GetHerHis] поради та безперервні проповіді, якщо ми хочемо [target_character.GetHerHim] у нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  church_aspects.32.a: "Найняти [target_character.GetHerHim]."
  church_aspects.32.b: "Пожинати похвалу."
  church_aspects.33.title: "Новий пієтистський рух"
  church_aspects.33.desc: "Група пієтистських проповідників та освітян опублікувала обвинувальний документ, проголошуючи недоліки нашої Церкви. Вони відкидають частини нашої доктрини як помилкові та благають про зміну курсу."
  church_aspects.33.a: "Погодитися з їхніми доводами."
  church_aspects.33.b: "Відштовхнути їхні проповіді."