l_english:
  ikko_ikki.1.title: "$ikko_ikki$ Повстання!"
  ikko_ikki.1.desc: "Невдоволення нескінченною війною спричинило те, що група селян, ченців та дрібних землевласників, які слідують за сектою [target_io.GetName] [ShowReligionGroupName('buddhist')], відкрито виступила та чинить опір правлінню [target_character.GetName]. Якщо ми не діятимемо рішуче і швидко не придушимо цю розрізнену банду, заворушення можуть поширитися та ще більше дестабілізувати наші землі."
  ikko_ikki.1.a: "Поставити їх на місце!"
  ikko_ikki.1.b: "Уникнути загострення ситуації."
  ikko_ikki.2.title: "$ikko_ikki$ Поширився на [ROOT.GetCountry.GetNameWithNoTooltip]!"
  ikko_ikki.2.desc: "Зростаючі проблеми нашого сусіднього [target_country.GetFlavorRank] з $ikko_ikki$ досягли кульмінації та призвели до військових зіткнень. Жорстокість боїв спричинила те, що вцілілі члени секти Однодумців розлилися в наш [ROOT.GetCountry.GetFlavorRank], і ці банди селян, ченців та дрібних землевласників вже зміцнили свої ряди послідовниками з-поміж нашого власного народу. Вони, безсумнівно, лише спричинятимуть нам дедалі більше проблем, якщо ми не діятимемо швидко та рішуче."
  ikko_ikki.2.a: "$ikko_ikki.1.a$"
  ikko_ikki.2.b: "$ikko_ikki.1.b$"
  ikko_ikki.3.title: "[target_io.GetNameWithNoTooltip]"
  ikko_ikki.3.desc: "У цей час заворушень дедалі більше людей звертаються до релігії за настановою та безпекою. [ShowReligionGroupName('buddhist')] давно проник у наше суспільство, але останнім часом кількість прихильників швидко зростає, і більше [ShowReligionGroupAdjectiveWithNoTooltip('buddhist')] традицій також знаходять свій шлях у повсякденне життя [ROOT.GetCountry.GetAdjective] народу.\n\nОднією з цих нових традицій є традиція [target_io.GetName], гілки [ShowPolicyName('pure_land_school_policy')], що виникла з вчень [ShowPolicyName('tiantai_policy')]. Очевидна обіцянка спасіння та соціальної мобільності серед її послідовників приваблює велику кількість людей, і по всьому нашому [ROOT.GetCountry.GetFlavorRank] її послання поширюється, а люди організовуються в групи, що називаються $ikko_ikki$."
  ikko_ikki.3.a: "Цей запал надихає! Давайте підтримувати цей рух."
  sect_gains_favor_tt: "[target_io.GetName] отримає #Y 10#! $sect_favor$"
  ikko_ikki.3.b: "Важко мати щось проти сильних переконань вірних."
  ikko_ikki.3.c: "Будьмо дуже обмежувальними щодо всього, що розширює можливості бідних."
  ikko_ikki.4.title: "Дзінайтьо"
  ikko_ikki.4.desc: "Громади вірних школи [target_io.GetName] почали розростатися в невеликі містечка навколо великих [ShowReligionGroupName('buddhist')] храмів у [ROOT.GetCountry.GetFlavorRank]. Ці поселення, що називаються #italic Дзінайтьо#! або #italic Дзінайматі#! через те, що вони знаходяться на території [ShowBuildingTypeName('temple')], є не лише впливовими в духовному сенсі, але й збирають власні оборонні сили, що складаються з кого завгодно: від дрібних землевласників, що називаються Дзізамурай, до озброєних фермерів та ченців. Ці комуни, зі своєю формою самоврядування, становлять загрозу для влади [ROOT.GetCountry.GetFlavorRank], що контролює навколишні землі.\n\nОдна така комуна виникла навколо [ShowBuildingTypeNameWithNoTooltip('temple')] у [target_location.GetName], і хоча ми могли б скористатися їхньою підтримкою, ця потужна суміш релігійного запалу, зброї та автономії може становити загрозу для стабільності нашого [ROOT.GetCountry.GetFlavorRank]."
  ikko_ikki.4.a: "Ми повинні підрізати ці осині гнізда."
  ikko_ikki.4.b: "Давайте прагнути співпрацювати з цими арміями вірних."
  ikko_ikki.4.c: "Дозволити будівництво більшої кількості храмових міст."
  ikko_ikki.5.title: "Соціальна напруга"
  ikko_ikki.5.desc: "$ikko_ikki$ у нашому [ROOT.GetCountry.GetFlavorRank] ставали сильнішими, численнішими і, перш за все, сміливішими. Наші чиновники повідомляють, що іноді збирач податків із секти [target_io.GetName] вже збирав податки, коли вони прибували до села, а торговці більше не почуваються в безпеці, проходячи повз ці громади. $ikko_ikki$ тепер настільки сильні, що багато хто почав ставити під сумнів їхні привілеї."
  ikko_ikki.5.a: "Це лише їхнє право."
  ikko_ikki.5.b: "Вони не можуть поширюватися за межі своїх поточних кордонів."
  ikko_ikki.5.c: "Їхній зухвалості не буде дозволено тривати!"
  ikko_ikki.6.title: "Кінець релігійного самоврядування"
  ikko_ikki.6.desc: "$ikko_ikki$ були приборкані, а міста під їхнім командуванням розформовані. Їхні послідовники роззброєні, і тепер лише наші намісники мають повноваження стягувати мита, податки та організовувати оборону проти чужинців."
  ikko_ikki.6.a: "Порядок відновлено."
  ikko_ikki_no_longer_available.tt: "Ми більше не матимемо доступу до [Concept('religious_faction', 'CONCEPT_PLACEHOLDER')|e] $ikko_ikki$"
  ikko_ikki.6.b: "Знайдіть розраду в вірі [target_io.GetNameWithNoTooltip] знову."
  ikko_ikki.7.title: "Паралельна влада"
  ikko_ikki.7.desc: "Спільноти $ikko_ikki$, схоже, тут надовго. Хоча ми намагалися захистити нашу власну владу, ми також поступилися значними правами та привілеями їхнім Jinaichō, і, ймовірно, вони й надалі відіграватимуть значну роль у нашому суспільстві."
  ikko_ikki.7.a: "Вони служитимуть нашим цілям."
  ikko_ikki.7.b: "Їхній вплив зростає надто сильно."
  ikko_ikki.8.title: "Підтримка $ikko_ikki$"
  ikko_ikki.8.desc: "Ми деякий час підтримували зростання храмових громад [target_io.GetName] і тому стали асоціюватися з $ikko_ikki$. Лідери [ShowReligionGroupAdjective('buddhist')] храмових громад можуть мати великий вплив у нашому суспільстві, але вони також є палкими прихильниками нашого [ROOT.GetCountry.GetFlavorRank]."
  ikko_ikki.8.a: "Продовжуйте їх підтримувати, вони корисні."
  ikko_ikki.8.b: "Можливо, ми надаємо їм занадто багато підтримки."
  ikko_ikki.9.title: "Будда Аміда"
  ikko_ikki.9.desc: "Наша довготривала підтримка [target_io.GetName] не обійшлася без тертя, і в багатьох ситуаціях здається, що в [ROOT.GetCountry.GetName] існують дві паралельні влади. Проте, $ikko_ikki$, ймовірно, не досягли б такого успіху без нашого захисту, на думку багатьох у нашому [ROOT.GetCountry.GetFlavorRank].\n\nЗ огляду на останні релігійні події, багато хто очікує, що ми піднесемо лідерів $ikko_ikki$ на високі посади та зробимо їхню віру більш офіційно спонсорованою нашим [ROOT.GetCountry.GetFlavorRank]. Однак для багатьох інших це було б серйозною образою для наших старих традицій."
  ikko_ikki.9.a: "Ми не можемо повністю відвернутися від традицій наших предків."
  ikko_ikki.9.b: "#italic Наму Аміда Буцу#!. Ми повинні прийняти їхні вірування та увічнити їх."
  ikko_ikki.9.c: "#italic Наму Аміда Буцу#!. Їхні комуни отримають повну владу."
  ikko_ikki.9.d: "#italic Наму Аміда Буцу#!, але ми не можемо дозволити їм правити."
  ikko_ikki_lots_of_mahayana.tt: "Багато наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] перейдуть у [ShowReligionName('mahayana')]"
  ikko_ikki.10.title: "$ikko_ikki$"
  ikko_ikki.10.desc: "Недавнє піднесення віри [target_io.GetName] у [target_origin_country.GetLongName] віщує важливі зміни для всіх [ShowReligionAdjective('shinto')] країн, які муситимуть вирішити, як вони взаємодіятимуть з цією новою фракцією, що виникла. Незалежно від того, чи вирішать вони підтримати цю нову віру, чи відвернуться від її послідовників, безперечно, її вплив відчуватиметься скрізь."
  ikko_ikki.10.a: "Попереду цікаві часи."
  ikko_ikki_enabled.tt: "Тепер ми маємо доступ до [Concept('religious_faction', 'CONCEPT_PLACEHOLDER')|e] $ikko_ikki$"
  ikko_ikki.11.title: "$ikko_ikki.6.title$"
  ikko_ikki.11.desc: "Загони $ikko_ikki$ були повністю розформовані, і більше ніхто не сповідує їхню віру. Давно минули часи, коли наші землі страждали від руйнівних наслідків релігійних заворушень з їхньої руки, оскільки [target_origin_country.GetLongName] щойно відкрито оголосили про знищення послідовників $ikko_ikki$, на полегшення багатьох."
  ikko_ikki.11.a: "Їхня віра була недостатньо сильною."