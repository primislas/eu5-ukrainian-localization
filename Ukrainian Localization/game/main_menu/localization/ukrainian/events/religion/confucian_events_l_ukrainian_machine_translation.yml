l_english:
  confucian_events.1.title: "Концепція Шан-ді"
  confucian_events.1.desc: "Послідовники [target_location.GetDominantReligion.GetAdjective] віри в [target_location.GetName] дедалі більше інтегрують наші обряди та концепції з [ShowPolicyName('confucianism_policy')] у своє повсякденне життя. Останньою тенденцією є ототожнення концепції Шан-ді з їхніми власними верховними божествами. Ця інтерпретація дещо неортодоксальна для вчених-експертів нашого [ROOT.GetCountry.GetFlavorRank], але вона дозволила [target_location.GetDominantReligion.GetAdjectiveWithNoTooltip] вірним інтегрувати низку концепцій, обрядів, констант та класичних вчень з [ShowPolicyNameWithNoTooltip('confucianism_policy')] у свою теологію.\n\nОднак, у палацових залах [ROOT.GetCountry.GetCapital.GetName] все ще точаться дебати, чи це правильний і належний шлях для прихильників [target_location.GetDominantReligion.GetNameWithNoTooltip] до кращої інтеграції в нашу бюрократію."
  confucian_events.1.a: "Ми повинні навчити їх правильних шляхів!"
  STATIC_MODIFIER_NAME_shangdi_conflict_refused: "Конфлікт щодо Шан-ді відхилено"
  STATIC_MODIFIER_DESC_shangdi_conflict_refused: "Ми не дозволяємо людям ототожнювати концепцію Шан-ді з деякими їхніми попередніми віруваннями. Як наслідок, їм важче осягнути наші власні системи."
  confucian_events.1.b: "Давайте пристосуємося до цієї абстракції."
  STATIC_MODIFIER_NAME_shangdi_conflict_accepted: "Конфлікт щодо Шан-ді прийнято"
  STATIC_MODIFIER_DESC_shangdi_conflict_accepted: "Концепція Шан-ді була легко інтерпретована як деякі з попередніх вірувань людей. Як наслідок, їм легше осягнути наші власні системи."
  confucian_events.2.title: "Переклади Класики"
  confucian_events.2.desc: "Віруючі [target_location.GetDominantReligion.GetAdjective] віри в [target_location.GetName] – це люди з сильними традиціями та обрядами, і їхня прихильність до мови власних вчень стримує їх від прогресу до цивілізації. Якщо вони коли-небудь піднімуться з варварства цього світу і дійсно інтегруються в наше суспільство, ми, можливо, повинні забезпечити, щоб класика та належні обряди були доступні для них у їхній власній мові.\n\nДеякі вчені вже почали створювати такі праці, але інші рішуче виступають проти такого починання. Чи повинні ми заохочувати їх продовжувати синтезувати свої старі релігійні концепції з піднесеними принципами Кун Фу-цзи?"
  confucian_events.2.a: "Нехай вони створять свою власну версію належної форми."
  STATIC_MODIFIER_NAME_classics_translated: "Класика перекладена"
  STATIC_MODIFIER_DESC_classics_translated: "Ми дозволяємо людям перекладати класичні вчення [ShowPolicyName('confucianism_policy')] на їхні власні мови, краще навчаючи їх у процесі."
  confucian_events.2.b: "Це було б пародією на нашу ідеологію!"
  STATIC_MODIFIER_NAME_classics_defended: "Класика захищена"
  STATIC_MODIFIER_DESC_classics_defended: "Ми не дозволяємо підривати класичні вчення, перекладаючи їх на іноземні мови. Їхня чистота – це те, що підтримує роботу нашої бюрократії."
  confucian_events.3.title: "Віра [target_character.GetNameWithNoTooltip]"
  confucian_events.3.desc: "Наш довірений [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] та повірений, [target_character.GetName], тісно співпрацював з нашою [target_location.GetDominantReligion.GetAdjective] громадою в [target_location.GetName], щоб допомогти їм піднести їхню варварську культуру. Здивований [target_character.GetHerHis] відкриттями, [target_character.GetSheHe] почав приймати багато [target_location.GetDominantReligion.GetAdjectiveWithNoTooltip] концепцій після інтенсивного вивчення їхньої науки та літератури. Багато хто турбується, що [target_character.GetSheHe] занадто захопився [target_location.GetDominantReligion.GetAdjectiveWithNoTooltip] звичаями. Деякі навіть стверджують, що наш [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] таємно навернувся, ганьблячи [target_character.GetHerHis] предків і [ROOT.GetCountry.GetName] разом."
  confucian_events.3.a: "Усунути цю [target_character.GetWomanMan]!"
  confucian_events.3.b: "Нам є чому повчитися у [target_location.GetDominantReligion.GetAdjectiveWithNoTooltip] народу."
  STATIC_MODIFIER_NAME_converted_minister: "Вчений [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle]"
  STATIC_MODIFIER_DESC_converted_minister: "Один член нашого [ROOT.GetCountry.GetGovernment.GetCabinetTitle] був спокушений іноземною релігією. Хоча це шкодить нашій вірі, переваги від інших джерел знань не можна легко ігнорувати."
  confucian_events.4.title: "Права та обряд"
  confucian_events.4.desc: "Хоча вони є частиною [ROOT.GetCountry.GetName], деякі [target_location.GetDominantReligion.GetAdjective] традиції можуть бути дуже важкими для сприйняття. Цивілізовані люди повинні дотримуватися того, що є правильним і логічним згідно з вченнями [ShowPolicyName('confucianism_policy')], але ці чоловіки та жінки мають багато звичаїв, що прямо суперечать таким правилам. Наші чиновники в [target_location.GetName] борються з місцевими жителями, які наполягають на своїх варварських звичаях."
  confucian_events.4.a: "Варвари!"
  confucian_events.4.b: "Такі дрібниці нас не стосуються."
  confucian_events.5.title: "Розширення повноважень Управління [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  confucian_events.5.desc: "Хоча [target_location.GetDominantReligion.GetAdjective] люди є варварами, вони мають деякі звичаї та обряди, які ми могли б використати. Оскільки їхні традиції та церемонії щодо правління вже містять концепцію високої світської влади, такої як наш [ROOT.GetCountry.GetGovernment.GetRulerTitle], це те, що ми могли б добре використати. Місцеві чиновники в [target_location.GetName] вже робили це, але було запропоновано використовувати [target_location.GetDominantReligion.GetAdjectiveWithNoTooltip] церемонії навіть на вищих рівнях. Інші стверджують, що ми зганьбимо наших предків і відвернемося від належного, якщо дозволимо цим традиціям забруднити наші."
  confucian_events.5.a: "Це звучить не так вже й погано."
  confucian_events.5.b: "Саме з ганебними чиновниками нам потрібно розібратися!"
  STATIC_MODIFIER_NAME_local_rites_represed: "Місцеві обряди придушено"
  confucian_events.6.title: "Принесення цивілізації варварам"
  confucian_events.6.desc: "З часом [target_location.GetDominantReligion.GetAdjective] люди перейняли багато наших звичаїв. Коли наш [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle] [target_character.GetName] відвідав район [target_location.GetName], [target_character.GetSheHe] виявив, що вони все ще далекі від цивілізації. Однак, коли місцевий впливовий землевласник запросив [target_character.GetHerHim] взяти участь у церемонії наречення свого сина, під час якої він назвав хлопчика на свою честь, це стало останньою краплею.\n\n[target_character.GetNameWithNoTooltip] повернувся з цього району з дуже низькою думкою про [target_location.GetDominantReligion.GetAdjectiveWithNoTooltip] людей та їхні перспективи коли-небудь зарахувати себе до цивілізованих народів світу."
  confucian_events.6.a: "Тоді ми залишимо їх напризволяще."
  confucian_events.6.b: "Відправимо наших найкращих і найрозумніших, щоб цивілізувати їх."
  confucian_events.7.title: "[target_location.GetDominantReligion.GetAdjectiveWithNoTooltip] цивілізація"
  confucian_events.7.desc: "Деякі варвари більш сприйнятливі до розуму та інтелекту, ніж інші. [target_location.GetDominantReligion.GetAdjective] люди [target_location.GetName] вже перейняли багато наших традицій, від найважливіших до навіть дрібних речей. Іноземцям, що відвідують, важко відрізнити цей регіон від власне [ROOT.GetCountry.GetName], оскільки, за винятком деяких незначних ексцентричностей, люди та звичаї там здаються такими ж [ROOT.GetCountry.GetAdjectiveWithNoTooltip], як і будь-яка частина [ROOT.GetCountry.GetLongNameWithNoTooltip]."
  confucian_events.7.a: "Прогрес!"
  confucian_events.7.b: "Ми повинні використати цю можливість на регіональному рівні!"
  confucian_events.8.title: "Сяожень?"
  confucian_events.8.desc: "Правління нашого великого [ROOT.GetCountry.GetFlavorRank] є найважливішою відповідальністю та привілеєм [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Члени династії [target_ruler.GetDynasty.GetName] у минулому пишалися тим, що керували власним прикладом, дотримуючись суворого етикету, особистої аскези та ретельно вилучаючи тих, хто не відповідав цьому ідеалу.\n\nТому з важким серцем [target_ruler.GetName] спостерігав за розвитком [target_heir.GetName]. Далеко не ідеальний [target_heir.GetWomanMan], наш [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetHeirTitle] часто описується [target_heir.GetHerHis] вчителями як дріб'язковий [target_heir.GetWomanMan], зосереджений на негайній вигоді та емоційних задоволеннях. Однак при [ROOT.GetCountry.GetGovernment.GetCourtTitle] існують фракції, які були б дуже засмучені, якби ми відмовилися від [target_heir.GetHerHim], і новий [ROOT.GetCountry.GetGovernment.GetHeirTitle] не мав би їхньої підтримки."
  confucian_events.8.a: "Такий [target_heir.GetWomanMan] не підходить для [ROOT.GetCountry.GetFlavorRank]."
  confucian_events.8.b: "Ми не повинні порушувати поточний баланс."
  confucian_events.9.title: "Популярний роман"
  confucian_events.9.desc: "Народний роман про відому історію з минулого швидко набирає популярності серед наших підданих. Це само по собі не є проблемою, але до нашої уваги дійшло, що ця новелізація насправді порушує центральні принципи [ShowPolicyName('confucianism_policy')], оскільки її можна розглядати як аргумент для непокори [ROOT.GetCountry.GetGovernment.GetRulerTitle] та центральній владі.\n\nНаші адміністратори тепер стверджують, що книгу потрібно заборонити, хоча деякі побоюються, що це лише зробить її більш привабливою для тих, хто бажає її прочитати."
  confucian_events.9.a: "Її потрібно негайно заборонити."
  STATIC_MODIFIER_NAME_banned_novel: "Заборонений роман"
  STATIC_MODIFIER_DESC_banned_novel: "Підривні романи, що суперечать принципам [ShowPolicyName('confucianism_policy')], ніколи не повинні бути дозволені в нашій країні."
  confucian_events.9.b: "Ми ведемо прикладом, а не указом. Нехай буде так."
  STATIC_MODIFIER_NAME_allowed_critical_novel: "Дозволений критичний роман"
  STATIC_MODIFIER_DESC_allowed_critical_novel: "Роман, вельми критичний до нашого правління, поширився. Хоча він не змальовує нас у найкращому світлі, це полегшення, що наш народ нарешті читає книги."
  confucian_events.10.title: "Державна служба"
  confucian_events.10.desc: "Освіта, самовдосконалення та дотримання класики є основою будь-якого уряду, що ґрунтується на [ShowPolicyName('confucianism_policy')], і якщо наш [ROOT.GetCountry.GetFlavorRank] прагне величі, ми повинні завжди присвячувати гроші, увагу та енергію тому, щоб наші чиновники були якомога освіченішими та поінформованішими. Тому викликає певне занепокоєння те, що кількість людей, які шукають державну службу, останнім часом, здається, зменшується."
  confucian_events.10.a: "Ми повинні розширити бюрократію!"
  confucian_events.10.b: "Поки що немає потреби посилювати кадри."
  confucian_events.11.title: "Моральне керівництво в епоху заворушень"
  confucian_events.11.desc: "Багато провідних діячів у [ROOT.GetCountry.GetName] є або людьми, що досягли всього самі, або залежать від вірності тих, хто є такими. Наші старі моральні кодекси, однак, наголошують на важливості походження та вірності, а також на соціальному порядку, заснованому на покорі владі [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Вчені [ShowPolicyName('confucianism_policy')] тепер досліджують вчення великих майстрів і переглядають їх для керівництва в управлінні нашою країною.\n\nЦей нововиявлений інтерес до неоконфуціанства підкреслює первісні цінності моралі та навчання над надмірним зосередженням на правильному управлінні пізніших вчених, і намагається надати раціональний моральний кодекс як для місцевих правителів, так і для звичайних людей. Одним з таких вчених є [target_character.GetName], який здобув ім'я для [target_character.GetHerselfHimself] серед освічених еліт."
  confucian_events.11.a: "Ми повинні прагнути залучати таких людей, як [target_character.GetNameWithNoTooltip]."
  confucian_events.11.b: "Підтримаємо заклади [ROOT.GetCountry.GetFlavorRank]."
  confucian_events.12.title: "Народження та привілей"
  confucian_events.12.desc: "Поширення ідеалів [ShowPolicyName('confucianism_policy')] у нашому суспільстві призвело до того, що низка людей скромного походження піднялася на позиції інтелектуального впливу. [target_character.GetName], один з найвидатніших вчених цієї епохи, [target_character.GetHerselfHimself] не народився з [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], і разом з іншими вченими [target_character.GetSheHe] має намір зробити навчання більш доступним через публічні лекції та книги, написані простою мовою.\n\nБагато в чому це виклик старому соціальному порядку, де навчання було привілеєм, зарезервованим для сімей правильних родів."
  confucian_events.12.a: "Це ініціатива, яку ми повинні підтримати."
  confucian_events.12.b: "Ми не можемо дозволити, щоб соціальний порядок був загрожений таким чином!"
  confucian_events.13.title: "Меритократія"
  confucian_events.13.desc: "З юних років [target_ruler.GetName] вивчав тексти [ShowPolicyName('confucianism_policy')] та слухав неоконфуціанські лекції. Як [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName], [target_ruler.GetSheHe] тепер має можливість застосувати багато з цих філософських принципів на практиці. Амбітний план полягав би в тому, щоб викорінити тих, хто має мало компетенції, але володіє впливом у нашому [ROOT.GetCountry.GetFlavorRank] виключно на основі народження та давніх зв'язків вірності між нашими родинами.\n\nЗвісно, наші вірні васали, ймовірно, розцінили б це як невдячність та невиправдану ворожість."
  confucian_events.13.a: "Заслуги мають бути провідним принципом."
  confucian_events.13.b: "Ми повинні підтримувати тих, хто вірний нам."