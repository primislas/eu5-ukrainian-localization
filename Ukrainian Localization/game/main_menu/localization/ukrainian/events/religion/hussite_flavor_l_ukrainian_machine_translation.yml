l_english:
  hussite_flavor.1.title: "Людина культури"
  hussite_flavor.1.desc: "Загальновизнано, що наше дотримання вчень [GetCharacter('boh_jan_hus').GetName] надихнуло на створення нових місць поклоніння та відданості, де заохочуються побожні вирази мистецтва та теологічні дебати, у спробі зобразити божественне та вловити сутність віри та молитви.\n\nОднією з таких осіб є [target_artist.GetName], який охоче бажає запропонувати [target_artist.GetHerHis] послуги, щоб допомогти нам у подальшому розвитку нашої пишноти, престижу та мистецького хисту."
  hussite_flavor.1.a: "[target_artist.GetHerHis|U] послуги будуть корисними."
  hussite_flavor.1.b: "Ми не можемо витрачати монету."
  hussite_flavor.2.title: "Видатні члени [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] не згодні з нашою політикою"
  hussite_flavor.2.desc: "Керувати нашим народом – непросте завдання. Тому багато членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] намагалися піднятися по нашій адміністративній ієрархії, щоб, на їхню думку, виправити курс наших дій. Широко поширена думка, що деякі з наших політик або не виконуються належним чином, або прямо суперечать [ShowReligionAdjective('hussite')] догматам."
  hussite_flavor.2.a: "Ми повинні виправити наш курс."
  hussite_flavor.2.b: "Вони мовчатимуть."
  hussite_flavor.3.title: "Друзі за нашими кордонами"
  hussite_flavor.3.desc: "Попри наші зіткнення з єретичними вірами, часом криваві та всеосяжні, ми не бажаємо шкодити тим, хто підтримує з нами добрі стосунки та поважає наші переконання. Одним із таких випадків є [target_country.GetName], чиї церковні власті нещодавно брали участь у культурних та літературних обмінах через наші кордони. Якщо ми використаємо це розумно, це може стати значним кроком у наших дипломатичних зусиллях за кордоном та забезпечити нам нових союзників."
  hussite_flavor.3.a: "Зв'яжіться з ними."
  hussite_flavor.3.b: "Самотність – це шлях, яким ми йдемо..."
  trust_religious_comprehension: "Релігійне розуміння"
  hussite_flavor.4.title: "Не в лад з Божественним"
  hussite_flavor.4.desc: "Чи не достатньо ми молилися останнім часом? Чи стало причастя легковажним завданням, яке наш народ відвідує як просту рутину? Здається, ми знецінили ритуали, пов'язані з практикою вчень [GetCharacter('boh_jan_hus').GetName], і в процесі втратили сутність того, що робить нашу побожність інтимним зв'язком з божественним. В результаті багато простолюдинів у [target_location.GetName] взялися за зброю проти декадансу, що охопив наші церковні справи..."
  hussite_flavor.4.a: "Нікого звинувачувати, крім нас самих..."
  hussite_flavor.4.b: "Звинувачувати слабке керівництво [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  target_character_dies_very_violently_tt: "[target_character.GetName] зазнає насильницької смерті від рук натовпу"
  hussite_flavor.5.title: "[target_location.GetNameWithNoTooltip] Відхиляється"
  hussite_flavor.5.desc: "Наш народ славиться своїм втручанням та випробуванням чужих релігій. Є правда у вірі, що споріднені віри мають багато спільного. Однак останні події в [target_location.GetName] вивели цю скромну справу на новий рівень, коли багато наших селян зацікавилися чужими літургійними питаннями та вивчають писання іншої віри!"
  hussite_flavor.5.a: "Вони можуть випробувати вільне вираження своєї побожності!"
  hussite_flavor.5.b: "Ми повинні м'яко втрутитися."
  hussite_flavor.5.c: "Як щодо того, щоб вони спробували батога?"
  hussite_flavor.5.d: "Дозволити процвітання їхніх вірувань."
  hussite_flavor.5.e: "Ми цього не дозволимо."
  hussite_flavor.6.title: "Міжконфесійна співпраця"
  hussite_flavor.6.desc: "Багато чуток та обговорень ширилося нашим володінням щодо найму єретичних радників, особливо на впливові посади в нашому кабінеті. Однак, попри марні плітки, [target_character.GetName] знову і знову доводив, що є незамінною частиною нашого уряду. [target_character.GetHerHis|U] політика допомогла нам розбудувати наше володіння та міцно триматися як у внутрішніх, так і в зовнішніх справах."
  hussite_flavor.6.a: "[target_character.GetSheHe|U] має бути заборонено входити до кабінету!"
  hussite_flavor.6.b: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] нарікає на [target_character.GetHerHis] призначення."
  hussite_flavor.6.c: "Співпраця — ключ до нашого процвітання!"
  hussite_flavor.7.title: "Наспівування проповідей у [target_location.GetNameWithNoTooltip]"
  hussite_flavor.7.desc: "Золотий присмерк м'якого ранку та ангельські голоси ранкової проповіді грайливо наповнюють повітря в околицях [target_location.GetName]. Пісні благання та відданості, витончений прояв божественності є звичним явищем у наших святих місцях. Однак сьогоднішня проповідь була виголошена з новою любов'ю та майстерністю. Внаслідок цього місцевий люд бажає присвятити її як знак визнання любові."
  hussite_flavor.7.a: "Нехай вони будуть присвячені вірі!"
  hussite_flavor.7.b: "Вони співатимуть хвалу [target_character.GetNameWithNoTooltip]."
  hussite_flavor.7.c: "Оспівуйте стійкість та процвітання нашого народу."
  hussite_flavor.8.title: "Релігійний заколот у [target_location.GetNameWithNoTooltip]"
  hussite_flavor.8.desc: "Дебати щодо питань віри не є чужими для гарячих моментів та люті. Недавня дискусія між меншинами в [target_location.GetName] та представниками [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] призвела до того, що останні втекли зі своїх посад, побоюючись за своє життя. Внаслідок цього ми отримали гнівні вимоги від їхнього імені втрутитися в [target_location.GetNameWithNoTooltip] та покласти край небезпечному повстанню, що може назрівати..."
  hussite_flavor.8.a: "Ми мусимо втрутитися."
  hussite_flavor.8.b: "Справи [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] нижче нашої гідності."
  hussite_flavor.9.title: "Поширення вчення Яна Гуса"
  hussite_flavor.9.desc: "Вітер змін проноситься землями, несучи з собою революційні вчення Яна Гуса та гуситської віри. Пригноблені та розчаровані знаходять розраду та натхнення в цих перетворюючих віруваннях, збираючись наперекір встановленому порядку.\n\nЗапал гуситського руху поширюється, як лісова пожежа, охоплюючи серця та уми простого люду. Простота та прямота вчень Гуса глибоко відгукуються, пропонуючи альтернативу розкоші та корупції Католицької Церкви. Це час потрясінь, коли люди відкидають кайдани традицій та приймають нове бачення духовності."
  hussite_flavor.9.a: "У межах наших кордонів."
  hussite_flavor.9.b: "До наших сусідів."
  hussite_flavor.10.title: "Бойові вози та військова тактика"
  hussite_flavor.10.desc: "Під час [ShowSituationName('hussite_wars')] використання бойових возів виявилося вирішальним для виживання [ShowReligionAdjective('hussite')] армій. Ці сильно укріплені та мобільні оборонні споруди дозволяли переважно селянській піхоті відбивати нищівні кавалерійські атаки їхніх краще оснащених ворогів. Ця інновація була не лише відповіддю на брак традиційної кавалерії, але й блискучою адаптацією наявних ресурсів для подолання технологічних та тактичних недоліків.\n\nОднак часи змінилися, і впровадження пороху, поряд з новими тактиками, змінило правила гри. Армії тепер залежать від потужних обстрілів та маневрених формувань, що вводить нові фактори, про які ми повинні знати. Багато наших військових теоретиків підтримують впровадження нових наступальних технік у нашій армії, за рахунок традиційної оборони."
  hussite_flavor.10.a: "Ми не можемо зрадити нашим традиціям!"
  hussite_flavor.10.b: "Не будемо покладатися на застарілу тактику, нам потрібна реформа!"
  reform_hussite_army_tt: "Доки [ShowModifier('hussite_military_reform_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] активний, ми матимемо доступ до [ShowParliamentIssueType('hussite_army_reform')] [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e]"
  stability_loss_depends_on_defensive_sv_tt: "Втрата [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] залежить від нашої [ShowSocietyDirectionName('defensive')] [Concept('societal_value', 'CONCEPT_PLACEHOLDER')|e]"
  event_may_reoccur_after_20_years_tt: "Ця [Concept('event', 'CONCEPT_PLACEHOLDER')|e] може повторитися через #Y 20#! років, якщо ми все ще сповідуємо [ShowReligionName('hussite')]"
  hussite_flavor.12.title: "[ShowReligionAdjectiveWithNoTooltip('hussite')] фанатики в [target_province.GetNameWithNoTooltip]"
  hussite_flavor.12.desc: "Попри наші найкращі спроби збалансувати потреби та вимоги вірних у межах нашого [ROOT.GetCountry.GetFlavorRank], завжди знайдуться ті, хто вимагає більшого, чия жага до переслідувань не вщухає. Такими є [ShowReligionAdjective('hussite')] фанатики [target_province.GetName], чиї вимоги переслідування єретиків принесли лише святотатство та нестабільність у провінції. Їхні вимоги легко назвати безглуздими, однак ми повинні вирішити це питання з надзвичайною обережністю, щоб не ризикувати перетворити їх на мучеників!"
  hussite_flavor.12.a: "Задовольнити їхні вимоги, наразі."
  every_hussite_in_target_province_10_sat_tt: "Кожен [ShowReligionAdjectiveWithNoTooltip('hussite')] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetNameWithNoTooltip] отримає [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  hussite_flavor.12.b: "Ми не ведемо переговорів з дурнями!"
  hussite_flavor.11.title: "Гімни вірних"
  hussite_flavor.11.desc: "Вірні збираються, щоб співати гімни, які втілюють дух нашого [ShowReligionAdjective('hussite')] руху. Ці пісні не лише надихають на відданість, але й проливають світло на нашу культуру та ідеї для ширшого населення. Мелодії натхненні силою нашої віри та оспівують стійкість і доблесть [ROOT.GetCountry.GetLongName]."
  hussite_flavor.11.a: "Музика для наших вух!"
  hussite_flavor.13.title: "Зразковий проповідник"
  hussite_flavor.13.desc: "Харизматичний проповідник серед [ShowReligionAdjective('hussite')] лав у [target_location.GetName] почав висловлювати погляди, що відхиляються далі, ніж зазвичай, від наших вчень. Хоча дехто бачить у [target_character.GetHerHim] провидця, інші побоюються, що [target_character.GetSheHe] може спричинити розкол у наших лавах. Члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] досить голосно висловлювали свою позицію щодо цього питання, але існують обґрунтовані побоювання, що місцеві жителі можуть викликати невдоволення, якщо ми виступимо проти такої впливової особи."
  hussite_flavor.13.a: "[target_character.GetHerHis|U] ораторські здібності можуть бути нам корисними."
  hussite_flavor.13.b: "Прибрати [target_character.GetHerHim]."
  hussite_flavor.13.c: "Настав час очистити цих єретиків у [target_location.GetNameWithNoTooltip]"
  target_character_disappears: "[target_character.GetName] зникне"
  hussite_flavor.14.title: "[ShowReligionAdjectiveWithNoTooltip('hussite')] Біблія"
  hussite_flavor.14.desc: "Тривають зусилля зі створення новітньої версії повного [ShowReligionAdjective('hussite')] перекладу Біблії, написаної народною мовою, щоб зробити Святе Письмо доступним для всіх. Це починання було зустрінуте з ентузіазмом вірних. Видатні релігійні діячі, такі як [target_character_1.GetName], [target_character_2.GetName] або [target_character_3.GetName], пропонують перекласти видання, кожен зі своїм набором здібностей та підходом. Такий проєкт, безумовно, не буде дешевим, але вони виступають за фінансування таких просвітницьких починань."
  hussite_flavor.14.a: "[target_character_1.GetShortNameWithNoTooltip] є тією [target_character_1.GetWomanMan], хто підходить для цієї роботи."
  hussite_flavor.14.b: "Доручити роботу [target_character_2.GetNameWithNoTooltip]."
  hussite_flavor.14.c: "Дозволити [target_character_3.GetNameWithNoTooltip] наглядати за перекладом."
  hussite_flavor.14.d: "Ми не можемо дозволити собі такі витрати наразі."
  hussite_flavor.15.title: "Захисники [ShowReligionAdjectiveWithNoTooltip('hussite')]"
  hussite_flavor.15.desc: "Поки війна вирує, а вороги [ShowReligionAdjective('hussite')] віри наближаються, заклик захищати наші переконання сколихнув серця чоловіків по всьому [ROOT.GetCountry.GetFlavorRank]. Натхненні проповідями та пам'яттю про [GetCharacter('boh_jan_hus').GetName], незліченні фермери, ремісники та міщани готові взятися за зброю, щоб захистити свою віру та батьківщину. Деякі лідери пропонують організувати цих чоловіків у ополчення та відправити їх для посилення наших армій на передовій. Інші стверджують, що вони краще підійдуть для укріплення своїх міст та підготовки барикад, забезпечуючи вперту оборону проти будь-якого загарбника."
  hussite_flavor.15.a: "Вони встановлять мир силою!"
  hussite_flavor.15.b: "Натомість, відправити їх барикадувати наші території."
  scales_with_tolerance_own_tt: "Отримана [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] масштабується з нашою [Concept('tolerance', 'CONCEPT_PLACEHOLDER')|e] до [ShowReligionAdjectiveWithNoTooltip('hussite')] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]"