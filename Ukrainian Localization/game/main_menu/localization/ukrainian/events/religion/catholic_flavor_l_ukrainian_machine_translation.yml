l_english:
  catholic_flavor.1.title: "Впливовий проповідник"
  catholic_flavor.1.desc: "Набожний молодий проповідник на ім'я [target_character.GetName] нещодавно висловився про те, наскільки велика наша відданість вченням Святого Отця в [pope_capital_scope.GetName]. Це може бути лише на благо нашого майбутнього."
  catholic_flavor.1.a: "Відправити його до [pope_capital_scope.GetNameWithNoTooltip]."
  catholic_flavor.1.b: "З нього вийде чудовий єпископ."
  catholic_flavor.2.title: "Процвітаючий [ShowBuildingTypeNameWithNoTooltip('monastery')]"
  catholic_flavor.2.desc: "[ShowBuildingTypeName('monastery')] у [target_location.GetName] пережив еру процвітання, під час якої вони також привабили визнаних [ShowReligionAdjective('catholic')] вчених. Цей успіх впливає на решту [target_location.GetNameWithNoTooltip] і допомагає принести нове багатство в цю область. Візит [target_ruler.GetName] може бути доцільним і стане великою честю для [ShowBuildingTypeNameWithNoTooltip('monastery')]."
  catholic_flavor.2.a: "[target_ruler.GetNameWithNoTooltip] має відвідати [target_location.GetNameWithNoTooltip] [target_ruler.GetHerselfHimself]."
  catholic_flavor.2.b: "Ми залишимо їх наодинці з їхніми справами."
  catholic_flavor.3.title: "[ShowBuildingTypeNameWithNoTooltip('monastery')] у біді"
  catholic_flavor.3.desc: "[ShowBuildingTypeName('monastery')], населений нашими ченцями, переживає важкі часи. Через брак як фінансування, так і нових послідовників, монастир занепав до жалюгідного стану. Ченці тепер благають нас про допомогу у вигляді щедрої пожертви, без якої вони не зможуть підтримувати місцеве населення, як це було в минулому."
  catholic_flavor.3.a: "Ми пожертвуємо трохи грошей."
  catholic_flavor.3.b: "Це не наша проблема."
  catholic_flavor.4.title: "Си́монія?"
  catholic_flavor.4.desc: "У нас є вакансія на високій посаді в церковній адміністрації [ROOT.GetCountry.GetName]. Є церковник із багатої родини на ім'я [target_character.GetName], який зробив привабливу пропозицію: якщо ми схвалимо та підтримаємо обрання [target_character.GetHerHis] на цю посаду, ми отримаємо великий внесок до нашої скарбниці. Деякі більш побожні люди стверджують, що ця практика є гріхом, який називається симонією, але що вони знають?"
  catholic_flavor.4.a: "Нам потрібні гроші!"
  catholic_flavor.4.b: "Симонія — це гріх!"
  catholic_flavor.5.title: "Продаж індульгенцій"
  catholic_flavor.5.desc: "$flavor_pap.1701.a$\n\nПрактика обіцянки відпущення земних гріхів в обмін на гроші була дуже популярною серед [ShowReligionAdjective('catholic')] послідовників, або принаймні серед тих, хто мав зайві гроші. Їм прощаються всі їхні гріхи, і їм навіть не потрібно відмовлятися від своїх пороків! Однак ця практика викликала подив серед [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], які незручно почуваються з ідеєю, що [GetCountry('PAP').GetGovernment.GetRulerTitle] збагачує [GetInternationalOrganization('catholic_church').GetName] таким чином. Натомість вони стверджують, що [ShowReligionGroupAdjective('christian')] повинні виявити справжнє каяття, якщо їхні гріхи мають бути прощені.\n\nЗ віком [target_ruler.GetName] суперечки з цього приводу стають більш особистими. [target_ruler.GetSheHe|U] згрішив, як і кожен [ROOT.GetCountry.GetGovernment.GetRulerTitle] повинен, щоб зберегти своє правління. Як же тоді [target_ruler.GetSheHe] найкраще отримати прощення?"
  catholic_flavor.5.a: "Буде організовано пожертвування для [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  catholic_flavor.5.b: "Індульгенції — це легкий варіант; каяття краще."
  catholic_obstructing_church: "Відмовився платити за індульгенції"
  catholic_flavor.6.title: "Вшанування реліквій"
  catholic_flavor.6.desc: "Від найвищого дворянина до найнижчого селянина люди вірять, що вшанування реліквій дозволяє прохачеві скоротити час перебування в чистилищі. Однак у [unrest_province.GetName] було знайдено трактат, що виступає проти цієї практики, прибитий до дверей однієї з наших церков, яка має дуже значну колекцію реліквій. Чи є якась правда в скаргах цього трактату, чи це лише слова скептиків та єретиків, які прагнуть зашкодити єдності [GetInternationalOrganization('catholic_church').GetName], нашого єдиного істинного шляху до спасіння?"
  catholic_flavor.6.a: "Але ми щойно купили флакон молока Діви Марії!"
  catholic_flavor.6.b: "Прощення може прийти лише від [ROOT.GetCountry.GetReligion.GetGodName]."
  catholic_flavor.6.b.tt: "Це зробить наше населення у [unrest_province.GetName], що сповідує [ShowReligionName('catholic')], нещасним."
  catholic_flavor.7.title: "Вшанування Діви Марії"
  catholic_flavor.7.desc: "Пресвята Діва Марія, мати Господа нашого Ісуса Христа, є Царицею Небесною та посередницею багатьох милостей. Як найдосконаліша жінка, її святе материнство дарує їй місце праворуч [ROOT.GetCountry.GetReligion.GetGodName]. Чи так це? Нещодавно радикальні богослови почали стверджувати, що немає потреби в таких заступництвах. Чи мають вони рацію, чи Свята Матір-Церква перебуває в небезпеці від їхніх майже єретичних висловлювань?"
  catholic_flavor.7.a: "Нехай Мадонна простить їх."
  catholic_flavor.7.b: "Вона особлива жінка, але все ж лише жінка."
  opinion_denying_the_holy_mother: "Заперечення Святої Матері"
  catholic_flavor.8.title: "Доктрина Особливого Суду"
  catholic_flavor.8.desc: "Як ми знаємо, коли ми помираємо, [ROOT.GetCountry.GetReligion.GetGodName] судить нас негайно і вирішує долю кожної душі, поки вона чекає на останній суд.\n\nОднак монах у [unrest_province.GetName] розпочав доктринальну суперечку, що межує з єрессю, стверджуючи, що чистилища не існує і кажучи, що молитви за померлих не допомагають їм потрапити до раю.\n\nЦі суперечки загрожують самій єдності [GetInternationalOrganization('catholic_church').GetName]."
  catholic_flavor.8.a: "Він, ймовірно, єретик."
  catholic_flavor.8.b: "Мертвим не можна допомогти."
  catholic_flavor.9.title: "Нове сповідання віри"
  catholic_flavor.9.desc: "Реформатори висунули нове сповідання віри, яке має деякі незначні, але все ж серйозні розбіжності з [ShowReligionAdjective('catholic')] вченнями. [GetInternationalOrganization('catholic_church').GetName] стверджує, що воно межує з єретичним, тоді як є ті, хто припускає, що це нове сповідання дозволить взяти [GetInternationalOrganization('catholic_church').GetNameWithNoTooltip] та її адміністративний апарат під більш жорсткий контроль."
  catholic_flavor.9.a: "Просувати його, навіть якщо деякі з наших підданих зайдуть занадто далеко."
  catholic_flavor.9.b: "Ні, це засудить усіх."
  catholic_flavor.10.title: "Обіцянка безпечного проходу?"
  catholic_flavor.10.desc: "Група так званих ченців-реформаторів нещодавно з'явилася при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] під нашу найурочистішу обіцянку безпечного проходу, щоб вони могли обґрунтувати справедливість своєї справи. Як [jan_hus_scope.GetName] до них, їхня єресь очевидна, але наше слово було дано."
  catholic_flavor.10.a: "Наша честь — це наше слово."
  catholic_flavor.10.b: "Ми не зв'язані обіцянками цим єретикам."
  catholic_flavor.11.title: "Проголошення святого"
  catholic_flavor.11.desc: "[pope_scope.GetName] щойно оголосив, що один з найшанованіших і найповажаніших предків нашого правителя, [ancestor_saint.GetName], був святим нашої шанованої Церкви, і що нарешті настав час належним чином вшанувати їх. Це привід для великого святкування!"
  catholic_flavor.11.a: "Te Deum!"
  catholic_flavor.12.title: "Sublimis Deus"
  catholic_flavor.12.desc: "[pope_scope.GetName] постановляє, що корінні народи Колоній не повинні бути перетворені на рабів. Віра в те, що вони є меншими звірами, нездатними отримати благодать [ROOT.GetCountry.GetReligion.GetGodName], пише [pope_scope.GetSheHe], є мерзенною брехнею, поширеною самим ворогом людського роду. Натомість, Його Святість наполягає, що, як і всі одухотворені людські істоти, ці люди прагнуть світла [ROOT.GetCountry.GetReligion.GetGodName], і тому всі побожні князі повинні поспішити поширити [ShowReligionAdjective('catholic')] віру серед них."
  catholic_flavor.12.a: "Виконати волю [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  opinion_sublimis_deus: "Sublimis Deus"
  catholic_flavor.12.b: "Чого [GetCountry('PAP').GetGovernment.GetRulerTitle] не знає, те йому не зашкодить."
  catholic_flavor.13.title: "[ShowBuildingTypeNameWithNoTooltip('scriptorium')] Поширює єресь"
  catholic_flavor.13.desc: "[ShowBuildingTypeNameWithNoTooltip('scriptorium')] у [target_location.GetName] припустився вирішальної помилки при копіюванні деяких релігійних текстів, що передбачає найбільш єретичну інтерпретацію. Якщо ми не діятимемо швидко, ці тексти можуть підірвати довіру нашого народу до істинної віри."
  catholic_flavor.13.a: "Зупинити поширення за будь-яку ціну."
  catholic_flavor.13.b: "З часом усе владнається."
  catholic_flavor.14.title: "[target_country.GetLongNameWithNoTooltip] Зцілює розкол"
  catholic_flavor.14.desc: "Єпископ [ShowLocationName('rome')], [target_character.GetName], оголосив про завершення Великого розколу, декларацію, підтриману [target_character.GetHerHis] поступливими новими церковними маріонетками в [ShowLocationName('constantinople')] та [ShowLocationName('moscow')]. Хоча ми могли б продовжувати діяти по-старому, перемоги [target_country.GetName] свідчать, що [ROOT.GetCountry.GetReligion.GetGodName] справді може бути на [ShowReligionAdjective('catholic')] боці."
  catholic_flavor.14.a: "Ми приймемо [ShowReligionNameWithNoTooltip('catholic')]."
  catholic_flavor.14.a.tt: "Значна частина нашого населення навернеться до [ShowReligionName('catholic')]."
  catholic_flavor.14.b: "Доки вони кажуть «Filioque», ми будемо слідувати [ShowReligionNameWithNoTooltip('orthodox')]!"
  catholic_flavor.14.b.tt: "Невелика частина нашого населення навернеться до [ShowReligionName('catholic')]."
  catholic_flavor.15.title: "Свято дурнів"
  catholic_flavor.15.desc: "Свято дурнів наближається!\n\nОдягнений у диявольський одяг, обрано нового «єпископа». Люди п'ють, сміються і танцюють, поки фальшивий єпископ глузує з церковних ритуалів, бурлеск [ShowReligionGroupName('christian')] поклоніння, яким із задоволенням насолоджуються всі, крім [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], які досить наполегливо вимагають негайно припинити святкування заради [ROOT.GetCountry.GetGovernment.GetRulerTitle] та країни."
  catholic_flavor.15.a: "Дозволити святкуванням тривати."
  catholic_flavor.15.b: "Глузування з наших святих інститутів не можна терпіти!"
  catholic_flavor.15.c: "Призначити коня на папство жартома."
  catholic_flavor.15.d: "Призначити дзвонаря [ShowLocationNameWithNoTooltip('paris')]."
  catholic_flavor.16.title: "На славу писарів"
  catholic_flavor.16.desc: "Ремесло переписування текстів – це важке і зазвичай невдячне завдання. Однак [ShowBuildingTypeNameWithNoTooltip('scriptorium')] у [target_location.GetName] отримав похвалу від абата, який вихваляє писарів такими словами: #italic Відданий писар, об'єкт нашого трактату, ніколи не перестане хвалити Бога, приносити задоволення ангелам, зміцнювати праведних, навертати грішників, вихваляти смиренних, утверджувати добрих, бентежити гордих і докоряти впертим.#!"
  catholic_flavor.16.a: "Це чудовий приклад нашої відданості."
  catholic_flavor.16.b: "Писарі добре попрацювали, щоб заслужити таку похвалу."
  catholic_flavor.100.title: "Кардинал-племінник"
  catholic_flavor.100.desc: "Існує давня [ROOT.GetCountry.GetAdjective] традиція призначати родичів [ROOT.GetCountry.GetGovernment.GetRulerTitle] до Колегії кардиналів. Хоча дехто називає це непотизмом, кардинали-племінники мають усталене місце в Курії."
  catholic_flavor.100.desc.a: "$catholic_flavor.100.desc$ Тепер, коли настав час призначити нового кардинала в [cardinal_nephew_country.GetName], [ROOT.GetCountry.GetGovernment.GetRuler.GetName] має вирішити, чи підійде родич для проживання в [cardinal_nephew_province.GetName]."
  catholic_flavor.100.desc.b: "$catholic_flavor.100.desc$ Тепер, коли настав час призначити нового кардинала в [cardinal_nephew_country.GetName], [ROOT.GetCountry.GetGovernment.GetRuler.GetName] має вирішити, чи підійде родич для виконання поточних завдань."
  catholic_flavor.100.a: "Ні, це традиція, яку ми повинні припинити."
  catholic_flavor.100.b: "Племінник [ROOT.GetCountry.GetGovernment.GetRulerTitle] стане чудовим кардиналом."
  catholic_flavor.101.title: "Кардинал-племінник від [GetCountry('PAP').GetGovernment.GetRulerTitle]"
  catholic_flavor.101.desc: "[target_character.GetName] просить нас призначити [target_character.GetHerHis] родича в [cardinal_nephew_province.GetName] кардиналом. Хоча це поширена практика, багато хто вважає це відвертим непотизмом."
  catholic_flavor.101.a: "Прийняти кардинала-племінника [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  catholic_flavor.101.a.tt: "Кожна країна з [Concept('cardinal', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowBiasValue('opinion_popes_pet')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [cardinal_nephew_country.GetName]"
  opinion_popes_pet: "Улюбленець Папи"
  catholic_flavor.101.b: "Ми не сприятимемо непотизму в Церкві."
  catholic_flavor.102.title: "Кардинал-племінник прийнятий"
  catholic_flavor.102.desc: "[cardinal_nephew_country.GetName] прийняла племінника [ROOT.GetCountry.GetGovernment.GetRulerTitle] як нового кардинала в [cardinal_nephew_province.GetName]."
  catholic_flavor.102.a: "Чудово!"
  opinion_cardinal_nephew: "Кардинал-племінник"
  catholic_flavor.103.title: "Відмовлено кардиналу-племіннику"
  catholic_flavor.103.desc: "[cardinal_nephew_country.GetName] відмовилася призначити племінника [ROOT.GetCountry.GetGovernment.GetRulerTitle] кардиналом у [cardinal_nephew_province.GetName]."
  catholic_flavor.103.a: "[ROOT.GetCountry.Custom('common_string_disappointing')]"
  catholic_flavor.1000.title: "[ShowBuildingTypeNameWithNoTooltip('seat_of_cardinal')] для [SCOPE.sCountry('actor').GetNameWithNoTooltip]"
  catholic_flavor.1000.desc: "[SCOPE.sCountry('actor').GetName] попросила нас надати їм нове [ShowBuildingTypeName('seat_of_cardinal')]. Кардинал оселиться в [target_location.GetName], якщо ми погодимося."
  catholic_flavor.1000.a: "Задовольнити їхнє прохання."
  catholic_flavor.1000.b: "Ми повинні їм відмовити."
  catholic_flavor.1001.desc: "[GetInternationalOrganization('catholic_church').GetLeaderTitle] милостиво задовольнив наше прохання отримати нового кардинала в [target_location.GetName]. Будівництво відповідних приміщень для такої посади вже розпочато."
  catholic_flavor.1001.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  catholic_flavor.1002.desc: "[GetInternationalOrganization('catholic_church').GetLeaderTitle], на жаль, відхилив наше прохання надати нам [ShowBuildingTypeName('seat_of_cardinal')]. Нам нічого не залишається, як сподіватися, що в майбутньому вони будуть більш поступливими."
  catholic_flavor.1002.a: "[ROOT.GetCountry.Custom('common_string_disappointing')]"
  catholic_flavor.9000.title: "[ShowGovernmentReformNameWithNoTooltip('papacy_reform')]"
  catholic_flavor.9000.desc: "Через обставини, що не залежать від нас, ми втратили [ShowGovernmentReformName('papacy_reform')]. Ця ситуація неприйнятна, і ми повинні негайно відновити [GetInternationalOrganization('catholic_church').GetLeaderTitle] як нашого правителя."
  catholic_flavor.9000.a: "[ROOT.GetCountry.Custom('common_string_positive')]"