l_english:
  papal_conclave_events.1.title: "Кардинали сперечаються"
  papal_conclave_events.1.desc: "Під час Конклаву, що має обрати наступного [ROOT.GetCountry.GetGovernment.GetRulerTitle], двоє кардиналів вступили в гарячу дискусію, яка переросла у відкрите протистояння щодо цінностей один одного, а не просто обмін думками щодо самих виборів.\n\nЗ одного боку, існує думка, що Божа справа має ґрунтуватися на спогляданні, незалежно від припливів і відпливів народної думки. Цей погляд поділяють багато найстарших членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], які вважають, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] не повинен змінювати своє судження, щоб догодити тим, хто дбає лише про земні винагороди, незалежно від того, скільки земної влади вони можуть мати.\n\nЗ іншого боку стоять ті, хто здобув свою підтримку переважно від найвпливовіших і найбагатших родин серед [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], стверджуючи, що [ROOT.GetCountry.GetGovernment.GetRulerTitle], який повністю ігнорує турботи та інтереси народу, є невдахою як Божий пастир, і що підтримка народу може принести лише користь."
  papal_conclave_events.1.a: "Бог знатиме своїх."
  papal_conclave_events.1.b: "Пастирі справді повинні дбати про свої отари."
  papal_conclave_events.1.c: "Ми повинні залишатися нейтральними."
  papal_conclave_events.2.title: "Вплив на голосування"
  papal_conclave_events.2.desc: "Конклав зібрався, щоб вирішити, хто стане наступним [ROOT.GetCountry.GetGovernment.GetRulerTitle], і дипломатія та переговори вирують, намагаючись вплинути на це рішення. З такою кількістю впливових націй, що кружляють навколо такого важливого рішення, ми, можливо, могли б спробувати схилити шальки терезів на свою користь, щоб отримати прихильність деяких із них.\n\nЦе, очевидно, не буде дешевим починанням, ані таким, що гарантує успіх, але переваги, які ми можемо отримати від цього, якщо зможемо заручитися підтримкою будь-якої нації за кардиналом, можуть принести нам великі вигоди."
  papal_conclave_events.2.a: "Давайте дамо їм стимул."
  papal_conclave_events.2.b: "Це богохульство!"
  papal_conclave_events.2.tt: "[target_country.GetName] отримає нашу пропозицію. Якщо вони погодяться:"
  papal_conclave_events.3.title: "Пропозиція від Конклаву"
  papal_conclave_events.3.desc: "Надійшло повідомлення від [GetCountry('PAP').GetLongName], що зараз перебуває в розпалі Конклаву для обрання нового [GetCountry('PAP').GetGovernment.GetRulerTitle]. Вони стверджують, що придатність наступного [GetCountry('PAP').GetGovernment.GetRulerTitle] є питанням настільки ж політичним, наскільки й теологічним. Таким чином, вони прийшли просити нашої підтримки на поточних виборах, обіцяючи великі вигоди від нашої взаємної співпраці."
  papal_conclave_events.3.a: "Прийняти пропозицію."
  papal_conclave_events.3.b: "Ми не будемо втручатися у справи Святого Престолу."
  papal_conclave_events.4.title: "Пропозицію прийнято"
  papal_conclave_events.4.desc: "Наш посланець до [target_country.GetLongName] повернувся з чудовими новинами. Величний [target_country.GetGovernment.GetRulerTitle] [target_country.GetNameWithNoTooltip] вирішив прийняти нашу пропозицію та пропонує нам свою підтримку на поточних виборах Конклаву. Наші дипломатичні зв'язки зміцнилися."
  papal_conclave_events.4.a: "Нехай Господь благословить їх."
  papal_conclave_events.5.title: "Пропозицію відхилено"
  papal_conclave_events.5.desc: "Підлий [target_country.GetGovernment.GetRulerTitle] [target_country.GetLongName] вирішив відхилити нашу щедру пропозицію і відвернувся від нас. Таким чином, ми залишилися без їхньої підтримки, але йти проти волі Святого Престолу — це не те, що може бути без наслідків, і така образа не буде скоро забута."
  papal_conclave_events.5.a: "Будьте прокляті вони до пекла."
  papal_conclave_events.6.title: "Особлива Меса"
  papal_conclave_events.6.desc: "Поки Конклав зібрався для вирішення питання про наступного [ROOT.GetCountry.GetGovernment.GetRulerTitle], серед населення починають лунати занепокоєння. Нездатність Конклаву швидко визначитися з кандидатом і страх, що це затягнеться надовго без вирішення, починають викликати неспокій у серцях наших вірних, які без пастиря [ShowReligionName('catholic')] почуваються загубленими та без курсу. Була висунута пропозиція відслужити особливу месу в [ROOT.GetCountry.GetCapital.GetName], щоб заспокоїти ці занепокоєння та показати людям, що керівництво Святої Церкви все ще сильне."
  papal_conclave_events.6.a: "#italic Gloria in Excelsis Deo.#!"
  papal_conclave_events.6.b: "У нас є більш нагальні справи."
  papal_conclave_events.6.tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]. [pops|U] у нашій [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] отримають додаткові [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [pop_satisfaction]"
  papal_conclave_events.7.title: "Дискваліфікація кардинала"
  papal_conclave_events.7.desc: "Під час поточного Конклаву, що мав обрати наступного [ROOT.GetCountry.GetGovernment.GetRulerTitle], кардинали вже починали досягати згоди щодо того, кого обрати. Однак з'явилася нова інформація щодо улюбленого кандидата та його минулих надмірностей як у Церкві, так і поза нею. Були висунуті серйозні звинувачення, що стосувалися кількох вад, таких як розпуста, хтивість та інші аморальні практики.\n\nХоча ці минулі гріхи не заслуговують на відлучення, і незважаючи на те, що він з того часу належним чином покаявся та спокутував їх, його підтримка швидко зникла. Таким чином, Конклав ризикує знову розпочати свої обговорення з самого початку, затягуючи рішення ще довше."
  papal_conclave_events.7.a: "Він явно не придатний бути [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  papal_conclave_events.7.b: "Людині властиво помилятися."
  papal_conclave_events.8.title: "Священний птах"
  papal_conclave_events.8.desc: "Конклав зібрався, щоб обрати нового [ROOT.GetCountry.GetGovernment.GetRulerTitle], але його повільність починає нервувати людей. Серед цього надійшла звістка про таємниче спостереження в [ROOT.GetCountry.GetCapital.GetName]. Над найвищою вежею церкви там цілий день велично сидів птах, не рухаючись.\n\nТочна природа птаха обговорюється. Хоча можна було б подумати, що такі події зазвичай асоціюються з голубом, реальність така, що популярні описи птаха включають яструба, сову, качку, курку або навіть ворону. Незалежно від його точної природи, цей Священний птах, як його почали називати деякі, зібрав шанувальників по всьому місту, і люди часто приходили подивитися на нього.\n\nМи могли б використати його як символ Божої руки, що схвалює поточний Конклав, що, безумовно, заспокоїло б нервозність людей."
  papal_conclave_events.8.a: "Справді святе життя."
  papal_conclave_events.8.b: "Іноді птах — це просто птах."
  papal_conclave_events.9.title: "Плутанина з виборами"
  papal_conclave_events.9.desc: "Конклав має святий обов'язок, призначений Богом, обрати наступного [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Процедура зазвичай проходить без будь-яких серйозних інцидентів, хоча в деяких випадках труднощі в досягненні згоди можуть затягнути її на деякий час. Однак поточний Конклав пережив дуже незвичайну ситуацію. Незважаючи на те, що вибори не завершилися, по [ROOT.GetCountry.GetCapital.GetName] поширюються новини про те, що нового [ROOT.GetCountry.GetGovernment.GetRulerTitle] вже обрано, оскільки ім'я ймовірного нового [ROOT.GetCountry.GetGovernment.GetRulerTitle] вже циркулює серед населення.\n\nМи не знаємо джерела таких неправдивих новин, ані наміру, що стоїть за ними, але зрозуміло, що населення вводять в оману. Якщо не вирішити цю проблему, така плутанина може призвести не тільки до недовіри з боку нашого населення, але й до зниження авторитету та довіри до фактичного наступного [ROOT.GetCountry.GetGovernment.GetRulerTitle], коли його нарешті оберуть."
  papal_conclave_events.9.a: "Придушити ці неправдиві новини."
  papal_conclave_events.9.b: "Божа правда переможе диявольську брехню."
  papal_conclave_events.10.title: "Обраний кандидат відмовляється"
  papal_conclave_events.10.desc: "Процедура Конклаву завжди є важкою, і полегшення кардиналів, коли кандидата обрано, очевидне. Однак цього разу їхні обличчя швидко змінилися на огиду, коли голосування завершилося, а обраний кандидат мав нахабство відмовитися від посади.\n\nХоча кандидати мають право відмовитися від свого обрання, це зазвичай не застосовується, або принаймні вони мають пристойність і ввічливість висловити свої наміри до проведення голосування. Тепер Конклав змушений розпочати процедуру знову."
  papal_conclave_events.10.a: "Як можна відмовитися від Божого поклику?"
  papal_conclave_events.10.b: "Ми не можемо змусити його погодитися."
  papal_conclave_events.11.title: "Папський конклав завершено"
  papal_conclave_events.11.desc: "Папський конклав завершив обговорення щодо того, якого кардинала слід обрати новим [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Було три основні кандидати, але хто з них виграв вибори?"
  papal_conclave_events.11.a: "Кардинал [first_candidate.GetNameWithNoTooltip]"
  papal_conclave_events.11.b: "Кардинал [second_candidate.GetNameWithNoTooltip]"
  papal_conclave_events.11.c: "Кардинал [third_candidate.GetNameWithNoTooltip]"