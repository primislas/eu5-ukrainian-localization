l_english:
  lots_of_calvinists: "Багато [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у нашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e] тепер сповідують [ShowReligionName('calvinist')]."
  calvinist.1.title: "Потреба в реформі"
  calvinist.1.desc: "У священних залах Королівського колежу в Парижі лунало передчуття, коли [john_calvin.GetName], молодий і пристрасний вчений, готувався виголосити промову, яка мала залишити незгладимий слід у релігійному ландшафті Європи. Він і не підозрював, що його слова розпалять бурю суперечок, що зрештою призведе до його власного вигнання з міста, яке він колись називав домом.\n\nКоли потужна промова Кальвіна пролунала лекційною залою, його палкі переконання зіткнулися з усталеними доктринами Католицької Церкви. Його красномовні аргументи, пройняті баченням релігійної реформи, знайшли відгук у нетерплячої аудиторії та викликали занепокоєння серед істеблішменту.\n\nЗвістка про промову Кальвіна розлетілася, як лісова пожежа, досягнувши вух впливових діячів церковної ієрархії. Шановні вчені Королівського колежу були змушені засудити його як єретика, небезпечну загрозу встановленому порядку."
  calvinist.1.a: "Цьому немає місця в [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  calvinist.2.title: "[john_calvin.GetNameWithNoTooltip] у Базелі"
  calvinist.2.desc: "У тихих коридорах [ShowLocationName('basel')] з-під старанного пера [john_calvin.GetName] виходить новаторська праця. Її слова, ретельно вивірені та пройняті богословською проникливістю, призначені для того, щоб змінити релігійний ландшафт і розпалити вогонь реформ по всій Європі. Публікація #italic Institutio Christianae Religionis#! знаменує собою ключовий момент у житті Кальвіна та ширшого протестантського руху.\n\nНа сторінках цього вагомого тому міститься всебічний виклад релігійних переконань Кальвіна та його бачення реформи християнства. #italic Institutio Christianae Religionis#! втілює сутність вчення Кальвіна, пропонуючи систематичну основу для розуміння істинної природи віри, спасіння та стосунків між Богом і людством.\n\nЗвістка про публікацію розлітається, як лісова пожежа, захоплюючи уми вчених і релігійних лідерів по всій Європі. Католицька Церква, глибоко вкорінена у своїх традиційних доктринах, розглядає цю працю з побоюванням, визнаючи її грізним викликом своїй владі.\n\nMagnum opus Кальвіна потрапляє до рук як палких прихильників, так і затятих противників. Для одних вона стає маяком надії, що освітлює шлях до чистішого вираження християнської віри. Для інших вона представляє небезпечний відхід від усталеної ортодоксії, підпалювальний напад на самі основи Церкви."
  calvinist.2.a: "Які в нього були причини?"
  calvinist.3.title: "Служіння Кальвіна в Женеві"
  calvinist.3.desc: "У мальовничому місті [ShowLocationName('geneve')] настає нова ера релігійної ревності, коли [john_calvin.GetName] бере на себе мантію духовного лідерства. Його прибуття знаменує початок трансформаційного періоду, який сформує долю як міста, так і протестантської Реформації.\n\nКальвін, відомий своєю інтелектуальною майстерністю та непохитною відданістю реформам, приносить із собою бачення релігійного оновлення. Керуючись своєю вірою в приречення та суверенітет Бога, він прагне створити спільноту побожних віруючих, керованих біблійними принципами та дисциплінованим способом життя.\n\nКоли Кальвін бере на себе роль міністра, місто Женева стає горнилом для реформ, приваблюючи однодумців та тих, хто шукає притулку від релігійних переслідувань. Реформація пускає коріння, і місто стає бастіоном протестантської думки та практики.\n\nПід керівництвом Кальвіна встановлюється система церковного управління, зосереджена навколо Консисторії, ради, що складається з міністрів та старійшин. Ця рада забезпечує дотримання суворого морального кодексу Кальвіна, що призводить до трансформаційного впливу на всі аспекти повсякденного життя, від особистої поведінки до державної політики.\n\nЖенева стає центром богословської освіти та магнітом для початківців міністрів, які стікаються до міста, щоб навчатися у Кальвіна. Його впливові праці, такі як його «Настанови християнської релігії», слугують посібником для віруючих та планом протестантської теології.\n\nНаслідки служіння Кальвіна поширюються за межі Женеви, надихаючи реформаторські рухи по всій Європі. Його праці та вчення поширюються далеко й широко, набираючи обертів серед тих, хто шукає чистішого вираження віри."
  calvinist.3.a: "З багатьма проповідями про Второзаконня!"
  calvinist.4.title: "Кальвіністські думки в [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  calvinist.4.desc: "Вітри релігійної реформи віють над родючими землями [ROOT.GetCountry.GetLongName], оскільки потужні течії кальвіністських ідеалів проносяться його містами та селами. Зі скромних початків насіння кальвінізму пустило коріння, віщуючи глибокий зсув у релігійному ландшафті та соціальній структурі нації.\n\nКерована прагненням до чистішого вираження віри та відмовою від встановленого релігійного порядку, наша нація стала родючим ґрунтом для поширення кальвіністських ідей. Богословські вчення Кальвіна, зосереджені навколо приречення, суверенітету Бога та авторитету Писання, глибоко резонують із розчарованими віруючими, які шукають трансформаційного релігійного досвіду.\n\nКоли ці палкі ідеї вкорінюються, з'являються осередки віруючих, які таємно збираються, щоб обговорювати та вивчати праці Кальвіна, такі як його впливові «Настанови християнської релігії». Ці таємні зустрічі слугують розсадником для пристрасних дискусій, богословських дебатів та почуття спільноти серед тих, хто приймає кальвіністську доктрину.\n\nЗростаюча популярність кальвінізму становить глибокий виклик традиційному релігійному істеблішменту. Католицька Церква, глибоко вкорінена у багатовіковій догмі, стикається з грізним завданням узгодження своєї влади з запалом кальвіністського руху."
  calvinist.4.a: "Їх буде знищено!"
  calvinist.5.title: "Відправлення міністрів за кордон"
  calvinist.5.desc: "Багато хто в Церкні вважає, що ми, як провідна [ShowReligionName('calvinist')] нація, повинні відправляти наших міністрів за кордон, щоб забезпечити подальше поширення істинної Реформації."
  calvinist.5.a: "На славу Божу!"
  calvinist.sent_reformed_ministers: "Ми відправимо багато [ShowBuildingTypeName('calvinist_preachers')] до [target_country.GetLongName]"
  sent_reformed_ministers: "Відправлено кальвіністських проповідників"
  calvinist.5.b: "Тримати це в межах наших кордонів"
  calvinist.6.title: "Іноземні міністри в [ROOT.GetCountry.GetName]"
  calvinist.6.desc: "Надійшли повідомлення про те, що в [ROOT.GetCountry.GetName] з'явилися міністри, які проповідують кальвіністську віру. Вони, схоже, прибули з [from.GetLongName], щоб заохотити місцеве населення чинити опір і боротися проти наших спроб викорінити цю єресь."
  calvinist.6.a: "Обурення!"
  calvinist.7.title: "Приречення"
  calvinist.7.desc: "Кальвіністські богослови вірять, що лише ті, хто приречений на спасіння, можуть бути врятовані. Але оскільки неможливо знати, хто приречений, розвинулася думка, що можна розпізнати приречення людини, спостерігаючи за її способом життя. Оскільки важка праця, ощадливість, соціальний успіх і багатство вважаються важливими наслідками приречення, це, схоже, надихає послідовників кальвіністської віри прагнути до їх досягнення, а також приваблює тих, хто вже володіє ними – як міщан і купців."
  calvinist.7.a: "Заохочувати ці вірування"
  STATIC_MODIFIER_NAME_calvinist_work_ethic: "Кальвіністська трудова етика"
  STATIC_MODIFIER_DESC_calvinist_work_ethic: "Важка праця, суспільний успіх та багатство вважаються наслідками приреченості, і тому надихають людей досягати цих цілей."
  calvinist.7.b: "Залишити як є"
  calvinist.8.title: "Інструменти в церкві"
  calvinist.8.desc: "Провідні теологи дотримуються думки, що музика не повинна використовуватися під час релігійних проповідей. Вони вважають, що вона відволікає людей від важливого — поклоніння та пошуку знання про Бога — і тому виступають за заборону музичних інструментів у церквах."
  calvinist.8.a: "Видати заборону"
  calvinist.8.b: "Ігнорувати їхні думки"
  calvinist.9.title: "Іконоборча лють"
  calvinist.9.desc: "[ROOT.GetCountry.GetName] зазнало спалахів релігійного насильства, коли натовпи [ShowReligionName('calvinist')] послідовників руйнують церкви та знищують [ShowReligionName('catholic')] релігійне мистецтво. Католицька більшість у [ROOT.GetCountry.GetName] вимагає, щоб уряд негайно вжив заходів."
  calvinist.9.a: "Відправити війська, щоб зупинити це!"
  calvinist.9.b: "Заохочувати це!"