l_english:
  miaphysite_flavor.1.title: "Святе Серце [ROOT.GetCountry.GetName]"
  miaphysite_flavor.1.desc: "Колись Аксум був серцем стародавньої Аксумської імперії, оплотом християнської могутності, розташованим на перехресті Африки, Аравії та греко-римського світу. Серед обелісків і руїн палаців ми відбудували церкви цієї могутньої давньої нації.\n\nНайвеличнішою з них є Церква Діви Марії Сіонської. Це місце, де ми коронуємо наших імператорів, нащадків Менеліка I, сина царя Соломона та цариці Савської. Саме сюди він приніс Ковчег Завіту. Щороку тисячі паломників прибувають з найвіддаленіших куточків нашого [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] та з-за його меж, щоб відвідати це святе місце."
  miaphysite_flavor.1.a: "Ще раз Аксум засяє нескінченною Божою славою!"
  miaphysite_flavor.2.title: "Святе Серце [from.GetName]"
  miaphysite_flavor.2.desc: "Стародавнє місто Аксум безпечно спочиває в руках міафізитів. Колись воно було серцем стародавньої Аксумської імперії, оплотом християнської могутності, розташованим на перехресті Африки, Аравії та греко-римського світу. Серед обелісків і палаців [from.GetName] відбудовує церкви цієї могутньої давньої нації.\n\nНайвеличнішою з них є Церква Діви Марії Сіонської. Це місце, де коронували ефіопських імператорів, нащадків Менеліка I, сина царя Соломона та цариці Савської. Саме сюди він приніс Ковчег Завіту. Щороку тисячі паломників прибувають, щоб відвідати це святе місце."
  miaphysite_flavor.2.a: "Ще раз Аксум засяє нескінченною Божою славою!"
  miaphysite_flavor.3.title: "Перлина Середземномор'я"
  miaphysite_flavor.3.desc: "Радійте, святе місто Александрія знову під міафізитським правлінням! Історична кафедра нашої священної Церкви звільнена.\n\nАлександрія — стародавнє і горде місто, засноване Александром 'Великим', і багато найяскравіших умів людства називали її своїм домом. Протягом багатьох сотень років вчені Александрії навчалися і викладали у Великій Бібліотеці, за якою пішла Александрійська Катехитична Школа, перша у світі такого роду. У наступні роки ми відновимо священні зали знань і виховаємо одних з найкращих теологів, яких коли-небудь знав світ."
  miaphysite_flavor.3.a: "Боже, благослови Александрію!"
  miaphysite_flavor.4.title: "Перлина Середземномор'я"
  miaphysite_flavor.4.desc: "Радійте, святе місто Александрія знову під міафізитським правлінням! Історична кафедра нашої священної Церкви звільнена [from.GetName].\n\nАлександрія — стародавнє і горде місто, засноване Александром 'Великим', і багато найяскравіших умів людства називали її своїм домом. Протягом багатьох сотень років вчені Александрії навчалися і викладали у Великій Бібліотеці, за якою пішла Александрійська Катехитична Школа, перша у світі такого роду. У наступні роки її священні зали знань будуть відновлені і виховають одних з найкращих теологів, яких коли-небудь знав світ."
  miaphysite_flavor.4.a: "Боже, благослови Александрію!"
  miaphysite_flavor.5.title: "Серце Вірменії"
  miaphysite_flavor.5.desc: "Нарешті, ми знову вільні, і Єреван звільнений разом з нашим священним Ечміадзинським собором! Цей собор є притулком нашого народу, нашим безпечним прихистком у важкі часи. Протягом бездержавних років нашого народу Ечміадзин залишався нашим національним і політичним центром. Протягом століть війни та втрат ми знаходили силу та волю продовжувати боротьбу в її люблячих обіймах, і тепер ми нарешті можемо відплатити нашій матері, відновивши її колишню славу."
  miaphysite_flavor.5.a: "Ми знову зробимо Єреван великим!"
  miaphysite_flavor.6.title: "Серце Вірменії"
  miaphysite_flavor.6.desc: "Єреван звільнений нашою братньою міафізитською нацією [from.GetName]! На початку IV століття там був побудований священний Ечміадзинський собор. Протягом багатьох років собор був національним і політичним центром бездержавного вірменського народу. Протягом століть війни та втрат вони знаходили силу та волю продовжувати боротьбу в її люблячих обіймах. Тепер вона буде відновлена до своєї колишньої слави!"
  miaphysite_flavor.6.a: "Істинна віра стає все сильнішою!"
  miaphysite_flavor.7.title: "Колиска Християнства"
  miaphysite_flavor.7.desc: "Стародавнє місто Антіохія тепер є частиною нашого Святого [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName]! Антіохія була центром раннього християнства за часів римлян. Євреї, навернені тут апостолом Петром, були першими, кого назвали християнами. Велика кількість монастирів була заснована тут у той час. З того часу Антіохія бачила багато воєн і знала багато господарів. У XIII столітті місто впало до $mamluks$, і все його християнське населення було знищено мечем. На честь їхньої жертви ми відбудуємо Антіохію та її монастирі, зробивши її славнішою, ніж будь-коли!"
  miaphysite_flavor.7.a: "О Господи, благослови це місто, у милості Твоїй!"
  miaphysite_flavor.8.title: "Колиска Християнства"
  miaphysite_flavor.8.desc: "Стародавнє місто Антіохія тепер є частиною [from.GetAdjective] [from.GetGovernment.GetGovernmentType.GetName]! Антіохія була центром раннього християнства за часів римлян. Євреї, навернені тут апостолом Петром, були першими, кого назвали християнами. Велика кількість монастирів була заснована тут у той час. З того часу Антіохія бачила багато воєн і знала багато господарів. У XIII столітті місто впало до $mamluks$, і все його християнське населення було знищено мечем. На честь їхньої жертви Антіохія та її монастирі будуть відбудовані, зробивши її славнішою, ніж будь-коли!"
  miaphysite_flavor.8.a: "О Господи, благослови це місто, у милості Твоїй!"
  miaphysite_flavor.9.title: "На березі Нілу"
  miaphysite_flavor.9.desc: "Слава Господу! Каср-Ібрім наш! Багато років це велике християнське місто вистояло, хоч і було оточене релігійними ворогами з усіх боків. Розташований на скелі біля могутнього Нілу, Каср-Ібрім залишався бастіоном християнства в Нижній Нубії, навіть коли решта регіону поринула в темряву. Це нове надбання нашого [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] має не лише релігійне значення, адже воно також є центром торгівлі та політики. З цими ресурсами в наших руках, [ROOT.GetCountry.GetName] стане ще сильнішим!"
  miaphysite_flavor.9.a: "Це початок славетної епохи!"
  miaphysite_flavor.10.title: "На березі Нілу"
  miaphysite_flavor.10.desc: "Слава Господу! Каср-Ібрім належить міафізитському [from.GetGovernment.GetGovernmentType.GetName] [from.GetName]! Багато років це велике християнське місто вистояло, хоч і було оточене релігійними ворогами з усіх боків. Розташований на скелі біля могутнього Нілу, Каср-Ібрім залишався бастіоном християнства в Нижній Нубії, навіть коли решта регіону поринула в темряву. Тепер [from.GetName] використовуватиме великі політичні та економічні ресурси міста, щоб поширювати слово єдиного істинного Бога по всій Нубії!"
  miaphysite_flavor.10.a: "Це початок славетної епохи!"
  miaphysite_flavor.11.title: "Монастир Святого Антонія"
  miaphysite_flavor.11.desc: "Глибоко в горах Червоного моря, у прихованій оазі, лежить одне з наших найсвятіших місць – Монастир Святого Антонія. Збудований послідовниками Антонія у IV столітті, цей християнський монастир є одним із найстаріших у світі. Святий Антоній, найвидатніший з Отців Пустелі, відомий як Отець Монахів. Він вирушив у пустелю, де провів багато років як відлюдник, присвятивши своє життя Богові. Під час Великого Переслідування він повернувся до цивілізації, щоб втішити ув'язнених, ризикуючи своїм життям заради своїх побратимів-християн. Наприкінці свого життя він оселився біля оази, де сьогодні стоїть великий монастир. Тисячі паломників щороку йдуть стопами Антонія, і тепер, коли Ас-Сувейс перебуває під нашим захистом, ми можемо забезпечити їхнє безпечне прибуття до місця призначення."
  miaphysite_flavor.11.a: "Ми будемо вчитися у Святого Антонія."
  miaphysite_flavor.12.title: "Монастир Святого Антонія"
  miaphysite_flavor.12.desc: "Глибоко в горах Червоного моря, у прихованій оазі, лежить одне з наших найсвятіших місць – Монастир Святого Антонія. Збудований послідовниками Антонія у IV столітті, цей християнський монастир є одним із найстаріших у світі. Святий Антоній, найвидатніший з Отців Пустелі, відомий як Отець Монахів. Він вирушив у пустелю, де провів багато років як відлюдник, присвятивши своє життя Богові. Під час Великого Переслідування він повернувся до цивілізації, щоб втішити ув'язнених, ризикуючи своїм життям заради своїх побратимів-християн. Наприкінці свого життя він оселився біля оази, де сьогодні стоїть великий монастир. Тисячі паломників щороку йдуть стопами Антонія, і тепер, коли Ас-Сувейс перебуває під [from.GetAdjective] захистом, вони безпечно дістануться до місця призначення."
  miaphysite_flavor.12.a: "Ми будемо вчитися у Святого Антонія."
  miaphysite_flavor.13.title: "Свята Катерина Колеса"
  miaphysite_flavor.13.desc: "Біля підніжжя святої гори Синай, де Мойсей отримав Десять Заповідей, стоїть монастир, присвячений святій Катерині Александрійській. Катерина була відданою ученицею та послідовницею Христа. Коли римський імператор Максенцій почав переслідувати християн, смілива молода діва дорікнула йому за його жорстокість. Імператор зібрав п'ятдесят своїх найкращих філософів та ораторів, щоб дебатувати з нею, але мудра Катерина перемогла. Хоча її згодом ув'язнили та катували, Максенцій знову зазнав невдачі, оскільки багато його найближчих підданих були навернені красномовством та благочестям Катерини. У своїй люті імператор засудив Катерину до смерті на колесі, що ламало, але воно розбилося від її дотику. Зрештою, її обезголовили, хоча її мучеництво допомогло поширити світло Христа багатьом безбожним серцям."
  miaphysite_flavor.13.a: "Монастир Святої Катерини на Синаї тепер під нашим захистом."
  miaphysite_flavor.14.title: "Свята Катерина Колеса"
  miaphysite_flavor.14.desc: "Біля підніжжя святої гори Синай, де Мойсей отримав Десять Заповідей, стоїть монастир, присвячений святій Катерині Александрійській. Катерина була відданою ученицею та послідовницею Христа. Коли римський імператор Максенцій почав переслідувати християн, смілива молода діва дорікнула йому за його жорстокість. Імператор зібрав п'ятдесят своїх найкращих філософів та ораторів, щоб дебатувати з нею, але мудра Катерина перемогла. Хоча її згодом ув'язнили та катували, Максенцій знову зазнав невдачі, оскільки багато його найближчих підданих були навернені красномовством та благочестям Катерини. У своїй люті імператор засудив Катерину до смерті на колесі, що ламало, але воно розбилося від її дотику. Зрештою, її обезголовили, хоча її мучеництво допомогло поширити світло Христа багатьом безбожним серцям."
  miaphysite_flavor.14.a: "Монастир Святої Катерини на Синаї тепер під [from.GetAdjective] захистом."
  miaphysite_flavor.15.title: "Патріарх Африки"
  miaphysite_flavor.15.desc: "Хваліть Господа в цей найславетніший день! Протягом століть усі міафізити святкуватимуть цю дату на згадку про нашу велику перемогу. Нарешті ми звільнили нашого шанованого Патріарха, Папу Александрійського, з його позолоченої клітки в Каїрі! Більше нам не доведеться плазувати перед ворогами або чекати десятиліттями, щоб призначити нових єпископів. Це найважливіший крок на нашому шляху відновлення міафізитської Церкви до колишньої величі та за її межі."
  miaphysite_flavor.15.a: "Тепер нас ніщо не стримує!"
  miaphysite_flavor.16.title: "Патріарх Африки"
  miaphysite_flavor.16.desc: "Хваліть Господа в цей найславетніший день! Протягом століть усі міафізити святкуватимуть цю дату на згадку про велику перемогу. Нарешті наш шанований Патріарх, Папа Александрійський, був звільнений зі своєї позолоченої клітки в Каїрі [from.GetAdjective] [from.GetGovernment.GetGovernmentType.GetName]! Більше нам не доведеться плазувати перед ворогами або чекати десятиліттями, щоб призначити нових єпископів. Це найважливіший крок на шляху відновлення міафізитської Церкви до колишньої величі та за її межі."
  miaphysite_flavor.16.a: "Боже, благослови [from.GetGovernment.GetGovernmentType.GetName] [from.GetName]!"
  miaphysite_flavor.20.title: "Важливість вищої освіти"
  miaphysite_flavor.20.desc: "Монастирі нашого [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] славляться як центри навчання та мистецтва. У кожній монастирській школі проживає низка релігійних вчених, експертів у таких галузях, як історія Церкви, екзегеза Святого Письма, читання, граматика, поезія, музика, каліграфія та живопис. Монастирі змагаються за залучення найосвіченіших майстрів і утримують їх з великою пошаною та грошовою винагородою. Натомість вчені передають свої знання своїм учням, які складаються з потенційних священнослужителів, а також амбітних дворян. Щоб приєднатися до християнської еліти, бути частиною могутньої родини рідко буває достатньо – кожен, хто відіграє значну роль у керуванні нашою країною, здобув освіту в одній із найпрестижніших монастирських шкіл.\n\nДо нас звернулися дві з цих шкіл і просять нашої підтримки. Якщо ми вирішимо запропонувати своє покровительство, це може бути корисним для наукового розвитку нації."
  miaphysite_flavor.20.a: "Ми підтримаємо школу, що спеціалізується на адмініструванні."
  miaphysite_flavor.20.a.tt: "Інвестувати в монастирську школу з адміністративною спеціалізацією"
  miaphysite_flavor.20.b: "Найкраще інвестувати в дипломатичні справи."
  miaphysite_flavor.20.c: "Ці установи мають достатньо впливу. Можливо, вони повинні підтримувати нас?"
  miaphysite_flavor.30.title: "У пошуках душі"
  miaphysite_flavor.30.desc: "Кілька релігійних бесід тут, кілька вражаючих аргументів про мораль людини там, і один з наших найосвіченіших шляхтичів вирішив прийняти чернече життя. «Я піду стопами святого Шенуте Архімандрита – одного дня я, можливо, навіть засну свій власний монастир!» – пристрасно вигукує він.\nОднак не всі погоджуються з рішенням цього шляхтича, і хоча він уже почав роздавати своє майно, можливо, ще є час відмовити його від цього кроку."
  miaphysite_flavor.30.a: "Ми могли б використати цю пристрасть у деяких наших провінціях..."
  miaphysite_flavor.30.b: "Зачекайте! Ми маємо потребу в учених при дворі!"
  miaphysite_flavor.30.c: "Йому має бути дозволено знайти Бога."
  miaphysite_flavor.30.c.tt: "Шляхтич залишає двір, щоб прожити своє життя на самоті."
  miaphysite_flavor.31.title: "Білий монастир"
  miaphysite_flavor.31.desc: "[target_location.GetName] надіслав представників із проханням про ресурси та підтримку у відновленні відомого старого монастиря, який, як кажуть, був домом самого святого Шенуте Архімандрита. Фундаменти кам'яних стін були закладені понад тисячу років тому, і побожні віряни в цьому районі прагнуть лише одного – відновити будівлю до її колишньої слави. «З вашою допомогою вона знову стане центром вищої освіти та вивчення Святого Письма», – запевняють вони нас."
  miaphysite_flavor.31.a: "Нехай мають свої книги!"
  miaphysite_flavor.31.b: "Знання – це більше, ніж просто вченість."
  miaphysite_flavor.32.title: "Нова ера"
  miaphysite_flavor.32.desc: "Ми отримали звістку з [pious_province.GetName] про групу простолюдинів, які регулярно збираються в сільській місцевості. Схоже, вони є вірянами Господа. За словами наших кур'єрів, вони вже деякий час намагаються побудувати місце поклоніння, але збільшення коштів, ймовірно, прискорить проект."
  miaphysite_flavor.32.a: "Побожні будуть винагороджені! Побудуйте церкву!"
  miaphysite_flavor.32.b: "У нас є важливіші справи."
  miaphysite_flavor.33.title: "Союзники Віри"
  miaphysite_flavor.33.desc: "Ми пишаємося тим, що є міафізитами, послідовниками істинної віри. Однак, хоча ми тверді у своїх переконаннях і ніколи не відмовимося від Христа, ізоляція від решти християнської спільноти є слабкістю. Ми оточені релігійними ворогами на багатьох фронтах. Майбутня війна – це не питання «якщо», це питання «коли». Перш ніж вона спалахне, ми повинні спробувати знайти могутніх союзників. Далеко на півночі є могутнє християнське царство, але його точне місцезнаходження та відстань до їхніх земель нам невідомі. Однак ми можемо профінансувати експедицію з метою його пошуку."
  miaphysite_flavor.33.a: "Відправити загін наших найкращих дослідників, священиків та дипломатів!"
  miaphysite_flavor.33.a.tt: "Відправити експедицію на північ у пошуках побратимів-християн. Успіх не гарантований, але ми могли б знайти якусь допомогу щодо наших спільних релігійних ворогів."
  miaphysite_flavor.33.b: "Нам ніхто інший не потрібен, коли Бог на нашому боці."
  miaphysite_flavor.33.b.tt: "Експедиція не відправляється."
  miaphysite_flavor.34.title: "Книги чи мечі"
  miaphysite_flavor.34.desc: "Партія міафізитських дипломатів від нашого сусіда [sent_diplomats.GetName] перетнула наш кордон. Серед них надзвичайно багато священиків. Наші радники підозрюють, що вони намагаються встановити контакт з іншими християнами на півночі. Дипломати підозріло мовчазні щодо мети свого візиту. Можливо, це просто релігійна справа, але що, якщо вони намагаються зібрати союзників проти нас? Нас оточать фанатичні невірні з усіх боків!"
  miaphysite_flavor.34.a: "Це лише припущення. [sent_diplomats.GetAdjective] дипломати можуть пройти."
  miaphysite_flavor.34.b: "Ми не можемо ризикувати. Затримайте їх."
  opinion_captured_diplomats: "Захоплені дипломати"
  miaphysite_flavor.35.title: "Ворог Віри"
  miaphysite_flavor.35.desc: "До нас дійшли новини, що наші огидні сусіди, [muslim_neighbor.GetGovernment.GetGovernmentType.GetName] з [muslim_neighbor.GetName], взяли наших дипломатів у полон! Їх не вдалося переконати ні дозволити нашим людям продовжити подорож, ні повернути дипломатів додому. Ми можемо лише сподіватися, що вони передумають. У будь-якому випадку, цей обурливий напад на партію мирних посланців лише підтверджує наші підозри: [muslim_neighbor.GetName] є небезпечним ворогом єдиної істинної віри."
  miaphysite_flavor.35.a: "Нехай Бог вразить невірних!"
  miaphysite_flavor.36.title: "Брати з-за Моря"
  miaphysite_flavor.36.desc: "Іноді нам нагадують, наскільки далеко цей світ простягається за межі наших власних володінь. Нас відвідала дивна група людей із земель далеко на південь звідси. Хоча більшість з них розмовляють лише своєю особливою мовою, деякі з них спілкувалися з нашими перекладачами арабською. Вони стверджують, що походять з великої [sent_diplomats.GetGovernment.GetGovernmentType.GetName] з [sent_diplomats.GetName] і що вони шукають друзів серед своїх побратимів-християн. Ми дуже мало знаємо про християн на півдні, але ці [sent_diplomats.GetAdjectiveWithNoTooltip] чоловіки здаються справжніми віруючими. Вони говорять про Христа з запалом і, здається, набагато краще знають Писання, ніж наш середньостатистичний дворянин. Очевидно, їхня країна оточена релігійними ворогами, і вони просять нас допомогти їм у захисті істинної віри. Хоча цей конфлікт занадто далекий і невідомий, щоб ми могли безпосередньо втручатися, ми могли б поділитися з ними деякими нашими знаннями та ресурсами."
  miaphysite_flavor.36.a: "Звісно, ми допоможемо вам, брати. Все заради єдиного істинного Бога!"
  miaphysite_flavor.36.a.tt: "[sent_diplomats.GetAdjective] дипломати відправлені додому з деякими ресурсами, щоб допомогти їм у захисті християнства."
  miaphysite_flavor.36.b: "Це не наша справа. У нас є власні війни, щоб воювати."
  miaphysite_flavor.36.b.tt: "[sent_diplomats.GetAdjective] дипломати відправлені додому з порожніми руками."
  miaphysite_flavor.37.title: "Друзі в Чужих Краях"
  miaphysite_flavor.37.desc: "Хвала Господу, наші дипломати нарешті повернулися зі своєї подорожі на північ! Вони не тільки знову з нами, цілі й неушкоджені, але й привезли багато цікавих томів і оповідей зі своїх подорожей. Більшість походить з [faraway_catholic.GetGovernment.GetGovernmentType.GetName] з [faraway_catholic.GetName], де наших дипломатів дуже добре прийняли. Хоча ми могли б сподіватися на більше, ніж знання, ми вдячні за все, що Бог і наші побратими-християни надають нам. Ми подбаємо про те, щоб їхній дар не пропав даремно."
  miaphysite_flavor.37.a: "Можливо, це початок тривалої дружби між нашими народами?"
  miaphysite_flavor.38.title: "Наодинці у Світі"
  miaphysite_flavor.38.desc: "Після довгої та важкої подорожі дипломати, яких ми відправили на північ, нарешті повернулися. Вони справді досягли християнських земель врешті-решт, але повернулися з порожніми руками. Хоча багато християн, яких вони зустріли, слухали, мало хто, здавалося, справді переймався. У нашій ізоляції ми подвійно прокляті. Ми не тільки оточені ворогами, але й відстань до решти християнської спільноти робить нас вигнанцями. Те, що відбувається в [ROOT.GetCountry.GetName], не впливає на них, і, можливо, наші звичаї занадто чужі для них, щоб вони могли їх зрозуміти. Здається, міафізити самотні у світі."
  miaphysite_flavor.38.a: "Ми не можемо втрачати віру. Бог — єдиний союзник, який нам потрібен."