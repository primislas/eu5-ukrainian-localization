l_english:
  mysticism_vs_jurisprudence.1.title: "Поширення екстремальних практик у [spread_of_extreme_practices_province.GetNameWithNoTooltip]"
  mysticism_vs_jurisprudence.1.desc: "З'являються кілька нових форм [ShowReligionGroupAdjective('muslim')] містицизму, однією з найсуперечливіших є різновид суфійських дервішів, відомих як «відреченці». Ці люди прагнуть повністю відокремитися від нормального суспільства, голять все волосся на тілі аж до брів і публічно порушують правила $sharia$, щоб продемонструвати свої унікальні стосунки з [ROOT.GetCountry.GetReligion.GetGodName], блукаючи від міста до міста, випрошуючи милостиню. Наші релігійні вчені закликають до їхнього переслідування, стверджуючи, що схильність неосвіченого населення ставитися до них з благоговінням відведе людей від істинної віри."
  mysticism_vs_jurisprudence.1.a: "Вигнати їх з [spread_of_extreme_practices_province.GetNameWithNoTooltip]."
  mysticism_vs_jurisprudence.1.b: "$common_string_leave_them_be$"
  mysticism_vs_jurisprudence.2.title: "Повернення вчених"
  mysticism_vs_jurisprudence.2.desc: "Особливо після [GetCountry('MGE').GetAdjective] завоювань тринадцятого століття, [ShowRegionName('egypt_region')] та Сирія стали провідними центрами наукової освіти в [ShowReligionGroupAdjective('muslim')] світі. [ShowReligionAdjective('sunni')] вчені всіх переконань стікалися до [ShowLocationName('cairo')] та [ShowLocationName('damascus')], щоб навчатися у найвідоміших вчителів науки, теології та, перш за все, права; тим часом [ShowReligionAdjective('shia')] вчені подорожували до [ShowLocationName('sidon')] у [ShowProvinceDefinitionName('lebanon_province')], щоб зустрітися з вченими ортодоксального дванадцятирічного [ShowReligionNameWithNoTooltip('shia')]. Багато студентів з наших земель, завершивши своє освітнє паломництво, тепер повертаються додому, сподіваючись впровадити легалістичний [ShowReligionGroupNameWithNoTooltip('muslim')] у нашому [ROOT.GetCountry.GetFlavorRank] так, як вони навчилися цього в серці [ShowReligionGroupNameWithNoTooltip('muslim')]."
  mysticism_vs_jurisprudence.2.a: "Вони стануть бажаним доповненням до нашої країни."
  mysticism_vs_jurisprudence.2.b: "Контакт з божественним – це більше, ніж вивчення книг."
  mysticism_vs_jurisprudence.3.title: "Суфійські організації збирають підтримку"
  mysticism_vs_jurisprudence.3.desc: "Популярні форми суфійського поклоніння стають надзвичайно поширеними в усьому [ShowReligionGroupAdjective('muslim')] світі. Бачачи ослаблений стан наших армій, $rank_county_arabic_ruler_male$ великих суфійських орденів почали закликати своїх послідовників братися за зброю на нашу підтримку проти наших ворогів."
  mysticism_vs_jurisprudence.3.a: "Ми не можемо покладатися на містиків у підтримці!"
  mysticism_vs_jurisprudence.3.b: "Привітаймо цих воїнів віри."
  mysticism_vs_jurisprudence.4.title: "Релігійна гармонія"
  mysticism_vs_jurisprudence.4.desc: "Так само, як багато членів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розвинули суфійські нахили, багато наших суфійських орденів також почали вихваляти чесноту побожного життя, що відповідає $sharia$. Незважаючи на несхвальні голоси з обох крайнощів, нам вдалося знайти баланс між [ShowSocietyDirectionName('mysticism')] та [ShowSocietyDirectionName('jurisprudence')]. Наш [ROOT.GetCountry.GetFlavorRank] зараз насолоджується плодами поміркованості та толерантності до різних релігійних практик."
  mysticism_vs_jurisprudence.4.a: "[ROOT.GetCountry.GetReligion.GetGodName] добрий."
  mysticism_vs_jurisprudence.5.title: "Дебати щодо філософії Ібн Арабі"
  mysticism_vs_jurisprudence.5.desc: "Ібн Арабі був [ShowCultureName('andalusi')] вченим і містиком 12 століття, якого багато суфіїв вважали найвидатнішим духовним майстром. Його пантеїстична філософія «єдності буття» розглядала все творіння як прояв [ROOT.GetCountry.GetReligion.GetGodName] і запрошувала віруючих бачити божественну красу не лише в традиційних ритуалах [ShowReligionGroupName('muslim')], а й у всіх аспектах життя.\n\nВідтоді точилися дебати щодо сумісності його філософії з науковими інтерпретаціями [ShowReligionGroupNameWithNoTooltip('muslim')], причому деякі заходили так далеко, що називали його невіруючим. Для багатьох суфіїв, з іншого боку, філософія Ібн Арабі стала основоположним принципом їхньої релігійної практики. Тепер і нас просять стати на чийсь бік."
  mysticism_vs_jurisprudence.5.a: "Заперечити єдність буття."
  mysticism_vs_jurisprudence.5.b: "Підтримати єдність буття."
  mysticism_vs_jurisprudence.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('dhimmi_estate')] Обмеження на будівництво"
  mysticism_vs_jurisprudence.6.desc: "Згідно з [ShowReligionGroupAdjective('muslim')] Законом, не-[ShowReligionGroupAdjectiveWithNoTooltip('muslim')] мешканці стикаються з низкою обмежень на будівництво нових будівель у міських центрах; їхні будинки не повинні бути вищими за будинки [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] громади, і їм заборонено будувати нові центри поклоніння, лише підтримувати ті, що вже існували. На практиці ці правила часто не виконуються, але оскільки наш [ROOT.GetCountry.GetFlavorRank] все більше схиляється до легалістичної інтерпретації [ShowReligionGroupNameWithNoTooltip('muslim')], ключові члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] починають закликати до їх суворішого впровадження."
  mysticism_vs_jurisprudence.6.a: "Застосувати букву закону."
  mysticism_vs_jurisprudence.6.b: "Дозволити їм робити, що заманеться."
  mysticism_vs_jurisprudence.7.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('dhimmi_estate')] Ігнорують обмеження на будівництво"
  mysticism_vs_jurisprudence.7.desc: "Незважаючи на офіційну заборону на будівництво молитовних будинків та високих споруд, [ROOT.GetCountry.GetGovernment.GetEstateName('dhimmi_estate')] у кількох провінціях нашого [ROOT.GetCountry.GetFlavorRank] відкрито не підкоряються законам, і багато наших каді надто поблажливі, щоб реагувати, або тому, що не бачать у цьому шкоди, або через значні хабарі, які вони можуть отримати за закриття очей."
  mysticism_vs_jurisprudence.7.a: "Збільшити зусилля з правозастосування."
  mysticism_vs_jurisprudence.7.b: "Дозволити цим законам залишатися без виконання."
  mysticism_vs_jurisprudence.8.title: "Наказуючи Праведне та Забороняючи Неправедне"
  mysticism_vs_jurisprudence.8.desc: "[ShowReligionGroupAdjective('muslim')] вірних заохочують у $common_string_quran$ брати активну участь у своїй громаді, щоб «наказувати праведне та забороняти неправедне». Хоча ця заповідь була інтерпретована багатьма способами [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] вченими, реформістські групи іноді використовували її для виправдання примусового поширення більш екстремальних поглядів. Група харизматичних проповідників мечетей у [ROOT.GetCountry.GetCapital.GetName] почала закликати до припинення неортодоксальних релігійних практик та підбурює населення проти суфіїв, що призводить до насильства та вуличних боїв."
  mysticism_vs_jurisprudence.8.a: "Придушити рух."
  mysticism_vs_jurisprudence.8.b: "Запропонувати їм нашу підтримку."
  mysticism_vs_jurisprudence.9.title: "Дебати щодо суфійських практик"
  mysticism_vs_jurisprudence.9.desc: "[ShowReligionGroupAdjective('muslim')] вчені мають багато думок щодо дозволеності суфізму. Хоча більшість цінує підвищений рівень релігійної відданості, який він надихає серед загального населення, деякі не схвалюють, як певні суфії виражають свою віру. Поезія та пісні про вино та заборонене кохання, а також спільні танці та вшанування гробниць тих, кого вважають святими, іноді можуть викликати опір з боку більш жорстких елементів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  mysticism_vs_jurisprudence.9.a: "Підтримати прихильників жорсткої лінії."
  mysticism_vs_jurisprudence.9.b: "Підтримати поміркованих."
  mysticism_vs_jurisprudence.10.title: "Очищення податкового законодавства"
  mysticism_vs_jurisprudence.10.desc: "Забезпечення того, щоб закони [ROOT.GetCountry.GetFlavorRank] діяли відповідно до священної $sharia$, вимагає від нас час від часу переглядати наші практики збору податків та прагнути максимально узгодити їх з правовими позиціями великих законотворців нашої школи [ROOT.GetCountry.GetReligiousSchool.GetName]. Це означає усунення звичайних податків, які накопичилися за роки, та стягнення лише того, що дозволено $sharia$."
  mysticism_vs_jurisprudence.10.a: "Селянство має бути вільним від незаконних стягнень."
  mysticism_vs_jurisprudence.10.b: "Відхилити пропозицію."
  mysticism_vs_jurisprudence.11.title: "Містики та оповідачі"
  mysticism_vs_jurisprudence.11.desc: "Багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] поставив би під сумнів великий вплив оповідачів на життя простих людей. Традиційні героїчні історії нашого народу мають багатовікову історію, але вони ризикують створити культ із серйозно спотворених доль історичних постатей. Видатні священнослужителі в [storytellerprovince.GetName] зайняли рішучу позицію проти оповідачів [ROOT.GetCountry.GetFlavorRank] і застерігають, що релігійні вчені минулого попереджали, що нав'язливе слухання історій може призвести до хибного поклоніння."
  mysticism_vs_jurisprudence.11.a: "Ми повинні заборонити образливі історії в [ROOT.GetCountry.GetFlavorRank]."
  mysticism_vs_jurisprudence.11.b: "Немає нічого поганого в ідеалізації наших предків."
  mysticism_vs_jurisprudence.12.title: "Торгові гільдії та братства"
  mysticism_vs_jurisprudence.12.desc: "Гільдії та братства є постійним фактором у суспільному житті [ROOT.GetCountry.GetFlavorRank]. Багато в чому це невеликі громади всередині більшої громади, зі своїми власними правилами, звичаями та навіть законами. Також дуже поширено, що ці асоціації вдаються до містичних традицій, суфізму та часто неортодоксальної адаптації $sharia$, що іноді ускладнює проникнення законів [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] у міське середовище.\n\nРемісники в [fraternity_province.GetName] звернулися до держави, попереджаючи нас про місцевих гільдійців, які мають великий вплив на місцеві справи. Будь-хто, хто бажає зайнятися ремеслом у місті, наразі зобов'язаний отримати схвалення цих гільдій, а потім скласти присягу на вірність."
  mysticism_vs_jurisprudence.12.a: "Це неприйнятно."
  mysticism_vs_jurisprudence.12.b: "Не будемо втручатися в справи гільдій."
  mysticism_vs_jurisprudence.13.title: "Соціальне невдоволення та народний суфізм"
  mysticism_vs_jurisprudence.13.desc: "Великий акцент, який наш уряд зробив на [ShowSocietyDirectionName('jurisprudence')] та обмеження [ShowSocietyDirectionName('mysticism')] у нашому суспільстві, призвів до тісного асоціювання суфізму з опором центральній владі. У часи соціальних труднощів багато хто тепер звертається до Містичних орденів за духовним керівництвом як альтернативу високо Легалістичному [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] та його [ROOT.GetCountry.GetGovernment.GetAdjective] союзнику.\n\nОскільки напруга зростає в [popular_sufism_province.GetProvince.GetName], [master_char.GetName], місцевий суфійський Майстер з великим впливом, висловив свою підтримку [ROOT.GetCountry.GetGovernment.GetRulerTitle], потенційно заспокоюючи ситуацію."
  mysticism_vs_jurisprudence.13.a: "Немає потреби загравати з натовпом містиків."
  social_unrest_mysticism: "Соціальні заворушення"
  mysticism_vs_jurisprudence.13.b: "[ROOT.GetCountry.GetReligion.GetGodName] добрий."
  mysticism_vs_jurisprudence.14.title: "[ShowGoodsNameWithNoTooltip('coffee')] та [ShowGoodsNameWithNoTooltip('tobacco')]"
  mysticism_vs_jurisprudence.14.desc: "Хоча вони досить нові для нашого суспільства, вживання стимуляторів, таких як [ShowGoodsName('coffee')] та [ShowGoodsName('tobacco')], швидко поширилося, і кав'ярні тепер є звичним явищем від [ROOT.GetCountry.GetCapital.GetName] до [coffee_province.GetName]. Особливо помітна популярність серед суфійських орденів. Новизна цих речовин означає, що релігійний істеблішмент розділений щодо їх належного використання.\n\nБагато суворих законників хочуть, щоб ми обмежили їх використання, тоді як інші виступають за обережність, оскільки як [ShowGoodsNameWithNoTooltip('coffee')], так і [ShowGoodsNameWithNoTooltip('tobacco')] дуже популярні в нашій державі. Місцева влада в [coffee_province.GetNameWithNoTooltip] тепер звернулася до [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] з вимогою закрити місцеві кав'ярні, які, на їхню думку, стали місцями зустрічей дисидентів."
  mysticism_vs_jurisprudence.14.a: "Нав'яжемо обмеження."
  mysticism_vs_jurisprudence.14.b: "Нехай вони мають свою [ShowGoodsNameWithNoTooltip('coffee') |l]."
  mysticism_vs_jurisprudence.15.title: "Зростання популярності суфійських орденів у [new_province.GetNameWithNoTooltip]"
  mysticism_vs_jurisprudence.15.desc: "Деякі з найпоширеніших суфійських орденів у [ROOT.GetCountry.GetName] швидко почали утверджуватися в нещодавно придбаній [new_province.GetName]. Хоча місцеві жителі здаються дещо нерішучими щодо [ROOT.GetCountry.GetAdjectiveWithNoTooltip] правління, вони прийняли ордени, і це значно полегшило інтеграцію [new_province.GetRank.GetName] до нашого [ROOT.GetCountry.GetFlavorRank]."
  mysticism_vs_jurisprudence.15.a: "Натомість зміцнимо правовий істеблішмент."
  mysticism_vs_jurisprudence.15.b: "Це чудово."
  mysticism_vs_jurisprudence.16.title: "Нехтування $sharia$?"
  mysticism_vs_jurisprudence.16.desc: "Вчені [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] скаржаться на повсюдне ігнорування правил $sharia$ у нашому [ROOT.GetCountry.GetFlavorRank]. Вони вимагають, щоб ми зменшили вплив містичних орденів та гетеродоксії в країні. Невиконання може призвести до втрати їхньої підтримки, і багато з цих цінних правознавців можуть навіть покинути нас заради інших дворів."
  mysticism_vs_jurisprudence.16.a: "Дотримуймося їхніх рекомендацій."
  mysticism_vs_jurisprudence.16.b: "Ми не можемо піддаватися таким погрозам."
  mysticism_vs_jurisprudence.17.title: "Закінчення терміну дії будівельних обмежень"
  mysticism_vs_jurisprudence.17.desc: "Оскільки наш [ROOT.GetCountry.GetFlavorRank] втрачає свій запал до законницького [ShowReligionGroupName('muslim')], нам стає все важче знаходити та призначати каді, готових повністю впроваджувати наші офіційні обмеження на будівництво споруд [ROOT.GetCountry.GetGovernment.GetEstateName('dhimmi_estate')]. На даний момент закон просто став нездійсненним."
  mysticism_vs_jurisprudence.17.a: "Так само добре."
  mysticism_vs_jurisprudence.20.title: "Новий правитель"
  mysticism_vs_jurisprudence.20.desc: "Наша нація сильно страждала від браку твердої керівної руки під правлінням [target_heir.GetName], боязкої дитини, погано підготовленої до зустрічі з небезпеками світу. На щастя для всіх нас, один з найближчих радників [target_heir.GetHerHis] вирішив діяти. Дитина тепер у безпеці і не може більше завдати шкоди. Радника проголошено нашим новим правителем, і він присягнув забезпечити нашій нації сильне керівництво, якого вона так відчайдушно потребує."
  mysticism_vs_jurisprudence.20.a: "Нехай правління нашого нового володаря буде довгим і процвітаючим!"
  mysticism_vs_jurisprudence.21.title: "Перетворити [ShowWorkOfArtNameWithNoTooltip('hagia_sophia')] на мечеть"
  mysticism_vs_jurisprudence.21.desc: "[GetCountry('BYZ').GetAdjective] імператор Юстиніан I побудував [ShowWorkOfArtName('hagia_sophia')] у 532 році, обравши Ісидора Мілетського та Антемія з Тралл як її архітекторів. Церква була побудована з елліністичних колон з храму Артеміди в Ефесі, порфірового каменю з [ShowRegionName('egypt_region')], зеленого мармуру з [ShowProvinceDefinitionName('thessaly_province')], чорного каменю з [ShowLocationName('bosphorus')] та жовтого каменю з Сирії. Те, що [ShowReligionGroupAdjective('christian')] церква все ще використовується, не подобається людям, які бажають, щоб її перетворили на мечеть. Вона також потребує термінової реновації і повинна бути відремонтована, перш ніж її перетворять на мечеть."
  mysticism_vs_jurisprudence.21.a: "Відремонтувати та перетворити!"
  mysticism_vs_jurisprudence.21.b: "Залишити як є"
  mysticism_vs_jurisprudence.22.title: "П'ятничні молитви?"
  mysticism_vs_jurisprudence.22.desc: "Щотижнева спільна молитва була способом для [ShowReligionGroupAdjective('muslim')] правителів демонструвати свою легітимність протягом століть. За часів тривалого [ShowReligionAdjective('sunni')] домінування більшість п'ятничних молитов відбувалися в ім'я [ShowReligionAdjectiveWithNoTooltip('sunni')] $rank_empire_muslim_ruler_male$ або $rank_kingdom_muslim_ruler_male$ того часу. Однак це призвело до того, що статус таких молитов є дуже невизначеним у нашому [ShowReligionAdjective('shia')] [ROOT.GetCountry.GetFlavorRank].\n\nБільшість серед [ShowReligionAdjectiveWithNoTooltip('shia')] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] виступають проти практики спрямованих п'ятничних молитов, розглядаючи це як щось, що роблять лише [ShowReligionAdjectiveWithNoTooltip('sunni')] правителі, але є й ті, хто бачить у цьому роль способу об'єднання суспільства, як [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], так і [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  mysticism_vs_jurisprudence.22.a: "[target_ruler.GetNameWithNoTooltip] очолить п'ятничні молитви, і наша країна молитиметься."
  mysticism_vs_jurisprudence.22.b: "Нехай люди моляться, як хочуть."