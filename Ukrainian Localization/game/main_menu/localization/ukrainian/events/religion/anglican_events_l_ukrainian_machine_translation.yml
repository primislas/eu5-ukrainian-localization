l_english:
  anglican_events.1.title: "Виставлення Королівського Герба"
  anglican_events.1.desc: "Після руйнування та усунення папістських символів, англіканські церкви залишилися дещо позбавленими прикрас. Було постановлено, що замість цих богохульних ікон має бути виставлений Королівський Герб [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Присутність Королівського Герба закріплює у суспільній свідомості реальність нового порядку; що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] призначений Богом не лише як [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName], але й як Верховний Правитель Церкви."
  anglican_events.1.a: "Гордо виставляти Королівський Герб у кожній церкві."
  anglican_events.2.title: "Відступництво"
  anglican_events.2.desc: "Відвідування англіканських служб є обов'язковим у [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] [ROOT.GetCountry.GetName]. Відступництво карається суворими штрафами. Особа, визнана винною, повинна конфіскувати все своє майно та рухоме майно, свої землі, маєтки та спадкові володіння, а також усі свої ренти та ануїтети. Проте, виконання є складним через величезну кількість потенційних відступників, тому ми повинні зосередити наші зусилля на найбільш небезпечних правопорушниках.\n\nПапізм є особливо огидним злочином. Оскільки Папа заперечує легітимність [ROOT.GetCountry.GetGovernment.GetRulerTitle], так само повинні чинити й вірні католики, і тому всіх католиків можна вважати зрадниками держави.\n\nРадикальні нонконформісти, такі як пуритани, також можуть бути об'єктом цих законів, якщо вони надто відхиляться від встановлених доктрин Церкви.\n\nЗакон забезпечує єдність релігійних переконань у [ROOT.GetCountry.GetName], але він також може бути використаний для запобігання фракціоналізму при дворі. Сама лише підозра у відступництві може зруйнувати репутацію при дворі."
  anglican_events.2.a: "Переслідувати католиків."
  anglican_events.2.b: "Переслідувати пуритан."
  anglican_events.2.a.tt: "Усі [ShowReligionName('catholic')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  anglican_events.3.title: "Пророцтва та Проповіді"
  anglican_events.3.desc: "Англіканська Церква не вимагає від свого духовенства присвячувати багато часу проповідям. Щомісячна або навіть щоквартальна проповідь є достатньою згідно із законом, який зазвичай береться безпосередньо з Книги Гомілій.\n\nБагато парафіян бажають більш особистого та залученого підходу до релігійних служб і взяли справу у свої руки, об'єднавши кошти для оплати освічених лекторів, щоб ті проповідували в їхніх містах. Однак ці лектори не завжди мають найортодоксальніші богословські погляди. Часто буває так, що найзавзятіші проповідники — це ті, хто має найрадикальніші ідеї, і тому ці приватні проповіді стали асоціюватися з пуританським рухом.\n\nХоча є переваги у більш релігійно грамотного населення, придушення пуританства збільшило б авторитет Церкви."
  anglican_events.3.a: "Заборонити ці нонконформістські проповіді."
  anglican_events.3.b: "Дозволити їм проповідувати, як вони бажають."
  anglican_events.4.title: "Парламентські Дебати щодо Доктрини"
  anglican_events.4.desc: "[ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetGovernment.GetParliament.GetName] часто закликають обговорювати питання релігії. Зазвичай [ROOT.GetCountry.GetGovernment.GetRulerTitle] пропонує нову хвилю реформ для Англіканської Церкви, а [ROOT.GetCountry.GetGovernment.GetParliament.GetName] займає позицію відповідно до встановлених фракційних ліній; члени Палати громад більш схильні підтримувати радикальні або навіть пуританські заходи, лорди-світські особи більш схильні віддавати перевагу більш консервативному підходу. Рідко [ROOT.GetCountry.GetGovernment.GetRulerTitle] досягає [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] мети точно, і коли [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] це робить, часто застосовуються примусові заходи."
  anglican_events.4.a: "Прийняти реформи саме так, як запропонував [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  anglican_events.4.b: "Лорди перемагають."
  anglican_events.4.c: "Палата громад добивається свого."
  anglican_events.5.title: "Трактати Марпрелата"
  anglican_events.5.desc: "Невдоволені консервативним устроєм Англіканської Церкви, група пуритан, що писали під псевдонімом «Мартін Марпрелат», почала публікувати серію нищівних памфлетів, спрямованих проти церковного керівництва. Єпископи [ROOT.GetCountry.GetName], за словами цих авторів, є гордими, папістськими, самовпевненими, блюзнірськими, нікчемними, згубними та шкідливими прелатами, які узурпують владу від Бога.\n\nЦі трактати привернули увагу громадськості та ризикують висміяти Естаблішмент, якщо щось не буде зроблено з ними."
  anglican_events.5.a: "Ігнорувати цю нісенітницю."
  anglican_events.5.b: "Відповісти тим же, це війна памфлетів!"
  anglican_events.5.c: "Знайти та заарештувати авторів."
  anglican_events.6.title: "Повстання через Молитовник"
  anglican_events.6.desc: "Доктрини Англіканської Церкви містяться в Книзі Спільних Молитов. Це книга, яка потребує періодичних переглядів, щоб відповідати змінам в англіканській думці, оскільки вона коливається між більш радикальною та більш традиційною теологією. Останнє видання містить матеріал, який сильно розгнівав жителів [prayer_book_province.GetName], багато з яких все ще дотримуються католицьких догм і практик. Вони повстали, вимагаючи повернути Книгу до її попереднього видання."
  anglican_events.6.a: "Скасувати нове видання та піти на традиціоналістські поступки."
  anglican_events.6.b: "Ми не терпітимемо папістської зради!"
  anglican_events.7.title: "Крипто-[ShowReligionAdjectiveWithNoTooltip('catholic')] державний діяч"
  anglican_events.7.desc: "[ROOT.GetCountry.GetAdjective] Реформація не змогла схилити серця та уми всього населення. Багато хто продовжує плекати [ShowReligionAdjective('catholic')] симпатії, навіть серед [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Було виявлено, що [minister.GetName] таємно відвідував [ShowReligionAdjectiveWithNoTooltip('catholic')] месу, практику, суворо заборонену законом. Якщо його викриють, [minister.GetSheHe] втратить усі свої землі та майно і більше не матиме права обіймати державні посади."
  anglican_events.7.a: "Вони надто корисні, поки що."
  anglican_events.7.b: "Жодних [ShowReligionAdjectiveWithNoTooltip('catholic')] вірян у [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  anglican_events.7.c: "Геть [minister.GetHerHis] голову!"
  anglican_events.8.title: "Молитви до Святих"
  anglican_events.8.desc: "Коли [ROOT.GetCountry.GetName] розірвав стосунки з Римом, ми відмовилися від забобонного уявлення, що молитви слід спрямовувати до Святих, а не до Самого Бога. Оскільки наша нова теологія не має місця для папістської концепції Чистилища, немає потреби, щоб Святі заступалися за наші душі. Попри це, багато людей продовжують практику молитов до Святих, і багато церков надмірно шанують своїх покровителів."
  anglican_events.8.a: "Це нешкідливо, ми можемо це дозволити."
  anglican_events.8.b: "Одноманітність має бути забезпечена"
  anglican_events.9.title: "Скасування святкових днів"
  anglican_events.9.desc: "Католицький літургійний календар наповнений святковими днями, які функціонують як державні свята та нагоди для святкування. Більше не перебуваючи під папською владою, наша власна Церква повинна вирішити, наскільки ця практика повинна продовжуватися. Найбільш ревні реформатори стверджують, що зайві свята заохочують гріховні спокуси та відволікають від прибуткової праці. Це зустріло широку згоду з точки зору теології, але скасування святкових днів, ймовірно, засмутить населення, яке так любить випадковий вихідний."
  anglican_events.9.a: "Скасувати більше святкових днів."
  anglican_events.9.b: "Нехай вони розважаються."
  anglican_events.10.title: "Пуритани відправляються до колоній"
  anglican_events.10.desc: "Пуритани вже деякий час критикують ієрархію та доктрини Церкви [ROOT.GetCountry.GetName]. Реформація, на їхній погляд, лише замінила Папу на [ROOT.GetCountry.GetGovernment.GetRulerTitle], і вони відкрито засуджують ліниве ставлення держави до реформ. Окрім теологічних суперечок, пуритани також зазнавали переслідувань як нонконформісти, залежно від схильностей поточного [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Нарешті виснажені релігійними справами Європи, багато пуритан вирішили мігрувати до Нового Світу. Вони організувалися в колоніальну компанію та запросили хартію для заснування нових поселень в Америці."
  anglican_events.10.a: "Дозволити їм збудувати власне поселення."
  anglican_events.10.b: "Інтегрувати їх у вже існуючу колонію."
  anglican_events.11.title: "Суперечка щодо облачень"
  anglican_events.11.desc: "Питання церковних облачень залишається спірним в Англіканській Церкві. Екстравагантні та забобонні лахміття папістів, безперечно, мають бути скасовані, але ступінь суворості, що вимагається від духовенства, продовжує розпалювати дебати та протести.\n\nКонсервативні англікани бажають відновити деякі з вишуканих атрибутів старого католицького священства, тоді як помірковані стверджують, що простої стихарі достатньо. Радикальні реформатори наполягають, що облачення не лише не мають біблійної підтримки, але й спотворюють та псують постанови, які встановив Бог."
  anglican_events.11.a: "Дозволити традиційні облачення."
  anglican_vestments_tt: "Це збільшить попит на [ShowGoodsName('fine_cloth')] з боку нашого [ShowPopTypeName('clergy')]"
  anglican_events.11.b: "Лише стихарі."
  anglican_events.11.c: "Засудити всі облачення."
  anglican_events.12.title: "Розбиття вівтарів"
  anglican_events.12.desc: "Ранні роки Англійської Реформації – це час палкої іконоборства. Будь-яка прикраса чи реліквія, що хоч натякає на папізм, існування Чистилища чи божественність святих, нещадно вилучається з церков. Усе, що може ввести мирян в оману, має бути знищено; вівтарі розбиваються, картини замальовуються, святині руйнуються.\n\nПостійною проблемою для нової Англіканської Церкви є питання, наскільки далеко має зайти це іконоборство. Деякі більш радикальні реформатори наполягають на припиненні використання розп'ять, свічників та хрестів, тоді як інші прагнуть відновлення деяких більш нешкідливих прикрас."
  anglican_events.12.a: "Розбити вівтарі та ув'язнити папістських протестувальників!"
  anglican_events.12.a.tt: "Усі [ShowReligionName('catholic')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  anglican_events.12.b: "Знищити лише те, що безперечно є папістським."
  anglican_events.12.b.tt: "Усі [ShowReligionName('catholic')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  anglican_events.12.c: "Покласти край цьому іконоборству."
  anglican_events.13.title: "Католицькі підбурювачі"
  anglican_events.13.desc: "Хоча [ROOT.GetCountry.GetName] формально відокремилася від Риму, Папа продовжує втручатися в наші справи, організовуючи змови проти [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Єзуїти та священики є серед його агентів, яких переховують зрадницькі рекузанти.\n\nЦі крипто-католики використовують хитрі методи приховування папістських агентів від закону, підступно будуючи таємні схованки за стінами, під підлогою і навіть у прихованих підземних переходах. Переховування в цих «священицьких норах» може травмувати або навіть задушити їхніх мешканців, тому вони принаймні навряд чи зможуть швидко втекти, якщо їх знайдуть."
  anglican_events.13.a: "Провести національне полювання на священиків. Обшукати кожен будинок!"
  anglican_events.13.b: "Дізнатися, звідки вони приходять"
  anglican_events.15.title: "Монарх-нонконформіст"
  anglican_events.15.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] опинився в незавидному становищі, будучи одночасно релігійним нонконформістом і Верховним Правителем Церкви [ROOT.GetCountry.GetName]. Англіканці [ROOT.GetCountry.GetName] насилу терплять такий стан справ, і легітимність Церкви різко ослаблена."
  anglican_events.15.a: "Це буде важке пристосування."
  anglican_events.15.b: "Монарх має бути англіканцем."