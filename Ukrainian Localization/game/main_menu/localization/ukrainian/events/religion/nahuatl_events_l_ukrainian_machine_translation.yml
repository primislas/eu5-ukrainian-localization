l_english:
  nahuatl_events.1.title: "Погані знамення"
  nahuatl_events.1.desc: "Після інтенсивного вивчення небес та відповідних календарів, наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] погоджуються, що все вказує на суворі та тривожні часи попереду. Оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] однаково готуються до того, що має статися, багато хто спробує врятувати себе від лихих часів, проливши трохи власної крові."
  nahuatl_events.1.a: "Ye ica otopan tlamaceuhque."
  nahuatl_events.1.a.tt: "[target_character.GetName] пожертвує частиною [target_character.GetHerHis] власної крові богам"
  nahuatl_events.1.b: "$common_string_the_end_is_nigh$"
  nahuatl_events.2.title: "Дорогоцінний Син"
  nahuatl_events.2.desc: "До нас дійшла звістка про народження виняткової дитини в [ROOT.GetCountry.GetCapital.GetName]. Після майже двох днів пологів, хлопчик народився від жінки з [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], але астрологи та інші віщуни погоджуються, що йому судилося велич. За традицією, його мати незабаром принесе його до будинку молоді, щоб представити тим, хто пізніше займатиметься його військовою освітою від статевого дозрівання до віку шлюбу."
  nahuatl_events.2.a: "Тельпочкаллі зробить з нього чудового воїна."
  nahuatl_events.2.a.tt: "Дитина буде виховуватися в Тельпочкаллі"
  nahuatl_events.2.b: "Спробувати влаштувати його до Кальмекаку"
  nahuatl_events.2.b.tt: "Дитина буде виховуватися в Кальмекаку, що збільшить її потенціал, але люди помітять порушення традиції"
  nahuatl_events.3.title: "Війна – твій пустеля, твоє завдання"
  nahuatl_events.3.desc: "Молодий хлопчик, що народився під такими сприятливими зірками 16 років тому, досяг повноліття, і настав час йому йти в бій. Як і від інших хлопчиків його віку, від нього очікується, що він незабаром принесе своїх перших полонених, що ознаменує початок його кар'єри воїна.\n\nЯкщо хтось із хлопчиків не зможе взяти полоненого, вони назавжди будуть позначені як непридатні для воїнів і муситимуть продовжувати свої дні як люди незначної важливості."
  nahuatl_events.3.a: "Знамення сприяють цьому чоловікові, безсумнівно, він добре впорається."
  nahuatl_events.3.a.tt: "Воїн відправляється на війну, щоб бути випробуваним"
  nahuatl_events.3.b: "Давайте пожертвуємо частиною нашої крові, щоб допомогти йому."
  nahuatl_events.3.b.tt: "Пролити частину крові [ROOT.GetCountry.GetGovernment.GetRulerTitle], це, безсумнівно, допоможе нашому воїну, але якщо воїн буде переможений, репутація нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] постраждає"
  nahuatl_events.4.title: "Твій дім не тут, бо ти Орел, Ягуар"
  nahuatl_events.4.desc: "Підтверджуючи всі знаки, молодий воїн, народжений багато років тому, вже перевершив усі очікування. За кожної нагоди він брав полонених і приносив велику славу собі та своєму дому. З часом він, безсумнівно, досягне найбільших почестей, які може дарувати життя, проведене в битвах."
  nahuatl_events.4.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  nahuatl_events.4.b: "[ROOT.GetCountry.Custom('common_string_positive')]"
  nahuatl_events.5.title: "Ти заслуговуєш на смерть від обсидіанового ножа."
  nahuatl_events.5.desc: "Незважаючи на дуже сприятливі знамення, здається, молодий воїн, народжений багато років тому, був захоплений ворогом. Незабаром він зустріне свою долю біля жертовного каменю в їхній столиці. Хоча це почесна смерть, розчарування його дому велике."
  nahuatl_events.5.a: "Гідна смерть!"
  nahuatl_events.6.title: "Ти даси пити, поживу, їжу Сонцю."
  nahuatl_events.6.desc: "Попри сприятливі знамення, молодий воїн, народжений багато років тому, загинув на полі бою. Він ніколи не стане великим воїном, і його серце та кров не будуть принесені в жертву богам."
  nahuatl_events.6.a: "Нещаслива смерть."
  nahuatl_events.6.b: "$nahuatl_events.6.a$"
  nahuatl_events.7.title: "Твій дім не тут..."
  nahuatl_events.7.desc: "Попри дуже сприятливі знамення, молодий хлопець, народжений багато років тому, виявився розчаруванням для себе та свого дому. Перед обличчям битви він виявився боягузом, залишаючись позаду і не зробивши жодного захоплення, попри численні можливості. Після повернення до свого воїнського дому йому обстрижуть волосся в тонзуру, і він назавжди буде відомий як невдаха-воїн."
  nahuatl_events.7.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nahuatl_events.7.b: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nahuatl_events.8.title: "Добрі знамення"
  nahuatl_events.8.desc: "Після інтенсивного вивчення зірок, відповідних календарів та інших знаків, відомих нашому [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], їм стало зрозуміло, що попереду добрі часи. Оскільки знищення світу не може бути неминучим, багато наших підданих тепер можуть трохи легше відпочити, знаючи, що їхні жертви були добре прийняті."
  nahuatl_events.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  nahuatl_events.9.title: "[target_character.GetNameWithNoTooltip] хизується [target_character.GetHerHis] багатством"
  nahuatl_events.9.desc: "Один з майстерних ремісників, яких часто наймаємо ми та інші заможні люди в нашому суспільстві, спробував піднятися над [target_character.GetHerHis] соціальним статусом. Як [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], [target_character.GetSheHe] очікується провести лише скромне святкування, коли народжується дитина, проте після народження [target_character.GetHerHis] сина минулого місяця він влаштував бенкет, гідний принаймні незначного члена [GetEsateName('nobles_estate')]. Хоча для членів [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] не є неправильним набувати багатство, хизування ним таким чином є великою образою для [ROOT.GetCountry.GetReligion.GetGodName] та наших традицій."
  nahuatl_events.9.a: "Це образа [ROOT.GetCountry.GetReligion.GetGodName]. [target_character.GetSheHe|U] має померти."
  nahuatl_events.9.b: "[target_character.GetHerHis|U] робота занадто важлива, щоб [target_character.GetHerHim] помер."
  nahuatl_events.10.title: "Інцидент під час Нємонтемі"
  nahuatl_events.10.desc: "Член однієї з наших найвидатніших родин серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] був знайдений п'яним на вулиці сьогодні. Це не тільки жахлива образа [ROOT.GetCountry.GetReligion.GetGodName], карана задушенням, але це сталося під час Нємонтемі, коли будь-які порушення миру суворо заборонені."
  nahuatl_events.10.a: "[target_char.GetSheHe|U] має померти."
  nahuatl_events.10.b: "Наша потреба в [target_char.GetHerHim] занадто велика."
  nahuatl_events.11.title: "Мандрівний чаклун"
  nahuatl_events.11.desc: "Ми отримали звістку з однієї з наших провінцій, що чоловік, який стверджує, що має магічні сили, поширює там страх і злі чутки. Місцеві лідери впевнені, що це лише шарлатан, з яким вони можуть впоратися, але багато хто серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] схильний до його впливу."
  nahuatl_events.11.a: "Надіслати емісара, щоб спіймати його."
  nahuatl_events.11.a.tt: "Полювання на чаклуна починається"
  STATIC_MODIFIER_NAME_nahuatl_sorcerer: "Сільський чаклун"
  STATIC_MODIFIER_DESC_nahuatl_sorcerer: "Кажуть, що чаклун тероризує сільську місцевість у цьому місці."
  nahuatl_events.11.b: "Нехай місцева влада розбереться з ним."
  nahuatl_events.12.title: "Чаклун зникає"
  nahuatl_events.12.desc: "Проблема з чаклуном, що поширював страх у наших землях, здається, зникла. Його так і не спіймали, але оскільки чоловіка не бачили вже багато тижнів, його поганий вплив ослаб."
  nahuatl_events.12.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nahuatl_events.13.title: "Чаклуна спіймано"
  nahuatl_events.13.desc: "Чаклуна, що поширював страх у наших землях, спіймано. Традиційним покаранням для такого чоловіка було б обстригти йому волосся, позбавивши його магічних сил. Однак, оскільки цьому чоловікові вдалося завдати набагато більше шкоди, ніж звичайному сільському чаклуну, можливо, було б краще негайно покарати його смертю, щоб умиротворити [ROOT.GetCountry.GetReligion.GetGodName] і людей."
  nahuatl_events.13.a: "Обстригти йому волосся!"
  nahuatl_events.13.b: "Вбити його!"
  nahuatl_events.14.title: "Тлакатеколотль"
  nahuatl_events.14.desc: "До нас дійшли новини, що покарання чаклуна, який спричинив стільки заворушень у наших землях, пішло не зовсім за планом. Ніхто з причетних не залишився, щоб розповісти історію, але поширюється чутка, що чоловік був справжнім Тлакатеколотлем і що сова була помічена, коли вилітала з його камери. Незалежно від того, чи перетворився він на сову, чи ні, весь інцидент спричинив поширення диких чуток по всій нашій країні."
  nahuatl_events.14.a: "$common_string_the_end_is_nigh$"
  nahuatl_events.15.title: "Сільський чаклун повертається"
  nahuatl_events.15.desc: "Здається, чаклун, який одного разу втік від нас, тепер повернувся. Місцева влада наполягає, що чоловік поширює хвороби та робить зловісні передбачення, і його необхідно зупинити."
  nahuatl_events.15.a: "Надіслати емісара, щоб спіймати його."
  nahuatl_events.15.b: "Дозволити місцевій владі розібратися з ним."
  nahuatl_events.16.title: "Сіуатетео"
  nahuatl_events.16.desc: "На нас спіткало велике лихо. Цього ранку [target_character.GetName] зникла. Один зі слуг дитини наполягає, що винуватцем була Сіуатеотль, схожа на жінку, яка нещодавно померла під час пологів неподалік. Те, що така темна істота змогла викрасти нашого [ROOT.GetCountry.GetGovernment.GetHeirTitle] посеред ночі, безсумнівно, є знаком того, що кінець світу наближається."
  nahuatl_events.16.a: "Ми повинні зробити все можливе, щоб умиротворити Тескатліпоку та Тласольтеотль."
  nahuatl_events.16.b: "Покарати слугу за поширення брехні."
  nahuatl_events.17.title: "Хвороба нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  nahuatl_events.17.desc: "[target_character.GetName] захворів і має високу температуру. Лікарі, що були присутні, рекомендували низку настоїв з коріння та кукурудзяних зерен."
  nahuatl_events.17.a: "Погодитися і сподіватися на краще."
  nahuatl_events.17.b: "Ми повинні провести великі жертвоприношення, щоб умиротворити [ROOT.GetCountry.GetReligion.GetGodName]."
  nahuatl_extra_sacrifice: "Вимагані жертвоприношення"
  nahuatl_events.18.title: "Ольямаліцтлі"
  nahuatl_events.18.desc: "Під час перебування у [target_character.GetHerHis] будинку юності [target_character.GetName] став досить вправним у традиційній грі в м'яч Ольямаліцтлі, але, ставши дорослим, [target_character.GetSheHe] довелося відмовитися від цієї звички. Однак, оскільки гра проводиться в різних районах [ROOT.Capital.GetName], [target_character.GetSheHe] часто бачать як глядача на різних майданчиках біля храмів або ринків навіть у дорослому віці. Ця звичка також повинна поширюватися на участь у диких ставках, які часто асоціюються з грою, оскільки [target_character.GetNameWithNoTooltip] прийшов до вас сьогодні, просячи допомоги у сплаті [target_character.GetHerHis] боргів."
  nahuatl_events.18.a: "Допомогти [target_character.GetHerHim]."
  nahuatl_events.18.b: "Заборонити [target_character.GetHerHim] брати участь знову."
  nahuatl_events.19.title: "Вкрадений в'язень"
  nahuatl_events.19.desc: "Битви між воїнами завжди є індивідуальними справами, і буває важко точно відстежити, коли і як був взятий кожен в'язень. Нещодавно деякі воїни спостерігали, як один з наших найдосвідченіших бійців потайки втік із полоненим іншого воїна. Якщо в'язня було вкрадено, то це одне з найтяжчих злочинів для воїна, що карається лише смертю. Що ще гірше, багато хто підозрює, що викрадач навмисно передав свого в'язня своєму товаришеві."
  nahuatl_events.19.a: "Вбити обвинуваченого."
  nahuatl_events.19.b: "Вбити їх обох."
  nahuatl_events.19.c: "Помилувати воїнів."
  nahuatl_events.20.title: "Тлакашипеуаліцтлі – Свято здирання шкіри з людей"
  nahuatl_events.20.common: "З наближенням весняного рівнодення та сезону посіву настає час Тлакашипеуаліцтлі. Настав час принести в жертву всіх військовополонених у храмі Шипе Тотек. Їхня кров нагодує [ROOT.GetCountry.GetReligion.GetGodName], а їхні шкіри носитимуть їхні викрадачі та жерці храму, перш ніж їх збережуть у священній печері."
  nahuatl_events.20.desc: "$nahuatl_events.20.common$\n\nДоля нагородила нас багатьма полоненими, і цього разу фестиваль триватиме багато днів. Багато крові буде пролито на честь [ROOT.GetCountry.GetReligion.GetGodName]."
  nahuatl_events.20.a: "Принести в жертву полонених."
  nahuatl_events.20.b: "Провести ще грандіозніший фестиваль, вимагаючи додаткових полонених від наших підданих."
  nahuatl_events.21.title: "Гладіаторський камінь"
  nahuatl_events.21.desc: "В рамках грандіозного фестивалю Тлакашипеуаліцтлі цього року найвидатніші серед захоплених воїнів будуть битися проти чотирьох наших найкращих [ShowUnitDefinitionName('a_eagle_warrior')] та [ShowUnitDefinitionName('a_jaguar_warrior')], будучи прив'язаними до жертовного каменю та озброєними лише імітацією макуавітля, палицею з пір'ям замість обсидіанових лез. У малоймовірному випадку, якщо полонений виживе після зустрічі зі своїми першими чотирма супротивниками, він зіткнеться з останнім, ліворуким, бійцем. Окрім втіхи [ROOT.GetCountry.GetReligion.GetGodName], ця церемонія надзвичайно популярна і, ймовірно, привабить велику кількість глядачів."
  nahuatl_events.21.nothing: "Нічого значного не відбувається!"
  nahuatl_events.21.uncoop: "Буде непокірний воїн, що збільшить [Concept('doom', 'CONCEPT_PLACEHOLDER')|e]."
  nahuatl_events.21.spectactle: "Велике видовище, що зменшує [Concept('doom', 'CONCEPT_PLACEHOLDER')|e]."
  nahuatl_events.21.a: "Нехай бій почнеться."
  nahuatl_events.21.b: "Давайте дотримуватися скромнішого святкування."
  nahuatl_events.22.title: "Непокірний воїн"
  nahuatl_events.22.desc: "Незважаючи на ретельні приготування, полонений воїн, який мав битися сьогодні біля гладіаторського каменю, виявився менш ніж поступливим. Хоча храмовий комплекс був переповнений глядачами, чоловік відмовився битися і був швидко вбитий своїм першим супротивником. Це кинуло довгу тінь на все цьогорічне святкування, і дехто розглядає це як поганий знак."
  nahuatl_events.22.a: "Так сонце дає пити."
  nahuatl_events.23.title: "Велике видовище."
  nahuatl_events.23.desc: "Битва між нашими чотирма чемпіонами та полоненим воїном перевершила всі очікування. Полонений не тільки вижив у перших чотирьох сутичках, але й майже здавалося, що він міг би мати шанс перемогти останнього, ліворукого, супротивника, з яким він потім зіткнувся.\n\nЯк це заведено, після того, як полонений воїн був остаточно переможений, його серце було принесено в жертву [ROOT.GetCountry.GetReligion.GetGodName], тоді як його плоть була віддана родині викрадача для споживання, а його шкіру сам викрадач носитиме багато днів.\n\nСвяткування цьогорічного Тлакашипеуаліцтлі, ймовірно, запам'ятаються на роки вперед."
  nahuatl_events.23.a: "$nahuatl_events.22.a$"
  nahuatl_events.24.title: "Кінець святкувань"
  nahuatl_events.24.desc: "Свято Здирання Шкіри з Людей завершилося, і з ним починається новий сезон посівів. Цьогорічні пишні святкування, ймовірно, запам'ятаються надовго."
  nahuatl_events.24.a: "$nahuatl_events.22.a$"
  nahuatl_events.25.title: "$nahuatl_events.20.title$"
  nahuatl_events.25.desc: "$nahuatl_events.20.common$\n\nОднак, оскільки ми не вели жодних війн останнім часом, у нас гостра нестача полонених для жертвоприношень. Це саме по собі є поганим знаком, і ситуація, ймовірно, лише погіршиться, якщо ми не зможемо пролити більше крові сьогодні."
  nahuatl_events.25.a: "Мусимо обійтися тими полоненими, що маємо."
  nahuatl_events.25.b: "Нехай наші підлеглі держави нададуть полонених."
  nahuatl_events.28.title: "Великий [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip] Поет"
  nahuatl_events.28.desc: "Вимовлене слово завжди мало особливе значення для нашого народу, пісні та декламації займають чільне місце в усіх наших релігійних та світських церемоніях, і навіть нашого найвищого лідера називають [ROOT.GetCountry.GetGovernment.GetRulerTitle], промовцем. Усна поезія є однією з найсвященніших форм мистецтва та одним з небагатьох прийнятних способів, у який людина може висловити невдоволення, тривогу і навіть сумнів щодо самої долі, не гніваючи [ROOT.GetCountry.GetReligion.GetGodName].\n\nНещодавно надзвичайно популярний [ROOT.GetCountry.GetCulture.GetName] поет прибув до [ROOT.GetCountry.GetCapital.GetName], вихваляючи наше місто та його мешканців, але критикуючи [target_character.GetName] [target_character.GetHerselfHimself]."
  nahuatl_events.28.a: "[target_artist.GetSheHe|U] догоджає [ROOT.GetCountry.GetReligion.GetGodName] та народу."
  nahuatl_events.28.b: "[target_artist.GetSheHe|U] не можна дозволити залишитися."
  nahuatl_events.29.title: "Розширення Головного Храму [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  nahuatl_events.29.desc: "Головний храм нашої столиці є основним символом нашого правління та зв'язку, який ми маємо з [ROOT.GetCountry.GetReligion.GetGodName]. Саме тут здійснюватимуться всі головні жертвоприношення під час численних свят року, і він є головною ціллю для будь-якого ворога-загарбника. Для [ROOT.GetCountry.GetGovernment.GetRulerTitle] це обов'язок — підтримувати та розширювати храм, коли це можливо."
  nahuatl_events.29.a: "Здійснити амбітне розширення Піраміди."
  nahuatl_events.29.b: "Час додати ще один шар до Піраміди."
  nahuatl_events.29.c: "Скромні покращення, це все, що ми можемо собі дозволити."
  nahuatl_events.29.d: "Ми не можемо дозволити собі багато чого на цей час."
  religious_focus_gain_tt: "Доки модифікатор [ShowModifier('nahuatl_temple_expansion_modifier')] активний, наші [Concept('religious_focuses', 'CONCEPT_PLACEHOLDER')|e] отримуватимуть #G +0.2#! місячного прогресу"
  nahuatl_events.30.title: "Паломництво до [ShowLocationNameWithNoTooltip('cholollan')]"
  nahuatl_events.30.desc: "Традиційно для всіх наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] подорожувати до великої святині Кетцалькоатля у храмовому місті [ShowLocationName('cholollan')]. Тут можна поклонятися доброзичливому пернатому змію, захиснику мистецтв та дощів, і тут [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] Мезоамерики можуть демонструвати своє багатство, не вступаючи в бій один з одним."
  nahuatl_events.30.a: "Віддати шану Кетцалькоатлю."
  nahuatl_events.30.b: "Який бог не вимагає людських жертвоприношень?"
  nahuatl_events.310.title.a: "Фестиваль Атлькауало"
  nahuatl_events.310.title.b: "Фестиваль Тлакашіпеуаліцтлі"
  nahuatl_events.310.title.c: "Фестиваль Тозозтонтлі"
  nahuatl_events.310.title.d: "Фестиваль Уей Тозоцтлі"
  nahuatl_events.310.title.e: "Фестиваль Токскатль"
  nahuatl_events.310.title.f: "Фестиваль Ецалькуаліцтлі"
  nahuatl_events.310.title.g: "Фестиваль Текуільуітонтлі"
  nahuatl_events.310.title.h: "Фестиваль Уей Текуільуітонтлі"
  nahuatl_events.310.title.i: "Фестиваль Тлашочімако"
  nahuatl_events.310.title.j: "Фестиваль Шокотль Уеці"
  nahuatl_events.310.title.k: "Фестиваль Очпаніцтлі"
  nahuatl_events.310.title.l: "Фестиваль Теотлехко"
  nahuatl_events.310.title.m: "Фестиваль Тепеільуітль"
  nahuatl_events.310.title.n: "Фестиваль Кечоллі"
  nahuatl_events.310.title.o: "Фестиваль Панкецаліцтлі"
  nahuatl_events.310.title.p: "Фестиваль Атемоцтлі"
  nahuatl_events.310.title.q: "Фестиваль Тітітль"
  nahuatl_events.310.title.r: "Фестиваль Іцкаллі"
  nahuatl_events.310.title.s: "Немонтемі"
  nahuatl_events.310.desc.a: "#italic Атлькауало#!, що означає «Припинення води», є першим святом року і присвячене Тлалоку, Богу Дощу та іншим пов'язаним божествам дощу. У ньому наш народ благає Бога принести дощ, оскільки вони вступають у найсухіші місяці року.\n\nПротягом цього періоду Тлалоку приносять у жертву кукурудзу та дітей. Ці діти, які слугуватимуть жертвами, ритуально одягаються і священики відводять їх до кількох священних гір, тоді як люди плачуть, дивлячись на процесію. Вони отримують прізвисько #italic Тлакатетеуітль#! або «Людські смуги», за аналогією до паперових смуг, що називаються #italic Аматетеуітль#!, які священики носять із собою.\n\nПеред жертвоприношенням діти проводять ніч на вершині гори, де їм не дозволяється спати. Їхні крики вночі розглядаються як добрий знак того, що дощ скоро прийде."
  nahuatl_events.310.desc.b: "Протягом другого місяця нашого сонячного календаря Фестиваль #italic Тлакашіпеуаліцтлі#! або «Здирання шкіри з людей» присвячений Шіпе Тотеку. Цикл життя, смерті та відродження є його володінням, як і смертоносна війна. Протягом цього місяця наш народ святкує прихід весни та родючості, відродження життя.\n\nНа його честь полонених здирають шкіру та приносять у жертву, а їхні шкіри носять протягом двадцяти днів. Також проводяться гладіаторські жертвоприношення, де полоненим дають імітацію зброї та змушують битися на смерть проти кількох наших найхоробріших [ShowUnitDefinitionName('a_jaguar_warrior')]. Якщо вони перемагають, їм повертають свободу."
  nahuatl_events.310.desc.c: "Під час святкування Фестивалю #italic Тозоцтонтлі#! або «Малого пильнування» відзначається посадка та посів. Незважаючи на те, що фестиваль святкується переважно на честь Тлалока, також поклоняються іншим богам і богиням кукурудзи та родючості, таким як Коатлікуе. Під час цього фестивалю дітей приводять до природи, і їх проколюють, щоб випустити кров, тоді як деяких з них також приносять у жертву Тлалоку в печерах. Там здерті шкіри, які носили з часів Тлакашіпеуаліцтлі, нарешті знімають і ховають."
  nahuatl_events.310.desc.d: "Сьогодні ми святкуємо Фестиваль «Великого пильнування» або #italic Уей Тозоцтлі#! на честь Бога Сентеотля, божества [ShowGoodsName('maize')]. Ми дякуємо кукурудзі, оскільки вона годує нас, і вшановуємо врожай, який ми отримуємо від неї.\n\nЦього місяця «Великого пильнування» ми приносимо в жертву дітей в імена Тлалока та всіх божеств кукурудзи, оскільки Тлалоку також слід дякувати за дощ, який він нам надав і зробив цей урожай можливим."
  nahuatl_events.310.desc.e: "Фестиваль #italic Токскатль#!, що означає «посуха», святкується як п'ятий місяць року і обертається навколо оновлення. Це свято присвячене Богам Тескатліпоці та Уіцілопочтлі, і їм приносять у жертву їжу та квіти. Кульмінацією фестивалю, однак, є жертвоприношення людини, яка представляла Тескатліпоку протягом минулого повного року.\n\nЦей молодий чоловік, якого мають принести в жертву, завжди обирається серед полонених, і протягом року його навчають, як поводитися, вивчаючи мову, пісні та грати на флейті. Протягом усього року до нього ставляться з повагою серед нашого народу, оскільки він є втіленням самого Тескатліпоки, але під час Токскатля його приносять у жертву, здирають шкіру та з'їдають [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]. Той, хто буде втілювати Тескатліпоку наступного року, негайно обирається після цього, щоб цикл міг продовжуватися."
  nahuatl_events.310.desc.f: "Шостий місяць року називається #italic Ецалькуаліцтлі#!, або «Поїдання свіжої [ShowGoodsName('maize')]». Він присвячений Богам Тлалоку та Чальчіутлікуе, і в ньому ми святкуємо молоді врожаї та кінець сухого сезону.\n\nПід час #italic Ецалькуаліцтлі#! наш головний храм прикрашається очеретом та кольоровим папером, що одягається навколо ший статуй Богів, як намисто. Богів просять про дощ, щоб покласти край сухому сезону, і здійснюються паломництва на вершину гори Тлалок, де приносять у жертву як дітей, так і дорослих."
  nahuatl_events.310.desc.g: "«Мале свято Богів», або #italic Текуільуітонтлі#!, святкується на честь Уіштосіуатль, Богині солі та солоної води, і сестри Тлалока. Протягом цього місяця люди дякують Богам за прихід води та здоровий ріст врожаю, тоді як місто прикрашається водяними квітами.\n\nЯк і на інших святах, протягом цього місяця жінка уособлює Богиню, а інші жінки танцюють навколо неї під час церемоній, одягнені в жовті квіти. Після завершення церемонії та, що представляє Уіштосіуатль, ритуально приноситься в жертву."
  nahuatl_events.310.desc.h: "Ми святкуємо #italic Уей Текуільуітонтлі#!, що є «Великим святом Богів». Боги [ShowGoodsName('maize')], зокрема Богиня Чікомекоатль, вшановуються танцями, а володарі годують простолюдинів, коли ми святкуємо достаток.\n\nПротягом цього місяця рабині, що представляють Богинь Чікомекоатль та Сіуакоатль, приносяться в жертву. Та, що представляє Чікомекоатль, приводиться на вершину гори, а потім вона та акушерки, які супроводжують її під час святкування, біжать назад до храму, щоб молитися. Там вона повинна танцювати в храмі, після чого її приносять у жертву."
  nahuatl_events.310.desc.i: "Дев'ятий місяць року присвячений померлим і святкується нашими торговцями. Цей місяць, що називається #italic Тлашочімако#! або «Дарування квітів», присвячений квітам та торгівлі.\n\nМісяць наповнений святкуваннями на честь наших померлих, а наші торговці святкують свій річний успіх. Бог Уіцілопочтлі вшановується протягом цього місяця, з приношеннями квітів та їжі спочатку для нього, а потім для решти Богів. Шляхетні жінки отримують #italic шокотль#!, що означає «фрукт», який є товстим колодою, що потім встановлюється в нашому головному храмі.\n\nСвяткування включають приношення квітів та їжі предкам, а також жертвоприношення дітей та імітатора Міктлантекутлі, Бога Мертвих."
  nahuatl_events.310.desc.j: "Головне свято мертвих відзначається під час Фестивалю #italic Xocotl Huetzi#!, що означає «Падіння фруктів», де вшановуються фрукти та врожай.\n\nВшановуються Боги Уеуетеотль та Шіутекутлі, і протягом цього місяця люди підіймаються на дахи своїх будинків та запрошують своїх померлих повернутися. #italic Xocotl#!, встановлений попереднього місяця, знімається та кладеться на колоду, прикрашену паперовими стрічками.\n\nВ останній день цього місяця полонених кидають у вогонь, а потім жерці виривають їхні серця. Наприкінці молодь намагається піднятися на колоду за допомогою мотузок, щоб бути вшанованою, після чого колоду рубають."
  nahuatl_events.310.desc.k: "Протягом місяця «Підмітання», або #italic Ochpāniztli#!, ми святкуємо врожай та очищення. Протягом цих двадцяти днів вшановуються кілька Богів, таких як Тлазольтеотль, Тосі (також звана Коатлікуе або Теотеох іннан), або Сентеотль. Цього місяця люди ритуально підмітають та купаються як частина святкувань, а представниця Богині Тосі приноситься в жертву.\n\nРабиню, що представляє Тосі, ігнорують протягом перших п'яти днів місяця, потім мовчки танцюють навколо неї протягом наступних восьми. Нарешті, протягом останніх п'яти днів, акушерки та цілителі, які купили рабиню для церемонії, імітують битви проти рабині, щоб відволікти її. В ніч останнього дня рабиню приводять до храму, і жрець несе її після того, як вона розсипає [ShowGoodsName('maize')] борошно по підлозі. Потім другий жрець відрубує їй голову, а її тіло обдирають. Потім жрець одягає шкіру як представлення нової та відродженої Тосі. Шматок шкіри з ноги потім використовується для створення маски."
  nahuatl_events.310.desc.l: "«Прибуття Богів» або #italic Teōtlehco#! — це дванадцятий місяць нашого календаря, і святкується Прибуття Богів, і всі Боги вшановуються протягом цього місяця.\n\nУ храмі [ShowGoodsName('maize')] борошно кладуть на тарілку, і жрець періодично перевіряє, чи є на ній відбитки ніг. Якщо є, Боги прибули, і грають на духових інструментах, а люди пропонують кульки кукурудзи.\n\nПісля прибуття Богів полонених кидають у вогонь, і перш ніж вони помруть, їх виймають з нього, їхні серця виривають, а їх обезголовлюють. Ці полонені, що представляють #italic mīmixcōah#!, стають зірками на небі після цього святкування.\n\nВеликі кількості пульке випиваються протягом місяця на честь Ометочтлі, різних Богів пульке."
  nahuatl_events.310.desc.m: "Тринадцятий місяць — це Фестиваль #italic Tepēilhuitl#! або «Гірський бенкет», присвячений горам Тлалок, Попокатепетль та Істаксіуатль. Протягом цього місяця ми вшановуємо Богів торгівлі, а також Тлалока та Шочікецаль.\n\nНаш народ створює процесію, що слідує за жерцями, які підіймаються на найближчі вершини. У храмах, зведених на цих вершинах, що називаються #italic Āyauhcalli#! або «Будинки туману», віряни залишають свої підношення Богам, а люди бенкетують до сутінків у горах «між хмарами».\n\nСеред жертвоприношень, діти віддаються Тлалоку, як це прийнято, а також приноситься в жертву Богам представлення Шочікецаль."
  nahuatl_events.310.desc.n: "На Фестивалі #italic Quechōlli#!, або «Королівська колпиця», полювання є головною темою, і місяць присвячений Богу Мішкоатлю, Богу-Змію Хмар полювання. Саме в ці сухі місяці полювання стає важливою частиною нашої культури.\n#NL#Як частина святкувань, проводяться ритуальні полювання, а також жертвоприношення рабів та полонених. Це також місяць, коли ми поповнюємо наші арсенали та виготовляємо нову зброю. Всі учасники цих святкувань практикують кровопускання, щоб вшанувати тварин, на яких ми будемо полювати, віддаючи кров за кров, або наших людей, загиблих у битвах."
  nahuatl_events.310.desc.o: "Фестиваль #italic Panquetzaliztli#!, або «Підняття прапорів», є п'ятнадцятим місяцем нашого календаря і знаменує народження Уїцилопочтлі.\n\nПротягом цього місяця відбувається великий фестиваль, що святкує народження Бога, наприкінці якого приносяться в жертву кілька рабів та полонених, а їхні власники майже повністю утримуються від їжі до кінця місяця. Оскільки це місяць, орієнтований на військові дії, проводяться ритуальні битви.\n\nТакож створюється фігура, що представляє Бога, з [ShowGoodsName('maize')], яку їдять після жертвоприношень. Протягом місяця спостерігається значне споживання пульке, і люди пропонують свою кров Богу як жертву."
  nahuatl_events.310.desc.p: "Це шістнадцятий місяць року або #italic Ātemoztli#!, що означає «Спуск води», і присвячений Тлалоку, Богу Дощу.\n\nПротягом цього місяця ми молимося за достатній дощ, щоб живити наші поля та забезпечити рясний урожай, тоді як споживаються опудала Бога, зроблені з [ShowGoodsName('maize')] тіста. Як жертва, крім полонених та рабів, дітей топлять в озері або горах як підношення."
  nahuatl_events.310.desc.q: "Коли рік наближається до кінця, ми святкуємо Фестиваль #italic Tititl#!, «Розтягування». Це свято вшановує Сіуакоатль, і під час нього Богиню називають Іламатеуктлі, або «Стара Жінка», оскільки Земля висохла, і вона є плідною матір'ю всіх нас.\n\nНа церемонії ритуально приноситься в жертву зображення Богині, зроблене з амаранту. Коли вона висихає, вона стає чоловічою, демонструючи дуалістичну природу світу.\n\nСтарі люди насолоджуються цим місяцем, присвяченим їм у багатьох аспектах, але всі танцюють та беруть участь у ритуалах родючості. Торговці також приноситимуть у жертву рабів, куплених спеціально для цього святкування."
  nahuatl_events.310.desc.r: "Останній місяць року, «Відродження», або #italic Izcalli#!, знаменує кінець нашого календаря, безпосередньо перед страшними днями Немонтемі. Ці дні присвячені Богам Тлалоку та Шіутекутлі, в надії, що вони принесуть родючість, необхідну нашим полям для годування нашого народу.\n\nПід час Фестивалю рясно споживаються тамале з амаранту, а молодь полює на звірів у лісах або птахів в озері, тоді як вогні в храмах та будинках гасяться. Ці вогні будуть знову запалені лише в присутності Божества. Як і на всіх святах, проводяться жертвоприношення рабів та полонених, одягнених як божества."
  nahuatl_events.310.desc.s: "Ми перебуваємо в останніх п'яти днях року, відомих як Немонтемі. Протягом цих днів наш народ нічого не святкує, оскільки вони вважаються нещасливими днями; не ведеться жодних справ, і люди практикують утримання як знак поваги до #italic Tzitzimime#!.\n\nХоча протягом решти року наш народ поклоняється їм як захисницям жіночого начала та прародителькам людства, протягом днів Немонтемі, як нестабільного періоду року, їх бояться.\n\nНезважаючи на це, [target_character.GetName] наважився влаштувати святкування. Відвідуваність заходу була мінімальною, оскільки більшість людей бояться катастрофи або, принаймні, що відвідування такого свята в нещасливі дні може принести їм та їхнім родинам невдачу. Незважаючи на поради нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] пропустив їх повз вуха і продовжив підготовку. Чи покарають нас божества?"
  nahuatl_events.310.a: "Значно покращити святкування."
  nahuatl_events.310.b: "Дуже покращити святкування."
  nahuatl_events.310.c: "Неважливо."