l_english:
  lots_of_sikhs: "Багато [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у нашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e] тепер сповідують [ShowReligionName('sikhism')]."
  sikhism.1.title: "[ShowReligionAdjectiveWithNoTooltip('sikhism')] Віра"
  sikhism.1.desc: "[target_location.GetName] розташоване на кордоні між прихильниками [ShowReligionName('hindu')] та [ShowReligionGroupName('muslim')]. У цій місцевості, позначеній релігійною напругою та розбіжностями, чоловік на ім'я [target_character.GetName] почав проповідувати, що немає ні [ShowReligionAdjectiveWithNoTooltip('hindu')], ні [ShowReligionGroupAdjectiveWithNoTooltip('muslim')], але істина є з Богом, який не є ні тим, ні іншим.\n\nХоча [target_character.GetHisHer] відмова від давніх звичаїв обурила відданих [target_religion.GetAdjectiveWithNoTooltip] вірян, зневага [target_character.GetNameWithNoTooltip] до віровчення дозволила [target_character.GetHisHer] вченням вкоренитися серед населення. [target_character.GetHisHer|U] учні відомі як сикхи і швидко поширюють цю нову віру по всьому [target_location.GetNameWithNoTooltip]."
  sikhism.1.a: "Цьому немає місця в [ROOT.GetCountry.GetLongNameWithNoTooltip]."
  sikhism.1.b: "Нам потрібно буде поговорити з цим [target_character.GetShortNameWithNoTooltip] про [ShowReligionAdjectiveWithNoTooltip('sikhism')] віру."
  sikhism.1.c: "Ми будемо слідувати вченням [target_character.GetNameWithNoTooltip] до глибини душі."
  sikhism.2.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.2.desc: "\"Смерть не назвали б поганою, о люди, якби хтось знав, як по-справжньому померти.\"\n\nЗасновник нашої віри відійшов у вічність. Тіло [previous_guru.GetName] мертве, але дух [ROOT.GetCountry.GetGovernment.GetRulerTitle] живе в [previous_guru.GetHerHis] наступнику, [target_character.GetName]. [target_character.GetShortNameWithNoTooltip] був одним із найвідданіших послідовників [previous_guru.GetShortNameWithNoTooltip] і продовжує [previous_guru.GetHerHis] спадщину у створенні [ROOT.GetCountry.GetReligion.GetAdjective] громади, поширюючи використання нового алфавіту для сприяння освіті молоді."
  sikhism.2.a: "Світло [ROOT.GetCountry.GetGovernment.GetRulerTitle] продовжує сяяти."
  sikhism.2.tt: "Відкриває [ShowLawName('guru_angad_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.3.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.3.desc: "[previous_guru.GetName] відійшов у вічність і залишив гурушип під опікою [previous_guru.GetHerHis] вірного слуги [target_character.GetName]. Людина великої смиренності, [target_character.GetShortNameWithNoTooltip] тим не менш має амбіції щодо вчень [ROOT.GetCountry.GetReligion.GetName], зміцнюючи доктрину рівності, яка здобула популярність серед простого народу, та засновуючи релігійних представників, званих Масандами, поширюючи слово нашої віри далі, ніж [ROOT.GetCountry.GetGovernment.GetRulerTitle] сам по собі міг би."
  sikhism.3.a: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] є силою слабких і визволенням рабів!"
  sikhism.3.tt: "Відкриває [ShowLawName('guru_amar_das_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.4.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.4.desc: "[previous_guru.GetName] покинув цей світ і передав гурушип [previous_guru.GetHerHis] учневі [target_character.GetName]. [target_character.GetSheHe|U] наглядатиме за продовженням будівництва нашого святого міста та заохочуватиме послідовників досягати просвітлення не лише через самотню медитацію, але й через активну взаємодію з громадою та їхніми побратимами [ROOT.GetCountry.GetReligion.GetAdjective] послідовниками."
  sikhism.4.a: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] є слугою [ROOT.GetCountry.GetReligion.GetGodName] і ми служимо [target_character.GetHerHim]."
  sikhism.4.tt: "Відкриває [ShowLawName('guru_ram_das_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.5.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.5.desc: "Після смерті [previous_guru.GetName], [target_character.GetName] був обраний наступним [ROOT.GetCountry.GetGovernment.GetRulerTitle], незважаючи на суперечки з боку опонентів [target_character.GetNameWithNoTooltip]. Щоб зберегти знання та гімни минулих вчень, [target_character.GetShortNameWithNoTooltip] почав укладати том, відомий як [ShowPolicyName('adi_granth')]. Зібрані в ньому духовні писання походять від багатьох великих вчителів, і [ROOT.GetCountry.GetGovernment.GetRulerTitle] наказав, щоб кожен міг долучитися до них. [target_character.GetSheHe|U] також заснував великий храм, Хармандір Сахіб, надавши всім [ROOT.GetCountry.GetReligion.GetAdjective] вірянам місце для зустрічей та поклоніння."
  sikhism.5.a: "Ми збережемо знання і будемо розвивати їх."
  sikhism.5.tt: "Відкриває [ShowLawName('guru_arjan_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.6.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.6.desc: "\"«Як я розчавлю ці цибулини, що ви принесли мені, так і ваш син розчавить голови своїх ворогів, і буде водночас великим воїном і возвеличеним $guru$».\"\n\nТак було сказано про наступника [previous_guru.GetName], [target_character.GetName]. Світ змінився, і [ROOT.GetCountry.GetReligion.GetAdjective] народ більше не може довіряти милосердю своїх потенційних ворогів, але взяв до рук зброю проти тих, хто прагне зробити мучеників з [ROOT.GetCountry.GetGovernment.GetRulerTitle] та [target_character.GetHerHis] учнів."
  sikhism.6.a: "Мечі замінять корону [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  sikhism.6.tt: "Відкриває [ShowLawName('guru_hargobind_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.7.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.7.desc: "Наступник [previous_guru.GetName], [target_character.GetName], був навчений і підготовлений до прийняття гурушипу, і тепер цей час настав. Хоча [target_character.GetHerHis] попередник навчив [target_character.GetNameWithNoTooltip] бойовим мистецтвам та підтримці армії, [target_character.GetNameWithNoTooltip] має більш чутливий характер, і [target_character.GetHerHis] любов до всього живого спонукає [target_character.GetHerHim] шукати дипломатичні рішення."
  sikhism.7.a: "Досить битв; настав час для зцілення."
  sikhism.7.tt: "Відкриває [ShowLawName('guru_har_rai_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.8.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.8.desc: "Тіло [previous_guru.GetName] відійшло, залишивши дуже молодого наступника, щоб той прийняв мантію. [target_character.GetName] був визнаний кращим кандидатом, ніж інші варіанти, які ставили дипломатичний прагматизм вище дотримання віри. Хоча наш новий [ROOT.GetCountry.GetGovernment.GetRulerTitle] не бракує благочестя чи доброти, [target_character.GetHerHis] молодий вік обмежує наші дипломатичні можливості."
  sikhism.8.a: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] все ще є нашим благословенням."
  sikhism.8.tt: "Відкриває [ShowLawName('guru_har_krishan_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.9.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.9.desc: "[previous_guru.GetName] трагічно помер. Після деякої плутанини щодо того, хто міг бути [previous_guru.GetHerHis] наступником, [target_character.GetName] був обраний новим [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Спочатку [target_character.GetSheHe] був відлюдним [target_character.GetWomanMan], але [target_character.GetSheHe] піднявся до нагоди і виявився рішучим лідером. Незважаючи на [target_character.GetHerHis] власне відкидання ритуалів і церемоніальних практик, [target_character.GetSheHe] взяв на себе завдання захисту не тільки релігії [target_character.GetHerHis] власних послідовників, але й [ShowReligionAdjective('hindu')] біженців, які тікають до наших земель від переслідувань."
  sikhism.9.a: "Наш [ROOT.GetCountry.GetGovernment.GetRulerTitle] є Істинним Королем і щитом пригноблених."
  sikhism.9.tt: "Відкриває [ShowLawName('guru_tegh_bahadur_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.10.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.10.desc: "Зі смертю [previous_guru.GetName], [ROOT.GetCountry.GetReligion.GetAdjective] вірні знову зіткнулися з ворожістю з боку своїх політичних та релігійних ворогів. [previous_guru.GetHerHis|U] наступник, [target_character.GetName], сповнений рішучості об'єднати народ і зібрати тих, хто готовий віддати своє життя за свого [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Наступні десятиліття призведуть до створення [ShowLawName('khalsa_law')], тих, хто був посвячений церемоніями [ROOT.GetCountry.GetGovernment.GetRulerTitle] у нашу віру, і ім'я [target_character.GetNameWithNoTooltip] залишиться в історії назавжди."
  sikhism.10.a: "[ShowLawNameWithNoTooltip('khalsa_law')] належить [ROOT.GetCountry.GetReligion.GetGodName], Перемога належить [ROOT.GetCountry.GetReligion.GetGodName]!"
  sikhism.10.tt: "Відкриває [ShowLawName('guru_gobind_singh_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.10.khalsa.tt: "Відкриває [ShowLawName('khalsa_law')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.11.title: "[ShowWorkOfArtNameWithNoTooltip('guru_granth_sahib')]"
  sikhism.11.desc: "[previous_guru.GetName] пішов, але передав гурушип тому, хто ніколи не помре. Збірка священних текстів, відома як [ShowPolicyName('adi_granth')], колись створена [GetCharacter('guru_arjan').GetName] і доповнена іншими [ROOT.GetCountry.GetGovernment.GetRulerTitle] після [GetCharacter('guru_arjan').GetHerHim], була призначена [previous_guru.GetNameWithNoTooltip] як остаточний наступник, який буде вести [ROOT.GetCountry.GetReligion.GetAdjective] народ: [ShowWorkOfArtName('guru_granth_sahib')]. Відтепер, які б питання [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] вірні не мали до [ROOT.GetCountry.GetGovernment.GetRulerTitle], на них відповідатиме знання, що міститься в ній."
  sikhism.11.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] є Виконавцем бажань розуму."
  sikhism.11.b: "Ті, хто хоче зустріти [ROOT.GetCountry.GetReligion.GetGodName], можуть знайти Його в її гімнах."
  sikhism.11.tt: "Відкриває [ShowLawName('guru_granth_sahib_guruship')] для [GetUniqueInternationalOrganization('sikhism').GetName]"
  sikhism.12.title: "$guru$ у [target_location.GetNameWithNoTooltip]"
  sikhism.12.desc: "Звістка від людини, яку дехто називає $guru$, прибула до [target_location.GetName]. [target_character.GetSheHe|U] стверджував, що отримав одкровення, будучи покликаним Небесами подорожувати зі [target_character.GetHerHis] дому до далеких земель, поширюючи послання єдиного істинного Бога.\n\n[target_character.GetHerHis|U] місцеві учні наполягають, що цей Бог відкривається через усі релігії, включаючи [ROOT.GetCountry.GetReligion.GetName], і захищають [target_character.GetName] як того, хто просто розкриває істини нашої власної віри. Однак, безсумнівно, ці вчення відкидають наші ритуали та традиції, змушуючи людей відхилятися від істинного шляху [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip]."
  sikhism.12.a: "Поки вони платять податки, вони можуть вірити у що завгодно."
  sikhism.12.b: "Ми не будемо слухати таких язичників!"
  sikhism.12.b.tt: "Усі [ShowReligionAdjective('hindu')] та [ShowReligionGroupAdjective('muslim')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_location.GetName] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  sikhism.13.title: "Зникнення $character_title_guru$"
  sikhism.13.desc: "Світ [ShowReligionName('sikhism')] перебуває в безладі після того, як лінія $character_title_guru$ була перервана. Нам, вірним [ShowReligionAdjectiveWithNoTooltip('sikhism')] вірянам, належить відновити її на наших землях, забезпечивши встановлення нової лінії $character_title_guru$ у [target_location.GetName] з [guru_country.GetLongName]."
  sikhism.13.a: "[ShowReligionAdjectiveWithNoTooltip('sikhism')] $character_title_guru$ ніколи не помре."
  sikhism.13.b: "Ми будемо тими, хто очолить цю нову еру."