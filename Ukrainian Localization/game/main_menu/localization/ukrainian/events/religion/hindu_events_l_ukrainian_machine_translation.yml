l_english:
  hindu_events.1.title: "Дитя [ShowGodNameWithNoTooltip('surya_god')]"
  hindu_events.1.desc: "[ROOT.GetCountry.GetName] деякий час був без відповідного [ROOT.GetCountry.GetGovernment.GetHeirTitle], що турбувало членів родини [target_ruler.GetDynasty.GetName]. [target_character.GetName], член належного роду, нещодавно народила дитину, яка могла б вважатися спадкоємцем престолу, якби не той факт, що вона незаміжня.\n\nОднак, будучи обізнаною в легендах $mahabarata$, вона переповідає історію про те, як великий цар Карна народився від незайманої від самого [ShowGodName('surya_god')]. [target_ruler.GetNameWithNoTooltip] пояснює, що вона також вивчила мантру, за допомогою якої завагітніла принцеса з легенди, і що її дитина, дитя сонця, призначена для великих справ."
  hindu_events.1.a: "[ShowGodNameWithNoTooltip('surya_god')] благословив нас! Це буде початок Сонячної Династії."
  hindu_events.1.b: "Непорочне зачаття? Ймовірна історія."
  hindu_events.2.title: "Бала"
  hindu_events.2.desc: "Наша країна перебуває у стані війни, і для будь-якого [ROOT.GetCountry.GetGovernment.GetRulerTitle] війна — це сімейна справа. Наш [ROOT.GetCountry.GetGovernment.GetHeirTitle], [target_heir.GetName], був призначений генералом і поведе [ROOT.GetCountry.GetAdjective] армії до перемоги. Дочка [target_ruler.GetName], [target_daughter.GetName], також виявила жвавий інтерес до війни, вивчаючи військову справу поряд зі своєю релігійною освітою.\n\nЛюди пам'ятають історію про Балу Тріпурасундарі, молоду богиню, яка билася разом зі своїми братами, що шукала бою з цікавості. [target_daughter.GetNameWithNoTooltip] прислухається до цих історій, заворожена, і знає, як мати Бали постійно намагалася приборкати бажання своєї дитини йти на війну. Її прохання тоді нікого не дивує."
  hindu_events.2.a: "Наші вороги тремтітимуть перед [target_daughter.GetNameWithNoTooltip]."
  hindu_events.2.b: "Юнацька цікавість краще спрямована на встановлення миру, ніж на ведення війни."
  STATIC_MODIFIER_NAME_bala_tripurasundari: "Бала Тріпурасундарі"
  hindu_events.3.title: "Медитація Гуру"
  hindu_events.3.desc: "Народ, а також [ROOT.GetCountry.GetGovernment.GetRulerTitle] іноді повинні покладатися на мудрість святих вчителів для порад. Гуру — це не тільки вчитель, але й учень духовного, і іноді повинен усамітнюватися, щоб роздумувати про це без перешкод. Один з найшанованіших гуру, [target_character.GetName], чиї знання часто шукав [target_ruler.GetName], останнім часом став надзвичайно замкнутим, проводячи майже весь [target_character.GetHerHis] час у глибокій медитації. [ROOT.GetCountry.GetGovernment.GetCourtTitle] та народ стають неспокійними, розглядаючи це як поганий знак."
  hindu_events.3.a: "Звісно, самоздійснюване пророцтво..."
  hindu_events.1000.title: "[ShowGodNameWithNoTooltip('shiva_god')] Творець"
  hindu_events.1000.desc: "З усіх, хто намагається відобразити славу [ShowGodName('shiva_god')] у мистецтві, [target_artist.GetName] завжди перевершував інших. Ось чому [target_artist.GetSheHe] був покликаний до [ROOT.GetCountry.GetGovernment.GetCourtTitle] [target_ruler.GetName], але, незважаючи на [target_artist.GetHerHis] корисні поради з багатьох питань, [target_artist.GetHerHis] знання божественного залишається таємницею.\n\nОдного вечора, прогулюючись палацовими залами [ROOT.GetCountry.GetCapital.GetName], [target_ruler.GetShortNameWithNoTooltip] бачить, як [target_artist.GetHerHim] наносить останні штрихи на статую, і нарешті запитує [target_artist.GetHerHim], які видіння дозволили [target_artist.GetHerHim] зобразити багато облич [ShowGodNameWithNoTooltip('shiva_god')].\n\nВідповідь [target_artist.GetShortName] полягає в тому, що кожна душа є частиною духу Господа [ShowGodNameWithNoTooltip('shiva_god')], і так само, як [ShowGodNameWithNoTooltip('shiva_god')] створив усе існуюче, душа благословенна силою творити."
  hindu_events.1000.a: "Є над чим поміркувати."
  STATIC_MODIFIER_NAME_hindu_shaiva: "Шайва"
  STATIC_MODIFIER_NAME_hindu_withdrawn_contemplation: "Заглиблений у споглядання"
  hindu_events.1000.b: "Це слова художника. [ROOT.GetCountry.GetGovernment.GetRulerTitle] інший."
  hindu_events.1001.title: "Срішті: Створення"
  hindu_events.1001.desc: "Після років роздумів над словами художника про душу та творіння, [target_ruler.GetName] досяг багатьох прозрінь щодо природи [ShowGodName('shiva_god')] як творця світу. [target_ruler.GetSheHe|U] також усвідомив важливість творіння у [target_ruler.GetHerHis] власній спадщині. Майбутні мислителі пам'ятатимуть [target_ruler.GetNameWithNoTooltip] як того, хто медитував над створенням світу та створенням нації."
  hindu_events.1001.a: "Ом."
  STATIC_MODIFIER_NAME_shiva_srishti: "Срішті"
  STATIC_MODIFIER_NAME_jnana: "Джняна"
  hindu_events.1100.title: "[ShowGodNameWithNoTooltip('shiva_god')] Зберігач"
  hindu_events.1100.desc: "[ROOT.GetCountry.GetName] перебуває в мирі. Нація пережила період стабільності та процвітання під правлінням [target_ruler.GetName], що дало нам більше часу зосередитися на духовних питаннях. На жаль, це вселило в нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] страх побачити кінець щасливим часам.\n\nПід час глибокої молитви перед статуєю [ShowGodName('shiva_god')] до [target_ruler.GetNameWithNoTooltip] підходить [target_character.GetName]. Коли [target_ruler.GetSheHe] закінчує мантру, [ROOT.GetCountry.GetGovernment.GetRulerTitle] ділиться [target_ruler.GetHerHis] занепокоєннями, просячи поради. Жестом вказуючи на статую, [target_character.GetShortNameWithNoTooltip] відповідає, що піднята долоня [ShowGodNameWithNoTooltip('shiva_god')] є нагадуванням про те, що він не тільки створює і руйнує, але й зберігає."
  hindu_events.1100.a: "$common_string_aum$"
  hindu_events.1100.b: "Ми довіряємо [ShowGodNameWithNoTooltip('shiva_god')] у багатьох справах, але збереження країни — наш власний обов'язок."
  hindu_events.1101.title: "Стхіті: Збереження"
  hindu_events.1101.desc: "Роками споглядаючи Абхаямудру, підняту долоню [ShowGodName('shiva_god')], що дарує благословення заспокоєння та безпеки, [target_ruler.GetName] відчуває, що [target_ruler.GetSheHe] багато зрозумів про те, як він діє як хранитель світу. Знання цього заспокоює розум [target_ruler.GetHerHis], дозволяючи [target_ruler.GetHerHim] зосередитися на управлінні [ROOT.GetCountry.GetName] та піклуватися про неї, як [ShowGodNameWithNoTooltip('shiva_god')] піклується про все, що є."
  hindu_events.1101.a: "$common_string_aum$"
  hindu_events.1200.title: "[ShowGodNameWithNoTooltip('shiva_god')] Руйнівник"
  hindu_events.1200.desc: "[ROOT.GetCountry.GetName] перебуває у стані війни. Нація спустошує наших ворогів, залишаючи руйнування та спустошення на своєму шляху. Серед керівництва цим наступом, [target_ruler.GetName] мав мало часу для медитації чи будь-яких релігійних роздумів. Однак одного дня [target_ruler.GetSheHe] обертається, щоб подивитися на кров і вогонь, залишені після просування. На мить шлях праведного послідовника [ShowGodName('shiva_god')] здається втраченим.\n\n[target_character.GetName], людина великої духовної відданості, під'їжджає до [ROOT.GetCountry.GetGovernment.GetRulerTitle] і радить [target_ruler.GetHerHim] не озиратися назад. Світ повинен згоріти, щоб відродитися. Господь [ShowGodNameWithNoTooltip('shiva_god')] також руйнує, щоб відтворити."
  hindu_events.1200.a: "Ми візьмемо ці думки з собою у наших діях."
  hindu_events.1200.b: "Люди спустошують світ егоїстично. Не нам перетворювати його, як це робить [ShowGodNameWithNoTooltip('shiva_god')]."
  hindu_events.1201.title: "Самхара: Руйнування"
  hindu_events.1201.desc: "Війна дала [target_ruler.GetName] час побачити багато руйнувань, але також і відбудову, що слідує за ними. Хоча вогонь, що поглинув наших ворогів, не був божественним за своєю природою, [target_ruler.GetSheHe] відчуває, що [target_ruler.GetSheHe] має глибше розуміння полум'я, яким [ShowGodName('shiva_god')] перетворює світ."
  hindu_events.1201.a: "$common_string_aum$"
  hindu_events.1300.title: "[ShowGodNameWithNoTooltip('shiva_god')] Прихований"
  hindu_events.1300.desc: "У [target_ruler.GetHerHis] пошуках духовного знання, [target_ruler.GetName] не може не відчувати іноді, що воно навмисно уникає [target_ruler.GetHerHim]. Якщо божественне присутнє у всьому, як його природа може уникнути того, хто його шукає?\n\n[target_ruler.GetSheHe|U] ставить ці питання [target_character.GetName], який на мить, але не більше, замислюється, перш ніж відповісти, що Господь [ShowGodName('shiva_god')] приховує свою благодать від творіння. Помічаючи це у наших пошуках, ми робимо перший крок до глибшого розуміння божественного, бо без прихованої істини не було б жодного пошуку."
  hindu_events.1300.a: "Треба осягнути його значення."
  hindu_events.1300.b: "Тоді, можливо, краще шукати одкровення деінде."
  hindu_events.1301.title: "Тіробхава: Ілюзія"
  hindu_events.1301.desc: "Після років медитації над тим, як благодать [ShowGodName('shiva_god')] приховує істину від смертних очей, [target_ruler.GetName] відчуває спокій. Знаючи, що [target_ruler.GetHerHis] власне існування, пошук і остаточне розуміння залежать від цього, [target_ruler.GetSheHe] тепер бачить, як цей принцип пронизує кожен аспект реальності."
  hindu_events.1301.a: "$common_string_aum$"
  STATIC_MODIFIER_NAME_shiva_tirodhana: "Тіродхана"
  hindu_events.1400.title: "[ShowGodNameWithNoTooltip('shiva_god')] Явлений"
  hindu_events.1400.desc: "Після багатьох років пошуків гуру, який би направляв [target_ruler.GetHerHim], [target_ruler.GetName] не знайшов нікого, хто міг би адекватно пояснити таємниці існування або внести ясність у релігійні питання. На цьому етапі [target_ruler.GetSheHe] починає втрачати надію на великих вчителів і вважає за краще обговорювати духовне зі [target_ruler.GetHerHis] однолітками.\n\nОдного дня, розмовляючи з [target_ally_ruler.GetName] з [target_ally.GetName], вони починають обговорювати природу душі та її єдність з божественним. Хоча [target_ally_ruler.GetNameWithNoTooltip] є послідовником [ShowGodName('vishnu_god')], [target_ruler.GetNameWithNoTooltip] виявляє, що [target_ruler.GetHerHis] слова про [ShowGodName('shiva_god')] знаходять відгук.\n\nТе, що було сказано в цій розмові, звучало не як слова учня, а як слова майстра. Можливо, [ShowGodNameWithNoTooltip('shiva_god')] вже явив [target_ruler.GetShortNameWithNoTooltip] свою благодать, давши [target_ruler.GetHerHim] це одкровення."
  hindu_events.1400.a: "$hindu_events.1000.a$"
  hindu_events.1400.b: "Завжди є багато чого навчитися у старших."
  hindu_events.1401.title: "Ануграха: Емансипація"
  hindu_events.1401.desc: "Роздуми над знаннями, які [target_ruler.GetSheHe] здобув протягом [target_ruler.GetHerHis] років духовних пошуків, дали [target_ruler.GetName] час усвідомити процес, завдяки якому [ShowGodName('shiva_god')] являє свою благодать світу та приносить мудрість душам. Оскільки [target_ruler.GetShortNameWithNoTooltip] колись поділився цими знаннями з нашим союзником, ще до того, як усвідомив їх, ми тепер можемо поділитися цим новим розумінням з іншими та наставити їх."
  hindu_events.1401.a: "$common_string_aum$"
  STATIC_MODIFIER_NAME_shiva_anugraha: "Anugraha"
  hindu_events.1402.title: "Rudra, Послідовник [ShowGodNameWithNoTooltip('vishnu_god')]"
  hindu_events.1402.desc: "Відданість [target_ally_ruler.GetName] Господу [ShowGodName('vishnu_god')] не виключає обговорення духовного з послідовниками [ShowGodName('shiva_god')]. [target_ruler.GetName] з [target_origin_country.GetName] є послідовником [ShowGodNameWithNoTooltip('shiva_god')], який, тим не менш, був цінним союзником, другом і, сьогодні, вчителем. Говорячи про одного з послідовників [ShowGodNameWithNoTooltip('vishnu_god')], бога бурі Рудру, [target_ruler.GetNameWithNoTooltip] ототожнює його з самим [ShowGodNameWithNoTooltip('shiva_god')].\n#NL![target_ruler.GetHerHis|U] опис божества є яскравим та натхненним, що створює переконливий аргумент, що саме Рудра приносить релігійні знання смертним."
  hindu_events.1402.a: "Це тому, що Рудра є першим серед учнів [ShowGodNameWithNoTooltip('vishnu_god')]."
  STATIC_MODIFIER_NAME_hindu_vaishnava: "Vaishnava"
  hindu_events.1402.b: "Все є частиною божественного. Ми повинні споглядати [ShowGodNameWithNoTooltip('shiva_god')] також."
  hindu_events.1402.c: "[target_ruler.GetNameWithNoTooltip] знайшов [target_ruler.GetHerHis] свого бога, але ми повинні знайти свого."
  hindu_events.1403.title: "Rudra Saṃpradāya"
  hindu_events.1403.desc: "Медитація [target_ruler.GetName] та спроби зрозуміти [ShowGodName('vishnu_god')] через Рудру, його учня, керували [target_ruler.GetHerHim] протягом останніх років. Як послідовник [ShowGodNameWithNoTooltip('vishnu_god')], [target_ruler.GetSheHe] прагне наслідувати приклад Рудри та поширювати ці знання іншим. [target_ruler.GetSheHe|U] та всі учні, справді все існуюче, є частиною безмежного божественного, яким є Господь [ShowGodNameWithNoTooltip('vishnu_god')]."
  hindu_events.1403.a: "$common_string_aum$"
  hindu_events.1404.title: "[ShowGodNameWithNoTooltip('vishnu_god')] та [ShowGodNameWithNoTooltip('shiva_god')]"
  hindu_events.1404.desc: "Присвячення часу розумінню стосунків [ShowGodName('shiva_god')] з Господом [ShowGodName('vishnu_god')] допомогло [target_ruler.GetName] у [target_ruler.GetHerHis] пошуках відповідей. [target_ruler.GetSheHe|U] почав розглядати верховного бога як дух без меж і кордонів, його сутність присутня в [target_ruler.GetHerHis] власній душі, а також у самому світі. Незважаючи на те, що він занадто універсальний, щоб бути справді названим, ми повинні назвати його якимось ім'ям."
  hindu_events.1404.a: "Ім'я залишається [ShowGodNameWithNoTooltip('vishnu_god')], відкрите Рудрою."
  hindu_events.1404.b: "Ім'я — [ShowGodNameWithNoTooltip('shiva_god')], Владика Танцю."
  hindu_events.1404.c: "Ім'я — [ShowGodNameWithNoTooltip('shiva_god')], Руйнівник."
  hindu_events.1500.title: "[ShowAvatarNameWithNoTooltip('lakshmi_avatar')], Наречена [ShowGodNameWithNoTooltip('vishnu_god')]"
  hindu_events.1500.desc: "Підтримка шлюбних зв'язків з іншими країнами допомогла [ROOT.GetCountry.GetName] дипломатично. На нещодавній зустрічі з [target_country_ruler.GetName], правителем [target_country.GetName], [target_ruler.GetName] також обговорив духовне значення шлюбних зв'язків.\n#NL![target_country_ruler.GetShortNameWithNoTooltip] та багато з [target_country_ruler.GetHerHis] послів є послідовниками [ShowGodName('vishnu_god')] і знають [ShowGodName('shakti_god')] як дружину [ShowGodNameWithNoTooltip('vishnu_god')] [ShowAvatarName('lakshmi_avatar')]. [target_ruler.GetNameWithNoTooltip] скористався цією нагодою, щоб поговорити з ними про важливість Богині як посередника до божественного. [target_ruler.GetHerHis|U] слова, здавалося, запали в душу, і їхні лідери тепер краще розуміють нашу віру, а також цінність нашого королівського шлюбу."
  hindu_events.1500.a: "Богиня — це сила, Богиня — це краса."
  hindu_events.1501.title: "$hindu_events.1500.title$"
  hindu_events.1501.desc: "[target_ruler.GetName] з [target_origin_country.GetName] є [target_ruler.GetWomanMan], якому ми довіряємо не лише в політичних питаннях. Наші шлюбні угоди пов'язують наші країни, і [target_origin_country.GetGovernment.GetRulerTitle] часто надає нам філософські ідеї.\n#NL!Одного дня обидва правителі обговорюють свої думки про [ShowGodName('vishnu_god')] та природу душі. [target_ruler.GetNameWithNoTooltip], послідовник [ShowGodName('shakti_god')], згадує, наскільки нероздільні обидва Боги, як чоловік і дружина, і як душа також нероздільна з божественним. Щоб належним чином зрозуміти [ShowGodNameWithNoTooltip('vishnu_god')], ми могли б шукати його через Богиню [ShowAvatarName('lakshmi_avatar')], його дружину."
  hindu_events.1501.a: "Нехай [ShowAvatarNameWithNoTooltip('lakshmi_avatar')] об'єднає наші душі з [ShowGodNameWithNoTooltip('vishnu_god')]."
  hindu_events.1501.b: "Ми будемо споглядати цю єдність та Богиню."
  hindu_events.1501.c: "Ми цінуємо пораду, але ми шукаємо [ShowGodNameWithNoTooltip('vishnu_god')] без посередників."
  hindu_events.1502.title: "[ShowAvatarNameWithNoTooltip('lakshmi_avatar')] Сампрадая"
  hindu_events.1502.desc: "Роки духовних пошуків, опосередковані дружиною [ShowGodName('vishnu_god')] [ShowAvatarName('lakshmi_avatar')], розкрили багато відповідей на те, що [target_ruler.GetName] раніше вважав таємницями. Тепер ми розуміємо, що мали на увазі наші друзі, послідовники [ShowGodName('shakti_god')], і важливість єдності душі з божественним."
  hindu_events.1502.a: "$common_string_aum$"
  STATIC_MODIFIER_NAME_vishnu_lakshmi: "$hindu_events.1502.title$"
  hindu_events.1503.title: "[ShowGodNameWithNoTooltip('vishnu_god')] та [ShowAvatarNameWithNoTooltip('lakshmi_avatar')]"
  hindu_events.1503.desc: "Роками медитуючи над союзом між [ShowGodName('vishnu_god')] та [ShowAvatarName('lakshmi_avatar')], [target_ruler.GetName] відчуває [target_ruler.GetHerselfHimself] у захваті від прозрінь, які дарувала нам Богиня. Тепер ми бачимо її не стільки як посередника, скільки як частину самого верховного божества."
  hindu_events.1503.a: "[ShowAvatarNameWithNoTooltip('lakshmi_avatar')] є силою, що стоїть за [ShowGodNameWithNoTooltip('vishnu_god')], верховним богом."
  hindu_events.1503.b: "Сама [ShowAvatarNameWithNoTooltip('lakshmi_avatar')] може навіть перевершити [ShowGodNameWithNoTooltip('vishnu_god')]."
  hindu_events.1503.c: "Ми підемо шляхом Богині, шляхом сили."
  hindu_events_1600.desc_common: "Маленький [target_heir.GetName] вселяє [target_ruler.GetName] надію на майбутнє, а [target_heir.GetHerHis] народження також нагадало людям про причини, чому ми вважаємо Деві неперевершеною верховною божественною силою."
  hindu_events.1600.title: "Деві Мати"
  hindu_events.1600.desc: "Нещодавно в домі [target_heir.GetDynasty.GetName] народився спадкоємець. $hindu_events_1600.desc_common$ Хоча [target_ruler.GetShortNameWithNoTooltip] може правити [ROOT.GetCountry.GetName] як [ROOT.GetCountry.GetGovernment.GetRulerTitle], сила, що продовжує наш рід і, власне, сам світ, є доменом жіночого.\n\nВизнання цього аспекту Богині в [target_consort.GetName] змушує нас замислитися над красою та добротою Деві."
  hindu_events.1600.a: "Це усвідомлення вимагає подальших роздумів."
  STATIC_MODIFIER_NAME_hindu_shakta: "Шакта"
  hindu_events.1600.b: "[target_consort.GetNameWithNoTooltip] велика, але вона не Богиня."
  STATIC_MODIFIER_NAME_hindu_shakta_rejected: "$shakti_god$ Відкинуто"
  hindu_events.1600.desc_female: "Нещодавно [target_ruler.GetName] народила дитину, яка продовжить спадщину династії [target_heir.GetDynasty.GetName]. $hindu_events_1600.desc_common$ Так само, як наступний правитель [ROOT.GetCountry.GetName] народжується від [target_ruler.GetShortNameWithNoTooltip], світ народжується і відроджується від Богині.\n\nТе, що Деві використовує цю велику силу для доброзичливих цілей, є справді ознакою її доброти та благодаті, і знання про її існування в [target_ruler.GetHerHis] змушує [target_ruler.GetShortNameWithNoTooltip] вважати це аспектом, з яким [target_ruler.GetSheHe] може себе ототожнювати."
  hindu_events.1600.b_female: "[target_ruler.GetShortNameWithNoTooltip] може бути доброю матір'ю, але також лютою, як Богиня."
  hindu_events.1601.title: "Шрікула"
  hindu_events.1601.desc: "З моменту народження [target_heir.GetName] сприйняття [target_ruler.GetName] щодо [ShowGodName('shakti_god')] змінилося. Її енергія руйнування все ще зрозуміла [ROOT.GetCountry.GetGovernment.GetRulerTitle], але [target_ruler.GetSheHe] тепер бачить, що [ShowGodNameWithNoTooltip('shakti_god')] також є джерелом усього сущого. Для [target_ruler.GetShortNameWithNoTooltip] Богиня прекрасна і ніжна. З цією ніжністю, підкріпленою нескінченною силою, ми також будемо правити [ROOT.GetCountry.GetName]."
  hindu_events.1601.a: "$common_string_aum$"
  hindu_events.1700.title: "Шлюбні узи"
  hindu_events.1700.desc: "Наше розуміння творчого та граційного аспекту [ShowGodName('shakti_god')] допомогло зусиллям [ROOT.GetCountry.GetName] у залякуванні та спокушанні інших націй приєднатися до наших справ. Одним з багатьох методів, якими нації пов'язуються, є шлюбний союз, який [target_ruler.GetName] іноді вважає найелегантнішим рішенням, встановивши кілька таких зв'язків з іншими націями. Дипломатичні переговори набули характеру розширених сімейних зустрічей, об'єднаних кров'ю династії [target_ruler.GetDynasty.GetName].\n\nОстаннім часом глибокий вплив цих союзів надихнув [target_ruler.GetShortNameWithNoTooltip] замислитися над тим, як Богиня допомагає [target_ruler.GetHerHis] у роботі. Можливо, глибша тантрична медитація може наблизити нас до її розуміння."
  hindu_events.1700.a: "Союз між дружиною та чоловіком справді є серцем божественного."
  hindu_events.1700.b: "[ShowGodNameWithNoTooltip('shakti_god')] створює єдність, бо весь світ є її сутністю."
  hindu_events.1700.c: "Не плутаймо політичне з духовним."
  hindu_events.1701.title: "[ShowAvatarNameWithNoTooltip('parvati_avatar')]"
  hindu_events.1701.desc: "Роки тантричної медитації над тим, як шлюбні узи співвідносяться з божественними узами між Деві та Девою, привели [target_ruler.GetName] до ототожнення з [ShowAvatarName('parvati_avatar')], дружиною [ShowGodName('shiva_god')] та матір'ю багатьох великих Богів. Як джерело всієї сили, вона допоможе нам зміцнити та контролювати зв'язки між смертними."
  hindu_events.1701.a: "$common_string_aum$"
  STATIC_MODIFIER_NAME_shakti_parvati: "$parvati_avatar$"
  hindu_events.1702.title: "Пракріті"
  hindu_events.1702.desc: "Роки тантричної медитації над сутністю Богині в усьому привели [target_ruler.GetName] до ототожнення з Пракріті, божеством самої природи. Спорідненість нашого духу з оточенням заспокоює інших і об'єднує народ [ROOT.GetCountry.GetName]."
  hindu_events.1702.a: "$common_string_aum$"
  STATIC_MODIFIER_NAME_shakti_prakrti: "$hindu_events.1702.title$"
  hindu_events.1800.title: "Деві Захисниця"
  hindu_events.1800.desc: "[ROOT.GetCountry.GetName] у вогні. Ми воюємо проти тих, хто бажає бачити нашу країну розтрощеною, а її вірних підданих убитими. Такий напад на наш народ неприйнятний, і [target_ruler.GetName] відчуває незвичайну лють, що палає в [target_ruler.GetHerHim], спрямовану на тих, хто спричинив цей конфлікт. З того, як інші дивляться на [target_ruler.GetHerHim], зрозуміло, що [target_ruler.GetSheHe] має виглядати страхітливо у [target_ruler.GetHerHis] гніві та рішучості.\n\nВідновлюючись у храмі, [target_ruler.GetSheHe] бачить статую [ShowAvatarName('kali_avatar')], жахливу на вигляд і жорстоку. Проте в її очах, червоних від люті, є щось знайоме: відчуття мети. Подібно до того, як [ShowAvatarNameWithNoTooltip('kali_avatar')] охороняє своїх дітей, ми захищатимемо синів і дочок [ROOT.GetCountry.GetNameWithNoTooltip] до кінця."
  hindu_events.1800.a: "Є краса навіть у серці руйнування."
  hindu_events.1800.b: "Ми зробимо те, що мусимо, але це не той шлях, яким ми бачимо Деві."
  hindu_events.1801.title: "Калікула"
  hindu_events.1801.desc: "Війна забрала багато жертв, але після нашої зустрічі з Богинею [target_ruler.GetName] виявляє, що вона зміцнила [target_ruler.GetHerHim]. Ми зрозуміли, що краса душі чи божественного не розкривається через зовнішню грацію, але що обличчя, заплямоване кров'ю, також може приховувати мудрість і мужність."
  hindu_events.1801.a: "$common_string_aum$"
  hindu_events.1900.title: "Опозиція"
  hindu_events.1900.desc: "Здається, [ShowGodName('shakti_god')] показала своє найлютіше обличчя [ROOT.GetCountry.GetName], оскільки наша країна опинилася посеред жахливої війни. Бачивши всі аспекти війни, [target_ruler.GetName] може краще зрозуміти руйнівні сили, що переформовують світ, але ми також повинні розглянути наші власні мотиви у продовженні цього агресивного курсу дій.\n\nДеві, яку ми знаємо, люта, але з якою метою? Медитація над тим, чому ми несемо смерть нашим ворогам, може дати уявлення про те, чому Богиня несе смерть."
  hindu_events.1900.a: "Настав їхній час. Ми покличемо руйнування на сили зла."
  hindu_events.1900.b: "Їхня кров проллється на нашому шляху до визволення."
  hindu_events.1900.c: "Немає часу на медитацію. Ми воюємо!"
  hindu_events.1901.title: "[ShowAvatarNameWithNoTooltip('kali_avatar')]"
  hindu_events.1901.desc: "Роки тантричної медитації привели [target_ruler.GetName] до ототожнення з [ShowAvatarName('kali_avatar')], чорною Богинею. З силою та мудрістю цього аспекту [ShowGodName('shakti_god')] ми усунемо злісні впливи на світ і переформуємо його у вогні."
  hindu_events.1901.a: "$common_string_aum$"
  STATIC_MODIFIER_NAME_shakti_kali: "$kali_avatar$"
  hindu_events.1902.title: "[ShowAvatarNameWithNoTooltip('tara_avatar')]"
  hindu_events.1902.desc: "Роки тантричної медитації привели [target_ruler.GetName] до ототожнення з [ShowAvatarName('tara_avatar')], вічно палаючою зіркою. Проливаючи кров наших ворогів, ми звільнимо та захистимо наш народ."
  hindu_events.1902.a: "$common_string_aum$"
  STATIC_MODIFIER_NAME_shakti_tara: "$tara_avatar$"
  hindu_events.2000.title: "Передане знання"
  hindu_events.2000.desc: "Пошуки [target_ruler.GetName] релігійних істин іноді здаються неможливими, ніби божественне та наші власні духи були розділені правилами самого існування. Шукаючи поради з цього приводу у особи при [ROOT.GetCountry.GetGovernment.GetCourtTitle], [target_character.GetName], [target_ruler.GetSheHe] усвідомлює, що це перший крок до розуміння душі та Господа [ShowGodName('vishnu_god')]. Абсолютна істина існує окремо від нашої реальності. Священне знання Богів передається крізь віки, і [target_character.GetNameWithNoTooltip] пропонує бути вчителем у цих питаннях.\n\nСміливість [target_character.GetHerHis|U] запропонувати бути духовним наставником нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] дивує, але, можливо, [target_character.GetSheHe] має рацію."
  hindu_events.2000.a: "Ми завжди приймаємо дар знань."
  hindu_events.2000.b: "Ми слухатимемо мудрих, але не лише від [target_character.GetNameWithNoTooltip]."
  STATIC_MODIFIER_NAME_vishnu_brahma: "Брахма Сампрадая"
  hindu_events.2000.c: "Ми шукатимемо істину самі."
  hindu_events.2001.title: "$STATIC_MODIFIER_NAME_vishnu_brahma$"
  hindu_events.2001.desc: "Останні роки багато чого нас навчили. Прийняття [target_character.GetName] як гуру допомогло [target_ruler.GetName] примиритися з існуванням божественного як окремого від душі та дозволило [target_ruler.GetHerHim] медитувати та поклонятися [ShowGodName('vishnu_god')] з цим на думці. Ми починаємо готуватися до передачі цієї істини іншим, як її було передано нам."
  hindu_events.2001.a: "$common_string_aum$"
  hindu_events.2002.title: "$STATIC_MODIFIER_NAME_vishnu_brahma$"
  hindu_events.2002.desc: "Відмова від єдиного наставника на користь отримання духовних порад від багатьох мудреців дала [target_ruler.GetName] можливість почути багато різних точок зору. Однак ми також усвідомили, яке величезне завдання — осягнути природу божественного. Дійсно, це навчання, яке може зайняти все життя, і навіть більше."
  hindu_events.2002.a: "$common_string_aum$"
  hindu_events.2100.title: "Чотири Кумари"
  hindu_events.2100.desc: "[ROOT.GetCountry.GetName] без потенційного [ROOT.GetCountry.GetGovernment.GetHeirTitle]. Правління [target_ruler.GetDynasty.GetName] нації може похитнутися, якщо [target_ruler.GetName] піде без наступника, і тиск щодо народження спадкоємця сильно тисне на [target_ruler.GetHerHim]. Щоденні молитви до Богів про дарування [target_ruler.GetHerHim] дитини залишаються без відповіді, але одна історія на вустах у всіх.\n\nКолись Брахма-Творець породив зі свого тіла чотирьох синів, Кумар, щоб вони продовжили його спадщину та допомагали йому у творінні. Однак Кумари відмовилися від таких мирських завдань і присвятили себе виключно вивченню та навчанню божественного. Без їхньої відданості та целібату знання про [ShowGodName('vishnu_god')] не дійшли б до нас.\n\nЯкщо ми бажаємо догодити Господу [ShowGodNameWithNoTooltip('vishnu_god')], [target_ruler.GetShortNameWithNoTooltip] мусить відкинути бажання спадкоємця, мотивоване жагою до влади та плотськими бажаннями, і шукати істину."
  hindu_events.2100.a: "[target_ruler.GetNameWithNoTooltip] присвятить [target_ruler.GetHerHis] життя чистоті та [ShowGodNameWithNoTooltip('vishnu_god')]."
  hindu_events.2100.b: "Ми прислухаємося до поради, але обов'язок не може бути покинутий."
  hindu_events.2100.c: "Влада — це робота [ROOT.GetCountry.GetGovernment.GetRulerTitle], плотські бажання — [target_ruler.GetHerHis] вільний час."
  hindu_events.2101.title: "Аханда Брахмачар'я"
  hindu_events.2101.desc: "Минули роки відтоді, як [target_ruler.GetName] відмовився від спроб народити спадкоємця для [target_ruler.GetHerHis] династії заради життя в целібаті, присвяченому ведичним дослідженням. Що може статися, коли [target_ruler.GetHerHis] піде, невідомо, але [target_ruler.GetHerHis] відданість не хитається. Вийшовши за межі життя звичайного [ROOT.GetCountry.GetGovernment.GetRulerTitle], [target_ruler.GetSheHe] може зрозуміти Кумарів та їхнє рішення пізнавати та поширювати знання про [ShowGodName('vishnu_god')]."
  hindu_events.2101.a: "$common_string_aum$"
  hindu_events.2102.title: "Кумара Сампрадая"
  hindu_events.2102.desc: "Роки споглядання багато чого навчили [target_ruler.GetName] про Кумарів, посланців [ShowGodName('vishnu_god')]. Хоча [target_ruler.GetSheHe] не відмовиться і справді не може повністю відмовитися від матеріалістичних прагнень як [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.GetName], цей період дав [target_ruler.GetShortNameWithNoTooltip] шанс побачити світ з духовною ясністю, і [target_ruler.GetSheHe] візьме цей досвід із [target_ruler.GetHerHim] у [target_ruler.GetHerHis] майбутнє як [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  hindu_events.2102.a: "$common_string_aum$"
  hindu_events.2200.title: "Перешкоди на нашому шляху"
  hindu_events.2200.desc: "Під час правління [target_ruler.GetName] [ROOT.GetCountry.GetCapital.GetName] виділявся як вершина мистецтва та науки, заздрість своїх сусідів. [ROOT.GetCountry.GetName] показує іншим націям шлях у пошуках знань та інновацій. Знаючи, що [ShowGodName('ganesha_god')] цінує мудрість, нашому [ROOT.GetCountry.GetGovernment.GetRulerTitle] приємно, що нація досягла успіху в її пошуках.\n\nПроте водночас, чим більше ми просуваємося, тим більше перешкод ми знаходимо, що заважають нашим дослідженням. Господь [ShowGodNameWithNoTooltip('ganesha_god')], який створює та змінює обструктивні елементи світу, може не тільки допомагати нашим дослідженням, але й ускладнювати їх."
  hindu_events.2200.a: "Ми повинні присвятити час розумінню цього."
  STATIC_MODIFIER_NAME_hindu_ganesha: "$ganesha_god$"
  hindu_events.2200.b: "Ми не стали технологічно досконалими через пусті медитації!"
  hindu_events.2201.title: "[ShowGodNameWithNoTooltip('ganesha_god')]"
  hindu_events.2201.desc: "Після років вивчення текстів мудреців та $purana$ разом із працями вчених та поетів, [target_ruler.GetName] починає розрізняти мотиви Господа [ShowGodName('ganesha_god')] щодо встановлення перешкод у наших пошуках знань. Перевага [ROOT.GetCountry.GetName] перетворила його еліту, включаючи [ROOT.GetCountry.GetGovernment.GetRulerTitle], на марнославну та зарозумілу. Тепер ми бачимо, що справжня мудрість вимагає смирення. Труднощі, що вже позаду, а також ті, що попереду, є саме тими викликами, які дають цю мудрість."
  hindu_events.2201.a: "$common_string_aum$"
  hindu_events.2300.title: "Народження [ShowGodNameWithNoTooltip('ganesha_god')]"
  hindu_events.2300.desc: "Будучи відомим далеко за межами [ROOT.GetCountry.GetName] як [ROOT.GetCountry.GetGovernment.GetRulerTitle], винятково відданий [ShowGodName('ganesha_god')], багато людей очікують, що [target_ruler.GetName] зробить цю відданість більш публічною.\n\nНародження Бога зазвичай святкується восени, і з наближенням дня можливість зробити цю церемонію великим видовищем за участю людей з усього [ROOT.GetCountry.GetNameWithNoTooltip] починає виглядати як чудова нагода об'єднати всіх у поклонінні та святкуваннях."
  hindu_events.2300.a: "Відданість родини [target_ruler.GetDynasty.GetNameWithNoTooltip] Господу Вінаяці побачать усі!"
  hindu_events.2300.b: "Наше поклоніння [ShowGodNameWithNoTooltip('ganesha_god')] має залишатися приватною справою для кожної родини."
  hindu_events.2301.title: "[ShowGodNameWithNoTooltip('ganesha_god')] Чатуртхі"
  hindu_events.2301.desc: "Сьогодні [target_ruler.GetName] очолює згадування історії народження [ShowGodName('ganesha_god')], як він був створений своєю матір'ю [ShowAvatarName('parvati_avatar')] і отримав голову слона від свого батька [ShowGodName('shiva_god')]. Історія переказується та святкується по всьому [ROOT.GetCountry.GetCapital.GetName] та багатьох інших місцях у [ROOT.GetCountry.GetName]. Статуї бога публічно шануються, а модак, солодкі десерти, які, як відомо, любить [ShowGodNameWithNoTooltip('ganesha_god')], пропонуються та споживаються. Як Бог початків, Вінаяка, безумовно, приніс новий початок [ROOT.GetCountry.GetNameWithNoTooltip]."
  hindu_events.2301.a: "Слава Господу Ганів!"
  hindu_events.2400.title: "Планування кінця"
  hindu_events.2400.desc: "Протягом [target_ruler.GetHerHis] життя як послідовник [ShowReligionAdjective('hindu')], [target_ruler.GetName] бачив, як багато хто відходив і проходив через свої похоронні обряди, які іноді включають воду зі священної річки. [target_ruler.GetSheHe|U] прожив достатньо довго, щоб подумати про [target_ruler.GetHerHis] власну смертність і про те, як одного дня [target_ruler.GetHerHis] тіло помре, а [target_ruler.GetHerHis] дух вознесеться на небеса.\n\n[target_ruler.GetHerHis|U] сподівається, що [target_ruler.GetHerHis] смерть настане близько до берегів річки. Однак жодна смертна людина не може знати, коли закінчиться її життя, тому принаймні ми могли б забезпечити [target_ruler.GetHerHis] спасіння, розвіявши [target_ruler.GetHerHis] прах у Гангу."
  hindu_events.2400.a: "Краще підготуватися."
  STATIC_MODIFIER_NAME_thinking_about_death: "Роздуми про смерть"
  hindu_events.2400.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] має ще багато років!"
  hindu_events.2401.desc_common: "Попередній правитель [ROOT.GetCountry.GetName], [target_last_ruler.GetName], нещодавно помер. Після похорону прах був залишений на піклування [target_ruler.GetName], разом із [target_last_ruler.GetHerHis] побажаннями занурити його у води Гангу, священної річки."
  hindu_events.2401.title: "Похорон на Гангу"
  hindu_events.2401.desc: "$hindu_events.2401.desc_common$\n\nХоча ми її шануємо, сам Ганг не протікає через [ROOT.GetCountry.GetName]. Подорож до річки з прахом може зайняти час, але це також буде нагодою поглибити наш духовний зв'язок з нею."
  hindu_events.2401.a: "[target_ruler.GetNameWithNoTooltip] забезпечить їхню безпечну доставку туди."
  STATIC_MODIFIER_NAME_hindu_ganges_pilgrimage: "Паломництво до Гангу"
  hindu_events.2401.b: "Натомість розвіяти їх у місцевій річці."
  hindu_events.2401.desc_presence: "$hindu_events.2401.desc_common$\n\nОскільки [ROOT.GetCountry.GetNameWithNoTooltip] благословлена присутністю річки в її межах, це не є важким випробуванням. Однак церемонія все одно забере час від обов'язків [target_ruler.GetNameWithNoTooltip] як [ROOT.GetCountry.GetGovernment.GetRulerTitle]."
  hindu_events.2401.a_presence: "Це гарний час, щоб з'єднатися з божественним."
  hindu_events.2401.b_presence: "У нас немає часу на скорботу."
  hindu_events.2402.title: "Ганг"
  hindu_events.2402.desc: "Досягнувши берега Гангу, [target_ruler.GetName] відчуває провидіння. Коли [target_ruler.GetSheHe] ступає в річку з попелом, вода, що оточує [target_ruler.GetHerHim], сприймається як така, що тече крізь три світи, бачачи темряву Патали, а також красу Сварги.\n\nУсі присутні відчувають безпрецедентну єдність зі світом і річкою, молячись, щоб вони колись побачили кінець свого життя на цьому священному березі."
  hindu_events.2402.a: "$common_string_aum$"
  hindu_events.2500.title: "Храми Сонця"
  hindu_events.2500.desc: "[ShowGodName('surya_god')] не так шанований, як колись. Саура, які вважали його абсолютним божеством, стає все менше, і по всій $india$ багато храмів, що вшановували його, були занедбані або навіть зруйновані. Не кожен правитель зберігає відданість [ShowGodNameWithNoTooltip('surya_god')], як [target_ruler.GetName], а іконоборці інших вір доклали великих зусиль до руйнування цих останніх бастіонів Вищого Світла.\n\nОднак [ShowBuildingTypeName('temple')], присвячений йому в [ROOT.GetCountry.GetCapital.GetName], все ще стоїть високо. Під нашим пильним оком, а також оком Мітри, Варуни та Агні, він ніколи не впаде. Розглядаючи долю інших храмів як попередження, можливо, нам слід витрачати більше часу та грошей на утримання [ShowBuildingTypeNameWithNoTooltip('temple')]."
  hindu_events.2500.a: "Зараз, як ніколи, Господь [ShowGodNameWithNoTooltip('surya_god')] потребує нас."
  STATIC_MODIFIER_NAME_hindu_surya: "$surya_god$"
  hindu_events.2500.b: "Храм протримається добре, доки [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] перебуває під нашим правлінням..."
  hindu_events.2501.title: "[ShowGodNameWithNoTooltip('surya_god')]"
  hindu_events.2501.desc: "Наглядаючи за утриманням сонячного [ShowBuildingTypeName('temple')] в [ROOT.GetCountry.GetCapital.GetName], [target_ruler.GetName] також знайшов час для молитви та медитації в стінах [ShowBuildingTypeNameWithNoTooltip('temple')]. Наша рішучість зберегти цей пам'ятник величі [ShowGodName('surya_god')] зросла. Ми будемо оберігати [ROOT.GetCountry.GetName], як [ShowGodNameWithNoTooltip('surya_god')] оберігає нас, і якщо хтось спробує зруйнувати його храми, наш гнів спалить їх, як сонце спалює землю."
  hindu_events.2501.a: "$common_string_aum$"
  hindu_events.2600.title: "Зміна пір року"
  hindu_events.2600.desc: "Зима добігає кінця. [ShowGodName('surya_god')] повертає свою колісницю, приносячи тепло та весну до [ROOT.GetCountry.GetName]. Зазвичай це святкувалося простим способом відданими [ShowGodNameWithNoTooltip('surya_god')] у їхніх власних домівках, але після роботи, вкладеної в сонячний [ShowBuildingTypeName('temple')] в [ROOT.GetCountry.GetCapital.GetName], і бачачи відданість [target_ruler.GetName] йому, все більше людей, здається, збираються там. Це може бути чудовою нагодою вшанувати Вище Світло більшим фестивалем."
  hindu_events.2600.a: "Ласкаво просимо всіх до [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip], дому [ShowGodNameWithNoTooltip('surya_god')]!"
  hindu_events.2600.b: "Є багато менших святилищ, які можуть вмістити поклоніння."
  hindu_events.2601.title: "Ратхасаптамі"
  hindu_events.2601.desc: "Очистивши [target_ruler.GetHerHis] тіло водою та листям екка, [target_ruler.GetName] йде до великого сонячного [ShowBuildingTypeName('temple')] в [ROOT.GetCountry.GetCapital.GetName]. Люди з багатьох каст з усього [ROOT.GetCountry.GetName] прийшли, щоб принести підношення води, квітів та фруктів і подивитися великі процесії біля [ShowBuildingTypeNameWithNoTooltip('temple')] та палацу. Мандала [ShowGodName('surya_god')] була прикрашена для святкування, і відвідувачі-віддані об'єднані в поклонінні та радості, що зима знову минула."
  hindu_events.2601.a: "Хвала Сонцю!"