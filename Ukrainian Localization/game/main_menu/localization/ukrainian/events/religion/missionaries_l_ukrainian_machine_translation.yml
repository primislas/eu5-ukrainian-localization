l_english:
  missionaries.1.title: "Місіонер захворів"
  missionaries.1.desc: "Місіонер, якого ми відправили до [target_location.GetName], поки що не мав великого успіху, щойно дійшли до нас звістки, що він захворів. Будь-яка подальша робота над новою церквою зупинилася, і без його керівництва шанси навернути місцевих жителів досить малі."
  missionaries.1.a: "Надіслати когось йому на допомогу"
  missionaries.1.b: "Спрямувати наші зусилля в інше місце"
  STATIC_MODIFIER_NAME_missionary_falls_ill: "Місіонер захворів"
  STATIC_MODIFIER_DESC_missionary_falls_ill: "Місіонер, якого ми відправили, захворів. Будь-яка подальша робота над новою церквою зупинилася, і без його керівництва шанси навернути місцевих жителів досить малі."
  missionaries.2.title: "Релігійний опір"
  missionaries.2.desc: "Навернення громадян [target_location.GetName] виявляється набагато складнішим, ніж очікувалося. Хоча дехто з них на початку виявив явний інтерес, більшість, схоже, не бажає приймати нову релігію."
  missionaries.2.a: "Збільшити наші зусилля"
  missionaries.2.b: "Це марна трата часу"
  STATIC_MODIFIER_NAME_missionary_failure: "Провал місіонерської діяльності"
  STATIC_MODIFIER_DESC_missionary_failure: "Навернення цих громадян виявляється набагато складнішим, ніж очікувалося. Хоча дехто з них на початку виявив явний інтерес, більшість, схоже, не бажає приймати нову релігію."
  missionaries.4.title: "Релігійний бунт"
  missionaries.4.desc: "За словами губернатора [target_province.GetName], громадяни бунтують через повну неповагу наших місіонерів до будь-яких релігійних практик чи традицій, відмінних від їхніх власних. Він просить нас розглянути можливість скасування всіх подальших місіонерських заходів у цьому районі або принаймні надіслати більше військ, доки ситуація трохи не заспокоїться."
  missionaries.4.a: "Ігнорувати їх!"
  missionaries.4.b: "Припинити зусилля"
  STATIC_MODIFIER_NAME_missionary_efforts_stalled: "Місіонерські зусилля зупинено"
  STATIC_MODIFIER_DESC_missionary_efforts_stalled: "Намагаючись заспокоїти місцевих жителів, ми погодилися призупинити наші місіонерські зусилля."
  missionaries.6.title: "Релігійна напруга"
  missionaries.6.desc: "Ситуація в [target_location.GetName] стає майже нестерпною. Громадяни відмовляються приймати проповіді місіонерів, яких ми туди відправили нещодавно, і тепер він боїться за своє життя. Здається, повстання неминуче, якщо ми щось не зробимо найближчим часом."
  missionaries.6.a: "Ризикнути"
  missionaries.6.b: "Зробити все, що можемо"
  STATIC_MODIFIER_NAME_religious_tensions: "Релігійна напруга"
  STATIC_MODIFIER_DESC_religious_tensions: "Громадяни відмовляються приймати проповіді наших місіонерів."
  missionaries.7.title: "Сусід порушує мир"
  missionaries.7.desc: "Місіонери, яких ми відправили до [target_location.GetName], скаржаться, що район наразі надто нестабільний. Незважаючи на нашу нейтральну позицію, війна, що зараз триває в сусідній країні, також впливає на [target_location.GetNameWithNoTooltip]."
  missionaries.7.a: "Запропонувати їм допомогу"
  missionaries.7.b: "Не турбуватися про це"
  missionaries.8.title: "Місіонерська діяльність"
  missionaries.8.desc: "Наші богослови скаржаться, що недостатньо коштів інвестується в місіонерську діяльність. Наших нинішніх місіонерів ледве вистачає, щоб навернути все населення [target_location.GetName], наприклад."
  missionaries.8.a: "Можливо, вони мають рацію"
  missionaries.8.b: "Цього більш ніж достатньо"