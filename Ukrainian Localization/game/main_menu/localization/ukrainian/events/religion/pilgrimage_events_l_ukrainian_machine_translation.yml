l_english:
  pilgrimage_events.1.title: "Зсув"
  pilgrimage_events.1.desc: "Під час [target_ruler.GetHerHis] паломництва до [target_holy_site.GetName] у [target_location.GetName], [target_ruler.GetName] та [target_ruler.GetHerHis] почет зіткнулися з неабиякою перешкодою на шляху. Здається, нещодавні дощі розпушили ґрунт навколо і спричинили зсув, завдавши значної шкоди сусіднім поселенням. Шляхи повністю зникли, а будинки були змиті пухким ґрунтом; плантації зруйновані, а люди залишилися без засобів до існування. Люди приходять до [target_ruler.GetShortNameWithNoTooltip], щоб просити допомоги у відновленні їхнього життя."
  pilgrimage_events.1.a: "Дати їм золота, щоб полегшити їхній тягар."
  pilgrimage_events.1.b: "Виділити кілька людей, щоб допомогти їм відбудуватися."
  pilgrimage_events.1.c: "Ми поспішаємо, немає часу зупинятися ні на що."
  pilgrimage_events.1.d: "Ми повинні зупинитися і допомогти цим людям."
  pilgrimage_events.1.d.tt: "Паломництво триватиме довше"
  pilgrimage_events.2.title: "Мандрівний монах"
  pilgrimage_events.2.desc: "Процесія [target_ruler.GetName] до [target_holy_site.GetName] у [target_location.GetName] була ненадовго перервана мандрівним монахом на узбіччі дороги, який просив милостиню. [target_monk.GetName] стверджує, що народився і виріс саме в [target_location.GetNameWithNoTooltip], отримавши [target_monk.GetHerHis] [target_monk.GetReligion.GetAdjective] освіту в [target_holy_site.GetNameWithNoTooltip]. Таким чином, [target_monk.GetSheHe] обіцяє провести [target_ruler.GetShortNameWithNoTooltip] у таємницях [target_monk.GetReligion.GetNameWithNoTooltip], якщо [target_ruler.GetSheHe] дозволить [target_monk.GetHerHim] супроводжувати процесію."
  pilgrimage_events.2.a: "Святий [target_monk.GetWomanMan] завжди бажаний."
  pilgrimage_events.2.b: "Наші нинішні радники [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] вже мають нашу довіру."
  pilgrimage_events.3.title: "Вільний простір при [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  pilgrimage_events.3.desc: "Поки [target_ruler.GetName] відсутній у [target_ruler.GetHerHis] паломництві до [target_holy_site.GetName] у [target_location.GetName], багато членів [ROOT.GetCountry.GetGovernment.GetCourtTitle] зовсім не стоять без діла. Скориставшись вакуумом, який створила відсутність [ROOT.GetCountry.GetGovernment.GetRulerTitle], вони почали інтригувати та плести змови, щоб здобути більше впливу та влади для себе. Коли новини про це дійшли до [target_ruler.GetShortNameWithNoTooltip], [target_ruler.GetSheHe] залишився безмовним, здивованим, що [target_ruler.GetHerHis] голос не має тієї ж влади, що колись."
  pilgrimage_events.3.a: "Зрадники, всі вони!"
  pilgrimage_events.3.b: "Настав час поставити їх на місце."
  pilgrimage_events.3.c: "Вони пошкодують про ці дії."
  pilgrimage_events.3.d: "За цим стояв власний [ROOT.GetCountry.GetGovernment.GetHeirTitle] [ROOT.GetCountry.GetGovernment.GetRulerTitle]!"
  pilgrimage_events.4.title: "Переповненість [target_holy_site.GetNameWithNoTooltip]"
  pilgrimage_events.4.desc: "Коли [target_ruler.GetName] прибув до [target_holy_site.GetName] у [target_location.GetName], [target_ruler.GetSheHe] не міг повірити тому, що [target_ruler.GetSheHe] побачив. Те, що мало бути центром віри та духовності, натомість більше нагадувало жваву ринкову площу. Територія була переповнена людьми, що прибували звідусіль, тоді як купці встановили свої прилавки, щоб нажитися на такому натовпі. Вони пропонували майже все, від їжі та напоїв для паломників до різноманітних атрибутів, що слугували доказом візиту. Деякі навіть мали нахабство пропонувати якісь нібито «реліквії» на самій священній землі. Було очевидно, що всі ці люди були не побожними паломниками, а натовпом, привабленим видовищем, тоді як справжні паломники були як вигнанці в морі гедонізму."
  pilgrimage_events.4.a: "Можливо, нам варто також поглянути на прилавки."
  pilgrimage_events.4.b: "Богохульство! Ми повинні зберегти священні землі."
  pilgrimage_events.4.b.tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] втратить [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  pilgrimage_events.4.c: "Ми самі забезпечимо її святість, спаліть прилавки!"
  pilgrimage_events.4.c.tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] втратить [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  pilgrimage_events.5.title: "Небезпечна прогулянка"
  pilgrimage_events.5.desc: "Під час [target_ruler.GetHerHis] паломництва до святого місця [target_holy_site.GetName] у [target_location.GetName], [target_ruler.GetName] довелося йти важким шляхом. [target_ruler.GetSheHe|U] заздалегідь знав, що відвідування такого гірського місця не буде легкою прогулянкою, але труднощі походу виявилися більш виснажливими, ніж очікувалося. Занадто круті та скелясті для коней, процесія була змушена продовжувати пішки, але ґрунт був слизьким і підступним. Настав фатальний час, коли [target_ruler.GetShortNameWithNoTooltip] втратив опору, і [target_ruler.GetSheHe] скотився з гори. Отримані травми досить серйозні, і [target_ruler.GetSheHe] знадобиться вся медична допомога, яку може надати наш [ROOT.GetCountry.GetFlavorRank], а також прихильність [ROOT.GetCountry.GetReligion.GetGodName], якщо [target_ruler.GetSheHe] має одужати."
  pilgrimage_events.5.a: "Зібрати найкращих цілителів."
  pilgrimage_events.5.a.tt: "[target_ruler.GetName] поранений, і ми кличемо найкращих цілителів, щоб допомогти [target_ruler.GetHerHim]"
  pilgrimage_events.5.b: "Ми можемо лише молитися."
  pilgrimage_events.5.b.tt: "[target_ruler.GetName] поранений, і ми молимося до [ROOT.GetCountry.GetReligion.GetGodName] за [target_ruler.GetHerHis] одужання"