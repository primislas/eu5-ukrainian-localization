l_english:
  mayan_events.1.title: "Початок Нового Катуна"
  mayan_events.1.desc: "Через двадцять років починається новий Катун у Довгому Літочисленні нашого народу.\n\nНаш обов'язок як провідників [ROOT.GetCountry.GetLongName] відсвяткувати величний фестиваль на честь [ROOT.GetCountry.GetReligion.GetGodName] і відзначити початок нового циклу в житті нашої культури. Наш народ очікує від нас організації такого грандіозного та пишного святкування, що його пам'ятатимуть протягом багатьох років.\n\nСаме тому ми ретельно готувалися роками, і настав час використати все це."
  mayan_events.1.a: "Хай буде прославлений [ROOT.GetCountry.GetReligion.GetGodName]."
  mayan_events.1.b: "Прискорити останні деталі!."
  mayan_events.1.c: "Ми готові."
  mayan_events.1.d: "Народ буде розчарований."