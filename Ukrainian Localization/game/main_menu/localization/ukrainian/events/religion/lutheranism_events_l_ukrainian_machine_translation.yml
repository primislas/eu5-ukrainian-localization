l_english:
  lutheranism_events.1.title: "Реформатор шукає притулку"
  lutheranism_events.1.desc: "[reformer.GetName], один із великих богословів нашого часу, був змушений покинути свою батьківщину, [reformer_fleeing_from_here.GetLongName], оскільки побоюється за свою безпеку. Як [ShowReligionAdjective('lutheran')] країна, наш обов'язок запропонувати цій людині безпечний притулок, водночас це, безсумнівно, зміцнить позиції нашої Державної Церкви, принаймні доти, доки цей реформатор погоджуватиметься з нашою політикою."
  lutheranism_events.1.a: "Привітаймо цю велику людину!"
  lutheranism_events.1.a.tt: "Доки Реформатор живе в наших кордонах, він може критикувати або схвалювати політику нашої Державної Церкви."
  protected_reformer: "Надав притулок Реформатору"
  lutheranism_events.1.b: "Відмовити йому."
  did_not_protect_reformer: "Відмовив у притулку Реформатору"
  lutheranism_events.2.title: "Реформатор шукає притулку в [from.GetLongNameWithNoTooltip]"
  lutheranism_events.2.desc: "Один із найвидатніших прихильників Реформації в нашій країні, [reformer.GetName], виїхав до [from.GetLongName], стверджуючи, що боїться переслідувань з боку [ShowReligionAdjective('catholic')] влади тут. Однак, не задовольнившись простим від'їздом, чоловік тепер проводить час, створюючи памфлети, щоб висміювати не лише Католицьку Церкву, а й свою стару батьківщину."
  lutheranism_events.2.a: "Обурливо!"
  lutheranism_events.3.title: "[reformer.GetNameWithNoTooltip] помічений у критиці Державної Церкви"
  lutheranism_events.3.desc: "Наявність такого вольового реформатора, як [reformer.GetName], у наших кордонах викликала певне тертя. Здається, людина, яка вже відмовилася від своєї старої країни, може бути досить неохочою до того, щоб пом'якшити свої погляди відповідно до політики свого нового дому."
  lutheranism_events.3.a: "Жити під нашим захистом означає підтримувати Церкву!"
  lutheranism_events.3.b: "Що ж, якщо ви так сильно про це думаєте..."
  lutheranism_events.6.title: "Страх криптокатоликів"
  lutheranism_events.6.desc: "У нашій державі завжди присутній страх, що деякі особи, які заявляють про віру в усі аспекти нашої державної Церкви, все ще таємно є [ShowReligionName('catholic')] симпатиками. Зокрема, одна шляхетна родина, хоча й міцно вкорінена в механізмі держави, за чутками, має папістські нахили. З роками ці чутки не вщухають і тепер здаються майже неможливими для нас ігнорувати."
  lutheranism_events.6.a: "Обмежити цю родину від обіймання посад."
  lutheranism_events.6.b: "Їх треба віддати під суд."
  lutheranism_events.6.c: "Ігнорувати ці мерзенні чутки."
  lutheranism_events.7.title: "Останні дні [ROOT.GetCountry.GetNameWithNoTooltip]"
  lutheranism_events.7.desc: "Релігійний запал охопив [ROOT.GetCountry.GetName], оскільки населення переконалося, що кінець світу наближається. Селяни стверджують, що бачать знаки в небі, і, всупереч доктрині Державної Церкви, місцеві священики читають проповіді про апокаліпсис. Оскільки міленаризм охоплює провінцію, провина покладається на Державу та саму Державну Церкву, яка заявляє, що є лютеранською, але явно не відповідає своїй назві.\n\nОфіційна реакція на ці заворушення досі була дуже слабкою, оскільки навіть деякі серед духовенства [ROOT.GetCountry.GetCapital.GetName] вважають, що ці побоювання виправдані."
  lutheranism_events.7.a: "Спробувати заспокоїти ситуацію."
  lutheranism_events.7.b: "Діяти рішуче."
  lutheranism_events.7.c: "Вони мають рацію, боячись. Покайтеся, бо кінець близько!"
  lutheranism_events.9.title: "Послання для вірних"
  lutheranism_events.9.desc: "Однією з найбільших переваг Державної Церкви є можливість одночасно охопити всіх вірних у нашій країні. Наближається національний день молитви, і за звичаєм проповідь у цей день частково диктується центральною Державною Церквою. На чому має зосередитися проповідь, дивлячись у майбутні роки?"
  lutheranism_events.9.a: "Вдячність за мир, яким ми зараз насолоджуємося."
  lutheranism_events.9.b: "Виправдання наших війн."
  lutheranism_events.9.c: "Чистота віри."
  lutheranism_events.9.d: "Єдність самого християнства."
  lutheranism_events.9.e: "Уникати втручання на місцевому рівні."
  lutheranism_events.10.title: "Опір Реформації в [ROOT.GetCountry.GetNameWithNoTooltip]"
  lutheranism_events.10.desc: "Все ще є ті, особливо в сільській місцевості, хто протистоїть Державній Церкві [ROOT.GetCountry.GetLongName] і хто прагне повернутися в обійми Римської Церкви. Однак існує велика різниця між релігійними сумнівами та відкритим повстанням, хоча досі в [ROOT.GetCountry.GetName] було тихо. Таким чином, Державна Церква була задоволена тим, що залишала більшість цих дисидентів у спокої, доки вони продовжували відвідувати служби та платити податки.\n\nЗдається, цьому миру не судилося тривати. Нещодавнє привласнення церковного срібла в цьому районі було розцінено місцевими жителями як відкрите оголошення війни, і тепер вони беруться за зброю, щоб захистити свої церкви від жадібних рук [ROOT.GetCountry.GetCapital.GetName]."
  lutheranism_events.10.a: "Час для рішучого переконання."
  lutheranism_events.10.b: "Звільнити цю територію від збору поки що."
  lutheranism_events.11.title: "Теологи засуджують Церкву [ROOT.GetCountry.GetNameWithNoTooltip]"
  lutheranism_events.11.desc: "Багато теологів мали багатообіцяючі кар'єри задовго до того, як Реформація досягла нашої країни і була створена Державна Церква [ROOT.GetCountry.GetLongName]. Впливові люди з твердо вкоріненими ідеями, цих осіб було важко переконати прийняти нову природу Церкви. Цей опір змінам лише посилився з роками, і тепер ці теологи сприймаються як відкрито протилежні Церкві. Наші люди не можуть бути помічені в такій відвертій опозиції до [ROOT.GetCountry.GetGovernment.GetRuler.GetName]; щось треба робити!"
  lutheranism_events.11.a: "Вигнати їх!"
  lutheranism_events.11.b: "Судити їх за богохульство і наказати їх стратити."
  lutheranism_events.11.c: "Як прикро..."
  lutheranism_events.12.title: "Католицький мислитель при дворі"
  lutheranism_events.12.desc: "[target_character.GetName] відомий своїм гострим інтелектом, і його присутність при нашому дворі надає певну велич нашому імені. [target_character.GetNameWithNoTooltip], однак, також є стійким [ShowReligionName('catholic')] і йому було дозволено сповідувати свою віру, як він бажає, щоб утримати його тут. Було б немислимо, щоб сама Церква [ROOT.GetCountry.GetName] критикувала [ROOT.GetCountry.GetGovernment.GetRuler.GetName], але на вулицях [ROOT.GetCountry.GetCapital.GetName] говорять про те, що [target_character.GetNameWithNoTooltip] намагається насадити підривні католицькі ідеї в голову [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]."
  lutheranism_events.12.a: "Нехай говорять."
  lutheranism_events.12.b: "Відсторонити їх від двору."
  lutheranism_events.13.title: "Вплив кальвінізму"
  lutheranism_events.13.desc: "Ходять чутки, що [minister.GetName], близький радник [ROOT.GetCountry.GetGovernment.GetRuler.GetName], насправді приховує [ShowReligionAdjective('calvinist')] переконання. Низка нещодавніх законів, запропонованих цим радником, були названі спробами таємно наблизити нашу країну до ідеалів Реформованих церков."
  lutheranism_events.13.a: "Відкинути ці чутки як нісенітницю."
  lutheranism_events.13.b: "Публічно дистанціюватися від [minister.GetNameWithNoTooltip]"
  lutheranism_events.14.title: "Виховання [ROOT.GetCountry.GetGovernment.GetHeir.GetName]"
  lutheranism_events.14.desc: "Вчителі [ROOT.GetCountry.GetGovernment.GetHeir.GetName] всі вважають [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHim] винятково багатообіцяючим майбутнім правителем. У всьому, що стосується державотворення, [ROOT.GetCountry.GetGovernment.GetHeir.GetName] показав [ROOT.GetCountry.GetGovernment.GetHeir.GetHerselfHimself] себе як зацікавленим, так і талановитим. Однак релігійні авторитети почали турбуватися, що [ROOT.GetCountry.GetGovernment.GetHeir.GetSheHe] занадто сильно зацікавився католицькою вірою, яку ми залишили позаду."
  lutheranism_events.14.a: "Це зробить [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHim] кращим правителем."
  lutheranism_events.14.b: "Заборонити будь-яке вивчення папістських вчень."
  lutheranism_events.15.title: "Католицькі схильності [ROOT.GetCountry.GetGovernment.GetRuler.GetName]"
  lutheranism_events.15.desc: "Не секрет, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] чудово розуміється на католицькій вірі, можливо, набагато краще, ніж хотіло б духовенство нашої Державної Церкви. Проте, коронація [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] була популярною подією, і народ, здається, підтримує нашого нового правителя. Розуміння іноземних вірувань, безсумнівно, буде корисним для правителя Лютеранського Королівства, і мало хто наважиться звинуватити [ROOT.GetCountry.GetGovernment.GetRuler.GetName] у криптокатолицизмі."
  lutheranism_events.15.a: "Хай живе [ROOT.GetCountry.GetGovernment.GetRuler.GetName]!"
  STATIC_MODIFIER_NAME_tolerant_monarch: "Толерантний монарх"
  STATIC_MODIFIER_DESC_tolerant_monarch: "Наш правитель відомий своїм глибоким розумінням інших вірувань, і релігійні меншини під нашим правлінням користуються привілеями, яких вони інакше не мали б завдяки цьому."
  lutheranism_events.16.title: "Совість [ROOT.GetCountry.GetGovernment.GetRuler.GetName]"
  lutheranism_events.16.desc: "Минули роки, і [ROOT.GetCountry.GetGovernment.GetRuler.GetName] виявився справедливим і праведним правителем. Духовенство більше не боїться раптового католицького перевороту, а їхня ненависть до папізму була пом'якшена розумінням [ROOT.GetCountry.GetGovernment.GetRuler.GetName] цієї релігії.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] [ROOT.GetCountry.GetGovernment.GetRuler.GetHerselfHimself], однак, стурбований. З роками [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] усвідомив, що [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] особиста віра набагато ближча до католиків, яких [ROOT.GetCountry.GetGovernment.GetRuler.GetSheHe] так багато зробив для захисту, а не до догматичної Державної Церкви [ROOT.GetCountry.GetName]."
  lutheranism_events.16.a: "Особисте зречення — єдине рішення."
  lutheranism_events.16.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] доведеться жити з обтяженою совістю."
  STATIC_MODIFIER_NAME_plagued_conscience: "Обтяжена совість"
  STATIC_MODIFIER_DESC_plagued_conscience: "Наш правитель далекий від палкого віруючого у вчення нашої Державної Церкви. Хоча це безпосередньо не впливає на нашу політику, це означає, що управління самою Церквою стало низьким пріоритетом."
  lutheranism_events.17.title: "Тертя між [ROOT.GetCountry.GetGovernment.GetHeir.GetName] та [ROOT.GetCountry.GetGovernment.GetRuler.GetName]"
  lutheranism_events.17.desc: "Інтерес [ROOT.GetCountry.GetGovernment.GetHeir.GetName] до католицизму, здається, лише зростав протягом років, і [ROOT.GetCountry.GetGovernment.GetHeir.GetSheHe] тепер оточує [ROOT.GetCountry.GetGovernment.GetHeir.GetHerselfHimself] філософами, вченими та художниками з католицького світу. Це перетворилося на щось на кшталт збентеження. Як голова Церкви [ROOT.GetCountry.GetName], обов'язок [ROOT.GetCountry.GetGovernment.GetRuler.GetName] — підтримувати цінності Реформації. Якщо [ROOT.GetCountry.GetGovernment.GetHeir.GetName] не вдасться переконати змінитись, [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHis] авторитет над нашою Церквою може постраждати."
  lutheranism_events.17.a: "Спробувати змусити [ROOT.GetCountry.GetGovernment.GetHeir.GetName] змінити [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHis] погляди."
  lutheranism_events.17.b: "Погодитися не погоджуватися."
  lutheranism_events.18.title: "[ROOT.GetCountry.GetGovernment.GetHeir.GetName] бачить помилку [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHis] шляхів"
  lutheranism_events.18.desc: "Після того, як [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHim] було цілком зрозуміло, чого від [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHim] очікують, [ROOT.GetCountry.GetGovernment.GetHeir.GetName] погодився чіткіше дистанціюватися [ROOT.GetCountry.GetGovernment.GetHeir.GetHerselfHimself] від католиків та їхніх вірувань."
  lutheranism_events.18.a: "Слава Богу!"
  lutheranism_events.20.title: "[ROOT.GetCountry.GetGovernment.GetHeir.GetName] не бажає йти на компроміс"
  lutheranism_events.20.desc: "Незважаючи на спроби максимально чітко пояснити, які очікування від королівського спадкоємця, [ROOT.GetCountry.GetGovernment.GetHeir.GetName] наполягає на збереженні [ROOT.GetCountry.GetGovernment.GetHeir.GetHerHis] шкідливого захоплення Католицькою Церквою. У столиці пропагандисти та сатирики вже почали розповсюджувати памфлети про те, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName], схоже, не може контролювати власну рідню, не кажучи вже про захист вірних королівства."
  lutheranism_events.20.a: "Нічого не можна вдіяти."
  lutheranism_events.20.b: "У нас немає вибору, окрім як позбавити [ROOT.GetCountry.GetGovernment.GetHeir.GetName] спадщини!"
  STATIC_MODIFIER_NAME_disinherited: "Позбавлений спадщини"
  lutheranism_events.22.title: "Примарна надія на примирення"
  lutheranism_events.22.desc: "Ще є ті, хто тужить за часами, коли християнська віра була єдиною. Хоча вони вважають Реформацію та народження лютеранства необхідними, вони також шкодують, що це не могло статися без розколу.\n\nХоча такі схильності й мають добрі наміри, вони можуть бути дуже шкідливими для Державної Церкви, такої як наша. Тому викликає певне занепокоєння те, що низка посадовців нашої Церкви, а також деякі в нашій Семінарії, схоже, розважають такі ідеї."
  lutheranism_events.22.a: "Догани буде достатньо."
  STATIC_MODIFIER_NAME_phillipists: "Філіппісти"
  lutheranism_events.22.b: "Зберіть видатних і судіть їх за державну зраду."
  lutheranism_events.23.title: "Лютеранська діаспора"
  lutheranism_events.23.desc: "Оскільки християнський світ стає все більш розділеним, потік релігійних біженців до нашої країни перетворився на стабільний потік. Релігійні конфлікти у великих католицьких державах змусили багатьох лютеран покинути свої старі батьківщини. Як лютеранська країна з власною Церквою, ми могли б запропонувати їм захист, а також добре використати їхні навички та активи.\n\nЛютеранство, однак, далеко не єдина віра, і дуже малоймовірно, що всі, хто прийде до нас, знайдуть Церкву [ROOT.GetCountry.GetName] такою, що повністю відповідає їхнім власним переконанням. Хоча було б похвально приймати всіх лютеранських іммігрантів, можливо, було б розсудливіше відбирати тих, хто володіє навичками, які ми могли б добре використати."
  lutheranism_events.23.a: "Відкрити наші кордони для всіх лютеран."
  lutheranism_events.23.c: "Запропонувати їм землю в Новому Світі."
  lutheranism_events.23.d: "Відвернути їх."
  welcomed_fleeing_lutherans: "Прийняті біженці"
  turned_away_fleeing_lutherans: "Відвернуті біженці"
  lutheranism_events.27.title: "Суворий теолог"
  lutheranism_events.27.desc: "Винятковий чоловік нещодавно вийшов із системи освіти Церкви [ROOT.GetCountry.GetName]. Він священик надзвичайної харизми та переконання, проте, замість того, щоб бажати змінити Церкву відповідно до своїх власних переконань, він сповнений рішучості прищепити своїм послідовникам цінність дотримання лютеранських традицій та догматів Державної Церкви.\n\nВін видатна людина в такі часи, і ми, безсумнівно, могли б добре його використати."
  lutheranism_events.27.a: "Нехай він навчає наших священиків."
  lutheranism_events.27.b: "Використаймо його для боротьби з єрессю."
  lutheranism_events.29.title: "Реформатор вихваляє Церкву [ROOT.GetCountry.GetNameWithNoTooltip]"
  lutheranism_events.29.desc: "Один із великих мислителів, що стоять на чолі Реформації, нещодавно представив нашу країну як зразок для наслідування іншим у одній зі своїх публікацій, а також під час диспуту. Це, безсумнівно, зміцнить нашу міжнародну репутацію та надасть додаткової ваги авторитету самої нашої Церкви."
  lutheranism_events.29.a: "Використаймо це в нашій внутрішній пропаганді."
  lutheranism_events.29.b: "Це допоможе наблизити нас до інших лютеран."
  beacon_of_lutheranism: "Ідеальна лютеранська країна"
  lutheran_ideal: "Ідеальна лютеранська країна"
  lutheranism_events.30.title: "Суди над відьмами в [witch_location.GetNameWithNoTooltip]"
  lutheranism_events.30.desc: "Перехід від приналежності до ширшої Римо-Католицької Церкви до місцевої Церкви [ROOT.GetCountry.GetLongName] загалом пройшов успішно, але в деяких областях, таких як [witch_location.GetName], стало незрозуміло, де лежить релігійна влада. Коли в давнину виникала підозра у чаклунстві, Католицька Церква часто втручалася і могла стримувати обурення місцевого населення. Реформація, з іншого боку, багато зробила для зміцнення віри в народні версії християнства поза Римською Церквою.\n\nКілька жінок звинувачуються у чаклунстві в [ROOT.GetCountry.GetNameWithNoTooltip], і вже розпочато пошук інших. Місцеві священики та магістрати заплуталися в судових процесах, але досі держава не була залучена. Оскільки кількість жінок, які очікують суду, зростає, можливо, нам доведеться діяти."
  lutheranism_events.30.a: "Схвалити суди."
  lutheranism_events.30.b: "Відкинути Суди."
  lutheranism_events.30.c: "Ми мусимо зупинити ці Суди."
  lutheranism_events.40.title: "Держава Захищає Відьом"
  lutheranism_events.40.desc: "Наші спроби вгамувати дедалі параноїдальніше полювання на відьом у [witch_location.GetName] були цілком неправильно зрозумілі місцевим населенням. Наших емісарів самих звинуватили у чаклунстві, і частина населення стала ворожою до будь-якої зовнішньої сили, яку сприймають як таку, що захищає відьом, які нібито переслідують регіон."
  lutheranism_events.40.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  lutheranism_events.31.title: "Поширення Ворожих Публікацій"
  lutheranism_events.31.desc: "Велика кількість памфлетів, гравюр та інших дрібних публікацій почала поширюватися останнім часом, безсумнівно, фінансованих нашими ворогами. У цих мерзенних текстах стверджується, що багато аспектів Церкви [ROOT.GetCountry.GetName] були розроблені для зручності держави.\n\nХоча сумнівно, що ця критика залишить постійний слід на репутації нашої Державної Церкви, її іміджу було завдано шкоди в короткостроковій перспективі."
  lutheranism_events.31.a: "Прикро."
  lutheranism_events.32.title: "Інкорпорація нових регіонів"
  lutheranism_events.32.desc: "Оскільки наша країна розширюється в нові регіони з лютеранським населенням, ми розпочали процес включення цих людей до Державної Церкви. Введення церковних парафіяльних реєстрів у деяких нещодавно придбаних землях принесло дивовижне відкриття: територія набагато щільніше заселена, ніж, здається, усвідомлювали її колишні господарі."
  lutheranism_events.32.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  lutheranism_events.33.title: "Пієтизм"
  lutheranism_events.33.desc: "Новий вид лютеранського руху, відомий як пієтизм, почав поширюватися в нашій країні. Пієтисти стурбовані внутрішнім спасінням і виявляють мало інтересу як до теологічних досліджень, так і до догм Державної Церкви."
  lutheranism_events.33.a: "Спробувати обмежити його вплив."
  lutheranism_events.33.b: "Підійдімо до пієтистів із зацікавленістю."
  lutheranism_events.34.title: "Іконоборчі Заворушення в [target_province.GetNameWithNoTooltip]"
  lutheranism_events.34.desc: "Ненависть до ікон та зображень старої Католицької Церкви є спільною рисою багатьох лютеран, і політика дозволу цих зображень у Церкві [ROOT.GetOwner.GetLongName] тому ніколи не була цілком безпроблемною.\n\nРозлючене тим, що вони вважають ідолопоклонством, населення [target_province.GetName] штурмувало багато церков у провінції, розбиваючи розписані вікна та знищуючи ікони й вівтарі."
  lutheranism_events.34.a: "Покарати винних."
  lutheranism_events.34.b: "Відремонтувати та відновити пошкоджені церкви."
  lutheranism_events.35.title: "Харизматичний Проповідник-Патріот у [target_province.GetNameWithNoTooltip]"
  lutheranism_events.35.desc: "[target_province.GetName] – це регіон, повний невеликих лютеранських церков, які всі відкидають ідею централізованої, догматичної Церкви.\n\nХаризматичний проповідник здобув тут популярність, і хоча його проповіді об'єднують громади, вони також спонукають людей зберігати свою автономію від Церкви їхньої старої батьківщини."
  lutheranism_events.35.a: "Занадто багато зусиль, щоб щось робити."
  lutheranism_events.35.b: "Зробімо все можливе, щоб зменшити його вплив."