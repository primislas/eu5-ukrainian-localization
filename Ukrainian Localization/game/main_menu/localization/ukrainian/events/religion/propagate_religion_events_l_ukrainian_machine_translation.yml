l_english:
  propagate_religion_events.1.title: "[ShowReligionGroupAdjectiveWithNoTooltip('muslim')] Торговці в [target_location.GetNameWithNoTooltip]"
  propagate_religion_events.1.desc: "[target_country.GetAdjective] [ShowReligionGroupAdjective('muslim')] торговці стають все більш поширеним явищем у наших портах, і ми звикли до них та їхньої релігії. Зокрема, в [target_location.GetName] ці купці стали настільки звичними, що вже відчуваються невід'ємною частиною місцевого населення.\n\nНещодавно деякі з цих торговців звернулися до [ROOT.GetCountry.GetGovernment.GetCourtTitle] з проханням дозволити їм побудувати власне поселення, одразу за межами [target_location.GetNameWithNoTooltip]."
  propagate_religion_events.1.a: "З цього може вийти тільки добро."
  propagate_religion_events.1.b: "Ні, вони повинні залишатися там, де ми можемо їх контролювати."
  propagate_religion_events.2.title: "[target_country.GetReligion.GetAdjectiveWithNoTooltip] Місіонери"
  propagate_religion_events.2.desc: "Група [target_country.GetReligion.GetAdjective] місіонерів з [target_country.GetName] прибула до нас, бажаючи оселитися в [target_location.GetName], щоб заснувати там нову громаду для себе та своїх навернених. Вони співпрацюють з місцевою владою і не протистоять нашому правлінню, але їхня присутність, ймовірно, призведе до швидшого поширення їхньої релігії на всю територію."
  propagate_religion_events.2.a: "Ми не можемо дозволити владі вислизнути до сторонніх груп, таких як ця."
  propagate_religion_events.2.b: "Вони стануть бажаним доповненням до нашого суспільства."
  location_pops_convert_to_muslim.tt: "#Y 1%#! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName] [Concept('convert', 'CONCEPT_PLACEHOLDER')|e] до [target_country.GetReligion.GetName]"
  propagate_religion_events.3.title: "[ShowReligionGroupAdjectiveWithNoTooltip('muslim')] Моряки"
  propagate_religion_events.3.desc: "Від найсхідніших морів до тепліших вод, що несуть мусони, безліч кораблів постійно курсують між численними портами, від невеликих дау до великих галер. Разом ця торговельна мережа забезпечує товарами та припасами понад половину населення світу. Багато з цих галер мають спільне те, що ними керують [ShowReligionGroupAdjective('muslim')] моряки з [ShowContinentName('africa')] або [ShowSubContinentName('middle_east')], до яких приєднуються навернені місцеві жителі."
  propagate_religion_events.3.a: "Заохочуймо цих моряків шукати наші порти!"
  propagate_religion_events.3.b: "Нам не потрібні чужі віри на наших кораблях."
  propagate_religion_events.4.title: "Диво"
  propagate_religion_events.4.desc: "Вчена [target_character.GetWomanMan] з [target_country.GetName], як кажуть, вилікувала частину населення в [target_location.GetName] від важкої хвороби. Місцеві жителі дуже вражені і вирішили прийняти віру цього мудреця, щоб [target_character.GetHerHis] Бог міг захистити їх у майбутньому."
  propagate_religion_events.4.a: "Це добрий знак."
  propagate_religion_events.4.b: "Запросімо цю [target_character.GetWomanMan] до [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  propagate_religion_events.5.title: "Мечеть заснована в [target_location.GetNameWithNoTooltip]"
  propagate_religion_events.5.desc: "[target_location.GetDominantReligion.GetAdjective] віряни [target_location.GetName] заснували нове місце для свого дому поклоніння. Мечеть є новим чітким центром громади і, ймовірно, привабить більшу кількість людей для поселення тут. Вона також сприятиме місцевому наверненню всієї території.\n\nЄ чіткі ознаки того, що нова мечеть частково фінансується багатьма [target_country.GetAdjective] торговцями, активними в регіоні, і в нашому уряді дехто турбується, що це може призвести до надмірного впливу для них та їхньої релігії."
  propagate_religion_events.5.a: "Ми не можемо цього дозволити."
  propagate_religion_events.5.b: "Надамо їм підтримку, необхідну для побудови кращої громади."
  propagate_religion.5.b.tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetArea.GetName] втратить [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e] та отримає [ShowModifier('mosque_of_x')] на #Y 10#! років"
  propagate_religion_events.6.title: "$rank_kingdom_muslim$ [ROOT.GetCountry.GetNameWithNoTooltip]?"
  propagate_religion_events.6.desc: "Оскільки [ShowReligionGroupName('muslim')] все частіше стає домінуючою релігією нашого [ROOT.GetCountry.GetFlavorRank], багато наших урядовців, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та інших знатних осіб почали переймати ісламські та [ShowLanguageName('arabic_language')] уявлення про царство, імена та титули. Багато хто фактично почав називати [ROOT.GetCountry.GetFlavorRank] $rank_kingdom_muslim$, хоча наша офіційна державна релігія все ще [ROOT.GetCountry.GetReligion.GetName]. Деякі радники [target_ruler.GetName] тепер припускають, що було б розсудливо погодитися з цим. Якщо ми почнемо називати нашу власну країну $rank_kingdom_muslim$, це може полегшити відносини з багатьма [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] країнами по всьому світу."
  propagate_religion_events.6.a: "Це слушна ідея."
  sultan_titles_for_non_muslims_tooltip: "Ми приймемо [ShowReligionGroupAdjective('muslim')] титули, покращивши наші відносини на #G 75#! з усіма відомими [ShowReligionGroupAdjective('muslim')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  propagate_religion_events.6.b: "Ні, ми повинні захищати традиційні цінності [ROOT.GetCountry.GetLongNameWithNoTooltip]!"
  propagate_religion_events.7.title: "Приєднання до Спільноти Вірних"
  propagate_religion_events.7.desc: "Оскільки [ROOT.GetCountry.GetReligion.GetName] тепер є офіційною релігією [ROOT.GetCountry.GetName], ми приєдналися до спільноти Вірних. Хоча деякі традиціоналісти, що залишилися, оплакують цю зміну, набагато більше нашого [ShowReligionGroupAdjective('muslim')] населення тепер радіє справедливому правлінню нашого [ROOT.GetCountry.GetFlavorRank]."
  propagate_religion_events.7.a: "[ROOT.GetCountry.GetLongNameWithNoTooltip] буде тріумфувати!"
  sultan_conversion_tooltip: "Наші відносини покращаться на #G 50#! з усіма відомими [ShowReligionGroupAdjective('muslim')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  propagate_religion_events.8.title: "Мандрівний Вчений"
  propagate_religion_events.8.desc: "Вчений [target_character.GetWomanMan] із землі [target_country.GetName] прибув до [ROOT.GetCountry.GetCapital.GetName]. [target_character.GetSheHe|U] стверджує, що навчався у вчених у багатьох відомих містах, і [target_character.GetSheHe] обізнаний у політиці великого [ShowReligionGroupAdjective('muslim')] світу, а також у складних питаннях теології."
  propagate_religion_events.8.a: "Запропонуймо [target_character.GetHerHim] місце при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  propagate_religion_events.8.b: "Дізнаймося якомога більше про стан справ за кордоном."
  propagate_religion_events.9.title: "[ShowReligionGroupAdjectiveWithNoTooltip('muslim')] Вожді"
  propagate_religion_events.9.desc: "У [ROOT.GetCountry.GetAdjective] глибинці багато вождів правлять своїми маленькими володіннями з незначним втручанням центральної влади. Однак, хоча їм бракує здатності проектувати велику владу, деякі мають більші амбіції. Деякі місцеві вожді в [target_location.GetName] дали назву більшим претензіям, почавши називати себе султанами та намагаючись заявити про легітимність, навертаючи своє населення до [ShowReligionGroupName('muslim')]."
  propagate_religion_events.9.a: "Смішно."
  propagate_religion_events.10.title: "[ShowReligionGroupAdjectiveWithNoTooltip('muslim')] Синкретизм"
  propagate_religion_events.10.desc: "Дедалі частіше в [ROOT.GetCountry.GetAdjective] сільській місцевості можна побачити мандрівних суфійських вчених, містичних місіонерів [ShowReligionGroupAdjective('muslim')] віри. Їх часто тепло приймають не лише їхні брати по вірі, а й сільське населення, яке знайшло спосіб інтегрувати [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] віровчення у власні традиції та міфи. Результат не є чимось, що пасувало б [ShowLocationName('mecca')] чи [ShowLocationName('cairo')], але це зробило багатьох більш схильними до [ShowReligionGroupNameWithNoTooltip('muslim')] загалом."
  propagate_religion_events.10.a: "Ми повинні захищати віру наших предків!"
  propagate_religion_events.10.b: "Якої шкоди можуть завдати ці люди."
  propagate_religion_events.11.title: "[ShowReligionGroupAdjectiveWithNoTooltip('muslim')] Біженці"
  propagate_religion_events.11.desc: "Кілька біженців з далекої війни в [target_country.GetName] прибули до наших кордонів. Їх очолює [ShowReligionGroupAdjective('muslim')] $rank_county_arabic_ruler_male$ і вони стверджують, що якщо ми просто дозволимо їм деяку незайняту землю, вони створять для себе процвітаюче поселення та вестимуть продуктивне життя як наші піддані."
  propagate_religion_events.11.a: "Ми могли б мати ідеальне місце для них."
  propagate_religion_events.11.b: "Вони повинні мати змогу знайти притулок деінде."