l_english:
  orthodox_flavor.1.title: "Рух нестяжателів"
  orthodox_flavor.1.desc: "Церква є великим землевласником, і це принесло їй велике багатство. Нестяжателі стверджують, що Церква розбещується цим великим багатством. Їхні опоненти заперечують, що Церква потребує цього багатства для виконання своєї святої місії. Головне, що Церква насправді не є великим платником податків; якби її змусили віддати свої землі, вони перейшли б у руки людей, яких ми можемо оподатковувати. Недоліком було б те, що Церква мала б менше багатства для виконання своєї місії."
  orthodox_flavor.1.a: "Підтримати церковну владу"
  orthodox_flavor.1.b: "Підтримати рух"
  orthodox_flavor.2.title: "Великий Синод"
  orthodox_flavor.2.desc: "Церква зібралася на великий Синод, вони просять нашої підтримки та певних привілеїв в обмін на допомогу в боротьбі з антифеодальними єресями, що переслідують нашу землю. Чи допоможемо ми Церкві утримувати людей на їхньому місці, чи підтримаємо ці рухи, щоб зруйнувати старий феодальний лад?"
  orthodox_flavor.2.a: "Надати привілеї"
  orthodox_flavor.2.b: "Вони самі по собі"
  orthodox_flavor.3.title: "Літургійна реформа"
  orthodox_flavor.3.desc: "Східна Православна Церква є Єдиною, Святою, Соборною та Апостольською Церквою, заснованою Ісусом Христом, нашим Господом, та його апостолами. Однак наша сім'я велика і різноманітна. Наш патріарх пропонує деякі реформи нашої літургії, які наблизять нашу форму до інших церков. Ідея смілива і зміцнить Церкву, але ми знаємо, що забобонні та відсталі відкинуть цю зміну."
  orthodox_flavor.3.a: "Підтримати реформу"
  orthodox_flavor.3.b: "Дотримуватися старих звичаїв"
  orthodox_flavor.4.title: "Зменшити незалежність Церкви"
  orthodox_flavor.4.desc: "Церква є могутньою інституцією, але що важливіше, заможною. Якби ми приборкали Церкву і зробили її більшою частиною держави, ми також отримали б більше доходу від оподаткування. З іншого боку, ми також підірвали б її авторитет в очах мас."
  orthodox_flavor.4.a: "Захистити їхню незалежність"
  orthodox_flavor.4.b: "Приборкати їх"
  orthodox_flavor.5.title: "Державні миряни?"
  orthodox_flavor.5.desc: "Якби ми сприяли та зміцнювали повноваження мирян в церковній адміністрації та запровадили більше державних призначень, ми б підпорядкували Церкву центральному контролю. Інша сторона медалі полягає в тому, що ми завдамо шкоди моральному авторитету Церкви серед народу."
  orthodox_flavor.5.a: "Нехай Свята Церква буде"
  orthodox_flavor.5.b: "Призначити їх"
  orthodox_flavor.6.title: "Синод з державних справ"
  orthodox_flavor.6.desc: "$orthodox_flavor_synod_prev_string$ Цей Синод зосередиться на державних справах."
  orthodox_flavor.6.a: "Законодавство принесе користь центральній владі."
  orthodox_flavor.6.b: "Ми повинні прагнути стабілізувати наш внутрішній стан."
  orthodox_flavor.6.c: "Давайте продемонструємо наш престиж світові."
  orthodox_flavor_synod_prev_string: "Згідно з порядком, заведеним нашими пращурами та найвищою церковною владою [ShowReligionName('orthodox')], ми скликали Синод задля дослідження та вдосконалення нашого законодавства. Різноманітні видатні члени [ShowEstateTypeName('clergy_estate')] присутні, прагнучи почути завершення церемоній."
  orthodox_flavor.7.title: "Синод з церковних справ"
  orthodox_flavor.7.desc: "$orthodox_flavor_synod_prev_string$ Цей Синод зосередиться на церковних справах."
  orthodox_flavor.7.a: "Ухвалити законодавство, прихильне до [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]."
  orthodox_flavor.7.b: "Ми повинні прагнути стягнути справедливий податок з нашого духовенства."
  orthodox_flavor.8.title: "Синод з місцевого управління"
  orthodox_flavor.8.desc: "$orthodox_flavor_synod_prev_string$ Цей Синод зосередиться на нашому місцевому управлінні."
  orthodox_flavor.8.a: "Ми дбатимемо про весь народ."
  orthodox_flavor.8.b: "Посилити наші зусилля з навернення."
  orthodox_flavor.8.c: "Дозвіл на вивчення іноземних текстів розширить наші горизонти..."
  orthodox_flavor.9.title: "Синод з кабінетних засідань"
  orthodox_flavor.9.desc: "$orthodox_flavor_synod_prev_string$ Цей Синод зосередиться на наших кабінетних засіданнях."
  orthodox_flavor.9.a: "Забезпечити ефективний кабінет."
  orthodox_flavor.9.b: "Посилити дослідницькі зусилля."
  orthodox_flavor.9.c: "Розширити поточний адміністративний апарат."
  orthodox_flavor.10.title: "Синод з питань зовнішньої політики"
  orthodox_flavor.10.desc: "$orthodox_flavor_synod_prev_string$ Цей Синод зосередиться на нашій зовнішній політиці."
  orthodox_flavor.10.a: "Законодавче оформлення посольства принесе нам користь."
  orthodox_flavor.10.b: "Кодифікувати війни проти невіруючих."
  orthodox_flavor.11.title: "Пентархія"
  orthodox_flavor.11.desc: "Повернувши всі п'ять Патріархатів до [ShowReligionGroupAdjective('christian')] - [ShowReligionAdjective('orthodox')] - лона, ми відновили стару Пентархію, тим самим ефективно поклавши край Великій Східно-Західній Схизмі. Хоча деякі країни можуть продовжувати триматися [ShowReligionName('catholic')], [GetCountry('PAP').GetFlavorRank] втратив свій хвалений примат як законний наступник Святого Петра та єпископ [ShowLocationName('rome')]."
  orthodox_flavor.11.a: "Рана загоєна!"
  orthodox_flavor.100.title: "Синод [GetCurrentYear] року"
  orthodox_flavor.100.desc: "Церковні справи нашого царства вимагають обережної турботи та уваги, якщо ми хочемо зберегти наші [ShowReligionAdjective('orthodox')] традиції. Щоб обговорити наявні питання та визначити спільну мету в нашій духовній сфері, найсвятіший [ShowGenericActionName('orthodox_synod')] буде скликаний негайно."
  orthodox_flavor.100.a: "Ми обговоримо наші внутрішні справи."
  orthodox_flavor.100.b: "Обміркуймо справи духовні"
  orthodox_flavor.100.c: "Відкриймо книги місцевого управління."
  orthodox_flavor.100.d: "Нам слід переглянути наші кабінетні провадження."
  orthodox_flavor.100.e: "Перегляд нашої зовнішньої політики є на часі."
  STATIC_MODIFIER_NAME_orthodox_clerical_proceedings_modifier: "Духовні провадження"
  STATIC_MODIFIER_DESC_orthodox_clerical_proceedings_modifier: "Ретельніший розгляд наших духовних проваджень безперечно покращить їхню ефективність."
  STATIC_MODIFIER_NAME_orthodox_clerical_taxation_modifier: "Духовне оподаткування"
  STATIC_MODIFIER_DESC_orthodox_clerical_taxation_modifier: "Ми мусимо прагнути стягнути належний і справедливий податок з наших [ShowEstateTypeName('clergy_estate')] згідно із законом землі."
  STATIC_MODIFIER_NAME_orthodox_conversion_efforts_modifier: "Зусилля з навернення"
  STATIC_MODIFIER_DESC_orthodox_conversion_efforts_modifier: "Прагнення до побожного суспільства стало нашою головною директивою, що стосується релігійних справ."
  STATIC_MODIFIER_NAME_orthodox_spiritual_literature_and_understanding_modifier: "Духовний розгляд та обмін"
  STATIC_MODIFIER_DESC_orthodox_spiritual_literature_and_understanding_modifier: "Ми дослідимо праці іноземних авторів із Заходу та Сходу у спробі краще зрозуміти світ навколо нас."
  STATIC_MODIFIER_NAME_orthodox_cabinet_eff_modifier: "Належні провадження в Кабінеті"
  STATIC_MODIFIER_DESC_orthodox_cabinet_eff_modifier: "Високий і побожний стандарт для нашого кабінету забезпечить великі законодавчі можливості осіб, що обіймають посади по всій нашій землі."
  STATIC_MODIFIER_NAME_orthodox_cabinet_examinations_modifier: "Кабінетні розгляди"
  STATIC_MODIFIER_DESC_orthodox_cabinet_examinations_modifier: "Розширення нашої адміністрації згідно з нашим релігійним законом є великим кроком до ефективнішого уряду."
  STATIC_MODIFIER_NAME_orthodox_protect_the_faith_modifier: "На захист Віри"
  STATIC_MODIFIER_DESC_orthodox_protect_the_faith_modifier: "Заклик до зброї, щоб викорінити як язичників, так і єретиків, є музикою для вух нашого народу, коли вони стають на захист наших земель і віри."
  STATIC_MODIFIER_NAME_pious_prosperity_modifier: "Побожне процвітання"
  STATIC_MODIFIER_DESC_pious_prosperity_modifier: "Дбати про наш народ є одним з найшляхетніших прагнень, винагородженим добротою та гармонійною співпрацею між різними гілками нашого суспільства."
  orthodox_synod_diplomatic_embassy_modifier: "Дипломатичне посольство"