l_english:
  orthodox_icon_events.1.title: "Матір Христа"
  orthodox_icon_events.1.desc: "Оплакуючи втрату всієї своєї родини та сільської ферми, чоловік із розтерзаної війною провінції [eleusa_church_province.GetName], як повідомляється, провів день і ніч у молитві перед іконою Елеуси в соборі [eleusa_church_province.GetName]. Оскільки саме місто було під окупацією, його горе розділяли багато його [ROOT.GetCountry.GetAdjective] братів. Вже наступного дня здавалося, що ікона почула його молитви. Вірні люди [eleusa_church_province.GetName] повстали як один і вигнали решту ворожих сил.\nПодальша доля провінції здається неясною, але оскільки війна та спустошення переслідують [ROOT.GetCountry.GetAdjectiveWithNoTooltip] сільську місцевість, багато наших громадян звертаються до церкви за розрадою та моральною підтримкою."
  orthodox_icon_events.1.a: "Чудотворно!"
  orthodox_icon_events.3.title: "Святий Михаїл"
  orthodox_icon_events.3.desc: "Нещодавня кампанія з набору в [michael_icon_church_province.GetName] призвела до безпрецедентної кількості нових рекрутів. Місцеве духовенство переконане, що це стало результатом широкого релігійного запалу, який надихнула наша ікона Святого Михаїла. Вони повідомляють, що молоді чоловіки прибували з усіх куточків області, щоб побачити ікону Архістратига, і що вони йдуть з твердою волею йти на війну в ім'я своєї віри."
  orthodox_icon_events.3.a: "До зброї!"
  orthodox_icon_events.4.title: "Христос Пантократор"
  orthodox_icon_events.4.desc: "Як Владика всього, Христос Пантократор спостерігає згори, у багатьох церковних куполах по всій країні. Наше шанування та велика увага до цієї найцентральнішої ікони в будь-якому іконостасі також, здається, були джерелом роздумів для багатьох. Нагадавши про свою власну роль у творінні та про законне місце [ROOT.GetCountry.GetGovernment.GetRulerTitle], багато хто більше задоволений як своїм життям, так і урядом, який ними керує."
  orthodox_icon_events.4.a: "Бо Його є Царство."
  orthodox_icon_events.5.title: "Три дари Миколая"
  orthodox_icon_events.5.desc: "Наше шанування Святого Миколая, здається, справило неабияке враження на одного з купців під час нещодавнього посольства з [benevolent_if_distant_neighbor.GetName]. Купець був настільки вражений іконою Святого Миколая в [nicholas_icon_was_here.GetName], історією святого та нашою відданістю спадщині Миколая, що вирішив подарувати три дари. Один дар піде до собору, де він бачив ікону, один – художнику, який її створив, і один – благодійнику, який за неї заплатив."
  orthodox_icon_events.5.a: "Ми повинні подякувати йому від імені Церкви."
  STATIC_MODIFIER_NAME_famous_icon: "Місцева відома ікона"
  STATIC_MODIFIER_DESC_famous_icon: "Місцева ікона здобула значну славу після, здавалося б, миттєвого навернення іноземного купця в місцевому соборі. Навернений швидко став важливим благодійником Церкви, і слава ікони тепер приваблює більше людей до цієї провінції."
  st_nicholas_icon_gratitude: "Релігійна вдячність"
  orthodox_icon_events.5.b: "Ми наймемо художника на знак вдячності."
  orthodox_icon_events.5.c: "Найщедріший дар для благодійника."
  orthodox_icon_events.6.title: "[target_art.GetNameWithNoTooltip]"
  orthodox_icon_events.6.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [climacus_church_province.GetName] стверджує, що саме завдяки сильному місцевому шануванню [target_character.GetName] та прикладу, який він подав для самовдосконалення, вся провінція [target_province.GetName] тепер так процвітає. Дійсно, врожаї здаються ряснішими, а люди спокійнішими та вірнішими, ніж будь-коли раніше. [target_art.GetName] [target_character.GetNameWithNoTooltip] допоміг багатьом покращити себе протягом століть, і тепер ми, здається, знову в його боргу."
  orthodox_icon_events.6.a: "«Потоком сліз ти зробив пустелю родючою»."
  orthodox_icon_events.6.b: "«І своїм прагненням до Бога ти приніс плоди в достатку»."
  orthodox_icon_events.6.c: "«Сяйвом чудес ти осяяв увесь всесвіт»."