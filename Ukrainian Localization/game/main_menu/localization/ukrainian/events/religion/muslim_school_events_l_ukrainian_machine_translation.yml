l_english:
  muslim_school_events.1.title: "Талановитий суддя"
  muslim_school_events.1.desc: "Здобуття освіти в галузі теології та права часто є тривалим процесом, що включає вивчення класичних праць з права під керівництвом $rank_county_arabic_ruler_male$ різних [ShowBuildingTypeName('madrasa')]. За кожну вивчену працю чи коментар студент отримує сертифікат, «Іджазу». Залежно від того, яка [ShowBuildingTypeNameWithNoTooltip('madrasa')] та який $rank_county_arabic_ruler_male$, цінність «Іджази» може бути не однаковою.\n\n[ShowBuildingTypeNameWithNoTooltip('madrasa')] в [mufti_province.GetName] останнім часом справляє дуже гарне враження по всій країні, безсумнівно, студенти звідти мають велику кар'єру Каді або Муфтія попереду."
  muslim_school_events.1.a: "Нам потрібен новий Каді."
  muslim_school_events.1.b: "Муфтій у нашій столиці надасть правове керівництво."
  muslim_school_events.2.title: "$common_string_shaikh_al_islam$"
  muslim_school_events.2.desc: "Якщо Каді є суддями землі, то Муфтії – це ті, хто надає загальну правову інтерпретацію та доктрину. Однак [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] такого розміру, як наш, потребує всеосяжної влади над усіма Муфтіями. Традиційно це роль $common_string_shaikh_al_islam$.\n\n$common_string_shaikh_al_islam$ не тільки сам складатиме Фатви, він також призначатиме багатьох регіональних Муфтіїв у нашому царстві, і зрештою він є тією особою, яка гарантуватиме законність указів [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Природно, обраний нами чоловік належатиме до [ROOT.GetCountry.GetReligiousSchool.GetName], але є кілька видатних кандидатів на вибір."
  muslim_school_events.2.a: "Оберімо на цю посаду найвидатнішого та найвідданішого Муфтія"
  muslim_school_events.2.b: "Найбільш вчений і стійкий кандидат повинен бути названий $common_string_shaikh_al_islam$."
  muslim_school_events.2.c: "Відомий суфій надасть цій посаді гідності, на яку вона заслуговує."
  muslim_school_events.3.title: "Нова [ShowBuildingTypeNameWithNoTooltip('madrasa')]"
  muslim_school_events.3.desc: "Видатні громадяни [madrassah_province.GetProvince.GetName] зробили низку благодійних пожертв для заснування нової [ShowBuildingTypeName('madrasa')] в [madrassah_province.GetName]. Вони запросили вчених не лише з ширшої [madrassah_province.GetProvince.GetNameWithNoTooltip], але й з інших частин нашої території, і навіть іноземних теологів."
  muslim_school_events.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  muslim_school_events.4.title: "Ґузат"
  muslim_school_events.4.desc: "Протягом століть війни за поширення віри бачили групи «Ґузат», або святих воїнів на кордонах ісламу, які здійснювали набіги на ворожі землі та поповнювали ряди вірних. Наша війна проти невірного [SCOPE.sCountry('infidel').GetAdjective] привернула увагу таких воїнів. Вони прийшли, щоб приєднатися до наших лав, щоб довести свою цінність як святі воїни, і, можливо, також заради обіцянки здобичі."
  muslim_school_events.4.a: "Їм раді."
  muslim_school_events.5.title: "Опіка над [SCOPE.sLocation('holy_city').GetName]"
  muslim_school_events.5.desc: "З кожним роком святе місто [SCOPE.sLocation('holy_city').GetName] бачило збільшення кількості паломників, які шукають там святині. Вірні прибувають з усіх куточків ісламського світу, приносячи торгівлю, товари, капітал, новини та ідеї з далеких місць до наших портів."
  muslim_school_events.5.a: "Бог добрий."
  muslim_school_events.6.title: "Шиїтська міграція"
  muslim_school_events.6.desc: "Хоча шиїзм поширений в ісламському світі, більшість шиїтів живуть на землях, керованих сунітськими або навіть немусульманськими державами. Щоб вижити, наші брати по вірі часто змушені застосовувати політику Такії, навмисно вдаючи, що дистанціюються від шиїтської віри. Як одна з небагатьох шиїтських [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName], ми приваблюємо членів віри, які більше не хочуть жити своїм духовним життям у таємниці. Багато з них є як освіченими, так і продуктивними членами суспільства."
  muslim_school_events.6.a: "Привітаймо їх у наших містах."
  muslim_school_events.6.b: "Відправимо їх заселяти прикордонні землі."
  muslim_school_events.7.title: "Суфійський синкретизм"
  muslim_school_events.7.desc: "Суфії, з їхнім містичним і менш легалістичним підходом до ісламу, часто більш бажані серед язичників, ніж високоосвічені [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] або воїни віри. Проявляючи благочестя іншими способами, такими як танці, співи та поєднання ісламських традицій з місцевими, суфії не завжди в найкращих стосунках з релігійним істеблішментом.\nСуфійському лідеру вдалося зібрати чимало послідовників у [SCOPE.sLocation('sufi_province').GetName], до його учнів приєдналася велика кількість навернених [SCOPE.sLocation('sufi_province').GetDominantReligion.GetName]. Його послідовники розчищають землю для нових поселень, де вони могли б жити разом, і це цілком може призвести до значно більшого ісламського впливу в усій області. Багато серед [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] просять, щоб ми відправили його геть, оскільки вони бояться, що він зводить справжніх вірних зі шляху і розмиває межу між ісламом та вірою [SCOPE.sLocation('sufi_province').GetDominantReligion.GetName]."
  muslim_school_events.7.a: "Він робить Божу справу."
  muslim_school_events.7.b: "Йому доведеться проповідувати деінде."
  muslim_school_events.8.title: "Іноземні богослови пожвавлюють вченість"
  muslim_school_events.8.desc: "Богослови, яких ми запросили до нашої країни, значно збагатили місцеву релігійну науку. Вони залишили свій слід у нашій країні та надихнули нове покоління [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  muslim_school_events.8.a: "Я потребую їх у [ROOT.GetCountry.GetCapital.GetName]."
  muslim_school_events.8.b: "Вони знайдуть своє місце по всій нашій країні."
  muslim_school_events.9.title: "[SCOPE.sCountry('scholar_country').GetReligiousSchool.GetNameWithNoTooltip] Богослови"
  muslim_school_events.9.desc: "Надаючи [SCOPE.sCountry('scholar_country').GetAdjectiveWithNoTooltip] вчених у наших медресе, ми не лише покращуємо богословську дискусію в нашій країні, але й зміцнюємо наші зв'язки з [SCOPE.sCountry('scholar_country').GetName] [SCOPE.sCountry('scholar_country').GetGovernment.GetGovernmentType.GetName]."
  muslim_school_events.9.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  academic_respect: "Взаємна повага"
  muslim_school_events.10.title: "Релігійні богослови не погоджуються"
  muslim_school_events.10.desc: "Не всі богослови погоджуються. Зазвичай це не є великою проблемою, оскільки розбіжності можуть існувати без перешкод у науковому світі. Однак іноді розбіжності набувають більш особистої форми, дехто стверджував би, що саме так наші запрошені вчені вступили в конфлікт зі значною частиною нашого релігійного істеблішменту, завдавши значної шкоди нашій міжнародній репутації."
  muslim_school_events.10.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  muslim_school_events.11.title: "Гра на судах"
  muslim_school_events.11.desc: "Хоча школа [ROOT.GetCountry.GetReligiousSchool.GetName] є офіційно затвердженою школою [ROOT.GetCountry.GetFlavorRank], по всій нашій землі є багато судів та каді, і всі школи віри вважаються придатними для цивільних процедур. Це означає, що до певної міри можливо «грати на судах», подаючи справу до каді тієї школи, яка, як вважається, з більшою ймовірністю винесе вигідне рішення у конкретній справі.\n\nПідприємливий купець у [selected_location.GetName] настільки добре освоїв це, що розгнівав не лише місцеве населення та своїх бізнес-конкурентів, але й місцевого губернатора. Ми мало що можемо зробити з цим, не зазіхаючи на привілеї [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  muslim_school_events.11.a: "Давайте просто переконаємося, що з цим чоловіком розберуться."
  muslim_school_events.11.b: "Прагматизм має передувати теології."
  muslim_school_events.12.title: "Такія"
  muslim_school_events.12.desc: "Протягом століть багато послідовників Алі вважали за необхідне приховувати себе та вдавати дотримання інших релігійних звичаїв, щоб зберегти свою віру. Влада в [SCOPE.sLocation('shia_here').GetName] дедалі більше підозрює, що серед місцевих суфійських лож зростає кількість шиїтів, і хотіла б нашого благословення у своїх спробах викорінити їх."
  muslim_school_events.12.a: "Ми не можемо терпіти єретиків!"
  muslim_school_events.12.b: "Ми повинні поважати суфійські ложі."
  10_percent_of_all_pops_become_shia_tt: "#Y 10%#! нашого [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у цій [Concept('location', 'CONCEPT_PLACEHOLDER')|e] навернеться до [ShowReligionName('shia')]"
  muslim_school_events.13.title: "Протести в [target_location.GetNameWithNoTooltip]"
  muslim_school_events.13.desc: "Будучи людьми великої духовної сили, але також міцно вкоріненими в істеблішменті, члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] іноді вирішують приєднатися до соціальних протестів. Нещодавня сутичка між місцевим гарнізоном та міським населенням у [target_location.GetName] привернула увагу видатних муфтіїв у провінції [target_location.GetProvince.GetName].\n\nНаш місцевий командир побоюється, що ситуація може загостритися, якщо ми не прислухаємося до протестувальників, але це матиме свою ціну."
  muslim_school_events.13.a: "Давайте компенсуємо людям [target_location.GetNameWithNoTooltip]."
  muslim_school_events.13.b: "Муфтій чи ні, ми нічого не можемо зробити."
  muslim_school_events.14.title: "Біднота [SCOPE.sLocation('urbanization_province').GetNameWithNoTooltip]"
  muslim_school_events.14.desc: "Зі зростанням міст старі зручності та мури, що колись їх підтримували, занепадають. У [SCOPE.sLocation('urbanization_province').GetName] це з часом призвело до змін. Менш чисті майстерні, такі як шкіряні, перемістилися за міські мури, як і кладовища. Однак найпомітнішим є зростання кількості бідних на вулицях. Оскільки існуючі благодійні організації не змогли впоратися зі швидким зростанням міста, було запропоновано виділити більше державної власності як вакф, благодійні пожертви на утримання громадських безкоштовних їдалень та лазень."
  muslim_school_events.14.a: "Ми, звісно, підтримаємо таку справу."
  muslim_school_events.14.b: "Певно, місцеві знатні особи можуть дозволити собі благодійність зі своїх власних кишень?"
  muslim_school_events.15.title: "Місто [holy_city.GetNameWithNoTooltip]"
  muslim_school_events.15.desc: "Як хранителі святих мечетей [holy_city.GetName], ми відповідаємо не лише за Святу Святиню. Від держави, яка претендує на цю честь, також очікується, що вона дбатиме як про населення святих міст, так і про паломників, яких вони приваблюють. З цією метою багато правителів присвятили великі ресурси, як у самих містах, так і на великих ділянках далеких сільськогосподарських угідь, щоб прогодувати та утримувати цю територію.\n\nДехто каже, що [target_ruler.GetName] не приділяв цим містам належної уваги, що паломники більше не в безпеці, і що на вулицях [holy_city.GetNameWithNoTooltip] панує велика потреба."
  muslim_school_events.15.a: "Виділимо більше землі для їх утримання."
  muslim_school_events.15.b: "На жаль, зараз у нас немає зайвих ресурсів."
  muslim_school_events.16.title: "Розширення медресе [madrasa_province.GetNameWithNoTooltip]"
  muslim_school_events.16.desc: "Медресе [madrasa_province.GetName] здобуває репутацію не лише як центр навчання [ROOT.GetCountry.GetReligiousSchool.GetName], але й завдяки своїм шуюхам з інших шкіл. Зокрема, вчені [inv_school.GetName] з інших частин світу здобули собі ім'я в медресе [madrasa_province.GetNameWithNoTooltip], і в результаті як сама установа, так і прилеглий ринковий район, і жваве місто в цілому швидко зростають.\n\nОднак міське зростання ніколи не буває без проблем, і зростаюче медресе все ще потребує забезпечення. Якщо [target_ruler.GetName] [target_ruler.GetHerselfHimself] виділить більшу благодійну пожертву на утримання та підтримку більшого медресе, це принесе користь як місту, так і регіону в цілому."
  muslim_school_events.16.a: "Ми повинні зробити свій внесок у цю справу."
  muslim_school_events.16.b: "Місцеві жителі можуть їх годувати та оплачувати."
  muslim_school_events.17.title: "Дарґа"
  muslim_school_events.17.desc: "Суфійський $rank_county_arabic_ruler_male$ помер у [dargah_province.GetName], і його послідовники тепер споруджують святиню на його честь. Паломники з різних куточків країни вже починають прибувати до провінції, щоб побачити святиню цієї великої людини, дехто називає його святим. Місцеві знатні особи виділили благодійну пожертву на її утримання, а його колишні учні відкрили поруч ложу.\nХоча в шануванні великої людини немає нічого поганого, деякі більш традиціоналісти серед побожних та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вважають цю форму поклоніння святотатством.\nЯкщо [ROOT.GetCountry.GetGovernment.GetRuler.GetName] відвідає святиню в [dargah_province.GetNameWithNoTooltip], це може багато зробити як для престижу самої святині, так і для народної думки про [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis]."
  muslim_school_events.17.a: "Шукаймо настанови в цьому святому місці."
  muslim_school_events.17.b: "Ми не повинні підживлювати місцеві забобони."
  muslim_school_events.18.title: "Алевіти [alevi_province.GetNameWithNoTooltip]"
  muslim_school_events.18.desc: "Хоча вони не є нашими прямими братами по вірі, велика кількість серед тюркських племен в Анатолії є шиїтами-алевітами. Як і джафаріти, алевіти є дванадцятниками і вірять у прихід Дванадцяти Імамів. Їхня віра також досить глибоко вкорінена в містицизмі та суфізмі. Під сунітським правлінням вони були змушені жити життям, багато в чому відокремленим від суспільства, їм не дозволялося одружуватися з сунітами, і держава їм не довіряла.\nБагато людей у [alevi_province.GetName] є алевітами, і вони загалом вітали нас як своїх нових володарів. Їхні містичні традиції багато в чому відрізняються від наших, але якщо ми приймемо цих людей, ми, ймовірно, зможемо набагато швидше поширити шиїтську віру в цьому районі."
  muslim_school_events.18.a: "Давайте розширимо можливості наших братів по вірі в цьому районі."
  muslim_school_events.18.b: "Хоча ми їх вітаємо, адміністрація залишиться в руках місцевої влади."
  muslim_school_events.19.title: "Мирське [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  muslim_school_events.19.desc: "Не всі члени [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] є великими теологами чи інтелектуалами. Корупція може зростати в будь-якому куточку держави, і для декого може бути важко розрізнити, що приносить користь вірі, а що може принести користь їм самим. До відома [target_ruler.GetName] дійшло, що низка благочестивих грантів, які існують по всій імперії, були отримані шляхом шахрайства або незаконно передані спадкоємцям. Члени нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] запропонували нам перевірити та підтвердити всі такі гранти в [ROOT.GetCountry.GetFlavorRank], особливо в регіонах, які спочатку не були під нашим правлінням.\n\nЦе, очевидно, було б серйозною образою для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], які б розцінили це як посягання на їхні привілеї та напад на їхню касту в цілому."
  muslim_school_events.19.a: "Кілька проступків — ніщо порівняно з тим, що ці люди дають нам."
  muslim_school_events.19.b: "Лише зрадникам є чого боятися."
  muslim_school_events.21.title: "Неосуфізм та традиціоналістська реакція"
  muslim_school_events.21.desc: "Багато серед [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] дедалі більше незадоволені [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Серед побожних мусульман наше включення язичників на високі посади, а також прийняття язичницьких звичаїв і традицій, розглядається зі зневагою. Втручання держави в тлумачення закону та інші традиційні сфери [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] також не принесли державі друзів серед юристів королівства.\nХаризматичні $rank_county_arabic_ruler_male$ суфійського ордену Накшбанді почали агітувати проти держави те, що вони вважають неправомірним, а в деяких випадках гріховним, впровадженням ісламського права в нашому королівстві."
  muslim_school_events.21.a: "Вони, на жаль, помиляються."
  muslim_school_events.21.a.tt: "Відтепер релігійний істеблішмент сильніше реагуватиме на нечестиву поведінку [ROOT.GetCountry.GetGovernment.GetRulerTitle]"
  muslim_school_events.22.title: "[ShowReligiousSchoolNameWithNoTooltip('wahhabi_school')]"
  muslim_school_events.22.desc: "Зростаючий рух серед [ShowReligiousSchoolName('hanbali_school')] [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [ROOT.GetCountry.GetLongName] виступає за повернення до чистішої віри. Вони рішуче виступають проти будь-яких нововведень у звичаях пророків і всього, що не є частиною літературних джерел ісламського права. Рішуче виступаючи проти всіх форм суфізму, поклоніння святим або неісламських традицій, вони обіцяють принести істинне релігійне суспільство всім, хто прийме їхні вчення."
  muslim_school_events.22.a: "Цікаво."
  muslim_school_events.22.a.tt: "[ShowReligiousSchoolName('wahhabi_school')] [Concept('religious_school', 'CONCEPT_PLACEHOLDER')|e] тепер увімкнено"
  muslim_school_events.22.b: "Вони мають рацію."
  muslim_school_events.23.title: "Суфійські святилища"
  muslim_school_events.23.desc: "Практика патронажу або навіть забезпечення святилищ, пов'язаних з гробницями відомих суфіїв, довгий час була головним предметом суперечок для [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. З приходом до влади більш традиціоналістського покоління вони тепер тиснуть на нашого правителя, щоб спробувати придушити цей звичай."
  muslim_school_events.23.a: "Ми повинні зробити, як вони просять."
  muslim_school_events.23.b: "Ні. Старі майстри були великими людьми!"