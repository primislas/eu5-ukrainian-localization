l_english:
  muslim_school_opinion_events.1.title: "Взаємна повага між [ROOT.GetCountry.GetReligiousSchool.GetName] та [SCOPE.sCountry('school_opinion_increase_country').GetReligiousSchool.GetName]"
  muslim_school_opinion_events.1.desc: "Ніколи не було теологічних розбіжностей, вартих справжнього конфлікту, між школами [ROOT.GetCountry.GetReligiousSchool.GetName] та [SCOPE.sCountry('school_opinion_increase_country').GetReligiousSchool.GetName], і обидва звичаї часто співіснували поруч.\nОднак довготривала співпраця між [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetReligiousSchool.GetName] та [SCOPE.sCountry('school_opinion_increase_country').GetAdjective] [SCOPE.sCountry('school_opinion_increase_country').GetReligiousSchool.GetName] державами призвела до нової ери взаєморозуміння та поваги."
  muslim_school_opinion_events.1.a: "Бог великий."
  muslim_school_opinion_events.2.title: "Нормалізація відносин між [ROOT.GetCountry.GetReligiousSchool.GetName] та [SCOPE.sCountry('school_opinion_increase_country').GetReligiousSchool.GetName]"
  muslim_school_opinion_events.2.desc: "Протягом деякого часу відносини між [ROOT.GetCountry.GetReligiousSchool.GetName] та [SCOPE.sCountry('school_opinion_increase_country').GetReligiousSchool.GetName] були сильно забарвлені недовірою та конфліктами. Деякі вчені зайшли так далеко, що засудили теологів іншої школи та їхніх послідовників.\nОднак напруженість значно зменшилася в останні роки, а [ROOT.GetCountry.GetAdjective] [ROOT.GetCountry.GetReligiousSchool.GetName] та [SCOPE.sCountry('school_opinion_increase_country').GetAdjective] [SCOPE.sCountry('school_opinion_increase_country').GetReligiousSchool.GetName] вчені прокладають шлях до толерантності та співіснування."
  muslim_school_opinion_events.2.a: "Бог великий."
  muslim_school_opinion_events.3.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та [ROOT.GetCountry.GetAdjectiveWithNoTooltip] - [SCOPE.sCountry('school_opinion_decrease_country').GetAdjectiveWithNoTooltip] Війна"
  muslim_school_opinion_events.3.desc: "Тривалий конфлікт між [SCOPE.sCountry('school_opinion_decrease_country').GetAdjectiveWithNoTooltip] та [ROOT.GetCountry.GetAdjectiveWithNoTooltip] починає переростати в релігійну сферу. Взаємна повага та толерантність перебувають на рекордно низькому рівні, а [SCOPE.sCountry('school_opinion_decrease_country').GetReligiousSchool.GetName] думка маргіналізується в [ROOT.GetCountry.GetAdjectiveWithNoTooltip] суспільстві."
  muslim_school_opinion_events.3.a: "Обурливо."