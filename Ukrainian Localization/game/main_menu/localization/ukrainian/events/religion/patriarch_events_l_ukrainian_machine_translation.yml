l_english:
  patriarch_events.1.title: "Святі [local_saint_state_province.GetProvince.GetNameWithNoTooltip]"
  patriarch_events.1.desc: "Велика невизначеність панує в єпархії [local_saint_state_province.GetProvince.GetName]. Хоча ми об'єднані у вірі, люди держави, включно з багатьма місцевими священниками, відмовляються брати участь у святах та святкуваннях святих, що є звичними в наших кордонах. Вони стверджують, що ці свята не є канонічними, і що вони дотримуватимуться релігійних звичаїв своїх предків, включно з вшануванням низки підозрілих святих з цієї місцевості."
  patriarch_events.1.a: "Ми мусимо запровадити [ROOT.GetCountry.GetAdjectiveWithNoTooltip] святих та святкування."
  STATIC_MODIFIER_NAME_saints_enforced: "Релігійна відповідність"
  STATIC_MODIFIER_DESC_saints_enforced: "Ми змусили населення в цій місцевості дотримуватися наших власних релігійних звичаїв ціною їхнього сильного невдоволення нашим правлінням. З часом це, однак, дозволить нам краще інтегрувати їх у наше суспільство."
  patriarch_events.1.b: "Небагато можна здобути, наполягаючи."
  patriarch_events.2.title: "Літургійний вплив"
  patriarch_events.2.desc: "Єпископ [local_see_province.GetProvince.GetName] заперечив [target_character.GetName] та пишний спосіб, у який [target_character.GetSheHe] провів освячення собору в [local_see_province.GetName]. Хоча він наполягає, що не є невдячним за великі пожертви, які ми зробили Церкві, єпископ ставить під сумнів використання порушення літургійного канону для просування інтересів [ROOT.GetCountry.GetFlavorRank]."
  patriarch_events.2.a: "Він мусить знати своє місце!"
  patriarch_events.2.b: "Ми зробимо подальшу пожертву Церкві, щоб показати нашу смиренність."
  patriarch_events.3.title: "Собор для [local_see_province.GetNameWithNoTooltip]"
  patriarch_events.3.desc: "Собор [ShowBuildingTypeName('cathedral')] [local_see_province.GetName] був пошкоджений і терміново потребує ремонту. Митрополит дав зрозуміти, що очікує від нас допомоги у фінансуванні ремонту, і що загальне переоформлення також було б досить корисним для Церкви.\n\nБлагочестива архітектура зазнала значного розвитку з того часу, як цей дім поклоніння був вперше збудований, і він, безумовно, міг би отримати вигоду від залучення нами іноземних експертів..."
  patriarch_events.3.a: "Давайте проведемо гідну реновацію!"
  patriarch_events.3.b: "Ми можемо відремонтувати пошкодження, але не більше."
  patriarch_events.4.title: "Єресь у [judaizers_province.GetProvince.GetNameWithNoTooltip]!"
  patriarch_events.4.desc: "Наш новопризначений Митрополит [judaizers_province.GetProvince.GetName] виявив жахливу місцеву єресь. Він стверджує, що ця секта заперечує Трійцю, божественність Христа та церковну ієрархію. Митрополит попросив нас допомогти йому в цей скрутний час, оскільки йому знадобиться набагато більше ресурсів, щоб викорінити цю єресь, яка поширена як серед знаті, так і серед простолюду.\n\nСправа здається дуже ясною. За винятком того, що, схоже, секта має прихильників навіть у [ROOT.GetCountry.GetCapital.GetName]. Чи можемо ми дозволити собі втратити підтримку цих чоловіків і жінок, і чи справді вони такі єретики, як стверджує Митрополит?"
  patriarch_events.4.a: "Єретики мусять горіти!"
  STATIC_MODIFIER_NAME_rooting_out_heresy: "Підтримка місцевої інквізиції"
  STATIC_MODIFIER_DESC_rooting_out_heresy: "У цій місцевості проводиться інквізиція під керівництвом її Митрополита з метою забезпечення релігійної відповідності та викорінення всієї єресі."
  patriarch_events.4.b: "Очевидно, він помиляється."
  patriarch_events.5.title: "Монастирі процвітають у [monastic_province.GetNameWithNoTooltip]"
  patriarch_events.5.desc: "Єпископ [monastic_province.GetProvince.GetName] повідомляє, що місцеві чернечі громади зростають з безпрецедентною швидкістю. Маєтки місцевого монастиря в [monastic_province.GetName] насправді зросли настільки великими і так добре доглянуті, що стали предметом заздрості нашого місцевого адміністратора. Губернатор заплутався в конфлікті з ченцями щодо того, де саме проходить демаркація між їхніми землями та землями [ROOT.GetCountry.GetFlavorRank].\n\nНастав час центральним органам влади втрутитися та врегулювати суперечку. Допомога монастирю, безсумнівно, забезпечила б їхню вдячність, але це також може бути можливістю отримати більше землі для держави..."
  patriarch_events.5.a: "Очевидно, наш губернатор має рацію!"
  patriarch_events.5.b: "Ми мусимо прислухатися до цих мужів [ROOT.GetCountry.GetReligion.GetGodName]."