l_english:
  buddhism_events.1.title: "Міністр подає у відставку"
  buddhism_events.1.desc: "[target_minister.GetName] публічно засудив(-ла) політику [target_ruler.GetName] та [target_ruler.GetHerHis] уряду. [target_minister.GetSheHe|U] нагадує нам, що [ROOT.GetCountry.GetGovernment.GetRulerTitle], який(-а) не може підтримувати законні порядки, привабить до [target_ruler.GetHerHis] уряду лише брехунів та донощиків, і [target_minister.GetSheHe] не бажає мати з нами нічого спільного, якщо ми не змінимо наші нинішні згубні шляхи."
  buddhism_events.1.a: "Скатертиною дорога!"
  buddhism_events.1.b: "Використаймо [target_minister.GetHerHis] пропозиції для покращення нашого [ROOT.GetCountry.GetFlavorRank]."
  buddhism_events.2.title: "Чернечі ордени збурюють народ"
  buddhism_events.2.desc: "Оскільки обов'язком [ROOT.GetCountry.GetGovernment.GetRulerTitle] є захист чернечих установ, ці установи також повинні захищати країну від поганих правителів. Через те, що вони вважають недостатньою увагою до обов'язків [ROOT.GetCountry.GetGovernment.GetRulerTitle], а також нездатністю та незацікавленістю у підтримці та захисті загального блага в цілому, і чернечих організацій нашої країни зокрема, деякі з найвпливовіших монастирів відкрито виступили із засудженням [target_character.GetName], обернувши народну думку проти [target_character.GetHerHim]."
  buddhism_events.2.a: "Це обурливо!"
  buddhism_events.2.a.tt: "[ShowPopTypeName('peasants')] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] у тих [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], де вони можуть чути скарги [ShowPopTypeName('clergy')]."
  buddhism_events.2.b: "Підемо їм на поступки."
  buddhism_events.2.c: "Вирішимо це 'альтернативними' засобами."
  buddhism_events.3.title: "Прецедент [target_ruler.GetNameWithNoTooltip]"
  buddhism_events.3.desc: "[target_ruler.GetName] завжди був(-ла) розсудливим(-ою) та належним(-ою) у [target_ruler.GetHerHis] рішеннях. Настільки, що в нещодавно створеному додатку до збірки законів [ROOT.GetCountry.GetName] одне з [ROOT.GetCountry.GetGovernment.GetRuler.GetHisHerFormal|U] нещодавніх постанов було визнано настільки справедливим і добре аргументованим, що його використали як приклад для наслідування в подібних випадках. Оскільки [target_ruler.GetNameWithNoTooltip] став(-ла) відомим(-ою) завдяки [target_ruler.GetHerHis] суворому та постійному дотриманню чеснот Дасавідха-раджадхамми, десятикратної чесноти правителя згідно з [ROOT.GetCountry.GetReligion.GetName], це не вперше, коли [target_ruler.GetHerHis] правління наводиться як добрий приклад."
  buddhism_events.3.a: "І це буде не востаннє."
  buddhism_events.4.title: "Жахи війни"
  buddhism_events.4.desc: "Не всім чоловікам судилося вести життя воїна, і, схоже, конфлікт, у якому зараз перебуває наша країна, змусив декого з них це усвідомити. Кількість дезертирів, які прагнуть сховатися за стінами монастирів, невелика, але вони подають небезпечний приклад. Однак, як побожний(-а) [ROOT.GetCountry.GetReligion.GetAdjective] [ROOT.GetCountry.GetFlavorRank], нашим обов'язком є захист монастирів, і хоча ми неодноразово попереджали їх не приймати таких людей, схоже, деякі все ж це роблять."
  buddhism_events.4.a: "Ми повинні пам'ятати про милосердя."
  buddhism_events.4.b: "Вимагати від монастирів видати нам цих 'ченців'."
  buddhism_events.5.title: "Рясний урожай"
  buddhism_events.5.desc: "Цей урожай був надзвичайно рясним, і ми могли б добре використати це несподіване багатство для фінансування запланованих релігійних робіт. Було запропоновано додатковий податок для передачі надлишкового зерна від фермерів державі. Однак традиційні [ROOT.GetCountry.GetReligion.GetAdjective] вчення диктують, що ми не можемо діяти таким чином, щоб пригнічувати населення, і деякі з наших міністрів, схоже, відчувають незручність, обтяжуючи їх додатковим податком."
  buddhism_events.5.a: "Ввести податок."
  buddhism_events.5.b: "Не будемо красти плоди їхньої праці."
  buddhism_events.6.title: "Дана"
  buddhism_events.6.desc: "Саме в такі часи, коли наша країна характеризується відносним спокоєм, ми згадуємо про тих, хто менш щасливий. Нещодавні врожаї не були ні невдалими, ні надзвичайно успішними, і в результаті більшість має їжу, а держава має достатні запаси зерна. Однак все ще є деякі нещасні душі, які не мають достатньо їжі, щоб прогодувати себе. Чи не в такі часи ми повинні найбільше пам'ятати про Дану, акт милосердя та подачі милостині згідно з [ROOT.GetCountry.GetReligion.GetAdjective] вченнями."
  buddhism_events.6.a: "Розподілимо наше зерно серед бідних!"
  STATIC_MODIFIER_NAME_grain_for_the_poor: "Зерно для бідних"
  STATIC_MODIFIER_DESC_grain_for_the_poor: "Ми перерозподіляли надлишки зерна, щоб ніхто не терпів голоду на наших землях."
  buddhism_events.6.b: "Зберігати в резерві."
  STATIC_MODIFIER_NAME_food_reserves: "Зернові резерви"
  STATIC_MODIFIER_DESC_food_reserves: "Наші добре заповнені зернові резерви є гарантом стабільності нашої країни."
  buddhism_events.7.title: "Паріччага"
  buddhism_events.7.desc: "Оскільки наша країна перебуває у стані війни, а наші війська занурені в битву, наш народ звертається до нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] за лідерством та настановами. Багато голосів вважають, що одна з ключових чеснот [ROOT.GetCountry.GetReligion.GetName], а саме Паріччага, самопожертва, найкраще виявиться, якщо [target_ruler.GetName] розділить долю наших воїнів і приєднається до них у битві, навіть ціною [target_ruler.GetHerHis] власної безпеки.\n\nІнші, однак, стверджують, що Паріччага — це не повна зневага до себе, а стриманість у пріоритеті лише власних інтересів, і що забезпечення безпеки нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] не тільки не суперечить [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip] вченням, але й є першочерговим для забезпечення безпеки нашого [ROOT.GetCountry.GetFlavorRank]."
  buddhism_events.7.a: "[target_ruler.GetSheHe|U] має подавати приклад."
  buddhism_events.7.b: "Це не те, про що насправді йдеться в самопожертві."
  buddhism_events.8.title: "Тапа"
  buddhism_events.8.desc: "Нещодавно [target_ruler.GetName] зазнав нападок з боку тих, хто вважає [target_ruler.GetHerHis] правління марнотратним і показним споживанням. Деякі з наших [ROOT.GetCountry.GetGovernment.GetCourtTitle], однак, наполягають, що певна розкіш необхідна для [ROOT.GetCountry.GetGovernment.GetRulerTitle], особливо при спілкуванні з іноземними правителями та їхніми емісарами."
  buddhism_events.8.a: "Відкиньмо мирські речі!"
  buddhism_events.8.b: "Ми не можемо опускатися до рівня [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]..."
  buddhism_events.9.title: "Спадщина"
  buddhism_events.9.desc: "Конфлікт виник в одному [ShowBuildingTypeName('monastery')] з найвпливовіших у [ROOT.GetCountry.GetName] після смерті ченця, який походив з дуже впливової світської родини. Предметом суперечки є те, хто має успадкувати багатий набір цінних рукописів та асортимент зображень Будди, серед іншого, що знаходилися в кімнаті покійного. Хоча ченці не можуть володіти власністю як такою, закон все ще дозволяє відданому учневі успадкувати ці речі та вважатися сином ченця. У цьому випадку [ShowBuildingTypeNameWithNoTooltip('monastery')] згадує молодого учня, який доглядав за ченцем до останнього дня.\n\nОднак є й інші зацікавлені сторони, і сам [ShowBuildingTypeNameWithNoTooltip('monastery')] стверджував, що вони повинні отримати спадщину і, ймовірно, будуть дуже вдячні за підтримку в цьому питанні. Світська родина ченця також звернулася до нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle], сподіваючись успадкувати не лише рукописи та зображення, а й частину землі, яка була пожертвувана [ShowBuildingTypeNameWithNoTooltip('monastery')], поки їхній родич був його частиною."
  buddhism_events.9.a: "Вирішити на користь учня."
  buddhism_events.9.b: "Вирішити на користь [ShowBuildingTypeNameWithNoTooltip('monastery')]."
  buddhism_events.9.c: "Підтримати світську родину ченця."
  buddhism_events.10.title: "Іноземний емісар ображає [target_ruler.GetNameWithNoTooltip]"
  buddhism_events.10.desc: "Нещодавнє посольство з [target_country.GetLongName] набуло поганого повороту, коли емісар завдав серйозної образи [ROOT.GetCountry.GetGovernment.GetRulerTitle], відмовившись брати участь у церемонії, організованій з такої нагоди. [target_ruler.GetName] розлючений, і хоча можуть бути сумніви щодо того, чи була образа навмисною, чи ні, громадськість чітко сприймає її саме так.\n\nЯкщо ми публічно не засудимо посла, ми ризикуємо втратити обличчя, але багато хто з наших [ROOT.GetCountry.GetGovernment.GetCourtTitle], однак, закликає до обережності."
  buddhism_events.10.a: "Публічно висміяти посла."
  buddhism_events.10.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] ніколи не повинен втрачати [target_ruler.GetHerHis] самовладання."
  buddhism_events.11.title: "Закони [ROOT.GetCountry.GetNameWithNoTooltip]"
  buddhism_events.11.desc: "[ShowReligionGroupAdjective('buddhist')] право зазвичай практикується в тій чи іншій формі в багатьох [ShowReligionGroupAdjectiveWithNoTooltip('buddhist')] країнах. Хоча ці закони не збираються і не записуються самими державами, вони відрізняються від країни до країни, і часом збірку доводиться оновлювати або поновлювати. Нещодавно така збірка відбулася в [ROOT.GetCountry.GetName], і вона створила оновлену версію однієї з найпоширеніших збірок законів у нашій країні.\n\nОскільки сама збірка ґрунтується на реальних випадках, її, однак, можна розглядати як досить актуальний коментар до рішень [target_ruler.GetName]."
  buddhism_events.11.a: "Чудово! Просувати ці закони."
  buddhism_events.11.a.tt1: "Оскільки наш [Concept('ROOT.GetCountry.GetGovernment.GetRulerTitle] не був повністю справедливим до [target_ruler.GetHerHis] підданих, ця збірка законів погано відбивається на [target_ruler.GetHerHim] і зменшить наш [prestige', 'CONCEPT_PLACEHOLDER')|e]."
  buddhism_events.11.a.tt2: "Оскільки наш [Concept('ROOT.GetCountry.GetGovernment.GetRulerTitle] був досить справедливим до [target_ruler.GetHerHis] підданих, ця збірка законів позитивно відображається на [target_ruler.GetHerHim] і збільшить наш [prestige', 'CONCEPT_PLACEHOLDER')|e]."
  buddhism_events.11.a.tt3: "Оскільки наш [Concept('ROOT.GetCountry.GetGovernment.GetRulerTitle] був прикладом справедливості для [target_ruler.GetHerHis] підданих, ця збірка законів надзвичайно позитивно відображається на [target_ruler.GetHerHim] і збільшить наш [prestige', 'CONCEPT_PLACEHOLDER')|e]."
  buddhism_events.11.a.tt4: "Оскільки наш [Concept('ROOT.GetCountry.GetGovernment.GetRulerTitle] був усім, крім справедливого, до [target_ruler.GetHerHis] підданих, ця збірка законів надзвичайно негативно відображається на [target_ruler.GetHerHim] і зашкодить нашому [prestige', 'CONCEPT_PLACEHOLDER')|e]."
  buddhism_events.11.b: "Зробімо все можливе, щоб зупинити це поширення."
  buddhism_events.12.title: "Юристи в розбраті"
  buddhism_events.12.desc: "Юристи, що роблять ставки на результат судового спору, не є чимось незвичайним у наших землях, як і певний ступінь дружнього суперництва серед професіоналів у суді. Однак, коли таке суперництво перетворюється на справжній гнів і пристрасть, тоді під загрозою опиняється цілісність наших законів.\n\nЗдається, що дві сторони у нещодавній судовій справі, одна – багатий [ShowBuildingTypeName('monastery')], а інша – родина, що має певний вплив серед [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], перетворили простий правовий конфлікт щодо значного маєтку на гарячу суперечку. Це дуже прикро, і тепер нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] належить спробувати зберегти обличчя обох сторін справедливим чином, не компрометуючи цілісність нашої правової системи."
  buddhism_events.12.a: "Вимагати повторного розгляду справи з іншими юристами."
  buddhism_events.12.b: "Винести рішення на користь [ShowBuildingTypeNameWithNoTooltip('monastery')]."
  buddhism_events.12.c: "Винести рішення на користь [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  buddhism_events.13.title: "Корисний союз?"
  buddhism_events.13.desc: "Минуло вже чимало часу, відколи [GetCharacter('kublai_khan').GetName] прийняв [ShowReligionGroupAdjective('buddhist')] релігію і прагнув поширити її серед [GetCharacter('kublai_khan').GetHerHis] народу. Однак з роками багато хто повернувся до старих шляхів [ROOT.GetCountry.GetReligion.GetName]. [target_ruler.GetName] завжди був зачарований спадщиною таких, як Великий $rank_kingdom_horde_ruler_suffix_male$, та імперіями, які вони колись створили в ім'я цієї релігії. Коли до нас дійшла звістка про динамічний і зростаючий [ShowCultureGroupName('tibetan_group')] монастирський орден, [target_ruler.GetHerHim] стало зрозуміло, що це потрібно дослідити.\n\nЕмісар Лами тепер стоїть перед нами і пояснив, що вони інтерпретують [target_ruler.GetNameWithNoTooltip] як реінкарнацію [GetCharacter('kublai_khan').GetShortNameWithNoTooltip]. Орден також готовий підтримати наше правління, якщо ми дозволимо їм поширювати свою секту на всіх землях, які ми контролюємо."
  buddhism_events.13.a: "Настав час змін."
  buddhism_events.13.b: "Тримаймося наших старих звичаїв."
  buddhism_events.14.title: "Ідоли"
  buddhism_events.14.desc: "Перехід країни до [ShowReligionGroupAdjective('buddhist')] віри не відбувається за одну ніч, і велика кількість людей у наших кордонах все ще поклоняється старим звичаям. Однак, прагнучи поширити свою релігію, багато провідних лам у нашій країні засудили звичайні фігури, які багато простих людей все ще шанують, і вимагали, щоб їх усіх знищили."
  buddhism_events.14.a: "Спалити їх усіх!"
  STATIC_MODIFIER_NAME_destruction_of_idols: "Знищення ідолів"
  STATIC_MODIFIER_DESC_destruction_of_idols: "Кампанія зі знищення язичницьких ідолів у нашій країні навряд чи приносить нам друзів серед затятих прихильників старої релігії, але вона значно прискорює навернення всіх язичників, хоча можна сумніватися у щирості деяких."
  buddhism_events.14.b: "Даймо їм час..."
  buddhism_events.15.title: "[ShowAreaNameWithNoTooltip('sailan_area')]"
  buddhism_events.15.desc: "Острів [ShowAreaName('sailan_area')], нещодавно завойований нашими військами, повний багатих [ShowReligionGroupAdjective('buddhist')] монастирів, і суспільство, здається, практично керується ченцями в них. Коли [target_ruler.GetName] нарешті відвідав їх, [target_ruler.GetSheHe] стоїть у захваті перед економічним і культурним багатством монастирських орденів."
  buddhism_events.15.a: "Ми повинні зробити це частиною нашої культури!"
  buddhism_events.15.b: "Пограбувати їхні монастирі!"
  buddhism_events.15.b.tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у кожній володінні [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('sailan_area')] втрачає [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  buddhism_events.15.c: "Ми багато чого можемо навчитися від них."
  buddhism_events.15.c.tt: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] у кожній володінні [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowAreaName('sailan_area')] отримує [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  buddhism_events.16.title: "Монастирі [ROOT.GetCountry.GetNameWithNoTooltip] занепадають"
  buddhism_events.16.desc: "Через поєднання відсутності чернечої дисципліни та занепаду економіки, багато великих монастирів [ROOT.GetCountry.GetName] за останні кілька років спостерігали зменшення кількості своїх членів. Стурбований член нашого [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] звернувся до [ROOT.GetCountry.GetGovernment.GetRulerTitle] з попередженням, що якщо найближчим часом нічого не буде зроблено, жахлива ситуація може призвести до того, що останні кілька ченців відмовляться від своїх обітниць або шукатимуть приєднання до монастирів в інших місцях, залишивши [ROOT.GetCountry.GetNameWithNoTooltip] збіднілим як духовно, так і економічно.\n\nОднак є багато місцевих землевласників, які більш ніж готові посягнути на землю, яку залишить порожній [ShowBuildingTypeName('monastery')]. Оскільки [ROOT.GetCountry.GetGovernment.GetRulerTitle] має захищати чернече життя в [ROOT.GetCountry.GetNameWithNoTooltip], багатьом спостерігачам буде зрозуміло, що відповідальність за все, що станеться, лежатиме на [target_ruler.GetHerHis] плечах."
  buddhism_events.16.a: "Ми повинні зробити все можливе!"
  buddhism_events.16.b: "Можливо, тепер земля буде використана краще."
  buddhism_events.17.title: "Чернечі обітниці порушено"
  buddhism_events.17.desc: "Релігійна дисципліна ченців [ROOT.GetCountry.GetName] хитається. Внаслідок браку коштів, монополізації вищих чернечих посад невеликою групою [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetRulerTitle], нездатного захистити вірних так, як очікується від справжнього [ShowReligionGroupAdjective('buddhist')] [ROOT.GetCountry.GetGovernment.GetRulerTitle], все більше ченців, схоже, порушують свої обітниці, щоб залишити чернече життя, або в деяких випадках підтримують його, не дотримуючись його принципів.\n\nОсобливо кричущий випадок ченця, який порушив свої обітниці та підбурював інших до того ж, нещодавно привернув нашу увагу, і багато хто, ймовірно, багато чого прочитає в тому, як ми вирішимо з цим вчинити. Хоча добрий [ROOT.GetCountry.GetGovernment.GetRulerTitle] завжди повинен виявляти милосердя та лагідність, обов'язком будь-якого [ROOT.GetCountry.GetGovernment.GetRulerTitle] є також підтримання дисципліни монастирів, за потреби силою."
  buddhism_events.17.a: "Ми повинні виявити лагідність."
  STATIC_MODIFIER_NAME_lacking_monastic_discipline: "Брак чернечої дисципліни"
  STATIC_MODIFIER_DESC_lacking_monastic_discipline: "Брак дисципліни в монастирях широко відомий, і в результаті регіон страждає духовно. Обов'язком світської влади є приборкання таких надмірностей у монастирях, проте цього разу вона зазнала невдачі."
  buddhism_events.17.b: "Оштрафувати всіх блудних ченців на все рухоме майно та худобу."
  STATIC_MODIFIER_NAME_strict_punishment_of_monks: "Суворе покарання ченців"
  STATIC_MODIFIER_DESC_strict_punishment_of_monks: "Щоб покращити відсутність чернечої дисципліни, ми запровадили набагато суворіший контроль та наклали штрафи на блудних ченців. Будь-який чернець, який буде виявлений у неповазі до своїх обітниць або свого ордену, повинен буде сплатити велику кількість худоби державі."
  buddhism_events.17.c: "Стратити ченця та всіх, хто його підтримує!"
  STATIC_MODIFIER_NAME_cleansing_of_monasteries: "Очищення монастирів"
  STATIC_MODIFIER_DESC_cleansing_of_monasteries: "Щоб покращити дуже недостатню чернечу дисципліну, ми застосували дуже жорстокі та суворі покарання до тих, хто порушує свої обітниці. Такі очищення іноді необхідні, хоча й прикрі, але ситуація, схоже, повільно покращується."
  buddhism_events.18.title: "Монастирі [ROOT.GetCountry.GetNameWithNoTooltip]"
  buddhism_events.18.desc: "Мудра та продуктивна політика [target_ruler.GetName] щодо монастирів у державі завжди була добре продуманою та доброзичливою. Жодному [ShowBuildingTypeName('monastery')] не дозволено бідніти, проте дисципліна та сила самих установ не дозволялися занепадати. В результаті, [ShowBuildingTypeNameWithNoTooltip('monastery')] у [target_location.GetName] процвітає і стало відомим скрізь як приклад для наслідування."
  buddhism_events.18.a: "Вимагати, щоб вони допомагали розвивати своє оточення."
  STATIC_MODIFIER_NAME_monasteries_blooming: "Монастирі процвітають"
  STATIC_MODIFIER_DESC_monasteries_blooming: "Мудра політика нашого [ROOT.GetCountry.GetGovernment.GetRulerTitle] мала дуже сприятливий вплив на чернечу діяльність, що призвело до загального позитивного розвитку. [ShowBuildingTypeName('monastery')] тут багатий, а ченці дисципліновані, і в результаті там процвітає кожен, від хворих і бідних до здорових і багатих."
  buddhism_events.18.b: "[ROOT.GetCountry.Custom('common_string_positive')]"
  buddhism_events.19.title: "Кидання клина"
  buddhism_events.19.desc: "Останні сезони були не дуже прихильними до [ROOT.GetCountry.GetName], і одним з обов'язків [ROOT.GetCountry.GetGovernment.GetRulerTitle] є турбота про бідних. Делегація фермерів звернулася до [target_ruler.GetName] з проханням звільнити їх від податків та надати 3-річну позику, щоб вони могли піклуватися про свої сім'ї, поки працюють над тим, щоб знову стати на ноги."
  buddhism_events.19.a: "Розумне прохання."
  STATIC_MODIFIER_NAME_wedge_throw: "Кидок клином"
  STATIC_MODIFIER_DESC_wedge_throw: "Фермери переживають важкі часи. Щоб допомогти їм оговтатися, ми на деякий час полегшили їхній податковий тягар!"
  buddhism_events.19.b: "На жаль, державна скарбниця також голодує."
  STATIC_MODIFIER_NAME_poor_rice_harvests: "Поганий урожай рису"
  STATIC_MODIFIER_DESC_poor_rice_harvests: "Фермери переживають важкі часи. Оскільки ми відмовилися полегшити їхній податковий тягар або дозволити їм позичати гроші, регіон тепер кипить презирством до державної влади."
  buddhism_events.20.title: "Жертва фермерів"
  buddhism_events.20.desc: "[target_location.GetName] гостро потребує кращої інфраструктури. Ченці в місцевому [ShowBuildingTypeName('monastery')] роблять усе можливе, як і місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], але якщо територія має процвітати, держава повинна втрутитися. Плани покращити ситуацію вимагають залучення додаткових робітників з сільської місцевості до проєкту, але всі фермери зайняті жнивами. Ми можемо наказати їм припинити роботу, щоб взяти участь у будівельних проєктах для загального блага, але натомість вони очікуватимуть отримати звичайну еквівалентну компенсацію у вигляді кількості рису, яку вони могли б виростити за той самий час."
  buddhism_events.20.a: "Виплатити компенсацію."
  STATIC_MODIFIER_NAME_rice_compensation: "Компенсація за рис"
  STATIC_MODIFIER_DESC_rice_compensation: "Ми попросили фермерів з навколишніх сіл допомогти покращити цю територію в обмін на компенсацію за втрачений дохід."
  buddhism_events.20.b: "Відмовитися від проєкту."
  buddhism_events.20.c: "Вимагати, щоб фермери працювали без компенсації."
  STATIC_MODIFIER_NAME_forced_labor: "Примусова праця"
  STATIC_MODIFIER_DESC_forced_labor: "Ми змусили фермерів з навколишніх сіл допомогти покращити цю територію для загального блага."
  buddhism_events.1000.title: "Білий слон захоплений"
  buddhism_events.1000.desc: "Білого слона захопили у глибинці [ROOT.GetCountry.GetName]. Таку тварину нелегко побачити, і тому ця сприятлива подія широко інтерпретується як свідчення мудрого та доброзичливого правління [target_ruler.GetName]."
  buddhism_events.1000.a: "Давайте добре про нього подбаємо."
  buddhism_events.1000.b: "Продати його."
  buddhism_events.1000.c: "Це був би чудовий подарунок!"
  gifted_white_elephant: "Подарований білий слон"
  buddhism_events.1001.title: "Білий слон"
  buddhism_events.1001.desc: "Білого слона захопили у глибинці [target_origin_country.GetName], і [target_ruler.GetName] мудро інтерпретував це як знак продуктивного союзу наших двох народів. Це найбільший подарунок, який правитель міг би нам дарувати, і він, ймовірно, буде дуже добре сприйнятий нашим населенням. Однак догляд за цією рідкісною твариною також буде досить дорогим, хоча ми навряд чи могли б відмовитися це робити."
  buddhism_events.1001.a: "$buddhism_events.1000.a$"
  buddhism_events.1001.b: "$buddhism_events.1000.b$"
  sold_our_elephant: "Проданий подарований білий слон"
  buddhism_events.1100.title: "Політичний суперник ослаблений"
  buddhism_events.1100.desc: "Навіть великий правитель має своїх недоброзичливців. [target_character.GetName] був досить відвертим критиком [target_ruler.GetName], але останнім часом [target_character.GetSheHe] потрапив у досить скрутне становище. [target_character.GetHerHis|U] друзі покинули [target_character.GetHerHim], а великі борги дуже ускладнюють [target_character.GetHerHim] утримання [target_character.GetHerHis] родини. Хоча винахідлива людина ще може оговтатися від цієї ситуації, ми також можемо використати цю нагоду, щоб раз і назавжди позбутися цієї [target_character.GetWomanMan]."
  buddhism_events.1100.a: "Переконайтеся, що [target_character.GetSheHe] ніколи не оговтається!"
  STATIC_MODIFIER_NAME_political_rival_crushed: "Політичний суперник розгромлений"
  STATIC_MODIFIER_DESC_political_rival_crushed: "Ми добре використали тимчасову низку невдач одного з наших політичних суперників, який тепер перехитрений і навряд чи знову стане проблемою. Інші спостерігали за нашими діями і двічі подумають, перш ніж намагатися ставити під сумнів державну владу в майбутньому."
  buddhism_events.1100.b: "Справжній [ROOT.GetCountry.GetGovernment.GetRulerTitle] не тримає зла."
  buddhism_events.1100.c: "Настав час для милосердя, допоможімо цій [target_character.GetWomanMan] оговтатися."
  buddhism_events.1101.title: "Старий суперник оговтується"
  buddhism_events.1101.desc: "Наша готовність допомогти супернику в біді перетворила [target_character.GetHerHim] з недоброзичливця на вірного прихильника. Відновивши [target_character.GetHerHis] базу влади, [target_character.GetSheHe] тепер прагне служити нашому [ROOT.GetCountry.GetFlavorRank], і, крім [target_character.GetHerHis] політичного капіталу, він пропонує [target_character.GetHerHis] вірність і готовність знову служити нашому уряду."
  buddhism_events.1101.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  buddhism_events.1102.title: "$buddhism_events.1101.title$"
  buddhism_events.1102.desc: "Наша готовність допомогти супернику в біді, можливо, була праведним вчинком, але тепер, коли [target_character.GetSheHe] оговтався, [target_character.GetSheHe] так само критично ставиться до нашої влади, як і раніше. Те, що сталося, можливо, дещо послабило основу [target_character.GetHerHis] позиції, але [target_character.GetSheHe] все ще має намір використовувати всю [target_character.GetHerHis] владу для саботажу уряду [ROOT.GetCountry.GetName]."
  buddhism_events.1102.a: "Жодна добра справа не залишається безкарною..."
  buddhism_events.1102.b: "Можливо, доречніше більш постійне рішення."
  buddhism_events.1200.title: "Запросити Ламу"
  buddhism_events.1200.desc: "Ми повинні запросити могутнього Ламу оселитися в нашій столиці. Завдяки покровительству цьому чоловікові та його майбутнім реінкарнаціям ми можемо створити довговічну спадщину для нашої династії."
  buddhism_events.1200.a: "Ми це зробимо."
  buddhism_events.1200.b: "Неважливо."
  STATIC_MODIFIER_NAME_tibetan_lama: "Лама"
  STATIC_MODIFIER_DESC_tibetan_lama: "Могутній Лама оселився в нашій столиці та об'єднався з нашими правителями."
  buddhism_events.1201.title: "Посланець повертається з [ShowRegionNameWithNoTooltip('tibet_region')]"
  buddhism_events.1201.desc: "Наш посланець з [ShowRegionName('tibet_region')] повернувся з новинами про могутнього релігійного лідера, який зацікавився справою [target_ruler.GetName] та [target_ruler.GetHerHis] династії. Однак, якщо він має прибути до [ROOT.GetCountry.GetCapital.GetName], ми повинні бути здатні зробити набагато більше, ніж просто гарантувати його безпеку. Щоб Лама пов'язав свою долю з нашою, ми повинні присягнутися, що йому та його майбутнім втіленням буде надано належну повагу та вплив у нашому [ROOT.GetCountry.GetFlavorRank], і що ми створимо [ShowBuildingTypeName('tibetan_great_monastery')] для нього та його учнів. Якщо ми не зможемо надати ці гарантії, нам доведеться задовольнитися прийомом делегації ченців, які прагнуть заснувати громаду на наших землях."
  buddhism_events.1201.a: "Погодитися."
  buddhism_events.1201.b: "Прийняти ченців."
  STATIC_MODIFIER_NAME_influx_of_tibetan_monks: "Наплив тибетських ченців"
  STATIC_MODIFIER_DESC_influx_of_tibetan_monks: "Делегація тибетських ченців прибула до цих земель, щоб поширити [ShowReligionGroupName('buddhist')] тут і в усіх куточках країни."
  buddhism_events.1202.title: "Смерть Лами"
  buddhism_events.1202.desc: "Наш найшанованіший і найпочесніший Лама помер, і почалися пошуки [target_character.GetHerHis] реінкарнації. Хоча [target_character.GetHerHis] орден впевнений, що зможе швидко знайти [target_character.GetHerHis] нове втілення, ймовірно, що допомога від держави для фінансування експедиції не буде зайвою."
  buddhism_events.1202.a: "Даймо їм руку допомоги."
  buddhism_events.1202.b: "Звісно, вони впораються."
  buddhism_events.1203.title: "Реінкарнація знайдена"
  buddhism_events.1203.desc: "Орден нашого старого Верховного Лами зумів знайти [target_old_lama.GetHerHis] нове втілення і посадив [target_character.GetHerHis] на трон у своєму [ShowBuildingTypeName('tibetan_great_monastery')]."
  buddhism_events.1203.a: "Хай [target_character.GetSheHe] живе довго."
  buddhism_events.1204.title: "Легітимність інкарнації під питанням"
  buddhism_events.1204.desc: "Тонкощі переродження іноді можуть бути незрозумілими для простіших умів. Хоча [target_character.GetHerHis] орден наполягає, що їхній новий Лама є реінкарнацією їхнього старого лідера, деякі люди в сільській місцевості дуже вагаються прийняти цей факт. Оскільки вони не визнають [target_character.GetHerHim], вони бояться, що їх обдурили, і в кількох випадках напруга зростала до збройного конфлікту."
  buddhism_events.1204.a: "Надіслати посланців, щоб переконати їх."
  buddhism_events.1204.b: "Надіслати війська, щоб переконати їх."
  buddhism_events.1300.title: "Релігійне керівництво"
  buddhism_events.1300.desc: "Острів [ShowAreaName('sailan_area')] протягом століть був джерелом сильної [ShowReligionName('theravada')] [ShowReligionGroupAdjective('buddhist')] традиції. Багато в чому це зразкове суспільство для [ShowReligionNameWithNoTooltip('theravada')] держави, а його процвітаючі монастирські громади є предметом заздрості [ShowReligionGroupAdjectiveWithNoTooltip('buddhist')] світу.\n\nХоча наша власна держава також дотримується [ShowReligionNameWithNoTooltip('theravada')] шляху, наші закони та традиції є сумішшю місцевих традицій та ідей конкуруючих [ShowReligionGroupAdjectiveWithNoTooltip('buddhist')] шкіл, і нам бракує сильної монастирської інфраструктури острова. Деякі в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] припускають, що для виправлення цього ми повинні відправити посольство до [ShowAreaNameWithNoTooltip('sailan_area')] і попросити їх надіслати нам ченців, щоб вони принесли свої [ShowReligionNameWithNoTooltip('theravada')] традиції до нашої країни."
  buddhism_events.1300.a: "Відправимо посольство."
  buddhism_events.1300.b: "Ні, ми повинні підтримувати наші місцеві секти!"
  STATIC_MODIFIER_NAME_supporting_local_monastic_traditions: "Підтримка місцевої монастирської традиції"
  buddhism_events.1301.title: "Посольство з [target_origin_country.GetNameWithNoTooltip]"
  buddhism_events.1301.desc: "Процвітаючі монастирські громади, святі реліквії, а також давня традиція співіснування монастирської та королівської влади роблять нас предметом заздрості багатьох [ShowReligionName('theravada')] правителів. Тому не дивно, що [target_origin_country.GetGovernment.GetRulerTitle] [target_origin_country.GetName] прагне наслідувати нашу велич. [target_origin_country.GetAdjectiveWithNoTooltip] посольство, яке прибуло сьогодні, просить нас дозволити кільком їхнім ченцям поїхати до нашої країни та отримати тут посвячення, щоб принести наші традиції до [target_origin_country.GetNameWithNoTooltip]."
  buddhism_events.1301.a: "Дозволити."
  lankan_monks_sent: "[ShowReligionName('theravada')] обмін ченцями"
  buddhism_events.1301.b: "Вони не зроблять нічого подібного!"
  no_lankan_monks_sent: "Відмовлено в монастирській освіті"
  buddhism_events.1302.title: "[target_country.GetAdjectiveWithNoTooltip] відповідь"
  buddhism_events.1302.desc: "[target_country.GetGovernment.GetRulerTitle] [target_country.GetName] дозволив 40 ченцям отримати посвячення в [target_ruler.GetHerHis] країні. [target_ruler.GetSheHe|U] також надіслав групу ченців безпосередньо зі [target_ruler.GetHerHis] земель до наших, щоб забезпечити розумну передачу [ShowReligionName('theravada')] традицій."
  buddhism_events.1302.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_monks_from_ceylon: "Вплив з [ShowAreaName('sailan_area')]"
  STATIC_MODIFIER_DESC_monks_from_ceylon: "Ми зазнали великого впливу з боку держав [ShowAreaName('sailan_area')] та тамтешніх монастирських орденів. Це дозволило нам встановити набагато глибші зв'язки з престижними [ShowReligionName('theravada')] традиціями цього острова."
