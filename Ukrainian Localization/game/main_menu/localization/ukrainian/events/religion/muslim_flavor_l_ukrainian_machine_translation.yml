l_english:
  muslim_flavor.1.title: "$ramadan$"
  muslim_flavor.1.desc: "Незабаром настане дев'ятий місяць нашого календаря, і [ShowReligionGroupAdjective('muslim')] віряни по всьому світу готуються до місяця посту. Це один із П'яти Стовпів [ShowReligionGroupNameWithNoTooltip('muslim')] і є фард (обов'язковим) для всіх дорослих [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] чоловіків і жінок, які не хворі, не подорожують і не вагітні. Від світанку до заходу сонця не можна вживати їжу, пити рідини, використовувати тютюн і мати статеві стосунки. Це час духовних роздумів, самовдосконалення та посиленої відданості й поклоніння. Жоден [ShowReligionGroupAdjectiveWithNoTooltip('muslim')], хто боїться [ROOT.GetCountry.GetReligion.GetGodName], не повинен ігнорувати $ramadan$."
  muslim_flavor.1.a: "Час постити."
  muslim_flavor.1.b: "Ігнорувати це."
  muslim_flavor.2.title: "'Ід аль-Фітр"
  muslim_flavor.2.desc: "Свято Розговіння знаменує кінець $ramadan$, і [ShowReligionGroupAdjective('muslim')] віряни по всьому світу намагаються висловити спільну мету єдності. Деякі вважають, що свято є фард (обов'язковим), тоді як інші вважають його мустахабб (настійно рекомендованим, майже обов'язковим) або мендуб (бажаним). Усі [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] віряни повинні пробачити та забути будь-які розбіжності з іншими або ворожнечі, що могли виникнути протягом року."
  invited_eid_al_fitr: "Запрошено на 'Ід аль-Фітр"
  muslim_flavor.2.a: "Святкуймо три дні та запросімо всіх!"
  muslim_flavor.2.a.tt: "Кожна сусідня [ShowReligionGroupAdjective('muslim')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowBiasValue('invited_eid_al_fitr')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [ROOT.GetCountry.GetName]"
  muslim_flavor.2.b: "Святкуймо два дні."
  muslim_flavor.2.c: "Святкуймо один день."
  muslim_flavor.3.title: "Запрошено на 'Ід аль-Фітр"
  muslim_flavor.3.desc: "Правитель [origin.GetName], [target_ruler.GetName], запросив емісара нашого [ROOT.GetCountry.GetFlavorRank] відсвяткувати Свято Розговіння, що знаменує кінець $ramadan$. Свято триватиме три дні, і все, що від нас вимагається, це пробачити та забути будь-які розбіжності з іншими або ворожнечі, що могли виникнути протягом року."
  muslim_flavor.3.a: "Гідне завершення $ramadan$."
  muslim_flavor.4.title: "Хадж"
  muslim_flavor.4.desc: "Кожен працездатний [ShowReligionGroupAdjective('muslim')] чоловік і жінка, які можуть дозволити собі здійснити Хадж, зобов'язані зробити це принаймні один раз, щоб виконати релігійний обов'язок і один із П'яти Стовпів [ShowReligionGroupNameWithNoTooltip('muslim')]. Це паломництво до [ShowLocationName('mecca')], де всі паломники-чоловіки одягаються в іхрам, щоб показати рівність усіх паломників перед [ROOT.GetCountry.GetReligion.GetGodName], оскільки немає різниці між принцом і жебраком. Паломники не голяться, не стрижуть нігті, не користуються парфумами, не лаються і не сперечаються, не мають статевих стосунків, не викорчовують і не пошкоджують рослини, не вбивають і не шкодять диким тваринам, не покривають голову або обличчя та руки, не одружуються, не носять взуття вище щиколоток і не носять зброї. Як правитель [ROOT.GetCountry.GetLongName] і працездатний [ShowReligionGroupAdjective('muslim')] [target_ruler.GetWomanMan], [target_ruler.GetName] настав час подати приклад і розпочати Хадж."
  muslim_flavor.4.a: "[ShowLocationNameWithNoTooltip('mecca')] чекає!"
  muslim_flavor.4.b: "Не зараз!"
  muslim_flavor.5.title: "Ритуали Хаджу"
  muslim_flavor.5.desc: "Багато ритуалів Хаджу включають Таваф, де паломники відвідують Каабу і обходять її сім разів проти годинникової стрілки, промовляючи молитву в кожному колі, завершуючи ритуал молитвою та пробігаючи або проходячи сім разів між пагорбами ас-Сафа та аль-Марва. Наступного дня паломники вирушають до гори Арафат, де стоять у споглядальному чуванні, моляться та читають $common_string_quran$. Ніч проводять, сплячи на землі Муздаліфи. Наступного дня паломники кидають каміння, щоб позначити свою непокору шайтану, у найбільший стовп, відомий як Джамрат аль-Акаба. Коли сім каменів кинуто, паломники забивають тварин, щоб вшанувати історію $name_abraham.arabic_language$ та $name_ishmael.arabic_language$. Паломництво майже завершено, але деякі завдання ще залишаються."
  muslim_flavor.5.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  muslim_flavor.6.title: "Кінець Хаджу"
  muslim_flavor.6.desc: "Передостанній ритуал — знову відвідати мечеть Масджид аль-Харам у [ShowLocationName('mecca')], щоб ще раз обійти Каабу. Це називається Таваф аль-Іфада, що символізує поспіх у відповіді [ROOT.GetCountry.GetReligion.GetGodName] і виявлення любові до Нього. Перед від'їздом з [ShowLocationNameWithNoTooltip('mecca')] паломники виконують прощальний таваф, який називається Таваф аль-Вада. Деякі паломники подорожують до міста [ShowLocationName('medina')] та Аль-Масджид ан-Набаві, де знаходиться гробниця Пророка Мухаммада, мир йому."
  muslim_flavor.6.a: "Хадж завершено."
  completed_hajj: "Хадж завершено"
  every_known_muslim_completed_hajj_tt: "Кожна відома [ShowReligionGroupAdjective('muslim')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowBiasValue('completed_hajj')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e]"
  muslim_flavor.7.title: "Ремонт Масджид аль-Харам"
  muslim_flavor.7.desc: "Найвеличніша мечеть світу, Масджид аль-Харам, оточує одне з найсвятіших місць [ShowReligionGroupName('muslim')], Каабу, до якої всі працездатні [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] віряни подорожують принаймні раз у житті, щоб здійснити Хадж. Це був перший дім, збудований для поклоніння людства [ROOT.GetCountry.GetReligion.GetGodName]. Її дерев'яні колони були замінені на мармурові, і додано мінарет. Скромний архітектор, [mimar_sinan.GetName], звернувся до нас і розповів про [mimar_sinan.GetHerHis] плани замінити плаский дах куполами, прикрашеними каліграфією зсередини."
  muslim_flavor.7.a: "Відремонтувати мечеть під наглядом [mimar_sinan.GetNameWithNoTooltip]."
  muslim_flavor.7.b: "Дотримуватися пропозицій [mimar_sinan.GetNameWithNoTooltip] і відремонтувати мечеть."
  muslim_flavor.7.c: "Нічого не робити."
  muslim_flavor.8.title: "[ShowReligiousSchoolNameWithNoTooltip('suhrawardi_school')]"
  muslim_flavor.8.desc: "Суфійський орден, заснований Абу аль-Наджибом Абд аль-Кадіром Сухраварді, є суворо [ShowReligionAdjective('sunni')] орденом, що керується [ShowReligiousSchoolName('shafii_school')] школою ісламського права. Хоча він існував з XI століття, останніми роками він пережив невелике відродження і відіграв важливу роль у формуванні нової консервативної побожності. Футувви, будучи гільдіями, що наголошують на чесності, миролюбності, лагідності, щедрості, уникненні скарг та гостинності в житті, також були відроджені [ShowReligiousSchoolName('suhrawardi_school')]."
  muslim_flavor.8.a: "Їхня робота гідна захоплення, ми повинні їх підтримати."
  muslim_flavor.8.b: "Те, що вони роблять, добре, але ми не хочемо брати в цьому участь."
  muslim_flavor.9.title: "Заборонити алкоголь, [ShowGoodsNameWithNoTooltip('coffee')] та [ShowGoodsNameWithNoTooltip('tobacco')]?"
  muslim_flavor.9.desc: "Існують оповіді про мудрого та побожного $rank_kingdom_muslim_ruler_male$ з далекої землі, якому вдалося придушити корупцію, що розрослася за правління його попередників, за допомогою таких змін у політиці, як обмеження марнотратних витрат. Проте його найпобожнішими наказами були заборони на алкоголь, [ShowGoodsName('tobacco')] та [ShowGoodsName('coffee')] у його столиці. Щоб забезпечити виконання заборони, він патрулював вулиці та таверни столиці в цивільному одязі вночі, наказуючи страчувати всіх, хто порушував заборону. Будучи безжальним прихильником заборони алкоголю, він сам був не проти випити, що викликає сумніви в наших умах, чи було б мудро впроваджувати подібні заборони."
  muslim_flavor.9.a: "Наслідувати побожні шляхи легендарного $rank_kingdom_muslim_ruler_male$."
  muslim_flavor.9.b: "Натомість збільшити податок на ці товари."
  muslim_flavor.9.c: "Ми не бажаємо нав'язувати ці моральні принципи іншим."
  muslim_flavor.10.title: "Моральні принципи імператора"
  muslim_flavor.10.desc: "По всьому нашому [ROOT.GetCountry.GetFlavorRank] ширяться історії про міфічного імператора, який був відомий тим, що насаджував мораль і заборонив споживання, використання та практики алкоголізму, азартних ігор, кастрації, рабства, євнухів, музики, наутч (особливого танцю) та наркотиків у далекій Імперії. Хоча він, можливо, зайшов трохи занадто далеко у своїй одержимості, серед іншого, легенди свідчать, що він наказував карати [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] практиків, які одягалися як не-[ShowReligionGroupAdjectiveWithNoTooltip('muslim')] невіруючі, деякі з його ідей можуть підвищити побожність населення нашого [ROOT.GetCountry.GetFlavorRank]."
  muslim_flavor.10.a: "Наслідувати його ідеї."
  muslim_flavor.10.b: "Просто збільшити податок на алкоголь."
  muslim_flavor.10.c: "Він звучить як божевільний!"
  muslim_flavor.11.title: "[target_character.GetNameWithNoTooltip] – Небесний глобус"
  muslim_flavor.11.desc: "Масивний, безшовний небесний глобус, прикрашений [ShowLanguageName('arabic_language')] та [ShowLanguageName('persian_language')] написами, був сьогодні представлений [ROOT.GetCountry.GetGovernment.GetCourtTitle]. [target_character.GetName], металург, астроном, експерт з геометрії та майстер, використав секретний метод лиття воском для створення небесного глобуса. [target_character.GetSheHe|U] впевнений, що [target_character.GetSheHe] зможе повторити цей подвиг у металургії та створити для нас ще багато небесних глобусів."
  muslim_flavor.11.a: "Прийняти глобус і закликати [target_character.GetHerHim] створити більше."
  muslim_flavor.11.b: "Запропонувати [target_character.GetHerHim] місце при [ROOT.GetCountry.GetGovernment.GetCourtTitle]!"
  muslim_flavor.12.title: "[mian_mir_char.GetNameWithNoTooltip]"
  muslim_flavor.12.desc: "Типове релігійне питання постало, і радники при [ROOT.GetCountry.GetGovernment.GetCourtTitle] спантеличені. Єдина слушна порада, яку хтось із них висловив, була: «[mian_mir_char.GetName], суфійський святий у Лахорі, можливо, зможе допомогти». [mian_mir_char.GetNameWithNoTooltip], відомий тим, що уникає мирських і егоїстичних людей з усіх верств суспільства, від жадібних головорізів до заздрісних емірів, до будь-яких амбітних нуввабів, які б переслідували факіра за благословенням, але друг тих, хто любить [ROOT.GetCountry.GetReligion.GetGodName], нелегко наблизитися. [mian_mir_char.GetHerHis|U] мурідуна, [mian_mir_char.GetHerHis] учні, стоять біля воріт [mian_mir_char.GetHerHis] будинку, щоб зупинити тих, кого [mian_mir_char.GetSheHe] не бажає бачити. Однак побожний правитель нашого [ROOT.GetCountry.GetFlavorRank], [target_ruler.GetName], є тим, кого [mian_mir_char.GetNameWithNoTooltip] прийме і порадить."
  muslim_flavor.12.a: "Попросити [mian_mir_char.GetHerHim] поради."
  muslim_flavor.12.b: "Знайти інше вирішення проблеми."
  muslim_flavor.13.title: "Пожежа в Аязмакапі"
  muslim_flavor.13.desc: "Велика пожежа в [ShowLocationName('constantinople')] знищила [ShowReligionAdjective('judaism')] квартали, і було вирішено, що згорілі квартали мають бути примусово викуплені державою. [ShowReligionAdjectiveWithNoTooltip('judaism')] купці протестують проти цього і прагнуть змінити це рішення, пропонуючи нашим чиновникам великий грошовий хабар зі свого «Фонду нещасних випадків та надзвичайних ситуацій». Чиновники повідомили [target_ruler.GetName], що [ShowReligionAdjectiveWithNoTooltip('judaism')] купці запропонували, щоб уникнути примусового викупу, і чекають на відповідь."
  muslim_flavor.13.a: "Прийняти їхні хабарі."
  muslim_flavor.13.b: "Відмовитися від хабарів і покарати хабарників."
  muslim_flavor.14.title: "Орден [ShowReligiousSchoolNameWithNoTooltip('chishti_school')]"
  muslim_flavor.14.desc: "Відомий своїм акцентом на любові, толерантності та відкритості, орден [ShowReligiousSchoolName('chishti_school')] поширився на провінції [ROOT.GetCountry.GetName], і їхнє прихильне ставлення до шукачів, які належать до інших релігій, може стати способом навернути більше людей до [ShowReligionGroupName('muslim')]. Вони досить суворі у своїй вірі, що вчитель [ShowReligiousSchoolNameWithNoTooltip('chishti_school')] не повинен відвідувати [ROOT.GetCountry.GetGovernment.GetCourtTitle] або брати участь у державних справах, оскільки це зіпсує душу мирськими справами. Деякі [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] віруючі вважають, що музика є [ROOT.GetCountry.GetReligion.GetSinName], забороненою, тоді як послідовники [ShowReligiousSchoolNameWithNoTooltip('chishti_school')] вірять, що пісня або слухання музики можуть викликати божественну присутність."
  muslim_flavor.14.a: "Прийняти орден [ShowReligiousSchoolNameWithNoTooltip('chishti_school')]."
  muslim_flavor.14.b: "Вигнати їх з наших земель!"
  muslim_flavor.15.title: "[ShowReligiousSchoolNameWithNoTooltip('qadiri_school')]"
  muslim_flavor.15.desc: "[ShowReligiousSchoolName('qadiri_school')] є впливовою [ShowReligionAdjective('sunni')] установою, і кадірійські дервіші носять у своїх шапках троянду із зеленої та білої тканини з шестикутною зіркою посередині. Боротьба проти бажань его підкреслюється вченнями [ShowReligiousSchoolNameWithNoTooltip('qadiri_school')]. Дві стадії більшої боротьби – це, по-перше, дії, заборонені релігійним законом, і, по-друге, проти фундаментальних пороків, таких як жадібність, марнославство та страх. «Справжній шукач [ROOT.GetCountry.GetReligion.GetGodName] повинен подолати всі бажання, крім бажання бути взятим під опіку [ROOT.GetCountry.GetReligion.GetGodName]», – це добре відомий вислів з вчень [ShowReligiousSchoolNameWithNoTooltip('qadiri_school')]."
  muslim_flavor.15.a: "Їхні вчення правдиві, ми надамо їм нашу підтримку."
  muslim_flavor.15.b: "Ми нічого не можемо від них навчитися."
  muslim_flavor.16.title: "Закони $sharia$"
  muslim_flavor.16.desc: "Моральний кодекс і релігійний закон [ShowReligionGroupName('muslim')] стосується багатьох тем, таких як злочинність, політика, економіка, а також особисті питання, такі як статеві стосунки, гігієна, дієта, молитва та піст. Він вважається непогрішним законом [ROOT.GetCountry.GetReligion.GetGodName], і є два джерела закону. Перше – це приписи, викладені в $common_string_quran$, і приклад, поданий пророком Мухаммадом, мир йому, в $sunnah$. Каді та імами скаржаться на слабке дотримання закону $sharia$ в [ROOT.GetCountry.GetName] і наполягають, щоб [ROOT.GetCountry.GetGovernment.GetCourtTitle] забезпечив виконання закону в будь-який час."
  muslim_flavor.16.a: "Суворіші закони $sharia$."
  muslim_flavor.16.b: "Менш суворі закони $sharia$."
  muslim_flavor.17.title: "$a_ghilman$"
  muslim_flavor.17.desc: "Раніше раби-воїни [ROOT.GetCountry.GetName] навчалися та виховувалися за рахунок своїх господарів, служачи їм у будь-якій якості, яку вони бажали. Більшість з них були солдатами, деякі – адміністраторами, але всі вони навернулися до [ShowReligionGroupName('muslim')]. Деякі з них досі залишаються в [ROOT.GetCountry.GetNameWithNoTooltip], без господаря і шукають спосіб повернути сенс у своє життя. $a_ghilman$ навіть відправили заступника до [target_ruler.GetName], запитуючи, чи можуть вони знайти службу в нашому [ROOT.GetCountry.GetFlavorRank]."
  muslim_flavor.17.a: "Дати їм адміністративну роботу."
  muslim_flavor.17.b: "Найняти їх як солдатів."
  muslim_flavor.17.c: "Дозволити їм допомагати дипломатичному корпусу."
  muslim_flavor.18.title: "[reza_abbasi.GetNameWithNoTooltip]"
  muslim_flavor.18.desc: "Люди [target_location.GetName] говорять про особливо вправного [reza_abbasi.GetArtistType.GetName], [reza_abbasi.GetDaughterSon] з роду художників-мініатюристів. [reza_abbasi.GetHerHis|U] роботи, здається, привертають увагу як молодих, так і літніх, зазвичай зображуючи лише одну або дві особи на простому тлі, таким чином зосереджуючись на фігурі та особистості зображених."
  muslim_flavor.18.a: "Підтримати [reza_abbasi.GetHerHim] та [reza_abbasi.GetHerHis] мистецтво."
  muslim_flavor.18.b: "Нехай усі знають про [reza_abbasi.GetHerHis] талант!"
  muslim_flavor.19.title: "[baha_al_din.GetNameWithNoTooltip]"
  muslim_flavor.19.desc: "Завдяки вченням вченого, філософа, архітектора, математика, астронома та поета [baha_al_din.GetName] поширюється захоплива нова ідея про те, що Сонце є центром Всесвіту, а Земля обертається навколо нього по круговій орбіті. Книга, над якою [baha_al_din.GetSheHe] працював, «Ташріх аль-афляк», або «Анатомія небесних сфер», підтверджує погляд, що підтримує позиційне обертання Землі."
  muslim_flavor.19.a: "[baha_al_din.GetSheHe|U] матиме нашу підтримку, щоб завершити [baha_al_din.GetHerHis] роботу."
  muslim_flavor.19.b: "Ігнорувати [baha_al_din.GetHerHim]."
  muslim_flavor.21.title: "[ShowBuildingTypeNameWithNoTooltip('madrasa')]"
  muslim_flavor.21.desc: "[ShowBuildingTypeName('madrasa')], що означає «місце, де відбувається навчання та вивчення», викладає тафсір або тлумачення $common_string_quran$, $sharia$ або ісламське право, хадиси або записані вислови та вчинки Пророка Мухаммада, мир йому, та мантік або логіку. Деякі [ShowBuildingTypeNameWithNoTooltip('madrasa')] також викладають математику, астрономію, астрологію, географію, алхімію, філософію, магію та окультизм. Майбутнє землі лежить у руках дітей, і, щоб мати змогу довірити їм майбутнє нашого [ROOT.GetCountry.GetFlavorRank], найкраще їх навчати та переконатися, що їхні знання про світ ніколи не підведуть їх."
  muslim_flavor.21.a: "Підтримати нашу [ShowBuildingTypeNameWithNoTooltip('madrasa')]!"
  muslim_flavor.21.b: "Нічого не робити."
  muslim_flavor.22.title: "[charitable_spouse.GetNameWithNoTooltip]"
  muslim_flavor.22.desc: "[charitable_spouse.GetName] попросив аудієнції в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle], і після того, як [charitable_spouse.GetHerHim] дозволили звернутися до [ROOT.GetCountry.GetGovernment.GetCourtTitle], [charitable_spouse.GetSheHe] попросив дозволу на будівництво колодязів, водосховищ та штучних басейнів уздовж шляху до [ShowLocationName('mecca')] та [ShowLocationName('medina')] для забезпечення водою [ShowReligionGroupAdjective('muslim')] паломників."
  muslim_flavor.22.a: "Надати [charitable_spouse.GetHerHim] символічну допомогу."
  muslim_flavor.22.b: "Допомогти [charitable_spouse.GetHerHim] з [charitable_spouse.GetHerHis] святою справою!"
  muslim_flavor.22.c: "[charitable_spouse.GetSheHe|U] слід відмовитися від таких дорогих ідей!"
  muslim_flavor.23.title: "[serafeddin_sabuncuoglu_char.GetNameWithNoTooltip]"
  muslim_flavor.23.desc: "Хоча [serafeddin_sabuncuoglu_char.GetSheHe] тепер стара [serafeddin_sabuncuoglu_char.GetWomanMan], хірург і лікар [serafeddin_sabuncuoglu_char.GetName] все ще практикує медицину в лікарні [ShowLocationName('amasya')], яка була побудована в 1308 році, майже за вісімдесят років до народження [serafeddin_sabuncuoglu_char.GetSheHe]. Знання [serafeddin_sabuncuoglu_char.GetName] величезні, і [serafeddin_sabuncuoglu_char.GetSheHe] готовий переписати все це в перший хірургічний атлас, який безперечно стане довідником для медичних книг."
  muslim_flavor.23.a: "З нашою допомогою [serafeddin_sabuncuoglu_char.GetSheHe] практикуватиме медицину ще багато років."
  muslim_flavor.23.b: "І що?"
  muslim_flavor.24.title: "[birjandi.GetNameWithNoTooltip]"
  muslim_flavor.24.desc: "[birjandi.GetName] — блискучий астроном, математик і фізик, чия відповідь на один з аргументів Кутба аль-Діна аль-Ширазі була такою:\n\n#italic Малий чи великий камінь впаде на Землю по шляху, перпендикулярному до площини (сатх) горизонту, це засвідчено досвідом (таджріба). І цей перпендикуляр знаходиться далеко від точки дотику сфери Землі та площини сприйнятого (хіссі) горизонту. Ця точка рухається разом з рухом Землі, і таким чином не буде різниці в місці падіння двох каменів.#!\n\n[birjandi.GetSheHe|U] написав багато книг, і [birjandi.GetHerHis] знання та вміння повинні бути дуже корисними для нашого [ROOT.GetCountry.GetFlavorRank]."
  muslim_flavor.24.a: "Ми підтримаємо [birjandi.GetHerHis] роботу."
  muslim_flavor.24.b: "Хто це? Чому нас це має хвилювати?"
  muslim_flavor.25.title: "Люди Книги — [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('dhimmi_estate')] [ROOT.GetCountry.GetNameWithNoTooltip]"
  muslim_flavor.25.desc: "Люди Книги — ті, що належать до [ShowReligionGroupAdjective('christian')], до [ShowReligionAdjective('judaism')] та сабеїв — визнають Бога $name_abraham.arabic_language$ єдиним Богом, як і [ShowReligionGroupAdjective('muslim')] вірні, і сповідують одкровенні віри, засновані на божественних настановах. Населення [ROOT.GetCountry.GetName] майже повністю складається з [ROOT.GetCountry.GetGovernment.GetEstateName('dhimmi_estate')], і хоча їм надаються звичайні речі, пов'язані з цим статусом у [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] [ROOT.GetCountry.GetFlavorRank], багато з них вважають, що ми могли б бути більш поступливими, враховуючи багатство [capital_region.GetName]. Було запропоновано створити ще більш сприятливі умови для [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('dhimmi_estate')] [ROOT.GetCountry.GetNameWithNoTooltip], оскільки це було б у наших власних інтересах для заохочення процвітання серед усіх наших народів."
  muslim_flavor.25.a: "Давайте сприятимемо їхній присутності тут."
  muslim_flavor.25.b: "Наверніть їх, виженіть їх — зітріть їх!"
  muslim_flavor.26.title: "Магді"
  muslim_flavor.26.desc: "[mahdi.GetWomanMan] заявляє, що є Магді, пророкованим визволителем [ShowReligionGroupName('muslim')], який правитиме сім років до Судного дня. [mahdi.GetSheHe|U] обіцяє очистити світ від зла та відновити праведність. Невіруючі, які стверджують, що [mahdi.GetWomanMan] не є Магді, розгнівали [mahdi.GetHerHis] послідовників, і наш [ROOT.GetCountry.GetFlavorRank] перебуває у сум'ятті."
  muslim_flavor.26.a: "[target_ruler.GetNameWithNoTooltip] прийме [mahdi.GetHerHim] як пророкованого визволителя [ShowReligionGroupNameWithNoTooltip('muslim')]."
  muslim_flavor.26.b: "Відкиньте [mahdi.GetHerHim] і викрийте [mahdi.GetHerHim] як шахрая."
  muslim_flavor.27.title: "[ShowReligionNameWithNoTooltip('shia')] та [ShowReligionAdjectiveWithNoTooltip('sunni')]"
  muslim_flavor_27.common: "Напруга між [ShowReligionNameWithNoTooltip('sunni')] та [ShowReligionNameWithNoTooltip('shia')] у [ROOT.GetCountry.GetName] зростала протягом років, і лише завдяки дипломатичному корпусу досі нічого не сталося."
  muslim_flavor.27.desc: "Кожен істинний віруючий у вчення [ShowReligionName('shia')] знає, що лише спадкоємці четвертого халіфа, Алі, є законними наступниками Мухаммада, мир йому. Послідовники [ShowReligionAdjective('sunni')] віри вважають, що перші чотири халіфи — наступники Мухаммада — по праву зайняли його місце як лідери [ShowReligionGroupName('muslim')], і вони визнають спадкоємців чотирьох халіфів законними релігійними лідерами. Тим часом, ми знаємо, що не жили під владою законної релігійної фігури з тих пір, як Дванадцятий Імам зник у 941 році.\n\n$muslim_flavor_27.common$"
  muslim_flavor.27.a: "Ігнорувати проблему."
  muslim_flavor.27.b: "Знайти спосіб послабити напругу між ними."
  muslim_flavor.28.title: "$muslim_flavor.27.title$"
  muslim_flavor.28.desc: "Кожен вірний [ShowReligionAdjective('sunni')] знає, що перші чотири халіфи — наступники Мухаммада — по праву зайняли його місце як лідери [ShowReligionGroupName('muslim')], і спадкоємці чотирьох халіфів є законними релігійними лідерами нашої віри. Ошукані послідовники [ShowReligionAdjective('shia')] вчень вірять, що лише спадкоємці четвертого халіфа, Алі, є законними наступниками Мухаммада, мир йому, і що не було законної релігійної фігури з тих пір, як Дванадцятий Імам зник у 941 році.\n\n$muslim_flavor_27.common$"
  muslim_flavor.28.a: "Ігнорувати проблему."
  muslim_flavor.28.b: "Знайти спосіб послабити напругу між ними."