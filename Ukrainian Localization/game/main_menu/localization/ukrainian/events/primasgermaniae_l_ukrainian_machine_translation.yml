l_english:
  primasgermaniae.1.title: "Primas Germaniae"
  primasgermaniae.1.desc: "З десятого століття [target_country.GetGovernment.GetRulerTitle] [target_country.GetName] тримали престижний титул [ShowGovernmentReformName('primas_germaniae')] — найважливіший [ShowReligionAdjective('catholic')] [target_country.GetGovernment.GetRulerTitle] у всій [GetUniqueInternationalOrganization('hre').GetName].\n\nПриродно, такий титул викликатиме заздрість серед інших князів Імперії... Наш правитель, [home_ruler.GetName], мусить бути обачним і не дозволити нашому $game_concept_prestige$ впасти надто низько, інакше ми можемо втратити цей титул!"
  primasgermaniae.1.a: "Розумію..."
  primasgermaniae.2.title: "Титул Primas Germaniae піддано сумніву"
  primasgermaniae.2.desc: "Мій [target_country.GetGovernment.GetRulerTitle], значна частина [ShowReligionAdjective('catholic')] спільноти, здається, втратила віру в нас! Ходять навіть чутки, що інше архієпископство планує претендувати на наш титул [ShowGovernmentReformName('primas_germaniae')]!"
  primasgermaniae.2.a: "Ймовірно, лише чутки."
  primasgermaniae.3.title: "Primas Germaniae"
  primasgermaniae.3.desc: "Титул [ShowGovernmentReformName('primas_germaniae')] — найважливіший [ShowReligionAdjective('catholic')] [original_prime.GetGovernment.GetRulerTitle] у всій [GetUniqueInternationalOrganization('hre').GetName] — був створений у десятому столітті, коли архієпископство Майнца стало першим архієпископством, що його отримало.\n\nДля другорядної держави [original_prime.GetLongName] утримувати такий престижний титул здається образою для [GetUniqueInternationalOrganization('catholic_church').GetName]. Можливо, можна знайти більш гідного кандидата?"
  primasgermaniae.3.a: "Можливо... я?"
  opinion_accepted_primas_germaniae: "Прийнято титул Primas Germaniae"
  primasgermaniae.3.b: "Залишити як є. Поки що..."
  opinion_supported_primas_germaniae: "Підтримано обраного новим Primas Germaniae"
  primasgermaniae.4.title: "Primas Germaniae втрачено"
  primasgermaniae.4.desc: "Мій [original_prime.GetGovernment.GetRulerTitle], ми втратили престижний титул [ShowGovernmentReformName('primas_germaniae')]. Через наше низьке становище в [GetUniqueInternationalOrganization('hre').GetName] останнім часом, інший архієпископ, [new_primae.GetGovernment.GetRuler.GetName] з [new_primae.GetName], випередив нас і заявив права на титул!"
  primasgermaniae.4.a: "Дуже добре, привітайте його..."
  opinion_congratulated_new_primas_germaniae: "Привітано нового Primas Germaniae"
  primasgermaniae.4.b: "Ми цього не забудемо!"
  opinion_lost_primas_germaniae: "Не підтримано обраного новим Primas Germaniae"
  primasgermaniae.6.title: "Посланець від [pope_country.GetGovernment.GetRulerTitle]"
  primasgermaniae.6.desc: "Добрі вісті! Нас обрав [pope_country.GetGovernment.GetRulerTitle], щоб ми тримали престижний титул [ShowGovernmentReformName('primas_germaniae')] — найважливіший [ShowReligionAdjective('catholic')] архієпископ у всій [GetUniqueInternationalOrganization('hre').GetName] — після того, як попередній володар втратив прихильність."
  primasgermaniae.6.a: "Ми з радістю приймемо цей титул."
  primasgermaniae.6.b: "Ми мусимо чемно відмовитися."
  opinion_declined_primas_germaniae: "Відхилено Primas Germaniae"