l_english:
  STATIC_MODIFIER_NAME_volcanic_soil: "Вулканічний ґрунт"
  volcano_events_weak.title: "Дим на горі"
  volcano_events_weak.desc: "Видатна гора на краю [ROOT.GetLocation.GetName] кілька днів випускала дим довгим стовпом, але сьогодні вона раптово вибухнула, вивергаючи попіл і лаву, що спалюють і знищують усе на своєму шляху. Руйнування не зламало духу людей [ROOT.GetLocation.GetNameWithNoTooltip], але без допомоги їм буде важко відновити колишню силу."
  volcano_events_weak.a: "Ми нічого не могли вдіяти."
  volcano_events_weak.b: "Поспішіть їм на допомогу."
  volcano_events_minor.title: "Початок вогню"
  volcano_events_minor.desc: "Вулкан у [ROOT.GetLocation.GetName] вивергнувся з великою інтенсивністю, випускаючи довгі потоки лави та величезну хмару попелу, що залишає за собою шлях руйнування.\n\nЛюди [ROOT.GetLocation.GetNameWithNoTooltip] борються за своє життя та села, настав час надіслати їм усю підтримку, яку ми можемо надати."
  volcano_events_minor.a: "Природа покарала нас."
  volcano_events_minor.b: "Ми не зламаємося."
  volcano_events_major.title: "Вогонь і лють"
  volcano_events_major.desc: "У темряві, що поглинула ніч, вогняні потоки рясно ринули з пагорба великої гори, наче відкрита рана, їхню різку червоність неможливо було ігнорувати. Сяюча лавина вулканічного попелу слідувала за ними, як нетерплячий мисливець, її відкритий рот прагнув поглинути все на своєму шляху, доки її голод нарешті не буде втамований.\n\nНе було надії для нещасних людей [ROOT.GetLocation.GetName], оскільки більша частина сільської місцевості та багато сіл зникли під лавою. Лють гори нестримна, і лише цей двір може зупинити спустошення."
  volcano_events_major.a: "Навіть земля проти нас."
  volcano_events_major.b: "Ми відбудуємо."
  volcano_events_catastrophic.title: "Гнів гори"
  volcano_events_catastrophic.desc: "Незначні мешканці [ROOT.GetLocation.GetName] виявилися абсолютно безсилими перед обличчям люті природи. Без найменшого натяку на попередження численні села, розкидані по ландшафту, були повністю знищені, потрапивши в катастрофічне виверження вулкана, що зловісно нависав над ними.\n\nГнів гори обрушився з невблаганною силою, утворюючи лавину вулканічного попелу, що прагнула поглинути все на своєму шляху. Багато сяючих язиків лави вивергалися з серця гори, спалюючи та знищуючи все на своєму шляху.\n\nКоли ландшафт змінювався на їхніх очах, людям [ROOT.GetLocation-.GetNameWithNoTooltip] стало болісно ясно, що мало що можна зробити, щоб протистояти цьому спустошенню."
  volcano_events_catastrophic.a: "Усе втрачено."
  volcano_events_catastrophic.b: "Надія ще є."