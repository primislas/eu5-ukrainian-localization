l_english:
  free_cities.1.title: "Вільне [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  free_cities.1.desc: "[ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] [ROOT.GetCountry.GetCapital.GetName] отримало імперську безпосередність як [ShowSpecialStatusName('free_city')] [GetUniqueInternationalOrganization('hre').GetName]. Хоча в Імперії є багато важливих самоврядних міст, [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] тепер має щось більше, ніж своє багатство та розмір, щоб захистити себе – економічні та політичні свободи, вічно гарантовані [GetUniqueInternationalOrganization('hre').GetLeaderTitle] [target_ruler.GetHerselfHimself]."
  free_cities.1.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  free_cities.2.title: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] втратило привілеї [ShowSpecialStatusNameWithNoTooltip('free_city')] Імперії!"
  free_cities.2.desc: "[ROOT.GetCountry.GetCapital.GetName] більше не є [ShowSpecialStatusName('free_city')] [GetUniqueInternationalOrganization('hre').GetName]. Керівництво [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] було засуджене за макіавеллівське зловживання владою та неповагу до імперських інституцій і втратило всі привілеї, пов'язані з титулом, який колись був наданий [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  free_cities.2.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  free_cities.3.title: "Вила та смолоскипи на вулицях [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  free_cities.3.desc: "Невдоволення та ворожнеча між нижчими класами та правителями [ROOT.GetCountry.GetCapital.GetName] привели нас на межу громадянської війни. [home_ruler.GetName] погано підготовлений до повномасштабного повстання, і багато представників вищих класів закликають раду [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] звернутися до [hre_ruler.GetName], щоб благати [hre_ruler.GetHimHerFormal] про будь-яку допомогу, яку [hre_ruler.GetSheHe] може надати. Добрі сильні чоловіки та золото – це те, що нам найбільше потрібно, щоб загасити вогні повстання, що тліють на вулицях [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  free_cities.3.a: "Попросити допомоги у [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  free_cities.3.b: "Зібрати тих небагатьох чоловіків, що маємо, і розібратися самим."
  free_cities.4.title: "[SCOPE.sCountry('riots_source').GetLongNameWithNoTooltip] благає про нашу допомогу"
  free_cities.4.desc: "Сьогодні вранці ми отримали посланця від [SCOPE.sCountry('riots_source').GetLongName], який детально описав повну неспроможність міської ради задовольнити потреби своїх робітничих класів. Посланець говорив про вогні, що тліють і лютують на вулицях [SCOPE.sCountry('riots_source').GetCapital.GetName], як метафору невдоволення, з яким бореться [ShowSpecialStatusName('free_city')], і стверджує, що якщо нічого не зробити, то міські селяни незабаром піднімуть свої вила у повстанні. Вони смиренно благають про солдатів та золото, щоб вони могли швидко здійснити правосуддя над тими невдоволеними громадянами."
  free_cities.4.a: "Це розумне прохання, і ми його виконаємо."
  free_cities.4.b: "Проблема глибоко в них самих, ми не будемо надсилати допомогу."
  free_cities.5.title: "Відповідь [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  free_cities.5.desc: "З кожним днем невдоволення зростає, і хоч би як ми намагалися використовувати людей, що є в нашому розпорядженні, щойно один вогонь загасає, інший спалахує перед нашими очима. Де той посланець? Ми сподіваємося, що наше скромне прохання до [SCOPE.sCountry('hre_leader').GetGovernment.GetRuler.GetName] не розгніває [SCOPE.sCountry('hre_leader').GetGovernment.GetRuler.GetHimHerFormal], і що [SCOPE.sCountry('hre_leader').GetGovernment.GetRuler.GetSheHe] погодиться нам допомогти."
  free_cities.5.a: "Нарешті, добрі люди та добрі гроші – це саме те, що нам було потрібно!"
  free_cities.5.b: "[SCOPE.sCountry('hre_leader').GetGovernment.GetRuler.GetSheHe|U] стверджує, що проблему не можна вирішити кров'ю та золотом..."
  free_cities.6.title: "Коронація [target_ruler.GetNameWithNoTooltip]"
  free_cities.6.desc: "[pope_ruler.GetName] поклав імперські регалії в руки нового [GetUniqueInternationalOrganization('hre').GetLeaderTitle] [GetUniqueInternationalOrganization('hre').GetName], символ права [GetCountry('PAP').GetGovernment.GetRulerTitle] коронувати [ShowReligionGroupAdjective('christian')] суверенів та ролі [GetUniqueInternationalOrganization('hre').GetLeaderTitle] як захисника Римсько-Католицької Церкви. Це була велика честь для [ROOT.GetCountry.GetCapital.GetName] бути обраним місцем для коронації, і церква [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] ледве вмістила всіх сановників, що зібралися, щоб побачити коронацію нового [target_ruler.GetName]."
  free_cities.6.a: "Ми справді благословенні!"
  free_cities.7.title: "Конференція з укладення договору"
  free_cities.7.desc: "Після завершення Мирної конференції, що відбулася в [ROOT.GetCountry.GetName], дипломати як від переможців у [SCOPE.sCountry('winner').GetName], так і дипломати, що підписували умови капітуляції [SCOPE.sCountry('loser').GetName], подякували нам за допомогу в усіх необхідних деталях, що оточують таку важливу подію, та за наш нейтралітет у цьому питанні. Це допомогло їм зосередитися на поточному завданні. Хоча ми не отримали грошової компенсації, крім витрат на конференцію, тепер ми вважаємося більш престижною країною, ніж раніше."
  free_cities.7.a: "Тоді це вартувало всіх клопотів."
  free_cities.8.title: "Митні та податкові привілеї"
  free_cities.8.desc: "[ShowSpecialStatusName('free_city')] [SCOPE.sCountry('free_city_in_debt_target').GetName] задихається під власною вагою, ледве заробляючи достатньо грошей, щоб уникнути страхітливої прірви банкрутства. Коли економіка [SCOPE.sCountry('free_city_in_debt_target').GetNameWithNoTooltip] неминуче завалиться під тягарем проблем, які вони створили самі, це завдасть шкоди не лише їхній репутації, а й репутації та легітимності самої Імперії. Ми могли б спробувати допомогти їм, надавши певні митні та податкові привілеї, які, якщо ними правильно скористатися, полегшать їхні фінансові труднощі."
  free_cities.8.a: "Надати їм митні та податкові привілеї."
  opinion_special_privileges: "Особливі привілеї, надані Імператором"
  free_cities.8.b: "Вони цього не заслужили."
  free_cities.9.title: "Митні та податкові привілеї надано"
  free_cities.9.desc: "Новина про нашу боротьбу з боргами була невеликим здивуванням, але великим здивуванням стало те, що [SCOPE.sCountry('hre_leader').GetGovernment.GetRuler.GetName] з [SCOPE.sCountry('hre_leader').GetName] вирішив допомогти нам, надавши певні загальні та податкові привілеї, які, ми сумніваємося, мають інші [ShowSpecialStatusName('free_city')]."
  free_cities.9.a: "Звісно, несподіванка, але приємна!"
  free_cities.10.title: "Шляхетні зі зброєю"
  free_cities.10.desc: "Землевласницьким дворянам у [ROOT.GetCountry.GetCapital.GetName] не подобається, що наш статус [ShowSpecialStatusName('free_city')] утримує нас від прямого дворянського правління, і останнім часом ми вичерпали всі можливості, щоб їх заспокоїти. Якби вони були простими селянами, озброєними вилами та смолоскипами і з невеликою військовою підготовкою, ми змогли б придушити будь-яке повстання, яке вони могли б розпалити. Але це чоловіки та жінки із землею та титулами, формально навчені військовому мистецтву, і їх не слід недооцінювати. Єдиний, хто може приборкати їхні амбіції, це [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.GetName]..."
  free_cities.10.a: "Попросити Імператора про допомогу."
  free_cities.10.b: "Надати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] певні привілеї і сподіватися, що вони замовкнуть."
  free_cities.11.title: "[SCOPE.sCountry('free_city_source').GetNameWithNoTooltip] Прохання про допомогу з бунтівними [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"
  free_cities.11.desc: "До нашої уваги дійшло, що [SCOPE.sCountry('free_city_source').GetLongName] бореться із землевласницькими [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')], яким не подобається статус [SCOPE.sCountry('free_city_source').GetNameWithNoTooltip] як [ShowSpecialStatusName('free_city')]. Країна просить нашої допомоги, щоб приборкати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] і змусити їх прийняти світське керівництво [SCOPE.sCountry('free_city_source').GetGovernment.GetRuler.GetName], вільне від королівських титулів та привілеїв."
  free_cities.11.a: "Вони отримають нашу допомогу."
  free_cities.11.b: "Якщо вони не можуть впоратися зі своїми громадянами, чи справді вони придатні керувати країною?"
  STATIC_MODIFIER_NAME_aristocratic_privileges: "Аристократичні привілеї"
  STATIC_MODIFIER_DESC_aristocratic_privileges: "Більший вплив, набутий під час регентства, залишив аристократії кілька привілеїв."
  free_cities.12.title: "Допомогли чи завадили?"
  free_cities.12.desc: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] стають сміливішими і тепер намагаються залучити [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] до свого повстання проти нас та нашого статусу [ShowSpecialStatusName('free_city')]. Поки що вони мали невеликий успіх у цьому, але ми боїмося, як завжди, коли якісь зарозумілі князі з вигадливими прізвищами намагаються зруйнувати мир, який ми так важко зберігаємо. Що [home_ruler.GetName] подумає про нас? Чи дотримається [home_ruler.GetHeSheFormal] [home_ruler.GetHisHer] обіцянки і покладе край цьому непокірному [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]?"
  free_cities.12.a: "Допомога прибула від [GetUniqueInternationalOrganization('hre').GetLeaderTitle]!"
  free_cities.12.b: "'...непридатні до правління...' Отже, допомоги не надіслано."
  free_cities.13.title: "Ліга міст"
  free_cities.13.desc: "Ганзейська ліга та Ломбардська ліга надихнули нас запитати, чи бажають інші Вільні Міста увійти в лігу разом з нами. Ми, Вільні Міста, слабкі поодинці, але колективно вже доведено, що взаємна співпраця між малими націями у таких питаннях, як торгівля, збереження імперського миру, підтримка трибуналів та утримання об'єднаної сили, робить нас силою, з якою доведеться рахуватися, і яку навіть Великі Держави будуть намагатися придушити."
  free_cities.13.a: "Відправити дипломатів до [SCOPE.sCountry('fc_league_invitation_target').GetName]!"
  free_cities.13.b: "Хіба ми не могли б просто найняти найманців замість цього?"
  free_cities.14.title: "Пропозиція Міської Ліги"
  free_cities.14.desc: "Багато Ліг взаємної співпраці існувало в межах [GetUniqueInternationalOrganization('hre').GetName]. Ганзейська ліга, наприклад, була лігою купецьких гільдій у торговельній та оборонній конфедерації, або Швабська ліга, яка була асоціацією взаємної оборони та підтримання миру. Деякі Ліги стають настільки могутніми та об'єднаними, що їх навіть розглядають як окрему державу, як-от Швейцарська ліга. [ShowSpecialStatusName('free_city')] [SCOPE.sCountry('fc_league_invitation_source').GetName] запропонувало нам приєднатися до чогось подібного, свого роду співпраці, де ми співпрацюватимемо у питаннях торгівлі, підтримання імперського миру та підтримки трибуналів."
  free_cities.14.a: "Що нам втрачати? Приєднуймося!"
  opinion_agreed_league: "Погодитися на Міську Лігу"
  free_cities.14.b: "Це здається величезною тратою часу та ресурсів."
  opinion_refused_league: "Відмовитися від Міської Ліги"
  free_cities.15.title: "Члени Міської Ліги"
  free_cities.15.desc: "[SCOPE.sCountry('fc_league_invitation_target').GetGovernment.GetRuler.GetName] з [SCOPE.sCountry('fc_league_invitation_target').GetName] погодився співпрацювати з нами у деяких питаннях, таких як торгівля, підтримання імперського миру та підтримка трибуналів."
  free_cities.15.a: "Ласкаво просимо до Ліги!"
  free_cities.16.title: "[SCOPE.sCountry('fc_league_invitation_target').GetName] відхилив Міську Лігу"
  free_cities.16.desc: "'З глибоким жалем [SCOPE.sCountry('fc_league_invitation_target').GetGovernment.GetRuler.GetName] з [SCOPE.sCountry('fc_league_invitation_target').GetName] мусить відмовитися від співпраці з [ROOT.GetCountry.GetGovernment.GetRuler.GetName] з [ROOT.GetCountry.GetName]...'"
  free_cities.16.a: "Вони незабаром побачать славу наших об'єднаних економік і пошкодують, що не приєдналися до нас!"
  free_cities.17.title: "Членство в Міській Лізі"
  free_cities.17.desc: "Співпраця між різними Вільними Містами, заснована на та натхненна лігами, такими як Швабська ліга, Ганзейська ліга та Ломбардська ліга, здається, чудово працює. Вони погодилися працювати разом у питаннях торгівлі, підтримання імперського миру та підтримки трибуналів. Ми, як [ShowSpecialStatusName('free_city')], могли б попросити про членство в цьому досить ексклюзивному союзі..."
  free_cities.17.a: "Відправити дипломата до їхніх лідерів!"
  free_cities.17.b: "Ми не маємо потреби в цьому."
  free_cities.18.title: "Потенційний член Міської Ліги"
  free_cities.18.desc: "Наша співпраця з іншими Вільними Містами працює настільки добре, що ми отримуємо все більше і більше заявок на членство щодня! [free_city_source.GetGovernment.GetRuler.GetName] з [free_city_source.GetName] є одним з багатьох, хто бажає до нас приєднатися."
  free_cities.18.a: "Прийняти заявку [SCOPE.sCountry('free_city_source').GetNameWithNoTooltip]."
  free_cities.18.b: "Відхилити заявку [SCOPE.sCountry('free_city_source').GetNameWithNoTooltip]."
  free_cities.19.title: "Кооперативні Реформи"
  free_cities.19.desc: "Багато вчених та освічених мужів називають Вільне Місто [ROOT.GetCountry.GetName] своїм домом. Співпрацюючи зі своїми колегами в будь-якому іншому [ShowSpecialStatusName('free_city')] у нашій Лізі, вони змогли вдосконалити свої ідеї та теорії таким чином, що це приносить нам велику користь."
  free_cities.19.a: "[ROOT.GetCountry.Custom('common_string_positive')]"