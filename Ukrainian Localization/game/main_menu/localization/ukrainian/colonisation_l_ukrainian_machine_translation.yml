  COLONIAL_CHARTER_TOTAL_MIGRATION: "Всього [Concept('migration', 'CONCEPT_PLACEHOLDER')|e] $VAL|y$ [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] на місяць."
  COLONIAL_CHARTER_FROM_CHARTER: "З [Concept('colonial_charter', 'CONCEPT_PLACEHOLDER')|e]:"
  COLONIAL_CHARTER_FROM_CABINET: "Від наших [Concept('cabinet_actions', 'CONCEPT_PLACEHOLDER')|e]:"
  COLONIAL_CHARTER_FROM_CABINET_SPECIFIC_ENTRY: "З [PROVINCE.GetName]:"
  COLONIAL_CHARTER_NO_SOURCE: "Міграції не можуть відбуватися, оскільки немає [locations|E], звідки можна мігрувати, з нашою [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] та [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], більшими за 1000 [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]."
  COLONIAL_CHARTER_CURRENT: "$VAL|Y$ [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] переміщатиметься з [LOCATION.GetName], щоб колонізувати [TARGET_LOCATION.GetName] щомісяця."
  COLONIAL_CHARTER_CURRENT_WITH_CABINET: "Внаслідок дії нашого [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] можуть переміщатися додаткові [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]:"
  COLONIAL_CHARTER_CURRENT_WITH_CABINET_ENTRY: "$BULLET_WITH_TAB$$VAL|Y$ [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] переміститься з [LOCATION.GetName], щоб колонізувати [TARGET_LOCATION.GetName]."
