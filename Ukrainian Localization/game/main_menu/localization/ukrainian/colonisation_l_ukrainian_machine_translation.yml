l_english:
  COLONIAL_CHARTER: "$ADJ$ Колонія [PROVINCE_DEFINITION.GetNameWithNoTooltip]"
  START_COLONY_TT: "Створення колоніальної хартії для [PROVINCE_DEFINITION.GetName|Y] коштуватиме нам $COST$ наперед. Це з часом привабить [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] до [locations|E] у [PROVINCE_DEFINITION.GetName] і зрештою дасть нам право власності на всю територію."
  ABANDON_COLONY_TT: "Відмова від Колоніальної Хартії для [COLONIAL_CHARTER.GetName|Y] коштуватиме нам $COST$ наперед. [Concept('Pops', 'CONCEPT_PLACEHOLDER')|e], що мігрували до [locations|E], якими ми не володіємо, будуть нами покинуті."
  START_COLONY_TT_NO_COST: "Створення Колоніальної Хартії з часом привабить [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] до [locations|E] у [PROVINCE_DEFINITION.GetName] і зрештою дасть нам право власності на всю територію."
  ABANDON_COLONY_TT_NO_COST: "Відмова від Колоніальної Хартії зупинить міграцію [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]. [Concept('Pops', 'CONCEPT_PLACEHOLDER')|e], що мігрували до [locations|E], якими ми не володіємо, будуть нами покинуті."
  ABANDON_BUTTON: "Відмовитись від Колоніальної Хартії"
  NO_COLONIAL_CHARTER_EXCLUSIVE: "Це претендується [COUNTRY.GetName] через $NAME$."
  NO_COLONIAL_CHARTER_RELIGION: "Через $NAME|Y$ лише [COUNTRY.GetName] дозволено колонізувати цю територію, а всім іншим [COUNTRY.GetReligion.GetAdjective] країнам це заборонено."
  treaty_of_noteborg: "Договір '#Y Горішок$#!', де Новгород і Швеція врегулювали свої претензії на Фінляндію та Карелію"
  COLONIAL_PROGRESS_POT_HEADER: "Колоніальний Прогрес"
