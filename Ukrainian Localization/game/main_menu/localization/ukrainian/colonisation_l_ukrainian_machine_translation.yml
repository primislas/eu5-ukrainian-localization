  COLONIAL_MARITIME_IN: "[maritime_presence|E] у [REGION.GetName]: x$VAL|Y2$"
  COLONIAL_MARITIME_NOT_IN: "[Concept('REGION.GetName] не є [coastal', 'CONCEPT_PLACEHOLDER')|e]: x$VAL|Y2$"
  COLONIAL_DISTANCE: "Відстань від [COUNTRY.GetCapital.GetName]: x$VAL|Y2$"