  STATIC_MODIFIER_NAME_coffee_yemen_base: "Кава Арабіка"
  STATIC_MODIFIER_DESC_coffee_yemen_base: "Ґрунт Ємену дає велику кількість кавових зерен."
  STATIC_MODIFIER_NAME_sahara_salt_mines_base: "Сахарські Соляні Копальні"
  STATIC_MODIFIER_DESC_sahara_salt_mines_base: "Ці копальні постачають більшість солі вздовж транссахарських торгових шляхів."
  STATIC_MODIFIER_NAME_sikar_copper_mines_base: "Мідна Копальня Кхетрі"
  STATIC_MODIFIER_DESC_sikar_copper_mines_base: "Продуктивні мідні родовища Кхетрі надають широкі можливості для видобутку."
  STATIC_MODIFIER_NAME_nishapur_gems_mines_base: "Бірюзова Копальня Нішапура"
  STATIC_MODIFIER_DESC_nishapur_gems_mines_base: "Продуктивні бірюзові копальні Нішапура мають багаті поклади бажаного каменю."
  STATIC_MODIFIER_NAME_panjshir_valley_silver_mines_base: "Срібло Долини Панджшир"
  STATIC_MODIFIER_DESC_panjshir_valley_silver_mines_base: "Срібні копальні вздовж Долини Панджшир мають багаті поклади, готові до експлуатації."
  STATIC_MODIFIER_NAME_turda_salt_mines_base: "Соляна Копальня Турда"
  STATIC_MODIFIER_DESC_turda_salt_mines_base: "Соляна копальня поблизу Турди є найбагатшою в Карпатському регіоні."
  STATIC_MODIFIER_NAME_kutna_hora_silver_mines_base: "Kutna Hora Silver Mine"
  STATIC_MODIFIER_DESC_kutna_hora_silver_mines_base: "Срібна копальня Кутна Гора є найбагатшою в Богемії."
  STATIC_MODIFIER_NAME_rammelsberg_silver_mines_base: "Rammelsberg Silver Mine"
  STATIC_MODIFIER_DESC_rammelsberg_silver_mines_base: "Копальня під Раммельсбергом має великі поклади срібла."
  STATIC_MODIFIER_NAME_mali_gold_mines_base: "Gold Mines of Mali"
  STATIC_MODIFIER_DESC_mali_gold_mines_base: "Золоті копальні Буре є джерелом легендарного багатства Манси Муси."
  STATIC_MODIFIER_NAME_kremnica_gold_mines: "Kremnica Gold Mine"
  STATIC_MODIFIER_DESC_kremnica_gold_mines: "Золота копальня Кремніца є найбагатшою в Карпатському регіоні."
  STATIC_MODIFIER_NAME_srebrenica_silver_mines_base: "Srebrenica Silver Mine"
  STATIC_MODIFIER_DESC_srebrenica_silver_mines_base: "Срібна копальня Сребреніца є найбагатшою в Балканському регіоні."
  STATIC_MODIFIER_NAME_newfoundland_fishing_grounds_base: "Newfoundland Fishing Grounds"
  STATIC_MODIFIER_DESC_newfoundland_fishing_grounds_base: "Води навколо острова Ньюфаундленд є найбагатшими рибальськими угіддями в усьому світі."
  STATIC_MODIFIER_NAME_amber_coast_base: "Amber Coast"
  STATIC_MODIFIER_DESC_amber_coast_base: "Узбережжя цього регіону має багато покладів бурштину."
  STATIC_MODIFIER_NAME_sicily_sulfur_mines: "Sulfur Mines of Sicily"
  STATIC_MODIFIER_DESC_sicily_sulfur_mines: "Сірчані копальні Сицилії багаті на ресурси, необхідні для виробництва селітри."