l_english:
  STATIC_MODIFIER_NAME_freiberg_base: "Срібні копальні Фрайберга"
  STATIC_MODIFIER_DESC_freiberg_base: "Розробка цих копалень розпочалася у XII столітті. З часом вони стали одним з головних джерел срібла в Центральній Європі."
  STATIC_MODIFIER_NAME_falun_base: "Стура-Коппарбергет"
  STATIC_MODIFIER_DESC_falun_base: "Ця копальня забезпечує значну частину міді в Європі."
  STATIC_MODIFIER_NAME_golconda_base: "Діамантові копальні Голконди"
  STATIC_MODIFIER_DESC_golconda_base: "Найкращі та найцінніші діаманти в усьому світі походять з цієї копальні."
  STATIC_MODIFIER_NAME_skane_herring_market: "Оселедцевий ринок Сконе"
  STATIC_MODIFIER_DESC_skane_herring_market: "Заснований близько 1200 року, це головний ринок оселедця у всій Скандинавії."
  STATIC_MODIFIER_NAME_almaden_base: "Ртутні копальні Альмадена"
  STATIC_MODIFIER_DESC_almaden_base: "Ця копальня забезпечує 1/3 всієї ртуті, що використовується у світі."
  STATIC_MODIFIER_NAME_huancavelica_base: "Ртутні копальні Уанкавеліки"
  STATIC_MODIFIER_DESC_huancavelica_base: "Це одні з найважливіших копалень в Іспанській Америці, відомі своїми величезними кількостями ртуті."
  STATIC_MODIFIER_NAME_idrija_base: "Ртутні копальні Ідрії"
  STATIC_MODIFIER_DESC_idrija_base: "Ці копальні містять великі поклади як рідкої ртуті, так і її твердої форми, кіноварі."
  STATIC_MODIFIER_NAME_lanmuchang_base: "Ртутні копальні Ланьмучана"
  STATIC_MODIFIER_DESC_lanmuchang_base: "Найважливіша ртутна копальня в Китаї з давнини."
  STATIC_MODIFIER_NAME_potosi_base: "Серро-Ріко-де-Потосі"
  STATIC_MODIFIER_DESC_potosi_base: "Розташована під горами Потосі, це найбагатша срібна копальня в усьому світі."
  STATIC_MODIFIER_NAME_zacatecas_base: "Срібні копальні Сакатекаса"
  STATIC_MODIFIER_DESC_zacatecas_base: "Срібні копальні Сакатекаса є найбагатшими у всій Мезоамериці."
  STATIC_MODIFIER_NAME_guanajuato_base: "Срібні копальні Гуанахуато"
  STATIC_MODIFIER_DESC_guanajuato_base: "Срібні копальні Гуанахуато є найбагатшими в Центральній Мексиці."
  STATIC_MODIFIER_NAME_spice_islands_base: "Гвоздика Островів Прянощів"
  STATIC_MODIFIER_DESC_spice_islands_base: "Гвоздика, дуже бажана пряність, вирощується у великих кількостях на цьому острові."
  STATIC_MODIFIER_NAME_nile_delta_rice_base: "Родюча Дельта Нілу"
  STATIC_MODIFIER_DESC_nile_delta_rice_base: "Заплави Нілу є родючими землями для вирощування всіх видів культур."
  STATIC_MODIFIER_NAME_nile_delta_wheat_base: "$STATIC_MODIFIER_NAME_nile_delta_rice_base$"
