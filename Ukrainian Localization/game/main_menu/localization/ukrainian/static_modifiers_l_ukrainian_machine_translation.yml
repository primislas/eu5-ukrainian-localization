  STATIC_MODIFIER_DESC_clergy_estate_head_of_cabinet_influence: "Через суспільне походження нашого Голови Кабінету, $clergy_estate$ зросла у впливі при нашому дворі.\n\n#Y Цей [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] зникає, коли наш [Concept('head_of_the_cabinet', 'CONCEPT_PLACEHOLDER')|e] вилучається з [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e].#!"
