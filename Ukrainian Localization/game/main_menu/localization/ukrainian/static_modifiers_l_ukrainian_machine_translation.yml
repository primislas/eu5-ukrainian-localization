  STATIC_MODIFIER_NAME_hussite_heresy_modifier: "Гуситська єресь"
  STATIC_MODIFIER_DESC_hussite_heresy_modifier: "[ShowReligionName('hussite')] нещодавно набирає обертів, а її послідовники вимагають реформ у межах [ShowReligionAdjective('catholic')] Церкви."
  STATIC_MODIFIER_NAME_good_omen_modifier: "Добрі знамення"
  STATIC_MODIFIER_DESC_good_omen_modifier: "Період оновлення у поєднанні з лагідною погодою та вдосталь їжі є одними з добрих знаків, що були явлені, Боги задоволені."
  STATIC_MODIFIER_NAME_osmans_dream_modifier: "Сон Османа"
  STATIC_MODIFIER_DESC_osmans_dream_modifier: "Наша доля — правити імперією, що проіснує до Кінця Світу."
  STATIC_MODIFIER_NAME_ahi_bureaucrats: "Бюрократи Ахі"
  STATIC_MODIFIER_DESC_ahi_bureaucrats: "Висококомпетентні бюрократи з Братства Ахі приносять користь адміністрації цієї країни."
  STATIC_MODIFIER_NAME_orbans_bombard_modifier: "Колосальна бомбарда"
  STATIC_MODIFIER_DESC_orbans_bombard_modifier: "Ця країна володіє величезною гарматою, що могла б зруйнувати стіни самого Вавилона."
  STATIC_MODIFIER_NAME_efficient_customs_dues_modifier: "Ефективні митні збори"
  STATIC_MODIFIER_DESC_efficient_customs_dues_modifier: "Ця країна наймає вправних генуезьких та латинських відкупників податків для покращення збору митних зборів у своїх портах."
  STATIC_MODIFIER_NAME_wheat_exports_banned: "Обмежений експорт пшениці"
  STATIC_MODIFIER_NAME_pirate_shipwrights_modifier: "Піратські корабельні майстри"
  STATIC_MODIFIER_DESC_pirate_shipwrights_modifier: "Ця країна наймає колишніх піратів для допомоги у будівництві кораблів для свого флоту."
  STATIC_MODIFIER_NAME_shameless_privateering_modifier: "Безсоромне каперство"
  STATIC_MODIFIER_DESC_shameless_privateering_modifier: "Ця країна значно інвестувала у піратів, що дошкуляють їхнім суперникам на морі."
  STATIC_MODIFIER_NAME_deaf_mute_servants_modifier: "Дільсіз"
  STATIC_MODIFIER_DESC_deaf_mute_servants_modifier: "Двір цієї країни наймає глухонімих як слуг та агентів, близьких до правителя, що дає перевагу в таємності та шпигунстві."
  STATIC_MODIFIER_NAME_emperor_of_rome: "Цезар Риму"
  STATIC_MODIFIER_DESC_emperor_of_rome: "Цей персонаж заявив права на давній титул Цезаря Риму, і незалежно від того, було це справедливо чи ні, є багато тих, хто в це вірить."
  STATIC_MODIFIER_NAME_sheikh_ul_islam_modifier: "$common_string_shaikh_al_islam$"
  STATIC_MODIFIER_DESC_sheikh_ul_islam_modifier: "Цього персонажа було призначено $common_string_shaikh_al_islam$, що надає верховну владу тлумачити ісламське право та призначати релігійних вчених, забезпечуючи, що він завжди матиме вплив на правителя."
  STATIC_MODIFIER_NAME_maps_of_piri_reis_modifier: "Карти Пірі Реїса"
  STATIC_MODIFIER_DESC_maps_of_piri_reis_modifier: "Ця країна володіє колекцією феноменальних мап, що поєднують як нові західні відкриття, так і старі $greek$, $arabic$, $persian$, $indian$ та $chinese$ знання в єдине ціле. На короткий час, доки не буде зроблено більше відкриттів, це можуть бути одні з найкращих мап у світі."
  STATIC_MODIFIER_NAME_rein_in_bashi_bazouks_modifier: "Приборкані башибузуки"
  STATIC_MODIFIER_DESC_rein_in_bashi_bazouks_modifier: "Ця країна намагається дисциплінувати непокірних башибузуків, дешевих ополченців та гарнізонних солдатів, які мають схильність тероризувати сільське населення."
  STATIC_MODIFIER_NAME_prolific_architects_modifier: "Плідні архітектори"
  STATIC_MODIFIER_DESC_prolific_architects_modifier: "Ця країна наразі переживає будівельний бум, завдяки найму блискучого архітектора, який навчив інших та надихнув архітекторів і ремісників на великі звершення."
  STATIC_MODIFIER_NAME_upset_merchants: "Невдоволені купці"
  STATIC_MODIFIER_DESC_upset_merchants: "Місцеві купці дуже невдоволені останніми урядовими політиками, які, на їхню думку, перешкоджають їхній торгівлі."
  STATIC_MODIFIER_NAME_sultanate_of_women: "Жіночий султанат"
  STATIC_MODIFIER_DESC_sultanate_of_women: "На добро чи на зло, королівські жінки володіють безпрецедентним рівнем впливу у справах цього королівства, особливо у питаннях дипломатії, благодійності та будівельних проєктів."
  STATIC_MODIFIER_NAME_conciliatory_court_faction: "Примирлива придворна фракція"
  STATIC_MODIFIER_DESC_conciliatory_court_faction: "Примирливій придворній фракції було дозволено здобути значний вплив у цій країні."
  STATIC_MODIFIER_NAME_war_at_court: "Війна при дворі"
  STATIC_MODIFIER_DESC_war_at_court: "Двір цієї країни перебуває у сум'ятті, оскільки правитель намагається силою викорінити могутню придворну фракцію."
