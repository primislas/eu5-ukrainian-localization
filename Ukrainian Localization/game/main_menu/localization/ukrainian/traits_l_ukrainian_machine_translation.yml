  desc_conqueror: "Цей правитель — завойовник. Ми зможемо ефективніше приєднувати нові землі до нашого володіння за цього режиму."
  desc_tolerant: "Цей правитель — Толерантний. Релігійні меншини процвітатимуть за нашого режиму."
  desc_just: "Цей правитель — Справедливий. Завдяки глибокому розумінню численних законів і звичаїв свого володіння, наші піддані довіряють нам правити праведно та справедливо."
  desc_righteous: "Цей правитель — Праведний. Наш народ менше схильний ставити під сумнів нашу владу, адже знає, що праведний правитель завжди дбає про їхні найкращі інтереси."
  desc_kind_hearted: "Цей правитель — Добросердий. Великий інтерес до простих чоловіків і жінок володіння зробив нашого правителя улюбленим, а нашу країну — стійкішою до суворих часів загалом і до спустошень війни зокрема."
  desc_free_thinker: "Цей правитель — Вільнодумець. Не обмежений суворими доктринами, наш правитель заохочує всіх пробувати нове та вільно розмірковувати про те, куди вести нашу велику країну в майбутньому."
  desc_well_connected: "Цей правитель має широкі зв'язки. Наш двір і кабінет міністрів отримують вигоду від широкої мережі серед великих умів цієї епохи нашого правителя."
  desc_calm: "Цей правитель спокійний. Ніколи не втрачаючи самовладання чи обличчя, наш правитель надихатиме прикладом і зможе приймати добре обдумані рішення, дозволяючи нам швидше оговтатися від будь-якої кризи, яку світ може кинути на нас."
  desc_careful: "Цей правитель обережний. Обережно орієнтуючись у різних неписаних правилах міждержавних відносин, наш монарх здатний зменшити вплив наших фактичних проступків."
  desc_secretive: "Цей правитель потайний. Природний інстинкт тримати двері зачиненими та листи зашифрованими поширюється вниз і ускладнить проникнення ворогів у весь наш уряд."
  desc_intricate_web_weaver: "Цей правитель — майстер інтриг. Постійно вигадуючи нові змови, наш правитель здатний особисто взяти на себе значну частину відповідальності за зовнішню розвідку."
  desc_well_advised: "Цей правитель добре поінформований. Завжди готовий прислухатися до мудрих порад інших, наш правитель приваблює більшу кількість людей до нашого двору та кабінету."
  desc_benevolent: "Цей правитель доброзичливий. Бути сприйнятим як той, хто бажає робити добро, є великим активом, коли йдеться про збереження спокою наших підданих."
  desc_zealot: "Цей правитель — фанатик. Фанатична відданість істинній вірі дозволяє нашому правителю надихати більше людей навертатися та приєднуватися до державної релігії."
  desc_pious: "Цей правитель побожний. Релігійно відданий, духовний і релігійний, наш правитель гарантує, що наша держава не зіб'ється зі свого курсу та вселить довіру до нашої віри."
  desc_lawgiver: "Цей правитель — законодавець. Законодавство — це те, що будує та об'єднує державу. Наш правитель має намір скоротити сотні законів і звичаїв різних частин нашого королівства, щоб створити більш централізований і справедливий звід законів."
  desc_midas_touched: "Цей правитель має дотик Мідаса. Талант робити кожен проєкт прибутковим є великим активом для правителя країни. Наша державна скарбниця ніколи не відчуватиме нестачі в грошах, доки наш правитель залишається."
  desc_incorruptible: "Цей правитель непідкупний. Багато в чому будівництво сучасної держави — це постійна боротьба з корупцією. Державні чиновники завжди спокушаються брати хабарі, а бажання піклуватися про своїх друзів і родичів є природним людським інстинктом. Твердо відкидаючи всі такі поняття та борючись з ними з презирством, наш правитель подає приклад для наслідування всій країні."
  desc_architectural_visionary: "Цей правитель — архітектурний візіонер. Покращення інфраструктури є необхідністю для будь-якої держави нашого часу, і цей правитель є тим, хто може це зробити. Грандіозні бачення в поєднанні з чудовим розумінням і талантом утримувати витрати роблять цього правителя великим активом для нас."
  desc_scholar: "Цей правитель — вчений. Амбіція пізнавати світ і керівні принципи людей і природи робить нашого правителя здатним розуміти та впроваджувати нові технології набагато ефективніше, ніж це було б можливо інакше."
  desc_entrepreneur: "Цей правитель — підприємець. Бачачи потенціал для нових проєктів у будь-якій перешкоді чи можливості, наш правитель сприяє постійно зростаючій кількості проєктів для зміцнення нашої економіки."
  desc_industrious: "Цей правитель працьовитий. Ніколи не задовольняючись відпочинком і працюючи все довше, наш правитель постійно керує деталями кожної провінції в королівстві, щоб максимізувати вихід і зібраний дохід для всіх ресурсів під державним контролем."
  desc_expansionist: "Цей правитель — експансіоніст. Наш правитель особисто зацікавлений у захопленні та заселенні нових земель і присвячений забезпеченню того, щоб колоніальна експансія залишалася головним пріоритетом для нашої держави."
  desc_charismatic_negotiator: "Цей правитель — харизматичний перемовник. Завдяки особистій участі в державній дипломатії та переговорах наш правитель здатний частіше, ніж це було б можливо інакше, змушувати інших бачити речі по-нашому."
  desc_silver_tongue: "Цей правитель вважається красномовним. У нашому спілкуванні з іншими державами наш правитель здатний представити наші минулі дії в набагато сприятливішому світлі. Як тільки наші сусіди зрозуміють причини наших дій, вони з більшою ймовірністю пробачать нам у довгостроковій перспективі будь-які проступки."
  desc_tactical_genius: "Цей правитель — тактичний геній. Великий особистий інтерес та інвестиції в маневри та фінти на полі бою призведуть до набагато більшого інтересу та досвіду в цих питаннях для всіх наших генералів."
  desc_bold_fighter: "Цей правитель — сміливий боєць. Вважаючи шок дуже важливим на полі бою, наш правитель ніколи не боїться наслідків і заохочує всіх вести свої війська прямо в гущу ворога, якщо цього вимагає ситуація."
  desc_fierce_negotiator: "Цей правитель — жорсткий перемовник. Нам буде легше переконати капітанів найманців битися за нашу справу за меншу плату, ніж вони вимагали б інакше."
  desc_strict: "Цей правитель суворий. Завдяки великому інтересу до поведінки військ наш правитель здатний прищепити суворе почуття дисципліни кожному в наших лавах, від найнижчого до найвищого."
  desc_inspiring_leader: "Наш правитель — надихаючий лідер. Велике особисте лідерство може призвести до того, що навіть найбоязкіші люди знайдуть свою мужність."
  desc_martial_educator: "Цей правитель — військовий педагог. За нинішнього режиму освіта та підготовка нашого офіцерського корпусу є одним із наших найвищих пріоритетів."
  desc_babbling_buffoon: "Цей правитель вважається Базікаючим блазнем. Хоча наш правитель має добрі наміри, особисто беручи участь у дипломатії з нашими сусідами, це не поєднується з талантом до ведення переговорів. Будь-кому, ймовірно, буде важче зрозуміти наші аргументи, і багато наших переговорів ускладнюються через некомпетентність нашого правителя."
  desc_embezzler: "Цей правитель є Казнокрадом. Однією з речей, що рухає нашим правителем, є велика воля та хист використовувати державні доходи для збільшення особистого багатства."
  desc_drunkard: "Цей правитель є Нестримним. Завжди шукаючи полегшення від загальної апатії, наш правитель потурає собі у великих кількостях стимуляторів у вигляді алкоголю. Наявність нестримного правителя погано відбивається на всій країні."
  desc_sinner: "Цей правитель широко вважається Грішником. Особисті недоліки в керівництві нашої країни настроїли релігійні кола проти нас."
  desc_greedy: "Цей правитель є Жадібним. Збір державних доходів стає все більш жорстоким і недалекоглядним під керівництвом нашого правителя, який не зупиниться ні перед чим, щоб спробувати збільшити наш дохід. Знищення або шкода кожному джерелу доходу – довгострокові наслідки такої недалекоглядної поведінки – значне зменшення податкових надходжень."
  desc_cruel: "Цей правитель вважається Жорстоким. Широко розповсюджені розповіді про свавільні та жорстокі дії нашого правителя особисто сильно засмутили багатьох наших підданих. Цього може бути недостатньо, щоб спровокувати повстання саме по собі, але будь-яка криза сильніше вдарить по громадській думці, оскільки нікому не бракує причин для повстання."
  desc_naive: "Цей правитель є Наївним ентузіастом. Сліпо кидаючись вперед і постійно недооцінюючи наслідки, наш правитель гарантує, що наші сусіди повільніше прощатимуть образи та провини."
  desc_craven: "Цей правитель є Боягузливим. Відчайдушно боячись фізичного бою, наш правитель тримається якомога далі від полів битв. Наші війська не можуть не помітити, що вони самі по собі."
  desc_loose_lips: "Часто особисто відповідальний за витоки інформації та порушення безпеки, цей правитель, як правило, занадто довірливий і легко обманюваний. На жаль, сума цього полягає в тому, що наш правитель завдає більше шкоди, ніж користі нашим контррозвідувальним зусиллям."
  desc_obsessive_perfectionist: "Цей правитель є Нав'язливим перфекціоністом. Гострий інтерес до деталей та дрібниць не завжди поєднується з рівним талантом до таких речей. Постійно спричиняючи перебої та затримки, наш правитель завдає набагато більше шкоди, ніж користі, коли йдеться про розвиток нашої внутрішньої інфраструктури."
  desc_malevolent: "Цей правитель вважається Зловмисним. Дії нашого правителя часто розглядаються як мотивовані зловмисністю або ворожим наміром. В результаті, будь-які підлеглі країни під нашим контролем швидко гніваються і бояться будь-яких наших дій."
  glory_seeker: "Шукач слави"
  desc_glory_seeker: "Цей генерал є шукачем слави. Війська під проводом цього генерала здобуватимуть більше Престижу та Армійської Традиції, ніж зазвичай, оскільки вони завжди розгортаються там, де вони зможуть зробити найбільш помітну різницю."
  born_to_the_saddle: "Народжений у сідлі"
  desc_born_to_the_saddle: "Цей генерал був народжений у сідлі. Кавалерія під проводом цього лідера зможе краще використовувати свою флангову перевагу."
  defensive_planner: "Оборонний планувальник"
  desc_defensive_planner: "Цей генерал є Оборонним планувальником. Будь-які війська під проводом цього лідера будуть більш стійкими до шоку."
  battlefield_medic: "Польовий медик"
  desc_battlefield_medic: "Цей генерал відомий як Польовий медик. Більша, ніж зазвичай, кількість солдатів під проводом цього лідера зможе відновитися після битви, щоб поповнити свій підрозділ до повної сили."
  ruthless: "Безжальний"
  desc_ruthless: "Цей генерал є Безжальним. Війська під командуванням цього лідера завдаватимуть більшої вогневої шкоди."
  inspirational_leader_general: "Надихаючий лідер"
  desc_inspirational_leader_general: "Цей генерал є Надихаючим лідером. Війська під командуванням цього лідера швидше відновлюватимуть бойовий дух перед обличчям поразки."
  master_of_arms: "Майстер зброї"
  desc_master_of_arms: "Цей генерал є Майстром зброї. Піхота під командуванням цього лідера буде ефективнішою та зможе завдавати більше шкоди."
  goal_oriented: "Цілеспрямований"
  desc_goal_oriented: "Цей генерал є цілеспрямованим. Війська під командуванням цього лідера швидше рухатимуться до своєї мети."
  hardy_warrior: "Витривалий воїн"
  desc_hardy_warrior: "Цей генерал відомий як витривалий воїн. Війська під командуванням цього лідера будуть більш стійкими до суворих умов і зазнаватимуть менше [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e]."
  siege_specialist: "Фахівець з облог"
  desc_siege_specialist: "Цей генерал є фахівцем з облог. Облоги під командуванням цього лідера проводитимуться ефективніше та мають завершуватися швидше."
  cannoneer: "Гарматник"
  desc_cannoneer: "Цей генерал є гарматником. Відомий великою пристрастю до пороху та гармат, артилерія під командуванням цього лідера буде ефективнішою."
  extortioner: "Вимагач"
  desc_extortioner: "Цей адмірал є вимагачем. Знання того, як найкраще використати перевагу сили, дозволяє нашому лідеру робити більше з меншими ресурсами, а [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] під командуванням вимагача матимуть більшу торговельну силу, ніж ті, що очолюються конкуруючими капітанами."
  ruthless_blockader: "Безжальний блокадник"
  desc_ruthless_blockader: "Цей адмірал є безжальним блокадником. [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] під командуванням цього лідера зможуть підтримувати [Concept('blockade', 'CONCEPT_PLACEHOLDER')|e] значно ефективніше."
  buccaneer: "Буканьєр"
  desc_buccaneer: "Цей адмірал є буканьєром. Капери під командуванням цього лідера будуть ефективнішими."
  prize_hunter: "Мисливець за призами"
  desc_prize_hunter: "Цей адмірал є мисливцем за призами. Капітани під командуванням цього лідера будуть заохочені захоплювати більше призів і захоплюватимуть більше [Concept('ships', 'CONCEPT_PLACEHOLDER')|e], ніж інші."
  ironside: "Залізнобокий"
  desc_ironside: "Цей адмірал є залізнобоким. [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] під командуванням цього лідера зазнаватимуть менше пошкоджень, ніж ті, що очолюються іншими капітанами."
  naval_engineer: "Морський інженер"
  desc_naval_engineer: "Цей адмірал є морським інженером. [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] під командуванням цього лідера зможуть швидше відновлюватися після пошкоджень, отриманих у дорозі або під час морських боїв."
  naval_showman: "Морський видовищник"
  desc_naval_showman: "Цей адмірал є морським видовищником. [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] під командуванням цього лідера отримуватимуть більше престижу та морських традицій від битв."
  ram_raider: "Таранний рейдер"
  desc_ram_raider: "Цей адмірал є таранним рейдером. Галлери під командуванням цього лідера будуть ефективнішими та завдаватимуть більше шкоди в морських битвах."
  naval_gunner: "Морський гармаш"
  desc_naval_gunner: "Цей адмірал відомий як морський артилерист. Постійні навчання артилерійських екіпажів під командуванням цього лідера означають, що важкі [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] завдаватимуть більше шкоди."
  accomplished_sailor: "Досвідчений моряк"
  desc_accomplished_sailor: "Цей адмірал є досвідченим моряком. Особистий досвід у мореплавстві дозволяє цьому лідеру покращувати навички всіх капітанів під його керівництвом, [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] під командуванням досвідченого моряка досягатимуть своїх пунктів призначення швидше."
  level_headed: "Врівноважений"
  desc_level_headed: "Цей адмірал врівноважений. Завдяки ретельному навчанню та холодному розуму екіпажі під командуванням цього лідера будуть більш стійкими до втрати бойового духу від отриманих влучань під час морського бою."
  military_theorist: "Військовий теоретик"
  desc_military_theorist: "Цей генерал є одним із найвидатніших теоретиків усіх часів, який здатен застосовувати теорії на практиці."
  strategist: "Стратег"
  desc_strategist: "Цей генерал — неперевершений стратег і військовий геній. Кожен рух на полі бою демонструє жорстоку ефективність, і жодна фортеця не може витримати хитромудрих здібностей цього лідера."
  mamluk: "Мамлюк"
  mamluks: "Мамалік"
  desc_mamluk: "Цей генерал є одним із висококваліфікованих і спеціалізованих $mamluks$, вони спочатку були поневолені та продані, але їхня схильність до війни виділяє їх настільки, що їхні господарі навчають їх у силу професійних воїнів."
  eunuch: "Євнух"
  desc_eunuch: "Цей персонаж був кастрований, як правило, для виконання певних соціальних функцій при дворах у полігінних суспільствах."
  eunuch_die_desc: "[CHARACTER.GetSheHe|U] міг плести інтриги, як найкращі з них, і серед [CHARACTER.GetHerHis] супротивників та союзників, [CHARACTER.GetSheHe] буде дуже не вистачати."
  raised_by_eunuchs: "Вихований євнухами"
  desc_raised_by_eunuchs: "Цей персонаж був оточений євнухами з дуже юного віку і дуже співчуває їм."
  raised_by_eunuchs_die_desc: "[CHARACTER.GetSheHe|U] прожив [CHARACTER.GetHerHis] усе своє жалюгідне життя як маріонетка могутньої фракції євнухів."
  dragon_tiger: "Генерал Дракона-Тигра"
  desc_dragon_tiger: "Слава цього полководця відома по всій Східній [ShowContinentNameWithNoTooltip('asia')], що призвело до прізвиська $dragon_tiger$."
  dragon_tiger_die_desc: "[CHARACTER.GetSheHe|U] вважався Драконом-Тигром. Чи зможе хтось коли-небудь перевершити [CHARACTER.GetHerHim] на полі бою?"
  hussar_commander: "Командир гусарів"
  desc_hussar_commander: "Цей генерал — справжній командир гусарів. Кавалерійські атаки під керівництвом цього персонажа будуть ефективнішими."
  hussar_commander_die_desc: "[CHARACTER.GetSheHe|U] був грізним лідером гусарів і переможцем багатьох битв. Без [CHARACTER.GetHerHim] наша кавалерія, можливо, ніколи більше не досягне такої слави."
  gold_loving: "Золотолюбний"
  humble: "Скромний"
  workaholic: "Трудоголік"
  lazy: "Ледачий"
  prominent: "Видатний"
  inconspicious: "Непомітний"
  meticulous: "Ретельний"
  careless: "Недбалий"
  adept: "Вправний"
  amateur: "Аматор"
  prescient: "Прозорливий"
  idler: "Гультяй"
  desc_gold_loving: "Художники з цією рисою вимагають значно більшої оплати, оскільки вони є коханцями всього блискучого та цінного. Гроші рухають світом, і майстри мистецтва, які дотримуються цього переконання, прагнутимуть отримати якомога кращу оплату."
  desc_humble: "Незважаючи на їхню доведену майстерність у різних видах мистецтва, художники з цією рисою, як правило, вимагатимуть скромної оплати за свої послуги. Для них смиренність є основою всіх чеснот і наріжним каменем їхньої особистості."
  desc_workaholic: "Є правда у приказці, що майстри мистецтва часто забувають належним чином харчуватися чи спати. Така їхня відданість своєму ремеслу, що вони не відпочиватимуть і не дбатимуть про себе належним чином, доки не закінчать свій наступний шедевр."
  desc_lazy: "Навіщо завершувати роботу сьогодні, коли можна завершити її завтра? Такі думки пронизують розум художників з цією рисою, дозволяючи їм уповільнити процес створення мистецтва, щоб насолоджуватися кращими речами в житті."
  desc_prominent: "Який кращий спосіб увічнити спадщину наших діянь, ніж найняти видатного художника? Роботи, створені художниками з цією рисою, матимуть більший вплив на наш культурний вплив та зростання серед наших підданих та однолітків."
  desc_inconspicious: "Роботи, створені художниками з цією рисою, як правило, мають менший вплив у світі культури та мистецтва. Справді, особистості, що володіють цією рисою, твердо вірять, що іноді менше означає більше, навіть коли йдеться про престиж та культурну славу."
  desc_meticulous: "Створювати мистецтво та опановувати своє ремесло — непроста справа. Художники з цією рисою часто матимуть бездоганні організаційні навички та є майстрами своєї справи. В результаті, створені твори мистецтва будуть підвищеної якості та принесуть більше позитивних бонусів."
  desc_careless: "Чи є червонувата пляма на обличчі монарха помилкою недбалого художника, чи вона несе глибший сенс вираження гніву, пов'язаного з вирішенням адміністративних питань? У будь-якому випадку, художники з цією рисою, як правило, псуватимуть свої твори, що призведе до зниження якості робіт."
  desc_adept: "Майстерність — головний фактор, що відрізняє майстра від учня. Художники, що володіють цією особливою рисою, як правило, розвиватимуть та відточуватимуть свої навички набагато швидше, ніж зазвичай."
  desc_amateur: "Кожен повинен з чогось починати. Художники з цією рисою, як правило, повільно навчаються, їм потрібно більше часу, щоб покращити та відточити свої художні навички."
  desc_prescient: "Натхнення є наріжним каменем деяких з найкращих і найвідоміших творів мистецтва, що визначили нашу історію. Художники з цією рисою, як правило, краще справляються з натхненням і, таким чином, частіше починатимуть свою роботу."
  desc_idler: "Створення мистецтва не для слабодухих. Це процес, який вимагає поєднання деяких з найважливіших людських навичок, приправлених натхненням та впевненістю. Однак художники з цією навичкою відчувають брак у цих сферах і тому менш імовірно почнуть працювати над новими творами мистецтва."
  just_die_desc: "Наше царство сумуватиме за [CHARACTER.GetHerHis] справедливими та неупередженими рішеннями."
  righteous_die_desc: "Наш народ оплакує смерть найдоброчеснішого правителя за нашого життя."
  kind_hearted_die_desc: "Наш народ пам'ятає [CHARACTER.GetHerHim] як добросердного та люблячого правителя."
  free_thinker_die_desc: "[CHARACTER.GetSheHe|U] ніколи не боявся порушувати старі традиції задля досягнення наших цілей."
  well_connected_die_desc: "Без сумніву [CHARACTER.GetSheHe] вже налагоджує цінні контакти у потойбічному світі."
  calm_die_desc: "[CHARACTER.GetSheHe|U] приніс мир і порядок у наше царство."
  secretive_die_desc: "Безперечно [CHARACTER.GetSheHe] забрав багато [CHARACTER.GetHerHis] таємниць у [CHARACTER.GetHerHis] могилу."
  intricate_web_weaver_die_desc: "[CHARACTER.GetSheHe|U] оплакує армія інформаторів."
  well_advised_die_desc: "[CHARACTER.GetHerHis|U] радники запевняють нас, що так було найкраще."
  benevolent_die_desc: "Наші піддані оплакують відхід такого доброзичливого володаря."
  zealot_die_desc: "[CHARACTER.GetHerHis|U] енергія та переконання привели багатьох невіруючих до віри."
  pious_die_desc: "Ми, можливо, ніколи більше не знатимемо правителя такої чесноти та духовної величі."
  careful_die_desc: "[CHARACTER.GetHerHis|U] добре сплановані рішення зміцнили наше становище у світі."
  lawgiver_die_desc: "Врешті-решт нас усіх судитимуть."
  midas_touched_die_desc: "[CHARACTER.GetHerHis|U] талант знаходити гроші будь-де зробив нас багатшою країною."
  incorruptible_die_desc: "[CHARACTER.GetHerHis|U] сильний характер зробив нашу країну чеснішим місцем."
  architectural_visionary_die_desc: "[CHARACTER.GetHerHis|U] пам'ять житиме вічно у численних будівлях, які [CHARACTER.GetSheHe] залишив після себе."
  scholar_die_desc: "[CHARACTER.GetHerHis|U] наукові заняття принесли як інновації, так і славу нашому царству."
  entrepreneur_die_desc: "[CHARACTER.GetSheHe|U] сформував економічне життя [CHARACTER.GetHerHis] епохи."
  industrious_die_desc: "[CHARACTER.GetHerHis|U] невтомні зусилля з покращення нашої економіки будуть дуже бракувати."
  expansionist_die_desc: "Наші колоністи оплакуватимуть втрату свого великого благодійника."
  charismatic_negotiator_die_desc: "Переговори з іноземними правителями здаватимуться тихими та похмурими без [CHARACTER.GetHerHim]."
  silver_tongue_die_desc: "[CHARACTER.GetHerHis|U] солодкі слова тримали світ на відстані. Хто захистить нас тепер?"
  tactical_genius_die_desc: "[CHARACTER.GetHerHis|U] хитромудрі маневри залишили наших ворогів приголомшеними та розгубленими."
  bold_fighter_die_desc: "[CHARACTER.GetHerHis|U] сміливі атаки на ворожі лінії залишили незабутнє враження на кожному солдаті [CHARACTER.GetHerHis] покоління."
  fierce_negotiator_die_desc: "[CHARACTER.GetHerHis|U] жорстокі торги залишили капітанів найманців у злиднях по всіх наших землях."
  strict_die_desc: "[CHARACTER.GetHerHis|U] невсипущий нагляд завжди тримав нас напоготові."
  inspiring_leader_die_desc: "[CHARACTER.GetSheHe|U] надихнув покоління взяти до рук зброю проти наших ворогів."
  martial_educator_die_desc: "Навчальний план, який [CHARACTER.GetSheHe] створив для наших офіцерів, використовуватиметься прийдешніми поколіннями."
  babbling_buffoon_die_desc: "Наші друзі плекатимуть цей день."
  embezzler_die_desc: "Наші бухгалтери не сумуватимуть за [CHARACTER.GetHerHim], але його племінники точно будуть."
  drunkard_die_desc: "[CHARACTER.GetHerHis|U] п'яні ступори та дорогі смаки залишили країну біднішою та гірше керованою, ніж вона була, коли [CHARACTER.GetSheHe] був коронований."
  sinner_die_desc: "[CHARACTER.GetHerHis|U] грішне життя принесло нашій країні лише ганьбу."
  greedy_die_desc: "[CHARACTER.GetHerHis|U] всепоглинаюча жага до грошей та багатства не буде пропущена."
  tolerant_die_desc: "Наші релігійні меншини оплакуватимуть відхід когось із [CHARACTER.GetHerHis] великою толерантною натурою."
  cruel_die_desc: "[CHARACTER.GetHerHis|U] злі діяння пам'ятатимуться прийдешніми поколіннями."
  naive_die_desc: "[CHARACTER.GetHerHis|U] наївне втручання у закордонні справи принесло лише непорозуміння та нових ворогів."
  craven_die_desc: "[CHARACTER.GetHerHis|U] боягузлива поведінка на полі бою назавжди залишиться [CHARACTER.GetHerHis] спадщиною."
  loose_lips_die_desc: "[CHARACTER.GetHerHis|U] необережне поводження з таємною інформацією зробило наші секрети загальновідомими."
  obsessive_perfectionist_die_desc: "[CHARACTER.GetHerHis|U] постійне втручання в кожен інфраструктурний проєкт залишило нашу країну з довгим списком витрат, за якими ми не сумуватимемо."
  malevolent_die_desc: "Наші піддані можуть спати спокійніше, знаючи, що [CHARACTER.GetHerHis] правління зловісного терору закінчилося."
  conqueror_die_desc: "Наші вороги, безсумнівно, відчують полегшення від [CHARACTER.GetHerHis] смерті."
  military_theorist_die_desc: "[CHARACTER.GetSheHe|U] помер, але [CHARACTER.GetHerHis] теорії житимуть вічно!"
  strategist_die_desc: "[CHARACTER.GetHerHis|U] нація плаче за цією важкою втратою."
  mamluk_die_desc: "[CHARACTER.GetHerHis|U] побратими пам'ятатимуть [CHARACTER.GetHimHer]."
  no_die_desc: "[CHARACTER.GetSheHe|U] помер занадто рано, не встигнувши досягти багато чого значного."
  glory_seeker_die_desc: "[CHARACTER.GetHerHis|U] доблесні атаки будуть пропущені нашими військами."
  born_to_the_saddle_die_desc: "[CHARACTER.GetHerHis|U] кавалеристи оплакують [CHARACTER.GetHerHim] як одного зі своїх."
  defensive_planner_die_desc: "Наші війська дуже сумуватимуть за [CHARACTER.GetHerHis] увагою до їхньої безпеки."
  battlefield_medic_die_desc: "Наші війська дуже сумуватимуть за [CHARACTER.GetHerHis] увагою до їхнього здоров'я."
  ruthless_die_desc: "[CHARACTER.GetHerHis|U] безжальні тактики могли вселяти великий страх у наших ворогів."
  inspirational_leader_general_die_desc: "[CHARACTER.GetHerHis|U] надихаючі промови пам'ятатимуться поколіннями солдатів."
  master_of_arms_die_desc: "[CHARACTER.GetHerHis|U] піхотинці оплакують [CHARACTER.GetHerHim] як одного зі своїх."
  goal_oriented_die_desc: "[CHARACTER.GetHerHis|U] своєчасні прибуття врятували чимало битв."
  hardy_warrior_die_desc: "[CHARACTER.GetHerHis|U] сама присутність, здавалося, полегшувала найгірші труднощі."
  siege_specialist_die_desc: "[CHARACTER.GetHerHis|U] увага до облогових технік зробила кожну інвестицію вартісною."
  cannoneer_die_desc: "Артилерійський корпус оплакує [CHARACTER.GetHerHis] смерть так, ніби [CHARACTER.GetSheHe] був одним із них."
  extortioner_die_desc: "[CHARACTER.GetHerHis|U] кончина дуже потішить торговців усіх національностей, окрім нашої."
  ruthless_blockader_die_desc: "Громадяни портів по всьому узбережжю тепер можуть дихати легше."
  buccaneer_die_desc: "З [CHARACTER.GetHerHim] відходом наші вороги знову почуватимуться безпечніше на морських шляхах."
  prize_hunter_die_desc: "[CHARACTER.GetHerHis|U] подвиги мужності принесли багато нових [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] як трофеїв до наших рук."
  ironside_die_desc: "[CHARACTER.GetHerHis|U] сильна віра в оборонну тактику залишила тривале враження на всіх, хто був під [CHARACTER.GetHerHis] командуванням."
  naval_engineer_die_desc: "[CHARACTER.GetHerHis|U] увага до [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] під [CHARACTER.GetHerHis] командуванням значно збільшила довговічність нашого [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] під час [CHARACTER.GetSheHe] служби."
  naval_showman_die_desc: "[CHARACTER.GetHerHis|U] сміливі маневри принесли славу та досвід нашим екіпажам."
  ram_raider_die_desc: "[CHARACTER.GetHerHis|U] сміливі маневри принесли славу та досвід нашим екіпажам."
  naval_gunner_die_desc: "[CHARACTER.GetHerHis|U] постійні тренування наших артилерійських екіпажів значно збільшили нашу морську міць за [CHARACTER.GetHerHis] життя."
  accomplished_sailor_die_desc: "[CHARACTER.GetHerHis|U] велика повага до мистецтва мореплавства загалом була шанована [CHARACTER.GetHerHis] людьми."
  level_headed_die_desc: "[CHARACTER.GetHerHis|U] здатність зберігати спокій навіть перед обличчям серйозної небезпеки буде дуже бракувати."
  gold_loving_die_desc: "[CHARACTER.GetHerHis|U] любов до золота чинила певний тиск на нашу скарбницю, і його не бракуватиме нашим бухгалтерам."
  humble_die_desc: "[CHARACTER.GetHerHis|U] скромність зробила [CHARACTER.GetHerHis] досягнення ще більш шанованими всіма."
  workaholic_die_desc: "[CHARACTER.GetHerHis|U] важка праця відправила [CHARACTER.GetHerHim] до могили раніше, ніж було потрібно, але [CHARACTER.GetHerHis|U] досягнення будуть довго пам'ятати."
  lazy_die_desc: "[CHARACTER.GetHerHis|U] ненависть до роботи була єдиним зусиллям, яке [CHARACTER.GetSheHe|U] коли-небудь докладав."
  prominent_die_desc: "[CHARACTER.GetHerHis|U] слава буде вічно пам'ятатися, оскільки [CHARACTER.GetSheHe] багато зробив для нашої нації."
  inconspicious_die_desc: "[CHARACTER.GetHerHis|U] робота була настільки неважливою, що ніхто не помітив, коли [CHARACTER.GetSheHe] помер."
  meticulous_die_desc: "[CHARACTER.GetHerHis|U] обережна поведінка виявилася марною поза [CHARACTER.GetHerHis] мистецтвом."
  careless_die_desc: "[CHARACTER.GetHerHis|U] безтурботне ставлення призвело до неминучого."
  adept_die_desc: "[CHARACTER.GetHerHis|U] великі здібності будуть пам'ятатися роками."
  amateur_die_desc: "[CHARACTER.GetHerHis|U] нездарність швидко призведе до забуття [CHARACTER.GetHerHis] мистецтва світом."
  prescient_die_desc: "[CHARACTER.GetHerHis|U] передбачливість не змогла запобігти [CHARACTER.GetHerHis] долі."
  idler_die_desc: "[CHARACTER.GetHerHis|U] горезвісна лінь принесла лише гнів [CHARACTER.GetHerHis] покровителям."
  curious_adventurer: "Допитливий авантюрист"
  desc_curious_adventurer: "Цей дослідник — допитливий мандрівник, який не припиняє досліджувати територію, доки не відвідає кожен острів; узбережжя не буде нанесено на карту, щоб розкрити таємниці нового світу. На відміну від інших дослідників, цей не дбає про особисту вигоду."
  curious_adventurer_die_desc: "Хто знає, чи [CHARACTER.GetHerHis] цікавість нарешті була втамована."
  navigator: "Навігатор"
  desc_navigator: "Цей дослідник має багаторічний досвід навігації та знає, як маневрувати своїм [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] у небезпечних водах."
  navigator_die_desc: "[CHARACTER.GetSheHe|U] тепер точно пливе у кращих водах."
  treasure_hunter: "Мисливець за скарбами"
  desc_treasure_hunter: "Цей дослідник дбає лише про гроші. Він зробить усе, щоб знайти найрідкісніші скарби в новому світі — навіть якщо це буде за рахунок тубільців."
  treasure_hunter_die_desc: "На жаль, [CHARACTER.GetSheHe] не зміг взяти жодного зі [CHARACTER.GetHerHis] скарбів із [CHARACTER.GetHerHim]."
  cartographer: "Картограф"
  desc_cartographer: "Цей дослідник є шанувальником карт і любить відкривати незвідані землі. Хоча місія займає значно більше часу, їхня документація дуже детальна. Крім того, їхня любов до своєї роботи робить їх достатньо щасливими, щоб витримувати меншу оплату."
  cartographer_die_desc: "[CHARACTER.GetSheHe|U] тепер нанесе на карту ще більше недосяжних земель."
  scientist_on_sea: "Вчений на морі"
  desc_scientist_on_sea: "Цей дослідник — насамперед вчений. Нанесення землі на карту менш важливе, ніж вивчення флори та фауни нового світу."
  scientist_on_sea_die_desc: "[CHARACTER.GetHerHis|U] ім'я житиме в багатьох рослинах і тваринах, які [CHARACTER.GetSheHe] назвав."
  child_prodigy: "Вундеркінд"
  child_prodigy_die_desc: "Смерть [CHARACTER.GetName] відчувається як глибока і болісна втрата, як втрата блискучої, але нездійсненої долі."
  desc_child_prodigy: "Майбутнє цієї дитини світле, і їй судилося залишити своє ім'я в історичних книгах."
  child_gifted: "Обдарований"
  child_gifted_die_desc: "Смерть [CHARACTER.GetName] — болісна втрата, як втрата багатообіцяючого майбутнього, що обірвалося."
  desc_child_gifted: "Ця дитина дивує своїх дорослих колег своїми доведеними навичками та майбутнім потенціалом."
  child_slow: "Повільний"
  child_slow_die_desc: "Кончина [CHARACTER.GetName] відчувається зі співчуттям до дитини, чиє життя було не таким легким, як у інших."
  desc_child_slow: "Ця дитина не є найяскравішим розумом свого покоління, і їй доводиться докладати додаткових зусиль, щоб не відставати від своїх однолітків."
  child_idiot: "Ідіот"
  child_idiot_die_desc: "Кончина [CHARACTER.GetName] відчувається зі смутком, але також і з полегшенням, адже це була людина, яка не змогла б сподіватися на найкраще майбутнє."
  desc_child_idiot: "Ця дитина — повний ідіот, і дуже мало що можна зробити, щоб забезпечити їй гідне майбутнє."
  child_intelligent: "Розумний"
  child_intelligent_die_desc: "Кончина [CHARACTER.GetName] оплакується і відчувається як втрата дуже здібної людини."
  desc_child_intelligent: "Ця дитина виявила вроджений інтелект, який можна розвивати далі."
  child_gregarious: "Товариський"
  child_gregarious_die_desc: "Кончина [CHARACTER.GetName] відчуватиметься багатьма людьми, з якими він спілкувався протягом свого, на жаль, короткого життя."
  desc_child_gregarious: "Ця дитина любить постійно бути оточеною іншими людьми і насолоджується спілкуванням з ними."
  child_rowdy: "Буйний"
  child_rowdy_die_desc: "[CHARACTER.GetName] нарешті спочиває. Дивно бачити [CHARACTER.GetHimHer] таким мовчазним."
  desc_child_rowdy: "Ця дитина зовсім не спокійна і не тиха, завжди дає про себе знати, і зовсім не наймирнішим чином."
  child_ambitious: "Амбітний"
  child_ambitious_die_desc: "[CHARACTER.GetHisHer|U] амбітні мрії, на жаль, залишаться нездійсненими."
  desc_child_ambitious: "Ця дитина знає, чого хоче, і це не зовсім щось дріб'язкове. Якби вона могла, то взяла б усе."
  child_gallant: "Галантний"
  child_gallant_die_desc: "Усі плачуть за [CHARACTER.GetName], здається, [CHARACTER.GetHeShe] був надто досконалим, щоб довго залишатися в цьому світі. Ми ніколи більше не побачимо подібного до [CHARACTER.GetHimHer]."
  desc_child_gallant: "Незважаючи на те, що це дитина, вона є втіленням лицарства. Хоробрий, стильний, ввічливий і уважний, він, безсумнівно, заслуговуватиме на багато віршів та історій, коли виросте."
  child_shrewd: "Проникливий"
  child_shrewd_die_desc: "Навіть [CHARACTER.GetHisHer] схеми та стратегії не змогли врятувати [CHARACTER.GetName] від Смерті. [CHARACTER.GetHeShe|U] нарешті знайшов того, хто зміг перехитрити [CHARACTER.GetHimHer]."
  desc_child_shrewd: "Незалежно від того, де ця дитина знаходиться або що вона робить, її розум завжди працює гостро, як ніж. Ніхто не може перевершити її в змаганні розуму."
  unsuited_for_army_command: "Непридатний для командування армією"
  unsuited_for_army_command_die_desc: "Необґрунтовані стратегії [CHARACTER.GetName], на щастя, більше не є проблемою. Багато людей радіють, що [CHARACTER.GetHeShe] зустрів [CHARACTER.GetHisHer] загибель, і більше жоден чоловік під [CHARACTER.GetHimHer] не повинен страждати від [CHARACTER.GetHisHer] дурних рішень."
  desc_unsuited_for_army_command: "Невміння в стратегії та військовій тактиці призводить до катастрофи щоразу, коли хтось подібний намагається очолити війська, і всі близькі офіцери лише сподіваються, що такий некомпетентний генерал просто стоятиме як прославлений опудало, не базікаючи дурних вказівок."
  unsuited_for_naval_command: "Непридатний для командування флотом"
  unsuited_for_naval_command_die_desc: "Нездатність [CHARACTER.GetName] утримувати щось у шлунку, опинившись у морі, постійно виявлялася катастрофічною. Усі моряки в країні нарешті зітхають з полегшенням, що [CHARACTER.GetHeShe] більше не осквернятиме їхні палуби."
  desc_unsuited_for_naval_command: "Щоб керувати флотами, потрібне чітке відчуття орієнтації, і, звичайно, здатність витримувати шорсткість хвиль. Той, хто не здатний на це, так само марний для керування кораблем, як якір, і просто повний мертвий вантаж на палубі."
  unsuited_for_country_ruling: "Непридатний для управління країною"
  unsuited_for_country_ruling_die_desc: "Нарешті, [CHARACTER.GetName] нарешті загинув, і [CHARACTER.GetHisHer] шкідлива політика залишилася в минулому."
  desc_unsuited_for_country_ruling: "Лідерство та управління країною – це завдання, до якого не кожен підходить. Хоча деякі уряди бачили свою частку некомпетентних правителів, ця особа, зокрема, або не бажає, або не здатна бути фігурою будь-якої поважної держави."
  efficient_administrator: "Ефективний адміністратор"
  desc_efficient_administrator: "Писання та святі тексти надають знання не лише про духовність, а й про те, як керувати повсякденним життям. Ця особа відзначається в цьому виді знань, до того, що може впливати на поведінку інших, а також найефективніше адмініструвати та керувати бюрократичними процедурами."
  efficient_administrator_die_desc: "[CHARACTER.GetName] покинув цей мирський світ, і колеса уряду обертаються повільніше з втратою [CHARACTER.GetHerHis]. Більше не буде паперової роботи та директив, що течуть так гладко без ефективного керівництва [CHARACTER.GetNameWithNoTooltip]."
  proselytizer: "Прозелітер"
  desc_proselytizer: "У світі може бути багато вірувань, але істинна віра лише одна. Ревність навернення загублених душ до прийняття правильних вірувань не лише зміцнює громаду, але й забезпечує їхній шлях правильним шляхом."
  proselytizer_die_desc: "[CHARACTER.GetName] помер, і багато душ, які [CHARACTER.GetSheHe] врятував, показавши їм істинну віру, плачуть через [CHARACTER.GetHerHis] відхід. [CHARACTER.GetHerHis|U] роль маяка віри буде, безсумнівно, пропущена, і більше душ буде втрачено без [CHARACTER.GetHerHis] керівництва."
  reverend_teacher: "Преподобний Вчитель"
  desc_reverend_teacher: "Мало хто може вважатися джерелом знань, але їх завжди шукають за їхніми вченнями та настановами. Швидко формуючи групу вірних учнів, ці великі вчителі користуються великою повагою та шаною."
  reverend_teacher_die_desc: "Кількість знань [CHARACTER.GetName] не змогла врятувати [CHARACTER.GetHerHim] від смерті. Коли [CHARACTER.GetSheHe] зробив [CHARACTER.GetHerHis] останній подих, [CHARACTER.GetHerHis] численні учні оплакують [CHARACTER.GetHerHis] кончину, і світ стане трохи менш мудрим з цим."
  ascetic: "Аскет"
  desc_ascetic: "Сенс релігійного життя полягає в тому, щоб присвятити себе вірі, а не потурати мирським задоволенням. Ця особа приймає ці вчення близько до серця і відмовляється брати участь у будь-яких насолодах, вважаючи за краще жити з якомога меншою матеріальною підтримкою."
  ascetic_die_desc: "Смерть [CHARACTER.GetName] настала раптово, але несподівано. [CHARACTER.GetHerHis|U] утримання від усього матеріального, навіть їжі, безумовно, мало свої наслідки, хоча багато хто з [CHARACTER.GetHerHis] послідовників захоплювалися та поділяли [CHARACTER.GetHerHis] практики, і [CHARACTER.GetHerHis] присутність буде дуже сумувати."
  mystic_seer: "Містичний Провидець"
  desc_mystic_seer: "Розплутати нитки долі та пробити завісу майбутнього, безумовно, нелегке завдання. Багато хто, хто намагається, поглинається божевіллям від того, що вони бачать, якщо їм взагалі вдається щось побачити. Однак для тих, хто опановує ясновидіння, майбутнє не має секретів."
  mystic_seer_die_desc: "Навіть [CHARACTER.GetHerHis] відома передбачливість не змогла врятувати [CHARACTER.GetName] від смерті. Незрозуміло, чи у [CHARACTER.GetHerHis] видіннях [CHARACTER.GetSheHe] зміг побачити [CHARACTER.GetHerHis] неминучу загибель, але, якщо [CHARACTER.GetSheHe] це зробив, [CHARACTER.GetSheHe] не зміг уникнути цього."
  literalist: "Буквоїд"
  desc_literalist: "Святі тексти та стародавні писання є основою релігії. Ця особа, однак, доводить це почуття до крайності, вважаючи їх єдиною релігійною основою. Мало того, навіть самі тексти розглядаються як незмінні та непогрішні, де навіть порядок слів має своє призначення."
  literalist_die_desc: "[CHARACTER.GetName] помер, і з [CHARACTER.GetHerHim] йде [CHARACTER.GetHerHis] суворе дотримання писань. Багато з [CHARACTER.GetHerHis] улюблених уривків були прочитані на [CHARACTER.GetHerHis] похоронах [CHARACTER.GetHerHis] послідовниками, щоб істинні слова віри могли приєднатися до [CHARACTER.GetHerHim] навіть після смерті."
  unorthodox: "Unorthodox"
  desc_unorthodox: "Хоча можуть існувати різні погляди на певні аспекти нашої віри, деякі позиції загалом є більш прийнятними, ніж інші. Ця особа дотримується деяких менш поширених, що викликає щонайменше неповагу з боку загальної релігійної спільноти, а щонайбільше – маргіналізацію. Однак є також багато інших, хто поділяє ті ж погляди або принаймні достатньо заінтригований, щоб слухати."
  unorthodox_die_desc: "[CHARACTER.GetName] помер, і деякі з найбільш традиціоналістів серед нашої релігійної спільноти зітхають з полегшенням, бачачи кінець [CHARACTER.GetHerHis] «ексцентричності». Однак багато інших плачуть через [CHARACTER.GetHerHis] втрату, шкодуючи, що доводиться прощатися з [CHARACTER.GetHerHis] ширшим світоглядом."
  hermit: "Відлюдник"
  desc_hermit: "Зрозуміло, що постійна соціальна взаємодія не найкраща для всіх, особливо серед тих, хто хоче присвятити своє життя релігії. Ця особа належить до них, віддаючи перевагу життю в усамітненні та ізоляції, а не серед мас, щоб краще спілкуватися з божественним і не виявляючи активного інтересу до справ інших людей."
  hermit_die_desc: "[CHARACTER.GetName] помер, хоча людям знадобилося кілька днів, щоб помітити це через [CHARACTER.GetHerHis] ізоляцію. Навіть [CHARACTER.GetHerHis] послідовники живуть без надто тісного контакту один з одним і з [CHARACTER.GetHerHim]. Тепер, коли [CHARACTER.GetSheHe|U] помер, їхній контакт з [CHARACTER.GetHerHim] буде повністю припинено."
  alms_giver: "Милостивець"
  desc_alms_giver: "Блаженні ті, хто ділиться з менш обдарованими. Ця особа вважає це вчення найважливішим, подаючи милостиню бідним і ділячись як їжею, так і монетами. Група учнів, що наслідує ці практики, також слідує за ним, і таким чином задовольняються потреби нижчих верств населення."
  alms_giver_die_desc: "Смерть [CHARACTER.GetName] викликала великий плач, особливо серед менш обдарованих. Саме вони найбільше виграли від [CHARACTER.GetHerHis] постійної милостині, і саме вони найбільше сумуватимуть за [CHARACTER.GetHerHim]."
  stargazer: "Звіздар"
  desc_stargazer: "Зорі зачаровували очі людства з самого його початку, і багато хто шукає серед них божественної присутності. Ця особа є однією з них, завжди спрямовуючи погляд вгору в пошуках знань і відповідей. Адже багато чого можна дізнатися від зірок, якщо хтось готовий дивитися."
  stargazer_die_desc: "Зірка, якою було життя [CHARACTER.GetName], згасла, і багато хто шкодує, наскільки темним став світ без неї. Більше не передаватимуться знання про небо через [CHARACTER.GetHerHis] голос, і багато поглядів, що були підняті, тепер натомість будуть спрямовані вниз."