l_english:
  march_to_sound_of_guns: "March to the Sound of Guns"
  march_to_sound_of_guns_desc: "Коли ми почуємо гуркіт гармат у далині, наш корпус рушить на допомогу!"
  drill_army: "Drill Army"
  drill_army_desc: "Муштра — ідеальний, хоч і дорогий спосіб переконатися, що кожен солдат готовий до бою і знає, що потрібно робити, не ризикуючи життям і здоров'ям. Зрештою, досвід — найкращий вчитель."
  drill_army_cta: "Натисніть, щоб розпочати муштру."
  hire_prisoners_as_mercenaries: "Hire Prisoners as Mercenaries"
  hire_prisoners_as_mercenaries_desc: "Це підкупить [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e], щоб вони билися за нашу [Concept('country', 'CONCEPT_PLACEHOLDER')|e] як загін [Concept('mercenaries', 'CONCEPT_PLACEHOLDER')|e]."
  hire_prisoners_as_mercenaries_cta: "Натисніть, щоб підкупити [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e] битися за нас."
  ransom_prisoners: "Ransom Prisoners"
  ransom_prisoners_desc: "Це викупить [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e] у підрозділі назад їхнім власникам. Ми отримаємо дохід від операції, але ворог поверне свої [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e]."
  ransom_prisoners_cta: "Натисніть, щоб викупити [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e]."
  execute_prisoners: "Execute Prisoners"
  execute_prisoners_desc: "Це стратить [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e] у підрозділі. Інші [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] можуть бути не вражені нашою жорстокістю, але нам не доведеться турбуватися про їхнє годування або про те, щоб їх знову захопили."
  execute_prisoners_cta: "Натисніть, щоб стратити [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e] у підрозділі."
  sell_prisoners_into_slavery: "Sell Prisoners Into Slavery"
  sell_prisoners_into_slavery_desc: "Це візьме [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e] у підрозділі та продасть їх на найближчому [Concept('market', 'CONCEPT_PLACEHOLDER')|e] як рабів."
  sell_prisoners_into_slavery_cta: "Натисніть, щоб продати [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e] у підрозділі в рабство."
  scorch_earth: "Scorch Earth"
  scorch_earth_desc: "Знищити наші запаси [Concept('food', 'CONCEPT_PLACEHOLDER')|e], щоб послабити ворога, якщо нам доведеться відступати."
  scorch_earth_cta: "Натисніть, щоб усе згоріло!"
  scorched_earth_pops_unhappy: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  convert_galley_to_light_ship: "Convert Galley to Light Ship"
  convert_galley_to_light_ship_desc: "У мирний час [ShowUnitCategoryName('navy_galley')] можна перепрофілювати для використання як торгове судно для нашої держави."
  convert_galley_to_light_ship_cta: "Натисніть, щоб перетворити [ShowUnitCategoryName('navy_galley')] на [ShowUnitCategoryName('navy_light_ship')].\nКожне перетворення коштує #R 5 [Concept('gold', 'CONCEPT_PLACEHOLDER')|e].#!"
  convert_galley_to_light_ship_effect: "Галлери у флоті будуть перетворені на легкі кораблі за 5[gold_i] кожен"
  convert_light_ship_to_galley: "Перетворити легкий корабель на галеру"
  convert_light_ship_to_galley_desc: "У часи війни [ShowUnitCategoryName('navy_light_ship')] може бути перепрофільований для служби як військовий корабель нашої держави."
  convert_light_ship_to_galley_cta: "Натисніть, щоб перетворити [ShowUnitCategoryName('navy_light_ship')] на [ShowUnitCategoryName('navy_galley')].\nКожне перетворення коштує #R 5 [Concept('gold', 'CONCEPT_PLACEHOLDER')|e].#!"
  convert_light_ship_to_galley_effect: "Легкі кораблі у флоті будуть перетворені на галери за 5[gold_i] кожен"
  promote_to_farari: "Підвищити до Фарарі"
  promote_to_farari_desc: "Війська Мандекалу продемонстрували свою хоробрість та рішучість на полі бою. Настав час відзначити їх за службу та підвищити їх як частину елітного корпусу нашої держави!"
  promote_to_farari_cta: "Натисніть, щоб перетворити [ShowUnitDefinitionName('a_mandekalu_infantry')] та [ShowUnitDefinitionName('a_mandekalu_cavalry')] відповідно на [ShowUnitDefinitionName('a_farari_infantry')] та [ShowUnitDefinitionName('a_farari_cavalry')]."
  promote_to_farari_ct: "[ShowUnitDefinitionName('a_mandekalu_infantry')] та [ShowUnitDefinitionName('a_mandekalu_cavalry')] підвищуються відповідно до [ShowUnitDefinitionName('a_farari_infantry')] та [ShowUnitDefinitionName('a_farari_cavalry')]"
  promote_to_farari_tt: "Ми маємо #Y 150#! $mandekalu_exp$"
  mandekalu_exp: "Загальний досвід Мандекалу"
  mandekalu_exp_gain_desc: "#italic Можна отримати #Y досвід#!, щоб бути підвищеним до [ShowUnitDefinitionName('a_farari_infantry')] та [ShowUnitDefinitionName('a_farari_cavalry')] після дослідження просування [ShowAdvanceName('farari_corps_advance')]. #Y Досвід#! розподіляється між усіма #Y підрозділами Мандекалу#!. Виграні битви надають #G +15#!, програні битви надають #G +5#! #Y досвіду#! за кожен підрозділ Мандекалу, що брав участь.#!"
  absorb_pops: "Поглинути населення"
  absorb_pops_desc: "Використовуйте цей підрозділ, щоб змусити частину місцевого населення приєднатися до наших лав."
  absorb_pops_cta: "Натисніть, щоб почати поглинати населення."
  sacrifice_prisoners: "Принести в жертву полонених"
  sacrifice_prisoners_desc: "Це принесе в жертву [Concept('prisoners', 'CONCEPT_PLACEHOLDER')|e] у підрозділі, що втішить богів і звільнить нас від необхідності годувати їх або ризикувати їхнім поверненням у полон."
  sacrifice_prisoners_cta: "Натисніть, щоб почати приносити в жертву полонених."
  gather_food: "Збирати їжу"
  gather_food_desc: "Наші солдати збиратимуть їжу замість того, щоб зосереджуватися на своїх обов'язках."
  gather_food_cta: "Натисніть, щоб почати збирати їжу."
  raid_clan_holdings: "Грабувати володіння клану"
  raid_clan_holdings_desc: "Навіть якщо ми не можемо повністю завоювати володіння нашого ворога, ми, безперечно, можемо їх грабувати та розграбовувати."
  raid_clan_holdings_cta: "Натисніть, щоб грабувати володіння клану"
  raid_imperial_family_holdings: "Грабувати володіння імператорської родини"
  raid_imperial_family_holdings_desc: "$raid_clan_holdings_desc$"
  raid_imperial_family_holdings_cta: "Натисніть, щоб грабувати володіння імператорської родини"