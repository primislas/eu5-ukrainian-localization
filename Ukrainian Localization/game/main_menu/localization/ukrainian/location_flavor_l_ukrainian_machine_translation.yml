l_english:
  stockholm_desc: "Це місто було засноване 1252 року Біргером Ярлом у стратегічно обраному місці, де озеро Меларен зустрічається з Балтійським морем. Це дозволило Стокгольму слугувати як фортецею, що контролювала доступ до озера, так і торговим центром, що з'єднував внутрішню Швецію з ганзейськими та балтійськими торговими мережами."
  paris_desc: "На берегах Сени Париж виріс зі скромного поселення в коштовність Франції. Зі своїм собором, ринками та школами він став одним із провідних центрів влади та культури Європи."
  london_desc: "Розташований на Темзі, Лондон виріс з римського Лондініума в головне місто Англії. Його процвітаюча торгівля та королівські двори зробили його політичним та економічним серцем королівства."
  rome_desc: "Вічне Місто на Тибрі правило імперією, що охоплювала континенти. Навіть після падіння своєї Імперії Рим вистояв як маяк віри та авторитету, домівка Папства."
  jerusalem_desc: "Як місце зустрічі віри та боротьби, Єрусалим шанується євреями, християнами та мусульманами. Паломники та завойовники постійно формують його священну, але бурхливу історію."
  alexandria_desc: "Колись маяк Середземномор'я, Александрія процвітає як перехрестя торгівлі та науки. Її маяк та бібліотека колись проголошували місто, де сходилися культури та імперії."
  constantinople_desc: "Увінчаний собором Святої Софії та оточений могутніми стінами, Константинополь стояв як серце Східної Римської імперії. Протягом тисячі років його багатство та велич робили його заздрістю світу."
  sitges_desc: "У Середньовіччі на пагорбі, де нині стоїть Ратуша, було збудовано замок. Першим власником було Барселонське єпископство, але у XII столітті він перейшов у власність родини, на честь якої його названо."
  valladolid_desc: "Заснований в останні десятиліття XI століття графами Педро Ансуресом та Ейло Альфонсо поблизу мосту через річку Пісуерга, Вальядолід розвинувся як торгове місто в самому центрі Північної Месети. До XIV століття він став найважливішим містом регіону, поряд з Бургосом, та головним адміністративним центром під час регентства королеви Марії де Моліна та правління її онука, короля Альфонсо XI."
  penafiel_desc: "#italic Penna Fidelis#!, «Вірний Пагорб», було засновано в X столітті на вершині пагорба, що стратегічно контролює середню частину долини річки Дуеро, роблячи його гарячою точкою в прикордонних набігах проти Кордовського халіфату. Граф Санчо Гарсія Кастильський остаточно укріпив його та надав йому «фуеро» близько 1013 року. Згодом воно перетворилося на багате місто завдяки процвітаючій виноробній промисловості, зрештою опинившись під контролем могутнього роду Дона Хуана Мануеля."
  toro_desc: "Торо було засноване в X столітті в рамках зусиль королів Леона з укріплення кордону королівства в долині річки Дуеро у їхній боротьбі проти Кордовського халіфату. Пізніше воно розвинулося як важливе місто завдяки своєму стратегічному положенню та багатим сільськогосподарським угіддям і виноградникам."
  thessaloniki_desc: "Довгий час вважалася другим містом Візантійської імперії після Константинополя, багатство та престиж Салонік походять від її стратегічного положення в торгівлі. Її жваві порти направляють цінні товари між Італією та римським серцем, слугуючи життєво важливим мостом між Сходом та Заходом."
  malmo_desc: "Ключова фортеця на Ересунді, Мальме контролює прохід між Балтійським та Північним морями. Її укріплені стіни та пильні захисники роблять її центром влади та містом, сформованим стратегією та амбіціями."
  bilbao_desc: "Офіційно засноване 1300 року Дієго Лопесом де Аро, сеньйором Біскаї, місто незабаром стало важливим центром у Північній Іспанії. Розташоване у вузькій долині та на початку естуарію річки Нервіон, обнесене мурами поселення розвинуло потужну суднобудівну промисловість і стало головним портом експорту до англійських та фламандських портів дорогоцінної кастильської мериносової вовни та місцевої високоякісної залізної руди."
  radom_desc: "Місто, розширене останнім королем П'ястів Казимиром III Великим, залишалося важливим політичним центром протягом пізнього Середньовіччя та Відродження. У місті також відбулося підписання Віленсько-Радомського пакту 1401 року та затвердження акту #italic Nihil Novi#! 1505 року під час парламентської сесії в королівському замку."
  krakow_desc: "Починаючи як хутір на Вавельському пагорбі, вперше згадується за назвою 965 року, описане як помітний торговий центр свого часу. Воно стало резиденцією польських монархів з династії П'ястів 1038 року, а згодом служило центром адміністрації, економіки та культури Королівства Польського."
  megara_desc: "Заснована та населена з давніх часів, Мегара керувалася легендарними царями, такими як Нісос та Бізас. Місто стало значною силою на грецькому півострові, відоме своєю морською міццю та процвітаючою торгівлею. Його колоністи заснували важливі поселення по всьому Середземномор'ю, включаючи Візантій, Херсонес та Селінунт. Однак з часом Мегара поступово занепала, залишивши лише сліди своєї колишньої величі."
  grojec_desc: "Аж до XII століття воно було центром місцевої каштелянії та архієпархії Познані, але поступово втратило своє значення на користь сусіднього Черська."
  gdansk_desc: "Його назва, вперше зафіксована 997 року, місто Гданськ, народилася з поселення, що існувало на узбережжі Балтійського моря. Воно стало великим суднобудівним та торговим портом, закріпивши свою позицію одного з найбагатших та найвпливовіших міст Східної Європи."
  athens_desc: "Вважаючись культурним центром Стародавньої Греції, Афіни виросли в одне з наймогутніших міст-держав свого часу. Перебуваючи у протиріччі зі Спартою, Фівами та іншими державами античності, воно повільно зростало, ставши домінуючою морською державою Егейського моря. З його підкоренням Македонською імперією, а пізніше Римською та Візантійською імперіями, місто зазнало значного занепаду, а після 1204 року стало столицею хрестоносної держави."
  wieliczka_desc: "Місто Величка було засноване 1290 року королем Польщі Пшемислом II завдяки місцевому видобутку соляних покладів. Головне гірниче місто, воно отримало багато привілеїв, і місцева соляна шахта незабаром здобула популярність. Величка Соляна Шахта та її сестринська шахта в Бохні стали частиною гірничої компанії #italic Żupy Krakowskie#!. В офіційних документах місто відоме як #italic Wielka Sól#!, що означає #italic Велика Сіль#!."
  leksand_desc: "Це село на південному узбережжі озера Сільян було заселене протягом кількох тисячоліть. Церква була побудована на початку XII століття, і зараз вона найвідоміша тим, що їхній перший лютеранський пастор був предком Йохана."
  leipzig_desc: "Заснований 1165 року на перехресті #italic Via Imperii#! та #italic Via Regia#!, Лейпциг виріс у багатий торговий центр. Пізніше, отримавши важливі імперські привілеї, Лейпциг та його торгівля стали важливим центром хутрової торгівлі та розвиваючої книжкової індустрії."
  augsburg_desc: "Колись відоме як #italic Augusta Videlicum#! за часів правління римського імператора Траяна, Вільне імперське місто Аугсбург є одним із найстаріших міст Священної Римської імперії. Наприкінці раннього Середньовіччя Аугсбург зростав у значенні, оскільки служив місцем однієї з успішних оборон проти вторгнення угорців у 955 році. У 1276 році це значення ще більше розширилося, коли Аугсбург отримав право імперського міста від короля Рудольфа фон Габсбурга, що відкрило шлях до процвітаючого майбутнього."
  warsaw_desc: "Виникнувши як невелике рибальське містечко на Мазовії, місто стало відомим після перенесення туди столиці з Кракова Сигізмундом III у 1596 році. З того часу воно продовжувало зростати, ставши найбільшим польським містом у XVIII столітті. У тому ж столітті воно зазнало значного розвитку, сприяючи польській архітектурній та ремісничій сцені."
  tunis_desc: "Заснований як Карфаген легендарною царицею Дідоною у 814 році до нашої ери, він став столицею однойменної пунічної нації, був зруйнований, а потім відбудований римлянами після трьох кровопролитних війн. Сучасне місто Туніс було засноване арабами у 698 році на околицях цих стародавніх руїн. Завоювання Альмохадів у 12 столітті піднесло його до статусу регіональної столиці, який був закріплений династією Хафсідів."
  heidelberg_desc: "Наприкінці 12 століття Гайдельберг став резиденцією пфальцграфа Рейнського, і був побудований відомий замок. Гайдельберг відомий тим, що є домом для першого німецького університету, і тому він довгий час був центром навчання. Згодом він став центром Реформації та толерантності, а Пфальц зрештою став лідером Протестантського союзу. Пізніше замок та його культовий вигляд привабили до міста багатьох поетів, що призвело до того, що він став символом романтизму, за що місто отримало прізвисько #italic Місто романтизму#!."
  aviles_desc: "Засноване в 10 столітті, Авілес — це місто, що розвинулося вздовж лиману, який надав йому стратегічного значення як порту. У сусідньому замку Гаусон король Альфонсо III Астурійський наказав виготовити обітний Хрест Перемоги, який був покритий золотом і дорогоцінним камінням і тепер є символом усього королівства. З 11 століття Авілес став королівським містом, визнаним за його морську торгівлю, а також зберігання та розподіл солі."
  pingjin_desc: "Тайюань, де знаходиться святе місце храму Цзінь, був одним з найважливіших міст Шаньсі та північного Китаю з 5 століття до нашої ери. У 979 році імператор Тайцзун з династії Сун наказав затопити та зруйнувати стародавнє місто Цзіньян після завоювання Північної Хань, а потім перейменував його на повіт Пінцзінь (букв. «Умиротворення Шаньсі»), катастрофа, від якої місто довго оговтувалося."
  dunstable_desc: "Римське місто, що стало монастирським містечком; відоме королівським домом Генріха I (1109), Хрестом Елеонори (1290), розлученням Генріха VIII (1533) та місцем вербування Кромвеля (1642)."
  paderborn_desc: "Єпископство, засноване близько 800 року н.е., перше місце зустрічі Карла Великого та Папи Лева III. Обложене 16 разів під час Тридцятилітньої війни. Зруйноване шведськими військами у 1646 році."
  porto_desc: "Назване #italic Cidade Invicta#!, або «Непереможне місто», воно дало Португалії її назву та прославило портвейн Дору далеко за її межами."
  jiaxing_desc: "Цзясін — прикордонна територія між регіонами У та Юе. «Цзя» означає красу та сприятливість, тоді як «Сін» означає процвітання та розквіт."
  torgau_desc: "У 1452 році курфюрст Фрідріх II заснував першу ведмежу яму в Торгау, яка постійно розширювалася до 1624 року. Вона вміщувала до 39 ведмедів."
  changsha_desc: "З моменту свого заснування центр міста Чанша залишався незмінним протягом двох тисяч років."
  ningxiang_desc: "Найбільший бронзовий #italic цзунь#! (посудина для вина) династії Шан (три тисячі років тому) був знайдений тут."
  wurzburg_desc: "Вюрцбург виріс як франконська фортеця, ставши єпископством у 741 році. Він процвітав навколо своєї фортеці та торгових шляхів річки Майн у ранньому Середньовіччі."
  hanover_desc: "Ганновер виріс із середньовічного поселення до ключового міста Священної Римської імперії, яким правили Вельфи, і процвітав як центр торгівлі, влади та культури."
  osnabruck_desc: "Оснабрюк, середньовічний торговий центр у Священній Римській імперії, здобув популярність як єпископство та місце проведення переговорів про Вестфальський мир."
  glasgow_desc: "Глеска (Глазго), заснована як середньовічне єпископство, процвітала навколо свого великого собору, отримавши статус бургу та університету, що сформував освіту Шотландії."
  neva_desc: "Дельта Неви, колись частина варязько-грецького торгового шляху, стала Санкт-Петербургом у 1703 році і залишалася столицею Росії понад 200 років."
  dubno_desc: "Дубно, вперше згадане у 1100 році, перетворилося на волинський торговий центр, відомий своїми ярмарками та замком 1492 року, пізніше увіковіченим у «Тарасі Бульбі» Гоголя."
  baden_desc: "Спочатку відоме як #italic Civitas Aurelia Aquensis#! після заснування римлянами, це місто почало носити назву «Баден-Баден» у ранньому Середньовіччі, давши своє ім'я маркграфам Бадена."
  erbach_desc: "Наприкінці 18 століття Ербах перетворився на великий центр різьблення по слоновій кістці після того, як граф Франциск I Ербахський, керований своєю пристрастю до старожитностей, фінансував місцеву гільдію різьбярів по слоновій кістці."
  manhattan_desc: "Спочатку населений народом ленапе, острів, який вони називали Манхатта, був куплений голландськими поселенцями за торгові товари вартістю 60 гульденів. Тут вони побудували форт, резиденцію влади міста Новий Амстердам."
  doncaster_desc: "Колись римський форт Данум, до 1337 року Донкастер став ринковим містом Йоркширу на Великій Північній дорозі, де мандрівники та торговці перевозили товари між Лондоном та північчю."
  kitchissippi_desc: "Названий на честь річки Кічі Сібі, тут народи анішинаабе полювали та торгували, доки британське поселення не розширило торгівлю лісом, а пізніше зробило його центром колоніальної адміністрації."
  saint_marceilin_desc: "Заснований в XI столітті, Сен-Марселлен був місцем засідань Ради Дофіна між 1337 і 1340 роками. Він став відомим своїм м'яким сиром з цвілою скоринкою, поданим Людовику XI у 1461 році."
  caerphilly_desc: "Будучи домом для найякіснішого вугілля в Європі, Уельські долини стали центром металургії у другій половині 18 століття."
  grenoble_desc: "Гренобль — скромне, але стратегічно важливе місто, розташоване у Французьких Альпах, що слугує столицею Дофіне. Оточене річками та горами, воно захищене стінами та домінує фортеця Бастилія. Життя зосереджене навколо собору та вузьких, звивистих вулиць, заповнених купцями, ремісниками та селянами, що привозять товари з навколишніх долин."
  kinsale_desc: "Кінсейл — невелике, але жваве портове місто на південному узбережжі Ірландії, захищене своєю глибокою природною гаванню. Рибальство та прибережна торгівля підтримували більшу частину його населення, купці обмінювали солону рибу, шкури та вовну на вино, сіль та предмети розкоші з Іберії та Франції. Вузькі вулиці скупчувалися навколо набережних, де місцеві моряки змішувалися з випадковими іноземними торговцями. Хоча Кінсейл був скромним за розміром, його гавань робила його стратегічно цінним, воротами між Ірландією та континентальною Європою."
  stockton_desc: "Стоктон — англосаксонське поселення на північному березі річки Тіс, яке було малонаселеним, доки єпископ не звільнив кріпаків містечок, що зробило його привабливим для переселення ремісників. Він став важливим ринком для експорту вовни та імпорту вина, хоча значного населення він не набув до Промислової революції."
  kunow_desc: "Важлива частина маєтків Краківського єпископства, з парафією, що існує з 1281 року, його назва, ймовірно, походить від куниці (пол. «kuna»), яка була в достатку в лісах, що покривали ці території."
  lublin_desc: "Люблін був заснований як поселення на межі XII та XIII століть, а свою грамоту отримав від Владислава «Локетка» у 1317 році. У наступні століття місто стало важливим торговим центром, а у XVI столітті пережило свій золотий вік, збагачуючись завдяки Люблінській унії та розгалуженій торгівлі, особливо зі Сходом."
  kendal_desc: "Кендал був заснований з римським фортом на березі річки Кент у 1 столітті нашої ери. Місто зростало під нормандським правлінням, отримавши ринкові права у 1189 році від короля Річарда I в обмін на гроші для його хрестових походів, що принесло місту більший добробут. Воно стало середньовічним центром торгівлі вовною, а головний замок належав родині Парр, найвідомішим членом якої є Катерина Парр, королева-консорт Генріха VIII."