  SETTING_Effects_TOOLTIP: "#T Гучність ефектів\n#!Встановлює гучність усіх звуків у ігровому світі, крім музики та інтерфейсу."
  SETTING_Ambient_Map_TOOLTIP: "#T Гучність оточення\n#!Встановлює гучність усіх звуків, що надходять з вигляду мапи."
  SETTING_Armies_TOOLTIP: "#T Гучність армій та флотів\n#!Встановлює гучність усіх армій та флотів на мапі."
  SETTING_Ambient_Map_Background_TOOLTIP: "#T Гучність оточення\n#!Встановлює гучність усього фонового оточення на мапі."
  SETTING_Ambient_Objects_TOOLTIP: "#T Гучність об'єктів оточення мапи\n#!Встановлює гучність усіх звуків, що надходять від об'єктів на мапі, таких як поселення та тварини."
  SETTING_Ambient_Panel_TOOLTIP: "#T Гучність ілюстрацій оточення\n#!Встановлює гучність усього фонового оточення, пов'язаного з панелями та ілюстраціями."
  SETTING_AUDIO_DEVICE_PROFILE: "Аудіопрофіль"
  SETTING_AUDIO_DEVICE_PROFILE_TOOLTIP: "#T $SETTING_AUDIO_DEVICE_PROFILE$\n#!Оберіть аудіопрофіль, який відповідає вашій системі або перевагам прослуховування з точки зору аудіодинаміки та міксу. Цей параметр не впливає на маршрутизацію каналів."
  SETTING_AUDIO_OPTION_OFF: "Вимк."
  SETTING_AUDIO_OPTION_OFF_TOOLTIP: "#T $SETTING_AUDIO_OPTION_OFF$\n#!Стандартний мікс з повним динамічним діапазоном. Рекомендований варіант для більшості користувачів та конфігурацій динаміків."
  SETTING_AUDIO_OPTION_HOMECINEMA: "Домашній кінотеатр"
  SETTING_AUDIO_OPTION_HOMECINEMA_TOOLTIP: "#T $SETTING_AUDIO_OPTION_HOMECINEMA$\n#!Аудіопрофіль для $SETTING_AUDIO_OPTION_HOMECINEMA$. Вирівнює динаміку та посилює басові звуки, що може допомогти акустичним системам, які використовують сабвуфер."
  SETTING_AUDIO_OPTION_HEADPHONES: "Навушники"
  SETTING_AUDIO_OPTION_HEADPHONES_TOOLTIP: "#T $SETTING_AUDIO_OPTION_HEADPHONES$\n#!Аудіопрофіль для $SETTING_AUDIO_OPTION_HEADPHONES$. Трохи вирівнює динаміку та може допомогти приборкати виражені частоти в багатьох типових конструкціях навушників."
  SETTING_AUDIO_OPTION_SPEAKERS: "Динаміки"
  SETTING_AUDIO_OPTION_SPEAKERS_TOOLTIP: "#T $SETTING_AUDIO_OPTION_SPEAKERS$\n#!Аудіопрофіль для зовнішніх $SETTING_AUDIO_OPTION_SPEAKERS$. Підсилює певні частоти та може забезпечити повніше звучання для акустичних систем без сабвуфера."
  SETTING_AUDIO_OPTION_TV: "Телевізор"
  SETTING_AUDIO_OPTION_TV_TOOLTIP: "#T $SETTING_AUDIO_OPTION_TV$\n#!Аудіопрофіль для $SETTING_AUDIO_OPTION_TV$ та менших динаміків. Може допомогти контролювати низькі частоти, які можуть перевантажувати вбудовані динаміки, та підвищує чіткість у вищих частотах."
  SETTING_AUDIO_OPTION_NIGHTMODE: "Нічний режим"
  SETTING_AUDIO_OPTION_NIGHTMODE_TOOLTIP: "#T $SETTING_AUDIO_OPTION_NIGHTMODE$\n#!Аудіопрофіль, що пом'якшує звук для нічної гри. Зменшує динамічний діапазон на всіх частотах для кращої розбірливості на низьких гучностях і трохи приглушує бас, щоб мінімізувати завади."
  SETTING_Music_Density: "Щільність музики"
  SETTING_Music_Density_TOOLTIP: "#T Налаштування щільності музики\n#!Встановлює тривалість пауз між музичними композиціями, від довгих пауз до майже безперервного відтворення. Значення 20 є поведінкою за замовчуванням."
  SETTING_DEBUG_SAVES: "Кількість автозбережень"
  SETTING_DEBUG_SAVES_TOOLTIP: "#T $SETTING_DEBUG_SAVES$#!\nМаксимальна кількість автозбережень для зберігання"
  SETTING_MAX_TICKS_AHEAD: "Максимальний випереджувальний такт"
  SETTING_MAX_TICKS_AHEAD_TOOLTIP: "#T $SETTING_MAX_TICKS_AHEAD$#!\nМаксимальна кількість тактів, перш ніж ви як хост почнете чекати, поки клієнти наздоженуть."
  SETTINGS_FILE_TRANSFER_SPEED_TOOLTIP: "#T $SETTINGS_FILE_TRANSFER_SPEED$#!\nВстановлює максимальну швидкість передачі файлів збережень гри на екрані вибору країни в багатокористувацькій грі.\n\nНижчі налаштування можуть покращити стабільність мережі при приєднанні до багатокористувацьких ігор, але негативно впливають на час завантаження в багатокористувацькій грі."
