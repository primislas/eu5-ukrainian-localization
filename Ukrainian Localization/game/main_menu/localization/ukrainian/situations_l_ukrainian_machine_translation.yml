  fall_of_delhi: "Падіння Делі"
  fall_of_delhi_desc: "Століття надмірного розширення та руйнування центральної влади зашкодили правлінню та репутації могутнього [GetCountry('DLH').GetName]. За їхніми кордонами чатують стерв'ятники та вороги, готові вдарити будь-якої миті. Величний [GetCountry('DLH').GetFlavorRank] їхніх предків буде поставлений на коліна в одну мить, якщо вони не зможуть захистити свій народ від внутрішніх і зовнішніх загроз."
  fall_of_delhi_info: "Під час Падіння [GetCountry('DLH').GetNameWithNoTooltip] країни по всій $india$ намагатимуться вирвати контроль над своїми регіонами у могутнього [GetCountry('DLH').GetLongName]. Якщо їм це вдасться, колись могутній [GetCountry('DLH').GetFlavorRank], безсумнівно, розколеться, ставши лише сходинкою для наступної великої держави..."
