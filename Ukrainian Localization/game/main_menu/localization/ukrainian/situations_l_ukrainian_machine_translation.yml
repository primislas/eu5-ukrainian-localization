  gain_leadership_during_situation_tt: "Ми здобудемо лідерство #Y опозиції#! проти [GetCountry('DLH').GetNameWithNoTooltip] під час [GetSituationByKey('fall_of_delhi').GetName] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]"
  opposition_share_of_power_1_tt: "Противники [GetCountry('DLH').GetName] мають щонайменше 100% [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e]"
  delhi_share_of_power_1_tt: "[GetCountry('DLH').GetName] має щонайменше 100% [Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e]"
  dissolution_of_delhi_started_tt: "[Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] [ShowDisasterName('dissolution_of_delhi')] розпочався"
  until_the_end_of_the_situation_desc: "До кінця ситуації"
  fall_of_delhi_plea_neighbors: "Надіслати послів"
  fall_of_delhi_plea_neighbors_desc: "Відправлення послів, що несуть печатку нашого могутнього [GetCountry('DLH').GetFlavorRank] з найвищим загоном охорони, надішле пряме повідомлення про силу та владу всім тим, хто прагне поглинути наші території."
  fall_of_delhi_appoint_governors: "Призначити губернаторів"
  fall_of_delhi_appoint_governors_desc: "Наш [GetCountry('DLH').GetFlavorRank] величезний, і тому ми гостро потребуємо здібних і вірних адміністраторів шляхетного походження, щоб допомогти нашим провінціям досягти процвітання та уникнути розбрату."
  fall_of_delhi_reaffirm_vassal_relations: "Вимагати данину"
  fall_of_delhi_reaffirm_vassal_relations_desc: "Наше становище та багатство можуть бути під загрозою, але ми повинні нагадати тим, хто схиляє перед нами голову, хто є їхнім сюзереном. Вимагаючи данину та проводячи делегації їхніх правителів, ми підтвердимо та зміцнимо відносини між нами та нашими підлеглими васалами."
  fall_of_delhi_appease_the_nobility: "Задобрити шляхту"
  fall_of_delhi_appease_the_nobility_desc: "Силу [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] не слід недооцінювати, коли йдеться про забезпечення успіху та процвітання нашого королівства. Будучи творцями королів та захисниками королівського права, вони володіють значною владою в нашому [GetCountry('DLH').GetFlavorRank]. Для нашої власної вигоди ми повинні швидко забезпечити їхню вірність, щоб не стати жертвою їхніх прагнень до влади..."
  fall_of_delhi_join_opposers: "Протистояти [GetCountry('DLH').GetNameWithNoTooltip]"
  fall_of_delhi_join_opposers_desc: "[GetCountry('DLH').GetName] стоїть перед крахом під тиском усіх підкорених народів, які зневажають їхнє правління! Ми повинні осідлати мінливі вітри змін і скористатися цим занепадницьким [GetCountry('DLH').GetFlavorRank] як каменем у будівництві власного фундаменту, золотого місця в історії..."
  fall_of_delhi_join_delhi: "Підтримати [GetCountry('DLH').GetNameWithNoTooltip]"
  fall_of_delhi_join_delhi_desc: "Наші інтереси полягають у підтримці статус-кво. Незважаючи на те, що їхня ситуація дещо скрутна, ми вирішуємо підтримувати верховенство права під [GetCountry('DLH').GetAdjectiveWithNoTooltip] [GetCountry('DLH').GetFlavorRank], доки це відповідає нашим планам."
  strengthen_neighbor_relations: "Зміцнити відносини з сусідами"
  strengthen_neighbor_relations_desc: "Ми повинні задобрити багатьох сусідів, що оточують наш [GetCountry('DLH').GetFlavorRank], намагаючись придушити їхні експансіоністські тенденції за наш рахунок!"
  select_area: "Вибрати [Concept('area', 'CONCEPT_PLACEHOLDER')|e]"
  fall_of_delhi_resolution: "Падіння Делі"
  fall_of_delhi_resolution_desc: "$fall_of_delhi_desc$"
