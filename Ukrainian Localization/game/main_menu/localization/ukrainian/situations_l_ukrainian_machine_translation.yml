  nanbokuchou: "Нанбокутьо Дзідай"
  nanbokuchou_desc: "Після розпуску Камакурського сьогунату імперське правління було відновлено під керівництвом [GetCharacter('jap_go_daigo_tenno').GetName] за допомогою [GetCharacter('jap_ashikaga_takauji').GetName] у так званій Реставрації Кенму. Однак два колишні союзники швидко стали заклятими суперниками. [GetCharacter('jap_go_daigo_tenno').GetNameWithNoTooltip] хотів відновити верховенство імперського правління, як це було в період Хейан, що викликало у [GetCharacter('jap_go_daigo_tenno').GetHerHim] невдоволення багатьох представників військового класу, включаючи [GetCharacter('jap_ashikaga_takauji').GetNameWithNoTooltip]. Останнього витіснили зі столиці та змусили втекти на Кюсю, але він зміг повернутися до [ShowLocationName('kyoto')] у 1336 році та захопити її, заснувавши новий [GetUniqueInternationalOrganization('japanese_shogunate').GetName] під керівництвом [GetCharacter('jap_ashikaga_takauji').GetHerHim] та звівши на престол нового імператора. У січні 1337 року [GetCharacter('jap_go_daigo_tenno').GetNameWithNoTooltip] втік зі столиці та заснував [GetCharacter('jap_go_daigo_tenno').GetHerHis] власний двір у [ShowLocationName('yoshino')], розпочавши період, відомий як $nanbokuchou$, Північний та Південний двори."
  there_is_no_japanese_emperor_tt: "#Y 1#! або менше [Concept('members', 'CONCEPT_PLACEHOLDER')|e] у [GetUniqueInternationalOrganization('japanese_shogunate').GetName] мають [ShowSpecialStatusName('japanese_emperor')] [Concept('special_status', 'CONCEPT_PLACEHOLDER')|e]"
