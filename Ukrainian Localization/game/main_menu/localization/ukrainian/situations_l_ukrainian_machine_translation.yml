  rise_of_the_ottomans_victory_conditions: "[SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('strongest_beylik_variable').GetCountry.GetNameWithNoTooltip] володіє [SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('strongest_beylik_variable').GetCountry.GetOwnedLocationCount] загалом [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] та [SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('strongest_beylik_variable').GetCountry.GetTownsAndCities] [Concept('towns_or_cities', 'CONCEPT_PLACEHOLDER')|e].\n\nУмови перемоги:\n[SituationView.GetTooltipInformation('rise_of_the_ottomans_end_trigger_beylik_victory')]\n\nНайсильніший бейлик розраховується на основі його:\n[Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('income', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('regular_regiments', 'CONCEPT_PLACEHOLDER')|e]"
  rise_of_the_ottomans: "Піднесення турків"
  rise_of_the_ottomans_desc: "Керовані потужним поєднанням амбіцій, військової майстерності та стратегічного бачення, багато [ShowCultureName('turkish_culture')] бейликів проклали власні шляхи крізь роздроблені володіння [ShowRegionName('anatolia_region')]. Їхнє кочове походження поєдналося з витонченістю осілих суспільств, створивши грізне поєднання військової могутності та адміністративної кмітливості.\n\nКоли регіональні князівства лежали розділені та вразливі, найгрізніші з них скористалися нагодою об'єднати свої лави під єдиним прапором. Харизматичні лідери, такі як [GetCharacter('tur_osman').GetName], засновник [GetCountry('TUR').GetName], запалили полум'я натхнення, яке яскраво горітиме протягом століть.\n\nЗ кожною перемогою ці бейлики набирають обертів, перетворюючись на силу, з якою слід рахуватися. Завоювання життєво важливих міст і містечок по всьому регіону віщувало їхнє невблаганне піднесення."
