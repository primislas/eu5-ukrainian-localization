  CARDINAL_SUPPORT_TOOLTIP: "#T Підтримка кардиналів#!\nПід час цієї ситуації кожна країна, що володіє [ShowBuildingTypeName('seat_of_cardinal')], зможе підтримати будь-якого кандидата. Країни голосуватимуть залежно від їхніх дипломатичних відносин з кандидатами. [SituationView.GetActiveSituation.GetName] закінчиться, коли одна сторона накопичить достатньо прогресу, щоб скликати остаточну раду."
