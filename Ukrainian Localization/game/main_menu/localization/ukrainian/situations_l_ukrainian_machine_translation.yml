  guelphs_and_ghibellines_guelphs_stalemate_trigger_tt: "Поточна [Concept('age', 'CONCEPT_PLACEHOLDER')|e] — [ShowAgeName('age_3_discovery')] або пізніша"
  the_revolution: "Народне повстання"
  the_revolution_desc: "Нерівність у багатстві, зниження рівня життя та зростання грамотності призвели до підвищення індивідуальної свідомості. Постійна експлуатація нижчих класів шляхтою, разом із безконтрольною владою правлячого класу, нарешті спонукала як наших міщан, так і селян вимагати зміни уряду. Цей новий рух кидає виклик усталеному порядку суспільства, який, скільки ми пам'ятаємо, бачив, як домінуючий вищий клас пригнічував тих, хто був нижче."
  institute_governmental_purges: "Провести урядові чистки"
  institute_governmental_purges_desc: "Ми нікому не можемо довіряти! Шпигуни та головорізи ховаються за кожним кутом, а ті, кого ми колись вважали надійними, тепер прагнуть знищити нас зсередини. Щоб безпечно провести наш народ через цю кризу, голови повинні полетіти!"
  suppress_foreign_revolutionaries: "Придушити іноземних революціонерів"
  suppress_foreign_revolutionaries_desc: "Ми не можемо дозволити цій новій хвилі думок та антиправлячих настроїв охопити уми селян за кордоном, інакше ми ризикуємо, що вони повалять і наш власний уряд."
  no_country_available: "@trigger_no! Немає [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що відповідає критеріям"
  assist_foreign_revolutionaries: "Допомогти іноземним революціонерам"
  assist_foreign_revolutionaries_desc: "Ті за кордоном, хто прагне звільнитися від гніту, є нашими братами, замкненими в тій самій боротьбі. Ми повинні їх підтримати!"
  elevate_local_aristocracy: "Піднести місцеву аристократію"
  elevate_local_aristocracy_desc: "Неосвічені маси не мають здібностей до судження. Очевидно, що їхні голоси повинні бути почуті, оскільки вони наближають нас до межі руйнування. Щоб підтвердити нашу перевагу над цими меншими людьми, ми придушимо їхній подих незалежності та запобігнемо розпаду тканини нашого суспільства."
  demote_local_aristocracy: "Понизити місцеву аристократію"
  demote_local_aristocracy_desc: "Це великий день для кожного члена [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')], хто любить тріскати батогом і збагачуватися за рахунок праці селян — тепер вони самі стануть [SCOPE.sCountry('actor').GetGovernment.GetEstateName('peasants_estate')]!"
  every_noble_in_target_province_suffers_severe_penalty_tt: "Наші [ShowEstateTypeName('nobles_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] зазнають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_noble_in_target_province_gains_mild_satisfaction_tt: "Наші [ShowEstateTypeName('nobles_estate')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [target_province.GetName] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  reestablish_the_parliament: "Відновити Парламент"
  reestablish_the_parliament_desc: "Наш народ прагне представництва."
  any_country_in_spread_of_revolution_disaster_tt: "Жодна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] наразі не залучена до [ShowDisasterName('revolution_disaster')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  institute_governmental_purges_tt: "[Concept('character', 'CONCEPT_PLACEHOLDER')|e] нашого вибору буде страчено"
  suppress_foreign_revolutionaries_tt: "Ми отримаємо [ShowCasusBelliName('crush_the_revolution_cb')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти революційної країни нашого вибору"
  assist_foreign_revolutionaries_tt: "Ми допоможемо революційній країні нашого вибору, або прямою інтервенцією, або наданням військових підкріплень"
  elevate_local_aristocracy_tt: "Члени [ShowEstateTypeName('nobles_estate')], вірні нашій справі, будуть підвищені в [Concept('province', 'CONCEPT_PLACEHOLDER')|e] нашого вибору, допомагаючи нам підтримувати статус-кво"
  demote_local_aristocracy_tt: "Понизивши [ShowEstateTypeName('nobles_estate')], ми зміцнимо справу народу та сприятимемо революційним ідеалам"
  according_to_our_crown_power_we_suffer_tt: "Залежно від нашої [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e], ми зазнаємо:"
  estate_satisfaction_gain_scales_with_estate_power_tt: "Наступне масштабується з [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] кожного [Concept('estate', 'CONCEPT_PLACEHOLDER')|e]:"
  spread_revolutionary_sentiment: "Поширення Революційних Настроїв"
  spread_revolutionary_sentiment_desc: "Боротьба простолюду за розрив своїх кайданів є довгою та важкою. Часто ми мусимо дивитися за межі наших кордонів і переконувати іноземні держави прийняти наші ідеали. Це нелегко, але все це служить вищій меті!"
  revolution_in_selected_country_tt: "Революційний [Concept('rebel', 'CONCEPT_PLACEHOLDER')|e] рух буде спровоковано у [target_country.GetName]. Однак, якщо такий вже існує, ми натомість посилимо прогрес і силу цього руху"
  revolution_in_country_tt: "Революційний [Concept('rebel', 'CONCEPT_PLACEHOLDER')|e] рух буде спровоковано в обраній [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Однак, якщо такий вже існує, ми натомість посилимо прогрес і силу цього руху"
  LEADER_OF_THE_REVOLUTION_TOOLTIP: "Це [Concept('revolutionary_target', 'CONCEPT_PLACEHOLDER')|e]"
  WRESTLING_WITH_THE_REVOLUTION_TOOLTIP: "Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] наразі переживає [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] [ShowDisasterName('revolution_disaster')]"
  the_revolution_situation_tips_header: "Поради для $the_revolution$"
  AT_WAR_WITH_REVOLUTIONARIES_TT: "Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] наразі занурена у [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e] [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e]"
  IS_REVOLUTIONARY_TT: "Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] є [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e]"
  FIGHTING_AGAINST_REVOLUTIONARIES_TT: "Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] воює проти [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e], використовуючи [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] [ShowCasusBelliName('crush_the_revolution_cb')]"
  FIGHTING_AGAINST_COUNTER_REVOLUTIONARIES_TT: "Ця [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] бореться за захист ідеалів [ShowSituationName('the_revolution')]"
  request_antipiracy_policy_tt: "Ми звернемося і спробуємо переконати їх змінити їхній закон"
  choose_an_uncolonized_location: "Оберіть незаселену [Concept('location', 'CONCEPT_PLACEHOLDER')|e] для розміщення нашої штаб-квартири."
  create_allied_pirate_nation: "Створити Піратську Державу-Васала"
  create_allied_pirate_nation_desc: "Видавши каперський патент, надавши відповідне місце для штаб-квартири та запропонувавши золото для залучення перших членів екіпажу, ми створимо лігво піратів та головорізів, які значно ускладнять життя ворожим кораблям, водночас забезпечуючи безпечний прохід нашим."
  create_allied_pirate_nation_tt: "[Concept('navy_based', 'CONCEPT_PLACEHOLDER')|e] [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] з'явиться у визначеній [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Ми матимемо можливість грати за них"
  request_antipiracy_policy: "Запит Антипіратської Політики"
  request_antipiracy_policy_desc: "Лихо піратства неможливо викорінити, бо деякі прокляті нації мають нахабство відкрито заохочувати та фінансувати цих розбійників! Ми мусимо переконати їх виправити цю жахливу помилку силою нашої дипломатії."
  abandon_piracy_action: "Відмовитися від Піратства"
  abandon_piracy_action_desc: "Ми усвідомили, що існують кращі способи заробляти гроші. Якщо ми захистимо наших простолюдинів і торговців від піратів та розбійників, вони просто дозволять нам забрати їхню продукцію та золото без необхідності боротися за це. Якщо ми потім інвестуємо ці трофеї в інфраструктуру та підкріплення, ми зможемо експоненціально примножити наші прибутки. Ми станемо багатшими, ніж будь-коли уявляли!"
  attract_sailors: "Залучити моряків"
  attract_sailors_desc: "Демонструючи наше багатство в сусідніх портових тавернах і обіцяючи краще ставлення та платню для наших моряків, ми можемо легко залучити багато незадоволених моряків до наших лав. Можливо, вони не найдосвідченіші чи найпрофесійніші моряки, але їхня велика кількість є якістю сама по собі."
  choose_a_region: "Виберіть регіон"
  no_regions_available: "$NO_POSSIBLE_REGIONS$"
  migrate_to_new_waters: "Міграція до нових вод"
  migrate_to_new_waters_desc: "У світі є багатші та прибутковіші береги, і настав час нам їх відкрити. Щоб краще знайти ці далекі скарби, ми можемо перенести нашу штаб-квартиру туди, куди може дістатися наш флот."
  migrate_to_new_waters_tt: "Ми шукатимемо щастя, мігруючи до далекої [Concept('coastal', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e]"
  send_diplomat: "Надіслати дипломата"
  golden_age_of_piracy: "Золота доба піратства"
  golden_age_of_piracy_desc: "Багатство Нового Світу привабило до своїх вод не лише великі імперії — нескінченна хвиля розбійників та незадоволених моряків також вирушила в путь, більш ніж охоче слідуючи поклику пригод, скарбів та свободи... навіть якщо вони ризикують закінчити свої ескапади, бовтаючись у петлі."
  GAOP_PRIVATEER_TITLE: "Капери [SituationView.GetPlayer.GetNameWithNoTooltip]"
