  treaty_of_tordesillas_desc: "Цей договір було підписано в [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetName] між [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetLongName] та [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetLongName]. Він встановлює набір правил та параметрів, що дозволяють двом державам претендувати на виключні права на колонізацію та експлуатацію будь-яких нововідкритих земель на континенті [ShowContinentName('america')]."
  claim_reason_treaty_of_tordesillas: "Заявлено згідно з $treaty_of_tordesillas$."
  treaty_of_tordesillas.tt.location_is_east_of_line: "[THIS.GetLocation.GetName] знаходиться на схід від уявної лінії, що проходить через [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_line_location').GetLocation.GetName], яку $treaty_of_tordesillas$ використовуватиме для поділу світу.\n\nПісля ратифікації договору ця [Concept('location', 'CONCEPT_PLACEHOLDER')|e] буде заявлена [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetLongName]"
  treaty_of_tordesillas.tt.location_is_west_of_line: "[THIS.GetLocation.GetName] знаходиться на захід від уявної лінії, що проходить через [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_line_location').GetLocation.GetName], яку $treaty_of_tordesillas$ використовуватиме для поділу світу.\n\nПісля ратифікації договору ця [Concept('location', 'CONCEPT_PLACEHOLDER')|e] буде заявлена [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetLongName]"
