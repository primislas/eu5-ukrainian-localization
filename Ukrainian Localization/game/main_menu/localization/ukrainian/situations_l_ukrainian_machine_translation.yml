  fall_of_delhi_resolution_specific_desc: "$fall_of_delhi_resolution_desc$"
  vote_in_fall_of_delhi_resolution: "Голосувати за $fall_of_delhi_resolution$"
  vote_in_fall_of_delhi_resolution_desc: "Вирішити, кого ми підтримаємо в $fall_of_delhi_resolution$."
  fall_of_delhi_side_with_country: "Підтримати [SCOPE.sCountry('target').GetName]"
  fall_of_delhi_become_neutral: "Залишитися нейтральним"
  red_turban_rebellions: "Повстання Червоних Тюрбанів"
  red_turban_rebellions_desc: "[ShowCultureGroupName('chinese_group')] повстають проти своїх [GetCountry('CHI').GetCulture.GetName] володарів. Повстанці оголосили про створення своїх незалежних держав, вкинувши всю [GetCountry('CHI').GetName] у громадянську війну, що загрожує поглинути династію $YUA$..."
  red_turban_rebellions_strongest_red_turban_rebel_tt: "[GetInternationalOrganizationType('red_turban_rebels').GetName] мають лідера, якому потрібно буде володіти #Y 65.00%#! [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], що є частиною [GetUniqueInternationalOrganization('middle_kingdom').GetName]"
  RTR_EMPEROR: "[THIS.GetLocation.GetOwner.GetName], [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle] [GetUniqueInternationalOrganization('middle_kingdom').GetName]"
  RTR_STRONGEST_REBEL: "[THIS.GetLocation.GetOwner.GetName], Найсильніший повстанський воєначальник ($rtr_yuan_allegiance$: #R [THIS.GetLocation.GetOwner.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!)"
  RTR_LOYALIST: "[THIS.GetLocation.GetOwner.GetName], Лояліст до [GetCountry('CHI').GetName] ($rtr_yuan_allegiance$: #G [THIS.GetLocation.GetOwner.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!)"
  RTR_REBEL: "[THIS.GetLocation.GetOwner.GetName], Повстанець проти [GetCountry('CHI').GetName] ($rtr_yuan_allegiance$: #R [THIS.GetLocation.GetOwner.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!)"
  RTR_NEUTRAL: "Автономний [THIS.GetLocation.GetOwner.GetName], але нейтральний до [GetCountry('CHI').GetName] ($rtr_yuan_allegiance$: #Y [THIS.GetLocation.GetOwner.MakeScope.GetVariable('rtr_yuan_allegiance').GetValue]#!)"
  RTR_LOYALISTS_TITLE: "Лоялісти [GetCountry('CHI').GetNameWithNoTooltip]"
  RTR_NEUTRALS_TITLE: "Нейтральний"
