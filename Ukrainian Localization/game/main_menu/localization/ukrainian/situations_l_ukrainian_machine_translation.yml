  WAR_OF_RELIGIONS_TOOLTIP: "Щоб закінчити [SituationView.GetActiveSituation.GetSituation.GetName], або [GetUniqueInternationalOrganization('protestant_union').GetName], або [GetUniqueInternationalOrganization('catholic_league').GetName] повинні заявити про гегемонію в [GetUniqueInternationalOrganization('hre').GetName], нав'язавши свою [ShowPeaceTreatyTypeName('religious_supremacy')] через [ShowCasusBelliName('cb_religious_superiority')] [Concept('war', 'CONCEPT_PLACEHOLDER')|e].\n\nНатомість #Y Вестфальський мир#! досягається, коли #Y 80%#! всіх учасників бажають [Concept('peace', 'CONCEPT_PLACEHOLDER')|e]"
  colonial_revolution: "Колоніальна революція"
  colonial_revolution_desc: "Ідеї [ShowInstitutionName('enlightenment')] знайшли вдячну аудиторію в колоніальних володіннях по всьому світу. Правляча еліта в колоніях, позбавлена політичної участі, була натхненна ідеалами свободи, рівності та представництва. Природно, ці ідеї конфліктують з їхнім поточним статусом підданих своїх колоніальних володарів, що існують лише для задоволення вимог своїх панів.\n\nЧи то через політичний тиск, чи через відкрите повстання, буде важко підтримувати порядок у колоніальному ландшафті протягом тривалого часу."
