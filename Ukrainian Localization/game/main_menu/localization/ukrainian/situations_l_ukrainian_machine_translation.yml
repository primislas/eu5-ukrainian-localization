  wont_join_vs_other_appanages_with_granted_autonomy_to_expand_modifier_during_hyw_tt: "Цей [Concept('subject_type', 'CONCEPT_PLACEHOLDER')|e] не приєднається автоматично до [Concept('wars', 'CONCEPT_PLACEHOLDER')|e] проти [ShowSubjectTypeName('appanage')], який отримав [ShowModifier('granted_autonomy_to_expand_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] від [ShowGenericActionName('demand_autonomy')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e] під час [ShowSituationName('hundred_years_war')]"
