  betray_our_allegiance: "Зрадити нашу вірність"
  betray_our_allegiance_desc: "Припливи війни змінюються. Хоча ми, можливо, присягнули мечем на допомогу нашим союзникам під час поточного конфлікту, ми повинні примиритися з реальністю та обрати інший курс дипломатії, намагаючись вберегти наш народ від жахів війни та підкорення."
  eng_leads_one_side_france_another_tt: "Одну сторону [Concept('war', 'CONCEPT_PLACEHOLDER')|e] очолює [GetCountry('ENG').GetName], тоді як іншу очолює [GetCountry('FRA').GetName]"
  choose_war_tt: "Вибрати [Concept('war', 'CONCEPT_PLACEHOLDER')|e]"
  procure_core_claim: "Заявити претензію на ядро"
  procure_core_claim_desc: "Ми більше не можемо ігнорувати нашу законну претензію на певні землі. Заявляючи право власності на те, що по праву належить нам, ми закладаємо основу для війни, щоб повернути наші втрачені території."
  request_war_entry: "Запросити вступ у війну"
  request_war_entry_desc: "Оскільки цей гіркий конфлікт триває, стає зрозуміло, що ми не можемо перемогти самі. Ми повинні звернутися до сусідньої держави, закликаючи її взятися за зброю та приєднатися до нашої справи у боротьбі за верховенство."
  hyw_sign_truce: "Підписати перемир'я"
  hyw_sign_truce_desc: "Хоча гордість кличе до перемоги, розсудливість може вимагати стриманості. Настав час шукати умови з нашим ворогом, хоча б для того, щоб перевести подих і підготуватися до того, що чекає попереду."
