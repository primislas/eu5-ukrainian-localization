  RELATIVE_MILITARY_STRENGTH_YUA_TT_TITLE: "[GetCountry('CHI').GetAdjectiveWithNoTooltip] Військова сила"
  RELATIVE_MILITARY_STRENGTH_YUA_TT_TEXT: "[GetCountry('CHI').GetAdjective] Відносна військова міць до [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetName] становить: [GetCountry('CHI').GetRelativeMilitaryStrength(GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.Self)|V2%]"
  RELATIVE_MILITARY_STRENGTH_YUA_TT_TEXT_DEFAULT: "[GetCountry('CHI').GetAdjective] Відносна військова міць"
  RELATIVE_MILITARY_STRENGTH_YUA_TT_ARMY_STRENGTH: "[GetCountry('CHI').GetAdjectiveWithNoTooltip] Розмір [Concept('army', 'CONCEPT_PLACEHOLDER')|e]: [GetCountry('CHI').GetArmySize]\n[GetCountry('CHI').GetNameWithNoTooltip] Потенційний [Concept('levy', 'CONCEPT_PLACEHOLDER')|e]: [GetCountry('CHI').GetArmyLevyPower]"
  RELATIVE_MILITARY_STRENGTH_REB_TT_TITLE: "[GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetAdjective] Військова міць"
  RELATIVE_MILITARY_STRENGTH_REB_TT_TEXT: "[GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetAdjective] Відносна військова міць до [GetCountry('CHI').GetName] становить: [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetRelativeMilitaryStrength(GetCountry('CHI').Self)|V2%]"
  REB_STR_DESC: "[GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetAdjectiveWithNoTooltip] Розмір [Concept('army', 'CONCEPT_PLACEHOLDER')|e]: [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetArmySize]\n[GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetAdjectiveWithNoTooltip] Потенційний [Concept('levy', 'CONCEPT_PLACEHOLDER')|e]: [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetArmyLevyPower]"
  RTR_SITUATION_TITLE: "[GetCountry('CHI').GetAdjectiveWithNoTooltip] Вірність"
  RTR_SITUATION_TOOLTIP: "Кожна країна, звільнена під час цієї ситуації, має заздалегідь визначене значення #Y $rtr_yuan_allegiance$#!, яке відображає її лояльність до [GetCountry('CHI').GetName]. Якщо значення нижче #R 0.00%#!, ці держави приєднаються до [GetInternationalOrganizationType('red_turban_rebels').GetName]. Воюючі держави, які мають понад #Y 0.00%#! $rtr_yuan_allegiance$, будуть нейтральними, тоді як ті, що мають понад #G 50.00%#!, вважаються лояльними"
  RTR_HOLDER_OF_THE_MIDDLE_KINGDOM: "Велике Серединне Царство"
  RTR_STRONGEST_REBEL_TITLE: "Найбільша загроза Червоних пов'язок"
  RTR_GRAPH_TITLE_TT: "Могутність країни"
  RTR_GRAPH_TT: "[Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e]: [Country.GetGreatPowerScore|Y]"
  RTR_GRAPH_FLAVOR_CHINA_TT: "#italic [GetCountry('CHI').GetName] завжди є антагоністом [GetInternationalOrganizationType('red_turban_rebels').GetName]#!"
  RTR_GRAPH_FLAVOR_REBEL_TT: "#italic Найсильніший з [GetUniqueInternationalOrganization('red_turban_rebels').GetName] визначається за [great_power_score] членів щомісяця. Той, хто має найвищий бал, автоматично стає воєначальником#!"
  rtr_grant_titles: "Надати титули"
  rtr_grant_titles_desc: "#flavor Обіцянка влади та впливу при небесному дворі спокусила б будь-кого. Надаючи особливі титули та привілеї повстанським фракціям, ми могли б переконати їх стати нашими лоялістами або принаймні змусити їх прийняти тимчасове перемир'я...#!\n\n[Concept('actor.GetName] витратить #R 5#! легітимності та передасть частину свого [income', 'CONCEPT_PLACEHOLDER')|e], щоб підвищити $rtr_yuan_allegiance$ цільової країни на #G +15#!"
  rtr_grant_titles_select_country: "Вибрати [ShowGovernmentReformNameWithNoTooltip('warring_state')]"
  rtr_negotiate_with_rebels: "Переговори з повстанцями"
  rtr_negotiate_with_rebels_desc: "#flavor Не всі повстанці є амбітними воєначальниками, які прагнуть нашого трону. Ті, хто просто бажає мирного життя відносної автономії, складають більшість нашого бунтівного населення. Шляхом переговорів та інвестування в рішення їхніх проблем ми потенційно можемо пом'якшити їхню бунтівну натуру.#!\n\n[Concept('actor.GetName] зменшить прогрес однієї [rebel', 'CONCEPT_PLACEHOLDER')|e] фракції на #G -30.00%#!"
  rtr_negotiate_with_rebels_select_rebels: "Вибрати повстанську фракцію"
  rtr_negotiate_with_rebels_tt: "Цільові [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] втрачають [ShowNamedValue('rebel_progress_severe_bonus')|+=2%] прогресу"
  rtr_call_loyalists_to_arms: "Закликати лоялістів до зброї"
  rtr_call_loyalists_to_arms_desc: "#flavor Землі [GetCountry('CHI').GetName] палають, оскільки мародерствуючі воєначальники просочують кров'ю саму землю, що їх годує. Ми повинні закликати всіх, хто вважає себе вірним Небесному Трону, взятися за зброю!#!\n\nВибрана країна [ShowGovernmentReformName('warring_state')], яка є #G лояльною#! (рівна або більше [ShowNamedValue('RTR_IS_LOYAL_VALUE')|+=2] $rtr_yuan_allegiance$) до [actor.GetName], приєднається до війн [ShowCasusBelliName('cb_red_turban_rebellions')] на нашому боці."
  rtr_call_loyalists_to_arms_tt: "Кожен член [GetInternationalOrganizationType('red_turban_rebels').GetName] наразі воює з [actor.GetName]"
  rtr_call_loyalists_to_arms_select_country: "Вибрати лояліста [GetCountry('CHI').GetNameWithNoTooltip]"
  rtr_call_loyalists_to_arms_ct: "Лояліст приєднується до кожної активної [ShowCasusBelliName('cb_red_turban_rebellions')] [Concept('war', 'CONCEPT_PLACEHOLDER')|e] на боці [actor.GetName] проти членів [GetInternationalOrganizationType('red_turban_rebels').GetName]"
  rtr_call_loyalists_to_arms_at: "Лояліст втрачає #R 5#! $rtr_yuan_allegiance$"
  rtr_appease_the_court: "Умиротворити Двір"
  rtr_appease_the_court_desc: "#flavor Поки сільська місцевість охоплена відкритим повстанням, зловмисні фракції в нашому власному дворі шукають підтримки воєначальників. Їхнє умиротворення може забезпечити нам їхню вкрай необхідну лояльність у ці скрутні часи...#!\n"
  rtr_rekindle_revolt: "Розпалити Повстання"
  rtr_rekindle_revolt_desc: "#flavor Хоча ми уклали перемир'я з нашими тиранічними колишніми володарями, наші амбіції прагнуть знову боротися за визволення китайців!#!\n"
  rtr_rein_in_area: "Приборкати Територію"
  rtr_rein_in_area_desc: "#flavor Китай — це густонаселена земля. Приборкуючи території, які ми завойовуємо у наших ворогів, ми можемо забезпечити лояльність місцевих жителів, забезпечуючи їхню підтримку в ці жахливі часи повстання.#!\n\n[actor.GetName] додає [ShowModifier('rtr_rein_in_area_modifier')] до завойованої [Concept('area', 'CONCEPT_PLACEHOLDER')|e], і її місцевості стають [Concept('integrated', 'CONCEPT_PLACEHOLDER')|e]."
  rtr_rein_in_area_select_area_title: "Вибрати Територію для Приборкання"
  rtr_rein_in_area_no_areas: "@trigger_no! Немає дійсних [Concept('areas', 'CONCEPT_PLACEHOLDER')|e] доступних, які мають не-[Concept('core', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] і не мають [ShowModifier('rtr_rein_in_area_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] активного."
  rtr_rein_in_area_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] стає [Concept('integrated', 'CONCEPT_PLACEHOLDER')|e] і отримує [ShowModifier('rtr_rein_in_area_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 10#! років"
  rtr_rein_in_area_at: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у цільовій [Concept('area', 'CONCEPT_PLACEHOLDER')|e] стає [Concept('integrated', 'CONCEPT_PLACEHOLDER')|e] і отримує [ShowModifier('rtr_rein_in_area_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 10#! років"
  rtr_declare_war_for_regional_supremacy: "Оголосити Війну за Регіональне Верховенство"
  rtr_declare_war_for_regional_supremacy_desc: "#flavor $red_turban_rebellions$ — це не лише повстання проти гнітючої поточної династії, але й боротьба за владу за сам Небесний Трон. Ми не повинні дозволити жодному з цих претендентів накопичити достатньо влади, щоб вимагати Мандат для себе!#!\n\n[actor.GetName] оголошує [ShowCasusBelliName('cb_red_turban_rebellions_against_other_rebels')] проти цільової [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  rtr_declare_war_for_regional_supremacy_select_title: "Вибрати [ShowGovernmentReformNameWithNoTooltip('warring_state')]"
  rtr_declare_war_for_regional_supremacy_no_countries: "@trigger_no! Немає дійсних [ShowGovernmentReformNameWithNoTooltip('warring_state')] доступних, які не є нашим [Concept('ally', 'CONCEPT_PLACEHOLDER')|e] ані [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] і НЕ мають [Concept('truce', 'CONCEPT_PLACEHOLDER')|e] з нами."
  rtr_support_faction: "Підтримати Фракцію"
  rtr_support_faction_desc: "#flavor Землі [GetCountry('CHI').GetName] горять під натиском повстанців, які повстали проти свого [GetCountry('CHI').GetCulture.GetName] володаря. Наші внески можуть схилити шальки терезів на користь будь-якої сторони.#!\n\nПередати #Y 1 year#! вартості [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] цільовій країні [ShowSituationName('red_turban_rebellions')] в обмін на [ShowBiasValue('opinion_rtr_supported_side')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e]"
  rtr_declare_independence: "Оголосити Незалежність"
  rtr_declare_independence_desc: "#flavor [GetCountry('CHI').GetLongName] стикається з однією з найсерйозніших криз, які вона коли-небудь знала. Хоча це трагедія для [GetCountry('CHI').GetGovernment.GetRulerOrRegent.GetName], це чудова нагода для нас розірвати кайдани, що зв'язують нас із [GetCountry('CHI').GetCulture.GetName] володарем.#!"
  rtr_join_chinese_defense: "Приєднатися до [GetCountry('CHI').GetAdjectiveWithNoTooltip] Оборони"
  rtr_join_chinese_defense_desc: "#flavor Хоча [ShowSituationName('red_turban_rebellions')] може бути нагодою для нас відірватися від [GetCountry('CHI').GetLongName], саме їхня сила та наш дипломатичний зв'язок захищають нас від зовнішніх загроз. Таким чином, ми повинні прагнути підтримати [GetCountry('CHI').GetFlavorRank] у придушенні повстань.#!"
  italian_wars: "Італійські Війни"
  italian_wars_desc: "Понад століття [ShowRegionName('italy_region')] процвітала завдяки своєму вигідному положенню в [ShowContinentName('europe')]. Процвітаюча зовнішня торгівля, надмірне багатство та розквітаюча культура [ShowInstitutionName('renaissance')] відкрили золоту добу в багатьох частинах півострова.\n\nОднак це процвітання привернуло увагу зовнішніх сил, які жадають [ShowRegionNameWithNoTooltip('italy_region')] багатств і прагнуть узурпувати контроль над її меншими незалежними державами. У відповідь найсильніші держави в [ShowRegionNameWithNoTooltip('italy_region')] об'єдналися в ліги, намагаючись відбити загарбників..."
