  great_pestilence: "Велика моровиця"
  great_pestilence_desc: "Жахливі вісті доходять до нас з-за кордону. Лихо та моровиця охоплюють землі, і смерть крокує з ними, очевидно, принесена таємничими бородатими чужинцями. Ця моровиця не є тим, про що чули наші старійшини, і жодні відповіді у спогадах наших предків не зможуть допомогти нам протистояти цій катастрофі, якщо вона досягне наших поселень. Чи загине наш народ, чи ми якимось чином чинитимемо опір, коли ця ходяча смерть дістанеться до нас?"
