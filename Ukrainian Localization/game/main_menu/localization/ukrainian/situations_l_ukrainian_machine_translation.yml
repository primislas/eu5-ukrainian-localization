  demand_territory_return: "Вимагати коригування кордонів"
  demand_territory_return_desc: "До нашої уваги дійшло, що наші сусідні однолітки, співпіддані великого [GetCountry('FRA').GetLongName], наразі контролюють деякі землі, які ми вважаємо своїми. Цю справу необхідно вирішити з надзвичайною терміновістю!"
