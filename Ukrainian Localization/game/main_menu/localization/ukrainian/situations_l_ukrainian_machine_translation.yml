  war_of_religions: "Війна релігій"
  war_of_religions_desc: "Після кількох десятиліть релігійних чвар, розбіжності щодо правильної практики [ShowReligionGroupAdjective('christian')] поклоніння в [GetInternationalOrganization('hre').GetName] досягли точки, коли збройний конфлікт між [GetInternationalOrganizationType('protestant_union').GetName] та [GetInternationalOrganizationType('catholic_league').GetName] здається неминучим. Хоча ці організації імперських князів головним чином стурбовані захистом своїх відповідних вірувань, багато лідерів у [ShowContinentName('europe')] дивляться на бурхливу Імперію жадібними очима. Чи то сповнені релігійної ревності, чи то мирського бажання, наймогутніші сили [ShowContinentNameWithNoTooltip('europe')] готують свої армії до бою, оскільки мир Імперії висить на волосині."
  war_of_religions_peace_treaty_enforced_tt: "Кожна сторона встановила [ShowPeaceTreatyTypeName('religious_supremacy')] через [ShowCasusBelliName('cb_religious_superiority')] [Concept('war', 'CONCEPT_PLACEHOLDER')|e]"
