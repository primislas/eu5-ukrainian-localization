  GAOP_MIGHTIEST_PIRATE_TT: "Наймогутніший пірат"
  GAOP_MIGHTIEST_PIRATE_DESC_TT: "Найвпливовіший і наймогутніший з піратів щомісяця визначається тим, хто має найбільший [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e]!"
