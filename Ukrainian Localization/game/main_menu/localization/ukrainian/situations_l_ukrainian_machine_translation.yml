  sengoku_desc: "Це час потрясінь. Центральна влада [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] ослабла, а [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderCountry.GetGovernment.GetRuler.GetHerHis] влада контролювати різні клани зменшилася. Підживлювані власними конфліктами, клани посилили свою автономію та незалежність і стали господарями власних територій. Японія буде охоплена війною, якщо хтось не буде достатньо могутнім, щоб знову взяти кермо влади..."
