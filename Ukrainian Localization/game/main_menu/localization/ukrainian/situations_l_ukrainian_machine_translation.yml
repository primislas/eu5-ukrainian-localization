  REFORM_TITLE: "[GetReligionByKey('catholic').GetAdjective] Реформація"
  reformation: "Реформація"
  reformation_desc: "'#italic Коли Господь і Учитель наш Ісус Христос сказав: «Покайтеся», Він хотів, щоб усе життя віруючих було покаянням.#!'\n\nЦе були перші нотатки в документі з 95 тез, знайдених прибитими до дверей церкви, кожна з яких деталізувала корупцію [GetInternationalOrganization('catholic_church').GetName]. Переживши тривалий період слабкості та внутрішньої боротьби, [ShowReligionAdjective('catholic')] віра здається готовою до реформ. Багато хто поділяє ті ж почуття, що й автор 95 тез, щодо чистоти внутрішньої віри, і що лише через Бога [ShowReligionGroupAdjective('christian')] може відчути прощення. Інші засуджують цю працю як єресь і тривожно далеке відхилення від [ShowReligionAdjectiveWithNoTooltip('catholic')] вірувань.\n\nЗ хвилею дискусій, що прокотилася [ShowContinentName('europe')], стало зрозуміло, що це незворотно змінить майбутнє нашого континенту."
