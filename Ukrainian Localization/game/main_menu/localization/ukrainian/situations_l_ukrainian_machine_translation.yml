  guelphs_and_ghibellines: "Гвельфи та гібеліни"
  guelphs_and_ghibellines_desc: "[GetUniqueInternationalOrganization('guelphs_io').GetName] та [GetUniqueInternationalOrganization('ghibellines_io').GetName] століттями боролися за панування над [ShowRegionName('italy_region')], відколи Суперечка про інвеституру протиставила [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle] та [GetUniqueInternationalOrganization('hre').GetLeaderTitle] один одному. [GetUniqueInternationalOrganization('guelphs_io').GetNameWithNoTooltip] підтримують [GetCountry('PAP').GetAdjective] владу над півостровом, тоді як [GetUniqueInternationalOrganization('ghibellines_io').GetNameWithNoTooltip] вважаються імперськими лоялістами, що зберігають вірність [GetUniqueInternationalOrganization('hre').GetName]. Але справи вийшли далеко за межі їхніх початкових позицій, і обидві сторони тепер представляють різноманітні інтереси; різні країни не чужі до зміни сторін, коли це може принести їм користь."
