  STARVING_PROVINCE_ENTRY: "$PROVINCE$ з $AMOUNT|Y$"
  STARVING_PROVINCE_ENTRY_REST: "...та до $AMOUNT|Y0$ інших!"
  EXTENDED_WINTER_AFFECTED_LOCATIONS_TOOLTIP: "Є $AMOUNT|0$ [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], уражених $little_ice_age$, з наших $TOTAL_AMOUNT$ володінь:"
  EXTENDED_WINTER_STARVING_PROVINCES_TOOLTIP: "$AMOUNT|0$ [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] з $TOTAL_AMOUNT|0$ володінь [Concept('starving', 'CONCEPT_PLACEHOLDER')|e]:"
  little_ice_age_desc: "Пронизливий холод Малого льодовикового періоду випробовує нашу стійкість, змушуючи нашого лідера адаптуватися або спостерігати, як його володіння занурюються у замерзле пекло. Чи то завдяки ретельному управлінню, чи то завдяки чистому інстинкту виживання, історія пам'ятатиме тих, хто переживе цей час великих труднощів."
  locations_in_designated_market_get_enforced_rationing_policy_tt: "Кожна [Concept('province_capital', 'CONCEPT_PLACEHOLDER')|e], якою ми володіємо на визначеному [Concept('market', 'CONCEPT_PLACEHOLDER')|e], отримає [ShowModifier('enforced_rationing_policy')] на #Y 10#! років"
  province_gains_expanded_food_production_modifier_and_potential_tt: "Обрана [Concept('province', 'CONCEPT_PLACEHOLDER')|e] отримує [ShowModifier('expanded_food_production_modifier')] на #Y 10#! років.\n\nЯкщо можливо, [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з найвищим виробництвом [Concept('food_raw_material', 'CONCEPT_PLACEHOLDER')|e] у тій самій провінції також отримує [ShowModifier('expanded_production_of_raw_goods_modifier')] на #Y 10#! років"
  enforce_rationing_policies: "Запровадити політику нормування"
  enforce_rationing_policies_desc: "Оскільки нестача продовольства загрожує неминучим голодом, ми повинні запровадити сувору політику нормування, щоб забезпечити запаси на суворі зими. Контролюючи розподіл зерна та обмежуючи накопичення, ми можемо запобігти голоду, хоча й ціною громадських заворушень та потенційної нестабільності."
  expand_provincial_food_production: "Розширити провінційне виробництво продовольства"
  expand_provincial_food_production_desc: "Зміна клімату вимагає сільськогосподарських інновацій. Заохочуючи місцеве виробництво продовольства, ми можемо пом'якшити наслідки холоду та забезпечити більш стабільне постачання продовольства для нашого населення."
  send_food_aid: "Надіслати продовольчу допомогу"
  send_food_aid_desc: "Голод охоплює багато провінцій через неврожай. Відправляючи екстрені поставки продовольства до провінцій, що потерпають, або до союзних націй, ми можемо надати допомогу та запобігти заворушенням — хоча й за рахунок наших власних запасів."
  choose_province_to_receive_food: "Виберіть [Concept('province', 'CONCEPT_PLACEHOLDER')|e] для отримання [Concept('food', 'CONCEPT_PLACEHOLDER')|e]"
  choose_province_to_send_food_to_target_province_taker: "Виберіть [Concept('province', 'CONCEPT_PLACEHOLDER')|e], куди відправити [Concept('food', 'CONCEPT_PLACEHOLDER')|e] до [target_province_taker.GetName]"
  due_to_no_road_network_tt: "Оскільки [Concept('province_capital', 'CONCEPT_PLACEHOLDER')|e] [Concept('target_province_giver.GetName] не з'єднана з новітньою [road', 'CONCEPT_PLACEHOLDER')|e] до [Concept('province_capital', 'CONCEPT_PLACEHOLDER')|e] [Concept('target_province_taker.GetName], частина [food', 'CONCEPT_PLACEHOLDER')|e] буде втрачена по дорозі"
