l_english:
  no_event_occurs_tt: "Жодна [Concept('event', 'CONCEPT_PLACEHOLDER')|e] не відбувається"
  an_event_occurs_tt: "Може статися [Concept('event', 'CONCEPT_PLACEHOLDER')|e], що стосується цього [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  succession_crisis: "Криза престолонаслідування"
  succession_crisis_desc: "Наше царство в безладі! Могутній претендент заявив свої права на наш трон проти волі нашого народу. Наші землі тепер у смертельній небезпеці як від внутрішніх, так і від зовнішніх ворогів..."
  pretender_enforced_claim_tt: "Претендент отримав трон через спадкування"
  no_heir_or_regent_or_bad_heir_tt: "Через [Concept('regent', 'CONCEPT_PLACEHOLDER')|e], слабкого [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] або повну відсутність [Concept('heir', 'CONCEPT_PLACEHOLDER')|e], ця [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] тепер має легші вимоги"
  pretender_is_cold_tt: "Претендент помер або покинув наш двір"
  succession_crisis_pretender: "Коронні претенденти"
  succession_crisis_crown_supporters: "Прихильники корони"
  succession_crisis_pretender_supporters: "Прихильники претендента"
  no_pretender_rebel_active_tt: "Жоден з активних [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] не є претендентом"
  succession_crisis_price: "$succession_crisis$ Вартість дій"
  sc_seek_foreign_aid: "Шукати іноземну допомогу"
  sc_seek_foreign_aid_desc: "Загрози від суперників-претендентів на наш [actor.GetFlavorRank] загострюються, і ситуація стає критичною. Ці претенденти не припинять своїх зусиль узурпувати нашу верховну владу, доки їх повністю не буде викорінено. Ми повинні шукати допомоги та союзників за кордоном, якщо хочемо забезпечити нашу територіальну цілісність та зберегти наше правління."
  sc_commission_dynastic_history: "Замовити династичну хроніку"
  sc_commission_dynastic_history_desc: "Наші пращури, і їхні батьки до них, завоювали та заселили величезні простори земель, що складають наш [actor.GetFlavorRank] сьогодні. Записуючи історію наших славетних предків, ми піднесемо велич нашої династії та зміцнимо нашу легітимність проти будь-якого претендента."
  sc_ask_help_from_the_nobility: "Просити допомоги у знаті"
  sc_ask_help_from_the_nobility_desc: "Численні члени [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] у нашому [actor.GetFlavorRank] мають значний вплив. Якщо ми заручимося їхньою прихильністю, ми обов'язково переможемо будь-яких претендентів, що прагнуть нас скинути."
  sc_ask_help_from_the_clergy: "Просити допомоги у духовенства"
  sc_ask_help_from_the_clergy_desc: "Через глибоку віру, наші непохитні [actor.GetReligion.GetGroup.GetAdjective] традиції залишаться міцними, оскільки ми шукаємо прихильності та підтримки [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')] під час поточної кризи."
  sc_ask_help_from_the_burghers: "Просити допомоги у міщан"
  sc_ask_help_from_the_burghers_desc: "Майстрів монети, які мають величезний вплив, необхідно закликати підтримати військові зусилля, якщо підступні претенденти втягнуть наш [actor.GetFlavorRank] у громадянську війну. Їхні переповнені гаманці стануть чудовим доповненням до нашої скарбниці..."
  choose_writer: "Вибрати [ShowArtistTypeNameWithNoTooltip('writer')]"
  selected_writer_will_compile_and_grant_legitimacy_based_on_woa_quality_tt: "Обраний [ShowArtistTypeName('writer')] укладе [ShowWorkOfArtTypeName('chronicle')] для [actor.GetGovernment.GetRulerOrRegent.GetDynasty.GetName] [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e]. Ми отримаємо [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e], що значною мірою залежатиме від якості [Concept('work_of_art', 'CONCEPT_PLACEHOLDER')|e]"
  target_character_will_compile_a_history_of_our_dynasty_tt: "[target_character.GetName] буде обрано для укладання [ShowWorkOfArtTypeName('chronicle')] для [actor GetGovernment.GetRulerOrRegent.GetDynasty.GetName] [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e]"
  ambrosian_republic_disaster: "Золота Амброзіанська Республіка"
  ambrosian_republic_disaster_desc: "Розпочалася криза престолонаслідування, і досить незвичайна: за відсутності сильного претендента на трон, ідеалістичні вчені засновують молоду республіку в [ShowLocationName('milano')]. Ці бунтівні академіки вже здобули значну народну підтримку і загрожують подальшою дестабілізацією всього королівства."
  has_chosen_ally_union_variable_tt: "Уклав [Concept('union', 'CONCEPT_PLACEHOLDER')|e] з [Concept('ally', 'CONCEPT_PLACEHOLDER')|e] у події #Y Амброзіанська Республіка#!"
  religious_turmoil: "Релігійні заворушення"
  religious_turmoil_desc: "Відмінності між релігійними групами в нашому королівстві стали непереборними, що призвело до зростання нетерпимості та фанатизму. Ми повинні забезпечити, щоб наш народ йшов правильним шляхом, і повернути тих, хто заблукав, до світла."
  rt_push_for_spiritualist: "Прагнути до [ShowSocietyDirectionNameWithNoTooltip('spiritualist')]"
  rt_push_for_spiritualist_desc: "Маси повинні бути спрямовані до спасіння і віддалені від лап гордині та єресі. Лише прийнявши [ShowSocietyDirectionName('spiritualist')], ми підкоримо тих, хто бажає зруйнувати цей наріжний камінь нашої релігійної ідентичності."
  rt_push_for_humanist: "Прагнути до [ShowSocietyDirectionNameWithNoTooltip('humanist')]"
  rt_push_for_humanist_desc: "Поява нових гілок [ShowReligionGroupName('christian')] започаткувала нову еру, зосереджену на розумінні релігійних відмінностей та спільній роботі над єдиним і різноманітним суспільством. Перед обличчям цього одкровення ми не можемо стояти осторонь у такий бурхливий період і повинні праведно просувати ці нововідкриті істини."
  rt_support_conversion_efforts: "Підтримати зусилля з навернення"
  rt_support_conversion_efforts_desc: "Ми повинні прагнути повернути тих, хто заблукав, до світла. Посиливши наші зусилля з навернення, ми прискоримо процес зцілення нашого народу і нарешті залишимо цей бурхливий і темний період позаду."
  war_of_the_roses: "Війна троянд"
  war_of_the_roses_desc: "[GetCountry('ENG').GetName] роздирається жорстоким конфліктом між молодшими гілками правлячої династії, «білою трояндою» [ShowDynastyName('york_dynasty')] та «червоною трояндою» [ShowDynastyName('lancaster_dynasty')], за те, чия спадкова претензія на правління є найсильнішою. Ця міжусобиця може тривати десятиліттями та вплинути на весь [GetCountry('ENG').GetGovernment.GetEstateName('nobles_estate')], повністю підриваючи стабільність [GetCountry('ENG').GetFlavorRank]!"
  wotr_bribe_garrison: "Підкупити гарнізон"
  wotr_bribe_garrison_desc: "Вірність суворо випробовується під час громадянської війни, і нестабільність вирує по всьому нашому [actor.GetFlavorRank]. Ми повинні скористатися цим хаосом, пропонуючи монети та гарантії ворожим фортецям, переконуючи їхніх командирів мирно здатися, а не потрапити під нашу облогу."
  select_ongoing_siege_to_bribe: "Виберіть поточну [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] для підкупу"
  no_ongoing_siege_to_bribe: "@trigger_no! Немає поточної [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] для підкупу"
  chosen_siege_tt: "Гарнізон у [target_siege.GetName] здасться"
  no_chosen_siege_tt: "Гарнізон у вибраній [Concept('location', 'CONCEPT_PLACEHOLDER')|e] здасться"
  war_of_the_aragonese_union_disaster: "Війна Союзу"
  war_of_the_aragonese_union_disaster_desc: "Розлючені надмірними вимогами, висунутими до них [SCOPE.sCountry('CAS').GetGovernment.GetAdjective] короною, сформувалися дві групи заможних повстанців: Арагонський та Валенсійський союзи. Створені незадоволеними членами [GetCountry('ARA').GetGovernment.GetEstateName('nobles_estate')] та [GetCountry('ARA').GetGovernment.GetEstateName('burghers_estate')] класів, обидва Союзи закликають до обмеження влади правителя, зменшення оподаткування та поваги до місцевих законів, привілеїв та традицій."
  savonarola_disaster: "Піднесення Савонароли"
  savonarola_disaster_desc: "Нахабний проповідник почав поширювати апокаліптичне послання серед нашого народу. Його полум'яні проповіді засуджують наше корумповане, морально занепале суспільство, особливо тих, хто перебуває на вершині. Ці марення викликають чималий ажіотаж серед нашого населення — очевидно, цей божевільний має велику силу впливу..."
  ciompi_revolt: "Повстання Чомпі"
  ciompi_revolt_desc: "Флоренція переживає час невизначеності, оскільки Чомпі загрожують відкритим повстанням. Чомпі — що складаються з робітників, ремісників та майстрів без гільдійних асоціацій — несуть тягар високого оподаткування, але не мають політичного представництва через відсутність членства в гільдіях. Таке широке невдоволення може занурити все наше суспільство в розбрат..."
  crisis_of_the_sayfawa_dynasty: "Криза династії Сайфава"
  crisis_of_the_sayfawa_dynasty_desc: "Попри довгу та успішну історію правління нашої династії в цьому регіоні, внутрішні чвари та низка нелегітимних правителів спричинили велику кризу серед нас. Поки ми відволікаємося на боротьбу з внутрішніми чварами, підступні вороги та наші могутні сусіди скористаються будь-якою нагодою, щоб розділити наші землі та стерти наш народ з лиця Землі. Ми повинні знайти спосіб утвердити те, що завжди було нашим по праву, перед зовнішнім світом, не будучи поглинутими зсередини корозією в наших власних лавах."
  muscovite_succession_war: "Московська війна за спадщину"
  muscovite_succession_war_desc: "[GetCountry('MOS').GetCapital.GetName] є центром влади в [GetCountry('MOS').GetCapital.GetRegion.GetName]. Через кризу спадщини між різними членами правлячої династії спалахнули міжусобиці, кожен з яких претендує на право сидіти на троні. Ескалація цього конфлікту не тільки загрожує розірвати їхню родину, але й може мати катастрофічні наслідки для всіх нас."
  peasants_war: "Селянська війна"
  peasants_war_desc: "Поки невдоволення тліє в сільській місцевості, становище простого люду стає дедалі гіршим. Несправедливе оподаткування, гнобительські пани та відчуття відчаю довели селян до межі. Наростаюча хвиля гніву вибухнула, призвівши до катастрофічного перевороту, який згодом стане відомим як Селянська війна."
  pw_push_for_serfdom: "Тиск на [ShowSocietyDirectionNameWithNoTooltip('serfdom')]"
  pw_push_for_serfdom_desc: "Селянський натовп, що повстав проти нашої влади, має бути розгромлений з надзвичайною жорстокістю їхніми місцевими панами. Ми не можемо дозволити нашій владі ослабнути, інакше ризикуємо стати жертвою правління натовпу!"
  pw_push_for_free_subjects: "Тиск на [ShowSocietyDirectionNameWithNoTooltip('free_subjects')]"
  pw_push_for_free_subjects_desc: "Надто довго народ був обтяжений ланцюгами феодальних володарів, які жорстоко утверджували свої несправедливі позиції. Наш моральний обов'язок — піднести простолюдина та вибороти свободу для [SCOPE.sCountry('actor').GetGovernment.GetEstateName('peasants_estate')]!"
  pw_crush_rebellion: "Придушити повстання"
  pw_crush_rebellion_desc: "Народ повстає проти нас, вимагаючи прав і привілеїв за рахунок [actor.GetGovernment.GetRulerOrRegent.GetName] та встановленого соціального порядку. Ми не можемо цього допустити! Будь-яка підтримка таких рухів має бути негайно придушена."
  pw_crush_rebellion_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що підтримують обране [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e], втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  pw_rebel_progress_reduction_tt: "Прогрес обраного [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e] буде зменшено на #G -25%#!"
  struggle_for_royal_power: "Боротьба за королівську владу"
  struggle_for_royal_power_desc: "Триває конфлікт щодо повноважень монарха проти влади Сейму, і, схоже, наша звична ієрархія незабаром буде оскаржена. Ми повинні рішуче усунути ці загрози, якщо хочемо зберегти статус-кво. Настав час позбутися нагляду станів і припинити правління!"
  dissolution_of_delhi: "Розпад Делі"
  dissolution_of_delhi_desc: "Попри всі наші зусилля, ми не змогли виправити шкоду, завдану нашими противниками. Наша колись велика імперія занурилася в хаос, оскільки вороги оточують нас з усіх боків. Це справді найважча ситуація, і ми повинні зустріти її віч-на-віч, інакше ризикуємо стати жертвою агресивних тенденцій тих, хто прагне наших земель..."
  hook_and_cod_wars: "Війни гачків і тріски"
  hook_and_cod_wars_desc: "Наша лінія спадкоємства нечітка, і в результаті наші політичні лідери розділилися на дві фракції. Фракція Тріски, як правило, більш консервативна і підтримує встановлених правителів, тоді як Гачки зазвичай віддають перевагу незалежності та підтримують тих, хто має менш міцні претензії. Цей поділ може серйозно підірвати статус-кво, і до нього слід ставитися обережно."
  hook_and_cod_wars_hooks_have_won_tt: "#Y Гачки#! здобули #Y 20#! балів впливу (наразі: #Y [THIS.GetVariable('hacw_hook_faction_power').GetValue]#!)"
  hook_and_cod_wars_cods_have_won_tt: "#Y Тріски#! здобули #Y 20#! балів впливу (наразі: #Y [THIS.GetVariable('hacw_cod_faction_power').GetValue]#!)"
  HACW_HOOK_TOOLTIP: "#Y Гачки#! є представниками [DisasterView.GetDisaster.GetOwner.GetGovernment.GetEstateName('nobles_estate')] [DisasterView.GetDisaster.GetOwner.GetName]. Вони підтримують [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_hook_contender').GetCharacter.GetName] та [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_hook_contender').GetCharacter.GetHerHis] амбіції на трон"
  HACW_COD_TOOLTIP: "#Y Тріски#! є представниками [DisasterView.GetDisaster.GetOwner.GetGovernment.GetEstateName('burghers_estate')] [DisasterView.GetDisaster.GetOwner.GetName]. Вони підтримують [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_cod_contender').GetCharacter.GetName] та [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_cod_contender').GetCharacter.GetHerHis] амбіції на трон"
  horde_civil_war: "Громадянська війна Орди"
  horde_civil_war_desc: "Знову влада нашого правителя піддається сумніву! Ворожий воєначальник загрожує Орді громадянською війною, прагнучи захопити трон для себе. Орда мусить іти війною проти своїх власних воїнів-відступників..."
  horde_civil_war_end_trigger_no_rebels: "Жоден [Concept('rebel', 'CONCEPT_PLACEHOLDER')|e] не є #Y Претендентом#! [Concept('rebel', 'CONCEPT_PLACEHOLDER')|e]"
  horde_civil_war_crown_supporters: "Лоялісти Орди"
  horde_civil_war_pretender_supporters: "Відступники Орди"
  GUI_REBEL_OWNED_LOCATIONS: "[Concept('locations', 'CONCEPT_PLACEHOLDER')|e], що належать [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e]: [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('GUI_pretender_rebel_character').GetCharacter.GetCourtCountry.GetOwnedLocationCount]"
  GUI_REBEL_MILITARY_STRENGTH_COMPARED_TO_US: "[Concept('military_strength', 'CONCEPT_PLACEHOLDER')|e] [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] порівняно з нами."
  revolution_disaster: "Революція!"
  revolution_disaster_desc: "Десятиліття феодального гніту, економічні труднощі та релігійна нетерпимість позначилися на мирі нашої нації, і прагнення нашого населення до свободи становить серйозну загрозу нашому правлінню. Народне повстання майже неминуче..."
  revolution_disaster_end_trigger_tt: "#Y Революційні повстанці#! не планують [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  MONARCHIST_STR_DESC: "[DisasterView.GetDisaster.GetOwner.GetAdjectiveWithNoTooltip] [Concept('army', 'CONCEPT_PLACEHOLDER')|e] Розмір: [DisasterView.GetDisaster.GetOwner.GetArmySize]@army_strength!\n[DisasterView.GetDisaster.GetOwner.GetNameWithNoTooltip] Потенційний [Concept('levy', 'CONCEPT_PLACEHOLDER')|e]: [DisasterView.GetDisaster.GetOwner.GetArmyLevyPower]@levy\n[DisasterView.GetDisaster.GetOwner.GetNameWithNoTooltip] [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e]: [DisasterView.GetDisaster.GetOwner.GetMaxManpowerValue|2]@manpower!"
  REVOLUTIONARIES_POTENTIAL_STRENGTH_TT: "Потенційна [Concept('military_strength', 'CONCEPT_PLACEHOLDER')|e] [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetName]"
  REVOLUTIONARIES_STR_DESC: "[DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetAdjectiveWithNoTooltip] [Concept('army', 'CONCEPT_PLACEHOLDER')|e] Розмір: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetArmySize]@army_strength!\n[DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetNameWithNoTooltip] Потенційний [Concept('levy', 'CONCEPT_PLACEHOLDER')|e]: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetArmyLevyPower]@levy\n[DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetNameWithNoTooltip] [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e]: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetMaxManpowerValue|2]@manpower!"
  MONARCHIST_POTENTIAL_STRENGTH_TT: "Потенційна [Concept('military_strength', 'CONCEPT_PLACEHOLDER')|e] [DisasterView.GetDisaster.GetOwner.GetName]"
  revolutionary_chaos: "Революційний Хаос"
  revolutionary_chaos_desc: "Старого режиму більше немає! Ми скинули наших колишніх гнобителів і захопили владу для себе. Проте стабільність і безпека нашого молодого царства все ще під загрозою, оскільки конкуруючі фракції борються за те, хто повинен мати найвищу владу в нашому новонародженому уряді. Ми повинні придушити цю внутрішню турбулентність, якщо хочемо залишатися стійкими проти зовнішніх загроз..."
  sinicization_disaster: "Вплив Китаю"
  sinicization_disaster_desc: "Вплив [GetCountry('CHI').GetName] був благом для нашого суспільства у багатьох відношеннях. Однак наші стосунки з цим культурним гігантом вплели багато чужих ниток у гобелен нашого суспільства, віддаляючи нас від наших традицій та загрожуючи нашій незалежності. Якщо ми хочемо зберегти нашу унікальну культуру, ми повинні чинити опір подальшому розбещенню від цих спокусливих зовнішніх впливів. І навпаки, ми могли б отримати вигоду від тісніших зв'язків..."
  has_opted_to_side_with_china_in_events_tt: "Достатньо #G сприяв#! впливу [GetCountry('CHI').GetNameWithNoTooltip] у нашому дворі через [Concept('events', 'CONCEPT_PLACEHOLDER')|e]"
  has_opted_to_stay_sovereign_from_china_in_events_tt: "Достатньо #G приборкав#! вплив [GetCountry('CHI').GetNameWithNoTooltip] у нашому дворі через [Concept('events', 'CONCEPT_PLACEHOLDER')|e]"
  crisis_of_the_chinese_dynasty: "Криза [GetCountry('CHI').GetLongNameWithNoTooltip]"
  crisis_of_the_chinese_dynasty_desc: "Небо темніє і сіріє. Ми на межі втрати божественної прихильності! Внутрішній та зовнішній тиск зростає; руйнування бюрократії та сільськогосподарські невдачі схилили шальки терезів проти нас. Народ більше не визнає нас законними правителями нашого [GetCountry('CHI').GetFlavorRank]!"
  ccd_celestial_authority_trigger: "Наша [Concept('celestial_authority_gc', 'CONCEPT_PLACEHOLDER')|e] становить щонайменше #Y 90#! (наразі: #Y [GetUniqueInternationalOrganization('middle_kingdom').MakeScope.GetVariable('celestial_authority').GetValue|V1]#!)"
  cmd_has_reformed_cabinet_tt: "Запроваджено [Concept('action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('cmd_reform_the_cabinet')]"
  cmd_has_restored_stability_tt: "Запроваджено [Concept('action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('cmd_restore_stability')]"
  cmd_has_strenthened_crown_tt: "Запроваджено [Concept('action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('cmd_strengthen_crown')]"
  fire_event_4_tt: "Подія про [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] відмову платити податки може статися"
  fire_event_5_tt: "Подія про зменшення [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] по всіх наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] може статися"
  decline_of_majapahit: "Занепад $MAJ$"
  decline_of_majapahit_desc: "Наш [GetCountry('MAJ').GetFlavorRank] не такий процвітаючий, як колись. Охоплений внутрішніми династичними конфліктами, цей період слабкості давно очікувався нашими суперниками, які з нетерпінням чекають будь-якої нагоди, щоб посягнути на наші кордони. Тепер, зі зростанням [ShowReligionGroupName('muslim')] у [ShowRegionName('indonesia_region')], ми легко можемо втратити свою значущість і потрапити до темного забуття забутих імперій..."
  demak_progress: "[ShowReligionAdjectiveWithNoTooltip('sunni')] Домінування"
  SUNNI_POPS: "Сунітські Попи"
  HINDU_POPS: "Індуїстські Попи"
  SUNNI_DOMINANCE_MAJAPAHIT: "$demak_progress$"
  DEMAK_PROGRESS_GROWTH_TOOLTIP_TITLE: "Збільшення $demak_progress$"
  DEMAK_PROGRESS_GROWTH_TITLE: "$demak_progress$"
  DEMAK_MONTHLY_CHANGE_HEADER: "$demak_progress$ змінюється щомісяця на [Country.MakeScope.GetVariable('demak_progress_growth').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_POP_SHARE: "Частка [ShowReligionAdjective('sunni')] порівняно з [ShowReligionAdjective('hindu')]: [Country.MakeScope.GetVariable('maj_sunni_percentage').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_STABILITY_IMPACT: "[stability]: [Country.MakeScope.GetVariable('maj_stability_impact').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_LEGITIMACY_IMPACT: "[legitimacy]: [Country.MakeScope.GetVariable('maj_legitimacy_impact').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_BREAKDOWN: "$DEMAK_MONTHLY_CHANGE_POP_SHARE$\n$DEMAK_MONTHLY_CHANGE_STABILITY_IMPACT$\n$DEMAK_MONTHLY_CHANGE_LEGITIMACY_IMPACT$"
  DEMAK_PROGRESS_GROWTH_HEADER: "$demak_progress$"
  DEMAK_PROGRESS_GROWTH_TOOLTIP: "$demak_progress$ — це міра поширеності [ShowReligionAdjective('sunni')] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] у нашому [Country.GetFlavorRank]. Приріст $demak_progress$ збільшується зі зростанням кількості [ShowReligionAdjective('sunni')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]. Коли він досягне #y 100.0%#!, усі наші [ShowReligionAdjective('sunni')] [Concept('dominant_religion', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] відокремляться, щоб утворити $DEM$."
  court_and_country: "Двір і Країна"
  court_and_country_desc: "Опір зростаючій централізації в нашій країні вилився в період загальної кризи та конфлікту між Двором і Країною. Залежно від того, як ми впораємося з цим важким часом, ми можемо вийти з нього сильнішою країною, ніж раніше, — якщо, звичайно, нам вдасться витримати бурю."
  court_and_country_tips_header: "Поради для Двору і Країни"
  court_and_country_tips_tt: "Ми можемо збільшити нашу [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e] через:\n$BULLET_WITH_TAB$Скасування [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$Збільшення [Concept('control', 'CONCEPT_PLACEHOLDER')|e] по всіх наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$Будівництво [ShowBuildingTypeName('counting_house')]\n$BULLET_WITH_TAB$Збільшення нашої [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$Прийняття певних [Concept('policies', 'CONCEPT_PLACEHOLDER')|e]"
  french_wars_of_religion_breakdown_tt: "Відсоток відповідних [ShowReligionGroupAdjective('christian')] [Concept('religions', 'CONCEPT_PLACEHOLDER')|e] у нашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e]\n[ShowReligionName('catholic')]:"
  x_catholic: "[GetCountry('FRA').GetReligionPercentage(GetReligionByKey('catholic'))|%2] [Concept('catholic', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country_7_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] може відмовитися платити податки через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country_8_tt: "Місцеві повстання можуть виникнути у відповідь на нестабільність через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country_9_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] можуть повстати, щоб вимагати своїх старих привілеїв через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country_10_tt: "Ліга [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] може повстати проти нас через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country_11_tt: "Лояльність офіцерів у наших арміях може бути поставлена під сумнів через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  court_and_country_12_tt: "Ми можемо знайти прихильників в армії та уряді через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  aspiration_for_liberty: "Прагнення до свободи"
  aspiration_for_liberty_desc: "Жага населення до свободи та бажання втілити просвітницькі ідеали зробили їхнє повстання, здавалося б, неминучим. Їхній гнів через нашу, як вони вважають, неспроможність керувати загрожує вибухнути революційною пожежею! Це значно ускладнить нам подальші дії..."
  battles_on_foreign_grounds_tt: "Зовнішні війни можуть стати дорожчими для ведення через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  governmental_incompetence_event_tt: "Народ може повстати проти нашої урядової некомпетентності через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  reform_society: "Реформувати суспільство"
  reform_society_desc: "Система [ShowGovernmentReformName('altepetl')] служила нашому народу з турботою та процвітанням протягом багатьох років. Однак наше слабке розуміння проблем наших підданих в інших містах-державах викликало хор незгодних голосів проти нашого правління. Якщо ми бажаємо зберегти нашу велич і зміцнити нашу владу, необхідні реформи централізації."
  rise_of_the_szlachta: "Піднесення $nobles_estate_szlachta$"
  rise_of_the_szlachta_desc: "Нам не чужі владолюбні тенденції $nobles_estate_szlachta$. Зі зростанням впливу $nobles_estate_szlachta$ їхні зростаючі вимоги щодо більших привілеїв заполоняють наш двір. Ці політичні маневри нагадують хижого звіра з джунглів, що кружляє і чекає на удар. Безсумнівно, вони скористаються першою ж нагодою, щоб кинути виклик нашій владі!"
  pw_push_for_aristocracy: "Прагнення до [ShowSocietyDirectionNameWithNoTooltip('aristocracy')]"
  pw_push_for_aristocracy_desc: "Наші директиви все більше сприяють привілеям [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] та традиційній ієрархії. Меч і родовід визначають місце людини в суспільстві, і старі родини повинні посилити свою владу. Але ця консолідація влади може розгнівати інші могутні класи, такі як [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')]..."
  pw_push_for_plutocracy: "Прагнення до [ShowSocietyDirectionNameWithNoTooltip('plutocracy')]"
  pw_push_for_plutocracy_desc: "Багатство, а не спадщина, стає шляхом до впливу. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')], фінансисти та підприємницькі еліти мають отримати прихильність, перетворюючи наші нинішні інституції на храми торгівлі та прибутку. Такий крок, безсумнівно, засмутить найсильніших членів серед [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')]..."
  given_more_estate_power_nobles_estate_power_tt: "Ми надали більше [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] [GetCountry('POL').GetGovernment.GetEstateName('nobles_estate')]"
  given_more_estate_power_burghers_estate_power_tt: "Ми надали більше [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] [GetCountry('POL').GetGovernment.GetEstateName('burghers_estate')]"
  given_more_estate_power_crown_estate_power_tt: "Ми забезпечили більше [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] для [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] [GetCountry('POL').GetGovernment.GetEstateName('crown_estate')]"
  death_of_hayan_wuruk: "Смерть [GetCharacter('maj_hayam_wuruk').GetNameWithNoTooltip]"
  death_of_hayan_wuruk_desc: "Смерть нашого великого лідера [GetCharacter('maj_hayam_wuruk').GetName] занурила наш [GetCountry('MAJ').GetFlavorRank] у велике сум'яття. Цей бурхливий період може тривати багато довгих років, оскільки ті, хто колись схилявся перед нами, повстають проти нашої влади. Спірне успадкування та занепад нашої [GetCountry('MAJ').GetAdjective] влади є двома нагальними проблемами, які необхідно негайно вирішити, якщо ми хочемо пережити цю катастрофу."
  curse_of_stefan_uros_iii: "Прокляття [GetCharacter('ser_stefan_decanski').GetNameWithNoTooltip]"
  curse_of_stefan_uros_iii_desc: "Ніхто не заперечує величі та пишноти, що оточують легенду про [GetCharacter('ser_stefan_dusan').GetName]. Вихований з найвищою освітою, вправний у придворному етикеті та досвідчений полководець, [GetCharacter('ser_stefan_dusan').GetShortNameWithNoTooltip] привів нашу велику націю до нових висот. Однак, як це буває з королівськими інтригами, спадщина [GetCharacter('ser_stefan_dusan').GetHerHis] була побудована на стражданнях, вбивствах та підступності. Головним трофеєм, здобутим під час сходження [GetCharacter('ser_stefan_dusan').GetHerHis], був його власний батько, [GetCharacter('ser_stefan_decanski').GetName], чий останній подих прокляв рід [GetCharacter('ser_stefan_dusan').GetNameWithNoTooltip] занепадом і руїною. Забобонні голоси по всьому нашому двору шепочуть, що образ старого [SCOPE.sCountry('actor').GetGovernment.GetRulerTitle] повернувся, знаменуючи початок нашого кінця..."
  english_civil_war: "Англійська громадянська війна"
  english_civil_war_desc: "Зростаюча напруга між Короною та Парламентом щодо влади та управління загрожує охопити всю країну. Віра нашого правителя в божественне право та релігійну політику розгнівали Парламент, як і його [SCOPE.sCountry('actor').GetGovernment.GetRuler.GetHerHis] очевидне ігнорування належних процедур оподаткування. Ситуація загрожує вибухнути відкритою громадянською війною, якщо ми швидко не знайдемо рішення..."
  lost_civil_war_tt: "#Y Парламентарі#! перемогли у [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  won_civil_war_tt: "#Y Роялісти#! перемогли у [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]"
  parliamentarist_rebels: "Парламентарі"
  complete_the_ecw_and_lose_tt: "[ShowDisasterName('english_civil_war')] завершиться"
  french_wars_of_religion: "Французькі релігійні війни"
  french_wars_of_religion_desc: "Коли нові гілки [ShowReligionGroupAdjective('christian')] віри з'являються по всій [ShowContinentName('europe')], подальше релігійне тертя, створене в нашому суспільстві, досягло точки кипіння. Тепер нас оточують озброєні фанатики — єретики та захисники істинної віри — які загрожують втягнути все наше царство у жорстокий громадянський конфлікт."
  had_fwr_before_definitive_ending_tt: "Раніше не завершував цю катастрофу ні досягненням [Concept('religious_unity', 'CONCEPT_PLACEHOLDER')|e], ні підписанням [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [ShowPolicyName('edict_of_nantes')]"
  lutheran_huguenots: "$lutheran_ADJ$ гугеноти"
  calvinist_huguenots: "$calvinist_ADJ$ гугеноти"
  catholic_huguenots: "$catholic_ADJ$ гугеноти"
  reach_compromise_with_huguenots: "Компроміс з гугенотами"
  reach_compromise_with_huguenots_desc: "Ми не можемо підтримувати цей постійний розкол на наших землях. Тому компроміс і єдність прокладуть шлях до виходу з цієї катастрофи."
  time_of_troubles: "Смутний час"
  time_of_troubles_desc: "Це темний період соціальних та економічних заворушень. Наша нація бореться з голодом і війною, а також намагається приборкати опозицію до [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')] та [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')]. Оточені з усіх боків псами розбрату, наш [Country.GetFlavorRank] ось-ось буде розірваний на шматки та поглинутий..."
  decline_of_empire: "Занепад Імперії"
  decline_of_empire_desc: "Колись могутня і непохитна, наша імперія тепер хитається на межі краху. Корупція роз'їдає наші інституції, наші провінції стають неспокійними під тягарем занедбаності, а іноземні держави кружляють, як стерв'ятники, прагнучи розірвати те, що залишилося від нашої слави. Золотий вік, який колись визначав нас, зник у пам'яті, і тріщини в нашому фундаменті розширюються з кожним днем. Якщо ми не діятимемо швидко, щоб усунути гниль зсередини та відновити контроль, наша імперія розвалиться, залишивши лише руїни та жаль, тінь нашої колишньої слави..."
  has_not_had_decline_of_empire_last_25_years: "Не мав цієї [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] протягом останніх #Y 25#! років"
  decline_of_mali: "Занепад Малі"
  decline_of_mali_desc: "Слабке правління, громадянські війни, зростання зовнішніх загроз та внутрішня стагнація є основними викликами, з якими [GetCountry('MAL').GetLongName] стикалася в останні роки. Стабільність та безпека [GetCountry('MAL').GetFlavorRank] під загрозою, і лише сильна рука може вивести нас з цієї повзучої загибелі та знову привести до слави."
  coup_attempt: "Спроба перевороту"
  coup_attempt_desc: "Тіньові загрози кружляють навколо нас, як хижі птахи, чекаючи, щоб розклювати нас — найстрашніша з яких призведе до передчасної смерті нашого правителя! Гірше того, їх замінить маріонетка, керована з-за лаштунків тими ж убивчими тінями."
  recently_had_coup_attempt_inconclusive_tt: "НЕ мав невдалої або успішної спроби перевороту протягом останніх #Y 5#! років"
  conspirators_murdered_ruler_tt: "Змовники успішно вбили нашого правителя"
  byzantine_succession_crisis: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip] Криза престолонаслідування"
  byzantine_succession_crisis_desc: "Підступні претенденти та впливові фігури в тіні планують повалити правлячу [GetCountry('BYZ').GetAdjective] династичну лінію. Суд охоплений заворушеннями, оскільки могутні генерали та сторонні особи прагнуть вплинути на результат цього бурхливого періоду. Наша ослаблена присутність у [ShowRegionName('balkan_region')] призвела до цієї великої невизначеності щодо майбутнього останнього законного бастіону $ROM$..."
  castilian_civil_war: "[GetCountry('CAS').GetAdjectiveWithNoTooltip] Громадянська війна"
  castilian_civil_war_desc: "Наші вороги постійно шукають способів втрутитися в нашу політику, або шляхом розпалювання нестабільності, або шляхом підтримки конкуруючих претендентів на наш престол. Цей період нестабільності, безсумнівно, виявить тих, хто прагне покласти край нашому правлінню та стерти нас зі сторінок історії. Багатство [ShowRegionName('iberia_region')] завжди приваблювало голодні погляди ворогів на наших кордонах, але ми не повинні дозволити їм бенкетувати!"