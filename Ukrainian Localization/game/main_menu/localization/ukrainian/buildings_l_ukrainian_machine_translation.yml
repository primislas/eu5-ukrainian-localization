  fine_cloth_mill: "Фабрика тонкого сукна"
  furniture_workshop: "Меблева майстерня"
  furniture_workshop_desc: "Зі зростанням багатства наших міщан зростає і їхній попит на такі товари, як $furniture$. Перенесення виробництва у більші майстерні забезпечить виготовлення більшої кількості $furniture$."
  glass_workshop: "Скляна майстерня"
  glass_workshop_desc: "$glass$ є життєво важливою частиною повсякденних потреб усього нашого населення. Збільшені можливості $glass_workshop$ забезпечать, що наші зусилля не зупиняться."
  glass_mill: "Скляна фабрика"
  glass_mill_desc: "Спеціалізовані $glass_mill$ галузі зможуть збільшити наше виробництво $glass$ більше, ніж будь-коли раніше. Прокатуючи розплавлене скло на залізних столах, ми зможемо не тільки збільшити розмір нашого виробленого $glass$, але й значно прискорити процес виготовлення."
  cannon_workshop: "Гарматна майстерня"
  cannon_workshop_desc: "Постійно зростаючий попит на артилерію для наших армій вимагає від нас збільшення можливостей виробництва $cannons$."
  weapon_workshop: "Збройова майстерня"
  weapon_workshop_desc: "Постійно зростаючий попит на зброю як для наших армій, так і для наших мисливських операцій вимагає від нас збільшення можливостей виробництва $weaponry$."
  naval_supplies_workshop: "Майстерня морського постачання"
  naval_supplies_workshop_desc: "$naval_supplies$ відіграють життєво важливу роль у постачанні та утриманні наших морських амбіцій. З більшими виробничими площами ми зможемо підтримувати нашу позицію та збільшувати наш випуск."
  naval_supplies_mill: "Млин морського постачання"
  naval_supplies_mill_desc: "Постійне зростання торгівлі по всьому світу вимагає більше $naval_supplies$, ніж будь-коли раніше, і для його постачання потрібні спеціалізовані млини."
  saltpeter_workshop: "Селітряна майстерня"
  saltpeter_workshop_desc: "Зі зростанням попиту на порох з боку наших військ, надійне виробництво штучної $saltpeter$ є необхідністю."
  putrefaction_mill: "Гнильний млин"
  putrefaction_mill_desc: "Збільшивши кількість наших котлів для процесу концентрації $saltpeter$ та покращивши їх надійність, ми зможемо збільшити виробництво пороху для наших військ без залежності від дорогих імпортних товарів."
  beer_workshop: "Пивна майстерня"
  beer_workshop_desc: "Варячи пиво у більших майстернях з достатнім місцем для процесу бродіння, ми зможемо виробляти більші обсяги алкогольних напоїв, ніж раніше."
  brewery_mill: "Пивоварний млин"
  brewery_mill_desc: "Великі пивоварні зможуть використовувати парові двигуни та автоматизовані механізми для збільшення продуктивності своїх об'єктів."
  distillers_workshop: "Майстерня дистиляторів"
  distillers_workshop_desc: "Дистилюючи у більших майстернях з достатнім місцем для витримки, ми зможемо виробляти більші обсяги алкогольних напоїв."
  distiller_mill: "Дистиляційний млин"
  distiller_mill_desc: "Великі дистиляційні заводи зможуть використовувати парові двигуни та автоматизовані механізми для збільшення продуктивності своїх об'єктів."
  cloth_workshop: "Ткацька майстерня"
  cloth_workshop_desc: "Простіші методи очищення волокон та спеціалізовані майстерні для виробництва $cloth$ збільшать випуск нашої текстильної промисловості."
  fine_cloth_workshop: "Майстерня тонкої тканини"
  fine_cloth_workshop_desc: "Простіші методи очищення волокон та спеціалізовані майстерні для виробництва $fine_cloth$ збільшать випуск нашої текстильної промисловості."
  guns_workshop: "Збройова майстерня"
  guns_workshop_desc: "Постійно зростаючий попит на зброю для наших армій вимагає від нас збільшення можливостей виробництва $firearms$."
  tanning_workshop: "Гарбарна майстерня"
  tanning_workshop_desc: "Виробництво $leather$ удосконалилося і дозволяє розширити асортимент вироблених шкіряних матеріалів та збільшити випуск."
  tannery_mill: "Гарбарний млин"
  tannery_mill_desc: "З використанням нових хімікатів та ефективніших методів виробництва, наше виробництво $leather$ буде неперевершеним."
  printing_manufactory: "Друкарська мануфактура"
  printing_manufactory_desc: "Запровадження нових друкарських технік дозволяє друкарям виробляти більше $books$, ніж раніше."
  printing_mill: "Друкарська фабрика"
  printing_mill_desc: "Нові техніки, що передбачають використання хімікатів та довговічніших друкарських форм, дозволяють масове виробництво $books$."
  paper_manufactory: "Паперова мануфактура"
  paper_manufactory_desc: "Зростаючий попит на $paper$ через друкарську промисловість змушує впроваджувати інноваційні методи для збільшення виробництва $paper$."
  paper_mill: "Паперова фабрика"
  paper_mill_desc: "Використовуючи $cloth$, виготовлений з $cotton$, $paper_mill$ зможе виробляти більші обсяги паперу."
  winery: "Виноробня"
  winery_desc: "Скромна гільдія, де різні сирі цукри ферментуються у насичені та п'янкі напої. Хоча вони простіші за традиційне виноградне вино, ці напої смакують як простолюдинам, так і шляхті, причому кожен регіон удосконалює власні унікальні смаки та техніки."
  winery_manufactory: "Виноробна мануфактура"
  winery_manufactory_desc: "Постійно зростаючий попит на вишукані ферментовані напої призвів до створення величезних виробничих центрів, де традиція зустрічається з промисловістю. Стародавні методи виробництва вин масштабуються, щоб обслуговувати гамірні міста та розгалужені торговельні мережі, гарантуючи, що жодна чаша не залишиться порожньою."
  firearms_manufactory: "Мануфактура вогнепальної зброї"
  cannon_foundry: "Гарматний ливарний цех"
  pottery_guild: "Гільдія гончарів"
  pottery_guild_desc: "Гончарство є однією з найдавніших економічних діяльностей людства. Об'єднання гончарів у гільдії сприяє обміну знаннями та спеціалізації праці, дозволяючи збільшити виробництво кераміки."
  pottery_manufactory: "Гончарна мануфактура"
  pottery_manufactory_desc: "Зростаючий попит на комерціалізовану кераміку призвів до створення економії від масштабу. Виробництво промислових товарів за допомогою спільного, організованого робочого процесу перетворює гончарство з ремесла на промисловість."
  pottery_mill: "Гончарна фабрика"
  pottery_mill_desc: "Зростання пропозиції, зумовлене промисловою керамікою, призвело до її остаточного логічного наслідку: розвитку масового виробництва, в якому промислові робітники тепер відповідають за виробництво кераміки."
  apothecary: "Аптека"
  apothecary_desc: "Аптека – це місце, де можна знайти та видати ліки. Вони походять з різних джерел, включаючи трави та інші природні засоби, а також з більш екзотичних матеріалів, таких як роги тварин або ртуть."
  furniture_guild: "Гільдія теслярів"
  furniture_guild_desc: "Теслярство є однією з найосновніших діяльностей для підтримки домогосподарства. Об'єднання в гільдії дозволяє теслярам встановлювати стандарти та ділитися техніками, що сприяють сталості їхньої роботи."
  furniture_manufactory: "Меблева мануфактура"
  furniture_manufactory_desc: "Ремісничого теслярства може бути недостатньо для задоволення попиту на меблі, особливо в міських умовах, наповнених буржуазією, яка прагне більш специфічних товарів. Організація виробництва меблів у більших майстернях може бути необхідною для задоволення цього зростаючого попиту."
  furniture_mill: "Меблева фабрика"
  furniture_mill_desc: "Зростання суспільного багатства створює зростаючий попит на промислові товари, такі як меблі. Єдиний спосіб продовжувати збільшувати пропозицію може полягати у виробництві їх на фабриках, використовуючи промислові методи."
  mercury_patio: "Ртутний двір"
  mercury_patio_desc: "$mercury_patio$ — це комплекс будівель, що використовується для очищення срібла та золота, видобутих з низькоякісних руд, роблячи їх прибутковими."
