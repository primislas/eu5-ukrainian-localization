  miaphysite_monastery: "Міафізитський монастир"
  seat_of_cardinal: "Кардинальський престол"
  seat_of_cardinal_why: "Може бути запитано лише через [ShowGenericActionName('request_cardinal_seat')] [ShowReligionAdjective('catholic')] країною, яка має [ShowCountryRankName('rank_duchy')] [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e] або вище, для [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowBuildingTypeName('cathedral')]."
  has_religious_building: "Може бути запитано лише для [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з [ShowBuildingTypeName('cathedral')]"
  wharf: "Пристань"
  medical_school: "Медична школа"
  hospital: "Шпиталь"
  pest_house: "Чумний будинок"
  pest_house_desc: "Невелика хатина за межами громади, де хворих та заражених утримують проти їхньої волі, щоб уникнути поширення чуми на решту громадян."
  pest_house_tt: "Може бути збудовано лише під час [ShowSituationName('black_death')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e], якщо активна дія [ShowGenericActionName('strict_quarantines')]."
  lazaretto: "Лазарет"
  lazaretto_desc: "Невеликий шпиталь в ізольованому місці, зазвичай у сільській місцевості, на острові або на ділянці узбережжя. Морські мандрівники поміщаються туди на карантин, якщо їх підозрюють у перенесенні заразної хвороби, що значно обмежує поширення епідемій у цьому місці."
  lazaretto_why: "Може бути збудовано лише в #Y прибережних#! локаціях"
  slave_market: "Невільницький ринок"
  art_school: "Школа мистецтв"
  funduq: "Funduq"
  funduq_desc: "Громадська будівля, що зустрічається у важливих торгових містах, де купці можуть відпочити, зустрітися та зберігати свої товари."
  fortress_granary: "Agadir"
  fortress_granary_desc: "Укріплена громадська комора, традиційно збудована народами Північної Африки. Збудовані на пагорбах, вони забезпечуватимуть захист та оборонну позицію для навколишніх сільськогосподарських угідь та прерій."
