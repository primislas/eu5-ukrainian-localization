  pottery_workshop: "Гончарна майстерня"
  pottery_workshop_desc: "Гончарні вироби є основним продуктом для всього населення, від простих посудин для зберігання до декоративних предметів. Оптимізація їх виробництва в спеціалізованих майстернях задовольнить потребу людей у гончарних виробах."
  tools_workshop: "Майстерня інструментів"
  tools_workshop_desc: "З розширенням нашої економіки наш народ більше не може покладатися на інструменти, виготовлені ремісниками. Створення належних майстерень для виробництва інструментів для нашого населення та бізнесу стало необхідністю."
  dyes_workshop: "Майстерня барвників"
  dyes_workshop_desc: "Барвники та пігменти можна створювати з різних джерел, але їх потрібно обробляти певним чином, зазвичай відомим лише обраним людям."
  dyesworks: "Барвники"
  dyesworks_desc: "Спеціалізоване та розширене виробництво барвників забезпечить нашому населенню доступ до такої різноманітності пігментів та кольорів, яку вони бажають."
  dyes_mill: "Барвна фабрика"
  dyes_mill_desc: "Лише завдяки великим мануфактурам, присвяченим виробництву різноманітних барвників, ми зможемо задовольнити зростаючу потребу в пігментах та вишуканих кольорах."
