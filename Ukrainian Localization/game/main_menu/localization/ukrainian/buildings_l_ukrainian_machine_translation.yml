l_english:
  colonial_category: "Колоніальні будівлі"
  colonial_category_desc: "Це будівлі, які можна зводити в чужих незайнятих місцевостях і які допомагають нам розширювати там свій вплив."
  cultural_category: "Культурні будівлі"
  cultural_category_desc: "Це будівлі, які допомагають нам просвіщати наше неосвічене населення або підносити нашу культуру."
  defense_category: "Оборонні будівлі"
  defense_category_desc: "Це будівлі, присвячені обороні місцевості, які також можуть впливати на сусідні."
  government_category: "Урядові будівлі"
  government_category_desc: "Це будівлі, які безпосередньо контролюються урядом і роблять його сильнішим."
  infrastructure_category: "Інфраструктурні будівлі"
  infrastructure_category_desc: "Це будівлі, які покращують цінність місцевості, де вони зведені."
  military_category: "Військові будівлі"
  military_category_desc: "Це будівлі, присвячені формуванню військових підрозділів у місцевості."
  naval_category: "Морські будівлі"
  naval_category_desc: "Це будівлі, присвячені будівництву [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] та/або покращенню нашої [Concept('natural_harbor_suitability', 'CONCEPT_PLACEHOLDER')|e]."
  rgo_building_category: "Виробництво сировини"
  rgo_building_category_desc: "Це [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], які дозволяють нам отримати доступ до [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e], до яких ми можемо не мати достатнього доступу."
  trade_company_building: "Будівля торгової компанії"
  satellite_trade_building: "Супутникова торгова будівля"
  guild: "Гільдія"
  workshop: "Майстерня"
  midgame_manufactory: "Мануфактура"
  lategame_manufactory: "Фабрика"
  unique_palace: "Унікальний палац"
  basic_industry_category: "Базова промисловість"
  basic_industry_category_desc: "Це [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], які створюють [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], що переважно використовуються іншими [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]."
  weapons_industry_category: "Збройна промисловість"
  weapons_industry_category_desc: "Це [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], що створюють [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], які використовуються для військових цілей."
  consumer_goods_category: "Споживчі товари"
  consumer_goods_category_desc: "Це [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], що створюють [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], які переважно використовуються [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]."
  estate_category: "Станові будівлі"
  estate_category_desc: "Це будівлі, які [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] будують для власної вигоди."
  religious_category: "Релігійні будівлі"
  religious_category_desc: "Це будівлі, присвячені релігії, і які впливають на вплив нашого духовенства в державі."
  trade_category: "Торговельні будівлі"
  trade_category_desc: "Це будівлі, що покращують нашу національну торгівлю, допомагаючи нашим торговцям бути ефективнішими або виходити на нові ринки."
  village_category: "Села"
  village_category_desc: "Це села, які ми можемо будувати у сільській місцевості."
  irrigation_systems: "Іригація"
  bridge_infrastructure: "Міст"
  mason: "Каменяр"
  construction_center: "Будівельний центр"
  construction_center_desc: "Це дозволяє виконувати більше будівництв одночасно у [Concept('town_or_city', 'CONCEPT_PLACEHOLDER')|e]."
  trade_office: "Торговельна контора"
  embassy: "Посольство"
  black_market: "Чорний ринок"
  black_market_desc: "Незаконний ринок, де товари торгуються поза пильним оком будь-якої влади, вільні від оподаткування та загребущих рук судових виконавців."
  smuggler_cove: "Бухта контрабандистів"
  smuggler_cove_desc: "Перевезення незаконних товарів, а також комерційний розвиток чорних ринків залежить від розвитку прихованих прибережних заток або відокремлених гаваней, таких як $smuggler_cove$."
  brothel: "Бордель"
  brothel_desc: "Джерело пороку та розпусти, борделі є місцями розваг для піратів, каперів та інших головорізів."
  pirate_tavern: "Портова таверна"
  pirate_tavern_desc: "Жваві та сумнозвісні осередки, де збиралися люди дії, моряки та купці. Розташовані в ключових піратських портах та різноманітних прибережних містах, ці таверни відіграють важливу роль у піратському житті. Тут екіпажі відпочивають, витрачають свою здобич на алкоголь, їжу, розваги та вербують нових членів екіпажу."
  building_trade_hq_only_one: "Можна побудувати лише один $trade_company_headquarters$ одночасно."
  trade_company_headquarters: "Штаб-квартира торгової компанії"
  trade_company_headquarters_desc: "Осередок будь-якої майбутньої [ShowSubjectTypeName('trade_company')], $trade_company_headquarters$ слугує головною базою операцій для будь-якої міжнародної та заморської комерційної діяльності від імені метрополії."
  trade_company_garrison: "Гарнізон компанії"
  trade_company_garrison_desc: "Гарнізон [ShowSubjectTypeName('trade_company')] захищає місцеві інтереси купців."
  trade_company_harbor: "Порт компанії"
  trade_company_harbor_desc: "Місцеві склади [ShowSubjectTypeName('trade_company')] зберігають усі товари, готові до продажу."
  trade_company_local_venture: "Місцеві підприємства компанії"
  trade_company_local_venture_desc: "Підприємства [ShowSubjectTypeName('trade_company')], які намагаються експлуатувати місцеві матеріали для своєї вигоди."
  trade_company_foreign_influence: "Іноземний вплив компанії"
  trade_company_foreign_influence_desc: "Колоніальна будівля [ShowSubjectTypeName('trade_company')], яка пропонує можливості для іноземного населення."
  trade_company_governance: "Управління компанії"
  trade_company_governance_desc: "Місцеві військові казарми [ShowSubjectTypeName('trade_company')], вербуючи та навчаючи війська, які забезпечуватимуть інтереси компанії."
