  charcoal_maker: "Вугільна піч"
  improved_charcoal_maker: "Вугільник"
  improved_charcoal_maker_desc: "Удосконалення процесу випалювання вугілля дозволяють нам виробляти більші обсяги та мати ефективніший коефіцієнт перетворення."
  pound_lock_canal_infrastructure: "Шлюзовий канал"
  elephant_hunting_grounds: "Мисливські угіддя на слонів"
  kilwan_shipwrights: "$ZAN_ADJ$ Корабельні майстри"
  kilwan_shipwrights_desc: "Вправні майстри з обробки пальмової деревини та бавовни для створення морських суден, ця будівля сприяє розширенню флоту під нашим командуванням, підтримуючи наші морські починання."
  bog_iron_smelter: "Болотяна залізоплавильня"
  bog_iron_smelter_desc: "Залізо є основою всієї металургії, і хоча найкраще мати належні та якісні джерела, деяке можна також видобувати з місць поблизу води, де воно накопичується."
  protected_harbor: "Захищена гавань"
  protected_harbor_desc: "Деякі місця більш природно пристосовані для гавані, ніж інші, але за наявності належної інфраструктури ці умови можна покращити будь-де."
  temple: "Храм"
  cathedral: "Собор"
  counting_house: "Рахункова палата"
  merchants_quarters: "Купецькі квартали"
  merchants_quarters_desc: "Ці квартали, що кишать торговцями, вміщують крамниці та склади, слугуючи економічним серцем, де процвітають угоди та обміни."
  marketplace: "Ринок"
  marketplace_desc: "Жваве місце торгівлі, де обмінюються товарами зблизька та здалеку, забезпечуючи життєву силу для місцевої та регіональної торгівлі."
  grand_marketplace: "Великий ринок"
  grand_marketplace_desc: "Це велике місце торгівлі, де процвітають угоди та обміни."
  commerce_center: "Центр торгівлі"
  commerce_center_desc: "Цей жвавий центр торгівлі є місцем, де товари зблизька та здалеку обмінюються на золото. Це б'ється серце місцевої торгівлі."
