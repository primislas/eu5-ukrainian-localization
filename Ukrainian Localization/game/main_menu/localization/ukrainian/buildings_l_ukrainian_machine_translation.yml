  sufi_lodge: "Суфійська ложа"
  sufi_lodge_desc: "Місце для духовної суфійської практики та освіти в релігійному містицизмі, $sufi_lodge$ є центром суфійської відданості. Згадувана під різними назвами, такими як ханака, завія, рибат, даргах і такія, її будівництво та фінансування є актом благочестя та слугує доказом підтримки суфійських практик і поширення [ShowReligionGroupName('muslim')]."
