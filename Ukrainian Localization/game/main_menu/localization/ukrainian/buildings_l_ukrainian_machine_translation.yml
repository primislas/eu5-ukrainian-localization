  alhambra: "Аль-Хамра"
  royal_garden: "Королівський сад"
  royal_garden_desc: "Величезний Королівський сад — це шматочок раю на Землі, місце, де шляхта двору може відпочити та зайнятися надмірними розвагами, насолоджуючись чудовою культивованою природою саду."
  pirate_stronghold: "Піратська твердиня"
  pirate_stronghold_desc: "Жалюгідне кубло покидьків та лиходіїв, найзухваліших та найнезаконніших каперів, ця будівля є серцем піратської республіки."
  entrepot: "Антрепо"
  trading_hub: "Торговий вузол"
  customs_house: "Митниця"
  stock_exchange: "Фондова біржа"
  clearing_house: "Клірингова палата"
  market_warehouse: "Ринковий склад"
  cantonments: "Кантонменти"
  grand_palace: "Великий палац"
  great_madrasa: "Велика медресе"
  tibetan_great_monastery: "Великий тибетський монастир"
  tower_of_belem: "Вежа Белен"
  fortezza_di_sant_andrea: "Фортеця Сант'Андреа"
  fortezza_di_sant_andrea_desc: "Ця фортеця захищала місто Венецію понад триста років."
  great_temple_of_tenochtitlan: "Великий храм Теночтітлану"
  corporation_of_london: "Міська корпорація"
  grand_apartment: "Великі апартаменти"
  versailles: "Версаль"
  sanssouci: "Сансусі"
  berlin_palace: "Берлінський палац"
  schonbrunn_palace: "Палац Шенбрунн"
  rock_of_monaco: "Скеля Монако"
  camara_comptos: "Камара де Комптос"
  camara_comptos_desc: "#italic $camara_comptos$#! — це суверенний суд, що спеціалізується на фінансових справах. Він надихається однойменною установою в Парижі."
  llotja_seda: "Ля Льотжа де ла Седа"
  llotja_seda_desc: "Ля Льотжа, приголомшливий архітектурний шедевр, складається з трьох частин, включаючи #italic 'Sala de Contratació'#!, розкішно прикрашений торговий зал із крученими колонами, де купці можуть укладати контракти, та Павільйон Консульства, що слугує резиденцією для #italic 'Tribunal del Mar'#!. Центральна вежа Ля Льотжа використовується як в'язниця для боржників."
  zwinger: "Цвінгер"
  zwinger_desc: "Цей палацовий комплекс слугує зоною для фестивалів та садів, з місцем для майбутнього замку."
  globe_theatre: "Театр «Глобус»"
  globe_theatre_desc: "Цей дерев'яний розважальний заклад просто неба, ймовірно, захоплюватиме публіку протягом багатьох років. Легкозаймистий."
  globe_theatre_why: "The $globe_theatre$ може бути збудований лише через подію."
  adm_vatican_library: "Ватиканська бібліотека - Адміністративне крило"
  dip_vatican_library: "Ватиканська бібліотека - Дипломатичне крило"
  mil_vatican_library: "Ватиканська бібліотека - Військове крило"
  wisselbank: "Віссельбанк Амстердама"
  bolshoi_theater: "Большой театр"
  bolshoi_theater_desc: "Ця неокласична культурна перлина радує свою публіку постановками світового класу в балеті та опері. Оглушливі вистави гарантовані."
  bolshoi_theater_why: "The $bolshoi_theater$ може бути збудований лише через подію."
  archive_of_the_indies: "Архів Індій"
  archive_of_the_indies_desc: "Цей архів створено для зберігання всієї документації щодо нашої заморської діяльності."
  archive_of_the_indies_why: "The $archive_of_the_indies$ може бути збудований лише через подію."
  hsa_burgtor: "Бургтор"
  hsa_burgtor_desc: "Зведений у головних воротах нашої столиці, the $hsa_burgtor$ є прекрасним свідченням нашого досвіду в оборонних справах, а також дивовижним зразком готичної архітектури."
  bodrum_castle: "Петроніум"
  bodrum_castle_desc: "The $bodrum_castle$ є головною [GetCountry('KNI').GetAdjective] фортецею на материковій частині [ShowRegionName('anatolia_region')]. Він має 4 вежі, збудовані чотирма різними країнами-учасницями: англійцями, французами, італійцями та німцями, і є притулком для християн у цьому районі."
  chi_macau_port: "Договірний порт Макао"
  chi_macau_port_desc: "$chi_macau_port$ представляє територію, орендовану [GetCountry('POR').GetName]. Щороку [GetCountry('POR').GetAdjectiveWithNoTooltip] народ змушений платити значну суму золота як орендну плату за землю."
  chi_missionary_building: "Францисканська місія"
  chi_missionary_building_desc: "$missionary_building_desc$"
  forbidden_city: "Заборонене місто"
  forbidden_city_desc: "$forbidden_city$ це настільки монументальна споруда, що це, безумовно, єдиний палац, який може відповідати справжній могутності [GetInternationalOrganizationType('middle_kingdom').GetName]."
  college_of_poets: "Колегіум поетів і математиків"
  college_of_poets_desc: "Колегіум поетів є маяком наших інвестицій у гуманістичні дослідження і забезпечить митців нашої країни найкращою можливою освітою."
  college_of_poets_why: "The $college_of_poets$ може бути збудований лише через подію."
  bibliotheca_corviniana: "Bibliotheca Corviniana"
  bibliotheca_corviniana_desc: "$bibliotheca_corviniana$ — це відома бібліотека Відродження, що містить величезну колекцію рукописів та книг."
  the_cipher_secretary: "Секретар шифрів"
  the_cipher_secretary_desc: "Секретар шифрів — це державна установа, яка шифрує повідомлення купців та дипломатів для захисту інтересів Республіки."
  teatro_san_cassiano: "Teatro San Cassiano"
  teatro_san_cassiano_desc: "$teatro_san_cassiano$ — це перший у світі публічний оперний театр, що знаменує собою важливу віху в історії виконавського мистецтва та зміцнює роль Венеції як провідного культурного центру."
  doges_palace: "Палац Дожів"
  doges_palace_desc: "Палац Дожів у Венеції слугує резиденцією Дожа, головного магістрата та лідера Венеційської Республіки."
  piazza_san_marco: "Piazza San Marco"
  piazza_san_marco_desc: "Piazza San Marco, або Площа Святого Марка, — це головна публічна площа у Венеції, Італія. Вона відома своєю приголомшливою архітектурою, включаючи Базиліку Святого Марка, Кампанілу та Палац Дожів, та слугує соціальним, релігійним і політичним серцем міста."
  walls_of_ston: "Стіни Стона"
  walls_of_ston_desc: "$walls_of_ston$ — це масивний ланцюг укріплень, що захищає торгове місто Рагуза."
  swi_collegium_helveticum: "Collegium Helveticum"
  swi_collegium_helveticum_desc: "$swi_collegium_helveticum$ навчає найталановитіших священнослужителів швейцарського народу. Хоча й не безпосередньо на швейцарській землі, Колегіум є головним місцем призначення для майбутніх теологів."
  swi_collegium_helveticum_why: "$swi_collegium_helveticum$ може бути побудований лише через подію."
  kastellet: "Kastellet"
  kastellet_desc: "$kastellet$ — це зіркоподібна фортеця в Копенгагені, призначена для захисту міста як від сухопутних, так і від морських атак, що має п'ять бастіонів, з'єднаних товстими стінами, оточених ровом."
  kronborg: "Kronborg"
  kronborg_desc: "$kronborg$ Замок, розташований біля входу в протоку Ересунн, історично слугував ключовою фортецею для контролю та збору мита за прохід з суден, що курсують між Балтійським та Північним морями."
  husuni_kubwa: "Husuni Kubwa"
  husuni_kubwa_desc: "Вишуканий королівський комплекс, спочатку замовлений [GetCharacter('zan_abu_al_mawahib_al_hasan_ibn_suleiman').GetName]. Ця резиденція вирізнялася прекрасною [ShowCultureName('swahili_culture')] архітектурою і використовується як для королівських, так і для торговельних обов'язків, слугуючи де-факто торговими та складськими приміщеннями столиці для багатьох купців по всьому нашому домену."
  magistrato_alla_sanita: "Magistrato alla Sanità"
  magistrato_alla_sanita_desc: "Magistrato alla Sanità — це орган громадської охорони здоров'я, відповідальний за нагляд та управління заходами для запобігання та контролю поширення хвороб, особливо чуми."
  imperial_city_of_hue: "Імперське місто $hue_location$"
  imperial_city_of_hue_desc: "$imperial_city_of_hue$ — це обгороджене муром укріплення в цитаделі столиці та слугує резиденцією імператорської родини $DAI$."
  lighthouse_of_alexandria: "Александрійський маяк"
  lighthouse_of_alexandria_desc: "$lighthouse_of_alexandria$ був високим дивом і одним із Семи чудес стародавнього світу. Нещодавно відбудований, він тепер стоїть як сучасна данина своїй стародавній спадщині, знову направляючи кораблі в Александрійську гавань."
  al_azhar_madrasa: "Медресе Аль-Азгар"
  al_azhar_madrasa_desc: "$al_azhar_madrasa$ є одним із найстаріших і найшанованіших у світі центрів ісламської освіти, відомим своєю вченістю в релігії, праві та арабській мові."
  castel_sant_angelo: "Замок Сант-Анджело"
  castel_sant_angelo_desc: "Спочатку побудований імператором Адріаном як мавзолей для його родини, $castel_sant_angelo$ був перебудований Папами, щоб стати однією з найгрізніших фортець [ShowLocationName('rome')]."
  quirinal_palace: "Квіринальський палац"
  quirinal_palace_desc: "$quirinal_palace$ — це літня резиденція Пап, розташована на однойменному пагорбі, що височіє над містом [ShowLocationName('rome')]."
  ambras_castle: "Замок Амбрас"
  ambras_castle_desc: "$ambras_castle$ — це середньовічна фортеця, реконструйована для служіння як резиденція династії, а також церемоніальне та культурне місце, що зберігає велику колекцію рідкісних предметів, зібраних нашими правителями."
  belvedere_palace: "Палац Бельведер"
  belvedere_palace_desc: "$belvedere_palace$ — це великий палац у Відні, відомий своєю архітектурною величчю та роллю культурного центру, що зберігає величезну колекцію європейського мистецтва."
  sco_palace_of_holyroodhouse: "Палац Голірудгауз"
  sco_palace_of_holyroodhouse_desc: "$sco_palace_of_holyroodhouse$ є символом однієї з багатьох архітектур [ShowCultureName('scottish')] Відродження. Великий готичний палац, Голірудгауз є однією з найцінніших резиденцій [GetCountry('SCO').GetGovernment.GetAdjective] родини."
  fra_louvre_museum: "Музей Лувр"
  fra_louvre_museum_desc: "Колись символ $french_group$ королівської влади, Луврський палац був перетворений на публічний музей, що зберігає найкращі твори [GetCountry('FRA').GetNameWithNoTooltip]."
  ablaq_palace: "Палац Аблак"
  ablaq_palace_desc: "Ця видатна резиденція, що служить єгипетським правителям, прикрашена найкрасивішою архітектурою Аблак. Святість її залів використовується для виготовлення шовкового покриття, відомого як Кісва, що покриває $kaaba$."
  mamluk_barracks: "$mamluk$ Казарми"
  mamluk_barracks_desc: "Казарми, що розміщують елітні рабські підрозділи. Ці об'єкти обладнані необхідними зручностями, які допоможуть іноземним рабам вивчати наші звичаї, вивчати релігійні тексти та тренуватися, щоб стати дисциплінованим воїном."
  bey_fortress: "Бейська фортеця"
  bey_fortress_desc: "Серія земляних укріплень та фортифікацій, такі фортеці часто зустрічаються при великих поселеннях, де вони функціонують як продовження місцевих гарнізонних веж та стін."
  theodosian_walls: "Феодосієві стіни"
  theodosian_walls_desc: "Спочатку побудовані за наказом Костянтина 'Великого', стіни елегантно охороняють одне з найвидатніших міст Європи. Роками пізніше, коли подвійна лінія стін була зведена за правління імператора Феодосія II, оборона міста стала чимось на кшталт легенди, високо цінувалася і навіть вважалася неприступною."
  hanseatic_town_hall: "Ганзейська ратуша"
  hanseatic_town_hall_desc: "Б'ється серце нашого купецького союзу, ратуша є символом нашого широкого багатства та авторитету."
  hanseatic_shipwright_guild: "Ганзейська гільдія кораблебудівників"
  hanseatic_shipwright_guild_desc: "Ця будівля позначає присутність досвідчених ганзейських кораблебудівників."
  ruined_great_wall_of_china: "Стародавня Велика Китайська стіна"
  repaired_great_wall_of_china: "Велика Китайська стіна"
  hand_cannon_guild: "Гільдія ручних гармат"
  urban_parliament_seat: "Міське осідок парламенту"
  polders: "Польдери"
  galley_barracks: "Казарми галер"
  janissary_barracks: "Яничарські казарми"
  ghilman_barracks: "$a_ghilman$ Казарми"
  safaviyya_order_hall: "Зала ордену Сафавійя"
  pounamou_carver: "Різьбяр поунаму"
  bardic_school: "Бардівська школа"
  bardic_school_desc: "Світський заклад навчання, Бардівська школа готує студентів у традиційних мистецтвах поезії, права та історії."
  lutheran_preachers: "Лютеранські проповідники"
  calvinist_preachers: "Кальвіністські проповідники"
  distance_to_rome: "Відстань до [ShowLocationName('rome')]"
  hanseatic_kontor: "Ганзейський контор"
  fondaco: "Фондако"
  venetian_arsenal: "Венеційський арсенал"
  kurultai: "Курултай"
  gallowglass_sept: "Септ галлогласів"
  gallowglass_sept_desc: "Ця невелика громада слугує як головою малого клану, так і тренувальним майданчиком для його броньованих воїнів."
  banking_office: "Банк"
  tribes_of_galway: "Племена Голвея"
  tribes_of_galway_desc: "Місцеві купецькі родини — або «племена» — повністю контролюють місцеву політику."
  copenhagen_dockyard: "Копенгагенська верф"
  caravanserai: "Караван-сарай"
  caravan_stop: "Караванна зупинка"
  cinque_port: "П'ять портів"
  cinque_port_desc: "Одна зі старих П'яти портів, ця верф надає вирішальну військово-морську підтримку короні в обмін на історичну автономію."
  eng_royal_forest: "Королівський ліс"
  eng_royal_forest_desc: "Хартія про ліси дозволяє великим мисливським угіддям перейти під прямий контроль Корони. «Ліс» у цьому сенсі не обов'язково є густо залісненим: просто придатний для полювання."
  can_only_destroy_building_through_parliament_issue_tt: "Можна знищити лише через [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e]!"
  north_sea_shipyards: "Верфі Північного моря"
  enderun_academy: "Академія Ендерун"
  imperial_halic_shipyards: "Імперський арсенал"
  imperial_halic_shipyards_desc: "Масштабний комплекс верфей, сухих доків, залізоливарних заводів, прядилень і навіть шпиталю та в'язниці — це справді може бути базою флоту імперії."
  stannary_court: "Олов'яний суд"
  stannary_court_desc: "Суд, яким користувалися олов'яні шахтарі Корнуолла та Девона, після судової незалежності, наданої їм королівським указом у 1305 році."
  stannary_court_why: "Може бути побудовано лише [GetCountry('ENG').GetName] у [ShowProvinceDefinitionName('cornwall_province')] та [ShowProvinceDefinitionName('devon_province')] після ухвалення Олов'яного закону."
  stannary_court_destroy: "Подія $flavor_eng.67.title$ [Concept('event', 'CONCEPT_PLACEHOLDER')|e] відбулася після #Y 1601#!"
  lieutenancy: "Лейтенантство"
  lieutenancy_desc: "Будівля лейтенантства представляє резиденцію лейтенанта, який керує територією замість правителя."
  not_in_capital_region: "Не може бути побудовано у [Concept('region', 'CONCEPT_PLACEHOLDER')|e] [Concept('capital', 'CONCEPT_PLACEHOLDER')|e]"
  ostrog: "Острог"
  ostrog_desc: "$ostrog$ — це невелика дерев'яна фортифікація, яка будується у віддалених територіях Росії. Через їхню залежність від деревини, остроги відносно недорогі та швидкі у будівництві."
  pomor_outpost: "Поморський аванпост"
  pomor_outpost_desc: "$pomor_outpost$ слугує основною будівлею для збору хутра та риби. Багато селян шукають ці будівлі у сибірських нетрях в надії заробити на життя хутровою торгівлею."
  sofa_stockade: "Софська огорожа"
  sofa_stockade_desc: "$sofa_stockade$ у багатьох аспектах ідентична звичайній $stockade$. Використання $a_sofa_infantry$ замість ополчення чи міліції робить $sofa_stockade$ грізною перешкодою для проходження."
  sofa_barracks: "Софські казарми"
  sofa_barracks_desc: "$sofa_barracks$ — це спеціалізовані $barracks$, які дозволяють власнику набирати [ShowUnitDefinitionName('a_sofa_infantry')] та [ShowUnitDefinitionName('a_mandekalu_cavalry')] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  viceroyalty: "Віцекоролівство"
  viceroyalty_desc: "Будівля віцекоролівства слугує офіційною резиденцією та адміністративним центром для віцекороля, який керує територією від імені правителя."
  barcelona_royal_shipyard: "Королівська верф Барселони"
  barcelona_royal_shipyard_desc: "Королівська верф Барселони, також відома як «Drassanes Reials de Barcelona», розташована поруч із гаванню Барселони. Історія верфі сягає 13 століття і зазнала різних розширень. Вона слугує центром суднобудування, військово-морським арсеналом та сховищем галер, відіграючи значну роль у морській діяльності."
  royal_atarazanas_seville: "Королівські Атаразанас Севільї"
  royal_atarazanas_seville_desc: "Королівські Атаразанас Севільї є найважливішими верфями в Короні Кастилії та одними з найважливіших на Піренейському півострові, створюючи нові кораблі для Корони."
  royal_audience_and_chancery: "Королівська аудієнція та канцелярія"
  royal_audience_and_chancery_desc: "$royal_audience_and_chancery$ — це судова установа та наш найвищий суд з повноваженнями над усією нацією, що символізує нашу королівську правову владу."
  general_archive_of_simancas: "Генеральний архів Сіманкаса"
  general_archive_of_simancas_desc: "$general_archive_of_simancas$ — це перший офіційний державний архів у Європі, спроектований як компактний комплекс в одній будівлі, створений для централізації та збереження життєво важливих документів королівства."
  sevilla_bullfighting_school: "Севільська школа кориди"
  sevilla_bullfighting_school_desc: "$sevilla_bullfighting_school$ — це перша офіційна установа, присвячена підготовці матадорів для цієї знакової культурної традиції."
  el_escorial_palace: "Ель-Ескоріал"
  el_escorial_palace_desc: "Побудований як нова резиденція наших монархів у тому ж комплексі, що й монастир Ордену Святого Августина, $el_escorial$ є пам'ятником могутності та побожності нашої нації."
  school_of_salamanca: "Саламанкська школа"
  school_of_salamanca_desc: "$school_of_salamanca$ — це установа, метою якої є формування сучасної думки в дисциплінах права, етики, економіки та інших."
  segovia_artillery_academy: "Артилерійська академія Сеговії"
  segovia_artillery_academy_desc: "$segovia_artillery_academy$ — це перша академія такого роду, яка зосереджується на вивченні військового використання артилерії, відіграючи вирішальну роль в інноваціях сучасної артилерії."
  brethren_marsh: "Братство Болота"
  brethren_marsh_desc: "Порт належить Братству Болота, морській організації, яка здійснює міжнародну торгівлю та створює оборонну мережу для тих, хто до неї належить. Ці порти є центрами суднобудування."
  cawa_barracks: "Казарми Чава"
  cawa_barracks_desc: "Це місце, де набираються полки Чава."
  kings_manor: "Королівський маєток"
  kings_manor_desc: "Адміністративний центр для судових справ. Використовується Радою Півночі."
  kings_manor_why: "Може бути побудований лише в [ShowLocationName('york')] після заснування Ради Півночі."
  calmecac: "Кальмекак"
  calmecac_desc: "#italic Кальмекак#!, шляхетна школа, пропонує сувору освіту з історії, релігії, військової справи та іншого. Розташований поблизу Великого храму [ShowLocationName('tenochtitlan')], він відіграє ключову роль у підготовці до священства. Молоді простолюдини навчаються в #italic Тельпочкаллі#!, тоді як потенційні шляхетні лідери проходять навчання в #italic Кальмекак#!, часто військовими орденами."
  telpochcalli: "Тельпочкаллі"
  telpochcalli_desc: "#italic Тельпочкаллі#!, на науатлі означає «будинок молодих чоловіків», виховує молодь з п'ятнадцяти років для громадської служби та війни. Життя там включає напружені заняття, холодні ванни та скромні страви для зміцнення майбутніх воїнів нашої нації."
  panaqa_building: "Панака"
  panaqa_building_desc: "Ця локація знаходиться в руках королівської родини попереднього правителя. Нинішній монарх не має влади над цими землями."
  pukara_building: "Пукара"
  pukara_building_desc: "$pukara_building$ — це споруда, розташована на пагорбах або в гірській місцевості, яка служить як сховищем зброї, так і оборонним укріпленням. Вони враховують складність місцевості у своєму дизайні, що робить їх порівняно дешевшими та легшими в будівництві та обслуговуванні, ніж звичайні форти."
  terraces: "Тераси"
  terraces_desc: "$terraces$ — це похилі ділянки для ефективного землеробства в складній місцевості Анд. Побудовані на різних висотних рівнях, тераси можуть забезпечити першокласний ґрунт для багатьох різних культур на невеликій площі."
  tambo: "Тамбо"
  tambo_desc: "$tambo$ — це склад постачання інків. Призначення $tambo$ значно варіюється залежно від розміру споруди. Менші тамбо служать дорожніми зупинками для мандрівників, що проходять повз, тоді як більші можуть навіть служити офісом для адміністрації провінції."
  incamisana: "Інкамісана"
  incamisana_desc: "$incamisana$ — це храм на честь і поклоніння воді та її божественним покровителям. Як поєднання архітектурної краси та технічної винахідливості, $incamisana$ має подвійне призначення: бути релігійною спорудою та іригаційною системою."
  order_commandery: "Командорство Ордену"
  order_commandery_desc: "$order_commandery$ — це будівля, що належить військовим орденам за межами їхньої власної території, яка служить двом цілям: отримання доходів від експлуатації навколишніх земель та набір нових членів для ордену."
  order_commandery_tt: "Власник надає нам [ShowRelationTypeName('military_sponsorship')]"
  royal_society: "Королівське товариство"
  royal_society_desc: "$royal_society$ — це наукова установа, присвячена розвитку наукових знань через дослідження, публікації та сприяння науковій досконалості."
  royal_society_why: "Може бути побудований лише в столиці після заснування Королівського товариства."
  royal_academy_of_arts: "Королівська академія мистецтв"
  royal_academy_of_arts_desc: "$royal_academy_of_arts$ — це установа, присвячена просуванню, натхненню та розвитку світу візуальних мистецтв та архітектури через освіту, виставки та вшанування художнього таланту."
  royal_academy_of_arts_why: "Може бути збудована лише в столиці після заснування Королівської академії мистецтв."
  peel_towers: "Піл-тауер"
  peel_towers_desc: "$peel_towers$ — це оборонна споруда, яка посилює місцеві укріплення та дозволяє землі відновитися після спустошень, завданих під час конфліктів."
  dun_fort: "Осідок клану"
  dun_fort_desc: "$dun_fort$ — це форт, збудований з каменю, що слугує твердинею кожного клану. Ці споруди можуть бути використані кланами для утвердження їхнього унікального становища в нашому суспільстві."
  fortress_church: "Церква-фортеця"
  fortress_church_desc: "$fortress_church$ — це будівля подвійного призначення. Вона слугує своїй громаді як звичайна церква з усіма її релігійними функціями, але також використовується у випадку облог як оборонна споруда."
  kokufu: "Кокуфу"
  kokufu_desc: "Провінційні губернаторства, призначені для управління численними провінціями $japan_region$, ця посада надає велику владу та вплив родині, якій вона призначена."
  kokufu_why_tt: "[ShowBuildingTypeName('kokufu')] не можуть бути збудовані, а натомість надаються [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [GetInternationalOrganizationType('japanese_shogunate').GetName]"
  gosho: "Ґосьо"
  gosho_desc: "Імператорські резиденції, що називаються Ґосьо, це місце, де імператор засновує двір та чиновників. Вони слугують осередком імператорської присутності та впливу."
  yamashiro: "Ямасіро"
  yamashiro_desc: "Збудовані виключно як оборонні позиції у випадку потреби, ямасіро — це укріплені вершини пагорбів із земляними валами та дерев'яними палісадами, а не кам'яними стінами. Резиденції лордів та васалів розташовані біля підніжжя пагорбів, використовуючи укріплені споруди лише у випадку нападу. Деякі з найвражаючих ямасіро включають укріплення на кількох вершинах пагорбів, з'єднані між собою земляними коридорами та багатьма шарами палісадних укріплень."
  yakata: "Яката"
  yakata_desc: "Походячи з резиденцій придворної знаті, яката є місцем, де зосереджується влада родин воїнів. Маючи приміщення для збору своїх васалів, а також деякі елементи для їхньої оборони, вони приймають найкращих представників кожного клану."
  shoen: "Сьоен"
  shoen_desc: "Земля, призначена для приватного володіння певною родиною або храмом, вони функціонують майже як незалежні маєтки або помістя, стаючи великим джерелом впливу та багатства для своїх власників."
  tatara: "Татара"
  tatara_desc: "Традиційний спосіб виплавки заліза та сталі, вони слугують для забезпечення металом для виробництва високоякісних інструментів та зброї."
  clan_shipyards: "Кланські верфі"
  clan_shipyards_desc: "Японія — це земля з довгим узбережжям та багатьма островами. Тому для її народу нерідко мати невеликий флот кораблів для навігації її водами."
  clan_family_shrine: "Родинне святилище"
  clan_family_shrine_desc: "Святилище або храм, присвячений нашій родині, не лише слугуватиме для задоволення духовних потреб нашого клану та нашого народу, але також стане ідеальним місцем для прищеплення поваги до нашої влади серед загального населення."
  korean_gunnery: "Корейська артилерія"
  korean_gunnery_desc: "$korean_gunnery$ — це оборонна модифікація, яка посилює укріплення та підвищує його ефективність проти загарбників із суші чи моря."
  korean_gunnery_land_defense: "Сухопутна артилерія"
  korean_gunnery_land_defense_desc: "$korean_gunnery_desc$\n#Y Взаємовиключно з [ShowBuildingTypeName('korean_gunnery_coastal_defense')].#!"
  korean_gunnery_coastal_defense: "Берегова артилерія"
  korean_gunnery_coastal_defense_desc: "$korean_gunnery_desc$\n#Y Взаємовиключно з [ShowBuildingTypeName('korean_gunnery_land_defense')].#!"
  korean_barracks: "Корейські казарми"
  korean_barracks_desc: "Наші армії потребують постійного поповнення військами, щоб підтримувати їх у відмінному стані. Наявність місцевих центрів набору та навчання дозволить нам мати легкодоступні резерви."
  jurchen_barracks: "Чжурчженські казарми"
  jurchen_barracks_desc: "Ці казарми слугують місцем збору для наших воїнів, щоб готуватися до битви, тренувати наші навички та підтримувати наші горді традиції."
  provincial_garrison: "Провінційний гарнізон"
  provincial_garrison_desc: "Провінції є опорами, що підтримують [GetInternationalOrganizationType('middle_kingdom')]. Для їх захисту від будь-якого нападника необхідно створити гарнізони з постійним розміщенням солдатів."
  kremlin: "Кремль"
  kremlin_desc: "Фортеця $kremlin$ слугує адміністративним і духовним центром, а також символом влади, що відповідає нашому зростаючому впливу. Вона забезпечує вирішальний прихисток для населення від набігів і облог завдяки своїм значним розмірам і грізним стінам та вежам."
  kremlin_why: "Можна побудувати лише в [ShowLocationName('moscow')]."
  papal_archives: "Папські архіви"
  papal_archives_desc: "$papal_archives$ — це зібрання християнських знань та історії, що перебувають під суворим захистом Папської держави."
  stroganov_school_of_iconic_art: "Строгановська школа іконопису"
  stroganov_school_of_iconic_art_desc: "$stroganov_school_of_iconic_art$ присвячена написанню релігійних ікон, типово пов'язаних з [ShowReligionAdjective('orthodox')] вірою. Фінансована впливовою династією Строганових, вона слугує трампліном для початківців-художників."
  stroganov_school_of_iconic_art_why: "Можна побудувати лише в [ShowLocationName('moscow')]."
  ribeira_das_naus: "Рібейра даш Науш"
  ribeira_das_naus_desc: "Місце військово-морського арсеналу, колишня середньовічна військово-морська верф, що називалася #italic tercenas#!, зазнало змін під час будівництва Пасу да Рібейра королем Д. Мануелем I. Створення нових терсен, відомих як #italic Ribeira das Naus#!, на захід від королівського палацу, відіграло вирішальну роль у будівництві кораблів для португальських відкриттів. Ці верфі, найбільші в Португальській імперії, слугували моделлю для закордонних установ, зокрема в Гоа та Кочіні."
  venetian_palaces: "Венеційські палаци"
  venetian_palaces_desc: "$venetian_palaces$ є символом статусу як заможних членів олігархічної знаті, так і впливових гільдій. Оскільки простір у Венеції обмежений, мешканці міста будують палаци, які прагнуть до висоти. Чудова архітектура приваблює людей здалеку, щоб на власні очі побачити венеційську культуру."
  venetian_quarter: "Венеційський квартал"
  venetian_quarter_desc: "Торговий район держави Венеція. Доки існує цей квартал, венеційські купці матимуть значний вплив на справи Константинополя."
  galata: "Галата"
  galata_desc: "Торговий район держави Генуя. Доки існує цей район, генуезькі купці матимуть значний вплив на справи Константинополя."
  novodevichy_convent: "Новодівичий монастир"
  novodevichy_convent_desc: "$novodevichy_convent$ слугує притулком для шляхетних жінок, яких змусили прийняти постриг, а також зміцнює оборонні можливості [ShowLocationName('moscow')] своїми грізними стінами та сторожовими вежами."
  novodevichy_convent_why: "Може бути збудований лише в [ShowLocationName('moscow')]."
  moscow_artillery_yard: "Московський артилерійський двір"
  moscow_artillery_yard_desc: "$moscow_artillery_yard$ є центром технологічних інновацій у виробництві артилерії. Інженери та майстри, що працюють на дворі, сприяють розробці нових конструкцій та вдосконаленню артилерійських технологій."
  moscow_artillery_yard_why: "Може бути збудований лише в [ShowLocationName('moscow')] під час війни."
  bund: "Бунд"
  bund_desc: "Простий, але дуже ефективний резервуар для зберігання води, що використовується для зрошення та забезпечення міст необхідною водою."
  kalari: "Каларі"
  kalari_desc: "Тренувальний майданчик для всіх, хто вивчає бойові мистецтва Каларіпаятту. Він також слугує казармами під керівництвом POSTEDIT_Наїрів."
  ibadat_khana: "Ібадат Хана"
  ibadat_khana_desc: "Ібадат Хана – #italic Дім Поклоніння#! – слугує місцем зустрічей для духовних лідерів різних релігій, де вони беруть участь в обговореннях та дебатах щодо релігійних вчень. Вона має на меті сприяти взаєморозумінню між різними вірами, що веде до висновку, що всі релігії мають спільну мету."
  thema_headquarters: "Штаб-квартира Феми"
  thema_headquarters_desc: "Адміністративні та військові центри, що складають [ShowGovernmentReformName('theme_system')], ці штаб-квартири слугують як пунктами збору для нашої імперської армії, так і місцевими губернаторськими посадами для наших генералів."
  academy_of_sciences: "Академія наук"
  academy_of_sciences_desc: "$academy_of_sciences$ є академічною штаб-квартирою для видатних вчених, науковців та інтелектуалів, як вітчизняних, так і іноземних, які сприяють різноманітному та динамічному інтелектуальному середовищу. Вона проводить широкі дослідження в кількох галузях та публікує численні наукові праці та журнали."
  academy_of_sciences_why: "Може бути збудована лише в [ShowLocationName('neva')]."
  bavarian_academy_of_sciences: "Академія наук"
  bavarian_academy_of_sciences_desc: "$academy_of_sciences$ є академічною штаб-квартирою для видатних вчених, науковців та інтелектуалів, як вітчизняних, так і іноземних, які сприяють різноманітному та динамічному інтелектуальному середовищу. Вона проводить широкі дослідження в кількох галузях та публікує численні наукові праці та журнали."
  bavarian_academy_of_sciences_why: "Може бути збудована лише в [ShowLocationName('munich')]."
  greek_latin_academy: "Греко-латинська академія"
  greek_latin_academy_desc: "$greek_latin_academy$ є освітнім центром для викладання мов Античності, а також граматики, поетики та риторики. Вона приваблює як інтелектуалів, так і простолюдинів завдяки своїй різноманітній навчальній програмі та доступним цінам."
  greek_latin_academy_why: "Може бути побудовано лише в [ShowLocationName('moscow')]."
  sukharev_tower: "Сухарєва вежа"
  sukharev_tower_desc: "$sukharev_tower$ є центром освіти для тих, хто придатний до життя в морі. У ній розташована Школа математики та навігації, яка навчає мистецтву мореплавства та математики, випускаючи одних із найкращих моряків на цій землі."
  sukharev_tower_why: "Може бути побудовано лише в [ShowLocationName('moscow')]."
  the_bock_fortifications: "Укріплення Бок"
  the_bock_fortifications_desc: "Скориставшись Боком, мисом, що пропонує природне укріплення місту, ми збудували грізний комплекс оборонних споруд, який приніс нашому місту прізвисько #italic Гібралтар Півночі#!."
  free_economic_society: "Вільне економічне товариство"
  free_economic_society_desc: "$free_economic_society$ — це науково-економічна організація, присвячена сприянню розвитку в галузях сільського господарства та торгівлі шляхом досліджень, придбання сільськогосподарської техніки, впровадження нових культур та публікацій про передові методи землеробства."
  free_economic_society_why: "Може бути побудовано лише в [ShowLocationName('neva')] після заснування Вільного економічного товариства."
  imperial_academy_of_arts: "Імператорська академія мистецтв"
  imperial_academy_of_arts_desc: "$imperial_academy_of_arts$ — це спеціалізована установа з місією просувати, надихати та розвивати міжнародні впливи у візуальних мистецтвах та архітектурі. Це досягається шляхом відправлення видатних художників та архітекторів за кордон, запрошення гостьових лекторів та постійного просування принципів неокласицизму."
  imperial_academy_of_arts_why: "Може бути побудовано лише в [ShowLocationName('neva')] після заснування Імператорської академії мистецтв."
  moscow_orphanage: "Московський сиротинець"
  moscow_orphanage_desc: "$moscow_orphanage$ — це соціальна ініціатива та експеримент з формування покинутих дітей в ідеальних громадян. Їм надається їжа та притулок на додаток до базової освіти. Розширені можливості для навчання пропонуються на фабриках або в урядових установах після досягнення підліткового віку. Сиротинець дещо схильний до високих показників смертності."
  moscow_orphanage_why: "Може бути побудовано лише в [ShowLocationName('moscow')]."
  institute_of_noble_maidens: "Інститут шляхетних дівчат"
  institute_of_noble_maidens_desc: "$institute_of_noble_maidens$ — це заклад, присвячений освіті шляхетних жінок. Дітей приймають у віці шести років, і вони залишаються в межах інституту протягом кількох років, щоб переконатися, що на них не впливають зовнішні чинники."
  institute_of_noble_maidens_why: "Може бути побудовано лише в [ShowLocationName('neva')] або в освіченій столиці."
  jesuit_college_desc: "Єзуїти навчають наше населення належною [ShowReligionAdjective('catholic')] освітою, посилюючи наші зусилля з навернення своєю присутністю."
  tibetan_great_monastery_desc: "Великий центр [ShowReligionName('tibetan_buddhism')], він є джерелом релігійної влади та [ShowReligionGroupAdjective('buddhist')] навчання, а також усього чернечого життя."
  schonbrunn_palace_desc: "Збудований на місці старого мисливського будиночка нашої династії, цей палац слугуватиме літньою резиденцією для родини нашого правителя."
  rural_clothmaker: "Сільський ткач"
  house_of_parliament: "Будинок парламенту"
  house_of_parliament_desc: "Будівля для розміщення постійного [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e], щоб тримати його в центрі та під кращим контролем."
  royal_court_desc: "Вершина держави, $royal_court$ є центром влади та пишноти монарха."
  order_headquarters_desc: "Резиденція Великого Магістра слугує базою операцій Ордену та є його політичним центром."
  admiralty_desc: "$admiralty$ відповідає за захист наших морських інтересів. Оскільки військова та цивільна адміністрації представлені в одному органі, баланс інтересів буде справедливо представлений."
  war_college_desc: "$war_college$ слугує місцем, де офіцери-ветерани навчають та тренують майбутнє покоління генералів, забезпечуючи перевагу нашої армії."
  tax_assessor_desc: "$tax_assessor$ забезпечує виконання волі правителя щодо збору належної суми податків."
  supreme_court_desc: "Наглядаючи за законом нашої країни, $supreme_court$ є центральною установою для диктування та забезпечення виконання нашого закону."
  art_school_desc: "$art_school_advance_desc$"
  chancery_desc: "$chancery_advance_desc$"
  arts_academy_desc: "$arts_academy$ є домом для одних із найвідоміших митців та людей пера в нашому королівстві. Культивування нашої культури — чудовий спосіб залишити слід в історичних книгах."
  republican_assembly_desc: "Серцем нашої республіки та наріжним каменем нашої адміністрації є не що інше, як $republican_assembly$, місце обговорень, де ми елегантно здійснюємо нашу владу."
  coastal_fort_desc: "З наближенням загрози піратів та ворожих флотів потрібні елементарні берегові укріплення, щоб захистити нас від вторгнень."
  naval_battery_desc: "Природна еволюція оборонної війни завершилася розробкою складних берегових укріплень, готових відбити навіть найважчі ворожі вторгнення."
  irrigation_systems_desc: "Належне обробіток нашої землі є ключовим для годування нашого народу та досягнення процвітання. Розгалужені $irrigation_systems$ забезпечать так необхідну їжу."
  bridge_infrastructure_desc: "З'єднання різних міст, містечок та поселень є життєво важливим для підтримки верховенства закону та центральної влади. Будуючи $bridge_infrastructure$, ми покращимо рух людей та товарів."
  pound_lock_canal_infrastructure_desc: "Маніпуляція припливами та будь-якими річками, що протікають через наше королівство, є життєво важливою для нашого виживання. $pound_lock_canal_infrastructure$ забезпечить наше панування над життєдайною водою."
  university_desc: "Центр думки та інновацій, $university$ є домом для світлих умів вчених та літераторів, які прагнуть сприяти зростанню та грамотності."
  trade_office_desc: "Торгівля та комерція є життєвою силою будь-якого процвітаючого міста. $trade_office$ забезпечує нашим купцям більше можливостей для встановлення вигідних відносин з іноземними торговцями."
  missionary_building_desc: "$missionary_building$ є місцевим центром для релігійних послів та місіонерів, які прагнуть навернути місцевих тубільців до єдиної істинної віри."
  slave_center_desc: "Бізнес з рабами ведеться в $slave_center$. Заможні підприємці приходять сюди, щоб придбати рабську працю, тоді як рейдери та пірати продають своїх полонених."
  overseas_trading_post_desc: "$overseas_trading_post$ — це форпост амбітних купців, які шукають удачі та багатства в бізнесі на землях, далеких від їхньої батьківщини."
  stockade_desc: "$stockade$ — це огорожа, зазвичай з дерев'яних палісадів або інших видів оборонних стін. Хоча не така вражаюча, як $castle$, $stockade$ може уповільнити зусилля ворога щодо окупації місцевості."
  castle_desc: "$castle$ зазвичай є укріпленою резиденцією знаті або штаб-квартирою військового ордену. Однак $castle$ тут слугує насамперед оборонною спорудою, що захищає місцевість від вторгнення."
  bastion_desc: "Через досягнення $army_artillery$, $castle$ більше не достатньо, щоб витримати силу пороху. $bastion$ нівелює перевагу гармати завдяки своєму чудовому дизайну, пропонуючи їм більший пасивний опір та більше місця для дальніх оборонних споруд."
  star_fort_desc: "На відміну від свого попередника, середньовічного $castle$, $star_fort$ — це дуже плоске укріплення, що складається з багатьох трикутних бастіонів по кутах та додаткового рову. Це дозволяє захисникам протистояти ворожій $army_artillery$, при цьому все ще утримуючи піхоту, що піднімається, на відстані."
  fortress_desc: "$fortress$ — це найсучасніша оборонна споруда, створена військовими інженерами для протистояння силі найсучаснішої артилерії. Це складні комплекси, що складаються з взаємопов'язаних бастіонів та казематів, які розроблені для максимізації оборонної вогневої потужності."
  sergeantry_desc: "$sergeantry$ — це будівля, де живуть і тренуються сержанти. Сержанти, походять від латинського #italic serviens#!, «слуги», є озброєною свитою, яку монархи використовують у феодальних системах, що робить їх основними професійними солдатами у своїх арміях."
  warrior_temple_desc: "$warrior_temple$ — це будівля, звідки можуть бути набрані [ShowUnitDefinitionName('a_jaguar_warrior')] та [ShowUnitDefinitionName('a_eagle_warrior')], елітні воїни [ShowReligionAdjective('nahuatl')] країн."
  armory_desc: "Розвиток [ShowInstitutionName('professional_armies')] створив потребу в отриманні нових джерел [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] для наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]. $armory$ можна побудувати в [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e], щоб збільшити його."
  training_fields_desc: "$training_fields$ можна побудувати в [Concept('rural_location', 'CONCEPT_PLACEHOLDER')|e] як інше джерело [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] для наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]."
  barracks_desc: "$barracks$ є ефективнішим способом збільшення [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e], необхідної для наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e], замінюючи $armory$ у [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e]."
  regimental_camp_desc: "$regimental_camp$ є ефективнішим способом збільшення [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e], необхідної для наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e], замінюючи $training_fields$ у будь-якій [Concept('rural_location', 'CONCEPT_PLACEHOLDER')|e]."
  conscription_center_desc: "$conscription_center$ є найефективнішою будівлею, що збільшує [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e], необхідну для наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]. Вона замінює $barracks$ у [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e] та $regimental_camp$ у будь-якій [Concept('rural_location', 'CONCEPT_PLACEHOLDER')|e]."
  salt_collector: "Солеварня"
  salt_collector_desc: "Сіль була супутником людського харчування тисячоліттями та високоцінним товаром. На щастя, море має її в достатку, тому потрібно лише збирати її води та давати їм висохнути, щоб видобути її. Як альтернатива, висохлі озера або русла річок також є хорошими джерелами легкодоступної солі."
  windmill: "Вітряк"
  windmill_desc: "Вітряки бувають різних форм і розмірів, а також з різноманітною структурою вітрил та механізмами, але всі вони слугують для використання сили вітру для подрібнення зерна. В результаті, поживна цінність врожаю може бути значно покращена та перетворена на ширший асортимент готових страв."
  local_smelters: "Сільська плавильня"
  local_smelters_desc: "Матінка-Земля багата на металеві ресурси, але мало що можна з ними зробити, якщо їх спочатку не виплавити. Таким чином, плавильні зазвичай створюються поблизу місць видобутку металів, щоб підготувати їх для легшого транспортування та подальшої обробки в іншому місці."
  sawmill: "Лісопильня"
  sawmill_desc: "Лісисті райони забезпечують достатньо матеріалу, але не можна просто так побудувати будинок з дерева. Після того, як дерево зрубано, його потрібно обробити на лісопильні, перш ніж його можна буде добре використати. Завдяки лісопильням сира деревина перетворюється на придатну деревину."
  fruit_orchard: "Фруктовий сад"
  fruit_orchard_desc: "Фрукти — це щедрий дар природи, що забезпечує наше населення щедрим джерелом їжі. Сади слугуватимуть стабільним джерелом фруктів, задовольняючи потреби нашого народу."
  city_guard: "Міська варта"
  city_guard_desc: "Навіть без ієрархічної організації повинен бути хтось, відповідальний за дотримання закону та порядку. Громадяни, набрані до $city_guard$, слугуватимуть основою нашої військової сили."
  library_desc: "Ці світські установи є місцями для навчання та зустрічей вчених та заможних, де вони можуть досліджувати багато тем та вивчати філософію, математику, релігію та науку. Вони можуть бути незалежними, але часто будуть пов'язані з покровительством та впливом Університету."
  confucian_school_desc: "Ці навчальні заклади зосереджують свої зусилля на освіті та підготовці державних службовців у конфуціанських ідеалах."
  confucian_academy_desc: "Приватні навчальні школи для студентів елітного класу, які вивчають конфуціанські вчення та ідеали, щоб скласти національні іспити на державну службу."
  opera_house_desc: "Величні та вишукані будівлі, що спеціалізуються на показі оперних вистав і зазвичай будуються завдяки покровительству заможних та впливових осіб."
  theater_desc: "Будівля, що використовується митцями для виконання п'єс, концертів та інших театральних творів."
  toll_castle_desc: "Невелике укріплення, розташоване на дорозі, річковій переправі або гірському перевалі, або дуже близько до них, де невеликий контингент охоронців може вимагати сплати мита за проїзд."
  nobility_fortifications_desc: "Ці середні укріплення використовуються місцевою знаттю для здійснення свого впливу на свої родові землі та контролю над селянством."
  rotten_borough_desc: "Представляє парламентський округ з дуже малим електоратом, який можна корумпувати, шантажувати або підкупити, щоб він проголосував за певного кандидата."
  noble_villa_desc: "Шляхта пишається тим, що відокремлена від звичайного натовпу і стоїть вище за нього. Тому вони люблять мати резиденції далеко від великих міських районів, але ці резиденції все одно будуть величними та розкішно обставленими."
  local_noble_delegation_desc: "Хоча вони насолоджуються життям окремо від міських центрів, щоб не ділити свій простір із простолюдинами, шляхта все ще хоче брати активну участь у подіях, що відбуваються в головних містечках та містах, особливо коли це стосується управління. Тому для них нерідко володіти резиденціями скрізь, де вони можуть отримати вплив."
  nobles_recruitment_center_desc: "Шляхта накопичує чимало багатства, майна, яке вони хочуть захистити. В результаті вони, як правило, мають власну особисту охорону і навіть готові до армії війська, які вони набирають з місцевого населення на свою пряму службу."
  parish_church_desc: "Духовенство прагне поширити свій вплив якомога далі, щоб переконатися, що все населення має доступ до істинної віри. Навіть найменше поселення придатне для того, щоб мати священика для задоволення духовних потреб місцевого населення."
  local_shrine_desc: "Релігія зазвичай має місця зі значною духовною значущістю. У цих місцях духовенство швидко будуватиме місцеві святилища, щоб переконатися, що населення належним чином шанує ці місця."
  clerical_archives_desc: "Духовенство схильне накопичувати всілякі знання, зазвичай не лише богословського характеру. Їхні архіви містять усілякі писання і слугують джерелом мудрості, хоча зазвичай доступ до них досить обмежений самим духовенством."
  spiritual_retreat_desc: "Люди, присвячені вірі, прагнуть піднятися над земними справами та наблизитися до божественності. В результаті з'являються місця, де вони можуть спілкуватися зі своєю вірою, окремо від будь-яких мирських прихильностей."
  warrior_monks_training_grounds_desc: "Бути відданим вірі не обов'язково означає, що потрібно відмовитися від насильства. Тому є багато ченців, які присвячують себе не лише культивуванню своєї віри, а й своїй військовій доблесті."
  guild_hall_desc: "Місцеві ремісники завжди матимуть проблеми з тим, щоб їхні товари досягли достатньої кількості людей, якщо конкуренція занадто велика. Тому їхні об'єднання схильні створювати гільдії, де вони можуть вирішувати, як певний товар має бути вироблений та розподілений."
  merchants_guild_desc: "Торгівля та комерція – це те, що забезпечує потік економіки. Щоб вона текла природно та ефективніше, торговці організовуються в гільдії, щоб не було перешкод між їхніми різними торговими шляхами, і натомість усі вони сприяли посиленню потоку."
  local_markets_desc: "Незалежно від того, наскільки ізольоване поселення, завжди є люди, готові подорожувати до нього та з нього, щоб перевозити будь-які товари та припаси, які можуть знадобитися поселенню, та отримувати прибуток від того, що воно може виробляти. Ці купці створюють місцеві ринки, щоб забезпечити потік комерції."
  burgher_mansion_desc: "Навіть якщо вони не належать до шляхти, як тільки хтось накопичить достатньо багатства, вони, безсумнівно, наслідуватимуть життя тих, хто народився з ним. Тому багаті міщани будують для себе особняки такі ж розкішні, як і у вищої шляхти."
  artisan_guilds_desc: "Будь-який продукт вимагає досвіду та майстерності для виробництва. Люди, здатні це робити, створюють майстерні, щоб присвятити себе цьому виробництву, і приймають учнів, щоб передати навички."
  local_assembly_desc: "Простолюдини перебувають у владі уряду, але вони не завжди повністю відокремлені від нього. Збираючись місцево між собою, вони можуть обговорювати найважливіші питання, що їх стосуються, і висловлювати свої занепокоєння відповідним органам влади."
  pirate_haven_desc: "Простолюдини залежать від сили своїх рук, щоб забезпечити собі прожиток. Деякі можуть навіть вдатися до розбою та піратства, особливо на берегах, які не отримують належної уваги від уряду, де вони можуть створювати приховані бухти, звідки запускати свої рейди на нічого не підозрюючі судна."
  peasants_training_grounds_desc: "Поки потрібно скликати ополчення, для населення корисно мати місцеві тренувальні майданчики, де вони можуть практикувати основи бою, щоб принаймні вони знали, яка сторона меча правильна."
  festival_grounds_desc: "Як і всі, простолюдини люблять веселощі та святкування щоразу, коли мають нагоду. Для цього в кожному поселенні виділяються спеціальні майданчики для проведення фестивалів та урочистостей."
  peasants_hunting_grounds_desc: "Якщо простолюдини мають законний дозвіл на полювання, вони швидко створять для цього спеціальні угіддя, щоб вони могли експлуатувати дику природу будь-якої місцевої лісової зони."
  local_schools_desc: "Освічене населення є продуктивним. Тому місцеві школи допоможуть навчати простолюдинів і зрівняти їх з вищими класами. Тому нікого не дивує, що вони схильні підтримувати такі школи скрізь, де це можливо."
  local_newspaper_desc: "Інформація – це знання, а знання – це прогрес. Місцеві газетні агентства таким чином допоможуть поширювати інформацію про поточний стан подій серед населення, на благо всіх."
  cantonments_desc: "Кантонмент слугуватиме нашій армії постійним центром набору військового персоналу та пропонуватиме житло нашим військам."
  grand_palace_desc: "$grand_palace$ пропонує грандіозну демонстрацію культурних досягнень нашого суспільства, все підготовлено для нашого монарха та найближчих до них людей."
  great_madrasa_desc: "Місце вищої освіти, $great_madrasa$ надає місце для наших найшанованіших вчених, щоб поширювати свої знання з медицини, архітектури та ісламського права."
  tower_of_belem_desc: "Захищаючи гирло річки Тежу, $tower_of_belem$ є як військовою фортецею, здатною захистити наш порт, так і символом нашого морського панування."
  great_temple_of_tenochtitlan_desc: "Присвячений богові війни Уїцилопочтлі та богові дощу й землеробства Тлалоку, $great_temple_of_tenochtitlan$ зі ступінчастою конструкцією дозволить нам легке розширення в майбутньому."
  corporation_of_london_desc: "В руках купців і торговців, $corporation_of_london$ контролює значну частину зростання та розвитку $london$."
  grand_apartment_desc: "Символ контролю правителів над $london$, $grand_apartment$ нав'язує наш контроль з берега річки."
  sanssouci_desc: "Розташований подалі від галасливого шуму наших міст, $sanssouci$ — це скромний одноповерховий палац, оточений величезними садами та виноградниками."
  berlin_palace_desc: "Побудований у центрі $berlin$ між Шпрее та її каналом, $berlin_palace$ дозволить нашим правителям краще контролювати $berlin$. Через його складну історію будівництва, він також демонструє силу нашої держави, яка здатна відстоювати свої вимоги попри всі перешкоди."
  versailles_desc: "Палац $versailles$ — це великий комплекс королівської резиденції з кількома салонами, залами, покоями, каплицею і навіть оперою. Дипломати та члени вищих кіл регулярно приїжджають до палацу, щоб вести справи з королівською родиною $french_group$."
  enderun_academy_desc: "$enderun_academy$ — це палац і школа-інтернат у палаці Топкапи, яка навчає студентів, відібраних за $devshirme_system_policy$, щоб вони стали успішними $janissaries_advance$ та державними діячами $turkish_culture$."
  rock_of_monaco_desc: "$rock_of_monaco$ — це високий моноліт міста Монако. Хоча сама велика скеля має невелике значення, місто Монако навколо неї слугує місцевим притулком для піратів у Середземному морі."
  calvinist_preachers_desc: "Як члени $reformation$, $calvinist_preachers$ представляють місцевих місіонерів $calvinist_ADJ$ віри, які поширюють свої вчення серед усіх сусідніх $catholic_ADJ$ людей."
  schwaz_mine_desc: "$schwaz_mine$ — це процвітаюча шахта з великою кількістю срібних і мідних руд. Ресурси, зібрані в результаті гірничих робіт, фінансуватимуть дипломатичні та військові кампанії її власника протягом століть."
  urban_parliament_seat_desc: "$urban_parliament_seat$ — це місце політичної влади місцевих $burghers$, що населяють місто. Присутність таких будівель значно збільшує вплив гільдій та купців."
  adm_vatican_library_desc: "Ватиканська апостольська бібліотека — це величезна бібліотека Святого Престолу. Вона володіє колекціями інформації та документації від класичного періоду до наших днів."
  dip_vatican_library_desc: "$adm_vatican_library_desc$"
  mil_vatican_library_desc: "$adm_vatican_library_desc$"
  wisselbank_desc: "Банк $amsterdam$, також відомий як $wisselbank$, є обмінним банком, який відіграє значну роль у створенні та захисті стандартів карбування монет. Будучи першим у своєму роді, $wisselbank$ впливає на нові державні банки по всій $europe$."
  entrepot_desc: "Розташований у серці галасливого та жвавого ринку, $entrepot$ є найкращим місцем для процвітання наших торговельних зусиль."
  trading_hub_desc: "Життєво важливий пункт у нашій торговельній мережі, $trading_hub$ є чудовим місцем для продажу та купівлі багатьох екзотичних та місцевих товарів."
  customs_house_desc: "Наше королівство є домом для жвавого ринку, де багато купців імпортують захоплюючі товари з далеких країн. Регулювання таких товарів та контроль цього потоку підпадає під юрисдикцію $customs_house$."
  stock_exchange_desc: "Важливе місце зустрічі брокерів, купців та інвесторів, $stock_exchange$ значно полегшує бізнес та потік акцій у акціонерних товариствах."
  clearing_house_desc: "Обмін платежами та розширені транзакції є одними з основних видів бізнесу в нашому королівстві. $clearing_house$ пропонує середовище для подальшого посилення нашого контролю над торгівлею, що проходить через наше королівство."
  market_warehouse_desc: "Збільшений обсяг товарів, що надходять на наші ринки та з них, вимагає збільшення нашої здатності їх зберігати, шляхом будівництва $market_warehouse$."
  sugar_plantation_desc: "Вирощування землі та цукрової тростини є прибутковою справою. Збудувавши $sugar_plantation$, ми можемо досягти успіху в отриманні опори в прибутковій торгівлі $sugar$."
  cotton_plantation_desc: "Поля по всьому нашому королівству можуть бути використані для виробництва величезної кількості $cotton$, затребуваного товару, за допомогою організованих плантацій."
  tobacco_plantation_desc: "Вирощування $tobacco$ шляхом будівництва $tobacco_plantation$ не тільки сприятиме нашому процвітанню, але й забезпечить частку прибутків від багатої торгівлі."
  jewelry_guild_desc: "Маніпуляції з дорогоцінними каменями та цінним камінням у коштовності найвищої якості роблять $jewelry_guild$ затребуваним заняттям через його передбачуваний прибуток."
  north_sea_shipyards_desc: "Нідерландські верфі мають перевагу в тому, що можуть наймати найкращих ремісників та інженерів Європи, що робить їх дуже ефективними та здібними."
  dock_desc: "Док – це найпростіша берегова інфраструктура, що дозволяє будувати та ремонтувати судна."
  dry_dock_desc: "Це портова споруда, що забезпечує необхідну інфраструктуру для будівництва та ремонту суден в ізольованих сухих басейнах, які можна заповнювати водою за бажанням. Ця легкість доступу до корпусу судна значно покращує ефективність та потужність будівельного процесу."
  shipyard_desc: "Верф розширює можливості нашого порту до нових висот, збільшуючи кількість суден, які можуть бути обслужені та побудовані, а також покращуючи умови для екіпажів цих суден."
  grand_shipyard_desc: "Ця масивна портова інфраструктура – це видовище, з незліченними суднами та моряками, що прибувають та відпливають у будь-який момент. Її здатність будувати та ремонтувати цілі флоти робить її ключовим пунктом для нашої зростаючої морської могутності."
  naval_base_desc: "Цілий відрізок узбережжя був огороджений та спеціалізований для будівництва та обслуговування нашого великого флоту. Це невелике місто моряків, ремісників та інженерів здатне самостійно будувати цілі флотилії, що робить його одним з найважливіших стратегічних центрів нашої країни."
  distillers_guild_desc: "Це братство Дистиляторів контролює секрети та виробництво будь-яких дистильованих товарів у місті. Усі, хто бажає навчитися цьому ремеслу, змушені приєднатися до них та розширити їхню монополію."
  distiller_manufactory_desc: "Центр виробництва, де таємниця старовинної гільдії тоне у великому попиті на збільшені обсяги дистильованих товарів. Ця потреба сформувала нову та сучасну систему виробництва, що пріоритезує кількість та прибуток."
  brewery_desc: "Гільдія, де зерно або фрукти можуть бути перетворені на смачні та п'янкі напої, які подобаються всім верствам суспільства."
  brewery_manufactory_desc: "Необхідність у величезних обсягах пивоварних напоїв призводить до більш централізованих центрів виробництва, де старий ремісничий процес був систематизований та механізований."
  glass_guild_desc: "Мистецтво формування $glass$ та виробництва з нього виробів є делікатною справою. Спеціалізовані центри виробляють широкий асортимент товарів від практичних контейнерів до декоративних вітражів."
  saltpeter_guild_desc: "Вироблений трудомістким процесом, $saltpeter$ є життєво важливим для виробництва пороху, а отже, для державної оборони. Його видобувають з ґрунтів, багатих на нітрати, а також з гною або розкладаної органічної речовини."
  lacquerware_guild_desc: "Поєднання соку лакових дерев у кілька шарів надає виробленим предметам їхній фірмовий глянцевий блиск у $lacquerware_guild$. До таких затребуваних високоякісних предметів належать меблі, церемоніальні скриньки та інше. Лакові вироби високо цінуються за їхню красу та стійкість."
  gun_smith_desc: "Присвячений виробництву та обслуговуванню вогнепальної зброї, $gun_smith$ виробляє різноманітну якісну вогнепальну зброю, а також пов'язані компоненти, такі як стволи, замки та спускові механізми."
  weapon_guild_desc: "Об'єднання ремісників, відповідальних за виробництво різноманітної зброї, такі гільдії є опорою державної оборони, забезпечуючи звичайного солдата зброєю, пристосованою до конкретних військових потреб та обсягів."
  cloth_guild_desc: "Виробництво різноманітних текстильних виробів часто є наріжним каменем економіки королівства. $cloth_guild$, що включає фарбувальників, ткачів та валяльників, підтримує стабільне виробництво, а також набір стандартів для забезпечення необхідної якості та обсягу."
  fine_cloth_guild_desc: "Потреба в розкішних текстильних виробах, таких як тонкоткана $wool$, шовк та оксамит, є прибутковим бізнесом, який часто залучає аристократію. Розвиваючи передові технології ткацтва та обробки тканин, ці центри інновацій часто значно сприяють місцевій та державній економіці."
  tannery_desc: "Відповідальна за виробництво шкіри, $tannery$ виробляє важливі предмети, такі як взуття, сідла та книжкові палітурки. Використовуючи передові технології для обробки шкур тварин, шкіряник забезпечує довговічність, а також естетичність $leather$."
  paper_guild_desc: "$paper$ є наріжним каменем кожного королівства, оскільки він використовується в усіх його аспектах, від адміністрації до освіти і навіть торгівлі. Таким чином, $paper_guild$ забезпечує належний стандарт виробництва та обсягу, а також унікальну техніку, що включає замочування, подрібнення або пресування основних матеріалів, таких як льон, бавовна або інші рослинні волокна."
  scriptorium_desc: "Спеціалізований центр, де писарі ретельно копіюють рукописи, $scriptorium$ виробляє різноманітні тексти релігійного, юридичного або навіть літературного характеру, намагаючись зберегти та поширити знання."
  tools_guild_desc: "Будь то від простого молотка до перших верстатів; $tools$ завжди були важливою частиною нашого суспільства. $tools_guild$ спеціалізується на виробництві цих зручних пристроїв."
  porcelain_guild_desc: "$porcelain$ – це вид кераміки, що характеризується міцністю та прозорістю завдяки вітрифікації матеріалів, спричиненій високими температурами. $porcelain_guild$ спеціалізується на створенні та декоруванні таких виробів."
  naval_supplies_guild_desc: "$naval_supplies$ представляють усе необхідне для будівництва суден, від базової деревини до смоли, канатів, льону, вітрил та різних інших матеріалів. Хоча це величезний та різноманітний торговий товар, $naval_supplies_guild$ охоплює всі матеріали, необхідні для суднобудування."
  dyes_guild_desc: "Доки ткали текстиль, існував ринок для вишуканих $dyes$. $dyes_guild$ створює $dyes$ з доступних рослин."
  putrefaction_works_desc: "$saltpeter$ – це цінна хімічна сполука, яка використовується як добриво, сіль для обробки м'яса та як ключовий інгредієнт для пороху. $putrefaction_works$ слугує альтернативним способом отримання $saltpeter$ у випадках, коли гірничі роботи недоступні."
  naval_supplies_manufactory_desc: "Подібно до $naval_supplies_guild$, $naval_supplies_manufactory$ зосереджується на виробництві $naval_supplies$. Завдяки збільшеним розмірам, обсяг доступних припасів для будівництва кораблів значно вищий."
  weapon_manufactory_desc: "Різноманітна зброя, така як мечі, піки та луки, складає основу $weaponry$ кожної армії. Використовуючи різні матеріали, $weapon_manufactory$ створює холодну та просту метальну зброю всіх типів."
  fine_cloth_manufactory_desc: "$fine_cloth$ традиційно є ознакою статусу для еліт та заможних верств. $fine_cloth_manufactory$ зосереджується на виготовленні цих цінних тканин, використовуючи $cloth$ або $silk$."
  cloth_manufactory_desc: "$cloth$ представляє різні тканини та одяг, виготовлені з вовни та льону. $cloth_manufactory$ спеціалізується на виробництві $cloth$ з різних матеріалів, таких як $wool$, $cotton$ та $fiber_crops$."
  paper_workshop_desc: "$paper$ є необхідністю для всіх видів передового обліку, адміністрування та поширення знань. $paper_workshop$ спеціалізується на створенні нового $paper$ з целюлози, $fiber_crops$ та $lumber$."
  printing_press_shop_desc: "Використовуючи легко вироблені та замінні деталі, $printing_press_shop$ зменшить наші витрати як на працю, так і на матеріали для виробництва та поширення письмових документів серед нашого населення."
  glassworks_desc: "Удосконалення традиційних технік видування скла та додавання нових матеріалів полегшують масове виробництво $glass$."
  perfumery_desc: "Вирощуючи квіти та видобуваючи їхню есенцію, $perfumery$ виробляє предмет розкоші для заможних."
  porcelain_manufactory_desc: "Виробництво $porcelain$ є результатом тривалих алхімічних експериментів, що дозволяє отримати альтернативу дорогому імпорту з-за моря."
  tannery_manufactory_desc: "Досягнення в хімії значно скорочують процес дублення шкур тварин і дозволяють виробляти $leather$ вищої якості."
  lacquerware_manufactory_desc: "Удосконалення процесу фарбування та нанесення лаку роблять $lacquerware$ дешевшим та швидшим у виробництві."
  fine_cloth_mill_desc: "Працюючи на водяних колесах, $fine_cloth_mill$ може масово виробляти $fine_cloth$ з високою швидкістю."
  textile_mill_desc: "Працюючи на водяних колесах, $textile_mill$ може масово виробляти $cloth$ з високою швидкістю."
  steel_mill_desc: "Збільшення надійності наших печей та виробничого процесу уможливило виробництво $steel$ в економічно вигідних масштабах."
  iron_foundry_desc: "$tools$ зроблені з $iron$ будуть міцнішими за будь-яке інше відоме виробництво, при цьому не вимагаючи такого ж трудомісткого процесу виготовлення."
  weapon_factory_desc: "Військове значення значно зросло в останні роки. Тому потрібні кращі та нові методи виробництва озброєння для наших солдатів, і створюються цілі фабрики, присвячені цій меті."
  monastery_desc: "Місце усамітнення та споглядання, монастирі є притулком для тих, хто бажає присвятити своє життя спілкуванню з небесами. Їхні землі призначені для навчання та роздумів, і великі знання зазвичай зберігаються за їхніми стінами."
  madrasa_desc: "Центр знань, присвячений розвитку навчання, медресе збирають у своїх стінах багатьох студентів, багато з яких часто приїжджали здалеку. Всередині обговорюються як земні, так і релігійні питання, і їхня мудрість доступна для всіх."
  orthodox_monastery_desc: "POSTEDIT_orthodox духовенство, як правило, має сильний вплив на владу та авторитет, і їхні монастирі служать осередком такої влади. Перебуваючи під захистом ікон, які вони тримають, вони є хранителями традиційних цінностей країни."
  miaphysite_monastery_desc: "POSTEDIT_miaphysite сповнений обрядів та церемоній, які виконувалися з початку POSTEDIT_christian. Монастирі є хранителями цих обрядів, оскільки лише в їхніх стінах слово Боже старанно та ретельно вивчається."
  bailiff_desc: "Населення, залишене напризволяще, є лише гніздом пороку та лінощів. Тому правління країною має бути нав'язане через місцевих представників, яким доручено підтримувати закон і порядок у кожному поселенні."
  fishing_village_desc: "Вода – джерело життя, і тому вона сповнена життя. Нерідко цілі села можуть розвиватися на будь-якому березі, користуючись таким багатим середовищем, і люди там заробляють на життя будь-якими водними істотами, яких вони можуть спіймати."
  farming_village_desc: "Їжа – це те, що змушує цивілізацію функціонувати. Поля та фермерські ділянки можуть не тільки годувати населення, але й дозволяти їм годувати багатьох інших тварин та отримувати від них інші продукти. Ця комбінація є ключовою для процвітання будь-якого поселення."
  forest_village_desc: "Ліси та дикі землі не такі негостинні, як можна було б подумати, бо їхні землі багаті на тварин, на яких можна полювати, як заради їхнього м'яса, так і заради їхніх шкур. Тому люди зазвичай охоче оселяються поблизу будь-якого лісу з багатим тваринним світом, який вони можуть експлуатувати."
  tar_kiln_desc: "Смола використовувалася з давніх часів, оскільки її герметизуючі та водонепроникні властивості незамінні. Тому будь-яка лісиста місцевість є родючим ґрунтом для печей, що використовуються для видобутку смоли з деревини шляхом її сухої перегонки."
  horse_breeders_desc: "Чи то для війни, чи для перевезення наших товарів по країні, коні потрібні скрізь. З цієї причини сім'ї почали розводити цих чудових скакунів, щоб задовольнити ці потреби."
  market_village_desc: "Оскільки торгові центри потрібні для збору всієї торгівлі в певних районах, вони виникають, щоб виконувати цю роль і давати початок невеликим буржуазним громадам."
  stone_quarry_desc: "Камінь – чудовий будівельний матеріал, що використовується для будинків, акведуків, храмів, мостів та іншого. На жаль, його потрібно видобувати, а високоякісний будівельний камінь не завжди є в достатку. Щоб задовольнити наші потреби, ми можемо заснувати каменоломні в районах з якісним матеріалом."
  lumber_mill_desc: "Деревина сама по собі має відносно низьку цінність, якщо її не розрізати на корисні дошки. Щоб максимізувати її корисність та легкість транспортування, розвиваються лісопильні заводи, що дозволяють легко виготовляти дошки з рубаних дерев."
  fiber_crops_farm_desc: "Різноманітні рослинні волокна є основними для виробництва мотузок, взуття, одягу та інших товарів, необхідних нашому населенню. Вирощуючи ці культури, ми можемо покладатися на власне виробництво та зменшити залежність від імпорту."
  sand_pit_desc: "Пісок має багато застосувань, зокрема як будівельний матеріал, але певні види піску також ідеально підходять для виготовлення скла при нагріванні. Ми можемо створювати піщані кар'єри для видобутку цього ресурсу для наших різноманітних потреб."
  clay_pit_desc: "Глина має вирішальне значення для нашої гончарної промисловості, а також ідеально підходить для виготовлення черепиці для наших домівок. Ми можемо заснувати глиняні кар'єри в районах, де цей матеріал є в достатку, забезпечуючи надійне джерело для наших гончарів."
  charcoal_maker_desc: "Деревне вугілля спалюється для обігріву наших домівок та живлення наших кузень. Спалюючи доступну нам велику кількість деревини, ми можемо виробляти деревне вугілля, яке генерує більше тепла, ніж деревина у своєму сирому вигляді."
  elephant_hunting_grounds_desc: "Через свій розмір слонів не можна просто розводити на звичайних фермах, як коней чи корів. Натомість ми створимо мисливські угіддя для слонів, які функціонуватимуть як напівдикі ферми, дозволяючи нам вибирати тих слонів, які найкраще відповідають нашим потребам."
  sheep_farms_desc: "Хоча наші пастухи вже розводять овець на наших луках і пагорбах, нам потрібен більш фермерський підхід для збільшення продуктивності. Вівчарські ферми розводитимуть більшу кількість овець для більшого виробництва."
  lutheran_preachers_desc: "Як члени $reformation$, $lutheran_preachers$ представляють місцевих місіонерів $lutheran_ADJ$ віри, які поширюють свої вчення серед усіх сусідніх $catholic_ADJ$ людей."
  preachers_work_for_free: "Слово Боже поширюється безкоштовно!"
  temple_desc: "$temple$ — це місце поклоніння, присвячене релігійним обов'язкам $clergy_estate$. Хоча храми можуть мати різні форми та вигляди залежно від місцевої релігії, їхнє призначення залишається незмінним."
  cathedral_desc: "$cathedral$ — це більша будівля $temple$, яка пропонує релігійні послуги значно більшій кількості місцевого населення. Як релігійний центр міста, члени всіх класів обов'язково відвідують цю будівлю для свого поклоніння."
  counting_house_desc: "$counting_house$ — це офіс, який веде фінансові книги підприємств міста. Також обробляються зустрічі та листування, пов'язані з бізнесом, що стосується платежів."
  minting_office_desc: "$minting_office$ — це головна виробнича будівля, яка створює валюту держави. Різні метали надходять до офісу, щоб бути викарбуваними в монети для громадськості."
  granary_desc: "$granary$ — це сховище, яке запобігає забрудненню збереженої їжі мишами та іншими тваринами. Воно також збільшує кількість їжі, доступної населенню в часи потреби."
  wharf_desc: "$wharf$ — це морська споруда в порту, де кораблі можуть причалювати для перевантаження свого вантажу та для отримання технічного обслуговування та ремонту."
  medical_school_desc: "Зі зростанням $scientific_revolution$ галузь медицини робить нові прориви та зростає у своїх методах та набутих знаннях. $medical_school$ забезпечує передачу цих знань новим поколінням лікарів."
  hospital_desc: "Історія $hospital$ давня, оскільки багато стародавніх цивілізацій мали свою версію установи, яка розміщувала хворих. У середньовічний період $hospital$ розвинувся далі, оскільки тепер він додатково зосереджується на охороні здоров'я та одужанні своїх пацієнтів."
  slave_market_desc: "Центр торгівлі, де купують і продають $slaves$, підживлюючи економіку примусовою працею."
  port_authority_desc: "$port_authority$ контролює морський рух, забезпечуючи дотримання правил, збираючи тарифи та гарантуючи безпечний потік товарів та бізнесу через гавань."
  pounamou_carver_desc: "Майстер, що володіє мистецтвом виготовлення складних артефактів з Поунаму, шанований за створення предметів культурного та духовного значення."
  hanseatic_kontor_desc: "Цей торговий офіс, керований Ганзейським союзом, є життєво важливим наріжним каменем для сприяння прибутковій торгівлі між північноєвропейськими містами та закордонними ринками."
  fondaco_desc: "Багатофункціональний склад та житло для іноземних купців, де ведеться бізнес та зберігаються товари перед розповсюдженням."
  venetian_arsenal_desc: "Це державна верф, відповідальна за швидке будівництво потужного військово-морського флоту, що відіграє ключову роль у морському пануванні."
  kurultai_desc: "$kurultai$ є символом влади місцевої ради, слугуючи арбітром важливих рішень та збору чоловіків до армії."
  order_stronghold_desc: "Укріплена база військових орденів, стратегічно розташована для оборони та як відправна точка для хрестових походів або територіального контролю."
  banking_office_desc: "Через $banking_office$ ми надаємо невеликі інвестиції населенню інших країн. Водночас це слугуватиме базою для операцій наших асоційованих купців."
  copenhagen_dockyard_desc: "$copenhagen_dockyard$ забезпечує необхідні кораблі та моряків для забезпечення нашого морського панування. Побудована в добре пристосованих гаванях $copenhagen$, верф може працювати швидше, ніж більшість інших конкурентів."
  caravanserai_desc: "$caravanserai$ є важливими віхами вздовж Шовкового шляху, забезпечуючи відпочинок як купцям, так і тваринам, що перевозять цінні товари."
  caravan_stop_desc: "$caravan_stop$ є важливими віхами вздовж торгових шляхів пустелі, забезпечуючи відпочинок як купцям, так і тваринам, що перевозять цінні товари."
  seat_of_cardinal_desc: "Духівник, піднесений до рангу кардинала, надає нам значний вплив у $catholic_church$."
  galley_barracks_desc: "$galley_barracks$ розмістить рабів, які використовуються для веслування на наших галерах, і запропонує місце для будівництва нових кораблів."
  uffizi_desc: "$tuscan_uffizi_desc$"
  polders_desc: "$polders_advance_desc$"
  hand_cannon_guild_desc: "$hand_cannon_guild_advance_desc$"
  ruined_great_wall_of_china_desc: "Гігантська серія стін та укріплень, що охоплює кордони великої Імперії кількома частинами, а не суцільною стіною, $ruined_great_wall_of_china$ почала будуватися століття тому. Хоча багато династій здійснювали її ремонт та розширення, століття занедбаності взяли своє, і більша її частина є не більше ніж руїнами."
  repaired_great_wall_of_china_desc: "Відремонтована та добре підтримувана лінія укріплень захистить наші кордони від будь-якого іноземного варварського вторгнення."
  rural_clothmaker_desc: "Невелика гільдія, де текстиль виготовлявся вручну з використанням місцевих матеріалів. Вона відіграє життєво важливу роль у місцевій економіці, забезпечуючи одягом та торговими товарами."
  mason_desc: "Оснащений кваліфікованими робітниками, які ріжуть та формують камінь для будівництва, $mason$ є незамінним для будівництва міцних та довговічних споруд."
  embassy_desc: "Передова дипломатії та місце зустрічі, де представники іноземних держав ведуть переговори та формують потенційні союзи."
  firearms_manufactory_desc: "Часто описувана як життєва сила нашого військово-промислового комплексу, $firearms_manufactory$ виробляє вогнепальну зброю багатьох форм і розмірів, таку як пістолети, рушниці та інше."
  cannon_foundry_desc: "У $cannon_foundry$ гармати відливаються та збираються з розплавленого металу. Ключове для оснащення армій артилерією, що підвищує військові можливості держави."
  cannon_maker_desc: "Гільдія, що спеціалізується на виготовленні та збиранні гармат. Ця потужна зброя є незамінною для облог та оборони."
  firearms_factory_desc: "Зростаючі вимоги щодо захисту наших кордонів супроводжуються збільшенням виробництва та квот попиту з боку нашого військово-промислового комплексу. Ця потреба задовольняється $firearms_factory$, де виготовляється велика кількість зброї."
  cannons_factory_desc: "Великомасштабна фабрика, де гармати виготовлялися масово. Її розширена виробнича потужність є чудовим способом задовольнити зростаючі потреби наших збройних сил."
  settlement_building_desc: "Це представляє створення нового поселення з основними елементами, такими як магазини, базова будівельна підтримка та торгові пости, щоб заохотити мігрантів до цього місця."
  janissary_barracks_desc: "Місцева будівля, де молоді раби отримують військову підготовку, щоб стати яничаром."
  ghilman_barracks_desc: "Місцева будівля, де молоді раби отримують військову підготовку, щоб стати $a_ghilman$."
  safaviyya_order_hall_desc: "Обитель ордену Сефевія ($safaviyya_order_hall$) — це будівля, присвячена суфійському ордену Сефевія. Хоча вона має глибоко релігійний характер, будівля також слугує військовим тренувальним майданчиком для $qizilbash$."
  alhambra_desc: "Альгамбра ($alhambra$), що означає #italic Червона#!, — це палацово-фортечний комплекс, розташований у Гранаді, який вважається вершиною витонченості династії Насридів."
  hexamilion_wall: "Гексаміліонська стіна"
  hexamilion_wall_desc: "Гексаміліонська стіна ($hexamilion_wall$), що означає #italic Шестимильна стіна#!, існувала з давніх часів для захисту [ShowAreaName('morea_area')]."
  oma_falaj: "Фаладж"
  oma_falaj_desc: "Оманський фаладж ($oma_falaj$) — це підземна система акведуків, яка дозволяє нам безпечно транспортувати воду в будь-яке місце."
  oma_nizwa_fort: "Форт Нізва"
  oma_nizwa_fort_desc: "Форт Нізва ($oma_nizwa_fort$) є життєво важливим пунктом для торгівлі [ShowGoodsName('incense')] у [ShowAreaName('oman_area')]."
  coastal_settlements: "Прибережне поселення"
  coastal_settlements_desc: "Прибережне поселення ($coastal_settlements$) привабить значну частину наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] до переселення туди."
  dutch_trade_outpost: "Голландський торговий форпост"
  dutch_trade_outpost_desc: "Щоб посилити свій вплив у [ShowRegionName('japan_region')], багато #italic голландських торговців#! підтримують добрі стосунки з тамтешніми правителями, маючи при цьому свободу торгівлі."
  dutch_admiralty_desc_common: "Численні адміралтейства в нашій державі розділили наші інтереси, але це дозволило всім нашим провінціям утримувати власні флоти."
  friesland_admiralty: "Фрисландське адміралтейство"
  friesland_admiralty_desc: "$dutch_admiralty_desc_common$"
  west_friesland_admiralty: "Адміралтейство Західної Фрисландії"
  west_friesland_admiralty_desc: "$dutch_admiralty_desc_common$"
  rotterdam_admiralty: "Роттердамське адміралтейство"
  rotterdam_admiralty_desc: "$dutch_admiralty_desc_common$"
  zeeland_admiralty: "Зеландське адміралтейство"
  zeeland_admiralty_desc: "$dutch_admiralty_desc_common$"
  amsterdam_admiralty: "Амстердамське адміралтейство"
  amsterdam_admiralty_desc: "$dutch_admiralty_desc_common$"
  library_of_vijayanagar: "Бібліотека $vijayanagar$"
  library_of_vijayanagar_desc: "Будучи одним із найбільших освітніх центрів у [ShowLocationName('vijayanagar')], ця бібліотека дозволить нашому населенню здобути подальшу освіту."
  city_of_victory: "Місто Перемоги"
  city_of_victory_desc: "Маяк надії Південної $india$, воно є одним із найвеличніших місць у світі, куди щороку приїздять численні вчені та посли, аби побачити цивілізацію в [ShowLocationName('vijayanagar')]."
  ranganathaswamy_temple_building: "$ranganathaswamy_temple$"
  ranganathaswamy_temple_building_desc: "Після повного відновлення релігійної споруди в [ShowLocationName('srirangam')], вона тепер стоїть як один із найвеличніших храмів у всій Південній $india$."
  venkateswara_temple: "Храм Венкатешвари"
  venkateswara_temple_desc: "Венкатешвара та Тірупаті зазнали зростання впливу після нещодавніх пожертв, піднісши його до нових висот у межах [ShowAreaName('tamil_land_area')]."
  constantinople_observatory: "Обсерваторія Такі ад-Діна"
  constantinople_observatory_desc: "Ця велична обсерваторія стоїть на пагорбі з чудовим видом на нічне небо. Якщо вона проіснує, то може значно принести користь наукам у [ShowReligionGroupAdjective('muslim')] землях."
  kurmina_headquarter: "Штаб Курміни"
  kurmina_headquarter_desc: "Будучи головним гарнізоном військової провінції, цей штаб дозволяє своєму губернатору готувати свої армії у разі війни та захищати державу від будь-якого загарбника."
  great_enclosure: "Велике Огородження"
  great_enclosure_desc: "Велике Огородження демонструє наш контроль над місцевою [ShowGoodsName('livestock')] і може слугувати місцем відступу у відчайдушні часи."
  great_hill_complex: "Великий Гірський Комплекс"
  great_hill_complex_desc: "Місце поклоніння, $great_hill_complex$ містить багато артефактів, виготовлених зі стеатиту, і слугує місцем для наших найважливіших ритуалів."
  great_valley_complex: "Великий Долинний Комплекс"
  great_valley_complex_desc: "Місце, що забезпечує достатньо житла, $great_valley_complex$ допоможе нам з експлуатацією ресурсів у [ShowLocationName('great_zimbabwe')]."
  wat_chaiwatthanaram_temple_building: "Ват Чайваттханарам"
  wat_chaiwatthanaram_temple_building_desc: "Особистий покровитель нашого правителя, він слугує місцем для урядових релігійних церемоній та для похоронних обрядів наших правителів та їхніх родин."
  khmer_baray: "Барай"
  khmer_baray_desc: "Велике водосховище, ці споруди дозволять збільшити сільськогосподарські інвестиції і нададуть нам можливість надійніше годувати наше населення. Після будівництва ці Бараї потребуватимуть пильного нагляду та постійного обслуговування, щоб уникнути занепаду."
  herrenchiemsee_abbey_potential: "Абатство Герренкімзее може бути збудоване лише на острові Кімзее і вимагає контролю з боку $BAV$."
  herrenchiemsee_abbey: "Абатство Герренкімзее"
  herrenchiemsee_abbey_desc: "Величне барокове абатство, розташоване на острові Кімзее. Воно слугує маяком релігійної та культурної значущості, сприяючи грамотності та просуваючи $BAV_ADJ$ традиції."
  munich_residenz_founding: "Середньовічна Резиденція $munich$"
  munich_residenz_founding_desc: "Це знаменує заснування Резиденції [ShowLocationName('munich')], майбутнього осідку $BAV_ADJ$ правителів. Збудована як фортеця для захисту від бунтівних підданих та ворогуючих фракцій, ця будівля символізує початок $BAV_ADJ$ влади та авторитету, зосереджених у [ShowLocationNameWithNoTooltip('munich')]."
  munich_residenz_founding_potential: "Може бути побудовано лише після спрацьовування події «Заснування Мюнхенської резиденції»."
  munich_residenz_renaissance_expansion: "Резиденція Мюнхена епохи Відродження"
  munich_residenz_renaissance_expansion_desc: "Під час Відродження Мюнхенська резиденція зазнала значного розширення, демонструючи велич і культурні досягнення Баварії. Цей архітектурний шедевр додав зали мистецтва та вишуканості, піднявши престиж Мюнхена як культурного центру Священної Римської імперії."
  munich_residenz_renaissance_expansion_potential: "Може бути побудовано лише після спрацьовування події «Розширення Резиденції епохи Відродження» та завершення початкового заснування Резиденції."
  munich_residenz_baroque_expansion: "Барокова Мюнхенська резиденція"
  munich_residenz_baroque_expansion_desc: "Барокове розширення Мюнхенської резиденції відображає пишність епохи Просвітництва. Розкішні сади, величні зали та витончені дизайни підкреслювали художню та політичну домінантність династії Віттельсбахів у Баварії та за її межами."
  munich_residenz_baroque_expansion_potential: "Може бути побудовано лише після спрацьовування події «Барокове розширення Резиденції» та завершення розширення епохи Відродження."
  bajang_ratu: "Баджанг Рату"
  bajang_ratu_desc: "Церемоніальна брама величних розмірів, Баджанг Рату, виконана в архітектурному стилі #italic candi bentar#!, або розщепленої брами. Збудована з високоякісної червоної цегли, ця брама має стати однією з найвищих споруд у володіннях Маджапахіту. Її використання є життєво важливим, оскільки споруда використовується для грандіозних церемоній релігійного та політичного характеру."
  bubu_building: "Бубу"
  bubu_building_desc: "Деякі з найефективніших рибальських технік використовуються в місцевих рибальських пастках, відомих як бубу. Виплетені з м'якої деревини, такої як бамбук, вони доглядаються досвідченими рибалками в стратегічних місцях, таких як гирла річок, і використовують складні техніки для максимізації улову."
  sufi_mosque: "Суфійська мечеть"
  sufi_mosque_desc: "Будівля, збудована місцевими мусульманськими наверненими, що представляє більш синкретичний підхід до віри."
  wali_songo_shrine: "Гробниця Валі"
  wali_songo_shrine_desc: "Гробниця, присвячена мусульманському святому, який значно допоміг поширити іслам у цій місцевості."
  fulani_cattle_rearing_pen: "Загін для вирощування худоби"
  fulani_cattle_rearing_pen_desc: "Ці загони для вирощування худоби в цій місцевості дозволяють народу фульбе ще більше спеціалізуватися на своїх способах розведення худоби."
  trans_saharan_trade_outposts: "Транссахарський торговий форпост"
  trans_saharan_trade_outposts_desc: "Побудовані для забезпечення місць для караванів, ці транссахарські форпости дозволяють їхнім власникам поширювати свій вплив у регіоні."
  son_unlocked_trans_saharan_outposts_tt: "Розблоковано будівлю «Транссахарські торгові форпости»"
  debere_meshwae: "Дебере Мешва'е"
  debere_meshwae_desc: "Будучи великим міафізитським монастирем, Дебере Мешва'е надав духовенству земель більше контролю, а також кращі умови життя."
  walls_of_benin: "Стіни Беніну"
  walls_of_benin_desc: "Ці стіни дозволяють Беніну процвітати, відганяючи будь-яких ворогів, які можуть прагнути його завоювати."
  zazzau_walls: "Стіни Заззау"
  zazzau_walls_desc: "Демонстрація сили проти інших націй у [ShowRegionName('guinea_region')], ці стіни демонструють міць цього місця сусідам."
  eghabho_nore_mansion: "Eghabho N'ore Маєток"
  eghabho_nore_mansion_desc: "Дім міського голови. Вони відповідальні за управління цим місцем від імені правителя."
  ribat: "Ribāṭ"
  ribat_desc: "Невелике укріплення, переважно призначене для захисту караванів або невеликих територій від набігів."
  delhi_tomb: "Індійська Гробниця"
  delhi_tomb_desc: "Містить тіло великої людини в $india$, ця гробниця слугує чудовим місцем для мандрівників, а також ознакою культури."
  ori_portuguese_quarters: "Португальські Квартали"
  ori_portuguese_quarters_desc: "Місце відпочинку для заможних купців з-за моря, ці квартали слугують їхньою постійною резиденцією в $india$."
  mahmud_gawan_madrasa: "Медресе Махмуда Гавана"
  mahmud_gawan_madrasa_desc: "Побудоване з наміром дозволити багатьом вченим з усього світу пізнати нашу культуру, це Медресе вважається одним з найбільших релігійних коледжів у [ShowRegionName('deccan_region')]."
  por_feitoria: "Feitoria"
  por_feitoria_desc: "Озброєна гарматами та береговими батареями, $por_feitoria$ здатна забезпечити наш вплив у регіоні та дозволити нашим купцям вільніше торгувати."
  rahdar: "Rahdar"
  rahdar_desc: "Для захисту торгових шляхів [ShowRegionName('hindustan_region')] має бути створений дорожній патруль. Він відомий як [ShowBuildingTypeName('rahdar')], де ці люди забезпечують безпеку торгівлі в регіоні."
  red_fort: "Червоний Форт"
  red_fort_desc: "Забезпечуючи, що це місце ніколи не потрапить до рук ворога, а також демонструючи престиж його власника, [ShowBuildingTypeName('red_fort')] дозволив нам поширити контроль над цим місцем."
  guich_garrison: "Гарнізон Джайш"
  guich_garrison_desc: "Гарнізон для відпочинку племен [ShowCultureGroupName('amazigh_group')], що дозволяє краще захищати територію."
  gurgaddi: "Gurgaddi"
  gurgaddi_desc: "Гуру Гадді, що означає місце $guru$, це місце, де перебуває духовний лідер [ShowReligionName('sikhism')]."
  usa_academy_of_arts_and_sciences: "Американська Академія мистецтв і наук"
  usa_academy_of_arts_and_sciences_desc: "$usa_academy_of_arts_and_sciences$ розвиватиме кожне мистецтво та науку, що може сприяти просуванню інтересів, честі, гідності та щастя вільного, незалежного та доброчесного народу."
  usa_academy_of_arts_and_sciences_why: "$usa_academy_of_arts_and_sciences$ може бути побудована лише через подію."
  usa_philosophical_society: "Американське Філософське Товариство"
  usa_philosophical_society_desc: "[usa_philosophical_society] сприятиме корисним знанням і підтримуватиме нашу країну на передовій наукового прогресу."
  usa_philosophical_society_why: "[usa_philosophical_society] може бути побудовано лише через подію."
  usa_national_bank: "Перший банк Америки"
  usa_national_bank_desc: "[usa_national_bank] підтримуватиме наш уряд і стабілізуватиме нашу валюту."
  usa_national_bank_why: "[usa_national_bank] може бути побудовано лише через подію."
  usa_national_mint: "Монетний двір Америки"
  usa_national_mint_desc: "[usa_national_mint] регулюватиме та покращуватиме процес карбування нашої валюти."
  usa_national_mint_why: "[usa_national_mint] може бути побудовано лише через подію."
  zhixian: "Чжисянь"
  zhixian_desc: "Місцевий магістрат, що наглядає за адміністрацією округів, є імперськими призначенцями, які поширюють владу Драконового Престолу на провінції."
  seljuk_mint: "Сельджуцький монетний двір"
  seljuk_mint_desc: "[seljuk_mint] — це функціональне, безпечне місце для виробництва монет, що символізує політичну владу та фіскальну стабільність."
  tur_kodjabashi_office: "Офіс Коджабаші"
  tur_kodjabashi_office_desc: "Використовуючи місцевих жителів наших завойованих земель у [ShowRegionName('balkan_region')], ми можемо зменшити тиск на нашу власну бюрократію, ціною розширення прав і можливостей місцевих жителів у цьому районі."
  tur_kodjabashi_office_is_in_balkans: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e] знаходиться в [Concept('region', 'CONCEPT_PLACEHOLDER')|e] [ShowRegionName('balkan_region')]"
  tur_kodjabashi_office_is_not_capital: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e] не є [Concept('capital', 'CONCEPT_PLACEHOLDER')|e]"
  phanariot_district: "Фанарський район"
  phanariot_district_desc: "Район, де проживають фанаріоти, заможні [ShowCultureName('greek_culture')] купці, у [ShowLocationName('constantinople')]."
  maniot_toll_guards: "Маніотські митні охоронці"
  maniot_toll_guards_desc: "Маючи право на дороги в цьому місці, маніоти, які є групою бандитів у [ShowAreaName('morea_area')], контролюють більшу частину адміністрації та торгівлі там."
  bulgarian_administration_center: "Адміністративний центр $bulgaria_area$"
  bulgarian_administration_center_desc: "Це місце служить центром усієї адміністрації в [ShowAreaName('bulgaria_area')]."
  jewish_district: "[ShowReligionAdjectiveWithNoTooltip('judaism')] район"
  jewish_district_desc: "Район для проживання [ShowReligionAdjective('judaism')] народу."
  darussifa: "Дарушшифа"
  darussifa_desc: "Лікарня, побудована під час $ilkhanate$. Вона вважається однією з найсучасніших лікарень у всьому світі та є центром прикладних медичних наук."
  woodhenge_of_cahokia: "Вудхендж Кахокії"
  woodhenge_of_cahokia_desc: "Вирівняний з рухом сонця, $woodhenge_of_cahokia$ служить методом відстеження сонячних подій."
  cahokia_woodhenge_why: "$woodhenge_of_cahokia$ може бути побудовано лише через подію."
  charite_of_berlin: "Шаріте"
  charite_of_berlin_desc: "[charite_of_berlin] — це карантинний пункт за межами Берлінських стін, який допомагає стримувати повторювані епідемії."
  qalat_al_mashwar: "Калат аль-Машвар"
  qalat_al_mashwar_desc: "Глибоко в серці $tlemcen$ лежить укріплений і чудово ілюстрований палацовий комплекс. Символ місцевої влади та процвітання, королівський палац також служить адміністративним центром правлячої династії. Окрім своєї неперевершеної краси, він також служить оборонною спорудою проти зовнішніх загроз та потенційних завойовників."