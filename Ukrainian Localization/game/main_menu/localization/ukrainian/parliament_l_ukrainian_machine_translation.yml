  call_parliament: "Скликати парламент"
  call_parliament_desc: "Це скличе Парламент у спробі отримати підтримку для вирішення [Concept('парламентського питання', 'CONCEPT_PLACEHOLDER')|e], зміни [Concept('політик', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('законах', 'CONCEPT_PLACEHOLDER')|e], створення [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e], підвищення [Concept('податків', 'CONCEPT_PLACEHOLDER')|e] або збільшення [Concept('військових зборів', 'CONCEPT_PLACEHOLDER')|e] та [Concept('морських зборів', 'CONCEPT_PLACEHOLDER')|e].\nПід час цього засідання ми отримаємо такі ефекти:#NL![ShowModifierEffect('parliament_in_session')]\n\n$select_parliament_location_inform_choice_tt$"
  request_more_taxes: "Запросити додаткові податки"
  request_more_taxes_desc: "Просимо [Concept('Player.GetGovernment.GetParliament.GetName] дозволити нам збирати більше [податків', 'CONCEPT_PLACEHOLDER')|e] з [Concept('станів', 'CONCEPT_PLACEHOLDER')|e]."
  ask_for_larger_levies: "Запросити більші збори військ"
  ask_for_larger_levies_desc: "Просимо [Concept('стани', 'CONCEPT_PLACEHOLDER')|e] нашого [Concept('Player.GetGovernment.GetParliament.GetName] надавати більші [військові збори', 'CONCEPT_PLACEHOLDER')|e] та [Concept('морські збори', 'CONCEPT_PLACEHOLDER')|e] за викликом."
  ask_for_law_changes: "Запросити зміни в законах"
  ask_for_law_changes_desc: "Просимо [Concept('стани', 'CONCEPT_PLACEHOLDER')|e] схвалити зміну конкретної [Concept('політики', 'CONCEPT_PLACEHOLDER')|e] в наших [Concept('законах', 'CONCEPT_PLACEHOLDER')|e]."
  ask_for_law_changes_select_law_title: "Оберіть [Concept('закон', 'CONCEPT_PLACEHOLDER')|e], який наш [Player.GetGovernment.GetParliament.GetName] погодиться змінити."
  ask_for_law_changes_select_policies_title: "Оберіть [Concept('політику', 'CONCEPT_PLACEHOLDER')|e], яку наш [Player.GetGovernment.GetParliament.GetName] погодиться змінити."
  prepare_for_war_select_title: "Оберіть [Concept('країну', 'CONCEPT_PLACEHOLDER')|e], щоб отримати [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти неї"
  prepare_for_war_select_province_title: "Оберіть [Concept('провінцію', 'CONCEPT_PLACEHOLDER')|e], щоб встановити її як [Concept('мету війни', 'CONCEPT_PLACEHOLDER')|e]"
  select_a_country_to_get_casus_belli_on: "Оберіть [Concept('країну', 'CONCEPT_PLACEHOLDER')|e], проти якої наш [Player.GetGovernment.GetParliament.GetName] надасть нам [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e]."
  prepare_for_war: "Сфабрикувати Casus Belli"
  prepare_for_war_desc: "Просимо [Concept('Player.GetGovernment.GetParliament.GetName] схвалити [війну', 'CONCEPT_PLACEHOLDER')|e], надавши нам законний [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e].\n• Ми оберемо країну, щоб отримати [ShowCasusBelliName('cb_fabricated_conquer_province')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e]"
  PARLIAMENT_IN_SESSION: "[Player.GetGovernment.GetParliament.GetName] на засіданні"
  promote_castle_building: "Сприяти $castle$ Роботам"
  promote_castle_building_desc: "По всій нашій країні розташовані чудові місця для потенційних укріплень, готові зупинити будь-який наступ наших ворогів."
  promote_bastion_building: "Сприяти $bastion$ Роботам"
  promote_bastion_building_desc: "$promote_castle_building_desc$"
  promote_star_fort_building: "Сприяти $star_fort$ Роботам"
  promote_star_fort_building_desc: "$promote_castle_building_desc$"
  promote_fortress_building: "Сприяти $fortress$ Роботам"
  promote_fortress_building_desc: "$promote_castle_building_desc$"
  sponsor_a_university: "Спонсорувати $university$"
  sponsor_a_university_desc: "Поширення знань у прагненні до розумового просвітлення та розуміння божественного є чистою метою, яку ми повинні підтримувати усією нашою фінансовою та політичною потужністю шляхом створення літургійних установ великого визнання."
  pops_in_province_gain_20_satisfaction: "[Concept('населення', 'CONCEPT_PLACEHOLDER')|e] у [Concept('провінції', 'CONCEPT_PLACEHOLDER')|e] цієї [Concept('місцевості', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('задоволення населення', 'CONCEPT_PLACEHOLDER')|e]."
  sponsor_a_confucian_academy: "Спонсорувати $confucian_academy$"
  sponsor_a_confucian_academy_desc: "Щоб прагнути до вищих знань та запропонувати нашим вченим розгалужену інфраструктуру для їхньої роботи, ми повинні інвестувати в наші академії."
  sponsor_a_cathedral: "Спонсорувати $cathedral$"
  sponsor_a_cathedral_desc: "Наше правління буде навіки шанованим, якщо ми побудуємо собор, щоб прославити нашу віру в одному з наших найвизначніших міст."
  sponsor_a_opera_house: "Спонсорувати $opera_house$"
  sponsor_a_opera_house_desc: "Наш народ вимагає розширення наших культурних закладів. Надання їм нового [ShowBuildingTypeNameWithNoTooltip('opera_house')] втамує цю культурну лихоманку, одночасно забезпечуючи наші міські райони необхідною увагою."
  gravel_road_development: "Розширити мережу $gravel_road$"
  gravel_road_development_desc: "Хребтом нашої країни є те, що з'єднує наші провінції та населені пункти. Таким чином, ми повинні прокладати нові дороги та фінансувати їхнє будівництво, а також розширення."
  gravel_road_development_burghers: "$gravel_road_development$"
  gravel_road_development_burghers_desc: "$gravel_road_development_desc$"
  paved_road_development: "Розширити мережу $paved_road$"
  paved_road_development_desc: "$gravel_road_development_desc$"
  paved_road_development_burghers: "$paved_road_development$"
  paved_road_development_burghers_desc: "$gravel_road_development_desc$"
  modern_road_development: "Розширити мережу $modern_road$"
  modern_road_development_desc: "$gravel_road_development_desc$"
  railroad_development: "Розширити мережу $railroad$"
  railroad_development_desc: "$gravel_road_development_desc$"
  expand_mining_operations: "Розширити видобувні операції"
  expand_mining_operations_desc: "Видобуток корисних копалин міг би відігравати життєво важливу роль в нашій економіці, але поточні операції не відповідають задовільному стандарту."
  expand_farming_operations: "Фінансувати сільськогосподарські маєтки"
  expand_farming_operations_desc: "Наші сільськогосподарські маєтки забезпечують виробництво багатьох основних потреб. Однак власники земель обіцяють більші врожаї, якщо ми вкладемо в них більше часу та ресурсів."
  expand_hunting_operations: "Заснувати нові мисливські угіддя"
  expand_hunting_operations_desc: "Ми ще не розвинули наші мисливські угіддя на повну потужність і тому втрачаємо багато можливих прибутків."
  expand_gathering_operations: "Розширити галузі збору"
  expand_gathering_operations_desc: "Ми повинні розширити наші операції зі збору, щоб задовольнити попит на ці товари у будівництві та підтримці нашої ширшої економіки."
  expand_forestry_operations: "Розширити експлуатацію лісів"
  expand_forestry_operations_desc: "Ліси нашої країни обіцяють більші прибутки. Ми повинні розширити наші операції з видобутку, щоб реалізувати їхній потенціал."
  promote_integration: "Сприяти процесу інтеграції"
  promote_integration_desc: "Ми повинні підтримати зусилля щодо інтеграції віддалених провінцій нашого домену та більш тісно консолідувати їх у нашу основну територію."
  promote_urbanization: "Сприяти урбанізації"
  promote_urbanization_desc: "Очевидно, що шлях вперед полягає у сприянні урбанізації наших головних міст, як засіб для зростання нашої основи могутності."
  grant_city_rights: "Надати міські права"
  grant_city_rights_desc: "Щоб наша територія процвітала, нам потрібно буде розширити права наших міських районів та надати більше міських прав."
  expand_food_stockpiles: "Розширити продовольчі запаси"
  expand_food_stockpiles_desc: "Наш народ висловлює нам нагальну стурбованість з приводу нестачі продовольства. Ми повинні спробувати розширити нашу мережу [ShowBuildingTypeName('granary')], щоб запобігти подібній ситуації в майбутньому."
  back_the_war_effort: "Підтримати Воєнні Зусилля"
  back_the_war_effort_desc: "Наші воєнні зусилля значно виграють від підтримки нашої законодавчої бази."
  finance_the_armory: "Розширити Нашу $armory$"
  finance_the_armory_desc: "Наш армійський резерв переживав кращі часи і вкрай потребує нової інфраструктури для рекрутування."
  expand_barracks: "Розширити Інфраструктуру $barracks$"
  expand_barracks_desc: "$finance_the_armory_desc$"
  sponsor_training_fields: "Розширити Інфраструктуру $training_fields$"
  sponsor_training_fields_desc: "$finance_the_armory_desc$"
  sponsor_regimental_camp: "Розширити Інфраструктуру $regimental_camp$"
  sponsor_regimental_camp_desc: "$finance_the_armory_desc$"
  sponsor_conscription_center: "Розширити Інфраструктуру $conscription_center$"
  sponsor_conscription_center_desc: "$finance_the_armory_desc$"
  host_army_excercises: "Провести Армійські Навчання"
  host_army_excercises_desc: "Якщо ми прагнемо зберегти універсальну армію, ми повинні заохочувати військові навчання як засіб для підтримання наших солдатів у відмінному стані та готовності."
  expand_officer_lists: "Розширити Списки Офіцерів"
  expand_officer_lists_desc: "Просування здібних чоловіків на високі посади в нашій армії є надійним способом забезпечити компетентне керівництво."
  promote_noble_officers: "Просувати Шляхетних Офіцерів"
  promote_noble_officers_desc: "Ми повинні звернутися до нашої дрібної шляхти, аби сприяти просуванню нових офіцерів до лав нашого уряду."
  promote_noble_officers_passed.tt: "З'явиться вправний член [ShowEstateTypeName('nobles_estate')]."
  support_noble_sponsored_armies: "Створити Найманців під Заступництвом Шляхти"
  support_noble_sponsored_armies_desc: "Ми повинні надати одному з наших найвідважніших Лордів дозвіл на створення найманської роти, аби захищати нашу віру та співвітчизників нашим іменем."
  increase_naval_spending: "Збільшити Морську Інфраструктуру"
  increase_naval_spending_desc: "Нам потрібно покращити інфраструктуру наших прибережних міст, аби підтримувати нашу проекцію сили у наших водах."
  expand_docks: "Розширити Наші Суднобудівні Потужності"
  expand_docks_desc: "Нам потрібно розширити наші суднобудівні можливості, аби забезпечити грізний флот для нашої країни."
  expand_dry_docks: "Розширити Наші Суднобудівні Потужності"
  expand_dry_docks_desc: "Нам потрібно розширити наші суднобудівні можливості, аби забезпечити грізний флот для нашої країни."
  expand_shipyards: "Розширити Наші Суднобудівні Потужності"
  expand_shipyards_desc: "Нам потрібно розширити наші суднобудівні можливості, аби забезпечити грізний флот для нашої країни."
  expand_grand_shipyards: "Розширити Наші Суднобудівні Потужності"
  expand_grand_shipyards_desc: "Нам потрібно розширити наші суднобудівні можливості, аби забезпечити грізний флот для нашої країни."
  expand_naval_bases: "Розширити Наші Суднобудівні Потужності"
  expand_naval_bases_desc: "Нам потрібно розширити наші суднобудівні можливості, аби забезпечити грізний флот для нашої країни."
  support_cabinet_generic_desc: "Бюрократія в усьому нашому володінні значно виграє від законодавчої реформи щодо її ефективності."
  support_noble_cabinet: "Підтримати Шляхетний Кабінет"
  support_noble_cabinet_desc: "$support_cabinet_generic_desc$, і хто є кращим кандидатом для втілення цієї реформи, ніж найшановніші члени нашого вищого суспільства."
  support_clergy_cabinet: "Підтримати Духовний Кабінет"
  support_clergy_cabinet_desc: "$support_cabinet_generic_desc$. Найкращим варіантом для цього є звернення до наших відданих священиків."
  support_burgher_cabinet: "Підтримати Купецький Кабінет"
  support_burgher_cabinet_desc: "$support_cabinet_generic_desc$, що фінансується найзаможнішими членами суспільства."
  support_peasant_cabinet: "Підтримати Народний Кабінет"
  support_peasant_cabinet_desc: "$support_cabinet_generic_desc$, підтриманий народною підтримкою."
  balance_the_budget: "Збалансувати Бюджет"
  balance_the_budget_desc: "Фінансова криза, що нависла над головами нашого народу, є жахливою справою, яку потрібно терміново вирішити."
  bolster_the_monarchy: "Зміцнити Уряд"
  bolster_the_monarchy_desc: "Центральна влада нашої країни повинна стояти вище всіх груп інтересів та видатних членів нашого вищого прошарку."
  bolster_the_republic: "$bolster_the_monarchy$"
  bolster_the_republic_desc: "$bolster_the_monarchy_desc$"
  bolster_the_divine_mandate: "$bolster_the_monarchy$"
  bolster_the_divine_mandate_desc: "$bolster_the_monarchy_desc$"
  bolster_the_tribal_leader: "$bolster_the_monarchy$"
  bolster_the_tribal_leader_desc: "$bolster_the_monarchy_desc$"
  bolster_the_khan: "$bolster_the_monarchy$"
  bolster_the_khan_desc: "$bolster_the_monarchy_desc$"
  conduct_a_census: "Провести перепис населення"
  conduct_a_census_desc: "Належний облік нашого народу, а також турбота про його розвиток та процвітання є чудовим способом сприяння стабільності в усьому королівстві."
  support_ruler: "Підтримати державу"
  support_ruler_desc: "Наш уряд не може функціонувати без належного визнання його влади. Завдяки належній декларації парламенту ми можемо зміцнити нашу репутацію та посилити нашого правителя."
  increase_our_control: "Посилити наш контроль"
  increase_our_control_desc: "Здійснення контролю над нашим графством є життєво важливим для функціонування нашої держави. Ми повинні покращити наші інституції, які забезпечують контроль над нашими містами."
  promote_state_religion: "Просувати державну релігію"
  promote_state_religion_desc: "Наші піддані, що сповідують релігію нашої держави, є вирішальним кроком до стабільності нашого королівства. Ми повинні збільшити наші зусилля з навернення нашого народу."
  promote_burghers_member: "Просувати члена бюргерів"
  promote_burghers_member_desc: "Бюргери є життєво важливими для нашої держави, як торговці, так і члени гільдій. Ми повинні просувати здібних членів їхнього стану в наш уряд."
  promote_burghers_member_passed.tt: "З'явиться вмілий член [ShowEstateTypeName('burghers_estate')]."
  expand_diplomatic_corps_generic_desc: "Один лише меч нас далеко не заведе. Набагато корисніше було б дозволити перу підтримувати меч для досягнення великих справ."
  expand_diplomatic_corps_minors: "Посилити зв'язки з сусідами"
  expand_diplomatic_corps_minors_desc: "$expand_diplomatic_corps_generic_desc$ Наша головна турбота має бути про малі країни навколо нас."
  expand_diplomatic_corps_religion: "Звернутися до нашої віри"
  expand_diplomatic_corps_religion_desc: "$expand_diplomatic_corps_generic_desc$ Для нас життєво важливо покращити наші контакти з нашими релігійними братами."
  expand_diplomatic_corps_majors: "Відносини з великими державами"
  expand_diplomatic_corps_majors_desc: "$expand_diplomatic_corps_generic_desc$ Нам потрібно забезпечити наші відносини з великими державами світу."
  improve_subject_relations: "Посилити зв'язки з підданими"
  improve_subject_relations_desc: "Зміцнюючи наші дипломатичні та адміністративні зв'язки з нашими підданими, ми зможемо тісніше прив'язати їх до нашої держави."
  promote_clergy_member: "Просувати члена духовенства"
  promote_clergy_member_desc: "Наша адміністрація могла б скористатися підтримкою духовенства для ефективнішої роботи. Пропонуючи їм вищі посади в нашому уряді, ми могли б покращити становище нашої держави."
  promote_clergy_member_passed.tt: "З'явиться вмілий член [ShowEstateTypeName('clergy_estate')]."
  expand_our_market: "Акти розширення ринку"
  expand_our_market_desc: "Наш ринок значно виграє від послаблення наших торговельних правил."
  protect_our_market: "Ринкові правила"
  protect_our_market_desc: "Через конкурентоспроможність наших ринків було б розумно посилити наші торговельні правила, щоб забезпечити конкурентну перевагу для наших власних купців."
  sponsor_a_merchant_expedition: "Спонсорувати торговельну експедицію"
  sponsor_a_merchant_expedition_desc: "Ми повинні інвестувати у спеціальну торговельну експедицію для встановлення торговельних зв'язків з іншими ринками."
  sponsor_urban_development: "Розвивати внутрішні території"
  sponsor_urban_development_desc: "Ми не повинні нехтувати нашими внутрішніми землями та розвивати їх відповідно."
  support_religious_art: "Спонсорувати релігійне мистецтво"
  support_religious_art_desc: "Наша віра слугує великим джерелом натхнення для художників по всій країні. Оскільки наш Двір здатен підтримувати митців, ми повинні найняти одного з тих, хто натхненний божественним."
  support_nobles_art: "Спонсорувати шляхетні мистецтва"
  support_nobles_art_desc: "Наша витончена еліта понад усе прагне більше мистецтва для милування. Якщо ми наймемо більше художників, ми неодмінно зробимо їх щасливими."
  support_religious_education: "Підтримувати релігійну освіту"
  support_religious_education_desc: "Залежність нашої держави від служителів віри може стати великим активом в освіті нашого населення. Це прискорило б наш науковий прогрес, водночас збільшуючи лояльність наших відданих послідовників."
  support_religious_education_passed.tt: "Усі [ShowPopTypeName('clergy')] та [ShowPopTypeName('peasants')], що сповідують нашу віру, отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  curb_central_authority: "Обмежити центральну владу"
  curb_central_authority_desc: "Влада [Player.GetGovernment.GetParliament.GetName] не може і не буде переважена жодною владою за межами її залів. Щоб досягти наших ідеалів, ми повинні використовувати це право, незважаючи на королівські укази!"
  revoke_privilege_of_the_nobles: "Скасувати привілеї шляхти"
  revoke_privilege_of_the_nobles_desc: "Ті, хто користувався працею та потом простолюду, тепер тремтять від думки, що їхні мізерні привілеї будуть відібрані."
  reduce_peasant_taxation: "Зменшити податки для селян"
  reduce_peasant_taxation_desc: "Простий чоловік все своє життя платив податки пану. Щоб просувати наші ініціативи щодо визволення народу, це оподаткування має припинитися!"
  establish_a_constitution: "Заснувати конституцію"
  establish_a_constitution_desc: "Воля народу має бути укладена в письмовий документ, прийнятий усіма, щоб закріпити наші права та водночас обмежити центральну владу."
  random_noble_privilege_revoked_tt: "Випадковий [Concept('estate_privilege', 'CONCEPT_PLACEHOLDER')|e] [ShowEstateTypeName('nobles_estate')] буде відкликано"
  baronial_burghs_rights: "Розширити Баронські Бурги"
  baronial_burghs_rights_desc: "Розширення прав для баронських бургів сприятиме подальшому розвитку нашої нації."
  ecclesiastical_burghs_rights: "Розширити Церковні Бурги"
  ecclesiastical_burghs_rights_desc: "Розширення прав для церковних бургів сприятиме подальшому розвитку нашої нації."
  compulsory_education_nobles: "Закон про Освіту Шляхти"
  compulsory_education_nobles_desc: "Ми маємо значно інвестувати в освіту шляхти, щоб поліпшити нашу адміністрацію."
  presbyterian_education: "Закон про Пресвітеріанську Освіту"
  presbyterian_education_desc: "Ми повинні заснувати школу в кожній парафії нашої країни для подальшого розвитку освіти нашого народу. Вони будуть управлятися членами Церкви та оплачуватимуться податком, накладеним на землевласників нашої країни."
  found_college_of_justice: "Заснувати Коледж Правосуддя"
  found_college_of_justice_desc: "Правовий кодекс наразі недорозвинений і не відповідає нашим стандартам. Ми маємо заснувати нову інституцію, Коледж Правосуддя, щоб вирішити ці питання та створити міцну правову систему."
  establish_the_signoria_of_venice: "Заснувати Синьйорію Венеції"
  establish_the_signoria_of_venice_desc: "Стара Комуна Венеції служила своїй меті й має давню традицію в нашій державі. Однак її адміністративна ефективність виявляє свою застарілість. Ми можемо переглянути верховний орган управління та замінити його новою системою, яка вирішує внутрішні проблеми нації."
  appease_english_population: "Задобрити Англійське Населення"
  appease_english_population_desc: "Наші піддані в Британії виявилися незадоволеними, попри наші претензії. Показуючи їм, що ми не гнобителі, можна допомогти їх заспокоїти."
  increase_control_in_britain: "Посилити Контроль у Британії"
  increase_control_in_britain_desc: "Британські острови відірвані від решти європейського континенту, що ускладнює нам керування ними. Ми повинні докласти зусиль, щоб подолати це випробування та посилити наш контроль там."
  tolerance_of_non_hindus: "Терпимість до Язичників"
  tolerance_of_non_hindus_desc: "Оскільки наше володіння є мультирелігійним, а наш правитель є прихильником толерантності, ми повинні дозволити ці різні вірування в нашій нації."
  VIJ_ALL_NON_HINDU_POPS_GAIN_SATISFACTION: "Усі наші [Concept('heretics', 'CONCEPT_PLACEHOLDER')|e] та [Concept('heathen', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  increase_non_hindu_control: "Контроль над Язичниками"
  increase_non_hindu_control_desc: "Замість того, щоб дозволяти нашій нації бути заповненою багатьма різними вірами, ми повинні намагатися контролювати їх, щоб вони не повстали."
  VIJ_ALL_NON_HINDU_POPS_LOCATIONS_GAIN_CONTROL: "Усі наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з щонайменше #Y 5%#! [Concept('heretics', 'CONCEPT_PLACEHOLDER')|e] або [Concept('heathen', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('control_mild_bonus')|+=2%] [Concept('control', 'CONCEPT_PLACEHOLDER')|e]."
  dlh_famine_reductions: "Боротьба з Голодом"
  dlh_famine_reductions_desc: "Замість того, щоб сидіти без діла, поки населення голодує, ми повинні надати допомогу будь-якій місцевості, яка може відчувати нестачу їжі."
  new_model_army_pi: "Армія нового зразка"
  new_model_army_pi_desc: "Руйнівні наслідки громадянської війни, що триває проти Роялістів, довели, що наша армія вкрай потребує тотальної реформи."
  edict_of_nantes_issue: "Нантський Едикт"
  edict_of_nantes_issue_desc: "Після років релігійної боротьби настав час для нас сприяти єдності через співіснування та припинити непотрібне кровопролиття."
  end_the_french_wars_of_religion_tt: "[ShowDisasterName('french_wars_of_religion')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] завершиться"
  mug_promote_rajput_officials: "Сприяти офіцерам $rajasthani_language$"
  mug_promote_rajput_officials_desc: "Сприяючи людям $rajasthani_language$ у нації, ми можемо забезпечити наявність кількох мілітаристичних офіцерів, на яких ми можемо покластися."
  promote_rajput_officials_passed_tt: "З'явиться вмілий член [ShowLanguageName('rajasthani_language')] [Concept('language', 'CONCEPT_PLACEHOLDER')|e]."
  hussite_army_reform: "$hussite_ADJ$ Військові Реформи"
  hussite_army_reform_desc: "Наш народ пройшов долини історії, попри всі труднощі. Вижив у війнах, хрестових походах та переслідуваннях. Наші армії заслуговують застосовувати найкращі тактики та переходити в наступ, проти всіх тих, хто шукає нашої загибелі!"
  lit_measures_against_romuva: "Заходи Проти Відродження $romuva_ADJ$"
  lit_measures_against_romuva_desc: "З відродженням [ShowReligionAdjective('romuva')] віри багато хто стурбований, що вони можуть спробувати викликати заворушення. Нам потрібно скликати стани, щоб розібратися з цим питанням."
  lit_5_percent_of_pops_convert_to_our_religion_tt: "#Y 5%#! [ShowReligionAdjective('romuva')] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] навернуться до [ROOT.GetCountry.GetReligion.GetName]"
  hre_law_debate: "Дебати про Імперський Закон"
  hre_law_debate_desc: "[ShowSpecialStatusName('emperor')] [GetUniqueInternationalOrganization('hre').GetName] має намір імплементувати новий закон. Зараз є можливість для Імперських Станів вести переговори за або проти пропозиції."
  hre_request_additional_military_support: "Імперська Військова Підтримка"
  hre_request_additional_military_support_desc: "[GetUniqueInternationalOrganization('hre').GetName] перебуває під загрозою іноземного вторгнення. [GetUniqueInternationalOrganization('hre').GetLeaderTitle] вважає себе змушеним вимагати військової могутності всієї Імперії та всіх її членів."
  hre_roman_month: "Римський Місяць"
  hre_roman_month_desc: "Скарбниця [GetUniqueInternationalOrganization('hre').GetName] останнім часом спорожніла. [GetUniqueInternationalOrganization('hre').GetLeaderTitle] просить фінансової підтримки членів Імперії для забезпечення її безпеки."
  hre_roman_month_modifier_effect: "[ShowModifierEffect('pi_hre_increased_imperial_tax_modifier')]"
  hre_demand_internal_peace: "Вимагати Внутрішнього Миру"
  hre_demand_internal_peace_desc: "Авторитет [GetUniqueInternationalOrganization('hre').GetLeaderTitle] підірвано через внутрішні конфлікти в [GetUniqueInternationalOrganization('hre').GetName]. В інтересах Імперії забезпечити внутрішній мир та стабільність."
  hre_demand_internal_peace_tt: "Кожен [Concept('member', 'CONCEPT_PLACEHOLDER')|e] підписує [Concept('white_peace', 'CONCEPT_PLACEHOLDER')|e] у кожній [Concept('war', 'CONCEPT_PLACEHOLDER')|e], яка має іншого [member] [THIS.GetInternationalOrganization.GetName]"
  hre_establish_perpetual_diet: "Заснувати Постійний Рейхстаг"
  hre_establish_perpetual_diet_desc: "$perpetual_diet_law_desc$"
  hre_establish_perpetual_diet_tt: "Місце [Concept('parliament_seat', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetName] стає єдиним дійсним [Concept('location', 'CONCEPT_PLACEHOLDER')|e] для проведення [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e]."
  hre_force_emperor_to_abdicate: "Змусити Імператора зректися престолу"
  hre_force_emperor_to_abdicate_desc: "Правління [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetLongName] було визнано [ShowSpecialStatusNamePlural('elector')] недостатнім. Імперський рейхстаг був скликаний, щоб обговорити майбутнє керівництва [GetUniqueInternationalOrganization('hre').GetName]."
  union_enforce_law_implementation: "Забезпечити впровадження закону"
  union_enforce_law_implementation_desc: "Деякі члени [GetInternationalOrganizationType('union').GetName] є або новачками, або зуміли відбити будь-яку спробу централізації $union$. Необхідно впровадити ці закони в кожному з членів, якщо ми прагнемо чистої анексії інших членів."
  union_enforce_law_implementation_at: "Кожен [Concept('member', 'CONCEPT_PLACEHOLDER')|e] встановлює свій [Concept('union_integration_level_member', 'CONCEPT_PLACEHOLDER')|e] у [THIS.GetInternationalOrganization.GetName] на [THIS.GetInternationalOrganization.GetModifierValueString('union_integration_level')]"
  pa_add_privilege: "Надати привілей"
  pa_add_privilege_simple: "Підкупити стан"
  pa_add_privilege_desc: "Іноді доводиться надавати постійні переваги [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], щоб заручитися їхньою підтримкою для чогось у короткостроковій перспективі."
  pa_change_policy: "Змінити політику"
  pa_change_policy_simple: "Підкупити стан"
  pa_change_policy_desc: "Цей [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] не згоден з нашою поточною [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] і був би більш прихильним, якби ми змінили нашу позицію на щось більш бажане."
  push_towards_desc: "Наше суспільство надто відійшло від наших коренів. Ми повинні прагнути повернутися до наших ідеалів та"
  entrench_desc: "Наше суспільство потребує постійного нагадування про те, що представляють наші ідеали. Ми повинні зміцнювати наші цінності та"
  pa_push_towards_decentralized: "Рух за автономію"
  pa_push_towards_decentralized_simple: "Допомогти автономії"
  pa_push_towards_decentralized_desc: "$push_towards_desc$ прийняти шляхту як автономних правителів нашої землі."
