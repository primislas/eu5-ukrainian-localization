  northern_center_of_arts_desc: "Місто Новгород є важливим культурним центром Європи. Епічні оповіді, засновані на високому рівні грамотності, прекрасні ікони та грандіозна архітектура підвищують престиж нашого процвітаючого міста та всієї нації."
  city_of_churches: "Місто Церков"
  city_of_churches_desc: "Понад 80 православних церков у Новгороді, особливо Собор Святої Софії, є одними з найбільших землевласників у князівстві. Завдяки своєму багатству та релігійному престижу Церкви впливають на населення в багатьох сферах, і наші громадяни стають більш побожними, у хорошому сенсі."
  novgorodian_fur_trade: "Новгородська хутрова торгівля"
  novgorodian_fur_trade_desc: "Хутро, м'яке золото Русі. У той час як інші торгові держави отримують своє багатство від торгівлі золотом та іншими рідкісними металами, наше джерело доходу походить від високоякісного хутра, яке надає нам батьківщина."
  grand_dukes_army: "Армія Великого Князя"
  grand_dukes_army_desc: "Керівництво військами є найважливішим обов'язком для Великого Князя, якого запрошують правити Вічевою Республікою. Під його сильним і досвідченим керівництвом наші армії стануть ефективнішими в бою."
  ushkuiniks: "Ушкуйники"
  ushkuiniks_desc: "Пірати-ушкуйники, подібні до вікінгів, були корисним інструментом для придушення наших конкурентів. На жаль, це було припинено через іноземне втручання, головним чином з Москви. Ми повинні знову почати їх фінансувати та поширити цю піратську діяльність на далекі моря, щоб нагадати всім, хто є справжнім володарем півночі..."
  baltic_shipyard: "Балтійська верф"
  baltic_shipyard_desc: "Побудуйте велику верф на східному узбережжі Балтійського моря і домінуйте в заморській торгівлі!"
  veche_advance: "Віче"
  veche_advance_desc: "$veche_advance$ є народними зборами, що бере свій початок у давніх племінних зборах задовго до часів Русі. Це найвища судова та законодавча влада держави."
  birch_bark_manuscript: "Берестяний рукопис"
  birch_bark_manuscript_desc: "Письмо та читання є фундаментальною опорою нашого суспільства. Релігійні тексти, а також події нашої історії, повинні бути записані, щоб майбутні покоління могли дізнатися про наші культурні досягнення."
  novgorod_first_chronicle: "Новгородський перший літопис"
  novgorod_first_chronicle_desc: " #italic Новгородський перший літопис#! розповідає історію країни, від легендарного початку варязького вождя Рюрика до сьогодення. Це культурна спадщина, яка з гордістю передається від одного покоління до іншого."
  defenses_of_novgorod: "Оборона Новгорода"
  defenses_of_novgorod_desc: "Новгородська республіка є мішенню багатьох зовнішніх загроз. Будь то єретичні скандинави на заході, несамовиті німці на південному заході, або навіть інші руські держави на півдні; усі вони зіткнуться з незламними укріпленнями нашої великої держави."
  reforms_of_the_posadnichestvo: "Реформи посадництва"
  reforms_of_the_posadnichestvo_desc: "Посадник є найвищою адміністративною посадою в наших містечках і містах. Посадник має значнішу позицію, ніж просто мер. Зі зростанням міста зростають і обов'язки, вплив та кількість посадників."
  cork_stoppers: "Коркові пробки для пляшок"
  cork_stoppers_desc: "Розвиток у виробництві пляшок дозволив виробникам вина створювати пляшки більш стандартизованих розмірів і, як наслідок, знову запровадити використання коркової пробки. Це набагато ефективніший спосіб закупорювати вино, ніж старі тканинні пробки, і це означає, що вино тепер можна транспортувати на значно більші відстані, ніж раніше вважалося можливим. Можливо, ми зараз спостерігаємо народження світової торгівлі вином."
  colonial_policy_advance: "Колоніальна політика"
  colonial_policy_advance_desc: "Нові землі та прикордонні території, які колонізує наш народ, вимагають нових форм управління та організації їхніх поселень."
  native_policy_advance: "Політика щодо тубільців"
  native_policy_advance_desc: "Нові землі, відкриті нашими відважними дослідниками, зазвичай населені дивними та нерозвиненими народами. Настав час створити єдине правило для регулювання зустрічей між нашими силами та тубільцями цих земель."
  slave_raid_advance: "Прибережні набіги"
  slave_raid_advance_desc: "Наша країна має давню традицію здійснювати набіги на узбережжя за тим, що їй потрібно у вигляді рабів, грошей та всіх інших благ життя."
  crown_power_advance_discovery: "Державне управління"
  crown_power_advance_discovery_desc: "Коли наші правителі стають єдиною владою у своїх володіннях, потреба в державній структурі стає очевидною, що призводить до створення належного бюрократичного апарату для її управління."
  crown_power_advance_reformation: "Cuius Regio, Eius Religio"
  crown_power_advance_reformation_desc: "Хоча влада наших правителів над мирськими справами сильна, потреба контролювати божественні справи в державі виникає як нова необхідність. Церква і Держава повинні стати єдиним цілим."
  crown_power_advance_absolutism: "Абсолютизм"
  crown_power_advance_absolutism_desc: "Тепер, коли земні та божественні справи перебувають під владою правителів, небагато що вислизає з їхнього досяжності. Вони стали абсолютними правителями."
  crown_power_advance_revolutions: "Нація"
  crown_power_advance_revolutions_desc: "З об'єднанням усіх Сил під залізною рукою наших монархів, їхні піддані по всій нації усвідомлюють почуття приналежності. Якими б володіннями не правили наші монархи, вони є частиною Нації, а їхній народ — тим самим."
  sergeants_at_arms_advance: "Сержанти-зброєносці"
  sergeants_at_arms_advance_desc: "Невеликий загін вірних слуг, які захищають і служать монарху, сержанти-зброєносці є військовим званням трохи нижче лицаря. Вони можуть служити монарху не лише як охоронці, а й збираючи позики, виконуючи функції поліції або набираючи людей та кораблі."
  alberghi_28_advance: "$alberghi_28$"
  alberghi_28_advance_desc: "$alberghi_28_desc$"
  genoese_banking_traditions: "Генуезькі банківські традиції"
  genoese_banking_traditions_desc: "Піднесення Генуї як одного з головних комерційних центрів середньовічної Італії призвело до раннього розвитку нових форм кредиту та деяких з найперших у світі банківських установ."
  genoese_maritime_diplomacy: "Генуезька морська дипломатія"
  genoese_maritime_diplomacy_desc: "Оскільки місто Генуя стало республікою, що служила інтересам своїх купців, воно розвинуло сильний вплив за кордоном і уклало численні угоди з союзниками та клієнтами по всьому Середземномор'ю."
  bank_of_saint_george: "Банк Святого Георгія"
  bank_of_saint_george_desc: "Банк Святого Георгія — це фінансова установа, створена для консолідації всіх боргів Генуї, з метою стати кредитним плечем країни, фінансуючи її закордонні підприємства."
  the_age_of_the_genoese: "Епоха генуезців"
  the_age_of_the_genoese_desc: "Фінансовий розвиток Генуї в останні десятиліття призвів до того, що генуезькі банкіри стали одними з найзатребуваніших, стимулюючи розквіт нашої країни, стаючи меценатами відомих художників для своїх вілл і палаців."
  hospital_advance: "Шпиталі"
  hospital_advance_desc: "Середньовічні шпиталі — це установи, створені в Середньовіччі для догляду за хворими, бідними та немічними. Зазвичай ними керували релігійні ордени, ці шпиталі пропонували низку медичних послуг, включаючи базовий догляд, трав'яні засоби, а пізніше — хірургію. Вони часто розташовувалися поблизу церков або монастирів і мали окремі палати для чоловіків і жінок. Незважаючи на обмежені медичні знання, ці шпиталі відігравали життєво важливу роль, пропонуючи притулок, комфорт і певну форму медичного лікування тим, хто потребував допомоги в складний період історії."
  banking_country_traditions: "Банківські традиції"
  banking_country_traditions_desc: "Хоча багато хто шукає багатства у можливостях торгівлі та комерції, наша держава заробляє на життя пропозиціями доступних позик."
  genoese_crossbowmen: "$a_genoese_crossbowmen$"
  genoese_crossbowmen_desc: "$a_genoese_crossbowmen_desc$"
  genoese_galley: "$n_genoese_galley$"
  genoese_galley_desc: "$n_genoese_galley_desc$"
  italian_galleass: "$n_italian_galleass$"
  italian_galleass_desc: "$n_italian_galleass_desc$"
  genoese_flexibility: "Генуезька гнучкість"
  genoese_flexibility_desc: "На відміну від війська, флот держави може слугувати багатьом цілям, а не лише бути зброєю війни. Завдяки нашим знанням та досвіду ми можемо миттєво переобладнати наші військові галери на торгові галери і навпаки."
  genoese_school: "Генуезька школа"
  genoese_school_desc: "Живопис Відродження – це італійська традиція. Не дивно, що така багата та шанована держава, як Генуя, відкриває власну Генуезьку школу мистецтв."
  government_size_renaissance: "Постійний кабінет"
  government_size_renaissance_desc: "Правителі традиційно мали раду радників, які консультували та допомагали їм у прийнятті рішень щодо війни та миру. Тепер уряд нашої країни став настільки складним, що нам потрібні більш постійні посади, щоб допомогти нам справлятися з його повсякденним управлінням."
  renaissance_court: "Ренесансний двір"
  renaissance_court_desc: "Відродження поширилося далеко й широко, і тому наш двір тепер має бути наповнений відданими художниками та вченими, які прагнуть створити найвеличніші твори, коли-небудь створені."
  rgo_size_advance_renaissance: "Млини"
  rgo_size_advance_renaissance_desc: "Млини використовувалися з тих пір, як їх відкрили в давнину багато століть тому. Однак тепер ми можемо розробляти більш сучасні та ефективні вітряні та водяні млини для збору сировини."
  food_advance_renaissance: "Інтенсивне землеробство"
  food_advance_renaissance_desc: "Сільське господарство є основою більшості суспільств, скільки б вони не мали записів. Останнім часом розробляється низка досягнень, що покращують продуктивність наших полів і ферм та дозволяють отримувати більші надлишки продовольства."
  crown_power_advance_renaissance: "Суверенітет"
  crown_power_advance_renaissance_desc: "Традиційні способи управління ґрунтувалися на здатності правителя взаємодіяти з різними станами країни. Однак сучасні теорії уряду встановили, що правителі є суверенами у своїй країні і що ми не підкорятимемося жодній іншій світській владі."
  global_supply_limit_modifier_advance_2: "Лінії постачання"
  global_supply_limit_modifier_advance_2_desc: "Сухопутна війна стає все більш залежною від постачання наших дедалі більших армій. Тому краща організація обозних возів означатиме більшу оперативну спроможність для них."
  naval_morale_advance_1: "Середньовічне мореплавство"
  naval_morale_advance_1_desc: "Досягнення в галузі мореплавства за останні десятиліття підвищили досвід та впевненість наших моряків, дозволяючи їм впевнено орієнтуватися в прибережних водах."
  slave_trade_act_advance: "Акт про работоргівлю"
  slave_trade_act_advance_desc: "Потік робочої сили до наших колоній і з них є прибутковою та делікатною справою. Тому ми повинні інвестувати в наші законодавчі спроби його вдосконалення."
  order_headquarters_advance: "$order_headquarters$"
  order_headquarters_advance_desc: "Заснування вірних орденів, безсумнівно, сприятиме не лише збільшенню місцевих оборонних можливостей, а й набору більшої кількості працездатних чоловіків."
  LIV_crusader_forts: "Балтійські хрестоносці-форти"
  LIV_crusader_forts_desc: "Численні укріплення на наших землях завдячують своїм будівництвом та фінансуванням багатьом загонам хрестоносців на наших землях. Озброєні міцними стінами, ці укріплення служитимуть і захищатимуть наш народ!"
  scholasticism: "Класична схоластика"
  scholasticism_desc: "Базуючись на арістотелівській логіці та працях ранніх християнських Отців, схоластика прагне поширювати знання, наголошуючи на релігійних догматичних віруваннях і традиціях."
  organized_religion: "Організована релігія"
  organized_religion_desc: "Релігія відіграє важливу роль у кожному суспільстві, проте не кожна віра має однакову структуру. Організована релігія має систематично впорядковані ритуали та системи вірувань і дотримується визначених доктрин."
  guilds: "Гільдії"
  guilds_desc: "Гільдія – це об'єднання купців або ремісників, які зібралися разом для взаємного захисту, допомоги та для переслідування власних інтересів. Гільдії встановлюють монополії на свої товари та торгівлю, а також встановлюють стандарти якості та ціни своїх товарів."
  colonial_tradition: "Колоніальні традиції"
  colonial_tradition_desc: "Наша держава сформована та виплекана великими амбіціями батьків-засновників; перших колоністів з метрополії. Багато їхніх звичаїв та традицій є частиною нашого власного суспільства в цьому новому та дивному світі."
  colonial_heritage: "Колоніальна спадщина"
  colonial_heritage_desc: "Як колонія метрополії, ми несемо спадщину її імперських амбіцій."
  colonial_ambition: "Колоніальні амбіції"
  colonial_ambition_desc: "Багато наших людей оселилися в Новому Світі, щоб почати нове життя; відкрити чудеса за морем і зробити незайманий континент своїм домом. Їхні амбіції є нашими, коли ми просуваємося все далі й далі в невідоме."
  power_projection_advance_1: "Імперські амбіції"
  power_projection_advance_1_desc: "Коли країни зростали, а держава консолідувалася у Високому Середньовіччі, їхні амбіції також зростали, намагаючись створювати та відтворювати імперії у своїх регіонах."
  trade_advance_age_of_trad: "Торгові ярмарки"
  trade_advance_age_of_trad_desc: "Коли торгові шляхи відновлювалися та зростали протягом Середньовіччя, почали з'являтися нові практики. Торгові ярмарки були масштабними подіями, що проводилися щорічно в містечках і містах, де купці з різних місць могли зустрічатися та укладати угоди."
  colonial_assembly: "Колоніальна асамблея"
  colonial_assembly_desc: "Значна частина законодавчої влади щодо податків та державних бюджетів була передана колоніям."
  founding_fathers: "Батьки-засновники"
  founding_fathers_desc: "Усі ті політики, солдати та дипломати, які відіграли впливову роль у заснуванні своєї нації, здобувши незалежність своєї країни та створивши нову систему управління."
  colonial_militia: "Колоніальна міліція"
  colonial_militia_desc: "За відсутності регулярних гарнізонів колоніальні ополчення відігравали важливу роль у місцевих конфліктах та прикордонних набігах проти корінних племен та інших колоній. Складалися з дорослих чоловіків-громадян, від яких часто очікувалося, що вони забезпечать власну зброю та спорядження."
  new_frontiers: "Нові кордони"
  new_frontiers_desc: "Рух за просування колоніального кордону все далі й далі вглиб Нового Світу, шляхом створення всього, від невеликих торгових станцій до повноцінних поселень з великими площами оброблюваної землі."
  continental_trade: "Континентальна торгівля"
  continental_trade_desc: "Хоча колонії Нового Світу мусили імпортувати багато промислових товарів, вони також стали основним постачальником сировини для європейського ринку."
  manufacturing_center: "Виробничий центр імперії"
  manufacturing_center_desc: "Наші громадяни є основою торговельної імперії нашого сюзерена. До нас доставляються іноземні товари, які ми потім перетворюємо на готову продукцію."
  free_thinkers: "Вільні мислителі"
  free_thinkers_desc: "Ідеї про те, що свобода думки та свобода слова є правом кожної людини, були сильними в колоніях. Що без них не може бути такої речі, як громадська свобода."
  liberty_heroes: "Герої Свободи"
  liberty_heroes_desc: "Багато лідерів війн за незалежність Нового Світу володіли не лише необхідними військовими навичками, але й харизмою, потрібною для підняття бойового духу та згуртування армії, а також були натхненними лідерами для народу."
  beat_to_windward_advance: "Бити проти вітру!"
  beat_to_windward_advance_desc: "Каравели з латинським вітрилом дуже маневрені, що дозволяє їм легко лавірувати проти вітру. Це значно прискорює плавання в несприятливу погоду та ворожих морях."
  route_to_the_indies_advance: "Шлях до Індії"
  route_to_the_indies_advance_desc: "Торгівля з Далеким Сходом є важливою для підтримки нашого способу життя. Однак сухопутний шлях повільний і дорогий. Якби ми могли знайти морський шлях, це відкрило б багато ділових можливостей для купців у нашій країні."
  educated_bureaucrats: "Освічені бюрократи"
  educated_bureaucrats_desc: "Чиновники, що керують нашою адміністрацією, не є неписьменними та лінивими спадкоємцями місць своїх батьків, а натомість освіченими та талановитими особами, які заслужили свою посаду своєю працею та заслугами. Така адміністрація, безсумнівно, може працювати більш злагоджено та ефективно, ніж будь-яка інша."
  efficient_bureaucracy: "Ефективна бюрократія"
  efficient_bureaucracy_desc: "Бюрократія – це мастило, яке забезпечує належну роботу коліс нашої адміністрації. Призначивши ефективних бюрократів, які мають як талант, так і бажання належним чином виконувати свої завдання, ми можемо забезпечити безперебійну роботу наших урядових структур."
  appointed_chain_of_command: "Призначений ланцюг командування"
  appointed_chain_of_command_desc: "Призначення найталановитіших для керівництва нашими людьми в битві замість того, щоб залишати цей обов'язок некомпетентним синам знаті лише через їхню кров, дозволяє нашим арміям працювати ефективніше, і таким чином ми можемо легше командувати більшими арміями."
  abacus_advance: "Рахівниця"
  abacus_advance_desc: "Рахівниці використовувалися з давніх-давен по всьому світу, але саме завдяки належним інструментам обліку та реєстрам ми можемо вести точний облік наших монет. Без них і талановитих людей, які б їх використовували, ми були б сліпі до справжнього багатства нашої країни."
  temporary_appointments: "Тимчасові призначення"
  temporary_appointments_desc: "Призначення наших придворних на довічну посаду несе в собі невід'ємний ризик того, що вони накопичуватимуть владу та вплив чим довше вони перебувають на цій посаді, а також присвячуватимуть менше зусиль своїм завданням через надмірну рутину. Натомість ми можемо встановити систему тимчасових призначень, щоб чиновники призначалися на ті посади, для яких вони найбільш кваліфіковані, але змінювалися на іншу, як тільки вони починають заспокоюватися у своїх завданнях."
  non_inheritable_offices: "Неуспадковувані посади"
  non_inheritable_offices_desc: "Передача нашими придворними своїх посад від батька до сина є чумою для нашої адміністративної системи, яка лише спричиняє поширення апатії та гниття на всі гілки нашої влади. Всі посади повинні натомість призначатися тим, хто здатен виконувати цю посаду, незалежно від їхнього походження."
  government_sanctioned_celebrations: "Урядові святкування"
  government_sanctioned_celebrations_desc: "Наш народ завжди прагне святкувати будь-які добрі звістки нашої країни або будь-які відповідні події нашого календаря. Замість того, щоб вони проводили ці святкування самостійно, ми можемо натомість доручити нашій адміністрації організовувати ці святкування, щоб ми могли не тільки показати нашому населенню, що ми дбаємо про них, але й сформувати почуття єдності серед них."
  efficient_logistics: "Ефективна логістика"
  efficient_logistics_desc: "Логістика та зв'язок – це те, що дозволяє нам належним чином керувати всією нашою територією. Щоб повідомлення могли надходити до наших провінцій та призначених губернаторів і назад, нам потрібна добре налагоджена мережа доріг для наших посланців."
  ledgers_double_checking: "Подвійна перевірка бухгалтерських книг"
  ledgers_double_checking_desc: "Саме відсутність суворості в обліку дозволяє корупції процвітати та роз'їдати країни зсередини. Щоб уникнути цієї загрози нашій адміністрації, ми повинні забезпечити належний облік будь-яких змін у нашій скарбниці."
  province_governors: "Провінційні губернатори"
  province_governors_desc: "Наші провінції не керуються автономно чи будь-якими місцевими дворянами, спраглими до влади. Натомість, губернатори, призначені нашою центральною адміністрацією, відповідають за поширення нашої влади на всі куточки нашої країни."
  right_to_rule: "Право на правління"
  right_to_rule_desc: "Наша адміністрація організована навколо припущення, що талановиті люди призначаються на відповідні посади. Таким чином, правитель повинен бути найталановитішим, як і личить тому, хто керує всією країною. У нещасливому випадку, якщо правитель був недостатньо здібним, нам потрібні люди, відповідальні за «прикрашання» реальності, будь то за допомогою величних статуй, дивовижних картин або піднесених віршів."
  talented_traders: "Талановиті торговці"
  talented_traders_desc: "Не тільки наша адміністрація складається з талановитих особистостей, але й люди, що переміщують товари та монети по всій нашій країні, також повинні бути такими. Наявність найяскравіших умів, що керують нашими торговельними операціями, забезпечить безперебійний потік як продуктів, так і прибутків."
  smooth_administration: "Безперебійна адміністрація"
  smooth_administration_desc: "Наявність адміністрації, що складається з найталановитіших та найвідповідніших осіб, дозволяє нашій країні функціонувати безперебійно, а нашій владі поширюватися безперешкодно, незалежно від зовнішніх обставин, в яких ми можемо опинитися."
  ara_a_maritime_realm: "Морське царство"
  ara_a_maritime_realm_desc: "Царство міцно зосереджене на безмежних просторах моря, спрямовуючи свою увагу на морські справи. Завдяки стратегічному погляду воно використовує військово-морську міць та морську торгівлю для зміцнення своєї позиції та розширення свого впливу. Його морська спрямованість формує політику, сприяючи розвитку морської культури, яка рухає процвітання нації."
  ara_desperta_ferro: "Desperta Ferro!"
  ara_desperta_ferro_desc: "#italic Desperta Ferro!#! (Прокинься, Залізо!) – це грізний бойовий клич $a_almogavars$, що закликає присутність заліза в бою. Він супроводжується ударами списів та дротиків об кремені для створення іскор. Серед інших бойових кличів, таких як #italic Aragó!#! та #italic Sant Jordi!#!, #italic Desperta Ferro!#! виділяється як найвідоміший та унікальний для цих сил."
  ara_a_mediterranean_trade_power: "Середземноморська торгова держава"
  ara_a_mediterranean_trade_power_desc: "Ніжні обійми Середземного моря пестять наші береги, спонукаючи наш народ до поколінь торговельних починань. Наші гамірні комерційні міста та стратегічні торгові пости, розкидані по всьому Середземномор'ю, відіграватимуть вирішальну роль у реалізації нашого прагнення стати домінуючою силою в торгівлі."
  ara_fleet_ordinances: "Флотські постанови"
  ara_fleet_ordinances_desc: "У гамірному Середземномор'ї збираються середньовічні флоти, що викликає потребу в правовій системі для вирішення злочинів у переповнених сухопутних і морських середовищах. #italic Ordinacions sobre lo fet de la mar#! або #italic Постанови про те, що відбувається на морі#! є одним із найдавніших військових кодексів правосуддя, створених для управління флотами. Ця унікальна відповідь на епоху після Чорної Смерті набирає екіпажі з-за меж Арагонської Корони, включаючи злочинців, що призводить до гармонізованого кодексу, сформованого з різноманітних традицій, а не просто кодифікації існуючих морських звичаїв."
  ara_valencian_golden_age: "Валенсійська Золота Доба"
  ara_valencian_golden_age_desc: "Царство, в якому ми живемо, досягло літературних висот, ще не досягнутих багатьма сусідніми народами, завдяки чудовим внескам шанованих авторів, таких як Жоанот Марторель, Аузіас Марч та Ізабель де Вільєна. Їхні глибокі літературні твори підняли нашу культуру на неперевершені рівні, вселяючи почуття гордості в наш народ. Безперечно, наша нація стоїть як сяючий маяк культури, яскраво світячи для всіх."
  ara_remenca: "Ременса"
  ara_remenca_desc: "Система ременси, характерна для Каталонії, має близькі аналоги в інших територіях Корони, сприяючи колективному прагненню до більшого виробництва сировини. Завдяки цій системі наші землі переживають сплеск створення багатства, розпалюючи потенціал для значного прогресу у виконанні наших цілей. Гармонійно використовуючи ці системи, ми створюємо середовище, де наші зусилля зміцнюються достатком ресурсів, що живить шлях зростання та процвітання в нашому царстві."
  ara_chartered_merchant_companies: "Привілейовані торгові компанії"
  ara_chartered_merchant_companies_desc: "Наші торговці марнують ресурси, конкуруючи один з одним, а не з іншими. Це марнотратство, і ми повинні зосередити всі зусилля на перехопленні торгівлі в інших народів. Ми зафрахтуємо компанії, яким буде надано тимчасові монополії на торгівлю з певних регіонів, і чиє поновлення залежатиме від надання короні належної їй частки."
  ara_stronger_united: "Сильніші разом"
  ara_stronger_united_desc: "З моменту об'єднання Арагонського королівства та Барселонського графства у 1164 році Арагон функціонував як Конфедерація, що складалася з окремих володінь під центральним правителем. Ці відмінності сприяли процвітанню та збереженню індивідуальних ідентичностей, проте також породили ілюзію роз'єднаності. Це призвело до необхідності адміністративних реформ для зміцнення нашого союзу, шануючи унікальні характеристики кожної території."
  ara_constellation_cities: "Сузір'я міст"
  ara_constellation_cities_desc: "З моменту свого заснування наша нація складалася з різноманітних володінь, об'єднаних під єдиним правителем. Однак кожне володіння зберігає свої унікальні традиції та закони. Отже, численні великі міста стали регіональними метрополіями, що представляють та керують своїми відповідними регіонами."
  ara_protection_of_the_little_folk: "Захистити простий люд"
  ara_protection_of_the_little_folk_desc: "Наші солдати захочуть знати, що про їхніх близьких подбають у випадку їхньої загибелі в бою. Арагон виконає свій обов'язок і забезпечить це через систему робітних будинків для сиріт загиблих."
  ara_gunpowder_souls: "Порохові душі"
  ara_gunpowder_souls_desc: "Святкування #italic Fallas#! стало каталізатором у Арагонській Короні, стимулюючи розвиток артилерійських технік завдяки практичному досвіду, отриманому від поводження з порохом для петард та феєрверків. Ця святкова традиція підживила дух інновацій, що призвело до розробки нових стратегій та знань щодо артилерії в межах королівства."
  ara_mossos_esquadra: "Mossos d'Esquadra"
  ara_mossos_esquadra_desc: "#italic Escuadras de Paisanos#!, відомі як #italic Esquadres de Catalunya#! або #italic Mossos d'Esquadra#!, представляють місцеве ополчення, присвячене охороні торгових шляхів та ярмарків, використовуючи своє глибоке знайомство з місцевістю. Натхненні їхнім успіхом, ми прагнемо створити подібні ополчення на інших наших територіях, що складаються з місцевих жителів, тим самим сприяючи гармонійному співіснуванню та забезпечуючи мир у цих регіонах."
  cas_repoblaciones: "Репопуляції"
  cas_repoblaciones_desc: "Завоювання, здійснені нашими предками, призвели до того, що країна мала більше землі, ніж людей, доступних для її заселення та обробки. Це призвело до гострої потреби залучати мігрантів з інших регіонів, особливо до південної частини Андалусії, яка була сильно недонаселена після вигнання її мусульманських мешканців у 1267 році."
  cas_the_reconquista: "Реконкіста"
  cas_the_reconquista_desc: "За багато років, що минули з падіння Вестготського королівства від загарбників, ми вели війну проти маврів. Це дало нам міцну дисципліну, якою мало хто може похвалитися. Повстаньте, мужі Кастилії, і покажіть світові свою рішучість!"
  cas_castilian_navy: "Кастильський флот"
  cas_castilian_navy_desc: "Будучи на півострові, оточеному морем з трьох із чотирьох сторін, і з цінною Гібралтарською протокою, за яку змагаються різні держави, домінування на морях стає питанням життя і смерті. Маючи сотні кілометрів узбережжя, наші предки почали приборкувати хвилі, роблячи нашу націю безстрашною морською державою."
  cas_cronicas_reales: "Королівські хроніки"
  cas_cronicas_reales_desc: "Збираючи хроніки, написані попередніми королями, ми можемо створити збірку, що містить усі минулі події нашого королівства або походження наших правителів. Ці знання допоможуть нам не лише створити кращу основу для нашої культури, але й допоможуть нинішнім та майбутнім правителям краще оцінювати поточні події порівняно з минулими."
  cas_masters_of_the_orders: "Майстри Орденів"
  cas_masters_of_the_orders_desc: "Оскільки Реконкіста більше не є нашим головним пріоритетом, незалежність Святих Орденів більше не виправдана. Завдяки тому, що наші правителі займуть посаду Майстрів цих Орденів, ми зможемо не тільки забезпечити їм більшу владу, але й поглинемо військові знання цих хрестоносців."
  cas_new_world: "Новий Світ"
  cas_new_world_desc: "З новими відкриттями нові землі можуть бути освоєні відважними колоністами та принести цінну торгівлю Метрополії. Ми відправимо кількох вірних колоністів, які стануть основою наших колоній."
  cas_reform_of_millones: "Реформа мільйонів"
  cas_reform_of_millones_desc: "Зі схваленням Реформи #italic Millones#! нашими Кортесами, ми зможемо оподатковувати наше населення більш ефективними способами. Це стягнення буде непрямим і буде накладатися на харчові продукти."
  cas_marine_infantry: "Кастильська морська піхота"
  cas_marine_infantry_desc: "Сильний флот потребує екіпажів, здатних битися в будь-якій ситуації, включно з тими, де вони воюють поза суднами. Щоб подолати цю проблему, ми врегулюємо нашу морську піхоту, щоб вона стала потужним інструментом."
  cas_pasos: "Кастильські Пасос"
  cas_pasos_desc: "Хоча #italic Пасос#! Страсного тижня не є чимось новим у Кастилії, скульптурне мистецтво, зображене на них, досягло нового піку в останні роки. Такі художники, як Хуан де Хуні або Грегоріо Фернандес, проклали шлях до того, щоб кастильські #italic Пасос#! стали найвражаючими на Півострові."
  cas_real_academia_espanola: "Королівська іспанська академія"
  cas_real_academia_espanola_desc: "Як і в інших частинах світу, потреба регулювати лінгвістичний аспект нашої культури стає очевидною, оскільки наша мова розвивається та поширюється по всьому світу. Щоб наша мова зберігала свої риси, буде створена #italic Real Academia Española#!, яка встановить правила правильного використання нашої мови."
  cas_canal_de_castilla: "Кастильський канал"
  cas_canal_de_castilla_desc: "Натхненний водними системами по всій Європі, що використовуються як для комерційних, так і для іригаційних цілей, #italic Кастильський канал#! принесе воду з гір на півночі #italic Месети#! та зросить зернові поля Старої Кастилії. Цей інженерний подвиг збільшить врожайність наших полів, створить надлишок, яким ми зможемо торгувати, і стане способом транспортування його до експортних портів."
  cas_royal_factories: "Королівські мануфактури"
  cas_royal_factories_desc: "Намагаючись боротися з експортом сировини замість дорожчих промислових товарів, ми розробимо систему державних фабрик, які індустріалізують нашу націю. Ці нові промислові товари зміцнять економіку нашої нації."
  gra_banu_nasr: "Бану Наср"
  gra_banu_nasr_desc: "Ми походимо з племені Бану л-Хазрадж і є нащадками Са'да ібн Убади, сподвижника пророка Мухаммеда. Засновник нашої династії, Мухаммад I, контролював територію, що включала Гранаду, Хаен, Альмерію та Малагу, хоча деякі з цих земель потрапили до християнських сил. З того часу ми з завзяттям чинили опір їхнім наступам, і ми продовжуватимемо це робити з силою наших предків."
  gra_nasrid_art: "Насридське мистецтво"
  gra_nasrid_art_desc: "Ремісники та архітектори Гранади є наймайстернішими у світі. Вони створюють не тільки корисні речі, але й приємні для очей, чудово поєднуючи обидва аспекти."
  gra_skillful_envoys: "Вправні посланці"
  gra_skillful_envoys_desc: "Наша здатність ефективно використовувати дипломатію була питанням життя і смерті. Ми не можемо просто сидіти склавши руки, ми повинні ще більше навчати наших посланців, щоб забезпечити наше виживання."
  gra_razzias: "Насридські рейди"
  gra_razzias_desc: "Кордони наших ворогів є для нас відкритими можливостями, якщо ми наважимося завдати блискавичних ударів, ми можемо застати їх зненацька і завдати тривалої шкоди."
  gra_muttavia_armies: "Армії Муттавія"
  gra_muttavia_armies_desc: "Гранада має обмежену кількість людей, і призовників не так багато, як нам потрібно було б для ефективного захисту нашої нації. Однак, де нам бракує людей, у нас є багато грошей, які можна використати для купівлі іноземних мечів для боротьби під нашим прапором."
  gra_expand_qanahs: "Розширити Кана"
  gra_expand_qanahs_desc: "Землі Гранади родючі, але розширення каналів, що їх зрошують, дозволить краще використовувати воду, яку ми маємо, щоб наші посіви та фрукти росли міцнішими."
  gra_adaptative_trade: "Адаптивна торгівля"
  gra_adaptative_trade_desc: "Наше привілейоване становище посередників між $christian_ADJ$ та $muslim_ADJ$ націями піддається виклику. Ця загроза може стати можливістю модернізувати наші методи та відновити наше становище як зв'язку між більш віддаленими ринками та Європою."
  gra_expand_the_frontier: "Розширити кордон"
  gra_expand_the_frontier_desc: "З часу заснування нашої династії наші землі зменшувалися. Однак тепер ми перебуваємо в сильній позиції, і ми можемо мріяти не тільки про повернення кожної втраченої території, але й про розширення нашого володіння."
  gra_a_strong_rule: "Міцне правління"
  gra_a_strong_rule_desc: "Протягом десятиліть покоління нашої правлячої родини боролися між собою, дестабілізуючи нашу націю. Настав час об'єднати владу під керівництвом могутнього правителя, який зможе зберегти мир і процвітання для нашого народу."
  gra_modernized_economy: "Модернізована економіка"
  gra_modernized_economy_desc: "Сучасні часи вимагають сучасної економіки, здатної процвітати в більш конкурентному світі. Модернізуючи нашу інфраструктуру та підвищуючи ефективність наших методів і процесів, ми зможемо виробляти більше з тими ж ресурсами."
  gra_ghazawat: "Насрідський Газават"
  gra_ghazawat_desc: "Як перші воїни, що билися під проводом пророка Мухаммеда, наші солдати повинні хоробро, майже фанатично, битися за захист нашого володіння та нашого народу."
  gra_a_new_golden_era: "Нова Золота Доба"
  gra_a_new_golden_era_desc: "Аль-Андалус колись був центром навчання з винятковими вченими, такими як Агмад Ібн Рушд, Абу аль-Касім та Мухаммад бін Туфайль. Ми повинні продовжувати цей стан духу наших предків."
  nav_transatlantic_whaling: "Трансатлантичний китобійний промисел"
  nav_transatlantic_whaling_desc: "$basque$ китобійний промисел має сотні років традицій, і наших фахівців часто використовують інші країни, які бажають розширити та покращити свої рибні промисли. Ми повинні скористатися цим досвідом і поширити наші китобійні підприємства з форпостами по всьому Атлантичному океану."
  nav_shipbuiling_experts: "Суднобудівні експерти"
  nav_shipbuiling_experts_desc: "Море, що цілує наші береги, має безліч ресурсів, які чекають на тих, хто наважиться їх взяти. Протягом століть наше узбережжя було повне портів і верфей, невтомно будуючи кораблі, щоб вгамувати нашу спрагу морських пригод і починань."
  nav_memories_reconquista: "Спогади про Реконкісту"
  nav_memories_reconquista_desc: "Наш народ активно брав участь у Реконкісті, сприяючи $christian_ADJ$ зусиллям з повернення Піренейського півострова з-під $muslim_ADJ$ правління. Незважаючи на досягнення етапу, коли подальше територіальне розширення стало недосяжним, Наварра все ще відігравала значну роль у цьому Хрестовому поході через військові кампанії та союзи з сусідніми $christian_ADJ$ королівствами."
  nav_a_renaissance_realm: "Королівство Відродження"
  nav_a_renaissance_realm_desc: "Незважаючи на гірське походження нашого королівства, у долинах Піренейських гір наш народ отримував гуманістичні впливи як з Півдня, так і з Півночі у великій кількості та якості, ніколи не виходячи з-під їхнього впливу. Приймаючи цю нову свідомість, наваррці не забувають своїх традицій, а поєднують їх зі своєю новою ідентичністю."
  nav_fearless_seamen: "Безстрашні моряки"
  nav_fearless_seamen_desc: "Наш народ завжди дивився на море з благоговінням і страхом, оскільки воно спокушало їх прийняти багатство, яке воно може принести. Наші хоробрі предки заснували громади, які жили не тільки біля моря, але й від нього, розвиваючи вражаючі навички на воді. Моряки з наших берегів добре відомі по всьому Атлантичному узбережжю."
  nav_always_ready: "Завжди готові"
  nav_always_ready_desc: "Ми народилися як невелике королівство, оточене грізними супротивниками з усіх боків. Це глибоко вплинуло на розвиток характеру нашої нації та наш підхід до взаємодії зі світом. Отже, ми залишаємося завжди пильними, готовими реагувати на найменшу ознаку загрози."
  nav_chartered_councils: "Статутні ради"
  nav_chartered_councils_desc: "Кожна історична територія утворить раду, залежну від правителя та обрану місцевими жителями, яка гарантуватиме повагу до їхніх традиційних законів або #italic Fueros#!. Цей проміжний крок дасть нам кращу та ефективнішу адміністративну владу над нашими землями, не втручаючись в інтереси місцевих жителів."
  nav_people_of_the_sea: "Люди моря"
  nav_people_of_the_sea_desc: "Наш народ – досвідчені моряки, і світ про це знає. Наш досвід буде очевидною перевагою для майбутніх морських битв."
  nav_basque_ferocity: "Баскська лютість"
  nav_basque_ferocity_desc: "Ще до битви при Ронсевалі, за яку $french$ досі плачуть, чи кампаній Наваррської компанії, наш народ завжди вважався лютими бійцями. Ми ніколи не повинні дозволяти нашим ворогам забувати про це."
  nav_an_industrious_folk: "Працьовитий народ"
  nav_an_industrious_folk_desc: "Земля, на якій ми живемо, можливо, не найбагатша, але $basque$ народ – працьовиті особистості, які наполегливо працюють, щоб отримати від неї те, що їм потрібно. Чи то виплавляючи наше залізо в металургійних заводах, перетворюючи деревину наших лісів на деревне вугілля, чи створюючи найкращі кораблі навколо. Наше королівство багате завдяки зусиллям нашої громади."
  nav_mercantile_expansion: "Торговельна експансія"
  nav_mercantile_expansion_desc: "Протягом століть наше суспільство торгувало не лише з нашими сусідами, а й з далекими землями, продаючи їм свої товари та отримуючи їхні товари взамін. Це зробило наших купців не лише кращими в цьому мистецтві, а й носіями інновацій інших націй."
  nav_navarrese_defense_force: "Наваррські сили оборони"
  nav_navarrese_defense_force_desc: "З часом наші сусідні нації продовжують набирати силу, створюючи зростаючу загрозу нашому виживанню як нації. Щоб вирішити цю проблему, ми створимо військовий департамент, спрямований на посилення наших сил більшою кількістю солдатів без шкоди для якості новобранців."
  nav_shipyards_ironworks: "Верфі та металургійні заводи"
  nav_shipyards_ironworks_desc: "Традиції суднобудування, сталеливарства та металообробки були поширеними видами діяльності на наших землях протягом століть. Але оскільки розробляються нові методи, потреба адаптувати наші процеси стає очевидною. Наші старі практики повинні прийняти сучасність, щоб успішно конкурувати."
  nav_adept_traders: "Вправні торговці"
  nav_adept_traders_desc: "Якість наших кораблів, майстерність наших купців та ефективність наших процесів зробили наш торговельний бізнес неймовірно прибутковим. Це принесе багато багатства нашій нації, що послужить її зміцненню."
  nav_the_national_military_academy: "Національна військова академія"
  nav_the_national_military_academy_desc: "З професіоналізацією нашої армії виявляється необхідність освітнього центру для наших новобранців. Ми сформуємо корпус досвідчених солдатів, щоб навчити їх таємницям війни, щоб вони стали вістрям нашої армії."
  nav_royal_basque_society: "Королівське баскське товариство"
  nav_royal_basque_society_desc: "#italic Euskalerriaren Adiskideen Elkartea#!, Королівське баскське товариство друзів країни, засноване для заохочення розвитку $basque$ економіки, культури та науки. Воно принесе велику користь країні в найближчі роки."
  nav_efficient_bureaucracy: "Ефективна бюрократія"
  nav_efficient_bureaucracy_desc: "Наша нація підтримує традицію бюрократії з моменту заснування королівства. У світлі мінливих часів потрібні нові підходи до вирішення повсякденних справ. У цьому відношенні Наварра викликає захоплення своїми інноваційними практиками в цій галузі."
  nav_riflemen_march: "Марш стрільців"
  nav_riflemen_march_desc: "Введення гвинтівки в армію призвело до адаптації того, як наші солдати повинні дисциплінувати себе у її використанні. Щоб вирішити цю проблему, наші командири розробили спосіб маршу, який став відомим як доказ компетентності та зосередженості наших солдатів."
  por_battle_ourique: "Битва при Оріке"
  por_battle_ourique_desc: "У 1139 році наші хоробрі війська самотужки перемогли п'ятьох мавританських королів у битві. Цей подвиг вічно житиме в пам'яті наших солдатів, щоб вони перемагали будь-якого ворога, незалежно від того, наскільки він могутній чи добре озброєний."
  por_establishment_portuguese_navy: "Заснування Португальського флоту"
  por_establishment_portuguese_navy_desc: "Король Дініш заклав основи Португальського флоту, призначивши генуезького купця Мануеля Пессанью (спочатку Пессаньо) адміралом національного флоту з місією захисту португальських берегів від набігів мусульманських піратів та створення потужного торгового флоту."
  por_estimulate_rural_areas: "Стимулювати сільські райони"
  por_estimulate_rural_areas_desc: "Багато місць по всій нашій країні, переважно в сільських та віддалених районах, знелюднюються, а поля, ліси та шахти занепадають. Реформуючи нашу правову систему, ми заохотимо людей зробити сільську місцевість продуктивною та утримати там населення."
  por_pursuing_waves: "Переслідуючи Хвилі"
  por_pursuing_waves_desc: "Здається, нашої землі недостатньо для значної частини нашого населення, яке дивиться на море і відчуває #italic saudade#!, ніби це давно втрачений коханець. Порти та доки метушаться, чоловіки записуються на кораблі, ніби сп'янілі бажанням досліджувати світ. Ми добре скористаємося цими людьми."
  por_bombardeiros: "Бомбардейруш"
  por_bombardeiros_desc: "Розроблено нові технології, щоб зробити гармати набагато потужнішими, але палуби кораблів не можуть їх витримати. Зміцнивши ці палуби, наші флоти будуть боятися за їхню гарматну міць на кожному березі."
  por_feitorias: "Фейторії"
  por_feitorias_desc: "Відправимо наших #italic фейторів#! в усі куточки східних континентів і затвердимо нашу країну як домінуючу торговельну силу в Індійському океані. Створивши мережу міцних укріплених торгових постів уздовж узбережжя Африки та Індії, ми зможемо домінувати в місцевій торгівлі, не витрачаючи великих ресурсів."
  por_ordenancas: "Орденанси"
  por_ordenancas_desc: "Наша нація потребує професійної армії, яка охоронятиме священні кордони нашої славетної нації. Ми реформуємо систему призову та навчимо наших молодих чоловіків виконувати цей обов'язок з честю."
  por_the_bandeirantes: "Заохотити Бандейрантів"
  por_the_bandeirantes_desc: "Деякі учасники експедицій углиб країни для полювання на рабів натрапляли на поклади золота та інших дорогоцінних металів і каменів. Ці чутки заохочували б відважні душі подорожувати до наших колоній."
  por_colonial_governors: "Колоніальні Губернатори"
  por_colonial_governors_desc: "Відправивши найздібніших з наших людей керувати нашими колоніями та форпостами від імені наших правителів, ми забезпечимо їхній спокій та лояльність, поки ми отримуємо найбільший прибуток."
  por_royal_absolutism: "Королівський Абсолютизм"
  por_royal_absolutism_desc: "Занадто довго королівська влада була обмежена безглуздими втручаннями знаті, чиї вузькі місцеві інтереси загрожують загальному благу королівства. Ми ігноруватимемо Кортеси та правитимемо без їхнього втручання."
  por_royal_military_academy: "Королівська Академія Фортифікації, Артилерії та Креслення"
  por_royal_military_academy_desc: "Наш артилерійський корпус та укріплення давно були ключем до захисту нашої землі, роблячи нашу маленьку країну міцнішим горішком для ворожих армій. Ми заснуємо військову академію — #italic Academia Real de Fortificação, Artilharia e Desenho#! — щоб навчати наших офіцерів у цих галузях, аби вони, своєю чергою, перетворили наші форти та наш артилерійський корпус на найкращі у світі!"
  por_vinho_porto: "Вінью ду Порту"
  por_vinho_porto_desc: "На берегах річки Дору, на півночі країни, вирощується виноград для створення вина, яке пізніше зміцнюється спиртами, щоб створити те, що починає бути добре відомим як #italic Port Wine#!. Ми не повинні втрачати шанс заробити великі гроші на експорті нашого вина."
  spa_school_salamanca: "Школа Саламанки"
  spa_school_salamanca_desc: "Базуючись в Університеті Саламанки, інтереси Школи лежать у таких різноманітних галузях, як теологія, економіка та політична філософія. Як одна з провідних шкіл думки в католицькому світі, її міцна присутність в Іспанії забезпечує, що наша нація завжди перебуває на передовій інтелектуальних справ."
  spa_viceroyalties: "Іспанські Віцекоролівства"
  spa_viceroyalties_desc: "Нові землі готові бути заявлені за океанами. Ми розділимо їх на землі, керовані представниками нашого правителя, що збільшить там порядок, аби наші люди вважали це привабливим напрямком і забезпечили нашу присутність у цих районах."
  spa_siglo_de_oro: "Сігло де Оро"
  spa_siglo_de_oro_desc: "Культурне життя в нашому королівстві вирує. Якщо ми спрямуємо цю творчість у належні місця, підживлюючи її за потреби благодійниками, ми розпочнемо справжнє Золоте Століття іспанського мистецтва."
  spa_revival_of_ecclesiastical_discipline: "Відродження церковної дисципліни"
  spa_revival_of_ecclesiastical_discipline_desc: "Миряни поширилися серед нашого народу, віддаляючи нас від Бога. Ми підпишемо договори з нашими релігійними лідерами, щоб заохотити міцніший зв'язок між нашим урядом і ними, і повернемося до того, щоб бути побожною нацією."
  spa_naval_reforms: "Іспанські військово-морські реформи"
  spa_naval_reforms_desc: "Наш флот занадто довго залишався осторонь, відстаючи в якості порівняно з нашими конкурентами. Необхідна реформа, яка поверне нас на заслужене місце переваги."
  spa_spanish_enlightenment: "Іспанське Просвітництво"
  spa_spanish_enlightenment_desc: "Нові ідеї сучасної епохи проникають у свідомість великих людей Іспанії, які розробляють плани, щоб наша нація виділялася серед конкурентів по всьому світу."
  tercio: "Терція"
  tercio_desc: "Піхота терції була розроблена головним чином блискучим генералом Гонсало Фернандесом де Кордовою (#italic El Gran Capitán#!), під час Італійських війн. Це змішане піхотне формування пікінерів та мушкетерів. Завдяки такому комбінованому підходу, формування одночасно користується як жорсткістю своєї важкої піхоти, так і далекобійною вогневою міццю своїх мушкетерів, що робить його ідеальним оборонним та наступальним формуванням."
  catalan_galley: "Каталонська галера"
  catalan_galley_desc: "Природна еволюція стародавніх грецьких кораблів, $n_catalan_galley$ є більшою версією тих, що були задокументовані до того, як інші подібні кораблі розвинулися в Середземному морі."
  early_iberian_caravel: "Рання іберійська каравела"
  early_iberian_caravel_desc: "Спочатку іберійського походження, перші каравели були невеликими, але дуже швидкими кораблями, які використовувалися для офшорного рибальства та прибережної торгівлі. Їх використання на Іберійському півострові настільки поширене, що найпередовіші каравели можна знайти саме там."
  iberian_caravel: "Іберійська каравела"
  iberian_caravel_desc: "З потребою у швидших та надійніших каравелах, нові та більші каравели розробляються в іберійських портах. Хоча каравели стали поширеними по всій Європі, іберійські зберігають перевагу у своїй інноваційності та швидкості."
  early_iberian_galleon: "Ранній іберійський галеон"
  early_iberian_galleon_desc: "Рання версія потужного океанського судна, $n_early_iberian_galleon$ є оригінальним винаходом з Півострова, що має нижчий бак та довгий корпус, що робить його особливо стабільним та стійким до лобового вітру."
  square_rigged_caravel: "Каравела з прямим вітрилом"
  square_rigged_caravel_desc: "Поєднавши $n_iberian_caravel$ та $n_carrack$, народиться новий корабель: швидкий та міцний корабель, який допоможе нам панувати на морях."
  iberian_galleon: "Іберійський галеон"
  iberian_galleon_desc: "Природна еволюція $n_early_iberian_galleon$, $n_iberian_galleon$ є більш стилізованою версією попереднього, що стає надзвичайно потужним судном, яке трощить своїх ворогів у морях."
  ara_almogavars: "$a_almogavars$"
  ara_almogavars_desc: "$a_almogavars_desc$"
  ara_catalan_crossbowmen: "$a_catalan_crossbowmen$"
  ara_catalan_crossbowmen_desc: "$a_catalan_crossbowmen_desc$"
  ara_late_almogavars: "$a_late_almogavars$"
  ara_late_almogavars_desc: "$a_late_almogavars_desc$"
  cas_lanzas_de_castilla: "$a_lanzas_de_castilla$"
  cas_lanzas_de_castilla_desc: "$a_lanzas_de_castilla_desc$"
  por_cacadores: "Касадори"
  por_cacadores_desc: "Названі #italic Бойовими Півнями#!, касадори є елітним підрозділом легкої піхоти в португальській армії, які носять коричневу форму, щоб відрізнятися від звичайних солдатів."
  dan_levy_recruitment: "Опора на ополчення"
  dan_levy_recruitment_desc: "Оскільки наші безпосередні володіння зосереджені навколо Ютландського півострова та архіпелагу Данських островів, ми зможемо покладатися на швидко зібране ополчення для захисту нашої країни від іноземної агресії."
  dan_old_naval_traditions: "Морські мережі Данії"
  dan_old_naval_traditions_desc: "Кожна частина нашої країни оточена водами Балтійського та Північного морів. Це дає нам унікальну перевагу використовувати водні шляхи як засоби транспорту та зв'язку, значно скорочуючи відстань між регіонами нашої країни."
  dan_rulers_of_the_north: "Справжні правителі Півночі"
  dan_rulers_of_the_north_desc: "Правителі Данії століттями претендували на верховенство над Північними регіонами. Прикрашаючи спадщину таких королів, як Кнуд «Великий», ми отримаємо внутрішню та зовнішню легітимність."
  dan_reliance_mercenaries: "Опора на найманців"
  dan_reliance_mercenaries_desc: "Данія не може покладатися на велике населення для забезпечення армій, які знадобляться нашій країні як гравцеві на світовій арені. Тому ми повинні забезпечити, щоб найманські компанії були готові служити нашій державі, забезпечуючи їхню лояльність за допомогою затверджених контрактів."
  dan_rentekammer_advance: "Рентекаммерет"
  dan_rentekammer_advance_desc: "Створивши окремий департамент казначейства, #italic Рентекаммерет#!, ми зможемо встановити більший контроль над нашими фінансами та забезпечити ефективнішу роботу нашого уряду. Завдяки документуванню всіх наших фінансових записів ми зможемо легше оцінювати наші майбутні витрати, стабілізуючи наші фінанси."
  dan_royal_danish_navy: "Флот для Данської Держави"
  dan_royal_danish_navy_desc: "Наша країна оточена водою, а отже, відкрита для домінування будь-якої держави з верховним флотом. Щоб цього ніколи не досягли наші вороги, ми повинні фінансувати флот, гідний захисту нашого узбережжя та проектування нашої влади над північчю Європи."
  dan_danish_orthodoxy: "Релігійна однорідність"
  dan_danish_orthodoxy_desc: "У бурхливому релігійному ландшафті Європи нам потрібно буде знайти праведний шлях для Данії та залишатися вірними доктрині нашої Церкви."
  dan_expanded_dockyards: "Копенгагенська верф"
  dan_expanded_dockyards_desc: "У нашій країні існує давня традиція суднобудування. Цим досвідченим корабелам потрібне сучасне та просторе місце для будівництва флоту, гідного називатися данським. Води навколо Копенгагена дають нам ідеальну можливість побудувати таку верф."
  dan_danish_legislation: "Данське законодавство"
  dan_danish_legislation_desc: "Регіональні закони Ютландії, Зеландії та Сконе століттями служили нашій країні основою нашого правового кодексу. Ми повинні зібрати та уніфікувати ці закони для одного послідовного правового кодексу на благо всіх, відомого як #italic Danske Lov#!."
  dan_danish_agriculture: "Сільськогосподарський фокус"
  dan_danish_agriculture_desc: "Хоча данські землі бідні на рідкісні матеріали для експлуатації, вони пропонують нам багато сільськогосподарської продукції для збору врожаю. Використовуючи землю, ми зможемо виробляти більше їжі та не ризикувати голодом у важкі часи."
  dan_royal_life_guards: "Королівська Лейб-гвардія"
  dan_royal_life_guards_desc: "Королівська Лейб-гвардія служить елітним полком данських сил, водночас виконуючи роль особистої гвардії правителя та церемоніальних сил уряду."
  dan_scanian_regiment: "Сканський Полк"
  dan_scanian_regiment_desc: "Сканський Полк є військовою одиницею, що складається з призваних селян, створений для зменшення залежності від найманих сил та побудови більш організованої постійної армії під прямою королівською владою."
  dan_admiralty_college: "Колегія Адміралтейства"
  dan_admiralty_college_desc: "Із заснуванням централізованої колегії для навчання наших військово-морських командирів ми зможемо випускати вправних лідерів, обізнаних з водами навколо нашого узбережжя. Це послужить захисту наших власних вод та забезпечить суверенітет Данії."
  dan_trading_economy: "Морська Країна"
  dan_trading_economy_desc: "Наша економіка не зможе виробляти все самостійно, тому нам потрібно буде покладатися на стабільну торговельну мережу для експорту наших товарів та імпорту всього, що ми самі не здатні виробляти."
  ven_printing_industry: "Друкарська Промисловість"
  ven_printing_industry_desc: "З часу винайдення друкарського верстата жителі Венеції виявили схильність до його використання. Ми повинні заохочувати цю промисловість, оскільки вигоди для Венеції є очевидними."
  ven_stato_da_mar: "Stato da Mar"
  ven_stato_da_mar_desc: "Торгівля — це життєва сила Венеції, а управління нашими заморськими торговими станціями є життєво важливим для наших торгових інтересів. Централізувавши адміністрацію цих земель в єдину одиницю, ми покращимо нашу торгівлю."
  ven_state_inquisition: "Заснувати Державну Інквізицію"
  ven_state_inquisition_desc: "Державна Інквізиція — це колегія з трьох суддів, створена для боротьби із загрозами внутрішній безпеці. Невеликий розмір колегії означає, що вони можуть швидко реагувати на загрози, і їм не знадобиться багато часу, щоб створити мережу агентів як вдома, так і за кордоном, щоб викорінити зрадників."
  venetian_arsenal_advance: "Венеційський Арсенал"
  venetian_arsenal_advance_desc: "Датуючись 12-м століттям, Венеційський Арсенал є основою, на якій тримається наша влада."
  ven_venetian_thalassocracy: "Венеційська Таласократія"
  ven_venetian_thalassocracy_desc: "Венеційська держава завжди мала тісний зв'язок з морем ще з часів свого зародження століття тому. Торгівля та комерція глибоко вкорінені в нашій адміністрації, а венеційські купці мають доступ до більшої кількості ресурсів, ніж будь-яка інша адміністративна."
  ven_venetian_palaces: "$venetian_palaces$"
  ven_venetian_palaces_desc: "$venetian_palaces_desc$"
  ven_gothic_architecture: "Готична Архітектура"
  ven_gothic_architecture_desc: "Під впливом візантійських будівель та з елементами ісламського стилю, венеційська $ven_gothic_architecture$ є основним елементом нашої архітектури і дуже улюблена вищим класом. Багато шляхтичів та заможних купців підтримують цей стиль архітектури своїм золотом."
  ven_ship_mounted_gunpowder_weapons: "Корабельна Порохова Зброя"
  ven_ship_mounted_gunpowder_weapons_desc: "Морський бій тисячоліттями був більше схожий на сухопутну битву на плавучих дошках, ніж на справжній бій корабель-на-корабель. Із запровадженням порохової зброї на наших кораблях ми можемо зламати цю старомодну війну та знищувати ворожі кораблі ще до того, як вони наблизяться до абордажу наших галер."
  ven_magistrato_alla_sanita: "Magistrato alla Sanità"
  ven_magistrato_alla_sanita_desc: "#italic $ven_magistrato_alla_sanita$#! — Магістрат охорони здоров'я — є ключовою установою в нашій державі, яка наглядає за запобіганням хворобам та епідеміям у нашій нації."
  ven_venetian_painting: "Венеційський живопис"
  ven_venetian_painting_desc: "Італійський регіон загалом добре відомий своїм внеском у світову культуру — і венеційський живопис є одним з його великих вкладників. Художники здалеку приїжджають до наших галерей, щоб на власні очі відчути італійське Відродження, що випромінюється з нашого великого мистецтва."
  ven_venetian_school_of_music: "Венеційська школа музики"
  ven_venetian_school_of_music_desc: "У той час як живопис приваблює ентузіастів візуального мистецтва, венеційська музика мандрує далеко за межі, щоб впливати на тих, хто шукає мелодійного просвітлення. Багато великих композиторів походять з наших музичних шкіл і тепер подорожують Європою, щоб поширювати нашу культуру."
  ven_mixed_naval_tactics: "Змішана морська тактика"
  ven_mixed_naval_tactics_desc: "Весла були основою венеційського флоту з моменту його заснування. Однак час був несприятливим для весел, оскільки тепер вітрильні кораблі відіграють все більш домінуючу роль у морських боях у Середземному морі. Наш флот повинен адаптуватися до цього, поєднуючи наш найсильніший актив з великими галеасами."
  ven_naval_conscription: "Морський призов"
  ven_naval_conscription_desc: "Відколи існує Венеція, наші галерні веслярі були вільними людьми, які працювали за плату, але гостра нестача робочої сили ускладнює пошук кваліфікованих чоловіків для цієї роботи. У нас немає іншого вибору, окрім як вдатися до призову для наших галер."
  ven_provveditori_ai_beni_inculti: "Провведіторі ай бені інкульті"
  ven_provveditori_ai_beni_inculti_desc: "Департамент з невикористаних природних ресурсів був створений для допомоги в осушенні боліт та зрошенні сухих земель. Метою є покращення постачання продовольства до Венеції."
  cunning_diplomacy: "Хитра дипломатія"
  cunning_diplomacy_desc: "Зіткнувшись з переважаючими ворогами з обох боків, волоські правителі розвинули хист до зміни альянсів, коли це було доцільно. Деякі забезпечили свій трон за підтримки Османської імперії, а потім укладали союзи з Угорщиною або імператором Священної Римської імперії."
  boyar_regime: "Боярський режим"
  boyar_regime_desc: "Договір в Альба-Юлії закріпив владу волоської знаті. Рада з 12 великих бояр мала брати участь разом з воєводою у виконавчому управлінні країною."
  home_of_hussars: "Батьківщина гусарів"
  home_of_hussars_desc: "Хоча легкі кавалерійські формування як концепція були старою римською ідеєю, перші балканські гусари — або гусари (корсари чи пірати), як їх називали, з'явилися як допоміжні підрозділи Візантійської імперії, набрані переважно з візантійської Сербії у 10-му та 11-му століттях. Навіть після того, як візантійська влада занепала, ця традиція збереглася і була далі вдосконалена в наступні століття."
  serbian_mining: "Сербська гірнича справа"
  serbian_mining_desc: "Балканські гори містять багаті руди, готові до видобутку кваліфікованими шахтарями. Подібно до інших східноєвропейських регіонів, Сербія вітала вправних саксонських шахтарів для розвитку своєї гірничої промисловості. Міста, такі як Ново Брдо, процвітали, перетворюючись на величезні метрополії, що живилися багатством, видобутим з цих земель."
  mimic_the_phoenix: "Наслідувати Фенікса"
  mimic_the_phoenix_desc: "Ми охоче переймаємо візантійські звичаї, прагнучи відобразити їхні закони та загальний стиль. Черпаючи з багатої палітри римського впливу, ми прагнемо наповнити наше управління та правову систему їхньою суттю, свідомо намагаючись наслідувати витонченість та вишуканість Візантійської імперії в нашому королівстві."
  rallying_the_troops: "Збір військ"
  rallying_the_troops_desc: "Наше королівство розробило способи швидкого збору військ, щоб жоден ворог не міг застати нас зненацька. Ця перевага дозволила нам вистояти, незважаючи на всі обставини, що були проти нас, і ми готові до битви. Об'єднані, ми йдемо вперед, рішучі у своїй меті, готові захищати нашу честь і батьківщину."
  keepers_of_the_gate: "Вартові брами"
  keepers_of_the_gate_desc: "Суворий рельєф Сербії породив грізну мережу оборонних споруд, втіленням якої є велична Смедеревська фортеця. Ці міцні укріплення захищають нашу націю, роблячи вторгнення грізною перспективою. Від розлогих гірських хребтів до стратегічних річкових долин, оборонні системи Сербії є свідченням нашої стійкості та незламного духу."
  poklisars: "Поклісари"
  poklisars_desc: "Від самого заснування нашої нації ми незмінно спрямовували свій погляд за межі наших кордонів. Чи то для встановлення прибуткових торговельних шляхів, умиротворення грізних сусідів та побудови альянсів, чи навіть для створення міцних партнерств проти спільних супротивників. Поклісари — це ім'я, яке ми дали послам, що виконуватимуть цю місію від нашого імені."
  the_rebirth_of_the_patriarchate: "Відродження Патріархату"
  the_rebirth_of_the_patriarchate_desc: "У чотирнадцятому столітті Стефан Душан прагнув піднести Архієпископство Сербії до рівня Патріархату. Відтоді наше духовенство намагалося бути незалежним від Константинополя, цементуючи союз між фізичним царством, нашою нацією, та духовним."
  reform_the_ecclesiastical_authorities: "Реформа церковних властей"
  reform_the_ecclesiastical_authorities_desc: "Сербія довго стояла на перехресті східних і західних впливів, включаючи впливи православної християнської віри та Католицької Церкви. Настав час стати на шлях церковної реформи, щоб зміцнити наші релігійні інституції та забезпечити духовне благополуччя нашого царства."
  balkan_hajduks: "Балканські гайдуки"
  balkan_hajduks_desc: "На відміну від своїх північних побратимів в Угорщині, гайдуки в Сербії та сусідніх балканських землях здобули більш сумнозвісну репутацію. Ці чоловіки жили важким життям розбійників, завжди в небезпеці, завжди в русі. Однак під час воєн ці досвідчені, загартовані чоловіки часто поповнювали лави сербських армій, забезпечуючи відмінну — хоч і дещо недисципліновану — піхоту."
  foreign_relations_bureau: "Бюро зовнішніх зносин"
  foreign_relations_bureau_desc: "Наше царство визнало важливість налагодження дружніх відносин та альянсів із сусідніми країнами. Для сприяння цьому ми створимо спеціалізоване бюро, присвячене зовнішнім справам. Підтримуючи цілеспрямовану увагу до дипломатії, ми краще позиціоновані для навігації в складній мережі міжнародних відносин та забезпечення процвітання нашої нації."
  serbian_enlightenment: "Сербське Просвітництво"
  serbian_enlightenment_desc: "Натхненні іншими просвітницькими націями, національні герої, такі як Досітей Обрадович, прагнули піднести нашу народну мову та літературу. Зворушений браком світських творів, доступних простому люду, Досітей Обрадович взяв на себе ініціативу у подоланні розриву між писемною та розмовною сербською мовою. Завдяки старанному створенню граматик та словників, написанню томів та перекладу іноземних творів, наша нація сприяє літературному відродженню завдяки праці цих візіонерів."
  military_modernization: "Військова модернізація"
  military_modernization_desc: "Наш народ пам'ятає народження нашої нації, оточеної грізними силами, що завжди загрожували нашій безпеці. Ця постійна пильність викувала культуру непохитної готовності, забезпечуючи, що наші збройні сили стоять як щит проти негараздів. Безстрашні та шановані, наші солдати перетворили нас з потенційної здобичі на могутнього супротивника, стримуючи тих, хто наважується зазіхати на наш суверенітет."
  seljuk_heritage: "Сельджуцька спадщина"
  seljuk_heritage_desc: "Щоб прийняти майбутнє, ми повинні пам'ятати, чого ми навчилися від персів та Великих Сельджуків, і побудувати державу, яка зможе об'єднати розрізнені народи та вірування в єдине ціле."
  turkic_traditions: "Тюркські традиції"
  turkic_traditions_desc: "Ми походимо зі степів, вітер, труднощі та гострі відчуття битви завжди будуть у нашій крові, і ми ніколи не повинні цього забувати."
  millets: "Кануннаме"
  millets_desc: "Встановлюючи унікальні кодекси законів у кожній з провінцій нашої імперії, ми можемо гарантувати, що наше правління буде вважатися справедливим та рівноправним. Ці збірники законів, відомі як Кануннаме, враховуватимуть місцеві обставини та традиції кожної з наших різноманітних та віддалених провінцій."
  ghazi: "Газі"
  ghazi_desc: "Відповідно до степових традицій, наші дворяни є воїнами прикордоння, і ми будемо безстрашними у боротьбі за розширення Обителі Ісламу."
  azeb_irregulars: "Азеби-іррегуляри"
  azeb_irregulars_desc: "Неодружена молодь, призвана з найбідніших верств суспільства, азеби функціонуватимуть не лише як солдати та моряки, але й як будівельники, сапери та зброярі. Завдяки системі гарнізонів фортець ми забезпечимо, щоб вони завжди отримували платню."
  bashi_bazouks: "Башибузуки"
  bashi_bazouks_desc: "Некеровані іррегулярні війська, набрані з позбавлених прав верств населення, а іноді й відвертих волоцюг, башибузуки забезпечують доступний спосіб гарнізонування фортів і аванпостів, а завдяки їхній схильності до розбою та безглуздих убивств на них завжди можна покластися в справі переслідування ворожих прикордонних територій."
  ottoman_bureaucracy: "Бірун"
  ottoman_bureaucracy_desc: "Бірун, або Зовнішня Служба, складається з групи адміністраторів, військових офіцерів та релігійних вчених, які перебувають поза особистим внутрішнім колом правителя. Разом вони утворюють ефективну бюрократію, успадковану від Ірану та Великих Сельджуків, але додатково адаптовану елементами Візантії, що робить її справді унікальною османською."
  ahdnames: "Ахднаме"
  ahdnames_desc: "Також звані капітуляціями, $ahdnames$ є договірними угодами з іншими націями, що ґрунтуються як на $muslim$, так і на світському праві. $ahdnames$ найчастіше використовуються для гарантування захисту та прав купців або священнослужителів інших націй на наших землях, забезпечуючи дотримання справедливості та безперешкодний потік торгівлі."
  dragomans: "Драгомани"
  dragomans_desc: "Перекладачі, тлумачі та провідники в одній особі, драгомани — це вправні чиновники, які працюють над посиленням наших дипломатичних та комерційних зусиль з різними громадами та країнами. Більшість драгоманів мають грецьке походження, хоча деякі походять з єврейських, вірменських або інших багатомовних середовищ."
  kafes: "Кафес"
  kafes_desc: "Тримаючи наших некерованих принців у спеціальній частині гарему, $kafes$, ми можемо запобігти безглуздим повстанням та суперництву між братами, що раніше мучило наш режим."
  timariots: "Тімаріоти"
  timariots_desc: "Пропонуючи тімарні земельні наділи кавалеристам-сипахам, вони можуть використовувати це нове, спонсороване державою багатство для забезпечення себе та свого почту. Це дозволяє нам виставляти більш грізні кавалерійські сили."
  autonomous_pashas: "Автономні паші"
  autonomous_pashas_desc: "Балансування місцевих потреб та національних інтересів є найскладнішою частиною управління. Особливо з темпом комунікацій, може знадобитися багато часу, щоб найпростіші директиви досягли навіть відносно близьких провінцій. Ми повинні заохочувати місцевих губернаторів до більшої автономії, щоб забезпечити задоволення місцевих інтересів."
  lawcode_of_suleiman: "Правовий кодекс Сулеймана"
  lawcode_of_suleiman_desc: "Сулейман пам'ятається як один із великих правителів історії, воїн, законодавець і реформатор. Насправді, тоді як на Заході його знають як Сулеймана Пишного, на батьківщині його називають «Законодавцем». Центральним елементом його реформ був перегляд османського династичного права, «Канун», щоб привести його у відповідність з ісламським $sharia$."
  ottoman_tax_farming: "Муката'а"
  ottoman_tax_farming_desc: "Система відкупу податків, де дворяни купують право збирати доходи з ділянки землі, що належить короні. $ottoman_tax_farming$ балансує розподіл багатства по всій імперії та відвертає дворян від корупції, даючи їм зацікавленість у підтримці держави."
  ottoman_waystations: "Мензіл"
  ottoman_waystations_desc: "Складна система складів постачання та житла для використання солдатами та чиновниками, станції Мензіл дозволяють нашим арміям менше покладатися на грабунок і залишатися добре забезпеченими на кожному кордоні."
  late_ottoman_bureaucracy: "Маліє"
  late_ottoman_bureaucracy_desc: "Величезна, різноманітна та високоорганізована бюрократія, укомплектована найкваліфікованішими писарями, $late_ottoman_bureaucracy$ прагне бути фундаментальною та непорушною інституцією держави."
  tulip_period: "Епоха тюльпанів"
  tulip_period_desc: "Ми реформуємо старі та застійні традиції, змусимо тюльпани цвісти в усіх садах і започаткуємо нову золоту добу торгівлі та зв'язків."
  imperial_school_of_naval_engineering: "Імперська школа військово-морської інженерії"
  imperial_school_of_naval_engineering_desc: "Ця нова школа, #italic Мухендісхане-і Бахр-і Хюмаюн#!, допоможе нам навчати кораблебудівників, морських офіцерів та моряків як для флоту, так і для торговельного флоту."
  ayans: "Аян"
  ayans_desc: "$ayans$ — це провінційні магнати різного походження, які володіють значною місцевою автономією, але все ще є готовим джерелом доходу від податкового відкупу та військових сил для держави."
  french_language_in_all_courts: "Французька мова в усіх дворах"
  french_language_in_all_courts_desc: "Довгий час латина була лінгва франка Європи, але, чесно кажучи, це мертва мова. Нам потрібно знайти нову лінгва франка, і ніщо так не говорить про лінгва франка, як французька."
  elan: "Елан!"
  elan_desc: "Культивування доктрини атаки є центральним елементом армії. Наші люди повинні виявляти такий елан, щоб ми мали явну перевагу на полі бою."
  estates_general: "Генеральні штати"
  estates_general_desc: "Генеральні штати можуть стверджувати, що існують з 1303 року, але поступово з часом вони перетворилися з ради, скликаної королем, на виборний орган. Це надало Генеральним штатам та податкам, що ними стягуються, більшої легітимності."
  fra_gendarmes: "Жандармські роти"
  fra_gendarmes_desc: "Покладання на систему ополчення наразило наш уряд на великі ризики, і це виявилося надзвичайно обмежувальним. Ми повинні створити групи важкоозброєних кавалеристів з фіксованою зарплатою, щоб вони служили нашому правителю як постійна армія."
  fra_integration_of_new_territories: "Консолідація країни"
  fra_integration_of_new_territories_desc: "Наш вплив на інші країни незаперечний. Чому б не використати цей вплив, щоб безпосередньо включити їх до нашої країни?"
  fra_reliance_on_privateers: "Покладання на каперів"
  fra_reliance_on_privateers_desc: "Пряма конкуренція з іншими морськими державами може бути дорогою і поставити наші фінанси в невигідне становище. Натомість ми повинні спонсорувати наш торговий флот, щоб грабувати та захоплювати торгові судна наших ворогів. Це не тільки забезпечить здоровий дохід для нашої держави, але й порушить морську торгівлю наших суперників."
  fra_reformation_of_taxation: "Заснування Генеральних зборів податків"
  fra_reformation_of_taxation_desc: "Інтенданти, відповідальні за збір податків з народу, призначатимуться не станами, а безпосередньо нашим правителем. Таким чином, ми забезпечимо, щоб офіцери були вірні лише правителю і збирали належну данину."
  fra_school_of_fontainebleau: "Північний маньєризм"
  fra_school_of_fontainebleau_desc: "Як горда країна Відродження, ми повинні інвестувати у створення унікального французького стилю. Запрошуючи іноземних художників та безпосередньо спонсоруючи школу, ми зможемо брендувати їхні художні роботи як суто французькі."
  vauban_fortifications: "Інноваційні укріплення"
  vauban_fortifications_desc: "Це не є радикальним відхиленням у дизайні укріплень, геній полягає у розміщенні фортець. Максимально використовуючи особливості місцевого рельєфу, ту саму фортецю може бути набагато важче взяти."
  the_philosophes: "Філософи"
  the_philosophes_desc: "Ми пишаємося одними з найвидатніших філософів цих просвітницьких часів. Ці мислителі постійно генерують нові ідеї та думки, які стимулюють прогрес у всіх галузях, від найбуденніших до найважливіших."
  fra_expansion_of_france: "Давні претензії"
  fra_expansion_of_france_desc: "Ми простежуємо нашу державу до імперії Карла Великого і тому можемо претендувати на всі ці землі як на нашу законну територію. Завдяки спеціалізованим судам, які відстежуватимуть історію будь-яких територій з нашою короною, ми зможемо повернути ці втрачені землі."
  liberty_egalite_fraternity: "Liberté, Egalité, Fraternité"
  liberty_egalite_fraternity_desc: "Оскільки всі люди рівні перед законом нашої нової держави, люди інших вірувань мають повну участь у державному апараті, таким чином сприяючи прогресу нації."
  fra_code_civil: "Цивільний кодекс"
  fra_code_civil_desc: "Ми повинні скасувати хаотичне нагромадження законів, що керують нашою державою, і встановити єдиний, доступний кодекс законів для всього нашого населення. Цей #italic Цивільний кодекс#! слугуватиме основою для нашого уряду та встановить справедливу систему для всіх."
  magna_carta_advance: "$magna_carta_reform$"
  magna_carta_advance_desc: "$magna_carta_reform_desc$"
  royal_navy: "Королівський флот"
  royal_navy_desc: "Приблизно з 1495 року монархія Тюдорів активно інвестувала не лише в кораблі, а й в інфраструктуру для їх підтримки. Для багатьох це стало офіційним заснуванням Королівського флоту."
  eltham_ordinance: "Елтемський ордонанс"
  eltham_ordinance_desc: "Хоча вони не були прийняті в 1526 році, вони представляли першу спробу оптимізувати Королівську бюрократію Англії, зробити її більш чуйною та економічно ефективною."
  secretaries_of_state: "Державні секретарі"
  secretaries_of_state_desc: "Король завжди мав королівського слугу, відповідального за королівську кореспонденцію. До середини 17 століття їх кількість почала зростати, і вони стали важливими частинами урядового апарату, не лише передаючи королівські укази, а й дозволяючи адміністративну автономію."
  navigation_acts: "Навігаційні акти"
  navigation_acts_desc: "Ці акти представляли найвищу точку меркантилізму. Наша торгівля здійснюватиметься на наших кораблях і спочатку прибуватиме до наших портів, де ми зможемо її оподатковувати."
  eng_red_coats: "Червоні мундири"
  eng_red_coats_desc: "Життя в англійській армії виснажливе та суворо регламентоване, але воно прищеплює людині певний характер. Їхня незворушність та майстерність у володінні вогнепальною зброєю вселяють страх у серця наших ворогів."
  eng_experimental_riflemen: "$a_experimental_riflemen$"
  eng_experimental_riflemen_desc: "$a_experimental_riflemen_desc$"
  sick_and_hurt_board: "Рада з питань хворих та поранених"
  sick_and_hurt_board_desc: "Заснована в 1707 році, її роль полягала в забезпеченні добробуту звичайних рядових моряків на флоті. Вона запровадила низку реформ, які покращили здоров'я моряків на службі."
  british_bill_of_rights: "Англійський Білль про права"
  british_bill_of_rights_desc: "Широка серія реформ, зосереджених на обмеженнях королівської влади, зокрема на судовій системі. Монарх не може односторонньо створювати армії, призначати жорстокі та незвичайні покарання або втручатися у вільні вибори членів Парламенту."
  defense_of_the_faith: "Захист Віри"
  defense_of_the_faith_desc: "Нас вигнали з Акри та Кіпру, але Орден Госпіталю Святого Іоанна не відступить далі. У язичницькі часи Колосс стояв вартовим над гаванню Родосу, але сьогодні найбільші укріплення, які коли-небудь знав світ, взяли на себе охорону."
  assistance_to_the_suffering: "Допомога стражденним"
  assistance_to_the_suffering_desc: "Орден називається лицарями-госпітальєрами недарма: ми спочатку були захисною силою лікарні для паломників у Єрусалимі. Хоча Єрусалим втрачено для сарацинів, ми все ще надаємо медичну допомогу тим, хто її потребує, включаючи наших хоробрих лицарів, які повертаються на поле бою набагато швидше, ніж більшість армій."
  reconquista_of_the_sea: "Реконкіста моря"
  reconquista_of_the_sea_desc: "У наших частих сутичках зі страхітливими корсарами турецької та берберської загрози нам спало на думку, що корсари, можливо, мають рацію щодо морського грабунку та розбою на узбережжі, але вони спрямовують свої хижацькі дії на неправильні цілі. Піратство може бути мерзенним гріхом у мирний час, але у воєнний час воно відоме як «каперство», і це, безперечно, зовсім інша річ, чи не так?"
  friends_in_need: "Друзі в біді"
  friends_in_need_desc: "Наш Орден сформований народами, що прийшли звідусіль по всьому Християнському світу. Цей факт і наша потреба у зовнішній підтримці для виконання нашої місії зробили нас дуже вправними у пошуку допомоги для нашої справи. Ми скористаємося нашою присутністю по всій Європі, щоб звернутися до могутніх католицьких правителів і залучити їх на наш бік."
  scourge_of_the_corsairs: "Бич корсарів"
  scourge_of_the_corsairs_desc: "Знаменитий турецький капер Хайреддін Барбаросса провів багато легендарних битв проти Лицарів, але Барбаросса був далеко не єдиним корсаром, з яким ми стикалися. Турецькі набіги та грабунки всієї Південної Європи, що толерувалися берберськими державами та фінансувалися турками, повинні припинитися. Лицарі виконають свою роботу, захищаючи невинних моряків за будь-яку ціну."
  crusader_tradition: "Хрестоносна традиція"
  crusader_tradition_desc: "Лицарі нашого Ордену були присутні у війнах проти Саладіна та билися на захист останнього форпосту хрестоносців Замор'я, Акри. Якщо хтось із нас потребує натхнення для звершення героїчних вчинків, йому достатньо поглянути на діяння, які Лицарі Ордену Госпіталю Святого Іоанна здійснили в минулому. Ім'я Лицарів-госпітальєрів справді вічне, як і наша славетна мужність у бою."
  ecumenical_defenders_of_christendom: "Екуменічні захисники Християнства"
  ecumenical_defenders_of_christendom_desc: "Реформація зашкодила нашій справі, оскільки німецькі та скандинавські лицарі почали бурмотіти питання про природу Причасної Гості, але завжди присутня загроза турків змушує такі суперечки здаватися незначними. Можливо, нам слід зосередитися на захисті держави та обговорювати теологію, коли сарацинська загроза буде безпечно відведена?"
  a_neverending_crusade: "Нескінченний хрестовий похід"
  a_neverending_crusade_desc: "Наша місія ніколи не закінчиться, доки будь-який католик може бути в небезпеці з релігійних причин. Чи то для паломництва до Гробу нашого Господа і Спасителя, чи просто для перетину морів без страху перед корсарами, ми ніколи не припинимо тренуватися, щоб бути готовими негайно вступити в бій."
  inspired_builders: "Натхненні будівельники"
  inspired_builders_desc: "Головний обов'язок нашого Ордену — воювати, але завдяки Господу, наші боротьби не лише військові. Наші люди потребують зручностей, а також захисту від можливих майбутніх нападів, тому протягом століть ми розвинули дивовижну здатність швидко зводити будівлі та фортеці. Ми використовуватимемо цю здатність не лише для того, щоб зробити нашу столицю більш неприступною фортецею, але й центром культури."
  the_right_hand_pope: "Права рука Папи"
  the_right_hand_pope_desc: "Оскільки світ модернізується, а епоха хрестоносців все більше забувається серед простого люду, потреба впливати на Святого Отця, щоб забезпечити майбутнє нашого народу, стає очевидною для будь-якого лідера, який може стати нашим Великим Магістром. Ми станемо найкращими радниками та друзями Верховного Понтифіка. Звісно, у нашому прагненні служити йому, ми все ще можемо отримати деяку перевагу для себе, чи не так?"
  a_brand_new_world: "Абсолютно новий світ"
  a_brand_new_world_desc: "Світ розвивається, і те, що колись було одним, тепер стало іншим, змушуючи кожного стати чимось іншим або бути забутим Історією. Наш Орден існує вже понад півтисячоліття, і ми ще не готові просто зникнути. Наші смертні тіла зрештою приєднаються до Творця, але наш Орден повинен стати безсмертним. Ми будемо найсучаснішими серед сучасних націй, стаючи сильнішими з самого ядра нашої нації."
  an_order_with_state: "Орден з державою"
  an_order_with_state_desc: "Хоча деякі нації часто описують як #italic Армію з державою#!, ми, з іншого боку, завжди були Орденом з нацією, починаючи з нашого придбання Родосу у греків. Проте ми не можемо не захоплюватися тим, наскільки ефективно вони використовували свої ресурси, щоб стати грізною нацією. Натхненні їхнім успіхом, ми впровадимо реформи, щоб забезпечити нашій армії можливість впевнено протистояти будь-якому супротивнику."
  local_merchant_preference: "Перевага місцевих купців"
  local_merchant_preference_desc: "Теоретично купець може бути громадянином світу, плаваючи до будь-якого порту, який йому заманеться, і з нього. Ми надамо переваги вітчизняним купцям, наприклад, пріоритет у завантаженні та розвантаженні вантажів, щоб забезпечити нашим купцям усі стимули для доставки своїх товарів додому."
  association_with_unbelievers: "Асоціація з невіруючими"
  association_with_unbelievers_desc: "Є ті, хто вважає, що ми взагалі не повинні асоціюватися з невіруючими. Ми багато зробили, щоб придушити це, оскільки лише через асоціацію з невіруючими ми зможемо торгувати з ними."
  port_security_improvement: "Покращення безпеки порту"
  port_security_improvement_desc: "Щоб заробляти на торгівлі, нам потрібно, щоб вантажі безпечно швартувалися в наших портах. Ми повинні забезпечити, щоб райони, де збираються купці, були вільними від дрібної злочинності."
  end_of_shipbuilding_guilds: "Кінець Суднобудівних Гільдій"
  end_of_shipbuilding_guilds_desc: "Доки на Аравійському півострові будувалися кораблі, існували гільдії, що контролювали це. Хоча вони, можливо, виконували цінну послугу, зберігаючи суднобудівні традиції, тепер вони є перешкодою для прогресу. Ми повинні відкрити суднобудування для всіх талановитих."
  skilled_captains: "Вправні Капітани"
  skilled_captains_desc: "Ми повинні забезпечити, щоб наші капітани мали найвищі стандарти мореплавства та морських знань. Забезпечуючи, що вони зможуть використовувати будь-яку перевагу в маневреності в усіх ситуаціях."
  expansion_of_trade_contacts: "Розширення Торговельних Контактів"
  expansion_of_trade_contacts_desc: "Ми повинні забезпечити, щоб наших купців завжди вітали, куди б вони не йшли. Таким чином, ми використаємо всі можливі засоби, щоб переконатися, що всі правителі, про яких ми чули, вітають наших купців."
  unlock_gallowglass_advance: "$a_gallowglass$"
  unlock_gallowglass_advance_desc: "$a_gallowglass_desc$"
  unlock_reformed_gallowglass_advance: "$a_reformed_gallowglass$"
  unlock_reformed_gallowglass_advance_desc: "$a_reformed_gallowglass_desc$"
  unlock_late_gallowglass_advance: "$a_late_gallowglass$"
  unlock_late_gallowglass_advance_desc: "$a_late_gallowglass_desc$"
  scottish_salmon: "Збереження Шотландського Лосося"
  scottish_salmon_desc: "Наші річки та узбережжя багаті на лосося. Лише за умови ретельної уваги та суворого законодавства ми зможемо використовувати цей ресурс і спрямувати нашу місцеву економіку на експорт цієї дуже затребуваної риби."
  scottish_morale: "Шотландська Мужність"
  scottish_morale_desc: "З початку нашої війни проти англійської тиранії ми зберегли нашу незалежність завдяки зусиллям відважного шотландського народу. Пам'ять про таких людей, як Вільям Воллес, спонукатиме наші армії захищати та оберігати шотландську незалежність."
  scottish_longbowmen: "Англо-шотландські Довголучники"
  scottish_longbowmen_desc: "Зі зміцненням наших зв'язків з Англією, ми включимо частину їхньої військової тактики до нашої армії і перетворимо ці підрозділи на силу, що вселяє страх."
  peel_towers_advance: "Вежі Піль"
  peel_towers_advance_desc: "Вежі Піль розвивалися як відповідь на суворе життя в прикордонних землях нашої країни. Вони слугують захистом від вторгнень ворожих загонів, оберігаючи як людські життя, так і худобу, а також як швидкий спосіб сповістити сусідні міста про наближення ворожих армій за допомогою сигнальних вогнів."
  scottish_tenacity: "Непохитна Земля"
  scottish_tenacity_desc: "Війни можуть бути довгою та виснажливою справою. Якщо ми хочемо зберегти нашу незалежність, ми повинні бути готовими витримати важкі часи. На щастя, наш народ такий же непохитний, як і земля, яку вони називають своїм домом, і чинить опір іноземним загарбникам до останнього."
  influx_of_english_nobles: "Англійські Адміністратори"
  influx_of_english_nobles_desc: "Ми забезпечили мир з нашим південним сусідом і це призвело до постійного притоку англійських дворян до нашої адміністрації. Завдяки цьому ми можемо ефективніше здійснювати контроль над нашою країною."
  scottish_trade_connections: "Північноморські торговельні зв'язки"
  scottish_trade_connections_desc: "Наша країна розташована на крайньому заході Західної Європи і бідна на ресурси. Якщо ми прагнемо економічного процвітання, ми повинні інвестувати та розширювати наші торговельні зв'язки з віддаленими регіонами. Північне море сполучає з багатими ринками та можливостями для торгівлі, якщо ми лише скористаємося ним."
  comets: "Комети?"
  comets_desc: "Нещодавно ми отримали новий том, що є вельми цікавим для читання, він називається #italic Про справжнє значення комет проти марнославства астрологів#!. Ми постановили, що всі в королівстві повинні бути обізнані з його змістом."
  modernized_royal_scots_navy: "Королівський шотландський флот"
  modernized_royal_scots_navy_desc: "З часів Війн за незалежність ми прагнули розбудувати наш флот. Раніше ми використовували феодальні зобов'язання для забезпечення флоту, тепер ми створимо сучасний флот, що належатиме Королю, з базуванням у нашому новому порту Ньюхейвен."
  royal_revenue: "Посилити королівські доходи"
  royal_revenue_desc: "Якщо ми прагнемо й надалі утримувати Шотландію вільною від поневолення, ми повинні забезпечити стабільні джерела доходу. Посиливши наш контроль над королівськими маєтками та феодальними правами, ми можемо збільшити наші законно отримані податки. Завдяки цим методам ми можемо забезпечити корону достатніми коштами для дій за її волею, не покладаючись на інші джерела грошей."
  scottish_education: "Університети Шотландії"
  scottish_education_desc: "Пізнавши іноземні європейські університети та освіту, настав час покращити систему освіти вдома та надати місце для навчання найкращим з нашого народу. Наш народ повинен мати змогу прагнути здобуття знань та навичок у своїй рідній країні без дорогих подорожей та залежності від іноземних закладів."
  act_of_revocation: "Акт відкликання"
  act_of_revocation_desc: "Протягом найдовшого часу було звичаєм дарувати частини Королівського Домену нашій знаті за їхні послуги. Цю систему більше не можна підтримувати, якщо ми хочемо забезпечити цілісність нашого домену. Відтепер ми наполягатимемо на оренді цих земель замість дарування."
  scottish_diplomacy: "Покладання на союзи"
  scottish_diplomacy_desc: "Протягом століть ми покладалися на дипломатію та контакти з іноземними державами на континенті, щоб забезпечити нашу незалежність. Настав час формалізувати цю практику та забезпечити, щоб наші зв'язки тривали ще століттями."
  scottish_highlander_advance: "Створити гірські полки"
  scottish_highlander_advance_desc: "Набір полків з людей, що населяють Шотландське високогір'я, може стати вирішальним активом у наших військових зусиллях."
  scottish_whisky: "Шотландський віскі"
  scottish_whisky_desc: "Хоча винокурні існували в Шотландії протягом тривалого часу, ми повинні забезпечити, щоб ці галузі були під належною опікою держави. Завдяки цьому ми можемо утвердитися на передовій виробництва алкогольних напоїв та розширити нашу експортну галузь."
  scottish_enlightenment: "Шотландське Просвітництво"
  scottish_enlightenment_desc: "Швидкі досягнення у філософії, політичній економії та медицині призводять до безлічі досягнень наших співвітчизників, які виведуть Шотландію на передову світових інновацій. Цей період Шотландського Просвітництва може стати дуже потужним інструментом для нас на світовій арені."
  swabian_league_of_cities: "Ліга міст"
  swabian_league_of_cities_desc: "Швабія є домом для багатьох заможних міст, що робить їх бажаними цілями для іноземних амбіцій та завоювань. Щоб краще захистити наші землі, ми повинні об'єднатися в часи війни та боротися проти іноземного втручання на наших землях."
  swabian_frugal_people: "Ощадливі фінанси"
  swabian_frugal_people_desc: "Багато хто звинувачував наш народ у скупості та сміявся з нашого доброго економічного розсуду. На щастя, їхні глузування легко витримати, маючи надійну скарбницю та достатньо дукатів для інвестування у власні амбіції."
  franconian_proud_knights: "Лицарі Імперії"
  franconian_proud_knights_desc: "Наш народ дав світу довгу низку славних лицарів на імперській службі. Вони уособлюють і втілюють багато лицарських ідеалів, які згодом стали менш поширеними, але, тим не менш, є невід'ємною частиною того, ким ми прагнемо бути. Таким чином, ми маємо довгу історію, на яку можна озирнутися, яка навчила нас багатьох уроків як щодо лицарської поведінки, так і щодо більш мілітаристських аспектів життя. Природно, це також впливає на готовність наших дворян надавати ополчення в надії здобути славу в почесному бою."
  franconian_wine_bottles: "Сільванер і Боксбойтель"
  franconian_wine_bottles_desc: "Боксбойтель є важливою частиною нашої міцної та гордої винної традиції. Будучи дуже зручною та легко впізнаваною, форма цієї пляшки слугує своєрідним амбасадором прекрасних вин, що виробляються в нашому регіоні. Містячи такі відомі вина, як Сільванер або Рислінг, наші склодуви та винороби, безсумнівно, принесуть нам економічний добробут."
  westphalian_monastic_traditions: "Земля монастирів"
  westphalian_monastic_traditions_desc: "Північні частини Німеччини є домом для багатьох католицьких оплотів, таких як єпископства в Мюнстері та Падерборні. Монастирське життя та пов'язані з ним релігійні традиції в регіоні мають загалом позитивний вплив на грамотність та освіту нашого духовенства, оскільки існує безліч місць та можливостей для них, щоб далі навчатися та здобувати знання, надаючи безліч варіантів для священнослужителів, які прагнуть приєднатися до Святої Матері-Церкви."
  north_german_hanseatic_traditions: "Ганзейські торговці"
  north_german_hanseatic_traditions_desc: "Народи наших регіонів у північній частині Німеччини протягом довгого часу користувалися перевагами доступу до Балтійського моря. У той час як багатьом нашим південним сусідам доводиться використовувати річки для транспортування товарів, ми користуємося давньою традицією торговців, які плавають Балтикою, заробляючи статки та приносячи багатство й процвітання на наші береги."
  german_baltic_sailors: "Балтійські моряки"
  german_baltic_sailors_desc: "Суворіші клімати створюють витривалих людей. Сусідство з холодним Балтійським морем, безумовно, залишило свій відбиток на наших моряках, зробивши їх дуже вправними у своїй професії та надзвичайно стійкими ментально, адже море може бути дуже суворою пані."
  german_populating_the_countryside: "Залучення потрібних людей"
  german_populating_the_countryside_desc: "Переселення більш сільських районів та надання людям землі для обробітку стане чудовою основою для повільного, але впевненого збільшення багатства та процвітання наших нині лише рідко заселених земель."
  german_fair_towns: "Імперські ярмаркові міста"
  german_fair_towns_desc: "Великий привілей, наданий самим Імператором лише обраним містам Імперії, що дозволяє багатьом торговцям збиратися та брати участь у деяких з найбільших ринків у всій Європі, ці міста справді є серцем торгівлі в Імперії. Централізований характер цих великих ринків також значно полегшує купцям планування та ведення переговорів у середовищі, що пропонує велику свободу та різноманітність, а отже, більший ступінь доступу до всіх видів товарів."
  german_imperial_roads: "Імперська дорожня мережа"
  german_imperial_roads_desc: "Протягом століть дороги будувалися, розширювалися та вдосконалювалися в серці Європи. Від римлян до сьогоднішнього дня переваги багатьох імперських доріг, що з'єднують місця в Німеччині між собою, роблять торгівлю та подорожі набагато легшими та доступнішими для всіх, а також несуть великі переваги для будь-яких логістичних потреб, що можуть виникнути, особливо коли йдеться про пересування армій."
  landsknechte: "Ландскнехти"
  landsknechte_desc: "Новий тип організації військ виник із повторюваних війн у Німеччині та на її кордонах. $landsknechte$ — це змішані війська, сформовані інноваційними пікінерськими каре, з аркебузирами, що підтримують з флангів, і передовою лінією, що складається з сумнозвісних #italic Doppelsöldner#!, «людей з подвійною платнею», які носять дворучні мечі. Це дозволяє використовувати тактики, що поєднують ближній та середній бій."
  german_biedermeier: "Бідермаєр"
  german_biedermeier_desc: "Період Бідермаєра відзначає консервативний погляд у нашому суспільстві, що походить від вищих класів та їхнього прагнення до минулих часів. Це призводить до того, що багато вільнодумних та творчих занять відбуваються в приватності домівок людей, прихованих від публічного ока. Хоча це ненавмисно зміцнює розвиток культурної ідентичності в буржуазному класі, це також є причиною еміграції багатьох вільнодумців та продовження їхніх занять за кордоном."
  custom_union_of_the_rhine: "Рейнський монетний союз"
  custom_union_of_the_rhine_desc: "У мозаїці імперії необхідно співпрацювати зі своїми сусідами в економічних питаннях, щоб процвітати. Ми приєднаємося до митного союзу Рейну та приймемо їхні #italic гульденові#! монети, щоб полегшити торгівлю для наших купців та спростити дипломатію з іншими країнами."
  saiger_process: "Процес Зайгера"
  saiger_process_desc: "Новий і революційний процес виплавки, що збагачує мідь, що містить срібло, свинцем, дозволить нам збільшити продуктивність наших гірничих робіт."
  austrian_tradition: "Дім Слави"
  austrian_tradition_desc: "Наше піднесення до влади викликало багато заздрості, і конкуруючі доми імперії змагаються за нашу позицію захисників південно-східного кордону. Незважаючи на ці обставини, ми пишаємося дипломатичними маневрами, неперевершеними ніким іншим."
  austrian_heritage: "Спадщина Рудольфа I"
  austrian_heritage_desc: "Перемога Рудольфа I над його суперниками забезпечила наше місце серед великих домів імперії і є предметом багатьох оповідей та пісень. Завзяття, виявлене ним та його лицарями в битві на Мархфельді, надихатиме наші війська на століття вперед."
  hab_expert_mountaineers: "Земля гір і річок"
  hab_expert_mountaineers_desc: "Наш народ добре пристосований до подолання перешкод нашої країни, від високих вершин і перевалів наших гір до широких річок наших долин."
  austrian_marriage_policy: "Tu Felix Austria Nube"
  austrian_marriage_policy_desc: "Нехай інші воюють, ти, щаслива Австріє, одружуйся! Бо те, що дарує інший Марс, дає тобі Венера, богиня."
  habsburg_dominance: "Австрійська дипломатична експертиза"
  habsburg_dominance_desc: "Наше розташування в центрі Європи вимагає від нас гнучкої позиції щодо зовнішньої дипломатії. Альянси та суперники можуть розпадатися так само швидко, як і формувалися, і наші дипломати повинні бути навчені охоплювати всі можливі позиції."
  austrian_military_flexibility: "Тактика ландскнехтів"
  austrian_military_flexibility_desc: "Лише добре продумана та відпрацьована тактика артилерійського шоку, кавалерійських атак та непохитної піхоти, набраної з ландскнехтів, може привести нас до перемоги."
  edict_of_restitution: "Едикт про реституцію"
  edict_of_restitution_desc: "Невеликий шматок бухгалтерії допоможе нам пережити будь-які релігійні чвари, що можуть спіткати наше царство. Цей нешкідливий едикт, безсумнівно, не спричинить жодних подальших конфліктів."
  austrian_court: "Австрійський двір"
  austrian_court_desc: "Підтримання наших дипломатичних відносин вимагає часу та зусиль, і залучення занадто багатьох людей до дипломатичних місій може негативно позначитися на нашій власній ефективності та репутації. Оптимізувавши наш двір, ми можемо забезпечити отримання необхідної інформації для згладжування гострих кутів, коли вони виникають."
  geheimrat: "Таємна рада"
  geheimrat_desc: "Таємна рада — це елітний дорадчий орган, що складається з високопоставлених дворян та чиновників, який слугує центральною установою для керівництва політичними, військовими та адміністративними рішеннями Австрії."
  hofkriegsrat: "Військова рада"
  hofkriegsrat_desc: "Наша Військова рада може функціонувати лише за наявності належної бюрократичної структури. Лише коли ми знатимемо кожну деталь про наші війська та логістику, ми зможемо захистити наше царство від ворожих загарбників."
  military_border: "Військова границя"
  military_border_desc: "Захист наших кордонів є серйозною проблемою, особливо фінансові труднощі, які він може спричинити державі. Рішення, до якого ми дійшли, полягає в наданні щедрих земельних наділів на кордоні для створення професійного військового класу. Це забезпечить вищу дисципліну в наших джерелах робочої сили та полегшить міграцію людей у малонаселені регіони нашого царства."
  austrian_ambition: "Просвітництво через освіту"
  austrian_ambition_desc: "Наші правителі повинні отримати найкращу можливу освіту, щоб відповідати ідеалу освіченого монарха."
  austrian_state_industrialization: "Державна індустріалізація"
  austrian_state_industrialization_desc: "Модернізація нашої промисловості завжди повинна бути в центрі уваги нашої країни. Лише з сучасними мануфактурами ми можемо конкурувати з нашими суперниками на світовій арені."
  wiener_klassik: "Віденська класика"
  wiener_klassik_desc: "Віденський класицизм — це трансформаційний музичний період. Твори наших найкращих композиторів революціонізують західну музику завдяки їхнім інноваціям у симфонічних, оперних та камерних формах."
  multicultural_empire: "Багатокультурна імперія"
  multicultural_empire_desc: "Австрія — різноманітна та багатокультурна держава, яка покладається на прийняття та пристосування до своїх численних етнічних меншин для підтримки єдності та стабільності серед зростаючих націоналістичних напружень."
  imperial_artillery: "Імперська артилерія"
  imperial_artillery_desc: "Швидко мінлива природа війни спонукає нас модернізувати наші війська та тактику. Щоб випередити наших ворогів, ми зробимо нашу артилерію гордістю імперської армії."
  alchemy_advance: "Алхімія"
  alchemy_advance_desc: "Мистецтво алхімії передбачає створення зілля та еліксирів за допомогою поєднання трав, мінералів та інших природних інгредієнтів. Хоча не завжди надійне, використання алхімії іноді може давати чудові результати в лікуванні різних недуг."
  anatomy_advance: "Анатомія"
  anatomy_advance_desc: "Лікарі розвивають більш глибоке розуміння анатомії людини, що призводить до ефективніших методів лікування травм та хвороб. Ці знання, значною мірою отримані з практичних розтинів людських трупів, також допомагають покращити хірургічні методи та зменшити ризики медичних процедур."
  surgery_advance: "Хірургія"
  surgery_advance_desc: "Цирульники-хірурги розробляють більш складні методи лікування травм та хвороб, а розробка нових хірургічних інструментів робить процедури безпечнішими та ефективнішими. В результаті пацієнти виживають після травм та хвороб, які були б смертельними лише кілька років тому."
  pharmacology_advance: "Фармакологія"
  pharmacology_advance_desc: "Алхіміки та лікарі досліджують нові сполуки та хімічні суміші у пошуках ліків. Деякі з цих ранніх фармацевтів розробили методи лікування поширених хвороб, таких як лихоманка, застуда та проблеми з травленням, і їхні методи обіцяють багато на майбутнє. Однак ще багато чого потрібно дізнатися, і багато з цих нових ліків можуть бути небезпечними, якщо їх неправильно приготувати."
  sanitation_advance: "Санітарія"
  sanitation_advance_desc: "Поселення інвестують у покращені санітарні заходи, такі як утилізація відходів та системи чистої води. Це зменшить поширення хвороб та покращить загальний стан здоров'я населення. Розвиток сучасних санітарних практик дозволить людям жити ближче один до одного, не піддаючись хворобам."
  vaccination_advance: "Вакцинація"
  vaccination_advance_desc: "З розробкою вакцин лікарі можуть забезпечити населення імунітетом проти смертельних хвороб. Ці вакцини допомагають зменшити поширення хвороб та запобігти епідеміям. Вводячи невелику кількість ослаблених або мертвих бактерій чи вірусу в організм, імунна система здатна розпізнати та боротися з хворобою, якщо вона коли-небудь знову зустрінеться з нею."
  vibrant_court_advance: "Жвавий двір"
  vibrant_court_advance_desc: "Великі уми злітаються до нашого двору з усього відомого світу, приносячи з собою різноманітні моди та мови. В результаті ми стаємо більш пристосованими до їхніх чужоземних \"манер\"."
  patio_process_advance: "Патіо-процес"
  patio_process_advance_desc: "$patio_process_advance$ полягає в методі очищення низькоякісних срібних та золотих руд хімічним розчином на основі ртуті для каталізації реакції амальгамації."
  pan_amalgamation_advance: "Чанова амальгамація"
  pan_amalgamation_advance_desc: "$pan_amalgamation_advance$ — це покращення $patio_process_advance$, що дозволяє прискорити час обробки."
  milanese_tradition: "Ломбардська спадщина"
  milanese_tradition_desc: "Слава та вплив Ломбардського королівства відчуваються й донині. Як їхні явні духовні спадкоємці, шляхетні родини Мілана користуються певною мірою авторитету та поваги над іншими."
  milanese_heritage: "Традиція кондотьєрів"
  milanese_heritage_desc: "Жителі Мілана звикли воювати як найманці у постійних чварах по всьому регіону, заробляючи собі репутацію дуже здібних солдатів."
  renaissance_prince: "Князь Відродження"
  renaissance_prince_desc: "Інші правителі Італії можуть лише на словах підтримувати культурне відродження, що постає перед нами; нехай Мілан стане його центром під нашим покровительством."
  patron_of_music: "Покровитель музики"
  patron_of_music_desc: "Музичні мистецтва були, на жаль, занедбані іншими князями. Давайте ж покровительствувати музиці на Славу Божу, і нашу власну, і Мілан також засяє."
  lowered_power_of_barons: "Зниження влади баронів"
  lowered_power_of_barons_desc: "Мистецтво та культура – це одне, але якщо ми хочемо залишатися незалежними, нам потрібні гроші. Для цього ми повинні зламати владу місцевої знаті та забезпечити, щоб більше грошей надходило до центру."
  age_of_condottieri: "Епоха кондотьєрів"
  age_of_condottieri_desc: "Оскільки найманці становлять основу багатьох армій, нам було б розумно забезпечити, щоб і ми мали найманців під рукою. Давайте подбаємо про те, щоб найманські капітани, що проходять повз, були тепло зустрінуті в Мілані, щоб вони пам'ятали про нас, коли прийде час."
  encouragement_of_philosophers: "Заохочення філософів"
  encouragement_of_philosophers_desc: "Ми в Мілані давно підтримуємо ренесансну думку. Ми повинні продовжити цю традицію, розширити покровительство та побудувати заклади, щоб найкращі мислителі всієї Європи приїжджали сюди."
  merchant_princes: "Купецькі князі"
  merchant_princes_desc: "Великі прибережні міста Італії здавна мали великі торговельні мережі, що приносили багатство та владу до їхнього порогу. Мілан, можливо, і не на узбережжі, але це не означає, що Міланське герцогство не може отримати свою частку. Нехай буде відомо, що люди багатства, які вирушають і привозять багатства світу, будуть прихильно зустрінуті при дворі Мілана."
  rulership_of_enlightened_principals: "Правління через просвітлені принципи"
  rulership_of_enlightened_principals_desc: "Завдяки заохоченню філософів почали з'являтися нові теорії та принципи. Структуруючи наш уряд відповідно до цих принципів, ми отримаємо більшу підтримку, принаймні серед тих, хто справді має значення."
  milanese_ambition: "Нове Ломбардське Королівство"
  milanese_ambition_desc: "Слава попереднього Ломбардського Королівства блідне в порівнянні з тим, чого вдалося досягти народу Мілана, і чого вони ще готові досягти. Всі схиляться перед нами."
  pap_head_of_the_church: "Глава Церкви"
  pap_head_of_the_church_desc: "Курія та Святий Престол тісно переплетені з папським урядом. Кардинали з інших націй та держав можуть намагатися впливати на релігійний напрямок християнства, але зрештою, саме Папство завжди матиме найбільший вплив у Курії."
  pap_the_word_of_the_lord: "Слово Господнє"
  pap_the_word_of_the_lord_desc: "Як Його найвірніші слуги; Його найсвятіші єпископи, саме ми читаємо та тлумачимо Слово Господнє. Таким чином, наша дипломатія підкріплена божественністю Бога."
  ecclesiastical_primacy: "Церковний примат"
  ecclesiastical_primacy_desc: "Папа має суверенну владу встановлювати релігійний канон і закон у Католицькій Церкві. Держава має особливі стосунки з тими, хто відповідає католицькій владі."
  papal_investiture_and_tithes: "Папська інвеститура та десятини"
  papal_investiture_and_tithes_desc: "До Риму стікаються багатства християнської Європи."
  glory_of_rome: "Слава Риму"
  glory_of_rome_desc: "Ми контролюємо велике місто та стародавню столицю римлян. Ми є хранителями їхньої чудової традиції."
  donation_of_constantine: "Дар Костянтина"
  donation_of_constantine_desc: "Дар Костянтина демонструє нашу владу дарувати титул Імператора римлян тому, кого ми оберемо. Це також може довести, що ми досить вправні у підробці документів."
  centralize_the_states: "Централізувати держави"
  centralize_the_states_desc: "Ми консолідуємо нашу владу в Папських провінціях, забравши її у місцевих князів."
  holy_father: "Святий Отець"
  holy_father_desc: "Будучи Намісником Бога для римо-католиків, ми маємо певну політичну свободу дій. Папська булла, документи, що несуть офіційну печатку Папи, мають вагу самого слова Божого. Ними проклинали правителів і ділили цілі континенти."
  pap_legacy_of_the_military_orders: "Спадщина військових орденів"
  pap_legacy_of_the_military_orders_desc: "Хоча епоха Святих Орденів давно добігла кінця, їхня спадщина все ще залишається головним натхненням для воїнів Божих, які присягаються захищати Святий Престол від єретичних та язичницьких загроз."
  teu_crusader_discipline: "Дисципліна хрестоносців"
  teu_crusader_discipline_desc: "Наш великий орден був викуваний у полум'ї та крові Третього хрестового походу під час облоги $acre$ у 1191 році. Хоча спочатку ми доглядали за хворими та немічними, орден перетворився на мілітаризовану групу лицарів незламної відданості та дисципліни."
  teu_teutonic_heavy_cavalry: "Тевтонська важка кавалерія"
  teu_teutonic_heavy_cavalry_desc: "Немає більшого символу могутності та військової доблесті, ніж важка кавалерія. Хоча для багатьох держав кавалерія складається зі шляхтичів, кожен тевтонський лицар також є членом нашої важкої кавалерії та проходить сувору підготовку хрестоносця."
  teu_reformed_order_army: "Реформована армія Ордену"
  teu_reformed_order_army_desc: "Німецькі лицарі, ветерани хрестових походів та незліченних європейських війн, просто недостатньо численні, щоб залишатися основою наших армій. Тепер ми повинні реорганізувати армію, щоб прокласти шлях для полків, набраних всередині країни, здатних замінити лицарів на полі бою."
  teu_peasants_recruitment: "Набір селян"
  teu_peasants_recruitment_desc: "Нам стало зрозуміло, що ми більше не можемо покладатися на іноземних добровольців для поповнення лав нашої армії. Незалежно від того, наскільки досвідченими та цінними вони можуть бути. Натомість, має бути розроблена система, яка дозволить нам набирати наших підданих, німців та не-німців."
  teu_infantry_tactics: "Піхотна тактика"
  teu_infantry_tactics_desc: "Сучасні європейські битви довели, що епоха піхоти ось-ось розпочнеться. Настав час розробити нові тактики, прийняти піку та реформувати наше середньовічне поняття допоміжної піхоти в основну бойову силу наших майбутніх армій."
  teu_teutonic_religious_authority: "Тевтонська релігійна влада"
  teu_teutonic_religious_authority_desc: "Ми покладемо край практиці вільної релігійної автономії місцевих єпископів у нашому володінні. Усі релігійні питання, від оподаткування до навернення місцевих жителів, відтепер будуть державними справами."
  teu_expanded_marches: "Розширені маркграфства"
  teu_expanded_marches_desc: "Надати автономію місцевим губернаторам наших прикордонних регіонів та реформувати їхні землі в маркграфства. Ці особливі землі платитимуть менше податків державі в обмін на зобов'язання підтримувати найвищу бойову готовність як у воєнний, так і в мирний час. Це має забезпечити нам значну військову гнучкість за невелику ціну."
  teu_prussian_bishops: "Прусські єпископи"
  teu_prussian_bishops_desc: "Надати подальші права та привілеї нашим прусським єпископам, забезпечуючи їхню вірність у всіх справах."
  teu_one_state_one_religion: "Одна держава, одна релігія"
  teu_one_state_one_religion_desc: "Зарезервувати всі державні посади лише для тих, хто сповідує нашу релігію. Єретики та язичники більше не бажані в нашому королівстві."
  teu_absolute_order: "Абсолютний порядок"
  teu_absolute_order_desc: "Всі повноваження держави консолідовані в нашому ордені. Кожна дія; і кожне прийняте рішення проходить через ієрархію Тевтонського ордену, перш ніж буде виконане. Звісно, ця бюрократія не всім до вподоби, але вона забезпечує абсолютну владу Гохмайстра."
  legacy_of_breton_independence: "Спадщина Бретонської незалежності"
  legacy_of_breton_independence_desc: "Бретань ніколи не була частиною Франції. Хоча в минулому нас спустошували франки, вікінги та англійці, ми досі зберегли свою ідентичність як народ. Нехай усі наші сусіди знають, що Бретань залишиться вільною, останнім домом справжніх галльських традицій."
  estates_of_brittany: "Стани Бретані"
  estates_of_brittany_desc: "Вперше скликані у XIV столітті, Стани Бретані дозволяли вільним людям з усіх верств суспільства, навіть Третьому стану, висловлювати свої скарги та подавати петиції Герцогу для їхнього вирішення. Скликавши Стани, ми можемо зняти частину напруги в наших землях."
  dutch_education: "Голландська освіта"
  dutch_education_desc: "Хоча наші землі завжди мали вищі показники грамотності серед усіх верств населення, ця перевага стає все більш очевидною у світі, що формується перед нами. Лише ті, хто має обмежене розуміння, не скористалися б цією перевагою та не збільшили б її."
  dutch_golden_age_art: "Голландське мистецтво"
  dutch_golden_age_art_desc: "Нідерланди історично були на передовій технологічних та культурних досягнень. Ми повинні продовжувати підтримувати винахідників, художників та письменників, щоб зберегти нашу перевагу над іншими націями."
  a_trading_hub: "Торговий центр"
  a_trading_hub_desc: "Наша нація благословенна добре налагодженим центром міст, зосереджених на торгівлі, та відважними моряками, готовими привозити багатства з усього світу додому. Ці люди стануть для нас способом торгувати з іншими націями та отримувати значні прибутки для нашої скарбниці."
  platoon_fire: "Вогонь взводу"
  platoon_fire_desc: "Стандартний залповий вогонь передбачав, що кожен ряд давав свій залп одночасно, з метою максимізації вогневої потужності. Голландці розробили іншу систему стрільби взводами, з метою, щоб одна частина полку завжди стріляла по ворогу. Це не давало ворогу оговтатися від залпів."
  concentration_power: "Концентрація влади"
  concentration_power_desc: "Занадто довго наша нація керувалася кількома штатгальтерами, навіть якщо деякі з них мали більше влади, ніж інші, і діяли як #italic primus inter pares#!. Настав час зробити цю посаду спадковою та зосередити владу в одній особі."
  a_fortified_border: "Укріплений кордон"
  a_fortified_border_desc: "Наші кордони не так добре захищені природними особливостями, як у інших націй. Однак ми можемо використати наш розум, щоб створити наймогутніші укріплення для стримування наших ворогів та захисту наших родин."
  netherlandish_protoindustry: "Нідерландська верлагсистема"
  netherlandish_protoindustry_desc: "Протягом тривалого часу наші нації були домом для жвавих міст, які присвячували себе ремеслам у більшій пропорції, ніж наші сусіди. Ця зосередженість зробила нас дуже продуктивною землею."
  a_dynamic_society: "Динамічне суспільство"
  a_dynamic_society_desc: "Наші землі є домом для хоробрих. Ті, хто прагне покращити своє життя, мають тут місце, і ми скористаємося амбіціями цих людей, щоб зміцнити нашу націю."
  an_early_urbanization: "Рання урбанізація"
  an_early_urbanization_desc: "Нижні Землі традиційно мали високий рівень урбанізації, що дозволяло нам досягати більшого, ніж очікувалося. Ми повинні скористатися цією тенденцією та посилити її, створивши міцну мережу поселень, яка сприятиме заможнішому майбутньому."
  polders_advance: "Польдери"
  polders_advance_desc: "Нижні Землі дуже схильні до повеней, і в нестійку погоду XI–XIV століть було кілька повеней, що призвели до утворення Зейдерзе та засолення ґрунту прибережних районів. Тепер ми маємо технологію для осушення земель, що дозволяє більш продуктивне сільське господарство."
  netherlandish_ship_building: "Нідерландське суднобудування"
  netherlandish_ship_building_desc: "Оскільки Нижні Землі мають одні з найбільших портових міст Європи, цілком логічно, що вони повинні мати одні з найбільших верфей Європи. Можливість використовувати місцевих майстрів значно знижує витрати на придбання нових торгових флотів."
  brb_the_four_quartiers: "Чотири Квартієри"
  brb_the_four_quartiers_desc: "Чотири Квартієри — це чотири провінції, на які поділено ядро Герцогства Брабант. Кожен квартієр утворений супутником великих і менших міст, деякі з яких обнесені муром, інші ні. Всі вони працюють у досконалій синергії, як добре змащений механізм, наповнюючи нашу скарбницю великими багатствами."
  fla_cloth: "Фламандське сукно"
  fla_cloth_desc: "Фламандська суконна промисловість є предметом заздрості всього світу. Купці приїжджають здалеку, щоб продати свою вовну у Фландрії, де ми виробляємо сукно найкращої якості."
  frisian_trading_traditions: "Торгові традиції"
  frisian_trading_traditions_desc: "До утворення графств на південь від нас, які починають подорожувати до інших націй для торгівлі, наші предки мали торгові шляхи, що охоплювали всі узбережжя Європи, від Балтики до Біскайської затоки. Тепер ці стародавні знання потрібно використовувати більше, ніж будь-коли."
  gel_warring_spirit: "Войовничий дух"
  gel_warring_spirit_desc: "Дехто каже, що ми надто войовничі, але насправді вони бояться нашої могутності. Навчена армія — один із перших кроків до успіху в цьому хаотичному світі. Ті, хто протистоїть нам, пізнають наш загартований дух."
  hai_expert_embassadors: "Досвідчені посли"
  hai_expert_embassadors_desc: "Наші правителі завжди були вправними у словах, які вони використовували, і це допомогло нам розширити вплив нашої нації за межі наших кордонів. З часом потреба заводити друзів, щоб захиститися від ворогів або далі поширювати свої щупальця на інші нації, стає все більш очевидною."
  hol_sailors: "Голландські моряки"
  hol_sailors_desc: "Як земля пісків і затоплених територій, голландці дивилися на море як на природний другий дім, де риба та слава чекають на тих, хто достатньо сміливий, щоб їх шукати."
  lie_athens_north: "Афіни Півночі"
  lie_athens_north_desc: "Льєж століттями був центром культури, виховуючи одних із найосвіченіших вчених у регіоні та викликаючи заздрість наших суперників. Наші інституції ніколи не повинні припиняти самовдосконалюватися."
  lux_destined_rule: "Призначені правити"
  lux_destined_rule_desc: "Велика династія Люксембургів взяла свою назву від нашої великої нації і тепер є найважливішою родиною в Європі. Це має бути знак з Небес, і ми використаємо цей божественний дар для подальшого розширення нашого впливу."
  utr_city_churches: "Місто Церков"
  utr_city_churches_desc: "Утрехт, який часто називають #italic Містом Церков#! за його численні церковні вежі, є домом для культової Домської вежі. Слугуючи духовним центром Нідерландів та резиденцією Утрехтського єпископства, він був маяком світла з часів Античності."
  brb_brabantine_rights: "Брабантські Права"
  brb_brabantine_rights_desc: "Наслідуючи інші нації, настав час кодифікувати свободи наших підданих, аби вони могли насолоджуватися більш процвітаючим життям на службі нашій великій нації."
  fla_flemish_renaissance: "Фламандське Відродження"
  fla_flemish_renaissance_desc: "Будучи однією з найрозвиненіших земель на континенті, природно, що багатство, створене потом, зрештою присвячується створенню менш практичних речей, таких як мистецтво. Це мистецтво, однак, проливає світло на похмурі дні нашої батьківщини. З десятками фламандських купців, що виступають меценатами, пропозиція художників не може припинити зростати."
  frisian_resisting_invader: "Опір Загарбнику"
  frisian_resisting_invader_desc: "Оточені ворогами, наші люди звикли захищати свої землі з агресією, щоб змусити загарбників відступити і ніколи не повертатися. Їхньою кров'ю наша земля лише збагачується!"
  gel_healthy_economy: "Здорова Економіка"
  gel_healthy_economy_desc: "Наше королівство розширювалося не лише мечем, але й дбайливо ставилося до своїх грошей та заощаджень, що дозволило нам купувати вплив на інші території або безпосередньо їх купувати. Ми повинні продовжувати цю тенденцію, мудро керуючи нашим бюджетом."
  hai_frontier_march: "Прикордонний Марш"
  hai_frontier_march_desc: "Перебуваючи на околицях Імперії, Ено розвинув прикордонний дух, який очевидний для кожного, хто звертає увагу. Цей дух надає нашим землям оборонну ментальність, яку ми можемо використати на свою користь."
  hol_maritime_warfare: "Морська Війна"
  hol_maritime_warfare_desc: "Будучи морською нацією, наші моряки звикли до бою, чи то проти суперників, чи то проти піратів, які намагаються викрасти наше багатство. У будь-якому випадку, наш флот повинен бути готовий протистояти будь-якому ворогу в будь-який час."
  lie_devoted_land: "Віддана Земля"
  lie_devoted_land_desc: "Будучи частиною однієї з найбільших єпархій у регіоні, відданість наших людей поза всяким сумнівом. Ми покажемо світові, що наша віра в Бога така ж сильна, як і наша віра в нашу націю."
  lux_fortress_europe: "Фортеця Європи"
  lux_fortress_europe_desc: "Неприступне положення міста Люксембург, з природним утворенням Бока як природної фортеці, робить нашу позицію дуже сильною. Наші вороги загинуть у спробі захопити наші позиції. Ми навчимося у природи і зробимо так, щоб усі наші фортеці використовували природні утворення на свою користь."
  utr_blessed_land: "Благословенна Земля"
  utr_blessed_land_desc: "Сам Папа впливає на обрання нашого князя-єпископа, кидаючи виклик традиційним виборам п'яти капітулів, які ми мали раніше. Це чіткий доказ того, що наша земля благословенна."
  brb_land_culture: "Земля Культури"
  brb_land_culture_desc: "З заснуванням Левенського університету Брабант ставить себе в центр культури Нідерландів. Студенти з усієї Європи приїжджають на наші землі, щоб вчитися та ділитися своїми знаннями."
  fla_prospering_agriculture: "Процвітаюче Сільське Господарство"
  fla_prospering_agriculture_desc: "Оскільки наші конкуренти починають кидати виклик нашим галузям, присвяченим тканинам, предметам розкоші або фінансам, потреба краще використовувати наші земельні активи стає очевидною. За належної підготовки наша земля може стати регіональною житницею, ще більше диверсифікуючи нашу економіку."
  frisian_legend_grutte_pier: "Легенда про Грюте Піра"
  frisian_legend_grutte_pier_desc: "На наших землях існують історії про пірата, який був 7 футів заввишки і сильний, як віл, що надихає багатьох виходити в море і робити те, що наші предки робили найкраще: грабувати беззахисні узбережжя."
  gel_expand_kwarteers: "Розширити Квартери"
  gel_expand_kwarteers_desc: "Як і у випадку з Брабантом, $GEL$ традиційно поділявся на чотири чверті. Ця система провінцій навколо сильного міста виявилася ефективним способом управління нашою нацією, і ми неодмінно повинні поширити цю систему на інші місця, що приєднуються до нашого володіння."
  hai_bustling_towns: "Гамірні міста"
  hai_bustling_towns_desc: "Наші міські поселення сповнені життя та потенціалу. Лише невеликим поштовхом ми можемо зробити їх та їхні околиці неймовірно заможними, щоб ми могли добре їх оподатковувати."
  hol_trading_spirit: "Торговий дух"
  hol_trading_spirit_desc: "Наша країна оточена морем, тому для нас природно зустрічати ці хвилі в пошуках портів для торгівлі та збагачення."
  lie_inspiring_mecenas: "Надихаючий Меценат"
  lie_inspiring_mecenas_desc: "Наша земля є натхненням для багатьох митців, які приїжджають до наших земель, щоб працювати над своїми творами мистецтва. Гроші з наших скарбниць ніколи не будуть шкодуватися, щоб годувати наших митців та залучати нових."
  lux_heirs_john_blind: "Спадкоємці Яна Сліпого"
  lux_heirs_john_blind_desc: "Ян Сліпий, король Богемії та граф Люксембургу, народився в нашому скромному володінні та загинув у битві при Кресі у віці 50 років, кинувшись у бій, будучи сліпим: почесна та відважна смерть, яка надихатиме наших солдатів століттями. Справжній герой нашого народу."
  utr_skilled_diplomats: "Вправні дипломати"
  utr_skilled_diplomats_desc: "Зі зростаючим впливом наших сусідів, виживання нашої нації залежить від нашої здатності здобувати могутніх та вірних союзників, які підтримають нас у скрутні часи."
  golden_fleece: "Орден Золотого Руна"
  golden_fleece_desc: "Орден став одним з найвидатніших лицарських орденів Європи. Бути лицарем Золотого Руна є ознакою високого статусу і добре відбивається на нас."
  wagenburg: "Вагенбург"
  wagenburg_desc: "Під час Гуситських війн наші армії покладалися на вагенбурги, що дозволяло нам вигравати битви, які ми мали б програти. Хоча ми не завжди можемо використовувати вози, використання піхотних стрільців з оборонних позицій стане тактикою вибору для наших завжди непереможних чеських армій."
  hussite_traditions: "$hussite_ADJ$ Традиції"
  hussite_traditions_desc: "Через чисту боротьбу та братерство наша віра витримує зовнішній тиск на навернення. Наші непохитні корені, що походять зі старих релігійних вчень, звучать правдиво в серцях усіх, хто прагне захистити свою віру та жити в мирі поруч зі своїми братами-християнами."
  kutnohorian_deal: "Кутногорська угода"
  kutnohorian_deal_desc: "Шляхта завжди залишатиметься чутливою щодо своїх прерогатив, тому нам потрібно гарантувати, що їхні привілеї будуть гарантовані назавжди."
  bohemian_thaler: "Богемський талер"
  bohemian_thaler_desc: "Протягом багатьох років стандартною валютою в нашій країні був грош, срібна монета, що використовувалася по всій Священній Римській імперії. Відкриття нових джерел срібла дозволяє нам створити інший вид більшої монети, талер, також званий толером або далером, який стане достатньо сильним та впливовим, щоб домінувати в усій торгівлі та стати новим стандартом."
  fortified_towns: "Укріплені міста"
  fortified_towns_desc: "Через спустошення $hussite_wars$ та в прагненні захистити нашу віру та народ ми фінансували багато укріплених міст. З того часу ми здобули великий досвід у зведенні укріплень та інженерії непроникних оборонних споруд."
  maori_ta_moko_advance: "Та Моко"
  maori_ta_moko_advance_desc: "Завдяки складним вигинам і спіралям #italic Та Моко#! ми ритуально вкарбовуємо пігмент у нашу шкіру, перетворюючи наші тіла на живі гобелени честі та історії."
  maori_ceremonial_haka_advance: "Церемоніальна Хака"
  maori_ceremonial_haka_advance_desc: "Земля тремтить, коли наші воїни виконують #italic Хаку#!, їхні люті крики та синхронні рухи лунають по всьому полю бою. Цей залякуючий церемоніальний військовий танець підбадьорює серце кожного воїна, надаючи значний моральний підйом сухопутним військам."
  maori_whakapapa_advance: "Вакапапа"
  maori_whakapapa_advance_desc: "Сила та єдність походять від знання своєї #italic Вакапапи#!, складної мережі генеалогічних зв'язків, що об'єднує #italic іві#!. Це глибоке розуміння колективного походження сприяє єдиному фронту проти всіх негараздів."
  maori_te_reo_advance: "Те Рео"
  maori_te_reo_advance_desc: "Ми знаємо, що, зберігаючи та плекаючи #italic Те Рео#!, нашу священну мову, ми підтримуємо живий зв'язок із нашою культурою та традиціями."
  maori_rua_kumara_advance: "Руа Кумара"
  maori_rua_kumara_advance_desc: "Удосконалюючи мистецтво вирощування та зберігання бульб #italic кумари#! у спеціально збудованих #italic руа#! (зберігальних ямах), ми можемо забезпечити ситість наших шлунків навіть у найсуворіші зими."
  maori_he_whakaputanga_advance: "Хе Вакапутанга"
  maori_he_whakaputanga_advance_desc: "Так звана «Декларація незалежності Нової Зеландії» — це документ, який раз і назавжди встановлює єдину маорійську державу, що є незалежною. З формулюванням, повністю зрозумілим для всіх сторін, наші вожді можуть нарешті об'єднатися і бути вільними від іноземного втручання."
  the_ark_of_the_covenant: "Ковчег Завіту"
  the_ark_of_the_covenant_desc: "Ми є єдиною нацією, яка зберігає священний Ковчег Завіту після того, як його таємно вивіз Менелік I за божественної допомоги тисячі років тому. Він прихований від публічного огляду, щоб вони не спробували викрасти наш священний, національний скарб. Копії Ковчегу розміщені в кожній нашій церкві як нагадування про те, що наше правління благословенне Богом."
  roof_of_africa: "Дах Африки"
  roof_of_africa_desc: "Наш народ населяв високогір'я протягом поколінь, витримуючи екстремальні умови, що зробило нас стійкими та сильними. Це дає нам значну перевагу над ворогами щоразу, коли ми вступаємо в конфлікт."
  solomonid_claim: "Соломонідська Претензія"
  solomonid_claim_desc: "Предки наших правителів походять від монархів Аксуму, з родоводу царя Соломона та цариці Савської. Ми скинули монархів Загве, щоб легітимізувати наше правління та міцно встановити відновлення королівства до його законної династії."
  nagusa_negast: "Негусе Негест"
  nagusa_negast_desc: "Наш правитель — цар усіх царів, спадкоємець родоводу царів Аксуму разом із родоводом першого правителя, Менеліка I, сина царя Соломона та цариці Савської. Усі наші царі походять від Соломонідів, і лінія спадкування не обов'язково має бути від батька до сина."
  a_permanent_capital: "Постійна Столиця"
  a_permanent_capital_desc: "Протягом століть нашій нації бракувало постійної столиці, і двір слідував за правителями, куди б вони не забажали. Хоча такий підхід має свої переваги, для ефективного управління нашою величезною нацією нам необхідно встановити сильну центральну владу в належному постійному місці."
  external_friends: "Зовнішні Друзі"
  external_friends_desc: "Наші посланці до $rome$ та $iberia_region$, шукаючи військової підтримки, були досить успішними, оскільки вони поставили нас на карту. Ці зусилля ніколи не повинні припинятися."
  eternal_crusade: "Вічний Хрестовий Похід"
  eternal_crusade_desc: "Як $christian_ADJ$ нація, ми оточені $muslim_ADJ$ супротивниками, які використовують кожну нагоду, щоб напасти на нас. Щоб забезпечити наше виживання, ми повинні бути готові негайно дати відсіч."
  prester_john: "Престер Джон"
  prester_john_desc: "Європейці століттями шукали Пресвітера Йоана і переконані, що наш правитель має бути ним, якимось чином, оскільки ми є співхристиянами. Немає причин вказувати на їхню помилку, оскільки вони із задоволенням діляться з нами своїми ідеями."
  an_iron_fist: "Залізна рука"
  an_iron_fist_desc: "Наш регіон різноманітний за культурами та релігіями, і єдине, що тримає його об'єднаним, це не співчуття, а могутній правитель, здатний швидко та рішуче придушити будь-яку спробу повстання."
  a_true_ethiopian_church: "Справжня Ефіопська Церква"
  a_true_ethiopian_church_desc: "Зовнішні впливи можуть бути корисними для деяких аспектів, але можуть змінити природу наших вірувань. Щоб зберегти нашу ідентичність, ми повинні забезпечити існування нашої власної Тевахедо Церкви."
  origin_of_coffee: "Походження кави"
  origin_of_coffee_desc: "Саме з наших земель походить кава, оскільки це оптимальне місце. Хоча її можна вирощувати в інших місцях, наша шанується за якість і експортується тоннами. Ми повинні зробити це способом спрямування багатства до нашої нації."
  a_modern_nation: "Сучасна нація"
  a_modern_nation_desc: "Незважаючи на нашу очевидну ізоляцію, ми добре обізнані про інновації, що відбуваються по всьому світу, і не гаємо часу на впровадження цих тактик, щоб вселяти страх у наших ворогів."
  cawa_advance: "Полки Ч̌ава"
  cawa_advance_desc: "Ч̌ава слугують феодальним шляхетним класом воїнів Ефіопії, яких набирають і призначають на службу до імператорської армії. Вони представляють професійний солдатський клас, відомий своєю лютістю."
  a_renaissance_cawa_advance: "$a_renaissance_cawa$"
  a_renaissance_cawa_advance_desc: "$a_renaissance_cawa_desc$"
  a_discovery_cawa_advance: "$a_discovery_cawa$"
  a_discovery_cawa_advance_desc: "$a_discovery_cawa_desc$"
  a_reformation_cawa_advance: "$a_reformation_cawa$"
  a_reformation_cawa_advance_desc: "$a_reformation_cawa_desc$"
  a_absolutism_cawa_advance: "$a_absolutism_cawa$"
  a_absolutism_cawa_advance_desc: "$a_absolutism_cawa_desc$"
  a_revolutions_cawa_advance: "$a_revolutions_cawa$"
  a_revolutions_cawa_advance_desc: "$a_revolutions_cawa_desc$"
  epic_of_sundiata: "Епос про Сундіату"
  epic_of_sundiata_desc: "$epic_of_sundiata$ розповідає про легендарну кампанію Сундіати Кейти, засновника імперії Малі та героя нашого народу. Його історія передається з покоління в покоління і завжди була великим джерелом натхнення для нашого народу."
  kouroukan_fouga_advance: "Курукан Фуга"
  kouroukan_fouga_advance_desc: "$kouroukan_fouga_advance$ є основною конституцією Малі. Кожен аспект життя, від простого сімейного життя в селах до суверенітету Манси."
  gold_of_bure: "Золото Буре"
  gold_of_bure_desc: "Подвійні золоті родовища Бамбуку та Буре відомі як найбільші поклади золота, про які будь-хто коли-небудь чув, і вони належать нам. Золоті копальні Буре приносили фантастичне багатство, яке, як відомо, дестабілізувало всю економіку Єгипту через інфляцію, коли Манса Муса відвідав його. Наша ж економіка звикла до постійного припливу золота, і її важче інфлювати."
  accounts_of_the_atlantic_voyage: "Розповіді про Атлантичну подорож"
  accounts_of_the_atlantic_voyage_desc: "За словами легендарного Манси Муси, його попередник розпочав подорож через Атлантичне море в надії відкрити найдальші межі океану. Хоча деякі серед правлячого класу вважають це починання ганебним зреченням обов'язку, інші в нашій державі бачать у цьому надихаючу історію для дослідження куточків світу, невідомих людині."
  reclamation_of_land: "Відновлення земель"
  reclamation_of_land_desc: "Сахара не стоїть на місці... вона може збільшуватися або зменшуватися залежно від кількості опадів, і придатний для життя пояс, відомий як Сахель, де ми проживаємо, може відповідно зростати або скорочуватися. Сильна посуха може перетворити значну частину нашого королівства на марну пустелю, додаток до Сахари, де ніхто не панує, крім смерті. Однак у сприятливі роки ми можемо відновити деякі маргінальні землі від Сахари і знову зробити їх продуктивними."
  mandinka_warrior_spirit: "Мандінкський дух воїна"
  mandinka_warrior_spirit_desc: "Незалежно від того, язичники чи мусульмани, чоловіки мандінка були найбільшими бійцями, яких коли-небудь бачив Сахель. Мужність наших військ гідна захоплення, як і їхня гордість. Коли Манса збирає армію, вона не тільки найбільша в усьому Сахелі, вона найкраща."
  markets_for_salt: "Ринки солі"
  markets_for_salt_desc: "У нашому королівстві сіль коштує своєї ціни в золоті. На південь від нас, у великих лісах Ашанті та Йоруба, сіль коштує значно більше, ніж золото. На щастя для нас, ми маємо власні запаси солі та достатньо золота, щоб отримувати її нескінченну кількість. Можливо, ми могли б знайти ще більше ринків для людей, для яких сіль цінніша за золото?"
  west_african_slave_trade: "Західноафриканська работоргівля"
  west_african_slave_trade_desc: "Ще до існування нашої Імперії, велика Вагаду, імперія Гана, що передувала нам, продавала рабів через пустелю арабам, і ми наслідували їх усі ці роки, постачаючи арабському світу величезну кількість рабів. Тепер європейці вимагали ще більшої кількості рабів для роботи на їхніх володіннях у так званому Новому Світі. Ми мали мало повідомлень, але кількість рабів, яку вони вимагають, справді приголомшлива, і вони продовжують повертатися, іноді навіть здійснюючи набіги на наші береги та викрадаючи наших підданих. Настав час навести лад у работоргівлі та обмежити європейців до вибраних комерційних портів, де вони купуватимуть, а не крастимуть рабів."
  kele_koun_advance: "Келе-Кун"
  kele_koun_advance_desc: "Келе-Кун, або «військовий голова», є командирами Келе-Боло, «військової руки», піхотинців, що воюють за Імперію. На відміну від Тон-Тігі, феодальних лордів Малі, Келе-Кун не обов'язково є частиною $nobles_estate$. Келе-Кун мають Джонов, «рабів», які служать носіями зброї та спорядження до їхнього включення до батальйонів Софа."
  sofa_levies_advance: "Набори Софа"
  sofa_levies_advance_desc: "Спочатку всі солдати в наборах Келе-Боло є Хорон, або «вільними людьми», але останні розробки Малійської імперії вимагають включення Джонов, «рабів», для служби в армії як бійців замість носіїв зброї. Ці раби-воїни тоді були б відомі як «Софа», захищаючи як гарнізонні сили малійські укріплення."
  mandekalu_levies: "Набори Мандекалу"
  mandekalu_levies_desc: "$mandekalu_levies$ є основою малійської армії. Вільні люди імперії закликаються до зброї в часи війни, і для них велика честь брати участь у цих битвах зі своєю власною зброєю."
  farari_corps_advance: "Корпус Фарарі"
  farari_corps_advance_desc: "$farari_corps_advance$ є елітою малійської армії. Ці люди є командирами самі по собі і високо шануються за свій досвід та хоробрість."
  sudano_sahelian_architecture_advance: "Судано-сахельська архітектура"
  sudano_sahelian_architecture_advance_desc: "Луки, савани та пустелі Західної Африки бідні на придатні ресурси для будівельних проектів. Використання саманної цегли та глиняної штукатурки значно зменшує вартість будівель, а також надає їм виразного, приємного для ока стилю."
  stories_of_the_gao_empire: "Історії імперії Гао"
  stories_of_the_gao_empire_desc: "До того, як Малійська імперія домінувала в Західній Африці, місто Гао було столицею власної імперії. Хоча письмових записів про імперію Гао майже немає, її спадщина живе в наших усних традиціях, надихаючи чоловіків, які одного дня хочуть досягти величі."
  malian_military_tactics: "Малійська військова тактика"
  malian_military_tactics_desc: "Під час нашого перебування підданими імперії Малі, наш народ навчався у їхнього військового командування та їхніх способів ведення бою. Це знання допоможе нашій піхоті у прийдешніх битвах."
  gold_to_salt_trade: "Торгівля золотом та сіллю"
  gold_to_salt_trade_desc: "Дехто каже, що сіль варта своєї ваги в золоті... можливо, точніше було б сказати, що золото варте своєї ваги в солі. У будь-якому випадку, обмінюючи ці два товари, ми створили процвітаючі торговельні мережі."
  independence_from_mali: "Незалежність від Малі"
  independence_from_mali_desc: "Багато років ми були підданими Малійського султанату. Оскільки сила Малі ослабла, наша ж зросла, і тепер ми можемо стверджувати, що є повністю незалежними від малійського верховенства. Зробімо кроки, аби так і залишилося."
  jihad_against_the_pagans: "$jihad$ Проти поган"
  jihad_against_the_pagans_desc: "Попри найкращі зусилля століть сунітських султанатів, Західна Африка все ще страждає від загрози анімістичних поган. Піднявши прапор джихаду, ми можемо очистити наші землі від невіруючих і водночас розширити наші кордони."
  sankore_madrassah: "Медресе Санкоре"
  sankore_madrassah_desc: "Нам повідомили, що школа мечеті Санкоре є найвеличнішим центром навчання в усій Африці. Хто здивується, якщо це правда, бачачи тут мудреців з далекої Аравії та Магрибу, які обговорюють тонкощі філософії та релігії?"
  the_hajj: "Хадж"
  the_hajj_desc: "Як колись Манса Муса з Малі, наші правителі також можуть здійснити подорож до Мекки, виконуючи п'ятий стовп ісламу, несучи золото як символ нашого багатства та могутності. Як Малі в давнину, нехай світ дивується багатству та величі Сонгаю."
  sharia: "Шаріат"
  sharia_desc: "Священний Закон, яким Пророк керувався, правлячи Медіною, має стати непохитною основою законів, за якими ми керуємо нашим суспільством. Реформувавши наш кримінальний кодекс, щоб він відображав вчення Пророка, ми принесемо гармонію та справедливість у наше суспільство."
  trans_sahara_trade: "Транссахарська торгівля"
  trans_sahara_trade_desc: "Наші купці часто привозять дивовижні речі з дворів Північної Африки. Можливо, вдасться, щоб вони привезли ще більше дивовижних дрібничок?"
  modernization_of_the_military: "Модернізація армії"
  modernization_of_the_military_desc: "Наша держава живе і вмирає завдяки можливостям нашої армії. Саме наша армія не лише забезпечила наше виживання, а й наше прагнення до величі. Ми не можемо дозволити собі відставати у військових досягненнях."
  university_naples: "Неапольський університет"
  university_naples_desc: "Заснований у 1224 році імператором Фрідріхом II, Неапольський університет є однією з найстаріших державних установ Італії. Прийнявши світський етос, він забезпечив покоління студентів всебічною освітою та сприяв інтелектуальному прогресу в різних галузях."
  mercantile_spirit: "Купецький дух"
  mercantile_spirit_desc: "Неапольське королівство, натхненне впливовою морською республікою Амальфі, мало жвавий торговельний характер. Стратегічні порти, включно з самим Неаполем, слугували життєво важливими центрами, з'єднуючи королівство з далекими землями та сприяючи економічному процвітанню через комерційні обміни та квітучий обмін товарами та ідеями."
  consolidate_the_royal_domain: "Королівський домен"
  consolidate_the_royal_domain_desc: "Ми успадкували багату землю, але архаїчні закони та звичаї стримують нас від процвітання. Попередні правителі подбали про гармонізацію шляхетного походження та багатства в нашому королівстві, наше завдання — оновити регулювання. Зміцнюючи баронські суди та консолідуючи земельні володіння в межах королівства, ми створюємо чіткішу правову ієрархію. На землях корони та міщан ми зміцнимо міста як центри влади та заохочуватимемо зростання торгівлі та ремесел."
  academia_pontaniana: "Академія Понтаніана"
  academia_pontaniana_desc: "Довгий час Неаполь прагнув бути центром сучасної науки, приваблюючи великі уми епохи та поширюючи світло Відродження. Під керівництвом Джованні Понтано ці дискусійні гуртки отримали структуру та організацію. Цілком доречно, що ми назвемо академію на честь її працьовитого лідера."
  encouraged_city_living: "Заохочення до міського життя"
  encouraged_city_living_desc: "Ми успадкували прекрасне місто від наших попередників. Ми повинні продовжувати прикрашати та покращувати цей середземноморський мегаполіс, щоб він міг і надалі зростати та процвітати. Ми більше не можемо задовольнятися лише ремонтом та утриманням порту та будівель. Давайте забезпечимо можливість утримувати більше людей, будуючи акведуки, осушуючи болота та прокладаючи більше доріг."
  crush_the_barons: "Знищена влада баронів"
  crush_the_barons_desc: "Місцеві барони все ще мають значну владу над неаполітанською сільською місцевістю. Якщо ми хочемо продовжувати централізацію нашого королівства, ми повинні знищити владу цих баронів, інакше ризикуємо, що вони змовляться проти нас."
  expanded_arsenale: "Розширений Арсенал"
  expanded_arsenale_desc: "З XIV століття Арсенал Неаполя був центром нашого кораблебудування та нашою головною військово-морською базою. Однак Арсенал потребує розширення та модернізації, щоб не відставати від ворожих флотів Середземномор'я. Давайте розширимо як морську, так і військово-морську частини нашого порту та побудуємо більш ефективний Арсенал, щоб підтримувати більший та сильніший флот."
  city_of_artists: "Місто митців"
  city_of_artists_desc: "Завдяки покровительству найвидатніших митців світу всі побачать славу нашого міста. Всі дивуватимуться величі наших художників, поетів, співаків та акторів. Нехай неаполітанська культура стане мірилом, за яким оцінюються інші центри мистецтва."
  institutional_reorganization: "Інституційна реорганізація"
  institutional_reorganization_desc: "Скасувавши Колатеральну Раду та заснувавши Real Camera di Santa Chiara, ми запровадимо важливі правові реформи в Неаполітанському королівстві. Поточні проєкти будуть спрямовані на реорганізацію законодавчого комплексу, консолідацію законів у Codice Carolino та впровадження Кадастру Ончіаріо для податкової реформи."
  a_central_power: "Центральна сила в Середземномор'ї"
  a_central_power_desc: "Наше вигідне центральне положення в Середземномор'ї забезпечує легкий доступ до будь-якого берега. Ми повинні використати цей актив для пошуку союзів, налагодження нових дружніх стосунків та розширення наших кордонів. З морем як нашими воротами, можливості для зростання та процвітання в нашому прагненні до більшого впливу та безпеки безмежні."
  neapolitan_industrialization: "Неаполітанська індустріалізація"
  neapolitan_industrialization_desc: "Починаючи з XVIII століття, Неаполітанське королівство стало свідком поступового процесу індустріалізації. Ключові сектори, такі як текстильна промисловість, суднобудування та металургія, переживали зростання, що підживлювалося інвестиціями та технологічними досягненнями. Цей перехід до індустріалізації відіграє значну роль у перетворенні Неаполя на великий економічний центр."
  neapolitan_army_reforms: "Реформи Неаполітанської армії"
  neapolitan_army_reforms_desc: "Нашій нації необхідно провести масштабні військові реформи, модернізуючи свої збройні сили, щоб відповідати викликам мінливого поля бою. Ці реформи посилять тактичні можливості, оптимізують командні структури та покращать програми навчання, позиціонуючи нас як грізну силу в нашому регіоні."
  arte_della_lana: "Arte della Lana"
  arte_della_lana_desc: "Одна з найвпливовіших галузей у Флоренції, виробництво якісної тканини, підтримуване сильною робочою силою, протягом століть створювало статки багатьох перспективних купців та могутніх особистостей."
  florino_d_oro: "Флорин д'Оро"
  florino_d_oro_desc: "Дуже потужна валюта, підкріплена відмінною чистотою золота та поширена багатьма державами та установами по всій Європі. Прийнявши #Y Флорин#! як нашу валюту, ми обов'язково позитивно вплинемо на наш дохід та скоротимо грошові дефіцити."
  a_land_of_banks: "Земля банків"
  a_land_of_banks_desc: "Тоскана є центром європейського банкінгу, будучи домом для багатьох потужних установ, розташованих у головних тосканських містах. З їхніх штаб-квартир їхні щупальця простягаються по всьому Італійському півострову і навіть до решти Європи."
  florentine_citizen_militia: "Флорентійська громадянська міліція"
  florentine_citizen_militia_desc: "Якщо наш народ має витримати випробування часом, він повинен бути готовий швидко мобілізуватися на захист наших ідеалів! Формування громадянської міліції, рівної за досвідом та лютістю іншим арміям Європи, безсумнівно, допоможе у захисті нашого домену."
  birthplace_of_renaissance: "Батьківщина Відродження"
  birthplace_of_renaissance_desc: "Наша увага до витончених мистецтв, плекання таланту та інноваційної думки привели нас до того, що нас вважають одним із лідерів думки та наукового прогресу!"
  florentine_school: "Флорентійська школа"
  florentine_school_desc: "Одна з найвпливовіших шкіл мистецтва, вплив флорентійських художніх технік та увага до деталей закріплять нас на передовій культурних та заможних проявів великодушного мистецтва!"
  tuscan_uffizi: "Уффіці"
  tuscan_uffizi_desc: "Спочатку призначена для консолідації адміністрації кількох гільдій та агентств, Уффіці є цінним джерелом централізованої влади, зберігаючи та демонструючи різні твори мистецтва як ознаку культурної переваги та виставку достатку."
  medici_porcelain: "Порцеляна Медічі"
  medici_porcelain_desc: "Протягом останніх кількох десятиліть було зроблено багато спроб відтворити властивості справжньої порцеляни, оскільки вона вважається екзотичним товаром з Далекого Сходу. За допомогою досвідчених алхіміків та знань наук ми обов'язково вироблятимемо порцеляну високої якості."
  porto_franco: "Порто-Франко"
  porto_franco_desc: "Відкривши наші порти для бізнесу за участю іноземних купців та усунувши імпортні мита, ми обов'язково накопичимо більше капітальних прибутків від наших торговельних підприємств."
  accademia_cimento: "Accademia del Cimento"
  accademia_cimento_desc: "Accademia del Cimento було науковим товариством, заснованим у Флоренції в 1657 році. Це було одне з перших у своєму роді, засноване учнями Галілея та фінансоване принцом Леопольдом та його братом, великим герцогом Фердинандом II.\nХоча воно ніколи не було офіційною установою, воно було важливим для розвитку наукових принципів експериментування. Товариство мало девіз «Пробуй і пробуй знову» і опублікувало «Saggi», книгу, яка стала стандартним лабораторним посібником 18 століття."
  tuscan_municipal_reforms: "Тосканські муніципальні реформи"
  tuscan_municipal_reforms_desc: "Вступаючи в епоху абсолютизму та верховної централізованої влади, ми повинні переглянути нашу місцеву адміністрацію та належним чином реформувати наші системи, якщо ми хочемо використовувати наші регуляторні можливості."
  tuscan_physiocratic_reforms: "Тосканські фізіократичні реформи"
  tuscan_physiocratic_reforms_desc: "Зміцнюючи наші сільськогосподарські сектори та добре піклуючись про наш народ, ми, безсумнівно, забезпечимо міцну основу для наших новомодернізованих економічних систем."
  tuscan_new_trade_system: "Нова тосканська торгова система"
  tuscan_new_trade_system_desc: "Ера наших торгових гільдій повільно добігає кінця, оскільки їхній вплив слабшає перед обличчям абсолютної централізованої влади. Реформуючи їхню адміністрацію та передаючи значну частину їхнього контролю нашим главам держав, ми обов'язково збільшимо прибутки."
  pis_anziani_del_popolo: "Анціані дель Пополо"
  pis_anziani_del_popolo_desc: "Рада старійшин була спочатку заснована з метою заспокоєння суперництва між родинами Делла Герардеска та Вісконті. Вона впливала на те, хто контролював і керував республікою з моменту її заснування."
  pis_maritimes_legacy: "Спадщина морських республік"
  pis_maritimes_legacy_desc: "Протягом століть Піза була однією з домінуючих держав у Середземномор'ї, контролюючи торгівлю та поширюючи свій вплив. Хоча вона є лише тінню великої сили, якою колись була Піза, її спадщина все ще існує. Піза пам'ятає."
  pis_the_university_of_pisa: "Пізанський університет"
  pis_the_university_of_pisa_desc: "Один з найдавніших університетів Італії та Європи, Пізанський університет завжди був однією з найважливіших установ як для викладання, так і для досліджень."
  sie_artists: "Сієнська школа живопису"
  sie_artists_desc: "Мистецтво живопису процвітало в Італії під час Відродження, але жоден художник не може зрівнятися з майстерністю та якістю, досягнутими художниками з Сієни. Сієнське мистецтво – це неземний та елегантний стиль, з великим акцентом на чудеса, здійснені біблійними постатями та Святими. Хоча інші художники можуть здаватися прекрасними на даний момент, більш тонкий стиль Сієнської школи, безсумнівно, витримає випробування часом."
  sie_studium_senese: "Studium Senese"
  sie_studium_senese_desc: "Вважаючись першим університетом, що фінансується державою, Сієнський університет є гордістю міста, навчаючи наших громадян, щоб вони всі найкращим чином служили нашій нації."
  sie_council_priori: "Рада Пріорів"
  sie_council_priori_desc: "Після низки невдалих республіканських і королівських урядів ми заснували Раду для народу Сієни, яка, сподіваємося, не піддасться аристократії та корупції, як це сталося з багатьма до неї. Хоча точна кількість представників у Раді та спосіб їх обрання перебувають у стані невизначеності, децентралізація нашого уряду таким чином, безсумнівно, ніколи не призведе до того, що Сієна знову потрапить під владу аристократичного уряду."
  republican_assembly_advance: "Республіканська Асамблея"
  republican_assembly_advance_desc: "Серце нашої республіки, $republican_assembly$ є неймовірно життєво важливою установою, якщо ми бажаємо, щоб наша країна керувалася шляхетною чеснотою та досконалістю."
  kbo_iron_helmet_musketeers: "$a_iron_helmet_musketeers$"
  kbo_iron_helmet_musketeers_desc: "По мірі розвитку тактики ведення війни, повинні розвиватися і наші методи. Адаптуючи іноземні концепції щодо формацій, ліній вогню та нових порохових технік, ми, безсумнівно, здобудемо перемогу!"
  kbo_fixed_military_camps: "Стаціонарні військові табори"
  kbo_fixed_military_camps_desc: "Застосовуючи встановлену систему таборів по всьому нашому домену, ми забезпечимо, щоб наша армія зазнавала менших втрат від виснаження та поповнювалася якомога швидше."
  kbo_permanent_sieges: "Тактика облоги Канему"
  kbo_permanent_sieges_desc: "Будівництво складних машин для руйнування ворожих стін є звичним видовищем для наших армій. Однак, інновації нашого шляху до мобільної артилерії, яка може витримувати дні облоги, ведучи вогонь, є новим досягненням, що, безсумнівно, приведе нас до перемоги!"
  kbo_council_clan_heads: "Рада голів кланів"
  kbo_council_clan_heads_desc: "Делегування адміністративних обов'язків місцевим головам кланів може послабити частину нашої центральної влади, але наші радники наполягають, що ми отримаємо великі переваги взамін."
  meissen_lion: "Мейсенський лев"
  meissen_lion_desc: "Мейсенський лев, також відомий як Маркмейсенський лев, займає особливе місце в геральдиці. Символ влади династії Веттінів, чорний, броньований лев з червоним язиком дивиться ліворуч на золотому полі. Його зображення з'являється в різних формах, включаючи розписані надгробки, прапори, шоломи, монети та печатки, символізуючи приналежність міста Мейсен до Марк Мейсен і прикрашаючи герби численних міст і громад. Деякі пов'язують його з перефарбованим тюрінгським левом."
  a_mining_heritage: "Гірнича спадщина"
  a_mining_heritage_desc: "Протягом століть гірнича справа формувала ландшафт, економіку та культуру регіону, а значні відкриття срібла наприкінці XII століття приваблювали шахтарів і торговців з різних регіонів, сприяючи зростанню Рудних гір та значущості й розвитку нашого королівства."
  meissner_groschen: "Мейсенський грош"
  meissner_groschen_desc: "Мейсенський грош слугуватиме регіональною валютою нашої нації. Ця монета базується на празькому гроші, який ми замінимо. Цей новий великий грош ознаменує початок нової ери в історії нашого карбування і дозволить нам набагато краще контролювати його надходження."
  a_resilient_soul: "Стійка душа"
  a_resilient_soul_desc: "У нашій нації люди справді стійкі, втілюючи непохитну рішучість перед викликами. Вони долають негаразди з непохитним духом, знаходячи силу в єдності та непохитній відданості своїм спільним цінностям. Їхня незламна стійкість рухає нас вперед, дозволяючи нам долати будь-які перешкоди, що трапляються на нашому шляху, ми завжди виходитимемо сильнішими та рішучішими, ніж будь-коли раніше."
  saxon_court: "Саксонський двір"
  saxon_court_desc: "Саксонський двір залишається опорою державних завдань в уряді Курфюрства Саксонії, поряд з цивільними та військовими станами. Двірські правила регулюють щоденний розпорядок та обов'язки чиновників у їхніх відомствах, тоді як склад двору включає шляхтичів та простолюдинів, які служать правлячій родині та сприяють управлінню та адмініструванню домініону. Хоча кожен дорослий член правлячої родини підтримує власний двір, ми створимо великий постійний у нашій столиці, залучаючи найкращі уми королівства."
  a_tolerant_society: "Толерантне суспільство"
  a_tolerant_society_desc: "У лиці ворожнечі, що вражає інші землі, ми стоїмо твердо, аби не дати їй заволодіти нашим царством. Незалежно від різноманітних вірувань наших підданих, наша нація буде збудована на міцних стовпах толерантності та братерства, сприяючи гармонійному співіснуванню всіх громад. Об'єднані спільним баченням, ми будемо кувати націю, де процвітають повага та взаєморозуміння, прокладаючи шлях до процвітаючого майбутнього."
  furstenschule: "Князівська школа"
  furstenschule_desc: "З поширенням Реформації та переходом церковного управління до держави, виникає нова відповідальність для держави, що формується: освіта, яка раніше належала Церкві. Для підготовки до новостворених університетів постануть три саксонські школи для князів, використовуючи секуляризоване монастирське майно. Будуть сформовані шкільні ради Пфорти, Грімми та Майсена, які наглядатимуть та підтримуватимуть ці три державні та князівські школи. Таким чином, держава візьме на себе значну роль у формуванні освітнього ландшафту, сприяючи знанням та інтелектуальному зростанню майбутніх лідерів Саксонії."
  bonded_by_loyalty: "Зв'язані вірністю"
  bonded_by_loyalty_desc: "Чи то до наших співвітчизників, чи до наших непохитних союзників, наші доблесні армії ніколи не похитнуться у своїй непохитній вірі в тріумф. З незламним духом вони мужньо вступатимуть у бій, рішуче прагнучи вистояти до останнього солдата. Разом, об'єднані метою та вірністю, ми йтимемо вперед, не залишаючи каменя на камені у нашому прагненні до перемоги."
  meissner_porcelain: "Майсенська порцеляна"
  meissner_porcelain_desc: "Саксонія є першим європейським виробником порцеляни, що принесе багатство та престиж двору Веттінів."
  saxon_baroque: "Саксонське бароко"
  saxon_baroque_desc: "Дрезден і Лейпциг, разом із меншими офіційними та садибними будинками, сприяють витонченим манерам цієї епохи, здобуваючи міжнародне визнання. Репрезентативні будівлі, як-от Дрезденський Гоф, уособлюють велич Саксонії, тоді як творчість Йоганна Себастьяна Баха перетворює Лейпциг на місто музики, підтримуючи процвітаючу високу культуру. Регіон може похвалитися унікальними культурними формами, включаючи ремесла з Рудних гір та кулінарні традиції, як-от Дрезденський штолен."
  retablissement: "Відновлення"
  retablissement_desc: "Після бурхливих війн над Саксонією сходить нова ера — чудове саксонське #italic Відновлення#!. Серед руїн нація повстане, як фенікс, відбудовуючи свою зруйновану економіку та прокладаючи шлях до процвітання. Керуючись поєднанням далекоглядних державних реформ та дисциплінованих витрат, наша нація стане бажаним центром торгівлі в Німеччині. З неперевершеною адміністративною майстерністю та стратегічним фокусом на економічному зростанні, ця рішуча трансформація ознаменує ключовий момент в німецькій історії, формуючи долю Саксонії на майбутнє."
  saxon_industrialization: "Саксонська індустріалізація"
  saxon_industrialization_desc: "Рання індустріалізація Саксонії очевидна, з високорозвиненим промисловим сектором порівняно з іншими регіонами. Мануфактурна система, що виробляє переважно на експорт, процвітала і зробить Саксонію провідною державою в процесі індустріалізації Німеччини. Поява менших комерційних ландшафтів та торгівлі буде інструментальною у сприянні економічному зростанню регіону та зв'язкам з іншими європейськими ринками."
  land_of_many_religions: "Земля багатьох релігій"
  land_of_many_religions_desc: "Наш народ має можливість співіснувати з чоловіками та жінками багатьох віросповідань. Цей різноманітний соціальний склад відбитий у наших правових рамках та віруваннях. Разом ми сильніші!"
  ukrainian_farmlands: "Українські сільськогосподарські угіддя"
  ukrainian_farmlands_desc: "Україна, або прикордонні землі слов'янською мовою, — це регіон, що простягається південними окраїнами нашого великого володіння. Вона є домом для багатих зернових ферм, що робить їх життєво важливими для нашого подальшого існування та процвітання, оскільки вони постачають багато зерна для наших сховищ та купцям по всій $europe$."
  migrant_opportunities: "Можливості для мігрантів"
  migrant_opportunities_desc: "Торговельні можливості та обіцянка кращого життя є одними з причин, чому наші міста та поселення, як правило, приймають кілька хвиль мігрантів. Багато чоловіків та жінок вирішують переселитися на наші землі, шукаючи своєї долі, що, своєю чергою, збільшує нашу."
  two_realms: "Два царства"
  two_realms_desc: "Через розмір нашого царства наша юрисдикція підпадає під дві різні системи. На півночі лежить ядро наших територій, що гордо приймає наші культурні традиції та поведінку. Однак наші південні та східні землі часто включають певну міру відхилення від наших центральних норм. Повага до такої різноманітності лише зміцнить наше геополітичне становище."
  chacery_slavonic: "Канцелярська слов'янська"
  chacery_slavonic_desc: "Щоб об'єднати величезні простори нашого царства, потрібна єдина мова та використання багатьох грамотних представників духовенства для її поширення. Розвиток такої мови для запису нашої історії та підтримки нашого адміністративного апарату є не лише ознакою гордості та престижу, але й засобом створення окремого уряду, що відокремлює нас лінгвістично та культурно від наших східних сусідів."
  supremus_dux_lithuaniae: "Верховний князь Литовський"
  supremus_dux_lithuaniae_desc: "Якщо ми хочемо захиститися від агресорів серед наших $polish$ та $russian_group$ ворогів, ми повинні демонструвати силу! Титул #italic Верховного князя Литовського#! має на меті забезпечити нашу владу, особливо проти зростаючої могутності наших шляхтичів та тих, хто прагне порушити наш суверенітет."
  ties_with_the_holy_see: "Зв'язки зі Святим Престолом"
  ties_with_the_holy_see_desc: "Роки переговорів зі Святим Отцем призвели до того, що ми прийняли $catholic$, з благословення наших $polish$ сусідів і самого Папи, під час бурхливого та унікального процесу християнізації. Після того, як наша боротьба за пошук духовної ідентичності вщухла, стало зрозуміло, що ми стали маяком католицизму, щитом проти язичників та єретиків, що проникають через наші кордони."
  patriarchate_of_lithuania: "Литовський Патріархат"
  patriarchate_of_lithuania_desc: "Скасування $romuva$, віри, яку сповідували наші предки, похитнуло соціальну структуру $LIT_ADJ$ народу. Щоб забезпечити наше майбутнє, ми обрали шлях $orthodox$, святкуючи нашу нову ідентичність. Релігійні авторитети нашої новознайденої $orthodox$ віри повинні зберігати автономію від іноземних патріархатів, щоб уникнути зовнішнього втручання."
  columns_of_gediminids: "Колони Гедиміновичів"
  columns_of_gediminids_desc: "Гордість нашого народу та герб, що висить на наших прапорах, походить від однієї з наших найвідоміших та найуспішніших династій – Гедиміновичів. Багато їхніх найяскравіших представників вели нашу націю крізь бурхливі часи до значного процвітання завдяки обережній державній діяльності та вмілому керівництву. Колони таких великих лідерів символізують міцний фундамент і стійкість нашої країни та наших співвітчизників."
  warlord_dukes: "Князі-Воєначальники"
  warlord_dukes_desc: "За дивовижні два століття запеклих воєн литовські князі-воєначальники зуміли об'єднати в справжню військову державу країну, яка до того була лише вільною федерацією племен, організувати опір агресії католицьких орденів і завоювати величезні території на Сході. Наші військові лідери натхненні цими досягненнями."
  auksine_laisve: "Ауксіне Лайсве"
  auksine_laisve_desc: "Ауксіне Лайсве, що в перекладі з литовської означає Золота Свобода, — це набір законів і привілеїв, які ставили шляхту країни вище за інші стани, а часто навіть вище за владу монарха та парламенту. Ця унікальна система, що прийшла до Литви з Польщі, підвищить їхню лояльність до корони, доки монарх не спробує відмовитися від обіцянки підтримувати золотий стан свободи для шляхти."
  magdeburg_laws: "Магдебурзьке право"
  magdeburg_laws_desc: "Одним із наслідків дрейфу Литви на захід є запровадження німецького міського права в багатьох міських районах країни. Магдебурзьке право у своїй місцевій формі регулюватиме багато різних економічних і політичних аспектів урбанізації країни, від містобудування до торгівлі та оподаткування."
  magnate_estates: "Магнатські маєтки"
  magnate_estates_desc: "Магнатів Литви називають «маленькими королями» за їхні величезні маєтки та приватні армії. Захищаючи неподільність своїх володінь і намагаючись максимізувати прибутки від них, вони розвинуть систему, що багато в чому нагадує давньоримські латифундії."
  lithuanian_hussars: "Литовські гусари"
  lithuanian_hussars_desc: "Крилаті гусари — це важка кавалерія як Литви, так і Польщі. Запроваджені в обох країнах реформами Стефана Баторія, короля Польщі та великого князя Литовського, вони залишатимуться непереможними на полях битв Східної Європи понад століття."
  statutes_of_lithuania: "Статути Литви"
  statutes_of_lithuania_desc: "Статути Литви — це набір із трьох різних правових реформ, які збирають, уніфікують та оновлюють закони держави. Відомі своїми суворими покараннями та запровадженням смертної кари, вони відповідають багатьом сучасним західним кримінальним кодексам. Кожен злочин має каратися однаково, незалежно від класу особи, яка його вчинила, але на практиці багато недоліків для селянства будуть збережені. Литовські Статути пізніше надихнуть на подібну реформу в Росії."
  lithuanian_renaissance: "Литовське Відродження"
  lithuanian_renaissance_desc: "Литва пережила Відродження наприкінці XV – на початку XVI століть. Натхненні ідеями Реформації та італійськими впливами, освіта, мистецтво, архітектура та література процвітали в цю епоху. Литовська мова буде сформульована у своїй письмовій формі, і будуть створені перші твори литовської літератури."
  bavarian_legitimacy: "Баварське герцогство"
  bavarian_legitimacy_desc: "Ми отримали титул герцога Баварії від самого Імператора, і, прикрашаючи себе як справжніх захисників Баварського герцогства, ми забезпечимо, щоб наша легітимність не могла бути поставлена під сумнів."
  bavarian_imperial_knights: "Баварські імперські лицарі"
  bavarian_imperial_knights_desc: "Наша шляхта відзначилася як грізні лицарі на службі Священної Римської імперії. Ми повинні розвивати ці війська, щоб забезпечити виживання нашої герцогської цілісності."
  exploit_the_alpine_trade: "Торгові центри Баварії"
  exploit_the_alpine_trade_desc: "Наші землі часто відвідують купці, що торгують сіллю, сріблом та худобою, прямуючи до багатих земель на півдні. Ми були б дурнями, якби не скористалися їхньою присутністю та не забезпечили, щоб ці торгові шляхи приносили багаті вигоди нашим міським поселенням."
  bavarian_brewing_expertise: "Вправні пивовари"
  bavarian_brewing_expertise_desc: "Наші землі багаті на матеріали, необхідні для варіння пива, і наш народ охоче цим користується. Багато малих пивоварень могли б перетворитися на успішні підприємства за належної підтримки."
  bavarian_culture_buildings: "Баварські культурні установи"
  bavarian_culture_buildings_desc: "З нашою батьківщиною біля підніжжя прекрасних Альп ми є джерелом натхнення для художників з усієї Європи. Якби ми побудували та підтримували культурні установи, ми могли б перетворити наш двір на центр культури та зайняти своє місце серед престижних держав Європи."
  bavarian_stem_duchy: "Мрії про об'єднання"
  bavarian_stem_duchy_desc: "Баварський народ та його культура колись були під владою Баварського королівства під одним прапором. Ми повинні прагнути створити однаково сильну державу та забезпечити дім для баварського народу."
  bavarian_zelousness: "Одна віра для Баварії"
  bavarian_zelousness_desc: "Ми повинні забезпечити, щоб віра нашого народу залишалася єдиною і не була розділена єретичними думками."
  bavarian_hofkriegsrat: "Баварська Гофкрігсрат"
  bavarian_hofkriegsrat_desc: "Створення Ради з єдиним обов'язком радити нашому правителю під час конфліктів допоможе у створенні більш боєздатної армії для Баварської держави."
  bavarian_flexible_diplomats: "Практична дипломатія"
  bavarian_flexible_diplomats_desc: "Незалежно від того, чи відповідаємо ми імперському сюзерену, чи потенційному іноземному союзнику, наші дипломати повинні бути готові до всього. Лише якщо ми ретельно розглянемо баварські інтереси та надамо їм найвищий пріоритет, ми зможемо досягти успіху."
  foundation_of_bavarian_army: "Армія для Баварії"
  foundation_of_bavarian_army_desc: "Лише з грізною постійною армією ми можемо заявити про власні амбіції. З належним фокусом ми можемо розширити її без руйнівного впливу на фінанси нашої держави."
  bavarian_coinage: "Баварська монета"
  bavarian_coinage_desc: "Нашому королівству потрібна нова стандартизована монета, яка слугуватиме єдиною валютою для баварського народу. Створення державного монетного двору в нашій столиці забезпечило б наш повний контроль над цією новою валютою."
  bavarian_purity_law: "Баварський закон про чистоту"
  bavarian_purity_law_desc: "Якість нашого пива визнавалася століттями, але щоб досягти справжньої слави, ми повинні забезпечити його престижний статус на віки вічні. Кілька правителів минулого намагалися встановити деякі правила щодо варіння цієї чудової речовини, і ми могли б використати цей факт як знак якості для наших пивоварень."
  hsa_holpfennige: "Гольпфенніг"
  hsa_holpfennige_desc: "Спочатку карбувався між містами $LUB$ та $HAM$, #italic Гольпфенніг#! був порожнистою валютою, розробленою як контрзахід проти розгульного знецінення, в епоху, коли кожен монетний двір мав різні стандарти щодо концентрації срібла в кожній монеті. Як засіб проведення транзакцій, валюта згладить нашу торговельну діяльність та подолає розрив між зовнішніми ринками та нашими купцями."
  hsa_the_cog: "$n_hanseatic_cog$"
  hsa_the_cog_desc: "$n_hanseatic_cog_desc$"
  hsa_hanseatic_ties: "Ганзейські зв'язки"
  hsa_hanseatic_ties_desc: "Наша Ліга є домом для багатьох великих міст та купецьких гільдій, кожна зі своїми власними планами та починаннями. Щоб підтримувати наше процвітання та розширювати наш вплив, ми повинні виявляти пильний інтерес до дипломатичних зусиль."
  hsa_seal_of_the_hansa: "Печатка Ганзи"
  hsa_seal_of_the_hansa_desc: "На ринках по всій $europe$ від $london$ до $novgorod$ наші купці славляться своїм багатством. Наша здатність мобілізувати великі торгові флоти та об'єднати десятки міст у досконалу симфонію прибутку та обміну товарами не має собі рівних."
  hsa_hanseatic_shipwrights: "Ганзейські корабельні майстри"
  hsa_hanseatic_shipwrights_desc: "У час, коли $europe$ охоплена війнами, а правителі висувають претензії, намагаючись розширити свої володіння, вони звертаються до нас, щоб ми будували великі флоти, які дозволять їм здійснити свої амбіції. Озброєні століттями знань у кораблебудуванні та однією з найкращих деревин на континенті, наш процес будівництва кораблів неперевершений!"
  hsa_draft_merchant_privileges: "Проект купецьких привілеїв"
  hsa_draft_merchant_privileges_desc: "Купці, що ведуть справи під нашою печаткою, мають величезний вплив та монету. Таким чином, закріплення їхніх привілеїв на іноземних та внутрішніх ринках лише ще більше збільшить нашу спроможність до прибуткової справи."
  hsa_mastery_of_the_sea: "Майстерність моря"
  hsa_mastery_of_the_sea_desc: "Наші морські традиції пов'язали нашу долю з долею могутнього моря. Використання його сили та повага до нього принесуть величезні переваги для нашої купецької діяльності..."
  hsa_exchange_of_ideas: "Обмін ідеями"
  hsa_exchange_of_ideas_desc: "Мандрівні купці, що ведуть наші справи за кордоном, є великими маяками для впровадження іноземних знань на наших берегах!"
  hsa_global_reach: "Глобальний розмах"
  hsa_global_reach_desc: "Впровадження торгівлі в глобальному масштабі сколихнуло купецький світ. Регулярні справи з іноземними купцями з далеких куточків процвітають, і таким чином, наша скарбниця отримує вигоду."
  hsa_hanseatic_treasury: "Ганзейська скарбниця"
  hsa_hanseatic_treasury_desc: "Міцна та здорова економіка є лише одним із результатів нашого постійного процвітання. Маючи достатньо монети та задоволену скарбницю, ми зарекомендували себе як надійні та стабільні кредитори."
  hsa_regularized_contributions: "Регулярні внески"
  hsa_regularized_contributions_desc: "Багато суб'єктів у нашій Лізі повинні бути під нашим твердим контролем з метою стандартизації їхніх щомісячних та щорічних внесків до нашої скарбниці."
  hsa_reform_the_hanstag: "Реформа Ганзетагу"
  hsa_reform_the_hanstag_desc: "У часи негараздів та еволюції думки наші центральні інституції для зборів та обговорень повинні бути скориговані для вирішення проблем нашої епохи."
  hsa_concept_of_mercantilism: "Концепція меркантилізму"
  hsa_concept_of_mercantilism_desc: "Протягом минулих століть ми невтомно працювали над інтеграцією наших угод у глобальний масштаб торгівлі. Тепер, як ніколи раніше, ми повинні захищати наших власних купців, щоб не стати жертвою фракціоналізму та зовнішньої конкуренції."
  the_hansa_bank: "Ганзейський банк"
  the_hansa_bank_desc: "Використовуючи нову систему внесків, ми можемо заснувати банк для використання членами. Забезпечений ресурсами ліги, акредитив від банку буде таким же надійним, як готівка. Це, а також інші фінансові інструменти, дадуть нашим купцям перевагу над іншими країнами."
  pal_castles_on_rhine: "Замки на Рейні"
  pal_castles_on_rhine_desc: "Звівши численні замки в ключових позиціях уздовж Рейну, ми зможемо здійснювати та розширювати наш контроль над річкою та торгівлею, що протікає через неї."
  pal_cultivate_vineyards: "Виноградники та сади Рейну"
  pal_cultivate_vineyards_desc: "Хоча наша територія невелика, сонячні береги Рейну ідеально підходять для вирощування виноградників та садів. Доклавши певних зусиль, вони могли б підтримувати нашу місцеву економіку вином."
  pal_fractured_territory: "Консолідувати території"
  pal_fractured_territory_desc: "Наша адміністрація вправна у керуванні численними розрізненими територіями, не втрачаючи над ними контролю. Завдяки цьому ми можемо побудувати сильну бюрократію, здатну впоратися навіть із найскладнішими завданнями."
  pal_a_just_ruler: "М'який і спокійний правитель"
  pal_a_just_ruler_desc: "Єдиний наслідок кровопролиття – це подальше кровопролиття. Тому ми повинні бути милосердним правителем і примиритися з нашими ворогами, щоб встановити тривалий мир на наших територіях."
  pal_heaven_of_tolerance: "Палатинська толерантність"
  pal_heaven_of_tolerance_desc: "Незалежно від їхніх конфесій, усі християни повинні бути бажаними у містах і містечках наших земель. Поки інші вирішують придушувати свої релігійні меншини, наша толерантність забезпечить постійний потік мігрантів на наші землі."
  palatinate_romanticism: "Підтримати романтичний рух"
  palatinate_romanticism_desc: "Значна частина романтичного руху обрала район Гайдельберга своєю резиденцією. Ми повинні скористатися цим явищем і підтримати цих та інших митців, щоб принести славу нашій країні."
  amazigh_slave_raids: "Набіги рабів POSTEDIT_Амазигів"
  amazigh_slave_raids_desc: "Узбережжя, що населяють наш регіон, добре обладнані для забезпечення постійного притоку найманих слуг та полонених з усієї Європи. Ця робоча сила, безумовно, відіграватиме ключову роль у піднесенні нашої величі та збільшенні нашого прибутку."
  zenata_roots: "Коріння POSTEDIT_Зената"
  zenata_roots_desc: "Наш народ є нащадками POSTEDIT_Зената, племені, найбільш відомого своїм скромним, але життєво важливим виробництвом вовни та схильністю до управління великими стадами баранів."
  mor_marabouts: "POSTEDIT_Суфійські марабути"
  mor_marabouts_desc: "Кілька груп POSTEDIT_суфійських вчителів зробили Марокко своїм домом. Ми повинні переконатися, що ми приймаємо цих святих людей і беремо їхні вчення до серця."
  trans_saharan_trade: "Транссахарська торгівля"
  trans_saharan_trade_desc: "Каравани великих сахарських шляхів торгували сіллю та іншими товарами з Північної Африки на рабів та золото з субсахарських королівств. Через ці цінні шляхи монети ми побудуємо нашу велику спадщину."
  first_fleet_of_the_med: "Перший флот Середземномор'я"
  first_fleet_of_the_med_desc: "Колись великі POSTEDIT_аль-Муваххідуни пишалися тим, що володіли одним із найгрізніших флотів у всьому Середземному морі. Наш народ володіє традиціями та досвідом, щоб відродити цю пристрасть і відновити нашу велич на морях."
  slave_soldiers: "Раби-солдати"
  slave_soldiers_desc: "Щоб забезпечити вірний корпус добре навчених постійних військ, ми будемо наймати та покладатися на дисциплінованих рабів-солдатів з нашого суспільства."
  desert_power: "Сила пустелі"
  desert_power_desc: "Наш регіон населений багатьма селянами та племенами, які складають життєво важливу демографію нижчих класів. Незважаючи на їхнє злиденне становище, вони мають великий вплив на безплідних пустельних торгових шляхах між нашими містами. Використання їх і забезпечення їхньої вірності лише допоможе подальшому встановленню нашої влади в пустелі."
  atlantic_trade_routes: "Атлантичні торгові шляхи"
  atlantic_trade_routes_desc: "Ретельно навіговані сучасними європейцями, ці нові морські шляхи відкрили шлюзи для товарів і монет як з Нового Світу, так і з Далекого Сходу."
  foreign_politics: "Зовнішня політика"
  foreign_politics_desc: "Щоб здолати та перемогти наших ворогів, ми мусимо забезпечити належні дипломатичні канали та співпрацю з країнами, що поділяють ворожість до них."
  saharan_gold_trade: "Сахарська торгівля золотом"
  saharan_gold_trade_desc: "Золото, видобуте на наших землях, є високої якості та слугує чудовим засобом для поширення нашого торговельного впливу за межі наших портів."
  jaysh_armies_advance: "Армії Джайш"
  jaysh_armies_advance_desc: "Світанок нової епохи у військовій справі викликав потребу у створенні нової сили з місцевих племен, відданих лише нам. Через них ми використовуватимемо ресурси нашого величезного домену."
  black_guard: "$a_black_guard$"
  black_guard_desc: "$a_black_guard_desc$"
  shurfa_status: "Статус Шурфа'"
  shurfa_status_desc: "Найгордіші та найпрестижніші серед усіх, хто населяє ісламський світ, мало хто має таку легітимність, як наша, щоб проголошувати себе нащадками родини Великого Пророка."
  maghrebi_administration: "Магрибська адміністрація"
  maghrebi_administration_desc: "Століття автономії та суворість нашого довкілля призвели до сепаратистських тенденцій у наших кордонах. Якщо ми бажаємо встановити міцну присутність у нашому регіоні, ми мусимо забезпечити, щоб кожне плем'я в наших кордонах знало, хто є їхнім справжнім володарем."
  barid: "Барид"
  barid_desc: "Поштова служба, що пролягає крізь віддалені куточки нашої Імперії, ця установа відповідає за зв'язок між нашою столицею та намісниками по всій нашій землі."
  karimi_merchants: "Карімійські купці"
  karimi_merchants_desc: "Могутні купці, що переважно торгують прянощами, ці морські гіганти значно збагатилися на потоці екзотичних товарів, що простежують своє походження аж до берегів Адена, Індії та далі!"
  mamluk_soldiers: "$a_mamluk_unit_traditions$"
  mamluk_soldiers_desc: "$a_mamluk_unit_traditions_desc$"
  royal_mamluks: "Королівські мамелюки"
  royal_mamluks_desc: "Королівські мамелюки є елітним ядром мамелюцької армії, що слугують особистою гвардією Султана. Ретельно відібрані та суворо навчені, вони відомі своєю відданістю, винятковими бойовими навичками та непохитною самовідданістю."
  red_sea_trade: "Торгівля Червоним морем"
  red_sea_trade_desc: "Оскільки торгівля прянощами, що йде через Червоне море, є ключовим джерелом нашого багатства, ми мусимо забезпечити контроль над цією торгівлею. Застосовуючи агресивну політику погрози спалити порти Червоного моря, які ми не контролюємо, якщо вони прийматимуть торговців прянощами, ми можемо забезпечити собі левову частку."
  mamluk_halqah: "$a_halqah_unit$"
  mamluk_halqah_desc: "$a_halqah_unit_desc$"
  reform_the_mamluk_corps: "$a_mamluk_unit_renaissance$"
  reform_the_mamluk_corps_desc: "$a_mamluk_unit_renaissance_desc$"
  kashif: "Кашиф"
  kashif_desc: "Наш Султанат величезний, і тому ми повинні бути мудрими в його управлінні. Призначення людей знань і мудрості місцевими намісниками — блискучий крок, який зрештою може схилити шальки терезів на нашу користь."
  port_customs: "Портові митниці"
  port_customs_desc: "Визначення наших портів як офіційних торгових зон для вхідних вантажів — це крок, який, безумовно, підвищить торгове значення нашої території за рахунок наших сусідів і ворогів."
  masters_of_the_nile: "Володарі Нілу"
  masters_of_the_nile_desc: "Життєдайною силою нашого Султанату є не що інше, як річка Ніл. Протікаючи через наші найродючіші землі, життєдайні води річки дарують нам достаток і багатство по всьому нашому володінню."
  indian_networks: "Індійські мережі"
  indian_networks_desc: "Наші купці торгують товарами від ринків Александрії до берегів Адена і аж до самої Індії. Наші великі мережі контактів, бізнесу та монет вивели нас на передові позиції морської торгівлі."
  study_foreign_gunpowder_techniques: "Іноземний порох"
  study_foreign_gunpowder_techniques_desc: "Великі імперії Європи та Сходу сприяли значному прогресу у використанні пороху та його військових застосуваннях. Вивчення та вдосконалення їхніх методів лише зміцнить наші власні війська."
  secure_mediterranean_ports: "Безпечні середземноморські порти"
  secure_mediterranean_ports_desc: "Наші порти по всьому Середземному морю є одними з найбагатших у всьому регіоні. Купці з усіх куточків відомого світу подорожують до Александрії та Каїра, щоб торгувати спеціями, шовком та дорогоцінним камінням. Створення торгового флоту для сприяння та захисту наших морських шляхів було б мудрим кроком."
  bohemian_imperial_standing: "Богемський імперський статус"
  bohemian_imperial_standing_desc: "Наше місце в Імперії є місцем престижу, величі та авторитету. Мало хто з членів володіє такою м'якою силою, як ми, завдяки нашим здібним дипломатам та мережам альянсів."
  bohemian_crystal: "Богемський кришталь"
  bohemian_crystal_desc: "Мало майстерень у відомому світі мають потужності для виготовлення скла та кришталю з якістю та прозорістю, необхідними для конкуренції з нашим виробництвом."
  students_of_foreign_courts: "Студенти іноземних дворів"
  students_of_foreign_courts_desc: "Наші королівські роди не чужі подорожам за кордон, стаючи студентами видатних дворів далеко від дому, у славетному прагненні до знань та належної освіти у справах державотворення."
  urbanization_decrees: "Укази про урбанізацію"
  urbanization_decrees_desc: "Намагаючись модернізувати $prague$, ми видамо інструкції та гранти для видатних діячів міста, щоб вони спрямовували свій бізнес до столиці, залучали іноземців та пропонували їм шанс покращити своє соціальне становище в нашій прекрасній метрополії."
  seat_of_metropolitan_bishop: "Осідок митрополита"
  seat_of_metropolitan_bishop_desc: "Руський народ потребує твердого релігійного керівництва. Ми історично мали добру співпрацю з Церквою, і це дружба, від розширення якої ми могли б отримати вигоду. Якщо ми зможемо домогтися перенесення осідку митрополита до Москви, ми зможемо ще більше зміцнити зв'язки між руською православною вірою та нашою державою."
  pomestnoe_voisko: "Помісне військо"
  pomestnoe_voisko_desc: "Перерозподіляючи ділянки конфіскованих земель шляхетним кавалеристам, ми можемо створити новий клас воїнів для підтримки нашого князівства."
  strength_of_the_boyars: "Сила бояр"
  strength_of_the_boyars_desc: "Боярський клас багато в чому є основою російського імперського підприємства, але так само, як нам потрібно зміцнювати бояр, нам потрібно їх контролювати. Ми повинні як захищати місця для бояр у Думі, так і переконатися, що вони повинні покладатися на нас для подальшого посилення свого впливу."
  zasechnaya_cherta: "Засічна риса"
  zasechnaya_cherta_desc: "Щоб протистояти татарським набігам, наші предки завжди тримали лінію щільно розташованих і добре захищених фортів. У міру розширення нашої держави ми повинні продовжувати розширювати цю «засічну лінію», щоб завжди захищати наш народ від далеких нападів."
  russian_artillery_yard: "Російський артилерійський двір"
  russian_artillery_yard_desc: "Переважна вогнева міць визначає облоги сьогодення, а також вирішальні битви майбутнього. Ми повинні побудувати сучасний артилерійський двір у серці нашої країни, щоб наші армії ніколи не були без гармат і боєприпасів."
  life_long_conscription: "Довічна військова служба"
  life_long_conscription_desc: "Щоб прогодувати наші постійно зростаючі армії, ми повинні розширити терміни військової служби, щоб вона стала довічним зобов'язанням. Це запропонує соціальну мобільність тим, хто інакше вів би життя на менш престижних посадах, і це дасть нам надійне джерело солдатів для наших імперських починань."
  the_mestnichestvo_advance: "$the_mestnichestvo$"
  the_mestnichestvo_advance_desc: "$the_mestnichestvo_desc$"
  table_of_ranks: "Табель про ранги"
  table_of_ranks_desc: "Скасування місцевості було першим кроком до того, щоб зробити державну бюрократію більш меритократичною. Табель про ранги кодифікував це і зробив службу та просування в армії залежними від служби в нижчих рангах."
  voivode_advance: "Воєвода"
  voivode_advance_desc: "Воєвода – це військовий керівник, відповідальний за підтримання порядку, захист території від зовнішніх загроз та керівництво військовими кампаніями. Посада воєводи може бути корисною для подолання адміністративних труднощів через обмежені засоби зв'язку, доступні в цю епоху."
  haudenosaunee_tradition: "Спадщина Гаявати"
  haudenosaunee_tradition_desc: "Легендарний Гаявата, відомий серед POSTEDIT_гауденосауні як великий оратор і лідер, залишив нам прецедент того, ким є дипломат. Ми вшануємо його, наслідуючи його приклад у наших дипломатичних відносинах."
  haudenosaunee_heritage: "Люті воїни"
  haudenosaunee_heritage_desc: "Було б помилкою для наших ворогів вважати нас слабкими, ґрунтуючись на наших дипломатичних здібностях. Наші воїни, тим не менш, люті та горді, і недооцінити їх – це впасти від їхньої зброї."
  tree_of_peace: "Дерево Миру"
  tree_of_peace_desc: "Дерево Миру – це спадщина Великого Миротворця, і воно служить символом нашої прихильності до єдності між різними племенами, а також представленням самих вождів."
  kainerekowa: "POSTEDIT_Каянере'ко:ва"
  kainerekowa_desc: "Ми завжди повинні шанувати великий дар Гаявати та Великого Миротворця, Великий Закон Миру, який об'єднав наші п'ять націй під єдиною метою та дав нам наші правила управління."
  mourning_wars: "Жалобні війни"
  mourning_wars_desc: "Це давня традиція нашого народу – приймати захоплених воїнів у плем'я. Але щоб поповнити наші ряди та забезпечити нашу здатність до завоювання, ми повинні прагнути приймати не лише окремих воїнів, а й цілі племена серед POSTEDIT_гауденосауні."
  warriors_unity: "Єдність воїнів"
  warriors_unity_desc: "Ми, можливо, не найбільше плем’я за чисельністю, але наші міцні племінні структури дарують нам те, чого бракує іншим: єдність! Наші воїни б’ються як брати і стоять разом на полі бою. Доки ми підтримуємо цю традицію, ми не можемо програти!"
  haudenosaunee_ambition: "Зразкова Конфедерація"
  haudenosaunee_ambition_desc: "Конфедерація Гауденосауні виявилася зразком успіху. Усі навколишні народи дивляться на нас із захопленням нашим способом правління."
  three_sisters: "Сільське господарство Трьох Сестер"
  three_sisters_desc: "Наша земля багата на врожаї. Спільне використання кукурудзи, квасолі та гарбуза, вирощуваних разом, дозволяє отримати від них кращий урожай, ніж якби вони були розділені."
  maple_syrup: "Кленовий Сироп"
  maple_syrup_desc: "Численні кленові дерева в нашій країні рясніють соком, який можна збирати та кип’ятити, щоб переробити на смачний сироп та цукор."
  stickball_game: "Гра в Стікбол"
  stickball_game_desc: "Стародавня традиція гри в стікбол існує на наших землях споконвіку. Використовувана для ритуальних цілей або для вирішення суперечок, сотні воїнів збираються на полі з дерев’яними палицями та м’ячем, який потрібно спрямувати до позначеної цілі. Ця практика не тільки об’єднує наш народ, але й підтримує наших воїнів у відмінній формі."
  wampum: "Вампум"
  wampum_desc: "Суміш білих і фіолетових намистин, виготовлених з різних видів мушель, вампум використовується для багатьох цілей. Від запису історій і договорів до використання як системи обміну в торгівлі, намистини вампум присутні скрізь, де ступає наш народ."
  shared_brotherhood: "Спільне Братерство"
  shared_brotherhood_desc: "Об’єднані вченнями Великого Закону Миру, наші люди, незважаючи на різне племінне походження, зберігають сильне почуття братерства та єдності."
  captives_in_war: "Полонені у Війні"
  captives_in_war_desc: "Ми ведемо війни головним чином для того, щоб отримати полонених для заміни власних втрат. Однак не всіх цих полонених потрібно приймати в наше плем’я, і ми можемо використовувати їх для праці."
  haudenosaunee_present_giving: "Дарування Подарунків Гауденосауні"
  haudenosaunee_present_giving_desc: "Основа наших торговельних взаємодій представлена у формі обміну подарунками. Оскільки наш народ об’єднується і працює на благо цілого, акт дарування гарантовано буде супроводжуватися іншим подарунком у відповідь."
  pochtecayotl: "POSTEDIT_Почтекайотль"
  pochtecayotl_desc: "Торговці подорожують далеко, до провінцій, що знаходяться навіть за межами нашої влади, і до правителів, які кидають нам виклик. Якби ці торговці, можливо, також служили нам очима та вухами, які таємниці ми могли б дізнатися?"
  warrior_societies: "Товариства Воїнів"
  warrior_societies_desc: "Наше суспільство надзвичайно динамічне, пропонуючи простолюдинам, також відомим як #italic mācēhualtin#!, шлях до того, щоб стати #italic pīpiltin#!, або шляхетними завдяки винятковій військовій службі через систему почесних рангів #italic tlahuiztli#!. Ця унікальна можливість для соціальної мобільності дає нам явну перевагу над сусідніми суспільствами."
  chinampas: "Чинампи"
  chinampas_desc: "Вправні в терасуванні пагорбів для вирощування та вмілі у створенні орних земель на мілководних ділянках озер за допомогою геніальних #italic chinampas#!, видатні сільськогосподарські здібності нашого населення значно принесуть користь нашому суспільству."
  people_of_war: "Люди Війни"
  people_of_war_desc: "Чи то шукаючи полонених для жертвоприношень, здобуваючи престиж, вселяючи страх у ворогів, чи просто здобуваючи багатство, наше населення звикло до безперервного стану війни, витримуючи її труднощі краще за інших."
  tlahtocayotl: "Tlahtohcāyōtl"
  tlahtocayotl_desc: "Ми створимо систему провінцій для тих міст-держав, які інтегровані в наше царство, намагаючись централізувати нашу владу."
  calpixcayotl: "Calpixcāyōtl"
  calpixcayotl_desc: "Наші підвладні регіони отримають призначених збирачів данини, яких називають #italic calpixqueh#!, що відповідатимуть за безперебійний потік данини. У регіоні та в столиці нашої нації буде по одному #italic calpixqui#! для кожної підвладної держави."
  reformed_telpochcalli: "Реформований Tēlpōchcalli"
  reformed_telpochcalli_desc: "Оскільки ми стикаємося з новими ворогами, необхідно розробляти або вивчати нові військові тактики. Ці безцінні знання викладатимуться в нашому #italic Tēlpōchcalli#!."
  nahuatl_domination: "Панування Нагуа"
  nahuatl_domination_desc: "Наша культура явно перевершує інші навколо нас, і все більше людей приймають її як свою власну. Вплив, який ми можемо мати за нашими кордонами, — це те, чим ми повинні скористатися."
  the_return_of_quetzalcoatl: "Повернення Quetzalcōātl"
  the_return_of_quetzalcoatl_desc: "Контакт з іноземцями з інших континентів приніс цікаві нові ідеї про наших богів. Пророцтво #italic Quetzalcōātl#! розкриває реальність за межами міфу — проблиск істини. #italic Quetzalcōātl#!, «Пернатий Змій», незабаром повернеться і сповістить про епоху трансформації, перемагаючи темряву заради просвітлення. Символізуючи космічне злиття, він поєднає матерію та дух, відновлюючи рівновагу та підносячи людську свідомість."
  brave_as_hummingbird: "Хоробрий, як колібрі"
  brave_as_hummingbird_desc: "Колібрі відіграє вирішальну роль у нашій міфології, пов'язана з богом війни, Huītzilōpōchtli. Вона втілює реінкарнацію полеглих воїнів і шанується за свою хоробрість. Колібрі стане новим символом для наших прапорів, що надихатиме наших солдатів битися до смерті."
  new_trade_opportunities: "Нові торговельні можливості"
  new_trade_opportunities_desc: "Потреби нашого народу адаптуються до нових ринків, що відкриваються для наших торговців. Ми навчаємо наших купців способам, які дозволять їм максимізувати прибутки, які ми б отримали."
  aztec_chargers: "$AZT_ADJ$ Зарядники"
  aztec_chargers_desc: "Агресивність наших воїнів відома за межами наших кордонів. Коли починається битва, наші вороги тремтять від страху, побачивши, як наші бійці шалено кидаються на них, ніби вісники смерті йдуть прямо до них."
  chasqui: "Часкі"
  chasqui_desc: "Часкі — це посланці нашої держави. Обрані з найміцніших і найвитриваліших бігунів нашої країни, ці спритні чоловіки носять кіпу, повідомлення, подарунки та інші види інформації та доставляють їх цільовому одержувачу. Поширення ідей, а також основна частина нашої дипломатії лежить на їхніх плечах."
  military_mita: "Військова Міта"
  military_mita_desc: "Міта — це обов'язкова служба для суспільства інків. Ця система охоплює не лише комунальні аспекти держави, але й є основою військової служби. Кожен айлью в нашій країні повинен забезпечити армію здібними чоловіками, які пристосовані до бою у високогір'ї."
  warachikuy: "Варачікуй"
  warachikuy_desc: "Варачікуй — це священна церемонія, де молодих чоловіків перевіряють на їхні навички, доблесть та кмітливість, а також фізичні здібності, такі як біг, стрільба, бій та витривалість протягом тривалого періоду без сну. Ті, хто відмінно проходить ці випробування, підвищуються до рангу офіцерів нашої постійно зростаючої армії."
  mitma: "Зобов'язання Мітма"
  mitma_desc: "Щоб здійснити великі будівельні проекти в минулому, нашим правителям доводилося виконувати стародавні традиції, запрошуючи кожного дрібного вождя в нашій імперії до столиці, щоб обсипати їх подарунками та влаштовувати розкішні бенкети. Однак, оскільки наша держава зростає, це далеко не ідеальний спосіб здійснювати ці проекти. Забезпечення робочою силою та матеріалами для будівництва має бути обов'язком кожного вождя на наших землях."
  quipu: "Кіпу"
  quipu_desc: "Це система, яка використовує вузли на нитці для зберігання інформації. Вузли представляють число від нуля до дев'яти, яке може бути використане для зберігання кількостей або для обліку. Вузли також можуть бути використані для посилання на логограми на тій самій нитці. Вузли показують, який склад у логограмі використовувати, і, комбінуючи більше ниток, можна створювати речення."
  drafted_hatun_runas: "Призов Хатун Рунас"
  drafted_hatun_runas_desc: "Хатун Рунас — це прості люди імперії. Один із п'ятдесяти чоловіків буде обраний для служби в армії з їхнього двадцять п'ятого дня народження і протягом наступних семи років. Це забезпечує велику та професійну армію, яка є більш дисциплінованою, ніж наші супротивники."
  llama_michis: "Льяма Мічіс"
  llama_michis_desc: "Льями виконують багато функцій у нашому суспільстві. Вони слугують в'ючними тваринами, жертовними тваринами, забезпечують м'ясом і вовною, а їхній послід використовується як добриво. Контролюючи розведення та використання льям через урядових мічіс або пастухів, ми забезпечуємо суворий моніторинг популяції льям. Це дозволить збільшити популяцію льям."
  inc_tambo: "Покращені станції Тамбо"
  inc_tambo_desc: "Наша дорожня система є основою нашої імперії. Для подальшої користі нашої армії та адміністрації ми зведемо станції Тамбо вздовж усіх головних доріг. Ці станції будуть побудовані на відстані денного переходу одна від одної та забезпечуватимуть притулок і запаси для подорожуючих."
  adapted_incan_army: "Адаптована армія інків"
  adapted_incan_army_desc: "Загарбники з чужих земель ступили на нашу землю і загрожують самому нашому існуванню. Але наші армії адаптивні; вони пристосовуються до нової ворожої тактики, вчаться володіти їхньою власною зброєю проти них і борються з незламною рішучістю, натхненною їхніми ворогами."
  pukara_advance: "$pukara_building$"
  pukara_advance_desc: "$pukara_building_desc$"
  terraces_advance: "$terraces$"
  terraces_advance_desc: "$terraces_desc$"
  tambo_advance: "$tambo$"
  tambo_advance_desc: "$tambo_desc$"
  incamisana_advance: "$incamisana$"
  incamisana_advance_desc: "$incamisana_desc$"
  kor_fortresses_of_goguryeo: "Фортеці Когурьо"
  kor_fortresses_of_goguryeo_desc: "Корейський півострів був домом для багатьох королівств у минулому. Однак вплив одного з таких королівств все ще відчувається, це Когурьо, попередник Корьо. Хоча Когурьо залишило нам багато спадщини, його укріплення та кам'яні техніки для будівництва таких замків служать нам і донині."
  kor_korean_artisanry: "Корейське ремесло"
  kor_korean_artisanry_desc: "Мистецтво має давню традицію в нашій державі, з часів #italic true національного об'єднання#! воно переживає золоту еру, і серед усіх цих див, ремесло Корейського півострова є однією з найшанованіших частин."
  kor_korean_barracks_advance: "$korean_barracks$"
  kor_korean_barracks_advance_desc: "$korean_barracks_desc$"
  kor_court_poetry: "Придворна поезія"
  kor_court_poetry_desc: "Наша аристократія приділяє велику увагу культурному розвитку свого духу та розуму. Література, така як поезія класичною китайською мовою та інші форми взаємодії з текстами, вважаються надзвичайно цінними при дворі, як знать, так і члени двору однаково захоплені культурним впливом написаного слова."
  kor_metal_movable_type: "Металевий рухомий шрифт"
  kor_metal_movable_type_desc: "Рухомий шрифт — це стародавня технологія друку, яку вперше використали китайці багато століть тому. Але саме династія Корьо розробила металевий рухомий шрифт і вдосконалила процес, і тепер володіє здатністю друкувати книги з неперевершеною ефективністю."
  kor_gunpowder_engines: "Порохові двигуни"
  kor_gunpowder_engines_desc: "Наші військові усвідомлювали тактичну корисність пороху з початку 12 століття. Завдяки зворотному інжинірингу китайського пороху та науковій роботі Чхве Мусона, ми повинні бути здатні виготовляти власний порох для нашої армії."
  kor_hwachas_advance: "$a_hwacha$"
  kor_hwachas_advance_desc: "$a_hwacha_desc$"
  kor_early_turtle_ship_advance: "$n_early_turtle_ship$"
  kor_early_turtle_ship_advance_desc: "$n_early_turtle_ship_desc$"
  kor_korean_gunnery: "Корейська артилерія"
  kor_korean_gunnery_desc: "З розвитком порохових технологій розвивається і наша винахідливість для захисту нашої батьківщини. Хоча проста в концепції та виконанні, установка гармат у наші укріплення надзвичайно збільшить їхні оборонні можливості."
  kor_hangeul_alphabet: "Алфавіт Хангиль"
  kor_hangeul_alphabet_desc: "Корейська мова настільки фундаментально відрізняється від китайської, що використання китайських ієрогліфів робить неграмотними всіх, крім найосвіченіших. Наш новий алфавіт дозволить усім нашим людям читати та писати."
  kor_grand_code: "Великий кодекс державного управління"
  kor_grand_code_desc: "Щоб забезпечити належний, стабільний уряд, ми кодифікуємо, як саме працюватиме уряд. Це буде перша письмова конституція Кореї."
  kor_border_defense_council: "Рада прикордонної оборони"
  kor_border_defense_council_desc: "Наші кордони постійно перебувають під загрозою, як з боку варварів на півночі, так і з боку піратів за морями. Ми створимо раду офіцерів, присвячену контролю та забезпеченню наших кордонів, щоб наші армії завжди були готові протистояти будь-якій загрозі."
  kor_panokseon_advance: "$n_panokseon$"
  kor_panokseon_advance_desc: "$n_panokseon_desc$"
  kor_korean_cannon: "Корейська гармата"
  kor_korean_cannon_desc: "Ми маємо довгу історію використання пороху та гармат для наших військових, але ми не можемо зупинятися на наших досягненнях. Розробляючи менші, але більш витривалі гармати, а також ефективніші методи перезарядки, корейська артилерія пройде через технологічну революцію, яка принесе користь як нашій армії, так і нашому флоту."
  hyanyak_system: "Система Хян'як"
  hyanyak_system_desc: "Оскільки сільське господарство є основою нашої економіки, управління селами є найважливішим. Ми створимо систему самоврядування для сіл, щоб заохотити почуття спільноти."
  kor_geobukseon: "Корабель-черепаха"
  kor_geobukseon_desc: "Потреба захищати наше узбережжя є важливою, і з цією метою ми розробили корабель-черепаху. Ці важкоброньовані бегемоти забезпечать нашим флотам можливість захищати наші берегові лінії."
  kor_hopae_system: "Система Хопе"
  kor_hopae_system_desc: "Система Хопе — це система ідентифікаційних жетонів, яка вимагає від усіх корейців носити жетон зі своїм ім'ям, місцем народження, статусом та місцем проживання. Це полегшить ідентифікацію людей та їхнього місцезнаходження."
  kor_daedongbeop: "Дедонбеоп"
  kor_daedongbeop_desc: "Новий набір реформ, запропонований головним державним радником Ї Вон-іком, поступово запровадить раніше ігноровані покращення в податковій системі. Податкова данина, що стягувалася з домогосподарств, буде замінена єдиним податком на орні землі. Податок на товари буде обмежений квотою, що дозволить підприємливим селянам і оптовикам виробляти та продавати надлишки товарів. Це, безсумнівно, призведе до зниження податків для селян, збільшення доходів держави та зростання торгівлі."
  natural_seamanship: "Природна мореплавність"
  natural_seamanship_desc: "Зі зростанням рибальства ми також спостерігаємо зростання кількості моряків у нашому королівстві. Ми повинні скористатися цим для нашого флоту, оскільки мореплавство так само важливе, як і сам корабель."
  call_of_our_forefathers: "Поклик наших предків"
  call_of_our_forefathers_desc: "Давним-давно наші славетні предки відпливли і заснували колонії на Півночі. Наші саги навіть розповідають, що вони досягли нового світу і заснували Вінланд. Ми повинні йти їхніми стопами."
  pioneer_spirit: "Дух першопрохідця"
  pioneer_spirit_desc: "У минулі часи наш народ сміливо вирушав у відкрите море, щоб засновувати колонії на далеких берегах. Давайте відродимо цей дух у нашому народі, щоб вони знову це зробили."
  nor_shipbuilding: "Військове кораблебудування"
  nor_shipbuilding_desc: "Розширення рибної промисловості також призвело до розширення кораблебудування. Ми маємо готовий резерв навчених корабелів, щоб розширити наше власне кораблебудування."
  write_new_sagas: "Писати нові саги"
  write_new_sagas_desc: "Гострі уми зберігають знання\nВідомі з давніх-давен\nОспівані на заході сонця\nСаги — наша спадщина\nЗаохочені заснуванням\nКожна країна матиме свою власну."
  expansive_policies: "Експансивна політика"
  expansive_policies_desc: "Землі Бранденбургу, переважно піщані ґрунти, бідні та вважаються #italic пісочницею#! Священної Римської імперії. Наші лідери завжди відчували потребу в розширенні Маркграфства в усіх напрямках, часто претендуючи на сусідні престоли, як Померанія. Це призвело до того, що наша країна складається з кількох культур, утворюючи плавильний котел всередині імперії."
  northern_march: "Північна Марка"
  northern_march_desc: "У ранні дні Імперії територія Бранденбургу була заселена та керована слов'янськими племенами, доки Імператор не створив Північну Марку, щоб підкорити та укріпити цю територію. З часом ця Північна Марка перетворилася на Бранденбург, ставши одним з найважливіших регіонів Імперії."
  divide_estates: "Розділити стани"
  divide_estates_desc: "Об'єднані, три стани утворюють ефективний блок проти влади правителя. Щоб зміцнити наш контроль, ми повинні систематично використовувати шляхту проти інших станів."
  soldiers_fortune: "Солдати удачі"
  soldiers_fortune_desc: "Наші землі здебільшого малонаселені та оточені ворогами. Необхідність надійної оборони спонукає нас наймати солдатів з чужих земель, готових битися під нашим прапором."
  iron_tooth: "Залізний Зуб"
  iron_tooth_desc: "Посилення контролю нашого двору над землями Маркграфства принесе нашому правителю прізвисько #italic Залізний Зуб#!, ніби ми вкусили його, як сторожовий пес. Наше правління залишить слід на нашій нації, слід, який вселить почуття гордості та вірності навіть у найнижчого селянина Бранденбургу."
  kammergericht: "Заснувати Камергерихт"
  kammergericht_desc: "Щоб упорядкувати контроль над Маркою Бранденбург, ми замінимо місцеве звичаєве право римським правом. Ми також врегулюємо правосуддя, перемістивши Верховний Суд з двору курфюрста (який схильний до переїздів) у фіксоване та центральне місце. Це одночасно покращить правосуддя та обмежить владу місцевих магнатів."
  margrave_council: "Таємна Рада для Курмарку"
  margrave_council_desc: "Влада Маркграфа значно під загрозою через постійно зростаючу міць наших Станів. Стани приносять велику користь нашій нації, але реальна загроза, яку вони становлять для нашої основи влади, вимагає створення нової ради, яка зменшить справжню владу, що її Стани мають над нашою нацією, перетворивши її на більш дорадчу позицію для Маркграфа. Таким чином, ми зможемо й надалі користуватися перевагами наших Станів, маючи менше турбот щодо їхніх потреб."
  religious_toleration: "Віротерпимість"
  religious_toleration_desc: "Внутрішня стабільність є ключем до нашого успіху. Розширюючись назовні та сприяючи віротерпимості, ми не тільки покращуємо стабільність вдома, але й робимо наше царство притулком для тих, хто тікає від переслідувань в інших місцях."
  army_professionalism: "Військовий професіоналізм"
  army_professionalism_desc: "Починаючи з перського вторгнення до Греції, менша дисциплінована армія могла перемогти більшу, якщо вона була краще дисциплінована та навчена. Щоб процвітати, ми повинні підняти нашу армію до тих самих стандартів."
  soldier_king: "Король-солдат Пруссії"
  soldier_king_desc: "Більшість держав — це країни, що мають армію, Пруссія ж, навпаки, — це армія, що має країну. Багато королів Пруссії були солдатами настільки ж, наскільки й монархами; кожен завершував своє правління не лише реформуванням держави, але й залишаючи тривалий вплив на армію."
  auftragstaktik: "Auftragstaktik"
  auftragstaktik_desc: "Auftragstaktik або #italic Тактика місії#! — це система, за якої наші підлеглі командири отримують від своїх начальників достатньо інформації про цілі битви чи війни, а потім їм дозволяється діяти за власною ініціативою. Ця система дозволяє нашим батальйонам розвивати тісніші стосунки зі своїми командирами, даючи кращі результати."
  goose_step: "Гусячий крок"
  goose_step_desc: "Хоча й виглядає досить дивно, гусячий крок спеціально розроблений, щоб забезпечити нашим чоловікам допомогу в утриманні строю під час просування до ворога. Це надає нашим арміям відчутну перевагу на полі бою."
  mounted_people: "Кінний народ"
  mounted_people_desc: "Наш народ здавна процвітав верхи на конях, що є невід'ємною частиною нашої культури та могутності. Ми безмежно пишаємося розведенням цих величних створінь та нашими неперевершеними навичками у кінній стрільбі з лука. Ми використаємо ці переваги, щоб забезпечити нашу перевагу на полі бою."
  falconry_mastery: "Майстерність соколярства"
  falconry_mastery_desc: "Глибоко вкорінене в нашій культурі, соколярство представляє зв'язок, викуваний між нашим народом та цими величними хижими птахами. Ми відточили наші навички у стародавньому мистецтві соколярства, і наші сокольники шановані за їхню здатність ловити, тренувати та полювати з цими величними хижаками."
  rich_lands: "Багаті землі"
  rich_lands_desc: "Наші землі багаті, від прерій до густих лісів, готові бути використаними нашими витривалими чоловіками та жінками. Ми використаємо всі ресурси в нашому розпорядженні, щоб принести процвітання кожному домогосподарству в нашій великій нації, мудро керуючи землею, яку нам було даровано."
  jurchen_honor: "POSTEDIT_Чжурчженська честь"
  jurchen_honor_desc: "Наш народ захоплений подвигами сили та іншими демонстраціями цінності, оскільки кожен чжурчжень відчуває, що, демонструючи свої здібності, він заробляє повагу своїх однолітків. Ця добре заслужена самоповага робить наших воїнів надзвичайно хоробрими, готовими битися з будь-ким."
  unite_the_tribes: "Об'єднати племена"
  unite_the_tribes_desc: "З моменту народження нашої нації чжурчжені були об'єднані та розділені на численні племена та союзи, не завжди дружні. Ця динаміка була постійною споконвіку, як і бажання багатьох лідерів об'єднати всі племена під єдиним прапором."
  leader_under_sky: "Лідер під Небом"
  leader_under_sky_desc: "Наш народ був розділений надто довго, і нам потрібен хтось достатньо сильний, щоб об'єднати їх і змусити світ тремтіти. Небо керуватиме діями та думками цього лідера і поведе нас до світлого майбутнього."
  foraging_our_way: "Прокладаючи шлях фуражуванням"
  foraging_our_way_desc: "Ми мисливці й живемо в єднанні з природою, навіть ті з нас, хто мешкає в містах. У нашій крові відчувати, де лежить правильний шлях і які дари лісів є добрими для нас. Ця мудрість дозволила нам вижити скрізь без труднощів."
  deliberative_council: "Дорадча Рада Князів та Міністрів"
  deliberative_council_desc: "Спочатку названа #italic Радою Нарад#!, вона походить від неформальних інституцій, що сприяли спільній управлінській діяльності серед лідерів держави. Структура Ради була трансформована, зосередившись на колективному аристократичному управлінні та обговоренні політики, головним чином у зовнішніх та військових справах. Членство обмежене військовими лідерами нашого народу поза імперським кланом, що посилює владу правителя."
  manchu_script: "Маньчжурське письмо"
  manchu_script_desc: "Маньчжурський алфавіт виник, поєднавши класичні монгольські символи з чжурчженською фонетикою. Ця унікальна система письма полегшує написання вертикальними стовпцями зліва направо. Завдяки різноманітним формам літер та контекстуальній адаптивності для початкових, серединних, кінцевих та ізольованих позицій, вона зберігає лінгвістичні нюанси нашої мови."
  the_eight_banners: "Вісім Прапорів"
  the_eight_banners_desc: "Система Восьми Прапорів становить основу нашого суспільства та військової могутності. Завдяки спадковому членству та винагородам у вигляді землі й доходу, прапори є елітними охоронцями нашого царства. Від завоювання наших сусідів до майбутніх кампаній, наше панування залежить від могутності Прапорів."
  a_new_dawn: "Новий Світанок"
  a_new_dawn_desc: "Наша нація відродилася. Наші племінні витоки зникли, як старі мрії, що ніколи не повернуться. Модернізація нашої нації є фактом, і настав час показати це світові."
  manchu_reborn: "Маньчжурія Відроджена"
  manchu_reborn_desc: "Оскільки наша нація зазнала серйозних трансформацій у своїй основі, так само й наша армія. Світ стає для нас більш відкритим, і нові виклики з'являться на горизонті. Якщо ми хочемо вижити, ми повинні бути готові діяти."
  inigo_architecture: "Архітектура Ініго"
  inigo_architecture_desc: "Передбачається, що праці Ініго Джонса матимуть значний вплив на майбутні покоління архітекторів. Його пропаганда класичної архітектури та його пріоритет на пропорції та гармонії безсумнівно залишать тривалий слід у британській архітектурі. Його внесок вважається життєво важливим для неокласичного руху в Англії."
  sailing_and_fighting_instructions: "Інструкції Блейка з мореплавства та бою"
  sailing_and_fighting_instructions_desc: "Роберт Блейк написав кілька збірок правил та положень, що призвели до масштабних реформ у флоті. Згадані включають нові тактики для блокад та висадок, а також прийняття бойового строю «єдина лінія попереду»."
  coke_smelting: "Виплавка коксу"
  coke_smelting_desc: "Винахід виплавки коксу, зокрема його застосування у виробництві заліза та сталі, тісно пов'язаний з Промисловою революцією. Залізо та сталь наразі виробляються традиційними методами, такими як виплавка деревного вугілля, тоді як цей новий метод призведе до покращення продуктивності та зниження витрат на обслуговування."
  water_frame: "Водяна рама"
  water_frame_desc: "Водяна рама — це прядильна рама, що використовується в текстильній промисловості для виробництва бавовняної нитки. Ця інновація сприятиме створенню великих текстильних фабрик, що працюють на водяних колесах."
  fortress_church_advance: "$fortress_church$"
  fortress_church_advance_desc: "$fortress_church_desc$"
  saquiyah: "Сакія"
  saquiyah_desc: "Сакія — це механічний пристрій, призначений для полегшення транспортування води на вищі висоти. Також відоме як #italic перське колесо#!, #italic таблія#!, #italic рехат#! та #italic тимпан#!, це колесо є вирішальним у зрошувальних системах в районах з невеликою кількістю або відсутністю проточної води."
  sepak_takraw: "Сепак такро"
  sepak_takraw_desc: "Практикується по всьому $south_east_asia$ протягом тривалого часу з моменту його адаптації від стародавнього $chinese_group$ #italic Цуцзюй#!, і також відомий як #italic Сепак Рага#!, #italic Такро#!, #italic Чінлон#! або #italic Сіпа#! залежно від країни, #italic $sepak_takraw$#! — це не просто гра. Хоча метою є бити м'яч між гравцями та тримати його в повітрі, це також спосіб регулярно займатися фізичними вправами, і тому грається не лише для розваги, а й як військова підготовка для армії."
  three_teachings: "Три Вчення"
  three_teachings_desc: "$three_teachings$ — це філософія, що походить з $CHI$, яка поєднує вчення $SECT_CONFUCIANISM_NAME$, $SECT_DAOISM_NAME$ та $buddhist$ у гармонійне, єдине вчення. $SECT_CONFUCIANISM_NAME$ представляє ідеологію закону, тоді як $SECT_DAOISM_NAME$ є світоглядом радикальних інтелектуалів. Ці два протилежні кінці філософського спектру потім будуть з'єднані з філософіями $buddhist$."
  dlh_origin_of_hindustani: "Походження Гіндустані"
  dlh_origin_of_hindustani_desc: "Мова $hindustani_language$ розвинулася з апабхрамси — середньоіндоарійської мови — і виникла як контактна мова $DLH$. Оскільки $hindustani_language$ має впливи $persian_language$, $arabic_language$ та тюркських мов, а також старої хінді, дипломатія з $muslim_ADJ$ світом та $hindu_ADJ$ світом стає нескладним завданням."
  dlh_indo_persian_culture: "Індо-Перська Культура"
  dlh_indo_persian_culture_desc: "$persian_language$ була домінуючою мовою двору з моменту першого заснування $DLH_ADJ$ Султанату в 1290 році. Таким чином, вплив $persian_language$ створив синтез з місцевими індійськими культурами."
  dlh_turkic_conqueror_roots: "$turkic_group$ Завойовницьке Коріння"
  dlh_turkic_conqueror_roots_desc: "Хоча ми називаємо $india$ нашим домом, предки нашої держави були $turkic_group$ походження. Їхні ранні успіхи як завойовників і правителів з часів династії $mamluk$, а також досягнення наступної династії Халджі, надихають наших військових і дипломатів розширювати кордони $DLH$ у кожен куточок $india$."
  dlh_revert_ghiyath_reforms: "Скасувати Реформи Гіятха"
  dlh_revert_ghiyath_reforms_desc: "Нерозумні економічні рішення Гіятха аль-Діна принесли державі $DLH$ лише фінансову руїну. Ми повинні скасувати його безумство і відновити використання золота та срібла для наших монет."
  dlh_restore_the_delhi_empire: "Відновити Велич $DLH$"
  dlh_restore_the_delhi_empire_desc: "$DLH_ADJ$ Султанат колись охоплював майже всю $india$. Він повинен повстати знову!"
  dlh_reintegrate_former_provinces: "Реінтегрувати Колишні Провінції"
  dlh_reintegrate_former_provinces_desc: "Колись величезний $DLH_ADJ$ Султанат втратив більшість своїх колишніх володінь, але ми не забули засобів їхнього управління. Працюючи над відновленням нашої минулої слави, ми нагадаємо місцевим правителям про їхні обов'язки перед Султаном."
  dlh_textile_innovation: "Інноваційне Текстильне Виробництво"
  dlh_textile_innovation_desc: "Процвітаюча текстильна промисловість у $DLH$ робить нашу націю центром технологічних інновацій для галузі. Як перші, хто прийняв бавовноочисну машину та черв'ячний редуктор, ми знаємо важливість залишатися попереду в цих питаннях. Тепер ми повинні забезпечити якомога ширше впровадження прядки."
  dlh_afghan_nobility: "$afghan_culture$ Шляхта"
  dlh_afghan_nobility_desc: "Значна частина $DLH_ADJ$ шляхти походить з лав $afghan_culture$ спільноти, народу з довгою історією завоювань і правління в північній $india$. Хоча іноді це політична перешкода, їхні бойові навички безсумнівні."
  dlh_grand_trunk: "Захистити Великий Колісний Шлях"
  dlh_grand_trunk_desc: "Великий Колісний Шлях пролягає від $kabul$ в Афганістані до узбережжя $bengal_area$. Багато найважливіших торгових міст уздовж його маршруту є частиною нашої Імперії, тому на нас лежить обов'язок забезпечити належне утримання Шляху та його вільність від бандитизму."
  dlh_cosmopolitan_religions: "Космополітичні Релігії"
  dlh_cosmopolitan_religions_desc: "$india$ — це величезний субконтинент з кількома присутніми релігіями. Щоб забезпечити стабільність у нашому царстві, ми повинні розширити права різних конфесій та забезпечити їхню лояльність."
  dlh_revive_the_tughlaq_architecture: "Відродити Архітектуру Туглаків"
  dlh_revive_the_tughlaq_architecture_desc: "Під час розквіту династії Туглаків та стабільного періоду нашої держави, великі архітектори та художники з грандіозним баченням будували мечеті та гробниці в унікальному стилі Туглаків. З плином десятиліть, коли наша влада була оскаржена внутрішніми проблемами, ресурси для підтримки цієї архітектури зникли. Настав час відродити її та відновити $DLH$ як імперію мистецтва та чудес."
  dlh_throne_of_india: "Індійський Трон"
  dlh_throne_of_india_desc: "Століттями кожна велика індійська імперія керувалася з $delhi$. Це місце завойовників і наше право за народженням. Усі повинні знати, що $delhi$ знову є домом для законного правителя всієї $india$!"
  dlh_hindustani_identity: "$HIN_ADJ$ ідентичність"
  dlh_hindustani_identity_desc: "Іноземні ідеї націоналізму та культурної ідентичності досягли Індійського субконтиненту. Хоча культурне розмаїття $india$ залишиться незмінним, очевидно, що географія субконтиненту, а також цінності $muslim$ дають нам усім відчуття єдності у формі $HIN_ADJ$ ідентичності."
  vij_city_of_victory: "Місто Перемоги"
  vij_city_of_victory_desc: "Віджаянагар — #italic Місто Перемоги#! — є серцем нашої держави і одного дня стане серцем $hindu_ADJ$ імперії $india$, яка відбиває $muslim_ADJ$ загарбників. Нехай воно буде маяком нашої культури та традицій!"
  vij_an_army_for_city_of_victory: "Армія для Міста Перемоги"
  vij_an_army_for_city_of_victory_desc: "Щоб Місто Перемоги було гідним своєї назви, ми повинні забезпечити собі армію, яка приносить нам перемоги. Давайте подбаємо про те, щоб наші війська були навчені та пишалися своєю роллю."
  vij_arab_horses: "Арабські коні"
  vij_arab_horses_desc: "Коні з Аравійського півострова значно перевершують місцеві породи. Ми використаємо наші торговельні зв'язки, щоб забезпечити постійне постачання цих коней для наших військ."
  vij_first_indian_artillery: "Перша індійська артилерія"
  vij_first_indian_artillery_desc: "Використання пороху на військовому полі ще не є поширеним, але воно показує великий потенціал для формування майбутнього війни. Ми повинні дослідити корисність і силу пороху."
  vij_the_bunds: "Бунди"
  vij_the_bunds_desc: "Наше суспільство побудоване на сільському господарстві в досить посушливій місцевості $karnakassala_area$. #italic Бунди#! (також звані #italic анекутами#!) забезпечують наші міста та поля так необхідною водою."
  vij_adroit_diplomacy: "Вправна дипломатія"
  vij_adroit_diplomacy_desc: "Численні загарбники нашого $hindu_ADJ$ народу знову і знову демонстрували одну й ту саму слабкість — схильність до боротьби між собою. Ми повинні бути завжди готові використовувати це для досягнення власних цілей."
  vij_promotion_of_trade: "Сприяння торгівлі"
  vij_promotion_of_trade_desc: "Наші землі розташовані на одному з ключових торговельних шляхів зі Сходу на Захід. Ми повинні забезпечити безпеку наших портових районів, щоб капітани, які відвідують їх, зупинялися на наших землях, і таким чином ми могли їх оподатковувати."
  vij_carnatic_music: "Карнатична музика"
  vij_carnatic_music_desc: "Ми повинні протистояти $muslim_ADJ$ вторгненню на всіх фронтах. Музичні традиції Північних Штатів вже виявляють ознаки іноземних впливів. Це блюзнірство, бо ми всі знаємо, що музика — це божественна форма мистецтва, яка походить від самих Девів і Деві. Ми покажемо $hindu_ADJ$ Народу, хто їх захищає."
  vij_cultural_integration: "Культурна інтеграція"
  vij_cultural_integration_desc: "Культурне розмаїття Індійського субконтиненту є очевидним. Дозволяючи місцевим жителям керуватися власними звичаями, ми можемо забезпечити їхню лояльність та інтеграцію в наше суспільство."
  vij_rule_in_accord_with_dharma: "Правління згідно з Дхармою"
  vij_rule_in_accord_with_dharma_desc: "Дхарма є головним стовпом наших релігійних та суспільних цінностей. Наша держава може бути справедливою та доброчесною лише тоді, коли наші правителі самі втілюють та живуть згідно з Дхармою."
  vij_harsh_penal_code: "Суворий кримінальний кодекс"
  vij_harsh_penal_code_desc: "Правитель підтримує закон, вбиваючи. Давайте встановимо новий суворий кримінальний кодекс і, що важливіше, забезпечимо його виконання, щоб наш народ міг почуватися в безпеці в нашій країні."
  vij_decentralized_rule: "Децентралізоване правління"
  vij_decentralized_rule_desc: "Зі зростанням держави зростає і адміністративний тягар на уряд, а також потенційні ризики повстань. Щоб протидіяти цьому, необхідне децентралізоване правління, де місцеві жителі можуть самостійно вирішувати дрібні питання, тоді як лише значні проблеми досягають двору для вирішення."
  vij_indian_throne: "Індійський Трон"
  vij_indian_throne_desc: "$india$ надто довго була об'єктом $muslim_ADJ$ загроз. Язичницькі імперії заявляють про своє правління з $delhi$ на півночі, проте їхня віра та уряд прямо протистоять тому, чого насправді бажають індійці. Ні, має бути встановлено нове місце влади — і $vijayanagar$ стане новим Троном $india$!"
  tnk_legitimate_rule: "Стародавні Корені"
  tnk_legitimate_rule_desc: "Наші предки століттями правили землями $tamil_land_area$. У ці часи, коли домінують іноземні загарбники, ми повинні покладатися на наші стародавні зв'язки із землею, щоб виправдати наше правління."
  tnk_resist_invaders: "Експертний Опір"
  tnk_resist_invaders_desc: "Наша неспокійна історія відстежує як перемоги, так і майже нищівні поразки. Якщо ми хочемо вистояти та знову домінувати як династія, нам потрібно використовувати складний рельєф, щоб затримувати та стримувати ворожі армії, доки ми не зможемо організувати прямий опір."
  tnk_pearls_of_india: "Майстерність у Ловлі Перлів"
  tnk_pearls_of_india_desc: "Народ нашої землі розвинув видатну майстерність у пірнанні та збиранні перлів біля нашого узбережжя. Хоча це надає нам явну економічну вигоду, їхня природна схильність до води також полегшить їхнє навчання як моряків, надаючи нам військову перевагу над нашими ворогами."
  tnk_expertise_in_conflicts: "Загартовані Війною"
  tnk_expertise_in_conflicts_desc: "Протягом нашої бурхливої історії ми ніколи не хиталися перед обличчям конфліктів та непереборних труднощів. Нам потрібно використати це та вселити в наш народ почуття завзяття боротися за стабільність королівства."
  tnk_imperial_legacy: "Імперська Спадщина Пандья"
  tnk_imperial_legacy_desc: "Землі південної $india$ довго страждали під іноземними загарбниками та вискочками-воєначальниками, які встановлювали власні володіння. Нам потрібно використати наше унікальне становище як стародавньої династії та заявити права на ці землі, щоб повернути стабільність і мир на наші законні землі."
  paik_system_advance: "$paik_system$"
  paik_system_advance_desc: "$paik_system_desc$"
  paik_regiments_advance: "$a_paik_infantry$"
  paik_regiments_advance_desc: "$a_paik_desc$"
  advanced_paik_system_advance: "Покращені Пайки"
  advanced_paik_system_advance_desc: "$a_late_paik_infantry_desc$"
  baghlah_advance: "$n_baghlah$"
  baghlah_advance_desc: "$n_baghlah_desc$"
  bng_bengali_vassal_system: "$BNG_ADJ$ Васальна Система"
  bng_bengali_vassal_system_desc: "Під час правління $DLH$ $bengali$ народ служив своєму сюзерену як прибуткові васали. $DLH_ADJ$ система послужить нам основою для наших власних васальних систем на роки майбутнього $bengali$ суверенітету."
  bng_bengali_paik: "$BNG_ADJ$ Пайк"
  bng_bengali_paik_desc: "Пайки є основою нашої армії. У той час як інші держави мають активну Пайкову Систему та використовують пайків як своїх загальних ополченців, наша держава зосереджується на меншій кількості, але добре організованих пайків з достатньою військовою підтримкою."
  bng_bengali_architecture: "$bengali$ Архітектура"
  bng_bengali_architecture_desc: "Суміш стародавньої міської архітектури, впливів $muslim_ADJ$ інженерії та класичних $bengali$ дахів, $bengali$ стиль є унікальним стилем, що використовується для релігійних та культурних будівель усіх видів. Завдяки нашому досвіду в ньому, будівництво таких споруд значно простіше дозволити собі."
  bng_habshi_generals: "Хабші-генерали"
  bng_habshi_generals_desc: "Абіссінські солдати-раби, придбані на арабських ринках, відіграють значну роль як елітні піхотинці. Ті, хто відзначиться як лідери, отримають вищі рівні командування, тоді як ті, хто продемонструє виняткову вірність, складуть палацову гвардію."
  bng_war_elephants: "Бойові слони"
  bng_war_elephants_desc: "Хоча й повільні, маневреність слонів у річковій місцевості нашої країни є великою перевагою у транспортуванні військових матеріалів для нашої армії. Крім того, бойові слони допомагатимуть нашим військам на полі бою своєю імпозантною статурою."
  bng_rupees: "Карбування рупій"
  bng_rupees_desc: "Відсутність широко прийнятої стандартизованої валюти гальмує розвиток індійської торгівлі. Як одна з провідних економічних держав субконтиненту, ми маємо гарну позицію, щоб розпочати карбування нової срібної монети зі стандартною вагою, яку ми назвемо рупією."
  bng_bengali_traders: "$BNG_ADJ$ Торговці"
  bng_bengali_traders_desc: "$indian_ocean_region$ з'єднує індійський ринок з ринками $south_east_asia$ та $china$. Таким чином, ми будемо приділяти велику увагу максимізації нашої присутності на цих ринках морськими шляхами та збільшенню наших прибутків від торгівлі."
  bng_bengali_poetry: "$bengali$ Поезія"
  bng_bengali_poetry_desc: "Письмове слово є однією з найвпливовіших форм мистецтва. $bengali$ поезія розповідатиме історії епічних завойовників, зрозумілі драми та захоплюючі філософські питання, які принесуть славу $bengali$ культурі."
  bng_religious_pluralism: "Релігійний плюралізм"
  bng_religious_pluralism_desc: "$india$ є домом для багатьох релігій: $hindu$ серед більшості населення, $muslim$ як переважна релігія правлячих класів, і кілька помітних менших релігій, таких як $buddhist$ та $jain$ серед працюючих меншин. Просування однієї релігії над іншою спричинить неминучий хаос і заворушення. Таким чином, ми повинні прагнути до релігійного плюралізму і не віддавати перевагу жодній релігії в нашій державі, ані дискримінувати її."
  bng_artillery_corps: "Артилерійський корпус"
  bng_artillery_corps_desc: "Гармати безперечно стали впливовим активом у військових кампаніях. Ми повинні забезпечити ефективний артилерійський корпус, який спеціалізується на завданні шкоди ворожим рядам, перш ніж вони зможуть зіткнутися з нашими піхотинцями на полі."
  bng_bengali_trade_fleet: "$BNG_ADJ$ Торговий флот"
  bng_bengali_trade_fleet_desc: "Торговий флот $bengali$ народу привозить екзотичні товари з чужих земель, а також дорогоцінні $goods_gold$ та $silver$ на ринки дельти Гангу. Наші купці добре відомі у далеких куточках світу завдяки нашому великому торговому флоту."
  bng_shipbuilding_industry: "Суднобудівна промисловість"
  bng_shipbuilding_industry_desc: "Морська торгівля є життєвою сутністю нашої держави. Таким чином, наші торгові та військові кораблі є одним з найважливіших аспектів нашої економіки, і наша увага зосереджена на підтримці суднобудівної промисловості."
  bng_bengali_industrialization: "Муслінова індустріалізація"
  bng_bengali_industrialization_desc: "$BNG$ унікально розташований в $india$, щоб розпочати революцію, подібної до якої ще не було. Муслін — особлива бавовняна тканина, якою славляться $bengali$ прядильники — є першокласним торговим товаром для індустріалізації. Ми готові використовувати нові розробки в нашій вже світового класу текстильній промисловості. Давайте розпочнемо промислову революцію!"
  raj_militaristic_society: "Мілітаристське суспільство"
  raj_militaristic_society_desc: "Серед раджпутів майже немає поділу між цивільним і військовим суспільством. Наша нація — це Військо, визначене своїм народом, а не землею, яку ми контролюємо, і її народ — воїни. Ми повинні забезпечити, щоб військові підрозділи належним чином відповідали нашим адміністративним потребам у міру розширення Війська."
  raj_combat_training: "Тренування бою"
  raj_combat_training_desc: "Кожен солдат тренується до бою. Однак наші люди тренуються до бою з набагато молодшого віку, що дозволяє їм перевершити будь-якого іншого новобранця."
  raj_clan_loyalties: "Вірність клану"
  raj_clan_loyalties_desc: "Вплив нашого клану поширюється далеко за межі наших кордонів. Ми можемо залучати раджпутів нашого клану з усієї північної $india$ при поповненні лав наших армій."
  raj_monumental_architecture: "Монументальна архітектура"
  raj_monumental_architecture_desc: "Яка користь від перемог, якщо немає будівлі, щоб увічнити наші досягнення? Будуть зведені такі пам'ятники, як велична Вежа Перемоги, щоб майбутні покоління знали про наші найбільші битви."
  raj_marwari_horses: "Коні Марварі"
  raj_marwari_horses_desc: "Як і їхні господарі, раджпутські кавалерійські коні ретельно тренуються для виступу на полі бою. Кажуть, що кінь Марварі може покинути поле бою лише за однієї з трьох умов – перемога, смерть або перенесення пораненого господаря в безпечне місце. Дбаючи про цих божественних істот, ми забезпечуємо вічне панування наших вершників на полях битв $india$."
  raj_reorganized_rajput_regiments: "Реорганізовані раджпутські полки"
  raj_reorganized_rajput_regiments_desc: "Традиційні кланові структури є чудовою основою для модернізованої полкової системи. Існуючі ієрархії, засновані на спорідненості та безумовній вірності, можуть бути легко перетворені на організовану та формальну командну структуру."
  raj_martial_smiths: "Військові ковалі"
  raj_martial_smiths_desc: "Війни виграються не лише тактикою та хоробрістю, а й зброєю. Наші ковалі викують найкращу військову зброю для наших воїнів, щоб вони захищали раджпутський народ від будь-якої іноземної загрози."
  raj_fortress_architecture: "Фортечна архітектура"
  raj_fortress_architecture_desc: "Піднесення $DLH$ та вторгнення $muslim_ADJ$ воїнів минулого стали тривожним дзвінком для нашого народу. Ми завжди повинні готуватися до іноземних загарбників, і тому ми повинні найняти найкваліфікованіших архітекторів для проектування неприступних фортів по всьому нашому царству. Надзвичайно довгі стіни, які знадобляться для захисту нашої землі, роблять це амбітним проектом, але наша рішучість захистити наш народ забезпечить його виконання."
  raj_expanded_artillery_arm: "Розширений артилерійський підрозділ"
  raj_expanded_artillery_arm_desc: "Облоги – це те, що виграє війни. Ми повинні експериментувати зі способами створення більших і кращих гармат, щоб зруйнувати численні форти наших ворогів у $india$ та за її межами."
  raj_the_purbias: "POSTEDIT_Пурбії"
  raj_the_purbias_desc: "POSTEDIT_Раджпути поширилися по всій північній $india$ у своєму прагненні до слави для свого клану. #italic POSTEDIT_Пурбії#!, елітні POSTEDIT_раджпутські солдати, які виступають як найманці, відомі своєю бойовою майстерністю, і таким чином поширюють нашу грізну репутацію."
  raj_mandatory_firearm_drilling: "Обов'язкові вогневі навчання"
  raj_mandatory_firearm_drilling_desc: "Багато POSTEDIT_раджпутських солдатів стали експертами у використанні особистої вогнепальної зброї. Ми повинні залучити цих загартованих ветеранів до навчання наступного покоління солдатів, а не ризикувати втратою їхнього досвіду в бою. Усі наші солдати повинні пройти навчання тактиці вогнепальної зброї, перш ніж від них очікуватимуть зустрічі з нашими ворогами на передовій."
  raj_painting_school: "POSTEDIT_Раджпутська школа живопису"
  raj_painting_school_desc: "POSTEDIT_Раджпутські художники вже мають відмінну репутацію. Ми повинні заохочувати наших митців розвивати свої навички та додавати слави нашій династії, створивши школу живопису, характерну для нашої держави."
  raj_rajput_resistance: "POSTEDIT_Раджпутський опір"
  raj_rajput_resistance_desc: "POSTEDIT_Раджпутські барди розповідають історії про численні битви нашого народу проти іноземних загарбників і про те, як наші предки радше померли б, ніж визнали себе переможеними. Ми повинні заохочувати цей дух єдності та давати бардам привід писати нові балади про хоробрість перед обличчям смерті."
  raj_martial_ethos: "Військовий етос"
  raj_martial_ethos_desc: "Виховання та традиції воїнів-раджпутів забезпечують широку базу для набору офіцерів для командування нашими арміями. Щоб скористатися цим, ми повинні забезпечити достаток кар'єрних можливостей, щоб заохотити всіх цих перспективних молодих людей служити офіцерами як у наших власних арміях, так і за кордоном."
  npl_the_divya_upadesh: "Дів'я Упадеш"
  npl_the_divya_upadesh_desc: "Дів'я Упадеш викладає дев'ять принципів, що становлять основу непальського політичного та національного життя, а також настанови для успішної зовнішньої політики. Він узагальнює століття непальських думок про управління, війну та мир. Дотримуючись цих принципів, Непал зможе уникнути підривної діяльності сусідніх імперій та набігів чужинців."
  npl_gurkhas: "$a_gurkha$"
  npl_gurkhas_desc: "$a_gurkha_desc$"
  ori_bulwark_of_the_hindu: "Оплот $hindu$"
  ori_bulwark_of_the_hindu_desc: "$muslim_ADJ$ віряни вторглися на Індійський субконтинент і підкорили багатьох $hindu_ADJ$ мешканців під своїм жахливим правлінням. Проте, $ORI$ стоїть проти воїнів $muslim$. Ми є оплотом $hindu$, і ми захистимо наші традиції та культуру від будь-якого іноземного загарбника!"
  ori_anka_year_system: "Система літочислення Анка"
  ori_anka_year_system_desc: "Рік Анка – це наш спосіб документувати рік правління наших правителів. Роки, що закінчуються на 6 і 0, за винятком 10, пропускаються, а Анка завжди починається на #italic Суніа#!, одійський фінансовий новий рік."
  ori_lord_of_elephants: "Гаджапаті"
  ori_lord_of_elephants_desc: "Коні чужі для $ORI$, і тутешні землі непридатні для їх розведення. Наші джунглі, однак, відомі тим, що кишать слонами. У густих джунглях Східної $india$, добре виконана тактична співпраця між слонами та піхотою може бути такою ж смертоносною, як і кавалерійська армія. Давайте ще більше збільшимо розмір нашого слонового корпусу та вдосконалимо їхню тактику, щоб ми могли бути відомі як справжній #italic Гаджапаті#!, Володар Слонів."
  ori_servitor_of_jagganath: "Служитель Джаганнатха"
  ori_servitor_of_jagganath_desc: "Поклоніння Джаганнатху, володарю всесвіту, є тим, що об'єднує ці землі. Старіші правителі $ORI$ вважалися синами Джаганнатха. Наш нинішній правитель, можливо, не є його нащадком, але ми повинні обов'язково закарбувати в усіх, що наш лідер є служителем Джаганнатха, і що будь-яка непокора їм дорівнює зраді самому володарю Джаганнатху."
  ori_parikshas: "Парікші"
  ori_parikshas_desc: "Землі $ORI$ довгий час були розділені між багатьма різними князьками. Однак час цих Мандалешварів минув! Ми повинні взяти під контроль ці землі та призначити регіональних губернаторів, Парікшів, замість того, щоб дозволяти цим дрібним князькам розмивати нашу імперську владу."
  ori_odia_militarization: "Одійська мілітаризація"
  ori_odia_militarization_desc: "$muslim_ADJ$ загроза ніколи не припиняється і ніколи не зупиняється. Ми повинні забезпечити готовність нашої армії протистояти та боротися із загарбниками в будь-який момент."
  ori_refined_cloth_production: "Удосконалене виробництво тканин"
  ori_refined_cloth_production_desc: "$ORI$ славиться своїми високоякісними тканинами з давніх часів. Давайте ще більше заохочувати текстильні гільдії $ORI$ удосконалювати свої методи виробництва тонкої тканини Калінга."
  ori_patronize_temple_construction: "Патроноване будівництво храмів"
  ori_patronize_temple_construction_desc: "Слава минулих династій відображається у величі храмів, які вони залишили після себе. Ми повинні прагнути покращити численні великі храмові комплекси на наших землях і найняти архітекторів для будівництва нових, щоб сприяти розвитку архітектури Калінги."
  ori_encourage_salt_trade: "Торгівля сіллю"
  ori_encourage_salt_trade_desc: "Високоякісна $salt$ з $ORI$ користується попитом по всій $india$. Давайте зробимо все можливе, щоб заохотити торгівлю $salt$, щоб ми могли збагатитися на ній."
  ori_expansion_of_infrastructure: "Розширення інфраструктури"
  ori_expansion_of_infrastructure_desc: "З розвитком технологій зростає і населення нашої держави. Більш ніж очевидно, що індустріалізація призвела до зростання нашого народу до нових висот. Таким чином, ми повинні розширити нашу інфраструктуру, щоб пристосуватися до цієї нової ситуації."
  bah_arabian_horses: "Арабські коні"
  bah_arabian_horses_desc: "Клімат $india$ є в кращому випадку неоптимальним для розведення та вирощування коней. Однак коні Аравійського півострова є чудовими верховими тваринами, що перевершують місцевих коней. Ми використаємо наші торговельні зв'язки, щоб забезпечити постійне постачання цих коней для наших військ."
  bah_amir_rebellion: "Повстання Аміра"
  bah_amir_rebellion_desc: "Наша держава народжена в повстанні Аміра проти жалюгідного правління $DLH$. Перемога над $DLH_ADJ$ Султанатом донині живе в умах нашої власної знаті та військових."
  bah_nobility_hindu_expansion: "Розширення індуїстської знаті"
  bah_nobility_hindu_expansion_desc: "Хоча часом і є прокляттям для суверенітету правителя, $nobles_estate$ є, тим не менш, одним з важливих аспектів уряду для управління величезними землями держави. З нашою незалежністю від $DLH$ ми отримали власність над майже виключно $hindu_ADJ$ підданими, тоді як наші $muslim_ADJ$ дворяни є невеликою меншістю, нездатною керувати масами. Ми повинні розширити нашу знать, просуваючи перспективних $hindu_ADJ$ кандидатів."
  bah_gharbians: "Гарбійці"
  bah_gharbians_desc: "Розрив зв'язків з $DLH$ для заснування власного королівства майже сто років тому послабив наші зв'язки з $muslim_ADJ$-домінованими північними частинами $india$. Оскільки нашій державі бракує будь-якої форми вкоріненої $muslim_ADJ$ аристократії, ми перебуваємо в небезпечному становищі, і ми можемо опинитися повністю на милості місцевих $hindu_ADJ$ дворян.\nНа щастя, наша репутація випереджає нас. Розповіді про багатства Декану переказуються по всьому $muslim_ADJ$ світу, і багато амбітних шукачів щастя прагнуть здійснити морську подорож до наших портів. Використовуючи величезні багатства $india$ для залучення талановитих західняків, гарбійців, до нашого двору, ми можемо забезпечити, щоб нашій країні ніколи не бракувало здібних людей для керівництва нашими арміями, збору наших податків та управління нашими підданими."
  bah_legacy_of_gisu_daraz: "Спадщина Гісу Дараза"
  bah_legacy_of_gisu_daraz_desc: "$india$ загалом, і наша держава зокрема, має історію як центр суфійських вчень. Зусилля наших правителів із залучення та покровительства суфійським шейхам з усього світу є свідченням побожності та великої духовної сили наших монархів та нашого двору.\nПрийняття державою суфійських концепцій духовної суверенності та інклюзивного характеру самих суфійських вчень допоможе створити середовище, де різноманітні релігійні вірування гарбійців та корінних жителів Декану можуть змішуватися та процвітати без зіткнень чи непродуктивних суперечок."
  bah_meltpot_of_languages: "Плавильний котел мов"
  bah_meltpot_of_languages_desc: "$deccan_region$ — це регіон багатьох мов і культур. Великий приплив людей $iranian_group$, $turkic_group$, $afghan_culture$ та $arabian_group$ походження до цих земель ще більше підкреслив космополітичний характер нашої держави. Хоча історично $persian_language$ мова задовольняла потреби наших попередників, нова суміш місцевих мов, а також $persian_language$ та $arabic_language$ стає все більш поширеною. Ця суміш мов зливається в джерело культурного натхнення для майбутніх митців."
  bah_karimis: "Карімі"
  bah_karimis_desc: "Протягом століть індо-єгипетською торгівлею займалися єгипетські групи торговців і капітанів, відомі як $bah_karimis$. Ця торговельна організація, що відігравала ключову роль у повсякденній торгівлі в $indian_ocean_region$, тепер є як заможною, так і могутньою. Від $tamil$ узбережжя та портів торгових міст $swahili_culture$ до портових міст $lower_egyptian_culture$ за $gulf_aden_province$, султани, дворяни та простолюдини приходять, щоб купити екзотичні товари або позичити гроші на свої проєкти у $bah_karimis$.\nЦя організація останнім часом виявила дуже активний інтерес до нашої держави, і ми лише виграємо від подальшого розвитку наших відносин з нею."
  bah_takht_e_firoza: "Тахт-е-Фіроза"
  bah_takht_e_firoza_desc: "Перше, що помічає будь-який гість у нашій королівській аудієнц-залі, це Бірюзовий Трон нашої династії. Цей унікальний предмет королівських меблів був спочатку подарований нам переможеним Телугу Раджею Капаєю, і він багато в чому є найвищим символом нашої династії. Вишуканий і чудово унікальний, він втілює багатства Декану та незвичайне поєднання стилів, що є відмінною рисою нашої космополітичної держави."
  bah_bahmani_primogeniture: "Бахманське первородство"
  bah_bahmani_primogeniture_desc: "Наша незвичайна практика завжди передавати трон старшому сину нинішнього правителя часом створювала певну нестабільність у нашому царстві, оскільки жадібні до влади регенти та опортуністичні дворяни спочатку без вагань намагалися скористатися дитиною-правителем або підтримати претензії заздрісного родича на трон. Однак наразі ця практика міцно інституціоналізувалася, і коли настає час успадкування, дуже мало хто протистоятиме справжньому спадкоємцю нашої династії."
  bah_madrasa_of_mahmud_gawan: "Велика Медресе Декану"
  bah_madrasa_of_mahmud_gawan_desc: "Протягом багатьох років наша держава залучала здібних чоловіків з усього $muslim_ADJ$ світу, а також включала найкраще з держав, що існували до нас. Це створило багату космополітичну культуру, яка не є повністю $farsi_culture$, $arabian_group$, $marathi_culture$, $telugu$ чи $kannadiga$ за своєю природою. Створення великої медресе в нашій столиці сприяло б подальшому розвитку вивчення цієї безлічі культур і дозволило б світу побачити велич нашої держави."
  guj_hub_of_the_indian_ocean_trade: "Центр торгівлі $indian_ocean_region$"
  guj_hub_of_the_indian_ocean_trade_desc: "Завдяки природі мусонних вітрів та географічному розташуванню, $GUJ$ довгий час служив центром східно-західної торгівлі в $indian_ocean_region$, з'єднуючи $red_sea_area$, $egypt_region$ та Малакку. Через це купці $GUJ$ були важливими посередниками, що привозили такі дорогоцінні товари, як спеції з Молуккських островів та шовк з Китаю, а потім продавали їх купцям, що прибували із заходу."
  guj_garba: "Гарба!"
  guj_garba_desc: "Виникнувши з поклоніння $hindu_ADJ$ Богині Амбаджі жінками через танець, наш народ удосконалив нову і дуже витончену форму танцю, що називається Гарба. Основи танцю — це спів і ритмічне плескання в круговій формації. Сьогодні наші чоловіки та жінки збираються разом, щоб використовувати цей танець для святкування будь-якої події з великим запалом, об'єднуючись як громада та одягаючи вишукано вишиті вбрання. Всі ми разом, молоді та старі, селяни та князі, $muslim_ADJ$ та $hindu_ADJ$, танцюємо у постійно зростаючому колі."
  guj_jain_routes: "$jain_ADJ$ Зв'язки"
  guj_jain_routes_desc: "$jain$ — це стародавній спосіб життя, що набув своєї нинішньої форми завдяки Махавірі. Протягом тисячі років $GUJ$ був оплотом $jain_ADJ$ громади та віри, з багатьма святими місцями та храмами. Королівські династії підтримували цю релігію, формуючи спільну громаду з $hindu_ADJ$ народом. $muslim_ADJ$ вторгнення із заходу, здійснені Махмудом Газневі та Мухаммадом Горі, пригнічували $jain_ADJ$ громаду, руйнуючи храми або перетворюючи їх на мечеті, а також спалюючи $jain_ADJ$ бібліотеки. Однак $jain_ADJ$ народ $GUJ$ вижив, адаптувався та процвітав, використовуючи свої зв'язки з $jain_ADJ$ громадами по всьому світу, щоб служити центром як для віри, так і для торгівлі."
  guj_gujarati_lipi: "$GUJ_ADJ$ Ліпі"
  guj_gujarati_lipi_desc: "$GUJ_ADJ$ Ліпі — це нова писемність та система письма, розроблена торговими інтересами. Вона також відома як писемність сарафі (банкірів), ваніасаї (купців) або махаджані (торговців) через її зв'язок з комерцією. Її використання швидко поширюється по всьому $GUJ$, $KUT$ та $SND$ для представлення цих мов та вивчення $sanskrit_language$, і вона прийнята $zoroastrian$ громадою для написання авестійською. Вона забезпечує спільну систему письма для багатьох різних громад, об'єднуючи їх, а також сприяючи єдності та спільній ідентичності."
  guj_gujarati_merchant_diaspora: "$GUJ_ADJ$ Купецька Діаспора"
  guj_gujarati_merchant_diaspora_desc: "Немає такого місця, де б наші люди не торгували! На кожному березі наші люди займаються комерцією, слідуючи за пасатними вітрами. Наші флоти плавають туди й назад, шукаючи нові можливості. Наші купці знають ремесло та цінність створення добрих і міцних кораблів за купецький бюджет."
  mug_zamindar_system: "Система Заміндарів"
  mug_zamindar_system_desc: "Заміндари — це феодальні правителі, які керують автономно або напівавтономно на наших територіях. Хоча вони є власниками землі, якою вони управляють, і частиною нашої знаті, зрештою, вони служать внутрішніми васалами самої корони."
  mug_mughal_ibadat_khana: "$ibadat_khana$"
  mug_mughal_ibadat_khana_desc: "$ibadat_khana_desc$"
  mug_an_indian_padshah: "Індійський Падишах"
  mug_an_indian_padshah_desc: "Наше царство стало царством багатьох вір і культур, і хоча ми чужинці в цих землях, традиції та цінності $india$ промовляють до нас. Попри свою багату культуру, цим людям, здається, бракує спільної мети. Ми повинні прагнути забезпечити, щоб незалежно від касти, релігії чи культури, всім нашим підданим були надані рівні можливості служити нашому великому дому."
  mug_mughal_architecture: "$MUG_ADJ$ Архітектура"
  mug_mughal_architecture_desc: "Велика імперія вимагає монументальних будівель. У нашій космополітичній імперії архітектори вже створюють дивовижні будівлі, які вражатимуть майбутні покоління. Наша династія повинна бути в авангарді цього руху, створюючи великі твори, подібних до яких світ ще не бачив."
  mug_fatawa_e_alamgiri: "Фатава-і-Аламгірі"
  mug_fatawa_e_alamgiri_desc: "$mug_fatawa_e_alamgiri$ — це збірка, заснована на шаріаті, що служить основним правовим кодексом, який регулює різні аспекти життя в нашій імперії. Це одна з найповніших збірок $muslim_ADJ$ законів, етики, військових стратегій, економічної політики, правосуддя та принципів."
  samanta_advance: "Феодалізм Саманта"
  samanta_advance_desc: "Саманта — #italic сусід#! — це термін, що позначає як васалів, так і данників. Це феодальна система, яка існувала протягом тривалого часу, і хоча вона втрачає свою значущість у нинішню епоху, вона є одним із стовпів, на яких наше суспільство будувалося століттями."
  kalaripayattu_advance: "Каларіпаятту"
  kalaripayattu_advance_desc: "Каларіпаятту — #italic Практика в мистецтвах поля битви#! — це стародавнє індійське бойове мистецтво, що походить з $malabar_area$. Воїни нашої держави будуть навчатися мистецтву Каларіпаятту, щоб забезпечити їхню майстерність у рукопашному бою та ближньому бою."
  nair_military_advance: "Військо Найрів"
  nair_military_advance_desc: "Найри — це різноманітна група індуїстських каст з $malabar_area$, які мають довгу історію участі у військовій справі. Їхній досвід, а також їхня роль для $kalari$, матимуть велике значення для поточних конфліктів."
  mhr_ashta_pradhan_advance: "$mhr_ashta_pradhan$"
  mhr_ashta_pradhan_advance_desc: "$mhr_ashta_pradhan_desc$"
  mhr_tradition_of_military_service: "Традиція Військової Служби"
  mhr_tradition_of_military_service_desc: "$marathi_culture$ кавалеристи мають давню традицію служби як «Баргіри» для Деканських султанатів. Зростаюча мілітаризація Декану через численні війни, що точилися в цьому районі, зробила нашу кавалерію однією з найнебезпечніших сил в $india$."
  mhr_forts_of_maharashtra: "Форти Махараштри"
  mhr_forts_of_maharashtra_desc: "У цих горбистих і густо лісистих землях утримання численних і доглянутих фортів є необхідністю як для наступу, так і для оборони. Підтримка наших численних фортів у належному стані має бути головним пріоритетом."
  mhr_peasant_soldiers: "Селянські солдати"
  mhr_peasant_soldiers_desc: "Села Дешу повні працездатних чоловіків, які були б більш ніж охочі служити в наших арміях. Давайте навчати та вербувати всіх $marathi_language$ мовців для служби в наших арміях."
  mhr_office_of_the_peshwa: "Управління Пешви"
  mhr_office_of_the_peshwa_desc: "Створімо управління, повністю присвячене управлінню нашою державою та її арміями. Зі вмілим міністром на чолі, Пешвою, наша країна буде достатньо універсальною, щоб швидко та ефективно розширюватися."
  mhr_encourage_brahmin_ties: "Заохочення зв'язків з брахманами"
  mhr_encourage_brahmin_ties_desc: "Фінансовий сектор нашої держави домінують брахманські банківські родини. Давайте інтегруємо їх далі в нашу державу, наймаючи їх як збирачів податків та створюючи правила для зміцнення їхніх прав та захисту їхніх традицій. Ми здобудемо прихильність наших фінансистів, а також доступ до вчених та здібних адміністраторів."
  pun_breadbasket_of_india: "Житниця $india$"
  pun_breadbasket_of_india_desc: "Великі п'ять річок — Інд, Джелам, Ченаб, Раві та Сатледж — пронизують землі $punjab_area$, даруючи ґрунту благословення неперевершеної родючості. Окрім можливості експортувати продовольство та бавовну нашим сусідам, це також дозволяє нашим численним містам зростати та заохочує всіляке спеціалізоване виробництво. Ми повинні докласти всіх зусиль, щоб заохочувати зростання сільського господарства та захищати наших фермерів від бандитів та розбійників прилеглих територій."
  pun_encourage_indo_persian_trade: "Заохочення індо-перської торгівлі"
  pun_encourage_indo_persian_trade_desc: "Розташований на західному кордоні $india$, $PUN$ завжди був на перехресті економічного та культурного обміну між $india$ та $persia_region$. Стародавня Велика Колісна Дорога, яка з'єднує східну $india$ з $farsi_culture$ світом, проходить прямо через наші землі, перш ніж піднятися в афганські гірські перевали. Ці перевали, однак, страждають від племінних набігів та бандитів. Ми повинні заохочувати рух по цьому стародавньому та жвавому маршруту та робити все можливе, щоб дбати про добробут цих торговців, будуючи караван-сараї та патрулюючи ці дороги."
  pun_punjabi_textile_industry: "$PUN_ADJ$ Текстильна промисловість"
  pun_punjabi_textile_industry_desc: "$PUN$ є великим центром текстильного виробництва. Тканина від наших ткачів спеціально виготовляється для ринків по всій Азії та Європі, а наші ткачі є одними з найпродуктивніших в $india$."
  pun_foundation_of_the_khalsa: "Хальса"
  pun_foundation_of_the_khalsa_desc: "$sikhism$, релігія, що походить з $PUN$, швидко зростає на наших землях. Члени цієї віри походять з усіх каст та верств суспільства і захищатимуть свою державу незалежно від їхніх колишніх професій."
  pun_gurmukhi_script: "Письмо Гурмукхі"
  pun_gurmukhi_script_desc: "Письмо Гурмукхі — це абугіда, розроблена на землях $PUN$ і високо шанована нашими $sikhism_ADJ$ гуру. Наше духовенство використовує це письмо для запису $sikhism_ADJ$ текстів."
  pun_strength_of_the_misls: "Сила Міслів"
  pun_strength_of_the_misls_desc: "Адміністративна система держав Міслів $PUN$ дозволяє їм виставляти вражаючі кавалерійські сили. У часи потреби ми можемо закликати ці сили для боротьби зі спільним ворогом."
  pun_reforming_the_punjabi_army: "Реформування $PUN_ADJ$ Армії"
  pun_reforming_the_punjabi_army_desc: "Шляхи наших предків були мудрими і добре служили нам протягом багатьох років. Однак, щоб наші армії продовжували тріумфувати на полях битв, ми повинні прагнути створити більш професійну силу. Вивчаючи, як далекі країни організовують свої армії, та адаптуючи їхні методи, коли це доцільно, ми можемо створити більш ефективну $PUN_ADJ$ армію, зберігаючи при цьому унікальні якості нашої поточної військової системи."
  religious_melting_pot: "Релігійний плавильний котел"
  religious_melting_pot_desc: "Багато різних релігій вплинули на наш народ, від їхніх традиційних народних вірувань до $hindu$ та $buddhist$, як з $india$, так і з $china$. З часом наш народ почав певну ступінь синкретизму, змішуючи одні вірування з іншими і не повністю відкидаючи жодне."
  akson_thai: "Аксон Тай"
  akson_thai_desc: "Спочатку засноване на старому письмі $khmer_language$, письмо $thai_culture$ було розроблене як відмінне від нього, щоб пристосуватися до фонології нашої мови. Наявність унікальної писемності допомогла нашому народу розвинутися як унікальній культурі."
  father_governs_children: "Батько править дітьми"
  father_governs_children_desc: "Наші правителі славляться своїм тісним зв'язком зі звичайним народом. Нехай наш народ живе вільно та щасливо під провідним світлом їхніх величних, небесних правителів."
  thai_war_elephants: "Бойові слони"
  thai_war_elephants_desc: "Бойові слони використовувалися в $indochina_region$ протягом поколінь, як кавалерія, що підтримує піхоту, так і як особисті верхові тварини для королів, які потім брали участь у слонових дуелях із протилежним лідером."
  thai_royal_poets: "Королівські поети"
  thai_royal_poets_desc: "Який сенс перемагати у війнах, якщо нікому про це співати? Наш двір буде безпечним місцем для поетів, а наша історія стане джерелом їхнього натхнення."
  trading_links: "Торговельні зв'язки"
  trading_links_desc: "Наша країна лежить на перехресті торговельних шляхів з давніх часів. Наша близькість як до $india$, так і до $china$ дозволила торгівлі протікати через наші землі, а разом з нею — відносинам та взаємодіям з багатьма різними країнами навколо нас."
  foreign_mercenaries: "Іноземні найманці"
  foreign_mercenaries_desc: "Ми нещодавно спостерігали наплив варварів з чужих земель, деякі з них — купці, але деякі — воїни. Використаймо їх у наших арміях."
  toi_muay: "Той Муай"
  toi_muay_desc: "Навчене нашим солдатам для використання у війні, це беззбройне бойове мистецтво, що включає удари, боротьбу та техніки наземного бою. Вправність у ньому дозволяє нашим військам бути смертоноснішими в бою, навіть якщо вони втратять свою зброю."
  trading_embassies: "Торговельні посольства"
  trading_embassies_desc: "Багато торговців ведуть свою торгівлю у водах поблизу наших земель. Таким чином, ми знаємо про багато далеких держав, з якими ми можемо встановити постійні посольства та відносини."
  photduang: "Фотдуанг"
  photduang_desc: "Наша валюта може здатися дивною для сторонніх, але #italic $photduang$#! добре служили нам протягом століть. Круглясті срібні кульки, проштамповані офіційними знаками, вони служать основою нашої економіки."
  personal_executions: "Особисті страти"
  personal_executions_desc: "Лише справедливо, щоб люди бачили нашу відданість правосуддю. Відтепер найогидніші злочинці будуть страчені особисто правителем. Завдяки цьому люди знатимуть, що наша країна є впорядкованою, і їх закликатимуть дотримуватися закону."
  close_subjects: "Близькі піддані"
  close_subjects_desc: "Для нас наші піддані — це не щось відокремлене від нашої власної нації, а невід'ємна її частина. Ми підтримуємо з ними тісні зв'язки, і вони інтегровані в нашу бюрократію та адміністрацію."
  ayu_prestigious_cavalry: "Престижна кавалерія"
  ayu_prestigious_cavalry_desc: "Чи то верхи на коні, чи на спині слона, наша кавалерія — це горді війська, зазвичай походять з найпрестижніших родин. Їхня ефективність у підтримці нашої піхоти є безсумнівною."
  ayu_white_elephant: "Білий слон"
  ayu_white_elephant_desc: "Білий слон є символом влади нашого правителя, дуже сприятливим знаком, який ми використаємо на свою користь. Коли наш правитель їде верхи на білому слоні, ніхто не поставить під сумнів наше право на правління."
  ayu_ayutthaya_literature: "POSTEDIT_Аюттхайська література"
  ayu_ayutthaya_literature_desc: "Література, створена в нашій країні, багата: від епічних поем #italic Lilit#!, що оповідають про відомі військові конфлікти, до поезії #italic Nirat#! про подорожі та втрачених коханих; від народних легенд про місцевих героїв до панегіриків, що вихваляють подвиги наших найславетніших правителів."
  ayu_phrai_luang: "Пхрай Луанг"
  ayu_phrai_luang_desc: "Усі вільні люди, що підлягають службі пхрай, не лише служать у війні (#italic $ayu_phrai_thaan$#!), але й на громадських роботах, на розсуд місцевих губернаторів."
  ayu_phrai_thaan: "Пхрай Тхаан"
  ayu_phrai_thaan_desc: "Усі чоловіки віком 18 років мають бути зареєстровані, а їхня інформація передана до урядової бюрократії. Кожен громадянин чоловічої статі має право бути призваним і служити в армії під час війни, і ми подбаємо про те, щоб вони це робили, якщо буде потрібно."
  ayu_floating_rice: "Плавучий рис"
  ayu_floating_rice_desc: "Рис вирощувався в нашій країні століттями, але постійні повені наших річок завжди були проблемою для його належного вирощування. Цей новий сорт рису, пристосований для вирощування в затоплених умовах, дозволить нам мати більш стабільне джерело їжі навіть під час повеней."
  ayu_sakdina: "Сакдіна"
  ayu_sakdina_desc: "Наше суспільство суворо організоване за системою $ayu_sakdina$, і кожна людина знає своє місце в ній та скільки багатства й власності вона має право мати. Завдяки цьому наша здатність стягувати з них податки є ефективнішою."
  ayu_cosmopolitan_trade: "Космополітична торгівля"
  ayu_cosmopolitan_trade_desc: "Наша країна є домом для багатьох людей здалеку, які приїжджають до нас у пошуках прибутку від багатства нашої землі. Від такого потоку людей і товарів через наші кордони ми також можемо отримати велику вигоду."
  suk_breaker_of_chains: "Руйнівник кайданів"
  suk_breaker_of_chains_desc: "Не так давно ми перебували під POSTEDIT_Кхмерською владою, доки не здобули свободу та своє законне місце як незалежна держава, гідна уваги. Ми заслужили захоплення наших однолітків та їхню повагу."
  suk_birthplace_of_a_culture: "Батьківщина культури"
  suk_birthplace_of_a_culture_desc: "Нас називають першим незалежним POSTEDIT_тайським королівством, оскільки ми були першими, хто повстав проти POSTEDIT_Кхмерської влади та звільнився від їхнього впливу. Тому всі POSTEDIT_тайські народи дивляться на нас із захопленням."
  suk_ram_khamhaeng_stele: "Стела $name_ram_khamhaeng$"
  suk_ram_khamhaeng_stele_desc: "Більша частина історії раннього POSTEDIT_Сукхотайського королівства походить з написів на $suk_ram_khamhaeng_stele$, замовлених великим королем для запису його славетного правління. $suk_ram_khamhaeng_stele$ є священною частиною спадщини і тією, що безперечно доводить наше місце в історії."
  suk_akson_sukhothai: "Аксон $SUK$"
  suk_akson_sukhothai_desc: "Хоча POSTEDIT_тайське письмо вже поширилося серед усіх POSTEDIT_тайських народів, не слід забувати, що саме в нашій країні та під нашим керівництвом воно було розроблено шляхом адаптації з письма наших попередніх POSTEDIT_Кхмерських гнобителів. Таким чином, це не лише об'єднуюча сила для нашої культури, але й доказ нашої індивідуальності та самобутності."
  suk_wat_si_sawai: "Ват Сі Савай"
  suk_wat_si_sawai_desc: "Ми відомі багатьма нашими величними храмами, такими як $suk_wat_si_sawai$, один із найстаріших у POSTEDIT_Сукхотаї. Збудований під POSTEDIT_Кхмерською владою як POSTEDIT_індуїстський храм, його подальше перепрофілювання перетворило його на символ нашої ідентичності. Віра нашого народу сильна."
  suk_sukhothai_ceramics: "POSTEDIT_Сукхотайська кераміка"
  suk_sukhothai_ceramics_desc: "Кераміка створювалася POSTEDIT_тайським народом з давніх часів, під впливом POSTEDIT_китайської кераміки, але завжди зберігаючи свій власний відмінний стиль. Однак, саме кераміка, вироблена в нашій країні, є найціннішою, і її часто торгують на великі відстані за кордоном."
  suk_military_history: "Військова історія"
  suk_military_history_desc: "Наші армії мають довгу історію успіхів та великих перемог. Як наслідок, посада в нашому війську вважається почесною та престижною, і є багато охочих служити на ній."
  suk_unstoppable_army: "Нездоланна Армія"
  suk_unstoppable_army_desc: "Багато хто в минулому намагався зупинити наш поступ та експансію, але всі зазнали поразки перед нашою армією. Вона виявилася нестримною силою, перед якою всі перешкоди, що стоять на нашому шляху, змиваються."
  sia_experienced_ambassadors: "Досвідчені Посли"
  sia_experienced_ambassadors_desc: "Ми маємо великий досвід у політиці, і світанок нашої країни був досягнутий не лише силою нашого війська. Безперечно, наша дипломатична репутація може принести нам певний вплив."
  sia_rise_to_equal_heights: "Піднесення до Рівних Висот"
  sia_rise_to_equal_heights_desc: "Багато частин нашої країни досить знелюднені. Ми повинні покращити їхні умови, щоб жодна частина нашої країни не виглядала тьмяною, і вся вона могла однаково славно сяяти."
  sia_advanced_elephant_warfare: "Передова Війна Слонами"
  sia_advanced_elephant_warfare_desc: "Нерідко наші найвеличніші поеми присвячують рядки тексту, щоб перерахувати та вшанувати наших бойових слонів індивідуально. Покажімо нашим ворогам, чому."
  sia_consolidation_of_state: "Консолідація Держави"
  sia_consolidation_of_state_desc: "Децентралізована система може призвести до втрати частини влади в наших віддалених провінціях. Якщо ми маємо бути справжнім об'єднуючим царством для $thai_culture$ народу, нам потрібно, щоб наші провінції також були об'єднані."
  sia_education_reform: "Освітні Реформи"
  sia_education_reform_desc: "Як сказав наш Господь Будда, ми не повинні приймати щось лише тому, що це часто говорять, але нам потрібно пережити це самим. Освіта є основою знань, і якщо ми хочемо досягти успіху в технологіях, нам потрібно досягти успіху в освіті."
  sia_royal_absolutism: "Королівський Абсолютизм"
  sia_royal_absolutism_desc: "Другий після Небес – ось ким має бути правитель. Шановані та обожнювані, наші лідери правлять Землею, як Боги правлять Небесами."
  sia_thai_unity: "$thai_culture$ Єдність"
  sia_thai_unity_desc: "Ми, безсумнівно, є лідерами всього $thai_culture$ народу. Наші війська пишаються тим, що служать не лише нашій країні, а й як захисники нашої культури та самобутності, і вони люто борються за це."
  rom_spqr: "S.P.Q.R."
  rom_spqr_desc: "Сенат і Народ Риму стоять як вічна основа нашої держави. Посилаючись на цю давню владу, ми нагадуємо всім, що Рим править не лише силою зброї, а й волею своїх громадян та своїх інституцій."
  rom_pax_romana: "Pax Romana"
  rom_pax_romana_desc: "Мир під Римом означає не відсутність війни, а тріумф порядку. Завдяки закону, дорогам та могутності наших армій ми приносимо стабільність та процвітання в кожен куточок нашої Імперії."
  rom_restore_the_legions: "Відновлення Легіонів"
  rom_restore_the_legions_desc: "Легіони колись були гордістю Риму, їх боялися та поважали в усьому світі. Відновити їх – означає відродити дисципліну, організацію та незламний дух, що збудували наші великі основи."
  rom_revival_of_arts_and_culture: "Відродження Мистецтв та Культури"
  rom_revival_of_arts_and_culture_desc: "Рим був маяком культури так само, як і завоювань. Спонсоруючи поетів, вчених та архітекторів, ми розпалюємо творче полум'я, що колись освітлювало стародавній світ."
  rom_new_corpus_juris_civilis: "Novus Corpus Juris Civilis"
  rom_new_corpus_juris_civilis_desc: "Наші юристи укладуть та вдосконалять закони в єдиний звід, спираючись на мудрість Юстиніана та Республіки. Цим ми забезпечимо справедливість для всіх громадян під римським правлінням."
  rom_bread_and_circuses: "Panem et Circenses"
  rom_bread_and_circuses_desc: "Народ має бути задоволений, бо невдоволення породжує повстання. Забезпечуючи зерно для їхніх столів та ігри для їхніх очей, ми здобуваємо їхню вірність і зміцнюємо державу."
  rom_citizenship: "Римське громадянство"
  rom_citizenship_desc: "Громадянство — це життєдайна сила Риму, що об'єднує народи кожної провінції в єдине політичне тіло. Розширення цих прав забезпечує інтеграцію та обіцянку просування для всіх, хто служить імперії."
  rom_all_roads_lead_to_rome: "Всі дороги ведуть до Риму"
  rom_all_roads_lead_to_rome_desc: "Римська дорожня система — заздрість світу. Вона об'єднує нашу імперію, прискорюючи рух купців, посланців та солдатів, усі шляхи сходяться до Вічного Міста."
  rom_provincial_governors: "Провінційні намісники"
  rom_provincial_governors_desc: "Провінціями не можна керувати лише з Риму. Надаючи повноваження компетентним намісникам, ми забезпечуємо, щоб наші закони та податки досягали навіть найвіддаленіших земель імперії."
  rom_imperium_sine_fine: "Imperium Sine Fine"
  rom_imperium_sine_fine_desc: "Доля Риму не знає меж. Від Геркулесових Стовпів до країв землі, нам судилося розширювати наше панування без кінця, несучи цивілізацію туди, куди марширують наші орли."
  rom_triumphs: "Римські тріумфи"
  rom_triumphs_desc: "Тріумф — це більше, ніж процесія. Справді, це жива пам'ять про завоювання, що парадує вулицями наших найбільших міст. Такі церемонії надихають на вірність, благоговіння та амбіції в рівній мірі."
  rom_roman_architecture: "Римська архітектура"
  rom_roman_architecture_desc: "Від акведуків до амфітеатрів, римська інженерія залишає пам'ятники, що стоять століттями. Наша майстерність каменю та арки проголошує світові, що велич Риму вічна."
  byz_heart_of_orthodoxy_advance: "Серце $orthodox$"
  byz_heart_of_orthodoxy_advance_desc: "$constantinople$ лежить у серці живої та давньої віри. Ми гордо є головами $orthodox$, власниками Вселенського Патріархату нашої імперії та захисниками християнства від наших язичницьких ворогів."
  byz_akritai_advance: "Акрити"
  byz_akritai_advance_desc: "Горді захисники наших кордонів від зовнішніх загроз, цим легким військам надаються землі для вирощування та захисту. Акрити найбільш вправні у оборонній війні, особливо проти кавалерії, і часто діють як перша відповідь на зовнішні загрози."
  byz_cataphracts_advance: "Пізні катафрактарії"
  byz_cataphracts_advance_desc: "Незважаючи на зміни, внесені порохом та еволюцією війни, ми завжди можемо покладатися на тактику, вдосконалену нашими предками століття тому."
  byz_historiography_advance: "Візантійська історіографія"
  byz_historiography_advance_desc: "Наш народ стоїть на плечах гігантів. Належне документування наших предків, відстеження наших престижних родоводів та належне збереження наших великих традицій є відповідальністю, що викликає благоговіння, і випливає з нашого великого місця в історії."
  men_of_letters_advance: "Люди пера"
  men_of_letters_advance_desc: "Не секрет, що Захід заздрить нашим літературним досягненням та просвітленому минулому. З цією метою вони прагнуть найняти вчителів з нашого двору, прагнучи вчепитися в знання, що породили могутні імперії та висікли культурний ландшафт усього континенту. Саме через цих мужів пера наші західні сусіди полюблять нашу історію та будуть освічені нашими звичаями."
  byz_shield_of_the_west: "Щит Заходу"
  byz_shield_of_the_west_desc: "Ми стоїмо між $europe$ та морем язичників, як горді захисники та щит від іноземних загроз. Наш меч завжди буде на захисті від тих, хто прагне викорінити наші вірування, потужний удар проти тих, хто бажає кінця наших традицій."
  byz_court_of_languages: "Двір Мов"
  byz_court_of_languages_desc: "Двір $constantinople$ є домом для дипломатів та сановників з усіх куточків відомого світу. Як наслідок, кожна мова чується та поважається, як знак процвітання та прогресу на прохання народу, чия історія та мова сформували світ."
  byz_poikilia: "Пойкілія"
  byz_poikilia_desc: "Візантійська культура захопила $europe$. Елегантно представлена у величезній різноманітності відтінків, це найновіший спосіб вираження симфонії кольорів та елементів у мистецтві та архітектурі."
  byz_crossroads_of_continents: "Перехрестя Континентів"
  byz_crossroads_of_continents_desc: "Візантія стоїть на перехресті між $europe$ та $asia$. Це прибуткове положення призвело до великого впливу на морське значення міста."
  byz_the_new_helepolis: "Завойовник Міст"
  byz_the_new_helepolis_desc: "Традиція розгортання та вдосконалення найпотужніших та найвражаючіших облогових машин є аспектом нашої війни, з яким ми добре знайомі. Завдяки прийняттю та вдосконаленню пороху в наших конструкціях, наші гармати домінуватимуть над нашими ворогами."
  byz_reaffirm_synod_powers: "Реформовані Протоколи Синоду"
  byz_reaffirm_synod_powers_desc: "Бюрократія є кошмарним завданням для країни нашого розміру. Щоб краще вдосконалити релігійні процедури щодо скликання кожного $orthodox_synod$, ми скоротимо бюрократію та переглянемо законодавство щодо цього."
  byz_byzantine_inquisition: "Візантійська Інквізиція"
  byz_byzantine_inquisition_desc: "Оскільки $europe$ охоплена релігійними заворушеннями, ми повинні підготувати наші благочестиві захисти проти бур'янів, які можуть з'явитися в нашому саду, щоб не ризикувати стати жертвами єресі та нестабільності."
  byz_autokratoria_rhomaion: "Автократорія Ромаїв"
  byz_autokratoria_rhomaion_desc: "Наша велика нація є безперечним продовженням римської пишноти та престижу. Повернення цих давно втрачених земель є нашою основною метою та рушійною силою."
  byz_modernized_strategikon: "Модернізований Стратегікон"
  byz_modernized_strategikon_desc: "Посібник з ведення війни, написаний Маврикієм давно, служив нашому народу у часи війни. Однак, як змінюється війна, так і ми повинні змінюватися. Наша тактика адаптувалася, а наші полки пристосувалися до нових способів ведення війни та нової зброї, яка є набагато руйнівнішою проти тих, хто прагне нам протистояти."
  byz_ancient_greek_studies: "Дослідження Стародавньої $greek_culture$"
  byz_ancient_greek_studies_desc: "Повторне відкриття класики та прийняття стародавнього $greek_culture$ мистецтва дало Заходу чудову можливість для освіти мас та збереження великих ідеалів у різних культурних та наукових сферах."
  byz_the_new_imperial_army: "Нова Імперська Армія"
  byz_the_new_imperial_army_desc: "Надто довго наша армія відставала від наших європейських колег. Ми повинні реформувати нашу армію та розширити наші зусилля з призову в надії створити армію, яка відповідає відродженому та могутньому феніксу."
  expand_varangian_guard_advance: "Розширити Варязьку Гвардію"
  expand_varangian_guard_advance_desc: "Варяги служили нашій країні століттями з видатною честю та непохитною вірою. Розширюючи їхні ряди, ми лише ще більше забезпечимо нашу стабільність та захист Візантії."
  imperatorskiy_moskovskiy_universitet: "Імператорський Московський Університет"
  imperatorskiy_moskovskiy_universitet_desc: "Імператорський університет присвячений вивченню та викладанню філософії, медицини та права і відіграє значну роль у російській освіті та дослідженнях. Його засновано в рамках реформ російської освіти, задуманих ерудитом Михайлом Ломоносовим, що підкреслює важливість наукових досліджень та інновацій."
  hurricane_hardy: "Ураган Гарді"
  hurricane_hardy_desc: "Проєкти Федора Апраксіна є міцними та стійкими, дозволяючи кораблям витримувати більшість штормів, які може викликати Матінка-Природа. Інноваційне будівництво значно сприяє будь-яким морським амбіціям, що зароджуються."
  preobrazhensky_semyonovsky_imperial_guard: "Преображенська Семенівська Імператорська гвардія"
  preobrazhensky_semyonovsky_imperial_guard_desc: "Потішне військо організоване в елітні роти, формуючи Імператорську гвардію для захисту інтересів монархії. Вони часто беруть участь у придворних церемоніях, парадах та інших значних подіях, демонструючи свою важливість поза військовими обов'язками."
  kasztelanowie: "Каштеляни"
  kasztelanowie_desc: "Маючи завдання бути голосом монарха, каштеляни є офіційними представниками по всьому володінню правителя. Вони відповідають за збір податків та забезпечення верховенства права, навіть здійснюючи правосуддя та забезпечуючи відповідність в ім'я корони."
  land_of_promise: "Земля Обітована"
  land_of_promise_desc: "Родючі землі нашого володіння є бажаним місцем призначення для багатьох мігрантів нижчих верств, які шукають кращого та заможнішого життя."
  statute_of_kalisz: "Каліський статут"
  statute_of_kalisz_desc: "Відомий як Загальна хартія єврейських свобод, цей законодавчий акт містить статті, що дозволяють усім євреям свободу віросповідання, торгівлі та подорожей. Статут також намагається зменшити кількість звинувачень у кривавому наклепі проти євреїв, поширюваних Католицькою Церквою."
  corona_regni_poloniae: "Corona Regni Poloniae"
  corona_regni_poloniae_desc: "Ідея про те, що королівство є неподільним і перебуває у спільній власності, не однієї династії чи монарха, а всієї політичної спільноти в межах нашого володіння, є глибоко вкоріненою ідеєю між нами та різними герцогами під нашим прапором."
  krakow_grosz: "Grosz Krakowski"
  krakow_grosz_desc: "У спробі реформувати грошову систему ми запровадимо нову валюту – Краківський гріш. Викарбувані зі срібла, ці монети покликані кинути виклик могутності Богемського Празького гроша та утвердити наше володіння як лідера централізованого оподаткування."
  stone_and_brick: "Камінь і цегла"
  stone_and_brick_desc: "Століттями ми покладалися на слабкість дерева для зведення поселень та оборони від наших ворогів. Використовуючи нашу скарбницю та політичну владу, план розширення інфраструктури нашого володіння буде приведений у дію. Ми успадкували дерев'яні міста, і ми залишимо їх укріпленими каменем та цеглою."
  council_of_three_lands_advance: "Рада Трьох Земель"
  council_of_three_lands_advance_desc: "Наша країна має давню історію прийняття знедолених та переслідуваних євреїв. З цією метою рада, яка дбатиме про їхні потреби та захищатиме їхні права, лише принесе користь нашій стабільності та духовній силі."
  polish_renaissance: "Польський Ренесанс"
  polish_renaissance_desc: "Натхненні італійськими течіями Ренесансу, розквіт мистецтв та культури розквітне в наших мистецьких залах."
  granary_of_europe: "Житниця Європи"
  granary_of_europe_desc: "Родючі поля нашого володіння є домом для найбагатших зернових культур Європи, частково завдяки системі фільварків. Завдяки нашій милості ми постачаємо ринки за межами наших кордонів, забезпечуючи, щоб наш народ продовжував процвітати і ніколи не голодував."
  komisja_edukacji_narodowej: "Komisja Edukacji Narodowej"
  komisja_edukacji_narodowej_desc: "У відповідь на потребу нашого уряду залучати здібних адміністраторів та для забезпечення безперебійної роботи відповідних процедур, ми профінансуємо та створимо перше в Європі міністерство освіти, зосереджене на поширенні грамотності серед нашого населення."
  szkola_rycerska: "Лицарська школа"
  szkola_rycerska_desc: "Виховуючи та прищеплюючи національну гордість розумам наступного покоління шляхти, ми досягнемо успіху у формуванні поколінь гідних військових та цивільних кадрів."
  great_sejm_reforms: "Великі сеймові реформи"
  great_sejm_reforms_desc: "Якщо ми хочемо вижити та продовжувати процвітати, ми повинні забезпечити належну роботу нашого урядового механізму, який базується на міцних засадах. Парламент прийме модернізовані процедури та делегує свої новоприйняті повноваження. Цілями цієї еволюції є підрив влади шляхти, а також пом'якшення зростаючих зловживань в рамках інституту кріпацтва."
  late_winged_hussars_advance: "Пізні крилаті гусари"
  late_winged_hussars_advance_desc: "Еволюція польських гусарів у XVII столітті передбачала прийняття важчих обладунків червоно-білих кольорів. Вони використовували довшу спис близько шести метрів, і їхній наступ був неймовірно руйнівним, часто ламаючи моральний дух їхніх ворогів і змушуючи їх тікати."
  winged_hussars_advance: "Крилаті гусари"
  winged_hussars_advance_desc: "Гусари спочатку були легкою кавалерією, що використовувалася для розвідки, але зі занепадом старої феодальної армії ми перейшли на професійні полки. Нові, важчі гусари становитимуть її ядро. Люди незабаром боятимуться польських крилатих гусарів."
  wojsko_komputoe: "Військо Компутове"
  wojsko_komputoe_desc: "Компутове військо (Wojsko Komputowe) базувалося на річному бюджеті, розрахованому (обчисленому) та затвердженому Сеймом. Ідея полягала в тому, щоб надати Речі Посполитій стабільну постійну армію для оборони."
  folwark_system: "Фільваркова система"
  folwark_system_desc: "Фільваркова система була системою виробництва, яка заохочувала виробництво сільськогосподарських надлишків. Селян заохочували працювати в них або за допомогою ренти, або примусу. Вона мала стати основою польської економіки."
  baihua: "Байхуавень"
  baihua_desc: "Наші володіння простягаються далеко за обрій. Поява спільної писемної мови серед наших підданих, безсумнівно, подолає розриви між нами, піднесе нашу культуру та зменшить конфлікти, що ґрунтуються на непорозуміннях та мовних відмінностях."
  zaju: "Цзацзюй"
  zaju_desc: "Зазвичай складаючись із чотирьох актів, це блискуче видовище танцю та музики є барвистим вираженням мистецьких висот, яких досягло наше суспільство."
  successors_of_genghis_khan: "Наступники $genghis_khan_name_no_tooltip$"
  successors_of_genghis_khan_desc: "Від днів тотального завоювання до безмежних просторів великої Імперії $genghis_khan_name_no_tooltip$, наш народ походить від поколінь тих, хто потрясав землю, і тих, кому судилося писати історію."
  confucian_influences: "Конфуціанські впливи"
  confucian_influences_desc: "Якщо ми хочемо належним чином керувати нашим царством, наші радники знайдуть велику мудрість у вченнях Конфуція, увазі до деталей та меритократії для здорового та процвітаючого уряду."
  extensive_canal_works: "Масштабні канальні роботи"
  extensive_canal_works_desc: "Численні річки, що перетинають наші володіння, частіше за все є вісниками процвітання. Намагаючись використати їхню щедрість, ми побудуємо інфраструктурні мережі, щоб забезпечити водою та транспортом між річками та нашими внутрішніми поселеннями."
  zhongshu_sheng: "Чжуншу Шен"
  zhongshu_sheng_desc: "Одна з найважливіших гілок #italic Трьох департаментів і Шести міністерств#!, центральний секретаріат відповідає за розробку кодифікації багатьох імперських реформ і указів."
  lijia_system: "Система Ліцзя"
  lijia_system_desc: "Завдяки системі Ліцзя ми можемо діяти та здійснювати контроль над нашими прикордонними землями шляхом розподілу осілих армій. Надаючи землю та сільськогосподарські права нашим розквартированим військам, наші кордони будуть у безпеці, а наш контроль зросте."
  yulin_tuce: "Юйлінь Туце"
  yulin_tuce_desc: "Ухилення від сплати податків — це загальна проблема, яка переслідувала наших предків. Складаючи реєстри для районів та провінцій, ми краще відстежуватимемо податки, що належать центральному уряду з кожної ділянки. Це оподаткування значною мірою визначається на основі врожайності зерна з кожної ділянки, що підлягає обстеженню."
  weisuo_system: "Вей Со"
  weisuo_system_desc: "Наші землі бажані багатьма іноземними завойовниками. Якщо ми хочемо їх захистити, ми повинні створити гарнізонну систему, спрямовану на швидке реагування проти ворожих вторгнень. Завдяки набору місцевих військ наша оборонна міць буде доповнена постачанням та ефективнішою логістикою."
  grand_coordinators: "Великі координатори"
  grand_coordinators_desc: "Підтримання контролю над нашими територіями, формування політики та військові операції є життєво важливими для продовження нашої династії. Завдяки створенню органу високопоставлених чиновників ми досягнемо подальшого зміцнення нашої позиції шляхом стабілізації внутрішніх та зовнішніх справ."
  the_censorate: "Цензорат"
  the_censorate_desc: "Паралельно з іншими інститутами нашої адміністрації, ця гілка нашого уряду відповідає за запобігання корупції. Цензори мають завдання контролювати палацові інтриги та зловживання, їх часто вважають очима та вухами Імператора."
  the_tea_trade: "Торгівля чаєм"
  the_tea_trade_desc: "Чай, основний напій нашого суспільства, став домінувати на світських зібраннях, ставши улюбленим напоєм багатьох. Це, безсумнівно, призведе не тільки до вирощування нових сортів, але й до певного виробничого буму."
  tu_bing: "Ту Бін"
  tu_bing_desc: "Прагнучи належним чином захистити наші кордони, стало очевидним, що ми повинні створити систему набору, зосереджену на місцевих солдатах та стійких воїнах. Ці люди є чудовим доповненням до наших військових можливостей і відокремлені від системи #italic Вей Со#!."
  tusi_titles: "Титули Тусі"
  tusi_titles_desc: "Титули, надані воєначальникам та місцевим впливовим особам, ці адміністративні посади використовуються для придушення заворушень та утримання сільського населення під центральним контролем."
  salt_monopoly: "Відновити соляну монополію"
  salt_monopoly_desc: "Соляна монополія була одним з найбільших джерел доходу для держави. Проте попередні Імператори вважали за потрібне припинити її в ім'я торгівлі. Настав час повернути торгівлю сіллю під контроль держави."
  reform_the_grand_secretariat: "Реформувати Великий Секретаріат"
  reform_the_grand_secretariat_desc: "Вважаючись де-факто найвищою установою на наших землях, #italic Великий Секретаріат#! супроводжував наших правителів під час їхніх термінів. Наділений величезним впливом у веденні адміністративних справ, цей орган кабінетних міністрів зазнає реформи, щоб ще більше підвищити свою ефективність."
  grand_military_parades: "Великі військові паради"
  grand_military_parades_desc: "Славетна військова історія нашого народу буде виставлена на загальний огляд з благоговінням. Парад наших армій продемонструє бойовий досвід та неперевершену силу."
  silver_standard: "Срібний стандарт"
  silver_standard_desc: "Перетворивши більшість зобов'язань перед центральним урядом — від подушних податків до трудових повинностей селянства або данини місцевих чиновників — на єдиний срібний платіж на рівні, заснованому на населенні та оброблюваній землі в кожній префектурі, зменшуються зусилля, необхідні для збору податків, і наш дохід зросте."
  nine_garrisons_of_the_great_wall: "Дев'ять гарнізонів Великої стіни"
  nine_garrisons_of_the_great_wall_desc: "Щоб захиститися від лютих варварів, простого ремонту Великої стіни буде недостатньо. Дев'ять гарнізонів — це мілітаризовані гарнізонні міста вздовж Стіни, які не тільки допоможуть захистити важливі перевали, але й покращать загальну логістичну ситуацію на північному кордоні."
  the_red_cannon: "Червона гармата"
  the_red_cannon_desc: "Рудоволосі варвари з Європи, можливо, нецивілізовані та невиховані, але вони знають, як виготовляти якісну артилерію та вогнепальну зброю. Імпорт та дублювання їхньої зброї покращить нашу армію та зробить її набагато ефективнішою проти всіх загарбників."
  woodblock_printing: "Ксилографія"
  woodblock_printing_desc: "Виробництво елегантних ілюстрацій, творів мистецтва та книг за допомогою цього методу друку захопило увагу нашого народу, оскільки вони прагнуть удосконалити свою техніку. Ксилографія стала частиною нашої культури, і з нещодавніми вдосконаленнями, впровадження літературних творів лише підвищить наш престиж!"
  green_standard_army: "Армія Зеленого Прапора"
  green_standard_army_desc: "Армія Зеленого Прапора, військова сила, що складається переважно з етнічних ханьських солдатів, співіснує з нашими Вісьмома Прапорними арміями. Спочатку сформована з капітульованих військ, набраних на добровільній, довгостроковій основі, вона приваблює осіб із соціально незахищених верств населення. Використовувана як поліцейська сила після консолідації, вона відіграватиме вирішальну роль у місцевому військовому управлінні, тоді як Прапороносці будуть зарезервовані для надзвичайних ситуацій та тривалого опору."
  great_tax_reform: "Велика податкова реформа"
  great_tax_reform_desc: "Наша велика нація є домом для великої кількості монет та родючих полів. Оскільки ми бажаємо належним чином керувати нею, ми прагнутимемо застосувати нову форму оподаткування, яка дозволить мати здоровіший бюджет."
  junji_chu: "Цзюньцзі Чу"
  junji_chu_desc: "Також відома як Велика Рада, #italic Цзюньцзі Чу#! займається військовими справами. Будучи найвищою таємною радою, вона затьмарила Великий Секретаріат, встановлений попередніми династіями. Незважаючи на свою вирішальну роль, ця рада збереже неформальний характер у внутрішньому дворі, діючи поряд з іншими ролями, які виконують її члени."
  jingdezhen_porcelain: "Цзіндечженьська порцеляна"
  jingdezhen_porcelain_desc: "Ознака процвітаючого суспільства та зеніт мистецтва – це лише деякі з усталених аспектів нашого народу. Удосконалення виробництва порцеляни та впровадження нового, вищого сорту, що називається #italic Цзіндечжень#!, безумовно, розширить наш культурний вплив до нових меж."
  sanxitang: "Сансітан"
  sanxitang_desc: "Зала Трьох Рідкостей слугує нашим найціннішим сховищем рідкісних і цінних предметів, а також мистецтва. Завдяки щедрому покровительству нашого правителя, вона стала місцем академічних дискусій, лекцій та навіть культурних заходів, сприяючи інтелектуальному обміну та науковим пошукам."
  monuments_to_greatness: "Пам'ятники величі"
  monuments_to_greatness_desc: "Наша історія налічує тисячі років, і наш народ пережив великі катастрофи завдяки чистій завзятості. Визнана сила стала рисою нашого суспільства, наша стійкість демонструється в силі нашої армії та блиску нашого мистецтва."
  ten_great_campaigns: "Десять великих кампаній"
  ten_great_campaigns_desc: "Десять великих кампаній спрямовані на розширення нашого впливу як всередині, так і за межами наших кордонів. Для досягнення цього ми зберемо величезну армію, щоб розгромити опір, який може зустрітися на нашому шляху, а також змусимо повстання вмирати ще до того, як вони будуть задумані. Наша слава буде вічною."
  tributary_system: "Система данини"
  tributary_system_desc: "Система підкорених місцевих воєначальників і правителів, вони надсилають нам дари вірності як знак нашого верховенства. Удосконалення та централізація цієї системи лише посилить нашу владу над ними."
  timurid_cavalry: "$TIM_ADJ$ Кавалерія"
  timurid_cavalry_desc: "Як великий $genghis_khan_name_no_tooltip$ панував у степах силою своєї кавалерії, так і ми тріумфуватимемо силою наших коней. Виведені для найсуворіших воєн і осідлані найкраще навченими солдатами, наша кавалерія вселятиме страх у серця наших ворогів."
  timurid_architecture: "$TIM_ADJ$ Архітектура"
  timurid_architecture_desc: "Архітектура $persia_region$ була предметом заздрості відомого світу протягом століть. Ми повинні просувати новий тип архітектури, щоб ми могли зайняти це місце, оскільки це, безумовно, наше право за народженням."
  the_mantle_of_the_great_khan: "Мантія Великого $rank_kingdom_horde_ruler_suffix_male$"
  the_mantle_of_the_great_khan_desc: "Смерть $genghis_khan_name_no_tooltip$ створила вакуум влади, що призвів до того, що люди, які мали б знати краще, прагнули влади. Однак, через шлюби, ми зміцнили наше право на походження від самого Великого $rank_kingdom_horde_ruler_suffix_male$, і степові воїни знають, за ким слідувати."
  turco_persian_tradition: "Тюрко-перська традиція"
  turco_persian_tradition_desc: "Безперечно, що $persia_region$ завжди був центром культури та мови в регіоні, впливаючи на різні $turkic_group$ народи, що існували протягом століть. Ми будемо просувати це поєднання, щоб створити власну культурну традицію."
  tamerlane_chess: "Шахи Тамерлана"
  tamerlane_chess_desc: "Цей новий варіант шахів, винайдений нашим великим однойменним засновником, покращує попередні версії, і його використання дозволить нашим генералам покращити свою стратегію та тактику."
  chagatai_literature: "$karluk_language$ Література"
  chagatai_literature_desc: "$karluk_language$ мова східних степів набагато гідніша бути носієм думок та ідей нашого великого роду, ніж $persian_language$ чи $arabic_language$ коли-небудь могли б бути. Ми повинні просувати використання нашої прабатьківської мови та створити нову літературну традицію."
  nambardar_levy: "Намбардарський набір"
  nambardar_levy_desc: "$nambardar_levy$, або #italic черіг-і намбардар#!, стосується тих наших військ, які походять не з $mongolian_culture$ чи $turkic_group$ походження, а натомість складаються з місцевого $iranian_group$ населення. Завдяки їм наші армії можуть бути більшими, ніж були б інакше."
  timurid_renaissance: "$TIM_ADJ$ Відродження"
  timurid_renaissance_desc: "З часів початкової $TIM_ADJ$ експансії наші землі приваблювали найвидатніших майстрів та мудреців епохи. Завдяки постійному покровительству мистецтву, науці та літературі ми зробили міста $herat$ та $samarkand$ найяскравішими коштовностями світу."
  riches_of_the_silk_road: "Контроль над Шовковим шляхом"
  riches_of_the_silk_road_desc: "Доки наші купці контролюють торгівлю через землі $transoxiana_area$ та $samarkand$, торгівля Шовковим шляхом буде безперешкодною, а багатство нашої династії продовжуватиме зростати."
  reform_the_diwan: "Реформувати Диван"
  reform_the_diwan_desc: "Нам пощастило, що нам служать вірні та добре освічені $farsi_culture$ адміністратори, які вдосконалювали мистецтво управління протягом поколінь. На жаль, однак, спадкова посада з часом може застоятися та бракувати інновацій. Зменшуючи кількість успадкованих посад з кожним поколінням, ми можемо гарантувати, що ми винагороджуємо не лише вірність, а й здібності. Здібні адміністратори повинні підніматися на високі посади незалежно від того, з якої родини вони походять."
  conquerors_legacy: "Спадщина Завойовника"
  conquerors_legacy_desc: "Наша славетна імперія виникла зі спадщини великих завойовників. Саме лютість військ $genghis_khan_name_no_tooltip$ дозволила йому завоювати землі від $europe$ до $china$. Як його наступники, наші війська будуть такими ж грізними, як і ті, що були в його армії."
  glh_kipchak_khanate: "Кипчацький ханат"
  glh_kipchak_khanate_desc: "Наша велика країна також називається Кипчацьким ханатом, що править усіма територіями Кумано-Кипчацької конфедерації. З такими просторами землі під нашим командуванням, армії, які ми можемо зібрати, будуть незліченними."
  glh_legacy_of_jochi: "Спадщина Джучі"
  glh_legacy_of_jochi_desc: "Після $genghis_khan_name_no_tooltip$ його син Джучі помер незабаром. Однак його присутність і спадщина все ще відчуваються в нашій країні, до того, що ми все ще відомі як Улус Джучі. Воїни збираються під наші прапори, щоб підтримати цю спадщину."
  glh_legacy_of_the_golden_horde: "Спадщина Золотої Орди"
  glh_legacy_of_the_golden_horde_desc: "Світ тремтітиме перед нами! Ми були однією з головних складових імперії $genghis_khan_name_no_tooltip$, і ми представляємо головну політичну силу у Східній Європі та Степах."
  glh_perso_mongol_administration: "Персько-монгольська адміністрація"
  glh_perso_mongol_administration_desc: "Наші предки століттями вдосконалювали монгольську адміністративну систему, але не цуралися переймати ідеї та методи підкорених ними культур. Наша система управління частково ґрунтується на традиціях, що сягають часів самого Великого $genghis_khan_name_no_tooltip$, а частково на тому, що ми перейняли від перських та мусульманських бюрократів у завойованих землях."
  glh_tatar_traditions: "Татарські Традиції"
  glh_tatar_traditions_desc: "Хоча нашою імперією, можливо, вже не правлять з коня, наші армії все ще дуже сильно залежать від цього. Протягом століть ми залишалися вірними своєму походженню, гарантуючи, що мало хто може зрівнятися з майстерністю наших вершників. Рухаючись вперед і приймаючи нові технології та тактики за потреби, ми спираємося на міцну організацію та військові традиції Монгольської імперії."
  glh_secure_the_trade_routes: "Забезпечити Торгові Шляхи"
  glh_secure_the_trade_routes_desc: "Не всі багатства цього світу походять із земель під нашим правлінням. Торгівля є джерелом усього багатства, і Золота Орда завжди захищала купців. Забезпечуючи безпеку кожного, хто бажає перевозити товари через нашу країну, ми можемо забезпечити постійний потік хутра, китайських виробів, шовку, спецій та інших необхідних речей до наших міст. Незалежно від того, чи вирішать вони продавати свої товари нам, чи ні, їхня сама присутність принесе багатство нашому народу."
  glh_religious_pragmatism: "Релігійний Прагматизм"
  glh_religious_pragmatism_desc: "Обмежувальна та негнучка доктрина ніколи не змогла завоювати багато прихильників серед татарських орд. Коли Великий $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ прийняв іслам, це був іслам суфійського шейха або ревного каді, яких він запросив на свої землі. Століття традицій та вірності — ось на чому ми будуватимемо нашу державу. Релігія відіграє свою роль, але ми воліли б бачити нашу країну процвітаючою, ніж розпадаючоюся в боротьбі за забезпечення спільної віри для всіх."
  glh_modernization_of_steppes: "Модернізація Степу"
  glh_modernization_of_steppes_desc: "Давно вже армії $genghis_khan_name_no_tooltip$ панували в степах. Наша країна перевершила мрії наших предків, і тепер ми стоїмо як сила завдяки власним заслугам. Ми модернізуємо наші території, щоб стати маяком світу."
  cri_genghisid_legacy: "Чингізидська Спадщина"
  cri_genghisid_legacy_desc: "Наші пращури їздили з $genghis_khan_name_no_tooltip$, коли він спустошував відомий світ. Ми зберегли наші військові традиції живими і продовжуємо бути керованими ханами, які стверджують своє походження від чингізидської лінії."
  cri_slavers: "Рабовласники Степу"
  cri_slavers_desc: "На работоргівлі можна заробити цілий статок; нічого не підозрюючі християни, які потрапляють до наших рук, продаються за високу ціну на турецьких, арабських та перських ринках."
  cri_free_cattle_grazing: "Вільний Випас Худоби"
  cri_free_cattle_grazing_desc: "Ми не накладаємо жодних обмежень на скотарів щодо випасу їхніх великих табунів коней та худоби. Пастухи вільні займатися своїми справами, як їм заманеться, можуть безпечно перетинати степ і вільно торгувати."
  cri_steppe_commanders: "Степові Командири"
  cri_steppe_commanders_desc: "Кримські кавалерійські командири опанували мобільність степової війни, використовуючи швидкість, флангові маневри та засідки, щоб перевершити повільніші європейські армії."
  cri_devshirme_of_the_steppes: "Дефшірме Степу"
  cri_devshirme_of_the_steppes_desc: "Кримські еліти наслідували аспекти османських військово-адміністративних практик, поєднуючи тюркські та ісламські системи для управління людськими ресурсами та військовою ефективністю."
  chg_legacy_of_chagatai: "Спадщина Чагатая"
  chg_legacy_of_chagatai_desc: "Спадщина $genghis_khan_name_no_tooltip$ належить нам через його сина Чагатая. Усі тремтітимуть перед нами, коли ми повернемо його славу."
  chg_chagatai_riders: "Чагатайські Вершники"
  chg_chagatai_riders_desc: "Коні $genghis_khan_name_no_tooltip$ топтали всі території від Європи до Китаю. Як його спадкоємці та наступники, наша кавалерія вселить такий самий страх у наших ворогів."
  chg_the_mountain_khanate: "Гірський Ханат"
  chg_the_mountain_khanate_desc: "Ми розташовані під захистом між озером Балхаш та горами Тянь-Шань. Це сувора та невблаганна земля, яку наш народ може використати як зброю проти потенційних загарбників."
  chg_border_wars: "Безперервні прикордонні війни"
  chg_border_wars_desc: "Оточені народами, що протистоять нам, ми ведемо постійну боротьбу за збереження наших кордонів. Наші завжди пильні воїни мають безліч можливостей відточувати свої навички в бою, народжуючи загартований у битвах народ воїнів, готових відновити спадщину Великого $rank_kingdom_horde_ruler_suffix_male$."
  chg_sons_of_chagatai: "Сини Чагатая $rank_kingdom_horde_ruler_suffix_male$"
  chg_sons_of_chagatai_desc: "Ми можемо простежити наш рід до Чагатая $rank_kingdom_horde_ruler_suffix_male$, другого сина $genghis_khan_name_no_tooltip$, який колись правив цими землями і заснував могутню монгольську державу-наступницю. Хоча з того часу минуло багато часу, ми все ще можемо претендувати на значну легітимність, звертаючись до спадщини нашого предка."
  chg_tradition_of_conquest: "Традиція завоювань"
  chg_tradition_of_conquest_desc: "Завойовувати народи може бути складною справою, не кожен готовий до нашого просвітленого уряду. Проте ми виявили, що існують легші способи, ніж будувати гори черепів, щоб привести людей до нашої імперії. Це те, чого наші предки ніколи не навчилися."
  chg_scheming_court: "Інтриганський двір"
  chg_scheming_court_desc: "Постійна боротьба за владу між різними принцами, місцевими дворянами, містами та племенами в Чагатайському ханстві породила націю висококваліфікованих інтриганів. Якщо ми зможемо відкинути наші чвари та спрямувати цю енергію на перехитрювання наших ворогів, це стане великим благом для нашого народу."
  chg_glory_of_conquest: "Слава завоювань"
  chg_glory_of_conquest_desc: "Нехай буде відомо, що хлопчик не може стати чоловіком, доки він не проїхав вперше з нашим непереможним військом, що він не може взяти дружину, доки не взяв дружину іншого чоловіка, що він не гідний хатини, доки не спалив чужу. Нехай служба в наших арміях буде єдиним шляхом до мужності."
  chg_unrelenting_horde: "Невпинна Орда"
  chg_unrelenting_horde_desc: "Наші армії маршируватимуть, як великі орди $genghis_khan_name_no_tooltip$. Наші війська топтатимуть наших ворогів під своїми копитами, як травинки наших рідних степів. Усі боятимуться сили наших армій!"
  mge_pax_mongolica: "Pax Mongolica"
  mge_pax_mongolica_desc: "Об'єднавши всі монгольські території під нашим прапором, стабільність і процвітання, якими зможе насолоджуватися наш народ, не бачили з часів великого $genghis_khan_name_no_tooltip$."
  mge_all_under_a_khan: "Усі під $rank_kingdom_horde_ruler_suffix_male$"
  mge_all_under_a_khan_desc: "$genghis_khan_name_no_tooltip$ об'єднав величезні території під своїм прапором. Об'єднавши ми знову ці території під владою єдиного $rank_kingdom_horde_ruler_suffix_male$, усі люди в нашій імперії присягнуть на вірність нашим прапорам."
  mge_ghostly_horses_of_the_plain: "Примарні коні рівнини"
  mge_ghostly_horses_of_the_plain_desc: "Майстерність монгольських вершників відома в усьому світі. Наші вороги тремтітимуть від страху при вигляді хмари пилу вдалині, побоюючись, що це може означати наближення нашої кінноти!"
  mge_yeke_mongol_ulus: "Єке Монгол Улус"
  mge_yeke_mongol_ulus_desc: "Як справжні монголи, ми відновили #italic Єке Монгол Улус#!, Велику Монгольську Державу, повернувши славу великої імперії $genghis_khan_name_no_tooltip$. За найменшої нагоди наш народ прагнув би наслідувати подвиги Великого $rank_kingdom_horde_ruler_suffix_male$ і відновити його спадщину, возз'єднавши колись величезні території Монгольського ханства."
  mge_life_of_steppe_warrior: "Життя степового воїна"
  mge_life_of_steppe_warrior_desc: "Степ — це грізне і невблаганне місце для непідготовлених. Ми як народ звикли жити в найсуворіших умовах, і тому наш народ міцний і має хист до виживання. Ми забезпечимо, щоб усі наші солдати поділяли цей досвід і таким чином могли набагато краще виживати."
  mge_multicultural_empire: "Багатокультурна імперія"
  mge_multicultural_empire_desc: "Території під великою Монгольською імперією охоплюють багато різних земель і народів, усі об'єднані під славою великого $rank_kingdom_horde_ruler_suffix_male$."
  mge_improved_yam_system: "Покращена система ямів"
  mge_improved_yam_system_desc: "Система ямських станцій по всій нашій імперії забезпечувала чудовий зв'язок та логістику ще з часів великого $genghis_khan_name_no_tooltip$. Завдяки відновленню та вдосконаленню цієї системи наші посланці можуть долати величезні відстані нашої імперії з такою швидкістю, яка раніше навіть не вважалася можливою."
  mge_mongolian_mobility: "Монгольська мобільність"
  mge_mongolian_mobility_desc: "Кожен наш воїн зазвичай утримує 3 або 4 коні, що дозволяє йому міняти коня щоразу, коли його верховий кінь втомлюється, і таким чином подорожувати на високій швидкості днями без зупинки. Крім того, їхні запасні коні забезпечують їх запасами їжі через кобиляче молоко, а також конину, що робить наші армії набагато менш вразливими до голоду, ніж армії інших, так званих цивілізованих націй. Це дозволяє нам з легкістю перехитрити наших ворогів, долаючи приголомшливу кількість території за коротші періоди, ніж вони вважали можливим."
  mge_kheshig: "Кешиг"
  mge_kheshig_desc: "Кешиг колись формував грізну охорону Великого Монгольського $rank_kingdom_horde_ruler_suffix_male$. Їхні нащадки продовжуватимуть захищати $rank_kingdom_horde_ruler_suffix_male$ Монголії, коли вони вирушатимуть у битву проти ворогів свого народу!"
  mge_glory_of_the_khan: "Слава $rank_kingdom_horde_ruler_suffix_male$"
  mge_glory_of_the_khan_desc: "Великий $genghis_khan_name_no_tooltip$ зібрав під собою величезне військо, якого ніколи раніше не бачили. Ми є спадкоємцями його слави, і наша армія навіть перевершить великі монгольські орди минулого."
  horse_lords: "Кінні володарі степів"
  horse_lords_desc: "Єдиний справжній звір – це людська природа. Коні народжувалися і вирощувалися серед наших дітей, і вони навчилися бути такими ж шляхетними та лютими, як і наш власний народ. Ми визнаємо їхнє суворе приборкання нашою найбільшою гордістю, а вони визнають нас своїми найбільшими володарями."
  kurultai_advance: "Курултай"
  kurultai_advance_desc: "Зібравши всіх ватажків з кожного загону воїнів, ми можемо обрати $rank_empire_horde_ruler_suffix_male$, який поведе наші орди до Перемоги. Під шатром буде вирішена доля нашого народу, і лідери будуть обрані серед тих кандидатів, які вважають себе гідними вести нас."
  beyond_the_sun: "За Сонцем"
  beyond_the_sun_desc: "Епоха Великих Орд ще не закінчилася. Ми навчилися на помилках наших ворогів і тепер повстанемо мудрішими та сильнішими. Вся земля, де сонце живе і вмирає, повинна бути нашою."
  steppe_slave_raiding: "Степові рейди за рабами"
  steppe_slave_raiding_desc: "Наші рейдові загони рухаються швидко, як вітер, завдаючи ударів і відступаючи майже до того, як хтось усвідомить нашу присутність. Пограбування поселень, на які ми нападаємо, — не єдиний спосіб заробити великі гроші, ми також можемо захоплювати полонених, яких можна продати за хороші гроші."
  caravanserai_advance: "$caravanserai$"
  caravanserai_advance_desc: "Торгові шляхи виникли в Центральній Азії протягом останнього тисячоліття, створивши мережу, відому як Шовковий шлях. Ключовим для цього було процвітання $caravanserai$, місць, де купці та їхні каравани могли зупинятися та відпочивати по дорозі."
  borjigin_blood: "Кров $Borjigin$"
  borjigin_blood_desc: "Ми розділяємо кров $Borjigin$, самого $genghis_khan_name_no_tooltip$. Усі країни схиляться перед нашою спадщиною, і всі території степів визнають нас своїми."
  turco_mongol_tradition: "Тюрко-монгольська традиція"
  turco_mongol_tradition_desc: "Хоча династія $Borjigin$ походить з $mongolian_culture$ походження, території, завойовані $genghis_khan_name_no_tooltip$ у $central_asia$, були переважно $turkic_group$ населення. В результаті виникло чітке поєднання культур між цими двома групами."
  yams_of_the_great_khan: "Ями Великого $rank_kingdom_horde_ruler_suffix_male$"
  yams_of_the_great_khan_desc: "Щоб посланці могли подорожувати достатньо швидко, щоб не відставати від монгольських армій, $genghis_khan_name_no_tooltip$ запровадив систему релейних станцій або «ямів», які були розташовані кожні 30-60 км, щоб забезпечувати їжею, притулком та запасними кіньми монгольських армійських посланців. Це дозволяло повідомленням подорожувати так швидко, як може скакати кінь, при цьому втома більше не сповільнювала швидкість, з якою міг подорожувати посланець. Завдяки цьому наша імперія змогла подолати логістичні проблеми, спричинені величезними масштабами Pax Mongolica – принаймні тимчасово."
  mandate_of_the_khan: "Мандат $rank_kingdom_horde_ruler_suffix_male$"
  mandate_of_the_khan_desc: "Як наказує $rank_kingdom_horde_ruler_suffix_male$, так і боги чинять. Єдність нашого народу походить від вірності нашому великому лідеру. Лише людина, здатна підкорити волю тих, хто схиляється перед короною, гідна нашої відданості."
  there_shall_be_no_grass: "Там, де не ростиме трава"
  there_shall_be_no_grass_desc: "Там, де пройшла наша орда, трава більше ніколи не виросте, земля більше не годуватиме наших ворогів, минатимуть день і ніч, а земля залишатиметься мовчазною, без врожаю. Деяких голодів не уникнути."
  slavery_before_death: "Рабство перед смертю"
  slavery_before_death_desc: "Руйнування міст є частиною війни. У минулому наші воїни лютували, знищуючи та грабуючи все, що могли знайти, і вбиваючи тих, хто стояв на їхньому шляху. Хоча це зміцнювало їхній бойовий дух, їхні дії були далекі від економічності. Завдяки цьому новому підходу ми можемо принаймні поневолити тих, хто здатен працювати, замість того, щоб сліпо обезголовлювати їх для трону черепів."
  horde_loyalty: "Лояльність Орди"
  horde_loyalty_desc: "Відданість нашого народу беззаперечна. Жодна душа, яка жила під процвітаючим правлінням $rank_kingdom_horde_ruler_suffix_male$, не подумала б про те, щоб коли-небудь залишити його."
  horde_loot_discovery_advance: "Прибутки від набігів"
  horde_loot_discovery_advance_desc: "Набіги завжди були частиною нашої ідентичності. Грабунки та розбій – це те, як наш народ отримує як свою підготовку, так і значну частину свого багатства. Немає шкоди в подальшому розпалюванні набігів, принаймні для нас."
  trampling_horde: "Орда, що топче"
  trampling_horde_desc: "$genghis_khan_name_no_tooltip$ змусив світ тремтіти від своїх завоювань, ми зробимо те саме. Світ навчиться боятися галопу наших коней."
  watchers_of_the_silk_road: "Вартові Шовкового шляху"
  watchers_of_the_silk_road_desc: "Ми не будуємо, ми не торгуємо. Ми беремо те, що нам потрібно... а іноді й більше. Наші воїни уважно стежили за іноземними купцями та їхніми техніками, і тепер ми знаємо найбезпечніші шляхи для транспортування наших товарів."
  logistics_of_khan: "Логістика $rank_kingdom_horde_ruler_suffix_male$"
  logistics_of_khan_desc: "Люди забувають, що завоювання Великого $rank_kingdom_horde_ruler_suffix_male$ були зумовлені як вищою логістикою, так і вищою військовою силою. Ми повинні наслідувати техніки Великого $rank_kingdom_horde_ruler_suffix_male$, адаптуючи їх до сучасності. Це дасть нам більший простір для завоювань."
  populating_the_steppes: "Заселення степів"
  populating_the_steppes_desc: "Так само, як ми несемо руйнування нашим ворогам, ми повинні принести мир багатьом, хто проживає в наших кордонах. Підтримуючи внутрішній мир та заохочуючи талановитих чоловіків і жінок з усієї нашої імперії планувати та заселяти нові та великі міста, ми приборкаємо степи."
  a_magnanimous_empire: "Велика Імперія"
  a_magnanimous_empire_desc: "Процвітаюче правління Великого $rank_kingdom_horde_ruler_suffix_male$ було відоме не лише його грізним мечем, але й його винятковою побожністю до тих, хто мудро схиляв перед ним коліна. Ті, хто вітає нашу толерантну імперію, будуть розглядатися як її частина."
  horde_ardor: "Ординський запал"
  horde_ardor_desc: "Наші коні майже такі ж люті та жахливі для наших ворогів, як і їхні вершники. Вид нашої кавалерії, що йде на війну, схожий на нестримну силу демонів з пекла."
  ira_sasanian_heritage: "Сасанідська спадщина"
  ira_sasanian_heritage_desc: "До ісламського завоювання $persia_region$ регіон колись був домом для Сасанідської імперії, царства, яке колись панувало від Кавказу на заході до хребта Кіртхар на сході. Багато її великих культурних досягнень сформували перську художню творчість та культурну ідентичність."
  ira_islamized_persia: "Перський іслам"
  ira_islamized_persia_desc: "Ісламізація Персії була тривалим процесом, ще не повністю завершеним, але все ще є одним з головних стовпів її ідентичності. Багато наших стародавніх традицій були поєднані з вченнями ісламу і тепер складають наші поточні основні цінності."
  ira_shahnameh: "$shahnameh$"
  ira_shahnameh_desc: "The #italic $shahnameh$#! — Книга Царів — це епічна поема та національний епос $farsi_culture$ народу. Описуючи історичне та міфічне минуле імперій, що існували у Великій $persia_region$, її історії роблять внесок у $farsi_culture$ культуру в незліченних вимірах."
  ira_restoration_of_cities: "Відновлення Міст"
  ira_restoration_of_cities_desc: "Монгольське вторгнення до Персії між 1219 та 1221 роками стало катастрофою для всього регіону. Населені пункти величезних розмірів були перетворені на руїни. Настав час відбудувати те, що було зруйновано, та відновити величні метрополії Персії."
  ira_improved_silk_road: "Покращити Шовковий Шлях"
  ira_improved_silk_road_desc: "Система покращень доріг та мостів, система охорони доріг (за невеликий податок) та мережа караван-сараїв для відпочинку. Усе це допомагає купцям, коли вони подорожують Шовковим Шляхом, а також забезпечує збільшення доходів для держави."
  ira_promotion_of_irrigation: "Сприяння Іригації"
  ira_promotion_of_irrigation_desc: "Як наслідок минулого Монгольського вторгнення, Перський регіон є досить знелюдненим порівняно з минулими імперіями, які вважали ці землі своїм домом. Сприяння іригації має покращити необхідне сільське господарство, щоб підтримати новий приріст населення для відновлення після минулих втрат."
  ira_persian_horses: "Перські Коні"
  ira_persian_horses_desc: "Коні відіграють фундаментальну роль у нашому суспільстві. Багато наших людей виростають поруч зі своїми кіньми, що відображається як у турботі конярів, так і у відмінній витривалості нашої кавалерії."
  ira_spread_of_persian_influence: "Перський Вплив"
  ira_spread_of_persian_influence_desc: "Перська — це стародавня мова з історією, довшою за тривалість життя багатьох імперій разом узятих. Навіть мусульманське завоювання не змогло зменшити основи перської ідентичності, і багато інших держав намагаються наслідувати нашу культуру."
  ira_persian_rug_production: "Виробництво Перських Килимів"
  ira_persian_rug_production_desc: "Персія здавна славилася своїм виробництвом килимів та паласів. Однак, коли монголи пронеслися нашими землями, відбулися великі руйнування та спустошення. Щоб Персія відновилася, ми також повинні відновити нашу економічну силу. Настав час заохотити відродження наших давніх переваг."
  ira_safaviyya_order_hall: "$safaviyya_order_hall$"
  ira_safaviyya_order_hall_desc: "$safaviyya_order_hall_desc$"
  ira_the_qizilbash: "The $qizilbash$"
  ira_the_qizilbash_desc: "The #italic $qizilbash$#! — Червоноголові — це шиїтський військовий рух, заснований POSTEDIT_Сафавією. Керовані своїми релігійними переконаннями та глибокими зв'язками з суфізмом, ці воїни готові підтримати нашу державу і могли б сформувати ядро нашої армії."
  ira_the_qurchi: "The Qurchi"
  ira_the_qurchi_desc: "Хоча $qizilbash$ є основою перської армії, #italic Qurchi#! є королівською охороною, набраною з $qizilbash$. Замість землі, ці солдати отримують платню з королівської скарбниці."
  ira_religious_state: "Релігійна Держава"
  ira_religious_state_desc: "Незалежно від віри нашої держави, Персія завжди буде за своєю суттю релігійною країною. Кожен аспект нашого життя керується релігійними принципами, і навіть сама держава діє з нашими основними переконаннями як приклад моралі та справедливості."
  ira_the_ghilman: "The $a_ghilman$"
  ira_the_ghilman_desc: "$a_ghilman$ — це підрозділ військових рабів кавказького походження. Зазвичай колишні християни, $a_ghilman$ проходять сувору військову підготовку і добре володіють вогнепальною зброєю, що робить їх важливою частиною державної армії. Вони слугують противагою іншим впливовим гілкам армії."
  ira_encouraged_art: "Заохочувати Мистецтво"
  ira_encouraged_art_desc: "Мистецтво Персії користується великим попитом. Колекціонери мистецтва зблизька та здалеку подорожують до нашої землі, щоб придбати деякі з наших найкращих художніх творінь. Ми повинні підтримувати цю торгівлю та підтримувати митців-початківців."
  ira_nazir: "Придворний Назір"
  ira_nazir_desc: "Назіри, або наглядачі, є адміністраторами наших територій і представляють очі та вуха Шаханшаха. Усі дії двору контролюються Назірами, а члени двору підвищуються за їхнім наказом. Навіть Великий Візир мусить працювати у співпраці з Назірами."
  ira_the_tofangchi: "$a_tofangchi$"
  ira_the_tofangchi_desc: "$a_tofangchi$ — це мушкетери імперії. Хоча вогнепальна зброя використовувалася й раніше, її присутність була вкрай нерегулярною, оскільки багато перських військових віддають перевагу традиційній зброї — луку та стрілам. Полк $a_tofangchi$ має на меті змінити це, оскільки вони навчені використанню сучасної зброї."
  ira_the_tupchi: "$a_tupchi$"
  ira_the_tupchi_desc: "$a_tupchi_desc$"
  ira_religious_unity_policy: "Політика релігійної єдності"
  ira_religious_unity_policy_desc: "Час великих релігійних розколів добіг кінця. У цю сучасну епоху іслам більше не може дозволити собі продовжувати внутрішні чвари. Ми будемо виступати за політику внутрішньої та зовнішньої релігійної єдності та примиримося з тими, кого ми раніше вважали єретиками."
  ira_afsharid_navy: "Берегова оборона Перської затоки"
  ira_afsharid_navy_desc: "Хоча наші землі переважно розташовані в горах і нагір'ях Загросу, Перська держава має й власні прибережні володіння. Хоча минулі династії, можливо, приділяли мало уваги морському захисту імперії, наш народ не забуває про море, і наші моряки прагнуть захищати наші береги."
  ira_jazayerchi: "Піхотний корпус $a_jazayerchi$"
  ira_jazayerchi_desc: "$a_jazayerchi_desc$"
  uc_bey_advance: "$uc_bey$"
  uc_bey_advance_desc: "$uc_bey_desc$"
  seljuk_roots: "Сельджуцьке коріння"
  seljuk_roots_desc: "Ми маємо ворогів з усіх боків, що робить сильну армію необхідністю для такої держави, як наша. На щастя, ми не слабкий народ. Від нерегулярних Ґузатів та рейдерів Акинджилар до Сіпахів Османської імперії, світ пізнав військову міць турецького народу. Збудуймо армію для Імперії, черпаючи натхнення з наших славетних традицій та історії, вдосконалюючи нашу міць крізь віки."
  heirs_of_rum: "Спадкоємці Руму"
  heirs_of_rum_desc: "Після бурхливого періоду та боротьби за подолання наших сусідніх бейліків настав час для нас взяти на себе мантію відновлення кордонів колись великого Султанату Руму."
  splendor_of_anatolia: "Пишність Анатолії"
  splendor_of_anatolia_desc: "Наш регіон є домом для одних з найвражаючих медресе та мечетей у всьому ісламському світі. З увагою до деталей та надзвичайним талантом, наша мистецька майстерність не має собі рівних."
  persian_in_the_court: "Перська мова при дворі"
  persian_in_the_court_desc: "Походячи з наших коренів, значна частина нашої адміністрації досить довго покладалася на перську мову. У поєднанні з культурним розмаїттям регіону це призвело до нової співпраці, що долає бар'єри."
  akinji_cavalry: "Акинджилар"
  akinji_cavalry_desc: "Наша легка кавалерія часто здійснювала набіги на сусідні землі, а іноді навіть заселяла їх. Історично вони були одними з перших підрозділів, що зустрічали ворожі війська, і атакували торгові шляхи, щоб перерізати постачання та транспорт ворога. Відомі своєю хоробрістю в бою, вони жили та діяли як рейдери на кордонах."
  crossroads_of_commerce: "Перехрестя торгівлі"
  crossroads_of_commerce_desc: "Наші караван-сараї підтримують потік торгівлі, інформації та людей з Китаю до Європи через наші землі. Монета та достаток, що проходять через наші землі, є надзвичайно прибутковою справою."
  fratricide_succesion_advance: "$fratricide_succesion$"
  fratricide_succesion_advance_desc: "$fratricide_succesion_desc$"
  flexible_loyalty: "Гнучка Вірність"
  flexible_loyalty_desc: "Наша країна лежить на перехресті між різними релігіями Європи та багатьма силами, що могли б загрожувати нашому народу. Лише з гнучким ставленням до співпраці з різними найманськими загонами регіону ми можемо забезпечити наше виживання."
  heritage_of_the_rus: "Спадщина Русі"
  heritage_of_the_rus_desc: "Землі Русі розкололися на кілька держав, але пам'ять про колись велику державу, керовану з Києва, залишається сильною в наших умах. Якщо ми так само наслідуватимемо стиль давніх правителів і підкреслимо наш зв'язок з ними, ми створимо міцну традицію для нашого народу."
  mother_of_russian_cities: "Мати Руських Держав"
  mother_of_russian_cities_desc: "Київ колись був сяючою столицею великої держави, що простягалася від північних лісів Новгорода до південних берегів Чорного моря. Після страждань від розпаду Русі та вторгнень монголів, мало що від неї залишилося. Незалежно від того, що витримають наші міста, ми забезпечимо їхнє відновлення та процвітання на століття вперед."
  international_influences: "Іноземні Впливи"
  international_influences_desc: "Багато іноземних купців та мандрівників часто відвідують наші шляхи, приносячи процвітання та багатство нашим землям. Ми могли б переконати деяких з них оселитися назавжди в наших містах та містечках, якщо ми надамо захист їхній вірі."
  reuniting_rus: "Возз'єднання Русі"
  reuniting_rus_desc: "Ми є справжнім спадкоємцем Київської Русі, і землі мають бути возз'єднані під нашим стягом!"
  united_faith: "Єдина Віра"
  united_faith_desc: "Незалежно від нашого становища, ми повинні забезпечити єдність нашої віри. Лише якщо наше духовенство буде єдиним і не буде розбрату між фракціями вірних, вони зможуть зосередитися на своїх основних функціях: керувати та забезпечувати наше населення."
  east_and_west: "Схід і Захід"
  east_and_west_desc: "Наше географічне розташування між державами сходу та заходу надало нашим купцям можливість бути посередниками на надзвичайно прибуткових торговельних шляхах регіону."
  ruthenian_state_advance: "Руська Держава"
  ruthenian_state_advance_desc: "У минулому ми схилялися перед іноземними впливами і мусили пристосовуватися до звичаїв інших, щоб забезпечити дружні стосунки. Але зі зміною часів ми повинні будемо утвердити власні звичаї, щоб не ризикувати знову потрапити у сферу інтересів інших."
  ruthenian_rural_buildings: "Руські Села"
  ruthenian_rural_buildings_desc: "Русь є великою та сільською землею. І хоча наші великі міста, такі як Київ, служать важливій меті, ми не можемо нехтувати віддаленими землями малих сіл, які забезпечують нашу економіку життєво важливими запасами продовольства та сировини."
  ruthenia_commoner_education: "Освіта Для Всіх Русинів"
  ruthenia_commoner_education_desc: "Заснувавши місцеві школи, ми забезпечимо, що наше населення буде добре освіченим у всіх соціальних станах."
  cossack_raids: "Козацькі Набіги"
  cossack_raids_desc: "Наші козаки — це люди, що живуть у майже постійному стані війни, і перейняли тактику набігів та грабунків, подібну до тактики орд. Хоча це, безперечно, не принесе їм багато друзів, це певний спосіб ще більше збагатити нашу скарбницю."
  tamed_steppes: "Освоєні степи"
  tamed_steppes_desc: "Хоча більшість людей вважали б степи негостинною та неприбутковою землею, наші козаки пристосувалися до таких суворих умов і здатні не лише виживати, а й процвітати. Завдяки їм ми можемо експлуатувати ці землі та отримувати з них вигоду."
  cossacks_recruitment: "Набір козаків"
  cossacks_recruitment_desc: "Козаки — грізні воїни, і їхнє вміння виживати в суворих землях степів майже неперевершене. У нашій державі та армії вони можуть знайти місце як елітна сила, що забезпечить наше верховенство над степами."
  cossacks_escaped_serfs: "Втікачі-кріпаки"
  cossacks_escaped_serfs_desc: "Багато хто серед козаків народився в кріпацтві. Втомившись від феодального гніту, вони втекли від своїх панів і шукали вільного життя в степах. Ми повинні продовжувати приймати втікачів-кріпаків у наше суспільство."
  cossacks_hetmanate: "Козацький Гетьманат"
  cossacks_hetmanate_desc: "Серед козаків немає королів чи ханів. Їх очолює отаман, який є їхнім найвищим військовим командиром, але в питаннях держави та суспільства просто перший серед рівних. Політична влада належить Раді, законодавчим та військовим зборам, в яких усі козаки можуть висловити свою думку."
  cossack_administration: "Козацька адміністрація"
  cossack_administration_desc: "Надаючи нашим козацьким лідерам подвійну роль генералів та адміністраторів, ми зможемо оптимізувати набір людей до нашої армії та забезпечити високий стандарт їхньої підготовки."
  steppe_riders: "Степові вершники"
  steppe_riders_desc: "Степ — своєрідне та підступне місце для життя, а коли справа доходить до смерті, вибір нескінченний, якщо ти без коня. Коли ти входиш у Безкрає море трави, твій кінь перестає бути твариною чи власністю і справді стає частиною тебе. Так само як твоє тіло не може вижити без серця чи печінки, у степах воно точно не виживе без коня."
  cossacks_exploration_advance: "Козацькі дослідження"
  cossacks_exploration_advance_desc: "Наші козаки живуть на кордонах нашої країни. Це робить їх чудовими кандидатами для служби розвідниками та виходу за наші кордони до останнього рубежу, щоб досліджувати дивні нові землі, шукати нові країни та нові цивілізації, сміливо йти туди, куди ще ніхто не ступав."
  cossacks_military_society: "Військове суспільство"
  cossacks_military_society_desc: "Серед козаків майже немає поділу між цивільним та військовим суспільством. Вони — Військо, визначене своїм народом, а не землею, яку вони контролюють, і їхній народ — воїни. Ми повинні забезпечити, щоб військові підрозділи належним чином відповідали нашим адміністративним потребам у міру розширення Війська."
  cossacks_serf_autonomy: "Козацька автономія кріпаків"
  cossacks_serf_autonomy_desc: "Жодна людина не повинна страждати від тиранії серед козаків. Коли ми завойовуємо нові території, тамтешні кріпаки, селяни та раби можуть бути прирівняні до наших власних козаків."
  cossacks_colonization_advance: "Козацька колонізація"
  cossacks_colonization_advance_desc: "Наші козаки вже звикли вільно мандрувати та виходити за наші кордони. Ми можемо використовувати їх для просування подальших поселень і таким чином розширювати наш вплив на ці незаймані землі."
  cossacks_registered: "Козацькі реєстри"
  cossacks_registered_desc: "У міру зростання лав наших козаків ми повинні вести облік сили кожного полку, їхньої чисельності та наскільки добре вони забезпечені. Централізований реєстр дозволить нам підтримувати потреби всіх козаків."
  cossack_reputation: "Козацька репутація"
  cossack_reputation_desc: "Наші козаки вже здобули собі репутацію грізних воїнів. Цього самого по собі достатньо, щоб вселити страх у серця наших ворогів, коли їм доведеться зіткнутися з ними в бою."
  geo_georgian_highlands: "$GEO_ADJ$ Нагір'я"
  geo_georgian_highlands_desc: "Землі $GEO$ розташовані серед Кавказьких гір, і жодній іноземній державі ніколи не було легко проникнути на наші землі. Наша завзятість і стійкість є легендарними."
  geo_georgian_script: "$georgian_culture$ Письмо"
  geo_georgian_script_desc: "$georgian_culture$ абетка, створена століття тому, — це не просто одна абетка, а фактично три. Мхедрулі використовується цивільною адміністрацією, тоді як Асомтаврулі та Нусхурі — нашою Церквою. Таким чином, наші Святі Письма можуть залишатися непідвладними світській мові, тоді як наш народ все ще може відчувати зв'язок з ними."
  geo_georgian_isolation: "$GEO_ADJ$ Ізоляція"
  geo_georgian_isolation_desc: "Оточені могутніми країнами різної релігії та культури, ми змушені використовувати опортуністичну дипломатію та часто змінювати вірність, щоб задобрити всіх і зберегти мир якомога довше."
  geo_legacy_of_saint_nino: "Спадщина Святої Ніно"
  geo_legacy_of_saint_nino_desc: "$GEO$ має одну з найстаріших християнських церков у світі, що сягає корінням християнізації регіону Святою Ніно понад тисячоліття тому. Протягом століть $GEO_ADJ$ Церква служила дедалі більшою об'єднуючою силою в усій $GEO_ADJ$ державі, і вона була центральним елементом $GEO_ADJ$ культури, перед обличчям як $BYZ_ADJ$, так і монгольського чи мусульманського впливу. З невеликою кількістю інших християнських королівств, що залишилися в цьому регіоні, та з роздробленою вірністю всередині $GEO$, Церква все ще відіграє важливу роль як об'єднуюча сила проти чужинців."
  geo_restoration_of_fortresses_and_churches: "Відновлення фортець та церков"
  geo_restoration_of_fortresses_and_churches_desc: "Наші численні фортеці та церкви дозволили нашій країні чинити опір і продовжувати виживати серед багатьох іноземних впливів. Наші фортеці захищають наші землі, а наші церкви захищають наш дух. Ми повинні підтримувати їх у відмінному стані, якщо хочемо досягти успіху."
  geo_sadrosho_districts: "Райони Садрошо"
  geo_sadrosho_districts_desc: "Садрошо (прапори) — це спеціальні військові округи, що використовуються для мобілізаційних цілей. Розділивши нашу територію на кілька Садрошо, кожне під командуванням свого військового чиновника, ми можемо краще організувати набір та розподіл військ для всієї нашої армії."
  geo_dasturlamali: "Дастурламалі"
  geo_dasturlamali_desc: "$GEO$ пережила бурхливі часи протягом останніх століть після монгольської навали. Часом розділена, зі зростаючим впливом місцевих дворян та мінливим зовнішнім тиском, стара $GEO_ADJ$ феодальна система де-факто стала застарілою в деяких аспектах, або принаймні частково відкинутою. $geo_dasturlamali$, ґрунтовна праця правил, настанов та положень, що деталізує обов'язки підданих та дворян перед королем та державою, служить основою для правових органів нашого королівства та покращує внутрішній порядок."
  geo_georgian_embassies: "$GEO_ADJ$ Посольства"
  geo_georgian_embassies_desc: "Ми маємо традицію встановлювати часті та міцні дипломатичні зв'язки з усіма навколишніми народами, незалежно від наших можливих розбіжностей. Таким чином, наших дипломатів завжди добре приймають та поважають."
  geo_georgian_unification: "$GEO_ADJ$ Об'єднання"
  geo_georgian_unification_desc: "$GEO$ у минулому бачила себе розділеною, як через іноземні впливи, так і через внутрішні причини. Але наш гордий $GEO_ADJ$ народ більш ніж готовий боротися, щоб $GEO$ ніколи більше не була розділена."
  geo_legacy_of_saint_george: "Спадщина Святого Георгія"
  geo_legacy_of_saint_george_desc: "Наш зв'язок з легендарним Святим Георгієм добре відомий як у християнському, так і в мусульманському світі. Як він хоробро зустрів і вбив страшного дракона, так і наші воїни зустрінуть наших ворогів у битві."
  geo_bagrationi_dynasty: "POSTEDIT_Багратіоні Династія"
  geo_bagrationi_dynasty_desc: "Династія настільки давня, що її походження оповите таємницею, королі та королеви дому POSTEDIT_Багратіоні правили $GEO$ з IX століття, спочатку як її князі, а потім як монархи."
  geo_georgian_golden_age: "$GEO_ADJ$ Золотий Вік"
  geo_georgian_golden_age_desc: "$GEO$ насолоджувалася культурним та релігійним Золотим Віком, який раптово обірвався через монгольські вторгнення. Той період дав нам найкращі приклади культурних досягнень нашої нації, і тепер ми відродимо його і навіть досягнемо більших висот."
  geo_legacy_of_tamar: "Спадщина Тамар"
  geo_legacy_of_tamar_desc: "Тамар була однією з найвеличніших правительок, які коли-небудь були у нашої нації. Її військові та культурні успіхи стали легендарними, і згадка її імені досі викликає благоговіння в усіх $georgian_culture$ серцях."
  geo_david_the_builder: "Давид Будівельник"
  geo_david_the_builder_desc: "Донині вважається найвеличнішим правителем в історії нашої країни, цар Давид Будівельник підніс $GEO$ до найбільших висот. Він збудував її як могутнє, культурно впливове королівство та маяк для християнства та $georgian_culture$ народу."
  geo_georgian_titles: "$GEO_ADJ$ Титули"
  geo_georgian_titles_desc: "«Цар царів, сильний і непереможний, величний і захисник святого царства абхазів, іберів, ранів, кахетинців, вірмен, шаханшах і ширваншах, Сходу і Заходу, Півдня і Півночі, обох країн, двох престолів і корон, богоподібний Сюзерен і Суверен престолу». Титулів нашого правителя багато, і всі при дворі повинні їх поважати."
  geo_georgian_numismatics: "$GEO_ADJ$ Нумізматика"
  geo_georgian_numismatics_desc: "Наша країна має велику традицію карбування монет, на яких написи робляться не лише $georgian_language$, а й $arabic_language$ та $persian_language$, оскільки вони слугують лінгва франка для торгівлі через нашу країну та наших сусідів."
  geo_beacon_of_christianity: "Маяк християнства"
  geo_beacon_of_christianity_desc: "$GEO$ століттями був символом християнства на Кавказі, навіть після того, як його оточили та ізолювали послідовники ісламу. Палка віра нашого народу є джерелом натхнення для всіх наших братів."
  geo_georgian_principalities: "$GEO_ADJ$ Князівства"
  geo_georgian_principalities_desc: "Адміністрація нашої території поділена на багато різних князівств і територій. Ця делегація повноважень дозволяє нам ефективніше здійснювати наше правління."
  geo_georgian_resilience: "$GEO_ADJ$ Стійкість"
  geo_georgian_resilience_desc: "Наша країна не раз у своїй довгій історії бачила себе розірваною на частини, як зовнішніми, так і внутрішніми впливами. Однак, як фенікс, що повстає, вона постійно поверталася з попелу і утверджувалася як сила, з якою потрібно рахуватися. Стійкість нашого народу заслуговує на похвалу."
  sme_jaqeli_dynasty: "Династія $Jaqeli$"
  sme_jaqeli_dynasty_desc: "Незважаючи на скромне походження, династія $Jaqeli$ змогла встановити багато успішних контактів, пов'язавши себе з королями та імператорами навколо нас. Таким чином, наше становище в дипломатичній сфері позитивно оцінюється."
  sme_atabegs_of_samtskhe: "Атабеги $SME$"
  sme_atabegs_of_samtskhe_desc: "Ми не просто частина Королівства $GEO$, оскільки давно отримали королівське визнання і, разом з ним, титул Атабега. Такий титул раніше надавався лише вірменським васалам, і це є ознакою відзнаки та поваги, яку $GEO_ADJ$ монарх має до нас."
  sme_proactive_diplomacy: "Проактивна дипломатія"
  sme_proactive_diplomacy_desc: "Будучи частиною $GEO$, $SME$ була значною мірою незалежною у своїй адміністрації та діях. Це вимагало постійної обізнаності про політику в $GEO$, а також дуже активної дипломатії з більшими імперіями, з якими ми межували. Наші правителі завжди дбали про те, щоб ми мали прямий канал з тими, хто має найбільшу владу. Так само ми, за необхідності, брали активну участь у внутрішній політиці королівства $GEO$, як втручаючись у боротьбу за спадщину, так і об'єднуючись з королівською династією, коли це нам вигідно. Ми добре зробимо, якщо підтримаємо цю традицію, бо від неї залежить майбутнє нашої маленької держави. Нехай ніколи не скажуть, що ми зробили занадто мало або діяли без достатньої розвідки."
  sme_fortresses_of_samtskhe: "Фортеці $SME$"
  sme_fortresses_of_samtskhe_desc: "Наша країна — це гірське прикордоння, яке багато разів слугувало фронтом проти іноземних загарбників $GEO$. З цієї причини ми навчилися будувати міцні фортеці та бути готовими до тривалої оборонної війни. Ця спадщина є тією, яку ми повинні будь-якою ціною підтримувати, фортеці $SME$ повинні бути добре доглянуті, укомплектовані та забезпечені, оскільки іноземні загарбники — це не можливість, а впевненість."
  sme_independent_ambitions: "Незалежні амбіції"
  sme_independent_ambitions_desc: "Будь то мусульмани чи християни, $georgian_culture$, $turkic_group$ чи $iranian_group$, $SME$ часто доводилося підкорятися іноземним королям і султанам. Щоб створити стійку державу та економіку, нам потрібно побудувати власні інституції, які проіснують незалежно від того, хто бажає наших земель у даний момент. Давайте випускати власні монети та закони, а також підтримувати власних теологів та письменників."
  sme_protect_trade_routes: "Захист торгових шляхів"
  sme_protect_trade_routes_desc: "Наше розташування на перехресті $georgia_area$, $anatolia_region$, $armenia_area$ та $azerbaijan_area$ також означає, що велика кількість торговців прагне перетнути наші землі. Однак постійні набіги кочових племен означають, що багато хто тепер сумнівається у безпеці наших доріг. Ми повинні належним чином захищати всі дороги та купецькі заїжджі двори на наших землях, забезпечуючи безперешкодний потік торгівлі до нашої держави."
  sme_frontier_warriors: "Прикордонні воїни"
  sme_frontier_warriors_desc: "Кавказ вже довгий час формувався кочовими імператорами, а пасовища $SME$ привабили багатьох племен до осідання на наших землях. Ми не повинні дозволити цьому зруйнувати стабільність нашого королівства, а натомість укласти угоди з племенами, щоб вони могли брати участь у наших військових амбіціях."
  sme_sacred_land: "Священна Земля"
  sme_sacred_land_desc: "Землі $SME$ є домом для місць, священних і шанованих серед POSTEDIT_грузинського народу. Печерний монастир Вардзіа, стародавня церква Ацкурі з її чудотворною іконою Діви Марії, монастир Анча з його іконою Анчісхаті – це одні з найважливіших святих місць, що перебувають під нашою опікою. Захищаючи та опікуючись Церквою $SME$, окремо від Церкви $GEO$, ми забезпечуємо єдність нашого народу навіть перед лицем негараздів."
  sme_bridge_between_worlds: "Міст Між Світами"
  sme_bridge_between_worlds_desc: "Наша країна завжди лежала між двома світами, християнським та мусульманським, слугуючи мостом та зв'язком між ними. Таким чином, люди обох віросповідань завжди взаємодіяли в межах наших кордонів."
  arm_legacy_of_hayk: "Спадщина Гайка"
  arm_legacy_of_hayk_desc: "Гайк, нащадок Ноя, став патріархом нашої нації, коли заснував наше королівство біля підніжжя гори Арарат після перемоги над вавилонянами. Увесь наш народ знає цю історію, і всі пишаються тим, що належать до такого давнього роду."
  arm_mount_ararat: "Гора Арарат"
  arm_mount_ararat_desc: "Гора Арарат, де Ноїв ковчег осів після Великого потопу, є місцем, де вперше сформувалася наша нація. Таким чином, наш народ більш ніж готовий чинити опір, коли святість наших земель знаходиться під загрозою."
  arm_apostolic_church: "POSTEDIT_Вірменська Апостольська Церква"
  arm_apostolic_church_desc: "$ARM$ була першою нацією, яка встановила християнство як свою державну релігію у 301 році. Таким чином, наші релігійні традиції та традиції нашого духовенства є великим джерелом нашої ідентичності."
  arm_land_reclamation: "Відновлення Земель"
  arm_land_reclamation_desc: "$ARM$ століттями спустошувалася війною та розривалася на частини своїми сусідами. Відновлюючи наші втрачені землі та роблячи їх придатними для проживання, а також відновлюючи зруйновані церкви та фортеці, ми можемо забезпечити міцніший контроль над нашими землями та покращити життя наших громадян."
  arm_border_nation: "Прикордонна Нація"
  arm_border_nation_desc: "$ARM$, з давніх часів, часто була полем битви між більшими націями. Навіть після відновлення нашого суверенітету, часто важко зберігати нейтральну позицію, оскільки важко догодити всім, але це досяжно."
  arm_melikdom_organization: "Організація Мелікств"
  arm_melikdom_organization_desc: "Як один з небагатьох бастіонів незалежної POSTEDIT_вірменської держави, $ARM$ управляється феодальними сюзеренами, званими меліками, оскільки стара система нахарарів розпалася після монгольських вторгнень. Відносини між меліками та їхніми підлеглими – це відносини військового командира та молодшого офіцера, а не феодального лорда та кріпака."
  arm_mountain_armies: "Гірські Армії"
  arm_mountain_armies_desc: "Земля $ARM$ за своєю природою гориста. Наш народ навчився жити в ній протягом століть, і ми розробили спосіб використовувати ці гори на нашу користь. Таким чином, наші армії охоче зберуться під нашими прапорами з усіх куточків нашої території."
  arm_nakharar_titles: "Титули Нахарарів"
  arm_nakharar_titles_desc: "Система титулів нахарарів безперервно використовувалася в $ARM$ майже з моменту її заснування і залишалася незмінною до часів монгольських вторгнень, коли вся система сама розпалася. Хоча самі титули більше не використовуються, певні характеристики цієї системи все ще зберігаються, посилюючи здібності наших дворян та армій."
  arm_greater_armenia: "Велика POSTEDIT_Вірменія"
  arm_greater_armenia_desc: "Наша країна має велику та довгу історію, і POSTEDIT_вірменські королівства минулого зуміли поширитися на велику територію, а наш POSTEDIT_вірменський народ разом з ними. Наслідуючи їх, ми стаємо маяком для всього POSTEDIT_вірменського народу, який охоче збереться під нашим прапором."
  arm_highland_fortresses: "Високогірні Фортеці"
  arm_highland_fortresses_desc: "Наші гірські батьківщини багато чого навчили нас про стійкість та витривалість. Наші фортеці слугують прикладом такої стійкості, побудовані, щоб витримувати не лише складні умови, в яких вони розташовані, але й будь-якого іноземного загарбника, достатньо сміливого, щоб проникнути в наші важкодоступні землі."
  swiss_oath_of_rutli: "Клятва Рютлі"
  swiss_oath_of_rutli_desc: "Промовмо ж клятву цього нового союзу. Ми хочемо бути єдиною нацією братів, і жодні негаразди чи небезпеки не розлучать нас. Жоден чужоземний тиран не пануватиме над нашими землями!"
  swiss_halberd_infantry: "Спадщина Морґартена"
  swiss_halberd_infantry_desc: "Коли ми боронили нашу свободу в битві при Морґартені, ми мали дуже важливу перевагу над проклятими габсбурзькими загарбниками. Алебарда — проста, але смертоносна зброя, яка з легкістю відіб'є будь-якого ворога. Навчання наших військ користуванню цією зброєю дасть нам перевагу над нашими ворогами, навіть якщо вони мають доступ до значно більших військ."
  swiss_eternal_alliance: "Вічний союз лісових кантонів"
  swiss_eternal_alliance_desc: "Ми уклали вічний союз з нашими друзями в сусідніх кантонах. Якби не цей договір, ми б, безсумнівно, піддалися габсбурзьким загарбникам і знову потрапили під владу чужоземних тиранів. Ці союзи забезпечать наше виживання на століття вперед."
  swiss_mercenaries: "$SWI_ADJ$ найманці"
  swiss_mercenaries_desc: "Наші війська добре відомі як одні з найкращих солдатів. На щастя, ми не постійно потребуємо їхніх послуг, що дозволить нам здавати ці війська в оренду іноземним державам, збагачуючи себе та надаючи їм цінний досвід."
  the_swiss_confederation: "Принципи Конфедерації"
  the_swiss_confederation_desc: "Кожен член нашої конфедерації вносить цінні ресурси в нашу справу. Наш децентралізований підхід до управління цим союзом держав служить вищій меті, тому ми не можемо розколотися на громадянську війну, попри розбіжності між містечками, містами чи нашими кантонами."
  swiss_reislaufer: "Рейсльойфери"
  swiss_reislaufer_desc: "$a_reislaufer_desc$ Ми повинні формувати полки з цих ветеранів і використовувати їх у наших власних арміях."
  swiss_recovery_and_prosperity: "Змучене королівство"
  swiss_recovery_and_prosperity_desc: "Конфлікти минулого показали, що відбиття загарбників — не єдине завдання, про яке слід подбати. Долини наших кантонів спустошені кожною битвою, і необхідно вжити обережних кроків, щоб повернути процвітання нашим землям."
  alpine_defensiveness: "Альпійська обороноздатність"
  alpine_defensiveness_desc: "$SWI_ADJ$ землі переважають пересічена місцевість, гори та долини. Нам потрібно використовувати наші землі та включати рельєф у нашу військову тактику. Таким чином ми, безсумнівно, переможемо будь-якого ворога, який наважиться ступити на наші землі."
  swiss_religious_refuge: "Притулок для біженців"
  swiss_religious_refuge_desc: "Поки інші висилають свої релігійні меншини та проблемних осіб, ми з радістю запропонуємо їм дім. У $SWI$ вони зможуть розпочати нове життя для себе та прославляти наше правління."
  swiss_tolerance: "$SWI_ADJ$ толерантність"
  swiss_tolerance_desc: "Навіщо нам вбивати одне одного через переісточення та приречення, коли ми могли б перетворити наш гірський дім на знову об'єднане королівство?\n\nЗ цієї причини кожен кантон $SWI$ матиме останнє слово у питанні релігії. Хоча це не усуне всіх релігійних чвар у нашій країні, це принаймні забезпечить, що незалежно від віросповідання, наші люди зможуть знайти місце, де їх не переслідуватимуть."
  swiss_clockwork: "Майстри годинникового механізму"
  swiss_clockwork_desc: "Деякі дурні вважають, що годинниковий механізм призначений лише для годинників. Коли хтось спостерігає за силою обертових шестерень, що цокають, стає очевидним, що годинниковий механізм може робити майже все, що забажає: можливо, сам Творець Всесвіту завів існування, як годинник, і дозволив шестерням обертатися самостійно, відлічуючи століття. Хай там як, $SWI_ADJ$ годинникарі є найбільшими майстрами мистецтва годинникового механізму, що існують, за винятком, звичайно, Самого Бога."
  swiss_ambition: "$SWI_ADJ$ Просвітництво"
  swiss_ambition_desc: "Нам не потрібно шукати унікальну ідентичність для нашої країни, оскільки наш народ охоче збирається під прапорами своїх кантонів та ідеалами нашої конфедерації. Але, фінансуючи освічених вчених того часу, ми зможемо сформувати нову епоху для $SWI_ADJ$ народу та закріпити унікальні риси нашої Eidgenossenschaft. Цей гельветизм стане основою наших просвітницьких принципів."
  swiss_banking: "$SWI_ADJ$ Банківська справа"
  swiss_banking_desc: "Ми є притулком не лише для переслідуваних людей з інших країн, але й для їхнього багатства. У великих сховищах, прихованих за міцними стінами та захищених нашими надійними солдатами, ми будемо найкращим вибором для кожного громадянина бідних, роздертих війною країн світу, щоб зберегти їхні цінності."
  zmw_experienced_cattle_herder: "Досвідчені пастухи"
  zmw_experienced_cattle_herder_desc: "Випас тварин – непроста справа, життєво важлива для нашого виживання. Якщо ми хочемо стабілізувати та розширити наше правління, ми не можемо ухилятися від розширення наших пасовищ та випасних угідь."
  zmw_stone_builders: "Будівельники Зімбабве"
  zmw_stone_builders_desc: "Великі кам'яні споруди Зімбабве вражають багатьох відвідувачів нашої великої країни. Підтримка цієї традиції дозволить нам розширити наші великі кам'яні міста, щоб вони височіли століттями."
  zmw_encourage_new_settlements: "Нові землі для ресурсів"
  zmw_encourage_new_settlements_desc: "За нашими кордонами лежать величезні землі, багаті на ресурси та пасовища, готові до використання нашим народом. Ми повинні заохочувати наших людей переселятися на ці території та засновувати нові міста."
  zmw_rekindling_the_royal_fires: "Відродження королівських вогнів"
  zmw_rekindling_the_royal_fires_desc: "Щоб наші підлеглі вожді довели свою вірність перед нами та перед богами, вони повинні раз на рік подорожувати до столиці, щоб відновити свій місцевий вогонь, використовуючи наш. Після того, як мине рік, наша армія загасить їхній вогонь, і їм доведеться здійснити нову подорож."
  zmw_strict_gold_regulations: "Суворі правила торгівлі золотом"
  zmw_strict_gold_regulations_desc: "Наші землі забезпечують нас великою кількістю товарів, до яких іноземні купці виявляють великий інтерес, але наші рясні запаси золота сяють яскравіше за будь-які інші. Хоча такі багатства є благословенням для нашої держави, цей метал також може бути досить небезпечним, якщо його не тримати під суворим контролем. Наша держава повинна жорстко регулювати всю торгівлю та володіння золотом, щоб уникнути руйнівних впливів ззовні."
  zmw_spokesman_before_the_dead: "Речник перед мертвими"
  zmw_spokesman_before_the_dead_desc: "Наш правитель є не лише нашим лідером у світському сенсі, але й повинен говорити від нашого імені перед духами мертвих. Перед будь-якою кампанією чи жнивами він передаватиме нашу повагу та наші потреби духам наших предків через церемонії чи танці. Без великого правителя, який би підтримував королівські гробниці та підтримував тісний зв'язок з нашими мертвими, справи в нашій країні можуть дуже швидко піти шкереберть."
  zmw_elected_administrators: "Провінційні адміністратори"
  zmw_elected_administrators_desc: "Традиційно всі наші адміністратори, навіть на місцевому рівні, були прямими родичами нашого правителя. Однак, оскільки наша імперія зросла і зміцніла, настав час черпати з місцевих знань наших підданих і дозволити їм обирати власних адміністраторів."
  zmw_discipline_and_traning: "Регулярні тренування"
  zmw_discipline_and_traning_desc: "Дисципліна, підготовка та тренування – ось що виграє битви. З огляду на це, наші командири успішно почали впроваджувати складні нові тактики та нову організацію армії. Давайте добре використаємо ці інновації, розділивши наших воїнів на полки, а потім дозволимо їм регулярно тренуватися зі своїми луками, асегаями, кинджалами та сокирами. Практика також дозволить їм без страху битися у строю, перемагаючи набагато численніших ворогів."
  zmw_merchant_taxes: "Торговельні збори"
  zmw_merchant_taxes_desc: "З прибуттям нових торговців у район Замбезі ми повинні забезпечити повагу до нашої влади. Кожен, хто бажає торгувати тут і доставляти наше дороге золото та слонову кістку на інші береги, повинен спочатку отримати схвалення нашого правителя та сплатити податок, щоб отримати вільний доступ. У разі несплати всі іноземні товари будуть конфісковані нашою державою."
  zmw_controlling_the_mutapan_riches: "Контроль над багатствами"
  zmw_controlling_the_mutapan_riches_desc: "Західні мандрівники назвали нашу землю Офір, а золоті копальні плато та контроль над торгівлею на Замбезі викликали заздрість у багатьох відвідувачів протягом століть. Давайте використаємо наш контроль над цими багатствами та побудуємо постійні торгові пости, які можуть перетворитися на розлогі міста."
  zmw_empowering_the_rozwi: "Розширення прав і можливостей POSTEDIT_Розві"
  zmw_empowering_the_rozwi_desc: "Наші землі є домом для багатьох вправних воїнів. Серед них POSTEDIT_Розві, дисципліновані бійці, які готові захищати та оберігати наш народ від будь-кого, хто наважиться відібрати наші землі у нас."
  zmw_cow_horn_tactics: "Формації \"Бичачий ріг\""
  zmw_cow_horn_tactics_desc: "Адаптація до постійно мінливих тактик війни – непросте завдання. Проти потенційно переважаючих ворогів ми повинні покладатися насамперед на власну мобільність. Якщо ми зможемо затиснути наших ворогів у рукопашний бій і відправити полк для флангування та оточення їхніх військ, ми зможемо завдати їм нищівних втрат."
  khm_religious_flexibility: "Єдина віра для $KHM$"
  khm_religious_flexibility_desc: "Наша країна пережила буремні часи й бачила, як монархи просували як $hindu$, так і різні гілки $buddhist$. Ми повинні довіряти рішенням наших правителів і таким чином слідувати та просувати обрану віру в кожну частину нашої країни."
  khm_royal_procession: "Королівські процесії $KHM_ADJ$"
  khm_royal_procession_desc: "Процесії наших правителів – це подія, якою можна захоплюватися, і якій мало що може зрівнятися. Ми продемонструємо нашу владу над державою екстравагантними процесіями, де наш суверен покаже пишність нашої держави. Представляючи багатство та владу правителя, процесія слонів та королівської гвардії забезпечить, що довіра нашого народу завжди залишатиметься непорушною."
  khm_ballista_elephants: "Слони-балісти"
  khm_ballista_elephants_desc: "Слони – вражаючі істоти, що височіють над будь-якою іншою твариною, яку ми бачили. Настав час використати ці якості, щоб вселити страх у наших ворогів, використовуючи цих величних тварин у війні. Слони також здатні нести велику вагу, що дозволяє нам монтувати на них бойові машини. Створення подвійних арбалетів та оснащення ними наших слонів створить інструмент, який дозволить нам домінувати на полях битв краще, ніж будь-коли раніше."
  khm_great_builders: "Гідравлічні міста"
  khm_great_builders_desc: "Наші великі міста є домом для багатьох бареїв та каналів, готових зберігати та розподіляти воду в межах міст. Наша майстерність у будівництві та підтримці цієї мережі водних шляхів забезпечить процвітання нашого населення навіть у нестабільні мусонні сезони."
  khm_recruitment_of_peasants: "Набрати селян"
  khm_recruitment_of_peasants_desc: "Нам потрібно буде поповнити нашу армію новими рекрутами, яких легко знайти серед нашого селянства. Завдяки деякій підготовці ми зможемо забезпечити, щоб ряди наших військ могли бути поповнені в будь-який час здібними солдатами."
  khm_foreign_production_skills: "Запросити іноземних експертів"
  khm_foreign_production_skills_desc: "Хоча наш власний народ не звик до виробництва тканин, витканих з шовку, і віддає перевагу іншим тканинам, нам пощастило, що іноземні ткачі оселилися в наших містах, щоб заснувати власні ткацькі майстерні на нашій землі. Ми повинні застосувати той самий підхід до інших промислових галузей і універсально розширити нашу продуктивність."
  khm_utilize_the_rivers: "Життєва сила $KHM$"
  khm_utilize_the_rivers_desc: "Річки наших земель забезпечують чудовий спосіб транспортування різних товарів, зібраних та вироблених на нашій внутрішній території, до наших гаваней, пов'язаних із закордонними торговими шляхами. Використання цієї транспортної мережі також допоможе нам з'єднати наші міста та прискорити зв'язок між ними."
  khm_champa_mercenaries: "Лідери найманців $CHA$"
  khm_champa_mercenaries_desc: "У минулому ми як воювали, так і покладалися на лютих солдатів $CHA$. Якщо ми зможемо забезпечити послуги їхніх найздібніших лідерів, ми зможемо гарантувати, що наша власна армія залишатиметься добре навченою та готовою до боротьби в різних обставинах."
  khm_restore_angkor: "Відновлення $angkor$"
  khm_restore_angkor_desc: "Велике місто $angkor$ колись було сяючим маяком нашого архітектурного генія. Через зовнішні впливи нам довелося скоротити наші будівельні зусилля, але ми повинні знову з'єднатися з корінням нашого царства і почати будувати нові пам'ятники нашій пишності."
  khm_modern_navy: "Сучасний флот для $KHM$"
  khm_modern_navy_desc: "Ми не можемо дозволити іншим домінувати на морях і контролювати торгівлю, від якої залежить наша держава. Створимо нову та сучасну силу, здатну протистояти будь-якому пірату чи ворожому флоту в $south_east_asia$."
  khm_invest_in_irrigation: "Розширити бареї"
  khm_invest_in_irrigation_desc: "Хоча наші існуючі водосховища підтримують наші поточні сільськогосподарські потреби, ми могли б легко підтримати більше людей, якби ми викопали нові бареї в інших частинах нашої країни, створивши підтримку для нових міських центрів для нашого народу."
  khm_protection_from_raids: "Захистити кордони"
  khm_protection_from_raids_desc: "Нашим землям часто загрожують вторгнення, і особливо наш дорогоцінний $angkor$ залишається відкритим для облоги та загибелі. Нам потрібно інвестувати в розгалужену систему укріплень з достатнім гарнізоном, щоб витримати будь-яку вторгнену силу, щоб ми могли захистити наш народ від поневолення та іноземного панування."
  khm_old_grudges: "Керовані суперництвом"
  khm_old_grudges_desc: "Наш народ був принижений у минулому загарбниками, які змусили нас схилитися перед ними. Хоча не кожної поразки можна уникнути, ми використовуємо її, щоб спонукати наш народ до більших звершень на майбутніх полях битв."
  peasant_connections_advance: "Селянські зв'язки"
  peasant_connections_advance_desc: "Наші купці встановили зв'язки з сільськими поселеннями в межах і за межами наших кордонів. В результаті, ці купці можуть забезпечити кращі ціни на продовольство, ніж очікувалося."
  settle_the_frontier_advance: "Поклик прикордоння"
  settle_the_frontier_advance_desc: "Ми оточені територіями, готовими до захоплення. Слабо захищені, відправлення авантюрних членів нашого двору дозволить нам утвердити нашу владу на цих незаперечних землях."
  tre_pontic_trail_mastery: "$pontic_greek_culture$ Майстерність стежки"
  tre_pontic_trail_mastery_desc: "Наші землі – наш дім; наші ліси – наш сад. Ми знаємо кожен їхній куточок краще за будь-кого. Кожна стежка і кожен шлях, що перетинає їх, відомі нам, і ми скористаємося цими знаннями, якщо хтось наважиться вторгнутися до нас."
  tre_komnenos_legacy: "Спадщина $komnenos_dynasty$"
  tre_komnenos_legacy_desc: "Нехай ніхто не забуде, що ми є нащадками $komnenos_dynasty$, які правили $BYZ_ADJ$ Імперією. Хоча ми тепер керуємо іншою державою, спадщина та престиж нашої династії залишаються тим, що не можна заперечувати."
  tre_princes_of_the_lazes: "Князі $laz_culture$"
  tre_princes_of_the_lazes_desc: "$laz_culture$ населяли ці землі століттями. Хоча наша Імперія була заснована як безперечно $greek_culture$, це правда, що багато $laz_culture$ залишилися в межах наших кордонів. Таким чином, багато наших ворогів називали нас $tre_princes_of_the_lazes$ на глузування, вважаючи нас нижчими. Однак, незважаючи на їхні зусилля, це не зменшує наших претензій, і ми будемо носити цей титул з гордістю."
  tre_strategic_marriages: "Стратегічні шлюби"
  tre_strategic_marriages_desc: "Не лише силою меча можна завойовувати королівства та імперії. Встановлюючи тісні шлюбні зв'язки з багатьма навколишніми націями, ми можемо забезпечити шанс на успадкування їхніх престолів. Або принаймні, що ми можемо поширити свій вплив на них."
  tre_grand_komnenoi: "Великі Комніни"
  tre_grand_komnenoi_desc: "Династія $komnenos_dynasty$ можливо, була вигнана з престолу $BYZ_ADJ$ Імперії в минулому, але її слава ніколи не згасала. Визнання, яке здобув наш рід, все ще настільки ж присутнє, і повага, яку мають до нас як наш народ, так і інші країни, не є незаслуженою."
  tre_pontic_mountains: "$pontic_greek_culture$ Гори"
  tre_pontic_mountains_desc: "Подібно до того, як Альпи розділяють $french_group$ та $italian_group$, $pontic_greek_culture$ Гори розділяють наш останній $greek_culture$ оплот в $anatolia_region$ від $turkic_group$ загарбників, які захопили Анатолійське плато. Понт завжди був більш $greek_culture$, ніж решта $anatolia_region$, можливо, спадщина великого Мітрідата давнини надихне наших воїнів і вселить стільки ж страху в турків, скільки він вселив у римлян?"
  tre_byzantine_birthright: "$BYZ_ADJ$ Право народження"
  tre_byzantine_birthright_desc: "Велика $BYZ_ADJ$ Імперія під правлінням наших предків була справді чимось дивовижним. Саме обман і зрада змусили нас бути вигнаними звідти, лише для того, щоб відродитися і знову піднятися. Ніхто не сумніватиметься в нашій владі."
  tre_trapezuntine_monasteries: "$TRE_ADJ$ Монастирі"
  tre_trapezuntine_monasteries_desc: "Саме наша віра зберігає душі нашого народу. Наше духовенство, ті, хто забезпечує їхнє спасіння. Що ж тоді наші монастирі, як не джерело і походження такого спасіння?"
  tre_greek_stronghold: "$greek_language$ Оплот"
  tre_greek_stronghold_desc: "З давніх часів $greek_language$ завжди була мовою освіти та науки. Коли наші предки прийшли на наші землі, вони принесли з собою не лише свою владу, а й свою культуру та мову. Таким чином, $greek_language$ традиція навчання добре жива в нашій країні."
  tre_komnenoi_princesses: "Принцеси Комнінів"
  tre_komnenoi_princesses_desc: "Багато видатних жінок походили з династії $komnenos_dynasty$, і багато хто серед правителів $europe$ і навіть деякі серед невірних шукали їхньої руки в шлюбі. Наш рід користується великою повагою, а наші принцеси подвійно, бо саме вони дозволяють іноземним країнам претендувати на легітимність через наш рід, а нам – зберігати вплив при їхніх дворах."
  tre_terminus_of_the_silk_road: "Термінус Шовкового шляху"
  tre_terminus_of_the_silk_road_desc: "Навіть коли його називали Трапезунтом в імлі Античності, стародавні $greek_culture$ бачили, наскільки корисним було це місце, точка, де сухопутний шлях через $asia$ зустрічається з морським шляхом, що веде до Середземномор'я. Ми прославилися як термінус великого Шовкового шляху, оскільки багатства $china$ та $india$ проходили через наші землі на шляху до $europe$. Немає причин не спробувати зберегти частину багатств, що проходять."
  tre_lessons_of_the_fourth_crusade: "Уроки Четвертого хрестового походу"
  tre_lessons_of_the_fourth_crusade_desc: "Ісаак Ангел, який скинув нашу династію у 1185 році, сам був скинутий і осліплений, і, під приводом повернення сліпого старого дурня на трон, $VEN_ADJ$ війська розграбували $constantinople$ у 1204 році. Якщо з цього можна щось винести, то це те, що зрада і обман повсюдні у боротьбі за владу, але вони також забезпечують перемогу."
  tre_trapezuntine_endurance: "$TRE_ADJ$ Витривалість"
  tre_trapezuntine_endurance_desc: "Вигнані зі своєї країни, і все ж наша династія вижила. Змушені жити в гірській країні, оточеній ворогами, і все ж наш народ процвітав. Ми обов'язково використаємо якнайкраще будь-який результат, з яким зіткнемося, і наш народ обов'язково використає якнайкраще будь-які ресурси, які має."
  palm_tree_masters: "Майстри пальм"
  palm_tree_masters_desc: "Попри брак товарів місцевого виробництва, одне, чого у нас вдосталь, це пальмові дерева. Достатньо тверді, щоб підтримувати будівництво та кораблебудування, і достатньо м'які, щоб згинатися та набувати форми завдяки нашій майстерності, оволодіння цим типом деревини, безумовно, дозволить нам розширити наше багатство та мореплавну діяльність."
  kilwan_trade_network: "$ZAN_ADJ$ Торговельні мережі"
  kilwan_trade_network_desc: "Приваблюючи багатьох купців навіть з $persia_region$ та $arabia_region$, наша столиця стала центром торгівлі, сприяючи бізнесу від рогу $africa$ до берегів $china$."
  the_dhow: "$n_kilwan_dhow$"
  the_dhow_desc: "$n_kilwan_dhow_desc$"
  the_kilwan_zambuc: "$n_kilwan_zambuc$"
  the_kilwan_zambuc_desc: "$n_kilwan_zambuc_desc$"
  bantu_and_perso_arabian: "$bantu_language_family$ та Персько-арабська"
  bantu_and_perso_arabian_desc: "З часів нашого походження з $arabia_region$ та $persia_region$, ми заснували громади по всьому $swahili_coast_region$, які інтегрують місцеву $bantu_language_family$ з метою підтримки соціального порядку та прокладання шляху для розвитку нових архітектурних та культурних досягнень!"
  zanj_taxation: "Оподаткування Зандж"
  zanj_taxation_desc: "Спочатку термін для опису мешканців внутрішньої $africa$, особливо тих, хто походить з $bantu_language_family$, ці люди стали населяти наші поселення і становлять значну частину нашої демографії. Надаючи їм багато свобод і обов'язків, їх оподатковують відповідно, щоб зберегти їхні привілеї. Їхня відносна мирна автономія в рамках нашої правової системи проклала шлях для впровадження лінгвістичних явищ та нових культурних традицій."
  zan_food_imports: "Імпорт продовольства"
  zan_food_imports_desc: "Світанок нової епохи в мореплавстві відкрив нові можливості для нас шукати прожиток для нашого народу. Якщо колись ми торгували лише з внутрішніми районами $africa$, щоб знайти життєво важливе просо, худобу та рис, то тепер ми можемо досягти нових портів, де продовольство може бути дешевшим і доступнішим."
  zan_kilwan_latitude_staves: "Широтні посохи"
  zan_kilwan_latitude_staves_desc: "Наша передова корабельна технологія дозволяє нам плавати далі та краще, ніж будь-хто з наших конкурентів, даючи нам перевагу."
  shirazi_legacy: "Спадщина Ширазі"
  shirazi_legacy_desc: "Наш прабатько-засновник походив з $shiraz$, син еміра $persia_region$, що не залишає сумнівів щодо нашого права на правління."
  zan_gold_trade_of_africa: "Торгівля золотом $africa$"
  zan_gold_trade_of_africa_desc: "Наші запаси $goods_gold$ з багатьох джерел по всій Східній $africa$ є наріжним каменем нашого багатства та процвітання. Ми повинні повною мірою скористатися нашими запасами та поширити міцну валюту."
  zan_diplomacy_through_trade: "Дипломатія через торгівлю"
  zan_diplomacy_through_trade_desc: "Наше унікальне положення між багатствами $china$, $india$ та $europe$ надає нам великий вплив у дипломатичній грі між імперіями та іноземними державами..."
  cha_matrilineal_heritage: "Матрилінійний спадок"
  cha_matrilineal_heritage_desc: "Позиція жінки в нашому суспільстві значно більше цінується та шанується порівняно з нашими сусідами. Право народження будь-якої дитини походить від її матері, і жінки користуються великою кількістю свобод та обов'язків."
  cha_religious_tolerance: "Релігійна толерантність"
  cha_religious_tolerance_desc: "Наш народ – це плавильний котел багатьох різних релігійних впливів. $buddhist_ADJ$ ідеї з $china$, $hindu_ADJ$ практики з $india$ та поширення $muslim$ у $south_east_asia$ створюють унікальне середовище, де лише релігійна толерантність може зберегти наше суспільство разом."
  cha_dharmic_presence: "$dharmic_ADJ$ Присутність"
  cha_dharmic_presence_desc: "$dharmic_ADJ$ боги благословляють нас своєю присутністю. Нехай їхня сила веде нас крізь найважчі часи."
  cha_kshatriya: "Кшатрії"
  cha_kshatriya_desc: "$cha_kshatriya$ – це термін, запозичений з $hindu_ADJ$ суспільств, що описує елітних дворян нашої держави. Таким чином, наша знать відіграє подібну роль у підходах до військових та придворних манер, схожу на їхніх колег з $india$."
  cha_veteran_shipbuilders: "Досвідчені кораблебудівники"
  cha_veteran_shipbuilders_desc: "Наша держава покладається на морське панування, щоб забезпечити міцну політичну, військову та економічну позицію в $indochina_region$. Таким чином, швидке будівництво додаткових кораблів має велике значення для нашого виживання."
  cha_haluwbilau: "Халувбілау"
  cha_haluwbilau_desc: "$cha_haluwbilau$ – це елітні воїни та офіцери на ключових посадах у наших сухопутних та морських військах. Обрані на основі їхніх талантів та хоробрості, ці чоловіки ведуть армії та кораблі в бій проти зовнішніх загроз, а також вирішують суперечки в багатьох громадах нашої держави."
  cha_commercial_state: "Комерційна держава"
  cha_commercial_state_desc: "Значна частина нашого багатства завдячує торговельним можливостям, які надають наші території. Ми повинні зосередити наші зусилля на подальшому їхньому максимізації, створюючи в процесі комерційну державу."
  cha_boarding_tactics: "Тактика абордажу"
  cha_boarding_tactics_desc: "Через складний рельєф більшої частини нашої землі, іноземні загарбники змушені покладатися на морську перевагу у своїх спробах завоювати нас. Десятиліття піратства в Індокитайських морях навчили нас цінній тактиці абордажу, яка дозволяє нам використовувати їхні власні кораблі проти них."
  cha_towers_on_water: "Вежі на воді"
  cha_towers_on_water_desc: "Як морська держава, значна частина нашого багатства та могутності походить від моря та нашого панування над ним. Щоб забезпечити це, наші кораблебудівники розробили спеціальні великі військові кораблі, відомі як #italic Вежі на воді#! – гібрид важкого корабля та галери, що використовується для морського панування."
  cha_cham_cultural_influence: "$cham_culture$ Культурний вплив"
  cha_cham_cultural_influence_desc: "Хоча деякі з наших сусідів вважають нашу культуру неповноцінною, вони просто заперечують, оскільки багато наших культурних аспектів проникають у їхні самопроголошені «цивілізовані» двори. $cham_culture$ барабанні ритми, $cham_culture$ пісні, $cham_culture$ танці та поезія – все це елементи, які безперечно залишають свій вплив на інших."
  dai_vietnamese_architecture: "$vietnamese_culture$ Архітектура"
  dai_vietnamese_architecture_desc: "Хоча наша архітектура зазнала впливу $chinese_group$, вона залишається відмінною та унікальною для нашої держави. Дотримуючись концепцій Фен-шуй, багато типових $chinese_group$ елементів були виключені або адаптовані до нашого унікального середовища."
  dai_tran_hung_dao: "Trần Hưng Đạo"
  dai_hung_dao_trans_military_feats: "Тактика $dai_tran_hung_dao$"
  dai_hung_dao_trans_military_feats_desc: "$dai_tran_hung_dao$ був імперським принцом $DAI$ десятиліття тому. Він служив офіцером під час першого вторгнення $mongolian_group$ у $DAI$ у 1258 році, а також провідним командувачем під час другої війни проти монголів у 1285 році та їхньої третьої спроби у 1287 році. Під час цих кровопролитних конфліктів $dai_tran_hung_dao$ вдалося розробити тактику, яка послідовно відбивала цих вершників."
  dai_nha_nhac: "Ня няк"
  dai_nha_nhac_desc: "$dai_nha_nhac$ — це традиційна музика, що грається при наших дворах та виконується на щорічних церемоніях. Це видатний аспект нашої культури та стовп наших традицій."
  dai_confucian_administration: "Конфуціанська адміністрація"
  dai_confucian_administration_desc: "Бюрократія нашої держави має велике значення, і тому лише найздібніші адміністратори обираються на канцелярські посади. Вивчені в конфуціанських текстах $CHI$, ці бюрократи забезпечують безперебійну та стабільну роботу."
  dai_giao_chi_arquebus: "Аркебуза Зяо Чі"
  dai_giao_chi_arquebus_desc: "$dai_giao_chi_arquebus$ є основним елементом нашої армії. Самостійно вироблена та адаптована до потреб наших військ, ця аркебуза здобуває похвалу не лише від $chinese_group$, але й від західних спостерігачів."
  dai_ca_tru: "Ка тру"
  dai_ca_tru_desc: "$dai_ca_tru$ — це $vietnamese_culture$ жанр музичного оповідання, який служить як розвагою, так і виконанням релігійних пісень."
  dai_trade_advance: "Торговельні контракти"
  dai_trade_advance_desc: "Наша історія занадто довго формувалася $CHI$. Щоб залишити свій власний слід у світі, ми повинні розширити свій вплив за межі сфери впливу $chinese_group$."
  dai_literary_reform: "Літературна реформа"
  dai_literary_reform_desc: "Протягом століть ми використовували $classical_chinese_language$ для написання наших документів. Однак, для написання нашої мови використовувався шрифт Chữ Nôm, рідний шрифт, заснований на Chữ Hán, шрифті $classical_chinese_language$. Chữ Nôm був нестандартизованим і використовувався недостатньо часто порівняно з $classical_chinese_language$, тому виникла потреба в реформі для націоналізації шрифту для наших адміністративних цілей."
  dai_don_dien: "Дон Дьєн"
  dai_don_dien_desc: "$dai_don_dien$ — це система, яка використовує військові колонії, де солдати та безземельні селяни розчищають територію для заснування нових сіл. Ці села потім включаються до нашої адміністративної системи через три роки, а солдати та безземельні селяни переміщуються на доступні землі."
  dai_thuan_thien: "Тхуан Тхієн"
  dai_thuan_thien_desc: "$dai_thuan_thien$, або Воля Небес, — це назва легендарного меча, яким володів наш визволитель, Ле Лой. Згідно з переказами, меч дав йому силу тисячі чоловіків, щоб нарешті скинути ярмо $chinese_group$ правління. Ле Лой вважається ідеальним втіленням лідера, якого потребує наша держава."
  foreign_architectural_influence: "Іноземний архітектурний вплив"
  foreign_architectural_influence_desc: "Під час наших численних завоювань у $indonesia_region$ ми стикалися з багатьма стилями архітектури та способами подальшого розвитку нашої спадщини. Завдяки впровадженню нових культурних та мистецьких рухів у міському розвитку, наша культура включить найкращі художні аспекти нашого регіону."
  maj_home_of_the_sea_nomads: "Дім морських кочівників"
  maj_home_of_the_sea_nomads_desc: "$n_kabang_desc$"
  maj_jong_advance: "$n_jong$"
  maj_jong_advance_desc: "$n_jong_desc$"
  maj_bajang_ratu: "Брама $bajang_ratu$"
  maj_bajang_ratu_desc: "$bajang_ratu_desc$"
  maj_late_karambit_warriors: "$a_late_karambit_warrior$"
  maj_late_karambit_warriors_desc: "$a_late_karambit_warrior_desc$"
  maj_sumpah_palapa: "Sumpah Palapa"
  maj_sumpah_palapa_desc: "Очільник нашого війська та особа, що безпосередньо підзвітна нашому володарю, має великий вплив та владу, формуючи історію нашого народу. Щоб забезпечити їхню ефективність та усвідомлення важливості такої посади, буде вимагатися особлива присяга, така, що підкреслює наші мрії про завоювання та зміцнює наш дух."
  maj_bubu_and_jala: "Bubu & Jala"
  maj_bubu_and_jala_desc: "$bubu_building_desc$"
  maj_the_magic_arrow: "Чарівна Стріла"
  maj_the_magic_arrow_desc: "$a_cetbang_cannon_desc$"
  maj_maritime_silk_road: "Морський Шовковий Шлях"
  maj_maritime_silk_road_desc: "Наше географічне положення, доповнене нашим зростаючим впливом, дозволило нам головувати над розгалуженою та прибутковою торговою мережею, що приносить $silk$ та $spices$ зі Сходу на Захід."
  maj_restore_candi_shrines: "Відновити Святилища Канді"
  maj_restore_candi_shrines_desc: "Розкидані по всій Нусантарі є низка храмів, відомих як Канді. Ми повинні відновити ці храми скрізь, де їх знайдемо, щоб відновити віру нашого народу."
  maj_the_ghali: "$n_madurese_gali$"
  maj_the_ghali_desc: "$n_madurese_gali_desc$"
  maj_island_colonies: "Острівні Колонії"
  maj_island_colonies_desc: "Наш контакт з багатьма місцевими сусідами в архіпелазі привів до думки, що сирі ресурси та вільні землі дозріли для захоплення, безпечні та процвітаючі під нашим контролем."
  maj_preservation_of_javanese_history: "Збереження Історії $javanese_culture$"
  maj_preservation_of_javanese_history_desc: "Глибина та історія народу $javanese_culture$ є невід'ємною частиною нашої культурної ідентичності та буття. Щоб захистити нашу ідентичність, ми повинні зберегти традиції, на яких ми збудували фундамент великої країни."
  heian_kyo: "Heian-kyō"
  heian_kyo_desc: "Місто Heian-kyō століттями було резиденцією Імператора, будучи центром мистецтва та культури. Саме там процвітав розкішний двір часів $fujiwara$, і всі люди в Японії дивилися на нього з благоговінням у пошуках натхнення. Ми приймемо його традиції та за нашого заступництва змусимо культуру нашої столиці знову процвітати."
  matsuri: "Matsuri"
  matsuri_desc: "Кожне місцеве святилище та храм має власні свята та урочистості. Все навколишнє населення завжди прагне брати в них участь, бо це їхній шанс висловити свою відданість та вдячність своєму місцевому захиснику Камі."
  onmyodo: "Onmyōdō"
  onmyodo_desc: "Теорії Інь і Ян, що прийшли з $china$ століття тому, еволюціонували в $japan_region$ у $onmyodo$. Експерти в ньому, звані Онмьоджі, займаються очищенням та вигнанням злих і мстивих духів, а також ворожінням, астрономією та вивченням природи."
  sumo: "Сумо"
  sumo_desc: "Практика $sumo$, що бере свій початок у сільськогосподарському ритуальному танці для молитви за добрі врожаї, вийшла за межі двору та священиків. Тепер це популярна практика, яку виконує простий народ, що також служить способом військової підготовки."
  nanto_rokushuu: "Нанто Рокушу"
  nanto_rokushuu_desc: "Храми $nara$ були впливовими з тих пір, як $buddhist$ прийшов з $china$. Шість шкіл, що сформувалися в них, є сховищем знань, особливо про вчення Будди та різні способи досягнення просвітлення, а також про інші більш буденні предмети, такі як правильне управління монастирем."
  shinbutsu_shuugou: "Шінбуцу-Шуго"
  shinbutsu_shuugou_desc: "З тих пір, як $buddhist$ прийшов до $japan_region$, його вчення змішалися з поклонінням місцевим Камі, і як Будда, так і Камі злилися в єдиний і комбінований набір вірувань, хоча й з чітко відмінними ритуальними практиками."
  honji_suijaku: "Хонджі Суйджаку"
  honji_suijaku_desc: "Одним з ключових факторів для $shinbutsu_shuugou$ є ідентифікація місцевих Камі як проявів різних Будд, а Будд як проявів різних Камі. Зрештою, обидва є одним і тим же, основною формою або #italic Honji#!, що приймає різні прояви або #italic Suijaku#!."
  hachiman_worship: "Поклоніння Хачіману"
  hachiman_worship_desc: "Хачіман є одним з найбільш шанованих божеств. Спочатку обожнення Оджін Тенно, після введення $buddhist$ він пізніше також був ідентифікований як Бодхісаттва. Він є захисником Імператорської лінії та богом-покровителем класу воїнів."
  gozan_jissetsu: "Гозан Джіссецу"
  gozan_jissetsu_desc: "Система \"П'яти гір\" — це традиційна система, що виникла в $china$, державних монастирів Чань $buddhist_ADJ$, що отримали цю назву, оскільки вони розташовувалися на вершинах святих гір. У $japan_region$ ця практика продовжилася в період Камакура шляхом спонсорування дзен-храмів, п'яти гір $kyoto$ та п'яти гір $kamakura$. Зберігаючи спонсорство таких установ, ми можемо використовувати їх для стабілізації нашого правління."
  bodaiji: "Бодайджі"
  bodaiji_desc: "У наших землях з давніх-давен було прийнято шанувати наших предків. Таким чином, найвпливовіші з наших правителів можуть зводити цілі храми, щоб їх поховали та шанували після смерті. В результаті пам'ять про їхнє життя та вчинки також буде збережена та пам'ятатиметься."
  kagura: "Кагура"
  kagura_desc: "Спочатку священні ритуальні танці, що виконувалися перед двором #italic Miko#!, храмовими дівами, $kagura$ також надихнула на виконання популярних ритуальних танців по всьому $japan_region$. Ці танці еволюціонували в безліч форм, але всі вони зберігають традицію та ритуал, з яких вони походять."
  obon: "Обон"
  obon_desc: "Один з найважливіших свят, $obon$ — це час вшанування померлих та предків. Під час святкувань проводяться підношення їжі та ритуальні танці. Люди також запалюють вогні та ліхтарі, щоб провести душі померлих додому на святкування, а потім знову до країни мертвих."
  neo_confucianism: "Нео-$SECT_CONFUCIANISM_NAME$"
  neo_confucianism_desc: "Нео-$SECT_CONFUCIANISM_NAME$, пізніший розвиток $SECT_CONFUCIANISM_NAME$ у його тисячолітній історії, вже століттями присутній у $japan_region$. Однак подальша державна підтримка забезпечить міцний контроль нашого уряду над нацією."
  danka_system: "Система Данка"
  danka_system_desc: "Протягом століть домогосподарства в $japan_region$ мали тісні стосунки з місцевими $buddhist_ADJ$ храмами, надаючи їм фінансову підтримку в обмін на те, що храми дбали про їхні духовні потреби. Розширення цієї системи на все наше населення забезпечить безпеку віри нашого народу."
  harae: "Харае"
  harae_desc: "У нашій вірі практика #italic $harae$#!, або ритуального очищення, є ключовою для видалення всіх #italic Tsumi#!, гріхів, та #italic Kegare#!, нечистоти. Забезпечуючи належне та часте виконання ритуалів $harae$ нашим населенням, ми можемо гарантувати, що вся наша країна залишається чистою."
  jisha_bugyou: "Дзіша-буґьо"
  jisha_bugyou_desc: "Адміністратор і наглядач усіх храмів і святилищ, $jisha_bugyou$ контролюватиме всю діяльність цих релігійних установ, переконуючись, що їхні інтереси збігаються з інтересами уряду."
  kokugaku: "Кокуґаку"
  kokugaku_desc: "Майже з моменту свого заснування як країни, $japan_region$ та $shinto$ зазнавали впливу іноземних ідей, що надходили з $china$ та $buddhist$. Новий рух набирає обертів, стверджуючи, що наш власний національний дух є природно чистим, і що всі іноземні впливи повинні бути усунені з нього."
  home_shrines: "Домашні святилища"
  home_shrines_desc: "Культ і ритуали традиційно були прерогативою святилищ і храмів. Однак все більше наших людей починають мати в своїх домівках як місцеві сімейні святилища, що називаються #italic Камідана#! для вшанування Камі, так і #italic Буцудан#! як $buddhist_ADJ$ вівтар для своїх предків."
  fukko_shinto: "Фукко $shinto$"
  fukko_shinto_desc: "Оскільки люди відкидають іноземний вплив на нашу культуру, так само вони відкидають змішування $buddhist_ADJ$ та $SECT_CONFUCIANISM_NAME$ у нашій вірі. Згідно з цією думкою, необхідне відродження $shinto$."
  jap_bushido: "Бусідо"
  jap_bushido_desc: "Хоча ніколи насправді не кодифікований конкретними правилами, спосіб поведінки воїна є чітким. Обов'язок воїна — битися і перемагати в битві, і розширювати славу свого клану, незалежно від методів, необхідних для досягнення цього."
  jap_land_of_the_rising_sun: "Країна Вранішнього Сонця"
  jap_land_of_the_rising_sun_desc: "Земля Японії — це земля з довгою та славетною історією. Наша унікальна культурна традиція, наші хоробрі солдати та наша непереможна географія роблять нас сильнішими за багато інших держав у нашому регіоні. Настав час Країні Вранішнього Сонця зайняти своє місце серед великих націй цього світу!"
  jap_ancestral_legacy: "Спадщина предків"
  jap_ancestral_legacy_desc: "Родовід нашого клану добре відомий і є опорою, яку ми повинні підтримувати та зберігати. Саме наша минула історія визначає нас і забезпечує наше право на правління."
  jap_shinobi: "Шінобі но Моно"
  jap_shinobi_desc: "Інформація є ключовою для отримання будь-якої переваги. З цією метою ми здавна використовували шпигунів та інфільтраторів для збору інформації. Ці $jap_shinobi$ зазвичай належать до класу самураїв, хоча їх також можна набирати з місцевого населення, і їх відправляють на ворожі землі, щоб вони влилися в їхнє суспільство та створили мережу інформації, якою ми зможемо скористатися згодом."
  jap_head_hunting: "Полювання за головами"
  jap_head_hunting_desc: "Досягнення воїна в битві можуть бути по-справжньому славетними лише тоді, коли вони фактично доведені. З цією метою самураї збиратимуть відрубані голови вбитих ворогів, щоб пізніше представити їх генералу. Чим численніші та важливіші голови, які бере самурай, тим кращі винагороди він отримає за це."
  jap_ichiban_yari: "Ічібан Ярі"
  jap_ichiban_yari_desc: "Бути першим воїном, який завдав шкоди ворогу, є великою честю, і тому наші воїни прагнуть бути першим списом, який розсіче сили противника, коли з'явиться така можливість."
  jap_ashigaru: "Асіґару"
  jap_ashigaru_desc: "Війна завжди була територією могутніх самураїв. Однак останні події довели необхідність значно більшого джерела військ, ніж просто самураї, а також включення селянських військ. Ці асіґару не будуть простою черню, оскільки їхнє постійне навчання та великий бойовий досвід роблять їх грізними бійцями, здатними стояти на рівних із самураями."
  jap_daiku_construction: "Будівництво Дайку"
  jap_daiku_construction_desc: "Будівництво будівель з використанням традиційних технік теслярства, або #italic дайку#!, було присутнє в $japan_region$ з моменту його заснування. Наші дерев'яні будівлі стійкі, але гнучкі, і ними захоплюються всі. Від найнижчої хатини до найвищого палацу, дерево завжди присутнє в наших будівлях."
  jap_wandering_ronin: "Мандрівний Ронін"
  jap_wandering_ronin_desc: "Дуже поширено для самураїв блукати землями в пошуках найкращої посади, змінюючи свою вірність тому володарю, який платить їм найбільше. Ці люди приходять і йдуть, як хвилі, але ми завжди можемо їх використати."
  jap_reformed_land_holding: "Реформоване землеволодіння"
  jap_reformed_land_holding_desc: "Традиційно земля оцінювалася за розміром, але це не враховувало, що не вся земля однакова. Відтепер її вартість буде оцінюватися відповідно до вартості рису, який можна на ній виростити. Це полегшить нам максимальне використання нашої території."
  jap_jokamachi: "Дзьокамачі"
  jap_jokamachi_desc: "Бурхливі часи становлять серйозну небезпеку для населення, тому воно схильне збиратися навколо безпеки укріплених місць. Зростання міст навколо укріплених замків, безсумнівно, привабить до них торгівлю та процвітання."
  jap_terakoya: "Теракоя"
  jap_terakoya_desc: "Ці приватні школи надають базову освіту простолюдинам, сприяючи грамотності, лічбі та моральним цінностям. Школи Теракоя відіграють життєво важливу роль у вихованні більш освіченого та соціально обізнаного населення, сприяючи стабільності та прогресу країни в цю епоху."
  jap_codified_bushido: "Кодифіковане Бусідо"
  jap_codified_bushido_desc: "Очікувана поведінка воїна все більше ідеалізується, а такі цінності, як честь і вірність, набувають більшого значення, ніж їхня фактична корисність у реальному бою. Ця романтизована та кодифікована версія Бусідо, однак, безумовно, покращить сприйняття наших армій, навіть якщо це не відповідає їхній фактичній поведінці."
  kgk_omi_genji: "Омі-Гендзі"
  kgk_omi_genji_desc: "Наші предки колись належали до клану Уда Гендзі родини Мінамото, і ми були Сюго Омі протягом поколінь. Наше право захищати його забезпечене."
  kgk_emerging_clan: "Клан, що виникає"
  kgk_emerging_clan_desc: "Незважаючи на нашу спадщину предків, наш клан як відгалуження клану Сасакі є відносно недавнім. Тому наші люди відчувають потребу довести свою цінність як незалежне ім'я."
  akt_march_of_akita: "Марш Акіти"
  akt_march_of_akita_desc: "Наш феод Акіта в північній провінції Дева був давньою зоною конфлікту проти північних «варварів». Кордон Японії розширився далеко на північ, але дух наших предків все ще живе в нашій крові."
  akt_ezo_kanrei: "Едзо Канрей"
  akt_ezo_kanrei_desc: "Посада Едзо Канрей (адміністратора $ezo_area$) була призначена нашому клану з часів сьогунату Камакура. Ми відповідаємо за управління островом як місцем вигнання для злочинців, тому підтримуємо тісні контакти через протоку."
  akt_ainu_trade: "Торгівля з $ainu_culture$"
  akt_ainu_trade_desc: "Ми одні з перших $japanese_group$, хто встановив постійну торгівлю з $ainu_culture$. Наші кораблі курсують між їхніми землями та нашими, що приносить велику користь обом."
  asa_legacy_of_emperor_keitai: "Спадщина імператора Кейтая"
  asa_legacy_of_emperor_keitai_desc: "Багато століть тому імператор Кейтай використав Етідзен, щоб розпочати свою війну за імператорський трон. Подібно до нього, ми не повинні вагатися проектувати владу за межі наших кордонів і розпочинати вторгнення в сусідні царства, коли цього вимагає ситуація."
  asa_control_of_buddhist_sects: "Контроль над буддійськими сектами"
  asa_control_of_buddhist_sects_desc: "Етідзен є домом для багатьох важливих храмів різних сект, таких як Ейхейдзі секти Сото та Хейсендзі секти Тендай. Якби ми могли контролювати їх усі та встановити конфесійний мир у провінції, ми мали б основу ідеальної релігійної політики для всієї нашої території."
  ask_defender_of_the_imperial_court: "Захисники Імператорського двору"
  ask_defender_of_the_imperial_court_desc: "Коли сьогунат Камакура впав, ми зберегли Імператора та Імператорський двір у безпеці. Це забезпечило нам позицію на чолі всіх кланів Японії, як справжнього захисника Імперії та придворних традицій."
  ask_bugyoshu_and_hokushu: "Буґьосю та Хокосю"
  ask_bugyoshu_and_hokushu_desc: "Ми повинні зміцнити чиновників нашої адміністрації, таких як магістрати Буґьосю та командири Хокосю. Сильна бюрократія іноді буде єдиним, що стоїть між нами та відкритою громадянською війною."
  ask_higashiyama_culture: "Культура Хіґашіяма"
  ask_higashiyama_culture_desc: "Побудована навколо аскетизму дзен-буддизму, культура Хіґашіяма бачить красу в простоті. Вона сприяє розвитку чайної церемонії, аранжування квітів, театру та мистецтва. Це розквіт культури приніс великий престиж тим, хто її практикує, і чудово відіб'ється на нас."
  ask_shugo_system: "Система Сюґо"
  ask_shugo_system_desc: "Сюґо є важливими васалами для Сьоґунату, що управляють землями від імені $JAPANESE_SHOGUNATE_LEADER_MALE$. Завдяки їм ми можемо краще та ефективніше управляти нашими землями."
  cba_lineage_of_taira: "Родовід Тайра"
  cba_lineage_of_taira_desc: "Клан Чіба є старою гілкою Тайра з пізнього періоду Хейан. Цей факт дає нам більше влади та впливу, ніж могла б вказувати наша політична ситуація."
  cba_katori_jingu: "$katori_shrine$"
  cba_katori_jingu_desc: "$katori_shrine$ поклоняється Фуцунуші но Камі, богу-покровителю бойових мистецтв, і тому шанується всіма воїнами Японії. Ми повинні використати цей факт для покращення наших власних самураїв."
  cba_dream_of_masakado: "Мрія Масакадо"
  cba_dream_of_masakado_desc: "Тайра но Масакадо, великий воїн і близький родич нашого клану в давню епоху, одного разу намагався стати імператором Східної Японії. На жаль, Масакадо не зміг здійснити свою амбіцію, але його мрія створити нову країну для самураїв повинна бути нашим дороговказом завжди."
  cba_irrigation_of_southern_kanto: "Іригація Південного Канто"
  cba_irrigation_of_southern_kanto_desc: "Значні частини наших володінь є болотистими територіями, які не підтримували б інтенсивного землеробства. Однак останні технологічні розробки в галузі іригації дозволяють нам обробляти нові поля та осушувати болота за потреби. Давайте розпочнемо грандіозний проєкт розвитку земель під нашим контролем для покращення економіки."
  csk_clans_of_tosa: "Клани Тоса"
  csk_clans_of_tosa_desc: "Наша рідна провінція Тоса традиційно розділена між могутніми кланами. Якщо ми хочемо розширюватися далі, ми повинні об'єднатися. Вони допоможуть нам піднятися, а натомість ми збільшимо їхню владу."
  csk_god_of_arts: "Бог Мистецтв"
  csk_god_of_arts_desc: "Прабатько нашого клану, Хата но Кавакацу, був високо шанований як бог-покровитель усього мистецтва, від традиційних танців до театру. Наш клан повинен жити відповідно до його спадщини, якщо він хоче заслужити повагу японського народу."
  csk_unification_of_shikoku: "Об'єднання Шікоку"
  csk_unification_of_shikoku_desc: "Шікоку розглядається рештою Японії як бідна, ізольована земля, де нічого важливого не відбувається. Нехай вони продовжують так думати і не помічають нашого об'єднання острова, доки не стане занадто пізно."
  csk_expand_the_navy: "Розширити флот"
  csk_expand_the_navy_desc: "Японія — острівна держава, і для процвітання тут потрібен сильний флот. Тоса — ідеальне місце для початку будівництва власної армади."
  dte_fujiwara_hokke: "$fujiwara$ Хокке"
  dte_fujiwara_hokke_desc: "Як одна з гілок північного дому $fujiwara$, легітимність нашого правління є беззаперечною."
  dte_oshu_shugo: "Осю Сюґо"
  dte_oshu_shugo_desc: "Будучи поважним кланом, що бере свій початок з раннього періоду Камакура, ми маємо вагомі претензії на панування над усією провінцією Осю. На щастя для нас, точні межі земель Осю нечітко визначені."
  dte_dragon_of_oshu: "Дракон Осю"
  dte_dragon_of_oshu_desc: "Наша міць і сила будуть предметом заздрості наших ворогів. Наше ім'я назавжди буде асоціюватися з Драконом Осю."
  dte_intensive_domain_development: "Інтенсивний Розвиток Доменів"
  dte_intensive_domain_development_desc: "Сувора погода та гірський рельєф роблять $ou_area$ бідним регіоном в очах багатьох. Однак існує великий потенціал для покращення наших земель. Засновуючи нові міста, заохочуючи та захищаючи торгівлю, будуючи водні шляхи та збільшуючи оброблювані землі, ми можемо суттєво покращити наше серце. Скасувавши обтяжливі мита та податки, ми також можемо зробити наших підданих заможними, а регіон – процвітаючим."
  htk_hatakeyama_heritage: "Спадщина Хатакеяма"
  htk_hatakeyama_heritage_desc: "Деякі вважають лідерів нашого клану бунтівними порушниками спокою через минулу історію нашого кланового імені. Однак це лише ознака нашої стійкості. Ми відродилися, ми ніколи не здамося і будемо боротися за те, що належить нам, незалежно від того, хто нам протистоїть!"
  htk_shogunate_ties: "Зв'язки з Сьогунатом"
  htk_shogunate_ties_desc: "Як клан, що походить з однієї з гілок Асікага, наші зв'язки з владою Сьогунату міцні. Наша асоціація з ним завжди забезпечуватиме нам високу повагу."
  htk_clan_spread: "Поширення Клану"
  htk_clan_spread_desc: "Ми не задоволені обмеженням нашого клану одним місцем і намагаємося поширити наш вплив по всій країні. Незалежно від того, наскільки далеко ми поширимося, влада нашого клану буде беззаперечною на всій нашій території."
  hsk_rising_clan: "Зростаючий Клан"
  hsk_rising_clan_desc: "Хоча наше походження відносно скромне, навіть порівняно з іншими кланами, що походять від Асікага, ми все ж зуміли значно збільшити свій вплив. Наш клан безумовно зростає, і ми продовжуватимемо це робити."
  hsk_control_of_izumi_sea: "Контроль над Морем Ідзумі"
  hsk_control_of_izumi_sea_desc: "Території нашого клану традиційно розташовувалися навколо протоки Кії. Контроль над торгівлею, що надходить на материк через неї, дозволить нам отримати з цього великий прибуток і надзвичайно процвітати."
  hsk_branches_and_retainers: "Гілки та Васали"
  hsk_branches_and_retainers_desc: "Наша кровна лінія широко розповсюджена, і наші родичі та васали володіють кількома багатими територіями, зберігаючи при цьому свою вірність лідеру клану. Завдяки внутрішній гармонії наш клан буде одним з наймогутніших у Японії."
  img_claim_to_shogunate: "Претензія на Сьогунат"
  img_claim_to_shogunate_desc: "Оскільки наш клан походить від родини Асікага, ми маємо вагомі претензії на те, щоб взяти на себе мантію $JAPANESE_SHOGUNATE_LEADER_MALE$, якщо основна лінія згасне. Хоча Бакуфу зараз здається в безпеці, ми повинні забезпечити, щоб ніхто не забув, що є нашим правом народження."
  img_supreme_ruler_of_tokaido: "Контроль над Токайдо"
  img_supreme_ruler_of_tokaido_desc: "Токайдо — найважливіший торговий шлях між Центральною та Східною Японією. Наші землі традиційно знаходилися посередині нього, що дозволило б нам здійснювати контроль над цим регіоном, щоб ми могли контролювати економіку всього регіону."
  img_unlikely_alliances: "Малоймовірні Союзи"
  img_unlikely_alliances_desc: "Іноді найкращий спосіб перемогти ворога — зробити його своїм другом. Забезпечення наших флангів через шлюб не тільки умиротворить наших ворогів і одночасно принесе нам нових союзників, але й забезпечить, що ми зможемо зрештою домінувати над ними також через кров."
  img_march_to_kyoto: "Похід на $kyoto$"
  img_march_to_kyoto_desc: "У часи, коли Японія та $kyoto$ загрузли в політичному хаосі, будь-хто міг би подумати про похід на столицю та захоплення влади. Як близькі родичі Асікага, це наш обов'язок і наше право забезпечити стабільність країни."
  isk_sanindo_gate: "Брама $sanindou_area$"
  isk_sanindo_gate_desc: "Провінція $tango_province$ є брамою $kyoto$ у $sanindou_area$ та землею великого економічного значення. Міцно утвердившись і розширивши нашу присутність там, ми зможемо скористатися таким процвітанням."
  isk_minister_of_samurai_dokoro: "Міністр Самурай-Докоро"
  isk_minister_of_samurai_dokoro_desc: "Ми є одним із чотирьох могутніх кланів, які традиційно призначаються головними військовими та поліцейськими в Самурай-Докоро. Таким чином, це наш обов'язок і наш привілей підтримувати мир у столиці та інших важливих районах."
  ito_gokenin_family: "Родина Гокенін"
  ito_gokenin_family_desc: "Наші предки допомагали Мінамото но Йорітомо під час заснування Камакурського сьогунату. В нагороду за цей внесок ми були зараховані до його гокенінів і отримали феод у провінції $hyuuga_province$. Це честь, якою мало які родини на Кюсю користуються."
  ito_sympathy_to_foreign_faiths: "Симпатія до нових вірувань"
  ito_sympathy_to_foreign_faiths_desc: "Іноземці, що прибувають на нашу землю, приносять із собою чужі вірування. Ми, звичайно, повинні переконатися, що це не шкодить традиційним релігіям, але доки це не шкодить нам, немає причин забороняти людям обирати власну віру."
  kkc_disinguished_family_in_kyushu: "Видатна родина"
  kkc_disinguished_family_in_kyushu_desc: "На відміну від інших могутніх кланів на Кюсю, наша родина оселилася тут до заснування Камакурського сьогунату. Наші досягнення добре відомі, і наше ім'я шановане."
  kkc_resistance_against_foreign_intervention: "Опір вторгненням"
  kkc_resistance_against_foreign_intervention_desc: "Наш внесок у захист країни під час монгольських вторгнень добре відомий. Досягнення Кікучі Такефуси у відбитті загарбників вихваляються, і всі наші війська прагнуть битися так само хоробро, як і він."
  ktb_southern_court: "Прихильники Імператора"
  ktb_southern_court_desc: "Хоча імператорська гілка втратила політичний вплив, ми все ще відомі тим, що виявляємо свою палку підтримку Південному Двору після їхнього розколу. Ця репутація вірної служби Хризантемовому Трону покаже світові, що ми маємо більшу рішучість, ніж багато менших домів, які зараз домінують у Японії."
  ktb_control_of_ise: "Контроль над $ise_province$"
  ktb_control_of_ise_desc: "Від багатого півдня до густонаселеної та урбанізованої півночі ми зуміли поширити свій контроль на всю провінцію $ise_province$. Це дозволить нам використовувати весь потенціал ресурсів провінції для подальшого зростання впливу нашого клану."
  ktb_blessing_of_amaterasu: "Благословення Аматерасу"
  ktb_blessing_of_amaterasu_desc: "Як хранителі найсвятіших святилищ $japan_region$ у $ise_province$, ми благословенні богинею сонця та всесвіту. Ми повинні стати гідними завдання підтримувати та піклуватися про цей національний скарб, що принесе нам повагу $japanese_group$ народу."
  ktb_the_march_of_kitabatake_akiee: "Похід Кітабатаке Акіє"
  ktb_the_march_of_kitabatake_akiee_desc: "Наш почесний предок Кітабатаке Акіє довів, що навіть похід з $ou_area$ до центральної Японії можна здійснити швидко, якщо мати достатньо рішучості. Ми повинні вчитися на такому подвигу та тренувати наші армії для швидких маневрів, щоб ми могли швидко переміщатися з одного фронту на інший, якщо цього вимагатиме ситуація."
  kno_shugo_of_iyo: "Шуго $iyo_province$"
  kno_shugo_of_iyo_desc: "З кінця періоду Хейан у 12 столітті ми були найбільшою морською державою у Внутрішньому морі Сето, і наш сильний флот – це те, як ми отримали титул Шуго цієї провінції."
  kno_ruler_of_inland_sea: "Правління над Внутрішнім морем"
  kno_ruler_of_inland_sea_desc: "Внутрішнє море Сето має особливе значення для торговельних шляхів Японії, і підтримка морського панування тут може як створити, так і зруйнувати наш клан. Ми повинні забезпечити, щоб у нас завжди був сильний флот для контролю над морською торгівлею."
  kno_murakami_suigun: "Муракамі Суйгун"
  kno_murakami_suigun_desc: "Клан Муракамі відомий як банда піратів, що діяла у Внутрішньому морі Сето. Давайте повністю інтегруємо їх у наш клан і відправимо цих грізних каперів проти наших ворогів!"
  mri_descendant_of_oe_hiromoto: "Нащадки Ое но Хіромото"
  mri_descendant_of_oe_hiromoto_desc: "Ое но Хіромото, вчений і політик, який зробив великий внесок у створення Камакурського сьогунату, був предком нашого клану. Донині його дух живе в нашому клані, і ми пишаємося тим, що підтримуємо ефективну адміністрацію."
  mri_munakata_three_goddesses: "Три богині Мунаката"
  mri_munakata_three_goddesses_desc: "Три дочки Сусаноо-но-Мікото є покровительками моря та навігації. Їхнє благословення зробить наші флоти непереможними на морі."
  nbu_genji_in_the_north: "Осю Гендзі"
  nbu_genji_in_the_north_desc: "Ми спочатку є молодшою гілкою клану Кай Гендзі, і наш засновник отримав феод у провінції Осю в XII столітті як нагороду за вірну службу Камакурському сьогунату. Після цього ми звикли до цього регіону з його суворою зимою і знаємо, як використовувати ці умови в наших стратегіях і тактиках."
  nbu_fight_against_famines: "Перемога над голодом"
  nbu_fight_against_famines_desc: "Через холодні вітри пізньої осені та сильні снігопади до ранньої весни наш народ часто страждає від сильного голоду. Ми повинні створити запаси їжі та дослідити, як ми можемо покращити землі під нашим контролем, щоб протистояти майбутнім катастрофам."
  nbu_northern_horses: "Північні коні"
  nbu_northern_horses_desc: "Муцу має ранчо, звідки в давнину люди відправляли коней до Кіото. Традиція конярства продовжується, і ми повинні її розвивати, оскільки це дозволяє нам легше вирощувати кавалерію, ніж багатьом нашим сусідам."
  oda_uninspiring_clan: "Невразливий клан"
  oda_uninspiring_clan_desc: "Незважаючи на давній родовід, наш клан, очевидно, не такий значущий, як наші сусіди. Їхня недооцінка нашої сили виявиться їхньою загибеллю."
  oda_generals: "Генерали $ODA$"
  oda_generals_desc: "Одержимість походженням і привілеями зробила цю країну слабкою, і піднесення саморобних могутніх кланів по всьому королівству чітко довело, наскільки марними можуть бути такі поняття. Візьмемо цей урок до серця і нехай успіх і майстерність будуть керівним принципом для тих, хто повинен командувати нашими арміями. Сильне лідерство є вимогою для швидкої експансії."
  oda_tenka_fubu: "Тенка Фубу"
  oda_tenka_fubu_desc: "Очевидно, наша доля — тримати всю країну в наших руках. Ніхто не буде чинити опір нашій владі, і всі під Небесами схиляться перед нашою військовою міццю."
  oda_triple_firing: "Потрійний постріл"
  oda_triple_firing_desc: "Поява вогнепальної зброї революціонізувала і продовжуватиме революціонізувати війну на Японському архіпелазі, і, опанувавши цю нову зброю, ми зможемо домінувати на будь-якому полі бою. Щоб збільшити швидкість їхнього вогню, наші аркебузири будуть формувати ряди, дозволяючи одному стріляти, поки двоє інших перезаряджають."
  oda_influential_strongholds: "Впливові фортеці"
  oda_influential_strongholds_desc: "$japan_region$ багато в чому є країною замків і укріплень. Саме завдяки будівництву міцних оборонних позицій можна утвердити вплив як у політичній сфері, так і на маршрутах, життєво важливих для військових кампаній. Цей урок ми повинні взяти до серця. Саме через замки ми переконуємося, що люди постійно пам'ятають про нашу присутність і владу. Завжди ми повинні надавати пріоритет зменшенню ворожих укріплень і зведенню власних у стратегічних місцях."
  oda_patronization_of_the_west: "Заступництво Заходу"
  oda_patronization_of_the_west_desc: "Західні місіонери принесли багато ідей і технік на нашу землю, і, на відміну від старих буддійських сект, вони не мають попередніх зв'язків з корумпованими землевласниками або бунтівними містами. Ми повинні вітати західників у наших містах і вивчити переваги, які вони можуть принести нашому двору."
  ogs_ogasawara_ryu: "Огасавара-Рю"
  ogs_ogasawara_ryu_desc: "Традиційні стилі мають високу цінність у нашому суспільстві. Ми формалізували систему бойових мистецтв та етикету з тих пір, як засновник нашого клану, Огасавара Нагакійо, спочатку розробив нашу власну школу. Всі самураї повинні вивчати шляхи нашої школи."
  ogs_shinano_shugo: "$shinano_province$ Сюґо"
  ogs_shinano_shugo_desc: "Наш клан належить до старої підгілки Ґендзі та править провінцією $shinano_province$ як її сюґо. Ця земля гориста й непривітна для декого. Однак для нашого народу вона довгий час була невід'ємною частиною нашої оборони від чужинців. Візьмімо цей досвід із собою, куди б не йшли наші армії, і завжди дбаймо про отримання доброї місцевої інформації, щоб максимально використовувати рельєф у будь-якому регіоні, де ми ведемо битву."
  ogs_kiso_uma: "Кісо-Ума"
  ogs_kiso_uma_desc: "Коні в районі Кісо — наші унікальні друзі. Вони не такі високі чи швидкі, як інші типи, але вони мають високу витривалість і міцні, щоб виживати в горах."
  ogs_improvment_of_nakasendo: "Покращення Накасендо"
  ogs_improvment_of_nakasendo_desc: "Накасендо — один із найважливіших шляхів між центральною та східною Японією. Контроль над ним також означає контроль над торгівлею, що проходить через нього."
  suw_suwa_taisha: "Сува Тайся"
  suw_suwa_taisha_desc: "Сува Тайся на озері Сува — одне з найстаріших святилищ у Японії, яке дуже шанують не лише в Сінано. Його найважливіший фестиваль, Онбасіра-мацурі, доводить хоробрість нашого народу, коли вони транспортують священні колоди з гори до святилища."
  otm_lord_of_bungo: "Володар Бунґо"
  otm_lord_of_bungo_desc: "Ми є сюґо Бунґо з епохи Камакура. Ці землі відомі своїми дуже родючими ґрунтами, а багаті врожаї цього регіону дозволяють нам годувати більші армії, ніж багато інших $daimyo$."
  otm_domination_of_kyushu: "Панування Кюсю"
  otm_domination_of_kyushu_desc: "Нас призначено сюґо $bungo_province$, $hizen_province$ та $hyuuga_province$. Ми маємо сильну позицію, щоб претендувати на весь острів Кюсю для себе."
  otm_nanban_trade: "Вітаємо торгівлю Нанбан"
  otm_nanban_trade_desc: "Інші можуть цуратися іноземців як варварів, але ми визнаємо переваги та вигоди торгівлі з ними. Нехай буде відомо, що вони завжди будуть бажаними в наших портах, і ми зможемо розширити нашу торговельну мережу далі, ніж наші суперники."
  otm_christian_conversion: "Християнські навернені"
  otm_christian_conversion_desc: "Наші зростаючі взаємодії з іноземцями привернули інтерес багатьох у нашому клані до християнської віри. Християни мають багато могутніх покровителів серед наших володарів і васалів, і мало хто є таким ревним, як нещодавно навернені. Використаймо цих християнських навернених, незалежно від того, який шлях обере наш власний клан, і використаймо їхній вплив та їхню ревність для просування нашої справи."
  ouc_descendant_of_baekje: "Нащадок Пекче"
  ouc_descendant_of_baekje_desc: "Наша хроніка свідчить, що ми є нащадками принца Імсонга з королівського дому стародавнього королівства Пекче на Корейському півострові. Ця легенда дає нам престижне становище у Східній Азії."
  ouc_korea_trade: "Корейська торгівля"
  ouc_korea_trade_desc: "Наше географічне положення зробило нас найактивнішим кланом для торгівлі з Кореєю, і багато екзотичних товарів практично монополізовані нашими купцями. Ми повинні зробити все можливе, щоб зберегти це сприятливе становище та використати його, щоб перевершити будь-якого вискочку, який кинув би нам виклик."
  ouc_fight_against_wokou: "Захист від піратства"
  ouc_fight_against_wokou_desc: "Щоб підтримувати добрі відносини з континентом для наших торговців, нам потрібно постійно патрулювати море. Поки пірати та контрабандисти поширені в цих водах, іноземці не довірятимуть нам і можуть діяти проти нас."
  ouc_welcome_missionaries: "Вітаємо західників"
  ouc_welcome_missionaries_desc: "Коли наша торговельна мережа починає розширюватися, ми контактуємо з більшою кількістю іноземців та більшою кількістю вірувань. Незалежно від того, у що вони вірять, їхня монета добра, і тому ми повинні бути настільки відкритими до їхніх ідей, наскільки це необхідно для забезпечення їхньої торгівлі."
  stk_hitachi_genji: "$hitachi_province$ Ґендзі"
  stk_hitachi_genji_desc: "Ми є одними з найстаріших Гендзі в регіоні Канто і боролися за славу нашого клану у Східній Японії ще до того, як Мінамото но Йорітомо заснував Камакурський сьогунат. Наша позиція Сюго $hitachi_province$ є, таким чином, беззаперечною."
  stk_kashima_jingu: "$kashima_shrine$"
  stk_kashima_jingu_desc: "$kashima_shrine$ є одним із трьох найважливіших святилищ у Канто. Це святилище поклоняється Такемікадзуті-но-О-но-Камі, який є богом грому та мечів, а також відомий як покровитель боротьби $sumo$. Опіка над цим святилищем зміцнює рішучість наших армій."
  stk_eastern_coalitions: "Східні коаліції"
  stk_eastern_coalitions_desc: "Незалежно від ворожих кланів навколо нас, ми завжди добре представляли себе як розумну третю сторону, до якої інші клани могли б приєднатися, щоб отримати захист від загарбників. Ця традиція східних коаліцій добре послужить нам, доки ми будемо переконуватися, що клани, які покладаються на нас, ніколи не повинні турбуватися про захист."
  sba_multiple_shugo: "Кілька Сюго"
  sba_multiple_shugo_desc: "Нас призначили Сюго кількох провінцій. Ці землі дозволяють нам збагачуватися за рахунок рисових полів та майстерень найвправніших ремісників Японії."
  sba_access_to_northern_japan: "Зв'язки з Осю"
  sba_access_to_northern_japan_desc: "Провінція Осю є нашим другим домом і джерелом нашого клану. Ми повинні використовувати наші зв'язки з Осю, щоб забезпечити сильних бойових коней цього регіону."
  sba_shiba_retainers: "Васали $SBA$"
  sba_shiba_retainers_desc: "У нашому клані є талановиті, але амбітні васали. Ці родини також іноді можуть бути причиною розколу в нашій родині, однак, і нам було б мудро тримати їх у вузді. Пильний нагляд та достатні винагороди могли б зробити ці родини найбільшими активами нашого правління."
  smz_satsuma_shugo: "Сюго $satsuma_province$"
  smz_satsuma_shugo_desc: "Ми завжди традиційно були Сюго провінції $satsuma_province$, аж до того, що її назва стала синонімом нашого клану. Наші воїни пишаються цим фактом і готові битися за нас."
  smz_tsurinobuse: "Цурінобусе"
  smz_tsurinobuse_desc: "Цурінобусе, «приманка та засідка», є нашою найефективнішою тактикою, яка дозволяє нам перемагати ворогів, що переважають чисельністю. Ми повинні зробити це центральною тактикою наших армій і дивувати тупоголових командирів інших кланів."
  smz_shimazu_charge: "Атака $SMZ$"
  smz_shimazu_charge_desc: "Навіть оточені та переважаючі чисельністю, наші солдати продовжуватимуть рухатися вперед, доки не досягнуть іншої сторони ворожих ліній. Атака наших військ буде легендарною."
  smz_tanegashima: "Танегасіма Теппо"
  smz_tanegashima_desc: "Західники, які вперше висадилися на острові Танегасіма, привезли з собою нову та цікаву зброю. Ці аркебузи стають все більш поширеним явищем по всьому $japan_region$, але ніде вони не були доступні так довго, як тут."
  smz_early_westernization: "Рання вестернізація"
  smz_early_westernization_desc: "Завдяки частим і раннім контактам із західними країнами ми багато дізналися про іноземні технології та ідеї. На їх основі ми можемо провести реформи в економіці, промисловості та освіті, щоб допомогти нам отримати перевагу над іншими японськими кланами."
  shn_vice_minister_of_dazaifu: "Віце-міністр Дадзайфу"
  shn_vice_minister_of_dazaifu_desc: "Як показує назва нашого клану, ми походимо від призначеного віце-міністра Дадзайфу в провінції $chikuzen_province$. Ця установа з давніх часів була дипломатичним і військовим центром регіону, і ми традиційно керуємо Північним Кюсю як представники Імператорів."
  shn_defender_against_mongols: "Захисник Японії"
  shn_defender_against_mongols_desc: "Як провідна самурайська родина в Північному Кюсю, ми хоробро боролися проти двох монгольських вторгнень. Якщо виникне потреба, ми знову повстанемо, щоб захистити як Кюсю, так і все царство від зовнішніх загарбників."
  shn_diplomacy_through_tsushima: "Дипломатія через Цусіму"
  shn_diplomacy_through_tsushima_desc: "Завдяки нашій присутності в $tsushima_province$ ми маємо багатий досвід переговорів з Кореєю через острів. Таким чином, ми завжди могли тримати канал зв'язку відкритим із зовнішнім світом, навіть у часи, коли офіційні відносини були заборонені."
  soo_tradition_of_wakou: "Традиція Вако"
  soo_tradition_of_wakou_desc: "Хоча ми цінуємо законну та мирну торгівлю за офіційним сертифікатом, нам потрібно готуватися до гірших ситуацій з військовою напругою. На щастя, піратська традиція на нашому острові може допомогти нам вирішити проблеми силою."
  soo_fight_for_tsushima: "Битва за Цусіму"
  soo_fight_for_tsushima_desc: "Розташована між Азійським континентом та Японськими островами, наша батьківщина $tsushima_province$ та її морська зона є місцем, де країни стикаються та запекло борються. Нехай наші флоти будуть сильними, щоб ми могли не тільки захищати нашу країну, але й розширювати її!"
  soo_bahan_ship: "Корабель Бахан"
  soo_bahan_ship_desc: "Наші каперські кораблі наводять жах, літаючи під прапором Хачімана. Ніхто не перехопить наш флот, захищений цим богом війни!"
  tkd_kai_shugo: "Шуґо $kai_province$"
  tkd_kai_shugo_desc: "Ми є нащадками Ґендзі з $kai_province$ і традиційно призначалися його Шуґо. Як такі, ми були нерозривно пов'язані з ним, а знамениті коні провінції вже є синонімом нашої кавалерії."
  tkd_takeda_ryu: "Такеда-Рю"
  tkd_takeda_ryu_desc: "Традиційні форми бойових мистецтв передавалися в нашій родині з покоління в покоління. Серед них велика увага приділяється верховій їзді та кінній стрільбі з лука, що робить наші кінні війська набагато ефективнішими солдатами."
  tkd_tiger_of_kai: "Тигр Каї"
  tkd_tiger_of_kai_desc: "Сильні лідери будуть надійнішим захистом для домену, ніж будь-яка кількість міцних замків. Наші генерали повинні наполегливо тренуватися для своєї майбутньої роботи та заслужити право називатися «Тигром Каї»."
  tkd_fuurinkazan: "Фурінказан"
  tkd_fuurinkazan_desc: "Швидкий, як вітер, ніжний, як ліс, агресивний, як вогонь, нерухомий, як гора. Слова великого майстра війни Сунь-Цзи будуть вигравірувані в імені нашої родини і стануть нашим девізом."
  tki_genji_in_mino: "Ґендзі з $mino_province$"
  tki_genji_in_mino_desc: "Як голова Ґендзі в $mino_province$ та його призначений Шуґо, ми керували іншими місцевими самураями протягом поколінь. Наш домен займає стратегічне положення, з якого можна контролювати сусідні регіони."
  tki_banner_of_bellflower: "Прапор Дзвоника"
  tki_banner_of_bellflower_desc: "Будучи його Шуґо протягом поколінь, наша емблема вже є синонімом $mino_province$. Усі чоловіки в ньому боротимуться під нашим прапором."
  tki_flood_control_of_three_rivers: "Контроль повеней"
  tki_flood_control_of_three_rivers_desc: "У нашій рідній провінції три великі річки Кісо, Наґара та Ібі часто спричиняють серйозні повені на наших рисових полях. Ми повинні контролювати такі потоки та збільшувати родючість наших земель у всіх провінціях під нашим правлінням."
  ues_strong_dynastic_ties: "Міцні династичні зв'язки"
  ues_strong_dynastic_ties_desc: "Наша родина походить з престижної лінії POSTEDIT_Фуджівара, і ми також маємо міцні зв'язки з Асікаґа, оскільки мати Асікаґи Такаудзі була членом нашого клану. Ці династичні зв'язки виявляться безцінними для процвітання нашого клану."
  ues_double_shugo: "Подвійний Шуґо"
  ues_double_shugo_desc: "Нас призначено Сюго провінцій $kouzuke_province$ та $tango_province$. Їхні багаті землі добре послужать нашому розширенню."
  ues_eastern_power: "Східна Сила"
  ues_eastern_power_desc: "Хоча нам було надано території як на Сході, так і на Заході $japan_region$, саме на сході ми зможемо краще процвітати. З наших багатих територій там ми можемо отримати багато воїнів для боротьби за нашу справу."
  ues_dragon_of_echigo: "Дракон Етіґо"
  ues_dragon_of_echigo_desc: "Наш клан виховав дух мужності та справедливості, що змусить ворогів боятися нас на полі бою. Ми повинні дати світові знати про силу лідерів нашого клану. Кожен боятиметься і поважатиме Дракона Етіґо."
  utn_fujiwara_descendant: "Нащадок $fujiwara$"
  utn_fujiwara_descendant_desc: "Генеалогія свідчить, що предки нашого клану спочатку були членами родини $fujiwara$ в $kyoto$. Ця спорідненість з такою давньою та шанованою родиною є тією, яку ми все ще можемо використовувати у формі дипломатичних зв'язків з Імператорським двором та іншими кланами."
  utn_legacy_of_nasu_no_yoichi: "Спадщина Насу но Йоїчі"
  utn_legacy_of_nasu_no_yoichi_desc: "$shimotsuke_province$ колись був домом Насу но Йоїчі, який відомий своєю майстерністю лучника у старій війні Ґемпей. До цього дня воїни $shimotsuke_province$ високо цінували його, і нас також називали «найкращими лучниками Канто»."
  utn_mediator_of_kanto: "Посередник Канто"
  utn_mediator_of_kanto_desc: "Як один з найстаріших кланів Канто, ми маємо глибоке розуміння політики в цьому регіоні і багато разів виступали посередником між різними фракціями. Таким чином, ми також знаємо, як ефективно розширювати нашу територію, не викликаючи ненависті та страху інших."
  ymn_descendant_of_nitta: "Нащадок Нітти"
  ymn_descendant_of_nitta_desc: "Ми є нащадками клану Нітта, найбільшого суперника старої родини Асікаґа. Для одних це буде доказом нашої лояльності, тоді як для інших це робить нас природним опозиційним кандидатом. Ми повинні вміло використовувати цей родовід у багатьох політичних ініціативах цієї епохи."
  ymn_mediate_succession_disputes: "Посередництво у суперечках про спадщину"
  ymn_mediate_succession_disputes_desc: "Оскільки багато інших кланів Сюго сперечаються між собою щодо того, хто є законним спадкоємцем, вони звертаються до нас за допомогою у врегулюванні їхніх суперечок. Роблячи це, ми можемо отримати більше союзників і контактів, не кажучи вже про дестабілізацію наших суперників."
  ymn_leader_of_western_army: "Західна Армія"
  ymn_leader_of_western_army_desc: "Давайте створимо велику західну армію, щоб об'єднати ворогуючі держави Японії. Хоробрість і вмілі генерали з добре навченими солдатами легко змусять східняків стати на коліна!"
  ymn_isolated_heartland: "Ізольоване Серце"
  ymn_isolated_heartland_desc: "Наші рідні землі гористі та ізольовані. На щастя, це також означає, що до них буде важко дістатися будь-якому потенційному завойовнику. Давайте побудуємо нашу оборону навколо природних переваг нашої географії та змусимо будь-якого нападника пошкодувати, що він коли-небудь звернув свої жадібні очі на наші володіння."
  dahomey_amazons: "Амазонки Дагомеї"
  dahomey_amazons_desc: "Жіночий корпус воїнів, набраний з дружин короля. Завдяки своїй лютості в бою вони заслужили репутацію амазонок з грецької міфології, і вони обов'язково вселять страх у ворожі ряди. Ці $dahomey_amazons$ служать $DAH$ та його інтересам."
  dah_children_of_the_panther: "Діти Пантери"
  dah_children_of_the_panther_desc: "Наша стародавня легенда стверджує, що наш королівський рід походить від союзу принцеси та пантери. Ця стародавня казка може лише підвищити наш престиж та славу серед наших сусідів."
  dah_slave_hunts: "Полювання на рабів"
  dah_slave_hunts_desc: "Шляхом набігів на наших сусідів ми отримуємо рабів, яких можна не тільки використовувати економічно або обмінювати з нашими сусідами, але й змусити служити в нашій армії. Таким чином, ми збільшуємо кількість чоловіків, яких ми можемо закликати до зброї."
  dah_migan_mehu: "Міган і Меху"
  dah_migan_mehu_desc: "Міган і Меху — два головні міністри наших королів. Один наглядає за північчю, інший — за півднем; один — за правосуддям, інший — за торгівлею. Разом вони приносять мир і процвітання нашій землі."
  dah_lagredis: "Лагредіс"
  dah_lagredis_desc: "Запровадивши низку зніжених молодих шляхтичів до королівського гарему та представивши їх як королівських дружин, ми можемо надати їм свободу діяти непомітно як очі та вуха короля, особливо у справах палацових інтриг."
  dah_yovogan: "Йовоган"
  dah_yovogan_desc: "Оскільки все більше і більше іноземців прибуває до наших берегів, необхідно створити нову посаду в нашому уряді, щоб вивчати їхні звичаї та дізнаватися їхні секрети, щоб ми могли отримати від них користь."
  dah_dahomey_palaces: "Палаци Абомею"
  dah_dahomey_palaces_desc: "Величезний палацовий комплекс у нашій столиці був би певною ознакою нашої могутності для всіх, хто наважився б кинути їй виклик."
  kbo_ribat_fortifications: "Укріплення Рибат"
  kbo_ribat_fortifications_desc: "Використовувані в усьому $muslim_ADJ$ світі, ці невеликі укріплення дозволяли захищати каравани, комерційні центри та ізольовані громади."
  people_of_allah: "Народ $muslim_god_name$"
  people_of_allah_desc: "Ми є послідовниками $muslim_god_name$, єдиного істинного Бога, і дотримуємося Його Слова. Усі, хто вірить у Нього, є нашими братами та сестрами в Його очах."
  holy_revelation: "Святе Одкровення"
  holy_revelation_desc: "Слово $muslim_god_name$ було відкрито Його Пророку Мухаммаду, мир йому, і записано у Священному $common_string_quran$. Через його вірші воля $muslim_god_name$ передається Його вірним, і всі $muslim_ADJ$ віруючі повинні бути знайомі з його уривками."
  islamic_calligraphy: "Ісламська каліграфія"
  islamic_calligraphy_desc: "$muslim$ — це не тільки релігія миру, а й мистецтв. Каліграфія віршів $common_string_quran$ та імен пророків багато разів балансує між писанням та мистецтвом."
  islamic_prayer: "Ас-Салят Фард"
  islamic_prayer_desc: "Один із П'яти Стовпів $muslim$, Ас-Салят — це обов'язок для $muslim_ADJ$ вірного виконувати щоденні молитви. Хоча кількість разів, які потрібно молитися на день, і конкретні рухи при цьому можуть відрізнятися від школи до школи, акт щоденної молитви є постійним серед усіх $muslim$."
  zakah: "Аль-Закят Ваджиб"
  zakah_desc: "Один із П'яти Стовпів $muslim$, Аль-Закят — це форма милостині, що вважається релігійним обов'язком для будь-якого $muslim_ADJ$ вірного. Надання грошей для допомоги нужденним є обов'язковою благодійністю для кожного, хто може собі це дозволити, і це вважається податком."
  muslim_lineage: "$muslim_ADJ$ Родовід"
  muslim_lineage_desc: "З часів Мухаммада, мир йому, $muslim$ був нерозривно пов'язаний зі структурами правління. Таким чином, наш також є родом, легітимізованим самою вірою."
  muslim_caravans: "$muslim_ADJ$ Каравани"
  muslim_caravans_desc: "Від багатьох маршрутів Шовкового шляху до соляних шляхів через Сахару, наш народ має традицію вирушати в торгові караванні подорожі до далеких земель, надаючи широкий асортимент товарів по всьому $muslim_ADJ$ світу."
  islamic_golden_age: "Ісламська Золота Доба"
  islamic_golden_age_desc: "Попри те, що культурно славетні дні $muslim$ вже позаду, незаперечним є вплив, який $islamic_golden_age$ мав на весь світ, не лише в $muslim_ADJ$ країнах. Деякі з цих невірних країн лише зараз починають відкривати для себе нашу велич у мистецтві та науках, поки вони були застрягли в епоху невігластва."
  ramadan: "Рамадан"
  ramadan_desc: "На згадку про перше одкровення Пророку Мухаммаду, мир йому, місяць $ramadan$ є найсвятішим місяцем у $muslim$. Протягом цього місяця всі $muslim_ADJ$ вірні повинні виконувати Саум, піст і утримання протягом світлового дня, а також молитву та роздуми."
  sunnah: "Сунна"
  sunnah_desc: "Складаючись із традицій та практик, приписуваних Мухаммаду, мир йому, $sunnah$ є тим, як повинен поводитися кожен $muslim_ADJ$ вірний, а також тим, що дає $sunni$ його назву. Хоча різні школи юриспруденції можуть відрізнятися в деталях, всі вони мають свою основу в $sunnah$."
  imamate: "Імамат"
  imamate_desc: "Основою $shia_ADJ$ віри є те, що Мухаммад, мир йому, призначив Алі ібн Абі Таліба своїм наступником. Таким чином, фігура Імама є духовним лідером, що походить з роду Мухаммада, мир йому, щоб вести всіх $muslim_ADJ$ вірних."
  indian_sea_trade: "Індійська морська торгівля"
  indian_sea_trade_desc: "$muslim_ADJ$ торговці плавали водами $indian_ocean_region$ протягом поколінь, вирушаючи все далі в пошуках прибуткових товарів. Від східних берегів $africa$ до $india$ і навіть до пряних островів $indonesia_region$, води розсікаються $muslim_ADJ$ суднами."
  muslim_trade_communities: "$muslim_ADJ$ Торгові спільноти"
  muslim_trade_communities_desc: "Присутність $muslim_ADJ$ торговців у далеких землях зводить їх з багатьма різними народами та віруваннями. Створення торгових спільнот серед них дозволяє певне змішування та синкретизм їхніх вірувань зі справжнім Словом $muslim_god_name$."
  expansionist_faith: "Експансіоністська віра"
  expansionist_faith_desc: "У минулому $muslim$ дуже швидко поширився зі своїх витоків в $arabia_region$. Всього за кілька поколінь він зумів досягти від $iberia_region$ до $india$, що стало найшвидшою експансією, яку світ коли-небудь бачив. Тепер за нашими кордонами є нові землі, і, можливо, настав час для другої $muslim_ADJ$ експансії."
  blend_of_influences: "Суміш впливів"
  blend_of_influences_desc: "$muslim$ зміг поширитися в багатьох місцях з моменту свого зародження в $arabia_region$, і в цій експансії він зіткнувся з багатьма різними народами та способами життя. Багато обмінів впливами відбулося під час цього процесу, до того, що багато характеристик, які не походили спочатку з $muslim$, стали нерозривно пов'язані з ним, тоді як багато культур, які прийняли $muslim$, також зазнали його впливу."
  islamic_schoolars: "Ісламські школи"
  islamic_schoolars_desc: "$muslim$ завжди заохочував думку та вивчення своїх священних писань, навіть до того, що виникли різні школи думки щодо їх інтерпретації. Наші вчені в $common_string_quran$ та інших священних текстах є, таким чином, дуже освіченими особистостями, здатними вести найглибші дискусії."
  gunpowder_empires: "Порохові імперії"
  gunpowder_empires_desc: "Порох, можливо, був винайдений на Далекому Сході, але саме через $muslim$ він поширився по всьому світу і став широко використовуватися. Порохова зброя була основним елементом наших армій протягом поколінь, а її виробництво та використання є однією з характеристик, що визначають нас."
  established_holy_sites: "Встановлені святі місця"
  established_holy_sites_desc: "Хоча інші релігії мають дещо нечітке та непослідовне використання своїх святих місць, правила $muslim$ щодо святих місць досить чіткі. Таким чином, поза сумнівом, що ми сумлінно здійснюватимемо наші паломництва, коли прийде час."
  islamic_courts: "Ісламські суди"
  islamic_courts_desc: "Королівські двори $muslim_ADJ$ країн завжди були одними з найшанованіших у світі. Прославлені за нашу витончену культуру та екзотичні товари, розповіді про велич наших дворів поширилися по всьому світу, і наш народ пишається тим, що належить до такого двору."
  schools_of_thought: "Школи думки"
  schools_of_thought_desc: "$muslim$ завжди був пов'язаний зі знаннями та освітою. Від різних шкіл юриспруденції та теології до різних шкіл знань, побудованих різними правителями, праці $muslim_ADJ$ вчених захоплювали не лише в $muslim_ADJ$ світі, а й серед невірних."
  distant_trade_ventures: "Віддалені торговельні підприємства"
  distant_trade_ventures_desc: "Саме з найвіддаленіших земель ми можемо отримати найприбутковіші товари. Протягом багатьох років $muslim_ADJ$ торговці долали великі відстані як суходолом, так і морями в пошуках вигідних торговельних можливостей."
  resilient_merchants: "Стійкі купці"
  resilient_merchants_desc: "$muslim_ADJ$ торговцям доводилося витримувати найсуворіші умови під час своїх експедицій. Від перетину палючих пісків пустель Сахара та Гобі до плавання в уражених мусонами водах $indian_ocean_region$, вони знову і знову доводили свою стійкість у подоланні труднощів заради успішної торгівлі."
  jewels_of_the_desert: "Коштовності пустелі"
  jewels_of_the_desert_desc: "Правда, що $muslim$ виник у пісках $arabia_region$ і поширився на багато інших посушливих територій. Однак деякі $muslim_ADJ$ міста змогли яскраво сяяти, незважаючи на розташування посеред пустельних районів, і були визнані центрами заможного життя. Доклавши достатньо зусиль, будь-яке поселення може стати таким же багатим, як і вони."
  comprehensive_land_survey: "Комплексне земельне обстеження"
  comprehensive_land_survey_desc: "Щоб знати, хто повинен платити податки, ми повинні спочатку знати, хто чим володіє. Комплексне земельне обстеження, а потім забезпечення його актуальності є для цього вкрай важливими. Ми завжди отримаємо те, що нам належить."
  counting_the_people: "Підрахунок населення"
  counting_the_people_desc: "Тепер, коли ми знаємо, хто чим володіє, логічним продовженням є отримання уявлення про те, хто де живе. Це дозволить нам знати, де шукати людей, коли ми шукатимемо чоловіків для служби в наших арміях."
  cosmopolitan_court: "Космополітичний двір"
  cosmopolitan_court_desc: "Люди звідусіль збираються, щоб захоплюватися нашим $muslim_ADJ$ двором. Привабливість такого двору не згасає, і це дозволяє мати в наших залах широкий спектр талантів."
  caliphate: "Халіфат"
  caliphate_desc: "Халіфат — це об'єднання всіх $muslim_ADJ$ вірних під єдиним правителем у формі $rank_empire_muslim_ruler_male$, який має бути наступником Мухаммада, мир йому, як політично, так і духовно. Хоча існують розбіжності щодо того, хто має право бути $rank_empire_muslim_ruler_male$, ідея всіх $muslim$ об'єднаних під єдиним прапором була присутня з самого початку."
  ibadi_imamate: "$ibadi_ADJ$ Імамат"
  ibadi_imamate_desc: "На відміну від ідеї $caliphate$ або божественно призначеного $shia_ADJ$ Імама, $ibadi_ADJ$ Імам не зобов'язаний правити над усім $muslim_ADJ$ світом. Натомість кожна громада повинна мати можливість бути керованою незалежно своїм власним Імамом."
  contacts_network: "Мережа контактів"
  contacts_network_desc: "Поширення $muslim$ на дуже великій території дозволило $muslim_ADJ$ країнам контактувати з багатьма різними далекими землями. Підтримка такої багатої мережі контактів завжди корисна в дипломатичній сфері."
  infiltration_tactics: "Тактика інфільтрації"
  infiltration_tactics_desc: "Хоча стародавній $nizari_school$ $shia_ADJ$ орден Хашшашійїн був значною мірою міфологізований за межами їхнього початкового обсягу, безперечно, що їхня тактика обману та вбивств була ефективною. Якщо ми самі застосуємо таку тактику інфільтрації, ми також отримаємо такий самий успіх."
  unified_armies: "Об'єднані армії"
  unified_armies_desc: "Безперечно, що $muslim$ поширився на багато різних культур і народів з моменту свого виникнення в $arabia_region$. Доки вони вірять у $muslim_god_name$, будь-яка людина повинна мати можливість боротися в Його ім'я, незалежно від свого походження."
  harsh_environments: "Суворі умови"
  harsh_environments_desc: "$muslim$ з моменту свого заснування поширився через одні з найсуворіших середовищ світу. Невірним завжди буде важко, коли вони прийдуть битися на наших землях на наших умовах."
  four_noble_truths: "Чотири благородні істини"
  four_noble_truths_desc: "Походження та основа вчень Будди, $four_noble_truths$ є поясненням реальності буття. Ніщо не є постійним, що спричиняє біль духу через його прив'язаність до цього минущого існування. Цей біль можна полегшити лише звільнившись і відпустивши ці прив'язаності, що досягається слідуванням $noble_eightfold_path$."
  noble_eightfold_path: "Шляхетний Вісімковий Шлях"
  noble_eightfold_path_desc: "Узагальнений як шлях до звільнення від Сансари та до Нірвани, $noble_eightfold_path$ є квінтесенцією $buddhist_ADJ$ практик. Диктуючи як ментальний стан, так і фізичні дії, він визначає поведінку будь-якого послідовника $buddhist$."
  middle_way: "Серединний Шлях"
  middle_way_desc: "Будда вчить нас уникати крайнощів, оскільки ні чуттєвими насолодами, ні крайнім аскетизмом не можна досягти просвітлення."
  three_jewels: "Три Коштовності"
  three_jewels_desc: "$three_jewels$ або Три Притулки є трьома опорами, в яких послідовник $buddhist$ знаходить притулок. Цими притулками є #italic Будда#!, просвітлений; #italic Дхарма#!, вчення Будди; та #italic Санґха#!, чернеча громада, що зберігає Дхарму."
  buddhist_syncretism: "$buddhist_ADJ$ Синкретизм"
  buddhist_syncretism_desc: "Хоча він поширився далеко й широко, $buddhist$ бере свій початок в $india$, і він контактував з багатьма різними віруваннями. Таким чином, він містить багато синкретизму не лише з попередніми $hindu_ADJ$ традиціями, але й з багатьма божествами, з якими він стикався."
  sutra: "Сутра"
  sutra_desc: "Тип священного тексту як у $dharmic_ADJ$, так і в $buddhist_ADJ$ релігіях, вони різняться за форматом і змістом. Незважаючи на це, вони завжди вважаються джерелом знань, і належне їх вивчення є необхідним для розвитку духу."
  buddhist_councils: "$buddhist_ADJ$ Собори"
  buddhist_councils_desc: "З часів смерті Сіддхартхи Ґаутами численні собори відбувалися серед чернечих громад для обговорення текстів різних канонів. Хоча записи про конкретні собори можуть відрізнятися від школи до школи, об'єднуюча сила такого собору має бути беззаперечною."
  buddhist_canon: "$buddhist_ADJ$ Канон"
  buddhist_canon_desc: "Отримуючи різні назви, а також містячи різні тексти залежно від гілки $buddhist$, $buddhist_canon$ є збіркою священних писань $buddhist$. Від чернечих правил до #italic Сутри#! або вчень Будди, будь-яка особа, присвячена $buddhist$, повинна бути з ними знайома."
  pali_canon: "$pali_language$ Канон"
  pali_canon_desc: "Хоча в $buddhist$ існує багато різних канонів залежно від школи, $theravada_ADJ$ $pali_canon$ є найстарішим і найпрестижнішим. Інші школи створили свої канони з суміші текстів з різних джерел, тоді як $pali_canon$ залишався незмінним з часів Ашоки 'Великого' і містить слова самого Будди. Він також слугував основою або посиланням для багатьох інших шкіл."
  buddhist_universities: "$buddhist_ADJ$ Університети"
  buddhist_universities_desc: "З давніх-давен $buddhist_ADJ$ центри також були центрами навчання та знань, приваблюючи людей звідусіль для навчання в їхніх стінах. Наланда була найбільшим з цих центрів у давнину, але багато інших наслідували її приклад з тих пір."
  xuanzang_travels: "Подорожі Сюаньцзана"
  xuanzang_travels_desc: "Сюаньцзан, $chinese_group$ $buddhist_ADJ$ чернець за династії Тан у 7-му столітті, вирушив у 17-річну сухопутну подорож до $india$, щоб відвідати центри навчання та зібрати велику кількість $buddhist$ текстів. Він відвідав, серед інших місць, Наланду, де навчався у найкращих майстрів, і після повернення до $china$ привіз із собою понад тисячу документів, що зробило великий внесок у $mahayana$. Його подорож та його записи лягли в основу повісті #italic Подорож на Захід#!, в якій Будда доручає ченцю подорожувати до $india$ у пошуках священних текстів у супроводі, серед інших, Короля Мавп Сунь Укуна."
  silk_road_transmission: "Передача Шовковим Шляхом"
  silk_road_transmission_desc: "Беззаперечним є вплив, який Шовковий Шлях мав на поширення $buddhist$. Чи то сухопутними шляхами, чи то через Морський Шовковий Шлях, торгівля дозволила $buddhist$ поширитися значно далі від свого початкового джерела в $india$."
  bodhisattva: "Бодгісаттва"
  bodhisattva_desc: "Незалежно від школи, $bodhisattva$ є важливою фігурою, хоча точні характеристики та значення, які вони мають, можуть відрізнятися між різними школами. Однак у всіх випадках вони є істотами, гідними шанування та захоплення."
  avalokitesvara: "Авалокітешвара"
  avalokitesvara_desc: "Також відомий як Гуаньїнь або Каннон, $avalokitesvara$ є одним з найбільш шанованих Бодхісаттв. Представлений як чоловік або жінка залежно від школи, а в деяких навіть вважається джерелом усіх $hindu_ADJ$ божеств, $avalokitesvara$ є $bodhisattva$ співчуття і асоціюється з мантрою #italic Oṃ maṇi padme hūm̐#!."
  maitreya: "Майтрея"
  maitreya_desc: "$maitreya$ наразі є $bodhisattva$, якому пророкують бути майбутнім і останнім Буддою поточної ери. Його доля — відновити вчення Дхарми у світі після того, як людство забуде їх, і як такий він є наступником Сіддхартхи Гаутами."
  mount_meru: "Гора Меру"
  mount_meru_desc: "$mount_meru$ — це священна гора в центрі всесвіту як у фізичному, так і в духовному сенсі для $hindu$, $buddhist$ та $jain$. Оскільки вона є центром, навколо якого обертається все інше, так і вся наша країна обертається навколо нашого правителя."
  naraka: "Нарака"
  naraka_desc: "Також називається Нірая, $naraka$ відноситься до царств страждань для очищення своєї поганої карми перед реінкарнацією. Існує багато царств $naraka$, і як час, який індивід повинен перебувати в них, так і страждання, які він отримає під час цього, залежатимуть від кількості карми, яку йому потрібно набрати, щоб переродитися в одному з вищих царств."
  four_heavenly_kings: "Чотири Небесні Царі"
  four_heavenly_kings_desc: "Кожен з них керує одним з кардинальних напрямків, $four_heavenly_kings$ відповідають за захист царства Дева від Асурів. Вони також відповідають за перевірку чесноти та моралі серед смертних."
  vegetarianism: "Вегетаріанство"
  vegetarianism_desc: "Хоча правила Дхарми щодо утримання від вживання м'яса різняться залежно від школи, вони існують. Кожна школа матиме різні правила щодо суворості цього утримання, а також щодо того, чи повинно воно застосовуватися лише до чернечої громади чи до населення загалом."
  edicts_of_ashoka: "Едикти Ашоки"
  edicts_of_ashoka_desc: "Правовий кодекс, опублікований імператором Ашокою Великим у 3 столітті до нашої ери, включає пропаганду $buddhist$. Хоча це щось з багатьох століть тому, воно все ще заслуговує великої поваги та шанування від будь-якого $buddhist_ADJ$ віруючого."
  five_precepts: "П'ять Приписів"
  five_precepts_desc: "Слугуючи основою $buddhist_ADJ$ етики та морального кодексу, $five_precepts$ представляють найосновніші правила, яких повинна дотримуватися будь-яка людина в $buddhist$, незалежно від того, чи є вона частиною висвяченої чернечої громади. Вони наказують людям утримуватися від вбивства, крадіжки, сексуальної неправомірної поведінки, брехні та інтоксикації."
  monastic_communities: "Чернечі Громади"
  monastic_communities_desc: "Центром $buddhist_ADJ$ життя є його громади ченців і черниць, які називаються #italic Saṃgha#!. Вони керуються #italic Vinaya#!, правилами та приписами, які диктують життя будь-якої $buddhist_ADJ$ чернечої громади."
  prestigious_schools: "Престижні Школи"
  prestigious_schools_desc: "$buddhist$ розвинувся в безліч шкіл, кожна з яких зосереджена навколо одного типу чернечої громади та заявляє про перевагу певних текстів. Однак деякі з цих шкіл здобули більше визнання, тоді як інші були відсунуті в невідомість. Асоціюючись з найпрестижнішими, люди можуть отримати відображення цієї вдячності."
  offerings: "Жертви"
  offerings_desc: "Це припис $buddhist$ робити жертви $three_jewels$ для накопичення заслуг. Ці жертви можуть бути матеріальними або нематеріальними, і деякі чернечі громади залежать від їжі, яку дають їхні послідовники для їхнього виживання."
  incense_burning: "Спалювання Пахощів"
  incense_burning_desc: "Практика спалювання пахощів є основним елементом будь-якого $buddhist_ADJ$ ритуалу або жертвоприношення. Різноманітні за формою та виглядом, як миряни, так і висвячені ченці та черниці зазвичай запалюють пахощі перед виконанням будь-якого ритуалу чи медитації. Таким чином, запах пахощів постійно пронизує будь-який $buddhist_ADJ$ храм."
  ascetic_practices: "Аскетичні Практики"
  ascetic_practices_desc: "Хоча Будда застерігав нас про небезпеки крайнього аскетизму, деякі члени чернечої громади все ще виконують певні аскетичні практики. Обмеження типу тканини, яку вони можуть носити, їжі, яку вони можуть їсти, або місця, де вони можуть жити, є одними з дій, які виконують ті, хто бажає йти цим шляхом, що, хоча й не є вимогою для отримання заслуг, все ж має свої переваги для практикуючого."
  mindfulness: "Уважність"
  mindfulness_desc: "Одна з найважливіших частин практики $buddhist$, $mindfulness$ означає усвідомлення явищ як тіла, так і розуму, зберігаючи при цьому вчення Будди. Завдяки цьому можна уникнути виникнення небажаних станів і розвинутися в бажані."
  dana: "Дана"
  dana_desc: "Позначаючи щедрість, $dana$ визначається як акт дарування без очікування чогось натомість, і є ключовою чеснотою в усіх релігіях, пов'язаних з Дхармою. Безкорислива допомога іншим, чи то індивідуально, чи спільно, є одним з ключових способів накопичення карми."
  ahimsa: "Ахімса"
  ahimsa_desc: "Концепція $ahimsa$, або ненасильства, є ключовою чеснотою серед усіх релігій, що слідують Дхармі. Будь-який конфлікт заохочується вирішувати мирним шляхом через діалог, а не застосування сили. На жаль, це не завжди можливо, але насильство завжди повинно бути останнім засобом, і його використання має бути справедливим."
  resistance_to_persecution: "Опір переслідуванням"
  resistance_to_persecution_desc: "Хоча $buddhist$ поширився на широку територію, він також зазнав своєї частки переслідувань протягом століть. Його храми та зображення руйнувалися, його послідовники вбивалися або змушувалися ховатися, але, тим не менш, його вірування залишалися міцними."
  buddhist_meditation: "$buddhist_ADJ$ Медитація"
  buddhist_meditation_desc: "Поширеною практикою серед усіх $buddhist_ADJ$ послідовників, незалежно від їхньої школи, є медитація. У ній метою є тренування розуму та духу для розвитку уважності, спокою та проникливості, і таким чином досягнення просвітлення."
  sruti: "Шруті"
  sruti_desc: "Означаючи «те, що почуте», $sruti$ є найдавнішими та найсвятішими текстами $hindu$. Вони вважаються божественним одкровенням і тому не приписуються людському авторству, хоча деякі заперечують їхнє божественне походження, все ще приймаючи їхній авторитет."
  vedah: "Веди"
  vedah_desc: "Основними текстами серед $sruti$ є $vedah$, які є найдавнішими $sanskrit_language$ текстами. Їхнє авторство приписується Брахмі в $mahabarata$, це Рігведа, Яджурведа, Самаведа та Атхарваведа."
  smrti: "Смріті"
  smrti_desc: "Означаючи «те, що запам'яталося», тексти $smrti$ натхненні або походять від $vedah$, і тому вважаються менш авторитетними, ніж $sruti$, оскільки є їхніми похідними. Однак, на відміну від $sruti$, тексти $smrti$ мають приписане авторство і передаються через рукописи."
  mahabarata: "Махабхарата"
  mahabarata_desc: "Один з двох основних текстів $smrti$ разом з $ramayana$, $mahabarata$ — це епос стародавньої $india$. Це найдовша епічна поема, коли-небудь написана, приблизно в десять разів більша, ніж $greek_language$ #italic Іліада#! та #italic Одіссея#! разом узяті, і вона розповідає історію династичної боротьби за трон стародавнього $indian_group$ царства Куру, що завершилася війною на Курукшетрі, також званою війною $mahabarata$. Історія закінчується смертю $krishna_avatar$ і кінцем його династії."
  ramayana: "Рамаяна"
  ramayana_desc: "Один з двох основних текстів $smrti$ разом з $mahabarata$, $ramayana$ — це епос стародавньої $india$. Він розповідає про життя $rama_avatar$, аватара $vishnu_god$, як принца царства Кошала. Він підкреслює важливість чесноти в усіх аспектах життя людини."
  purana: "Пурана"
  purana_desc: "Вважаються частиною $smrti$, $purana$ — це тексти різноманітного змісту. Космологія, божественні генеалогії, астрономія, граматика, любовні історії... майже все міститься в них. Таким чином, хоча вони не є частиною $sruti$, їхній вплив на $hindu_ADJ$ вірування та суспільство є беззаперечним, поєднуючи багато різноманітних місцевих вірувань і традицій у спільний наратив $vedah$."
  atman: "Атман"
  atman_desc: "Відноситься до істинного та вічного незмінного Я, це сутність свідомості кожної особистості. Згідно зі школами $astika$, цей $atman$ відрізняється від розуму та тіла, а також відрізняється від Дживатмана, який зберігається протягом багатьох життів. Навпаки, школи $nastika$ інтерпретують концепцію по-різному або повністю відкидають її."
  nastika_schools: "Nāstika Schools"
  nastika_schools_desc: "Деякі школи думки в $hindu$ відхилилися від основних течій, відкидаючи авторитет $vedah$ та існування $atman$. Ці школи, як-от $jain$ та $buddhist$, є таким чином неортодоксальними, хоча вони все ще містять багато спільних основних вірувань $hindu$."
  astika_schools: "Āstika Schools"
  astika_schools_desc: "Названі ортодоксальними школами $hindu$, вони приймають авторитет $vedah$ та існування $atman$. Хоча складаються з багатьох різних шкіл, ця спільність прийняття дає $astika_schools$ багато спільного ґрунту."
  diversity_of_beliefs: "Diversity of Beliefs"
  diversity_of_beliefs_desc: "Вірування людей $india$ зосереджені навколо концепції Дхарми та тексту $vedah$, але вони проявляються в безлічі форм і практик. Навіть боги, яких визнають і шанують, не однакові для всіх, але спільна нитка концепцій присутня скрізь."
  ishvara: "Īśvara"
  ishvara_desc: "Інтерпретований по-різному залежно від школи чи гілки $hindu$, $ishvara$ посилається на Верховну Істоту або Бога. Тому він може стосуватися $shiva_god$ для $shaivism$, $vishnu_god$ для $vaishnavism$ або будь-якого особистого Бога індивіда."
  sanskritization: "Sanskritization"
  sanskritization_desc: "$hindu$ поширився набагато далі від свого походження в $india$, і багато інших культур і країн прийняли концепції та титули $sanskrit_language$ для позначення власної ідентичності. Таким чином, концепції $hindu$ легко проникали та змішувалися з іноземними віруваннями."
  bhakti_movement: "Bhakti Movement"
  bhakti_movement_desc: "Виникнувши в 6 столітті, він пропагує любов і відданість своєму особистому Богу або просвітленій особі. Також він звертається до основної маси населення, говорячи з ними безпосередньо їхньою мовою. Цей дуже впливовий рух змінює те, як релігія та віра відчуваються населенням."
  yoga: "Yoga"
  yoga_desc: "Одна з $hindu_ADJ$ шкіл і філософій, $yoga$ також є набором як фізичних, так і духовних практик, з метою контролю розуму і тіла. Виконувана тисячоліття тому, вона майже стала синонімом шляху просвітленого."
  diwali: "Diwali"
  diwali_desc: "Свято світла, під час $diwali$ ми святкуємо тріумф Дхарми, перемогу добра над злом і світла над темрявою. Ми запалимо свічки та ліхтарі, щоб символізувати це, і вшануємо наших предків."
  holi: "Holi"
  holi_desc: "Проводиться на початку весни, щоб відсвяткувати її прихід, $holi$ — це свято кольорів і любові. Ми вшановуємо сільське господарство та добрі врожаї, і водночас насолоджуємося безліччю кольорів, які пропонує весна. Це також час для розваг і вирішення конфліктів, усунення своїх емоційних забруднень."
  holy_rivers: "Holy Rivers"
  holy_rivers_desc: "Річки та їхнє шанування завжди були важливою частиною $hindu$. Від Інду до Гангу є багато річок, які вважаються священними, на берегах яких проводяться численні ритуали. Їхні води вважаються священними, і ритуали очищення в них є поширеними."
  advaita_vedanta: "Advaita Vedānta"
  advaita_vedanta_desc: "Відкидаючи дуалізм між свідомістю та матерією, $advaita_vedanta$ стверджує, що $atman$, або найглибше \"я\" чи свідомість, є одним і тим же, що й вища реальність або свідомість всесвіту, Брахман. У цьому сенсі фізичний матеріальний світ є лише ілюзією, що приховує кінцеву реальність Брахмана."
  hindu_muslim_relations: "$hindu_ADJ$-$muslim_ADJ$ Relations"
  hindu_muslim_relations_desc: "У минулому було багато взаємодії між $hindu$ та $muslim$, і вона продовжуватиметься. Наші народи навчилися мирно жити разом, і навіть відбувся певний ступінь синкретизму між обома вірами."
  hindu_unification: "$hindu_ADJ$ Unification"
  hindu_unification_desc: "Попри відмінності у віруваннях та практиках всередині $hindu$, нас об’єднує більше, ніж розділяє. Почав формуватися спільний єдиний погляд на $hindu$, і наш народ може відчути велике єднання завдяки цьому."
  hindu_architecture: "$hindu_ADJ$ Архітектура"
  hindu_architecture_desc: "Незалежно від стилю будівництва, чи то Шікхара, Вімана, чи Пранг, $hindu_ADJ$ храми скрізь вирізняються своїми високими оздобленими вежами. Ці шпилі, що є більш-менш вираженим зображенням $mount_meru$ залежно від регіону, слугують як сигналом, так і демонстрацією могутності."
  varna_system: "Система Варн"
  varna_system_desc: "З часів $vedah$ існувало поняття Дхарми індивіда, що класифікується як одна з чотирьох можливих: #italic Брагмана#!, вчені або жерці; #italic Кшатрія#!, правителі або воїни; #italic Вайш'я#!, землероби або торговці; або #italic Шудрі#!, ремісники або слуги. Ці класифікації не є строго жорсткими, а скоріше представляють ідеал покликання індивіда, але, тим не менш, вони були дуже впливовими в $hindu_ADJ$ суспільстві."
  extreme_pacifism: "Крайній Пацифізм"
  extreme_pacifism_desc: "Базуючись на концепції $ahimsa$, $hindu$ завжди виступає за пацифізм та ненасильство. Однак наші вороги все ж повинні остерігатися провокувати нас, щоб ми не впали в повну протилежність, коли нас розбудять до війни."
  hindu_empires: "$hindu_ADJ$ Імперії"
  hindu_empires_desc: "У минулому було багато імперій, що сповідували $hindu$. Від імперій Маур'їв та Гуптів в $india$ до імперії Шрівіджая в $indonesia_region$ та довговічної династії Чола, $hindu$ завжди стояла за троном могутніх правителів."
  sacred_cattle: "Священна Худоба"
  sacred_cattle_desc: "В рамках $ahimsa$ забій худоби заборонений. Таким чином, її поважають і шанують як материнську фігуру, а також як символ самовідданого забезпечення та жертовності. Їй поклонялися з часів $vedah$, і вона заслуговує на всю нашу повагу та увагу."
  riches_of_asia: "Багатства $asia$"
  riches_of_asia_desc: "$asia$ відома у всьому світі як багата земля. Від щедрих міст $persia_region$ та $india$ до дуже бажаних предметів розкоші, вироблених у $china$, до майже міфічних Островів Прянощів в $indonesia_region$. Продукти та багатства $asia$ високо цінуються в усьому світі."
  silk_road: "Шовковий Шлях"
  silk_road_desc: "Чи то сухопутний шлях, що перетинає пустелю Гобі та $persia_region$, чи морські шляхи через $indian_ocean_region$ та $indonesia_region$, землями $asia$ століттями подорожували купці, шукаючи прибуткових заробітків на знаменитому Шовковому шляху."
  exchange_of_ideas: "Обмін Ідеями"
  exchange_of_ideas_desc: "Не лише монети та прибуток рухалися вздовж $silk_road$, але й ідеї та знання плинуть з припливами та відпливами купців, що йдуть його шляхом."
  legacy_of_great_empires: "Спадщина Великих Імперій"
  legacy_of_great_empires_desc: "Від драконового трону $china$ до різних імперій $persia_region$, до могутніх $hindu_ADJ$ та $buddhist_ADJ$ династій $india$ та $south_east_asia$, $asia$ має довгу історію могутніх імперій, що утверджували свою присутність на цій землі."
  arduous_terrain: "Важка Місцевість"
  arduous_terrain_desc: "$asia$ є домом для деяких дуже негостинних земель, від високих вершин Гімалаїв до посушливих просторів пустелі Гобі, до густих джунглів $india$ та $south_east_asia$. І це не згадуючи сезони мусонів та тайфунів, а також майже постійну присутність землетрусів. Її люди навчилися жити в такому непривітному середовищі, але загарбникам буде не так легко."
  fertile_lands: "Родючі Землі"
  fertile_lands_desc: "Загалом, землі $asia$ щедрі на дощі, і багато повноводних річок перетинають її території навіть у тих районах, менш обдарованих опадами. За винятком деяких найпосушливіших районів пустелі, земля забезпечує населення достатньою кількістю їжі, і навіть у тих регіонах, де це не так, люди, що там живуть, можуть багато чого зробити з тим, що мають."
  crossroads_of_religions: "Перехрестя Релігій"
  crossroads_of_religions_desc: "$hindu$, $buddhist$, $muslim$ і навіть $tengri$ – це релігії, чиє поширення сягнуло набагато далі від місця їхнього походження. $asia$ була свідком такого обміну віруваннями, і багато разів – змішування та синкретизму, що відбувалися між ними."
  religious_syncretism: "Релігійний синкретизм"
  religious_syncretism_desc: "Взаємодія між різними віруваннями та практиками іноді призводила не до їх відкидання, а до змішування та включення таких практик у власні. Таким чином, присутність чужих думок і вірувань може розглядатися не як щось вороже, а як щось, з чого можна повчитися."
  source_of_knowledge: "Джерело знань"
  source_of_knowledge_desc: "Хоча деякі землі пишаються тим, що перебувають на передовій знань і розвитку, деякі їхні «винаходи» були відомі в $asia$ протягом століть. Від технологічної майстерності $china$ до стародавньої літератури $india$, Сходу немає чого заздрити Заходу."
  structured_society: "Структуроване суспільство"
  structured_society_desc: "Суспільства в $asia$ загалом досить структуровані, і кожна особа знає свою роль у ньому. Під впливом філософських суспільних ідей $hindu$ та $SECT_CONFUFUCIANISM_NAME$, механізми суспільства в $asia$ зазвичай працюють безперебійно."
  incense_preeminence: "Перевага пахощів"
  incense_preeminence_desc: "Пахощі були невід'ємною частиною життя в $asia$ протягом століть, можливо, більше, ніж будь-де у світі. Хоча деякі інші релігії також використовують їх для своїх ритуалів, майже повсюдність їх у будь-якій $hindu_ADJ$ або $buddhist_ADJ$ церемонії, а також у повсякденному житті $muslim$ людей, робить їх постійною присутністю будь-де в $asia$."
  incense_trade_route: "Торговий шлях пахощів"
  incense_trade_route_desc: "Високий попит на пахощі, не лише в $asia$, а й за її межами, вимагає багатьох торгових шляхів, присвячених їхній торгівлі. Подібно до більш відомого $silk_road$, торгівля пахощами пов'язує Схід із Заходом."
  wake_of_the_mongol_horde: "Слід $mongolian_group$ Орди"
  wake_of_the_mongol_horde_desc: "Майже немає місця в $asia$, яке б не відчуло впливу $mongolian_group$ завоювань. Після великої імперії, викуваної $genghis_khan_name_no_tooltip$, земля тепер відновлюється після того, як її топтали його коні."
  cultural_melting_pot: "Культурний плавильний котел"
  cultural_melting_pot_desc: "$asia$ є домом для широкого культурного розмаїття. Це розмаїття та постійний обмін саме те, що протягом століть дозволяло країнам в $asia$ процвітати, обмінюючись ідеями та впливами одна з одною."
  rise_of_great_individuals: "Піднесення великих особистостей"
  rise_of_great_individuals_desc: "Історія доводить, що великі особистості будуть тими, хто підніметься і досягне великих справ. Знову і знову імперії створювалися або руйнувалися рукою одного правителя, і такі досягнення слід поважати та захоплюватися ними."
  the_pentarchy: "Пентархія"
  the_pentarchy_desc: "Стара структура Церкви, сформульована імператором Юстиніаном, все ще повністю діє в $orthodox$. Хоча патріарх $rome$ вважає себе вищим за всіх у своїй $catholic$, для справжньої Церкви міста $constantinople$, $alexandria$, $antioch$ та $jerusalem$ все ще мають своє значення."
  imperial_creed: "Імперський символ віри"
  imperial_creed_desc: "$orthodox$ завжди була офіційною вірою Римської імперії з моменту її прийняття $christian$. Єресі заходу та їхні фальшиво проголошені «імператори» не зможуть заперечити легітимність нашого роду."
  filioque_issue: "Питання Filioque"
  filioque_issue_desc: "Підступне додавання пункту #italic Filioque#! західними єретиками було здійснено без скликання належного собору для його вирішення, і тому є нелегітимним. Лише ми зберігаємо належний спосіб молитви, і вони навіки прокляті до пекла за свою єресь."
  septuagint: "Септуагінта"
  septuagint_desc: "Наш Старий Завіт закодований $greek_language$ у версії, відомій як $septuagint$, переклад з $hebrew_language$, виконаний у 3 столітті до нашої ери 72 ізольованими перекладачами, причому всі вони незалежно досягли абсолютно однакового перекладу. Таким чином, він безумовно богонатхненний і є прямим словом Божим."
  anagignoskomena: "Анагігноскомена"
  anagignoskomena_desc: "Наш Біблія містить усі книги, гідні шанування та вивчення, хоча деякі можуть мати менше значення, ніж інші. $anagignoskomena$ відсутні в $hebrew_language$ Біблії, тому вони мають менше значення, ніж інші тексти, але все ж варті того, щоб їх читати, і не повинні ігноруватися."
  church_guidance: "Церковна Настанова"
  church_guidance_desc: "Писання є Словом Божим, але лише Церква здатна тлумачити його правильне значення та доносити його до пастви. Будь-яке самостійне читання чи тлумачення Писання поза настановою Церкви призведе лише до загублення в оманах та на шляху до єресі."
  unchanging_tradition: "Незмінна Традиція"
  unchanging_tradition_desc: "Традиція, передана нам Ісусом Христом та апостолами, є послідовною, без змін, доповнень чи вилучень. Це так, тому що сама віра є незмінною і сповідується всіма повсюди."
  church_councils: "Церковні Собори"
  church_councils_desc: "Оскільки Церква має бути єдиною, будь-яка справа, занадто велика для вирішення одним єпископом, вимагатиме скликання собору, де єпископи шукатимуть розум самої Церкви. Таким чином, рішення собору відображатимуть консенсус Церкви в цілому."
  greek_rite: "$greek_culture$ Обряд"
  greek_rite_desc: "Наші обряди та канонічні практики протягом століть були чітко визначені за $greek_culture$ обрядом Константинополя. Хоча в деяких місцях можуть бути невеликі відмінності, однорідність обрядів по всьому $orthodox$ є узагальненою."
  physical_body_of_christ: "Фізичне Тіло Христа"
  physical_body_of_christ_desc: "Наша Церква є фізичним проявом Тіла Христового на Землі, не маючи відмінностей від того, що на Небесах. Таким чином, Церква є фізичним втіленням Господа Спасителя, посланого на благо свого народу."
  sight_veneration: "Зорове Шанування"
  sight_veneration_desc: "Найважливішим аспектом для шанування є нагадування вірним через їхні власні почуття. Таким чином, наші церкви завжди прикрашені яскравими образами та кольорами, щоб присутність Христа на Землі могла бути негайно відчута будь-ким."
  theotokos: "Богородиця"
  theotokos_desc: "Діва Марія є ключовою постаттю для нас, оскільки вона виконала Старий Завіт, носячи в собі Новий Завіт у постаті Христа. Таким чином, будучи Христом Боголюдиною, вона була буквально Матір'ю Божою і має місце виняткової поваги над усіма іншими святими."
  heavenly_architecture: "Небесна Архітектура"
  heavenly_architecture_desc: "$orthodox_ADJ$ релігійні будівлі завжди спроектовані на подобу неба. Побудовані більш централізовано, ніж західні, засновані на базиліці, центральний купол, що служить дахом, символізує небо. Завжди вкриті образами та іконами, вони є дивом для споглядання."
  iconostasis: "Іконостас"
  iconostasis_desc: "Однією з ключових особливостей будь-якої $orthodox_ADJ$ Церкви є $iconostasis$, стіна з ікон, що відокремлює основну частину будівлі від вівтаря. Ікони, які він містить, служать візуалізацією зв'язку між вірянами та Святая Святих, і, таким чином, зв'язку між Небом і людьми, слугуючи дороговказом для людей до Неба."
  julian_calendar: "Юліанський календар"
  julian_calendar_desc: "Час нашої країни та нашої Церкви протягом століть вимірювався за $julian_calendar$, проголошеним Юлієм Цезарем у 46 році до нашої ери. Він не тільки об'єднує всі східні $christian_ADJ$ народи, але й служить для визначення того, коли мають відбуватися важливі свята та урочистості."
  paschal_cycle: "Пасхальний цикл"
  paschal_cycle_desc: "$orthodox$ містить деякі рухомі свята навколо #italic Пасхи#!, Великодня, організовані в $paschal_cycle$. Десять тижнів перед Пасхою називаються Тріодь, тоді як 50 днів після Пасхи називаються Pentekostárion. Цей цикл відзначає найважливіші святкування літургійного року."
  oktoechos: "Октоїх"
  oktoechos_desc: "Восьмигласна система написання музики, $oktoechos$ була системою, що використовувалася для написання релігійних співів та музики для Церкви протягом століть. Вона є основою $orthodox_ADJ$ співу, хоча з деякими відмінностями між культурами."
  prestigious_monasticism: "Prestigious Monasticism"
  prestigious_monasticism_desc: "У $orthodox$ чернецтво та аскетизм високо цінуються і є майже обов'язковими. Будь-який єпископ повинен спочатку бути ченцем, і він повинен стати ченцем до посвячення, якщо він ним не є. Таким чином, монастирі та чернечі центри мають великий вплив на наше церковне життя."
  national_rites: "National Rites"
  national_rites_desc: "Присутність різних автокефальних патріархатів у нашій Церкві дозволяє певні варіації національних обрядів кожної країни. Однак єдність послання зберігається, і вся Церква як єдине ціле не розривається."
  heirs_of_rome: "Heirs of Rome"
  heirs_of_rome_desc: "Було багато людей, які претендували на те, щоб бути спадкоємцями Риму та всієї Римської імперії. Однак лише наша віра є істинною вірою старої Імперії, і лише ми можемо законно претендувати на те, щоб бути її прямими нащадками."
  legacy_of_saint_andrew: "Legacy of Saint Andrew"
  legacy_of_saint_andrew_desc: "Згідно з легендою, святий Андрій відвідав Скіфію та північні береги $black_sea_area$, пророкуючи великий розвиток $christian$ при досягненні майбутнього місця розташування $kyiv$."
  christianization_of_the_slavs: "Christianization of the Slavs"
  christianization_of_the_slavs_desc: "Народи Київської Русі були одними з перших східних $slavic_group$ народів, які прийняли світло Христа і навернулися до $orthodox$. Звідти віра поширилася далеко і широко серед східних народів."
  cyril_and_methodius: "Cyril and Methodius"
  cyril_and_methodius_desc: "Обидва $BYZ_ADJ$ богослови 9-го століття, вони взяли велику участь в євангелізації слов'ян. Їм приписують розробку глаголиці, першої, яка коли-небудь використовувалася для транскрипції $church_slavonic_language$, а їхні послідовники пізніше розробили кирилицю, назвавши її на честь Кирила."
  interaction_between_church_and_state: "Interaction Between Church and State"
  interaction_between_church_and_state_desc: "Патріархати мають абсолютну владу над своїм патріархатом та своїм народом. Пов'язуючи їхню владу з владою правителя, ми можемо скористатися ресурсами Церкви для зміцнення авторитету держави."
  outwards_expansion: "Outwards Expansion"
  outwards_expansion_desc: "Святий обов'язок Церкви – нести світло Христа язичникам та невірним. Тому ми повинні шукати за межами наших кордонів, щоб нести спасіння їхнім душам."
  justified_holy_wars: "Justified Holy Wars"
  justified_holy_wars_desc: "Ми не можемо дозволити язичникам та єретикам диктувати наші дії. Наш святий обов'язок – очистити землю від їхньої нечистоти, щоб істинне царство Боже могло проявитися на Землі."
  resistance_to_the_infidels: "Resistance to the Infidels"
  resistance_to_the_infidels_desc: "Наші $orthodox_ADJ$ брати часом опинялися під ярмом чужоземних невірних. Однак ми навчилися терпіти такі утиски і навіть жити разом з цими невірними."
  eastern_ecumenism: "Eastern Ecumenism"
  eastern_ecumenism_desc: "$christian_ADJ$ деномінації Східного Православ'я часто плутають з Східним $orthodox$ необізнані. Хоча вони відрізняються від нас у багатьох ключових питаннях, вони все ще $christian_ADJ$, і багато спільних моментів можна використати, щоб повернути їх до істинної віри."
  structured_patriarchates: "Structured Patriarchates"
  structured_patriarchates_desc: "Наші патріархати завжди були добре організовані та структуровані, кожен мав свої власні повноваження та розмежування. Це дозволяє краще функціонувати Церкві в цілому, а державі – як результат."
  second_council_of_ephesus: "Second Council of Ephesus"
  second_council_of_ephesus_desc: "Другий Ефеський собор, скликаний у 449 році за ініціативою Папи Діоскора Александрійського, був легітимним $christian_ADJ$ собором, попри те, що $catholic_ADJ$ та $orthodox_ADJ$ церкви його засудили. На ньому було прийнято формулу Кирила Александрійського, яка стверджує, що Христос є єдиною втіленою природою, як людською, так і божественною."
  rejection_of_chalcedon: "Відмова від Халкідону"
  rejection_of_chalcedon_desc: "Оскільки вони не прийняли $second_council_of_ephesus$, Халкідонський собор був скликаний за ініціативою Папи Лева I, який закликав до анулювання $second_council_of_ephesus$. Ми відкидаємо цей хибний собор і дотримуємося рішень, прийнятих на первісному."
  monophysite_vs_miaphysite: "Монофізитство проти $miaphysite_ADJ$"
  monophysite_vs_miaphysite_desc: "Хоча $miaphysite$ також проголошує, що постать Христа має лише єдину природу, воно суттєво відрізняється від євтихіанського монофізитського погляду, який проголошує, що людська природа Христа була поглинута його божественною природою. Хоча дехто може також називати нас послідовниками монофізитства, це лише згода в словах, оскільки по суті наші погляди чітко відрізняються."
  original_christianity: "Первісне $christian$"
  original_christianity_desc: "У $christian_ADJ$ світі було багато розколів та поділів, але наше віровчення сягає корінням первісного істинного $christian$, сформульованого з часів Першого Нікейського собору. Після нього лише єретики відкололися від основної гілки."
  beyond_the_borders: "За межами кордонів"
  beyond_the_borders_desc: "$christian$ безсумнівно бере свій початок у колисці Римської імперії, і багато його гілок задовольнялися перебуванням у її межах. $miaphysite$, однак, перебувало на околицях Імперії з тих пір, як нас засудили халкідонці, і наважилося вийти за її межі, несучи світло Боже в найвіддаленіші місця."
  isolated_reaches: "Ізольовані терени"
  isolated_reaches_desc: "$miaphysite$ змогло поширитися в дуже віддалені місця. Навіть будучи оточеними ворогами та невірними, наша віра залишалася міцною."
  independent_leaders: "Незалежні лідери"
  independent_leaders_desc: "Через ізоляцію $miaphysite$ часом було важко контактувати з іншими патріархатами. Таким чином, наші лідери навчилися діяти незалежно, водночас маючи власні способи підтримувати зв'язок з рештою $christian$ наскільки це можливо."
  jerusalem_focus: "Фокус на $jerusalem$"
  jerusalem_focus_desc: "Ми завжди тримаємо святе місто $jerusalem$ у своїх думках, оскільки це було не лише місце, де Ісус проповідував і помер, але й куди він повернеться під час свого Другого Пришестя. Тому ми завжди молимося, звертаючись у напрямку до $jerusalem$, незалежно від того, де ми знаходимося."
  acceptance_of_old_testament: "Прийняття Старого Завіту"
  acceptance_of_old_testament_desc: "Деякі $christian_ADJ$ деномінації вирішили зменшити важливість Старого Завіту, стверджуючи, що прихід Ісуса повністю його замінює. Ми, однак, стверджуємо, що він все ще актуальний, і що деякі настанови в ньому є такими ж чинними, як і тоді, коли вони були написані."
  primacy_of_alexandria: "Примат $alexandria$"
  primacy_of_alexandria_desc: "Хоча $miaphysite$ має багато гілок та незалежних лідерів, ми визнаємо $alexandria$ та її престол нашим духовним лідером. Це лише знак поваги до Апостольського Престолу там і спосіб вшанувати його, а не надання йому будь-яких особливих прерогатив."
  school_of_alexandria: "Школа $alexandria$"
  school_of_alexandria_desc: "Катехитична $school_of_alexandria$, нібито заснована самим Апостолом Марком за словами Святого Єроніма, є найстарішою школою катехізису у світі. У ній викладалися біблійні та богословські студії від самого початку $christian$. Хоча сама школа була зруйнована, коли єпископ $rome$ був оголошений вищим за патріарха $alexandria$, її традиція збереглася."
  preserving_of_local_languages: "Збереження місцевих мов"
  preserving_of_local_languages_desc: "Попри важливість $greek_language$ та $latin_language$ у ранньому $christian$, $miaphysite$ зберегло свою літургію більш місцевими народними мовами, такими як $coptic_language$, $aramaic_language$ та $armenian_language$. Будучи старими та традиційними мовами самі по собі, кожна $miaphysite_ADJ$ гілка зберігає свою власну історичну мову."
  double_patriarchate: "Подвійний Патріархат"
  double_patriarchate_desc: "Як $alexandria$, так і $antioch$ вважають, що мають два різні патріархати: один для $miaphysite$ та інший для $orthodox$. Хоча вони можуть претендувати на легітимність своєї лінії, лише $miaphysite$ зберігає справжні патріархати."
  eastern_christianity: "Східні $christian$"
  eastern_christianity_desc: "Ми є частиною так званої $eastern_christianity$, що об'єднує багато різних деномінацій з різними богословськими та літургійними традиціями, але з багатьма спільними культурними аспектами."
  life_among_infidels: "Життя серед невірних"
  life_among_infidels_desc: "Землі нашої віри часто були заплямовані присутністю невірних, але так само наші проповідники вирушали в невідоме, щоб принести світло Ісуса в далекі землі. Таким чином, ми вплинули на цих невірних більше, ніж можна було б очікувати, навіть якщо ми не змогли змусити їх побачити помилковість їхніх вірувань."
  gradual_departure: "Поступове віддалення"
  gradual_departure_desc: "Хоча вони швидко таврували нас як єретиків, $miaphysite$ не розірвали зв'язків з рештою $christian_ADJ$ світу миттєво. Ми підтримували контакт з іншими патріархатами та відвідували собори, але поступово стало зрозуміло, що $miaphysite$ відрізняється від тих єретичних вірувань."
  thrive_under_persecution: "Процвітання під час переслідувань"
  thrive_under_persecution_desc: "Хоча наші вірні століттями переслідувалися єретиками та невірними, наша віра вистояла. Скільки б разів вони нас не скидали, ми знову піднімаємося."
  preserver_of_national_identity: "Зберігач національної ідентичності"
  preserver_of_national_identity_desc: "Саме завдяки тому, що наша Церква була пригнічена та переслідувана, вона може претендувати на роль зберігача нашої ідентичності. Саме в лоні Церкви найкраще збереглися наші мови та традиції, і наша віра в неї залишилася непорушною."
  defense_against_heretics: "Захист від єретиків"
  defense_against_heretics_desc: "З моменту нашого розколу з ними, багато разів єретики приходили до нас зі звинуваченнями та засудженнями. Вони називають себе $christian_ADJ$, але їхні погляди очевидно введені в оману єрессю, тоді як наше бачення є ясним світлом Божим."
  remote_patriarchates: "Віддалені патріархати"
  remote_patriarchates_desc: "Через те, що наш народ був завойований і переслідуваний, престоли наших патріархатів багато разів потрапляли до рук невірних і під їхній контроль. Таким чином, ми були змушені перемістити та перенести наш патріархат в інше місце, але первісний престол все ще зберігається та шанується, навіть якщо діє на відстані."
  further_reaches: "Подальші досягнення"
  further_reaches_desc: "Незважаючи на те, що наша віра в багатьох випадках була обмежена серед невірних, вона також змогла досягти віддаленіших місць і поширитися на багато різних народів і культур."
  internal_communion: "Внутрішнє спілкування"
  internal_communion_desc: "Незважаючи на наявність незалежних патріархів, усі гілки $miaphysite$ мають внутрішнє спілкування між собою. Це дозволяє їм мати тісні стосунки один з одним і забезпечує єдність Церкви."
  cradle_of_monasticism: "Колиска чернецтва"
  cradle_of_monasticism_desc: "Традиція чернецтва в $christian$ народилася в $egypt_region$, коли $christian_ADJ$ вірні там пішли в пустелю молитися і присвятити своє життя Богу. $miaphysite$ може претендувати на цю колиску як на свою власну, через Александрійську традицію."
  unique_architecture: "Унікальна архітектура"
  unique_architecture_desc: "Відносна ізоляція наших патріархатів призвела до унікальних стилів архітектури для наших святих місць. Хоча інші $christian_ADJ$ деномінації, можливо, були більш помітними, наші унікальні архітектурні стилі можуть однаково захопити серця вірних."
  medicinal_infusions: "Лікувальні настої"
  medicinal_infusions_desc: "Цілющі властивості певних рослин століттями допомагали нашому народу долати різні хвороби. Кажуть, що настої, виготовлені з деяких особливих листків, подовжували життя нашого народу."
  canoe_travels: "Каное"
  canoe_travels_desc: "Використовуючи легкі каное, ми можемо краще використовувати водні шляхи та волоки $north_america$, значно розширюючи нашу здатність спрямовувати потік торгівлі та людей."
  seasonal_economy: "Сезонна Економіка"
  seasonal_economy_desc: "У скрутні часи ми мусимо навчитися терпіти життя. А життя є синонімом природи. Зміна пір року також передбачає зміну наших звичаїв. Села повинні бути такими ж тимчасовими та мобільними, як і погода."
  fishing_habits: "Рибальські Звички"
  fishing_habits_desc: "Іноді важко повірити, що деякі з наших людей народилися на суші, а не у воді, бо їхні тіла плавають з такою спритністю, що майже неможливо відрізнити їх від течії річки."
  whale_hunters: "Мисливці на Китів"
  whale_hunters_desc: "Кити, дельфіни, моржі, тюлені. Усе, що дає нам море і що більше за наші голоси, за наше необережне почуття гордості. Усе, що дає нам море, ми полюємо на нього."
  moundbuilding_advance: "Будівники Курганів"
  moundbuilding_advance_desc: "Кургани $north_america$ є великими пам'ятниками досягненням нашого народу, і ми повинні зберегти їхню структуру при плануванні нашої інфраструктури."
  bison_hunters: "Мисливці на Бізонів"
  bison_hunters_desc: "Бізони – це життя для нашого народу. Ми використовуємо кожну частину тварини як данину її жертві. Ми годуємо наших людей її м'ясом, ми використовуємо її кістки для знарядь, ми використовуємо її хутро проти холоду під час довгих зим або її шкури для нашого одягу чи для покриття наших тіпі, ми використовуємо її душу як нашу тварину-символ. Таке значення бізона для нашої культури, що ми почувалися б без них безпорадними."
  federal_constitution: "Будівники Федерацій"
  federal_constitution_desc: "Ми повинні об'єднатися зі спорідненими народами, щоб утворити федерацію, яка ставить взаємну довіру та розвиток своїм найвищим пріоритетом."
  shared_knowledge: "Спільні Знання"
  shared_knowledge_desc: "Інновації можуть мати багато форм, і якщо ми хочемо зберегти своє місце перед загрозами конкуруючих племен, нам потрібно буде дослідити кожну перевагу, яку ми можемо отримати."
  slash_and_burn: "Підсічно-Вогневе Землеробство"
  slash_and_burn_desc: "Існує сільськогосподарська техніка, яка передбачає спалювання рослинності для отримання багатого на поживні речовини шару попелу, що удобрює ґрунт. Ми дізналися, що земля стає міцнішою після цього методу, так само як вона стає міцнішою після того, як її зламали."
  council_of_elders: "Рада Старійшин"
  council_of_elders_desc: "Уряд нашого племені існує для того, щоб усі люди, які входять до його складу, мали голос і право висловлюватися у всіх рішеннях. Співпраця в управлінні нашою землею допоможе нам розглянути нові перспективи."
  experienced_fur_hunters: "Торгівля Хутрами"
  experienced_fur_hunters_desc: "Торгівля хутрами з іншими племенами та іноземцями є важливою частиною нашої економіки. Ми дуже пишаємося нашими мисливськими здібностями і тому можемо забезпечити найкращу якість тваринного хутра."
  pyramid_architecture: "Пірамідна Архітектура"
  pyramid_architecture_desc: "Наш народ не чужий будівництву монументальних споруд, зводячи кам'яні піраміди з далеких часів Теотіуакана, Тікаля, Копана та Паленке. Ми не забули мистецтво будівництва пірамід і можемо продовжувати цю традицію."
  ball_game: "Тлачтлі"
  ball_game_desc: "В основі суспільного життя нашої землі лежить гра в м'яч, де гравці прагнуть утримати м'яч на ігровому полі, відбиваючи його стегнами. Це одночасно ритуальна альтернатива війні та велика частина релігійного життя."
  war_bonfires: "Військові багаття"
  war_bonfires_desc: "Мережа прикордонних поселень, з'єднаних величезними багаттями для швидкого поширення тривоги, дозволить нам оперативно реагувати на будь-яку нову загрозу."
  merchant_officials: "Купці-чиновники"
  merchant_officials_desc: "Купці є цінним джерелом доходу для нашої країни. Вони приносять багатство безпосередньо нашому правителю та повідомляють про обставини, в яких опинилися наші сусіди."
  copperworking: "Мідноливарство"
  copperworking_desc: "Наші ремісники почали виготовляти знаряддя праці з металу, знайденого на наших землях. Якби ми опанували це мистецтво, це дало б нам величезну перевагу над нашими сусідами."
  system_of_tributaries: "Система данини"
  system_of_tributaries_desc: "Пряме правління територією вимагає великих інвестицій у умиротворення місцевого населення та підкорену адміністрацію. Встановлення лояльного правителя та вимагання щорічної данини усуває загрозу з боку конкуруючого $altepetl$ і наповнює нашу власну скарбницю легким та зручним способом."
  refined_obsidian_weaponry: "Обсидіанова зброя"
  refined_obsidian_weaponry_desc: "Чорне обсидіанове скло є чудовим матеріалом для інструментів усіх видів. Тверда та крихка природа скла дозволяє легко створювати леза, наконечники списів або стріл, які залишають смертельні рани на будь-якому ворогу."
  precious_stones_art: "Різьблення дорогоцінного каміння"
  precious_stones_art_desc: "Наша територія багата на дорогоцінне каміння, і ці матеріали є чудовими для статуй, дзеркал або ваз. Наші майстри зможуть увічнити себе цими чудовими інструментами та створити великі пам'ятники нашій культурі."
  cultivate_the_land: "Обробка землі"
  cultivate_the_land_desc: "Джунглі – це суворе середовище для життя, особливо якщо ваш народ бажає вирощувати їжу, а не жити за рахунок землі. Тому розчищення джунглів є одним з найважливіших завдань для нашого суспільства, якщо воно хоче вижити та процвітати. Ми повинні організувати наш народ таким чином, щоб ми могли залучати великі робочі сили працездатних чоловіків для виконання цих робіт, коли виникає потреба в них."
  feathered_serpent: "Пернатий Змій"
  feathered_serpent_desc: "Широко поширена легенда на наших землях розповідає про Пернатого Змія. Хоча ця фігура є багатьма речами для багатьох людей, Кетцалькоатль серед $nahua_group$, Кукулькан серед $maya_language$ або К'ук'умац серед $kiche_culture$, він є джерелом єдності на всій нашій землі."
  ritual_bloodletting: "Ритуальне кровопускання"
  ritual_bloodletting_desc: "У багатьох культурах нашої землі вважається належним для правителя використовувати жертвоприношення та кровопускання як спосіб вшанування богів. Підтримуючи цю традицію, ми підтверджуємо наше право на правління."
  valley_irrigation: "Міждолинне зрошення"
  valley_irrigation_desc: "Будуючи великі канали, що з'єднують джерела води долин нашої батьківщини, ми можемо значно покращити наші методи зрошення та продуктивність нашої землі."
  artisan_migration: "Переселення ремісників"
  artisan_migration_desc: "Не личить, щоб наші завойовані землі мали кращих ремісників та мудреців, ніж столиця. Найкращі руки та уми імперії повинні бути привезені до столиці, щоб служити нам безпосередньо."
  terrace_farming: "Терасове землеробство"
  terrace_farming_desc: "Щоб максимально використати обмежений простір високогір'я, ми розробили терасове землеробство та кращі методи зрошення."
  mountain_cities: "Фортеці на вершинах"
  mountain_cities_desc: "Наші міста та фортеці лежать на вершинах величезних гір, далеко за хмарами. Вони є грізною перешкодою для кожного, хто прагне нас завоювати."
  river_trade: "Річкова торгівля"
  river_trade_desc: "Багатство великих річок і морів завжди годувало наш народ. Приймімо річкову торгівлю та зробімо все можливе, щоб захистити численних купців, які подорожують узбережжям до гирла великої річки, аби ми ніколи не відчували нестачі в добірних товарах, які вони нам привозять."
  rainforests_and_mountaintops: "Тропічні ліси та гірські вершини"
  rainforests_and_mountaintops_desc: "Тропічні ліси та гори нашої землі кишать життям. Окрім духів лісів, ягуари, анаконди, тарантули та безліч інших тварин живуть серед нас, і для того, хто їх знає, вони становлять невелику пряму небезпеку. Однак для ворога-загарбника ці землі можуть здатися фортецею, а дикі тварини — її захисниками."
  knot_system: "Вузлове письмо"
  knot_system_desc: "Використовуючи розташування шнурів і вузлів для запису інформації, ми можемо значно полегшити управління нашими землями та фіксацію життєво важливих відомостей."
  llama_farming: "Розведення лам"
  llama_farming_desc: "Величезні стада лам на наших землях забезпечують нас тканинами для одягу, м'ясом для харчування та в'ючними тваринами для перевезення наших тягарів. Вони справді безцінні."
  mountain_roads: "Мережа гірських доріг"
  mountain_roads_desc: "Для полегшення перерозподілу товарів потрібна велика мережа гірських доріг, що з'єднує віддалені долини та перетинає глибокі ущелини. Збудуймо її."
  tears_of_the_sun: "Сльози Сонця"
  tears_of_the_sun_desc: "Хоча шукачі пригод з далеких земель мріють знайти таємне золото на гірських стежках високо в Андах, для нас цей жовтий метал має більше художнє та священне значення, ніж просту економічну цінність."
  hidden_cities: "Приховані міста"
  hidden_cities_desc: "У країні величезних вершин і непрохідних тропічних лісів багато наших міст майже недоступні для сторонніх. Вони могли б легко залишатися прихованими століттями, забуті світом."
  potato_production: "Виробництво картоплі"
  potato_production_desc: "Там, де кукурудза погано росте на високих плато нашої землі, ми навчилися покладатися на високопоживні бульбоподібні корені місцевої рослини. Зі збільшенням виробництва ми можемо годувати наш народ і наших воїнів легкодоступною їжею."
  head_hunters: "Мисливці за головами"
  head_hunters_desc: "Завоювання земель у слабших народів є необхідною частиною нашої країни. Ці обставини створили унікальний воїнський кодекс, згідно з яким захоплення, а не вбивство ворога є найвищим проявом хоробрості та доблесті. Це зробило наш народ відомим своєю майстерністю захоплювати людей живими."
  border_raiders: "Вправні нальотчики"
  border_raiders_desc: "Наші нальотчики славляться своєю здатністю здійснювати блискавичні атаки проти необачних ворогів. Їхня швидкість і здатність уникати ворожої відплати можуть бути великою перевагою і для наших регулярних військ."
  irish_travelling_bards_advance: "Мандрівні барди"
  irish_travelling_bards_advance_desc: "Традиційні поети, навчені придворним манерам, перетинають наші землі в пошуках ймовірного лорда, який би їх найняв."
  irish_booleying_advance: "Відгінне скотарство (булінг)"
  irish_booleying_advance_desc: "В Ірландії розведення корів — це наш спосіб життя. Шляхетна велика рогата худоба є не лише джерелом їжі, а й символом багатства. Завдяки булінгу, системі переміщення наших стад з одного віддаленого пасовища на інше, ми можемо примножувати це багатство."
  irish_monastacism_advance: "Острівне чернецтво"
  irish_monastacism_advance_desc: "Хоча ми тепер і дотримуємося римо-католицьких практик у принципі, релігійне життя на цих островах все ще значною мірою зосереджене на світському духовенстві."
  guards_of_the_shannon_advance: "Вартові Шеннону"
  guards_of_the_shannon_advance_desc: "Фортеця Атлон, що стоїть на могутній річці Шеннон, є ключем до контролю над серцем Ірландії. О'Келлі з $HYM$, давні володарі цих земель, завзято боролися, щоб захистити свої володіння від нормандських вторгнень."
  hiberno_norman_keeps_advance: "Іберно-нормандські донжони"
  hiberno_norman_keeps_advance_desc: "Наші нормандські предки збудували чудові вежі, щоб зберегти свій контроль над ворожим ірландським внутрішнім регіоном."
  irish_frontier_settlement_advance: "Ірландські прикордонні поселення"
  irish_frontier_settlement_advance_desc: "Земля, яку ми захопили в ірландців, дозріла для експлуатації, і порядні люди мігрують здалеку, щоб осісти на цих дешевих хутірських землях."
  celtic_raiders_advance: "Кельтська лють"
  celtic_raiders_advance_desc: "Протягом тисячоліть наша люта та спритна партизанська війна дошкуляла чужинцям і ворогам, перемагаючи їх нищівною послідовністю ухильних сутичок та атак, що холодять кров."
  ple_pale_defenseworks_advance: "Укріплення Пейлу"
  ple_pale_defenseworks_advance_desc: "Наш кордон окреслений легкими оборонними спорудами з валів та частоколів, призначеними для стримування наших непокірних сусідів від їхніх дратівливих набігів."
  ple_irish_viking_towns_advance: "Давні міста вікінгів"
  ple_irish_viking_towns_advance_desc: "Давні торгові порти, засновані остменами, все ще є гамірними осередками торговельної діяльності, де кмітливі можуть розбагатіти."
  cel_defensive: "Пагорби говорять кельтською"
  cel_defensive_desc: "Століття під тінню завоювання навчили наших воїнів мистецтву терпіння та стійкості. Ми можемо кидатися стрімголов у небезпеку, але ми також можемо терпіти, захищатися і завдавати удару лише тоді, коли настане слушний момент."
  cel_western_shore: "Західне узбережжя"
  cel_western_shore_desc: "Протягом тисячоліть ми рибалили, торгували та воювали вздовж диких атлантичних узбереж. З цих суворих вод ми навчилися мореплавства, неперевершеного жодним суперником."
  cel_the_wests_awake: "Захід пробуджується"
  cel_the_wests_awake_desc: "Після довгих століть мовчання давній дух кельтських народів знову пробуджується, готовий повернути своє місце серед великих цивілізацій світу."
  cel_celtic_nations: "Кельтські нації"
  cel_celtic_nations_desc: "Наш союз заснований на ідеалі об'єднання різноманітних народів кельтського світу під спільним прапором. Через співпрацю ми прагнемо зберегти нашу спадщину, просувати наші цінності та забезпечити процвітання кельтських націй разом перед обличчям зовнішнього тиску та мінливих часів."
  cel_celtic_diaspora: "Кельтська діаспора"
  cel_celtic_diaspora_desc: "Від хуторянина до вождя багато хто покинув наші береги через труднощі чи надію, сплітаючи розгалужену мережу спорідненості, яка несе нашу мову, звичаї та гордість у далекі землі."
  cel_pan_celtic_nationalism: "Панкельтизм"
  cel_pan_celtic_nationalism_desc: "Наше бачення об'єднаного кельтського світу — це більше, ніж ідеал; це заклик до єднання для всіх, хто поділяє нашу спадщину. Разом ми куємо зв'язки, що сягають за межі кордонів, роблячи нашу ідентичність такою ж стійкою, як пагорби та моря, які ми називаємо домом."
  ire_grand_jury_system: "Система Великого Журі"
  ire_grand_jury_system_desc: "Великі журі графств стягують податки на дороги, мости та будівлі судів. З суддями, що їздять на виїзні сесії, нагляд посилюється в кожному графстві."
  ire_irish_establishment: "Ірландський Істеблішмент"
  ire_irish_establishment_desc: "Постійна армія в Ірландії, керована з Ірландії, підтримує гарнізони в готовності та контролює витрати. Для наших регулярних солдатів це означає регулярну платню. Для наших логістів та квартирмейстерів це означає зростаючу мережу казарм, що дозволяє тримати витрати під контролем."
  ire_irish_volunteers: "Ірландські Добровольці"
  ire_irish_volunteers_desc: "Громадянські корпуси створюються для оборони дому та берегової охорони. Тренуючись за власний кошт, вони піднімають громадський дух і зміцнюють лінію."
  legacy_of_the_normans: "Спадщина Норманів"
  legacy_of_the_normans_desc: "Викувана в горнилі завоювань, сицилійська нормандська армія поєднала нестримний натиск нормандських лицарів зі стратегічною витонченістю візантійської, арабської та ломбардської військової справи. Майстри як бойової лютості, так і тактичної гнучкості, вони висікли королівство на перехресті цивілізацій."
  sic_constitions_of_melfi: "Конституції Мельфі"
  sic_constitions_of_melfi_desc: "Імператор Фрідріх II, король Сицилії з династії Гогенштауфенів, розробив правовий кодекс для Сицилії, відомий як Конституції Мельфі, або Liber Augustalis. Він використовувався століттями пізніше і є міцною основою для управління нашою державою, регулюючи публічне право, судову процедуру та феодальне, приватне та кримінальне право."
  sic_studium_generale: "Studium Generale"
  sic_studium_generale_desc: "Заснований у 1434 році королем Арагону Альфонсо V, Університет Катанії був найстарішим на Сицилії та одним з небагатьох південних закладів, яким було надано повний статус Studium Generale. Унікальний завдяки своїй королівській хартії та поєднанню схоластичної та юридичної освіти, він випустив юристів, теологів та вчених, які служили як Церкві, так і Короні в культурно різноманітному регіоні."
  sic_naval_vigilance: "Морська Пильність"
  sic_naval_vigilance_desc: "Постійні набіги берберських піратів та османів змусили Сицилію підтримувати пильну берегову оборону. Її галери та форти стали критично важливими для захисту Південної Європи."
  sic_sicilian_silk: "Сицилійський Шовк"
  sic_sicilian_silk_desc: "За часів Фрідріха II шовк був основним експортом Сицилії. Хоча наша шовкова промисловість за минулі століття занепала, а продукція Сицилії була витіснена продукцією північноіталійських держав, немає причин, чому вона не повинна відродитися. Інвестуючи в наше виробництво шовку, ми можемо побачити, як наші ткачі та ремісники знову процвітають."
  sic_sicilian_enlightenment: "Сицилійське Просвітництво"
  sic_sicilian_enlightenment_desc: "Хоча Сицилія була віддалена від великих салонів Парижа чи Відня, вона плекала власне Просвітництво. Інтелектуали кидали виклик феодальним привілеям, пропагували науку та виступали за правові реформи, часто в рамках католицького гуманізму. Ці ідеї заклали основу для сучасності в тіні монархії та традицій."
  sic_sicilian_reforms: "Сицилійські Реформи"
  sic_sicilian_reforms_desc: "З часом наші інституції застаріли або стали просто неефективними. Реформи необхідні, якщо ми хочемо, щоб наша нація стала процвітаючою та успішною. Наші найкращі уми працюватимуть пліч-о-пліч, щоб забезпечити відсутність марнотратства та максимальну ефективність процесів."
  nomadic_tendencies: "Кочові Тенденції"
  nomadic_tendencies_desc: "Деякі з наших людей здавна були кочівниками, оскільки ми блукали землями від однієї придатної для життя землі до іншої. Навіть зараз, коли все змінюється, і ми будуємо місто для нашого народу, деякі люди зберігають свої кочові традиції та продовжують блукати землями."
  skilled_cavalry_raids: "Кавалерійські Набіги"
  skilled_cavalry_raids_desc: "З часів наших предків вершники були знаряддям наших завоювань. Їхні громові копита, що проносяться по трав'янистих рівнинах Сахелю, поширювали страх серед наших ворогів і принесли нам багато перемог."
  land_of_the_ancestors: "Земля Предків"
  land_of_the_ancestors_desc: "Земля — це не просто власність чи пил; це наш зв'язок із великими мужами, що передували нам. З кращих земель потойбіччя вони спостерігають за нами, і ми ніколи не повинні дозволити розірвати цей зв'язок."
  wandering_scholars: "Мандрівні Вчені"
  wandering_scholars_desc: "Громади мудреців багатьох вір живуть серед наших земель, пропонуючи вчення своєї віри всім, хто бажає слухати, поширюючи єдину істинну віру серед нашого народу."
  community_of_the_faithful: "Домен Багатьох Мов"
  community_of_the_faithful_desc: "Наша Імперія об'єднує під своїми прапорами людей сотень походжень. Вони говорять багатьма мовами, приходять з усіх сторін горизонту, але кожен своєю мовою віддає шану нашому правителю, що єднає нас."
  bound_by_service: "Зв'язані Службою"
  bound_by_service_desc: "Ми — один народ, і ми маємо одну армію. Залучаючи війська з усіх наших територій та підкорених народів до війська, ми краще забезпечуємо їхню інтеграцію в наше суспільство та збільшуємо їхнє прийняття нашого правління."
  regnal_chronicles: "Королівські Хроніки"
  regnal_chronicles_desc: "Ми повинні записувати історію наших королів та їхні діяння у великих хроніках, щоб вони передавалися з покоління в покоління і завжди пам'яталися."
  expanded_slave_trade: "Посилити контроль над работоргівлею"
  expanded_slave_trade_desc: "Попит на рабів з боку зовнішніх торговців зростає з кожним днем. Наше становище в африканському світі робить нас ідеальними посередниками для цієї торгівлі. Заохочуймо тих, хто шукає ринки рабів, робити це на наших землях і вести свій бізнес на наших ринках."
  gifts_and_hostages: "Дари та Заручники"
  gifts_and_hostages_desc: "Хоча наш народ тепер об'єднаний, акт схиляння коліна перед спільним сюзереном давався їм нелегко. Викликавши всіх підкорених правителів до столиці, ми можемо використовувати їх як престижних королівських посланців. Дехто назвав би це політикою захоплення заручників, ми ж просто бачимо в цьому спосіб нагадати нашим незалежним людям про їхню вірність."
  people_of_ornaments: "Люди Прикрас"
  people_of_ornaments_desc: "Наші ремісники відомі далеко й широко, і кажуть, що вони не можуть залишити жодної поверхні без прикрас. Використаймо цю репутацію якнайкраще і поширюймо їхню роботу скрізь, куди ми йдемо."
  courtly_competition: "Придворні Змагання"
  courtly_competition_desc: "Зайнятий шляхтич — хороший шляхтич. У наших володіннях так багато придворних титулів, що дехто каже, половина наших чоловіків має один. Переконаймося, що члени нашого двору проводять більше часу, змагаючись один з одним за увагу та видимість, а не загрожуючи нашому правлінню."
  overnight_army: "Армія За Ніч"
  overnight_army_desc: "Наша столиця та наші міста побудовані за моделлю військових таборів. Вони мають фланги, авангарди та фронти. Забезпечуючи присутність військового мислення в нашому повсякденному житті, ми покращуємо нашу готовність до війни."
  mining_tradition: "Гірнича Традиція"
  mining_tradition_desc: "Наша земля багата на рідкісні матеріали, готові бути видобутими із землі та проданими іноземним купцям за великі прибутки. Було б нерозумно не використовувати це."
  intercontinental_trade: "Далекосяжна Торгівля"
  intercontinental_trade_desc: "Наші купці часто привозять дивовижні речі з дворів далеких країн. Можливо, було б можливо досягти ще віддаленіших берегів."
  expanded_grazing_grounds: "Розширені Пасовища"
  expanded_grazing_grounds_desc: "Наші землі мають вдосталь пасовищ, придатних для випасу худоби, що дозволяє нам легко збільшувати виробництво худоби."
  african_sturdy_grains_advance: "Стійке зернове землеробство"
  african_sturdy_grains_advance_desc: "Сильніший акцент на сільськогосподарському виробництві допоможе нашому народу процвітати на цих землях. На щастя, наші ґрунти надають достатньо місця для вирощування різних культур."
  legacy_of_ivan_asen_ii: "Спадщина Івана Асена II"
  legacy_of_ivan_asen_ii_desc: "Правління Івана Асена II ознаменувало новий розквіт болгарської могутності, дипломатії та економічної експансії. Його спадщина залишається основою для сильної та централізованої держави."
  bulgarian_orthodox_patriarchate: "Болгарський православний патріархат"
  bulgarian_orthodox_patriarchate_desc: "Піднесення Болгарської Церкви до Патріархату підтвердило Тирново як духовного суперника Константинополя, зміцнивши нашу національну єдність через віру."
  expansionist_ambitions: "Експансіоністські амбіції"
  expansionist_ambitions_desc: "Коли Балкани розкололися, багато зростаючих балканських держав дивилися назовні. Амбітні правителі прагнули інтегрувати різноманітні землі під єдиною, сильнішою короною, користуючись візантійською слабкістю."
  fortress_of_the_balkans: "Фортеця Балкан"
  fortress_of_the_balkans_desc: "Зіткнувшись із постійними загрозами від хрестоносців, візантійців та монголів, Болгарія розбудувала розгалужену мережу укріплених міст та гірських оборонних споруд."
  revival_of_the_literary_schools: "Відродження літературних шкіл"
  revival_of_the_literary_schools_desc: "Натхненні культурним ренесансом за Івана Александра, болгарські скрипторії та школи стали охоронцями слов'янської православної ідентичності."
  reformation_of_the_bulgarian_patriarchate: "Реформація Болгарського Патріархату"
  reformation_of_the_bulgarian_patriarchate_desc: "Відновлення незалежності Болгарського Патріархату зміцнило як релігійний вплив, так і моральний авторитет держави."
  promote_estates_general: "Сприяти Генеральним штатам"
  promote_estates_general_desc: "Бургундія є феодальним утворенням з різними частинами, об'єднаними за різних умов, що створило сильні місцеві ідентичності. Сприяючи центральній асамблеї, ми надаємо форум для цих інтересів, сприяючи плавному та безперешкодному правлінню."
  reform_the_feudal_army: "Реформувати феодальну армію"
  reform_the_feudal_army_desc: "Система феодального ополчення виявилася повільною та ненадійною в нову епоху професійної війни. Натхненні французькою моделлю, ми замінимо наші розрізнені васальні війська найманими ротами, кваліфікованими офіцерами та інтегрованими арміями. Дисципліноване ядро професійних солдатів становитиме основу сучасної та адаптивної армії."
  influence_of_the_burgundian_towns: "Вплив бургундських міст"
  influence_of_the_burgundian_towns_desc: "Традиційні Генеральні штати віддають перевагу духовенству та знаті, але зростаюче багатство та політична важливість міст більше не можуть ігноруватися. Удосконалюючи їхню структуру, щоб відобразити зростаючу силу міщан, ми забезпечуємо більш збалансоване управління, зберігаючи привілеї інших. Сильніший міський голос також покращить наші адміністративні можливості, а також прискорить темпи урбанізації."
  compagnie_d_ordonnance: "Ордонансні роти"
  compagnie_d_ordonnance_desc: "Наша залежність від феодальних ополчень виявилася неадекватною для вимог сучасної війни. Створення постійно законтрактованих кавалерійських підрозділів, $compagnie_d_ordonnance$, забезпечує нас надійною та професійною військовою силою, безпосередньо лояльною до корони."
  create_the_regimental_system: "Створити полкову систему"
  create_the_regimental_system_desc: "Щоб забезпечити послідовний набір та постачання, ми повинні створити формальну полкову систему. Ця реформа дозволить нам ефективніше організовувати людські ресурси, централізувати командні структури та зменшити залежність від місцевих дворян та іноземних найманців."
  heirs_of_rollo: "Нащадки Ролло"
  heirs_of_rollo_desc: "Спадщина Ролло, вікінгського засновника Нормандії, продовжує визначати наш правлячий дім. Така престижна лінія призвела до зміцнення легітимності та поваги серед наших однолітків."
  trade_ports_in_the_channel: "Торгові порти в Ла-Манші"
  trade_ports_in_the_channel_desc: "Наше розташування вздовж Ла-Маншу дозволяє нам процвітати як комерційному шлюзу. Інвестуючи в наші портові міста та торговельну інфраструктуру, ми можемо домінувати в регіональній торгівлі, мінімізуючи при цьому витрати на заморські операції."
  norman_law: "Нормандське право"
  norman_law_desc: "Наша держава керується власним звичаєвим правовим кодексом, $couteume_de_normaundie$. Закріплюючи привілеї знаті, децентралізовану владу та права власності, ця правова традиція забезпечує місцеву стабільність, утверджуючи нашу відмінну ідентичність."
  the_exchequer: "Казначейство"
  the_exchequer_desc: "Наш законодавчий орган повинен залишатися відокремленим від будь-яких зовнішніх впливів, щоб зберегти нашу культурну ідентичність та незалежність. Натхненні англо-нормандськими фіскальними інститутами, наші парламентські процедури, безсумнівно, збільшать доходи корони та покращать адміністративний нагляд."
  frontline_in_the_caroline_war: "Фронт у Каролінзькій війні"
  frontline_in_the_caroline_war_desc: "Під час тривалих конфліктів між Францією та Англією ми були стратегічним полем битви. Тиск війни викував загартований офіцерський корпус та традиції бойової досконалості, які зберігаються донині."
  tunisian_corsairs: "Туніські корсари"
  tunisian_corsairs_desc: "Зі своїх фортець у Тунісі та Ла-Гулетті наші корсари домінують у Середземномор'ї. Завдяки швидким галерам та державній підтримці вони вселяють страх у іноземних купців та зміцнюють нашу військово-морську міць з безжальною ефективністю."
  tamazight: "Тамазігт"
  tamazight_desc: "Берберомовні народи внутрішніх районів є життєво важливою частиною нашого суспільства. Визнаючи їхню культурну ідентичність та сприяючи грамотності, ми розширюємо нашу здатність керувати різноманітними регіонами, не втрачаючи згуртованості чи міцної влади."
  guardians_of_ifriqiya: "Вартові Іфрікії"
  guardians_of_ifriqiya_desc: "Як наступники стародавніх міст Карфагену та Кайруану, ми несемо мантію опікунства над серцем Магрибу. Наше правління приносить стабільність і буде вітатися всіма в колись спірному регіоні."
  saharan_trade: "Сахарська торгівля"
  saharan_trade_desc: "Від оаз Гадамеса до караванів Сахелю наші купці забезпечують та збирають доходи з транссахарських маршрутів, що з'єднують нас з багатствами внутрішніх районів. Золото, сіль та раби течуть на північ під нашим захистом та наглядом."
  al_caid: "Аль-Каїд"
  al_caid_desc: "Призначаючи лояльного Каїда для нагляду за провінціями та регулювання торгівлі від імені держави, ми розширюємо можливості міських купців, забезпечуючи при цьому провінційне управління. Забезпечення чесних угод та регульованих ринків лише зміцнить нашу економічну базу."
  connections_with_the_christian_world: "Зв'язки з християнським світом"
  connections_with_the_christian_world_desc: "Хоча наша віра відрізняється, ми не зачиняємо двері для можливостей. Договори та торговельні угоди з християнськими державами гарантують, що дипломатія та прагматизм служать нашим довгостроковим інтересам."
  attract_foreign_pirates: "Залучення іноземних піратів"
  attract_foreign_pirates_desc: "Наші порти здавна були притулком для тих, хто шукає щастя у відкритому морі. Вітаючи цих вправних моряків незалежно від їхньої віри чи походження, ми можемо ще більше зміцнити наші корсарські флоти та розширити наш морський людський ресурс."
  rais_of_the_navy: "Раїс флоту"
  rais_of_the_navy_desc: "Наші корсарські капітани, Раїси, є чимось більшим, ніж просто пірати. Вони справді досвідчені морські командири, і їхній досвід у морі живить глибоке джерело морських традицій, що зміцнює горду спадщину нашого флоту."
  export_monopolies: "Експортні монополії"
  export_monopolies_desc: "Контролюючи ключовий експорт, такий як оливкова олія, текстиль та барвники, ми забезпечуємо як внутрішнє процвітання, так і вплив за кордоном. Така протекціоністська практика дозволяє нам проектувати владу через комерцію так само, як і через завоювання, забезпечуючи, щоб наші ринки підтримували наших власних торговців над іноземцями, на вершині."
  beacon_of_maghrebi_trade: "Маяк Магрибської Торгівлі"
  beacon_of_maghrebi_trade_desc: "Тлемсен лежить на перехресті караванів Сахари, середземноморської торгівлі та андалузької величі. Оскільки торгівля процвітає через його ринки та порти, ми повинні прагнути продовжувати розширювати наші торговельні мережі, утверджуючи наш вплив на регіональну комерцію."
  qalat_al_mashwar_advance: "$qalat_al_mashwar$"
  qalat_al_mashwar_advance_desc: "Укріплений комплекс $qalat_al_mashwar$ є як військовим бастіоном, так і символом династичної влади. Завдяки інвестиціям у його розширення, оборона Тлемсена посилюється, забезпечуючи адміністративний контроль над навколишніми землями."
  hispano_moresque_style: "Іспано-мавританський стиль"
  hispano_moresque_style_desc: "Наші міста відображають унікальне поєднання андалузької елегантності та магрибської архітектури. Іспано-мавританський стиль, переданий від іноземних ремісників та знаті, надихає на нове культурне цвітіння та підвищує престиж нашого двору."
  city_of_scholars: "Місто Вчених"
  city_of_scholars_desc: "Тлемсен здавна був центром ісламської науки та інтелектуального обміну. Наші медресе приваблюють вчених з усього Магрибу та Аль-Андалусу, сприяючи науковому та теологічному прогресу для майбутніх поколінь."
  entrepot_connections: "Зв'язки Ентрепо"
  entrepot_connections_desc: "Щоб процвітати як торговий центр, наші міста повинні бути з'єднані міцною інфраструктурою. Надаючи знаті можливість будувати та підтримувати стратегічні дороги, ми покращуємо внутрішню торгівлю та зміцнюємо артерії нашого королівства."
  perpetual_general_captain_of_the_people: "Постійний Генерал-Капітан Народу"
  perpetual_general_captain_of_the_people_desc: "У мінливій політиці середньовічної Верони титул «Capitano del Popolo» став втілювати більше, ніж церемоніальну посаду — він став постійною претензією на лідерство. Вкорінений у громадянській традиції та заявлений Скалігерами для легітимізації їхньої влади, він надав постійності їхньому правлінню в місті, де лояльність здобувалася важко."
  scaligers_military_ambitions: "Військові Амбіції Скалігерів"
  scaligers_military_ambitions_desc: "Скалігери мріяли не лише про правління Вероною, а й про перетворення її на Ломбардську державу. Їхні кампанії просувалися через долину По, зіштовхуючись з Міланом, Венецією та Падуєю. Ця амбіція залишила свій слід у вигляді укріплених міст, загартованих ополченців та двору, що дихав військовими реформами."
  court_of_great_refugees: "Двір Великих Біженців"
  court_of_great_refugees_desc: "Наша велика столиця стала притулком для художників, вигнанців та мислителів — переміщених війною, вірою чи політикою в інших частинах Італії. Ці біженці покликані збагатити міські двори новими техніками, сміливими ідеями та культурними взаємодіями, роблячи Верону рідкісним притулком інновацій у бурхливі часи."
  consolidate_italian_holdings: "Консолідувати Італійські Володіння"
  consolidate_italian_holdings_desc: "Скалігери правили не лише Вероною, а й зростаючою мережею міст по всій північній Італії. Утримання такого королівства вимагало ретельної дипломатії, розумного делегування та добре оплачуваних професійних армій. Лише через консолідацію Верона може стати справжнім суперником інших великих держав півострова."
  the_adige: "Адідже"
  the_adige_desc: "Річка Адідже — це життєва артерія Верони — канал для торгівлі, сільського господарства та процвітання. Як її води течуть з Альп до Адріатики, так і багатство тече через наші ринки та поля, живлячи як місто, так і сільську місцевість."
  marmorina: "Марморіна"
  marmorina_desc: "У мирний час Верона процвітала під правлінням володарів, які цінували красу так само, як і владу. Місто заслужило назву «Марморіна» за велику кількість римського мармуру, статуй та витонченої архітектури. Новий міст через Адідже, Понте Наві, є інженерним дивом, тоді як вежа Гарделло — перший в Італії водяний годинник — відміряла години міста у тихому піднесенні. Ця спадщина витонченості, безсумнівно, сформує не лише наш обрій, а й наше ім'я в історичних книгах."
  diocese_of_smolensk: "Дієцезія Смоленська"
  diocese_of_smolensk_desc: "Колись духовна твердиня православного християнства та домівка одного з найстаріших єпископств у регіоні, Смоленська дієцезія втілює непохитну віру нашого народу."
  smolenskian_resolve: "Смоленська рішучість"
  smolenskian_resolve_desc: "Протягом століть Смоленськ був землею, роздертою чужинцями — литовськими князями, польськими королями та московськими правителями. Щоб вижити, ми трималися того, що нас об'єднувало: нашої віри та нашої стійкості. Якщо ми коли-небудь знову повстанемо, ми повинні відкинути розбіжності та згуртуватися навколо священної ідеї, що, перш за все, є лише Смоленськ."
  link_the_steppes_trade: "Зв'язати степову торгівлю"
  link_the_steppes_trade_desc: "Розташований між лісом і степом, Смоленськ здавна був перехрестям війни та торгівлі. Покращуючи сухопутну інфраструктуру та забезпечуючи артерії караванних подорожей, ми можемо відновити нашу роль життєво важливого сполучника між північною Руссю, Балтикою та південними торговими шляхами степу."
  hub_of_militarism: "Осередок мілітаризму"
  hub_of_militarism_desc: "Довго війна визначала нашу долю, але тепер вона визначатиме нашу силу. З руйнівних обіймів війни та облоги Смоленськ постає як центр військового виробництва — гармати, вогнепальна зброя, порох і доктрина витікають з наших арсеналів. Нехай світ бачить нас не як приз, який можна взяти, а як молот, якого слід боятися, готовий вдарити по ковадлу іноземних завойовників."
  armories_of_smolensk: "Арсенали Смоленська"
  armories_of_smolensk_desc: "Після десятиліть війни на кожному кордоні ми навчилися воювати зброєю як сходу, так і заходу. Поєднуючи московську витримку із західною точністю, наші арсенали тепер виробляють елітну артилерію та тактику, неперевершені нашими суперниками. З наших кузень походить вогнева міць — а з вогневої міці, панування та наполегливість."
  capetian_house_of_anjou: "Капетинський дім Анжу"
  capetian_house_of_anjou_desc: "Злиття капетинської гідності та анжуйських амбіцій тече в нашій крові. Хоча ми більше не носимо корону Єрусалиму, ми залишаємося спадкоємцями королівської спадщини, яка колись простягалася від Анжу до Албанії. Завдяки ретельній дипломатії та плануванню ми ще можемо відродити велич наших предків і повернути те, що було несправедливо відібрано у нас."
  lords_of_the_rhone_corridor: "Володарі Ронського коридору"
  lords_of_the_rhone_corridor_desc: "Долина Рони завжди була нашою артерією влади, і наші замки стоять на варті над нею, як кам'яні вартові. Ці укріплення є одними з найміцніших у всій Європі, непохитним знаком нашої військової та інженерної майстерності, що вічно охороняють наші володіння."
  angevin_heraldry: "Анжуйська геральдика"
  angevin_heraldry_desc: "Золоті лілії та двоголові орли наших прапорів свідчать про давні претензії та королівські амбіції. Претензії, що простягаються на Італійський півострів, і аж до Албанії та Єрусалиму, все ще відлунюють у нашому дворі. Нехай дім POSTEDIT_Валуа-Анжу підніметься вище, ніж будь-коли раніше."
  le_livre_des_tournois: "Книга турнірів"
  le_livre_des_tournois_desc: "Написана королівською особою, «Книга турнірів» — це більше, ніж посібник — це заява про придворну гордість та лицарську ідентичність. Наша знать тренується не лише для війни, а й для видовищ, і таким чином зберігає військову дисципліну та престиж по всьому королівству."
  statutes_of_aix: "Статути Екса"
  statutes_of_aix_desc: "Серія вільно консолідованих законів і статутів формує правову основу нашого управління. Ці статути поєднують римську юриспруденцію з місцевими звичаями та анжуйською традицією, дозволяючи нам керувати клаптиковою ковдрою регіонів як єдиним цілісним володінням: справжньою складовою монархією, де частини різноманітні, але корона неподільна."
  rade_of_toulon: "Рейд Тулона"
  rade_of_toulon_desc: "Природна гавань Тулона пропонує ідеальний плацдарм для наших морських амбіцій. У той час як Марсель процвітає як наша комерційна перлина, Тулон стане арсеналом Провансу, відправною точкою майбутньої морської сили."
  piqure_de_marseilles: "Марсельська вишивка"
  piqure_de_marseilles_desc: "У майстернях Марселя ремісники вишивають ніжні ковдри-буті в провансальському стилі — цінні по всій Європі за їхню якість та чарівність. Подібно до нашого герцогства, твори мистецтва королівства складаються з багатьох частин, зшитих в єдине ціле: стьобана земля, багата на текстуру та культуру."
  orm_a_vast_emporium: "Величезний емпоріум"
  orm_a_vast_emporium_desc: "Кажуть, що Ормуз — це «величезне торговище, де були люди та товари будь-якого опису з усіх куточків світу» або що «якби весь світ був золотим перснем, Ормуз був би його коштовністю». Ідентичність нашого царства нерозривно пов'язана з комерцією. Дійсно, кораблі з Гуджарату, Аравії та навіть Китаю кидають якір у наших портах, обмінюючись прянощами, дорогоцінним камінням, шовком та історіями."
  hormuz_toll: "Ормузьке мито"
  hormuz_toll_desc: "У найвужчому місці Перської затоки стоїть Ормуз, воротар східно-західної морської торгівлі. Жодне судно не проходить без нашого відома чи нашої плати. Протягом століть це мито не лише збагачувало нас, але й формувало нашу дипломатію та проекцію сили через величезні моря."
  gate_of_the_persian_gulf: "Ворота Перської затоки"
  gate_of_the_persian_gulf_desc: "Ормуз контролює протоку, що сполучає Індійський океан із внутрішніми районами Азії. Той, хто володіє цим життєво важливим проходом, диктує ритм морського руху. Наше панування над цими водами має бути абсолютним, щоб наш вплив не зменшився."
  moqarrariya: "Інституціоналізувати Мокаррарію"
  moqarrariya_desc: "Протягом поколінь наше царство підтримувало мир з материком через стародавню систему данини, відому як Мокаррарія. Замість того, щоб покладатися на звичаї та переговори, давайте кодифікуємо ці данини у формальні пакти — забезпечуючи прісну воду, безпеку на суші та довгострокову стабільність через надійну дипломатію."
  develop_qeshm_and_ormuz: "Інвестувати в Кешм та Ормуз"
  develop_qeshm_and_ormuz_desc: "Хоча сухі та скелясті, острови Кешм та Ормуз підтримували міське життя завдяки ретельному постачанню та багатій торгівлі. Завдяки належним інвестиціям їхні порти та майстерні можуть процвітати далі, перетворюючи їх з логістичних центрів на центри інновацій та продуктивності."
  ormuzi_navy: "Ормузький флот"
  ormuzi_navy_desc: "Затока давно покладалася на наші флоти — чи то торговці, патрулі, чи озброєні ескорти. Але щоб відповідати амбіціям тих, хто заздрить нашому становищу, ми повинні розширюватися та модернізуватися. Нехай Ормуз стане не просто торговим постом, а морським арсеналом моря."
  mint_of_the_gulf: "Монетний двір Затоки"
  mint_of_the_gulf_desc: "Ормузькі монети циркулюють від Басри до Бенгалії, їм довіряють за їхню чистоту та вагу. Інституціоналізуючи наш монетний двір та розширюючи нашу емісію, ми зміцнюємо наш фінансовий суверенітет — і заявляємо про фінансову перевагу над Індійським океаном."
  sav_savoyard_flexibility: "Савойські дипломати"
  sav_savoyard_flexibility_desc: "Через наше становище між великими державами нам доведеться покладатися на наші дипломатичні навички для виживання. Підтримуючи дипломатичні відносини навіть з нашими найнебезпечнішими ворогами, ми зможемо змінювати наші союзи, щоб забезпечити витривалість нашої країни."
  sav_house_of_savoy: "Об'єднаний Дім"
  sav_house_of_savoy_desc: "Савоєю протягом кількох століть, з моменту її створення у 1032 році, правила стабільна лінія графів. Забезпечуючи єдність нашої правлячої родини та міцний зв'язок з місцевими представниками, ми зможемо не допустити роздроблення цих земель."
  sav_fight_the_vaudois: "Протистояти єресі"
  sav_fight_the_vaudois_desc: "Наші землі довго страждали від єретичних проповідей вальденсів. Лише завдяки нашій силі волі та підтримці божественного ми змогли стримати їхній вплив, і ми продовжуватимемо захищати єдину істинну віру від цих небезпечних ідей."
  sav_embrace_the_vaudois: "Світло в темряві"
  sav_embrace_the_vaudois_desc: "Ми прийняли вчення вальденського руху і присвятили себе захисту цієї віри від жорстокої Католицької Церкви, яка прагне викорінити її ідеї."
  sav_alpine_pass_control: "Контроль над перевалами"
  sav_alpine_pass_control_desc: "Прохід через Альпи є проблематичним у найкращі часи, а з каретами або більшим супроводом може бути абсолютно неможливим. Підтримуючи хороші шляхи, притулки та поштові станції, ми зможемо домінувати над важкою місцевістю та забезпечити стабільний обмін купцями між нашими землями."
  sav_the_shroud_of_turin: "Паломництво до Святої Плащаниці"
  sav_the_shroud_of_turin_desc: "Наша земля володіє найсвятішим артефактом, шматком тканини, на якому зображено обличчя Ісуса з Назарету. Природно, це привабило безліч паломників, щоб відвідати та вшанувати цю святу плащаницю. Цей постійний потік паломників приносить багато багатства нашим землям, яке ми могли б використати."
  sav_repopulate_the_valleys: "Заселити альпійські долини"
  sav_repopulate_the_valleys_desc: "Населення альпійських долин здавна тягнулося до міських районів по обидва боки гірського хребта. Це залишає невеликі села меншої долини в нестійкому становищі та нестабільному політичному кліматі. Ми повинні забезпечити, щоб наше населення мало багато причин повернутися до долин і не дати їм занепасти."
  mai_diadema_regni: "Діадема Регні"
  mai_diadema_regni_desc: "Наше улюблене місто було описано як Корона Імперії, і це прізвисько ми повинні підтримувати та зберігати. Збереження статусу Майнца в імперії дасть нам далекосяжний вплив та престиж."
  mai_city_and_archbishop: "Права Міста"
  mai_city_and_archbishop_desc: "Громадяни Майнца процвітали завдяки широким правам, наданим їм Адальбертом Майнцьким у 1119 та 1122 роках. Ці права, викарбувані на бронзових дверях Собору, слугуватимуть нагадуванням про співпрацю між окремими владами в місті, як духовенством, так і громадянами."
  mai_leader_rheinish_league: "Рейнська Ліга"
  mai_leader_rheinish_league_desc: "Під час існування Рейнської Ліги ми, природно, зайняли позицію лідерства та керівництва для інших членів. Хоча сама ліга розпалася, наша позиція лідерства та керівництва меншими державами навколо нас не повинна закінчуватися."
  mai_zealous_fight_against_heretics: "Захистити нашу Віру"
  mai_zealous_fight_against_heretics_desc: "Релігійна єдність нашої країни повинна бути захищена від будь-якої загрози. Якщо ми забезпечимо наші армії моральним керівництвом у вигляді священиків, вони будуть набагато більш мотивовані захищати наші вірування."
  mai_vicar_of_mainz: "Управління Вікарія"
  mai_vicar_of_mainz_desc: "Щоб забезпечити надійне управління нашими землями, навіть за відсутності нашого правителя, ми повинні призначити вікарія. Наділений широкими правами, вікарій може правити з нашими найкращими намірами та постійно нагадувати простолюду про нашу присутність."
  mai_mainz_kingdom: "Майнцьке Королівство"
  mai_mainz_kingdom_desc: "Хоча святкування Попільної середи є звичайною справою, вони мають особливо глибоке коріння в нашій країні. Поки публіка святкує #italic Fastnacht#!, або карнавал, з маскарадом та надмірними бенкетами, наш двір братиме участь у спеціальній події. Під час карнавальних святкувань ми перерозподілимо ролі нашого двору за допомогою лотереї, причому навіть правитель повинен буде брати участь. Цей звичай обміну ролями, названий #italic Mainzer Königreich#!, пошириться далеко за наші кордони та забезпечить нашу культурну спадщину."
  mai_center_of_printing: "Друкарні Майнца"
  mai_center_of_printing_desc: "Ми маємо гарні позиції для розширення зростання друкарських верстатів на нашій території та станемо головним виробником книг у Європі."
  mai_garrison_of_the_rhine: "Гарнізонне Місто Рейну"
  mai_garrison_of_the_rhine_desc: "Захист наших кордонів від загроз може бути складним завданням, особливо враховуючи річку, що розділяє наші землі навпіл. Ми повинні забезпечити, щоб розгалужена мережа гарнізонів та укріплень могла протистояти нашим ворогам."
  cro_maritime_connections: "Морські Подорожі"
  cro_maritime_connections_desc: "Наше фрагментоване узбережжя не сприяє легким дорожнім сполученням між прибережними поселеннями. З цієї причини ми повинні будемо встановити постійні сполучення човном, забезпечуючи, щоб як товари, так і люди не страждали від довгого перетину самих прибережних земель."
  cro_reliance_on_adriatic: "Багатства Адріатики"
  cro_reliance_on_adriatic_desc: "Море біля наших берегів дає нам доступ до великої кількості риби та солі для видобутку, що може підтримувати нашу місцеву економіку та забезпечувати нас достатньою кількістю товарів для експорту."
  cro_trade_posts: "Хорватські Торгові Пости"
  cro_trade_posts_desc: "Наші землі розташовані між багатьма привабливими напрямками для купців. Замість того, щоб дозволяти їм проходити повз і лише приймати їх як посередників, ми повинні самі спонсорувати торгівлю та брати свою справедливу частку середземноморської торгівлі."
  cro_influx_of_foreign_knowledge: "Наплив Іноземних Знань"
  cro_influx_of_foreign_knowledge_desc: "Багато іноземних митців та вчених пройшли нашими землями. Ми повинні заохотити їх залишитися на наших землях та сприяти подальшим досягненням нашої культури."
  cro_antemurale_christianitatis: "Antemurale Christianitatis"
  cro_antemurale_christianitatis_desc: "Ми повинні усвідомлювати себе захисниками християнства та єдиної істинної віри, а також оплотом проти єретиків та язичників."
  cro_pandurs_recruitment: "Набір пандурів"
  cro_pandurs_recruitment_desc: "Ми створимо полки легкої піхоти, які служитимуть правоохоронцями та захистом від набігів у мирний час. Ці люди також легко поповнять нашу армію, зміцнюючи наші сили у скрутні часи."
  arabia_felix: "Arabia Felix"
  arabia_felix_desc: "З давніх-давен Ємен був відомий як «Arabia Felix», Щаслива Аравія. Благословенний помірним гірським кліматом та родючим ґрунтом у морі пустелі, він залишається одним з найбільш природно процвітаючих регіонів півострова. Плекаймо це процвітання та використаймо його як основу для процвітаючого царства."
  coffea_arabica: "Coffea Arabica"
  coffea_arabica_desc: "Хоча інші намагалися пересадити наше улюблене зерно, кава Аравії залишається неперевершеною за смаком та славою. Від гамірної гавані Мохи до дворів далеких правителів, світове бажання нашого напою ненаситне."
  zaydi_scholarly_traditions: "$zaidi_school$ Вчені традиції"
  zaydi_scholarly_traditions_desc: "Високогір'я Ємену здавна було домом для імамату $zaidi_school$, центру навчання та благочестя. Вкорінені в ісламській юриспруденції, теології та раціоналізмі, наші вчені століттями забезпечували верховенство права та моральну цілісність нашого управління."
  rasulid_bureaucracy: "Бюрократія Расулідів"
  rasulid_bureaucracy_desc: "Династія Расулідів принесла безпрецедентний адміністративний порядок на наші землі. Завдяки записам переписів, податковим системам та міцній структурі кабінету міністрів, вони перетворили Ємен на одне з найефективніше керованих царств на півострові."
  control_of_the_red_sea: "Контроль над Червоним морем"
  control_of_the_red_sea_desc: "Торгівля з Індії та Африки повинна проходити через протоку, що називається Воротами Скорботи. Давайте зміцнимо наше панування над цим морським вузьким місцем і перетворимо кожен прохідний корабель на можливість."
  yem_unite_the_tribes: "Об'єднати єменські племена"
  yem_unite_the_tribes_desc: "Від узбережжя Тіхама до гір Хараз, наше царство є домом для незліченних запекло незалежних племен. Хоча вони довго чинили опір централізованій владі, вони також є нашою силою. Об'єднавши їх під єдиною справою, ми зможемо краще використовувати їхню робочу силу."
  port_of_aden: "Порт Аден"
  port_of_aden_desc: "Порт Аден був центром торгівлі протягом тисячоліть — його природна гавань приймала кораблі з Індії, Єгипту та Східної Африки. Якщо його належним чином підтримати, він знову може стати наріжним каменем нашої морської економіки та гордістю Червоного моря."
  sons_of_the_salur_tribe: "Сини племені Салур"
  sons_of_the_salur_tribe_desc: "Караманіди ведуть свій родовід від Салур, одного з великих огузьких племен. Відомі як своїм лідерством, так і доблестю, спадщина Салур формує ідентичність нашої держави та наше право представляти туркменів Анатолії."
  mehmed_beys_firman: "Фірман Мехмеда Бея"
  mehmed_beys_firman_desc: "Мехмед I видав указ, що вимагав розмовляти лише турецькою мовою в судах, дервішських ложах, зборах та на громадських площах. Цей акт відкинув перське та арабське домінування в елітних колах і заклав основу для унікальної туркменської культурної політики."
  karamanid_cavalry: "Караманська кавалерія"
  karamanid_cavalry_desc: "Кавалерія завжди була наріжним каменем туркменської війни. Наші вершники, навчені з юного віку та осідлані витривалими анатолійськими кіньми, підтримують горді традиції степової війни з дисципліною та ударною силою."
  home_of_the_whirling_dervishes: "Оселя Дервішів, що Кружляють"
  home_of_the_whirling_dervishes_desc: "Конья, наш духовний центр, є домом для послідовників Мевлани Джалал ад-Діна Мухаммада Румі. Їхня священна практика — сема — символізує подорож душі до божественної істини. Їхня присутність поглиблює містичну традицію нашого царства та зміцнює наші суфійські корені."
  sakya_hegemony: "Гегемонія Сак'я"
  sakya_hegemony_desc: "Протягом останнього століття школа Сак'я утримує світську владу над Тибетом, діючи як духовні та політичні намісники під монгольським патронатом. Їхнє панування започаткувало еру централізованого управління та наукової консолідації. Хоча їхнє правління ослабло, їхня спадщина продовжує формувати наш підхід до влади та порядку."
  monastic_dominance: "Монастирське Домінування"
  monastic_dominance_desc: "Злиття духовної та світської влади визначає тибетський політичний ландшафт. Від найменшого села до залів влади в Сак'я, монастирські установи є центральними для кожної сфери життя. Їхній моральний авторитет та організаційна майстерність забезпечують лояльність, єдність та культурну стійкість."
  the_yak: "Як"
  the_yak_desc: "Домашній протягом століть, як є основою тибетського пастушого життя. Він забезпечує м'ясом, молоком, вовною, транспортом та паливом — його висушений гній є життєво важливим джерелом енергії на безлісому плато. У часи потреби чи святкування, яківське масло наповнює наші лампи та чаші."
  drokpa: "Дрокпа"
  drokpa_desc: "Кочівники Дрокпа часто діють як пастухи та торговці, носії, що з'єднують віддалені поселення. Завдяки своїм традиціям та неперевершеним знанням місцевості, вони долають високогірні маршрути між Тибетом, Бутаном, Ладакхом та Непалом. Їхні сезонні каравани перевозять сіль, вовну та сушене м'ясо в обмін на зерно та промислові товари. Ці мережі сплітають наші гори в жваву мережу торгівлі та дипломатії."
  tibetan_monastic_education: "Монастирська Освітня Система"
  tibetan_monastic_education_desc: "Наші монастирські установи здавна слугували центрами навчання, дебатів та духовної дисципліни. Завдяки суворій підготовці та структурованому підходу до освіти, духовенство підтримує високий стандарт інтелектуальної та моральної цілісності. Ці основи підтримають мудре управління та культурне процвітання в усьому нашому просвітленому царстві."
  tanye_guanxi: "Тан'юе Гуаньсі"
  tanye_guanxi_desc: "Протягом століть наш духовний вплив у Китаї формував основу дипломатичних відносин. Імперський патронат, обмін даниною та священні ритуали, такі як Тан'юе, забезпечували як повагу, так і матеріальну вигоду."
  great_three: "Три Великі Обителі"
  great_three_desc: "Сера, Ганден і Дрепунг, ці величні монастирські університети становлять інтелектуальне серце Тибету. Їхні вчені навчають одне покоління за іншим ченців, дипломатів і правителів. З їхнім піднесенням наше царство стало не лише бастіоном віри, а й колискою суворої думки та інституційного прогресу."
  dai_lang: "В'єтнамські Автономні Села"
  dai_lang_desc: "В'єтнамська сільська місцевість побудована на незмінній силі #italic làng#!, автономних сіл, що втілюють принцип: \"звичаї села переважають закони короля\". У країні суворих гір і звивистих річок ці громади керують собою, створюють місцеві ополчення, ефективно збирають податки та підтримують королівську владу на низовому рівні."
  nghia_quan: "Нгіа Куан"
  nghia_quan_desc: "Протягом нашої історії #italic Nghĩa Quân#! — \"праведні ополчення\" — піднімалися на захист землі в часи великої небезпеки. Складаючись з фермерів, вчених і місцевих патріотів, вони протистояли як іноземним загарбникам, так і внутрішній тиранії. Хоча вони були нерегулярними за своєю природою, їхня доблесть і відданість країні зробили їх грізною силою, коли їх мобілізували."
  cha_go_tram_huong: "Го Чам Хионг"
  cha_go_tram_huong_desc: "Смолиста серцевина наших лісів, відома як агарове дерево або Чам Хионг, цінується не лише за свій чарівний аромат, але й за свої духовні та лікувальні властивості. За морями, шляхта та ченці однаково прагнуть її для пахощів, парфумів та підношень. Захищаючи наші ліси та вдосконалюючи методи збору, ми можемо перетворити цей рідкісний природний дар на один з наших найцінніших експортних товарів."
  my_son_sanctuary: "Святилище Мішон"
  my_son_sanctuary_desc: "У пишних долинах центральної Чампи лежить священний храмовий комплекс Мішон, де протягом поколінь наші королі та жерці виконують урочисті обряди на честь $shiva_god$, захисника нашого царства. Ці вежі, висічені з відданістю та прикрашені священними символами, з'єднують нас з нашими предками та божественним. Доки в їхніх святилищах горить ладан, душа Чампи буде жити."
  lor_mining_tradition: "Копальні Лотарингії"
  lor_mining_tradition_desc: "Наші землі багаті на руду та вугілля, які ми зможемо використовувати собі на користь. Видобуток цих ресурсів може зробити нас багатою країною та закласти основу для наших амбіцій."
  lor_cultural_diversity: "Земля багатьох культур"
  lor_cultural_diversity_desc: "Ми розташовані між кількома культурами, що осіли на нашій території. Створити державу для справедливого управління цими людьми буде нелегко, але це необхідний виклик, який потрібно подолати. Лише тоді ми зможемо порівняти себе з Лотаринзькою державою, від якої ми походимо."
  lor_three_bishoprics: "Земля єпископів"
  lor_three_bishoprics_desc: "Лотарингія є домом для багатьох єпископств з могутніми прихильниками за кордоном та всередині самої Церкви. Співпраця з ними буде корисним інструментом, щоб наш голос був почутий у ширшій Церкві, а підтримка єпископів дозволить нам легше умиротворити населення."
  lor_between_great_powers: "Спадщина старих королів"
  lor_between_great_powers_desc: "Наші землі колись були важливою частиною Лотарингії, одного з Франкських королівств. Якщо ми не хочемо впасти в забуття, нам потрібно буде забезпечити нашу дипломатичну позицію та встановити міцні союзи."
  lor_fortified_cities: "Укріплені міста Лотарингії"
  lor_fortified_cities_desc: "Ми займаємо життєво важливі переправи на кількох річках, які ми повинні захищати за будь-яку ціну, якщо хочемо забезпечити свою незалежність. Для цього ми повинні модернізувати великі мостові замки наших міст та побудувати великі цитаделі."
  bos_land_of_many_churches: "Багато церков Боснії"
  bos_land_of_many_churches_desc: "Боснійські землі є домом для кількох церков. Наша земля не тільки розділена між православною та католицькою церквами, але також є домом для крстянів. Ізольовані від центрального нагляду, ми повинні будемо сприяти місцевому порозумінню та гармонії між різними групами, щоб забезпечити нашу стабільність."
  bos_cultural_customs: "Звичаї Боснії"
  bos_cultural_customs_desc: "Наш народ практикує багато унікальних звичаїв, не обмежених різницею у вірі. Будівництво #italic стечків#!, вишукано прикрашених надгробків, позначить нашу територію як унікально боснійську."
  bos_katun_communities: "Волоські катуни"
  bos_katun_communities_desc: "Частина нашого населення організована в самоврядні, пастуші громади. Замість того, щоб підкоряти їх волі центрального уряду, ми повинні співпрацювати з ними та намагатися видобувати більше ресурсів з наших віддалених районів."
  bos_influence_of_the_stanak: "Збори Станаку"
  bos_influence_of_the_stanak_desc: "Наша знать регулярно збирається, щоб обговорити найактуальніші питання для нашої країни. Ці зустрічі забезпечують узгодженість політики наших шляхетних лордів та демонструють єдність під час наших парламентських сесій."
  bos_defiant_terrain: "Викличний рельєф"
  bos_defiant_terrain_desc: "Боснійські землі складаються з лісистих пагорбів та гір, прорізаних річковими долинами. Цей рельєф природно сприяє затримці та виснаженню армії вторгнення, і ми повинні використовувати це на свою користь. Залучення нашого ворога лише тоді, коли це вигідно нам, і дозволити ворожому рельєфу самому виснажити як їхні припаси, так і війська, збереже нашу силу."
  bos_kingly_ambitions: "Королівські амбіції"
  bos_kingly_ambitions_desc: "Досягнення та праця нашого народу заслуговують на визнання та захист. З цією метою нам потрібно буде забезпечити міцне визнання та зв'язки з іншими правителями навколо нас, встановивши для себе престижний титул."
  cir_tribal_elections: "Племінні вибори"
  cir_tribal_elections_desc: "Ми оберемо номінального лідера нашого народу, який діятиме як представник нашого народу, залишаючись осторонь конкретних справ місцевих лордів."
  cir_mercenary_employment: "Черкеські найманці"
  cir_mercenary_employment_desc: "Наші землі знову і знову грабувалися іноземними державами заради власної вигоди, поневолюючи наш народ. Деякі з цих рабів, використовувані як солдати, просунулися в далеких землях, накопичуючи владу та багатство у своїх руках. З деяким переконанням ми могли б переконати їх повернутися на наші землі та захистити їх від майбутніх вторгнень."
  cir_horsemen_of_the_steppe: "Вправні вершники"
  cir_horsemen_of_the_steppe_desc: "Наше розташування на краю великого європейського степу призвело до кількох вторгнень вершників на нашу батьківщину. Якщо ми хочемо забезпечити свою незалежність, нам потрібно буде самим зібрати велике військо та розширити свій вплив на степи, забезпечивши процвітання нашого серця."
  cir_city_and_fortress: "Укріплені міста"
  cir_city_and_fortress_desc: "Наші поселення лежать незахищеними та є легкою здобиччю для будь-якого загарбника. З їхнім зростанням ми можемо безпосередньо включати горбисту місцевість у наші оборонні лінії, посилюючи їхній захист. За потреби ми можемо самі створити необхідну височинну місцевість, зберігаючи домівки наших людей."
  cir_grand_prince_of_circassia: "Велике князівство"
  cir_grand_prince_of_circassia_desc: "Щоб об'єднати наш народ, ми оберемо найвеличнішого з наших володарів Великим князем, який служитиме надихаючим лідером для наших військ."
  cir_multireligious_society: "Співіснування релігій"
  cir_multireligious_society_desc: "Наші землі часто відвідують багато католиків, мусульман та православних, які займаються торгівлею з нашим народом. Ми повинні сприяти колективній толерантності між усіма нашими підданими, щоб забезпечити родючий ґрунт для процвітання."
  seren_taun: "POSTEDIT_Серен Таун"
  seren_taun_desc: "Фестиваль POSTEDIT_Серен Таун, що проводиться після збору врожаю, є щорічною церемонією подяки, яка святкує сільськогосподарську достаток. Відзначений ритуалами, підношеннями та музикою, він зміцнює комунальні зв'язки наших POSTEDIT_Кампунг-Кампунг і нагадує всім про священний баланс між людьми, рисом та природою."
  pepper_of_the_parahyangan: "Перець POSTEDIT_Парагянгу"
  pepper_of_the_parahyangan_desc: "Родючий вулканічний ґрунт POSTEDIT_Сунданського нагір'я ідеально підходить для вирощування цінного чорного перцю. Торговці з усього світу шукають наші перцеві зерна за їхню потужність та аромат. Ми повинні використати цей природний скарб, щоб розширити наш вплив через спеції."
  pan_asian_trade: "Пан-азійська торгівля"
  pan_asian_trade_desc: "POSTEDIT_Сунда лежить на перехресті великих імперій: Індії, Китаю та ісламського світу. Позиціонуючи себе як незамінний вузол у цій мережі, ми забезпечуємо доступ до товарів, ідей та партнерів по всій Азії, перетворюючи наші гавані на ворота процвітання."
  extend_kampung_kampung: "Розширити POSTEDIT_Кампунг-Кампунг"
  extend_kampung_kampung_desc: "Основа POSTEDIT_Сунданського суспільства лежить у кожному POSTEDIT_кампунгу, сільських громадах, що розкидані по ландшафту. Інвестиції в інфраструктуру цих сіл забезпечують стале зростання, сильне місцеве лідерство та стійкість як до голоду, так і до вторгнень."
  sca_unified_scandinavia: "Об'єднана Скандинавія"
  sca_unified_scandinavia_desc: "Союз Данії, Норвегії, Швеції та Фінляндії під однією короною перетворив Північ з поля битви конкуруючих королів на централізовану владу. Завдяки єдиній адміністрації та посиленій співпраці між станами ми можемо встановити сильніший контроль над королівством."
  sca_legacy_kalmar_union: "Спадщина Кальмарської унії"
  sca_legacy_kalmar_union_desc: "Хоча Кальмарська унія розпалася в конфлікті, вона створила прецедент для спільного нордичного суверенітету. Спираючись на цю спадщину, ми підтверджуємо нашу владу та нагадуємо нашим підданим, що єдність приносить силу, а не підкорення."
  sca_sound_toll: "Звуковий збір"
  sca_sound_toll_desc: "Контроль над Ересундом надає нам право стягувати Звуковий збір з усіх іноземних кораблів, що проходять через данські протоки. Цей давній привілей перетворює географічну перевагу на відчутне багатство, зміцнюючи наше панування над північною торгівлею."
  norwegian_heritage: "Норвезька морська спадщина"
  norwegian_heritage_desc: "Суворі берегові лінії Норвегії та морські традиції сформували народ, вправний у мореплавстві, рибальстві та навігації. Спадщина норвезьких рибалок та кораблебудівників живить наші військово-морські починання та підтримує життєву силу наших прибережних громад."
  danish_heritage: "Данська спадщина верфей"
  danish_heritage_desc: "Довгі морські традиції Данії та її майстерність у морській логістиці досягли кульмінації у великих верфях, таких як у Копенгагені. Як Скандинавія, ми успадковуємо ці потужні інфраструктури та традиції, що підвищує наш дипломатичний статус та морську готовність."
  swedish_roots: "Шведські військові корені"
  swedish_roots_desc: "Від дисциплінованих каролінських лав до сильного вільного селянства, військова доблесть Швеції є суттєвим стовпом Скандинавії. Інтегруючи шведські інституції та системи рекрутування, ми зміцнюємо людські ресурси та силу нашої імперії."
  finnish_heritage: "Фінська прикордонна кавалерія"
  finnish_heritage_desc: "Фінська кавалерія — Гаккапеліти — здобула грізну репутацію в європейських війнах. Ці вершники, виховані в диких лісах і на рівнинах Фінляндії, приносять досвід, адаптивність і витривалість. Формалізуючи їхню роль, ми створимо постійну елітну силу в наших арміях."
  symbol_of_catholicism: "Символ католицизму"
  symbol_of_catholicism_desc: "Єрусалим є найсвятішим містом у християнстві, самим місцем Страстей і Воскресіння Христа. Затверджуючи католицьку перевагу над цими священними землями, ми стаємо духовним маяком латинського світу та опорою істинної віри."
  protectors_of_jerusalem: "Захисники Єрусалиму"
  protectors_of_jerusalem_desc: "Ми стоїмо на передовій християнства, оточені невірою. Наш священний обов'язок — захищати Святе Місто і вселяти страх у серця язичників, які наважилися б його узурпувати."
  latin_patriarch: "Латинський Патріарх"
  latin_patriarch_desc: "Папство відновило Латинського Патріарха Єрусалиму, колись вигнаного та забутого. Тепер відновлений, Патріарх зміцнить наш вплив у Римі та посилить нашу роль охоронця інтересів Церкви на Сході."
  rites_holy_sepulchre: "Обряди Гробу Господнього"
  rites_holy_sepulchre_desc: "У Храмі Гробу Господнього стародавні латинські обряди знову виконуються у всій своїй пишноті. Ці урочисті ритуали, що вшановують смерть і воскресіння Христа, підтверджують наш божественний мандат керувати цією землею та поширювати вчення нашої віри."
  latinate_integration: "Латинська інтеграція"
  latinate_integration_desc: "Наше царство є тиглем європейської знаті, паломників-фанатиків та старої левантійської крові. Завдяки ретельному управлінню ми сплетемо цю різноманітну спадщину в латинське християнське суспільство, де віра та культура йдуть рука об руку."
  chinese_siege_engineers: "Заплановані облоги"
  chinese_siege_engineers_desc: "Стіни наших фортів і міст завжди були товстими та міцними, і навіть наша найкраща облогова зброя не здатна серйозно їх пошкодити. Тому нашим інженерам довелося розробити багато різних тактик і стратегій для успішної облоги укріпленої позиції."
  chi_legitimate_claimant: "Претензія на Мандат"
  chi_legitimate_claimant_desc: "Хоча ми походимо зі скромного початку, ми довели свою здатність керувати та надихнули багатьох вірних підданих. Тепер нас вважають гідними претендентами на Мандат Небес і Серединне Царство."
  chi_great_rivers_of_china: "Родючі річки"
  chi_great_rivers_of_china_desc: "Хоча з великими річками, що протікають нашими землями, пов'язаний певний ризик, вони також нададуть нам чудові можливості для виробництва великої кількості їжі."
  arabian_horsemanship: "Аравійська верхова їзда"
  arabian_horsemanship_desc: "Коні, вирощені на наших землях, бажані в багатьох чужих країнах за їхню красу та силу. Зосередившись на їхньому вирощуванні та експорті, ми отримаємо велику вигоду від їхньої слави."
  arabian_desert_warfare: "Сила пустелі"
  arabian_desert_warfare_desc: "Негостинний ландшафт Аравійської пустелі зробив наших воїнів сильнішими та здатними виснажувати ворога, перш ніж завдати смертельного удару."
  arabia_cradle_of_islam: "Колиска ісламу"
  arabia_cradle_of_islam_desc: "Наші землі є домом для деяких найсвятіших місць нашої віри. Це глибоко пов'язує наш народ з його вірою та надихатиме на багато великих справ."
  arabia_red_sea_trade: "Торгівля Червоним морем"
  arabia_red_sea_trade_desc: "Уздовж нашого узбережжя розташовано багато торгових постів, що приймають безліч цінних товарів як з наших власних земель, так і з чужих берегів. Настав час, щоб ми отримали свою справедливу частку цього багатства, що проходить повз."
  indonesia_outer_islands_archipelago: "Індонезійський архіпелаг"
  indonesia_outer_islands_archipelago_desc: "Морські зв'язки природно відіграють величезну роль у нашому суспільстві, оскільки ми оточені водами. Наша залежність від морської торгівлі та транспорту робить пересування морями тривіальним завданням для нашого народу."
  indonesia_naval_supremacy: "Морська доблесть"
  indonesia_naval_supremacy_desc: "Наша політична значущість в архіпелазі майже повністю залежить від сили наших військово-морських сил. Покращуючи підготовку наших моряків та будівництво нашого флоту, ми забезпечимо наше панування над меншими державами Індонезії."
  indonesia_trading_hub_of_the_east: "Торговий центр Сходу"
  indonesia_trading_hub_of_the_east_desc: "Незалежно від їхнього походження чи призначення, кожен торговець Азії зрештою муситиме перетнути наші землі, приносячи з собою як дорогоцінні товари, так і розповіді про свої подорожі."
  indonesia_archipelago_of_many_faiths: "Земля багатьох народів"
  indonesia_archipelago_of_many_faiths_desc: "Наші острови є домом для багатьох різних народів, що розмовляють різними мовами та вірять у багатьох різних богів. Лише якщо ми встановимо спільне розуміння та толерантність між ними, ми зможемо забезпечити процвітаючу країну."
  italian_universities: "Університети півострова"
  italian_universities_desc: "Італія є домом для багатьох великих університетів та вчених. Якщо ми хочемо зберегти полум'я Відродження живим, ми повинні постійно підтримувати ці великі установи."
  italy_great_families: "Великі родини Італії"
  italy_great_families_desc: "Після заснування єдиної італійської держави ми поглинули багато великих шляхетних родин у нашу країну. Ми повинні використовувати їхній престиж та репутацію для покращення нашої власної, водночас тримаючи цих здібних людей зайнятими."
  italian_innovativeness: "Італійська пристосованість"
  italian_innovativeness_desc: "Ми бачили, яких великих кроків можуть досягти люди з розквітом Відродження на наших землях. Якщо ми хочемо справді просуватися, ми не можемо перешкоджати прийняттю нових ідей, але повинні адаптувати їх і зробити їх справді своїми."
  italian_condottieri: "Великі капітани кондотьєрів"
  italian_condottieri_desc: "Наші землі славляться своїми великими військовими умами, що ведуть славні армії як у своїх інтересах, так і в інтересах того, хто запропонує найвищу ціну. Ми повинні забезпечити, щоб ці люди завжди були готові служити нам насамперед."
  usa_mayflower_compact: "Мейфлауерський договір"
  usa_mayflower_compact_desc: "Зв'язані спільною небезпекою та метою, перші поселенці уклали пакт про самоврядування. Навіть у дикій місцевості насіння суспільства та компромісу знайшло ґрунт."
  usa_empowered_assemblies: "Розширені асамблеї"
  usa_empowered_assemblies_desc: "Обрані асамблеї виникли по всій колоніях, надаючи землевласникам можливість керувати собою. Скромні витоки свободи лежать у залах цих установ."
  usa_great_awakening: "Велике пробудження"
  usa_great_awakening_desc: "Хвиля релігійного відродження прокочується землею, кидаючи виклик старим владам і пробуджуючи моральну свідомість народу, що підноситься."
  usa_declaration_of_independence: "Декларація незалежності"
  usa_declaration_of_independence_desc: "#italic Ми вважаємо ці істини самоочевидними, що всі люди створені рівними.#! \n\nЦією сміливою декларацією ми розірвемо ланцюги підкорення та приймемо нашу спільну долю."
  usa_bill_of_rights: "Білль про права"
  usa_bill_of_rights_desc: "#italic ...або обмежувати свободу слова чи друку; або право народу мирно збиратися та звертатися до Уряду з петиціями про відшкодування збитків.#!"
  usa_recognized_sovereignty: "Визнаний суверенітет"
  usa_recognized_sovereignty_desc: "Договори та дипломатія підтвердили те, що ми здобули нашими боротьбами. Наше місце на дипломатичній арені більше не ставиться під сумнів, а визнається."
  usa_era_good_feelings: "Ера добрих почуттів"
  usa_era_good_feelings_desc: "Після труднощів мир і єдність принесли рідкісний момент національної гармонії. Народ процвітає з оптимізмом і порядком."
  kon_bakongo_confederation: "Конфедерація Баконго"
  kon_bakongo_confederation_desc: "До піднесення нашого царства, народи цього регіону керували собою через кланові ради та провінційні союзи. Те, що ми тепер називаємо $KON$, виникло з віків переплетених відносин, де вірність землі та роду переважала вірність кордонам. Об'єднання цього клаптикового царства в централізовану державу було нелегким завданням, але ми це зробили і збережемо його разом."
  kon_lineage_lukeni_lua_nimi: "Родовід Лукені луа Німі"
  kon_lineage_lukeni_lua_nimi_desc: "Усе має свій початок, і для нашого королівства цей початок лежить у Лукені луа Німі. Він був більше, ніж завойовником. Справді, він був засновником, батьком нашого царства. Його родовід викликав повагу не лише через своє походження, а й тому, що він нагадує людям, хто першим наважився мріяти про об'єднаний $KON$."
  kon_european_contact: "Європейський контакт"
  kon_european_contact_desc: "Чужинці прибули з моря з бородами, книгами та бочками вина. Вони привезли з собою дивних богів, ще дивніші мови та цілий океан можливостей. Наші емісари вивчили їхні звичаї, їхні наміри, і найголовніше, як перетворити їхню потребу в союзниках на нашу перевагу."
  kon_cultural_syncreticism: "Культурний синкретизм"
  kon_cultural_syncreticism_desc: "Наплив іноземців та обміни вплинули на наше суспільство. Однак ми не відмовилися від наших звичаїв. Ми звертаємося до божеств кіконзькими іменами, носимо багато релігійних відзнак, а наші церемонії відлунюють як барабанами, так і гімнами. Це яскравий приклад нашої ясності, і боги, здається, погоджуються."
  kon_study_european_firearms: "Вивчення європейської вогнепальної зброї"
  kon_study_european_firearms_desc: "Мушкет, можливо, не робить людину хороброю, але він, безумовно, робить її страшною. Нехай європейці вихваляються своєю перевагою, ми купимо їхню зброю, освоїмо їхні тренування, і незабаром єдине, що відрізнятиме наших солдатів від їхніх, буде колір їхніх прапорів."
  kon_transatlantic_slave_trade: "Трансатлантична работоргівля"
  kon_transatlantic_slave_trade_desc: "В'язні та робітники потрібні за океаном, щоб заселити численні робочі місця, плантації та шахти. Хоча це далеко не благородна справа, ніхто не може заперечити прибутковий характер цих підприємств."
  ilk_restore_yam: "Відновити Ям"
  ilk_restore_yam_desc: "Ям, наша стародавня система релейних станцій і кур'єрів, колись з'єднувала найвіддаленіші куточки монгольського світу. Відновивши цю величезну мережу по всій Персії та за її межами, ми забезпечимо швидкість наших наказів, безпеку наших посланців та чуйність нашого панування, як це було в золоті часи ханів."
  ilk_ilkhanate_resurgent: "$ILK$ Відроджений"
  ilk_ilkhanate_resurgent_desc: "Те, що колись було зламано, тепер відроджено. Наші прапори знову майорять над Персією, викликаючи благоговіння та страх у рівній мірі. Коли звістка про нашу зростаючу силу пошириться, світ згадає, що означає бути керованим справжнім $ILKHANATE_LEADER_MALE$."
  ilk_persian_arts_and_architecture: "Перське Мистецтво та Архітектура"
  ilk_persian_arts_and_architecture_desc: "Наші предки правили мечем, але їхня велич вимірювалася палацами, бібліотеками та мінаретами. Наслідуймо їхній приклад і фінансуймо не лише стіни та дороги, а й мечеті, сади та школи як свідчення $ilkhanate$ величі."
  ilk_descendants_of_genghis_khan: "Нащадки $genghis_khan_name_no_tooltip$"
  ilk_descendants_of_genghis_khan_desc: "Кров $rank_empire_horde_ruler_suffix_male$ тече в наших жилах. Нехай ніхто не забуде, що наше правління було встановлено в степах і скріплено завоюванням. Наші вершники залишаються неперевершеними, а наші прапори несуть не просто ім'я, а право народження."
  ilk_new_roots: "Нове Коріння"
  ilk_new_roots_desc: "Дні чисто степових завоювань залишилися позаду. Ми посіяли себе в ґрунт прогресу та реформації. З цього ґрунту виросте більш стабільна, витончена держава. Хоча наше серце все ще може битися в ритмі відкритих полів, наше майбутнє полягає в тривалих інституціях, а не в швидкоплинних набігах."
  hin_sepahi: "Сіпахи"
  hin_sepahi_desc: "Нехтування важливістю піхотинців стало причиною падіння багатьох потенційних завойовників на цих землях. Ми повинні забезпечити, щоб наші війська були оснащені найефективнішою вогнепальною зброєю та навчені тактиці, яка може адаптуватися до будь-якого ворога."
  hin_united_india: "Об'єднана Індія"
  hin_united_india_desc: "Багато народів, культур, мов і націй, що складають Індійський субконтинент, будуть об'єднані під одним прапором. Лише зі спільним розумінням та ретельно плеканою єдністю серед індійського народу ми зможемо прагнути до більших амбіцій."
  hin_ganga: "Ганга"
  hin_ganga_desc: "Багато індусів поклоняються річці Ганг як богині, що приносить чистоту та спокуту вірним. Ми закликаємо паломників відвідати береги річки, щоб омитися в священних водах. Через Гангу наша нація стає чистою."
  hin_persianate_court: "Перська Придворна Культура"
  hin_persianate_court_desc: "Іноземні мови та придворні звичаї довгий час були впливовими в індійських дворах. Ми повинні використовувати ці зв'язки, щоб запросити найздібніших радників служити під нашим керівництвом."
  hin_gunpowder_empire: "Порохова Імперія"
  hin_gunpowder_empire_desc: "Наше майстерне володіння пороховою війною принесло нам славу та велику державу для правління. Це домінування було б неможливим без сприяння виробництву вогнепальної зброї для наших військ."
  hin_sufism: "Залучення Суфійських Місіонерів"
  hin_sufism_desc: "Мусульманські князі по всьому світу змагаються за залучення наймудріших суфійських вчителів. Зі зростанням нашої слави до нас приєдналося більше цих суфіїв. Міста засновуються там, де вони осідають, часто в раніше негостинних регіонах, а місцеві жителі надихаються мудрістю суфіїв навернутися до нашої віри."
  hin_administration_of_india: "Індійська Адміністрація"
  hin_administration_of_india_desc: "Управління державою розміром з цілий субконтинент — непросте завдання. Нам потрібно буде розробити надійну систему управління у співпраці з місцевими князями, щоб видобувати багатства з наших земель."
  hin_indian_empire: "Імперська Індія"
  hin_indian_empire_desc: "Жоден правитель, будь то мусульманин, індус, буддист чи джайн, ніколи не досягав успіху в завоюванні всієї Індії. Ми будемо першими універсальними правителями Індії!"
  hin_rocketry: "Розвиток Ракетної Технології"
  hin_rocketry_desc: "Ракети в залізних корпусах ще не були широко адаптовані для військових цілей, проте їхня вибухова сила, безумовно, має тактичне застосування. Ми повинні експериментувати з цією технологією та випробувати її на полі бою."
  hin_industrialization: "Індустріалізація Індії"
  hin_industrialization_desc: "Умови в індійській економіці ідеальні для швидкого промислового зростання. Завдяки новим технологіям ми можемо забезпечити кращі умови для нашого місцевого виробництва, особливо в текстильній промисловості. З акцентом на нові методи, наша загальноіндійська держава може забезпечити стабільне зростання для наших галузей."
  cth_merchant_legacy: "Спадщина купців"
  cth_merchant_legacy_desc: "Фінікійські торгові флоти століттями мандрували Середземномор'ям. Вся ця спадщина дозволяє синам Карфагена бути ефективнішими та безжальнішими, коли йдеться про торгівлю. Ми знову пануватимемо над потоком товарів."
  cth_breadbasket_of_rome: "Житниця Риму"
  cth_breadbasket_of_rome_desc: "Століття тому наші досягнення в іригації та техніках вирощування оливок принесли Карфагену назву римської житниці. Тепер ми зберемо стародавні знання і знову боротимемося з пустелею, щоб вирощувати оливкові гаї, як у давнину."
  cth_mercenary_army: "Армія найманців"
  cth_mercenary_army_desc: "Пунійська нація Карфагена не має великого населення, тому століттями ми покладалися на найманців, щоб вони воювали за нас. З часів реформації Карфагена ми продовжили цю традицію, щоб вберегти наше населення від небезпек війни."
  cth_cothons: "Котон"
  cth_cothons_desc: "Стародавній котон Карфагена був технологічним дивом, що дозволяло йому ефективно будувати кораблі. Тепер спадщина давнини слугуватиме нам як зразок для всієї країни. Вивчення стародавніх технік кораблебудування дозволяє нам знову досягти успіху в цій галузі. Карфагенський флот незабаром курсуватиме всім Середземномор'ям."
  cth_phoenician_sailors: "Фінікійські моряки"
  cth_phoenician_sailors_desc: "Відновивши наше стародавнє царство, ми почали звертатися до наших старих фінікійських братів у Лівії. В результаті, ми маємо постійний приплив добровольців, які бажають приєднатися до відновлення стародавнього фінікійського царства Карфагена. Здається, тепер ми можемо утримувати значно більший флот."
  cth_legacy_of_hannon: "Спадщина Ганнона"
  cth_legacy_of_hannon_desc: "Ганнон Мореплавець був великим дослідником давнини, який досяг далеких південних берегів Африки. Ми наслідуватимемо його приклад і відновимо наші дослідницькі подорожі, щоб відновити велику торговельну імперію. Цього разу ми розширимо наші дослідження ще далі, шукаючи нові торговельні можливості по всьому світу."
  cth_beyond_the_pillars: "За Стовпами"
  cth_beyond_the_pillars_desc: "Настав час нашим торговим факторіям вийти за межі міфічних Стовпів Геркулеса. Поєднання стародавніх знань про колонізацію з сучасними відкриттями дозволяє нам осідати ефективніше, ніж інші молодші нації, ті, хто досить новий у цьому досвіді. Карфагенські колонії незабаром будуть знайдені по всьому світу."
  cth_wine_traders: "Пунійська торгівля вином"
  cth_wine_traders_desc: "У давнину ми створили систему торгівлі вином, виробляючи великі обсяги низькоякісного вина для торгівлі та імпортуючи високоякісні вина для себе. Спираючись на це, ми прагнемо розширити наші можливості з виробництва вина, щоб взяти під контроль торгівлю вином по всьому Середземномор'ю."
  cth_punic_global_trade: "Пунійська світова торгівля"
  cth_punic_global_trade_desc: "Протягом століть наша нація домінувала в середземноморській торгівлі. Тепер, з усіма новими відкриттями, ми зобов'язані домінувати в ній глобально. Незабаром у кожному порту світу можна буде знайти карфагенське торгове судно."
  cth_sufet_rule: "Правління Шуфета"
  cth_sufet_rule_desc: "Наше стародавнє царство очолював обраний глава держави, якого називали Шуфетом. У цю нову сучасну епоху ми реорганізуємо наш уряд, використовуючи досвід давнини та поєднуючи його з сучасними теоріями, щоб створити наймогутнішу республіканську систему, яка затьмарить кожну республіку, створену до цього часу."