  increase_control_area_advance: "Збільшити контроль повсюдно"
  increase_control_area_advance_desc: "У міру зростання нашої могутньої країни, нам потрібно буде міцно тримати в руках наше населення."
  improved_supply_lines: "Покращені лінії постачання"
  improved_supply_lines_desc: "Сучасна війна вимагає все більше ресурсів для наших армій, особливо після розвитку залпового вогню та повсюдного використання артилерії на полі бою."
  supply_lines: "Лінії постачання"
  supply_lines_desc: "Розвиток професійних армій змінив спосіб ведення війни. Логістика тепер є вкрай важливою, а лінії постачання є абсолютно необхідними для забезпечення армій продовольством та боєприпасами."
  improved_logistics: "Покращена логістика"
  improved_logistics_desc: "Сучасне військове мистецтво нині чітко розрізняє між чиновниками-аматорами, які говорять про тактику, та професійними чиновниками, які вивчають логістику."
  mining_advance: "Каменоломство"
  mining_advance_desc: "Каменоломство було основною економічною діяльністю зорі людства. Повсюдне використання металообробки лише посилило важливість розвідки та видобутку різних типів мінералів та металів для розвитку складних суспільств."
  bronze_working: "Обробка бронзи"
  bronze_working_desc: "Бронза — це сплав міді та олова, відкритий та розроблений для створення значно міцніших інструментів та зброї, оскільки він також є більш пластичним та легшим у обробці матеріалом порівняно з міддю."
  iron_working: "Обробка заліза"
  iron_working_desc: "Залізо є ключовим матеріалом для виробництва різних типів інструментів та зброї, що робить його ключовим для ремесла ковалів, яких можна знайти в кожному селі, але також і для більших виробничих ланцюгів."
  advanced_mining: "Передовий видобуток"
  advanced_mining_desc: "Розробка досконаліших і довговічніших інструментів уможливила подальше розширення гірничих робіт для видобутку нових мінералів і металів."
  fine_metals_mining: "Видобуток коштовних металів"
  fine_metals_mining_desc: "Відкриття та розробка нових металевих сплавів уможливили видобуток і експлуатацію нових коштовних металів у більших масштабах, що зробило процес надзвичайно прибутковим порівняно з іншими видами гірничої справи."
  ranching: "Скотарство"
  ranching_desc: "Скотарство розвинуло можливість розведення табунів коней, що уможливило виведення найкращих тварин для подорожей, війн та багатьох інших завдань."
  mining_law_advance: "$mining_law$"
  mining_law_advance_desc: "$mining_law_desc$"
  fort_limit_1_advance: "Каштелянська система"
  fort_limit_1_advance_desc: "Призначаються офіційні каштеляни для управління місцевими фортецями та їхніми гарнізонами, що знаменує першу організовану систему адміністрування та утримання фортець."
  fort_limit_2_advance: "Прикордонні вартові"
  fort_limit_2_advance_desc: "Регіональні вартові координують кілька замків уздовж прикордонних маршів, встановлюючи маршрути постачання, ланцюги звітності та взаємну оборону між сусідніми фортецями."
  fort_limit_3_advance: "Бюро оборони"
  fort_limit_3_advance_desc: "Корона централізує нагляд за укріпленнями під формальним бюро в столиці, об'єднуючи записи, кошти та накази про технічне обслуговування в єдиний адміністративний орган."
  fort_limit_4_advance: "Генеральні інспектори"
  fort_limit_4_advance_desc: "Професійні інспектори подорожують королівством, щоб оцінювати гарнізони, запаси та стіни, забезпечуючи послідовні стандарти та надійність кожного укріпленого місця."
  fort_limit_5_advance: "Стандартизована інженерія"
  fort_limit_5_advance_desc: "Запроваджуються національні стандарти будівництва та ремонту, що забезпечує ефективне планування, спільні проєкти та передбачуване обслуговування по всій нашій мережі фортець."
  fort_limit_6_advance: "Геодезичні зйомки"
  fort_limit_6_advance_desc: "Комплексне картографування та логістична інтеграція пов'язують кожну фортецю в єдину оборонну систему; досягнення бюрократії, науки та державної влади, що працюють в унісон."
  chancery_advance: "Канцелярія"
  chancery_advance_desc: "Канцелярія — це бюрократична установа, яку середньовічні правителі розробили для управління своїми володіннями, оскільки суспільні зміни зробили їх складнішими та дедалі важчими для управління. Основна функція Канцелярії — писати, надсилати та отримувати документи, пов'язані з управлінням цими володіннями."
  chancery_records: "Канцелярські записи"
  chancery_records_desc: "Зростаючий апарат Канцелярій вимагав іншого рівня адміністрування, оскільки їхня бюрократія ставала ще складнішою для управління. Це проявляється у формі Канцелярських записів — установи, створеної для зберігання всіх листів, отриманих у Канцелярії, а також копій усіх документів, виданих її писарями та нотаріусами."
  lieutenancy_advance: "Намісництво"
  lieutenancy_advance_desc: "У міру зростання спадщини Корони тривалі відсутності монарха в різних королівствах послаблюють Корону та напружують відносини з підданими. Щоб вирішити цю проблему, виникає посада намісника, який діє як тимчасовий представник монарха під час його відсутності, що не має бути постійною. Ці намісники походять не лише з королівської крові, а й з близького оточення, пов'язаного з родиною короля."
  viceroyalty_advance: "Віцекоролівство"
  viceroyalty_advance_desc: "Віцекоролівство — це окрема та напівавтономна територіальна одиниця в межах королівства, що характеризується як монархічна держава, керована призначеним віцекоролем. Ці адміністративні одиниці довіряються віцекоролю, призначеному монархом, з вирішальною відповідальністю за управління та керування певною країною чи провінцією. Зазвичай розташоване окремо від центрального ядра королівства, віцекоролівство функціонує як окрема одиниця, демонструючи певний ступінь самоврядування, але зрештою підзвітне правлячому монарху. Роль віцекороля охоплює широкий спектр обов'язків, включаючи впровадження політики, підтримання порядку та представництво королівської влади у визначеному регіоні."
  tolerance_idea: "Ідеї толерантності"
  tolerance_idea_desc: "Кожна людина створена рівною Творцю, і тому ми розуміємо, що її вірування, навіть якщо вони помилкові, можуть бути прийняті як засіб для остаточного навернення до Єдиної Істинної Віри."
  empiricism: "Емпіризм"
  empiricism_desc: "Речі є такими, якими вони є, тому що ми можемо їх відчувати, бачити та загалом сприймати їх нашими органами чуття. Саме використовуючи ці емпіричні докази, ми приходимо до нових ідей."
  print_culture: "Друкована культура"
  print_culture_desc: "З винаходом друкарського верстата поширення знань ніколи не було таким легким. Нові техніки та досягнення досягнуть кожного куточка нашої нації та зроблять її сильнішою та багатшою."
  religious_unification: "Релігійне об'єднання"
  religious_unification_desc: "Існує лише одна істинна релігія, і тому наш обов'язок — об'єднати всіх вірних під єдиним керівництвом Бога."
  humanism: "Гуманізм"
  humanism_desc: "Людство є найвищим творінням нашого Господа, і таким чином природно поставити його в центр Творіння. Кожен аспект людської природи має бути збережений та заохочений, від його добробуту до його здатності до вільної волі чи дослідження Світу."
  merchant_traditions: "Торгові традиції"
  merchant_traditions_desc: "Торгівля та комерція — це життєва сила економіки, оскільки її потік є гарантією здорової економіки. Завдяки тому, що наші купці зосереджені на підтримці торговельного потоку, ми можемо створити собі традицію та репутацію жвавої торгівлі, що полегшить залучення до нас іноземної торгівлі."
  benign_diplomats: "Доброзичливі дипломати"
  benign_diplomats_desc: "Мистецтво дипломатії є складним. Бути вправним у словах недостатньо, оскільки загальна присутність та манера поведінки також мають вирішальне значення для того, як самі слова інтерпретуються. Завдяки тому, що наші дипломати зосереджуються на створенні більш приязного враження, ми можемо бути впевнені, що інші країни сприйматимуть нас більш прихильно."
  grand_banquets: "Великі бенкети"
  grand_banquets_desc: "Жодне важливе питання не може бути обговорене без супроводу трапези, і чим важливіше питання, тим ряснішою має бути трапеза. Регулярні великі бенкети дозволяють нам постійно та належним чином обговорювати всі питання, що потребують розгляду."
  buffer_states: "Буферні держави"
  buffer_states_desc: "Немає нічого гіршого, ніж бути сусідами з тим, з ким у вас суперечка. Якщо ми хочемо уникнути прикордонної напруги, наявність інших держав, що діють як буфер між нами та нашими потенційними ворогами, дасть нам трохи простору для дихання."
  camp_followers: "Табірні послідовники"
  camp_followers_desc: "Воїни, очевидно, складають основну частину наших армій, але жодна армія не може складатися лише з воїнів. Без додаткового оточення людей, що транспортують їжу та спорядження для армії, вона не змогла б нікуди дістатися. Організувавши та структурувавши цих табірних послідовників, ми можемо значно підвищити їх використання та ефективність."
  swedish_tradition: "Завжди атакувати"
  swedish_tradition_desc: "Якщо просто вишикуватися у Свінфюлькінг і атакувати супротивника, вони розіб'ються! Коней призначено для їзди в бій, і їм немає місця на полі бою."
  swedish_heritage: "Вільні фермери"
  swedish_heritage_desc: "Шведські селяни історично становили значну частину країни, і відмінності між шляхтою та вільним фермером ніколи не були великими."
  kung_och_riksdag: "Король і Риксдаг"
  kung_och_riksdag_desc: "Шведські королі часто залежали від співпраці зі станами, особливо з великим селянським класом, щоб урівноважити шляхту. Однак під час правління Густава Адольфа було досягнуто історичного компромісу зі шляхтою, яка зобов'язалася лояльно надавати свої ресурси в розпорядження нації в обмін на нові привілеї."
  swedish_steel: "Шведська сталь"
  swedish_steel_desc: "Поки інші армії стріляють неточними залпами по своїх ворогах, ми будемо марширувати на них дисциплінованими рядами, дамо єдиний залп з близької відстані, а потім дамо їм холодну сталь."
  hakkapelitta: "«Гаккапеліти»"
  hakkapelitta_desc: "Фінляндія — досить бідне та відстале місце, і служба у шведській армії дає людям чудові можливості для фінансового просування через грабунок. Гарна верхова їзда та високоякісні коні дозволяють нам вирощувати чудову та страшну кавалерію, яка, як стверджують наші вороги, невразлива через чаклунство."
  indelningsverket: "Інделнінгсверкет"
  indelningsverket_desc: "Шведська система наділів полягала в поділі селянства на групи по 10 осіб для цілей вербування. Ця система полегшила пошук людей для служби в армії та їх організацію в підрозділи."
  swedish_absolutism: "Шведський абсолютизм"
  swedish_absolutism_desc: "Абсолютизм — це теорія, згідно з якою одна людина повинна керувати, ця людина — Король, і він повинен мати можливість керувати урядом, не обмежуючись таємною радою."
  produktplakatet: "Продуктплакатет"
  produktplakatet_desc: "Указ забороняє іноземним суднам, що прибувають до Швеції, привозити товари з інших країн, окрім їхніх власних або колоній."
  mulltimmer_masugn: "Муллтіммер Масугн"
  mulltimmer_masugn_desc: "Шведське залізо, ціноване за його чистоту та міцність, забезпечувало не лише наші внутрішні потреби, а й ливарні та збройові заводи націй по всьому континенту. Муллтіммер Масугн був побудований не тільки з каменю, а й з дерева, ізольованого піском, гравієм та брудом."
  swedish_royal_post_office: "Кунгліга Постверкет"
  swedish_royal_post_office_desc: "Кунгліга Постверкет (Королівське поштове агентство) було засноване під час правління королеви Христини. Створене для покращення державного управління та зв'язку по всій величезній Шведській імперії, воно створило надійну мережу кур'єрів та поштових станцій. Система стала вирішальною для військової координації, дипломатії та управління під час епохи Швеції як великої держави."
  polhem_machina_nova: "Махіна Нова"
  polhem_machina_nova_desc: "Крістофер Польхем, прозваний «батьком шведської інженерії», трансформував промисловість Швеції своєю Machina Nova, інноваційним набором механічних систем для оптимізації та збільшення виробництва. Використовуючи складні системи шестерень, кулачків та водяної енергії, Польхем розробив машини, здатні виконувати завдання, які раніше виконувалися вручну, від подрібнення руди в шахтах до ткацтва текстилю та лісопиляння. Його Laboratorium Mechanicum служило як майстернею, так і школою, поширюючи механічні знання по всьому королівству."
  hun_composite_light_cavalry: "Композитна легка кавалерія"
  hun_composite_light_cavalry_desc: "Складаючись з кінних лучників, а також швидких вершників, легка кавалерія нашої країни є основою нашої військової сили. Вона показала свою цінність у великій битві на Мархфельді 1278 року, і вона знову поведе наші сили до слави."
  hun_castle_warriors: "Замкові воїни"
  hun_castle_warriors_desc: "Замкові воїни, обраний клас у нашій державі, зобов'язані нести військову службу своїм місцевим #italic ispáns#! у королівських замкових округах. З'явившись у найдавніші часи королівства, ці привілейовані землевласники займають унікальне становище, захищаючи своє царство, плекаючи свої спадкові права."
  hun_renaissance_knowledge: "Князь Відродження"
  hun_renaissance_knowledge_desc: "Кріпаки вважали свого Короля справедливим правителем, тому що він захищав їх від надмірних вимог та інших зловживань магнатів. Він був справжнім князем Відродження, успішним військовим лідером та адміністратором, видатним лінгвістом та освіченим покровителем мистецтв."
  hun_bulwark_of_christianity: "Оплот християнства"
  hun_bulwark_of_christianity_desc: "Зі зростанням турецької могутності на півдні, на народ Угорського королівства лягає обов'язок захищати християнський світ від турецької загрози. Нехай буде відомо, що ми не відступимо від свого обов'язку."
  hun_found_the_black_army: "Заснувати Чорну армію"
  hun_found_the_black_army_desc: "Натхненна працями Юлія Цезаря, Угорщина матиме ядро професійних військ для своїх армій. Ці люди будуть настільки загартовані, що наші вороги назвуть цих воїнів чорною армією."
  hun_reformed_coinage: "Реформована монетна система"
  hun_reformed_coinage_desc: "Щоб оплатити нашу нову професійну армію, нам знадобиться стабільний потік доходів. Реформування монетної системи для стандартизації ваги значно полегшить це, оскільки ми знатимемо, скільки люди повинні будуть платити."
  hun_curtailed_peasantry: "Обмежити свободу селянства"
  hun_curtailed_peasantry_desc: "Угорщина не благословенна природними рубежами, на яких вона могла б базувати свою оборону. Дика рівнина, яка вперше привела сюди наших предків, була ідеальною для здійснення набігів на Захід, а не для оборони. Якщо Угорщину потрібно захищати, нам знадобляться ресурси. Якщо ми погодимося дозволити нашим магнатам міцніше прив'язати селянство до землі, вони забезпечать їхню стараннішу працю."
  hun_strengthened_towns: "Зміцнити міста"
  hun_strengthened_towns_desc: "Угорщина потребує багатства, щоб рости і процвітати, і міста є ключем до цього. Якщо ми забезпечимо належний захист наших міст від знаті, вони й надалі приноситимуть торгівлю, яку ми зможемо оподатковувати."
  hun_hungarian_reformation_intro: "Ідеї Реформації поширювалися Європою, мов лісова пожежа, і тому були приречені знайти свій шлях до наших земель."
  hun_hungarian_reformation: "Угорська Реформація"
  hun_hungarian_reformation_desc: "$hun_hungarian_reformation_intro$ Наші землі достатньо довго перебували під загрозою зовнішніх сил. Приєднавшись до Реформації та відмовившись від обов'язку слідувати за Папою, як його вірний пес, ми можемо розірвати принаймні один із кайданів, що пригнічують нас!"
  hun_the_catholic_shield: "Католицький щит"
  hun_the_catholic_shield_desc: "$hun_hungarian_reformation_intro$ Проте серця вірних залишаються міцними. Бог і його вірні слуги витримають єретичне безумство."
  hun_realm_of_many_religions: "Держава багатьох релігій"
  hun_realm_of_many_religions_desc: "$hun_hungarian_reformation_intro$ На жаль, Реформація розколола сім'ї, перетворила колишніх друзів на ворогів і загрожувала самій стабільності багатьох держав. Однак наша держава знає, як не стати жертвою теологічної боротьби. Зрештою, ми є народом і державою багатьох релігій."
  hun_multi_culturalism: "Держава багатьох культур"
  hun_multi_culturalism_desc: "Карпатський басейн є домом не лише для угорців. Словаки, русини, половці, німці та багато інших меншин називають нашу державу своїм домом. Таким чином, цілком природно, що наш уряд вправно та з легкістю адаптує різні культури до нашої держави."
  hun_revolutionized_military_tactics: "Революційні військові тактики"
  hun_revolutionized_military_tactics_desc: "З розвитком військових технологій розвиваються і тактики на полі бою. Для виживання нашої держави вкрай важливо, щоб ми йшли в ногу з постійно революціонізуючою природою сухопутної війни."
  hun_hungarian_unity: "Угорська єдність"
  hun_hungarian_unity_desc: "Хоча наш народ стикався з багатьма зовнішніми загрозами, дух і воля угорців залишаються незламними. Єдність угорців є великим натхненням для наших гордих воїнів, які захищатимуть наші батьківщини до останнього."
  hun_hungarian_hussars: "$a_hungarian_hussars$"
  hun_hungarian_hussars_desc: "$a_hungarian_hussars_desc$"
  salic_law_advance: "Салічний закон"
  salic_law_advance_desc: "Роль жінок серед монархій світу не завжди шанована. Тому нерідко ці монархії мають закони, які прямо забороняють жінкам брати участь у спадку взагалі, повністю пропускаючи їх на користь їхніх братів або двоюрідних братів."
  partition_inheritance_advance: "Поділ спадщини"
  partition_inheritance_advance_desc: "Суперництво між синами монарха не є рідкістю, оскільки кожен з них хотів би стати майбутнім монархом. Щоб уникнути такого суперництва, деякі монархи вирішують розділити всі свої території та титули між усіма своїми синами, щоб усі вони відчували задоволення від рівномірного отримання спадщини."
  national_assemblies_advance: "Національні збори"
  national_assemblies_advance_desc: "$national_assemblies_desc$"
  enlightenment_advance: "Просвітництво"
  enlightenment_advance_desc: "Минуле століття стало свідком того, як раціоналізм та емпіризм набувають все більшої популярності серед великих умів епохи. Світло Розуму запалено, і багато хто не заспокоїться, доки його не буде принесено в усі куточки землі."
  distribution_of_power_advance: "$distribution_of_power_law$"
  distribution_of_power_advance_desc: "$distribution_of_power_law_desc$"
  industrialization_advance: "Індустріалізація"
  industrialization_advance_desc: "Підйом промислової революції приносить міжнародні та тривалі зміни не лише в комерції та бізнесі, а й у самій тканині суспільства. Винаходи, такі як механічний ткацький верстат та парові машини, піднімуть можливості людства до найвищого зеніту."
  levee_en_masse_advance: "Масовий призов"
  levee_en_masse_advance_desc: "Війна – це концепція, що постійно розвивається, інноваційна та відточена покоління за поколінням. Щоб задовольнити потребу в експансії та забезпечити необхідне паливо для здійснення цих амбіцій, будуть розроблені та підписані нові загальнонаціональні закони про призов, що дозволять формувати армії з усіх неодружених молодих чоловіків, розмір яких визначить хід історії."
  griot_advance: "Гріот"
  griot_advance_desc: "Гріоти – це оповідачі, історики, радники, музиканти та поети водночас. Вони зберігають історії та легенди минулих поколінь, виступають посередниками між двома ворогуючими сторонами та служать своїм правителям і місцевим народам як радники."
  west_african_caravan_stop_advance: "Сахарський $caravan_stop$"
  west_african_caravan_stop_advance_desc: "Торгівля між субсахарською Африкою та Північною Африкою була частиною нашої ідентичності протягом століть. Подорож через величезну пустелю, навіть з багаторічним накопиченим досвідом, є виснажливою та небезпечною. Ключем до забезпечення сахарської торгівлі є $caravan_stop$, місце, де купці та їхні каравани могли зупинитися та відпочити на своєму шляху через пустелю."
  sunday_schools_advance: "Недільні школи"
  sunday_schools_advance_desc: "Освіта менш забезпечених є важливою частиною нашої релігійної місії. Ми повинні заснувати школи, тісно пов'язані з нашим звичайним церковним служінням, щоб забезпечити базову освіту для нашої пастви."
  res_publica_christiana: "Універсальне християнство"
  res_publica_christiana_desc: "Ми повинні підтримувати добрі стосунки з нашими братами-християнами, навіть якщо деякі їхні практики вважаються єрессю."
  roman_orthodoxy: "Римське православ'я"
  roman_orthodoxy_desc: "Праведність римо-католицької віри та її доктрини повинна залишатися беззаперечною, щоб забезпечити людям її авторитет."
  marian_devotion: "Відданість Діві Марії"
  marian_devotion_desc: "Наше поклоніння Діві Марії має залишатися центральним стовпом нашого віросповідання."
  crusading_knights: "Досвід Балтійських хрестових походів"
  crusading_knights_desc: "Відправлення наших найкращих лицарів і шляхтичів до язичницьких земель Балтійського чи Середземного морів має давню традицію в нашій країні. Ми виконаємо добру справу Христа, приносячи віру неосвіченим, і, крім того, отримаємо досвідчених командирів для наших армій."
  catholic_pilgrimages: "Католицькі паломники"
  catholic_pilgrimages_desc: "Святі місця нашої віри заслуговують на турботу та увагу кожного послідовника. Заохочення паломництв та піднесення тих, хто пройшов цей процес, має бути важливою дією в нашій країні."
  inquisition_advance: "Інквізиція"
  inquisition_advance_desc: "Інквізиція була створена у XII столітті як засіб боротьби з єрессю катарів, але її вплив значно зріс у Пізньому Середньовіччі як головний інструмент Католицької Церкви для протидії поширенню дисидентських доктрин."
  preaching_friars: "Проповідницькі ченці"
  preaching_friars_desc: "Стало досить популярним для ченців починати проповідувати нашу віру. Ми повинні підносити тих, хто береться за це завдання, і хвалити їхні зусилля у ствердженні переконань наших селян."
  devotio_moderna: "Devotio Moderna"
  devotio_moderna_desc: "Рух сучасної побожності поширюється по всій нашій вірі, і ми повинні впровадити деякі з їхніх вчень у наш двір, демонструючи дім побожних християн."
  denounce_heretics: "Засудження єретиків"
  denounce_heretics_desc: "Ми повинні зберегти єдину істинну віру і засудити всіх, хто висловлює єретичну критику на її адресу."
  beguins_and_beghards: "Світські релігійні ордени"
  beguins_and_beghards_desc: "Багато вірних присвятили себе життю молитви та добрих справ, які зазвичай супроводжують чернече життя ченців і черниць. Однак вони не склали офіційних обітниць і діють без офіційного папського схвалення. Тим не менш, ми повинні підтримувати ці популярні зусилля робити добрі справи та допомагати нашому населенню."
  conquistador_advance: "Конкістадори"
  conquistador_advance_desc: "Відкриття Нового Світу приваблює авантюристів усіх мастей ризикувати своїми статками та життям у невизначених експедиціях, з обіцянкою неперевершеного багатства, слави та влади. Ці експедиції є угодою між їхнім лідером та Короною, юридично оформленою як «капітуляції завоювання»."
  grand_display_of_faith: "Грандіозні прояви віри"
  grand_display_of_faith_desc: "Щоб вшанувати Бога, ми повинні будувати великі пам'ятники на Його ім'я. Це не тільки продемонструє нашу відданість єдиному істинному Богу, але й покаже красу наших вправних архітекторів."
  monastery_productions: "Ощадливість монастирів"
  monastery_productions_desc: "Мешканці наших монастирів дотримуються ідеалів ощадливості. Наше духовенство повинно брати цих ченців і черниць за приклад для власної поведінки."
  reform_church_music: "Реформа церковної музики"
  reform_church_music_desc: "Ми повинні прийняти запропоновані реформи нашої літургійної музики. Розбавлена музика, що використовується нині, більше не може вважатися прийнятною."
  frequent_councils: "Часті собори"
  frequent_councils_desc: "Було запропоновано проводити часті собори для нашої віри, щоб уникнути надто довгого розростання критики. Хоча ми, можливо, не маємо повного впливу на поведінку курії, ми можемо принаймні застосувати той вплив, який можемо зібрати, щоб реалізувати цю пропозицію."
  mendicant_orders: "Жебрацькі ордени"
  mendicant_orders_desc: "Ордени нашої віри, що присягнули на бідність та мандрівне життя, принесли допомогу багатьом куточкам нашої країни. Ми повинні підтримувати ці зусилля настільки, наскільки це можливо, не порушуючи їхніх обітниць."
  exsurge_domine: "Exsurge Domine"
  exsurge_domine_desc: "Щоб викорінити зло єресі, Сам Господь повстане і очистить їх від наших земель!"
  confutatio_augustana: "Спростувати хибні сповіді"
  confutatio_augustana_desc: "У такі бурхливі часи ми повинні чітко донести до наших підданих, що ми вважаємо єретичною думкою, а яку доктрину має сповідувати справжній християнин."
  roman_catechism: "Римський катехізис"
  roman_catechism_desc: "Наше духовенство повинно адаптуватися до офіційних настанов Церкви. Це зробить наших священиків ефективнішими та полегшить їхню освіту."
  oversea_missions: "Заморські місії"
  oversea_missions_desc: "Наше духовенство готове і бажає поширювати нашу віру на нові заморські території. З їхнім внеском освоєння нових земель стане легшим і дешевшим."
  baptism_books: "Книги хрещень"
  baptism_books_desc: "Ми повинні підтвердити хрещення як важливий наріжний камінь нашої віри і дати нашому духовенству можливість дотримуватися цього заради всіх вірних."
  second_scholasticism: "Друга $scholasticism$"
  second_scholasticism_desc: "Нам потрібно буде відродити та вдосконалити філософський рух середньовічної схоластики."
  catholic_sunday_schools: "$sunday_schools_advance$"
  catholic_sunday_schools_desc: "$sunday_schools_advance_desc$"
  index_librorum_prohibitorum: "Індекс заборонених книг"
  index_librorum_prohibitorum_desc: "Небезпечні ідеї Реформації зможуть поширюватися в умах наших підданих лише тоді, якщо вони матимуть доступ до письмових творів, що пропагують ці безглузді думки."
  catholic_cuius_regio_eius_religio: "Cuius Regio, Eius Religio"
  catholic_cuius_regio_eius_religio_desc: "#italic Чия влада, того й релігія.#! Нам доведеться прийняти, що інші країни сповідують окрему віру, і це іноді буде життєво важливим для нашої дипломатії."
  embellish_baroque_art: "Прикрасити барокові твори"
  embellish_baroque_art_desc: "Спонсорство мистецтва має велику традицію в нашій вірі. Розвиток стилю бароко добре відображає нашу теологію, і ми повинні продовжувати спонсорувати цих митців."
  national_churches: "Національна Церква"
  national_churches_desc: "Держава повинна взяти більший контроль над Церквою в нашій землі, оскільки ми не можемо дозволити іноземним суб'єктам здійснювати занадто великий вплив на нашу адміністрацію."
  entrenched_church: "Укорінена Церква"
  entrenched_church_desc: "Незалежно від того, над яким народом ми пануємо, Церква запропонує нам спосіб надати їм єдину структуру."
  catholic_enlightenment: "Католицьке Просвітництво"
  catholic_enlightenment_desc: "Щоб наша віра витримала часи просвітництва, ми повинні адаптуватися та отримати новий погляд на Церкву."
  divine_church_music: "Божественна Церковна Музика"
  divine_church_music_desc: "Багато наших композиторів створили свої найвеличніші твори, натхненні вірою. Ми повинні продовжувати шукати найталановитіших митців і наймати їх, щоб наші церкви та собори ніколи не чули посередньої музики."
  continue_missionary_works: "Місіонерські Праці"
  continue_missionary_works_desc: "Місіонерські зусилля з поширення нашої віри в найвіддаленіших куточках світу ніколи не можуть вважатися завершеними. Нам потрібно спонсорувати більше місій, щоб поширювати благу звістку католицизму."
  protestant_invite_persecuted: "Запросити Небажаних"
  protestant_invite_persecuted_desc: "Хоча ми побачили світло істинної віри, багато наших братів страждають під гнітючим правлінням заблукалих. Ми повинні запросити та підтримати цих людей оселитися на наших землях, де вони зможуть жити без наслідків і, що важливіше, робити внесок у нашу скарбницю."
  protestant_administration_tax: "Ефективні Збирачі Податків"
  protestant_administration_tax_desc: "Раніше духовенство брало на себе частину тягаря належного оподаткування. Хоча деякі з цих структур були демонтовані після Реформації, здатні люди все ще присутні та готові служити нам."
  confessio_augustana: "Нове Віросповідання"
  confessio_augustana_desc: "Реформація дає нам можливість визначити нове віровчення для нашого народу і, що важливіше, приймати критику щодо нього та змінювати його."
  devotionalism: "Девоціоналізм"
  devotionalism_desc: "Ми повинні відродити августинську теологію і будувати нашу віру на емоціях та запалі вірних."
  protect_the_new_faith: "Щит Віри"
  protect_the_new_faith_desc: "Наша Віра оточена ворогами з усіх боків, і ми повинні будемо захищати наше право на власне віросповідання від папістських гнобителів."
  expulsion_of_heretics: "Вигнання Єретиків"
  expulsion_of_heretics_desc: "Проблемні єретики нашого домену можуть стати центром повстання проти нашого правителя. Було б краще, якби ми перенаправили їх до наших заморських колоній, де вони зможуть завдати менше клопоту."
  repurposed_monasteries: "Перепрофільовані Монастирі"
  repurposed_monasteries_desc: "Старі церковні землі, захоплені нашою державою під час навернення нашої країни, можуть тепер служити нам як нові центри виробництва або управління."
  involved_laity: "Залучене Мирянство"
  involved_laity_desc: "Зі збільшенням залучення мирян до повсякденного управління нашою Церквою, наш народ знайшов більш особистий зв'язок із самою вірою."
  protestant_cuius_regio_eius_religio: "$catholic_cuius_regio_eius_religio$"
  protestant_cuius_regio_eius_religio_desc: "$catholic_cuius_regio_eius_religio_desc$"
  protestant_painters: "Протестантське мистецтво"
  protestant_painters_desc: "Реформація спонукала дедалі більше митців зображувати нові сцени, віддалені від прославлення Бога. Найм більшої кількості таких митців добре позначиться на нас як на великому покровителі мистецтв."
  protestant_sunday_schools: "$sunday_schools_advance$"
  protestant_sunday_schools_desc: "$sunday_schools_advance_desc$"
  protestant_work_ethic: "Працьовиті робітники"
  protestant_work_ethic_desc: "Вплив пуританських або пієтистських проповідників на Реформацію незаперечний. Їхній акцент на таких чеснотах, як старанність і ощадливість, допоможе нам виховати високоякісну робочу силу."
  embrace_romanticism: "Прийняти романтизм"
  embrace_romanticism_desc: "На хвилі Просвітництва ми не повинні забувати про привабливість романтизації. Наші художники-романтики неодмінно створять великі витвори мистецтва."
  wary_of_heretic_preachers: "Захист від єретиків"
  wary_of_heretic_preachers_desc: "Нам потрібно буде остерігатися сил, що намагаються навернути наш народ або навернути його назад до нашої попередньої віри. Називаючи цих проповідників зловмисними та ворожими, ми можемо підготувати наш народ до таких контактів і легше забезпечити релігійну ортодоксію."
  protestant_innovation: "Протестантські інновації"
  protestant_innovation_desc: "Починаючи з витоків нашої віри, ми засвоїли невід'ємну цінність сумніву в усталених доктринах і віруваннях. Те саме ми можемо застосувати до інших галузей знань."
