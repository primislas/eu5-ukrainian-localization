  power_projection_advance_6: "Глобальні амбіції"
  power_projection_advance_6_desc: "Консолідація країн у більші призвела до формування великих держав, що панують над значними частинами своїх континентів і мають намір поширювати свою владу ще далі."
  enlightened_court: "Просвітлений двір"
  enlightened_court_desc: "Цінності Просвітництва завжди присутні при будь-якому сучасному дворі, а з ними приходить і присутність найінтелектуальніших та найпідготовленіших людей. Завдяки цьому тепер можна досягти набагато більшого, докладаючи значно менше зусиль."
  government_size_revolutions: "Сучасне представництво"
  government_size_revolutions_desc: "Завдяки встановленню різних форм кращого представництва для народу, уряд здатен належним чином вирішувати більше питань, ніж будь-коли раніше."
  global_supply_limit_modifier_advance_6: "Планування логістики кампаній"
  global_supply_limit_modifier_advance_6_desc: "Планування логістики військових дій стало дедалі складнішим, оскільки їхнє зростання в масштабах уможливило виставлення кількох армій для довгострокових кампаній, залучаючи сотні тисяч солдатів на багато років."
  rgo_size_advance_revolutions: "Парова машина"
  rgo_size_advance_revolutions_desc: "Сила пари як засобу для живлення машини була відома з античності. Однак її потенціал ніколи не був повністю реалізований донедавна, коли останні досягнення у фізиці та математиці дозволили створити більш досконалі парові машини, які, своєю чергою, можуть приводити в дію складніші механізми. Це дозволяє значно підвищити продуктивність у всіх галузях."
  military_tactics_advance_6: "Польова артилерія"
  military_tactics_advance_6_desc: "Оскільки артилерія тепер може супроводжувати решту армії на полі бою, її вплив більше не обмежується лише тим, що знаходиться в межах її дальності стрільби. Натомість напівавтономні артилерійські формування під керівництвом артилерійських офіцерів можуть бути розгорнуті там, де вони найбільш потрібні."
  road_advance_2: "Базові дороги"
  road_advance_2_desc: "Рудиментарні дорожні мережі поступилися місцем необхідності вдосконалення наших транспортних систем. Розширюючи наші дороги, ми розширимо обіг товарів на нашій території."
  written_alphabet: "Писемний алфавіт"
  written_alphabet_desc: "Народ є сумою своєї спадщини, і як такий, писемний алфавіт є лише першим кроком до здобуття безсмертя та виховання добре функціонуючого суспільства."
  codified_laws: "Кодифіковані закони"
  codified_laws_desc: "Статути та постанови є життєвою силою добре функціонуючого суспільства. Якщо ми хочемо відточити нашу ефективність та внутрішні можливості, набір надійних кодифікованих законів має життєво важливе значення."
  taxation_advance: "Оподаткування"
  taxation_advance_desc: "Діяльність у цивілізованому суспільстві передбачає підтримку центральної влади. Стягуючи податки з наших підданих та громадян, ми легко зможемо діяти продуктивно."
  state_administration_advance: "Державне управління"
  state_administration_advance_desc: "Оподаткування нашого населення є можливим лише доти, доки ми знаємо, хто де живе і які місцеві звичаї та закони застосовуються до населення. Таким чином, запровадження системи управління державою є необхідним."
  agriculture_advance: "Сільське господарство"
  agriculture_advance_desc: "Земля є одним із найбільших джерел багатства, достатку та продуктів. Щоб розвивати наше суспільство, годувати наш народ і процвітати, ми повинні навчитися використовувати її."
  city_building_advance: "Містобудування"
  city_building_advance_desc: "Розвиток міських центрів лежить в основі урбанізаційного руху, спрямованого на зведення великих розлогих комплексів складних будівель."
  road_building: "Будівництво доріг"
  road_building_desc: "Перевезення товарів, військ та людей є життєво важливим для нашого виживання. Розробивши найпростішу форму дорожньої мережі, ми зможемо принаймні з'єднати наш народ і допомогти йому в його щоденних справах."
  ship_building_advance: "Кораблебудування"
  ship_building_advance_desc: "Моря приховують багато пригод, велике багатство, а також комерційні та експансіоністські можливості."
  mapmaking: "Картографія"
  mapmaking_desc: "Малювання місць або країн на папері чи сувої – це набагато більше, ніж мистецтво, це збір інформації для стратегічного використання. Знаючи, де знаходяться місця, ми можемо не тільки краще координувати атаки, але й отримати кращі знання про власну територію. Як казали старійшини, знання – це сила."
  standardized_coins: "Стандартизовані монети"
  standardized_coins_desc: "Зі створенням багатства з'являється все більше монетних дворів. Хоча ми роками жили з багатьма типами валют, необхідно встановити нові стандарти, щоб уникнути шахрайства, спричиненого використанням меншої кількості благородних металів або обпилюванням країв цих монет."
  humanism_ideas: "Гуманізм"
  humanism_ideas_desc: "Поставивши людину в центр усього, ми приймаємо наш обов'язок гнатися за невідомим і використовувати даний нам розум, щоб розкрити таємниці нашого світу. Виховуючи особистостей, ми забезпечуємо їхні свободи, їхню вільну волю та відповідальність за власні вчинки. Ми використовуватимемо знання давніх, щоб далі розвиватися як люди та вчитися на їхніх успіхах і невдачах."
  legalism_advance: "Легалізм"
  legalism_advance_desc: "Закони та правила нічого не варті, якщо вони не складені, не стандартизовані та загалом не зроблені зрозумілими для членів нашого суспільства. Якщо ми будемо їх дотримуватися, панування свободи та справедливості досягне найвіддаленіших куточків нашого царства."
  meritocracy_advance: "Меритократія"
  meritocracy_advance_desc: "Заслуги не є винятковою прерогативою вищих ешелонів нашого суспільства, але можуть бути знайдені скрізь, навіть серед найскромнішої особистості. Створюючи стандартизовані іспити, які вимірюють ці заслуги, зусилля та загальну компетентність, ми можемо знайти ті коштовності, приховані на видноті, для кращого майбутнього нашої нації."
  cathedral_advance: "Кафедральний собор"
  cathedral_advance_desc: "Кафедральний собор — це найбільший і найважливіший християнський храм, де єпископ має свою кафедру або престол. Хоча церква може бути красивою та деталізованою, кафедральний собор є величним, величезних розмірів і з найтоншими деталями в кожному куточку."
  infiltrate_administration: "[Concept('infiltrate_administration', 'CONCEPT_PLACEHOLDER')|e]"
  supportrebels: "[Concept('support_rebels', 'CONCEPT_PLACEHOLDER')|e]"
  infiltrate_administration_advance: "Проникнення в адміністрацію"
  infiltrate_administration_advance_desc: "Конфлікти з іншими державами ведуться не лише на полі бою, а й у тіні. Знання наступного кроку ворога є безцінним активом для перемоги у війнах. Таким чином, наші шпигуни спеціалізуватимуться на проникненні в адміністрацію держави та передаватимуть нам будь-яку інформацію."
  newspapers_advance: "Газети"
  newspapers_advance_desc: "Концепція оголошень за допомогою табличок або аркушів, розміщених у громадських місцях, не є новою. Однак, у міру поширення $printing_press$ по всьому світу, зростає і потреба в доступній інформації про політику, військову справу та економіку. Газета — періодичне видання, що описує поточні події, — задовольнить цей попит."
  feudal_de_jure_law_advance: "$feudal_de_jure_law$"
  feudal_de_jure_law_advance_desc: "#italic De Jure#! — «за законом» — це опис юридично визнаних практик незалежно від реальності їхнього застосування. Системи феодального суспільства побудовані на цій самій концепції."
  semi_salic_law_advance: "$semi_salic_law$"
  semi_salic_law_advance_desc: "За правом $salic_law$ лише чоловікам дозволено успадковувати трон. Така практика стикається з фатальною проблемою, коли чоловіча лінія вимирає, і монархія занурюється в кризу престолонаслідування. Щоб уникнути цього, право жінок буде розширено, щоб вони могли успадковувати, якщо не існує відповідного спадкоємця чоловічої статі."
  republican_foundation_law_advance: "$republican_foundation_law$"
  republican_foundation_law_advance_desc: "$republican_foundation_law_desc$"
  republican_election_law_advance: "$republican_election_law$"
  republican_election_law_advance_desc: "$republican_election_law_desc$"
  republican_electorate_law_advance: "$republican_electorate_law$"
  republican_electorate_law_advance_desc: "$republican_electorate_law_desc$"
  republican_power_law_advance: "$republican_power_law$"
  republican_power_law_advance_desc: "$republican_power_law_desc$"
  principle_of_administration_law_advance: "Принцип адміністративного права"
  principle_of_administration_law_advance_desc: "Природна еволюція нашої складної адміністрації диктує прийняття нових законів, що стосуються нашого управління."
  monarchy_reform_traditions_advance: "Традиції монархічних реформ"
  monarchy_reform_traditions_advance_desc: "Владу не можна довіряти будь-якій особі в королівстві. Зосередження впливу в руках правителя забезпечить порядок і стабільність під могутньою короною."
  republic_reform_traditions_advance: "Традиції республіканських реформ"
  republic_reform_traditions_advance_desc: "Поширення влади є наріжним каменем здорової республіки. Надійні закони, що диктують вибори за жеребом, забезпечать стабільність і зменшення корупції."
  blockade_tactics: "Тактика блокади"
  blockade_tactics_desc: "Застосування належних формацій і патрулів біля узбережжя ворожих портів підвищить нашу ефективність у перерізанні їхніх ліній постачання, скорочуючи облоги."
  recovery_efforts: "Зусилля з відновлення"
  recovery_efforts_desc: "Війна — жорстока пані, що залишає по собі лише руїни та спустошення. Зосередивши наші зусилля та допомагаючи нашому народу, ми можемо прискорити відновлення по всьому королівству."
  naval_initiative_ren: "Тактика розгортання"
  naval_initiative_ren_desc: "Правда, що перемога приходить завдяки ініціативі та швидкій мобілізації. Вивчення та впровадження тактики розгортання досягне саме цього."
  army_initiative_ren: "Перший удар"
  army_initiative_ren_desc: "Елемент несподіванки в поєднанні з першим ударом іноді визначатиме переможця в конфлікті. Забезпечення нашої військової ініціативи — чудовий спосіб зберегти конкурентну перевагу."
  law_making_renaissance: "Правовий контроль"
  law_making_renaissance_desc: "Нові часи означають нові ситуації, і не завжди закони, що традиційно використовувалися поколіннями, будуть застосовні до нових контекстів. Нам потрібен безперервний контроль і перегляд наших законів, щоб ми могли продовжувати адаптувати їх до наших сучасних часів."
  subject_integration: "Консолідація титулів"
  subject_integration_desc: "Хоча наявність багатьох країн, що служать нам, може мати свої переваги, лише зібравши їхні різні титули під нашим власним, ми зможемо справді отримати вигоду від їхніх земель. Зрештою, очевидно, що правитель лише з одним титулом блідне в порівнянні з нами, маючи багато титулів під одним правителем."
  rgo_construction_ren: "Зусилля з інфраструктури"
  rgo_construction_ren_desc: "Наша земля та наш народ — це життєва сила нашої країни. Надання їм належних зусиль для покращення їхньої інфраструктури не тільки принесе їм користь, але й повернеться нам десятикратною вигодою."
  naval_repair_ren: "Міцніші з'єднання"
  naval_repair_ren_desc: "Кожен знає, що діра в корпусі корабля, безсумнівно, призведе до його затоплення. Завдяки кращим будівельним технологіям ми можемо зробити дерев'яні дошки, що утворюють корпус, більш щільно з'єднаними, що не тільки сприяє зменшенню схильності кораблів до протікання, але й полегшує затикання будь-якої діри, коли корпус пошкоджується."
  linked_armies_advance: "Реле повідомлень"
  linked_armies_advance_desc: "Координація між різними підрозділами армії є вирішальною для її належного функціонування. Наявність належної системи для передачі повідомлень між нашими генералами та їхніми офіцерами підрозділів дозволить усім нашим військам працювати більш злагоджено та з швидшою реакцією на будь-яку ситуацію."
  regular_levy_training: "Призначене навчання"
  regular_levy_training_desc: "Ополчення за визначенням не є найкраще навченими військами, але це не означає, що ми повинні відправляти на війну натовп непідготовлених простолюдинів. Призначення їм належних інструкторів з наших найдосвідченіших військ дозволить їм вчитися у найкращих, а обов'язковий період навчання з ними зробить з них справжніх чоловіків."
  court_accounting: "Двірський облік"
  court_accounting_desc: "Двір є символом країни, і його процвітання має відображати процвітання країни. Однак це не означає, що двір може витрачати більше, ніж країна може витримати, і має бути належний облік, що контролює витрати при дворі."
  lead_ore_dressing: "Збагачення свинцевої руди"
  lead_ore_dressing_desc: "Через процес збагачення свинцева руда промивалася та подрібнювалася для видалення домішок і відділення руди від каменів, глини та інших мінералів."
  bole_smelting: "Виплавка в болі"
  bole_smelting_desc: "Метод, при якому свинець виплавлявся на відкритому повітрі, використовуючи постійний сильний вітер, що дме на вершині пагорба, для подачі свіжого повітря в розплавлену руду."
  cupola_smelting: "Вагранкова виплавка"
  cupola_smelting_desc: "Використовуючи циліндричну піч, цей метод забезпечує дешевий та ефективний процес виплавки заліза, з унікальною можливістю безперервної виплавки."
  faster_levy_recruitment: "Обов'язкове навчання володінню зброєю"
  faster_levy_recruitment_desc: "Усі чоловіки-селяни зобов'язані вправно володіти списом або луком і регулярно тренуватися, щоб стати корисним солдатом у разі призову до зброї."
  merchant_power_from_maritime_discovery_advance: "Купецькі гільдії"
  merchant_power_from_maritime_discovery_advance_desc: "Братства купців дозволяють нашим торговцям організовуватися, ділитися прибутковими торговими шляхами та об'єднувати зусилля при купівлі та продажу на іноземних ринках."
  merchant_power_from_maritime_reformation_advance: "Купецькі компанії"
  merchant_power_from_maritime_reformation_advance_desc: "Розширення заморських ринків та пов'язані з цим більші витрати та ризики вимагають створення купецьких об'єднань, які розділяють тягар торгівлі на цих нових землях."
  merchant_power_from_maritime_absolutism_advance: "Торгово-промислова палата"
  merchant_power_from_maritime_absolutism_advance_desc: "З появою нових ідей у комерції та економіці місцеві підприємства об'єднуються, щоб сформувати ділову мережу, яка може просувати їхні інтереси та захищати їхні права від політичних утворень та іноземних впливів."
  paper_guild_fiber_pulp_maintenance_advance: "$paper_guild_fiber_pulp_maintenance$"
  paper_guild_fiber_pulp_maintenance_advance_desc: "Використовуючи волокнисті рослини, такі як коноплі або паперова шовковиця, виробництво паперу стане широко доступним у всьому світі. Хоча його виробництво дешеве, воно поступається за якістю."
  paper_guild_cloth_maintenance_advance: "$paper_guild_cloth_maintenance$"
  paper_guild_cloth_maintenance_advance_desc: "$paper_guild_cloth_maintenance$, виготовлений з бавовни, непридатної для обробки, або використаної тканини, встановив нові стандарти якості та довговічності."
  paper_guild_wood_pulp_maintenance_advance: "$paper_guild_wood_pulp_maintenance$"
  paper_guild_wood_pulp_maintenance_advance_desc: "Використовуючи широкодоступну м'яку деревину, папір буде легше та дешевше виробляти, ніж будь-коли раніше."
  cannon_guild_steel_maintenance_advance: "Гармати зі сталевими стволами"
  cannon_guild_steel_maintenance_advance_desc: "Використання гармат зі сталі дозволить нашій артилерії мати більшу точність та дальність, не жертвуючи мобільністю."
  firearms_guild_steel_maintenance_advance: "Вогнепальна зброя зі сталевим стволом"
  firearms_guild_steel_maintenance_advance_desc: "Впровадження сталі у виробництво вогнепальної зброї дозволить нам виробляти надійніші гармати у великій кількості."
  grant_privilege_cost_modifier_renaissance_advance: "Кодифіковані привілеї та обов'язки"
  grant_privilege_cost_modifier_renaissance_advance_desc: "Закріплення суспільної ролі кожного стану в нашій придворній рутині полегшить процес надання нових привілеїв, не викликаючи суперництва між різними станами."
  war_no_cb_cost_modifier_renaissance_advance: "Постійні війни"
  war_no_cb_cost_modifier_renaissance_advance_desc: "Війна змінюється разом зі зміною держав, що беруть у ній участь. Їхні зростаючі можливості дозволяють їм вести війну протягом довших періодів, і тому міждержавні війни стають все більш поширеними."
  global_nobles_max_literacy_advance: "Шляхетна література"
  global_nobles_max_literacy_advance_desc: "Шляхта надає більшого значення літературним навичкам, оскільки її основна функція все більше змінюється від прославлених воїнів до придворних вельмож на службі у своїх правителів. Це створює попит на літературу, яка є для них привабливою."
  global_burghers_max_literacy_advance: "Міщанська література"
  global_burghers_max_literacy_advance_desc: "Міщани покладаються на свої навички та здібності для процвітання, що, своєю чергою, залежить від гарної літературної освіти з певних питань. Їхнє зростаюче багатство в міру розвитку економіки також створює підвищений попит на будь-яку літературу, що розширює їхню писемну культуру."
  global_clergy_max_literacy_advance: "Духовна література"
  global_clergy_max_literacy_advance_desc: "Духовенство має бути грамотним за природою своєї професії, що ґрунтується на вивченні, інтерпретації та поширенні своєї релігійної доктрини. Тому їхнє духовне формування значною мірою залежить від їхнього доступу до релігійної доктрини та вчень."
  land_morale_recovery_renaissance_advance: "Організований армійський марш"
  land_morale_recovery_renaissance_advance_desc: "Армії стають все складнішими в управлінні, оскільки вони менше покладаються на ополчення. Ключовим аспектом цього є краща організація армій під час маршу, що дозволяє військам бути більш підготовленими та готовими до битви."
  merchant_power_from_maritime_renaissance_advance: "Купецькі товариства"
  merchant_power_from_maritime_renaissance_advance_desc: "Зростання торгівлі на великі відстані спонукає купців до інновацій у нових способах партнерства, щоб отримати від цього максимальну вигоду. Найпоширенішим є те, що один партнер інвестує суму грошей у торговельну експедицію, тоді як інший подорожує та збирає товари, які будуть продані після повернення."
  merchant_power_from_maritime_revolutions_advance: "Акціонерні товариства"
  merchant_power_from_maritime_revolutions_advance_desc: "Часті невдачі привілейованих компаній призводять до нового типу компаній, в яких відповідальність акціонерів компанії обмежується фіксованою сумою, що робить будь-яке торговельне партнерство, яке їх використовує, менш ризикованим, а отже, більш привабливим."
  send_people_to_colonial_charter_advance: "Нові землі достатку"
  send_people_to_colonial_charter_advance_desc: "Нові землі означають нові можливості та нові ресурси для експлуатації. Заохочуючи наше населення селитися там і експлуатувати їх, ми зможемо легше отримувати від них вигоду."
  send_people_to_the_colonies_advance: "Нові землі можливостей"
  send_people_to_the_colonies_advance_desc: "Перед нами відкривається цілий новий світ, а це означає поживу для уяви людей, щоб уявити, яким було б їхнє життя на цих нових землях. Ми повинні заохочувати ці думки, прикрашати ці історії, щоб наш народ прагнув заселити ці нові землі для нас."
  study_institutions_advance: "Обмін знаннями"
  study_institutions_advance_desc: "Не соромно, що інші знають те, чого не знаємо ми, але це ніколи не йде нам на користь, якщо ми нічого не робимо, щоб це виправити. Активно вивчаючи відкриття інших, ми можемо краще покращити власні знання про світ."
  reduce_inflations_advance: "Суворий монетарний контроль"
  reduce_inflations_advance_desc: "Дехто може думати, що якщо нам потрібно більше грошей, єдине, що ми маємо зробити, це карбувати більше, але це лише сприятиме нашій власній загибелі. Зберігаючи суворий контроль над нашими процедурами карбування, ми можемо тримати нашу інфляцію під контролем і навіть зменшити її."
  pop_promote_actions_advance: "Соціальні сходи"
  pop_promote_actions_advance_desc: "Кажуть, що хаос – це сходи, які дозволяють людям піднятися у своєму соціальному статусі. Для нас ці сходи походять не від хаосу, а від порядку, оскільки ми систематизували спосіб, щоб наші люди покращували своє соціальне становище власними засобами, і ми навіть заохочуємо це."
  alleviate_concerns_advance: "Зниження напруги"
  alleviate_concerns_advance_desc: "Жодна країна не виграє від того, що всі її сусіди постійно пильнують її рухи. Ми повинні активно використовувати дипломатію, постійно згладжуючи будь-яку напругу, що може виникнути, щоб наші сусіди не мали причин турбуватися про нас."
  counter_espionage_action_advance: "Суворіший доступ до інформації"
  counter_espionage_action_advance_desc: "Ми не можемо розраховувати на успіх ані в дипломатичній, ані у військовій сферах, якщо будь-які наші таємниці та обговорені в тісному колі речі можуть легко просочитися до будь-якої іноземної країни. Ми повинні активно підтримувати суворіший контроль над тим, як наша інформація поширюється, щоб швидко усунути будь-який можливий витік."
  pacify_population_advance: "Тримати агітаторів під контролем"
  pacify_population_advance_desc: "Неминуче, що в якийсь момент деякі люди можуть бути незадоволені нашим правлінням. Однак це ніколи не переросте в щось значне, якщо ми не залишимо це без нагляду і не дамо йому розростися. Якщо ми активно шукатимемо тих, хто схильний піднімати свій голос проти нас, ми зможемо придушити будь-яке заворушення в зародку, перш ніж вони зможуть зібрати достатньо людей навколо себе, і таким чином зберегти загальне населення більш задоволеним нами."
  nation_state_advance: "Національна держава"
  nation_state_advance_desc: "Концепція об'єднання єдиної культури під єдиним прапором є потужною. Виховуючи почуття національної ідентичності, ми можемо забезпечити лояльність наших підданих і громадян до нашої справи."
  LIV_a_order_knights: "Лицарі Лівонського ордену"
  LIV_a_order_knights_desc: "Наша нація заснована на міцних плечах відважних християнських чоловіків, які приєдналися до нашого ордену як лицарі. Їхні бойові здібності компенсують нашу невелику чисельність порівняно з язичниками, що оточують нас."
  wallachian_tradition: "Укріплена нація"
  wallachian_tradition_desc: "Наші землі обмежені горами та річкою Дунай, але в іншому вони дуже рівнинні за своєю природою. Ці багаті ґрунти є ніби автошляхами для вторгнення армій, як тільки ці природні бар'єри будуть подолані. Щоб захистити наш народ, ми збудуємо укріплення та замки по всій цій території."
  wallachian_heritage: "Історія опору"
  wallachian_heritage_desc: "Бувши частиною кількох імперій у минулому, наш народ звик боротися зі стійкістю. Будь-який ворог, що наважиться напасти на нас, мусить заплатити кров'ю."
  khedivates: "Хедивати"
  khedivates_desc: "Великі імперії зазвичай формуються ядром і оточені підданими з дещо сумнівною вірністю. Ми повинні вжити необхідних заходів, щоб тримати ці нації під нашим наглядом."
  french_tradition: "Двір Франції"
  french_tradition_desc: "Наші способи ведення дипломатії відомі своєю складністю та витонченістю і слугували зразком для інших націй. Але лише дурень був би задоволений досягнутим нами рівнем і не прагнув би їх покращити."
  french_heritage: "Лицарське дворянство"
  french_heritage_desc: "Дворяни нашої нації завжди надавали найкращих воїнів для наших армій. Їхні навчені війська служитимуть нашій нації та перемагатимуть наших ворогів заради слави."
  french_ambition: "Велика армія"
  french_ambition_desc: "Потреба в реформах серед наших військ стає очевидною при порівнянні з військами наших ворогів. Запровадження нових методів муштри забезпечить, що наші чоловіки знищать цих ворогів на полі бою."
  english_tradition: "Левові Серця"
  english_tradition_desc: "Хоробрість і дисципліна англійських піхотинців були засвідчені від щитових стін Нортумбрії до потемнілих небес Франції. Натхненна левовим духом наших королів і стоїцизмом простої людини, наша піхота б'ється з люттю англосаксонських воїнів, що були до них."
  english_heritage: "Наш Острівний Дім"
  english_heritage_desc: "Наш острів захищає нас від зовнішніх ворогів, але це нічого не вартуватиме, якщо ми не захистимо навколишні води. Будучи справжніми господарями навколишніх морів, ми будемо міцно контролювати тих, хто загрожує нашій землі."
  english_ambition: "Володарі Хвиль"
  english_ambition_desc: "Масивна морська присутність потрібна будь-якій нації, що намагається панувати на водах. Наш флот буде настільки грізним, що береги наших ворогів завжди будуть оточені нашими суднами."
  omani_tradition: "Затока $OMA$"
  omani_tradition_desc: "Наша нація знаходиться за широкими та ворожими пустелями $arabia_region$, але море на сході дозволяє нам їх обійти. Саме морем, а не сушею, нам доведеться здійснювати нашу дипломатію, торгівлю та експансію."
  omani_heritage: "Контроль над Затокою"
  omani_heritage_desc: "Наші моряки звикли плавати далеко й широко морями, але саме контроль над затокою, що оточує нас, дозволить такі подорожі. Ми завжди будемо готові захищати наші води від будь-якої іноземної загрози."
  omani_ambition: "Ізоляція Сушею"
  omani_ambition_desc: "Незважаючи на те, що ми не є островом, наша земля фактично ізольована від решти $arabia_region$ через пустелі. Тому ми зрозуміли, наскільки важливо мати вихід до моря, і наскільки корисним це буде для нас, якщо ми відмовимо в цьому нашим ворогам."
  breton_tradition: "POSTEDIT_Бретонський Півострів"
  breton_tradition_desc: "Наша земля охоплює значну частину узбережжя, і відтоді, як наші предки прибули з Британії, наші береги кишать активністю. Наш народ живе біля моря і для моря, а наші порти завжди повні торгових і рибальських човнів."
  house_of_parliament_advance: "$house_of_parliament$"
  house_of_parliament_advance_desc: "$house_of_parliament_desc$"
  lacquerware_guild_advance: "$lacquerware_guild$"
  lacquerware_guild_advance_desc: "$lacquerware_guild_desc$"
  bur_between_two_realms: "Між Двома Королівствами"
  bur_between_two_realms_desc: "Ми можемо вважати себе членами як традиційних земель $hre$, так і королівства $FRA$. Хоча це може ускладнити феодальні відносини, ситуація зробила нас вправними дипломатами, здатними грати на обидві сторони на нашу власну користь."
  bur_knightly_prowess: "Лицарська Майстерність"
  bur_knightly_prowess_desc: "Ми займаємо престижне становище у феодальній системі $FRA$. Тому цілком справедливо, що наші війська розглядаються як відображення $BUR_ADJ$ духу."
  bur_rich_soil_of_burgundy: "Розвивати Сільське Господарство"
  bur_rich_soil_of_burgundy_desc: "Землі $BUR$ добре підходять для вирощування рослин та випасу тварин. Особливо виноград ідеально підходить для цих умов. Завдяки нашому вмілому вирощуванню має бути легко розвивати сільськогосподарську галузь."
  mos_skilled_tax_collectors: "Збирачі данини"
  mos_skilled_tax_collectors_desc: "Наше становище збирача данини для $GLH_horde$ дало нам багаторічний досвід у зборі данини та збереженні частини прибутків для себе."
  mos_dynastic_ties: "Правління через династичні зв'язки"
  mos_dynastic_ties_desc: "Землі $russian_region$ довго перебували під владою однієї династії. Ми повинні використати наше становище серед рівних і наші кровні зв'язки, щоб взяти на себе провідну роль."
  mos_patrol_the_territories: "Організовані ополчення"
  mos_patrol_the_territories_desc: "Управління величезними просторами $russian_region$ – непросте завдання. Ми повинні створити місцеві центри вербування, щоб полегшити призов ополченців до наших армій."
  russian_integration: "Традиції $russian_group$"
  russian_integration_desc: "Народи $russian_group$ величезні та різноманітні за своєю культурою. Щоб об'єднати їх, як правителі давнини, ми повинні піднести нашу спільну історію та викувати нерозривний зв'язок між людьми."
  russian_resiliance: "Набір $russian_group$"
  russian_resiliance_desc: "Вторгнення $mongolian_group$ у минулому залишили сильну рішучість у $russian_group$ чинити опір іноземному пануванню. Ми можемо використати їхній потяг для збільшення кількості наших військ."
  land_of_the_rus: "Земля Русі"
  land_of_the_rus_desc: "Возз'єднання Русі є спільною метою серед правителів $russian_group$, і амбітні завойовники можуть використовувати це як виправдання для завоювання."
  russian_legitimization: "Спільна легітимність"
  russian_legitimization_desc: "Народи $russian_group$ століттями займали та правили цими землями. Цілком природно, що правитель $russian_group$ має керувати своїм власним народом. Чим більше ми представляємо себе як $russian_group$, тим легше люди приймуть наше правління."
  nor_seaborn_country: "Морська країна"
  nor_seaborn_country_desc: "Народи $NOR_ADJ$ завжди обирали подорожувати країною на човні, коли це було зручно. Це робить наших людей адаптованими моряками, готовими укомплектувати наш флот, коли це необхідно."
  nor_bounties_of_the_sea: "Багатства моря"
  nor_bounties_of_the_sea_desc: "Земля $NOR_ADJ$ не може забезпечити наших людей достатнім для самозабезпечення. Натомість ми будемо шукати їжу для наших людей у морі, і, на щастя, води Північного моря дають нам багато рибальських угідь."
  nor_merchant_tradition: "Норвезькі купці"
  nor_merchant_tradition_desc: "Порти $NOR$ здавна були бажаним місцем призначення для купців з усієї $europe$. Настав час, щоб ми не тільки приймали іноземних купців у наших портах, але й самі отримували вигоду від торгівлі північної $europe$."
