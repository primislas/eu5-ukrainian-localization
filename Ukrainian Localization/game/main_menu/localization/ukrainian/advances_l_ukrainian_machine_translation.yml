  age_1_traditions: "Традиції"
  age_1_traditions_desc: "Різні суспільства були засновані по всьому світу протягом сотень і тисяч років, і їхні основи можна окреслити в таких традиціях, як Легалізм, Меритократія або Феодалізм."
  age_2_renaissance: "Ренесанс"
  age_2_renaissance_desc: "Нова ера знань, мистецтв і прогресу виникає завдяки зростаючій взаємодії та інституціям у середньовічних суспільствах, що зазнали впливу Pax Mongolica, Ісламської Золотої Доби та Європейського Ренесансу."
  age_3_discovery: "Відкриття"
  age_3_discovery_desc: "На зорі Раннього Нового часу картуються нові континенти, тоді як феодальне суспільство повільно поступається централізованим державам.\nДля підприємливої держави ця епоха може стати свідком заснування світової імперії."
  age_4_reformation: "Реформація"
  age_4_reformation_desc: "Зі Сходу на Захід це епоха релігійних переконань, дебатів і масових рухів. У Європі протестантські церкви закріплюються, тоді як міленаризм охоплює Іран, а релігійний синкретизм формує індійське суспільство."
  age_5_absolutism: "Абсолютизм"
  age_5_absolutism_desc: "Коли уряди виривають абсолютну владу у своїх країнах від інших сторін, вони тепер можуть присвятити себе будівництву Імперій. Це епоха держави, правителів та їхніх армій."
  age_6_revolutions: "Революції"
  age_6_revolutions_desc: "Ставлення під сумнів прав, влади та самого світу під час Просвітництва призвело до відмови від Старого Режиму. Коли Абсолютизм поступається Революції, королівствам, можливо, доведеться поступитися місцем Республікам."
  adm_AGE: "Адміністративні здібності"
  dip_AGE: "Дипломатичні здібності"
  mil_AGE: "Військові здібності"
  ages_of_eu.1.title: "[GetCurrentAge.GetNameWithNoTooltip]"
  ages_of_eu.1.desc: "Це світанок [GetCurrentAge.GetName]!\n\n[GetCurrentAge.GetDesc]"
  ages_of_eu.adm: "Адміністративний фокус"
  ages_of_eu.dip: "Дипломатичний фокус"
  ages_of_eu.mil: "Військовий фокус"
  feudalism: "Феодалізм"
  feudalism_desc: "З часом більшість суспільств розвивають потребу в спільній структурі з міцнішими та постійнішими інститутами уряду. Після падіння Римської імперії цю потребу заповнила низка інститутів і звичаїв, які разом часто вважаються частиною європейської феодальної системи.\n\nЗ подібних причин постійні урядові та суспільні системи формувалися по всьому світу, деякі з яких мають коріння, що сягає набагато далі, ніж сам феодалізм."
  legalism: "Легалізм"
  legalism_desc: "Теорії, що лежать в основі легалізму, інтегрувалися в китайські суспільні структури протягом сотень років. Концепція, що чистий ідеалізм і внутрішня стабільність ведуть до багатої, процвітаючої держави та могутньої армії, глибоко вкорінена в мисленнєвих форумах східноазійських володінь.\n\nОднак, коли купці та мігранти принесли обмін ідеями, концепція легалізму поширилася на величезні простори мусульманського світу. Там вона прийняла позицію симбіотичних відносин між язичниками та віруючими в ісламських державах.\n\nЛегалізм у Європі означав обряд переходу від вмираючих обіймів великої Римської імперії до її залишків правових коренів, багато з яких пізніше послужать основою для нової юриспруденції на старому континенті."
  meritocracy: "Меритократія"
  meritocracy_desc: "Багато видатних особистостей, що займали впливові посади, часто призначали на них своїх найближчих.\n\nПоява меритократії як інституту та ідейного руху була значною мірою популярною при дворах Імперського Китаю. Там сам Конфуцій підтримував думку, що ті, хто править, повинні робити це на основі заслуг, а не успадкованого статусу.\n\nЦе призвело до заміни китайської знаті за кровними зв'язками на ту, що базувалася виключно на меритократичних здібностях. Розвиток цього інституту поширився за межі Азії і зрештою досяг королівських дворів навіть європейських монархів, чиї дворяни міцно тримали в руках механізми влади та авторитету."
  renaissance: "Ренесанс"
  renaissance_desc: "Починаючи з XIV століття, заможні та впливові люди в італійських містах-державах почали підтримувати митців та вчених, які прагнули досліджувати стародавні римські та грецькі суспільства своїх предків.\n\nЯк культурний рух, Ренесанс вже охоплює більшу частину регіону і мав глибокий вплив на літературу, мистецтво, філософію та музику. Гуманістичні вчені також аналізують суспільство, в якому вони живуть, порівнюючи його з ідеалами класичних філософів. Ренесансний гуманізм перетворився на більш зрілий рух, готовий проникнути в усі аспекти суспільства.\nНовий ідеал для правителів, а також для тих, ким правлять, поширюється так швидко, як ранні друкарі можуть розповсюджувати копії цих нових ідей.\n\nСправжній ренесансний гуманіст є експертом у всьому, від політики та філософії до мистецтва, текстового аналізу, музики та архітектури. Ренесанс тепер готовий переформувати світ, щоб краще відповідати його класичним ідеалам."
  banking: "Банківська справа"
  banking_desc: "Грошове кредитування існувало з часів появи металевих монет в Античності. Однак воно залежало від окремих осіб та їхніх сімейних груп або від Стародавніх Держав. Зміни відбулися в Середньовіччі, заохочені відновленим зростанням далекобійної комерційної діяльності на Євразійському континенті та його периферіях.\n\nСпеціалізовані лихварі почали організовуватися, коли єврейські громади почали діяти між християнським та ісламським світами. Однак бум попиту на кредити, що послідував за хрестовими походами у XII столітті, заохотив купців в італійських містах-державах створювати більші структури для грошового кредитування, фактично заснувавши перші банківські установи, такі як доми Перуцці та Барді.\n\nБули розроблені нові інструменти, такі як векселі та боргові зобов'язання, а банківські династії, такі як Медічі, Фуггери або Вельзери, незабаром стали такими ж могутніми, як і держави."
  professional_armies: "Професійні армії"
  professional_armies_desc: "Армії існували з тих пір, як була винайдена війна, багато тисяч років тому. Однак їхня форма змінювалася протягом століть, і різні типи набору та організації розвивалися в різних культурах та періодах.\n\nУ пізньому Середньовіччі армії в широкому спектрі суспільств покладалися на ополчення, засновані на структурах феодального суспільства, з лицарями та піхотинцями, що становили ядро, яке набиралося сезонно. Однак у деяких регіонах держави були достатньо потужними, щоб фінансувати постійні армії з професійними солдатами, які були б доступні для служби протягом усього року.\n\nЦя система також розвинулася в Європі після початку Столітньої війни, будучи однією з головних змін, що сприяли Військовій революції в ранній Новий час. Збільшення розміру та якості професійних армій, одночасно з пошуком нових джерел доходу для їх фінансування, незабаром стало одним з головних викликів для правителів у всьому світі."
  new_world: "Новий Світ"
  new_world_desc: "Відкриття Нового Світу ознаменувало нову еру не лише для колонізаторів та колонізованих, але й призвело до поширення матеріалів та технік, а також усвідомлення величезності земної кулі. Коли тварини, види сільськогосподарських культур, срібло та хвороби поширювалися через Атлантику, були зроблені перші кроки до справді глобальної економіки. З картографуванням та документуванням чужих земель та народів, ідеї, а також релігійні та філософські дебати все більше забарвлюються тим, що ми знайшли в заморських суспільствах. Великі уми відчувають потребу ставити під сумнів те, що колись було істиною, і від Вальядоліда до Фатехпур-Сікрі природа світу тепер є предметом дебатів."
  printing_press: "Друкарський верстат"
  printing_press_desc: "Здатність масово виробляти написане слово революціонізувала б поширення інформації та, багато в чому, ранньомодерне суспільство в цілому. Започатковане людьми епохи Відродження, такими як венеціанський друкар Альд Мануцій, нове мистецтво допомогло підживити Відродження, зробивши перекладені класики більш доступними. Пізніше Реформація значно виграла від можливості поширювати критичні публікації та переклади Святого Письма.\n\nТепер, коли друк дозрів як техніка і поширився по всій Європі, сотні тисяч копій всього, від релігійних та політичних памфлетів до наукових трактатів та інструкцій щодо поведінки, циркулюють континентом. З тим, як друкарні стають все більш поширеними, правителям стало важко стримувати нову техніку, оскільки порівняно легкі засоби виробництва означають, що цензуру можна обійти, перемістивши бізнес через кордон або навіть просто змінивши назву на титульній сторінці."
  pike_and_shot: "Піка та мушкет"
  pike_and_shot_desc: "Новий тип ведення війни почав розвиватися наприкінці XV століття, в розпал Італійських війн. Узагальнення пікінерів у пізньому Середньовіччі як альтернативи латникам, які могли успішно протистояти атакам важкої кавалерії, супроводжувалося розвитком портативної вогнепальної зброї, головним чином аркебуз з ґнотовим замком та мушкетів. Солдати тепер приймають нове формування, в якому пікінери утворюють каре, тоді як аркебузири розходяться по боках і спереду, і шукають укриття за або всередині каре у випадку, якщо формування вступає в ближній бій. Цей новий тип формування, названий \"Піка та мушкет\", був улюбленим німецькими ландскнехтами та іспанськими терціями, і незабаром був прийнятий іншими арміями, пануючи на європейських полях битв майже два століття, доки його не замінили на початку XVIII століття лінійні піхотні формування, озброєні новими мушкетами з кремінним замком, що мали багнети."
  confessionalism: "Конфесіоналізм"
  confessionalism_desc: "Католицизм довгий час вважався єдиною сутністю, але поява різних протестантських вір поклала цьому край. Зі зростанням безлічі різних інтерпретацій того, якою має бути Віра, християнство є чим завгодно, але не єдиним. Але якщо раніше будь-яке відхилення від Церкви можна було легко назвати єрессю, то тепер лінії, що створюють відмінності, стали принаймні розмитішими.\n\nТаким чином, зростав інтерес як релігійних, так і світських властей до чіткого визначення форм своїх конкретних конфесій, нав'язуючи свої особливі правила та погляди на всі аспекти віри та життя. Це дозволяє їм міцніше триматися за віру свого населення, але також збільшує диференціацію і, отже, ворожнечу з усіма іншими конфесіями."
  global_trade: "Глобальна торгівля"
  global_trade_desc: "Товари переміщувалися між континентами з давніх-давен. Але якщо раніше це обмежувалося певною кількістю маршрутів і товарів, таких як промислові товари Індії та Китаю, що знаходили свій шлях через Індійський океан і Шовковий шлях, то тепер вся торгівля все більше стає частиною більшої світової мережі. З відкриттям Америки, морських шляхів навколо Африки та перетином Тихого океану, місцеві торговельні мережі об'єднуються в єдину всесвітню взаємопов'язану павутину.\n\nСрібло, видобуте в Андах, тепер упаковується та доставляється через Європу аж до Китаю та Індії. Залізо, видобуте та оброблене в Скандинавії, продається в Західній Африці англійськими купцями, а інші заробляють статки, просто розповсюджуючи тканини та спеції в торговельній сфері Південно-Східної Азії. Місцеві індійські купці інвестують у майбутні європейські торговельні підприємства. Можливо, ще рано говорити про справді глобальну економіку, але, безперечно, перші насіння вже посіяні."
  artillery_institution: "Артилерія"
  artillery_institution_desc: "Винахід пороху в сунському Китаї призвів до розробки нового пристрою, який використовував би його вогневу міць у війні, — артилерії. Хоча вона поширилася по всій Євразії в XIII столітті, її використання як поширеної системи озброєння не відбулося до XV століття, оскільки вдосконалення довжини гармати та рецептури пороху зробили артилерію набагато потужнішою, тепер вона становила загрозу для кам'яних замків і укріплень, найпоширеніших у Європі. Незабаром артилерія буде використовуватися не тільки в облогах, але й на полях битв, оскільки гармати меншого калібру тепер мали мобільність, необхідну для швидкого розгортання та використання. Її остаточний розвиток як ключової системи ведення війни відбудеться у XVIII столітті, особливо після того, як Наполеон удосконалив її використання в ключових моментах битв."
  manufactories: "Мануфактури"
  manufactories_desc: "Хоча низка технічних інновацій протягом XVI та XVII століть певною мірою збільшила обсяги виробництва деяких продуктів, таких як залізо чи тканина, найбільше покращення у сфері виробництва відбулося у формі нових форм організації. Створюючи мануфактури, часто за межами міста, купці-капіталісти можуть як обійти стародавні цехові закони, що перешкоджають масовому виробництву, так і прокласти шляхи для збільшення виробництва через організацію та спеціалізацію праці в одному місці. Предвісники пізнішої індустріалізації змогли збільшити випуск продукції, полегшуючи доступ до сировини та масову організацію праці, а не за допомогою дорогої нової техніки. Це саме по собі є величезною зміною порівняно з часто жорстко регульованими методами минулого, однак, і разом з пізнішими технічними досягненнями цей новий спосіб виробництва революціонізує суспільство."
  scientific_revolution: "Наукова революція"
  scientific_revolution_desc: "Очевидно, що світ зараз менший, ніж будь-коли раніше. Зростання глобальної торгівлі та поліграфічної промисловості призвело до збільшення потоку людей та ідей, що дозволило ширше поширювати знання. Це, у свою чергу, призвело до більш ретельного дослідження та аналізу реальності світу. Те, що колись просто приймалося як факт, тепер ставиться під сумнів, те, що було погано зрозуміло, тепер спостерігається, а те, що лише припускалося, перевіряється.\n\nНедавні досягнення в таких галузях, як математика, фізика чи біологія, незаперечні, але справжня революція полягає у зміні сприйняття та підходу до самої науки та способу її розуміння. Систематичний експеримент – це справжня наукова революція, і вона, безсумнівно, повністю змінить наше уявлення про світ."
  military_revolution: "Військова революція"
  military_revolution_desc: "Безперервний стан війни, що охопив Європу в XVI та XVII століттях, призводить до різкого збільшення розміру армій, що є необхідністю, породженою зростанням авторитету конкуруючих абсолютистських режимів. Піхота тепер масово озброєна кремінними мушкетами, що значно збільшує їхню вогневу міць та ефективність у бою завдяки розгортанню в інноваційній лінійній формації, замінюючи стару тактику \"піка та мушкет\". Ці потреби також впливають на можливості державної адміністрації, оскільки вона продовжує розширюватися, щоб керувати людськими ресурсами та фінансами, необхідними для такого збільшення розміру армії. Це також сприяє розвитку ланцюгів постачання, необхідних для годування та утримання армій, через проміжні склади, що підтримують оперативні армії. Результатом цих досягнень буде не що інше, як сплеск воєн між дедалі мілітаризованішими країнами у XVIII столітті."
  enlightenment: "Просвітництво"
  enlightenment_desc: "Минуле століття стало свідком того, як раціоналізм та емпіризм набували все більшої популярності серед великих умів епохи. У листах, публікаціях та кав'ярнях королі, вчені, філософи та літератори обговорюють переваги толерантності, наукового методу та поширення ідеалів Просвітництва на все людство. З університетів чи дворів освічених монархів відправляються експедиції, щоб виміряти, каталогізувати, зважити та картографувати світ, щоб ми могли краще зрозуміти закони, що керують усім навколо нас. Інші обговорюють закони, що керують суспільством, і намагаються досягти розуміння Прав Людини.\n\nВеликі проєкти, такі як колосальне підприємство зі створення повної енциклопедії всіх знань або повного покажчика всіх рослин, тварин та грибів у світі, здійснюються для загального блага людства. Світло Розуму запалено, і багато хто не заспокоїться, доки його не буде донесено до всіх куточків землі."
  industrialization: "Індустріалізація"
  industrialization_desc: "На світанку XVIII століття виникло багато нових інститутів, оскільки прагнення людини до зростання взяло гору. Досягнення у сфері виробництва та обробної промисловості, а також впровадження складної техніки змінять світ, яким ми його знаємо, у глобальному масштабі. Зростання промислової революції приносить міжнародні та тривалі зміни не лише в торгівлі та бізнесі, а й у самій структурі суспільства. Винаходи, такі як механічний ткацький верстат та парові машини, піднімуть можливості людства до найвищого зеніту."
  levee_en_masse: "Масовий призов"
  levee_en_masse_desc: "Війна — це концепція, що постійно розвивається, вдосконалюється та відточується з покоління в покоління. XVIII століття стало свідком піднесення могутніх імперій, кожна зі своїми амбіціями. Щоб задовольнити потребу в експансії та забезпечити необхідне паливо для реалізації цих амбіцій, будуть розроблені та введені в дію нові загальнонаціональні закони про призов, що дозволять формувати армії з усіх неодружених молодих чоловіків, розмір яких визначить хід історії."
  colonies: "Колонії"
  colonies_desc: "Чи то шляхом відправлення наших власних людей для заселення нових земель, чи то шляхом встановлення тубільців у певному місці під нашим правлінням, чи то шляхом поєднання обох, колонія є опорою нашої власної влади в певному регіоні, що дозволить нам далі розширювати наш контроль."
  feudalism_advance: "Феодалізм"
  feudalism_advance_desc: "Феодалізм — це політична система, заснована на службі або праці в обмін на володіння землею. Це сукупність прав та обов'язків, якими пов'язаний кожен член структурованої суспільної моделі."
  horse_riding_advance: "Верхова їзда"
  horse_riding_advance_desc: "Приручення коней революціонізувало спосіб пересування людей та перевезення важких вантажів. Використання коней у бою забезпечило кінних воїнів не тільки швидшим способом пересування, але й вищою позицією для атаки на ворогів або для їхнього розгрому, використовуючи вагу верхового коня на свою користь."
  rights_of_man: "Права людини"
  rights_of_man_desc: "На передньому краї сучасної революційної думки стоїть радикальна ідея рівності для всіх. Філософи з різних куточків світу працювали разом над створенням документа під назвою «Декларація прав людини і громадянина», проголошуючи, що ці права є універсальними і повинні бути забезпечені законом. Ймовірно, це матиме значні наслідки для розвитку та поширення концепцій свободи та демократії, і нам було б добре не відставати."
  rotherham_plough: "Плуг Ротерхема"
  rotherham_plough_desc: "Базовий плуг, що використовувався в Європі, залишався незмінним з римських часів. Тепер, завдяки вдосконаленням у конструкції, той самий плуг можна зробити набагато легшим, зменшуючи навантаження на тяглових тварин, дозволяючи їм виконувати більше роботи."
  modern_bureaucracy: "Сучасна бюрократія"
  modern_bureaucracy_desc: "Щоб максимально використати землі та підданих, яких ми контролюємо, ми повинні розширити, реорганізувати та професіоналізувати нашу бюрократію. Надійна організація може керувати кожною частиною нашої держави та усунути потребу в тимчасових рішеннях. Дозвольмо нашим університетам працювати над пошуком найкращих способів ефективного правління та управління, і заохочуймо синів знаті служити державі з пером у руці, а не з мечем."
  separation_of_powers: "Розподіл влади"
  separation_of_powers_desc: "З'явився анонімний трактат з політичної теорії, і, незважаючи на спроби його придушити, він швидко поширюється світом. Він розглядає природу форм правління, будь то монархії, деспотії чи демократії, і виступає за суворий розподіл виконавчої, законодавчої та судової гілок влади. Це захистило б народ і обмежило владу монарха, що, зрозуміло, є дуже популярною перспективою для багатьох наших підданих. Незважаючи на несприятливі наслідки для влади монархів, ці ідеї можуть принести велику користь нашій нації."
  measuring_the_world: "Вимірювання світу"
  measuring_the_world_desc: "Нові науки дали нам низку різних способів опису та вимірювання світу навколо нас. Відправмо цих вчених мужів у світ загалом і в нашу країну зокрема. Ми не можемо знати, які ресурси є в нашому розпорядженні, доки ми ретельно не обшукаємо всі наші землі на наявність мінералів, не порахуємо кожного підданого та не оцінимо кожне підприємство."
  the_constitution: "Конституція"
  the_constitution_desc: "Розроблено нову філософську концепцію, що називається конституціоналізмом, згідно з якою уряд приймає правові обмеження своєї влади. Це інтригуюча ідея, але ми не бачимо, щоб вона прижилася."
  absolute_rulership: "Абсолютне правління"
  absolute_rulership_desc: "Є багато людей, які вимагають надати їм роль в уряді, але насправді здебільшого хочуть винагороди без зусиль. Поширюється нова цікава ідея абсолютизму, яка є системою, де ми позбавляємося цих паразитів і керуємо самостійно."
  national_sovereignty: "Національний суверенітет"
  national_sovereignty_desc: "Численні та тривалі війни першої половини XVII століття призвели до міжнародної дипломатичної системи, де територіальна цілісність держав є наріжним каменем. Держави, а не окремі правителі чи наднаціональні угруповання, є акторами на міжнародній арені, і жодна держава не має права втручатися у внутрішні справи іншої."
  military_administration: "Військова адміністрація"
  military_administration_desc: "Постійно зростаючі армії XVI століття ставили все більші та складніші вимоги до адміністративних систем держав. Створивши постійну організацію, відповідальну за закупівлю та планування військових припасів, і утримуючи більше військ у списках навіть у зимовий або мирний час, ми в довгостроковій перспективі зможемо виставляти великі армії дешевше та ефективніше підтримувати ці армії під час війни."
  early_modern_administation: "Ранньомодерна адміністрація"
  early_modern_administation_desc: "З часом стало очевидним, що більш централізована бюрократія з адміністративними органами, керованими освіченими чиновниками, безпосередньо найнятими державою, була необхідністю для амбітних проектів ранньомодерних правителів."
  renaissance_thought: "Думка Відродження"
  renaissance_thought_desc: "Поняття благородної олігархії, що править суспільством, існувало, принаймні, з римських часів, і залишалося популярним у деяких частинах світу. Тепер ця ідея знову набирає популярності серед тих, хто має значення."
  medieval_administration: "Середньовічна адміністрація"
  medieval_administration_desc: "З військовою елітою, яка керує нашим суспільством, наступним етапом розвитку є наявність грамотного класу адміністраторів. Зазвичай їх обиратимуть з лав духовенства."
  impulse_warfare: "Імпульсна війна"
  impulse_warfare_desc: "Введення легкої піхоти призвело до зміни у веденні війни. Стрільці розгорталися вперед у вільному порядку, щоб відволікати та турбувати ворога перед основною піхотною атакою, яка зазвичай здійснювалася або в лінію, або в колону."
  line_infantry: "Лінійна піхота"
  line_infantry_desc: "Завдяки багнетам кожен мушкетер міг функціонувати як пікінер. Це дозволило вилучити піки з піхотного спорядження та забезпечило піхотні формування більшою вогневою міццю."
  gustavian_infantry: "Густавіанська піхота"
  gustavian_infantry_desc: "Густав Адольф, король Швеції, вдосконалив піхотні підрозділи для збільшення їхньої вогневої потужності. Його піхотні формування були звужені та набули прямокутної форми, щоб збільшити кількість мушкетів, які могли стріляти в кожному залпі. Додавання невеликих артилерійських знарядь ще більше збільшило вогневу міць піхоти."
  standardisation_of_calibre: "Стандартизація калібру"
  standardisation_of_calibre_desc: "Зі зростанням важливості артилерії на полі бою, також продовжувала зростати кількість вогнепальної зброї. Але оскільки кожна гармата виготовлялася окремо, її поповнення вимагало великих зусиль. У 1544 році імператор Карл V оголосив, що існуватиме лише 5 калібрів гармат, тоді як король Франції Генріх II встановив 6 стандартних калібрів."
  maurician_infantry: "Маврикійська піхота"
  maurician_infantry_desc: "Розмір і глибина іспанського квадрату надавали йому стійкості, але робили його повільним і громіздким для маневрування на полі бою. Це також призводило до того, що великий відсоток військ залишався неактивним під час битв. Моріц Оранський, штатгальтер Нідерландів, зменшив загальну кількість людей у формуванні, щоб зробити його більш мобільним, і зменшив його глибину, тож він зберіг ту саму вогневу міць і ударні значення."
  spanish_square: "Іспанський квадрат"
  spanish_square_desc: "Іспанський квадрат природно розвинувся з формацій пікінерів та стрільців. В його основі був традиційний пікінерський квадрат. У кожному з кутів він мав групу аркебузирів. Він зберіг стійкість традиційного пікінерського квадрату та посилив її вогневою міццю аркебузи."
  standardized_pikes: "Стандартизовані піки"
  standardized_pikes_desc: "Піка — надзвичайно проста у виготовленні зброя, але для отримання повної вигоди від використання пік необхідно, щоб усе формування володіло зброєю схожої довжини та леза."
  pike_square: "Пікінерський квадрат"
  pike_square_desc: "Протягом Середньовіччя домінування кавалерії оскаржувалося дисциплінованими пікінерами. У таких битвах, як Баннокберн або Золоті Шпори, кавалерія була розгромлена піками. Поєднання покращеної підготовки та дисципліни, а також додавання мечників для підтримки в ближньому бою підняло це формування на пік його ефективності."
  medieval_military: "Середньовічна армія"
  medieval_military_desc: "До кінця Середньовіччя сухопутні армії стали більш професійними та добре організованими. Впроваджено кращі системи для підтримки суміші ополченців та професійних солдатів, які тепер домінують на полях битв, а сила піхоти повільно, але впевнено наздоганяє кавалерію."
  insurance_companies: "Страхові компанії"
  insurance_companies_desc: "Подальше зменшення ризику відбулося з розвитком страхування. Можливість для людей компенсувати ризик шляхом сплати невеликої комісії страховому брокеру дозволила подальшому зростанню торгівлі."
  the_gold_standard: "Золотий стандарт"
  the_gold_standard_desc: "Постійний торговельний дефіцит між Європою та Китаєм спричинив нестачу срібних злитків у Європі та в усьому світі. Перехід від срібних монет до золотих дозволить новим монетам увійти в обіг та забезпечити зростання торгівлі у все більших обсягах."
  joint_stock_companies: "Акціонерні товариства"
  joint_stock_companies_desc: "Зі зростанням торгівлі зростав і ризик. Потрібно було розробити нові способи накопичення капіталу та управління ризиками. В акціонерних товариствах ризик підприємства розподілявся між багатьма акціонерами."
  public_punishments: "Публічні покарання"
  public_punishments_desc: "Життя в морі сповнене небезпек, тому покарання мають бути суворими. Якщо вони не матимуть достатнього стримуючого ефекту, ми швидко зіткнемося з проблемами. З часом розвинулася система публічних покарань, і тепер настав час їх формалізувати. Це значно підвищить дисципліну на морі."
  merchants_and_trade: "Купці та торгівля"
  merchants_and_trade_desc: "Торговельні моделі були серйозно порушені, можливо, через чуму та пандемії. Тепер торгівля повільно починає відновлюватися."
  naval_ambitions: "Морські амбіції"
  naval_ambitions_desc: "З додатковим підвищенням морського духу наші моряки підкорять хвилі та пануватимуть на морях. А наші колоністи зможуть наважитися на темні куточки світу, засновуючи нові поселення далі від дому, ніж будь-коли раніше."
  chartered_companies: "Привілейовані компанії"
  chartered_companies_desc: "Світ великий, і щоб розвивати нашу торгівлю в ньому, іноді доводиться йти на досить великі ризики. На щастя, в нашій країні є Купці, які готові це зробити, використовуючи переважно власний капітал. Надаючи таким компаніям Урядову хартію, що дає їм особливі права на здійснення урядових повноважень, а також монополії в певних областях, ми можемо контролювати та заохочувати комерційний розвиток усього: від зовнішньоторговельних контактів до наших заморських колоніальних володінь."
  development_of_maritime_law: "Розвиток морського права"
  development_of_maritime_law_desc: "Оскільки все більше і більше країн відправляють своїх підданих або громадян за кордон у різні торговельні підприємства, і оскільки так багато людей живуть так близько один до одного протягом такого довгого часу, стало абсолютно необхідним мати принаймні базове уявлення про спільні закони морів. Завдяки таким публікаціям, як 'Mare Liberum' або пізніша 'De Dominio Maris Dissertatio', були закладені основи міжнародного морського права."
  basic_financial_instruments: "Базові фінансові інструменти"
  basic_financial_instruments_desc: "Заморська торгівля дуже ризикована, але також і дуже прибуткова. Розвиток фінансових інструментів, таких як акредитиви, допоможе зменшити ризик, збільшуючи наші прибутки."
  naval_professionalism: "Професіоналізація флоту"
  naval_professionalism_desc: "Навіть на початку XVII століття постійні флоти були досить невеликими, і навіть значні морські держави здебільшого утримували військово-морські сили для задоволення своїх нагальних потреб. З часом, однак, ми рухаємося в напрямку створення більшого професійного флоту. Якщо ми не хочемо, щоб наші суперники випередили нас у морських справах, ми повинні прагнути створити більший постійний флот з адміністративною структурою для його підтримки, а також забезпечити, щоб морська кар'єра могла бути постійним заняттям для наших офіцерів."
  superior_ship_design: "Передовий дизайн кораблів"
  superior_ship_design_desc: "Будівництво [Concept('ships', 'CONCEPT_PLACEHOLDER')|e], які трохи швидші за кораблі наших супротивників, навіть якщо ця додаткова швидкість настільки незначна, що не має військового значення, все одно може наповнити наші екіпажі впевненістю та змусити нашого ворога остерігатися вступати з нами в рівний бій."
  patron_of_art: "Покровитель мистецтв"
  patron_of_art_desc: "Наш шлях до культурно розвиненого суспільства починається тут. Наші мистецькі дива увійдуть в історію як найчудовіші цієї епохи."
  pragmatism: "Прагматизм"
  pragmatism_desc: "Занадто багато країн дозволяють сприйняттю країни формувати їхню політику. Це нерозумно — якщо найманці більше підходять для наших потреб, ми використаємо їх замість того, щоб інвестувати в дорогу постійну армію."
  knowledge_transfer: "Передача знань"
  knowledge_transfer_desc: "Збереження досвіду — найважливіше, що може зробити країна. Ми повинні забезпечити, щоб ті, хто служить у бою, передавали ці знання молодшим новобранцям через систему наставництва."
  organised_recruiting: "Організований набір"
  organised_recruiting_desc: "У давні часи, коли капітан прагнув набрати людей для свого [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e], процес був трудомістким, оскільки небагато людей бажали прийняти певну смерть у наших арміях. Однак, застосувавши принципи розуму до цієї проблеми, ми зможемо розробити систему, яка дозволить набагато швидше одягнути чоловіків у форму."
  optimism: "Оптимізм"
  optimism_desc: "Перемога здобувається не лише на полі бою, а й у вітальнях. Наш поступ розуму дозволяє нашим людям відкидати наслідки тимчасових невдач і натомість готуватися до нашої неминучої перемоги."
  formalized_officer_corps: "Формалізований офіцерський корпус"
  formalized_officer_corps_desc: "Традиційно офіцери походять зі шляхти, але у нас не так багато шляхтичів, що призводить до нестачі офіцерів. Однак у наших арміях насправді є багато осіб нижчого стану. Ми повинні розглянути можливість підвищення деяких з них до професійних офіцерів."
  deus_vult: "Deus Vult"
  deus_vult_desc: "Приєднайтеся до бойового кличу хрестових походів, 'Бог цього бажає' і розгроміть невірних."
  missionary_schools: "Місіонерські школи"
  missionary_schools_desc: "Хоча немає браку людей, готових вирушити й поширювати істинну віру, більшість із них просто приносять більше шкоди, ніж користі. Однак спеціалізовані школи для підготовки місіонерів забезпечать нас більшою кількістю людей, які зможуть не лише поширювати віру, а й досягати успіху."
  church_attendance_duty: "Обов'язок відвідування церкви"
  church_attendance_duty_desc: "Запровадивши обов'язкову політику відвідування церкви, акцент на релігійних цінностях і переконаннях безсумнівно мінімізує витрати на підтримання правопорядку."
  divine_supremacy: "Божественне верховенство"
  divine_supremacy_desc: "Надзвичайно важливо, щоб ми очистили нашу націю та її навколишні кордони від невірних, що докучають нашим землям."
  devoutness: "Набожність"
  devoutness_desc: "Релігія є одним із найважливіших оплотів нашого правління. Через публічні прояви благочестя правителями, піддані наслідуватимуть їхній приклад. Зростання благочестя серед нашого народу зміцнить наше правління."
  religious_tradition: "Релігійна традиція"
  religious_tradition_desc: "Сила нашої віри та публічні прояви благочестя й поклоніння викликають захоплення в інших землях, як близьких, так і далеких. Це відображається в престижі та славі нашого володіння."
  ecumenism: "Екуменізм"
  ecumenism_desc: "Проблема боротьби з єретиками в державі завжди складна. Хоча старий добрий підхід вогнем і мечем зрештою вирішить більшість проблем, дипломатія також може бути успішною. Заохочуючи діалог між різними сектами, ми можемо зменшити непорозуміння та сприяти миру в державі."
  advanced_bureaucracy: "Розвинена бюрократія"
  advanced_bureaucracy_desc: "Дозволяє нам збільшити податкові надходження шляхом запровадження більш бюрократичної адміністративної системи, керованої державними чиновниками."
  organised_construction: "Організоване будівництво"
  organised_construction_desc: "Необхідність модернізації інфраструктури нашого уряду є дорогою справою; якщо ми правильно структуруємо процес, ми зможемо зробити це дешевше."
  smithian_economics: "Смітіанська економіка"
  smithian_economics_desc: "Протистоячи меркантилізму та обмежуючи вплив держави в економічних питаннях, ми підтримуватимемо вільний ринок, що збільшить нашу загальну ефективність виробництва."
  national_bank: "Національний банк"
  national_bank_desc: "Створивши центральний орган для фінансових питань, ми матимемо кращий контроль над економікою нашої нації."
  debt_and_loans: "Борги та позики"
  debt_and_loans_desc: "Борг іноді просто неминучий, однак організований ринок боргу дозволить нам залучати позики за нижчою процентною ставкою."
  centralized_government: "Централізований уряд"
  centralized_government_desc: "Якщо ми централізуємо державу, то нам буде легше просувати ідеї та порядок денний центру над регіонами."
  nationalistic_enthusiasm: "Націоналістичний ентузіазм"
  nationalistic_enthusiasm_desc: "Підтримка наших військ є життєво важливою для національної оборони. Завдяки нашій чудовій адміністрації ми можемо забезпечити щедрі знижки на наші припаси."
  additional_colonists: "Додаткові колоністи"
  additional_colonists_desc: "Новий світ – це багато що, але найголовніше – він порожній. Ну, принаймні, ніхто важливий там не живе. Повідомляючи людям про безмежні можливості, які ми маємо в новому світі, ми заохочуватимемо більше людей вирушати туди й оселятися."
  additional_merchants: "Додаткові купці"
  additional_merchants_desc: "Колонії не принесуть користі, якщо ми не доставимо продукцію до метрополії. Ми повинні розширити наш купецький клас, щоб забезпечити це."
  faster_colonists: "Швидші колоністи"
  faster_colonists_desc: "Ви не можете просто відправити колоністів і очікувати, що вони побудують колонію. Існує трудомісткий процес підготовки експедиції з усіма предметами, які їм знадобляться для виживання в новому домі. Використовуючи наш минулий досвід, ми можемо прискорити цей процес."
  additional_diplomats: "Додаткові дипломати"
  additional_diplomats_desc: "Прагнення розширити нашу країну означає, що ми також повинні розширити наш дипломатичний вплив. Ми повинні забезпечити належне укомплектування нашої дипломатичної служби."
  improved_shipyards: "Покращені верфі"
  improved_shipyards_desc: "Щоб захистити наші інтереси по всьому світу, нам знадобиться сильний [Concept('navy', 'CONCEPT_PLACEHOLDER')|e]. Ми повинні забезпечити, щоб наші верфі могли виробляти кораблі якомога швидше, щоб замінити будь-які втрати, які ми можемо зазнати."
  experienced_diplomats: "Досвідчені дипломати"
  experienced_diplomats_desc: "Іноді достатньо, щоб люди просто вірили, що ми могутні. Ми наполегливо працювали над нашою дипломатичною службою, щоб наше слово мало додаткову вагу."
  competetive_merchants: "Конкурентоспроможні купці"
  competetive_merchants_desc: "Щоб принести торгівлю додому, ми повинні бути здатними перемагати конкуренцію з інших країн. Ми повинні забезпечити, щоб наша правова система надавала їм усі можливі переваги."
  organised_mercenary_payment: "Організовані виплати найманцям"
  organised_mercenary_payment_desc: "Капітани найманців — хитрий народ. Вони намагатимуться змусити двох командирів в одній армії змагатися за їхні послуги. Ми оптимізуємо наш процес набору найманців, щоб запобігти зловживанням з боку командирів і забезпечити, щоб ми завжди були в найкращій переговорній позиції."
  benefits_for_mercenaries: "Вигоди для найманців"
  benefits_for_mercenaries_desc: "Найманці завжди шукатимуть найкращу угоду, тому ми повинні забезпечити, щоб найманці залишалися з нами. Забезпечуючи турботу про наші найманські компанії, вони залишатимуться лояльними довше і вимагатимуть меншої прямої грошової компенсації."
  organised_mercenary_recruitment: "Набір найманців"
  organised_mercenary_recruitment_desc: "Гроші — не єдине обмеження, коли йдеться про набір найманців. Іншим вузьким місцем є наявність найманських компаній, які справді бажають служити з нами. Таким чином, ми повинні забезпечити, щоб наша система дозволяла кожній компанії приєднатися до нас."
  bookkeeping: "Бухгалтерський облік"
  bookkeeping_desc: "Іноді грошей бракує, і нам потрібно позичати. Кредитори завжди турбуються, що їм не повернуть гроші. Ведучи ретельний облік, ми зможемо забезпечити, щоб усі отримували виплати, і це дозволить нам домовлятися про нижчі процентні ставки."
  legislative_efficiency_idea: "Ефективність в адміністрації"
  legislative_efficiency_idea_desc: "Найважливішою частиною будь-якого уряду є отримання правильних порад. Ми повинні забезпечити максимальну інклюзивність, коли йдеться про радників, щоб ми могли максимізувати кількість різних точок зору, які нам представляють."
  resilient_state: "Стійка держава"
  resilient_state_desc: "Кожна держава переживає часи занепаду. Саме тоді незадоволені або виключені відчувають, що настав час повстати. Якщо ми побудуємо адміністрацію, яка буде стійкою перед обличчям цих потрясінь, ми зможемо набагато швидше оговтатися від цього сумного стану справ."
  war_cabinet: "Військовий кабінет"
  war_cabinet_desc: "Війна – це час, коли країна є найбільш вразливою, а стреси війни можуть серйозно підірвати здатність до правління. Забезпечивши участь ключових гравців під час війни, ми можемо уникнути цих стресів."
  aristocracy: "Аристократія"
  aristocracy_desc: "Аристократія є ключовою частиною будь-якої монархії, оскільки група шляхти навколо королівської династії саме те, що надає виправдання монарху. Зрештою, не може бути королівської крові без концепції шляхетної крові. Таким чином, аристократія надає свою підтримку монарху, але вони також завжди очікуватимуть певних привілеїв, оскільки їх ніколи не слід плутати зі звичайним натовпом."
  noble_knights: "Шляхетні лицарі"
  noble_knights_desc: "Підтримка кавалерії вимагає економічної системи, яка виробляє велику кількість надлишкових коней. Якби ми гарантували привілеї нашого шляхетного стану, вони не тільки були б набагато щасливішими, але й виконали б більшу частину роботи з виробництва необхідних коней. Наш придворний блазень описав це як «служба гарантує кріпаків»."
  serfdom: "Кріпаки"
  serfdom_desc: "Піхотинець в армії – це не зовсім та кар'єра, якої хтось хотів, з поганою [Concept('food', 'CONCEPT_PLACEHOLDER')|e], низькою платнею та практично відсутніми медичними послугами. Якби ми прив'язали наших селян до землі, ми б точно знали, де шукати рекрутів."
  noble_officers: "Шляхетні офіцери"
  noble_officers_desc: "Хто очолює наші війська – важливий вибір. Наша шляхта прагне забезпечити, щоб перевага надавалася їм. Це дасть їм шанс показати свою доблесть, давши ворогу холодну сталь, і ми дозволимо їм це зробити."
  local_nobility: "Місцева шляхта"
  local_nobility_desc: "Шляхта знає, що вони просто кращі за звичайних людей, і віддасть свою вірність тим, хто цього вартий. Якщо ми підтвердимо їхні привілеї, вони, звичайно, пам'ятатимуть нашу щедрість і будуть більш стійкими до спокус іноземних держав."
  international_nobility: "Міжнародна шляхта"
  international_nobility_desc: "Міжнародні відносини – справа хитра. Дехто каже, що купецький стан, який звик мати справу з іноземцями, найкраще підходить для цього. Ті, хто так каже, ігнорують родинні зв'язки, які наші шляхетні родини встановили протягом років, цими зв'язками слід скористатися, щоб допомогти нашій справі дипломатично."
  noble_resilience: "Шляхетні зв'язки"
  noble_resilience_desc: "Різні найманські групи цього континенту часто очолюються меншими шляхтичами. Подружившись зі шляхтою, ми можемо використовувати їхню мережу контактів для пошуку більших і чисельніших груп найманців."
  military_traditions: "Військові традиції"
  military_traditions_desc: "Військова думка постійно розвивається, і ми забезпечуємо, щоб наша військова думка розвивалася разом з нею. Заохочуючи традицію служби серед нашої шляхти, бути людиною статусу означає бути людиною, яка здобула славу на полі бою. Хоча хоробрість та подібні речі завжди корисні, ніщо так не полегшує справу, як перевершити свого ворога."
  tradition_of_payment: "Традиція оплати"
  tradition_of_payment_desc: "Завжди є спокуса затримати платежі найманцям на кілька днів, адже ніколи не знаєш, які раптові витрати можуть виникнути. Ми цього не робитимемо, ми платитимемо нашим найманцям точно вчасно, і найманські капітани знатимуть і пам'ятатимуть це."
  abolished_serfdom: "Скасоване кріпацтво"
  abolished_serfdom_desc: "З читання римських хронік ми знаємо, що громадянська армія вільних людей набагато охочіше воює, ніж ті, кого примушують. Ми повинні зробити наше селянство досить вільним, і вони боротимуться за захист своєї свободи."
  bill_of_rights: "Білль про права"
  bill_of_rights_desc: "Надавши громадянам певні фундаментальні права, ми зменшуємо ймовірність селянського повстання."
  free_merchants: "Вільні купці"
  free_merchants_desc: "У більш реакційних і закостенілих суспільствах торговців зневажають, вважаючи їх якимось чином меншими людьми, ніж ті, хто володіє землею. Але не для нас, ми знаємо, що багатство — це влада, незалежно від того, звідки воно походить."
  free_subjects: "Вільні піддані"
  free_subjects_desc: "Хоча добре відшмагати слугу може бути приємно, це не найкращий спосіб змусити його працювати старанніше. Деякий натурфілософ дійшов ідеї зробити прибуток головною мотивацією для людей; якщо ми замінимо грошову ренту натуральною оплатою, наші селяни будуть заохочені виробляти більше."
  humanist_tolerance: "Гуманістична толерантність"
  humanist_tolerance_desc: "Прагнучи до більш толерантного суспільства та намагаючись вирішувати наші соціальні та релігійні проблеми більш раціональними способами, ризик громадянських заворушень зменшиться."
  emancipation: "Емансипація"
  emancipation_desc: "Довгий час ми обмежували володіння землею лише тими, кого вважали достатньо надійними. Якби ми зняли ці обмеження, то земельні володіння були б консолідовані. Це, своєю чергою, створило б резерв сезонної робочої сили, для якої армійське життя могло б бути вартим уваги."
  dynamic_court: "Динамічний двір"
  dynamic_court_desc: "Справді інноваційний двір — це той, де будь-яка людина може піднятися і засяяти. Ми повинні прагнути до того, щоб старі традиції, походження чи багатство не були перешкодою для розвитку нашого двору чи бар'єром для талановитих людей, які бажають шукати свою долю на службі нашій державі."
  innovativeness: "Жага знань"
  innovativeness_desc: "Природна цікавість і бажання знати про світ та як він функціонує — ось що рухає нас уперед. Наш народ хоче знати, і саме ця іскра в їхніх умах запалить прогрес для нашої нації."
  economic_ideas: "Підпорядкована економіка"
  economic_ideas_desc: "Економіка та багатство країни повинні служити державі, а не навпаки. Отже, держава повинна діяти в своїх найкращих інтересах, щоб накопичувати в собі найбільшу кількість ресурсів. Тільки з цим наша нація справді процвітатиме."
  expansionism: "Зерно серед тернів"
  expansionism_desc: "Світ величезний, і ми не можемо задовольнятися перебуванням на нашій маленькій ділянці землі, бо наші сусіди не обов'язково робитимуть те саме. Ми спрямуємо свій погляд на розширення та зміцнення себе, щоб не ризикувати бути задушеними нашими зростаючими сусідами."
  formal_administration: "Формальна адміністрація"
  formal_administration_desc: "Правильні процедури та добре налагоджений адміністративний апарат призводять до процвітаючої країни, бо без належної адміністрації все, що держава має намір зробити, залишиться безплідним. Ми формалізуємо та стандартизуємо нашу, щоб воля держави природно протікала через неї до всіх куточків нації."
  plutocracy: "Сила монети"
  plutocracy_desc: "Багатство і влада не є синонімами, але вони, безумовно, пов'язані. Бо не тільки влада може зробити когось багатим, але й багатство може надати комусь владу. Ми це розуміємо, оскільки наші найбагатші особи також є тими, хто займає місця влади в нашій країні."
  rebellion_support: "Таємні контакти"
  rebellion_support_desc: "Це бурхливі часи, і не всі люди задоволені тими, хто ними править. Зв'язавшись із цими незадоволеними групами за кордоном, ми можемо залучити їх до нашої справи та переконати їх спровокувати повстання, що, безумовно, послужить інструментом для дестабілізації наших ворогів."
  privateers: "Капери"
  privateers_desc: "Ведення війни проти ворожої торгівлі є вершиною першої тріади перемоги. Ми заохочуватимемо бувалих морських капітанів завдавати ударів по ворожій торгівлі."
  vetting: "Перевірка"
  vetting_desc: "Маючи стільки прибуткових посад, ми іноді виявляємо, що ті, хто керує нашою адміністрацією, схильні до хабарів від іноземних держав. Кілька простих перевірок біографічних даних відсіють найбільш схильних до корупції."
  rumourmongering: "Поширення чуток"
  rumourmongering_desc: "Вороги вразливі на всіх фронтах. Отрута в потрібне вухо може бути такою ж смертоносною, як десять тисяч солдатів. Ми повинні бути готові застосовувати всі темні мистецтва, які нам потрібні для перемоги."
  efficient_spies: "Ефективні шпигуни"
  efficient_spies_desc: "Більшість селян продадуть власну матір за гроші, але знайти тих, хто може зробити щось справді корисне, складніше. З досвідом ми вчимося відділяти зерно від полови."
  shady_recruitment: "Тіньовий набір"
  shady_recruitment_desc: "Наша здатність виявляти та вербувати з найнижчих класів змушує багатьох не вірити, що це справді ми робимо ці речі. Що приємно."
  destabilising_efforts: "Дестабілізуючі зусилля"
  destabilising_efforts_desc: "Наші здібності до шпигунства дозволяють нам націлюватися на саму [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] ворогів. Ми можемо зробити їхніх найбільших друзів їхніми ворогами."
  espionage: "Шпигунство"
  espionage_desc: "Дозволяє нам навчати більше шпигунів і тим самим збільшувати наші шанси на отримання політичної та військової інформації про наших ворогів."
  foreign_embassies: "Іноземні посольства"
  foreign_embassies_desc: "Дипломатія — це делікатне мистецтво спроби збалансувати кілька сторін одночасно. Якщо ми підтримуватимемо посольства в інших країнах, які регулярно звітуватимуть нам, тоді ми матимемо інформацію, необхідну для обмірковування наших варіантів."
  claim_fabrication: "Фабрикація претензій"
  claim_fabrication_desc: "Заявляти щось своїм легко, переконати всіх інших, що у вас є обґрунтована претензія, набагато складніше. Розширюючи нашу дипломатичну мережу, ми можемо гарантувати, що люди, які мають значення, знатимуть, що ця претензія наша."
  cabinet: "Кабінет"
  cabinet_desc: "Створивши виконавчу раду, ми можемо зібрати наших найкваліфікованіших дипломатів."
  adaptability: "Адаптивність"
  adaptability_desc: "Є те, що наше, і те, що є частиною нашого родового володіння, що ніколи не буде здано. Трохи гнучкості тут призведе до того, що набагато більше землі буде вважатися такою, що ніколи не буде здана, і якщо станеться найгірше, весь світ знатиме, що наш хрестовий похід для її повернення буде справедливим."
  revolution_and_counter: "Революція та контрреволюція"
  revolution_and_counter_desc: "Оскільки політика того часу стає все більш поляризованою та радикальною, ми можемо не мати іншого вибору, окрім як вести війну проти урядів, які не схожі на наш власний. Прийнявши цю ідею, ми можемо безкоштовно."
  diplomatic_influence: "Дипломатичний вплив"
  diplomatic_influence_desc: "Зосередившись на дипломатії, ми можемо збільшити владу, яку ми маємо на дипломатичній арені. Ця влада може принести нам багато друзів."
  flexible_negotiation: "Гнучкі переговори"
  flexible_negotiation_desc: "Ніколи не знаєш напевно, що можна здобути за мирним столом, тож ми повинні вступати з усіма відкритими можливостями."
  agent_training: "Навчання агентів"
  agent_training_desc: "Ми маємо багато запланованих таємних операцій, але бракує людей для їх виконання. Запровадження методу навчання для наших шпигунів допоможе збільшити кількість доступних агентів для небезпечних місій."
  additional_loyalist_recruitment: "Додатковий набір лоялістів"
  additional_loyalist_recruitment_desc: "Природно, є ті, хто мешкає на землях наших підданих і розуміє божественне право нашого правління. Набираючи та підтримуючи цих просвітлених осіб, ми можемо зміцнити нашу владу над підвладними націями."
  audit_checks: "Аудиторські перевірки"
  audit_checks_desc: "Поки ми прагнемо проникнути в інші нації, ми повинні бути пильними щодо отруйних ідей, що поширюються при наших власних дворах. Створення аудиторської групи для забезпечення того, щоб наші міністри діяли в інтересах держави, допоможе викорінити деякі гнилі елементи."
  grand_army: "Велика Армія"
  grand_army_desc: "Дозволяє нам створити одну з найбільших і наймогутніших армій, які коли-небудь бачив світ."
  glorious_arms: "Славна Зброя"
  glorious_arms_desc: "Вигляд нашої славної та престижної армії змусить усіх супротивників тремтіти від страху."
  bayonet_leaders: "Багнетні Лідери"
  bayonet_leaders_desc: "Добре керовані люди підуть за ними, тож ми забезпечимо, щоб наші офіцери вели за собою з передової."
  battlefield_commisions: "Польові Призначення"
  battlefield_commisions_desc: "Дозволяє нам зосередитися на військових досягненнях і тим самим збільшити нашу Армійську Традицію."
  improved_foraging: "Покращений Фураж"
  improved_foraging_desc: "Традиційно ми не могли ефективно воювати на землях, які не постачали багато їжі. Однак наші війська стали краще здобувати [Concept('food', 'CONCEPT_PLACEHOLDER')|e], дозволяючи більшим арміям воювати."
  improved_manuever: "Покращений Маневр"
  improved_manuever_new: "Покращений Фланговий Радіус"
  improved_manuever_desc: "Використання військ на полі бою є життєво важливою навичкою для хорошого командира. Здатність знати, куди переміщати війська, дасть нам перевагу."
  engineer_corps: "Інженерний Корпус"
  engineer_corps_desc: "Дозволяє нам зібрати найкращі уми, які наша нація може запропонувати в галузі військових технологій, і скористатися їхніми неперевершеними послугами."
  military_drill: "Військова Муштра"
  military_drill_desc: "Дозволяє нам інвестувати у військову підготовку і тим самим покращити бойові порядки, володіння зброєю та підвищити бойовий дух нашої армії."
  regimental_system: "Полкова Система"
  regimental_system_desc: "Організувавши наші війська в [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e], прив'язані до окремих географічних районів, ми дозволимо армії пустити коріння в громаді. Таким чином, коли ми будемо набирати більше батальйонів для наших [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e], їх можна буде набирати швидше."
  defensive_mentality: "Оборонний менталітет"
  defensive_mentality_desc: "Є ті, хто вважає, що напад — найкраща форма захисту, але це нерозумно; нехай вони прийдуть до нас, а потім ми вдаримо їх у відповідь. Наші війська оборонятимуться завзято, і наші фортеці протримаються довше."
  superior_firepower: "Переважна вогнева міць"
  superior_firepower_desc: "Використання масованої вогневої міці для дезорганізації ворога перед тим, як завдати смертельного удару, є однією з сильних сторін нашої армії, і ми забезпечимо, щоб наші лідери знали про це."
  supply_trains: "Обози постачання"
  supply_trains_desc: "Під час кампанії [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e] є нашим найгрізнішим ворогом, і ключ до захисту наших людей від нього — це добре спланована та ефективно керована логістична мережа, здатна забезпечувати підтримку та постачання."
  national_conscripts: "Національні призовники"
  national_conscripts_desc: "Збільшує нашу військову чисельність, роблячи обов'язковим для чоловіків запис на військову службу."
  shrewd_commerce_practice: "Прониклива торгівля"
  shrewd_commerce_practice_desc: "Дозволяє нам використовувати більш витончені торговельні практики, даючи нашим купцям перевагу над конкурентами."
  free_trade: "Вільна торгівля"
  free_trade_desc: "Нинішні купецькі родини прагнуть забезпечити, щоб торговельні привілеї залишалися їхньою винятковою прерогативою, але ми не бажаємо цього робити і дозволимо зростання купецького стану."
  merchant_adventures: "Купецькі пригоди"
  merchant_adventures_desc: "Дозволяє нам використовувати численних торговців, які прагнуть слави та багатства, готових запропонувати свої послуги заради шансу шукати та досліджувати нові торговельні шляхи."
  national_trade_policy: "Національна торговельна політика"
  national_trade_policy_desc: "Прийнявши національну торговельну політику, ми можемо зміцнити нашу комерційну присутність та підвищити ефективність нашої торгівлі."
  overseas_merchants: "Заморські купці"
  overseas_merchants_desc: "Щоб розвивати торгівлю, нам потрібно поширити права громадянства на людей, які живуть за кордоном, підтримують нашу торгівлю і належать до правильного соціального стану."
  trade_manipulation: "Маніпуляція торгівлею"
  trade_manipulation_desc: "У цих ключових вузьких місцях, де торгівля могла б піти тим чи іншим шляхом, здатність отримати перевагу там є ключовою для зростання нашого торговельного доходу."
  fast_negotiations: "Швидкі переговори"
  fast_negotiations_desc: "Іноді ключ до укладення торговельної угоди — бути найшвидшим. Ми повинні забезпечити, щоб наші купці могли завершити угоду."
  colonial_ventures: "Колоніальні підприємства"
  colonial_ventures_desc: "Дозволяє нам відправляти більше Колоністів на незвідані землі."
  quest_for_the_new_world: "Пошук Нового Світу"
  quest_for_the_new_world_desc: "Дозволяє нам приєднатися до числа націй, що прагнуть досліджувати світ за межами своїх кордонів, або стати першою нацією, яка обійде світ, розпочавши пошук Нового Світу."
  overseas_exploration: "Шукачі Фортуни"
  overseas_exploration_desc: "Заснування колоній у далеких землях — це майже подорож в один кінець. Якщо дивні нові хвороби вас не здолають, то час, необхідний для повернення, означає, що ви не повернетеся додому. Якщо ми нагадаємо людям про потенційні багатства, ми зможемо заохотити їх шукати землі далі."
  land_of_opportunity: "Земля Можливостей"
  land_of_opportunity_desc: "Зображуючи колоніальні землі та нові незаймані землі, де будь-який чоловік, а можливо, і деякі жінки, можуть заробити свій статок, люди швидше емігруватимуть до колоній. Це означає, що нація витратить менше грошей на заохочення людей туди їхати."
  vice_roys: "Віце-королі"
  vice_roys_desc: "Дає нам можливість засновувати віце-королівства і таким чином покращувати управління нашими колоніями та збільшувати кількість грошей, які вони приносять."
  free_colonies: "Вільні Колонії"
  free_colonies_desc: "Лише обмежена кількість людей бажає переїхати за кордон, щоб розширити нашу велику колоніальну імперію. Однак обіцянка ділянки землі для ведення господарства, у вільному володінні, заохотить набагато більше людей шукати щастя за кордоном. Приємно те, що землі вистачить усім."
  global_empire: "Глобальна Імперія"
  global_empire_desc: "Наша відданість колоніальній імперії змінила ставлення людей до роботи в колоніальній адміністрації. Це вже не місце для флібустьєрів, які прагнуть максимізувати свій статок, а кар'єра для найрозумніших і найкращих. Це відображається в наших податках."
  formal_diplomacy: "Формальна Дипломатія"
  formal_diplomacy_desc: "В епоху, коли влада переходить від рук могутніх особистостей до централізованої влади, мудро будувати мости та канали зв'язку між нами та нашими сусідами. Зараз, як ніколи, дипломатія є ключовою перед обличчям зростаючих держав."
  explorer_commisions_advance: "Комісії Дослідників"
  explorer_commisions_advance_desc: "За нашими берегами лежать незвідані землі, готові до захоплення! Набір відважних чоловіків та дослідників, щоб вирушити в невідоме, є для нас прибутковою та життєво важливою можливістю."
  offensive_army: "Наступальна Армія"
  offensive_army_desc: "Епоха пороху та військових інновацій настала, і разом з ними вони приносять оновлений інтерес та життєву силу до ведення війни. Щоб примножити нашу славу, ми повинні старанно забезпечувати високі стандарти наших наступальних збройних сил."
  defensive_army: "Оборонна Армія"
  defensive_army_desc: "Зростання багатьох могутніх держав навколо нас вказало на необхідність міцної оборонної сили, оскільки ми прагнемо зберегти нашу територіальну цілісність. Знання місцевості, шляхів та тактики допоможе нам пережити цей бурхливий період."
  national_trade: "Національна Торгівля"
  national_trade_desc: "Тканина, вовна та інші затребувані товари обійшли весь світ. В епоху, коли комерція досягає далеких берегів, ми повинні переконатися, що наші купці мають перевагу!"
  exploration: "Ідеї Дослідження"
  exploration_desc: "Наша здатність плавати морями за нашим горизонтом відповідає нашим природним претензіям на береги та мешканців незвіданих територій."
  superior_seamanship: "Вища Мореплавність"
  superior_seamanship_desc: "Дозволяє нам перетворити наш [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] на верховну морську силу з висококласними суднами та висококваліфікованими капітанами й моряками."
  naval_glory: "Морська Слава"
  naval_glory_desc: "Вид нашого славетного та престижного флоту змусить усіх супротивників тремтіти від страху."
  grand_navy: "Великий Флот"
  grand_navy_desc: "Дозволяє нам створити один із найбільших і наймогутніших [Concept('navies', 'CONCEPT_PLACEHOLDER')|e], які світ коли-небудь бачив."
  sea_hawks: "Морські Яструби"
  sea_hawks_desc: "Дозволяє нам зосередитися на військових досягненнях і тим самим збільшити нашу морську традицію."
  excellent_shipwrights: "Видатні Корабельні Майстри"
  excellent_shipwrights_desc: "Зібравши найкращих кораблебудівників, яких може запропонувати наша нація, ми можемо побудувати [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] з сучасних суден, неперевершених у майстерності та маневреності."
  naval_fighting_instruction: "Морська Бойова Інструкція"
  naval_fighting_instruction_desc: "Дозволяє нашим морським ветеранам розробляти нові методи для підвищення ефективності нашого [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] у [Concept('blockades', 'CONCEPT_PLACEHOLDER')|e]."
  press_gangs: "Примусовий Набір"
  press_gangs_desc: "Життя в морі важке й невблаганне, і не кожен прагне кар'єри у флоті. Легалізувавши примусовий набір чоловіків, які мають морські звички, буде легше укомплектувати наші кораблі, прискорюючи процес введення суден в експлуатацію."
  quality_education: "Якісна Освіта"
  quality_education_desc: "Найважливіший момент існування будь-якої армії настає одразу після битви. Перемога чи поразка, виснажені війська є найвразливішими. Ми повинні забезпечити готовність наших військ до бою раніше, ніж противник."
  finest_of_horses: "Найкращі Коні"
  finest_of_horses_desc: "Як впевнено ці війська займають позиції! Як чудово формується ця кавалерія! Погляньте на цих сірих коней! Хто ці чудові вершники? Це чудові війська."
  oak_forests_for_ships: "Дубові Ліси для Кораблів"
  oak_forests_for_ships_desc: "Чим більше шкоди можуть витримати наші кораблі, тим більше вони можуть завдати. Давайте забезпечимо постійний запас найкращого витриманого дуба для наших військових кораблів."
  private_to_marshal: "Від Рядового до Маршала"
  private_to_marshal_desc: "Кожен рядовий має маршальський жезл за спиною. Ну, можливо, не зовсім, але для тих, хто відзначиться в бою, слідуватимуть підвищення та нагороди. Війська знають це і надихаються цим."
  naval_drill: "Морські Навчання"
  naval_drill_desc: "Плутанина бою може надовго вивести військовий корабель з ладу. Добре навчений екіпаж відновиться набагато швидше, ніж звичайний."
  merchant_marine: "Торговий Флот"
  merchant_marine_desc: "Нехай кожен торговий корабель з гордістю несе наш торговий прапор і знає, що наш флот завжди буде там, щоб захистити їх, якщо виникне потреба."
  massed_battery: "Масована батарея"
  massed_battery_desc: "Зберімо нашу артилерію в єдину велику батарею, її руйнівна сила проб'є діру у ворожих лініях."
  benefits_for_horseowners: "Вигоди для власників коней"
  benefits_for_horseowners_desc: "Життя дешеве, але коні дорогі. Якщо ми створимо систему вигод для тих, хто володіє кіньми, ми матимемо більший вибір."
  the_old_and_infirm: "Старі та немічні"
  the_old_and_infirm_desc: "Сержанти-ветерани — одні з найогидніших і найкорумпованіших людей, яких тільки можна уявити, але ці люди все ще корисні. Замість того, щоб залишати їх жебраками на наших вулицях, таких людей слід використовувати після закінчення їхньої служби. Зробімо їх інструкторами з муштри та квартирмейстерами, щоб їхні унікальні навички могли бути використані."
  the_young_can_serve: "Молодь може служити"
  the_young_can_serve_desc: "Скільки років має бути хлопчику, перш ніж він стане чоловіком? Скільки років йому має бути, перш ніж він зможе померти за свою країну? Деякі правителі гидливі, ми ж, навпаки, є м'ясниками рівних можливостей."
  enforced_service: "Примусова служба"
  enforced_service_desc: "Принцип добровільності лежить в основі всієї структури нашої армії. Іноді добровольців недостатньо. Ми повинні змушувати людей добровільно йти на службу."
  ships_penny: "Корабельний пенні"
  ships_penny_desc: "Кораблі дорогі, нам потрібно, щоб інші люди допомогли за них заплатити. Корабельний пенні є чудовим прикладом цього."
  standardized_artillery: "Стандартизована артилерія"
  standardized_artillery_desc: "Кожен ливарник залізно ревно оберігає свої секрети та техніки, роблячи кожну гармату унікальним витвором мистецтва. Хоча це може бути добре для їхнього его, це не найкращий спосіб замовляти гармати. Відтепер ми наполягатимемо, щоб кожна гармата виготовлялася за нашими точними специфікаціями, і це також буде набагато дешевше."
  mass_army: "Масова армія"
  mass_army_desc: "Досі ми були дуже вибагливими щодо того, хто має служити рядовим у нашому війську. Ми брали лише найбідніших і найвідчайдушніших, по суті, людей, яких ніхто інший не помітить. Тепер же ми відкриємо ряди для всіх, хто не є багатим."
  mercenary_contracts: "Контракти з найманцями"
  mercenary_contracts_desc: "Укладаючи постійні контракти з певними найманими капітанами, ми можемо забезпечити собі постійний доступ до великого резерву найманців, якщо вони знадобляться."
  local_traditions: "Місцеві традиції"
  local_traditions_desc: "Управління великою нацією означає правління над багатьма різноманітними народами, кожен зі своїми звичаями та традиціями. Включаючи ці традиції до нашого офіційного кодексу законів, ми створюємо щасливе та лояльне населення."
  indirect_rule: "Непряме правління"
  indirect_rule_desc: "Іноді найкращий спосіб змусити людей робити те, що ви хочете, — це дозволити їм вірити, що вони роблять власний вибір. Така система непрямого правління зменшить заворушення в новопридбаних провінціях."
  cultural_ties: "Культурні зв'язки"
  cultural_ties_desc: "Різні культури мають різні звичаї, і з якоїсь причини схильні чинити опір спробам змінити ці звичаї згори. Ми можемо перетворити цю слабкість на силу, включивши місцевих лідерів до нашої системи управління та доручивши їм виконувати нашу волю у спосіб, який є для них прийнятним."
  benevolence: "Доброзичливість"
  benevolence_desc: "Наша нація є оплотом толерантності та просвітництва. Забезпечивши, щоб усі інші нації знали про це, ми можемо сприяти кращим відносинам за кордоном."
  establish_cadet_branches: "Заснувати кадетські гілки"
  establish_cadet_branches_desc: "Спадкування може бути складною справою. Чітко визначивши ролі та права для нашої династії через кадетські гілки, ми можемо забезпечити стабільнішу лінію престолонаслідування."
  tribute_system: "Система данини"
  tribute_system_desc: "Зміцнити наш дохід, встановивши формалізовану систему щорічної данини від наших васалів."
  integrated_elites: "Інтегровані еліти"
  integrated_elites_desc: "Залучивши правлячу еліту наших підвладних націй до нашого уряду, ми можемо значно спростити процес інтеграції їхніх провінцій."
  state_propaganda: "Державна пропаганда"
  state_propaganda_desc: "Як і для людини, репутація нації — це все, і створення офіційної служби пропаганди забезпечить, щоб наше добре ім'я не було заплямоване брехнею наших ворогів."
  postal_service: "Поштова служба"
  postal_service_desc: "З огляду на стан зв'язку, важко забезпечити, щоб наші дипломатичні депеші прибували вчасно. Створення мережі поштових відділень та місць відпочинку для кур'єрів полегшить почути наш голос у далеких землях."
  marcher_lords: "Маркграфи"
  marcher_lords_desc: "Надавши значну автономію васалам у прикордонних регіонах, ці «Маркграфи» зможуть зібрати великі військові армії, щоб підтримати нас у наших війнах."
  boarding_parties: "Абордажні загони"
  boarding_parties_desc: "Навчивши наших морських офіцерів очолювати абордажні дії проти ворожих кораблів, ми можемо отримати перевагу в морському бою, навіть борючись із переважаючим ворожим [Concept('navies', 'CONCEPT_PLACEHOLDER')|e]."
  improved_rams: "Покращені тарани"
  improved_rams_desc: "Концепція оснащення військових кораблів таранами сягає тисяч років, але з того часу були зроблені великі досягнення в металургії, і ми повинні скористатися ними для створення міцніших таранів."
  naval_cadets: "Морські кадети"
  naval_cadets_desc: "Просуваючи флот як вибір кар'єри для других і третіх синів знаті, ми можемо створити професійний корпус морських офіцерів для нагляду за нашими артилерійськими розрахунками."
  copper_bottoms: "Мідна обшивка"
  copper_bottoms_desc: "Дерево може бути ідеальним матеріалом для суднобудування, але воно має тенденцію до руйнування з часом. Обшивши наші кораблі міддю нижче ватерлінії, ми можемо зменшити це руйнування, дозволяючи їм краще витримувати довгі подорожі."
  escort_ships: "Корвети"
  escort_ships_desc: "Корвети були класом невеликих військових кораблів, призначених для супроводу дружніх суден та переслідування ворога, покладаючись на швидкість та маневреність, а не на масовану вогневу міць."
  national_arsenal: "Національний арсенал"
  national_arsenal_desc: "Створивши національний арсенал, де наші військові кораблі можуть бути побудовані та обслуговувані відповідно до єдиних стандартів, ми можемо виставити більший флот."
  garrison_conscription: "Призовні гарнізони"
  garrison_conscription_desc: "Призиваючи наших працездатних молодих чоловіків до гарнізонів, ми можемо забезпечити достатню кількість людей для захисту наших кордонів."
  expanded_supply_trains: "Розширені обози постачання"
  expanded_supply_trains_desc: "Інвестування більшої кількості ресурсів у наші обози постачання дозволить нашій армії діяти довше на ворожій території."
  sheltered_ports: "Захищені порти"
  sheltered_ports_desc: "На жаль, кораблі часто пошкоджуються під час битви, і не менш прикро, що пошкодження рідко можна відремонтувати в морі. Щоб полегшити цю проблему, ми створимо систему захищених портів уздовж нашого узбережжя, де наші кораблі зможуть лагодитися."
  diplomatic_corps: "Дипломатичний корпус"
  diplomatic_corps_desc: "Через створення професійного Дипломатичного корпусу ми забезпечуємо передачу важко здобутих уроків старших дипломатів молодшому поколінню."
  civil_servants: "Державна служба"
  civil_servants_desc: "Створення Державної служби з енергійних молодих бюрократів забезпечить нашу швидку адаптацію до нових досягнень в адміністрації та управлінні."
  free_cities: "Вільні міста"
  free_cities_desc: "Надання нашим містам самоврядування у питаннях торгівлі дозволить нам відкрити нові, прибуткові торгові шляхи."
  preaching_missions: "Місіонерські місії"
  preaching_missions_desc: "Заснувати місіонерські експедиції, які забезпечать поклоніння нашого населення єдиній, істинній вірі."
  marine_regiments: "Морські полки"
  marine_regiments_desc: "Морські піхотинці — це військові підрозділи, що спеціалізуються на амфібійних операціях і використовуються для набігів на береги та абордажу ворожих суден, водночас беручи участь у сухопутних битвах."
  discipline_drills: "Дисципліновані навчання"
  discipline_drills_desc: "Під час бою мають значення лише три цінності: вогнева міць, жива сила та дисципліна, яка поєднує перші дві. Регулярні військові навчання та вправи покращать військову підготовку наших військ до нового стандарту."
  open_levy_standards: "Відкриті стандарти призову"
  open_levy_standards_desc: "Що має робити чоловіка придатним для боротьби та смерті за свою країну? Його віра? Чи його вірність родині? Зрештою, єдина правильна відповідь полягає в тому, що ми не можемо робити жодних винятків. Кожен має обов'язок служити під нашим прапором."
  influence: "Тиск дипломатії"
  influence_desc: "Закінчення війни вимагає переговорів між двома сторонами, і іноді протилежна сторона виявляється надто впертою, щоб прийняти поразку. У таких випадках мистецтво тиску дипломатії та нагадування їм про їхнє неминуче знищення дасть їм достатньо мотивації легше прийняти наші щедрі умови."
  divine_passion: "Божественна пристрасть"
  divine_passion_desc: "Часи змінюються. Там, де колись віра стояла понад усе, ідеї, які колись вважалися язичницькими, поширюються серед простого люду. Перед обличчям світу, що розвивається, наше Духовенство знаходить розраду в нашій непохитній відданості нашій справі."
  servants_of_god: "Слуги Божі"
  servants_of_god_desc: "Бути гвинтиком у цій небесній машині — одна з найбільших почестей, які може нести людина. Маючи нашого власного бога як Господа, серце нашого народу б'ється з громовим схваленням."
  by_the_grace_of_god: "З Божої Ласки"
  by_the_grace_of_god_desc: "Світ був створений полум'ям, і полум'ям ми всі закінчимо. Наш бог дарував нам, смиренним смертним, вогонь життя, спалюючи наші душі в процесі та змушуючи нас бачити правду про його небезпеку. Не бійся."
  state_of_clerics: "Стан Духовенства"
  state_of_clerics_desc: "Природа теократії полягає в її близькості до божественного. Щоб досягти цього, багато елементів нашого уряду виконуються духовенством, яке поєднує релігійні ритуали з бюрократичними обов'язками адміністраторів."
  friends_in_high_places: "Друзі у Високих Місцях"
  friends_in_high_places_desc: "Є лише один шлях, який приведе нас до невмирущого, вічного щастя. Знати бога — це знати його найближчих агентів тут, на Землі. Вони допоможуть нам знайти цей шлях."
  flesh_is_weak: "Плоть Слабка"
  flesh_is_weak_desc: "Плоть слабка, душа — ні. Наші армії навчилися битися так, ніби вони поділяли одну душу, і тому їхній бойовий дух ніколи не буде зламаний."
  alpha_and_omega: "Альфа і Омега"
  alpha_and_omega_desc: "Наш бог — початок і кінець усього сущого. Його голос буде єдиним звуком, який наші вороги почують над криками битви. Його побожна природа приведе їх у його гостинні обійми. Тоді вони побачать правду."
  conviction_of_sin: "Переконання у Гріху"
  conviction_of_sin_desc: "Вони схилять коліна, ті, хто вчинив зло. Важкий тягар їхніх лихих вчинків переслідуватиме їх вічно. Вони не спатимуть спокійно, доки не спокутують підступні кошмари, які вони спричинили."
  martyrs: "Мученики"
  martyrs_desc: "Мученик — це той, хто розуміє, що смерть в ім'я свого бога є найвищою честю. Люди нашої землі тримають свою віру близько до серця і завжди прагнуть приєднатися до нашої справи."
  cultural_acceptance_advance: "Культурне Прийняття"
  cultural_acceptance_advance_desc: "Очевидно, що коли ми поглинаємо інші народи, їхні чужі традиції можуть викликати тертя з нашими власними. Один із способів вирішення цього — просто терпіти таких чужинців, ніби вони були нашими власними родичами."
  unlock_traditional_galley_advance: "$n_traditional_galley$"
  unlock_traditional_galley_advance_desc: "$n_traditional_galley_desc$"
  hollander_beater: "Голландський розмелювач"
  hollander_beater_desc: "Протягом століть паперові фабрики покладалися на механічні молоти для розмелювання грубої паперової маси, подрібнюючи волокна для створення сировини, необхідної для подальшого виготовлення паперу. Використовуючи місцеві вітряки для живлення, підприємливі ремісники тепер розробили більш ефективне рішення. Те, що вони називають голландським розмелювачем, — це чан з горизонтальним валиком, що приводиться в рух вітром, з лезами. Ці леза можуть подрібнити стільки маси за години, скільки старі молоти робили за дні."
  faceting: "Огранювання"
  faceting_desc: "Майстри з огранювання дорогоцінного каміння зробили прорив у різанні діамантів, експериментуючи з алмазним пилом, суспендованим в олії, на своїх шліфувальних кругах. Це дозволяє ремісникам різати рідкісні камені в абсолютно нові форми та з набагато більшим блиском. Отримана техніка, відома як огранювання, створює камінь більш приємної геометричної форми та з кращими оптичними властивостями. Оскільки нові камені та техніка їх виготовлення поширюються по дворах та майстернях, попит на ювелірні вироби, діаманти та дорогоцінне каміння значно зростає."
  maritime_decay_advance_disc: "Встановлені Маршрути"
  maritime_decay_advance_disc_desc: "Моря постійно борознять різні купці в пошуках найкращого прибутку. Це природно призводить до того, що певні маршрути стають більш усталеними та відвідуваними, ніж інші, причому найкращі з них є постійним рухом кораблів, що курсують туди й назад."
  rgo_logistics_discovery: "Місцеві комори"
  rgo_logistics_discovery_desc: "Якщо купці та ремісники матимуть доступ до потрібних товарів на місці, це не лише полегшить тягар їхньої праці, але й запобігне надмірному зростанню цін на товари. З цією метою комори слугуватимуть місцевими розподільчими центрами для задоволення потреб кожного."
  port_cost_distance_from_capital_advance: "Досвідчені капітани"
  port_cost_distance_from_capital_advance_desc: "Не кожен шибеник може стати капітаном корабля, лише найдосвідченіші та найвправніші з них очолюватимуть наші судна. Такі морські вовки повинні бути здатними безпечно знайти шлях назад до порту навіть у найлютіші шторми."
  land_morale_attrition_cost_advance: "Маршова підготовка"
  land_morale_attrition_cost_advance_desc: "Загальновідомо, що будь-якій армії доведеться долати великі відстані, щоб дістатися до ворога. Таким чином, довгі марші є основою підготовки наших військ, привчаючи їх годинами йти пішки і все ще прибувати свіжими до битви."
  land_morale_movement_cost_advance_disc: "Скоординований марш"
  land_morale_movement_cost_advance_disc_desc: "Армія в русі є найбільш вразливою та схильною до дезорганізації. Привчання наших військ до організованого та скоординованого маршу гарантує, що вони зможуть зберігати свої бойові порядки навіть у разі атаки під час руху."
  trade_through_owned_disc_advance: "Купецькі стежки"
  trade_through_owned_disc_advance_desc: "Купці рідко залишаються на одному місці, завжди намагаючись знайти найвигідніші угоди. Їхнє постійне прибуття та від'їзд є звичним видовищем у наших землях, зазвичай навіть прокладаючи власні шляхи, щоб скоротити відстані, які їм доводиться долати."
  hire_artist_cost_modifier_advance_disc: "Земля культури"
  hire_artist_cost_modifier_advance_disc_desc: "Культура та мистецтво – це те, що визначає ідентичність будь-якої країни. Пишаючись нашою культурою та нашими митцями, ми, безперечно, можемо зробити так, щоб наш слід у світі відчувався всюди."
  rural_rgo_disc_advance: "Розвиток поселень"
  rural_rgo_disc_advance_desc: "Будь-яке поселення, хоч би яким малим воно було, процвітатиме, доки земля багата і є люди, готові її обробляти. Навіть найменше село з часом стане процвітаючим і сповненим активності."
  leader_recruit_cost_advance: "Офіцерські школи"
  leader_recruit_cost_advance_desc: "Керувати військами – непросте завдання. Стратегія, тактика, проникливість – це лише деякі з навичок, які повинен мати успішний лідер. Наявність належних академій для навчання таких лідерів забезпечить нам легший доступ до більшого їхнього резерву."
  morale_recovery_rev_dip_choice: "Встановлений відпочинок"
  morale_recovery_rev_dip_choice_desc: "Жодна армія не може постійно перебувати в стані дії, усі солдати потребують часу для відпочинку та відновлення. Встановивши належний час для їхнього відпочинку, не дозволяючи йому перетворитися на лінь, ми можемо підтримувати наші війська в найкращому стані."
  merchant_power_from_maritime_rev_dip_choice: "Купецькі флотилії"
  merchant_power_from_maritime_rev_dip_choice_desc: "Присутність купецьких кораблів у наших водах стала звичним видовищем. Наші купці мають стільки суден, що курсують туди-сюди, що вони фактично сформували власну флотилію."
  administrative_leadership: "Адміністративне керівництво"
  administrative_leadership_desc: "Військовий лідер повинен знати не лише про військові справи. Питання, пов'язані з логістикою, управлінням та розподілом постачання, грошовими витратами тощо, також є критично важливими для будь-якої успішної військової кампанії."
  cultures_capacity_mil_choice: "Мультикультурні амбіції"
  cultures_capacity_mil_choice_desc: "Експансія країни, безсумнівно, призведе до включення інших культур до її складу. Отже, якщо ми хочемо й надалі розширювати наші кордони, нам потрібно бути готовими стати більш мультикультурними."
  rgo_logistics_mil_choice: "Покращені комори"
  rgo_logistics_mil_choice_desc: "Наявність належних складів для зберігання продукції, необхідної місцевому бізнесу, є обов'язковою умовою для безперебійного функціонування цих підприємств та економіки в цілому."
  land_morale_movement_cost_rev_choice_mil: "Невпинний наступ"
  land_morale_movement_cost_rev_choice_mil_desc: "Марш наших армій – видовище, варте уваги. Їхня виучка та дисципліна сяють, коли вони марширують в унісон і шикуються до бою, не зважаючи на жоден попередній довгий марш."
  port_cost_distance_from_capital_choice_mil: "Берегові патрулі"
  port_cost_distance_from_capital_choice_mil_desc: "Належне патрулювання всіх наших узбереж забезпечить відчутну присутність нашої адміністрації на всіх них, навіть на найвіддаленіших."
  protected_harbor_advance: "$protected_harbor$"
  protected_harbor_advance_desc: "$protected_harbor_desc$"
  a_bedouin_cavalry_advance: "$a_bedouin_cavalry$"
  a_bedouin_cavalry_advance_desc: "$a_bedouin_cavalry_desc$"
  repair_at_sea_aod: "Професійні екіпажі"
  repair_at_sea_aod_desc: "Хоча останні досягнення в морській майстерності розширюють межі мореплавства, нам потрібні їхні екіпажі, щоб повною мірою використовувати ці нові можливості. Лише їхня підготовка як постійних професійних моряків дозволить їм правильно виконувати всі завдання, необхідні для підтримки нових кораблів."
  repair_at_sea: "Берегове кілювання"
  repair_at_sea_desc: "Кораблі все більше часу проводять у плаванні, що стало можливим завдяки регулярному розвитку нових технічних досягнень. Це означає, що потрібен більш складний ремонт, і не завжди є доступний порт. Наші моряки повинні бути навчені процесу кілювання далеко від своєї бази операцій, використовуючи низький приплив на узбережжі на свою користь."
  repair_at_sea_aorev: "Парламентський крен"
  repair_at_sea_aorev_desc: "Цей вдосконалений процес кілювання виконується в прибережних глибоких водах, під час якого важкий вантаж розміщується на одному з бортів судна, щоб воно нахилилося. Це дозволяє екіпажу отримати доступ до іншого боку судна для його ремонту, не зупиняючись на узбережжі та не чекаючи відпливу, як при звичайному кілюванні."
  blast_furnace: "Доменна піч"
  blast_furnace_desc: "Дорожчий метод, ніж традиційна металургія, використання доменних печей дозволяє далі очищати чавун до ливарного чавуну, переплавляючи його з різними кількостями заліза, сталі, вапняку та деревного вугілля. Чавун, перетворений таким чином на коване залізо, є чудовим матеріалом для більш складних виробів, таких як гармати."
  saiger_process_discovery: "Удосконалений процес Зайгера"
  saiger_process_discovery_desc: "Покращені методи обробки та роботи дозволять процвітати нашим срібним та свинцевим копальням."
  slitting_mills: "Прокатні стани"
  slitting_mills_desc: "Це новий тип водяних млинів, розроблених для розрізання залізних брусків на прутки. Це дозволяє більш ефективно розробляти залізні інструменти та машини, оскільки дозволяє ливарникам використовувати прутки, які краще відповідають їхнім потребам, порівняно з більшими брусками, витрачаючи менше побічних продуктів у процесі кування."
  coke_blast_furnace: "Коксова доменна піч"
  coke_blast_furnace_desc: "Це новий тип доменної печі, який дозволяє використовувати кокс замість деревного вугілля як паливо. Він не тільки дешевший, але й дозволяє будувати більші печі, хоча має недолік у тому, що кокс містить більше домішок, ніж деревне вугілля, що є проблемою, яку ще належить вирішити."
  hot_blast_furnace: "Гаряча доменна піч"
  hot_blast_furnace_desc: "Проблеми, спричинені коксовими доменними печами, з чавуном з більшою кількістю домішок через використання коксу, призвели до розробки гарячого дуття. Це не тільки значно зменшує використання коксу, тим самим покращуючи якість заліза, але також дозволяє використовувати сире мінеральне вугілля як паливо, якщо воно доступне, що є великим кроком вперед у металургії заліза."
  new_currency_demands: "Нові вимоги до валюти"
  new_currency_demands_desc: "Відкриття нових земель також призвело до збільшення торговельних потоків. Це, своєю чергою, спричинило зростання попиту на монети, і хоча благородні металеві валюти, виготовлені з $goods_gold$ та $silver$, залишаються основними цінностями, інші менш цінні метали, такі як $copper$ та їхні сплави, побачили збільшення свого використання та обігу."
  powerful_statues: "Могутні статуї"
  powerful_statues_desc: "Процвітаюча країна є ознакою сильного правителя, але народ повірить у силу правителя лише тоді, коли йому це буде показано. З цією метою багато правителів замовляють різноманітні статуї самих себе, часто виготовлені з каменю або бронзи, щоб спроєктувати народу образ сили та могутності. Однак вони не завжди ефективні в цьому, і іноді вони лише призводять до переміщення великих обсягів матеріалів."
  renaissance_sculptures: "$renaissance$ Скульптури"
  renaissance_sculptures_desc: "Пробудження $renaissance$ принесло із собою більший інтерес до мистецтв у всіх формах. Здається, що нині ніхто нічого не вартий, якщо не має витвору мистецтва, що прикрашає його оселю. Скульптури є однією з найпоширеніших форм художнього вираження серед людей, і це спричинило появу та зростання багатьох каменоломень, щоб мати змогу постачати каміння багатьох різних типів тим, хто схильний до мистецтва."
  green_vitriol: "Зелений купорос"
  green_vitriol_desc: "Хоча технічно це не та сама речовина, що й $alum$, $green_vitriol$ традиційно згадувався в алхімічних працях нерозрізнено з $alum$, і обидва мають схожі властивості. Отже, нерідко один використовується як замінник іншого."
  shared_products_procedures: "Спільні продукти та процедури"
  shared_products_procedures_desc: "Світ став меншим, оскільки було зустрінуто багато нових земель і народів. З ними ми також увійшли в контакт з багатьма новими продуктами та способами їх використання. Навіть найбільш спеціалізовані товари, такі як $alum$, можуть бути використані іншими способами в інших місцях."
  ostentatious_clothing: "Пишний одяг"
  ostentatious_clothing_desc: "Це право та обов'язок правлячих класів демонструвати свою владу через свій зовнішній вигляд. Отже, вони носять все більш пишне вбрання, використовуючи новітні техніки для досягнення яскравих та розкішних кольорів і візерунків."
  riches_of_foreign_coasts: "Багатства чужоземних узбереж"
  riches_of_foreign_coasts_desc: "Далекі землі принесли нам багато ресурсів, але не лише самі землі багаті. Узбережжя та море також щедрі, і отримання знань від чужоземних ловців перлів дозволяє нашим також бути більш рясними у своїх уловах."
  foreign_mining_techniques: "Чужоземні техніки видобутку"
  foreign_mining_techniques_desc: "Дорогоцінне каміння цінувалося людством тисячоліттями по всьому світу. Вступаючи в контакт з чужоземними народами здалеку, ми можемо дізнатися не лише про типи $gems$, які вони цінують найбільше, але й про техніки, які вони використовують для їх отримання."
  windmills_advance: "$windmill$"
  windmills_advance_desc: "$windmill_desc$"
  local_smelters_advance: "$local_smelters$"
  local_smelters_advance_desc: "$local_smelters_desc$"
  corps_organisation: "Бойовий дух"
  corps_organisation_desc: "Традиційні армії покладалися на люту дисципліну для підтримання порядку в лавах, однак, звертаючись до гордості підрозділу, ми можемо досягти ще вищих рівнів дисципліни."
  open_sea_exploration: "Заморська розвідка"
  open_sea_exploration_desc: "Безкраї моря обіцяють нам великі багатства та нові можливості для торгівлі на далеких берегах."
  napoleonic_warfare: "Наполеонівська війна"
  napoleonic_warfare_desc: "Облоги є витратним та довготривалим заняттям для нашої армії. Замість того, щоб зосереджуватися на кожному укріпленні на нашому шляху, ми повинні повністю присвятити нашу тактику вирішальному удару, який виграє нам війну."
  march_to_the_sound_of_the_guns_advance: "$march_to_sound_of_guns$"
  march_to_the_sound_of_the_guns_advance_desc: "Зі стабільним зростанням нашої армії послаблення вимог до логістики стає важливішим, ніж будь-коли раніше. Наказ нашим генералам розосередити свої війська та підкріплювати поле бою, щойно почнуться бої, принесе нам велику користь."
  country_unification_advance: "Нагляд за суб'єктами"
  country_unification_advance_desc: "Чим раніше ми почнемо інтегрувати адміністрацію наших суб'єктів, щоб вона дотримувалася наших власних правил, тим легшою буде інтеграція інших питань. Створення постійного зв'язку з нашими суб'єктами значно полегшить цей процес."
  renaissance_urbanisation: "Ренесансне міське планування"
  renaissance_urbanisation_desc: "Врахування виділених зон для експлуатації ресурсів під час планування дозволить нашим міським центрам виробляти більше товарів, ніж раніше."
  renaissance_city_rights: "Формальні міські права"
  renaissance_city_rights_desc: "Встановлення того, що надання міських прав знаходиться лише в руках нашого правителя, дозволить нашій адміністрації мати дуже чіткий огляд стану нашої країни."
  absolutism_control_decline_advance: "Абсолютистська адміністрація"
  absolutism_control_decline_advance_desc: "Абсолютистські правителі готові демонструвати свою владу не лише при дворі, але й через адміністративний апарат, який може поширюватися по всій країні."
  construction_speed_renaissance: "Масонські гільдії"
  construction_speed_renaissance_desc: "Вільні муляри покладаються на ширші об'єднання, відомі як гільдії, щоб ділитися та зберігати свої знання та досвід, у системі, де досвідчені муляри навчають молодших учнів."
  construction_speed_discovery: "Стандартизовані дошки та цегла"
  construction_speed_discovery_desc: "Стандартизація виробництва дощок та цегли з використанням більш сучасних методів має на меті забезпечити легше та простіше будівництво."
  construction_speed_reformation: "Архітектурні трактати"
  construction_speed_reformation_desc: "Написання архітектурних трактатів, які часто узагальнюють багатовікові знання, дозволяє швидше навчатися та поширювати найефективніші будівельні техніки."
  construction_speed_absolutism: "Архітектурна інженерія"
  construction_speed_absolutism_desc: "Будівництво з часом стало більш витонченим, включаючи методи та техніки з широкого спектру дисциплін, що зазвичай вважається видом інженерії."
  construction_speed_revolutions: "Чавунні конструкції"
  construction_speed_revolutions_desc: "Розвиток більш досконалої металургії кованого та чавунного заліза дозволяє створювати більш складні металеві конструкції, такі як стовпи та колони, що значно прискорює будівництво."
  apothecary_advance: "$apothecary$"
  apothecary_advance_desc: "$apothecary_desc$"
  unlock_handgonners_advance: "$a_handgonners$"
  unlock_handgonners_advance_desc: "$a_handgonners_desc$"
  manufactories_advance: "Мануфактури"
  manufactories_advance_desc: "Нещодавні технологічні досягнення та механізація сприяли зростанню концентрованих виробничих потужностей у формі мануфактур. Завдяки їм покращена швидкість та кількість виробництва дозволяють отримувати більші вигоди."
  scientific_revolution_advance: "Наукова революція"
  scientific_revolution_advance_desc: "Нещодавні розробки в математиці, фізиці, астрономії, біології та хімії не лише кинули виклик, але й повністю змінили наш погляд на навколишній світ. Суспільство розвивається з більшою швидкістю, ніж будь-коли раніше, і щодня робляться нові наукові відкриття."
  military_revolution_advance: "Військова революція"
  military_revolution_advance_desc: "Війна ніколи не змінюється, але змінюється спосіб її ведення. Нещодавні розробки в озброєнні довели, що старі способи ведення бою застаріли, і армії пережили повну зміну парадигми. Адаптація до цих змін — єдиний спосіб залишатися сильною військовою державою."
  power_projection_advance_5: "Абсолютистські амбіції"
  power_projection_advance_5_desc: "Зі зростаючою централізацією державної влади ідея бути єдиним правителем усієї доступної території почала формуватися в умах майже всіх правителів світу. Уявляючи себе еквівалентом сонця, яке само по собі приносить світло всій землі, вони прагнуть мати абсолютну владу над усім."
  absolutist_court: "Абсолютистський двір"
  absolutist_court_desc: "Влада нещодавно була централізована в особі самого правителя по всьому світу. Решта двору є скоріше слугами правителів та підлеглими їхній владі, ніж автономними акторами. Це дозволяє правителям швидше та ефективніше втілювати свої бажання."
  government_size_absolutism: "Вірні підлеглі"
  government_size_absolutism_desc: "Концентрація влади в руках правителів дозволяє їм діяти більш безпосередньо, але їм все ще потрібні люди під ними, щоб виконувати ці дії. Однак, якщо ці підлеглі не мають реальної влади і вірні особі правителя, це дозволяє двору мати їх більше без страху міжусобиць чи невдоволення."
  naval_doctrines_advance: "Морські доктрини"
  naval_doctrines_advance_desc: "Морська війна зазнала багатьох змін в останні роки, кораблі та флоти стають більшими та більш спеціалізованими. Внаслідок цього різні країни починають використовувати різні тактики та доктрини, пристосовані до їхніх сильних сторін або особливого способу використання своїх флотів."
  global_supply_limit_modifier_advance_5: "Планування армійської логістики"
  global_supply_limit_modifier_advance_5_desc: "Марш будь-якої армії підтримується її логістикою. Завдяки належному вивченню та плануванню армії можуть витримувати довші та віддаленіші кампанії."
  rgo_size_advance_absolutism: "Фізіократія"
  rgo_size_advance_absolutism_desc: "Нещодавні розробки в економічній думці змістили фокус з попередніх меркантилістських ідей цінності в торгівлі на ідею, що цінність полягає в самому виробничому процесі. Таким чином, саме виробництво неухильно покращувалося та зростало."
  food_advance_absolutism: "Закриті поля"
  food_advance_absolutism_desc: "Донедавна володіння землею та її належне використання було більш-менш спільним та вільним. Однак, спостерігається зростаюча тенденція до початку процесу специфічного розмежування земель, чітко визначаючи межі та розмір полів, виключно призначених для сільського господарства. Завдяки цьому їх виробництво та експлуатація можуть бути значно збільшені."
  naval_morale_advance_5: "Постійні флоти"
  naval_morale_advance_5_desc: "Сучасна ситуація у світі та все зростання торгівлі та комерції по всьому світу вимагають використання постійних флотів для охорони інтересів різних країн. Наявність усталеного та постійно присутнього флоту дозволяє кораблям краще взаємодіяти між собою."
  new_world_advance: "Новий Світ"
  new_world_advance_desc: "Як каже флорентійський навігатор Амеріго Веспуччі, землі, відкриті Колумбом, — це не Індії, а, по суті, цілий Новий Світ, невідомий нашим предкам і який чекає на картографування та приєднання."
  colonial_charters: "Колоніальні хартії"
  colonial_charter_progress_tt_title: "Прогрес Колоніальної Хартії"
  colonial_charters_desc: "Ці нові документи забезпечать права наших співвітчизників, коли вони освоюватимуть неприборкані землі Нового Світу, нададуть колоніям виключне право керувати новими землями та регулюватимуть їхні стосунки з метрополією."
  plantation_buildings_advance: "Плантації"
  plantation_buildings_advance_desc: "М'який і сприятливий клімат та величезні й родючі землі Нового Світу роблять Колонії ідеальними місцями для виробництва дуже прибуткових культур, таких як цукор і тютюн."
  diplomatic_range_age_1: "Іноземні Посли"
  diplomatic_range_age_1_desc: "Дипломатія між країнами завжди була важливою. Однак вона зростає в інтенсивності та складності, і відправлення посланців все далі для розширення наших зовнішніх відносин стає все більш поширеним."
  diplomatic_range_age_2: "Дипломатична Мережа"
  diplomatic_range_age_2_desc: "Підтримуючи хорошу та усталену мережу дипломатів навколо нас, ми можемо використовувати її для відправлення посланців до ще віддаленіших країн."
  diplomatic_range_age_3: "Посольства"
  diplomatic_range_age_3_desc: "Поточна міжнародна ситуація вимагає, щоб ми створили постійні представництва для наших дипломатів у сусідніх країнах. Це єдиний спосіб забезпечити захист наших інтересів у нашому регіоні, поки ми розширюємо свій вплив за його межі."
  trade_envoys: "Торгові Посланці"
  trade_envoys_desc: "З нещодавнім зростанням торгівлі до та з далеких земель, наші посланці почали приєднуватися до торгових експедицій для встановлення дипломатичних контактів з країнами, які раніше були поза нашою досяжністю."
  diplomatic_range_age_5: "Дипломатичні Місії"
  diplomatic_range_age_5_desc: "Складність сучасної політики більше не є завданням для одного посланця. Щоб розширити наш вплив ще далі та захистити наші інтереси в тих далеких місцях, ми відправлятимемо цілі місії експертів-дипломатів до кожної країни."
  diplomatic_range_age_6: "Глобальні Посольства"
  diplomatic_range_age_6_desc: "Оскільки різні країни намагаються розширити свій вплив ще далі, світ став більш взаємопов'язаним, ніж будь-коли раніше. Лише створення постійних посольств по всьому світу може дозволити цій взаємопов'язаності підтримувати себе."
  new_world_crops: "Культури Нового Світу"
  new_world_crops_desc: "Щедрі землі Нового Світу надали нашій країні багато скарбів, одним з найбільших є відкриття дивних та екзотичних рослин, вирощуваних тубільцями тих земель як їжа та спеції. Запровадження цих культур на наших полях забезпечить наше населення різноманітністю та новизною, яких вони прагнуть."
  rgo_size_advance_discovery: "Передові Методи Видобутку"
  rgo_size_advance_discovery_desc: "Різноманітні відкриття мінералів та винаходи нових інструментів проклали шлях до більш ефективного збору ресурсів та прискорення виробничих ліній."
  printing_press_advance: "Друкарський Верстат"
  printing_press_advance_desc: "Популяризація друкарських технік протягом поточного століття проклала шлях до поширення знань, а також до легшого обміну інформацією шляхом прискорення копіювання важливих рукописів."
  gov_reform_discovery_a: "Рання Адміністративна Реформація"
  gov_reform_discovery_a_desc: "Наш народ стоїть на порозі нової ери. Щоб використати наші внутрішні можливості, ми повинні адаптувати наш уряд та вдосконалити нашу адміністративну сферу."
  government_size_discovery: "Рання Адміністративна Спроможність"
  government_size_discovery_desc: "Наш домен складається з багатьох адміністративних секторів, і в міру його розширення ми повинні внести необхідні корективи в наш уряд, щоб врахувати це зростання."
  power_projection_advance_4: "Домінуючий зовнішній вплив"
  power_projection_advance_4_desc: "Наша присутність за дипломатичними столами створює атмосферу величі та престижу. Наш голос та вплив будуть почуті всіма, з ким ми взаємодіємо."
  regulate_court_procedures: "Регулювати судові процедури"
  regulate_court_procedures_desc: "Застосовуючи суворий регламент та рутину до наших судових процедур, ми зможемо зменшити будь-які потенційні надмірні витрати та керувати ощадливим та ефективним двором."
  pike_and_shot_advance: "Піка та мушкет"
  pike_and_shot_advance_desc: "Почав розвиватися новий тип ведення війни, із узагальненням пікінерів, що формують каре, тоді як аркебузири розходяться по боках та спереду, і шукають укриття за або всередині каре, якщо формування вступає в ближній бій."
  lazaretto_advance: "$lazaretto$"
  lazaretto_advance_desc: "$lazaretto_desc$"
  pest_house_advance: "$pest_house$"
  pest_house_advance_desc: "$pest_house_desc$"
  naval_morale_advance_2: "Навігаційні техніки"
  naval_morale_advance_2_desc: "Наші моряки звикають до довших подорожей, використовуючи новий набір технік та інструментів, таких як сухі компаси, що покращують їхню майстерність навігації."
  confessionalism_advance: "Конфесіоналізм"
  confessionalism_advance_desc: "Зі зростанням безлічі різних інтерпретацій того, якою має бути Віра, зростає інтерес як релігійних, так і світських влад до чіткого визначення форм їхніх специфічних конфесій, нав'язуючи свої особливі правила та погляди на всі аспекти віри та життя."
  global_trade_advance: "Глобальна торгівля"
  global_trade_advance_desc: "Товари переміщувалися між континентами з давніх часів, але вся торгівля тепер все більше стає частиною більшої світової мережі. Можливо, ще рано говорити про справді Глобальну Економіку, але, безперечно, перші зерна вже посіяні."
  artillery_institution_advance: "Облогова артилерія"
  artillery_institution_advance_desc: "Винахід пороху в Китаї династії Сун призвів до розробки нового пристрою, який використовував би свою вогневу міць у війні, — артилерії. Її використання тепер становить загрозу для кам'яних замків та укріплень."
  gov_reform_reformation_a: "Принц"
  gov_reform_reformation_a_desc: "Нові часи визначають, що правителям потрібен інший підхід для більш систематичного управління Державою, враховуючи як різні стани країни, так і різних дипломатичних акторів, що їх оточують."
  power_projection_advance_3: "Регіональні амбіції"
  power_projection_advance_3_desc: "Здатність країни проєктувати свою владу має життєво важливе значення для того, щоб бути актуальною на Регіональній Арені. Навчаючись у інших, минулих і сучасних, ми можемо зробити нашу країну відомою всюди і використовувати цю позицію для здійснення влади."
  confessional_court: "Конфесійний двір"
  confessional_court_desc: "Витрати двору можуть легко вийти з-під контролю та збанкрутувати найбагатшу країну. Щоб досягти хорошого балансу між розкішшю та розумними витратами, ми можемо застосувати невеликі хитрощі, які зменшують ці витрати, не зменшуючи пишності нашого двору."
  rgo_size_advance_reformation: "Прядильні колеса"
  rgo_size_advance_reformation_desc: "У міру того, як ми опановуємо нові та кращі методи видобутку ресурсів, наше виробництво може стрімко зрости, збагачуючи нас у процесі."
  food_advance_reformation: "Ринкове сільське господарство"
  food_advance_reformation_desc: "Новіші та кращі культури можуть бути впроваджені на наших полях для підвищення продуктивності. Чи то шляхом відбору кращих сортів, чи то заміною їх іноземними продуктами, ми можемо легко значно збільшити наше виробництво продовольства."
  scientific_experimentation: "Наукові експерименти"
  scientific_experimentation_desc: "Усьому є причина. Збагнувши причину всього, ми можемо дізнатися, чого очікувати, коли виникнуть подібні ситуації."
  banking_advance: "Банківська справа"
  banking_advance_desc: "Позичання грошей старе як світ, але не позбавлене ризиків. Ми можемо інституціоналізувати ці практики і забезпечити позичання грошей за контрольованих та справедливих умов."
  trade_companies_advance: "Торгові компанії"
  trade_companies_advance_desc: "Завжди було зрозуміло, що гроші рухають світом. З огляду на те, що ще більше товарів знаходять у далеких землях, торгові компанії, що спеціалізуються на їх експлуатації та розповсюдженні, неодмінно принесуть великі прибутки."
  naval_morale_advance_3: "Заморські експедиції"
  naval_morale_advance_3_desc: "Недавнє поширення далекобійної заморської торгівлі привчило наших моряків перебувати в морі протягом тривалих періодів часу, роблячи їх стійкими до її несприятливих наслідків."
  road_advance_1: "Дорожня мережа"
  road_advance_1_desc: "Важливість торгівлі та комерції стає все більш актуальною, як і створення більш розвинених та складних дорожніх мереж для полегшення та збільшення пересування людей та товарів."
  power_projection_advance_2: "Наднаціональні амбіції"
  power_projection_advance_2_desc: "Хоча старі ідеї про створення імперій все ще присутні в умах правителів цієї Епохи, вони також почали кристалізувати нові способи встановлення свого панування над іншими країнами та народами."
  renaissance_advance: "Відродження"
  renaissance_advance_desc: "Хвилі інноваційної думки та відкриттів, що пронизують наше царство, повинні бути використані та застосовані, якщо ми хочемо залишатися на передовій технологічних інновацій."
  professional_armies_advance: "Професійні армії"
  professional_armies_advance_desc: "Модернізація наших армій значною мірою залежить від підтримки наших центрів набору та організації. Ми повинні прагнути зберегти чітку та надійну військову організацію, скорочуючи марнотратство та надмірності."
  gunpowder_advance: "Порох"
  gunpowder_advance_desc: "Використання пороху на полі бою безумовно матиме позитивний вплив на нашу ефективність і дозволить нам досягти успіху у військових зіткненнях."
  drill_army_advance: "Муштра армії"
  drill_army_advance_desc: "Ми більше не будемо покладатися на непідготовлених та мобілізованих чоловіків. Якщо ми хочемо захистити наші кордони та розгромити наших суперників, ми повинні проводити регулярні та організовані муштри."
  renaissance_development: "Наукові трактати"
  renaissance_development_desc: "Ера думки, мистецтв та науки принесе нові хвилі відкриттів та винаходів, дозволяючи нам покращити засвоєння іноземних інституцій."
  art_school_advance: "Мистецькі школи"
  art_school_advance_desc: "Відданість мистецькій справі та вдосконалення наших митців повинні належним чином культивуватися будівництвом мистецьких шкіл. Форум для обдарованих особистостей, щоб розпочати свою кар'єру та принести славу й пишність нашому імені!"
  pound_lock_canals_advance: "Шлюзові канали"
  pound_lock_canals_advance_desc: "Прокладання каналів у земній тверді задля запровадження достатку, доступу до їжі та кращого обігу товарів є відомим починанням для нашого народу. Винахід особливих воріт, названих 'Створчастими воротами', допоможе забезпечити необхідне для зростання та процвітання нашого народу."
  a_renaissance_janissaries_advance: "$a_renaissance_janissaries$"
  a_renaissance_janissaries_advance_desc: "$a_renaissance_janissaries_desc$"
  a_discovery_janissaries_advance: "$a_discovery_janissaries$"
  a_discovery_janissaries_advance_desc: "$a_discovery_janissaries_desc$"
  a_reformation_janissaries_advance: "$a_reformation_janissaries$"
  a_reformation_janissaries_advance_desc: "$a_reformation_janissaries_desc$"
  a_absolutism_janissaries_advance: "$a_absolutism_janissaries$"
  a_absolutism_janissaries_advance_desc: "$a_absolutism_janissaries_desc$"
  a_revolutions_janissaries_advance: "$a_revolutions_janissaries$"
  a_revolutions_janissaries_advance_desc: "$a_revolutions_janissaries_desc$"
  nomadic_legacy: "Кочова спадщина"
  nomadic_legacy_desc: "Наш народ народжений у сідлі, вільний мандрувати світом без потреби пускати коріння."
  siberian_frontier: "Сибірська межа"
  siberian_frontier_desc: "Далекі пустки Сибіру кличуть нас. Ми повинні прокласти шлях і дозволити нашим козакам рушити вперед і здобути землю для руського народу."
  ostrog_advance: "$ostrog$"
  ostrog_advance_desc: "$ostrog_desc$"
  janissaries_advance: "Яничари"
  janissaries_advance_desc: "Яничари — це еліта наших армій, навчені з дитинства і викувані дисципліною."
  slave_raiding_wars: "Війни за рабів"
  slave_raiding_wars_desc: "Раби є наріжним каменем нашої економіки. Напади та набіги на наших сусідів, щоб захопити їхнє населення та поневолити його, є, таким чином, повітрям, що підтримує життя нашої країни."
  trade_caravans: "Торгові каравани"
  trade_caravans_desc: "Прибуткові торгові шляхи перетинали наші території з давніх-давен. Наш народ звик взаємодіяти з довгими караванами купців, що торгують товарами з далеких земель."
  the_sahel_trade: "Сахельська торгівля"
  the_sahel_trade_desc: "Каравани торгували між Сахелем і Середземномор'ям протягом століть, і вигоди від такої торгівлі значно переважували небезпеки перетину розпечених пісків Сахари."
  rudimentary_coastal_ship_repair: "Імпровізований ремонт"
  rudimentary_coastal_ship_repair_desc: "Неминуче, що кораблі псуються під час плавання. Удари хвиль і вплив солоної води накопичуються з часом і пошкоджують як корпус, так і канати, незалежно від того, наскільки добре побудоване судно. Щоб полегшити це, моряки звикли регулярно проводити технічне обслуговування свого корабля, щоб підтримувати його в ідеальному стані, а при отриманні більш значних пошкоджень навіть бути в змозі утримувати його на плаву, доки вони не досягнуть безпечної гавані."
  religious_icon_power_advance: "Релігійні ікони"
  religious_icon_power_advance_desc: "Ікони є фізичним втіленням нашої віри, священними зображеннями святих постатей, покликаними викликати благоговіння та відданість у тих, хто їх споглядає."
  scientific_mapping_advance: "Картографічне відображення"
  scientific_mapping_advance_desc: "Недавні вдосконалення в галузях і науках географічних знань, картографії та картографування дозволяють створювати більш точні зображення суші та природних об'єктів, як з точки зору їх відносних розмірів, так і їх точного розташування."
  integrate_area_advance: "Краща інтеграція"
  integrate_area_advance_desc: "Наша адміністрація вдосконалюється, і тому ми можемо дозволити собі робочу силу для одночасної інтеграції більших ділянок землі в країну."
  maritime_advance_age_2: "Торгові флоти"
  maritime_advance_age_2_desc: "Зі зростанням торгівлі зростає і потреба швидше та ефективніше транспортувати більші обсяги товарів. Таким чином, ті, хто інвестує в морську торгівлю, не шкодуватимуть коштів, щоб отримати найбільший флот, який вони можуть собі дозволити."
  maritime_advance_age_3: "Дослідницькі флоти"
  maritime_advance_age_3_desc: "Зі поширенням знань про світ і нові землі зростає і потреба знати про них ще більше. Від далеких морів на сході до нових узбереж на заході, хвилі для плавання збільшилися, а отже, зросла і потреба у більшому флоті для плавання ними."
  maritime_advance_age_4: "Глобальні флоти"
  maritime_advance_age_4_desc: "З недавніми відкриттями по всьому світу за останні століття, здається, що світ став меншим, а не більшим. Країни, які досі не мали контактів, натомість вступають у постійні дипломатичні та комерційні відносини. Як наслідок, потрібні більші та кращі флоти, щоб підтримувати всі ці заморські зв'язки."
  maritime_advance_age_5: "Конвої"
  maritime_advance_age_5_desc: "З розширенням морської торгівлі, перевезенням товарів з далеких земель і у більшій кількості, зростає потреба у більш постійному потоці. Організація конвойних торгових флотів забезпечує стабільну циркуляцію торгових суден."
  maritime_advance_age_6: "Озброєні конвої"
  maritime_advance_age_6_desc: "Торгові конвої, очевидно, є дуже привабливою мішенню для будь-якого пірата. Кораблі, повні товарів і монет, є здобиччю, яку мало хто пропустить. Таким чином, забезпечення цих торгових конвоїв оборонним озброєнням для відлякування таких нападів є життєво важливим. Супровід торгових флотів фрегатами або будь-якими іншими озброєними суднами забезпечує їх безпеку."
  coastal_trade_routes_advance: "Прибережна експансія"
  coastal_trade_routes_advance_desc: "Найбезпечніший спосіб для будь-якого корабля плисти – це робити це близько до узбережжя. Якщо їм не потрібно перетинати море, немає реальної потреби відпливати від узбережжя і втрачати його захист, і це все ще швидше, ніж подорожувати суходолом. Таким чином, сприяння постійному потоку кораблів уздовж наших узбереж дозволить легше циркулювати товарам і людям."
  exploration_maintenance_advance: "Міцна конструкція"
  exploration_maintenance_advance_desc: "Ключовим фактором при будівництві корабля є його здатність протистояти негоді та ударам хвиль. Розробляючи міцніші методи суднобудування, ми можемо забезпечити, щоб наші судна могли плавати довше."
  global_trade_routes_advance: "Заморські торгові шляхи"
  global_trade_routes_advance_desc: "Оскільки світ став більшим завдяки новим відкриттям, він також став меншим завдяки новим і частішим торговим шляхам. Оскільки кораблі постійно доставляють товари та людей до далеких земель і назад, ці землі здаються насправді ближчими, ніж раніше."
  safe_exploration_techniques_advance: "Накопичені знання"
  safe_exploration_techniques_advance_desc: "Йти в невідоме завжди страшно, але нині мало місць, які є справді невідомими. Хоча багато місць у світі ще не повністю досліджені, вони, тим не менш, вже відомі, і є достатньо інформації про те, як туди дістатися. Спираючись на знання людей, які були до нас, ми можемо вирушати на незвідані території, як ніколи раніше."
  imperial_ambitions: "Імперські амбіції"
  imperial_ambitions_desc: "Не секрет, що великі імперії минулого є джерелом натхнення для епосів і поем, на них завжди дивляться з благоговінням і захопленням. Якщо ми хочемо викликати таку ж реакцію до нашої власної країни, ми повинні прагнути до тієї ж величі."
  letters_of_marque: "Каперські свідоцтва"
  letters_of_marque_desc: "Піратство – жахливий вчинок. Нікчемні злодії, які прагнуть нажитися на стражданнях інших. Однак дозвіл кораблям нападати на наших ворогів – це зовсім інша справа."
  sturdy_privateers: "Міцні капери"
  sturdy_privateers_desc: "Капери завжди перебувають під обстрілом. Якщо ми хочемо використовувати їх на повну, ми не можемо дозволити їм потонути після перших залпів гармат. Довгостроковою перевагою буде те, що вони плаватимуть на міцних кораблях."
  rgo_build_time_advance: "Будівельні методи Відродження"
  rgo_build_time_advance_desc: "Великі будівлі та інфраструктурні проєкти минулого досі гордо стоять. Безперечно, будівельні техніки, використані для їх проєктування та зведення, були витонченими та добре розвиненими. Ми ще багато чого можемо навчитися, вивчаючи їх."
  arts_academy_advance: "$arts_academy$"
  arts_academy_advance_desc: "Мистецтво – це життєвий подих людства, і те, що перетворює світ з безбарвного існування на яскраве полотно, повне чудес і можливостей. Ми повинні сприяти більшій художній цікавості серед нашого народу."
  metallurgy: "Металургія"
  metallurgy_desc: "Мистецтво металургії, або здатність маніпулювати та працювати з різними металами, є одним з ключових факторів, що виправдовують розвиток будь-якої передової цивілізації. Будучи набагато перевершуючими за своїми можливостями порівняно з простішим каменем, металеві інструменти та зброя дозволяють мати більш ефективних робітників та війська."
  supply_depot_advance_age_2_renaissance: "Складські депо"
  supply_depot_advance_age_2_renaissance_desc: "Жодна армія не може вижити без припасів. Створення постійних складських депо, призначених для їх забезпечення, дозволяє безперервно постачати лінії постачання, підтримуючи наші армії завжди на піку їхньої продуктивності."
  supply_depot_advance_age_3_discovery: "Армійські депо"
  supply_depot_advance_age_3_discovery_desc: "Розвиток і розгортання постійних армій збільшили попит на озброєння, уніформу та інші військові припаси, які необхідно зберігати поблизу них."
  supply_depot_advance_age_4_reformation: "Складські депо боєприпасів"
  supply_depot_advance_age_4_reformation_desc: "Загальне розгортання артилерії як на полях битв, так і під час облог створило попит на боєприпаси та порох для їх обслуговування, збільшивши важливість депо для їх зберігання."
  supply_depot_advance_age_5_absolutism: "Передові депо"
  supply_depot_advance_age_5_absolutism_desc: "Армії тепер можуть діяти глибше і довше на ворожій території, що робить необхідним створення та утримання передових депо ближче до них, при цьому пов'язаних з тиловими лініями постачання."
  supply_depot_advance_age_6_revolutions: "Польові склади"
  supply_depot_advance_age_6_revolutions_desc: "Діяльність численних армій у тривалих кампаніях створила додаткове навантаження на наші системи постачання, роблячи більші та швидко створювані склади ще важливішими для їхнього забезпечення."
  army_country_looting_advance: "Горді нальотчики"
  army_country_looting_advance_desc: "Набіги та грабунки є майже основою самозабезпечення нашої армії. Куди б не йшли наші війська, вони грабують стільки, скільки можуть."
  minting_income_factor_building: "Валютний суверенітет"
  minting_income_factor_building_desc: "Існує багато видів валют, але та, що носить нашу печатку, засвідчила свою прийнятність та визнання і здобула довіру народу."
  artillery_vs_fort_age_5_absolutism: "Облогові гармати"
  artillery_vs_fort_age_5_absolutism_desc: "Порох дозволяє створювати безліч різних видів зброї. Прорив ліній піхоти не вимагає тієї ж потужності, що й руйнування замкових стін, тому для облог необхідно використовувати спеціалізований тип гармат."
  artists_advance_absolutism: "Мистецькі течії"
  artists_advance_absolutism_desc: "Мистецтво завжди мало безліч способів вираження, але останні досягнення дозволили йому розвинутися ще далі в безліч проявів."
  subject_loyalty_absolutism: "Абсолютна вірність"
  subject_loyalty_absolutism_desc: "Ми не терпимо жодного інакомислення чи повстання серед власного народу, чому ми повинні дозволяти це серед наших підданих?"
  improve_relation_impact_absolutism: "Постійне Міністерство закордонних справ"
  improve_relation_impact_absolutism_desc: "Постійно зростаюча дипломатична сила нашої країни вимагала від нас створення постійного Міністерства закордонних справ для управління та координації наших численних посланців та їхніх зусиль."
  hand_cannon_guild_advance: "$hand_cannon_guild$"
  hand_cannon_guild_advance_desc: "Це були примітивні металеві труби, які не могли зрівнятися з пізнішими, більш досконалими гарматами. Вперше розроблена в Китаї, рання ручна гармата поширилася до Кореї та Японії у 1270 році."
  subjects_advance: "Підвладні нації"
  subjects_advance_desc: "Делегування місцевого самоврядування підданим під нашим прапором є прийнятним способом утримати їхній народ від повстань, водночас видобуваючи з них цінну данину."
  slave_center_advance: "$slave_center$"
  slave_center_advance_desc: "Належне управління підневільною працею в нашому володінні є обов'язковим для подальшого процвітання нашого народу."
  war_score_absolutism_advance: "Агресивні вимоги"
  war_score_absolutism_advance_desc: "Могутність держави безпосередньо пов'язана з її військовим потенціалом. Як виявилося, чим більше населення має країна, тим величнішою може стати армія. Наша дипломатія повинна застосовувати агресивний підхід, щоб анексувати якомога більше земель у мирних договорах для подальшого розвитку нашої переваги над сусідами."
  spy_construction_absolutism: "Розширити глобальні шпигунські мережі"
  spy_construction_absolutism_desc: "З постійно зростаючими імперіями та інституціями світу ми повинні підтримувати наші шпигунські зусилля, щоб не відставати від наших суперників."
  absolutism_agressive_advance: "Держава понад усе"
  absolutism_agressive_advance_desc: "У часи, коли регіони консолідуються, а ресурси стають більш обмеженими, держава має право проводити агресивну політику для задоволення матеріальних потреб свого народу та розширення своєї могутності. І хоча війни слід розглядати як останній акт дипломатії, це все ж таки дипломатична гра, оскільки держава стоїть вище людських обмежень, таких як мораль і закони."
  relations_absolutism_advance: "Складна політика"
  relations_absolutism_advance_desc: "Оскільки світ навколо нас змінюється, щоб пристосуватися до ширшого масштабу справді глобального театру, так само й наші дипломатичні зусилля повинні відповідати цій постійно зростаючій потребі в безпеці від зовнішніх загроз."
  correct_box_advance_absolutism: "Гнучкі бойові порядки"
  correct_box_advance_absolutism_desc: "Розроблено нові тактики, що забезпечують більш гнучку та скоординовану взаємодію піхотних, кавалерійських та артилерійських підрозділів на полі бою, зазвичай згрупованих у бригади."
  anti_piracy_warfare: "Купецькі конвої"
  anti_piracy_warfare_desc: "Зростання кількості безжальних і беззаконних буканьєрів у Новому Світі та на морських шляхах, що ведуть до нього, сильно впливає на наших купців та нашу торгівлю. Відтепер наші торгові судна формуватимуть конвої, щоб їх було легше захищати супроводжуючим військовим кораблем, і матимуть на борту невеликий контингент військових для забезпечення їхнього захисту у відкритому морі."
  trade_range_advance_age_3: "Покращені торгові судна"
  trade_range_advance_age_3_desc: "З розробкою більших кораблів, які використовують менші екіпажі та можуть плавати довше без зупинок, діапазон наших торгових зусиль значно збільшиться."
  trade_range_advance_age_2: "Віддалені ринки"
  trade_range_advance_age_2_desc: "Зі зростанням економіки з'являються нові можливості. Якщо раніше короткі маршрути були дуже прибутковими, то тепер довші маршрути приносять більше грошей. Наші торгові судна тепер пливуть далі в пошуках найкращих пропозицій."
  overseas_trade: "Заморська торгівля"
  overseas_trade_desc: "Коли новини про далекі землі досягають нашої нації, наші купці шукають нові ринки, що демонструють свої багатства, як стиглі фрукти, що чекають на збір."
  ship_building_techniques_absolutism: "Мокрий док"
  ship_building_techniques_absolutism_desc: "Розробка мокрого або плавучого доку дозволить нашим кораблебудівникам будувати кораблі набагато швидше, ніж раніше."
  ship_building_techniques_discovery: "Покращене кораблебудування"
  ship_building_techniques_discovery_desc: "Нові будівельні техніки для наших кораблів допоможуть нам створювати їх швидше."
  spy_construction_discovery: "Покращена шпигунська організація"
  spy_construction_discovery_desc: "Наймаючи надійних осіб як інформаторів та розміщуючи їх на посадах, де обмінюються інформацією, ми можемо покращити наші можливості збору інформації про наших ворогів та їхню діяльність."
  diplomatic_training: "Дипломатична підготовка"
  diplomatic_training_desc: "Дипломатичний посібник у нашому дворі було вдосконалено, що призвело до додавання чудових дипломатів до нашого оточення у спробі посилити наші зовнішні зусилля."
  formalized_relations: "Формалізовані відносини"
  formalized_relations_desc: "Встановлення формальних відносин із сусідніми країнами, що становлять інтерес, є життєво важливим, якщо ми хочемо підтримувати баланс сил та просувати наші інтереси."
  artists_advance_discovery: "Художні гравюри"
  artists_advance_discovery_desc: "Широке використання друкарського верстата відкриє нові можливості для наших людей ділитися своїми художніми навичками далі та швидше, ніж будь-коли раніше."
  improved_book_binding: "Покращене книгоплетіння"
  improved_book_binding_desc: "Зростання думки та знань має бути підкріплене стабільним постачанням книг, якщо ми хочемо процвітати та розвивати наш народ."
  lumber_improvements_discovery: "Присвячене лісівництво"
  lumber_improvements_discovery_desc: "Виділивши частини наших земель для посадки та вирощування міцних дерев, ми можемо збільшити якість та кількість наших лісопильних заводів."
  lumber_improvements_reformation: "Покращені пильні полотна"
  lumber_improvements_reformation_desc: "Завдяки досягненням у виготовленні інструментів, леза наших пилок міцніші, ніж будь-коли раніше, і вимагають менше обслуговування. Це забезпечить стабільне постачання деревини, необхідне нашій економіці."
  lumber_improvements_absolutism: "Вітряні лісопильні заводи"
  lumber_improvements_absolutism_desc: "З будівництвом вітряних млинів для живлення наших лісопильних заводів ми зможемо переробляти нашу деревину на дошки швидше, ніж будь-коли раніше."
  coal_improvements_absolutism: "Покращене коксування"
  coal_improvements_absolutism_desc: "Оптимізувавши процес очищення нашого видобутого вугілля, ми зможемо використовувати його ефективніше як паливо і без побічних ефектів, що впливають на інші продукти."
  coal_improvements_revolutions: "Покращені вугільні печі"
  coal_improvements_revolutions_desc: "Для виробництва коксу, життєво важливої частини нашої обробки заліза, нам потрібна велика кількість вугільних печей. Завдяки покращенню їхньої конструкції та використанню цегли ми зможемо підвищити якість виробленого коксу."
  correct_box_advance_discovery: "Лейтенанти"
  correct_box_advance_discovery_desc: "Зі зростанням професійних армій їхні офіцери очолюють дедалі більші формування. Щоб допомогти їм, лейтенанти беруть на себе передачу їхніх наказів та керівництво меншими підрозділами на полях битв."
  artists_advance_reformations: "Розвиток світського мистецтва"
  artists_advance_reformations_desc: "З розвитком нових мистецьких напрямків після Реформації людям стає легше отримати визнання у своїй галузі та знайти роботу при дворах світу."
  war_score_reformations_advance: "Божественне право на завоювання"
  war_score_reformations_advance_desc: "Наша перемога на полі бою – це більше, ніж просто вдале виконання бойових планів та військових стратегій. Це божественне втручання на нашу користь. Таким чином, право завойовувати та анексувати нові території, за які ми пролили кров, є продовженням божественної волі до нашого успіху."
  reformation_subject_opinions_advance: "Економічне верховенство"
  reformation_subject_opinions_advance_desc: "Договір, що визначає сюзеренітет над іншою державою, охоплює багато різних аспектів. Одним з таких є внутрішні торговельні зобов'язання суб'єкта перед своїм сюзереном, і оскільки глобальна торгівля стає все більш помітною, стає все важливіше їх подальше розширення."
  spy_construction_reformation: "Передова криптографія"
  spy_construction_reformation_desc: "Якщо ми хочемо збирати розвідувальні дані про наших ворогів, важливо обманути їх, створивши хибне відчуття безпеки. Тільки тоді ми зможемо зібрати детальну та правильну інформацію про їхні плани та завдати їм удару."
  subject_income_reformation_advance: "Зовнішні владні структури"
  subject_income_reformation_advance_desc: "Ланцюг командування між нами та нашими підданими – це чітка лінія, яка визначає їхні обов'язки перед нами. Посилення цих контрактів та забезпечення своєчасної оплати, безсумнівно, призведе до здорової скарбниці з нашого боку."
  correct_box_advance_reformation: "Полковий устрій"
  correct_box_advance_reformation_desc: "Професійні армії уможливили створення нового типу підрозділів – полку, який є не лише постійним місцем призначення для солдатів, але й корисною бойовою формацією."
  recruitment_improvements_reformation: "Рекрутські контори"
  recruitment_improvements_reformation_desc: "Щоб наша країна могла зібрати грізну армію, обов'язково потрібно покращити наші зусилля з набору. Збільшивши зусилля, витрачені на рекрутські центри, ми швидше залучимо працездатних людей."
  mercenaries_reformation_advance: "Забезпечити оплату найманцям"
  mercenaries_reformation_advance_desc: "Добре відомо, що найманці працюють лише за адекватну плату. Обіцяючи справедливу зарплату та частку здобичі, ми можемо міцніше прив'язати їх до себе та забезпечити більші компанії для роботи на нас."
  renaissance_subject_opinions_advance: "Культурне верховенство"
  renaissance_subject_opinions_advance_desc: "Останніми роками поширилися питання культури та ідей, заснованих на важливості людства та природи. Це стосується не лише нашого народу, а й тих, хто присягнув нам на вірність, що робить це новим дипломатичним інструментом."
  spy_construction_renaissance: "Шпигунські мережі"
  spy_construction_renaissance_desc: "Шпигуни широко використовувалися з давніх часів імперіями, щоб отримувати інформацію про свої внутрішні та зовнішні загрози. Монголи довели це до майстерності, оскільки вони використовували шпигунство для підготовки та забезпечення успіху своїх військових кампаній."
  recruitment_improvements_renaissance: "Організований набір"
  recruitment_improvements_renaissance_desc: "Розвиток професійних армій спричинив зростання військових можливостей. Щоб підтримувати це, державі також потрібно буде покращити свою спроможність набирати солдатів."
  correct_box_advance_renaissance: "Призначені офіцери"
  correct_box_advance_renaissance_desc: "Розвиток професійних армій призвів до призначення постійних офіцерів, які очолюють їхні підрозділи, – посади, наданої прямим наказом правителя."
  improve_relation_impact_renaissance: "Екзотичні дипломатичні подарунки"
  improve_relation_impact_renaissance_desc: "Дипломатичні подарунки були постійною практикою з давніх часів, щоб переконати іноземних правителів у певній справі, підкреслюючи їхній високий статус. Подарунки могли варіюватися від різних розкішних предметів до живих тварин, таких як жирафи чи слони."
  late_feudal_relations: "Пізні феодальні відносини"
  late_feudal_relations_desc: "Феодалізм ґрунтується на концепціях #italic auxilium#! та #italic consilium#!, що надавалися різними рангами знаті своїм відповідним лордам, створюючи ієрархію, яка значно розвинулася протягом століть."
  artists_advance_revolutions: "Просвітницьке мистецтво"
  artists_advance_revolutions_desc: "Зі зростанням Просвітництва мистецтво процвітає в усіх його галузях та на всіх рівнях суспільства. Нові публікації музики та літератури викликають широкий інтерес до цих мистецтв."
  revolutions_subject_opinions_advance: "Доброзичливе верховенство"
  revolutions_subject_opinions_advance_desc: "Вогні Революції – це загроза, з якою не варто жартувати. Якщо ми хочемо забезпечити лояльність наших підданих, ми повинні задушити ідеї повстання в їхній колисці на ранній стадії, призначаючи лояльних губернаторів та усуваючи будь-які причини для заворушень."
  war_score_revolutions_advance: "Аргументи розуму"
  war_score_revolutions_advance_desc: "Війни – це завжди потворна справа, яка приносить страждання обом сторонам. Наголошення на цих фактах та звернення до логіки та розуму іншої сторони принесе нам значну перевагу, коли ми будемо обговорювати неминучі зміни кордонів."
  spy_construction_revolutions: "Контакти з дисидентами"
  spy_construction_revolutions_desc: "З поширенням нових ідей та політичних систем у нашому усталеному світі нам потрібно буде виділити ресурси для підтримки цих дисидентів у країнах наших суперників та отримання цінної інформації."
  revolutions_agressive_advance: "Виправдані конфлікти"
  revolutions_agressive_advance_desc: "Міжнародна дипломатична арена процвітає завдяки балансу сил між націями. Таким чином, агресивні війни засуджуються і, якщо їх виграти, можуть призвести до формування коаліцій, що об'єднуються проти переможця.\nОднак, завдяки вмілому використанню дипломатії та інтерпретацій, ми можемо представити наших ворогів як агресорів проти нас, роблячи нашу війну та наші здобутки більш ніж виправданими в очах громадськості."
  subject_income_revolutions_advance: "Оплачений суверенітет"
  subject_income_revolutions_advance_desc: "Поки світ навколо нас зазнає величезних змін у всіх секторах, зараз, як ніколи раніше, ми можемо використовувати платіжні контракти від наших підданих в обмін на підтримку їхнього подальшого існування."
  artillery_vs_fort_age_6_revolutions: "Удосконалені гаубиці"
  artillery_vs_fort_age_6_revolutions_desc: "Потреба в кращій зброї, яка б знаходилася між прямим вогнем облогових гармат та непрямим, з вищою траєкторією мінометів, змусила наших військових розробити нові гаубиці, що задовольняють цю потребу."
  recruitment_improvements_revolutions: "Масштабний набір"
  recruitment_improvements_revolutions_desc: "З загрозою конфліктів, що охоплюють набагато ширшу територію, ніж будь-коли раніше, нам потрібно відповідно розширити нашу систему набору. Завдяки винагородженню добровольців, які вступають до армії, та примушенню злочинців до служби ми зможемо набагато швидше реагувати на будь-яку небезпеку."
  correct_box_advance_revolutions: "Генеральний штаб"
  correct_box_advance_revolutions_desc: "Зростання армій та їх розгортання у тривалих кампаніях створило необхідність призначення постійних офіцерів для планування та логістичних обов'язків, ефективно координуючи різні армійські корпуси на полі бою."
  urbanization: "Урбанізація"
  urbanization_desc: "Нові можливості та безпека, які пропонують міста, що розвиваються, нашому населенню, приваблюють все більше людей з сільськогосподарських угідь у сільській місцевості до промислових робочих місць, створених новими та сучасними фабриками."
  advanced_anti_piracy_warfare: "Відмова від каперства"
  advanced_anti_piracy_warfare_desc: "У наш час відкриттів та гуманістичного мислення більше немає місця для крадіжок та насильства, які пірати завдають у відкритому морі. Все більше націй об'єднуються, щоб протистояти цій спільній загрозі добробуту та процвітанню всіх, і обіцяють покласти край цьому лиху."
  dip_choice_subject_opinions: "Емісари підданих"
  dip_choice_subject_opinions_desc: "Постійне спілкування з нашими підданими, безсумнівно, позитивно вплине на наші відносини, зміцнюючи ядро нашого домену та всі країни, які вірно стоять під нашим прапором."
  early_anti_piracy_warfare: "Антипіратські ліги"
  early_anti_piracy_warfare_desc: "Поширення піратів, розбійників та грабіжників у водах, що використовуються нашими купцями для торгівлі та підтримки нашої економіки, змусило їх об'єднатися та сформувати Купецькі ліги для полегшення захисту їхніх човнів під час довгих подорожей."
  pop_promotion_speed_age_5: "Підвищені бюрократи"
  pop_promotion_speed_age_5_desc: "Бюрократія розширюється, щоб задовольнити потреби зростаючої бюрократії, збільшуючи потребу в освічених чиновниках, які могли б приєднатися до адміністративних лав."
  army_movement_speed_absolutism: "Магазини"
  army_movement_speed_absolutism_desc: "Використання польових магазинів не є відкриттям, але безпрецедентне зростання сучасних армій популяризувало їх використання. Стабільне постачання боєприпасів, яке вони можуть забезпечити армії, полегшує її пересування та розширює її операційний діапазон."
  army_movement_speed_revolutions: "Контракти на постачання"
  army_movement_speed_revolutions_desc: "Сплата справедливих цін за їжу та припаси, які потрібні нашій армії під час пересування регіоном, замість грабунку, прискорює рух через територію, оскільки самі селяни приноситимуть свої товари до пунктів збору, які ми встановили."
  regiment_reinforcement_speed_absolutism: "Маршал квартирмейстерської служби"
  regiment_reinforcement_speed_absolutism_desc: "Постійні армії стали новим стандартом ведення війни, що саме по собі приносить свою частку викликів. Маршал Квартирмейстер, нова посада в нашому війську, зосередиться на подоланні цих викликів шляхом організації логістики наших постійно зростаючих сил."
  pop_promotion_speed_age_3: "Шляхетство за службу"
  pop_promotion_speed_age_3_desc: "Традиційно шляхта досягала свого статусу через військову службу своєму правителю. Однак, вимоги зростаючої держави вимагають підвищення членів нижчої шляхти до вищих рангів, тоді як інші люди, такі як купці, отримують титул шляхтичів."
  regiment_reinforcement_speed_discovery: "Рання військова логістика"
  regiment_reinforcement_speed_discovery_desc: "Логістика – це половина битви. Коли солдати б'ються на полі бою, їхня зброя та обладунки втрачатимуть свою міцність і ламатимуться під ворожим натиском. Створення місцевих складів постачання, а також інші логістичні методи дозволяють нам переозброїти солдата новою зброєю за короткий час."
  pop_promotion_speed_age_4: "Конфесійні священнослужителі"
  pop_promotion_speed_age_4_desc: "Епоха Реформації та Конфесіоналізму відновила інтерес організованих конфесій до розгортання більшої кількості священнослужителів, щоб вести свою паству в ці неспокійні часи, тим самим роблячи релігійні посади набагато привабливішими для людей."
  assault_ability_reformation: "Реформовані вилазки на проломи"
  assault_ability_reformation_desc: "Делегуючи відповідальність за штурм проломів деяким з наших найкращих і найдисциплінованіших військ, ми проб'ємося навіть крізь найтовстіші та найміцніші укріплення, за якими можуть ховатися наші вороги."
  regiment_reinforcement_speed_reformation: "Порохівниця"
  regiment_reinforcement_speed_reformation_desc: "Порохова зброя все частіше стає поширеною в наших військах. Проте, порох все ще є проблематичним матеріалом для роботи через його вразливість до погодних умов та зовнішніх впливів. Порохівниця захистить його від стихій, дозволяючи нам постачати наші підкріплення з меншими зусиллями."
  pop_promotion_speed_age_2: "Сприятлива соціальна мобільність"
  pop_promotion_speed_age_2_desc: "Мрія більшості селян про втечу від бідності та підйом соціальними сходами є реальністю в нашому суспільстві. Нагороджуючи наполегливу працю, скрупульозність та належне втілення наших ідеалів, ми ніколи не матимемо нестачі в здібних та впливових людях."
  regiment_reinforcement_speed_renaissance: "Постійні польові навчання"
  regiment_reinforcement_speed_renaissance_desc: "Професійні армії змінюють спосіб ведення війни, оскільки тепер вона базується на постійних підрозділах, що служать протягом тривалого періоду. Підтримка регулярного потоку навчених солдатів до цих підрозділів є викликом, але дуже необхідна для їхнього функціонування."
  pop_promotion_speed_age_6: "Капіталістична соціальна мобільність"
  pop_promotion_speed_age_6_desc: "Розширення капіталізму народжує нову епоху соціальної мобільності, в якій багатство замінює традиційні ієрархії як засіб підвищення соціального статусу, від капіталістів до клерків та промислових робітників."
  regiment_reinforcement_speed_revolutions: "Масова підготовка"
  regiment_reinforcement_speed_revolutions_desc: "Постійні армії сучасності грандіозніші за будь-яку військову силу минулого. Тактика виконується десятками тисяч, а втрати є безпрецедентними. Наша нова військова підготовка враховуватиме кількість загиблих у сучасній війні, навчаючи сотні солдатів одночасно."
  siege_ability_revolutions: "Артилерійські офіцери"
  siege_ability_revolutions_desc: "Важливість артилерії зросла до того, що спеціалізовані офіцери, навчені технічним вимогам гармат та сучасній тактиці, що використовує їх на повну, є необхідністю на сучасному театрі війни."
  assault_ability_revolutions: "Марш проти вогню"
  assault_ability_revolutions_desc: "Наші армії охоче йдуть у хаос гарматного вогню та пилу, прокладаючи шлях для наших військ, щоб захопити ворожі форти. Незважаючи на досягнення в артилерії та нові методи укріплення, наша майстерність у штурмі ворожих стін залишатиметься неперевершеною."
  army_country_movement_speed_advance: "Розвідувальні загони"
  army_country_movement_speed_advance_desc: "Завдяки використанню кінних розвідників ми можемо перевірити місцевість перед нашими військами та спланувати маневр наших армій навколо неї. Це дозволяє нам долати ті самі місця швидше, ніж це було б потрібно іншим арміям."
  army_country_casus_belli_advance: "Приводи"
  army_country_casus_belli_advance_desc: "Здатність наших професійних дипломатів та досвідчених шпигунів створювати фальшиві, але правдоподібні ситуації дозволяє нам створювати фальшиві приводи, які ми можемо використовувати для виправдання майже будь-яких дій на міжнародній арені."
  army_country_integration_speed_advance: "Повага до місцевого самоврядування"
  army_country_integration_speed_advance_desc: "Наші люди — грізні воєначальники, які прагнуть поширити свою спадщину в кожен куточок нашого світу. Як засіб інтеграції та управління нашим постійно зростаючим володінням, ми вирішуємо здебільшого поважати те, як поводяться завойовані місцеві жителі."
  army_country_diplo_range_advance: "Озброєні посланці"
  army_country_diplo_range_advance_desc: "Нашу армію бояться далеко й широко. Попри нашу репутацію, ми повинні встановити дипломатичні відносини з націями, які мають ту саму мету: знищення наших спільних ворогів. Відправляючи добре озброєних та супроводжуваних посланців до іноземних дворів, ми можемо гарантувати, що наш дипломатичний вплив не постраждає від спалахів насильства."
  minting_trade_range_trad_building: "Заплановані торгові експедиції"
  minting_trade_range_trad_building_desc: "Торгівля з іноземними країнами є життєвою силою нашої нації. Ретельно плануючи торгові маршрути та забезпечуючи достатні запаси для кожного плавання, ми можемо досягти ринків, віддаленіших від наших баз."
  minting_trade_range_disc_building: "Розширені торгові депо"
  minting_trade_range_disc_building_desc: "Зростаючі вимоги міжнародної торгівлі необхідно буде враховувати при плануванні наших торгових починань. Завдяки цьому розширенню наших торгових депо ми можемо досягати нових берегів, не ризикуючи нашим цінним вантажем."
  trade_center_building_country_advance: "Емпорії"
  trade_center_building_country_advance_desc: "Завдяки розумним технікам ми можемо легко зробити наші контрольовані ринки привабливішими для іноземних купців, збільшуючи при цьому кількість грошей, які ми отримуємо від них."
  export_building_country_advance: "Спритний експорт"
  export_building_country_advance_desc: "Витрати на експорт цінних товарів з наших контрольованих ринків можуть бути досить високими, що робить нашу продукцію менш привабливою. Зробивши ці експортні дії швидшими, ми можемо зробити нашу торгівлю динамічнішою."
  counter_espionage_building_country_advance: "Секретні коди"
  counter_espionage_building_country_advance_desc: "Добре відомо, що наша діяльність привертає увагу не завжди бажаних очей. Якщо ми хочемо тримати наші дії подалі від цих цікавих поглядів, ми повинні шифрувати наші комунікації."
  medical_school_advance: "Медичні школи"
  medical_school_advance_desc: "Спеціалізовані заклади для підготовлених медиків, Медичні школи — це місця, куди вчені йдуть, щоб дізнатися про людське тіло, його хвороби та способи їх запобігання або лікування."
  slave_manned_galleys: "Комплектування галер рабами"
  slave_manned_galleys_desc: "Масивні галерні флотилії тягнуть за собою величезні витрати, оскільки їх потрібно забезпечувати достатньою кількістю веслярів для функціонування. Використовуючи рабів, ми можемо бути впевнені, що матимемо менші витрати на використання наших флотів."
  state_efficiency: "Місцева інфраструктура"
  state_efficiency_desc: "Попри нашу зосередженість на загальнодержавному масштабі справ, ми не повинні нехтувати турботою про наших місцевих державних законодавців та судових виконавців."
  efficient_mining: "Ефективний видобуток"
  efficient_mining_desc: "Видати указ про вдосконалення кожного аспекту видобутку металів у наших володіннях, з метою регулювання його присутності на наших ринках."
  efficient_construction_plans: "Ефективні плани будівництва"
  efficient_construction_plans_desc: "Наше ефективне планування будівництва дозволяє нам виконувати роботи без жодних компромісів."
  expanded_infrastructure_network: "Розширена інфраструктурна мережа"
  expanded_infrastructure_network_desc: "Дорожня мережа в межах нашої нації є життєво важливою частиною нашого комерційного та адміністративного процвітання. Тому ми повинні дбати про її покращення та підтримку."
  fort_logistics: "Фортифікаційна логістика"
  fort_logistics_desc: "Упорядкувавши нашу систему укріплень належним чином, як з будівельної, так і з логістичної точки зору, ми можемо заощадити кошти на її довгостроковому утриманні."
  regulation_bureau: "Бюро регулювання"
  regulation_bureau_desc: "Законодавчий орган, юрисдикція якого охоплює підтримку та просування законів, пов'язаних з інфляцією, а також місцеве управління наших провінцій."
  more_merchants_age_of_trad: "Купецькі гільдії"
  more_merchants_age_of_trad_desc: "Формування гільдій тривалий час формувало структуру нашої економіки. Хоча вони є звичайним явищем для наших ремісників, того ж не можна сказати про наших купців. Ми повинні заохочувати торговців до створення гільдій таким же чином, щоб оптимізувати наші торговельні амбіції."
  construction_speed_traditions: "Майстри-муляри"
  construction_speed_traditions_desc: "Наші будівельні зусилля ніколи не повинні припинятися і залишати наші села та міста бездіяльними. Залучивши майстра-муляра, який наглядатиме та плануватиме наші будівельні роботи, ми можемо досягти значних покращень у розширенні нашої країни."
  diplomatic_capacity_traditions: "Розширені архіви"
  diplomatic_capacity_traditions_desc: "Регулярні дипломатичні зусилля вимагають паперової роботи та детальної документації наших контактів."
  rural_rgo_traditions: "Освоєння територій"
  rural_rgo_traditions_desc: "Ми повинні освоїти віддалені куточки нашої країни, щоб розширити наші економічні можливості. Ми не тільки забезпечимо більше простору для нашого народу, але й покращимо їхній внесок у нашу країну."
  matchlock_gun: "Ранні мисливські рушниці"
  matchlock_gun_desc: "Покращення рушниць, вироблених нашими зброярами, також забезпечать наших мисливців кращими знаряддями, щоб приносити додому вдосталь хутра та дичини."
  flintlock_gun: "Покращені мисливські рушниці"
  flintlock_gun_desc: "З покращеними кремінними рушницями та спеціальними боєприпасами для полювання наші мисливці будуть ще більш здатними здобувати свою здобич."
  long_rifle: "Полювання з довгою рушницею"
  long_rifle_desc: "Зі спеціальними довгоствольними рушницями, виготовленими для полювання, наші мисливці матимуть надійний інструмент для здобуття як дичини, так і хутра."
