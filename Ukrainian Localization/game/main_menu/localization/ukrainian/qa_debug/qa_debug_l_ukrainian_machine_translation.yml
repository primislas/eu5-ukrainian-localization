  qa_debug.8.title: "Меню Анексії"
  qa_debug.8.desc: "Оберіть, чи бажаєте ви повністю колонізувати / анексувати вашу домашню територію / регіон / субконтинент / континент.\nПОПЕРЕДЖЕННЯ: Колонізація всього континенту може спричинити затримки в грі."
  qa_debug.8.a: "Все, що мені потрібно, це провінція."
  qa_debug_annex_province_tt: "Колонізувати всю [Concept('capital_location.GetProvinceDefinition.GetName] [province_definition', 'CONCEPT_PLACEHOLDER')|e]. Країни гравців НЕ будуть цим зачеплені.\nWARNING: This effect might desync the game"
  qa_debug.8.b: "Області вистачить."
  qa_debug_annex_area_tt: "Колонізувати всю [Concept('capital_location.GetArea.GetName] [area', 'CONCEPT_PLACEHOLDER')|e]. Країни гравців НЕ будуть цим зачеплені.\nWARNING: This effect might desync the game"
  qa_debug.8.c: "Я лише хочу мій рідний регіон під моїм контролем."
  qa_debug_annex_region_tt: "Колонізувати весь [Concept('capital_location.GetRegion.GetName] [region', 'CONCEPT_PLACEHOLDER')|e]. Країни гравців НЕ будуть цим зачеплені.\nWARNING: This effect might desync the game"
  qa_debug.8.d: "Захопити весь субконтинент."
  qa_debug_annex_sub_continent_tt: "Колонізувати весь [Concept('capital_location.GetRegion.GetSubContinent.GetName] [sub_continent', 'CONCEPT_PLACEHOLDER')|e]. Країни гравців НЕ будуть цим зачеплені.\nWARNING: This effect might desync the game"
