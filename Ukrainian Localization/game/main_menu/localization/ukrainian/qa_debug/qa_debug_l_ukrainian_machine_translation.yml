  qa_debug_annex_continent_tt: "Колонізувати весь [Concept('capital_location.GetRegion.GetSubContinent.GetContinent.GetName] [continent', 'CONCEPT_PLACEHOLDER')|e]. Країни гравців НЕ будуть цим зачеплені.\nWARNING: This effect WILL lag out the game"
