l_english:
  andean_group: "Андські"
  andean_group_desc: "Мешканці Анд або прилеглих до них територій, люди цього гірського регіону пристосовані до способу життя, що добре підходить для багатьох різних кліматів та місцевостей високогір'я. Цей спільний спосіб життя поєднує багаті культури та цивілізації Анд."
  arabian_group: "Аравійські"
  arabian_group_desc: "Землі Аравійського півострова заселені різноманітною групою народів. Від високогір'я Ємену до оаз центральних земель ці люди пристосувалися до суворих умов довкілля."
  arabic_group: "Арабські"
  arabic_group_desc: "Після піднесення та занепаду Омейядського халіфату більшість народів, що перебували під його владою, зберегли значну частину його впливу та культури навіть довго після його зникнення."
  baltic_group: "Балтійські"
  baltic_group_desc: "Балтійські народи — це ті, що живуть на південно-східному узбережжі Балтійського моря. Початково здебільшого з тієї самої гілки, що дала початок слов'янським народам, вони вже були диференційовані за часів Римської імперії. Протягом століть взаємодія з різними германськими народами, а також групами слов'ян, створила унікальну ідентичність. Не лише оригінальні балтомовні народи, що досі зберігають свою початкову релігію, але й багато груп християнських германських народів, що мешкають на тих берегах, тепер можуть називатися балтійськими."
  finnic_group: "Фінські"
  finnic_group_desc: "Фінські народи мешкають по обидва боки Фінської затоки. Хоча їхня сильна ідентичність залишається непорушною, вони перебували під загрозою вторгнення як з боку скандинавських, так і німецьких народів."
  amazigh_group: "Амазиги"
  amazigh_group_desc: "Народ амазигів, також відомий як бербери, є етнічною групою з Північної Африки. Їхнє сильне почуття ідентичності зіштовхується з арабськими завойовниками, які століттями формували їхні рідні регіони."
  bohemian_group: "Богемські"
  bohemian_group_desc: "Землі Богемської Корони були заселені переважно різними слов'янськими народами. Однак, будучи не лише частиною Священної Римської імперії, але й одним з її найбільших складових, вони також зазнали сильного впливу німецької культури та традицій. Крім того, багато німецьких поселенців були приваблені до земель Богемії, що ще більше розширило цей вплив."
  british_group: "Британські"
  british_group_desc: "Британія є домом для багатьох людей, її доісторичний склад був порушений хвилями міграції кельтських племен, Римської імперії, германського світу, Ірландії та Франції. Фізичне відокремлення від континенту об'єднує всі народи цього острова."
  carpathian_group: "Карпатські"
  carpathian_group_desc: "Суворі гірські дуги Карпатських гір здавна формували життя тих, хто мешкає серед їхніх хребтів і долин. Ізольовані громади пристосовувалися до змін кордонів та імперій, розвиваючи стійкість, пов'язану із самою землею. Гірські перевали та високогірні фортеці сприяли як торгівлі, так і обороні."
  caucasian_group: "Кавказькі"
  caucasian_group_desc: "Там, де зустрічаються Європа та Азія, Кавказ постає як земля вершин і вузьких долин. Його круті ландшафти захищають запекло незалежні народи, тоді як його гірські перевали приваблювали амбіції імперій..."
  celtic_group: "Кельтські"
  celtic_group_desc: "Кельти, розрізнені народи, що колись простягалися від Іберії до Анатолії, тепер скоротилися вздовж суворого атлантичного узбережжя, відтіснені до скелястих окраїн Європи століттями вторгнень та поселень."
  chinese_group: "Китайські"
  chinese_group_desc: "Китай багато разів розпадався та возз'єднувався протягом століть, але ідея про нього ніколи не переставала існувати. Незважаючи на велику різноманітність у культурі та мові, багато різних народів, що живуть у ньому, поділяють концепцію того, що вони є невід'ємно китайцями, мешканцями та зберігачами Серединної Імперії."
  confucian_group: "Конфуціанські"
  confucian_group_desc: "Сукупність культур, які були прямо чи опосередковано під впливом ідей та моралі конфуціанства."
  ethiopian_group: "Ефіопські"
  ethiopian_group_desc: "Давнє Аксумське царство познайомило народ Ефіопії з середземноморським світом через Єгипет, торгуючи з Грецією та Римською імперією, а також принесло християнство. Однак після піднесення ісламу ефіопи опинилися відрізаними від цього контакту та дещо ізольованими як єдина група християнських семітських народів. Це створило спільну спадщину, яка зберігається, незважаючи на культурні відмінності між ними."
  french_group: "Французькі"
  french_group_desc: "Маючи своє походження у германських франків, які зайняли територію після падіння Римської імперії, Королівство Франція пізніше розширилося, включивши до себе інші народи, окрім них. Незважаючи на відмінності у звичаях та мовах, всі ці народи поділяють ідентичність бути французами."
  german_group: "Німецькі"
  german_group_desc: "Корені німецьких народів, вкорінені у багатому гобелені стародавніх племен, увійшли в історію як іноді суперники, іноді союзники Римської імперії. З плином століть Імперія Карла Великого та Феодалізм формували їхню ідентичність, розвиваючись у створення Священної Римської імперії."
  swiss_group: "Швейцарські"
  swiss_group_desc: "Швейцарці — це люди, які називають Швейцарське плато та Альпи своїм домом. Завдяки їхньому географічному положенню, швейцарська група не є виключно германською, оскільки французька та італійська культури є частиною Швейцарії."
  greek_group: "Еллінські"
  greek_group_desc: "Елліни, піонери демократії та філософії, сформували західну цивілізацію своєю невмирущою культурною та інтелектуальною спадщиною. Від епічної поезії до класичної архітектури, їхній внесок відлунює крізь тисячоліття."
  haudenosaunee_group: "Гауденосауні"
  haudenosaunee_group_desc: "Гауденосауні — це різноманітна група народів, але всі вони об'єднані не лише мовними схожістю, але й спільним почуттям спільноти, співпраці та основними переконаннями, які виражаються багатьма способами, якими їхні народи схильні організовуватися разом."
  hibernian_group: "Гібернські"
  hibernian_group_desc: "Смарагдовий острів спочатку був населений гелами, але завоювання та поселення принесли багато нових прибульців з Британії та континенту. Навіть ті, хто має іноземне походження, можуть відчути себе зобов'язаними відповісти на поклик Ірландії."
  hungarian_group: "Мадяри"
  hungarian_group_desc: "Мадяри, або угорці, — це група людей, що походить з району Південного Уралу, які поступово рухалися на захід, витісняючись (і отримуючи вплив від) інших народів степів, таких як гуни, авари, булгари та тюрки, поки вони не оселилися в Карпатському басейні після падіння Аварського каганату. Це робить їх досить відмінними від решти їхніх європейських сусідів, що лише сприяє їхньому почуттю єдності."
  iberian_group: "Іберійські"
  iberian_group_desc: "Іберійський півострів, земля контрастів та багатої історії, є домом для різноманітних народів. Стародавні кельти, ібери та баски зазнали впливу фінікійців, римлян, вестготів та маврів. Кілька відмінних ідентичностей злилися, створивши унікальне поєднання християнських, мусульманських та єврейських культур. Від яскравих дворів півдня до героїчних лицарів півночі, іберійські народи втілюють складний гобелен традицій та прагнень."
  indian_group: "Індійські"
  indian_group_desc: "\"Індійські\" — це загальний термін, що відноситься до великих та різноманітних культур, які проживають на субконтиненті Індії. Хоча кожна культура унікальна, а мов багато, спільна географія та чітке відокремлення природними кордонами в усіх напрямках створює спільну історію для цих культур."
  indo_aryan_group: "Індоарійські"
  indo_aryan_group_desc: "Нащадки індоєвропейського народу, що вторгся на Індійський субконтинент, ці люди стали домінуючим населенням у північних районах. Їхнє поселення сформувало ранню ведичну культуру та заклало основу для безлічі мов та імперій."
  dravidian_group: "Дравідійські"
  dravidian_group_desc: "Зосереджені в південній третині Індії, люди $dravidian_group$ є нащадками корінних жителів субконтиненту до $indo_aryan_group$ вторгнень. Хоча культура цих загарбників з часом проникла до $dravidian_group$, вони зберегли сильну регіональну ідентичність."
  tibeto_burman_group: "Тибето-бірманські народи"
  tibeto_burman_group_desc: "Міграції з Тибетського плато в ранні історичні періоди привели ці народи до кількох місць, включаючи Індію. Проте їхній розвиток був нерівномірним: деякі групи розвинули передові та складні суспільства, тоді як інші залишилися досить племінними."
  austroasiatic_group: "Австроазіатські народи"
  austroasiatic_group_desc: "Будучи однією з найдавніших культурних груп в Азії, народи $austroasiatic_group$ розвинули безліч суспільств, що варіюються від дуже розвинених імперій до недорозвинених войовничих племен джунглів."
  tungusic_group: "Тунгуські народи"
  tungusic_group_desc: "Поширені на більшій частині Маньчжурії та Східного Сибіру, народи $tungusic_group$ традиційно жили полюванням та торгівлею. Пристосовані до суворих кліматичних умов своїх рідних земель, ці групи зазвичай організовувалися в кланові структури."
  austronesian_group: "Австронезійські народи"
  austronesian_group_desc: "Як одна з найпоширеніших культурних і мовних сімей, народи $austronesian_group$ заселили землі від Мадагаскару до острова Пасхи. Їх вважали чудовими мореплавцями, і вони приносили з собою технології та тварин у своїх колоніальних зусиллях."
  iranian_group: "Іранські народи"
  iranian_group_desc: "Культури Ірану є давніми і мають довге та складне походження. Іранці в Перському регіоні є нащадками західноіранських народів, які правили Близьким Сходом, таких як Ахеменідська імперія та Сасанідська імперія. Після мусульманського завоювання Персії іслам став головною опорою іранської культури."
  israelite_group_desc: "Євреї, нащадки стародавніх євреїв, поширилися по всьому відомому світу після знищення їхньої батьківщини. Об'єднані вірою та традиціями, вони роблять внесок як торговці, вчені та ремісники, зберігаючи зв'язок зі своєю спільною спадщиною. Розсіяні, але єдині, вони втілюють стійку ідентичність, зберігаючи вічну надію на Сіон у своїх серцях."
  italian_group: "Італійські народи"
  italian_group_desc: "Італія, яскрава мозаїка королівств та міст-держав, є плавильним котлом культур та впливів. Від стародавніх римлян до візантійців, лангобардів та норманів, різні народи залишили свій слід на Італійському півострові. Італійці запекло змагаються за владу та престиж, сприяючи процвітаючій культурі та художньому меценатству."
  japanese_group: "Японські народи"
  japanese_group_desc: "Народи Японії населяли свої острови з міфічної епохи богів та першого японського Імператора, Дзімму-тенно, згідно з їхнім власним викладом історії. Століття ізоляції, перервані періодичними контактами з континентом через Корею та Китай, зробили японців особливими, а їхня унікальна мова та рідні вірування не мають схожості з чимось присутнім на континенті. Хоча й різноманітні між собою, японський народ розвинув спільну унікальну ідентичність."
  jewish_group: "Єврейські народи"
  jewish_group_desc: "Група $jewish_group$ позначає різні етнорелігійні групи, які сповідують релігію $jewish_group$."
  jurchen_group: "Чжурчжені"
  jurchen_group_desc: "Народи $jurchen_group$, що мешкають у суворих землях Маньчжурії, є лютими воїнами, які викували могутню династію Цзінь і знищили киданьську династію Ляо у 12 столітті. Майстри верхової їзди та стрільби з лука, вони, що колись формували імперії, продовжують надихати своєю стійкістю та багатою спадщиною."
  lithuanian_group: "Литовські народи"
  lithuanian_group_desc: "Серед різних балтійських народів литовці об'єдналися завдяки схожості мови та спільним загрозам, утворивши Литовську державу. Їхні язичницькі вірування, будучи оточеними ворожими християнами з усіх боків, ще більше посилили їхнє спільне почуття єдності."
  polish_group: "Польські народи"
  polish_group_desc: "Розділені між кількома країнами після падіння останньої Польської держави, поляки поділяють спільну західнослов'янську спадщину та сильну католицьку віру."
  maghrebi_group: "Магрибські народи"
  maghrebi_group_desc: "Особливі характеристики півночі Африки, численні імперії, що поставали та падали на її землях, та її унікальне розташування між спокійним Середземним морем на півночі та невблаганним піщаним морем Сахари на півдні, створили групу культур, надзвичайно вправних у догляді за нею."
  mongolian_group: "Монгольські народи"
  mongolian_group_desc: "Походячи з безкраїх степів Центральної Азії, народ $mongolian_group$ втілює кочову спадщину, що охоплює століття. Відомі своєю майстерністю верхової їзди та вправною стрільбою з лука, вони перетинають відкриті рівнини, підтримуючи глибокий зв'язок зі своїми стадами. Завдяки лідерству історичних постатей, таких як $genghis_khan_name_no_tooltip$, вони створили одну з найбільших імперій в історії, залишивши незгладимий слід в анналах завоювань. Їхнє тривале культурне багатство включає традиції верхової їзди, горлового співу та стійкий дух, закріплений у безмежних просторах, які вони називають домом."
  nahua_group: "Нахуа"
  nahua_group_desc: "Культура $nahua_culture$, що населяє регіон Мексики, відома своїми розвиненими суспільствами, складними урядовими системами та войовничими відносинами з сусідами."
  nepali_group: "Непальські народи"
  nepali_group_desc: "Народи Непалу мають різноманітне походження та спадщину. Тоді як гурунги та таманги мають коріння в Китаї та Тибеті, кхаси та кумаоні походять з індійського субконтиненту. Проте, різноманітність культур Непалу вважає Гімалаї своїм домом."
  netherlandish_group: "Нідерландські народи"
  netherlandish_group_desc: "На низинних землях, позначених річками та вічною боротьбою з морем, різноманітні нідерландські народи викували унікальну ідентичність. Відомі своєю торговою майстерністю, морською розвідкою та інноваціями, вони поділяють спільну спадщину, сформовану торгівлею та непохитним пануванням над своїм водним доменном."
  polynesian_group: "Полінезійські народи"
  polynesian_group_desc: "Народи Полінезії завжди були мореплавцями, розширюючи протягом століть безліч островів у Тихому океані. Незважаючи на ізоляцію один від одного, численні групи, що там живуть, все ще можуть простежити свою спільну культурну спадщину та мовні подібності."
  micronesian_group: "Мікронезійські народи"
  micronesian_group_desc: "Як і їхні полінезійські сусіди, мікронезійці чудово володіють мореплавством і зуміли колонізувати сотні островів та атолів по всьому західному Тихому океану."
  puebloan_group: "Пуебло"
  puebloan_group_desc: "Походячи від роздроблених стародавніх пуеблоанців, народ пуебло відтоді розійшовся на різні племена по всій території $shiewhibak_area$. Через суворі землі $shiewhibak_area$ народ пуебло став стійким і побудував складні споруди з адобе та іригаційні системи."
  pyrenean_group: "Піренейські народи"
  pyrenean_group_desc: "Походять з Піренейських гір, що відокремлюють південь Франції від Іберії, піренейські народи об'єднує зв'язок, викуваний спільними труднощами та унікальними суспільними інноваціями віддаленого життя в суворих прикордонних землях."
  romanian_group: "Румунські народи"
  romanian_group_desc: "Народ $romanian_group$, нащадки стародавніх даків та римлян, переважно населяють регіони Валахії, Молдови та Трансільванії, а також Балкани. Вони пишаються унікальним романським варіантом, оточеним слов'янськими мовами. Їх шанують за їхню стійкість та любов до фольклору, що відбивається в їхній музиці, традиціях та святах."
  russian_group: "Східні слов'яни"
  russian_group_desc: "Народи Русі ведуть своє походження від варягів, скандинавських мореплавців і воїнів, які оселилися в російському регіоні близько IX століття. З часом Русь пройшла процес культурного злиття, поєднавши слов'янські традиції зі скандинавськими впливами. Близькість до Візантійської імперії сприяла культурним та економічним обмінам, сприяючи формуванню їхньої унікальної культури з різноманітним поєднанням мистецтва, архітектури та мови."
  scandinavian_group: "Скандинавські народи"
  scandinavian_group_desc: "Скандинавія є домом для різноманітних народів, сформованих багатою історією міграції, торгівлі та культурного обміну. Різні королівства розвинули унікальні ідентичності, зберігаючи відчуття спільної спадщини. Відомі своїми мореплавними навичками та жвавими торговельними мережами, скандинави славляться своєю майстерністю у мореплавстві та управлінні."
  scottish_group: "Шотландські народи"
  scottish_group_desc: "Північні регіони Британії довгий час були домівкою для багатьох народів різного походження; корінні пікти та кумбрії відмовилися від своїх старих звичаїв, коли були поглинені королівствами іноземного гельського, англосаксонського та вікінгського походження. Але в часи випробувань вони все ще об'єднуються проти чужинців і стають одним народом: шотландцями."
  slavic_group: "Слов'янські народи"
  slavic_group_desc: "Слов'янські народи, походячи з верхів'їв річок Вісли та Дніпра за часів Римської імперії, протягом століть розселилися на значній частині Східної Європи. Попри те, що вони розділилися на різні гілки та утворили багато різних держав і королівств, їхня спільна культурна спадщина зберігається."
  south_slavic_group: "Південні слов'яни"
  south_slavic_group_desc: "Південні слов'яни — це різноманітна група, що включає кілька народів на Балканському півострові. Ці народи мають спільну слов'янську спадщину та мовні корені, але протягом століть розвинули відмінні культури."
  tatar_group: "Татари"
  tatar_group_desc: "Походження татарського народу простежується до тюркських і монгольських етнічних груп Центральної Азії і широко використовується для позначення кочових племен, таких як волзькі та кримські татари. Кожна підгрупа має власну відмінну історію, мовні варіації та культурні традиції, і здебільшого пов'язана ісламом, що відображає вплив ісламських культур у регіонах їхнього проживання."
  tibetan_group: "Тибетці"
  tibetan_group_desc: "Як мешканці високих плато Тибету та Гімалайських гір, тибетський народ звик до екстремальних кліматичних умов та місцевості."
  turkic_group: "Тюрки"
  turkic_group_desc: "Тюркські народи пройшли довгий шлях з часів свого походження століття тому в степах Азії. Розширившись, щоб охопити території від Чорного моря до Монгольських степів і далі до Персії, вони взаємодіяли з багатьма іншими культурами та народами, і розділилися на багато різних груп, але спільна тюркська ідентичність зберігається."
  west_african_group: "Народи Західної Африки"
  west_african_group_desc: "Попри свою велику різноманітність у плані культури, мови та навіть релігії, народи, що мешкають у Західній Африці та Сахелі, всі мають спільний набір рис та характеристик, сформованих століттями взаємодії між ними. Відносно важкопрохідні ландшафти пустелі Сахара на півночі та ліси й джунглі на півдні сприяли більш горизонтальному контакту між народами, створюючи цю спільну ідентичність."
  malagasy_group: "Малагасійці"
  malagasy_group_desc: "Різноманітні народи острова Мадагаскар простежують своє походження від узбережжя Південно-Східної Африки до островів Південно-Східної Азії."
  thai_group: "Тайці"
  thai_group_desc: "З часів свого походження в південних частинах Китаю до їхніх міграцій та подальшого облаштування в долині Чаопхрая, споконвічні тайські народи розвинули унікальну ідентичність, поєднавши свої споконвічні традиції з впливами народів мон і кхмерів."
  shan_group: "Шани"
  shan_group_desc: "Хоча спочатку це був екзонім з бірманської мови для позначення різноманітних тайських народів, що мігрували в цю область, а також споріднене слово з «Сіам», він дозволив цим різним тайським групам розвинути спільну ідентичність."
