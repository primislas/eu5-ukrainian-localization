  country_rank_effects_list_title: "[CountryRank.GetNameWithNoTooltip] має такі ефекти:"
  rank_empire_desc: "Це найвищий [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e] і представляє найпрестижніші або наймогутніші [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] у світі."
  rank_kingdom_desc: "Це [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e], що представляє більші [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]. Вони мають кілька [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] і можуть проєктувати значну кількість сили."
  rank_duchy_desc: "Цей [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e] представляє малу або середню [Concept('country', 'CONCEPT_PLACEHOLDER')|e], зазвичай з однією [Concept('province', 'CONCEPT_PLACEHOLDER')|e], але вона більша або більш населена, ніж $rank_county$."
  rank_county_desc: "Цей [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e] представляє найменші [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]. Зазвичай ті, що мають лише одне [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Невелике плем'я також може бути представлене цим рангом."
  government_type_list_title: "[GovernmentType.GetNameWithNoTooltip] дозволяє наступне:"
  government_type_list: "[Concept('advances', 'CONCEPT_PLACEHOLDER')|e]: #placeholder XX #!\n[Concept('laws', 'CONCEPT_PLACEHOLDER')|e]: #placeholder XX #!\n[Concept('policies', 'CONCEPT_PLACEHOLDER')|e]: #placeholder XX #!\n[Concept('heir_selections', 'CONCEPT_PLACEHOLDER')|e]: #placeholder XX #!\n[Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e]: #placeholder XX #!"
  government_type_list_advances_row: "[Concept('advances', 'CONCEPT_PLACEHOLDER')|e]: $VAL$"
  government_type_list_heir_selection_row: "[Concept('heir_selections', 'CONCEPT_PLACEHOLDER')|e]: $VAL$"
  government_type_list_laws_row: "[Concept('laws', 'CONCEPT_PLACEHOLDER')|e]: $VAL$"
  government_type_list_policies_row: "[Concept('policies', 'CONCEPT_PLACEHOLDER')|e]: $VAL$"
  government_type_list_estate_privileges_row: "[Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e]: $VAL$"
  monarchy_desc: "$monarchy$ — це [Concept('government_type', 'CONCEPT_PLACEHOLDER')|e], заснований на принципі неподільного особистого суверенітету, де [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є першим серед еліт. [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] зазвичай визначається [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] $game_concept_monarch$ і в більшості випадків вони правлять довічно.\n\n$game_concept_monarchs$ можуть використовувати [Concept('royal_marriages', 'CONCEPT_PLACEHOLDER')|e] для забезпечення [Concept('alliances', 'CONCEPT_PLACEHOLDER')|e] і навіть успадковувати іноземні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] через [Concept('personal_unions', 'CONCEPT_PLACEHOLDER')|e]. Однак спадкування часто є проблематичною справою, і монархії можуть легко потрапити в [Concept('regencies', 'CONCEPT_PLACEHOLDER')|e] або під вплив іноземних $game_concept_dynasties$."
  republic_desc: "$republic$ — це [Concept('government_type', 'CONCEPT_PLACEHOLDER')|e], де [Concept('rulers', 'CONCEPT_PLACEHOLDER')|e] обираються шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e] для служіння представниками громадянського корпусу на встановлений період часу. Залежно від [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] $game_concept_ruler$ може належати до будь-якого з [Concept('estates', 'CONCEPT_PLACEHOLDER')|e].\n\nСила політичних інститутів робить республіки більш стійкими до проблем спадкування, але менш особистий характер правління обмежує дипломатичні інструменти, доступні їм. Таким чином, [Concept('dynasties', 'CONCEPT_PLACEHOLDER')|e] відіграють меншу роль, і республіки не можуть скористатися [Concept('royal_marriages', 'CONCEPT_PLACEHOLDER')|e]."
  theocracy_desc: "$theocracy$ — це [Concept('government_type', 'CONCEPT_PLACEHOLDER')|e], заснований на принципі божественного суверенітету, де [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] походить зі служителів віри, а світські справи підпорядковані релігійній владі.\n\n$game_concept_rulers$ зазвичай обираються правити довічно шляхом певної форми [Concept('election', 'CONCEPT_PLACEHOLDER')|e], що дозволяє менш руйнівну передачу влади."
  steppe_horde_desc: "$steppe_horde$ — це [Concept('government_type', 'CONCEPT_PLACEHOLDER')|e], заснований на військовій силі свого [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]. Родичі поточного $game_concept_ruler$ мають вищий шанс стати [Concept('heir', 'CONCEPT_PLACEHOLDER')|e], але старшинство та особисті [Concept('abilities', 'CONCEPT_PLACEHOLDER')|e] також високо цінуються.\n\n$game_concept_rulers$ походять з елітних членів суспільства і зберігатимуть лояльність своїх однолітків лише доти, доки вони доводять свою здатність підкорювати, руйнувати та грабувати сусідні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]. Через це спадкування є знаменною подією для $steppe_horde$ і може навіть призвести до краху, якщо новий $game_concept_ruler$ не зможе продемонструвати свою міць."
  tribe_desc: "$tribe$ — це [Concept('government_type', 'CONCEPT_PLACEHOLDER')|e], де політична влада структурована насамперед навколо концепції спорідненості, будь то пряма кров або уявне походження.\n\n[Concept('dynasties', 'CONCEPT_PLACEHOLDER')|e] та сімейні зв'язки, отже, мають першорядне значення при визначенні [Concept('heir', 'CONCEPT_PLACEHOLDER')|e], який завжди належатиме до елітних членів суспільства, але дуже часто старшинство, особисті [Concept('abilities', 'CONCEPT_PLACEHOLDER')|e] та військова доблесть також високо цінуються."
