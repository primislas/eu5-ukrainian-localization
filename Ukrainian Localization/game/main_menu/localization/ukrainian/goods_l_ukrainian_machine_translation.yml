  RGO_ENTRY: "$GOODS$ $TYPE$"
  rgo_wood: "Лісівництво"
  rgo_salt: "Соляні поля"
  old_world_goods: "Товари Старого Світу"
  new_world_goods: "Товари Нового Світу"
  horses: "Коні"
  horses_desc: "Коней було одомашнено у невідомому місці Євразійського степу близько шести тисяч років тому. Відтоді люди використовували їх для різноманітних завдань, хоча найважливішим була війна. У цьому сенсі Середньовіччя стало Золотим віком кінноти, оскільки вона була тісно пов'язана з розвитком феодальних суспільств."
  clay: "Глина"
  clay_desc: "Глина — це тип ґрунту, який використовувався людством для виробництва кераміки та гончарних виробів з доісторичних часів. Інше основне застосування — у будівництві, у поєднанні з іншими матеріалами, або для виготовлення цегли. Глиняні таблички також були одним із перших винайдених методів письма, тому її вплив на розвиток цивілізації незаперечний."
  sand: "Пісок"
  sand_desc: "Пісок — один з найпоширеніших матеріалів на Землі, і його використання різноманітне та численне. Він був найпоширенішим абразивним матеріалом, який використовували для обробки будь-якого виду каменю чи металу через його грубість та шорсткість, а також як компонент багатьох будівельних матеріалів та основний матеріал для виробництва скла, серед багатьох інших застосувань."
  tar: "Дьоготь"
  tar_desc: "Спочатку дьоготь виступав як товарна культура, а потім став цінним інгредієнтом у суднобудівній справі. Його зовнішній вигляд, густа чорна рідина, зумовлений агресивним процесом дистиляції, необхідним для його виробництва. Дьоготь широко використовується як герметик для корпусів кораблів та як дешевий спосіб зробити вітрила водонепроникними."
  coal: "Вугілля"
  coal_desc: "Вугілля має довгу історію як джерело палива, але лише з винаходом і розповсюдженням практичного парового двигуна попит на нього стрімко зріс. Коли промислова революція охопила Європу, використання та експорт або імпорт вугілля стали великим бізнесом та невід'ємною частиною сучасної економіки."
  iron: "Залізо"
  iron_desc: "Залізо представляє не лише залізо, але й інші чорні метали. Залізо стало основою металургійної промисловості та широко використовувалося у виробництві зброї та іншого військового обладнання."
  copper: "Мідь"
  copper_desc: "Мідь була одним із найважливіших матеріалів з моменту винаходу та розповсюдження металургії тисячі років тому. Її використання дуже різноманітне, оскільки її можна обробляти окремо, а також у сплавах, таких як бронза. Це робить її особливо важливою для озброєння, будучи суттєвою в ранньому виробництві гармат."
  goods_gold: "Золото"
  goods_gold_desc: "Золото традиційно було найціннішим металом, широко використовуваним для торгівлі та накопичення багатства у формі монет або різних видів престижних предметів. Його використання як основної валюти в біметалічних або триметалічних системах призводить до дуже високого попиту, роблячи його об'єктом бажання під час дослідження нових територій."
  silver: "Срібло"
  silver_desc: "Срібло було одним із перших металів, використаних як гроші, і найуспішнішим поряд із золотом. Центральна Європа стала центром виробництва срібла протягом Середньовіччя, хоча Колумбів обмін перемістив фокус світового виробництва до Америки, зробивши її головним виробничим центром новонародженої глобальної мережі з XVI століття."
  gems: "Самоцвіти"
  gems_desc: "З найдавніших часів каміння, таке як рубіни, сапфіри, діаманти, смарагди або нефрит, використовувалися в ювелірних виробах та церемоніальному вбранні. Протягом століть єдиним джерелом діамантів у світі були легендарні копальні Голконда. Хоча не всі дорогоцінні камені є такими рідкісними, усі вони є вельми затребуваними товарами."
  stone: "Камінь"
  stone_desc: "Камінь був одним з основних будівельних матеріалів людства протягом усієї його історії. Міцніший і довговічніший за інші варіанти, такі як глина або дерево, він був основним матеріалом для будь-якої споруди, збудованої на століття. Будівлі давнини, такі як Піраміди, дійшли до наших часів, досі стоячи завдяки довговічності каменю, з якого вони були зроблені."
  tin: "Олово"
  tin_desc: "Олово вперше широко використовувалося в металургії як частина сплаву для отримання бронзи 5000 років тому. Пізніше воно широко застосовувалося для покриття інших металів та сплавів, таких як залізо, свинець або сталь, для запобігання корозії, а також для виготовлення олов'яного сплаву (п’ютеру), дуже поширеного в столовому посуді."
  lead: "Свинець"
  lead_desc: "Свинець отримували з давніх часів як побічний продукт видобутку срібла шляхом спалювання галеніту. Потім свинець використовувався в широкому асортименті побутових та промислових товарів, особливо римлянами, чиї рівні виробництва свинцю не були досягнуті до промислової революції. У Новий час він став основним матеріалом для виготовлення куль для вогнепальної зброї."
  wool: "Шерсть"
  wool_desc: "Шерсть здебільшого надходила від овець, що паслися на менш придатних землях, непридатних для інших видів сільського господарства. До використання бавовни вона була основною сировиною для одягу."
  cotton: "Бавовна"
  cotton_desc: "Бавовна походить з Центральної Азії, але не була широко поширена в Європі до її ввезення в американські колонії, де її використовували як дешевий, але якісний доповнювач або замінник шерсті в швейній промисловості кінця XVIII століття."
  silk: "Шовк"
  silk_desc: "Найкращою з усіх тканин Сходу був шовк, вироблений в Індії, Китаї та Східній Азії. Хоча він був менш культовим, ніж спеції, прибутки від шовку та тонкотканої бавовняної тканини незабаром фактично затьмарили прибутки від торгівлі спеціями для європейських Ост-Індських компаній.\nЧерез зростання попиту були також зроблені спроби виробляти цей матеріал локально в меркантилістській Європі, з дуже різними ступенями успіху."
  dyes: "Барвники"
  dyes_desc: "Доки ткали текстиль, існував ринок для вишуканих барвників. У пізньому Середньовіччі дорогі барвники, такі як індиго, коштували б цілий статок через віддаленість джерела в Індії.\nКоли світ відкрився, барвники стало легше дістати, як завдяки можливостям виробляти їх в Америці, так і завдяки більшій доступності індійського ринку. Тим не менш, барвники залишалися рідкісними, і на початку XIX століття, коли плантації барвників в Індії перейшли до європейських рук, почалася справжня золота лихоманка."
  incense: "Пахощі"
  incense_desc: "Розсіювання диму та аромату шляхом спалювання матеріалів було поширеним у церемоніальних практиках протягом століть. Ладан, агарове дерево, сандалове дерево, мирра та інші товари, придатні для цього використання, зустрічаються в небагатьох місцях, і їх поширення було невід'ємною частиною формування торговельних мереж, таких як Шовковий шлях або влучно названий Шлях пахощів."
  sugar: "Цукор"
  sugar_desc: "Цукор використовувався не тільки як підсолоджувач, але й для консервації їжі. Цукрова тростина була єдиним відомим засобом отримання цукру в той час і спочатку вирощувалася на деяких середземноморських островах. Але трудомісткий плантаційний спосіб виробництва в Америці, особливо на Карибських островах, незабаром перемістить основні джерела виробництва за океан."
  tobacco: "Тютюн"
  tobacco_desc: "Тютюн був невідомий у Європі доки його не завезли з Америки наприкінці XVI століття. Він швидко став модою для вищих класів, які могли собі це дозволити, та забезпечив швидке і прибуткове економічне зростання британських колоній у Північній Америці, а також у португальській Бразилії. Ніхто не знав, що вони в ньому містили, але просто не могли припинити його курити."
  tea: "Чай"
  tea_desc: "Чай був важливим розкішним напоєм у Китаї, Індії та Південно-Східній Азії. Його часто використовували в релігійних або соціальних ритуалах. Англійці популяризували чай у Європі. Хоча він ніколи не вважався таким благородним напоєм, як кава, він все одно приносив великий прибуток лише через те, що світові запаси були низькими."
  cocoa: "Какао"
  cocoa_desc: "Какао використовувалося як стимулятор правителями ацтеків, інків та індіанців з раннього середньовіччя. Воно стало популярним у Європі на початку 16 століття, коли іспанці імпортували його зі своїх американських колоній. Какао стало розкішшю, яку насолоджувалися багатії."
  coffee: "Кава"
  coffee_desc: "Кава була відкрита в північно-східному регіоні Ефіопії, а вирощування кави вперше відбулося на півдні Аравії. З Близького Сходу кава поширилася до Італії в XVII столітті, а потім була завезена до решти Європи. Кава стала більш широко прийнятою після того, як її визнав християнським напоєм Папа Климент VIII у 1600 році, незважаючи на заклики заборонити \"мусульманський напій\"."
  fiber_crops: "Волокнисті культури"
  fiber_crops_desc: "Багато різних волокнистих культур використовуються по всьому світу для виготовлення безлічі продуктів, таких як вітрила, мотузки, рибальські сітки та одяг. Однак, крім їх використання для виробництва грубих тканин, багато з них також використовуються як основна частина виробництва тонших тканин, що застосовуються в церемоніях, домашньому господарстві та інших місцях. Деякі приклади: коноплі, льон, джут і сизаль."
  ivory: "Слонова кістка"
  ivory_desc: "Слонова кістка була одним з основних експортних товарів Африки, крім рабів. Вона користувалася високим попитом серед європейців для використання у виробництві різноманітних товарів, таких як столові прилади, подарунки, невеликі витвори мистецтва, меблі тощо."
  fur: "Хутро"
  fur_desc: "Хутро було одним з основних елементів високоякісного та теплого одягу. Шкури всіх видів тварин спочатку постачалися з Росії, але дедалі більше з Північної Америки, де бобри були бажаною здобиччю принаймні до кінця XVIII століття."
  lumber: "Деревина"
  lumber_desc: "Деревина була одним з основних будівельних матеріалів для людства протягом усієї його історії. Хоча вона менш довговічна, ніж камінь, її легша доступність зробила її основним елементом будь-якої будівлі в усіх куточках світу. Навіть споруди, призначені бути стійкими, такі як замки та укріплення, також мають свої версії, зроблені з дерева, а не з каменю."
  salt: "Сіль"
  salt_desc: "Сіль необхідна для життя людини. Крім того, це був найпоширеніший засіб консервації їжі на довгі зимові місяці. Вона була або мінеральною, привезеною з шахт у Центральній Європі, або природною, з виробництва соляних боліт шляхом випаровування вздовж сонячних узбереж."
  porcelain: "Порцеляна"
  porcelain_desc: "Порцеляна – це тип кераміки, що характеризується міцністю та напівпрозорістю завдяки склуванню матеріалів, спричиненому високими температурами. Вона була розроблена в Китаї протягом періоду, що почався понад три тисячі років тому, причому справжня порцеляна була розроблена вже майже дві тисячі років тому, і звідти вона зрештою поширилася по всьому світу як дуже затребуваний товар."
  naval_supplies: "Морське приладдя"
  naval_supplies_desc: "Морське приладдя являє собою все необхідне для будівництва суден, від базової деревини до смоли, мотузок, лляних тканин, вітрил та інших матеріалів. Балтика спочатку була основним постачальником, доки Північна Америка не стала альтернативним джерелом поставок на початку XVIII століття. Колоніальна експансія в Америку частково була спрямована на забезпечення поставок таких життєво важливих товарів."
  firearms: "Вогнепальна зброя"
  firearms_desc: "Концепція та поява рушниць змінили динаміку полів битв. Війни, що точилися в Азії та Європі, тепер залежатимуть від культивування, імпорту та використання потужності пороху. Рушниці стали природною еволюцією війни та важливою частиною захисту суверенітету доменів по всій землі."
  cannons: "Гармата"
  cannons_desc: "Хоча облогові знаряддя існували з давніх часів, відкриття пороху призвело до появи зброї з потенційно руйнівною силою, яка ніколи раніше не спостерігалася. Здатність метати більші снаряди з більшою швидкістю та на більші відстані, ніж будь-коли раніше, призведе до того, що всі, крім найміцніших укріплень, швидко впадуть перед ними, не кажучи вже про ефект, який ці снаряди можуть мати при стрільбі по самим арміям."
  glass: "Скло"
  glass_desc: "Скло цінувалося протягом століть як корисний матеріал для мистецтва, архітектури або просто для виготовлення посудин для щоденного використання. Зрештою, з удосконаленням методів скловиробництва, скло також стало вирішальним для наукової галузі оптики, причому скляні лінзи використовувалися у виготовленні окулярів, телескопів та безлічі інших пристроїв із широким спектром застосувань від морської навігації до природничих наук."
  steel: "Сталь"
  steel_desc: "Сталь широко використовується для виготовлення зброї та рушниць. Різні її якості застосовуються для різної зброї: тупа сталь для сокир, а високоякісна сталь для мечів та ножів. Таким чином, сталь також використовується як основний метал для кування обладнання та інструментів."
  cloth: "Тканина"
  cloth_desc: "Тканина представляє різноманітні тканини та одяг, виготовлені з вовни та льону. Пізніше бавовна, імпортована з Індії та Америки, стала основним матеріалом для тканин."
  wine: "Вино"
  wine_desc: "Вина вироблялися з незапам'ятних часів у південних частинах Європи. Воно все ще становило важливий елемент повсякденного раціону, за винятком, можливо, мусульманського світу. Вино не вважалося розкішним продуктом, але, ймовірно, служило приємним полегшенням для сотень до інакше нудного раціону."
  liquor: "Міцний алкоголь"
  liquor_desc: "Міцний алкоголь – це алкогольний напій, що виробляється шляхом дистиляції дуже різних видів продуктів рослинного походження. Дистиляція проводиться для збільшення вмісту алкоголю за об'ємом. Популярними міцними алкогольними напоями, що дистилюються та споживаються по всьому світу, були джин, ром, віскі, горілка, текіла або сьочю."
  paper: "Папір"
  paper_desc: "Папір є необхідністю для всіх видів розширеного бухгалтерського обліку, адміністрування та поширення знань. Процес його виробництва був спочатку розроблений у Китаї, а потім повільно поширився в усі куточки Старого Світу. Значно перевершуючи інші типи матеріалів для письма, такі як пергамент, великомасштабне виробництво паперу вимагає спеціалізованого набору навичок та обладнання, що робить його рідкісним та затребуваним товаром."
  books: "Книги"
  books_desc: "Книги є одними з головних зберігачів людських знань з часів винайдення писемності тисячі років тому. Зазвичай їх виготовляли зі шкіряного пергаменту, паперу та інших рослинних волокон. Винахід та розповсюдження друкарських систем з рухомими літерами в Середньовіччі зробили книги набагато більш поширеними та доступними для населення."
  jewelry: "Коштовності"
  jewelry_desc: "Коштовності являють собою набір регалій або прикрас, які виготовляються вмілими ковалями з дорогоцінного каміння. Їхня цінність часто асоціюється з високим соціальним становищем і навіть королівською владою."
  leather: "Шкіра"
  leather_desc: "Одне з найдавніших відкриттів людства, шкіра широко використовується у виробництві одягу, взуття та прикрас. Її успіх значною мірою пояснюється високим рівнем комфорту та довговічності, що згодом зробило її основним матеріалом для виготовлення меблів для їдальні, оскільки шкіру легко підтримувати, і вона стійка до поглинання запаху їжі."
  tools: "Знаряддя"
  tools_desc: "Виробництво знарядь є основним чинником, який дозволив людському суспільству процвітати. Від простіших і примітивніших кам'яних знарядь до найдосконаліших і найточніших пристосувань, розроблених за допомогою металургії, вони дозволяють подальше створення обладнання та зброї."
  wild_game: "Дичина"
  wild_game_desc: "Дичина є джерелом їжі та харчування для місцевого населення, особливо в малонаселених сільських громадах. Полювання на диких тварин, таких як лосі, олені, кабани та інші, є важливим наріжним каменем суспільства завдяки тому, що вищезгадані тварини забезпечують шкірою, кістками, нутрощами та харчуванням населення."
  fish: "Риба"
  fish_desc: "Риба була одним з найосновніших продуктів харчування для європейського населення в цю епоху, оскільки м'ясо було більше ніж розкішшю для переважної більшості. Рибалки також становили основний рекрутський резерв для торговельних і військових флотів більшості країн."
  wheat: "Пшениця"
  wheat_desc: "Пшениця є рослинним харчовим продуктом, що становив основний раціон для людей і тварин. Її брак завжди призводив до повстань і заворушень. Інші злаки та рослинні харчові продукти пізніше були доповнені помідорами, кукурудзою та навіть картоплею з Америки, пропонуючи ширший вибір як у їжі, так і в різновидах сільськогосподарської продукції."
  maize: "Кукурудза"
  maize_desc: "Культурна рослина, що була спочатку одомашнена в Мексиці тисячі років тому, кукурудза обмінювалася між Новим і Старим світом з прибуттям європейців у XV столітті. Завдяки своїй витривалості, а також вищій харчовій цінності, кукурудза призначена стати світовим товаром."
  rice: "Рис"
  rice_desc: "Рис – це вид зерна, що є основною їжею для Азії з моменту його одомашнення понад десять тисяч років тому. Він також був незалежно одомашнений в Африці понад три тисячі років тому і з того часу є важливим джерелом їжі там. До Європи його привезли через торгівлю з Азією ще в часи класичної античності, хоча там він не зміг витіснити інші види зерна."
  millet: "Витривалі злаки"
  millet_desc: "Витривалі злаки – це різні види злакових трав, які були одомашнені в багатьох частинах світу в різні періоди часу з часів неоліту. Їхня більша стійкість до ґрунтів низької якості та сухих умов зробила їх важливішим джерелом їжі в напівзасушливих регіонах порівняно з іншими видами зерна."
  potato: "Картопля"
  potato_desc: "Картопля – це крохмалистий бульбоплід, одомашнений навколо озера Тітікака корінними народами Анд. Вона сприяла піднесенню Андських цивілізацій завдяки своїй витривалості та високій калорійності. Після Колумбового обміну вона поширилася по всьому світу і до 1750 року стала основним продуктом харчування в Європі, сприяючи її демографічному буму в XIX столітті."
  legumes: "Бобові"
  legumes_desc: "Різні цивілізації протягом історії використовували бобові як значне джерело поживних речовин протягом тисячоліть. Подібно до кукурудзи, європейці познайомилися з новими їх видами з їхнім прибуттям до берегів Нового Світу. Бобові були не тільки ситними, але й дешевими у виробництві та транспортуванні на кораблях."
  livestock: "Худоба"
  livestock_desc: "З самого світанку історії догляд за одомашненими тваринами був одним із головних занять людства. До худоби належить усе: від корів і свиней у багатих сільськогосподарських районах до стад скотарів на великих рівнинах і в пустелях світу."
  lacquerware: "Лаковані вироби"
  lacquerware_desc: "Лаковані вироби були розроблені в Китаї та Японії ще в період неоліту, понад десять тисяч років тому, і полягають у покритті виробів з дерева або металу декоративним шаром лаку, продукту, видобутого зі смоли та воску. Цей лаковий шар потім може бути додатково прикрашений малюнками, різьбленням або посипанням золота чи срібла, перетворюючи його на розкішний товар."
  weaponry: "Зброя"
  weaponry_desc: "Різноманітна зброя, така як мечі, піки та луки, складає основне озброєння кожної армії. Техніки її створення є мистецтвом, відточеним протягом століть. Незважаючи на це, і незалежно від того, наскільки відмінною може бути епоха, зброя завжди залишатиметься життєво важливим інструментом для захисту своєї незалежності."
  amber: "Бурштин"
  amber_desc: "Бурштин – це цінний товар, виготовлений зі скам'янілої смоли, що використовувався переважно у виробництві ювелірних виробів та прикрас. Його основним джерелом були родовища на Прусському узбережжі, вперше згадані в документі XII століття."
  pearls: "Перли"
  pearls_desc: "Перли утворюються всередині різних видів черепашкових молюсків. Отриманий продукт — твердий блискучий об'єкт, в ідеалі круглий, але може мати безліч форм. Їх цінували за красу та використовували як дорогоцінне каміння для прикрас по всьому світу протягом усієї історії людства."
  medicaments: "Ліки"
  medicaments_desc: "Широкий спектр рослинних і тваринних продуктів використовувався протягом історії для лікування всіляких хвороб завдяки їхнім лікувальним властивостям або припущенням про них. Деякі з них ґрунтувалися на дійсних властивостях більше, ніж інші, тоді як в деяких випадках це було більше питанням віри в їхню ефективність."
  alum: "Квасці"
  alum_desc: "Квасці є важливим інгредієнтом у фарбуванні, а також спеціалізуються на процесі дублення. Використовуючись у різних мистецьких та ремісничих контекстах, вони переважно застосовуються у фарбуванні та процесах освітлення. Походячи переважно з регіону Чад, їх продавали на ринках усього ісламського світу, але в пізньому Середньовіччі в Європі почали розробляти інші джерела."
  olives: "Оливки"
  olives_desc: "Оливки збирають з дерев тієї ж назви, які культивуються навколо Середземного моря протягом тисячоліть. Їх високо цінують у гастрономії, особливо оливкову олію, яка використовується для приготування та заправки широкого асортименту страв середземноморської кухні."
  slaves_goods: "Раби"
  slaves_goods_desc: "Раби були торговим товаром ще з часів Античності, але попит різко зріс наприкінці XVI століття, коли раби стали одним з найдешевших джерел робочої сили для європейських плантацій в Америках."
  tropical_wood: "Тропічна деревина"
  saltpeter: "Селітра"
  saltpeter_desc: "Селітра відома з античності, а її використання було різноманітним, наприклад, як добриво або як сіль для обробки м'яса. Однак саме винахід пороху та вогнепальної зброї в Середньовіччі справді підвищив її значення, оскільки вона є одним з її основних компонентів, разом з деревним вугіллям та сіркою. Добувана у великих кількостях по всьому світу, ця мінеральна речовина набуде сумнозвісної репутації."
  fine_cloth: "Витончена тканина"
  fine_cloth_desc: "Витончений одяг традиційно був показником статусу для еліт та заможних класів. Текстильні вироби, такі як дамаски, мусліни чи парча, продавалися та відтворювалися по всьому світу як дуже прибутковий бізнес у Середні та Нові віки."
  elephants: "Слони"
  elephants_desc: "Слони використовувалися у війні з давніх часів в Індії, Південно-Східній Азії, на Близькому Сході та в Північній Африці. Використання слонів зберігалося в деяких з цих регіонів до Середньовіччя, хоча поява порохової війни в Новий час перевершила їхню корисність у битві."
  beer: "Пиво"
  beer_desc: "Пиво було наріжним каменем гастрономії з часу його першого варіння в неоліті. Воно стало широко поширеним напоєм у Середньовіччі й було об'єктом найстарішого регулювання якості харчових продуктів, що досі використовується, — баварського «Райнгайтсгеботу»."
  fruit: "Фрукти"
  fruit_desc: "Фрукти охоплюють широкий спектр продуктів, що ростуть на деревах, таких як цитрусові, гіркі та солодкі апельсини, яблука та інше. Для багатьох ці продукти були б недосяжними й джерелом харчування лише для еліти. Майже кожен регіон світу є домівкою для різних видів фруктів, а поява світової торгівлі згодом познайомить різні народи з різноманітними новими фруктами."
  marble: "Мармур"
  marble_desc: "Мармур використовувався у скульптурах та будівництві з часів Античності, вважаючись розкішним матеріалом завдяки своєму вигляду та пластичності. Деякі з найкращих творів мистецтва, створені художниками епохи Відродження та бароко, такими як Мікеланджело чи Берніні, виготовлені з мармуру."
  mercury: "Ртуть"
  mercury_desc: "$mercury$ використовується в медицині, але також матиме велике значення для очищення золотої та срібної руди нижчої якості, щоб зробити її прибутковою."
  masonry: "Кам'яна кладка"
  masonry_desc: "Техніки будівництва бувають різних форм та розмірів. Можливість виготовляти менші елементи регулярного розміру та форми для використання в будівництві значно підвищує не лише ефективність зведення будівель, а й їхню довговічність після спорудження."
  beeswax: "Бджолиний віск"
  beeswax_desc: "Бджоли були друзями людства з доісторичних часів, а їхній віск використовувався для багатьох цілей. Від свічок до форм, від полірувальних засобів до дощечок для письма – присутність бджолиного воску в людському суспільстві є постійною."
  saffron: "Шафран"
  saffron_desc: "Відомий з давніх часів, шафран використовувався не лише для кулінарних цілей, а й як джерело традиційних ліків та барвник для одягу, попри його високу вартість."
  pepper: "Перець"
  pepper_desc: "Хоча існує багато видів рослин, відомих як перець, усі вони мають однакові властивості гострого смаку, що робить перець ідеальним для використання як приправи, а також як компонент традиційних ліків."
  cloves: "Гвоздика"
  cloves_desc: "Гвоздика – це ароматичні квіткові бруньки дерева, що росте на Молуккських островах. Вона стала однією з найцінніших і найдорожчих спецій в євразійських торгових мережах, спонукавши європейців до пошуку нових джерел постачання цієї та інших спецій у Пізньому Середньовіччі."
  chili: "Чилі"
  chili_desc: "Деякі різновиди рослин, що походять з Центральної та Південної Америки, славляться своєю гостротою та здатністю приправити будь-яку страву та зробити її палкою. Вирощуваний з давніх часів в Америці, його численні сорти з широким діапазоном смаків та рівнів гостроти роблять його дуже затребуваною спецією."
  pottery: "Гончарство"
  pottery_desc: "Одна з найдавніших ознак людського суспільства, здатність перетворювати глину на різні об'єкти, є одним із ключових чинників розвитку людства. Від грубих глиняних ваз доісторичних часів до складніших форм, гончарство є повсюди в будь-якій культурі."
  furniture: "Меблі"
  furniture_desc: "Меблі задовольняють потребу людей мати більше, ніж просто дах над головою. Від найпростіших ліжок і столів до вишуканіших, від простого дерева або навіть каменю до дорожчих матеріалів, меблі слугуватимуть будь-якій меті та пасуватимуть до будь-якого смаку та бюджету."
  elephant_auxiliary_construction: "Будівництво допоміжних слонів"
  elephant_cavalry_construction: "Будівництво слонової кавалерії"
  elephant_infantry_construction: "Будівництво слонової піхоти"
  a_tribesmen_construction: "Будівництво племінників"
  a_warriors_construction: "Будівництво воїнів"
  a_champions_construction: "Будівництво чемпіонів"
  a_chieftains_construction: "Будівництво вождів"
  elephant_auxiliary_maintenance: "Утримання допоміжних слонів"
  elephant_cavalry_maintenance: "Утримання слонової кавалерії"
  elephant_infantry_maintenance: "Утримання слонової піхоти"
  a_tribesmen_maintenance: "Утримання племінників"
