  tribes_estate_chibaloob: "Ч'ібало'об"
  formal_guilds: "Формальні гільдії"
  formal_guilds_desc: "Федерації та асоціації купців вільно існували протягом усієї історії нашої нації. Однак ми могли б заспокоїти найвпливовіших торговців на наших ринках, формалізувавши їхню участь у централізованому та офіційно визнаному корпусі. Такий привілей, безсумнівно, вплине як на нашу зовнішню, так і на внутрішню політику."
  trade_monopolies: "Торгові монополії"
  trade_monopolies_desc: "Надання наймогутнішим купцям у наших країнах ексклюзивних торгових прав на наші торгові товари значно збільшить вплив наших найвидатніших торговців. Ця політика вплине на наше національне ставлення до іноземних купців."
  control_over_monetary_policy: "Контроль над монетарною політикою"
  control_over_monetary_policy_desc: "Фінанси нашої нації є темою великої важливості, оскільки ми прагнемо покращити та вдосконалити наші книги. Можливо, було б гарною ідеєю довірити це завдання заможним членам нашого суспільства, а натомість надати їм знижене оподаткування на їхні товари та активи."
  building_rights: "Права на будівництво"
  building_rights_desc: "Розвиток наших поселень і міст є дорогою справою. Надавши права на будівництво місцевому населенню, ми зрештою зменшимо загальну кінцеву вартість розвитку. Однак надання людям такої дозволу значно збільшить їхній вплив."
  burghers_royal_burgh_commissioners: "Комісари Королівських Бургів"
  burghers_royal_burgh_commissioners_desc: "Комісари Королівських Бургів, що представляють бургів [ShowEstateTypeName('crown_estate')], заснованих [GetCountry('SCO').GetName], регулярно збираються, щоб захищати свої привілеї, регулювати торгівлю та радити правителю нації. Завдяки своїй колективній владі в Конвенції Королівських Бургів вони забезпечують, щоб торгові громади [GetCountry('SCO').GetNameWithNoTooltip] залишалися життєво важливими для управління, економіки та права, виступаючи противагою владі $nobles_estate$ та [ShowEstateTypeName('clergy_estate')]."
  burghers_land_rights: "Земельні права [ShowEstateTypeName('burghers_estate')]"
  burghers_land_rights_desc: "Закони щодо землеволодіння нещодавно були предметом гарячих дебатів у суді. Ми розширимо права землеволодіння наших [ShowEstateTypeName('burghers_estate')] з метою зробити різні адміністративні гільдії більш поступливими в обмін на отримання більшої влади."
  commercial_advisory_council: "Комерційна дорадча рада"
  commercial_advisory_council_desc: "Торгівля є життєвою силою нашої економіки. Таким чином, ми повинні забезпечити, щоб наш глава держави був підтриманий лише найздібнішими та найобізнанішими особами, вправними у питаннях морської та сухопутної торгівлі. Це принесе користь нашим комерційним можливостям вдома та за кордоном."
  building_roads_rights: "Права на будівництво доріг"
  building_roads_rights_desc: "Дозволити багатим [ShowEstateTypeName('burghers_estate')] розвивати нашу інфраструктуру, будуючи [Concept('roads', 'CONCEPT_PLACEHOLDER')|e], що принесе користь як нашій економіці, що постійно розширюється, так і самим торговцям."
  clergy_literacy_rights: "Права на релігійну грамотність"
  clergy_literacy_rights_desc: "Наша релігія має багато пов'язаних літературних творів, що містять практики, мораль та принципи нашої віри. Наш [ShowEstateTypeName('clergy_estate')] повинен мати необмежений доступ до писаного слова, аби вивчати святі тексти нашої віри."
  clergy_strengthen_faith: "Зміцнена віра"
  clergy_strengthen_faith_desc: "Віра — це те, що тримає наш народ єдиним навіть у найскладніші часи. Завдяки зусиллям нашого [ShowEstateTypeName('clergy_estate')] наш народ вийшов зі свого останнього випробування непохитним у своїх переконаннях і більш вірним, ніж раніше!"
  clergy_lecture_oaths: "Присяги лекцій"
  clergy_lecture_oaths_desc: "Наші стародавні університети славляться тим, що випускають найвпливовіші уми в країні, тож їх необхідно захищати та контролювати. Випускники присягають ніколи не читати лекції за межами стін цих осередків знань."
  clergy_enforced_unity: "Примусова релігійна єдність"
  clergy_enforced_unity_desc: "Наша країна є домом для людей багатьох різних вірувань, і співіснування стає дедалі складнішим, що, своєю чергою, послаблює наш уряд. Ми повинні запровадити правило, згідно з яким наші піддані можуть сповідувати лише нашу Державну Релігію, аби придушити цю роз'єднаність — і зміцнити нашу владу."
  clergy_military_orders: "Військові ордени"
  clergy_military_orders_desc: "Військові ордени були створені після початку Хрестових походів як засіб поєднання дисципліни та відданості ченців з військовою майстерністю та досвідом лицарів. Вони поширилися по всьому Християнському світу, але інші релігії також розробили подібні ордени під час ведення релігійних війн."
  clergy_land_rights: "Релігійні права на землю"
  clergy_land_rights_desc: "Ми вирішили надати вірним право володіти приватною землею. Це зробить їх могутнішими та впливовішими, але також дозволить постійнішу присутність святих мужів у нашому розпорядженні."
  clerical_advisory_council: "Релігійна дорадча рада"
  clerical_advisory_council_desc: "Ми вирішили сформувати раду радників, що повністю складається зі святих [ShowEstateTypeName('clergy_estate')]. Це зробить їх впливовішими, але також самовдоволенішими, оскільки вони зможуть висловлювати свої занепокоєння безпосередньо нам і бачити свої інтереси задоволеними."
  clergy_powerful_dioceses: "Могутні дієцезії"
  clergy_powerful_dioceses_desc: "Управління нашою територією перебуває в руках держави. Однак організація [ShowEstateTypeName('clergy_estate')] не відповідає нашим провінційним системам. Натомість вони організовуються в дієцезії, які мають значну владу та вплив на внутрішні справи нашої країни."
  nobles_land_rights: "Права на землю"
  nobles_land_rights_desc: "Це відображає привілеї, які наш [ShowEstateTypeName('nobles_estate')] має над землями, якими він править, та людьми, що їх населяють. Серед цих прав, $nobles_estate$ зазвичай може оподатковувати [ShowEstateTypeName('peasants_estate')], що проживають на їхніх землях, призивати їх для формування ополчення або самостійно вершити правосуддя. Ці володіння зазвичай є спадковими."
  auxilium_et_consilium: "Auxilium et Consilium"
  auxilium_et_consilium_desc: "[ShowEstateTypeName('nobles_estate')] отримують привілеї, але також мають зобов'язання перед своїм Сеньйором. Вони повинні надавати війська — #italic auxilium#! — та підтримувати укріплення й інфраструктуру на землях, якими вони правлять, але також повинні давати пораду — #italic consilium#! — своєму Сеньйору за запитом."
  noble_serfdom_rights: "Кріпацтво під контролем $nobles_estate$"
  noble_serfdom_rights_desc: "Серед прав, які [ShowEstateTypeName('nobles_estate')] мають над [ShowEstateTypeName('peasants_estate')] на своїх землях, вони можуть оподатковувати їх, призивати до війська та вершити над ними правосуддя за потреби. Селяни, що живуть за таких умов, стають кріпаками і зазвичай прив'язані до землі, яку вони обробляли."
  noble_fortification_licenses: "Ліцензії на укріплення"
  noble_fortification_licenses_desc: "Одним із наслідків нашої феодальної системи стало поширення замків та фортів, збудованих [ShowEstateTypeName('nobles_estate')] як засіб збільшення їхньої влади та авторитету. Це мало подальші наслідки для нашого суспільства, оскільки $nobles_estate$ можуть закріплюватися та укріплюватися у своїх успадкованих володіннях."
  noble_marriage_rights: "Права на королівський шлюб"
  noble_marriage_rights_desc: "[ShowEstateTypeName('nobles_estate')] нашої країни вважаються рівними нашим правителям. Тому вони мають право одружуватися з правлячою родиною, що згодом збільшує їхній вплив і владу при дворі, а також в уряді."
  noble_leaders_only: "Лише $nobles_estate$ як лідери"
  noble_leaders_only_desc: "Наші [ShowEstateTypeName('nobles_estate')] вважають, що лише вони здатні очолювати наші армії та флоти через події минулого. Однак це дратує членів інших станів, які вважають $nobles_estate$ зарозумілими дурнями."
  banal_lordship: "Банальне панство"
  banal_lordship_desc: "Цей тип маноріального панування розвинувся за феодальної системи і ґрунтується на «бані», тобто владі лорда командувати своїми орендарями, віддавати їм накази та карати їх. Це призвело до того, що [ShowEstateTypeName('nobles_estate')] мають більшу владу у своїх володіннях, оскільки саме вони здійснюють правосуддя на своїх територіях, а також можуть оподатковувати [ShowEstateTypeName('peasants_estate')] за більшість їхньої економічної діяльності."
  primacy_of_nobility: "Примат $nobles_estate$"
  primacy_of_nobility_desc: "[ShowEstateTypeName('nobles_estate')] нашої країни виявилися ключовими союзниками, оскільки вони підтримують більшість наших підприємств і є основою наших армій. З цієї причини вони вважають себе рівними нам, і вони стали настільки важливими для уряду, що ми повинні радитися з ними перед прийняттям важливих рішень."
  elaborate_court_ceremonies: "Вишукане придворне життя"
  elaborate_court_ceremonies_desc: "Ми вирішили надати придворному життю нашої країни найвишуканішої формальності, яку тільки можна уявити. Оскільки очікується, що кожен, хто щось значить, буде присутній при нашому правителі в столиці, це обмежує змову, яку $nobles_estate$ можуть плести проти нас, але це коштує дорого."
  tysiatskii_privilege: "Посада тисяцького"
  tysiatskii_privilege_desc: "Тисяцькі – це військові лідери, обрані з бояр. Хоча в інших державах їхні обов'язки полягають переважно в командуванні нашими солдатами, наша посада тисяцького виконує додаткові функції як представник [ShowEstateTypeName('peasants_estate')], як виконуючий обов'язки судді в комерційному суді та як наглядач за нашими укріпленнями."
  the_ryad_privilege: "Ряд"
  the_ryad_privilege_desc: "$the_ryad_privilege$ – це назва договору, підписаного між боярами та державою. Він захищає інтереси та повноваження бояр, а також визначає обов'язки та права князя."
  bashtinas_and_pronijas_grants: "Баштинні гранти"
  bashtinas_and_pronijas_grants_desc: "Система земельних грантів для нашої еліти натхненна візантійською системою #italic Pronoias#!. Вона надає їм широкий спектр привілеїв та зобов'язань від імені їхніх володінь, коли йдеться про управління землями, орендованими ними урядом."
  zupa_districts: "Жупні округи"
  zupa_districts_desc: "Розподіл і поділ нашого суспільства детально описані в різних правових рамках, що оточують нашу адміністративну гілку. Найважливішим аспектом нашого суспільства та бюрократії є поділ наших провінцій на жупні округи, спрямований на покращення вирішення місцевих справ."
  vlastele_krayishnik: "Властеле Країшник"
  vlastele_krayishnik_desc: "Наші прикордонні землі повинні бути завжди надійно охоронені. З цією метою система #italic krayine#! розділяє наші кордони на добре керовані округи під командуванням місцевих лордів, відомих як #italic Vlastele Krayishnik#!, які відповідають за утримання та захист людей своїх провінцій."
  feudal_mercenary_contracts: "Феодальні найманські контракти"
  feudal_mercenary_contracts_desc: "Армії, зібрані нашим народом, часто залишають бажати кращого. Щоб захистити наш народ і перевершити наших суперників, ми повинні покладатися на іноземних найманців, чиї контракти будуть керуватися елітними членами нашого суспільства."
  tax_exemption: "Звільнення від податків"
  tax_exemption_desc: "Нашій вірі служать побожні чоловіки та жінки, які присвячують своє життя турботі та духовному благополуччю нашого народу. Цілком природно, що вони не змушені платити жодної десятини уряду."
  peasants_represented_in_parliament: "Представлені в парламенті"
  peasants_represented_in_parliament_desc: "Надання нашому нижчому населенню місця в наших головних зборах дасть голос [ShowEstateTypeName('peasants_estate')] нашої країни та забезпечить їм більші права."
  peasants_free_peasantry: "Вільне пересування для простолюду"
  peasants_free_peasantry_desc: "Люди — найцінніший актив будь-якої держави. Без них голод і розбрат були б нормою. Проте еліти бачать їх лише як власність — як майно, яке слід накопичувати на своїх неправедно здобутих землях!\nНадавши масам вільне пересування, їхня доля знову опиниться в їхніх власних руках, дозволяючи їм покинути землі своїх колишніх господарів і перебратися на нові, більш плідні поля."
  peasant_owns_their_food: "Засоби виробництва"
  peasant_owns_their_food_desc: "Вищі класи — це стерв'ятники, що пожирають плоди важкої селянської праці і нічого не дають взамін. Захопивши засоби виробництва, ми візьмемо майбутнє нашої нації та її народу у власні руки!"
  peasants_fewer_levies: "Менше ополченців"
  peasants_fewer_levies_desc: "[ShowEstateTypeName('peasants_estate')] — це життєва сила нашої держави. Вони годують наше населення, виготовляють матеріали для наших будівель і виробляють товари, якими торгують наші [ShowEstateTypeName('burghers_estate')].\nХоча війна — це час великих труднощів для нашої держави, ми повинні докласти зусиль, щоб утримати наших [ShowEstateTypeName('peasants_estate')] подалі від конфлікту, якщо хочемо уникнути голоду та економічного колапсу після війни."
  peasants_yeomanry: "Йоменство"
  peasants_yeomanry_desc: "Вільні землевласники з невеликими земельними володіннями отримують підвищені права в обмін на прийняття деяких обов'язків дрібних дворян, включаючи виконання вищих очікувань щодо захисту королівства."
  creaghts_privilege: "Креахти"
  creaghts_privilege_desc: "Багато представників нижчих класів належать до пастуших #italic креахтів#!, груп кочових скотарів. Вони мігрують сезонно на нові пасовища і названі на честь тимчасових жител, які вони будують, переміщаючись з місця на місце. Оскільки вони не прив'язані до певної землі, вони існують поза будь-якою феодальною структурою."
  coign_and_livery_privilege: "Койн і ліврея"
  coign_and_livery_privilege_desc: "Ця система, також відома як #italic боннахт#!, вимагає, щоб наші менші вожді розміщували наших вірних солдатів у своїх володіннях за власний рахунок."
  peasants_allowed_weapons_privilege: "Загальні ополчення"
  peasants_allowed_weapons_privilege_desc: "Простолюду дозволено зберігати свою зброю, яку вони потім повинні використовувати, коли їх закликають на службу в ополчення. Це збільшує попит на зброю на ринку."
  gradozadanje_and_gradobljudenlje_rights: "Градозадання та градоблюдення"
  gradozadanje_and_gradobljudenlje_rights_desc: "Наш домен є домом для багатьох укріплень і грізних фортець. Витрати на утримання та гарнізонування цих споруд були довірені місцевому населенню та міщанам."
  peasants_autonomous_villages: "Автономні села"
  peasants_autonomous_villages_desc: "У сільських поселеннях нашої держави існує приказка: «Закони суверена закінчуються біля воріт села». Люди в наших поселеннях організовуються незалежно від центральної влади цієї країни."
  clergy_protected_faith: "Захищена віра релігійних"
  clergy_protected_faith_desc: "Святі чоловіки та жінки отримали Релігійний Захист і тому звільнені від будь-яких спроб навернення з боку держави."
  burghers_protected_faith: "Захищена віра заможних"
  burghers_protected_faith_desc: "Заможні члени нашого суспільства отримали Релігійний Захист і тому звільнені від будь-яких спроб навернення з боку держави."
  nobles_protected_faith: "Захищена віра еліт"
  nobles_protected_faith_desc: "Еліти отримали Релігійний Захист і тому звільнені від будь-яких спроб навернення з боку держави."
  peasants_protected_faith: "Захищена віра простолюду"
  peasants_protected_faith_desc: "Простолюдини отримали Релігійний Захист і тому звільняються від будь-яких спроб навернення з боку держави."
  reduced_from_military_obligations: "Зменшені Військові Зобов'язання"
  reduced_from_military_obligations_desc: "В обмін на їхню вірність нашій центральній владі, ми можемо зменшити або скасувати військові зобов'язання для тих, хто приймає життя віри в обіймах божественного."
  office_of_the_sankar_zouma_privilege: "Управління Санкар-Зума"
  office_of_the_sankar_zouma_privilege_desc: "Санкар-Зума – це престижна посада, надана [GetCountry('MAL').GetGovernment.GetEstateName('nobles_estate')] найвищою владою в країні. Її роль, подібно до Фаріма-Сура, полягає у здійсненні влади вздовж усіх торгових шляхів через південний кордон."
  office_of_the_farima_soura_privilege: "Управління Фаріма-Сура"
  office_of_the_farima_soura_privilege_desc: "Відповідальна за охорону північного кордону, Фаріма-Сура контролює рух через Сахарський кордон та наглядає за безпекою і швидким проходженням усього торговельного трафіку в межах і за межами наших кордонів."
  liberum_veto: "Liberum Veto"
  liberum_veto_desc: "Це вводить вимогу одностайного голосування в $country_flavor_parliament_sejm$. Будь-який шляхтич міг зупинити будь-яке голосування чи законодавство, вставши і вигукнувши #italic Sisto activitatem!#! («Я зупиняю діяльність!») латиною, або #italic Nie pozwalam!#! («Я не дозволяю!») польською."
  visconti_city_states: "Міста-держави Вісконті"
  visconti_city_states_desc: "[GetCountry('MLO').GetLongName] під владою родини Вісконті відзначається роздробленим і децентралізованим станом. Різні видатні члени дому Вісконті, включаючи Аццоне, Джан Галеаццо та Бернабо, змагаються за верховенство за допомогою різних тактик, таких як союзи, зради та військові кампанії. Ця постійна боротьба за владу постійно послаблює центральну владу [GetCountry('MLO').GetLongNameWithNoTooltip] і сприяє стану нестабільності та фрагментації в регіоні."
  milanese_cloth_guilds_privileges: "Міланські Суконні Гільдії"
  milanese_cloth_guilds_privileges_desc: "Наша цінна суконна промисловість тримається на плечах найкращих майстрів у всій [ShowRegionName('italy_region')]. Довіривши їхні регуляції та виробничі лінії нашим [ShowEstateTypeName('burghers_estate')], ми досягнемо рекордних прибутків та продуктивності за незначну ціну надання нашим купецьким гільдіям певного впливу."
  novgorod_ivans_hundred: "Іванова Сотня"
  novgorod_ivans_hundred_desc: "Голови Іванової Сотні, нашої місцевої купецької гільдії, є постійними членами комерційного суду [ShowLocationName('novgorod')] та правлячої ради Новгородської Республіки. Завдяки їхній політичній присутності та угодам, які вони уклали з [ShowEstateTypeName('nobles_estate')], наша нація, безсумнівно, насолоджуватиметься тривалою та успішною торгівлею."
  ordinance_of_laborers: "Ордонанс про Робітників"
  ordinance_of_laborers_desc: "На велике розчарування простолюдинів, цей ордонанс був прийнятий, щоб запобігти зростанню витрат на заробітну плату [ShowEstateTypeName('peasants_estate')], ефективно фіксуючи заробітну плату на дочумних рівнях. Роботодавцям також заборонено наймати надлишкових працівників, і є обов'язковим, щоб усі особи віком до шістдесяти років працювали."
  masaniellos_fight: "Бій Мазаньєлло"
  masaniellos_fight_desc: "Вимоги рибалки Мазаньєлло представлені в цьому привілеї, який захищає простий народ від тиранічних податків і підтримує його у випадку економічної катастрофи."
  peasants_no_poll_tax_privilege: "Звільнення від Подушного Податку"
  peasants_no_poll_tax_privilege_desc: "Після повстання Вота Тайлера каральний подушний податок скасовується, і надаються гарантії, що його не буде знову запроваджено."
  land_owning_farmers: "Селяни-Землевласники"
  land_owning_farmers_desc: "[GetCountry('SWE').GetAdjective] селяни займають унікально сильну позицію порівняно зі своїми однолітками в більшій частині феодальної [ShowContinentName('europe')]. Вони володіють своєю землею безпосередньо, сплачують податки безпосередньо короні та часто мають право голосу в місцевих зборах, що надає їм певну автономію та правовий захист. Ці фермери не були кріпаками; багато з них озброєні та служать у ополченні. Їхні права ґрунтуються на давньому звичаєвому праві, а їхня відносна незалежність є основоположним елементом шведського сільського суспільства."
  general_privilege: "Загальний Привілей [GetCountry('ARA').GetNameWithNoTooltip]"
  general_privilege_desc: "Загальний Привілей – це перелік угод та законів, які зобов'язують монарха гарантувати традиційні шляхетські права та просити дозволу парламенту перед оголошенням війни."
  union_privilege: "Привілей Унії"
  union_privilege_desc: "Попри опір [ShowEstateTypeName('crown_estate')], #italic 'Унія Арагону'#! силоміць запровадила цей набір угод у закон. Він надає широкі права $ARA_ADJ$ [ShowEstateTypeName('nobles_estate')] та міському населенню за рахунок традиційних повноважень правителя."
  justicia_de_aragon: "Хустісія Арагону"
  justicia_de_aragon_desc: "Хустісія Арагону — це потужна правова та судова посада в [GetCountry('ARA').GetLongName], створена для підтримки регіональних законів, врегулювання суперечок та захисту прав підданих від королівського свавілля."
  formalized_oath: "Формалізована Присяга на Вірність"
  formalized_oath_desc: "Монархія пов'язана формалізованою угодою, яка вимагає визнання та дотримання прав і свобод станів, перш ніж може бути складена присяга на вірність."
  double_sabbath: "Обидва Дні Суботні"
  double_sabbath_desc: "Всупереч основній доктрині, стародавня традиція нашого народу полягала у дотриманні як суботи сьомого дня, так і Дня Господнього в неділю. Цей привілей кодифікує ці звичаї в закон і захищає селянство від переслідувань."
  signoria_council: "Рада Синьйорії"
  signoria_council_desc: "Синьйорія [GetCountry('FLO').GetName] — це назва ради з дев'яти осіб, яка керує містом, її члени обираються з різних гільдій. Кожні два місяці проводиться лотерея для переобрання членів ради. Це постійне перетасовування забезпечує перевагу інтересів Республіки над особистими. Однак той факт, що всі її члени походять з гільдій, призводить до того, що одні й ті ж родини завжди залишаються при владі."
  florence_guilds: "[GetCountry('FLO').GetNameWithNoTooltip] Гільдії"
  florence_guilds_desc: "Різні ремісники та купці [GetCountry('FLO').GetName] традиційно об'єднуються в різні гільдії. Це забезпечує не лише високий стандарт якості продукції, але й запобігає недобросовісній конкуренції. Однак влада та вплив, які ці гільдії мають в результаті, є беззаперечними.\n\nЦе розблоковує [Concept('law', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('guilds_of_florence')]."
  scholar_officials: "Вчені Чиновники"
  scholar_officials_desc: "Наш елітний клас складається з мудрих урядовців та політиків, які здобули свої завидні посади, довівши свої знання на національних іспитах.\nРодини цих чиновників можуть зберігати свій привілейований статус, доки вони висувають принаймні одного чиновника кожні три покоління."
  petty_bureaucracy: "Дрібна Бюрократія"
  petty_bureaucracy_desc: "Основний бюрократичний корпус нашої країни складається з високоосвічених фахівців та адміністраторів, які керують щоденними завданнями та підтримують структуру уряду."
  powerful_italian_families: "Могутні [ShowCultureGroupNameWithNoTooltip('italian_group')] Родини"
  powerful_italian_families.tt: "Наша столиця НЕ знаходиться в регіоні [ShowRegionNameWithNoTooltip('italy_region')]"
  powerful_italian_families_desc: "Анархія та непокора в місті [ShowLocationName('rome')] та інших [ShowCultureGroupName('italian_group')] маєтках значно зросли після того, як [GetCountry('PAP').GetGovernment.GetRulerTitle] переніс двір до [ShowLocationName('avignon')]. Тепер ці території перебувають під контролем могутніх італійських родин, таких як [ShowDynastyName('colonna')] та [ShowDynastyName('orsini')], які майже повністю незалежні від [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  french_cardinals: "[ShowCultureGroupNameWithNoTooltip('french_group')] Кардинали"
  french_cardinals_desc: "Після смерті [GetCharacter('pap_boniface_viii').GetName] та перенесення двору до [ShowLocationName('avignon')], більшість кардиналів, що стікаються туди, є [ShowCultureGroupName('french_group')] і перебувають під впливом [GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCountry('FRA').GetName], чия влада над [GetCountry('PAP').GetName] не дозволить повернутися до [ShowLocationName('rome')]."
  cardinal_lead_guilds: "Гільдії під Керівництвом Кардиналів"
  cardinal_lead_guilds_desc: "Гільдії та інші об'єднання купців і ремісників є необхідним злом. Призначивши благочестивого кардинала їхнім керівником, ми забезпечимо, щоб жодна організація не відхилялася від шляху Божого, і щоб гріх жадібності не затьмарював розум наших [ShowEstateTypeName('burghers_estate')]."
  kbo_kaigama: "Кайгама"
  kbo_kaigama_desc: "Кайгама — це губернатор наших південних територій і головнокомандувач армії. Маючи владу, енергію та величезний вплив, [ShowEstateTypeName('nobles_estate')], які обіймають цей титул, іноді навіть відігравали роль творців королів, оскільки вони можуть вирішувати, хто буде правити."
  kbo_yerima: "Єріма"
  kbo_yerima_desc: "Єріма є намісником наших північних територій і відповідає за збір працездатних бійців для формування нижчих каст наших збройних сил. Хоча він не має такого великого впливу, як Кайгама, ми все ж можемо покластися на його вплив при наборі солдатів, оскільки ми продовжуємо боротися як із зовнішніми, так і з внутрішніми ворогами."
  kbo_lake_chad_trade_privilege: "Контроль над [ShowLocationNameWithNoTooltip('lake_chad')]"
  kbo_lake_chad_trade_privilege_desc: "На берегах [ShowLocationName('lake_chad')] наші [ShowEstateTypeName('burghers_estate')] взаємодіють та обмінюються товарами з безліччю народів із далеких земель. Цей обсяг торгівлі, повністю під нашим контролем, є життєвою силою нашої економіки та основою нашої національної стабільності."
  kbo_serfdom_economy: "Кріпосна економіка"
  kbo_serfdom_economy_desc: "Наша імперія була побудована на спинах наших підкорених ворогів. Потік примусової праці в нашій нації є наріжним каменем нашої економіки, а часті набіги та завоювання ще більше підживлюють наше багатство та владу."
  amenokal_salt_traders: "Соляні торговці Аменокаль"
  amenokal_salt_traders_desc: "Досвідчені ветерани сахарської торгівлі, ці особи контролюють та керують караванами [ShowGoodsName('salt')], що перетинають негостинні пустелі."
  kbo_cima: "Феоди Чіма"
  kbo_cima_desc: "В нагороду за їхні перемоги на полі бою ми надаємо прикордонні території нашим військовим командирам. Це допомагає зміцнити їхню лояльність до нас і покращує вплив нашої столиці на наші віддалені прикордонні землі."
  clergy_religious_state: "Релігійна адміністрація"
  clergy_religious_state_desc: "Зробивши питання релігії нашим найважливішим пріоритетом, ми перетворимо нашу націю на більш згуртовану цілісність."
  clergy_papal_emissary: "Папський емісар"
  clergy_papal_emissary_desc: "Легати та інші емісари [GetCountry('PAP').GetGovernment.GetRulerTitle] є дуже бажаними на нашій території. Більше того, ми також зобов'язуємося підкорятися їхньому рішенню і ніколи не втручатися у відносини між нашим місцевим [ShowEstateTypeName('clergy_estate')] та [GetCountry('PAP').GetGovernment.GetRulerTitleWithNoTooltip]."
  freedom_of_interpretation: "Свобода інтерпретації"
  freedom_of_interpretation_desc: "Багато вчень нашої віри подібні до прохолодної тіні під великим деревом, де кожен може відпочити та освіжитися. Під цим захисним покровом мудрості наш народ заохочується глибоко розмірковувати над питаннями віри, а також розширювати та урізноманітнювати наші догмати. Ця свобода інтерпретації дозволить нашій релігії адаптуватися до різноманітних спільнот, зберігаючи при цьому свої основні принципи."
  expansionist_zealotry: "Експансіоністський фанатизм"
  expansionist_zealotry_desc: "Вести війну за нашу віру — це божественне покликання всіх істинних віруючих!"
  religious_diplomats: "Релігійні дипломати"
  religious_diplomats_desc: "Добру дипломатію важко підтримувати; достатньо кількох простих непорозумінь, щоб відносини між двома країнами повністю зіпсувалися. Відправляючи особливо побожних дипломатів до наших братів по вірі, ми покладатимемося на силу цієї спільності для побудови плідних, тривалих політичних відносин."
  promote_cultural_unity: "Сприяти культурній єдності"
  promote_cultural_unity_desc: "Основою сильного та згуртованого суспільства є, по суті, просування однієї культури для об'єднання всього нашого народу та захисту його від іноземних впливів."
  embellish_great_works_of_faith: "Прикрашати великі твори віри"
  embellish_great_works_of_faith_desc: "Немає кращого способу продемонструвати нашу великодушність і силу віри, ніж звести великі твори або архітектурну пишність, присвячені чистоті божественності."
  dhimmi_land_rights: "Гарантувати місцеві земельні права"
  dhimmi_land_rights_desc: "Дім людини — її притулок. Гарантуючи майнові права іновірним членам нашого суспільства, ми встановимо зв'язок довіри між ними та нашою адміністрацією."
  dhimmi_lighter_taxes: "Полегшене оподаткування"
  dhimmi_lighter_taxes_desc: "Секрет стабільного багатоконфесійного суспільства полягає у справедливому ставленні та щирій доброті — і, конкретніше, у податкових пільгах. Зменшивши податки для іновірних підданих під нашим стягом, ми забезпечимо їхню лояльність у майбутньому."
  dhimmi_military_service: "Дозволити військову службу"
  dhimmi_military_service_desc: "Численні іновірні віряни, що мирно мешкають на наших землях, більш ніж охочі захищати своє життя та свої родини, якщо ми дозволимо їхній набір."
  dhimmi_promote_tolerance: "Сприяти толерантності"
  dhimmi_promote_tolerance_desc: "Наш народ часто висловлює бажання побудувати більш різноманітне та толерантне суспільство. Діючи за їхнім проханням та наслідуючи їхній приклад, ми ставитимемося до невіруючих з добротою, прагнучи досягти стабільності та процвітання."
  dhimmi_administrative_posts: "Надати адміністративні посади"
  dhimmi_administrative_posts_desc: "Наші кордони є домом для багатьох, хто не сповідує нашу державну релігію. Їхні місцеві лідери прагнуть зберегти свої позиції та вірування. Співпраця з ними та використання їхньої мудрості — це природний шлях до здорової адміністрації."
  dhimmi_traditions: "Зберегти місцеві традиції"
  dhimmi_traditions_desc: "Наші піддані походять з багатьох куточків землі, і тому мають різні вірування та способи життя. Від простих землеробів до витіснених членів їхніх колишніх шляхетних класів, усі вони можуть пишатися славетною історією та прекрасними традиціями свого народу. Поважати та дозволяти практику різноманітних звичаїв — це ознака вищого, гармонійного суспільства."
  dhimmi_legal_autonomy: "Правова автономія"
  dhimmi_legal_autonomy_desc: "На нашій території є багато добрих громадян, які не сповідують нашу державну релігію, проте вони були інтегровані в нашу правову систему та користуються тими ж правами, що й інші. Попри протести проти їхнього включення, дозвіл їм брати участь у нашій судовій системі як свідкам, опікунам та законним представникам своїх громад лише посилить їхню підтримку нашої влади."
  dhimmi_promote_dhimmi_hierarchy: "Сприяти місцевій ієрархії"
  dhimmi_promote_dhimmi_hierarchy_desc: "Прагнучи підтримувати соціальну рівновагу, наші радники визнали за необхідне координувати дії з представниками багатьох місцевих громад, які не дотримуються нашої державної віри."
  dhimmi_pact_of_umar: "Пакт Умара"
  dhimmi_pact_of_umar_desc: "Цей договір чітко визначає статус, права та обов'язки «захищених осіб» у нашому володінні, включаючи християн, юдеїв, зороастрійців та багато інших визнаних віросповідань."
  dhimmi_mazalim_court: "Суди Мазалім"
  dhimmi_mazalim_court_desc: "Паралельно до повноважень та існування релігійно-судової адміністрації та судів Шаріату, суди Мазалім діють світськи у справах невіруючих. Їхні засідання можуть відбуватися у Палаці Справедливості (#italic dār al-'adl#!) або церемоніальній залі в межах стін цитаделі (#italic īwan kabīr#!)."
  local_tribal_strongholds: "Племінні твердині"
  local_tribal_strongholds_desc: "Численні осілі племена по всьому Магрибу мають великий вплив на місцевих жителів. Заспокоїти їх та визнати їхню владу допоможе нам легше здійснювати контроль над нашим володінням."
  jaysh_armies: "Армії Джайш"
  jaysh_armies_desc: "Організовані місцевою адміністрацією для виконання гарнізонних та допоміжних обов'язків, ці бійці були найняті для придушення місцевих повстань та забезпечення постійного потоку підкріплень до нашої армії, а також для придушення заколотів на їхніх рідних територіях."
  tribes_in_administration: "Племінний кабінет"
  tribes_in_administration_desc: "Наші племінні громади є важливим наріжним каменем нашої держави. Лише справедливо, що ми дозволяємо тим, хто бажає зробити внесок у нашу адміністрацію, обіймати високі посади."
  tribes_land_rights: "Права племен на землю"
  tribes_land_rights_desc: "Розширення та повага до прав на землю численних племінних громад у нашому володінні є чудовим способом забезпечити їхню подальшу співпрацю."
  tribes_fosterage: "Виховання"
  tribes_fosterage_desc: "Виховуючи наступне покоління членів племен у сусідніх родинах, їхні унікальні знання будуть передані, а зв'язки спорідненості та союзу між громадами зміцняться."
  tribes_manrent: "Зобов'язання служби"
  tribes_manrent_desc: "Завдяки договірній призовній праці, багато членів наших племінних громад вступають на службу до наших найвпливовіших родин."
  tribes_allow_gatherings: "Дозволити зібрання"
  tribes_allow_gatherings_desc: "Регулярні зібрання наших племінних громад є чудовим форумом для обговорення політики, обміну інформацією та ведення справ з багатьма поселеннями по всьому нашому володінню. Тому ми дозволимо їх."
  tribes_creach: "Здобич"
  tribes_creach_desc: "Вирощування та розведення [ShowGoodsName('livestock')], здобутих нами через війни та рейди, є чудовим способом забезпечити процвітання нашого племінного народу."
  tribes_pasture_access: "Доступ до пасовищ"
  tribes_pasture_access_desc: "Надаючи доступ до пасовищ нашим племінним громадам, ми можемо використовувати їхні передові знання щодо вирощування врожаю та розведення [ShowGoodsName('livestock')]."
  tribes_tribal_levies: "Дозволити племінні ополчення"
  tribes_tribal_levies_desc: "Наші племінні воїни славляться своїм військовим досвідом. Залучення цих загартованих чоловіків до наших армій лише посилить наші сили та ще більше зміцнить наше володіння."
  tribes_tribal_registry: "Розширений реєстр"
  tribes_tribal_registry_desc: "Незважаючи на те, що наші місцеві племінні громади живуть життям, значною мірою відокремленим від нашого основного суспільства, ми все ж повинні забезпечити їх належний облік у нашому реєстрі."
  tribes_protected_faith: "Захищена племінна віра"
  tribes_protected_faith_desc: "Ті, хто мешкає в найдикіших куточках нашої землі, іноді сповідують інші вірування. Оскільки вони є вірними підданими під нашим прапором, ми зробимо добре, якщо поважатимемо їхні релігійні відмінності."
  tribes_respect_tribal_traditions: "Шановані племінні традиції"
  tribes_respect_tribal_traditions_desc: "Захоплюючі традиції, яких дотримуються члени племінних громад у нашому суспільстві, повинні бути шановані та підтримувані державою."
  cossacks_land_rights: "Права козаків на землю"
  cossacks_land_rights_desc: "Козаки живуть у власних громадах зі своєю організацією. Гарантуючи автономію їхніх територій, ми забезпечимо їхню вірність нам."
  cossacks_sanctioned_atamans: "Санкціоновані отамани"
  cossacks_sanctioned_atamans_desc: "An #italic ataman#! є лідером козацької групи. Офіційно санкціонуючи їхнє лідерство, ми прив'яжемо їх до нашого правління, хоча й ціною надання їм більшої влади."
  cossacks_allowed_free_roaming: "Дозволено вільне пересування"
  cossacks_allowed_free_roaming_desc: "Козаки традиційно напівкочові, не осідають надовго в жодному фіксованому місці. Дозволивши їм зберегти мобільність, ми значно сприятимемо збереженню їхнього способу життя... і збереженню їхньої готовності працювати на нас."
  cossacks_government_positions: "Козацькі Урядові Посади"
  cossacks_government_positions_desc: "Суворе життя, яке ведуть козаки, виховує стійких особистостей. Замість того, щоб дозволяти їм вільно блукати нашими землями, ми могли б залучити найталановитіших і найвитриваліших серед них до адміністрації."
  cossacks_military_service: "Козацька Військова Служба"
  cossacks_military_service_desc: "Козаки живуть у високомілітаризованому суспільстві. Замість того, щоб дозволяти їм вільно блукати сільською місцевістю, ми включимо їх до нашої військової системи, щоб скористатися їхньою бойовою майстерністю."
  cossacks_protected_faith: "Захищена Віра Козаків"
  cossacks_protected_faith_desc: "Козаки традиційно різноманітні у своїх релігійних переконаннях, хоча здебільшого сповідують одну й ту саму віру. Поважаючи їхні особисті переконання, ми можемо уникнути виникнення релігійної напруги — не лише між ними самими, а й між ними та нами."
  cossacks_respected_traditions: "Шановані Козацькі Традиції"
  cossacks_respected_traditions_desc: "Козаки мають власні традиції та соціальну організацію. Ми повинні поважати ці основоположні аспекти їхньої культури, якщо ми хочемо, щоб вони справді відчували себе рівноправними членами нашого суспільства."
  cossacks_rada_autonomy: "Автономія Ради"
  cossacks_rada_autonomy_desc: "Управління козаками зосереджено навколо #italic Ради#!, що означає збори або раду, де вони вирішують усі питання як військові, так і цивільні. Надавши цим Радам юридичну автономію від нашої власної адміністрації, ми можемо делегувати управління їхніми територіями їм самим, водночас забезпечуючи їхню поступливість."
  cossacks_register: "Реєстрові Козаки"
  cossacks_register_desc: "Козаки не лише служитимуть у нашому війську, але й будуть організовані за певним реєстром та матимуть власні офіцерські звання, щоб вони могли найефективніше воювати в наших війнах."
  cossacks_explorers: "Дослідження Козаками"
  cossacks_explorers_desc: "Козаки звикли до кочового життя, що навчило їх долати та процвітати майже на будь-якому типі місцевості. Ми можемо використати ці здібності, щоб відправити їх в експедиції в невідоме, де вони відкриють нові землі для нас."
  cossacks_colonization: "Колонізація Козаками"
  cossacks_colonization_desc: "Вільний спосіб життя козаків робить їх ідеальними кандидатами для відправлення в незайняті регіони та підготовки до заснування постійних поселень."
  plc_cossack_treaty_of_hadiach: "Гадяцький договір"
  plc_cossack_treaty_of_hadiach_desc: "$plc_cossack_treaty_of_hadiach$ надає козакам багато повноважень і прав, найважливішою поступкою з яких є включення їхньої нації до Речі Посполитої, утворюючи Польсько-Литовсько-Руську державу."
  cossack_identity: "Козацька Ідентичність"
  cossack_identity_desc: "Козаки мають виразну та горду ідентичність, зі своїми власними традиціями та звичаями. Вони нелегко відмовляються від них через зовнішні впливи, але стоять міцно і дотримуються власного способу життя."
  reduced_trade_regulations: "Зменшені Торговельні Регуляції"
  reduced_trade_regulations_desc: "Придушення потоку торгівлі з-за кордону аж ніяк не є мудрим. Ми повинні забезпечити, щоб будь-які потенційні торговельні партнери почувалися бажаними на наших землях, щоб забезпечити стабільний потік їхніх цінних товарів на наші ринки."
  increased_trade_regulations: "Збільшені Торговельні Регуляції"
  increased_trade_regulations_desc: "Ми не повинні дозволяти іноземним [ShowEstateTypeName('burghers_estate')] домінувати на наших ринках! Посилення нашого регуляторного нагляду обмежить вплив іноземних купців і надасть конкурентну перевагу нашим власним."
  land_of_commerce: "Земля торгівлі"
  land_of_commerce_desc: "Ми пишаємося тим, що є нацією, яка дбає про своїх [ShowEstateTypeName('burghers_estate')], забезпечуючи їм доступ до правового представництва, можливість швидко пересуватися за потреби та свободу транспортувати свої товари на власний розсуд."
  treasury_rights: "Права на скарбницю"
  treasury_rights_desc: "Надавши нагляд за нашою скарбницею заможним, впливовим членам нашого суспільства, ми забезпечимо їхні інтереси та підвищимо їхню лояльність до нас, хоча й ціною втрати частини податкових надходжень."
  urban_development_grants: "Гранти на міський розвиток"
  urban_development_grants_desc: "Нам стало зрозуміло, що майбутнє настане в межах міських стін. Щоб сприяти та започаткувати цю нову еру урбанізації, міським жителям буде надано кілька грантів для сприяння урбанізації по всьому нашому володінню."
  sponsor_maritime_contracts: "Спонсоровані морські контракти"
  sponsor_maritime_contracts_desc: "Морська торгівля є цінним джерелом доходу для нашої скарбниці. Надаючи ексклюзивні контракти нашим [ShowEstateTypeName('burghers_estate')], ми можемо регулювати комерцію, забезпечуючи при цьому стабільний податковий дохід від судноплавства та торгівлі."
  control_over_the_coinage: "Контроль над карбуванням монет"
  control_over_the_coinage_desc: "Карбування та обіг нових монет належної якості є складним, але важливим процесом для розвитку суверенного народу. Взявши під контроль карбування монет, ми зміцнимо наші економічні основи та консолідуємо нашу владу."
  shipwright_contracts: "Контракти на суднобудування"
  shipwright_contracts_desc: "Надання вигідних державних контрактів заможним членам нашого суспільства дозволить нам ефективніше контролювати наші процеси суднобудування та зменшити бюрократичну тяганину в галузі."
  allow_trade_center_sponsorship: "Дозволити спонсорство торгових центрів"
  allow_trade_center_sponsorship_desc: "Спонсоруючи різні торгові центри по всьому нашому володінню, ми забезпечимо, щоб [ShowEstateTypeName('burghers_estate')] та люди з грошима мали достатньо можливостей для обміну товарами та встановлення здорового торговельного потоку."
  market_fairs: "Ярмарки"
  market_fairs_desc: "Фінансування та розвиток купецьких центрів безсумнівно привабить більший торговельний потік, одночасно накопичуючи великі багатства, значні кількості різноманітних екзотичних товарів та репутацію безпеки."
  nobility_council: "Елітна рада"
  nobility_council_desc: "У час, коли еліти надзвичайно впливові — і можуть прискорити піднесення та падіння династій — принципово мудро надати їм певні ключові посади в адміністративній раді."
  manorial_courts: "Маноріальні суди"
  manorial_courts_desc: "Право проводити суд, попри те, що вони не є фактичними правителями, є досить цінним привілеєм для [ShowEstateTypeName('nobles_estate')]. Наслідуючи свого сюзерена та претендуючи на владу вирішувати суперечки, стягувати штрафи та податки, а також застосовувати власні закони, вони можуть накопичувати великі багатства та командувати вищою владою по всьому своєму домену — на краще чи на гірше…"
  increased_civic_engagement: "Збільшення громадянської активності"
  increased_civic_engagement_desc: "Заохочення громадськості до участі в суспільно-політичних справах є чудовим способом захистити здоров'я нашої нації. Якщо вони будуть більше залучені до політики та управління країною, то, безсумнівно, працюватимуть старанніше, щоб забезпечити її процвітаюче майбутнє."
  inherited_offices: "Успадковані посади"
  inherited_offices_desc: "Хоча це правда, що більшість інших володінь з адміністраціями, подібними до нашої, схильні проводити вибори на державні посади, ми усвідомили, що якщо ми хочемо забезпечити лояльність еліт, ми повинні надати їм ексклюзивний доступ до спадкових посад."
  recognized_communes: "Визнані комуни"
  recognized_communes_desc: "Багато наших поселень, як міських, так і сільських, стали дедалі автономнішими під владою їхньої землевласницької еліти. Хоча визнання цих відокремлених утворень легітимними може зменшити наш контроль над їхніми справами, це, тим не менш, задовольнить [ShowEstateTypeName('nobles_estate')]."
  maintain_clerical_proceedings: "Збереження церковних проваджень"
  maintain_clerical_proceedings_desc: "Попри нашу відданість республіканським ідеалам, ми дозволяємо [ShowEstateTypeName('clergy_estate')] зберігати їхні традиційні привілеї та юрисдикцію у справах віри, моралі та церковного права."
  state_official_oaths: "Присяги державних службовців"
  state_official_oaths_desc: "Усі державні службовці в наших володіннях повинні присягнути на вірність єдиній істинній вірі під благословенням [ShowEstateTypeName('clergy_estate')], перш ніж вони зможуть обійняти посаду."
  mandatory_clerical_donations: "Обов'язкові церковні пожертви"
  mandatory_clerical_donations_desc: "Наші піддані зобов'язані сплачувати десятину нашим релігійним установам. Ці обов'язкові внески є божественною відповідальністю, що демонструє побожність і силу віри, яку сповідує наш народ."
  toll_and_tariff_exemptions: "Звільнення від мит та тарифів"
  toll_and_tariff_exemptions_desc: "Звільнення торгових суден від сплати зборів за перевезення їхніх товарів, безумовно, значною мірою сприятиме тому, щоб [ShowEstateTypeName('burghers_estate')] схвалили нашу адміністрацію."
  dedicated_merchant_courts: "Спеціалізовані купецькі суди"
  dedicated_merchant_courts_desc: "Ці суди присвячені вирішенню суперечок між нашими [ShowEstateTypeName('burghers_estate')]. Вони є потужною гілкою нашого уряду і мають величезний вплив на комерційні та торговельні справи."
  noble_patronage: "Елітне покровительство"
  noble_patronage_desc: "Наша торговельна присутність не повинна атрофуватися. Щоб забезпечити надійний і безперервний потік торгівлі, на плечі [ShowEstateTypeName('nobles_estate')] лягає обов'язок бути покровителями наших [ShowEstateTypeName('burghers_estate')] та забезпечити їх достатньою монетою для перевезення їхніх товарів."
  appoint_ecclesiastical_offices: "Призначення на церковні посади"
  appoint_ecclesiastical_offices_desc: "Шляхетність і божественність — це поняття, які дедалі більше переплітаються в нашому побожному суспільстві. Корона зберігає за собою право призначати високих церковних чиновників, що гарантує лояльність бенефіціарів до держави, водночас дозволяючи їм здобувати власний вплив."
  control_of_the_borderlands: "Контроль над прикордонними землями"
  control_of_the_borderlands_desc: "Захист вірних, які живуть далеко від нашої столиці, є важким завданням. Наказавши [ShowEstateTypeName('nobles_estate')] на тих землях захищати свій народ, ми захистимо наших людей від язичників та єретичних ворогів."
  sponsor_printing_of_religious_texts: "Спонсорування друку релігійних текстів"
  sponsor_printing_of_religious_texts_desc: "Розповсюдження друкованих релігійних текстів є чудовим способом поширення грамотності та міцного вкорінення вчення нашої віри в серцях нашого народу. Ці зусилля з розповсюдження релігійної літератури просвітять наш народ і нагадають йому про його релігійні обов'язки."
  printing_of_religious_texts: "Друк релігійних текстів"
  printing_of_religious_texts_desc: "Встановлення процедур для друку, комерціалізації та розповсюдження релігійних текстів є необхідними наступними кроками до підвищення нашої побожності та грамотності!\n\nВідкриває привілей [ShowEstatePrivilegeName('sponsor_printing_of_religious_texts')]."
  liturgical_mural_art: "Літургійний фресковий живопис"
  liturgical_mural_art_desc: "Наші палацові стіни будуть прикрашені захоплюючими релігійними сценами, створеними найталановитішими художниками нації, як спосіб продемонструвати красу нашої віри та висловити нашу любов до божественного."
  golden_liberty: "Золота Вольність"
  golden_liberty_desc: "Золота Вольність, також відома як #italic Złota Wolność#!, представляє значний вплив та привілеї, які нині мають наші [ShowEstateTypeName('nobles_estate')], включаючи право обирати правителя та формувати національну політику. Вона передбачала, що всі [ShowEstateTypeName('nobles_estate')], незалежно від рангу, економічного стану чи етнічного походження, вважалися рівними за владою своїм одноліткам."
  nieszawa_privileges: "Статути Нешави"
  nieszawa_privileges_desc: "Серія законів, які надають значні поступки [ShowEstateTypeName('nobles_estate')], вимагаючи їхнього схвалення для нових законів, мобілізації збройних сил та нових податків. Ці статути також зменшили владу найбагатших родин і зміцнили позиції ширшого дворянства."
  pacta_conventa: "Pacta Conventa"
  pacta_conventa_desc: "Спочатку задумані як договірна угода між [ShowEstateTypeName('nobles_estate')] та урядом, ці статути визначають обов'язки центральної влади та окреслюють різні зобов'язання у таких сферах, як зовнішня політика, податки, військові справи тощо."
  polish_merchant_seal: "[GetCountry('POL').GetAdjectiveWithNoTooltip] Купецька Печатка"
  polish_merchant_seal_desc: "Печатка з інсигніями нашої центральної влади, цей документ дозволяє вільне, безперешкодне пересування нашим [ShowEstateTypeName('burghers_estate')], забезпечуючи їм швидший проїзд між містами для себе та своїх товарів в обмін на невеликий додатковий податок."
  privateer_contracts: "Каперські Контракти"
  privateer_contracts_desc: "Щоб розширити наші військово-морські можливості без необхідності утримувати великий постійний флот, ми будемо регулювати та офіційно наглядати за актами піратства, що приносять користь нації. Наші капери діють під офіційною санкцією, ділячись своєю здобиччю з короною в обмін на правовий захист. Однак тонка межа між каперством і піратством вимагає від нас обережності, якщо ми не бажаємо зашкодити нашій міжнародній репутації…"
  noble_armies: "Шляхетські Армії"
  noble_armies_desc: "Дозвіл [ShowEstateTypeName('nobles_estate')] утримувати особисті армії є чудовим способом забезпечити їхній внесок, коли ми формуємо більші державні армії, а також збільшити їхній вплив."
  chancellor_nobles: "Канцлерські Шляхтичі"
  chancellor_nobles_desc: "Походячи з менших гілок [ShowEstateTypeName('nobles_estate')], ці адміністратори відповідають за оформлення урядових рішень у юридичні документи, формуючи основу нашої адміністрації."
  ayuntamientos: "Аюнтам'єнтос"
  ayuntamientos_desc: "Право створювати міські ради з чіткими законодавчими та виконавчими повноваженнями є ясним і фундаментальним правом [ShowEstateTypeName('peasants_estate')] у наших володіннях."
  right_to_inherit: "Право на Спадщину"
  right_to_inherit_desc: "[ShowCultureGroupName('german_group')] [ShowEstateTypeName('nobles_estate')] підтримує давню традицію поділу земель і титулів батька між усіма синами, забезпечуючи мир між братами та уникаючи непотрібних війн."
  fund_karimi: "Фінансування Купців Карімі"
  fund_karimi_desc: "Фінансування могутніх [ShowEstateTypeName('burghers_estate')], відомих як Карімі, які відповідають за торгівлю [ShowGoodsName('spices')] та іншими цінними товарами, є важливим для нашого подальшого процвітання."
  waqf_payments: "Виплати Вакфу"
  waqf_payments_desc: "Щоб продемонструвати нашу побожність та релігійну відданість, ми надамо #italic вакф#! виплати як благодійні пожертви, які будуть використані для фінансування медресе, лікарень та мечетей, а також для допомоги менш забезпеченим."
  allow_hunting: "Дозволи на Полювання"
  allow_hunting_desc: "Дозволяє [ShowEstateTypeName('peasants_estate')] полювати та знімати шкури з дичини в межах законних та фізичних кордонів володінь їхнього лорда або містечка."
  no_labor_sunday: "Без Праці в Неділю"
  no_labor_sunday_desc: "Було б мудро дотримуватися вчень [ShowReligiousGroupName('christian_group')] Церкви та постановити, що наші кріпаки та селяни можуть мати відпочинок від своєї праці в неділю, як знак побожності та співчуття."
  communal_lands: "Комунальні Землі"
  communal_lands_desc: "Попри притаманне знедолене становище простолюду, ми все ж мусимо постановити, що всі члени [ShowEstateTypeName('peasants_estate')] мають право створювати спільні стада тварин і вирощувати врожай на спільних полях."
  partial_yield: "Частковий урожай"
  partial_yield_desc: "Землі заможних часто обробляються [ShowEstateTypeName('peasants_estate')], рабами або кріпаками. Отже, найменше, що ми можемо зробити, це надати простолюду доступ до частини врожаю з цієї землі щороку."
  access_to_royal_and_ecclesiastical_courts: "Доступ до королівських та церковних судів"
  access_to_royal_and_ecclesiastical_courts_desc: "Правове представництво менш заможних є життєво важливим аспектом справедливого та збалансованого суспільства. Тому публічні та релігійні суди повинні розглядати правові суперечки між [ShowEstateTypeName('peasants_estate')] та елітами якомога справедливіше."
  peasants_in_administration: "Простолюдини в адміністрації"
  peasants_in_administration_desc: "Залучаючи найкваліфікованіших серед [ShowEstateTypeName('peasants_estate')] до нашого уряду, ми можемо покращити та розширити охоплення нашої адміністрації до найвіддаленіших районів нашої території."
  ius_teutonicum: "Ius Teutonicum"
  ius_teutonicum_desc: "З часів східних марок Каролінзької імперії [ShowCultureGroupName('german_group')] народи розширювалися та селилися далі на схід. Відомий як #italic Ostsiedlung#!, цей приплив [ShowCultureGroupNameWithNoTooltip('german_group')] поселенців часто заохочується місцевими правителями для заселення малонаселених районів. Ці поселенці підпадають під особливий тип закону, #italic $ius_teutonicum$#!, що пропонує їм особливі привілеї, такі як звільнення від податків та право створювати самоврядні міста."
  kormlenije: "Кормління"
  kormlenije_desc: "Система кормління – це механізм для задоволення фінансових та матеріальних потреб [GetCountry('RUS').GetAdjective] [ShowEstateTypeName('nobles_estate')], що встановлює фінансову залежність серед еліт. Ця залежність, у свою чергу, відіграє вирішальну роль у забезпеченні їхньої непохитної лояльності."
  haudenosaunee_labor_division: "Поділ праці Гауденосауні"
  haudenosaunee_labor_division_desc: "Наші люди мають чітко визначені ролі у своїх громадах. Завдання розподіляються та призначаються для колективної вигоди групи, при цьому ті, хто виконує однакові завдання, працюють разом. Чоловіки та жінки виконують взаємодоповнюючі ролі через свої відповідні призначення, створюючи цілісний поділ праці."
  manifesto_of_freedom: "Маніфест свободи"
  manifesto_of_freedom_desc: "Після періоду політичних заворушень елітні члени нашого суспільства отримують широкі громадянські свободи для забезпечення їхньої постійної лояльності.\n\nМаніфест залишається чинним протягом усього поточного правління і може виявитися складним для скасування."
  inaugural_diplomas: "Інавгураційні дипломи"
  inaugural_diplomas_desc: "Прагнучи налагодити міцні зв'язки з елітними членами нашого суспільства, ми надали їм низку переваг за угодою $inaugural_diplomas$. Серед поступок – зменшення зобов'язань щодо збору податків для [ShowEstateTypeName('crown_estate')] та право на знижене оподаткування."
  district_paving_privilege: "Районне оподаткування"
  district_paving_privilege_desc: "Підтримка шляхів між багатьма районами [ShowLocationName('prague')] є спірною темою серед еліт. Надання їм права оподатковувати прокладання нових доріг неминуче створить більше зв'язків між нашими районами."
  joint_assembly_decrees: "Укази Спільної Асамблеї"
  joint_assembly_decrees_desc: "Низка прав, наданих елітним членам нашої країни, щоб сприяти інтеграції та одноманітності між ними та їхніми численними однолітками по всьому [GetUniqueInternationalOrganization('hre').GetName]."
  commons_petition: "Петиція громад"
  commons_petition_desc: "Список скарг, поданих після повстання «Паломництво благодаті»."
  austere_monastic_life: "Суворе чернече життя"
  austere_monastic_life_desc: "Життя в наших релігійних орденах нарешті повернулося до свого замкнутого, суворого ідеалу. Накопичення багатства обмежено, а чернечий фокус повністю зосереджений на спогляданні та молитві.\n\nМожуть бути створені додаткові монастирі."
  warrior_tribunal: "Трибунал Воїнів"
  warrior_tribunal_desc: "Юридична система в наших землях, наділена правовими повноваженнями виносити вироки за різноманітні злочини."
  ceremonial_tax_exemptions: "Церемоніальні Податкові Звільнення"
  ceremonial_tax_exemptions_desc: "Підготовка данини, жертвоприношень та свят є великою честю для наших [ShowEstateTypeName('burghers_estate')]. В обмін на цю відповідальність вони звільняються від регулярного оподаткування."
  mita_system: "Система Міта"
  mita_system_desc: "З впровадженням системи #italic міта#! всі чоловіки віком від п'ятнадцяти до п'ятдесяти років зобов'язані надавати один рік безкоштовної праці уряду. Праця регулюється таким чином, щоб не конфліктувати зі здатністю кожної людини забезпечувати свою сім'ю."
  kulm_law: "Кульмське Право"
  kulm_law_desc: "Модифікована версія Магдебурзького права, Кульмське право надає всім містам у [GetCountry('PRU').GetAdjective], що забезпечили торговельні інтереси міських купецьких гільдій, привілей значної автономії від їхніх сюзеренів."
  invite_german_settlers: "Запросити [GetCountry('PRU').GetAdjectiveWithNoTooltip] Поселенців"
  invite_german_settlers_desc: "Вітаючи мігрантів у нашій нації, ми побудуємо сильну країну, яка отримає вигоду від зростання населення та змін регіональної динаміки."
  invite_german_settlers.tt: "Хвилі німецьких мігрантів почнуть регулярно прибувати до нашої країни"
  autonomous_local_commanders: "Автономні Місцеві Командири"
  autonomous_local_commanders_desc: "Місцеві командири, які обіймають посади в нашому Ордені, давно вимагали збільшення автономії в ім'я ефективного самоврядування та вірності нашій справі."
  apostolic_tax_privilege: "Апостольський Податок"
  apostolic_tax_privilege_desc: "Наше служіння найвищій владі [ShowReligionAdjective('catholic')] віри ніколи не може бути лише обіцянками. Зобов'язавшись підтримувати [GetCountry('PAP').GetGovernment.GetRulerTitle], ми обов'язково здобудемо його прихильність."
  golden_bull_of_1222: "Золота Булла 1222 року"
  golden_bull_of_1222_desc: "Фундаментальний документ, що закріплює права та привілеї [ShowEstateTypeName('nobles_estate')]. Згідно з цим договором, їм надається звільнення від прямого оподаткування, що гарантує відсутність фінансових тягарів від державних вимог. Крім того, цей привілей обмежує їхні зобов'язання щодо надання військ, захищаючи їхні свободи та посилюючи їхній вплив у королівстві."
  monetary_fiefs: "Грошові Феоди"
  monetary_fiefs_desc: "Замість надання постійних спадкових феодів [ShowEstateTypeName('nobles_estate')], корона зберігає пряму власність на більшість земель і призначає тимчасових адміністраторів для їх управління. Ці чиновники користуються доходами та владою своїх територій лише під час перебування на посаді; після їхньої смерті або звільнення контроль повертається до корони. Це запобігає формуванню могутніх спадкових аристократій та зміцнює адміністративну лояльність."
  ghazi_privilege: "Газі-Лорди"
  ghazi_privilege_desc: "Воїни віри, ці віддані бійці ведуть кампанії на далеких кордонах у пошуках здобичі, честі та божественної мети. Складаючись із ревних добровольців та племінних набіжників, вони охороняють наші кордони через невпинні рейди та завоювання, поширюючи як вплив, так і страх у рівній мірі."
  autonomous_kadiluks: "Автономні Кадилуки"
  autonomous_kadiluks_desc: "#italic Каді#! слід надати більшу владу в межах їхніх виділених юрисдикцій #italic Кадилуків#!, щоб краще використовувати їхню мудрість на благо держави."
  ayans_privilege: "Аянські Нотаблі"
  ayans_privilege_desc: "Ніхто не знає складних динамік влади у віддалених провінціях краще, ніж еліти, які вже там проживають. Отримавши статус Аянів, їм довіряють керувати лише з обмеженим наглядом з боку держави."
  bra_kreditwerk: "Kreditwerk"
  bra_kreditwerk_desc: "#italic Kreditwerk#! контролює значну частину наших фінансів, перешкоджаючи нашим фінансовим можливостям."
  bra_kreditwerk_reformed: "Реформований Kreditwerk"
  bra_kreditwerk_reformed_desc: "#italic Kreditwerk#!, тепер реформований під прямим контролем [ShowEstateTypeName('crown_estate')], дозволить нам ефективніше фінансувати наші проєкти."
  share_of_the_spoils: "Частка здобичі"
  share_of_the_spoils_desc: "Перемога завжди смакує солодше, коли наш великий клан накопичує здобич. Однак, ділячись нею, ми виховаємо доброзичливість до інших могутніх кланів, що може бути використано на нашу користь пізніше."
  tribal_host: "Племінне військо"
  tribal_host_desc: "Виведення найсильніших коней стане наріжним каменем нашого могутнього війська. Довіривши цей процес нашим [ShowEstateTypeName('nobles_estate')], ми забезпечимо, що у нас ніколи не бракуватиме верхових тварин для наших легендарних воїнів."
  tribal_autonomy: "Племінна автономія"
  tribal_autonomy_desc: "Наші пращури, і їхні батьки до них, шанували вільне життя поза стінами поселень. Ми б добре зробили, наслідуючи їхній приклад, віддаляючись від зовнішніх впливів, що прагнуть спокусити наш народ з його істинного шляху..."
  libro_d_oro: "Libro d'Oro"
  libro_d_oro_desc: "Велика Рада [GetCountry('VEN').GetName] має багато правил, які визначають, хто гідний бути її членом. Одне з них – #italic Libro d'Oro#!, що містить список родин, які відповідають цим вимогам і можуть претендувати на приналежність до [ShowEstateTypeName('nobles_estate')] [GetCountry('VEN').GetNameWithNoTooltip]. Лише за велику кількість золота та впливу можна внести до нього зміни."
  libro_d_argento: "Libro d'Argento"
  libro_d_argento_desc: "Разом з #italic Libro d'Oro#!, що перелічує всі шляхетні родини [GetCountry('VEN').GetLongName], #italic Libro d'Argento#! містить імена всіх родин #italic Originarii#!, які, попри те, що є простолюдинами, походять від первісних мешканців лагуни і таким чином отримали право торгувати як громадяни [GetCountry('VEN').GetNameWithNoTooltip] та займати посади в адміністрації [GetCountry('VEN').GetGovernment.GetGovernmentType.GetName]."
  zontas: "Zonta"
  zontas_desc: "Керівні ради [GetCountry('VEN').GetFlavorRank] [GetCountry('VEN').GetName] обирають своїх членів з-поміж [ShowEstateTypeName('nobles_estate')]. Ці еліти збираються в так звані #italic Zontas#! і мають привілеї та обов'язки захищати конституцію від накопичення влади одним правителем."
  zontas_revoke_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] має менше ніж #Y 25.0%#! влади або [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] має #Y 50.0%#! або більше влади"
  avogadoria_de_comun: "Avogadoria de Comùn"
  avogadoria_de_comun_desc: "Держава перебуває в руках шляхетних і заможних родин, які займають ключові позиції в [GetCountry('VEN').GetAdjective] уряді. Для захисту інтересів держави, а отже, і цих родин, Рада створила #italic Avogadoria de Comùn#! – #italic державних прокурорів#! – які наглядають за рахунками високих посадовців, розслідують звинувачення в корупції та переслідують порушення закону.\nНавіть самі дожі не уникнуть їхнього пильного ока..."
  scottish_clans: "POSTEDIT_Шотландські клани"
  scottish_clans_desc: "Народ [GetCountry('SCO').GetName] традиційно був організований у численні клани, кожен з яких об'єднаний як родинними зв'язками, так і географічним розташуванням, і присягав на вірність своєму власному вождю клану. Збори кланів та взаємозв'язки між ними є рушійною силою [GetCountry('SCO').GetAdjective] політики."
  autonomous_scottish_clans: "Автономні $scottish_clans$"
  autonomous_scottish_clans_desc: "$scottish_clans_desc$"
  tribes_scotland_gaelic_heritage: "Об'єднана POSTEDIT_шотландська спадщина"
  tribes_scotland_gaelic_heritage_desc: "Протягом поколінь клани сільських північних гірських районів зберігали свою [ShowLanguageName('gaelic_language')] ідентичність, тоді як клани низин значною мірою розвинули власну [ShowCultureGroupName('scottish_group')] культуру. Попри відмінності в практиках, клани гірських районів та низин все ж відкладуть свої розбіжності, щоб боротися з іноземними супротивниками, які загрожують [GetCountry('SCO').GetName]."
  autonomous_tribes_scotland_gaelic_heritage: "Автономні $tribes_scotland_gaelic_heritage$"
  autonomous_tribes_scotland_gaelic_heritage_desc: "$tribes_scotland_gaelic_heritage_desc$"
  sco_statutes_of_iona: "Статути Айону"
  sco_statutes_of_iona_desc: "Згідно з цими Статутами, клани сільських високогір'їв повинні відправляти своїх спадкоємців на навчання до шкіл низин. Хоча це призведе до більш освіченого покоління високогірних [ShowEstateTypeName('nobles_estate')], це ризикує зруйнувати століття культурної спадщини."
  salt_tax_exemption: "Звільнення від податку на [ShowGoodsNameWithNoTooltip('salt')]"
  salt_tax_exemption_desc: "Дефіцит і висока ціна [ShowGoodsName('salt')] призвели до економічних труднощів для [ShowEstateTypeName('peasants_estate')]. Вони звільняються від будь-якого податку на [ShowGoodsNameWithNoTooltip('salt')] для швидкого полегшення економічних труднощів та зменшення соціальних заворушень."
  charter_of_the_nobility: "Хартія шляхти"
  charter_of_the_nobility_desc: "Після повстання Пугачова було видано хартію, яка зміцнює привілеї [ShowEstateTypeName('nobles_estate')] та підкреслює їхню роль у підтримці порядку."
  villes_franches: "Вільні міста"
  villes_franches_desc: "Кілька наших ринкових міст надзвичайно зросли за останні кілька десятиліть. Таким чином, вони розвинули рівень автономії, перетворившись на щось схоже на вільні міста та схиляючись до децентралізованого підходу до управління."
  residence_in_versailles: "Резиденція у Версалі"
  residence_in_versailles_desc: "[GetCountry('FRA').GetGovernment.GetAdjective] родина запропонувала членам видатних династій [ShowEstateTypeName('nobles_estate')] проживати у Версальському палаці."
  permanent_residence_in_versailles: "Постійна резиденція у Версалі"
  permanent_residence_in_versailles_desc: "Версаль було розширено, що дозволило членам [GetCountry('FRA').GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] постійно проживати в палаці разом із [GetCountry('FRA').GetGovernment.GetAdjective] родиною. Хоча ті, хто не належить до [GetCountry('FRA').GetGovernment.GetAdjective] родини, насолоджуються розкішшю палацу, це відбулося ціною значного зменшення політичного впливу, щоб зберегти прихильність [GetCountry('FRA').GetGovernment.GetRulerTitle]. Це відмова від їхніх особистих маєтків також залишила менше місця для політичних інтриг та змов, зробивши їх підвладними правлінню Версаля."
  great_offices_of_the_crown_of_france: "Великі посади Корони [GetCountry('FRA').GetNameWithNoTooltip]"
  great_offices_of_the_crown_of_france_desc: "Найважливіші урядові посади в нашій центральній адміністрації зарезервовані для [ShowEstateTypeName('nobles_estate')] у нашому королівстві."
  fra_marcel_great_ordinance: "Велика Ордонанса"
  fra_marcel_great_ordinance_desc: "Після величезного тиску з боку Етьєна Марселя, [GetCountry('FRA').GetName] наразі керується умовами Великої Ордонанси Марселя. В обмін на надання йому великого впливу, держава має підтримку Генеральних штатів для стягнення більших податків."
  fra_leadership_of_marcel: "Лідерство Етьєна Марселя"
  fra_leadership_of_marcel_desc: "Вплив Етьєна Марселя зробив [ShowEstateTypeName('burghers_estate')] потужною силою в Генеральних штатах."
  fra_marcel_compromise_ordinance: "Компромісна Велика Ордонанса"
  fra_marcel_compromise_ordinance_desc: "Компромісна угода між [ShowEstateTypeName('crown_estate')] та Етьєном Марселем, за якою $crown_estate$ поступається владою Марселю. В обмін на це Генеральні штати задовольнили прохання про стягнення більших податків."
  fra_papacy_pragmatic_sanctions: "Прагматична санкція [ShowLocationNameWithNoTooltip('bourges')]"
  fra_papacy_pragmatic_sanctions_desc: "Завдяки цим санкціям [ShowReligionAdjective('catholic')] Церква у [GetCountry('FRA').GetName] отримує більшу адміністративну незалежність від [GetCountry('PAP').GetName], оскільки це дозволяє виборне призначення на церковні посади через загальну церковну раду. Хоча ці санкції тішать [ShowEstateTypeName('clergy_estate')], наш вплив та стосунки зі Святим Престолом можуть постраждати."
  vij_tamil_trading_rights: "[ShowCultureNameWithNoTooltip('tamil')] Торгові права"
  vij_tamil_trading_rights_desc: "[ShowAreaName('tamil_land_area')] є домом для багатьох великих торгових міст [ShowCultureName('tamil')] народу. Надавши їм торгові та автономні привілеї, ми можемо забезпечити їхню лояльність та цінність для держави."
  jain_banking_rights: "[ShowReligionAdjectiveWithNoTooltip('jain')] Банківські Права"
  jain_banking_rights_desc: "[ShowReligionName('jain')] більше не є домінуючою або політично прихильною вірою в $india$, але [ShowReligionAdjectiveWithNoTooltip('jain')] народ далеко не неактуальний. Вони знайшли нішу в лихварстві та бюрократії, що робить їх активом для будь-якої держави, готової запропонувати їм заступництво."
  jain_scholars: "[ShowReligionAdjectiveWithNoTooltip('jain')] Вчені"
  jain_scholars_desc: "Хоча [ShowReligionName('jain')] сама по собі втратила свою видатність, це все ще релігія з активною меншиною, яку слід враховувати. Практикуючі цієї віри є освіченими та мудрими вченими, які можуть бути благом для нашого уряду, якщо ми підвищимо їх до адміністрації."
  dhimmi_abrahamic_communities: "Авраамічні Спільноти"
  dhimmi_abrahamic_communities_desc: "[ShowReligionGroupAdjective('christian')] та [ShowReligionGroupAdjective('israelite_group')] спільноти є так званими #italic Ḏimmī#! в [ShowReligionGroupAdjective('muslim')] державі. Традиційно, обов'язком справедливого правителя є захист цих людей, тримаючи їх окремо від [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] більшості, і спільнота #italic Ḏimmī#! присягне на вірність державі, не загрожуючи традиціям [ShowReligionGroupName('muslim')]."
  dhimmi_in_administration: "Бюрократи Ḏimmī"
  dhimmi_in_administration_desc: "Деякі з найкращих адміністраторів нашої країни сповідують інші віри, ніж наша, проте є не менш порядними та лояльними членами нашої нації. Виключення тих, хто готовий служити нам і державі, було б серйозною помилкою, і ми повинні негайно це виправити."
  dharmic_dhimmi_communities: "Дхармічні Спільноти Ḏimmī"
  dharmic_dhimmi_communities_desc: "Спочатку термін, зарезервований для [ShowReligionGroupAdjective('christian')] та [ShowReligionGroupAdjective('israelite_group')] спільнот, #italic Ḏimmī#! стосується [ShowReligionAdjective('hindu')] та інших [ShowReligionGroupAdjective('dharmic')] віруючих, що живуть у [ShowReligionGroupAdjective('muslim')] світі. Традиційно, обов'язком правителя є їх захист. Однак це не завжди так легко, оскільки #italic Ḏimmī#! становлять більшість населення. Але, за підтримки істинної віри, #italic Ḏimmī#! присягнуть на вірність державі, не загрожуючи засадам [ShowReligionGroupNameWithNoTooltip('muslim')]."
  clergy_in_administration: "$clergy_estate$ в Адміністрації"
  clergy_in_administration_desc: "Служителі віри вже володіють багатьма навичками, які ми шукаємо в адміністраторах. Вони добре освічені, досвідчені писарі, які слідують вищому покликанню. Багато в чому, об'єднання з ними створило б ефективний і дуже сильний кадровий склад адміністраторів."
  rajput_society: "Раджпутське Суспільство"
  rajput_society_desc: "Раджпути — це стародавня каста почесних воїнів і гордих шляхтичів. Хоча сувора земля [ShowAreaName('rajputana_area')] є серцем їхньої влади, раджпутські [ShowEstateTypeName('nobles_estate')] можна знайти по всій північній $india$, і багато великих Раджів стверджують раджпутське походження.\n\n#italic Модифікатор масштабується з відсотковою кількістю [ShowCultureName('mewari')], [ShowCultureName('harauti')], [ShowCultureName('dhundhari')], [ShowCultureName('shekhawati')] та [ShowCultureName('mewati')], присутніх у нашій країні + додаткові 100%.#!"
  zamindar_tax_privilege: "Податковий Привілей Заміндарів"
  zamindar_tax_privilege_desc: "$mug_zamindar_system_desc$ У часи війни, заміндари мають право збирати податки для підтримки наших військових зусиль. Надання цього привілею значно збільшить наш дохід — але також і владу [ShowEstateTypeName('nobles_estate')]..."
  corruption_desc: "по всьому нашому домену давно вчепилися кігтями в нашу скарбницю та суди, забезпечуючи собі поблажливі позиції та поширюючи застійну атмосферу корупції."
  consolidated_corruption_of_the_burghers: "Консолідована Корупція Заможних"
  consolidated_corruption_of_the_burghers_desc: "Вкорінені середні та вищі класи $corruption_desc$"
  consolidated_corruption_of_the_peasants: "Консолідована Корупція Простого Народу"
  consolidated_corruption_of_the_peasants_desc: "Народ більше не поважає нашу владу. Дійсно, у багатьох випадках вони погрожували взятися за зброю, якщо їх змусять платити податки..."
  consolidated_corruption_of_the_nobles: "Консолідована Корупція Еліт"
  consolidated_corruption_of_the_nobles_desc: "Вкорінені члени вищих класів $corruption_desc$"
  consolidated_corruption_of_the_clergy: "Консолідована Корупція Віри"
  consolidated_corruption_of_the_clergy_desc: "Прикра реальність того, що наші релігійні лідери мають вплив на нашу внутрішню політику, є лише побічним ефектом інших корумпованих угод, які вони вимагали від нас під загрозою відлучення."
  noble_sponsored_navy: "Шляхетський флот"
  noble_sponsored_navy_desc: "Наш флот утримується та контролюється [ShowEstateTypeName('nobles_estate')]. Завдяки їхнім фінансовим внескам ми зможемо зібрати могутній флот, хоча в обмін на дозвіл $nobles_estate$ мати більший вплив на морські справи."
  magdeburg_rights: "[ShowLocationNameWithNoTooltip('magdeburg')]ські права"
  magdeburg_rights_desc: "Набір привілеїв, спочатку розроблений з використанням $FLA_ADJ$ права, ця правова система поширилася центральною [ShowContinentName('europe')] через приплив [ShowCultureGroupName('german_group')] іммігрантів. Спрямовані на розвиток свобод окремого громадянина, ці права слугують для гарантування та регулювання автономії місцевої адміністрації."
  novi_fori: "Novi Fori"
  novi_fori_desc: "Походить від початкового набору привілеїв, наданих місту [ShowLocationName('magdeburg')], ця правова система розширилася, щоб охопити західні концепції містобудування, а також набір кримінальних та цивільних законів, коли вона поширилася за межі основних [ShowCultureGroupName('german_group')] земель."
  shooting_societies: "Стрілецькі товариства"
  shooting_societies_desc: "Організоване ополчення [ShowEstateTypeName('burghers_estate')] та ремісників, спрямоване на відпрацювання навчань та захист свого міста від усіх зовнішніх загарбників. Цим асоціаціям дозволено [ShowEstateTypeName('crown_estate')] носити спеціальну форму та демонструвати емблеми, які в іншому випадку дозволені лише [ShowEstateTypeName('nobles_estate')]."
  reduced_responsibilities_for_the_nobles: "Зменшені обов'язки для еліт"
  reduced_responsibilities_for_the_nobles_desc: "Намагаючись забезпечити прихильність та вірність вищих верств нашого суспільства, ми вирішили надати їм цей привілей, звільняючи їх від багатьох їхніх обов'язків."
  reduced_taxation_for_the_nobles: "Зменшене оподаткування для еліт"
  reduced_taxation_for_the_nobles_desc: "Вищі верстви нашого суспільства мають значний вплив та владу, і, як такі, їхні примхи та думки мають велику вагу. Якщо ми не хочемо, щоб вони схилили баланс влади на користь свого стану, ми повинні надати їм певні податкові поступки."
  habshi_advisors_privilege: "Хабші-радники"
  habshi_advisors_privilege_desc: "Відомі своєю плідною та впливовою присутністю у державних справах, ці раби походять з берегів [ShowSubContinentName('east_africa')]. Освічені у питаннях управління та війни, вони надають велику послугу в обмін на політичний вплив та, потенційно, свободу після релігійного навернення."
  bavarian_share_of_land: "[GetCountry('BAV').GetAdjectiveWithNoTooltip] поділ земель"
  bavarian_share_of_land_desc: "Ми розділили наші династичні землі справедливо та відповідно до закону. Це призведе до подальшої фрагментації наших земель та сильно децентралізованої адміністрації. Щоб стати потужним претендентом серед князів [GetUniqueInternationalOrganization('hre').GetName], ми повинні будемо знову утвердити наш контроль та центральну владу."
  mch_tribal_favor: "Племінна прихильність"
  mch_tribal_favor_desc: "POSTEDIT_Чжурчженські еліти отримують першість у державних справах і вдячні за нашу відмову приймати іноземні звичаї."
  nihil_novi: "Nihil Novi"
  nihil_novi_desc: "Елітні члени нашого суспільства забезпечили собі право, щоб жодні закони не приймалися без їхньої згоди. Мало того, цей привілей також забороняє свободу пересування кріпаків та обмежує права містян."
  privilege_of_koszyce: "Кошицький привілей"
  privilege_of_koszyce_desc: "Елітні члени нашого суспільства були наділені широким спектром прав в обмін на дозвіл іноземному спадкоємцю правити державою. Крім того, вони більше не будуть обтяжені податками без їхньої згоди."
  plc_empower_orthodox_nobility: "Наділити повноваженнями [ShowReligionAdjectiveWithNoTooltip('orthodox')] $nobles_estate$"
  plc_empower_orthodox_nobility_desc: "Цей привілей надає [ShowReligionAdjective('orthodox')] [ShowEstateTypeName('nobles_estate')] багато привілеїв та гарантій, які були надані виключно решті наших еліт."
  cas_fuero_viejo: "Fuero Viejo de Castilla"
  cas_fuero_viejo_desc: "Ми зібрали розрізнені закони та звичаї наших [ShowEstateTypeName('nobles_estate')]. Ця кодифікація їхніх привілеїв стане наріжним каменем їхнього високого статусу в нашому королівстві."
  cas_caballeros_villanos: "Кабальєрос Вільянос"
  cas_caballeros_villanos_desc: "Прикордонні землі [ShowAreaName('castile_area')] та [ShowAreaName('leon_area')] протягом останніх кількох століть породили унікальний орден лицарів-пастухів. Вони звикли проводити зими, охороняючи свої отари в прикордонних фортецях, а літо — здійснюючи набіги або ведучи війну проти своїх [ShowReligionGroupAdjective('muslim')] ворогів."
  cas_regimiento: "Рехім'єнто"
  cas_regimiento_desc: "Рехім'єнто — це система, впроваджена для управління містами та містечками [GetCountry('CAS').GetName] через певних призначених радників, які походять з лав найбагатших і найвпливовіших родин."
  royal_factories_privilege: "Королівські мануфактури"
  royal_factories_privilege_desc: "Королівські мануфактури — це державні, але приватні підприємства, яким надано королівський привілей та нагляд. Вони діють під офіційною санкцією для зміцнення вітчизняної промисловості, зберігаючи комерційну автономію."
  austrian_monastery_reform_melk: "Монастирська реформа [ShowLocationNameWithNoTooltip('melk')]"
  austrian_monastery_reform_melk_desc: "Дотримуючись порад наших найкращих духовних радників, ми реформували наші монастирі відповідно до [ShowReligionAdjective('catholic')] принципів."
  vienna_concordat_privilege: "Конкордат [ShowLocationNameWithNoTooltip('vienna')]"
  vienna_concordat_privilege_desc: "Наша угода з [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle] стабілізує наші відносини. Однак нам доведеться поступитися частиною влади [ShowEstateTypeName('clergy_estate')], щоб задобрити [GetCountry('PAP').GetAdjective] сили."
  hab_tractatus_incorporalibus: "Tractatus de Iuribus Incorporalibus"
  hab_tractatus_incorporalibus_desc: "Регульовані відносини між землевласниками та [ShowEstateTypeName('peasants_estate')] забезпечать певний правовий захист для нашого найнижчого стану, хоча це ускладнить розширення нашої сільськогосподарської економіки."
  kannada_literature_aid: "Допомога [ShowLanguageNameWithNoTooltip('kannada_language')] літературі"
  kannada_literature_aid_desc: "Надавши заможним членам нашого суспільства права щодо питань [ShowLanguageName('kannada_language')] мови, ми можемо гарантувати, що наша літературна спадщина не кане в забуття."
  vij_patronization_of_local_gods: "Права покровительства над малими божествами"
  vij_patronization_of_local_gods_desc: "[ShowReligionName('hindu')] божеств багато, і для нашого народу краще, якщо ми надамо їм право поклонятися тим богам, яким вони віддають перевагу."
  vij_allowance_of_religious_practices: "Дозволити релігійні практики"
  vij_allowance_of_religious_practices_desc: "Замість того, щоб зосереджуватися лише на [ShowReligionNameWithNoTooltip('hindu')] аспекті нашої нації, ми повинні дозволити нашим іншим релігійним меншинам право публічно сповідувати свою віру."
  promotion_of_muslim_scholars: "Просування [ShowReligiousGroupAdjectiveWithNoTooltip('muslim')] вчених"
  promotion_of_muslim_scholars_desc: "Щоб ще більше піднести [ROOT.GetCountry.GetName] як центр [ShowReligionGroupAdjective('muslim')] навчання, ми повинні забезпечити вступ більшої кількості вчених до нашої адміністрації, незважаючи на їхню можливу приналежність."
  ira_iranian_art_patronage: "[ShowCultureGroupNameWithNoTooltip('iranian_group')] Меценатство"
  ira_iranian_art_patronage_desc: "Меценатство з боку наших [ShowCultureGroupName('iranian_group')] еліт уможливило розвиток і процвітання надзвичайних нових стилів мистецтва."
  ira_clerical_aristocracy: "Духовна аристократія"
  ira_clerical_aristocracy_desc: "Об'єднання між заможними землевласниками та [ShowEstateTypeName('clergy_estate')], за якого законне право власності на землю передається $clergy_estate$, щоб гарантувати, що зазначена власність ніколи не може бути конфіскована нацією."
  mam_muhtasibs: "Інспектори Мухтасіба"
  mam_muhtasibs_desc: "#italic Мухтасіб#! наглядає за доброчесністю ринку, інспектуючи [ShowEstateTypeName('burghers_estate')], публічно караючи фінансових злочинців та розробляючи посібники для виявлення та запобігання шахрайству."
  heritable_iqta: "Спадкове [ShowLawNameWithNoTooltip('iqta_law')]"
  heritable_iqta_desc: "Посада власника [ShowLawName('iqta_law')] зазвичай не є спадковою. Перетворення її на спадкову було б безпрецедентним і збільшило б лояльність [ShowEstateTypeName('nobles_estate')]."
  trunk_road_to_erzurum_privilege: "Магістральний шлях до $erzurum$"
  trunk_road_to_erzurum_privilege_desc: "$anatolia_region$ з'єднана з $tabriz$ та $persia_region$ надійною мережею магістральних шляхів. Оскільки ми безпосередньо контролюємо одне з її критичних перехресть, наші [ShowEstateTypeName('burghers_estate')] отримують великі переваги."
  lit_integrated_ruthenian_laws: "Інтегровані [ShowCultureNameWithNoTooltip('ruthenian')] Закони"
  lit_integrated_ruthenian_laws_desc: "Інтегруючи закони нашого [ShowCultureName('ruthenian')] народу, ми можемо ефективніше працювати над встановленням стандартного кодексу для королівства."
  lit_equal_status_of_orthodox_nobility: "Захист [ShowReligionAdjectiveWithNoTooltip('orthodox')] $nobles_estate$"
  lit_equal_status_of_orthodox_nobility_desc: "Численні [ShowEstateTypeName('nobles_estate')], які сповідують [ShowReligionAdjective('orthodox')] віру, заслуговують на рівний статус з тими, хто цього не робить. Гарантуючи їм ці права, вони з більшою ймовірністю підтримають нас у майбутньому."
  ukr_kholop_protection: "Права на захист холопів"
  ukr_kholop_protection_desc: "Замість того, щоб дозволяти багатим експлуатувати нижчі верстви, ми надамо та гарантуємо основні права людини [ShowEstateTypeName('peasants_estate')]."
  tur_banned_weaponry_for_peasants: "Заборонена зброя для [GetEstateNameWithNoTooltip('peasants_estate')]"
  tur_banned_weaponry_for_peasants_desc: "Наше королівство є домом для різноманітного населення, що іноді призводить до конфліктів. Якщо ми дозволимо нашим людям залишатися озброєними, ці дрібні суперечки можуть перерости у повномасштабну війну. Саме з цієї причини наші [ShowEstateTypeName('peasants_estate')] більше не можуть носити при собі жодної зброї."
  noble_patronage_of_the_arts: "Шляхетське покровительство мистецтв"
  noble_patronage_of_the_arts_desc: "Кілька видатних родин у [ShowEstateTypeName('nobles_estate')] взялися спонсорувати поетів, художників та вчених у своїх дворах та віллах. Хоча дехто може вважати це марнославством, таке покровительство часто породжує сміливі нові школи думки та вираження, зазвичай в обмін на більший вплив при дворі."
  guild_investments: "Гільдійні інвестиції"
  guild_investments_desc: "Гільдії погодилися спрямувати частину своїх коштів на покращення нашого виробничого процесу. Хоча багато з цих починань, ймовірно, зазнають невдачі, деякі можуть призвести до проривів, які можуть змінити нашу столичну економіку."
  statutes_of_piotrkow: "Статути Пйотркова"
  statutes_of_piotrkow_desc: "Ці статути є символом зусиль [ShowEstateTypeName('nobles_estate')] щодо консолідації своїх привілеїв та влади, яку мають кріпацтво та аристократія. Через ослаблення нижчих соціальних класів та міст, $nobles_estate$ прагнуть утвердити свій вплив."