l_english:
  nobles_estate: "Шляхта"
  nobles_estate_desc: "Цей стан представляє нашу земельну аристократію. Їхні привілеї гарантовані давніми традиціями, більшість з яких спочатку були надані в обмін на виняткову службу державі. Вони традиційно відповідають за захист держави від зовнішніх небезпек, а також допомагають правителю підтримувати мир.\n$estate_common_crown_ending$"
  clergy_estate: "Духовенство"
  clergy_estate_desc: "Цей стан представляє освічених священників нашої державної релігії. Їхня традиційна відповідальність полягає в турботі про духовний добробут держави та нашого народу, але вони також мають давню традицію служіння в адміністрації нашої країни. Протягом століть побожні люди та колишні правителі обдаровували їх цінним майном та привілеями.\n$estate_common_crown_ending$"
  burghers_estate: "Міщани"
  burghers_estate_desc: "Цей стан представляє комерційний клас нашої країни, включаючи ремісників, купців та торговців. Їхня традиційна відповідальність полягає в підтримці та розвитку економіки. Тому їм зазвичай надаються особливі права та привілеї для сприяння комерції та торгівлі.\n$estate_common_crown_ending$"
  peasants_estate: "Простолюдини"
  peasants_estate_desc: "Це стан, який представляє населення на найнижчому щаблі суспільства. Часто клас, якому надається мало або зовсім не надається престижу чи влади, простолюдини, тим не менш, становлять основу нашої країни і можуть стати напрочуд могутніми, коли об'єднаються."
  crown_estate: "Корона"
  crown_estate_desc: "Це серце та джерело влади для всього нашого королівства та уряду, що належить виключно тим, хто перебуває на самій вершині, і не надається іншим станам.\nЗагалом, найкраще, щоб державний стан мав якомога більше влади."
  dhimmi_estate: "Діммі"
  dhimmi_estate_desc: "Цей стан представляє релігійні меншини в нашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e], які вважаються «Людьми Книги» в [ShowReligionGroupName('muslim')]. Зазвичай це стосується [ShowReligionGroupAdjective('christian')] та [ShowReligionAdjective('judaism')] громад, але іноді поширюється на інші [Concept('religions', 'CONCEPT_PLACEHOLDER')|e]. Їхній статус та привілеї можуть значно відрізнятися між різними країнами, як і їхня організація та чисельність.\n$estate_common_crown_ending$"
  tribes_estate: "Племена"
  tribes_estate_desc: "Цей стан представляє різні племена та клани, присутні в нашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Вони традиційно організовані в родові та споріднені групи та розселені переважно в сільській місцевості. Ці різні групи живуть і працюють дуже різноманітно, а їхня віддаленість та відносна незалежність від основних центрів влади ускладнюють управління ними. Їхні унікальні звичаї також зазвичай надають їм репутацію грізних, непередбачуваних воїнів.\n$estate_common_crown_ending$"
  cossacks_estate: "Козаки"
  cossacks_estate_desc: "Цей стан представляє різні групи [ShowCultureName('cossack_culture')] людей, присутніх у нашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Організовані в напівкочові та напіввійськові групи, вони живуть на околицях інших націй, але їх можна переконати служити їм вірно та використовувати з великою користю, якщо надати відповідні стимули.\n$estate_common_crown_ending$"
  estate_common_crown_ending: "Загалом, краще, щоб державний стан мав більше влади, ніж інші стани."
