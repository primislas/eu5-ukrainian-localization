  n_canoe: "Каное"
  n_canoe_desc: "Невеликі човни, що рухаються веслами, каное є примітивними суднами для перевезення невеликої кількості воїнів водними шляхами."
  n_mediterrannean_galley: "Середземноморська галера"
  n_traditional_galley: "Традиційна галера"
  n_traditional_galley_desc: "Галери різних форм домінували на морях тисячоліттями, і багато віддалених корабелів досі будують їх традиційними способами. Майстерність будівництва кораблів передається з покоління в покоління, хоча з невеликими інноваціями."
  n_genoese_galley: "Генуезька галера"
  n_genoese_galley_desc: "$n_genoese_galley$ є основою генуезького флоту. Легший і довший за інші галери, що використовуються в Середземному морі, цей корабель здатний досягати неперевершеної швидкості, а також має значну перевагу в вантажопідйомності за рахунок маневреності та довговічності."
