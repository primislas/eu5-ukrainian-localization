  a_warriors: "Воїни"
  a_footmen: "Піші воїни"
  a_footmen_levy: "Піші ополченці"
  a_lancers: "Улани"
  a_houfnice: "Гауфниця"
  a_arquebusiers: "Аркебузири"
  a_caracole: "Караколь"
  a_falconet: "Фальконет"
  a_musketeers: "Мушкетери"
  a_hussars: "Гусари"
  a_chambered_cannon: "Камерна гармата"
  a_line_infantry: "Лінійна піхота"
  a_dragoons: "Драгуни"
  a_royal_mortar: "Королівська мортира"
  a_cuirassiers: "Кірасири"
  a_flying_battery: "Летюча батарея"
  a_bedouin_cavalry: "Бедуїнська кіннота"
  a_bedouin_cavalry_desc: "Бедуїни — це кочовий народ, що мандрує пустельними регіонами Аравійського півострова, Північної Африки, Леванту та Месопотамії. Завдяки своєму кочовому способу життя вони опанували навички верхової їзди, а використання арабських коней робить їх грізною кінною силою."
  a_feudal_levy: "Феодальне ополчення"
  a_villagers: "Селяни"
  a_villagers_desc: "Цей підрозділ, сформований озброєними селянами без військової підготовки, є не більше ніж відчайдушною спробою протистояти ворогам, останньою лінією оборони проти сил загарбника."
  a_kerns: "Керни"
  a_kerns_desc: "Загони скірмішерів, що походять з суворих пагорбів та торф'яних боліт, $a_kerns$ — це легкі нальотчики, озброєні дротиками та кинджалами."
  a_gallowglass: "Галлогласи"
  a_gallowglass_desc: "Важка піхота, споряджена кольчугою та озброєна дворучними сокирами, грізні $a_gallowglass$ походять від норвезьких морських розбійників, що оселилися вздовж Атлантичного узбережжя."
  a_scottish_highlander: "Шотландський горець"
  a_scottish_highlander_desc: "Шляхетні клани Гайленду є безцінним активом для нашого війська. Зі своїми старими формаціями, адаптованими до епохи мушкетів, що стали відомими як #ITALIC 'Гайлендська атака'#!, ці кланові воїни атакуватимуть ворога і завдадуть нищівного удару по моральному духу ворогів своїми широкими мечами."
  a_reformed_gallowglass: "Реформовані галлогласи"
  a_reformed_gallowglass_desc: "Поступовий вплив континентального стилю ведення війни призвів до появи краще оснащених і більш згуртованих підрозділів галогласів."
  a_late_gallowglass: "Пізні галогласи"
  a_late_gallowglass_desc: "Поєднання старого й нового, ці $a_late_gallowglass$ є важкоброньованими військами, оснащеними сумішшю сучасної зброї, такої як аркебузи, на додаток до їхніх традиційних дворучних мечів та сокир."
  a_early_longbowmen: "Бойові луки"
  a_early_longbowmen_desc: "Потужний бойовий довгий лук, спочатку застосовуваний з великим ефектом проти броньованих англійських лицарів у валлійських долинах, був прийнятий на озброєння по обидва боки кордону."
  a_longbowmen: "Довголучники"
  a_longbowmen_desc: "$a_longbowmen$ відзначаються не лише завдяки своєму потужному бойовому луку, але й завдяки рокам тренувань на стрільбищах."
  a_late_longbowmen: "Реформовані довголучники"
  a_late_longbowmen_desc: "Невеликі інновації в спорядженні та організації призводять до безперервних нищівних залпів, які розбивають усі, крім найважче броньованих, формування."
  a_hwacha: "Хвача"
  a_hwacha_desc: "$a_hwacha$ забезпечують нищівну вогневу міць завдяки своїм залпам ракетних стріл або болтів із залізними наконечниками. Їхня маневреність змушує їх займати більш оборонну роль у битвах."
  a_schiltron: "Шильтрон"
  a_schiltron_desc: "Щільна стіна з пік і щитів, $a_schiltron$ може стійко триматися проти атак ціною мобільності."
  a_hobelars: "Гобелари"
  a_hobelars_desc: "Верхи на спритних ірландських поні, $a_hobelars$ — списники, здатні швидко пересуватися по пересіченій місцевості."
  a_caterans: "Катерани"
  a_caterans_desc: "$a_caterans$ — дуже легкі рейдерські загони, озброєні короткими списами та ручними сокирами. Крім невеликих таргів та шоломів-черепів, вони не обтяжені обладунками, покладаючись натомість на свою швидкість для захисту."
  a_noble_cavalry: "Шляхетна кавалерія"
  a_noble_cavalry_desc: "Їзда верхи в бій довгий час була символом статусу серед можновладців."
  a_mailed_knights: "Лицарі в кольчугах"
  a_mailed_knights_desc: "Прикрашені яскравими регаліями та майоріючими вимпелами, $a_mailed_knights$ є видовищем, вартим уваги в будь-якій армії. Але саме їхні блискучі кольчуги та загострена сталь, разом із довічним тренуванням, роблять їх одними з найвитриваліших воїнів на полі бою."
  a_teulu: "Теулу"
  a_teulu_desc: "Поєднання кельтських і континентальних бойових традицій, $a_teulu$ — це кінні лицарі, які спритно панують на пересіченій місцевості."
  a_plated_knights: "Латовані лицарі"
  a_plated_knights_desc: "Закуті в найкращі сталеві обладунки, ці шляхтичі б'ються верхи з булавами та молотами, призначеними для розбивання шоломів та кірас."
  a_cavaliers: "Кавалеристи"
  a_cavaliers_desc: "Золота доба лицарства, можливо, й минула, але шляхта зберігає свою присутність на полі бою як галантна та добре озброєна кавалерійська сила."
  a_men_at_arms: "Лати"
  a_men_at_arms_desc: "Броньовані піхотинці, озброєні різноманітною зброєю ближнього бою, $a_men_at_arms$ є важкою піхотою ближнього бою, яка може проривати ворожі формування."
  a_men_at_arms_levy: "$a_men_at_arms$"
  a_men_at_arms_levy_desc: "$a_men_at_arms_levy$"
  a_pontifical_swiss_guard: "Швейцарська гвардія"
  a_pontifical_swiss_guard_desc: "$a_pontifical_swiss_guard$ — це збройні сили, сформовані неодруженими католицькими швейцарцями, місія яких полягає в забезпеченні безпеки Папи. Спочатку найняті як постійний найманий підрозділ, вони стали частиною армій Святого Отця."
  a_tercio: "Терція"
  a_tercio_desc: "$a_tercio$ — це елітний військовий підрозділ в іспанських арміях, відомий своїми бойовими формуваннями. Вважаючись одними з найкращих воїнів у Західній Європі, терції є однією з перших сучасних професійних армій регіону."
  a_the_black_army: "Угорська Чорна Армія"
  a_the_black_army_desc: "Служачи постійною найманою армією для Угорського королівства, $a_the_black_army$ є повноцінною армією, орієнтованою на війну, на відміну від інших найманих армій по всій Європі. Вони використовують надзвичайно високе співвідношення вогнепальної зброї для того періоду."
  a_landsknechte: "Ландскнехти"
  a_landsknechte_desc: "$a_landsknechte$ поєднують в одному підрозділі пікінерів із сумнозвісними #italic Doppelsöldner#!, «двічі оплачуваними людьми», що носять дворучні мечі, при цьому їх підтримують аркебузири на флангах."
  a_steppe_horse_archers: "Кінні лучники"
  a_steppe_horse_archers_desc: "Вершники зі Степу спеціалізувалися на двох способах кінного бою: списах або стрільбі з лука. Для останнього, розробка міцніших, але менших луків дала їм мобільність коней та точність і швидкий залп, які забезпечують короткі луки, роблячи їх ідеальними для тактики «вдарив-втік»."
  a_a_urughs: "А'Уруги"
  a_a_urughs_desc: "А'Уруги — це військові адміністративні сімейні підрозділи та стада, залишені монгольськими арміями."
  a_steppe_horde: "Ополчення Степової Орди"
  a_steppe_horde_desc: "Монгольських дітей вчать їздити верхи та стріляти з лука, і очікується, що вони приєднаються до рейдових загонів, коли виростуть. В Орді чоловіки поєднують селянську діяльність у мирний час, зазвичай пастушество, та військові обов'язки, коли цього вимагає лідер племені."
  a_tribal_cavalry: "Племінна кавалерія"
  a_tribal_cavalry_desc: "Багато племен, що живуть на околицях нашої країни, базують своє існування на вирощуванні та догляді за кіньми та худобою, живучи все своє життя навколо цих тварин, вони обов'язково виростять серед себе великих вершників.\n\nУ рідкісних випадках, коли сильна рука зуміє організувати цих некерованих бійців у напівзгуртований підрозділ, вони формують швидку та напрочуд ефективну силу."
  a_handgonners: "Ручничники"
  a_handgonners_desc: "$a_handgonners$ володіють новим типом зброї, наповненої порохом, яка стріляє смертоносними свинцевими снарядами, сіючи хаос у ворожих рядах, хоча їм потрібен повний захист, оскільки їхні ручниці дуже повільно перезаряджаються."
  a_archers: "Лучники"
  a_archers_desc: "$a_archers$ підтримують наших піхотинців дальнім вогнем, дозволяючи їм просуватися до ворожих ліній під час атаки, а також допомагаючи їм краще захищати свою позицію під час оборони."
  a_armored_horsemen: "Броньовані вершники"
  a_armored_horsemen_desc: "Вершники, які мають важчу броню, зазвичай у вигляді кольчуги або повного латного обладунку, щоб стрімголов атакувати ворожі лави."
  a_crossbowmen: "Арбалетники"
  a_crossbowmen_desc: "$a_crossbowmen$ — це тип підрозділів дальнього вогню, які використовують підвищену вогневу міць арбалетів, набагато потужнішої, хоча й повільної в перезарядці, метальної зброї."
  a_cavalrymen: "Кавалеристи"
  a_cavalrymen_desc: "$a_cavalrymen$ — це легка кавалерія, іноді озброєна метальною зброєю, яка використовується для атаки ворожих ліній, хоча іноді вони можуть бути готові до ближнього бою."
  a_heavy_cavalrymen: "Важкі кавалеристи"
  a_heavy_cavalrymen_desc: "Важчий тип кавалерії, повністю броньований і навчений для ударних атак, завдяки своїй важкій броні та озброєнню, що має призвести до порушення ворожої лінії."
  a_early_arquebusiers: "Ранні аркебузири"
  a_early_arquebusiers_desc: "Аркебуза — це еволюція ручної гармати, що робить її більш надійним типом порохової зброї, оскільки її легше та швидше перезаряджати, що робить її ідеальною для розгортання більших підрозділів порохового вогню."
  a_halberdiers: "Алебардники"
  a_halberdiers_desc: "$a_halberdiers$ — це підрозділи солдатів, які володіють древковою зброєю, такою як алебарди, що використовуються для ближнього бою, як в наступі, так і в обороні."
  a_light_lancers: "Легкі списники"
  a_light_lancers_desc: "$a_light_lancers$ — це тип легкої кавалерії, більше зосереджений на ударному бою, оскільки вони використовують ударний спис, також носячи певну ступінь броні. Однак свій успіх на полі бою вони базують на підтримці високого ступеня мобільності."
  a_pikemen: "Пікінери"
  a_pikemen_desc: "$a_pikemen$ — це піхотинці, озброєні піками, що дозволяє їм формувати щільні формації, які легко протистоять ворожим кавалерійським атакам, таким чином нівелюючи силу кавалерії на полі бою."
  a_pistoleers: "Пістольєри"
  a_pistoleers_desc: "$a_pistoleers$ — це легкі кавалеристи, озброєні пістолетами, типом порохової зброї, яку легше носити та використовувати верхи, але її також можна використовувати як зброю ближнього бою, завдяки її важкій, посиленій рукоятці."
  a_heavy_lancers: "Важкі списники"
  a_heavy_lancers_desc: "$a_heavy_lancers$ — це найважчий тип ударної кавалерії, що має повністю броньований обладунок та найкращі ударні списи. Їхні атаки призначені для повного порушення ворожої формації, і вони також набагато краще захищені від ворожого вогню на відстані."
  a_hunters: "Мисливці"
  a_hunters_desc: "$a_hunters$ — це легка піхота, призначена для атаки ворожих формацій з великої відстані, коли вони наближаються, намагаючись дезорганізувати їх і зробити їхню власну вогневу міць набагато менш ефективною."
  a_gallop_cavalry: "Галопна кавалерія"
  a_gallop_cavalry_desc: "$a_gallop_cavalry$ — це ударний підрозділ, який атакує ворога довгими кавалерійськими шаблями, захищений певним ступенем броні, що є хорошим балансом між мобільністю та силою."
  a_sharpshooters: "Влучні стрільці"
  a_sharpshooters_desc: "$a_sharpshooters$ є різновидом легкої піхоти, що складається з найкращих стрільців, які використовують гвинтівки з більшою дальністю, що робить їх кращими у перестрілках та порушенні ворожих формацій під час маневрування."
  a_fusiliers: "Фузилери"
  a_fusiliers_desc: "$a_fusiliers$ є основою наших армій, озброєні сучасною далекобійною гвинтівкою та багнетом, який можна до неї прикріпити і що уможливлює масовані атаки на ворожі лави."
  a_light_dragoons: "Легкі драгуни"
  a_light_dragoons_desc: "$a_light_dragoons$ є різновидом легкої кавалерії, що може пересуватися, спішуватися та стріляти по ворогу з гвинтівок, які вони носять, але також озброєні кавалерійськими шаблями, що дозволяє їм атакувати ворога, якщо виникне нагода."
  a_crusader_knights: "Лицарі-хрестоносці"
  a_crusader_knights_desc: "Воїни-ченці, присвячені поширенню Християнства, $a_crusader_knights$ формують елітний авангард релігійних військових орденів."
  a_crusader_knights_base: "$a_crusader_knights$"
  a_crusader_knights_base_desc: "$a_crusader_knights_desc$"
  a_crusader_knights_levy: "$a_crusader_knights$"
  a_crusader_knights_levy_desc: "$a_crusader_knights_desc$"
  a_late_crusader_knights: "Реформовані лицарі-хрестоносці"
  a_late_crusader_knights_desc: "Пристосовуючись до мінливого ведення війни, $a_crusader_knights$ прийняли нові тактики та вдосконалене озброєння. Завдяки цим адаптаціям вони збережуть свій статус елітних сил релігійних військових орденів."
  a_late_crusader_knights_base: "$a_late_crusader_knights$"
  a_late_crusader_knights_base_desc: "$a_late_crusader_knights_desc$"
  a_late_crusader_knights_levy: "$a_late_crusader_knights$"
  a_late_crusader_knights_levy_desc: "$a_late_crusader_knights_desc$"
  a_horsemen: "Вершники"
  a_horsemen_desc: "Легкоброньовані бійці, що сидять на швидких конях, загони $a_horsemen$ мають мобільність, щоб турбувати, атакувати та переслідувати."
  a_champions: "Витязі"
  a_champions_desc: "$a_champions$ є елітними одиницями серед племінних воїнів, сформовані з тих, хто виділяється серед лав $a_warriors$ своєю хоробрістю та бойовими здібностями."
  a_tribesmen: "Племінники"
  a_tribesmen_desc: "Розмахуючи різноманітними знаряддями та простою зброєю, $a_tribesmen$ є аграрними селянами, вихованими для захисту своїх домівок та свого роду."
  a_chieftains: "Вожді"
  a_chieftains_desc: "Шляхетні воїни, прикрашені декоративними обладунками та озброєні коштовною зброєю, $a_chieftains$ мають вести наступ і служити прикладом для інших бійців."
  a_moa_hunters: "Мисливці на моа"
  a_moa_hunters_desc: "Довічне вистежування гігантських птахів моа у суворих внутрішніх районах перетворило цих мисливців на особливо вправних застрільників."
  a_jaguar_warrior: "Воїни-ягуари"
  a_jaguar_warrior_desc: "Воїни-ягуари – це елітний клас піхоти в ацтекській армії. Вони б'ються макуавітлем, дерев'яною палицею, інкрустованою обсидіановими лезами. Щоб стати воїном-ягуаром, чоловік мав захопити щонайменше чотирьох полонених у битві."
  a_eagle_warrior: "Воїни-орли"
  a_eagle_warrior_desc: "Воїни-орли – це елітний клас піхоти в ацтекській армії. Вони використовують різноманітну зброю, включаючи метальні списи атлатль, списи та кинджали. Це найхоробріші солдати, які взяли найбільше полонених у битві. Простолюдини, а також шляхтичі, можуть стати воїнами-орлами за заслуги."
  a_warriors_desc: "$a_warriors$ – це назва, що дається племінним бійцям, які виконують накази своїх лідерів. Їхня зброя може відрізнятися залежно від походження, але її можна вважати дещо простою, проте ефективною."
  a_feudal_levy_desc: "$a_feudal_levy$ формується з селян, яких призивають у часи війни як частину їхнього обов'язку перед своїм феодальним паном, і які мають певну військову підготовку. Ці ополчення з часом мають бути замінені професійними арміями."
  a_camp_followers: "Табірні послідовники"
  a_camp_followers_desc: "Різношерста група торговців та сімей військових, $a_camp_followers$ надають неформальні послуги військовим загонам у поході."
  a_houfnice_desc: "Вважається, що сучасні гаубиці отримали свою назву від артилерії Houfnice, розробленої гуситами у 15 столітті. Ці короткоствольні гармати монтувалися на возах і використовувалися на полі бою для стрільби ядрами та картеччю на підтримку піхоти."
  a_serbian_hussars: "Сербські гусари"
  a_serbian_hussars_desc: "Гусари – це легка кавалерійська одиниця, походження якої можна простежити до загонів кінних сербських воїнів. Їхня легка броня та швидкі коні дозволяють їм перехитрити будь-який інший полк, відкриваючи двері для розробки інноваційних стратегій."
  a_peasant_levy: "Селянське ополчення"
  a_peasant_levy_desc: "$a_peasant_levy$ формується з простолюдинів, призваних на військову службу своїм Лордом. Чоловіки мають приносити власне спорядження на битву, тому якість новостворених підрозділів може сильно відрізнятися."
  a_supply_carts: "Вози постачання"
  a_supply_carts_desc: "$a_supply_carts$ є життєвою артерією будь-якої армії, що бажає вийти за межі рідних територій. Вони забезпечували їжею людей та кормом тварин, збільшуючи відстань, яку армія могла подолати, перш ніж зупинитися для пошуку провіанту на дуже ворожих землях."
  a_arquebusiers_desc: "Пікінерно-мушкетна формація, що складається з ядра військ, озброєних вогнепальною зброєю та захищених фалангою броньованих пікінерів, $a_arquebusiers$ є грізним підрозділом, якому нелегко протистояти."
  a_caracole_desc: "Наприкінці 16-го та на початку 17-го століття найпоширенішою бойовою формацією для західноєвропейської кавалерії була караколь, яку можна було застосовувати двома способами. За першим методом, перший ряд кавалерійської формації фронтально атакував ворога, кавалеристи стріляли зі своєї зброї на відстані 30-50 кроків. Потім вони розверталися і поверталися в тил формації, стаючи останнім рядом. Наступний ряд атакував таким же чином, стріляв по ворогу і повертався в тил. За цієї формації перший ряд завжди атакував, тоді як інші ряди заряджали зброю і чекали своєї черги атакувати. Інший метод полягав у атаці в один ряд, стріляючи, коли вороги були праворуч від них, а потім продовжуючи рух по колу, весь час перезаряджаючи зброю і повертаючись, щоб переформувати лінії в безперервній атаці."
  a_falconet_desc: "$a_falconet$ – це легка гармата, розроблена у 15 столітті як еволюція подібного фалькона, будучи більш мобільною, стріляючи снарядами меншого калібру."
  a_matchlock_levy: "Ополчення з ґнотовими рушницями"
  a_matchlock_levy_desc: "Розробка ґнотового аркебуза дозволяє озброїти велику кількість солдатів пороховою зброєю в масштабах, які були неможливі в Середньовіччі."
  a_supply_convoy: "Конвой постачання"
  a_supply_convoy_desc: "Перехід від феодальних ополчень до постійних армій у [ShowAgeName('age_3_discovery')] дозволяє проводити довші кампанії, створюючи потребу в забезпеченні цих солдатів протягом триваліших періодів. Це походить від більш організованого $a_supply_convoy$."
  a_musketeers_desc: "Мушкетери — це елітні бойові сили королівського двору. Бути мушкетером — це позиція великого престижу, і лише шляхтичам з багаторічною військовою службою дозволено вступати до лав роти."
  a_hussars_desc: "Гусари спочатку були легкою кавалерією, що походила з Центральної Європи, і використовувалася для розвідки, але зі занепадом старої феодальної армії їх перевели до професійних полків."
  a_chambered_cannon_desc: "У XVI столітті спостерігалися не лише покращення маневреності артилерії, але й спроби стандартизації розміру та ваги артилерійських знарядь."
  a_flintlock_levy: "Крем'яний набір"
  a_flintlock_levy_desc: "Крем'яний мушкет замінив ґнотовий аркебуз як основну піхотну зброю, забезпечуючи більшу та точнішу вогневу міць, будучи при цьому легшим у використанні та обслуговуванні."
  a_baggage_train: "Обоз"
  a_baggage_train_desc: "Узагальнення постійних армій у [ShowAgeName('age_4_reformation')] сприяє подальшому розвитку потреб їхніх солдатів у постачанні, використання $a_baggage_train$, що слідує за просуванням армій, стає звичним явищем."
  a_line_infantry_desc: "Завдяки багнетам кожен мушкетер може функціонувати і як пікінер. Це дозволяє вилучити піки з піхотного спорядження та забезпечує піхотні формування більшою вогневою міццю."
  a_dragoons_desc: "Драгуни — це клас кінної піхоти, яка використовує коней для мобільності, але спішується для бою пішки, хоча їх все частіше використовують як звичайну кавалерію."
  a_royal_mortar_desc: "З другої половини XVII століття використання артилерії на полі бою стало більш поширеним. Війська тепер могли пересувати свої польові гармати набагато легше та швидше."
  a_wagon_train: "Вагенбург"
  a_wagon_train_desc: "Зростання розміру армій під час [ShowAgeName('age_5_absolutism')] робить їхню логістику дедалі складнішою, роблячи кожну армію залежною від власного $a_wagon_train$ для підтримки її бойової ефективності в полі."
  a_wagenburg: "Вагенбург"
  a_wagenburg_desc: "$wagenburg_desc$"
  a_genoese_crossbowmen: "Генуезькі арбалетники"
  a_genoese_crossbowmen_desc: "$a_genoese_crossbowmen$ — це шанований військовий підрозділ, який використовувався генуезцями під час Першого хрестового походу і дотепер. Оснащені генуезькими арбалетами та павезами, ці піхотинці служать захистом своєї батьківщини, а також найманцями в Європі."
  a_footmen_desc: "Основа кожної армії, піхотинці складають більшість наших маршових військ, прагнучи утримувати лінію фронту та захищати наш дім від потенційних загарбників."
  a_footmen_levy_desc: "$a_footmen_desc$"
  a_lancers_desc: "Сильна кавалерія, озброєна списом, ці ударні війська призначені для прориву ворожих ліній та знищення сил наших ворогів."
  a_hungarian_hussars: "Угорські гусари"
  a_hungarian_hussars_desc: "Черпаючи натхнення з багатої спадщини кавалерії короля Матяша I Корвіна, ця ідея представляє «Королівські гусарські полки», надаючи грізну перевагу легкій кавалерії Угорщини. Завдяки своїм стрімким і безстрашним атакам, ці полки є символом угорської військової доблесті, доводячи свою незамінність на полях битв Європи."
  a_winged_hussars: "Крилаті гусари"
  a_winged_hussars_desc: "$winged_hussar_desc$"
  a_redcoats: "Червоні мундири"
  a_redcoats_desc: "Червоні мундири — це назва, дана англійській лінійній та колонній піхоті, після прийняття червоних мундирів солдатами, що воювали в Ірландії, та їх узагальнення в Армії нового зразка."
  a_experimental_riflemen: "Експериментальні стрільці"
  a_experimental_riflemen_desc: "Добірні стрільці, озброєні далекобійною гвинтівкою Бейкера та навчені прикривати основні сили у невеликих самостійних пікетах, $a_experimental_riflemen$ уособлюють сучасне бачення піхотних бойових формацій."
  a_militiamen: "Ополченці"
  a_militiamen_desc: "Поширення мушкетів як основної вогнепальної зброї протягом XVII століття дозволяє розгортати місцеві підрозділи ополченців як резервні та допоміжні підрозділи для основних армій на полі бою."
  a_infantry_column: "Піхотна колона"
  a_infantry_column_desc: "Збільшена вогнева міць, розроблена підрозділами лінійної піхоти, призводить до розробки нового типу піхотної тактики, заснованої на тренуванні швидкої зміни строю з лінії в колону для рішучої багнетної атаки на розгорнуту ворожу піхоту."
  a_cuirassiers_desc: "Йдучи в ногу зі змінами часу, $a_cuirassiers$ є важкою кавалерією, що відмовилася від списів на користь пістолетів та шабель як основної зброї."
  a_flying_battery_desc: "Артилерія є руйнівною на полі бою, але абсолютно марною, якщо ворог не входить у її зону ураження. Летюча батарея $a_flying_battery$ має здатність переміщуватися туди, де вона найбільш потрібна, і швидко передислокуватися до будь-якої ворожої відплати."
  a_order_knights: "Лицарі Ордену"
  a_order_knights_desc: "У лицарському ордені його члени повинні бути вправними в бою і служити інтересам ордену в битві. Таким чином, $a_order_knights$ є найкращими воїнами, яких може запропонувати будь-який орден."
  a_conscripts: "Рекрути"
  a_conscripts_desc: "Неохочі воїни, зобов'язані битися, масові $a_conscripts$ можуть здолати навчену армію лише чисельністю."
  a_logistics_corps: "Логістичний корпус"
  a_logistics_corps_desc: "Сувора операція, що складається з потягів постачання та ефективної бюрократії, $a_logistics_corps$ представляють вершину військової організації під час [ShowAgeName('age_6_revolutions')] для підтримки величезних армій."
  a_lour_lances: "Лурські списники"
  a_lour_lances_desc: "Так звані «galoys ove lour lances» є легкою піхотою, відомою своїм спритним використанням важких списів. Коли сутичка неминуче розпадається, вони вихоплюють великі ножі, щоб добити більш важкоброньованих ворогів."
  a_renaissance_conquistadors: "Ранні конкістадори"
  a_renaissance_conquistadors_desc: "Згідно з «капітуляціями завоювань», люди нижчого дворянства або іншого низького статусу вирушають завойовувати чужі землі для своїх королів."
  a_discovery_conquistadors: "Конкістадори"
  a_discovery_conquistadors_desc: "Більш сформована версія конкістадора з кращим розумінням того, до чого вони можуть прагнути. Ці люди, сповнені амбіцій, змусять імперії розвалитися."
  a_almogavars: "Альмогавари"
  a_almogavars_desc: "Альмогавари — це клас легкої піхоти, що походить з Арагонської Корони. Ці швидкі воїни служать прикордонними захисниками та піхотинцями. Окрім своєї ролі в Реконкісті, вони також знаходили роботу як найманці в Італії, Франкократії та Леванті."
  a_late_almogavars: "Реформовані альмогавари"
  a_late_almogavars_desc: "$a_almogavars$, приймаючи нові інновації, зазнали значних адаптацій для підвищення своєї ефективності на полі бою. Інтегруючи передову зброю та стратегічні досягнення у свою традиційну тактику, ці грізні воїни стали ще більш грізними. Завдяки поєднанню давнього досвіду та сучасних інструментів, вони є яскравим прикладом бездоганного злиття традицій та інновацій у війні."
  a_cacadores: "Касадори"
  a_cacadores_desc: "$a_cacadores$ (мисливці), португальська версія німецьких #italic Jägers#! або французьких #italic Chasseurs#!, є елітною легкою піхотною одиницею, місією якої є захист португальської території."
  a_catalan_crossbowmen: "Каталонські арбалетники"
  a_catalan_crossbowmen_desc: "Одні з найлютіших і найсмертоносніших арбалетників у Західному Середземномор'ї, $a_catalan_crossbowmen$ змагалися проти $a_genoese_crossbowmen$ за перевагу в цій галузі."
  a_lanzas_de_castilla: "Списи Кастилії"
  a_lanzas_de_castilla_desc: "Натхненні мавританською кавалерією генітурів, $a_lanzas_de_castilla$ є мобільною кавалерією, яка, однак, атакує натовп, як це зробила б важка кавалерія, хоча й не так важко озброєна."
  janissary: "Яничар"
  a_renaissance_janissaries: "Яничарська Гвардія"
  a_renaissance_janissaries_desc: "Яничари — це елітний корпус, вірний лише самому Султану. Їхні лави формуються за допомогою $devshirme_system_policy$ дитячого набору та проходять сувору військову підготовку. Таким чином, яничари є найдисциплінованішими силами Імперії."
  a_discovery_janissaries: "Яничарські аркебузири"
  a_discovery_janissaries_desc: "$a_renaissance_janissaries_desc$"
  a_reformation_janissaries: "Яничарські мушкетери"
  a_reformation_janissaries_desc: "$a_renaissance_janissaries_desc$"
  a_absolutism_janissaries: "Яничарська лінійна піхота"
  a_absolutism_janissaries_desc: "$a_renaissance_janissaries_desc$"
  a_revolutions_janissaries: "Яничарські колони"
  a_revolutions_janissaries_desc: "$a_renaissance_janissaries_desc$"
  EFFECTIVE_JANISSARY_BUILDINGS: "Ефективні яничарські будівлі"
  qizilbash: "Кизилбаші"
  qizilbash_estate_name: "[ROOT.GetCountry.GetGovernment.GetEstateName('tribes_estate')]"
  a_discovery_qizilbash: "$qizilbash$ Застрільник"
  a_discovery_qizilbash_desc: "$qizilbash$ є членами войовничого шиїтського ордену, що складається з коаліції різних тюркомовних племен. Їхні релігійні переконання відіграють важливу роль у їхньому обов'язку, роблячи їх як лютими воїнами, так і відданими членами ордену Сафавійя."
  a_reformation_qizilbash: "$qizilbash$ Кавалерія"
  a_reformation_qizilbash_desc: "$a_discovery_qizilbash_desc$"
  EFFECTIVE_QIZILBASH_BUILDINGS: "Ефективні $qizilbash$ будівлі"
  a_ghilman: "Гільмани"
  a_ghilman_desc: "$a_ghilman$ — це елітний корпус піхотинців, який перейняв використання вогнепальної зброї замість традиційної. Сформований з воїнів-рабів, $a_ghilman$ присягає на абсолютну вірність Шаху понад усе."
  EFFECTIVE_GHILMAN_BUILDINGS: "Ефективні будівлі $a_ghilman$"
  a_tofangchi: "Tofangchi"
  a_tofangchi_desc: "$a_tofangchi$ — це мушкетери імперії. Хоча вогнепальна зброя вже використовувалася раніше, її присутність була вкрай нерегулярною, оскільки багато хто з перського війська віддавав перевагу традиційній зброї — луку та стрілам. Полки $a_tofangchi$ прагнуть змінити це, оскільки вони навчені використанню сучасної зброї."
  a_tupchi: "Tupchi"
  a_tupchi_desc: "$a_tupchi$ — #italic артилеристи#! — це спеціалізований військовий підрозділ, зосереджений на використанні гармат та облогових знарядь. Подібно до $a_tofangchi$, $a_tupchi$ є прикладом сучасної війни, яку веде Перська імперія."
  a_jazayerchi: "Jazāyerchi"
  a_jazayerchi_desc: "$a_jazayerchi$ — це елітні мушкетери імперії. Оснащені важкими кремінними мушкетами з чудовою вогневою міццю та точністю і піддані постійним тренуванням, $a_jazayerchi$ вдається подолати навіть найнесприятливіші шанси в бою."
  a_hakkapelitta: "Hakkapeliitta"
  a_hakkapelitta_desc: "Hakkapeliitta були грізною фінською кавалерією, відомою своєю жахливою ефективністю на полі бою. Назва Hakkapeliitta є фінською модифікацією назв, які їм дали солдати Священної Римської імперії, що походить від їхнього бойового кличу 'Hakkaa päälle!', або 'Рубай їх!'/'Зрубай їх!'. Hakkapeliitta боялися за їхні раптові та дикі атаки, які шокували ворога, змушуючи його підкоритися."
  caroleans_advance: "$a_caroleans$"
  caroleans_advance_desc: "$a_caroleans_desc$"
  a_caroleans: "Кароліни"
  a_caroleans_desc: "Кароліни — це шведська та фінська піхота Шведської імперії. Набрані з селянства, кароліни проходять сувору підготовку і відомі тим, що вселяють страх у серця своїх ворогів."
  a_florentine_citizen_militia: "Флорентійська Громадянська Міліція"
  a_florentine_citizen_militia_desc: "Мінливий ландшафт дипломатії та війни в італійському [Concept('region', 'CONCEPT_PLACEHOLDER')|e] диктує, що ми не повинні довіряти наш захист і суверенітет найманим кондотьєрам. Натомість ми повинні створити дієздатний корпус $a_florentine_citizen_militia$, швидкий у мобілізації та не поступається жодним іншим військам за якостями, щоб захистити наші володіння від потенційних завойовників."
  a_iron_helmet_musketeers: "Залізношоломні Мушкетери"
  a_iron_helmet_musketeers_desc: "Вправні солдати, які носять залізні шоломи для захисту та володіють мушкетами як основною вогнепальною зброєю, ці війська стали домінувати на полях битв. Вони служать піхотними військами в різних арміях по всій Африці, під прапором деяких з наймогутніших правителів. Заряджаючи свої мушкети чорним порохом і свинцевими кулями, цілячись і стріляючи у своїх ворогів здалеку, їхні громові залпи зупиняли багато атак на місці, тоді як їхні залізні шоломи забезпечують життєво важливий захист голови під час битв і сутичок. Ці мушкетери відіграють вирішальну роль в еволюції війни, запроваджуючи вогнепальну зброю як значну силу на полі бою."
  a_jonow_auxiliary: "Jonow Допоміжні війська"
  a_jonow_auxiliary_desc: "Jonow — це раби, які супроводжують Kèlè-Koun та їхніх солдатів як носії їхнього військового спорядження."
  a_sofa_infantry: "Піхотинці Sofa"
  a_sofa_infantry_desc: "Раби, які були навчені військовому мистецтву, щоб служити державі як солдати. Хоча вони отримують свою зброю від Horon (вільних людей Малі), саме вони ризикують своїм життям у бою."
  a_mandekalu_infantry: "Піхота Mandekalu"
  a_mandekalu_infantry_desc: "$a_mandekalu_infantry$ є кістяком малійського війська і складаються з Horon — вільних людей Малі. Оснащені дротиками, луками та отруєними стрілами, вони є грізною силою, з якою слід рахуватися.\n\n$mandekalu_exp_gain_desc$"
  a_mandekalu_cavalry: "Вершники Mandekalu"
  a_mandekalu_cavalry_desc: "$a_mandekalu_cavalry$ є додатковою підтримкою малійського війська. Ці Горони — вільні люди Малі — отримували своїх коней та спорядження від Тон-тігі та Манси. Вриваючись у битву зі списами та довгими мечами, $a_mandekalu_cavalry$ демонстрували владу Манси навіть у найвіддаленіших куточках імперії.\n\n$mandekalu_exp_gain_desc$"
  a_farari_infantry: "Піхота Фарарі"
  a_farari_infantry_desc: "Фарарі — це елітні корпуси малійського війська. Призначені як з привілейованих, так і з простих людей, Фарарі відомі своєю хоробрістю та військовим досвідом."
  a_farari_cavalry: "Кіннота Фарарі"
  a_farari_cavalry_desc: "$a_farari_infantry_desc$"
  a_cawa: "Підрозділи Ч'ява"
  a_cawa_desc: "В Ефіопії арсенал Ч'ява охоплює грізний вигнутий меч, відомий як #italic шотель#!, універсальний спис, що зветься #italic тор#!, та майстерність у стрілецькій зброї, такій як луки та дротики, відомі як #italic армаг#!. Примітно, що серед них поширене використання захисних обладунків, включаючи знамениту кольчугу, що ще більше підвищує їхні оборонні можливості."
  a_renaissance_cawa: "Полки Ч'ява"
  a_renaissance_cawa_desc: "Краща система структури дозволяє Ч'ява бути краще навченими та стати могутньою силою для Ефіопії."
  a_discovery_cawa: "Аркебузири Ч'ява"
  a_discovery_cawa_desc: "Впровадження пороху робить традиційні луки та дротики застарілими, але дає нову перевагу Ч'ява."
  a_reformation_cawa: "Мушкетери Ч'ява"
  a_reformation_cawa_desc: "Дисципліна полків Ч'ява ще більше покращується, змушуючи їх битися більш злагоджено, завдаючи смертельних залпів своїм ворогам."
  a_absolutism_cawa: "Лінійна піхота Ч'ява"
  a_absolutism_cawa_desc: "Ч'ява адаптують лінійний стрій, маршируючи пліч-о-пліч і стріляючи по черзі. Коли перша лінія в бою перезаряджає свою вогнепальну зброю, друга займає їхнє місце для стрільби, щоб бути заміненою наступною в безперервному русі."
  a_revolutions_cawa: "Колони Ч'ява"
  a_revolutions_cawa_desc: "Найсучасніша версія Ч'ява. Ці бійці досягли найвищої точки дисципліни та ефективності, ставши жахом своїх ворогів."
  a_light_jurchen_cavalry: "Легка чжурчженська кіннота"
  a_light_jurchen_cavalry_desc: "Легке доповнення до нашої важкої кінноти, їхня роль полягає в переслідуванні розбитих ворогів та їхньому знищенні."
  a_iron_pagoda_cavalry: "Кіннота Залізної Пагоди"
  a_iron_pagoda_cavalry_desc: "Могутня та важка кіннота, призначена для прориву ворожої лінії фронту та нанесення смертельного удару по їхньому моральному духу та строю."
  paik_desc: "Пайки — це піхотинці Індії, які відомі своєю наступальною та оборонною універсальністю та майстерністю у стрільбі з лука."
  a_early_paik: "Ранній Пайк"
  a_early_paik_desc: "$paik_desc$ Кожен чоловік служить у системі Пайків як призовник Пайк, що призводить до більшої кількості військ на полі, але коштує професіоналізму."
  a_paik: "Пайк"
  a_paik_desc: "$paik_desc$"
  a_late_paik: "Пізній Пайк"
  a_late_paik_desc: "$a_late_paik_infantry_desc$"
  a_early_paik_infantry: "Рання піхота Пайк"
  a_early_paik_infantry_desc: "$paik_desc$"
  a_paik_infantry: "Піхота Пайк"
  a_paik_infantry_desc: "$paik_desc$"
  a_late_paik_infantry: "Пізня піхота Пайк"
  a_late_paik_infantry_desc: "$paik_desc$ З розвитком зброї розвивається і їхній набір навичок. Отже, луки ранніх епох були замінені сучасною мушкетом, але їхня універсальність все ще переважає."
  a_gurkha: "Гуркха"
  a_gurkha_desc: "Гуркхи — це війська непальського походження (оскільки їхня назва досить взаємозамінна), які відомі своєю незламною хоробрістю та дисципліною в бою."
  a_indian_elephant_auxiliary: "Допоміжний слон"
  a_indian_elephant_auxiliary_desc: "Міцні слони є чудовими тваринами для перевезення вантажів для наших армій. Хоча вони повільніші за коней та інших в'ючних тварин, чиста сила слонів дозволяє нам перевозити велику кількість їжі та припасів на ворожу територію."
  a_indian_elephant_cavalry: "Слон-кавалерія"
  a_indian_elephant_cavalry_desc: "Слон — це масивна тварина з довгими бивнями та товстою шкірою. Його здатність пересуватися будь-якими джунглями дає слону значну перевагу в дуже поширеній ніші Індії."
  a_orissan_elephant_cavalry: "Оріссанська слон-кавалерія"
  a_orissan_elephant_cavalry_desc: "$a_indian_elephant_cavalry_desc$ Крім того, Оріссанський бойовий слон здатний витримувати більше фізичних ушкоджень під час бою порівняно з іншими слонами, що використовуються для війни, завдяки своїй чудовій броні та підготовці."
  a_bengali_elephant_cavalry: "Бенгальська слон-кавалерія"
  a_bengali_elephant_cavalry_desc: "$a_indian_elephant_cavalry_desc$ Додатково до цього, Бенгальський бойовий слон має перевагу універсальності, оскільки він здатний перевозити значну кількість припасів."
  a_thai_elephant_cavalry: "$thai_culture$ Слон-кавалерія"
  a_thai_elephant_cavalry_desc: "$thai_war_elephants_desc$"
  a_siamese_advanced_elephant_cavalry: "$SIA_ADJ$ Слон-кавалерія"
  a_siamese_advanced_elephant_cavalry_desc: "Навіть коли інші країни вже відмовилися від використання слонів у війні, $SIA_ADJ$ продовжували їх використовувати, адаптуючи їх до нових умов, які передбачає сучасна війна."
  a_khmer_ballista_elephant_infantry: "$KHM_ADJ$ Слони-балісти"
  a_khmer_ballista_elephant_infantry_desc: "$a_khmer_ballista_elephant_infantry$ є грізною присутністю на полі бою, використовуючи подвійний арбалет, встановлений зверху."
  a_sowar_cavalry: "Кавалерія Совар"
  a_sowar_cavalry_desc: "$a_sowar_cavalry$ — це важка кавалерія Моґолів. Вони славляться своєю непохитною дисципліною та жахливим ударним наступом, що знищує будь-яку подобу надії для ворога."
  n_baghlah: "Баґла"
  n_baghlah_desc: "$n_baghlah$ — це велике глибоководне вітрильне судно, що використовується як торгове судно. Воно походить з Аравійського півострова, але поширилося аж до Островів прянощів як поширений тип судна."
  a_mauricians: "Маврикійці"
  a_mauricians_desc: "$a_mauricians$ — це дуже мобільний піхотний підрозділ, що веде залповий вогонь шеренгами стрільців, так що поки одна шеренга перезаряджає зброю, наступна веде вогонь по ворогу. Ця ротація дає їм величезну перевагу над ворогами."
  a_black_guard: "Чорна Гвардія"
  a_black_guard_desc: "$a_black_guard$ — це елітний корпус колишніх рабів. Виховані з дитинства дотримуватися релігійного кредо, вони відзначаються у стрільбі з лука, верховій їзді, мушкетній справі та мулярстві. Ці війська становлять кістяк нашої армії у час, коли наш народ найбільше потребує захисту."
  a_clan_retainers: "Кланові Дружинники"
  a_clan_retainers_desc: "Ключовою частиною армії будь-якого клану є їхні близькі дружинники, війська, пов'язані узами вірності та родинними стосунками."
  a_clan_retainer_cavalry: "Кланова Дружинницька Кавалерія"
  a_clan_retainer_cavalry_desc: "$a_clan_retainers_desc$"
