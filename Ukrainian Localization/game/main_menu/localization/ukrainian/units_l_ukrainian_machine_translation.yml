  a_age_5_absolutism_cavalry: "Епоха Абсолютизму Кіннота"
  a_age_5_absolutism_auxiliary: "Епоха Абсолютизму Допоміжні війська"
  a_age_5_absolutism_artillery: "Епоха Абсолютизму Артилерія"
