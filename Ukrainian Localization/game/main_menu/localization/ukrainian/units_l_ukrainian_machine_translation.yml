  army_artillery_desc: "Далекобійна зброя, обслуговувана командою фахівців, що запускає снаряди, переважно призначені для пролому та руйнування укріплень."
  army_auxiliary_desc: "Допоміжні війська — це надзвичайно різнорідні підрозділи, чиє призначення полягає в підтримці основної частини війська."
  army_cavalry_desc: "Кіннота — це підрозділи воїнів, що пересуваються верхи, визначені своєю надзвичайною мобільністю та ударною міццю."
  army_infantry_desc: "Піхота — це підрозділи вояків, що б'ються пішки та зазвичай становлять основну силу регулярних армій."
  navy_galley_desc: "Галлери — це мілкосидячі кораблі, що переважно рухаються веслами та використовуються головно в прибережних водах."
  navy_heavy_ship_desc: "Важкі кораблі — це великі судна, оснащені кількома щоглами та кількома палубами, що використовуються для ведення війни та проектування могутності по всьому світу."
  navy_light_ship_desc: "Легкі кораблі — це малі та відносно дешеві судна з мілким кілем, що зосереджені на швидкості, маневреності та легкості навігації."
  navy_transport_desc: "Транспорти — це суміш пасажирських та торгових суден, що використовуються для перевезення військ через моря."
  n_age_1_traditions_galley: "Галлера Доби Традицій"
