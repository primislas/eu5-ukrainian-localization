  a_byzantine_cataphracts: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip] Катафракти"
  a_byzantine_cataphracts_desc: "Могутній загін важкоброньованих лицарів, катафракти складають еліту наших кавалерійських підрозділів. Озброєні коротким списом під назвою «контос» і покриті лускатою бронею, ці війська вселяють страх у серця наших ворогів. Вихор сталі у вигляді нестримної хвилі вершників завдає смертельного удару всім, хто прагне розтоптати наш народ."
  a_byz_helepolis_cannon_unit: "Модернізований Гелеполіс"
  a_byz_helepolis_cannon_unit_desc: "Гелеполіс служив багатьом візантійським імператорам у минулому. З появою пороху та нових облогових машин, артилерія, що брала міста, тепер набула своєї нової смертоносної форми."
  a_akritai: "Акрити"
  a_akritai_desc: "Акрити здобули популярність як захисники [ShowRegionName('anatolia_region')] від східних загроз, з якими стикалася імперія. Цим солдатам надавалися гранти через [ShowGovernmentReformName('theme_system')] для обробітку та захисту, як засіб винагороди та причини захищати нашу батьківщину."
  a_varangians: "Варяги"
  a_varangians_desc: "Могутні воїни, що походили з північних земель вікінгів, ці обрані люті солдати складають ядро королівської гвардії. Озброєні сокирами та щитами, їх часто описували як #italic пелекіфорой барбарой#!, варварів, що володіють сокирами."
  a_late_winged_hussars: "Пізні крилаті гусари"
  a_late_winged_hussars_desc: "$winged_hussar_desc$"
  winged_hussar_desc: "Одягнені в характерні крила та блискучі обладунки, ці кавалеристи є силою, з якою слід рахуватися, коли йдеться про їхні потужні атаки, що завдають величезної шкоди та руйнують моральний дух ворога."
  a_red_cannon: "Червона гармата"
  a_red_cannon_desc: "Розроблена спільними зусиллями імперських зброярів і відома також як #italic Hóngyípào#!, ця артилерійська установка є втіленням досконалості азійської майстерності на основі європейських зразків. Засновані на моделях кулеврин, що використовувалися на Заході, ці гармати отримали подальші вдосконалення, збільшивши свою вогневу міць та зменшивши вагу."
  a_banner_cavalry: "Прапорна кавалерія"
  a_banner_cavalry_desc: "Народжені в степах і виховані в труднощах між битвою та залізом, ці вершники несуть загибель тим, хто прагне протистояти нашому правлінню. Їхні руйнівні атаки та майстерність у війні роблять їх грізним противником."
  n_hanseatic_cog: "Ганзейський ког"
  n_hanseatic_cog_desc: "$n_hanseatic_cog$ є гордістю нашого торгового флоту. Спочатку задуманий наприкінці XII століття, він постійно перероблявся та вдосконалювався протягом наступних ста років. Характеризуючись своєю опуклою формою, однією щоглою, квадратним вітрилом, кормовим кермом та плоским дном, він революціонізував перевезення вантажів. Його конструкція полегшувала навігацію на мілководді, роблячи його дуже практичним для торгівлі. З невеликим екіпажем ког міг ефективно транспортувати значні вантажі, надаючи Ганзейському союзу значну перевагу в торгівлі над його конкурентами."
  a_akinji: "$akinji_cavalry$"
  a_akinji_desc: "Підрозділ легкої кавалерії, що спеціалізується на мобільній та дальній війні, ці нальотчики є чудовою армією та цінним доповненням до наших лав."
  a_mamluk_unit_traditions: "Ранні $mamluks$"
  a_mamluk_unit_traditions_desc: "Добре навчені елітні війська, ці люди були відточені, щоб представляти найкраще, що може запропонувати наш народ. Виховані як раби, куплені у іноземних господарів, вони дисципліновані та навчені нашим релігійним та військовим доктринам, оскільки очікується, що вони становитимуть ядро нашої постійної армії. Часто вони оснащені важкими обладунками та міцними списами. Їхні унікальні шоломи та присутність на полі бою є жахливим видовищем для наших ворогів."
  a_halqah_unit: "Ḥalqah"
  a_halqah_unit_desc: "Допоміжні підрозділи, які часто супроводжували своїх $mamluk$ побратимів, ці легкі та швидкі війська нададуть велику підтримку своїм основним силам на полі бою."
  a_mamluk_unit_renaissance: "Реформовані $mamluks$"
  a_mamluk_unit_renaissance_desc: "Пізніші війська $mamluk$ характеризуються поновленою увагою до деталей та дисципліни. Запроваджується низка військових реформ, щоб відновити старі стандарти та перенавчити наші постійні армії."
  a_muslim_riders_vijay: "Мусульманські вершники"
  a_muslim_riders_vijay_desc: "На відміну від піхотних армій Південної Індії, ці $a_muslim_riders_vijay$ дозволять значно більшу гнучкість у бою."
  a_reislaufer: "Reisläufer"
  a_reislaufer_desc: "Деякі з наших співвітчизників вирішують подорожувати до чужих земель і заробляти на життя як найманці для іноземних правителів. Повернувшись додому, ці люди стають ветеранами-солдатами та одними з найкращих бійців Європи."
  n_mtepe: "Mtepe"
  n_mtepe_desc: "Один з найпоширеніших типів кораблів і попередник стандартного $n_kilwan_dhow$, $n_mtepe$ пов'язаний з $swahili_culture$ як непохитний наріжний камінь їхньої морської майстерності. На відміну від $n_kilwan_dhow$, $n_mtepe$ має квадратну корму, а його основна конструкція не використовує цвяхів. Замість цього використовується зшита дошка, що скріплює корпус. Основна роль $n_mtepe$ полягає в навігації мілководдям місцевих вод та встановленні морської торгівлі вздовж узбережжя $africa$."
  n_kabang: "Kabang"
  n_kabang_desc: "Широко використовуваний по всій $indonesia_region$, $n_kabang$ є універсальним судном середнього розміру, часто виготовленим з одного шматка дерева. Окрім своєї ролі як транспорту для людей та товарів, він став синонімом морських кочівників. Ці люди складаються з населення селян та рибалок, які використовували припливи та мусони для міграції з порту в порт, заробляючи на життя морем."
  a_late_karambit_warrior: "Пізні воїни Карамбіт"
  a_late_karambit_warrior_desc: "Озброєні рудиментарними обладунками та своєю фірмовою зброєю, ці воїни покладаються на майстерність швидкості, лютості та плавних рухів. Вони відмінно проявляють себе в ближньому бою, де вигнуте лезо карамбіта надзвичайно ефективне для розсікання, зачіпання та розпорювання супротивників. Прийняття та поширення нових формацій та бойових маневрів перетворило цих воїнів на легендарну збройну силу, яку бояться по всьому архіпелагу."
  a_cetbang_cannon: "Cetbang"
  a_cetbang_cannon_desc: "Одна з найвидатніших дульнозарядних гармат нашої епохи — це $a_cetbang_cannon$. Озброєна циліндричним коротким стволом, вона завдає нищівного удару з величезною силою. Її популярність така, що вона знаходить застосування в багатьох аспектах ведення нашої війни, від захисту наших портів до того, щоб бути головним озброєнням наших військових кораблів та армій."
  n_madurese_gali: "Madurese Ghali"
  n_madurese_gali_desc: "Люди, що населяють $madura_strait$, прийшли служити в нашому флоті. Їхня морська доблесть та великі навички кораблебудування дали початок новому типу судна, $n_madurese_gali$. Великий корабель, він використовується для наступальних та пов'язаних з подорожами завдань, оскільки незабаром становитиме основу нашого флоту."
  n_jong: "Jong"
  n_jong_desc: "$n_jong$ гордо служив нашому народу протягом довгого часу. Його характерна кількість щогл та корпус виготовлені з товстого дерева, що робить його ідеальним судном для поєднання перевезення товарів на великі відстані, а також військ."
  a_naft_throwers: "Naft Throwers"
  a_naft_throwers_desc: "Використовуючи таємницю грецького вогню, ці $a_naft_throwers$ кидають запальні гранати у ворога, використовуючи цей елемент, щоб не тільки спалити своїх супротивників, але й посіяти розгубленість та паніку в їхніх лавах. Вони переважно служать для залякування ворога, а не для вбивства."
  a_dahomey_amazons: "Dahomey Amazons"
  a_dahomey_amazons_desc: "Полк жінок, що походять з [ShowRegionName('guinea_region')]. Вони вселяють страх у ворожі лави та завдають нищівної шкоди."
  a_esho_cavalry_oyo: "Esho Cavalry"
  a_esho_cavalry_oyo_desc: "Професійні полки менших вождів у межах нації, ці вершники обираються не за зв'язками, а за заслугами."