  a_age_3_discovery_artillery: "Епоха Відкриттів Артилерія"
  a_age_4_reformation_infantry: "Епоха Реформації Піхота"
  a_age_4_reformation_cavalry: "Епоха Реформації Кіннота"
  a_age_4_reformation_auxiliary: "Епоха Реформації Допоміжні війська"
  a_age_4_reformation_artillery: "Епоха Реформації Артилерія"
