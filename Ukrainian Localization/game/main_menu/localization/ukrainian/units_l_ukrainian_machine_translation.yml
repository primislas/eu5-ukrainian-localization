  n_iberian_caravel: "Іберійська каравела"
  n_square_rigged_caravel: "Каравела з прямим вітрилом"
  n_early_iberian_galleon: "Ранній іберійський галеон"
  n_iberian_galleon: "Іберійський галеон"
  n_barque_desc: "Барк був невеликим вітрильним судном, спочатку використовуваним для торгівлі. Адаптація їх для війни забезпечила меншу та швидшу альтернативу більшим каракам."
  n_brig_desc: "Бриг був невеликим судном, що використовувався для торгівлі або війни, характеризувався наявністю двох щогл з прямим вітрильним оснащенням. При використанні у війні це були невеликі судна з 10-18 гарматами, але їхня швидкість і маневреність робили їх цінними активами. Їхнє повне пряме оснащення також робило їх більш придатними для подорожей за пасатними вітрами, коли вони довго пливли за вітром."
  n_caravel_desc: "Каравела була невеликим, дуже маневреним судном, яке могло плавати з високою точністю під час довгих дослідницьких подорожей. Хоча конструкції відрізнялися, каравела мала фок-вітрило, прямий грот і латинську бізань. Її менший розмір обмежував кількість гармат на борту, але це також означало, що це легке судно могло досліджувати мілководні прибережні води та естуарії. Васко да Гама, Кабот, Колумб і Магеллан використовували каравели під час своїх подорожей наприкінці XV та на початку XVI століть."
  n_carrack_desc: "Конструкція караки, пізньосередньовічного судна, поєднувала риси германських лонгшипів та арабських торгових суден. Вона була менш маневреною, ніж каравела, але завдяки більшому розміру могла перевозити припаси для довгих подорожей, вантажі для торгівлі та гармати для самооборони. Деякі караки, такі як англійське судно «Henri Grâce à Dieu», важили понад 1000 тонн, мали великі носові та кормові замки і могли вважатися найбільшими військовими кораблями свого часу."
  n_fishing_boat_desc: "Малі цивільні човни, що використовувалися для вилову риби з моря, були залучені до служби як елементарний транспорт для військ. Вони малі та беззахисні, але можуть бути використані в крайньому випадку для переміщення людей, тільки будьте обережні, щоб вас не спіймав ніхто з гарматами."
  n_hulk_desc: "Халк був типом європейського судна, попередником караки та каравели, що виник у Нижніх Землях як річковий човен і використовувався переважно як вантажне судно, хоча міг також застосовуватися у війні. Він був побудований з однією щоглою з прямим вітрилом та з замком на обох кінцях судна. Здатний конкурувати з когом за вантажопідйомністю, халк був основним торговим судном, що використовувався Ганзейським союзом."
  n_cog_desc: "Ког був невеликим судном, широко використовуваним у середньовічній Європі. Характеризувався наявністю однієї щогли з прямим вітрилом і був побудований з перекриваючих дощок, це була еволюція вікінгських торгових суден. Їхня конструкція робила їх більш придатними для навігації в Північній Атлантиці, ніж середземноморські судна, тоді як їхнє простіше оснащення вимагало менше людей для експлуатації. Він широко використовувався Ганзейським союзом, поки зрештою не був замінений халком."
  n_early_carrack_desc: "Рання карака була першим європейським судном, що могло плавати у відкритому морі Атлантичного океану. Конструкція цього пізньосередньовічного судна поєднувала риси германських лонгшипів та арабських торгових суден. Вона була менш маневреною, ніж каравела, але завдяки більшому розміру могла перевозити припаси для довгих подорожей, вантажі для торгівлі та гармати для самооборони."
  n_pinnace_desc: "Зі зростанням заморської торгівлі виникла потреба у швидкому ескортному судні для забезпечення безпечної подорожі. Для цього було розроблено $n_pinnace$. Це був менший, стрункіший військовий корабель з однією гарматною палубою, який забезпечував захист від піратства в небезпечних водах."
  n_eastindiaman_desc: "Ост-Індійський корабель був загальним терміном для всіх суден, що працювали на будь-яку з Ост-Індійських торгових компаній. Будучи здатними перевозити як пасажирів, так і товари, вони спочатку будувалися для перевезення якомога більшої кількості вантажу. Вони все ще були озброєні для захисту від піратів, тому могли також брати участь у військових діях, але торгівля завжди була їхньою основною функцією."
  n_flute_desc: "Вантажне судно, розроблене в Нідерландах у XVI столітті, було побудоване для максимального збільшення вантажного простору та ефективності екіпажу. І воно стало одним з найпоширеніших кораблів у XVI та XVII століттях. Стандартна конструкція не була озброєна, але за потреби її можна було оснастити гарматами та використовувати як допоміжні судна."
  n_frigate_desc: "З часом фрегат еволюціонував. Він став більшим і важкоозброєним, іноді з двома гарматними палубами. Поєднання швидкості та вогневої потужності фрегата означало, що він міг обігнати будь-який корабель з більшою кількістю гармат і перевершити за вогневою потужністю будь-який швидший корабель. Флот, побудований Англійською Співдружністю у 1650-х роках, складався майже виключно з фрегатів."
  n_galleass_desc: "Галеас був адаптацією великої торгової галери для протидії зростаючому використанню лінійних кораблів. Більший за галеру, галеас мав близько 32 пар весел, кожне весло обслуговувало до п'яти чоловік. Як відповідь на озброєння та вищі борти лінійних кораблів, галеас мав баки та юти, а також гарматні палуби над веслярами. Ця додаткова вага означала, що вони також більше покладалися на вітрила, і були повільнішими та менш маневреними порівняно з галерами. Як і галера, галеас вийшов з регулярного використання з появою більш досконалих океанських лінійних кораблів, але залишався корисним на мілководді до XVIII століття."
  n_galleon_desc: "Великий, зазвичай трищогловий вітрильник, спочатку розроблений як військовий корабель, але пізніше використовувався переважно для торгівлі та комерції."
  n_heavy_frigate_desc: "Важкий фрегат був запроваджений британцями у XVIII столітті як більший варіант фрегата як за розміром, так і за потужністю його гармат. Більша кількість і більші гармати означали збільшення їхньої вогневої потужності та призвели до появи кораблів індивідуально більшої сили. Важкі фрегати стали стандартними фрегатами під час Французьких революційних та Наполеонівських війн."
  n_mediterrannean_galley_desc: "Маючи коріння в стародавніх суднах античності, галера залишалася основним вибором для середземноморських морських війн до XVI століття. Галера переважно приводилася в рух веслами, зазвичай близько 25 пар, кожне з яких обслуговувало до трьох чоловік. Це означало, що вони були менш залежні від вітрових умов порівняно з вітрильними суднами, а їхня маневреність робила їх грізним супротивником. Зрештою, галера вийшла з регулярного використання з появою більш досконалих океанських лінійних кораблів, але залишалася корисною на мілководді до XVIII століття."
  n_merchantman_desc: "Торгове судно – це тип судна, що використовується для комерції, перевезення товарів або пасажирів. Вони, як правило, мали певне озброєння для захисту від піратів та каперів, особливо якщо здійснювали тривалі подорожі, у такому випадку вони могли бути навіть важкоозброєними."
  n_threedecker_desc: "Трипалубні кораблі були військовими кораблями, що мали три повністю озброєні палуби з гарматами. Додаткові гармати також могли розміщуватися на баку або шканцях, але лише батареї трьох головних палуб утворювали безперервну батарею. Трипалубні кораблі вважалися лінійними кораблями, тобто достатньо міцними, щоб брати участь у лінійному бою."
  n_twodecker_desc: "Двопалубні кораблі були військовими кораблями, що мали дві повністю озброєні палуби з гарматами. Додаткові гармати також могли розміщуватися на баку або шканцях, але лише батареї двох головних палуб утворювали безперервну батарею."
  n_war_galley_desc: "Військові галери – це галери, що використовуються для війни. Вони довгі та мілкі, рухаються переважно веслами, хоча зазвичай також мали якийсь вітрил. Використовувані з давніх часів, їхня присутність була звичайною на морях та океанах протягом Середньовіччя завдяки їхній вищій маневреності. Використовуючись для абордажу, а не для дальніх боїв, метальна зброя та гармати були зосереджені на носі корабля, залишаючи захист слабких місць бортів та корми на здатність перехитрити своїх ворогів."
  n_xebec_desc: "Невелике дво- або трищоглове судно, широко використовуване в Середземномор'ї з XVI століття."
  n_early_turtle_ship_desc: "$n_early_turtle_ship$ – це корейський військовий корабель, який використовує весла та вітрила, щоб перехитрити інші типи галер, а також оснащений легкими #italic Chongtong#! – корейською вогнепальною зброєю."
  n_turtle_ship_desc: "Еволюція $n_early_turtle_ship$, вдосконалена модель $n_turtle_ship$ має збільшену висоту фальшборту для підвищення її міцності без шкоди для мобільності."
  n_panokseon_desc: "$n_panokseon$ – це багатопалубний військовий корабель, що має більші розміри та вогневу міць, ніж звичайний $n_turtle_ship$. Хоча він все ще покладається на весла, вітрила $n_panokseon$ дозволяють йому досягати більшої швидкості, порівнянної з галерами для його розміру."
  n_catalan_galley_desc: "Оригінальний винахід з іберійських середземноморських узбереж, $n_catalan_galley$ домінував у західному Середземномор'ї в жорстокій конкуренції з $n_genoese_galley$ за панування на хвилях."
  n_early_iberian_caravel_desc: "$n_early_iberian_caravel$ – це легкий корабель, розроблений на північно-західних узбережжях Піренейського півострова, який незабаром пошириться по всьому континенту."
  n_iberian_caravel_desc: "$n_early_iberian_caravel$ застаріває з появою $n_iberian_caravel$, який еволюціонує, щоб перевершити вже поширений $n_caravel$ завдяки кращому дизайну вітрил та кращому озброєнню. Ці кораблі стануть вістрям Епохи Відкриттів."
  n_square_rigged_caravel_desc: "$n_square_rigged_caravel$ – це португальський винахід, що народився з поєднання $n_iberian_caravel$ та $n_carrack$. Цей корабель поєднує швидкість першого та структуру й довговічність останнього, що робить його ідеальним судном для бою та досліджень."
  n_early_iberian_galleon_desc: "$n_early_iberian_galleon$ – це важкий корабель, розроблений на берегах Піренейського півострова, який прийме кожен європейський флот."
  n_iberian_galleon_desc: "$n_iberian_galleon$ – це еволюція $n_early_iberian_galleon$, яка покаже силу іберійських військово-морських технологій решті світу."
  n_kilwan_dhow: "$ZAN_ADJ$ Дау"
  n_kilwan_dhow_desc: "Відомий своїм струнким та подовженим корпусом, $n_kilwan_dhow$ славиться тим, що є основою нашої морської торгівлі, яка з'єднує наші порти з далекими землями. Сам корабель є проявом нашої майстерності суднобудування, оскільки наші робітники використовують пальми для міцного корпусу, а також місцеву бавовну для вітрил."
  n_kilwan_zambuc: "$ZAN_ADJ$ Замбук"
  n_kilwan_zambuc_desc: "$n_kilwan_zambuc$ — це менша варіація $n_kilwan_dhow$, яка переважно використовується для місцевої торгівлі, перевезення товарів і кераміки між різними містами-державами вздовж $swahili_coast_region$, а також слугує надійним судном для коротких відстаней."
  n_ship_of_the_line: "Першокласний лінійний корабель"
  n_ship_of_the_line_desc: "Деякі зміни до стандартного дизайну $n_threedecker$, ці кораблі слугуватимуть флагманами та гордістю флоту. Хоча вони дорогі в експлуатації, ці кораблі потенційно здатні вигравати бої самостійно завдяки міцнішому корпусу та чудовій вогневій потужності."
  n_war_galleon: "Бойовий галеон"
  n_war_galleon_desc: "Переорієнтувавши дизайн $n_galleon$ на військові завдання, $n_war_galleon$ дасть нам велику перевагу у морській війні."
  n_archipelago_frigate: "Архіпелаговий фрегат"
  n_archipelago_frigate_desc: "Балтійське море може бути небезпечним місцем для навігації військових кораблів. Його підступні мілководдя вимагають, щоб кораблі працювали з малою осадкою, інакше ризикуючи втратити навігацію та ефективність. $n_archipelago_frigate$, вітрильні кораблі, оснащені веслами, добре підходять для вод Балтики і нададуть флоту перевагу у швидкості та летальності."
  n_cakradonya: "Чакрадонья"
  n_cakradonya_desc: "Великий і важкоозброєний корабель, що приводиться в рух веслами та двома або навіть трьома вітрилами, $n_cakradonya$ домінуватиме в морях $indonesia_region$."
  n_galiot: "Галіот"
  n_galiot_desc: "Швидкий варіант галери, $n_galiot$ добре підходить для вод Середземного моря, будучи здатним плавати як на мілководді, так і в глибокому морі."
  n_baochuan: "Баочуань"
  n_baochuan_desc: "$n_baochuan$ — це велике судно, призначене для перевезення товарів і захисту торгівлі на морі. Вони здатні здійснювати далекі подорожі, привозячи скарби та данину з далеких берегів до наших земель."
  n_sekibune: "Секібуне"
  n_sekibune_desc: "Побудований з кедрового або ялинового дерева, $n_sekibune$ жертвує міцним корпусом заради підвищеної швидкості та маневреності."
  n_atakebune: "Атакебуне"
  n_atakebune_desc: "Будучи більшими варіантами кораблів $n_sekibune$, $n_atakebune$ здатний вмістити більший екіпаж, ніж раніше. Іноді оснащені залізними або мідними пластинами, встановленими на корпусі, вони також покращують живучість попередніх типів."
  n_bomb_ketch: "Бомбардирський кеч"
  n_bomb_ketch_desc: "$n_bomb_ketch$ — це спеціалізований легкий корабель для проведення берегових бомбардувань. Жертвуючи більшістю своїх гармат в обмін на міномети, здатні здійснювати важкі бомбардування стаціонарних цілей уздовж берегової лінії, ці судна можуть спростити облогу прибережних укріплень."
  n_dhow: "Дау"
  n_dhow_desc: "Поширений торговий корабель у $indian_ocean_region$, $n_dhow$ є здібним судном для торгівлі в регіоні, незважаючи на невеликий розмір корпусу."
  n_long_fada: "Довга Фада"
  n_long_fada_desc: "Кораблі $ireland_region$ та $scottish_highlands_area$ найбільш здатні проектувати нашу присутність над нашими прибережними володіннями, захищаючи торгові судна і водночас слугуючи адекватними військовими кораблями в часи потреби."
  a_age_1_traditions_infantry: "Піхота Епохи Традицій"
  a_age_1_traditions_cavalry: "Кавалерія Епохи Традицій"
  a_age_1_traditions_auxiliary: "Епоха Традицій Допоміжні війська"
  a_age_1_traditions_artillery: "Епоха Традицій Артилерія"
  a_age_2_renaissance_infantry: "Епоха Відродження Піхота"
  a_age_2_renaissance_cavalry: "Епоха Відродження Кіннота"
  a_age_2_renaissance_auxiliary: "Епоха Відродження Допоміжні війська"
  a_age_2_renaissance_artillery: "Епоха Відродження Артилерія"
  a_age_3_discovery_infantry: "Епоха Відкриттів Піхота"
  a_age_3_discovery_cavalry: "Епоха Відкриттів Кіннота"
