l_english:
  ENDGAME_GREATEST_RULERS: "Найвеличніші правителі історії"
  hs_mansa_musa: "Манса Муса Малійський"
  hs_mansa_musa_desc: "Манса Муса, легендарний правитель Малі, відомий своїм величезним багатством та щедрістю. Його паломництво до Мекки у 1324 році не лише продемонструвало велич його імперії, але й поширило славу Малі та сприяло торгівлі й науці в усьому ісламському світі."
  hs_peter_the_great: "Петро 'Великий' Російський"
  hs_peter_the_great_desc: "Петро 'Великий', далекоглядний цар Росії, перетворив свою націю на грізну європейську державу. Завдяки масштабним реформам, військовій експансії та заснуванню Санкт-Петербурга він модернізував Росію та залишив тривалу спадщину імперських амбіцій та західного впливу."
  hs_enrique_de_impotent: "Енріке IV Кастильський"
  hs_enrique_de_impotent_desc: "Енріке IV Кастильський, відомий як 'Безсилий', боровся за утвердження своєї влади серед дворянських заворушень та питань легітимності. Його правління було відзначене внутрішніми конфліктами та політичними інтригами, що підготувало ґрунт для піднесення Католицьких монархів."
  hs_jan_sobieski: "Ян Собеський Польський"
  hs_jan_sobieski_desc: "Ян Собеський, Лев Лехії, був блискучим військовим лідером і королем Польщі, який захистив Європу від османської експансії. Його вирішальна перемога в битві під Віднем у 1683 році закріпила його спадщину як захисника християнства та героя Речі Посполитої."
  hs_napoleon: "Наполеон I Французький"
  hs_napoleon_desc: "Наполеон Бонапарт, майстерний тактик та імператор французів, перекроїв Європу завдяки своєму військовому генію та масштабним реформам. Його амбіції та завоювання поширили революційні ідеали по всьому континенту, але його падіння ознаменувало кінець епохи та відновлення монархій."
  hs_charles: "Карл V Священної Римської імперії"
  hs_charles_desc: "Карл V, правитель величезної імперії, над якою ніколи не заходило сонце, прагнув об'єднати християнство під своїм правлінням. Його боротьба проти протестантизму, османів та конкуруючих держав визначила його правління, залишивши спадщину як величі, так і викликів управління фрагментованою імперією."
  hs_fredrik_the_great: "Фрідріх 'Великий' Прусський"
  hs_fredrik_the_great_desc: "Фрідріх 'Великий', Просвічений король Пруссії, перетворив свою націю на європейську державу завдяки військовій майстерності та адміністративним реформам. Його перемоги у Семирічній війні та покровительство мистецтвам принесли йому спадщину як завойовника, так і філософа."
  hs_gustavus_adolphus: "Густав Адольф Шведський"
  hs_gustavus_adolphus_desc: "Густав Адольф, Лев Півночі, здійснив революцію у військовій справі та закріпив місце Швеції як великої держави під час Тридцятилітньої війни. Його інноваційна військова тактика та лідерство на полі бою залишили тривалу спадщину як одного з найвидатніших полководців історії."
  hs_aurangzeb: "Аурангзеб Імперії Великих Моголів"
  hs_aurangzeb_desc: "Аурангзеб, останній великий імператор Моголів, розширив імперію до її найбільших територіальних меж завдяки невпинним кампаніям. Однак його суворе дотримання ісламської ортодоксії та високі податки посіяли розбрат, що послабив імперію та передвіщало її занепад."
  hs_elizabeth_i: "Єлизавета I Англійська"
  hs_elizabeth_i_desc: "Єлизавета I, Королева-Діва, зміцнила владу Англії завдяки політичній проникливості, морським тріумфам, таким як розгром Іспанської армади, та культурному розквіту під час Англійського Відродження. Її правління ознаменувало піднесення Англії як світової держави та епоху неперевершеної стабільності та процвітання."
  hs_tamerlane: "Тимур Імперії Тимуридів"
  hs_tamerlane_desc: "Тимур, грізний завойовник Центральної Азії, створив величезну імперію завдяки невпинним військовим кампаніям та неперевершеній тактичній майстерності. Хоча його правління було відзначене руйнуваннями, він також покровительствував мистецтву та архітектурі, залишивши спадщину як спустошення, так і культурної пишноти."
  hs_tokugawa: "Токуґава Іеясу Японський"
  hs_tokugawa_desc: "Токуґава Іеясу, проникливий об'єднувач Японії, заснував сьоґунат Токуґава, принісши тривалий мир і стабільність після століть конфліктів. Його політика централізації та ізоляції сформувала долю Японії на понад два століття."
  hs_suleyman: "Сулейман I Османської імперії"
  hs_suleyman_desc: "Сулейман I, Пишний, підніс Османську імперію до її зеніту, поєднавши військові завоювання з адміністративним генієм та культурним меценатством. Його правління ознаменувало еру неперевершеної територіальної експансії, правових реформ та мистецьких досягнень."
  hs_pius_v: "Пій V Папської держави"
  hs_pius_v_desc: "Пій V, ревний Папа-реформатор, був рушійною силою Контрреформації, впроваджуючи постанови Тридентського собору. Відомий відлученням від церкви Єлизавети I та згуртуванням Священної ліги під Лепанто, його правління зміцнило позицію Церкви проти протестантизму та османської експансії."
  hs_willem_of_orange: "Віллем ван Ораньє"
  hs_willem_of_orange_desc: "Віллем ван Ораньє, Батько Голландської Республіки, очолив боротьбу за незалежність проти іспанського панування під час Вісімдесятирічної війни. Його лідерство та бачення заклали основу для Голландської Золотої доби та піднесення процвітаючої, незалежної Нідерландів."
  hs_pachacuti: "Пачакуті з Інків"
  hs_pachacuti_desc: "Пачакуті, далекоглядний Сапа Інка, перетворив Королівство Куско на величезну Імперію Інків через завоювання та державне управління. Відомий своїми адміністративними інноваціями та монументальною архітектурою, як-от Мачу-Пікчу, його правління ознаменувало золоту добу цивілізації інків."
  hs_hiawatha: "Гаява́та з Гауденосауні"
  hs_hiawatha_desc: "Гаява́та, легендарний лідер і дипломат, вважається тим, хто об'єднав племена Гауденосауні у Велику Лігу Миру. Його бачення єдності та управління створило потужну конфедерацію, яка процвітала завдяки співпраці та взаємній силі."
  hs_charles_the_bold: "Карл Сміливий Бургундський"
  hs_charles_the_bold_desc: "Карл Сміливий, герцог Бургундії, прагнув створити могутнє королівство між Францією та Священною Римською імперією через амбіції та війни. Його передчасна смерть під Нансі поклала край його мріям і ознаменувала падіння Бургундії як європейської держави."
  tag_montezuma: "Монтесума II з Ацтеків"
  tag_montezuma_desc: "Монтесума II, останній великий імператор Ацтекської імперії, головував під час її розквіту та трагічного падіння. Його правління закінчилося прибуттям іспанців, оскільки внутрішні розбіжності та сили Ернана Кортеса поставили могутню імперію на коліна."
  hs_christian_ii: "Крістіан II Данський"
  hs_christian_ii_desc: "Крістіан II Данський, відомий як «Тиран», прагнув зміцнити королівську владу та об'єднати Скандинавію під Кальмарською унією. Його суперечлива політика та Стокгольмська кривава лазня відштовхнули його підданих, що призвело до його остаточного скинення та вигнання."
  hs_may_stuart: "Марія Шотландська"
  hs_may_stuart_desc: "Марія, королева Шотландії, монарх краси та трагедії, боролася за збереження свого правління серед політичних заворушень та релігійних конфліктів. Її бурхливе правління та вигнання закінчилися стратою, залишивши спадщину, переплетену з інтригами та долею Шотландії."