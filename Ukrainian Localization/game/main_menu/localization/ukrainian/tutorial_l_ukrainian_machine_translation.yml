  TUTORIAL_STEP_INSTRUCTIONS: "#low Щоб продовжити:#!"
  skip_to_next_topic: "Перейти до наступної теми"
  tutorial_lesson_button_finish_tutorial: "Почати"
  lesson_basics_welcome: "@caesar! Ласкаво просимо до #italic Europa Universalis V#!"
  lesson_welcome_desc: "Майже п'ять століть історії ось-ось розгорнуться перед вами. Як дух вашої нації, ви маєте владу обирати, як саме.\n\nВи можете завоювати світ, розвинути своє суспільство у процвітаючу утопію або стати неперевершеною економічною потугою. Що б ви не обрали, історія у ваших руках."
  lesson_basics_camera: "@caesar! Камера та керування"
  lesson_basics_camera_desc: "Давайте розглянемо деякі швидкі основи, перш ніж ми почнемо. Найважливіша річ у грі – це карта, і орієнтуватися на ній вкрай важливо.\n\nВикористовуйте клавіші @key_w!, @key_a!, @key_s! та @key_d!, щоб оглядати карту.\n\nВикористовуйте @centerscroll! #high Колесо прокрутки#!, щоб збільшувати та зменшувати масштаб.\n\nУтримуючи @key_tab!, ви можете побачити огляд усього світу."
  lesson_basics_nested_tooltips: "@caesar! Підказки"
  lesson_basics_nested_tooltips_complete: "@caesar! Підказки"
  lesson_basics_nested_tooltips_desc: "Ігрові концепції виділені синім кольором і містять інформацію про конкретні механіки, з якими ви можете зіткнутися в грі. Ми могли б, наприклад, сказати, що ви граєте за [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЗа замовчуванням, вкладені підказки доступні, якщо почекати короткий час, поки вони зафіксуються, після чого ви можете продовжувати наводити курсор на підказки всередині підказки. Ви також можете зафіксувати підказки за допомогою @centerclick!#high Середньої кнопки миші#!.\n\nЦю поведінку можна змінити в #high Налаштуваннях (@key_escape!) > Інтерфейс > Налаштування підказок#!."
  lesson_basics_tooltips_in_tooltips_hover_word: "Наведіть курсор миші на синій текст"
  lesson_basics_nested_tooltips_continue: "Наведіть курсор на вкладену підказку"
  lesson_basics_your_nation: "[country_icon] Ваша нація"
  lesson_basics_your_nation_desc: "У #high Europa Universalis V#! ви граєте за #high Дух Нації#!, абстрактне представлення вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЗараз ви граєте за [country_icon] [GetPlayer.GetLongName], [country] з [GetPlayer.GetGovernment.GetRuler.GetShortName] як її [Concept('ruler_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_basics_top_bar: "@caesar! Верхня панель"
  lesson_basics_top_bar_desc: "#high Верхня панель#! складається з кількох різних елементів. Вона залишатиметься тут, у верхній частині екрана, щоб надавати вам огляд вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВи також можете помітити, що у верхньому правому куті є дата. Це тому, що гра відбувається в #high Реальному часі#!. Не хвилюйтеся, ми зараз на паузі, і нічого не відбувається."
  lesson_basics_estates: "@caesar! Верхня панель"
  lesson_basics_estates_desc: "Найлівіша секція Верхньої панелі відображає ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e], які є групами, що тримають владу в [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Як Гравець, ви представлені [GetEstateName('crown_estate')].\n\nМи повернемося до Станів пізніше, але поки що майте на увазі, що кожен Стан володіє відсотком багатства та влади Країни, і має рівень [Concept('estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e], який ви можете відстежувати на Верхній панелі.\n\nРозподіл влади між $game_concept_estates$ буде відрізнятися від $game_concept_country$ до $game_concept_country$, причому деякі $game_concept_countries$ матимуть доступ до унікальних $game_concept_estates$."
  lesson_basics_resources: "@caesar! Верхня панель"
  lesson_basics_resources_desc: "Далі, давайте поглянемо на Ресурси та Статистику на Верхній панелі. Це середня секція панелі, яка містить найважливіші ресурси, які вам потрібно буде відстежувати, керуючи своєю [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВам потрібно буде витрачати [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e] на багато дій у цій грі, від оплати солдатам до розбудови ваших міст. Але справді вашим найважливішим ресурсом є ваше [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e], оскільки вони становлять основу вашої політики, вашої економіки та ваших армій.\n\nЩе одне особливо важливе число — це ваша [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e], міра вашої внутрішньої стійкості, яка допоможе вам зберегти лояльність ваших [estates] та [population], і яку ви можете використовувати для впливу на політику вашої [country].\n\nМи розглянемо решту чисел, коли вони стануть актуальними. А поки що, продовжуємо."
  lesson_basics_time_and_research: "@caesar! Час"
  lesson_basics_time_and_research_desc: "#high Europa Universalis V#! розгортається протягом сотень років. Ви можете бачити поточну дату у верхньому правому куті екрана, де також контролюється швидкість гри.\n\nЧас поділяється на шість різних [Concept('ages', 'CONCEPT_PLACEHOLDER')|e]. Зараз ми перебуваємо в [ShowAgeName('age_1_traditions')], яка закінчиться в #high 1342#! році, щоб поступитися місцем [ShowAgeName('age_2_renaissance')]. У кожній $game_concept_age$ ви матимете доступ до нових [Concept('advances_with_icon', 'CONCEPT_PLACEHOLDER')|e] для дослідження.\n\nЯк згадувалося раніше, гра зараз на паузі, тому ви нічого не пропускаєте."
  lesson_basics_wrap_up_0: "@caesar! Головні панелі"
  lesson_basics_wrap_up_0_desc: "Давайте на мить розглянемо деякі основні елементи інтерфейсу, починаючи з вкладок у верхньому лівому куті. Звідси доступні 8 різних панелей, у яких ви проведете багато часу.\n\nЦе @government_panel![Link('government', '', 'Уряд')], @economy_panel![Link('economy', '', 'Економіка')], @production_panel![Link('production', '', 'Виробництво')], @society_panel![Link('country_culture', '', 'Суспільство')], @diplomacy_panel![Link('diplomacy', '', 'Дипломатія')], @military_panel![Link('unit_overview', '', 'Військо')], @geopolitics_panel![Link('expansion', '', 'Геополітика')] та @advances_panel![Link('advances', '', 'Досягнення')]."
  lesson_basics_wrap_up_2: "@hint! Підказки"
  lesson_basics_wrap_up_2b: "Підказки 2b"
  lesson_basics_wrap_up_2_desc: "Окрім ігрових концепцій, які ви можете знайти по всій грі, деякі ключові ігрові механіки мають пов'язані Підказки, що пропонують більш детальне пояснення, а також деякі пропозиції.\n\nПідказки можна переглянути в будь-який момент у @hint![Link('hints', '', 'Панелі підказок')].\n\n@hint! Щоразу, коли ви бачите цю іконку в підказці, натискання на неї переведе вас до пов'язаної Підказки."
  lesson_basics_open_hints: "Відкрити панель підказок"
  lesson_basics_close_hints: "Закрити панель підказок"
  lesson_core_loop_0: "@caesar! Вступ до ігрового процесу"
  lesson_core_loop_0_desc: "#high Europa Universalis V#! — це величезна гра, яка дозволяє безліч різних стилів гри та можливостей.\n\nНезалежно від того, чи вважаєте ви себе безжальним завойовником, хитрим політиком або адміністратором, обдарованим дотиком Мідаса, є деякі основи, які кожен успішний правитель повинен опанувати. Давайте поглянемо на них!"
  lesson_core_loop_1: "[gold_icon] Баланс"
  lesson_core_loop_1_desc: "Як ми вже згадували, [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e] є одним з найважливіших ресурсів у грі. Більшість дій коштують [gold], і дуже часто ваша здатність нав'язувати свою волю як правителя, як поза, так і всередині вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], залежатиме від багатства, яке ви зможете зосередити у своїх руках. Шлях до світового панування вимощений золотом і кров'ю.\n\nБільшість ваших фінансів контролюється з [Link('economy', '', '@economy_panel! Панелі балансу')], тож давайте уважно її розглянемо."
  lesson_core_loop_open_balance: "Відкрити панель балансу"
  lesson_core_loop_2: "[gold_icon] Баланс"
  lesson_core_loop_2_desc: "Тут ви можете знайти огляд вашого [Concept('budget_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Різниця між вашим [Concept('income_with_icon', 'CONCEPT_PLACEHOLDER')|e] та вашими [Concept('expenses_with_icon', 'CONCEPT_PLACEHOLDER')|e] буде додана до вашої [Concept('treasury_with_icon', 'CONCEPT_PLACEHOLDER')|e] наприкінці кожного місяця. Ви можете маніпулювати різними повзунками на цій панелі, щоб змінити свій місячний [balance].\n\nЯк ми щойно бачили, різниця між вашими місячними доходами та витратами також відображається на #high Верхній панелі#!."
  lesson_core_loop_3: "[taxes_icon] Податки"
  lesson_core_loop_3_desc: "Більшість багатства в #high Europa Universalis V#! генерується щомісяця на землях, якими ви володієте: у ваших [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nПро локації ми поговоримо пізніше. А поки що ви можете навести курсор на число [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] у верхньому лівому куті, щоб побачити розкриття інформації про ваші найбагатші локації. Саме там генерується [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e] у [country_icon] [Player.GetLongName]."
  lesson_core_loop_4: "[taxes_icon] Податки"
  lesson_core_loop_4_desc: "Однак ці [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e] не надходять безпосередньо до вашої [Concept('treasury_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Як уряд, ви збираєте лише частину [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e], стягуючи [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e] з ваших [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВи можете встановити рівень оподаткування, регулюючи податкові повзунки на панелі бюджету. Зверніть увагу, як їхня [Concept('estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] падає, чим більше ви їх оподатковуєте. Стани не люблять податків.\n\nМаксимальний [Concept('maximum_tax_with_icon', 'CONCEPT_PLACEHOLDER')|e], який ви можете встановити для кожного стану, залежить від багатьох факторів, наприклад, від їхньої могутності. Іноді ви можете взагалі не мати змоги оподатковувати певний стан.\n\nНаразі ми рекомендуємо вам автоматизувати свої податки, натиснувши на іконку @automation! #W Cog#!. Це дозволить оподатковувати їх у справедливій кількості, щоб їхнє задоволення залишалося вище #G 50%#! [estate_satisfaction_icon], як тільки ви розпаузите гру."
  lesson_core_loop_automate_taxes: "Автоматизувати податки для всіх станів"
  lesson_core_loop_5: "[income_icon] Місячний дохід"
  lesson_core_loop_5_desc: "Окрім [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e], іншим значним джерелом [Concept('income_with_icon', 'CONCEPT_PLACEHOLDER')|e] є [Concept('minting_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете вільно карбувати монети скільки завгодно, щоб виправити свій бюджет, але надмірне карбування створить [Concept('inflation_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВи можете дізнатися більше про [inflation] у [Link('hints', 'selected_hint = hint_inflation', '@hint! Підказка про інфляцію')]."
  lesson_core_loop_minting: "Перемістіть повзунки карбування, щоб викарбувати кілька блискучих дукатів"
  lesson_core_loop_inflation: "Переконайтеся, що ви не створюєте інфляцію"
  lesson_core_loop_6: "[income_icon] Місячний дохід"
  lesson_core_loop_6_desc: "Два інші найпоширеніші джерела [Concept('income_with_icon', 'CONCEPT_PLACEHOLDER')|e] — це [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Оскільки це більш складні концепції, ми не будемо їх розглядати зараз. Ви можете дізнатися про них, коли відчуєте себе готовими, у відповідних підказках:\n\n$TAB$[Link('hints', 'selected_hint = hint_trade', '@hint! Підказка про торгівлю')]\n$TAB$[Link('hints', 'selected_hint = hint_food', '@hint! Підказка про їжу')]"
  lesson_core_loop_7: "@caesar! Розпауза"
  lesson_core_loop_7_desc: "Давайте розпаузимо на деякий час, перш ніж розглядати [Concept('expenses_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВи можете налаштувати #high Швидкість#!, з якою працює гра, з #high Верхньої панелі#!. Швидкості #high 3#! або #high 4#! є хорошим темпом для початку, але кожен гравець має свої власні вподобання.\n\nВи також можете натиснути @key_space!, щоб #high Призупинити#! та #high Розпаузити#! гру в будь-який момент."
  lesson_core_loop_unpause_month: "Розпаузіть і дайте пройти місяцю, щоб побачити оновлення чисел"
  lesson_core_loop_7b: "@caesar! Розпауза"
  lesson_core_loop_7b_desc: "Добре! Минув один місяць, і ми #high Призупинили#! гру для вас.\n\nТепер ви бачите, що числа оновилися, і ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] сплачують належні [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Багато розрахунків у цій грі відбуваються наприкінці місяця.\n\nДавайте тепер поглянемо на [Concept('expenses_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_core_loop_8: "[expenses_icon] Місячні витрати"
  lesson_core_loop_8_desc: "Багато дій у грі коштують [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e] в той самий момент, коли ви їх виконуєте. Але навіть коли ви не активно витрачаєте своє [gold], ваш [Concept('budget_with_icon', 'CONCEPT_PLACEHOLDER')|e] повинен нести тягар регулярних щомісячних [Concept('expenses_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВи можете витрачати [gold] на збільшення [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('legitimacy_with_icon', 'CONCEPT_PLACEHOLDER')|e], двох ваших найважливіших показників, які ми бачили на #high Верхній панелі#!. Ми рекомендуємо вам витрачати принаймні стільки, щоб вони не зменшувалися.\n\nВартість [Concept('maintenance_with_icon', 'CONCEPT_PLACEHOLDER')|e] ваших постійних [Concept('armies_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('navies_with_icon', 'CONCEPT_PLACEHOLDER')|e] та активних [Concept('fortifications_with_icon', 'CONCEPT_PLACEHOLDER')|e] може стати значною перешкодою для вашого [budget]. Зменшення їхнього [maintenance] у мирний час є розумною ідеєю."
  lesson_core_loop_positive_income: "Налаштуйте повзунки бюджету, щоб отримати позитивний місячний баланс"
  lesson_core_loop_9: "[budget_icon] Підсумок бюджету"
  lesson_core_loop_9_desc: "Чудово! Ви зрозуміли основи управління [Concept('budget_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Давайте трохи підсумуємо:\n\n$BULLET$[Concept('income_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('expenses_with_icon', 'CONCEPT_PLACEHOLDER')|e] розраховуються наприкінці місяця.\n\n$BULLET$[Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e] генеруються у ваших [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] та збираються вашими [estates], які ви [Concept('tax_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб поповнити вашу [Concept('treasury_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n$BULLET$[Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] не особливо люблять, коли їх оподатковують.\n\n\nАле хто ці [estates], чую я, ви питаєте, і чому вони не підкоряються кожній вашій примсі?"
  lesson_estates_1: "[estates_icon] Корона та стани"
  lesson_estates_1_desc: "[Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] є одним з наріжних каменів правління в #high Europa Universalis V#!. Вони не тільки є джерелом [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e], але також можуть бути потужними активами, коли вони лояльні, або жахливими ворогами, коли нелояльні.\n\nДавайте детальніше розглянемо їх у @government_panel![Link('government', 'tabcontent = estates', 'lateralview_government_entry_name')]."
  lesson_estates_2: "[crown_power_icon] Корона"
  lesson_estates_2_desc: "Тут ви можете побачити різні групи, які контролюють [political_power] у вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]: [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Кожен [estate] має відсоток [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Як втілення нації, ви представлені [GetEstateName('crown_estate')].\n\nВаша [Concept('crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] представляє вашу здатність протистояти особливим інтересам ваших станів. А саме, вона дозволяє вам стягувати вищі [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e], збільшує [Concept('estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] та вашу підтримку в [Concept('parliament_with_icon', 'CONCEPT_PLACEHOLDER')|e], полегшує зміну [Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e] та забезпечує відсоток прибутків від [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@hint! Ви можете дізнатися більше про владу Корони в [Link('hints', 'selected_hint = hint_crown_power', 'Підказка про владу Корони')]."
  lesson_estates_3: "[estates_icon] Стани"
  lesson_estates_3_desc: "Ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] можуть бути потужними активами за умови правильного управління, але, якщо їх розгнівати, вони швидко перетворяться на підступний біль у спині.\n\nОкрім внесків до вашої скарбниці через [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e], [estates] є важливими для ведення [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e], оскільки ви будете залежати від їхніх [Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] для ведення ваших війн, доки не зможете дозволити собі замінити їх [Concept('regular_regiments_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nОднак, якщо вони нелояльні, вони можуть почати підтримувати [Concept('rebellions_with_icon', 'CONCEPT_PLACEHOLDER')|e] проти вашої влади, потенційно поваливши ваше правління через [Concept('civil_war_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nНарешті, Стани, чия задоволеність перевищує #G 50%#! [estate_satisfaction_icon], надаватимуть різні бонуси вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] залежно від їхнього типу, тоді як незадоволені Стани накладатимуть штрафи."
  lesson_estates_4: "[privileges_icon] Привілеї"
  lesson_estates_4_desc: "[estates] можуть бути надані [Concept('privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e], які зазвичай збільшують як їхню [Concept('estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e], так і [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e], і мають додаткові ефекти для вашої країни та вашого народу.\n\nСкасування Привілеїв розгніває та послабить цільовий Стан, хоча це може бути дорогою справою, яка, ймовірно, зруйнує вашу [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nНезважаючи на те, що вони збільшують владу Станів (і таким чином зменшують вашу [Concept('crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e]), деякі Привілеї можуть відповідати вашим інтересам. Надання кількох привілеїв у скрутні часи може бути справді мудрим кроком, хоча б для того, щоб загасити іскру [Concept('rebellion_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Жоден король не може правити сам."
  lesson_estates_5: "[Concept('pop_type_icon', 'CONCEPT_PLACEHOLDER')|e] Соціальні класи"
  lesson_estates_5_desc: "Окрім [privileges], [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] отримують свою [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] насамперед від соціального складу вашого [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВаше [population] поділяється на різні [Concept('pop_types_with_icon', 'CONCEPT_PLACEHOLDER')|e], кожен з яких підтримує різний [estate]:\n\n$BULLET_WITH_TAB$ [GetEstateName('nobles_estate')] підтримуються @nobles! [ShowPopTypeName('nobles')]\n$BULLET_WITH_TAB$ [GetEstateName('clergy_estate')] підтримуються @clergy! [ShowPopTypeName('clergy')]\n$BULLET_WITH_TAB$ [GetEstateName('burghers_estate')] підтримуються @burghers! [ShowPopTypeName('burghers')]\n$BULLET_WITH_TAB$ [GetEstateName('peasants_estate')] підтримуються:\n$TAB$$BULLET_WITH_TAB$@peasants! [ShowPopTypeName('peasants')], @laborers! [ShowPopTypeName('laborers')] та @soldiers! [ShowPopTypeName('soldiers')].\n\nВаше [population] живе і вмирає у ваших [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e], тобто на карті. Тож давайте поглянемо на них."
  lesson_map_1: "[known_world_icon] Карта"
  lesson_map_1_desc: "Світ #high Europa Universalis V#! складається з різних [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e], які володіють [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] на карті, звідки вони видобувають ресурси та робочу силу, необхідні для того, щоб випереджати своїх сусідів.\n\nЯкщо ви зменшите масштаб, ви побачите назви [country], що з'являться на карті. Наведення курсора на них покаже підказку [country], а натискання на них відкриє #high Панель іноземної країни#!, де ви можете дізнатися про [country] та взаємодіяти з нею."
  lesson_trigger_zoom_out: "@centerscroll! Зменшіть масштаб, щоб побачити Країни"
  lesson_trigger_foreign_country: "Відкрийте Панель Країни, @leftclick!#high Клацнувши лівою кнопкою миші#! на Іноземній Країні"
  lesson_map_2: "[known_world_icon] Карта"
  lesson_map_2_desc: "[Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e] ніщо без [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e]. [locations] є серцем економіки та політики будь-якої [country] у #high Europa Universalis V#!. Вони виробляють [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] та генерують [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e], але вони також є домом для [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e] різних [Concept('pop_types_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('religions_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('cultures_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n[locations] можуть мати 3 різні [Concept('location_rank_with_icon', 'CONCEPT_PLACEHOLDER')|e]:\n$BULLET_WITH_TAB$@city! [ShowLocationRankName('city')]\n$BULLET_WITH_TAB$@town! [ShowLocationRankName('town')]\n$BULLET_WITH_TAB$@rural_settlement! [ShowLocationRankName('rural_settlement')]\n\nРізні Ранги Місцевості мають різні [pop_types], [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] та модифікатори."
  lesson_map_3: "[known_world_icon] Карта"
  lesson_map_3_desc: "Найважливіша [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e] для будь-якої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] — це [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ваша [capital] — [Player.GetCapital.GetName]. Ви впізнаєте її на карті за золотою зіркою всередині її іконки [Concept('location_rank', 'CONCEPT_PLACEHOLDER')|e] (@city_capital!/@town_capital!/@rural_settlement_capital!).\n\n$BULLET$Ви можете @leftclick!#high Двічі клацнути#! на своєму прапорі у #high Верхній панелі#!, щоб перемістити камеру до вашої Столиці.\n\n$BULLET$Ви також можете знайти будь-яку [location], натиснувши @key_f!, щоб відкрити [Link('find_location', '', '@finder_panel!Пошук')] та ввести назву."
  lesson_trigger_zoom_in: " @centerscroll! Збільшіть масштаб, щоб побачити [locations]"
  lesson_trigger_capital: "@leftclick!#high Клацніть#! на вашій Столиці, [Player.GetCapital.GetNameWithNoTooltip]"
  lesson_control_groups_1: "@caesar! Групи контролю"
  lesson_control_groups_1_desc: "Перш ніж поглянути на [location_icon] [Player.GetCapital.GetName], давайте на мить зупинимося, щоб розглянути #high Групи контролю#!. Вони розташовані внизу вашого екрана і слугують швидкими способами доступу до різноманітних речей у ігровому світі.\n\nВи можете призначити [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('armies_with_icon', 'CONCEPT_PLACEHOLDER')|e] та інше певній цифровій клавіші. Спробуймо це, призначивши вашу [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Player.GetCapital.GetName].\n\nВідкривши Панель [Player.GetCapital.GetNameWithNoTooltip], натисніть #high CTRL+1#!, щоб призначити її новій Групі контролю."
  lesson_basics_click_map: "@leftclick!#high Клацніть#! на [Player.GetCapital.GetNameWithNoTooltip]"
  lesson_basics_assign_control_group: "Натисніть #high CTRL+1#!, щоб призначити її Групі контролю"
  lesson_control_groups_2: "@caesar! Групи контролю"
  lesson_control_groups_2_desc: "Чудова робота! Тепер натискання призначеної цифри перемістить камеру до [location_icon] [Player.GetCapital.GetName] та відкриє її Панель.\n\nЩоб очистити Групу контролю, ви можете або @rightclick!#high Клацнути правою кнопкою миші#! на ній, або натиснути #high CTRL#! та відповідну цифрову клавішу."
  lesson_location_1: "[location_icon] Місцевість"
  lesson_location_1_desc: "Тепер давайте поглянемо на #high Панель Місцевості#!:\n\nБудь-яка [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e] населена різними [Concept('pop_types_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Як ми щойно бачили, [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] збільшуватимуть [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] відповідного [Concept('estate_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nКількість [pops] кожного [pop_type] залежить головним чином від [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], присутніх у [location]. Будівлі можуть бути збудовані вами або вашими Станами, і для їх функціонування їм потрібно наймати певний [pop_type]. Коли будівля збудована, @peasants! [ShowPopTypeName('peasants')] будуть [Concept('promote_with_icon', 'CONCEPT_PLACEHOLDER')|e] до необхідного [pop_type], щоб заповнити їх.\n\nДеякі [buildings] виробляють [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e], які, продані на [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e], генерують [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] [location]."
  lesson_location_2: "[rgo_icon] РГО"
  lesson_location_2_desc: "Не всі [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] мають [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] на початку гри, але кожна [location] спеціалізується на виробництві одного конкретного [Concept('good_with_icon', 'CONCEPT_PLACEHOLDER')|e] у своїх #high [resource_gathering_operations]#!, або [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Це особливий тип будівлі, що наймає @laborers! [ShowPopTypeName('laborers')] для виробництва [Concept('raw_materials_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nПодібно до [buildings], [rgo] продають свої [goods] на [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e] [location], щоб генерувати [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e]. На початку гри більша частина вашої [tax_base] надходитиме від виробництва ваших [rgo]\n\n@hint! Ви можете дізнатися про [markets] тут: [Link('hints', 'selected_hint = hint_markets', 'Markets Hint')]."
  lesson_location_3: "[tax_base_icon] Податкова база локації"
  lesson_location_3b: "[tax_base_icon] Податкова база локації"
  lesson_location_3_desc: "Як ми бачили, додаткові прибутки від [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] становлять [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e]. [tax_base] потім збирається [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] відповідно до їхньої присутності в [location].\n\nПам'ятайте, що ви отримуєте лише частину цих [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e] у вигляді [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n#weak Наприклад, загальна [tax_base] у [location_icon] [Player.GetCapital.GetName] становить [Player.GetCapital.GetTotalTaxBase|2W] [tax_base_icon], з якої ви оподатковуєте [Player.GetCapital.GetTotalIncome|2g][gold_icon] від ваших [estates].#!"
  lesson_basics_hover_tax_base: "Наведіть курсор на Податкову базу, щоб побачити, як вона розподіляється між Станами"
  lesson_location_3_recap: "@caesar! Підсумуємо!"
  lesson_location_3_recap_desc: "[Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] у ваших [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] наймають [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] для створення [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e]. [tax_base] розподіляється між вашими [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e], які, своєю чергою, забезпечують вас [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_location_4: "[control_icon] Контроль"
  lesson_location_4_desc: "Однак не всі [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] рівні під сонцем. Обговоримо одну з найважливіших характеристик [location]: [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nСеред іншого, Контроль визначає обсяг багатства в Локації, який фактично може бути використаний вами або вашими [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nІншими словами: [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] [location] масштабується відсотком [control], який ви маєте над нею."
  lesson_location_5: "[proximity_icon] Близькість"
  lesson_location_5_desc: "[Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e] безпосередньо залежить від її [Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e] до вашої [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nОсь чому ваша [capital] є однією з найважливіших [locations]: вона завжди матиме високий [control]. Це означає, що [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] у вашій [capital] завжди найбільше сприятимуть багатству ваших [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] та вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@hint! Ви можете дізнатися більше про [proximity] та [control] тут: [Link('hints', 'selected_hint = hint_control', 'Proximity and Control Hint')]"
  lesson_mapmodes_1: "@mapmode! Режими карти"
  lesson_mapmodes_1_desc: "Приділимо зараз хвилину, щоб розглянути #high Режими карти#!. Це різні лінзи, через які ви можете бачити різні аспекти світу, представлені на карті.\n\nЯкщо ви наведете курсор на підказку [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e] на Панелі локації, ви побачите кнопку Режиму карти у верхньому правому куті підказки. Коли ви @leftclick!#high Натиснете#! її, Режим карти зміниться, щоб показати [control] у всіх ваших [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_basics_control_mapmode: "Наведіть курсор на підказку Контролю"
  lesson_basics_control_mapmode_2: "@leftclick!#high Натисніть#! на кнопку Режиму карти в заголовку підказки, щоб активувати Режим карти Контролю"
  lesson_mapmodes_1b: "@mapmode! Режими карти"
  lesson_mapmodes_1c: "@mapmode! Режими карти"
  lesson_mapmodes_1b_desc: "Тепер ви бачите на карті розподіл [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e] по вашій землі. Зверніть увагу, як [control] має тенденцію зменшуватися, чим далі [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] знаходяться від [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Через [control], [locations] на периферії ваших володінь не будуть настільки корисними, принаймні без належної інфраструктури.\n\nПеребуваючи в цьому Режимі карти, ви також можете @leftclick!#high Натиснути#! на інші [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб побачити їхній [control], відображений на карті."
  lesson_mapmodes_2: "@mapmode! Режими карти"
  lesson_mapmodes_2a: "@mapmode! Режими карти"
  lesson_mapmodes_2_desc: "Тепер погляньмо на Режим карти [Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете отримати до нього доступ з підказки Близькості, подібно до того, як ви робили для [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_basics_proximity_mapmode: "Наведіть курсор на підказку Близькості"
  lesson_basics_proximity_mapmode_2: "@leftclick!#high Натисніть#! на кнопку Режиму карти в заголовку підказки, щоб активувати Режим карти Близькості"
  lesson_mapmodes_2b: "@mapmode! Режими карти"
  lesson_mapmodes_2b_desc: "Режим карти [Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e] показує, наскільки далеко [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] знаходяться від вашої [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e] у практичному сенсі.\n\nВи можете помітити, як [proximity] поширюється далі по рівнинах і річках, і сильно гальмується гірськими хребтами або лісами. Дійсно, [Concept('topography_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('vegetation_with_icon', 'CONCEPT_PLACEHOLDER')|e] відіграють дуже важливу роль у розрахунку [proximity], так само як і наявність штучної інфраструктури, такої як [Concept('roads_with_icon', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ports_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@leftclick!#high Натискання#! на різні [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] у цьому Режимі карти покаже шлях, який вони використовують для досягнення Столиці."
  lesson_basics_map_modes: "@mapmode! Режими мапи"
  lesson_basics_map_modes_complete: "@mapmode! Режими мапи"
  lesson_basics_map_modes_desc: "У цій грі є десятки різних #high Режимів мапи#!, які можна використовувати для відображення всіляких даних.\n\nНаприклад, вас можуть зацікавити різні [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e] по всьому світу або розподіл [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e] у вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВи можете отримати доступ до всіх #high Режимів мапи#!, навівши курсор на віджет у нижній частині екрана та вибравши певний Режим мапи. Не соромтеся досліджувати, але не відчувайте, що вам потрібно ознайомитися з усіма ними відразу.\n\nНе забудьте повернутися до стандартного Режиму мапи, натиснувши #high Ctrl+Q#! або вибравши його на Панелі режимів мапи."
  lesson_basics_open_map_mode_widget: "Відкрити панель режимів мапи (виділено)"
  lesson_basics_return_map_mode_widget: "Повернутися до стандартного режиму мапи місцевості (#high Ctrl+Q#!)"
  lesson_road: "[road_icon] Дороги"
  lesson_road_desc: "Отже, ми сказали, що вам потрібна [Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб мати [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e], але як покращити свою [proximity]?\n\nЄ кілька різних способів, але одним з найважливіших є будівництво [Concept('roads_with_icon', 'CONCEPT_PLACEHOLDER')|e]. [roads] покращують зв'язок між двома [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e], зменшуючи втрату Близькості для всіх [locations], які використовують цей шлях для досягнення [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДавайте побудуємо [road] від [location_icon] [Player.GetCapital.GetName]. Зверніть увагу, це коштуватиме вам [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_basics_road1: "Відкрити панель [Player.GetCapital.GetNameWithNoTooltip]"
  lesson_basics_road2: "@leftclick!#high Клацніть#! на кнопку Будівник доріг, щоб побудувати [road] від вашої [capital]"
  lesson_basics_road3: "@leftclick!#high Клацніть#! на будь-яку сусідню [location] на мапі, щоб розпочати будівництво"
  lesson_road_2: "[road_icon] Дороги"
  lesson_road_2_desc: "Браво! [Concept('road_with_icon', 'CONCEPT_PLACEHOLDER')|e] тепер у стані [Concept('construction_with_icon', 'CONCEPT_PLACEHOLDER')|e]. На завершення знадобиться кілька місяців. Ви можете побачити прогрес будівництва в круговому віджеті на мапі, над вашою [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nПісля завершення [Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e] у цільовій [location] відповідно покращиться, і ви побачите, як зросте її [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nБудівництво [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('regiments_with_icon', 'CONCEPT_PLACEHOLDER')|e] працює дуже схоже. Вони коштують [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e], вимагають деяких [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e] і потребують певного часу для завершення."
  lesson_road_3: "[road_icon] Усі дороги ведуть до [Player.GetCapital.GetNameWithNoTooltip]"
  lesson_road_3_desc: "[Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e] є одними з найважливіших механік, які потрібно освоїти в @caesar!#W Europa Universalis V#!. Ваша [Concept('crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] та розмір ваших [Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] безпосередньо залежатимуть від [control], яку ви маєте над своїми [locations], що, своєю чергою, залежить від їхньої [proximity] від вашої [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Це означає, що прокладання [Concept('roads_with_icon', 'CONCEPT_PLACEHOLDER')|e] від [capital] є першочерговим для всіх [countries], великих і малих.\n\nОкрім [roads], [proximity] також може поширюватися морем, хоча для ефективного цього потрібна хороша [Concept('harbor_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('maritime_presence_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  tutorial_diagram_belong_to: "Належати"
  tutorial_diagram_provide: "Надавати"
  tutorial_diagram_employ: "Використовувати"
  tutorial_diagram_create: "Створити"
  tutorial_diagram_buildings_rgo: "Будівлі та Р.Г.О."
  tutorial_diagram_harbors: "Гавані"
  tutorial_diagram_increases: "Збільшує"
  tutorial_diagram_decreases: "Зменшити"
  tutorial_diagram_affects: "Впливати"
  tutorial_diagram_improves: "Покращує"
  lesson_basics_wrap_up_3: "@caesar! Органайзер"
  lesson_basics_wrap_up_3b: "@caesar! Оглядач"
  lesson_basics_wrap_up_3_desc: "Перш ніж ми закінчимо, розгляньмо кілька додаткових елементів інтерфейсу, які вам потрібно знати, починаючи з #high Оглядача#!.\n\nОглядач надає огляд того, що відбувається у вашій [country]. Наприклад, ви можете побачити [Concept('road_with_icon', 'CONCEPT_PLACEHOLDER')|e], яку ви щойно побудували, у групі [Concept('construction_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВміст Оглядача дуже гнучко налаштовується. Подібно до #high Груп контролю#!, ви можете закріпити в Оглядачі велику різноманітність речей, таких як [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e] або [Concept('armies_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДля цього ви можете скористатися #high Контекстним меню#!, до якого можна отримати доступ, @rightclick!#high Клацнувши правою кнопкою миші #! на [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e] або $game_concept_country$ на карті.\n\n@rightclick!Клацніть правою кнопкою миші десь на карті, потім знайдіть піктограму @pin_icon!."
  lesson_basics_add_outliner: "Закріпіть $game_concept_country$ або $game_concept_location$ в #high Оглядачі#!"
  lesson_basics_open_contextmenu: "Відкрити контекстне меню"
  lesson_basics_wrap_up_4: "@automation! Автоматизація"
  lesson_basics_wrap_up_4_desc: "Чудово зроблено! Ви зможете отримати доступ до всього, що ви закріпили, у правій частині екрана.\n\nМи майже наприкінці цього вступу. Ми автоматизували деякі функції, щоб допомогти вам зосередитися на вивченні основ, але ви можете контролювати, які аспекти гри автоматизовані, у будь-який час з @automation! [Link('automation', '', 'lateralview_automation_entry_name')]."
  lesson_basics_open_automation_view: "Відкрити панель автоматизації (виділено)"
  lesson_basics_wrap_up_4b: "@automation! Автоматизація"
  lesson_basics_wrap_up_4b_desc: "На цій панелі ви можете контролювати, якими аспектами вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] керуватиме гра за вас.\n\nНаразі ми рекомендуємо вам дотримуватися встановлених налаштувань і повернутися до цієї панелі, коли ви почуватиметеся комфортно з основними функціями. За бажанням, ви можете вирішити, чи хочете ви автоматизувати свої [Concept('advances_with_icon', 'CONCEPT_PLACEHOLDER')|e] та свій [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e], чи залишити їх ручними.\n\nВи можете дізнатися більше про ці функції у відповідних підказках, якщо вирішите взаємодіяти з ними вручну:\n\n$TAB$[Link('hints', 'selected_hint = hint_can_do_more_research', '@hint! Підказка щодо досягнень')]\n$TAB$[Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '@hint! Підказка щодо кабінету')]"
  lesson_basics_wrap_up_5: "@caesar! Сповіщення"
  lesson_basics_wrap_up_3b_desc: "Ще одним важливим елементом, який ви будете використовувати під час своїх кампаній, є #high Сповіщення#!. Вони з'являтимуться під #high Верхньою панеллю #! та інформуватимуть вас про різноманітні питання, які згодом потребуватимуть вашої уваги, відсортовані за рівнем терміновості, від найбільш термінових (#R Червоний#!), до менш термінових (#G Зелений#!).\n\nЗауважте, що ви не отримуватимете сповіщень, пов'язаних з тими частинами гри, які ви @automation! #high Автоматизували#!.\n\n@hint! Більшість сповіщень мають відповідну підказку, яка допомагає вам їх вирішити. Ви можете #high Shift+Click#! на сповіщення, щоб відкрити відповідну підказку."
  lesson_basics_wrap_up_6: "@caesar! Порядок денний"
  lesson_basics_wrap_up_6_desc: "Нарешті, ми рекомендуємо вам на початку кожної гри ознайомитися з @agenda! #high Порядком денним#!, де ви знайдете трохи історичного контексту для вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] та збірку тих @hint! #high Підказок#!, які найбільш актуальні для вашої поточної ситуації."
  lesson_basics_open_agenda: "Відкрити порядок денний"
  lesson_basics_final: "[mission_icon] До місій!"
  lesson_basics_final_desc: "Ми дійшли до кінця #W Базового посібника#!. Тепер ви можете продовжити, обравши конкретний посібник на свій вибір.\n\nЗалежно від вашого вибору, ви отримаєте коротке пояснення, яке розширить ваші знання про цю частину ігрового досвіду. Після цього вам будуть представлені різні шляхи [Concept('missions_with_icon', 'CONCEPT_PLACEHOLDER')|e], які запропонують вам різні цілі та нагороди, щоб провести вас через ваші початкові кроки в @caesar!#W Europa Universalis V#!.\n\nУспіхів, і нехай ваша нація процвітає крізь припливи Часу!"
  lesson_basics_mission_focus: "Вибрати фокус місії"
  lesson_diplomacy_0: "@diplomacy! Політичний посібник"
  lesson_diplomacy_0b: "@diplomacy! Політичний посібник"
  lesson_diplomacy_0_desc: "Ми починаємо Політичний посібник. Ми заглибимося трохи глибше в складнощі вашого суспільства, вашого уряду та вашої зовнішньої політики.\n\nПочнімо з основ будь-якої країни: [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e]\n\nМи вже бачили [pops], що живуть у вашій [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e] під час вступу. Тепер ми зануримося глибоко в [Link('country_culture', '', '@society_panel!Панель суспільства')]."
  lesson_diplomacy_open_society: "Відкрити панель суспільства"
  lesson_diplomacy_open_pops: "Відкрити вкладку \"Населення\""
  lesson_diplomacy_1: "@society_panel! Суспільство"
  lesson_diplomacy_1_desc: "На цій панелі ви можете переглядати та отримувати доступ до більш орієнтованих на людей аспектів вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Запис [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e] у #high Верхній панелі #! показує, скільки людей зараз живе у вашій [country], а також наскільки це значення коливається щомісяця.\n\nВаше населення поділяється на [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e]: групи людей однієї [Concept('culture_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('religion_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('pop_type_with_icon', 'CONCEPT_PLACEHOLDER')|e], що живуть в одному [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЯк ми вже бачили, кожен [pop_type] підтримує один конкретний [Concept('estate_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Крім того, [pops] мають рівень [Concept('literacy_with_icon', 'CONCEPT_PLACEHOLDER')|e], рівень [Concept('pop_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e], а також [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('pop_needs_with_icon', 'CONCEPT_PLACEHOLDER')|e], які вони вимагатимуть від свого [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЗадоволеність ваших груп населення залежить від різних факторів, таких як те, наскільки шановані їхня [culture] та [religion] у вашій країні, а також від [Concept('estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] їхніх відповідних [estates]. Коли задоволеність [pop] падає занадто низько, вони прагнутимуть підтримати [Concept('rebellion_with_icon', 'CONCEPT_PLACEHOLDER')|e]\n\n@hint! Дізнайтеся більше про [rebels] у [Link('hints', 'selected_hint = hint_rebels_growing', 'Підказці про повстанців')]."
  lesson_diplomacy_2: "@culture! $game_concept_culture$"
  lesson_diplomacy_2_desc: "Ми згадували, що кожен [Concept('pop_with_icon', 'CONCEPT_PLACEHOLDER')|e] належить до певної [Concept('culture_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Давайте перевіримо [Link('country_culture', '', '@society_panel! Culture Tab')]."
  lesson_diplomacy_open_culture: "Відкрити вкладку \"Культура\""
  lesson_diplomacy_3: "@culture! $game_concept_culture$"
  lesson_diplomacy_3_desc: "Зазвичай, ваша [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] буде домом для кількох [Concept('cultures_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Кожна [country] має [Concept('primary_culture_with_icon', 'CONCEPT_PLACEHOLDER')|e], а всі інші $game_concept_cultures$ мають різний [Concept('cultural_status', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e], що належать до [culture] з низьким [cultural_status], зазвичай матимуть значно нижчу [Concept('pop_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] і надаватимуть менше [Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете підвищити [cultural_status] [cultures] у вашому володінні, виділяючи [Concept('cultural_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nНарешті, [pops] у вашій [country] [Concept('assimilate_with_icon', 'CONCEPT_PLACEHOLDER')|e] до вашої [primary_culture] на основі різних факторів, найважливішим з яких є різниця між [Concept('cultural_influence_with_icon', 'CONCEPT_PLACEHOLDER')|e] вашої [primary_culture] та [Concept('cultural_tradition_with_icon', 'CONCEPT_PLACEHOLDER')|e] їхньої."
  lesson_diplomacy_open_works_of_art: "Відкрити підвкладку \"Твори мистецтва\""
  lesson_diplomacy_4: "@art_work! Твори мистецтва"
  lesson_diplomacy_4_desc: "Одним з найважливіших інструментів, що є у вашому розпорядженні для збільшення [Concept('cultural_influence_with_icon', 'CONCEPT_PLACEHOLDER')|e] вашої [Concept('primary_culture_with_icon', 'CONCEPT_PLACEHOLDER')|e], є [Concept('works_of_art_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДавайте перевіримо #high вкладку \"Твори мистецтва\"! далі. Перейдіть до виділеної підвкладки."
  lesson_diplomacy_open_culture_breakdown: "Відкрити підвкладку \"Розподіл культур\""
  lesson_diplomacy_5: "@art_work! Твори мистецтва"
  lesson_diplomacy_5_desc: "[Concept('works_of_art_with_icon', 'CONCEPT_PLACEHOLDER')|e] – це артефакти, створені [Concept('artists_with_icon', 'CONCEPT_PLACEHOLDER')|e] у вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Наприклад, [ShowArtistTypeName('painter')] може створити [ShowWorkOfArtTypeName('painting')], або [ShowArtistTypeName('writer')] може створити [ShowWorkOfArtTypeName('novel')].\n\nКоли створюється $game_concept_work_of_art$, певна кількість [Concept('cultural_influence_with_icon', 'CONCEPT_PLACEHOLDER')|e] надається вашій [Concept('primary_culture_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nПісля створення вона продовжуватиме надавати вам переваги для [Concept('cultural_tradition_with_icon', 'CONCEPT_PLACEHOLDER')|e] вашої $game_concept_primary_culture$, а також щомісячний бонус до вашого [Concept('prestige_with_icon', 'CONCEPT_PLACEHOLDER')|e] на основі її [Concept('art_quality', 'CONCEPT_PLACEHOLDER')|e].\n\n[prestige] – це ще один зі показників, які ви можете відстежувати на #high верхній панелі#!, і він є мірою культурної присутності вашої [country] на світовій арені. Серед іншого, високий рівень [prestige] допоможе вам у [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] та [Concept('integration', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_diplomacy_open_religion: "Відкрити вкладку \"Релігія\""
  lesson_diplomacy_6: "[religion_icon] Релігія"
  lesson_diplomacy_6_desc: "Окрім [Concept('culture_with_icon', 'CONCEPT_PLACEHOLDER')|e], іншою визначальною рисою [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] є їхня [Concept('religion_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Давайте далі розглянемо [Link('country_religion', '', '@society_panel! Religion Tab')]!"
  lesson_diplomacy_7: "[religion_icon] Релігія"
  lesson_diplomacy_7_desc: "На цій вкладці ви можете переглянути свою [Concept('primary_religion_with_icon', 'CONCEPT_PLACEHOLDER')|e], а також інші [Concept('religions_with_icon', 'CONCEPT_PLACEHOLDER')|e], присутні у вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВи можете витрачати [Concept('religious_influence_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб взаємодіяти зі своєю $game_concept_religion$ різними способами, залежно від конкретної віри вашої $game_concept_country$.\n\nПодібно до [Concept('culture_with_icon', 'CONCEPT_PLACEHOLDER')|e], усі $game_concept_religions$ у $game_concept_country$ також мають пов'язаний [Concept('religious_status', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_diplomacy_8: "@population! Люди"
  lesson_diplomacy_8_desc: "Далі давайте перевіримо #high вкладку \"Люди\".#!"
  lesson_diplomacy_open_people: "Відкрити вкладку \"Люди\""
  lesson_diplomacy_8b: "@population! Люди"
  lesson_diplomacy_8b_desc: "Тут ви можете знайти інформацію про [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] у вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ваші $game_concept_pops$ проживають у певному [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e] і ідентифікуються за [Concept('culture_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('religion_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e].\n\nВи також знайдете інформацію про [Concept('rebels_with_icon', 'CONCEPT_PLACEHOLDER')|e] на цій панелі. Зазвичай, з $game_concept_rebels$ можна впоратися, підвищивши їхню [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_diplomacy_8c: "@characters! Персонажі"
  lesson_diplomacy_8c_desc: "Давайте далі поглянемо на [Concept('characters_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Перейдіть до #high вкладки \"Персонажі\".#!"
  lesson_diplomacy_open_character: "Відкрити підвкладку \"Персонажі\""
  lesson_diplomacy_8d: "@characters! Персонажі"
  lesson_diplomacy_8d_desc: "Протягом гри вам доведеться взаємодіяти з низкою різних [Concept('characters_with_icon', 'CONCEPT_PLACEHOLDER')|e], видатних осіб, яких ви можете наймати для різних [Concept('roles', 'CONCEPT_PLACEHOLDER')|e].\n\nНа цій вкладці ви можете побачити список усіх [characters], присутніх у вашому дворі, та їхню поточну [role]. Персонажі мають [Concept('abilities_with_icon', 'CONCEPT_PLACEHOLDER')|e], які визначатимуть їхню ефективність у виконанні різних [roles]:\n\n[Concept('adm_with_icon', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('dip_with_icon', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('mil_with_icon', 'CONCEPT_PLACEHOLDER')|e]\n\nКрім 3 базових [abilities], [characters] можуть розвивати специфічні [Concept('traits', 'CONCEPT_PLACEHOLDER')|e], які роблять їх кращими у певному завданні. [characters] також належать до [Concept('estate_with_icon', 'CONCEPT_PLACEHOLDER')|e], а деякі належатимуть до відомої [Concept('dynasty_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n#weak Ви також можете @rightclick!#high клацнути правою кнопкою миші#! на імені або портреті [character] будь-де в грі, щоб відкрити #high контекстне меню#!#!"
  lesson_diplomacy_8e: "[character_icon] Персонажі"
  lesson_diplomacy_8e_desc: "Ми вже бачили використання [artists] у вашому [court], але вашим найважливішим [Concept('character_with_icon', 'CONCEPT_PLACEHOLDER')|e] безперечно буде ваш [Concept('ruler_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДавайте знову відвідаємо Панель уряду, щоб зазирнути у шляхетне мистецтво управління."
  lesson_admin_1: "[ruler_icon] Правитель"
  lesson_admin_1_desc: "Це ваш [Concept('ruler_with_icon', 'CONCEPT_PLACEHOLDER')|e], ваш найважливіший [Concept('character_with_icon', 'CONCEPT_PLACEHOLDER')|e]. [Concept('abilities_with_icon', 'CONCEPT_PLACEHOLDER')|e] вашого [ruler] мають значний вплив на вашу [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете перевірити їхні ефекти, навівши на них курсор.\n\nУ цьому огляді ви також можете побачити свого [Concept('consort_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('heir_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('regent_with_icon', 'CONCEPT_PLACEHOLDER')|e], якщо у вас є будь-яка з цих [Concept('roles', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_admin_open_government: "Відкрийте панель $game_concept_government$"
  lesson_admin_9: "[cabinet_icon] $game_concept_cabinet$"
  lesson_admin_9_desc: "Говорячи про важливих [Concept('characters_with_icon', 'CONCEPT_PLACEHOLDER')|e], давайте обговоримо один з найпотужніших інструментів, які ви маєте для управління своєю [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]: ваш [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nПерейдіть до виділеної підвкладки Кабінету."
  lesson_admin_open_cabinet: "Відкрийте підвкладку Кабінету"
  lesson_admin_10: "[cabinet_icon] $game_concept_cabinet$"
  lesson_admin_10_desc: "Це ваш [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Він складається з кількох [Concept('cabinet_seats_with_icon', 'CONCEPT_PLACEHOLDER')|e], які можуть бути зайняті [Concept('characters_with_icon', 'CONCEPT_PLACEHOLDER')|e], що служитимуть як [Concept('cabinet_members_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете доручити своїм $game_concept_cabinet_members$ різноманітні [Concept('cabinet_actions_with_icon', 'CONCEPT_PLACEHOLDER')|e], такі як [ShowCabinetActionName('increase_control_province')] або [ShowCabinetActionName('develop_province')].\n\n$game_concept_cabinet_actions$ покладаються на одну з трьох [Concept('abilities_with_icon', 'CONCEPT_PLACEHOLDER')|e]. $game_concept_abilities$ вашого [Concept('ruler_with_icon', 'CONCEPT_PLACEHOLDER')|e] та $game_concept_cabinet_member$, призначеного для виконання Дії, впливатимуть на її ефект.\n\nНаприклад, така Дія, як [ShowCabinetActionName('change_societal_values')], буде прогресувати швидше, якщо [Concept('dip_with_icon', 'CONCEPT_PLACEHOLDER')|e] $game_concept_cabinet_member$, призначеного для неї, високий. Загальна [Concept('cabinet_efficiency_with_icon', 'CONCEPT_PLACEHOLDER')|e] вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] також впливатиме на швидкість та ефективність Дії.\n\n@hint! Ви можете дізнатися про Кабінет у [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', 'Підказка щодо Кабінету')]."
  lesson_admin_5: "[estates_icon] $game_concept_estates$"
  lesson_admin_5_desc: "Давайте перейдемо до #high підвкладки Станів#! Ви можете переглядати та взаємодіяти з різними $game_concept_estates$ у вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], відкривши #high підвкладку Станів#! у вкладці $game_concept_country$ панелі [Concept('government', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_admin_6: "[government_type_icon] Уряд"
  lesson_admin_6_desc: "Кожна [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] відрізняється в #high Europa Universalis V#!. Природа політики вашої [country] залежатиме насамперед від вашого [Concept('government_type_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЯк [Player.GetGovernment.GetGovernmentType.GetName], функціонування вашої [country] вже відрізняється від деяких ваших сусідів у дуже ключових аспектах. Крім того, природа та політична структура будь-якої [country] сильно залежить від налаштування її [Concept('government_reforms_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЗміна будь-якого з цих трьох зазвичай супроводжується великими витратами на [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДавайте подивимося, де вони знаходяться, починаючи з уже знайомої [Link('government', 'tabcontent = estates', '@government_panel!Підвкладка Станів')]."
  lesson_admin_6b: "[government_reform_icon] Урядові реформи"
  lesson_admin_6b_desc: "Ваші [Concept('government_reforms_with_icon', 'CONCEPT_PLACEHOLDER')|e] є однією з найбільш визначальних рис вашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Вони часто мають дуже значні ефекти, тому їх налаштування має бути однією з перших речей, які ви робите, починаючи нову гру.\n\n@hint! Ви можете дізнатися більше про [government_reforms] у [Link('hints', 'selected_hint = hint_has_possible_reform', 'Підказка щодо урядових реформ')]."
  lesson_admin_open_country: "Відкрийте вкладку Країна"
  lesson_admin_open_estates: "Відкрийте підвкладку Станів"
  lesson_admin_6c: "[privileges_icon] Привілеї"
  lesson_admin_6c_desc: "Ми вже обговорювали [Concept('privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e], коли говорили про [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Окрім їхнього впливу на [Concept('estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e], [privileges] також можуть мати дуже фундаментальні наслідки для того, як грається ваша [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], часто відкриваючи нові можливості або обмежуючи вашу свободу дій."
  lesson_admin_open_laws: "Відкрийте підвкладку Закони"
  lesson_admin_11: "[laws_icon] $game_concept_laws$"
  lesson_admin_11_desc: "Нарешті, кожна країна починає з різного набору [Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Перейдіть до #high підвкладки Законів#! у #high вкладці Країна#!."
  lesson_admin_12: "[law_icon] $game_concept_laws$"
  lesson_admin_12_desc: "[Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e] існують у кількох категоріях і дозволяють вам змінювати вашу [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Кожен [law] містить низку можливих [Concept('policies_with_icon', 'CONCEPT_PLACEHOLDER')|e] для вибору.\n\nНаприклад, ви можете обрати [ShowPolicyName('no_censorship')] як активну $game_concept_policy$ для $game_concept_law$ [ShowLawName('censorship')]. Це матиме різноманітні ефекти, деякі негативні, а деякі позитивні. Як швидко ви можете змінити $game_concept_policy$, залежить від вашої [Concept('legislative_efficiency_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n#weak $game_concept_laws$ можна змінити в будь-який час за певну вартість як у [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e], так і в [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e], але зазвичай розумніше дочекатися сесії [Concept('parliament_with_icon', 'CONCEPT_PLACEHOLDER')|e].#!"
  lesson_admin_open_values: "Відкрити вкладку цінностей"
  lesson_admin_13: "[societal_value_icon] $game_concept_societal_values$"
  lesson_admin_13_desc: "Тепер ви можете ухвалювати [Concept('government_reforms_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e] у своїй [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] на власний розсуд, доки можете покрити витрати на [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Але деякі речі не змінюються за одну ніч, і суспільства надзвичайно повільно адаптуються до нового законодавства.\n\nЩоб представити більш структурні особливості вашої країни та народу, ми маємо [Concept('societal_values_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Давайте поглянемо на них."
  lesson_admin_14: "[societal_value_icon] $game_concept_societal_values$"
  lesson_admin_14_desc: "[Concept('societal_values_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] представляють глибинні звичаї її населення, світську інерцію її інститутів та їхній відбиток на характері її мешканців. Вони змінюються повільно, з часом, адаптуючись до природи законів.\n\n[Concept('reforms_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e] та конкретні дії, які ви вживаєте під час свого правління, призведуть до того, що різні [societal_values] повільно дрейфуватимуть до цільового значення.\n\n#weak Наприклад, надання певних [privileges] [GetEstateName('nobles_estate')] вашої $game_concept_country$ підштовхне вашу країну до [ShowSocietyDirectionName('aristocracy')]#!."
  lesson_admin_15: "[crown_power_icon] $game_concept_crown_power$"
  lesson_admin_15_desc: "Використання влади [GetEstateName('crown_estate')] проти інших [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] є одним з наріжних каменів правління в @caesar!#high Europa Universalis V#!.\n\nВаша [Concept('crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] залежить головним чином від середнього [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e] усіх ваших [locations], і вона зменшується [Concept('privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e] ваших [estates]. Багато [Concept('government_reforms_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('societal_values_with_icon', 'CONCEPT_PLACEHOLDER')|e] також впливають на неї.\n\nПідтримка високої [crown_power] надзвичайно важлива: вона не тільки збільшує [Concept('cabinet_efficiency_with_icon', 'CONCEPT_PLACEHOLDER')|e] та вашу власну підтримку під час [Concept('parliament_with_icon', 'CONCEPT_PLACEHOLDER')|e], але й визначає відсоток [Concept('trade_income_with_icon', 'CONCEPT_PLACEHOLDER')|e], який надходить безпосередньо до вашої [Concept('treasury_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_economy_1: "@adm! Економічний огляд"
  lesson_economy_1_desc: "Ми починаємо @adm! #high Економічний огляд#!. Ми заглибимося трохи глибше в економіку #high Europa Universalis V#!, починаючи з її основи: [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_economy_2: "[market_icon] $game_concept_markets$"
  lesson_economy_2_desc: "Тут ви можете побачити список [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e], де присутня ваша [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], тоді як на карті ви можете побачити всі [markets] у відомому світі. Кожна [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e] належить до [market], де вони продають [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e], які виробляють, і купують [goods], які їм потрібні.\n\nБагато речей у цій грі потребують товарів: [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] потребують [goods], щоб жити, [Concept('constructions_with_icon', 'CONCEPT_PLACEHOLDER')|e] потребують [goods], щоб розвиватися, [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] потребують [goods], щоб функціонувати, [Concept('armies_with_icon', 'CONCEPT_PLACEHOLDER')|e] потребують [goods], щоб воювати.\n\nНаприклад, ви можете бачити на карті, що ваша [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Player.GetCapital.GetName], належить до [market_icon][Player.GetCapital.GetMarket.GetName], тому все, що ви там будуєте, використовуватиме [goods] з цього [market].\n\n#weak Ви також можете @rightclick!#high Клацнути правою кнопкою миші#! на назві [market] або картці будь-де в грі, щоб відкрити #high Контекстне меню#!#!."
  lesson_economy_3: "[market_icon] $game_concept_markets$"
  lesson_economy_3_desc: "Виробництво всіх [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] щомісяця продається до [market] [Concept('stockpile_with_icon', 'CONCEPT_PLACEHOLDER')|e], забезпечуючи їх [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Навпаки, всі [locations] намагаються купити [goods], які їм потрібні, на своєму [market], за порядком їхнього [Concept('market_access_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Різниця між [Concept('supply_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('demand_with_icon', 'CONCEPT_PLACEHOLDER')|e] [good] на [market] впливатиме на його [Concept('market_price_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЗауважте, що [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e] виходять за межі [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Виробництво ваших [locations] завжди надходить безпосередньо на їхній відповідний [market], тому іноземні [locations] на тому ж [market] можуть купувати ці [goods] раніше, ніж ваші власні [locations], якщо вони мають вищий [market_access].\n\n[Concept('market_access_with_icon', 'CONCEPT_PLACEHOLDER')|e] [location] залежить від її відстані від [Concept('market_center_with_icon', 'CONCEPT_PLACEHOLDER')|e] і, як [Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e], ви можете покращити її за допомогою [Concept('roads_with_icon', 'CONCEPT_PLACEHOLDER')|e]. [Locations] зазвичай схильні належати до найближчого [market], тобто до того, де вони мають вищий [market_access].\n\n@hint! Ви можете дізнатися більше про [markets] у [Link('hints', 'selected_hint = hint_markets', 'Підказка про ринки')]."
  lesson_economy_4: "[trade_icon] $game_concept_trade$"
  lesson_economy_4_desc: "Тепер [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e] ніколи не бувають повністю ізольованими один від одного. Переміщення [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] між двома [markets] називається [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e] можуть переміщувати [goods] між [markets], використовуючи свою [Concept('merchant_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e], створюючи при цьому прибуток (або збиток). Крім того, @burghers! [ShowPopTypeName('burghers')], що живуть на [market], здійснюватимуть власну [trade].\n\nЗа замовчуванням торгівля @automation! #high Автоматизована#! на всіх [markets], що означає, що будь-яка [merchant_capacity], якою ви володієте на цьому [market], буде автоматично використана для найкращих доступних угод. Ми рекомендуємо вам залишити всю [trade] автоматизованою, доки ви не отримаєте більше досвіду гри.\n\nКоли прийде час, ви можете дізнатися більше про [trade] тут:\n$TAB$[Link('hints', 'selected_hint = hint_trade', '@hint! Підказка про торгівлю')]."
  lesson_economy_5: "[food_icon] $game_concept_food$"
  lesson_economy_5_desc: "Нарешті, [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] також виробляють і споживають [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n[food] виробляється переважно @laborers! [ShowPopTypeName('laborers')], що працюють у [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e], як-от [ShowGoodsName('wheat')], хоча @peasants! [ShowPopTypeName('peasants')], що працюють у [Concept('subsistence_agriculture_with_icon', 'CONCEPT_PLACEHOLDER')|e], також вносять невелику кількість.\n\nКожен [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e] має [Concept('food_stockpile_with_icon', 'CONCEPT_PLACEHOLDER')|e], який щомісяця збільшується або зменшується. Якщо на [market] закінчується [food], [population] страждатиме від [Concept('starvation_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете побачити баланс [food] на [market] у картці [market].\n\nВи можете дізнатися, як працює постачання [food], у [Link('hints', 'selected_hint = hint_food', '@hint! Підказка про їжу')]."
  lesson_admin_21: "[good_icon] $game_concept_goods$"
  lesson_admin_21_desc: "Продовжимо, досліджуючи [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e]! Для цього ви можете натиснути кнопку [Concept('pop_needs_with_icon', 'CONCEPT_PLACEHOLDER')|e] у картці [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_admin_22: "[good_icon] $game_concept_goods$"
  lesson_admin_22_desc: "Тут ви можете побачити всі [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] на певному [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Оскільки фільтр \"Потреби населення\" вже застосовано, ви зараз бачите [Concept('market_balance_with_icon', 'CONCEPT_PLACEHOLDER')|e] усіх $game_concept_goods$, які потрібні вашим [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n#weak Ви можете видалити [market_icon] #high Картку ринку#!, щоб побачити товари у всій вашій [country], включаючи всі ринки, де ви володієте [locations]#!.\n\nВи можете збільшити [Concept('supply_with_icon', 'CONCEPT_PLACEHOLDER')|e] будь-якого товару на [market] трьома способами:\n\n$BULLET$ [rgo_icon] Розширення [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e]\n[rgo] можна розширити для виробництва [Concept('raw_materials_with_icon', 'CONCEPT_PLACEHOLDER')|e], якщо ви [Concept('own', 'CONCEPT_PLACEHOLDER')|e] відповідні [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n$BULLET$ [Concept('building_icon', 'CONCEPT_PLACEHOLDER')|e] Будівництво [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]\nХоча деякі з них також можуть виробляти [raw_materials], [buildings] чудово переробляють [raw_materials] на [Concept('produced_goods_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n$BULLET$ [Concept('import_icon', 'CONCEPT_PLACEHOLDER')|e] Імпорт через [Concept('trade', 'CONCEPT_PLACEHOLDER')|e]\nВи завжди можете імпортувати [goods], які вам потрібні, з інших [markets], якщо у вас є доступна [Concept('merchant_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n#weak Наприклад, ви можете створити $game_concept_rgo$ для збору @wool! [ShowGoodsName('wool')], потім побудувати @cloth_guild![ShowBuildingTypeName('cloth_guild')] $game_concept_building$, щоб переробити цю вовну на @cloth! [ShowGoodsName('cloth')], яка використовується багатьма іншими [buildings], [pops] та [armies].#!"
  lesson_admin_25: "[building_icon] $game_concept_buildings$"
  lesson_admin_25_desc: "Нарешті, поговоримо про [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДавайте переглянемо весь список [buildings] у #high Вкладці будівель#!."
  lesson_admin_26: "[building_icon] $game_concept_buildings$"
  lesson_admin_26_desc: "На відміну від [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e], усі [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] потребують деяких вхідних [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] для функціонування, але лише деякі виробляють [goods], а отже, [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nІнші [buildings] мають різні цілі, такі як забезпечення [Concept('manpower_with_icon', 'CONCEPT_PLACEHOLDER')|e], уможливлення набору [Concept('regulars_with_icon', 'CONCEPT_PLACEHOLDER')|e], покращення вашої [Concept('crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] або збільшення [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e] їхнього [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n$game_concept_buildings$, як і [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e], мають вартість [Concept('construction_with_icon', 'CONCEPT_PLACEHOLDER')|e] і вимагають певного ігрового часу для будівництва. Після завершення, щоб функціонувати, $game_concept_building$ потребує наявності $game_concept_raw_materials$ на [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e], де вона була побудована.\n\n#weak Пам'ятайте, що ваша [country] може мати більше одного [market]. [market_icon] #high Картка ринку#! у верхній частині #high Панелі виробництва#! дозволяє фільтрувати її вміст за ринками.#!\n\nВи можете дізнатися більше про [buildings] у відповідних підказках:\n[Link('hints', 'selected_hint = hint_lack_pop_promotion_to_fill_buildings', '@hint! Будівлі, яким бракує працівників')]\n[Link('hints', 'selected_hint = hint_unprofitable_buildings', '@hint! Неприбуткові будівлі')]\n[Link('hints', 'selected_hint = hint_has_buildings_missing_input', '@hint! Будівлі, яким бракує вхідних ресурсів')]"
  lesson_admin_27: "[mission_icon] $game_concept_missions$"
  lesson_admin_27b: "[mission_icon] $game_concept_missions$"
  lesson_admin_27_desc: "Насамкінець, розгляньмо [Concept('missions_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_admin_28: "[mission_icon] $game_concept_missions$"
  lesson_admin_28_desc: "[Concept('missions_with_icon', 'CONCEPT_PLACEHOLDER')|e] являють собою набори завдань, що дадуть певне керівництво щодо того, що саме ви можете робити в #high Europa Universalis V#!. Ця гра масштабна, і є багато чого навчитися. Це частина задоволення!\n\nВи щойно завершили вступ до @adm! #high Economy Playstyle#!, що означає, що тепер ви маєте доступ до $game_concept_missions$, які допоможуть вам глибоко зануритися в те, як ви можете використовувати всі ці панелі та механіки, про які ми щойно говорили.\n\nЩоб допомогти вам легше перейти до наступного, ми підготували кілька $game_concept_missions$, щоб ви могли почати."
  lesson_admin_29: "@caesar! Підсумок"
  lesson_admin_29_desc: "Чудово! Тепер ви маєте кілька [Concept('missions_with_icon', 'CONCEPT_PLACEHOLDER')|e], доступних вам у вкладці #high Missions Tab#!.\n\nМи рекомендуємо вам пройти їх, щоб закріпити та розширити те, що ви щойно дізналися. Але пам'ятайте, що ви можете почати одне з інших Покрокових керівництв та пов'язані з ними [missions] у будь-який момент з вкладки #high Missions Tab#!.\n\nУспіхів вам!"
  lesson_admin_open_economy: "Відкрити панель Економіки"
  lesson_admin_open_balance: "Відкрити вкладку Баланс"
  lesson_admin_open_markets: "Відкрити вкладку Ринки"
  lesson_admin_open_trading: "Відкрити вкладку Торгівля"
  lesson_admin_open_production: "Відкрити панель Виробництва"
  lesson_admin_open_goods: "Відкрити вкладку Товари"
  lesson_admin_open_food: "Відкрити вкладку Їжа"
  lesson_admin_open_buildings: "Відкрити вкладку Будівлі"
  lesson_admin_open_missions: "Відкрити вкладку Місії"
  lesson_admin_has_mission_active: "Розпочати Місію Економіки"
  lesson_diplomacy_9: "@diplomacy! Дипломатія"
  lesson_diplomacy_9_desc: "Але не вся політика відбувається всередині нашого володіння. Далі розгляньмо [Concept('diplomacy_with_icon', 'CONCEPT_PLACEHOLDER')|e], починаючи з вкладки #high Relations Tab#! у @diplomacy_panel![Link('diplomacy', '', ' Diplomacy Panel')]."
  lesson_diplomacy_open_diplomacy: "Відкрити панель Дипломатії"
  lesson_diplomacy_open_relations: "Відкрити вкладку Відносини"
  lesson_diplomacy_open_current_relations: "Відкрити підвкладку Поточні Відносини"
  lesson_diplomacy_10: "@diplomacy! Дипломатія"
  lesson_diplomacy_10_desc: "Незалежно від того, наскільки могутніми ви станете, вам потрібно буде займатися [Concept('diplomacy_with_icon', 'CONCEPT_PLACEHOLDER')|e], якщо ви хочете вижити крізь Віки, оскільки вам потрібно буде підписувати [Concept('alliances_with_icon', 'CONCEPT_PLACEHOLDER')|e] для захисту від ваших ворогів, або вести переговори про [Concept('peace_with_icon', 'CONCEPT_PLACEHOLDER')|e] після тривалої [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДві важливі речі, які варто врахувати тут:\n\n$BULLET$Вам потрібно буде витрачати [Concept('diplomats_with_icon', 'CONCEPT_PLACEHOLDER')|e] для виконання [Concept('diplomatic_action_with_icon', 'CONCEPT_PLACEHOLDER')|e] з іншими [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e], як-от [Concept('improve_relations_with_icon', 'CONCEPT_PLACEHOLDER')|e], створення [Concept('spy_networks_with_icon', 'CONCEPT_PLACEHOLDER')|e] або оголошення [Concept('wars_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете бачити своїх поточних [diplomats] на #high Top Bar#!.\n\n$BULLET$Наявність дипломатичних [Concept('treaties_with_icon', 'CONCEPT_PLACEHOLDER')|e] з іншими [countries], як-от [alliance] або [Concept('subject_with_icon', 'CONCEPT_PLACEHOLDER')|e], займатиме певну кількість [Concept('diplomatic_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете збільшити свою доступну [diplomatic_capacity], витрачаючи [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e] з панелі Бюджету."
  lesson_diplomacy_11: "@diplomacy! Поточні Відносини"
  lesson_diplomacy_11_desc: "Перейдімо до #high підвкладки \"Поточні відносини\"#!, щоб глибше зануритися в те, чим займається ваша [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_diplomacy_12: "@diplomacy! Поточні відносини"
  lesson_diplomacy_12_desc: "#high Підвкладка \"Поточні відносини\"#! містить інформацію про всі [Concept('treaties_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ви підписали з іншими [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e], а також про [Concept('international_organizations_with_icon', 'CONCEPT_PLACEHOLDER')|e], до яких ви належите.\n\nЯкщо у вас є [Concept('subjects_with_icon', 'CONCEPT_PLACEHOLDER')|e], ви зможете керувати ними з цієї панелі."
  lesson_diplomacy_13: "[country_icon] Відомі країни"
  lesson_diplomacy_13_desc: "Далі давайте перевіримо [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e], відомі вам."
  lesson_diplomacy_open_known_countries: "Відкрити підвкладку \"Відомі країни\""
  lesson_diplomacy_14: "[country_icon] Відомі країни"
  lesson_diplomacy_14_desc: "З цієї #high підвкладки#! ви можете бачити всі [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ви [Concept('discovered_with_icon', 'CONCEPT_PLACEHOLDER')|e]. За замовчуванням, вона буде відфільтрована так, що ви бачитимете лише $game_concept_countries$ у межах вашого [Concept('diplomatic_range_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЦе також гарне місце для перегляду вашого [Concept('great_power_score_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Якщо ваш $game_concept_great_power_score$ є одним з найвищих у світі, ви вважаєтеся [Concept('great_power_with_icon', 'CONCEPT_PLACEHOLDER')|e], що дозволить вам чинити більший вплив на ваших сусідів."
  lesson_diplomacy_15: "[international_organizations_icon] Організації"
  lesson_diplomacy_15_desc: "Давайте перевіримо [Concept('international_organizations_with_icon', 'CONCEPT_PLACEHOLDER')|e]!"
  lesson_diplomacy_open_known_orgs: "Відкрити підвкладку \"Організації\""
  lesson_diplomacy_16: "[international_organization_icon] Організації"
  lesson_diplomacy_16_desc: "Звідси ви можете переглянути всі [international_organization_icon] [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e] у світі. Серед них такі організації, як [GetUniqueInternationalOrganization('hre').GetName], [GetUniqueInternationalOrganization('catholic_church').GetName] або [Concept('personal_unions_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЯкі дії доступні вам у межах $game_concept_international_organizations$, до яких ви належите, залежить від самої організації, а також від будь-якого [Concept('special_status', 'CONCEPT_PLACEHOLDER')|e], який ви можете мати в ній."
  lesson_diplomacy_17: "[country_icon] Іноземні країни"
  lesson_diplomacy_17_desc: "Давайте приділимо хвилину розмові про іноземні [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Продовжуйте і @leftclick!#high клацніть#! на країні на карті, щоб відкрити панель.\n\n#weak Можливо, вам доведеться зменшити масштаб, щоб вибрати [country], оскільки при збільшенні масштабу ви вибираєте [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e].#!"
  lesson_diplomacy_open_foreign_country: "Відкрийте панель \"Іноземна країна\", @leftclick!#high клацнувши#! на країні на карті"
  lesson_diplomacy_18: "[countries_icon] Іноземні країни"
  lesson_diplomacy_18_desc: "Звідси ви можете побачити огляд іноземної [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], включаючи її [Concept('ruler_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Вкладка [Concept('diplomacy_with_icon', 'CONCEPT_PLACEHOLDER')|e] нагадує розділ \"Поточні відносини\", який ми обговорювали раніше, і показує такі речі, як [Concept('allies_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('rivals_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('subjects_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nНаразі давайте поглянемо на виділену Дипломатичну картку, яка містить кнопки для швидкого доступу до поширених [Concept('diplomatic_actions_with_icon', 'CONCEPT_PLACEHOLDER')|e], таких як покращення [Concept('opinion_with_icon', 'CONCEPT_PLACEHOLDER')|e] або здобуття [Concept('favors_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n#weak Ви також можете #high клацнути правою кнопкою миші#! на назві країни або прапорі будь-де в грі, щоб відкрити #high Контекстне меню#!#!."
  lesson_diplomacy_19: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_19b: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_19_desc: "На додаток до поширених [Concept('diplomatic_actions_with_icon', 'CONCEPT_PLACEHOLDER')|e], доступних через картку [Concept('diplomacy_with_icon', 'CONCEPT_PLACEHOLDER')|e], ви також можете #high клацнути#! на назві [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб перейти до #high вкладки \"Дії\"#! [Link('diplomacy', '', '@diplomacy_panel! Дипломатичної панелі')], з уже попередньо вибраною конкретною $game_concept_country$, яку ви зараз переглядаєте.\n\n#weak Ви також можете #high клацнути правою кнопкою миші#! на назві країни або прапорі будь-де в грі, щоб відкрити #high Контекстне меню#! та вибрати опцію #high $SELECT_ACTIONS$#!.#!"
  lesson_diplomacy_open_actions: "Відкрийте \"Дипломатичні дії\", @leftclick!#high клацнувши#! на назві в картці країни"
  lesson_diplomacy_20: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_20b: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_20_desc: "З #high вкладки \"Дипломатичні дії\"#! ми можемо здійснити різноманітні [Concept('diplomatic_actions_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Оскільки ми перейшли сюди, вибравши [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] на карті, ця конкретна $game_concept_country$ вже попередньо вибрана як ціль для дії.\n\nІснує багато різних $game_concept_diplomatic_actions$, які ви можете здійснити, деякі з них застосовні лише за певних обставин. Якщо ви хочете мирно взаємодіяти з іншими $game_concept_countries$, ви повинні турбуватися про три речі: [Concept('opinion_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('trust_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('favors_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nНаразі давайте спробуємо використати дію [Concept('improve_relations_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_diplomacy_confirm_diplo_action: "@leftclick!Натисніть кнопку «Покращити думку» для обраної країни"
  lesson_diplomacy_21: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_21_desc: "Чудова робота! Щойно ви підтвердите свою [Concept('diplomatic_action_with_icon', 'CONCEPT_PLACEHOLDER')|e], ваші [Concept('diplomats_with_icon', 'CONCEPT_PLACEHOLDER')|e] вирушать до відповідної [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] та розпочнуть обрану вами дію.\n\nДія [Concept('improve_relation_with_icon', 'CONCEPT_PLACEHOLDER')|e] не має негайного ефекту, натомість повільно збільшуючи [Concept('opinion_with_icon', 'CONCEPT_PLACEHOLDER')|e] протягом місяців та років. Те саме стосується багатьох інших $game_concept_diplomatic_actions$."
  lesson_admin_28b_desc: "[Concept('missions_with_icon', 'CONCEPT_PLACEHOLDER')|e] — це набори завдань, які дадуть деякі вказівки щодо того, що саме ви можете робити в #high Europa Universalis V#!. Ця гра велика, і є багато чого навчитися. Це частина задоволення!\n\nВи щойно завершили вступ до @dip! #high Politics Playstyle#!, що означає, що тепер ви маєте доступ до $game_concept_missions$, які допоможуть вам глибоко зануритися в те, як ви можете використовувати всі ці панелі та механіки, про які ми щойно говорили.\n\nЩоб полегшити вам перехід до наступного етапу, ми підготували кілька $game_concept_missions$, щоб ви могли почати."
  lesson_diplomacy_has_mission_active: "Розпочати політичну місію"
  lesson_military_open_military: "Відкрити військову панель"
  lesson_military_0: "[war_icon] $PLAYER_PLAYSTYLE_MILITARY$ Покроковий посібник"
  lesson_military_0b: "[war_icon] $PLAYER_PLAYSTYLE_MILITARY$ Покроковий посібник"
  lesson_military_0_desc: "Далі ми розглянемо $PLAYER_PLAYSTYLE_MILITARY$ Покроковий посібник! Для початку, давайте поглянемо на військову панель."
  lesson_military_1: "@military_panel! Військова справа"
  lesson_military_1_desc: "Тут ви побачите огляд ваших [Concept('armies_with_icon', 'CONCEPT_PLACEHOLDER')|e]. У разі [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e], [armies] можуть бути переміщені по карті для участі в боях з ворожими [armies] та [Concept('occupy_with_icon', 'CONCEPT_PLACEHOLDER')|e] ворожих [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n[armies] складаються з [Concept('regiments_with_icon', 'CONCEPT_PLACEHOLDER')|e] трьох різних типів:\n\n$BULLET$[Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] набираються з вашого [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e] через ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] і, як правило, слабкі, але дешеві в утриманні.\n\n$BULLET$[Concept('regulars_with_icon', 'CONCEPT_PLACEHOLDER')|e] — це професійні солдати, яких потрібно оплачувати та навчати, і вони вимагають [Concept('manpower_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n$BULLET$[Concept('mercenaries_with_icon', 'CONCEPT_PLACEHOLDER')|e] можна найняти за [Concept('gold_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб вони померли за вашу [country]... доки ви платите.\n\nНа початку гри більшість [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e] переважно покладаються на [levies] зі своїх [estates] для ведення своїх [wars], але з часом та зробленням [Concept('advances_with_icon', 'CONCEPT_PLACEHOLDER')|e] відбудеться перехід до професійних [regiments], які вимагають [manpower].\n\n[Concept('navies_with_icon', 'CONCEPT_PLACEHOLDER')|e] є морським еквівалентом [armies] і дотримуються схожої схеми, з [Concept('navy_levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] та професійними [Concept('ships_with_icon', 'CONCEPT_PLACEHOLDER')|e], що вимагають [Concept('sailors_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_military_2: "[manpower_icon] Людські ресурси"
  lesson_military_2_desc: "Ми повинні приділити хвилину, щоб поговорити про [Concept('manpower_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Як ми вже згадували, [Concept('regular_regiments_with_icon', 'CONCEPT_PLACEHOLDER')|e] вимагають [manpower] для набору, а також для поповнення, якщо вони зазнають втрат.\n\n[manpower] надходить від військових [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], які наймають @soldiers! [ShowPopTypeName('soldiers')] [pops].\n\n#weak На ранніх етапах ви можете генерувати $game_concept_manpower$, побудувавши [ShowBuildingTypeName('sergeantry')] [building] через панель виробництва, але ви отримаєте доступ до більшої кількості джерел, коли відкриєте нові [Concept('advances_with_icon', 'CONCEPT_PLACEHOLDER')|e].#!\n\n@hint! Ви можете дізнатися більше про [manpower] у [Link('hints', 'selected_hint = hint_manpower', 'Підказка про людські ресурси')]."
  lesson_military_war_0: "[casus_belli_icon] Казус Беллі"
  lesson_military_war_0_desc: "Тепер, коли ми розглянули [Concept('armies_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navies_with_icon', 'CONCEPT_PLACEHOLDER')|e], ми повинні поговорити більш загально про [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('casus_belli_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n[war] починається, коли [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] оголошує [war] іншій. [war] може бути оголошена з законної причини, відомої як [Concept('casus_belli_with_icon', 'CONCEPT_PLACEHOLDER')|e], що полегшить вам мирні переговори. Вести [war] без [casus_belli] все ще дуже можливо, але це матиме більший вплив на вашу [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('opinion_with_icon', 'CONCEPT_PLACEHOLDER')|e] ваших сусідів.\n\nНайкращий спосіб отримати Casus Belli — це запросити його у вашого [Concept('parliament_with_icon', 'CONCEPT_PLACEHOLDER')|e] через панель уряду. Створення [Concept('spy_networks_with_icon', 'CONCEPT_PLACEHOLDER')|e] в іноземній [country] також дозволить вам сфабрикувати Casus Belli проти них, якщо у вас є [Concept('cores_with_icon', 'CONCEPT_PLACEHOLDER')|e] на їхній землі, або якщо ви [Concept('rivals_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n#weak Оголошуючи [war], пам'ятайте, що [Concept('allies_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('subjects_with_icon', 'CONCEPT_PLACEHOLDER')|e] ваших ворогів, ймовірно, стануть на їхній бік! #!\n\n@hint! Ви можете дізнатися більше про [casus_belli] у [Link('hints', 'selected_hint = hint_casus_belli', 'Підказка про Casus Belli')]."
  lesson_military_war_1: "[war_icon] Війна"
  lesson_military_war_1_desc: "Кожна [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e] виграється шляхом накопичення [Concept('war_score_with_icon', 'CONCEPT_PLACEHOLDER')|e], який можна отримати, виграючи [Concept('battles_with_icon', 'CONCEPT_PLACEHOLDER')|e], зумівши [Concept('occupy_with_icon', 'CONCEPT_PLACEHOLDER')|e] ворожі [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e], і, найголовніше, досягнувши [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e]. Кожна [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e] ведеться з [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e], що залежить від [Concept('casus_belli_with_icon', 'CONCEPT_PLACEHOLDER')|e] нападника.\n\nУ $game_concept_war$ є два [Concept('war_leaders_with_icon', 'CONCEPT_PLACEHOLDER')|e], обидва з яких можуть мати кілька [Concept('war_allies_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Зрештою, $game_concept_war$ закінчиться, як тільки обидві сторони погодяться на [Concept('peace_treaty_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nХоча ви можете [occupy] ворожі території протягом $game_concept_war$, вони фактично не змінять власника, доки $game_concept_war$ не закінчиться і [peace_treaty] не ратифікує передачу [Concept('ownership', 'CONCEPT_PLACEHOLDER')|e].\n\nВи можете дізнатися більше про [war], [battles] та [occupation] у відповідних підказках:\n[Link('hints', 'selected_hint = hint_war', '@hint! Підказка про війну')]\n[Link('hints', 'selected_hint = hint_battle', '@hint! Підказка про битву')]\n[Link('hints', 'selected_hint = hint_siege_and_occupation', '@hint! Підказка про облогу та окупацію')]"
  lesson_military_war_2: "[war_exhaustion_icon] Виснаження від війни"
  lesson_military_war_2_desc: "Під час [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e] ви накопичуватимете [Concept('war_exhaustion_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Якщо воно стане достатньо високим, ваші [Concept('armies_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] гірше діятимуть у [Concept('battle_with_icon', 'CONCEPT_PLACEHOLDER')|e], а ваше [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e] почне зменшуватися.\n\nНайкращий спосіб знизити $game_concept_war_exhaustion$ — це бути в [Concept('peace_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Проте існують певні [Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('estate_privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e], які з часом зменшуватимуть $game_concept_war_exhaustion$.\n\n@hint! Ви можете дізнатися більше про [war_exhaustion] у [Link('hints', 'selected_hint = hint_war_exhaustion', 'Підказка про виснаження від війни')]"
  lesson_military_war_3: "[war_icon] Контроль над новими територіями"
  lesson_military_war_3_desc: "Нові землі, які ви завоюєте, не будуть корисними для вас негайно. Пам'ятайте, що вам потрібен [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб ваші [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] були корисними, і це може вимагати значних інвестицій в інфраструктуру для розширення охоплення вашої [Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nКрім того, [Concept('conquered_with_icon', 'CONCEPT_PLACEHOLDER')|e] землі зазнаватимуть значних штрафів, доки ви не [Concept('integrate_with_icon', 'CONCEPT_PLACEHOLDER')|e] їх за допомогою [Concept('cabinet_action_with_icon', 'CONCEPT_PLACEHOLDER')|e]. З цих причин часто розумно створити [Concept('subject_with_icon', 'CONCEPT_PLACEHOLDER')|e] на новозавойованій землі, щоб керувати нею від вашого імені.\n\n#italic Щоб дізнатися більше про [integration], ви можете переглянути [Link('hints', 'selected_hint = hint_has_conquered_provinces', '@hint! $hint_has_conquered_provinces$')] Підказку."
  lesson_military_open_geopolitics: "Відкрити панель геополітики"
  lesson_military_8: "@geopolitics_panel! Геополітика"
  lesson_military_8_desc: "Нарешті, ми повинні поглянути на @geopolitics_panel! #high Панель геополітики#!, щоб сказати кілька слів про іншу функцію, яка може стати актуальною пізніше в майбутніх [Concept('ages', 'CONCEPT_PLACEHOLDER')|e]: [Concept('exploration_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('colonization_with_icon', 'CONCEPT_PLACEHOLDER')|e]!."
  lesson_military_9: "@geopolitics_panel! Геополітика"
  lesson_military_9_desc: "Згодом, і особливо під час [ShowAgeName('age_3_discovery')], багато [Concept('countries_with_icon', 'CONCEPT_PLACEHOLDER')|e] розпочнуть свої [Concept('exploration_with_icon', 'CONCEPT_PLACEHOLDER')|e] зусилля. З цієї панелі ви можете побачити огляд ваших можливостей $game_concept_exploration$, а також будь-які придатні землі для [Concept('colonization_with_icon', 'CONCEPT_PLACEHOLDER')|e], за умови, що у вас є засоби для їх досягнення. Ви отримаєте [Concept('colonial_range_with_icon', 'CONCEPT_PLACEHOLDER')|e], якщо дослідите відповідні [Concept('advances_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nІнші вкладки цієї панелі також містять корисну інформацію про землі, якими ви керуєте: Ви можете переглядати різні [Concept('provinces_with_icon', 'CONCEPT_PLACEHOLDER')|e] у вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], а також [Concept('diseases_with_icon', 'CONCEPT_PLACEHOLDER')|e], присутні у світі. Якщо ви [Concept('own', 'CONCEPT_PLACEHOLDER')|e] будь-яку [coastal] [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e], ви побачите список [Concept('seazones_with_icon', 'CONCEPT_PLACEHOLDER')|e], що стосуються вас, [Concept('maritime_presence_with_icon', 'CONCEPT_PLACEHOLDER')|e], яку ви маєте в них, та небезпеки [Concept('pirates_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('privateers_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  lesson_admin_28c_desc: "[Concept('missions_with_icon', 'CONCEPT_PLACEHOLDER')|e] — це набори завдань, які дадуть деякі вказівки щодо того, що саме ви можете робити в #high Europa Universalis V#!. Ця гра велика, і є багато чого навчитися. Це частина задоволення!\n\nВи щойно завершили вступ до @mil! #high Expansion Playstyle#!, що означає, що тепер ви маєте доступ до $game_concept_missions$, які допоможуть вам глибоко зануритися в те, як ви можете використовувати всі ці панелі та механіки, про які ми щойно говорили.\n\nЩоб полегшити вам перехід до наступного етапу, ми підготували кілька $game_concept_missions$, щоб ви могли почати."
  lesson_military_has_mission_active: "Розпочати місію $PLAYER_PLAYSTYLE_MILITARY$"