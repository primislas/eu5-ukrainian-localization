  GOODS_TAB_TEXT: "Товари"
  GOODS_TAB_TT_TEXT: "У цій вкладці ви можете контролювати [Concept('market_balance', 'CONCEPT_PLACEHOLDER')|e] [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], які ваша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] виробляє та споживає на різних [Concept('markets', 'CONCEPT_PLACEHOLDER')|e], де вона присутня.\n\nЗвідси ви також можете розширити свої [Concept('resource_gathering_operations', 'CONCEPT_PLACEHOLDER')|e], до яких ваша [country] має доступ."
  FOOD_TAB_TEXT: "Їжа"
  FOOD_TAB_TT_TEXT: "У цій вкладці ви можете вирішити ситуацію з [Concept('food', 'CONCEPT_PLACEHOLDER')|e] у ваших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] та [Concept('markets', 'CONCEPT_PLACEHOLDER')|e]. Ми також можемо спробувати виправити проблеми з нестачею [food] шляхом [Concept('construction', 'CONCEPT_PLACEHOLDER')|e] [food] [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] або розширення [Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e]."
  UNITS_TAB: "Одиниці"
  UNITS_TAB_TT_TEXT: "Звідси ви можете керувати [Concept('units', 'CONCEPT_PLACEHOLDER')|e] під вашим командуванням, збирати свої [Concept('levies', 'CONCEPT_PLACEHOLDER')|e], набирати нові [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] або наймати [Concept('mercenaries', 'CONCEPT_PLACEHOLDER')|e]."
  OBJECTIVES_TAB: "Цілі"
  OBJECTIVES_TAB_TT_TEXT: "Тут ви можете встановлювати [Concept('military_objectives', 'CONCEPT_PLACEHOLDER')|e] для своїх [Concept('units', 'CONCEPT_PLACEHOLDER')|e]."
  CURRENT_ARMIES_TAB: "Армії"
  CURRENT_ARMIES_TAB_TT_TEXT: "Ця вкладка надає огляд усіх [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] під командуванням цієї [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], а також засоби для [Concept('recruit', 'CONCEPT_PLACEHOLDER')|e] нових $game_concept_armies$."
  CURRENT_NAVIES_TAB: "Флоти"
  CURRENT_NAVIES_TAB_TT_TEXT: "Ця вкладка надає огляд усіх [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] під командуванням цієї [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], а також засоби для [Concept('recruit', 'CONCEPT_PLACEHOLDER')|e] нових $game_concept_navies$."
  PROMOTION_TOOLTIP_T: "Швидкість підвищення та пониження статусу населення у [Player.GetNameWithNoTooltip]"
  PROMOTION_TT_TEXT: "Швидкість підвищення статусу населення у [Player.GetName] становить [Player.GetModifierValueNoFormat('global_pop_promotion_speed_modifier')]"
  LIST_TITLE_PROMOTION: "Швидкість підвищення статусу населення [Player.GetModifierValueWithNoTooltipNoSign('global_pop_promotion_speed_modifier')|V] зумовлена:"
  LIST_TITLE_DEMOTION: "Швидкість пониження статусу населення [Player.GetModifierValueWithNoTooltipNoSign('global_pop_demotion_speed_modifier')|V] зумовлена:"
  PROMOTION_DEMOTION_CONCEPT: "#w | #e $game_concept_demotion$#!"
  DIPLOMACY_RELATIONS_TAB: "Відносини"
  DIPLOMACY_RELATIONS_TAB_TEXT: "Звідси ви можете керувати своєю [Concept('дипломатією', 'CONCEPT_PLACEHOLDER')|e] з іншими [Concept('країнами', 'CONCEPT_PLACEHOLDER')|e]."
  DIPLOMACY_RELATIONS_TAB_FLAVOR_TEXT: "'Є приплив у справах людських. Який, схоплений на піку, веде до долі.'"
  DIPLOMACY_CURRENT_RELATIONS_TAB: "Поточні відносини"
  DIPLOMACY_CURRENT_RELATIONS_TAB_TEXT: "Ця вкладка надає огляд усіх [Concept('договорів', 'CONCEPT_PLACEHOLDER')|e], які ви наразі підписали з іншими [Concept('країнами', 'CONCEPT_PLACEHOLDER')|e], та [Concept('взаємодій_з_країнами', 'CONCEPT_PLACEHOLDER')|e], що тривають. Звідси ви також можете обирати своїх [Concept('суперників', 'CONCEPT_PLACEHOLDER')|e] та вести нову [Concept('дипломатію', 'CONCEPT_PLACEHOLDER')|e]."
  DIPLOMACY_CURRENT_RELATIONS_TAB_FLAVOR_TEXT: "'Найвище мистецтво війни — підкорити ворога без бою.'"
  DIPLOMACY_KNOWN_COUNTRIES_TAB: "Відомі країни"
  DIPLOMACY_KNOWN_COUNTRIES_TAB_TEXT: "Список [Concept('країн', 'CONCEPT_PLACEHOLDER')|e], які ви [Concept('відкрили', 'CONCEPT_PLACEHOLDER')|e]."
  DIPLOMACY_KNOWN_COUNTRIES_TAB_FLAVOR_TEXT: "'Здавайся слабким, коли ти сильний, і сильним, коли ти слабкий.'"
  DIPLOMACY_ACTIONS_TAB: "Дії"
  DIPLOMACY_ACTIONS_TAB_TEXT: "Звідси ви можете отримати доступ до всіх дипломатичних дій з іншими [Concept('країнами', 'CONCEPT_PLACEHOLDER')|e]."
  DIPLOMACY_ACTIONS_TAB_FLAVOR_TEXT: "'Facio ut facias.'"
  DIPLOMACY_ORGANIZATIONS_TAB: "Організації"
  DIPLOMACY_ORGANIZATIONS_TAB_TEXT: "Звідси ви можете отримати доступ до списку [Concept('міжнародних_організацій', 'CONCEPT_PLACEHOLDER')|e], відомих вашій [Concept('країні', 'CONCEPT_PLACEHOLDER')|e], а також до списку восьми [Concept('великих_держав', 'CONCEPT_PLACEHOLDER')|e], які перебувають на вершині міжнародного концерту."
  DIPLOMACY_ORGANIZATIONS_TAB_FLAVOR_TEXT: "'Союзи, договори, джентльменські угоди... такі речі можуть зв'язувати слабких із сильними, але ніколи сильних зі слабкими'."
  ORGANIZATIONS_KNOWN_TAB: "Організації"
  ORGANIZATIONS_KNOWN_TAB_TEXT: "Список [Concept('міжнародних_організацій', 'CONCEPT_PLACEHOLDER')|e], відомих вашій [Concept('країні', 'CONCEPT_PLACEHOLDER')|e]."
  ORGANIZATIONS_KNOWN_TAB_FLAVOR_TEXT: "'Protectio trahit subjectionem, et subjectio protectionem.'"
  ORGANIZATIONS_GREAT_POWERS_TAB: "Великі держави"
  ORGANIZATIONS_GREAT_POWERS_TAB_TEXT: "Список [Concept('великих_держав', 'CONCEPT_PLACEHOLDER')|e] цього світу та епохи."
  ORGANIZATIONS_GREAT_POWERS_TAB_FLAVOR_TEXT: "Нещасні народи, що стогнуть під залізним ярмом, людський рід, розчавлений жменькою гнобителів, і всюди сильні озброєні проти слабких грізною силою закону."
  PROVINCES_TAB: "Провінції"
  PROVINCES_TAB_TT_TEXT: "Звідси ви можете бачити всі ваші [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e]."
  PROVINCES_TAB_TT_FLAVOR_TEXT: "Cuius est solum, eius est usque ad coelum et ad inferos."
  EXPANSION_TAB: "Територія"
  EXPANSION_TAB_TT_TEXT: "Звідси ви можете розпочати своє [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e] Світу та заснувати [Concept('colonial_charters', 'CONCEPT_PLACEHOLDER')|e]."
  EXPANSION_TAB_TT_FLAVOR_TEXT: "І дам Я тобі, і нащадкам твоїм по тобі, землю, де ти чужинець."
  EXPLORATION_TAB: "Дослідження"
  EXPLORATION_TAB_TT_TEXT: "Ця вкладка дозволяє вам відправляти [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e] місії, щоб розкрити таємниці за межами [Concept('terra_incognita', 'CONCEPT_PLACEHOLDER')|e]."
  EXPLORATION_TAB_TT_FLAVOR_TEXT: "Тут дракони!"
  COLONIAL_TAB: "Колонії"
  COLONIAL_TAB_TT_TEXT: "Звідси ви можете створювати [Concept('colonial_charters', 'CONCEPT_PLACEHOLDER')|e], щоб [Concept('colonize', 'CONCEPT_PLACEHOLDER')|e] незайняті [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] та відвойовувати нові землі для вашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  COLONIAL_TAB_TT_FLAVOR_TEXT: "І ви будьте плідні й розмножуйтесь; розмножуйтесь на землі, і множтеся на ній."
  COLONIAL_TAB_TT_TEXT_NOT_THIS_TYPE: "@trigger_no! Як [Player.GetCountryTypeName] ви не можете створювати [Concept('colonial_charters', 'CONCEPT_PLACEHOLDER')|e]."
  MARITIME_TAB: "Морські"
  MARITIME_TAB_TT_TEXT: "Тут ви можете отримати доступ до [Concept('seazones', 'CONCEPT_PLACEHOLDER')|e], що мають відношення до вашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e] та ваших [Concept('markets', 'CONCEPT_PLACEHOLDER')|e], а також протистояти загрозі [Concept('pirates', 'CONCEPT_PLACEHOLDER')|e] та [Concept('privateers', 'CONCEPT_PLACEHOLDER')|e], або використовувати їх на свою користь."
  MARITIME_TAB_TT_FLAVOR_TEXT: "І води прибували, і дуже збільшувалися на землі; і ковчег плив по поверхні вод."
  DISEASES_TAB: "Хвороби"
  DISEASES_TAB_TT_TEXT: "Тут ви можете отримати доступ до [Concept('diseases', 'CONCEPT_PLACEHOLDER')|e], що присутні у вашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  DISEASES_TAB_TT_FLAVOR_TEXT: "І я глянув, і ось переді мною блідий кінь: і ім'я йому Смерть, а за ним ішов Ад."
  CURRENT_OUTBREAKS_TAB: "Поточні спалахи"
  CURRENT_OUTBREAKS_TAB_TT_TEXT: "Ця вкладка дозволяє перевірити всі [Concept('disease_outbreaks', 'CONCEPT_PLACEHOLDER')|e], присутні у світі."
  CURRENT_OUTBREAKS_TAB_TT_FLAVOR_TEXT: "Нехай їжа буде твоїми ліками, а ліки – твоєю їжею."
  MARITIME_SUBTAB_COASTS: "Узбережжя"
  MARITIME_SUBTAB_COASTS_TT_TEXT: "Це прибережні [Concept('seazones', 'CONCEPT_PLACEHOLDER')|e], що мають відношення до вашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  MARITIME_SUBTAB_COASTS_TT_FLAVOR_TEXT: "Ось море, велике й широке, що кишить незліченними створіннями, живими істотами малими й великими."
  MARITIME_SUBTAB_PRIVATEERS: "Капери"
  MARITIME_SUBTAB_PRIVATEERS_TT_TEXT: "Ця вкладка дозволяє деяким [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] посилати [Concept('privateers', 'CONCEPT_PLACEHOLDER')|e] проти своїх ворогів."
  MARITIME_SUBTAB_PRIVATEERS_TT_FLAVOR_TEXT: "Там ходять кораблі, і той Левіатан, якого Ти створив, щоб він грався в ньому."
  LOCATION_INFRASTRUCTURE_TAB_TT_TITLE: "Інфраструктура"
  LOCATION_INFRASTRUCTURE_TAB_TT_TEXT: "Ця вкладка слугує оглядом економіки [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Ви можете перевірити її [Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e], [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] та [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e], а також [Concept('market', 'CONCEPT_PLACEHOLDER')|e], до якого вона належить."
  LOCATION_INFRASTRUCTURE_TAB_TT_FLAVOR_TEXT: "Будувати — це залишати слід на землі, свідчення амбіцій та бачення. Нехай ваші основи вистоять, відлунюючи вашу спадщину крізь віки, що ще прийдуть."
  LOCATION_MILITARY_TAB_TT_TITLE: "Військо"
  LOCATION_MILITARY_TAB_TT_TEXT: "Ця вкладка дозволяє покращувати [Concept('fortifications', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e], збирати [Concept('levies', 'CONCEPT_PLACEHOLDER')|e] цієї [Concept('province', 'CONCEPT_PLACEHOLDER')|e] та набирати [Concept('regulars', 'CONCEPT_PLACEHOLDER')|e] і [Concept('mercenaries', 'CONCEPT_PLACEHOLDER')|e]."
  LOCATION_MILITARY_TAB_TT_FLAVOR_TEXT: "Той, хто захищає все, не захищає нічого."
  LOCATION_DEMOGRAPHICS_TAB_TT_TITLE: "Демографія"
  LOCATION_DEMOGRAPHICS_TAB_TT_TEXT: "Ця вкладка відображає #e Демографію#! локації, таку як її #e Класи#!, [Concept('cultures', 'CONCEPT_PLACEHOLDER')|e] та [Concept('religions', 'CONCEPT_PLACEHOLDER')|e]. Додатково відображається щорічний #e [Concept('population', 'CONCEPT_PLACEHOLDER')|e] Приріст#!, [Concept('promotion', 'CONCEPT_PLACEHOLDER')|e], [Concept('assimilation', 'CONCEPT_PLACEHOLDER')|e] та [Concept('conversion', 'CONCEPT_PLACEHOLDER')|e] населення локації."
  LOCATION_DEMOGRAPHICS_TAB_TT_FLAVOR_TEXT: "Королівство — це більше, ніж земля; це душі, які обробляють, торгують, поклоняються і мріють у ньому. Плекайте їхні зв'язки та вірування, бо вони є життєвою силою вашої спадщини."
  PROMOTION_TT_LIST_TITLE: "Щомісячне [promotion] становить [Location.GetPromote] через:"
  FOREIGN_DIPLOMACY_SUBTAB_TT_TEXT: "На цій вкладці ви можете бачити поточні [Concept('treaties', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] та здійснювати щодо них [Concept('diplomatic_actions', 'CONCEPT_PLACEHOLDER')|e]."
  FOREIGN_COUNTRY_SUBTAB_TT_TEXT: "Ця вкладка містить інформацію про іноземну [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  FOREIGN_COUNTRY_SUBTAB_TT_FLAVOR: "Якщо не знаєш ні ворога, ні себе, то програєш у кожній битві."
  FOREIGN_CHARACTERS_SUBTAB_TT_TEXT: "На цій вкладці ви можете взаємодіяти з [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] іноземної [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  FOREIGN_CHARACTERS_SUBTAB_TT_FLAVOR: "Весь світ — театр, а всі чоловіки й жінки — лише актори."
  MARKET_GOODS_SUBTAB_TT_TEXT: "На цій вкладці ви можете бачити [Concept('supply', 'CONCEPT_PLACEHOLDER')|e] та [Concept('demand', 'CONCEPT_PLACEHOLDER')|e] всіх [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], присутніх на цьому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  MARKET_FOOD_SUBTAB_TT_TEXT: "На цій вкладці ви можете бачити всі [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e], які [Concept('buying_food', 'CONCEPT_PLACEHOLDER')|e] або [Concept('selling_food', 'CONCEPT_PLACEHOLDER')|e] на цьому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  MARKET_TRADES_SUBTAB_TT_TEXT: "На цій вкладці ви можете бачити всі [Concept('trades', 'CONCEPT_PLACEHOLDER')|e], які [Concept('exporting', 'CONCEPT_PLACEHOLDER')|e] або [Concept('importing', 'CONCEPT_PLACEHOLDER')|e] [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] з цього [Concept('market', 'CONCEPT_PLACEHOLDER')|e] або до нього."
  MARKET_COUNTRIES_SUBTAB_TT_TEXT: "На цій вкладці ви можете бачити всі [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які [Concept('trading', 'CONCEPT_PLACEHOLDER')|e] на цьому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Їхня [Concept('merchant_power', 'CONCEPT_PLACEHOLDER')|e] визначатиме частку [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], яку вони зможуть забезпечити для своїх [Concept('trades', 'CONCEPT_PLACEHOLDER')|e], у випадку, якщо їх недостатньо для всіх [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  SEAZONE_TAB_TT_TEXT: "На цій вкладці ви можете бачити [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які мають [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e] в цій [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e], а також [Concept('pirates', 'CONCEPT_PLACEHOLDER')|e], що діють у цьому районі."
  GOOD_OVERVIEW_SUBTAB_TT_TEXT: "Ця вкладка пропонує огляд потенційних джерел та використання цього [Concept('good', 'CONCEPT_PLACEHOLDER')|e]."
  GOOD_SOURCES_SUBTAB_TT_TEXT: "Ця вкладка перелічує всі [Concept('локації', 'CONCEPT_PLACEHOLDER')|e], де виробляється цей [Concept('товар', 'CONCEPT_PLACEHOLDER')|e]."
  GOOD_MARKETS_SUBTAB_TT_TEXT: "Ця вкладка показує ситуацію з цим [Concept('товаром', 'CONCEPT_PLACEHOLDER')|e] на всіх відомих [Concept('ринках', 'CONCEPT_PLACEHOLDER')|e]."
  REBEL_POPS_TAB_NAME: "Підтримуючі [Concept('попи', 'CONCEPT_PLACEHOLDER')|e]"
  REBEL_POPS_TAB_TT_TEXT: "Ця вкладка перелічує всі [Concept('попи', 'CONCEPT_PLACEHOLDER')|e], які наразі підтримують цю [Concept('повстанську', 'CONCEPT_PLACEHOLDER')|e] фракцію."
  REBEL_LOCATIONS_TAB_TT_TEXT: "Ця вкладка перелічує всі [Concept('локації', 'CONCEPT_PLACEHOLDER')|e] у вашій [Concept('країні', 'CONCEPT_PLACEHOLDER')|e], де [Concept('попи', 'CONCEPT_PLACEHOLDER')|e] приєднуються до цієї [Concept('повстанської', 'CONCEPT_PLACEHOLDER')|e] фракції."
