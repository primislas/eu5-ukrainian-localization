  mapmode_recruit_name: "Набрати"
  MAPMODE_RECRUIT: "#T $mapmode_recruit_name$#!\nЦе надає колір кожній [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з поточним або можливим набором. [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] без можливого набору затінені."
  mapmode_region_name: "Регіони"
