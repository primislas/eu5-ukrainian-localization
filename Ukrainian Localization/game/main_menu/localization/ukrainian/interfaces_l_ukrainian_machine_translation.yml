  mapmode_selected_goods_name: "Вибрані товари"
  MAPMODE_SELECTED_GOODS: "#T $mapmode_selected_goods_name$#!#NL![Concept('Місцевості', 'CONCEPT_PLACEHOLDER')|e] у вашій [Concept('країні', 'CONCEPT_PLACEHOLDER')|e] забарвлені зеленим, якщо вони виробляють обрані [Concept('товари', 'CONCEPT_PLACEHOLDER')|e] у [Concept('сировинному_господарстві', 'CONCEPT_PLACEHOLDER')|e], та фіолетовим, якщо виробляються через [Concept('будівлі', 'CONCEPT_PLACEHOLDER')|e]; за межами вашої країни жовтий означає, що обраний товар виробляється і є надлишок, яким ви можете [Concept('торгувати', 'CONCEPT_PLACEHOLDER')|e], тоді як червоний означає, що наразі надлишку немає."
