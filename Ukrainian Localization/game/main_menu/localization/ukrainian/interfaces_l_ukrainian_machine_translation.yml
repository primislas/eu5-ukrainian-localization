  mapmode_supply_name: "Постачання"
  MAPMODE_SUPPLY: "#T $mapmode_supply_name$#!\n$mapmode_common_start$ їхній [Concept('ліміт_постачання', 'CONCEPT_PLACEHOLDER')|e].\nЯкщо [Concept('армію', 'CONCEPT_PLACEHOLDER')|e] не обрано, червоний вказує на низький ліміт постачання, жовтий — на середній, а зелений — на високий.\nКоли [Concept('армію', 'CONCEPT_PLACEHOLDER')|e] обрано, [Concept('місцевості', 'CONCEPT_PLACEHOLDER')|e], які не можуть підтримувати обрану армію, червоні, тоді як ті, що можуть, — зелені. [Concept('Місцевість', 'CONCEPT_PLACEHOLDER')|e], яка ледь може підтримувати обрану [Concept('армію', 'CONCEPT_PLACEHOLDER')|e], забарвлена жовтим."
  mapmode_institution_name: "Інституції"
