  mapmode_diplomacy_name: "Дипломатія"
  MAPMODE_DIPLOMACY: "#T $mapmode_diplomacy_name$#!\n$mapmode_common_start$ [Concept('використану_дипломатичну_спроможність', 'CONCEPT_PLACEHOLDER')|e] їхнього [Concept('власника', 'CONCEPT_PLACEHOLDER')|e] щодо обраної [Concept('країни', 'CONCEPT_PLACEHOLDER')|e], де темно-сірий вказує на те, що вони знаходяться за межами їхнього [Concept('дипломатичного_діапазону', 'CONCEPT_PLACEHOLDER')|e]. Смуги вказують, чи має обрана країна на ній [Concept('ядро', 'CONCEPT_PLACEHOLDER')|e]."
