  GOVERNMENT_TAB_TT_TEXT: "Це вікно слугує серцем вашої держави, головним центром для розуміння вашого [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] та політичного стану вашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Ви також можете наглядати та керувати справами [Concept('government', 'CONCEPT_PLACEHOLDER')|e], переходячи між вкладками нижче."
