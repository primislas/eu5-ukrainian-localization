  MODIFIERS_SCROLL_LIST_EMPTY: "Немає модифікаторів, що відповідають критеріям"
  SUBTAB_BALANCE_TT_TEXT: "У цій вкладці ви можете керувати щомісячним [Concept('balance', 'CONCEPT_PLACEHOLDER')|e] вашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e], керуючи своїми щомісячними [Concept('income', 'CONCEPT_PLACEHOLDER')|e] та [Concept('expenses', 'CONCEPT_PLACEHOLDER')|e]."
  SUBTAB_MARKETS_TT_TEXT: "У цій вкладці ви можете побачити список [Concept('markets', 'CONCEPT_PLACEHOLDER')|e], що стосуються вашої економіки.\n\n$BULLET$[markets] із зеленим заголовком – це [markets], де ви [own] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e].\n$BULLET$Сині ринки – це [markets], де ви не [own] [locations], але маєте [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e], і тому можете здійснювати [Concept('trades', 'CONCEPT_PLACEHOLDER')|e] звідти."
  BUILDINGS_TAB_TEXT: "Будівлі"
