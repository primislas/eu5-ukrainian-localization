  judicial_election_regency: "Судовий конклав"
  judicial_election_regency_desc: "Новий [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається радою. Процес є бюрократичним хаосом і може зайняти кілька місяців або навіть років для вирішення."
  mamluk_succesion_regency: "$mamluk$ успадкування"
  mamluk_succesion_regency_desc: "Новий [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], а також будь-які [Concept('regents', 'CONCEPT_PLACEHOLDER')|e] повинні походити з дисциплінованих та престижних лав елітних військ $mamluk$ під нашим командуванням."
  fratricide_succesion_regency: "Братерська боротьба"
  fratricide_succesion_regency_desc: "Новий [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається самим Богом, оскільки Він віддає перевагу одному з синів старого [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] над іншими."
  fratricide_succesion_regency_tt1: "Жоден син попереднього правителя не може успадкувати трон, тому до влади приходить інший член династії."
  fratricide_succesion_regency_tt2: "Жоден член династії не може успадкувати трон, тому до влади приходить нова династія."
  fratricide_succesion_regency_tt3: "Єдиний здібний син попереднього правителя негайно зійде на трон."
  fratricide_succesion_regency_tt4: "Сини повинні спочатку вирости, перш ніж питання про трон буде вирішено."
  republican_election_regency_desc: "Коли Республіка не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], тимчасовий [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] призначається керувати нею як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e], доки не відбудуться офіційні [Concept('election', 'CONCEPT_PLACEHOLDER')|e]."
  consort_regency_desc: "Коли [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] Монархії помирає, поки [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] ще [Concept('child', 'CONCEPT_PLACEHOLDER')|e], [Concept('consort', 'CONCEPT_PLACEHOLDER')|e] може керувати [Concept('country', 'CONCEPT_PLACEHOLDER')|e] замість нього як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  nobles_estate_regency_desc: "Коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], член $nobles_estate$ може бути призначений керувати нею як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  clergy_estate_regency_desc: "Коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], член $clergy_estate$ може бути призначений керувати нею як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  burghers_estate_regency_desc: "Коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], член $burghers_estate$ може бути призначений керувати нею як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  peasants_estate_regency_desc: "Коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], член $peasants_estate$ може бути призначений керувати нею як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  overlord_regency_desc: "Коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] є [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] і не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], [Concept('ruler] [overlord', 'CONCEPT_PLACEHOLDER')|e] може замість нього керувати нею як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  lordship_of_ireland_regency_desc: "Коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] є [Concept('member', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('lordship_of_ireland').GetName] і не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], [Concept('ruler] [international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] може замість нього керувати нею як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  subject_regency_desc: "Коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] є [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] і не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], [Concept('ruler] могутнього [subject', 'CONCEPT_PLACEHOLDER')|e] може замість нього керувати нею як [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  interregnum_desc: "Коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] не має [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], тимчасова тимчасова адміністрація керуватиме нею, доки не буде призначений офіційний [ruler], що може бути швидко або зайняти багато часу."