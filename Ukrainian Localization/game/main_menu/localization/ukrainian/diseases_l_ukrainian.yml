l_english:
  bubonic_plague: "Бубонна чума"
  bubonic_plague_desc: "Велика пошесть, що проноситься жвавими торговельними шляхами, не щадячи ні простолюду, ні знаті. Заражені страждають від чорних набряків у паху та під пахвами, жахливої гарячки та зрештою смерті. Деякі вірять, що Чорну Смерть переносять шкідники, які снують нашими вулицями та полями, поширюючи огидну хворобу від однієї бідолашної душі до іншої."
  malaria: "Малярія"
  malaria_desc: "Стародавня кара людства, Малярія, є інфекційним захворюванням, що передається від людини до людини укусом зараженого комара. Ця недуга викликає озноб, головний біль, потовиділення та дуже сильну гарячку, що повторюється кожні три-чотири дні."
  typhus: "Тиф"
  typhus_desc: "Ця смертоносна хвороба викликає у вражених нею сильну гарячку, великий червоний висип, що може поширитися по всьому тілу, та сплутаність розуму, яка може погіршуватися аж до повноцінного делірію. Ті бідолашні душі, що досягають цієї межі, розвивають гангренозні ураження і неминуче помирають."
  local_typhus_impact_modifier: "Модифікатор повіту: Тиф"
  influenza: "Грип"
  influenza_desc: "Відомий простолюду як Грип, це широко поширена хвороба зі здебільшого легкими симптомами, як-от нежить або гарячка у здорових людей, але що може бути надзвичайно небезпечною для тих, хто надто молодий або надто старий, або вже ослаблений травмою чи іншою недугою."
  influenza_location_modifier: "Модифікатор повіту: Грип"
  measles: "Кір"
  measles_desc: "Кір, також відомий як морбілі, рубеола та червоний кір, є пошестю, що надзвичайно швидко поширюється від людини до людини, викликаючи гарячку, кашель, чхання та великий плаский висип, що зрештою вкриває все тіло. Він найзавзятіше полює на дітей, які піддаються великому ризику смерті, якщо потрапляють у його лапи."
  measles_location_modifier: "Модифікатор повіту: Кір"
  smallpox: "Віспа"
  smallpox_desc: "Віспа — це жахлива хвороба, що викликає гарячку, блювоту і, зрештою, величезну кількість наповнених рідиною пухирів, що вкривають усе тіло нещасної жертви. Спалахи цієї пошесті дуже смертоносні, а ті, що виживають, зазвичай осліплені на все життя."
  smallpox_location_modifier: "Модифікатор повіту: Віспа"
  great_pestilence_location_modifier: "Модифікатор повіту: Велика пошесть"