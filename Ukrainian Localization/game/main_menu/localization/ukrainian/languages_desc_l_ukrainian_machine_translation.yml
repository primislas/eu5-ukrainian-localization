l_english:
  scandinavian_language_desc: "У добу вікінгів давньоскандинавська мова поширилася Скандинавією та іншими територіями, такими як Ісландія, Фарерські острови та частини Британських островів. З часом вона еволюціонувала в окремі, але споріднені мови, які ми визнаємо сьогодні, кожна зі своїми унікальними характеристиками, зберігаючи при цьому спільну скандинавську спадщину."
  english_language_desc: "Виникнувши з англосаксонських діалектів, привезених до Британії германськими поселенцями, англійська мова пізніше зазнала впливу норвезьких мов через вторгнення вікінгів, що призвело до значних змін у словниковому запасі та граматиці. Після нормандського завоювання та століть правління континентальних феодалів вона зазнала подальшого впливу французької мови."
  brythonic_language_desc: "Мови $brythonic_language$ виникли серед давніх кельтських народів Британії, перш ніж поширилися через $english_channel_area$ з біженцями, які тікали від англосаксонських вторгнень."
  gaelic_language_desc: "$gaelic_language$ (або ґойдельські) представляють кельтську родину мов, що виникли в Ірландії та поширилися на сусідні острови в середньовіччі."
  south_italian_language_desc: "Це назва для групи мов, що охоплюють центральну та південну частини Італійського півострова."
  north_italian_language_desc: "Народи в північній частині Італійського півострова розмовляють мовами цієї групи."
  occitan_language_desc: "Окситано-романська група мов виникла на півдні Франції, перш ніж стати поширеною мовою торгових портів у західному Середземномор'ї."
  french_language_desc: "#italic Мови ойль#!, або $french_language$, представляють собою клаптеву ковдру романських діалектів, що походять з півночі Франції."
  wendat_language_desc: "Одна з головних гілок ірокезьких мов, якою розмовляють уздовж річки Святого Лаврентія та на північ від Великих озер."
  abenakian_language_desc: "Східна алгонкінська гілка, якою розмовляють на значній частині Північної Нової Англії та в Канадських Приморських провінціях."
  cree_language_desc: "Велика колекція центрально-алгонкінських діалектів, якими розмовляють від Ньюфаундленду до Альберти."
  anishinabe_language_desc: "Колекція центрально-алгонкінських діалектів, якими розмовляють по всій території Великих озер та долини Оттави."
  latin_language_desc: "Одна з найвпливовіших мов в історії людства, латина була мовою Цезаря, Вергілія та Цицерона, але також Лютера, Декарта та Ньютона. Після падіння Західної Римської імперії та германських міграцій латина еволюціонувала в [ShowLanguageFamilyName('romance_language_family')] мови. Однак, #italic Roma capta ferum victorem cepit#! — завойований Рим підкорив свого лютого завойовника — і латина житиме як мова обрядів, культури та дипломатії впродовж наступних тисячоліть."