  crush_the_revolution_cb: "Придушити революцію"
  crush_the_revolution_cb_desc: "Ми не можемо дозволити потоку огидних ідей поширюватися за наші кордони, інакше ризикуємо втратити і нашу корону."
  spread_the_revolution_cb: "Поширити революцію"
  spread_the_revolution_cb_desc: "Вогні свободи та революції яскраво палатимуть за нашими кордонами. Їм нема чого втрачати, крім своїх кайданів!"
  religious_supremacy: "Релігійна перевага"
  religious_supremacy_entry: "Релігійна перевага в [GetUniqueInternationalOrganization('hre').GetName]"
