  assume_union_senority_desc: "[TARGET_COUNTRY.GetName] не здатна керувати [TARGET_COUNTRY.GetDiplomacy.GetUnion.GetName]! Ми візьмемо на себе тягар лідерства та приймемо старшинство над [GetInternationalOrganizationType('union').GetName]."
