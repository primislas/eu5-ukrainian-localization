  break_from_union_desc: "[TARGET_COUNTRY.GetName] отримала надто великий вплив у нашому дворі. Їх буде вигнано з уряду, і [GetInternationalOrganizationType('union').GetName] більше не диктуватиме нашу долю."
  assume_union_senority: "Прийняти старшинство унії"
