  abandon_colonial_claim_desc: "Ми примусимо наших супротивників зректися їхніх безпідставних претензій на колоніальні володіння, розвіявши їхні амбіції за морями."
  abandon_colonies_desc: "Наші вороги залишать свої далекі колонії, прирікаючи їх на руїни або на захоплення іншими, більш гідними... як-от нами."
  abandon_piracy_desc: "Доба набігів і грабунків добігає кінця. Наші вороги повинні присягнути припинити свої акти піратства та беззаконня на морях."
  block_foreign_building_treaty_desc: "Відтепер іноземним державам не буде дозволено будувати на нашій землі. Їхні амбіції зів'януть за цим договором."
  cancel_debt_desc: "Наші борги будуть анульовані, звільнивши нас від тягаря відсотків та фінансового рабства."
  claim_timurid_empire_desc: "За договором і за правом ми проголосимо себе спадкоємцями великої спадщини [GetCharacter('chg_timur_lame_borjigin').GetShortName] і всього, що колись схилялося перед нею."
  dismantle_fortifications_desc: "Їхні стіни та укріплення будуть розібрані камінь за каменем, залишаючи їх вразливими для майбутнього суду."
  peace_dismantle_hre_desc: "Сама [GetUniqueInternationalOrganization('hre').GetName] буде розбита, її корона відкинута, а її князі залишені правити самостійно, вільні від імперських уз."
  dissolve_coalition_desc: "Ця ліга опортуністів буде розсіяна, її члени залякані та розділені, більше не об'єднані проти нас."
  dissolve_league_peace_deal_desc: "Їхня ліга припинить своє існування, її справа розбита, а її члени змушені стояти окремо в мирі. Це призведе до значного зсуву в балансі сил під час [GetSituationByKey('italian_wars').GetName]."
  execute_ruler_desc: "[loser.GetGovernment.GetRuler.GetName] заплатить найвищу ціну за непокору, страчений за нашим указом, щоб усі пізнали нашу силу."
  peace_expand_clan_influence_desc: "Наш клан піднесеться ще вище, претендуючи на нові права та землі за рахунок тих, хто нам протистояв."
  peace_force_renounce_ilkhan_claim_desc: "Наші вороги відмовляться від будь-яких претензій на панування [GetUniqueInternationalOrganization('ilkhanate').GetName], зречуться спадщини, яку вони хибно вважали своєю."
  force_revolution_desc: "Старий лад буде знищено. Цим договором ми змусимо [loser.GetName] прийняти вогонь революції."
  peace_gain_clan_autonomy_desc: "Наш клан ходитиме вільніше, їхня влада визнана та захищена цим договором."
  high_kingship_overthrow_desc: "Лідерство [GetInternationalOrganizationType('high_kingship').GetName] має змінитися. [loser.GetGovernment.GetRuler.GetName] більше не претендуватиме на панування над островом!"
  supress_hussite_faith_desc: "Єресь буде піддана мечу. Цим договором ми змусимо їх викорінювати [ShowReligionAdjective('hussite')] віру скрізь, де вона ще зберігається."
  league_of_public_weal_appanage_victory_desc: "Князі здобудуть свою перемогу, змусивши корону схилитися та віддати свою владу."
  league_of_public_weal_royalist_victory_desc: "Король тріумфуватиме, принизивши князів і відновивши королівську владу над королівством."
  peace_leave_the_hre_desc: "[GetUniqueInternationalOrganization('hre').GetName] більше не вважатиме нас своїм підданим. Наші землі стоятимуть окремо від імперського закону та захисту."
  peace_nanbokuchou_force_imperial_abdication_desc: "[loser.GetName] буде розпущено. Їхнім людям буде наказано шукати притулку при дворі [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderCountry.GetName]."
  punish_chinese_expedition_foes_desc: "Ми покараємо [loser.GetName] за втручання в нашу Скарбничу Подорож. Їх виставлять як приклад перед світом, підвищуючи наш престиж, доки ми заплямуємо їхні імена."
  chi_recapture_emperor_desc: "Імператор буде звільнений і повернений на свій трон, а ті, хто наважився його ув'язнити, скуштують гіркого сорому."
  reinstate_the_monarchy_desc: "Монархія знову повстане, скинувши революціонерів, які прагнули покласти край королівській династії."
  peace_revoke_clan_autonomy_desc: "Автономія ворогів [loser.GetName] буде скасована, їхня доля знову потрапить під наш контроль."
  sound_toll_exemption_desc: "Наші купці вільно проходитимуть через [Concept('sound_toll', 'CONCEPT_PLACEHOLDER')|e], не оподатковувані та не обтяжені надмірними зборами."
  steal_pops_desc: "Їхній народ силою переселиться на наші землі, зміцнюючи наш [winner.GetFlavorRank], тоді як їхній слабшає."
  subjugate_natives_desc: "Тубільці схилять коліна та приймуть наше панування, і їхні землі стануть нашими по праву."
  peace_take_over_market_center_desc: "Серце їхньої економіки стане нашим, захопленим для слави та прибутку нашого [winner.GetFlavorRank]."
  peace_take_shogunate_desc: "Лідерство в [GetUniqueInternationalOrganization('japanese_shogunate').GetName] перейде до наших рук. Це провістить нову епоху, оскільки доля [ShowRegionName('japan_region')] відтепер формуватиметься нашим правлінням."