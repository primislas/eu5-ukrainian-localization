  peace_seize_opposition_leadership_desc: "[TARGET_COUNTRY.GetName] занадто слабка, щоб протистояти впливу [GetCountry('DLH').GetNameWithNoTooltip] під час [GetSituationByKey('fall_of_delhi').GetName] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]. Таким чином, на наші плечі лягає можливість скористатися цим і забезпечити розпуск ще одного потенційного завойовника."
  rtr_rein_in_rebellion: "Приборкати повстання"
