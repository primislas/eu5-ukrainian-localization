  enforce_conversion_hussite_wars_tt: "Велика кількість [ShowReligionAdjective('hussite')] вірян по всьому [loser.GetLongName] буде примусово навернена до [ShowReligionName('catholic')]. Це наблизить нас до викорінення їхньої єресі та закінчення [ShowSituationName('hussite_wars')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]."
