  rtr_rein_in_rebellion_tt: "Повстанці, які є #G вірними#! (рівні або більше ніж [ShowNamedValue('RTR_IS_LOYAL_VALUE')|+=2] $rtr_yuan_allegiance$) нам наприкінці [ShowSituationName('red_turban_rebellions')], будуть автоматично анексовані нами."
