  balanced_education_desc: "Життя приносить усілякі виклики тим, хто призначений правити. Якщо ми маємо належним чином підготувати королівське потомство, йому слід надати збалансовану освіту."
  administrative_education_desc: "Державні махінації та політичні справи можуть виявитися надмірними для майбутнього лідера. Щоб уникнути некомпетентності в державному управлінні, було б мудро зосередитися на адміністративній освіті."
  diplomatic_education_desc: "Життєвою силою нашої нації є укладання угод та обізнані дипломатичні маневри. Отже, ми повинні прищепити ті ж цінності нашому королівському потомству, якщо хочемо зберегти нашу дипломатичну перевагу над ворогами."
  military_education_desc: "Проєктування військової могутності є основою нашої нації. Зосередження на військових справах та вивчення природи війни, а також управління нашими збройними силами є ключовими для освітніх цілей."
  expensive_in_depth_education_desc: "Нашого багатства достатньо, коли йдеться про забезпечення поглибленої освіти для нашого спадкоємця. Доступ до найкращих наставників та джерел матеріалів надасть нам унікальні знання, а також найкращу освіту, яку можна купити за гроші."
