  miniature_painting: "Мініатюрний живопис"
  miniature_painting_desc: "Мініатюрні картини — це невеликі ілюстрації, що використовуються для прикраси рукописів та книг. Хоча більшість міститься у творах письменників, деякі мініатюрні картини створюються повністю відокремлено від будь-якого писемного твору мистецтва, і як такі є самостійним витвором майстерності."
