  elmelunde_frescoes: "Фрески Ельмелунде"
  tirant_blanch_desc: "Вона розповідає історію Тіранта, лицаря, який переживає різноманітні пригоди Середземним морем і опиняється в Константинополі, де закохується в Кармесіну, дочку імператора. Порівняно з іншими лицарськими романами, цей зображує людські почуття земним і буденним способом."
  catalan_atlas_desc: "Портоланна карта, що охоплює Європу, Північну Африку та Азію до Ост-Індії, точно зображуючи порти, міста, країни та людей, а також міфи та легенди менш відомих місць."
  vladislav_hall_desc: "Владиславська зала — це велика церемоніальна зала, відома своєю вражаючою пізньоготичною архітектурою та історичним значенням у чеських королівських подіях."
  crown_st_wenceslas_key_desc: "Золота корона, багато прикрашена різноманітним дорогоцінним камінням, включаючи сапфіри та смарагди, слугує символом правління $BOH$."
  voynich_manuscript_desc: "#italic Рукопис Войнича#! — це загадкова, нерозшифрована книга, наповнена таємничими ілюстраціями та текстом, написаним невідомою мовою або кодом."
  hexabiblos_desc: "Збірка $BYZ_ADJ$ правових джерел, яка слугуватиме основою правового та цивільного кодексу для всіх країн під впливом $BYZ$."
  acritic_songs_desc: "Збірка акритських пісень. Вони містять розповіді про таких героїв, як Дігеніс Акрітас та Андронік, чоловіків часів арабо-візантійських війн, які вирушають у пригоди проти арабських загарбників, захищаючи візантійський кордон і здобуваючи особисту славу."
  reforms_of_the_peloponnese_desc: "Концепція Плетона про досконалу Візантійську імперію. Замість того, щоб покладатися на Кодекс Юстиніана, вона закликає до повернення до більш класичного суспільства, натхненного пелопоннесцями. Перетворюючи півострів на культурний рай, вона також закликає до спалення гомосексуалістів та сексуальних девіантів, безпосередньо натхненна Платоновою #italic Республікою#!."
  nomoi_desc: "Хоча більшість його праць втрачено, все ще існують залишки ідеального суспільства Плетона. Багато чого залишається невідомим, але можна з упевненістю припустити, що воно безпосередньо натхнене зороастризмом і стоїцизмом."
  nomoi_directors_cut_desc: "Натхненний зороастризмом і стоїцизмом, #italic Nomoi#! містить плани Геміста Плетона щодо того, яким має бути візантійське суспільство. Замість того, щоб Патріархат був при владі, має бути нова віра, з ієрархічним пантеоном. Мають бути створені громади, монарх має бути доброзичливим, земля має належати народу, і мають бути поділи між статями та класами."
  history_of_the_palaiologoi_desc: "Хроніка, що містить історію династії Палеологів, від її дуже скромного походження в Римській Італії до її сходження у Візантійській імперії під час відновлення Імперії. Звісно, деякі з цих записів вважаються перебільшеними, але немає доказів того, що вони не відбулися."
  apoheteftiko_systhma_byzantio: "Апохетепфтіко Система"
  apoheteftiko_systhma_byzantio_desc: "Зразковий трактат про грандіозні проекти та інженерні системи каналізації та очищення води під містом $constantinople$, нібито написаний членом родини $Kantakouzenos$."
  gramatica_de_la_lengua_castellana_desc: "Перша всеосяжна граматика $spanish_language$ мови, яка укладає різні слова та їх використання в підручнику."
  don_quixote_desc: "В одному селі Ла-Манчі, назви якого я не бажаю згадувати, жив не так давно один із тих панів, що тримають спис на підставці, старий щит, худого коня та хорта для полювання."
  officium_hebdomadae_sanctae_desc: "Інноваційний набір поліфонічних гімнів та співів, складених для прославлення Великодня, на противагу стародавнім монодичним співам, таким як григоріанські співи."
  el_entierro_del_senor_de_orgaz_desc: "Інноваційна картина, що зображує поховання Гонсало Руїса де Толедо, сеньйора Оргаса, на якій, за традицією, святі Стефан і Августин зійшли з небес, щоб забрати його тіло. Вона майстерно використовує перспективу та колір, що робить її новаторською та приголомшливою роботою."
  chronicle_of_alfonso_xi_desc: "Хроніка правління [GetCharacter('cas_alfonso_xi_burgundy').GetName], від його ранніх років до останніх діянь."
  book_of_good_love_desc: "Книга, що оповідає про романтичні пригоди автора, переплетені байками та притчами по всьому тексту. Це найкращий приклад жанру, відомого як #mester de clerecía itálico#!."
  book_of_hunting_desc: "Книга, що представляє найкращі місця та техніки для мистецтва полювання та соколиного полювання по всьому $CAS$, як на велику, так і на дрібну дичину."
  maja_vestida_desc: "Портрет жінки, що лежить на ліжку в чуттєвій позі. Існує парний живопис, що зображує ту саму жінку в тій самій позі, але оголену."
  el_tres_de_mayo_de_1808_en_madrid_desc: "Картина, що показує лихоліття війни через репресії та розстріли, здійснені іноземними військами наступного дня після народного повстання."
  las_meninas_desc: "Картина, що зображує родину монарха в побутовій сцені. Глибока психологія всіх зображених персонажів робить її шедевром барокового реалістичного живопису."
  las_lanzas_desc: "Картина, що зображує момент тріумфу країни після капітуляції міста, з шикуванням пікінерів та інших озброєних людей, які спостерігають за передачею ключів від міста переможеним генералом переможцю."
  the_leviathan_desc: "Отримавши свою назву від біблійного чудовиська, вона розглядає структуру суспільства та легітимність уряду. Вона стверджує, що лише під наглядом абсолютної та об'єднаної влади суспільство може уникнути природної ситуації боротьби та конкуренції всіх проти всіх."
  wealth_of_nations_desc: "Фундаментальна праця з економіки, вона пропонує опис того, як нації створюють і будують власне багатство. Вона всебічно пояснює систему, за якої політика та держава взаємодіють з економікою, розглядаючи такі теми, як поділ праці, продуктивність та вільний ринок."
  canterbury_tales_desc: "Збірка оповідань, написаних середньоанглійською мовою та вважається одним з найбільших прикладів її літератури. Кожна з історій є окремою оповіддю, їхні жанри сильно різняться, хоча зазвичай їхня тема релігійна."
  revelations_of_divine_love_desc: "Книга про $christian_ADJ$ містицизм, вона пояснює містичні видіння, які пережила авторка, що призвело до її одужання від серйозної хвороби. Будучи написаною середньоанглійською, оскільки жінки нечасто були грамотними латиною, її легше розглядати як особисті зустрічі з божественним, а не як теологічні дискусії."
  wycliffe_bible_desc: "Середньоанглійський переклад з латинської Вульгати, це ортодоксальний переклад Біблії, деякі частини якого є переважно дослівними, тоді як інші більше відповідають змісту тексту. Однак пізніші доповнення текстів Джона Вікліфа зробили його дуже поширеним серед послідовників $lollardy_ADJ$."
  hampton_court_desc: "Чудовий палац у стилі бароко, він стане однією з улюблених резиденцій $ENG_ADJ$ монархів, віддзеркалюючи та конкуруючи з іншими великими палацами $europe$."
  the_ambassadors_desc: "Зображуючи двох $FRA_ADJ$ послів при $ENG_ADJ$ дворі, вона також містить асортимент різноманітних предметів у формі натюрморту, включаючи багато наукових об'єктів. Вона також показує фігуру черепа, яку можна побачити лише під певним кутом."
  whitehall_desc: "Призначений служити головною резиденцією $ENG_ADJ$ монарха, він має на меті затьмарити всі інші палаци $europe$, ставши найбільшим з них."
  spem_in_alium_desc: "Вважається монументальною хоровою композицією та вершиною ренесансної поліфонічної музики, це мотет для восьми хорів по п'ять голосів кожен. Це яскравий приклад $ENG_ADJ$ хорової музики."
  tamburlaine_the_great_desc: "Заснована на постаті Тамерлана, популярній назві [GetCharacter('chg_timur_lame_borjigin').GetName], вона розповідає історію $tamburlaine_the_great_common$"
  tamburlaine_the_great_common: "піднесення Тамерлана, скромного пастуха, який стає могутнім завойовником. Вона відома своїми промовами, драматичними битвами та яскравим зображенням багатогранного головного героя."
  romeo_and_juliet_desc: "Вважається шедевром і однією з найпопулярніших $ENG_ADJ$ п'єс, вона оповідає трагічну історію романтики та кохання між двома молодими членами двох ворогуючих $italian_group$ родин. Будучи однією з найчастіше виконуваних, їхні персонажі стали синонімом молодого кохання."
  st_pauls_desc: "Приклад $ENG_ADJ$ бароко, його купол є знаковим видовищем і одним з найбільших у світі. Його місце було присвячене святому Павлу з VII століття, і ця нова споруда стане пам'ятником вірі на століття вперед."
  the_principia_desc: "Одна з найбільших наукових праць, а також одна з найвпливовіших, вона пояснює закони руху та закон всесвітнього тяжіння."
  robinson_crusoe_desc: "Життя та дивовижні пригоди Робінзона Крузо, моряка з Йорка: який прожив двадцять вісім років, сам на безлюдному острові біля узбережжя Америки, поблизу гирла Великої річки Оріноко; будучи викинутим на берег корабельною аварією, в якій загинули всі люди, крім нього. З розповіддю про те, як його нарешті так дивно врятували пірати. Написано ним самим."
  the_iron_bridge_desc: "$flavor_eng.240.historical_info$"
  pride_and_prejudice_desc: "$flavor_eng.247.historical_info$"
  koskmedrese_desc: "Хоча спочатку побудований як суфійська ложа, він також виконує функцію $madrasa$. Він служитиме місцем поховання правителів та їхніх родин протягом поколінь."
  the_social_contract_desc: "Розглядаючи принципи політичного права, вона торкається питання про те, як спільнота може бути законно керована. Згідно з нею, така влада повинна бути сумісною зі свободою особистості та вирішувати питання соціальної нерівності."
  philosophical_letters_desc: "Також відомий як #italic Листи про англійську націю#!, це збірка есеїв, написаних на основі життєвого досвіду в $great_britain_region$. Це пояснення країни очима стороннього спостерігача, але воно також сприймається як напад на спосіб функціонування $FRA$."
  spirit_of_the_law_desc: "Обговорюючи політичну теорію та слугуючи авангардом порівняльного права, це дуже впливовий трактат у законах по всій $europe$ і навіть за її межами."
  dreams_of_the_orchard_desc: "Це оповідь з прихованим сатиричним тоном, де Король і Папа є знаковими фігурами. У цій оповіді Король і Папа вирішують вступити в дебати щодо правової доктрини, в яких вони залучають двох осіб, щоб ті представляли їх у дебатах: Король обирає Лицаря, а Папа – клірика. Хоча дебати залишаються дружніми, Лицар зрештою виходить переможцем, що, своєю чергою, символізує перемогу Короля над Папою. Хоча це дружня оповідь, вона також демонструє дебати щодо авторитету між Церквою та Королем держави."
  doges_palace_genoa_desc: "Палац слугуватиме не лише резиденцією уряду, а й лінією оборони проти будь-якої потенційної узурпації влади. Він стане свідченням могутності та престижу правителя."
  liber_certarum_historiarum_desc: "Означаючи «Книга певних історій», це хроніка земель $HAB$ та $carinthia_area$, що містить також розділ історії всієї $hre$ з часів $carolingian_dynasty_ADJ$ періоду."
  golden_roof_desc: "Дах, що складається з понад 2000 позолочених плиток, покриває еркер, який сам прикрашений численними рельєфами та картинами, а також гербами та геральдичними прапорами територій Імперії."
  landplagenbild_desc: "Зображуючи різноманітні лиха, включаючи сарану, морову виразку та вторгнення ворожих сил, це фреска-посвята, спонсорована громадянами як подяка за те, що вони пережили такі труднощі."
  beethoven_first_symphony_desc: "Маючи великий вплив майстрів і попередників автора, вона, тим не менш, відзначена його власними рисами, включаючи раптові сплески динамізму та зміни тональності, які зазвичай не є поширеними в традиційних симфоніях."
  the_creation_desc: "Виражаючи історію створення світу, як вона зображена в Біблії, вона містить оркестр, хор і солістів. Вона слідує за історією створення день за днем, причому солісти спочатку представляють архангелів, а пізніше – Адама і Єву."
  theuerdank_desc: "Натхненна артурівським корпусом, це поема, що розповідає вигадану та романтизовану історію про імператора, який вирушає до $BUR$, щоб одружитися зі своєю дружиною та правити там. Це головним чином історія про подорож, в якій головний герой має подолати багато викликів."
  theoricae_novae_planetarum_desc: "Розвиток птолемеївської астрономії, що слідує геоцентричній моделі, намагається пояснити рухи планет, а також причини затемнень. Вона призначена служити навчальним посібником для того, щоб зробити астрономію більш доступною для мас."
  danse_macabre_art_desc: "Нагадування про те, що всі люди повинні померти, воно зображує скелетні фігури як уособлення Смерті, що танцює разом з людьми. Ці люди належать до всіх соціальних класів, від Пап і Імператорів до простолюдинів, що символізує, що Смерть прийде за всіма однаково."
  chronica_hungarorum_desc: "Пояснюючи історію $HUN$ з давніх часів, вона підтримує традицію $hungarian_group$ народу, що походить від гунів та Аттіли, роблячи його моделлю для сучасних правителів."
  illuminated_chronicle_desc: "#italic $illuminated_chronicle$#! — це багато прикрашений рукопис з $HUN$, що детально описує його історію та його правителів з яскравими ілюстраціями та $latin_language$ текстом."
  goryeosa_desc: "Наслідуючи стиль $chinese_group$ хронік, він детально документує історію $KOR_ADJ$ династії, включаючи історію всіх королів, політику, суспільство, економіку, чиновників та хронологію."
  veritable_records_of_joseon: "Справжні записи Чосону"
  veritable_records_of_joseon_desc: "$veritable_records_of_joseon$ — це детальна хроніка, що описує літописи династії Чосон. Під час правління монарха придворні літописці записують різні події, які пізніше об'єднуються в запис про правління монарха."
  kor_cloud_dream_of_nine: "Сон у дев'яти хмарах"
  kor_cloud_dream_of_nine_desc: "$kor_cloud_dream_of_nine$ — це роман, тематично розташований у стародавній династії Тан у $china$. Фантастичний роман, написаний [ShowAdvanceName('kor_hangeul_alphabet')], він кинув виклик усім своїм сучасним соціальним та художнім нормам. Незважаючи на те, що він не використовує #italic Hanja#!, він все ще вважається великим твором мистецтва."
  tongguk_tonggam: "Тонгук Тонгам"
  tongguk_tonggam_desc: "$tongguk_tonggam$ — це хроніка, яка детально описує історію півострова [ShowRegionName('korea_region')] від давньої історії до правління династії $KOR$."
  chronicle_of_egypt_desc: "З повною назвою #italic Аль-Нуджум аль-Захіра фі Мулук Міср ва-аль-Кахіра#!, це повна історія $egypt_region$ та $mamluk$ $rank_kingdom_muslim$ з часів ісламського завоювання."
  theodicee_desc: "З повною назвою #italic Essais de Théodicée sur la bonté de Dieu, la liberté de l'homme et l'origine du mal#!, вона виправдовує віру в Бога, незважаючи на присутність зла у світі. Вона описує Бога як нескінченно досконалу істоту, і тому зло дозволено існувати заради більшого блага."
  sorrows_of_young_werther_desc: "Написаний у формі листів, роман зосереджений на нерозділеному коханні молодого чоловіка, що завершується трагічним фіналом. Вплив роману незаперечний: його читали по всій $europe$, а люди наслідували одяг та стиль головного героя, і навіть його трагічний фінал."
  faust_desc: "Драма розповідає історію Фауста, $german_group$ алхіміка, астролога та мага, який, як кажуть, був настільки жадібним до знань та пригод, що уклав угоду з демоном на ім'я Мефістофель. Вона розповідає про заставу душі доктора Фауста в обмін на 24 роки служби диявола, життя насолод, отриманих від цього, та подальше каяття Фауста після його смерті, коли демон зажадав своєї плати."
  old_town_hall_leipzig_desc: "$flavor_mei.100.historical_info$"
  dalai_al_khayarat_desc: "#italic Далаїл аль-Хайрат ва-шаварік аль-анвар фі зікр ас-салят 'аля ан-Набі аль-мухтар#!, що означає #italic Дороговкази благ і блискучий спалах світла у згадці благословень на обраного Пророка#!, є збіркою молитов і благословень для пророка Мухаммеда."
  holy_trinity_st_sergius_lavra_desc: "Центр духовності $russian_group$ $orthodox_ADJ$ Церкви, це монастир, присвячений Святій Трійці. З часом він розширився зі своїх скромних дерев'яних початків, приваблюючи людей звідусіль."
  st_sergius_relics_desc: "$flavor_mos.7.historical_info$"
  holy_trinity_desc: "Вважається одним із чудес $russian_group$ мистецтва, він зображує трьох ангелів, які відвідали Авраама згідно з Книгою Буття, але його також можна інтерпретувати як символ Святої Трійці."
  uspensky_sobor_desc: "Названий «Успенський собор» і також «Собор Успіння», $uspensky_sobor$ присвячений вознесінню Діви Марії на Небеса. Наріжний камінь $russian_group$ $orthodox_ADJ$ Церкви, він є духовним центром віри."
  tale_of_the_princes_of_vladimir_desc: "Це літературна генеалогія правлячої родини $MOS$ і $VLR$ не тільки до Рюрика, але й до певного Пруса, який, як кажуть, був братом Цезаря Августа. Таким чином, вона закладає основу коронації $russian_group$ правителя як $rank_empire_tsar_ruler_male$."
  monomakhs_cap_desc: "Символ $russian_group$ правління та влади, це тюбетейка, прикрашена золотом і дорогоцінним камінням та облямована соболем. Її зв'язок з $BYZ_ADJ$ імперією також надає легітимності $russian_group$ правителям як спадкоємцям $rome$."
  the_great_bell_tower_desc: "Збудована з цегли та побілена, вона має дві дзвіниці та висоту, що дозволяє їй перевершувати будь-які інші будівлі навколо. Її виняткова висота також дозволяє їй бути спостережним пунктом проти потенційних загроз місту."
  st_basil_cathedral_desc: "Слугуючи символом $russian_group$ культури та ідентичності, вона також розуміється як земний символ Небес. Хоча вона є частиною $BYZ_ADJ$ $orthodox_ADJ$ традиції, вона відхиляється від неї тим, що складається з дев'яти куполів, розташованих так, щоб нагадувати полум'я багаття."
  the_soyembika_tower_desc: "Хоча існує кілька думок щодо того, коли саме була побудована вежа і з якою метою, вона є безперечним орієнтиром міста, домінуючи над його ландшафтом і викликаючи повагу серед його населення."
  lady_of_kazan_desc: "Зображення Діви Марії, шанованої як покровительки всього $russian_region$. Чудесним чином знайдена після того, як була втрачена понад століття, вона має величезний культурний та релігійний вплив на $russian_group$ $orthodox_ADJ$ народ."
  winter_palace_desc: "Слугуючи офіційною резиденцією правлячої династії, це яскравий приклад $russian_group$ барокової архітектури. Вже вражаюча будівля на момент свого початкового будівництва, численні реконструкції та розширення протягом багатьох років перетворили її на справді монументальне видовище."
  magia_naturalis_desc: "#italic $magia_naturalis$#! – це неймовірно популярний збірник цікавих спостережень з усіх галузей наук, включаючи геологію, металургію, магнетизм, оптику, медицину та інші теми."
  catherine_palace_desc: "Слугуючи літньою резиденцією правлячої династії, це вишуканий палац у стилі рококо з великими садами. Його оздоблені алебастрові зали слугують місцем для відпочинку та релаксації для правлячої родини та двору."
  st_peter_and_paul_desc: "Петропавлівська фортеця – це цитадель, що укріплює вхід до річки Неви. Вона містить у собі $st_peter_and_paul$, дзвіниця якої є не тільки важливим символом фортеці та міста, але й найвищою $orthodox_ADJ$ церквою."
  palace_of_caserta_desc: "Найбільший палац з існуючих, це вражаючий приклад барокової архітектури. Маючи п'ять поверхів і понад тисячу кімнат, він також включає великі сади з численними фонтанами."
  pudizia_desc: "Виняткове зображення оголеної жіночої фігури, покритої вуаллю, демонструє велику витонченість техніки роботи з мармуром. Вуаль здається прозорою, але водночас важкою, одночасно прикриваючи та відкриваючи фігуру під нею, демонструючи великий рух та плавність."
  istoriya_rossiskaya_desc: "Чудова документація $russian_group$ з давніх часів, вона містить багато інформації, якої немає в жодній іншій хроніці. Тому багато хто сумнівається в її достовірності."
  gatchina_palace_desc: "Поєднуючи класичну архітектуру та багато рис середньовічних замків, він швидко став одним із улюблених палаців для проживання правлячої родини, а отже, дуже важливим місцем для $russian_group$ політики."
  on_the_corruption_of_morals_desc: "Критика зловживань, скоєних правлячими класами, вона виступає за повернення до оригінальних $russian_group$ цінностей та фігури монарха як батька народу. Таким чином, слід уникати автократичних практик, усуваючи проблеми кріпаків без необхідності скасування самого кріпацтва."
  a_journey_from_st_petersburg_to_moscow_desc: "Дуже полемічна праця, вона описує проблеми $RUS$, включаючи кріпацтво, дворянство, загальне управління та свободу. Вона запозичує багато концепцій у різних філософів $europe$, і викликала гнів станів, незважаючи на те, що сам автор не був революціонером, а лише спостерігачем, який вказував на проблеми $RUS_ADJ$ уряду та суспільства."
  ode_to_liberty_desc: "Загалом, поема є потужним закликом до справедливості, свободи та дотримання вищого закону, що перевершує владу монархів, і слугувала натхненням для повстанських рухів по всій $RUS$."
  work_of_art_mons_meg_desc: "Одна з найбільших гармат за калібром, це величезна бомбарда з діаметром ствола півметра та довжиною чотири метри. Виготовлена із заліза, у ранні часи її фарбували червоним свинцем, щоб уникнути іржавіння."
  robert_burns_poems_chiefly_in_the_scottish_dialect_desc: "Збірка різних віршів, її мета – слугувати національною $scottish_group$ літературою, а також пояснює $scottish_gaelic_language$ лексику для тих, хто не володіє цією мовою."
  chronica_gentis_scotorum_desc: "Значна праця з історії $scottish_group$, вона простежує історію та походження $SCO$ аж до часів Мойсея, проходячи через Фергуса Мора, легендарного засновника нації."
  atland_eller_manheim_desc: "Кульмінація готицизму, культурного руху, що пишається походженням від готів, вона стверджує, що $SWE$ є місцем міфічної Атлантиди."
  swe_makalos_desc: "Розмовна назва маєтку, що належить одній з найшляхетніших родин $SWE$, він стоїть прямо перед палацом правителя. Не поступаючись йому в пишноті, він змушує скромніші будівлі навколо нього бліднути в порівнянні."
  san_zanipolo_desc: "Сан-Дзаніполо, скорочено від Санті Джованні е Паоло, — велика готична церква у Венеції, Італія, що слугує традиційним місцем поховання багатьох дожів міста."
  ca_foscari: "Ка' Фоскарі"
  ca_foscari_desc: "Палац $ca_foscari$ — це величний готичний палац, збудований уздовж Гранд-каналу, що символізує багатство та владу родини Фоскарі."
  fra_mauro_map: "Мапа світу Фра Мауро"
  fra_mauro_map_desc: "$fra_mauro_map$ — це надзвичайно детальна та інноваційна мапа світу, яка синтезувала географічні знання з Європи, Близького Сходу та інших регіонів, пропонуючи одне з найпередовіших зображень відомого світу на той час."
  tintorettos_crucifixion_desc: "$tintorettos_crucifixion$ — це монументальне та драматичне зображення розп'яття Христа, що демонструє інтенсивні емоції, динамічну композицію та майстерне використання світла й тіні."
  de_honesta_voluptate_et_valetudine_desc: "#italic De Honesta Voluptate et Valetudine#!, написана Бартоломео Платіною, є однією з найперших друкованих кулінарних книг, що пропонує рецепти та дієтичні поради."
  eight_questions_on_the_power_of_the_pope_desc: "Будучи прихильником розділення духовної та світської влади, вона відстоює позицію, що Папа та духовенство не повинні володіти власністю, правом, яке розуміється як таке, що належить лише світській владі."
  frauenkirche_desc: "#italic Tintoretto's Crucifixion#! — це монументальна картина, що зберігається в Скуола Гранде ді Сан Рокко, Венеція, яка зображує Розп'яття Христа з інтенсивним драматизмом та динамічною композицією."
  diarii: "Діарії"
  diarii_desc: "$diarii$ — це 58-томна хроніка Маріно Сануто, що детально описує політичне, соціальне та дипломатичне життя Венеції епохи Відродження з 1496 по 1533 рік."
  annales_bojorum_desc: "Написана в кількох томах, вона розповідає історію $BAV$ у поєднанні із загальноєвропейською історією. Вона також включає боротьбу між Папою та Імперією."
  theatinerkirche_art_desc: "Побудована в $italian_group$ бароковому стилі, вона стала символом міста і мала значний вплив на архітектуру в стилі бароко в усьому $south_german_region$."
  bng_nabibangsha_desc: "Один з перших перекладів #italic Qaṣaṣ al-anbiyā'#! на $bengali_language$ мову, він складається зі збірки історій про пророків і посланців $muslim$."
  brandenburger_tor_desc: "Побудована в центрі міста на честь перемоги в битві, вона виконана в неокласичному стилі з багатьма рельєфами, що зображують сцени римської міфології. На вершині бронзова квадрига представляє богиню Вікторію, хоча спочатку передбачалося, що це буде Ейрена, грецька богиня миру."
  the_prize_essay_desc: "Названа #italic Inquiry Concerning the Distinctness of the Principles of Natural Theology and Morality#!, або в оригіналі $german_language$ #italic Untersuchung über die Deutlichkeit der Grundsätze der natürlichen Theologie und der Moral#!, була представлена Королівській академії наук, яка присудила йому премію, завдяки чому робота стала відомою як $the_prize_essay$."
  prutenic_tables_desc: "Праця, також названа Прусськими таблицями, базується на роботі Коперника, хоча вона знову пов'язує математичну роботу Коперника з геоцентричною системою."
  praxis_pietatis_melica_desc: "Означаючи #italic Практика благочестя в пісні#!, це $lutheran_ADJ$ гімнал, призначений для використання на службах як у церкві, так і приватно. Містить численні гімни, їхня популярність зробила їх основним елементом релігійного життя."
  phaedon_desc: "Захист безсмертя душі, він представлений як серія діалогів Сократа, в яких він готується до власної смерті та обґрунтовує простоту, а отже, і безсмертя душі."
  teaching_nova_methodo_desc: "Складаючись з матеріалів, викладених у пізніших лекціях автора, це перегляд і розвиток його ранніх ідей. У ній міститься захист самосвідомості, розуміння її як феномену, що є внутрішньо соціальним, оскільки для того, щоб будь-яка особа була самосвідомою, їй потрібна присутність інших, з якими можна порівнювати себе."
  joys_of_young_werther_desc: "Будучи сатиричною пародією на #italic $sorrows_of_young_werther$#!, це критика романтичного самогубства, зображеного в першому творі. Хоча вона здобула велику похвалу, багато прихильників руху #italic Sturm und Drang#! критикували її за сатиричне зображення головних героїв."
  nathan_the_wise_desc: "Дія відбувається за часів Третього хрестового походу, п'єса є захисником релігійної толерантності. У ній члени трьох авраамічних релігій об'єднуються через дружбу та толерантність, відкладаючи свої релігійні розбіжності."
  on_war_desc: "Трактат про війну та військову стратегію, він аналізує та розглядає війни свого часу як продовження політики держави. Одна з найвпливовіших книг на цю тему, коли-небудь написаних, вона, тим не менш, здобула свою частку критиків та недоброзичливців, оскільки вона розглядає війну лише в національній державі, в якій і держава, і її населення стають двигуном війни."
  virgin_of_guadalupe_desc: "Згідно з легендою, статуя була вирізана Лукою Євангелістом, але була похована після вторгнення маврів. Століттями пізніше, явлення Діви Марії показало місце, де була похована статуя, що призвело до її повторного відкриття. Приваблюючи паломників з самого початку, передбачуване заступництво Діви Марії, яке дарувало перемогу над маврами, збільшило її престиж та значення."
  palace_monastery_of_santa_clara_desc: "Спочатку палац у стилі мудехар, він був перероблений на монастир на відзначення перемоги над маврами. Завданням якого було молитися за королівську родину, він приймав у своїх стінах багатьох високошляхетних жінок."
  on_miracles_signs_and_revelations_desc: "Намагаючись боротися з лютим забобоном, він йде проти популярної думки того часу, стверджуючи, що дива не завжди є справою Бога чи Диявола, але часто є продуктом уяви або відвертої вигадки."
  astronomiae_instauratae_progymnasmata_desc: "Заснована на спостереженнях нової зірки, що з'явилася в небі в 1572 році, а також на спостереженнях комет, це дуже впливова праця, не тільки в науковій галузі, але й надихаюча поетів та письменників."
  fairy_tales_for_childred_desc: "Збірка різноманітних казок, вони здобули велике визнання широкої публіки, привернувши увагу цілих родин і навіть деяких мишей."
  erasmus_montanus_desc: "Сатиричний твір, що засуджує академічний елітизм, він розповідає про молодого чоловіка, який повертається до свого сільського рідного міста після навчання в столиці, щоб виявити, що менталітет містян не відповідає тому, що він здобув під час навчання, що є причиною багатьох конфліктів між ним та жителями села."
  duomo_di_firenze_desc: "Розпочатий у готичному стилі в XIII столітті, його $renaissance$ купол є характерною рисою собору, що височіє над містом і стає його синонімом."
  nuova_cronica_desc: "Бажаючи наслідувати історичні досягнення $rome$, це хроніка історії $FLO$, що описує історію багатьох будівель міста, населення, торгівлю та численні події, що відбулися в місті."
  history_of_the_florentine_people_desc: "Застосовуючи незвичайний підхід до історії, оскільки він пояснює її виключно зі світської точки зору, він стверджує, що $italy_region$ виходить з періоду культурного занепаду і вступає в нову епоху."
  mona_lisa_desc: "Привертаючи увагу як вищих, так і нижчих класів, вона вважається шедевром, який включається в будь-яку дискусію про мистецтво. Загадковий вираз фігури породив багато теорій, тоді як майстерність її мазків захоплює всіх."
  last_supper_desc: "Картина останньої вечері Ісуса Христа з його апостолами перед розп'яттям, вона демонструє майстерність у відображенні різноманітних людських емоцій і дуже впливова на багато інших творів $renaissance$."
  de_jure_belli_ac_pacis_desc: "Обговорюючи правовий статус війни, він бере концепції з попередніх робіт і розширює їх, закладаючи основи міжнародного права."
  tarikhe_alamaraye_abbasi_desc: "Хроніка правлячої династії $farsi_culture$, це одна з найвпливовіших праць з історії $persia_region$."
  shahnameh_desc: "$ira_shahnameh_desc$"
  chronicle_of_morea_desc: "#italic $chronicle_of_morea$#! — це хроніка XIV століття, що детально описує встановлення #italic Frankokratia#! в Греції після четвертого хрестового походу. Значна частина роботи присвячена Князівству Ахея."
  the_prince_desc: "Книга присвячена управлінській політиці, зосереджуючись не лише на спадкових принцах, а й на можливостях для нових принців. Вона пояснює, як утримувати владу та як успішно керувати завойованими землями. Мета виправдовує засоби."
  cronica_universalis_desc: "#italic $cronica_universalis$#! пропонує розуміння політичних подій, культурних зрушень та суспільних змін того часу, сприяючи розумінню середньовічної $europe$. Публікація навіть містила приблизні описи далекої землі за морем на Заході, посилаючись на подорожі та експедиції рибалок з-за [ShowAreaName('greenland_area')]."
  liber_gestorum_in_lombardy_desc: "Загальна історія Північної $italy_region$, області, відомої як $lombardy_area$, вона головним чином зосереджується на місті $milano$ під династією $visconti_dynasty$."
  arca_di_san_pietro_martire_desc: "Високо декорований саркофаг, він містить останки святого Петра Веронського. Його рельєфні прикраси зображують історії святого, з високо алегоричною символікою, включаючи символічне представлення моральних і теологічних чеснот."
  milan_cathedral_desc: "Знакова споруда з її витонченим готичним дизайном домінує над горизонтом [ShowLocationName('milano')]. Останні штрихи, включаючи шпилі та декоративні елементи, додаються до собору, демонструючи вершину архітектурного досягнення. Це диво людської винахідливості та архітектури є свідченням культурного та релігійного значення міста, збільшуючи славу Бога та нації."
  equestrian_statue_desc: "Призначена бути найбільшою статуєю, що зображує вершника на коні, для неї були проведені інтенсивні дослідження коней, оскільки розмір і вага статуї становили значний виклик для її будівництва."
  palazzo_reale_di_milano_desc: "Будучи резиденцією уряду міста протягом століть, ймовірно, ще з римських часів, вона постійно оновлювалася та розширювалася протягом багатьох років. Просторі зали та численні двори роблять її справжнім центром влади для $milano$."
  mlo_historia_patria_desc: "#italic $mlo_historia_patria$#! — це хроніка, що детально описує історію Мілана від його витоків до XV століття. Це одна з найраніших таких праць, написаних італійською, а не латинською мовою."
  visconti_palace_desc: "#italic $visconti_palace$#! є символом міланської гегемонії в регіоні Ломбардія, височіючи над сусідніми спорудами як свідчення багатства та могутності засновників."
  huis_ten_bosch_desc: "Палац $huis_ten_bosch$, що вважається вершиною голландської архітектури, містить багато творів мистецтва різних художників, усі вони знаходяться в Помаранчевому залі будівлі."
  dictionnaire_historique_et_critique_desc: "Містить антихристиянські та антиавторитарні ідеї, #italic $dictionnaire_historique_et_critique$#! має на меті сприяти більш толерантному суспільству щодо різних віросповідань, викриваючи різні протиріччя в теологічних догматах та зображуючи християнство як ірраціональне в надії привести світ до більш просвітницьких часів."
  mare_liberum_desc: "Написана з метою просування ідей вільної торгівлі, #italic $mare_liberum$#! наголошує на відкритих морях, де будь-який купець з будь-якої нації може вільно торгувати, не турбуючись про те, кому належить море, оскільки море є спільною власністю для всіх."
  saint_peters_basilica_desc: "Базиліка була спочатку побудована на вершині Цирку Нерона імператором Костянтином і з тих пір була центром західного $christian$, включаючи місце, де був коронований [GetCharacter('fra_charlemagne').GetName]. Нова будівля повністю замінює її, будучи чудовим вираженням краси $renaissance$, як і личить найбільшій з усіх церков Християнства."
  pol_royal_column_desc: "Святкування королівської влади, покликане символізувати єдність як сакральної, так і світської влади в особі монарха, колона гордо стоїть у центрі міста як свідчення могутності правлячої династії."
  pol_altarpiece_desc: "Вівтарний образ Базиліки Святої Марії, створений талановитим Файтом Штоссом, є одним з наших найбільших скарбів і є найбільшим триптихом свого часу. Це справжній символ нашої побожності та нашого впливу."
  new_chemical_light_desc: "Всеосяжна книга з алхімії, вона містить пояснення, що повітря не є єдиною речовиною, а що воно містить у собі газ, який є «їжею життя», речовиною, необхідною для кожної живої істоти."
  revolution_spheres_desc: "Основний захист геліоцентричної моделі, на противагу встановленому птолемеївському геоцентризму, він намагається пояснити всі рухи планет і Землі, узгоджуючи всі спостереження, які не можуть бути належним чином пояснені в геоцентричній системі."
  pol_threnodies_desc: "#italic Тренодії#!, або #italic Плачі#!, — це збірка з дев'ятнадцяти елегій, які різко контрастують з іншими творами автора. Оскільки тренодії присвячені померлому родичу, твір розкриває скорботи та кризу члена сім'ї, що горює."
  pol_annals_of_poland_desc: "#italic $pol_annals_of_poland$#! — це хроніка, що детально описує історію Королівства Польського від його легендарних заснувань до сьогодення. Твір розділений на дванадцять томів, що деталізують різні розділи польської історії."
  pol_brief_discussion_desc: "#italic $pol_brief_discussion$#! — це діалог, що коментує різні соціальні проблеми, які були сучасними автору. Він написаний у дусі антиклерикалізму шляхти."
  the_lusiads_desc: "«Лузіади» — це збірка епічних поем, написаних у гомерівському стилі, що переказують $POR_ADJ$ подорожі, які призвели до великих відкриттів у XV та XVI століттях. Написана під час вигнання Камоенса в Макао, вона пов'язує $POR_ADJ$ народ з лузитанами, народом, що населяв західну Іберійську півострів до римського панування."
  batalha_monastery_desc: "Монастир будувався протягом 131 року під керівництвом 15 архітекторів, поєднуючи кілька художніх стилів, і вважається одним з найкрасивіших і найважливіших монастирів у $POR$."
  TEU_swords_of_grunwald_desc: "Два #italic $TEU_swords_of_grunwald$#! були вручені польському королю перед Грюнвальдською битвою як форма провокації. Мечі були прийняті, і після перемоги в битві вони стали частиною королівських регалій."
  zafarnama_desc: "Означаючи #italic Книгу Перемог#!, це хроніка і водночас хвала життю та діянням [GetCharacter('chg_timur_lame_borjigin').GetName]. У ній висвітлюються всі його досягнення як у військовому, так і в лідерському аспектах, і вона дуже впливова у поширенні його слави та знань про його постать."
  telugu_ramayana_desc: "Переклад [ShowLanguageName('telugu_language')] [ShowLanguageName('sanskrit_language')] епосу $ramayana$, використовуючи просту мову та прості вирази."
  subhadra_kalyanam_desc: "Збірка віршів, що обертаються навколо шлюбу Арджуни та Субхадри, двох персонажів епосу $mahabarata$, вона адаптує класичний [ShowLanguageName('sanskrit_language')] епос до рідної [ShowCultureName('telugu')] культури та цінностей."
  nyayamruta_desc: "Обговорюючи реальність світу, він стверджує, що реальність є ілюзорною конструкцією, оскільки вона є результатом взаємодії між Маєю та Брахманом. Це, звичайно, не є позицією, прийнятою всіма, що викликає багато суперечок з тими, хто їй протистоїть."
  madhura_vijayam_desc: "Ця поема детально описує падіння Мадураю та вторгнення до Південної Індії. Хоча це поема, багато істориків вважають її важливою для збереження історії раннього Віджаянагару завдяки деталям, які вона містить про військові сили Віджаянагару."
  hypatian_codex_desc: "Збірка різних руських літописів, вона складається з #italic Повісті временних літ#!, #italic Київського літопису#! та #italic Галицьцько-Волинського літопису#!. Вона містить велику кількість інформації про історію Київської Русі."
  national_epic: "Легенда про $TARGET$"
  national_epic_desc: "Великий епос про історію та діяння великого правителя, він є джерелом гордості та престижу для будь-якої нації."
  art_name_a_critique_of_the_state_desc: "Гостра критика уряду та політики країни, вона має на меті розпалити гнів народу проти правлячих еліт."
  art_name_a_praise_of_freedom_desc: "Прославляючи свободи, якими користуються люди в нашій країні, вона служить не лише похвалою нашій політиці, але й заохоченням для людей шукати таку свободу."
  art_key_holy_leader_portrait_desc: "Зображення правителя як святого лідера та спасителя, це, безсумнівно, розлютить найбільш консервативних членів віри."
  holy_crown_of_hungary_crooked_desc: "$holy_crown_of_hungary_desc$ Однак, тепер вона зазнала деяких пошкоджень, і частина її минулої слави зникла."
  bayeux_tapestry_key_desc: "Зображуючи події $norman$ завоювання $ENG$, це вишивка довжиною 70 метрів і яскравий приклад світського романського мистецтва."
  two_icons_of_archangel_michael_desc: "Вивезені з [ShowLocationName('constantinople')] під час Четвертого хрестового походу, дві ікони тепер прикрашають зали собору в [ShowLocationName('venice')]"
  stone_of_scone_desc: "Скунський камінь, також відомий як Камінь Долі, є стародавнім символом шотландської монархії. Традиційно використовувався в церемоніях коронації шотландських монархів, він зберігався в абатстві Скун до 1296 року, коли Едуард I Англійський захопив його після своєї перемоги в Першій війні за незалежність Шотландії. Едуард наказав помістити камінь під Коронаційне крісло у Вестмінстерському абатстві, де він став частиною англійської коронаційної традиції."
  llywelyns_coronet_desc: "Корона Ллівеліна, відома як #italic Talaith Llywelyn#! валлійською, є символом князівського суверенітету в Уельсі. Останній корінний принц Уельсу, Ллівелін ап Гріфід довірив корону ченцям абатства Кімер для збереження, перш ніж він був розгромлений Едуардом I Англійським. Король захопив корону і привіз її до Лондона, де вона була представлена у Вестмінстерському абатстві як символ підкорення Уельсу."
  cross_of_neith_desc: "Хрест Нейта — це шанована реліквія, що містить фрагмент Істинного Хреста Ісуса Христа. Валлійський король Гівел Добрий привіз хрест з Риму до Уельсу, після чого він передавався від принца до принца до часів Ллівеліна ап Гріфіда. Едуард I Англійський розгромив Ллівеліна в 1283 році, і, захопивши хрест, він провів його парадом через Лондон як символ свого панування над Уельсом."
  st_augustine_gospels_desc: "Євангелія святого Августина — це частково завершений ілюмінований рукопис шостого століття, який був привезений до Британії в рамках Папської місії для навернення язичницьких англосаксів. Через це він вважається священним англійськими християнами."
  st_louis_toulouse_crowning_robert_anjou_desc: "Цей вівтарний образ XIV століття зображує історичний момент, коли святий Людовик Тулузький відмовився від своїх претензій на $NAP_ADJ$ престол на користь свого молодшого брата, [GetCharacter('nap_robert_i_anjou').GetName], щоб стати францисканським єпископом."
  chiesa_san_gottardo_in_corte_tower_desc: "Вежа Сан-Готтардо-ін-Корте у [ShowLocationName('milano')] була побудована в 1336 році за правління [GetCharacter('mlo_azzone_i_visconti').GetName], першого правителя Мілана з династії [ShowDynastyName('visconti_dynasty')]. Вежа містить один з найдавніших громадських годинників у регіоні, а її будівництво було частиною ширших зусиль Вісконті зі зміцнення інфраструктури $MLO$."
  torrazzo_di_cremona_desc: "$torrazzo_di_cremona$, завершений у 1309 році, є однією з найвищих цегляних дзвіниць у Європі та стоїть поруч із Кремонським собором. Це цивільна та релігійна пам'ятка. Астрономічний годинник вежі, встановлений у XIV столітті, є одним з найбільших у своєму роді."
  lalibela_cross_desc: "The $lalibela_cross$, виготовлений за правління династії Загве (XII-XIII століття), є шедевром ефіопського металообробного мистецтва. Хрест відігравав центральну роль у літургійних практиках Ефіопської Православної Церкви."
  kebra_nagast_desc: "The $kebra_nagast$, написаний у XIV столітті, є основоположним $ETH_ADJ$ текстом, що розповідає про походження династії [ShowDynastyName('solomonid_dynasty')]. Заявляючи про походження від царя Соломона та цариці Савської, він надає божественне обґрунтування для $ETH_ADJ$ правителів і зміцнює її християнську ідентичність."
  lalibela_church_st_george_desc: "Церква Святого Георгія, висічена за правління короля Лалібели у XII столітті, являє собою вершину ефіопської монолітної архітектури. Побудована у відповідь на бажання створити #italic Новий Єрусалим#!, вона відображає релігійні прагнення епохи та виразну християнську спадщину $ETH$."
  king_ezana_stele_desc: "The $king_ezana_stele$, встановлена у IV столітті, є монументальним кам'яним маркером з Аксумської імперії. Вона відображає багатство та могутність королівства в період його розквіту. Навернення Езани до християнства, також відзначене написами, зробило Аксум однією з найдавніших християнських держав в історії."
  lanterna_di_genoa_desc: "The $lanterna_di_genoa$, спочатку побудована у XII столітті, служила вирішальним маяком для гавані [ShowLocationName('genoa')]. Як один з найстаріших і найвищих маяків у світі, її світло направляло кораблі, що входили до життєво важливого порту міста. Лантерна також служила укріпленням і відігравала роль у захисті міста від морських загроз."
  palazzo_san_giorgio_desc: "Побудований у 1260 році подестою $GEN$ Гульєльмо Бокканегрою, Палац Сан-Джорджо розміщував як адміністративні офіси, так і пізніше Банк Святого Георгія. Його роль в управлінні фінансами та боргом $GEN$ була вирішальною для піднесення міста як провідної середньовічної торгової держави."
  annales_ianuenses_desc: "The $annales_ianuenses$ є $GEN_ADJ$ [ShowWorkOfArtTypeName('chronicle')], написаною між XI та XIV століттями, що документує піднесення міста до значущості. Вона фіксує битви, договори та торговельні угоди республіки."
  yaroslavs_court_desc: "$yaroslavs_court$, побудований у місті [ShowLocationName('novgorod')] протягом XI століття, служив торговим та адміністративним центром. Названий на честь [GetCharacter('kie_yaroslav_the_wise_rurikovich').GetName], він був центром торгівлі вздовж ганзейських торгових шляхів."
  house_of_holy_wisdom_desc: "Собор Святої Софії у [ShowLocationName('novgorod')], побудований у середині XI століття, є однією з найстаріших православних церков у Росії. Замовлений [GetCharacter('kie_yaroslav_the_wise_rurikovich').GetName], він став ключовим релігійним та культурним центром. Його будівництво символізувало поширення християнства в Київській Русі."
  our_lady_of_the_sign_desc: "The $our_lady_of_the_sign$ icon набула популярності у [ShowLocationName('novgorod')] у XII столітті, коли їй приписували захист міста під час облоги. Вона стала символом божественного втручання і була широко шанована в Православній Русі."
  annunciation_ustyug_desc: "The $annunciation_ustyug$, написана у XII столітті, є одним з найдавніших збережених прикладів російської православної іконографії. Вона відображає візантійський вплив на мистецтво Київської Русі та поширення християнських вчень."
  saint_george_in_yuriev_desc: "Юр'їв монастир, заснований у 1030 році [GetCharacter('kie_yaroslav_the_wise_rurikovich').GetName], є одним з найстаріших монастирів у Росії. Він відіграв ключову роль у християнізації Новгородського регіону і служив символом зростання Православ'я на півночі Русі."
  palma_cathedral_desc: "Будівництво $palma_cathedral$ розпочалося у 1229 році за короля [GetCharacter('ara_jacme_i_arago').GetName], після завоювання Майорки під час Реконкісти. Побудований на місці колишньої мечеті, його готичний дизайн відображає вплив архітектурних тенденцій континентальної Європи. Роботи над собором тривали століттями."
  ripoll_abbey_desc: "Заснований у 888 році [GetCharacter('cat_guifre_i_barcelona').GetName], він став культурним і духовним центром для [ShowCultureName('catalan')] культури та правителів, і продовжує залишатися важливим місцем для $CAT_ADJ$ ідентичності."
  montserrat_abbey_desc: "Розташований на горі Монтсеррат, він зберігає [ShowWorkOfArtName('moreneta_key')] і є також дуже важливим центром духовності та паломництва. Крім того, він також є символом [ShowCultureName('catalan')] культурної ідентичності."
  poblet_abbey_desc: "Вражаючий монастирський комплекс, збудований у XII столітті, він слугував пантеоном [ShowCultureName('catalan')] королів з часів [GetCharacter('ara_jacme_i_arago').GetName]."
  basilica_pilar_desc: "Присвячена Діві Марії, Базиліка дель Пілар, як вважається, була заснована завдяки явленню Діви святому апостолу Якову, який, як вважається, проповідував $christian$ на Піренейському півострові. Церква розширювалася з часом, а романська церква почала будуватися після завоювання [ShowLocationName('zaragoza')] у XII столітті."
  moreneta_key_desc: "Представляючи Діву Марію, вона зберігається в [ShowWorkOfArtName('montserrat_abbey')]. За легендою, статую знайшли пастухи в печері на горі Монтсеррат. Однак, коли вони спробували перевезти її до міста, віз не рушив. Вони витлумачили це як знак того, що Діва хотіла залишитися в горі, і це дало початок нинішньому абатству."
  girgam_desc: "Королівська хроніка $KBO$, вона містить список її королів та дати й тривалість їхніх правлінь."
  djenne_mosque_desc: "Присутня як мечеть з XIII століття, глинобитна будівля сприяла поширенню та престижу [ShowReligionGroupName('muslim')] $MAL$ протягом поколінь."
  sankore_madrasa_desc: "Один з найважливіших [ShowReligionGroupAdjective('muslim')] центрів навчання в $MAL$, він продовжує давню традицію $muslim_ADJ$ викладання в $guinea_region$"
  djinguereber_mosque_desc: "Один з головних центрів [ShowReligionGroupAdjective('muslim')] навчання в $MAL$, його заснування приписується [GetCharacter('mal_musa_keita').GetName]."
  sachsenspiegel_desc: "Збірка традиційного звичаєвого права та постанов з усього $hre$, це одна з найважливіших збірок законів в Імперії, а також перша, написана [ShowLanguageName('german_language')], а не [ShowLanguageName('latin_language')]."
  terrae_prussiae_desc: "Хроніка, написана [ShowLanguageName('latin_language')] про $TEU_ADJ$ Орден у [ShowAreaName('prussia_area')], вона детально описує їхнє прибуття в цю область та їхні війни проти язичницьких племен там."
  codex_marianus_desc: "Написана [ShowLanguageName('church_slavonic_language')], ця Євангеліє є однією з основ $slavic_group$ $orthodox_ADJ$ текстів."
  white_angel_desc: "Вважається одним з найкращих творів $serbian$ мистецтва, він зображує події після розп'яття Ісуса, де Ангел Господній показує мироносицям місце, де воскрес Христос."
  zica_studenica_monasteries_desc: "Пара монастирів, збудованих у XII та XIII століттях, вони є одними з найбільших та найважливіших $serbian$ монастирів."
  gesta_hungarorum_desc: "Текст, що оспівує діяння [ShowCultureName('hungarian')] народу, він розповідає про їхнє походження, ототожнюючи їх зі скіфами або гунами, і зосереджується на їхньому завоюванні Карпатського басейну."
  basilica_of_the_assumption_virgin_mary_desc: "Збудований першим королем $HUN$, він слугував місцем коронації $HUN_ADJ$ монархів з тих пір. Хоча й не єпископський, він, тим не менш, є однією з головних церков для правителів країни."
  holy_crown_of_hungary_desc: "Використовується як корона для королів $HUN$ з XII століття, вона також є символом їхньої легітимності. Будучи подарованою $BYZ_ADJ$, корона має виражений $BYZ_ADJ$ стиль, хоча [ShowReligionAdjective('catholic')] схильності країни змусили вважати, що вона походить від Папи."
  kusanagi_no_tsurugi_desc: "Легендарний меч, який, за переказами, Сусаноо знайшов у хвості Ямата-но-Орочі після його вбивства, пізніше був подарований богині Аматерасу. Вона потім передала його своєму онукові Нінігі-но-Мікото, предку імператорської лінії, коли його відправили на землю, і таким чином меч є символом легітимності, хоробрості та могутності Імператора."
  yata_no_kagami_desc: "Легендарне дзеркало, яке, за переказами, використовувалося для виманювання Богині Сонця Аматерасу з печери, де вона сховалася, воно є частиною імператорських регалій, оскільки було передано Нінігі-но-Мікото, предку імператорської лінії, коли його відправили на землю. Воно символізує мудрість імператорської лінії та їхню придатність до правління."
  yasakani_no_magatama_desc: "Один з трьох скарбів імператорських регалій, він, як кажуть, використовувався разом з [ShowWorkOfArtName('yata_no_kagami')], щоб змусити Богиню Сонця Аматерасу вийти з печери, де вона була схована. Пізніше переданий Нінігі-но-Мікото, предку імператорської лінії, коли його відправили на землю, він символізує доброзичливість імператорської лінії."
  liber_regum_desc: "$liber_regum$ — це середньовічна [ShowWorkOfArtTypeName('chronicle')], що детально описує родовід та історію іберійських королів. Вона поєднує міф та історію, щоб прославити їх та їхнє божественне право на правління."
  collegiate_roncesvalles_desc: "#italic Колегіальна церква Ронсесвальєс#! — це готична будівля, розташована в Піренеях, що обслуговує паломників на Шляху Святого Якова. Комплекс також слугує госпісом."
  la_oliva_abbey_desc: "$la_oliva_abbey$ — це цистерціанський монастир, найстаріший на Піренейському півострові, чия сувора архітектура відображає акцент ордену на простоті та спогляданні. Він також містить важливу бібліотеку."
  tripitaka_koreana_desc: "$tripitaka_koreana$ — це збірка буддійських писань, викарбуваних на дерев'яних блоках. Вона є прикладом як духовної відданості, так і майстерності у збереженні священних текстів, і це найстаріша неушкоджена версія буддійського канону, написана ханджа."
  amitabha_triad_desc: "Символізуючи надію на відродження в #italic Чистій Землі#! для відданих практиків, $amitabha_triad$ зображує Будду #italic Нескінченного Світла#!, оточеного #italic $bodhisattva$#! співчуття та мудрості."
  ksitigarbha_desc: "$ksitigarbha$ — це співчутливий #italic $bodhisattva$#!, зображений як провідник душ через потойбічне життя. Шанований за свою обітницю полегшити страждання, він вважається маяком надії в буддійській традиції."
  watermoon_avalokiteshvara_desc: "Сидячи в розслабленій позі, $watermoon_avalokiteshvara$ — це безтурботне зображення #italic бодхісаттви#! співчуття."
  visualisation_sutra_desc: "$visualisation_sutra$ ілюструє медитативні практики для візуалізації #italic Чистої Землі#!, а її описи скеровують відданих до духовної ясності та просвітлення."
  sutra_descent_maitreya_desc: "Ця #italic $sutra$#! описує майбутнє сходження #italic Майтреї#!, Будди майбутнього. Вона пропонує бачення надії та оновлення для світу, що очікує духовного керівництва."
  hwaom_pure_land_desc: "$hwaom_pure_land$ представляє містичне царство взаємопов'язаної гармонії, натхненне #italic Аватамсака-сутрою#!. Ця [ShowWorkOfArtTypeName('painting')] зображує п'ятьох головних Будд і п'ятдесят два #italic $bodhisattva$#!"
  devadatta_desc: "$devadatta$ — постать у буддійських текстах, відома тим, що кидала виклик Будді та втілювала людські вади. Його історія підкреслює випробування та прощення, які є центральними для буддійських вчень."
  pohyonsa_desc: "Храм $pohyonsa$, розташований у горах Мьохян у $KOR$, є історичним центром буддійського поклоніння та слугував осередком культурного обміну. Комплекс є домом для кількох історичних реліквій, включаючи відомий бронзовий дзвін та витончено розписані дерев'яні споруди, що демонструють традиційну корейську майстерність."
  saint_mark_horses_desc: "$saint_mark_horses$, також відомі як #italic Тріумфальна квадрига#!, — це набір із чотирьох стародавніх бронзових статуй, що символізують тріумф і престиж. Привезені з [ShowLocationName('constantinople')] після пограбування міста під час Четвертого хрестового походу, вони тепер прикрашають [ShowLocationName('venice')] як нагадування про її морську могутність."
  saint_mark_basilica_desc: "Базиліка $saint_mark_basilica$, розташована на площі Святого Марка у [ShowLocationName('venice')], є релігійною спорудою візантійського та готичного стилів, що зберігає мощі Святого Марка Євангеліста."
  bucentaur_desc: "$bucentaur$ — це пишно оздоблена церемоніальна баржа $VEN_ADJ$ дожів, що символізує суверенітет $VEN$ над морем. Її розкішний дизайн демонструє морську могутність міста та відіграє центральну роль у щорічному ритуалі $VEN$ #italic Одруження з морем#!."
  palais_des_papes_desc: "$palais_des_papes$ у [ShowLocationName('avignon')] був побудований у 14 столітті, коли папство тимчасово переїхало з Риму до Франції. Цей масивний готичний палац слугував резиденцією для дев'яти пап під час Авіньйонського полону. Це не лише релігійний центр, а й символ папської влади та могутності в Європі."
  convent_christ_desc: "$convent_christ$ у [ShowLocationName('tomar')] — це спочатку тамплієрська фортеця, перетворена на монастир, що поєднує готичний, мануелінський та ренесансний стилі. Це один з найважливіших прикладів $POR_ADJ$ архітектури."
  canzoniere: "Канцоньєре"
  canzoniere_desc: "$canzoniere$ — це збірка ліричних віршів Франческо Петрарки, переважно сонетів, присвячених його музі, Лаурі. Поєднуючи теми кохання, краси та людських емоцій з класичними впливами, вона стала одним із найвпливовіших творів ренесансної поезії."
  alcobaca_monastery_desc: "$alcobaca_monastery$ — це цистерціанський комплекс у $POR$, відомий своєю суворою красою та королівськими гробницями. Це перший приклад готичної архітектури в королівстві та його найважливіший і найвпливовіший монастир."
  hagia_irene_desc: "$hagia_irene$ — це рання $BYZ_ADJ$ церква, розташована в [ShowLocationName('constantinople')], що відзначається вражаючою простотою, на відміну від сусідньої $hagia_sophia$. Відома своїм масивним куполом і неоздобленим інтер'єром, реконструйована в 548 році після спалення під час повстання Ніка 532 року, вона демонструє ранньохристиянську архітектурну інноваційність."
  hagia_sophia_desc: "$hagia_sophia$ була спочатку побудована близько 346 року за правління імператора Констанція II, спалена під час повстання Ніка в 532 році, повністю реконструйована та освячена в 537 році імператором Юстиніаном, ставши найбільшим собором у християнському світі. Спроектована Антемієм з Тралл і Ісидором з Мілета, вона відома своїм величезним куполом, інноваційною інженерією та детальними мозаїками, що відображають велич православного християнства."
  paris_psalter_desc: "$paris_psalter$, створений у 10 столітті під час #italic Македонського Відродження#!, — це розкішний $BYZ_ADJ$ рукопис, що містить 14 повносторінкових ілюстрацій поряд із Псалмами. Його класичний стиль відображає відродження греко-римських художніх традицій у $BYZ_ADJ$ мистецтві."
  syntagma_canonum_desc: "$syntagma_canonum$ — це $BYZ_ADJ$ збірка церковних законів, що регулюють церковне управління та практики. Вона відображає правову структуру Церкви та її інтеграцію з $BYZ_ADJ$ суспільством."
  ecclesiastica_historia_desc: "$ecclesiastica_historia$ Євсевія записує ранню історію християнства. Вона описує зростання Церкви, життя мучеників та ключові події її розвитку. Ця праця є основним джерелом для розуміння ранньохристиянської епохи."
  historia_polonica_desc: "Кроніка Польська (лат. #italic Historia Polonica#!) була написана Вінцентієм Кадлубеком на замовлення князя Казимира II Справедливого на початку 13 століття, будучи однією з найраніших історичних хронік Польщі. Поєднуючи історичні факти та легенди, вона простежує польську історію від легендарних витоків до часів Кадлубека."
  gesta_principum_polonorum_desc: "Кроніка Галла Аноніма (лат. #italic Cronica et gesta ducum sive principum Polonorum#!) є найстарішою збереженою письмовою хронікою Польщі, написаною невідомим автором, якого просто називають Галлом Анонімом. Вона описує історію Польщі від легендарного засновника династії П'ястів до 1114 року, коли вона раптово обривається. Таким чином, це одне з найважливіших джерел історичних знань про ранню історію Польщі."
  bogurodzica_desc: "Богородиця — найстаріший відомий польський гімн, що датується 13 століттям. Присвячений Діві Марії, він слугує як релігійним співом, так і бойовим гімном для польських лицарів, його лірична та музична форма відображає стародавні літургійні традиції. Протягом століть він став символом польської ідентичності та духовності."
  szczerbiec_desc: "Щербець — це церемоніальний меч, вперше використаний у польській коронації королем Владиславом I у 1320 році. За легендою, Болеслав I Хоробрий вдарив ним по Золотих воротах Києва, створивши вм'ятину, яка дала мечу його назву, «Щербець» (що означає «щербатий»). Меч символізує королівську владу і є невід'ємною частиною польських регалій."
  gesta_danorum_desc: "Написана Саксоном Граматиком, $gesta_danorum$ хронікує легендарних та історичних королів $DAN$. Вона вважається однією з найзначніших середньовічних праць зі скандинавської історії та міфології."
  roskilde_cathedral_desc: "$roskilde_cathedral$, побудований з червоної цегли, є прикладом ранньої готичної архітектури в Скандинавії. Він слугує місцем поховання $DAN_ADJ$ королів та королев, втілюючи королівську велич."
  tournai_cathedral_desc: "#italic Собор Богоматері#! є кафедрою єпархії [ShowLocationName('tournai')] і поєднує в своєму дизайні як романський, так і готичний стилі."
  gravensteen_castle_desc: "$gravensteen_castle$, збудований у XII столітті, слугує твердинею графів $FLA$. #italic Скеля графів#! слугує нагадуванням про владу правителів над могутнім міщанським класом міста [ShowLocationName('ghent')]"
  belfry_bruges_desc: "$belfry_bruges$ — це дзвіниця на центральній площі [ShowLocationName('bruges')], яка була центральною у житті її громадян з моменту її будівництва, використовуючи свої дзвони для їх інформування."
  portico_de_la_gloria_desc: "$portico_de_la_gloria$ — це романський портик у соборі [ShowLocationName('santiago_compostela')]. Його скульптури зображують біблійні сцени та наповнені духовною символікою."
  cantigas_santa_maria_desc: "$cantigas_santa_maria$ — це збірка пісень XIII століття, що прославляють Діву Марію, написана галісійсько-португальською мовою. Її ілюміновані рукописи вважаються найбільшою колекцією монофонічних пісень Середньовіччя."
  general_estoria_desc: "$general_estoria$, замовлена [GetCharacter('cas_alfonso_x_burgundy').GetName], мала на меті скласти універсальну історію світу. Вона поєднує біблійні, класичні та середньовічні джерела в єдину розповідь."
  cantar_mio_cid_desc: "Найстаріша епічна поема $castilian_dialect$, $cantar_mio_cid$ оповідає про пригоди Родріго Діаса де Вівара, відомого як #italic Сід#!, під час боротьби між іберійськими християнськими королівствами та князівствами Тайфа Аль-Андалусу."
  estoria_de_espana_desc: "$estoria_de_espana$ вважається першою розширеною історичною [ShowWorkOfArtTypeName('chronicle')] Іспанії. Книга охоплює історію нації від біблійних часів до правління [GetCharacter('cas_fernando_iii_burgundy').GetName] і поділена на чотири частини."
  florentine_codex: "Загальна історія речей Нової Іспанії"
  florentine_codex_desc: "$florentine_codex$ — це всебічний етнографічний опис культури, релігії, суспільства та повсякденного життя корінних народів Мезоамерики."
  mosque_cordoba_desc: "#italic Собор Успіння Пресвятої Богородиці#! у [ShowLocationName('cordoba')] більш відомий як $mosque_cordoba$ і є чудовим прикладом різних етапів, які пройшов Іберійський півострів. Спочатку побудований як вестготська базиліка, він був перетворений на мечеть після завоювання регіону Омейядами, а потім знову став собором, коли місто знову потрапило до рук християн."
  giralda_desc: "Збудований під час правління Альмохадів, цей мінарет, перетворений на дзвіницю, стоїть у [ShowLocationName('sevilla')] як частина собору міста (раніше Великої мечеті) і є найвитонченішим прикладом мавританської архітектури на Іберійському півострові."
  codex_calixtinus_desc: "Створений як книга порад для паломників, що йдуть Шляхом Святого Якова, $codex_calixtinus$ є ілюстрованою енциклопедією, що охоплює теми від народів, які населяють маршрут, до мистецтва, яке можна знайти на шляху, або кількох релігійних питань."
  tablas_alfonsies_desc: "#italic $tablas_alfonsies$#! — це математичні таблиці великого значення для обчислення положень астрономічних тіл, таких як сонце, місяць та інші світи, відносно положень нерухомих зірок."
  libros_saber_astrologia_desc: "Серія книг, що описують небесні тіла та астрономічні інструменти свого часу. Як збірка трактатів, ці книги відіграли важливу роль у середньовічній астрономії та астрології, оскільки їх використовували для складання гороскопів."
  libro_de_los_juegos_desc: "[ShowCultureName('castilian')] трактат про шахи, настільні та кісткові ігри. #italic $libro_de_los_juegos$#! документує та узагальнює [ShowLanguageName('arabic_language')] інформацію про ці настільні ігри та вплітає в них [ShowLanguageName('latin_language')] знання."
  marienkapelle_desc: "$marienkapelle$ — це романська церква, збудована в [ShowLocationName('munich')], яка слугує місцем поховання династії [ShowDynastyName('wittelsbach_dynasty')] з того часу, як [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName] вирішив так."
  sahib_ata_kulliyesi_desc: "$sahib_ata_kulliyesi$ — це комплекс, збудований у [ShowLocationName('konya')] для зберігання останків Сахіпа Ати Фахреттіна Алі та його родини, але також включає хамам та мечеть."
  gokmedrese_desc: "Ця двоповерхова медресе була головним освітнім центром у [ShowLocationName('sivas')] з моменту її замовлення у XIII столітті Сахіпом Атою Фахреттіном Алі, візиром сельджуцького султана, і отримала свою назву від небесно-блакитної плитки, використаної в ній."
  ulu_beden_desc: "Вежа $ulu_beden$ стоїть у [ShowLocationName('diyarbekir')] і є близнюком вежі $yedi_kardes$."
  yedi_kardes_desc: "Виготовлена з різаного базальту, ця вежа, прикрашена ісламською та [ShowDynastyName('artuqids_dynasty')] символікою та природними рельєфами, була створена на честь Меліка Саліха Махмута."
  maqamat_al_hariri_desc: "$maqamat_al_hariri$ оповідає про пригоди негідника Абу Зайда з Саруджа, який у п'ятдесяти оповіданнях використовує своє майстерне володіння [ShowLanguageName('arabic_language')] мовою, щоб отримувати винагороди, обманюючи оточуючих."
  great_iwan_desc: "Названий «Залом правосуддя», $great_iwan$ — це вражаючий купольний тронний зал, де правителі $mamluk$ султанату здійснюють правосуддя. Зал прикрашений червоними гранітними колонами фараонівської епохи і відкритий назовні з трьох із чотирьох сторін."
  qalawun_complex_desc: "Видатний приклад ісламської архітектури в місті [ShowLocationName('cairo')], $qalawun_complex$ — це надзвичайно важливий релігійний комплекс, що включає медресе, мавзолей і навіть лікарню."
  al_nasir_mosque_desc: "Збудована [GetCharacter('mam_an_nasir_bahri').GetName] як королівська мечеть у цитаделі [ShowLocationName('cairo')], $al_nasir_mosque$ є унікальною завдяки двом мінаретам з цибулинними секціями, ймовірно, збудованими у $farsi_culture$ стилі."
  al_karimi_mosque_desc: "$al_karimi_mosque$, будівля XIV століття, гордо стоїть у центрі [ShowLocationName('damascus')] і вважається одним з найкращих прикладів $mamluk$ мистецтва в регіоні."
  rawd_al_qirtas_desc: "Ця [ShowWorkOfArtTypeName('chronicle')] описує розвиток міста [ShowLocationName('fez')], а також правителів [ShowAreaName('morocco_area')] від Ідрісидів до династії [ShowDynastyName('marinid_dynasty')]."
  ait_ben_haddou_desc: "#italic ксар#! або #italic ігрем#! («укріплене село» арабською та амазизькою відповідно) $ait_ben_haddou$ стоїть на шляху важливого торговельного маршруту, що об'єднує землі через Сахару та серце [ShowAreaName('morocco_area')]."
  kutubiyya_mosque_desc: "Двічі збудована мечеть у [ShowLocationName('marrakesh')], $kutubiyya_mosque$, є яскравим прикладом архітектури Альморавідів та важливою пам'яткою в центрі міста. Назва цієї мечеті походить від книготорговців, які торгували навколо будівлі."
  song_of_armouris_desc: "Оповідь про одного з найвеличніших акритів. #italic $song_of_armouris$#! є найвідомішою з цих візантійських лицарських історій, що розповідає про Армуріса Армуропулоса, чоловіка геркулесової сили, який убив тисячі сарацинів, щоб помститися за свого батька."
  gediminas_cap_desc: "Ця чудова корона була освячена як найважливіша [ShowWorkOfArtTypeName('regalia')] [GetCountry('LIT').GetAdjective] царства засновником династії [ShowDynastyName('gediminid_dynasty')] [GetCharacter('lit_gediminas_gediminids').GetName]"
  chronica_jutensis_desc: "#italic Chronica Jutensis#! — це данська хроніка, яка розповідає історію Данії, особливо зосереджуючись на Ютландії."
  christianstad_trinity_church_desc: "Церква Святої Трійці в Крістіанстаді — це собор у щойно збудованому місті Крістіанстад, відомий своєю грандіозною архітектурою Відродження, спроєктованою фламандсько-данським архітектором Лоренцом ван Стенвінкелем."
  christiansborg_palace_desc: "Палац Крістіансборг, розташований на острівці Слотсхольмен у центрі Копенгагена, є значною спорудою, збудованою на місці, де з XII століття розташовувалися різні замки. Це один із найбільших палаців у країні, що слугує центром влади королівства."
  elmelunde_frescoes_desc: "Фрески Ельмелунде — це середньовічні настінні розписи, знайдені в церкві Ельмелунде на данському острові Мьон, що зображують біблійні сцени з яскравими кольорами та деталями."
  dai_viet_su_ky_desc: "$dai_viet_su_ky$ є офіційною історіографією династії $Tran$. Вона містить розповіді про історію $DAI$ і дає уявлення про розвиток країни за останні кілька століть."
  dai_an_nam_chi_luoc_desc: "$dai_an_nam_chi_luoc$ переказує історію та багато інших аспектів $DAI$ від її заснування аж до режиму династії $Tran$."
  kilwa_chronicle: "Хроніка $ZAN$"
  kilwa_chronicle_desc: "$kilwa_chronicle$ — це історичний документ, що оповідає історію $ZAN_ADJ$ народу. Написана [ShowLanguageName('arabic_language')], хроніка поєднує місцеві усні традиції з історичними розповідями, пропонуючи уявлення про політичну та культурну історію всього [ShowRegionName('swahili_coast_region')]."
  preah_khan_reach: "Преах Кхан Річ"
  preah_khan_reach_desc: "Меч Перемоги — це виточене сталеве лезо, що лежить у піхвах із золота та коштовностей. Разом із $preah_lompeng_chey$ він надає легітимності правителю [ShowCultureName('khmer_culture')] народу."
  preah_lompeng_chey: "Преах Ломпенг Чей"
  preah_lompeng_chey_desc: "Спис Перемоги вшановує сходження [GetCharacter('khm_trasak_paem').GetName] і слугує разом із $preah_khan_reach$ як королівські регалії [ShowCultureName('khmer_culture')] народу."
  emerald_buddha: "Смарагдовий Будда"
  emerald_buddha_desc: "Вирізьблений з яшми, $emerald_buddha$ шанується за своє духовне значення в [ShowReligionGroupAdjective('buddhist')] країнах."
  imperial_crown_hre: "Імперська Корона"
  imperial_crown_hre_desc: "Виготовлена з 8 золотих пластин, прикрашених різноманітним дорогоцінним камінням, $imperial_crown_hre$ використовувалася як корона для коронації з часів Оттона I."
  imperial_orb_hre: "Імперська Держава"
  imperial_orb_hre_desc: "$imperial_orb_hre$ Священної Римської імперії демонструє божественний мандат імператорів як найвищих монархів Західної Європи."
  saint_stephans_purse: "Гаманець Святого Стефана"
  saint_stephans_purse_desc: "Цей гаманець, що містить землю святої землі, просочену кров'ю Святого Стефана, є невід'ємною частиною імперської коронації."
  coronation_gospel_hre: "Коронаційне Євангеліє"
  coronation_gospel_hre_desc: "$coronation_gospel_hre$ містить повне Євангеліє, написане золотим і срібним чорнилом. Текст ілюстрований зображеннями євангелістів. Так само, як Карл Великий, під час коронаційної церемонії імператор покладе руку на $coronation_gospel_hre$ і принесе свою присягу."
  sergius_sive_capitis_caput: "Сергій, або Голова Голови"
  sergius_sive_capitis_caput_desc: "Написана як глузування з культу реліквій, ця п'єса є гострою критикою католицизму та його екстремальніших тенденцій."
  maj_pararaton_woa: "Параратон"
  maj_pararaton_woa_desc: "$maj_pararaton_woa$ містить у великих деталях багато складних аспектів політичної та культурної динаміки всього регіону $indonesia_region$."
  maj_nagarakretagama_woa: "Нагаракертагама"
  maj_nagarakretagama_woa_desc: "Епічна поема, що детально описує $MAJ_ADJ$ володіння в середині XIV століття, оспівуючи величезні розміри держави та культурні досягнення її золотого віку."
  maj_carita_parahyangan_woa: "Каріта Параг'янган"
  maj_carita_parahyangan_woa_desc: "Складна хроніка, що зберігає розповідь про $SUN_ADJ$ Королівство та його найвидатніші королівські династії за останні вісім століть."
  damarwulan_hero: "Дамарвулан"
  damarwulan: "Історія $damarwulan_hero$"
  damarwulan_desc: "Історія $damarwulan_hero$ розігрується в багатьох місцевих лялькових виставах, відомих як #italic ваянг клітік#!. Герой представлений як рятівник $MAJ$ Королівства, який спочатку закохується в дочку прем'єр-міністра, а потім потрапляє до в'язниці за це юне кохання. Потім оголошується війна, і $damarwulan_hero$ отримує шанс проявити себе. Герой потім здобуває довіру наложниць ворожого короля і успішно обезголовлює ворожого монарха."
  statenbijbel: "Штатенбібель"
  statenbijbel_desc: "Штатенбібель — #italic Державна Біблія#!, замовлена Синодом [ShowLocationName('dordrecht')], є першим [ShowDialectName('dutch_dialect')] перекладом Біблії безпосередньо з оригінальних [ShowLanguageName('hebrew_language')], [ShowLanguageName('aramaic_language')] та [ShowLanguageName('greek_language')] мов, профінансованим урядом."
  tarikh_al_sudan: "Таріх ас-Судан"
  tarikh_al_sudan_desc: "Написаний для збереження історії [ShowRegionName('guinea_region')], $tarikh_al_sudan$ містить деталі про імперію Малі, народ [ShowCultureName('tuareg')], а також подвиги Сонгаїв."
  timbuktu_palace: "Палац Тімбукту"
  timbuktu_palace_desc: "Побудований для збереження процвітання [ShowLocationName('timbuktu')], $timbuktu_palace$ є одним з найбільших досягнень для цього місця."
  lateran_palace: "Латеранський палац"
  lateran_palace_desc: "Спочатку Латеранський палац століттями служив резиденцією Пап, але був знищений пожежею. Після відбудови $lateran_palace$ став важливою духовною пам'яткою, що символізує владу Папства."
  simplicius_simplicissimus: "Сімпліціссімус Теуш"
  simplicius_simplicissimus_desc: "Розповідь про життя дивного волоцюги на ім'я Мельхіор Штернфельс фон Фухсхайн, де і як він прийшов у цей світ, що він бачив, дізнався і пережив, і чому він добровільно відійшов від нього."
  el_criticon: "Ель Крітікон"
  el_criticon_desc: "$el_criticon$ — це алегоричний і філософський роман, що досліджує людський стан через символічну подорож двох персонажів. Він критикує вади суспільства, пропонуючи глибокі роздуми про мораль і прагнення до мудрості."
  cronica_de_aragon: "Crónica de Aragón"
  cronica_de_aragon_desc: "$cronica_de_aragon$ — одна з найдавніших друкованих історій королівства народною мовою, що охоплює арагонську історію від міфічних витоків до сучасної епохи. Вона відображає націоналізм XV століття, прославляючи монархію та формуючи арагонську ідентичність."
  kitab_al_ibar: "Кітаб аль-'Ібар"
  kitab_al_ibar_desc: "$kitab_al_ibar$ — монументальна історична праця Ібн Хальдуна, що описує історію різних цивілізацій та представляє його новаторські теорії про циклічний характер суспільств, соціальну згуртованість, а також піднесення та падіння імперій."
  st_stephens_cathedral: "Собор Святого Стефана"
  st_stephens_cathedral_desc: "$st_stephens_cathedral$ у Відні — це приголомшливий готичний шедевр та одна з найвідоміших релігійних споруд Австрії, що слугує символом історії та культурної спадщини міста."
  tomb_of_the_first_emperor: "Гробниця Першого Імператора"
  tomb_of_the_first_emperor_desc: "Розташована у священних залах $st_stephens_cathedral$, $tomb_of_the_first_emperor$ є величним свідченням нашої імперської спадщини, відображаючи пошану та амбіції правителя, який заклав основу піднесення Австрії до величі."
  frauenstein_madonna: "Фрауенштайнська Мадонна"
  frauenstein_madonna_desc: "$frauenstein_madonna$ Захисного Покрову — це пізньоготичний шедевр, що зображує Діву Марію, яка ховає під своїм розвіяним плащем уклінних постатей, символізуючи божественний захист та людську відданість."
  hofburg: "Віденський Гофбург"
  hofburg_desc: "$hofburg$ починався як середньовічний замок, але протягом століть перетворився на величний імператорський палац, ставши резиденцією влади Габсбургів."
  tabula_hungariae: "Tabula Hungariae"
  tabula_hungariae_desc: "$tabula_hungariae$ — це новаторська карта Угорщини, що містить понад 1300 поселень і є однією з найперших спроб картографічного масштабу та регіональної точності."
  landtafel: "Зал Ландтафель"
  landtafel_desc: "$landtafel$ було перебудовано для зберігання документів та рішень регіональних судів, привілеїв, дворянських землеволодінь та прав."
  kaiserkrone: "Імператорська корона Австрії"
  kaiserkrone_desc: "$kaiserkrone$, або Австрійська імператорська корона, — це розкішна корона, створена для відображення престижу, пишноти та багатства Австрії. Вона також є символом австрійської імперської влади."
  chronicles_of_castile: "Crónicas de los Reyes de Castilla"
  chronicles_of_castile_desc: "$chronicles_of_castile$ — це хроніка, написана для збереження спадщини монархів, які правили країною наприкінці XIV століття."
  capilla_de_los_reyes_nuevos: "Capilla de los Reyes Nuevos"
  capilla_de_los_reyes_nuevos_desc: "$capilla_de_los_reyes_nuevos$ — це династична похоронна каплиця нашої династії, покликана бути продовженням прецеденту, встановленого попередніми династіями, які будували каплиці як представлення своєї божественної влади."
  coplas_por_la_muerte_de_su_padre: "Coplas por la Muerte de su Padre"
  coplas_por_la_muerte_de_su_padre_desc: "$coplas_por_la_muerte_de_su_padre$ — це глибоко рефлексивна елегія, що розмірковує про швидкоплинність життя, прагнення до вічної честі та неминучість смерті."
  laberinto_de_fortuna: "Laberinto de Fortuna"
  laberinto_de_fortuna_desc: "Лабіринт Фортуни — це поема, написана на честь монархії, що перебуває під божественним захистом і керівництвом. Вона заохочує єдність під владою королівського монарха."
  chronicle_of_peru: "Хроніка Перу"
  chronicle_of_peru_desc: "Хроніка Перу — це всеосяжна праця, що містить етнографічну інформацію про корінні культури Анд."
  elegies_of_illustrious_men: "Елегії про видатних мужів Індій"
  elegies_of_illustrious_men_desc: "Елегії про видатних мужів — це довгий епос, що поєднує поезію з історією та описує іспанське завоювання Нового Світу."
  de_la_cosa_map: "Мапа Де ла Коси"
  de_la_cosa_map_desc: "Мапа Де ла Коси — це перша мапа, що зображує нововідкриті землі Америки, а також Екватор і Тропік Рака, що робить її безцінною для морської навігації."
  padron_real: "Падрон Реал"
  padron_real_desc: "Падрон Реал — це офіційна мапа нашого флоту, створена як зразок для всіх майбутніх мап. Кожен корабель, що пливе під нашим прапором, зобов'язаний мати її на борту."
  book_of_women: "Зенаннаме"
  book_of_women_desc: "Довга поема в традиції дивану, що описує позитивні та негативні риси жінок з усього світу."
  abduction_from_the_seraglio: "Викрадення із сералю"
  abduction_from_the_seraglio_desc: "Викрадення із сералю — опера про двох чоловіків різного соціального стану, які намагаються врятувати своїх коханих з полону в турецькому гаремі."
  cariye_painting: "Портрет черкеської красуні"
  cariye_painting_desc: "Портрет прекрасної черкеської каріє, наложниці османського імператорського гарему."
  marian_column: "Маріанська колона"
  marian_column_desc: "Маріанська колона — це пам'ятник, споруджений австрійцями на честь їхньої перемоги над Швецією. Він присвячений Діві Марії як символу її божественного захисту."
  triumphal_arch: "Тріумфальна арка"
  triumphal_arch_desc: "Тріумфальна арка була побудована на честь королівського шлюбу та відображає престиж і пишність нашої династії."
  kaiserhymne: "Австрійський імперський гімн"
  kaiserhymne_desc: "Кайзергімн — це патріотичний гімн, написаний Йозефом Гайдном на слова Лоренца Леопольда Гашки. Він оспівує Австрію та її правителя, символізуючи національну єдність і гордість."
  the_book_of_the_mysteries_of_the_heavens_and_the_earth: "Машафа Местіра Самай Вамедр"
  the_book_of_the_mysteries_of_the_heavens_and_the_earth_desc: "Пояснюючи, як усе було створено, згідно з [ShowReligionName('miaphysite')], Книга таємниць небес і землі зміцнила теологію нації."
  book_of_light_nativity_and_trinity_shared: "Частина трьох книг, що сприяють церковним реформам і захищають релігійні погляди письменника, вони слугують протилежною силою до духовенства."
  book_of_light: "Машафа Берхан"
  book_of_light_desc: "$book_of_light_nativity_and_trinity_shared$"
  book_of_nativity: "Машафа Мілад"
  book_of_nativity_desc: "$book_of_light_nativity_and_trinity_shared$"
  books_of_trinity: "Машафа Селассі"
  books_of_trinity_desc: "$book_of_light_nativity_and_trinity_shared$"
  confession_of_faith: "Сповідь віри"
  confession_of_faith_desc: "Ця книга, написана на захист [ShowReligionAdjective('miaphysite')] віри, виступає за зміцнення релігійних ідей, таких як дотримання Суботи та заборона свинини."
  kapilesvara_siva_temple: "Храм Капілешвара [ShowGodNameWithNoTooltip('shiva_god')]"
  kapilesvara_siva_temple_desc: "Присвячений [ShowGodName('shiva_god')], цей храм є одним з найбільших у [ShowAreaName('orissa_area')]."
  kanchi_kaveri: "Канчі Кавері"
  kanchi_kaveri_desc: "Поема, що описує Джаганнатху як невидиму силу, яка веде царів [ShowAreaName('orissa_area')] до перемоги."
  firoz_minar: "Фіроз Мінар"
  firoz_minar_desc: "Збудований, щоб показати престиж [ShowLocationName('gaur')], $firoz_minar$ є однією з найбільших веж у [ShowRegionName('bengal_region')]. Кажуть, що його перша ітерація була недостатньо великою, що призвело до того, що головного архітектора скинули з неї."
  dakhil_darwaza: "Дакхіл Дарваза"
  dakhil_darwaza_desc: "$dakhil_darwaza$ був побудований для захисту [ShowLocationName('gaur')] від іноземних вторгнень. Він є однією з найбільших брам в $india$."
  kusumba_mosque: "Мечеть Кусумба"
  kusumba_mosque_desc: "Одна з найбільших суфійських святинь в $india$, $kusumba_mosque$ часто називають Чорною Перлиною Бенгалії. Будучи однією з небагатьох, що не зазнала впливу архітектурного стилю Сурі, вона слугувала моделлю для будь-яких майбутніх святинь у регіоні."
  hisar_e_firoza: "Хісар-е-Фіруза"
  hisar_e_firoza_desc: "Палац, побудований султанами Делі, який також слугував фортом. Він також містить мечеть для молитви вірних, інший палац для дружини султана, підземні апартаменти на випадок війни та зерносховище для постачання людей їжею. Архітектура форту є ознакою змішання ісламської та індійської архітектури."
  lahdjat_sikandar_shahi_wa_lata_if_i_la_mutanahi: "Лахджат Сікандар Шахі ва-лата'іф-і ла-мутанахі"
  lahdjat_sikandar_shahi_wa_lata_if_i_la_mutanahi_desc: "Рідкісна музична композиція, що є результатом багаторічного покровительства султанів Делі."
  lodi_gardens: "Сади Лоді"
  lodi_gardens_desc: "Побудовані на піку династії Лоді, ці сади слугують їхнім magnum opus. Містять мечеті, гробниці та струмок, який, як стверджують, простягається аж до річки Ямуна, вони залишаються місцем для відвідування багатьма мандрівниками."
  qutb_minar: "Кутб Мінар"
  qutb_minar_desc: "Відомий як Вежа Перемоги, $qutb_minar$ є частиною семи великих пам'яток комплексу Кутб. Можливо, він був натхненний Мінаретом Джам в Афганістані."
  takht_i_firoza: "Тахт-е-Фіроза"
  takht_i_firoza_desc: "Більш відомий як Бірюзовий Трон, $takht_i_firoza$ — це інкрустований коштовностями королівський трон, створений у [ShowLocationName('warangal')]. Його було замовлено для правителів [ShowLocationName('delhi')], але їхній слабнучий контроль над територією призвів до того, що цей артефакт став не більше ніж простою прикрасою."
  gur_e_amir: "Гур-і Амір"
  gur_e_amir_desc: "Побудований як гробниця [GetCharacter('chg_timur_lame_borjigin').GetName], цей мавзолей слугує родинним, куди майбутніх членів відправляють на спочинок."
  goharshad_mosque: "Мечеть Гохаршад"
  goharshad_mosque_desc: "$goharshad_mosque$ є яскравим прикладом [ShowCultureName('farsi_culture')] архітектури за часів $TIM_ADJ$ епохи в [ShowRegionName('persia_region')]."
  majma_al_tawarikh: "Моджмал аль-Таваріх"
  majma_al_tawarikh_desc: "$majma_al_tawarikh$ — це хроніка $TIM_ADJ$ держави та їхніх сусідніх держав, що містить їхні історії та географії."
  taj_mahal: "Тадж-Махал"
  taj_mahal_desc: "Місце спочинку для його замовника, $taj_mahal$ є, мабуть, одним із найвеличніших мавзолеїв, коли-небудь збудованих. Будучи натхненним Гур-і Аміром у Самарканді, він перевершив своє призначення як меморіал для Шах Джахана та його дружини, закріпивши за ним статус одного з семи великих чудес світу."
  peacock_throne: "Павиний Трон"
  peacock_throne_desc: "Прикрашений трон $MUG_ADJ$ держави, він є символом влади в [ShowRegionName('hindustan_region')]."
  el_badi_palace: "Палац Ель-Баді"
  el_badi_palace_desc: "Величний палац, збудований з матеріалів від [ShowRegionName('italy_region')] до [ShowRegionName('guinea_region')], він є однією з найпишніше прикрашених споруд у [ShowRegionName('maghreb_region')]."
  ben_youssef_mosque: "Мечеть Ібн Юсуфа"
  ben_youssef_mosque_desc: "Мечеть, збудована за часів Альморавідів, вона є одним з небагатьох символів їхнього правління, що залишилися в [ShowRegionName('maghreb_region')]."
  guru_granth_sahib: "Гуру Грантх Сахіб"
  guru_granth_sahib_desc: "Вважається вічним $guru$ [ShowReligionName('sikhism')], його було укладено та розширено кількома $guru$ протягом століть, і він містить усі вчення для керівництва [ShowReligionAdjective('sikhism')] вірних."
  common_sense: "Здоровий глузд"
  common_sense_desc: "Памфлет, створений під час боротьби $colonial_revolution$, $common_sense$ є важливою працею для ідей егалітарного управління та боротьби проти колоніального гноблення."
  genealogy_osman_dynasty: "Генеалогія Османської династії"
  genealogy_osman_dynasty_desc: "Хроніка неймовірно впливової династії, сторінки прикрашені золотом та написами, що пов'язують її з днями Огуза $rank_empire_horde_ruler_suffix_male$, міфу серед тюркських племен."
  gabriel_the_archangel: "Архангел Гавриїл"
  gabriel_the_archangel_desc: "Ікона $gabriel_the_archangel$, святого [ShowReligionGroupAdjective('christian')] вірувань, та релігійний символ для [ShowLocationName('kyiv')]."
  st_andrew_church: "Церква Святого Андрія"
  st_andrew_church_desc: "Церква, присвячена святому Андрію, відомому як Апостол Русі."
  kie_collection_of_paintings_from_anton_losenko: "Колекція неокласичних портретів"
  kie_collection_of_paintings_from_anton_losenko_desc: "Створені спеціально для правителів [ShowRegionName('ruthenia_region')], ці портрети охоплюють увесь двір тамтешнього уряду."
  kleinody: "Клейноди"
  kleinody_desc: "Регалії козацької еліти. Вони символізують їхнє панування над воїнами, що їм підкоряються."
  takmelat_al_akhbar: "Takmilat al-'aḵbār"
  takmelat_al_akhbar_desc: "Універсальна хроніка, що містить історію [ShowRegionName('persia_region')], переважно присвячена останнім десятиліттям."
  imamzadeh_hossein: "Імамзаде Хусейн"
  imamzadeh_hossein_desc: "Мечеть-мавзолей, присвячена Імамзаде Хусейну, сину імама Алі ар-Ріди."
  ali_qapu_palace: "Алі Капу"
  ali_qapu_palace_desc: "Палац, збудований у [ShowRegionName('persia_region')]. Його головною метою було розширення впливу династії, яка його збудувала."
  history_of_the_hospitallers: "Історія госпітальєрів"
  history_of_the_hospitallers_desc: "Ця цінна хроніка є всебічним записом, що деталізує історію, битви та спадщину лицарів-госпітальєрів від їхнього походження до їхнього правління на Мальті."
  sulaymaniyya_takiyya: "Шам Сулейманіє Кюллієсі"
  sulaymaniyya_takiyya_desc: "Мечеть у [ShowLocationName('damascus')], спроектована з поєднанням [ShowCultureName('turkish_culture')] та [ShowCultureName('syriac_culture')] рис."
  blue_mosque: "Блакитна мечеть"
  blue_mosque_desc: "Мечеть, прикрашена надзвичайно пишно, зі стінами, пофарбованими в синій колір, щоб вона виділялася."
  church_of_saint_nicholas: "Церква Святого Миколая"
  church_of_saint_nicholas_desc: "Одна з перших церков, збудованих під час навернення [ShowLocationName('vilnius')] до [ShowReligionGroupName('christian')], вона залишається місцем, куди будь-який побожний [ShowReligionGroupAdjectiveWithNoTooltip('christian')] пішов би молитися."
  artis_magnae_artilleriae: "Artis Magnae Artilleriae"
  artis_magnae_artilleriae_desc: "Трактат, призначений для використання як посібник з артилерії, ракетобудування та піротехніки."
  tale_of_the_palemonids: "Сказання про Палемонідів"
  tale_of_the_palemonids_desc: "Хроніка Палемонідів, що пояснює, як вони втекли з [ShowLocationName('rome')] під час вторгнення Аттіли Гуна, і як вони дісталися до $LIT$."
  simple_words_of_catechism: "Прості слова катехізису"
  simple_words_of_catechism_desc: "Одна з перших книг, написаних [ShowDialectName('lithuanian_dialect')], з метою навчити людей [ShowReligionAdjective('lutheran')] цінностям."
  dynastic_history_of_the_dynasty: "Династійна хроніка"
  dynastic_history_of_the_dynasty_desc: "Золоті сторінки історії прикрашають наше сходження до влади. З розкішшю та багатством ми створили витончене минуле, яке міцно пов'язує нашу династію з владою, за яку ми тримаємося. Цей витвір мистецтва є доказом того, що наші претензії законні й не можуть бути оскаржені жодними самозванцями, які можуть повстати, щоб викрасти наше місце під сонцем."
  hong_lu_meng: "Сон у червоному теремі"
  hong_lu_meng_desc: "Роман, що розповідає історію Цзя Баоюя, втілення нефриту зі Стіни Небес, який прагне пізнати життя людини. Детально описуючи дві родини вигаданого клану Цзя, більшість його членів повільно зникають через сімейні суперечки, політику або смерть."
  hana_no_gosho_palace: "Хана-но-Ґошо"
  hana_no_gosho_palace_desc: "Створений як символ $ASK_ADJ$ престижу та пишноти, $hana_no_gosho_palace$ слугує одним із витончених палаців у [ShowLocationName('kyoto')]."
  kinkaku_ji: "Кінкаку-дзі"
  kinkaku_ji_desc: "Покритий золотом на знак очищення від негативу, Кінкаку-дзі є як духовним, так і престижним символом $ASK_ADJ$ архітектури."
  jinno_shotoki_chronicle: "Дзінно Сьотокі"
  jinno_shotoki_chronicle_desc: "Детальна хроніка, що фіксує правління всіх імператорів [ShowDynastyName('yamato_dynasty')] від міфологічної Епохи Богів до часу її завершення, разом із коротким описом їхнього правління."
  shokoku_ji: "Сьококу-дзі"
  shokoku_ji_desc: "Великий храм, побудований у [ShowLocationName('kyoto')] для задоволення як духовних, так і придворних потреб для $ASK_ADJ$ бенкетів."
  catfish_with_a_gourd: "Ловля сома гарбузом"
  catfish_with_a_gourd_desc: "Один із перших #italic суйбоку#! чорнильних картин, $catfish_with_a_gourd$ слугує прикладом розвитку чорнильного живопису по всьому [ShowRegionNameWithNoTooltip('japan_region')]."
  reading_in_a_bamboo_grove: "Читання в бамбуковому гаю"
  reading_in_a_bamboo_grove_desc: "Ще одна рання #italic суйбоку#! чорнильна картина. $reading_in_a_bamboo_grove$ демонструє зростання чорнильного живопису протягом життя [GetCharacter('tensho_shubun').GetName]."
  jap_winter_landscape: "Зимовий пейзаж"
  jap_winter_landscape_desc: "Написаний [GetCharacter('sesshu_toyo').GetName], $jap_winter_landscape$ демонструє злиття [ShowCultureGroupName('japanese_group')] та [ShowCultureGroupName('chinese_group')] стилів чорнильного живопису."
  traditions_of_jigonsaseh: "Джіґонсасех, Мати Націй"
  traditions_of_jigonsaseh_desc: "Джіґонсасех, ключова фігура у заснуванні Конфедерації [ShowCultureGroupName('haudenosaunee_group')], виявилася проникливим посередником та об'єднувачем."
  the_tragedy_of_hiawatha: "Трагедія Гаявати"
  the_tragedy_of_hiawatha_desc: "Починаючи як дика людина, Гаявата натомість змінився, вирушивши на пошуки, щоб поширити вчення Великого Закону Миру. Хоча й безуспішні, зусилля Гаявати виявилися значущими для об'єднання Конфедерації [ShowCultureGroupName('haudenosaunee_group')]."
  the_cleansing_of_tadodaho: "Очищення Тадодахо"
  the_cleansing_of_tadodaho_desc: "Хоча Тадодахо був тираном, він зрештою «очистився» від зла і став останньою ланкою в об'єднанні народу [ShowCultureGroupName('haudenosaunee_group')], слугуючи головним вождем."
  humboldts_cosmos: "Космос"
  humboldts_cosmos_desc: "$humboldts_cosmos$ — це багатотомний шедевр, що представляє єдине бачення природного світу, поєднуючи детальні наукові спостереження з філософськими роздумами. Він має на меті продемонструвати взаємозв'язок усіх фізичних явищ."
  rihla_art: "Ріхла"
  rihla_art_desc: "Укладена після десятиліть подорожей, #italic $rihla_art$#! — це детальний звіт $ibn_battuta$ про його мандрівки ісламським світом та за його межами. Надиктована вченому Ібн Джузаю, вона поєднує особисті зустрічі, культурні роздуми та спостереження з його подорожей Африкою, Аравією, Персією, Індією, Південно-Східною Азією та Китаєм. Ця праця є рідкісним і яскравим вікном у різноманітність нашого світу, побаченого очима невтомного та допитливого мандрівника."
  radziwilli_bible: "Радзивіллівська Біблія"
  radziwilli_bible_desc: "Замовлена могутнім [ShowReligionAdjective('calvinist')] шляхтичем, ця Біблія стала ключовою у поширенні вчень [ShowReligionNameWithNoTooltip('calvinist')] серед [ShowReligionAdjective('catholic')] мас. Витончений літературний твір, її створення має велике значення у сферах лінгвістики та благочестя."
  melk_abbey: "Абатство $ORIGIN$"
  melk_abbey_desc: "Мелькське абатство, засноване 1089 року вздовж річки Дунай в Австрії, стало одним із найвпливовіших бенедиктинських монастирів у Центральній Європі. Воно містило велику бібліотеку, багату на середньовічні рукописи та богословські праці, що відображало століття навчання та відданості."
  dormition_cathedral_vladimir: "Успенський собор"
  dormition_cathedral_vladimir_desc: "Збудований між 1158 і 1160 роками за князя Андрія Боголюбського, Успенський собор у Володимирі слугував духовним центром середньовічного Володимиро-Суздальського князівства. Він став зразком для багатьох пізніших руських церков, включно з Московським Успенським собором. Прикрашений фресками Андрія Рубльова та Данила Чорного, він символізував зростаючу владу Православної Церкви в середньовічній Русі."
  ivanovsky_monastery: "Івановський монастир"
  ivanovsky_monastery_desc: "Заснований наприкінці XIII століття, Івановський монастир у Пскові відігравав важливу роль у релігійному та оборонному житті міста. Розташований поблизу річки Пскови, він був частиною укріпленого ландшафту Пскова, типового для монастирських установ на північно-західному руському прикордонні. Монастир став відомим своїми суворими аскетичними традиціями та місцевими святими. Його середньовічні споруди відображають характерну кам'яну архітектуру псковської школи."
  kyiv_pechersk_lavra: "$ORIGIN$-Печерська Лавра"
  kyiv_pechersk_lavra_desc: "Заснована 1051 року ченцями Антонієм і Феодосієм, Києво-Печерська Лавра, або #italic Монастир Печер#!, є одним із найстаріших і найважливіших центрів східного православного християнства. Частково збудовані під землею, її печерні комплекси слугували як чернечими оселями, так і місцями поховань. З часом вона перетворилася на величезний релігійний і культурний комплекс, з богословськими студіями та виробництвом рукописів. До XIV століття Лавра була центральною частиною духовності та навчання Київської Русі."
  art_of_war: "Мистецтво війни"
  art_of_war_desc: "Приписуваний Сунь-Цзи і складений близько V століття до нашої ери, $art_of_war$ є одним із найвпливовіших військових трактатів в історії. Вкорінений у ранній китайській державності та стратегії, він систематизував принципи ведення війни, розвідки та лідерства. До XIII-XIV століть він вже був класичним текстом, який вивчали генерали та вчені по всій Східній Азії. Його акцент на адаптивності та психологічній війні глибоко сформував як китайську, так і пізнішу світову військову думку."
  gaocheng_astronomical_observatory: "Астрономічна обсерваторія Гаочен"
  gaocheng_astronomical_observatory_desc: "Збудована 1276 року за династії Юань, $gaocheng_astronomical_observatory$ поблизу $ORIGIN$ слугувала ключовим місцем для вдосконалення китайського календаря. Її кам'яні інструменти, включно з меридіанною лінією та гномоном, дозволяли точні вимірювання тіні сонця для визначення сонцестоянь та рівнодень. Обсерваторія відображала інтерес держави Юань до наукової реформи та її залежність як від китайських, так і від ісламських астрономічних знань. Вона використовувалася протягом століть і є однією з найстаріших збережених обсерваторій у світі."
  kaogongji: "Каогонцзі"
  kaogongji_desc: "Укладений за пізньої династії Чжоу (близько V століття до нашої ери), $kaogongji$ є найстарішим відомим китайським текстом про технології та містобудування. Він детально описує державні майстерні, матеріали та організацію ремесел, окреслюючи, як вироблялися бронзові, нефритови та ритуальні предмети. Він також надає модель ідеального дизайну міста, заснованого на ритуалах та космології. Перевідкритий та вивчений протягом імперської історії, він пропонує критичне розуміння технологічної та бюрократичної витонченості раннього Китаю."
  pagoda_of_fogong_temple: "Пагода храму Фогун"
  pagoda_of_fogong_temple_desc: "Збудована 1056 року за династії Ляо, $pagoda_of_fogong_temple$ у $shanxi_area$ є найстарішою збереженою повністю дерев'яною пагодою в Китаї, що сягає майже 70 метрів заввишки, демонструючи передові дерев'яні інженерні рішення та буддійські архітектурні традиції. Збудована під патронатом киданських правителів, вона символізувала як благочестя, так і технічні досягнення."
  giant_wild_goose_pagoda: "Велика пагода диких гусей"
  giant_wild_goose_pagoda_desc: "Зведена 652 року нашої ери за імператора Гаоцзуна династії Тан, $giant_wild_goose_pagoda$ у $xian_province$ була побудована для зберігання буддійських сутр, привезених з Індії ченцем Сюаньцзаном. Спочатку п'ятиповерхова, а пізніше розширена, вона стала головним центром перекладу та поширення буддійських текстів. Вона залишається одним із найвідоміших релігійних пам'яток Китаю, що поєднує духовну відданість та науковий обмін."
  notre_dame_de_paris: "Нотр-Дам де $ORIGIN$"
  notre_dame_de_paris_desc: "Розпочатий 1163 року і завершений у XIV столітті, $notre_dame_de_paris$ представляє вершину ранньої французької готичної архітектури. Його інноваційне використання аркбутанів, ребристих склепінь та величезних вітражів зробило його зразком для пізніших соборів. Слугуючи церемоніальним серцем Парижа, він був свідком королівських коронацій, державних подій та богословських дебатів."
  sainte_chapelle: "Сент-Шапель"
  sainte_chapelle_desc: "Побудована між 1241 та 1248 роками королем Людовиком IX, $sainte_chapelle$ у $ORIGIN$ була спроєктована для зберігання Тернового вінця Христа та інших реліквій Страстей Господніх. Вітражі каплиці зображують понад 1000 біблійних сцен. Розташована в королівському палаці, вона символізувала єдність монархії та божественної влади."
  vezelay_abbey: "Абатство Везле"
  vezelay_abbey_desc: "Абатство Святої Марії Магдалини у Везле було засноване в IX столітті та стало життєво важливим центром паломництва, стверджуючи, що володіє реліквіями Марії Магдалини. Його романська базиліка, освячена в 1104 році, славиться своїми скульптурними тимпанами та гармонійними пропорціями. Везле також відігравало важливу політичну роль — тут проповідували Другий та Третій хрестові походи. До XIV століття воно залишалося ключовою духовною та культурною пам'яткою в Бургундії."
  mont_saint_michel: "Мон-Сен-Мішель"
  mont_saint_michel_desc: "Драматично височіючи з припливного острова біля узбережжя Нормандії, Мон-Сен-Мішель виник як невелика молитовня на початку VIII століття і до XI століття перетворився на велике бенедиктинське абатство. Це поєднання релігійної відданості та військової фортифікації. Абатська церква, побудована на вершині скелястого піку, стала ключовим місцем паломництва. До 1337 року вона була як символом французької віри, так і грізною фортецею проти англійських наступів."
  reims_cathedral: "Реймський собор"
  reims_cathedral_desc: "Собор $ORIGIN$, будівництво якого розпочалося в 1211 році, був традиційною коронаційною церквою французьких королів. Його високий готичний дизайн, багате скульптурне оздоблення та великі вікна-троянди втілювали художні та політичні ідеали середньовічної Франції. Помазання монархів у Реймсі зміцнювало священну легітимність королівської влади."
  cluny_abbey: "Клюнійське абатство"
  cluny_abbey_desc: "Засноване в 910 році в Бургундії, Клюнійське абатство стало духовним серцем великого чернечого реформаторського руху, що переформував західне християнство. Його вплив поширився через сотні дочірніх монастирів, що наголошували на літургійній строгості та папській незалежності. Третя абатська церква, завершена на початку XII століття, була найбільшою в Європі до собору Святого Петра в Римі."
  aachen_cathedral: "Аахенський собор"
  aachen_cathedral_desc: "Замовлений Карлом Великим близько 796 року, собор $ORIGIN$ (Ахен) є шедевром каролінзької архітектури та однією з найдавніших монументальних купольних церков Європи. Він служив місцем коронації німецьких королів з 936 по 1531 рік. Восьмикутний план та мозаїки Палатинської каплиці черпали натхнення з Равенни та Візантії. У XIV столітті він все ще стояв як велика реліквія імперської влади та центр паломництва до останків Карла Великого."