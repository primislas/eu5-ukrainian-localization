  the_robbers: "Розбійники"
  the_robbers_desc: "#italic Die Räuber#! — це мелодраматична п'єса про двох братів, Карла та Макса фон Моор. Налаштовані один проти одного як суперники обставинами свого виховання, вони досліджують центральні питання руху #italic Sturm und Drang#!."
  wallenstein_woa: "Валленштейн"
  wallenstein_woa_desc: "Вільний переказ життя Альбрехта фон Валленштейна, що зосереджується на його занепаді в імперській прихильності. Розділена на три частини: «Табір Валленштейна», «Пікколоміні» та «Смерть Валленштейна», п'єса розповідає про боротьбу Валленштейна як імперського полководця та його труднощі в навігації боротьбою за владу католицької армії."
  nathan_the_wise: "Натан Мудрий"
  foundations_of_natural_right: "Основи природного права"
  imperial_surgery: "Імперська хірургія"
  imperial_surgery_desc: "«Імперська хірургія» — це медичний підручник, заснований на «Kitāb āl-Taṣrīf» Абу аль-Касіма аль-Захраві, хоча він містить власні детальні нові методики. Він повний ілюстрацій, деякі з яких показують зображення жінок-хірургів, групи, яка не була ілюстрована в попередніх текстах. Однією з описаних у ньому хірургічних методик є перев'язування скроневої артерії при мігрені."
  muraqqa: "Муракка"
  muraqqa_desc: "Книга, що збирає різні мініатюрні картини та ісламські каліграфічні роботи, вони зазвичай стосуються різних питань та джерел. У порівнянні з ранніми роботами, що ілюстрували епічні поеми, ці мініатюри зображують простіші та більш стислі сцени."
  sharh_al_tadhkirah: "Шарх аль-тазкіра"
  sharh_al_tadhkirah_desc: "Також відомий як «Коментар до мемуарів аль-Тусі», Шарх аль-тазкіра — це вражаючі мемуари з астрономії."
  tashrih_al_aflak: "Ташріх аль-афляк"
  tashrih_al_aflak_desc: "Ташріх аль-афляк, або «Анатомія небесних сфер», — це збірка теорій з астрономії. У тексті підтримується погляд на позиційне обертання Землі. На відміну від інших текстів свого часу, ця теорія обертання Землі розвивалася незалежно від подібних західних досліджень."
