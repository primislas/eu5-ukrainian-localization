  oral_traditions: "Усні традиції"
  oral_traditions_desc: "Усні традиції – це передача та збереження предківських традицій через оповідача."
  oral_traditions_name_0: "$ADJECTIVE|U$ Предківські традиції $FIRSTNAME$ $LASTNAME$"
  palace_desc: "Прекрасне досягнення найкращих архітекторів свого часу, палац слугуватиме гідною резиденцією для найважливіших осіб держави."
  temple_tower_desc: "Коронний витвір архітектури для релігійної споруди, $temple_tower$ піднесе важливість свого $temple$. Вежа зможе формувати наші поселення та демонструвати нашу відданість божественному."
  treatise_desc: "Дисертація про суттєві теми суспільства, $treatise$ потенційно може формувати світогляд нашого населення на століття вперед."
  weapon_desc: "Створена вправним $metalsmith$, ця $weapon$ слугує значним символом наших досягнень у ремеслі, навіть після того, як вона пережила своє військове використання."
  regalia_desc: "Символ влади та легітимності, $regalia$ виготовляються для нашого правителя і повинні бути захищені за будь-яку ціну."
  hymnal_desc: "Збірка текстів і мелодій, що використовуються для прославлення божественного на зібраннях вірних."
  painting_desc: "Зафіксувавши мить у часі або надавши важливій події в нашій історії візуальне представлення, мистецтво живопису на будь-якій поверхні високо цінується."
  icon_desc: "Зображуючи значні релігійні постаті, ці образи відіграють важливу роль у нашому поклонінні."
  scripture_desc: "Збірка рукописів, $scripture$ – це праця багатьох десятиліть збирання та поєднання текстів у цілісну добірку."
  motet_desc: "Поліфонічна композиція, створена для співу в церквах і переважно на біблійні теми."
  statue_desc: "Вирізана або відлита фігура, що часто імітує людину або тварину, використовуючи міцний матеріал."
  symphony_desc: "Музична композиція, зазвичай призначена для виконання оркестром і, як правило, поділена на чотири частини."
  novel_desc: "Літературний твір, який оповідає про вигадану дію для розваги читача і зазвичай написаний прозою."
  chronicle_desc: "Літературний твір, який компілює історичні події та оповідає їх хронологічно."
  poem_desc: "Літературний твір, який прагне представити красу та естетичне почуття за допомогою слів та ритму."
  play_desc: "Літературний твір у формі низки діалогів між персонажами, призначений для виконання акторами, а не для читання."
  monument_desc: "Публічна споруда з історичною або культурною цінністю для людей, які її звели."
  mansion_desc: "Розкішне та величне житло, що надає перевагу красі та комфорту над обороноздатністю та міцністю, і демонструє владу та багатство власника його одноліткам."
  prayer_book_desc: "Збірка молитов, присвячених побожності нашого народу, збереженню стародавніх текстів та величі божества."
