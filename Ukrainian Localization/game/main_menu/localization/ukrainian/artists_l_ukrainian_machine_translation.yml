  great_mosque_of_samarra: "Велика мечеть $ORIGIN$"
  great_mosque_of_samarra_desc: "Побудована переважно з обпаленої цегли в IX столітті за часів Аббасидського халіфа Аль-Мутаваккіля, Велика мечеть Самарри колись була однією з найбільших мечетей у світі, доки її не зруйнували монголи. Її найвизначнішою особливістю є спіральний мінарет, вежа Мальвія, що височіє на 52 метри над рівниною Тигру."
  stonehenge: "Стоунхендж"
  stonehenge_desc: "Розташований на Солсберійській рівнині в Англії, Стоунхендж є доісторичним пам'ятником, що датується приблизно 3000-2000 роками до н.е. Складений з масивних стоячих каменів, розташованих по колу, він, ймовірно, служив церемоніальним або астрономічним місцем. Будівництво вимагало надзвичайної координації та транспортування каменів з віддалених кар'єрів. Цей таємничий комплекс залишався недооціненим протягом більшої частини нашого періоду."
  colosseum_of_rome: "Колізей $ORIGIN$"
  colosseum_of_rome_desc: "Завершений у 80 році н.е. за імператора Тита, Колізей у Римі був найвеличнішим амфітеатром Римської імперії. Він міг вмістити до 50 000 глядачів для гладіаторських боїв, публічних видовищ та імітацій морських битв. Побудований з бетону та каменю, він є чудовим прикладом римської інженерної майстерності та соціальної організації. У середньовіччі його часто використовували як каменоломню."
  parthenon_of_athens: "Парфенон $ORIGIN$"
  parthenon_of_athens_desc: "Побудований між 447 і 432 роками до н.е. на Афінському акрополі, Парфенон був присвячений богині Афіні, покровительці Афін. Спроектований архітекторами Іктіном і Каллікратом під наглядом скульптора Фідія, його дизайн відповідає ідеалам класичної грецької архітектури. Пропорції храму та скульптурне оздоблення відображали як громадянську гордість, так і релігійну відданість. У Середньовіччі він використовувався як церква, так і фортеця."
  pyramid_art_key: "Піраміди $ORIGIN$"
  pyramid_art_key_desc: "Побудовані з мільйонів вапнякових блоків під час Четвертої династії Єгипту (близько 2600-2500 років до н.е.), Піраміди Гізи служили царськими гробницями для фараонів Хуфу, Хафри та Менкаура. Велика піраміда Хуфу, найбільша, була найвищою спорудою у світі понад 3000 років."
  sanchi_stupa: "Ступа Санчі"
  sanchi_stupa_desc: "Велика ступа в Санчі, в центральній Індії, датується III століттям до н.е. і спочатку була замовлена імператором Ашокою, але використовувалася аж до XIII століття н.е. Це одна з найстаріших кам'яних споруд в Індії та ключовий пам'ятник раннього буддійського мистецтва та архітектури. Купол символізує всесвіт, тоді як майстерно вирізьблені ворота зображують життя Будди. Вона стала головним місцем паломництва, вплинувши на буддійську архітектуру по всій Азії."
  leshan_giant_buddha: "Гігантський Будда Лешань"
  leshan_giant_buddha_desc: "Вирізьблений у скелі в Сичуані, Китай, Гігантський Будда Лешань датується VIII століттям за часів династії Тан. Заввишки 71 метр, це найбільший кам'яний Будда у світі. Проєкт був ініційований ченцем на ім'я Хай Тун, який сподівався заспокоїти бурхливі річки внизу."
  teotihuacan_temple: "Храмовий комплекс $ORIGIN$"
  teotihuacan_temple_desc: "Храм Сонця в Теотіуакані, побудований близько 200 року н.е., є однією з найбільших доколумбових пірамід в Америці. Розташований у серці стародавнього міста поблизу сучасного Мехіко, він був вирівняний з астрономічними явищами та відігравав центральну роль у мезоамериканському ритуальному житті. Побудований з вулканічного каменю та покритий штукатуркою, він використовувався для демонстрації політичного та релігійного домінування Теотіуакана і був настільки величним, що вплинув на пізніші цивілізації, включаючи ацтеків, які шанували його як священну землю."
