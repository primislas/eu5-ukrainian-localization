  bogurodzica: "Богородиця"
  szczerbiec: "Щербець"
  gaude_mater_polonia: "Gaude Mater Polonia"
  gaude_mater_polonia_desc: "#italic Gaude Mater Polonia#! — це гімн, створений у 1253 році Вінцентом з Кельчі. Він присвячений святому Станіславу зі Щепанова, який став мучеником після того, як його схопили та вбили за наказом короля Болеслава II. Він слугував одним із неофіційних гімнів середньовічної Польщі, а пізніше — Речі Посполитої."
  pol_annals_of_poland: "Аннали Польщі"
  new_chemical_light: "Нове хімічне світло"
  pol_brief_discussion: "Коротка дискусія між трьома особами: паном, головою громади та священиком"
  pol_royal_column: "Королівська колона"
  pol_threnodies: "Плачі"
  revolution_spheres: "Про обертання небесних сфер"
  pol_altarpiece: "Вівтар Маріацького костелу"
  three_histories_china: "Три юаньські історіографії"
  three_histories_china_desc: "$three_histories_china$ — це праці з історії династій Ляо, Цзінь та Сун, які безпосередньо передували династії [GetCountry('YUA').GetName]. Складені з вражаючою швидкістю, вони містять численні помилки, які можуть бути виправлені в майбутньому."
  peony_pavilion: "Павільйон півоній"
  peony_pavilion_desc: "$peony_pavilion$ — це трагікомедія про двох закоханих, Ду Лінян та Лю Менмея. Твір має 55 сцен, які можуть тривати понад 22 години при постановці на сцені, і вважається одним із найкращих творінь [ShowCultureGroupName('chinese_group')] драматургії."
  beijing_mosque: "Мечеть Нюцзе"
  beijing_mosque_desc: "$beijing_mosque$ була мечеттю в [ShowLocationName('dadu')], спочатку побудованою під час правління династії Ляо, але зруйнованою в 1215 році. Після реконструкції вона стоїть у центрі [ShowReligionName('sunni')] в $china$."
  porcelain_tower: "Порцелянова вежа"
  porcelain_tower_desc: "$porcelain_tower$ — це висока пагода, збудована з порцелянових цеглин, яка є однією з найвищих подібних споруд у [ShowCultureGroupName('chinese_group')] світі. Завдяки своєму вишуканому дизайну, вона вважається багатьма національним дивом та одним із наших найпрестижніших пам'ятників."
  yuanshi: "Історія Юань"
  yuanshi_desc: "«$yuanshi$» є одним з офіційних записів до хронік династій [ShowCultureGroupName('chinese_group')]. Вона складається з 210 розділів, що містять записи про династію [GetCountry('YUA').GetName] від правління $genghis_khan_name$ до її падіння."
  huolongjing: "Хуолунцзін"
  huolongjing_desc: "«$huolongjing$», або #italic Посібник Вогняного Дракона#!, є військовим [ShowWorkOfArtTypeName('treatise')] про використання [ShowAdvanceName('gunpowder_advance')] зброї. Посібник описує її використання під час [ShowSituationName('red_turban_rebellions')]. Він демонструє глибокі армійські традиції династій [ShowCultureGroupName('chinese_group')]."
  yuanmingyuan: "Юаньмін'юань"
  yuanmingyuan_desc: "«$yuanmingyuan$» — це комплекс найсучасніших палаців та садів, що майстерно представляють пишність [GetInternationalOrganizationType('middle_kingdom').GetName]."
  TEU_swords_of_grunwald: "Мечі Грюнвальда"
  chronica_provinz_lyfflandt: "Хроніка Лівонії"
  chronica_provinz_lyfflandt_desc: "«$chronica_provinz_lyfflandt$» детально описує історію [ShowAreaName('baltic_area')] від середини 12-го століття до середини 16-го століття і значною мірою зосереджується на літописах [GetCountry('LIV').GetName]."
  chronik_des_land_preussens: "Хроніка землі Пруссії"
  chronik_des_land_preussens_desc: "«$chronik_des_land_preussens$» детально описує події, що відбулися в [GetCountry('TEU').GetName] та [ShowAreaName('prussia_area')] протягом більшої частини другої половини чотирнадцятого століття."
