  de_asse_et_partibus_eius: "De Asse et Partibus Eius"
  de_asse_et_partibus_eius_desc: "Написаний [GetCharacter('guillaume_bude').GetName], $de_asse_et_partibus_eius$ містить різноманітні дослідження, проведені [GetCharacter('guillaume_bude').GetLastNameWithNoTooltip], що аналізують карбування монет стародавнього світу."
  heptameron: "Гептамерон"
  heptameron_desc: "Збірка новел, укладена посмертно [GetCharacter('pierre_boaistuau').GetName]. У ній містяться новели, що стосуються кохання, хіті та інших романтичних справ."
  ballet_de_la_merlaison: "Балет де ла Мерлезон"
  ballet_de_la_merlaison_desc: "$ballet_de_la_merlaison$ — це вражаюча серія танців, поезії та музики, зосереджена навколо ідеї полювання на дроздів."
  voyage_accounts_of_francois_de_vitre: "Мемуари"
  voyage_accounts_of_francois_de_vitre_desc: "Опис подорожей Франсуа Мартена де Вітре та його плавання на борту #italic Croissant#!. Франсуа був одним із перших французів, хто ступив на землю $india$."
  cartes_de_cassini: "Карта Кассіні"
  cartes_de_cassini_desc: "Укладена членами родини Кассіні, карта Кассіні була першою топографічною картою всього Королівства Франції, на створення якої пішло майже 6 десятиліть."
  the_brus: "Брус"
  the_brus_desc: "Оповідна поема, заснована на [GetCharacter('sco_robert_the_bruce').GetName] та [GetCharacter('sco_robert_the_bruce').GetHisHer] боротьбі за [GetCountry('SCO').GetAdjective] незалежність проти [GetCountry('ENG').GetNameWithNoTooltip]."
  sco_true_law: "Справжній закон вільних монархій"
  sco_true_law_desc: "Прагнучи закласти основу для божественного права на правління, $sco_true_law$ стверджує, що правитель держави володіє абсолютною владою і є божественно призначеним."
  sco_basilikon: "Басілікон Дорон"
  sco_basilikon_desc: "$sco_basilikon$ — це настанови, яких кожен правитель повинен дотримуватися, якщо він бажає ефективного правління. Настанови охоплюють усе: від управління підданими до формування кабінету."
  sco_divine_art_of_poesie: "Божественне мистецтво поезії"
  sco_divine_art_of_poesie_desc: "У $sco_divine_art_of_poesie$ міститься основа сучасної [ShowCultureName('scottish')] поезії. Хоча поема написана [ShowCultureNameWithNoTooltip('scottish')], її блиск привернув увагу багатьох за межами [ShowLanguageName('gaelic_language')] мови."
  treatise_of_human_nature: "Трактат про людську природу"
  treatise_of_human_nature_desc: "[ShowWorkOfArtTypeName('treatise')|U], написаний [GetCharacter('david_hume').GetName], детально описує відкриття щодо людських емоцій та інших аспектів людської природи. Праця [GetCharacter('david_hume').GetLastNameWithNoTooltip] вже здобула визнання у філософському світі."
