l_english:
  ARTIST_TYPE_NAME_: "(аматор)"
  ARTIST_TYPE_DESC_: "Це не професійний митець."
  ARTIST_TYPE_NAME_painter: "Художник"
  ARTIST_TYPE_DESC_painter: "Цей вид митців створює образи, зображуючи світ або суто зі своєї уяви. Це робиться шляхом нанесення пігменту, вугілля чи інших джерел кольорів на тверду поверхню, як-от полотно або стіна. Серед відомих художників тієї епохи — Леонардо да Вінчі, Рембрандт і Рафаель."
  ARTIST_TYPE_NAME_sculptor: "Скульптор"
  ARTIST_TYPE_DESC_sculptor: "Скульптор формує глину, камінь, мармур, дерево та інші матеріали у витвори мистецтва. Серед відомих скульпторів тієї епохи — Донателло, Мікеланджело та Джанлоренцо Берніні."
  ARTIST_TYPE_NAME_jurist: "Правознавець"
  ARTIST_TYPE_DESC_jurist: "Фахівець у правових питаннях, вправний в аналізі та коментуванні різних правових кодексів. Серед відомих правознавців тієї епохи — Бартолус де Саксоферрато, Франсіско де Віторія та Джеремі Бентам."
  ARTIST_TYPE_NAME_scientist: "Вчений"
  ARTIST_TYPE_DESC_scientist: "Людина знань і вчений-мислитель, що ставить під сумнів аспекти природи, які в минулому вважалися даними. Серед відомих вчених тієї епохи — Ісаак Ньютон, Леонардо да Вінчі та Жозеф Фур'є."
  ARTIST_TYPE_NAME_composer: "Композитор"
  ARTIST_TYPE_DESC_composer: "Це митець, що створює музику, включно з усім: від мотету до симфонії. Серед відомих композиторів тієї епохи — Йоганн Себастьян Бах, Вольфганг Амадей Моцарт та Карл Міхаель Белльман."
  ARTIST_TYPE_NAME_writer: "Письменник"
  ARTIST_TYPE_DESC_writer: "Письменник описує митців, що можуть писати будь-що: від поеми до роману, а також створювати цілі п'єси. Серед відомих письменників тієї епохи — Вільям Шекспір та багато інших менш талановитих."
  ARTIST_TYPE_NAME_architect: "Архітектор"
  ARTIST_TYPE_DESC_architect: "Архітектори — це митці, що проєктують будівлі, які створюють красу наших міст. Це також включає пам'ятники, особняки та палаци. Серед відомих архітекторів тієї епохи — Мімар Сінан, Крістофер Рен та Мікеланджело."
  ARTIST_TYPE_NAME_philosopher: "Філософ"
  ARTIST_TYPE_DESC_philosopher: "Цей вид митців визначає реальність і допомагає нам формувати наше розуміння нашого існування. Серед відомих філософів тієї епохи — Рене Декарт, Іммануїл Кант та Барух Спіноза."
  ARTIST_TYPE_NAME_iconographer: "Іконописець"
  ARTIST_TYPE_DESC_iconographer: "Іконописці створюють релігійні ікони для православних та міафізитських церков. Серед відомих іконописців тієї епохи — Еулаліос, Георгіос Каллергіс та Мануель Панселінос."
  ARTIST_TYPE_NAME_metalsmith: "Металомайстер"
  ARTIST_TYPE_DESC_metalsmith: "Металомайстри — це вправні ремісники, здатні створювати будь-що: від декоративної зброї до королівських регалій. Серед відомих металомайстрів тієї епохи — Йоганн Йозеф Вюрт, Відаль Асторі та Жеан Камб'є."
  ARTIST_TYPE_NAME_calligrapher: "Каліграф"
  ARTIST_TYPE_DESC_calligrapher: "Каліграфи створюють мистецтво через складні комбінації літер, які можуть бути виставлені в книгах або сувоях, зазвичай у палацах і храмах. Серед відомих каліграфів тієї епохи — Мір Емад Хассані, Хан Сок-бон або #italic Кан'ей Санпіцу#!."
  ARTIST_TYPE_NAME_storyteller: "Оповідач"
  ARTIST_TYPE_DESC_storyteller: "Оповідачі — це особи, покликані зберігати та передавати історії та традиції наших предків через усну традицію. Ці оповідачі є видатними особистостями у своїх племенах, і на них покладаються, щоб забезпечити передачу важливих традицій новому поколінню."
