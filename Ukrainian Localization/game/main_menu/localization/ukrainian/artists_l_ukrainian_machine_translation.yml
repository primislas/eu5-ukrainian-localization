  esmeraldo_do_situ_orbis: "Esmeraldo de Situ Orbis"
  esmeraldo_do_situ_orbis_desc: "#italic $esmeraldo_do_situ_orbis$#! — це трактат про космографію та дослідження, проведені португальськими дослідниками. Його складні деталі щодо португальських технік та його прибуткова торгівля призвели до того, що він століттями приховувався як державна таємниця."
  por_geral_de_espanha: "Crónica Geral de Espanha"
  por_geral_de_espanha_desc: "#italic $por_geral_de_espanha$#! — це розгорнута хроніка, що оповідає про Реконкісту [ShowRegionName('iberia_region')] та роль [GetCountry('POR').GetName] у цій перемозі."
  livro_das_cantigas: "Livro das Cantigas"
  livro_das_cantigas_desc: "#italic $livro_das_cantigas$#! — це багата музична збірка, що містить різноманітні #italic cantigas#!, які складаються з багатьох різних пісень, написаних наприкінці їхньої золотої доби."
