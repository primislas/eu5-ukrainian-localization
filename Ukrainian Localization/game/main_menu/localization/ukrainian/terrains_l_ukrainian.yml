  TERRAIN_MOVEMENT_COST: "Вартість пересування для [Concept('units', 'військ')|e]: $VALUE|-=%V$"
  TERRAIN_PROXIMITY_COST: "Вплив близькості: $VALUE|-=%$"
  TERRAIN_ATTACKER_PENALTY: "Штраф нападника в [Concept('combat', 'битві')|e]: $VALUE|-=$"
  TERRAIN_ATTACKER_PENALTY_TT: "Цей [Concept('location', 'повіт')|e] накладає штраф [Location.GetAttackerPenalty|-=] на [Concept('attacker', 'нападника')|e] в [Concept('combat', 'битві')|e]."
  TERRAIN_CAN_FREEZE_OVER: "Може замерзати взимку, блокуючи рух [Concept('ships', 'кораблів')|e] та дозволяючи [Concept('armies', 'військам')|e] рух по кризі."
  TERRAIN_BLOCKS_IN_WINTER: "[Concept('armies', 'Війська')|e] не можуть увійти під час $STATIC_MODIFIER_NAME_winter_normal$ або $STATIC_MODIFIER_NAME_winter_severe$."
  flatland_desc: "Рівнина представляє собою місцевість без значних перепадів висот, тому не має перешкод для руху [Concept('army', 'війська')|e] чи будівництва [Concept('building', 'споруд')|e]."
  mountains_desc: "Гірська місцевість має велику висоту, а також круті схили з відносно невеликою кількістю вузьких рівнинних ділянок, тому [Concept('armies', 'військам')|e] складніше перетинати її та воювати в ній, а також складніше її розвивати."
  hills_desc: "Місцевість з пагорбами відзначається перепадами висот, але схили не такі круті та високі, як у горах, тому й складнощі не такі значні."
  plateau_desc: "Представляють відносно рівнинні території, розташовані на великій висоті, тому мають більші ускладнення порівняно з рівнинами через свою висоту."
  wetlands_desc: "$wetlands$ — це частково затоплена місцевість, зазвичай через близькість до річки, озера або узбережжя."
  ocean_desc: "Це відкриті моря між континентами, де можуть подорожувати лише найкращі кораблі."
  deep_ocean_desc: "Це відкрите море між континентами, де можуть подорожувати лише найкращі кораблі, у найвіддаленіших від будь-якого узбережжя районах."
  coastal_ocean_desc: "Це відкрите море між континентами, де можуть подорожувати лише найкращі кораблі, але у районах, ближчих до узбережжя."
  inland_sea_desc: "Внутрішні моря представляють собою моря, оточені сушею, як-от Середземне чи Балтійське."
  atoll_desc: "Атоли — це круглі низько розташовані острови, які зазвичай оточують лагуну."
  narrows_desc: "Протоки — це ділянки моря, оточені узбережжям з багатьох боків, як-от протоки або море всередині архіпелагів, де мало простору для руху."
  lakes_desc: "Озера представляють собою внутрішні водойми без будь-якого контакту з відкритим морем, крім як через можливі річки, тому жодні [Concept('ships', 'кораблі')|e], що мають значення, не можуть по них плавати."
  high_lakes_desc: "$lakes_desc$"
  plateau_wasteland_desc: "$plateau_desc$"
  mountain_wasteland_desc: "$mountains_desc$"
  hills_wasteland_desc: "$hills_desc$"
  wetlands_wasteland_desc: "$wetlands_desc$"
  dune_wasteland_desc: "$desert_desc$"
  flatland_wasteland_desc: "$flatland_desc$"
  mesa_wasteland_desc: "$desert_desc$"
  ocean_wasteland_desc: "Це океанічне море поза основними течіями, тому це незручний шлях для кораблів, оскільки вони могли б опинитися застряглими посередині."
  tropical_desc: "$tropical$ представляє райони з високими середніми температурами та без зими."
  arid_desc: "$arid$ представляє район із серйозною нестачею доступної води."
  mediterranean_desc: "$mediterranean$ представляє райони з ідеальним кліматом, де кожен хоче жити."
  continental_desc: "$continental$ представляє райони з холодними зимами."
  arctic_desc: "$arctic$ представляє райони з дуже холодними зимами."
  cold_arid_desc: "$cold_arid$ представляє район із серйозною нестачею доступної води, але з зимами."
  oceanic_desc: "$oceanic$ представляє райони з м'якими зимами, але високою вологістю."
  subtropical_desc: "$subtropical$ представляє райони з високими середніми температурами та м'якими зимами."
  desert_desc: "Пустелі — це безплідні ландшафти з невеликою кількістю опадів і майже без потенціалу для рослинного чи тваринного життя."
  sparse_desc: "Рідколісся представляє великі рівнинні ділянки землі з невеликою кількістю дерев або без них."
  grasslands_desc: "Трав'янисті рівнини представляють місцевість, де переважає трава, з невеликою кількістю дерев чи кущів або без них."
  farmland_desc: "Сільськогосподарські угіддя представляють антропогенну місцевість, призначену для посівів та/або екстенсивних пасовищ."
  woods_desc: "Ліси представляють місцевість з менш густою рослинністю, ніж праліси."
  forest_desc: "Праліс представляє місцевість з густою рослинністю."
  jungle_desc: "Джунглі представляють місцевість з густим лісом і заплутаною рослинністю, що ускладнює будь-яку діяльність на землі."
