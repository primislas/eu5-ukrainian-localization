l_english:
  generic_mission_events.4.title: "[arguing_estate.GetNameWithNoTooltip] Протест у [target_location.GetNameWithNoTooltip]"
  generic_mission_events.4.desc: "[arguing_estate.GetName] висловлює зростаюче занепокоєння щодо збільшення впливу стану [mission_target_estate.GetName] при нашому дворі. У [target_location.GetName] їхні протести стали гучнішими, звинувачуючи [target_character.GetName] у фаворитизмі та ігноруванні традиційного балансу сил.\n\nЦі заворушення загрожують дестабілізувати ретельно налагоджену співпрацю між станами та підірвати внутрішню єдність нашого [ROOT.GetCountry.GetFlavorRank]. Наші радники та місцеві адміністратори наполегливо радять нам втрутитися, перш ніж протест охопить усю столицю."
  generic_mission_events.4.a: "Ми не будемо потурати [arguing_estate.GetNameWithNoTooltip]."
  generic_mission_events.4.b: "Їхні скарги мають підстави."
  generic_mission_events.4.c: "[target_character.GetShortNameWithNoTooltip] змусить їх замовкнути!"
  generic_mission_events.4.d: "Ці справи нижче нашої гідності."
  upset_both_estates_devastate_target_location_tt: "Протести можуть вийти з-під контролю, спустошивши [target_location.GetName] у процесі"
  protests_die_down_tt: "Протести швидко згасають"
  generic_mission_events.5.title: "[target_character2.GetName] Просить пожертву"
  generic_mission_events.5.desc: "[target_character2.GetName] звернувся до [target_character1.GetName] з продуманою пропозицією. Щедра пожертва стану [mission_target_estate.GetName], стверджує [target_character2.GetSheHe], створила б необхідні умови для розширення [target_character2.GetHerHis] ролі у [ROOT.GetCountry.GetGovernment.GetCabinetTitle].\n\nЦя пропозиція стосується як просування [target_character2.GetHerHis] особистого становища, так і зміцнення зв'язків між нашим [ROOT.GetCountry.GetFlavorRank] та станами."
  generic_mission_events.5.a: "Зробити [target_character2.GetHerHim] пропозицію, від якої [target_character2.GetSheHe] не зможе відмовитися."
  generic_mission_events.5.b: "Ми не можемо дозволити собі ці пожертви."
  generic_mission_events.6.title: "Петиція про децентралізацію"
  generic_mission_events.6.desc: "[mission_target_estate.GetName] подав офіційну петицію із закликом повернутися до децентралізованого управління. Вони стверджують, що влада має бути повернута місцевим адміністраторам, замість того, щоб залишатися зосередженою в руках [target_character.GetName].\n\nЦей крок широко розглядається як спроба обмежити зростаючу владу [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та змінити баланс впливу при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  generic_mission_events.6.desc.generic: "Стани подали офіційну петицію із закликом повернутися до децентралізованого управління. Вони стверджують, що влада має бути повернута місцевим адміністраторам, замість того, щоб залишатися зосередженою в руках [target_character.GetName].\n\nЦей крок широко розглядається як спроба обмежити зростаючу владу [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] та змінити баланс впливу при нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  generic_mission_events.6.a: "Ми будемо співпрацювати."
  generic_mission_events.6.b: "Вони не можуть диктувати політику [target_character.GetNameWithNoTooltip]!"
  generic_mission_events.7.title: "[target_pop_scope.GetNameWithNoTooltip] Приносять зростання до [target_province.GetNameWithNoTooltip]"
  generic_mission_events.7.desc: "Завдяки нашій співпраці з [mission_target_estate.GetName], [target_pop_scope.GetName] насолоджувалися періодом процвітання. Їхній успіх перетворився на помітне зростання по всій території [target_province.GetName].\n\nЦей розвиток є свідченням переваг взаємної співпраці та ефективної політики, запровадженої нашим [ROOT.GetCountry.GetGovernment.GetCourtTitle] під керівництвом [target_character.GetShortName]."
  generic_mission_events.7.a: "Доказ нашого здорового співіснування!"
  generic_mission_events.7.b: "Усе завдяки політиці [target_character.GetShortNameWithNoTooltip]!"
  member_of_the_mission_target_estate_may_approach_us_again_after_months_tt: "[Concept('estate', 'CONCEPT_PLACEHOLDER')|e] може знову звернутися до нас за кілька місяців"
  generic_mission_events.8.title: "Процедура анексії"
  generic_mission_events.8.desc: "Анексія [mission_target_subject.GetName] відбувається під наглядом [target_character1.GetName]. [mission_target_subject.Custom('GetRulerOrRegentTitle')] [mission_target_subject.GetName], [target_character2.GetName], продовжує правити з [target_location.GetName].\n\nПрогрес стабільний, і все вказує на безперешкодну інтеграцію. Якщо процедура триватиме без перешкод, вони будуть повністю інтегровані згодом."
  generic_mission_events.8.a: "Ми можемо використати цей імпульс."
  generic_mission_events.8.b: "Повільно, але впевнено..."
  generic_mission_events.9.title: "Дипломатичний інцидент"
  generic_mission_events.9.desc: "Процес інтеграції є складною справою. Юридичні розбіжності та об'єднання двох – часто відмінних – правових систем можуть легко призвести до дипломатичних інцидентів та перешкод на цьому шляху. Один такий випадок стався нещодавно. Ця остання невдача, ймовірно, зашкодить нашим зусиллям з анексії."
  generic_mission_events.9.a: "Ніщо, що [target_character1.GetShortNameWithNoTooltip] не зможе переглянути."
  generic_mission_events.9.b: "Це, безумовно, удар по нашому прогресу."
  generic_mission_events.9.c: "Продовжувати рішуче!"
  diplomatic_abilities_of_target_character_prevent_any_negative_incident: "[Concept('dip', 'CONCEPT_PLACEHOLDER')|e] [target_character1.GetName] не дозволить цьому інциденту вплинути на процес анексії"
  generic_mission_events.10.title: "Культурні надбання"
  generic_mission_events.10.desc: "Коли [mission_target_subject.GetName] приєднується до нашого [ROOT.GetCountry.GetFlavorRank], ми збагачуємося їхніми традиціями та звичаями. Обмін мовами, мистецтвом та звичаями почав формувати обидва наші народи.\n\nЦе культурне перехресне запилення цілком може стати однією з найбільших довгострокових переваг інтеграції, і наші мистецькі уми, безсумнівно, отримають від цього користь на довгі роки..."
  generic_mission_events.10.a: "Культура [target_culture.GetNameWithNoTooltip] сяє!"
  generic_mission_events.10.b: "Ми можемо залучити деяких з їхніх найкращих людей."
  generic_mission_events.11.title: "Тертя між [target_culture.GetNameWithNoTooltip] та [target_culture2.GetNameWithNoTooltip]"
  generic_mission_events.11.desc: "Хоча політичне об'єднання може бути в процесі, культурна гармонія залишається невловимою. Населення [target_culture.GetNameWithNoTooltip] та [target_culture2.GetNameWithNoTooltip] почало конфліктувати через звичаї, мову та уявні образи.\n\nДеякі з наших радників шепочуть, що ситуацію можна було б легше вирішити, якби провину поклали на одну особу. Інші вважають це природною дивиною – спостерігати об'єднання двох держав з виразними культурними розбіжностями."
  generic_mission_events.11.a: "Це зашкодить нашому дипломатичному фронту."
  generic_mission_events.11.b: "Звинуватити в усьому [target_scapegoat_character.GetNameWithNoTooltip]!"
  generic_mission_events.12.title: "Дипломатичні зв'язки з [target_overlord.GetNameWithNoTooltip]"
  generic_mission_events.12.desc: "[target_overlord.GetName] зробив кроки для зміцнення своїх відносин з нами. Чи то з стратегічних міркувань, чи з щирого інтересу, їхні зусилля наблизити нас не залишилися непоміченими.\n\nЛише час покаже, чи щирі ці жести, чи є частиною глибшої гри. Наразі ми залишатимемося пильними та спостерігатимемо за розвитком ситуації."
  generic_mission_events.12.a: "Ми будемо з великим інтересом стежити за їхніми рухами!"
  overlord_info_generic_vassal_mission_pack_tt: "[target_overlord.GetName] наразі активно виконує [ShowMissionName('generic_vassal_ties')] [Concept('mission', 'CONCEPT_PLACEHOLDER')|e] щодо нас"
  generic_mission_events.13.title: "Зростання [target_location.GetNameWithNoTooltip]"
  generic_mission_events.13.desc: "[target_location.GetName], видатний [target_location.GetRank.GetName], розташований у [target_province.GetName], швидко перетворився на зростаючий центр торгівлі та управління. Купці стікаються на його ринки, ремісники створюють нові майстерні, а місцеві чиновники розширюють свій вплив, оскільки [target_location.GetRank.GetNameWithNoTooltip] зростає в багатстві та впливі. Це, безсумнівно, результат нашої уваги до централізації нашого [ROOT.GetCountry.GetFlavorRank], ознака майбутнього під мудрим керівництвом [target_character.GetName]."
  generic_mission_events.13.a: "Наші зусилля окупаються!"
  generic_mission_events.13.b: "Давайте фінансувати цю нову хвилю централізації."
  generic_mission_events.13.c: "Немає потреби втручатися."
  valid_province_tt: "Існує дійсна [Concept('province', 'CONCEPT_PLACEHOLDER')|e] для цього варіанту [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  generic_mission_events.14.title: "[target_province.GetNameWithNoTooltip] чинить опір централізації"
  generic_mission_events.14.desc: "Попри бачення та рішучість [target_character.GetName], люди [target_province.GetName] стали насторожено ставитися до нещодавніх централізаційних тенденцій, нав’язаних їм. Міські старійшини бурчать про втрачені традиції, місцеві магістрати зволікають, а шепіт про автономію розноситься по сільській місцевості. Те, що мало принести порядок, натомість сприймається як втручання. Опір вкорінюється не у відкритому повстанні, а в упертій тиші та тонкій непокорі, підводній течії, що загрожує підірвати самі основи нашої влади по всьому [ROOT.GetCountry.GetFlavorRank]."
  generic_mission_events.14.a: "Вони забули своє місце."
  generic_mission_events.14.b: "На жаль, вони не можуть зрозуміти наших намірів."
  generic_mission_events.14.c: "Звинувачуйте в усьому [target_character2.GetShortNameWithNoTooltip]!"
  suitable_character_exists_tt: "Існує відповідний [Concept('character', 'CONCEPT_PLACEHOLDER')|e] для цього варіанту [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  generic_mission_events.15.title: "Нехтування сільською місцевістю"
  generic_mission_events.15.desc: "Люди [target_province.GetName], разом із мешканцями її провінційного центру, [target_location.GetName], висловлюють зростаюче невдоволення. Оскільки наш погляд завжди звернений до великих міст та розширення центрального управління, ці сільські громади відчувають себе відкинутими, забутими в тіні прогресу. Їхні петиції стають гучнішими: зупинити реформи, відновити увагу до землі та пам’ятати тих, хто обробляє ґрунт і об’єднує [ROOT.GetCountry.GetFlavorRank] знизу."
  generic_mission_events.15.a: "Незначна тимчасова перешкода."
  generic_mission_events.15.b: "Нам байдуже до скарг сільського люду."
  generic_mission_events.15.c: "Зверніться по допомогу до [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]."
  progress_towards_centralization_will_not_be_hindered_tt: "Наш прогрес до [ShowSocietyDirectionName('centralization')] [Concept('societal_value', 'CONCEPT_PLACEHOLDER')|e] не буде зупинено"
  generic_mission_events.16.title: "Податкові реформи [target_character.GetNameWithNoTooltip]"
  generic_mission_events.16.desc: "Серед хвилі централізації [target_character.GetName] запропонував масштабні реформи для перегляду податкової системи нашого [ROOT.GetCountry.GetFlavorRank]. Розроблені для поповнення скарбниці та оптимізації збору доходів, зміни відібрали б фіскальну владу у місцевих органів і міцно зосередили б її в [target_character.GetHerHis] руках. Проте такі амбіції не залишаються непоміченими. Дійсно, кожен стан, від [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] до [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], може втратити вплив, і їхнє занепокоєння вже перетворюється на опір."
  generic_mission_events.16.a: "Продовжуйте реформи."
  generic_mission_events.16.b: "Не будемо порушувати статус-кво."
  generic_mission_events.17.title: "Перспектива нового міста в [target_location.GetNameWithNoTooltip]"
  generic_mission_events.17.desc: "Поселення [target_location.GetName] неухильно зростало, його вулиці тепер гамірні від фермерів, торговців та ремісників, які шукають можливості поблизу серця нашого [ROOT.GetCountry.GetFlavorRank]. Хоча це все ще скромний [target_location.GetRank.GetName], його розташування поблизу [ROOT.GetCountry.GetCapital.GetName] надає йому як стратегічної значущості, так і економічної перспективи.\n\nЗавдяки правильним інвестиціям [target_location.GetNameWithNoTooltip] може бути перетворено на справжнє місто з ринками, майстернями та міською хартією. Це не тільки принесе порядок і процвітання регіону, але й слугуватиме видимим символом наших централізаційних амбіцій. Залишається лише вкласти кошти та волю, щоб це здійснилося."
  generic_mission_events.17.a: "[target_location.GetNameWithNoTooltip] стане чудовим містом!"
  generic_mission_events.17.b: "Не будемо розхитувати човен."
  cost_of_town_scales_tt: "Вартість цього нового [Concept('urban_location', 'CONCEPT_PLACEHOLDER')|e] буде додатково зменшена на основі нашого [ShowSocietyDirectionName('centralization')] [Concept('societal_value', 'CONCEPT_PLACEHOLDER')|e], а також нашого [ShowModifierTypeName('town_upgrade_cost_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"
  generic_mission_events.18.title: "Вчені [target_location.GetNameWithNoTooltip]"
  generic_mission_events.18.desc: "Серед тихих навчальних залів [target_location.GetName] виникла невелика, але палка група вчених. Вони шукають не лише покровительства, а й визнання. Їхні вимоги визнання того, що прагнення до знань, розуму та відкриттів є життєво важливою опорою будь-якого централізованого та освіченого [ROOT.GetCountry.GetFlavorRank], дійшли до вух [target_character.GetName].\n\nЇхня петиція окреслює амбітні плани. Від перекладу іноземних текстів, встановлення листування з мислителями за кордоном та будівництва скромного, але міцного наукового інституту, їхні цілі, здається, узгоджуються з нещодавнім інноваційним поштовхом, який охопив наш [ROOT.GetCountry.GetFlavorRank]. Проте такі починання вимагають грошей, терпіння та захисту від тих, хто вважає такі заняття марними відволіканнями від війни та управління."
  generic_mission_events.18.a: "Фінансувати їхні починання."
  generic_mission_events.18.b: "Ми не можемо витрачати стільки грошей на марні витрати"
  based_on_target_location_average_literacy_tt: "На основі середньої [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e] в [target_location.GetName]:"
  scholars_in_target_location_wont_approach_tt: "#italic Вчені в [target_location.GetName] можуть знову звернутися до нас за кілька місяців, поки поточне [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] активно прогресує#!"
  generic_mission_events.19.title: "Розум для [ROOT.GetCountry.GetGovernment.GetCourtTitle]"
  generic_mission_events.19.desc: "Чутки швидко ширяться залами [ROOT.GetCountry.GetCapital.GetName]. Багатообіцяючий і недосвідчений художник, [target_character2.GetName], прибув зі сміливими теоріями, анотованими рукописами та баченням перетворення інтелектуальної культури нашого [ROOT.GetCountry.GetFlavorRank]. Дехто називає [target_character2.GetHerHim] шарлатаном, інші — вундеркіндом. Безсумнівно те, що [target_character2.GetSheHe] шукає покровительства, місця при дворі, де [target_character2.GetHerHis] ідеї могли б процвітати.\n\nТі, хто цінує розум і реформи, закликають нас ризикнути. Ті, хто чіпляється за ієрархію та традиції, воліли б, щоб [target_character2.GetHerHim] зник, перш ніж [target_character2.GetSheHe] скаже ще хоч слово."
  generic_mission_events.19.a: "[target_character.GetSheHe|U] подає надії!"
  generic_mission_events.19.b: "Ще один бездарний дурень прийшов засмічувати [ROOT.GetCountry.GetGovernment.GetCourtTitle]."
  skill_of_scientist_scales_with_country_literacy_tt: "[Concept('artistic_skill', 'CONCEPT_PLACEHOLDER')|e] [target_character2.GetName] частково залежатиме від середньої [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e] в нашому [ROOT.GetCountry.GetFlavorRank]"
  artist_will_be_promtly_defenestrated_tt: "#italic [target_character2.GetName] буде негайно та безповоротно викинуто з вікна#!"
  generic_mission_events.20.title: "Розум [target_character2.GetNameWithNoTooltip]"
  generic_mission_events.20.desc: "Трактати, написані [target_character2.GetName], почали поширюватися серед освічених кіл [ROOT.GetCountry.GetCapital.GetName]. Сміливі, суперечливі та елегантно написані, вони кидають виклик старим догмам і пропонують радикальні реформи в управлінні, праві та духовному порядку. Дехто шепоче, що [target_character2.GetSheHe] є генієм, інші кричать про богохульство. Якою б не була правда, ці твори викликали дебати далеко за межами навчальних закладів, і тепер вони лежать перед нами, чекаючи на суд. Те, як ми вирішимо відповісти, може визначити не лише долю автора, а й інтелектуальну траєкторію нашого [ROOT.GetCountry.GetFlavorRank]."
  generic_mission_events.20.a: "У [target_character2.GetHerHis] працях є сенс."
  generic_mission_events.20.b: "Це єресь, спалити її!"
  generic_mission_events.20.c: "Продати її тому, хто запропонує найвищу ціну."
  generic_mission_events.21.title: "Єретичні Дослідження"
  generic_mission_events.21.desc: "Останні теорії, що виникли в дослідженнях наших вчених, викликали обурення в [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]. Хоча вони ґрунтуються на спостереженнях і розумі, ці наукові висновки підривають давні вірування та священні тексти, викликаючи побоювання єресі серед вірних.\n\nПроте в придворних та інтелектуальних колах наших людей хвалять як [target_culture.GetName] провидців. Підтримка такої роботи стала б чітким кроком до інноваційного та світського [ROOT.GetCountry.GetFlavorRank], але це також може розпалити конфронтацію з духовними хранителями традицій, такими впливовими, як [target_pop_scope.GetName]."
  generic_mission_events.21.a: "Нам байдуже на кудкудакання [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]."
  generic_mission_events.21.b: "Не будемо наживати нових ворогів."
  generic_mission_events.21.c: "Наші найяскравіші уми не будуть оскаржені старими чоловіками в рясах!"
  will_not_hinder_our_progress_to_innovative_tt: "Наш прогрес до [ShowSocietyDirectionName('innovative')] [Concept('societal_value', 'CONCEPT_PLACEHOLDER')|e] не буде зупинено"
  clergy_do_not_dare_move_against_target_character_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не посміє виступити проти [target_character.GetName]"
  generic_mission_events.22.title: "Бібліотека [target_location.GetNameWithNoTooltip]"
  generic_mission_events.22.desc: "Відвідувачі та містяни [target_location.GetName] об'єднали свої ресурси та зусилля для заснування нової бібліотеки, за нашого схвалення та фінансової підтримки. Ця установа, призначена для зберігання знань, заохочення грамотності та приваблення мислителів звідусіль, є свідченням нашої інтелектуальної допитливості.\n\nХоча вона ще скромна за розміром, вона представляє зростаючий потяг до навчання в [target_province.GetName], і вже перші полиці жваво заповнені новими томами, рукописами та записами. За належного фінансування та підтримки вона могла б розквітнути в маяк освіти для всього [ROOT.GetCountry.GetFlavorRank], надихаючи як вчених, так і амбітних людей на покоління вперед."
  generic_mission_events.22.a: "Вигідна інвестиція окупається!"
  generic_mission_events.22.b: "Запросити до неї людей з усього [target_province.GetNameWithNoTooltip]"
  generic_mission_events.22.c: "Можливо, [target_heir.GetShortNameWithNoTooltip] зможе провести там деякий час?"
  heir_gains_depend_on_inno_and_literacy_tt: "Здобута [Concept('total_ability', 'CONCEPT_PLACEHOLDER')|e] значною мірою залежатиме від середньої [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e], а також від міри [ShowSocietyDirectionName('innovative')] [Concept('societal_value', 'CONCEPT_PLACEHOLDER')|e] по всьому нашому [ROOT.GetCountry.GetFlavorRank]"
  generic_mission_events.23.title: "Іноземне втручання"
  generic_mission_events.23.desc: "Шепіт на вулицях нашої столиці та розмови за зачиненими дверима, схоже, вказують на те, що наші вороги привели свої плани в дію. Дипломатичні образи, кулуарні угоди та наше, здавалося б, виключення з різних переговорів свідчать про те, що [target_country.GetName] зашкодили нашій репутації вдома та за кордоном. Це не що інше, як остання провокація, і ми повинні поставитися до неї серйозно! Наш національний суверенітет не буде підданий сумніву, навіть такими, як [target_character2.GetName] та [target_character2.GetHerHis] подібні!"
  generic_mission_events.23.a: "Такий підступний хід."
  already_destabilized_desc: "Ми вже страждаємо від наслідків цього [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e]"
  target_country_sow_discontent_tt: "[target_country.GetName] використали [ShowRelationTypeName('sow_discontent')] [Concept('diplomatic_action', 'CONCEPT_PLACEHOLDER')|e] проти нас, ще більше сіючи насіння нестабільності по всьому нашому [ROOT.GetCountry.GetFlavorRank]"
  generic_mission_events.24.title: "Меценатство над [target_location.GetNameWithNoTooltip]"
  generic_mission_events.24.desc: "Відповідно до наших амбіцій централізувати багатство та економічну владу, місцева влада в [target_location.GetName] подала пропозицію щодо великомасштабних інвестицій. Вони стверджують, що покращена інфраструктура та розширені торговельні центри перетворять [target_location.GetRank.GetName] на наріжний камінь економіки нашого [ROOT.GetCountry.GetFlavorRank].\n\nНеобхідні кошти значні, але потенційні прибутки, як економічні, так і політичні, ще більші. Радники пропонують діяти швидко, щоб закріпити цей розвиток як частину нашого ширшого просування до економіки, орієнтованої на столицю."
  generic_mission_events.24.a: "Це життєво важливо, продовжуйте."
  generic_mission_events.24.b: "Ми не можемо відволікати таку кількість коштів на даний момент."
  generic_mission_events.25.title: "Сільське населення, що залишилося позаду"
  generic_mission_events.25.desc: "Оскільки наша політика все більше сприяє міським центрам та комерційним осередкам, сільські голоси стають неспокійними. У [target_province.GetName] сільські ради скаржаться на зростання податків, занедбаний розвиток та міграцію молоді до міст. Контраст між гамірними міськими ринками та тихими, забутими сільськогосподарськими угіддями загострюється з кожним днем. Деякі в нашому [ROOT.GetCountry.GetGovernment.GetCourtTitle] стверджують, що це неминучий результат сучасного зростання. Інші попереджають, що безконтрольне нехтування може перерости у повстання."
  generic_mission_events.25.a: "Така ціна прогресу."
  generic_mission_events.25.b: "Ми не можемо дозволити нашим сільським поселенням занепадати!"
  progress_towards_cap_economy_will_not_be_hindered_tt: "Наш прогрес до [ShowSocietyDirectionName('capital_economy')] [Concept('societal_value', 'CONCEPT_PLACEHOLDER')|e] не буде стримуватися"
  generic_mission_events.26.title: "Зростання [target_good.GetNameWithNoTooltip] промисловості"
  generic_mission_events.26.desc: "Сплеск попиту на [target_good.GetName] спричинив економічний бум у [target_location.GetName]. Нові майстерні, розширені ринки та збільшена торгівля перетворили [target_location.GetRank.GetName] на життєво важливий вузол у нашій зростаючій столичній економіці. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вітають цей розвиток, прагнучи посилити свій вплив.\n\nОднак голоси серед [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] шепочуть, що їхні землі поглинаються безконтрольним розширенням, з невеликою вигодою для тих, хто обробляє ґрунт."
  generic_mission_events.26.a: "Ми вітаємо цей розвиток."
  generic_mission_events.26.b: "Не будемо нехтувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  generic_mission_events.27.title: "[target_province.GetNameWithNoTooltip] чинить опір урбанізації"
  generic_mission_events.27.desc: "Наші зусилля щодо заохочення міського зростання в [target_province.GetName] зустріли значний опір! Місцеві звичаї та керівництво чинять опір реформам, побоюючись змін та боячись, що посилення бюрократії підірве їхню автономію.\n\nХоча відкритого непокори не виникло, уповільнення помітне. Міські планувальники та адміністратори скаржаться на перешкоди, затримки та відсутність співпраці. Це може бути першою ознакою глибшого опору нашій урбаністичній політиці."
  generic_mission_events.27.a: "Деяке тертя очікується."
  generic_mission_events.27.b: "Не будемо порушувати статус-кво."
  generic_mission_events.28.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] схвалюють суспільний прогрес"
  generic_mission_events.28.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] офіційно висловили свою підтримку нашому переходу до економіки, керованої столицею. На нещодавньому зібранні в [target_location.GetName] вони високо оцінили відданість нашого [ROOT.GetCountry.GetGovernment.GetCourtTitle] міським інвестиціям, торговельним стимулам та інфраструктурі.\n\nНа знак вдячності, і, можливо, щоб забезпечити подальшу прихильність, вони запропонували щедрий внесок до скарбниці, призначений для майбутніх зусиль з будівництва міст."
  generic_mission_events.28.a: "Ми дякуємо їм за їхній дар."