l_english:
  generic_colonize_explore: "Подорож у Невідоме"
  generic_colonize_explore_DESCRIPTION: "Поклик далеких обріїв та незайманих земель будить наші амбіції. Ми мусимо нанести на карту моря, відкрити нові території та розширити наш вплив, аби забезпечити майбутнє процвітання нашого королівства."
  generic_colonize_explore_CRITERIA_DESCRIPTION: "Ми або почали досліджувати незвідані води, або заклали основи для колоніальної експансії."
  generic_colonize_explore_BUTTON_TOOLTIP: "Невідоме пропонує безмежний потенціал для зростання, багатства та престижу. Ми мусимо прийняти його."
  generic_colonize_explore_BUTTON_DETAILS: "Величезний світ за нашими кордонами сповнений таємниць та можливостей. Досліджуючи незвідані регіони та засновуючи колонії, ми можемо забезпечити собі місце в історії та сформувати долю нашого королівства!"
  mission_hire_explorer: "Найняти Дослідників"
  mission_hire_explorer_desc: "Нам потрібні працьовиті дослідники, аби належним чином освоїти невідоме."
  mission_chart_horizon: "Нанести на карту Обрій"
  mission_chart_horizon_desc: "Експедиції шукачів пригод на суші та на морі освоять обрій, досліджуючи та створюючи карти земель, ніколи раніше не бачених нашим народом."
  mission_new_maps: "Нові Карти"
  mission_new_maps_desc: "Аби належним чином усвідомити важливість нових відкриттів, ми мусимо сприяти експедиціям для картографування та завершення нанесення на карту цих територій."
  mission_overseas_efforts: "Заморські Зусилля"
  mission_overseas_efforts_desc: "Стало очевидним, що ми стоїмо на порозі нової епохи. Рушити вперед і претендувати на невідомі землі — це викарбувати наше ім'я в анналах історії на століття вперед."
  mission_settle_horizon: "Заселити Обрій"
  mission_settle_horizon_desc: "Потреба в експансії змусила наших радників підтримати ідею відправлення людей до потенційних колоній. Приплив поселенців, безсумнівно, призведе до поширення знань та впровадження нових технологій, а також сировини."
  mission_colonial_ambitions: "Колоніальні Амбіції"
  mission_colonial_ambitions_desc: "Заселення чужих берегів та використання їхніх ресурсів — чудовий спосіб розширити наш торговельний вплив і, відповідно, нашу владу. З цією метою ми мусимо прагнути створити колоніальних підданих, готових служити та просувати наші інтереси."
  land_explo_key: "Якщо ми завершимо місію принаймні з #Y 1#! сухопутною [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e]:"
  yes_land_explo_bonus_tt: "@trigger_yes! $land_explo_key$"
  no_land_explo_bonus_tt: "@trigger_no! $land_explo_key$"
  sea_explo_key: "Якщо ми завершимо місію принаймні з #Y 1#! морською [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e]:"
  yes_sea_explo_bonus_tt: "@trigger_yes! $sea_explo_key$"
  no_sea_explo_bonus_tt: "@trigger_yes! $sea_explo_key$"
  mission_colonial_ambitions_tt: "Один з наших колоніальних [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] отримає #G зменшення#! до їхнього [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e]"
  mission_settle_horizon_tt: "Щомісячні [Concept('events', 'CONCEPT_PLACEHOLDER')|e] про наші колоніальні поселення можуть відбуватися, поки це [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] активне"
  generic_colonial_exploration_events.1.title: "Суперництво авантюристів"
  generic_colonial_exploration_events.1.desc: "Велика епоха картографування горизонтів породила покоління вправних навігаторів та авантюристів, які прагнуть розкрити невідоме. Серед них багато відомих дослідників, таких як [target_character_1.GetName] та [target_character_2.GetName], здобули популярність, кожен з яких прагне вирушити в путь і прославити своє ім'я.\n\nЇхня змагальна природа спонукала обох до більших висот, прагнучи перевершити один одного у майстерності та амбіціях. У міру того, як їхнє суперництво посилюється, один з них почав виділятися, його винятковий талант сяє яскравіше, ніж будь-коли раніше, готовий вести наш народ до ще більшої слави."
  generic_colonial_exploration_events.1.a: "Віддати перевагу [target_character_1.GetNameWithNoTooltip]."
  generic_colonial_exploration_events.1.b: "[target_character_2.GetNameWithNoTooltip] приведе нас до слави!"
  generic_colonial_exploration_events.1.c: "А як щодо [target_character_3.GetNameWithNoTooltip]?"
  generic_colonial_exploration_events.1.d: "Таку велич не можуть стримати прості особистості!"
  next_completed_exploration_will_fire_event_tt: "Наступна [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e], яку ми завершимо протягом #Y 10#! років, запустить [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  generic_colonial_exploration_events.2.title: "Майбутнє досліджень"
  generic_colonial_exploration_events.2.desc: "Після місяців небезпечних подорожей та ретельного картографування наші дослідники повернулися з детальними розповідями про далекі землі та незвідані води. Їхні знахідки надзвичайні, пропонуючи як негайні можливості для подальших експедицій, так і ідеї, що можуть просунути навігаційну науку.\n\nОднак [ROOT.GetCountry.GetGovernment.GetCourtTitle] розділений щодо того, як найкраще використати це багатство знань. Деякі виступають за надання повноважень найперспективнішому досліднику, щоб він продовжував розширювати межі, тоді як інші виступають за спрямування цих відкриттів у технологічний прогрес на благо майбутніх поколінь. Рішення, безсумнівно, визначить курс дослідницьких зусиль нашого народу."
  generic_colonial_exploration_events.2.a: "Фінансувати майбутні дослідження."
  generic_colonial_exploration_events.2.b: "Підтримати наших дослідників зараз."
  generic_colonial_exploration_events.3.title: "Майбутнє досліджень"
  generic_colonial_exploration_events.3.desc: "Поселенці в [target_charter.GetName] запропонували план навернення місцевих тубільців до [ROOT.GetCountry.GetReligion.GetName] і, згодом, до [ROOT.GetCountry.GetCulture.GetName] культури, вважаючи, що такі зусилля не тільки принесуть духовне просвітлення, але й сприятимуть тіснішій інтеграції з колонією.\n\nПрийнявши наші звичаї, тубільці могли б безпосередніше сприяти зростанню та процвітанню колонії. Однак таке починання вимагатиме значної фінансової підтримки від [ROOT.GetCountry.GetCapital.GetName] для фінансування місіонерської роботи та культурних програм. Хоча деякі розглядають це як життєво важливу інвестицію в майбутнє хартії, інші застерігають від втручання в спосіб життя тубільців, побоюючись, що це може порушити крихкий баланс у провінції."
  generic_colonial_exploration_events.3.a: "Ми фінансуватимемо ці спроби."
  generic_colonial_exploration_events.3.b: "Не будемо порушувати статус-кво."
  natives_left_undisturbed_tt: "#italic Тубільці в [target_charter.GetNameWithNoTooltip] залишаться недоторканими#!"
  generic_colonial_exploration_events.4.title: "Колонія набирає обертів"
  generic_colonial_exploration_events.4.desc: "Чутки про великі землі та багатообіцяючі можливості в [target_charter.GetName] почали поширюватися по всій батьківщині. Купці, фермери та авантюрні сім'ї захоплені розповідями про процвітання та свободу в цьому новому світі.\n\nЗаохочені успіхами перших поселенців, багато хто зараз готується вирушити в подорож через моря в пошуках кращого життя. Цей сплеск інтересу обіцяє збільшити населення колонії та прискорити її розвиток, перетворивши її на процвітаючий центр активності та зростання."
  generic_colonial_exploration_events.4.a: "Ми можемо лише сподіватися, що ця тенденція збережеться."