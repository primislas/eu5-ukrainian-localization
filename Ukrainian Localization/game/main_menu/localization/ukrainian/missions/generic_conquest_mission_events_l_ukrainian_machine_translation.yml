l_english:
  conquest_mission_events.1.title: "Пожертва на військові зусилля"
  conquest_mission_events.1.desc: "У міру зростання напруги та все більшої потреби у добре наповненій військовій скарбниці, впливові члени [target_estate.GetName] звернулися до [target_character.GetName] зі щедрою пропозицією. Визнаючи важливість військових зусиль країни, вони пообіцяли значну пожертву на підтримку військових дій.\n\nОднак така щедрість не обходиться без очікувань, оскільки [target_estate.GetNameWithNoTooltip] прагнуть використати цей внесок, щоб отримати більший вплив на справи [ROOT.GetCountry.GetFlavorRank]."
  conquest_mission_events.1.a: "Це значно допоможе поточним військовим зусиллям."
  conquest_mission_events.1.b: "Ввічливо подякувати їм за їхній жест і відмовитися."
  reject_the_advances_of_the_estate_tt: "#italic Ми відхилимо пропозиції [target_estate.GetNameWithNoTooltip]#!"
  conquest_mission_events.2.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] Протестують проти військової скарбниці"
  conquest_mission_events.2.desc: "У той час як [ROOT.GetCountry.GetGovernment.GetAdjective] [ROOT.GetCountry.GetGovernment.GetCourtTitle] зосереджується на накопиченні значної військової скарбниці для фінансування майбутніх військових кампаній, серед нижчих класів починає назрівати невдоволення. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], що страждають під тягарем збільшених податків і примусових внесків, відкрито висловили свої скарги.\n\nВони стверджують, що тягар війни не повинен так сильно лягати на їхні плечі, особливо коли багатші стани, здається, залишаються недоторканими. Ці протести, якщо їх не вирішити, можуть перерости у повномасштабні заворушення, загрожуючи стабільності [ROOT.GetCountry.GetFlavorRank]."
  conquest_mission_events.2.a: "Вони оплатять рахунок."
  conquest_mission_events.2.b: "Ми можемо надати деякі грошові поступки."
  conquest_mission_events.2.c: "Надати їм привілей натомість."
  conquest_mission_events.3.title: "Військові позики"
  conquest_mission_events.3.desc: "У міру інтенсифікації підготовки до великої військової кампанії, стани бачать можливість отримати прибуток від [ROOT.GetCountry.GetGovernment.GetAdjective] потреби у добре наповненій військовій скарбниці. Провідні фінансисти нашого [ROOT.GetCountry.GetFlavorRank] звернулися до [ROOT.GetCountry.GetGovernment.GetCourtTitle] із привабливою пропозицією: значна позика за конкурентними ставками, спрямована на фінансування поточних військових зусиль.\n\nОднак прийняття їхньої пропозиції може посилити їхній вплив, потенційно змістивши баланс сил між станами."
  conquest_mission_events.3.b: "Дуже добре, підписати позику."
  conquest_mission_events.3.c: "Ми не можемо собі цього дозволити."
  conquest_mission_events.3.a: "Забезпечити кращу угоду!"
  special_loan_with_lower_interest_tt: "Ця [Concept('loan', 'CONCEPT_PLACEHOLDER')|e] пропонується за нижчою [Concept('interest', 'CONCEPT_PLACEHOLDER')|e] ставкою"
  turn_away_the_loan_tt: "#italic Відхилити пропозицію наших [Concept('estates', 'CONCEPT_PLACEHOLDER')|e]"
  extra_special_loan_with_lower_interest_tt: "[Concept('loan', 'CONCEPT_PLACEHOLDER')|e] буде #G більшою#! сумою та #G ще нижчою#! [Concept('interest', 'CONCEPT_PLACEHOLDER')|e] ставкою завдяки навичкам переговорів [target_character.GetName]"
  conquest_mission_events.4.title: "Мародерство в [target_loot_location.GetNameWithNoTooltip]"
  conquest_mission_events.4.desc: "Полум'я війни поширилося неконтрольовано, залишаючи за собою спустошення. Колись процвітаюча провінція [target_loot_province.GetName] зазнала найбільшого удару конфлікту, коли мародерствуючі солдати та відчайдушні дезертири грабували поселення, розоряли ферми та залишали сільську місцевість у руїнах.\n\nПовідомлення про палаючі села, голодуючих селян та крах місцевої торгівлі досягли [ROOT.GetCountry.GetGovernment.GetCourtTitle], малюючи похмуру картину людських втрат війни. Якщо не вжити швидких заходів, тривала шкода від нашого мародерства може підірвати процвітання провінції на роки вперед."
  conquest_mission_events.4.a: "На війні як на війні."
  conquest_mission_events.4.b: "Вони лише трохи мародерствують!"
  conquest_mission_events.4.c: "Ми не можемо дозволити таку поведінку навколо [target_province.GetNameWithNoTooltip]!"
  conquest_mission_events.5.title: "Руйнівні наслідки війни"
  conquest_mission_events.5.desc: "Триваючий конфлікт дався нам взнаки. У міру його затягування, повідомлення про труднощі та невдоволення поширюються, як лісова пожежа. Села спорожніли від працездатних чоловіків, податки вищі, ніж будь-коли, а запаси стають все тоншими.\n\nПростий люд втомлюється від нескінченного кровопролиття та жертв, продиктованих [target_character.GetName]. Від гамірних міст до тихої сільської місцевості дух народу хитається, а шепіт незгоди стає все голоснішим. Якщо це залишити без уваги, ця зростаюча втома від війни може загрожувати стабільності [ROOT.GetCountry.GetFlavorRank]."
  conquest_mission_events.5.a: "Це лише голоси."
  conquest_mission_events.5.b: "Протидійте їм пропагандою!"
  conquest_mission_events.6.title: "Воєнні інновації"
  conquest_mission_events.6.desc: "Поки війна вирує, необхідність стала матір'ю інновацій. Тривалий конфлікт звів наші армії з іноземними ворогами та союзниками, кожен з яких володіє унікальними техніками та технологіями. Від захоплених ворожих облогових машин до покращеної тактики, спостереженої на полі бою, наші солдати та інженери почали переймати та вдосконалювати ці інновації.\n\nЦей обмін знаннями не лише покращив наші військові можливості, але й спричинив сплеск технологічних досягнень по всьому [ROOT.GetCountry.GetFlavorRank]."
  conquest_mission_events.6.a: "Ми вивчатимемо війну."
  conquest_mission_events.6.b: "Зосередитися на загальному розвитку."
  research_gained_scales_with_monthly_towards_innovative_tt: "Отриманий [Concept('research_progress', 'CONCEPT_PLACEHOLDER')|e] масштабується з нашим значенням [ShowModifierTypeName('monthly_towards_innovative')]"
  conquest_mission_events.7.title: "Прогрес інтеграції в [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.7.desc: "Зусилля з інтеграції в [target_province.GetName] неухильно прогресують. У [target_location.GetName] місцеве населення починає пристосовуватися до наших законів і звичаїв.\n\nРинки знову відкриваються, наша мова частіше чутна на вулицях, а опір згас у тихе прийняття. Хоча деякі традиції залишаються, регіон повільно узгоджується з ритмами нашого [ROOT.GetCountry.GetFlavorRank]."
  conquest_mission_events.7.a: "Посилити інтеграційні зусилля."
  conquest_mission_events.7.b: "Спробуймо поважати місцевих."
  locals_in_target_province_gain_mild_satisfaction_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_province.GetName] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  locations_in_target_province_receive_very_weak_bonus_integration_tt: "[Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у вищезгаданій [Concept('province', 'CONCEPT_PLACEHOLDER')|e], яку ми [Concept('integrating', 'CONCEPT_PLACEHOLDER')|e], отримають [ShowNamedValue('integration_progress_very_weak_bonus')|+=] прогресу [Concept('integration', 'CONCEPT_PLACEHOLDER')|e]"
  conquest_mission_events.8.title: "Опір інтеграції в [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.8.desc: "Опір у [target_province.GetName] залишається сильним. У [target_location.GetName] чиновники повідомляють про зростаючу непокору нашому правлінню та політиці.\n\nМісцеві лідери підривають наші реформи, а до наших прапорів ставляться з презирством. Населення чіпляється за старі звичаї, а наші зусилля з їх асиміляції зустрічаються мовчанням або відкритою зневагою."
  conquest_mission_events.8.a: "Їхні зусилля марні!"
  conquest_mission_events.8.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  conquest_mission_events.8.c: "Познайомити їх з батогом."
  locals_in_target_province_lose_mild_satisfaction_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в [target_province.GetName] втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  mission_ruler_or_regent_is_conqueror_tt: "Той невеликий опір, що зустрічається в [target_province.GetName], не має шансів проти [target_character.GetName]"
  conquest_mission_events.9.title: "Культурне поширення в [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.9.desc: "У [target_province.GetName] елементи нашої [target_culture.GetName] культури пускають коріння. У [target_location.GetName] починають з'являтися ознаки культурних змін.\n\nДіти вивчають нашу мову, поширюються одяг та звичаї зі столиці, а ідея ідентифікації з нашим [ROOT.GetCountry.GetFlavorRank] вже не є чужою для всіх. Зміни тонкі, але реальні."
  conquest_mission_events.9.a: "Усі люблять бути [target_culture.GetNameWithNoTooltip]?"
  conquest_mission_events.9.b: "Поширюймо ці спроби ще далі!"
  conquest_mission_events.9.c: "Наслідуймо приклад нашого великого [target_character.GetShortNameWithNoTooltip]!"
  conquest_mission_events.9.d: "Різноманіття — це сила!"
  conquest_mission_events.10.title: "Поширення релігії в [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.10.desc: "Народ [target_province.GetName] починає приймати нашу [target_religion.GetName].\n\nУ [target_location.GetName] невеликі зібрання формуються навколо проповідників, а в храмах тихо зростає кількість навернених. Віра виявляється потужним інструментом для об'єднання."
  conquest_mission_events.10.a: "Вони бачать світло!"
  conquest_mission_events.11.title: "Місцеві [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вимагають співпраці в [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.11.desc: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] [target_province.GetName] звернулися до нас, шукаючи ролі в нашій системі в обмін на свою вірність.\n\nУ [target_location.GetName] ці родини пропонують вплив, ресурси та місцевий контроль — але лише якщо їм будуть надані землі та привілеї. Їхня підтримка могла б полегшити інтеграцію, але ціною для простого люду та нашої влади."
  conquest_mission_events.11.a: "Краще знайомий диявол..."
  conquest_mission_events.11.b: "Вони не диктуватимуть нашу політику."
  conquest_mission_events.11.c: "Натомість підтримайте місцевих [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')]."
  conquest_mission_events.11.d: "Влада [target_character.GetShortNameWithNoTooltip] є беззаперечною."
  ruler_or_regent_too_strong_tt: "Правління [target_character.GetName] надто могутнє, щоб його оскаржували будь-які дрібні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]"