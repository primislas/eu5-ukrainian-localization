  goal_province_pops_get_10_satisfaction_tt: "Усі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у завойованій [Concept('province', 'CONCEPT_PLACEHOLDER')|e] здобудуть [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  mission_build_entrepot: "[ROOT.GetCountry.GetGovernment.GetAdjective|U] Антрепо"
  mission_build_entrepot_desc: "Наплив купців по наших землях є чудовою ознакою процвітання та прибутку. Ми повинні належним чином використовувати та заохочувати його, підтримуючи державними антрепо. Ця нова інфраструктура, безсумнівно, відкриє нові можливості для бізнесу та підвищить нашу торговельну важливість!"
  mission_build_entrepot_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Фільтруйте за @burghers![ShowPopTypeName('burghers')] [buildings] та натисніть на [ShowBuildingTypeName('entrepot')] [building] (Вам потрібно буде спочатку дослідити відповідний [Concept('advance_with_icon', 'CONCEPT_PLACEHOLDER')|e]!).\n\n@arrow_bonus_tier_1! Побудуйте його у вашому [Concept('market_center_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  mission_trade_capacity: "Торговельна спроможність"
  mission_trade_capacity_desc: "Охоплення наших купців повільно зростає. Важка і часто небезпечна професія. Вони подорожують до далеких земель, привозячи екзотичні товари, поширюючи ідеї та обмін технологіями. Наш обов'язок – надалі підтримувати їх та розширювати їхні можливості, щоб доповнити наше багатство в довгостроковій перспективі."
  mission_trade_capacity_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Фільтруйте за @burghers![ShowPopTypeName('burghers')] [buildings] та натисніть на [ShowBuildingTypeName('marketplace')] [building].\n\n@arrow_bonus_tier_1! Побудуйте стільки, скільки потрібно, натиснувши на список або на карту."
  generic_capital_economy: "Розвинути $capital_economy_focus$"
  generic_capital_economy_DESCRIPTION: "Жадібність, за відсутності кращого опису, це добре!"
  generic_capital_economy_CRITERIA_DESCRIPTION: "Ми заклали основу нової економіки, зосередженої на створенні капіталу через виробництво, торгівлю або позики."
  generic_capital_economy_BUTTON_TOOLTIP: "Багатство нашої держави полягає в багатствах наших міст. Ми використаємо їхній потенціал повною мірою та створимо промисловість для створення неперевершеної економіки!"
  generic_capital_economy_BUTTON_DETAILS: "$generic_capital_economy_BUTTON_TOOLTIP$"
  mission_grant_burghers_privileges: "Надати привілеї [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  mission_grant_burghers_privileges_desc: "Щоб закласти основу економічного підйому, ми повинні спочатку здобути довіру та прихильність купців. Надання їм привілеїв або значне зменшення податків може схилити їх на наш бік."
  mission_grant_burghers_privileges_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = estates', '@government_panel! Панель уряду > Стани')], щоб переглянути ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Надайте новий [Concept('privilege_with_icon', 'CONCEPT_PLACEHOLDER')|e] [GetEstateName('burghers_estate')].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
  up_to_4_locations_decaying_mod_based_on_crown_power_tt: "До #Y 4#! [Concept('urban_locations', 'CONCEPT_PLACEHOLDER')|e] будуть під впливом [ShowModifier('powerful_center_of_burghers_modifier')] [Concept('decaying_modifier', 'CONCEPT_PLACEHOLDER')|e] на основі нашої [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e]"
  up_to_5_locations_decaying_mod_based_on_crown_power_and_scale_dev_tt: "До #Y 5#! [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] отримають [Concept('development', 'CONCEPT_PLACEHOLDER')|e] на основі нашої [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e]. Зростання [Concept('development', 'CONCEPT_PLACEHOLDER')|e] залежатиме від [Concept('market_access', 'CONCEPT_PLACEHOLDER')|e] кожної локації до [Concept('market', 'CONCEPT_PLACEHOLDER')|e] [mission_target_market.GetName]"
  mission_setup_trade: "Заснувати торгівлю"
  mission_setup_trade_desc: "Для зростання нашої економіки нам потрібна налагоджена торговельна мережа. Будь-який імпорт чи експорт буде достатнім для наших купців, щоб здобути необхідний досвід для майбутніх підприємств."
  mission_setup_trade_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб переглянути вашу [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Здійсніть одну із запропонованих [trades], натиснувши на картку, і дайте пройти місяцю, щоб побачити, як вона працює.\n\n@arrow_bonus_tier_1! Альтернативно, ви можете автоматизувати всю торгівлю, натиснувши на @automation!#V Шестерню автоматизації#!\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_trade', '@hint! Підказка з торгівлі')]."
  mission_attracting_new_burghers: "Розвивати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  mission_attracting_new_burghers_desc: "Оскільки наша економіка планується навколо ідеї капіталу, ми повинні спочатку закласти для неї насіння. Нашим містам і містечкам потрібно більше ремісників, купців та інших членів поважного купецького стану."
  mission_attracting_new_burghers_tip: "@arrow_bonus_tier_3! Перейдіть до [location_with_icon], яку ви обрали для Місії.\n\n@arrow_bonus_tier_2! Натисніть на кнопку @burghers![ShowPopTypeName('burghers')] ліворуч від Панелі, щоб побачити [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ви можете побудувати для цього [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Розпочніть [Concept('construction_with_icon', 'CONCEPT_PLACEHOLDER')|e] [building] [ShowPopTypeName('burghers')], щоб збільшити їхню кількість."
  mission_embrace_capital_economy: "Прийняття $capital_economy_focus$"
  mission_embrace_capital_economy_desc: "Наша держава в минулому жила за ідеалами $traditional_economy_focus$. Однак ці методи недостатні для процвітаючого майбутнього, і тому ми приймемо сучасні ідеї $capital_economy_focus$."
  monthly_events_about_capital_economy_tt: "Щомісячні [Concept('events', 'CONCEPT_PLACEHOLDER')|e] про наші спроби прийняти [Concept('societal_value', 'CONCEPT_PLACEHOLDER')|e] [ShowSocietyDirectionName('capital_economy')] можуть відбуватися, поки це [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] активно виконується"
  mission_prepare_industry_focus: "Фокус на мануфактурах"
  mission_prepare_industry_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
  mission_prepare_trade_focus: "Фокус на торгівлі"
  mission_prepare_trade_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
  mission_prepare_loan_focus: "Фокус на позиках"
  mission_prepare_loan_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
  mission_expand_construction_materials: "Розширити виробництво будівельних матеріалів"
  mission_get_construction_materials_desc: "Перш ніж робити будь-які спроби збільшити наше виробництво, ми повинні спочатку забезпечити собі доступ до надійних будівельних матеріалів."
  mission_expand_construction_materials_desc: "$mission_get_construction_materials_desc$ Одним із таких способів було б збільшення експлуатації цих ресурсів на наших землях."
  mission_import_construction_materials: "Імпортувати будівельні матеріали"
  mission_import_construction_materials_desc: "$mission_get_construction_materials_desc$ Залучення до актів торгівлі, імпорту та експорту товарів є необхідністю."
  mission_secure_construction_material: "Flow of Construction Goods"
  mission_secure_construction_material_desc: "Ми повинні забезпечити надійне постачання матеріалів, необхідних для розширення наших будівельних робіт."
  mission_secure_production_resource: "Gain Production Goods"
  mission_secure_production_resource_desc: "Хоча будівельні ресурси потрібні для нових об'єктів нашого зростаючого підприємства, ми також повинні забезпечити потік матеріалів, необхідних для товарів, які ми хочемо виробляти та продавати."
  mission_secure_production_resource_tt: "Усі необхідні [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] для поточного [Concept('production_method', 'CONCEPT_PLACEHOLDER')|e] є в надлишку в [ROOT.GetCountry.GetCapital.GetMarket.GetName]"
  mission_construct_goods_industry: "Construct the Manufactories"
  mission_construct_goods_industry_desc: "Матеріали як для будівництва, так і для виробництва є на складі та готові до використання. Настав час заснувати мануфактури!"
  mission_satisfy_own_demands: "Satisfy our Demands"
  mission_satisfy_own_demands_desc: "Ми не можемо продавати нашу продукцію на зовнішні ринки, якщо наш власний народ гостро потребує її. Ми повинні спочатку задовольнити потреби мас, перш ніж зосередитися на отриманні прибутку."
  mission_export_produced_goods: "Export [ROOT.GetCountry.MakeScope.GetVariable('mission_target_goods').GetGoods.GetNameWithNoTooltip]"
  mission_export_produced_goods_desc: "Ми налагодили виробничий ланцюг для торгових товарів. Тепер наш обов'язок — поділитися ним зі світом."
  mission_create_profit: "Creation of Profit"
  mission_create_profit_desc: "$generic_capital_economy_CRITERIA_DESCRIPTION$"
  mission_expand_merchant_capacity: "Expanded Trade Capacities"
  mission_expand_merchant_capacity_desc: "Щоб розширити комерційні підприємства нашої держави, ми повинні спочатку забезпечити стабільний приплив завзятих купців, які купуватимуть і продаватимуть ці товари на наших ринках."
  mission_expand_merchant_capacity_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Фільтруйте за @burghers![ShowPopTypeName('burghers')] [buildings] і натисніть на [ShowBuildingTypeName('marketplace')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Будуйте його в [Concept('locations], що належать до необхідного [market_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете фільтрувати за ринком, встановивши відповідну картку ринку у верхній частині панелі.\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_trade', 'Підказка щодо торгівлі')]"
  mission_expand_merchant_power: "Influential Merchants"
  mission_expand_merchant_power_desc: "Щоб наші торговельні амбіції були успішними, наш вплив на ринку має бути беззаперечним. Будівництво [ShowBuildingTypeName('marketplace')] та подібних будівель буде великою допомогою для цього завдання."
  mission_expand_merchant_power_tip: "Існує кілька способів збільшити вашу [Concept('merchant_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e]:\n\n@arrow_bonus_tier_3! Володійте більшою кількістю [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e], що належать до цього [Concept('market].\n\n@arrow_bonus_tier_2! Збільште [maritime_presence_with_icon', 'CONCEPT_PLACEHOLDER')|e] у прибережних водах [Concept('market].\n\n@arrow_bonus_tier_1! Деякі [buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], як-от [ShowBuildingTypeName('marketplace')], також збільшують [merchant_power].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_increasing_trade_advantage', 'Підказка щодо торгової переваги')]"
  mission_get_into_profitable_export: "Art of Export"
  mission_get_into_profitable_export_desc: "Гроші можна заробити лише тоді, коли товари, які ми купуємо, продаються на ринках великого багатства. Встановлення експортних маршрутів є ключем до успіху."
  mission_get_into_profitable_export_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб переглянути вашу [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Здійсніть одну із запропонованих [trades], натиснувши на картку, і дайте пройти місяцю, щоб побачити, як вона йде.\n\n@arrow_bonus_tier_1! Альтернативно, ви можете автоматизувати всю торгівлю, натиснувши на @automation!#V Шестерню автоматизації#!\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_trade', '@hint! Підказка щодо торгівлі')]."
  mission_get_into_profitable_import: "Luxuries for the People"
  mission_get_into_profitable_import_desc: "Народ нашого внутрішнього ринку прагне екзотичних товарів, і ми доставимо їм ці рідкісні товари — звичайно, за правильну ціну."
  mission_get_into_profitable_import_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб переглянути вашу [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Здійсніть одну із запропонованих [trades], натиснувши на картку, і дайте пройти місяцю, щоб побачити, як вона йде.\n\n@arrow_bonus_tier_1! Альтернативно, ви можете автоматизувати всю торгівлю, натиснувши на @automation!#V Шестерню автоматизації#!\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_trade', '@hint! Підказка щодо торгівлі')]."
  mission_improve_market_worth: "Багатство [SCOPE.sMarket('mission_target_market').GetNameWithNoTooltip]"
  mission_improve_market_worth_desc: "Багатство нашої держави залежить від процвітання нашого внутрішнього ринку. Отже, в наших інтересах збільшувати багатство цього ринку."
  mission_improve_market_worth_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб побачити свою [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Здійсніть одну із запропонованих [trades], натиснувши на картку, і дайте місяцю пройти, щоб побачити, як вона спрацює.\n\n@arrow_bonus_tier_1! Альтернативно, ви можете автоматизувати всю торгівлю, натиснувши на @automation!#V Шестерню автоматизації#!\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_trade', '@hint! Підказка з торгівлі')]."
  mission_trade_in_new_markets: "Розширення на нові ринки"
  mission_trade_in_new_markets_desc: "Хоча наш внутрішній ринок є нашим основним комерційним центром, корисно розширювати наші горизонти, досліджувати та розширюватися на інші світові ринки."
  mission_trade_in_new_markets_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб побачити свою [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Здійсніть одну із запропонованих [trades], натиснувши на картку, і дайте місяцю пройти, щоб побачити, як вона спрацює.\n\n@arrow_bonus_tier_1! Альтернативно, ви можете автоматизувати всю торгівлю, натиснувши на @automation!#V Шестерню автоматизації#!\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_trade', '@hint! Підказка з торгівлі')]."
  mission_light_ships: "Забезпечити морську торгівлю"
  mission_light_ships_desc: "Внутрішня торгівля може забезпечити перевезення лише обмеженої кількості товарів. Настав час створити належний торговий флот, щоб значно розширити наш вплив."
  mission_light_ships_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('unit_overview', '', '@military_panel! Військо > Флоти')] і натисніть на [Concept('regular_ship_icon] #V Будувати кораблі#!, щоб побудувати [regular_ships', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Будуйте кораблі [ShowUnitCategoryName('navy_light_ship')] [Concept('unit_category', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Якщо вам потрібні [Concept('sailors_with_icon', 'CONCEPT_PLACEHOLDER')|e], можливо, вам доведеться побудувати відповідні [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] з [Link('production', 'naval_category', '@military_panel! Виробництво > Морські будівлі')].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_trade', '@hint! Підказка з торгівлі')]."
  mission_embrace_capital_economy_trade_focus: "Багатий купець"
  mission_embrace_capital_economy_trade_focus_desc: "Бути посередником у торгівлі необхідними та екзотичними товарами призведе до створення багатства, немислимого навіть для найжадібнішого серця!"
  requirements_for_this_task_arent_available_yet_tt: "Вимоги цього [Concept('task', 'CONCEPT_PLACEHOLDER')|e] недоступні, доки його [Concept('mission', 'CONCEPT_PLACEHOLDER')|e] не стане активним"
  capable_cabinet: "Здатний кабінет"
  capable_cabinet_DESCRIPTION: "Рада здібних радників допоможе нам сприяти процвітанню та ефективності"
  capable_cabinet_CRITERIA_DESCRIPTION: "Наш кабінет ефективний, а також укомплектований здібними особами."
  capable_cabinet_BUTTON_TOOLTIP: "Делегування радницьких місць є ключовим для належного управління нашими землями"
  capable_cabinet_BUTTON_DETAILS: "$capable_cabinet_BUTTON_TOOLTIP$"
  mission_create_cabinet: "Створити кабінет"
  mission_create_cabinet_desc: "Наші володіння занадто великі, щоб належним чином управляти ними без довіреного кабінету. Нам потрібна допомога здібних і досвідчених радників!"
  mission_create_cabinet_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Уряд > Кабінет')] або натисніть на [Concept('cabinet_actions_icon] #W Сповіщення#!, щоб побачити свої [cabinet_actions', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Призначте [Concept('character', 'CONCEPT_PLACEHOLDER')|e] з найвищою відповідною [Concept('ability', 'CONCEPT_PLACEHOLDER')|e] на порожнє [Concept('cabinet_seat', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Найміть нового [Concept('courtier', 'CONCEPT_PLACEHOLDER')|e], якщо у нас немає хороших доступних [characters]. \n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$ Підказка')] та [Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$ Підказка')].#!"
  mission_promote_cabinet_head: "Голова кабінету"
  mission_promote_cabinet_head_desc: "Було б мудро призначити здібного лідера для нагляду за кабінетом та керівництва нашою адміністрацією."
  mission_promote_cabinet_head_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Уряд > Кабінет')].\n\n@arrow_bonus_tier_2! Натисніть кнопку [Concept('head_of_the_cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e] поруч з ім'ям [Concept('cabinet_member_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Ви також можете призначити [Concept('head_of_the_cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e] з #V Дій персонажа#! на #V Панелі персонажа#!. \n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$ Підказка')] та [Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$ Підказка')].#!"
  mission_enact_government_reforms: "Запровадити урядові реформи"
  mission_enact_government_reforms_desc: "Потреба краще визначити наше правління стала очевидною. Якщо ми хочемо встановити стабільність та посилити центральну владу, ми повинні подбати про прийняття необхідних реформ."
  mission_enact_government_reforms_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = estates', '@government_panel! Уряд > Стани')].\n\n@arrow_bonus_tier_2! Натисніть #V кнопку «Плюс» #!у нижньому правому куті картки [ShowEstateTypeName('crown_estate')], щоб вибрати одну з доступних [Concept('reforms_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! [Concept('government_reforms] коштують [stability_with_icon', 'CONCEPT_PLACEHOLDER')|e] для скасування та потребують багато часу для впровадження. Обирайте їх обережно. \n\n #italic Щоб дізнатися більше, перегляньте [Link('hints', 'selected_hint = hint_has_possible_reform', '$hint_has_possible_reform$ Підказка')] та [Link('hints', 'selected_hint = hint_crown_power', '$hint_crown_power$ Підказка')].#!"
  mission_increase_cabinet_efficiency: "Підвищити ефективність Кабінету"
  mission_increase_cabinet_efficiency_desc: "Оптимізувавши операції та покращивши координацію в нашому кабінеті, ми надамо краще керівництво нашому народу та забезпечимо краще майбутнє."
  mission_increase_cabinet_efficiency_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Уряд > Кабінет')].\n\n@arrow_bonus_tier_2! Перевірте свою поточну [Concept('cabinet_efficiency_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Це [Concept('mission_task_with_icon', 'CONCEPT_PLACEHOLDER')|e] займе #V 180 днів#! і може бути розпочате в будь-який час. \n\n #italic Щоб дізнатися більше, перегляньте [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$ Підказка')] та [Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$ Підказка')].#!"
  meritocratic_approach: "Меритократичний підхід"
  meritocratic_approach_desc: "Враховуючи, що наш кабінет має величезну владу у визначенні нашого підходу до різних щоденних та важливих питань, ми повинні переконатися, що чоловіки та жінки в ньому є здібними та відмінними у своїй галузі."
  meritocratic_approach_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Уряд > Кабінет')].\n\n@arrow_bonus_tier_2! Перевірте своїх поточних [Concept('cabinet_members_with_icon', 'CONCEPT_PLACEHOLDER')|e] та замініть їх, якщо їхня [Concept('ability_with_icon', 'CONCEPT_PLACEHOLDER')|e], пов'язана з обраною [Concept('cabinet_action_with_icon', 'CONCEPT_PLACEHOLDER')|e], занадто низька.\n\n@arrow_bonus_tier_1! Розгляньте можливість найняти нового [Concept('courtier', 'CONCEPT_PLACEHOLDER')|e], якщо у нас немає доступних хороших [characters]. \n\n #italic Щоб дізнатися більше, перегляньте [Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$ Підказка')].#!"
  royal_authority: "Королівська влада"
  royal_authority_desc: "Влада, яку мають наші прапори, пера, що підписують законодавчі акти, та проголошення указів і законів, усе це має бути підкріплене потужною, шанованою центральною владою."
  royal_authority_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('economy', 'tabcontent = balance', '@economy_panel! Економіка > Баланс')].\n\n@arrow_bonus_tier_2! Збільшення [Concept('court_maintenance', 'CONCEPT_PLACEHOLDER')|e] для підвищення [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Оберіть [Concept('cabinet_action_with_icon', 'CONCEPT_PLACEHOLDER')|e] під назвою [ShowCabinetActionName('strengthen_government')]. \n\n #italic Щоб дізнатися більше, перегляньте [Link('hints', 'selected_hint = hint_low_legitimacy', '$hint_low_legitimacy$ Підказка')].#!"
  high_era_of_countryname: "Висока епоха [ROOT.GetCountry.GetNameWithNoTooltip]"
  high_era_of_countryname_desc: "Належне управління, щасливий народ та держава, яка адекватно дбає про своїх громадян, – ось деякі з факторів, що приведуть нас до епохи процвітання та спокою."
  high_era_of_countryname_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('economy', 'tabcontent = balance', '@economy_panel! Економіка > Баланс')] та інвестуйте в [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Доручіть [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('stabilize_country')]\n\n@arrow_bonus_tier_1! Збільшення кількості [GetPlayer.GetReligion.GetAdjective] [ShowPopTypeName('clergy')] шляхом будівництва [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [ShowPopTypeName('clergy')]. \n\n #italic Щоб дізнатися більше, перегляньте [Link('hints', 'selected_hint = hint_low_stability', '$hint_low_stability$ Підказка')].#!"
  development_of_infrastructure: "Зусилля з інфраструктури"
  development_of_infrastructure_DESCRIPTION: "Належне створення інфраструктури навколо нашої столиці має життєво важливе значення."
  development_of_infrastructure_CRITERIA_DESCRIPTION: "Ми адекватно розвинули нашу столицю."
  development_of_infrastructure_BUTTON_TOOLTIP: "Наша столиця слугуватиме серцем процвітаючої та постійно зростаючої нації."
  development_of_infrastructure_BUTTON_DETAILS: "$development_of_infrastructure_BUTTON_TOOLTIP$"
  mission_assembly_halls: "Зали засідань"
  mission_assembly_halls_desc: "Якщо ми хочемо належним чином здійснювати нашу владу та контролювати наші володіння, нам потрібна належна зала засідань у нашій столиці."
  mission_assembly_halls_tip: "@arrow_bonus_tier_3! Перейдіть до вашої [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Натисніть кнопку @nobles! [ShowPopTypeName('nobles')] ліворуч від панелі, щоб побачити [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ви можете побудувати для цього [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Розпочніть [Concept('construction_with_icon', 'CONCEPT_PLACEHOLDER')|e] запитуваної [building]."
  mission_capital_province_prosperity: "Процвітання столиці"
  mission_capital_province_prosperity_desc: "Розвиток столичної провінції сприятиме процвітанню та забезпечить її домінування в регіоні."
  a_great_capital: "Велика столиця"
  a_great_capital_desc: "Щоб побудувати велике суспільство і бути сяючим світлом для нашого народу, ми повинні спочатку звести величну столицю, серце нашого славетного домену!"
  a_great_capital_tip: "@arrow_bonus_tier_3! Перейдіть до своєї [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], @location![Concept('Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Натисніть кнопку @construction! #V Будівництво#! на картці локації вгорі.\n\n@arrow_bonus_tier_1! Розпочніть [construction_with_icon', 'CONCEPT_PLACEHOLDER')|e] запитаної кількості [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]."
  this_will_depend_on_how_many_buildings_our_capital_has_in_total_tt: "Отриманий [Concept('development', 'CONCEPT_PLACEHOLDER')|e] частково залежить від загальної кількості [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] у нашій [Concept('capital', 'CONCEPT_PLACEHOLDER')|e]"
  mission_capital_province_control: "Контроль навколо столиці"
  mission_capital_province_control_desc: "Суть нашого впливу та осердя нашої влади лежить на землях, що оточують нашу столицю. Ми повинні якнайшвидше збільшити наш контроль над ними."
  mission_capital_province_control_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Панель уряду > Кабінет')] щоб побачити свій [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Призначте [Concept('cabinet_member_with_icon', 'CONCEPT_PLACEHOLDER')|e] до [ShowCabinetActionName('increase_control_province')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] над [Concept('province_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('Player.GetCapital.GetProvince.GetName].\n\n@arrow_bonus_tier_1! Ви також можете перейти до своєї [capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('Player.GetCapital.GetName], і натиснути кнопку #V Побудувати дорогу#!, щоб побудувати [road_with_icon', 'CONCEPT_PLACEHOLDER')|e] до сусідньої [Concept('location', 'CONCEPT_PLACEHOLDER')|e] для збільшення її [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_control', '@hint! Підказка $hint_control$')]."
  mission_capital_town: "Заснувати місто"
  mission_capital_town_desc: "Якщо ми хочемо сприяти збільшенню доходів і трафіку в нашому королівстві, ми повинні заснувати нове місто."
  mission_capital_town_tip: "@arrow_bonus_tier_3! Перейдіть до своєї [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], @location![Concept('Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Натисніть на іконку [rural_location_icon] [location_rank', 'CONCEPT_PLACEHOLDER')|e] у верхньому лівому куті, всередині Картки локації, щоб покращити [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Concept('rural_location_with_icon', 'CONCEPT_PLACEHOLDER')|e] до @town! [ShowLocationRankName('town')]."
  mission_capital_city: "Хвиля урбанізації"
  mission_capital_city_desc: "Заохочуйте зростання та розвиток, щоб перетворити нашу столицю на процвітаюче місто. Великий міський центр стане початком великої епохи!"
  mission_capital_city_tip: "@arrow_bonus_tier_3! Перейдіть до своєї [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], @location![Concept('Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Натисніть на іконку [location_rank', 'CONCEPT_PLACEHOLDER')|e] у верхньому лівому куті, всередині Картки локації, щоб покращити [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e] з @town! [ShowLocationRankName('town')] до @city! [ShowLocationRankName('city')]."
  burghers_capital_grow_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ShowPopTypeName('burghers')] у нашій [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] зростатимуть у кількості"
  mission_capital_city2: "$mission_capital_city$"
  mission_capital_city2_desc: "$mission_capital_city_desc$"
  mission_capital_city2_tip: "$mission_capital_city_tip$"
  if_we_complete_as_city_we_gain_x_tt: "@trigger_no! Якщо ми виконаємо це [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e], коли наша [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] матиме [Concept('location_rank', 'CONCEPT_PLACEHOLDER')|e] #Y Місто#!, вона отримає [ShowModifier('center_of_urbanization_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 10#! років"
  mission_food_investment: "Інвестиції в їжу"
  mission_food_investment_desc: "Ті, хто працює на наших полях, у шахтах і сприяє нашому уряду, потребують їжі. Тому ми повинні прагнути забезпечити наших людей їжею та захистити їх від голоду."
  mission_food_investment_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('food_production', '', '@production_panel! Панель виробництва > Їжа')] щоб побачити список ваших [Concept('provinces_with_icon', 'CONCEPT_PLACEHOLDER')|e] та їхню ситуацію з [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Натисніть на Картки провінцій, щоб побачити їхні [Concept('locations_with_icon], та розширте [food_raw_materials', 'CONCEPT_PLACEHOLDER')|e] у тих, що мають найвищу [Concept('food_productivity_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Ви також можете натиснути на [building_icon] #V кнопку [building]#!, щоб побачити [food] [buildings], доступні в цій [location].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_food', '@hint! Підказка про їжу')]."
  every_location_in_cap_prov_food_provisions_modifier: "Кожна володіння [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowModifier('capital_food_provisions_modifier')] на #Y 5#! років"
  mission_build_roads: "Всі дороги ведуть до [ROOT.GetCountry.GetCapital.GetName]"
  mission_build_roads_desc: "Життєдайною силою та нервовою системою нашого великого домену стане нова дорожня мережа, що з'єднає нашу столицю з найближчими поселеннями навколо неї. Розширте дорожню мережу, щоб покращити сполучення та торгівлю в регіоні!"
  mission_build_roads_tip: "@arrow_bonus_tier_2! Перейдіть до своєї [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('Player.GetCapital.GetName], і натисніть кнопку #V Побудувати дорогу#!.\n\n@arrow_bonus_tier_1! Побудуйте [road_with_icon', 'CONCEPT_PLACEHOLDER')|e] до сусідньої [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  mission_task_will_be_bypassed_tt: "Це [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] буде пропущено"
  mission_home_region_control: "Контролювати регіон"
  mission_home_region_control_desc: "Оподатковуваний дохід, що поповнить нашу скарбницю, часто вислизає з наших рук. Наші бальї та адміністратори повинні встановити панування над навколишнім регіоном, щоб зміцнити вплив нашої столиці."
  mission_home_region_control_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Government Panel > Cabinet')], щоб побачити свій [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Призначте [Concept('cabinet_member_with_icon', 'CONCEPT_PLACEHOLDER')|e] до [ShowCabinetActionName('increase_control_province')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] у [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] в [Concept('region_with_icon', 'CONCEPT_PLACEHOLDER')|e] регіону [Concept('Player.GetCapital.GetProvince.GetArea.GetRegion.GetName].\n\n@arrow_bonus_tier_1! Ви також можете будувати [roads_with_icon', 'CONCEPT_PLACEHOLDER')|e] від вашої [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб збільшити [Concept('control_with_icon', 'CONCEPT_PLACEHOLDER')|e] у [region].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_control', '@hint! $hint_control$ Підказка')]."
  will_scale_with_average_home_region_control_tt: "Це буде масштабуватися з нашим середнім [Concept('control', 'CONCEPT_PLACEHOLDER')|e] по всьому нашому рідному [Concept('region', 'CONCEPT_PLACEHOLDER')|e]"
  mission_push_for_centralization: "Прагнення до Централізації"
  mission_push_for_centralization_desc: "Накопичення влади під централізованою владою безсумнівно є сміливим і необхідним кроком, якщо ми бажаємо далі поширювати свій вплив і зберігати свою владу. В ім'я процвітання та народу, що підтримує наше правління, ми повинні прагнути вигнати елементи децентралізації та направити країну на кращий шлях."
  mission_push_for_centralization_tip: "$change_societal_value_tip$"
  monthly_events_about_centralization_tt: "Щомісячні [Concept('events', 'CONCEPT_PLACEHOLDER')|e] щодо наших спроб централізації можуть відбуватися, поки це [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] активно виконується"
  progress_and_literacy: "Прогрес та Грамотність"
  progress_and_literacy_DESCRIPTION: "Дбати про потреби нашого народу в грамотності є першочерговим."
  progress_and_literacy_CRITERIA_DESCRIPTION: "Наш народ був освічений, і його грамотність підвищена."
  progress_and_literacy_BUTTON_TOOLTIP: "Нехай наші кордони стануть домом для світлих умів та піонерів інноваційної думки!"
  progress_and_literacy_BUTTON_DETAILS: "$progress_and_literacy_BUTTON_TOOLTIP$"
  mission_ensure_book_production: "Забезпечити Виробництво Книг"
  mission_ensure_book_production_desc: "Наше прагнення забезпечити знання та грамотність починається з надання книг. Фінансування кожного нового друкарського центру посилить виробництво книг для поширення знань та грамотності по наших землях."
  mission_ensure_book_production_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('goods_production', '', '@production_panel! Production Panel > Goods')] і знайдіть @books! [ShowGoodsName('books')] [Concept('good', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Натисніть на [Concept('building_icon] кнопку #V Building#!, щоб відфільтрувати всі [buildings', 'CONCEPT_PLACEHOLDER')|e], що виробляють [ShowGoodsName('books')], які можна побудувати у вашій [Concept('country].\n\n@arrow_bonus_tier_1! Побудуйте #V 3#! у будь-якому [location', 'CONCEPT_PLACEHOLDER')|e]."
  mission_new_institutions: "Нові Установи"
  mission_new_institutions_desc: "Прагнення до іноземних знань лише послужить для забезпечення нас новими технологіями та різними перевагами."
  mission_found_libraries: "Заснувати Бібліотеки"
  mission_found_libraries_desc: "Ми повинні звести бібліотеки, щоб зберегти знання та служити центрами освіти."
  mission_found_libraries_tip: "@arrow_bonus_tier_2! Перейдіть до [Link('production', '', '@production_panel! Production Panel > Buildings')] і знайдіть [ShowBuildingTypeName('library')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Натисніть на будівлю, щоб побудувати її в будь-якому з ваших [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  mission_wave_of_innovation: "Хвиля Інновацій"
  mission_wave_of_innovation_desc: "Народ прагне знань! Щоб втамувати цей голод, було б мудро заохочувати інноваційні ідеї для розвитку науки та культури в нашому домені, щоб не ризикувати відстати від наших сусідів."
  mission_build_chancery: "Канцелярія"
  mission_wave_of_innovation_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('societal_values', '', '@government_panel! Government Panel > Values')], щоб перевірити ваші [Concept('societal_values_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Government Panel > Cabinet')], щоб побачити свій [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Призначте [Concept('cabinet_member_with_icon', 'CONCEPT_PLACEHOLDER')|e] до [ShowCabinetActionName('change_societal_values')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '@hint! $hint_has_possible_cabinet_action$')] та [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '@hint! $hint_lack_cabinet_for_cabinet_action$')] Підказки."
  mission_build_chancery_desc: "Зростаюча територія наших численних поселень збільшує потребу в полегшенні адміністрації та судових процесів. Щоб приборкати це, ми повинні заснувати належну [ShowBuildingTypeName('chancery')] для нагляду за урядом."
  mission_theatrical_expression: "Театральне мистецтво"
  mission_theatrical_expression_desc: "Наше серце, душа та сутність нашої культури спочивають у творчому вираженні нашого мистецтва."
  mission_islamic_colleges: "Ісламські коледжі"
  mission_islamic_colleges_desc: "Вивчення священних писань та збереження знань — наш священний обов'язок. Тому ми повинні розвивати різні медресе, щоб навчати людей та розвивати ісламську науку."
  mission_houses_of_wisdom: "Будинки Мудрості"
  mission_houses_of_wisdom_desc: "Поширення знань та прагнення до вищого інтелектуалізму процвітатиме в кожному новому [ShowBuildingTypeName('university')]."
  four_locations_gain_development_tt: "До #Y 4#! [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з найвищою [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e] та [ShowBuildingTypeName('university')] отримають [ShowNamedValue('development_mild_bonus')|+] [Concept('development', 'CONCEPT_PLACEHOLDER')|e]."
  mission_advances_technology: "Технологічні досягнення"
  mission_advances_technology_desc: "Ми повинні інвестувати в технологічні досягнення, щоб забезпечити конкурентоспроможність нашого народу."
  mission_advances_technology_tip: "@arrow_bonus_tier_3! Перейдіть до @advances_panel![Link('advances', 'subtab = research', 'lateralview_advances_entry_name')] та оберіть Досягнення, яке відповідає вашим потребам.\n\n@arrow_bonus_tier_2! Ви також можете натиснути на порожню іконку колби у верхньому правому куті, щоб відкрити всю @advances_panel![Link('technology_view', '', 'lateralview_technology_view_entry_name')].\n\n@arrow_bonus_tier_1! Пам'ятайте, що ви можете автоматизувати наші Дослідження з @automation![Link('automation', '', 'lateralview_automation_entry_name')].\n\n #italic Щоб дізнатися більше, ви можете перевірити [Link('hints', 'selected_hint = hint_can_do_more_research', '@hint! $hint_can_do_more_research$ Підказка')]#!."
  researched_5_new_advances_tt: "Ми дослідили щонайменше #Y 3#! нових [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] з моменту активації [ShowMissionName('progress_and_literacy')] [Concept('mission', 'CONCEPT_PLACEHOLDER')|e]"
  mission_raise_literacy: "Підвищення грамотності"
  mission_raise_literacy_desc: "Грамотність — це сад, який потребує догляду та ретельного розвитку. Навчати населення — означає забезпечити світле майбутнє!"
  mission_raise_literacy_tip: "Існує низка речей, які ви можете зробити, щоб покращити [Concept('literacy_with_icon', 'CONCEPT_PLACEHOLDER')|e] у вашій [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]:\n$TAB$@arrow_bonus_tier_1! Збільште кількість [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('upper_class', 'CONCEPT_PLACEHOLDER')|e], будуючи [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Link('production', '', '@production_panel! Панель виробництва > Будівлі')].\n$TAB$@arrow_bonus_tier_1! Будуйте [ShowBuildingTypeName('library')] будівлі у ваших найбільш населених [Concept('locations].\n$TAB$@arrow_bonus_tier_1! Досліджуйте [advances_with_icon', 'CONCEPT_PLACEHOLDER')|e], які збільшують [literacy]. Ви можете зробити це з [Link('technology_view', '', '@advances_panel! $lateralview_technology_view_entry_name$')].\n$TAB$@arrow_bonus_tier_1! Оновлюйте [Concept('rural_locations', 'CONCEPT_PLACEHOLDER')|e] до [Concept('urban_locations', 'CONCEPT_PLACEHOLDER')|e].\n\n #italic Ви можете перевірити свою поточну [literacy] з @advances_panel![Link('advances', '', 'lateralview_advances_entry_name')]#!."
  mission_ensure_book_production_reward_tt: "Наша [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з найвищим [Concept('development', 'CONCEPT_PLACEHOLDER')|e] та [Concept('market_access', 'CONCEPT_PLACEHOLDER')|e], що виробляє [ShowGoodsName('books')], отримає згасаючий [ShowModifier('center_of_writing_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] на #Y 10#! років."
  scales_with_number_of_libraries: "Масштабується з кількістю повністю укомплектованих [ShowBuildingTypeName('library')] [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]"
  every_location_with_theater_pops_gain_10_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з [ShowBuildingTypeName('theater')] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  monthly_events_about_research_and_thought_tt: "Щомісячні [Concept('events', 'CONCEPT_PLACEHOLDER')|e] про наші спроби поширити інновації та прогрес можуть відбуватися, поки це [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] активно виконується"
  estate_cooperation: "Співпраця зі станами"
  estate_cooperation_DESCRIPTION: "Було б мудро для нас шукати добрих стосунків із впливовими станами в межах наших кордонів."
  estate_cooperation_CRITERIA_DESCRIPTION: "Ми налагодили кращі стосунки між нами та одним із наших станів"
  estate_cooperation_BUTTON_TOOLTIP: "Ми використаємо вплив могутнього стану, щоб просунути наші плани та створити процвітаюче суспільство."
  estate_cooperation_BUTTON_DETAILS: "$estate_cooperation_BUTTON_TOOLTIP$"
  mission_select_estate: "Оберіть [Concept('estate', 'CONCEPT_PLACEHOLDER')|e]"
  mission_select_no_estate: "@trigger_no! Немає доступних [Concept('estates', 'CONCEPT_PLACEHOLDER')|e]."
  used_bribe_5_years_tt: "Ми використовували [Concept('action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('bribe_estate')] для [mission_target_estate.GetName] за останні #Y 5#! років"
  mission_estate_privileges: "Надати Привілеї"
  mission_estate_privileges_desc: "Щоб забезпечити співпрацю [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], ми повинні надати їм деякі посади та привілеї."
  mission_estate_privileges_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = estates', '@government_panel! Панель Уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Надайте новий [Concept('privilege_with_icon', 'CONCEPT_PLACEHOLDER')|e] обраному [Concept('estate], натиснувши на #V кнопку «Плюс»#!.\n\n@arrow_bonus_tier_1! Оберіть [privilege], що збільшує [estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_estates', '@hint! Підказка про Стани')]."
  monthly_events_about_the_scoped_estate_tt: "Щомісячні [Concept('events', 'CONCEPT_PLACEHOLDER')|e] щодо [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] можуть відбуватися, поки це [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] активно виконується."
  mission_capital_influence: "Вплив Столиці"
  mission_capital_influence_desc: "Зростаюча присутність та вплив членів [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] у нашій столиці призведе до більшого спокою та координації."
  mission_capital_influence_tip: "@arrow_bonus_tier_3! Перейдіть до вашої [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], @location![Concept('Player.GetCapital.GetName], щоб побачити її [buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Переконайтеся, що більшість її [Concept('buildings] повністю [employed', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Ви можете збільшити [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб допомогти з [ShowModifierTypeName('local_pop_promotion_speed')].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_lack_pop_promotion_to_fill_buildings', '@hint! Підказка про Стани')]."
  mission_fund_construction_projects: "Фінансування Будівельних Проєктів"
  mission_fund_construction_projects_desc: "Щоб продемонструвати нашу готовність до співпраці з [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], ми заохочуватимемо наших інженерів фінансувати будівельні проєкти для прискорення розвитку та покращення об'єктів стану."
  mission_fund_construction_projects_tip: "@arrow_bonus_tier_3! Перейдіть до вашої [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], @location![Concept('Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Натисніть на відповідну кнопку [pop_type_with_icon', 'CONCEPT_PLACEHOLDER')|e] ліворуч від Панелі, щоб побачити [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ви можете побудувати для цього [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Розпочніть [Concept('construction_with_icon', 'CONCEPT_PLACEHOLDER')|e] запитуваної [building]."
  mission_estate_satisfaction: "Здобути Прихильність у [mission_target_estate.GetName]"
  mission_estate_satisfaction_desc: "Для наших внутрішніх справ життєво важливо працювати над здобуттям прихильності впливового [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] для наших майбутніх починань."
  mission_estate_satisfaction_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = estates', '@government_panel! Панель Уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
  mission_shared_enrichment: "Спільне Збагачення"
  mission_shared_enrichment_desc: "Належне оподаткування, реєстри та забезпечене збагачення [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] встановлять високий стандарт оподаткування по всьому нашому володінню."
  mission_shared_enrichment_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = estates', '@government_panel! Панель Уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! [ShowGenericActionName('bribe_estate')] натиснувши на #V кнопку «Підкупити»#!.\n\n@arrow_bonus_tier_1! Ви також можете знизити [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e] для [estate] з [Link('economy', '', '@economy_panel!$lateralview_economy_entry_name$ > Бюджет')] і зачекати, поки вони накопичать багатство.\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_estates', '@hint! Підказка про Стани')]."
  mission_shape_society: "Формувати Суспільство"
  mission_shape_society_desc: "Течії змін проносяться залами влади в наших володіннях. Якщо ми хочемо піднести та розвинути міцний зв'язок між нашим двором та [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], тоді ми повинні відповідно формувати наше суспільство."
  mission_shape_society_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('societal_values', '', '@government_panel! Панель Уряду > Цінності')], щоб перевірити ваші [Concept('societal_values_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Панель Уряду > Кабінет')], щоб побачити ваш [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Призначте [Concept('cabinet_member_with_icon', 'CONCEPT_PLACEHOLDER')|e] до [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('change_societal_values')].\n\n #italic Щоб дізнатися більше, ви можете переглянути підказки [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '@hint! $hint_has_possible_cabinet_action$')] та [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '@hint! $hint_lack_cabinet_for_cabinet_action$')]."
  target_mission_pop_gets_20_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що належать до [Concept('mission_target_estate.GetNameWithNoTooltip] у нашій [capital', 'CONCEPT_PLACEHOLDER')|e], отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_of_estate_10_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [Concept('mission_target_estate.GetNameWithNoTooltip], що належать до нашої [culture', 'CONCEPT_PLACEHOLDER')|e] та [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] #italic по всій нашій країні#!, отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_of_no_estate_10_satisfaction_tt: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] обраного [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], що належать до нашої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] та [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] #italic по всій нашій країні#!, отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  generic_traditional_economy: "Традиційна Економіка"
  generic_traditional_economy_DESCRIPTION: "Сила нашої нації полягає у випробуваних та перевірених методах економічного управління, які служили нашому народу протягом поколінь."
  generic_traditional_economy_CRITERIA_DESCRIPTION: "Ми прийняли цінності та системи традиційної, стабільної економіки."
  generic_traditional_economy_BUTTON_TOOLTIP: "Зміцнюючи нашу традиційну економіку, ми закладаємо фундамент для тривалого процвітання та суспільної гармонії."
  generic_traditional_economy_BUTTON_DETAILS: "$generic_traditional_economy_BUTTON_TOOLTIP$"
  mission_increase_workforce: "Розширити робочу силу"
  mission_increase_workforce_desc: "Щоб підтримувати нашу зростаючу економіку та амбіції, що розквітають, ми повинні забезпечити, щоб наша робоча сила була як великою, так і спроможною. Розширення робочої сили дозволить нам здійснювати ширший розвиток на наших землях."
  mission_connect_location_to_capital: "Дорога до [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  mission_connect_location_to_capital_desc: "Серце нашого царства повинно залишатися пов'язаним з його кінцівками. Забезпечуючи зв'язок наших поточних зусиль зі столицею, ми зміцнюємо єдність і силу місцевої адміністрації, а також збір податків і сировини."
  mission_connect_location_to_capital_tip: "@arrow_bonus_tier_2! Перейдіть до своєї [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('Player.GetCapital.GetName], і натисніть кнопку [road_icon] #V Побудувати дорогу#!.\n\n@arrow_bonus_tier_1! Клацніть на [location_with_icon', 'CONCEPT_PLACEHOLDER')|e], до якої ви хочете побудувати [Concept('road_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_control', '@hint! $hint_control$ Підказка')]."
  designated_location_capital_connection_modifier_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у визначеній [Concept('province', 'CONCEPT_PLACEHOLDER')|e] отримає вигоду від [ShowModifier('capital_connection_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], який масштабується залежно від [Concept('proximity', 'CONCEPT_PLACEHOLDER')|e]"
  mission_increase_rgo_level: "Розширити виробництво ресурсів"
  mission_increase_rgo_level_desc: "Основа будь-якого процвітаючого суспільства полягає в його доступі до природних ресурсів. Ми повинні розвивати нашу сільську інфраструктуру та підвищувати рівень виробництва, щоб задовольнити потреби нашого зростаючого населення та економіки."
  mission_increase_rgo_level_tip: "@arrow_bonus_tier_2! Перейдіть до [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e], яку ви обрали для Місії.\n\n@arrow_bonus_tier_1! Натисніть кнопку [rgo_icon] #V $game_concept_rgo$#!, щоб розширити [resource_gathering_operations]."
  mission_peasants_estate_satisfaction: "Задоволеність селян"
  mission_peasants_estate_satisfaction_desc: "Селянство становить основу нашого царства. Забезпечення їхнього задоволення через мудре управління надасть нам стабільність і владу, необхідні для амбітного розвитку."
  mission_peasants_estate_satisfaction_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = estates', '@government_panel!Панель уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
  mission_market_villages: "Сільські ринки"
  mission_market_villages_desc: "Створення місцевих ринків у сільських громадах принесе торгівлю, можливості та зростання нашому селу, створюючи більш процвітаюче та пов'язане царство."
  mission_market_villages_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб побачити список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте за @peasants![ShowPopTypeName('peasants')] [buildings] і натисніть на [ShowBuildingTypeName('market_village')] [Concept('building].\n\n@arrow_bonus_tier_1! Побудуйте його в [location_with_icon', 'CONCEPT_PLACEHOLDER')|e], натиснувши на нього у списку або на карті."
  mission_embrace_trad_economy: "Прийняти традиційну економіку"
  mission_embrace_trad_economy_desc: "Наш економічний шлях полягає не в безрозсудних інноваціях, а в розбудові на перевірених методах. Ми покращимо нашу традиційну економіку, щоб забезпечити тривале процвітання, через фінансування сільських громад та сприяння поверненню до сільської місцевості."
  mission_embrace_trad_economy_tip: "$change_societal_value_tip$"
  mission_prosperous_production: "Процвітаюче виробництво"
  mission_prosperous_production_desc: "Процвітання наших сільських поселень має першочергове значення для нашого двору. Щоб забезпечити стабільне виробництво матеріалів та постійне задоволення потреб нашого народу, ми прагнутимемо збільшити добробут громад, які так доблесно підтримують економіку нашого царства."
  mission_fishing_villages: "Підтримати рибальські села"
  mission_fishing_villages_desc: "Моря та річки приховують незліченні багатства. Розширюючи можливості наших рибальських громад, ми покращимо продовольчу безпеку та відкриємо нові шляхи для сільського процвітання."
  mission_fishing_villages_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Фільтруйте за @peasants![ShowPopTypeName('peasants')] [buildings] та натисніть на [ShowBuildingTypeName('fishing_village')] [Concept('building].\n\n@arrow_bonus_tier_1! Побудуйте її в [location_with_icon', 'CONCEPT_PLACEHOLDER')|e], натиснувши на неї у списку або на карті."
  mission_cloth_makers: "Підтримка сільського ткацтва"
  mission_cloth_makers_desc: "Виробництво тканини є опорою сільської промисловості. Розвиваючи це ремесло, ми збагачуємо наш народ і зміцнюємо наше місце як на внутрішньому, так і на зовнішньому ринках."
  mission_cloth_makers_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Фільтруйте за @laborers![ShowPopTypeName('laborers')] [buildings] та натисніть на [ShowBuildingTypeName('rural_clothmaker')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Побудуйте її в [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e], натиснувши на неї у списку або на карті."
  mission_irrigation: "Розширення іригації"
  mission_irrigation_desc: "З родючою землею та надійною водою ми перетворимо навіть найсуворіші терени на поля достатку. Розширення наших іригаційних систем значно збільшить наш сільськогосподарський врожай."
  mission_irrigation_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Фільтруйте за @peasants![ShowPopTypeName('peasants')] [buildings] та натисніть на [ShowBuildingTypeName('irrigation_systems')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Побудуйте її в [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e], натиснувши на неї у списку або на карті."
  mission_masons: "Будівництво мулярів"
  mission_masons_desc: "Мистецтво мулярства є невід'ємним для зростання наших поселень та довговічних інституцій. Організувавши кваліфікованих мулярів по всьому нашому царству, ми закладемо основу, постачання матеріалів, на яких ми будуватимемо нашу історію."
  mission_masons_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Фільтруйте за @laborers![ShowPopTypeName('laborers')] [buildings] та натисніть на [ShowBuildingTypeName('mason')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Побудуйте її в [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e], натиснувши на неї у списку або на карті."
