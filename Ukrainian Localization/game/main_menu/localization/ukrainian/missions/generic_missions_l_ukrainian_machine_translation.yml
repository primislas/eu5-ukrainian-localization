  marketplace_amount_of_impacted_locations_depends_on_crown_power_tt: "До #Y 4#! [Concept('urban_locations', 'CONCEPT_PLACEHOLDER')|e] з [ShowBuildingTypeName('marketplace')] можуть отримати #G +0.25%#! [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] та #G +0.05#! [Concept('development', 'CONCEPT_PLACEHOLDER')|e] за рівень будівлі, масштабований за нашою [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e]."
