l_english:
  mission_select_market: "Оберіть [Concept('market', 'CONCEPT_PLACEHOLDER')|e] для [Concept('mission', 'CONCEPT_PLACEHOLDER')|e]"
  mission_no_markets: "$no_valid_markets$"
  mission_select_goods: "Оберіть [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] для [mission]"
  mission_no_goods: "$no_valid_goods$"
  mission_task_select_market: "Оберіть [Concept('market', 'CONCEPT_PLACEHOLDER')|e] для [Concept('task', 'CONCEPT_PLACEHOLDER')|e]"
  mission_task_no_markets: "$no_valid_markets$"
  mission_task_select_goods: "Оберіть [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] для [task]"
  mission_task_no_goods: "$no_valid_goods$"
  mission_task_select_town_or_city: "Оберіть [Concept('urban_location', 'CONCEPT_PLACEHOLDER')|e] для [task]"
  mission_task_no_town_or_city: "$no_valid_town_or_city$"
  generic_conquer_province: "Регіональна експансія"
  generic_conquer_province_DESCRIPTION: "Вперед до слави!"
  generic_conquer_province_CRITERIA_DESCRIPTION: "Наш [ROOT.GetCountry.GetFlavorRank] розширив свої території."
  generic_conquer_province_BUTTON_TOOLTIP: "Проактивні наступи необхідні для протидії експансіоністським загрозам ворожих сусідів."
  generic_conquer_province_BUTTON_DETAILS: "Кордони, що оточують наші володіння, кишать ворогами та тими, хто прагне покласти край нашому правлінню. Ми повинні взяти ініціативу та розпочати наступальні кампанії, щоб не стати жертвами експансіоністських тенденцій сусідніх стерв'ятників."
  has_cb_that_allows_conquest_on_neighbor_country_tt: "Ми маємо [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e], що дозволяє завоювання [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] проти сусідньої [Concept('country', 'CONCEPT_PLACEHOLDER')|e]"
  choose_province_for_next_conquest_tasks_tt: "Ми оберемо визначену [Concept('province', 'CONCEPT_PLACEHOLDER')|e] для наступних [Concept('mission_tasks', 'CONCEPT_PLACEHOLDER')|e]"
  select_mission_for_next_mission_tasks: "Оберіть [Concept('province', 'CONCEPT_PLACEHOLDER')|e] для наступного [Concept('mission task', 'CONCEPT_PLACEHOLDER')|e]"
  monthly_events_about_integration_tt: "Щомісячні [Concept('events', 'CONCEPT_PLACEHOLDER')|e] щодо зусиль з інтеграції можуть відбуватися, поки це [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] активно виконується"
  requirements_after_mission_conquer_province_tt: "Вимоги цього завдання будуть розкриті після того, як ми завершимо $mission_conquer_province$ [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e]"
  mission_war_chest: "Зібрати військову скарбницю"
  mission_war_chest_desc: "Війна — це вогняний апетит, що прагне золота. Щоб зібрати наших солдатів, мотивувати ополчення та фінансувати нашу кампанію, нам знадобиться його багато."
  mission_obtain_casus_belli: "Отримати [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e]"
  mission_obtain_casus_belli_desc: "Наші цілі справедливі, і ми не можемо спочивати, доки наші кордони не будуть розширені та захищені від потенційних загроз нашому існуванню. З цієї причини ми повинні шукати виправдані та законні причини для анексії чужих земель до нашого володіння."
  mission_obtain_casus_belli_tip: "@arrow_bonus_tier_3! Найкращий спосіб отримати Casus Belli — це запросити його у нашого [Concept('parliament_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете скликати сесію Парламенту з [Link('government', 'tabcontent = parliament', '@government_panel!Панель уряду > Парламент')].\n\n@arrow_bonus_tier_2! Створення [Concept('spy_network_with_icon', 'CONCEPT_PLACEHOLDER')|e] у чужих [Concept('countries] дозволить нам сфабрикувати Casus Belli проти них, якщо ми маємо [cores_with_icon', 'CONCEPT_PLACEHOLDER')|e] на їхній землі, або якщо вони є нашими [Concept('rivals_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_casus_belli', '@hint! Підказка Casus Belli')]."
  mission_conquer_province: "Завоювати провінцію"
  mission_conquer_province_desc: "Розширення нашого володіння за рахунок слабших сусідів є лише природним законом, виживанням найсильніших."
  mission_conquer_province_tip: "@arrow_bonus_tier_3! Накопичивши достатньо [Concept('war_score_with_icon', 'CONCEPT_PLACEHOLDER')|e], запропонуйте своєму ворогу [Concept('peace_treaty_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Concept('diplomatic_actions', 'CONCEPT_PLACEHOLDER')|e]. \n\n@arrow_bonus_tier_2! На панелі [Concept('peace_treaty] оберіть [locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] або [Concept('provinces_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ви бажаєте завоювати.\n\n #italic Щоб дізнатися більше, ви можете переглянути підказки [Link('hints', 'selected_hint = hint_war', '@hint! Війна')], [Link('hints', 'selected_hint = hint_siege_and_occupation', '@hint! Облоги')] та [Link('hints', 'selected_hint = hint_battle', '@hint! Битва')]."
  top_owner_is_us_or_not_ownable_tt: "Кожна придатна для володіння (тобто #R НЕ#! непрохідна, морська або озерна) [Concept('location', 'CONCEPT_PLACEHOLDER')|e] належить нам або нашим [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]"
  mission_peace_integrate_province: "Інтегрувати наше завоювання"
  mission_peace_integrate_province_desc: "Ми не повинні спочивати лише на плодах нашої перемоги. Належна інтеграція завойованих земель має бути нашим головним пріоритетом."
  mission_peace_integrate_province_tip: "@arrow_bonus_tier_2! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Панель уряду > Кабінет')], щоб побачити свій [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Призначте [Concept('cabinet_member_with_icon', 'CONCEPT_PLACEHOLDER')|e] до [ShowCabinetActionName('integrate_province')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e].\n\n #italic Щоб дізнатися більше, ви можете переглянути підказку [Link('hints', 'selected_hint = hint_has_conquered_provinces', '@hint! $hint_has_conquered_provinces$')]."
  mission_fortifications: "Укріпити кордон"
  mission_fortifications_desc: "Поки триває великий наступ, ми не повинні нехтувати оборонним планом, забезпечивши наш новий кордон після завершення кампанії завоювання."
  mission_fortifications_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')] і знайдіть [ShowBuildingTypeName('castle')] [Concept('building', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Натисніть на будівлю, щоб побудувати її в будь-якому з ваших [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Форти блокують рух ворожих [Concept('armies_with_icon', 'CONCEPT_PLACEHOLDER')|e], тому найкраще укріпити свої кордони, особливо природні вузькі місця між непрохідними територіями."
  mission_fortifications_reward_tt: "Цільова [Concept('location', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowModifier('mission_defensive_fortification_modifier')]"
  no_eligible_border_location_tt: "@trigger_no! Немає відповідної прикордонної [Concept('location', 'CONCEPT_PLACEHOLDER')|e]"
  mission_army: "Зібрати армію"
  mission_army_desc: "Чи то з наших вірних підданих, чи то з простого люду, наша армія повинна бути напоготові. Регулярні війська забезпечать дисципліну та витривалість, тоді як ополчення поповнить наші лави в часи потреби. Разом вони створять силу, гідну захисту нашого володіння та утвердження нашої могутності за кордоном."
  mission_army_tip: "@arrow_bonus_tier_3! На початку гри ваші [Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] виконуватимуть більшу частину бойових дій. Ви можете збільшити розмір своїх [Concept('levies], надавши деякі [privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e] або прийнявши більше [Concept('cultures_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Link('country_culture', 'subtab = breakdown', '@society_panel! Панель суспільства > Культура')].\n\n@arrow_bonus_tier_2! Ви також можете створити [Concept('regulars_with_icon', 'CONCEPT_PLACEHOLDER')|e] або найняти [Concept('mercenaries_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Link('unit_overview', '', '@military_panel! $lateralview_unit_overview_entry_name$')]\n\n #italic Щоб дізнатися більше, ви можете переглянути підказку [Link('hints', 'selected_hint = hint_has_unraised_levies_in_war', '@hint! Підказка про ополчення')]."
  mission_army_infantry: "Закликати піхоту"
  mission_army_infantry_desc: "Основою будь-якої успішної армії є її піхота. Міцний корпус добре навчених чоловіків, готових захищати наш народ і знищувати наших ворогів!"
  mission_army_cavalry: "Закликати кавалерію"
  mission_army_cavalry_desc: "Швидка атака та натиск смертоносної хвилі, наша кавалерія вселить страх у серця наших ворогів. Ми зберемо непереможну силу, щоб розтоптати кожного, хто стане на нашому шляху!"
  mission_army_levies: "Зібрати ополчення"
  mission_army_levies_desc: "Обов'язок кожного працездатного чоловіка — взяти до рук зброю на захист нашого народу та наших інтересів."
  mission_army_mercenaries: "Армія найманців"
  mission_army_mercenaries_desc: "Іноземні чоловіки, добре навчені військовому мистецтву, складуть міцне ядро нашої наступної військової кампанії."
  mission_obtain_casus_belli_parliament: "Парламентське обґрунтування"
  mission_obtain_casus_belli_parliament_desc: "Наші плани щодо розширення наших володінь залежать від обґрунтування законної війни проти наших ворогів через парламент."
  mission_obtain_casus_belli_spy_network: "Зусилля з інфільтрації"
  mission_obtain_casus_belli_spy_network_desc: "Наші шпигуни — вправні головорізи, готові проникнути до дворів наших ворогів. З їхньою допомогою ми можемо отримати глибоке розуміння справ наших ворогів і навіть визначити ціль для нашої майбутньої кампанії!"
  designate_rival_as_main_threat_tt: "Ми визначимо одного з наших [Concept('rivals', 'CONCEPT_PLACEHOLDER')|e], якого ми образили, як головного антагоніста цих [Concept('mission_tasks', 'CONCEPT_PLACEHOLDER')|e]"
  mission_declare_war: "До війни!"
  mission_declare_war_desc: "Наші плани та приготування незабаром завершаться. Настав час оголосити війну та бити, поки залізо гаряче."
  mission_declare_war_tip: "@arrow_bonus_tier_3! Перейдіть до #high Панелі іноземної країни#! [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], яку ви хочете атакувати, і натисніть [Concept('war_icon] #V Оголосити війну#! [diplomatic_action', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Виберіть свій [Concept('casus_belli_with_icon', 'CONCEPT_PLACEHOLDER')|e] внизу панелі.\n\n@arrow_bonus_tier_1! Слідкуйте за будь-якими [Concept('allies_with_icon', 'CONCEPT_PLACEHOLDER')|e], яких ваш ворог може покликати у [war].\n\n #italic Щоб дізнатися більше, ви можете переглянути підказки [Link('hints', 'selected_hint = hint_war', '@hint! Війна')], [Link('hints', 'selected_hint = hint_siege_and_occupation', '@hint! Облоги')] та [Link('hints', 'selected_hint = hint_battle', '@hint! Битва')]."
  justify_religious_war: "Виправдати релігійну війну"
  justify_religious_war_desc: "Язичники та невіруючі, що оточують наші кордони, незабаром відчують божественну міць наших армій. Щоб узаконити наш рух до війни, ми повинні звернутися до найвищої влади в [ShowReligionAdjective('catholic')] Церкві."
  mobilize_the_clergy: "Мобілізувати [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')]"
  mobilize_the_clergy_desc: "Основа нашого народу та опора наших великих суспільств — це наша віра. Об'єднані великими духовними особами, ми повинні звернутися до [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], щоб мотивувати населення до майбутнього конфлікту!"
  raise_a_navy: "Створити флот"
  raise_a_navy_desc: "Домінування нашого узбережжя не може бути піддано сумніву, оскільки ми готуємося до війни. Створення могутнього флоту допоможе нам у наших зусиллях з блокади та прискорить нашу військову кампанію."
  raise_a_navy_tip: "@arrow_bonus_tier_3! На початку гри ваші [Concept('navy_levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] виконуватимуть більшу частину бойових дій. Ви можете збільшити розмір ваших [Concept('navy_levies], надавши деякі [privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e] або прийнявши більше [Concept('cultures_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Link('country_culture', 'subtab = breakdown', '@society_panel! Панель суспільства > Культура')].\n\n@arrow_bonus_tier_2! Ви також можете будувати [Concept('regular_ship_with_icon', 'CONCEPT_PLACEHOLDER')|e] або набирати [Concept('mercenaries_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Link('unit_overview', '', '@military_panel! $lateralview_unit_overview_entry_name$')]\n\n #italic Щоб дізнатися більше, ви можете переглянути підказку [Link('hints', 'selected_hint = hint_has_unraised_levies_in_war', '@hint! Підказка про ополчення')]."
  mission_surpass_enemy: "Перевершити ворога"
  mission_surpass_enemy_desc: "Наша поточна кампанія підкреслила необхідність того, щоб наш флот перевершив флот наших ворогів. Якщо ми хочемо зберегти нашу перевагу на морі, ми повинні шукати та знищувати."
  mission_armory: "Будувати арсенали"
  mission_armory_desc: "Наша зростаюча присутність у регіональних справах навколо нашого [ROOT.GetCountry.GetFlavorRank] робить необхідним поштовх до підтримки зростаючої постійної армії шляхом будівництва центрів вербування. Території, які стали вважатися містечками або містами, можуть і повинні прагнути до зведення місцевого [ShowBuildingTypeName('armory')]."
  mission_manpower: "Отримати людські ресурси"
  mission_manpower_desc: "Щоб поповнити наші лави та забезпечити постачання людей, ми повинні підтримувати надійну систему поповнення, повну свіжих новобранців!"
  mission_reduce_antagonism: "Зменшити $antagonism$"
  mission_reduce_antagonism_desc: "Наші завоювання за кордоном, безсумнівно, викличуть занепокоєння серед наших сусідів. Щоб уникнути їхнього об'єднання проти нас, ми повинні прагнути покращити наше становище в їхніх очах."
  mission_restore_province: "Відновити процвітання"
  mission_restore_province_desc: "Руйнівні наслідки війни не були добрими до тих, хто нещодавно став частиною нашого домену. Відновлення частини процвітання — чудовий спосіб покращити думку місцевих жителів у новозавойованій провінції."
  mission_restore_province_tip: "@arrow_bonus_tier_3! [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e] часто руйнуватиме [Concept('prosperity_with_icon', 'CONCEPT_PLACEHOLDER')|e] ваших [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Вона відновиться з часом, але ви можете прискорити відновлення за допомогою [Concept('cabinet_action_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Перейдіть до [Link('government', 'tabcontent = cabinet', '@government_panel! Панель уряду > Кабінет')] щоб побачити ваш [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Призначте [Concept('cabinet_member_with_icon', 'CONCEPT_PLACEHOLDER')|e] до [ShowCabinetActionName('recovery_effort')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]."
  non_scope_every_pop_conquest_location_var_province_10_sat_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у визначеній [Concept('province', 'CONCEPT_PLACEHOLDER')|e] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  every_pop_conquest_location_var_province_10_sat_tt: "Наші [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [conquest_province.GetName] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  generic_vassal_ties: "$vassal$ Зв'язки"
  generic_vassal_ties_DESCRIPTION: "Ми повинні забезпечити стабільні відносини з нашим $vassal$!"
  generic_vassal_ties_CRITERIA_DESCRIPTION: "Наші відносини з нашим $vassal$ міцніші, ніж будь-коли."
  generic_vassal_ties_BUTTON_TOOLTIP: "Співпраця з довіреними васалами є життєво важливою для подолання зовнішніх та внутрішніх викликів у непевні часи."
  generic_vassal_ties_BUTTON_DETAILS: "У буремні часи невизначеності, ми повинні звернутися до нашого вірного $vassal$, щоб витримати будь-які перешкоди та ворогів, що з'являться на нашому шляху. Лише через співпрацю та дружні відносини ми вистоїмо!"
  monthly_events_about_annexation_tt: "Щомісячні [Concept('events', 'CONCEPT_PLACEHOLDER')|e] щодо поточної анексії можуть відбуватися, поки ця [Concept('mission', 'CONCEPT_PLACEHOLDER')|e] активна"
  mission_commence_annexation: "Розпочати Анексію"
  mission_commence_annexation_desc: "Попри наші дружні відносини, схоже, що автономія, яку здійснював наш васал, добігла кінця. Тому ми повинні розпочати процес їхньої формальної інтеграції до нашого володіння."
  mission_commence_annexation_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Diplomacy > Current Relations')] та натисніть на #V Manage Subjects#!, щоб побачити ваших [Concept('subjects_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Натисніть на ім'я [Concept('subject], щоб відкрити [diplomatic_actions', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Оберіть #V $ANNEXTITLE$#!."
  mission_complete_annexation: "Завершити Анексію"
  mission_complete_annexation_desc: "Зусилля з інтеграції нашого васала йдуть успішно. Хоча завершення процесу може зайняти час, ми все ж просуваємося вперед, маючи на меті об'єднання."
  mission_select_vassal: "Оберіть [ShowSubjectTypeName('vassal')] для цієї [Concept('mission', 'CONCEPT_PLACEHOLDER')|e]"
  mission_no_valid_vassals: "@trigger_no! Немає доступних [ShowSubjectTypeName('vassal')]."
  mission_connect_the_capitals: "З'єднати Столиці"
  mission_connect_the_capitals_desc: "Належний зв'язок та пряме інфраструктурне сполучення між локаціями в нашому [ShowSubjectTypeName('vassal')] забезпечить прямий зв'язок, що, безсумнівно, підвищить їхню лояльність."
  mission_connect_the_capitals_tip: "@arrow_bonus_tier_2! Перейдіть до вашої [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('Player.GetCapital.GetName], та натисніть на кнопку #V Build Road#!.\n\n@arrow_bonus_tier_1! Побудуйте [road_with_icon', 'CONCEPT_PLACEHOLDER')|e] до сусідньої [Concept('location', 'CONCEPT_PLACEHOLDER')|e], наближаючи [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] нашого суб'єкта до нас."
  mission_monetary_assistance: "Грошова Допомога"
  mission_monetary_assistance_desc: "Нам належить підтримати нашого менш щасливого васала значною грошовою допомогою. Це допоможе зміцнити відносини між нами, полегшуючи дипломатію. Символічний подарунок до їхньої скарбниці значно сприятиме їхньому процвітанню!"
  mission_monetary_assistance_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Diplomacy > Current Relations')] та натисніть на #V Manage Subjects#!, щоб побачити ваших [Concept('subjects_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Натисніть на ім'я [Concept('subject], щоб відкрити [diplomatic_actions', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Видаліть фільтр \"Дії суб'єкта\", щоб побачити всі дії, та шукайте #V $send_gift$#!"
  mission_base_of_power: "База Влади"
  mission_base_of_power_desc: "Ми повинні забезпечити нашому васалу міцне місце для здійснення їхньої влади, потужну столицю, що відповідає їхньому процвітаючому статусу під нашим прапором."
  mission_base_of_power_tip: "@arrow_bonus_tier_3! Перейдіть до Столиці вашого Суб'єкта.\n\n@arrow_bonus_tier_2! Натисніть на кнопку @build_icon! #V Будувати#!, щоб побачити список [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ви можете побудувати в [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Сортуйте за прибутком і почніть будувати той, який вважаєте найбільш доцільним."
  mission_improve_relations_with_vassal: "Покращити відносини з [ROOT.GetCountry.MakeScope.GetVariable('mission_chosen_vassal_variable').GetCountry.GetNameWithNoTooltip]"
  mission_improve_relations_with_vassal_desc: "Щоб зміцнити співпрацю між нашими країнами, ми повинні звернутися до нашого васала та встановити міцні дипломатичні зв'язки."
  mission_improve_relations_with_vassal_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Дипломатія > Поточні відносини')] та натисніть #V Керувати підданими#!, щоб побачити своїх [Concept('subjects_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Натисніть на ім'я [Concept('subject], щоб відкрити [diplomatic_actions', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Оберіть [Concept('opinion_icon] #V $IMPROVE_RELATIONTITLE$#! у картці країни зверху та дочекайтеся зростання думки. Пам'ятайте, що ця дія коштуватиме вам #V 1#! [diplomat_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  mission_joint_military_development: "Спільний військовий розвиток"
  mission_joint_military_development_desc: "Для захисту нашого королівства життєво важлива військова співпраця між нами та нашим васалом."
  mission_joint_military_development_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Дипломатія > Поточні відносини')] та натисніть #V Керувати підданими#!, щоб побачити своїх [Concept('subjects_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Натисніть на ім'я [Concept('subject], щоб відкрити [diplomatic_actions', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Оберіть #V $offer_support_military$#!."
  mission_target_subject_will_lose_lib_desire_gain_center_of_urbanization_modifier_capital_tt: "Визначений [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] матиме зменшене [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e], а його [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] отримає [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] [ShowModifier('center_of_urbanization_modifier')]"
  generic_humiliate_rival: "Принизити суперника"
  generic_humiliate_rival_DESCRIPTION: "Тим, хто прагне зрівнятися з нашою силою, слід показати їхню неповноцінність!"
  generic_humiliate_rival_CRITERIA_DESCRIPTION: "Ми успішно перевершили суперника."
  generic_humiliate_rival_BUTTON_TOOLTIP: "Королівство повинно утвердити своє панування над заздрісними суперниками, перевершивши їхні амбіції та забезпечивши перевагу."
  generic_humiliate_rival_BUTTON_DETAILS: "Наші суперники та вороги дивляться на нас із заздрістю, оскільки ми переживаємо процвітання та підносимо наш народ до нових висот. Настав час нам встановити свою перевагу над тими, хто прагне зрівнятися з нашим зростанням, і перевершити їх раз і назавжди."
  mission_insult_rival: "Дипломатична гра"
  mission_insult_rival_desc: "Витончена образа одного з наших суперників — чудовий спосіб виявити їхні недоліки та встановити нашу перевагу над ними під час дипломатичних переговорів."
  mission_insult_rival_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Дипломатія > Поточні відносини')] та натисніть на рядок #V [Concept('rivals_icon', 'CONCEPT_PLACEHOLDER')|e] Кнопка суперників #!.\n\n@arrow_bonus_tier_2! Ви також можете натиснути на [rivals_icon] #W Сповіщення про можливих суперників#!.\n\n@arrow_bonus_tier_1! Ви можете зачекати, доки інші [countries] оголосять своїх [rivals], перш ніж робити свій хід. Таким чином ви уникнете розгнівання неправильних [countries]. \n\n #italic Щоб дізнатися більше, ви можете перевірити [Link('hints', 'selected_hint = hint_lacks_of_rivals', '$hint_lacks_of_rivals$ Підказка')]."
  mission_impose_embargo: "Нав'язати ембарго"
  mission_impose_embargo_desc: "Ми не можемо дозволити іноземним агентам та ворогам входити на наші ринки та отримувати прибуток від торгівлі в межах наших кордонів!"
  mission_impose_embargo_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Дипломатія > Поточні відносини')] та натисніть на прапор бажаного #V [Concept('rivals_icon', 'CONCEPT_PLACEHOLDER')|e] Суперника#!, щоб обрати ціль.\n\n@arrow_bonus_tier_2! Ви можете натиснути на його [diplomacy_icon] #W Дипломатичні дії#! всередині #W Економічні дії#!.\n\n@arrow_bonus_tier_1! Знайдіть та натисніть на #W Накласти ембарго на націю #!, щоб накласти на них ембарго."
  market_dominance_key: "Домінування на ринку"
  mission_humiliate_rival: "Принизити суперника"
  mission_humiliate_rival_desc: "Примушуючи наших суперників за дипломатичним столом і силою нав'язуючи їм нашу перевагу, ми лише посилимо нашу міць як вдома, так і за кордоном."
  mission_humiliate_rival_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Дипломатія > Поточні відносини')] та натисніть на прапор бажаного #V [Concept('rivals_icon', 'CONCEPT_PLACEHOLDER')|e] Суперника#!, щоб обрати ціль.\n\n@arrow_bonus_tier_2! Ви можете або натиснути на картку країни [Concept('war_icon] #W Кнопка оголошення війни#!, або на його [diplomacy_icon] #W Дипломатичні дії#! всередині [hostile_icon] #W Ворожі дії#!.\n\n@arrow_bonus_tier_1! Розгляньте можливість отримання [casus_belli_with_icon', 'CONCEPT_PLACEHOLDER')|e] перед оголошенням [Concept('war]. Ми можемо попросити його під час [parliament', 'CONCEPT_PLACEHOLDER')|e] або сфабрикувати проти наших [Concept('rivals', 'CONCEPT_PLACEHOLDER')|e]. \n\n #italic Щоб дізнатися більше, ви можете перевірити [Link('hints', 'selected_hint = hint_war', '$hint_war$ Підказка')] та [Link('hints', 'selected_hint = hint_call_for_peace', '$hint_call_for_peace$ Підказка')]."
  mission_surpass_rival: "Перевершити наших ворогів"
  mission_surpass_rival_desc: "Тим, хто прагне узурпувати наше місце під сонцем, слід показати, що вони лише незначна цятка перед обличчям нашої нестримної могутності. Наша сила повинна затьмарити їхні мізерні армії!"
  mission_surpass_rival_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Дипломатія > Поточні відносини')] та натисніть на прапор бажаного #V [Concept('rivals_icon', 'CONCEPT_PLACEHOLDER')|e] Суперника#!, щоб обрати ціль.\n\n@arrow_bonus_tier_2! Продовжуйте перевіряти його [Concept('country_icon', 'CONCEPT_PLACEHOLDER')|e] #W Панель країни #!, щоб порівняти з ними силу.\n\n@arrow_bonus_tier_1! Розгляньте можливість оголошення [Concept('war_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб їх знесилити. \n\n #italic Щоб дізнатися більше, ви можете перевірити [Link('hints', 'selected_hint = hint_war', '$hint_war$ Підказка')] та [Link('hints', 'selected_hint = hint_call_for_peace', '$hint_call_for_peace$ Підказка')]."
  should_complete_stronger_than_rival_tt: "Виконання цього [Concept('task', 'CONCEPT_PLACEHOLDER')|e] з вищою [Concept('relative_strength', 'CONCEPT_PLACEHOLDER')|e] порівняно з [Concept('target_rival.GetName] надає #G 20#! [prestige', 'CONCEPT_PLACEHOLDER')|e]."
  mission_establish_spy_networks: "Створити шпигунську мережу"
  mission_establish_spy_networks_desc: "Щоб тримати в руках справи наших суперників, мудро забезпечити проникнення наших шпигунів у їхні лави."
  mission_establish_spy_networks_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Дипломатія > Поточні відносини')] та натисніть на прапор бажаного #V [Concept('rivals_icon', 'CONCEPT_PLACEHOLDER')|e] Суперника#!, щоб обрати ціль.\n\n@arrow_bonus_tier_2! Ви можете натиснути на кнопку [Concept('spy_network_icon] #W Мережа шпигунів#! на картці країни або в її [diplomacy_icon] #W Дипломатичних діях#! всередині [hostile_icon] #W Ворожих дій#!.\n\n@arrow_bonus_tier_1! Створіть [spy_network_with_icon', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('rivals], щоб сфабрикувати [casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти них. \n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_lacks_of_rivals', '$hint_lacks_of_rivals$ Підказка')]."
  mission_destabilize_rival: "Посіяти невдоволення у суперника"
  mission_destabilize_rival_desc: "Якщо ми хочемо зробити наших суперників легкою здобиччю, ми повинні забезпечити їхню внутрішню нестабільність та схильність до іноземних вторгнень."
  mission_destabilize_rival_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Дипломатія > Поточні відносини')] та натисніть на прапор бажаного #V [Concept('rivals_icon', 'CONCEPT_PLACEHOLDER')|e] Суперника#!, щоб обрати ціль.\n\n@arrow_bonus_tier_2! Ви можете натиснути на кнопку [Concept('spy_network_icon] #W Мережа шпигунів#! на картці країни або в її [diplomacy_icon] #W Дипломатичних діях#! всередині [hostile_icon] #W Ворожих дій#!.\n\n@arrow_bonus_tier_1! Створіть [spy_network_with_icon', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('rivals], щоб мати достатньо [spy_network_with_icon', 'CONCEPT_PLACEHOLDER')|e] для використання #W Дипломатичної дії «Посіяти невдоволення»#! проти них, яку можна знайти в [diplomacy_icon] #W Дипломатичні дії#! > [spy_network_icon] #W Таємні дії#!. \n\n #italic Щоб дізнатися більше, ви можете переглянути [Link('hints', 'selected_hint = hint_lacks_of_rivals', '$hint_lacks_of_rivals$ Підказка')]."
  mission_task_select_rival: "Оберіть [Concept('rival', 'CONCEPT_PLACEHOLDER')|e] для майбутніх [Concept('mission_tasks', 'CONCEPT_PLACEHOLDER')|e]"
  mission_task_no_rival: "@trigger_no! Немає доступних [Concept('rival', 'CONCEPT_PLACEHOLDER')|e]"
  impacted_by_foreign_destabilization_efforts_modifier_tt: "На них вплине [ShowModifier('foreign_destabilization_efforts_modifier')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  generic_trade: "Розвиток торгівлі"
  generic_trade_DESCRIPTION: "Якщо ми хочемо збільшити наше процвітання, ми повинні прагнути сприяти нашим торговельним починанням!"
  generic_trade_CRITERIA_DESCRIPTION: "Ми сформували нашу торговельну політику та покращили відповідну інфраструктуру."
  generic_trade_BUTTON_TOOLTIP: "Конкурентний світ торгівлі пропонує прибуткові можливості через обмін товарами та далекі торговельні шляхи."
  generic_trade_BUTTON_DETAILS: "Світ бізнесу сповнений безжальних купців та надмірної конкуренції. Однак, багато монет можна заробити на обміні товарами та встановленні далеких торговельних шляхів!"
  mission_increase_maritime_presence: "Морська присутність"
  mission_increase_maritime_presence_desc: "Розвиток морських шляхів для з'єднання наших портів відіграв важливу роль у нашому накопиченому процвітанні. Тому ми повинні зосередитися на розширенні нашої існуючої морської присутності, щоб підтримувати наше торговельне домінування!"
  mission_increase_maritime_presence_tip: "$mission_expand_merchant_power_tip$"
  mission_protect_our_coasts: "Захист наших берегів"
  mission_protect_our_coasts_desc: "Пірати-мародери, жадібні іноземні купці та незаконні шукачі багатства постійно зазіхають на наші береги та багатства, які вони приховують. Будівництвом оборонної інфраструктури вздовж наших берегових ліній ми успішно відіб'ємо наших ворогів, зберігаючи при цьому наше процвітання."
  mission_protect_our_coasts_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте за @soldiers![ShowPopTypeName('soldiers')] [buildings] та натисніть на [ShowBuildingTypeName('coastal_fort')] [Concept('building].\n\n@arrow_bonus_tier_1! Побудуйте її в одному з ваших прибережних [urban_locations', 'CONCEPT_PLACEHOLDER')|e]."
  mission_establish_wharfs: "Створення верфей"
  mission_establish_wharfs_desc: "Суть нашого багатства полягає в невикористаному потенціалі наших берегів. Щоб поширити процвітання, ми повинні прагнути збільшити нашу морську інфраструктуру!"
  mission_establish_wharfs_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте за @burghers![ShowPopTypeName('burghers')] [buildings] та натисніть на [ShowBuildingTypeName('wharf')] [Concept('building].\n\n@arrow_bonus_tier_1! Побудуйте її у ваших [urban_locations', 'CONCEPT_PLACEHOLDER')|e]."
  mission_establish_docks: "Прибережне розширення"
  mission_establish_docks_desc: "Хоча [ShowBuildingTypeName('wharf')] вірно служила нам, ми повинні залишатися на передовій морських інновацій. Для цього будівництво великих доків уздовж наших берегів вважається необхідністю."
  mission_establish_docks_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб переглянути список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте за @soldiers![ShowPopTypeName('soldiers')] [buildings] та натисніть на [ShowBuildingTypeName('dock')] [Concept('building].\n\n@arrow_bonus_tier_1! Побудуйте її у ваших [urban_locations', 'CONCEPT_PLACEHOLDER')|e]."
  mission_merchant_fleet: "Торговий флот"
  mission_merchant_fleet_desc: "Основою наших торговельних починань є численні іноземні флоти, що перевозять товари до наших портів і з них. Настав час створити власний торговий флот."
  mission_merchant_fleet_tip: "@arrow_bonus_tier_2! Перейдіть до [Link('unit_overview', '', '@military_panel! Військо > Флоти')] і натисніть кнопку [Concept('regular_ship_icon]#V $RECRUIT_S_BUTTON$#!, щоб побудувати [regular_ships', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Вам потрібно мати [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], здатні набирати [regular_ships], як-от [ShowBuildingTypeName('wharf')] або [ShowBuildingTypeName('dock')].\n\n #italic Щоб дізнатися більше, перегляньте підказки [Link('hints', 'selected_hint = hint_low_sailors', '@hint! Моряки')] та [Link('hints', 'selected_hint = hint_has_unraised_levies_in_war', '@hint! Ополчення')]."
  mission_establish_market_center: "Заснувати ринковий центр"
  mission_establish_market_center_desc: "Попри нашу діяльність на багатьох ринках, наші радники вважають за необхідне, щоб ми будь-якими засобами здобули серце нашого ринку."
  mission_establish_market_center_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('trade', 'subtab = markets', '@economy_panel! Економіка > Ринки')] і натисніть кнопку [market_icon]#V $create_market$#!.\n\n #italic Щоб дізнатися більше, перегляньте [Link('hints', 'selected_hint = hint_markets', '@hint! Підказка щодо ринків')]."
  mission_burgher_relations: "Відносини з [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  mission_burgher_relations_desc: "Добрі відносини з купцями принесуть користь нашому прибутку, оскільки вони будуть мотивовані збільшувати обсяг бізнесу, що ведеться в межах наших кордонів!"
  mission_burgher_relations_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('government', 'tabcontent = estates', '@government_panel! Панель уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
  mission_winds_of_trade: "Вітри торгівлі"
  mission_winds_of_trade_desc: "Підтримати меркантилістський і протекціоністський підхід до нашого ринку або відкрити всі порти для іноземних купців — це рішення, яке, ймовірно, визначить долю нашої нації."
  mission_solid_approach: "Надійний підхід"
  mission_solid_approach_desc: "Незалежно від того, чи оберемо ми меркантилістський, чи відкритий підхід, наші радники підтримують ідею повного переходу в обраний нами напрямок."
  mission_burgher_privileges: "Могутні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')]"
  mission_burgher_privileges_desc: "Могутній купецький клас є наріжним каменем на шляху до меркантилістського успіху та процвітання. Надавши купцям особливі привілеї, ми усунемо багато перешкод і принесемо користь нашій скарбниці."
  mission_burgher_privileges_tip: "@arrow_bonus_tier_2! Перейдіть до [Link('government', 'tabcontent = estates', '@government_panel! Панель уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_1! Надайте новий [Concept('privilege_with_icon', 'CONCEPT_PLACEHOLDER')|e] [GetEstateName('burghers_estate')].\n\n #italic Щоб дізнатися більше, перегляньте [Link('hints', 'selected_hint = hint_estates', '@hint! Підказка щодо станів')]."
  triggers_revealed_after_previous_task_complete_tt: "Вимоги цього [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e] будуть розкриті після завершення попереднього [Concept('mission_task', 'CONCEPT_PLACEHOLDER')|e]"
  mission_marketplace_of_capital: "[ShowBuildingTypeNameWithNoTooltip('marketplace')] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  mission_marketplace_of_capital_desc: "Наша столиця може бути неперевершеною! Якщо ми бажаємо досягти багатства через торгівлю, ми повинні перетворити її на славний і жвавий центр торгівлі з усіх куточків Землі!"
  mission_marketplace_of_capital_tip: "@arrow_bonus_tier_3! Перейдіть до [Link('production', '', '@production_panel! Панель виробництва > Будівлі')], щоб побачити список ваших [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте за @burghers![ShowPopTypeName('burghers')] [buildings] і натисніть на [ShowBuildingTypeName('marketplace')] [building].\n\n@arrow_bonus_tier_1! Побудуйте стільки, скільки потрібно, натиснувши на список або на карту."
