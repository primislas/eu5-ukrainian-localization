  monthly_events_about_the_status_of_war_tt: "Щомісячні [Concept('events', 'CONCEPT_PLACEHOLDER')|e] щодо стану поточної війни можуть відбуватися, поки ця [Concept('mission', 'CONCEPT_PLACEHOLDER')|e] активна"
  any_neighbor_country_cb_on_or_sn_tt: "Ми маємо або [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e], або [Concept('spy_network', 'CONCEPT_PLACEHOLDER')|e] щонайменше #Y 25#! на будь-яку сусідню [Concept('country', 'CONCEPT_PLACEHOLDER')|e]"
