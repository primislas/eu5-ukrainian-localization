  diplomatic_status_giving_economic_support_name: "Надання економічної підтримки"
  diplomatic_status_giving_economic_support_tooltip: "#T Надання економічної підтримки#!\nЦя країна наразі надає [Concept('economic_support', 'CONCEPT_PLACEHOLDER')|e] цим [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_getting_war_reparations_name: "Отримання військових репарацій"
  diplomatic_status_getting_war_reparations_tooltip: "#T Військові репарації#!\nЦя країна наразі отримує [Concept('war_reparations', 'CONCEPT_PLACEHOLDER')|e] від цих [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_giving_war_reparations_name: "Надання військових репарацій"
  diplomatic_status_giving_war_reparations_tooltip: "#T Надання військових репарацій#!\nЦя країна наразі надає [Concept('war_reparations', 'CONCEPT_PLACEHOLDER')|e] цим [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_building_spy_network_name: "Активні шпигунські мережі"
  diplomatic_status_building_spy_network_tooltip: "#T Активні шпигунські мережі#!\nЦя країна наразі має активні [Concept('spy_networks', 'CONCEPT_PLACEHOLDER')|e] у цих [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_curry_favors_name: "Здобуття прихильності"
  diplomatic_status_curry_favors_tooltip: "#T Здобуття прихильності#!\nЦя країна наразі здобуває [Concept('favors', 'CONCEPT_PLACEHOLDER')|e] у цих [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_union_name: "Унії"
  diplomatic_status_union_tooltip: "#T Унії#!\nЦя країна сформувала унії з цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_marriage_union_name: "Шлюбні унії"
  diplomatic_status_marriage_union_tooltip: "#T Шлюбні унії#!\nЦя країна сформувала шлюбну унію з цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_royal_marriage_name: "Королівський шлюб"
  diplomatic_status_royal_marriage_tooltip: "#T Королівський шлюб#!\nЦя країна має [Concept('royal_marriages', 'CONCEPT_PLACEHOLDER')|e] з цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_enemies_name: "Вороги"
  diplomatic_status_enemies_tooltip: "#T Вороги#!\nЦя країна розглядається як [Concept('rival', 'CONCEPT_PLACEHOLDER')|e] цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_rivals_name: "Суперники"
  diplomatic_status_rivals_tooltip: "#T Суперники#!\nЦя країна розглядає як [Concept('rival', 'CONCEPT_PLACEHOLDER')|e] ці [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_historical_enemies_name: "Історичні вороги"
  diplomatic_status_historical_enemies_tooltip: "#T Historical Enemies#!\nЦю країну розглядають як довгострокового історичного [Concept('rival', 'CONCEPT_PLACEHOLDER')|e] ці [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_historical_rivals_name: "Історичні суперники"
  diplomatic_status_historical_rivals_tooltip: "#T Historical Rivals#!\nЦя країна розглядає ці [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] як довгострокових історичних [Concept('rivals', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_war_name: "Війна"
  diplomatic_status_war_tooltip: "#T War#!\nЦя країна перебуває у [Concept('war', 'CONCEPT_PLACEHOLDER')|e] з цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_alliance_name: "Союз"
  diplomatic_status_alliance_tooltip: "#T Alliance\n#!Країни в [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] часто приходять на допомогу одна одній у разі нападу."
  diplomatic_status_vassalizing_name: "Васал"
  diplomatic_status_vassalizing_tooltip: "#T Subjects#!\nЦі країни можуть прийти на допомогу своєму [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], якщо ми їх атакуємо."
  diplomatic_status_vassalized_name: "Сюзерен"
  diplomatic_status_vassalized_tooltip: "#T Overlord#!\nЦя країна може бути захищена своїм [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], якщо ми її атакуємо."
  diplomatic_status_casus_belli_name: "Казус Беллі"
  diplomatic_status_casus_belli_tooltip: "#T Casus Belli#!\nЦя країна має [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти цих [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]. Вони можуть оголосити [Concept('war', 'CONCEPT_PLACEHOLDER')|e] їм без штрафу до [Concept('stability', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_casus_belli_target_name: "Ціль Казус Беллі"
  diplomatic_status_casus_belli_target_tooltip: "#T Casus Belli Target#!\nНаступні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] мають [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти цієї країни, і можуть оголосити [Concept('war', 'CONCEPT_PLACEHOLDER')|e] їй без штрафу."
  diplomatic_status_guaranteeing_name: "Гарантування"
  diplomatic_status_guaranteeing_tooltip: "#T Guaranteeing#!\nЦя країна автоматично захищатиме націю, яку вона [Concept('guaranteeing', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_guaranteed_name: "Гарантована"
  diplomatic_status_guaranteed_tooltip: "#T Guaranteed#!\nУсі країни, що [Concept('guaranteeing', 'CONCEPT_PLACEHOLDER')|e] цю націю, приєднаються до неї у будь-якій оборонній [Concept('war', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_truce_name: "Перемир'я"
  diplomatic_status_truce_tooltip: "#T Truce#!\nЦя країна перебуває у стані [Concept('truce', 'CONCEPT_PLACEHOLDER')|e] з цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_annul_treaties_name: "Анулювати договори"
  diplomatic_status_annul_treaties_tooltip: "#T Annul Treaties#!\nЦю країну було змушено анулювати усі договори з цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_warning_name: "Попередження"
  diplomatic_status_warning_tooltip: "#T Warning#!\nЯкщо країна, яку попереджено, атакує будь-яку націю, що межує як з нею, так і з тим, хто видав попередження, країна, що попередила, отримає [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти неї."
  diplomatic_status_warned_name: "Попереджено"
  diplomatic_status_warned_tooltip: "#T Попереджено#!\nДержави, яким винесено попередження, нададуть країні, що його видала, [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти них, якщо вони нападуть на будь-яку державу, що межує з обома сторонами."
  diplomatic_status_gives_military_access_name: "Надання військового доступу"
  diplomatic_status_gives_military_access_tooltip: "#T Надання військового доступу#!\nЦя країна надає [Concept('military_access', 'CONCEPT_PLACEHOLDER')|e] цим [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_has_military_access_name: "Дозволено військовий доступ"
  diplomatic_status_has_military_access_tooltip: "#T Дозволено військовий доступ#!\nЦій країні дозволено [Concept('military_access', 'CONCEPT_PLACEHOLDER')|e] цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_gives_fleet_basing_rights_name: "Надання прав на базування флоту"
  diplomatic_status_gives_fleet_basing_rights_tooltip: "#T Надання прав на базування флоту#!\nЦя країна надає [fleet_basing_rights|E] цим [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_has_fleet_basing_rights_name: "Дозволено права на базування флоту"
  diplomatic_status_has_fleet_basing_rights_tooltip: "#T Дозволено права на базування флоту#!\nЦій країні дозволено [fleet_basing_rights|E] цими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_civil_war_name: "Громадянська війна"
  diplomatic_status_civil_war_tooltip: "#T Громадянська війна#!\nЦя країна перебуває у стані [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]!"
  diplomatic_status_annex_name: "Анексія підданих"
  diplomatic_status_annex_tooltip: "#T Анексія підданих#!\nЦя країна наразі анексує наступних [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_annex_target_name: "Бути анексованим"
  diplomatic_status_annex_target_tooltip: "#T Бути анексованим#!\nЦя країна наразі анексується наступною [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_opinion_improvement_passive_name: "Покращення думки"
  diplomatic_status_opinion_improvement_passive_tooltip: "#T Покращення думки#!\nНаступні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] покращують [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] цієї країни щодо себе."
  diplomatic_status_opinion_improvement_active_name: "Покращення думки"
  diplomatic_status_opinion_improvement_active_tooltip: "#T Покращення думки#!\nЦя країна активно покращує [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] цих країн щодо себе."
  diplomatic_status_supporting_rebels_name: "Підтримка повстанців"
  diplomatic_status_supporting_rebels_tooltip: "#T Підтримка повстанців#!\nЦя країна підтримує [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] у наступних [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_rebels_being_supported_name: "Підтримувані повстанці"
  diplomatic_status_rebels_being_supported_tooltip: "#T Підтримувані повстанці#!\nЦя [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e], яких підтримують наступні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  diplomatic_status_has_food_access_name: "Отримання доступу до їжі"
  diplomatic_status_has_food_access_tooltip: "#T Отримання доступу до їжі#!\nЦя країна має [Concept('food_access', 'CONCEPT_PLACEHOLDER')|e] до цих [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]!"
  war_list_who_tt: "$WHO$ перебуває у #R війні#! з $LIST$. Вони битимуться один з одним, доки не буде підписано мир.\n\n[WAR.GetName|Y]\nВійна [Concept('war', 'CONCEPT_PLACEHOLDER')|e] ведеться за [WAR.GetWarGoal.GetName|Y], [WAR.GetAttackerWarLeader.GetName|Y] проти [WAR.GetDefenderWarLeader.GetName|Y]"
  enemies_list_who_tt: "$LIST$ оголосив $WHO$ своїм [Concept('rival', 'CONCEPT_PLACEHOLDER')|e]."
  rivals_list_who_tt: "$WHO$ оголосив $LIST$ своїм [Concept('rival', 'CONCEPT_PLACEHOLDER')|e]."
  alliance_list_who_tt: "$WHO$ перебуває в [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e] з $LIST$. Їх буде покликано у [Concept('wars', 'CONCEPT_PLACEHOLDER')|e] один одного, щоб разом битися з ворогами."
  guaranteed_list_who_tt: "$WHO$ [Concept('guaranteed', 'CONCEPT_PLACEHOLDER')|e] $LIST$. Це змусить $LIST$ приєднатися до будь-яких оборонних [Concept('wars', 'CONCEPT_PLACEHOLDER')|e], в які потрапить $WHO$."
  guaranteeing_list_who_tt: "$WHO$ [Concept('guaranteeing', 'CONCEPT_PLACEHOLDER')|e] $LIST$. Це змусить $WHO$ приєднатися до будь-якої [Concept('war', 'CONCEPT_PLACEHOLDER')|e], де $LIST$ буде атаковано."
  royal_marriage_list_who_tt: "Династичні зв'язки з $WHO$ завдяки [Concept('royal_marriage', 'CONCEPT_PLACEHOLDER')|e] між $FIRST$ та $SECOND$"
  union_list_who_tt: "Унія з $LIST$, оскільки вони мають одного [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]"
  marriage_union_list_who_tt: "Шлюбна унія з $LIST$, оскільки правителі мають [Concept('royal_marriage', 'CONCEPT_PLACEHOLDER')|e] між собою"
  getting_economic_support_list_who_tt: "$WHO$ отримує [Concept('economic_support', 'CONCEPT_PLACEHOLDER')|e] від $LIST$"
  giving_economic_support_list_who_tt: "$WHO$ надсилає [Concept('economic_support', 'CONCEPT_PLACEHOLDER')|e] до $LIST$"
  getting_war_reparations_list_who_tt: "$WHO$ отримує [Concept('war_reparations', 'CONCEPT_PLACEHOLDER')|e] від $LIST$"
  giving_war_reparations_list_who_tt: "$WHO$ надсилає [Concept('war_reparations', 'CONCEPT_PLACEHOLDER')|e] до $LIST$"
  truce_list_who_tt: "$WHO$ має перемир'я з $LIST$ до $EXTRA|Y$. Оголошення [Concept('war', 'CONCEPT_PLACEHOLDER')|e] під час перемир'я призведе до того, що агресор зазнає #R -50#! втрати [Concept('stability', 'CONCEPT_PLACEHOLDER')|e]."
  annul_treaties_list_who_tt: "$WHO$ було примушено анулювати договори з $LIST$ до $EXTRA|Y$."
  casus_belli_list_who_tt: "$WHO$ має [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти $LIST$. Це дозволить $WHO$ оголосити [Concept('war', 'CONCEPT_PLACEHOLDER')|e] без втрати [Concept('stability', 'CONCEPT_PLACEHOLDER')|e].\n\nВони мають наступний Casus Belli:\n$EXTRA$"
  casus_belli_target_list_who_tt: "$LIST$ має [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти $WHO$. Це дозволить $LIST$ оголосити [Concept('war', 'CONCEPT_PLACEHOLDER')|e] без втрати [Concept('stability', 'CONCEPT_PLACEHOLDER')|e].\n\nВони мають наступний Casus Belli:\n$EXTRA$"
  opinion_improvement_active_list_who_tt: "$WHO$ покращує [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] $LIST$ щодо себе. Щомісяця їхній [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] трохи покращуватиметься!"
  opinion_improvement_passive_list_who_tt: "$LIST$ покращує [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] $WHO$ щодо себе. Щомісяця їхній [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] трохи покращуватиметься!"
  gives_military_access_list_who_tt: "$WHO$ надає [military_access|E] $LIST$. Це дозволяє [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] $LIST$ марширувати через $WHO$."
  has_military_access_list_who_tt: "$WHO$ має [military_access|E] через $LIST$. Це дозволяє [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] $WHO$ марширувати через $LIST$."
  gives_fleet_basing_rights_list_who_tt: "$WHO$ надає [fleet_basing_rights|E] $LIST$. Це дозволяє флотам $LIST$ базуватися в $WHO$, а також дозволяє їхнім торговцям базуватися в їхніх портах."
  has_fleet_basing_rights_list_who_tt: "$WHO$ має [fleet_basing_rights|E] в $LIST$. Це дозволяє флотам $WHO$ базуватися в $LIST$, а також дозволяє їхнім торговцям базуватися в їхніх портах."
  civil_war_list_who_tt: "Перебуває у [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e] проти $WHO$. Вони битимуться, доки один повністю не підкорить іншого!"
  annex_list_who_tt: "$WHO$ анексує $LIST$ до своєї країни. Коли це буде зроблено, $LIST$ перестане існувати як [Concept('country', 'CONCEPT_PLACEHOLDER')|e], але стане повністю анексованою частиною $WHO$."
  annex_target_list_who_tt: "$WHO$ анексує $LIST$ до своєї країни. Коли це буде зроблено, $LIST$ перестане існувати як [Concept('country', 'CONCEPT_PLACEHOLDER')|e], але стане повністю анексованою частиною $WHO$."
  BEING_ANNEXED_LOYAL: "\nОскільки $SUBJECT$ не є [Concept('disloyal_subject', 'CONCEPT_PLACEHOLDER')|e], вони прогресуватимуть щомісяця."
  BEING_ANNEXED_DISLOYAL: "\nОднак, поки $SUBJECT$ залишається [Concept('disloyal_subject', 'CONCEPT_PLACEHOLDER')|e], вони не прогресуватимуть."
  ANNEX_PROGRESSING: "За поточного темпу анексія буде завершена до $DATE|Y$."
  ANNEX_STALLED: "Наразі анексія зупинена."
  building_spy_network_list_who_tt: "Будується [spy_network|E] у $WHO$. Наразі $CURR|2Y$, і збільшується на $VAL|+=2$ щомісяця, через:\n$WHY$"
  curry_favors_list_who_tt: "Накопичуються [favors|E] з $WHO$. Наразі $CURR|2Y$, і збільшується на $VAL|+=2$ щомісяця, через:\n$WHY$"
  vassalized_list_who_tt: "Васал $LIST$"
  vassalizing_list_who_tt: "Васал"
  casus_belli_creation_list_who_tt: "Створюється [CASUS_BELLI.GetName] [casus_belli|E] проти $WHO$, який, як очікується, буде готовий до $WHEN|Y$. Прогрес $CURR|2Y$ з $COST|0Y$, зі щомісячною зміною $CHANGE|+=2$ через:\n$WHY$"
  diplomatic_status_hre_name: "Священна Римська імперія"
  diplomatic_status_hre_tooltip: "#T Священна Римська імперія#!\nЦя країна є членом Священної Римської імперії."
  hre_list_who_tt: "$WHO$ перебуває у Священній Римській імперії з $LIST$"
  diplomatic_status_middle_kingdom_name: "Серединне Царство"
  diplomatic_status_middle_kingdom_tooltip: "#T Серединне Царство#!\nЦя [Concept('country', 'CONCEPT_PLACEHOLDER')|e] перебуває у сфері Серединного Царства."
  middle_kingdom_list_who_tt: "$WHO$ перебуває у Серединному Царстві з $LIST$"
  diplomatic_status_high_kingship_name: "Верховне Королівство"
  diplomatic_status_high_kingship_tooltip: "#T Верховне Королівство#!\nЦя [Concept('country', 'CONCEPT_PLACEHOLDER')|e] є членом Верховного Королівства."
  high_kingship_list_who_tt: "$WHO$ перебуває у Верховному Королівстві з $LIST$"
  diplomatic_status_lordship_of_ireland_name: "Лордство Ірландії"
  diplomatic_status_lordship_of_ireland_tooltip: "#T Лордство Ірландії#!\nЦя [Concept('country', 'CONCEPT_PLACEHOLDER')|e] є членом Лордства Ірландії."
  lordship_of_ireland_list_who_tt: "$WHO$ перебуває в [GetUniqueInternationalOrganization('lordship_of_ireland').GetName] з $LIST$."
