  jerusalem_the_holy_city_catholic: "Святе Місто $jerusalem$"
  jerusalem_the_holy_city_catholic_desc: "Збудована в IV столітті за імператора Костянтина, Церква Гробу Господнього в $jerusalem$ охоплює як Голгофу, так і гробницю Христа. Вона стала найсвятішим місцем у [ShowReligionGroupName('christian')] та її найважливішим центром паломництва. Попри періоди руйнувань та відбудов, вона залишалася під спільною $christian_ADJ$ опікою."
