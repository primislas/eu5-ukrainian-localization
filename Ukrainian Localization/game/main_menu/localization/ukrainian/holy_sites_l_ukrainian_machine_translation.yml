  shrine: "Святилище"
  shrine_desc: "Збудоване на місці значної духовної важливості, $shrine$ слугує зберігачем цієї духовності та для організації поклоніння їй."
  mountain: "Гора"
  mountain_desc: "Гори завжди вважалися джерелами божественного, і багато з них шануються як священна земля або навіть як прояв самих богів."
  episcopal_see: "Єпископська кафедра"
  episcopal_see_desc: "Єпископська кафедра — це територія юрисдикції єпископа. Вони надають додаткові переваги [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що їх контролюють."
  christian_holy_site: "Християнська святиня"
  christian_holy_site_desc: "Це [Concept('holy_site', 'CONCEPT_PLACEHOLDER')|e], важливе для [ShowReligionGroupAdjective('christian')] релігій."
  inti_holy_site: "Святиня Інті"
  inti_holy_site_desc: "Це [Concept('holy_site', 'CONCEPT_PLACEHOLDER')|e], важливе для всіх, хто сповідує віру [ShowReligionName('inti')]."
