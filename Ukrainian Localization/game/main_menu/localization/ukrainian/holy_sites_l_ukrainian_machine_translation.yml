  the_vatican: "Святий Петро у Ватикані"
  the_vatican_desc: "Оригінальна Папська Базиліка Святого Петра у Ватикані в [ShowLocationName('rome')] була замовлена імператором Костянтином у IV столітті над гробницею Святого Петра, першого $catholic_pope$. Вона стала головною церквою Західного [ShowReligionGroupName('christian')] та осідком папської влади. Вона також є одним з головних центрів паломництва для [ShowReligionName('catholic')]."
