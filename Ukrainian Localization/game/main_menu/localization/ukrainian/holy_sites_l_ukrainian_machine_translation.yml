  ranganathaswamy_temple_desc: "Храм Ранганатхасвамі в Шрірангамі є одним з найбільших і найсвятіших $hindu_ADJ$ храмових комплексів в Індії. Присвячений богу $vishnu_god$ як Ранганатха, він датується щонайменше раннім періодом Чола, з пізнішими розширеннями правителями Пандья та Віджаянагара. До 1337 року це великий паломницький центр у Південній Індії, відомий своїми величезними територіями, величними гопурамами та багатим релігійним надбанням."
