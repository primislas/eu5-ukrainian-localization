  tribal_matrilineal: "Племінний матріархальний"
  tribal_matrilineal_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] племені, в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є найстаршою дочкою попереднього [ruler]."
  matrilineal_non_exclusive: "Матрілінійний неексклюзивний"
  matrilineal_non_exclusive_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] володіння, в якому новий [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є найздібнішою особою в династії попереднього [ruler]."
  bank_selection: "Вибір нового керівника банку"
  elective_succession: "Виборна спадковість"
  elective_succession_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('monarchy')], в якому новий правитель обирається [ShowEstateTypeName('nobles_estate')]. Хоча кожен дворянин мав би право бути обраним, виборці віддають перевагу члену поточної династії на посаду монарха."
  dynastic_elective_succession: "Династична виборна спадковість"
  dynastic_elective_succession_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('monarchy')], в якому новий правитель обирається [ShowEstateTypeName('nobles_estate')]. Лише члени правлячої династії мають право бути обраними."
  dynastic_elective_succession_best_candidate_desc: "Визначається голосуванням [ShowEstateTypeName('nobles_estate')]."
  papal_election: "Папський конклав"
  papal_election_desc: "Коли Папа помирає, [Concept('cardinals', 'CONCEPT_PLACEHOLDER')|e] збираються, щоб обговорити, хто стане новим Папою. Це може бути швидко, але іноді може зайняти кілька років."
  papal_election_best_candidate_desc: "Визначається голосуванням [Concept('cardinals', 'CONCEPT_PLACEHOLDER')|e]."
  lottery_election_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається одним випадково обраним бюлетенем."
  lottery_election_best_candidate_desc: "Визначається випадковим голосуванням."
  doge_election_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається з еліти країни та править довічно.\nОднак дожа все ще можуть усунути, якщо його популярність серед [ShowEstateTypeName('nobles_estate')] або серед [ShowEstateTypeName('burghers_estate')] впаде."
  diarchic_election_desc: "Це унікальний тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] Республіки [GetCountry('GEN').GetName], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається з родин [ShowDynastyName('spinola_dynasty')] та [ShowDynastyName('doria_dynasty')]."
  veche_selection_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається серед одного або кількох кандидатів народними зборами або віче.\n\n$veche_selection_best_candidate_desc$"
  veche_selection_best_candidate_desc: "Новий [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається за допомогою [ShowCountryInteractionName('invite_prince')] [Concept('country_interaction', 'CONCEPT_PLACEHOLDER')|e]."
  bank_selection_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] Банківської родини, в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається серед членів династії."
  pirate_elective_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] Піратської [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається серед одного або кількох кандидатів екіпажами."
  cognatic_primogeniture_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('monarchy')], в якому [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] є найстаршим сином поточного [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], хоча жінки також можуть успадковувати, якщо немає більш підходящого чоловіка."
  absolute_cognatic_primogeniture_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('monarchy')], в якому [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] є найстаршою дитиною (чоловічої або жіночої статі) поточного [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]."
  salic_law_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('monarchy')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є найстаршим сином попереднього [ruler]. Діти жіночої статі ніколи не можуть успадковувати, ані передавати право на престол своїм синам."
  semi_salic_law_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('monarchy')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є найстаршим сином попереднього [ruler]. Діти жіночої статі ніколи не можуть успадковувати, але можуть передавати право на престол своїм синам."
  partition_inheritance_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('monarchy')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є найстаршим сином попереднього [Concept('ruler], а всі інші нащадки чоловічої статі отримують права на другорядні титули та території. Діти жіночої статі ніколи не можуть успадковувати, ані передавати право на престол своїм синам.\n\nКоли новий [ruler', 'CONCEPT_PLACEHOLDER')|e] приходить до влади, найменш контрольовані провінції країни отримують додаткові штрафи до свого [Concept('control', 'CONCEPT_PLACEHOLDER')|e], оскільки вони діляться між братами нового [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]."
  youngest_son_of_ruler_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] Королівства, в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є наймолодшим сином попереднього [ruler]."
  fratricide_succesion: "Братовбивство"
  fratricide_succesion_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('monarchy')], в якому новий [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] сходить на престол, як тільки він продемонструє, що його статки перевершують статки його суперників, зазвичай шляхом усунення кожного з них."
  fratricide_succesion_best_candidate_desc: "Новий [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається, як тільки він продемонструє, що його статки перевершують статки його суперників, зазвичай шляхом усунення кожного з них."
  unigeniture: "Унігенітура"
  unigeniture_desc: "Система успадкування, заснована на наявності одного спадкоємця. Сходження на престол найстаршого сина королівської родини може означати нестабільність між потенційними спадкоємцями та членами правлячої династії, які перебувають у черзі престолонаслідування. Це може призвести до нестабільності, оскільки інші сини можуть отримати лише другорядні титули."
  mamluk_succesion: "$mamluk$ Престолонаслідування"
  mamluk_succesion_desc: "$mamluk_succesion_regency_desc$"
  oligarchic_elective_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається з лав правлячої меншості шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e]."
  podesta_elective: "Виборна Потестат"
  podesta_elective_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається з [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що має присутність у [Concept('region', 'CONCEPT_PLACEHOLDER')|e] своєї [Concept('capital', 'CONCEPT_PLACEHOLDER')|e]."
  republic_4_year_terms_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e] на встановлений термін у 4 роки."
  republic_2_year_terms_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e] на встановлений термін у 2 роки."
  peasant_elective_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є селянином, обраним шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e]."
  theocratic_elective_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('theocracy')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є теократом, обраним шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e]."
  bishopric_elective_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('theocracy')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є єпископом, обраним шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e] між можливими внутрішніми та міжнародними кандидатами."
  grandmaster_elective_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('theocracy')] з [ShowGovernmentReformName('military_order_reform')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається з лав ордену шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e]."
  abbot_elective_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('theocracy')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є абатом, обраним шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e]."
  tribal_oldest_male_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] Племені, в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є найстарішим сином попереднього [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]."
  military_dictatorship: "Військова диктатура"
  military_dictatorship_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] для [ShowGovernmentTypeName('republic')], в якому найбільш військово видатний [Concept('character', 'CONCEPT_PLACEHOLDER')|e] править довічно."
  signoria_selection: "Вибори синьйорії"
  signoria_selection_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] для [ShowGovernmentTypeName('republic')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] обирається довічно серед членів впливової родини, і зазвичай це дитина попереднього [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]."
  judicial_election: "Судові вибори"
  judicial_election_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] для [ShowGovernmentTypeName('monarchy')], в якому новий правитель обирається з верховного суду. Процес є бюрократичним хаосом і може тривати кілька місяців або навіть років, перш ніж буде вирішений."
  admiralty_regime_heir_selection: "Вибори адмірала"
  admiralty_regime_heir_selection_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] для [ShowGovernmentReformName('admiralty_regime_reform')], в якому новий правитель обирається з провідних адміралів. У разі відсутності адмірала тимчасова рада очолюватиме державу, доки не буде знайдено відповідного кандидата."
  admiralty_regime_heir_selection_best_candidate_desc: "Визначається здібностями адмірала"
  general_heir_selection: "Вибори Генерального штабу"
  general_heir_selection_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] для [ShowGovernmentReformName('military_regime_reform')], в якому новий правитель обирається з провідних генералів. У разі відсутності генерала тимчасова рада очолюватиме державу, доки не буде знайдено відповідного кандидата."
  ritual_selection: "Ритуальний вибір"
  ritual_selection_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e], що використовується в багатьох культурах по всьому світу, в якому новий правитель обирається з синів попереднього правителя шляхом проведення ритуального змагання, де переможець отримує право на правління."
  ritual_selection_best_candidate_desc: "Визначається змаганням."
  union_of_crowns_succession: "Успадкування Союзу Корон"
  union_of_crowns_succession_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e], що використовується країнами, які мають особливу угоду з іншою [ShowGovernmentTypeName('monarchy')]. У разі смерті одного з правителів будь-якої країни без законного чоловічого [Concept('heir', 'CONCEPT_PLACEHOLDER')|e], інший правитель успадкує трон першого."
  union_of_crowns_succession_tt: "Сформувати [Concept('union', 'CONCEPT_PLACEHOLDER')|e] у випадку, якщо наш наступник не є чоловічим спадкоємцем нашого попереднього правителя"
  austrian_cognatic_primogeniture: "Династичне когнатичне первородство"
  austrian_cognatic_primogeniture_desc: "$cognatic_primogeniture_desc$ Доступно після надання [ShowGovernmentReformName('libertas_affectandi')]. На додаток до правил когнатичного первородства, правляча династія має преференційне ставлення над прямою чоловічою лінією."
