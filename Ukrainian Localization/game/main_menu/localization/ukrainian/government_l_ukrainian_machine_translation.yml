  assembly_desc: "Скликання всіх вільних людей нашого домену є єдиним способом для нас визначити напрямок нашої країни."
  council: "Рада"
  council_desc: "Хоча влада зосереджена в руках єдиного авторитарного монарха в багатьох суспільствах, багато інших побачили альтернативні переваги системи, що дозволяє раді обговорювати та дебатувати питання перед тим, як діяти."
  estate_parliament: "Становий парламент"
  estate_parliament_desc: "Представники Станів зберуться в парламенті, щоб обговорити питання та знайти спільну мову в досягненні цих цілей."
  autocratic_parliament: "Автократичний парламент"
  autocratic_parliament_desc: "Проблема з розділеною владою полягає в тому, що багато термінових дій уряду можуть легко загрузнути в бюрократичному хаосі та затяжних дискусіях. Влада Держави повинна бути зосереджена в руках суверена для забезпечення успіху нашої країни."
  constitutional_parliament: "Конституційний парламент"
  constitutional_parliament_desc: "Влада правителя повинна бути регульована, тоді як влада та справедливість перебувають у руках народу. У Конституційній Системі роль мас значно розширюється."
  dutch_parliament: "Нідерландський парламент"
  dutch_parliament_desc: "Заможні члени парламенту наділяються більшими повноваженнями, тоді як духовенство позбавлене представництва."
  plc_parliament: "Польсько-Литовський парламент"
  plc_parliament_desc: "Парламент Речі Посполитої надає більші повноваження шляхетним представникам."
