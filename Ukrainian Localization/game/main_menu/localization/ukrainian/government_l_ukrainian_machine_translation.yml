  tanistry_elective: "Виборна таністрія"
  tanistry_elective_desc: "Традиційна гельська форма правління, за якої правлячий клан обирає найкомпетентнішого спадкоємця з-поміж себе. Бути нащадком історичного правителя по чоловічій лінії збільшує шанси бути обраним, хоча вважається непристойним обирати дитину поточного правителя.\n\nЦей процес, як правило, сприяє обранню найбільш кваліфікованої особи, але оскільки правління часто переходить між кількома гілками родинного дерева в дещо довільному процесі відбору, це часто призводить до чвар."
