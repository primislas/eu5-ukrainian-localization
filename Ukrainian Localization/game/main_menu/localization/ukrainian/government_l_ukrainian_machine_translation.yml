  abbess_elective_female_desc: "Це тип [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowGovernmentTypeName('theocracy')], в якому [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] є абатисою, обраною шляхом [Concept('election', 'CONCEPT_PLACEHOLDER')|e]."
