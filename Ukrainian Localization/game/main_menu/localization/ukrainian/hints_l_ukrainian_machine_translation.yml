l_english:
  TAB_TOOLTIP_HINTS_TITLE: "Підказки"
  TAB_TOOLTIP_HINTS: "#T Підказки#!\nЦя панель містить підказки, що стосуються вашого поточного положення в грі."
  OPEN_HINTS: "Відкрити підказки"
  OPEN_HINT: "Відкрити підказку"
  EXPAND_HINT: "Натисніть, щоб розгорнути підказку"
  COLLAPSE_HINT: "Натисніть, щоб згорнути підказку"
  EMPTY_HINT_SCREEN_TEXT: "Наша нація процвітає, і ми не маємо порад!"
  OPEN_HINT_TEXT: "Переглянути підказку @hint!"
  ALERT_HINT: "Відкрити з підказкою"
  ALERT_ADVANCES_HINT: "Відкрити панель розвитку з підказкою"
  HINT_TITLE: "Підказка @hint!"
  RECOMMENDED_ACTIONS_TITLE: "@hint! Рекомендовані дії"
  SCRIPTABLE_HINT_DEFINITION_TEXT: "$MAIN_HINT$ $CONTEXT_HINT$"
  HINT_DIVIDER: "\n\n---\n\n"
  HINT_SORT_BY_PRIORITY: "Сортувати за пріоритетом"
  hint_advisor_salute_diplomatic: "\n\"Вітаю, Ваша Високосте. Я [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('diplomatic').GetName], ваш політичний радник і найскромніший слуга.\""
  hint_advisor_salute_administrative: "\n\"Ваш покірний слуга носить ім'я [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('administrative').GetName], вірний радник вашої ясновельможності у всіх економічних справах.\""
  hint_advisor_salute_military: "\n\"Моє ім'я [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('military').GetName], ваш експерт з військових питань. До ваших послуг.\""
  HINTS_AND_SUGGESTIONS: "Підказки та пропозиції"
  MANPOWER_HINT: "Мало рекрутів!"
  manpower_topbar_hint: "Ми отримуємо більше [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] переважно від будівництва певних типів [Concept('building', 'CONCEPT_PLACEHOLDER')|e]."
  MANPOWER_HINT_EXTRA: "Ми могли б побудувати наступні будівлі, щоб отримати більше [manpower|E]:"
  MANPOWER_HINT_NONE: "На жаль, ми не можемо побудувати жодних будівель, які дали б нам рекрутів."
  MANPOWER_HINT_BUILDING: "$BULLET_WITH_TAB$[BUILDING_TYPE.GetName]"
  SAILORS_HINT: "Мало моряків!"
  sailors_topbar_hint: "Ми отримуємо більше [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e] переважно від будівництва певних типів [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] у прибережних [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]."
  SAILOR_HINT_EXTRA: "Ми могли б побудувати наступні будівлі, щоб отримати більше моряків:"
  SAILOR_HINT_NONE: "На жаль, ми не можемо побудувати жодних будівель, які дали б нам моряків."
  SAILOR_HINT_BUILDING: "$BULLET_WITH_TAB$[BUILDING_TYPE.GetName]"
  INVALID_MODIFIER_TYPE: "Шукаємо недійсний тип модифікатора!"
  EMPTY_RESEARCH_HINT: "Ми можемо обрати дослідження!"
  empty_research_topbar_hint: "@trigger_no! Немає жодних недоліків у активному [Concept('research', 'CONCEPT_PLACEHOLDER')|e], і ми наразі втрачаємо прогрес, який міг би бути досягнутий інакше."
  NO_BUILDINGS_WITH_MODIFIER: "Жоден"
  GOLD_HINT: "Працюємо з дефіцитом!"
  gold_topbar_hint: "Якщо ми маємо дефіцит, ми можемо зменшити наші [Concept('expenses', 'CONCEPT_PLACEHOLDER')|e], збільшити [Concept('taxes', 'CONCEPT_PLACEHOLDER')|e] або [Concept('mint', 'CONCEPT_PLACEHOLDER')|e] більше монет. Якщо у нас закінчиться [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], ми будемо змушені брати [Concept('loans', 'CONCEPT_PLACEHOLDER')|e] і зрештою можемо стати [Concept('bankrupt', 'CONCEPT_PLACEHOLDER')|e]."
  STABILITY_HINT: "Наша країна нестабільна!"
  stability_topbar_hint: "Дії, які ми можемо зробити для підвищення стабільності, включають:\n$BULLET_WITH_TAB$Збільшення кількості [GetPlayer.GetReligion.GetAdjective] [ShowPopTypeName('clergy')].\n$BULLET_WITH_TAB$Інвестування більшої частини [Concept('budget', 'CONCEPT_PLACEHOLDER')|e] у стабільність.\n$BULLET_WITH_TAB$Наказ [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('stabilize_country')]."
  LEGITIMACY_HINT: "[Localize( GetPlayer.GetGovernment.GetGovernmentType.GetPowerKey )] низький!"
  legitimacy_topbar_hint: "Ми можемо вирішити це кількома способами:\n$BULLET_WITH_TAB$Збільшити [Concept('budget', 'CONCEPT_PLACEHOLDER')|e] на [Concept('court_maintenance', 'CONCEPT_PLACEHOLDER')|e].\n$BULLET_WITH_TAB$Наказати [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('strengthen_government')]."
  devotion_topbar_hint: "$legitimacy_topbar_hint$"
  republican_tradition_topbar_hint: "$legitimacy_topbar_hint$"
  horde_unity_topbar_hint: "$legitimacy_topbar_hint$"
  tribal_cohesion_topbar_hint: "$legitimacy_topbar_hint$"
  GOLD_VIEW_HINT: "Переглянути пораду щодо дефіциту"
  hint_in_deficit: "Від'ємний баланс"
  hint_in_deficit_hint_text: "$hint_in_deficit_hint_text_1$\n\n$hint_in_deficit_hint_text_2$\n\n$hint_in_deficit_hint_text_3$"
  hint_in_deficit_hint_text_1: "Ми маємо від'ємний баланс. Якщо ми не будемо обережні, це може призвести до боргів або навіть банкрутства."
  hint_in_deficit_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Перейдіть до @economy_panel![Link('finances', '', 'lateralview_economy_entry_name')], щоб побачити наші [Concept('income', 'CONCEPT_PLACEHOLDER')|e] та [Concept('expenses]. Ви можете пересувати повзунки, щоб збільшити [taxes', 'CONCEPT_PLACEHOLDER')|e] або зменшити витрати.\n@arrow_bonus_tier_2! Переконайтеся, що всі наші [buildings|E] прибуткові, або побудуйте більше, якщо ми можемо їх підтримувати. Ви можете зробити це на @production_panel![Link('production', '', 'lateralview_production_entry_name')].\n@arrow_bonus_tier_2! Управління або використання ваших [estates|E] також може принести значні прибутки в короткостроковій або довгостроковій перспективі. Пам'ятайте, що стани можуть також мати значну політичну владу, і надмірне покладання на них може бути ризикованим. Ви знайдете їх на @government_panel![Link('government', 'tabcontent = estates', 'lateralview_government_entry_name')]\n@arrow_bonus_tier_1! Налаштування прибуткових [trades|E] також є чудовим джерелом доходу. Перегляньте існуючі або потенційні торговельні шляхи на @economy_panel![Link('trade', '', 'lateralview_trade_entry_name')]"
  hint_in_deficit_hint_text_3: "#T Додаткові підказки:#!\n@hint! [laws|E], [reforms|E], [diplomacy|E] та інше також можуть надати вам варіанти вирішення проблеми від'ємного балансу."
  hint_in_deficit_military: "\"Війна може бути дорогою в короткостроковій перспективі, але якщо ми будемо успішними, ми можемо змусити наших ворогів заплатити за неї. Захоплення земель може принести нам довгострокові вигоди, а вимагання від ворогів може забезпечити короткостроковий приплив багатства.\""
  hint_in_deficit_explorer: "\"Великі невідомі землі, безсумнівно, сповнені багатств, готових до розробки та грабунку.\""
  hint_in_deficit_administrative: "\"Встановлення домінування на наших внутрішніх ринках було б чудовим способом примножити наше багатство. Якщо ми відчуваємо себе ще амбітнішими, створення плацдармів на іноземних ринках може ще більше прискорити зростання.\""
  hint_in_deficit_diplomatic: "\"Як кажуть, щоб заробити гроші, треба їх витратити! Забезпечення прибутковості наших будівель та населення — найкращий спосіб змінити курс.\""
  hint_cultural_capacity: "Перевищення Культурної Місткості"
  hint_cultural_capacity_hint_text: "$hint_cultural_capacity_hint_text_1$\n\n$hint_cultural_capacity_hint_text_2$\n\n$hint_cultural_capacity_hint_text_3$"
  hint_cultural_capacity_hint_text_1: "Хоча мультикультуралізм може пропонувати багато переваг, нації, неготові до адміністративних тягарів та позбавлені [cultural_capacity|E], страждатимуть від покарань. [pops|E], що належать до [cultures|E] інших, ніж наша [primary_culture|E], зазвичай починатимуть як [non_accepted_culture_short|E], але можуть стати [tolerated_culture_short|E] або [accepted_culture_short|E] за певну плату."
  hint_cultural_capacity_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Розгляньте можливість пониження статусу менш стратегічно важливої культури, щоб зменшити витрати.\n@arrow_bonus_tier_2! Існують джерела [ShowModifierTypeName('cultures_capacity')], які зазвичай зустрічаються в [government_reforms|E] та [advances|E]."
  hint_cultural_capacity_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('assimilation', 'CONCEPT_PLACEHOLDER')|e] також може допомогти зменшити кількість культур у країні."
  hint_cultural_capacity_military: "\"Використання наших культур на повну силу є життєво важливим для створення культурних традицій та впливу, що дає нам перевагу у випадку культурного конфлікту. Збільшення прав іноземних культур також надасть нам додаткові загони та солдатів.\""
  hint_cultural_capacity_administrative: "\"Наша культура також може бути виражена чудовими витворами мистецтва, створеними художниками нашої нації. Зрештою, що таке нація, як не сума її впливу на світ?\""
  hint_cultural_capacity_diplomatic: "\"З часом, іноземні культури можуть асимілюватися, ставши ближчими до нашої основної культури в [GetPlayer.GetNameWithNoTooltip]! Хто б не захотів бути [GetPlayer.GetCulture.GetNameWithNoTooltip]?\""
  hint_unhappy_estates: "Невдоволені Стани"
  hint_unhappy_estates_hint_text: "$hint_unhappy_estates_hint_text_1$\n\n$hint_unhappy_estates_hint_text_2$\n\n$hint_unhappy_estates_hint_text_3$"
  hint_unhappy_estates_hint_text_1: "Підтримання [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] у задоволеному стані є важливою, повсякденною частиною управління країною. Між ними вони становлять значну частку економічної та військової могутності країни.\n\nКожен нелояльний [Concept('estate] завдаватиме покарань вашій [country] та зробить її складові [pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] дуже ймовірними для приєднання до [Concept('rebellions_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_unhappy_estates_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Їхню продуктивність та [estate_satisfaction_short|E] можна регулювати, надаючи або відкликаючи привілеї на @government_panel![Link('government', 'tabcontent = estates', 'lateralview_government_entry_name')].\n@arrow_bonus_tier_2! Підвищення та зниження податків на @economy_panel![Link('finances', '', 'lateralview_economy_entry_name')] також впливатиме на їхнє задоволення."
  hint_unhappy_estates_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e] також може бути використаний для допомоги в управлінні [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e].\n@hint! Дізнайтеся більше про [rebel_movements_with_icon] у [Link('hints', 'selected_hint = hint_rebels_growing', 'Підказка про Повстанців')]."
  hint_unhappy_estates_administrative: "\"Стани є абсолютно життєво важливими для здорової торгової імперії. Так, можливо, нам доведеться відмовитися від деякої влади в довгостроковій перспективі, але подумайте про економіку!\""
  hint_unhappy_estates_diplomatic: "\"Наші стани можуть навіть мати думки щодо дипломатичних питань. Варто враховувати їхню оцінку іноземної держави при оцінці союзів чи пактів.\""
  hint_unhappy_estates_military: "\"Наші стани надають вкрай важливі рекрути для розширення. Якщо ми не утримаємо їх на нашому боці, ми можемо виявити дефіцит новобранців саме тоді, коли вони нам потрібні.\""
  ESTATE_CONTEXT_TEXT: "У вашій країні $LIST$ незадоволені.\n\n$TEXT$"
  HINT_UNHAPPY_ESTATE: "[ESTATE.GetName]"
  hint_manpower: "Людські ресурси"
  hint_manpower_hint_text: "$hint_manpower_hint_text_1$\n\n$hint_manpower_hint_text_2$\n\n$hint_manpower_hint_text_3$"
  hint_manpower_hint_text_1: "Наші [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] – це наш резерв чоловіків, готових бути набраними як [Concept('regulars', 'CONCEPT_PLACEHOLDER')|e] для наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]. Регуляри значно перевершують [Concept('levies', 'CONCEPT_PLACEHOLDER')|e] у [Concept('battle', 'CONCEPT_PLACEHOLDER')|e], але вони дорогі, тому не кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може дозволити їх на початку гри."
  hint_manpower_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Якщо ми покладаємося на [Concept('regulars] для ведення війни, низькі [manpower] суттєво обмежують нашу здатність поповнювати наші [armies', 'CONCEPT_PLACEHOLDER')|e], тому нерозумно оголошувати [war|E] за низького рівня людських ресурсів.\n@arrow_bonus_tier_2! Якщо у нас закінчуються людські ресурси під час війни, подумайте про більш широке використання [levies|E], найм [mercenaries|E] або навіть розгляньте можливість просити [peace|E]."
  hint_manpower_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ми можемо розвивати максимальні людські ресурси нашої нації та здатність набирати постійну армію за допомогою різних [buildings|E].\n@hint! [estate_privileges|E] та [laws|E] також можуть впливати на наш потенціал людських ресурсів."
  hint_manpower_diplomatic: "\"Елітна, регулярна армія, укомплектована добрими [GetPlayer.GetAdjectiveWithNoTooltip] чоловіками та юнаками, ймовірно, буде найефективнішою бойовою силою, чоловік до чоловіка.\""
  hint_manpower_military: "\"Завоювання має використовувати всі доступні нам засоби. Широкомасштабна армія повинна використовувати найманців, ополченців та регулярну армію.\""
  hint_manpower_administrative: "\"Просто пам'ятайте, що кожен солдат, який гине на полі бою, – це на одного фермера менше, щоб працювати в полях. Війна – дорога.\""
  hint_low_stability: "Низька Стабільність"
  hint_low_stability_hint_text: "$hint_low_stability_hint_text_1$\n\n$hint_low_stability_hint_text_2$\n\n$hint_low_stability_hint_text_3$"
  hint_low_stability_hint_text_1: "Якщо наша [stability|E] низька, ми ризикуємо дедалі більше, що [pops|E] приєднаються до [rebellion|E], незадоволення [estate|E] призведе до [civil_war|E], та загального стану заворушень у нашій нації."
  stability_raise_actions: "@arrow_bonus_tier_3! Більше інвестувати з [Concept('budget', 'CONCEPT_PLACEHOLDER')|e] у стабільність.\n@arrow_bonus_tier_2! Доручити [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('stabilize_country')]\n@arrow_bonus_tier_1! Збільшити кількість [GetPlayer.GetReligion.GetAdjective] [ShowPopTypeName('clergy')]."
  hint_low_stability_hint_text_2: "#T Рекомендовані дії:#!\n$stability_raise_actions$"
  hint_low_stability_hint_text_3: "#T Додаткові підказки:#!\n@hint! Існують інші джерела стабільності, такі як [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('policies', 'CONCEPT_PLACEHOLDER')|e].\n@hint! Пам'ятайте, що стабільність також споживається деякими важливими діями, такими як оголошення [wars|E] без належного [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] або зміна [Concept('law', 'CONCEPT_PLACEHOLDER')|e]."
  hint_low_stability_administrative: "\"Нація з високою стабільністю, звичайно, є нацією в стані процвітання! Коли врожай щедрий, то і потік багатства в наші скарбниці такий самий.\""
  hint_low_stability_military: "\"Нація не може безпечно панувати, не забезпечивши спочатку умиротворення свого населення. Простолюдин так любить свої вила...\""
  hint_low_stability_diplomatic: "\"Наші сусіди почнуть дивитися зверхньо, якщо ми зануримо нашу країну в руїну. Чи могли б ми щось із цим зробити?\""
  hint_very_low_stability: "Дуже Низька Стабільність"
  hint_very_low_stability_hint_text: "$hint_very_low_stability_hint_text_1$\n\n$hint_very_low_stability_hint_text_2$\n\n$hint_very_low_stability_hint_text_3$"
  hint_very_low_stability_hint_text_1: "Наша [stability|E] вкрай низька, і ми наражаємося на страшний ризик того, що [pops|E] приєднаються до [rebellion|E], незадоволення [estate|E] призведе до [civil_war|E], а наші вороги скористаються можливістю завдати удару, поки ми слабкі."
  hint_very_low_stability_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми повинні якомога швидше підвищити стабільність і уникати оголошення нових [wars|E] або подальших дій, що знижують стабільність.\n$stability_raise_actions$"
  hint_very_low_stability_hint_text_3: "$hint_low_stability_hint_text_3$"
  hint_very_low_stability_administrative: "\"Як можна очікувати, що хтось буде займатися бізнесом у такій економіці? Хтось, будь ласка, допоможіть нам з бюджетом, наша худоба голодує.\""
  hint_very_low_stability_military: "\"Будь-який ворог [GetPlayer.GetNameWithNoTooltip] був би абсолютно в захваті від того, наскільки слабкими ми виглядаємо зараз. Ми повинні очікувати, що наші суперники та вороги починають змовлятися проти нас.\""
  hint_very_low_stability_diplomatic: "\"Хоча нація в період високої стабільності переживає відмінну соціальну мобільність, ми, здається, винайшли свого роду соціальну демобілізацію.\""
  hint_low_legitimacy: "Низька Легітимність"
  hint_low_legitimacy_hint_text: "$hint_low_legitimacy_hint_text_1$\n\n$hint_low_legitimacy_hint_text_2$\n\n$hint_low_legitimacy_hint_text_3$"
  hint_low_legitimacy_hint_text_1: "[legitimacy|E] представляє погляд світу на право нашого [GetPlayer.GetGovernment.GetRulerTitle] панувати. Якщо воно падає занадто низько, ми не тільки втратимо будь-які переваги для [crown_power|E] та зменшення шансів [rebellion|E], але й почнемо отримувати штрафи до задоволеності [estate|E] та [righteousness|E]."
  hint_low_legitimacy_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми повинні прагнути підтримувати нашу легітимність якомога вищою, щоб мінімізувати будь-які потенційні штрафи.\n@arrow_bonus_tier_2! Збільшення нашого [Concept('court_maintenance', 'CONCEPT_PLACEHOLDER')|e] допоможе підтримувати високу [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_2! Ми також можемо отримати інші джерела [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e], такі як [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('policies', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Оберіть [Concept('cabinet_action_with_icon', 'CONCEPT_PLACEHOLDER')|e] під назвою [ShowCabinetActionName('strengthen_government')]."
  hint_low_legitimacy_hint_text_3: "#T Додаткові підказки:#!\n@hint! Як і більшість важливих цінностей, потрібен час, щоб створити сприятливе ставлення до вашої [dynasty|E], тож переконайтеся, що мислите на довгострокову перспективу."
  hint_low_legitimacy_administrative: "\"Кожен, хто перевірить реєстри нашого родоводу та велич нашого двору, не зможе заперечити наше право на правління.\""
  hint_low_legitimacy_military: "\"Як ми можемо очікувати, що наші армії будуть боятися, якщо наші власні солдати сумніваються в нашому керівництві?\""
  hint_low_legitimacy_diplomatic: "\"Іноді внутрішня сила може походити від того, як нас сприймають інші, а наші союзники також можуть допомогти нам у скрутні часи.\""
  hint_low_republican_tradition: "Низька республіканська традиція"
  hint_low_republican_tradition_hint_text: "$hint_low_republican_tradition_hint_text_1$\n\n$hint_low_republican_tradition_hint_text_2$\n\n$hint_low_republican_tradition_hint_text_3$"
  hint_low_republican_tradition_hint_text_1: "[republican_tradition|E] є оплотом республіканізму в межах нашого [GetPlayer.GetGovernment.GetGovernmentType.GetName]. Якщо вона впаде надто низько, ми не тільки втратимо будь-які переваги для [legislative_efficiency|E] та зменшення шансів на [rebellion|E], але й почнемо отримувати суворі штрафи до вартості підвищення [stability|E]."
  hint_low_republican_tradition_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми повинні прагнути підтримувати нашу традицію якомога вищою, щоб мінімізувати будь-які потенційні штрафи.\n@arrow_bonus_tier_2! Збільшення нашого [Concept('court_maintenance', 'CONCEPT_PLACEHOLDER')|e] допоможе підтримувати [Concept('republican_tradition', 'CONCEPT_PLACEHOLDER')|e] високою.\n@arrow_bonus_tier_2! Ми також можемо отримати інші джерела [Concept('republican_tradition', 'CONCEPT_PLACEHOLDER')|e], такі як [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('policies', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Зміна [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] під час [Concept('election', 'CONCEPT_PLACEHOLDER')|e] також допоможе підтримувати [Concept('republican_tradition', 'CONCEPT_PLACEHOLDER')|e] високою."
  hint_low_republican_tradition_hint_text_3: "#T Додаткові підказки:#!\n@hint! Як і більшість важливих цінностей, навчання населення цінностям республіканізму — це довгострокове завдання, тому думайте наперед."
  hint_low_republican_tradition_administrative: "\"Вибори є природним процесом будь-якої здорової республіки.\""
  hint_low_republican_tradition_military: "\"Навіть найманці не захочуть воювати за нас, якщо ми здаватимемося тиранами.\""
  hint_low_republican_tradition_diplomatic: "\"Жодна нація, яка пишається своєю силою, не захоче об'єднуватися з країною, що відверто зневажає принципи свого заснування.\""
  hint_low_devotion: "Низька набожність"
  hint_low_devotion_hint_text: "$hint_low_devotion_hint_text_1$\n\n$hint_low_devotion_hint_text_2$\n\n$hint_low_devotion_hint_text_3$"
  hint_low_devotion_hint_text_1: "$game_concept_devotion_desc$ Якщо вона впаде надто низько, ми не тільки втратимо будь-які переваги для [religious_influence|E] та зменшення шансів на [rebellion|E], але й почнемо отримувати штрафи до задоволеності [estate|E]."
  hint_low_devotion_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми повинні прагнути підтримувати нашу набожність якомога вищою, щоб мінімізувати будь-які потенційні штрафи.\n@arrow_bonus_tier_2! Збільшення нашого [Concept('court_maintenance', 'CONCEPT_PLACEHOLDER')|e] допоможе підтримувати [Concept('devotion', 'CONCEPT_PLACEHOLDER')|e] високою.\n@arrow_bonus_tier_2! Ми також можемо отримати інші джерела [Concept('devotion', 'CONCEPT_PLACEHOLDER')|e], такі як [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('policies', 'CONCEPT_PLACEHOLDER')|e]."
  hint_low_devotion_hint_text_3: "#T Додаткові підказки:#!\n@hint! Як і більшість важливих цінностей, сприяння релігійному завзяттю — це не одноденна справа, тож переконайтеся, що мислите на довгострокову перспективу."
  hint_low_devotion_administrative: "\"Недостатньо нам представляти віру та виступати її захисниками, ми також повинні самі відповідати цій ролі.\""
  hint_low_devotion_military: "\"Якщо наші армії мають бути мечем і щитом віруючих, ми повинні бути тим маяком, за який вони борються.\""
  hint_low_devotion_diplomatic: "\"Нашою метою має бути поширення нашої віри якомога далі й ширше, але ніхто не захоче вірити нашим словам, якщо ми не виглядатимемо побожними.\""
  hint_low_horde_unity: "Низька єдність Орди"
  hint_low_horde_unity_hint_text: "$hint_low_horde_unity_hint_text_1$\n\n$hint_low_horde_unity_hint_text_2$\n\n$hint_low_horde_unity_hint_text_3$"
  hint_low_horde_unity_hint_text_1: "$game_concept_horde_unity_desc$"
  hint_low_horde_unity_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Вигнання ворогів перед нами є безумовно найефективнішим методом об'єднання орди.\n@arrow_bonus_tier_2! Збільшення нашого [Concept('court_maintenance', 'CONCEPT_PLACEHOLDER')|e] допоможе підтримувати [Concept('horde_unity', 'CONCEPT_PLACEHOLDER')|e] високою.\n@arrow_bonus_tier_2! Ми також можемо отримати інші джерела [Concept('horde_unity', 'CONCEPT_PLACEHOLDER')|e], такі як [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('policies', 'CONCEPT_PLACEHOLDER')|e]."
  hint_low_horde_unity_hint_text_3: "#T Додаткові підказки:#!\n@hint! Можуть бути руйнівні наслідки, якщо наша єдність буде надто низькою, тому нам краще підтримувати її високою."
  hint_low_horde_unity_administrative: "\"Розділяй і володарюй – добре відома стратегія. Якщо ми не будемо об'єднані, нас буде підкорено.\""
  hint_low_horde_unity_military: "\"Як каже наша приказка: добро приходить до тих, хто забирає його у слабких. Влада об'єднує нас, і з владою ми будемо єдині!\""
  hint_low_horde_unity_diplomatic: "\"Сила нашої бойової майстерності безпосередньо залежить від того, наскільки ми об'єднані як плем'я. Успіх у війні та завоюваннях — це самоздійснюване пророцтво.\""
  hint_low_tribal_cohesion: "Низька племінна згуртованість"
  hint_low_tribal_cohesion_hint_text: "$hint_low_tribal_cohesion_hint_text_1$\n\n$hint_low_tribal_cohesion_hint_text_2$\n\n$hint_low_tribal_cohesion_hint_text_3$"
  hint_low_tribal_cohesion_hint_text_1: "$game_concept_tribal_cohesion_desc$ На відміну від інших [government_types|E], племінні уряди отримують вигоду від значно збільшених розмірів ополчення зі зростанням згуртованості. Якщо ми хочемо приймати ефективні військові рішення, нам потрібно буде залучати племена."
  hint_low_tribal_cohesion_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_2! Збільшення нашого [Concept('court_maintenance', 'CONCEPT_PLACEHOLDER')|e] допоможе підтримувати [Concept('tribal_cohesion', 'CONCEPT_PLACEHOLDER')|e] високою.\n@arrow_bonus_tier_2! Ми також можемо отримати інші джерела [Concept('tribal_cohesion', 'CONCEPT_PLACEHOLDER')|e], такі як [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('policies', 'CONCEPT_PLACEHOLDER')|e]."
  hint_low_tribal_cohesion_hint_text_3: "#T Додаткові підказки:#!\n@hint! Можуть бути руйнівні наслідки, якщо наша згуртованість буде надто низькою, тому нам краще підтримувати її високою."
  hint_low_tribal_cohesion_administrative: "\"Якщо ми просто ігноруватимемо це, наша згуртованість впаде. Управління країною вимагає уваги до деталей.\""
  hint_low_tribal_cohesion_military: "\"Погана племінна згуртованість робить нас слабкими. Слабкість руйнує нас далі. Не йдіть далі цим шляхом, інакше ми можемо опинитися завойованими та поневоленими.\""
  hint_low_tribal_cohesion_diplomatic: "\"Стани настільки вкорінені в багатьох аспектах країни, що майже будь-яка наша дія може мати наслідки в майбутньому. Стратегія вимагає довгострокового планування.\""
  hint_war_exhaustion: "Висока виснаженість війною"
  hint_war_exhaustion_hint_text: "$hint_war_exhaustion_hint_text_1$\n\n$hint_war_exhaustion_hint_text_2$\n\n$hint_war_exhaustion_hint_text_3$"
  hint_war_exhaustion_hint_text_1: "[war_exhaustion|E] — це показник, що відображає загальну втому, яку відчуває наше населення від перебування у стані війни. Високий рівень виснаженості війною може бути надзвичайно небезпечним для будь-якої країни. Зі зростанням виснаженості війною зменшуватиметься бойова ефективність наших [army|E] та [levies|E], зростання наших [pops|E] та руйнуватиметься наша економіка."
  hint_war_exhaustion_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Найефективнішим і гарантованим методом є перебування у мирі.\n@arrow_bonus_tier_2! Деякі [laws|E] та [estate_privileges|E] можуть допомогти зменшити виснаженість війною з часом."
  hint_war_exhaustion_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ми повинні дозувати наші завоювання і не оголошувати [wars|E], якщо ми вже перебуваємо у стані високої виснаженості війною."
  hint_war_exhaustion_administrative: "\"Вирішальні війни можуть принести користь, але населення, втомлене від війни, може бути лише поганим явищем. Виробництво падає, споживання падає, відверто кажучи – все падає!\""
  hint_war_exhaustion_military: "\"Втома від війни може бути небезпечною, але це насамперед результат поганої тактики. Величезні втрати та значні поразки швидко налаштують наш народ проти нас.\""
  hint_war_exhaustion_diplomatic: "\"Програти війну ніколи не буває добре, але гірка поразка може також налаштувати наших людей на помсту. Реваншизм — потужний опіат.\""
  hint_low_sailors: "Моряки"
  hint_low_sailors_hint_text: "$hint_low_sailors_hint_text_1$\n\n$hint_low_sailors_hint_text_2$\n\n$hint_low_sailors_hint_text_3$"
  hint_low_sailors_hint_text_1: "$game_concept_sailors_desc$"
  hint_low_sailors_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Якщо ми покладаємося на [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] для ведення війни, мала кількість Моряків сильно обмежує нашу здатність поповнювати наші [Concept('navies', 'CONCEPT_PLACEHOLDER')|e], тому нерозумно оголошувати [war|E], маючи мало моряків.\n@arrow_bonus_tier_2! [Concept('explorations', 'CONCEPT_PLACEHOLDER')|e] також вимагають моряків, тому ми повинні планувати їх відповідно."
  hint_low_sailors_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ми можемо розвивати виробництво моряків у нашій нації за допомогою різних [buildings|E].\n@hint! [estate_privileges|E] та [laws|E] також можуть впливати на наш потенціал моряків."
  hint_low_sailors_administrative: "\"Той, хто контролює море, контролює багатства світу. Сильна морська та мореплавна традиція йде рука об руку з домінуванням у торгівлі.\""
  hint_low_sailors_military: "Потужний флот з моряками дозволяє експлуатацію як далеких земель, так і вітчизняних. Навіть солдати, що діють за кордоном, можуть отримати вигоду від захищених ліній постачання."
  hint_low_sailors_diplomatic: "Морські споруди часто мають прямі вигоди для нашого торговельного потенціалу. Варто розглянути синергію між цими сферами."
  hint_low_diplomats: "Мало дипломатів"
  hint_low_diplomats_hint_text: "$hint_low_diplomats_hint_text_1$\n\n$hint_low_diplomats_hint_text_2$\n\n$hint_low_diplomats_hint_text_3$"
  hint_low_diplomats_hint_text_1: "[дипломати|E] необхідні для управління вашими дипломатичними відносинами з іншими країнами. Багато дій, таких як Покращення відносин, коштуватимуть нам дипломатів з часом, тоді як надсилання одноразових дій, швидше за все, матиме фіксовану вартість."
  hint_low_diplomats_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Скасування покращення відносин з деякими країнами звільнить частину наших дипломатів, якщо їх недостатньо.\n@arrow_bonus_tier_2! Ми також можемо отримати більше дипломатів з інших джерел, таких як [Concept('досягнення', 'CONCEPT_PLACEHOLDER')|e]."
  hint_low_diplomats_hint_text_3: "#T Додаткові підказки:#!\n@hint! Хоча добре тримати резерв дипломатів для опортуністичних дій, розподіл наших дипломатів для довгострокових планів також є життєво важливим для успіху."
  hint_low_diplomats_administrative: "Підтримання добрих відносин є ключем до процвітаючої імперії! Доступ до більших і ширших ринків неодмінно випливає з дружби з нашими сусідами."
  hint_low_diplomats_military: "Дипломати також можуть бути використані для утвердження нашого домінування над слабшими країнами. Методом дружби чи загрози, чим ми сильніші, тим імовірніше інші підкоряться."
  hint_low_diplomats_diplomatic: "Реформування та розвиток нашого уряду – це надійний спосіб покращити нашу здатність до додаткової дипломатії. Звісно, деякі культури просто більш схильні до мистецтва переконання, ніж інші."
  LOW_DIPLOMATS_HINT: "Мало дипломатів!"
  hint_low_food_in_market: "Мало продовольства на ринку"
  hint_low_food_in_market_hint_text: "$hint_low_food_in_market_hint_text_1$\n\n$hint_low_food_in_market_hint_text_2$\n\n$hint_low_food_in_market_hint_text_3$"
  hint_low_food_in_market_hint_text_1: "Ринки потребують достатньої кількості запасів [продовольства|E] для забезпечення своїх складових [провінцій|E], які його потребують. Без цього поселення, що належать до цих провінцій, можуть зіткнутися з [голодом|E]."
  hint_low_food_in_market_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Покращення [Concept('сировинних_господарств', 'CONCEPT_PLACEHOLDER')|e], що виробляють продовольство, збільшить його постачання.\n@arrow_bonus_tier_2! Ми можемо [Concept('імпортувати', 'CONCEPT_PLACEHOLDER')|e] продовольство, встановлюючи [Concept('торгові_маршрути', 'CONCEPT_PLACEHOLDER')|e] для [Concept('товарів', 'CONCEPT_PLACEHOLDER')|e], що виробляють продовольство."
  hint_low_food_in_market_hint_text_3: "#T Додаткові підказки:#!\n@hint! Зменшення кількості [Concept('будівель', 'CONCEPT_PLACEHOLDER')|e] у [Concept('місці', 'CONCEPT_PLACEHOLDER')|e] також змусить [Concept('населення', 'CONCEPT_PLACEHOLDER')|e] повернутися до [Concept('натурального_господарства', 'CONCEPT_PLACEHOLDER')|e]."
  HINT_MARKET_ENTRY: "[MARKET.GetName]"
  HINT_BUILDING_ENTRY: "[BUILDING_TYPE.GetName]"
  LOW_FOOD_CAP_TEXT: "[SelectLocalization( StringIsEmpty( GetListOfAvailableBuildingsWithModifier('merchant_capacity_from_building') ), Localize('LOW_FOOD_NO'), Localize( 'LOW_FOOD_YES' ) )]"
  LOW_FOOD_YES: "\n@arrow_bonus_tier_1! Якщо ми маємо [торговельний_потенціал|E], ми можемо створити імпорт продовольства з іншого ринку, який має надлишок.\n\nЯкщо у нас немає потенціалу, будівництво такої споруди, як [GetListOfAvailableBuildingsWithModifier('merchant_capacity_from_building')], може збільшити наш торговельний потенціал."
  LOW_FOOD_NO: "\n\nЯкщо ми маємо [торговельний_потенціал|E], ми можемо створити імпорт продовольства з іншого ринку, який має надлишок."
  LOW_MARKET_FOOD_TEXT: "Запас [продовольства|E] у $LIST$ досяг критичного рівня.$LOW_FOOD_CAP_TEXT$"
  LOW_MARKET_FOOD_TEXT_BUILDINGS: "Запас [продовольства|E] у $LIST$ досяг критичного рівня.\n\nІснує кілька рівнів вирішення проблеми нестачі продовольства на ринку. Чим більше продовольства виробляє поселення, тим менше навантаження воно створюватиме на провінцію та ринок, до яких воно належить, потенційно навіть допомагаючи іншим поселенням, якщо генерує надлишок.\n\n\n@arrow_bonus_tier_3! [Concept('Сировинні_господарства', 'CONCEPT_PLACEHOLDER')|e] є основним джерелом [Concept('продовольства], особливо в поселеннях з високою [продуктивністю_продовольства', 'CONCEPT_PLACEHOLDER')|e]. Ми повинні прагнути розширювати їх насамперед, якщо нашому [ринку] бракує [продовольства].\n@arrow_bonus_tier_2! [Будівлі|E], такі як $BUILDING_LIST$, також можуть збільшити виробництво продовольства, якщо виробництво [товарів|E] відповідає.$LOW_FOOD_CAP_TEXT$"
  hint_low_food_in_market_administrative: "Ринки з поселеннями, що спеціалізуються на виробництві продовольства, запропонують як безпеку, так і надзвичайний потенціал для прибутку. Якщо інші мусять звертатися до нас, щоб вижити, ми володіємо майже безмежним важелем впливу."
  hint_low_food_in_market_military: "Хоча наш торговельний потенціал обмежений інфраструктурою, імпортна економіка зазвичай повинна підтримуватися потужною військово-морською присутністю. Без цього ми ставимо себе на милість будь-кого, хто наважиться кинути виклик нашим торговим маршрутам."
  hint_low_food_in_market_diplomatic: "Самодостатня економіка продовольства – чудова мета, але функціонування імпортної економіки для годування [GetPlayer.GetAdjectiveWithNoTooltip] народу може надати нам сили зосередитися на більш фінансово вигідному виробництві."
  hint_over_diplo_capacity: "Перевищено дипломатичний ліміт"
  hint_over_diplo_capacity_hint_text: "$hint_over_diplo_capacity_hint_text_1$\n\n$hint_over_diplo_capacity_hint_text_2$\n\n$hint_over_diplo_capacity_hint_text_3$"
  hint_over_diplo_capacity_hint_text_1: "$game_concept_diplomatic_capacity_desc$"
  hint_over_diplo_capacity_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Припинення покращення відносин нашими [дипломатами|E] звільнить нашу спроможність\n@arrow_bonus_tier_2! Оцінка, чи варто нам припинити деякі з наших [союзів|E] або [договорів|E]\n@arrow_bonus_tier_1! Вихід з будь-яких [міжнародних_організацій|E], у яких ми більше не потребуємо членства, також є ще одним способом звільнення спроможності."
  hint_over_diplo_capacity_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Привілеї_станів|E], [закони|E] та [досягнення|E] іноді можуть надавати додаткову дипломатичну спроможність."
  hint_over_diplo_capacity_military: "Можливо, нам слід розглядати союзи як засіб для досягнення мети, а не як постійну дружбу. Зрештою, наші власні союзники, безсумнівно, дивилися б на нас хижим поглядом, якби ми виявили слабкість..."
  hint_over_diplo_capacity_administrative: "Перевантаження наших дипломатів має прикрий побічний ефект, що зменшує їхню ефективність майже у всіх їхніх завданнях. Хоча може бути спокусливо залишити їх перевантаженими, це не є добрим довгостроковим рішенням."
  hint_over_diplo_capacity_diplomatic: "Якщо ми маємо пріоритетом внутрішній розвиток, міцні союзи більш ніж компенсують будь-які уявні військові слабкості. Можливо, нам слід спочатку відмовитися від інших відносин?"
  hint_rebels_growing: "$game_concept_rebel_movements$"
  hint_rebels_growing_hint_text: "$hint_rebels_growing_hint_text_1$\n\n$hint_rebels_growing_hint_text_2$\n\n$hint_rebels_growing_hint_text_3$"
  hint_rebels_growing_hint_text_1: "Ваші [Concept('верстви_населення_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] приєднаються до [Concept('повстанських_рухів_з_іконкою', 'CONCEPT_PLACEHOLDER')|e], коли їхня [Concept('задоволеність_верств_населення_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] впаде нижче їхнього [ShowModifierTypeName('pop_join_rebel_threshold')].\n\n[Concept('Повстанські_рухи] щомісяця отримуватимуть прогрес до відкритого повстання, залежно від їхньої підтримки. Досягнувши #W 100%#! підтримки, вони розпочнуть [повстання_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] або [Concept('громадянську_війну_з_іконкою', 'CONCEPT_PLACEHOLDER')|e].\n\nНайчастішими причинами підтримки повстанців є низька [Concept('стабільність_з_іконкою', 'CONCEPT_PLACEHOLDER')|e], дискриміновані [Concept('культури_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] та [Concept('релігії_з_іконкою', 'CONCEPT_PLACEHOLDER')|e], а також розгнівані [Concept('стани_з_іконкою', 'CONCEPT_PLACEHOLDER')|e]."
  hint_rebels_growing_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Підтримуйте [Concept('стабільність_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] та [Concept('легітимність_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] якомога вищими.\n@arrow_bonus_tier_2! Використовуйте [ShowCabinetActionName('rebel_crackdown')] [Concept('дію_кабінету_з_іконкою', 'CONCEPT_PLACEHOLDER')|e], щоб зупинити прогрес наближається [Concept('повстання].\n@arrow_bonus_tier_1! Перемістіть [армію_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] до [Concept('провінції_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] з незадоволеними [Concept('верствами_населення]. Присутність ваших військ зробить їх більш... #italic поступливими#!.\n\nЗрештою, найважливішим є підвищення [pop_satisfaction_icon] Задоволеності бунтівних [верств_населення]:\n@arrow_bonus_tier_2! Переконайтеся, що найчисленніші [культури] у вашій [країні] є [прийнятими_культурами_короткими_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] або [Concept('толерованими_культурами_короткими', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Забезпечте, щоб бунтівні [Concept('верстви_населення] могли придбати якомога більше своїх [потреб_верств_населення_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] на своєму [Concept('ринку_з_іконкою', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_3! Підтримуйте високою [Concept('estate_icon] [задоволеність_станів', 'CONCEPT_PLACEHOLDER')|e], оскільки це суттєво впливає на задоволеність усіх його складових [Concept('верств_населення]:\n$TAB$@arrow_bonus_tier_2! Надати [привілей_з_іконкою', 'CONCEPT_PLACEHOLDER')|e]\n$TAB$@arrow_bonus_tier_2! Підкупити [Concept('стан]\n$TAB$@arrow_bonus_tier_2! Знизити [податки_з_іконкою', 'CONCEPT_PLACEHOLDER')|e]"
  hint_rebels_growing_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Суспільні_цінності|E], такі як [ShowSocietyDirectionName('communalism')] та [ShowSocietyDirectionName('decentralization')], також можуть впливати на ймовірність зростання повстання.\n@hint! Бунтівні [Concept('верстви_населення] приєднуватимуться до різних [повстанських_рухів] залежно від різних факторів. Наприклад, [верстви_населення] дискримінованої [культури] матимуть схильність приєднуватися до [націоналістичних_повстанців_з_іконкою', 'CONCEPT_PLACEHOLDER')|e]."
  hint_rebels_growing_military: "Вони можуть виглядати грізно, але зі звичайним народом гавкіт зазвичай гірший за укус. Однак те, чого їм часто бракує в дисципліні, вони з лишком компенсують чисельністю."
  hint_rebels_growing_administrative: "Хоча повстанці, безумовно, шкодять справі, вони зазвичай є реакційними – якщо ви усунете причину їхнього занепокоєння, то не тільки зможете їх умиротворити, але й покращити нашу країну."
  hint_rebels_growing_diplomatic: "Наше населення має всілякі різні ідентичності та приналежності. Завойовані народи набагато частіше прагнуть відокремитися та сформувати власний уряд або навіть приєднатися до іноземної держави."
  hint_call_for_peace: "Заклик до миру"
  hint_call_for_peace_hint_text: "$hint_call_for_peace_hint_text_1$\n\n$hint_call_for_peace_hint_text_2$\n\n$hint_call_for_peace_hint_text_3$"
  hint_call_for_peace_hint_text_1: "Цей статус може виникнути, якщо певна [війна|E] триває занадто довго, або якщо ми відмовляємося підписати [мирний_договір|E] попри повну перемогу чи поразку."
  hint_call_for_peace_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Нам слід змиритися з втратами та підписати договір, перш ніж наша [втома_від_війни|E] досягне критичного рівня.\n@arrow_bonus_tier_2! Це може означати прийняття меншого, ніж ми спочатку мали намір вимагати, або навіть програш у [Concept('війні', 'CONCEPT_PLACEHOLDER')|e]."
  hint_call_for_peace_hint_text_3: "#T Додаткові підказки:#!\n@hint! Все втрачене через вимушене підписання передчасного [Concept('мирного_договору', 'CONCEPT_PLACEHOLDER')|e] може бути повернуто в майбутньому в іншій [Concept('війні', 'CONCEPT_PLACEHOLDER')|e]."
  hint_call_for_peace_diplomatic: "Порушення правил війни може мати справді руйнівні наслідки для нашої внутрішньої стабільності та для нашої репутації за кордоном. Чому хтось слухатиме нас, якщо ми доведемо, що ми нерозсудливі?"
  hint_call_for_peace_military: "Війна — це лише продовження політики іншими засобами. Можливо, нам слід це записати, перш ніж це зробить хтось інший?"
  hint_call_for_peace_administrative: "Заклик до миру ставатиме все гіршим і гіршим з плином часу. Народ можна заспокоїти, але не ігнорувати вічно."
  hint_unprofitable_buildings: "Збиткові будівлі"
  hint_unprofitable_buildings_hint_text: "$hint_unprofitable_buildings_hint_text_1$\n\n$hint_unprofitable_buildings_hint_text_2$\n\n$hint_unprofitable_buildings_hint_text_3$"
  hint_unprofitable_buildings_hint_text_1: "Будівлі стануть збитковими, якщо вартість їхніх сукупних вхідних [goods|E] перевищить вартість їхніх [produced_goods|E]."
  hint_unprofitable_buildings_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Переконайтеся, що вхідні товари є дешевшими, виробляючи або [importing|E] більше, щоб забезпечити їхній достаток.\n@arrow_bonus_tier_3! Створення або забезпечення додаткового попиту на товари підвищить їхню ціну.\n@arrow_bonus_tier_3! [buildings|E] можуть бути закриті @building_open! або навіть зруйновані, якщо їхнє призначення більше не відповідає нашим цілям.\n@arrow_bonus_tier_3! [market_owner|E] може накласти ембарго на країни, що експортують товари, які вони виробляють, щоб підняти ціну власних експортних товарів."
  hint_unprofitable_buildings_hint_text_3: "#T Додаткові підказки:#!\n@hint! Деякі будівлі можуть бути [subsidized|E] @subsidy!. Це може бути корисним, якщо витрати на [import|E] товарів, необхідних для [pop_needs|E] або підтримки армії, є високими, наприклад."
  hint_unprofitable_buildings_diplomatic: "«Управління прибутковістю промисловості цілої країни може бути складним завданням. Ви можете залучити допомогу бюрократії своєї країни, якщо не бажаєте обтяжувати себе деталями!»"
  hint_unprofitable_buildings_military: "«Чим сильніші ми, тим більша наша здатність до здорового протекціонізму. Ембарго та торговельні суперечки завжди ефективніші, коли їх підтримують гармати»."
  hint_unprofitable_buildings_administrative: "«Стратегія маніпулювання цінами має багато рівнів. З достатньою хитрістю ми можемо не лише створити попит на ринку, але й бути тими, хто його задовольнить»."
  NO_HINTS_AVAILABLE: "Підказок немає!"
  hint_trade: "Торгівля"
  hint_trade_hint_text: "$hint_trade_hint_text_1$\n\n$hint_trade_hint_text_2$\n\n$hint_trade_hint_text_3$"
  hint_trade_hint_text_1: "[trade|E] передбачає переміщення [goods|E] між [markets|E], а також продаж і купівлю на цих [markets|E]."
  hint_trade_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Створіть нові [trade|E] маршрути для придбання [Concept('goods', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_2! Збільште виробництво [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], щоб мати більше доступних для торгівлі."
  hint_trade_hint_text_3: "#T Додаткові підказки:#!\n@hint! [trade|E] маршрут може бути прибутковим або збитковим залежно від різниці в цінах між [export|E] (джерело) та [import|E] (призначення) [markets|E].\n@hint! Кожна [country|E] присутня на [market|E] має максимальну [merchant_capacity|E], яку вона може використовувати для створення [trade|E] маршрутів, та [merchant_power|E], яка визначає пріоритет, що вона має для експорту [goods|E] уздовж своїх [trade|E] маршрутів, коли є дефіцит.\n@hint! Торгівлю можна автоматизувати на кожному окремому [market|E] за замовчуванням, натиснувши на відповідне зубчасте колесо."
  hint_trade_military: "«Торгівля для слабких. Проте, ми будемо в змозі забезпечити потік товарів, домінуючи на суші та на морі»."
  hint_trade_administrative: "«Основа нашої стратегії: передбачати наступну хвилю цін через кидок костей та небесне вирівнювання зірок»."
  hint_trade_diplomatic: "«Один з незамінних стовпів повністю розбудованої імперії, торгівля має потенціал наповнювати нашу казну швидше, ніж будь-що інше»."
  hint_unused_trade_capacity: "Невикористана торговельна місткість"
  hint_unused_trade_capacity_hint_text: "$hint_unused_trade_capacity_hint_text_1$\n\n$hint_unused_trade_capacity_hint_text_2$\n\n$hint_unused_trade_capacity_hint_text_3$"
  hint_unused_trade_capacity_hint_text_1: "[Concept('merchant_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e] використовується для переміщення [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] між [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e], сподіваючись отримати прибуток у процесі. Ми завжди повинні використовувати всю нашу [merchant_capacity]."
  hint_unused_trade_capacity_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_1! Клацніть на сповіщення, щоб побачити відповідний ринок на панелі @economy_panel![Link('trade', 'subtab = markets', 'Markets Panel')]. Звідти ви можете виділити торговельну місткість на запропоновані торговельні операції.\n@arrow_bonus_tier_1! Ви також можете клацнути на заголовок ринку, щоб перейти до панелі ринків, де ви побачите список [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], що стосуються цього ринку. Клацніть кнопки Експорт/Імпорт для кожного [good], щоб розпочати торгівлю.\n@automation! Рекомендується автоматизувати торгівлю на всіх ваших ринках, натиснувши кнопку з шестернею на картці ринку. Ви завжди можете вручну створювати та блокувати торговельні операції, навіть коли торгівля автоматизована."
  hint_unused_trade_capacity_hint_text_3: "#T Додаткові підказки:#!\n@hint! Прибуток від [Concept('trade] розподіляється між [estates_with_icon', 'CONCEPT_PLACEHOLDER')|e], включно з [ShowEstateTypeName('crown_estate')], відповідно до їхньої [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_unused_trade_capacity_military: "«Щодо можливості безглуздого використання наших ресурсів, я категорично проти»."
  hint_unused_trade_capacity_administrative: "«Ми повинні якнайшвидше повернутися до ефективної межі»."
  hint_unused_trade_capacity_diplomatic: "«Можна порівняти невикористану торговельну місткість із занедбаним полем, яке давно потребує нового посіву»."
  hint_unprofitable_trade_route: "Збитковий торговий маршрут"
  hint_unprofitable_trade_route_hint_text: "$hint_unprofitable_trade_route_hint_text_1$\n\n$hint_unprofitable_trade_route_hint_text_2$\n\n$hint_unprofitable_trade_route_hint_text_3$"
  hint_unprofitable_trade_route_hint_text_1: "У більшості випадків, коли у вас є збитковий [trade|E] маршрут, ви захочете його скасувати і замінити прибутковим, або ввімкнути автоматизацію для цього [market|E]."
  hint_unprofitable_trade_route_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_1! Іноді має сенс втрачати гроші на [trade|E] маршруті, якщо переміщувані [goods|E] мають стратегічне значення.\n@arrow_bonus_tier_1! Прикладом може бути придбання деревини для завершення [building|E]. Іншим – забезпечення того, щоб наші [pops|E] були нагодовані."
  hint_unprofitable_trade_route_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ви можете опосередковано впливати на прибутковість існуючого [trade|E] маршруту, впливаючи на ціни (і, отже, на різницю в цінах для торгового [good|E]) залучених [markets|E]. Це можна зробити, змінюючи [supply|E] та [demand|E] для [good|E]."
  hint_unprofitable_trade_route_military: "\"Можливо, нам слід брати їхні товари замість того, щоб платити за них?\""
  hint_unprofitable_trade_route_administrative: "«Скорочуйте свої збитки якомога швидше. Торгівля — це не благодійність»."
  hint_unprofitable_trade_route_diplomatic: "«Недосконалість виникає в природному порядку, і ми повинні її усунути»."
  hint_market_out_of_supply: "Ринок без поставок"
  hint_market_out_of_supply_hint_text: "$hint_market_out_of_supply_hint_text_1$\n\n$hint_market_out_of_supply_hint_text_2$\n\n$hint_market_out_of_supply_hint_text_3$"
  hint_market_out_of_supply_hint_text_1: "Якщо на [Concept('market', 'CONCEPT_PLACEHOLDER')|e] занадто високий загальний [demand|E] порівняно з обмеженим [supply|E], ми можемо не отримати [goods|E], які ми намагаємося [export|E] або [import|E], що призведе до дефіциту товарів."
  hint_market_out_of_supply_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми можемо негайно скасувати збиткові [trade|E] маршрути та використати цю [merchant_capacity|E] для інших видів [goods|E].\n@arrow_bonus_tier_1! Збільшення нашої [merchant_power|E] на постраждалому [market|E] може надати нам більший доступ до його товарів."
  hint_market_out_of_supply_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ми можемо отримати [Concept('merchant_power', 'CONCEPT_PLACEHOLDER')|e] з різних джерел, таких як [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e], [Concept('policies', 'CONCEPT_PLACEHOLDER')|e] тощо.\n@hint! Ми також можемо спробувати збільшити [supply|E], але це може бути важко зробити за короткий термін і зазвичай вимагає довгострокової стратегічної уваги."
  hint_market_out_of_supply_military: "«Час від часу буде недостатньо товарів для експорту, щоб забезпечити роботу нашої військової машини. Цю проблему потрібно швидко вирішити»."
  hint_market_out_of_supply_administrative: "«Розгляньте можливість збільшення нашої абсолютно справедливої торгової переваги будь-якими доступними засобами»."
  hint_market_out_of_supply_diplomatic: "«Можливо, ми повинні вжити заходів для диверсифікації наших торговельних операцій, відходячи від монокультури»."
  hint_increasing_trade_capacity: "Збільшення торгової місткості"
  hint_increasing_trade_capacity_hint_text: "$hint_increasing_trade_capacity_hint_text_1$\n\n$hint_increasing_trade_capacity_hint_text_2$\n\n$hint_increasing_trade_capacity_hint_text_3$"
  hint_increasing_trade_capacity_hint_text_1: "[Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e] визначає обсяг [Concept('trade', 'CONCEPT_PLACEHOLDER')|e], який може здійснювати [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  hint_increasing_trade_capacity_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Побудуйте більше [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], що збільшують місткість, наприклад, [ShowBuildingTypeName('marketplace')] або [ShowBuildingTypeName('market_village')].\n@arrow_bonus_tier_2! Деякі [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] також можуть збільшити нашу [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e]."
  hint_increasing_trade_capacity_hint_text_3: "#T Додаткові підказки:#!\n@hint! Наявність більшої [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e] дозволяє торгувати більшою кількістю товарів, що призводить до вищого [Concept('income', 'CONCEPT_PLACEHOLDER')|e]."
  hint_increasing_trade_capacity_military: "«Чим більшою стає наша імперія, тим більшою буде наша торговельна спроможність. Це майже тавтологія»."
  hint_increasing_trade_capacity_administrative: "«Вирішенням проблеми торговельної місткості, як і всіх проблем людства, є збільшення кількості ринків»."
  hint_increasing_trade_capacity_diplomatic: "«Забезпечуйте зростаючий потік торгівлі, прокладаючи основи для комерційного обміну скрізь, де це можливо»."
  hint_increasing_trade_advantage: "$game_concept_merchant_power$"
  hint_increasing_trade_advantage_hint_text: "$hint_increasing_trade_advantage_hint_text_1$\n\n$hint_increasing_trade_advantage_hint_text_2$\n\n$hint_increasing_trade_advantage_hint_text_3$"
  hint_increasing_trade_advantage_hint_text_1: "[Concept('merchant_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] визначає, яка [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] першою отримує доступ до [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e] для цілей [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЯкщо дві торгові [Concept('countries] намагаються купити [good], і її недостатньо для обох, та, що має найвищу [merchant_power] на цьому [market], купить її першою.\n\nЗауважте, що [merchant_power] застосовується лише до [trade]. Натомість, [locations', 'CONCEPT_PLACEHOLDER')|e] дотримуються порядку [Concept('market_access', 'CONCEPT_PLACEHOLDER')|e] при купівлі [Concept('goods] для [constructions', 'CONCEPT_PLACEHOLDER')|e] або [Concept('pop_needs', 'CONCEPT_PLACEHOLDER')|e]."
  hint_increasing_trade_advantage_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Володійте більшою кількістю [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e], що належать до цього [Concept('market].\n@arrow_bonus_tier_2! Збільште [maritime_presence_with_icon', 'CONCEPT_PLACEHOLDER')|e] у прибережних водах [Concept('market].\n@arrow_bonus_tier_1! Деякі [buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], як-от [ShowBuildingTypeName('marketplace')], також збільшують [merchant_power]."
  hint_increasing_trade_advantage_hint_text_3: "#T Додаткові підказки:#!\n@hint! #italic Щоб дізнатися більше, ви можете переглянути підказки [Link('hints', 'selected_hint = hint_trade', 'Торгівля')] та [Link('hints', 'selected_hint = hint_trade', 'Морська Присутність')]#!"
  hint_increasing_trade_advantage_military: "\"Оскільки торгівля є конкурентним, а не кооперативним підприємством, встановлення переваги в торгівлі є природним порядком речей.\""
  hint_increasing_trade_advantage_administrative: "\"Основа нашої стратегії: передбачити наступну хвилю цін через кидок кісток і небесне вирівнювання зірок.\""
  hint_increasing_trade_advantage_diplomatic: "\"Одна з незамінних опор повноцінної імперії, торгівля має потенціал наповнювати наші скарбниці швидше, ніж будь-що інше.\""
  hint_pops_with_needs_yellow: "Верстви, що вимагають товари"
  hint_pops_with_needs_yellow_hint_text: "$hint_pops_with_needs_yellow_hint_text_1$\n\n$hint_pops_with_needs_yellow_hint_text_2$\n\n$hint_pops_with_needs_yellow_hint_text_3$"
  hint_pops_with_needs_yellow_hint_text_1: "[Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] намагатимуться купувати [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e], які їм потрібні для повсякденного життя, на [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e] свого [Concept('location_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Якщо [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] не зможуть купити всі [Concept('goods], які вони вимагають, їхня [pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] відповідно зменшиться. Якщо їхня [pop_satisfaction] впаде нижче за їхній [ShowModifierTypeName('pop_join_rebel_threshold')], чи то через брак [Concept('goods], чи з інших причин, [pops] можуть почати підтримувати [rebellion_with_icon', 'CONCEPT_PLACEHOLDER')|e] проти [government]."
  hint_pops_with_needs_yellow_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Підтримуйте високу [Concept('stability_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('legitimacy_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e], щоб запобігти [Concept('rebellions].\n@arrow_bonus_tier_1! Розширте виробництво затребуваних [goods', 'CONCEPT_PLACEHOLDER')|e], будуючи [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] з @production_panel![Link('goods_production', '', 'lateralview_goods_production_entry_name')].\n@arrow_bonus_tier_1! Імпортуйте [Concept('goods] з інших [markets], витрачаючи [merchant_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_pops_with_needs_yellow_hint_text_3: "#T Додаткові підказки:#!\n@hint! Наявність незадоволених потреб верств не обов'язково є приводом для занепокоєння, доки [pops] не бунтують. Але це дає загальне уявлення про стан [market].\n@hint! Потреби верств є лише одним із факторів, що впливають на [pop_satisfaction]. Навіть якщо всі їхні потреби задоволені, люди все ще можуть повстати з інших причин.\n@hint! Дізнайтеся більше про [rebel_movements_with_icon] у [Link('hints', 'selected_hint = hint_rebels_growing', 'Підказці про повстанців')]#!"
  hint_pops_with_needs_yellow_military: "\"Могутній правитель не повинен перейматися примхами простолюду.\""
  hint_pops_with_needs_yellow_administrative: "\"Там, де неуважне око бачить знедолене населення, я бачу чудову нагоду для прибутку.\""
  hint_pops_with_needs_yellow_diplomatic: "\"Люди завжди вимагатимуть більше, ніж їм належить. Але будь обережний. Неконтрольована нестача може підбурити твоїх підданих до повстання.\""
  hint_pops_with_needs_red: "Верстви-бунтівники, що вимагають товари"
  hint_pops_with_needs_red_hint_text: "$hint_pops_with_needs_yellow_hint_text_1$\n\n$hint_pops_with_needs_red_hint_text_1$\n\n$hint_pops_with_needs_red_hint_text_2$\n\n$hint_pops_with_needs_red_hint_text_3$"
  hint_pops_with_needs_red_hint_text_1: "Деякі наші [pops] зараз приєднуються до [rebel_movements]. Збільшення пропозиції затребуваних [goods] може переконати деяких з них залишити [rebellions]."
  hint_pops_with_needs_red_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Збільште [Concept('stability', 'CONCEPT_PLACEHOLDER')|e], [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e] та [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Розширте виробництво затребуваних [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], будуючи [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] та [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] з @production_panel![Link('goods_production', '', 'lateralview_goods_production_entry_name')].\n@arrow_bonus_tier_1! Імпортуйте [Concept('goods] з інших [markets], витрачаючи [merchant_capacity', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Якщо все інше не допомагає, тримайте наші [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] напоготові, щоб розібратися з повстанцями."
  hint_pops_with_needs_red_hint_text_3: "#T Додаткові підказки:#!\n@hint! Потреби верств є лише одним із факторів, що впливають на [pop_satisfaction]. Навіть якщо всі їхні потреби задоволені, люди все ще можуть повстати з інших причин.\n@hint! Дізнайтеся більше про [rebel_movements_with_icon] у [Link('hints', 'selected_hint = hint_rebels_growing', 'Підказці про повстанців')]#!"
  hint_pops_with_needs_red_diplomatic: "\"Гарантування постачання критично важливих товарів може бути достатнім для вгамування незгодних голосів серед нашого народу.\""
  hint_pops_with_needs_red_administrative: "\"Повстання принесло б руїну нашим купцям. Давайте збільшимо наше виробництво, перш ніж наші люди вирішать взятися за зброю проти нас!\""
  hint_pops_with_needs_red_military: "\"Голодний натовп? Наша армія розбереться з цією загрозою.\""
  hint_has_possible_reform: "Можливі реформи"
  hint_has_possible_reform_hint_text: "$hint_has_possible_reform_hint_text_1$\n\n$hint_has_possible_reform_hint_text_2$\n\n$hint_has_possible_reform_hint_text_3$"
  hint_has_possible_reform_hint_text_1: "[Concept('government_reforms_with_icon', 'CONCEPT_PLACEHOLDER')|e] є однією з найвизначальніших характеристик нашої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ми завжди повинні мати всі можливі [reforms] запровадженими."
  hint_has_possible_reform_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Натисніть кнопку плюса під карткою [ShowEstateTypeName('crown_estate')] на @government_panel![Link('government', 'tabcontent = estates', 'lateralview_government_entry_name')], щоб запровадити нову [reform]."
  hint_has_possible_reform_hint_text_3: "#T Додаткові підказки:#!\n@hint! З розвитком гри, більше [Concept('government_reforms] стануть доступними через [advances_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('events', 'CONCEPT_PLACEHOLDER')|e].\n@hint! [Concept('government_reforms] коштують [stability_with_icon', 'CONCEPT_PLACEHOLDER')|e] для скасування і вимагають багато часу для впровадження. Обирайте їх обережно.\n@hint! Деякі [Concept('government_reforms] вимагають, щоб ваша [country] схилялася до однієї конкретної [societal_value_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_has_possible_reform_diplomatic: "\"Добре визначений уряд є символом здорової адміністрації.\""
  hint_has_possible_reform_administrative: "\"Ми повинні чітко визначити наш уряд, щоб іноземні країни могли знати, як до нас звертатися.\""
  hint_has_possible_reform_military: "\"Як ми можемо сподіватися захиститися від ворогів, якщо ми навіть не знаємо, хто ми є?\""
  hint_has_conquered_provinces: "Неінтегровані провінції"
  hint_has_conquered_provinces_hint_text: "$hint_has_conquered_provinces_hint_text_1$\n\n$hint_has_conquered_provinces_hint_text_2$\n\n$hint_has_conquered_provinces_hint_text_3$"
  hint_has_conquered_provinces_hint_text_1: "[Concept('conquered_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e] повинні бути [Concept('integrated', 'CONCEPT_PLACEHOLDER')|e] в нашу адміністрацію, щоб сприяти добробуту нашого царства. Ми повинні прагнути [Concept('integrate] усі наші [locations', 'CONCEPT_PLACEHOLDER')|e] якомога швидше."
  hint_has_conquered_provinces_hint_text_2: "#T Рекомендовані дії #!:\n@arrow_bonus_tier_3! Накажіть [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('integrate_province')] з @government_panel![Link('government', 'tabcontent = cabinet', 'lateralview_government_entry_name')].\n@arrow_bonus_tier_1! Якщо наш [Concept('cabinet] не може впоратися з нашими завоюваннями, розгляньте можливість створення [subject_with_icon', 'CONCEPT_PLACEHOLDER')|e] для управління землею замість вас. Це можна зробити на @diplomacy_panel![Link('diplomacy', 'relations_tab = current_relations', 'lateralview_diplomacy_entry_name')]."
  hint_has_conquered_provinces_hint_text_3: "#T Додаткові підказки:#!\n@hint! Інтеграція зазвичай є однією з головних обов'язків [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] в експансіоністських [Concept('countries', 'CONCEPT_PLACEHOLDER')|e].\n@hint! [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] буде набагато нижчим у [Concept('conquered] [locations], потенційно спричиняючи [rebellions_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@hint! Ви можете збільшити швидкість інтеграції, призначаючи більш талановитих [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] до [Concept('cabinet_members', 'CONCEPT_PLACEHOLDER')|e], а також збільшуючи загальну [Concept('cabinet_efficiency', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('country].\n@hint! Інтеграція буде значно швидшою, якщо наша [primary_culture', 'CONCEPT_PLACEHOLDER')|e] є [Concept('dominant_culture', 'CONCEPT_PLACEHOLDER')|e] Місцевості, або якщо наш [Concept('cultural_influence', 'CONCEPT_PLACEHOLDER')|e] вищий за [Concept('cultural_tradition', 'CONCEPT_PLACEHOLDER')|e] [dominant_culture]."
  hint_has_conquered_provinces_diplomatic: "\"Ново... #italic набуті #! піддані не одразу підкоряться нашому правлінню. Інтеграція – це довгий і складний процес, але він є життєво важливим для стабільності королівства.\""
  hint_has_conquered_provinces_administrative: "\"Підприємства не можуть процвітати, коли земля знаходиться в сум'ятті. Верховенство права є найважливішим для процвітання.\""
  hint_has_conquered_provinces_military: "\"Бюрократи не завжди марні. Ми не могли б зібрати населення без належних адміністративних кадрів.\""
  hint_has_possible_cabinet_action: "Можливі дії кабінету"
  hint_has_possible_cabinet_action_hint_text: "$hint_has_possible_cabinet_action_hint_text_1$\n\n$hint_has_possible_cabinet_action_hint_text_2$\n\n$hint_has_possible_cabinet_action_hint_text_3$"
  hint_has_possible_cabinet_action_hint_text_1: "[Concept('cabinet_actions_with_icon', 'CONCEPT_PLACEHOLDER')|e] є одними з наймогутніших інструментів, які ми маємо для управління нашою нацією. Ми повинні завжди використовувати всі наші доступні [Concept('cabinet_seats_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_has_possible_cabinet_action_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Перейдіть до @government_panel![Link('government', 'tabcontent = cabinet', 'lateralview_government_entry_name')], щоб переглянути доступні нам дії Кабінету.\n@arrow_bonus_tier_3! [ShowCabinetActionName('integrate_province')], якщо ми маємо новозавойовану [Concept('conquered', 'CONCEPT_PLACEHOLDER')|e] територію.\n@arrow_bonus_tier_2! [ShowCabinetActionName('stabilize_country')], якщо [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] низька.\n@arrow_bonus_tier_2! [ShowCabinetActionName('strengthen_government')], якщо [Concept('legitimacy_with_icon', 'CONCEPT_PLACEHOLDER')|e] низька.\n@arrow_bonus_tier_2! [ShowCabinetActionName('diplomatic_endeavors')] для легшої [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! [ShowCabinetActionName('change_societal_values')], якщо є певна [Concept('societal_value', 'CONCEPT_PLACEHOLDER')|e], яку ви бажаєте переслідувати.\n@arrow_bonus_tier_1! [ShowCabinetActionName('develop_province')] для збільшення [Concept('development_with_icon', 'CONCEPT_PLACEHOLDER')|e] у наших найцінніших [Concept('provinces_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! [Concept('cabinet_actions] також можна використовувати для [convert_with_icon', 'CONCEPT_PLACEHOLDER')|e] інших [Concept('religions_with_icon', 'CONCEPT_PLACEHOLDER')|e] або [Concept('assimilate_with_icon', 'CONCEPT_PLACEHOLDER')|e] інших [Concept('cultures_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@automation! Ви також можете Автоматизувати Кабінет з @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_has_possible_cabinet_action_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('characters', 'CONCEPT_PLACEHOLDER')|e], призначені до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e], збільшать [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] свого [Concept('estate', 'CONCEPT_PLACEHOLDER')|e].\n@hint! Нові [Concept('cabinet_actions] розблокуються в пізніші [ages', 'CONCEPT_PLACEHOLDER')|e]."
  hint_has_possible_cabinet_action_diplomatic: "\"Бюрократія – це життєдайна сила будь-якої країни... якщо використовувати її мудро.\""
  hint_has_possible_cabinet_action_administrative: "\"Через Кабінет держава має владу перетворювати безплідні пустелі на процвітаючі метрополії.\""
  hint_has_possible_cabinet_action_military: "\"Могутній Кабінет може бути використаний для приборкання найбільш розсварених членів нашого суспільства.\nВіддайте накази, і це буде зроблено.\""
  hint_has_possible_law: "Закони не кодифіковані"
  hint_has_possible_law_hint_text: "$hint_has_possible_law_hint_text_1$\n\n$hint_has_possible_law_hint_text_2$\n\n$hint_has_possible_law_hint_text_3$"
  hint_has_possible_law_hint_text_1: "Радше за все, завжди мати активну [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] для всіх наших [Concept('laws', 'CONCEPT_PLACEHOLDER')|e]. Інакше наша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може втратити деякі корисні переваги."
  hint_has_possible_law_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Натисніть на Сповіщення, щоб переглянути наші [laws] без ухваленої [policy], і ретельно оберіть.\n@arrow_bonus_tier_3! Ви можете перейти до @government_panel![Link('government', 'tabcontent = politics', 'lateralview_government_entry_name')], щоб переглянути наші поточні [laws].\n@automation! Ви також можете автоматизувати наші закони з @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_has_possible_law_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('policies] мають час впровадження, що залежить від нашої [legislative_efficiency', 'CONCEPT_PLACEHOLDER')|e]. Їх повні ефекти не будуть активними одразу.\n@hint! Ви завжди можете змінити [Concept('policy] пізніше, витративши трохи [gold', 'CONCEPT_PLACEHOLDER')|e] та [Concept('stability', 'CONCEPT_PLACEHOLDER')|e]. Вартість залежатиме від нашої [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e].\n@hint! Багато нових [Concept('laws] та [policies] розблокуються у пізніших [ages', 'CONCEPT_PLACEHOLDER')|e]."
  hint_has_possible_law_diplomatic: "\"Держава без Законів – це будівля без стовпів, тіло без кінцівок. Краще забагато, ніж замало.\""
  hint_has_possible_law_administrative: "\"Закони нашої країни повинні забезпечувати зростання наших міст, захист наших купців та впорядковане стягнення наших податків.\""
  hint_has_possible_law_military: "\"Ухвалювати Закони важливо; забезпечувати їх виконання – вирішально.\""
  hint_has_army_without_leader: "Брак Командира"
  hint_has_army_without_leader_hint_text: "$hint_has_army_without_leader_hint_text_1$\n\n$hint_has_army_without_leader_hint_text_2$\n\n$hint_has_army_without_leader_hint_text_3$"
  hint_has_army_without_leader_hint_text_1: "Нашим [Concept('units', 'CONCEPT_PLACEHOLDER')|e] потрібно призначити [Concept('commander', 'CONCEPT_PLACEHOLDER')|e], щоб вони могли належним чином діяти у [Concept('battle', 'CONCEPT_PLACEHOLDER')|e]. [Concept('generals', 'CONCEPT_PLACEHOLDER')|e] очолюють [armies], [admirals] очолюють [navies]."
  hint_has_army_without_leader_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Натисніть на #W Сповіщення#!, щоб вибрати відповідного [Concept('character', 'CONCEPT_PLACEHOLDER')|e] для вашого [Concept('unit]. Зазвичай слід обирати тих, хто має вищі [abilities', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_2! Ви також можете вибрати свій [unit] на карті або з #W Оглядача#!.\n@arrow_bonus_tier_2! Якщо у нас немає жодного хорошого [character], спробуйте навчити його з @military_panel![Link('unit_overview', '', 'lateralview_unit_overview_entry_name')].\n@automation! Ви можете автоматизувати призначення [generals] та [admirals] з @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_has_army_without_leader_hint_text_3: "#T Додаткові підказки:#!\n@hint! Не починайте [Concept('battle] без здібного [commander', 'CONCEPT_PLACEHOLDER')|e] на чолі!\n@hint! Деякі [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] мають [Concept('traits', 'CONCEPT_PLACEHOLDER')|e], що роблять їх ще більш придатними для конкретного завдання.\n@hint! Деякі [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] можуть накладати обмеження на те, які [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] мають право командувати."
  hint_has_army_without_leader_diplomatic: "\"Армія завжди повинна мати лідера. Але ми повинні бути обережними, бо полководці використовуватимуть свій вплив, щоб збільшити владу свого Стану.\""
  hint_has_army_without_leader_administrative: "\"Благаю, не питай мене. Я довіряю брутальні справи війни твоїм менш... #italic витонченим #! радникам.\""
  hint_has_army_without_leader_military: "\"Вступати в бій з ворогом без належного керівництва — це самогубство.\nЗа жодних обставин цього не робіть.\""
  hint_is_heir_underage: "Неповнолітній Спадкоємець"
  hint_is_heir_underage_hint_text: "$hint_is_heir_underage_hint_text_1$\n\n$hint_is_heir_underage_hint_text_2$"
  hint_is_heir_underage_hint_text_1: "Якби наш [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] помер до повноліття нашого [Concept('heir', 'CONCEPT_PLACEHOLDER')|e], ми опинилися б під [Concept('regency', 'CONCEPT_PLACEHOLDER')|e]. Залежно від обставин, член наймогутнішого [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] перебере на себе кермо правління, значно збільшивши свою [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] на час міжцарів'я."
  hint_is_heir_underage_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_1! Мало що ви можете зробити, окрім як дати часу пройти, і, можливо, уникати ризикувати життям нашого [ruler] у непотрібних починаннях. Хіба що, звичайно, наш [ruler] виявився особливо некомпетентним..."
  hint_is_heir_underage_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('regency', 'CONCEPT_PLACEHOLDER')|e] може бути не такою вже й поганою, якщо у нас є особливо хороший [Concept('character', 'CONCEPT_PLACEHOLDER')|e], який може стати регентом."
  hint_is_heir_underage_diplomatic: "\"Забезпечити спадкоємність – це забезпечити майбутнє держави.\""
  hint_is_heir_underage_administrative: "\"Шлюби та династичні зв'язки – найкращий спосіб об'єднати дві країни.\""
  hint_is_heir_underage_military: "\"Саме коли спадкоємці молоді, їх можна виховати в найкращих правителів.\""
  hint_has_unmarried_adult_ruler: "Неодружений Правитель"
  hint_has_unmarried_adult_ruler_hint_text: "$hint_has_unmarried_adult_ruler_hint_text_1$\n\n$hint_has_unmarried_adult_ruler_hint_text_2$\n\n$hint_has_unmarried_adult_ruler_hint_text_3$"
  hint_has_unmarried_adult_ruler_hint_text_1: "Ми повинні спробувати видати нашого [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] заміж за відповідного кандидата, щоб збільшити розмір і могутність нашої [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e]. Плідне королівське потомство не тільки допомагає забезпечити мирну та стабільну спадкоємність, але й принци можуть становити цінний резерв доступних [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] для державних посад."
  hint_has_unmarried_adult_ruler_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Натисніть на Сповіщення, щоб шукати кандидатів для [Concept('royal_marriage', 'CONCEPT_PLACEHOLDER')|e]. Монархії можуть укладати королівські шлюби між собою, щоб зміцнити свою [Concept('opinion], закладаючи основу для [alliance', 'CONCEPT_PLACEHOLDER')|e]. [Concept('royal_marriages', 'CONCEPT_PLACEHOLDER')|e] також можуть відкрити двері для потенційного [Concept('personal_union', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_2! Ви можете одружити свого [Concept('ruler] або [heir] з підходящим [character', 'CONCEPT_PLACEHOLDER')|e] у вашому дворі за допомогою взаємодії персонажів [ShowCharacterInteractionName('marry_noble')], клацнувши правою кнопкою миші на портреті персонажа.\n@arrow_bonus_tier_1! За відсутності кращих альтернатив, [ShowCharacterInteractionName('marry_lowborn')] завжди є варіантом, хоч би яким непопулярним він не був."
  hint_has_unmarried_adult_ruler_hint_text_3: "#T Додаткові підказки:#!\n@hint! [characters] правлячої [dynasty] належать до [ShowEstateTypeName('crown_estate')], тому вони не посилюють інші [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] нашого королівства, коли їх призначають на впливові [Concept('roles', 'CONCEPT_PLACEHOLDER')|e]."
  hint_has_unmarried_adult_ruler_diplomatic: "\"$hint_is_heir_underage_diplomatic$\""
  hint_has_unmarried_adult_ruler_administrative: "\"$hint_is_heir_underage_administrative$\""
  hint_has_unmarried_adult_ruler_military: "\"Кожному мечу потрібні піхви.\""
  hint_can_do_more_research: "Дослідження"
  hint_can_do_more_research_hint_text: "$hint_can_do_more_research_hint_text_1$\n\n$hint_can_do_more_research_hint_text_2$\n\n$hint_can_do_more_research_hint_text_3$"
  hint_can_do_more_research_hint_text_1: "Ми повинні переконатися, що наша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] постійно досліджує нові [Concept('advances', 'CONCEPT_PLACEHOLDER')|e]."
  hint_can_do_more_research_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Перейдіть до @advances_panel![Link('advances', 'subtab = research', 'lateralview_advances_entry_name')], і виберіть Досягнення, яке відповідає вашим потребам.\n@arrow_bonus_tier_2! Ви також можете натиснути на порожній значок колби у верхньому правому куті, щоб відкрити всю @advances_panel![Link('technology_view', '', 'lateralview_technology_view_entry_name')].\n@automation! Якщо ви ще не готові зануритися в глибини [advances], ви можете автоматизувати наші Дослідження з @automation![Link('automation', '', 'lateralview_automation_entry_name')]. Ви все одно будете належним чином повідомлені, коли наша Країна відкриє нове [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]."
  hint_can_do_more_research_hint_text_3: "#T Додаткові підказки: #!\n@hint! Невикористані очки досліджень будуть зберігатися до певного моменту, після чого вони будуть витрачені марно.\n@hint! Ви можете збільшити швидкість нашого [Concept('research_progress', 'CONCEPT_PLACEHOLDER')|e], підвищивши середній [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e] та [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] нашого [ShowEstateTypeName('clergy_estate')]."
  hint_can_do_more_research_diplomatic: "\"Технології пропонують широкі можливості для полегшення управління нашими володіннями.\""
  hint_can_do_more_research_administrative: "\"Завдяки належним інвестиціям ми могли б значно покращити ефективність нашої економіки.\""
  hint_can_do_more_research_military: "\"Постійне вдосконалення наших професійних армій має першочергове значення, щоб наша міць не відстала від міці наших ворогів.\""
  hint_lack_cabinet_for_cabinet_action: "Кабінет без члена"
  hint_lack_cabinet_for_cabinet_action_hint_text: "$hint_lack_cabinet_for_cabinet_action_hint_text_1$\n\n$hint_lack_cabinet_for_cabinet_action_hint_text_2$\n\n$hint_lack_cabinet_for_cabinet_action_hint_text_3$"
  hint_lack_cabinet_for_cabinet_action_hint_text_1: "[Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] не буде дуже ефективним без призначеного для нього здібного [Concept('character', 'CONCEPT_PLACEHOLDER')|e]. Завжди призначайте [Concept('characters] на всі наші [cabinet_seats', 'CONCEPT_PLACEHOLDER')|e]."
  hint_lack_cabinet_for_cabinet_action_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Натисніть на #W Сповіщення#!, щоб перейти до @government_panel![Link('government', 'tabcontent = cabinet', 'lateralview_government_entry_name')] і призначити [Concept('character', 'CONCEPT_PLACEHOLDER')|e] з найвищою відповідною [Concept('ability', 'CONCEPT_PLACEHOLDER')|e] на вільне [Concept('cabinet_seat].\n@arrow_bonus_tier_1! Розгляньте можливість найняти нового [courtier', 'CONCEPT_PLACEHOLDER')|e], якщо у нас немає хороших [characters].\n@automation! Ви можете автоматизувати Кабінет з @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_lack_cabinet_for_cabinet_action_hint_text_3: "#T Додаткові підказки: #!\n@hint! Кожна [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] використовує одну з трьох [Concept('abilities', 'CONCEPT_PLACEHOLDER')|e] персонажів, тому вам потрібно ретельно обирати своїх членів залежно від завдання, яке ви плануєте їм доручити.\n@hint! [Concept('cabinet_members', 'CONCEPT_PLACEHOLDER')|e] збільшуватимуть [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], до якого вони належать."
  hint_lack_cabinet_for_cabinet_action_diplomatic: "\"Найкраща адміністрація завжди використовуватиме найкращих людей.\""
  hint_lack_cabinet_for_cabinet_action_administrative: "\"Чим краще функціонуватиме наша країна, тим кращий зовнішній образ ми представлятимемо.\""
  hint_lack_cabinet_for_cabinet_action_military: "\"Лише за умови ефективної адміністрації ми зможемо чітко проектувати нашу силу.\""
  hint_inflation: "Інфляція"
  hint_inflation_hint_text: "$hint_inflation_hint_text_1$\n\n$hint_inflation_hint_text_2$"
  hint_inflation_hint_text_1: "Інфляція просто збільшує всі витрати для нашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e], тому її завжди слід уникати. Вона досить швидко зростає від [Concept('minting', 'CONCEPT_PLACEHOLDER')|e], але її може бути оманливо важко зменшити."
  hint_inflation_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Якщо інфляція зростає, відрегулюйте повзунок [minting] в @economy_panel![Link('finances', '', 'lateralview_economy_entry_name')], щоб запобігти зростанню [inflation].\n@arrow_bonus_tier_2! Якщо у нас вже є певна інфляція, встановлення повзунка на мінімум призведе до її зменшення."
  hint_inflation_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ми можемо отримати інші джерела зниження інфляції, наприклад, від [Concept('advances', 'CONCEPT_PLACEHOLDER')|e]."
  hint_inflation_diplomatic: "Хай ми будемо врятовані від цього невидимого недугу економіки."
  hint_inflation_administrative: "Карбування монети може бути спокусливим засобом для бюджету, що потерпає, але також джерелом тривалих нещасть."
  hint_inflation_military: "Інфляція — це повільний і підступний вбивця."
  hint_has_disloyal_subjects: "Нелояльні піддані"
  hint_has_disloyal_subjects_hint_text: "$hint_has_disloyal_subjects_hint_text_1$\n\n$hint_has_disloyal_subjects_hint_text_2$\n\n$hint_has_disloyal_subjects_hint_text_3$"
  hint_has_disloyal_subjects_hint_text_1: "Наші [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] — це [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], підпорядковані нам тим чи іншим чином. Зазвичай вони сплачують нам [Concept('subject_taxation', 'CONCEPT_PLACEHOLDER')|e] і закликаються на наші [Concept('wars', 'CONCEPT_PLACEHOLDER')|e].\n\nЯкщо їхня [Concept('subject_loyalty', 'CONCEPT_PLACEHOLDER')|e] падає нижче #W 50#!, вони вважатимуться нелояльними і не допомагатимуть нам у наших [wars]. Наші нелояльні піддані можуть об'єднатися, щоб сформувати [GetInternationalOrganizationType('independence_movement').GetName], потенційно розпочавши [war] проти нас, якщо вони відчують себе достатньо сильними."
  hint_has_disloyal_subjects_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Переконайтеся, що [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] наших підданих щодо нас залишається високою. Ви можете підвищити її, використовуючи [Concept('diplomatic_action', 'CONCEPT_PLACEHOLDER')|e] $IMPROVE_RELATIONTITLE$.\n@arrow_bonus_tier_1! Ви можете розглянути [Concept('annexing', 'CONCEPT_PLACEHOLDER')|e] інших лояльних підданих. Збільшення нашої відносної потужності порівняно з усіма нашими підданими підвищить їхню лояльність.\n@arrow_bonus_tier_1! Збільшення розміру наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] залякає наших підданих, підвищивши їхню лояльність."
  hint_has_disloyal_subjects_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ви можете отримати огляд наших підданих на панелі «Піддані», у @diplomacy_panel![Link('diplomacy', 'relations_tab = current_relations', 'lateralview_diplomacy_entry_name')].\n@hint! Чим більше і могутніших [subjects] ми маємо у співвідношенні до нашої власної потужності, тим важче буде підтримувати їхню високу [subject_loyalty].\n@hint! Різні типи [subjects] мають різні характеристики та обмеження."
  hint_has_disloyal_subjects_diplomatic: "Ми повинні плекати добрі стосунки з нашими підданими в будь-який час, аби вони не почали вважати себе господарями своєї долі."
  hint_has_disloyal_subjects_administrative: "Піддані є прибутковим доповненням до нашої Скарбниці.\nНе дозволяйте їм усвідомити це."
  hint_has_disloyal_subjects_military: "Вівці розбредуться за першої ж нагоди. Краще нам бути готовими спустити псів війни!"
  hint_has_buildings_missing_input: "Будівлі, яким бракує вхідних матеріалів"
  hint_has_buildings_missing_input_hint_text: "$hint_has_buildings_missing_input_hint_text_1$\n\n$hint_has_buildings_missing_input_hint_text_2$\n\n$hint_has_buildings_missing_input_hint_text_3$"
  hint_has_buildings_missing_input_hint_text_1: "[Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] потребують доступу до [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] зі своїх [markets] для належної роботи. Якщо вони не можуть придбати всі потрібні [goods], їхній випуск буде відповідно зменшений."
  hint_has_buildings_missing_input_hint_text_2: "#T Рекомендовані дії:#!\n$hint_address_shortage_text$"
  hint_has_buildings_missing_input_hint_text_3: "#T Додаткові підказки:#!\n@hint! Не всі нестачі будівель становлять критичну проблему для нашої країни. Однак ми можемо захотіти забезпечити належне функціонування деяких особливо стратегічних виробничих ланцюгів.\n@hint! Наприклад, ми можемо не змогти набирати [ShowUnitDefinitionName('a_footmen')], якщо наша [ShowBuildingTypeName('weapon_guild')] не може придбати достатньо [ShowGoodsName('lumber')] зі свого [market]."
  hint_has_buildings_missing_input_diplomatic: "Деякі будівлі є особливо необхідними для належного функціонування нашого володіння."
  hint_has_buildings_missing_input_administrative: "Наші купці повинні намагатися усунути будь-які нестачі на наших Ринках. Але іноді невидима рука Ринку потребує... невеликого поштовху."
  hint_has_buildings_missing_input_military: "Ми повинні забезпечити стабільне постачання зброї та військових припасів, перш ніж приступати до будь-якої військової операції."
  hint_address_shortage_text: "Натискання на #W Сповіщення#! перенесе вас до @production_panel![Link('goods_production', '', 'lateralview_goods_production_entry_name')], відфільтрованого за відсутніми [Concept('goods] на постраждалому [market].\nВи можете збільшити [supply', 'CONCEPT_PLACEHOLDER')|e] [Concept('good', 'CONCEPT_PLACEHOLDER')|e] на наших [Concept('markets', 'CONCEPT_PLACEHOLDER')|e] трьома основними способами:\n\n@arrow_bonus_tier_3! Натисніть кнопку @rgo! [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e], щоб переглянути список наших [Concept('locations] на цьому [market] із відповідним [rgo]. Пам'ятайте, що лише [raw_materials', 'CONCEPT_PLACEHOLDER')|e] можуть бути вироблені в [Concept('rgo]\n@arrow_bonus_tier_2! Натисніть кнопку @building! [building', 'CONCEPT_PLACEHOLDER')|e], щоб переглянути список усіх доступних [Concept('buildings], що можуть виробляти цей конкретний [good].\n@arrow_bonus_tier_2! Натисніть кнопку @import! [import', 'CONCEPT_PLACEHOLDER')|e], щоб імпортувати [Concept('good] з іншого Ринку, використовуючи [merchant_capacity', 'CONCEPT_PLACEHOLDER')|e].\n@automation! Ви можете автоматизувати будівництво наших [Concept('buildings] та [rgo], а також нашу [trade', 'CONCEPT_PLACEHOLDER')|e], з @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_has_constructions_missing_input: "Будівництву бракує вхідних матеріалів"
  hint_has_constructions_missing_input_hint_text: "$hint_has_constructions_missing_input_hint_text_1$\n\n$hint_has_constructions_missing_input_hint_text_2$\n\n$hint_has_constructions_missing_input_hint_text_3$"
  hint_has_constructions_missing_input_hint_text_1: "Усі [Concept('constructions', 'CONCEPT_PLACEHOLDER')|e] потребують доступу до певних [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] з [Concept('market', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Якщо немає достатньо доступних [goods], [construction] зупиниться."
  hint_has_constructions_missing_input_hint_text_2: "#T Рекомендовані дії:#!\n$hint_address_shortage_text$"
  hint_has_constructions_missing_input_hint_text_3: "#T Додаткові підказки:#!\n@hint! Усі [Concept('locations] на [market] отримують доступ до [goods], які їм потрібні для всіх цілей, у порядку їхнього [market_access', 'CONCEPT_PLACEHOLDER')|e], незалежно від того, хто спочатку виробляв товар.\n@hint! Це означає, що [Concept('locations], які ближче до [market_centers', 'CONCEPT_PLACEHOLDER')|e], матимуть легший доступ до товарів, які їм потрібні."
  hint_has_constructions_missing_input_diplomatic: "Точний контроль усіх ресурсів і потреб є вирішальним для будь-якого підприємства."
  hint_has_constructions_missing_input_administrative: "Дипломатія та торгівля зможуть забезпечити нас усім, чого ми не можемо виробляти самі."
  hint_has_constructions_missing_input_military: "Ми повинні бути в змозі задовольнити всі наші потреби та вимоги щодо постачання, якщо ми хочемо уникнути того, щоб інші експлуатували наші слабкості."
  hint_lack_pop_promotion_to_fill_buildings: "Будівлі або [rgo], яким бракує працівників"
  hint_lack_pop_promotion_to_fill_buildings_hint_text: "$hint_lack_pop_promotion_to_fill_buildings_hint_text_1$\n\n$hint_lack_pop_promotion_to_fill_buildings_hint_text_2$\n\n$hint_lack_pop_promotion_to_fill_buildings_hint_text_3$"
  hint_lack_pop_promotion_to_fill_buildings_hint_text_1: "Різні [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] залучають різні [Concept('pop_types', 'CONCEPT_PLACEHOLDER')|e]. Якщо немає достатньо вільних [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] потрібного [pop_type] після завершення нової [building], [ShowPopTypeName('peasants')] почнуть [Concept('promote', 'CONCEPT_PLACEHOLDER')|e] відповідно до [ShowModifierTypeName('local_pop_promotion_speed')] [Concept('location', 'CONCEPT_PLACEHOLDER')|e].\n\nБудівлі також можуть втрачати працівників, коли [Concept('pops] помирають через [diseases', 'CONCEPT_PLACEHOLDER')|e], [Concept('sieges', 'CONCEPT_PLACEHOLDER')|e] або [Concept('starvation', 'CONCEPT_PLACEHOLDER')|e]."
  hint_lack_pop_promotion_to_fill_buildings_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Не будуйте в [Concept('locations], яким вже бракує забагато працівників.\n@arrow_bonus_tier_2! Збільшіть важливі джерела швидкості підвищення для [location]: [stability', 'CONCEPT_PLACEHOLDER')|e], [Concept('literacy', 'CONCEPT_PLACEHOLDER')|e] та [Concept('control', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Побудуйте [ShowBuildingTypeName('library')] та [ShowBuildingTypeName('university')] у наших найважливіших [locations].\n@arrow_bonus_tier_1! Розгляньте можливість знищення менш корисних [buildings], щоб звільнити робочу силу."
  hint_lack_pop_promotion_to_fill_buildings_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('urban_locations', 'CONCEPT_PLACEHOLDER')|e] мають вищу базову кількість доступних [Concept('upper_class', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops].\n@hint! Пам'ятайте, що [location] повинна мати принаймні деяких [available', 'CONCEPT_PLACEHOLDER')|e] [ShowPopTypeName('peasants')], щоб відбулося [promotion].\n@hint! Ви можете перевірити [ShowModifierTypeName('local_pop_promotion_speed')] [location] на #W вкладці «Демографія»#! #W панелі «Місцевість»#!."
  hint_lack_pop_promotion_to_fill_buildings_diplomatic: "Що таке промисловість без людей, які б у ній працювали?"
  hint_lack_pop_promotion_to_fill_buildings_administrative: "Якщо наш народ не працюватиме, інші країни можуть назвати нас ледачими."
  hint_lack_pop_promotion_to_fill_buildings_military: "Обов'язок населення — працювати та виробляти те, що потрібно країні."
  hint_casus_belli: "Привід до війни"
  hint_casus_belli_hint_text: "$hint_casus_belli_hint_text_1$\n\n$hint_casus_belli_hint_text_2$\n\n$hint_casus_belli_hint_text_3$"
  hint_casus_belli_hint_text_1: "[Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] — це законна причина для початку [Concept('war', 'CONCEPT_PLACEHOLDER')|e]. Іти на війну без належного приводу до війни все ще можливо, але вимагати виконання наших умов у [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e] буде складніше, а наші сусіди відреагують з посиленою ворожістю на наші дії."
  hint_casus_belli_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Найкращий спосіб отримати привід до війни — запросити його у нашого [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e]. Ви можете скликати сесію Парламенту з @government_panel![Link('government', 'tabcontent = parliament', 'lateralview_government_entry_name')].\n@arrow_bonus_tier_2! Створення [Concept('spy_network', 'CONCEPT_PLACEHOLDER')|e] в іноземних [Concept('countries] дозволить нам сфабрикувати привід до війни проти них, якщо ми маємо [cores', 'CONCEPT_PLACEHOLDER')|e] на їхніх землях, або якщо вони є нашими [Concept('rivals', 'CONCEPT_PLACEHOLDER')|e]."
  hint_casus_belli_hint_text_3: "#T Додаткові підказки:#!\n@hint! Пам'ятайте, що не всі [Concept('wars] є справедливими, і ми можемо іти на війну без приводу до війни. Гарний привід до війни — це корисний актив, але частіше за все, сила диктує право.\n@hint! Кожен привід до війни має певну [war_goal', 'CONCEPT_PLACEHOLDER')|e]. Виконання [Concept('war_goal] під час [war] надасть нам [war_score', 'CONCEPT_PLACEHOLDER')|e], що є важливим для перемоги.\n@hint! [Concept('events', 'CONCEPT_PLACEHOLDER')|e] та [Concept('situations', 'CONCEPT_PLACEHOLDER')|e] можуть надавати спеціальні приводи до війни."
  hint_casus_belli_diplomatic: "Навіть у війні є правила, яких необхідно дотримуватися."
  hint_casus_belli_administrative: "Хороший привід до війни дозволив би нам оголосити війну, не накликаючи гніву наших сусідів."
  hint_casus_belli_military: "Найкращий привід до війни, мій Лорде, це відсутність приводу до війни."
  hint_has_unraised_levies_in_war: "Ополчення"
  hint_has_unraised_levies_in_war_hint_text: "$hint_has_unraised_levies_in_war_hint_text_1$\n\n$hint_has_unraised_levies_in_war_hint_text_2$\n\n$hint_has_unraised_levies_in_war_hint_text_3$"
  hint_has_unraised_levies_in_war_hint_text_1: "[Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] становлять основну частину війська будь-якої [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] у перші століття гри, перш ніж їх замінять професійні солдати, відомі як [Concept('regulars_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Доти бажано завжди збирати наше [Concept('levies] під час [war_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_has_unraised_levies_in_war_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Коли починається війна, натисніть на #W Сповіщення#!, щоб перейти до #W Зібрати ополчення#! на @military_panel![Link('unit_overview', '', 'lateralview_unit_overview_entry_name')]. Звідти ви можете зібрати все [Concept('levies] одразу, або обрати конкретні [provinces_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ви хочете мобілізувати.\n@arrow_bonus_tier_2! Це гарна ідея — зменшити нашу залежність від [levies] за допомогою передових, але дорогих [regular_regiments]. Для цього вам потрібно буде побудувати [ShowBuildingTypeName('sergeantry')].\n@arrow_bonus_tier_1! У скрутні часи [Concept('mercenaries_with_icon', 'CONCEPT_PLACEHOLDER')|e] можуть бути добрим доповненням, або навіть заміною, для нашого [levies], якщо у нас є зайві гроші. Ви можете найняти [mercenaries] з @military_panel![Link('unit_overview', '', 'lateralview_unit_overview_entry_name')]."
  hint_has_unraised_levies_in_war_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('levies] походять переважно від [pops_with_icon', 'CONCEPT_PLACEHOLDER')|e] вашої [Concept('primary_culture_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('accepted_cultures_with_icon', 'CONCEPT_PLACEHOLDER')|e], але кількість, яку ви можете зібрати з кожної [Concept('location], залежатиме від її [control_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@hint! Майте на увазі, що виробництво [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] зменшиться в мобілізованих [locations], доки чоловіки не повернуться додому.\n@hint! Будьте обережні: кожен селянин, який гине в битві, — це на одного селянина менше для роботи в полях."
  hint_has_unraised_levies_in_war_diplomatic: "Люди повинні працювати, але вони також повинні захищати свої домівки у разі нападу."
  hint_has_unraised_levies_in_war_administrative: "Якщо люди довіряють нам, вони прийдуть на допомогу, коли їх покличуть."
  hint_has_unraised_levies_in_war_military: "Наявність поля для оранки не є виправданням, коли є війна, яку треба виграти."
  hint_no_allies: "Без союзників"
  hint_no_allies_hint_text: "$hint_no_allies_hint_text_1$\n\n$hint_no_allies_hint_text_2$\n\n$hint_no_allies_hint_text_3$"
  hint_no_allies_hint_text_1: "Альянс ([Concept('alliance', 'CONCEPT_PLACEHOLDER')|e]) — це договір ([Concept('treaty', 'CONCEPT_PLACEHOLDER')|e]) між двома країнами ([Concept('countries', 'CONCEPT_PLACEHOLDER')|e]), що дозволяє їм вступати у війни ([Concept('wars', 'CONCEPT_PLACEHOLDER')|e]) одна одної. Якщо на нас нападуть, наші союзники ([allies]) отримають заклик до зброї ([Concept('call_to_arms', 'CONCEPT_PLACEHOLDER')|e]), щоб вступити у війну на нашому боці. І навпаки, ми завжди повинні враховувати союзників нашого ворога, оголошуючи війну ([war]) самі, оскільки вони, ймовірно, втрутяться проти нас."
  hint_no_allies_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Перейдіть до @diplomacy_panel![Link('diplomacy_macrobuilder', '', 'lateralview_diplomacy_macrobuilder_entry_name')] і натисніть $offer_alliance$ під #W $CATEGORY_FRIENDLY_ACTIONS$#!. Ви побачите список усіх країн ([countries]), готових підписати альянс ([Concept('alliance', 'CONCEPT_PLACEHOLDER')|e]) з нами.\n@arrow_bonus_tier_2! Деякі країни ([countries]) можуть потребувати переконання. Використання #W $IMPROVE_RELATIONTITLE$#! дипломатичної дії ([Concept('diplomatic_action', 'CONCEPT_PLACEHOLDER')|e]) повільно схилить їх на наш бік."
  hint_no_allies_hint_text_3: "#T Додаткові підказки:#!\n@hint! Остерігайтеся: наші союзники також можуть закликати нас до своїх війн. Не укладайте союзи з країнами, що виглядають занадто вразливими, інакше ми можемо опинитися на стороні, що програє в чужій війні.\n@hint! Ви завжди можете відхилити заклик до зброї ([call_to_arms]) від нашого союзника. Але це покладе кінець нашій дружбі та заплямує нашу дипломатичну репутацію на роки вперед."
  hint_no_allies_diplomatic: "Ніхто не може вижити сам у цьому світі."
  hint_no_allies_administrative: "Навіть якщо ми не плануємо нападати, вступ в альянс з одним з наших сусідів може відрадити наших ворогів від нападу на нас."
  hint_no_allies_military: "Сильний союзник прикрив би наш тил, коли ми перейдемо в наступ."
  hint_black_death: "Чорна Смерть"
  hint_black_death_hint_text: "$hint_black_death_hint_text_1$\n\n$hint_black_death_hint_text_2$\n\n$hint_black_death_hint_text_3$"
  hint_black_death_hint_text_1: "Чорна Смерть — це ситуація ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]), що спустошить Старий Світ, слідуючи шляхами торгівлі та цивілізації. Вона буде найсмертоноснішою в наших густонаселених локаціях ([Concept('locations', 'CONCEPT_PLACEHOLDER')|e]) і зникне, коли достатня кількість тих, хто вижив, розвине стійкість до хвороби ([Concept('disease_resistance', 'CONCEPT_PLACEHOLDER')|e]) до неї.\n\nЛюди кожного типу населення ([Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e]) помруть від хвороби, залишаючи наші будівлі ([buildings|E]) порожніми, доки нові [ShowPopTypeName('peasants')] не просунуться ([Concept('promote', 'CONCEPT_PLACEHOLDER')|e]). Це означає, що наша податкова база ([Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e]), ймовірно, скоротиться, оскільки продуктивність наших будівель ([buildings]) обвалиться, і [ShowModifierTypeName('local_pop_promotion_speed')] буде дуже важливою для відновлення втраченої зайнятості ([Concept('employment', 'CONCEPT_PLACEHOLDER')|e])."
  hint_black_death_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Будуйте будівлі ([buildings]) [ShowBuildingTypeName('hospital')] у наших найбільших міських локаціях ([Concept('urban_locations', 'CONCEPT_PLACEHOLDER')|e]), перш ніж хвороба досягне нашої країни ([Concept('country', 'CONCEPT_PLACEHOLDER')|e]).\n@arrow_bonus_tier_2! Натисніть на банер ситуації ([situation]), щоб переглянути спеціальні взаємодії, доступні нам. Можливо, вони допоможуть пом'якшити катастрофу?\n@arrow_bonus_tier_2! Підтримуйте нашу стабільність ([Concept('stability', 'CONCEPT_PLACEHOLDER')|e]) на високому рівні. Це не тільки допомагає з повстаннями ([Concept('rebellions', 'CONCEPT_PLACEHOLDER')|e]), але й є важливим для [ShowModifierTypeName('local_pop_promotion_speed')].\n@arrow_bonus_tier_1! Не будуйте нові будівлі у локаціях ([locations]), що знелюдніли, оскільки їм буде важко наймати нових робітників.\n@arrow_bonus_tier_1! Слідкуйте за нашим [ShowModifierTypeName('local_pop_promotion_speed')], оскільки більшість наших будівель ([buildings]) та сировинних ресурсів ([Concept('rgo', 'CONCEPT_PLACEHOLDER')|e]) потребуватиме [ShowPopTypeName('peasants')] для просування ([Concept('promote', 'CONCEPT_PLACEHOLDER')|e]) до вищих типів населення ([pop_types])."
  hint_black_death_hint_text_3: "#T Додаткові підказки:#!\n@hint! Це може зайняти роки, але доки є достатньо селян у наших локаціях ([locations]), люди зрештою просунуться ([Concept('promote', 'CONCEPT_PLACEHOLDER')|e]), щоб заповнити вакансії, залишені хворобою.\n@hint! Ви можете використати уроки цієї катастрофи для вирішення інших лих під час вашої кампанії: голод ([Concept('starvation', 'CONCEPT_PLACEHOLDER')|e]), хвороби ([Concept('diseases', 'CONCEPT_PLACEHOLDER')|e]) та грабунок ([Concept('loot', 'CONCEPT_PLACEHOLDER')|e]) матимуть схожі наслідки для наших локацій."
  hint_black_death_diplomatic: "Смерть виїжджає. За нею йдуть руїна та сум'яття."
  hint_black_death_administrative: "Бліда Смерть безсторонньо стукає ногою як у вежі королів, так і в хатини бідних."
  hint_black_death_military: "Четвертий Вершник насувається на нас. Жодна Підказка тепер нас не врятує."
  hint_fall_of_delhi: "[GetSituationByKey('fall_of_delhi').GetNameWithNoTooltip]"
  hint_fall_of_delhi_hint_text: "$hint_fall_of_delhi_hint_text_1$\n\n$hint_fall_of_delhi_hint_text_2$\n\n$hint_fall_of_delhi_hint_text_3$\n\n$hint_fall_of_delhi_hint_text_4$"
  hint_fall_of_delhi_hint_text_1: "[GetSituationByKey('fall_of_delhi').GetName] — це ситуація ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]), що може призвести до знищення колись великого [GetCountry('DLH').GetFlavorRank]. Навколо них збираються стерв'ятники та потенційні завойовники біля ослабленого кордону, оскільки влада [GetCountry('DLH').GetGovernment.GetRulerOrRegent.GetName] занепадає..."
  hint_fall_of_delhi_hint_text_2: "#T Рекомендовані дії як Делі:#!\n@arrow_bonus_tier_3! Як [GetCountry('DLH').GetName], розгляньте можливість використання багатьох нових дій ([Concept('actions', 'CONCEPT_PLACEHOLDER')|e]), таких як [ShowGenericActionName('strengthen_neighbor_relations')] або [ShowGenericActionName('fall_of_delhi_appoint_governors')].\n@arrow_bonus_tier_2! Під час різноманітних подій ([Concept('events', 'CONCEPT_PLACEHOLDER')|e]), пов'язаних з цією ситуацією ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]), ми повинні прагнути збільшити нашу частку влади ([Concept('share_of_power_gc', 'CONCEPT_PLACEHOLDER')|e]) за рахунок наших ворогів, щоб наш народ не спіткав загибель."
  hint_fall_of_delhi_hint_text_3: "#T Додаткові підказки для Делі:#!\n@hint! Однією явною перевагою над нашими ворогами є наша могутня постійна армія ([Concept('army', 'CONCEPT_PLACEHOLDER')|e]). На відміну від ополчення ([Concept('levies', 'CONCEPT_PLACEHOLDER')|e]), наші наймані солдати поповнюють свої лави і є значно могутнішими. Основа влади, що допомагає утримувати наш режим під контролем."
  hint_fall_of_delhi_hint_text_4: "#T Рекомендовані дії як Противник:#!\n@arrow_bonus_tier_3! Найсильніша країна ([Concept('country', 'CONCEPT_PLACEHOLDER')|e]) в $india$ буде головним Противником на початку ситуації ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]), але ми можемо отримати цю позицію, оголосивши війну та претендуючи на верховенство. Ми можемо зробити це, будучи найсильнішою країною ([Concept('country', 'CONCEPT_PLACEHOLDER')|e]) в $india$ на початку ситуації ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]) або перемігши поточного лідера та захопивши верховенство через мирний договір ([Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]) [ShowPeaceTreatyTypeNameWithNoTooltip('peace_seize_opposition_leadership')]."
  hint_fall_of_delhi_diplomatic: "Чи захищаючи трон [GetCountry('DLH').GetName], чи повстаючи як його суперник, розумно підтримувати обережні стосунки з сусідами. Дружба може виграти час, тоді як ворожнеча може виправдати нові завоювання."
  hint_fall_of_delhi_administrative: "Землі, здобуті в хаосі, є крихкими трофеями. Розгляньте можливість надання васалів ([Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]) або покращення контролю ([Concept('control', 'CONCEPT_PLACEHOLDER')|e]), де це можливо, щоб новопридбані території не вислизнули так швидко, як були взяті."
  hint_fall_of_delhi_military: "Меч вирішує багато що в цій боротьбі. Сильна армія ([Concept('army', 'CONCEPT_PLACEHOLDER')|e]) може захистити Делі від колапсу або дозволити Противникам повалити гіганта. Проте навіть перемога несе ризики! Остерігайтеся повстань та перевантажених ліній."
  hint_rise_of_the_ottomans: "[GetSituationByKey('rise_of_the_ottomans').GetNameWithNoTooltip] Підказки"
  hint_rise_of_the_ottomans_hint_text: "$hint_rise_of_the_ottomans_hint_text_1$\n\n$hint_rise_of_the_ottomans_hint_text_2$"
  hint_rise_of_the_ottomans_hint_text_1: "Ця ситуація ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]) знаменує піднесення #italic Найсильнішого Бейліку#!, призначеного створити одну з найбільших імперій в історії. Через унікальні події ([Concept('events', 'CONCEPT_PLACEHOLDER')|e]) та дії ([Concept('actions', 'CONCEPT_PLACEHOLDER')|e]) ми повинні забезпечити панування над іншими Бейліками, перетнути [ShowProvinceDefinitionName('marmara_sea_province')] та заявити права на багатства [ShowLocationName('constantinople')]. Вічна слава чекає!"
  hint_rise_of_the_ottomans_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_2! Настав наш час сходження. Вдавшись до потужних дій ([Concept('actions', 'CONCEPT_PLACEHOLDER')|e]), таких як [ShowGenericActionName('press_claims')], та скориставшись подіями ([Concept('events', 'CONCEPT_PLACEHOLDER')|e]), що прискорюють інтеграцію ([Concept('integration', 'CONCEPT_PLACEHOLDER')|e]), наше піднесення буде вписано в літописи віків.\n@arrow_bonus_tier_1! Якщо ми утримуємо #Y 120#! локацій ([Concept('locations', 'CONCEPT_PLACEHOLDER')|e]) та забезпечимо плацдарм у [ShowRegionName('balkan_region')], ми можемо поширити дію ([Concept('action', 'CONCEPT_PLACEHOLDER')|e]) [ShowGenericActionNameWithNoTooltip('press_claims')] також і на цей регіон ([Concept('region', 'CONCEPT_PLACEHOLDER')|e])."
  hint_rise_of_the_ottomans_diplomatic: "На ранніх етапах ситуації ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]) розумно використовувати надані дії ([Concept('actions', 'CONCEPT_PLACEHOLDER')|e]), такі як [ShowGenericActionName('seek_relations_with_the_byzantines')]. Використовуючи їхній спадаючий престиж як останнього бастіону $ROM$, ми побудуємо нашу спадщину."
  hint_rise_of_the_ottomans_administrative: "Хоча ми, безсумнівно, будемо успішними у завоюваннях, ми повинні пам'ятати про наш внутрішній стан та ядро нашого володіння. Не нехтуйте нашими внутрішніми справами в гонитві за славою за кордоном!"
  hint_rise_of_the_ottomans_military: "Ми повинні прагнути завоювати міста ([Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e]) наших ворогів. Ці кампанії стануть фундаментом для влади поколінь."
  hint_council_of_trent: "[GetSituationByKey('council_of_trent').GetNameWithNoTooltip]"
  hint_council_of_trent_hint_text: "$hint_council_of_trent_hint_text_1$\n\n$hint_council_of_trent_hint_text_2$"
  hint_council_of_trent_hint_text_1: "Під час [ShowSituationName('council_of_trent')] [GetUniqueInternationalOrganization('catholic_church').GetName] має змогу змінювати свої поточні закони ([Concept('laws', 'CONCEPT_PLACEHOLDER')|e]) та впроваджувати нові політики ([Concept('policies', 'CONCEPT_PLACEHOLDER')|e]) до міжнародної організації ([Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e])."
  hint_council_of_trent_hint_text_2: "#T Можливі взаємодії:#!\n@arrow_bonus_tier_3! Як член ([Concept('member', 'CONCEPT_PLACEHOLDER')|e]) [GetUniqueInternationalOrganization('catholic_church').GetName], ви можете запропонувати [ShowResolutionName('policy_vote')] за допомогою списку законів ([laws]) нижче або Панелі доктрин у [GetUniqueInternationalOrganization('catholic_church').GetName]\n@arrow_bonus_tier_2! Як член ([Concept('member', 'CONCEPT_PLACEHOLDER')|e]) [GetUniqueInternationalOrganization('catholic_church').GetName], ви можете проголосувати за запропонований [ShowResolutionName('policy_vote')]"
  hint_golden_age_of_piracy: "[GetSituationByKey('golden_age_of_piracy').GetNameWithNoTooltip]"
  hint_golden_age_of_piracy_hint_text: "$hint_golden_age_of_piracy_hint_text_1$\n\n$hint_golden_age_of_piracy_hint_text_2$\n\n$hint_golden_age_of_piracy_hint_text_3$\n\n$hint_golden_age_of_piracy_hint_text_4$"
  hint_golden_age_of_piracy_hint_text_1: "[GetSituationByKey('golden_age_of_piracy').GetName] — це ситуація ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]), що може призвести до появи нових піратів. Вільні люди, невдоволені моряки та ті, хто кидає виклик централізованій владі, надають сили чорним вітрилам, під якими вони тепер здійснюють свою незаконну діяльність."
  hint_golden_age_of_piracy_hint_text_2: "#T Рекомендовані дії для боротьби з піратами:#!\n@arrow_bonus_tier_3! Розгляньте можливість знищення будь-яких Піратів біля наших берегів, ми не можемо дозволити собі, щоб вони блукали нашими морями.\n@arrow_bonus_tier_2! Кожна подія ([Concept('event', 'CONCEPT_PLACEHOLDER')|e]), пов'язана з цією ситуацією ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]), може віщувати появу нової піратської республіки."
  hint_golden_age_of_piracy_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ми можемо використовувати нові дії ([Concept('actions', 'CONCEPT_PLACEHOLDER')|e]) у ситуації ([Concept('situation', 'CONCEPT_PLACEHOLDER')|e]), незалежно від того, чи пливемо ми під чорним прапором, чи ні."
  hint_golden_age_of_piracy_hint_text_4: "#T Рекомендовані дії як Пірат:#!\n@arrow_bonus_tier_3! Розумно забезпечити безпеку узбережжя та побудувати могутній флот ([Concept('navy', 'CONCEPT_PLACEHOLDER')|e]). Використовуючи дії ([Concept('actions', 'CONCEPT_PLACEHOLDER')|e]), такі як [ShowGenericActionName('attract_sailors')] або [ShowGenericActionName('migrate_to_new_waters')], ми можемо підтримувати універсальний флот та присутність."
  hint_golden_age_of_piracy_diplomatic: "Посмішки та ром працюють краще, ніж погрози, принаймні, доки гармати не почнуть говорити. Можливо, було б розумно підтримувати стабільні стосунки з шибениками. Не всі скарби — срібло та золото, сер."
  hint_golden_age_of_piracy_administrative: "Керування нашими морськими володіннями — делікатна справа в епоху піратства. Чи то захищаючись від них, чи від розбійницької конкуренції, підтримка суворого адміністрування є ключовою!"
  hint_golden_age_of_piracy_military: "Пірати не визнають жодної країни, продавши свою власну. І оскільки вони точно будуть повішені, якщо їх схоплять, вони не матимуть жодних вагань щодо вбивств та руйнувань, якщо їхні вимоги не будуть виконані."
  hint_hundred_years_war: "[GetSituationByKey('hundred_years_war').GetNameWithNoTooltip]"
  hint_hundred_years_war_hint_text: "$hint_hundred_years_war_hint_text_1$\n\n$hint_hundred_years_war_hint_text_2$\n\n$hint_hundred_years_war_hint_text_3$\n\n$hint_hundred_years_war_hint_text_4$"
  hint_hundred_years_war_hint_text_1: "[GetSituationByKey('hundred_years_war').GetName] занурює [ShowSubContinentName('western_europe')] у сум'яття! Цей період випробує альянси, і нові сили, безумовно, постануть з руїн."
  hint_hundred_years_war_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Як [GetCountry('FRA').GetName], так і [GetCountry('ENG').GetName] мають доступ до [ShowGenericActionName('request_war_entry')], [ShowGenericActionName('hyw_sign_truce')] та [ShowGenericActionName('request_papal_delegates')]. Це унікальні способи маніпулювати статусом-кво конфлікту або навіть схилити його на користь однієї з країн."
  hint_hundred_years_war_hint_text_3: "#T Додаткові підказки:#!\n@hint! Як учасники конфлікту, ми можемо здобути землі або потужні союзи."
  hint_hundred_years_war_hint_text_4: "#T Рекомендовані дії як [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] [GetCountry('FRA').GetName]:#!\n@arrow_bonus_tier_3! Було б мудро забезпечити [ShowGenericActionName('demand_autonomy')]. Кожен [ShowSubjectTypeName('appanage')] може вимагати певної міри автономії та значно виграти, використовуючи свою важливість як захисник [GetCountry('FRA').GetAdjectiveWithNoTooltip] корони."
  hint_hundred_years_war_diplomatic: "\"Дайте війні шанс!\""
  hint_hundred_years_war_administrative: "\"Заморські території, ймовірно, постраждають з точки зору [Concept('control', 'CONCEPT_PLACEHOLDER')|e]. Зважайте на [Concept('proximity', 'CONCEPT_PLACEHOLDER')|e] кожного новозавойованого місця до нашої [Concept('capital', 'CONCEPT_PLACEHOLDER')|e].\""
  hint_hundred_years_war_military: "\"Ведете війну з нашими ворогами на Півдні як [GetCountry('FRA').GetName] або [GetCountry('ENG').GetName]? Розгляньте [Concept('action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('hyw_sign_truce')] з могутнім сусідом деінде.\""
  hint_hussite_wars: "[GetSituationByKey('hussite_wars').GetNameWithNoTooltip]"
  hint_hussite_wars_hint_text: "$hint_hussite_wars_hint_text_1$\n\n$hint_hussite_wars_hint_text_2$\n\n$hint_hussite_wars_hint_text_3$\n\n$hint_hussite_wars_hint_text_4$"
  hint_hussite_wars_hint_text_1: "[GetSituationByKey('hussite_wars').GetName] спричиняють глибокий розкол у [GetReligionByKey('catholic').GetName]. Зі свого боку, багато [GetReligionByKey('catholic').GetAdjectiveWithNoTooltip] монархів побоюються, що якщо ця єресь не буде швидко погашена, вона може охопити значні частини [ShowContinentName('europe')] та загрожувати духовній владі [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  hint_hussite_wars_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! [GetCountry('PAP').GetGovernment.GetRulerTitle] прагнутиме вести [Concept('war', 'CONCEPT_PLACEHOLDER')|e] проти [GetCountry('BOH').GetName]. Сусідні [ShowReligionGroupAdjective('christian')] країни можуть приєднатися до будь-якої сторони, фактично вирішуючи долю цілого [Concept('continent', 'CONCEPT_PLACEHOLDER')|e]."
  hint_hussite_wars_hint_text_3: "#T Додаткові підказки:#!\n@hint! [GetCountry('BOH').GetName] має доступ до численних унікальних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowGenericActionName('convert_heretics_hw_action')] та [ShowGenericActionName('prepare_defenses_hw_action')], серед іншого."
  hint_hussite_wars_hint_text_4: "#T Рекомендовані дії як [GetCountry('PAP').GetName]:#!\n@arrow_bonus_tier_3! Добрі стосунки з дружніми [GetReligionByKey('catholic').GetAdjective] країнами можуть дозволити нам закликати їх до нашої боротьби. Унікальний [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e] [ShowPeaceTreatyTypeName('supress_hussite_faith')] доступний під час [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]. Він зменшить вартість використання #Y Force Convert#! [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]."
  hint_hussite_wars_diplomatic: "\"Віра має мотивувати нас шукати однодумців-союзників та вистояти в цей неспокійний період.\""
  hint_hussite_wars_administrative: "\"Нам слід прагнути підтримувати [Concept('religious_unity', 'CONCEPT_PLACEHOLDER')|e].\""
  hint_hussite_wars_military: "\"Ймовірно, нам доведеться захищати нашу віру насильницькими методами.\""
  hint_italian_wars: "[GetSituationByKey('italian_wars').GetNameWithNoTooltip]"
  hint_italian_wars_hint_text: "$hint_italian_wars_hint_text_1$\n\n$hint_italian_wars_hint_text_2$\n\n$hint_italian_wars_hint_text_3$\n\n$hint_italian_wars_hint_text_4$"
  hint_italian_wars_hint_text_1: "[GetSituationByKey('italian_wars').GetName] охоплюють [ShowRegionName('italy_region')]. Коли сторонні [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] прагнуть вторгнутися в регіон, формування Італійських ліг віщує епоху розколу та опору, захищаючи багатство регіону."
  hint_italian_wars_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Лідери кожної ліги можуть запрошувати інші [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], щоб зміцнити свій контроль над [ShowRegionName('italy_region')]."
  hint_italian_wars_hint_text_3: "#T Додаткові підказки:#!\n@hint! Суперники або вороги лідерів ліги можуть [ShowGenericActionName('iw_send_aid')] та схилити шальки терезів важливої війни."
  hint_italian_wars_hint_text_4: "#T Рекомендовані дії як лідер [ShowCultureGroupName('italian_group')] Ліги:#!\n@arrow_bonus_tier_3! Добрі стосунки з дружніми сусідніми країнами збільшать могутність нашої [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  hint_italian_wars_diplomatic: "\"[ShowRegionName('italy_region')] має бути під нашим контролем та контролем наших однодумців-союзників.\""
  hint_italian_wars_administrative: "\"Заснування [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('italy_region')] посилить наш вплив у [Concept('region', 'CONCEPT_PLACEHOLDER')|e].\""
  hint_italian_wars_military: "\"Ми повинні розтрощити конкурентів, на кону занадто багато багатства та влади.\""
  hint_little_ice_age: "[GetSituationByKey('little_ice_age').GetNameWithNoTooltip]"
  hint_little_ice_age_hint_text: "$hint_little_ice_age_hint_text_1$\n\n$hint_little_ice_age_hint_text_2$\n\n$hint_little_ice_age_hint_text_3$"
  hint_little_ice_age_hint_text_1: "[GetSituationByKey('little_ice_age').GetName] настала! Мороз вкриває землі. Ми повинні зробити все можливе, щоб захистити врожай, тварин і забезпечити виживання нашого народу!"
  hint_little_ice_age_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Розгляньте розширення [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], які виробляють або покращують виробництво [Concept('food', 'CONCEPT_PLACEHOLDER')|e]."
  hint_little_ice_age_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ми можемо використовувати багато унікальних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], щоб підтримати та перерозподілити [Concept('food', 'CONCEPT_PLACEHOLDER')|e] по наших [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e]."
  hint_little_ice_age_diplomatic: "\"Зима наближається.\""
  hint_little_ice_age_administrative: "\"Належне виробництво та розподіл [Concept('food', 'CONCEPT_PLACEHOLDER')|e] вбереже наших [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] від передчасного зустрічання з женцем.\""
  hint_little_ice_age_military: "\"Замерзлі водойми можуть бути короткочасними для проходу, але [Concept('armies', 'CONCEPT_PLACEHOLDER')|e], що потрапили в зимові гори, ризикують застрягти значно довше.\""
  hint_the_revolution: "[GetSituationByKey('the_revolution').GetNameWithNoTooltip]"
  hint_the_revolution_hint_text: "$hint_the_revolution_hint_text_1$\n\n$hint_the_revolution_hint_text_2$\n\n$hint_the_revolution_hint_text_3$"
  hint_the_revolution_hint_text_1: "[GetSituationByKey('the_revolution').GetName] вибухнула! Монархії тремтять, коли ідеї свободи, рівності та братерства поширюються, як лісова пожежа. Чи приймемо ми полум'я змін, чи захищатимемо старий порядок?"
  hint_the_revolution_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми можемо стати [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e], ставши на бік [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e] повстанців під час [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] [ShowDisasterName('revolution_disaster')].\n@arrow_bonus_tier_2! [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] дозволяє #Y 2#! унікальні [Concept('peace_treaties', 'CONCEPT_PLACEHOLDER')|e]: [ShowPeaceTreatyTypeName('reinstate_the_monarchy')] та [ShowPeaceTreatyTypeNameWithNoTooltip('force_revolution')].\n@arrow_bonus_tier_1! [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] надає доступ до нових [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowGenericActionName('suppress_foreign_revolutionaries')] та [ShowGenericActionName('assist_foreign_revolutionaries')]."
  hint_the_revolution_hint_text_3: "#T Додаткові підказки:#!\n@hint! Найсильніша революційна країна може претендувати на звання [Concept('revolutionary_target', 'CONCEPT_PLACEHOLDER')|e], маючи найвищий [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e]."
  hint_the_revolution_diplomatic: "\"На політичному ландшафті, схоже, багато монархів втратили голови, намагаючись придушити ці революції.\""
  hint_the_revolution_administrative: "\"Нам слід бути уважними, щоб швидко обрати сторону. Виживання нашого володіння залежить від швидкого прийняття рішень. Якщо революція постукає в наші двері, будьмо готові.\""
  hint_the_revolution_military: "\"Незалежно від того, чи придушимо ми революційні настрої, чи підтримаємо їх, наш вплив має поширюватися за межі наших кордонів.\""
  hint_western_schism: "[GetSituationByKey('western_schism').GetNameWithNoTooltip]"
  hint_western_schism_hint_text: "$hint_western_schism_text_1$\n\n$hint_western_schism_text_2$\n\n$hint_western_schism_text_3$\n\n$hint_western_schism_text_4$"
  hint_western_schism_text_1: "Під час [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [ShowSituationNameWithNoTooltip('western_schism')] [Concept('international_organization_with_icon', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('catholic_church').GetName] розколота між двома кандидатами на Папство, що унеможливлює будь-яку взаємодію з Курією.\n\nЩоб вплинути на результат [situation], можна вжити наступних кроків, залежно від вашої ролі в Церкві:"
  hint_western_schism_text_2: "#T [Concept('countries], що володіють [cardinal_with_icon', 'CONCEPT_PLACEHOLDER')|e]:#!\n@arrow_bonus_tier_3! Голосуйте за одного з кандидатів"
  hint_western_schism_text_3: "#T [Concept('countries] без [cardinal_with_icon', 'CONCEPT_PLACEHOLDER')|e]:#!\n@arrow_bonus_tier_3! Використайте [Concept('action', 'CONCEPT_PLACEHOLDER')|e] [situation] #V $schism_show_support_for_one_pope$#!, щоб надати обраному кандидату прогрес\n@arrow_bonus_tier_2! Використайте релігійну [action] $request_cardinal_seat$, щоб отримати [cardinal]\n@arrow_bonus_tier_1! Використайте [action] [situation] #V $schism_demand_support_from_one_pope$#!, щоб отримати вигоду від [situation]"
  hint_western_schism_text_4: "Під час [Concept('situation] єресі поширюватимуться по всьому католицькому світу.\n\n#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Розгляньте використання [action] [situation', 'CONCEPT_PLACEHOLDER')|e] #V $schism_show_unity_of_faith$#!, щоб підтримувати високий рівень вашої [Concept('religious_unity', 'CONCEPT_PLACEHOLDER')|e]."
  hint_reformation: "[GetSituationByKey('reformation').GetNameWithNoTooltip]"
  hint_reformation_hint_text: "$hint_reformation_hint_text_1$\n\n$hint_reformation_hint_text_2$\n\n$hint_reformation_hint_text_3$"
  hint_reformation_hint_text_1: "Під час [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [ShowSituationNameWithNoTooltip('reformation')], [ShowBuildingTypeName('lutheran_preachers')] та [ShowBuildingTypeName('calvinist_preachers')] поширюватимуть свої нові [Concept('religions', 'CONCEPT_PLACEHOLDER')|e] по всьому [ShowReligionGroupAdjective('christian')] світу."
  hint_reformation_hint_text_2: "#T Боріться з реформаторами:#!\n@arrow_bonus_tier_3! Видаліть [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] [ShowBuildingTypeName('lutheran_preachers')] та [ShowBuildingTypeName('calvinist_preachers')], що коштуватиме вам [Concept('stability', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_3! Після активації побудуйте та підтримуйте [ShowBuildingTypeName('jesuit_college')], щоб боротися з поширенням [ShowReligionName('lutheran')] та [ShowReligionName('calvinist')]."
  hint_reformation_hint_text_3: "#T Приєднайтеся до реформаторів:#!\n@arrow_bonus_tier_3! Коли одна з нових вір пошириться у вашій країні, прийміть її та наверніться до неї за допомогою дії #V $embrace_the_reformation$#!\n@arrow_bonus_tier_2! Використайте @religion_panel![Link('country_religion', '', '@society_panel! Закладка Релігії')] для навернення до нової [religion]"
  hint_treaty_of_tordesillas: "[GetSituationByKey('treaty_of_tordesillas').GetNameWithNoTooltip]"
  hint_treaty_of_tordesillas_hint_text: "$hint_treaty_of_tordesillas_hint_text_1$\n\n$hint_treaty_of_tordesillas_hint_text_2$"
  hint_treaty_of_tordesillas_hint_text_1: "Розпочався [GetSituationByKey('treaty_of_tordesillas').GetName]! [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetName] та [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetName] прагнуть розділити Новий Світ між собою!"
  hint_treaty_of_tordesillas_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми можемо використовувати будь-яку з унікальних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e] через панель [Concept('situation', 'CONCEPT_PLACEHOLDER')|e], щоб формувати наші колоніальні амбіції.\n@arrow_bonus_tier_2! [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] зрештою перейде до #Y другої#! фази, як тільки її буде ратифіковано. Після цього більше [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] зможуть брати в ній участь та висувати свої претензії."
  hint_treaty_of_tordesillas_diplomatic: "\"Це гарна нагода для нас відхопити шматок нововідкритих земель під прикриттям релігійного та вищого авторитету.\""
  hint_treaty_of_tordesillas_administrative: "\"Новий світ пропонує безліч комерційних можливостей. Скористаймося ними.\""
  hint_treaty_of_tordesillas_military: "\"Ми не можемо дозволити нашим ворогам захопити цю землю раніше за нас!\""
  hint_great_pestilence: "[GetSituationByKey('great_pestilence').GetNameWithNoTooltip]"
  hint_great_pestilence_hint_text: "$hint_black_death_hint_text_2$\n\n$hint_black_death_hint_text_3$"
  hint_great_pestilence_diplomatic: "\"Наші союзники покинули нас. Керівництво зрадило нас. Покиньте свої пости! Тікайте, тікайте, рятуйте свої життя!\""
  hint_great_pestilence_administrative: "\"Не втрачайте надії, є багато заходів, які ми можемо вжити, щоб зменшити кількість смертей, хоч би якими мізерними та неефективними вони не були...\""
  hint_great_pestilence_military: "\"Будьте обережні, переміщуючи наші [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] по [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з хворобою. Ми не можемо дозволити собі втратити солдатів.\""
  hint_columbian_exchange: "[GetSituationByKey('columbian_exchange').GetNameWithNoTooltip]"
  hint_columbian_exchange_hint_text: "$hint_columbian_exchange_hint_text_1$\n\n$hint_columbian_exchange_hint_text_2$"
  hint_columbian_exchange_hint_text_1: "Розпочався [GetSituationByKey('columbian_exchange').GetName]! Відтепер [Concept('trade', 'CONCEPT_PLACEHOLDER')|e] та [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] будуть текти між Старим і Новим Світом!"
  hint_columbian_exchange_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми можемо використовувати будь-яку з унікальних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e] через панель [Concept('situation', 'CONCEPT_PLACEHOLDER')|e], щоб збільшити наш прибуток, запровадивши нові товари на нашому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  hint_columbian_exchange_diplomatic: "\"Торговий прибуток рухає світом!\""
  hint_columbian_exchange_administrative: "$hint_treaty_of_tordesillas_administrative$"
  hint_columbian_exchange_military: "\"Ми повинні зробити все можливе, щоб забезпечити прибуткові джерела та нові товари, випередивши наших конкурентів!\""
  hint_war_of_religions: "[GetSituationByKey('war_of_religions').GetNameWithNoTooltip]"
  hint_war_of_religions_hint_text: "$hint_war_of_religions_hint_text_1$\n\n$hint_war_of_religions_hint_text_2$\n\n$hint_war_of_religions_hint_text_3$\n\n$hint_war_of_religions_hint_text_4$"
  hint_war_of_religions_hint_text_1: "Під час [ShowSituationNameWithNoTooltip('war_of_religions')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] дві [Concept('international_organizations_with_icon', 'CONCEPT_PLACEHOLDER')|e] намагаються забезпечити виживання своїх [Concept('religions', 'CONCEPT_PLACEHOLDER')|e] у межах [GetUniqueInternationalOrganization('hre').GetName]. [GetUniqueInternationalOrganization('protestant_union').GetName] та [GetUniqueInternationalOrganization('catholic_league').GetName] пропонуватимуть захист [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] імперії. Зі зростанням напруженості обидві зможуть спробувати встановити релігійну перевагу, змінюючи [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip] на свій розсуд."
  hint_war_of_religions_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Приєднайтеся до [Concept('international_organization], яку бажаєте підтримати\n@arrow_bonus_tier_2! Шукайте нових [alliances', 'CONCEPT_PLACEHOLDER')|e] із зовнішніми країнами"
  hint_war_of_religions_hint_text_3: "#T Якщо ви лідер Релігійної Ліги:#!\n@arrow_bonus_tier_3! Використайте [Concept('situation] [action', 'CONCEPT_PLACEHOLDER')|e] #V $prepare_military_escalation$#!, щоб отримати [ShowCasusBelliName('cb_religious_superiority')]\n@hint! Використавши її, ви можете нав'язати [ShowPeaceTreatyTypeName('religious_supremacy')], щоб задовольнити вимоги вашої фракції\n@arrow_bonus_tier_2! Використайте [situation] [action] #V $demand_member_removal$#!, щоб усунути небезпечні країни з іншої [international_organization] до початку [war]"
  hint_war_of_religions_hint_text_4: "#T Додаткові підказки:#!\n@hint! Під час [war] за [ShowCasusBelliName('cb_religious_superiority')] [Concept('countries] набудуть [war_exhaustion]\n@hint! Якщо #Y 80%#! всіх учасників прагнуть [peace', 'CONCEPT_PLACEHOLDER')|e], замість цього буде досягнуто #Y Вестфальського миру#!\n@hint! Це примусово завершить [war] та досягне релігійного миру всередині [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
  hint_guelphs_and_ghibellines: "[GetSituationByKey('guelphs_and_ghibellines').GetNameWithNoTooltip]"
  hint_guelphs_and_ghibellines_hint_text: "$hint_guelphs_and_ghibellines_hint_text_1$\n\n$hint_guelphs_and_ghibellines_hint_text_2$"
  hint_guelphs_and_ghibellines_hint_text_1: "Під час [ShowSituationNameWithNoTooltip('guelphs_and_ghibellines')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organizations_with_icon', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('guelphs_io').GetName] та [GetUniqueInternationalOrganization('ghibellines_io').GetName] змагаються за вплив над [Concept('region', 'CONCEPT_PLACEHOLDER')|e] [ShowRegionName('italy_region')] в ім'я [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle] ([GetUniqueInternationalOrganization('guelphs_io').GetName]) або [GetUniqueInternationalOrganization('hre').GetLeaderTitle] ([GetUniqueInternationalOrganization('ghibellines_io').GetName])."
  hint_guelphs_and_ghibellines_hint_text_2: "#T Якщо ви є членом будь-якої сторони:#!\n@arrow_bonus_tier_3! Примусьте [Concept('country', 'CONCEPT_PLACEHOLDER')|e] приєднатися до вашої фракції за допомогою [ShowCasusBelliName('cb_gag_force_country_into_faction')] [Concept('casus_belli_with_icon', 'CONCEPT_PLACEHOLDER')|e]\n@arrow_bonus_tier_2! Допоможіть членам вашої фракції утримати їхній [Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e] за допомогою дипломатичних відносин, таких як [Concept('alliances_with_icon', 'CONCEPT_PLACEHOLDER')|e] або [Concept('guarantee_with_icon', 'CONCEPT_PLACEHOLDER')|e]\n@arrow_bonus_tier_2! Збільште [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] своєї [country]"
  hint_colonial_revolution: "[GetSituationByKey('colonial_revolution').GetNameWithNoTooltip]"
  hint_colonial_revolution_hint_text: "$hint_colonial_revolution_hint_text_1$\n\n$hint_colonial_revolution_text_2$\n\n$hint_colonial_revolution_text_3$"
  hint_colonial_revolution_hint_text_1: "Під час [ShowSituationNameWithNoTooltip('colonial_revolution')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e] колоніальні [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] світу борються за свою незалежність проти своїх [Concept('overlords', 'CONCEPT_PLACEHOLDER')|e]."
  hint_colonial_revolution_text_2: "#T Якщо ви колоніальна держава:#!\n@arrow_bonus_tier_3! Створіть колоніальну федерацію [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]\n@arrow_bonus_tier_2! Використайте [Concept('situation] [action', 'CONCEPT_PLACEHOLDER')|e] #V $seek_alliance_with_overlord_rival$#!, щоб отримати допомогу від інших [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]\n@arrow_bonus_tier_1! Якщо колоніальна федерація існує, розгляньте можливість приєднання до неї"
  hint_colonial_revolution_text_3: "#T Якщо ви [overlord]:#!\n@arrow_bonus_tier_3! Використайте [situation] [action] #V $establish_goods_act$#!, щоб отримати додаткові кошти\n@arrow_bonus_tier_2! Розгляньте можливість використання [situation] [action] #V $give_colony_representation$#!, якщо колонія стане нелояльною"
  hint_red_turban_rebellions: "[GetSituationByKey('red_turban_rebellions').GetNameWithNoTooltip]"
  hint_red_turban_rebellions_hint_text: "$hint_red_turban_rebellions_hint_text_1$\n\n$hint_red_turban_rebellions_hint_text_2$\n\n$hint_red_turban_rebellions_hint_text_3$"
  hint_red_turban_rebellions_hint_text_1: "[GetSituationByKey('red_turban_rebellions').GetName] спалахнули по всій території $china$! [GetCountry('CHI').GetName] втратили прихильність небес, нестабільність тепер панує в їхньому [GetCountry('CHI').GetFlavorRank]!"
  hint_red_turban_rebellions_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! [GetCountry('CHI').GetName] повинні прагнути нав'язати [ShowPeaceTreatyTypeName('rtr_rein_in_rebellion')] тим, хто прагне відокремитися від їхнього правління.\n@arrow_bonus_tier_2! [GetInternationalOrganizationType('red_turban_rebels').GetName] можуть [ShowPeaceTreatyTypeName('rtr_demand_occupied_territories')] проти [GetCountry('CHI').GetNameWithNoTooltip].\n@arrow_bonus_tier_1! [GetCountry('CHI').GetLongName] зазнаватимуть багатьох унікальних [Concept('events', 'CONCEPT_PLACEHOLDER')|e], оскільки їхні землі узурпуватимуться перспективними завойовниками."
  hint_red_turban_rebellions_hint_text_3: "#T Додаткові підказки:#!\n@hint! Ми можемо використовувати багато унікальних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e] на панелі [Concept('situation', 'CONCEPT_PLACEHOLDER')|e], щоб допомогти [Concept('integrate', 'CONCEPT_PLACEHOLDER')|e] завоювання та підтримувати високий [Concept('control', 'CONCEPT_PLACEHOLDER')|e]."
  hint_red_turban_rebellions_diplomatic: "\"Нескінченні війни залишають мало місця для порожніх розмов і дипломатії...\""
  hint_red_turban_rebellions_administrative: "\"Було б розумно належним чином використовувати дії ситуації. Це цінні інструменти, які допоможуть нам вийти переможцями.\""
  hint_red_turban_rebellions_military: "\"Тепер увесь $china$ знає, що ми тут!\""
  hint_rise_of_timur: "[GetSituationByKey('rise_of_timur').GetNameWithNoTooltip]"
  hint_rise_of_timur_hint_text: "$hint_rise_of_timur_hint_text_1$\n\n$hint_rise_of_timur_hint_text_2$\n\n$hint_rise_of_timur_hint_text_3$"
  hint_rise_of_timur_hint_text_1: "З глибин [ShowSubContinentName('central_asia')] з'являється бліде обличчя смерті у вигляді [GetCharacter('chg_timur_lame_borjigin').GetName] та його/її [GetCountry('TIM').GetFlavorRank]. Горе тим, хто чинитиме опір його/її завоюванням!"
  hint_rise_of_timur_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Поки [GetCharacter('chg_timur_lame_borjigin').GetName] живе, його/її [GetCountry('TIM').GetFlavorRank] отримуватиме вигоду від [ShowModifier('timmy_wants_to_play')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_2! Згаданий [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] дозволить [GetCharacter('chg_timur_lame_borjigin').GetShortNameWithNoTooltip] автоматично анексувати обложені [Concept('locations', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! [GetCountry('TIM').GetLongName] отримує доступ до унікальних [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e]."
  hint_rise_of_timur_hint_text_3: "#T Додаткові підказки:#!\n@hint! [GetCountry('TIM').GetName] може використовувати багато потужних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e] на панелі [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]."
  hint_rise_of_timur_diplomatic: "\"Можливо, з ордою можна домовитися?\""
  hint_rise_of_timur_administrative: "\"Розгляньмо можливість будівництва укріплень для захисту наших кордонів.\""
  hint_rise_of_timur_military: "[GetCountry('TIM').GetName] покладаються на могутнє військо пекельних вершників, історію завоювань та спрагу розкрити пащі й проковтнути всю [ShowContinentName('asia')]!\""
  hint_nanbokuchou: "[GetSituationByKey('nanbokuchou').GetNameWithNoTooltip]"
  hint_nanbokuchou_hint_text: "$hint_nanbokuchou_hint_text_1$\n\n$hint_nanbokuchou_hint_text_2$\n\n$hint_nanbokuchou_hint_text_3$"
  hint_nanbokuchou_hint_text_1: "[GetSituationByKey('nanbokuchou').GetName] – це [Concept('ситуація', 'CONCEPT_PLACEHOLDER')|e], що розділяє [ShowRegionName('japan_region')] на конкуруючі Імперські Двори, Північну та Південну лінії, кожна з яких прагне легітимності. Клани мусять обирати сторони, адже цей конфлікт переформує всю острівну державу."
  hint_nanbokuchou_hint_text_2: "#T Рекомендовані Дії:#!\n@arrow_bonus_tier_3! Використайте унікальний [ShowCasusBelliName('cb_nanbokuchou')] [Concept('казус_беллі', 'CONCEPT_PLACEHOLDER')|e], щоб вести війну за обраного вами Імперського претендента.\n@arrow_bonus_tier_2! Розширюйте вплив свого Клану за допомогою [ShowPeaceTreatyTypeName('peace_expand_clan_influence')], щоб захопити ворожі [Concept('локації', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Якщо здобудете перемогу, змусьте конкуруючий двір зректися престолу, використовуючи [ShowPeaceTreatyTypeNameWithNoTooltip('peace_nanbokuchou_force_imperial_abdication')] та забезпечте верховенство для свого обраного Імператора."
  hint_nanbokuchou_hint_text_3: "#T Додаткові Поради:#!\n@hint! Ретельний вибір часу є вирішальним. Менші Клани можуть використати конфлікт, щоб отримати перевагу над суперниками.\n@hint! Розгляньте баланс сил, перш ніж обирати сторону."
  hint_nanbokuchou_diplomatic: "\"Це більше, ніж війна мечів. Наш вибір претендента визначить нашу спадщину.\""
  hint_nanbokuchou_administrative: "\"Підтримання порядку, ставши на бік одного з дворів, є викликом, але це може надати нам неперевершений вплив на Імперську установу.\""
  hint_nanbokuchou_military: "\"Дійте рішуче та претендуйте на мантію легітимності, перш ніж наші суперники зможуть зміцнити свою владу.\""
  hint_sengoku: "[GetSituationByKey('sengoku').GetNameWithNoTooltip]"
  hint_sengoku_hint_text: "$hint_sengoku_hint_text_1$\n\n$hint_sengoku_hint_text_2$\n\n$hint_sengoku_hint_text_3$"
  hint_sengoku_hint_text_1: "[GetSituationByKey('sengoku').GetName] – це [Concept('ситуація', 'CONCEPT_PLACEHOLDER')|e], що огортає [ShowRegionName('japan_region')] майже постійною війною. Клани борються за верховенство, тоді як $JAPANESE_SHOGUNATE_LEADER_MALE$ намагається зберегти контроль над країною."
  hint_sengoku_hint_text_2: "#T Рекомендовані Дії:#!\n@arrow_bonus_tier_3! Ведіть війну з унікальним [ShowCasusBelliName('cb_sengoku')] [Concept('казус_беллі', 'CONCEPT_PLACEHOLDER')|e], щоб розширити свій Клан.\n@arrow_bonus_tier_2! Як $JAPANESE_SHOGUNATE_LEADER_MALE$, використовуйте [ShowGenericActionName('sengoku_revoke_clans_land')], щоб послабити надто великі Клани та [ShowGenericActionName('sengoku_limit_clans_autonomy')], щоб перетворити їх на [Concept('building_based', 'CONCEPT_PLACEHOLDER')|e] країни.\n@arrow_bonus_tier_1! Якщо ви є [Concept('building_based', 'CONCEPT_PLACEHOLDER')|e], ви можете проголосити незалежність та стати [Concept('location_based', 'CONCEPT_PLACEHOLDER')|e] за допомогою [ShowGenericActionName('sengoku_proclaim_clan_independence')]."
  hint_sengoku_hint_text_3: "#T Додаткові Поради:#!\n@hint! Баланс сил постійно змінюється. Шукайте можливості для удару по ослабленим Кланам.\n@hint! Як $JAPANESE_SHOGUNATE_LEADER_MALE$, зміцнення контролю на ранніх етапах значно полегшить об'єднання [ShowRegionName('japan_region')].\n@hint! Малі Клани можуть виграти, зіштовхуючи більших суперників один з одним до слушного моменту, щоб вирватися на волю."
  hint_sengoku_diplomatic: "\"Союзи швидко змінюватимуться. Обирайте друзів обережно, адже вони можуть стати ворогами завтра.\""
  hint_sengoku_administrative: "\"Потрібне сильне управління, щоб уберегти державу від падіння в хаос.\""
  hint_sengoku_military: "\"Це епоха меча. Бийте швидко та сильно, або будете поглинуті іншими.\""
  swift_end_string: "Як і у випадку будь-якої катастрофи, швидке завершення часто є найбажанішим, оскільки невирішені питання можуть призвести до небажаних наслідків."
  disaster_war_hint: "Варто пам'ятати, що деякі з наших сусідів не бажають перемир'я чи союзу під час наших бурхливих часів, оскільки вони шукають експансіоністські можливості за наш рахунок."
  hint_coup_attempt: "$coup_attempt$ Поради"
  hint_coup_attempt_hint_text: "$hint_coup_attempt_hint_text_1$\n\n$hint_coup_attempt_hint_text_2$\n\n$hint_coup_attempt_hint_text_3$"
  hint_coup_attempt_hint_text_1: "У нашому [Concept('двір', 'CONCEPT_PLACEHOLDER')|e] амбітні чоловіки та жінки прагнуть влади понад свої можливості, використовуючи незаконні методи, щоб посадити маріонеток на наш трон, диктувати [Concept('закони', 'CONCEPT_PLACEHOLDER')|e] та забезпечити [Concept('привілеї', 'CONCEPT_PLACEHOLDER')|e] для себе. Ця [Concept('катастрофа', 'CONCEPT_PLACEHOLDER')|e] триватиме, доки змовники не зникнуть, їхній лідер не захопить трон, або ми не досягнемо достатньої [Concept('легітимність', 'CONCEPT_PLACEHOLDER')|e]. $swift_end_string$"
  hint_coup_attempt_hint_text_2: "#T Рекомендовані Дії:#!\n@arrow_bonus_tier_3! Ми можемо обрати [ShowGenericActionName('conduct_investigation')]. Це може зайняти деякий час, але розкриє деяких змовників, наблизивши нас до очищення їхніх рядів.\n@arrow_bonus_tier_2! Підтримуйте високу [Concept('стабільність', 'CONCEPT_PLACEHOLDER')|e]. Чим вона вища, тим нижчим буде поріг необхідної [Concept('легітимність', 'CONCEPT_PLACEHOLDER')|e] для завершення цієї [Concept('катастрофа', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Якщо часи стануть більш відчайдушними, ми можемо обрати або [ShowGenericActionName('call_private_council')], або [ShowGenericActionName('execute_court_member')]. Перша дозволить нам покладатися на наші [Concept('стани', 'CONCEPT_PLACEHOLDER')|e], щоб викрити змовників в обмін на [Concept('привілеї', 'CONCEPT_PLACEHOLDER')|e] або [Concept('золото', 'CONCEPT_PLACEHOLDER')|e]. Остання [Concept('дія', 'CONCEPT_PLACEHOLDER')|e] дозволить нам стратити будь-якого [Concept('персонаж', 'CONCEPT_PLACEHOLDER')|e] у нашому [Concept('двір', 'CONCEPT_PLACEHOLDER')|e], якщо ми підозрюємо його у причетності до змови."
  hint_coup_attempt_hint_text_3: "#T Додаткові Поради:#!\n@hint! Ми можемо отримувати випадкові [Concept('події', 'CONCEPT_PLACEHOLDER')|e] під час цієї [Concept('катастрофа', 'CONCEPT_PLACEHOLDER')|e], які вказуватимуть на потенційних змовників. Було б мудро розглянути кожну з них та прийняти обґрунтоване рішення. Було б неоптимально, щоб наш найкращий [Concept('член_кабінету', 'CONCEPT_PLACEHOLDER')|e] втратив голову без причини."
  hint_coup_attempt_diplomatic: "\"Настав час підтвердити наші відносини з сусідніми [Concept('країни', 'CONCEPT_PLACEHOLDER')|e] та встановити міцний кордон. Останнє, що нам потрібно, це небезпека як ззовні, так і зсередини.\""
  hint_coup_attempt_administrative: "\"Один з інших радників може бути змовником. Ми можемо ніколи не дізнатися!\""
  hint_coup_attempt_military: "\"$disaster_war_hint$ Пам'ятайте, превентивний удар — це просто #italic несподіваний мирний договір#! доставлений дуже рішуче.\""
  hint_crisis_of_the_chinese_dynasty: "$crisis_of_the_chinese_dynasty$ Поради"
  hint_crisis_of_the_chinese_dynasty_hint_text: "$hint_crisis_of_the_chinese_dynasty_hint_text_1$\n\n$hint_crisis_of_the_chinese_dynasty_hint_text_2$"
  hint_crisis_of_the_chinese_dynasty_hint_text_1: "Небеса колись обдаровували нас світлом та процвітанням. Однак, останні події, голод та спустошення призвели до настання темної епохи для нашого правління над $china$. Ця [Concept('катастрофа', 'CONCEPT_PLACEHOLDER')|e] триватиме, доки ми або не подолаємо її шляхом постійних реформ нашої адміністрації, або не втратимо своє місце на чолі [GetUniqueInternationalOrganization('middle_kingdom').GetName]. $swift_end_string$"
  hint_crisis_of_the_chinese_dynasty_hint_text_2: "#T Рекомендовані Дії:#!\n@arrow_bonus_tier_3! Ми можемо обрати [ShowCabinetActionName('reform_taxation_system')] через наш [Concept('кабінет', 'CONCEPT_PLACEHOLDER')|e]. Це може зайняти деякий час, але воно направить нас на вірний шлях до завершення цієї [Concept('катастрофа', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_2! Підтримуйте високу [Concept('celestial_authority_gc', 'CONCEPT_PLACEHOLDER')|e]. Якщо вона досягне значення #G 90#! або вище, [Concept('катастрофа', 'CONCEPT_PLACEHOLDER')|e] завершиться мирно.\n@arrow_bonus_tier_1! [Concept('катастрофа', 'CONCEPT_PLACEHOLDER')|e] уможливлює багато нових [Concept('дії', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowGenericActionName('cmd_reform_the_cabinet')], [ShowGenericActionName('cmd_restore_stability')] та [ShowGenericActionName('cmd_strengthen_crown')]. Усі вони пропонують альтернативний спосіб позитивного завершення цього турбулентного періоду, якщо ми не зможемо підняти нашу [Concept('celestial_authority_gc', 'CONCEPT_PLACEHOLDER')|e] достатньо високо."
  hint_crisis_of_the_chinese_dynasty_diplomatic: "\"Настав час підтвердити наші відносини з [Concept('країни', 'CONCEPT_PLACEHOLDER')|e], які є частиною [GetUniqueInternationalOrganization('middle_kingdom').GetName], щоб забезпечити виживання цієї великої установи.\n\nБез почуттів поваги, що відрізняє людей від звірів?\""
  hint_crisis_of_the_chinese_dynasty_administrative: "\"Якщо ми вирішимо покласти край цій [Concept('катастрофа', 'CONCEPT_PLACEHOLDER')|e] шляхом реформування нашої адміністрації, було б мудро доручити ці монументальні завдання здібним [Concept('члени_кабінету', 'CONCEPT_PLACEHOLDER')|e].\n\nХто не буде заощаджувати, той мусить страждати.\""
  hint_crisis_of_the_chinese_dynasty_military: "\"$disaster_war_hint$\n\nУ розпал хаосу є також можливість!\""
  hint_war: "Війна"
  hint_war_hint_text: "$hint_war_hint_text_1$\n\n$hint_war_hint_text_2$\n\n$hint_war_hint_text_3$"
  hint_war_hint_text_1: "[Concept('війна', 'CONCEPT_PLACEHOLDER')|e] починається, коли [Concept('країна', 'CONCEPT_PLACEHOLDER')|e] оголошує війну, і закінчується, коли обидві сторони домовляються про [Concept('мирний_договір', 'CONCEPT_PLACEHOLDER')|e]. Кожна [Concept('війна] має двох [лідери_війни', 'CONCEPT_PLACEHOLDER')|e], але можуть бути й інші [Concept('союзники_війни', 'CONCEPT_PLACEHOLDER')|e]. [війна] закінчиться, коли два [лідери_війни] підпишуть [мирний_договір], але вторинні учасники можуть підписувати окремі [мирні_договори] з ворожим [лідер_війни]."
  hint_war_hint_text_2: "#T Рекомендовані Дії:#!\n@arrow_bonus_tier_3! Розгляньте можливість отримання [Concept('казус_беллі_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] перед оголошенням [Concept('війна]. Ми можемо попросити про це під час [парламент', 'CONCEPT_PLACEHOLDER')|e], або сфабрикувати його проти наших [Concept('суперники', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_3! Коли [Concept('війна] почнеться, зверніть увагу на [casus_belli] та її [військова_мета', 'CONCEPT_PLACEHOLDER')|e], оскільки це є важливим для отримання [Concept('військовий_рахунок_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] та забезпечення вигідного [Concept('мирний_договір_з_іконкою', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_3! Залежно від Casus belli, ми будемо отримувати [Concept('військовий_рахунок_з_іконкою', 'CONCEPT_PLACEHOLDER')|e] різними способами. Ось найпоширеніші джерела [Concept('військовий_рахунок]:\n @arrow_bonus_tier_1! Окупуйте ворожу [столиця_з_іконкою', 'CONCEPT_PLACEHOLDER')|e].\n @arrow_bonus_tier_1! Контролюйте заявлені [Concept('локації_з_іконкою].\n @arrow_bonus_tier_1! Окупуйте ворожі [фортеці_з_іконкою', 'CONCEPT_PLACEHOLDER')|e].\n @arrow_bonus_tier_1! Перемагайте ворожі [Concept('армії', 'CONCEPT_PLACEHOLDER')|e] у [Concept('битва].\n @arrow_bonus_tier_1! [блокада', 'CONCEPT_PLACEHOLDER')|e] ворожі [Concept('порти', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_3! Слідкуйте за нашим [Concept('виснаження_від_війни_з_іконкою', 'CONCEPT_PLACEHOLDER')|e], оскільки воно може суттєво перешкоджати як нашій економіці, так і нашій здатності вести війну."
  hint_war_hint_text_3: "#T Додаткові Поради:#!\n@hint! Під час [Concept('війна] обидві сторони можуть [окупувати', 'CONCEPT_PLACEHOLDER')|e] ворожі [Concept('локації', 'CONCEPT_PLACEHOLDER')|e], але територія насправді не переходить з рук в руки, доки [Concept('мирний_договір', 'CONCEPT_PLACEHOLDER')|e] не ратифікує завоювання.\n@hint! Чим довше триває війна, тим охочіше залучені сторони погоджуватимуться на мирну пропозицію."
  hint_war_diplomatic: "\"Війна може бути найприбутковішою справою, але також швидким шляхом до катастрофи\""
  hint_war_administrative: "\"Коли торгівля не може забезпечити постачання життєво важливих ресурсів, війна стає майже неминучою.\""
  hint_war_military: "\"Єдиний спосіб гарантувати нашу безпеку — це перевершити наших сусідів.\""
  hint_battle: "Битви"
  hint_battle_hint_text: "$hint_battle_hint_text_1$\n\n$hint_battle_hint_text_2$\n\n$hint_battle_hint_text_3$"
  hint_battle_hint_text_1: "Коли [Concept('армія', 'CONCEPT_PLACEHOLDER')|e] опиняється в тій самій [Concept('локація', 'CONCEPT_PLACEHOLDER')|e], що й ворожа [Concept('армія], почнеться [битва', 'CONCEPT_PLACEHOLDER')|e]. Та [Concept('армія], що була першою в [локація], стане [захисник', 'CONCEPT_PLACEHOLDER')|e], і як така отримає переваги від модифікаторів місцевості. Битва закінчується, коли одна зі сторін втрачає всю свою [Concept('мораль', 'CONCEPT_PLACEHOLDER')|e] або всі свої [Concept('полки', 'CONCEPT_PLACEHOLDER')|e], що настане раніше."
  hint_battle_hint_text_2: "#T Рекомендовані Дії:#!\n@arrow_bonus_tier_3! Ви можете залучати сусідні армії для підкріплення поточних битв. Якщо вони прибудуть вчасно, то приєднаються до бою як свіжі резерви.\n@arrow_bonus_tier_2! Переконайтеся, що наші [Concept('армії', 'CONCEPT_PLACEHOLDER')|e] мають хорошого [Concept('командир', 'CONCEPT_PLACEHOLDER')|e] перед тим, як відправляти їх у [Concept('битва].\n@arrow_bonus_tier_2! Завжди зважайте на рельєф [локація]. [нападник', 'CONCEPT_PLACEHOLDER')|e] отримуватиме штрафи до своїх кидків кубиків залежно від топографії та рослинності локації. Обирайте поля битв ретельно!\n@arrow_bonus_tier_1! Іноді розумно наказати своєчасний [Concept('відступ', 'CONCEPT_PLACEHOLDER')|e], перш ніж наші війська будуть знищені переважною силою противника."
  hint_battle_hint_text_3: "#T Додаткові Поради:#!\n@hint! Програш битви не обов'язково означає кінець [Concept('війна', 'CONCEPT_PLACEHOLDER')|e]. Після поразки ви можете [відступити] в безпечне місце, відновити мораль, можливо, найняти найманців і спробувати знову в більш сприятливих умовах (і ваш ворог теж! Не поспішайте святкувати перемогу).\n@hint! Якщо [Concept('локація] має [форт', 'CONCEPT_PLACEHOLDER')|e], контролер форту завжди буде [захисник] у цій локації, незалежно від того, хто прибуде першим."
  hint_battle_diplomatic: "\"Нехай наші вороги загинуть від виснаження та голоду, перш ніж ми вступимо з ними в бій.\""
  hint_battle_administrative: "\"Швидка перемога на полі бою дозволить нам перейти в наступ, не піддаючи наші міста та містечка ворожому спустошенню.\""
  hint_battle_military: "\"Хороший генерал може вирішити результат битви.\""
  hint_siege_and_occupation: "Окупація та облоги"
  hint_siege_and_occupation_hint_text: "$hint_siege_and_occupation_hint_text_1$\n\n$hint_siege_and_occupation_hint_text_2$\n\n$hint_siege_and_occupation_hint_text_3$"
  hint_siege_and_occupation_hint_text_1: "Коли [Concept('армія', 'CONCEPT_PLACEHOLDER')|e] ступає на [Concept('ворожу', 'CONCEPT_PLACEHOLDER')|e] [Concept('територію', 'CONCEPT_PLACEHOLDER')|e], вона намагається її [Concept('окупувати', 'CONCEPT_PLACEHOLDER')|e]. Якщо [Concept('територія] не має [форту', 'CONCEPT_PLACEHOLDER')|e], її буде окуповано за кілька днів. Проте, за наявності форту, розпочнеться [Concept('облога', 'CONCEPT_PLACEHOLDER')|e].\n\nОблоги можуть тривати місяцями або навіть роками, залежно від багатьох чинників, таких як рівень укріплень, наявність артилерії, [Concept('здібності', 'CONCEPT_PLACEHOLDER')|e] облогового [Concept('генерала', 'CONCEPT_PLACEHOLDER')|e] тощо.\n\nКоли гарнізон здається, [територія] стає [окупованою], а [форт] залишається під контролем переможця.\n\nОкуповані території позначаються на мапі перехресними смугами та не належать окупанту, доки завоювання не буде ратифіковано в мирному договорі."
  hint_siege_and_occupation_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Перш ніж розпочати облогу, переконайтеся, що [Concept('армія', 'CONCEPT_PLACEHOLDER')|e] зможе її витримати.\n@arrow_bonus_tier_1! Не бійтеся відступати з облоги, якщо наближається небезпечна ворожа армія."
  hint_siege_and_occupation_hint_text_3: "#T Додаткові підказки:#!\n@hint! Слідкуйте за своїми арміями під час облоги, навіть якщо ворожих армій наразі немає."
  hint_siege_and_occupation_diplomatic: "\"Затяжна облога може виявитися фатальною для місцевого населення та процвітання.\""
  hint_siege_and_occupation_administrative: "\"Ми повинні розташувати наші форти так, щоб наші головні міста були захищені від загарбників і могли бути швидко визволені у випадку ворожої облоги.\""
  hint_siege_and_occupation_military: "\"Облога та захист ключових позицій, таких як гірські перевали, можуть бути вирішальними для перемоги у війні.\""
  hint_lacks_of_rivals: "Можливі суперники"
  hint_lacks_of_rivals_hint_text: "$hint_lacks_of_rivals_hint_text_1$\n\n$hint_lacks_of_rivals_hint_text_2$\n\n$hint_lacks_of_rivals_hint_text_3$"
  hint_lacks_of_rivals_hint_text_1: "[Concept('Суперники', 'CONCEPT_PLACEHOLDER')|e] – це [Concept('країни', 'CONCEPT_PLACEHOLDER')|e], які ми публічно оголошуємо ворожими до наших інтересів. Мета суперництва подвійна: як дипломатичний інструмент, оголошення суперників допомагає нам заводити друзів з їхніми ворогами. Як наступальний інструмент, ми можемо фабрикувати [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти наших [Concept('суперників] і втручатися в [війни', 'CONCEPT_PLACEHOLDER')|e] проти них."
  hint_lacks_of_rivals_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Спостерігайте за суперництвом та [Concept('союзами', 'CONCEPT_PLACEHOLDER')|e] наших сусідів, і обирайте тих самих суперників, що й країна, з якою ви хочете укласти союз. Але остерігайтеся, щоб при цьому не нажити надто могутніх ворогів.\n@arrow_bonus_tier_2! Ви можете почекати, поки інші [Concept('країни] оголосять своїх [суперників], перш ніж робити свій хід. Таким чином ви уникнете роздратування невідповідних [країн].\n\n@arrow_bonus_tier_2! Створіть [шпигунську_мережу', 'CONCEPT_PLACEHOLDER')|e] у наших [Concept('суперників], щоб сфабрикувати [casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти них."
  hint_lacks_of_rivals_hint_text_3: "#T Додаткові підказки:#!\n@hint! Вам не потрібно оголошувати всіх доступних суперників. Пам'ятайте, що ви можете клацнути правою кнопкою миші на #W Сповіщення!#, щоб відхилити його.\n@hint! Наявність суперників також дозволить вам бути покликаним до їхніх війн на протилежному боці. Але будьте обережні: наші [Concept('вороги_суперників', 'CONCEPT_PLACEHOLDER')|e] також зможуть втручатися в наші."
  hint_lacks_of_rivals_diplomatic: "\"Наживати зайвих ворогів ніколи не варто, але оголошення тих самих суперників, що й наші сусіди, може допомогти нам укласти з ними союз.\""
  hint_lacks_of_rivals_administrative: "\"Вороги наших суперників повинні бути нашими друзями.\""
  hint_lacks_of_rivals_military: "\"Наявність відповідних суперників пропонує безліч можливостей для тих, хто достатньо сміливий, щоб ними скористатися.\""
  hint_control: "Близькість і Контроль"
  hint_control_hint_text: "$hint_control_hint_text_1$\n\n$hint_control_hint_text_2$\n\n$hint_control_hint_text_3$"
  hint_control_hint_text_1: "[Concept('control_icon] [Контроль', 'CONCEPT_PLACEHOLDER')|e] є одним із найважливіших атрибутів наших [Concept('location_icon] [територій', 'CONCEPT_PLACEHOLDER')|e]. Він визначає відсоток [Concept('taxes_icon] [податкової_бази', 'CONCEPT_PLACEHOLDER')|e] та [Concept('levies_icon] [військового_стягнення', 'CONCEPT_PLACEHOLDER')|e], які ми або наші [Concept('estates_icon] [стани', 'CONCEPT_PLACEHOLDER')|e] можуть ефективно використовувати. [Concept('Територія] може мати багато [building_icon] [будівель', 'CONCEPT_PLACEHOLDER')|e] та високу [Concept('population_icon] [населеність', 'CONCEPT_PLACEHOLDER')|e], але вони не принесуть користі нікому, якщо в [Concept('території] не буде певного [контролю].\n\nКонтроль території щомісяця змінюється до [максимального_контролю', 'CONCEPT_PLACEHOLDER')|e]. [Concept('Облога', 'CONCEPT_PLACEHOLDER')|e] або інші події можуть тимчасово його знизити, але територія зрештою повернеться до свого максимального значення.\n\nОсновним джерелом [Concept('максимального_контролю] є [proximity_icon] [близькість', 'CONCEPT_PLACEHOLDER')|e]. Наша [Concept('capital_icon] [столиця', 'CONCEPT_PLACEHOLDER')|e] завжди матиме #W 100%#! Близькості, а всі інші території розраховують свою близькість залежно від відстані до столиці. Близькість може поширюватися по суші та морю, і це відбувається ефективніше вздовж [Concept('road_icon] [доріг', 'CONCEPT_PLACEHOLDER')|e], відкритої місцевості та [Concept('seazones_icon] [морських_зон', 'CONCEPT_PLACEHOLDER')|e] з високою [Concept('maritime_presence_icon] [морською_присутністю', 'CONCEPT_PLACEHOLDER')|e]; і менш ефективно через гори, ліси та [Concept('морські_зони], заражені [піратами', 'CONCEPT_PLACEHOLDER')|e]. Існують й інші фактори, які також впливають на Максимальний Контроль, такі як [Concept('задоволеність_населення', 'CONCEPT_PLACEHOLDER')|e], [Concept('статус_інтеграції', 'CONCEPT_PLACEHOLDER')|e] або деякі спеціальні [будівлі]."
  hint_control_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Зосередьте свої будівельні зусилля у нашій [Concept('столиці] та прилеглих [територіях], оскільки вони природно матимуть найвищий [контроль] з початку гри.\n@arrow_bonus_tier_2! Побудуйте [road_icon] [дороги', 'CONCEPT_PLACEHOLDER')|e] з #W Панелі розташування!#, щоб з'єднати нашу [Concept('столицю] з нашими найбагатшими містами.\n@arrow_bonus_tier_2! Території з [port_icon] [портом', 'CONCEPT_PLACEHOLDER')|e] можуть легше дістатися до [Concept('столиці] морем, особливо якщо вони мають високу [пропускну_спроможність_порту', 'CONCEPT_PLACEHOLDER')|e]. Ви можете збільшити її в наших ключових прибережних [територіях] за допомогою [будівель], таких як [ShowBuildingTypeName('wharf')] або [ShowBuildingTypeName('dock')].\n@arrow_bonus_tier_1! Ново [Concept('завойовані', 'CONCEPT_PLACEHOLDER')|e] [Concept('території] почнуть з #W 0%#! [контролю] і можуть довго досягати свого максимуму. Ви можете прискорити цей процес, розмістивши [армію', 'CONCEPT_PLACEHOLDER')|e] на [території] або використовуючи [ShowCabinetActionName('increase_control_province')] [Concept('cabinet_action_icon] [кабінетну_дію', 'CONCEPT_PLACEHOLDER')|e]."
  hint_control_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('Територія] з #W 0%#! [контролю] не буде генерувати [gold_icon] [золото', 'CONCEPT_PLACEHOLDER')|e], але [Concept('товари', 'CONCEPT_PLACEHOLDER')|e], які вона виробляє, все одно досягнуть [Concept('market_icon] [ринку', 'CONCEPT_PLACEHOLDER')|e], тому ми все ще можемо захотіти розбудувати там важливі ресурси, щоб забезпечити достатній [Concept('постачання', 'CONCEPT_PLACEHOLDER')|e].\n@hint! [ShowPopTypeName('peasants')] [Concept('просуватимуться', 'CONCEPT_PLACEHOLDER')|e] значно швидше в [Concept('територіях] з високим [контролем], і тому нові [будівлі] швидше заповнять свої [вакансії', 'CONCEPT_PLACEHOLDER')|e].\n@hint! Ретельно плануйте нашу [дорожню] мережу: одна, добре розміщена [дорога], що перетинає гірський хребет, може покращити [близькість] багатьох [територій] на іншому боці."
  hint_control_diplomatic: "\"Високий Контроль допомагає навертати та асимілювати най... #italic безладніших#! членів нашого суспільства.\""
  hint_control_administrative: "\"Територія поза нашим контролем навряд чи принесе будь-які податки.\""
  hint_control_military: "\"Нам потрібно контролювати свою землю, якщо ми хочемо мобілізувати наше населення.\""
  hint_crown_power: "Влада Корони"
  hint_crown_power_hint_text: "$hint_crown_power_hint_text_1$\n\n$hint_crown_power_hint_text_2$\n\n$hint_crown_power_hint_text_3$"
  hint_crown_power_hint_text_1: "Наша [Concept('crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] представляє вплив нашого Уряду в межах наших власних кордонів. Як [ShowEstateTypeName('crown_estate')], ми ділимо ресурси нашої Країни з нашими [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e], чиї інтереси не завжди збігаються з нашими.\n\nВища Влада Корони полегшить ухвалення нових [Concept('laws_with_icon', 'CONCEPT_PLACEHOLDER')|e], покращить ефективність нашого [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e] та збільшить нашу базову підтримку в [Concept('parliament_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Можливо, що ще важливіше, Влада Корони визначає, наскільки Держава ділиться прибутками та витратами від [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e] зі [Concept('станами].\n\nНаша Влада Корони насамперед залежатиме від кількості [privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e], наданих [Concept('станам], та [control_with_icon', 'CONCEPT_PLACEHOLDER')|e] наших найбільш населених [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_crown_power_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Збільште Контроль у наших [Concept('територіях], будуючи [roads_with_icon', 'CONCEPT_PLACEHOLDER')|e] від [Concept('capital_with_icon', 'CONCEPT_PLACEHOLDER')|e]. \n@arrow_bonus_tier_2! Скасовуйте [Concept('привілеї] у наших наймогутніших [станів], коли у нас висока [stability_with_icon', 'CONCEPT_PLACEHOLDER')|e], але стежте за їхньою [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e]. Розлючений [стан] може віщувати проблеми на горизонті.\n@arrow_bonus_tier_1! Збільште [Localize(Player.GetGovernment.GetGovernmentType.GetPowerConcept)] за допомогою [ShowCabinetActionName('strengthen_government')] [Concept('cabinet_action_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Побудуйте [ShowBuildingTypeName('royal_court')] або [ShowBuildingTypeName('sergeantry')] у [столиці]."
  hint_crown_power_hint_text_3: "#T Додаткові підказки:#!\n@hint! При 50% Влади Корони, половина витрат та прибутків від [Concept('торгівлі] та [їжі] надходитиме безпосередньо до [treasury_with_icon', 'CONCEPT_PLACEHOLDER')|e], тоді як інша половина розподілятиметься між [Concept('станами] відповідно до їхньої [estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@hint! Влада Корони зазвичай дуже низька на початку гри, особливо для більших [Concept('країн].\n@hint! Майбутні [advances_with_icon', 'CONCEPT_PLACEHOLDER')|e] розблокують додаткові [будівлі] та інші бонуси до вашої [crown_power]."
  hint_crown_power_diplomatic: "\"Поки наша Влада Корони низька, ми залишаємося на милості наших Станів.\""
  hint_crown_power_administrative: "\"Збільшення нашої Влади Корони допомогло б нам пожинати плоди Торгівлі.\""
  hint_crown_power_military: "\"Централізована Держава може досягати значно більшого, ніж її розмір.\""
  hint_estates: "Стани"
  hint_estates_hint_text: "$hint_estates_hint_text_1$\n\n$hint_estates_hint_text_2$\n\n$hint_estates_hint_text_3$"
  hint_estates_hint_text_1: "Стани є представництвом особливих інтересів у наших кордонах. Кожен Стан має відсоток [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e], який вимірює їхню владу порівняно з іншими Станами та [ShowEstateTypeName('crown_estate')] у розподілі з нульовою сумою.\n\nСтани отримують свою владу насамперед від [Concept('population_with_icon', 'CONCEPT_PLACEHOLDER')|e], причому кожен [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e] підтримує певний [Concept('стан]. Влада Стану додатково змінюється наявними [laws_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nВлада Стану визначає їхню владу в [Concept('parliament_with_icon', 'CONCEPT_PLACEHOLDER')|e], впливає на те, скільки ви можете їх [Concept('оподатковувати', 'CONCEPT_PLACEHOLDER')|e], і диктує, як розподіляються прибутки та витрати від [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nСтани також мають рівень [Concept('estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e], що вимірює їхню відповідність нашому Уряду. Кожен Стан надає різний позитивний модифікатор, коли їхнє задоволення високе, і штраф, коли воно нижче #W 50%#!. Коли [Concept('estate_satisfaction] Стану занадто низьке, їхні складові [популяції', 'CONCEPT_PLACEHOLDER')|e] можуть почати розпалювати [Concept('rebellions_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Найбільш тривожно те, що Стан з задоволенням нижче #W 25%#! припинить надавати [Concept('levies_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_estates_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! [Concept('Податки', 'CONCEPT_PLACEHOLDER')|e], зібрані зі [Concept('станів], є основним джерелом [доходу', 'CONCEPT_PLACEHOLDER')|e] для більшості [Concept('країн]. Ви можете встановлювати або автоматизувати податки з @economy_panel! #W Панелі бюджету#!.\n@arrow_bonus_tier_2! Будь-яка влада, яку тримають Стани, відбувається за рахунок нашої [crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Ви можете підірвати їхню владу, скасувавши їхні [Concept('privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e] з @government_panel! #W Вкладки Станів#!.\n@arrow_bonus_tier_1! Ви можете заспокоїти бунтівний Стан, знизивши [податки], надавши [привілей] або підкупивши їх з @government_panel! #W Вкладки Станів#!."
  hint_estates_hint_text_3: "#T Додаткові підказки:#!\n@hint! Стани збирають всю [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] з наших [Concept('територій', 'CONCEPT_PLACEHOLDER')|e], і ми отримуємо лише стільки, скільки ми з них [Concept('оподатковуємо].\n@hint! [Країни] на ранній стадії гри дуже залежать від [levies_with_icon', 'CONCEPT_PLACEHOLDER')|e], наданих [Concept('станами], для ведення своїх [wars_with_icon', 'CONCEPT_PLACEHOLDER')|e], поки вони не почнуть замінюватися більш сучасними [Concept('regular_regiments_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_estates_diplomatic: "\"Сильне Духовенство покращує стабільність королівства.\""
  hint_estates_administrative: "\"Сильний Стан Міщан додає багатства нашій нації та обсягу нашої торгівлі.\""
  hint_estates_military: "\"Сильне Дворянство збільшує розмір та могутність наших армій.\""
  hint_markets: "Ринки"
  hint_markets_hint_text: "$hint_markets_hint_text_1$\n\n$hint_markets_hint_text_2$\n\n$hint_markets_hint_text_3$"
  hint_markets_hint_text_1: "[Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e] є серцем економіки в #italic Europa Universalis V#!. Всі Локації належать до Ринку, де вони продають і купують товари, необхідні для [Concept('pop_needs', 'CONCEPT_PLACEHOLDER')|e], [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] і [Concept('constructions', 'CONCEPT_PLACEHOLDER')|e]. Продаючи товари на своєму Ринку, Локації генерують [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] для [Concept('estates', 'CONCEPT_PLACEHOLDER')|e], які, своєю чергою, можуть бути зібрані Урядом у вигляді [Concept('taxes', 'CONCEPT_PLACEHOLDER')|e]."
  hint_markets_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Перейдіть до @economy_panel![Link('trade', 'subtab = markets', 'Панелі Ринки')], щоб переглянути наші відповідні Ринки. Ринки із #G Зеленим#! заголовком містять наші [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] (володіння), тоді як Ринки із Синіми заголовками – це Ринки, де ми маємо [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e], але не [Concept('володіємо] жодною [локацією].\n@arrow_bonus_tier_3! Вам радиться автоматизувати кожен окремий [ринок], натиснувши на @automation! #W Іконку шестерні#!. Це забезпечить постійне використання всієї нашої [merchant_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e] на найцікавіших [Concept('merchants_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_2! Будуйте [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], такі як [ShowBuildingTypeName('marketplace')] та [ShowBuildingTypeName('trade_office')], щоб збільшити нашу [Concept('merchant_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e] на Ринку."
  hint_markets_hint_text_3: "#T Додаткові підказки:#!\n@hint! Кордони Ринків динамічні: [Concept('локації] потраплятимуть під [ринок] з найвищим [market_attraction_with_icon', 'CONCEPT_PLACEHOLDER')|e] на їхній території, навіть якщо це іноземний Ринок. [Concept('Market_attraction] іноземних Ринків може бути нівельована [protectionism_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_markets_diplomatic: "\"Невидима Рука – мудрий пан, але іноді потребує трохи керівництва.\""
  hint_markets_administrative: "\"Це ж економіка, дурню!\""
  hint_markets_military: "\"Зростання наших Ринков – це добре.\nЗавоювання сусідніх Ринков – ще краще.\""
  hint_food: "Їжа"
  hint_food_hint_text: "$hint_food_hint_text_1$\n\n$hint_food_hint_text_2$\n\n$hint_food_hint_text_3$"
  hint_food_hint_text_1: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] потребують [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e] для життя, а [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] потребують [Concept('food] для маршу. Обидві фракції отримують необхідну [food] зі Сховища [province_with_icon', 'CONCEPT_PLACEHOLDER')|e], де вони перебувають (а не з [location]!). Якщо [Concept('food] недостатньо, [pops] страждатимуть від [starvation', 'CONCEPT_PLACEHOLDER')|e], а [Concept('armies] — від [attrition', 'CONCEPT_PLACEHOLDER')|e].\n\nІснує 3 рівні, залучені до виробництва та розподілу $game_concept_food$:\n\n@location! [Concept('local_food', 'CONCEPT_PLACEHOLDER')|e]:\n$game_concept_food$ виробляється переважно в тих [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], де [Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e] є їхнім [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e], як-от [ShowGoodsName('livestock')]. Будь-який надлишок або дефіцит, який може мати [Concept('location], додається до $game_concept_provincial_food$.\n\n@province! [provincial_food', 'CONCEPT_PLACEHOLDER')|e]:\n$game_concept_provincial_food$ є найважливішим рівнем. Якщо [Concept('province', 'CONCEPT_PLACEHOLDER')|e] не виробляє достатньо $game_concept_food$ для підтримки споживання всіх своїх $game_concept_locations$, провінційне сховище зменшиться. Коли воно вичерпається, всі $game_concept_locations$ у межах $game_concept_province$ страждатимуть від [Concept('starvation', 'CONCEPT_PLACEHOLDER')|e]. Але перш ніж це станеться, $game_concept_province$ спробує [Concept('buy_food', 'CONCEPT_PLACEHOLDER')|e] зі свого $game_concept_market$.\n\n@market! [Concept('market_food', 'CONCEPT_PLACEHOLDER')|e]:\nВсі $game_concept_provinces$ на [Concept('market', 'CONCEPT_PLACEHOLDER')|e] намагатимуться [Concept('sell_food', 'CONCEPT_PLACEHOLDER')|e], коли їхнє сховище повне, і намагатимуться [buy_food], коли воно низьке. Доки в $game_concept_market$ є достатньо $game_concept_food$, ніхто не буде голодувати."
  hint_food_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Перейдіть на @economy_panel![Link('trade', 'subtab = markets', 'Панель ринків')], щоб переглянути наші відповідні Ринки. Ринки із #G Зеленим#! заголовком містять наші [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [locations], тому нам потрібно переконатися, що їхній баланс [food] залишається позитивним. Якщо [food] швидко зменшується на будь-якому з наших Ринків, ви побачите Жовтий банер. Якщо є голодуючі [locations], ви побачите Червоний банер.\n@arrow_bonus_tier_3! Щоб збільшити виробництво їжі на будь-якому з наших Ринків, натисніть кнопку «Їжа», щоб перейти на @production_panel![Link('food_production', '', 'lateralview_food_production_entry_name')]. Звідти ви можете побачити, які з наших [Concept('provinces] перебувають під загрозою [starvation], і розширити їхній [rgo].\n@arrow_bonus_tier_3! Розширюйте [rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] у локаціях з найкращими [food_raw_materials], як-от [ShowGoodsName('rice')] або [ShowGoodsName('wheat')], та високою [Concept('food_productivity_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_1! Ми також можемо використовувати [Concept('merchant_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e] для імпорту [Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e] з інших [markets], що також перемістить еквівалентну кількість [food]. Ви можете зробити це з @economy_panel![Link('trade', 'subtab = trades', 'lateralview_trade_entry_name')]."
  hint_food_hint_text_3: "#T Додаткові підказки:#!\n@hint! Виробництво їжі зменшується впродовж [Concept('winter_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Не панікуйте, якщо побачите, що всі наші Ринки на кілька місяців переходять у негатив.\n@hint! [provinces|U] з дефіцитом купуватимуть надлишки ваших найпродуктивніших Провінцій, якщо вони належать до того ж Ринку, тому зазвичай найкраще розширювати продовольчі товари в [Concept('locations] з найвищою [food_productivity].\n@hint! [town_or_city', 'CONCEPT_PLACEHOLDER')|e] зазвичай менш ефективні, ніж [Concept('rural_locations', 'CONCEPT_PLACEHOLDER')|e] у виробництві [food]."
  hint_food_diplomatic: "«Тривалий голод може призвести до знищення нашого населення та падіння нашої нації.»"
  hint_food_administrative: "«Голод – це переважно питання перспективи. Це не так вже й погано, якщо ти той, хто продає їжу.»"
  hint_food_military: "«Армія крокує на своєму шлунку.»"
  hint_maritime: "Морська присутність"
  hint_maritime_hint_text: "$hint_maritime_hint_text_1$\n\n$hint_maritime_hint_text_2$\n\n$hint_maritime_hint_text_3$"
  hint_maritime_hint_text_1: "[Concept('maritime_presence_with_icon', 'CONCEPT_PLACEHOLDER')|e] є дуже важливим показником, який зустрічається в прибережних [Concept('seazones_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Він здатний допомагати здійснювати [Concept('proximity_with_icon', 'CONCEPT_PLACEHOLDER')|e] вздовж наших узбереж або островів.\n\nКрім того, він надає [Concept('merchant_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e], до якого належить [Concept('seazones].\n\n[maritime_presence] здобувається пасивно через будівлі та через присутність [navy_with_icon', 'CONCEPT_PLACEHOLDER')|e], він має ефект затухання, але також може бути втрачений через [Concept('privateers_with_icon', 'CONCEPT_PLACEHOLDER')|e] або [Concept('blockade_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  hint_maritime_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Створюйте спеціалізовані [Concept('navies] з кораблями, що мають високий приріст [maritime_presence]. Потім ви можете розмістити їх в одній із ваших прибережних [seazones], і вони рівномірно розподілять свою [maritime_presence] по всіх [seazones], що належать до цієї самої [province_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@arrow_bonus_tier_3! Альтернативно, ви можете призначити їм [Concept('military_objective_with_icon', 'CONCEPT_PLACEHOLDER')|e] #V $MILITARY_OBJECTIVE_TYPE_NAME_patrol_the_seas$#!, що зробить те ж саме, але також автоматично пришвартує кораблі для ремонту, якщо це необхідно.\n@arrow_bonus_tier_1! [ShowBuildingTypeName('coastal_fort')] – дуже хороша будівля для використання!"
  hint_maritime_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('maritime_presence] поширюється лише на [province], де вони знаходяться, навіть якщо ціль встановлена для більш ніж 1 [provinces]. #V $MILITARY_OBJECTIVE_TYPE_NAME_patrol_the_seas$#! перемістить [navy], коли розташування [seazone] досягне 100 [maritime_presence].\n@hint! [privateers] працюють на рівні [area_with_icon', 'CONCEPT_PLACEHOLDER')|e] порівняно з [maritime_presence]."
  hint_maritime_diplomatic: "«Ми повинні скористатися перевагами нашого узбережжя, щоб покращити нашу торгівлю.»"
  hint_maritime_administrative: "«Чим безпечніше мореплавство, тим кращий зв'язок з нашим населенням.»"
  hint_maritime_military: "«З сильною морською присутністю пірати не наважаться чіпати наші торговельні шляхи.»"
  hint_slaves: "Раби"
  hint_slaves_hint_text: "$hint_slaves_hint_text_1$\n\n$hint_slaves_hint_text_2$\n\n$hint_slaves_hint_text_3$"
  hint_slaves_hint_text_1: "@slaves_goods! [ShowGoodsName('slaves_goods')] є найособливішим видом [Concept('good_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Як і будь-який інший [Concept('good], вони купуються та продаються на [markets_with_icon', 'CONCEPT_PLACEHOLDER')|e], а їхня ціна залежить від [Concept('supply', 'CONCEPT_PLACEHOLDER')|e] та [Concept('demand', 'CONCEPT_PLACEHOLDER')|e]. На відміну від будь-якого іншого [Concept('good], вони представляють фактичні [pops_with_icon', 'CONCEPT_PLACEHOLDER')|e], які переміщуються під час торгівлі [Concept('good].\n\nЯк [pop_type_with_icon', 'CONCEPT_PLACEHOLDER')|e], @slaves! [ShowPopTypeName('slaves')] можуть використовуватися як робоча сила в [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e] та рабських [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowBuildingTypeName('sugar_plantation')].\n\n[buildings], як-от [ShowBuildingTypeName('slave_market')], можуть перетворювати існуючих @slaves! [ShowPopTypeName('slaves')] на @slaves_goods![ShowGoodsName('slaves_goods')] [goods], які, своєю чергою, продаються на [market]. Потім [good] торгується як будь-який інший [good], а [buildings] можуть вимагати його як вхідний ресурс. Коли це відбувається, @slaves! [ShowPopTypeName('slaves')] будуть переміщені до [location] для роботи в [building]."
  hint_slaves_hint_text_2: "#T Рекомендовані дії:#! \n@arrow_bonus_tier_3! Під час заснування [Concept('colonies_with_icon', 'CONCEPT_PLACEHOLDER')|e] на іншому [Concept('continent', 'CONCEPT_PLACEHOLDER')|e], ви можете [Concept('trade_with_icon', 'CONCEPT_PLACEHOLDER')|e] рабами на ваші колоніальні [markets] для роботи на ваших плантаціях.\n@arrow_bonus_tier_2! Ви можете будувати [ShowBuildingTypeName('slave_center')] [Concept('buildings] в іноземних [locations] у межах вашого [trade_range_with_icon', 'CONCEPT_PLACEHOLDER')|e], щоб забезпечити стабільний потік рабів для торгівлі."
  hint_slaves_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] зазвичай поневолюються [buildings], такими як [ShowBuildingTypeName('slave_market')], хоча деякі [Concept('countries] мають спеціальні механізми, що дозволяють поневолення [pops] під час [war_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n@hint! [ShowReligionGroupName('christian')] дозволяє рабів лише в плантаційних [buildings], які розблоковуються в #V Епоху Відкриттів#! і можуть бути побудовані лише за морем."
  hint_slaves_diplomatic: "«Усі люди створені рівними, окрім деяких.»"
  hint_slaves_administrative: "«Нічого вартісного ніколи не було досягнуто без жертв багатьох.»"
  hint_slaves_military: "«Якщо вільної праці коли-небудь бракує, язичники можуть її забезпечити.»"
hint_eco: "Advanced Economy Advice"
hint_eco_hint_text: "$hint_eco_hint_text_1$\n\n$hint_eco_hint_text_2$\n\n$hint_eco_hint_text_3$"
hint_eco_hint_text_1: "Even if you can automate many aspects of your economy, there are still some actions that you need to do directly in order to move your [country] forward."
hint_eco_hint_text_2: "#T Recommended Actions:#!\n@arrow_bonus_tier_3! The best advice is always to try and reduce your [expenses_with_icon|e].\n\n@arrow_bonus_tier_3! As the player, you should concentrate on planning [towns_and_cities_with_icon|e] and [roads_with_icon|e]\n    Since [towns_and_cities_with_icon|e] reduce the amount of [rgo_with_icon|e] you can build, you want to urbanize the least valuable of your [rural_locations]. Those usually are:\n@sand![ShowGoodsName('sand')] @clay![ShowGoodsName('clay')] @horses![ShowGoodsName('horses')] @medicaments![ShowGoodsName('medicaments')] @wine![ShowGoodsName('wine')] @olives![ShowGoodsName('olives')] @millet![ShowGoodsName('millet')] @legumes![ShowGoodsName('legumes')] @fruit![ShowGoodsName('fruit')] @wild_game![ShowGoodsName('wild_game')] @beeswax![ShowGoodsName('beeswax')] \n\n@arrow_bonus_tier_3! Release [subjects_with_icon|e] on lands with low [control_with_icon|e], as they will propagate their own $game_concept_control$.\n    [annex_with_icon|e] your subjects once you have built up your infrastructure in the area.\n    [annexation_with_icon|e] speed is scaled by relative $game_concept_country$ size and [cultural_influence|e].\n\n@arrow_bonus_tier_2! Valuable [rgo_with_icon|e] are very good investment, especially if you also build up your [merchant_capacity_with_icon|e] to [export_with_icon|e] them.\n@goods_gold![ShowGoodsName('goods_gold')] @silver![ShowGoodsName('silver')] @gems![ShowGoodsName('gems')] @pearls![ShowGoodsName('pearls')] @amber![ShowGoodsName('amber')] @ivory![ShowGoodsName('ivory')] @pepper![ShowGoodsName('pepper')] @saffron![ShowGoodsName('saffron')] @chili![ShowGoodsName('chili')]\n\n@arrow_bonus_tier_2! [trade_income_with_icon|e] scales with [Link('hints', 'selected_hint = hint_crown_power', '@hint! Crown Power')] and is always good to increase by expanding [Link('hints', 'selected_hint = hint_increasing_trade_capacity', '@hint! Trade Capacity')], which contrary to [tax_base] does not scale down with [control]\n\n@arrow_bonus_tier_1! Keep industrial $game_concept_goods$ $game_concept_prices$ low! They will boost the profitability of $game_concept_towns_or_cities$ and make [buildings_with_icon|e] cheaper to maintain.\n@lumber![ShowGoodsName('lumber')] @masonry![ShowGoodsName('masonry')] @glass![ShowGoodsName('glass')] @iron![ShowGoodsName('iron')] @mercury![ShowGoodsName('mercury')] @steel![ShowGoodsName('steel')]\n\n@arrow_bonus_tier_1! $game_concept_buildings$ that do not have [production_method_with_icon|e] will have a[maintenance_with_icon|e] cost. It will fluctuate based on the $game_concept_price$ of the input $game_concept_goods$. Remember that [demand|e] from [buildings] will also stimulate the growth of your economy!"
hint_eco_hint_text_3: "#T Extra Hints:#!\n[Link('hints', 'selected_hint = hint_inflation', '@hint! Reducing inflation')]\n[Link('hints', 'selected_hint = hint_increasing_trade_capacity', '@hint! Increasing trade capacity')]\n[Link('hints', 'selected_hint = hint_control', '@hint! Increasing control')]"
hint_eco_diplomatic: "\"Sometimes coins offer the best laverage.\""
hint_eco_administrative: "\"Gold is the blood of nations.\""
hint_eco_military: "\"Income taken from others is the best kind of income.\""
hint_pol: "Advanced Politics Advice"
hint_pol_hint_text: "$hint_pol_hint_text_1$\n\n$hint_pol_hint_text_2$\n\n$hint_pol_hint_text_3$"
hint_pol_hint_text_1: "All [countries_with_icon|e] start with some disadvantages. Make sure to check [Link('government', 'tabcontent = estates', '@government_panel! $lateralview_government_entry_name$')] for [privileges_with_icon|e] and [laws_with_icon|e]. Those macro-changes can be tremendously helpful in the long term.\n\nDo not fear to change things up!"
hint_pol_hint_text_2: "#T Recommended Actions:#!\n@arrow_bonus_tier_3! Make sure that [estate_satisfaction_equilibrium_with_icon|e] is enough to [tax|e] [ShowEstateTypeName('burghers_estate')] and [ShowEstateTypeName('peasants_estate')] at max level without it going below #W 50%#!.\n\n@arrow_bonus_tier_3! Check [Link('societal_values', '', '@government_panel! Government Panel > Values')] to find out what [societal_values_with_icon|e] are worth pursuing. In general most advantegous are:\n$BULLET_WITH_TAB$[ShowSocietyDirectionName('capital_economy')]\n$BULLET_WITH_TAB$[ShowSocietyDirectionName('centralization')]\n\n@arrow_bonus_tier_3! Go through [laws_with_icon|e] to check what should be changed.\n    [parliament_with_icon|e] will allow for easy $game_concept_law$ changes and should be one of priorities early game\n    $game_concept_laws$ to watch out for at game start:\n    $BULLET_WITH_TAB$[ShowLawName('mining_law')]\n    $BULLET_WITH_TAB$[ShowLawName('precious_metal_distribution_law')]\n    $BULLET_WITH_TAB$[ShowLawName('distribution_of_power_law')]\n    $BULLET_WITH_TAB$[ShowLawName('administrative_system')]\n\n@arrow_bonus_tier_3! Go through assigned and available [privileges_with_icon|e] for every [estate_with_icon|e]. They are a tool to modify $game_concept_estate_satisfaction_equilibrium$ and $game_concept_societal_values$ drift.\n   [ShowEstateTypeName('nobles_estate')] should be given only enough to be loyal. Taking away $game_concept_estate_power$ from them is beneficial in the long term.\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('nobles_land_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('nobility_council')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('noble_serfdom_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('noble_sponsored_navy')]\n\n   [ShowEstateTypeName('clergy_estate')] should be given every positive $game_concept_privilege$ even if they cannot be taxed - each point of their $game_concept_estate_satisfaction$ beyond #W 50%#! provides bonus to [research_progress_with_icon|e]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('embellish_great_works_of_faith')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clergy_in_administration')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clergy_religious_state')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clerical_advisory_council')]\n\n   [ShowEstateTypeName('burghers_estate')] should be actively given as much positive $game_concept_privileges$ as possible. They are mostly positive, meanwhile increasing burghers [estate_power_with_icon|e] will lower it for other $game_concept_estates$. Furthermore each point of $game_concept_estate_satisfaction$ will raise [production_efficiency_with_icon|e]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('building_roads_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('market_fairs')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('building_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('allow_trade_center_sponsorship')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('commercial_advisory_council')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('control_over_the_coinage')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('guild_investments')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('land_of_commerce')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('urban_development_grants')]\n\n   [ShowEstateTypeName('peasants_estate')] $game_concept_privileges$ should give enough $game_concept_estate_satisfaction_equilibrium$ to allow for maximum $game_concept_tax$. It's important to keep in mind their drift towards [ShowSocietyDirectionName('decentralization')] as it's not ideal. Nevertheless Commoners will have low $game_concept_estate_power$ throughout the game, so cost for revocation will be low compared to other $game_concept_estates$\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_allowed_weapons_privilege')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('allow_hunting')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('no_labor_sunday')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_represented_in_parliament')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_fewer_levies')]\n\n@arrow_bonus_tier_2! Look for [government_reforms_with_icon|e] that would fit the $game_concept_societal_values$ you seek. Keep in mind that some bonuses, like [diplomatic_capacity|e], could allow to lower [diplomatic_maintenance|e].\n\n@arrow_bonus_tier_2! Some [cabinet_actions_with_icon|e] like [ShowCabinetActionName('stabilize_country')] or [ShowCabinetActionName('strengthen_government')] can allow lowering expenses, leaving you with more $game_concept_income$ leftover!"
hint_pol_hint_text_3: "#T Extra Hints:#!\n[Link('hints', 'selected_hint = hint_crown_power', '@hint! Crown power')]\n[Link('hints', 'selected_hint = hint_estates', '@hint! Estates')]"
hint_pol_diplomatic: "\"A shrewd ruler can make the most of every contingency\""
hint_pol_administrative: "\"Prosperous politics means prosperous businesses\""
hint_pol_military: "\"Our Estates are often worse than our enemies.\""
hint_mil: "Advanced Expansion Advice"
hint_mil_hint_text: "$hint_mil_hint_text_1$\n\n$hint_mil_hint_text_2$\n\n$hint_mil_hint_text_3$"
hint_mil_hint_text_1: "Two general advices: professional [armies_with_icon|e] (including [mercenaries|e]) will always beat similarly sized [levies_with_icon|e], and the best way to grow your $game_concept_army$ is to grow the economy."
hint_mil_hint_text_2: "#T Recommended Actions:#!\n@arrow_bonus_tier_3! Get the [ShowInstitutionName('professional_armies')] [institution|e] as soon as possible: getting [ShowAdvanceName('armory_advance')] quickly will allow to win previously impossible [wars_with_icon|e].\n\n@arrow_bonus_tier_3! [war_score_with_icon|e] from [battles|e] scales down with [ages|e]. At the beginning it's up to #W 50%#! making it easy to win [wars|e] with $game_concept_battles$ alone!\n\n@arrow_bonus_tier_3! Make sure to have access to strategic [goods_with_icon|e]. They are not needed in big amounts, but they are necessary to build up your [army|e] and [navy|e]: @tin![ShowGoodsName('tin')] @lead![ShowGoodsName('lead')] @copper![ShowGoodsName('copper')]\n\n@arrow_bonus_tier_3! $game_concept_armies$ only [reinforce_with_icon|e] in ally territory.\n\n@arrow_bonus_tier_3! [ShowUnitCategoryName('army_infantry')] is the main [battle|e] line. It's cheap and effective at absorbing [damage_taken|e], meanwhile [ShowUnitCategoryName('army_artillery')] cause vast damage to the frontline -  it's important that the frontline survives [bombard_phase_with_icon|e]\n\n@arrow_bonus_tier_2! Tracing a clear logistic line for your $game_concept_armies$ in [enemy_with_icon|e] territory is crucial. If your line gets cut the whole $game_concept_army$ could disappear due to [attrition|e]. You can use [ShowUnitCategoryName('army_auxiliary')] units to transport [food|e] to the frontline, or place [supply_depots|e] to help with logistics.\n\n@arrow_bonus_tier_1! [manpower_with_icon|e] [buildings|e] have the highest [maintenance_with_icon|e] cost in the game, so it is best to build those in [locations|e] with high [control|e].\n\n@arrow_bonus_tier_1! $game_concept_battles$ tipically last only a few days, so before pushing far be sure you can always $game_concept_reinforce$ in time."
hint_mil_hint_text_3: "#T Extra Hints:#!\n[Link('hints', 'selected_hint = hint_manpower', '@hint! Manpower')]\n[Link('hints', 'selected_hint = hint_sailors', '@hint! Sailors')]\n[Link('hints', 'selected_hint = hint_war', '@hint! War')]\n[Link('hints', 'selected_hint = hint_battle', '@hint! Battles')]\n[Link('hints', 'selected_hint = hint_siege_and_occupation', '@hint! Occupation and Sieges')]"
hint_mil_diplomatic: "\"Make other countries win your wars\""
hint_mil_administrative: "\"Attrition could lead to the decimation of any army\""
hint_mil_military: "\"Do not bring a knife to a gun fight\""
hint_holland: "Starting Advice for Holland"
hint_holland_hint_text: "The highly urbanized [locations] of the Low Countries make the [Player.GetLongName] a prime candidate to become a commercial powerhouse in Northern Europe.\n\n@hint! #T Build [ShowBuildingTypeName('marketplace')] buildings in every [ShowLocationRankName('town')]#!\nThe Trade Automation will use their [merchant_capacity_with_icon|e] to [import_with_icon|e] the [raw_materials_with_icon|e] that the [market_icon][Player.GetCapital.GetMarket.GetName] lacks, as well as to [export_with_icon|e] the surplus of [produced_goods_with_icon|e] from our Towns.\n\n@hint! #T Expand the textile industry#!\nThere is much profit to be made from exporting [ShowGoodsName('fine_cloth')]. Build the [ShowBuildingTypeName('cloth_guild')] and [ShowBuildingTypeName('fine_cloth_guild')] buildings, and consider importing [ShowGoodsName('wool')] from the [ShowLocationName('london')] Market if need be.\n\n@hint! #T Increase our [crown_power]#!\n[trade_income_with_icon|e] is divided among the [ShowEstateTypeName('crown_estate')] and the [estates_with_icon|e] according to their relative power. Keeping our [crown_power_with_icon|e] high will ensure a steady flow of [trade_income] into the [treasury|e]. You can learn more about [crown_power] in the [Link('hints', 'selected_hint = hint_crown_power', 'Crown Power Hint')].\n\n@hint! #T Mind the [food] supply#!\n[urban_locations|e] produce less [food_with_icon|e] than [rural_locations|e]. Keep an eye on the [food_stockpile_with_icon|e] of the [Player.GetCapital.GetMarket.GetName], and expand our [ShowGoodsName('fish')] and [ShowGoodsName('livestock')] [rgo_with_icon|e] if necessary. Our [budget] will suffer if [food] becomes too expensive.\n\n@hint! #T Placate our neighbors#!\nWe may be rich, but our modest size renders us vulnerable to foreign aggression. Use the $IMPROVE_RELATIONTITLE$ [diplomatic_action_with_icon|e] with our most threatening neighbors, especially [GetCountry('FRA').GetName] and [GetCountry('ENG').GetName]."
hint_holland_diplomatic: "$hint_advisor_salute_diplomatic$"
hint_holland_administrative: "$hint_advisor_salute_administrative$"
hint_holland_military: "$hint_advisor_salute_military$"
hint_hungary: "Starting Advice for Hungary"
hint_hungary_hint_text: "The [Player.GetLongName] starts in a privileged position as one of the main powers in the [region|e]. We have an [alliance_with_icon|e] with #W Poland#!, #W Bosnia#! is our [subject_with_icon|e], and #W Croatia#! is in a [personal_union_with_icon|e] under our [ruler_with_icon|e] [Player.GetGovernment.GetRuler.GetName]. That means we can focus on developing our [country|e] without worrying about external threats... at least for the time being.\n\n@hint! #T Build [roads] towards your mines#!\nThere are rich deposits of [ShowGoodsName('goods_gold')] and [ShowGoodsName('silver')] to the north of [capital_icon] [Player.GetCapital.GetName]. However, they are underbuilt, and in [locations] with low [control_with_icon|e]. We should seek to build [roads_with_icon|e] from [Player.GetCapital.GetNameWithNoTooltip] to those valuable mines, in order to increase our [proximity_with_icon|e], and therefore our [control].\n\n@hint!  #T Build Jewelry Guilds around your [capital]#!\nDue to the high supply, the price of [ShowGoodsNameWithNoTooltip('goods_gold')] and [ShowGoodsNameWithNoTooltip('silver')] inside the [market_icon] [Player.GetCapital.GetMarket.GetName] is extremely low. A [ShowBuildingTypeName('jewelry_guild')] will use [ShowGoodsNameWithNoTooltip('goods_gold')] and [ShowGoodsNameWithNoTooltip('silver')] to produce [ShowGoodsName('jewelry')], a very profitable crafted good, adding even more value to our mines in the process.\n\n@hint! #T Build [ShowBuildingTypeName('marketplace')] to export your surplus#!\nThe Automated [trade_with_icon|e] will [export_with_icon|e] any surplus of [goods_with_icon|e], such as [ShowGoodsNameWithNoTooltip('jewelry')], to other [markets_with_icon|e], which will create [trade_income_with_icon|e] and keep the entire production chain profitable.\n\n@hint! #T Revoke the [ShowPolicyName('gold_export_ban')]#!\nEurope craves our [ShowGoodsNameWithNoTooltip('goods_gold')], and exporting it directly would be a very profitable endeavor, but our current [ShowLawName('precious_metal_distribution_law')] [law|e] forbids it. Consider changing the [policy] during the next [parliament_with_icon|e]."
hint_hungary_diplomatic: "$hint_advisor_salute_diplomatic$"
hint_hungary_administrative: "$hint_advisor_salute_administrative$"
hint_hungary_military: "$hint_advisor_salute_military$"
hint_norway: "Starting Advice for Norway"
hint_norway_hint_text: "The [Player.GetLongName] is a vast [country|e], but our [control|e] outside our [capital|e] is nominal at best. We should expand our infrastructure, both maritime and landborne, to increase our [proximity|e] and harness the resources of the north.\n\n@hint! #T Build [roads] from our [capital] #!\nWe should aim to lay [roads_with_icon|e] from [capital_icon] [Player.GetCapital.GetName] to every nearby [ShowLocationRankName('town')] and valuable [rgo_with_icon|e], in order to increase our [proximity_with_icon|e] and [control_with_icon|e]. The [ShowGoodsName('silver')] mines west of [Player.GetCapital.GetNameWithNoTooltip] should be particularly profitable, with due investment. Check the [proximity] Map Mode frequently!\n\n@hint! #T Increase [maritime_presence] #!\nCarving [roads] through our mountainous hearthland can become a vain and expensive pursuit. With good [maritime_presence_with_icon|e] along our coastline, [proximity] could propagate much more efficiently by sea. Build [ShowBuildingTypeName('wharf')] and [ShowBuildingTypeName('dock')] in our Towns, and have fleets of [ShowUnitCategoryName('navy_light_ship')] patrolling our coasts, once we have researched the appropriate [advance_with_icon|e].\n\n@hint! #T Found Towns in good harbors close to our [capital]#!\nThe [proximity] of coastal [locations] is much improved by [natural_harbor_suitability_with_icon|e]. Check the $mapmode_natural_harbor_suitability_name$ Mapmode to look for our best natural ports.\n\n@hint! #T Expand our industries#!\nBuild [ShowBuildingTypeName('fine_cloth_guild')], [ShowBuildingTypeName('furniture_guild')], and [ShowBuildingTypeName('scriptorium')] in our Towns to process our natural resources, and build [ShowBuildingTypeName('marketplace')] to [export_with_icon|e] them to other [markets_with_icon|e].\n\n@hint! #T Strengthen the Union with Sweden #!\nOur [personal_union_with_icon|e] with [GetCountry('SWE').GetName] guarantees peace in our borders. We could strive for deeper integration with their country by enacting common [laws] in the [international_organization|e] Panel."
hint_norway_diplomatic: "$hint_advisor_salute_diplomatic$"
hint_norway_administrative: "$hint_advisor_salute_administrative$"
hint_norway_military: "$hint_advisor_salute_military$"
hint_naples: "Starting Advice for Naples"
hint_naples_hint_text: "As the biggest power in the [region|e], the [Player.GetLongName] is poised to dominate Italian trade and politics, while our [subjects|e] in Greece constitute a convenient foothold for external expansion.\n\n@hint! #T Build [roads] from our [capital] #!\nWe should aim to lay [roads_with_icon|e] from [capital_icon] [Player.GetCapital.GetName] to every nearby [ShowLocationRankName('town')] and valuable [rgo_with_icon|e], in order to increase our [proximity_with_icon|e], and therefore our [control_with_icon|e].\n\n@hint! #T Expand our extraction of [raw_materials]#!\nOur [country] contains valuable [raw_materials_with_icon|e] in abundance. [ShowGoodsName('wool')], [ShowGoodsName('fiber_crops')], and [ShowGoodsName('silk')] are not only very valuable by themselves, but they can also be used by our textile industries in [urban_locations|e]. Expand those [rgo_with_icon|e] as soon as possible, and prioritize increasing [control] there.\n\n@hint! #T Develop the textile industry #!\nBuild [ShowBuildingTypeName('cloth_guild')] and [ShowBuildingTypeName('fine_cloth_guild')] [buildings] in our [urban_locations]. They will use our [raw_materials] to produce expensive [produced_goods_with_icon|e], while the added demand will make our [rgo] even more profitable.\n\n@hint! #T Build [ShowBuildingTypeName('marketplace')] to export our surplus#!\nThe Automated [trade_with_icon|e] will [export_with_icon|e] any surplus of [goods|e], such as [ShowGoodsNameWithNoTooltip('fine_cloth')], to other [markets_with_icon|e], which will create [trade_income_with_icon|e] and keep the entire production chain profitable."
hint_naples_diplomatic: "$hint_advisor_salute_diplomatic$"
hint_naples_administrative: "$hint_advisor_salute_administrative$"
hint_naples_military: "$hint_advisor_salute_military$"
hint_castile: "Starting Advice for Castile"
hint_castile_hint_text: "As the dominant power of the [region|e], the [Player.GetLongName] stands on privileged grounds for unifying Iberia under one throne. However, our administration is already stretched thin, and our [control] in the south is so low it barely contributes to our [budget|e]. It would be wise to consolidate our [control] over our current territory before we embark on futher conquests.\n\n@hint! #T Build [roads] from our [capital] #!\n[locations] without [control_with_icon|e] are virtually useless to our administration. Build [roads_with_icon|e] and [ShowBuildingTypeName('bridge_infrastructure')] [buildings] from our [capital_with_icon|e] in order to increase our [proximity_with_icon|e], and therefore our [control]. Check the [proximity] Map Mode frequently!\n\n@hint! #T Subjugate [GetCountry('GRA').GetName]#!\nEven if we are not in a position to [own|e] their land very effectively, we could make [GetCountry('GRA').GetName] our [subject_with_icon|e]. They would rule the land on our behalf and pay monthly tribute into our [treasury]. We can consider [annexing_with_icon|e] them once our infrastructure and technology have develop enough to allow owning the land directly. In order to [annex] a [subject] we will need to have ruled over them for more than #Y 10#! years, and enjoy good relations with them.\n\n@hint! #T Plus Ultra#!\n[explorers_with_icon|e] tell of wealth beyond measure from their expeditions to India. However, embarking in such enterprises without the most modern [advances_with_icon|e] may prove a ludicrously expensive endeavor."
hint_castile_diplomatic: "$hint_advisor_salute_diplomatic$"
hint_castile_administrative: "$hint_advisor_salute_administrative$"
hint_castile_military: "$hint_advisor_salute_military$"
hint_ottomans: "Starting Advice for the Ottomans"
hint_ottomans_hint_text: "The impending Rise of the Turks [situation|e] will offer a unique opportunity for rapid expansion into Greece and Anatolia. Use the Situation [actions|e] to get a [casus_belli_with_icon|e] on our neighbors, and unleash our might upon them.\n\n@hint! #T Integrate our conquests #!\nNewly [conquered_with_icon|e] [locations] need to be [integrated_with_icon|e] into our administration via the [cabinet_with_icon|e] before we can reap any fruit from our conquests.\n\n@hint! #T Build [roads] from our [capital] #!\n[locations] without [control_with_icon|e] are virtually useless to our administration. Lay [roads_with_icon|e] from our [capital_with_icon|e] in order to increase our [proximity_with_icon|e], and therefore our [control]. Check the [proximity] Map Mode frequently!\n\n@hint! #T Create [subjects] to rule the conquered land#!\nAs you expand, you will come to conquer territories that lie far beyond the reach of our [proximity]. You are adviced to create [subjects_with_icon|e] to rule the land on our behalf until you can afford to administer it directly.\n\n@hint! #T Annex our [subjects] as [proximity] improves #!\nAs we develop our infrastructure and grow our [proximity], lands that were once barren to us become worth owning directly. In order to [annex_with_icon|e] a [subject] we will need to have ruled over them for more than #Y 10#! years, and enjoy good relations with them.\n\n@hint! #T Increase [maritime_presence] #!\nThe rough terrain of Greece and Anatolia makes projecting [proximity] by land difficult. With good [maritime_presence_with_icon|e] along our coastline, [proximity] could propagate much more efficiently by sea. Build [ShowBuildingTypeName('wharf')] and [ShowBuildingTypeName('dock')] in our Towns, and have [navies_with_icon|e] patrolling our coasts. This would be particularly important if we were to move our [capital] to [ShowLocationName('constantinople')]..."
hint_ottomans_diplomatic: "$hint_advisor_salute_diplomatic$"
hint_ottomans_administrative: "$hint_advisor_salute_administrative$"
hint_ottomans_military: "$hint_advisor_salute_military$"