  cb_trade_conflict: "Торговельний конфлікт"
  cb_tribal_feud: "Племінна ворожнеча"
  cb_sound_toll_exemptions_broken: "Порушення звільнення від зундського мита"
  cb_coalition: "Коаліція"
  cb_slave_raiding: "Набіги за рабами"
  cb_maritime_dominance: "Морське домінування"
  cb_destabilized_our_state: "Дестабілізована наша держава"
  cb_none_desc: "Справедливість — це не що інше, як інтерес сильнішого. Саме наша міць дає нам право підкорювати слабких. Вони не проситимуть і не очікуватимуть поблажливості, бо її не буде."
  cb_war_from_event_desc: "На жаль, події, що призвели до цієї ситуації, зробили конфлікт неминучим, проте сила досягне успіху там, де дипломатія зазнала невдачі. Ми захищатимемо наші ідеали мечем і переможемо наших лихих ворогів."
  cb_subject_broke_free_desc: "Один з наших підданих мав зухвалість повстати проти нашого правління, відкрито не підкоряючись нашим наказам та ображаючи нашу владу. Ми навчимо їх уроку смиренності та повернемо їх на їхнє місце під ярмом."
  cb_insulted_us_desc: "Вони самі накликали це на себе. Довго наш народ терпів їхню грубість і неповагу, і це більше не триватиме. Ми використаємо їхню кров, щоб змити їхню останню образу з нашої честі."
  cb_rebel_support_desc: "Ми дотримаємося наших угод і приєднаємося до наших братів у їхній боротьбі проти тиранії. Разом ми досягнемо успіху і нарешті принесемо мир та стабільність у регіон."
  cb_declined_call_to_arms_desc: "Нарешті настав час провчити цих боягузів. Ці клятвопорушники, які тікають до своїх домівок у нашу годину потреби, побачать, як вони горять, бо ми проллємо праведний гнів і справедливу помсту на їхні міста."
  cb_denied_military_access_desc: "Їхня необґрунтована близькість змусила нас діяти, якщо вони не дозволять безпечний прохід нашим військам через їхню землю, наші сили прокладуть шлях мечем і вогнем."
  cb_following_through_on_threat_desc: "Ми люди честі, наше слово — золото, і вони незабаром дізнаються, що ми не говоримо легковажно. Наші війська тепер навчать їх, що їм слід було дотримуватися наших пропозицій, коли ми їх надавали, і що йти проти наших бажань — це помилка, про яку вони незабаром пошкодують."
  cb_trade_war_triggered_desc: "Ми більше не терпітимемо їхньої ворожої комерційної діяльності. Ми захищатимемо інтереси наших купців та нашої економіки будь-якими необхідними засобами."
  cb_border_war_desc: "Час і хитрість призвели до того, що наші найвіддаленіші регіони потрапили під тиранічне правління нашого сусіда, але нарешті настав час виправити ситуацію та відновити контроль над усією землею, яка по праву належить нам."
  cb_religious_conformance_desc: "Релігійна відповідність наших сусідів має першочергове значення. Питання віри не слід сприймати легковажно, і тому ми повинні втрутитися, викорінюючи потенційні єресі та запобігаючи відхиленню нашої пастви від істинного шляху."
  cb_annex_desc: "Їхня країна підкориться нашій вищій силі, і ми анексуємо їх до нашого домену, якщо це буде необхідно, силою."
  cb_claim_throne_desc: "Можливість встановити нашого правителя на чолі іншої країни — це те, що ми не повинні упускати. Заявивши права на трон іноземної держави, ми розширимо наш домен і зміцнимо владу та вплив нашої династії."
  cb_coalition_desc: "Войовничість наших сусідів повинна бути приборкана, інакше ми ризикуємо стати жертвою їхніх експансіоністських тенденцій."
  cb_conquer_province_desc: "Землі під юрисдикцією наших сусідів по праву повинні належати нам, на основі міцної та законної претензії!"
  cb_parliament_conquer_province_desc: "$cb_conquer_province_desc$"
  cb_crusade_desc: "На наші плечі лягає обов'язок очолити вірних у успішному хрестовому поході проти наших язичницьких ворогів!"
  cb_jihad_desc: "На наші плечі лягає обов'язок очолити вірних у успішному джихаді проти невірних!"
  cb_deus_vult_desc: "Наша нація прагне бути втіленням релігійної покори та палкої віри. Тому ми не можемо дозволити, щоб наш загальний домен турбували єретики чи язичники."
  cb_disloyal_subject_desc: "Один з наших підданих сміє підняти погляд проти нашої влади, оскільки ми бажаємо зберегти наше верховенство, їх потрібно придушити і повернути до порядку."
  cb_disrupting_trade_desc: "Комерційна діяльність наших ворогів не може продовжувати антагонізувати та виснажувати наш дохід, це питання слід вирішити негайно."
  cb_exploration_desc: "Те, що лежить за нашими берегами, незабаром перестане бути таємницею. Ми повинні розширити наш вплив, щоб охопити народ, що живе за нашими берегами."
  cb_flower_wars_desc: "Підтримка нашої імперії та світу вимагає постійного потоку полонених. Лише через стан постійної війни ми можемо забезпечити собі доступ до такого постачання. Світ не може дозволити собі мир."
  cb_force_migration_desc: "Ми не можемо підтримувати процвітаючу громаду та ефективно експлуатувати землю, маючи місцеві племена навколо наших кордонів. Ми повинні змусити їх переселитися."
  cb_hegemon_desc: "Амбіції та престиж, пов'язані з буттям Гегемоном, повинні відповідати лише наймогутнішим націям. Усі схилять коліна перед нашою міццю та пишнотою!"
  cb_heretic_desc: "Спаліть єретиків! Згасіть їхні хибні світогляди в ім'я нашої віри!"
  cb_horde_vs_civ_desc: "Не може бути миру між племенами та поселенцями! Їхнє майно належить Орді!"
  cb_humiliate_desc: "Ми повинні нагадати їм про їхню неповноцінність порівняно з нами!"
  cb_humiliate_rival_desc: "Наші суперники вважають, що вони кращі за нас. Ми повинні фатально довести їхню неправоту!"
  cb_imperial_ban_desc: "Вони володіють Імперською Землею! Її необхідно звільнити від них!"
  cb_imperialism_desc: "Їм буде краще в нашій славетній імперії!"
  cb_independence_war_desc: "Дайте нам свободу, або дайте нам смерть!"
  cb_resist_annexation_desc: "Наш [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] почав [Concept('annex', 'CONCEPT_PLACEHOLDER')|e] нас! Ми повинні боротися з ними, поки не пізно і наша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] не припинила своє існування."
  cb_nationalist_desc: "Люди нашої культури перебувають під їхнім правлінням!"
  cb_push_back_colonizers_desc: "Ми повинні відкинути загарбників з нашої землі!"
  cb_sound_toll_exemptions_broken_desc: "Вони порушили звільнення від мита за прохід через Зунд!"
  cb_trade_conflict_desc: "Вони загрожують нашій торгівлі!"
  cb_tribal_feud_desc: "Наше Плем'я могутніше за їхнє Плем'я!"
  cb_slave_raiding_desc: "Ми повинні задовольнити нашу потребу в більшій кількості рабів для наших ринків!\n\nЩоразу, коли наші [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] захоплюють [Concept('location', 'CONCEPT_PLACEHOLDER')|e], частина [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] ставатиме [ShowPopTypeName('slaves')] в одній з наших сусідніх будівель [ShowBuildingTypeName('slave_market')]."
  cb_maritime_dominance_desc: "Вони загрожують нашій гегемонії на морі!"
  cb_destabilized_our_state_desc: "Через підступну та нечесну тактику наші вороги намагалися підірвати нашу владу над нашими підданими та спровокували повстання в наших кордонах! Заради безпеки нашого народу, справедливість повинна бути відновлена, а наші нещасні вороги повинні бути знищені!"
  cb_colonial_conflict: "Колоніальний конфлікт"
  cb_colonial_conflict_desc: "Ми хочемо захопити їхню колоніальну імперію, щоб збагатитися."
  cb_colony_war: "Колоніальна війна"
  cb_colony_war_desc: "Ми хочемо захопити більше Нового Світу."
  cb_hundred_years_war: "Завоювати Трон Франції"
  cb_hundred_years_war_desc: "Конфлікт щодо того, хто має правити Францією, може бути вирішений лише на полі бою."
  cb_hundred_years_war_fra: "Захистити Трон Франції"
  cb_hundred_years_war_fra_desc: "$cb_hundred_years_war_desc$"
  cb_crush_hussitism: "Придушити гуситство"
  cb_crush_hussitism_desc: "Сад нашої віри був заражений потужною новою сектою. Ми повинні швидко діяти та захистити наших вірян."
  cb_nanbokuchou: "$nanbokuchou$"
  cb_nanbokuchou_desc: "$nanbokuchou$ – це час конфліктів. Ми повинні скористатися ситуацією."
  cb_destroyed_building: "Зруйновані будівлі"
  cb_destroyed_building_desc: "Вони зруйнували наші будівлі й повинні за це заплатити!"
  cb_take_shogunate: "Захопити Сьогунат"
  cb_take_shogunate_desc: "Ми маємо право стати $JAPANESE_SHOGUNATE_LEADER_MALE$, тож візьмемо його."
  cb_sengoku: "$sengoku$"
  cb_sengoku_desc: "$sengoku$ занурює всю країну в постійні війни та конфлікти."
  cb_japanese_clan_expand_authority: "Розширити владу клану"
  cb_japanese_clan_expand_authority_desc: "Ми повинні розширити владу та вплив нашого клану."
  cb_japanese_clan_rebel_against_shogunate_authority: "Повстати проти влади $JAPANESE_SHOGUNATE_LEADER_MALE$"
  cb_japanese_clan_rebel_against_shogunate_authority_desc: "[GetUniqueInternationalOrganization('japanese_shogunate').GetName] надто сильно тисне своєю владою, настав час нам повстати проти неї."
  cb_shogunate_reassert_authority: "Відновити владу $JAPANESE_SHOGUNATE_LEADER_MALE$"
  cb_shogunate_reassert_authority_desc: "Багато кланів під нами не поважають нашу владу, як слід, настав час поставити їх на місце."
  cb_anti_piracy: "Антипіратська війна"
  cb_anti_piracy_desc: "Піратам, буканьєрам і корсарам не повинно бути пощади. Ми потопимо цих морських псів, які полюють на наших беззбройних купців і поширюють свій терор у наших водах."
  cb_high_kingship_overthrow: "Повалити Верховного Короля"
  cb_high_kingship_overthrow_desc: "Як великі воїни, Верховні Королі повинні вітати претендентів у війні, щоб довести свою власну гідність як захисників землі."
  cb_high_kingship_reclamation_PROV: "Повернути [PROVINCE.GetName] для [GetInternationalOrganizationType('high_kingship').GetName]"
  cb_high_kingship_reclamation: "Повернути землі Верховного Королівства"
  cb_high_kingship_reclamation_desc: "Верховні Королі є обраними захисниками земель королівства і повинні використовувати свою силу для повернення земель, захоплених зовнішніми силами."
  cb_high_kingship_subjugate: "Підкорити члена Верховного Королівства"
  cb_high_kingship_subjugate_desc: "Наше право як члена Високого Королівства підкоряти наших сусідів силою. Зрештою, вони вчинили б так само з нами."
  cb_excommunication: "Відлучений правитель"
  cb_excommunication_desc: "Їхнього правителя відлучено від церкви! Вони є ганьбою для Господа та Святого Престолу і мусять бути покарані!"
  cb_excommunication_PROV: "Божественні права на [PROVINCE.GetName]"
  cb_cut_down_in_size: "Зменшення розміру"
  cb_cut_down_in_size_desc: "Наші вороги стали надто могутніми, щоб їх ігнорувати. Ми повинні завдати рішучого та смертельного удару, перш ніж наші суперники зможуть спробувати помститися."
  cb_break_free_tatar_yoke: "Звільнитися від Татарського ярма"
  cb_break_free_tatar_yoke_desc: "Скидання [GetUniqueInternationalOrganization('tatar_yoke').GetName] послабить лещата [GetCountry('GLH').GetLongName] над руськими князівствами."
  cb_dissolve_tatar_yoke: "Розпустити Татарське ярмо"
  cb_dissolve_tatar_yoke_desc: "Демонтаж [GetUniqueInternationalOrganization('tatar_yoke').GetName] звільнить руські князівства. Скористаймося моментом і покладімо край пануванню [GetCountry('GLH').GetLongName]."
  tatar_yoke_dissolve_tt: "Розпускає [GetUniqueInternationalOrganization('tatar_yoke').GetName]"
  cb_native_subjugation: "Підкорення тубільців"
  cb_native_subjugation_desc: "Примусити [Concept('society_of_pops', 'CONCEPT_PLACEHOLDER')|e] прийняти наше правління!"
  cb_location_flip_on_occupation: "#Y Цей [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] дозволяє нам миттєво завойовувати [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [ShowSubContinentName('east_asia')] після окупації.#!\""
  cb_red_turban_rebellions: "$red_turban_rebellions$"
  cb_red_turban_rebellions_desc: "Тиранію $YUA$ терпіли досить довго! Настав час, щоб Китаєм знову правила [ShowCultureGroupName('chinese_group')]!\n\n#Y Дозволяє [ShowPeaceTreatyTypeName('rtr_rein_in_rebellion')] та [ShowPeaceTreatyTypeName('rtr_demand_occupied_territories')] [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]#!\""
  cb_red_turban_rebellions_rein_in_rebels: "Приборкати повстанців"
  cb_red_turban_rebellions_rein_in_rebels_desc: "Жалюгідні [GetUniqueInternationalOrganization('red_turban_rebels').GetName] мають нахабство повстати проти нашого правління. Їх треба приборкати!\n\n#Y Дозволяє [ShowPeaceTreatyTypeName('rtr_rein_in_rebellion')] та [ShowPeaceTreatyTypeName('rtr_demand_occupied_territories')] [Concept('peace_treaties', 'CONCEPT_PLACEHOLDER')|e]#!\""
  cb_red_turban_rebellions_against_other_rebels: "Регіональна перевага"
  cb_red_turban_rebellions_against_other_rebels_desc: "Ті самозванці вважають, що можуть правити Китаєм. Ми повинні навчити їх помилковості їхніх шляхів і завоювати їхню землю для себе!\n\n#Y Дозволяє [ShowPeaceTreatyTypeName('rtr_demand_complete_annexation')] [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]#!\""
  cb_league_of_public_weal: "Ліга суспільного блага"
  cb_league_of_public_weal_desc: "Влада Короля Франції стала надто могутньою! Ми повинні силою вимагати поступок від Короля, щоб забезпечити власну автономію."
  cb_gag_force_country_into_faction: "Примусити до нашої фракції"
  cb_gag_force_country_into_faction_desc: "Вони не з нами! Ми повинні показати їм помилковість їхніх хибних шляхів!"
  cb_prevent_annexation: "Запобігти анексії"
  cb_prevent_annexation_desc: "Запобігти незаконній анексії беззахисних підданих нашими суперниками!"
  cb_timurs_conquests: "Завоювання [GetCharacter('chg_timur_lame_borjigin').GetShortNameWithNoTooltip]"
  cb_timurs_conquests_desc: "В ім'я великого завойовника, їхні землі належатимуть нам!"
  cb_unify_ilkahante: "Об'єднати [GetUniqueInternationalOrganization('ilkhanate').GetNameWithNoTooltip]"
  cb_unify_ilkahante_desc: "Увесь [GetUniqueInternationalOrganization('ilkhanate').GetName] буде об'єднаний під нашим правлінням!"
  cb_false_ilkhan_claimant: "Відмовити хибному претенденту"
  cb_false_ilkhan_claimant_desc: "Ми не дозволимо хибної претензії на лідерство [GetUniqueInternationalOrganization('ilkhanate').GetName]."
  cb_shed_shackles_of_the_ilkahante: "Скинути кайдани [GetUniqueInternationalOrganization('ilkhanate').GetNameWithNoTooltip]"
  cb_shed_shackles_of_the_ilkahante_desc: "Чужоземне [ShowCultureGroupName('mongolian_group')] правління [GetUniqueInternationalOrganization('ilkhanate').GetName] має зникнути. Ми об'єднаємо [ShowRegionName('persia_region')] під нашим стягом."
  cb_make_tributary: "Зробити [ShowSubjectTypeNameWithNoTooltip('tributary')]"
  cb_make_tributary_desc: "Примусити їх стати нашим [ShowSubjectTypeName('tributary')].\n$casus_belli_forbids_location_conquest_tt$"
  cb_union_independence: "Незалежність унії"
  cb_union_independence_desc: "Ми не схилимо коліна перед жодним хибним монархом! Наша доля – наша власна!"
  cb_union_war_for_seniority: "Війна за старшинство"
  cb_union_war_for_seniority_desc: "Вони не гідні представляти велику унію! Ми нав'яжемо свою перевагу і візьмемо контроль над унією для себе!"
  cb_religious_superiority: "Релігійна перевага"
  cb_religious_superiority_desc: "Релігійний конфлікт між [Concept('protestant', 'CONCEPT_PLACEHOLDER')|e] та [ShowReligionAdjective('catholic')] фракціями [GetUniqueInternationalOrganization('hre').GetName] має знайти своє завершення – навіть якщо це доведеться зробити на полі бою!\n\n#Y Дозволяє [ShowPeaceTreatyTypeName('religious_supremacy')] [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]#!"
  cb_livonian_wars: "Лівонська війна"
  cb_livonian_wars_desc: "Конфлікт між двома державами за майбутнє [ShowAreaName('baltic_area')]. Результат цієї війни вирішить, хто отримає незамерзаючі порти на землях колишньої #italic Terra Mariana#!."
  cb_claim_timurids: "Претензія на $TIM_ADJ$ володіння"
  cb_claim_timurids_desc: "Конфлікт між намісником у $TIM$, метою якого є претензія на володіння для себе."
  cb_dlh_invasion_of_china: "Вторгнення до Китаю"
  cb_dlh_invasion_of_china_desc: "Старі рани між [GetInternationalOrganization('middle_kingdom').GetName] та силами $india$. Шалена кампанія проти старих ворогів, ми не зупинимося ні перед чим, доки вони не будуть повністю розгромлені.\n\nЦей [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] дозволяє дешевше завойовувати [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowSubContinentName('east_asia')]."
  cb_lodi_claims: "Претензії Лоді"
  cb_lodi_claims_desc: "З претензіями [ShowDynastyName('lodi_dynasty')] на [ShowLocationName('delhi')], настав час оголосити себе справжніми правителями $india$!\n\n#Y Дозволяє [ShowPeaceTreatyTypeName('peace_claim_delhi')] [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]#!"
  cb_reclaim_andalucia: "Відновлення $ADU$"
  cb_reclaim_andalucia_desc: "Правління [ShowReligionGroupAdjective('christian')] над [ShowRegionName('iberia_region')] має скінчитися. Вирушаймо і відновимо $ADU$!\n\nЯкщо нам вдасться володіти [ShowLocationName('cordoba')], а також #Y 80%#! [ShowAreaName('andalusia_area')] після війни, ми отримаємо подію, щоб стати $ADU$"
  cb_sco_invade_england: "Вторгнення до [GetCountry('ENG').GetNameWithNoTooltip]"
  cb_sco_invade_england_desc: "Наші [GetCountry('FRA').GetAdjective] союзники просили нас дотриматися умов Старого Альянсу та розпочати вторгнення до [GetCountry('ENG').GetName]. Оскільки [GetCountry('ENG').GetNameWithNoTooltip] залучена до війни в [GetCountry('FRA').GetNameWithNoTooltip], це дає [GetCountry('SCO').GetName] нагоду захопити сусідні прикордонні провінції."
  cb_raiding_retaliation: "Відплата за набіги"
  cb_raiding_retaliation_desc: "Ми відплатимо ворогам, що грабували наше населення."
  cb_chinese_unification: "Об'єднати $china$"
  cb_chinese_unification_desc: "Землі $china$ мають знову об'єднатися під єдиним стягом [GetInternationalOrganizationType('middle_kingdom').GetName]!"
  cb_claim_mandate_of_heaven: "Заявити права на Мандат Небес"
  cb_claim_mandate_of_heaven_desc: "$china$ загублена без належного та сильного керівництва. Ми є таким керівництвом, і наш обов'язок та наша доля — утвердитися як лідери [GetInternationalOrganizationType('middle_kingdom').GetName]"
  cb_beaver_wars: "Захопити постачання хутра"
  cb_beaver_wars_desc: "Мисливці винищили нашу місцеву популяцію бобрів до мізерної кількості, ми мусимо здобути нові мисливські угіддя, щоб задовольнити попит хутрової торгівлі!"
  cb_subjugation: "Підкорення"
  cb_subjugation_desc: "Вони опираються схилити коліна перед нами. Ми змусимо їх це зробити!"
  cb_expansion_into_the_steppes: "Експансія у Степи"
  cb_expansion_into_the_steppes_desc: "$tatar_yoke$ більше немає. Настав час заявити права на степи для себе!"
  great_northern_conflict: "Великий Північний Конфлікт"
  great_northern_conflict_PROV: "$great_northern_conflict$ за [PROVINCE.GetName]"
  great_northern_conflict_desc: "У спробі кинути виклик впливу наших [ShowCultureGroupName('scandinavian_group')] ворогів, було прийнято рішення взятися за зброю та боротися за контроль над прибутковими землями та торговими шляхами по всьому [ShowAreaName('baltic_area')]."