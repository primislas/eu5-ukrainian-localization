l_english:
  game_concept_with_icon: "$ICON$ $NAME$"
  game_concept_modifier: "Модифікатор"
  game_concept_modifiers: "Модифікатори"
  game_concept_modifier_desc: "Модифікатори — це значення, що впливають на роботу гри, наприклад, додаючи або множачи певний розрахунок.\nМодифікатори прив'язані до певної сутності, як-от [Concept('country_modifiers', 'CONCEPT_PLACEHOLDER')|e] до [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], [Concept('location_modifiers', 'CONCEPT_PLACEHOLDER')|e] до [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], [Concept('character_modifiers', 'CONCEPT_PLACEHOLDER')|e] до [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] та [Concept('international_organization_modifiers', 'CONCEPT_PLACEHOLDER')|e] до [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_location_modifier: "Модифікатор локації"
  game_concept_location_modifiers: "Модифікатори локації"
  game_concept_location_modifier_desc: "[Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що застосовується до [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_province_modifier: "Модифікатор провінції"
  game_concept_province_modifiers: "Модифікатори провінції"
  game_concept_province_modifier_desc: "[Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що застосовується до [Concept('province', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_country_modifier: "Модифікатор країни"
  game_concept_country_modifiers: "Модифікатори країни"
  game_concept_country_modifier_desc: "[Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що застосовується до всієї [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_unit_modifier: "Модифікатор загону"
  game_concept_unit_modifiers: "Модифікатори загону"
  game_concept_unit_modifier_desc: "[Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що застосовується до певного [Concept('unit', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_character_modifier: "Модифікатор персонажа"
  game_concept_character_modifiers: "Модифікатори персонажа"
  game_concept_character_modifier_desc: "[Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що застосовується до [Concept('character', 'CONCEPT_PLACEHOLDER')|e]. Типи модифікаторів, які мають на меті впливати на [Concept('country', 'CONCEPT_PLACEHOLDER')|e], активні лише тоді, коли персонаж є [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] цієї країни."
  game_concept_international_organization_modifier: "Модифікатор міжнародної організації"
  game_concept_international_organization_modifiers: "Модифікатори міжнародної організації"
  game_concept_international_organization_modifier_desc: "[Concept('modifier', 'CONCEPT_PLACEHOLDER')|e], що застосовується до [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_effect: "Ефект"
  game_concept_effects: "Ефекти"
  game_concept_effect_desc: "Ефекти використовуються для динамічного впливу на гру. Вони можуть варіюватися від простого додавання [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] до більш складних дій, таких як розблокування [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]. Ефекти зазвичай відбуваються в [Concept('event', 'CONCEPT_PLACEHOLDER')|e] або є нагородами за [Concept('missions', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_trigger: "Тригер"
  game_concept_triggers: "Тригери"
  game_concept_condition: "Умова"
  game_concept_conditions: "Умови"
  game_concept_trigger_desc: "Тригери — це умови, які мають бути виконані для того, щоб певні [Concept('effects', 'CONCEPT_PLACEHOLDER')|e], [Concept('events', 'CONCEPT_PLACEHOLDER')|e], [Concept('tasks', 'CONCEPT_PLACEHOLDER')|e] та інші ігрові елементи були активними."
  game_concept_action: "Дія"
  game_concept_actions: "Дії"
  game_concept_action_desc: "Дія — це кнопка, яка викликає [Concept('effect', 'CONCEPT_PLACEHOLDER')|e] в ігровому світі. Такі дії зазвичай мають форму [Concept('country_interactions', 'CONCEPT_PLACEHOLDER')|e], [Concept('situation_actions', 'CONCEPT_PLACEHOLDER')|e] або [Concept('unit_abilities', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_country: "Країна"
  game_concept_country_s: "Країни"
  game_concept_countries: "Країни"
  game_concept_nation: "Нація"
  game_concept_nations: "Нації"
  game_concept_country_desc: "Країна — це політична одиниця, що може брати участь у [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e]. Вона має [Concept('government', 'CONCEPT_PLACEHOLDER')|e], [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] та [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e]. Вона може контролювати [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] для проектування своєї сили.\n\nКожна Країна є або [Concept('settled', 'CONCEPT_PLACEHOLDER')|e], [Concept('extraterritorial', 'CONCEPT_PLACEHOLDER')|e], [Concept('army_based', 'CONCEPT_PLACEHOLDER')|e], або [Concept('society_of_pops', 'CONCEPT_PLACEHOLDER')|e].\n\nКожна Країна грається або гравцем-людиною, або ШІ."
  game_concept_settled_country: "Осіла Країна"
  game_concept_settle: "Осісти"
  game_concept_settled: "Осілий"
  game_concept_location_based: "Сухопутна Країна"
  game_concept_settled_country_desc: "$game_concept_settled_country$ — це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка повинна [Concept('own', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] для свого існування."
  game_concept_army_based: "Армійська Країна"
  game_concept_army_based_countries: "Армійські Країни"
  game_concept_army_based_desc: "$game_concept_army_based$ — це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка може [Concept('own', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], але її існування повністю залежить від її [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]. Якщо вони знищені, то $game_concept_country$ розпадається."
  game_concept_navy_based: "Флотська Країна"
  game_concept_navy_based_countries: "Флотські Країни"
  game_concept_navy_based_desc: "$game_concept_navy_based$ — це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка може [Concept('own', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], але її існування повністю залежить від її [Concept('navies', 'CONCEPT_PLACEHOLDER')|e]. Якщо вони знищені, то $game_concept_country$ розпадається."
  game_concept_extraterritorial_country: "Екстериторіальна країна"
  game_concept_extraterritorial_countries: "Екстериторіальні країни"
  game_concept_extraterritorial: "Екстериторіальний"
  game_concept_building_based: "Країна, заснована на будівлях"
  game_concept_extraterritorial_country_desc: "$game_concept_extraterritorial_country$ — це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що існує завдяки своїм [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] і не потребує [Concept('own', 'CONCEPT_PLACEHOLDER')|e] цілих [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_society_of_pops: "Суспільство попів"
  game_concept_societies_of_pops: "Суспільства попів"
  game_concept_pop_based: "Країна, заснована на попах"
  game_concept_society_of_pops_desc: "$game_concept_society_of_pops$ — це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що існує завдяки своїм [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] і не потребує [Concept('own', 'CONCEPT_PLACEHOLDER')|e] цілих [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_diplomacy: "Дипломатія"
  game_concept_diplomacy_desc: "Дипломатія — це взаємодія між двома [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в межах [Concept('diplomatic_range', 'CONCEPT_PLACEHOLDER')|e] одна від одної. Їй сприяють [Concept('diplomats', 'CONCEPT_PLACEHOLDER')|e].\n\nВона охоплює все: від [Concept('alliances', 'CONCEPT_PLACEHOLDER')|e], [Concept('treaties', 'CONCEPT_PLACEHOLDER')|e], [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] та [Concept('overlords', 'CONCEPT_PLACEHOLDER')|e], і регулює [Concept('war', 'CONCEPT_PLACEHOLDER')|e] та [Concept('peace', 'CONCEPT_PLACEHOLDER')|e].\n\nВисокий [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e] полегшує дипломатію, тоді як високий [Concept('antagonism', 'CONCEPT_PLACEHOLDER')|e] ускладнює її."
  game_concept_war_enthusiasm: "Військовий ентузіазм"
  game_concept_war_enthusiasm_desc: "Це описує готовність [Concept('country', 'CONCEPT_PLACEHOLDER')|e] продовжувати цю [Concept('war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_decaying_modifier: "Згасаючий модифікатор"
  game_concept_decaying_modifier_desc: "Згасаючі модифікатори схожі на звичайні [Concept('modifiers', 'CONCEPT_PLACEHOLDER')|e], але їхні ефекти поступово слабшають, наближаючись до дати закінчення терміну дії. Це створює тимчасові зміни, які з часом зникають."
  game_concept_overseas: "Заморський"
  game_concept_overseas_desc: "Це [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що не має сухопутного сполучення зі [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] і знаходиться на іншому [Concept('continent', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_goods_demand: "Попит на товари"
  game_concept_goods_demands: "Попит на товари"
  game_concept_goods_demand_desc: "Це [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], які потрібні для [Concept('construction', 'CONCEPT_PLACEHOLDER')|e], [Concept('production_method', 'CONCEPT_PLACEHOLDER')|e], [Concept('pop_needs', 'CONCEPT_PLACEHOLDER')|e] або будь-чого іншого, що потребує товарів."
  game_concept_government_needs: "Урядові потреби"
  game_concept_government_needs_desc: "[government_needs] — це ті [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], які ваша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] потребує для [Concept('constructions', 'CONCEPT_PLACEHOLDER')|e], таких як [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], підвищення [Concept('location_rank', 'CONCEPT_PLACEHOLDER')|e], набору [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] або підготовки [Concept('explorations', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('constructions', 'CONCEPT_PLACEHOLDER')|e] зупиняться, якщо [government_needs] не можуть бути задоволені на [Concept('market', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e], тому задоволення [government_needs] має бути пріоритетом для будь-якого уряду."
  game_concept_production_method: "Метод виробництва"
  game_concept_production_methods: "Методи виробництва"
  game_concept_production_method_desc: "Це те, що можна змінити в [Concept('building', 'CONCEPT_PLACEHOLDER')|e], щоб змінити [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], необхідні для його функціонування, та/або те, що сама будівля здатна робити."
  game_concept_ruler: "Правитель"
  game_concept_ruler_s: "Правителя"
  game_concept_rulers: "Правителі"
  game_concept_ruler_desc: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може мати [Concept('character', 'CONCEPT_PLACEHOLDER')|e] як свого правителя. Залежно від [Concept('government_type', 'CONCEPT_PLACEHOLDER')|e] вони можуть правити довічно або протягом встановленого періоду часу, перш ніж їх замінять. [Concept('traits', 'CONCEPT_PLACEHOLDER')|e] правителя впливають на всю [Concept('country', 'CONCEPT_PLACEHOLDER')|e], а [Concept('adm', 'CONCEPT_PLACEHOLDER')|e], [Concept('mil', 'CONCEPT_PLACEHOLDER')|e] та [Concept('dip', 'CONCEPT_PLACEHOLDER')|e] мають прямий вплив на ефективність [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e].\n\nМайбутні правителі обираються за допомогою [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e]. Поки немає законного [adult], [government] замість цього керується [Concept('regent', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_title_history: "Історія титулів"
  game_concept_title_history_desc: "$game_concept_title_history$ — це перелік усіх [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], якими [Concept('character', 'CONCEPT_PLACEHOLDER')|e] правив протягом свого життя."
  game_concept_monarch: "Монарх"
  game_concept_monarchs: "Монархи"
  game_concept_road: "Дорога"
  game_concept_roads: "Дороги"
  game_concept_road_desc: "Дорога — це збудоване сполучення між двома [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]. Вони полегшують [Concept('country', 'CONCEPT_PLACEHOLDER')|e] здійснювати [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над своєю територією, спрощують [Concept('trade', 'CONCEPT_PLACEHOLDER')|e] та дозволяють [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] марширувати швидше."
  game_concept_employment_system: "Система зайнятості"
  game_concept_employment_systems: "Системи зайнятості"
  game_concept_employment_system_desc: "Це описує, як [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] заповнюють свої [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] працівниками."
  game_concept_subject_military_stance: "Військова позиція"
  game_concept_subject_military_stances: "Військові позиції"
  game_concept_subject_military_stance_desc: "Це описує, як [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] вирішують, що робити для своїх [Concept('overlords', 'CONCEPT_PLACEHOLDER')|e] у часи [Concept('war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_location_size: "Розмір локації"
  game_concept_location_size_desc: "Фізичний розмір [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Не кожна локація має однаковий розмір."
  game_concept_province: "Провінція"
  game_concept_provinces: "Провінції"
  game_concept_province_desc: "Провінція — це група [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] однією [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Провінція ділиться та розподіляє [Concept('food', 'CONCEPT_PLACEHOLDER')|e] між своїми локаціями, а [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e] набираються з усієї провінції одночасно. Декілька [Concept('cabinet_actions', 'CONCEPT_PLACEHOLDER')|e] націлені на провінцію."
  game_concept_province_definition: "Визначення провінції"
  game_concept_province_definition_desc: "Визначення провінції — це заздалегідь визначена група [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], яка визначає, як [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] створюються протягом гри.\n\n[Concept('areas_with_icon', 'CONCEPT_PLACEHOLDER')|e] поділяються на Визначення провінцій, які, своєю чергою, містять [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Усі [locations] в одному Визначенні провінції, які [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] однією [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], належатимуть до однієї [Concept('province', 'CONCEPT_PLACEHOLDER')|e].\n\nЯкщо кілька [countries] [own] [locations] в одному Визначенні провінції, буде стільки ж різних [provinces], кожна зі своєю [Concept('province_capital_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('food_stockpile_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_province_capital: "Столиця провінції"
  game_concept_province_capital_desc: "Столиця провінції — це [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що є образним серцем її [Concept('province', 'CONCEPT_PLACEHOLDER')|e]. Найбільш населений або розвинений [location] у [province] буде автоматично обраний як столиця провінції. Коли це [location] буде [Concept('occupied', 'CONCEPT_PLACEHOLDER')|e] під час [Concept('war', 'CONCEPT_PLACEHOLDER')|e], решта [locations] [province] автоматично перейдуть до загарбника протягом короткого періоду часу.\n\nСтолиця провінції також визначає [Concept('market', 'CONCEPT_PLACEHOLDER')|e], з якого вся [Concept('province', 'CONCEPT_PLACEHOLDER')|e] купує та продає [Concept('food', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_location: "Місцевість"
  game_concept_locations: "Місцевості"
  game_concept_location_desc: "Найменша одиниця землі, що є частиною [Concept('province', 'CONCEPT_PLACEHOLDER')|e]. Її базові характеристики визначаються [Concept('topography', 'CONCEPT_PLACEHOLDER')|e], [Concept('vegetation', 'CONCEPT_PLACEHOLDER')|e] та [Concept('climate', 'CONCEPT_PLACEHOLDER')|e]. Вона також може містити [Concept('river', 'CONCEPT_PLACEHOLDER')|e].\n\nКожна місцевість має [Concept('raw_material', 'CONCEPT_PLACEHOLDER')|e], яку можуть збирати [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що там живуть. [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] можуть бути побудовані в місцевостях і також [Concept('employ', 'CONCEPT_PLACEHOLDER')|e] населення. Більшість місцевостей є [Concept('rural', 'CONCEPT_PLACEHOLDER')|e], але їм також може бути надано статус [Concept('town_or_city', 'CONCEPT_PLACEHOLDER')|e].\n\nКожна місцевість може бути [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] та [Concept('controlled', 'CONCEPT_PLACEHOLDER')|e] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], а [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] можуть переміщатися між різними місцевостями, щоб завойовувати їх під час [Concept('war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_lake: "Озеро"
  game_concept_lakes: "Озера"
  game_concept_lake_desc: "Озера представляють внутрішні водойми без будь-якого контакту з відкритим морем, за винятком можливих річок, тому жодні значущі [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] не можуть плавати в них."
  game_concept_seazone: "Морська зона"
  game_concept_seazones: "Морські зони"
  game_concept_seazone_desc: "Морська зона схожа на [Concept('location', 'CONCEPT_PLACEHOLDER')|e], за винятком того, що вона містить лише воду. Це поділ карти, який ніким не [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] і не [Concept('controlled', 'CONCEPT_PLACEHOLDER')|e]. Якщо морська зона є прибережною, вона також матиме [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e] від сусідніх [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_sea_current: "Морська течія"
  game_concept_sea_currents: "Морські течії"
  game_concept_sea_current_desc: "$game_concept_sea_current$ — це особливість певних [Concept('seazones', 'CONCEPT_PLACEHOLDER')|e], що дозволяє швидше переміщатися [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] у певному напрямку."
  game_concept_frozen: "Замерзла"
  game_concept_frozen_freeze_over: "Замерзає"
  game_concept_frozen_desc: "Замерзла [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e] може бути перетнута [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] і дозволяє краще контролювати землі, до яких вона досягає; однак, це призведе до того, що [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] застрягнуть, доки вона не розтане. Будьте обережні, коли змінюється погода, вона може розтанути з катастрофічними наслідками, якщо [Concept('army', 'CONCEPT_PLACEHOLDER')|e] знаходиться на льоду."
  game_concept_impassable: "Непрохідна"
  game_concept_passable: "Прохідна"
  game_concept_wasteland: "Пустка"
  game_concept_wastelands: "Пустки"
  game_concept_impassable_desc: "Це [Concept('location', 'CONCEPT_PLACEHOLDER')|e] або [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e], куди не можуть увійти [Concept('units', 'CONCEPT_PLACEHOLDER')|e], і ніхто не може там жити в будь-якій стійкій кількості."
  game_concept_area: "Район"
  game_concept_areas: "Райони"
  game_concept_area_desc: "Район — це група [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] і є частиною [Concept('region', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_region: "Регіон"
  game_concept_regions: "Регіони"
  game_concept_region_desc: "Регіон — це група [Concept('areas', 'CONCEPT_PLACEHOLDER')|e], що є частиною [Concept('sub_continent', 'CONCEPT_PLACEHOLDER')|e]. [ShowRegionName('scandinavian_region')] є прикладом Регіону."
  game_concept_sub_continent: "Субконтинент"
  game_concept_sub_continents: "Субконтиненти"
  game_concept_sub_continent_desc: "Субконтинент — це група [Concept('regions', 'CONCEPT_PLACEHOLDER')|e], що є частиною [Concept('continent', 'CONCEPT_PLACEHOLDER')|e]. [ShowSubContinentName('western_europe')] або $india$ є прикладами Субконтиненту."
  game_concept_geography: "Географія"
  game_concept_geography_desc: "Географія — це природа та відносне розташування місць і фізичних об'єктів. [Concept('continents', 'CONCEPT_PLACEHOLDER')|e], [Concept('sub_continents', 'CONCEPT_PLACEHOLDER')|e], [Concept('regions', 'CONCEPT_PLACEHOLDER')|e], [Concept('areas', 'CONCEPT_PLACEHOLDER')|e], [Concept('provinces', 'CONCEPT_PLACEHOLDER')|e] та [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] є частинами світової географії."
  game_concept_continent: "Континент"
  game_concept_continents: "Континенти"
  game_concept_continent_desc: "Світ поділений на кілька континентів, а ці континенти потім поділяються на [Concept('sub_continents', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_men: "Чоловіки"
  game_concept_men_i: "@army_strength!"
  game_concept_manpower: "Людські ресурси"
  game_concept_manpower_i: "@manpower!"
  game_concept_manpower_desc: "Людські ресурси представляють ліміт того, скільки негідників і пройдисвітів [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може утримувати у своїй постійній [Concept('army', 'CONCEPT_PLACEHOLDER')|e].\n\nЛюдські ресурси витрачаються при навчанні та утриманні професійних [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e], які зазвичай ефективніші за [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e].\n\nШвидкість приросту Людських ресурсів можна збільшити, будуючи [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] для Людських ресурсів або досліджуючи певні [Concept('advances', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_sailors: "Моряки"
  game_concept_sailors_i: "@sailors!"
  game_concept_sailors_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e] може мати певну кількість Моряків, що представляють рибалок, торгових моряків та морських офіцерів, які заробляють на життя у відкритому морі.\n\nТакі досвідчені моряки потрібні для будівництва [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] і витрачаються під час утримання [Concept('navy', 'CONCEPT_PLACEHOLDER')|e]. Вони відрізняються від [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e] і є ефективнішими. Вони навіть потрібні для комплектування [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e] місій.\n\nШвидкість приросту Моряків можна збільшити, будуючи портові [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] або досліджуючи певні [Concept('advances', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_river: "Річка"
  game_concept_rivers: "Річки"
  game_concept_river_desc: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e] може мати Річку, рухомий потік води.\n\nРічки не є судноплавними для [Concept('navies', 'CONCEPT_PLACEHOLDER')|e], але вони накладають бойовий штраф [Concept('crossing', 'CONCEPT_PLACEHOLDER')|e] на [Concept('armies', 'CONCEPT_PLACEHOLDER')|e], які намагаються увійти в [location] з Річкою. Крім того, вони трохи збільшують [Concept('population_capacity', 'CONCEPT_PLACEHOLDER')|e] локації."
  game_concept_religion: "Релігія"
  game_concept_faith: "Віра"
  game_concept_religions: "Релігії"
  game_concept_religion_desc: "Релігія — це будь-яка система вірувань, що належить до [Concept('religion_group', 'CONCEPT_PLACEHOLDER')|e]. Кожна [Concept('person', 'CONCEPT_PLACEHOLDER')|e] має Релігію (і може бути [Concept('converted', 'CONCEPT_PLACEHOLDER')|e] до іншої), і кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e].\n\nРелігії в одній [religion_group] вважають одна одну [Concept('heretic', 'CONCEPT_PLACEHOLDER')|e], тоді як Релігії в різних [religion_groups] вважають одна одну [Concept('heathen', 'CONCEPT_PLACEHOLDER')|e]. Крім того, Релігії можуть мати специфічні думки про інші Релігії."
  game_concept_religion_group: "Група релігій"
  game_concept_religion_groups: "Групи релігій"
  game_concept_religion_group_desc: "Група релігій — це набір [Concept('religions', 'CONCEPT_PLACEHOLDER')|e], які схожі між собою і можуть вважати одна одну просто хибною, а не злою. Це не завадить їм розпочинати [Concept('wars', 'CONCEPT_PLACEHOLDER')|e] одна проти одної."
  game_concept_culture_group: "Група культур"
  game_concept_culture_groups: "Групи культур"
  game_concept_culture_group_short: "Група"
  game_concept_culture_groups_short: "Групи"
  game_concept_culture_group_desc: "Група культур — це набір [Concept('cultures', 'CONCEPT_PLACEHOLDER')|e], які схожі між собою певним чином, чи то через спільну спадщину, схожі традиції, чи просто регіональну близькість.\n\n [culture] може належати до будь-якої кількості груп культур, хоча вони також можуть бути достатньо ізольованими, щоб не належати до жодної.\n\n[Concept('countries', 'CONCEPT_PLACEHOLDER')|e], чиї [Concept('primary_cultures', 'CONCEPT_PLACEHOLDER')|e] мають принаймні одну спільну групу культур, матимуть невеликий бонус до [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] одна до одної, хоча він не накопичується, якщо вони мають кілька спільних груп.\n\nДеякі [culture_groups] можуть з часом бути [Concept('merged_culture_group_merged', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_dominant_country: "Домінантна країна"
  game_concept_dominant_country_dominant: "Домінантна"
  game_concept_dominant_country_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка має найбільше [Concept('population', 'CONCEPT_PLACEHOLDER')|e] своєї [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e], стає [Concept('dominant_country', 'CONCEPT_PLACEHOLDER')|e] цієї [Concept('culture', 'CONCEPT_PLACEHOLDER')|e]. Країна не може бути $game_concept_dominant_country_dominant$, якщо її [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] належить до тієї ж $game_concept_culture$."
  game_concept_merged_culture_group: "Об'єднана група культур"
  game_concept_merged_culture_group_merged: "Об'єднана"
  game_concept_merged_culture_group_merge: "Об'єднати"
  game_concept_merged_culture_group_merges: "Об'єднує"
  game_concept_merged_culture_group_merged_culture: "Об'єднана культура"
  game_concept_merged_culture_group_merging: "Об'єднання"
  game_concept_merged_culture_group_desc: "Деякі [Concept('culture_groups', 'CONCEPT_PLACEHOLDER')|e] можуть бути $game_concept_merged_culture_group_merged$ в єдину [Concept('culture', 'CONCEPT_PLACEHOLDER')|e].\n\nКраїна може $game_concept_merged_culture_group_merge$ одну зі своїх [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e]'s [culture_groups], що призведе до створення нової [culture]. [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] старої [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] та [Concept('accepted_cultures', 'CONCEPT_PLACEHOLDER')|e], які належать до тієї ж [culture_group_short] і використовують ту ж [Concept('language', 'CONCEPT_PLACEHOLDER')|e], будуть негайно асимільовані.\n\n [culture_group] може бути $game_concept_merged_culture_group_merged$ лише один раз."
  game_concept_dominant_religion: "Домінантна релігія"
  game_concept_dominant_religion_desc: "Домінантна релігія — це [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], яку сповідує найбільше [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e] або [Concept('country', 'CONCEPT_PLACEHOLDER')|e].\nЦе не обов'язково означає, що вона є більшістю."
  game_concept_convert: "Навернути"
  game_concept_converts: "Навертає"
  game_concept_converting: "Навернення"
  game_concept_conversion: "Навернення"
  game_concept_conversion_rate: "Швидкість навернення"
  game_concept_converted: "Звернений"
  game_concept_conversion_desc: "Це процес, за яким [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] з часом змінюються з однієї [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] на іншу. [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] є найнадійнішим засобом для [Concept('country', 'CONCEPT_PLACEHOLDER')|e] впливати на $game_concept_conversion$, але [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e], [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] та [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e] також відіграють значну роль."
  game_concept_reform_desire: "Прагнення до реформ"
  game_concept_reform_desire_desc: "[ShowReligionAdjective('catholic')] релігія має внутрішні конфлікти щодо того, яка доктрина є правильною, а яка ні, і щодо того, що є частиною віри, а що ні. З часом прагнення до реформ зростає і впливатиме на будь-які майбутні дискусії щодо доктрини [ShowReligionNameWithNoTooltip('catholic')]."
  game_concept_reformation: "Реформація"
  game_concept_protestant: "Протестант"
  game_concept_protestants: "Протестанти"
  game_concept_reformation_desc: "$game_concept_reformation$ — це впливовий рух у [ShowReligionGroupAdjective('christian')] світі, який фрагментує [ShowReligionAdjective('catholic')] віру на кілька інших релігій. Цей рух починається з [ShowSituationName('reformation')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e].\nНаступні релігії є частиною $game_concept_reformation$:\n$BULLET_WITH_TAB$[ShowReligionName('hussite')]\n$BULLET_WITH_TAB$[ShowReligionName('lutheran')]\n$BULLET_WITH_TAB$[ShowReligionName('calvinist')]\n$BULLET_WITH_TAB$[ShowReligionName('anglican')]"
  game_concept_culture: "Культура"
  game_concept_cultures: "Культури"
  game_concept_culture_desc: "Культура — це група [Concept('people', 'CONCEPT_PLACEHOLDER')|e], які поділяють почуття спорідненості.\n\nКожна Культура володіє [Concept('language', 'CONCEPT_PLACEHOLDER')|e], яку вона може розділяти з іншими Культурами.\n\nКожна Культура має [Concept('cultural_tradition', 'CONCEPT_PLACEHOLDER')|e] та [Concept('cultural_influence', 'CONCEPT_PLACEHOLDER')|e]. Різні Культури мають мінливі [Concept('cultural_opinions', 'CONCEPT_PLACEHOLDER')|e] одна про одну.\n\nКожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] і може мати кілька [Concept('accepted_cultures', 'CONCEPT_PLACEHOLDER')|e] та/або [Concept('tolerated_cultures', 'CONCEPT_PLACEHOLDER')|e] на додаток. Усі інші Культури в країні вважаються [Concept('non_accepted_cultures', 'CONCEPT_PLACEHOLDER')|e]. Культури можуть бути [Concept('assimilated', 'CONCEPT_PLACEHOLDER')|e] іншими Культурами.\n\nБагато Культур належать до однієї або кількох [Concept('culture_groups', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_cultural_opinion: "Культурна думка"
  game_concept_cultural_opinion_short: "Думка"
  game_concept_cultural_opinions: "Культурні думки"
  game_concept_cultural_opinion_desc: "Кожна [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] має Культурну думку про кожну іншу Культуру. Це впливає на [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('country', 'CONCEPT_PLACEHOLDER')|e] з однією [culture] має про [country] іншої [culture], а також впливає на [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_non_accepted_culture: "Дискримінована культура"
  game_concept_non_accepted_culture_short: "Дискримінований"
  game_concept_non_accepted_cultures: "Дискриміновані культури"
  game_concept_non_accepted_culture_desc: "Кожна [Concept('culture', 'CONCEPT_PLACEHOLDER')|e], присутня в [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка не є ні [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e], ні [Concept('accepted_culture', 'CONCEPT_PLACEHOLDER')|e], ні [Concept('tolerated_culture', 'CONCEPT_PLACEHOLDER')|e], вважається Дискримінованою Культурою.\n\nПопи, що належать до такої [culture], не можуть бути мобілізовані як [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e] без спеціального [Concept('law', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_accepted_culture: "Прийнята культура"
  game_concept_accept: "Прийняти"
  game_concept_accepted_culture_short: "Прийнятий"
  game_concept_accepted_cultures: "Прийняті культури"
  game_concept_accepted_culture_desc: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може мати кілька [Concept('cultures', 'CONCEPT_PLACEHOLDER')|e], які розглядаються повністю як [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e].\n\nТочна кількість культур, які країна може дозволити собі прийняти без штрафів, є змінною і може бути збільшена деякими [Concept('advances', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що належать до Прийнятої Культури, можуть бути мобілізовані як [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e] без необхідності будь-якого спеціального [Concept('law', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e], що належать до $game_concept_accepted_culture$, побачать, що їхня [Concept('pop_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] збільшиться на [GetDefine('NPop','ACCEPTED_CULTURE_SATISFACTION')|%G]."
  game_concept_tolerated_culture: "Толерована культура"
  game_concept_tolerated_culture_short: "Терпима"
  game_concept_tolerate: "Терпіти"
  game_concept_tolerated_cultures: "Терпимі культури"
  game_concept_tolerated_culture_desc: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може мати кілька [Concept('cultures', 'CONCEPT_PLACEHOLDER')|e], до яких ставляться краще, ніж до [Concept('non_accepted_cultures', 'CONCEPT_PLACEHOLDER')|e], але не так добре, як до [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e].\n\nТочна кількість культур, які країна може дозволити собі прийняти без штрафів, є змінною і може бути збільшена деякими [Concept('advances', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що належать до Прийнятої Культури, можуть бути призвані як [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e] без необхідності будь-якого спеціального [Concept('law', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e], що належать до $game_concept_accepted_culture$, побачать, що їхня [Concept('pop_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] збільшиться на [GetDefine('NPop','TOLERATED_CULTURE_SATISFACTION')|%G]."
  game_concept_primary_culture: "Основна культура"
  game_concept_primary_culture_short: "Основна"
  game_concept_primary_cultures: "Основні культури"
  game_concept_primary_culture_desc: "Це [Concept('culture', 'CONCEPT_PLACEHOLDER')|e], до якої, як вважається, належить [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] іншої культури [Concept('assimilate', 'CONCEPT_PLACEHOLDER')|e] до цієї, коли обставини сприятливі.\n\n [Concept('common_language', 'CONCEPT_PLACEHOLDER')|e] кожної [country] визначається [language] її Основної Культури.\n\n[pops], що належать до $game_concept_primary_culture$ [country], побачать, що їхня [Concept('pop_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] збільшиться на [GetDefine('NPop','PRIMARY_CULTURE_SATISFACTION')|%G]."
  game_concept_primary_or_accepted_culture: "Основна або прийнята культура"
  game_concept_primary_or_accepted_culture_desc: "Це [Concept('culture', 'CONCEPT_PLACEHOLDER')|e], яка є або [Concept('primary_culture_short', 'CONCEPT_PLACEHOLDER')|e], або [Concept('accepted_culture', 'CONCEPT_PLACEHOLDER')|e] в [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_cultural_capacity: "Культурна спроможність"
  game_concept_cultural_capacity_desc: "Вартість для [Concept('country', 'CONCEPT_PLACEHOLDER')|e] мати [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] як [Concept('accepted_culture', 'CONCEPT_PLACEHOLDER')|e] залежить від їхньої [Concept('cultural_opinion', 'CONCEPT_PLACEHOLDER')|e] щодо [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] та розміру цієї культури відносно $game_concept_primary_culture$."
  game_concept_religious_status: "Релігійний статус"
  game_concept_religious_status_desc: "Це те, як [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] класифікується порівняно з [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e].\n$BULLET_WITH_TAB$[Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('heretic', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('heathen', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_religious_opinion: "Релігійна думка"
  game_concept_religious_opinions: "Релігійні думки"
  game_concept_religious_opinion_desc: "Кожна [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] має Релігійну Думку про кожну іншу [religion]. Це впливає на [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('country', 'CONCEPT_PLACEHOLDER')|e] з однією [religion] має про [country] іншої [religion], а також впливає на [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_primary_religion: "Основна релігія"
  game_concept_primary_religion_short: "Основна"
  game_concept_true_faith: "Основна релігія"
  game_concept_official_religion: "Основна релігія"
  game_concept_state_religion: "Основна релігія"
  game_concept_state_religion_desc: "Офіційна [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Вона надає доступ до різного контенту та механік, і може дозволяти дуже різні стилі гри.\n\n[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] матимуть вищу [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], якщо вони належать до $game_concept_primary_religion$, а інші $game_concept_pops$ повільно [Concept('convert', 'CONCEPT_PLACEHOLDER')|e] до $game_concept_primary_religion$ за правильних умов.\n\n$game_concept_primary_religion$ також має великий вплив на [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e], оскільки братні $game_concept_countries$ схильні бачити одне одного в більш сприятливому світлі."
  game_concept_heretic: "Єретик"
  game_concept_heretics: "Єретики"
  game_concept_heretic_desc: "Будь-яка [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], що належить до тієї ж [Concept('religion_group', 'CONCEPT_PLACEHOLDER')|e], що й [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e] у [Concept('country', 'CONCEPT_PLACEHOLDER')|e], вважатиметься єретичною.\n\nЗалежно від [Concept('heretic_tolerance', 'CONCEPT_PLACEHOLDER')|e] у $game_concept_country$, єретичні [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] зазвичай матимуть нижчу [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], а ведення [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] з єретичними $game_concept_countries$ може виявитися складнішим."
  game_concept_heathen: "Язичник"
  game_concept_heathens: "Язичники"
  game_concept_heathen_desc: "Будь-яка [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] іншої [Concept('religion_group', 'CONCEPT_PLACEHOLDER')|e], ніж [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e] у [Concept('country', 'CONCEPT_PLACEHOLDER')|e], вважатиметься язичницькою.\n\nЗалежно від [Concept('heathenry_tolerance', 'CONCEPT_PLACEHOLDER')|e] у $game_concept_country$, язичницькі [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] зазвичай матимуть нижчу [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], а ведення [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] з язичницькими $game_concept_countries$ може виявитися складнішим."
  game_concept_dominant_upper_class_culture: "Домінантна культура вищого класу"
  game_concept_dominant_upper_class_culture_desc: "Домінантна [Concept('upper_class', 'CONCEPT_PLACEHOLDER')|e] культура — це найбільша [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] у [Concept('country', 'CONCEPT_PLACEHOLDER')|e] серед усіх [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] вищого класу, масштабована за [Concept('control', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], у яких вони присутні, а також за вродженою [Concept('political_power', 'CONCEPT_PLACEHOLDER')|e] [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], до якої вони належать.\n\nЦе не обов'язково означає, що вона становить більшість."
  game_concept_dominant_culture: "Домінантна культура"
  game_concept_dominant_culture_desc: "Домінантна культура — це найбільша [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e] або [Concept('country', 'CONCEPT_PLACEHOLDER')|e].\nЦе не обов'язково означає, що вона становить більшість."
  game_concept_foreign_culture: "Іноземна культура"
  game_concept_foreign_culture_short: "Іноземна"
  game_concept_foreign_culture_desc: "Це [Concept('cultural_status', 'CONCEPT_PLACEHOLDER')|e] [Concept('culture', 'CONCEPT_PLACEHOLDER')|e], яка взагалі не має [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_cultural_status: "Культурний статус"
  game_concept_cultural_status_short: "Статус"
  game_concept_cultural_status_desc: "Кожна [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] розглядається [Concept('country', 'CONCEPT_PLACEHOLDER')|e] як одна з таких:\n$BULLET_WITH_TAB$[Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('accepted_culture', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('non_accepted_culture', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('tolerated_culture', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('foreign_culture', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_assimilate: "Асимілювати"
  game_concept_assimilates: "Асимілює"
  game_concept_assimilating: "Асиміляція"
  game_concept_assimilated: "Асимільований"
  game_concept_assimilation: "Асиміляція"
  game_concept_assimilation_rate: "Швидкість асиміляції"
  game_concept_assimilate_desc: "Це процес, під час якого [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] однієї [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] з часом змінюються на [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка ними [Concept('owns', 'CONCEPT_PLACEHOLDER')|e].\n\nВін прискорюється, якщо [primary_culture] має високу [Concept('culture_war_power', 'CONCEPT_PLACEHOLDER')|e] проти [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] культури.\n\nДеякі специфічні [Concept('cultures', 'CONCEPT_PLACEHOLDER')|e] безпосередньо пов'язані зі своєю [Concept('faith', 'CONCEPT_PLACEHOLDER')|e], тому їх неможливо буде асимілювати, доки вони не будуть [Concept('converted', 'CONCEPT_PLACEHOLDER')|e] спочатку."
  game_concept_occupation: "Окупація"
  game_concept_occupations: "Окупації"
  game_concept_occupied: "Окупований"
  game_concept_occupier: "Окупант"
  game_concept_occupy: "Окупувати"
  game_concept_occupying: "Окупуючи"
  game_concept_occupation_desc: "Окупація — це коли [Concept('контролер', 'CONCEPT_PLACEHOLDER')|e] [Concept('місцевості', 'CONCEPT_PLACEHOLDER')|e] відрізняється від її [Concept('власника', 'CONCEPT_PLACEHOLDER')|e]. Це відбувається, коли [Concept('місцевість] потрапляє в [зону_контролю] [укріплення', 'CONCEPT_PLACEHOLDER')|e], яке [Concept('контрольоване] [ворогом', 'CONCEPT_PLACEHOLDER')|e], або коли [Concept('армія', 'CONCEPT_PLACEHOLDER')|e] успішно [Concept('облягає', 'CONCEPT_PLACEHOLDER')|e] місцевість.\n\nУ багатьох випадках [Concept('місцевість', 'CONCEPT_PLACEHOLDER')|e] повинна бути окупована, перш ніж її можна буде додати до [Concept('мирного_договору', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_siege: "Облога"
  game_concept_besieged: "Обложений"
  game_concept_sieged: "Обложений"
  game_concept_sieges: "Облоги"
  game_concept_siege_desc: "Облога відбувається, коли [Concept('армія', 'CONCEPT_PLACEHOLDER')|e] прибуває в [Concept('місцевість', 'CONCEPT_PLACEHOLDER')|e], де [Concept('контролер', 'CONCEPT_PLACEHOLDER')|e] та $game_concept_army$ є [Concept('ворогами', 'CONCEPT_PLACEHOLDER')|e].\n\nОблога $game_concept_location$ без [Concept('укріплення', 'CONCEPT_PLACEHOLDER')|e] триватиме близько місяця, але якщо присутнє $game_concept_fortification$, це займе набагато більше часу, залежно від рівня $game_concept_fortification$.\n\nЯкщо $game_concept_army$ перемагає $game_concept_location$, [Concept('належить', 'CONCEPT_PLACEHOLDER')|e] $game_concept_enemy$, вона стає [Concept('окупована', 'CONCEPT_PLACEHOLDER')|e] і збільшує [Concept('військовий_рахунок', 'CONCEPT_PLACEHOLDER')|e] для $game_concept_army$'s $game_concept_owner$.\n\nДля прогресу [Concept('облоги', 'CONCEPT_PLACEHOLDER')|e] необхідно, щоб її облягало принаймні стільки ж людей, скільки чоловік у [Concept('гарнізоні', 'CONCEPT_PLACEHOLDER')|e]. Для [Concept('місцевості', 'CONCEPT_PLACEHOLDER')|e] без [Concept('укріплень', 'CONCEPT_PLACEHOLDER')|e] необхідно щонайменше #V 100#! чоловік."
  game_concept_assault: "Штурм"
  game_concept_assault_desc: "Штурм — це коли [Concept('нападник', 'CONCEPT_PLACEHOLDER')|e] під час [Concept('облоги', 'CONCEPT_PLACEHOLDER')|e] намагається взяти [Concept('укріплення', 'CONCEPT_PLACEHOLDER')|e] якомога швидше. Штурм може бути досить витратним, оскільки нападник зазнає великих втрат."
  game_concept_garrison: "Гарнізон"
  game_concept_garrisons: "Гарнізони"
  game_concept_garrison_desc: "Це солдати, які займаються обороною [Concept('укріплень', 'CONCEPT_PLACEHOLDER')|e] [Concept('місцевості', 'CONCEPT_PLACEHOLDER')|e]. Коли вони всі загинуть або їхня [Concept('мораль', 'CONCEPT_PLACEHOLDER')|e] зникне, [Concept('облога', 'CONCEPT_PLACEHOLDER')|e] буде програна для [Concept('захисника', 'CONCEPT_PLACEHOLDER')|e].\n\nДля прогресу [Concept('облоги', 'CONCEPT_PLACEHOLDER')|e] необхідно, щоб її облягало принаймні стільки ж людей, скільки чоловік у [Concept('гарнізоні', 'CONCEPT_PLACEHOLDER')|e]. Для [Concept('місцевості', 'CONCEPT_PLACEHOLDER')|e] без [Concept('укріплень', 'CONCEPT_PLACEHOLDER')|e] необхідно щонайменше #V 100#! чоловік."
  game_concept_combat: "Бій"
  game_concept_battle: "Битва"
  game_concept_battles: "Битви"
  game_concept_combats: "Бої"
  game_concept_combat_desc: "Якщо дві або більше [Concept('армії', 'CONCEPT_PLACEHOLDER')|e] зустрічаються в [Concept('місцевості', 'CONCEPT_PLACEHOLDER')|e], або два чи більше [Concept('флоти', 'CONCEPT_PLACEHOLDER')|e] в [Concept('морській_зоні', 'CONCEPT_PLACEHOLDER')|e], і вони [Concept('ворожі', 'CONCEPT_PLACEHOLDER')|e] одна до одної, між ними розпочнеться битва.\nБитва зазвичай починається з [Concept('фази_бомбардування', 'CONCEPT_PLACEHOLDER')|e], а потім продовжується у [Concept('фазі_бою', 'CONCEPT_PLACEHOLDER')|e]. Кожен [Concept('полк', 'CONCEPT_PLACEHOLDER')|e] або [Concept('корабель', 'CONCEPT_PLACEHOLDER')|e] намагатиметься [Concept('вступити_в_бій', 'CONCEPT_PLACEHOLDER')|e] з ворогом і битиметься, доки одна зі сторін не [Concept('відступить', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_attacker: "Нападник"
  game_concept_attacker_desc: "Нападник у [Concept('битві', 'CONCEPT_PLACEHOLDER')|e] може мати кілька недоліків, оскільки він отримає штрафи за [Concept('топографію', 'CONCEPT_PLACEHOLDER')|e], [Concept('рослинність', 'CONCEPT_PLACEHOLDER')|e] або [Concept('переправу', 'CONCEPT_PLACEHOLDER')|e]. Інша сторона називається [Concept('захисником', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_defender: "Захисник"
  game_concept_defender_desc: "Захисник у [Concept('битві', 'CONCEPT_PLACEHOLDER')|e] уникне штрафів, які може отримати [Concept('нападник', 'CONCEPT_PLACEHOLDER')|e]. Зазвичай захисником є [Concept('армія', 'CONCEPT_PLACEHOLDER')|e] або [Concept('флот', 'CONCEPT_PLACEHOLDER')|e], що першими присутні в [Concept('місцевості', 'CONCEPT_PLACEHOLDER')|e], якщо вони не зайняті [Concept('облогою', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_crossing: "Переправа"
  game_concept_river_crossing: "Річкова переправа"
  game_concept_strait_crossing: "Переправа через протоку"
  game_concept_sea_landing: "Морська висадка"
  game_concept_crossing_desc: "[Concept('Army', 'CONCEPT_PLACEHOLDER')|e], що перетинає річку між двома [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], перетинає [Concept('strait', 'CONCEPT_PLACEHOLDER')|e] або висаджується з [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e], отримає штраф у [Concept('battle', 'CONCEPT_PLACEHOLDER')|e], якщо вона є [Concept('attacker', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_army_experience: "Досвід армії"
  game_concept_navy_experience: "Досвід флоту"
  game_concept_experience: "Досвід"
  game_concept_experience_desc: "Досвід зменшує [Concept('damage_taken', 'CONCEPT_PLACEHOLDER')|e] у [Concept('battle', 'CONCEPT_PLACEHOLDER')|e] і переважно здобувається участю у [battle], [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] або [Concept('blockade', 'CONCEPT_PLACEHOLDER')|e]. З часом досвід [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] повільно зменшуватиметься.\n[regiments] також можуть здобувати досвід за допомогою [ShowUnitAbilityName('drill_army')] [Concept('unit_ability', 'CONCEPT_PLACEHOLDER')|e].\nЗавдяки деяким [Concept('recruitment_methods', 'CONCEPT_PLACEHOLDER')|e] новий підрозділ може починати з вищим рівнем досвіду."
  game_concept_capital: "Столиця"
  game_concept_capital_desc: "Це [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що є політичним центром [Concept('country', 'CONCEPT_PLACEHOLDER')|e], де перебуває [Concept('government', 'CONCEPT_PLACEHOLDER')|e]. Її [Concept('occupied', 'CONCEPT_PLACEHOLDER')|e] у [Concept('war', 'CONCEPT_PLACEHOLDER')|e] може бути руйнівним."
  game_concept_price: "Ціна"
  game_concept_prices: "Ціни"
  game_concept_cost: "Вартість"
  game_concept_costs: "Витрати"
  game_concept_price_desc: "Ціна — це те, що [Concept('country', 'CONCEPT_PLACEHOLDER')|e] платить за діяльність. Ціна може бути [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e], вплив на [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] або інші речі."
  game_concept_unit: "Підрозділ"
  game_concept_units: "Підрозділи"
  game_concept_unit_desc: "Підрозділ може бути або [Concept('army', 'CONCEPT_PLACEHOLDER')|e], або [Concept('navy', 'CONCEPT_PLACEHOLDER')|e]. Він складається з [Concept('sub_units', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_sub_unit: "Підрозділ"
  game_concept_sub_units: "Підрозділи"
  game_concept_sub_unit_desc: "Підрозділи — це окремі війська в [Concept('unit', 'CONCEPT_PLACEHOLDER')|e], які воюють як [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] або як [Concept('ships', 'CONCEPT_PLACEHOLDER')|e]. Вони завжди мають певний [Concept('unit_type', 'CONCEPT_PLACEHOLDER')|e] і як такі належать до [Concept('unit_category', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_distributing_food: "Розподіл їжі"
  game_concept_distribute_food: "Розподілити їжу"
  game_concept_distributing_food_desc: "Це надішле [Concept('food', 'CONCEPT_PLACEHOLDER')|e] з [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] до будь-якої [Concept('army', 'CONCEPT_PLACEHOLDER')|e] у сусідньому [Concept('location', 'CONCEPT_PLACEHOLDER')|e], яка не може отримати [food] зі свого поточного [location] або сусіднього [Concept('supply_depot', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_gathering_food: "Збір їжі"
  game_concept_gather_food: "Зібрати їжу"
  game_concept_gathering_food_desc: "[Concept('Navy', 'CONCEPT_PLACEHOLDER')|e], що збирає їжу, братиме [Concept('food', 'CONCEPT_PLACEHOLDER')|e] з усіх сусідніх [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], до яких вона має [Concept('food_access', 'CONCEPT_PLACEHOLDER')|e], щоб заповнити свою [Concept('food_capacity', 'CONCEPT_PLACEHOLDER')|e]. [Navy] потім може [Concept('distribute_food', 'CONCEPT_PLACEHOLDER')|e] за потреби."
  game_concept_food_source: "Джерело їжі"
  game_concept_food_source_desc: "[Concept('army', 'CONCEPT_PLACEHOLDER')|e] збиратиме їжу з [Concept('province', 'CONCEPT_PLACEHOLDER')|e], де має [Concept('food_access', 'CONCEPT_PLACEHOLDER')|e], дружнє [Concept('supply_depot', 'CONCEPT_PLACEHOLDER')|e] або [Concept('navy', 'CONCEPT_PLACEHOLDER')|e], що [Concept('distributing_food', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_logistics_distance: "Відстань логістики"
  game_concept_logistics_distance_desc: "Це відстань, на яку [Concept('army', 'CONCEPT_PLACEHOLDER')|e] може прокладати свої лінії постачання до [Concept('food_source', 'CONCEPT_PLACEHOLDER')|e]. Армії збиратимуть їжу з [Concept('province', 'CONCEPT_PLACEHOLDER')|e], де мають [Concept('food_access', 'CONCEPT_PLACEHOLDER')|e], дружнє [Concept('supply_depot', 'CONCEPT_PLACEHOLDER')|e] або [Concept('navy', 'CONCEPT_PLACEHOLDER')|e], що [Concept('distributing_food', 'CONCEPT_PLACEHOLDER')|e]. [Concept('hostile', 'CONCEPT_PLACEHOLDER')|e] армія або [Concept('zone_of_control', 'CONCEPT_PLACEHOLDER')|e] блокуватиме це."
  game_concept_military_objective: "Військова ціль"
  game_concept_military_objectives: "Військові цілі"
  game_concept_military_objective_desc: "[Concept('armies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] можуть бути призначені цілі, які вони намагатимуться виконати самостійно."
  game_concept_army: "Армія"
  game_concept_armies: "Армії"
  game_concept_army_desc: "Армія — це група [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] під проводом [Concept('character', 'CONCEPT_PLACEHOLDER')|e], яка може вести [Concept('battles', 'CONCEPT_PLACEHOLDER')|e] та [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] ворожі [Concept('fortifications', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_navy: "Флот"
  game_concept_navies: "Флоти"
  game_concept_navy_desc: "Флоти — це те, що дозволяє [Concept('country', 'CONCEPT_PLACEHOLDER')|e] проектувати силу за межі власної землі. Флоти — це групи [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] під проводом [Concept('character', 'CONCEPT_PLACEHOLDER')|e], які можуть вести [Concept('battles', 'CONCEPT_PLACEHOLDER')|e], [Concept('blockade', 'CONCEPT_PLACEHOLDER')|e] [Concept('hostile', 'CONCEPT_PLACEHOLDER')|e] узбережжя, порушувати ворожу [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e] та транспортувати [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] туди, де вони потрібні. Вони також допомагають з логістикою, оскільки можуть [Concept('distribute_food', 'CONCEPT_PLACEHOLDER')|e] та [Concept('gather_food', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_ship: "Корабель"
  game_concept_ships: "Кораблі"
  game_concept_ship_desc: "Це основний будівельний блок [Concept('navy', 'CONCEPT_PLACEHOLDER')|e]. Корабель — це велике судно, здатне перевозити [Concept('food', 'CONCEPT_PLACEHOLDER')|e], [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] та власний екіпаж. Кожен корабель належить до певного [Concept('ship_type', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_regular_regiment: "Регулярний полк"
  game_concept_regular_regiments: "Регулярні полки"
  game_concept_regular: "Регулярний"
  game_concept_regulars: "Регуляри"
  game_concept_regular_regiment_desc: "Регулярні полки набираються вручну [Concept('country', 'CONCEPT_PLACEHOLDER')|e], найчастіше використовуючи [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] та [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]. Вони формують постійні [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] і досить обмежені в кількості, доки ви не отримаєте [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] з пізніших [Concept('ages', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_regular_ship: "Регулярні кораблі"
  game_concept_regular_ships: "Регулярні кораблі"
  game_concept_regular_ship_desc: "Регулярні кораблі набираються вручну [Concept('country', 'CONCEPT_PLACEHOLDER')|e], використовуючи [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e] та [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]. Вони формують постійні [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] і досить обмежені в кількості, доки ви не отримаєте [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] з пізніших [Concept('ages', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_regiment: "Полк"
  game_concept_regiments: "Полки"
  game_concept_regiment_desc: "Полк є будівельним блоком [Concept('army', 'CONCEPT_PLACEHOLDER')|e]. Кожен має [Concept('maximum_strength', 'CONCEPT_PLACEHOLDER')|e] [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] і належить до певного [Concept('unit_type', 'CONCEPT_PLACEHOLDER')|e]. Вони можуть бути [Concept('army_levy', 'CONCEPT_PLACEHOLDER')|e], [Concept('mercenary', 'CONCEPT_PLACEHOLDER')|e] або [Concept('regular_regiment', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_average_morale: "Середній бойовий дух"
  game_concept_average_morale_desc: "Це середній [Concept('morale', 'CONCEPT_PLACEHOLDER')|e] усіх [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] у [Concept('unit', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_army_morale: "Бойовий дух армії"
  game_concept_navy_morale: "Бойовий дух флоту"
  game_concept_morale: "Бойовий дух"
  game_concept_morale_i: "@morale!"
  game_concept_morale_desc: "Бойовий дух – це те, як довго [Concept('army', 'CONCEPT_PLACEHOLDER')|e] або [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] битиметься, перш ніж здатися.\n\nУ [Concept('battle', 'CONCEPT_PLACEHOLDER')|e] кожен [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] завдає [Concept('morale_damage_done', 'CONCEPT_PLACEHOLDER')|e] своєму супротивнику, ефект чого змінюється [Concept('morale_damage_taken', 'CONCEPT_PLACEHOLDER')|e] супротивника. Як тільки бойовий дух падає до нуля, армія або флот [Concept('retreat', 'CONCEPT_PLACEHOLDER')|e] і програє [battle]."
  game_concept_locked: "Заблоковано"
  game_concept_locked_desc: "[Concept('army', 'CONCEPT_PLACEHOLDER')|e] або [Concept('navy', 'CONCEPT_PLACEHOLDER')|e], що були заблоковані, не можуть отримувати накази. Вам доведеться зачекати, доки ви знову отримаєте доступ до цього підрозділу."
  game_concept_trade_profit: "Торговий прибуток"
  game_concept_trade_profit_desc: "Прибуток від торгівлі в першу чергу залежить від різниці між [Concept('market_prices', 'CONCEPT_PLACEHOLDER')|e] [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] на [Concept('export_market', 'CONCEPT_PLACEHOLDER')|e] та [Concept('import_market', 'CONCEPT_PLACEHOLDER')|e]. Також є витрати на утримання, які зменшать прибуток, а деякі торгові операції можуть бути змушені сплачувати [Concept('sound_toll', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_trade: "Торгівля"
  game_concept_trading: "Торгування"
  game_concept_trades: "Торгові операції"
  game_concept_trade_desc: "Торгова операція – це переміщення [Concept('good', 'CONCEPT_PLACEHOLDER')|e] з одного [Concept('market', 'CONCEPT_PLACEHOLDER')|e] до іншого. Товари купуються на одному ринку, а потім продаються на іншому, сподіваючись принести [Concept('trade_profit', 'CONCEPT_PLACEHOLDER')|e] власнику торгової операції. Обсяг [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e], необхідний для торгової операції, залежить як від відстані між ринками, так і від кількості [goods], яку обробляє торгова операція.\n\n[Concept('trade_income', 'CONCEPT_PLACEHOLDER')|e] розподіляється між Короною та [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] відповідно до їхньої [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Лише відсоток [Concept('crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] надходить до [Concept('treasury', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_import: "Імпорт"
  game_concept_importing: "Імпортування"
  game_concept_imported: "Імпортовано"
  game_concept_imports: "Імпорт"
  game_concept_import_desc: "Імпорт – це [Concept('trade', 'CONCEPT_PLACEHOLDER')|e], що переміщує [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e], збільшуючи [Concept('supply', 'CONCEPT_PLACEHOLDER')|e] цих товарів на цьому ринку."
  game_concept_export: "Експорт"
  game_concept_exporting: "Експортування"
  game_concept_exported: "Експортовано"
  game_concept_exports: "Експорт"
  game_concept_export_desc: "Експорт — це [Concept('trade', 'CONCEPT_PLACEHOLDER')|e], що переміщує [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] з [Concept('market', 'CONCEPT_PLACEHOLDER')|e], збільшуючи [Concept('demand', 'CONCEPT_PLACEHOLDER')|e] на ці товари на цьому ринку.\n\nЯкщо кілька торгових операцій намагаються експортувати одні й ті ж товари, то товари надаються в порядку [Concept('merchant_power', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_trade_income: "Дохід від торгівлі"
  game_concept_trade_income_desc: "Це гроші, отримані від [Concept('trades_with_icon', 'CONCEPT_PLACEHOLDER')|e] при продажу [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] до [Concept('markets_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДохід від торгівлі розподіляється між Короною та [Concept('estates_with_icon', 'CONCEPT_PLACEHOLDER')|e] відповідно до їхньої [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Лише відсоток [Concept('crown_power_with_icon', 'CONCEPT_PLACEHOLDER')|e] надходить до [Concept('treasury', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_trade_expense: "Витрати на торгівлю"
  game_concept_trade_expense_desc: "Це гроші, витрачені на [Concept('trades', 'CONCEPT_PLACEHOLDER')|e], купівлю [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] з [Concept('markets', 'CONCEPT_PLACEHOLDER')|e], а також вартість [Concept('merchant_maintenance', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_burgher_trade: "Торгівля $burghers$"
  game_concept_burgher_trades: "Торгівля $burghers$"
  game_concept_burgher_trade_desc: "[ShowPopTypeName('burghers')] намагатимуться задовольнити потреби в [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e], де розташоване їхнє [Concept('town_or_city', 'CONCEPT_PLACEHOLDER')|e], здійснюючи власні [Concept('trades', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_burghers_exporting: "Експорт $burghers$"
  game_concept_burghers_importing: "Імпорт $burghers$"
  game_concept_common_goods: "Звичайні товари"
  game_concept_base_production: "Базове виробництво"
  game_concept_common_goods_desc: "Деякі [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], як-от [ShowGoodsName('stone')] або [ShowGoodsName('clay')], можуть вироблятися скрізь без потреби в [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e], і це вважається звичайним товаром. Як звичайні $game_concept_goods$, вони потім постачаються на [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_topography: "Топографія"
  game_concept_topography_desc: "Топографія відображає нерівність та висоту місцевості в межах [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Більш рівна топографія, як правило, краща для розвитку [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e], тоді як більш нерівна топографія легша для захисту."
  game_concept_vegetation: "Рослинність"
  game_concept_vegetation_desc: "Рослинність відображає рослинний покрив [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_construction: "Будівництво"
  game_concept_constructions: "Будівництва"
  game_concept_construction_desc: "Процес будівництва чогось у [Concept('location', 'CONCEPT_PLACEHOLDER')|e], наприклад, [Concept('building', 'CONCEPT_PLACEHOLDER')|e], [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [ShowLocationRankName('city')].\n\nБудівництва потребують [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] з [Concept('market', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e], де вони відбуваються. Якщо необхідні [goods] недоступні, [construction] зупиниться."
  game_concept_regular_army: "Регулярна армія"
  game_concept_regular_army_desc: "Відноситься до постійної [Concept('army', 'CONCEPT_PLACEHOLDER')|e], яку має [Concept('country', 'CONCEPT_PLACEHOLDER')|e], за винятком [Concept('levies', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_unit_type: "Тип підрозділу"
  game_concept_ship_type: "Тип корабля"
  game_concept_unit_types: "Типи одиниць"
  game_concept_unit_type_short: "Тип"
  game_concept_unit_types_short: "Типи"
  game_concept_unit_type_desc: "Кожна [Concept('unit_category', 'CONCEPT_PLACEHOLDER')|e] містить безліч варіацій щодо типу. Різні типи походять від [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] або з інших джерел. Тип – це те, що робить одиницю унікальною, і що надає їй її здібності та атрибути. Деякі приклади для [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] включають [ShowUnitDefinitionName('n_cog')], [ShowUnitDefinitionName('n_twodecker')] та [ShowUnitDefinitionName('n_xebec')], тоді як [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] включають [ShowUnitDefinitionName('a_arquebusiers')] та [ShowUnitDefinitionName('a_cavaliers')] серед багатьох інших."
  game_concept_unit_category: "Категорія одиниць"
  game_concept_unit_categories: "Категорії одиниць"
  game_concept_unit_category_short: "Категорія"
  game_concept_unit_categories_short: "Категорії"
  game_concept_unit_category_upper_desc: "[Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] завжди належить до однієї з наступних категорій."
  game_concept_unit_category_list_title: "Список категорій одиниць"
  game_concept_unit_category_desc: "$game_concept_unit_category_upper_desc$\n[ShowDatabase('unit_category')]"
  game_concept_language: "Мова"
  game_concept_languages: "Мови"
  game_concept_language_desc: "Кожна [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] має [language], яку вона може розділяти з іншими [cultures]. [language] має [Concept('language_power', 'CONCEPT_PLACEHOLDER')|e] та будь-яку кількість [Concept('dialects', 'CONCEPT_PLACEHOLDER')|e], які визначають імена [Concept('character', 'CONCEPT_PLACEHOLDER')|e].\n\n [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може мати [Concept('court_language', 'CONCEPT_PLACEHOLDER')|e], [Concept('liturgical_language', 'CONCEPT_PLACEHOLDER')|e] та розділяє свою [Concept('common_language', 'CONCEPT_PLACEHOLDER')|e] зі своєю [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e].\n\nДеякі мови належать до [Concept('language_family', 'CONCEPT_PLACEHOLDER')|e], тоді як інші є [Concept('isolated_language_short', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_isolated_language: "Ізольована мова"
  game_concept_isolated_languages: "Ізольовані мови"
  game_concept_isolated_language_short: "Ізольована"
  game_concept_isolated_language_desc: "[Concept('language', 'CONCEPT_PLACEHOLDER')|e] є [isolated_language_short], коли вона не розділяє [Concept('language_family', 'CONCEPT_PLACEHOLDER')|e] з іншими [languages]."
  game_concept_language_family: "Мовна сім'я"
  game_concept_language_families: "Мовні сім'ї"
  game_concept_language_family_short: "Сім'я"
  game_concept_language_families_short: "Сім'ї"
  game_concept_language_family_desc: "Мовна сім'я – це набір [Concept('languages', 'CONCEPT_PLACEHOLDER')|e], які походять від спільного предка і тому можуть мати багато подібностей.\n\nДеякі [languages] не належать до [language_family_short] і тому є [Concept('isolated_language', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_dialect: "Діалект"
  game_concept_dialects: "Діалекти"
  game_concept_dialect_desc: "[dialect] — це варіант [Concept('language', 'CONCEPT_PLACEHOLDER')|e]. Він здебільшого впливає на назви таких речей, як [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] та [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_language_power: "Мовна сила"
  game_concept_language_power_desc: "Мовна сила відображає охоплення, вплив та престиж [Concept('language', 'CONCEPT_PLACEHOLDER')|e]. Вона виражається у відсотках відносно наймогутнішої Мови у світі.\n\nВона розраховується за загальною [Concept('political_power', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] з [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] у [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], де вона є [Concept('court_language', 'CONCEPT_PLACEHOLDER')|e], та кількістю Духовенства, що сповідує [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e] у Країнах, де вона є [Concept('liturgical_language', 'CONCEPT_PLACEHOLDER')|e].\n\nНаявність [liturgical_language] з високою Мовною силою збільшує швидкість [Concept('research', 'CONCEPT_PLACEHOLDER')|e], тоді як [court_language] з високою Мовною силою збільшує [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] Шляхти."
  game_concept_dominant_language: "Домінантна мова"
  game_concept_dominant_language_desc: "Домінантна мова — це [Concept('language', 'CONCEPT_PLACEHOLDER')|e], якою розмовляє найбільше [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e].\nЦе не обов'язково означає, що вона є більшістю."
  game_concept_dominant_dialect: "Домінантний діалект"
  game_concept_dominant_dialect_desc: "The $game_concept_dominant_dialect$ — це [Concept('dialect', 'CONCEPT_PLACEHOLDER')|e], яким розмовляє найбільше [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e].\nЦе не обов'язково означає, що він є більшістю."
  game_concept_ability: "Здібність"
  game_concept_abilities: "Здібності"
  game_concept_ability_desc: "Здібність відображає різні схильності кожного [Concept('character', 'CONCEPT_PLACEHOLDER')|e]. Значення кожної варіюються від 0 до 100. Новонароджені діти починають з 0 і поступово збільшують свої Здібності в міру дорослішання.\n\nІснує три типи Здібностей:\n - [Concept('adm_short', 'CONCEPT_PLACEHOLDER')|e]\n - [Concept('dip_short', 'CONCEPT_PLACEHOLDER')|e]\n - [Concept('mil_short', 'CONCEPT_PLACEHOLDER')|e]\n\nДодані разом, вони становлять [character]'s [Concept('total_ability', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_liturgical_language: "Літургійна мова"
  game_concept_liturgical_languages: "Літургійні мови"
  game_concept_liturgical_language_desc: "Це офіційна [Concept('language', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('country', 'CONCEPT_PLACEHOLDER')|e] використовує для своєї офіційної [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]. Деякі релігії, як-от [ShowReligionName('catholic')], мають фіксовану $game_concept_liturgical_language$, яку не можна змінити, але інші релігії дозволяють країнам змінювати її. [Concept('language_power', 'CONCEPT_PLACEHOLDER')|e] $game_concept_liturgical_language$ Країни впливає на швидкість, з якою вони [Concept('research', 'CONCEPT_PLACEHOLDER')|e] нові [Concept('advances', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_common_language: "Загальновживана мова"
  game_concept_common_languages: "Загальновживані мови"
  game_concept_common_language_desc: "Це [Concept('language', 'CONCEPT_PLACEHOLDER')|e] [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] у [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Якщо це [Concept('court_language', 'CONCEPT_PLACEHOLDER')|e], то [ShowEstateTypeName('peasants_estate')] будуть задоволені."
  game_concept_market_language: "Ринкова мова"
  game_concept_market_language_desc: "Це [Concept('language', 'CONCEPT_PLACEHOLDER')|e], якою розмовляє більшість [ShowPopTypeName('burghers')] у [Concept('market_center', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_foreign_language: "Іноземна мова"
  game_concept_foreign_language_desc: "[Concept('language', 'CONCEPT_PLACEHOLDER')|e], яка не є ані [Concept('common_language', 'CONCEPT_PLACEHOLDER')|e], ані [Concept('liturgical_language', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e], вважатиметься $game_concept_foreign_language$."
  game_concept_court_language: "Придворна мова"
  game_concept_court_language_desc: "[Concept('language_with_icon', 'CONCEPT_PLACEHOLDER')|e] уряду в [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nПевні Мови можуть впливати на [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] різних [Concept('estates', 'CONCEPT_PLACEHOLDER')|e]:\n$BULLET$[ShowEstateTypeName('nobles_estate')] віддають перевагу високій [Concept('language_power_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n$BULLET$[ShowEstateTypeName('clergy_estate')] віддають перевагу [Concept('liturgical_language_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n$BULLET$[ShowEstateTypeName('peasants_estate')] віддають перевагу [Concept('common_language_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n$BULLET$Використання [Concept('market_language_with_icon', 'CONCEPT_PLACEHOLDER')|e] нашої [capital] збільшить [Concept('trade_efficiency', 'CONCEPT_PLACEHOLDER')|e].\n\nПридворна мова отримує збільшення своєї [language_power] відносно загальної [Concept('political_power', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що належать до [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] Країни.\n\nМи завжди можемо змінити нашу Придворну мову на нашу [common_language] або [liturgical_language], на мову [Concept('great_power', 'CONCEPT_PLACEHOLDER')|e] у нашій [Concept('religion_group', 'CONCEPT_PLACEHOLDER')|e], або на мову нашого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_estates_enrichment: "Збагачення станів"
  game_concept_estate_enrichment: "Збагачення станів"
  game_concept_estates_enrichment_desc: "Це те, скільки [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] може утримувати зі свого оподатковуваного доходу щомісяця."
  game_concept_political_power: "Політична влада"
  game_concept_political_power_desc: "Політична влада — це вплив, який [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] мають у сфері [Concept('government', 'CONCEPT_PLACEHOLDER')|e]. Вона використовується для розрахунку [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] та [Concept('language_power', 'CONCEPT_PLACEHOLDER')|e], а також [Concept('dominant_upper_class_culture', 'CONCEPT_PLACEHOLDER')|e] кожної [Concept('country', 'CONCEPT_PLACEHOLDER')|e].\n\nКожен [pop] має різну кількість Політичної влади залежно від [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], до якого він належить. Наприклад, Поп, що належить до [ShowEstateTypeName('nobles_estate')], природно, має в сотні разів більше Політичної влади, ніж Поп, що належить до [ShowEstateTypeName('peasants_estate')]."
  game_concept_cultural_tradition: "Культурна традиція"
  game_concept_cultural_tradition_short: "Традиція"
  game_concept_cultural_tradition_desc: "Це захисна сила [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] в контексті [Concept('culture_war', 'CONCEPT_PLACEHOLDER')|e], що відображає, наскільки сильно традиції цієї культури резонують з її народом.\n\nТрадиція має щомісячну зміну залежно від відповідних [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e], [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] та багатьох інших факторів."
  game_concept_cultural_influence: "Культурний вплив"
  game_concept_cultural_influence_short: "Вплив"
  game_concept_cultural_influence_desc: "Це атакуюча сила [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] в контексті [Concept('culture_war', 'CONCEPT_PLACEHOLDER')|e], що відображає, наскільки вражаючою вона здається іншим культурам, і її охоплення за межами власних кордонів.\n\nВін щомісячно зростає після завершення [Concept('work_of_art', 'CONCEPT_PLACEHOLDER')|e] і має деяке щомісячне зростання з багатьох джерел, таких як [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e], а також певних [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] та багатьох інших. Але будьте обережні, він також має природний щомісячний спад."
  game_concept_culture_war_power: "Сила культурної війни"
  game_concept_culture_war: "Культурна війна"
  game_concept_culture_war_power_desc: "Це сила [Concept('cultural_influence', 'CONCEPT_PLACEHOLDER')|e] атакуючої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] проти [Concept('cultural_tradition', 'CONCEPT_PLACEHOLDER')|e] цільової [culture].\n\nВисока Сила культурної війни впливає на такі процеси, як [Concept('assimilation', 'CONCEPT_PLACEHOLDER')|e], [Concept('integration', 'CONCEPT_PLACEHOLDER')|e], [Concept('spy_networks', 'CONCEPT_PLACEHOLDER')|e], [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] і навіть [Concept('siege', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_climate: "Клімат"
  game_concept_climate_upper_desc: "Клімат [Concept('location', 'CONCEPT_PLACEHOLDER')|e] впливає на те, наскільки добре [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] можуть там жити, включаючи кількість [Concept('food', 'CONCEPT_PLACEHOLDER')|e], яку можна виробляти. Він також впливає на максимальний [Concept('winter_level', 'CONCEPT_PLACEHOLDER')|e] [location].\n\nІснують такі клімати:"
  game_concept_climate_list_title: "Список типів клімату"
  game_concept_climate_desc: "$game_concept_climate_upper_desc$\n[ShowDatabase('climate')]"
  game_concept_immortality: "Безсмертя"
  game_concept_immortal: "Безсмертний"
  game_concept_immortality_desc: "Коли [Concept('character', 'CONCEPT_PLACEHOLDER')|e] безсмертний, він не помре від старості. Однак він все ще схильний до смерті від інших мирських причин, таких як [Concept('battle', 'CONCEPT_PLACEHOLDER')|e] або щось набагато гірше, як [Concept('disease', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_character: "Персонаж"
  game_concept_characters: "Персонажі"
  game_concept_character_desc: "Персонаж — це окрема [Concept('person', 'CONCEPT_PLACEHOLDER')|e], що володіє [Concept('abilities', 'CONCEPT_PLACEHOLDER')|e], [Concept('traits', 'CONCEPT_PLACEHOLDER')|e], [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] та [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]. Він може навіть належати до [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e], якщо має шляхетне походження.\n\nСтавши [Concept('adult', 'CONCEPT_PLACEHOLDER')|e], він може бути [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] або [Concept('regent', 'CONCEPT_PLACEHOLDER')|e], або може бути призначений на роль у [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e], або як [Concept('general', 'CONCEPT_PLACEHOLDER')|e] чи [Concept('admiral', 'CONCEPT_PLACEHOLDER')|e].\n\n[adults] також можуть [Concept('marry', 'CONCEPT_PLACEHOLDER')|e] та мати [Concept('children', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_courtier: "Придворний"
  game_concept_courtiers: "Придворні"
  game_concept_courtier_desc: "Будь-який [Concept('character', 'CONCEPT_PLACEHOLDER')|e] у [Concept('country', 'CONCEPT_PLACEHOLDER')|e], який не займає певної [Concept('role', 'CONCEPT_PLACEHOLDER')|e], вважається $game_concept_courtier$. $game_concept_courtiers$ можуть бути найняті як [Concept('cabinet_members', 'CONCEPT_PLACEHOLDER')|e], [Concept('generals', 'CONCEPT_PLACEHOLDER')|e], [Concept('admirals', 'CONCEPT_PLACEHOLDER')|e] або [Concept('explorers', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_fertility: "Фертильність"
  game_concept_fertility_desc: "Це впливає на здатність [Concept('character', 'CONCEPT_PLACEHOLDER')|e] завагітніти, якщо вона жінка, або запліднити жінку, якщо він чоловік."
  game_concept_consort: "Консорт"
  game_concept_consorts: "Консорти"
  game_concept_spouse: "Подружжя"
  game_concept_spouses: "Подружжя"
  game_concept_consort_desc: "Консорт — це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], який [Concept('married', 'CONCEPT_PLACEHOLDER')|e] з [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]. У деяких формах урядів вони можуть отримати повноваження, але в більшості випадків вони існують, щоб допомогти забезпечити [Concept('heirs', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_heir: "Спадкоємець"
  game_concept_heirs: "Спадкоємці"
  game_concept_heir_desc: "[Concept('character', 'CONCEPT_PLACEHOLDER')|e], який є наступним у черзі стати [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], коли поточний [ruler] помирає або відрікається. Порядок успадкування визначається [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [Concept('government', 'CONCEPT_PLACEHOLDER')|e].\n\nЯкщо відбувається успадкування, але немає дійсного спадкоємця, або спадкоємець є [Concept('child', 'CONCEPT_PLACEHOLDER')|e], спрацьовує [Concept('regency', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_dynasty: "Династія"
  game_concept_dynasties: "Династії"
  game_concept_dynasty_desc: "Це група персонажів, які мають спільного предка і, таким чином, є кровними родичами. Найважливішим [Concept('character', 'CONCEPT_PLACEHOLDER')|e] в династії є [Concept('dynasty_head', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_dynastic_power: "Династична влада"
  game_concept_dynastic_power_hausmacht: "Hausmacht"
  game_concept_dynastic_power_desc: "$game_concept_dynastic_power$ — це значення політичної влади, яку [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] має в [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]. Вона відіграє важливу роль у [GetUniqueInternationalOrganization('hre').GetName] і розраховується шляхом множення [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e] та володіння [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] в межах [international_organization], які мають [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_dynasty_founder: "Засновник династії"
  game_concept_dynasty_founder_desc: "Засновник [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_dynasty_head: "Голова династії"
  game_concept_dynasty_head_desc: "Це найпрестижніший і найважливіший [Concept('character', 'CONCEPT_PLACEHOLDER')|e] в [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e]. [Concept('dialect', 'CONCEPT_PLACEHOLDER')|e] династії визначається [Concept('dialect', 'CONCEPT_PLACEHOLDER')|e] її $game_concept_dynasty_head$, а деякі [Concept('events', 'CONCEPT_PLACEHOLDER')|e] та інший контент можуть вимагати $game_concept_dynasty_head$."
  game_concept_dynasty_seat: "Династичне осідок"
  game_concept_dynasty_seat_desc: "Кожна династія має свій родовий дім у певній [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Ті [locations], що містять $game_concept_dynasty_seat$, матимуть більше [ShowPopTypeName('nobles')], ніж зазвичай."
  game_concept_lowborn: "Низького походження"
  game_concept_lowborn_desc: "Це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], який не належить до жодної значної [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_government: "Уряд"
  game_concept_government_desc: "Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має Уряд певного [Concept('government_type', 'CONCEPT_PLACEHOLDER')|e], розташований у її [Concept('capital', 'CONCEPT_PLACEHOLDER')|e].\n\nУряди складаються з [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] та [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] і формуються [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e], [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e] та [Concept('laws', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_government_type: "Тип уряду"
  game_concept_government_types: "Типи урядів"
  game_concept_government_type_upper_desc: "$game_concept_government_type$ [Concept('country', 'CONCEPT_PLACEHOLDER')|e] визначає внутрішню структуру його уряду. Найбільш помітно це визначає [Concept('government_power', 'CONCEPT_PLACEHOLDER')|e], яку вони використовують, та доступні їм [Concept('heir_selections', 'CONCEPT_PLACEHOLDER')|e], а також розблоковує специфічні [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e], [Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e] та [Concept('advances', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_government_type_list_title: "Список типів урядів"
  game_concept_government_type_desc: "$game_concept_government_type_upper_desc$\n[ShowDatabase('government_type')]"
  game_concept_international_organization: "Міжнародна організація"
  game_concept_international_organizations: "Міжнародні організації"
  game_concept_international_organization_desc: "Група [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що об'єдналися за якоюсь угодою, іноді спрямованою проти іншої [country]."
  game_concept_international_organization_type: "Тип міжнародної організації"
  game_concept_international_organization_types: "Типи міжнародних організацій"
  game_concept_international_organization_type_upper_title: "$game_concept_international_organization_type$ [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] визначає її загальну структуру, таку як можливі взаємодії з нею або її структура керівництва."
  game_concept_international_organization_type_upper_desc: "Кожна міжнародна організація належить до одного з типів, наведених нижче."
  game_concept_international_organization_type_list_title: "Список типів міжнародних організацій"
  game_concept_international_organization_type_desc: "$game_concept_international_organization_type_upper_title$\n\n$game_concept_international_organization_type_upper_desc$\n[ShowDatabaseWithIcon('international_organization_type')]"
  game_concept_member: "Член"
  game_concept_members: "Члени"
  game_concept_member_desc: "Це [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які є частиною [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_elector: "Виборець"
  game_concept_electors: "Виборці"
  game_concept_electorship: "Виборність"
  game_concept_elector_desc: "Це [Concept('members', 'CONCEPT_PLACEHOLDER')|e], які користуються [Concept('special_status', 'CONCEPT_PLACEHOLDER')|e], що дозволяє їм вирішувати, хто стане наступним [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_imperial_religion: "Імперська релігія"
  game_concept_imperial_religion_imperial: "Імперська"
  game_concept_imperial_religion_desc: "Імперська релігія визначає, яку [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] має сповідувати [Concept('member', 'CONCEPT_PLACEHOLDER')|e], щоб мати можливість бути обраним [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('holy_roman_empire', 'CONCEPT_PLACEHOLDER')|e]. Також можливо, що Імперська релігія може бути або [Concept('religion_group', 'CONCEPT_PLACEHOLDER')|e], або бути повністю скасованою, що робить релігію не вирішальним фактором у процесі голосування."
  game_concept_leader_type: "Тип лідера"
  game_concept_leader_type_desc: "Це визначає, хто насправді є [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]. Існує три типи лідерства для міжнародних організацій:\n- #Y $LEADER_TYPE_CHARACTER$#! - Організацію очолює [Concept('character', 'CONCEPT_PLACEHOLDER')|e] та країна, до якої він належить\n- #Y $LEADER_TYPE_COUNTRY$#! - Організацію очолює визначена [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка залишається при владі, навіть якщо її власний [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] буде замінений\n- #Y $LEADER_TYPE_NONE$#! - Організація перебуває у постійному стані міжцарів'я, і ні [Concept('character', 'CONCEPT_PLACEHOLDER')|e], ні країна не представлятимуть організацію"
  game_concept_leader_change_method: "Метод зміни лідера"
  game_concept_leader_change_method_desc: "Це визначає, як обирається [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]. Існує п'ять методів для цього:\n- #Y $LEADER_CHANGE_METHOD_ROTATION$#! - Поточний лідер стане останнім у черзі на лідерство, коли його термін закінчиться\n- #Y $LEADER_CHANGE_METHOD_VOTE$#! - Лідер буде обраний за допомогою [Concept('leadership_election_resolution', 'CONCEPT_PLACEHOLDER')|e]\n- #Y $LEADER_CHANGE_METHOD_LOTTERY$#! - Лідер буде обраний з можливих кандидатів випадковим чином\n- #Y $LEADER_CHANGE_METHOD_SCORE$#! - Лідер буде обраний динамічно на основі внутрішньої системи балів, специфічної для Міжнародної Організації\n- #Y $LEADER_CHANGE_METHOD_NONE$#! - Умови обрання лідера Міжнародної Організації не визначені, оскільки лідер не потрібен або Міжнародна Організація ще не кодифікувала лідерство"
  game_concept_leader_change_trigger: "Тригер зміни лідера"
  game_concept_leader_change_trigger_desc: "Це визначає, за яких умов змінюється [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]. Існує три тригери, за яких лідер може змінитися:\n- #Y $LEADER_CHANGE_TRIGGER_TYPE_RULER_CHANGE$#! - Щоразу, коли змінюється правитель, розглядається новий лідер для Міжнародної Організації\n- #Y $LEADER_CHANGE_TRIGGER_TYPE_TIMED$#! - Новий лідер Міжнародної Організації розглядається після встановленої кількості місяців\n- #Y $LEADER_CHANGE_TRIGGER_TYPE_NONE$#! - Лідер залишається при владі необмежений час"
  game_concept_leadership_election_resolution: "Резолюція про вибори лідерства"
  game_concept_leadership_election_resolution_desc: "Це спеціальна [Concept('resolution', 'CONCEPT_PLACEHOLDER')|e], яка використовується для визначення того, як обирається [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_candidate: "Кандидат"
  game_concept_candidates: "Кандидати"
  game_concept_candidate_desc: "Це [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], які наразі розглядаються як наступний [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_free_city: "Вільне місто"
  game_concept_free_cities: "Вільні міста"
  game_concept_free_imperial_city: "Вільне імперське місто"
  game_concept_free_imperial_cities: "Вільні імперські міста"
  game_concept_free_city_desc: "$free_city_desc$"
  game_concept_god: "Бог"
  game_concept_gods: "Боги"
  game_concept_goddess: "Богиня"
  game_concept_goddesses: "Богині"
  game_concept_god_desc: "Бог, Богиня або Божество — це надприродна істота, яка є об'єктом поклоніння для будь-якої конкретної релігії, і якій зазвичай приписуються повноваження контролю над певними аспектами всесвіту або людського існування."
  game_concept_avatar: "Аватар"
  game_concept_avatars: "Аватари"
  game_concept_avatar_desc: "Аватари — це різні аспекти, прояви або втілення, які певний [Concept('god', 'CONCEPT_PLACEHOLDER')|e] може приймати в [ShowReligionName('hindu')]."
  game_concept_disease: "Хвороба"
  game_concept_diseases: "Хвороби"
  game_concept_disease_desc: "Хвороба може спустошити наш [Concept('people', 'CONCEPT_PLACEHOLDER')|e]. Різні хвороби мають різні визначені шанси [Concept('outbreak', 'CONCEPT_PLACEHOLDER')|e], методи та ймовірність передачі й рівень смертності. Їхні жахливі наслідки можна зменшити за допомогою [Concept('disease_resistance', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_disease_outbreak: "Спалах хвороби"
  game_concept_disease_outbreaks: "Спалахи хвороби"
  game_concept_outbreak: "Спалах"
  game_concept_disease_outbreak_desc: "Коли [Concept('disease', 'CONCEPT_PLACEHOLDER')|e] спалахує в певній [Concept('location', 'CONCEPT_PLACEHOLDER')|e], вона може поширюватися звідти різними способами...і вона може забрати або не забрати жертв на своєму шляху."
  game_concept_holy_site: "Священне місце"
  game_concept_holy_sites: "Священні місця"
  game_concept_holy_site_desc: "Місце, що становить особливий інтерес для певної [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]. Священне місце може надавати різні бонуси [Concept('location', 'CONCEPT_PLACEHOLDER')|e] або [Concept('owner', 'CONCEPT_PLACEHOLDER')|e], які масштабуються його [Concept('holy_site_importance_short', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_holy_site_type: "Тип священного місця"
  game_concept_holy_site_types: "Типи священних місць"
  game_concept_holy_site_type_short: "Тип"
  game_concept_holy_site_types_short: "Типи"
  game_concept_holy_site_type_upper_desc: "Кожне [Concept('holy_site', 'CONCEPT_PLACEHOLDER')|e] належить до одного з наведених нижче типів."
  game_concept_holy_site_type_list_title: "Список типів священних місць"
  game_concept_holy_site_type_desc: "$game_concept_holy_site_type_upper_desc$\n[ShowDatabase('holy_site_type')]"
  game_concept_holy_site_importance: "$game_concept_holy_site$ $game_concept_holy_site_importance_short$"
  game_concept_holy_site_importance_short: "Важливість"
  game_concept_holy_site_importance_desc: "$game_concept_holy_site_importance_short$ [Concept('holy_site', 'CONCEPT_PLACEHOLDER')|e] масштабує будь-які бонуси, що застосовуються в його [Concept('location', 'CONCEPT_PLACEHOLDER')|e] або [Concept('owner', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_heir_selection: "Закон про спадкування"
  game_concept_heir_selections: "Закони про спадкування"
  game_concept_succession_law: "Закон про спадкування"
  game_concept_heir_selection_desc: "Кожен [Concept('government', 'CONCEPT_PLACEHOLDER')|e] має Закон про спадкування, який визначає, який [Concept('character', 'CONCEPT_PLACEHOLDER')|e] стане наступним [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] після смерті або зречення поточного.\n\nБагато Законів про спадкування визначають [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] до того, як відбудеться спадкування, на основі [Concept('heir_selection_score', 'CONCEPT_PLACEHOLDER')|e] цього персонажа, тоді як інші запускають [Concept('election', 'CONCEPT_PLACEHOLDER')|e].\n\nКожен різний Закон про спадкування має свої власні правила, наприклад, чи може [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] бути з тієї ж [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e], або чи повинен він належати до певних [Concept('estates', 'CONCEPT_PLACEHOLDER')|e].\n\n [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може обрати інший Закон про спадкування; доступні варіанти можуть залежати від таких факторів, як поточний [Concept('government_type', 'CONCEPT_PLACEHOLDER')|e] та будь-які активні [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_heir_selection_score: "Оцінка спадкоємця"
  game_concept_heir_selection_score_short: "Оцінка"
  game_concept_heir_selection_score_desc: "$game_concept_heir_selection_score$ визначає, наскільки [Concept('character', 'CONCEPT_PLACEHOLDER')|e] є бажаним для обрання [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Зазвичай, персонаж з найвищою оцінкою стає новим [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] після спадкування."
  game_concept_eligibility_rules: "Правила спадкоємності"
  game_concept_eligibility_rules_desc: "$game_concept_eligibility_rules$ [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] визначають, які [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] мають право стати [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_election: "Вибори"
  game_concept_elections: "Вибори"
  game_concept_election_desc: "Деякі [Concept('heir_selections', 'CONCEPT_PLACEHOLDER')|e] можуть вимагати виборів, щоб вирішити, який [Concept('character', 'CONCEPT_PLACEHOLDER')|e] має бути наступним [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e].\n\nЗалежно від правил [heir_selection], вибори можуть відбуватися через регулярні проміжки часу або після смерті попереднього [ruler].\n\nЯкщо немає [ruler], то [Concept('government', 'CONCEPT_PLACEHOLDER')|e] тимчасово керуватиметься [Concept('regency', 'CONCEPT_PLACEHOLDER')|e] до завершення виборів."
  game_concept_people: "Люди"
  game_concept_person: "Людина"
  game_concept_people_desc: "Окремі людські істоти. Напіввідновлюваний ресурс, згрупований у [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] або може з'являтися як [Concept('characters', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_population_growth: "Приріст населення"
  game_concept_population_growth_desc: "Приріст населення [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e] пов'язаний з тим, скільки народжується за місяць порівняно з тим, скільки померло. Нестача [Concept('food', 'CONCEPT_PLACEHOLDER')|e], поширення хвороб, [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] або інші лиха можуть збільшити кількість померлих."
  game_concept_pop: "Поп"
  game_concept_pops: "Попи"
  game_concept_pop_desc: "Поп — це група [Concept('people', 'CONCEPT_PLACEHOLDER')|e] однієї [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e], [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] та [Concept('culture', 'CONCEPT_PLACEHOLDER')|e]. Вони мають потреби в різних [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], і їхня [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] впливає на [Concept('location', 'CONCEPT_PLACEHOLDER')|e], в якій вони живуть."
  game_concept_upper_class: "Вищий клас"
  game_concept_upper_class_desc: "Це група [Concept('pop_types', 'CONCEPT_PLACEHOLDER')|e], що належать до одного з [Concept('estates', 'CONCEPT_PLACEHOLDER')|e], які зазвичай мають найбільшу владу в [Concept('country', 'CONCEPT_PLACEHOLDER')|e], і є одним з наступних [pop_types]:\n$BULLET_WITH_TAB$[ShowPopTypeName('nobles')]\n$BULLET_WITH_TAB$[ShowPopTypeName('clergy')]\n$BULLET_WITH_TAB$[ShowPopTypeName('burghers')]"
  game_concept_lower_class: "Нижчий клас"
  game_concept_lower_class_desc: "Це група [Concept('pop_types', 'CONCEPT_PLACEHOLDER')|e], що належать до нижчих верств суспільства, включаючи наступні [pop_types]:\n$BULLET_WITH_TAB$[ShowPopTypeName('peasants')]\n$BULLET_WITH_TAB$[ShowPopTypeName('slaves')]"
  game_concept_promote: "Підвищити"
  game_concept_promoted: "Підвищено"
  game_concept_promotes: "Підвищує"
  game_concept_promotion: "Підвищення"
  game_concept_promote_desc: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [Concept('promote', 'CONCEPT_PLACEHOLDER')|e] з [ShowPopTypeName('peasants')], коли є можливі позиції для них у їхньому [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Попи повинні бути принаймні [Concept('tolerated_culture', 'CONCEPT_PLACEHOLDER')|e], щоб підвищитися."
  game_concept_demoted: "Понижено"
  game_concept_demotion: "Пониження"
  game_concept_demote: "Понизити"
  game_concept_demote_desc: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] понизяться до [ShowPopTypeName('peasants')], якщо їхнього поточного [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e] забагато в їхньому [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_pop_type: "Соціальний клас"
  game_concept_pop_types: "Соціальні класи"
  game_concept_pop_type_upper_desc: "Кожен [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] належить до одного з наведених нижче соціальних класів."
  game_concept_pop_type_list_title: "Список соціальних класів"
  game_concept_pop_type_desc: "$game_concept_pop_type_upper_desc$\n[ShowDatabase('pop_type')]"
  game_concept_good: "Товар"
  game_concept_goods: "Товари"
  game_concept_goods_desc: "Товари можуть бути або [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e], які вирощуються, збираються, видобуваються, заготовляються або полюються, або [Concept('produced_goods', 'CONCEPT_PLACEHOLDER')|e], які переважно створюються в містечках або містах.\n\n[Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e] також є джерелом [Concept('food', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_raw_materials: "Сировина"
  game_concept_raw_material: "Сировинний товар"
  game_concept_raw_materials_desc: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] [Concept('produces', 'CONCEPT_PLACEHOLDER')|e] один тип $game_concept_raw_material$. Кількість, яку вона [produces], залежить від того, наскільки розвинена ця [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Сировина відрізняється від [Concept('produced_goods', 'CONCEPT_PLACEHOLDER')|e] тим, що для її виробництва не потрібні [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], і вона покладається виключно на [Concept('rgo_pops', 'CONCEPT_PLACEHOLDER')|e]. Однак деякі $game_concept_raw_materials$ також можуть вироблятися [buildings]."
  game_concept_produced_goods: "Вироблені товари"
  game_concept_produced_good: "Вироблений товар"
  game_concept_produced_goods_desc: "Це тип [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], що виробляється [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], які працюють у [Concept('building', 'CONCEPT_PLACEHOLDER')|e]. У багатьох випадках ці будівлі потребують [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e] або інших вироблених товарів для функціонування."
  game_concept_rgo: "Р.З.О."
  game_concept_resource_gathering_operations: "Ресурсозбиральні операції"
  game_concept_rgo_desc: "Ініціали $game_concept_resource_gathering_operations$. Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] має [Concept('raw_material', 'CONCEPT_PLACEHOLDER')|e], що створюється з $rgo_mining$, $rgo_farming$, $rgo_gathering$, $rgo_forestry$ або $rgo_hunting$.\n\nКожен рівень $game_concept_rgo$ може [Concept('employ', 'CONCEPT_PLACEHOLDER')|e] до #V 1,000#! [Concept('rgo_pops', 'CONCEPT_PLACEHOLDER')|e], тоді як максимальний рівень залежить від [Concept('development', 'CONCEPT_PLACEHOLDER')|e], [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] та інших речей."
  game_concept_prosperity: "Процвітання"
  game_concept_prosperity_desc: "Процвітання відображає, наскільки процвітаючою та ресурсною є [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Позитивне Процвітання з часом збільшує [Concept('development', 'CONCEPT_PLACEHOLDER')|e] [location] і робить її більш привабливою для [Concept('migration', 'CONCEPT_PLACEHOLDER')|e].\n\nПроцвітання природно зростає з часом, але зменшуватиметься внаслідок низького [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], [Concept('diseases', 'CONCEPT_PLACEHOLDER')|e], [Concept('sieges', 'CONCEPT_PLACEHOLDER')|e], [Concept('occupation', 'CONCEPT_PLACEHOLDER')|e], [Concept('blockades', 'CONCEPT_PLACEHOLDER')|e] або якщо [location] [Concept('looted', 'CONCEPT_PLACEHOLDER')|e] ворожою [Concept('army', 'CONCEPT_PLACEHOLDER')|e]. Негативне Процвітання може мати руйнівні наслідки для [Concept('population', 'CONCEPT_PLACEHOLDER')|e] [location]."
  game_concept_development: "Розвиток"
  game_concept_development_desc: "Розвиток відображає, наскільки оброблена земля і наскільки вона використовується [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що там живуть. Чим вищий розвиток, тим більше людей може там жити, і тим більше її можна експлуатувати."
  game_concept_control: "Контроль"
  game_concept_control_desc: "Контроль, який [Concept('owner', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] має, визначає [Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e], [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e], доступні в [location]. Він також впливає на швидкість [Concept('promotion', 'CONCEPT_PLACEHOLDER')|e], [Concept('assimilation', 'CONCEPT_PLACEHOLDER')|e] та [Concept('conversion', 'CONCEPT_PLACEHOLDER')|e], а також на кількість щомісячної [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] та [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e], яку він надає. Контроль над локацією повільно змінюватиметься до її [Concept('max_control', 'CONCEPT_PLACEHOLDER')|e], тобто Контроль повільно зменшуватиметься, якщо він вищий за Максимальний, або повільно збільшуватиметься, якщо він нижчий за нього.\n\nІснують деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], які збільшують Максимальний контроль, але переважно він залежить від [Concept('proximity', 'CONCEPT_PLACEHOLDER')|e] до [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Прокладання маршруту через [Concept('roads', 'CONCEPT_PLACEHOLDER')|e] або [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e] вздовж наших узбереж збільшує [Concept('proximity', 'CONCEPT_PLACEHOLDER')|e], збільшуючи [max_control] [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_max_control: "Максимальний контроль"
  game_concept_max_control_desc: "[control] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] буде повільно прямувати до свого Максимального Контролю. Основним джерелом Максимального Контролю є [Concept('proximity', 'CONCEPT_PLACEHOLDER')|e], але [Concept('integration_status', 'CONCEPT_PLACEHOLDER')|e] та [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] також відіграють роль.\n\nМаксимальний Контроль Місцевості може бути тимчасово збільшений шляхом розміщення Армії в [Concept('province', 'CONCEPT_PLACEHOLDER')|e], а також за допомогою [ShowCabinetActionName('increase_control_province')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_power_projection: "Проєкція Сили"
  game_concept_power_projection_desc: "[Concept('countries', 'CONCEPT_PLACEHOLDER')|e] з вищою $game_concept_power_projection$ можуть експлуатувати нації з меншою. Якщо наша вища, ніж у іншої нації, то ми зможемо будувати [ShowBuildingTypeName('trade_office')], [ShowBuildingTypeName('slave_center')], [ShowBuildingTypeName('missionary_building')] або інші специфічні будівлі в їхніх [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]. Чим вища наша $game_concept_power_projection$, тим швидше наші [Concept('colonial_charters', 'CONCEPT_PLACEHOLDER')|e] можуть взяти під контроль місцевості. Вища $game_concept_power_projection$ порівняно з іншою країною також зменшує вартість [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] оголошення [Concept('war', 'CONCEPT_PLACEHOLDER')|e] проти них, а також [Concept('war_exhaustion', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_proximity: "Близькість"
  game_concept_proximity_desc: "Близькість — це те, наскільки близько [Concept('location', 'CONCEPT_PLACEHOLDER')|e] знаходиться до [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] свого [Concept('owner', 'CONCEPT_PLACEHOLDER')|e]. Прокладання шляху через [Concept('roads', 'CONCEPT_PLACEHOLDER')|e] або [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e] від [Concept('coastal', 'CONCEPT_PLACEHOLDER')|e] місцевостей збільшує близькість.\n\nБлизькість має прямий вплив на [Concept('control', 'CONCEPT_PLACEHOLDER')|e], який [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може здійснювати над [location]."
  game_concept_output: "Виробляти"
  game_concept_produce: "Виробляє"
  game_concept_produces: "Виробництво"
  game_concept_producing: "Кількість [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], що створюється або [Concept('building', 'CONCEPT_PLACEHOLDER')|e] як [Concept('produced_goods', 'CONCEPT_PLACEHOLDER')|e], або як [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e] з [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_output_desc: "Іноземна Будівля"
  game_concept_foreign_building: "Іноземні Будівлі"
  game_concept_foreign_buildings: "Це [Concept('building', 'CONCEPT_PLACEHOLDER')|e], що належить іншій [Concept('country', 'CONCEPT_PLACEHOLDER')|e], ніж [Concept('owner', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_foreign_building_desc: "Будівля"
  game_concept_building: "Будівлі"
  game_concept_buildings: "Будівлі є унікальними прикладами [Concept('building_types', 'CONCEPT_PLACEHOLDER')|e] в [Concept('location', 'CONCEPT_PLACEHOLDER')|e].\n\nБудівлі мають широкий спектр різних функцій, від збільшення [Concept('supply', 'CONCEPT_PLACEHOLDER')|e] вироблених [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] до розблокування унікальних [Concept('unit_types', 'CONCEPT_PLACEHOLDER')|e]. Їхня ефективність базується на тому, скільки [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] наразі [Concept('employed', 'CONCEPT_PLACEHOLDER')|e] там.\n\nБільшість будівель мають початкову вартість будівництва в [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], а потім створюють додатковий [Concept('demand', 'CONCEPT_PLACEHOLDER')|e] на певні [goods] на [location]'s [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Якщо будівля працює зі збитками, її [Concept('owner', 'CONCEPT_PLACEHOLDER')|e] може [Concept('subsidize', 'CONCEPT_PLACEHOLDER')|e] її.\n\n[Concept('estates', 'CONCEPT_PLACEHOLDER')|e] також можуть будувати будівлі.\n\nБудівлі також можуть бути зруйновані.\n\nБудівля має один або кілька [Concept('production_methods', 'CONCEPT_PLACEHOLDER')|e], які можна змінювати, що впливає на її вихід."
  game_concept_building_desc: "Тип Будівлі"
  game_concept_building_type: "Типи Будівель"
  game_concept_building_types: "Тип Будівлі — це креслення [Concept('building', 'CONCEPT_PLACEHOLDER')|e], що належить до [Concept('building_category', 'CONCEPT_PLACEHOLDER')|e]. Більшість функцій [building] залежать від того, який це Тип Будівлі."
  game_concept_building_type_desc: "Категорія Будівель"
  game_concept_building_category: "Категорії Будівель"
  game_concept_building_categories: "[Concept('building_types', 'CONCEPT_PLACEHOLDER')|e] згруповані в різні Категорії, що в першу чергу служить для ідентифікації схожих."
  game_concept_building_category_desc: "Підтримувані Рівні Будівель"
  game_concept_supported_building_levels: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] має м'яке обмеження на кількість рівнів [Concept('building', 'CONCEPT_PLACEHOLDER')|e], які вона може містити. Перевищення цього ліміту призведе до поступово вищих цін на будівництво.\n\nКількість $game_concept_supported_building_levels$ залежить головним чином від [Concept('location_rank', 'CONCEPT_PLACEHOLDER')|e] та [Concept('development', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e].\n\n[buildings] без працівників не враховуються до ліміту рівня будівлі."
  game_concept_supported_building_levels_desc: "Працевлаштувати"
  game_concept_employ: ""
  game_concept_employed: "Працевлаштовані"
  game_concept_employment: "Працевлаштування"
  game_concept_employ_desc: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] можуть бути працевлаштовані або в [Concept('building', 'CONCEPT_PLACEHOLDER')|e], або в [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e]. Будівля може підтримувати лише один [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e], а максимальна кількість залежить від типу будівлі та кількості її рівнів."
  game_concept_unemploy: "Доступне населення"
  game_concept_unemployed: "Доступні"
  game_concept_available: "Доступні"
  game_concept_available_population: "Доступне населення"
  game_concept_unemploy_desc: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] можуть бути [Concept('employed', 'CONCEPT_PLACEHOLDER')|e] або в [Concept('building', 'CONCEPT_PLACEHOLDER')|e], або в [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e]. Ті, хто цього не робить, вважаються $game_concept_available$."
  game_concept_foreign: "Іноземні"
  game_concept_foreign_desc: "Це [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що не належить [Concept('country', 'CONCEPT_PLACEHOLDER')|e], за яку ви граєте."
  game_concept_estate: "Стан"
  game_concept_estates: "Стани"
  game_concept_estate_type: "Тип стану"
  game_concept_estate_types: "Типи станів"
  game_concept_estate_desc: "Особливі групи інтересів у [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e], Стани мають [Concept('estate_power_with_icon', 'CONCEPT_PLACEHOLDER')|e], що представляє їхню політичну силу в уряді, [Concept('estate_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e], що представляє, наскільки добре задовольняються їхні потреби, та [Concept('estate_opinions', 'CONCEPT_PLACEHOLDER')|e] щодо інших Країн.\n\nСтани також можуть мати [Concept('estate_privileges_with_icon', 'CONCEPT_PLACEHOLDER')|e], які є особливими правами, що збільшують їхню владу і можуть бути надані або відкликані урядом. Натомість [estates] надають [Concept('taxes_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('army_levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies_with_icon', 'CONCEPT_PLACEHOLDER')|e] своїй [country].\n\nСтани збирають [Concept('tax_base_with_icon', 'CONCEPT_PLACEHOLDER')|e] з [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e], а також частину прибутку від [Concept('trade', 'CONCEPT_PLACEHOLDER')|e], і використовують це багатство для будівництва [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] та оплати [Concept('pop_needs_with_icon', 'CONCEPT_PLACEHOLDER')|e]. Якщо їхня [estate_satisfaction] низька, вони будуватимуть лише станові будівлі для підтримки власної [estate_power].\n\nКожен [Concept('character_with_icon', 'CONCEPT_PLACEHOLDER')|e] належить до одного зі Станів і збільшує його владу, коли призначається до [Concept('cabinet_with_icon', 'CONCEPT_PLACEHOLDER')|e] або командує [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navies', 'CONCEPT_PLACEHOLDER')|e]. Деякі [Concept('heir_selections', 'CONCEPT_PLACEHOLDER')|e] обмежують своїх [Concept('heirs', 'CONCEPT_PLACEHOLDER')|e] певними станами."
  game_concept_estate_opinion: "Думка стану"
  game_concept_estate_opinions: "Думки станів"
  game_concept_estate_opinion_desc: "Стани в [Concept('country', 'CONCEPT_PLACEHOLDER')|e] матимуть думки про інші Країни, тобто, до яких бути [Concept('hostile', 'CONCEPT_PLACEHOLDER')|e], а з якими дружити, все для задоволення власних потреб."
  game_concept_food: "Їжа"
  game_concept_food_desc: "Те, чим марширують [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] і чим виживають [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]. Без $game_concept_food$ армії страждатимуть від [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e], а $game_concept_pops$ — від [Concept('starvation', 'CONCEPT_PLACEHOLDER')|e]. [Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e] є основним джерелом $game_concept_food$, хоча деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] також відіграють роль.\n\nІснує 3 рівні, задіяні у виробництві та розподілі $game_concept_food$:\n\n@location! [Concept('local_food', 'CONCEPT_PLACEHOLDER')|e]:\n$game_concept_food$ виробляється та споживається в [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], і будь-який надлишок або дефіцит додається до $game_concept_provincial_food$.\n\n@province! [Concept('provincial_food', 'CONCEPT_PLACEHOLDER')|e]:\n$game_concept_provincial_food$ є найважливішим рівнем. Якщо [Concept('province', 'CONCEPT_PLACEHOLDER')|e] не виробляє достатньо $game_concept_food$ для підтримки споживання всіх своїх $game_concept_locations$, провінційне сховище зменшиться. Коли воно вичерпається, всі $game_concept_locations$ у $game_concept_province$ страждатимуть від [Concept('starvation', 'CONCEPT_PLACEHOLDER')|e]. Але перш ніж це станеться, $game_concept_province$ спробує [Concept('buy_food', 'CONCEPT_PLACEHOLDER')|e] зі свого $game_concept_market$.\n\n@market! [Concept('market_food', 'CONCEPT_PLACEHOLDER')|e]:\nВсі $game_concept_provinces$ у [Concept('market', 'CONCEPT_PLACEHOLDER')|e] намагатимуться [Concept('sell_food', 'CONCEPT_PLACEHOLDER')|e], коли їхнє сховище повне, і намагатимуться [buy_food], коли воно низьке. Поки в $game_concept_market$ достатньо $game_concept_food$, ніхто не голодуватиме."
  game_concept_monthly_food: "Щомісячна їжа"
  game_concept_monthly_food_desc: "Будь-яка [Concept('food', 'CONCEPT_PLACEHOLDER')|e], що не споживається Населенням на території, надходить до сховища [Concept('provincial_food', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_local_food: "Місцева їжа"
  game_concept_local_food_desc: "Це кількість [Concept('food', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('location', 'CONCEPT_PLACEHOLDER')|e] вносить до [Concept('provincial_food', 'CONCEPT_PLACEHOLDER')|e]. Якщо вона негативна, $game_concept_location$ просто візьме $game_concept_food$ з інших $game_concept_locations$ у своїй [Concept('province', 'CONCEPT_PLACEHOLDER')|e].\n\nКожен $game_concept_location$ виробляє певну кількість $game_concept_food$ залежно від його [Concept('subsistence_agriculture', 'CONCEPT_PLACEHOLDER')|e] та його [Concept('food_productivity', 'CONCEPT_PLACEHOLDER')|e], але основна частина виробництва $game_concept_food$ відбувається в $game_concept_locations$ з [Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e].\n\nКожен $game_concept_location$ також матиме певне [Concept('pop_food_consumption', 'CONCEPT_PLACEHOLDER')|e] залежно від [Concept('population', 'CONCEPT_PLACEHOLDER')|e], що там проживає.\n\n[Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e] часто матимуть негативний баланс $game_concept_local_food$, але це не проблема, доки $game_concept_provincial_food$ є позитивним."
  game_concept_provincial_food: "Провінційна їжа"
  game_concept_provincial_food_desc: "Це кількість [Concept('food', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('province', 'CONCEPT_PLACEHOLDER')|e] зберігає. Якщо [Concept('monthly_food', 'CONCEPT_PLACEHOLDER')|e] є негативним, вона з часом вичерпається. Якщо є дефіцит, провінція [Concept('buy_food', 'CONCEPT_PLACEHOLDER')|e] з місцевого [Concept('market', 'CONCEPT_PLACEHOLDER')|e], а якщо є надлишок, вона [Concept('sell_food', 'CONCEPT_PLACEHOLDER')|e].\n\nБудь-яка [food], яка не споживається [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e], надходить до провінційного сховища їжі.\n\nУсі території в провінції можуть брати з цього сховища, щоб годувати своїх мешканців. [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] у провінції також можуть споживати збережену їжу, якщо інакше вони зазнали б [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_market_food: "Ринкова їжа"
  game_concept_market_food_desc: "Кожна [Concept('province', 'CONCEPT_PLACEHOLDER')|e] буде або [Concept('buy_food', 'CONCEPT_PLACEHOLDER')|e], або [Concept('sell_food', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e], до якого вона належить, за ціною, що залежить від кількості $game_concept_food$, що зберігається в [Concept('stockpile', 'CONCEPT_PLACEHOLDER')|e] $game_concept_market$. [Concept('owner', 'CONCEPT_PLACEHOLDER')|e] $game_concept_province$ буде тим, на кого вплине вартість або прибуток від операції, тобто $game_concept_provinces$ з надлишком $game_concept_food$ збільшуватимуть [Concept('income', 'CONCEPT_PLACEHOLDER')|e] $game_concept_owner$, тоді як дефіцит призведе до [Concept('expenses', 'CONCEPT_PLACEHOLDER')|e].\n\nВи можете створювати [Concept('trades', 'CONCEPT_PLACEHOLDER')|e] [Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e] для переміщення $game_concept_food$ між $game_concept_markets$."
  game_concept_pop_food_consumption: "Споживання їжі населенням"
  game_concept_pop_food_consumption_desc: "Це кількість [Concept('food', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] споживатиме щомісяця."
  game_concept_food_productivity: "Продуктивність їжі"
  game_concept_food_productivity_desc: "$game_concept_food_productivity$ [Concept('location', 'CONCEPT_PLACEHOLDER')|e] впливає на те, наскільки ефективно вона виробляє [Concept('food', 'CONCEPT_PLACEHOLDER')|e].\n\nЦе залежить переважно від географії $game_concept_location$, але деякі [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e] та [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] також можуть впливати на неї. [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e] менш ефективні у виробництві $game_concept_food$, ніж [Concept('rural_locations', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_subsistence_agriculture: "Натуральне сільське господарство"
  game_concept_subsistence_agriculture_desc: "[Concept('rgo_pops', 'CONCEPT_PLACEHOLDER')|e], які не зайняті в [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] або [Concept('building', 'CONCEPT_PLACEHOLDER')|e], працюють у $game_concept_subsistence_agriculture$. Вони вироблятимуть їжу в менших кількостях, ніж $game_concept_resource_gathering_operations$, що працюють з [Concept('food_raw_materials', 'CONCEPT_PLACEHOLDER')|e], часто ледь достатньо для задоволення власних потреб. Вважається, що все [Concept('unemployed', 'CONCEPT_PLACEHOLDER')|e] населення займається цією простішою формою збору [Concept('food', 'CONCEPT_PLACEHOLDER')|e], навіть якщо [Concept('location', 'CONCEPT_PLACEHOLDER')|e] має [Concept('raw_material', 'CONCEPT_PLACEHOLDER')|e], яка безпосередньо не пов'язана з [Concept('food', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_starvation: "Голод"
  game_concept_starving: "Голодує"
  game_concept_starving_desc: "Коли [Concept('province', 'CONCEPT_PLACEHOLDER')|e] не має [Concept('food', 'CONCEPT_PLACEHOLDER')|e] у [Concept('provincial_food', 'CONCEPT_PLACEHOLDER')|e], [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] голодуватимуть і помиратимуть.\n\nЦе дає такий ефект:\n[ShowModifierEffect('province_starving')]"
  game_concept_food_raw_material: "Сировина для їжі"
  game_concept_food_raw_materials: "Сировина для їжі"
  game_concept_food_raw_material_desc: "Окрім торгівлі та використання, як інші [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], деякі [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e] також виробляють [Concept('food', 'CONCEPT_PLACEHOLDER')|e]. Вони виробляються в [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] і становлять набагато ефективніше джерело $game_concept_food$, ніж [Concept('subsistence_agriculture', 'CONCEPT_PLACEHOLDER')|e].\n\n$game_concept_food$ також переміщується між [Concept('markets', 'CONCEPT_PLACEHOLDER')|e], коли торгують $game_concept_food_raw_materials$."
  game_concept_food_raw_material_list_title: "Список $game_concept_food_raw_materials$"
  game_concept_selling_food: "Продаж їжі"
  game_concept_sell_food: "Продати їжу"
  game_concept_sell_food_short: "Продати"
  game_concept_selling_food_desc: "Коли [Concept('province', 'CONCEPT_PLACEHOLDER')|e] має надлишок [Concept('food', 'CONCEPT_PLACEHOLDER')|e] і не може більше її зберігати, вона продаватиме її на своєму місцевому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Це можливо лише, якщо провінція не перебуває в [Concept('siege', 'CONCEPT_PLACEHOLDER')|e].\n\n[province] може купувати щомісяця лише стільки [Concept('food', 'CONCEPT_PLACEHOLDER')|e] за раз, скільки становить загальна місткість [Concept('food_stockpile', 'CONCEPT_PLACEHOLDER')|e] [province]."
  game_concept_buying_food: "Купівля їжі"
  game_concept_buy_food: "Купити їжу"
  game_concept_buy_food_short: "Купити"
  game_concept_buying_food_desc: "Коли [Concept('province', 'CONCEPT_PLACEHOLDER')|e] має малу кількість [Concept('food', 'CONCEPT_PLACEHOLDER')|e], вона купуватиме більше на своєму місцевому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Це можливо лише, якщо провінція не перебуває в [Concept('siege', 'CONCEPT_PLACEHOLDER')|e].\n\n[province] може купувати щомісяця лише стільки [Concept('food', 'CONCEPT_PLACEHOLDER')|e] за раз, скільки становить загальна місткість [Concept('food_stockpile', 'CONCEPT_PLACEHOLDER')|e] [province]."
  game_concept_food_stockpile: "Запас їжі"
  game_concept_food_stockpile_desc: "Щомісячний надлишок [Concept('food', 'CONCEPT_PLACEHOLDER')|e] з @location! [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] зберігається у Сховищі @province! [Concept('province', 'CONCEPT_PLACEHOLDER')|e]. Щомісячний надлишок [food] з [provinces] зберігається у Сховищі @market! [Concept('market', 'CONCEPT_PLACEHOLDER')|e].\n\nДостатньо велике [food_stockpile] може допомогти запобігти [Concept('starvation', 'CONCEPT_PLACEHOLDER')|e] під час суворої [Concept('winter', 'CONCEPT_PLACEHOLDER')|e], коли [Concept('food_productivity', 'CONCEPT_PLACEHOLDER')|e] низька.\n\nВищий $game_concept_food_stockpile$ у @province! [Concept('province', 'CONCEPT_PLACEHOLDER')|e] також дозволяє йому [Concept('buy_food', 'CONCEPT_PLACEHOLDER')|e] та [Concept('sell_food', 'CONCEPT_PLACEHOLDER')|e] у більших кількостях щомісяця."
  game_concept_construction_material: "Будівельний матеріал"
  game_concept_construction_materials: "Будівельні матеріали"
  game_concept_construction_material_desc: "$game_concept_construction_materials$ — це [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e], які відіграють значну роль у [Concept('construction', 'CONCEPT_PLACEHOLDER')|e] [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]. Вони виробляються у [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] і зазвичай є основними для розвитку [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_construction_material_list_title: "Список $game_concept_construction_materials$"
  game_concept_loan: "Позика"
  game_concept_loaned: "Позичено"
  game_concept_lent: "Позичив"
  game_concept_lend: "Позичати"
  game_concept_lends: "Позичає"
  game_concept_loans: "Позики"
  game_concept_loan_desc: "Позика — це сума [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], яка була позичена у [Concept('lender', 'CONCEPT_PLACEHOLDER')|e] і яку потрібно буде повернути з щомісячними [Concept('interest', 'CONCEPT_PLACEHOLDER')|e]. Позика може бути корисною, коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] негайно потребує [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]. Взяття позики збільшить [Concept('debt', 'CONCEPT_PLACEHOLDER')|e] [country]."
  game_concept_loan_capacity: "Кредитоспроможність"
  game_concept_loan_capacity_desc: "Це сума грошей, яку [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може [Concept('lend', 'CONCEPT_PLACEHOLDER')|e] зі своїх внутрішніх джерел. [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] можуть інвестувати в це і отримуватимуть усі [Concept('interest', 'CONCEPT_PLACEHOLDER')|e], які [Concept('country', 'CONCEPT_PLACEHOLDER')|e] сплачує за ці позики. Деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e] також можуть впливати на це."
  game_concept_interest: "Відсоток"
  game_concept_interest_desc: "Це плата, яку має кожна [Concept('loan', 'CONCEPT_PLACEHOLDER')|e] і яка сплачується щомісяця [Concept('lender', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_debt: "Борг"
  game_concept_debts: "Борги"
  game_concept_debt_desc: "Це загальна сума [Concept('loans', 'CONCEPT_PLACEHOLDER')|e], яку має країна, включаючи будь-які залишки [Concept('interest', 'CONCEPT_PLACEHOLDER')|e]. Якщо цей борг зросте занадто великим, [Concept('country', 'CONCEPT_PLACEHOLDER')|e] збанкрутує."
  game_concept_lender: "Кредитор"
  game_concept_lender_desc: "Це або банк, що позичає [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] для отримання [Concept('interest', 'CONCEPT_PLACEHOLDER')|e] на нього, або інша [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка його позичає."
  game_concept_borrower: "Позичальник"
  game_concept_borrower_desc: "Це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка винна [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] і повинна сплачувати [Concept('interest', 'CONCEPT_PLACEHOLDER')|e] за нього, зазвичай іншій [Concept('country', 'CONCEPT_PLACEHOLDER')|e] або [Concept('estate', 'CONCEPT_PLACEHOLDER')|e]."
  adm_concept: "[Concept('adm', 'CONCEPT_PLACEHOLDER')|e]"
  dip_concept: "[Concept('dip', 'CONCEPT_PLACEHOLDER')|e]"
  mil_concept: "[Concept('mil', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_adm: "Адміністративна здатність"
  game_concept_adm_short: "Адміністративна"
  game_concept_adm_i: "@adm!"
  game_concept_adm_desc: "Ця [Concept('здатність', 'CONCEPT_PLACEHOLDER')|e] відображає, наскільки добре [Concept('персонаж', 'CONCEPT_PLACEHOLDER')|e] справляється з адміністративними завданнями, наскільки вправно він організовує справи, керує економікою та забезпечує функціонування країни."
  game_concept_dip: "Дипломатична здатність"
  game_concept_dip_short: "Дипломатична"
  game_concept_dip_i: "@dip!"
  game_concept_dip_desc: "Ця [Concept('здатність', 'CONCEPT_PLACEHOLDER')|e] відображає, наскільки добре [Concept('персонаж', 'CONCEPT_PLACEHOLDER')|e] вміє переконувати інших чинити певні дії. Вона також відображає, наскільки [Concept('персонаж', 'CONCEPT_PLACEHOLDER')|e] є шанованим."
  game_concept_mil: "Військова здатність"
  game_concept_mil_short: "Військова"
  game_concept_mil_i: "@mil!"
  game_concept_mil_desc: "Ця [Concept('здатність', 'CONCEPT_PLACEHOLDER')|e] відображає, наскільки добре [Concept('персонаж', 'CONCEPT_PLACEHOLDER')|e] розуміється на військових аспектах життя, як він розуміє тактику та як приймає складні рішення."
  game_concept_inflation: "Інфляція"
  game_concept_inflation_i: "@inflation!"
  game_concept_inflation_desc: "Інфляція відображає зростання всіх цін у грі. Вона зростає від [Concept('карбування', 'CONCEPT_PLACEHOLDER')|e] більшої кількості золота для збільшення нашого [Concept('доходу', 'CONCEPT_PLACEHOLDER')|e], і ми можемо зменшити її за допомогою [Concept('дії_кабінету', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_stability: "Стабільність"
  game_concept_stability_i: "@stability!"
  game_concept_stability_desc: "Стабільність є мірою внутрішнього миру [Concept('країни', 'CONCEPT_PLACEHOLDER')|e]. Якщо вона негативна, то це відображає заворушення, а якщо позитивна — спокій. З часом стабільність буде прагнути до #Y 0#!, якщо на неї не впливатимуть інші чинники. Розпочинання [Concept('війн', 'CONCEPT_PLACEHOLDER')|e] є однією з дій, що зменшить стабільність країни."
  game_concept_prestige: "Престиж"
  game_concept_prestige_i: "@prestige!"
  game_concept_prestige_desc: "Престиж [Concept('країни', 'CONCEPT_PLACEHOLDER')|e] — це те, наскільки добре цю країну сприймають. [Concept('Культурний_вплив', 'CONCEPT_PLACEHOLDER')|e] її [Concept('основної_культури', 'CONCEPT_PLACEHOLDER')|e] збільшується завдяки йому, і це полегшує ведення [Concept('дипломатії', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_war_exhaustion: "Втома від війни"
  game_concept_war_exhaustion_i: "@war_exhaustion!"
  game_concept_war_exhaustion_desc: "Втома від війни відображає, наскільки наша [Concept('країна', 'CONCEPT_PLACEHOLDER')|e] була спустошена [Concept('війною', 'CONCEPT_PLACEHOLDER')|e]. Якщо вона достатньо висока, ми будемо змушені підписати [Concept('мирний_договір', 'CONCEPT_PLACEHOLDER')|e]. Це наслідки при 1 $game_concept_war_exhaustion$:\n[ShowAutoModifierEffect('war_exhaustion_impact')]"
  game_concept_exile: "У вигнанні"
  game_concept_exiled: "Вигнаний"
  game_concept_exile_desc: "[Concept('army', 'CONCEPT_PLACEHOLDER')|e] або [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] може бути відправлено у вигнання, що означає, що воно не зможе облягати або битися з будь-якими [Concept('units', 'CONCEPT_PLACEHOLDER')|e], доки ми не перемістимо його назад на дружню територію. Це відбувається, коли вони знаходяться на території, до якої вони більше не мають доступу, зазвичай після підписання [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_retreat: "Відступ"
  game_concept_retreats: "Відступи"
  game_concept_retreating: "Відступає"
  game_concept_retreat_desc: "[Concept('army', 'CONCEPT_PLACEHOLDER')|e] або [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] може бути змушене відступити через програш у битві, через занадто низький [Concept('morale', 'CONCEPT_PLACEHOLDER')|e], або добровільно вирішити [Concept('retreat', 'CONCEPT_PLACEHOLDER')|e]. Під час відступу воно не зможе знову битися або отримувати нові накази, доки не досягне свого призначення."
  game_concept_army_tradition: "Армійська традиція"
  game_concept_army_tradition_i: "@army_tradition!"
  game_concept_army_tradition_desc: "Це відображає накопичений досвід [Concept('armies', 'CONCEPT_PLACEHOLDER')|e], [Concept('battles', 'CONCEPT_PLACEHOLDER')|e] та [Concept('sieges', 'CONCEPT_PLACEHOLDER')|e], які має [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_navy_tradition: "Флотська традиція"
  game_concept_navy_tradition_i: "@navy_tradition!"
  game_concept_navy_tradition_desc: "Це відображає накопичений досвід [Concept('navies', 'CONCEPT_PLACEHOLDER')|e], їхніх [Concept('battles', 'CONCEPT_PLACEHOLDER')|e], [Concept('blockades', 'CONCEPT_PLACEHOLDER')|e] та всіх інших аспектів, пов'язаних з флотом, які має [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_recruit: "Набір"
  game_concept_recruiting: "Набір військ"
  game_concept_recruit_desc: "Набір військ – це процес виставлення [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] як [Concept('units', 'CONCEPT_PLACEHOLDER')|e] на карті. Зазвичай це має вартість у [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] та [Concept('demand', 'CONCEPT_PLACEHOLDER')|e] на [Concept('goods', 'CONCEPT_PLACEHOLDER')|e]. Зрештою, вершник без коня навряд чи може називатися вершником."
  game_concept_recruitment_method: "Метод набору"
  game_concept_recruitment_methods: "Методи набору"
  game_concept_recruitment_method_desc: "Ми можемо вирішити, чи хочемо витратити більше часу на навчання наших військ, щоб підвищити їхній [Concept('experience', 'CONCEPT_PLACEHOLDER')|e], чи хочемо швидше підготувати [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e], але з нижчою [Concept('maximum_strength', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_age: "Епоха"
  game_concept_ages: "Епохи"
  game_concept_age_upper_desc: "Гра поділена на кілька епох, зазвичай по одній на століття. Кожна епоха має свої правила та механіки, і кожна має власне дерево [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], які можна розвивати."
  game_concept_age_lower_desc: "На початку кожної епохи ми обираємо наш фокус між [adm_short], [dip_short] або [mil_short] Фокусом, що впливає на те, яким буде дерево розвитку нашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e] для цієї епохи."
  game_concept_age_list_title: "Список епох"
  game_concept_age_desc: "$game_concept_age_upper_desc$\n\n[ShowDatabase('age')]\n\n$game_concept_age_lower_desc$"
  game_concept_institution: "Інституція"
  game_concept_institutions: "Інституції"
  game_concept_institution_desc: "Кожна [Concept('age', 'CONCEPT_PLACEHOLDER')|e] має три різні інституції, що з'являться у відповідній [Concept('location', 'CONCEPT_PLACEHOLDER')|e] на мапі. Потім вони поширюватимуться мапою, і коли [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] [Concept('embrace', 'CONCEPT_PLACEHOLDER')|e] їх, вони відкривають нові [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] для цієї епохи.\n\nЯкщо ми виявимо, що Інституція поширюється недостатньо швидко до нашої [country], ми можемо спробувати [ShowCabinetActionName('study_institutions')]."
  game_concept_embrace: "Прийняти"
  game_concept_embraced: "Прийнято"
  game_concept_embrace_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e] може [Concept('embrace', 'CONCEPT_PLACEHOLDER')|e] [Concept('institution', 'CONCEPT_PLACEHOLDER')|e], коли достатньо [Concept('population', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] проживає в [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], де вона повністю поширилася. Це означає, що країна повністю зрозуміла [institution] і може [Concept('research', 'CONCEPT_PLACEHOLDER')|e] [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], що на неї покладаються."
  game_concept_advance: "Досягнення"
  game_concept_advances: "Досягнення"
  game_concept_advance_desc: "Досягнення представляють ідеї, винаходи, технології та інші сфери людського знання.\n\nЛише одне Досягнення може бути [Concept('researched', 'CONCEPT_PLACEHOLDER')|e] одночасно, і швидкість, з якою [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може їх досліджувати, залежить від її [Concept('research_progress_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nЗ кожною [Concept('age', 'CONCEPT_PLACEHOLDER')|e] нові Досягнення стають доступними для [countries]. Деякі є ексклюзивними для певних [countries], [Concept('cultures', 'CONCEPT_PLACEHOLDER')|e] або [Concept('religions', 'CONCEPT_PLACEHOLDER')|e], але більшість просто вимагають [Concept('embraced', 'CONCEPT_PLACEHOLDER')|e] відповідні [Concept('institutions_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nШвидкість, з якою ми просуваємося до нових [Concept('advances_with_icon', 'CONCEPT_PLACEHOLDER')|e], залежить головним чином від сили нашої [Concept('liturgical_language_with_icon', 'CONCEPT_PLACEHOLDER')|e], середньої [Concept('literacy_with_icon', 'CONCEPT_PLACEHOLDER')|e] наших [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] нашого [ShowEstateTypeName('clergy_estate')] та кількості [Concept('institutions_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ми [Concept('embraced', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_research: "Дослідження"
  game_concept_researched: "Досліджено"
  game_concept_researching: "Дослідження"
  game_concept_research_desc: "Дослідження [Concept('advance', 'CONCEPT_PLACEHOLDER')|e] займає час, і [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може досліджувати лише одне досягнення одночасно. Ми отримуємо перевагу від досягнення, коли наш [Concept('research_progress', 'CONCEPT_PLACEHOLDER')|e] досягає вартості досягнення.\n\nШвидкість, з якою ми просуваємося до нових [Concept('advances_with_icon', 'CONCEPT_PLACEHOLDER')|e], залежить головним чином від сили нашої [Concept('liturgical_language_with_icon', 'CONCEPT_PLACEHOLDER')|e], середньої [Concept('literacy_with_icon', 'CONCEPT_PLACEHOLDER')|e] наших [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] нашого [ShowEstateTypeName('clergy_estate')] та кількості [Concept('institutions_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ми [Concept('embraced', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_research_progress: "Прогрес дослідження"
  game_concept_research_progress_desc: "Наш [Concept('research', 'CONCEPT_PLACEHOLDER')|e] прогрес залежить головним чином від сили нашої [Concept('liturgical_language_with_icon', 'CONCEPT_PLACEHOLDER')|e], середньої [Concept('literacy_with_icon', 'CONCEPT_PLACEHOLDER')|e] наших [Concept('pops_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] нашого [ShowEstateTypeName('clergy_estate')] та кількості [Concept('institutions_with_icon', 'CONCEPT_PLACEHOLDER')|e], які ми [Concept('embraced', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_stored_research: "Збережений прогрес дослідження"
  game_concept_stored_research_desc: "Збережений $game_concept_research_progress$ накопичується, коли не вибрано жодного [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]. Збережене дослідження миттєво застосовується, щойно [Concept('advance', 'CONCEPT_PLACEHOLDER')|e] вибрано."
  game_concept_literacy: "Грамотність"
  game_concept_literacy_desc: "Це те, наскільки добре наше [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] вміє читати та писати. Це переважно корисно, оскільки середня грамотність у нашій країні позитивно впливає на наш [Concept('research_progress', 'CONCEPT_PLACEHOLDER')|e], але також збільшує вплив [Concept('market_price', 'CONCEPT_PLACEHOLDER')|e] їхніх потреб на [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_artillery_bonus: "Бонус артилерії"
  game_concept_artillery_bonus_desc: "Артилерійські [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] мають силу бомбардувати [Concept('fortifications', 'CONCEPT_PLACEHOLDER')|e] своїми гарматами. Сила залежить від їхнього [Concept('artillery_barrage', 'CONCEPT_PLACEHOLDER')|e] та рівня [Concept('fort', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_artillery_barrage: "Артилерійський обстріл"
  game_concept_artillery_barrage_desc: "Якщо це вище за рівень [Concept('fort', 'CONCEPT_PLACEHOLDER')|e] під час [Concept('siege', 'CONCEPT_PLACEHOLDER')|e], це може дати бонус нападнику!"
  game_concept_estate_privilege: "Привілей стану"
  game_concept_estate_privileges: "Привілеї станів"
  game_concept_privileges: "Привілеї"
  game_concept_privilege: "Привілей"
  game_concept_estate_privilege_desc: "[Concept('Правитель', 'CONCEPT_PLACEHOLDER')|e] може часом надавати певні привілеї певним групам людей. Це можуть бути податкові пільги, монополії або інші права, що надають перевагу цьому конкретному [Concept('стану', 'CONCEPT_PLACEHOLDER')|e]. Зазвичай вони коштують короні, чи то владою [стану], чи то іншою ціною."
  game_concept_supply_depot: "Склад постачання"
  game_concept_supply_depots: "Склади постачання"
  game_concept_supply_depot_desc: "[Concept('Армії', 'CONCEPT_PLACEHOLDER')|e] можуть створювати Склади постачання у [Concept('ворожих', 'CONCEPT_PLACEHOLDER')|e] [Concept('місцевостях', 'CONCEPT_PLACEHOLDER')|e], де вони можуть розміщувати та зберігати [Concept('їжу', 'CONCEPT_PLACEHOLDER')|e]. [Concept('Дружні', 'CONCEPT_PLACEHOLDER')|e] армії можуть потім використовувати ці запаси на відстані до #V 2#! [місцевостей]."
  game_concept_unit_ability: "Здібність загону"
  game_concept_unit_abilities: "Здібності загонів"
  game_concept_unit_ability_desc: "Це назва для наказів, як-от [ShowUnitAbilityName('drill_army')] або [ShowUnitAbilityName('march_to_sound_of_guns')], які можуть бути надані [Concept('загонам', 'CONCEPT_PLACEHOLDER')|e]. Деякі з них є миттєвими діями, інші — станом, який можна вмикати або вимикати."
  game_concept_character_interaction: "Взаємодія з персонажем"
  game_concept_character_interactions: "Взаємодії з персонажами"
  game_concept_character_interaction_desc: "Це [Concept('дії', 'CONCEPT_PLACEHOLDER')|e], які ми можемо виконувати з [Concept('персонажем', 'CONCEPT_PLACEHOLDER')|e]. Приклади включають [ShowCharacterInteractionName('marry_noble')], [ShowCharacterInteractionName('seppuku')] або [ShowCharacterInteractionName('resign_as_grand_master')]"
  game_concept_integration_status: "Статус інтеграції"
  game_concept_integration_status_desc: "Це відображає, наскільки добре [Concept('місцевість', 'CONCEPT_PLACEHOLDER')|e] інтегрована в адміністративний апарат свого [Concept('власника', 'CONCEPT_PLACEHOLDER')|e]. Кожна [належна] [місцевість] має один із чотирьох різних статусів:\n\n$BULLET$[Concept('colonized', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET$[Concept('conquered', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET$[Concept('integrated', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET$[Concept('core', 'CONCEPT_PLACEHOLDER')|e]\n\nБудь-яка [Concept('завойована] [місцевість] може бути [інтегрована] за допомогою [дії_кабінету', 'CONCEPT_PLACEHOLDER')|e], але досягнення [Concept('основного] статусу вимагає значної частки [населення', 'CONCEPT_PLACEHOLDER')|e] [Concept('основної_культури', 'CONCEPT_PLACEHOLDER')|e] або будь-якої з [Concept('прийнятих_культур', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_integration_status_desc_intro: "Це відображає, наскільки добре [Concept('місцевість', 'CONCEPT_PLACEHOLDER')|e] інтегрована в адміністративний апарат свого [Concept('власника', 'CONCEPT_PLACEHOLDER')|e]. Кожна [належна] [місцевість] має один із чотирьох різних статусів:"
  game_concept_integration_status_list: "$BULLET$[Concept('colonized', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET$[Concept('conquered', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET$[Concept('integrated', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET$[Concept('core', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_integration_status_lower_desc: "Будь-яка [Concept('завойована] [місцевість] може бути [інтегрована] за допомогою [дії_кабінету', 'CONCEPT_PLACEHOLDER')|e], але досягнення [Concept('основного] статусу вимагає значної частки [населення', 'CONCEPT_PLACEHOLDER')|e] [Concept('основної_культури', 'CONCEPT_PLACEHOLDER')|e] або будь-якої з [Concept('прийнятих_культур', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_integration: "Інтеграція"
  game_concept_integrated: "Інтегрований"
  game_concept_integrate: "Інтегрувати"
  game_concept_integrating: "Інтегрування"
  game_concept_integration_list_title: "Інтегрована [місцевість] отримує такі ефекти:"
  game_concept_integration_list: "[ShowModifierEffect('integration_integrated')]"
  game_concept_integration_desc: "Інтегрована [Concept('місцевість', 'CONCEPT_PLACEHOLDER')|e] була належним чином включена до Держави, і тому нею набагато легше керувати, ніж [Concept('завойованою', 'CONCEPT_PLACEHOLDER')|e] [Concept('місцевістю].\n\n[Завойовані', 'CONCEPT_PLACEHOLDER')|e] [Concept('місцевості] потрібно Інтегрувати за допомогою [дії_кабінету', 'CONCEPT_PLACEHOLDER')|e], яка спрямована на всю [Concept('провінцію', 'CONCEPT_PLACEHOLDER')|e], і швидкість якої залежить від різних факторів, включаючи кількість [Concept('місцевостей], їхню [культуру', 'CONCEPT_PLACEHOLDER')|e] або їхній [Concept('ранг_місцевості', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_government_reform: "Урядова реформа"
  game_concept_government_reforms: "Урядові реформи"
  game_concept_reforms: "Реформи"
  game_concept_reform: "Реформа"
  game_concept_government_reform_desc: "Охоплюючи все від давніх традицій до прогресивних поправок, Урядові реформи визначають форму правління в [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Кожна з них унікальна, але часто пропонує значні компроміси або відкриває унікальні стилі гри.\n#NL![countries] дозволено лише кілька Урядових реформ, але вони можуть збільшити цю кількість за допомогою певних [Concept('advances', 'CONCEPT_PLACEHOLDER')|e].\n#NL!Деякі реформи є [Concept('major_reforms', 'CONCEPT_PLACEHOLDER')|e]; [country] не може мати більше однієї такої."
  game_concept_major_reform: "Основна реформа"
  game_concept_major_reforms: "Основні реформи"
  game_concept_major_reform_desc: "Основна реформа — це особлива [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e], яка визначає [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. [country] може мати лише одну Основну реформу одночасно."
  game_concept_cabinet_action: "Дія Кабінету"
  game_concept_cabinet_actions: "Дії Кабінету"
  game_concept_cabinet_action_desc: "Член [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] може бути призначений на $game_concept_cabinet_action$. Вони виконуються або до завершення, або доки ми не вирішимо їх змінити. \nДоступні такі дії: \n\n#T $game_concept_adm_short$ $game_concept_actions$ #!\n[ShowCabinetTypeDatabase('adm')] \n\n#T $game_concept_diplomatic_actions$ #!\n[ShowCabinetTypeDatabase('dip')] \n\n#T $game_concept_mil_short$ $game_concept_actions$ #!\n[ShowCabinetTypeDatabase('mil')]"
  game_concept_cabinet_seat: "Місце в Кабінеті"
  game_concept_cabinet_seats: "Місця в Кабінеті"
  game_concept_cabinet_seats_desc: "Це визначає кількість [Concept('cabinet_members', 'CONCEPT_PLACEHOLDER')|e], які [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може одночасно залучати до свого [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]. Певні [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] можуть збільшити кількість доступних $game_concept_cabinet_seats$."
  game_concept_cabinet_efficiency: "Ефективність Кабінету"
  game_concept_cabinet_efficiency_desc: "Це швидкість та ефективність, з якою [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] з [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e] діятимуть, будучи призначеними для виконання [Concept('cabinet_actions', 'CONCEPT_PLACEHOLDER')|e]. На неї впливають [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e] та [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e], а також її можна змінити за допомогою [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e], [Concept('policies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_cabinet: "Кабінет"
  game_concept_cabinet_desc: "$game_concept_cabinet$ — це зібрання вищих посадовців, які допомагають керувати [Concept('country', 'CONCEPT_PLACEHOLDER')|e] за допомогою [Concept('cabinet_actions', 'CONCEPT_PLACEHOLDER')|e]. Кількість [Concept('cabinet_seats', 'CONCEPT_PLACEHOLDER')|e] збільшується за допомогою [Concept('advances', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_cabinet_member: "Член Кабінету"
  game_concept_cabinet_members: "Члени Кабінету"
  game_concept_cabinet_member_desc: "$game_concept_cabinet_member$ — це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], залучений до [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_artist: "Митець"
  game_concept_artists: "Митці"
  game_concept_artist_upper_desc: "Митець — це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], який створює [Concept('works_of_art', 'CONCEPT_PLACEHOLDER')|e]. Митець може бути будь-якого з наведених нижче типів."
  game_concept_artist_list_title: "Список типів митців"
  game_concept_artist_desc: "$game_concept_artist_upper_desc$\n[ShowDatabase('artist')]"
  game_concept_religious_figure: "Релігійна постать"
  game_concept_religious_figures: "Релігійні постаті"
  game_concept_religious_figure_upper_desc: "Релігійна постать — це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], що мандрує світом, приносячи релігійні бонуси до місць, де вона осідає. Їх можуть наймати країни відповідної [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]. Хоча ми можемо безпосередньо слідувати лише одній [Concept('religious_school', 'CONCEPT_PLACEHOLDER')|e], ми можемо запрошувати релігійних постатей інших шкіл, щоб черпати з них натхнення та отримувати деякі їхні переваги. Релігійна постать може бути будь-якого з наведених нижче типів."
  game_concept_religious_figure_list_title: "Список типів релігійних постатей"
  game_concept_religious_figure_desc: "$game_concept_religious_figure_upper_desc$\n[ShowDatabase('religious_figures')]"
  game_concept_invited_religious_figure: "Запрошена релігійна постать"
  game_concept_invited_religious_figures: "Запрошені релігійні постаті"
  game_concept_invite_religious_figure: "Запросити релігійну постать"
  game_concept_work_of_art: "Витвір мистецтва"
  game_concept_works_of_art: "Витвори мистецтва"
  game_concept_work_of_art_desc: "Витвір мистецтва — це щось, створене [Concept('artist', 'CONCEPT_PLACEHOLDER')|e]. Коли мистецтво створюється, воно безпосередньо збільшує [Concept('cultural_influence', 'CONCEPT_PLACEHOLDER')|e] [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e], в якій працює митець. Мистецтво присутнє в [Concept('location', 'CONCEPT_PLACEHOLDER')|e], але може бути знищене або захоплене, якщо це місце стає [Concept('occupied', 'CONCEPT_PLACEHOLDER')|e] будь-яким [Concept('enemy', 'CONCEPT_PLACEHOLDER')|e].\nНаявність мистецтва в нашій [country] приносить користь нашому [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e] та [Concept('cultural_tradition', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_work_of_art_list_title: "Типи витворів мистецтва"
  game_concept_art_quality: "Якість мистецтва"
  game_concept_art_quality_desc: "Якість [Concept('works_of_art', 'CONCEPT_PLACEHOLDER')|e] впливає на те, скільки [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e] та [Concept('cultural_tradition', 'CONCEPT_PLACEHOLDER')|e] воно може надати.\n\n$game_concept_work_of_art$ може мати такі рівні якості, від найнижчого до найвищого:\n$BULLET_WITH_TAB$ $art_quality_bad$\n$BULLET_WITH_TAB$ $art_quality_below_average$\n$BULLET_WITH_TAB$ $art_quality_average$\n$BULLET_WITH_TAB$ $art_quality_above_average$\n$BULLET_WITH_TAB$ $art_quality_good$\n$BULLET_WITH_TAB$ $art_quality_very_good$\n$BULLET_WITH_TAB$ $art_quality_great$\n$BULLET_WITH_TAB$ $art_quality_best$"
  game_concept_legitimacy: "Легітимність"
  game_concept_legitimacy_i: "@legitimacy!"
  game_concept_legitimacy_desc: "Легітимність — це міра того, наскільки прийнятним є правління населенням та станами в їхній [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Це є дуже важливою передумовою для безперебійного функціонування країни — на низьких рівнях ми виявимо, що ніхто не хоче з нами працювати, і можуть спалахнути повстання, намагаючись встановити [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], якого вони вважають більш прийнятним."
  game_concept_republican_tradition: "Республіканська традиція"
  game_concept_republican_tradition_i: "@republican_tradition!"
  game_concept_republican_tradition_desc: "Республіканська традиція вимірює, наскільки добре республіканізм закріпився в нашій країні. Республіканська традиція відображає, наскільки сильні традиції в [ShowGovernmentTypeName('republic')]. [ShowGovernmentTypeNameWithNoTooltip('republic')] обирає нового [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] кожні кілька років, і збереження того самого [ruler] протягом кількох [Concept('elections', 'CONCEPT_PLACEHOLDER')|e] зменшить нашу республіканську традицію. На низьких рівнях вона може занепасти та повернутися до якоїсь форми автократії. Для добре функціонуючого республіканського уряду цей показник слід підтримувати на високому рівні."
  game_concept_devotion: "Відданість"
  game_concept_devotion_i: "@devotion!"
  game_concept_devotion_desc: "Відданість відображає ревність [Concept('faith', 'CONCEPT_PLACEHOLDER')|e] всередині нашої країни. Чим вона вища, тим ефективніше функціонуватиме наша [ShowGovernmentTypeName('theocracy')]."
  game_concept_horde_unity: "Єдність Орди"
  game_concept_horde_unity_i: "@horde_unity!"
  game_concept_horde_unity_desc: "Єдність Орди — це міра підтримки, яку $rank_kingdom_horde_ruler_suffix_male$ має від племен. Вона з часом зменшується і збільшується шляхом грабунку та спустошення провінцій. [ShowGovernmentTypeName('steppe_horde')] з низькою єдністю, ймовірно, піддасться внутрішнім чварам."
  game_concept_tribal_cohesion: "Племінна згуртованість"
  game_concept_tribal_cohesion_i: "@tribal_cohesion!"
  game_concept_tribal_cohesion_desc: "Племінна згуртованість — це міра того, наскільки члени нашого [ShowGovernmentTypeName('tribe')] узгоджені в плані [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] та [Concept('culture', 'CONCEPT_PLACEHOLDER')|e]. На низьких рівнях керувати [ShowGovernmentTypeNameWithNoTooltip('tribe')] буде як пасти котів, коли кожен хоче робити своє. Її слід підтримувати високою, щоб [ShowGovernmentTypeNameWithNoTooltip('tribe')] функціонувало безперебійно."
  game_concept_government_power: "Урядова влада"
  game_concept_government_power_i: "@government_power!"
  game_concept_government_power_desc: "Це загальний термін для вимірювання того, наскільки добре функціонує наш [Concept('government', 'CONCEPT_PLACEHOLDER')|e]. Існує кілька типів: [Concept('legitimacy', 'CONCEPT_PLACEHOLDER')|e], [Concept('republican_tradition', 'CONCEPT_PLACEHOLDER')|e], [Concept('devotion', 'CONCEPT_PLACEHOLDER')|e], [Concept('horde_unity', 'CONCEPT_PLACEHOLDER')|e] та [Concept('tribal_cohesion', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_policy: "Політика"
  game_concept_policies: "Політики"
  game_concept_policy_desc: "Кожен [Concept('law', 'CONCEPT_PLACEHOLDER')|e] має одну або кілька Політик на вибір. Вони визначають, як закон трактується в [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_law: "Закон"
  game_concept_laws: "Закони"
  game_concept_law_desc: "Для кожного закону має бути обрана [Concept('policy', 'CONCEPT_PLACEHOLDER')|e], інакше він не є активним. Різні [Concept('government_types', 'CONCEPT_PLACEHOLDER')|e] та [Concept('religions', 'CONCEPT_PLACEHOLDER')|e] отримують різні закони, а більше законів надається через [Concept('advances', 'CONCEPT_PLACEHOLDER')|e]. Залежно від того, яку [policy] ми оберемо в законі, ми часто впливатимемо на наші [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_antagonism: "Антагонізм"
  game_concept_antagonism_i: "@antagonism!"
  game_concept_antagonism_desc: "Антагонізм вказує на те, як інші [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], ймовірно, сприйматимуть нас, впливаючи на їхню [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] про нас. Якщо вони відчувають до нас сильний антагонізм, країни, які вважають нас важливими для своїх інтересів, будуть менш схильні до [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] і можуть діяти проти наших інтересів. Антагонізм викликаний основними відмінностями між [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e], [Concept('government_types', 'CONCEPT_PLACEHOLDER')|e], [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] та [Concept('language', 'CONCEPT_PLACEHOLDER')|e] країн. Деякі дії також можуть спричинити \"бомбу\" антагонізму в [Concept('location', 'CONCEPT_PLACEHOLDER')|e], яка впливає на сусідні країни різною мірою, залежно від того, наскільки вони дбають про це місце та про країну-антагоніста. Ці ефекти \"бомби\" антагонізму зазвичай з часом розсіюються."
  game_concept_antagonism_received_modifier: "Отриманий антагонізм"
  game_concept_antagonism_received_modifier_desc: "Це те, наскільки ворожі дипломатичні дії, такі як [Concept('war', 'CONCEPT_PLACEHOLDER')|e], впливатимуть на наш [Concept('antagonism', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_diplomatic_action: "Дипломатична дія"
  game_concept_diplomatic_actions: "Дипломатичні дії"
  game_concept_diplomatic_action_desc: "Це дія, виконана однією [Concept('country', 'CONCEPT_PLACEHOLDER')|e] щодо іншої за допомогою [Concept('diplomats', 'CONCEPT_PLACEHOLDER')|e]. Це включає формування [Concept('alliances', 'CONCEPT_PLACEHOLDER')|e], оголошення [Concept('war', 'CONCEPT_PLACEHOLDER')|e] або багато інших речей."
  game_concept_diplomatic_limitation: "Дипломатичне обмеження"
  game_concept_diplomatic_limitations: "Дипломатичні обмеження"
  game_concept_diplomatically_limited: "Дипломатично обмежений"
  game_concept_limited_diplomacy: "Обмежена дипломатія"
  game_concept_unlimited_diplomacy: "Необмежена дипломатія"
  game_concept_diplomatic_limitation_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e], що є або дуже залежним [Concept('subject', 'CONCEPT_PLACEHOLDER')|e], або [Concept('junior_partner', 'CONCEPT_PLACEHOLDER')|e] в [Concept('union', 'CONCEPT_PLACEHOLDER')|e], може бути дипломатично обмеженим. Це означає, що наступні дипломатичні дії або неможливі, або сильно обмежені:\n\n$BULLET$ [ShowRelationTypeName('alliance')]\n$BULLET$ [ShowRelationTypeName('food_access')]\n$BULLET$ [ShowRelationTypeName('guarantee')]\n$BULLET$ [ShowRelationTypeName('military_access')]\n$BULLET$ [ShowRelationTypeName('fleet_basing_rights')]\n$BULLET$ [ShowGenericActionName('create_building_subject')]\n$BULLET$ [ShowGenericActionName('create_province_subject')]\n\nБільшість підлеглих з обмеженою дипломатією нездатні оголошувати власні [Concept('wars', 'CONCEPT_PLACEHOLDER')|e], якщо тільки не проти дуже специфічних цілей."
  game_concept_diplomats: "Дипломати"
  game_concept_diplomat: "Дипломат"
  game_concept_diplomat_desc: "Це показує, скільки [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може здійснити за певний час. Деякі [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] або [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e] збільшать цю кількість."
  game_concept_opinion: "Думка"
  game_concept_diplomatic_opinion: "Дипломатична думка"
  game_concept_diplomatic_opinions: "Дипломатичні думки"
  game_concept_opinion_i: "@opinion!"
  game_concept_opinion_desc: "Це показує, наскільки [Concept('country', 'CONCEPT_PLACEHOLDER')|e] подобається або не подобається інша [country]. Різниця між [Concept('trust', 'CONCEPT_PLACEHOLDER')|e] та думкою полягає в тому, що висока думка зупинить [country] від ворожості, але нам потрібна була б довіра, щоб мати можливість працювати разом."
  game_concept_rival: "Суперник"
  game_concept_rivals: "Суперники"
  game_concept_rivals_tooltip: "[Concept('rivals', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_rival_desc: "[Concept('countries', 'CONCEPT_PLACEHOLDER')|e] можуть оголосити свою ворожість до інших країн, оголосивши їх $game_concept_rivals$. Країни мають деякі додаткові ворожі дії проти своїх суперників, такі як можливість сфабрикувати [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] та можливість втручатися в їхні [Concept('wars', 'CONCEPT_PLACEHOLDER')|e].\n\nСуперник $game_concept_country$ не прийме дружніх [Concept('treaties', 'CONCEPT_PLACEHOLDER')|e], таких як [Concept('alliances', 'CONCEPT_PLACEHOLDER')|e], але [countries] зі спільними суперниками легше підписуватимуть [treaties] між собою.\n\nСуперництво не є взаємним, тобто не є необхідним чи автоматичним для $game_concept_country$ відповідати суперництвом тим, хто його суперничав. [country], що оголосила іншу своїм Суперником, відома як її [Concept('rival_enemy', 'CONCEPT_PLACEHOLDER')|e].\n\nЛише [countries] зі схожим [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e] та не дуже доброю [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] можуть бути оголошені Суперниками, а максимальна кількість $game_concept_rivals$, яку може мати [country], залежить від її [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_rival_enemy: "Ворог"
  game_concept_rival_enemies: "Вороги"
  game_concept_rival_enemy_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e], що оголосила іншу [Concept('rival', 'CONCEPT_PLACEHOLDER')|e], буде відома як Ворог останньої. [country] могла оголосити багато [rivals], але не мати Ворогів, якщо жодна інша [country] не відповіла їй суперництвом."
  game_concept_cobelligerent: "Співвоюючий"
  game_concept_cobelligerents: "Співвоюючі"
  game_concept_cobelligerent_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e], що викликана у [Concept('war', 'CONCEPT_PLACEHOLDER')|e] як $game_concept_cobelligerent$, зможе викликати своїх [Concept('allies', 'CONCEPT_PLACEHOLDER')|e] у [war].\n\nЗахоплення [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у $game_concept_cobelligerent$ [country] у [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e] матиме таку ж вартість, як і у лідера війни."
  game_concept_enemy: "Воєнний ворог"
  game_concept_enemies: "Воєнні вороги"
  game_concept_enemies_tooltip: "[Concept('enemies', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_enemy_desc: "Дві [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що перебувають у [Concept('war', 'CONCEPT_PLACEHOLDER')|e] одна проти одної, розглядатимуть одна одну як ворогів, і вони [Concept('battle', 'CONCEPT_PLACEHOLDER')|e], коли їхні [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] або [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] зустрінуться.\n\n[Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] та [Concept('pirates', 'CONCEPT_PLACEHOLDER')|e] є ворогами для всіх."
  game_concept_royal_marriage: "Королівський шлюб"
  game_concept_royal_marriages: "Королівські шлюби"
  game_concept_married: "Одружений"
  game_concept_marry: "Одружитися"
  game_concept_marriage: "Шлюб"
  game_concept_marrying: "Одруження"
  game_concept_royal_marriage_desc: "Королівський шлюб — це шлюб між двома [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] з двох різних [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що укладається з метою тіснішого їхнього зв'язку та надання [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e] їхнім [Concept('rulers', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_union: "Унія"
  game_concept_senior_partner: "Старший партнер"
  game_concept_junior_partner: "Молодший партнер"
  game_concept_junior_partners: "Молодші партнери"
  game_concept_union_partner: "Партнер унії"
  game_concept_union_partners: "Партнери унії"
  game_concept_personal_union: "Персональна унія"
  game_concept_personal_unions: "Персональні унії"
  game_concept_union_desc: "Унія — це тип [Concept('treaty', 'CONCEPT_PLACEHOLDER')|e], що виникає, коли дві або більше [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] отримують одного [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] внаслідок [Concept('royal_marriages', 'CONCEPT_PLACEHOLDER')|e]. Вона функціонує як оборонний [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e], оскільки вони автоматично приходять на допомогу одне одному в разі нападу, але до них можуть бути додані [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] для зміни функціонування унії. Найважливіший член унії називається $game_concept_senior_partner$, тоді як решта [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] в унії є $game_concept_junior_partners$."
  game_concept_union_integration_level: "Рівень інтеграції унії"
  game_concept_union_integration_level_short: "Рівень інтеграції"
  game_concept_union_integration_level_member: "Рівень інтеграції члена"
  game_concept_union_integration_level_desc: "$game_concept_union_integration_level$ описує, наскільки централізованою є [Concept('personal_union', 'CONCEPT_PLACEHOLDER')|e] через [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] та [Concept('policies', 'CONCEPT_PLACEHOLDER')|e]. Кожен [Concept('member', 'CONCEPT_PLACEHOLDER')|e], присутній під час впровадження централізуючої політики, отримує підвищення свого рівня. З остаточною політикою централізації всі $game_concept_junior_partners$, які мають той самий рівень, що й $game_concept_union$, об'єднуються $game_concept_senior_partner$.\n\n[Concept('Members', 'CONCEPT_PLACEHOLDER')|e], які приєднуються до $game_concept_union$ пізніше, повинні наздогнати свій прогрес, щоб бути інтегрованими через [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_ally: "Союзник"
  game_concept_allies: "Союзники"
  game_concept_allied: "Союзний"
  game_concept_alliance: "Альянс"
  game_concept_alliances: "Альянси"
  game_concept_alliance_desc: "Альянс — це [Concept('treaty', 'CONCEPT_PLACEHOLDER')|e] між двома [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]. [countries], що перебувають у союзі, не зможуть оголошувати [Concept('war', 'CONCEPT_PLACEHOLDER')|e] одне одному, а також можуть бути покликані на допомогу в [wars] одне одного."
  game_concept_war_allies: "Військові союзники"
  game_concept_war_ally: "Військові союзники"
  game_concept_war_ally_desc: "Це [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що допомагають одне одному на одній стороні [Concept('war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_war_leader: "Лідер війни"
  game_concept_war_leaders: "Лідери війни"
  game_concept_war_leader_desc: "$game_concept_war_leader$ — це одна з двох [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що очолюють свою сторону в [Concept('war', 'CONCEPT_PLACEHOLDER')|e]. Вони обговорюватимуть потенційні результати конфлікту, приймаючи рішення щодо [Concept('peace_treaties', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_call_to_arms: "Заклик до зброї"
  game_concept_call_to_arms_desc: "Заклик до зброї — це [Concept('diplomatic_action', 'CONCEPT_PLACEHOLDER')|e], який можна здійснити під час [Concept('war', 'CONCEPT_PLACEHOLDER')|e] до кожного [Concept('ally', 'CONCEPT_PLACEHOLDER')|e] та інших [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що присягнули брати участь у військових конфліктах.\n\n[Concept('defender', 'CONCEPT_PLACEHOLDER')|e] автоматично закликають своїх союзників до війни, тоді як [Concept('attacker', 'CONCEPT_PLACEHOLDER')|e] повинні закликати їх вручну, і їм складніше переконати їх приєднатися."
  game_concept_treaty: "Договір"
  game_concept_treaties: "Договори"
  game_concept_treaty_desc: "Договір — це підписаний дипломатичний стан справ між двома або більше [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]. Вони можуть бути на обмежений час або до подальшого повідомлення.\nДоговори включають [Concept('alliances', 'CONCEPT_PLACEHOLDER')|e], [Concept('military_access', 'CONCEPT_PLACEHOLDER')|e], [Concept('truce', 'CONCEPT_PLACEHOLDER')|e] та багато інших, які можна створити за допомогою [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_blocked_treaties: "Заблоковані договори"
  game_concept_blocked_treaties_desc: "Це унеможливлює для [Concept('country', 'CONCEPT_PLACEHOLDER')|e] підписання будь-якого [Concept('treaty', 'CONCEPT_PLACEHOLDER')|e] з [Concept('country', 'CONCEPT_PLACEHOLDER')|e], з якою їм це заблоковано."
  game_concept_economic_support: "Економічна підтримка"
  game_concept_economic_support_desc: "Це [Concept('treaty', 'CONCEPT_PLACEHOLDER')|e], за яким одна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] щомісяця надсилає [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] для підтримки [Concept('finances', 'CONCEPT_PLACEHOLDER')|e] іншої [country]. Це часто трапляється, коли країна не бажає безпосередньо брати участь у [Concept('war', 'CONCEPT_PLACEHOLDER')|e], але все ж хоче підтримати зусилля."
  game_concept_war_reparations: "Воєнні репарації"
  game_concept_war_reparations_desc: "Це мирний [Concept('treaty', 'CONCEPT_PLACEHOLDER')|e], за яким одна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] зобов'язана щомісяця надсилати [GetDefine('NDiplomacy','WAR_REPARATIONS_FACTOR')|Y%0] свого доходу в [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] для підтримки [Concept('finances', 'CONCEPT_PLACEHOLDER')|e] іншої [country], зазвичай переможця, як відплата за щойно закінчену війну."
  game_concept_guarantee: "Гарантія"
  game_concept_guaranteed: "Гарантований"
  game_concept_guaranteeing: "Гарантування"
  game_concept_guarantee_desc: "Це [Concept('treaty', 'CONCEPT_PLACEHOLDER')|e], за яким одна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] гарантує іншу [country], обіцяючи захистити її, якщо на неї нападуть у [Concept('war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_estate_satisfaction_equilibrium: "Рівновага задоволення"
  game_concept_estate_satisfaction_equilibrium_desc: "Це те, до чого прагнутиме [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [Concept('estate', 'CONCEPT_PLACEHOLDER')|e]. Швидкість, з якою воно рухається, залежить від багатьох факторів."
  game_concept_estate_satisfaction: "Задоволення станів"
  game_concept_estate_satisfaction_short: "Задоволення"
  game_concept_estate_satisfaction_desc: "Це те, наскільки [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] задоволений поточним правлінням [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Якщо цей показник високий, країна отримає бонуси, але якщо він низький, це призведе до штрафів, а якщо він буде достатньо низьким, ми не зможемо набирати [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e] з цього [estate].\n\nЦе також має прямий вплив на [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що належать до цього [estate]."
  game_concept_estate_power: "Влада станів"
  game_concept_estate_power_desc: "Це влада, яку [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] має в [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Вона дуже залежить від розміру [Concept('population', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop_types', 'CONCEPT_PLACEHOLDER')|e], що належать до [estate], та від наданих їм [Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e].\n\nДеякі [Concept('pop_types', 'CONCEPT_PLACEHOLDER')|e], як-от [ShowPopTypeName('nobles')], отримують значно більше влади станів на [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], ніж [ShowPopTypeName('slaves')].\n\n$BULLET_WITH_TAB$Загальна влада [estates] зменшує [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e] [country].\n$BULLET_WITH_TAB$[Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] розподіляється залежно від розміру, влади станів та [pop_type] кожного населення там."
  game_concept_crown_power: "Влада корони"
  game_concept_crown_power_desc: "Це влада, яку корона має в [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Чим вона більша, тим могутнішою та ефективнішою стає [country]. Якщо [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] було надано занадто багато [Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e], цей показник може бути настільки низьким, що країна отримає штрафи.\n\nІснують [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] протягом [Concept('ages', 'CONCEPT_PLACEHOLDER')|e], які збільшують [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e], особливо в міру просування в [ShowAgeName('age_5_absolutism')]."
  game_concept_estate_tax_base: "Податкова база станів"
  game_concept_estate_tax_base_desc: "Кожен [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] отримує [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] як частку [Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e] в кожному [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що залежить від їхньої [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] там порівняно з іншими [estates]. Потім це зменшується на [Concept('estate_enrichment', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_civil_war: "Громадянська війна"
  game_concept_civil_wars: "Громадянські війни"
  game_concept_civil_war_desc: "Громадянська війна — це особливий тип [Concept('war', 'CONCEPT_PLACEHOLDER')|e], в якій [Concept('country', 'CONCEPT_PLACEHOLDER')|e] перебуває у [war] не з іншою [country], а з частиною самої себе. Вона також відрізняється від звичайних [wars] тим, що немає [Concept('occupation', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], натомість вони негайно змінюють [Concept('controller', 'CONCEPT_PLACEHOLDER')|e], щойно їх [Concept('sieged', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_war_goal: "Ціль війни"
  game_concept_war_goals: "Цілі війни"
  game_concept_war_goal_desc: "Ціль війни — це завдання, встановлене для певної [Concept('war', 'CONCEPT_PLACEHOLDER')|e], і воно залежатиме від типу використаного [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e]. Досягнення цілі війни дасть значну кількість [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_war_score: "Військовий рахунок"
  game_concept_war_score_desc: "Військовий рахунок — це значення, яке вказує, наскільки добре [Concept('country', 'CONCEPT_PLACEHOLDER')|e] виступає в конкретній [Concept('war', 'CONCEPT_PLACEHOLDER')|e]. [country] може збільшити свій військовий рахунок, виграючи [Concept('battles', 'CONCEPT_PLACEHOLDER')|e], успішно [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] [Concept('enemy', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], досягаючи [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] та встановлюючи [Concept('blockades', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_war_participation: "Участь у війні"
  game_concept_war_participation_desc: "Це те, наскільки [Concept('country', 'CONCEPT_PLACEHOLDER')|e] зробила внесок у прогрес [Concept('war', 'CONCEPT_PLACEHOLDER')|e]. Це в першу чергу досягається через [Concept('battles', 'CONCEPT_PLACEHOLDER')|e], [Concept('blockades', 'CONCEPT_PLACEHOLDER')|e] та [Concept('sieges', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_peace_cost: "Вартість миру"
  game_concept_peace_cost_desc: "Це те, скільки [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e] коштуватиме додати до [Concept('peace_offer', 'CONCEPT_PLACEHOLDER')|e]. Зазвичай це порівнюється з [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e], щоб визначити, чи прийме це інша [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_war: "Війна"
  game_concept_wars: "Війни"
  game_concept_offensive_war: "Наступальна війна"
  game_concept_defensive_war: "Оборонна війна"
  game_concept_offensive_wars: "Наступальні війни"
  game_concept_defensive_wars: "Оборонні війни"
  game_concept_war_desc: "Війна виникає, коли одна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] використовує [Concept('diplomat', 'CONCEPT_PLACEHOLDER')|e] на іншій країні, щоб розпочати конфлікт. Країни, що є [Concept('allied', 'CONCEPT_PLACEHOLDER')|e] з будь-якою стороною, можуть бути залучені до війни.\n\nПід час війни [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] з кожної сторони, що зустрічаються, [Concept('battle', 'CONCEPT_PLACEHOLDER')|e] одна з одною. [armies] зможуть [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] [Concept('enemies', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], тоді як [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] можуть [Concept('blockade', 'CONCEPT_PLACEHOLDER')|e] їхні [Concept('ports', 'CONCEPT_PLACEHOLDER')|e].\n\nВійна триває, доки не буде підписано [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e], і [Concept('peace', 'CONCEPT_PLACEHOLDER')|e] знову запанує між залученими [countries]."
  game_concept_peace: "Мир"
  game_concept_peace_desc: "Мир – це статус, за якого [Concept('country', 'CONCEPT_PLACEHOLDER')|e] не перебуває в жодній поточній [Concept('war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_white_peace: "Білий мир"
  game_concept_white_peace_desc: "Це [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e], що повертає до довоєнних умов."
  game_concept_peace_treaty: "Мирний договір"
  game_concept_peace_treaties: "Мирні договори"
  game_concept_peace_treaty_desc: "Це будуть умови [Concept('peace_offer', 'CONCEPT_PLACEHOLDER')|e], які включають передачу [Concept('location', 'CONCEPT_PLACEHOLDER')|e] між двома [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], або данину [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] між ними, або навіть деякі спеціальні договори, як-от [ShowPeaceTreatyTypeName('abandon_colonial_claim')], [ShowPeaceTreatyTypeName('peace_take_over_market_center')], або [ShowPeaceTreatyTypeName('peace_humiliate')]."
  game_concept_peace_offer: "Мирна пропозиція"
  game_concept_peace_offer_desc: "Це дипломатична дія, яка припиняє поточну [Concept('war', 'CONCEPT_PLACEHOLDER')|e] між двома або більше [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]. У ній одна сторона зможе викласти свої умови іншій стороні як [Concept('peace_treaties', 'CONCEPT_PLACEHOLDER')|e]. Щойно інша сторона їх прийме, мир буде підписано, і [war] закінчиться.\n\nНаскільки [country] зможе отримати вигоду з мирного договору, залежатиме від її [war_score]."
  game_concept_casus_belli: "Казус Беллі"
  game_concept_casus_bellis: "Казус Беллі"
  game_concept_casus_belli_desc: "Дослівно означає #italic Причина війни#!, це виправдання, яке [Concept('country', 'CONCEPT_PLACEHOLDER')|e] використовує для початку [Concept('war', 'CONCEPT_PLACEHOLDER')|e]. Залежно від використаного Казус Беллі, тип [war] та [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] будуть різними."
  game_concept_stockpile: "Запаси"
  game_concept_stockpile_desc: "Це кількість [Concept('good', 'CONCEPT_PLACEHOLDER')|e], яка наразі зберігається на складах на [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Вона збільшується, якщо [Concept('supply', 'CONCEPT_PLACEHOLDER')|e] вища за [Concept('demand', 'CONCEPT_PLACEHOLDER')|e], але зменшується, якщо навпаки. [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], [Concept('constructions', 'CONCEPT_PLACEHOLDER')|e], [Concept('units', 'CONCEPT_PLACEHOLDER')|e] та [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] на ринку використовуватимуть запаси для своїх потреб."
  game_concept_effective_supply: "Ефективна пропозиція"
  game_concept_effective_supply_desc: "Це базується на [Concept('supply', 'CONCEPT_PLACEHOLDER')|e] [Concept('good', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e], але вплив [Concept('imports', 'CONCEPT_PLACEHOLDER')|e] зменшено."
  game_concept_effective_demand: "Ефективний попит"
  game_concept_effective_demand_desc: "Це базується на [Concept('demand', 'CONCEPT_PLACEHOLDER')|e] [Concept('good', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e], але вплив [Concept('exports', 'CONCEPT_PLACEHOLDER')|e] зменшено."
  game_concept_supply: "Пропозиція"
  game_concept_supply_desc: "Це кількість [Concept('good', 'CONCEPT_PLACEHOLDER')|e], яка виробляється [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], збирається як [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e] або [Concept('imported', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_demand: "Попит"
  game_concept_demands: "Потреби"
  game_concept_demand_desc: "Це кількість [Concept('good', 'CONCEPT_PLACEHOLDER')|e], яка потрібна [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] для їхнього входу, скільки [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] потрібно для їхнього життя, скільки вимагають різні [Concept('constructions', 'CONCEPT_PLACEHOLDER')|e], і скільки [Concept('exports', 'CONCEPT_PLACEHOLDER')|e] запитується з [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_market_balance: "Баланс ринку"
  game_concept_market_balance_short: "Баланс"
  game_concept_market_balance_desc: "$game_concept_market_balance$ [Concept('good', 'CONCEPT_PLACEHOLDER')|e] — це різниця між [Concept('supply_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('demand_with_icon', 'CONCEPT_PLACEHOLDER')|e] цього [good] на [Concept('market_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_market_value: "Ринкова вартість"
  game_concept_market_value_desc: "Це сукупна вартість усіх щомісячних транзакцій на [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Вона слугує оцінкою його загального багатства."
  game_concept_price_impact: "Ціновий вплив"
  game_concept_price_impact_desc: "[Concept('market_price', 'CONCEPT_PLACEHOLDER')|e] [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], що є [Concept('pop_needs', 'CONCEPT_PLACEHOLDER')|e] для [Concept('pop', 'CONCEPT_PLACEHOLDER')|e], має прямий вплив на його [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_price_stability: "Стабільність цін"
  game_concept_price_stability_desc: "Стабільність цін визначається поточною [Concept('age', 'CONCEPT_PLACEHOLDER')|e] і вирішує, наскільки [Concept('target_price', 'CONCEPT_PLACEHOLDER')|e] залежить від [Concept('supply', 'CONCEPT_PLACEHOLDER')|e] та [Concept('demand', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_market_price: "Ринкова ціна"
  game_concept_market_prices: "Ринкові ціни"
  game_concept_market_price_desc: "Ціна, за якою певний [Concept('good', 'CONCEPT_PLACEHOLDER')|e] торгується на [Concept('market_center', 'CONCEPT_PLACEHOLDER')|e].\nРинкова ціна поступово коригується до [Concept('target_price', 'CONCEPT_PLACEHOLDER')|e].\n[Concept('sell_price', 'CONCEPT_PLACEHOLDER')|e] в інших місцях може відрізнятися від ринкової ціни, залежно від [Concept('market_access', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_target_price: "Цільова ціна"
  game_concept_target_price_desc: "Цільова ціна визначається [Concept('supply', 'CONCEPT_PLACEHOLDER')|e], [Concept('demand', 'CONCEPT_PLACEHOLDER')|e] та [Concept('price_stability', 'CONCEPT_PLACEHOLDER')|e].\nЯк частка базової ціни, вона буде коливатися між [price_stability] при надмірній [Concept('supply', 'CONCEPT_PLACEHOLDER')|e]; та 1 / [price_stability] при надмірній [Concept('demand', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_export_market: "Експортний ринок"
  game_concept_export_market_desc: "Це [Concept('market', 'CONCEPT_PLACEHOLDER')|e], де купуються [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] для торгівлі, створюючи [Concept('export', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_import_market: "Імпортний ринок"
  game_concept_import_market_desc: "Це [Concept('market', 'CONCEPT_PLACEHOLDER')|e], де продаються [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] для торгівлі, створюючи [Concept('import', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_market: "Ринок"
  game_concept_markets: "Ринки"
  game_concept_market_desc: "Ринок — це місце, де [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] купуються та продаються.\nВін базується в [Concept('market_center', 'CONCEPT_PLACEHOLDER')|e], але включає інші місця залежно від їхнього [Concept('market_access', 'CONCEPT_PLACEHOLDER')|e] та [Concept('protectionism', 'CONCEPT_PLACEHOLDER')|e].\nУсі ці місця будуть виключно купувати та продавати на [Concept('stockpile', 'CONCEPT_PLACEHOLDER')|e] цього ринку.\n\n[markets] мають кольорове кодування залежно від їхньої важливості для вас:\n\n$BULLET$ #G Зелений [market]#!: Ви володієте місцями на цьому [market], і тому вам потрібно турбуватися про його [Concept('pop_needs', 'CONCEPT_PLACEHOLDER')|e].\n\n$BULLET$ #E Синій [market]#!: Ви не володієте [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], але маєте [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e], і тому можете [Concept('trade', 'CONCEPT_PLACEHOLDER')|e] з них.\n\n$BULLET$ #L Коричневий [market]#!: Ви не [Concept('own', 'CONCEPT_PLACEHOLDER')|e] жодного [Concept('location', 'CONCEPT_PLACEHOLDER')|e] і не маєте [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e].\n\n$BULLET$ Сірий [market]: [markets], що знаходяться поза вашим [Concept('trade_range', 'CONCEPT_PLACEHOLDER')|e], і тому ви не можете взаємодіяти з ними."
  SUBTAB_TRADING_TT_TEXT: "На цій вкладці ви можете керувати своїми [Concept('trades', 'CONCEPT_PLACEHOLDER')|e], якщо у вас є [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e] на будь-якому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_protectionism: "Захист ринку"
  game_concept_trade_protection: "Захист ринку"
  game_concept_protectionism_desc: "$MODIFIER_TYPE_DESC_local_trade_protection_factor$\n\nЗахист ринку зростає переважно з [Concept('control', 'CONCEPT_PLACEHOLDER')|e] [location]."
  game_concept_market_center: "Ринковий центр"
  game_concept_market_centers: "Ринкові центри"
  game_concept_market_center_desc: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e], на якому зосереджений [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. [Concept('owner', 'CONCEPT_PLACEHOLDER')|e] цього [Concept('location', 'CONCEPT_PLACEHOLDER')|e] отримує від нього певні переваги, але найголовніше – він може контролювати, хто матиме доступ до цього ринку."
  game_concept_market_owner: "Власник ринку"
  game_concept_market_owner_desc: "Власником ринку [Concept('market', 'CONCEPT_PLACEHOLDER')|e] є [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що [Concept('owns', 'CONCEPT_PLACEHOLDER')|e] його [Concept('market_center', 'CONCEPT_PLACEHOLDER')|e]. Власник ринку може знищити або перемістити [market], а також заборонити іншим [countries] торгувати на ньому."
  game_concept_market_access: "Доступ до ринку"
  game_concept_market_access_desc: "Доступ до ринку відображає, наскільки легко [Concept('location', 'CONCEPT_PLACEHOLDER')|e] може взаємодіяти зі своїм [Concept('market', 'CONCEPT_PLACEHOLDER')|e], і залежить від відстані до [Concept('market_center', 'CONCEPT_PLACEHOLDER')|e].\n\nДоступ до ринку важливий у трьох ключових аспектах:\n\n$BULLET$[locations] матимуть вищу [Concept('market_attraction_with_icon', 'CONCEPT_PLACEHOLDER')|e] до [markets] з вищим доступом. Це означає, що [locations] матимуть тенденцію належати до найближчого [market].\n\n$BULLET$[locations] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e] купують [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('food_with_icon', 'CONCEPT_PLACEHOLDER')|e] в порядку їхнього доступу до ринку.\n\n$BULLET$Низький доступ до ринку шкодить місцевій промисловості, зменшуючи [Concept('output', 'CONCEPT_PLACEHOLDER')|e] [Concept('buildings_with_icon', 'CONCEPT_PLACEHOLDER')|e] та прибуток [Concept('rgo_with_icon', 'CONCEPT_PLACEHOLDER')|e].\n\nДоступ до ринку краще поширюється через моря та [Concept('rivers', 'CONCEPT_PLACEHOLDER')|e], і його можна покращити, будуючи [Concept('roads', 'CONCEPT_PLACEHOLDER')|e] та $naval_category$, або створюючи новий [market]."
  game_concept_market_attraction: "Привабливість ринку"
  game_concept_market_attraction_desc: "Це впливає на те, наскільки сильно [Concept('market_center', 'CONCEPT_PLACEHOLDER')|e] притягує [Concept('location', 'CONCEPT_PLACEHOLDER')|e], щоб зробити його частиною свого [Concept('market', 'CONCEPT_PLACEHOLDER')|e].\n\nЦьому протидіє [Concept('protectionism', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_sell_price: "Ціна продажу"
  game_concept_sell_price_desc: "Ціна, за якою [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] продаються в [Concept('location', 'CONCEPT_PLACEHOLDER')|e].\nЦіна продажу може бути нижчою за [Concept('market_price', 'CONCEPT_PLACEHOLDER')|e], якщо доступ до ринку низький."
  game_concept_counterespionage: "Контррозвідка"
  game_concept_counterespionage_desc: "Контррозвідка – це показник того, наскільки добре [Concept('country', 'CONCEPT_PLACEHOLDER')|e] активно зупиняє розбудову [Concept('foreign', 'CONCEPT_PLACEHOLDER')|e] [Concept('spy_networks', 'CONCEPT_PLACEHOLDER')|e] у своїй країні."
  game_concept_spy_network: "Шпигунська мережа"
  game_concept_spy_network_i: "@spy_network!"
  game_concept_spy_networks: "Шпигунські мережі"
  game_concept_spy_network_desc: "Це описує ступінь, до якого [Concept('country', 'CONCEPT_PLACEHOLDER')|e] інфільтрувала іншу країну мережею інформаторів, подвійних агентів та загальних перебіжчиків, і, отже, скільки внутрішніх знань вона має про цю країну. Її можна використовувати для виконання різноманітних підступних дипломатичних дій."
  game_concept_favor: "Прихильність"
  game_concept_favors_i: "@favors!"
  game_concept_favors: "Прихильності"
  game_concept_favors_desc: "Прихильності відображають, скільки одна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] пообіцяла або іншим чином винна іншій [country].\nПрихильності можна витратити, щоб попросити іншу [country] щось зробити. Якщо прихильності стають занадто незбалансованими, відмова від виконання цих речей може призвести до втрати [Concept('trust', 'CONCEPT_PLACEHOLDER')|e] або навіть [Concept('diplomatic_reputation', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_trust: "Довіра"
  game_concept_trust_i: "@trust!"
  game_concept_trusted: "Довірений"
  game_concept_trust_desc: "Довіра відображає, наскільки одна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] вважає, що інша [country] діятиме щодо неї чесно.\nБудь то друг чи ворог, Довіра є вирішальним компонентом у формуванні тривалих угод."
  game_concept_supportrebels: "Підтримати повстанців"
  game_concept_support_rebels: "Підтримати повстанців"
  game_concept_supportrebels_desc: "Це коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] вирішує запропонувати допомогу групі [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] в іншій [country], сподіваючись, що якщо [rebels] переможуть, то новий уряд буде до них прихильним."
  game_concept_great_power: "Велика держава"
  game_concept_great_powers: "Великі держави"
  game_concept_great_power_desc: "[great_power] — це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка завдяки [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], [Concept('population', 'CONCEPT_PLACEHOLDER')|e], площі землі, [Concept('development', 'CONCEPT_PLACEHOLDER')|e] та іншим факторам стала однією з наймогутніших країн світу, і як така отримує можливість впливати на інші країни, просто використовуючи свою вагу.\n\n [countries] з найвищим [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e] стають [great_powers]. Загальна кількість Великих держав змінюється залежно від [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e] найвищої Великої держави порівняно з іншими.\n\n[Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] та [countries], що борються за свою незалежність, не можуть стати Великими державами."
  game_concept_normal_power: "Звичайна держава"
  game_concept_normal_power_desc: "[normal_power] — це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка не є [Concept('great_power', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_hegemony: "Гегемонія"
  game_concept_hegemon: "Гегемон"
  game_concept_hegemons: "Гегемони"
  game_concept_hegemonies: "Гегемонії"
  game_concept_hegemony_desc: "Гегемонія встановлюється в різних сферах, де [Concept('great_power', 'CONCEPT_PLACEHOLDER')|e] з найвищим рівнем у кожній сфері буде проголошена Гегемоном, отримуючи приємні бонуси.\n[ShowDatabase('hegemony')]"
  game_concept_tier: "Рівень"
  game_concept_tiers: "Рівні"
  game_concept_tier_desc: "Це назва рівня, який має [Concept('formable_country', 'CONCEPT_PLACEHOLDER')|e]. Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] належить до Рівня від I до IV, залежно від того, наскільки складні вимоги до формування. Найважливіше, що [countries] можуть формувати країни лише того ж Рівня або вищого, ніж їхній поточний."
  game_concept_country_rank: "Ранг країни"
  game_concept_country_ranks: "Ранги країн"
  game_concept_country_rank_upper_desc: "$game_concept_country_rank$ відображає повагу, яку [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] викликають серед своїх однолітків. Він буде переважно залежати від розміру та могутності $game_concept_country$, хоча самої традиції часто достатньо, щоб викликати повагу, тому після набуття Ранг ніколи не може бути втрачений.\n\nКожен $game_concept_country_rank$ надає більші дипломатичні можливості, причому вищі Ранги відкривають нові засоби впливу на інші $game_concept_countries$ через [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_country_rank_list_title: "Список рангів країн"
  game_concept_country_rank_desc: "$game_concept_country_rank_upper_desc$\n[ShowDatabaseWithIcon('country_rank')]"
  game_concept_country_type: "Тип країни"
  game_concept_type_of_country: "Тип країни"
  game_concept_country_type_list_title: "Список типів країн"
  game_concept_country_type_list: "$BULLET_WITH_TAB$[Concept('settled_country', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('army_based', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('extraterritorial_country', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('society_of_pops', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_country_type_desc: "$game_concept_country_type$ визначає умови існування [Concept('country', 'CONCEPT_PLACEHOLDER')|e] і має величезні ігрові наслідки. Деякі $game_concept_countries$ визначаються [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], якими вони [Concept('own', 'CONCEPT_PLACEHOLDER')|e], і не можуть існувати без них, тоді як інші визначаються їхніми [Concept('armies', 'CONCEPT_PLACEHOLDER')|e], їхніми [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] або їхніми [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_diplomatic_range: "Дипломатична дальність"
  game_concept_diplomatic_range_desc: "Дипломатична дальність обмежує фізичну відстань, на яку наші дипломати можуть подорожувати для ведення дипломатії. Відстань, яку потрібно подолати, вимірюється від однієї столиці до іншої."
  game_concept_diplomatic_capacity: "Дипломатична спроможність"
  game_concept_diplomatic_capacity_used: "Використана дипломатична спроможність"
  game_concept_diplomatic_upkeep: "Дипломатичне утримання"
  game_concept_diplomatic_capacity_desc: "Союз з усіма – це союз ні з ким. [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що підтримує більше відносин, ніж дозволяє її $game_concept_diplomatic_capacity$, страждатиме від штрафу до своєї [Concept('diplomatic_reputation', 'CONCEPT_PLACEHOLDER')|e] та [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e]. Деякі [Concept('subject_types', 'CONCEPT_PLACEHOLDER')|e] мають $game_concept_diplomatic_upkeep$, що також зменшує доступну спроможність.\n\nЧленство в деяких [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e] коштуватиме певної $game_concept_diplomatic_capacity$, а сила вашого [Concept('ally', 'CONCEPT_PLACEHOLDER')|e] визначає вартість [Concept('alliance', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_diplomatic_reputation: "Дипломатична репутація"
  game_concept_diplomatic_reputation_desc: "Дипломатична репутація [Concept('country', 'CONCEPT_PLACEHOLDER')|e] відображає, наскільки високо її цінують у міжнародних відносинах. Зокрема, вона впливає на те, наскільки їй [Concept('trusted', 'CONCEPT_PLACEHOLDER')|e] усі інші країни."
  game_concept_naval_range: "Морська дальність"
  game_concept_naval_range_desc: "Це просто те, як далеко наші [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] можуть зайти, перш ніж їм доведеться повернутися за припасами."
  game_concept_colonial_range: "Колоніальна дальність"
  game_concept_colonial_range_desc: "Це просто те, як далеко ми можемо [Concept('colonize', 'CONCEPT_PLACEHOLDER')|e] або [Concept('explore', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_military_access: "Військовий доступ"
  game_concept_military_access_desc: "Військовий доступ дозволяє нашим військам пересуватися територією інших [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_fleet_basing_rights: "Права на базування флоту"
  game_concept_fleet_basing_rights_desc: "Права на базування флоту дозволяють [Concept('ports', 'CONCEPT_PLACEHOLDER')|e] однієї країни використовувати [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] іншої країни, таким чином розширюючи дальність їхнього дослідження та дозволяючи їм [Concept('repair', 'CONCEPT_PLACEHOLDER')|e] далеко від дому."
  game_concept_mothballed: "Законсервований"
  game_concept_mothball: "Консервація"
  game_concept_mothballed_desc: "Законсервовані [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] вимагають мало [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] для утримання, але не перебувають у стані готовності до [Concept('combat', 'CONCEPT_PLACEHOLDER')|e], тому їх можна перемогти набагато легше."
  game_concept_country_interaction: "Взаємодія з країною"
  game_concept_country_interactions: "Взаємодії з країнами"
  game_concept_country_interaction_desc: "Це [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], які ми можемо виконувати з [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Це відбувається або через [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e], або через взаємодію з [Concept('subject', 'CONCEPT_PLACEHOLDER')|e].\n\nПриклади включають [ShowCountryInteractionName('sabotage_reputation')], [ShowCountryInteractionName('pay_off_debt')] або [ShowCountryInteractionName('give_location_to_subject')]."
  game_concept_relation_type: "Тип відносин"
  game_concept_relation_types: "Типи відносин"
  game_concept_relation_type_desc: "Це відносини, які ми можемо формувати з [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Це відбувається або через [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e], або через взаємодію з [Concept('subject', 'CONCEPT_PLACEHOLDER')|e].\n\nПриклади включають [ShowRelationTypeName('embargo_nation')], [ShowRelationTypeName('sound_toll_exemption')] або [ShowRelationTypeName('scutage')]."
  game_concept_army_levy: "Армійське ополчення"
  game_concept_army_levies: "Армійські ополчення"
  game_concept_army_levy_desc: "Армійське ополчення — це [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e], що було зібрано безпосередньо з [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]. Коли підрозділ рекрутується, [pops], з яких його рекрутують, зменшуються, а коли підрозділ розпускається, будь-які вцілілі повертаються до [pops]. Ці люди менш навчені, ніж регулярна [Concept('army', 'CONCEPT_PLACEHOLDER')|e], рекрутована з [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e], і вони не поповнюються.\nОполченський [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] також має наступний ефект:\n[ShowModifierEffect('is_army_levy')]"
  game_concept_navy_levy: "Морське ополчення"
  game_concept_navy_levies: "Морські ополчення"
  game_concept_navy_levy_desc: "Морське ополчення — це транспортний [Concept('ship', 'CONCEPT_PLACEHOLDER')|e], що був реквізований безпосередньо з [Concept('pops', 'CONCEPT_PLACEHOLDER')|e]. Коли підрозділ рекрутується, [pops], яким належить корабель та його екіпаж, забираються з [pops] у [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], а коли підрозділ розпускається, будь-які вцілілі повертаються до [pops]. Ці кораблі, як правило, більш крихкі, ніж [Concept('navy', 'CONCEPT_PLACEHOLDER')|e], рекрутований з [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e], і повинні охоронятися належними кораблями з гарматами.\nОполченський [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] також має наступний ефект:\n[ShowModifierEffect('is_navy_levy')]"
  game_concept_levy: "Ополчення"
  game_concept_levies: "Ополчення"
  game_concept_levy_desc: "Ополчення — це військовий підрозділ, який [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] збере, коли його покличуть. Це або [Concept('army_levy', 'CONCEPT_PLACEHOLDER')|e], або [Concept('navy_levy', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_weather_system: "Система погоди"
  game_concept_weather_systems: "Системи погоди"
  game_concept_weather_system_desc: "Це погодні явища, які можуть приносити сильні вітри, дощі, сніг та піщані бурі до [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] по всьому світу, іноді спричиняючи руйнування."
  game_concept_mercenaries: "Найманці"
  game_concept_mercenary: "Найманець"
  game_concept_mercenary_desc: "Найманці — це приватні особи, які беруть участь у військових конфліктах за [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], але в іншому є сторонніми для конфлікту. Власні підрозділи [Concept('country', 'CONCEPT_PLACEHOLDER')|e] можуть бути найняті іншими країнами як найманці.\n\nБазова вартість $game_concept_mercenaries$ на 50% вища, ніж у [Concept('regulars', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_mercenary_hiring_fee: "Плата за найм"
  game_concept_mercenary_hiring_fees: "Плати за найм"
  game_concept_mercenary_hiring_fee_desc: "Це початкова вартість найму цієї найманської компанії, незважаючи на [Concept('mercenary_contract_length', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_mercenary_monthly_fee: "Щомісячна плата"
  game_concept_mercenary_monthly_fees: "Щомісячні плати"
  game_concept_mercenary_monthly_fee_desc: "Це щомісячна вартість найму цієї компанії. Вона залежить переважно від кількості та якості її [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e], а також від [Concept('abilities', 'CONCEPT_PLACEHOLDER')|e] її [Concept('commander', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_mercenary_contract_length: "Термін контракту"
  game_concept_mercenary_contract_length_desc: "Це кількість місяців, протягом яких ця компанія служитиме на вимогу свого замовника."
  game_concept_prisoner: "В'язень"
  game_concept_prisoners: "В'язні"
  game_concept_prisoner_desc: "Полонені — це ворожі [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e], захоплені після битви. Їх можна підкупити, щоб вони стали [Concept('mercenaries', 'CONCEPT_PLACEHOLDER')|e], які воюватимуть за своїх викрадачів, викупити або просто позбутися... гуманно чи ні."
  game_concept_privateer_maintenance: "Утримання каперів"
  game_concept_privateer_maintenance_desc: "Хоча [Concept('privateers', 'CONCEPT_PLACEHOLDER')|e] можуть збагачуватися, їх все одно повинна підтримувати [Concept('country', 'CONCEPT_PLACEHOLDER')|e], коли йдеться про [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_privateer_durability: "Міцність каперів"
  game_concept_privateer_durability_desc: "[Concept('privateers', 'CONCEPT_PLACEHOLDER')|e] можуть бути пошкоджені та знищені [Concept('anti_piracy_warfare', 'CONCEPT_PLACEHOLDER')|e] у своїй [Concept('area', 'CONCEPT_PLACEHOLDER')|e]. З вищою міцністю каперів вони можуть виживати довше."
  game_concept_civil_construction: "Цивільне будівництво"
  game_concept_civil_constructions: "Цивільні споруди"
  game_concept_civil_construction_desc: "Цивільні споруди — це все, що наразі будується в [Concept('location', 'CONCEPT_PLACEHOLDER')|e] і не є [Concept('army', 'CONCEPT_PLACEHOLDER')|e] чи [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] одиницею, наприклад, [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], переміщення вашої [Concept('capital', 'CONCEPT_PLACEHOLDER')|e], створення [Concept('market', 'CONCEPT_PLACEHOLDER')|e] або будівництво [Concept('roads', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_country_strength: "Сила країни"
  game_concept_country_strength_desc: "Це оцінка могутності [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Вона враховує її [Concept('military_strength', 'CONCEPT_PLACEHOLDER')|e], [Concept('income', 'CONCEPT_PLACEHOLDER')|e] та [Concept('population', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_military_strength: "Військова міць"
  game_concept_military_strength_desc: "Військова міць [Concept('country', 'CONCEPT_PLACEHOLDER')|e] розраховується з її максимальної [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e], розміру [Concept('army', 'CONCEPT_PLACEHOLDER')|e] та сили [Concept('levy', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_naval_strength: "Морська міць"
  game_concept_naval_strength_desc: "Морська міць [Concept('country', 'CONCEPT_PLACEHOLDER')|e] розраховується з її максимальної [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e], розміру [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] та сили [Concept('navy_levy', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_privateer: "Капер"
  game_concept_privateers: "Капери"
  game_concept_privateer_desc: "Капери — це підприємливі люди, які відгукнулися на заклик [Concept('country', 'CONCEPT_PLACEHOLDER')|e] сіяти хаос у [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e] будь-кого потенційно [Concept('hostile', 'CONCEPT_PLACEHOLDER')|e]. Для тих, хто їх зустрічає, вони не відрізняються від [Concept('pirates', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_pirate: "Пірат"
  game_concept_pirates: "Пірати"
  game_concept_pirate_desc: "Пірати — це нападники на човнах на інші [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] або прибережні райони, які крадуть [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] або [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_core: "Ядро"
  game_concept_cores: "Ядра"
  game_concept_cored: "Ядрований"
  game_concept_core_list_title: "Ядрова [location] отримує такі ефекти:"
  game_concept_core_desc: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e], що є ядром [Concept('country', 'CONCEPT_PLACEHOLDER')|e], є невід'ємною частиною цієї [country].\nЯкщо ця [location] коли-небудь буде втрачена у [Concept('war', 'CONCEPT_PLACEHOLDER')|e], легко сфабрикувати [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e], щоб спробувати повернути її.\nБудь-яка [Concept('integrated', 'CONCEPT_PLACEHOLDER')|e] [location], яка має більшість [Concept('owner_s', 'CONCEPT_PLACEHOLDER')|e] [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] або будь-якої [Concept('accepted_culture', 'CONCEPT_PLACEHOLDER')|e], стане ядром."
  game_concept_colonial_charter: "Колоніальна хартія"
  game_concept_colonial_charters: "Колоніальні хартії"
  game_concept_colonial_charter_desc: "Колоніальна хартія утворюється [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що бажає [Concept('colonize', 'CONCEPT_PLACEHOLDER')|e] цілу [Concept('province', 'CONCEPT_PLACEHOLDER')|e].\nКолоніальна хартія [Concept('migrate', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] до [province]. Коли [Concept('location', 'CONCEPT_PLACEHOLDER')|e] буде [Concept('fully_settled', 'CONCEPT_PLACEHOLDER')|e], [location] перейде у [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] колонізатора."
  game_concept_fully_settled: "Повністю заселений"
  game_concept_fully_settled_desc: "Коли є щонайменше #G 1,000#! [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що проживають у [Concept('location', 'CONCEPT_PLACEHOLDER')|e], і достатньо [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у [location] в [Concept('colonial_charter', 'CONCEPT_PLACEHOLDER')|e] є [Concept('primary_or_accepted_culture', 'CONCEPT_PLACEHOLDER')|e] та офіційною [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e] власника хартії, [location] вважається Повністю заселеною. Необхідний відсоток базується на [Concept('power_projection', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_colonized: "Колонізований"
  game_concept_colonization: "Колонізація"
  game_concept_colonize: "Колонізувати"
  game_concept_colony: "Колонія"
  game_concept_colonies: "Колонії"
  game_concept_colonized_list_title: "Колонізована [location] отримує наступні ефекти:"
  game_concept_colonized_desc: "Колонія – це коли [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має [Concept('colonial_charter', 'CONCEPT_PLACEHOLDER')|e] у [Concept('province', 'CONCEPT_PLACEHOLDER')|e], яка повільно відправляє своє [Concept('population', 'CONCEPT_PLACEHOLDER')|e] туди, щоб стати новою більшістю."
  game_concept_conquer: "Завоювати"
  game_concept_conquered: "Завойований"
  game_concept_conquer_list_title: "Завойована [location] отримує наступні ефекти:"
  game_concept_conquer_desc: "Це коли [Concept('location', 'CONCEPT_PLACEHOLDER')|e] змінює [Concept('owner', 'CONCEPT_PLACEHOLDER')|e] від однієї [Concept('country', 'CONCEPT_PLACEHOLDER')|e] до іншої. Зазвичай це відбувається через [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e] після [Concept('war', 'CONCEPT_PLACEHOLDER')|e], але є й інші способи, такі як продаж [locations] через [diplomacy].\n\nЗавойована [location] потребує [Concept('integrated', 'CONCEPT_PLACEHOLDER')|e], щоб ефективно управлятися."
  game_concept_separatism: "Сепаратизм"
  game_concept_separatism_desc: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що не належать до [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e], матимуть нижчу [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e], коли вони проживають у [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що була завойована і ще не [Concept('integrated', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_owner: "Власник"
  game_concept_owners: "Власники"
  game_concept_ownership: "Власність"
  game_concept_owner_s: "Власника"
  game_concept_owned: "Власний"
  game_concept_owns: "Володіє"
  game_concept_own: "Володіти"
  game_concept_owner_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e], що визнана такою, що має де-юре володіння над [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Навіть якщо [Concept('controller', 'CONCEPT_PLACEHOLDER')|e] наразі може бути іншою країною."
  game_concept_controller: "Контролер"
  game_concept_controlled: "Контрольований"
  game_concept_controls: "Контролює"
  game_concept_controller_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e], що наразі здатна здійснювати де-факто владу над [Concept('location', 'CONCEPT_PLACEHOLDER')|e].\n\nЗазвичай це [Concept('owner', 'CONCEPT_PLACEHOLDER')|e], але під час [Concept('war', 'CONCEPT_PLACEHOLDER')|e] це може стати [Concept('enemy', 'CONCEPT_PLACEHOLDER')|e], якщо [location] стає [Concept('occupied', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_rgo_pops: "Робітники або раби"
  game_concept_rgo_pops_desc: "Це [Concept('pop_types', 'CONCEPT_PLACEHOLDER')|e], які можуть працювати, збираючи [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e].\n\n$BULLET_WITH_TAB$[ShowPopTypeName('laborers')]\n$BULLET_WITH_TAB$[ShowPopTypeName('slaves')]"
  game_concept_plantation: "Плантація"
  game_concept_plantations: "Плантації"
  game_concept_plantation_desc: "Це специфічні [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], які потрібно будувати для експлуатації деяких специфічних типів [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowGoodsName('cotton')], [ShowGoodsName('sugar')] та [ShowGoodsName('tobacco')].\n\nДля цих будівель нам особливо потрібні [ShowPopTypeName('slaves')]."
  game_concept_friend: "Друг"
  game_concept_friendly: "Дружній"
  game_concept_friend_desc: "Дружня [Concept('country', 'CONCEPT_PLACEHOLDER')|e] — це та, яка є або нашим [Concept('subject', 'CONCEPT_PLACEHOLDER')|e], або нашим [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], або союзником у [Concept('war', 'CONCEPT_PLACEHOLDER')|e]. Звісно, наша власна країна також вважається дружньою."
  game_concept_hostile: "Ворожий"
  game_concept_hostile_desc: "Ворожа [Concept('country', 'CONCEPT_PLACEHOLDER')|e] — це та, яка бажає нам шкоди, наприклад, [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e], [Concept('pirates', 'CONCEPT_PLACEHOLDER')|e] або країна, з якою ми перебуваємо у [Concept('war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_regency: "Регентство"
  game_concept_regencies: "Регентства"
  game_concept_regency_desc: "Регентство виникає, коли [Concept('government', 'CONCEPT_PLACEHOLDER')|e] не має легітимного [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], і замість нього керує [Concept('regent', 'CONCEPT_PLACEHOLDER')|e].\n\nЗазвичай це відбувається, коли [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] не дає дійсного [Concept('heir', 'CONCEPT_PLACEHOLDER')|e], або коли [heir] є лише [Concept('child', 'CONCEPT_PLACEHOLDER')|e].\n\nУ [ShowGovernmentTypeName('monarchy')] [Concept('consort', 'CONCEPT_PLACEHOLDER')|e] може стати [regent], але в іншому випадку це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], пов'язаний з наймогутнішим [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], або навіть [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e].\n\nРегентство триває до відновлення належного [ruler]."
  game_concept_situation: "Ситуація"
  game_concept_situations: "Ситуації"
  game_concept_situation_desc: "Ситуація — це те, що гра використовує для найважливіших історичних інцидентів, які залучають більше однієї [Concept('country', 'CONCEPT_PLACEHOLDER')|e] та/або відбуваються протягом певного періоду часу.\n\nДеякі з найважливіших Ситуацій включають [ShowSituationName('black_death')] та [ShowSituationName('reformation')].\n\nСитуації [ShowAgeName('age_1_traditions')]:\n$BULLET$Столітня війна\n$BULLET$Гвельфи та гібеліни\n$BULLET$Піднесення турків\n$BULLET$Нанбокутьо Дзідай\n$BULLET$Падіння Делі\n\nСитуації [ShowAgeName('age_2_renaissance')]:\n$BULLET$Чорна смерть\n$BULLET$Гуситські війни\n$BULLET$Повстання Червоних Тюрбанів\n$BULLET$Піднесення $name_temur$\n$BULLET$Західна схизма\n\nСитуації [ShowAgeName('age_3_discovery')]:\n$BULLET$Велика чума\n$BULLET$Італійські війни\n$BULLET$Реформація\n$BULLET$Сенґоку Дзідай\n$BULLET$Тордесільяський договір\n\nСитуації [ShowAgeName('age_4_reformation')]:\n$BULLET$Тридентський собор\n$BULLET$Війна релігій\n\nСитуації [ShowAgeName('age_5_absolutism')]:\n$BULLET$Колумбів обмін\n$BULLET$Золота доба піратства\n$BULLET$Малий льодовиковий період\n\nСитуації [ShowAgeName('age_6_revolutions')]:\n$BULLET$Колоніальна революція\n$BULLET$Народне повстання"
  game_concept_situation_action: "Дія ситуації"
  game_concept_situation_actions: "Дії ситуації"
  game_concept_situation_action_desc: "Це [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], які ми можемо виконувати, поки активна певна [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]. Вони зникають, як тільки ситуація вирішується.\n\nДеякі приклади: [ShowGenericActionName('hide_from_black_death')] та [ShowGenericActionName('rtr_rekindle_revolt')]."
  game_concept_disaster: "Катастрофа"
  game_concept_disasters: "Лиха"
  game_concept_disaster_desc: "Лихо — це важлива та руйнівна подія, що впливає на окрему [Concept('country', 'CONCEPT_PLACEHOLDER')|e], і може тривати або залишатися активним протягом тривалого часу, доки [Concept('country', 'CONCEPT_PLACEHOLDER')|e] не подолає його.\n\nДеякі з найважливіших Лих включають [ShowDisasterName('ambrosian_republic_disaster')] та [ShowDisasterName('dissolution_of_delhi')]."
  game_concept_tax_efficiency: "Податкова ефективність"
  game_concept_tax_efficiency_desc: "Це показник ефективності збору [Concept('tax', 'CONCEPT_PLACEHOLDER')|e] нашою [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Якщо він позитивний, це може фактично збільшити суму $game_concept_tax$, яку [Concept('country', 'CONCEPT_PLACEHOLDER')|e] можуть отримати від своїх [Concept('estates', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_trade_efficiency: "Ефективність торгівлі"
  game_concept_trade_efficiency_desc: "Це змінює прибутковість [Concept('trade', 'CONCEPT_PLACEHOLDER')|e], безпосередньо впливаючи на ціну, за якою ви продаєте [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] цільовому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_production_efficiency: "Ефективність виробництва"
  game_concept_production_efficiency_desc: "Це впливає на [Concept('output', 'CONCEPT_PLACEHOLDER')|e] [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]. Позитивна Ефективність виробництва збільшує прибуток, тоді як негативна може зробити його утримання невигідним."
  game_concept_economical_base: "Економічна база"
  game_concept_economical_base_desc: "Вона базується на [Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] плюс обсяг усіх її [Concept('trades', 'CONCEPT_PLACEHOLDER')|e] та будь-які [Concept('sound_tolls', 'CONCEPT_PLACEHOLDER')|e], які вона може отримати."
  game_concept_tax_rate: "Податкова ставка"
  game_concept_tax_rate_desc: "Відсоток від [Concept('max_tax', 'CONCEPT_PLACEHOLDER')|e], який [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] сплачує як [Concept('taxes', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_max_tax: "Максимальний податок"
  game_concept_maximum_tax: "Максимальний податок"
  game_concept_max_tax_desc: "Це найбільший відсоток [Concept('tax', 'CONCEPT_PLACEHOLDER')|e], який може бути стягнутий з [Concept('estate', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_min_tax: "Мінімальний податок"
  game_concept_minimum_tax: "Мінімальний податок"
  game_concept_min_tax_desc: "Це найменший відсоток [Concept('tax', 'CONCEPT_PLACEHOLDER')|e], який може бути стягнутий з [Concept('estate', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_profit: "Прибуток"
  game_concept_profit_desc: "Це сума, яку [Concept('building', 'CONCEPT_PLACEHOLDER')|e] або [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] вносить до [Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e] своєї [location], вже з урахуванням [Concept('control', 'CONCEPT_PLACEHOLDER')|e]. Іншими словами, це [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], які фактично створюються [building]."
  game_concept_potential_profit: "Потенційний прибуток"
  game_concept_potential_profit_desc: "Це різниця між доходами та витратами [Concept('building', 'CONCEPT_PLACEHOLDER')|e], без урахування [Concept('control', 'CONCEPT_PLACEHOLDER')|e].\n\nЯкщо він негативний, будівля вважатиметься нерентабельною і припинить роботу."
  game_concept_tax: "Податок"
  game_concept_taxes: "Податки"
  game_concept_tax_desc: "Ми можемо вирішити збирати податки з наших [Concept('estates', 'CONCEPT_PLACEHOLDER')|e]. Це збільшить нашу [Concept('treasury', 'CONCEPT_PLACEHOLDER')|e], але вищі податки зменшать їхню [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e].\n\nСума податків, які ви можете зібрати, залежить від нашого [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над нашими [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], що генерують багатство для [Concept('estates', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_tax_base: "Податкова база"
  game_concept_tax_base_desc: "Це загальна кількість [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], що генерується в [Concept('location', 'CONCEPT_PLACEHOLDER')|e] щомісяця, яка походить від прибутку її [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] та [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], помноженого на [Concept('control', 'CONCEPT_PLACEHOLDER')|e].\n\nКожен [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] у [location] отримує [Concept('tax_base_share', 'CONCEPT_PLACEHOLDER')|e] і сплачує частину його до [Concept('treasury', 'CONCEPT_PLACEHOLDER')|e] відповідно до [Concept('tax_rate', 'CONCEPT_PLACEHOLDER')|e], накладеної на них."
  game_concept_max_tax_base: "Потенційна податкова база"
  game_concept_max_tax_base_desc: "Потенційна податкова база [Concept('location', 'CONCEPT_PLACEHOLDER')|e] — це сукупний прибуток від її [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] та [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] від продажу їхніх [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Якщо в [location] присутні [ShowPopTypeName('burghers')], [Concept('burgher_trade', 'CONCEPT_PLACEHOLDER')|e] також може збільшити Потенційну податкову базу.\n\nПотенційна податкова база, помножена на [Concept('control', 'CONCEPT_PLACEHOLDER')|e], дає [Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що є [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], яке фактично створюється та розподіляється між [Concept('estates', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_tax_base_share: "Частка податкової бази"
  game_concept_tax_base_share_desc: "[Concept('tax_base', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] розподіляється між [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] відповідно до їхньої відносної [Concept('population', 'CONCEPT_PLACEHOLDER')|e] у [location]. [ShowPopTypeName('nobles')] отримують значно більшу частку на душу населення, ніж [ShowPopTypeName('burghers')], які, своєю чергою, отримують значно більшу частку на душу населення, ніж [ShowPopTypeName('peasants')]."
  game_concept_bankrupt: "Банкрут"
  game_concept_bankruptcy: "Банкрутство"
  game_concept_bankrupt_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e], що вирішила стати банкрутом, очистить усі свої [Concept('debt', 'CONCEPT_PLACEHOLDER')|e]. Однак це призведе до 5-річного періоду суворих [Concept('modifiers', 'CONCEPT_PLACEHOLDER')|e].\n[country] також може бути примушена до банкрутства, якщо в неї закінчаться гроші, і вона не зможе взяти більше [Concept('loans', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_formable_country: "Країна, що формується"
  game_concept_formable: "Формована"
  game_concept_formables: "Формовані"
  game_concept_formable_country_formed: "Сформовано"
  game_concept_formable_country_form: "Сформувати"
  game_concept_formable_country_formation: "Формування"
  game_concept_formable_forming: "Формування"
  game_concept_formable_countries: "Країни, що формуються"
  game_concept_formable_country_desc: "Країна, що формується, — це нова національна ідентичність, яка може бути сформована (або переформована) [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що відповідає певним умовам.\n\nЦі умови можуть включати контроль над відсотком [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] у [Concept('region', 'CONCEPT_PLACEHOLDER')|e] або наявність певної [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e].\n\nМи можемо сформувати лише Країну, що формується, яка має такий самий або вищий [Concept('tier', 'CONCEPT_PLACEHOLDER')|e] ніж наш поточний [tier].\n\nЗазвичай вони представляють історичні союзи або навіть легендарні амбіції. Після формування стара [country] змінить свою назву, прапор і кольори на ті, що належать Країні, що формується."
  game_concept_revolter: "Повстанець"
  game_concept_revolt: "Повстання"
  game_concept_revolter_desc: "Повстання — це коли група [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] відокремлюється як нова [Concept('country', 'CONCEPT_PLACEHOLDER')|e] і починає [Concept('war', 'CONCEPT_PLACEHOLDER')|e] проти початкового [Concept('owner', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_rebel_movement: "Повстанський рух"
  game_concept_rebel_movements: "Повстанські рухи"
  game_concept_rebel: "Повстанець"
  game_concept_rebels: "Повстанці"
  game_concept_rebellion: "Повстання"
  game_concept_rebellions: "Повстання"
  game_concept_rebel_movement_desc: "Повстанський рух — це група [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що об'єднуються проти свого уряду через низьку [pop_satisfaction].\n\nІснують різні типи повстанських рухів. Наприклад, [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] іншої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] або [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] спробують [Concept('revolt', 'CONCEPT_PLACEHOLDER')|e], тоді як незадоволений [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] спробує розпочати [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_estate_rebels: "Повстанці станів"
  game_concept_estate_rebels_desc: "Повстанці — це фракція, що складається або з [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] іншої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] чи [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], які намагаються здійснити [Concept('revolt', 'CONCEPT_PLACEHOLDER')|e], або з незадоволеного [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], який намагається спровокувати [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_nationalist_rebels: "Націоналістичні повстанці"
  game_concept_nationalist_rebels_desc: "Повстанці — це фракція, що складається або з [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] іншої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] чи [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], які намагаються здійснити [Concept('revolt', 'CONCEPT_PLACEHOLDER')|e], або з незадоволеного [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], який намагається спровокувати [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_pretender_rebels: "Повстанці-претенденти"
  game_concept_pretender_rebels_desc: "Повстанці — це фракція, що складається або з [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] іншої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] чи [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], які намагаються здійснити [Concept('revolt', 'CONCEPT_PLACEHOLDER')|e], або з незадоволеного [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], який намагається спровокувати [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_religious_rebels: "Релігійні повстанці"
  game_concept_religious_rebels_desc: "Повстанці — це фракція, що складається або з [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] іншої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] чи [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], які намагаються здійснити [Concept('revolt', 'CONCEPT_PLACEHOLDER')|e], або з незадоволеного [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], який намагається спровокувати [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_slave_rebels: "Повстанці-раби"
  game_concept_slave_rebels_desc: "Повстанці — це фракція, що складається або з [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] іншої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] чи [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], які намагаються здійснити [Concept('revolt', 'CONCEPT_PLACEHOLDER')|e], або з незадоволеного [Concept('estate', 'CONCEPT_PLACEHOLDER')|e], який намагається спровокувати [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_disloyal_subjects: "Нелояльні піддані"
  game_concept_disloyal_subject: "Нелояльний підданий"
  game_concept_disloyal_subjects_short: "Нелояльний"
  game_concept_disloyal_subjects_desc: "Коли [subject] має менше ніж [GetDefine('NDiplomacy','TOO_DISLOYAL_THRESHOLD')] [Concept('subject_loyalty', 'CONCEPT_PLACEHOLDER')|e] до свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], він стає нелояльним підданим.\n\nУ такому стані він більше не приєднуватиметься до [Concept('wars', 'CONCEPT_PLACEHOLDER')|e] свого [overlord] і не може бути [Concept('annexed', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_loyal_subjects: "Лояльні піддані"
  game_concept_loyal_subject: "Лояльний підданий"
  game_concept_loyal_subjects_short: "Лояльний"
  game_concept_loyal_subjects_desc: "Коли [subject] має більше ніж [GetDefine('NDiplomacy','TOO_DISLOYAL_THRESHOLD')] [Concept('subject_loyalty', 'CONCEPT_PLACEHOLDER')|e] до свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], він стає лояльним підданим.\n\nУ такому стані він приєднуватиметься до [Concept('wars', 'CONCEPT_PLACEHOLDER')|e] свого [overlord] і може бути [Concept('annexed', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_pop_needs: "Потреби населення"
  game_concept_pop_needs_desc: "[Concept('pop_with_icon', 'CONCEPT_PLACEHOLDER')|e] має список [Concept('goods_with_icon', 'CONCEPT_PLACEHOLDER')|e], необхідних для життя, що залежить від їхнього [Concept('pop_type', 'CONCEPT_PLACEHOLDER')|e], [Concept('culture', 'CONCEPT_PLACEHOLDER')|e], [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] та місця проживання. Наприклад, [ShowPopTypeName('nobles')] мають значно вищі вимоги, ніж [Concept('lower_class', 'CONCEPT_PLACEHOLDER')|e]. Якщо вони не можуть задовольнити ці потреби, їхня [Concept('pop_satisfaction_with_icon', 'CONCEPT_PLACEHOLDER')|e] постраждає.\n\nКількість [goods], що вимагається [pop], зростає з [Concept('development_with_icon', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e], де вони проживають."
  game_concept_pop_satisfaction: "Задоволеність населення"
  game_concept_pop_satisfaction_desc: "Це показник того, наскільки [Concept('pop', 'CONCEPT_PLACEHOLDER')|e] задоволене своїм життєвим становищем. На нього впливають такі фактори:\n$BULLET_WITH_TAB$[Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('unrest', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$ [Concept('tolerance', 'CONCEPT_PLACEHOLDER')|e] його [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$Чи є воно [Concept('accepted_culture', 'CONCEPT_PLACEHOLDER')|e] чи ні\n$BULLET_WITH_TAB$Доступ до [Concept('pop_needs', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('market_price', 'CONCEPT_PLACEHOLDER')|e] [Concept('pop_needs', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('cultural_opinion', 'CONCEPT_PLACEHOLDER')|e] його [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] з боку [culture] [Concept('country', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_average_satisfaction: "Середня задоволеність"
  game_concept_average_satisfaction_desc: "Це середня [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Це негативно впливає на [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e] та [Concept('control', 'CONCEPT_PLACEHOLDER')|e] локації."
  game_concept_port: "Порт"
  game_concept_ports: "Порти"
  game_concept_port_desc: "Порт – це сухопутна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] біля моря, яка має потенціал для будівництва та швартування [Concept('ships', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_colonial_migration: "Колоніальна міграція"
  game_concept_colonial_migration_desc: "[Concept('colonial_migration', 'CONCEPT_PLACEHOLDER')|e] – це коли [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [Concept('migrate', 'CONCEPT_PLACEHOLDER')|e] з [Concept('core', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] до [Concept('colonial_charter', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_disease_resistance: "Стійкість до хвороб"
  game_concept_disease_resistance_desc: "Це впливає на ймовірність виживання [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] та [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] після [Concept('diseases', 'CONCEPT_PLACEHOLDER')|e], таких як [ShowDiseaseName('bubonic_plague')]."
  game_concept_migration_attraction: "Привабливість міграції"
  game_concept_migration_attraction_desc: "Коли [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] живуть у [Concept('location', 'CONCEPT_PLACEHOLDER')|e] з негативною Привабливістю міграції, вони захочуть переїхати до [location] з найвищою Привабливістю міграції на тому ж [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Деякі типи [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], як-от [ShowPopTypeName('slaves')], постійно обмежені в міграції, тоді як інші, як-от [ShowPopTypeName('peasants')], можуть переїхати лише за дозволом їхніх [Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_migration: "Міграція"
  game_concept_migrate: "Мігрувати"
  game_concept_migrates: "Мігрує"
  game_concept_migrated: "Мігрував"
  game_concept_migration_desc: "[Concept('pops', 'CONCEPT_PLACEHOLDER')|e] мігруватимуть з однієї [Concept('location', 'CONCEPT_PLACEHOLDER')|e] до іншої, якщо відчують, що отримають краще життя. Попам з деяких [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] може бути не дозволено вільно мігрувати, залежно від того, які [Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e] ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] могла запровадити. Попи зазвичай мігрують лише в межах одного [Concept('market', 'CONCEPT_PLACEHOLDER')|e], якщо тільки вони не мігрують до [Concept('colonial_charter', 'CONCEPT_PLACEHOLDER')|e] або не мігрують через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_unrest: "Невдоволення"
  game_concept_unrest_desc: "Це значення, яке негативно впливає на [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] у певній [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_truce: "Перемир'я"
  game_concept_truce_desc: "Перемир'я автоматично створюється, коли між двома [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] підписується [Concept('peace_treaty', 'CONCEPT_PLACEHOLDER')|e]. Оголошення [Concept('war', 'CONCEPT_PLACEHOLDER')|e] тому, з ким у нас перемир'я, матиме серйозні наслідки. Деякі дипломатичні дії можуть бути повністю заблоковані з націями, з якими у нас перемир'я."
  game_concept_trait: "Риса"
  game_concept_traits: "Риси"
  game_concept_trait_upper_desc: "$game_concept_traits$ визначають особистість та поведінку [Concept('character', 'CONCEPT_PLACEHOLDER')|e] за різних обставин. Різні типи $game_concept_traits$ можна отримати, виконуючи певні [Concept('roles', 'CONCEPT_PLACEHOLDER')|e], але $game_concept_character$ використовуватиме лише ті $game_concept_traits$, які відповідають його поточній $game_concept_role$."
  game_concept_trait_desc: "$game_concept_trait_upper_desc$"
  game_concept_ruler_trait: "Риса правителя"
  game_concept_ruler_traits: "Риси правителя"
  game_concept_ruler_trait_desc: "Риса $game_concept_ruler_trait$ — це тип [Concept('trait', 'CONCEPT_PLACEHOLDER')|e], що активний лише тоді, коли [Concept('character', 'CONCEPT_PLACEHOLDER')|e] є [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] або [Concept('regent', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('character', 'CONCEPT_PLACEHOLDER')|e] може здобути до трьох $game_concept_ruler_traits$, правлячи [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_general_trait: "Риса полководця"
  game_concept_general_traits: "Риси полководця"
  game_concept_general_trait_desc: "Риса $game_concept_general_trait$ — це тип [Concept('trait', 'CONCEPT_PLACEHOLDER')|e], що активний лише тоді, коли [Concept('character', 'CONCEPT_PLACEHOLDER')|e] є [Concept('general', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('character', 'CONCEPT_PLACEHOLDER')|e] може здобути до однієї $game_concept_general_trait$, воюючи в сухопутних [Concept('battles', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_admiral_trait: "Риса адмірала"
  game_concept_admiral_traits: "Риси адмірала"
  game_concept_admiral_trait_desc: "Риса $game_concept_admiral_trait$ — це тип [Concept('trait', 'CONCEPT_PLACEHOLDER')|e], що активний лише тоді, коли [Concept('character', 'CONCEPT_PLACEHOLDER')|e] є [Concept('admiral', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('character', 'CONCEPT_PLACEHOLDER')|e] може здобути до однієї $game_concept_admiral_trait$, воюючи в морських [Concept('battles', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_explorer_trait: "Риса дослідника"
  game_concept_explorer_traits: "Риси дослідника"
  game_concept_explorer_trait_desc: "Риса $game_concept_explorer_trait$ — це тип [Concept('trait', 'CONCEPT_PLACEHOLDER')|e], що активний лише тоді, коли [Concept('character', 'CONCEPT_PLACEHOLDER')|e] є [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('character', 'CONCEPT_PLACEHOLDER')|e] може здобути до однієї $game_concept_explorer_trait$, очолюючи [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e] місії."
  game_concept_artist_trait: "Риса митця"
  game_concept_artist_traits: "Риси митця"
  game_concept_artist_trait_desc: "Риса $game_concept_artist_trait$ — це тип [Concept('trait', 'CONCEPT_PLACEHOLDER')|e], що активний лише тоді, коли [Concept('character', 'CONCEPT_PLACEHOLDER')|e] є [Concept('artist', 'CONCEPT_PLACEHOLDER')|e].\n\nКожен $game_concept_artist$ отримує свою рису при створенні як $game_concept_character$."
  game_concept_child_trait: "Дитяча риса"
  game_concept_child_traits: "Дитячі риси"
  game_concept_child_trait_desc: "Кожна [Concept('child', 'CONCEPT_PLACEHOLDER')|e] та [Concept('adolescent', 'CONCEPT_PLACEHOLDER')|e] має одну $game_concept_child_trait$ під час дорослішання, яка зникає, щойно вони стають [Concept('adult', 'CONCEPT_PLACEHOLDER')|e]. $game_concept_child_traits$ впливають на швидкість зростання їхніх [Concept('abilities', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_religious_figure_trait: "Риса релігійного діяча"
  game_concept_religious_figure_traits: "Риси релігійного діяча"
  game_concept_religious_figure_trait_desc: "Риса $game_concept_religious_figure_trait$ — це тип [Concept('trait', 'CONCEPT_PLACEHOLDER')|e], що активний лише тоді, коли [Concept('character', 'CONCEPT_PLACEHOLDER')|e] є [Concept('religious_figure', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('character', 'CONCEPT_PLACEHOLDER')|e] з $game_concept_religious_figure_trait$ може надати поштовх [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка їх наймає."
  game_concept_fortification: "Укріплення"
  game_concept_fortifications: "Укріплення"
  game_concept_fort: "Форт"
  game_concept_forts: "Форти"
  game_concept_fortification_desc: "Це оборонні [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e], призначені для захисту власних [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] від [Concept('enemy', 'CONCEPT_PLACEHOLDER')|e] [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]. [location] з фортом не може бути [Concept('sieged', 'CONCEPT_PLACEHOLDER')|e] миттєво, натомість вимагатиме тривалої [siege]. Певні [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] дозволять будувати ефективніші форти, причому кожен рівень збільшує складність [siege], необхідної для їх [Concept('occupy', 'CONCEPT_PLACEHOLDER')|e].\n\nФорти мають [Concept('zone_of_control', 'CONCEPT_PLACEHOLDER')|e] над прилеглими [locations].\n\nФорти мають [Concept('fort_maintenance_with_icon', 'CONCEPT_PLACEHOLDER')|e] витрати, які йдуть безпосередньо до [treasury] країни та залежать від цін на [goods] на їхньому [Concept('market', 'CONCEPT_PLACEHOLDER')|e]. Усі [countries] мають [fort_limit] на кількість фортів, які вони можуть ефективно утримувати, і перевищення цього ліміту значно збільшує [fort_maintenance]."
  game_concept_fort_limit: "Ліміт фортів"
  game_concept_fort_limit_desc: "$game_concept_fort_limit$ [Concept('country_with_icon', 'CONCEPT_PLACEHOLDER')|e] відображає його здатність утримувати свої [Concept('fortifications_with_icon', 'CONCEPT_PLACEHOLDER')|e] без перевантаження адміністрації. [country] може перевищити свій Ліміт фортів, але це спричинить поступово вищі [Concept('fort_maintenance_with_icon', 'CONCEPT_PLACEHOLDER')|e] витрати.\n\n$game_concept_fort_limit$ збільшується головним чином з кількістю володінь [Concept('locations_with_icon', 'CONCEPT_PLACEHOLDER')|e], а також з [Concept('country_rank_with_icon', 'CONCEPT_PLACEHOLDER')|e] та кількістю [locations] зі [ShowLocationRankName('city')] [Concept('location_rank', 'CONCEPT_PLACEHOLDER')|e]. [ShowSocietyDirectionName('defensive')] [Concept('societal_value_with_icon', 'CONCEPT_PLACEHOLDER')|e] та деякі [Concept('advances_with_icon', 'CONCEPT_PLACEHOLDER')|e] також можуть його збільшити."
  game_concept_zone_of_control: "Зона контролю"
  game_concept_zones_of_control: "Зони контролю"
  game_concept_zone_of_control_desc: "Вона відображає оборонні можливості [Concept('fortification', 'CONCEPT_PLACEHOLDER')|e] блокувати рух [Concept('enemy', 'CONCEPT_PLACEHOLDER')|e] [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] через [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], що прилягають до нього. Армія-загарбник, що стоїть на [enemy] [location], прилеглій до [enemy] [fort], муситиме спочатку [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] [fort], перш ніж зможе пройти повз нього до будь-якої іншої прилеглої [location] цього [fort]."
  game_concept_role: "Роль"
  game_concept_roles: "Ролі"
  game_concept_role_list_title: "Список ролей"
  game_concept_role_list: "[Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('regent', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('cabinet_member', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('general', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('admiral', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('artist', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_role_desc: "$game_concept_roles$ — це різні посади, які [Concept('adult', 'CONCEPT_PLACEHOLDER')|e] [Concept('character', 'CONCEPT_PLACEHOLDER')|e] може виконувати в [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. [Concept('abilities', 'CONCEPT_PLACEHOLDER')|e] $game_concept_character$ матимуть різні ефекти залежно від їхньої Ролі, і вони зможуть здобувати різні [Concept('traits', 'CONCEPT_PLACEHOLDER')|e].\n\nЗазвичай $game_concept_character$ може виконувати лише одну Роль одночасно, але іноді [Concept('rulers', 'CONCEPT_PLACEHOLDER')|e] та [Concept('regents', 'CONCEPT_PLACEHOLDER')|e] можуть виступати як [Concept('generals', 'CONCEPT_PLACEHOLDER')|e] або [Concept('admirals', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_regent: "Регент"
  game_concept_regents: "Регенти"
  game_concept_regent_desc: "Це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], що виконує обов'язки [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] під час [Concept('regency', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_commander: "Командир"
  game_concept_commanders: "Командири"
  game_concept_commander_desc: "Командир — це [Concept('admiral', 'CONCEPT_PLACEHOLDER')|e] або [Concept('general', 'CONCEPT_PLACEHOLDER')|e], що очолює [Concept('unit', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_admiral: "Адмірал"
  game_concept_admirals: "Адмірали"
  game_concept_admiral_desc: "Це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], якому призначено роль командувача [Concept('navy', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_general: "Генерал"
  game_concept_generals: "Генерали"
  game_concept_general_desc: "Це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], якому призначено роль командувача [Concept('army', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_artistic_skill: "Художня майстерність"
  game_concept_artistic_skill_desc: "Ця навичка має найбільший вплив на [Concept('art_quality', 'CONCEPT_PLACEHOLDER')|e] [Concept('work_of_art', 'CONCEPT_PLACEHOLDER')|e], яке може створити [Concept('artist', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_artist_salary: "Зарплата художника"
  game_concept_artist_salary_desc: "Кількість [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], яку заробить [Concept('artist', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_merchant: "Купець"
  game_concept_merchants: "Купці"
  game_concept_merchant_desc: "Купці — це компанія, лояльна до [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка присутня на [Concept('market', 'CONCEPT_PLACEHOLDER')|e] і може використовувати свою [Concept('merchant_power', 'CONCEPT_PLACEHOLDER')|e] та [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e] для [Concept('trade', 'CONCEPT_PLACEHOLDER')|e] [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] з іншим [Concept('market', 'CONCEPT_PLACEHOLDER')|e] в надії на прибуток."
  game_concept_merchant_power: "Торгова перевага"
  game_concept_merchant_power_desc: "$game_concept_merchant_power$ [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] на [Concept('market', 'CONCEPT_PLACEHOLDER')|e] визначає, хто зможе першим виконати свої [Concept('exports', 'CONCEPT_PLACEHOLDER')|e].\n\nЯкщо на $game_concept_market$ є обмежена кількість [Concept('supply', 'CONCEPT_PLACEHOLDER')|e] [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], вони розподіляються за $game_concept_merchant_power$, яку кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має на цьому $game_concept_market$."
  game_concept_merchant_capacity: "Торгова спроможність"
  game_concept_merchant_capacity_desc: "Це відображає, скільки [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може [Concept('export', 'CONCEPT_PLACEHOLDER')|e] та/або [Concept('import', 'CONCEPT_PLACEHOLDER')|e] з [Concept('market', 'CONCEPT_PLACEHOLDER')|e].\n\nКожна [Concept('trade', 'CONCEPT_PLACEHOLDER')|e], створена з цього [market], використовує [merchant_capacity] залежно від відстані до іншого [market] та обсягу [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], які ця [trade] здійснює."
  game_concept_merchant_maintenance: "Утримання торгового шляху"
  game_concept_merchant_maintenance_desc: "Це відображає вартість встановлення [Concept('trades', 'CONCEPT_PLACEHOLDER')|e] між [Concept('markets', 'CONCEPT_PLACEHOLDER')|e]. Торгівля не є безкоштовною, оскільки кораблі, вози та каравани потребують утримання, а самим купцям потрібно платити.\n\nУтримання торгівлі зростає з відстанню та залежить від наявності [Concept('sound_tolls', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_subject_taxation: "Оподаткування підданих"
  game_concept_subject_taxation_desc: "Оподаткування підданих — це [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] отримує від своїх [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]. Точна сума базується на Економіці [subject], а потім масштабується за правилами [Concept('subject_type', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_subject_loyalty: "Лояльність підданих"
  game_concept_subject_loyalty_desc: "Кожен [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] має Лояльність підданих до свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]. Вона коливається від 0 до 100, і як тільки вона падає нижче 50, [subject] стає [Concept('disloyal_subject', 'CONCEPT_PLACEHOLDER')|e].\n\nНа її значення безпосередньо впливає [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e], і воно може бути додатково зменшене за допомогою [ShowCabinetActionName('sow_disloyalty')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_subject_type: "Тип підданого"
  game_concept_subject_types: "Типи підданих"
  game_concept_subject_type_desc: "Кожен [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] має Тип підданого, який по суті визначає правила, яких він повинен дотримуватися щодо таких аспектів, як [Concept('war', 'CONCEPT_PLACEHOLDER')|e] та [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e].\n\nТипи підданих також диктують [Concept('subject_taxation', 'CONCEPT_PLACEHOLDER')|e] та [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e], які кожен [subject] повинен віддавати своєму [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_subject: "Підданий"
  game_concept_subjects: "Піддані"
  game_concept_subjugate: "Підкорити"
  game_concept_subjugated: "Підкорений"
  game_concept_subject_desc: "Підданий — це будь-яка [Concept('country', 'CONCEPT_PLACEHOLDER')|e], яка підпорядкована [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e].\n\nВона зазвичай має обмеження на свою [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] в обмін на захист у [Concept('war', 'CONCEPT_PLACEHOLDER')|e].\n\nПіддані також можуть страждати від [Concept('subject_taxation', 'CONCEPT_PLACEHOLDER')|e] та мати певний відсоток свого [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e], стягнутий їхнім [overlord]. Крім того, підданий не може стати [Concept('great_power', 'CONCEPT_PLACEHOLDER')|e]. Точні правила залежать від [Concept('subject_type', 'CONCEPT_PLACEHOLDER')|e].\n\nПіддані мають [Concept('subject_loyalty', 'CONCEPT_PLACEHOLDER')|e] до свого [overlord] та [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e] — обидва показники їхньої поточної позиції щодо їхнього підпорядкування, наприклад, чи є вони [Concept('loyal_subjects_short', 'CONCEPT_PLACEHOLDER')|e] або [Concept('disloyal_subjects_short', 'CONCEPT_PLACEHOLDER')|e].\n\nБудь-який підданий, у свою чергу, може бути [overlord] інших [countries], дозволяючи довгі ланцюги відносин Підданий-[overlord].\n\nДеякі піддані є [Concept('non_sovereign_subjects', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_non_sovereign_subject: "Несуверенний підданий"
  game_concept_non_sovereign_subjects: "Несуверенні піддані"
  game_concept_non_sovereign_subject_desc: "Несуверенний підданий — це тип [Concept('subject', 'CONCEPT_PLACEHOLDER')|e], який не може діяти незалежно від свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] і, таким чином, має обмежену здатність вести [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] та не може самостійно вести [Concept('wars', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_overlord: "Сюзерен"
  game_concept_overlords: "Сюзерени"
  game_concept_direct_overlord: "Прямий сюзерен"
  game_concept_overlord_desc: "Сюзерен — це [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що має будь-яку кількість [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] у своєму підпорядкуванні.\n\nВ обмін на захист кожного [subject] у [Concept('wars', 'CONCEPT_PLACEHOLDER')|e], він зазвичай отримує [Concept('subject_taxation', 'CONCEPT_PLACEHOLDER')|e] та стягує певний відсоток від [subject]'s [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e]. Точні правила залежать від [subject]'s [Concept('subject_type', 'CONCEPT_PLACEHOLDER')|e].\n\nБудь-який сюзерен може, своєю чергою, бути [subject] інших [countries], дозволяючи довгі ланцюги відносин [subject]-сюзерен."
  game_concept_liberty_desire: "Прагнення до свободи"
  game_concept_liberty_desire_desc: "Прагнення до свободи відображає поточне прагнення [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] до незалежності від свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] та впливає на [Concept('subject_loyalty', 'CONCEPT_PLACEHOLDER')|e].\n\nЙого значення коливається від -100 до +100, але щомісяця зменшується до 0.\n\nЦе значення також використовується як валюта в деяких взаємодіях з підданими."
  game_concept_societal_value: "Суспільна цінність"
  game_concept_societal_values: "Суспільні цінності"
  game_concept_societal_value_upper_desc: "Суспільні цінності визначають соціальну та політичну структуру [Concept('country', 'CONCEPT_PLACEHOLDER')|e], звичаї її народу та характеристики її правового устрою. Їхні ефекти можуть мати глибокий вплив на те, як грається країна, а деякі просунуті [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e] вимагають певних комбінацій [societal_values] для впровадження. Суспільні цінності також відіграють важливу роль у [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e], оскільки [countries] зі схожими суспільними цінностями, як правило, мають вищу [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] одне про одного.\n\nКожна суспільна цінність — це вісь з двома протилежними полюсами, що можуть досягати 100. Позиція країни на осі переважно залежить від [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e] та [Concept('cabinet_actions', 'CONCEPT_PLACEHOLDER')|e], і вона повільно зміщується з часом до одного з двох полюсів. Однак прогрес до одного полюса зупиниться на максимумі, визначеному загальною кількістю факторів, що штовхають його в цьому напрямку. Чим вища суспільна цінність, тим більше факторів потрібно, щоб просунути її далі."
  game_concept_societal_value_list_title: "Список суспільних цінностей"
  game_concept_societal_value_desc: "$game_concept_societal_value_upper_desc$\n\n[ShowDatabase('societal_values')]"
  game_concept_religious_head: "Релігійний глава"
  game_concept_pope: "Папа Римський"
  game_concept_religious_head_desc: "Це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], який вважається відповідальним та представником цілої [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] деномінації."
  game_concept_excommunication: "Відлучення від церкви"
  game_concept_excommunications: "Відлучення від церкви"
  game_concept_excommunicate: "Відлучити від церкви"
  game_concept_excommunicates: "Відлучає від церкви"
  game_concept_excommunicated: "Відлучений від церкви"
  game_concept_excommunication_desc: "Відлучення від церкви — це міжнародний статус [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] із серйозним релігійним та дипломатичним штрафом. Усі [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] тієї ж [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] отримують [ShowBiasValue('opinion_excommunicated')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] щодо відлученої [country], та [ShowCasusBelliName('cb_excommunication')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти неї. Крім того, відлучена [country] отримує наступні штрафи до приходу наступного правителя:\n[ShowModifierEffect('excommunicated')]"
  game_concept_karma: "Карма"
  game_concept_karma_i: "@karma!"
  game_concept_karma_desc: "Карма вимірюється за шкалою від #R -100#! до #R +100#! та відображає минулі вчинки [Concept('country', 'CONCEPT_PLACEHOLDER')|e].\nКраїна отримає найбільшу вигоду, коли її карма знаходиться в рівновазі, між #G -33#! та #G +33#!."
  game_concept_pious: "Благочестивий"
  game_concept_purity: "Чистота"
  game_concept_purity_i: "@purity!"
  game_concept_purity_desc: "Це показник того, наскільки чиста наша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] згідно з [ShowReligionName('shinto')]. Чистота втрачається від контакту з чимось нечистим, таким як вбивство та втрата [Concept('people', 'CONCEPT_PLACEHOLDER')|e] у [Concept('battles', 'CONCEPT_PLACEHOLDER')|e], або епідемії, оскільки смерть і кров є нечистими. Вона здобувається через виконання релігійних актів, таких як паломництва до [Concept('holy_sites', 'CONCEPT_PLACEHOLDER')|e] або ритуальне самогубство."
  game_concept_honor: "Честь"
  game_concept_honor_i: "@honor!"
  game_concept_honor_desc: "Наскільки почесна наша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] в очах нашого народу.\n\nПідтримання [Concept('purity', 'CONCEPT_PLACEHOLDER')|e] нашої країни вище 75 збільшить нашу [Concept('honor', 'CONCEPT_PLACEHOLDER')|e], тоді як низька Чистота зменшить її.\n\nІнші релігійні та дипломатичні дії також можуть впливати на неї."
  game_concept_yanantin: "Yanantin"
  game_concept_yanantin_i: "@yanantin!"
  game_concept_yanantin_desc: "Янантін представляє баланс між двома взаємодоповнюючими, але протилежними сутностями. Дотримуючись світогляду [ShowCultureGroupName('andean_group')] [Concept('cultures', 'CONCEPT_PLACEHOLDER')|e], гармонія може бути досягнута лише тоді, коли істота, чоловік, темрява, Сон, знаходить своє доповнення і приєднується до нього: жінка, світло, Місяць."
  game_concept_righteousness: "Праведність"
  game_concept_righteousness_i: "@righteousness!"
  game_concept_righteousness_desc: "Праведність — це міра того, наскільки уряд сприймається як такий, що дотримується філософії та моралі $SECT_CONFUCIANISM_NAME$."
  game_concept_harmony: "Гармонія"
  game_concept_harmony_i: "@harmony!"
  game_concept_harmony_desc: "Гармонія — це міра того, наскільки добре [Concept('country', 'CONCEPT_PLACEHOLDER')|e] дотримується принципів Дао, маючи балансувати між впливом [GetAutoModifier('negative_harmony').GetNameWithTooltip] або [GetAutoModifier('positive_harmony').GetNameWithTooltip]. Країна отримає багато ефектів, що схилятимуть її до одного чи іншого, головним чином через [Concept('events', 'CONCEPT_PLACEHOLDER')|e], і повинна намагатися підтримувати [GetAutoModifier('balanced_harmony').GetNameWithTooltip]."
  game_concept_self_control: "Самоконтроль"
  game_concept_self_control_i: "@self_control!"
  game_concept_self_control_desc: "Самоконтроль — це міра того, наскільки [Concept('country', 'CONCEPT_PLACEHOLDER')|e] та її [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] відмовляються від задоволень та матеріальних благ, і як вони слідують шляхом Йоги.\n\nПозитивне значення $self_control$ означатиме, що вони схильні до аскетизму, надаючи переваги [Concept('stability', 'CONCEPT_PLACEHOLDER')|e], [Concept('migration', 'CONCEPT_PLACEHOLDER')|e], [Concept('annexation', 'CONCEPT_PLACEHOLDER')|e] та зменшене споживання [Concept('food', 'CONCEPT_PLACEHOLDER')|e], тоді як негативне значення $self_control$ означає, що вони схильні до розпусти, надаючи збільшені [Concept('tax', 'CONCEPT_PLACEHOLDER')|e] та споживання [Concept('food', 'CONCEPT_PLACEHOLDER')|e], але зменшене [Concept('war_exhaustion', 'CONCEPT_PLACEHOLDER')|e]. Збалансований $self_control$ у свою чергу дає кращу швидкість [Concept('research', 'CONCEPT_PLACEHOLDER')|e], [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e] та [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_doom: "Приреченість"
  game_concept_doom_i: "@doom!"
  game_concept_doom_desc: "Приреченість — це особлива валюта, що використовується [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] з [ShowReligionAdjective('nahuatl')] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e].\n\nВолодіння [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] — особливо [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e] — пасивно збільшує Приреченість.\n\nВисоке значення Приреченості зменшує [ShowModifierTypeName('loyalty_to_overlord')] та збільшує [ShowModifierTypeName('stability_decay')], але також збільшує [ShowModifierTypeName('global_estate_target_satisfaction')].\n\nІснує кілька способів зменшити Приреченість, зокрема:\n- Вбивство [Concept('enemy', 'CONCEPT_PLACEHOLDER')|e] військ у [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]\n- Пограбування [locations] з високим [Concept('development', 'CONCEPT_PLACEHOLDER')|e]\n\nКоли максимальна Приреченість нарешті досягнута, [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] та вся їхня [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e] приносяться в жертву і замінюються новим [ruler]."
  game_concept_religious_reform: "Релігійна Реформа"
  game_concept_religious_reform_desc: "Релігійна Реформа іноді потрібна або приймається для найкращого результату [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], що представляє постійну адаптацію обрядів та віри через бажання її вірян та інституцій."
  game_concept_patriarch: "Патріарх"
  game_concept_patriarchs: "Патріархи"
  game_concept_patriarch_desc: "Патріархи — це єпископи найвищого рангу в певних [ShowReligionGroupAdjective('christian')] [Concept('religions', 'CONCEPT_PLACEHOLDER')|e]. Їх може бути більше одного в кожній [religion], які керують власним патріархатом."
  game_concept_religious_influence: "Релігійний вплив"
  game_concept_religious_influence_i: "@religious_influence!"
  game_concept_religious_influence_desc: "Це показник здатності [Concept('country', 'CONCEPT_PLACEHOLDER')|e] взаємодіяти та впливати на справи своєї [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e]. Залежно від [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], його використання буде різним, як і способи його здобуття [country]."
  game_concept_rite_power: "Сила обряду"
  game_concept_rite_power_i: "@rite_power!"
  game_concept_rite_power_desc: "Це показник здатності [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що є [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] свого [Concept('autocephalous_patriarchate', 'CONCEPT_PLACEHOLDER')|e], змінювати свою [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] шляхом вибору різних її [Concept('laws', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_papal_bull: "Папська булла"
  game_concept_papal_bulls: "Папські булли"
  game_concept_papal_bull_desc: "Папська булла — це міжнародний едикт, виданий за [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], який впливає на всі [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionAdjective('catholic')] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]. Хоча деякі Папські булли мають [Concept('effects', 'CONCEPT_PLACEHOLDER')|e] та виданий [Concept('law', 'CONCEPT_PLACEHOLDER')|e], усі Папські булли мають [Concept('modifiers', 'CONCEPT_PLACEHOLDER')|e] для країн, ефективність яких масштабується з [Concept('papal_authority', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_papal_authority: "Папський авторитет"
  game_concept_papal_authority_desc: "Папський авторитет — це міра поваги та визнання [Concept('pope', 'CONCEPT_PLACEHOLDER')|e]. Чим вищий авторитет, тим імовірніше, що [ShowReligionAdjective('catholic')] [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] дотримуватимуться наказів Папства. Натомість, низький Папський авторитет робить [countries] більш схильними до дій у власних інтересах, які можуть суперечити [ShowReligionAdjectiveWithNoTooltip('catholic')] амбіціям.\n\nЕфективність [Concept('papal_bulls', 'CONCEPT_PLACEHOLDER')|e] масштабується з авторитетом з коефіцієнтом #Y 2#! (це означає, що [Concept('papal_bull', 'CONCEPT_PLACEHOLDER')|e], видана зі 100% Папським авторитетом, є #G 200.0%#! ефективнішою, тоді як з 0% Папським авторитетом ефект булли зменшується до #R 0.0%#!)."
  game_concept_religious_war: "Релігійна війна"
  game_concept_crusade: "Хрестовий похід"
  game_concept_jihad: "$jihad$"
  game_concept_religious_war_desc: "Релігійна війна оголошується [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] країн однієї віри [Concept('heathen', 'CONCEPT_PLACEHOLDER')|e] країні. Найвидатнішими прикладами в грі є #Y Хрестові походи#! та #Y Джихади#! [ShowReligionGroupAdjective('christian')] та [ShowReligionGroupAdjective('muslim')] [Concept('religions', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_religious_school: "Релігійна школа"
  game_concept_religious_schools: "Релігійні школи"
  game_concept_religious_school_desc: "Святе Письмо може бути непогрішним, але розвинулися різні школи думки щодо того, як найкраще узгодити закони та норми з ним.\nЯку школу наслідує [Concept('country', 'CONCEPT_PLACEHOLDER')|e], вплине на її подальший шлях."
  game_concept_religious_faction: "Релігійна фракція"
  game_concept_religious_factions: "Релігійні фракції"
  game_concept_religious_faction_desc: "Це різні організації всередині однієї [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], що представляють різні течії думки всередині неї. Вони намагатимуться змагатися між собою за покровительство [Concept('country', 'CONCEPT_PLACEHOLDER')|e], а сама [country] може взаємодіяти з ними та отримувати різні переваги."
  game_concept_religious_focus: "Релігійний фокус"
  game_concept_religious_focuses: "Релігійні фокуси"
  game_concept_religious_focus_desc: "Деякі [Concept('religions', 'CONCEPT_PLACEHOLDER')|e] мають атрибути, на яких [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може зосередитися, щоб отримати додаткові переваги. Після завершення достатньої кількості фокусів [religion] може реформуватися."
  game_concept_religious_aspect: "Релігійний аспект"
  game_concept_religious_aspects: "Релігійні аспекти"
  game_concept_religious_aspect_desc: "Деякі [Concept('religions', 'CONCEPT_PLACEHOLDER')|e] мають аспекти, що надалі спеціалізують деталі версії [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] кожної [Concept('country_s', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_location_rank: "Ранг місцевості"
  game_concept_location_rank_desc: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] має ранг, який можна описати як [Concept('urban_location', 'CONCEPT_PLACEHOLDER')|e] або [Concept('rural_location', 'CONCEPT_PLACEHOLDER')|e].\n\n[ShowDatabase('location_rank')]"
  game_concept_corridor: "Коридор"
  game_concept_corridors: "Коридори"
  game_concept_corridor_desc: "Коридори — це особливі [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], які не можуть бути заселені або [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] жодною [Concept('country', 'CONCEPT_PLACEHOLDER')|e], але, на відміну від [Concept('wastelands', 'CONCEPT_PLACEHOLDER')|e], все ще можуть бути перетнуті [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_strait: "Протока"
  game_concept_straits: "Протоки"
  game_concept_strait_desc: "Протока з'єднує дві [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], розділені [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e], але достатньо близькі одна до одної, щоб [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] могли перетнути її без потреби у [Concept('navy', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_katun: "Катун"
  game_concept_katun_desc: "Катун — це міра часу [ShowReligionAdjective('mayan')] народу, що відповідає 19,7 рокам. Закінчення одного Катуна та початок нового відзначалися численними церемоніями та святами, що робило цю подію справді важливою датою для правителів та їхнього народу.\n\nЯкщо до моменту закінчення поточного Катуна ми вкладемо достатньо ресурсів для підготовки до святкувань, ми отримаємо [ShowModifier('katun_celebration')] на 10 років. З іншого боку, якщо ми не будемо готові, ми можемо отримати [ShowModifier('katun_celebration_bad')] на 10 років. Ми будемо повністю готові, коли наш [Concept('religious_influence', 'CONCEPT_PLACEHOLDER')|e] становитиме щонайменше 90."
  game_concept_town_and_city: "Міська місцевість"
  game_concept_urban_location: "Міська місцевість"
  game_concept_urban_locations: "Міські місцевості"
  game_concept_towns_and_cities: "Міські місцевості"
  game_concept_towns_or_cities: "Міські місцевості"
  game_concept_town_or_city: "Міська місцевість"
  game_concept_town_and_city_desc: "Це [Concept('location', 'CONCEPT_PLACEHOLDER')|e] зі значним людським поселенням. Вона може містити більш спеціалізовані [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] та дозволяє процвітати [ShowPopTypeName('burghers')]. Це протилежність [Concept('rural_location', 'CONCEPT_PLACEHOLDER')|e].\n\nЗалежно від розміру, [urban_location] може бути [ShowLocationRankName('town')] або [ShowLocationRankName('city')]."
  game_concept_rural_location: "Сільська місцевість"
  game_concept_rural_locations: "Сільські місцевості"
  game_concept_rural: "Сільська"
  game_concept_rural_location_desc: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e] без значного поселення, а отже, з меншими можливостями для будівництва спеціальних [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]. Це протилежність [Concept('town_or_city', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_cardinal: "Кардинал"
  game_concept_cardinals: "Кардинали"
  game_concept_cardinal_s: "Кардинал(и)"
  game_concept_cardinal_desc: "Кардинал є представником [ShowReligionAdjective('catholic')] Церкви, одразу після [pope]. Кардинали призначаються до [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] шляхом будівництва особливої [Concept('building', 'CONCEPT_PLACEHOLDER')|e], що зветься [ShowBuildingTypeName('seat_of_cardinal')], і вони будуть вірні [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що [Concept('owns', 'CONCEPT_PLACEHOLDER')|e] цю [location].\n\n[country] може використовувати своїх кардиналів для участі в [Concept('curia_actions', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_saint: "Святий"
  game_concept_saints: "Святі"
  game_concept_saint_desc: "Святий — це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], визнаний у [ShowReligionGroupAdjective('christian')] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] завдяки надзвичайному ступеню святості через свої діяння. Процес становлення [saint] відомий як [Concept('canonization', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_canonization: "Канонізація"
  game_concept_canonize: "Канонізувати"
  game_concept_canonized: "Канонізований"
  game_concept_canonization_desc: "Колишній [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може бути канонізований, тобто зроблений [Concept('saint', 'CONCEPT_PLACEHOLDER')|e]. Це надасть [country] додаткові переваги, масштабовані відповідно до того, наскільки здібним був [Concept('character', 'CONCEPT_PLACEHOLDER')|e] за життя."
  game_concept_resolutions: "Резолюції"
  game_concept_resolution: "Резолюція"
  game_concept_vote: "Голос"
  game_concept_votes: "Голоси"
  game_concept_vote_verb: "Голосувати"
  game_concept_voting: "Голосування"
  game_concept_resolution_desc: "Це дії, що вживаються [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e], які впливають на всю організацію. Будь-яка [Concept('member', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може запропонувати резолюцію іншим [members], і кожен [member] зможе вплинути на результат дебатів, підтримуючи або виступаючи проти неї.\n\nУ разі прийняття, наслідки залежатимуть від того, яку резолюцію було ухвалено."
  game_concept_curia_actions: "Дії Курії"
  game_concept_curia_action: "Дія Курії"
  game_concept_curia_action_desc: "Це дії, що вживаються [Concept('curia', 'CONCEPT_PLACEHOLDER')|e], які впливають на весь [ShowReligionAdjective('catholic')] світ. Будь-яка [ShowReligionAdjective('catholic')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може запропонувати дебати [curia], і кожна [country] з [Concept('cardinal', 'CONCEPT_PLACEHOLDER')|e] зможе вплинути на результат дебатів, підтримуючи або виступаючи проти неї.\n\nУ разі прийняття, наслідки залежатимуть від того, яку Дію Курії було вжито, але застосовуватимуться до всіх [ShowReligionAdjective('catholic')] [countries]."
  game_concept_curia: "Курія"
  game_concept_curia_desc: "Курія є адміністративним органом Святого Престолу і, отже, самої [ShowReligionAdjective('catholic')] Церкви. Будь-яка [ShowReligionAdjective('catholic')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може взаємодіяти з Курією та витрачати [Concept('religious_influence', 'CONCEPT_PLACEHOLDER')|e], щоб запропонувати [Concept('curia_action', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_population_capacity: "Місткість населення"
  game_concept_population_capacity_desc: "Це кількість [Concept('population', 'CONCEPT_PLACEHOLDER')|e], яку може підтримувати [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Якщо [population] вище цього, воно не зможе більше зростати, і якщо воно занадто високе, то може навіть зменшитися."
  game_concept_total_population: "Загальна чисельність населення"
  game_concept_total_population_desc: "Це загальна кількість [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що проживають у [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_population: "Населення"
  game_concept_population_i: "@population!"
  game_concept_population_desc: "Населення [Concept('location', 'CONCEPT_PLACEHOLDER')|e] — це загальна кількість [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що там проживають."
  game_concept_maritime_presence: "Морська Присутність"
  game_concept_maritime: "Морська"
  game_concept_maritime_presence_power: "Сила Морської Присутності"
  game_concept_maritime_presence_desc: "Морська присутність, яку ми маємо вздовж наших узбереж, є життєво важливою як для [Concept('trade', 'CONCEPT_PLACEHOLDER')|e], так і для нашого [Concept('control', 'CONCEPT_PLACEHOLDER')|e] над нашою територією.\n\nМорська присутність накопичується з часом, якщо ми перебуваємо в мирі, просто завдяки наявності [Concept('ports', 'CONCEPT_PLACEHOLDER')|e], тоді як [Concept('blockade', 'CONCEPT_PLACEHOLDER')|e] швидко зменшить нашу присутність. [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] у [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e] може швидко відновити присутність.\n\nВисока $game_concept_maritime_presence$ зменшує [Concept('proximity', 'CONCEPT_PLACEHOLDER')|e], що втрачається між [Concept('seazones', 'CONCEPT_PLACEHOLDER')|e] при розрахунку $game_concept_control$. $game_concept_maritime_presence$ у прибережних $game_concept_seazones$ [Concept('market', 'CONCEPT_PLACEHOLDER')|e] також є важливим джерелом [Concept('merchant_power', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_merchant_maritime_power: "Морська $game_concept_merchant_power$"
  game_concept_merchant_maritime_power_desc: "Ваша $game_concept_merchant_maritime_power$ відображає здатність ваших [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] ефективно захищати та впливати на морську торгівлю. Вона визначає кількість [Concept('merchant_power', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('country', 'CONCEPT_PLACEHOLDER')|e] генерує від наявності [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e] у прибережних [Concept('seazones', 'CONCEPT_PLACEHOLDER')|e] [Concept('market', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_blockade: "Блокада"
  game_concept_blockaded: "Блоковано"
  game_concept_blockades: "Блокади"
  game_concept_blockading: "Блокування"
  game_concept_blockade_desc: "Блокада — це коли [Concept('hostile', 'CONCEPT_PLACEHOLDER')|e] [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] присутній у [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e] за межами [Concept('port', 'CONCEPT_PLACEHOLDER')|e], необхідна кількість [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] залежить від [Concept('population', 'CONCEPT_PLACEHOLDER')|e] та [Concept('development', 'CONCEPT_PLACEHOLDER')|e] постраждалих [Concept('ports', 'CONCEPT_PLACEHOLDER')|e].\n\nНайважливіші наслідки блокади:\n$BULLET_WITH_TAB$Зменшення виробництва [Concept('food', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$Зменшення [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$Зменшення [development]\n$BULLET_WITH_TAB$Зменшення [Concept('control', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$Зменшення [Concept('prosperity', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_religious_unity: "Релігійна Єдність"
  game_concept_religious_unity_desc: "Релігійна єдність — це відсоток [Concept('population', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що сповідує офіційну державну [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_cultural_unity: "Культурна Єдність"
  game_concept_cultural_unity_desc: "Культурна єдність — це відсоток [Concept('population', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e], що належить до [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_transport_capacity: "Транспортна Місткість"
  game_concept_transport_capacity_desc: "Транспортна місткість просто описує, скільки людей, або [Concept('strength', 'CONCEPT_PLACEHOLDER')|e], з [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] ми можемо розмістити на нашому [Concept('ship', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_food_storage: "Запас Продовольства"
  game_concept_food_storage_desc: "Це кількість [Concept('food', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] може нести з собою."
  game_concept_food_storage_per_strength: "Запас Продовольства"
  game_concept_food_storage_per_strength_desc: "Це кількість [Concept('food', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] може нести з собою."
  game_concept_food_capacity: "Місткість Продовольства"
  game_concept_food_capacity_per_strength: "Місткість їжі"
  game_concept_food_capacity_desc: "Це обсяг [Concept('food', 'CONCEPT_PLACEHOLDER')|e], який [Concept('unit', 'CONCEPT_PLACEHOLDER')|e] може нести з собою під час пересування."
  game_concept_food_consumption: "Споживання їжі"
  game_concept_food_consumption_per_strength: "Споживання їжі"
  game_concept_food_consumption_desc: "Це обсяг [Concept('food', 'CONCEPT_PLACEHOLDER')|e], який [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] споживатиме щомісяця."
  game_concept_food_access: "Доступ до їжі"
  game_concept_food_access_desc: "Доступ до їжі дозволяє нашим [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] збирати [Concept('food', 'CONCEPT_PLACEHOLDER')|e] з [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] інших [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_hull_size: "Розмір корпусу"
  game_concept_hull_size_desc: "Чим більший розмір корпусу, тим менше пошкоджень отримує [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] у [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_cannons: "Гармати"
  game_concept_cannons_desc: "Чим більше гармат має [Concept('ship', 'CONCEPT_PLACEHOLDER')|e], тим більше шкоди він може завдати у [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_flanking_ability: "Флангова здатність"
  game_concept_flanking_ability_desc: "Це визначає, скільки шкоди він може завдати [Concept('units', 'CONCEPT_PLACEHOLDER')|e] в іншій [Concept('section', 'CONCEPT_PLACEHOLDER')|e] у бою."
  game_concept_secure_flanks: "Захищені фланги"
  game_concept_secure_flanks_desc: "Це надає захисний бонус, коли є [Concept('friendly', 'CONCEPT_PLACEHOLDER')|e] війська у сусідній [Concept('section', 'CONCEPT_PLACEHOLDER')|e]. Якщо обидва фланги захищені, бонус подвоюється."
  game_concept_combat_power: "Бойова міць"
  game_concept_combat_power_desc: "Це атрибут [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e], що завдає прямої шкоди у [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]. Він множиться на [Concept('strength', 'CONCEPT_PLACEHOLDER')|e] [regiment], щоб визначити, скільки шкоди завдає [regiment]."
  game_concept_frontage: "Фронт"
  game_concept_frontage_desc: "У [Concept('combat', 'CONCEPT_PLACEHOLDER')|e] лише обмежена кількість [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] може битися одночасно, і це називається фронтом. Деякі [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з суворішою [Concept('topography', 'CONCEPT_PLACEHOLDER')|e] або [Concept('vegetation', 'CONCEPT_PLACEHOLDER')|e] можуть ще більше зменшити фронт. Існують також деякі типи [Concept('sub_units', 'CONCEPT_PLACEHOLDER')|e], які можуть використовувати менший фронт, ніж інші, а деякі можуть використовувати більший фронт."
  game_concept_anti_piracy_warfare: "Антипіратський вплив"
  game_concept_anti_piracy_warfare_desc: "Це вплив, який [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] матиме на [Concept('privateers', 'CONCEPT_PLACEHOLDER')|e] у своїй зоні."
  game_concept_section: "Секція"
  game_concept_sections: "Секції"
  game_concept_section_desc: "Кожна сторона у [Concept('combat_with_icon', 'CONCEPT_PLACEHOLDER')|e] має чотири Секції: три на фронті [combat] ([Concept('center', 'CONCEPT_PLACEHOLDER')|e], лівий [Concept('flank', 'CONCEPT_PLACEHOLDER')|e] та правий [Concept('flank', 'CONCEPT_PLACEHOLDER')|e]), і одну позаду, [Concept('reserves', 'CONCEPT_PLACEHOLDER')|e].\n\nПід час бою [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] у передніх Секціях намагатимуться [Concept('engage', 'CONCEPT_PLACEHOLDER')|e] ворогів у протилежній секції. Якщо протилежна Секція порожня, вони можуть атакувати будь-яку іншу передню Секцію, де [Concept('unit', 'CONCEPT_PLACEHOLDER')|e] з хорошою [Concept('flanking_ability', 'CONCEPT_PLACEHOLDER')|e] може завдати додаткової шкоди.\n\nЯкщо [Concept('units', 'CONCEPT_PLACEHOLDER')|e] знищені або відступають через занадто низький [Concept('morale', 'CONCEPT_PLACEHOLDER')|e], [Concept('units', 'CONCEPT_PLACEHOLDER')|e] з [reserves] намагатимуться просунутися вперед, щоб замінити їх, кидаючи [Concept('combat_speed_with_icon', 'CONCEPT_PLACEHOLDER')|e]. [combat] закінчується, коли на одній зі сторін не залишається [Concept('units', 'CONCEPT_PLACEHOLDER')|e] у передніх Секціях."
  game_concept_center: "Центр"
  game_concept_center_desc: "Це центральна [Concept('section', 'CONCEPT_PLACEHOLDER')|e] [Concept('unit', 'CONCEPT_PLACEHOLDER')|e]. Якщо в центрі немає противника, він може легко дістатися до лівого [Concept('flank', 'CONCEPT_PLACEHOLDER')|e] або правого [Concept('flank', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_reserves: "Резерви"
  game_concept_reserves_desc: "Ці [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] не беруть активної участі в [Concept('battle', 'CONCEPT_PLACEHOLDER')|e], але, залежно від потреби, можуть переміститися до [Concept('center', 'CONCEPT_PLACEHOLDER')|e] або до будь-якого [Concept('flank', 'CONCEPT_PLACEHOLDER')|e].\nКожен [regiment] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] кидає [Concept('d20', 'CONCEPT_PLACEHOLDER')|e], і якщо кидок нижчий за його [Concept('combat_speed', 'CONCEPT_PLACEHOLDER')|e], він зможе приєднатися до битви. Однак лише достатня кількість одиниць для можливого [Concept('frontage', 'CONCEPT_PLACEHOLDER')|e] битви намагається підкріпитися щогодини."
  game_concept_broken_units: "Розбиті Одиниці"
  game_concept_broken_units_desc: "Це [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ships', 'CONCEPT_PLACEHOLDER')|e], які були розгромлені в поточній [Concept('battle', 'CONCEPT_PLACEHOLDER')|e]. Вони більше не братимуть участі в цій битві взагалі."
  game_concept_flank: "Фланг"
  game_concept_right_flank: "Правий Фланг"
  game_concept_left_flank: "Лівий Фланг"
  game_concept_flanks: "Фланги"
  game_concept_flank_desc: "Фланги — це [Concept('sections', 'CONCEPT_PLACEHOLDER')|e] в [Concept('army', 'CONCEPT_PLACEHOLDER')|e] окрім [Concept('center', 'CONCEPT_PLACEHOLDER')|e]. Ліва $game_concept_section$ зазвичай бореться з правою $game_concept_section$ противника, а права $game_concept_section$ зазвичай бореться з лівою $game_concept_section$ противника. Однак [Concept('flanking_ability', 'CONCEPT_PLACEHOLDER')|e] також дозволяє завдавати шкоди сусіднім $game_concept_sections$."
  game_concept_bombard_efficiency: "Ефективність Бомбардування"
  game_concept_bombard_efficiency_desc: "Це шанс, що артилерійські [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] будуть стріляти під час [Concept('bombard_phase', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_phase: "Фаза"
  game_concept_phases: "Фази"
  game_concept_phase_desc: "Існує дві Фази [Concept('combat', 'CONCEPT_PLACEHOLDER')|e], починаючи з початкової 5-годинної [Concept('bombard_phase', 'CONCEPT_PLACEHOLDER')|e] (якщо будь-які [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] здатні [Concept('bombard', 'CONCEPT_PLACEHOLDER')|e]), після якої йде [Concept('combat_phase', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_combat_phase: "Фаза Бою"
  game_concept_combat_phase_desc: "Фаза Бою — це основна [Concept('phase', 'CONCEPT_PLACEHOLDER')|e] [Concept('combat', 'CONCEPT_PLACEHOLDER')|e], яка відбувається після початкової [Concept('bombard_phase', 'CONCEPT_PLACEHOLDER')|e]. [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] намагатимуться [Concept('engage', 'CONCEPT_PLACEHOLDER')|e] своїх [Concept('enemy', 'CONCEPT_PLACEHOLDER')|e] супротивників."
  game_concept_bombard_phase: "Фаза Бомбардування"
  game_concept_bombard_phase_desc: "Фаза Бомбардування — це початкова [Concept('phase', 'CONCEPT_PLACEHOLDER')|e] [Concept('combat', 'CONCEPT_PLACEHOLDER')|e], яка відбувається перед основною [Concept('combat_phase', 'CONCEPT_PLACEHOLDER')|e]. Вона використовується виключно [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e], які можуть [Concept('bombard', 'CONCEPT_PLACEHOLDER')|e], наприклад [ShowUnitCategoryName('army_artillery')].\n\nЩогодини Фази Бомбардування [regiments] мають шанс [bombard], що завдасть їхню [Concept('combat_power', 'CONCEPT_PLACEHOLDER')|e] як шкоду ворожому [regiment] на тій самій [Concept('section', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_bombard: "Бомбардувати"
  game_concept_bombarding: "Бомбардування"
  game_concept_bombard_desc: "[Concept('regiments', 'CONCEPT_PLACEHOLDER')|e], які можуть бомбардувати, завдадуть свою [Concept('combat_power', 'CONCEPT_PLACEHOLDER')|e] як шкоду під час початкової [Concept('bombard_phase', 'CONCEPT_PLACEHOLDER')|e] [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_initiative: "Ініціатива"
  game_concept_initiative_desc: "Ініціатива — це шанс, що [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] [Concept('engage', 'CONCEPT_PLACEHOLDER')|e] під час [Concept('combat_phase', 'CONCEPT_PLACEHOLDER')|e] [Concept('combat', 'CONCEPT_PLACEHOLDER')|e].\n\nЩогодини, припускаючи, що є достатньо доступного [Concept('frontage', 'CONCEPT_PLACEHOLDER')|e], усі [regiments], які наразі не [engaged], намагатимуться приєднатися до бою.\n\nШанс розраховується як (Ініціатива * [GetDefine('NCombat','INITIATIVE_CHANCE_EACH')]) + ([GetDefine('NCombat','INITIATIVE_CHANCE_EACH')] * кількість годин у бою); якщо шанс вищий за [Concept('d100', 'CONCEPT_PLACEHOLDER')|e], тоді [regiment] стає [engaged] у бою.\n\nЗагалом, легкі та далекобійні [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] мають найвищу Ініціативу."
  game_concept_engagement: "Залучення"
  game_concept_engage: "Зав'язати бій"
  game_concept_engaged: "Зав'язаний бій"
  game_concept_engagement_desc: "Коли починається [Concept('combat_with_icon', 'CONCEPT_PLACEHOLDER')|e], [Concept('regiments_with_icon', 'CONCEPT_PLACEHOLDER')|e] у передніх [Concept('sections_with_icon', 'CONCEPT_PLACEHOLDER')|e] кидають [Concept('initiative_with_icon', 'CONCEPT_PLACEHOLDER')|e] щогодини, доки не зав'яжуть бій. Коли [regiment] зав'язує бій у [combat], він завдає шкоди. Коли підрозділ відступає, він припиняє бути зав'язаним у бій і не приєднається до того ж [combat].\n\nЛише певна кількість [Concept('frontage_with_icon', 'CONCEPT_PLACEHOLDER')|e] може бути зав'язана в бій одночасно в [section]."
  game_concept_d6: "D6"
  game_concept_d6_desc: "D6 — це шестигранний кидок кубика, що використовується в [Concept('combat', 'CONCEPT_PLACEHOLDER')|e] для визначення успішності сторони."
  game_concept_d20: "D20"
  game_concept_d20_desc: "D20 — це двадцятигранний кидок кубика, що використовується в [Concept('combat', 'CONCEPT_PLACEHOLDER')|e], коли [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] залишає [Concept('reserves', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_d100: "D100"
  game_concept_d100_desc: "D100 — це стогранний кидок кубика, що використовується для перевірки шансів, заснованих на відсотках."
  game_concept_dice: "Кубики"
  game_concept_dice_upper_desc: "Кубики часто кидають, щоб визначити результат дії, наприклад, [Concept('phases', 'CONCEPT_PLACEHOLDER')|e] [Concept('siege', 'CONCEPT_PLACEHOLDER')|e] або [Concept('battle', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_dice_desc: "$game_concept_dice_upper_desc$\n[Concept('d6', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('d20', 'CONCEPT_PLACEHOLDER')|e]\n[Concept('d100', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_combat_speed: "Швидкість бою"
  game_concept_combat_speed_desc: "Це здатність переміщатися з [Concept('reserves', 'CONCEPT_PLACEHOLDER')|e] до будь-якої іншої [Concept('section', 'CONCEPT_PLACEHOLDER')|e] всередині [Concept('battle', 'CONCEPT_PLACEHOLDER')|e]. Для [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] це також впливає на те, як швидко пошкоджений корабель може залишити поточну [Concept('section', 'CONCEPT_PLACEHOLDER')|e], щоб відступити."
  game_concept_blockade_capacity: "Пропускна здатність блокади"
  game_concept_blockade_capacity_desc: "Це визначає, наскільки добре [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] блокує. Це безпосередньо порівнюється зі значенням у цільовій [Concept('location', 'CONCEPT_PLACEHOLDER')|e] залежно від її [Concept('development', 'CONCEPT_PLACEHOLDER')|e], [Concept('population', 'CONCEPT_PLACEHOLDER')|e], [Concept('imports', 'CONCEPT_PLACEHOLDER')|e] та [Concept('exports', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_crew_size: "Розмір екіпажу"
  game_concept_crew_size_desc: "Це визначає, скільки [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e] потрібно для функціонування [Concept('ship', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_maximum_strength: "Максимальна сила"
  game_concept_max_strength: "Максимальна сила"
  game_concept_maximum_strength_desc: "Це збільшує кількість людей, які має [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e], таким чином збільшуючи його вартість [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e]. [regiment] з більшою кількістю [manpower], але з тим же [Concept('frontage', 'CONCEPT_PLACEHOLDER')|e], є ефективнішим у [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_max_strength_desc: "$game_concept_maximum_strength_desc$"
  game_concept_strength: "Сила"
  game_concept_strength_desc: "Це кількість людей, які [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] має на даний момент."
  game_concept_total_strength: "Загальна сила"
  game_concept_total_strength_desc: "Це загальна кількість вояків, яку має [Concept('army', 'CONCEPT_PLACEHOLDER')|e], що є сумою індивідуальної [Concept('strength', 'CONCEPT_PLACEHOLDER')|e] кожного [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_non_avoidable_attrition: "Невідворотне виснаження"
  game_concept_non_avoidable_attrition_desc: "Зазвичай [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] не зазнають [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e], якщо вони перебувають у [Concept('zone_of_control', 'CONCEPT_PLACEHOLDER')|e] [Concept('fort', 'CONCEPT_PLACEHOLDER')|e], яким вони [Concept('own', 'CONCEPT_PLACEHOLDER')|e] та [Concept('control', 'CONCEPT_PLACEHOLDER')|e], але деяких речей, як-от [ShowSituationName('black_death')], таким чином уникнути неможливо."
  game_concept_attrition_losses: "Втрати від виснаження"
  game_concept_attrition_loss: "Втрата від виснаження"
  game_concept_attrition_loss_desc: "Скільки шкоди завдає [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e] кожному [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] щомісяця."
  game_concept_attrition: "Виснаження"
  game_concept_attrition_desc: "[Concept('Attrition', 'CONCEPT_PLACEHOLDER')|e] застосовується на початку кожного місяця, що для [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] означає загибель людей, тоді як для [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] це також пошкоджує сам корабель. Деяке [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e] є [Concept('non_avoidable_attrition', 'CONCEPT_PLACEHOLDER')|e], а основними джерелами [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e] є наступні:\n$BULLET_WITH_TAB$[Concept('army', 'CONCEPT_PLACEHOLDER')|e] без [Concept('food', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$Загальна [Concept('unit_weight', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e] вище [Concept('supply_limit', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('winter', 'CONCEPT_PLACEHOLDER')|e], [Concept('topography', 'CONCEPT_PLACEHOLDER')|e], [Concept('vegetation', 'CONCEPT_PLACEHOLDER')|e] або [Concept('climate', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_supply_limit: "Ліміт постачання"
  game_concept_supply_limit_desc: "Це максимальна [Concept('unit_weight', 'CONCEPT_PLACEHOLDER')|e], яку [Concept('location', 'CONCEPT_PLACEHOLDER')|e] може постачати без спричинення додаткового [Concept('food_consumption', 'CONCEPT_PLACEHOLDER')|e] для [Concept('army', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_unit_weight: "Вага підрозділу"
  game_concept_unit_weight_desc: "Це накопичене значення, яке залежить від поточної [Concept('strength', 'CONCEPT_PLACEHOLDER')|e] [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] та його [Concept('unit_type', 'CONCEPT_PLACEHOLDER')|e].\nЦе безпосередньо порівнюється з [Concept('supply_limit', 'CONCEPT_PLACEHOLDER')|e] у поточній [Concept('location', 'CONCEPT_PLACEHOLDER')|e] при розрахунку [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_loot: "Здобич"
  game_concept_looted: "Пограбовано"
  game_concept_loot_desc: "Коли [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] [Concept('occupy', 'CONCEPT_PLACEHOLDER')|e] [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], вони викрадають [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] з них і надають [Concept('location', 'CONCEPT_PLACEHOLDER')|e] [ShowModifier('looted')] [Concept('modifier', 'CONCEPT_PLACEHOLDER')|e] приблизно на #V 12#! місяців."
  game_concept_reinforce: "Поповнення"
  game_concept_reinforced: "Поповнено"
  game_concept_reinforcement: "Поповнення"
  game_concept_reinforce_desc: "Коли [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] нижче своєї [Concept('maximum_strength', 'CONCEPT_PLACEHOLDER')|e], воно намагатиметься поповнитись, залучаючи [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] та [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] зі своєї [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Лише [Concept('regular_regiment', 'CONCEPT_PLACEHOLDER')|e] може поповнюватись, і якщо не в [Concept('friendly', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e], це буде неможливо."
  game_concept_repair: "Ремонт"
  game_concept_repaired: "Відремонтовано"
  game_concept_repair_desc: "Коли [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] пошкоджено, його можна відремонтувати в одному з наших [Concept('ports', 'CONCEPT_PLACEHOLDER')|e] або там, де ми маємо [Concept('fleet_basing_rights', 'CONCEPT_PLACEHOLDER')|e], залучаючи [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e] та [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] зі своєї [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_naval_damage: "Морська шкода"
  game_concept_naval_damage_desc: "Це впливає на те, скільки шкоди [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] можуть отримати або завдати під час [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_damage_taken: "Отримана шкода"
  game_concept_damage_taken_desc: "Під час [Concept('battle', 'CONCEPT_PLACEHOLDER')|e] [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] або [Concept('ship', 'CONCEPT_PLACEHOLDER')|e] отримуватиме шкоду як своїй [Concept('morale', 'CONCEPT_PLACEHOLDER')|e], так і [Concept('strength', 'CONCEPT_PLACEHOLDER')|e]. Кількість залежить від [Concept('combat_power', 'CONCEPT_PLACEHOLDER')|e], [Concept('strength', 'CONCEPT_PLACEHOLDER')|e] та інших показників ворога, тоді як такі атрибути, як [Concept('experience', 'CONCEPT_PLACEHOLDER')|e], [Concept('strength_damage_taken', 'CONCEPT_PLACEHOLDER')|e] або [Concept('morale_damage_taken', 'CONCEPT_PLACEHOLDER')|e], можуть її зменшити."
  game_concept_strength_damage_taken: "Отримана шкода силі"
  game_concept_strength_damage_taken_desc: "Це впливає на кількість шкоди, яку підрозділ отримує в [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]. Для [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] це шкода фактичному [Concept('ship', 'CONCEPT_PLACEHOLDER')|e], тоді як для [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] це визначає, скільки [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] гине в бою."
  game_concept_morale_damage_taken: "Отримана шкода моралі"
  game_concept_morale_damage_taken_desc: "Це впливає на кількість шкоди [Concept('morale', 'CONCEPT_PLACEHOLDER')|e], яку підрозділ отримує в [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_strength_damage_done: "Завдана шкода силі"
  game_concept_strength_damage_done_desc: "Це впливає на кількість шкоди, завданої ворогу. Для [Concept('ships', 'CONCEPT_PLACEHOLDER')|e] це пошкоджує фактичний [Concept('ship', 'CONCEPT_PLACEHOLDER')|e], тоді як для [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] це визначає, скільки [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] вони вб'ють."
  game_concept_morale_damage_done: "Завдана шкода моралі"
  game_concept_morale_damage_done_desc: "Це впливає на кількість шкоди, завданої [Concept('morale', 'CONCEPT_PLACEHOLDER')|e] ворога в [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_movement_speed: "Швидкість пересування"
  game_concept_movement_speed_desc: "Це значення визначає, як швидко [Concept('unit', 'CONCEPT_PLACEHOLDER')|e] пересувається по карті."
  game_concept_discipline: "Дисципліна"
  game_concept_discipline_desc: "Це впливає як на шкоду, яку [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] завдає в [Concept('combat', 'CONCEPT_PLACEHOLDER')|e], так і на [Concept('damage_taken', 'CONCEPT_PLACEHOLDER')|e]. Чим вища дисципліна, тим більше шкоди завдано і тим менше [Concept('damage_taken', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_military_tactics: "Військова тактика"
  game_concept_military_tactics_desc: "Це зменшує [Concept('damage_taken', 'CONCEPT_PLACEHOLDER')|e] [Concept('regiment', 'CONCEPT_PLACEHOLDER')|e] в [Concept('combat', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_adult: "Дорослий"
  game_concept_adults: "Дорослі"
  game_concept_adult_desc: "[Concept('character', 'CONCEPT_PLACEHOLDER')|e], якому виповнилося щонайменше #Y [ShowAdultAge]#! років, вважається дорослим. Він може служити [Concept('rulers', 'CONCEPT_PLACEHOLDER')|e] без [Concept('regent', 'CONCEPT_PLACEHOLDER')|e], стати [Concept('general', 'CONCEPT_PLACEHOLDER')|e] або [Concept('admiral', 'CONCEPT_PLACEHOLDER')|e], або служити в [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e], а також може одружитися. Персонаж, який не є дорослим, вважається [Concept('infant', 'CONCEPT_PLACEHOLDER')|e], [Concept('child', 'CONCEPT_PLACEHOLDER')|e] або [Concept('adolescent', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_infant: "Немовля"
  game_concept_infants: "Немовлята"
  game_concept_infant_desc: "[Concept('character', 'CONCEPT_PLACEHOLDER')|e], якому до #Y [ShowMaxInfantAge]#! років, є немовлям. Він не може служити своїй [Concept('country', 'CONCEPT_PLACEHOLDER')|e] і не може отримувати [Concept('child_education', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_child: "Дитина"
  game_concept_children: "Діти"
  game_concept_child_desc: "[Concept('character', 'CONCEPT_PLACEHOLDER')|e], якому від #Y [ShowMinChildAge]#! до #Y [ShowMaxChildAge]#! років, є дитиною. Він не може служити своїй [Concept('country', 'CONCEPT_PLACEHOLDER')|e], але якщо він належить до [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]'s [Concept('dynasty', 'CONCEPT_PLACEHOLDER')|e], ви можете дати йому [Concept('child_education', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_adolescent: "Підліток"
  game_concept_adolescents: "Підлітки"
  game_concept_adolescent_desc: "[Concept('character', 'CONCEPT_PLACEHOLDER')|e], що перебуває у віці від #Y [ShowMinAdolescentAge]#! до #Y [ShowMaxAdolescentAge]#! років, є підлітком. Вони ще не [Concept('adult', 'CONCEPT_PLACEHOLDER')|e], але вже й не [Concept('child', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_child_education: "Освіта дітей"
  game_concept_education: "Освіта"
  game_concept_child_education_desc: "[Concept('children', 'CONCEPT_PLACEHOLDER')|e] можуть здобувати освіту з віку #Y 3#! років. Це визначатиме, як їхні [Concept('abilities', 'CONCEPT_PLACEHOLDER')|e] покращуватимуться з часом.\n\nЩомісяця [child] має [GetDefine('NCharacter','MONTHLY_STAT_INCREASE_CHANCE_FOR_CHILD')|Y]% шанс покращити свої [abilities] відповідно до своєї освіти."
  game_concept_exploration: "Дослідження"
  game_concept_explorations: "Дослідження"
  game_concept_exploring: "Дослідження"
  game_concept_exploration_desc: "Дослідження — це місія, очолювана [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e] з наміром [Concept('discovering', 'CONCEPT_PLACEHOLDER')|e] незвіданої [Concept('area', 'CONCEPT_PLACEHOLDER')|e] суходолу або моря в межах [Concept('naval_range', 'CONCEPT_PLACEHOLDER')|e].\n\nКожне дослідження має вартість прогресу, що зростає залежно від відстані від [Concept('capital', 'CONCEPT_PLACEHOLDER')|e], але зменшується завдяки [Concept('naval_range', 'CONCEPT_PLACEHOLDER')|e]. Швидкість, з якою [explorer] просувається в цьому прогресі, залежить від його [Concept('mil', 'CONCEPT_PLACEHOLDER')|e].\n\nКожне дослідження має щомісячну вартість у [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], яку [explorer] зменшуватиме пропорційно до свого [Concept('adm', 'CONCEPT_PLACEHOLDER')|e].\n\nЩойно дослідження досягне кінця свого [Concept('exploration_progress', 'CONCEPT_PLACEHOLDER')|e], [area] буде [discovered], і [explorer] повернеться."
  game_concept_exploration_success: "Успіх дослідження"
  game_concept_exploration_progress: "Прогрес дослідження"
  game_concept_exploration_progress_desc: "Кожна [Concept('area', 'CONCEPT_PLACEHOLDER')|e] має вартість, яку необхідно виконати, перш ніж її буде повністю [Concept('explored', 'CONCEPT_PLACEHOLDER')|e]. Це залежить від багатьох чинників, але передусім від майстерності [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_known_world: "Відомий Світ"
  game_concept_known_world_desc: "Це частина Світу, яку ви наразі [Concept('discovered', 'CONCEPT_PLACEHOLDER')|e]. Будь-яка територія, не [Concept('discovered', 'CONCEPT_PLACEHOLDER')|e] вашою [Concept('country', 'CONCEPT_PLACEHOLDER')|e], вважається [Concept('terra_incognita', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_terra_incognita: "Terra Incognita"
  game_concept_terra_incognita_desc: "Перш ніж [Concept('location', 'CONCEPT_PLACEHOLDER')|e] буде [Concept('discovered', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] через [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e] або інші джерела, вона невидима на мапі, з нею не можна взаємодіяти цій країні, і вона називається Terra Incognita, що латиною означає невідома земля."
  game_concept_discover: "Відкрити"
  game_concept_discovered: "Відкрито"
  game_concept_discovering: "Відкриття"
  game_concept_explore: "Дослідити"
  game_concept_explored: "Досліджено"
  game_concept_discover_desc: "Коли [Concept('location', 'CONCEPT_PLACEHOLDER')|e] [discovered], [Concept('terra_incognita', 'CONCEPT_PLACEHOLDER')|e] з неї зникає, і вона стає видимою та доступною для взаємодії."
  game_concept_explorer: "Дослідник"
  game_concept_explorers: "Дослідники"
  game_concept_explorer_desc: "Дослідник — це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], який має певні [Concept('traits', 'CONCEPT_PLACEHOLDER')|e], корисні при призначенні на [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_conquistador: "Конкістадор"
  game_concept_conquistadors: "Конкістадори"
  game_concept_conquistador_desc: "$game_concept_conquistador$ — це [Concept('персонаж', 'CONCEPT_PLACEHOLDER')|e], якому доручено завоювати чужі землі та створити нового [Concept('підданого', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('країни', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_budget: "Баланс"
  game_concept_balance: "Баланс"
  game_concept_finances: "Фінанси"
  game_concept_budget_desc: "Місячний Баланс ґрунтується на загальній сумі [Concept('доходів', 'CONCEPT_PLACEHOLDER')|e] та [Concept('витрат', 'CONCEPT_PLACEHOLDER')|e], які має [Concept('країна', 'CONCEPT_PLACEHOLDER')|e]. Результат впливає на [Concept('скарбницю', 'CONCEPT_PLACEHOLDER')|e] країни."
  game_concept_income: "Дохід"
  game_concept_incomes: "Доходи"
  game_concept_income_desc: "Це [Concept('золото', 'CONCEPT_PLACEHOLDER')|e], яке [Concept('країна', 'CONCEPT_PLACEHOLDER')|e] отримує щомісяця. Воно включає [Concept('податки', 'CONCEPT_PLACEHOLDER')|e] від кожного [Concept('стану', 'CONCEPT_PLACEHOLDER')|e] та дохід від [Concept('торгівлі', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_expense: "Витрата"
  game_concept_expenses: "Витрати"
  game_concept_expense_desc: "Це поточні витрати країни. Це включає оплату за [Concept('армії', 'CONCEPT_PLACEHOLDER')|e], [Concept('флоти', 'CONCEPT_PLACEHOLDER')|e], [Concept('торгівлю', 'CONCEPT_PLACEHOLDER')|e], [Concept('митців', 'CONCEPT_PLACEHOLDER')|e], [Concept('укріплення', 'CONCEPT_PLACEHOLDER')|e], [Concept('колоніальні_хартії', 'CONCEPT_PLACEHOLDER')|e] та інше щомісяця."
  game_concept_treasury: "Скарбниця"
  game_concept_treasury_desc: "Це кількість [Concept('золота', 'CONCEPT_PLACEHOLDER')|e], яку має [Concept('країна', 'CONCEPT_PLACEHOLDER')|e]. Якщо вона стане негативною, [Concept('позика', 'CONCEPT_PLACEHOLDER')|e] буде взята автоматично. Якщо більше [позик] не можна взяти, країна збанкрутує."
  game_concept_minting: "Карбування"
  game_concept_mint: "Карбування"
  game_concept_minting_desc: "Карбування — це спосіб збільшити нашу [Concept('скарбницю', 'CONCEPT_PLACEHOLDER')|e] ціною [Concept('інфляції', 'CONCEPT_PLACEHOLDER')|e]. Якщо ми не карбуємо монет, наша [інфляція] може зменшитися."
  game_concept_annexation: "Анексія"
  game_concept_annexations: "Анексії"
  game_concept_annex: "Анексія"
  game_concept_annexing: "Анексування"
  game_concept_annexed: "Анексований"
  game_concept_annexation_desc: "Коли [Concept('сюзерен', 'CONCEPT_PLACEHOLDER')|e] повністю поглинає одного зі своїх [Concept('підданих', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('Сюзерен] отримає всі [належні', 'CONCEPT_PLACEHOLDER')|e] [Concept('локації', 'CONCEPT_PLACEHOLDER')|e], [Concept('ядра', 'CONCEPT_PLACEHOLDER')|e] та [Concept('персонажів', 'CONCEPT_PLACEHOLDER')|e] [Concept('підданого]. [Підданий', 'CONCEPT_PLACEHOLDER')|e] більше не існуватиме як [Concept('країна', 'CONCEPT_PLACEHOLDER')|e].\n\n[Підданий] може уповільнити прогрес за допомогою [ShowCabinetActionName('frustrate_annexation')] [Concept('дії_кабінету', 'CONCEPT_PLACEHOLDER')|e] або оголосити [Concept('війну', 'CONCEPT_PLACEHOLDER')|e] зі своїм особливим [ShowCasusBelliName('cb_resist_annexation')] [Concept('приводом_до_війни', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('Нелояльний_підданий', 'CONCEPT_PLACEHOLDER')|e] не може бути анексований."
  game_concept_court_maintenance: "Вартість двору"
  game_concept_court: "Двір"
  game_concept_court_maintenance_desc: "Двір — це розширене домогосподарство [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e], включно з усіма, хто регулярно перебуває при них. У найбільших дворах ця кількість може зрости до багатьох тисяч, що складаються з камарильї, придворної челяді, духовенства, дворянства, тілоохоронців, гарему, наложниць, євнухів та багатьох інших посад. Усі ці люди не обходяться безкоштовно, і ця цифра відображає вартість їхнього утримання."
  game_concept_diplomatic_maintenance: "Дипломатичні витрати"
  game_concept_diplomatic_maintenance_desc: "Якщо нам коли-небудь знадобиться, кількість [Concept('diplomats_with_icon', 'CONCEPT_PLACEHOLDER')|e] та [Concept('diplomatic_capacity_with_icon', 'CONCEPT_PLACEHOLDER')|e] у нашому розпорядженні може бути збільшена шляхом витрачання додаткового [Concept('gold', 'CONCEPT_PLACEHOLDER')|e].\n\nДипломатичні витрати також покращують [Concept('subject_loyalty_with_icon', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_maintenance: "Утримання"
  game_concept_maintaining: "Утримання"
  game_concept_maintain: "Утримувати"
  game_concept_maintenance_desc: "Щомісяця нам потрібно буде сплачувати [Concept('army_maintenance', 'CONCEPT_PLACEHOLDER')|e] за наші [Concept('regiments', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_maintenance', 'CONCEPT_PLACEHOLDER')|e] за наші [Concept('ships', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_army_maintenance: "Утримання армії"
  game_concept_army_maintenance_desc: "Нам потрібно платити, споряджати, годувати та одягати наші [Concept('armies', 'CONCEPT_PLACEHOLDER')|e], інакше вони не будуть дуже ефективними. Утримання армії — це спосіб вимірювання того, скільки [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] ми спрямовуємо на забезпечення наших [armies] усім необхідним. Без цього [Concept('morale', 'CONCEPT_PLACEHOLDER')|e] постраждає, а наші війська будуть менш ефективними."
  game_concept_navy_maintenance: "Утримання флоту"
  game_concept_navy_maintenance_desc: "Чудово, коли ми маємо величний, блискучий флот [Concept('ships', 'CONCEPT_PLACEHOLDER')|e], готовий до відплиття. Однак ці судна не утримують себе самі: [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] має бути витрачено на підтримання їх у належному стані. Утримання флоту — це спосіб вимірювання того, скільки ресурсів ми спрямовуємо на підтримання наших кораблів у хорошому стані.\n\nПри нижчому утриманні [Concept('morale', 'CONCEPT_PLACEHOLDER')|e] постраждає, а наші кораблі будуть менш ефективними як у бою, так і в збільшенні [Concept('maritime_presence', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_fort_maintenance: "Утримання фортів"
  game_concept_fort_maintenance_desc: "[Concept('forts', 'CONCEPT_PLACEHOLDER')|e] корисні для відбиття вторгнень [Concept('armies', 'CONCEPT_PLACEHOLDER')|e], але вони використовують [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] на утримання, щоб переконатися, що вони здатні виконувати свою роботу. Утримання фортів — це міра того, скільки ресурсів [Concept('country', 'CONCEPT_PLACEHOLDER')|e] спрямовує на забезпечення хорошого стану своїх [Concept('forts', 'CONCEPT_PLACEHOLDER')|e]. Чим більше ресурсів витрачено, тим ефективнішими будуть форти."
  game_concept_cultural_maintenance: "Інвестиції в культуру"
  game_concept_cultural_maintenance_s: "Культурні інвестиції"
  game_concept_cultural_maintenance_desc: "Ці гроші витрачаються на [Concept('artists', 'CONCEPT_PLACEHOLDER')|e], щоб вони могли створювати кращі [Concept('work_of_art', 'CONCEPT_PLACEHOLDER')|e]. Це також безпосередньо збільшує [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_colonial_maintenance: "Вартість колоній"
  game_concept_colonial_maintenance_desc: "Це коштує [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] для відправлення кораблів, людей та припасів для утримання [Concept('colonial_charter', 'CONCEPT_PLACEHOLDER')|e]. Ця вартість представлена тут."
  game_concept_mercenary_income: "Дохід від найманців"
  game_concept_mercenary_income_desc: "Це [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], яке ми отримуємо від здачі в оренду наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] або [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] як [Concept('mercenaries', 'CONCEPT_PLACEHOLDER')|e] іншим [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_mercenary_expense: "Наймання найманців"
  game_concept_mercenary_expense_desc: "Це наші витрати на наймання [Concept('mercenaries', 'CONCEPT_PLACEHOLDER')|e] для боротьби за нас."
  game_concept_subsidy_expense: "Субсидії на будівлі"
  game_concept_subsidy_expense_desc: "Деякі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] можуть бути нерентабельними, але нам потрібні [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], які вони виробляють, з інших причин. Цим будівлям може бути надана [Concept('subsidy', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_subsidy: "Субсидія"
  game_concept_subsidy_desc: "Коли [Concept('building', 'CONCEPT_PLACEHOLDER')|e] не є прибутковою, вона не купуватиме потрібні [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] і не функціонуватиме. [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може вирішити субсидувати [building], сплачуючи їй достатньо [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] щомісяця для виживання."
  game_concept_exploration_expense: "Витрати на розвідку"
  game_concept_exploration_expense_desc: "Місії [Concept('exploration', 'CONCEPT_PLACEHOLDER')|e] мають витрати на утримання, які можуть бути зменшені деякими [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] та [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e], а також здібністю [Concept('adm', 'CONCEPT_PLACEHOLDER')|e] [Concept('explorer', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_diplomatic_income: "Дипломатичний дохід"
  game_concept_diplomatic_income_s: "Дипломатія"
  game_concept_diplomatic_income_desc: "Це сума, що надходить до нашої [Concept('treasury', 'CONCEPT_PLACEHOLDER')|e] від інших [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], незалежно від їхнього бажання."
  game_concept_diplomatic_expense: "Дипломатичні витрати"
  game_concept_diplomatic_expense_s: "Дипломатія"
  game_concept_diplomatic_expense_desc: "Чи то за [Concept('treaty', 'CONCEPT_PLACEHOLDER')|e], чи то силою, це сума, що вилучається з нашої [Concept('treasury', 'CONCEPT_PLACEHOLDER')|e] іншими [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_stability_investment: "Інвестиції в стабільність"
  game_concept_stability_investment_s: "Стабільність"
  game_concept_stability_investment_desc: "Витрачання частини [Concept('budget', 'CONCEPT_PLACEHOLDER')|e] на [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] є одним із трьох основних способів підвищити стабільність, інші включають використання [Concept('cabinet_actions', 'CONCEPT_PLACEHOLDER')|e] щодо неї або наявність достатньої кількості [ShowEstateTypeName('clergy_estate')] [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_sound_toll: "Звукове мито"
  game_concept_sound_tolls: "Звукові мита"
  game_concept_sound_toll_desc: "У світі є деякі протоки, де контролер може стягувати плату з [Concept('trades', 'CONCEPT_PLACEHOLDER')|e], що проходять повз неї. Наприклад:\n$BULLET_WITH_TAB$[ShowLocationName('oresund')]\n$BULLET_WITH_TAB$[ShowLocationName('gulf_izmit')]"
  game_concept_great_power_score: "Велика держава $game_concept_great_power_score_short$"
  game_concept_great_power_score_short: "Очки"
  game_concept_great_power_score_desc: "Очки Великої Держави є беззаперечним показником того, яка [Concept('country', 'CONCEPT_PLACEHOLDER')|e] є найкращою. Найвищі за очками $game_concept_countries$ є [Concept('great_powers', 'CONCEPT_PLACEHOLDER')|e]. Загальна кількість Великих Держав змінюється залежно від Очок найвищої Великої Держави порівняно з іншими.\n\n$game_concept_countries$ заробляють $game_concept_great_power_score_short$, володіючи більшою [Concept('population', 'CONCEPT_PLACEHOLDER')|e], маючи вищий [Concept('prestige', 'CONCEPT_PLACEHOLDER')|e], підвищуючи [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e] та з різних інших джерел.\n\n[Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] також віддають певний відсоток своїх Очок своєму [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], залежно від їхнього [Concept('subject_type', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_event: "Подія"
  game_concept_events: "Події"
  game_concept_event_desc: "Події — це явища, що трапляються з [Concept('country', 'CONCEPT_PLACEHOLDER')|e] протягом гри, якщо для них виконані умови. Зазвичай вони мають прикріплений до них [Concept('effect', 'CONCEPT_PLACEHOLDER')|e] і розповідають частину внутрішньоігрового наративу.\nДеякі [countries] мають доступ до [Concept('dynamic_historical_events', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_dynamic_historical_event: "Динамічна історична подія"
  game_concept_dynamic_historical_events: "Динамічні історичні події"
  game_concept_dynamic_historical_event_desc: "Це історичні [Concept('events', 'CONCEPT_PLACEHOLDER')|e], які траплятимуться з конкретною [Concept('country', 'CONCEPT_PLACEHOLDER')|e] протягом визначеного періоду часу, якщо для цього є відповідні умови."
  game_concept_historical_option: "Історичний варіант"
  game_concept_historical_option_desc: "Це історична [Concept('event', 'CONCEPT_PLACEHOLDER')|e], і цей [Concept('event_option', 'CONCEPT_PLACEHOLDER')|e] дозволить вам прийняти те саме рішення, що й [Concept('country', 'CONCEPT_PLACEHOLDER')|e] в історії."
  game_concept_event_option: "Варіант події"
  game_concept_event_option_desc: "Кожна [Concept('event', 'CONCEPT_PLACEHOLDER')|e] має принаймні один варіант, який гравець може обрати. Якщо подія є [Concept('dynamic_historical_event', 'CONCEPT_PLACEHOLDER')|e], вона може мати [Concept('historical_option', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_mission: "Місія"
  game_concept_missions: "Місії"
  game_concept_mission_desc: "Місії — це набори окремих [Concept('tasks', 'CONCEPT_PLACEHOLDER')|e], доступних для [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Вони слугують орієнтиром для [country] та надають корисні нагороди після виконання завдання або всіх завдань, залежно від налаштувань."
  game_concept_mission_task: "Завдання місії"
  game_concept_mission_tasks: "Завдання місій"
  game_concept_task: "Завдання"
  game_concept_tasks: "Завдання"
  game_concept_mission_task_desc: "Завдання є піделементом [Concept('mission', 'CONCEPT_PLACEHOLDER')|e]. Вони складаються з вимоги та можуть містити нагороду, якщо вищезгадана умова виконана. Усі завдання мають бути виконані, щоб завершити [mission]."
  game_concept_infiltrate_administration: "Інфільтрувати адміністрацію"
  game_concept_infiltrate_administration_desc: "Це дозволяє нам зняти [Concept('fog_of_war', 'CONCEPT_PLACEHOLDER')|e] над іншою [Concept('country', 'CONCEPT_PLACEHOLDER')|e] на певний період часу."
  game_concept_coastal: "Прибережний"
  game_concept_coast: "Узбережжя"
  game_concept_coastal_desc: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e], що є прибережною, контактує з [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e], і тому матиме [Concept('port', 'CONCEPT_PLACEHOLDER')|e] та зможе будувати [Concept('ships', 'CONCEPT_PLACEHOLDER')|e], якщо має відповідну [Concept('building', 'CONCEPT_PLACEHOLDER')|e], таку як [ShowBuildingTypeName('wharf')] або [ShowBuildingTypeName('dock')]."
  game_concept_inland: "Внутрішній"
  game_concept_inland_desc: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e], що є внутрішньою, не контактує з [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e], тому вона не матиме [Concept('port', 'CONCEPT_PLACEHOLDER')|e] і не зможе будувати [Concept('ships', 'CONCEPT_PLACEHOLDER')|e].\n\nПротилежністю внутрішньої $game_concept_location$ є [Concept('coastal', 'CONCEPT_PLACEHOLDER')|e] $game_concept_location$."
  game_concept_disembark: "Висадитися"
  game_concept_embarking: "Посадка"
  game_concept_disembarked: "Висаджений"
  game_concept_embarking_desc: "[Concept('army', 'CONCEPT_PLACEHOLDER')|e], що транспортується [Concept('navy', 'CONCEPT_PLACEHOLDER')|e], може висадитися з [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e] на сусідню [Concept('coastal', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_embarkings: "Посадки"
  game_concept_embarkings_desc: "[Concept('army', 'CONCEPT_PLACEHOLDER')|e], що транспортується [Concept('navy', 'CONCEPT_PLACEHOLDER')|e], може висадитися з [Concept('seazone', 'CONCEPT_PLACEHOLDER')|e] на сусідню [Concept('coastal', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_gold: "Дукати"
  game_concept_gold_i: "@gold!"
  game_concept_gold_desc: "Представляючи ліквідне багатство, це основна форма валюти в кожній [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Кількість дукатів, якими наразі володіє [country], є її [Concept('treasury', 'CONCEPT_PLACEHOLDER')|e].\n\nДукати можуть генеруватися через [Concept('taxes', 'CONCEPT_PLACEHOLDER')|e] від [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] та [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e], і витрачаються майже на все, від будівництва [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] до утримання [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]. Вони переходять з рук в руки через купівлю та продаж [Concept('food', 'CONCEPT_PLACEHOLDER')|e] та [Concept('goods', 'CONCEPT_PLACEHOLDER')|e], і можуть бути інвестовані в [Concept('stability', 'CONCEPT_PLACEHOLDER')|e] та [Concept('court', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_improve_relations: "Покращити відносини"
  game_concept_improve_relation: "Покращити відносини"
  game_concept_improve_relations_desc: "Це дія [Concept('diplomacy', 'CONCEPT_PLACEHOLDER')|e] з наміром покращити [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e], яку інша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має щодо нашої власної [country]."
  game_concept_winter: "Зима"
  game_concept_winters: "Зими"
  game_concept_winter_desc: "Зима негативно впливає на [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]. Те, як відбувається кожна зима, є випадковим, але її суворість, або [Concept('winter_level', 'CONCEPT_PLACEHOLDER')|e], залежить від [Concept('climate', 'CONCEPT_PLACEHOLDER')|e].\n\nМісяці, на які припадає зима, залежать від [Concept('hemisphere', 'CONCEPT_PLACEHOLDER')|e] [location]."
  game_concept_winter_level: "Рівень зими"
  game_concept_winter_levels: "Рівні зими"
  game_concept_winter_level_max: "Максимальний рівень зими"
  game_concept_winter_level_desc: "Рівень зими — це суворість [Concept('winter', 'CONCEPT_PLACEHOLDER')|e] у [Concept('location', 'CONCEPT_PLACEHOLDER')|e]. Суворіша [winter] зупинить [Concept('constructions', 'CONCEPT_PLACEHOLDER')|e] і навіть [Concept('frozen_freeze_over', 'CONCEPT_PLACEHOLDER')|e] деякі мілководні [Concept('seazones', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('armies', 'CONCEPT_PLACEHOLDER')|e] не можуть пересуватися в [locations] з [ShowTopographyName('mountains')] [Concept('topography', 'CONCEPT_PLACEHOLDER')|e] під час Нормальної або Суворої [winter].\n\nМаксимальний рівень зими, який може пережити [location], залежить від місцевого [Concept('climate', 'CONCEPT_PLACEHOLDER')|e].\n\nРівні зими такі:\n- [ShowModifier('winter_none')]\n- [ShowModifier('winter_mild')]\n- [ShowModifier('winter_normal')]\n- [ShowModifier('winter_severe')]"
  game_concept_hemisphere: "Півкуля"
  game_concept_hemisphere_desc: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] лежить в одній з двох півкуль: на північ або на південь від екватора.\n\nПівкуля в основному визначає місяці, в які ймовірно настане [Concept('winter', 'CONCEPT_PLACEHOLDER')|e]: приблизно в січні в Північній півкулі та приблизно в червні в Південній півкулі."
  game_concept_tolerance: "Толерантність"
  game_concept_tolerance_desc: "Толерантність відображає, наскільки шанобливо ставляться до населення певної [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] у суспільстві. Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має різне значення $game_concept_tolerance$ щодо своєї [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e], щодо [Concept('heretics', 'CONCEPT_PLACEHOLDER')|e] та щодо [Concept('heathens', 'CONCEPT_PLACEHOLDER')|e].\n\nПозитивне значення $game_concept_tolerance$ збільшує [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], а також [Concept('diplomatic_opinion', 'CONCEPT_PLACEHOLDER')|e] щодо $game_concept_countries$ цієї $game_concept_religion$. Навпаки, негативна $game_concept_tolerance$ збільшує [Concept('unrest', 'CONCEPT_PLACEHOLDER')|e] та знижує $game_concept_diplomatic_opinions$."
  game_concept_tolerance_list: "$BULLET_WITH_TAB$[Concept('primary_religion_tolerance', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('heretic_tolerance', 'CONCEPT_PLACEHOLDER')|e]\n$BULLET_WITH_TAB$[Concept('heathenry_tolerance', 'CONCEPT_PLACEHOLDER')|e]"
  game_concept_true_faith_tolerance: "Толерантність до основної релігії"
  game_concept_primary_religion_tolerance: "Толерантність до основної релігії"
  game_concept_true_faith_tolerance_desc: "$game_concept_primary_religion_tolerance$ відображає, наскільки [Concept('country', 'CONCEPT_PLACEHOLDER')|e] прихильна до послідовників своєї [Concept('primary_religion', 'CONCEPT_PLACEHOLDER')|e]. Вона впливає на [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] $game_concept_primary_religion$ і змінює [Concept('diplomatic_opinion', 'CONCEPT_PLACEHOLDER')|e] країни щодо братніх $game_concept_countries$.\n\n$game_concept_primary_religion_tolerance$ зазвичай позитивна за замовчуванням і може бути збільшена ще більше певними [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e] та [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_heretic_tolerance: "Толерантність до єретиків"
  game_concept_heretic_tolerance_desc: "$game_concept_heretic_tolerance$ відображає соціальну та політичну дискримінацію, яку [Concept('heretics', 'CONCEPT_PLACEHOLDER')|e] зазнають у [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Вона впливає на [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] єретичних [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] та змінює [Concept('diplomatic_opinion', 'CONCEPT_PLACEHOLDER')|e] країни щодо єретичних $game_concept_countries$.\n\n$game_concept_heretic_tolerance$ зазвичай низька за замовчуванням і може бути змінена певними [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e] та [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_heathenry_tolerance: "Толерантність до язичників"
  game_concept_heathenry_tolerance_desc: "$game_concept_heathenry_tolerance$ відображає соціальну та політичну дискримінацію, яку [Concept('heathens', 'CONCEPT_PLACEHOLDER')|e] зазнають у [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Вона впливає на [Concept('pop_satisfaction', 'CONCEPT_PLACEHOLDER')|e] язичницьких [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] та змінює [Concept('diplomatic_opinion', 'CONCEPT_PLACEHOLDER')|e] країни щодо язичницьких $game_concept_countries$.\n\n$game_concept_heathenry_tolerance$ зазвичай дуже низька за замовчуванням і може бути змінена певними [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e] та [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_autocephalous_patriarchate: "Автокефальний Патріархат"
  game_concept_autocephalous_patriarchates: "Автокефальні Патріархати"
  game_concept_autocephalous_patriarchate_desc: "Автокефальний Патріархат — це група [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] однієї східної [ShowReligionGroupAdjective('christian')] [Concept('religion', 'CONCEPT_PLACEHOLDER')|e], що мають на чолі своєї Церкви одного єпископа, який не підпорядковується жодному іншому в межах [religion]. [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] Автокефального Патріархату отримує додаткові переваги, і членство також може мати переваги, доки [country]-член не переросте [international_organization_leader_short], після чого може бути вигідно відокремитися та створити власний. Якщо патріархат має [Concept('holy_site', 'CONCEPT_PLACEHOLDER')|e] у своїх межах, то осідок цього патріархату може бути перенесений туди для додаткових переваг."
  game_concept_sect: "Секта"
  game_concept_sects: "Секти"
  game_concept_sect_desc: "$sect_desc$"
  game_concept_hindu_branch: "Індуїстська гілка"
  game_concept_hindu_branches: "Індуїстські гілки"
  game_concept_hindu_branch_desc: "$hindu_branch_desc$"
  game_concept_subsidization: "Субсидування"
  game_concept_subsidize: "Субсидувати"
  game_concept_subsidized: "Субсидовано"
  game_concept_subsidization_desc: "Деякі виробничі [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] можуть мати свої фінансові втрати, [Concept('subsidized', 'CONCEPT_PLACEHOLDER')|e] їхнім [Concept('owner', 'CONCEPT_PLACEHOLDER')|e]. Будь-які втрати [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], які може нести така будівля, будуть сплачені безпосередньо з [Concept('country', 'CONCEPT_PLACEHOLDER')|e]'s [Concept('balance', 'CONCEPT_PLACEHOLDER')|e], дозволяючи їй функціонувати як зазвичай."
  game_concept_special_status: "Особливий статус"
  game_concept_special_statuses: "Особливі статуси"
  game_concept_special_status_desc: "Члени з Особливим Статусом в [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] користуються певними привілеями або мають певні обов'язки. У деяких випадках [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] організації має особливий статус, щоб підкреслити своє унікальне становище. Інші організації мають [Concept('electors', 'CONCEPT_PLACEHOLDER')|e], які представлені особливим статусом."
  game_concept_special_status_power: "Влада особливого статусу"
  game_concept_special_status_power_short: "Влада"
  game_concept_special_status_power_desc: "Це політична влада, яку має група [Concept('members', 'CONCEPT_PLACEHOLDER')|e] з певним [Concept('special_status', 'CONCEPT_PLACEHOLDER')|e] в [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]. Цей вплив може бути важливим для прийняття певних [Concept('parliament_issues', 'CONCEPT_PLACEHOLDER')|e] в [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e], якщо вони не вирішуються через [Concept('resolution', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_international_organization_variable: "Цінність міжнародної організації"
  game_concept_international_organization_variable_desc: "Цінності в [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] можуть використовуватися для представлення різних механік залежно від $game_concept_international_organization$. У деяких випадках це представляє авторитет [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] організації, як у [GetUniqueInternationalOrganization('hre').GetName] або [GetUniqueInternationalOrganization('middle_kingdom').GetName]. В інших, як у [GetInternationalOrganizationType('sect').GetName], це представляє вплив самого $game_concept_international_organization$. Можуть бути й інші застосування для цінностей, і це залежатиме від кожного типу $game_concept_international_organization$."
  game_concept_land_ownership_rule: "Правило володіння землею"
  game_concept_land_ownership_rule_desc: "Деякі [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e] здатні володіти [Concept('locations', 'CONCEPT_PLACEHOLDER')|e]. $game_concept_land_ownership_rule$ описує характер цього володіння та які [Concept('modifiers', 'CONCEPT_PLACEHOLDER')|e] застосовуються до цих локацій."
  game_concept_international_organization_leader: "Лідер міжнародної організації"
  game_concept_international_organization_leader_short: "Лідер"
  game_concept_international_organization_leader_desc: "[Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] може мати [Concept('country', 'CONCEPT_PLACEHOLDER')|e] як свого [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e]. Кожна [international_organization] відрізняється, але загалом це наймогутніша [Concept('country', 'CONCEPT_PLACEHOLDER')|e] в [international_organization].\n\nДеякі організації мають систему голосування за [country], яка має бути [international_organization_leader_short], тоді як інші покладаються на інші системи для визначення свого керівництва, а деякі можуть взагалі не мати [international_organization_leader_short]."
  game_concept_hre_emperor: "Імператор"
  game_concept_hre_emperor_desc: "Імператор є [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('holy_roman_empire', 'CONCEPT_PLACEHOLDER')|e]. Обов'язок Імператора — захищати [Concept('members', 'CONCEPT_PLACEHOLDER')|e] від зовнішніх та внутрішніх загроз."
  game_concept_hre_law_level: "Рівень Імперського Закону"
  game_concept_hre_law_level_desc: "Рівень закону описує, наскільки децентралізованим чи централізованим є конкретний закон для [Concept('holy_roman_empire', 'CONCEPT_PLACEHOLDER')|e]. Нижчий рівень представляє вищу владу [Concept('hre_emperor', 'CONCEPT_PLACEHOLDER')|e], тоді як вищий рівень представляє децентралізований статус.\n\nРеформи можуть бути прийняті лише на суміжному рівні, що означає, що Імператор не може обрати реформу Рівня 2, якщо поточний закон знаходиться на реформі Рівня 4. Більшість [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] починаються на рівні #Y 3#!."
  game_concept_holy_roman_empire: "Священна Римська Імперія"
  game_concept_hre: "СРІ"
  game_concept_holy_roman_empire_desc: "[GetUniqueInternationalOrganization('hre').GetName] є [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e], яка домінує в політичній сфері [ShowRegionName('north_german_region')], [ShowRegionName('south_german_region')] та частково [ShowRegionName('italy_region')] і [ShowRegionName('france_region')]. [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip] — це об'єднання незліченних [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] від незначної до середньої потужності, які всі перебувають під захистом свого [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e].\n\n[GetUniqueInternationalOrganization('hre').GetLeaderTitle] є головою цієї організації, який обирається на цю посаду."
  game_concept_hre_electoral_college: "Колегія виборців"
  game_concept_hre_electoral_college_desc: "$game_concept_hre_electoral_college$ складається з [ShowSpecialStatusNamePlural('elector')] [GetUniqueInternationalOrganization('hre').GetName].\n\nЗакон [ShowLawName('golden_bull')] впливає на те, як [ShowSpecialStatusNamePluralWithNoTooltip('elector')] віддають свої голоси через такі фактори:\n- встановлюється вплив [Concept('country_rank', 'CONCEPT_PLACEHOLDER')|e]\n- вплив [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] зменшується вдвічі\n- вплив [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e] збільшується вчетверо"
  game_concept_trade_range: "Торговий діапазон"
  game_concept_trade_range_desc: "Це визначає максимальну відстань, на якій [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може здійснювати [Concept('trade', 'CONCEPT_PLACEHOLDER')|e] між двома [Concept('markets', 'CONCEPT_PLACEHOLDER')|e], розраховану від їхніх [Concept('market_centers', 'CONCEPT_PLACEHOLDER')|e]. Доки [country] має [Concept('merchant_capacity', 'CONCEPT_PLACEHOLDER')|e] на [market], вона зможе [trade] з усіма [markets] у межах $game_concept_trade_range$.\n\n$game_concept_trade_range$ може бути збільшений переважно через [Concept('advances', 'CONCEPT_PLACEHOLDER')|e], хоча деякі [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e] та [Concept('reforms', 'CONCEPT_PLACEHOLDER')|e] також можуть впливати на нього."
  game_concept_parliament: "Парламент"
  game_concept_parliament_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e] може скликати свої [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] на сесію $game_concept_parliament$, щоб вирішити будь-які [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e], які вони можуть мати, а також надати можливості для створення [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e], підвищення [Concept('taxes', 'CONCEPT_PLACEHOLDER')|e], збільшення [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e], або зміни будь-яких поточних [Concept('laws', 'CONCEPT_PLACEHOLDER')|e]. Будь-який [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] може мати [Concept('parliament_agenda', 'CONCEPT_PLACEHOLDER')|e], яку потрібно вирішити, перш ніж вони обіцяють свою підтримку.\n\n$game_concept_parliament$ може відбуватися в [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] або іншому [Concept('location', 'CONCEPT_PLACEHOLDER')|e], який отримує деякі невеликі переваги. Якщо [location] стає [Concept('occupied', 'CONCEPT_PLACEHOLDER')|e], $game_concept_parliament$ провалиться.\n\n[Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e], такі як [GetUniqueInternationalOrganization('hre').GetName], також можуть мати $game_concept_parliament$. Однак парламентська система залежить від типу Організації, оскільки деякі вимагають підтримки [Concept('members', 'CONCEPT_PLACEHOLDER')|e] певного [Concept('special_status', 'CONCEPT_PLACEHOLDER')|e] та їхньої [Concept('special_status_power', 'CONCEPT_PLACEHOLDER')|e] для прийняття."
  game_concept_parliament_seat: "Місце Парламенту"
  game_concept_parliament_seat_desc: "Це [Concept('location', 'CONCEPT_PLACEHOLDER')|e], де відбувається [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] або [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_parliament_type: "Тип Парламенту"
  game_concept_parliament_types: "Типи Парламентів"
  game_concept_parliament_type_desc: "[Concept('parliament', 'CONCEPT_PLACEHOLDER')|e] може бути різного [parliament_type]. Це впливає на функціонування парламенту.\n\n[ShowParliamentTypes]"
  game_concept_parliament_agenda: "Порядок денний Парламенту"
  game_concept_parliament_agenda_short: "Порядок денний"
  game_concept_parliament_agendas: "Порядки денні Парламентів"
  game_concept_parliament_agendas_short: "Порядки денні"
  game_concept_parliament_agenda_desc: "Будь-який [Concept('estate', 'CONCEPT_PLACEHOLDER')|e] може мати $game_concept_parliament_agenda$, яку потрібно вирішити, перш ніж вони обіцяють свою підтримку. Це може бути дорого для [Concept('country', 'CONCEPT_PLACEHOLDER')|e], оскільки надана підтримка залежить від [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e], яку має стан.\n\nУ контексті [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e], [Concept('members', 'CONCEPT_PLACEHOLDER')|e] [Concept('special_status', 'CONCEPT_PLACEHOLDER')|e] натомість представлятимуть свій $game_concept_parliament_agenda$. Прийняття їх може дати їхню гарантовану підтримку у формі їхньої [Concept('special_status_power', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_parliament_issue: "Парламентське питання"
  game_concept_parliament_issue_short: "Питання"
  game_concept_parliament_issues: "Парламентські питання"
  game_concept_parliament_issues_short: "Питання"
  game_concept_parliament_issue_desc: "Це питання, що вже деякий час перебуває на обговоренні, і потребуватиме вирішення в [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e] станами [Concept('estates', 'CONCEPT_PLACEHOLDER')|e], інакше [Concept('country', 'CONCEPT_PLACEHOLDER')|e] ослабне.\n\nДля [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e] ці дебати мають бути узгоджені з впливовими [Concept('members', 'CONCEPT_PLACEHOLDER')|e], що мають [Concept('special_status', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_parliament_support: "Парламентська підтримка"
  game_concept_parliament_support_short: "Підтримка"
  game_concept_parliament_support_desc: "Це значення, що відображає, наскільки [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e] готовий ухвалити [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e]. Воно також необхідне, коли держава бажає виконати певний [Concept('parliament_request', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_parliament_base_support: "Базова парламентська підтримка"
  game_concept_parliament_base_support_short: "Базова підтримка"
  game_concept_parliament_base_support_desc: "Це впливає на початкову [Concept('parliament_support', 'CONCEPT_PLACEHOLDER')|e], коли скликається [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e]. Вона збільшується переважно завдяки [Concept('crown_power', 'CONCEPT_PLACEHOLDER')|e], але [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e] та [Concept('advances', 'CONCEPT_PLACEHOLDER')|e] також можуть на неї впливати."
  game_concept_parliament_requests: "Парламентські запити"
  game_concept_parliament_requests_desc: "Це дії, на які [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може витратити [Concept('parliament_support', 'CONCEPT_PLACEHOLDER')|e], щоб їх ухвалити."
  game_concept_parliament_request: "Парламентський запит"
  game_concept_parliament_request_desc: "Це дія, на яку [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може витратити [Concept('parliament_support', 'CONCEPT_PLACEHOLDER')|e], щоб її ухвалити."
  game_concept_isolate: "Ізолювати"
  game_concept_isolation: "Ізоляція"
  game_concept_isolated: "Ізольований"
  game_concept_isolate_desc: "[Concept('country', 'CONCEPT_PLACEHOLDER')|e], що є ізольованою, не дозволятиме жодній іншій країні [Concept('export', 'CONCEPT_PLACEHOLDER')|e] або [Concept('import', 'CONCEPT_PLACEHOLDER')|e] [Concept('goods', 'CONCEPT_PLACEHOLDER')|e] на своїх [Concept('markets', 'CONCEPT_PLACEHOLDER')|e]. Вона може надати деяким країнам ексклюзивні права ігнорувати ці правила."
  game_concept_total_ability: "Сукупна здібність"
  game_concept_total_ability_desc: "Сукупна здібність [Concept('character', 'CONCEPT_PLACEHOLDER')|e] — це сума всіх їхніх показників [Concept('adm_short', 'CONCEPT_PLACEHOLDER')|e], [Concept('dip_short', 'CONCEPT_PLACEHOLDER')|e] та [Concept('mil_short', 'CONCEPT_PLACEHOLDER')|e] [Concept('ability', 'CONCEPT_PLACEHOLDER')|e], доданих разом."
  game_concept_legislative_efficiency: "Законодавча ефективність"
  game_concept_legislative_efficiency_desc: "Це впливає на те, як швидко [Concept('country', 'CONCEPT_PLACEHOLDER')|e] може впроваджувати [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e] та [Concept('estate_privileges', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_victory_card: "Картка перемоги"
  game_concept_victory_cards: "Картки перемоги"
  game_concept_victory_card_desc: "Картка перемоги — це мета завоювати всю [Concept('area', 'CONCEPT_PLACEHOLDER')|e] на мапі для [Concept('country', 'CONCEPT_PLACEHOLDER')|e]. Коли вся територія є [Concept('owned', 'CONCEPT_PLACEHOLDER')|e], [Concept('controlled', 'CONCEPT_PLACEHOLDER')|e] та [Concept('core', 'CONCEPT_PLACEHOLDER')|e], [Concept('country', 'CONCEPT_PLACEHOLDER')|e] отримає [Concept('score', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_score: "Рахунок"
  game_concept_score_desc: "Це спосіб відстежувати, наскільки добре [Concept('country', 'CONCEPT_PLACEHOLDER')|e] діє. Кожна [Concept('country', 'CONCEPT_PLACEHOLDER')|e] ранжується за показниками [Concept('adm_short', 'CONCEPT_PLACEHOLDER')|e], [Concept('dip_short', 'CONCEPT_PLACEHOLDER')|e] та [Concept('mil_short', 'CONCEPT_PLACEHOLDER')|e] і здобуває рахунок відповідно до свого рангу.\nБільші [Concept('countries', 'CONCEPT_PLACEHOLDER')|e] також здобувають рахунок за володіння [Concept('victory_cards', 'CONCEPT_PLACEHOLDER')|e], які вони отримують по одній у кожну [Concept('age', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_tithe: "Десятина"
  game_concept_tithe_desc: "Це кількість [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], зібрана з усіх [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionAdjective('catholic')] віри в [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], що сповідують ту саму віру, і передана Папству. [Concept('Countries', 'CONCEPT_PLACEHOLDER')|e] з негативною [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] щодо Папства не сплачуватимуть десятину."
  game_concept_legal_male: "Юридичний чоловік"
  game_concept_legal_male_plural: "Юридичні чоловіки"
  game_concept_legally_male: "Юридично чоловік"
  game_concept_legal_male_desc: "Юридично чоловік — це [Concept('character', 'CONCEPT_PLACEHOLDER')|e] жіночої статі, яка за законом вважається чоловіком. Це надає їм ті ж права, що й їхнім чоловічим відповідникам у питанні [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e]. Цей статус може бути оголошений для жінки за допомогою [Concept('character_interaction', 'CONCEPT_PLACEHOLDER')|e] [ShowCharacterInteractionName('prefection')]."
  game_concept_coalition: "Коаліція"
  game_concept_coalition_desc: "[Concept('countries', 'CONCEPT_PLACEHOLDER')|e], чий [Concept('antagonism', 'CONCEPT_PLACEHOLDER')|e] до певної [Concept('country', 'CONCEPT_PLACEHOLDER')|e] перетнув бурхливі межі, можуть вирішити приєднатися до Коаліції, спрямованої проти цієї [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_head_of_the_cabinet: "Голова Кабінету"
  game_concept_head_of_the_cabinet_desc: "Голова Кабінету — це [Concept('character', 'CONCEPT_PLACEHOLDER')|e], якого двір підвищив для представлення [Concept('cabinet', 'CONCEPT_PLACEHOLDER')|e].\n\n[character] отримує наступні бонуси:\n[ShowModifierEffect('head_of_the_cabinet_modifier')]"
  game_concept_natural_harbor_suitability: "Природна придатність гавані"
  game_concept_natural_harbor_suitability_desc: "Наскільки добре [Concept('location', 'CONCEPT_PLACEHOLDER')|e] природно підходить для швартування кораблів та завантаження/розвантаження людей і матеріалів, до будь-яких штучних покращень. Це робить портові [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] дешевшими для будівництва та покращує [Concept('harbor_capacity', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_harbor_capacity: "Місткість гавані"
  game_concept_harbor_capacity_desc: "Місткість гавані зменшує вартість переходу з моря на сушу і навпаки в розрахунках [Concept('proximity', 'CONCEPT_PLACEHOLDER')|e] та [Concept('trade', 'CONCEPT_PLACEHOLDER')|e].\n\nМісткість гавані [location] залежить головним чином від її [Concept('natural_harbor_suitability', 'CONCEPT_PLACEHOLDER')|e], але багато портових [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] також можуть значно її збільшити."
  game_concept_payment: "Платіж"
  game_concept_payments: "Платежі"
  game_concept_payment_desc: "Це домовленість, укладена в [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e], де деякі [Concept('members', 'CONCEPT_PLACEHOLDER')|e] зобов'язані платити іншим [Concept('members', 'CONCEPT_PLACEHOLDER')|e] [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e], [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e] або щось інше в обмін на їхнє членство в організації. Платежі можуть бути застосовані або скасовані за допомогою різних [Concept('laws', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_fow: "Туман війни"
  game_concept_fog_of_war: "Туман війни"
  game_concept_fow_vision: "Бачення"
  game_concept_fow_desc: "Покривало, що приховує [Concept('discovered', 'CONCEPT_PLACEHOLDER')|e] частини карти, називається [fow].\n\n[Concept('units', 'CONCEPT_PLACEHOLDER')|e], що належать іншим [Concept('countries', 'CONCEPT_PLACEHOLDER')|e], є [Concept('hidden', 'CONCEPT_PLACEHOLDER')|e], поки вони ховаються в [fow].\n\n[Concept('location', 'CONCEPT_PLACEHOLDER')|e] завжди видима для свого [Concept('controller', 'CONCEPT_PLACEHOLDER')|e]. Крім того, [Concept('country', 'CONCEPT_PLACEHOLDER')|e] завжди може бачити [Concept('cores', 'CONCEPT_PLACEHOLDER')|e], якими вона [Concept('own', 'CONCEPT_PLACEHOLDER')|e], навіть якщо вони [Concept('occupied', 'CONCEPT_PLACEHOLDER')|e] [Concept('enemy', 'CONCEPT_PLACEHOLDER')|e].\n\n[Concept('allies', 'CONCEPT_PLACEHOLDER')|e], [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e] та [Concept('overlords', 'CONCEPT_PLACEHOLDER')|e] діляться своїм баченням один з одним.\n\nДеякі [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] завжди будуть у [fow], наприклад, ті, що мають [Concept('vegetation', 'CONCEPT_PLACEHOLDER')|e] [ShowVegetationName('forest')] або [Concept('topography', 'CONCEPT_PLACEHOLDER')|e] [ShowTopographyName('mountains')].\n\n[Concept('seazones', 'CONCEPT_PLACEHOLDER')|e] з [topography] [ShowTopographyName('narrows')] будуть перешкоджати баченню лише з інших [seazones]."
  game_concept_hidden: "Прихований"
  game_concept_hidden_desc: "[Concept('unit', 'CONCEPT_PLACEHOLDER')|e], розташована всередині [Concept('fow', 'CONCEPT_PLACEHOLDER')|e], є [hidden] для інших [Concept('countries', 'CONCEPT_PLACEHOLDER')|e].\n\nКоли [unit] є прихованою, інші [countries] навіть не знатимуть про її існування, не кажучи вже про інформацію щодо її складу.\n\nПриховані [units] не отримують прямого [Concept('combat', 'CONCEPT_PLACEHOLDER')|e] бонусу, але засідки часто можуть дати стратегічну перевагу."
  game_concept_location_importance: "Важливість розташування"
  game_concept_location_importance_desc: "Це визначається на основі безлічі факторів, таких як придатність гавані [Concept('location', 'CONCEPT_PLACEHOLDER')|e], розмір його [Concept('population', 'CONCEPT_PLACEHOLDER')|e], скільки [Concept('roads', 'CONCEPT_PLACEHOLDER')|e] до нього веде, скільки [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e] воно має, чи є воно нашою [Concept('capital', 'CONCEPT_PLACEHOLDER')|e], чи має воно [ShowBuildingTypeName('castle')], а також його [Concept('market_access', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_monthly_income_trade_and_tax: "Щомісячний дохід від торгівлі та податків"
  game_concept_monthly_income_trade_and_tax_desc: "Це щомісячний [Concept('income', 'CONCEPT_PLACEHOLDER')|e] від [Concept('trading', 'CONCEPT_PLACEHOLDER')|e] та [Concept('taxes', 'CONCEPT_PLACEHOLDER')|e] разом."
  game_concept_monthly_manpower: "Щомісячна людська сила"
  game_concept_monthly_manpower_desc: "Це щомісячний приріст нової [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] для [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_revolutionary: "Революційний"
  game_concept_revolution: "Революція"
  game_concept_revolutionary_desc: "[revolution] — це унікальна трансформація суспільства [Concept('country', 'CONCEPT_PLACEHOLDER')|e] під час [ShowAgeName('age_6_revolutions')]. Держави, які проходять через [ShowDisasterName('revolution_disaster')] і не можуть захистити свій абсолютний устрій, можуть стати [revolutionary], надаючи їм доступ до потужних [Concept('actions', 'CONCEPT_PLACEHOLDER')|e], [Concept('reforms', 'CONCEPT_PLACEHOLDER')|e] та [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] ціною того, що вони стануть потенційною мішенню для не-[revolutionary] держав."
  game_concept_revolutionary_target: "Революційна ціль"
  game_concept_revolutionary_target_desc: "Це осердя Революції та наймогутніша [Concept('revolutionary', 'CONCEPT_PLACEHOLDER')|e] [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_celestial_authority_gc: "Небесна Влада"
  game_concept_celestial_authority_gc_desc: "Це міра легітимності лідера [GetUniqueInternationalOrganization('middle_kingdom').GetName]. Вона використовується для прийняття [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] та [Concept('policies', 'CONCEPT_PLACEHOLDER')|e] в межах цієї [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]."
  game_concept_share_of_power_gc: "Частка Влади"
  game_concept_share_of_power_gc_desc: "Це міра сили певної протиборчої сторони під час [ShowSituationName('fall_of_delhi')] [Concept('situation', 'CONCEPT_PLACEHOLDER')|e]. [GetCountry('DLH').GetName] може збільшити її наступними способами:\n- Дії ситуації\n- [Concept('events', 'CONCEPT_PLACEHOLDER')|e]\n- Спеціальні мирні договори\n- Дипломатична підтримка від інших [Concept('countries', 'CONCEPT_PLACEHOLDER')|e]\n\nПротивники можуть збільшити свою частку через наступальні війни та перемоги проти [GetCountry('DLH').GetNameWithNoTooltip]."