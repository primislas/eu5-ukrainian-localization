  generic_war_goal_take_province: "Захопити [PROVINCE.GetNameWithNoTooltip]"
  generic_war_goal_take_province_desc: "[Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] полягає в захопленні цільової [Concept('province', 'CONCEPT_PLACEHOLDER')|e]. Отримайте бонусний [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e] за окупацію цільової [province]. Ми отримуватимемо зростаючий [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e] за утримання [province]."
  generic_war_goal_take_capital: "Захопити столицю [PROVINCE.GetNameWithNoTooltip]"
  generic_war_goal_take_capital_desc: "[Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] полягає в захопленні ворожої столиці [Concept('province', 'CONCEPT_PLACEHOLDER')|e]. Ми отримуватимемо зростаючий [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e] за окупацію всіх [province], де ворог має свою [Concept('capital', 'CONCEPT_PLACEHOLDER')|e]."
  generic_war_goal_defend_capital: "Захистити столицю [PROVINCE.GetNameWithNoTooltip]"
  generic_war_goal_defend_capital_desc: "[Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] полягає в захисті нашої столиці [Concept('province', 'CONCEPT_PLACEHOLDER')|e]. Ми отримуватимемо зростаючий [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e] за захист усіх [province], де ми маємо нашу [Concept('capital', 'CONCEPT_PLACEHOLDER')|e]."
  generic_war_goal_naval_superiority: "Продемонструвати морську перевагу"
  generic_war_goal_naval_superiority_desc: "[Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] полягає в демонстрації морської переваги. Отримайте бонусний [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e] за перемоги в морських битвах. Якщо ми [Concept('blockade', 'CONCEPT_PLACEHOLDER')|e] порт (а наш опонент ні), ми отримуватимемо зростаючий [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e]."
  generic_war_goal_superiority: "Продемонструвати перевагу"
  generic_war_goal_superiority_desc: "[Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] полягає в демонстрації переваги. Учасники отримають більше [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e] за перемоги в битвах.\nНакопичення понад $THRESHOLD|Y%$ [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e] від виграних битв надасть нам зростаючий [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e]."
  generic_war_goal_enforce_military_access: "Захопити [PROVINCE.GetNameWithNoTooltip] для отримання військового доступу"
  generic_war_goal_enforce_military_access_desc: "[Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] полягає в захопленні цільової провінції [PROVINCE.GetNameWithNoTooltip] для покращеного військового доступу в районі.\nКонтроль над [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] надасть нам зростаючий [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e]."
  generic_war_goal_independence: "Незалежність [PROVINCE.GetCountry.GetNameWithNoTooltip]"
  generic_war_goal_independence_desc: "[Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] — це проголошення незалежності для [PROVINCE.GetCountry.GetNameWithNoTooltip] шляхом захоплення [PROVINCE.GetNameWithNoTooltip].\nКонтроль над [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] надасть нам зростаючий [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e]."
  generic_war_goal_destroy_army: "Знищити армію"
  generic_war_goal_destroy_army_desc: "[Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] полягає в знищенні ворожих [Concept('armies', 'CONCEPT_PLACEHOLDER')|e]. Якщо одна сторона має [Concept('army', 'CONCEPT_PLACEHOLDER')|e], а інша ні, вони отримуватимуть зростаючий [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e]."
