l_english:
  END_GAME_VIEW_LOSING_TITLE: "Кінець гри"
  END_GAME_VIEW_LOSING_TEXT: "Наша нація не змогла пережити хід подій, не будучи достатньо могутньою та рішучою порівняно з нашими сусідами. У майбутньому [COUNTRY.GetAdjective] народ буде згаданий лише в музеї, де вчені вивчатимуть наш провал."
  END_GAME_VIEW_SURVIVING_TITLE: "Незначне доповнення до історії"
  END_GAME_VIEW_SURVIVING_TEXT: "Наша горда нація пережила століття боротьби, воєн та негараздів, проте, попри це, [COUNTRY.GetAdjective] народ досяг небагато значного. У світі, сповненому велетнів цивілізації та битв, ми є лише приміткою."
  END_GAME_VIEW_GREAT_POWER_TITLE: "Велика держава"
  END_GAME_VIEW_GREAT_TEXT: "Наша славетна нація досягла статусу Великої держави світу. Вітаємо, [COUNTRY.GetAdjective] народ є одним з найпроцвітаючих та найпрестижніших у цю епоху, і наше правління було винагороджене найвидатнішим успіхом."
  CONTINUE_PAST_END_DATE: "Продовжити гру"
  CONTINUE_PAST_END_DATE_TOOLTIP: "Продовжити гру\nДосягнення буде вимкнено надалі"
  END_GAME_VIEW_QUIT_TOOLTIP: "Завершити гру та повернутися до головного меню"
  END_GAME_VIEW_OBSERVE: "Спостерігати"
  END_GAME_VIEW_OBSERVE_TOOLTIP: "Продовжити в режимі спостерігача"