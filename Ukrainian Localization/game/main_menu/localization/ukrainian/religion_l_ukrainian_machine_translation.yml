  christian: "Християнство"
  christian_ADJ: "Християнин"
  christian_desc: "Християнство, видатна авраамічна віра, зосереджується на житті та вченнях Ісуса Христа, наголошуючи на спасінні через віру та дотриманні біблійних принципів. Її різноманітні гілки, включаючи католицизм, протестантизм та східне православ'я, мають значний вплив по всьому світу, формуючи історію, політику та культуру."
  muslim: "Іслам"
  muslim_ADJ: "Мусульманин"
  muslim_desc: "Іслам, монотеїстична релігія, заснована Пророком Мухаммадом у VII столітті, сповідує віру в єдиного Бога (Аллаха) та дотримується вчень $common_string_quran$. З її різними деномінаціями, такими як сунізм та шиїзм, іслам глибоко вплинув на суспільства, сприяючи культурним, науковим та політичним досягненням на всіх континентах."
  buddhist: "Буддизм"
  buddhist_ADJ: "Буддист"
  buddhist_desc: "Беручи свій початок від вчень Будди, що означає 'Пробуджений' та також відомого під його князівським ім'ям Сіддхартха Гаутама або під титулом #italic Шак'ямуні#!, $buddhist$ поширився далеко й широко від свого джерела в $india$. Впливаючи та зазнаючи впливу багатьох країн, народів та вірувань, куди він поширився, багато різних $buddhist_ADJ$ шкіл виникло в ньому, з різними підходами та інтерпретаціями на шляху до звільнення від Сансари, циклу смерті та переродження."
  dharmic: "Дхарма"
  dharmic_ADJ: "Дхармічні"
  dharmic_desc: "$dharmic_ADJ$ релігії походять з $india$ і всі мають спільним поняття 'Дхарми', що означає правильну поведінку та спосіб життя згідно з космічними законами всесвіту."
