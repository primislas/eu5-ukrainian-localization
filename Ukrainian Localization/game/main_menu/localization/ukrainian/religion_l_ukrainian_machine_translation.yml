  apostolicae_servitutis: "Apostolicae Servitutis"
  apostolicae_servitutis_desc: "Незважаючи на численні заборонні закони Церкви, деякі церковники звикли займатися мирськими справами та заняттями.\n\nЦе обурливо і має припинитися."
