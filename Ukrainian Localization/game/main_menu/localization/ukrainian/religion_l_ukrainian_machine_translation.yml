  RELIGIOUS_FOCUS_ALREADY_QUEUED: "[RELIGIOUS_FOCUS.GetName] вже в черзі."
  RELIGIOUS_FOCUS_ETA_TT: "Очікується завершення дослідження [RELIGIOUS_FOCUS.GetName] приблизно $DATE|Y$"
  RELIGIOUS_FOCUS_PROGRESS_TT: "Поточний прогрес дослідження [RELIGIOUS_FOCUS.GetName] становить $CURRENT|%W$, і $VAL|+=%$ прогресу досягається щомісяця завдяки:\n$WHY$"
  RELIGIOUS_FOCUS_NO_PROGRESS_TT: "Поточний прогрес дослідження [RELIGIOUS_FOCUS.GetName] становить $CURRENT|W%$, і щомісяця не досягається жодного прогресу через:\n$WHY$"
  RELIGIOUS_FOCUS_SET_FOCUS: "Встановити фокус"
  RELIGIOUS_FOCUS_ADD_TO_QUEUE: "Додати до черги"
  RELIGIOUS_FOCUS_REMOVE_FROM_QUEUE: "Видалити з черги"
  RELIGIOUS_FOCUS_EFFECTS: "Після повного дослідження це матиме такі наслідки:"
  RELIGIOUS_FOCUS_WHILE_PROGRESSING: "Під час просування до цього фокусу наша нація зазнаватиме таких наслідків:"
  RESEARCHING_RELIGIOUS_FOCUS: "Просування до $RELIGIOUS_FOCUS$"
  SCOPE_NOBLE_ESTATE_SATISFACTION: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  SCOPE_CLERGY_ESTATE_SATISFACTION: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] [Concept('estate_satisfaction', 'CONCEPT_PLACEHOLDER')|e]"
  NUMBER_OF_SUBJECTS: "Кількість [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]"
  FOCUS_SPEED_ENTRY_FORMAT: "$KEY$: $VALUE|+=2$"
  WARRIOR_PROPORTION: "Кількість воїнів-орлів/ягуарів"
  flower_wars_tt: "Цей релігійний фокус надасть нам доступ до приводу для війни Квіткових війн."
  raise_sacrifice_rate_tt: "Цей релігійний фокус зробить взаємодію 'Умиротворити наших богів' ефективнішою, зменшуючи більше приреченості."
  CANONIZATION_DATE: "Канонізовано в $DATE$"
  OPEN_IO_LEFT_CLICK: "Натисніть лівою кнопкою, щоб відкрити цю [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]"
  fundamental_law_tt: "Це фундаментальний закон, що визначає основу нашої віри і не може бути змінений"
  nature_tenet: "Природа"
  nature_tenet_desc: "Відомий також як physis (#italic φύσις#!), цей догмат лежить в основі наших вірувань. Він означає беззаперечний факт, що Ісус Христос має подвійну та гармонійну природу. Співіснування людяності та божественності є основою співіснування, за яким ми прагнутимемо жити."
  single_nature: "Єдина Природа"
  single_nature_desc: "Може бути лише одна природа Ісуса."
  composite_nature: "Складна Природа"
  composite_nature_desc: "Дві природи Ісуса поєднані в одну (#italic μια φύσις#!)."
  dual_nature: "Подвійна Природа"
  dual_nature_desc: "Аспект Ісуса містить подвійну природу, як людську, так і божественну (#italic Δυοφυσιτισμός#!)."
  separate_nature: "Окрема Природа"
  separate_nature_desc: "Маючи дві природи, божественність і людськість, ці два аспекти Ісуса є цілком окремими."
  christology: "Христологія"
  christology_desc: "Богословське вивчення природи Христа, Його ідентичності та єдності Його різноманітних природ є витонченим мистецтвом. Багато вчених класифікують Христа як цілком божественного, таким чином вони дотримуються $high_christology$, тоді як інші дотримуються дисциплін $low_christology$."
  high_christology: "Висока христологія"
  high_christology_desc: "Христос є беззаперечно божественним."
  low_christology: "Низька христологія"
  low_christology_desc: "Христос є лише людиною."
  liturgical_practices: "Літургійні практики"
  liturgical_practices_desc: "Різноманітні практики поклоніння, зосереджені навколо гімнів, читань та обрядів."
  byzantine_rites: "$BYZ_ADJ$ обряди"
  byzantine_rites_desc: "Дотримуючись практик, популяризованих $BYZ_ADJ$ священиками, ми можемо запозичити частину легітимності їхніх вірувань."
  local_traditions_and_rites: "Місцеві обряди"
  local_traditions_and_rites_desc: "Наголошувати на наших власних місцевих обрядах понад іншими."
  catholic_influenced_rites: "Обряди під впливом [ShowReligionAdjectiveWithNoTooltip('catholic')]"
  catholic_influenced_rites_desc: "Запровадити обряди, такі як меса, таїнства та літургія годин, поруч із [ShowReligionAdjective('catholic')] практиками."
  essence_tenet: "Сутність"
  essence_tenet_desc: "Відомий також як ousia (#italic ουσία#!), цей догмат представляє присутність Божественності як частину архітектури всесвіту навколо нас, та нашу боротьбу за повне її прийняття."
  accept_essence_tenet: "Прийняти догмат Сутності"
  accept_essence_tenet_desc: "$accept_aspect_key$"
  deny_essence_tenet: "Відкинути догмат Сутності"
  deny_essence_tenet_desc: "$reject_aspect_key$"
  person_tenet: "Особа"
  person_tenet_desc: "Походить від основного поняття конкретної реальності (#italic υπόστασις#!), цей догмат заглиблюється в філософську та фундаментальну реальність і субстанцію, що підтримує всю реальність. З'явившись у стародавніх дебатах, він знову виник як важливий елемент у визначенні природи Святої Трійці, де він описує її трьох складових як таких, що поділяють одну божественну сутність."
  accept_person_tenet: "Прийняти догмат Особи"
  accept_person_tenet_desc: "$accept_aspect_key$"
  deny_person_tenet: "Відкинути Догмат Особи"
  deny_person_tenet_desc: "$reject_aspect_key$"
  prosopon_tenet: "Маска"
  prosopon_tenet_desc: "Відомий також як просопон (#italic πρόσωπον#!), цей догмат поєднує концепцію божественної ідентичності та особи (#italic υπόστασις#!). Його мета — підкреслити унікальність та цінність особистості як у божественному, так і у віруючих."
  accept_prosopon_tenet: "Прийняти Догмат Маски"
  accept_prosopon_tenet_desc: "$accept_aspect_key$"
  deny_prosopon_tenet: "Відкинути Догмат Маски"
  deny_prosopon_tenet_desc: "$reject_aspect_key$"
  christological_debates_tenet: "Христологічні Дебати"
  christological_debates_tenet_desc: "Дебати щодо аспекту Христа, нашої позиції щодо братніх сект та нашого ставлення до природи поклоніння є життєвою силою для збереження нашої віри живою та яскравою!"
  allow_christological_debates_tenet: "Дозволити Христологічні Дебати"
  allow_christological_debates_tenet_desc: "$accept_aspect_key$"
  forbid_christological_debates_tenet: "Заборонити Христологічні Дебати"
  forbid_christological_debates_tenet_desc: "$reject_aspect_key$"
  double_sabbath_tenet: "Подвійний Суботній День"
  double_sabbath_tenet_desc: "Субота була святим днем, присвяченим Богу з часів Мойсея. Вона може бути збережена як день відпочинку, або ж її можна вважати заміненою Днем Господнім у неділю."
  allow_double_sabbath_tenet: "Дозволити Подвійний Суботній День"
  allow_double_sabbath_tenet_desc: "І неділя, і субота вважаються священними."
  forbid_double_sabbath_tenet: "Заборонити Подвійний Суботній День"
  forbid_double_sabbath_tenet_desc: "Дотримання Суботи більше не є необхідним при святкуванні Дня Господнього у неділю."
  change_maintenance_tt: "Це вплине на [Concept('maintenance', 'CONCEPT_PLACEHOLDER')|e] наших монастирів"
  accept_aspect_key: "Наш патріархат інтегрує цей аспект у свої основні вірування, прийняті всіма нашими членами."
  reject_aspect_key: "Наш патріархат відкине цей аспект зі своїх основних вірувань, прийнятих всіма нашими членами."
  ADD_ASPECT: "Додати Релігійний Аспект"
  add_religious_aspect_select_which: "Виберіть, який [Concept('religious_aspect', 'CONCEPT_PLACEHOLDER')|e] додати"
  add_religious_aspect: "Додати релігійний аспект"
  add_religious_aspect_christian: "Додати релігійний аспект"
  add_religious_aspect_inti: "Поклонятися Богу"
  add_religious_aspect_desc: "Додає [Concept('religious_aspect', 'CONCEPT_PLACEHOLDER')|e] до нашої [Concept('country_s] версії [religion', 'CONCEPT_PLACEHOLDER')|e]."
  remove_religious_aspect: "Видалити релігійний аспект"
  remove_religious_aspect_christian: "Видалити релігійний аспект"
  remove_religious_aspect_inti: "Припинити поклонятися Богу"
  remove_religious_aspect_desc: "Видаляє [Concept('religious_aspect', 'CONCEPT_PLACEHOLDER')|e] з нашої [Concept('country_s] версії [religion', 'CONCEPT_PLACEHOLDER')|e]."
  remove_religious_aspect_select_which: "Виберіть, який [Concept('religious_aspect', 'CONCEPT_PLACEHOLDER')|e] видалити"
  change_religious_aspect: "Замінити релігійний аспект"
  change_religious_aspect_christian: "Замінити релігійний аспект"
  change_religious_aspect_inti: "Змінити Бога для поклоніння"
  change_religious_aspect_desc: "Замінює [Concept('religious_aspect', 'CONCEPT_PLACEHOLDER')|e] в нашій [Concept('country_s] версії [religion', 'CONCEPT_PLACEHOLDER')|e]."
  change_religious_aspect_select_which: "Виберіть, який [Concept('religious_aspect', 'CONCEPT_PLACEHOLDER')|e] видалити"
  appease_the_gods: "Умиротворити Богів"
  appease_the_gods_desc: "Наші Боги розгнівані та потребують умиротворення. Для цього будуть принесені жертви."
  ceremonial_festivals: "Провести церемонію"
  ceremonial_festivals_desc: "Церемоніальний фестиваль святкується щомісяця, щоразу на честь Божества. Цього разу ми зробимо щось особливе."
  explanation_ceremony_tt: "[ShowCultureName('nahua_culture')] люди щомісяця святкують урочистість, присвячену певному Божеству. Ці місяці тривають 20 днів. Кожного місяця святкування відрізняється, і ми отримуватимемо різні ефекти залежно від нього."
  atlcahualo_tt: "Фестиваль Ātlcāhualo обертається навколо родючості та посіву. Ми можемо отримати до [ShowModifier('atlcahualo_mass')]."
  tlacaxipehualiztli_tt: "Фестиваль Tlācaxīpēhualiztli обертається навколо приходу Весни, родючості та проростання. Ми можемо отримати до [ShowModifier('tlacaxipehualiztli_mass')]."
  tozoztontli_tt: "Фестиваль Tōzōztōntli обертається навколо посадки та посіву. Ми можемо отримати до [ShowModifier('tozoztontli_mass')]."
  huey_tozoztli_tt: "Фестиваль Huēyi Tōzōztli обертається навколо кукурудзи, насіння та посіву. Ми можемо отримати до [ShowModifier('huey_tozoztli_mass')]."
  toxcatl_tt: "Фестиваль Toxcatl обертається навколо оновлення. Ми можемо отримати до [ShowModifier('toxcatl_mass')]."
  etzalcualiztli_tt: "Фестиваль Etzalcualiztli обертається навколо молодих посівів та закінчення сухого сезону. Ми можемо отримати до [ShowModifier('etzalcualiztli_mass')]."
  tecuilhuitontli_tt: "Фестиваль Текуїльуїтонтлі обертається навколо зерна. Ми можемо отримати до [ShowModifier('tecuilhuitontli_mass')]."
  huey_tecuilhuitli_tt: "Фестиваль Уей Текуїльуїтлі обертається навколо володарів та молодої кукурудзи. Ми можемо отримати до [ShowModifier('huey_tecuilhuitl_mass')]."
  tlaxochimaco_tt: "Фестиваль Тлашочімако обертається навколо квітів та торгівлі. Ми можемо отримати до [ShowModifier('tlaxochimaco_mass')]."
  xocotl_huetzi_tt: "Фестиваль Шокотль Уеці обертається навколо фруктів та врожаю. Ми можемо отримати до [ShowModifier('xocotl_huetzi_mass')]."
  ochpaniztli_tt: "Фестиваль Очпаніцтлі обертається навколо врожаю та очищення. Ми можемо отримати до [ShowModifier('ochpaniztli_mass')]."
  teteo_eco_tt: "Фестиваль Теотлехко обертається навколо прибуття наших Богів. Ми можемо отримати до [ShowModifier('teteo_eco_mass')]."
  tepeilhuitl_tt: "Фестиваль Тепеїльуїтль обертається навколо гір. Ми можемо отримати до [ShowModifier('tepeilhuitl_mass')]."
  quecholli_tt: "Фестиваль Кечоллі обертається навколо полювання. Ми можемо отримати до [ShowModifier('quecholli_mass')]."
  panquetzaliztli_tt: "Фестиваль Панкецаліцтлі обертається навколо племінних свят та народження Уїцілопочтлі. Ми можемо отримати до [ShowModifier('panquetzaliztli_mass')]."
  atemoztli_tt: "Фестиваль Атемоцтлі обертається навколо дощу. Ми можемо отримати до [ShowModifier('atemoztli_mass')]."
  tititl_tt: "Фестиваль Тітітль обертається навколо наших старійшин. Ми можемо отримати до [ShowModifier('tititl_mass')]."
  izcalli_tt: "Фестиваль Іцкаллі обертається навколо родючості, води та посіву. Ми можемо отримати до [ShowModifier('izcalli_mass')]."
  nemontemi_tt: "У п'ять нещасливих днів кінця року жодне свято не відзначається, оскільки можуть статися лише погані речі."
  open_war_path: "Відкрити Шлях Війни"
  open_war_path_desc: "Ми відправимо емісарів до наших сусідів, щоб відсвяткувати з ними Квіткову Війну."
  flower_war_cb_against_country_tt: "Ми отримаємо [ShowCasusBelliName('cb_flower_wars')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] проти обраного сусіда [Concept('country', 'CONCEPT_PLACEHOLDER')|e]"
  pilgrimage_to_cholula: "Паломництво до [ShowLocationName('cholollan')]"
  pilgrimage_to_cholula_desc: "[ShowLocationName('cholollan')] є найсвятішим містом для нашої системи вірувань, і це популярне місце паломництва. Відправивши нашого правителя як паломника, наше царство отримає добрі знамення."
  reform_society_action: "Реформувати Суспільство"
  reform_society_action_desc: "Настав час, щоб наше суспільство зазнало великих змін, оскільки ми прагнемо захистити наш народ від наших ворогів. Відмовившись від застарілих вірувань та методів управління минулого, ми приймемо майбутнє крізь цей бурхливий період, що настане."
  commence_reform_society_disaster_tt: "#R Починається#! [ShowDisasterName('reform_society')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]. #Y У разі успіху може статися наступне:#!"
  eligible_for_reform_society_disaster_tt: "Ми ухвалили [ShowGenericActionName('reform_society_action')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e]"
  inti_ceremonial_festivals: "Провести Церемонію"
  inti_ceremonial_festivals_desc: "Церемоніальний Фестиваль відзначається щомісяця, щоразу обертаючись навколо іншої теми. Цього разу ми вкладемо владу уряду і зробимо його більшим, ніж зазвичай."
  zamay_quilla_tt: "У Замай Кілья, першого місяця, святкування обертається навколо родючості та вирощування кукурудзи."
  hatun_pucuy_quilla_tt: "На Хатун Пукуй Кілья, другого місяця, святкування обертається навколо квітів та достатку."
  pacha_pucuy_quilla_tt: "На Пача Пукуй Кілья, третього місяця, святкування обертається навколо зрілості землі."
  ayrihua_quilla_tt: "На Айріхуа Кілья, четвертого місяця, святкування обертається навколо врожаю та відпочинку."
  aymoray_quilla_tt: "На Айморай Кілья, п'ятого місяця, святкування обертається навколо сушіння зерна."
  haucai_cusqui_quilla_tt: "На Хаукай Кускуй Кілья, шостого місяця, святкування обертається навколо зимового сонцестояння та відродження Сонця."
  chacra_conaqui_quilla_tt: "На Чакра Конакі Кілья, сьомого місяця, святкування обертається навколо військових та їхнього престижу."
  chacra_yapuy_quilla_tt: "На Чакра Япуй Кілья, восьмого місяця, святкування обертається навколо кукурудзи, насіння та посіву."
  coia_raymi_quilla_tt: "На Коя Раймі Кілья, дев'ятого місяця, святкування обертається навколо молодих посівів."
  uma_raymi_quilla_tt: "На Ума Раймі Кілья, десятого місяця, святкування обертається навколо дощу."
  ayamarca_raymi_quilla_tt: "На Аямарка Раймі Кілья, одинадцятого місяця, святкування обертається навколо мертвих."
  capac_raymi_quilla_tt: "На Капак Раймі Кілья, дванадцятого місяця, святкування обертається навколо відкидання старого та оновлення."
  sacrifice_noble_blood: "Жертвувати шляхетною кров'ю"
  sacrifice_noble_blood_desc: "Наші Боги потребують крові нашого народу, щоб підтримувати рівновагу на небі та землі. Обов'язок наших шляхтичів — віддавати їм свою кров у ритуальній жертві, адже їхня кров є найчистішою та найціннішою з усіх."
  sacrifice_noble_blood_tt: "Обраний персонаж може померти"
  mayan_ceremonial_festivals: "Провести церемонію"
  mayan_ceremonial_festivals_desc: "Церемоніальний фестиваль святкується кожного уїналя, що дорівнює 20 дням, щоразу обертаючись навколо іншої теми. Цього разу ми вкладемо владу уряду та зробимо його більшим, ніж зазвичай."
  uinal_pop_tt: "На уїналі Поп святкування обертається навколо оновлення та очищення."
  uinal_uo_tt: "На уїналі Уо святкування обертається навколо духовенства та оракулів."
  uinal_zip_tt: "На уїналі Зіп святкування обертається навколо [ShowGodName('coatlicue_god')], богині кохання та медицини."
  uinal_zotz_tt: "На уїналі Зотц духовенство та урядовці дотримуються очисного посту."
  uinal_zec_tt: "На уїналі Зек святкування обертається навколо меду, [ROOT.GetCountry.GetReligion.GetGodName] отримував би жертви фігурок, зроблених з меду, а бджолярі щедро роздавали б його людям."
  uinal_yaxkin_tt: "На уїналі Яшкін святкування обертається навколо дітей та їхнього шляху до становлення експертами у ремеслі своїх батьків."
  uinal_xul_tt: "На уїналі Шуль святкування обертається навколо [ShowGodName('quetzalcoatl_god')] та верховного лідера воїнів."
  uinal_mol_tt: "На уїналі Моль бджолярі моляться [ROOT.GetCountry.GetReligion.GetGodName] за цвітіння достатньої кількості квітів, щоб урожай наступного року був рясним."
  uinal_chen_tt: "На уїналях Чен та Яш храми оновлюються, глиняні ідоли та їхні жаровні замінюються на новостворені."
  uinal_zac_tt: "На уіналі Зак святкування обертається навколо Бога Полювання та спокути за кровопролиття мисливцями поза ритуальним жертвоприношенням."
  uinal_ceh_tt: "На уіналі Сех святкування обертається навколо великого бенкету, де спалюється велика кількість копалу."
  uinal_mac_tt: "На уіналі Мак святкування обертається навколо [ROOT.GetCountry.GetReligion.GetGodName] хліба, запалювалося б багато вогнів, і в них спалювалися б серця тварин."
  uinal_kankin_tt: "На уіналі Канкін жодних святкувань не проводиться."
  uinal_muan_tt: "На уіналі Муан, [ShowGoodsName('cocoa')] фермери приносять у жертву собаку кольору какао для [ROOT.GetCountry.GetReligion.GetGodName]."
  uinal_pax_tt: "На уіналі Пакс, лідери та жерці менших сіл прибувають до своїх столиць і разом вшановують [ROOT.GetCountry.GetReligion.GetGodName]."
  uinal_kayab_tt: "На уіналі Каяб і Кумку кожне село святкує власні свята, щоб підготуватися до Уаєб, п'яти зловісних днів."
  uinal_uayeb_tt: "Протягом п'яти днів Уаєб жодних святкувань не проводиться, оскільки будь-яка діяльність приречена закінчитися трагедією."
  adoptionism: "Адопціонізм"
  adoptionism_desc: "Наше віровчення стверджує, що Ісус Христос став Сином Божим під час свого хрещення або воскресіння, а не будучи вічно божественним."
  adult_baptism: "Хрещення дорослих"
  adult_baptism_desc: "Хрещення дорослих на основі сповідання віри в Ісуса Христа та як прийняття до місцевої спільноти віри здійснюється тими, хто вірить, що спасительна благодать і членство в Церкві є дарами від Бога. Віра отримувача повинна бути висловлена і не може бути передана або перенесена від однієї особи до іншої."
  aniconism: "Аніконізм"
  aniconism_desc: "Символи не є належним способом представляти нашого Господа, оскільки вони є засобами для представлення ідолів або людей. Ми відкинемо будь-яке зображення, включаючи хрест, який використовують інші християни."
  asceticism: "Аскетизм"
  asceticism_desc: "Матеріалістичні прагнення засліплюють нас від божественної істини. Лише присвятивши себе простому життю без розкоші, ми можемо досягти духовного просвітлення."
  bread_and_wine: "Хліб і Вино"
  bread_and_wine_desc: "Ми віримо, що лише причастя, яке включає як хліб, так і вино, є дійсним, навіть для мирян. Наші священнослужителі будуть звершувати причастя під обома видами кожному учаснику служби."
  clerical_poverty: "Клерикальна бідність"
  clerical_poverty_desc: "Духовенство не повинно володіти багатствами і має відмовитися від своїх матеріальних благ. Вони повинні присвячувати свою увагу Богові, а не світському світу."
  crown_as_head_of_faith: "Корона як Глава Віри"
  crown_as_head_of_faith_desc: "Церква більше не підпорядковується одному зовнішньому, корумпованому теократу. Натомість, усі релігійні питання тепер будуть перенаправлені до правителя, який служить новим Главою Віри."
  freedom_to_preach: "Свобода проповідувати"
  freedom_to_preach_desc: "Серед послідовників існує багато розбіжностей, але кожній секті буде надана свобода вільно проповідувати, доки Бог перебуває в їхніх серцях."
  gnosticism: "Гностицизм"
  gnosticism_desc: "Гностицизм зосереджується на особистому спасінні через #italic гнозис#!. Ми втечемо з матеріального світу і повернемося до вищої сфери, шукаючи духовного прозріння."
  individual_creeds: "Індивідуальні віровчення"
  individual_creeds_desc: "Дозвіл нашому народу формулювати власні віровчення сприятиме формуванню індивідуальних думок і прокладе шлях до прогресу!"
  monasticism: "Монашество"
  monasticism_desc: "Насолоди вишуканої їжі та напоїв лише відволікають нас від служіння божественному. Ізоляція себе у віддалених монастирях є найкращим способом уникнути цих спокус."
  modalism: "Модалізм"
  modalism_desc: "Ми віримо, що Бог є абсолютно єдиним, а тринітарні концепції, такі як Отець, Син і Святий Дух, є лише різними способами, у яких Бог проявляє Себе."
  organized_through_bishops: "Призначення єпископів"
  organized_through_bishops_desc: "Замість того, щоб повністю відмовитися від призначення єпископів, вони служитимуть Церкві як адміністратори більших територій."
  pacifism: "Пацифізм"
  pacifism_desc: "Блаженні миротворці, бо вони синами Божими назвуться."
  parish_registers: "Парафіяльні реєстри"
  parish_registers_desc: "Деталі хрещень, шлюбів та поховань відтепер будуть документуватися в парафіяльному реєстрі. Кожен парафіяльний священик вестиме книгу, куди вноситиме ці події, і зберігатиме її у надійній скрині з двома замками."
  participation_women: "Участь жінок"
  participation_women_desc: "Хоча жінки беруть участь як рівні в наших громадах, ми запровадимо загальне правило скрізь, щоб до них ставилися так само, як до чоловіків."
  rejection_of_sacraments: "Відмова від таїнств"
  rejection_of_sacraments_desc: "Наше вчення відкидає більшість християнських таїнств, оскільки вони здебільшого фізичні та не мають значення. Духовна частина є єдиною, що має значення, щоб наблизити нас до Бога."
  sola_fide: "Тільки вірою"
  sola_fide_desc: "Жодна добра справа не може задовольнити Бога. Ми прощені лише божественною благодаттю, яку Бог дарував через Свого єдиного Сина, Ісуса Христа."
  sola_scriptura: "Тільки Писанням"
  sola_scriptura_desc: "Біблія, слово Боже, передане людині, є єдиним авторитетом для християнського вчення. Усі релігійні практики, які не можуть бути підтверджені біблійними посиланнями, мають бути засуджені як єресь."
  soli_deo_gloria: "Лише Богові слава"
  soli_deo_gloria_desc: "Усі людські досягнення можуть бути створені лише з прославленням Бога як їхнім присвяченням."
  translated_bibles: "Перекладені Біблії"
  translated_bibles_desc: "Переклад Біблій мовою, якою розмовляє народ нашої країни, дає їм найкращий шлях до Бога у спосіб, що промовляє до їхніх розумів і сердець."
  usury_allowed: "Лихварство дозволено"
  usury_allowed_desc: "Грошові позики з відсотками, що збагачують позикодавця, тепер дозволені і більше не вважаються гріховними."
  war_sermons: "Воєнні проповіді"
  war_sermons_desc: "У часи конфліктів віра зберігає надію нашого народу. Церква нашого царства проповідуватиме зі Священної Книги, щоб підтримувати моральний дух населення навіть у найтемніші години."
  five_doors: "П'ять Дверей"
  five_doors_desc: "Деякі серед нашого народу практикують стиль медитації, що полягає у зачиненні всіх дверей у будинку, одночасно відкриваючи #italic п'ять дверей#! або п'ять почуттів. Ми запровадимо цю практику повсюди."
  holy_cooperation: "Священна Співпраця"
  holy_cooperation_desc: "Відбудеться перехід до заохочення та активної участі у продуктивній праці. Цей етос пошириться на наші аграрні громади, натхненний моделлю ранніх християн про священну кооперативну спільноту."
  twelve_emissaries: "Дванадцять Емісарів"
  twelve_emissaries_desc: "Натхненні організацією деяких громад, ми оберемо серед наших старійшин та досконалих дванадцять мудреців, щоб вони діяли як верховна рада, не створюючи справжньої ієрархії."
  consolamentum: "Консоламентум"
  consolamentum_desc: "Оскільки процес життя неминуче тягне за собою жаль за наші гріхи, потреба отримати розраду, щоб увійти до Небес чистим і наблизитися до Бога, стає очевидною. Отримуючи #italic Консоламентум#!, наш народ отримує відпущення гріхів перед неминучою смертю,"
  pescatarianism: "Пескетаріанство"
  pescatarianism_desc: "Тварини є носіями реінкарнованих душ, і через це ми не можемо їх їсти. Риби, істоти, що спонтанно генеруються, не можуть вважатися тваринами і можуть бути з'їдені."
  the_perfects: "Досконалі"
  the_perfects_desc: "Ті серед нас, хто особливо відданий Богові та чеснотам, яких повинна прагнути кожна людина, називаються Досконалими. Ці чоловіки та жінки отримують #italic Консоламентум#! за свою відданість і стають Досконалими. На відміну від звичайних людей, Досконалі отримують #italic Консоламентум#! двічі у своєму житті: коли їх підносять до нової ролі та перед смертю."
  baptism_by_fire: "Хрещення Вогнем"
  baptism_by_fire_desc: "Наша віра не вірить, що хрещення водою є постійним, як визнавав святий Іоанн Хреститель. Лише доторкаючись до чотирьох сторін голови людини палаючою свічкою, може відбутися постійне хрещення."
  name_change: "Зміна Імені"
  name_change_desc: "Сила імен добре відома нашим громадам. Наші релігійні лідери часто змінюють свої імена на імена послідовників святого Павла, так само як звичайні люди змінюють назви своїх поселень на назви місць, де мешкав наш покровитель."
  paulician_canon: "Павлікіанський Канон"
  paulician_canon_desc: "Наш народ відкидає Старий Завіт та його Пророків, так само як відкидає включення послань святого Петра. Лише слова святого Павла є доречними."
  punishment_by_stoning: "Покарання Каменуванням"
  punishment_by_stoning_desc: "Каменування є поширеною практикою покарання релігійних дисидентів серед наших громад, що виділяються серед наших сусідів. Це, швидше за все, спадщина наших анатолійських витоків."
  arminianism: "POSTEDIT_Армініанство"
  arminianism_desc: "Армініанство ґрунтується на плюралістичних і гуманітарних ідеях голландського реформатського богослова Якобуса Армініуса."
  gomarism: "Гомаризм"
  gomarism_desc: "Франциск Гомарус виступає проти вірувань Якобуса Армініуса, який викладав пелагіанські доктрини та намагався створити нову школу теології в університеті, де вони обоє викладали."
  instituionalized_arminianism: "Інституціоналізоване $arminianism$"
  instituionalized_arminianism_desc: "$arminianism_desc$ Цей релігійний рух тепер інституціоналізований у нашій державі."
  instituionalized_gomarism: "Інституціоналізований $gomarism$"
  instituionalized_gomarism_desc: "$gomarism_desc$ Цей релігійний рух тепер інституціоналізований у нашій державі."
  adamite_services: "Адамітські Служби"
  adamite_services_desc: "Секта адамітів наполягає на наготі під час церковних служб. Без стилізації статусу чи культури ми постаємо рівними в очах Бога, що є яскравим нагадуванням про нашу спільну людяність та про невинність, якою ми насолоджувалися до Гріхопадіння."
  punishment_of_sin: "Покарання за Гріх"
  punishment_of_sin_desc: "Усі, хто грішить, повинні бути покарані однаково, незалежно від багатства чи рангу. Навіть шляхта не стоїть вище законів Божих."
  justified_conflicts: "Виправдані Конфлікти"
  justified_conflicts_desc: "Новій Церкві країни загрожують як язичники, так і єретики. У війні самозбереження Церква виправдає наші конфлікти Біблією."
  pietism: "Пієтизм"
  pietism_desc: "Пієтизм зосереджується на індивідуальній побожності кожного вірянина та підкреслює внутрішнє перетворення, що веде до побожного християнського життя."
  prima_scriptura: "Prima Scriptura"
  prima_scriptura_desc: "Хоча Святе Письмо має вважатися центральним джерелом спасіння, воно не може вважатися єдиним джерелом божественного одкровення."
  demand_church_tax: "Вимагати Апостольський Податок"
  demand_church_tax_desc: "У часи потреби всі нації, які зобов'язуються надати нам фінансову допомогу через [ShowEstatePrivilegeName('apostolic_tax_privilege')] [Concept('estate_privilege', 'CONCEPT_PLACEHOLDER')|e], будуть покликані зробити це в ім'я Бога."
  20_years_cd: "Ця взаємодія доступна кожні #Y 20#! років"
  every_catholic_asked_to_pay_tt: "Кожна [ShowReligionAdjective('catholic')] країна з [ShowEstatePrivilegeNameWithNoTooltip('apostolic_tax_privilege')] [Concept('estate_privilege', 'CONCEPT_PLACEHOLDER')|e] буде покликана сплатити податок. Отримані гроші залежатимуть від [Concept('estate_power', 'CONCEPT_PLACEHOLDER')|e] нашого уряду\n"
  demand_church_tax_price: "Вартість Вимоги Церковного Податку"
  request_aid: "Запит Допомоги"
  request_aid_desc: "Наш орден є бастіоном нашої віри, захисником істинних вірян і щитом проти тих, хто бажає завдати шкоди нашому народу. Надання допомоги нашій справі має бути головною директивою для [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  10_years_cd: "Ця взаємодія доступна кожні #Y 10#! років"
  request_aid_price: "Вартість запиту католицької допомоги"
  placitum_regium: "Placitum Regium"
  placitum_regium_desc: "[GetCountry('PAP').GetGovernment.GetRulerTitle] занадто довго втручався у справи нашої країни. Влада корони не повинна схиляти коліна перед [GetCountry('PAP').GetAdjective] престолом! [Concept('papal_bull', 'CONCEPT_PLACEHOLDER')|e] набуде чинності лише тоді, коли наш уряд дасть свою згоду."
  once_per_ruler: "Цю дію можна виконати лише один раз за життя [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e]."
  request_cardinal_seat: "Запит кардинальського престолу"
  request_cardinal_seat_desc: "Колегії кардиналів явно бракує представництва нашого бачення. Ми повинні вимагати, щоб новий [ShowBuildingTypeName('seat_of_cardinal')] був наданий [ShowBuildingTypeName('cathedral')] на нашій території, щоб забезпечити, що наш вплив не зменшиться."
  request_cardinal_tt: "Визначене [Concept('location', 'CONCEPT_PLACEHOLDER')|e] отримає [ShowBuildingTypeName('seat_of_cardinal')], якщо буде санкціоновано [GetCountry('PAP').GetAdjective] владою."
  recently_requested_cardinal: "Країна нещодавно запросила кардинала"
  cc_indulgences: "Купівля індульгенції"
  cc_indulgences_desc: "Офіційна позиція [GetInternationalOrganization('catholic_church').GetName] щодо питання індульгенцій."
  limited_indulgences: "Cum Postquam"
  limited_indulgences_desc: "Послідовник [ShowReligionAdjective('catholic')] віри може скоротити свій час у чистилищі шляхом здійснення благодійності, як-от подання милостині або інших пожертв інституції [GetInternationalOrganization('catholic_church').GetName]."
  unlimited_indulgences: "Unigenitus Dei Filius"
  unlimited_indulgences_desc: "Продаж індульгенцій широко поширений і високо комерціалізований. Послідовники можуть купувати індульгенції безпосередньо у членів [GetInternationalOrganization('catholic_church').GetName], навіть доходячи до купівлі прощення за гріхи, ще не вчинені."
  no_financial_indulgences: "Etsi Dominici Gregis"
  no_financial_indulgences_desc: "Купівля індульгенцій будь-якими засобами, навіть подання милостині, заборонена."
  cc_papal_authority: "Папська влада"
  cc_papal_authority_desc: "Офіційна позиція [GetInternationalOrganization('catholic_church').GetName] щодо питання папської влади."
  ultramontanism: "Ультрамонтанство"
  ultramontanism_desc: "[GetInternationalOrganization('catholic_church').GetLeaderTitle] має сильні прерогативи та повноваження над [GetInternationalOrganization('catholic_church').GetName]. [GetInternationalOrganization('catholic_church').GetLeaderTitle] є непогрішним."
  gallicanism: "Галліканство"
  gallicanism_desc: "Відкидаючи повну владу [GetInternationalOrganization('catholic_church').GetLeaderTitle], $gallicanism$ надає подібного значення владі держави."
  conciliarism: "Конциліаризм"
  conciliarism_desc: "$conciliarism$ відкидає повну владу [GetInternationalOrganization('catholic_church').GetLeaderTitle] як однієї особи, натомість передаючи її в руки вселенського собору."
  invisible_church: "Невидима Церква"
  invisible_church_desc: "[GetInternationalOrganization('catholic_church').GetLeaderTitle] є лише представницькою роллю у вірі, з повноваженнями у питаннях віри, покладеними на правителя окремої країни."
  cc_veneration_of_saints_and_reliquaries: "Вшанування Святих та Реліквій"
  cc_veneration_of_saints_and_reliquaries_desc: "Офіційна позиція [GetInternationalOrganization('catholic_church').GetName] щодо питання вшанування святих та реліквій."
  unlimited_veneration: "Sunt in Regno Dei"
  unlimited_veneration_desc: "Вшанування святих та реліквій є невід'ємною частиною [ShowReligionAdjective('catholic')] доктрини."
  limited_veneration: "Licet ad Colenda"
  limited_veneration_desc: "Хоча й невід'ємна частина [ShowReligionAdjective('catholic')] доктрини, вшанування святих та реліквій обмежене меншим колом схвалених об'єктів."
  no_veneration: "Ubi Moyses Ascendit"
  no_veneration_desc: "Вшанування святих та реліквій заборонено."
  cc_simony: "Симонія"
  cc_simony_desc: "Офіційна позиція [GetInternationalOrganization('catholic_church').GetName] щодо питання симонії."
  tolerated_simony: "Beatior Ist Largitas"
  tolerated_simony_desc: "Присутність симонії офіційно не схвалюється, але толерується Церквою."
  endorsed_simony: "Quae sunt Caesaris Deo"
  endorsed_simony_desc: "Симонія є прийнятою частиною [ShowReligionAdjective('catholic')] доктрини."
  banned_simony: "Romanum Decet Pontificem"
  banned_simony_desc: "Практика симонії активно переслідується та карається Церквою."
  cc_society_of_jesus: "Товариство Ісуса"
  cc_society_of_jesus_desc: "Офіційні відносини [GetInternationalOrganization('catholic_church').GetName] щодо Ордену Єзуїтів."
  cc_society_of_jesus_tt: "The #Y $cc_society_of_jesus$#! було засновано з #Y $flavor_pap.1400.title$#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  society_of_jesus_founded: "Товариство Ісуса Засновано"
  society_of_jesus_not_allowed: "Dominus Ac Redemptor Noster"
  society_of_jesus_not_allowed_desc: "Товариство Ісуса не підтримується [GetInternationalOrganization('catholic_church').GetName]."
  society_of_jesus_allowed: "Regimini Militantis Ecclesiae"
  society_of_jesus_allowed_desc: "Товариство Ісуса є офіційним представником [GetInternationalOrganization('catholic_church').GetLeaderTitle] і дозволено поширювати віру з усією своєю міццю."
  cc_witchcraft: "Переслідування чаклунства"
  cc_witchcraft_desc: "Офіційна позиція [GetInternationalOrganization('catholic_church').GetName] щодо існування чаклунства та інших окультних практик."
  cc_witchcraft_tt: "#Y Чаклунство#! обговорювалося під час #Y $flavor_pap.8.title$#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  witchcraft_discussed: "Чаклунство обговорено"
  witchcraft_not_aknowledged: "Sicut Malefici Aegyptii"
  witchcraft_not_aknowledged_desc: "Чаклунство не визнається дійсним [GetInternationalOrganization('catholic_church').GetName]."
  witchcraft_aknowledged: "Summis Desiderantes"
  witchcraft_aknowledged_desc: "Як вимагає #italic Malleus Maleficarum#!, ми повинні знайти та переслідувати усі ознаки чаклунства."
  cc_marriage_of_priest: "Шлюб священників"
  cc_marriage_of_priest_desc: "Офіційна позиція [GetInternationalOrganization('catholic_church').GetName] щодо можливості її священників одружуватися."
  priest_marriage_not_allowed: "In Rito Romano"
  priest_marriage_not_allowed_desc: "Жодному священнику [GetInternationalOrganization('catholic_church').GetName] не дозволено одружуватися."
  priest_marriage_partially_allowed: "Non in Solo Pane"
  priest_marriage_partially_allowed_desc: "Священникам дозволено одружуватися, але їм не дозволено займати посади в курії."
  priest_marriage_allowed: "Qualis est Pastor"
  priest_marriage_allowed_desc: "Усім священникам дозволено одружуватися."
  enact_papal_bull: "Вартість ухвалення Папської булли"
  revoke_papal_bull: "Вартість скасування Папської булли"
  CHRISTIAN_GOD: "Бог"
  JUDAISM_GOD: "Ягве"
  MUSLIM_GOD: "Аллах"
  god_desc: "Бог — це головне божество у певній релігії. Хоча деякі релігії можуть мати багато богів і шанувати їх більш-менш однаково, інші можуть зосереджувати свою віру на одному конкретному, тоді як ще інші можуть заперечувати існування інших богів, окрім своїх власних."
  inti: "Інті"
  inti_ADJ: "Інті"
  inti_desc: "$inti_god$, разом із $viracocha$, є головними богами, які ведуть і захищають народ $andes_region$"
  inti_god: "Інті"
  inti_god_desc: "[ShowGodName('inti_god')] є богом сонця народу [ShowRegionName('andes_region')]."
  viracocha: "Віракоча"
  tunupa_god: "Тунупа"
  viracocha_desc: "[ShowGodName('viracocha')] є богом-творцем народу [ShowRegionName('andes_region')]."
  illapa_god: "Ільяпа"
  illapa_god_desc: "[ShowGodName('illapa_god')] є богом дощу та грому народу [ShowRegionName('andes_region')]."
  mamaquilla: "Мамакілья"
  mamaquilla_desc: "[ShowGodName('mamaquilla')] є богинею місяця народу [ShowRegionName('andes_region')]."
  pachamama: "Пачамама"
  pachamama_desc: "[ShowGodName('pachamama')] є Матір'ю-Землею народу [ShowRegionName('andes_region')]."
  mama_cocha: "Мама Куча"
  mama_cocha_desc: "[ShowGodName('mama_cocha')] є богинею моря народу [ShowRegionName('andes_region')]."
  urpihuachac_god: "Урпіуачак"
  urpihuachac_god_desc: "[ShowGodName('urpihuachac_god')] є матір'ю птахів та риб для народу [ShowRegionName('andes_region')]."
  odin_god: "Одін"
  odin_god_desc: "$odin_god$ є Владикою Асів, який пожертвував одним оком заради мудрості та висів на Світовому Дереві дев'ять днів і дев'ять ночей, щоб здобути знання рун."
  worship_odin_god: "$worship_title1$ $odin_god$ $worship_title2$"
  worship_odin_god_desc: "$worship_desc1$ [ShowGodName('odin_god')] $worship_desc2$"
  tor_god: "Тор"
  tor_god_desc: "$tor_god$ є членом Асів, якому поклоняються як Богу грому, штормів, захисту та вільних людей."
  worship_tor_god: "$worship_title1$ $tor_god$ $worship_title2$"
  worship_tor_god_desc: "$worship_desc1$ [ShowGodName('tor_god')] $worship_desc2$"
  tyr_god: "Тюр"
  tyr_god_desc: "$tyr_god$ є членом Асів, годувальником вовків та богом битв."
  worship_tyr_god: "$worship_title1$ $tyr_god$ $worship_title2$"
  worship_tyr_god_desc: "$worship_desc1$ [ShowGodName('tyr_god')] $worship_desc2$"
  njord_god: "Ньйорд"
  njord_god_desc: "$njord_god$ є з ванів, батько $freyr_god$ та $freya_god$. Йому поклоняються у зв'язку з мореплавством та рибальством."
  worship_njord_god: "$worship_title1$ $njord_god$ $worship_title2$"
  worship_njord_god_desc: "$worship_desc1$ [ShowGodName('njord_god')] $worship_desc2$"
  freyr_god: "Фрейр"
  freyr_god_desc: "$freyr_god$ належить до ванів, і йому поклоняються за добрий урожай, задоволення та мир."
  worship_freyr_god: "$worship_title1$ $freyr_god$ $worship_title2$"
  worship_freyr_god_desc: "$worship_desc1$ [ShowGodName('freyr_god')] $worship_desc2$"
  freya_god: "Фрейя"
  freya_god_desc: "$freya_god$ належить до ванів, і їй поклоняються як Богині кохання, краси, родючості та сейдру."
  worship_freya_god: "$worship_title1$ $freya_god$ $worship_title2$"
  worship_freya_god_desc: "$worship_desc1$ [ShowGodName('freya_god')] $worship_desc2$"
  uscovilca_god: "Усковілка"
  uscovilca_god_desc: "[ShowGodName('uscovilca_god')] є богом-творцем народу [ShowCultureName('chanka_culture')]."
  chinchaycamac_god: "Чінчайкамак"
  chinchaycamac_god_desc: "[ShowGodName('chinchaycamac_god')] є головним богом народу [ShowCultureName('chincha_culture')]."
  tlaloc_god: "Тлалок"
  dzahui_god: "Дзауї"
  chaac_god: "Чаак"
  tlaloc_god_desc: "[ShowGodName('tlaloc_god')] є богом дощу месоамериканського пантеону."
  huitzilopochtli_god: "Уїцилопочтлі"
  huitzilopochtli_god_desc: "[ShowGodName('huitzilopochtli_god')] є сонячним божеством та божеством війни і жертвоприношень для народу [ShowLocationName('tenochtitlan')]."
  quetzalcoatl_god: "Кетцалькоатль"
  kukulkan_god: "K'uk'ulkan"
  quetzalcoatl_god_desc: "[ShowGodName('quetzalcoatl_god')] є богом життя, вітру та мудрості у мезоамериканському пантеоні."
  tezcatlipoca_god: "Tēzcatlīpohca"
  tezcatlipoca_god_desc: "[ShowGodName('tezcatlipoca_god')] є богом провидіння, невидимого та темряви у мезоамериканському пантеоні."
  xiuhtecuhtli_god: "Xiuhtēcuhtli"
  kawiil_god: "K'awiil"
  huehueteotl_god: "Huehuetéotl"
  xiuhtecuhtli_god_desc: "[ShowGodName('xiuhtecuhtli_god')] є богом вогню у мезоамериканському пантеоні."
  coatlicue_god: "Cōātlīcue"
  coatlicue_god_desc: "[ShowGodName('coatlicue_god')] є богинею родючості у мезоамериканському пантеоні."
  ganesha_god: "Gaṇeśa"
  ganesha_god_desc: "$ganesha_god$ є видатним [Concept('god', 'CONCEPT_PLACEHOLDER')|e] у [ShowReligionName('hindu')], зазвичай зображується зі слонячою головою та шанується як той, хто приносить удачу та мудрість."
  shiva_god: "Śiva"
  shiva_god_desc: "$shiva_god$ є одним з головних [Concept('gods', 'CONCEPT_PLACEHOLDER')|e] у [ShowReligionName('hindu')] та верховною істотою у [ShowPolicyName('shaivism')]. Він є покровителем аскетизму та йоги."
  shakti_god: "Śakti"
  shakti_god_desc: "$shakti_god$ є видатна [Concept('goddess', 'CONCEPT_PLACEHOLDER')|e] у [ShowReligionName('hindu')], шанується як фундаментальна космічна енергія. Їй поклоняються як верховній [goddess] або Деві у [ShowPolicyName('shaktism')], і багатьом іншим [goddesses] поклоняються як різним аспектам $shakti_god$. Деякі з них можуть навіть самі приймати багато інших форм."
  vishnu_god: "Viṣṇu"
  vishnu_god_desc: "$vishnu_god$ є одним з головних [Concept('gods', 'CONCEPT_PLACEHOLDER')|e] у [ShowReligionName('hindu')] та головним у [ShowPolicyName('vaishnavism')]. Він вважається верховною істотою, що проявляє себе на землі у формі своїх десяти [Concept('avatars', 'CONCEPT_PLACEHOLDER')|e]."
  surya_god: "Sūrya"
  surya_god_desc: "$surya_god$ є богинею Сонця у [ShowReligionName('hindu')] та однією з головних богинь [ShowPolicyName('smartism')]."
  samkhya_school: "Sāṃkhya"
  samkhya_school_desc: "Дуже впливова для інших шкіл [ShowCultureGroupName('indian_group')] філософії, $samkhya_school$ є дуалістичною школою, заснованою на раціональності. Вона припускає, що світ складається як з матерії, так і з духу, і що знання можна отримати лише через сприйняття та раціональне виведення."
  yoga_school: "Yoga"
  yoga_school_desc: "Багато в чому схожа на школу $samkhya_school$, $yoga_school$ також розглядає всесвіт як дуальність, а сприйняття та раціональність як способи отримання знань. Однак вона додає, що систематична практика та експерименти також необхідні для досягнення знань та звільнення."
  nyaya_school: "Nyāya"
  nyaya_school_desc: "$nyaya_school$ є реалістичною школою, що зосереджується на методології та логіці як засобах здобуття знань. Вона стверджує, що наші страждання спричинені помилками через неправильні знання, і що визволення буде здобуто за допомогою правильних знань."
  vaisheshika_school: "Vaiśeṣika"
  vaisheshika_school_desc: "$vaisheshika_school$ є натуралістичною, атомістичною школою, яка стверджує, що весь фізичний всесвіт утворений атомами, і що весь наш досвід походить від агрегацій та взаємодій таких атомів. Повне розуміння світу досвіду, таким чином, є тим, що приводить нас до знання."
  mimamsa_school: "Mīmāṃsā"
  mimamsa_school_desc: "$mimamsa_school$ зосереджується на методології інтерпретації та критичного пояснення текстів. Як така, вона має більший акцент на філології, філософії мов та лінгвістичному аналізі."
  vedanta_school: "Vedānta"
  vedanta_school_desc: "Дуже впливова та різноманітна школа, $vedanta_school$ зосереджується на вивченні Вед, стверджуючи, що вони є головним джерелом знань, аргументуючи, що духовні питання знаходяться поза будь-яким сприйняттям та висновками людей."
  matsya_avatar: "Matsya"
  matsya_avatar_desc: "$matsya_avatar$ є першим [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], представленим у вигляді риби. Вважається, що він захищає від повеней та водних тварин."
  kurma_avatar: "Kurma"
  kurma_avatar_desc: "$kurma_avatar$ є другим [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], представленим у вигляді черепахи. Його ототожнюють зі Світовою Черепахою, що підтримує світ на своєму панцирі, і шанують за його стійкість та непохитність."
  varaha_avatar: "Varāha"
  varaha_avatar_desc: "$varaha_avatar$ є третім [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], представленим у вигляді вепра. Його шанують за те, що він підняв Землю з моря і приніс порядок із хаосу."
  narasimha_avatar: "Narasiṃha"
  narasimha_avatar_desc: "$narasimha_avatar$ є четвертим [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], представленим у вигляді лева. Його шанують як руйнівника зла та захисника від переслідувань."
  vamana_avatar: "Vāmana"
  vamana_avatar_desc: "$vamana_avatar$ є п'ятим [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], представленим у вигляді карлика. Його шанують за перемогу над узурпатором Балі та повернення правління Небесами Індрі."
  parashurama_avatar: "Paraśurāma"
  parashurama_avatar_desc: "$parashurama_avatar$ є шостим [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], представленим у вигляді воїна. Його шанують за боротьбу проти тиранічних та гноблячих царів."
  rama_avatar: "Rāma"
  rama_avatar_desc: "$rama_avatar$ є сьомим [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], і одним з найпопулярніших. Він є принцом, що виступає центральною фігурою епосу $ramayana$, і вважається втіленням рис ідеальної людини та найкращим послідовником Дхарми."
  krishna_avatar: "Kṛṣṇa"
  krishna_avatar_desc: "$krishna_avatar$ є восьмим [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], і одним з найбільш шанованих серед усіх [ShowReligionName('hindu')]. Він є богом співчуття, захисту та любові."
  buddha_avatar: "Buddha"
  buddha_avatar_desc: "Сіддхартха Гаутама, історичний Будда, вважається дев'ятим [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')] у [ShowReligionName('hindu')]. Його шанують за обман Асурів своїми вченнями та змушення їх відмовитися від Дхарми, тим самим забезпечуючи перемогу Девів."
  kalki_avatar: "Калкі"
  kalki_avatar_desc: "$kalki_avatar$ є десятим і останнім [Concept('avatar', 'CONCEPT_PLACEHOLDER')|e] [ShowGodName('vishnu_god')], пророкованим прийти, щоб покласти край Калі-Юзі, поточному періоду розпусти в нескінченному циклі існування. Його прибуття ознаменує оновлення світу, усунувши з нього всю неправедність."
  shakti_common_desc: "є головною [Concept('goddess', 'CONCEPT_PLACEHOLDER')|e] в [ShowReligionName('hindu')] і одним з головних аспектів Деві або [ShowGodName('shakti_god')] в [ShowPolicyName('shaktism')]. Вона уособлює"
  durga_avatar: "Дурга"
  durga_avatar_desc: "$durga_avatar$ $shakti_common_desc$ силу, материнство та захист водночас із руйнуванням та війнами."
  kali_avatar: "Калі"
  kali_avatar_desc: "$kali_avatar$ $shakti_common_desc$ час, творіння, силу, руйнування та смерть. Шанована як винищувачка зла, її найвизначнішою рисою є висунутий червоний язик."
  parvati_avatar: "Парваті"
  parvati_avatar_desc: "$parvati_avatar$ $shakti_common_desc$ любов, красу, родючість та материнство. Вона також є дружиною [ShowGodName('shiva_god')]."
  lakshmi_avatar: "Лакшмі"
  lakshmi_avatar_desc: "$lakshmi_avatar$ $shakti_common_desc$ багатство, процвітання, удачу та достаток. Її поява у вигляді восьми проявів уособлює вісім джерел багатства. Вона також є дружиною [ShowGodName('vishnu_god')]."
  saraswati_avatar: "Сарасваті"
  saraswati_avatar_desc: "$saraswati_avatar$ $shakti_common_desc$ знання, мистецтво, мудрість та навчання. Вона є дружиною Брахми, [Concept('god', 'CONCEPT_PLACEHOLDER')|e] творіння."
  chhinnamasta_avatar: "Чіннамаста"
  chhinnamasta_avatar_desc: "$chhinnamasta_avatar$ $shakti_common_desc$ суперечності, самопожертву, смерть, а також безсмертя та самореалізацію. Вона зображена оголеною та обезголовленою на вершині копулюючої пари."
  chandi_avatar: "Чанді"
  chandi_avatar_desc: "$chandi_avatar$ $shakti_common_desc$ руйнівну силу проти зла."
  tripura_sundari_avatar: "Тріпура Сундарі"
  tripura_sundari_avatar_desc: "$tripura_sundari_avatar$ $shakti_common_desc$ найвищу сутність [ShowGodNameWithNoTooltip('shakti_god')], кінцеву енергію всесвіту та найвищу свідомість."
  bhuvaneshvari_avatar: "Бхуванешварі"
  bhuvaneshvari_avatar_desc: "$bhuvaneshvari_avatar$ $shakti_common_desc$ Деві як Світову Матір."
  tara_avatar: "Тара"
  tara_avatar_desc: "$tara_avatar$ $shakti_common_desc$ лютий аспект Деві, схожий на [ShowAvatarName('kali_avatar')], але як провідник і захисник."
  hindu_branch_spec: "Традиція"
  hindu_branch_spec_desc: "Конкретні традиції та вірування, яких дотримується ця [Concept('hindu_branch', 'CONCEPT_PLACEHOLDER')|e]."
  vaishnavism: "Вайшнавізм"
  vaishnavism_desc: "$vaishnavism$ — це [Concept('hindu_branch', 'CONCEPT_PLACEHOLDER')|e], зосереджений на поклонінні [ShowGodName('vishnu_god')] та його десяти [Concept('avatars', 'CONCEPT_PLACEHOLDER')|e]."
  shaivism: "Шиваїзм"
  shaivism_desc: "$shaivism$ — це [Concept('hindu_branch', 'CONCEPT_PLACEHOLDER')|e], що шанує [ShowGodName('shiva_god')] як верховного [Concept('god', 'CONCEPT_PLACEHOLDER')|e]. Це [hindu_branch], більш зосереджений на аскетизмі та йозі."
  shaktism: "Шактизм"
  shaktism_desc: "$shaktism$ — це [Concept('hindu_branch', 'CONCEPT_PLACEHOLDER')|e], зосереджений на поклонінні Богині-Матері, відомій як Деві або [ShowGodName('shakti_god')], представленій та шанованій у багатьох її різних формах."
  smartism: "Смартизм"
  smartism_desc: "$smartism$ — це [Concept('hindu_branch', 'CONCEPT_PLACEHOLDER')|e], який не вважає жодного [Concept('god', 'CONCEPT_PLACEHOLDER')|e] вищим за іншого, і натомість однаково поклоняється п'яти [gods] [ShowGodName('ganesha_god')], [ShowGodName('shiva_god')], [ShowGodName('shakti_god')], [ShowGodName('vishnu_god')] та [ShowGodName('surya_god')]."
  dummy_1: "Заповнювач 1"
  dummy_2: "Заповнювач 2"
  dummy_3: "Заповнювач 3"
  dummy_4: "Заповнювач 4"
  dummy_5: "Заповнювач 5"
  mula_sangh_school: "Мула Сангха"
  mula_sangh_school_desc: "Означає «корінь», це стосується початкових практик [ShowReligionName('jain')], що походять від Кундакунди, [ShowReligionAdjectiveWithNoTooltip('jain')] ченця другого століття, який написав багато текстів з [ShowReligionAdjectiveWithNoTooltip('jain')] філософії, і найважливішого вчителя для дигамбарів [ShowReligionNameWithNoTooltip('jain')]."
  balatkara_gana_school: "Балаткара Гана"
  balatkara_gana_school_desc: "Секція [ShowReligiousSchoolName('mula_sangh_school')], чернечий орден $balatkara_gana_school$ [ShowReligionName('jain')] виник у 8 столітті із засновником династії $STR_ADJ$. Таким чином, він є одним із найстаріших у [ShowReligionNameWithNoTooltip('jain')]."
  kashtha_sangha_school: "Каштха Сангха"
  kashtha_sangha_school_desc: "Видатна [ShowReligionAdjective('jain')] дигамбарська чернеча школа по всій Північній та Західній $india$, що виникла з Лохачар'ї, тобто Судхармасвамі. Він був п'ятим учнем Махавіри, 24-го (і останнього) Тіртханкари."
  upkesa_gaccha_school: "Упкеша Гачча"
  upkesa_gaccha_school_desc: "Найстаріший чернечий орден шветамбарів [ShowReligionName('jain')], він слідує лінії Паранати, 23-го Тіртханкари, на відміну від більшості інших шкіл, які слідують лінії Махавіри."
  kharatara_gaccha_school: "Харатара Гачча"
  kharatara_gaccha_school_desc: "Також називається #italic Відхісангха#! або #italic Відхімарга#!, що означає «Збори» та «Шлях правильної поведінки» відповідно, це шветамбарський чернечий орден, який вважає власні практики єдиними духовно правильними. Він заохочує суворе дотримання чистоти та релігійної доктрини та писань без відхилень."
  tapa_gaccha_school: "Тапа Гачча"
  tapa_gaccha_school_desc: "Заснований Ачар'єю Джагатчандрою Сурі, якого називали «Медитативним», це шветамбарський чернечий орден, який заохочує шанування релігійних діячів та паломництво до святих храмів."
  tristutik_gaccha_school: "Tristutik Gaccha"
  tristutik_gaccha_school_desc: "Також відомий як Agama Gaccha, це чернечий орден Шветамбара, що зосереджується на відданості та шануванні Тіртханкари у своїх ритуалах, вважаючи їх єдиними гідними поклоніння."
  worship_title1: "Поклоніння"
  worship_title2: "як наш Бог-Покровитель"
  worship_desc1: "Ми надаємо пріоритет поклонінню та обожнюванню"
  worship_desc2: "як наш покровитель та захисник."
