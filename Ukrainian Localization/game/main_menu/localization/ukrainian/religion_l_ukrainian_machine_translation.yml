  hanafi_school: "Ханіфі"
  hanafi_school_desc: "Мазхаб $hanafi_school$ названо на честь Абу Ханіфи ан-Ну'мана ібн Табіта. Школа виникла в Куфі та є поширеною в усьому [ShowCultureName('farsi_culture')] та [ShowCultureGroupName('turkic_group')] світі, включно з північною $india$. Хоча текстовим джерелам у $common_string_quran$ та Хадісах надається перевага, послідовники $hanafi_school$ мають інклюзивний погляд на джерела, а також застосовують аналогію (Кіяc), юридичну розсудливість (Істіхсан) та місцеві звичаї ('Урф) у своїй юриспруденції. Деякі вважають її найгнучкішою зі шкіл."
  hanbali_school: "Ḥanbalī"
  hanbali_school_desc: "Мазгаб $hanbali_school$ названий на честь Ахмада ібн Ханбала та виступає за утримання від будь-якої спекулятивної теології, Каламу. Послідовники $hanbali_school$ стверджують, що $common_string_quran$ і Сунна є єдиними належними джерелами юриспруденції, і що їх слід інтерпретувати в буквальному та традиціоналістському сенсі. Хоча він прийнятий як дійсний мазгаб, дуже мало держав активно просувають школу $hanbali_school$, і він був заборонений Аббасидськими халіфами."
  maliki_school: "Mālikī"
  maliki_school_desc: "Мазгаб $maliki_school$ названий на честь Маліка ібн Анаса і особливо поширений у [ShowSubContinentName('north_africa')] та [ShowRegionName('iberia_region')]. Юриспруденція ґрунтується переважно на працях та інтерпретаціях ібн Анаса та його учня Сахнуна, описаних в аль-Муватта' та Мудаввана. Одним з найвидатніших центрів навчання в школі $maliki_school$ є Велика мечеть Аль-Кайраван, поблизу [ShowLocationName('tunis')]."
  shafii_school: "Shāfi'ī"
  shafii_school_desc: "Мазгаб $shafii_school$ названий на честь імама Аль-Шафі'ї і особливо поширений серед [ShowReligionGroupAdjective('muslim')] вірян у [ShowRegionName('arabia_region')], [ShowSubContinentName('east_africa')] та Східній [ShowContinentName('asia')]. На відміну від інших мазгабів, $shafii_school$ відкидає Істіхсан та Істіслах як джерела $sharia$, натомість покладаючись лише на те, що текстуально міститься в $common_string_quran$ або Хадісі."
  zahiri_school: "Ẓāhirī"
  zahiri_school_desc: "Школа $zahiri_school$ виступає за суворе дотримання тексту $common_string_quran$ і зосереджується на його зовнішньому або очевидному значенні. Згідно з ними, не може бути жодного висновку, зробленого з читання текстів, який не міститься в самих текстах, інакше $muslim_god_name$ вже висловив би їх явно."
  ashari_school: "Ash'arī"
  ashari_school_desc: "Школа теології $ashari_school$ зосереджена на авторитеті священних писань та раціоналізмі, і була заснована в IX столітті Абу аль-Хасаном аль-Ашарі. Його вчення про те, що весь всесвіт складається з атомів, стало основою пропозиції школи $ashari_school$ про те, що вся матерія і час були створені $muslim_god_name$, вірячи водночас у свободу волі та приречення."
  maturidi_school: "Māturīdī"
  maturidi_school_desc: "Школа теології $maturidi_school$, що отримала назву від Абу Мансура аль-Матуріді, є [ShowReligionAdjective('sunni')] школою теології, що виникла з теологічних переконань школи юриспруденції $hanafi_school$. Вона пропагує раціональну інтерпретацію священних писань та важливість віри над вчинками однієї людини."
  athari_school: "Aṯarī"
  athari_school_desc: "Школа теології $athari_school$ відкидає раціональну інтерпретацію священних писань на користь суворішого читання текстів $common_string_quran$ та Хадісу, вважаючи їх єдиними авторитетами. Будучи проти будь-якої форми релігійних інновацій, вона відмовляється від будь-якої раціональності, що не ґрунтується на текстах $common_string_quran$."
  mutazili_school: "Mu'tazilī"
  mutazili_school_desc: "Школа теології $mutazili_school$ розвинулася під впливом грецької та індійської філософії та раціоналізму. Вона відкидає уявлення про те, що $common_string_quran$ і $muslim_god_name$ співіснують, висловлюючи, що священне писання логічно повинно з'явитися після творця. Вона захищає розум, доки він служить людям для розуміння релігійних питань, і підтримує, що зло походить від помилок людства через їхню свободу волі."
  wahhabi_school: "Wahhābī"
  wahhabi_school_desc: "Виникнувши зі школи [ShowReligiousSchoolName('hanbali_school')] як рух відродження, школа теології $wahhabi_school$ виступає проти поширених суфійських практик, таких як вшанування святих людей та паломництва до їхніх святинь. Вона заохочує повернення до первісної побожності та практик перших поколінь [ShowReligionGroupName('muslim')]."
  ismaili_school: "Ismā'īlī"
  ismaili_school_desc: "Мазгаб $ismaili_school$ названий на честь Ісмаїла ібн Джафара, наступника Джафара ас-Садіка, і був домінуючою школою віри в Фатимідському халіфаті, але значно втратив позиції після його падіння. Школа $ismaili_school$ охоплює низку дедалі більш розбіжних гілок, і в багатьох аспектах вони зосереджуються на езотеричних елементах [ShowReligionAdjective('shia')] віри більше, ніж [ShowReligiousSchoolName('jafari_school')] або [ShowReligiousSchoolName('zaidi_school')]."
  jafari_school: "Ja'farī"
  jafari_school_desc: "Мазгаб $jafari_school$ названий на честь Джафара ас-Садіка, шостого імама, і зосереджується на незалежному міркуванні експертів ісламського права, віддаючи перевагу цьому над аналогією при встановленні Закону. Він також дозволяє тимчасовий шлюб, що триває заздалегідь визначений період часу."
  zaidi_school: "Zaydī"
  zaidi_school_desc: "Також називається «П'ятірники», течія $zaidi_school$ названа на честь Зайда ібн Алі, онука сина Мухаммада Алі, і дотримується його вчень, описаних у Маджму аль-Фікх. Послідовники $zaidi_school$ наголошують на справедливості та людській відповідальності та походять від тих, хто підтримав первісне повстання Зайда проти Омеядського халіфа. Люди $zaidi_school$ повністю відкидають релігійне приховування, яке практикують багато [ShowReligionAdjective('shia')] послідовників, і це найбільш схоже на [ShowReligionName('sunni')]."
  imamiya_school: "Імамія"
  imamiya_school_desc: "Також відомі як «Дванадесятники», $imamiya_school$ вірять, що Алі, наступник Мухаммада, мав дванадцять безгрішних імамів, обраних божественним указом. Останній імам, аль-Махді, має повернутися як рятівник людства, остаточно встановивши справедливість і мир у світі. Вони переважно дотримуються юриспруденції [ShowReligiousSchoolName('jafari_school')]."
  nizari_school: "Нізарі"
  nizari_school_desc: "$nizari_school$ стверджують, що Нізар ібн аль-Мустансір був справжнім наступником Фатімідського халіфату після смерті свого батька, і виступають проти перевороту аль-Афдала Шаханшаха, який посадив на трон Аль-Муста'лі бі'ллаха. Спочатку відколовшись від [ShowReligiousSchoolName('ismaili_school')], вони здобули прихильників з багатьох інших гілок і дотримуються юриспруденції [ShowReligiousSchoolName('jafari_school')], зосереджуючись на плюралізмі та прийнятті відмінностей."
  mustali_school: "Муста'лі"
  mustali_school_desc: "$mustali_school$ виступають проти [ShowReligiousSchoolName('nizari_school')] тим, що вони приймають сходження Аль-Муста'лі бі'ллаха на трон Фатімідського халіфату. Хоча вони походять з [ShowRegionName('egypt_region')], пізніше вони поширилися на Західну $india$ завдяки місіонерській діяльності."
  alevism_school: "Алевізм"
  alevism_school_desc: "Дотримуючись вчень Хаджі Бекташа Валі, $alevism_school$ є синкретичною містичною школою, що виникла зі школи [ShowReligiousSchoolName('imamiya_school')], але включає традиції [ShowReligionName('tengri')] та старіші [ShowCultureGroupName('turkic_group')] вірування. Вона також переймає деякі аспекти суфізму, такі як присутність духовного лідера та містичні практики."
  alawi_school: "Алаві"
  alawi_school_desc: "$alawi_school$, також відомі як Нусайрі, проголошують Алі ібн Абі Таліба, першого імама згідно з [ShowReligionAdjective('shia')] віруваннями, проявом Самого $muslim_god_name$. Вони суттєво відрізняються від решти [ShowReligionAdjective('shia')] віри як у ритуалах, так і в теології, вірячи в реінкарнацію та дозволяючи вживання алкоголю."
  ibadi_school: "Ібаді"
  ibadi_school_desc: "Вважається, що вони є нащадками Аль-Хаварідж, які спочатку були прихильниками Алі ібн Абі Таліба, але пізніше відкинули його арбітраж. Школа $ibadi_school$ відмежувалася від Аль-Хаварідж, слідуючи за Абд Аллахом ібн Ібадом, прийнявши більш поміркований підхід і більш позитивний погляд на різні $muslim_ADJ$ гілки, маючи схожість з багатьма іншими школами."
  bektashi_school: "Бекташі"
  bektashi_school_desc: "Названа на честь Хаджі Бекташа Валі, який, як вважається, є нащадком Алі ібн Абі Таліба, $bektashi_school$ суфізму, тим не менш, поважає всіх сподвижників Мухаммада. Хоча вона походить з [ShowReligionAdjective('sunni')] віри, вона містить багато вірувань і практик, присутніх також в інших традиціях, що надає їй багато схожості з ними."
  chishti_school: "Чишті"
  chishti_school_desc: "Походячи з [ShowLocationName('chishti_sarif')], $chishti_school$ відкидає світську владу та пропагує толерантність і любов. Вона також пропагує музику та поезію як форму зв'язку з любов'ю до $muslim_god_name$."
  khalwati_school: "Халваті"
  khalwati_school_desc: "$khalwati_school$ отримала свою назву від акту усамітнення для духовних вправ на самоті. Таким чином, вона підкреслює індивідуальні ритуальні та духовні практики, а також усамітнення та аскетизм."
  mevlevi_school: "Мевлеві"
  mevlevi_school_desc: "Відома своїми кружляючими дервішами, $mevlevi_school$ сформована на вченнях Джалала ад-Діна Мухаммада Румі. Вона проголошує любов центральною для [ShowReligionGroupName('muslim')], а також підкреслює Сему, церемонію рухової медитації, що виконується шляхом кружляння."
  naqshbandi_school: "Накшбанді"
  naqshbandi_school_desc: "Простежуючи своє походження до Джафара ібн Мухаммада аль-Садіка, $naqshbandi_school$ надає більшого значення $sharia$, ніж інші споріднені школи. Її практики організовані навколо беззвучного заклику та свідомості."
  qadiri_school: "Кадірі"
  qadiri_school_desc: "Заснована Абдулкадіром Гілані, $qadiri_school$ пропагує суворе дотримання [ShowReligionAdjective('sunni')] закону. Вона також має децентралізоване керівництво, що дозволяє кожному з її центрів свободу інтерпретації та практики, що призвело до її диференціації на кілька гілок."
  safavid_school: "Сафаві"
  safavid_school_desc: "Заснована Сафі ад-Діном Ісхаком Ардабілі на вченнях [ShowReligiousSchoolName('shafii_school')], $safavid_school$ пізніше наблизилася до думки [ShowReligiousSchoolName('imamiya_school')]. Її завзяття та сила віри роблять її послідовників впевненими у своєму місці у всесвіті."
  shadhili_school: "POSTEDIT_Шазілі"
  shadhili_school_desc: "Наслідуючи вчення Абу аль-Хасана аль-Шазілі, школа $shadhili_school$ пропагує життя споглядання та постійної пам'яті про $muslim_god_name$, навіть під час звичайних повсякденних справ. Застосування вчень [ShowReligionGroupName('muslim')] до власного життя послідовників є ключем до трансформації їхнього існування."
  suhrawardi_school: "POSTEDIT_Сухраварді"
  suhrawardi_school_desc: "Школа $suhrawardi_school$ слідує вченням Абу аль-Наджіба Абд аль-Кадіра Сухраварді, але також перебуває під впливом філософії Джунайда з [ShowLocationName('baghdad')]. Вона стверджує, що люди повинні присвятити себе істинному знанню та вірності $muslim_god_name$, відмовляючись від природних бажань на користь духовних потреб."
  din_i_ilahi_school: "Дін-і Ілахі"
  din_i_ilahi_school_desc: "Перейнята з монгольського кодексу, школа $din_i_ilahi_school$ розглядає всі релігії як різні секти, дозволяючи свободу думки в межах володіння."
  isawiyya_school: "POSTEDIT_Ісаві"
  isawiyya_school_desc: "Вважається наймістичнішою з релігійних шкіл, школа $isawiyya_school$ бере свій початок із земель [ShowRegionName('maghreb_region')], чия спадщина псалмів і молитов розвинулася в ритуали з танцями та музикою."
  imperial_court: "Імператорський двір"
  imperial_court_desc: "Імператорський двір складається з членів Імператорської родини та супроводжуючих Куґе, або шляхетних родин. Вони зберігають недоторканність Імператора та забезпечують спадкоємність."
  shogunate_court: "Двір Сьоґунату"
  shogunate_court_desc: "Могутні члени самурайського клану, що оточують Сьоґуна, будуть радниками у всіх справах, але ніколи повністю не відмовляться від власних інтересів."
  ikko_ikki: "Ікко-іккі"
  ikko_ikki_desc: "Фанатичні послідовники $SECT_JOUDO_SHINSHUU$ зі школи $SECT_PURE_LAND_SCHOOL_NAME$ $buddhist$ організувалися в різні ліги, що називаються $ikko_ikki$, і, хоча переважно складаються з селян, їхні постійні вимоги та повстання починають бути більше ніж просто неприємністю."
  religious_sects: "Релігійні секти"
  religious_sects_desc: "Завжди існували різні шляхи слідування Будді, і навіть серед Камі є варіації в їхніх історіях. Кожна секта завжди намагатиметься переконати інших слідувати їхнім шляхом, але всі вони можуть виявитися корисними."
  kirishitan_monks: "Кірішітанські ченці"
  kirishitan_monks_desc: "Відколи західняки прибули до наших берегів, вони принесли з собою свою чужу релігію, з цим новим Буддою, якого вони називають Ісусом. Доки ми хочемо взаємодіяти з ними, ми повинні дозволяти їхні вірування, але це також може бути користю для нас."
  TRUE_FAITH_TOLERANCE: "Толерантність до істинної віри"
  HERETIC_TOLERANCE: "Толерантність до єретиків"
  HEATHENRY_TOLERANCE: "Толерантність до язичників"
  doom.1.title: "Приреченість!"
  doom.1.desc: "Попри зусилля наших жерців, [ROOT.GetCountry.GetReligion.GetGodName], здається, незадоволені, і великі катастрофи насуваються на наше володіння. Якщо ми хочемо пережити кінець цього циклу і перейти в новий, більш процвітаючий, ми повинні бути готові пожертвувати всім, що потрібно. Боги чекають на наші криваві жертви."
  doom.1.a: "Пожертвувати правлячою родиною!"
  adopt_ometeotl: "Прийняти POSTEDIT_Ометеотль"
  adopt_ometeotl_desc: "Попри політеїстичну природу нашої релігії, серед наших найвищих класів поширене поклоніння унікальному всемогутньому Богу на ім'я #italic Ōmeteōtl#!. Цей Бог має якості всіх Богів, які є лише представленням цих якостей. Ми будемо поклонятися #italic Ōmeteōtl#! як єдиному Богу."
  elevate_patron_god: "Піднести нашого Бога-покровителя"
  elevate_patron_god_desc: "Кожне [ShowCultureName('nahua_culture')] володіння зазвичай поклоняється одному Богу понад іншими як своєму Богу-покровителю. Ми поставимо нашого Бога-покровителя не лише на вершину нашої відданості, а й як головного Бога нашої релігії."
  establish_cihuacoatl: "Заснувати посаду Cihuacōātl"
  establish_cihuacoatl_desc: "Ми заснуємо фігуру #italic Cihuacōātl#! (буквально 'Зміїна Жінка'), подібну до візира. Це допоможе нашим правителям керувати нашим володінням, доручивши #italic Cihuacōātl#! управління містом, щоб правитель міг займатися важливішими питаннями."
  expand_cuahpipiltin: "Розширити Cuāhpipiltin"
  expand_cuahpipiltin_desc: "Ми створимо нову касту в нашому суспільстві: #italic Cuāhpipiltin#! будуть шляхтою за службу, на противагу #italic Pīpiltin#!, шляхті за кров'ю. Їх висуватимуть з військової служби, а також інтегруватимуть з інших племен або васалів."
  increase_militarism: "Посилити мілітаризм"
  increase_militarism_desc: "Наші воїни забезпечують нас полоненими, яких можна використовувати для найважливіших жертвоприношень нашим богам. Ми повинні зробити наше суспільство більш мілітаристським, щоб посилити цей приплив полонених."
  institute_flower_wars: "Запровадити Квіткові війни"
  institute_flower_wars_desc: "Оскільки наше суспільство залежить від жертвоприношень, нам потрібен спосіб отримати їх більше. Запровадивши 'Квіткові війни', ми можемо домовитися з нашими сусідами про чесні бої, і обидві сторони зможуть приносити в жертву полонених, щоб умилостивити наших Богів."
  legal_reforms: "Правові реформи"
  legal_reforms_desc: "Хоча наші міста-держави мають свої кодифіковані правила, оскільки [ShowCultureName('nahua_culture')] суспільства змінюються, так само повинні змінюватися і наші правові кодекси. Ми розпочнемо серію реформ у наших правових кодексах, які краще адаптуються до наших нових потреб."
  raise_sacrifice_rate: "Підвищити частоту жертвоприношень"
  raise_sacrifice_rate_desc: "Наші Боги пожертвували свою кров за нас, людей, і ми маємо перед ними борг. Але кількості крові, схоже, недостатньо, щоб втамувати їхню спрагу. Ми збільшимо частоту та поширеність наших жертвоприношень, щоб кров наших Богів поповнювалася швидше."
  RELIGIOUS_FOCUS_NOT_IN_QUEUE: "Не в черзі досліджень"
  NOT_RELIGIOUS_FOCUS_QUEUED: "Немає [Concept('religious_focuses', 'CONCEPT_PLACEHOLDER')|e] у черзі"
  HAS_NOT_RELIGIOUS_FOCUS_QUEUED: "@trigger_no!Цей [Concept('religious_focuses', 'CONCEPT_PLACEHOLDER')|e] ще не в черзі"
  RELIGIOUS_FOCUS_ALREADY_SET: "@trigger_no!Цей [Concept('religious_focuses', 'CONCEPT_PLACEHOLDER')|e] у черзі"
  RELIGIOUS_FOCUS_RELIGION_HAS_NO_FOCUSES: "[Concept('RELIGION.GetName] не має [religious_focuses', 'CONCEPT_PLACEHOLDER')|e]."
