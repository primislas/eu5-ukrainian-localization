  muslim_scholar: "Вчений"
  muslim_scholar_desc: "Вчена особа, обізнана з [ShowReligionGroupAdjective('muslim')] Законом, вчені обговорюють принципи юриспруденції та теології [ShowReligionGroupNameWithNoTooltip('muslim')]."
  guru: "Гуру"
  guru_desc: "Людина, занурена в глибоку духовність і в пошуках шляху до просвітлення, $guru$ — це дуже побожна особа, яка не тільки виконує релігійні та духовні практики та вправи, але також готова навчати та служити духовним провідником."
  shinto_desc: "Різноманітний набір вірувань і практик, що оберталися навколо поклоніння Камі, які були присутні в $japan_region$ до приходу $buddhist$, нерозривно пов'язалися та змішалися з $buddhist_ADJ$ практиками та концепціями, коли $buddhist$ поширювався через $japan_region$. Камі та $buddhist_ADJ$ божества були ототожнені одне з одним, причому обидва набори вірувань стали функціонально нероздільними. Це породило особливо $japanese_group$ відтінок $buddhist$, змішаний з поклонінням Камі, що зазнало впливу $buddhist$."
  bon_desc: "Виникнувши з релігійних традицій $tibet_region$ до приходу $buddhist$, вона зазнала сильного впливу $tibetan_buddhism$. Вона особливо близька до $SECT_NYIGMA_NAME$, але все ще зберігає багато до-$buddhist$ елементів. Її вчення зосереджені на Кармі та переродженні, а також на шляхах досягнення просвітлення."
  mahayana_desc: "Названа «Великою Колісницею», Махаяна — це гілка $buddhist$, яка приймає не тільки ранні $buddhist_ADJ$ тексти, але й ті, що відомі як Махаяна $sutra$. Вона підкреслює фігуру $bodhisattva$, розуміючи шлях $bodhisattva$ як доступний для всіх спосіб досягнення Буддовості. Хоча спочатку вона розвивалася в $india$, більша частина її поширення відбулася через $china$ та Шовковий шлях, і $chinese_group$ Канон тепер становить основу всієї $mahayana$."
  theravada_desc: "Названа «Школою старійшин», вона дотримується найдавніших традицій $buddhist$. Вона відкидає Махаяна $sutra$ і, таким чином, багатьох $bodhisattva$ та сам шлях $bodhisattva$ як доступний для всіх. Натомість, вона зосереджується на чернечій громаді як на вищому способі досягнення просвітлення."
  sammitiya_desc: "Одна з багатьох гілок раннього $buddhist$ в $india$, $sammitiya$ розвинулася в $sindh_area$, ставши великим центром ранніх $buddhist_ADJ$ шкіл, навіть конкуруючи з Махаяна Наландою. Будучи найбільшим не-Махаяна $buddhist$ в $india$, вона була усунена зі свого видатного місця під час $muslim_ADJ$ вторгнень."
  tibetan_buddhism_desc: "Форма $buddhist$, що розвинулася вздовж і навколо гір Гімалаїв, виникла з традиції Махаяни, але включила багато езотеричних практик Ваджраяни через її тісний контакт з Індією та пізніші стадії розвитку $buddhist$ там."
  sanjiao_desc: "Названі «Три Вчення», це комбіноване поєднання та впливи $confucianism_policy$, $daoism_policy$ та $buddhist$. Будучи всі три присутні в $china$ протягом століть, а також впливаючи та зазнаючи впливу багатьох інших $chinese_group$ народних вірувань та божеств, вони не завжди були в гармонії між собою, але завжди були частиною $chinese_group$ способу життя."
  anglican_desc: "$anglican$ — це форма $christian$, у якій глава держави також є Верховним Правителем Церкви. Теологічно та інституційно $anglican$ зберігає багато елементів $catholic$, водночас перебуваючи під впливом реформованих пуритан та континентальних $lutheran_ADJ$ вірувань."
  bogomilism_desc: "Неогностична та дуалістична гілка $christian$, $bogomilism$ вчить, що існування розділене між духовним і матеріальним світами. Її послідовники розглядають свої тіла як священні храми і прагнуть наблизитися до Бога через ритуали очищення. Ці практики включають піст, танці та відмову від матеріальних надмірностей, щоб зосередитися на духовному зростанні."
  bosnian_church_desc: "Відколота секта $catholic_ADJ$ Церкви, $bosnian_church$ розвинула свою відмінну теологію через тривалу ізоляцію від основного християнства. Вона сильно зосереджувалася на апокаліптичних темах, приймала містицизм і зберігала багато архаїчних практик раннього $christian$. Ці риси призвели до того, що як $catholic_ADJ$, так і $orthodox_ADJ$ влада засудила її як єретичну."
  calvinist_desc: "Названий на честь Жана Кальвіна, $calvinist$ є значною гілкою протестантизму, що ґрунтується на принципах простоти в поклонінні та верховенства Святої Біблії. Його доктрина наголошує на приреченні, стверджуючи, що Бог заздалегідь визначив долю всього творіння."
  catharism_desc: "$catharism$ — це дуалістичний рух, який вірить в існування двох Богів: доброзичливого Бога Небес і його зловісного супротивника. Його прихильники ведуть аскетичний спосіб життя, вважаючи, що душі ув'язнені у фізичних тілах як частина космічної боротьби. Духовне очищення, досягнуте через сувору дисципліну, розглядається як єдиний шлях до спасіння."
  catholic_desc: "Вкорінений у Нікейському Символі Віри, $catholic$ є найбільшою деномінацією $christian$ і очолюється Папою, який служить духовним наступником Святого Петра. Папа виступає як глава Церкви, так і посередник у конфліктах між $christian_ADJ$ правителями. Його доктрина та традиції сформували значну частину релігійної та культурної історії Західного світу."
  hussite_desc: "Заснована Яном Гусом, $hussite_ADJ$ Церква виникла як протопротестантський рух у $BOH$, поєднуючи елементи $BYZ_ADJ$ обряду з вченнями Джона Вікліфа. Вона наголошувала на причасті під обома видами та важливості Писання над церковною традицією."
  lollardy_desc: "Очолюваний Джоном Вікліфом, $lollardy$ був реформаторським рухом, що виступав за загальне священство та відкидав необхідність таїнств, таких як хрещення та сповідь, для спасіння. Його вчення наголошувало на прямому доступі до Бога через Писання, яке було перекладено на народні мови. Це зробило його теологію доступною для простих людей і підживило ранні заклики до реформи Церкви."
  lutheran_desc: "Заснований на Дев'яноста п'яти тезах Мартіна Лютера, $lutheran$ розпочався як заклик до реформи $catholic_ADJ$ Церкви, але перетворився на окрему протестантську деномінацію. Він вчить, що Писання Старого та Нового Завітів є єдиним непогрішним авторитетом для $christian_ADJ$ доктрини."
  miaphysite_desc: "$miaphysite$ вчить, що в особі Христа Його божественна та людська природи об'єднані в єдину, неподільну природу. Ця доктрина, вкорінена в Ефеському соборі, широко поширилася в таких регіонах, як Вірменія, Єгипет та Ефіопія. $miaphysite_ADJ$ громади зберегли свої унікальні літургії та традиції, наголошуючи на єдності Христа як Бога і людини."
  nestorianism_desc: "$nestorianism$, названий на честь Несторія, вчить, що божественна та людська природи Христа є відмінними та існують поруч. Ця доктрина була відкинута Ефеським собором, але знайшла сильних послідовників у Персії та за її межами. Несторіанські християни поширили свою віру по всій $asia$, ставши найбільшою $christian_ADJ$ релігією за охопленою територією."
  orthodox_desc: "$orthodox_ADJ$ Церква, вкорінена в традиціях ранніх $christian_ADJ$ соборів, наголошує на безперервності апостольських вчень та священної традиції. Зосереджена на $BYZ_ADJ$ обряді, вона надає великого значення літургії, іконам та містицизму. $orthodox_ADJ$ віра очолюється патріархами, причому Вселенський Патріарх Константинопольський має першість честі."
  paulicianism_desc: "$paulicianism$ — це дуалістична $christian_ADJ$ секта, яка відкидає матеріальний світ як творіння злої сили. Її послідовники вважають, що лише духовний світ є чистим, і ґрунтують свої вірування на Новому Завіті, повністю відкидаючи Старий Завіт. Переслідуваний як $catholic_ADJ$, так і $orthodox_ADJ$ владою, $paulicianism_ADJ$ рух чинив опір асиміляції та надихнув пізніші реформаторські рухи."
  strigolniki_desc: "Виникнувши в середньовічному $russian_region$, $strigolniki$ є реформаторською сектою, що критикує встановлену $orthodox_ADJ$ Церкву. Вони засуджують корупцію священиків, продаж таїнств та накопичення багатства духовенством. Віддаючи перевагу простішій вірі, зосередженій на особистій побожності, $strigolniki_ADJ$ є мішенню для $orthodox_ADJ$ Церкви та державних органів."
  waldensian_desc: "Заснований Петром Вальдо, $waldensian$ — це реформаторський $christian_ADJ$ рух, що наголошує на простоті, бідності та авторитеті Писання. Вони відкидають багатство духовенства, шанування святих та необхідність таїнств для спасіння. Переслідувані як єретики, $waldensian_ADJ$ рух витримав століття гноблення, поширюючи своє послання по всій $europe$."
  hindu_desc: "Сукупність різних вірувань, а не єдина релігія, $hindu$ часто вважається найдавнішою релігійною традицією у світі. Всі її вірування та практики розуміються як пояснення $dharmic$, космічного порядку, вона походить з давньої ведичної літератури. Будучи такою різноманітною, вона також містить безліч богів, хоча не всі з них однаково шануються або навіть визнаються всіма $hindu_ADJ$ практиками, залежно від їхніх конкретних вірувань та орієнтацій. Чотири основні гілки $hindu$ — це $vaishnavism$, $shaktism$, $shaivism$ та $smartism$."
  jain_desc: "Одна з найдавніших релігій, $jain$ — це індійська $dharmic_ADJ$ релігія, що зосереджується на спробах самореалізації та звільнення від циклу смерті та переродження. Вона зосереджена на ненасильстві та аскетизмі через вчення #italic Tīrthaṅkara#!, верховних проповідників $dharma$, і розділена на школи Дігамбара та Шветамбара. Дігамбара, що означає «одягнений у небо», характеризується відмовою від прив'язаності та володіння матеріальними благами, тому її ченці не носять одягу, а її іконографія простіша. Шветамбара, з іншого боку, означає «одягнений у біле» через білий одяг її ченців, і має більшу рівність між чоловічими та жіночими ченцями, на відміну від більш орієнтованої на чоловіків Дігамбари."
  sikhism_desc: "Релігія, заснована на вченнях $character_title_guru$, походить від різноманітних $hindu_ADJ$ вірувань $india$ і включає багато впливів від $muslim$. Вона вірить в одного творця, $sikhism_god_name$, і в те, що потрібно поводитися чесно та самовіддано на благо всіх. Вона заохочує зв'язок з божественним через використання споглядання та медитації, а також декламації та музики як способів усвідомлення присутності Бога."
  druzism_desc: "Хоча $druzism_ADJ$ люди походять з $ismaili_school$, вони не вважають себе $muslim_ADJ$. Окрім очевидного впливу $muslim$, вони також зазнають впливу інших авраамічних та неавраамічних релігій, що призводить до виникнення відмінної віри з акцентом на езотеризм та Космічний Розум, з яким усі душі возз'єднуються після багатьох реінкарнацій."
  judaism_desc: "Оригінальна авраамічна віра, $judaism$ дотримується завіту, укладеного між Богом і Мойсеєм. $judaism_ADJ$ Біблія — це Танах, перші п'ять книг якого відомі як Тора, що служить основою всієї $judaism_ADJ$ віри та практики."
  samaritanism_desc: "Традиційна віра $samaritan_culture$, вона виникла з $judaism$ після падіння Ізраїльського царства. $samaritanism$ вважає себе незмінною вірою $israelite_group$ народу з часів Мойсея, на відміну від того, що вони вважають спотворенням писань $judaism$."
  mandeaism_desc: "Гностична релігія, що вважає Івана Хрестителя останнім пророком, $mandeaism$ також включає $greek_culture$ та $iranian_group$ впливи. Хоча вона вважає такими деяких пророків інших авраамічних релігій, вона не вважає Авраама, Мойсея чи Ісуса $mandeaism_ADJ$ пророками. Бог $mandeaism$ називається $mandeaism_god_name$, що означає «Велике Життя», і він представляє творчу силу всесвіту."
  manichaeism_desc: "$manichaeism$ — це $iranian_group$ релігія, заснована пророком Мані в Сасанідській імперії. Вона має впливи багатьох інших релігій, включаючи гностицизм, $zoroastrian$, $christian$ та $buddhist$ серед інших, але вважає Мані останнім пророком після Заратустри, Будди та Ісуса. Її теологія дуалістична, описуючи всесвіт як духовну боротьбу між світлом і темрявою."
  ibadi_desc: "$ibadi_school_desc$"
  shia_desc: "Основою $shia_ADJ$ віри є те, що Мухаммад призначив Алі ібн Абі Таліба своїм наступником як духовного та політичного лідера $muslim$. Таким чином, $imamate$ має слідувати лінії Алі, а не тій, що була встановлена Абу Бакром, коли його обрали $rank_empire_muslim_ruler_male$ на зустрічі в Сакіфі сподвижники Мухаммада."
  sunni_desc: "$sunni$ вважає, що лідерство $muslim$ перейшло до Абу Бакра, коли його обрали $rank_empire_muslim_ruler_male$ на зустрічі в Сакіфі сподвижники Мухаммада, оскільки сам Пророк не призначив жодного наступника. Таким чином, він шанує аль-Рашидун, перших чотирьох $rank_empire_muslim_ruler_male$ після Мухаммада, як зразок правління."
  nahuatl_desc: "Релігія $nahua_group$, в якій численні $nahuatl_god_name$ або боги організовані під верховним богом Ометеотлем. Багато інших богів, як-от $huitzilopochtli_god$, $tlaloc_god$ або $quetzalcoatl_god$, зазвичай приймаються як покровителі станів або народів. Однією з її ключових практик є людські жертвоприношення, що здійснюються на честь богів і є необхідністю для збереження їхньої прихильності."
  bimoism_desc: "The $bimoism$ $common_folk_religion_desc$"
  chukchi_shamanism_desc: "The $chukchi_shamanism$ $common_folk_religion_desc$"
  dene_shamanism_desc: "The $dene_shamanism$ $common_folk_religion_desc$"
  dene_totemism_desc: "The $dene_totemism$ $common_folk_religion_desc$"
  great_plains_shamanism_desc: "The $great_plains_shamanism$ $common_folk_religion_desc$"
  hmongism_desc: "The $hmongism$ $common_folk_religion_desc$"
  iroquoian_totemism_desc: "The $iroquoian_totemism$ $common_folk_religion_desc$"
  karachay_balkar_paganism_desc: "The $karachay_balkar_paganism$ $common_folk_religion_desc$"
  khabzeism_desc: "The $khabzeism$ $common_folk_religion_desc$"
  lezgin_paganism_desc: "The $lezgin_paganism$ $common_folk_religion_desc$"
  mari_paganism_desc: "The $mari_paganism$ $common_folk_religion_desc$"
  udmurt_paganism_desc: "The $udmurt_paganism$ $common_folk_religion_desc$"
  komi_paganism_desc: "The $komi_paganism$ $common_folk_religion_desc$"
  samoyedic_paganism_desc: "The $samoyedic_paganism$ $common_folk_religion_desc$"
  obian_paganism_desc: "The $obian_paganism$ $common_folk_religion_desc$"
  mississippian_ceremonial_desc: "The $mississippian_ceremonial$ $common_folk_religion_desc$"
  moism_desc: "The $moism$ $common_folk_religion_desc$"
  norse_desc: "Стародавня релігія $germanic_language_family$ з $scandinavian_region$, вона включає широкий спектр богів, таких як Аси та Вани, зокрема найвідоміших Одіна та Тора. Вона розглядає всесвіт як дев'ять різних світів у світовому дереві Іґґдрасіль, з яких Мідґард є тим, де живуть люди."
  alan_paganism_desc: "The $alan_paganism$ $common_folk_religion_desc$"
  paiute_shamanism_desc: "The $paiute_shamanism$ $common_folk_religion_desc$"
  pomo_shamanism_desc: "The $pomo_shamanism$ $common_folk_religion_desc$"
  rmaism_desc: "The $rmaism$ $common_folk_religion_desc$"
  romuva_desc: "Традиційні вірування народу $lithuanian_group$, вони містять цілий пантеон богів, а також шанування природи та предків. Їхні церемонії проводяться біля вогняних вівтарів, навколо яких співаються ритуальні гімни або дайни."
  salishan_totemism_desc: "The $salishan_totemism$ $common_folk_religion_desc$"
  sanamahism_desc: "The $sanamahism$ $common_folk_religion_desc$"
  sapmi_shamanism_desc: "Традиційні релігійні практики народу POSTEDIT_саамі, що містять безліч природних і тваринних духів, а також шанування померлих. Деякі тварини особливо шануються, як-от північні олені та ведмеді."
  muinaisusko_desc: "Традиційні вірування POSTEDIT_фінських народів, що містять безліч божеств, найпоширенішим з яких є сором'язливий бог грому Укко. Вони також включають шанування померлих і шаманські практики, а також мають деякі спільні риси з іншими сусідніми релігіями."
  satsana_phi_desc: "The $satsana_phi$ $common_folk_religion_desc$"
  shamanism_desc: "Спільний набір практик і вірувань, зосереджений на фігурі шамана, особи, здатної взаємодіяти зі світом духів і отримувати доступ до духів або духовної енергії, щоб впливати на фізичний світ. Специфіка духів, богів або ритуалів може відрізнятися, але основна концепція духовного світу та його взаємодії з матеріальним світом залишається в усіх $shamanism_ADJ$ практиках."
  tengri_desc: "$tengri$ — це тип $shamanism_ADJ$ вірувань POSTEDIT_тюркських і POSTEDIT_монгольських народів, зосереджений навколо присутності небесного бога $tengri_god_name$, якого шанують як уособлення всесвіту. Однак він також включає інших божеств, оскільки шанує природу та божества, що живуть у ній, а також предків."
  totemism_desc: "The $totemism$ $common_folk_religion_desc$"
  tungusic_shamanism_desc: "The $tungusic_shamanism$ $common_folk_religion_desc$"
  vainakh_paganism_desc: "The $vainakh_paganism$ $common_folk_religion_desc$"
  yukaghir_shamanism_desc: "The $yukaghir_shamanism$ $common_folk_religion_desc$"
  yupik_shamanism_desc: "The $yupik_shamanism$ $common_folk_religion_desc$"
  yazidism_desc: "Виникнувши з POSTEDIT_іранської традиції, вона також містить елементи POSTEDIT_юдаїзму, POSTEDIT_християнства та POSTEDIT_ісламу. Вона вірить, що всесвіт був створений Богом, але Він призначив «Ангела-Павича» Тавусі Мелека правити ним. Хоча вона містить багато впливів інших релігій, особливо в її езотеричних практиках, її ядро ​​коріниться в стародавніх POSTEDIT_іранських релігіях."
  zoroastrian_desc: "Стародавня POSTEDIT_іранська релігія, що дотримується вчень Зороастра, також званого Заратуштрою, та текстів Авести. Вона базується на дуалістичній космології добра і зла, з вічним конфліктом божества Ахура Мазди та руйнівного духу Ангри Майнью, з передбачуваним остаточним тріумфом добра над злом."
  common_folk_religion_desc: "релігія стосується корінних вірувань, міфології, традицій та практик, що підтримуються та передаються її послідовниками з початку часів."
  bantu_religion: "Банту"
  bantu_religion_ADJ: "Банту"
  bantu_religion_desc: "The $bantu_religion$ $common_folk_religion_desc$"
  nyambe_god: "Ньямбе"
  nyambe_god_desc: "$nyambe_god$ є головним [Concept('gods', 'CONCEPT_PLACEHOLDER')|e] і Небесним Батьком для багатьох [ShowLanguageName('bantu_language_family')] мовних народів."
  bori_religion: "Борі"
  bori_religion_ADJ: "Борі"
  bori_religion_desc: "The $bori_religion$ $common_folk_religion_desc$"
  muonyjang_religion: "Муоньянг"
  muonyjang_religion_ADJ: "Муоньянг"
  muonyjang_religion_desc: "Релігія $muonyjang_religion$ $common_folk_religion_desc$"
  nhialic_god: "Nhialic"
  nhialic_god_desc: "$nhialic_god$ є головним [Concept('gods', 'CONCEPT_PLACEHOLDER')|e] у [ShowReligionAdjective('muonyjang_religion')] пантеоні."
  du_chie_god: "Du Chie"
  du_chie_god_desc: "$du_chie_god$ є богом-творцем для людей, що розмовляють [ShowLanguageName('dinka_language')]."
  ayum_god: "Ayum"
  ayum_god_desc: "$ayum_god$ є богинею вітрів у людей, що розмовляють [ShowLanguageName('dinka_language')]."
  alwet_god: "Alwet"
  alwet_god_desc: "$alwet_god$ є богинею дощу у [ShowReligionAdjective('muonyjang_religion')] пантеоні."
  fomba_gasy_religion: "Fomba Gasy"
  fomba_gasy_religion_ADJ: "Fomba Gasy"
  fomba_gasy_religion_desc: "Релігія $fomba_gasy_religion$ $common_folk_religion_desc$"
  zanahary_god: "Zanahary"
  zanahary_god_desc: "$zanahary_god$ бог-творець і небесний батько у [ShowReligionAdjective('fomba_gasy_religion')] пантеоні."
  ratovantany_god: "Ratovantany"
  ratovantany_god_desc: "$ratovantany_god$ є богом землі у [ShowReligionAdjective('fomba_gasy_religion')] пантеоні, що уклав угоду з [ShowGodName('zanahary_god')] для створення людства."
  andrianerinerina_god: "Andrianerinerina"
  andrianerinerina_god_desc: "$andrianerinerina_god$ є сином [ShowGodName('zanahary_god')] і засновником королівської династії."
  andriambahomanana_god: "Andriambahomanana"
  andriambahomanana_god_desc: "$andriambahomanana_god$ є першим чоловіком у [ShowReligionAdjective('fomba_gasy_religion')] пантеоні."
  andriamahilala_god: "Andriamahilala"
  andriamahilala_god_desc: "$andriamahilala_god$ є першою жінкою у [ShowReligionAdjective('fomba_gasy_religion')] пантеоні, яка обрала померти і відроджуватися щомісяця і стала пов'язаною з місяцем."
  maasai_religion: "Mwene Nyaga"
  maasai_religion_ADJ: "Mwene Nyaga"
  maasai_religion_desc: "Релігія $maasai_religion$ $common_folk_religion_desc$"
  ngai_god: "Нгаї"
  ngai_god_desc: "$ngai_god$ є богом-творцем народу [ShowCultureName('maasai_culture')]."
  asis_religion: "Асіс"
  asis_religion_ADJ: "Асісіанський"
  asis_religion_desc: "$asis_religion$ $common_folk_religion_desc$"
  asis_god: "Асіс"
  asis_god_desc: "$asis_god$ є богом-творцем [ShowLanguageName('kalenjin_language')]-мовного народу."
  ilat_god: "Ілат"
  ilat_god_desc: "$ilat_god$ є богом грому та дощу."
  waaqeffanna_religion: "Ваакеффана"
  waaqeffanna_religion_ADJ: "Ваакі"
  waaqeffanna_religion_desc: "$waaqeffanna_religion$ $common_folk_religion_desc$"
  waaq_god: "Ваак"
  waaq_god_desc: "$waaq_god$ є богом-творцем [ShowLanguageName('east_cushitic_language')]-мовного народу."
  badimo_religion: "Бадімо"
  badimo_religion_ADJ: "Бадімо"
  badimo_religion_desc: "$badimo_religion$ $common_folk_religion_desc$"
  kaggen_religion: "Кагген"
  kaggen_religion_ADJ: "Кагген"
  kaggen_religion_desc: "$kaggen_religion$ $common_folk_religion_desc$"
  kaggen_god: "Кагген"
  kaggen_god_desc: "$kaggen_god$ є богом-творцем, трикстером та народним героєм багатьох африканських племен."
  hunntuattatteen_god: "Хуннтуаттатін"
  hunntuattatteen_god_desc: "$hunntuattatteen_god$ є дружиною [ShowGodName('kaggen_god')]."
  kagara_god: "Кагара"
  kagara_god_desc: "$kagara_god$ є богом блискавки та швагром $haunu_god$."
  haunu_god: "Haunu"
  haunu_god_desc: "$haunu_god$ є богом блискавки та швагром $kagara_god$."
  akuj_religion: "Akuj"
  akuj_religion_ADJ: "Akuj"
  akuj_religion_desc: "$akuj_religion$ $common_folk_religion_desc$"
  akuj_god: "Akuj"
  akuj_god_desc: "$akuj_god$ є верховною істотою [ShowLanguageName('lotuko_language')]мовного народу."
  akan_religion: "Akom"
  akan_religion_ADJ: "Akom"
  akan_religion_desc: "$akan_religion$ $common_folk_religion_desc$"
  anyame_god: "Anyame"
  anyame_god_desc: "$anyame_god$ є верховним богом та небесним батьком народу [ShowCultureName('akan')]."
  asase_ya_god: "Asase Ya"
  asase_ya_god_desc: "$asase_ya_god$ є богинею кохання, родючості та землі народу [ShowCultureName('akan')]."
  anansi_god: "Anansi"
  anansi_god_desc: "$anansi_god$ є богом-трикстером та народним героєм [ShowReligionAdjective('akan_religion')] пантеону."
  tano_god: "Tano"
  tano_god_desc: "$tano_god$ є богом війни [ShowReligionAdjective('akan_religion')] пантеону, він уособлює річку Тано."
  vodun_religion: "Vodun"
  vodun_religion_ADJ: "Vodun"
  vodun_religion_desc: "$vodun_religion$ $common_folk_religion_desc$"
  legba_god: "Legba"
  legba_god_desc: "$legba_god$ є духом перехресть, який дарує зв'язок зі світом духів."
  mawu_god: "Mawu"
  mawu_god_desc: "$mawu_god$ є богом Місяця та богом-творцем усього разом зі своїм близнюком [ShowGodName('lisa_god')]."
  lisa_god: "Ліза"
  lisa_god_desc: "$lisa_god$ є богинею Сонця та богинею-творцем усього разом зі своїм близнюком [ShowGodName('mawu_god')]."
  sakpata_god: "Сакпата"
  sakpata_god_desc: "$sakpata_god$ є богом землі та хвороб [ShowReligionAdjective('vodun_religion')] пантеону."
  abwoi_religion: "Абвой"
  abwoi_religion_ADJ: "Абвой"
