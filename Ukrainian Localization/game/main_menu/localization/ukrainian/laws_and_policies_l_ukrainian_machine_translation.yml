l_english:
  ASSIGN_LAW_POLICY_TITLE: "Призначити $STRING$ Законну Політику"
  forbids_no_policy: "Повинна бути будь-яка Політика"
  feudal_de_jure_law: "Феодальні закони «Де-юре»"
  feudal_de_jure_law_desc: "Це закони, що організовують феодальне суспільство нашої країни."
  by_tradition: "За Традицією"
  by_tradition_desc: "Звичаєві закони широко відомі та практикуються в нашій країні. Відомі збірки середньовічних звичаїв включають #italic De Legibus et Consuetudinibus Angliae#! для Англії, #italic Sachsenspiegel#! для північної Німеччини, або #italic Usatges of Barcelona#! для Каталонії."
  by_blood: "За Кров'ю"
  by_blood_desc: "Закони нашої країни відображають природу нашого народу та суверенну владу нашого правителя, як виражено у відомій формулі #italic rex in regno suo est imperator regni sui#! – «Король у своєму королівстві є імператором свого королівства»."
  medieval_levy_law: "Закон про Ополчення"
  medieval_levy_law_desc: "Наша армія складається переважно з ополченців, які набираються з певних [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] нашої країни і воюватимуть за нас, доки ми їх не розпустимо."
  all_cultures: "Інклюзивне Ополчення"
  all_cultures_desc: "Наш народ розділить тягар, коли буде заклик до зброї, незалежно від їхньої [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] походження."
  noble_levies: "Шляхетське Ополчення"
  noble_levies_desc: "[ShowEstateTypeName('nobles_estate')] нашої країни очолять наші заклики до зброї, оскільки вони найбільш охочі та підготовлені до війни."
  peasant_levies: "Селянське Ополчення"
  peasant_levies_desc: "[ShowEstateTypeName('peasants_estate')] складають основну частину нашого ополчення, тому ми повинні подбати про те, щоб набрати якомога більше, коли виникне потреба."
  longbow_competitions: "Змагання з Довгого Лука"
  longbow_competitions_desc: "На свята кожен чоловік у країні візьме луки та стріли і займатиметься стрільбою з лука. Це принесе нам високу честь у битві та забезпечить прибуток від наших войовничих підприємств."
  ton_ta_jon_ta_ni_woro: "Тон-та-джон-та-ні-воро"
  ton_ta_jon_ta_ni_woro_desc: "У ранні дні нашої імперії наша армія складалася з шістнадцяти кланів, чиї лідери обіцяли захищати великого $rank_empire_mali_ruler_male$ та [GetCountry('MAL').GetAdjective] Державу. Перекладені як '#italic шістнадцять рабів, що носять лук#!', $ton_ta_jon_ta_ni_woro$ є високими [ShowEstateTypeName('nobles_estate')] країни та служать командирами [GetCountry('MAL').GetAdjectiveWithNoTooltip] кавалерії."
  alarde: "Аларде"
  alarde_desc: "$alarde$ — це [GetCountry('CAS').GetAdjective] система набору ополчення, яка покладає на міста королівства щорічну відповідальність за організацію кількох #italic alardes#!, типу військового параду, що використовується для навчання військ. Це підтримує їх у формі та готовності до військових кампаній, коли це потрібно."
  royal_court_customs_law: "Звичаї Королівського Двору"
  royal_court_customs_law_desc: "Традиції та культура двору відіграють значну роль у стабільності [ShowGovernmentTypeName('monarchy')]. Ці звичаї забезпечать безпечний перехід влади від правителя до спадкоємця та значно обмежать придворні інтриги."
  aristocratic_court_policy: "Аристократичний Двір"
  aristocratic_court_policy_desc: "[ShowEstateTypeName('nobles_estate')] є невіддільною частиною нашого уряду. Щоб краще контролювати, винагороджувати та отримувати підтримку від цих стародавніх аристократичних родин, $nobles_estate$ тісно пов'язані з монархом та королівським двором."
  balanced_court_policy: "Збалансований двір"
  balanced_court_policy_desc: "Королівський двір слугує центром держави та культури. Адміністративні, дипломатичні та військові дії є таким же фокусом двору, як і культурна та внутрішня політика держави."
  court_of_culture_policy: "Двір культури"
  court_of_culture_policy_desc: "Двір є насамперед домом королівської родини і слугує центром культури та престижу. Урядові та адміністративні справи відокремлені від придворного життя."
  itinerant_court_policy: "Мандрівний двір"
  itinerant_court_policy_desc: "Щоб краще керувати величезними розмірами нашої нації, королівський двір не прив'язаний до одного місця. Натомість він мандрує по всій землі та керує місцевою адміністрацією на місці."
  military_court_policy: "Військовий двір"
  military_court_policy_desc: "Витрачати гроші на щось для двору, крім абсолютної необхідності, є безглуздою ідеєю, яка лише заохочуватиме самовдоволення та лінь. Монарх житиме ощадливим життям і присвятить більшу частину бюджету армії."
  timurid_court_policy: "POSTEDIT_Тимуридський двір"
  timurid_court_policy_desc: "Хоча війна є життєвою силою держави, музика, мистецтво та поезія однаково важливі для величі нашої країни. Культурні традиції з підкорених нами земель більше не вважатимуться чужими, а використовуватимуться для розвитку нашого культурного просвітництва."
  valide_sultan_court_policy: "POSTEDIT_Валіде-султан"
  valide_sultan_court_policy_desc: "«Рай лежить біля ніг твоєї матері», і тому королева-мати повинна займати найвище становище при дворі, мати право наглядати за засіданнями ради та завдяки своїй мудрості й доброзичливості відігравати важливу роль у більшості державних справ."
  harem_policy: "Королівський гарем"
  harem_policy_desc: "Значна частина нашого придворного життя є усамітненою та розділеною за статтю, зосередженою навколо гарему, де поневолені слуги та наложниці змагаються за вплив на правителя."
  harem_law: "Закони гарему"
  harem_law_desc: "Гарем є значною установою в королівському домі та забезпечує народження спадкоємців для престолонаслідування."
  secluded_harem_policy: "Усамітнений гарем"
  secluded_harem_policy_desc: "Наш гарем не для очей мас за межами королівського двору. Таким чином, він відіграє більш усамітнену роль у домі, і йому суворо заборонено безпосередньо втручатися у справи монарха."
  public_harem_policy: "Публічний гарем"
  public_harem_policy_desc: "Наш гарем не тільки забезпечує законних спадкоємців, але й є символом багатства, влади та престижу королівської родини. Краса та таланти членів гарему тому з гордістю демонструються публіці."
  powerful_harem_policy: "Могутній гарем"
  powerful_harem_policy_desc: "Монарх — лише маріонетка, що танцює під пальцями хитрих наложниць та євнухів. Справжня влада держави лежить у руках гарему, а державними справами займаються жінки королівського двору."
  dispersed_harem_policy: "Розсіяний гарем"
  dispersed_harem_policy_desc: "Гарем розкиданий по кількох місцях, а наложниці такі ж мандрівні, як і королівський двір. Коли наложниця народжує сина, її відправляють з ним до провінції, щоб вона наглядала за його освітою та готувала його до майбутнього губернаторства."
  luxurious_harem_policy: "Розкішний гарем"
  luxurious_harem_policy_desc: "Гарем – це блискуче, показний прояв багатства, зосереджений насамперед на особистих задоволеннях правителя. Наложниці мають бути найвишуканіших родів, і вони проводять свої дні, розкошуючи в розкоші."
  republican_foundation_law: "Заснування Республіки"
  republican_foundation_law_desc: "Наша Республіка заснована на принципі, що влада має належати народу, а не єдиному абсолютистському правителю. Проте, як і в будь-якому уряді, її закони та рішення повинні поважатися та виконуватися для підтримки порядку, що вимагає створення складних адміністрацій для управління."
  republicanism_policy: "Республіканізм"
  republicanism_policy_desc: "Ця нація є охоронцем республіканських ідеалів, таких як правління через обраних представників, громадянська чеснота та конституційні обмеження влади. Громадяни активно беруть участь у своєму управлінні через голосування та обіймання посад."
  authoritarianism_policy: "Авторитаризм"
  authoritarianism_policy_desc: "Хоча це не монархія, ця форма республіки зосереджує владу в руках невеликої правлячої групи, яка не підзвітна громадянам. Інакомислення не толерується. Незважаючи на те, що це республіка, адміністрації в цих країнах більше стурбовані збереженням власної влади, ніж правами своїх громадян."
  political_dynasties_policy: "Політичні династії"
  political_dynasties_policy_desc: "З часом кілька родин стали видатними лідерами, часто шукаючи та обіймаючи ролі в уряді. На цьому етапі від них очікується, що вони візьмуть на себе тягар лідерства, так само як від держави очікується, що вона запропонує ці обов'язки їхнім нащадкам."
  meritocratic_rule_policy: "Меритократичне правління"
  meritocratic_rule_policy_desc: "Наша республіка не обирає своїх правителів на основі зв'язків чи впливу олігархів. Натомість маси нашої країни голосують відповідно до навичок, які пропонує кандидат. Ця система меритократії не розрізняє статі і присутня в усіх аспектах нашого суспільства."
  virtues_of_politeia_policy: "Чесноти Політеї"
  virtues_of_politeia_policy_desc: "Політея врівноважує інтереси як заможних, так і простих громадян через участь в уряді. Ця система створює стабільність через компроміс, захищаючи інтереси обох сторін і забезпечуючи, щоб жодна фракція не могла домінувати."
  religious_values_policy: "Релігійні цінності"
  religious_values_policy_desc: "Релігійні цінності формують політичне життя в нашій республіці, впливаючи як на громадянську, так і на урядову культуру. Релігійні установи відіграють важливу консультативну роль у громадських справах, громадянам рекомендується враховувати релігійну етику під час голосування, а від лідерів очікується, що вони керуватимуть відповідно до моральних вчень."
  republican_election_law: "Вибори"
  republican_election_law_desc: "Вибори є наріжним каменем нашої республіки, забезпечуючи розумні обмеження для тих, хто при владі, водночас надаючи народу можливість обирати правителів, які найкраще служать їхнім інтересам."
  consolidated_power: "Консолідована влада"
  consolidated_power_desc: "Терміни, які зараз обіймають наші посадовці, занадто короткі, щоб вони могли повністю реалізувати більші та складніші проєкти. Це призводить до посилення популістських настроїв і часто до короткозорого, менш ефективного розвитку політики. Давайте реформуємо нашу виборчу систему, щоб дозволити довші терміни, щоб наші обрані посадовці мали час, необхідний для належного виконання своїх обов'язків."
  frequent_elections: "Часті вибори"
  frequent_elections_desc: "Довгі терміни роблять правителів безрозсудними і суперечать самій ідеї республіки. Давайте реформуємо нашу виборчу систему, щоб встановити коротші терміни, тим самим забезпечуючи кращу підзвітність наших обраних посадовців."
  republican_power_law: "Республіканська влада"
  republican_power_law_desc: "Як і будь-який уряд, Республіка повинна не тільки приймати рішення, але й діяти відповідно до них. Для цього їй потрібен спосіб здійснення своїх виконавчих повноважень, щоб вони досягали навіть найвіддаленіших куточків країни."
  broad_executive_power_policy: "Широка виконавча влада"
  broad_executive_power_policy_desc: "Оскільки наша країна зростає, зростає і наша потреба мати змогу швидко діяти. Єдиний спосіб забезпечити це — розширити повноваження виконавчої гілки влади, щоб вона могла робити все, що їй потрібно, без перешкод."
  devolution_of_powers_policy: "Деволюція повноважень"
  devolution_of_powers_policy_desc: "Жодна людина не може керувати такою складною країною, як наша. Концентрація такої влади в руках одного правителя також суперечить республіканським ідеалам наших предків. Передача частини наших повноважень і обов'язків місцевим органам влади, зберігаючи при цьому кінцеву централізовану владу, — це найкращий спосіб задовольнити потреби нашої держави, що постійно зростає."
  absolute_presidential_power_policy: "Абсолютна влада Президента"
  absolute_presidential_power_policy_desc: "Хоча деякі з наших обраних посадовців представляють народ своїх виборчих округів, ми ніколи не повинні забувати, що саме Президент зрештою представляє весь наш народ. Роль наших обраних представників має полягати лише в консультуванні Президента, який володіє абсолютною владою над Республікою."
  new_men_policy: "Нові люди"
  new_men_policy_desc: "Тим, хто занадто довго тримається за владу, не можна довіряти. Наша Республіка тепер зосередиться на обранні нових посадовців, чиї руки чисті від корупції та тіньових справ."
  principle_of_administration_law: "Адміністративні принципи"
  principle_of_administration_law_desc: "Якщо ми бажаємо бути прикладом для всіх наших громадян, Республіка повинна дотримуватися принципів, які диктують курс дій, що ми обираємо для нашої політики."
  political_principle: "Політичний принцип"
  political_principle_desc: "Як Республіка, керівними принципами нашої держави мають бути ті, що сприяють ефективності нашого політичного апарату та ідеалів."
  moral_principle: "Моральний принцип"
  moral_principle_desc: "Однією з основних функцій держави є підтримка належних моральних цінностей. Оскільки наша Республіка багато в чому покладається на доброчесну поведінку своїх громадян, корупція та гріх повинні бути викриті та викорінені на благо всієї країни."
  protection_principle: "Принцип захисту"
  protection_principle_desc: "Найвищий принцип нашої республіки — захист її народу. Хоча це не є популярною темою в нашому уряді, важливо підтримувати військову силу для самооборони та підтримки внутрішньої стабільності."
  military_principle: "Військовий принцип"
  military_principle_desc: "Наша Республіка оточена ворогами, які прагнуть нас повністю знищити. Наш найвищий пріоритет — наш принцип — використовувати нашу військову міць для розширення наших кордонів."
  enlightened_principle: "Просвітницький принцип"
  enlightened_principle_desc: "Просвітництво — це наступний інтелектуальний та філософський крок для нашого суспільства. Прийняття ідей Просвітництва є вирішальним, якщо ми бажаємо перейти в нову еру."
  commercialist_principle: "Комерційний принцип"
  commercialist_principle_desc: "Наша Республіка ґрунтується на принципі комерціалізму. Людська природа є рушійним фактором необхідності торгівлі, капіталу та бізнесу, оскільки наші [ShowEstateTypeName('burghers_estate')] прагнуть прибутку."
  council_of_captains: "Рада Капітанів"
  council_of_captains_desc: "Наша піратська республіка повинна керуватися волею своїх найлютіших капітанів. Саме їхній союз тримає наше суспільство разом, і тому їхні рішення повинні мати перевагу над будь-якою іншою владою."
  republican_electorate_law: "Закон про республіканський електорат"
  republican_electorate_law_desc: "Вибори є основоположною концепцією нашої республіки, і як такі, найважливішим фактором у визначенні курсу Республіки є вирішення питання про те, хто має право голосувати на цих виборах."
  landholders: "Землевласники"
  landholders_desc: "Землевласники є серцем влади в будь-якому суспільстві, і наше не виняток. Давайте поширимо право голосу на всіх, хто володіє землею, і зважимо їхню виборчу силу відповідно до розміру їхніх володінь."
  citizenry: "Громадянство"
  citizenry_desc: "Республіка покладається на своїх громадян для функціонування, і тому цілком справедливо, що кожен з наших громадян має право голосувати за того, хто очолить країну. Отримання привілею громадянства також буде стимулом для наших громадян поводитися якнайкраще."
  dynastic_rule_policy: "Династичне правління"
  dynastic_rule_policy_desc: "Зв'язки могутніші, ніж будь-який меч. Через встановлення династії як політичного глави держави ми можемо будувати дипломатичні відносини з монархіями, зберігаючи при цьому принципи республіки.\nТе, що обраний правитель, здається, є членом тієї ж родини, є просто чистим збігом."
  board_of_admirals_policy: "Адміралтейська рада"
  board_of_admirals_policy_desc: "Адміралтейська рада є найвищим морським відомством держави. Очолювана Лордом-Верховним Адміралом, рада забезпечує військову та комерційну професійність нашого флоту."
  military_rulership_policy: "Військове правління"
  military_rulership_policy_desc: "Республіка є кісткою в горлі багатьох потенційних ворогів, які прагнуть нас знищити. Заради безпеки країни ми передали кермо нашого уряду генералам. Нехай їхній досвід і любов до рідної країни захистять республіку."
  theocratic_leadership: "Теократичне лідерство"
  theocratic_leadership_desc: "Цією країною керує Теократичне Лідерство, де релігійні авторитети мають політичну владу, а релігійне право часто переважає світське."
  clerical_state: "Клерикальна держава"
  clerical_state_desc: "Ця держава керується [ShowEstateTypeName('clergy_estate')] і використовує ієрархію релігійних установ для всіх урядових цілей."
  monastic_order: "Монаший орден"
  monastic_order_desc: "Цією країною керують члени Монашого Ордену. Ієрархія та правила ордену замінюють потребу в більшості законів та адміністрації."
  the_papacy: "Папство"
  the_papacy_desc: "Політична структура, де нація керується духовним лідером, Папою, найвищим саном [ShowReligionAdjective('catholic')] Церкви."
  patriarchate_reform: "Патріархат"
  patriarchate_reform_desc: "Влада Патріарха є єдиною, що може вести нашу країну, оскільки він є найвищим представником Бога."
  caliphate_reform: "Халіфат"
  caliphate_reform_desc: "Халіфат керується Халіфом, законним духовним наступником Пророка. Будучи як світською, так і духовною вищою владою в ісламі, всі мусульмани зобов'язані підкорятися Халіфу."
  holy_mission_law: "Священна Місія"
  holy_mission_law_desc: "Настановою для кожної нашої дії є Священна Місія, яку ми отримали від нашого божественного правителя. Бачення, яке вища сила передбачила для нас, здійсниться!"
  internal_mission_policy: "Внутрішня Місія"
  internal_mission_policy_desc: "Ми мусимо зосередити нашу енергію на святих місіях, що стосуються тих, хто перебуває в наших кордонах: захищати вірних, допомагати менш щасливим і виконувати наші духовні обов'язки."
  external_mission_policy: "Зовнішня місія"
  external_mission_policy_desc: "Поширення нашої святої віри має бути нашою найважливішою місією. Ми не можемо спочивати, доки не переможемо всіх ворогів нашої релігії!"
  balanced_mission_policy: "Збалансована місія"
  balanced_mission_policy_desc: "Справи нашої теократії не можуть бути зосереджені лише на одному аспекті. В інтересах як нашої держави, так і нашої релігії однаково інвестувати в наші внутрішні та зовнішні місії."
  commercial_mission_policy: "Комерційна місія"
  commercial_mission_policy_desc: "Хоча релігія є рушійною силою наших амбіцій, безперечно, що наша держава залежить від могутності дуката. На щастя, релігія та монетизація йдуть рука об руку."
  mission_of_protection_policy: "Місія захисту"
  mission_of_protection_policy_desc: "Наша віра постійно перебуває під загрозою як від язичників, так і від єретиків. Єдині, на кого ми можемо розраховувати, це інші послідовники нашої релігії — наші брати та сестри по вірі. Наш обов'язок — захищати їх від сил зла."
  mission_to_civilize_policy: "Місія цивілізації"
  mission_to_civilize_policy_desc: "Наша місія полягає в тому, щоб шукати оманливі, примітивні народи по всьому світу та навчати їх правильного способу життя та віри, щоб вони також могли приєднатися до нас у нашій божественності."
  mission_on_the_high_seas_policy: "Місія у відкритому морі"
  mission_on_the_high_seas_policy_desc: "Моря сповнені язичників і лиходіїв, які грабують кораблі наших братів по вірі! Такими темпами паломники ніколи не зможуть безпечно відвідувати наші святі місця, якщо ми не візьмемося за божественну місію з ліквідації цієї піратської загрози у відкритому морі."
  nature_of_our_faith_law: "Природа нашої віри"
  nature_of_our_faith_law_desc: "Релігія є опорою всього нашого суспільства, і як така, природа нашої віри відіграє роль у всіх аспектах нашої культури. Жодні важливі рішення не можуть бути прийняті без ретельного розгляду релігійної перспективи цих дій."
  faith_and_power_policy: "Віра та влада"
  faith_and_power_policy_desc: "Бій і влада — єдині шляхи наблизитися до божественного. Народ нашої держави виявляє свою побожність і відданість через перемогу на полі бою."
  belief_and_unitiy_policy: "Віра та єдність"
  belief_and_unitiy_policy_desc: "Віра — це об'єднуюча сила, яка тримає державу та народ разом. Уряд існує з єдиною метою — забезпечити, щоб ця єдність залишалася непорушною."
  church_and_state_policy: "Церква та держава"
  church_and_state_policy_desc: "Віра та держава — це два стовпи, що тримають світ. Наші закони святі, і їх не можна ставити під сумнів."
  god_and_man_policy: "Бог і людина"
  god_and_man_policy_desc: "Єдині стосунки, які мають значення, це стосунки між низькими смертними та безсмертним божеством. Наша держава існує лише для того, щоб нагадувати людям про правильні способи присвятити себе своїй вірі."
  organize_our_faith_policy: "Організувати нашу віру"
  organize_our_faith_policy_desc: "Ми є високоорганізованою державою, орієнтованою на віру, яка сама по собі є дуже дезорганізованою. Встановивши офіційну ієрархію для нашої релігії, ми можемо навернути більше послідовників до істинної віри."
  divine_cause_law: "Божественна Справа"
  divine_cause_law_desc: "Хоча монархії та республіки можуть задовольнятися простим існуванням у світі, Священна Держава потребує глибшого, більш духовного покликання. Ця Божественна Справа спрямує нашу руку до славетної долі."
  safeguard_holy_sites_policy: "Оберігати Святі Місця"
  safeguard_holy_sites_policy_desc: "Наш священний обов'язок — дбати про святі місця під нашим контролем та захищати будь-яких паломників у наших землях."
  combat_heresy_policy: "Боротьба з Єрессю"
  combat_heresy_policy_desc: "У місії поширення істинної віри ми ніколи не повинні хитатися у своїх переконаннях і бути готовими викорінювати єресь скрізь, де вона виникає — силою, якщо буде потрібно."
  expulsion_of_heathens_policy: "Вигнання Язичників"
  expulsion_of_heathens_policy_desc: "Зі зростанням нашої держави ми неминуче стикаємося з хибними вченнями. Ми не повинні терпіти язичників чи єретиків у межах наших міських стін! Тому ми дозволимо цим невіруючим мешкати в наших містах лише за умови, що вони навернуться до істинної віри."
  pursuit_of_knowledge_policy: "Прагнення до Знань"
  pursuit_of_knowledge_policy_desc: "Наша справа — не захист нашої релігії, ані примусове поширення нашої віри. Натомість ми зосереджуємося на самій природі буття, досліджуючи взаємозв'язок між смертним і божественним світами."
  iqta_law: "Ікта"
  iqta_law_desc: "#italic $iqta_law$#! — це [ShowReligionGroupAdjective('muslim')] практика «податкового відкупу»: збирання земельних доходів з [ShowEstateTypeName('peasants_estate')] як частина #italic Закяту#!, подання милостині, яку [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] держави зазвичай збирають для формування свого базового доходу."
  efficient_tax_farming: "Податковий Відкуп"
  efficient_tax_farming_desc: "Ефективне збирання податків на майно є основою нашої національної економіки. Попри те, що [ShowEstateTypeName('peasants_estate')] можуть виступати проти, цей дохід є життєво важливим для фінансування різноманітних проєктів, починань та кампаній. Таким чином, накопичення доходів та загальне управління ними слід довіряти методичним власникам $iqta_law$."
  jagir_taxation: "Податок Джагір"
  jagir_taxation_desc: "Система #italic Джагір#! надає землю та право збирати податки призначенцям держави, відомим як #italic Джагірдари#!. Протягом десятиліть з моменту її заснування система еволюціонувала так, що правлячий орган зберігає адміністративну та військову владу, тоді як Джагірдари збирають податки та передають частину цього доходу до скарбниці."
  land_acquisition: "Придбання Земель"
  land_acquisition_desc: "Управління величезними землями під нашою юрисдикцією — справа непроста. Давайте прагнути наблизити території до нашої центральної влади, підтверджуючи наше володіння цими землями, попри протести з боку [ShowEstateTypeName('peasants_estate')]."
  lenient_taxation: "М'яке Оподаткування"
  lenient_taxation_desc: "Наші люди, незалежно від їхнього походження та віри, довго страждали під оподаткуванням місцевого #Italic Мукті'#!. Давайте простягнемо їм руку допомоги, зменшивши їхній податковий тягар."
  society_of_jesus: "Товариство Ісуса"
  society_of_jesus_desc: "Товариство Ісуса, широко відоме як єзуїти, — це релігійний орден, заснований Ігнатієм Лойолою як частина Контрреформації. Єзуїти відрізняються від інших католицьких орденів акцентом на освіті, науковій діяльності та місіонерській роботі."
  jesuits_allowed: "Єзуїти Дозволені"
  jesuits_allowed_desc: "Єзуїти — це [ShowReligionGroupAdjective('catholic')] релігійний орден, переважно іберійського походження, що розвинувся разом із Контрреформацією. Завдяки місіонерській роботі та агресивному наверненню, їхній цінний вплив та здібності дозволять нам прискорити навернення нашого язичницького та єретичного населення ціною зниження толерантності."
  jesuits_not_allowed: "Не Дозволено"
  jesuits_not_allowed_desc: "Попри можливість залучати релігійні ордени для навернення нашого єретичного населення, ми натомість терпітимемо всіх наших підданих і ставитимемося до них як до справжніх рівних, незалежно від їхніх вірувань. Єзуїтське втручання небажане в нашому королівстві."
  fra_reformation_tolerance_edicts: "Едикти Реформації"
  fra_reformation_tolerance_edicts_desc: "Реформація охоплює [ShowContinentNameWithNoTooltip('europe')], і [GetCountry('FRA').GetName] перебуває на передовій її спалаху. Державна політика щодо цих нових фанатиків буде критично важливою для того, щоб зробити їх нашими друзями — або ворогами."
  protestant_tolerance: "Едикт про [ShowReligionAdjectiveWithNoTooltip('protestant')] толерантність"
  protestant_tolerance_desc: "Особливі привілеї були надані [ShowReligionAdjective('protestant')] населенню по всьому [GetCountry('FRA').GetName], запобігаючи їхньому переслідуванню. Однак політика [GetCountry('FRA').GetGovernment.GetCourtTitle] розглядається як єресь [ShowReligionAdjective('catholic')] [ShowEstateTypeName('clergy_estate')]."
  reformist_tolerance: "Едикт про релігійну толерантність"
  reformist_tolerance_desc: "Особливі привілеї були надані населенню по всьому [GetCountry('FRA').GetName], яке сповідує ці нові, реформовані віри, запобігаючи їхньому переслідуванню."
  edict_of_fontainebleau: "Нантський едикт"
  edict_of_fontainebleau_desc: "Двір визнав зростання протестантизму серйозною загрозою для стабільності [GetCountry('FRA').GetName], і сповідування єретичної віри тепер вважається державною зрадою."
  expanded_edict_of_fontainebleau: "Розширений Нантський едикт"
  expanded_edict_of_fontainebleau_desc: "Продовження зростання протестантизму та інших реформаційних вір призвело до того, що рада розширила попередній $edict_of_fontainebleau$, щоб охопити всі єретичні віри."
  edict_of_chateaubriant: "Едикт Шатобріана"
  edict_of_chateaubriant_desc: "Зростання протестантизму в [GetCountry('FRA').GetName] досягло критичної точки, змусивши двір вжити крайніх заходів. Згідно з $edict_of_chateaubriant$, послідовникам єретичних вірувань заборонено обіймати державні посади та вести торгівлю по всьому [GetCountry('FRA').GetNameWithNoTooltip]."
  edict_of_nantes: "Едикт Фонтенбло"
  edict_of_nantes_desc: "$edict_of_nantes$ надає значні права релігійним меншинам по всьому [GetCountry('FRA').GetName], ставлячи їх на рівні з послідовниками [ShowReligionAdjective('catholic')] віри. Він також припиняє десятиліття переслідувань наших гугенотських громадян."
  french_colonial_ambition_focus: "Колоніальні прагнення"
  french_colonial_ambition_focus_desc: "Подолавши десятиліття заворушень, [GetCountry('FRA').GetName] досягла точки, коли може фінансувати заморські дослідження. Нові політики дозволять двору ефективніше реалізовувати колоніальні амбіції."
  french_mercantile_colonies: "Поселення Нового Світу"
  french_mercantile_colonies_desc: "Хоча попередні спроби заснувати колонії в Новому Світі виявилися неефективними. Однак, з оновленою фінансовою підтримкою з боку держави, заснування поселень у Новому Світі тепер має бути менш складним і більш винагороджувальним."
  french_far_east_ambitions: "Амбіції на Далекому Сході"
  french_far_east_ambitions_desc: "Індійська торгівля прянощами, хоча й оскаржується іншими європейськими державами, все ще залишається цінним ринком для створення бази влади."
  french_east_india_company: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] Ост-Індська компанія"
  french_east_india_company_desc: "Зміцнивши свої позиції в $india$ та на Далекому Сході, $french_east_india_company$ була відкрита для розширення поточного [GetCountry('FRA').GetAdjective] впливу в регіоні. Лише час покаже, чи виявиться компанія прибутковою, однак..."
  fra_jansenism_legality: "Статус янсенізму"
  fra_jansenism_legality_desc: "Доктрина, що слідує вченням святого Августина, #italic янсенізм#! наголошує на приреченні, глибоких і тривалих наслідках первородного гріха та суворій моралі. Вона все частіше опиняється під загрозою зі зростанням абсолютизму в [GetCountry('FRA').GetName], а також була офіційно засуджена [GetCountry('PAP').GetAdjective] буллою #italic Unigenitus#!."
  jansenism_no_formal_law: "Без формального закону"
  jansenism_no_formal_law_desc: "Законність янсенізму наразі перебуває в підвішеному стані, оскільки декрет #italic Unigenitus#! не імплементований. Послідовники янсенізму розглядаються нарівні з іншими релігійними сектами."
  unigenitus_codified: "Декрет Unigenitus"
  unigenitus_codified_desc: "Декрет Unigenitus був кодифікований у закон, що оголошує поза законом будь-яку форму сповідування янсенізму. Відомі послідовники янсенізму змушені сплачувати податок #italic Cinquantième#!."
  patriarchate_law: "Роль Патріархату"
  patriarchate_law_desc: "Патріархат є головним стовпом нашої віри та інституцією зі значним впливом на державу."
  separated_patriarchate_policy: "Відокремлений Патріархат"
  separated_patriarchate_policy_desc: "Держава та Патріархат є двома абсолютно окремими сутностями, які не втручаються у справи одне одного."
  state_patriarchate_policy: "Державний Патріархат"
  state_patriarchate_policy_desc: "Патріархат посідає впливове становище в державі та володіє владою над релігійними справами країни."
  combined_patriarchate_policy: "Об'єднаний Патріархат"
  combined_patriarchate_policy_desc: "Глава держави також є главою Патріархату. Релігійні питання вирішуються так, ніби вони є типовими державними справами."
  most_holy_synod_policy: "Найсвятіший Синод"
  most_holy_synod_policy_desc: "Хоча Церква відігравала значну роль в історії держави, стає очевидним, що її становище в нашій країні потребує переосмислення. Заснувавши Найсвятіший Синод, правитель тримає вплив Патріархату під контролем."
  inquisition_law: "Закон про Інквізицію"
  inquisition_law_desc: "Спочатку заснована для боротьби з єрессю [ShowReligionName('catharism')], Інквізиція стала основним інструментом [ShowReligionAdjective('catholic')] Церкви для розслідування та переслідування єресі. Через спеціалізовані церковні суди навчені інквізитори розслідують потенційних єретиків, витягують зізнання у релігійних чи моральних проступках та накладають покарання, починаючи від покути до страти, за порушення католицьких звичаїв."
  papal_control: "Папський контроль"
  papal_control_desc: "Знак Святого Престолу має безпрецедентний вплив у всьому [ShowReligionAdjective('catholic')] світі. Зробивши авторитет і владу [GetCountry('PAP').GetGovernment.GetRulerTitle] рушійною силою релігійної політики нашої держави, ми прискоримо навернення невіруючих, зберігаючи загальний соціальний порядок."
  local_courts: "Місцеві суди"
  local_courts_desc: "Занадто довго єретики в нашому володінні користувалися тими ж захистом і привілеями, що й вірні. Настав час заснувати місцеві суди з повноваженнями переслідувати тих, хто відмовляється від нашої віри, незалежно від наслідків для соціальної гармонії."
  state_inquisitors: "Державні інквізитори"
  state_inquisitors_desc: "Інквізиція – це справа, яку має контролювати держава, а не [GetCountry('PAP').GetGovernment.GetRulerTitle] чи місцева влада. Державні інквізитори мають владу шпигувати за всіма підозрюваними ворогами держави та згодом висувати проти них звинувачення."
  venetian_papal_relation_law: "Священна Канцелярія"
  venetian_papal_relation_law_desc: "Священна Канцелярія вимагала більшої юрисдикції над релігійним життям у Найсвітлішій Республіці. Тепер ми повинні обрати, чи задовольнити цей запит, чи захистити релігійну свободу наших підданих."
  venetian_first: "[GetCountry('VEN').GetAdjectiveWithNoTooltip] По-перше, [ShowReligionGroupAdjectiveWithNoTooltip('christian')] По-друге"
  venetian_first_desc: "У [GetCountry('VEN').GetName] вірність Республіці важливіша за те, яким ти є [ShowReligionGroupAdjective('christian')]."
  christian_first: "[ShowReligionGroupAdjectiveWithNoTooltip('christian')] Передусім!"
  christian_first_desc: "Бути справжнім [ShowReligionGroupAdjective('christian')] — єдине, що має значення для громадянина [GetCountry('VEN').GetName]."
  sumptuary_law: "Закон про розкоші"
  sumptuary_law_desc: "Одяг у [ShowReligionAdjective('nahuatl')] суспільстві відображає нашу соціальну ієрархію та позначає важливі життєві події, такі як шлюб, народження та смерть. [ShowEstateTypeName('peasants_estate')] зазвичай носять простий бавовняний одяг, тоді як високопоставлені еліти вбираються у набагато вишуканіше вбрання, прикрашене яскравими кольорами та безцінним пір'ям. Воїнам, навпаки, дозволено носити лише прості мантії.\n\nCihuacóatl тепер встановлює Закони про розкоші, які регулюватимуть, як піддані одягаються, що вони можуть купувати на ринках та які прикраси вони можуть носити, все це ґрунтуючись на їхньому ранзі."
  sump_law_warrior_culture: "Культура воїнів"
  sump_law_warrior_culture_desc: "Виживання нашої держави залежить від сили наших воїнів. Очікується, що кожен чоловік битиметься, коли його покличуть. Щоб зміцнити цю культуру воїнів, Cihuacōātl встановлює закони, які обмежують те, що люди можуть носити, володіти та купувати, а також які державні посади може обіймати кожен стан, ґрунтуючись на їхній бойовій доблесті.\n\nХоча ці закони захищають права наших [ShowEstateTypeName('nobles_estate')], вони насамперед винагороджують військову доблесть. Серед [ShowEstateTypeName('peasants_estate')] бойова майстерність визначатиме одяг та інші привілеї. Навіть $nobles_estate$ можуть отримати доступ до державних посад, лише демонструючи мужність у бою."
  sump_law_tradition: "Традиція"
  sump_law_tradition_desc: "Традиції минулого будуть нашими керівними принципами!"
  eng_order_of_the_garter_law: "Орден Підв'язки"
  eng_order_of_the_garter_law_desc: "Орден Підв'язки є престижним символом найвищих ідеалів нашого королівства, що перевершує час і об'єднує гідних людей різного походження та талантів.\n\nЧи то у складі улюбленців монарха, шанованих іноземних сановників, побожних членів духовенства, обдарованих митців чи доблесних воїнів, цей поважний орден є вершиною шляхетності та чесноти."
  eng_order_of_the_garter_nobility_policy: "Лицарі-компаньйони"
  eng_order_of_the_garter_nobility_policy_desc: "Як найшляхетніші та найхоробріші мешканці королівства, Лицарі-компаньйони є втіленням мужності, вірності та товариськості. Підносячи найвірніших членів перства, [ShowEstateTypeName('crown_estate')] забезпечує, щоб цей престижний орден залишався бастіоном лицарства, кожен член якого доблесно служить як монарху, так і нації."
  eng_order_of_the_garter_foreign_policy: "Чужоземні лицарі"
  eng_order_of_the_garter_foreign_policy_desc: "Завдяки включенню видатних іноземних правителів, дипломатів та лицарів, Чужоземні лицарі приносять багатство різноманітних поглядів та допомагають [ShowEstateTypeName('crown_estate')] розширити свій вплив на наші землі."
  eng_order_of_the_garter_clergy_policy: "Святе Братство"
  eng_order_of_the_garter_clergy_policy_desc: "З божественним керівництвом та непохитною вірою, Святе Братство Ордену Підв'язки складається з шанованих єпископів та інших старших кліриків. Підносячи цих побожних служителів віри, [ShowEstateTypeName('crown_estate')] зміцнить духовну основу королівства."
  eng_order_of_the_garter_arts_policy: "Покровитель мистецтв"
  eng_order_of_the_garter_arts_policy_desc: "Визнаючи силу культури та мистецтв надихати та підносити людський дух, [ShowEstateTypeName('crown_estate')] використовує Орден Підв'язки як засіб для розвитку творчості та просування талантів найобдарованіших громадян королівства."
  eng_order_of_the_garter_peasants_policy: "Лицарі милостині"
  eng_order_of_the_garter_peasants_policy_desc: "Актом співчуття та доброзичливості Орден поширює свою благодійність на воїнів, які повертаються додому зі служби збіднілими, та лицарів, які залишилися без спадщини та земель через війну."
  censorship: "Цензура"
  censorship_desc: "Можливість контролювати, які літературні твори можуть розповсюджуватися, і чи дозволені думки, що суперечать встановленій догмі, є важливою для релігійної згуртованості та загалом підтримується [ShowEstateTypeName('clergy_estate')]. Однак ці обмеження несхвально сприймаються вільнодумцями та творчими професіоналами і можуть мати глибокі наслідки для доступності [Concept('artists', 'CONCEPT_PLACEHOLDER')|e] та для будь-якого [Concept('work_of_art', 'CONCEPT_PLACEHOLDER')|e], визнаного єретичним."
  no_censorship: "Без цензури"
  no_censorship_desc: "Ідеали вільнодумства є як безспірними, так і заохочуваними. [Concept('artists', 'CONCEPT_PLACEHOLDER')|e] частіше осідають і залишаються в [Concept('country', 'CONCEPT_PLACEHOLDER')|e], де вони можуть вільно висловлюватися, хоча неминуче існують фанатики, які протистоять такій свободі."
  limited_censorship: "Обмежена цензура"
  limited_censorship_desc: "[ShowEstateTypeName('clergy_estate')] має певну толерантність до єретичних та суперечливих думок, але їхнє терпіння не слід випробовувати.\n#NL![Concept('artists', 'CONCEPT_PLACEHOLDER')|e] можуть покинути [Concept('country', 'CONCEPT_PLACEHOLDER')|e] або утриматися від поселення в ній, залежно від того, як ставляться до їхньої роботи та колег."
  strict_censorship: "Сувора цензура"
  strict_censorship_desc: "Немає толерантності до єретичного мислення. [ShowEstateTypeName('clergy_estate')] пильнує за всім і без вагань каратиме тих, хто не підкоряється.\n#NL![Concept('artists', 'CONCEPT_PLACEHOLDER')|e] менш схильні селитися або залишатися в [Concept('country', 'CONCEPT_PLACEHOLDER')|e], якщо вони не є прихильниками поточної релігійної доктрини."
  de_heretico_comburendo: "#italic De Heretico Comburendo#!"
  de_heretico_comburendo_desc: "Єресь не терпиться в жодному аспекті суспільства і карається спаленням на вогнищі. Релігійні служби, писання та думки єретичного характеру будуть знищені.\n#NL![Concept('artists', 'CONCEPT_PLACEHOLDER')|e] ймовірно, уникатимуть поселення або перебування в нашій країні, а релігійні меншини побачать конфіскацію свого майна та будуть піддані переслідуванням."
  doktrinalnaya_ohrana: "Дозволені рейди опричників"
  doktrinalnaya_ohrana_desc: "Церква не застрахована від чисток [ShowGovernmentReformName('oprichnina')], і члени [ShowEstateTypeName('clergy_estate')], особливо ті, хто сприймався як загроза, стають мішенню. Монастирі регулярно грабуються, а ченці піддаються насильству. Сувора цензура поширюється на богословські праці, релігійні тексти та історичні писання, а люди, які дотримуються різних форм [ShowReligionGroupName('christian')], розглядаються з підозрою."
  mandate_of_ofen: "Мандат Офена"
  mandate_of_ofen_desc: "Мандат Офена керуватиме нашим підходом до боротьби з поширенням єресі в нашій країні. Він не тільки диктуватиме, що ми засуджуємо як єретичне, але й вимагатиме, щоб кожна парафіяльна церква читала його вголос своїм громадам двічі на рік, щоб зміцнити його статути серед нашого народу."
  slave_conversion: "Звернення рабів"
  slave_conversion_desc: "Наші раби походять з багатьох різних земель, і тому приносять із собою різноманітні вірування. Можливо, нам потрібно ретельно регулювати їх, щоб не ризикувати розбестити наше власне населення, дозволяючи їм піддаватися девіантним практикам і ритуалам."
  allow_slave_religion: "Дозволити релігію рабів"
  allow_slave_religion_desc: "Рабів вже змусили покинути свої домівки і жити в неволі під чужими панами. Дозвольмо їм принаймні зберегти свої вірування та ритуали; не має значення, у що вони вірять всередині, доки вони підкоряються."
  force_slave_conversion: "Примусове навернення рабів"
  force_slave_conversion_desc: "Як ми можемо очікувати від рабів послуху та вірності, якщо вони не бажають прийняти наші власні вірування, а натомість чіпляються за свої дурні забобони? Лише примушуючи їх відмовитися від свого язичництва та прийняти істинну віру всім серцем, ми можемо забезпечити їхній послух."
  heir_religion_law: "Релігія спадкоємця"
  heir_religion_law_desc: "Здатність вирішувати релігію [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] має значне значення у питаннях престолонаслідування та управління. Вона дозволяє правителям та урядам підтримувати релігійну стабільність, забезпечуючи відповідність вірувань та практик правителя віруванням більшості його підданих. Зрештою, влада визначати релігію спадкоємця є важливим елементом у тонкому балансі релігійної свободи, управління та суспільної гармонії."
  heir_special_succession: "Особливе престолонаслідування"
  heir_special_succession_desc: "Релігія [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] визначається не законами, а самим [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e]."
  heir_same_religion: "Та ж релігія"
  heir_same_religion_desc: "Вибір [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] тієї ж релігії, що й панівна, забезпечує відповідність вірувань та практик населення та [ShowEstateTypeName('crown_estate')]. Хоча ця політика може сприяти релігійній згуртованості, вона також може обмежувати можливості для представників інших віросповідань займати керівні посади."
  heir_same_religion_group: "Та ж релігійна група"
  heir_same_religion_group_desc: "Вибір [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] з тієї ж релігійної групи часто бажаний для підтримки релігійної та культурної спадкоємності та запобігання потенційним релігійним конфліктам. Ця політика може допомогти зберегти стабільність королівства, мінімізуючи релігійні розбіжності в керівництві, за рахунок того, що особи з віросповіданнями, що вважаються \"язичницькими\", не зможуть займати керівні ролі."
  heir_any_religion: "Будь-яка релігія"
  heir_any_religion_desc: "Віра є особистою і не відображає та не компрометує здатності особи керувати. [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] може сповідувати будь-яку релігію і все одно обіймати керівні посади. Ця політика несе вищий ризик релігійних конфліктів у керівництві, водночас сприяючи релігійній свободі та загальному прийняттю."
  precious_metal_distribution_law: "Розподіл дорогоцінних металів"
  precious_metal_distribution_law_desc: "[ShowGoodsName('goods_gold')|U] та [ShowGoodsName('silver')] є матеріалами, необхідними для карбування монет. Оскільки наша держава перебуває у вкрай завидній позиції, щоб самостійно збирати ці дорогоцінні метали, ми маємо право вирішувати, хто отримує доступ до цих ресурсів."
  gold_export_ban: "Заборона експорту"
  gold_export_ban_desc: "Ми запровадимо сувору заборону на експорт наших дорогоцінних запасів [ShowGoodsName('goods_gold')] та [ShowGoodsName('silver')] до чужих земель. Це зберігає наше багатство для внутрішнього використання, захищаючи наші скарби від жадібних поглядів інших націй. Хоча цей захід може захистити наші багатства, він обходиться ціною можливостей міжнародної торгівлі. Урочисте рішення для тих, хто ставить святість наших сховищ вище за світову торгівлю..."
  regulated_gold_export: "Регульований експорт"
  regulated_gold_export_desc: "Торгівля нашими цінними ресурсами [ShowGoodsName('goods_gold')] та [ShowGoodsName('silver')] керується пильним оком. Цей збалансований підхід обмежує кількість цих дорогоцінних металів, які можна торгувати, забезпечуючи, щоб наше багатство залишалося переважно в межах наших кордонів. Таким чином, ми досягаємо компромісу між зміцненням нашої економіки та захистом наших національних багатств. Розсудливий вибір для правителів, які прагнуть як фінансової стабільності, так і регіонального впливу."
  unlimited_gold_export: "Необмежений експорт"
  unlimited_gold_export_desc: "Ми відкриємо шлюзи і дозволимо необмежену торгівлю нашими запасами [ShowGoodsName('goods_gold')] та [ShowGoodsName('silver')] з іноземними державами. Цим сміливим кроком ми приймаємо потенціал для неперевершеного накопичення багатства через міжнародну торгівлю. Однак ця політика наражає наші скарби на ризик розсіювання по всьому світу, роблячи їх вразливими до жадібності конкуруючих держав. Сміливий варіант для правителів, які прагнуть домінувати на світовому ринку та пожинати плоди безмежних багатств."
  nobles_rights_laws: "Права $nobles_estate$"
  nobles_rights_laws_desc: "Позиція [ShowEstateTypeName('nobles_estate')] посилюється не лише їхніми привілеями, а й нашими законами."
  strengthen_nobles_rights_policy: "Зміцнити права $nobles_estate$"
  strengthen_nobles_rights_policy_desc: "Клас [ShowEstateTypeName('nobles_estate')] добре служив нашій державі протягом поколінь. З його зростанням, лише доречно, щоб ми продовжували надавати великі привілеї тим родинам, які віддані нашій справі."
  curtail_nobles_policy: "Обмежити $nobles_estate$"
  curtail_nobles_policy_desc: "Зі зростанням держави стає очевидним, що старі шляхетні родини мають занадто великий вплив і владу. Їхнє ревниве занепокоєння щодо цих давніх привілеїв значно перешкоджає розвитку нашого уряду."
  rural_nobles_authority_policy: "Сільська шляхетська влада"
  rural_nobles_authority_policy_desc: "Аристократичний клас є не ворогом уряду, а продовженням центральної влади. Надання їм права керувати сільськими районами, відокремлюючись від національних справ, забезпечує чітке розділення ролей в уряді."
  nobles_electorate_policy: "Електорат $nobles_estate$"
  nobles_electorate_policy_desc: "Стає досить важко утримувати [ShowEstateTypeName('nobles_estate')] вірними [ShowEstateTypeName('crown_estate')]. Встановлення виборчої системи гарантуватиме їхню вірність і матиме додатковий бонус у забезпеченні безпечної спадкоємності."
  por_lei_mental: "Lei Mental"
  por_lei_mental_desc: "$por_lei_mental$ визначає королівські території як невідчужувані. Таким чином, земельні наділи, надані монархом, не можуть бути поділені, і лише старші сини можуть успадковувати території, надані членам [ShowEstateTypeName('nobles_estate')]."
  burghers_rights_laws: "Права $burghers_estate$"
  burghers_rights_laws_desc: "Позиція [ShowEstateTypeName('burghers_estate')] посилюється не лише їхніми привілеями, а й нашими законами."
  strengthen_burghers_rights_policy: "Зміцнити права $burghers_estate$"
  strengthen_burghers_rights_policy_desc: "[ShowEstateTypeName('burghers_estate')] є потужною сутністю в нашій державі з сильним впливом на економіку. Зміцнення та підтвердження їхніх прав посилить їхню лояльність до нашого уряду та захистить нашу економічну стабільність."
  curtail_burghers_policy: "Приборкати $burghers_estate$"
  curtail_burghers_policy_desc: "Купецькі родини стрімко зростають у могутності. Посади, колись зарезервовані для [ShowEstateTypeName('burghers_estate')], тепер може зайняти будь-який купець з товстим гаманцем і достатнім впливом. Їм слід нагадати про їхнє належне місце в нашому суспільстві."
  strong_guilds_policy: "Сильні Гільдії"
  strong_guilds_policy_desc: "Міським життям домінує вплив гільдій, або груп [ShowEstateTypeName('burghers_estate')], які організовуються для захисту національних торговельних інтересів та торговців. Зміцнення влади цих гільдій забезпечить їхню лояльність до держави та збереже міську стабільність."
  colonial_burghers_authority_policy: "Надати Колоніальну Владу"
  colonial_burghers_authority_policy_desc: "Новий Світ – це неймовірна можливість для багатьох, хто шукає багатства. Надавши [ShowEstateTypeName('burghers_estate')] владу над економічними справами наших колоній, ми можемо зайняти їх і віддалити від економічних питань у наших міських центрах."
  clergy_rights_laws: "Права $clergy_estate$"
  clergy_rights_laws_desc: "Позиція [ShowEstateTypeName('clergy_estate')] підкріплюється не лише їхніми привілеями, а й нашими законами."
  strengthen_clergy_rights_policy: "Зміцнити Права $clergy_estate$"
  strengthen_clergy_rights_policy_desc: "Важливість [ShowEstateTypeName('clergy_estate')] для мас незаперечна. Зрештою, саме місцевий клірик безпосередньо веде простолюдина до здобуття божественної прихильності. Гарантування прав для нашого $clergy_estate$ здобуде їхню лояльність, а отже, і лояльність наших [ShowEstateTypeName('peasants_estate')]."
  curtail_clergy_policy: "Приборкати $clergy_estate$"
  curtail_clergy_policy_desc: "Досить часто духовний клас вважає себе арбітром у питанні, чи є державні рішення духовно та морально правильними. Вони втручаються у мирські справи, далекі від духовного світу, і тому їхній вплив має бути значно зменшений."
  separate_clergy_from_state_policy: "Секуляризація Держави"
  separate_clergy_from_state_policy_desc: "Хоча сама релігія не є для нас проблемою, значні права та вплив, якими володіє [ShowEstateTypeName('clergy_estate')], викликають велике занепокоєння для нашої держави та її народу. Жодній релігійній установі ніколи не буде дозволено втручатися у світські питання. Тому офіційне відокремлення [ShowEstateTypeName('clergy_estate')] від уряду є необхідним."
  sheikh_ul_islam_policy: "$common_string_shaikh_al_islam$"
  sheikh_ul_islam_policy_desc: "Старший член #italic 'уламā'#! отримає верховну владу призначати #italic Муфті#! та тлумачити $sharia$, а також затверджувати нових правителів королівства – але не буде сумніву, що незалежно від цього, наш лідер все ще має вищу владу. Цю політику можна розглядати як компроміс, що забезпечує державну владу, водночас закріплюючи роль санкціонованої віри у державних справах."
  crown_rights_laws: "Права $crown_estate$"
  crown_rights_laws_desc: "Позиція [ShowEstateTypeName('crown_estate')] підкріплюється не лише їхніми привілеями, а й нашими законами."
  absolute_rule_policy: "Абсолютне Правління"
  absolute_rule_policy_desc: "Держава найкраще служить, повністю реалізуючи волю свого правителя. Через абсолютне правління ми можемо забезпечити виконання кожного нашого проголошення без затримки — безумовно, на більшу користь для всіх."
  equal_power_relation_policy: "Рівні Владні Відносини"
  equal_power_relation_policy_desc: "Баланс сил між [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] та [ShowEstateTypeName('crown_estate')] є делікатною справою. Наш найкращий варіант — зберегти цей баланс недоторканим, не сприяючи правам правителя і не обмежуючи його владу."
  figurehead_position_policy: "Позиція Фігури"
  figurehead_position_policy_desc: "Правитель представляє державу, але має мало реальної влади. Усі урядові дії та рішення проходять через численні апарати уряду, а не затверджуються одним правителем."
  peasants_rights_laws: "Права $peasants_estate$"
  peasants_rights_laws_desc: "Позиція [ShowEstateTypeName('peasants_estate')] не лише зміцнюється їхніми привілеями, але й нашими законами."
  strengthen_peasants_rights_policy: "Зміцнити права $peasants_estate$"
  strengthen_peasants_rights_policy_desc: "Де інші стани черпають свою владу з матеріального багатства та землеволодіння, сила [ShowEstateTypeName('peasants_estate')] походить від їхньої величезної кількості. Вони значно переважають інші стани, і, організувавшись, можуть становити серйозну загрозу нашій національній стабільності. Захист і зміцнення прав робітничого класу зменшить ймовірність їхнього повстання."
  curtail_peasants_policy: "Обмежити $peasants_estate$"
  curtail_peasants_policy_desc: "Величезне населення нашого нижчого класу становить постійну загрозу стабільності та виживанню нашої держави. Без сильного та переконливого правителя, який би тримав їх під контролем, держава може впасти в анархію. Ми не можемо дозволити їм відчути смак прав і привілеїв, наданих їхнім вищим, що може спокусити їх до повстання."
  intelligence_agency: "Розвідувальне агентство"
  intelligence_agency_desc: "Розвідувальне агентство — це організація в межах держави, яка проводить шпигунську діяльність, таку як розвідка, криптографія та забезпечення безпеки від внутрішніх загроз."
  home_security_policy: "Внутрішня безпека"
  home_security_policy_desc: "Наших потенційних ворогів багато, тоді як друзів важко знайти. Для безпеки держави вкрай важливо, щоб наші шпигуни протидіяли будь-яким таємним іноземним загрозам у межах наших кордонів."
  secret_police_policy: "Таємна поліція"
  secret_police_policy_desc: "Багато суверенів вважають, що їхні найбільші загрози є зовнішніми. Однак наше власне населення може легко спричинити падіння уряду. Сильна таємна поліція, яка пильно стежить за впливовими членами нашого суспільства, необхідна для підтримки непорушної влади на вершині."
  jinyiwei_policy: "Цзіньївей"
  jinyiwei_policy_desc: "#italic $jinyiwei_policy$#!, або «Гвардія в розшитих мундирах», є особистою охороною нашого правителя. Вона має повне право скасовувати судові рішення при переслідуванні ворогів держави. Навіть члени родини нашого правителя не захищені від їхнього впливу!"
  oprichnik_policy: "Опричник"
  oprichnik_policy_desc: "#italic Опричники#!, або «Люди осторонь», є таємною поліцією, присягнутою переслідувати будь-яку небезпечну сутність у нашій державі. Вони непохитно вірні правителю, і їхні дії роблять їх сумнозвісними серед цивільних — чудовий стримуючий фактор для абераційної поведінки."
  spy_office_policy: "Шпигунський офіс"
  spy_office_policy_desc: "Інформація сама по собі є зброєю. Щоб завжди бути на крок попереду наших ворогів, надзвичайно важливо створити мережу шпигунів та інформаторів на нашій службі."
  cabinet_noir_policy: "Кабінет Нуар"
  cabinet_noir_policy_desc: "#italic Кабінет Нуар#!, або «Чорна кімната», відповідає за розвідку, проведення шпигунства в чужих землях та захист правителя від внутрішніх і зовнішніх загроз."
  secretnoye_byuro_policy: "Секретне Бюро"
  secretnoye_byuro_policy_desc: "$secretnoye_byuro_policy$ має на меті карати [ShowPopTypeName('nobles')], засуджених за політичні злочини, хоча іноді вона розглядає справи аполітичного характеру. Покарання, що накладаються на засуджених, часто є дуже болючими та жахливими, щоб відбити критику на адресу правлячого режиму."
  secretnoye_byuro_policy_tt: "Вирішив заснувати відомство під час #Y $flavor_rus.66.title$#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  recruitment_law: "Закон про рекрутування"
  recruitment_law_desc: "Битви не можна виграти без солдатів на полі! Набір бійців є абсолютною необхідністю. З часом спосіб набору солдатів може змінюватися, і наші сили адаптуватимуться до цього за потреби."
  expanded_levies_policy: "Розширені ополчення"
  expanded_levies_policy_desc: "Наше поточне ополчення недостатнє, щоб впоратися з поточним рівнем конфлікту, який ми мусимо витримати. Збільшення розміру нашого ополчення та кількості вояків на полі бою безперечно приведе нас до перемоги, хоча й потенційно на шкоду нашому загальному населенню."
  noble_levies_policy: "Шляхетна Армія"
  noble_levies_policy_desc: "Наше населення є дорогоцінним, і [ShowPopTypeName('nobles')] нашої країни готові віддати свої життя, щоб захистити наші землі. Хоча їхня кров вартує більше, ніж тих, кого вони захищають, з цією спадщиною приходить більша майстерність на полі бою."
  burghers_levies_policy: "Регульована Морська Служба"
  burghers_levies_policy_desc: "Кожне судно в нашій державі має бути мобілізоване у випадку війни. Тому держава повинна підтримувати детальний огляд усіх наших кораблів, включно з торговими суднами, на випадок, якщо вони нам знадобляться."
  calpulli_policy: "Calpulli"
  calpulli_policy_desc: "#italic Calpulli#! — це житлові одиниці, подібні до кварталів, де [ShowEstateTypeName('peasants_estate')] живуть разом у системі, заснованій на родинних зв'язках. Ця система не тільки допомагає створити більшу національну стабільність, але й дає нам надійне джерело робочої сили для нашого постійного стану війни."
  mercenary_army_policy: "Наймана Армія"
  mercenary_army_policy_desc: "Хоча ми можемо скликати наше ополчення в часи потреби, краще дозволити найманцям очолити наступ у бій. У кращому випадку, їхній досвід принесе нам перемогу, а в гіршому — їхні тіла захистять наших вояків під час битви."
  condottieri_contracts_policy: "Контракти Кондотьєрів"
  condottieri_contracts_policy_desc: "Постійні армії є винятком, а не нормою. Таким чином, наша держава мусить покладатися на найманців як на бойові сили нашої держави, що означає, що кращі пропозиції від інших держав можуть змусити їх покинути нашу службу. Завдяки розширеним контрактам #italic Condottieri#! ми можемо забезпечити лояльність цих професійних вояків до держави."
  military_slavery_policy: "Військові Раби"
  military_slavery_policy_desc: "Війни є дорогими, не тільки з точки зору ресурсів, але й людських життів — життів нашого власного народу. Призначення рабів на військові обов'язки допомагає пом'якшити цю проблему. Більше того, після надання компенсації та привілеїв, належних одному з наших вояків, ці раби-воїни з більшою ймовірністю присягнуть на вірність своїм господарям."
  devshirme_system_policy: "Система Девшірме"
  devshirme_system_policy_desc: "Раби набуваються для правлячого двору через практику #italic devşirme#!: Ретельно відібрані немусульманські діти, зазвичай християни віком від 12 до 14 років, відправляються жити до [ShowCultureName('turkish_culture')] сімей, щоб вивчити їхню мову та правила [ShowReligionGroupName('muslim')] вірувань, перш ніж їх зрештою привезуть до столиці. Більшість приєднується до яничарів, високодисциплінованої постійної армії, тоді як ті, хто виявив особливі лідерські та інтелектуальні здібності, зараховуються безпосередньо до королівського двору як пажі."
  black_army_policy: "Чорна Армія"
  black_army_policy_desc: "Незважаючи на аристократичні заперечення, Чорна Армія, безперечно, є ефективною військовою силою. Ми інституціоналізуємо їхню роту і забезпечимо, щоб завжди був резерв ветеранів-вояків, готових приєднатися до їхніх лав."
  early_standing_army_policy: "Рання Постійна Армія"
  early_standing_army_policy_why: "Тільки в [ShowAgeName('age_5_absolutism')] або [ShowAgeName('age_6_revolutions')]"
  early_standing_army_policy_desc: "Ми не мали потреби в постійній армії століттями, оскільки ополчення та найманці досі були тими, хто вів наші битви. Однак часи змінилися, і масштаби війни значно перевищили те, з чим можуть впоратися непідготовлені вояки. Тому настав час створити постійну армію."
  new_model_army_policy: "Нова Модельна Армія"
  new_model_army_policy_desc: "$early_standing_army_policy_desc$"
  allotment_system_policy: "Надільна Система"
  allotment_system_policy_desc: "Надільна Система, або #italic Indelningsverket#!, — це система військового призову, яка забезпечує швидку мобілізацію. Кожен десятий чоловік у країні віком від п'ятнадцяти до сорока чотирьох років буде постійно призваний до національної піхоти, тоді як [ShowEstateTypeName('nobles_estate')], будучи звільненим від податків, мусить надавати кавалерію."
  canton_system_policy: "Кантонна Система"
  canton_system_policy_desc: "Система кантонів розділить країну на адміністративні округи, що називаються #italic кантонами#!, кожен з яких відповідатиме за набір до армії та тісний зв'язок місцевого населення з урядом. Ця система покладається на добровільний вступ, а не на примусовий набір. Однак кожен кантон повинен надати мінімальну кількість солдатів."
  elite_training_policy: "Елітне тренування"
  elite_training_policy_desc: "Хоча сьогоднішні армії постійно зростають у розмірах, кмітливість та моральний дух цих розрізнених новобранців далеко не такі великі. Наші ж люди, навпаки, менші за кількістю, але компенсують це залізною дисципліною, яка може змінити хід битви."
  levee_en_masse_policy: "Політика $mass_army$"
  levee_en_masse_policy_desc: "$mass_army_desc$"
  military_settlements_policy: "Військові поселення"
  military_settlements_policy_desc: "Солдати ділять свій час між сімейним життям на сільських військових фермах та безпосередньою службою в армії. Їхні сім'ї готові надавати майбутні внески до війська, забезпечуючи нам безперервний потік нових рекрутів, одночасно обробляючи землю."
  benefits_for_privateers: "Вигоди для каперів"
  benefits_for_privateers_desc: "Піратство є привабливою перспективою для каперів. Обіцянка скарбів, слави та більше рому для їхніх животів веде багатьох відважних моряків у життя, повне пригод — і небезпек..."
  mch_green_standard_army: "Армія Зеленого Прапора"
  mch_green_standard_army_desc: "$mch_green_standard_army$ — це допоміжна армія, що складається з ханьських [ShowCultureGroupName('chinese_group')] підданих, яка служить для посилення наших сил, а також для підтримання порядку в наших завоюваннях у [ShowSubContinentName('east_asia')]."
  battle_leadership_law: "Закон про бойове лідерство"
  battle_leadership_law_desc: "Армія настільки хороша, наскільки хороше її керівництво. Некомпетентний генерал може стати прокляттям для своєї нації, тоді як військовий лідер великої майстерності буде відомий і страшний на кожному полі бою."
  noble_command_policy: "Шляхетне командування"
  noble_command_policy_desc: "Лідерство — непроста позиція. Вона вимагає харизми, доблесті та знання бою. На щастя для нас, члени [ShowEstateTypeName('nobles_estate')] є експертами у військовому мистецтві та очолять наші сили."
  loyal_pirate_crews: "Вірні каперські екіпажі"
  loyal_pirate_crews_desc: "Моряки, яких ми наймаємо для ведення нашої незаконної діяльності, знайомі з нашими стандартами та поведінкою. Тому нашим капітанам стало легше залучати екіпаж для своїх експедицій."
  mansabdari_system_policy: "Система Мансабдарі"
  mansabdari_system_policy_desc: "#italic Мансабдар#! — це військова одиниця, в якій [ShowEstateTypeName('nobles_estate')] надаються права на землю в обмін на виконання військових та адміністративних послуг. На відміну від інших шляхетних класів, мансаби перебувають під безпосереднім правлінням правителя."
  meritocratic_leadership_policy: "Меритократичне лідерство"
  meritocratic_leadership_policy_desc: "Кожен чоловік, який зможе проявити себе не лише як солдат, а й як лідер, матиме право вести наші армії до слави. Ні шляхетна, ні королівська кров не відіграє ролі в тому, хто може займати цю посаду."
  noble_cadets_policy: "Шляхетні кадети"
  noble_cadets_policy_desc: "Незважаючи на опір з боку [ShowEstateTypeName('nobles_estate')], ми прагнемо зробити армію обраною кар'єрою для безземельних синів аристократії. Ми починаємо їх навчати з юного віку, що означає, що ми не тільки прив'язуємо їх до нас, але й створюємо корпус навчених офіцерів шляхетного походження для майбутнього."
  ruler_general_policy: "Правитель-генерал"
  ruler_general_policy_desc: "Правитель держави має бути також головою війська. Лише тоді наші солдати зможуть кидатися на ворогів з тією справжньою безстрашністю, якої ми від них вимагаємо!"
  army_doctrine_law: "Армійська доктрина"
  army_doctrine_law_desc: "Армійські доктрини представляють набори навичок, у яких наша [Concept('army', 'CONCEPT_PLACEHOLDER')|e] може спеціалізуватися. Чим довше ми працюємо за цими доктринами, тим глибше вони вкорінюються в нашій військовій культурі, і тим вправнішими ми стаємо в них. З часом це може призвести до потужних переваг для наших славетних сил."
  superior_firepower_policy: "Переважна вогнева міць"
  superior_firepower_policy_desc: "Дехто воліє затягувати бої та перетворювати їх на битви на виснаження. Однак ця тактика ставить під загрозу життя наших воїнів. Натомість ми повинні зосередитися на розвитку переважної вогневої міці та швидкому знищенні наших ворогів."
  defensive_stance_policy: "Оборонна позиція"
  defensive_stance_policy_desc: "Наша найбільша сила полягає не в наших наступальних можливостях, а в нашій здатності утримувати оборону. Дозволяючи ворогам виснажувати себе, марно розбиваючи свої сили об наші стіни, ми забезпечимо нашу перемогу."
  large_army_policy: "Велика постійна армія"
  large_army_policy_desc: "Ми прагнемо максимально збільшити розмір нашої армії в будь-який час. Однак це відбувається за рахунок її якості."
  sustained_discipline_policy: "Стійка дисципліна"
  sustained_discipline_policy_desc: "Надзвичайно важливо, щоб наші солдати завжди залишалися дисциплінованими, особливо в хаосі битви. Лише завдяки ретельному муштруванню та високодисциплінованій підготовці ми можемо забезпечити виживання наших людей."
  cavalry_warfare_policy: "Кавалерійська війна"
  cavalry_warfare_policy_desc: "Кавалерія є мобільною силою нашої армії і служить ударними військами в бою. Наші військові зосереджуються на збільшенні її використання та інтеграції кавалерії в наші полки."
  amphibious_specialization_policy: "Амфібійна спеціалізація"
  amphibious_specialization_policy_desc: "Війни, які ми ведемо, виграються не лише на суші, а й на морі. Таким чином, наші війська повинні бути готові до висадки як амфібійний підрозділ, готовий атакувати прибережні укріплення наших ворогів."
  authority_of_the_captain: "Влада капітана"
  authority_of_the_captain_desc: "Влада кожного капітана під нашим командуванням є беззаперечною, до такої міри, що вірні екіпажі йдуть під обстріл за їхніми наказами. Їхня мета — здобич і легендарні пригоди; їхні мрії здійснюються лише під нашим непохитним керівництвом!"
  law_of_the_pious_emperor: "Закон благочестивого імператора"
  law_of_the_pious_emperor_desc: "Збірник перекладених [ShowLanguageName('greek_language')] [GetCountry('BYZ').GetAdjective] книг законів та великих творів античної філософії сербською мовою, виданий імператором [GetCharacter('ser_stefan_dusan').GetName]."
  zamanitchka_voyska: "POSTEDIT_Заманічка Войска"
  zamanitchka_voyska_desc: "Означаючи «Всі разом», ця система загального військового обов'язку вимагає, щоб усі працездатні громадяни, незалежно від віку чи статі, були готові захищати батьківщину, коли їй загрожує небезпека. На відміну від професійних армій чи феодальних ополчень, це мобілізує все населення для захисту своєї незалежності, відображаючи спільну відданість захисту своєї нації."
  paik_system: "Система Пайк"
  paik_system_desc: "$paik_system$ — це система панщинної праці, де працездатні дорослі, так звані #italic Пайки#!, зобов'язані служити в державній міліції в обмін на сільськогосподарські угіддя."
  bureaucracy_law: "Бюрократія"
  bureaucracy_law_desc: "$modern_bureaucracy_desc$"
  centralized_bureaucracy_policy: "Централізована бюрократія"
  centralized_bureaucracy_policy_desc: "Централізована бюрократія закріплена в столиці королівства, більшість рішень приймаються правителем або поблизу нього, а потім розподіляються по провінціях."
  decentralized_bureaucracy_policy: "Децентралізована бюрократія"
  decentralized_bureaucracy_policy_desc: "Децентралізована бюрократія залишає більше рішень місцевим адміністраторам або губернаторам, які потім відповідають перед монархом."
  namestnik_policy: "Намісницький уряд"
  namestnik_policy_desc: "#italic Намісник#! – це бюрократична посада, порівнянна з посадою віце-короля. Вони відповідають за місцеве управління нашими провінціями та державами."
  autonomous_offices: "Автономні установи"
  autonomous_offices_desc: "Купці нашої Ліги користуються особливими привілеями, наданими нашою опікою. Незважаючи на те, що вони об'єднані в неміцний союз, створений на основі взаємних інтересів, вони не обмежені бюрократичними путами та тяганиною."
  port_logs: "Портові журнали"
  port_logs_desc: "Ведучи облік трафіку через наші незаконні порти, ми можемо краще контролювати товари та судна, що користуються нашими об'єктами."
  cabinet_laws: "Кабінетні закони"
  cabinet_laws_desc: "Кабінет є найвищим органом влади в уряді та особистими радниками нашого правителя. Міністри та секретарі кабінету користуються особливими привілеями та правами."
  administrative_clergy_policy: "Адміністративне $clergy_estate$"
  administrative_clergy_policy_desc: "[ShowEstateTypeName('clergy_estate')] вже володіють багатьма навичками, які ми шукаємо в адміністраторах. Вони добре освічені, досвідчені писарі, і вони мають вище покликання. Багато в чому, союз з $clergy_estate$ дав би нам доступ до кваліфікованого кадру потенційних адміністраторів."
  nobles_of_the_robe_policy: "$nobles_estate$ у мантіях"
  nobles_of_the_robe_policy_desc: "Аристократичні родини королівства повинні не лише надавати поради, але й присягати на вічну вірність нашому правителю. Але в міру розширення нашого королівства стає все більш очевидним, що вони повинні служити не лише мечем, а й духом.\n\nНастав час для нового покоління [ShowEstateTypeName('nobles_estate')] служити. Захищені мантіями та озброєні перами, вони боротимуться на службі нашій державі так само, як і їхні броньовані брати."
  meritocratic_recruitment_policy: "Меритократичний набір"
  meritocratic_recruitment_policy_desc: "Ми не можемо дозволити традиції визначати, хто заслуговує на привілей служити нашій зростаючій нації. Натомість ми повинні вивчити здібності кожного кандидата. У меритократичній системі адміністратори обираються за їхні таланти, а не за їхнє походження."
  dynastic_administration_policy: "Династична адміністрація"
  dynastic_administration_policy_desc: "Стани не є надійними союзниками для [ShowEstateTypeName('crown_estate')], оскільки вони завжди надаватимуть пріоритет розширенню власного впливу над служінням державі. Лише родичам правителя слід довіряти управління адміністративними справами нашого королівства."
  yorkist_tradition_policy: "Йоркістська традиція"
  yorkist_tradition_policy_desc: "Освічені люди нижчого стану можуть зробити такий же внесок, як і [ShowEstateTypeName('clergy_estate')], а їхній практичний досвід робить їх чудовим доповненням до будь-якого урядового офісу. Йоркістська традиція стверджує, що будь-який грамотний чоловік знатного походження може приєднатися до лав уряду, разом з тими, хто присвятив себе служінню Богу."
  tribal_legal_basis_law: "Правова основа"
  tribal_legal_basis_law_desc: "Ця правова основа слугуватиме базисом для першого офіційного кодексу законів держави. Його мета проста, але шляхетна: забезпечити справедливе суспільство, де всі можуть жити в мирі та процвітанні."
  codified_power_policy: "Кодифікована влада"
  codified_power_policy_desc: "Немає нічого вищого за закон. Він робить світ справедливішим і врівноважує життя кожного в нашому племені."
  strong_community_customs_policy: "Міцні громадські звичаї"
  strong_community_customs_policy_desc: "Одна справа — співпрацювати в управлінні нашим народом — важливе, але асептичне завдання. Зовсім інша справа — ділити одну й ту саму їжу, одну й ту саму воду, одні й ті самі ритуали під одним сонцем. Звичаї та порядки нашого народу — це те, що ми всі маємо розділяти, святкувати та підтримувати."
  yassa_decree_policy: "Декрет Яси"
  yassa_decree_policy_desc: "Декрет Яси — це усний звід законів [GetCountry('MGE').GetLongName]. Публічно проголошений самим $genghis_khan_name_no_tooltip$, декрет слугує обов'язковим правилом усередині орди, що підтримує стабільність уряду та вірність підданих своєму хану."
  tribal_organization_law: "Племінна організація"
  tribal_organization_law_desc: "Будь-яка група людей потребує певної форми організації, щоб вижити та процвітати. Племінна організація наголошує на колективній ідентичності та звичаєвому праві, і може бути дрібно- або великомасштабною."
  centralized_tribe_policy: "Централізоване плем'я"
  centralized_tribe_policy_desc: "Розділення нашого народу неминуче призводить до хаосу. Передача всієї племінної влади єдиному вождю запобігає суперечливим директивам, забезпечує чіткі ланцюги командування та дозволяє швидко й скоординовано реагувати на загрози."
  federal_tribe_policy: "Федеративне плем'я"
  federal_tribe_policy_desc: "Разом ми сильніші. Ставши Федерацією, підтримка, яку ми отримуємо від наших союзників, ґрунтується не на дипломатії, а на спорідненості."
  clan_council_policy: "Рада кланів"
  clan_council_policy_desc: "Довіра між народом та його лідерами є першочерговою. Обравши раду членів з беззаперечною відданістю нашим інтересам, ми забезпечимо, що влада ніколи не буде в руках однієї особи, і що потреби нашого народу будуть повністю задоволені."
  steppe_warbands_policy: "Степові загони"
  steppe_warbands_policy_desc: "Плем'ям керує рада військових вождів, які постійно шукають та вербують досвідчених бійців для своїх загонів."
  jurchen_council: "[ShowCultureNameWithNoTooltip('jurchen_culture')] Рада"
  jurchen_council_desc: "Рада шляхетних кінних володарів та місцевих кланів, ця вільна адміністрація має на меті підтримувати наші маєтки та володіння, а також захищати нас від конкуруючих кланів."
  tribal_religious_values_law: "Племінні релігійні цінності"
  tribal_religious_values_law_desc: "Релігійні цінності нашого племені диктують не лише те, як ми живемо, а й те, як ми ставимося до тих, хто не поділяє наших вірувань та традицій, як усередині, так і за межами нашої території."
  religious_tribe_policy: "Релігійне плем'я"
  religious_tribe_policy_desc: "Наше розширення зробило нас більш різноманітною та багатолюдною спільнотою, ніж раніше. Хоча кланова вірність може завести нас далеко, сильно релігійне суспільство краще витримує експансію як у часі, так і в просторі, і дасть нам згуртованість, необхідну для ефективного подальшого зростання."
  lip_service_policy: "Показна побожність"
  lip_service_policy_desc: "Релігія, безперечно, є важливим аспектом будь-якого суспільства. Однак вона ніколи не повинна загрожувати безпеці та стабільності племені. Таким чином, ми повинні зайняти більш розслаблений погляд на релігію загалом, водночас публічно виявляючи повагу до духовних питань."
  complete_religious_autonomy_policy: "Повна релігійна автономія"
  complete_religious_autonomy_policy_desc: "Хоча релігійні практики допомагають нам підтримувати нашу легітимність, ми не повинні загрузнути в принципах праведного правління та моралі. Прагматизм заведе нас далі і дозволить підтримувати більшу державу, ніж може рабська духовність."
  tribal_migration_law: "Племінна міграція"
  tribal_migration_law_desc: "Наш народ не займає наші землі постійно. Натомість ми вільно мандруємо, як диктує доля та потреби нашого народу."
  frequent_migration_policy: "Часті міграції"
  frequent_migration_policy_desc: "Жодне місце не може зв'язати нас назавжди, адже наші душі вільні, як сам вітер. Ми повністю кочові й не претендуємо на жодні землі як на власні."
  seasonal_travel_policy: "Сезонні подорожі"
  seasonal_travel_policy_desc: "Як світ змінюється протягом року, так і ми мусимо. Наш народ циклічно переміщується між різними відомими місцями протягом року, щоразу повертаючись до тих самих. Ми, як птахи, мігруємо, щоб знайти кращу їжу, притулок та можливості для розмноження, коли змінюються пори року."
  permanent_settlement_policy: "Постійне поселення"
  permanent_settlement_policy_desc: "Іноді слідувати за бурею не так важливо, як знайти від неї притулок. Настав час заснувати більш постійні поселення, де наш народ зможе жити цілий рік, щороку."
  tribal_cultural_identity_law: "Племінна культурна ідентичність"
  tribal_cultural_identity_law_desc: "З плином часу зростає і наше розуміння власної культури та ідентичності. Нам більше не потрібно боятися сусідніх племен; ми приборкали дику природу і стали її господарями. Тепер настав час прийняти те, ким ми є як народ."
  dynastic_lineage_policy: "Династичний родовід"
  dynastic_lineage_policy_desc: "Родовід наших правителів був божественно благословенний. Їхня королівська кров підтверджує їхню гідність до лідерства, і тому ми повинні довіряти їхньому керівництву, якщо бажаємо знайти славу та процвітання."
  rule_by_the_public_policy: "Правління народом"
  rule_by_the_public_policy_desc: "Щоб забезпечити справедливий уряд, ті, хто має в ньому владу, повинні бути обрані демократичним шляхом. Обираючи наших лідерів, ми обираємо долю нашої нації."
  state_of_faith_policy: "Держава віри"
  state_of_faith_policy_desc: "Дозволяти смертним вирішувати долю нашого народу не слід без духовного керівництва. Наш правитель повинен бути голосом богів і представляти їхнє божественне судження у всьому."
  tribal_identity_policy: "Племінна ідентичність"
  tribal_identity_policy_desc: "Централізовані та формалізовані держави, далекі від цивілізованості, за своєю суттю руйнівні для природи. Ми повинні знайти інший шлях і слідувати традиційному шляху балансу між природним і людським світами, якщо ми хочемо справді процвітати."
  tribal_modernization_law: "Племінна модернізація"
  tribal_modernization_law_desc: "Настав час відкинути наші старі звичаї та зайняти місце у великому світі. Більше не розглядаючись як просте плем'я, ми офіційно станемо країною, яка представляє та захищає наш народ і наш спосіб життя."
  modernize_into_monarchy_policy: "Модернізуватися в $monarchy$"
  modernize_into_monarchy_policy_desc: "$dynastic_lineage_policy_desc$"
  modernize_into_republic_policy: "Модернізуватися в $republic$"
  modernize_into_republic_policy_desc: "$rule_by_the_public_policy_desc$"
  modernize_into_theocracy_policy: "Модернізуватися в $theocracy$"
  modernize_into_theocracy_policy_desc: "$state_of_faith_policy_desc$"
  legal_code_law: "Правовий кодекс"
  legal_code_law_desc: "Відтоді, як люди почали об'єднуватися в суспільства, вони створювали закони, щоб регулювати свої дії та взаємодії. Правові кодекси є відображенням цінностей і переконань суспільства, формуючи все: від того, як люди ведуть бізнес, до того, як вони ставляться один до одного. Вони є самою тканиною, що тримає суспільство разом, забезпечуючи основу для порядку та справедливості. Попри відмінності, люди, як правило, поділяють спільну мету: створити справедливе суспільство, де кожен може жити в мирі та процвітанні."
  traditional_law_policy: "Традиційне право"
  traditional_law_policy_desc: "Існує безліч неформальних каральних систем, розроблених громадами на основі їхніх звичаїв, традицій та цінностей. Ці правові системи передавалися усно з покоління в покоління і глибоко вкорінені в культурі та історії громади.\n\nСила традиційного права полягає в його здатності відображати унікальні потреби та цінності конкретної громади. Воно ґрунтується на спільному розумінні того, що є правильним, а що неправильним, і часто розглядається як більш легітимне та доступне, ніж формальні правові системи. Однак воно також може бути обмежене своєю замкнутістю та відсутністю гнучкості."
  civil_law_policy: "Цивільне право"
  civil_law_policy_desc: "Цивільне право, правова система, що бере коріння в стародавньому Римі, відома своєю точною письмовою кодифікацією законів і правил. Однак жорсткість її структури може перешкоджати адаптації, необхідній для задоволення потреб людей, що розвиваються. Попри це, цивільне право може принести мир і стабільність навіть найбурхливішій нації."
  common_law_policy: "Загальне право"
  common_law_policy_desc: "Загальне право — це правова система, що виникла серед англосаксонських королівств. Вона характеризується опорою на прецедент; судді пов'язані своїми попередніми рішеннями, а не суворим дотриманням писаного закону держави. Це забезпечує певну передбачуваність і послідовність у судових рішеннях, але також може ускладнити адаптацію до мінливих обставин і може призвести до закріплення несправедливих або застарілих законів."
  court_of_appeals: "Апеляційний суд"
  court_of_appeals_desc: "$flavor_swe.15.historical_info$"
  vlach_law_policy: "Влаське право"
  vlach_law_policy_desc: "Унікально поєднуючи пасторальні традиції та правові норми, $vlach_law_policy$ втілює особливу систему, що регулює громади [ShowCultureGroupName('romanian_group')] по всій середньовічній Європі. Вона підтверджує права на подорожі, носіння зброї та полювання, звільняючи їх від обов'язкової праці на землевласників, натомість сплачуючи податки худобою або монетами. Крім того, вона встановлює обов'язкову військову службу, адаптовану до кожного королівства, створюючи мережу [ShowCultureGroupNameWithNoTooltip('romanian_group')] та правової спадщини."
  sharia_law_policy: "Закон $sharia$"
  sharia_law_policy_desc: "Закон $sharia$ — це всеосяжна та глибоко вкорінена правова система в ісламських країнах, яка регулює багато аспектів життя, від особистої поведінки до державних справ. Вона забезпечувала стабільність і безперервність протягом століть, але її суворі, а іноді й жорстокі покарання можуть бути суперечливими та роз'єднувальними."
  sharia_law: "$sharia$ Юриспруденція"
  sharia_law_desc: "$sharia_law_policy_desc$"
  sharia_changed_through_main_school_tt: "Його можна змінити лише через [ShowGenericActionName('change_main_school')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e], якщо ми належимо до однієї з головних #Y Юриспруденційних#! Шкіл"
  hanafi_policy: "$hanafi_school$ Юриспруденція"
  hanafi_policy_desc: "$hanafi_school_desc$"
  hanbali_policy: "$hanbali_school$ Юриспруденція"
  hanbali_policy_desc: "$hanbali_school_desc$"
  maliki_policy: "$maliki_school$ Юриспруденція"
  maliki_policy_desc: "$maliki_school_desc$"
  shafii_policy: "$shafii_school$ Юриспруденція"
  shafii_policy_desc: "$shafii_school_desc$"
  zahiri_policy: "$zahiri_school$ Юриспруденція"
  zahiri_policy_desc: "$zahiri_school_desc$"
  ismaili_policy: "$ismaili_school$ Юриспруденція"
  ismaili_policy_desc: "$ismaili_school_desc$"
  jafari_policy: "$jafari_school$ Юриспруденція"
  jafari_policy_desc: "$jafari_school_desc$"
  zaidi_policy: "$zaidi_school$ Юриспруденція"
  zaidi_policy_desc: "$zaidi_school_desc$"
  ibadi_policy: "$ibadi_school$ Юриспруденція"
  ibadi_policy_desc: "$ibadi_school_desc$"
  pyrenean_law_policy: "Піренейське право"
  pyrenean_law_policy_desc: "Піренейське право — це правова система, притаманна народам, що мешкають навколо Піренейських гір. Попри те, що це право зазнало впливу як $civil_law_policy$, так і готського права, воно залишалося відмінним від них. Заснована на традиційних звичаях і практиках, ця правова система настільки вкорінена в нашій культурі, що правителі зобов'язані адаптуватися до неї, а не замінювати її власними системами."
  russkaya_pravda_policy: "Руська Правда"
  russkaya_pravda_policy_desc: "Це був правовий кодекс Київської Русі, що зазнав сильного впливу їхнього норманського походження. З моменту свого створення він багато разів переписувався протягом століть і є основним джерелом давньоруського права."
  pskov_judicial_charter_policy: "Псковська судна грамота"
  pskov_judicial_charter_policy_desc: "Псковська судна грамота — це давньоруський правовий кодекс, побудований на $russkaya_pravda_policy$. Він охоплює багато важливих рис політичного, соціального та економічного життя Пскова."
  novgorod_judicial_charter_policy: "Новгородська судна грамота"
  novgorod_judicial_charter_policy_desc: "Новгородська судна грамота — це давньоруський правовий кодекс, який кодифікує багато поширених практик у Новгороді. Він також встановлює та визначає чотири посади в Новгородському суді та охоплює адміністративні питання держави."
  bav_codex_bavarica: "Верхньобаварські земельні права"
  bav_codex_bavarica_desc: "«Верхньобаварські земельні права» — це збірка старих баварських правових кодексів, яка кодифікує багато поширених практик у Баварії. Вона також встановлює та визначає роль [ShowEstateTypeName('nobles_estate')] у суді $BAV$ та охоплює адміністративні питання держави."
  brehon_law_policy: "Брегонське право"
  brehon_law_policy_desc: "Брегонське право — це система стародавнього ірландського права, що розвинулася з дохристиянських звичаїв і традицій. Його унікальна зосередженість на реституції та компенсації, а не на покаранні, підкреслює важливість соціальної гармонії та громадських відносин. Однак відсутність формальних правових інститутів та механізмів примусу може призвести до непослідовності та невизначеності в його застосуванні."
  cyfraith_hywel_policy: "Кифрайт Гівел"
  cyfraith_hywel_policy_desc: "Валлійське право, також відоме як #italic Cyfraith Hywel#!, — це унікальна правова система, що виникла зі стародавніх звичаїв Уельсу. Вона відрізняється як від загального права, так і від цивільного права тим, що наголошує на відновному правосудді, приділяючи більшу увагу компенсації та примиренню, а не покаранню. Закон був створений валлійськими королями та принцами для сприяння єдності та порядку серед валлійського народу, і відомий своєю складністю та дотриманням прецедентів."
  fetha_negest_policy: "Фета Негест"
  fetha_negest_policy_desc: "#italic Fetha Negest#!, або Правосуддя Королів, є теократичним правовим кодексом, укладеним Абу'л-Фада'ілом ібн аль-Ассалом, і є значною працею з правосуддя. Спираючись на апостольські писання та візантійські правові кодекси, він охоплює церковні та світські питання і далі перебуває під впливом римського права."
  byzantine_law: "Візантійське право"
  byzantine_law_desc: "Візантійське право, що розвинулося з римського права під християнським та елліністичним впливом, значною мірою походить від #italic Corpus Juris Civilis#! Юстиніана, яке підкреслює церемоніальні ролі імператора та відображає філософські та релігійні ідеали."
  goryeon_code_policy: "Горьоський кодекс"
  goryeon_code_policy_desc: "$goryeon_code_policy$, також відомий як #italic Gyeongje Yukjeon#! - #italic Шість Кодексів Управління#! - є кодексом законів $korea_region$. Сформований китайським бюрократичним мистецтвом, цей кодекс панував у нашій державі протягом століть."
  joseon_code_policy: "Чосонський кодекс"
  joseon_code_policy_desc: "$joseon_code_policy$, також відомий як #italic Gyeongguk Daejeon#! - #italic Національний Кодекс#! - є переглядом старого $goryeon_code_policy$. Із заснуванням нової династії, багато законів і традицій попереднього кодексу були заново зібрані в поточному кодексі."
  chi_ming_dynasty_code_policy: "Великий Кодекс"
  chi_ming_dynasty_code_policy_desc: "$chi_ming_dynasty_code_policy$ буде створено, щоб вирішити всі критичні проблеми, з якими стикається наша династія та з якими стикалися наші попередники. Це забезпечить, що ми не піддамося корупції та міністерським зловживанням владою!"
  scottish_civil_law: "Шотландське цивільне право"
  scottish_civil_law_desc: "Колегія Правосуддя реформувала наше Цивільне право до нового стандарту. Ця установа складається з добре освічених членів нашої країни, які ухвалюватимуть рішення з будь-якого важливого питання, що стосується #italic Шотландського права#!."
  naval_doctrine_law: "Військово-морська доктрина"
  naval_doctrine_law_desc: "Військово-морські доктрини представляють набори навичок, в яких наш [Concept('navy', 'CONCEPT_PLACEHOLDER')|e] може спеціалізуватися. Чим довше ми працюємо над доктринами, тим глибше вони вкорінюються в наших флотах і тим краще ми їх освоюємо. З часом це може призвести до потужних бонусів для наших славетних флотів."
  economical_policies_law: "Економічна політика"
  economical_policies_law_desc: "Економічна політика нації визначає конкретні економічні цілі та засоби їх досягнення, а також приймає рішення та створює регуляції щодо оподаткування, витрат, валюти, торгівлі тощо."
  lockean_proviso_policy: "Локківська умова"
  lockean_proviso_policy_desc: "Ця умова обмежує привласнення власності, вимагаючи, щоб коли хтось претендує на безхазяйні ресурси, були доступні однаково цінні ресурси для інших. Уряд регулює цей баланс і забезпечує, щоб придбання приватної власності не позбавляло інших їхньої рівної можливості здобути багатство."
  war_economy_policy: "Військова економіка"
  war_economy_policy_desc: "Економічна безпека держави ґрунтується на нашій здатності вести та вигравати війни. Мануфактури в нашій державі не повинні мати іншої мети, окрім як підживлювати наші військові амбіції."
  embrace_the_economic_theory_policy: "Прийняти економічну теорію"
  embrace_the_economic_theory_policy_desc: "Економіка відіграє життєво важливу роль в апараті держави. Складні системи торгівлі, фінансів та розкоші повинні бути керовані нашими інтелектуалами та вченими, щоб найкраще служити потребам уряду."
  free_trade_policy: "Вільна торгівля"
  free_trade_policy_desc: "Купці з усього світу повинні мати змогу торгувати в межах наших кордонів. Відмовившись від вузькості меркантилізму, держава тепер отримає легший доступ до іноземних товарів — і дукатів."
  royal_charter_policy: "Королівські хартії"
  royal_charter_policy_desc: "Королівські хартії — це дозволи, надані [ShowEstateTypeName('crown_estate')] окремим особам або торговим компаніям, які наділяють їх унікальними правами та повноваженнями. Ці хартії є чудовим способом для нас підтримувати підприємства — та використовувати можливості — за кордоном."
  cameralism_policy: "Камералізм"
  cameralism_policy_desc: "Щоб зміцнити наше економічне становище та привабити іммігрантів, ми покладатимемося на бюрократичну систему, призначену для детального адміністрування наших зусиль. Ці палати організовуватимуть усе: від будівництва нових мануфактур до розподілу нових поселенців, які прибувають на нашу територію."
  black_market_consortium: "Консорціум чорного ринку"
  black_market_consortium_desc: "Піратам, що безчинствують у республіці, не можна довіряти навіть миття, не кажучи вже про управління нацією, майбутнє якої висить на вістрі ятагана. Консорціум, сформований з найвпливовіших торговців чорного ринку, буде створений як його справжні правителі. Прибуток має стояти вище за свободу."
  legitimization_of_power_law: "Легітимізація влади"
  legitimization_of_power_law_desc: "Монархія може вижити лише доти, доки її піддані вірять у легітимність свого правителя. Існує багато способів, якими правителі виправдовують свою владу. З часом виникатимуть нові політичні філософії, які по-своєму пояснюватимуть потребу в сильному уряді."
  machiavellian_rule_policy: "Правління Макіавеллі"
  machiavellian_rule_policy_desc: "Держава стоїть вище моралі; вище чеснот і гріхів. Уряд повинен приймати рішення, ґрунтуючись виключно на вигодах для держави — навіть якщо вони вважаються злими. Таким чином, суверен має право діяти на благо держави без моральних міркувань."
  six_livres_policy: "#italic Шість книг про республіку#!"
  six_livres_policy_desc: "Абсолютне правління одного монарха є настільки ж згубним для держави, як і дозвіл масам керувати собою. Влада монарха не повинна підлягати жодній фракції всередині держави, хоча певною мірою вона повинна бути обмежена інституціями для підтримки балансу сил між правителем і народом."
  two_treatises_of_government_policy: "#italic Два трактати про правління#!"
  two_treatises_of_government_policy_desc: "Природа людства характеризується розумом і толерантністю. Жодна людина не народжується злою. Однак людська природа спонукає наших людей бути егоїстичними та діяти лише на власну користь.\nУряд забезпечує цивілізоване вирішення цього егоїзму. Він також служить для захисту природних прав на життя, здоров'я, свободу та власність."
  the_leviathan_policy: "#italic Левіафан#!"
  the_leviathan_policy_desc: "Життя без цивілізації, також зване природним станом, є анархією. Кожен сам за себе, і війна всіх проти всіх є єдиним можливим результатом без абсолютної централізованої влади, яка б тримала все під контролем.\nНаш народ поступається багатьма правами нашій суверенній владі заради захисту від повного знищення."
  the_social_contract_policy: "Суспільний договір"
  the_social_contract_policy_desc: "Суспільний договір — це концепція, згідно з якою легітимний уряд виникає з взаємної згоди між індивідами об'єднатися та сформувати громадянське суспільство.\nХоча певні обмеження накладаються на природні свободи людей у цьому суспільстві, вони поступаються ними в обмін на безпеку та переваги, що надаються державою."
  the_liberty_of_ancients_vs_moderns_policy: "Свобода давніх проти свободи сучасних"
  the_liberty_of_ancients_vs_moderns_policy_desc: "Концепції індивідуалізму та свободи значно еволюціонували протягом століть, і старі ідеали сильно відрізняються від сучасних інтерпретацій. Наша держава може найкраще забезпечити індивідуальні свободи та волю нашого народу, синтезуючи сучасну мудрість із мудрістю минулого."
  foreign_cultural_law: "Закон про іноземну культуру"
  foreign_cultural_law_desc: "Зі зростанням розмірів нашої держави зростає і складність наших соціальних структур. Культурна єдність у нашій державі більше не є даністю, і тепер нам потрібна політика для встановлення та підтримки внутрішнього миру."
  allow_foreign_rituals: "Дозволити іноземні ритуали"
  allow_foreign_rituals_desc: "Культура багато в чому схожа на релігію тим, що вона диктує соціальні цінності та традиції і перебуває під впливом середовища, в якому вона розвивається. Прийняття іноземців у нашому населенні такими, якими вони є, і дозвіл їм жити своїм способом життя без перешкод забезпечить мирне співіснування."
  integrate_foreign_traditions: "Інтегрувати іноземні традиції"
  integrate_foreign_traditions_desc: "Хоча іноземні ідеї можуть бути для нас чужими, ми все ж повинні бути в курсі цікавих ідей та інновацій у цих іноземних культурах і переймати ті, що служитимуть нам і нашому народу. Це полегшить асиміляцію іноземців у наше суспільство, одночасно збільшуючи наш власний культурний вплив."
  blood_tax_of_foreigners: "Кривавий податок з іноземців"
  blood_tax_of_foreigners_desc: "Культурні аспекти нашого меншинного населення нас мало турбують. Доки вони надають солдатів для наших військових зусиль, коли це потрібно, ці іноземці вільні практикувати свої традиції."
  agrarian_constitution: "Аграрна Конституція"
  agrarian_constitution_desc: "Ця правова система прагне максимізувати економічну експлуатацію та управління завойованими нами територіями. Підкорене населення юридично зобов'язане пройти реорганізацію, що призводить до створення сільських поселень. Ця система спрямована на інтеграцію місцевих жителів у нашу адміністрацію, їх поступове навернення та розширення нашого впливу."
  cultural_traditions_law: "Культурні Традиції"
  cultural_traditions_law_desc: "Давня традиція є основою багатьох культур і цивілізацій. Хоча прогрес буде вести нас до величі, наші традиції завжди слугуватимуть нам нагадуванням про наше походження та джерелом сили й єдності нашого народу."
  martial_society: "Військове Суспільство"
  martial_society_desc: "Військові цінності завжди були важливими в нашому суспільстві, але з розширенням наших кордонів потреба в мілітаризації стає все більш очевидною. Ми повинні продовжувати цю тенденцію та будувати сильну націю з військовою міццю в її основі."
  civil_society: "Громадянське Суспільство"
  civil_society_desc: "Сильна нація потребує більше, ніж військова міць — їй потрібне динамічне громадянське суспільство, де ремісники, торговці, священнослужителі та установи всіх видів можуть процвітати, створюючи заможні громади, які генерують багатство, підтримують соціальний порядок та сприяють розвитку витонченої держави."
  pietism_society: "Прусські Чесноти"
  pietism_society_desc: "Чесноти пієтизму — старанність, щирість і почуття обов'язку понад усе — є основними цінностями нашого суспільства."
  maritime_society: "Морське Суспільство"
  maritime_society_desc: "Наші морські традиції формують саму тканину нашого суспільства. Об'єднані в захваті від приборкання моря та подорожей до іноземних портів, наші люди здобули собі ім'я майстрів морських справ."
  plc_sarmatism: "Сарматизм"
  plc_sarmatism_desc: "Наше суспільство походить від давніх сарматів. Однак $plc_sarmatism$ — це не просто теорія походження, а культурне та політичне явище, що пропагує ідеали [ShowSocietyDirectionName('aristocracy')] та [ShowEstatePrivilegeName('golden_liberty')]."
  marriage_law: "Шлюбне Право"
  not_catholic_theocracies: "[ShowReligionAdjective('catholic')] [ShowGovernmentTypeName('theocracy')] не може мати цієї [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]."
  marriage_law_desc: "Шлюбне право стосується правової системи, яка регулює інститут шлюбу в межах певної юрисдикції."
  monogamous_marriage: "Моногамний Шлюб"
  monogamous_marriage_desc: "Моногамний шлюб стосується культурної або суспільної практики союзу між двома особами, заснованої на усталених звичаях, цінностях і нормах."
  muslim_marriage: "Ніках"
  muslim_marriage_desc: "$muslim_marriage$ в ісламській культурі — це урочистий і юридично обов'язковий шлюбний договір між чоловіком і жінкою."
  adamite_marriage: "Общинне Життя"
  adamite_marriage_desc: "Секта адамитів відкидає концепцію традиційного шлюбу, віддаючи перевагу життю в общинних структурах без чіткої ієрархії."
  dishu_system: "Система Дішу"
  dishu_system_desc: "Система $dishu_system$ дозволяє утримання наложниць при дворі задля забезпечення спадкоємців."
  polygyny: "Полігінія"
  polygyny_desc: "Шлюб між чоловіком та кількома жінками вважається ознакою багатства та влади у багатьох громадах."
  celibacy: "Целібат"
  celibacy_desc: "Целібат означає стан утримання від шлюбу та статевих стосунків. Це вибір, часто пов'язаний з релігійними або особистими переконаннями, що підкреслює життя без романтичного чи сексуального партнера."
  slavery_laws: "Закони про рабство"
  slavery_laws_desc: "Наплив робітників та дешевої робочої сили із зовнішніх джерел довгий час був наріжним каменем нашої економіки, як вдома, так і за кордоном. Питання прийняття чи заборони є чітким відображенням того, яке місце нижчі верстви, і раби зокрема, займають у нашому суспільстві."
  slavery_allowed: "Торгівля рабами дозволена"
  slavery_allowed_desc: "Торгівля рабами та рабство юридично дозволені по всій нашій державі."
  slavery_outlawed: "Торгівля рабами заборонена"
  slavery_outlawed_desc: "Торгівля рабами та рабство відтепер заборонені по всій нашій державі."
  ottoman_war_slave_tax: "Податок Пенчик"
  ottoman_war_slave_tax_desc: "За степовою традицією, одна п'ята частина військової здобичі йшла вождю. Тому тепер одна п'ята частина всіх рабів, захоплених у війні, піде державі."
  pte_slavery_allowed: "@slaves_goods! Рабство дозволено: #G Yes#!"
  pte_slavery_export_allowed: "@slaves_goods! Експорт рабів дозволено: #G Yes#!"
  pte_slavery_export_import: "@slaves_goods! Імпорт рабів дозволено: #G Yes#!"
  fleet_in_being: "Флот у наявності"
  fleet_in_being_desc: "Наш морський вплив відчуватиметься без витрат на вихід нашого флоту з порту за винятком найсприятливіших умов."
  free_oarsmen: "Вільні веслярі"
  free_oarsmen_desc: "Ми відмовимося від практики примушувати рабів та засуджених гребти на наших галерах. Вільні люди, стійкі перед лицем негараздів та несхильні до дезертирства, стануть мускулами нашого флоту."
  merchant_navy: "Торговий флот"
  merchant_navy_desc: "Головна директива нашого флоту — служити фінансовим інтересам держави. Будуть докладені всі зусилля, щоб наші вантажні судна завжди були навантажені іноземними багатствами."
  ship_boarding: "Абордаж"
  ship_boarding_desc: "Зі встановленим Призовим правом та щедрими Каперськими грамотами, ми будемо плекати звичай захоплювати ворожі кораблі цілими."
  wooden_wall: "Дерев'яна стіна"
  wooden_wall_desc: "У світі стрімких змін моря залишаються надзвичайно важливими для нашої нації. Як засіб для забезпечення нашого панування, так і як перша лінія оборони, наша «дерев'яна стіна» військових кораблів здобуде перемогу."
  grand_armada: "Велика Армада"
  grand_armada_desc: "Великий конвой супроводжуватиме флоти скарбів, що доставляють багатства наших заморських володінь до наших рідних портів."
  portuguese_marines: "[GetCountry('POR').GetAdjectiveWithNoTooltip] Морська піхота"
  portuguese_marines_desc: "Щоб заснувати справді глобальну імперію, ми повинні бути вправними у здійсненні штурмів ворожих фортів з моря."
  ordinance_sea: "Морський Устав"
  ordinance_sea_desc: "Середземномор'я має багато морських держав, проте жодна з них не володіє ані нашим досвідом, ані нашою законодавчою експертизою. Устави нашого флоту гарантують, що наш флот завжди готовий до будь-якого виду морських боїв."
  danish_admirality: "[GetCountry('DAN').GetAdjectiveWithNoTooltip] Адміралтейство"
  danish_admirality_desc: "Інші вихваляються своїми чудовими конструкціями кораблів або своїми відчайдушними моряками, які б'ються до безглуздої смерті. Ми, однак, знаємо краще. Жоден флот, незалежно від якості його будівництва чи мужності людей, яких він несе, не може здобути перемогу без сильного лідера. Ми приймемо цю філософію і тим самим значно покращимо нашу морську ефективність."
  norwegian_sailors: "[GetCountry('NOR').GetAdjectiveWithNoTooltip] Моряки"
  norwegian_sailors_desc: "Від самого заснування нашої нації наш народ жив за рахунок океану та узбережжя. Рибальство, набіги, морські битви — наші моряки мають більше досвіду, ніж моряки будь-якої іншої морської нації, і ми будемо розвивати цей досвід ще далі."
  venetian_galleys: "[GetCountry('VEN').GetAdjectiveWithNoTooltip] Галлери"
  venetian_galleys_desc: "Галлери формують основу нашої національної та комерційної безпеки. Таким чином, велика увага наших військово-морських та військових тактик зосереджена на тому, як найкраще використовувати наші найдосконаліші галлери для перемоги над будь-яким морським ворогом."
  venetian_oarsmen_conscription: "[GetCountry('VEN').GetAdjectiveWithNoTooltip] Призов веслярів"
  venetian_oarsmen_conscription_desc: "Наш великий флот гостро потребує моряків. Призов веслярів та їх надійне приковування до наших кораблів забезпечить нам достатньо моряків для укомплектування нашого нового флоту... подобається їм це чи ні."
  dutch_trade_fleet: "Голландський торговий флот"
  dutch_trade_fleet_desc: "Нації [ShowContinentName('europe')] використовують свої флоти для проектування своєї могутності через морську війну. Ми ж, навпаки, використовуватимемо наш флот, щоб досягти найвіддаленіших куточків світу, щоб ми могли торгувати з іноземними культурами, поки наші сусіди бомбардують узбережжя один одного."
  basque_mariners: "[ShowCultureNameWithNoTooltip('basque')] Мореплавці"
  basque_mariners_desc: "Наш народ переслідував китів до самого краю світу, здійснював набіги на узбережжя та привозив цінні товари з інших земель, вивчаючи таємниці океану протягом багатьох років досліджень. Цей досвід зробив наших моряків відважними та надійними, цінним доповненням до будь-якого флоту, який їх наймає."
  maritime_law: "Морське право"
  maritime_law_desc: "Морські закони, також відомі як адміралтейські закони або морські закони, є спеціалізованим набором правових принципів і норм, що регулюють різні аспекти морської діяльності та торгівлі. Ці закони охоплюють широкий спектр питань, пов'язаних з навігацією, судноплавством, торгівлею та морською діяльністю, що відбувається в океанах, морях та інших судноплавних водних шляхах. Вони охоплюють такі сфери, як морські контракти, право власності та реєстрація суден, морське страхування, рятування та уламки, відповідальність та компенсація за морські аварії, права та обов'язки екіпажу та багато інших аспектів, що стосуються морських справ. Морські закони розроблені для забезпечення безпечних, упорядкованих та справедливих практик у морській галузі та вирішення спорів, які можуть виникнути в контексті морської діяльності."
  forestry_ordinance: "Лісовий Ордонанс"
  forestry_ordinance_desc: "Не кожне дерево в лісі придатне для суднобудування. Щоб забезпечити найвищу якість наших кораблів, ми законом вимагатимемо, щоб будь-які зрубані дерева, придатні для будівництва кораблів, негайно передавалися для цієї мети."
  mandatory_impressment: "Обов'язковий призов"
  mandatory_impressment_desc: "Кожне прибережне поселення зобов'яже своїх молодих чоловіків до військово-морської служби, які мають присвятити щонайменше один рік нашим флотам."
  navy_audits: "Аудит флоту"
  navy_audits_desc: "Флот у занепаді може стати небезпечною перешкодою у скрутні часи. Тому ми проводитимемо регулярні аудити технічного обслуговування наших головних верфей та портів, щоб наш флот завжди був у ідеальному стані."
  protect_trade_routes: "Захист торгових шляхів"
  protect_trade_routes_desc: "Флот охоронятиме наші головні торгові шляхи, щоб тримати піратів та інших небажаних осіб подалі від наших торгових флотів."
  shipwright_standard_regulation: "Стандартний регламент суднобудівників"
  shipwright_standard_regulation_desc: "Ми ухвалимо закон про створення стандарту для суднобудівників, щоб бути ефективнішими при будівництві кораблів."
  ara_consulate_sea: "Консулат моря"
  ara_consulate_sea_desc: "Консулат моря — це новий квазісудовий орган, який керуватиме морським та комерційним правом."
  nav_maritime_code: "Наваррський морський кодекс"
  nav_maritime_code_desc: "Базуючись на оригінальному Фуеро Сан-Себастьяна, найстарішому морському праві в [ShowContinentName('europe')], цей кодекс застосовується до кожного порту в нашому володінні та деталізує права та обов'язки їхніх мешканців."
  piracy_law: "Закон про піратство"
  piracy_law_desc: "Закони про піратство визначають офіційну позицію, яку наша нація займає при вирішенні викликів, що постають від піратства. Ці закони охоплюють статути, положення та правові доктрини, спрямовані на ефективну боротьбу або управління піратством. Вони втілюють колективну стратегію та заходи, які наша нація впроваджує для підтримки морської безпеки та захисту наших вод від піратських загроз. Або, можливо, це просто правила, яких ми дотримуємося, здійснюючи акти піратства..."
  state_piracy_policy: "Державне піратство"
  state_piracy_policy_desc: "Наша нація повністю підтримує акти піратства проти наших ворогів. Наша репутація може постраждати від використання цієї тактики, але економічні вигоди можуть бути величезними."
  has_state_piracy_policy_access: "Має або [ShowAdvanceName('privateers')], або [ShowAdvanceName('letters_of_marque')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e], або є однією з відповідних країн."
  issue_letter_of_marque_policy: "Каперські свідоцтва"
  issue_letter_of_marque_policy_desc: "Хоча піратство не є тим, що ми обов'язково підтримуємо, воно надає чудову можливість нацькувати професійних злочинців на наших ворогів. Ми видаватимемо каперські свідоцтва капітанам-каперам, щоб вони могли вільно атакувати кораблі наших ворогів, не боячись переслідування."
  has_privateers_or_LoM_advances: "Має або [ShowAdvanceName('privateers')], або [ShowAdvanceName('letters_of_marque')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e]."
  anti_piracy_policy: "Боротьба з піратством"
  anti_piracy_policy_desc: "Наша нація присвячена викоріненню будь-яких піратських загроз, що можуть виникнути. Будь-який акт піратства буде покараний та переслідуваний, а кораблі, що здійснюють ці незаконні дії, будуть атаковані без пощади."
  anti_piracy_policy_at: "Думка кожної відомої [Concept('country', 'CONCEPT_PLACEHOLDER')|e] з [ShowPolicyName('state_piracy_policy')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] щодо нас змінюється на [ShowBiasValue('allows_state_piracy_modifier')|+=0]."
  anti_piracy_policy_dt: "Думка кожної відомої [Concept('country', 'CONCEPT_PLACEHOLDER')|e] з [ShowPolicyName('state_piracy_policy')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] щодо нас змінюється на [ShowBiasValue('allows_state_piracy_modifier')|-=0]."
  witchcraft_act: "Закон про чаклунство"
  witchcraft_act_desc: "Якщо ми хочемо жити благочестивим життям і викорінити корупцію та зло серед нас, ми повинні вирішити зростаючі занепокоєння багатьох щодо існування відьом та практики окультизму."
  witchcraft_banned: "Заборонено"
  witchcraft_banned_desc: "Пекельна практика чаклунства та звернення до відьом стали злочинами, що караються смертю. Кожен, хто переступить межу, пожне те, що посіяв..."
  witchcraft_ignored: "Ігнорується"
  witchcraft_ignored_desc: "Так звана практика чаклунства — це лише забобони, або, можливо, наслідки нетравлення шлунка. У будь-якому разі, уряду є на що витратити свій час."
  language_of_pleading: "Мова судочинства"
  language_of_pleading_desc: "Звичаї нашої соціальної ієрархії та судових процесів мають бути стисло та одноманітно записані мовою, яку ми вважаємо найдоречнішою."
  language_of_pleading_court: "Судова мова"
  language_of_pleading_court_desc: "Затуляючи повсякденні юридичні процеси престижною мовою, яку використовує лише [ShowEstateTypeName('crown_estate')], простолюд не зможе так легко втручатися у державні справи."
  language_of_pleading_common: "Загальнодоступна мова"
  language_of_pleading_common_desc: "Уточнюючи повсякденні юридичні процеси загальнодоступною мовою, звичайні люди стають менш схильними порушувати закон."
  multi_lingual_court: "Багатомовний суд"
  multi_lingual_court_desc: "Надаючи рівні права всім мовам нашого королівства, ми забезпечуємо підтримку [ShowEstateTypeName('peasants_estate')] та стабільність королівства."
  statutes_of_lithuania_policy: "Статути [GetCountry('LIT').GetNameWithNoTooltip]"
  statutes_of_lithuania_policy_desc: "Серія кодифікованих законів, спрямованих на підтвердження юридичних обов'язків та рамок еліт, а також на сприяння хвилі централізації."
  articles_of_agreement: "Статті угоди"
  articles_of_agreement_desc: "$articles_of_agreement$ є наріжним каменем соціального порядку на борту піратського корабля. Вони гарантують, що кожен член екіпажу має рівний голос у всіх питаннях та рівну частку всієї здобичі. Такі статті мають бути встановлені для самої республіки, щоб забезпечити свободу та рівність усіх піратів."
  colonial_policy: "Колоніальна політика"
  colonial_policy_desc: "Це встановлює політику, якої наша країна дотримуватиметься у колоніальних справах."
  settled_colonies: "Освоєні колонії"
  settled_colonies_desc: "Ми прийняли колоніальну політику, яка заохочує заснування поселень на нововідкритих землях, де поселенці з серця нашої нації можуть експлуатувати будь-які [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e] та продовжувати розширюватися вглиб країни."
  trade_colonies: "Торгові колонії"
  trade_colonies_desc: "Ми прийняли колоніальну політику, яка заохочує заснування торгових постів та антрепо у стратегічних місцях, що спрямовані на обмін різними товарами та відкриття нових [Concept('markets', 'CONCEPT_PLACEHOLDER')|e] на благо нашої економіки."
  encomienda_system_policy: "Система енком'єнди"
  encomienda_system_policy_desc: "Ми призначимо регіонального губернатора від нашого імені, який відповідатиме за збір данини з корінного населення району. Ця організація дозволяє нам ефективно та з меншими витратами, ніж зазвичай, створювати колонії, хоча це, безумовно, не сприяє нашим стосункам з місцевими жителями."
  valladolid_sepulveda: "Сепульведа"
  valladolid_sepulveda_desc: "Ми прийняли колоніальну політику відповідно до міркувань Сепульведи про те, що корінні народи природно схильні бути рабами, і що рабство також є найкращим способом для їхніх [ShowReligionGroupAdjective('christian')] володарів навернути їх до істинної віри. В результаті, землевласники в наших колоніях не несуть відповідальності за те, як вони поводяться з місцевим населенням, і можуть зрештою отримувати більші прибутки від їхньої праці."
  valladolid_las_casas: "Лас Касас"
  valladolid_las_casas_desc: "Ми прийняли колоніальну політику відповідно до міркувань Лас Касаса про те, що корінні народи не є варварами і мають вільну волю. Тому вони повинні навертатися до християнства за власною вільною волею і не можуть бути поневолені без наслідків."
  has_unlocked_this_policy_tt: "Розблоковано цю політику"
  portuguese_colonial_captains: "[GetCountry('POR').GetAdjectiveWithNoTooltip] капітанства"
  portuguese_colonial_captains_desc: "Ми прийняли колоніальну політику, яка передбачає, що чиновники, які представляють нашу імперію, отримуватимуть лише символічну зарплату — в обмін на щедру частину наших колоніальних прибутків."
  portuguese_governorate_general: "[GetCountry('POR').GetAdjectiveWithNoTooltip] Генерал-губернаторство"
  portuguese_governorate_general_desc: "Наші колонії керуватимуться одним центральним офісом, якому підпорядковуватимуться всі регіональні капітанства. Це забезпечує наш централізований контроль над нашими колоніями."
  native_policy: "Політика щодо корінних народів"
  native_policy_desc: "Це встановлює політику, якої наша країна дотримуватиметься щодо корінних народів, що населяють наші колонії."
  native_trade: "Торгівля"
  native_trade_desc: "Наші колоніальні органи заохочуватимуть торгівлю з корінним населенням, щоб забезпечити регулярний потік прибуткових товарів на наші ринки."
  native_subjugation: "Підкорення"
  native_subjugation_desc: "Наші колоніальні органи намагатимуться підкорити корінне населення, перетворивши його на нове, прибуткове джерело робочої сили для нашої країни."
  native_integration: "Інтеграція"
  native_integration_desc: "Наші колоніальні органи намагатимуться інтегрувати корінне населення з нашим власним, щоб зробити його більш самодостатнім та сприяти соціальній стабільності."
  administrative_system: "Адміністративна система"
  administrative_system_desc: "Будь-яка держава потребує системи для адміністрування та організації своєї території. Вибравши відповідну структуру, ми можемо забезпечити виконання нашої влади навіть у найвіддаленіших частинах нашої держави."
  autonomous_councils: "Автономні ради"
  autonomous_councils_desc: "Наша держава складається з багатьох різних менших держав, кожна зі своїми звичаями та законами. Усі провінції, керовані власними радами, сприяють центральній владі та узгоджують свою політику за спільними напрямками."
  central_councils: "Центральна рада"
  central_councils_desc: "Держава адмініструється як єдина рада, члени якої вирішують політику держави. Віддалені райони нашої країни матимуть труднощі з тим, щоб їхній голос був почутий."
  local_courts_administration: "Місцеві суди"
  local_courts_administration_desc: "Держава відмовляється від багатьох своїх центральних повноважень на користь місцевих судів, які адаптують свої адміністрації, щоб найкраще відповідати потребам та звичаям місцевого населення."
  feudal_administration: "Феодальна адміністрація"
  feudal_administration_desc: "Ми не керуємо безпосередньо, а через підданих, які присягають нам на вірність. Впливовим членам [ShowEstateTypeName('nobles_estate')], чия вірність може бути забезпечена, наказується радити правителям наших підлеглих націй щодо наших проголошень, що допомагає виховувати та підтримувати лояльність до [ShowEstateTypeName('crown_estate')]."
  confederal_union: "Конфедеративний союз"
  confederal_union_desc: "Союз інших, автономних держав, які є верховними органами влади на своїх територіях. Центральний уряд обмежений вирішенням зовнішньої політики, тоді як внутрішні справи вирішуються державами."
  federal_state: "Федеративна держава"
  federal_state_desc: "Держава є об'єднанням багатьох різних менших держав зі своїми власними звичаями та законами. Однак усі держави перебувають під владою федерального уряду і як такі підпорядковуються федеральним законам."
  unitary_administration: "Унітарна адміністрація"
  unitary_administration_desc: "Держава адмініструється як єдине ціле, де центральний уряд є верховним органом влади нації. Провінції мають мало впливу на внутрішню політику країни."
  pyatina_policy: "Поділ на п'ятини"
  pyatina_policy_desc: "#italic П'ятина#! є найвищим адміністративним поділом в уряді Новгорода. Республіка поділена на п'ять п'ятин, чотири з яких безпосередньо межують з містом Новгород, тоді як п'ята охоплює більш віддалені території."
  eyalet_division: "Поділ на еялети"
  eyalet_division_desc: "Адміністрація #italic еялету#! є основним поділом [GetCountry('TUR').GetLongName]. Кожен #italic еялет#! керується пашею, який, у свою чергу, підпорядковується Великому візиру центрального уряду. Центральні закони держави не обов'язково застосовуються до кожного еялету, і кожен паша вільний включати місцеві звичаї та норми для кращого управління своїм народом."
  merindad_policy: "Поділ на меріндади"
  merindad_policy_desc: "#italic Меріндад#! — це географічно-адміністративний поділ у королівствах [GetCountry('ARA').GetName], [GetCountry('CAS').GetName] та [GetCountry('NAV').GetName]. Меріндади слугують проміжними адміністративними органами між центральною владою, містами та дворянськими володіннями. Головою меріндаду є меріно, якому довірені адміністративні та судові повноваження над призначеною територією як представнику правителя."
  ara_royal_ordinances_policy: "[GetCountry('ARA').GetAdjectiveWithNoTooltip] Королівські ордонанси"
  ara_royal_ordinances_policy_desc: "Королівські ордонанси — це звід статутів, виданих для регулювання різних аспектів королівського двору та домогосподарства. Ці правила окреслюють ролі та обов'язки придворних чиновників і включають детальні положення щодо церемонії коронації арагонських королів."
  calpixque_system_policy: "Система калпіксків"
  calpixque_system_policy_desc: "Ця [ShowCultureName('nahua_culture')] система управління еволюціонувала за межі своєї початкової структури спадкових лідерів #italic тлатоані#!. Провінції тепер адмініструються призначеними чиновниками: місцевими управителями, що називаються #italic калпікскве#!, та високими управителями, що називаються #italic хуекалпікскве#!. Ці чиновники керують провінційною системою данини під наглядом #italic петлакалькатля#! у столиці. У особливо непокірних провінціях можуть бути призначені військові губернатори, відомі як #italic куаутлатоані#!, для підтримки контролю."
  tongues_policy: "Поділ на мови"
  tongues_policy_desc: "Система Мов, або #italic Ланг#!, класифікує членів та активи на основі етнолінгвістичних поділів. Кожна Мова далі поділяється на Пріорії, Великі Пріорії, Бальяжі та Командорства. Кожна Ланг має призначену штаб-квартиру, відому як #italic оберж#!, розташовану в столиці Ордену."
  rajya_policy: "Радж'я"
  rajya_policy_desc: "#italic Радж'ї#! є основними провінціями [GetCountry('VIJ').GetLongName]. Ці території спільно управляються військовим командиром та членом правлячої династії. Адміністрація здійснюється рідною мовою регіону, що дозволяє ефективніше впроваджувати ці закони."
  poligar_system_policy: "Палаяккарари"
  poligar_system_policy_desc: "Наші землі є домом для численних неінкорпорованих племен і кланів, які могли б надати цінну послугу державі, якщо їх належним чином інтегрувати в нашу адміністративну систему. Як клас, ці #italic чиновники-палаяккарари#! служили б правоохоронцями, будівельниками укріплень, провінційними представниками та військовими офіцерами. Найважливіше, вони могли б мобілізувати своїх родичів, щоб забезпечити нас постійним постачанням здібної робочої сили."
  zabt_system_policy: "Система забт"
  zabt_system_policy_desc: "В інтересах нашої держави заохочувати економічну продуктивність, одночасно постійно спостерігаючи за регіональними економіками. Однак ми не завжди були успішними у наших адміністративних зусиллях, оскільки управління економічною діяльністю такої кількості підданих вимагає значних обсягів як людських, так і матеріальних ресурсів.\nЩоб вирішити це, ми створили систему #italic забт#!, яка встановлює регулярні кадастрові обстеження для вимірювання сільськогосподарських угідь, оцінки врожайності та класифікації якості землі. На основі цих обстежень розраховуються стандартизовані ставки доходу, які збираються готівкою, а не натурою. Це створює передбачуване, систематичне оподаткування, яке гарантує, що доходи нашої держави відображають нашу фактичну сільськогосподарську спроможність."
  adelantamiento_system: "Система аделантам'єнто"
  adelantamiento_system_desc: "Очолюваний #italic аделантадо#!, #italic аделантам'єнто#! є адміністративною системою, розробленою в [GetCountry('CAS').GetName], за якою члени [ShowEstateTypeName('nobles_estate')] призначаються губернаторами прикордонних або новозавойованих територій, підпорядковуючись безпосередньо правителю. Аделантадо мають широкі військові, судові та адміністративні повноваження в цих віддалених регіонах і часто самі фінансують експедиції в обмін на землю та розширені права управління."
  decentralized_trade_federations: "Децентралізована торгова федерація"
  decentralized_trade_federations_desc: "Ми делегували контроль над місцевими економічними справами та діловою практикою губернаторам [ShowEstateTypeName('nobles_estate')] у цих регіонах. Це має допомогти нам значно розширити нашу торговельну мережу."
  regulations_of_the_royal_court: "Регламент Королівського двору"
  regulations_of_the_royal_court_desc: "Серія документів, що позначають основні функції нашого уряду, від етикету церемонії коронації до щоденної діяльності [ShowEstateTypeName('crown_estate')] та утримання нашої армії. Ця структура слугує міцною основою для нашого уряду та таємної ради, відомої як #italic савазіро#!."
  maj_office_of_the_mahapatih: "Управління Махапатіха"
  maj_office_of_the_mahapatih_desc: "Рівний за статусом прем'єр-міністру, #Italic Махапатіх#! має величезний вплив у нашій політичній сфері. Як другий за командуванням у всій нації, той, хто обіймає цю посаду, відповідає за нагляд за критично важливими державними справами, такими як військова експансія та ефективна робота уряду."
  education_elites_law: "Освіта еліт"
  education_elites_law_desc: "Освіта наших еліт має життєво важливе значення. Надаючи нашим громадянам вищого класу широкий доступ до відповідних творів мистецтва, ми сприятимемо досягненню наших культурних цілей, як вдома, так і за кордоном, шляхом створення легендарних творів та посилення нашої величі!"
  forums_of_thought: "Відкриті інституції"
  forums_of_thought_desc: "Освіта має бути вільно доступною для всіх, хто її шукає. Ми дозволимо необмежений доступ до мудрості, що зберігається в наших навчальних закладах, і широко відчинимо двері, щоб прийняти наш народ, аби він міг легше розвивати інновації та інтелектуальну витонченість, що відрізнятиме нас від інших держав."
  clerical_institutions: "Теологічні інституції"
  clerical_institutions_desc: "Національна ідентичність нашого народу нерозривно пов'язана з нашою вірою та керівництвом наших духовних лідерів. Щоб краще зміцнити роль релігії в нашій державі, ми повинні узгодити наші освітні установи з нашими релігійними та відповідно наставляти наш народ."
  mixed_institutions: "Змішані інституції"
  mixed_institutions_desc: "Збалансований підхід може бути найкращим, якщо ми хочемо задовольнити наших глав віри та загальне населення, а також надати цінні знання та доступ до освіти. Знайдімо розумну золоту середину між теологічними та світськими школами думки."
  education_of_the_theocrat: "Освіта теократа"
  education_of_the_theocrat_desc: "Доля нашої нації вигинається в руках божественного, хто панує над усіма мирськими справами. Але священний обов'язок нашого правителя — тлумачити знаки з небес і передавати їх нашому народу, щоб ми завжди залишалися улюбленцями понад усі інші нації. Щоб уникнути будь-яких небезпечних хибних тлумачень, держава повинна зосередити свої зусилля на ретельному навчанні майбутніх правителів."
  education_of_the_court: "Освіта двору"
  education_of_the_court_desc: "Наш правитель може представляти волю нашого уряду, але всі люди схильні до людських помилок. За підтримки високоосвіченого двору наш правитель менш схильний робити серйозні помилки в судженнях."
  education_of_the_missionaries: "Освіта місіонерів"
  education_of_the_missionaries_desc: "Язичники та єресь — це чинники, які найсильніше випробовують наші вірування. Вони спокушають інакше побожних людей від істинної віри отруйними думками, відводячи їх від світла, щоб бути поглинутими темрявою. Наші місіонери повинні бути освіченими та мати непохитну віру, якщо вони хочуть протистояти цьому корозійному злу."
  education_of_the_people: "Освіта народу"
  education_of_the_people_desc: "Знання та освіта є двома найбагатшими аспектами в житті будь-якої людини, і тому держава повинна забезпечити нашому народу доступ до обох. Ми всі народжені з вільною волею та вільною думкою, і обов'язок держави — зберігати ці природні права, які належать усьому нашому народу."
  confucian_academies_education: "Конфуціанські академії"
  confucian_academies_education_desc: "Приватні установи, що поєднують функції школи та релігійної святині, ці академії навчають елітних студентів класичним текстам та конфуціанській філософії, готуючи їх до іспитів на державну службу. Хоча офіційно вони є апаратом держави, цим установам надаються широкі повноваження та особливі привілеї, що відрізняє їх від інших державних органів."
  scottish_noble_education: "Обов'язкова освіта для $nobles_estate$"
  scottish_noble_education_desc: "Для нашого [ShowEstateTypeName('nobles_estate')] є обов'язковим пройти ґрунтовне навчання. З метою покращення функцій нашого уряду, кожен член елітних класів має бути ретельно освічений у вивченні права, мистецтва та латини."
  scottish_presbyterian_education: "Пресвітеріанська освіта"
  scottish_presbyterian_education_desc: "Наша Церква відповідатиме за освіту народу нашої нації. Ці зусилля будуть фінансово підтримані за рахунок податкових надходжень, зібраних із землеволодіючої еліти."
  education_masses_law: "Освіта мас"
  education_masses_law_desc: "Освіта нашого населення має життєво важливе значення. Надаючи нашому народу широкий доступ до відповідних матеріалів, незалежно від їхнього місця в соціальній ієрархії, ми створимо більш освічене та мистецьки обізнане населення, і просуватимемо наші урядові цілі як вдома, так і за кордоном."
  uneducated_masses_education: "Неосвічені маси"
  uneducated_masses_education_desc: "Яка користь від читання та письма тим, чия єдина мета — доглядати за посівами? Маси найкраще залишити на їхніх полях та з їхніми стадами, невинними від багатьох небезпечних ідей, прихованих між книжковими обкладинками."
  basic_religious_education: "Релігійні вчення"
  basic_religious_education_desc: "Тисячолітній, перевірений часом метод дозволити нашим релігійним установам взяти на себе відповідальність за освіту нашого народу, тоді як держава зосереджується на важливіших завданнях."
  theocratic_education: "Благочестива освіта"
  theocratic_education_desc: "Благочестива освіта, зосереджена на забезпеченні того, щоб студенти були добре обізнані у справах божественного. Теологія може бути кориснішою за математику, зрештою... хоча, можливо, не в кожній ситуації."
  apprenticeships_education: "Індивідуальні учнівства"
  apprenticeships_education_desc: "Священний процес, за допомогою якого досвідчений наставник передає знання, накопичені за життя, своєму протеже. Хоча багато з цих наставницько-учнівських домовленостей оформлені офіційно, охочих до навчання також можуть навчати їхні сім'ї, поважні старші члени суспільства або навіть їхні цехові квартирмейстери."
  oral_tradition_education: "Усна традиція"
  oral_tradition_education_desc: "Мудрість передається молодшим поколінням за допомогою таких методів, як оповідання історій або виконавське мистецтво. Поважні члени громади розповідають і переказують стародавні оповіді та уроки, винесені з них, які молоді слухачі запам'ятають і повторять у майбутньому. Таким чином, історія нашого народу буде збережена від покоління до покоління тими, хто її пережив."
  personal_religious_education: "Особиста релігійна освіта"
  personal_religious_education_desc: "Навіщо централізувати освіту в офіційних установах, коли друкарський верстат дозволив кожному домогосподарству стати власною школою? Ми дозволимо нашому народу самоосвічуватися, надаючи їм відповідальність за вирішення, які знання вони вважають гідними здобуття."
  epic_tradition_education: "Епічна традиція"
  epic_tradition_education_desc: "Молодь найкраще навчається, коли знання подаються у формі захопливих, пам'ятних оповідей, які є водночас привабливими та легкими для розуміння. Багато чого можна навчитися з фантастичних історій наших предків, і ми подбаємо, щоб наш народ добре засвоїв ці уроки."
  secular_education: "Світська освіта"
  secular_education_desc: "Храми є домом божественного, а не класною кімнатою. Тримаймо світське та релігійне навчання окремо, як і мирські та божественні сфери."
  distribution_of_power_law: "Розподіл влади"
  distribution_of_power_law_desc: "Розподіл влади визначає, як повноваження діляться між правителем, адміністративними органами та станами. Держава є складною та крихкою сутністю — добре збалансований розподіл влади забезпечує стабільність, тоді як надання будь-якій окремій установі занадто великої влади ризикує породити тиранію або адміністративний параліч."
  dop_traditional_distribution_of_power: "Традиційний розподіл"
  dop_traditional_distribution_of_power_desc: "Влада традиційно розподіляється між правлячим сувереном та провідними елітами нашого суспільства. Вона не кидає виклик статусу і не є сприятливою ані для глави держави, ані для аристократії."
  dop_law_parliament: "Парламент"
  dop_law_parliament_desc: "Парламент — це збори, що представляють різні стани королівства. Його роль полягає в тому, щоб радити правителю, затверджувати нові закони та податки, а також служити противагою королівському зловживанню владою. Піддані без прямого доступу до престолу можуть висловлювати скарги та потенційно впливати на управління через свого парламентського представника."
  dop_law_gbara: "Гбара"
  dop_law_gbara_desc: "Гбара — це дорадчі збори [GetCountry('MAL').GetName], визначені в [GetCountry('MAL').GetAdjectiveWithNoTooltip] конституції, [ShowAdvanceNameWithNoTooltip('kouroukan_fouga_advance')]. [ShowEstateTypeName('nobles_estate')] представляють численні клани в нашій державі та стримують владу правлячого [GetCountry('MAL').GetGovernment.GetRulerTitle]."
  dop_law_english_parliament: "[GetCountry('ENG').GetAdjectiveWithNoTooltip] Парламент"
  dop_law_english_parliament_desc: "Парламент є де-факто наступником #italic Magnum Concilium#! і головною опорою [GetCountry('ENG').GetAdjective] уряду. Основна функція парламенту полягає в тому, щоб стримувати владу [GetCountry('ENG').GetGovernment.GetRulerTitle], вимагаючи обов'язкових консультацій щодо оподаткування та законодавства, запобігаючи абсолютному правлінню."
  dop_law_navarrese_courts: "Кортеси Наварри"
  dop_law_navarrese_courts_desc: "[ShowEstateTypeName('nobles_estate')], [ShowEstateTypeName('clergy_estate')] та [ShowEstateTypeName('burghers_estate')] сформували дорадчі збори під назвою #italic $dop_law_navarrese_courts$#!, які мають обов'язок затверджувати закони та податки, а також розслідувати правові порушення. Хоча всі стани обговорюють разом, кожен з них голосує як окремі збори. Позиція кожного стану попередньо вирішується внутрішньою більшістю. Для досягнення рішення з будь-якого питання, яке вони обговорюють, усі Три Стани повинні погодитися на дію. Їхня влада дозволяє їм скидати та обирати правителів за потреби, і загалом контролювати владу монарха."
  dop_law_governing_senate: "Керівний Сенат"
  dop_law_governing_senate_desc: "$dop_law_governing_senate$ є найвищим державним органом [GetCountry('RUS').GetAdjective] Держави і був створений як заміна Боярської Думи. Поєднуючи ролі законодавчої, судової та виконавчої влади, Сенат є потужною інституцією, яка підпорядковується лише самим правителям."
  dop_law_estates_general: "Генеральні Штати"
  dop_law_estates_general_desc: "$dop_law_estates_general$ — це збори феодального уряду [GetCountry('FRA').GetAdjective]. Вони мають законодавчу та консультативну роль і представляють три стани країни: [ShowEstateTypeName('nobles_estate')], [ShowEstateTypeName('clergy_estate')] та [ShowEstateTypeName('peasants_estate')], який сам охоплює [ShowEstateTypeName('burghers_estate')]. На відміну від інших парламентів та асамблей, схвалення $dop_law_estates_general$ при внесенні змін до закону, таких як підвищення податків, є необов'язковим."
  dop_law_assemblee_nationale: "Національні Збори"
  dop_law_assemblee_nationale_desc: "Народжені з попелу Старого Режиму, $dop_law_assemblee_nationale$ є перетворенням старих $dop_law_estates_general$ на сучасний парламент. [ShowEstateTypeName('nobles_estate')] та [ShowEstateTypeName('clergy_estate')] більше не є домінуючими силами зборів, тоді як [ShowEstateTypeName('burghers_estate')] та [ShowEstateTypeName('peasants_estate')] відіграють більш активну роль у подіях Держави."
  dop_favor_the_ruler: "Сприяти Правителю"
  dop_favor_the_ruler_desc: "Баланс сил має сприяти главі держави, оскільки лише йому можна довіряти, що він має на серці найкращі інтереси нації."
  dop_favor_the_nobles: "Сприяти Елітам"
  dop_favor_the_nobles_desc: "[ShowEstateTypeName('nobles_estate')] становлять основу нашого суспільства, і ми не могли б обійтися без їхнього керівництва. $dop_last_sentence$"
  dop_favor_the_burghers: "Сприяти Заможним"
  dop_favor_the_burghers_desc: "Гільдії та [ShowEstateTypeName('burghers_estate')] — це життєва сила нашого народу! І, звичайно, нашої скарбниці. $dop_last_sentence$"
  dop_favor_the_clergy: "Сприяти $clergy_estate$"
  dop_favor_the_clergy_desc: "Наша віра знову і знову тримала наше суспільство разом перед лицем негараздів, завдяки керівництву наших мудрих [ShowEstateTypeName('clergy_estate')]. $dop_last_sentence$"
  dop_favor_the_commoners: "Сприяти Простому Народу"
  dop_favor_the_commoners_desc: "[ShowEstateTypeName('peasants_estate')] — це ті, хто щодня працює, щоб забезпечити основні ресурси, такі як їжа, які потрібні кожному, незалежно від їхнього соціального статусу. Вони, можливо, більше ніж будь-хто інший, бажають піднести наш домен до нових висот процвітання та величі. $dop_last_sentence$"
  dop_last_sentence: "Нам було б добре культивувати їхній вплив."
  dop_law_state_council: "Державна Рада"
  dop_law_state_council_desc: "$dop_law_state_council$ є верховним державним дорадчим органом [GetCountry('RUS').GetGovernment.GetName] і був створений для посередництва між самодержавним режимом та регіональними Думами, запровадженими реформою [ShowGovernmentReformName('speransky_liberalization_reform')]. Рада розглядає запропоновані закони та контролює бюджет і державні витрати, але не має повноважень пропонувати зміни. Натомість вона надає рекомендації на основі поточної ситуації."
  dop_law_castilian_courts: "Кортеси Кастилії"
  dop_law_castilian_courts_desc: "#italic $dop_law_castilian_courts$#! представляють стани та кілька міст з правом голосу в [GetCountry('CAS').GetLongName]."
  dop_law_castilian_courts_reinforced: "Посилені Кортеси Кастилії"
  dop_law_castilian_courts_reinforced_desc: "Внаслідок повстання #italic Комунерос#!, [ShowEstateTypeName('crown_estate')] тепер матиме сильніший вплив на #italic $dop_law_castilian_courts$#!."
  dop_favor_the_kontors: "Сприяти Конторам"
  dop_favor_the_kontors_desc: "[ShowBuildingTypeName('hanseatic_kontor')] є основою нашого фінансового успіху. Численні представництва, які ми маємо по всій [ShowContinentName('europe')], слугують дипломатичними зв'язками між нами та приймаючими країнами, а також надають місця влади для наших місцевих [ShowEstateTypeName('burghers_estate')]."
  dop_office_of_the_eristavi: "Посада Еріставі"
  dop_office_of_the_eristavi_desc: "Одним з найвпливовіших наріжних каменів нашої адміністрації є титул #italic Еріставі#!, який надається могутнім шляхетним родинам, дозволяючи їм беззаперечну владу набирати та очолювати армії під своїм прапором. Ті, хто обіймає цю посаду, також користуються домінуючим становищем у наших внутрішніх справах."
  press_law: "Закони про пресу"
  press_law_desc: "Це визначає, як функціонують і регулюються друковані ЗМІ в країні."
  state_press_only: "Лише державна преса"
  state_press_only_desc: "Лише Держава має право друкувати новини. Усі інші форми преси є незаконними."
  censored_press: "Цензурована преса"
  censored_press_desc: "Усі друковані матеріали повинні бути схвалені державою, яка має невід'ємне законне право цензурувати будь-який матеріал, якому вона протистоїть."
  free_press: "Вільна преса"
  free_press_desc: "Громадяни можуть друкувати все, що їм заманеться, без втручання чи санкцій."
  immigration_law: "Прикордонний контроль"
  immigration_law_desc: "Цей Закон визначає, чи дозволена [Concept('migration', 'CONCEPT_PLACEHOLDER')|e] в'їзд або виїзд з країни."
  open_borders_law: "Відкриті кордони"
  open_borders_law_desc: "Кордони нашої країни відкриті для всіх, і кожен може вільно приходити та йти."
  closed_borders_law: "Закриті кордони"
  closed_borders_law_desc: "Нікому не дозволяється залишати або в'їжджати в нашу країну."
  mining_law: "Гірничий закон"
  mining_law_desc: "Цей закон визначає, кому належать гірничі розробки в нашій країні."
  german_mining_law: "Бергорднунг"
  german_mining_law_desc: "Контроль над гірничими привілеями належить державі, що дозволяє гнучкі та ефективні гірничі операції."
  zimbabwe_mining_law: "Прямий контроль правителя"
  zimbabwe_mining_law_desc: "Усі рідкісні мінерали безпосередньо належать нашому правителю, надаючи йому повний контроль над будь-якими видобувними операціями."
  nobles_mining_law: "$nobles_estate$-Контрольовані гірничі операції"
  nobles_mining_law_desc: "[ShowEstateTypeName('nobles_estate')] контролює всі гірничі операції."
  burghers_mining_law: "$burghers_estate$-Контрольовані гірничі операції"
  burghers_mining_law_desc: "[ShowEstateTypeName('burghers_estate')] контролюють усі гірничі операції."
  peasants_mining_law: "Контрольовані посполитими гірничі операції"
  peasants_mining_law_desc: "[ShowEstateTypeName('peasants_estate')] контролює всі гірничі операції."
  novo_brdo_mining_law: "Кодекс Ново Брдо"
  novo_brdo_mining_law_desc: "#italic Кодекс Ново Брдо#! надає детальні вказівки щодо майнових прав, заходів безпеки та економічних практик, значно впливаючи на розвиток і процвітання наших гірничих громад."
  royal_fifth_law: "Королівська п'ятина"
  royal_fifth_law_desc: "Згідно з давніми патрімоніальними правами монарха, [ShowEstateTypeName('crown_estate')] має право на природні багатства землі. Однак такий устрій був би тиранічним, тому це природне право було зведено до простого двадцятивідсоткового податку на всі дорогоцінні метали, видобуті в країні та її колоніях."
  amazigh_familial_connections: "POSTEDIT_Амазизькі родинні зв'язки"
  amazigh_familial_connections_desc: "Численні племена по всій нашій землі мають певну владу над місцевими справами. Наша позиція щодо них може визначити хід нашої історії."
  reliance_on_local_tribes: "Опора на місцеві племена"
  reliance_on_local_tribes_desc: "Місцеві вожді та впливові особи мають великий вплив на свій народ. Задобрити їх і заручитися їхньою співпрацею означало б просувати нашу власну програму."
  cordial_relations: "Доброзичливі відносини"
  cordial_relations_desc: "Хоча ми не визнаємо їхнього старшинства в місцевих справах, підтримка здорових і шанобливих відносин між нами та місцевими племенами приносить користь усім нам."
  refuse_recognition: "Відмова у визнанні"
  refuse_recognition_desc: "Племінні групи, які наші землі милостиво приймають, надто довго намагалися підірвати нашу владу. Якщо ми хочемо зміцнити нашу владу, ми повинні продемонструвати нашу міць і приборкати ці непокірні фракції."
  prince_very_friendly_policy_opinion_impact_all_members: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_prince_very_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  prince_friendly_policy_opinion_impact_all_members: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_prince_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  mild_prince_friendly_policy_opinion_impact_all_members: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_mild_prince_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  controversial_policy_opinion_impact_all_members: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_controversial_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  opposed_policy_opinion_impact_all_members: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_opposed_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  rebellious_policy_opinion_impact_all_members: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_rebellious_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  prince_very_friendly_policy_opinion_impact_free_cities: "Усі [ShowSpecialStatusNamePlural('free_city')] з [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_prince_very_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  prince_friendly_policy_opinion_impact_free_cities: "Усі [ShowSpecialStatusNamePlural('free_city')] з [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_prince_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  mild_prince_friendly_policy_opinion_impact_free_cities: "Усі [ShowSpecialStatusNamePlural('free_city')] з [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_mild_prince_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  controversial_policy_opinion_impact_free_cities: "Усі [ShowSpecialStatusNamePlural('free_city')] з [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_controversial_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  opposed_policy_opinion_impact_free_cities: "Усі [ShowSpecialStatusNamePlural('free_city')] з [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_opposed_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  rebellious_policy_opinion_impact_free_cities: "Усі [ShowSpecialStatusNamePlural('free_city')] з [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_rebellious_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  very_prince_friendly_policy_opinion_impact_electors: "Усі [ShowSpecialStatusNamePlural('elector')] з [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_prince_very_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  prince_friendly_policy_opinion_impact_electors: "Усі [ShowSpecialStatusNamePlural('elector')] з [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_prince_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  mild_prince_friendly_policy_opinion_impact_electors: "Усі [ShowSpecialStatusNamePlural('elector')] з [GetUniqueInternationalOrganization('hre').GetName] отримають [ShowBiasValue('opinion_hre_passed_mild_prince_friendly_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  controversial_policy_opinion_impact_electors: "Усі [ShowSpecialStatusNamePlural('elector')] з [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_controversial_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  opposed_policy_opinion_impact_electors: "Усі [ShowSpecialStatusNamePlural('elector')] з [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_opposed_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  rebellious_policy_opinion_impact_electors: "Усі [ShowSpecialStatusNamePlural('elector')] з [GetUniqueInternationalOrganization('hre').GetName] втратять [ShowBiasValue('opinion_hre_passed_rebellious_law')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] від [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]\n"
  hre_emperor_bonus_tt: "[Concept('hre_emperor', 'CONCEPT_PLACEHOLDER')|e] отримує такі модифікатори:"
  hre_elector_bonus_tt: "[Concept('electors', 'CONCEPT_PLACEHOLDER')|e] отримують такі модифікатори:"
  hre_free_city_bonus_tt: "[Concept('free_cities', 'CONCEPT_PLACEHOLDER')|e] отримують такі модифікатори:"
  hre_location_bonus_tt: "[Concept('locations', 'CONCEPT_PLACEHOLDER')|e] з [GetUniqueInternationalOrganization('hre').GetName] отримують такі модифікатори:"
  imperial_religion: "Імперська релігія"
  imperial_religion_desc: "Самі основи [GetUniqueInternationalOrganization('hre').GetName] побудовані на релігійних віруваннях."
  hre_religion_catholic: "$imperial_religion$ - $catholic$"
  hre_religion_catholic_desc: "Чесноти та цінності традиційного [ShowReligionName('catholic')] визначають життя в межах [GetUniqueInternationalOrganization('hre').GetName]."
  hre_religion_lutheran: "$imperial_religion$ - $lutheran$"
  hre_religion_lutheran_desc: "[ShowSituationName('reformation')] назавжди змінила наші погляди на релігію, проклавши шлях для [ShowReligionName('lutheran')] стати релігією Імперії."
  hre_religion_hussite: "$imperial_religion$ - $hussite$"
  hre_religion_hussite_desc: "[ShowSituationName('western_schism')] відкрила світові [ShowReligionAdjective('hussite')] вчення, які тепер домінують в імперському житті."
  hre_religion_calvinist: "$imperial_religion$ - $calvinist$"
  hre_religion_calvinist_desc: "Наша віра в [ShowReligionName('calvinist')] сильна і відтепер має бути основоположною частиною Імперії. Тому нашим священним покликанням є дотримання [ShowReligionAdjectiveWithNoTooltip('calvinist')] вчень."
  hre_religion_christian: "$imperial_religion$ - $christian$"
  hre_religion_christian_desc: "Тонкіші питання релігії більше не мають такого значення. Усі [ShowReligionGroupName('christian')] будуть прийняті як релігія Імперії, незалежно від секти."
  golden_bull: "Золота Булла"
  golden_bull_desc: "$golden_bull$ — це декрет [GetUniqueInternationalOrganization('hre').GetName], який визначає та створює конституційну структуру Імперії, особливо Колегію виборців. Інші закони та Імперські Реформи ґрунтуються на $golden_bull$."
  golden_bull_policy: "Скріпити $golden_bull$"
  golden_bull_policy_desc: "$golden_bull_desc$"
  no_golden_bull_policy: "Некодифікований Виборчий Порядок"
  no_golden_bull_policy_desc: "Без $golden_bull$ виборчі та конституційні домовленості [GetUniqueInternationalOrganization('hre').GetName] залишаються сумішшю звичаїв, прецедентів та мінливих альянсів. Відсутність офіційного декрету робить [Concept('hre_electoral_college', 'CONCEPT_PLACEHOLDER')|e] більш вразливою до суперечок, інтриг та політичних маневрів."
  no_golden_bull_policy_tt: "За жодних обставин [GetUniqueInternationalOrganization('hre').GetName] не дозволяється скасовувати [ShowLawName('golden_bull')] після її кодифікації"
  hre_golden_bull_formalizes_electorate_tt: "Формалізує виборчу поведінку [Concept('hre_electoral_college', 'CONCEPT_PLACEHOLDER')|e]"
  hre_golden_bull_self_voting_regulated_via_electorate_law: "Самоголосування регулюється [Concept('law', 'CONCEPT_PLACEHOLDER')|e] [ShowLawName('imperial_voting_law')], яка починається з [ShowPolicyName('free_electorate_policy')]"
  monetary_contribution: "Імперський Податковий Закон"
  monetary_contribution_desc: "[GetUniqueInternationalOrganization('hre').GetName] потребує золота для функціонування, як і будь-яка інша політична одиниця. Може бути застосована низка податкових законів для вилучення золота у членів, щоб забезпечити фінансову стабільність Імперії."
  no_monetary_contribution: "Без Оподаткування"
  no_monetary_contribution_desc: "Імперія не потребує додаткового золота. Зняття податкового тягаря з її членів дозволяє адміністрації зосередитися на інших завданнях."
  only_emperor_payment: "Пряме Оподаткування"
  only_emperor_payment_desc: "[ShowParliamentIssueTypeName('hre_roman_month')] недостатньо для покриття захисту [GetUniqueInternationalOrganization('hre').GetName]. Необхідно встановити новий податок, який безпосередньо фінансуватиме [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  only_treasury_payment: "Оподаткування Скарбниці"
  only_treasury_payment_desc: "Хоча [GetUniqueInternationalOrganization('hre').GetLeaderTitle] може відкрити власні скарбниці для вирішення багатьох питань, фінансовий буфер у вигляді належної скарбниці дозволив би нинішнім та майбутнім імператорам краще фінансувати внутрішні справи в [GetUniqueInternationalOrganization('hre').GetName]."
  complete_imperial_contribution: "Імперське оподаткування"
  complete_imperial_contribution_desc: "Лише оподаткування всіх наших держав-членів може забезпечити фінансові виклики [GetUniqueInternationalOrganization('hre').GetName]."
  military_contribution: "Імперський реєстр"
  military_contribution_desc: "$military_contribution$ — це список, що визначає точну кількість військ, які кожен стан повинен постачати [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  no_military_contribution: "Відсутність військового внеску"
  no_military_contribution_desc: "Жоден зі станів не зобов'язаний надавати [GetUniqueInternationalOrganization('hre').GetLeaderTitle] додаткові війська."
  manpower_from_cities: "Внесок міст"
  manpower_from_cities_desc: "[ShowSpecialStatusNamePlural('free_city')] зобов'язані надавати [GetUniqueInternationalOrganization('hre').GetLeaderTitle] додаткові сили."
  manpower_from_cities_tt: "[ShowSpecialStatusNamePlural('free_city')] повинні надавати [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  manpower_from_electors: "Внесок курфюрстів"
  manpower_from_electors_desc: "[ShowSpecialStatusNamePlural('elector')] та [ShowSpecialStatusNamePlural('archbishop_elector')] зобов'язані надавати [GetUniqueInternationalOrganization('hre').GetLeaderTitle] додаткові сили."
  manpower_from_electors_tt: "[ShowSpecialStatusNamePlural('elector')] та [ShowSpecialStatusNamePlural('archbishop_elector')] повинні надавати [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  manpower_from_princes: "Внесок князів"
  manpower_from_princes_desc: "[ShowSpecialStatusNamePlural('imperial_prince')] зобов'язані надавати [GetUniqueInternationalOrganization('hre').GetLeaderTitle] додаткові сили."
  manpower_from_princes_tt: "[ShowSpecialStatusNamePlural('imperial_prince')] повинні надавати [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  great_imperial_army: "Велика Імперська Армія"
  great_imperial_army_desc: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] зобов'язані надавати [GetUniqueInternationalOrganization('hre').GetLeaderTitle] додаткові сили."
  great_imperial_army_tt: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] повинні надавати [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  perpetual_diet_policy_tt: "[Concept('location', 'CONCEPT_PLACEHOLDER')|e], де знаходиться #Y Постійний Райхстаг#!, отримує наступні модифікатори:"
  imperial_voting_law: "Імперське голосування"
  imperial_voting_law_desc: "[GetUniqueInternationalOrganization('hre').GetName] базується на принципі імперських виборів. Характер цих виборів визначає баланс сил в Імперії."
  rotating_emperorship_policy: "Ротаційне імператорство"
  rotating_emperorship_policy_desc: "Щоб запобігти консолідації влади одним правителем, Імперія застосовує ротаційну систему, яка активно перешкоджає переобранню чинних правителів."
  free_electorate_policy: "Вільний курфюрстат"
  free_electorate_policy_desc: "Курфюрсти повністю незалежні у виборі наступного Імператора. Самоголосування дозволено."
  emperor_successor_preference_policy: "Перевага імператорського наступника"
  emperor_successor_preference_policy_desc: "Імператор просуває кандидатуру свого власного наступника. Імперська політика починає сприяти династичній спадковості."
  emperor_successor_preference_policy_opinion_impact: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] втратять #R 50#! [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]."
  emperor_dynastic_preference_policy: "Династична перевага імператора"
  emperor_dynastic_preference_policy_desc: "Курфюрсти віддають перевагу кандидатам, що належать до династії Імператора, консолідуючи династичну владу над виборчою системою."
  emperor_dynastic_preference_policy_opinion_impact: "Усі члени [GetUniqueInternationalOrganization('hre').GetName] втратять #R 75#! [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]."
  erbkaisertum_policy: "Ербкайзертум"
  erbkaisertum_policy_desc: "Виборна монархія скасовується. Імперія стає повністю спадковою монархією, зміцнюючи династичне правління ціною імперської легітимності."
  imperial_succession_law: "Імперська спадкоємність"
  imperial_succession_law_desc: "Спадкоємність [GetUniqueInternationalOrganization('hre').GetName] є делікатною справою. Право на спадкування Імперського Престолу встановлюється Імперськими Законами."
  hre_agnatic_succession_policy: "Агнатична спадкоємність"
  hre_agnatic_succession_policy_desc: "Імперська Корона [GetUniqueInternationalOrganization('hre').GetName] може бути носимою лише правителями чоловічої статі."
  hre_agnatic_succession_policy_custom_tooltip: "Лише чоловіки-[Concept('rulers', 'CONCEPT_PLACEHOLDER')|e] можуть успадкувати [GetUniqueInternationalOrganization('hre').GetName]"
  hre_pragmatic_sanction_policy: "Прагматична санкція"
  hre_pragmatic_sanction_policy_desc: "Стать нашого правителя не має значення. Жінки-правительки можуть носити Імперську Корону [GetUniqueInternationalOrganization('hre').GetName] так само законно, як і їхні чоловічі аналоги."
  hre_pragmatic_sanction_policy_opinion_impact: "Члени [GetUniqueInternationalOrganization('hre').GetName] з [ShowHeirSelectionName('salic_law')] або [ShowHeirSelectionName('partition_inheritance')] втратять #R 75#! [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]."
  electorate_organization_law: "Організація курфюрстів"
  electorate_organization_law_desc: "[ShowSpecialStatusNamePlural('elector')] — це група могутніх [ShowEstateTypeName('nobles_estate')] та [ShowEstateTypeName('clergy_estate')], які мають привілей голосувати за свого наступного [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  integrated_electors_policy: "Інтегровані курфюрсти"
  integrated_electors_policy_desc: "[ShowSpecialStatusNamePlural('elector')] обмежені, і одне з їхніх виборчих прав передається [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  integrated_electors_policy_tt: "Найслабший [ShowSpecialStatusName('elector')] та найслабший [ShowSpecialStatusName('archbishop_elector')] втрачають свої позиції в [GetUniqueInternationalOrganization('hre').GetName]."
  limited_electors_policy: "Обмежені курфюрсти"
  limited_electors_policy_desc: "Кількість [ShowSpecialStatusNamePlural('elector')] обмежена до семи. Голоси за імператорство можуть бути прихильними, хоча обіцянки та запевнення є потужним і надійним інструментом для здобуття голосу [ShowSpecialStatusName('elector')]."
  electorate_policy: "Курфюрство"
  electorate_policy_desc: "[ShowSpecialStatusNamePlural('elector')] розширюють свої ряди на одного додаткового $elector$ та одного додаткового $archbishop_elector$. Крім того, здобуття голосу [ShowSpecialStatusName('elector')] як ніколи залежить від обіцянок та запевнень."
  expanded_electors_policy: "Розширені виборці"
  expanded_electors_policy_desc: "[ShowSpecialStatusNamePlural('elector')] розширюють свої лави двома додатковими місцями, а також додають двох додаткових [ShowSpecialStatusNamePlural('archbishop_elector')]. Лише значні обіцянки та зобов'язання можуть заслужити прихильність [ShowSpecialStatusName('elector')]."
  elector_council_policy: "Рада виборців"
  elector_council_policy_desc: "[ShowSpecialStatusNamePlural('elector')] перебувають на піку своєї могутності, розширюючи свої лави трьома додатковими місцями, а також додаючи трьох додаткових [ShowSpecialStatusNamePlural('archbishop_elector')]. Крім того, вони отримують право обирати Антикороля, який може замінити поточного [GetUniqueInternationalOrganization('hre').GetLeaderTitle] в Імперському сеймі, якщо його не оскаржувати. Це дає виборцям фактичну владу примусити до перевиборів поточного [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  electorate_religion_law: "Релігійний закон курфюрства"
  electorate_religion_law_desc: "Релігія є головним стовпом [GetUniqueInternationalOrganization('hre').GetName] як для Імператорів, так і для [ShowSpecialStatusNamePlural('elector')]."
  only_imperial_religion_policy: "Лише імперська релігія"
  only_imperial_religion_policy_desc: "[ShowSpecialStatusNamePlural('elector')] зобов'язані дотримуватися імперської релігії, щоб зберегти свій статус."
  only_imperial_religion_group_policy: "Лише імперська релігійна група"
  only_imperial_religion_group_policy_desc: "[ShowSpecialStatusNamePlural('elector')] вільні дотримуватися будь-яких деномінацій нашої державної релігії, які вони віддають перевагу. Однак це не потурає язичництву, яке не буде терпітися."
  free_city_law: "Вільні міста"
  free_city_law_desc: "Вільні міста [GetUniqueInternationalOrganization('hre').GetName] є самоврядними містами з автономією. Зазвичай саме тут проводяться засідання Імперського сейму."
  direct_imperial_cities_policy: "Прямі імперські міста"
  direct_imperial_cities_policy_desc: "Вільні міста тепер перебувають під прямим управлінням [GetUniqueInternationalOrganization('hre').GetLeaderTitle]. З сильно обмеженою автономією, міста-держави є де-факто форпостами в межах [GetUniqueInternationalOrganization('hre').GetName] для Імперської Корони."
  cities_of_the_emperor_policy: "Міста [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  cities_of_the_emperor_policy_desc: "Автономія вільних міст обмежена [GetUniqueInternationalOrganization('hre').GetLeaderTitle]. Хоча вони все ще здатні здійснювати власну дипломатію, міста тепер на крок ближче до того, щоб стати частиною адміністрації [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  free_cities_policy: "Вільні міста"
  free_cities_policy_desc: "Вільні міста захищені [GetUniqueInternationalOrganization('hre').GetLeaderTitle] і користуються широкою автономією у сприянні торгівлі на своїх ринках."
  no_emperor_allegiance_policy: "Незахищені вільні міста"
  no_emperor_allegiance_policy_desc: "Вільні міста більше не користуються захистом [GetUniqueInternationalOrganization('hre').GetLeaderTitle] при захисті від амбітних князів."
  no_free_cities_policy: "Вільні міста скасовані"
  no_free_cities_policy_desc: "Вільних імперських міст більше немає. Жодне містечко чи місто не буде під захистом [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  free_city_rights_law: "Права вільного міста"
  free_city_rights_law_desc: "Отримати статус [ShowSpecialStatusName('free_city')] непросто. Цей ексклюзивний титул має бути наданий [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  german_free_cities_only_policy: "Лише германські вільні міста"
  german_free_cities_only_policy_desc: "[GetUniqueInternationalOrganization('hre').GetName] є передусім [ShowCultureGroupName('german_group')], і привілей [ShowSpecialStatusName('free_city')] відображає цю реальність."
  german_free_cities_only_policy_at: "Лише [ShowCultureGroupName('german_group')] країни можуть стати [ShowSpecialStatusName('free_city')]"
  german_and_german_adjacent_free_cities_policy: "Братні за культурою Вільні міста"
  german_and_german_adjacent_free_cities_policy_desc: "Імперія має давню історію з [ShowCultureGroupName('netherlandish_group')], [ShowCultureGroupName('swiss_group')] та [ShowCultureGroupName('italian_group')]. Це виправдовує дозвіл не-[ShowCultureGroupName('german_group')] державам отримати бажаний статус [ShowSpecialStatusName('free_city')]."
  german_and_german_adjacent_free_cities_policy_at: "Лише країни з [ShowCultureGroupName('german_group')], [ShowCultureGroupName('netherlandish_group')], [ShowCultureGroupName('swiss_group')] або [ShowCultureGroupName('italian_group')] [Concept('culture_group', 'CONCEPT_PLACEHOLDER')|e] можуть стати [ShowSpecialStatusName('free_city')]"
  empire_wide_free_cities_policy: "Невибіркові Права Вільних міст"
  empire_wide_free_cities_policy_desc: "Статус [ShowSpecialStatusName('free_city')] більше не прив'язаний до географії чи культури. Кожна нація, яка бажає, може подати прохання до [GetUniqueInternationalOrganization('hre').GetLeaderTitle] за цей титул."
  empire_wide_free_cities_policy_at: "Кожен член може стати [ShowSpecialStatusName('free_city')]"
  landfriede_law: "Landfriede"
  landfriede_law_desc: "#italic Landfriede#!, або «земний мир», є указом, який диктує, що суперечки між членами [GetUniqueInternationalOrganization('hre').GetName] мають вирішуватися в Імперському суді, а не на полі бою. Цей мандат допомагає нам залишатися згуртованими як імперія, замість того, щоб слабшати через дрібні внутрішні чвари."
  outlaw_internal_warfare_policy: "Оголосити внутрішні війни поза законом"
  outlaw_internal_warfare_policy_desc: "Обмежити можливості членів [GetUniqueInternationalOrganization('hre').GetName] та ефективно оголосити війну всередині Імперії поза законом."
  landfriede_rank_4_policy: "Ewiger Landfriede"
  landfriede_rank_4_policy_desc: "#italic Landfriede#! перебуває на вершині свого впливу та могутності в [GetUniqueInternationalOrganization('hre').GetName], а приватні війни між державами-членами були назавжди оголошені поза законом. Будь-які суперечки, що виникають, підлягають розгляду в Імперському суді."
  landfriede_rank_3_policy: "Посилити Ландфрід"
  landfriede_rank_3_policy_desc: "#italic Landfriede#! тепер є потужною інституцією. Члени [GetUniqueInternationalOrganization('hre').GetName] дуже поважають його авторитет."
  landfriede_rank_2_policy: "Розширити Ландфрід"
  landfriede_rank_2_policy_desc: "#italic Landfriede#! отримує додатковий вплив та визнання серед членів [GetUniqueInternationalOrganization('hre').GetName]."
  landfriede_policy: "Запровадити Ландфрід"
  landfriede_policy_desc: "$landfriede_law_desc$"
  no_landfriede_policy: "Відсутність Ландфріду"
  no_landfriede_policy_desc: "«Право сильного» точно описує поточну практичну політику [GetUniqueInternationalOrganization('hre').GetName]; суперечки між нашими членами вирішуватимуться на полі бою."
  landfriede_parliament_issue_rank_2: "Мир [ShowParliamentIssueTypeName('hre_demand_internal_peace')] [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e] триватиме #G 3#! роки."
  landfriede_parliament_issue_rank_3: "Мир [ShowParliamentIssueTypeName('hre_demand_internal_peace')] [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e] триватиме #G 5#! років."
  landfriede_parliament_issue_rank_4: "Мир [ShowParliamentIssueTypeName('hre_demand_internal_peace')] [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e] триватиме #G 10#! років."
  imperial_diet_law: "Імперський Рейхстаг"
  imperial_diet_law_desc: "[ShowParliamentTypeName('hre_court_assembly')] є давньою системою, і тому багато її положень та процедур є дуже застарілими. Настав час переробити її та встановити належний [ShowLawNameWithNoTooltip('imperial_diet_law')], що краще захищатиме різноманітні інтереси всіх членів [GetInternationalOrganizationType('hre').GetName]."
  no_imperial_diet_policy: "Традиційний Рейхстаг"
  no_imperial_diet_policy_desc: "Ніколи не будучи формально кодифікованою, система [ShowParliamentTypeName('hre_court_assembly')] гостро потребує реформи."
  hre_early_imperial_diet_policy: "$hre_early_imperial_diet$"
  hre_early_imperial_diet_policy_desc: "$hre_early_imperial_diet_desc$"
  hre_bi_camerial_imperial_diet_policy: "$hre_bi_camerial_imperial_diet$"
  hre_bi_camerial_imperial_diet_policy_desc: "$hre_bi_camerial_imperial_diet_desc$"
  hre_tri_camerial_imperial_diet_policy: "$hre_tri_camerial_imperial_diet$"
  hre_tri_camerial_imperial_diet_policy_desc: "$hre_tri_camerial_imperial_diet_desc$"
  perpetual_diet_law: "Постійний Рейхстаг"
  perpetual_diet_law_desc: "Раніше імперські рейхстаги скликалися нерегулярно в різних містах по всій [GetInternationalOrganizationType('hre').GetName], вимагаючи від [GetUniqueInternationalOrganization('hre').GetLeaderTitle] та інших представників подорожувати щоразу. Заснувавши постійний, безперервно діючий Рейхстаг, ми створимо постійну асамблею, яка функціонуватиме за системою постійних обговорень, а не спорадичних зустрічей."
  no_perpetual_diet_policy: "Мандрівний Рейхстаг"
  no_perpetual_diet_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] та інші представники подорожуватимуть до різних міст по всій [GetUniqueInternationalOrganization('hre').GetName], скликаючи Рейхстаги там і тоді, де і коли це буде потрібно, а не за регулярним розкладом чи у визначеному місці."
  perpetual_diet_policy: "$perpetual_diet_law$"
  perpetual_diet_policy_desc: "$perpetual_diet_law_desc$"
  perpetual_diet: "Є домом для #Y Постійного Рейхстагу#!"
  power_of_the_emperor_law: "Влада [GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  power_of_the_emperor_law_desc: "Влада [GetUniqueInternationalOrganization('hre').GetLeaderTitle] є складною темою. Члени [GetInternationalOrganizationType('hre').GetName] та [ShowSpecialStatusNamePlural('elector')] однаково мають суперечливі інтереси з інтересами [GetUniqueInternationalOrganization('hre').GetLeaderTitleWithNoTooltip], проте вони визнають, що безсилий [GetUniqueInternationalOrganization('hre').GetLeaderTitleWithNoTooltip] не в змозі захистити Імперію."
  renovatio_policy: "Renovatio Imperii"
  renovatio_policy_desc: "Децентралізації в [GetUniqueInternationalOrganization('hre').GetName] більше немає. Вся Імперія буде об'єднана в єдину національну державу, яка формуватиме долю самого світу!"
  revoke_privilegia_policy: "Скасувати Привілеї"
  revoke_privilegia_policy_desc: "Численні свободи та привілеї, надані імперським князям, цим скасовуються. [GetUniqueInternationalOrganization('hre').GetLeaderTitle] централізує владу, перетворюючи [GetUniqueInternationalOrganization('hre').GetName] на єдину сутність під одноосібним правлінням."
  improved_imperial_authority_policy: "Покращена Імперська Влада"
  improved_imperial_authority_policy_desc: "Влада [GetUniqueInternationalOrganization('hre').GetLeaderTitle] значно розширена, дозволяючи їм впроваджувати політику в Імперському Рейхстазі для покращення [GetUniqueInternationalOrganization('hre').GetName]."
  kaisertum_policy: "Кайзертум"
  kaisertum_policy_desc: "Влада, яку тримає [GetUniqueInternationalOrganization('hre').GetLeaderTitle], ретельно збалансована: достатньо сильна, щоб захищати та реформувати [GetUniqueInternationalOrganization('hre').GetName], але не настільки всеосяжна, щоб загрожувати нашим [ShowSpecialStatusNamePlural('elector')] чи державам-членам."
  holy_roman_figurehead_policy: "Священний Римський Номінал"
  holy_roman_figurehead_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] більше не є монархом, що має владу в [GetUniqueInternationalOrganization('hre').GetName]. Усі закони та політики тепер перебувають у руках Імперського Сейму та [ShowSpecialStatusNamePlural('elector')]."
  main_philosophy_law: "Основна філософія"
  main_philosophy_law_desc: "Основний потік філософії та вчень, що формують основні переконання секти."
  disfavoring_sect_tt: "Якщо ми #Y Не схвалюємо#! цю секту:"
  promoting_sect_tt: "Якщо ми #Y Просуваємо#! іншу секту:"
  confucianism_policy: "$SECT_CONFUCIANISM_NAME$"
  confucianism_policy_desc: "$SECT_CONFUCIANISM_NAME$ — це філософія, що розвинулася з вчень Конфуція, або Кун Фу-цзи, яка наголошує на соціальній гармонії та праведності державних інститутів."
  daoism_policy: "$SECT_DAOISM_NAME$"
  daoism_policy_desc: "$SECT_DAOISM_NAME$ — це філософія, що наголошує на житті в гармонії з #italic Дао#!, живою силою всесвіту, та концепції #italic У-вей#!, або «дія без дії»."
  vajrayana_law: "Тантричні практики"
  vajrayana_law_desc: "Ваджраяна, також звана тантричним $buddhist$ або езотеричним $buddhist$, є формою $buddhist$, що включає багато тантричних, езотеричних та ритуальних практик. На її розвиток сильно вплинули інші релігії, особливо $hindu$."
  vajrayana_policy: "$vajrayana_law$"
  vajrayana_policy_desc: "$vajrayana_law_desc$"
  no_vajrayana_policy: "Без $vajrayana_policy$"
  no_vajrayana_policy_desc: "$no_vajrayana_policy$"
  pure_land_school_policy: "$SECT_PURE_LAND_SCHOOL_NAME$"
  pure_land_school_policy_desc: "$SECT_PURE_LAND_SCHOOL_NAME$ — одна з найпоширеніших шкіл східноазійського $buddhist$, зосереджена навколо ідеї досягнення переродження в Чистій Землі Будди. Найпоширеніша Чиста Земля — це Будди Амітабхи, а найважливіші вчення — це #italic Три Сутри Чистої Землі#!. Основною формою практики є усвідомлення Будди через повторення імені Будди як форми рецитації."
  tiantai_policy: "Школа Лотоса"
  tiantai_policy_desc: "$tiantai_policy$, названа так на честь важливості #italic Сутри Лотоса#!, є однією з найдавніших $buddhist_ADJ$ шкіл, що розвинулися в $china$. Вона наголошує на доктрині #italic Єдиної Колісниці#!, пропагуючи інклюзивний погляд та розуміння всіх $buddhist_ADJ$ вчень."
  dharma_school_policy: "$SECT_DHARMA_SCHOOL_NAME$"
  dharma_school_policy_desc: "Названа #italic Вейші#! або #italic Фасян#! в $china$, та #italic Хоссо#! в $japan_region$, традиція $SECT_DHARMA_SCHOOL_NAME$ виникла в Індії та мала глибокий вплив на $mahayana$. Вона зосереджується на ідеалізмі та ідеї, що реальність є лише свідомістю, і наголошує на практиках йоги та медитації."
  flower_garland_school_policy: "$SECT_FLOWER_GARLAND_SCHOOL_NAME$"
  flower_garland_school_policy_desc: "Отримавши свою назву від #italic Сутри квіткової гірлянди#!, і названа #italic Хуаянь#! в $china$, #italic Кегон#! в $japan_region$, та #italic Хваеом#! в $korea_region$, $SECT_FLOWER_GARLAND_SCHOOL_NAME$ є однією з головних $buddhist_ADJ$ традицій, що розвинулися в $china$. Вона наголошує на доктрині взаємопроникнення, де всі речі існують у стані взаємної залежності та одночасно присутні одна в одній."
  meditation_school_policy: "$SECT_MEDITATION_SCHOOL_NAME$"
  meditation_school_policy_desc: "$SECT_MEDITATION_SCHOOL_NAME$ була заснована Бодхідхармою, згідно з традицією, і називається #italic Чань#! в $china$, #italic Дзен#! в $japan_region$, #italic Сон#! в $korea_region$ та #italic Тхієн#! у В'єтнамі. Хоча медитація є загальною практикою в $buddhist$, ця школа наголошує на її використанні як засобу досягнення просвітлення, зазвичай у сидячому положенні, але також під час виконання фізичних вправ, таких як бойові мистецтва."
  mantra_school_policy: "$SECT_MANTRA_SCHOOL_NAME$"
  mantra_school_policy_desc: "$SECT_MANTRA_SCHOOL_NAME$, що називається #italic Чженьян#! в $china$ та #italic Шингон#! в $japan_region$, зосереджується на езотеричних практиках Ваджраяни, особливо на тих, що називаються \"трьома таємницями\": мудра, мантра та мандала. Її практики були дуже впливовими у розвитку багатьох інших шкіл $buddhist$."
  shugendo_policy: "$SECT_SHUGENDO_NAME$"
  shugendo_policy_desc: "Виникнувши як синкретизм змішаних практик з $buddhist$, $shinto$ та $onmyodo$, $SECT_SHUGENDO_NAME$ прагне досягнення надприродних здібностей через релігійне навчання в горах. Поклоніння горам та гірські походи є основними напрямками цієї секти, а також інші езотеричні практики та ритуали."
  azhaliism_policy: "$SECT_AZHALIISM_NAME$"
  azhaliism_policy_desc: "Коли тантричні $buddhist_ADJ$ практики прийшли в $yunnan_area$, вони змішалися з традиціями $chinese_group$, $tibetan_group$ та $burmese_culture$ походження, створивши гібридну віру. Таким чином, $SECT_AZHALIISM_NAME$ виникла як відносно локалізована традиція, схожа, але відмінна від інших, більших шкіл."
  musok_policy: "$SECT_MUSOK_NAME$"
  musok_policy_desc: "Зосереджені навколо поклоніння божествам та духам предків, вірування $SECT_MUSOK_NAME$ були присутні в $korea_region$ ще до запровадження $buddhist$. Навіть після цього, її вірування, практики та ритуали продовжують бути важливою частиною культури регіону."
  mulasarvastivada_policy: "$SECT_MULASARVASTIVADA_NAME$"
  mulasarvastivada_policy_desc: "Одна з найдавніших $buddhist_ADJ$ шкіл в $india$, традиції $SECT_MULASARVASTIVADA_NAME$ майже зникли з більшості течій $buddhist$, виживши лише в $tibetan_buddhism$ та в $indonesia_region$. Там першою течією, що прибула, була Хінаяна, і $SECT_MULASARVASTIVADA_NAME$, разом з $vajrayana_law$, стала помітною під час імперії Шривіджая."
  mahavihara_policy: "$SECT_MAHAVIHARA_NAME$"
  mahavihara_policy_desc: "Центр $buddhist_ADJ$ вченості з моменту першого прибуття релігії на острів, $sailan_area$ розвинула власну традицію $theravada$ $buddhist$. Таким чином, вона була впливовою у розвитку та поширенні $buddhist$ в інших сусідніх районах, особливо з початку занепаду $buddhist$ на материковій $india$."
  burmese_buddhism_policy: "$SECT_BURMESE_BUDDHISM_NAME$"
  burmese_buddhism_policy_desc: "Хоча сильно під впливом $mahavihara_policy$ $buddhist$ з $sailan_area$, інші форми $buddhist$ поширилися по Бірмі. Традиції $mahayana$ та $theravada$, а також $hindu$ і деякі залишки до-$buddhist$ вірувань, все це змішалося, породивши особливий відтінок $theravada$. Хоча дуже схожа на ту, що практикується в $sailan_area$, ця секта також включає багато елементів $mahayana$ та інших езотеричних традицій."
  lankavong_policy: "$SECT_LANKAVONG_NAME$"
  lankavong_policy_desc: "Багато різних форм $buddhist$ були присутні на землях $thai_culture$ народу протягом століть, від китайсько-орієнтованої $mahayana$ до ранніх індійських $buddhist_ADJ$ традицій. Зрештою, традиція $theravada$ з $sailan_area$ стала основною школою думки, але вплив ранніх традицій і навіть $thai_culture$ народних вірувань все ще залишається."
  khmer_buddhism_policy: "$SECT_KHMER_BUDDHISM_NAME$"
  khmer_buddhism_policy_desc: "Першою формою $buddhist$, що увійшла в $khmer_culture$ область, була $mahayana$, з сильним тантричним впливом, яка замінила $hindu_ADJ$ вірування, вже присутні в регіоні. З часом $theravada$ замінила $mahayana$, і відбувся великий перехід до чернечого життя."
  sect_school_law: "Школа секти"
  sect_school_law_desc: "Особлива школа цієї секти, яка може мати деякі відмінності від основних вчень."
  jodou_shinshuu_policy: "$SECT_JOUDO_SHINSHUU$"
  jodou_shinshuu_policy_desc: "Школа $SECT_PURE_LAND_SCHOOL_NAME$, заснована Шінраном, ченцем, що походив зі школи $SECT_TENDAI_NAME$. Він розчарувався і пішов вивчати традиції $SECT_PURE_LAND_SCHOOL_NAME$, зрештою заснувавши нову гілку. Зосереджуючись на #italic Ненбуцу#!, читанні імені Будди, вираз #italic Наму Аміда Буцу#! майже став синонімом цієї школи, використовується як спосіб вираження вдячності Будді Аміда."
  nichiren_policy: "$SECT_NICHIREN_NAME$"
  nichiren_policy_desc: "Заснована $buddhist_ADJ$ ченцем Нічіреном, більша частина її доктрини походить з #italic Лотосової Сутри#!, але вона протистоїть будь-яким відхиленням від основних вчень, включаючи езотеричні практики та ритуали. Вона диктує, що дії людини та їх наслідки, а не лише медитація, впливають на досягнення просвітлення."
  nyigma_policy: "$SECT_NYIGMA_NAME$"
  nyigma_policy_desc: "Найстаріша школа $tibetan_buddhism$, вона містить унікальні вчення, не зустрічаються в жодній іншій формі $buddhist$. Вона вважає #italic Дзогчен#!, «Велику Досконалість», найпрямішим шляхом до просвітлення, прописуючи цей метод вище тих, що пропагуються іншими школами. Однак її критикували конкуруючі школи за відсутність зв'язку з пізнішими індійськими тантричними практиками, оскільки її тексти походять з першого введення $buddhist$ у $tibet_region$."
  kadam_policy: "$SECT_KADAM_NAME$"
  kadam_policy_desc: "Наголошуючи на співчутті, навчанні та дисципліні, вона намагається створити всеосяжний і систематичний $buddhist_ADJ$ шлях Махаяни до досягнення просвітлення. Вона також має на меті інтегрувати мирян у $buddhist_ADJ$ повсякденне життя, залишаючи тантричні практики для просунутих ініціатів."
  kagyu_policy: "$SECT_KAGYU_NAME$"
  kagyu_policy_desc: "$SECT_KAGYU_NAME$ зосереджується на #italic Махамудрі#!, «Великій Печатці», яка є символом досягнення знання або усвідомлення внутрішньої порожнечі реальності. Хоча сама школа розійшлася на кілька підшкіл, усі зі своїми невеликими відмінностями в інтерпретації та практиках, усі визнають Махамудру."
  sakya_policy: "$SECT_SAKYA_NAME$"
  sakya_policy_desc: "Виникнувши в монастирі Сак'я, вона зосереджується на #italic Ламдре#!, системі медитації з максимою, що результат практики вже внутрішньо міститься в шляху. Ці вчення містяться в тантрі #italic Хеваджри#!, і школа містить численні тантричні практики."
  jonang_policy: "$SECT_JONANG_NAME$"
  jonang_policy_desc: "Основною практикою $SECT_JONANG_NAME$ є Калачакра Тантра, і школа є захисником філософії Шентонг. У ній стверджується, що фізична реальність порожня від внутрішнього існування, але натомість кінцева реальність — або природа Будди — ні. Природа Будди наповнена своїми незліченними пробудженими якостями."
  hun_frontier_fortresses: "Прикордонні фортеці"
  hun_frontier_fortresses_desc: "Наші володіння оточені багатьма агресивними сусідами. Щоб захистити наш народ, ми повинні інвестувати в укріплення на наших кордонах, забезпечуючи їх належне фінансування та постачання."
  vegvar_system: "Система Вегвар"
  vegvar_system_desc: "[GetEstateName('crown_estate')] регулярно робить фінансові внески на утримання мережі міцних укріплень по всьому нашому королівству."
  not_maintained: "Не підтримується"
  not_maintained_desc: "Наші великі фортеці наразі перебувають у занепаді через нездатність [GetEstateName('crown_estate')] фінансувати їхнє утримання."
  enclosure_movement: "Рух обгороджування"
  enclosure_movement_desc: "Рух обгороджування — це процес, за якого раніше спільні землі оточуються стінами або огорожами і таким чином перетворюються на приватну власність."
  enclosure_allowed: "Обгороджування дозволено"
  enclosure_allowed_desc: "Дозволяючи обгороджування, ми дозволяємо спільним землям, що використовуються місцевим населенням, ставати приватною власністю та використовуватися виключно власником."
  enclosure_disallowed: "Обгороджування заборонено"
  enclosure_disallowed_desc: "Спільні землі захищені від перетворення на обгороджені та не можуть бути приватною власністю."
  enclosure_act: "Акт про обгороджування"
  enclosure_act_desc: "Громадські землі надалі обгороджуються або приватизуються, щоб підтримати розвиток комерційного сільського господарства та зростання індустріалізації."
  fra_taille: "Талья"
  fra_taille_desc: "#italic Талья#! — це податок, що накладається на кожне домогосподарство залежно від кількості землі, яку воно займає. [GetEstateName('clergy_estate')] та [GetEstateName('nobles_estate')] звільняються від нього."
  permanent_tax: "Постійний податок"
  permanent_tax_desc: "Встановлює #italic талью#! як звичайний податок, розширюючи потенційний збір доходів державою."
  exceptional_only: "Лише винятковий"
  exceptional_only_desc: "Встановлює #italic талью#! як винятковий податок, який може стягуватися лише в часи потреби."
  fra_5_percent_tax: "П'ятивідсотковий податок Машо"
  fra_5_percent_tax_desc: "Новий податок, запропонований міністром фінансів, що становить одну двадцяту річного доходу."
  five_percent_tax: "Для всіх станів"
  five_percent_tax_desc: "П'ятивідсотковий податок стягується з усіх людей, незалежно від їхнього статусу."
  no_five_percent_tax: "Лише для селян"
  no_five_percent_tax_desc: "П'ятивідсотковий податок стягується лише з [ShowEstateTypeName('peasants_estate')]."
  eng_taxation_law: "Оподаткування"
  eng_taxation_law_desc: "Стабільні доходи є ключовими для функціонуючого уряду. Впровадивши правову базу оподаткування, ми можемо регулювати збір податків з фізичних та юридичних осіб."
  income_tax: "Податкування доходів"
  income_tax_desc: "Податок безпосередньо надходить від [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], з прогресивною ставкою, що оподатковує [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] на основі їхнього доходу."
  trade_tax: "Торгове оподаткування"
  trade_tax_desc: "Основна частина податкових надходжень надходить переважно від митних зборів та акцизів, які несуть [GetEstateName('burghers_estate')]."
  traditional_tax: "Традиційне оподаткування"
  traditional_tax_desc: "Податки стягуються зі [Concept('estates', 'CONCEPT_PLACEHOLDER')|e], причому привілеї диктують рівень оподаткування. Звичайний стан справ."
  factory_working_conditions_law: "Умови праці на фабриках"
  factory_working_conditions_law_desc: "Розширення нашої обробної промисловості прискорює індустріалізацію та збільшує виробничі потужності. Оскільки фабричні робітники стають все більш центральними для економіки, регулювання їхніх прав для запобігання експлуатації стає життєво важливим."
  decent_conditions: "Гідні умови"
  decent_conditions_desc: "Встановлюється максимальний 12-годинний робочий день, і проводяться регулярні перевірки фабрик."
  fair_conditions: "Справедливі умови"
  fair_conditions_desc: "На додаток до регульованих робочих годин та інспекцій на фабриках, пропонується додатковий захист для дітей-працівників, обмежуючи їхні робочі години та вимагаючи можливостей для освіти."
  unregulated_conditions: "Нерегульовані умови"
  unregulated_conditions_desc: "Власники фабрик вільні вести свій бізнес на власний розсуд. Нещасні випадки є частим явищем, працівники часто зазнають експлуатації, а смертельні випадки на робочому місці є надто поширеними."
  trade_unions_law: "Профспілки"
  trade_unions_law_desc: "На ранньому етапі індустріалізації профспілки відіграють вирішальну роль у формуванні трудових прав та умов праці. Ці профспілки ведуть переговори з роботодавцями, щоб забезпечити кращу заробітну плату, коротший робочий день та безпечніші умови для своїх членів через колективні переговори."
  trade_unions_allowed: "Дозволено"
  trade_unions_allowed_desc: "Працівники можуть брати участь у колективних переговорах та страйках, а також проводити протести, щоб порушити виробництво та змусити роботодавців задовольнити вимоги."
  trade_unions_prohibited: "Заборонено"
  trade_unions_prohibited_desc: "Працівникам не дозволяється об'єднувати зусилля або намагатися здійснювати будь-які колективні дії. Страйки є незаконними."
  guilds_of_florence: "Верховенство флорентійських гільдій"
  guilds_of_florence_desc: "Могутні торговельні інститути, що складають нашу соціальну структуру, купецькі гільдії є важливим прихильником нашого постійного процвітання та достатку. Хоча всі вони важливі, безперечно, деякі краще здобувають владу та вплив, ніж інші."
  consiglio_maggiore: "Консільйо Маджоре"
  consiglio_maggiore_desc: "Орган аристократів та різних класів громадян, включаючи [GetEstateName('burghers_estate')] та ремісників, а також банкірів, #italic Консільйо Маджоре#! відповідає за автократичний апарат у нашій Республіці."
  arti_minori: "Арті Мінорі"
  arti_minori_desc: "#italic Арті Мінорі#! стосується менших торговельних асоціацій, що представляють ремісників та інші професії меншого масштабу та важливості. Ці гільдії зосереджені на спеціалізованих навичках, таких як виготовлення сідел, слюсарство або теслярство, і вони мають найнижчий статус у купецькій сфері."
  arti_mediane: "Арті Медіане"
  arti_mediane_desc: "#italic Арті Медіане#! слугують проміжними гільдіями, що займають середнє положення між #italic Арті Мінорі#! та #italic Арті Маджоре#!. Ці гільдії представляють ремесла та професії помірного масштабу та впливу, такі як ковальство та шевство, і діяли як міст між меншими спеціалізованими ремеслами та більш домінуючими галузями."
  arti_maggiori: "Арті Маджоре"
  arti_maggiori_desc: "#italic Арті Маджоре#! є найбільшими та найвпливовішими купецькими гільдіями. Ці гільдії представляють основні галузі та торгівлю, що мають значну економічну та політичну владу, такі як текстильна промисловість або банківський та фінансовий сектор."
  ordinances_of_justice: "Ордонанси Справедливості"
  ordinances_of_justice_desc: "Набір правових рамок, спрямованих на обмеження влади впливових [GetEstateName('nobles_estate')], які не узгоджуються з порядком денним нашої центральної влади. Ці набори юриспруденції мають на меті протистояти могутньому дворянському класу."
  por_estudo_geral_law: "Ештуду Жерал"
  por_estudo_geral_law_desc: "[ShowModifier('por_estudo_geral')] — це національний [ShowBuildingTypeName('university')], що має на меті освічувати громадян нашої скромної держави. Його розташування та близькість до столиці є для нас вирішальним питанням."
  por_estudo_in_coimbra: "$por_estudo_geral_law$ у [ShowLocationNameWithNoTooltip('coimbra')]"
  por_estudo_in_coimbra_desc: "Розташувавши національний [ShowBuildingTypeName('university')] у відомому науковому поселенні [ShowLocationName('coimbra')], ми забезпечимо його незалежність та запевнимо стани в наших освітніх цілях."
  por_estudo_in_lisbon: "$por_estudo_geral_law$ у [ShowLocationNameWithNoTooltip('lisbon')]"
  por_estudo_in_lisbon_desc: "Заснування $por_estudo_geral_law$ на периферії двору дозволить нам централізувати владу та здійснювати більший контроль над діяльністю [ShowBuildingTypeName('university')]."
  teu_amber_monopoly_law: "Монополія на [ShowGoodsNameWithNoTooltip('amber')]"
  teu_amber_monopoly_law_desc: "[ShowGoodsName('amber')] є одним з найцінніших ресурсів у нашій державі. Його торгівля має велике значення і повинна ретельно регулюватися."
  state_controlled_amber_gathering: "Державний контроль над видобутком"
  state_controlled_amber_gathering_desc: "Держава залишає за собою виключне право на управління ресурсом [ShowGoodsName('amber')]. Експорт цього цінного товару контролюється урядовими міністрами, що зміцнює авторитет правлячого класу."
  burghers_controlled_amber_gathering: "[ShowGoodsNameWithNoTooltip('amber')] у руках [GetEstateNameWithNoTooltip('burghers_estate')]"
  burghers_controlled_amber_gathering_desc: "Можливо, найкраще, щоб [ShowGoodsName('amber')] контролювався безпосередньо тими, хто ним торгує. Усунувши дрібних посередників з торгового процесу, наш загальний дохід значно зросте."
  peasant_controlled_amber_gathering: "Видобуток [GetEstateNameWithNoTooltip('peasants_estate')]"
  peasant_controlled_amber_gathering_desc: "[ShowGoodsName('amber')] має контролюватися руками, які його збирають. Збір ресурсу буде здійснюватися [ShowEstateTypeName('peasants_estate')]."
  jap_sakoku_law: "Заморська взаємодія"
  jap_sakoku_law_desc: "$japan_region$ завжди мав розкіш бути відокремленим від інших країн морем. Ця відстань дуже полегшує закриття наших кордонів для зовнішнього світу."
  sakoku_enabled: "Сакоку"
  sakoku_enabled_desc: "Вільна від зовнішніх впливів, наша територія обов'язково покращить свою продуктивність та економічне зростання."
  sakoku_disabled: "Відкрита країна"
  sakoku_disabled_desc: "З відкритими для світу кордонами торгівля та нові ідеї можуть вільно поширюватися."
  jap_buke_shohatto: "Буке Сьохатто"
  jap_buke_shohatto_desc: "Серія едиктів, що визначають належну поведінку самураїв. Вони покликані надихнути самураїв на самовдосконалення."
  jap_buke_shohatto_enforced: "Застосовано $jap_buke_shohatto$"
  jap_buke_shohatto_enforced_desc: "Наші самураї мають чітку модель для самовдосконалення, і вони зобов'язані її дотримуватися."
  jap_buke_shohatto_guidelines: "Настанови $jap_buke_shohatto$"
  jap_buke_shohatto_guidelines_desc: "$jap_buke_shohatto$ вважається набором загальних настанов, а не жорстких правил, і слугує романтичним ідеалом для наслідування, а не суворим кодексом для підкорення."
  clan_residence: "Резиденція клану"
  clan_residence_desc: "Мають бути чіткі закони, що визначають, де повинні проживати лідери різних кланів, щоб належним чином підтримувати баланс сил."
  appointed_posts_policy: "Призначені посади"
  appointed_posts_policy_desc: "Різні лідери кланів мають певні посади, призначені [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle], якому вони присягають на вірність. Це забезпечує гнучкість в управлінні країною."
  enable_grant_shugo_office_tt: "Дозволяє [ShowGenericActionName('grant_shugo_office')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e]"
  enable_revoke_shugo_office_tt: "Дозволяє [ShowGenericActionName('revoke_shugo_office')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e]"
  enable_claim_shugo_office_tt: "Дозволяє [ShowGenericActionName('claim_shugo_office')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e]"
  established_domains_policy: "Установлені володіння"
  established_domains_policy_desc: "Клани мають власні володіння, на які вони мають спадкові права. Це звільнить бюрократію [GetUniqueInternationalOrganization('japanese_shogunate').GetName] і дозволить їй зосередитися на важливіших завданнях, але також посилить владу кланів."
  sankin_kotai_policy: "Санкін-котай"
  sankin_kotai_policy_desc: "$sankin_kotai_policy$ — це система, за якої васали [GetUniqueInternationalOrganization('japanese_shogunate').GetName] чергують перебування між столицею та своїми землями. Перебуваючи в столиці, вони, природно, повинні демонструвати своє багатство, і цей фінансовий тягар має поглинути достатньо їхніх коштів, щоб запобігти будь-яким зловмисним діям."
  nav_adaptability: "Наваррська адаптивність"
  nav_adaptability_desc: "Розташування між двома більшими націями змусило нашу націю адаптуватися або загинути. Завдяки поєднанню розумних альянсів та швидких військових дій, наше королівство зуміло вижити, незважаючи на свій менший розмір. Ця здатність швидко коригувати наші дії відповідно до наших конкретних потреб є перевагою, яку ми ніколи не повинні втрачати."
  belligerent_stance: "Войовнича позиція"
  belligerent_stance_desc: "Лише агресивна позиція забезпечить нашу безпеку. Ми використаємо всі наявні засоби, щоб дати зрозуміти: той, хто нападе на нас, заплатить високу ціну."
  conciliatory_stance: "Примирлива позиція"
  conciliatory_stance_desc: "Час боротьби минув, і ми повинні перейти до використання більшої дипломатії. Зрештою, «на мед мухи летять краще, ніж на оцет»."
  defensive_stance: "Оборонна позиція"
  defensive_stance_desc: "Наші землі такі ж суворі, як і наш народ. Нехай наші вороги прийдуть і проллють кров на нашій землі; майбутні врожаї зростуть міцнішими."
  offensive_stance: "Наступальна позиція"
  offensive_stance_desc: "Ми нікого не боїмося, і як каже старе прислів'я: «найкращий захист — це хороший напад». Ми атакуємо першими і будемо смертоноснішими за тих, хто загрожує нашому існуванню!"
  maiestas_carolina: "Maiestas Carolina"
  maiestas_carolina_desc: "Звід законів та статей, розроблений для значного обмеження влади [ShowEstateTypeName('nobles_estate')]. Кодекс передбачає перехід дворянського майна до держави за певних обставин, а також обмеження довільних повноважень $nobles_estate$ по всьому нашому королівству."
  order_of_chivalry_law: "Орден лицарства"
  order_of_chivalry_law_desc: "Цей закон, що ґрунтується на поєднанні релігійних та придворних традицій, втілює спадщину лицарів, присвячених [ShowReligionGroupAdjective('christian')] ідеалам та благодійним місіям. Спочатку засновані для захисту паломників до Святої Землі та дотримання обітниць бідності, послуху та цнотливості, ці ордени з часом трансформувалися, вшановуючи видатних особистостей і ставши престижним символом."
  has_not_assumed_chivalric_order_in_last_25_years_tt: "Ми не приймали #Y $order_of_chivalry_law$#! протягом останніх #Y 25 років#!"
  order_of_saint_george_policy: "Орден Святого Георгія"
  order_of_saint_george_policy_desc: "Ця урядова реформа, відома як «Лицарське товариство Святого Георгія», втілює відданість ідеалам лицарства та честі, пропагуючи ці цінності через лицарські турніри та свята."
  order_of_the_ermine_policy: "Орден Горностая"
  order_of_the_ermine_policy_desc: "Орден Горностая черпає натхнення з [GetCountry('ENG').GetAdjective] Ордену Підв'язки. З горностаєм як своїм символом, що уособлює непохитну особисту честь, орден визнає як чоловіків, так і жінок, незалежно від соціального статусу, за виняткову службу Герцогству [ShowAreaName('brittany_area')]."
  order_of_the_dragon_policy: "Орден Дракона"
  order_of_the_dragon_policy_desc: "Також відомий як '#italic Societas Draconica#!', цей Орден був присвячений захисту [GetCountry('HUN').GetAdjective] монархії, [ShowReligionName('catholic')] Церкви та [ShowReligionName('christianity')] від загрози [GetCountry('TUR').GetLongName], єретиків та язичників. Створений за зразком Ордену Святого Георгія та натхненний хрестоносним духом того часу, він об'єднує [ShowEstateTypeName('nobles_estate')] та [ShowEstateTypeName('crown_estate')] під символами уробороса та червоного хреста, сприяючи колективному захисту від зовнішніх та внутрішніх загроз, пропонуючи $nobles_estate$ королівський захист та почесті в обмін на їхню вірність."
  order_of_the_band_policy: "Орден Стрічки"
  order_of_the_band_policy_desc: "Орден Стрічки складається з найвидатніших лицарів, які присягають на вірність і послух правителю [GetCountry('CAS').GetName]. Його члени дотримуються високих стандартів скрупульозної та бездоганної придворної поведінки, регулярно беруть участь у лицарських турнірах і повинні бути перш за все відданими та лояльними своєму правителю."
  order_of_the_swan_policy: "Орден Лебедя"
  order_of_the_swan_policy_desc: "Орден Лебедя присвячений поширенню благочестя та культу Діви Марії. До членів цього Ордену входять багато князів з правлячої династії, а також [ShowEstateTypeName('nobles_estate')], усі об'єднані у своїй наполегливості."
  order_of_the_black_eagle_policy: "Орден Чорного Орла"
  order_of_the_black_eagle_policy_desc: "Світський Орден Чорного Орла є скоріше військовим, ніж духовним орденом. До членів цього Ордену зазвичай входять члени королівської родини, іноземні королівські особи, що відвідують країну, та видатні генерали, нагороджені за свої заслуги."
  order_of_the_white_eagle_policy: "Орден Білого Орла"
  order_of_the_white_eagle_policy_desc: "Військовий $order_of_the_white_eagle_policy$ присуджується найближчим прихильникам держави та найвидатнішим з наших громадян як нагорода за їхню службу країні. Він також надається високопоставленим гостям, які вшанували нас своєю присутністю."
  six_ministries_overseer_law: "Нагляд за Шістьма Міністерствами"
  six_ministries_overseer_law_desc: "Робота [ShowLawName('six_ministries')] повинна контролюватися іншим відомством, або, можливо, навіть монархом."
  chi_grand_chancellorship: "Велика Канцелярія"
  chi_grand_chancellorship_desc: "Шість Міністерств звітуватимуть перед Канцелярією, представленою Лівим і Правим Канцлерами, причому перший з них обіймає старші посади."
  chi_grand_secretariat: "Великий Секретаріат"
  chi_grand_secretariat_desc: "Шість Міністерств передаватимуть свої документи до $chi_grand_secretariat$, який проводитиме аналіз та готуватиме їх для представлення монарху."
  chi_direct_report: "Прямі Звіти"
  chi_direct_report_desc: "Шість Міністерств звітуватимуть безпосередньо монарху. Це зміцнює владу монарха, але може також знизити ефективність управління."
  ashta_pradhan_council_law: "Рада Ашта Прадхан"
  ashta_pradhan_council_law_desc: "$mhr_ashta_pradhan_desc$"
  apc_peshwa_focus_policy: "Фокус на Пешві"
  apc_peshwa_focus_policy_desc: "Пешва є прем'єр-міністром, відповідальним за загальне управління державою.\nРада надасть більше влади Пешві, збільшуючи його вплив у державі."
  apc_mazumdar_focus_policy: "Фокус на Мазумдарі"
  apc_mazumdar_focus_policy_desc: "POSTEDIT_Мазумдар — це міністр фінансів, відповідальний за управління державними рахунками.\nРада надасть більше влади POSTEDIT_Мазумдару, збільшивши його вплив у державі."
  apc_sacheev_focus_policy: "Фокус на Сачієві"
  apc_sacheev_focus_policy_desc: "POSTEDIT_Сачієв — це секретар, відповідальний за підготовку королівських указів та інших державних політик.\nРада надасть більше влади POSTEDIT_Сачієву, збільшивши його вплив у державі."
  apc_waqia_navis_focus_policy: "Фокус на Вакія-Навісі"
  apc_waqia_navis_focus_policy_desc: "POSTEDIT_Вакія-Навіс — це міністр внутрішніх справ, відповідальний за розвідувальну та шпигунську адміністрацію держави.\nРада надасть більше влади POSTEDIT_Вакія-Навісу, збільшивши його вплив у державі."
  apc_senapati_focus_policy: "Фокус на Сенапаті"
  apc_senapati_focus_policy_desc: "POSTEDIT_Сенапаті — це головнокомандувач, відповідальний за військові справи та оборону держави.\nРада надасть більше влади POSTEDIT_Сенапаті, збільшивши його вплив у державі."
  apc_dabir_focus_policy: "Фокус на Дабірі"
  apc_dabir_focus_policy_desc: "POSTEDIT_Дабір — це міністр закордонних справ, відповідальний за дипломатичні справи держави.\nРада надасть більше влади POSTEDIT_Дабіру, збільшивши його вплив у державі."
  apc_nyayadhish_focus_policy: "Фокус на Ньяядхіші"
  apc_nyayadhish_focus_policy_desc: "POSTEDIT_Ньяядхіш — це головний суддя, відповідальний за цивільні та кримінальні справи держави.\nРада надасть більше влади POSTEDIT_Ньяядхішу, збільшивши його вплив у державі."
  apc_panditrao_focus_policy: "Фокус на Пандітрао"
  apc_panditrao_focus_policy_desc: "POSTEDIT_Пандітрао — це верховний жрець, відповідальний за релігійні справи держави.\nРада надасть більше влади POSTEDIT_Пандітрао, збільшивши його вплив у державі."
  civil_registration: "Цивільна реєстрація"
  civil_registration_desc: "Система, спрямована на облік усіх наших підданих у нашому володінні як крок до покращення якості життя для всіх під нашим прапором."
  delegated_civil_registration_policy: "Делегована $civil_registration$"
  delegated_civil_registration_policy_desc: "Ми дозволимо нашим провінційним губернаторам контролювати процес реєстрації у їхніх власних провінціях. Це може призвести до браку ефективності, але вони відчуватимуть, що їхній авторитет був поважаний."
  centralized_civil_registration_policy: "Централізована $civil_registration$"
  centralized_civil_registration_policy_desc: "Центральна державна влада візьме під контроль процес реєстрації, щоб покращити ефективність, хоча місцевим губернаторам не сподобається це привласнення їхніх обов'язків."
  tax_base_system: "Система податкової бази"
  tax_base_system_desc: "Оподаткування є основою економіки будь-якої країни. Встановивши належну систему оподаткування по всьому [GetUniqueInternationalOrganization('middle_kingdom').GetName], ми зможемо ефективніше збирати багатства наших територій."
  rice_based_tax: "Податок на основі рису"
  rice_based_tax_desc: "Традиційний податок і валютний стандарт протягом століть, [ShowGoodsName('rice')], продовжуватиме служити основою нашої системи оподаткування."
  single_whip_policy: "Політика єдиного батога"
  single_whip_policy_desc: "Запровадивши $single_whip_policy$, ми встановимо [ShowGoodsName('silver')] як основу нашої податкової системи, вимагаючи, щоб усі фінансові зобов'язання перед центральним урядом сплачувалися цим дорогоцінним металом."
  provincial_governorship: "Провінційне губернаторство"
  provincial_governorship_desc: "Велич [GetUniqueInternationalOrganization('middle_kingdom').GetName] не має собі рівних. Щоб ефективно керувати нашими величезними володіннями, ми створимо систему провінційних адміністраторів."
  curtailed_governors_policy: "Обмежені губернатори"
  curtailed_governors_policy_desc: "Провінційні губернатори лише поширюють корупцію та лінь. Ми повинні тримати їх на короткому повідку, щоб влада центрального уряду не розмивалася навіть у найвіддаленіших регіонах."
  established_provincial_governors: "Призначені провінційні губернатори"
  established_provincial_governors_desc: "Посада провінційного губернатора є престижною і дуже затребуваною. Призначені губернатори з чітко визначеною територією та адміністративними обов'язками дозволять механізмам нашого уряду працювати більш злагоджено."
  zongdu_policy: "Zǒngdū"
  zongdu_policy_desc: "Територія [GetUniqueInternationalOrganization('middle_kingdom').GetName] занадто велика для простих губернаторів. Давайте створимо посаду $zongdu_policy$, намісника, який наглядатиме за кількома провінціями. Вони керуватимуть провінційними справами як представники [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle], щоб менш важливі питання не доводилося доповідати до столиці."
  zongdu_policy_scaling: "Кількість [ShowGoodsName('silver')], виробленого в [Concept('country', 'CONCEPT_PLACEHOLDER')|e]"
  introduce_gaituguiliu_policy: "Система Gǎitǔguīliú"
  introduce_gaituguiliu_policy_desc: "Місцеві вожді у віддалених префектурах, також відомі як [ShowSubjectTypeName('tusi')], є спадковими правителями місцевих меншин. Ці лідери іноді можуть здаватися корисними завдяки їхнім зв'язкам з місцевими жителями, але вони часто виявлялися довгостроковим ризиком для регіональної стабільності. Поступово замінюючи їх чиновниками, призначеними центральним урядом, підтримувати спокій на регіональному рівні стане легше."
  unlock_gaituguiliu_tt: "Розблоковує [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] [ShowCabinetActionName('gaituguiliu_policy')] для лідера [GetUniqueInternationalOrganization('middle_kingdom').GetName]"
  lifan_yuan_policy: "Lǐfān Yuàn"
  lifan_yuan_policy_desc: "Для управління численними підданими та меншими державами з віддалених регіонів у межах та за межами Імперського кордону, Міністерство обрядів тепер вважається недостатнім та недоречним. Ми створимо офіс, який зосередиться на роботі з ними."
  cefeng_tizhi: "Cèfēng Tǐzhì"
  cefeng_tizhi_desc: "Система данини існувала в [GetUniqueInternationalOrganization('middle_kingdom').GetName] з моменту її заснування, оскільки всі навколишні нації сумлінно визнають владу [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle]."
  free_cefeng_tizhi_policy: "Вільний $cefeng_tizhi$"
  free_cefeng_tizhi_policy_desc: "Країни природно визнаватимуть перевагу [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle] і схилятимуться перед Драконовим Троном зі своєю даниною, без необхідності правил чи положень для цього."
  codified_cefeng_tizhi_policy: "Кодифікований $cefeng_tizhi$"
  codified_cefeng_tizhi_policy_desc: "Кодифікована, ієрархічна система данини найкраще служить [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle], оскільки вона чітко показує, які держави приносять найбільшу користь Драконовому Трону і тому заслуговують на відповідні винагороди."
  keju_examination: "Іспит Kējǔ"
  keju_examination_desc: "Імперська система іспитів має на меті виявити найкращих та найосвіченіших кандидатів для служби в нашій бюрократії. Це забезпечить, що лише найяскравіші уми нашої нації будуть тими, хто обертає колеса адміністрації, і таким чином, що вони обертатимуться плавно."
  new_keju_formats_policy: "Нові формати Kējǔ"
  new_keju_formats_policy_desc: "Ця реформа спрямована на вдосконалення процесу відбору кандидатів та потенційних бюрократів під час Імперського іспиту. Впровадження нових форматів тестів та встановлення вищих стандартів для кандидатів, безумовно, принесе користь нашій адміністрації."
  new_keju_formats_policy.tt: "[ShowGenericActionName('conduct_keju_examination')] тепер даватиме кращих кандидатів"
  focus_on_classics: "Зосередитися на класиці"
  focus_on_classics_desc: "Класичні тексти [ShowPolicyName('confucianism_policy')] та [ShowPolicyName('daoism_policy')] століттями слугували основою для $keju_examination$. Такі історичні традиції не слід порушувати легковажно."
  direct_appointment: "Пряме призначення"
  direct_appointment_desc: "Бути освіченою людиною не обов'язково означає, що вона придатна для державної роботи. Пряме призначення людей, придатних для виконання завдання, буде ефективнішим."
  direct_appointment.tt: "Вимикає [Concept('action', 'CONCEPT_PLACEHOLDER')|e] [ShowGenericActionName('conduct_keju_examination')]"
  military_examination: "Ввести військові іспити"
  military_examination_desc: "Бюрократи, які складають імперські іспити, повинні бути перевірені не лише на їхні навички в державному управлінні, але й на їхню стрільбу з лука та верхову їзду."
  outwards_view: "Зовнішній погляд"
  outwards_view_desc: "[GetUniqueInternationalOrganization('middle_kingdom').GetName] розширював свою владу назовні з моменту свого заснування, але зовнішні загрози вимагають від нас певної обережності щодо того, хто може в'їжджати на його кордони."
  allow_trade: "Дозволити торгівлю"
  allow_trade_desc: "Не випадково Шовковий шлях був джерелом великого процвітання для [GetUniqueInternationalOrganization('middle_kingdom').GetName], бо саме через торгівлю та зовнішній обмін нація отримує вигоду."
  haijin_policy: "Hǎijìn"
  haijin_policy_desc: "Моря та океани приносять клопоти. Піратство, контрабанда... іноді навіть потенційні узурпатори ховаються за хвилями та припливами. І все ж, морська торгівля також приносить багатство та відкриття. Щоб багатство та інновації вільно надходили до нашого великого царства, ми повинні встановити правила морської заборони."
  tianxia: "Tiānxià"
  tianxia_desc: "Концепції нашого територіального впливу та розширення гарантовані нашим правом на правління, яке дароване самим Небом."
  expand_the_tianxia_policy: "Розширити $tianxia$"
  expand_the_tianxia_policy_desc: "Суверенітет [GetUniqueInternationalOrganization('middle_kingdom').GetName] та його право на правління залишатимуться беззаперечними, доки виконується його божественний обов'язок. Усі, хто під Небом, захищені Драконовим Троном, як і різні піддані, що схиляються перед ним."
  chi_have_extra_celestial_governor_tt: "[GetUniqueInternationalOrganization('middle_kingdom').GetName] тепер може мати ще одного $celestial_governor$."
  restrict_the_tianxia_policy: "Обмежити $tianxia$"
  restrict_the_tianxia_policy_desc: "Лише прямій владі [GetUniqueInternationalOrganization('middle_kingdom').GetName] можна довірити правління над усім під Небом. Драконовий Трон не може принижувати себе, делегуючи свою владу меншим країнам."
  jakun_gusa: "Jakūn Gūsa"
  jakun_gusa_desc: "Система Восьми Прапорів, що слугує переважно нашою армією, також є основою організації суспільства в [GetUniqueInternationalOrganization('middle_kingdom').GetName]. Їхня роль повинна бути чітко визначена, щоб вони не втратили своєї зосередженості."
  revise_the_jakun_gusa_policy: "Переглянути $jakun_gusa$"
  revise_the_jakun_gusa_policy_desc: "Армія Прапорів вірно служила нам, завдаючи ударів нашим ворогам і забезпечуючи вирішальні перемоги. Якщо ми хочемо підтримувати їхню найкращу форму та дисципліну, ми повинні реформувати та покращити їх, інакше вони ризикують занепасти."
  chinese_jakun_gusa: "$chinese_group$ $jakun_gusa$"
  chinese_jakun_gusa_desc: "$jakun_gusa$ добре служили на північних степах, але як частина [GetUniqueInternationalOrganization('middle_kingdom').GetName] їх потрібно було б інтегрувати в систему [ShowCultureGroupName('chinese_group')]."
  six_ministries: "Шість міністерств"
  six_ministries_desc: "$six_ministries$ є окремими адміністративними підрозділами [GetUniqueInternationalOrganization('middle_kingdom').GetName], кожен зі своїми завданнями та обов'язками."
  ministry_of_rites: "Міністерство обрядів"
  ministry_of_rites_desc: "Ведення наших релігійних та палацових справ Lǐbù є справою надзвичайної делікатності та важливості. Забезпечивши добре функціонуюче та здібне міністерство, присвячене збереженню та демонстрації обрядів, ми підтримуватимемо відмінний стандарт."
  countries_more_likely_to_accept_invite_to_sect_tt: "Більш охочі приєднатися до нашої [Concept('sect', 'CONCEPT_PLACEHOLDER')|e]"
  ministry_of_personnel: "Міністерство кадрів"
  ministry_of_personnel_desc: "Відповідальне за всіх людей, які служать у нашій адміністрації, Lìbù є наріжним каменем нашого уряду. Забезпечуючи безперебійну роботу його офісів, ми, своєю чергою, гарантуємо, що наші державні посади будуть добре укомплектовані."
  better_exams_results_tt: "Отримаємо кращих кандидатів під час [ShowGenericActionName('conduct_keju_examination')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e]"
  ministry_of_revenue: "Міністерство доходів"
  ministry_of_revenue_desc: "Hùbù відповідає за все, що пов'язано з грошима та валютою, від проведення переписів до збору податків та адміністрування валютних курсів. Таким чином, підтримка належного функціонування міністерства є вирішальною для процвітання нашого царства."
  better_census_results_tt: "Отримаємо кращі результати, коли ми [ShowGenericActionName('proclaim_decree')] щодо [ShowPolicyName('conduct_population_census_decree')]"
  ministry_of_war: "Військове міністерство"
  ministry_of_war_desc: "Відповідальне за все, що пов'язано з військовою справою, Bīngbù займається не лише набором та утриманням військ, але й підтримує всі військові будівлі, обладнання та припаси. Належне укомплектування міністерства є вимогою, якщо ми хочемо бути тріумфаторами в битві."
  better_reinforce_fortification_results_tt: "Отримаємо кращі результати, коли ми [ShowGenericActionName('proclaim_decree')] щодо [ShowPolicyName('reinforce_fortifications_decree')]"
  ministry_of_justice: "Міністерство юстиції"
  ministry_of_justice_desc: "Вся судова система управляється Xíngbù, від дрібних злочинів до більш серйозних правопорушень, хоча воно не має повноважень над вищими сферами уряду. Підтримка його належного функціонування забезпечить мирне суспільство в нашому царстві."
  better_warning_results_tt: "Отримаємо кращі результати, коли ми [ShowGenericActionName('proclaim_decree')] щодо [ShowPolicyName('issue_great_warnings_decree')]"
  ministry_of_works: "Міністерство громадських робіт"
  ministry_of_works_desc: "Керуючи всім будівництвом у країні, Gōngbù відповідає за будівництво та підтримку всієї інфраструктури в нашому царстві, від будівель до доріг та каналів, а також за управління ресурсами та стандартизацію ваг і мір. Забезпечуючи безперешкодну роботу міністерства, інфраструктура нашого царства завжди матиме міцні основи."
  better_infrastructure_works_results_tt: "Отримаємо кращі результати, коли ми [ShowGenericActionName('proclaim_decree')] щодо [ShowPolicyName('commence_infrastructure_works_decree')]"
  middle_kingdom_decrees: "$middle_kingdom$"
  middle_kingdom_decrees_desc: "Імперські укази є ключем до належного функціонування [GetUniqueInternationalOrganization('middle_kingdom').GetName], забезпечуючи, що влада [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle] буде поширена по всій території."
  expand_palace_bureaucracy_decree: "Розширити палацову бюрократію"
  expand_palace_bureaucracy_decree_desc: "Розмір нашого двору вважає за необхідне посилити та розширити наші бюрократичні зусилля, якщо ми бажаємо підтримувати ефективність та швидкість."
  conduct_population_census_decree: "Провести перепис населення"
  conduct_population_census_decree_desc: "Наше величезне царство тримається на плечах спроможної бюрократичної системи, а міцна основа для нашої податкової системи полягає у належних переписних записах. Щоб сприяти належному функціонуванню нашої бюрократії, ми розпочнемо перепис по всіх наших землях."
  increase_tariff_control_decree: "Посилити тарифний контроль"
  increase_tariff_control_decree_desc: "Багатства $china$ часто бажані іноземними купцями. Було б мудро запровадити тарифний контроль і контролювати потік товарів, що входять та виходять за наші кордони."
  issue_great_warnings_decree: "Видати Великі попередження"
  issue_great_warnings_decree_desc: "Поняття дбайливої адміністрації, спроможних бюрократів та опору корупції часто залежать одне від одного. Таким чином, державне управління є формою моралі."
  commence_infrastructure_works_decree: "Розпочати інфраструктурні роботи"
  commence_infrastructure_works_decree_desc: "Дороги — це життєва сила нашого подальшого процвітання. Прагнучи з'єднати наші віддалені провінції та сприяти цінній купецькій діяльності, ми візьмемося за створення міцних інфраструктурних мереж по всіх наших землях."
  reinforce_fortifications_decree: "Посилити укріплення"
  reinforce_fortifications_decree_desc: "Наші укріплення — запорука нашого виживання. Ми повинні підтримувати їх у відмінному стані та забезпечити належне укріплення всіх вразливих точок нашої території."
  middle_kingdom_members: "Всього [Concept('members', 'CONCEPT_PLACEHOLDER')|e] у [GetUniqueInternationalOrganization('middle_kingdom').GetName]"
  sinicized_cabinet_policy: "Синізований Кабінет"
  sinicized_cabinet_policy_desc: "Наш кабінет наслідує модель, вперше прийняту та просунуту деякими з наймогутніших династій $china$, розділяючи ті ж впливи та прагнучи бути вправним і спроможним."
  limit_chinese_influence_policy: "Обмежити вплив китайського двору"
  limit_chinese_influence_policy_desc: "Інтереси наших власних станів повинні бути на першому місці перед зовнішнім тиском та впливами, що поширюються [GetCountry('CHI').GetName]."
  limit_chinese_traditions: "Обмежити китайські традиції"
  limit_chinese_traditions_desc: "Прагнучи зберегти та вплести наші традиції в аннали історії, ми повинні залишатися пильними, щоб не стати просто ще однією державою-сателітом більшої сили."
  promote_chinese_traditions: "Просувати китайські традиції"
  promote_chinese_traditions_desc: "Незважаючи на нашу схильність до культури та збереження наших звичаїв, для нас є велика користь, якщо ми вирішимо вивчати звичаї наших китайських сусідів."
  vestiarium: "Vestiarium"
  vestiarium_desc: "Встановлення та дотримання правових норм для управління державними активами є важливим для ефективного розподілу ресурсів та контрольованих витрат. Це необхідно для адміністрації та допомагає правлячим органам приймати рішення щодо різноманітних пріоритетів."
  diplomatic_focus: "Дипломатичний Фокус"
  diplomatic_focus_desc: "Предмети класифікуються за їхнім практичним та символічним значенням, оскільки їхнє призначення — пишні державні церемонії для враження іноземних сановників та дипломатичні подарунки."
  administrative_focus: "Адміністративний Фокус"
  administrative_focus_desc: "Предмети управляються відповідно до їхньої корисності для врядування та фінансового планування, щоб їх можна було ефективно використовувати для будівельних проєктів та забезпечити контроль над державними витратами."
  monastic_reformation_movement: "Рух монастирської реформації"
  monastic_reformation_movement_desc: "Стяжателі та Нестяжателі мають різні погляди на роль багатства в Церкві та його вплив на духовне життя духовенства та вірян."
  non_possessors: "Нестяжателі"
  non_possessors_desc: "Нестяжателі вірять, що Церква повинна віддалитися від матеріального багатства та дотримуватися більш монастирського та споглядального способу життя. Відмова від мирських володінь важлива для розвитку тісніших стосунків з Богом. Рух сильно вплинув на вчення Ніла Сорського."
  possessors: "Стяжателі"
  possessors_desc: "Стяжателі підтримують володіння Церквою землею та майном, вважаючи це необхідним для того, щоб Церква мала матеріальні блага для виконання своїх духовних та соціальних обов'язків. Прикладами таких зобов'язань є благодійна діяльність, утримання релігійних установ, розвиток інфраструктури та надання освіти."
  sobornoye_ulozheniye_policy: "Соборне уложення"
  sobornoye_ulozheniye_policy_desc: "Соборне уложення слугує основоположним правовим та соціальним кодексом, що адаптує закони до країни з сильною централізованою державою та чіткою соціальною ієрархією. Воно ґрунтується на чинному кодексі та включає певні елементи візантійського кодексу законів, зміцнюючи класові відмінності та кодифікуючи правову систему, що відображає панівні політичні та релігійні впливи того часу."
  intellectual_movements: "Інтелектуальні рухи"
  intellectual_movements_desc: "Ідеологічні погляди дев'ятнадцятого століття розділяють людину настільки, що виникають цілі рухи, кожен з яких випливає з очевидної незгоди між різними філософськими, політичними та культурними точками зору."
  slavophiles: "Слов'янофіли"
  slavophiles_desc: "Слов'янофіли наголошують на важливості Православ'я, общинності, збереженні традиційних цінностей та критиці матеріалізму, індивідуалізму та поверхневого характеру західної культури. Вони віддають перевагу більш ізольованому шляху для збереження унікальної культурної та духовної спадщини."
  westernizers: "Західники"
  westernizers_desc: "Західники цінують тісніші зв'язки з Європою та вірять, що всі повинні пристосуватися до західної культури. Прийняття західних ідей, інститутів та технологій має мати пріоритет для швидкої модернізації, індустріалізації та соціальних реформ. Такі поняття, як культурна ідентичність та релігійна єдність, мають невелику цінність."
  fra_fouage_tax: "Стягнення податку на вогнище (фуаж)"
  fra_fouage_tax_desc: "Великий податок на вогнище, стягуваний з селянства для покриття зростаючих витрат скарбниці."
  allowed_fouage_tax: "Стягнення податку на вогнище (фуаж)"
  allowed_fouage_tax_desc: "Держава стягуватиме податок на вогнище для покриття зростаючих витрат скарбниці. Однак стягнення цього податку сильно розгніває селянство."
  pause_on_fouage_collection: "Скасування стягнення податку на вогнище (фуаж)"
  pause_on_fouage_collection_desc: "Стягнення податку на вогнище (фуаж) було скасовано, що зменшило невдоволення селянства державою."
  couteume_de_normaundie: "Кутюм Нормандії"
  couteume_de_normaundie_desc: "Кодифіковані звичаї [GetCountry('NRM').GetLongName] наголошують на феодальних земельних правах, привілеях знаті та місцевій автономії. Хоча ці закони сприяють децентралізованому та традиційному суспільству, вони формують міцну правову основу, яка забезпечує владу знаті та зберігає самобутню ідентичність [GetCountry('NRM').GetFlavorRank]."
  pronoia_system: "Система пронії"
  pronoia_system_desc: "Система пронії функціонує як засіб тимчасової передачі імперських фіскальних прав, таких як податки або доходи з різних джерел, окремим особам чи установам. На відміну від феодальної системи, поширеної в Європі того часу, пронійні наділи не були ні спадковими, ні передаваними, а кінцеве право власності залишалося за імператором. В обмін на ці привілеї система зрештою слугувала меті для глави держави збирати армію в часи потреби, і передбачала, що війська мали здебільшого покривати власні витрати."
  reformed_pronoia_system: "Реформована система пронії"
  reformed_pronoia_system_desc: "Замість того, щоб дозволити проніарам зміцнювати свою владу над своїми землями, систему було змінено таким чином, що будь-які лазівки, які робили титул проніара спадковим або переданим, більше не можуть бути використані."
  new_corpus_juris_civilis: "Corpus Juris Civilis"
  new_corpus_juris_civilis_desc: "Велика збірка римського права, упорядкована за імператора Юстиніана, зібрала століття постанов, едиктів та мудрості в єдиний корпус. Кодекс, Дигести, Інституції та Новели знову стали основою управління та правосуддя, забезпечуючи нашу владу, правову послідовність та належну поведінку нашого уряду."
  council_of_three_lands_policy: "Рада Трьох Земель"
  council_of_three_lands_policy_desc: "Ця рада, центральний орган єврейської влади, відповідає за релігійні та судові справи з метою поширення релігійної толерантності та захисту свого народу від переслідувань."
  piotrokow_wislica_statutes: "Пйотркувсько-Віслицькі Статути"
  piotrokow_wislica_statutes_desc: "Ці статути, що формують наше законодавство та пропонують міцну основу для майбутнього нашого народу, є всеосяжними та надзвичайно впливовими. Їхня юрисдикція впливає на різні аспекти нашого суспільства, від приватного до публічного права та обов'язків кожного соціального класу."
  rentekammer_policy: "Рентекамер"
  rentekammer_policy_desc: "Казначейство, або #italic Rentekammeret#!, буде керувати нашими фінансами, а #italic Rentemester#! відповідатиме безпосередньо Правителю. Це дозволяє нам краще контролювати фінанси нашої країни."
  dan_regional_law: "Регіональні закони Данії"
  dan_regional_law_desc: "Правові кодекси Ютландії, Зеландії та Сконе надають нам регіональні правові системи. Хоча вони схильні до регіоналізму, вони представлятимуть волю [ShowCultureName('danish')] народу."
  dan_danske_lov: "Данське право"
  dan_danske_lov_desc: "Єдиний правовий кодекс для нашої країни принесе нову стандартизовану правову базу, в якій працюватиме наш уряд, і до якої звертатимуться наші піддані."
  examination_system_policy_korean: "Кваго"
  examination_system_policy_chinese: "Кецзюй"
  examination_system_policy_shu_language: "Кодзю"
  examination_system_policy_xiang_language: "Коджі"
  examination_system_policy_gan_language: "Куоджі"
  examination_system_policy_yue_language: "Фогей"
  examination_system_policy_min_language: "Куогю"
  examination_system_policy_wu_language: "Хуцю"
  examination_system_policy_kejia_language: "Хокі"
  examination_system_policy_jin_language: "Куейджі"
  examination_system_policy_vietnam: "Кхоа банг"
  imperial_examination_law: "Система іспитів"
  imperial_examination_law_desc: "Ті, хто бажає вступити на державну службу та просуватися як урядовці, повинні скласти низку іспитів, що перевіряють їхні знання конфуціанської літератури та державного управління."
  continue_the_imperial_examination: "Безперервна дія"
  continue_the_imperial_examination_desc: "Ця політика забезпечує безперервну дію $imperial_examination_law$, як це було протягом попередніх століть."
  abolish_imperial_examination: "Скасувати $imperial_examination_law$"
  abolish_imperial_examination_desc: "Скасування $imperial_examination_law$ зупинить соціальну мобільність і безпосередньо принесе користь тим, хто зараз при владі. Замість меритократичного підходу, нових бюрократів обиратимуть через особисті, часто корумповані, рекомендації."
  status_of_the_han_law: "Статус ханьців"
  status_of_the_han_law_desc: "Наша династія походить з-за меж основної території [GetInternationalOrganization('middle_kingdom').GetName], що робить нас чужинцями для ханьської [ShowCultureGroupName('chinese_group')] більшості."
  maintain_status_quo_in_han_policies: "Просувати [ShowCultureGroupNameWithNoTooltip('chinese_group')] бюрократію"
  maintain_status_quo_in_han_policies_desc: "Замість того, щоб триматися старих звичаїв, ця політика сприятиме адаптації нашої адміністрації до очікувань ханьських [ShowCultureGroupName('chinese_group')] бюрократів, які складають багатьох наших державних діячів."
  limit_the_han_powers: "Вигнати з бюрократії"
  limit_the_han_powers_desc: "Через переважний вплив ханьців [ShowCultureGroupName('chinese_group')] верховенство старої гвардії [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderCountry.GetCulture.GetName] знаходиться під загрозою. Їх необхідно вигнати з вищих ешелонів суспільства."
  mch_queue_hair: "Тіфаїфу"
  mch_queue_hair_desc: "$mch_queue_hair$ вважатиметься нашою культурною політикою щодо [ShowCultureGroupName('chinese_group')]. Серед головних вимог буде для ханьців організувати своє волосся в стилі Бяньцзи."
  enforce_queue_hair: "Запровадити Бяньцзи"
  enforce_queue_hair_desc: "Ханьці [ShowCultureGroupName('chinese_group')] будуть змушені голити передню частину голови, тоді як волосся на потилиці буде відрощуватися довше і заплітатися, утворюючи $MCH_ADJ$ Бяньцзи."
  queue_hair_status_quo: "Прийняття Ханьфу"
  queue_hair_status_quo_desc: "$MCH_ADJ$ чиновники приймуть Ханьфу, ханьський [ShowCultureGroupName('chinese_group')] стиль одягу, щоб бути більш відповідними до домінуючої етнічної групи держави."
  kor_currency: "Домінуюча валюта"
  kor_currency_desc: "Зосередження на різних типах валют неминуче формуватиме нашу країну багатьма різноманітними способами, не лише економічно, а й соціально."
  kor_jeohwa: "Чохва"
  kor_jeohwa_desc: "Щоб стимулювати економіку, давайте заснуємо нову [ShowGoodsName('paper')] валюту, $kor_jeohwa$. Це також дозволить нам перейти до [ShowSocietyDirectionName('capital_economy')]."
  kor_barter_economy: "Бартерна економіка"
  kor_barter_economy_desc: "Засоби транзакції можуть бути здійснені шляхом бартеру."
  kor_metal_coinage: "Металеві монети"
  kor_metal_coinage_desc: "Наші спроби використовувати металеві валюти були досить неефективними через брак ресурсів. Можливо, тепер ми зможемо змінити курс."
  kor_chinese_currency: "Китайська валюта"
  kor_chinese_currency_desc: "Замість того, щоб витрачати наші зусилля та ресурси на підтримку власної валюти, ми могли б покладатися на імпортовані іноземні монети з $china$."
  kor_scale_chinese_currency: "За думкою, яку [GetCountry('CHI').GetName] має про нашу країну."
  spa_inquisition_policy: "Іспанська інквізиція"
  spa_inquisition_policy_desc: "Наша головна зброя – несподіванка! Несподіванка і страх... Наші дві зброї – страх і несподіванка... і безжальна ефективність!"
  mesta_council_law: "Рада Мести"
  mesta_council_law_desc: "Асоціація Мести разом зі своєю радою захищає права та інтереси власників худоби в нашій країні."
  quadrillas_organization: "Організація квадрильяс"
  quadrillas_organization_desc: "Заснована навколо фіксованих головних міст пастуших стад, це основна організація Мести. Їхній нагляд забезпечує безпеку наших пастуших овечих стад породи меринос."
  right_of_possesion: "Право володіння"
  right_of_possesion_desc: "Право володіння регулює орендні ціни на пасовища та слугує правовою основою для овечих стад Мести."
  laws_of_burgos: "Закони Бургоса"
  laws_of_burgos_desc: "Цей звід законів забезпечує правову основу для нашої діяльності та підданих на колоніальних територіях. Він особливо стосується прав корінного населення та їхньої організації в систему енком'єнд."
  new_laws_indies: "Нові закони"
  new_laws_indies_desc: "Нові закони слугують покращеною версією, що базується на Законах Бургоса, посилюючи контроль, який ми можемо здійснювати в наших колоніальних володіннях."
  siete_partidas_law: "Сім розділів"
  siete_partidas_law_desc: "#italic $siete_partidas_law$#! – це збірка статутних законів, створена Альфонсо X Кастильським з метою уніфікації законодавства його королівства. Вона зосереджується на законодавчих питаннях, а також на моральних."
  dop_law_comuneros_parliament: "Розширені Кортеси"
  dop_law_comuneros_parliament_desc: "Кортеси, наш Парламент, були розширені як основна політична сила в нашій країні завдяки зусиллям та боротьбі Комунерос."
  cas_mita_system: "Система Міта"
  cas_mita_system_desc: "$cas_mita_system$ – це адаптація інканської трудової повинності, яка змушує корінні громади надавати ротаційну працю для наших підприємств, особливо в срібних копальнях, таких як Потосі."
  nueva_recopilacion_policy: "Нова збірка"
  nueva_recopilacion_policy_desc: "Нова збірка численних законів у нашому королівстві дозволить нам належним чином централізувати та забезпечити контроль над нашими територіями."
  spa_reformed_nueva_recopilacion_policy_tt: "Сформував Нову збірку в [Concept('event', 'CONCEPT_PLACEHOLDER')|e] $flavor_cas.50.title$."
  leyes_de_toro_policy: "Leyes de Toro"
  leyes_de_toro_policy_desc: "Збірка законів королівства, створена, щоб догодити різним станам нашого королівства, особливо дворянам, оскільки вона встановлює «майорат», спадкове володіння сімейної групи, як основну систему успадкування."
  ordenamiento_de_alcala_policy: "Ordenamiento de Alcalá"
  ordenamiento_de_alcala_policy_desc: "$ordenamiento_de_alcala_policy$ — це правовий кодекс, який уніфікує та централізує наші різноманітні закони, утверджуючи центральну владу над місцевими звичаями та привілеями."
  sea_beggars_policy: "Морські жебраки"
  sea_beggars_policy_desc: "Надавши кілька каперських патентів усім, хто бажає нам служити, ми можемо розширити наш флот без необхідності будувати нові судна."
  kilwan_merchant_navy: "$ZAN_ADJ$ Торговий флот"
  kilwan_merchant_navy_desc: "Століття морської мудрості та доступ до високоякісної бавовни та деревини дали початок найгрізнішому торговому флоту. Оснащені передовими конструкціями та новими вітрильними композиціями, ці судна є гордістю нашого народу."
  smugglers_haven: "Притулок контрабандистів"
  smugglers_haven_desc: "Піратське підприємство не може функціонувати без способу продажу викрадених товарів. Ми повинні забезпечити сприятливі умови для контрабандних операцій у Республіці."
  sco_clan_holdings: "Розподіл [GetCountry('SCO').GetAdjectiveWithNoTooltip] кланових володінь"
  sco_clan_holdings_desc: "Успадкування [GetCountry('SCO').GetAdjective] володінь ділиться пропорційно до впливу клану, причому більші клани отримують більше володінь. Кланові володіння передаються безпосередньо спадкоємцю, якщо титул не відкликано або не зник."
  inherited_clan_holdings: "Пряме успадкування"
  inherited_clan_holdings_desc: "Володіння та титули зберігаються в межах клану, повертаючись до правителя лише тоді, коли кланова лінія вимирає."
  revert_to_the_crown: "Розподіляється Правителем"
  revert_to_the_crown_desc: "Новостворені володіння та титули призначаються за вподобанням правителя. Більші клани зазвичай користуються прихильністю правителя як союзники та отримують левову частку нових титулів."
  dynastic_holdings_conslidated: "Династичні володіння"
  dynastic_holdings_conslidated_desc: "Нові володіння та титули за замовчуванням належать правлячій династії, лише зрідка передаючись нею іншим [GetCountry('SCO').GetAdjective] кланам."
  sco_authority_over_the_clergy: "Влада над духовенством"
  sco_authority_over_the_clergy_desc: "[GetCountry('SCO').GetAdjective] внесок до [ShowSpecialStatusNameWithNoTooltip('curia')] став тягарем для державних фінансів. Прагнучи скоротити внески до [ShowSpecialStatusNameWithNoTooltip('curia')], держава взяла пряму юрисдикцію над духовенством."
  crown_religious_jurisdiction: "Урядова юрисдикція"
  crown_religious_jurisdiction_desc: "Вплив [GetCountry('PAP').GetAdjective] та [ShowSpecialStatusNameWithNoTooltip('curia')] значною мірою був обмежений на користь встановленого уряду, який має пряму юрисдикцію над релігійними установами в межах [GetCountry('SCO').GetName]."
  limited_curia_oversight: "Обмежений доступ до [ShowSpecialStatusNameWithNoTooltip('curia')]"
  limited_curia_oversight_desc: "Хоча уряд зберігає більшість впливу на релігійні установи в межах [GetCountry('SCO').GetName], високопоставленим священнослужителям було надано спеціальне положення, що дозволяє їм відкрито взаємодіяти з [ShowSpecialStatusNameWithNoTooltip('curia')]."
  sco_colonial_affairs_law: "[GetCountry('SCO').GetAdjectiveWithNoTooltip] Колоніальні справи"
  sco_colonial_affairs_law_desc: "З оповідями про багатства Нового Світу, [GetCountry('SCO').GetName] може пожинати плоди, якщо вона заснує значну колоніальну базу. Хоча надмірні амбіції можуть виявитися катастрофічними для економічної стабільності держави."
  sco_no_colonial_affairs: "Жодних колоніальних підприємств"
  sco_no_colonial_affairs_desc: "Колоніальні підприємства та спроби заснувати торгові компанії в Новому Світі були визнані надто великим ризиком для фінансової стабільності [GetCountry('SCO').GetName]."
  sco_limited_colonial_ventures: "Обмежені колоніальні підприємства"
  sco_limited_colonial_ventures_desc: "Колоніальні підприємства були визнані вартим економічним ризиком для держави і були офіційно санкціоновані."
  sco_colonial_administration: "Досвідчена колоніальна адміністрація"
  sco_colonial_administration_desc: "Завдяки незліченним зусиллям дослідників та інвесторів, [GetCountry('SCO').GetName] знайшла своє місце під сонцем серед колоніальних держав і пожинає великі плоди від своїх колоніальних володінь."
