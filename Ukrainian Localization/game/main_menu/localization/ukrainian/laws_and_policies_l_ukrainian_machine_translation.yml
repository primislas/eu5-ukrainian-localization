  mamluk_rank_system_laws: "Система рангів $mamluk$"
  mamluk_rank_system_laws_desc: "Ієрархія в нашому війську є основою найважливішої інституції нашої землі."
  mam_rigid_system: "Жорстка"
  mam_rigid_system_desc: "Запровадивши жорстку ієрархію, ми забезпечимо, щоб усі новобранці та члени $mamluks$ зосереджувалися на опануванні своєї справи замість гонитви за підвищенням."
  mam_fluid_system: "Гнучка"
  mam_fluid_system_desc: "Гнучка система рангів лише призведе до того, що наші воїни відчуватимуть себе частиною наших збройних сил. Привабливість зростання та просування по ієрархії війська є великим стимулом для тих, хто піднімається з бідності чи рабства."
  mam_refined_furusiyya: "Удосконалена Фурусійя"
  mam_refined_furusiyya_desc: "Протягом століть військових традицій ми вдосконалили Фурусійю, [ShowReligionGroupAdjective('muslim')] кодекс лицарства та військової практики, поєднуючи верхову їзду, стрільбу з лука та тактику ведення війни з інтелектуальною та етичною підготовкою."
  mamluk_army_law: "Закон про армію $mamluk$"
  mamluk_army_law_desc: "Серцем нашої стратократичної адміністрації є не що інше, як армія. Розробивши закони та положення для її ретельного формування, ми ефективно захистимо наш народ від зовнішніх загроз."
  al_mamalik_al_sultaniyya: "Аль-Мамалік ас-Султанійя"
  al_mamalik_al_sultaniyya_desc: "Зосередившись на піднесенні $mamluks$, які служать Султану, ми забезпечимо, щоб наші елітні війська залишалися дисциплінованими та ефективними."
  mamalik_al_umara: "Мамалік аль-Умара"
  mamalik_al_umara_desc: "$mamluks$, що служать під класом амірів, є чудовим джерелом здорових чоловіків для поповнення наших передових ліній."
  ajnad_al_halqa: "Ajnād al-Ḥalqa"
  ajnad_al_halqa_desc: "Армія не може належним чином функціонувати без міцних допоміжних військ та надійних ліній постачання."
  awlad_al_nas_policy: "Awlād al-Nās"
  awlad_al_nas_policy_desc: "Попри суворе навернення та звільнення від рабства, через які пройшли старші $mamluks$, вони, здається, завжди намагаються підірвати центральну владу. Необхідно сформувати новий корпус, чиї люди будуть навчені та виховані по-іншому."
  mamluk_promotion_law: "Закон про підвищення $mamluk$"
  mamluk_promotion_law_desc: "Законодавчі акти, що винагороджують підвищення у наших військових лавах, є важливим наріжним каменем нашої країни."
  merit_basis: "Основа заслуг"
  merit_basis_desc: "Підвищення на основі заслуг — чудовий спосіб накопичувати талановитих і сильних воїнів незалежно від їхнього становища та походження."
  origin_basis: "Основа походження"
  origin_basis_desc: "Надаючи пріоритет солдатам, які є культурно однорідними, ми можемо мати згуртовану армію, що розділяє спільну гордість."
  dynastic_basis: "Династична основа"
  dynastic_basis_desc: "Військові посади нашої армії можуть передаватися від батька до сина, що символізує безперервність легітимності престолу."
  employment_system: "$game_concept_employment_system$"
  employment_system_desc: "$game_concept_employment_system_desc$"
  first_come_first_serve_policy: "$first_come_first_serve$"
  first_come_first_serve_policy_desc: "$first_come_first_serve_desc$"
  equality_policy: "$equality$"
  equality_policy_desc: "$equality_desc$"
  capitalism_policy: "$capitalism$"
  capitalism_policy_desc: "$capitalism_desc$"
  io_policy_vote_active_cooldown: "Міжнародне голосування щодо змін політики"
  sc_policy_proposal_frequency: "Частота пропозицій політики"
  sc_policy_proposal_frequency_desc: "Закон, що регулює адміністрування законодавчих пропозицій у [GetInternationalOrganizationType('swiss_confederation').GetName]."
  sc_frequent_policy_proposals: "Часті пропозиції політики"
  sc_frequent_policy_proposals_desc: "THOUGHTS:"
  sc_moderate_policy_proposals: "The user wants me to translate game script lines from English to Ukrainian."
  sc_moderate_policy_proposals_desc: "I need to follow these rules:"
  sc_religious_affairs: "1.  One-to-One Mapping: 1 input line -> 1 output line."
  sc_religious_affairs_desc: "2.  Variable Preservation: Do NOT translate or modify variables, engine constructs, or escape sequences."
  sc_clear_religious_chaos_tt: "3.  Historical Tone: Formal, archaic, \"chronicle\" flair for narrative/events; modern technical for UI/mechanics."
  sc_mending_schism: "4.  Specific Terms: \"placeholder\" -> \"заповнювач\". Use modern standard Ukrainian for geographic names, names, and last names."
  sc_mending_schism_desc: "5.  Low-Confidence Flagging: 'POSTEDIT_' for uncertain proper nouns (dynasty, ethnicity, culture)."
  sc_enforcing_religious_unity: "6.  Format: Plain text output only."
  sc_enforcing_religious_unity_desc: ""
  sc_only_defending_same_religion_allies_tt: "Let's go through each line:"
  sc_relations_with_hre: ""
  sc_relations_with_hre_desc: "1.  \"Adjustment of laws and policies is a frequent act, and as such happens in [GetInternationalOrganizationType('swiss_confederation').GetName] on a base of every 4 years.\""
  sc_remain_in_the_hre: "    *   \"Adjustment of laws and policies\" -> \"Коригування законів та політик\""
  sc_remain_in_the_hre_desc: "    *   \"is a frequent act\" -> \"є частим актом\""
  sc_remain_in_the_hre_tt: "    *   \"and as such happens in\" -> \"і як таке відбувається в\""
  sc_prestige_malus_tt: "    *   \"[GetInternationalOrganizationType('swiss_confederation').GetName]\" -> [GetInternationalOrganizationType('swiss_confederation').GetName] (preserve)"
  sc_leave_the_hre: "    *   \"on a base of every 4 years.\" -> \"на основі кожних 4 років.\" (Slightly awkward, but \"на основі\" is literal. \"раз на 4 роки\" is more natural, but \"on a base of\" suggests a more formal, perhaps even legalistic, phrasing. Let's stick to a more literal translation that retains the formality.) \"на основі кожні 4 роки\" or \"раз на 4 роки\". \"на основі кожних 4 років\" sounds more formal."
  sc_leave_the_hre_desc: ""
  sc_leave_the_hre_tt: "2.  \"Moderate Policy Proposals\""
  sc_every_member_leaves_hre_tt: "    *   \"Moderate Policy Proposals\" -> \"Помірні пропозиції щодо політики\""
  sc_representative: ""
  sc_representative_desc: "3.  \"While a significant process, administrating the laws and policy proposals within the [GetInternationalOrganizationType('swiss_confederation').GetName] takes considerable effort, which allows law proposals only every 8 years.\""
  sc_canton_representative: "    *   \"While a significant process\" -> \"Хоча це значний процес\""
  sc_canton_representative_desc: "    *   \"administrating the laws and policy proposals within the [GetInternationalOrganizationType('swiss_confederation').GetName]\" -> \"адміністрування законів та пропозицій щодо політики в межах [GetInternationalOrganizationType('swiss_confederation').GetName]\""
  sc_councillor_representative: "Представник-радник"
  sc_councillor_representative_desc: "Кантони [GetInternationalOrganizationType('swiss_confederation').GetName] поступляться частиною свого впливу, щоб призначити одну особу, яка стане обличчям Конфедерації."
  sc_power_of_the_sovereign: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] Влада"
  sc_power_of_the_sovereign_desc: "Представник Конфедерації може вимагати більше влади та впливу в межах союзу, щоб зміцнити свою позицію на публічній арені."
  sc_sovereign_representative_power: "Представницька Влада"
  sc_sovereign_representative_power_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] має право вимагати допомоги від членів [GetInternationalOrganizationType('swiss_confederation').GetName], що може варіюватися від фінансової до військової підтримки."
  sc_sovereign_religious_power: "Релігійна Влада"
  sc_sovereign_religious_power_desc: "Влада [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] обмежена, за винятком питань релігійних справ [GetInternationalOrganizationType('swiss_confederation').GetName]."
  sc_sovereign_absolute_power: "Абсолютна Влада"
  sc_sovereign_absolute_power_desc: "Провідний [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] править [GetInternationalOrganizationType('swiss_confederation').GetName] так, ніби це була єдина держава. Таким чином, вони користуються всіма привілеями та обов'язками, так ніби вони були монархом Конфедерації."
  sc_election_method: "Метод обрання"
  sc_election_method_desc: "Процес обрання [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] [GetInternationalOrganizationType('swiss_confederation').GetName] є делікатною справою, яка вимагає точного законодавства для належного врегулювання."
  sc_direct_vote: "Пряме Голосування"
  sc_direct_vote_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] обирається безпосередньо членами [GetInternationalOrganizationType('swiss_confederation').GetName]. Кожен член має один голос, і кожен член має право представляти Конфедерацію."
  sc_lottery: "Лотерея"
  sc_lottery_desc: "Лише Господь може вирішити, хто представлятиме [GetInternationalOrganizationType('swiss_confederation').GetName]. Процес обрання відбувається через таємну лотерею з долею як вирішальним фактором."
  sc_rotation: "Ротація"
  sc_rotation_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] обирається по черзі. Кожен член [GetInternationalOrganizationType('swiss_confederation').GetName] представлятиме конфедерацію принаймні один раз, перш ніж колишній лідер зможе знову взяти на себе цю роль."
  sc_ruling_period: "Термін правління"
  sc_ruling_period_desc: "Конфедерація може мати [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle], що її представляє. Однак, необхідно визначити, чи буде згаданий [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] служити союзу довічно, чи доки не мине певний час."
  sc_timed: "На певний термін"
  sc_timed_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] [GetInternationalOrganizationType('swiss_confederation').GetName] перебуває на посаді лише протягом встановленого періоду часу. Після цього їхній термін закінчується, і обирається новий [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle]."
  sc_lifelong: "Довічно"
  sc_lifelong_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] [GetInternationalOrganizationType('swiss_confederation').GetName] служить протягом усього свого життя. Лише після їхньої смерті або вигнання будуть проведені вибори."
  sc_election_frequency: "Частота виборів"
  sc_election_frequency_desc: "Оскільки справи [ShowLawName('sc_ruling_period')] вирішено, виникає нова тема, що стосується частоти виборів нового [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle]."
  sc_biyearly_elections: "Дворічні Вибори"
  sc_biyearly_elections_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] [GetInternationalOrganizationType('swiss_confederation').GetName] обиратиметься кожні 2 роки."
  sc_four_yearly_elections: "Чотирирічні Вибори"
  sc_four_yearly_elections_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] [GetInternationalOrganizationType('swiss_confederation').GetName] обиратиметься кожні 4 роки."
  sc_eight_yearly_elections: "Восьмирічні Вибори"
  sc_eight_yearly_elections_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] [GetInternationalOrganizationType('swiss_confederation').GetName] обиратиметься кожні 8 років."
  sc_internal_politics: "Внутрішня Політика"
  sc_internal_politics_desc: "Хоча [GetInternationalOrganizationType('swiss_confederation').GetName] є насамперед союзом оборонного призначення, очевидно, що внутрішні справи Конфедерації також мають бути врегульовані."
  sc_forbid_internal_wars: "Заборонити Внутрішні Війни"
  sc_forbid_internal_wars_desc: "Ми не можемо дозволити дрібним суперечкам перерости у криваві конфлікти. Кожен член [GetInternationalOrganizationType('swiss_confederation').GetName] має викласти свою проблему з іншим членом перед суддями Конфедерації замість того, щоб вирішувати її на полі бою."
  sc_forbid_internal_wars_tt: "Жоден член [GetInternationalOrganizationType('swiss_confederation').GetName] не може атакувати іншого члена"
  sc_forbid_same_religion_internal_wars_tt: "Жоден член [GetInternationalOrganizationType('swiss_confederation').GetName] не може атакувати іншого члена тієї ж [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]"
  sc_allow_internal_wars: "Дозволити Внутрішні Війни"
  sc_allow_internal_wars_desc: "Хоча загалом небажаний, конфлікт є частиною людської природи, і саме через нього ми стаємо сильнішими."
  sc_membership_regulation: "Регулювання Членства"
  sc_membership_regulation_desc: "[GetInternationalOrganizationType('swiss_confederation').GetName] — це організація, спочатку створена [ShowCultureGroupName('swiss_group')] народом для захисту від зростаючого впливу [GetDynasty('habsburg_dynasty').GetName] у місцевому регіоні. Однак правила вступу ніколи не є непорушними..."
  sc_swiss_culture_and_geography: "Лише Корінні Швейцарці"
  sc_swiss_culture_and_geography_desc: "Конфедерація є [ShowCultureGroupName('swiss_group')] організацією, і тому лише ті, хто належить до її культури та географії, можуть приєднатися."
  sc_swiss_culture_and_geography_tt: "Лише країни, чия [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] є [ShowCultureGroupName('swiss_group')] і мають свою [Concept('capital', 'CONCEPT_PLACEHOLDER')|e] у [ShowAreaName('central_switzerland_area')], [ShowAreaName('eastern_switzerland_area')] або [ShowAreaName('western_switzerland_area')], можуть приєднатися"
  sc_just_swiss_culture: "Швейцарська Культура"
  sc_just_swiss_culture_desc: "Вплив [ShowCultureGroupName('swiss_group')] народу зростає далеко за межами історичної території [GetInternationalOrganizationType('swiss_confederation').GetName]. Географічні обмеження більше не є адекватними, і тому закон потребує перегляду."
  sc_just_swiss_culture_tt: "Лише країни, чия [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] є [ShowCultureGroupName('swiss_group')], можуть приєднатися"
  sc_swiss_or_swiss_relative: "Родичі Швейцарців"
  sc_swiss_or_swiss_relative_desc: "Вплив і влада [GetInternationalOrganizationType('swiss_confederation').GetName] поширюється не лише [ShowCultureGroupName('swiss_group')] народом, але й тими, кого ми вважаємо близькими родичами нашої культури."
  sc_swiss_or_swiss_relative_tt: "Лише країни, чия [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] належить до [ShowCultureGroupName('swiss_group')] або використовує [Concept('language', 'CONCEPT_PLACEHOLDER')|e], що використовується цими культурами, можуть приєднатися"
  sc_war_politics: "Військова політика"
  sc_war_politics_desc: "Зовнішніх загроз для [GetInternationalOrganizationType('swiss_confederation').GetName] багато. Необхідні єдині умови того, як [ShowCultureGroupName('swiss_group')] захищають одне одного, якщо Конфедерація має вижити в політичній анархії навколо неї."
  sc_defensive_pact: "Оборонний пакт"
  sc_defensive_pact_desc: "Члени [GetInternationalOrganizationType('swiss_confederation').GetName] закликаються до зброї лише в оборонній війні проти зовнішніх загроз."
  sc_alliance: "Швейцарський альянс"
  sc_alliance_desc: "Члени [GetInternationalOrganizationType('swiss_confederation').GetName] можуть закликати одне одного на свій бік у власних спробах експансії. У разі зовнішнього вторгнення всі члени закликаються до зброї, щоб захистити своїх побратимів по Конфедерації."
  sc_united_war_efforts: "Об'єднані військові зусилля"
  sc_united_war_efforts_desc: "[GetInternationalOrganizationType('swiss_confederation').GetName] подібна до єдиної політичної одиниці для всіх зовнішніх держав. Кожна війна — чи то наступальна, чи оборонна за своєю природою — закликатиме військо всіх членів Конфедерації."
  sc_call_to_arms_conditions_tt: "[Custom('GetSCCallToArmsTooltip')]"
  sc_call_to_arms_only_same_religion_tt: "$sc_call_to_arms_always_tt$ і той, хто закликає, і країна, яку закликають до зброї, сповідують ту саму [Concept('religion', 'CONCEPT_PLACEHOLDER')|e]"
  sc_call_to_arms_always_tt: "Ворог НЕ є членом [GetUniqueInternationalOrganization('swiss_confederation').GetName]"
  sc_unification: "$SWI_ADJ$ Об'єднання"
  sc_unification_desc: "[ShowCultureGroupName('swiss_group')] землі були роздроблені надто довго. Якщо народи Альп бажають бачити процвітання та безпеку, вони повинні об'єднатися під єдиним прапором."
  sc_unification_movement_event_happened_tt: "[Concept('event', 'CONCEPT_PLACEHOLDER')|e] '#Y $flavor_swi.999.title$#!' відбулася, що має такі умови:\n\n[ShowTriggerConditions('flavor_swi_999_trigger',PlayerScope.Self)]"
  sc_unification_same_religion_tt: "Кожен член є або [ShowReligionName('catholic')], [ShowReligionName('lutheran')], або [ShowReligionName('calvinist')]"
  sc_found_swiss_republic: "Заснувати $SWI_ADJ$ $republic$"
  sc_found_swiss_republic_desc: "Принципи та методи [GetInternationalOrganizationType('swiss_confederation').GetName] добре сприймаються, оскільки кожен кантон насолоджується тим, що його голоси чують. Проте децентралізований характер конфедерації завжди загрожуватиме безпеці та захисту [ShowCultureGroupName('swiss_group')] народу. Настав час об'єднати Конфедерацію в єдину державу, зберігаючи при цьому [ShowGovernmentTypeName('republic')]."
  sc_found_swiss_republic_specific_tt: "[THIS.GetCountry.GetName] об'єднує [GetInternationalOrganizationType('swiss_confederation').GetName], щоб сформувати [GetCountry('SWI').GetAdjective] [ShowGovernmentTypeName('republic')]"
  sc_found_swiss_republic_tt: "[GetInternationalOrganizationType('swiss_confederation').GetName] об'єднується в [GetCountry('SWI').GetAdjective] [ShowGovernmentTypeName('republic')]"
  sc_found_swiss_monarchy: "Заснувати $SWI_ADJ$ $monarchy$"
  sc_found_swiss_monarchy_desc: "Хоча вона починалася як республіканський союз, виклики, з якими довелося зіткнутися [GetInternationalOrganizationType('swiss_confederation').GetName], довели перевагу сильного правління під єдиним Радником. Майбутнє [ShowCultureGroupName('swiss_group')] народу може бути забезпечене лише під владою належної [ShowGovernmentTypeName('monarchy')], яка замінить стару Конфедерацію."
  sc_found_swiss_monarchy_specific_tt: "[THIS.GetCountry.GetName] об'єднує [GetInternationalOrganizationType('swiss_confederation').GetName], щоб сформувати [GetCountry('SWI').GetAdjective] [ShowGovernmentTypeName('monarchy')]"
  sc_found_swiss_monarchy_tt: "[GetInternationalOrganizationType('swiss_confederation').GetName] об'єднується в [GetCountry('SWI').GetAdjective] [ShowGovernmentTypeName('monarchy')]"
  sc_found_swiss_theocracy: "Заснувати $SWI_ADJ$ $theocracy$"
  sc_found_swiss_theocracy_desc: "Ні вільна воля республіканських голосів, ні авторитарна влада монархії не привели [GetInternationalOrganizationType('swiss_confederation').GetName] до її нинішнього становища, а воля божественна. Лише як єдина [ShowGovernmentTypeName('theocracy')] [ShowCultureGroupName('swiss_group')] народ може процвітати в цьому світі."
  sc_found_swiss_theocracy_specific_tt: "[THIS.GetCountry.GetName] об'єднує [GetInternationalOrganizationType('swiss_confederation').GetName], щоб утворити [GetCountry('SWI').GetAdjective] [ShowGovernmentTypeName('theocracy')]"
  sc_found_swiss_theocracy_tt: "[GetInternationalOrganizationType('swiss_confederation').GetName] об'єднується в [GetCountry('SWI').GetAdjective] [ShowGovernmentTypeName('theocracy')]"
  colonial_federation_unification: "Об'єднання $colonial_federation$"
  colonial_federation_unification_desc: "Зв'язки, викувані у вогні нашої боротьби за незалежність, настав час розглянути об'єднання вільно пов'язаних земель наших членів."
  colonial_federation_found_republic: "Заснувати нову $republic$"
  colonial_federation_found_republic_desc: "Принципи та методи [ShowGovernmentTypeName('republic')] є важливими для свободи як наших членів, так і наших підданих."
  colonial_federation_found_republic_specific_tt: "[THIS.GetCountry.GetName] об'єднує [GetInternationalOrganizationType('colonial_federation').GetName] в [ShowGovernmentTypeName('republic')]"
  colonial_federation_found_republic_tt: "[GetInternationalOrganizationType('colonial_federation').GetName] об'єднується в [ShowGovernmentTypeName('republic')]"
  colonial_federation_found_monarchy: "Заснувати нову $monarchy$"
  colonial_federation_found_monarchy_desc: "Новостворена [ShowGovernmentTypeName('monarchy')], що справедливо керує всіма нашими членами, є єдиним шляхом до процвітання."
  colonial_federation_found_monarchy_specific_tt: "[THIS.GetCountry.GetName] об'єднує нашу [GetInternationalOrganizationType('colonial_federation').GetName] в [ShowGovernmentTypeName('monarchy')]"
  colonial_federation_found_monarchy_tt: "[GetInternationalOrganizationType('colonial_federation').GetName] об'єднується в [ShowGovernmentTypeName('monarchy')]"
  colonial_federation_found_theocracy: "Заснувати нову $theocracy$"
  colonial_federation_found_theocracy_desc: "Ні вільна воля республіканських голосів, ні авторитарна влада монархії не привели нашу [GetInternationalOrganizationType('colonial_federation').GetName] до незалежності, а воля божественна. Лише як єдина [ShowGovernmentTypeName('theocracy')] наш народ може процвітати в цьому світі."
  colonial_federation_found_theocracy_specific_tt: "[THIS.GetCountry.GetName] об'єднує [GetInternationalOrganizationType('colonial_federation').GetName], щоб утворити [ShowGovernmentTypeName('theocracy')]"
  colonial_federation_found_theocracy_tt: "[GetInternationalOrganizationType('colonial_federation').GetName] об'єднується в [ShowGovernmentTypeName('theocracy')]"
  AVERAGE_GREAT_POWER_SCORE_OF_IO: "Середній [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]"
  AVERAGE_MILITARY_STRENGTH_OF_IO: "Середня [Concept('military_strength', 'CONCEPT_PLACEHOLDER')|e] [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e]"
  mutual_defense_law: "Взаємна оборона"
  mutual_defense_law_desc: "Політика, що визначає, як члени захищатимуть один одного у разі оголошення війни."
  assured_defense_policy: "Гарантована оборона"
  assured_defense_policy_desc: "Члени автоматично приєднуватимуться до оборонних війн, оголошених іншим членам."
  automatic_defense_policy: "Автоматична оборона"
  automatic_defense_policy_desc: "Члени автоматично будуть викликані до оборонних війн, оголошених іншим членам, але не зобов'язані погоджуватися."
  possible_defense_policy: "Можлива оборона"
  possible_defense_policy_desc: "Учасники зможуть бути покликані до оборонних війн, оголошених проти інших учасників, але не зобов'язані погоджуватися."
  no_defense_policy: "Без оборони"
  no_defense_policy_desc: "Учасники не зможуть бути покликані до оборонних війн, оголошених проти інших учасників."
  mutual_offense_law: "Взаємний напад"
  mutual_offense_law_desc: "Політика, що визначає, як учасники підтримуватимуть один одного у випадку оголошення ними війни іншій країні."
  assured_offense_policy: "Гарантований напад"
  assured_offense_policy_desc: "Учасники автоматично приєднуватимуться до наступальних війн, оголошених іншими учасниками."
  automatic_offense_policy: "Автоматичний напад"
  automatic_offense_policy_desc: "Учасники автоматично будуть покликані до наступальних війн, оголошених іншими учасниками, але не зобов'язані погоджуватися."
  possible_offense_policy: "Можливий напад"
  possible_offense_policy_desc: "Учасники зможуть бути покликані до наступальних війн, оголошених іншими учасниками, але не зобов'язані погоджуватися."
  no_offense_policy: "Без нападу"
  no_offense_policy_desc: "Учасники не зможуть бути покликані до наступальних війн, оголошених іншими учасниками."
  lordship_of_ireland_rule_law: "Правління Ірландії"
  lordship_of_ireland_rule_law_desc: "Форма правління в Ірландії може бути такою ж дикою, як великий Атлантичний океан, що розбивається об скелясті кручі, або такою ж непохитною, як болота."
  lordship_of_ireland_rule_laudabiliter_policy: "Laudabiliter"
  lordship_of_ireland_rule_laudabiliter_policy_desc: "Ірландія була спочатку завойована англо-нормандськими лицарями, що прагнули захопити особисті землі та славу. Однак королівський престол є безсилим."
  lordship_of_ireland_rule_laudabiliter_policy_tt: ""
  lordship_of_ireland_rule_statutes_of_kilkenny_policy: "Статути Кілкенні"
  lordship_of_ireland_rule_statutes_of_kilkenny_policy_desc: "Укази, що запроваджували континентальні звичаї в Ірландії, забороняючи кельтський одяг та міжнаціональні шлюби, аби зберегти спільноту поселенців відмінною та домінуючою."
  lordship_of_ireland_rule_statutes_of_kilkenny_policy_tt: ""
  lordship_of_ireland_rule_ascendancy_policy: "Релігійне панування"
  lordship_of_ireland_rule_ascendancy_policy_desc: "Ми можемо примусити членів Лордства навернутися до нашої релігії."
  lordship_of_ireland_rule_ascendancy_policy_tt: ""
  UNION_TREASURY_COST: "Витрати на скарбницю союзу"
  union_foundation_law: "Заснування союзу"
  union_foundation_law_desc: "Закон [GetInternationalOrganizationType('union').GetName], що визначає його саму природу та чи має він слідувати централізованому чи федеративному майбутньому – якщо він витримає випробування часом."
  union_establish_seniority_policy: "Встановити старшинство"
  union_establish_seniority_policy_desc: "[GetInternationalOrganizationType('union').GetName] може триматися разом лише з одного престолу. Призначення старшого партнера $union$ також визначить, який престол представлятиме $union$ в цілому."
  union_maintain_federal_status_policy: "Підтримувати федеративний статус"
  union_maintain_federal_status_policy_desc: "Суверенітет кожного члена [GetInternationalOrganizationType('union').GetName] є недоторканним і беззаперечним. Навіть якщо кожен престол керується одним правителем, монарху не личить втручатися у справи членів союзу."
  union_senior_partner_policy_at: "Вмикає особливі статуси [ShowSpecialStatusName('senior_partner')] та [ShowSpecialStatusName('junior_partner')]"
  union_senior_partner_policy_tt: "[ROOT.GetInternationalOrganization.GetCountryWithHighestGreatPower.GetName] стає [ShowSpecialStatusName('senior_partner')] (країна обрана через те, що має найвищий [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e] у [Concept('union', 'CONCEPT_PLACEHOLDER')|e])"
  union_senior_partner_policy_specific_tt: "[ROOT.GetInternationalOrganization.MakeScope.GetVariable('pre_selected_senior_partner').GetCountry.GetName] стає [ShowSpecialStatusName('senior_partner')]"
  union_unlocks_independence_casus_belli_tt: "Розблоковує [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] [ShowCasusBelliName('cb_union_independence')] для кожного $game_concept_junior_partner$, який #Y слабший#! за [ShowSpecialStatusName('senior_partner')]"
  union_unlocks_war_for_seniority_casus_belli_tt: "Розблоковує [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] [ShowCasusBelliName('cb_union_war_for_seniority')] для кожного $game_concept_junior_partner$, який #Y рівний або сильніший#! за [ShowSpecialStatusName('senior_partner')]"
  union_codified_inheritance_law: "Кодифікована спадщина"
  union_codified_inheritance_law_desc: "Щоб забезпечити стабільність [GetInternationalOrganizationType('union').GetName], закони про спадкування кожного члена повинні бути кодифіковані, щоб кожна держава мала однакову лінію престолонаслідування."
  union_senior_succession_law: "Уніфікований закон про престолонаслідування"
  union_senior_succession_law_desc: "Престолонаслідування [GetInternationalOrganizationType('union').GetName] регулюється законами [ShowSpecialStatusName('senior_partner')]. Кожен член змушений прийняти ці закони, якщо це можливо."
  union_sovereign_succession_law: "Суверенний закон про престолонаслідування"
  union_sovereign_succession_law_desc: "Жоден член [GetInternationalOrganizationType('union').GetName] не може визначати законні права престолонаслідування іншого члена. Політика кожного члена щодо престолу є питанням власного суверенітету."
  union_codified_inheritance_policy_at: "Кожен член [GetInternationalOrganizationType('union').GetName] приймає [Concept('heir_selection', 'CONCEPT_PLACEHOLDER')|e] [ShowSpecialStatusName('senior_partner')], якщо це можливо"
  union_codified_inheritance_policy_bt: "#R Заблоковані [Concept('heir_selections', 'CONCEPT_PLACEHOLDER')|e] не можуть бути застосовані або перевизначені#!"
  union_economic_law: "Економіка союзу"
  union_economic_law_desc: "Один монарх може правити кількома престолами, проте члени [GetInternationalOrganizationType('union').GetName] дуже відокремлені у своїй економіці. Цей закон має зблизити їх усіх."
  union_unified_treasury_policy: "Уніфікована скарбниця"
  union_unified_treasury_policy_desc: "Різні скарбниці [GetInternationalOrganizationType('union').GetName] будуть об'єднані в єдину сутність, яка наповнює скарбниці монарха і дозволяє йому витрачати золото в найкращих інтересах [GetInternationalOrganizationType('union').GetNameWithNoTooltip]."
  union_cooperative_investment_policy: "Кооперативні інвестиції"
  union_cooperative_investment_policy_desc: "Скарбниці членів [GetInternationalOrganizationType('union').GetName] не служать нікому виключно. Вони є частиною королівської комуни і мають бути використані для покращення інфраструктури кожного члена."
  union_diplomatic_law: "Дипломатичні Свободи"
  union_diplomatic_law_desc: "Оскільки [GetInternationalOrganizationType('union').GetName] очолюється з єдиного престолу, виникає питання, як буде здійснюватися дипломатія $union$."
  union_unified_external_diplomacy_policy: "Уніфікована Зовнішня Дипломатія"
  union_unified_external_diplomacy_policy_desc: "Дипломатичні справи [GetInternationalOrganizationType('union').GetName] централізовані в [ShowSpecialStatusName('senior_partner')], тоді як інші члени обмежені у своїй зовнішній дипломатії."
  union_organized_diplomats_policy: "Організовані Дипломати"
  union_organized_diplomats_policy_desc: "Дипломати [GetInternationalOrganizationType('union').GetName] служать не єдиному прапору, а всій $union$. Кожен член має доступ до їхніх здібностей і може використовувати їх для своїх власних зовнішніх справ."
  union_legislature_law: "Законодавча Влада Союзу"
  union_legislature_law_desc: "Адміністрація [GetInternationalOrganizationType('union').GetName] вимагає злагодженого дизайну. Затверджена, унітарна система законодавчої влади є імперативом для забезпечення стабільності $union$."
  union_aligned_legislature_policy: "Узгоджена Законодавча Влада"
  union_aligned_legislature_policy_desc: "Щоб зберегти адміністративну згуртованість та послідовність у [GetInternationalOrganizationType('union').GetName], усі закони та політики мають бути узгоджені з законами та політиками [ShowSpecialStatusName('senior_partner')]."
  union_aligned_legislature_policy_at: "Кожен член [GetInternationalOrganizationType('union').GetName] приймає впроваджені [Concept('government_reforms', 'CONCEPT_PLACEHOLDER')|e] та [Concept('policies', 'CONCEPT_PLACEHOLDER')|e], де це можливо, від [ShowSpecialStatusName('senior_partner')]"
  union_federal_legislature_policy: "Федеральна Законодавча Влада"
  union_federal_legislature_policy_desc: "Відмінності у звичаях та законах є не недоліком, а основним аспектом різних членів [GetInternationalOrganizationType('union').GetName]. Таким чином, розробка політик є недоторканною відповідальністю держав-членів, а не правителя."
  union_mutual_offense_law: "Взаємний Наступ"
  union_mutual_offense_law_desc: "Хоча насамперед оборонна за своєю природою, військова міць [GetInternationalOrganizationType('union').GetName] може бути використана для взаємної підтримки у військових кампаніях – якщо держави-члени погоджуються на таке зобов'язання."
  union_assured_offense_policy: "Гарантований Наступ"
  union_assured_offense_policy_desc: "[GetInternationalOrganizationType('union').GetName] служить агресивним альянсом. Вороги тремтітимуть, коли наші солдати рушать єдиним фронтом проти них."
  union_automatic_offense_policy: "Обов'язок Наступу"
  union_automatic_offense_policy_desc: "[GetInternationalOrganizationType('union').GetName] має сильну агресивну природу. Кожен член зобов'язаний слідувати за своїми побратимами у наступальній війні."
  union_possible_offense_policy: "Можливий Наступ"
  union_possible_offense_policy_desc: "Щоб вижити, [GetInternationalOrganizationType('union').GetName] має процвітати через завоювання та зростання власної могутності. Кожному члену може бути дозволено закликати інших членів у часи війни."
  union_unification_of_crowns_law: "Питання Об'єднання"
  union_unification_of_crowns_law_desc: "[GetInternationalOrganizationType('union').GetName] у більшості своїх варіацій є не чим іншим, як вільною конфедерацією різних держав, керованих з одного престолу. Однак можливість об'єднання під прапором [ShowSpecialStatusName('senior_partner')] не виключена..."
  union_rapid_crown_unification_policy: "Швидке Об'єднання Корон"
  union_rapid_crown_unification_policy_desc: "Подальші вдосконалення в різних частинах бюрократії [ShowSpecialStatusName('senior_partner')] призвели до оптимізації процесу анексії [ShowSpecialStatusNamePlural('junior_partner')]."
  union_swift_crown_unification_policy: "Швидке об'єднання корон"
  union_swift_crown_unification_policy_desc: "Дипломатична та адміністративна бюрократія в [ShowSpecialStatusName('senior_partner')] була значно покращена, що дозволило швидше інтегрувати держави-члени."
  union_crown_unification_policy: "Об'єднання корон"
  union_crown_unification_policy_desc: "Настав час нарешті централізувати [GetInternationalOrganizationType('union').GetName]! Під милостивим наглядом [ShowSpecialStatusName('senior_partner')] держави-члени погодилися на процеси дипломатичної анексії."
  union_federal_union_policy: "Федеральний союз"
  union_federal_union_policy_desc: "[GetInternationalOrganizationType('union').GetName] — це насамперед оборонний альянс. Жодна держава-член не зацікавлена в об'єднанні престолів в єдине політичне утворення, і суверенітет кожної окремої держави захищений."
  dop_rudolfine_house_rules: "Реформовані правила дому"
  dop_rudolfine_house_rules_desc: "Реформовані правила дому — це система спільного управління австрійськими землями, що надає всім чоловічим членам родини рівний статус, зберігаючи при цьому особливі привілеї для найстаршого."
  foreign_court_customs_policy: "Іноземні звичаї"
  foreign_court_customs_policy_desc: "Замість того, щоб покладатися на власну культуру, ми можемо черпати натхнення з інших дворів, щоб ще більше зміцнити власну."
  colonial_representation_law: "Колоніальне представництво"
  colonial_representation_law_desc: "Наш власний вплив на землю, якою ми керуємо, визначається примхами нашого сюзерена."
  colonial_representation_law_no: "Без представництва"
  colonial_representation_law_no_desc: "Нам не дозволено брати участь у парламенті, і наш сюзерен має значний вплив на нашу економіку."
  colonial_representation_law_yes: "Представництво в парламенті"
  colonial_representation_law_yes_desc: "Нам було надано право голосу в парламентських рішеннях нашої землі та обмежено вплив нашого сюзерена."
  mongol_law_policy: "Монгольське право"
  mongol_law_policy_desc: "Хоча й таємна від громадськості, політика $mongol_law_policy$ мала на меті три речі: покору поточному правителю, об'єднання народу та суворе покарання за будь-яке правопорушення проти держави. Зберігаючи її в таємниці від громадськості, її також легше змінити відповідно до інших потреб."
  dahsala_system: "Податок Дахсала"
  dahsala_system_desc: "Замість того, щоб дозволяти місцевим податковим законам розвиватися для простого народу в $india$, організація їх усіх у рамках $dahsala_system$ дозволить нам належним чином оподатковувати їх."
  zabiti: "Система Забіті"
  zabiti_desc: "Система, де оподаткування вимірюється розміром землі, а також її вартістю. Люди повинні платити або сріблом, або врожаєм, і якщо їхня земля довго залишалася необробленою, то вона звільняється від оподаткування, доки не відновить свою продуктивність."
  ghalla_bakshi: "Система Галла Бакші"
  ghalla_bakshi_desc: "Улюблена більшістю простого народу, оскільки вона збирає державну частку продукцією, а не сплачуючи оцінку врожаю."
  nasaq: "Система Насак"
  nasaq_desc: "Найбільш довільний з трьох методів, ця система визначає середній попит на землю за останні десятиліття, і оподатковується відповідно до цих вимог."
  mansabdar_system: "Організація Мансабдарів"
  mansabdar_system_desc: "Замість того, щоб покладатися на вкорінених дворян для служби в нашій армії, ми могли б надати кожному можливість служити на будь-якому ранзі армії, якщо вони доведуть, що можуть виконувати цю роль."
  hab_military_frontier: "Військовий Кордон"
  hab_military_frontier_desc: "Ми встановили військовий кордон для захисту нації від язичницьких орд, що зазіхають на наші межі."
  frontier_maintained: "Кордон Підтримується"
  frontier_maintained_desc: "Наш військовий кордон повністю підтримується і готовий захищати країну від загроз, що насуваються."
  frontier_not_maintained: "Кордон Не Підтримується"
  frontier_not_maintained_desc: "Через брак фінансування наш військовий кордон наразі не підтримується і тому вразливий у разі ворожих вторгнень."
  vedic_education: "Ведична Освіта"
  vedic_education_desc: "Метод освіти, що навчає маси про [ShowReligionName('hindu')] без розділення когось на касти."
  guru_nanak_guruship: "Вчення [GetCharacter('guru_nanak').GetShortNameWithNoTooltip]"
  guru_nanak_guruship_desc: "Вчення, встановлені [GetCharacter('guru_nanak').GetName]."
  vand_chhako: "Ванд Чако"
  vand_chhako_desc: "Означає «ділитися і споживати», це один зі стовпів [GetCharacter('guru_nanak').GetName]. Він заохочує ділитися всім доступним і колективне споживання цього громадою."
  kirat_karo: "Кірат Каро"
  kirat_karo_desc: "Означає «працювати чесно», це один зі стовпів [GetCharacter('guru_nanak').GetName]. Це означає відданість і чесність у важкій праці, як вправу того, що $sikhism_god_name$ дав нам."
  naam_japo: "Нам Джапо"
  naam_japo_desc: "Означає «промовляти Його ім'я», це один зі стовпів [GetCharacter('guru_nanak').GetName]. Це означає медитувати і розмірковувати над багатьма іменами $sikhism_god_name$, щоб досягти зв'язку з Ним."
  guru_angad_guruship: "Вчення [GetCharacter('guru_angad').GetShortNameWithNoTooltip]"
  guru_angad_guruship_desc: "Вчення, встановлені [GetCharacter('guru_angad').GetName]."
  gurmukhi_script: "Письмо Гурмукхі"
  gurmukhi_script_desc: "Письмо, розроблене та стандартизоване [GetCharacter('guru_angad').GetName], стане основним письмом для [ShowReligionName('sikhism')]."
  langar_community: "Громада Лангар"
  langar_community_desc: "Громадська кухня, прибудована до будь-якого храму, безкоштовно годуватиме всіх людей, незалежно від їхнього віросповідання, статусу чи етнічної приналежності."
  mall_akhara: "Mall Akhāṛā"
  mall_akhara_desc: "Борцівські арени для тренувань людей слугуватимуть не лише способом підтримувати їхні тіла здоровими, а й покращенням їхньої бойової майстерності."
  guru_amar_das_guruship: "[GetCharacter('guru_amar_das').GetShortNameWithNoTooltip] Вчення"
  guru_amar_das_guruship_desc: "Вчення, встановлені [GetCharacter('guru_amar_das').GetName]."
  dasvandh_tax: "Податок Дасвандх"
  dasvandh_tax_desc: "Означаючи «десяту частину», це система збору доходів, яка встановлює, що десята частина доходу має бути пожертвувана в ім'я $character_title_guru$."
  ananda_karaja: "Ānada Kāraja"
  ananda_karaja_desc: "Означаючи «дія до щастя», це весільна церемонія для [ShowReligionName('sikhism')], як визначено [GetCharacter('guru_amar_das').GetName]. Гімни, що співаються під час неї, оспівують єднання з божественним."
  sangat_equality: "Рівність Сангату"
  sangat_equality_desc: "Чоловіки та жінки рівні перед $sikhism_god_name$, і тому обидва однаково мають право бути частиною чернечої громади Сангату, і навіть очолювати її."
  guru_ram_das_guruship: "[GetCharacter('guru_ram_das').GetShortNameWithNoTooltip] Вчення"
  guru_ram_das_guruship_desc: "Вчення, встановлені [GetCharacter('guru_ram_das').GetName]."
  urbanization_projects: "Проєкти урбанізації"
  urbanization_projects_desc: "Завдяки серйозній відданості та спільній добровільній праці, можуть бути збудовані найсвятіші та найвеличніші [ShowReligionAdjective('sikhism')] міста."
  scripture_hymns: "Гімни Писання"
  scripture_hymns_desc: "Писання є найсвятішою з книг, і воно має бути прикрашене відповідними гімнами, що прославляють його велич."
  masand_system: "Система Масанд"
  masand_system_desc: "Система місіонерів та проповідників, вони поширюватимуть [ShowReligionAdjective('sikhism')] далі від $character_title_guru$, водночас виконуючи функції збирачів податків."
  guru_arjan_guruship: "[GetCharacter('guru_arjan').GetShortNameWithNoTooltip] Вчення"
  guru_arjan_guruship_desc: "Вчення, встановлені [GetCharacter('guru_arjan').GetName]."
  adi_granth: "Аді Грантх"
  adi_granth_desc: "Збірка гімнів від минулих $character_title_guru$, укладена [GetCharacter('guru_arjan').GetName], яка слугуватиме основою для наших священних писань."
  holy_abode: "Священна Обитель"
  holy_abode_desc: "Завдяки освяченню священних писань у святих храмах, ми перетворимо їх на місце перебування $sikhism_god_name$ та центр паломництва для всіх [ShowReligionAdjective('sikhism')] вірних."
  martyrdom: "Мучеництво"
  martyrdom_desc: "Наша віра в [ShowReligionName('sikhism')] сильна, і ми не відмовимося від неї навіть під загрозою тортур чи навіть смерті."
  guru_hargobind_guruship: "Вчення [GetCharacter('guru_hargobind').GetShortNameWithNoTooltip]"
  guru_hargobind_guruship_desc: "Вчення, встановлені [GetCharacter('guru_hargobind').GetName]."
  akal_takht: "Акал Тахт"
  akal_takht_desc: "«Трон Безсмертного» слугуватиме беззаперечним осідком влади для нашого $character_title_guru$ та [ShowReligionName('sikhism')]."
  protection_of_the_poor: "Захист бідних"
  protection_of_the_poor_desc: "Військова сила повинна використовуватися не для гноблення та тиранії, а для захисту вразливих від таких тиранів."
  miri_piri: "Мірі Пірі"
  miri_piri_desc: "Лише поєднавши світську владу та духовний авторитет під фігурою $character_title_guru$, [ShowReligionName('sikhism')] зможе по-справжньому досягти своєї заслуженої слави."
  guru_har_rai_guruship: "Вчення [GetCharacter('guru_har_rai').GetShortNameWithNoTooltip]"
  guru_har_rai_guruship_desc: "Вчення, встановлені [GetCharacter('guru_har_rai').GetName]."
  impartial_manji_heads: "Безсторонні голови Манджі"
  impartial_manji_heads_desc: "Ті, хто очолює наші численні релігійні адміністрації, не повинні виявляти упередженості до будь-якої думки, а сумлінно служити інтересам [ShowReligionName('sikhism')]."
  fragance_of_a_flower: "Аромат квітки"
  fragance_of_a_flower_desc: "Якщо однією рукою зірвати квітку, а іншою віддати її, обидві руки отримають однаковий аромат. Так само, незалежно від наших різних релігійних переконань, ми всі торкнуті тим самим божественним духом."
  nature_guardian: "Охоронець природи"
  nature_guardian_desc: "Наше природне середовище існує не для того, щоб служити нам, а для того, щоб ми жили в гармонії з ним. Тому ми повинні захищати його та піклуватися про нього так само, як воно піклується про нас."
  guru_har_krishan_guruship: "Вчення [GetCharacter('guru_har_krishan').GetShortNameWithNoTooltip]"
  guru_har_krishan_guruship_desc: "Вчення, встановлені [GetCharacter('guru_har_krishan').GetName]."
  treat_the_sick: "Лікувати хворих"
  treat_the_sick_desc: "Хвороби та мори – це прокляття людства. Ми старанно лікуватимемо всіх хворих, щоб забезпечити здорове суспільство."
  unexpected_knowledge: "Несподівані знання"
  unexpected_knowledge_desc: "Духовні сили $character_title_guru$ незаперечні, оскільки про них говорили, що вони знали істини та факти, які вони не могли знати звичайними методами. Водночас, люди, які, здавалося б, неписьменні, можуть обговорювати теологію з найосвіченішим вченим."
  young_humility: "Юна смиренність"
  young_humility_desc: "Хоч би як багато хтось пізнав, завжди існують джерела знань, що поза досяжністю, і люди, що їх опанували. Навіть молодші можуть володіти знаннями, що виходять за межі розуміння старших умів. У цьому сенсі всі уми подібні до дитячого."
  guru_tegh_bahadur_guruship: "[GetCharacter('guru_tegh_bahadur').GetShortNameWithNoTooltip] Вчення"
  guru_tegh_bahadur_guruship_desc: "Вчення, встановлені [GetCharacter('guru_tegh_bahadur').GetName]."
  word_of_a_sikh: "Слово [ShowReligionAdjectiveWithNoTooltip('sikhism')]"
  word_of_a_sikh_desc: "Урочиста обітниця послідовника [ShowReligionName('sikhism')] слід розуміти як таку, що була дана в присутності $sikhism_god_name$, і як така вона має бути непорушною."
  guru_travels: "$character_title_guru$ Подорожі"
  guru_travels_desc: "Якщо $character_title_guru$ залишається лише в одному місці, послання [ShowReligionName('sikhism')] не зможе поширитися. $character_title_guru$ повинен подорожувати та мати контакт з чужими народами та віруваннями."
  resist_persecution: "Чинити опір Переслідуванню"
  resist_persecution_desc: "Вороги істинної віри завжди переслідуватимуть вірних, але наші вірування сильні, і вони не зможуть зламати нас."
  guru_gobind_singh_guruship: "[GetCharacter('guru_gobind_singh').GetShortNameWithNoTooltip] Вчення"
  guru_gobind_singh_guruship_desc: "Вчення, встановлені [GetCharacter('guru_gobind_singh').GetName]."
  sikh_pluralism: "[ShowReligionAdjectiveWithNoTooltip('sikhism')] Плюралізм"
  sikh_pluralism_desc: "Хоча [ShowLawName('khalsa_law')] призначена бути захисником [ShowReligionName('sikhism')], не всі вірні є її частиною. Як така, вона за своєю суттю доводить існування плюралізму всередині віри, і це те, що нас збагачує."
  dharamyudh: "Dharamyudh"
  dharamyudh_desc: "«Війна праведності» — це будь-яка війна, що служить меті захисту [ShowReligionName('sikhism')] та її послідовників. Війна має бути останнім засобом, але всі повинні бути готові вести її, щоб захистити віру та зупинити тиранію."
  dasam_granth: "Dasam Granth"
  dasam_granth_desc: "Збірка різноманітних поетичних текстів, складених [GetCharacter('guru_gobind_singh').GetName], вона вважається рівною за статусом [ShowPolicyName('adi_granth')] і зберігається поруч із ним у храмах."
  khalsa_law: "Khalsa"
  khalsa_law_desc: "Спільнота воїнів, якій доручено захист [ShowReligionName('sikhism')] та її послідовників, її правила поведінки та ініціації встановлять стандарт для всіх вірних."
  guru_panth: "Guru Panth"
  guru_panth_desc: "Лідерство [ShowReligionName('sikhism')] покладалося б на [ShowLawName('khalsa_law')] в цілому, яка служила б її $character_title_guru$."
  khalsa_fauj: "Khalsa Fauj"
  khalsa_fauj_desc: "Лише організувавши військові сили [ShowLawName('khalsa_law')] у могутню армію, вони зможуть виконувати свою функцію захисників [ShowReligionName('sikhism')]."
  amrit_sanskar: "Amrit Sanskar"
  amrit_sanskar_desc: "Члени [ShowLawName('khalsa_law')] — це не просто грубіяни, кинуті в бій, а витончені особистості, які дотримуються обрядів ініціації та правил поведінки й дрес-коду, покладених на них як на членів спільноти. Престиж [ShowLawNameWithNoTooltip('khalsa_law')] полягає не в могутності її воїнів, а в привабливості їхньої чистоти."
  guru_granth_sahib_guruship: "[ShowWorkOfArtNameWithNoTooltip('guru_granth_sahib')] Вчення"
  guru_granth_sahib_guruship_desc: "Вчення, встановлені в [ShowWorkOfArtName('guru_granth_sahib')]."
  eternally_living_guru: "Вічно Живий $character_title_guru$"
  eternally_living_guru_desc: "[ShowWorkOfArtName('guru_granth_sahib')] є остаточним і суверенним вічним $character_title_guru$, який буде дороговказом для всіх послідовників [ShowReligionName('sikhism')]."
  divine_justice: "Божественна Справедливість"
  divine_justice_desc: "Вчення, закодовані в [ShowWorkOfArtName('guru_granth_sahib')], скеровують наше суспільство жити в мирі та гармонії, ґрунтуючись на $sikhism_god_name$ та Його справедливості."
  unchanging_writing: "Незмінне Письмо"
  unchanging_writing_desc: "[ShowWorkOfArtName('guru_granth_sahib')] створювався протягом багатьох років і не одним $character_title_guru$, але тепер він досяг своєї остаточної та вічної форми. Його письмена більше не будуть змінюватися жодним чином."
  tur_kanum_i_osmani: "Канун-і Османі"
  tur_kanum_i_osmani_desc: "Збірка законодавчих актів, що разом складають закони [GetCountry('TUR').GetName], зосереджена на забезпеченні внутрішньої стабільності для численних етносів, а не на завоюванні нових земель."
  tur_has_not_first_option_in_flavor_tur_208_event: "НЕ обрав перший варіант у #Y $flavor_tur.208.title$#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  tur_has_picked_first_option_in_flavor_tur_208_event: "Обрав перший варіант у #Y $flavor_tur.208.title$#! [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  reformed_hussite_armies_policy: "Реформована $hussite_ADJ$ Тактика"
  reformed_hussite_armies_policy_desc: "Наші предки віддавали перевагу зразковій обороні. Вони витримали випробування часом і ворогами. Тепер наша черга перейти в наступ і продемонструвати силу проти наших єретичних і язичницьких сусідів, використовуючи реформовану та агресивну військову силу."
  ira_alcohol_ban: "Обмеження Алкоголю"
  ira_alcohol_ban_desc: "Щоб збалансувати релігійні обов'язки служителів нашої віри та бажання нашого народу, ми повинні вирішити, чи дозволено споживання алкоголю."
  ban_on_alcohol: "Заборона Алкоголю"
  ban_on_alcohol_desc: "Заборонивши алкоголь для будь-яких громадян у нашому володінні, ми можемо належним чином забезпечити лояльність служителів нашої віри, навіть якщо це розгніває наше населення."
  no_restriction_on_alcohol: "Без Обмежень на Алкоголь"
  no_restriction_on_alcohol_desc: "Замість заборони алкоголю для нашого народу, було б краще залишити його необмеженим для будь-якого з наших громадян, забезпечуючи лояльність мас."
  act_of_navigation: "Акт про Навігацію"
  act_of_navigation_desc: "Домінування наших ворогів має бути оскаржене на всіх наших ринках. Завдяки сильним центральним директивам та преференційним меркантилістичним практикам ми спробуємо надати нашим купцям явну перевагу над купцями наших ворогів та суперників."
  lit_casimir_code_policy: "Судебник Литви"
  lit_casimir_code_policy_desc: "Щоб боротися з відсутністю кодексу в нації, а також зі злочинною діяльністю, що здійснюється представниками вищих верств, був написаний $lit_casimir_code_policy$, щоб належним чином приборкати хаос, а також надати більше влади [GetEstateName('crown_estate')]."