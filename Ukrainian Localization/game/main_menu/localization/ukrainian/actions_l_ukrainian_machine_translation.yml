  dissolve_monasteries_desc: "Папістське чернецтво застаріле та єретичне. Ми повинні розпустити більше решти нонконформістських релігійних домів, позбавити їх земель та конфіскувати їхні цінності."
  militarise_religious_icons: "Мілітаризувати релігійні ікони"
  militarise_religious_icons_desc: "Релігія відіграє велику роль не лише в нашому суспільстві, а й у нашій армії. Моральний дух нашої армії може бути підвищений, якщо їм дозволять використовувати ікони Церкви під час їхніх кампаній."
