  aid_colonial_war_tt: "Ми допоможемо нашому колоніальному [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] чвертю нашої річної [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] та зменшимо їхнє [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e]"
