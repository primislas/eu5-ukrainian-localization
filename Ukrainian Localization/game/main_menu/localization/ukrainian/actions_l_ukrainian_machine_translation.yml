  give_colony_representation_desc: "Настав час дозволити нашим колоніальним [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] певне представництво у їхній власній адміністрації."
  give_colony_rebellion_support: "Надати підтримку повстанню колонії"
