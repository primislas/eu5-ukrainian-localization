  rot_promote_regional_culture_desc: "Просувати #Y Регіональну Культуру#! з нашого #Y Основного Регіону#!. Ця культура стане основою та джерелом нового Відродження держави."
  rot_promote_regional_culture_select_culture: "Вибрати Культуру для просування як нашої Основної"
  rot_promote_regional_culture_no_cultures: "@trigger_no! Немає доступної дійсної [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] в нашому #Y Основному Регіоні#!"
  rot_promote_regional_culture_select_culture_to_accept: "Вибрати Культуру для просування як Прийнятої"
  rot_promote_regional_culture_tt_generic: "Крім того, її [Concept('language', 'CONCEPT_PLACEHOLDER')|e] стає новою [Concept('court_language', 'CONCEPT_PLACEHOLDER')|e], і ми можемо вибрати #Y 2#! додаткові культури, щоб просунути їх до [Concept('accepted_cultures', 'CONCEPT_PLACEHOLDER')|e] безкоштовно."
  rot_promote_regional_culture_tt: "Цільова [Concept('culture', 'CONCEPT_PLACEHOLDER')|e] стане новою [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] нашої країни. $rot_promote_regional_culture_tt_generic$"
  rot_promote_regional_culture_tt_specific: "[SCOPE.sCulture('target').GetName] стане новою [Concept('primary_culture', 'CONCEPT_PLACEHOLDER')|e] нашої країни. $rot_promote_regional_culture_tt_generic$"
  rot_NOT_assumed_regional_culture_tt: "Ми НЕ просували культуру через [ShowGenericActionName('rot_promote_regional_culture')]"
  nanbokuchou_supports_side_tt: "Вже підтримуємо сторону"
  nanbokuchou_change_sides: "Змінити Сторону для Підтримки"
  nanbokuchou_change_sides_desc: "Ми зрадимо наш поточний двір і приєднаємося до іншої сторони."
  nanbokuchou_declare_neutrality: "Оголосити Нейтралітет"
  nanbokuchou_declare_neutrality_desc: "Ми не підтримуватимемо жодну сторону і залишатимемося нейтральними у своїй вірності"
  sengoku_attempt_imperial_restoration: "Спроба Імперської Реставрації"
  sengoku_attempt_imperial_restoration_desc: "Ми повинні скористатися слабкістю [GetUniqueInternationalOrganization('japanese_shogunate').GetName] і спробувати відновити владу імператорської лінії."
  sengoku_attempt_imperial_restoration.tt: "Ми оголосимо незалежність наших земель від влади [GetUniqueInternationalOrganization('japanese_shogunate').GetName]"
  sengoku_force_end_war: "Примусово Завершити Війну"
  sengoku_force_end_war_desc: "Руйнівні війни шкодять нашій країні. Ми можемо використати нашу імперську владу і змусити будь-який войовничий клан припинити боротьбу, надіславши їм офіційне імперське послання."
  sengoku_force_end_war_choose_war: "Вибрати [Concept('war', 'CONCEPT_PLACEHOLDER')|e] для припинення"
  sengoku_revoke_clans_land: "Відкликати Землю"
  sengoku_revoke_clans_land_desc: "Відберіть частину виділеної землі та поверніть її під прямий контроль [GetUniqueInternationalOrganization('japanese_shogunate').GetName]."
  sengoku_limit_clans_autonomy: "Обмежити автономію клану"
  sengoku_limit_clans_autonomy_desc: "Клани виходять з-під нашого контролю і діють незалежно, нехтуючи нашою владою. Ми повинні змусити їх підкорятися та дотримуватися директив [GetUniqueInternationalOrganization('japanese_shogunate').GetName]."
  sengoku_summon_to_court: "Викликати до двору"
  sengoku_summon_to_court_desc: "Лідери кланів ігнорують нашу владу. Ми повинні викликати їх до нашого двору, щоб тримати їх під контролем, або використати їхню відмову підкоритися такому виклику як виправдання їхньої зради."
  sengoku_proclaim_clan_independence: "Проголосити незалежність клану"
  sengoku_proclaim_clan_independence_desc: "[GetUniqueInternationalOrganization('japanese_shogunate').GetName] ослаб і більше не може ефективно контролювати клани. Ми повинні скористатися ситуацією та заявити про свою незалежність від влади $JAPANESE_SHOGUNATE_LEADER_MALE$"
  clan_has_valid_landable_location.tt: "Ми присутні в [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], де немає інших кланів"
  sengoku_increment_recruitment: "Збільшити набір"
  sengoku_increment_recruitment_desc: "Настають непевні часи, і доведеться воювати. Ми повинні збільшити наші армії новими рекрутами."
  sengoku_offer_hostage: "Запропонувати заручника"
  sengoku_offer_hostage_desc: "Ми можемо зміцнити наші зв'язки з деякими іншими кланами, відправивши їм одного з членів нашої родини як заручника."
  sengoku_ask_for_hostage: "Попросити заручника"
  sengoku_ask_for_hostage_desc: "Ми можемо попросити клан надіслати нам одного з членів їхньої родини як заручника, щоб зміцнити наші зв'язки з ними."
  sengoku_prove_heritage: "Довести спадщину"
  sengoku_prove_heritage_desc: "Наша родина походить з дуже далекого минулого, як і всі вони насправді. Ми можемо спробувати «знайти» в наших архівах документи, які доводять, наскільки давнім є наш рід і наскільки тісно ми пов'язані з найважливішими родинами та кланами."
  grant_shugo_office: "Надати посаду Сюго"
  grant_shugo_office_desc: "Провінціями $japan_region$ іноді важко керувати, тому призначаються провінційні губернатори, щоб поширити владу $JAPANESE_SHOGUNATE_LEADER_MALE$ на всю землю."
  grant_shugo_office_effect_tt: "Ми надамо губернаторство провінції, надавши їм [ShowBuildingTypeName('kokufu')] в [Concept('location', 'CONCEPT_PLACEHOLDER')|e], зробивши їх [ShowSpecialStatusName('shugo_daimyo')], якщо вони такими не є"
  already_shugo_daimyo_tt: "Вони вже є [ShowSpecialStatusName('shugo_daimyo')]"
  shugo_province_default: "[ROOT.GetLocation.GetProvince.GetName]"
  shugo_province_location: "[ROOT.GetLocation.GetName]"
  shugo_province_mutsu: "#BOLD Муцу#!"
  shugo_province_dewa: "#BOLD Дева#!"
  shugo_province_wakasa: "#BOLD Вакаса#!"
  shugo_province_iki: "#BOLD Ікі#!"
  revoke_shugo_office: "Відкликати посаду сюґо"
  revoke_shugo_office_desc: "Посада сюґо провінції дозволяє родині накопичити значну владу та вплив там, але її можна відкликати, щоб уникнути їхньої надмірної зневаги до своєї посади."
  revoke_shugo_office_effect_tt: "Ми відкличемо губернаторство провінції, закривши їхнє [ShowBuildingTypeName('kokufu')] там, що дасть їм [ShowBiasValue('opinion_revoked_shugo_office')|+=0] [Concept('opinion', 'CONCEPT_PLACEHOLDER')|e] до нас та [ShowCasusBelliName('cb_japanese_clan_rebel_against_shogunate_authority')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e], і вони перестануть бути [ShowSpecialStatusName('shugo_daimyo')], якщо це їхня єдина посада сюґо"
  still_shugo_daimyo_tt: "Вони залишаться [ShowSpecialStatusName('shugo_daimyo')] інших провінцій"
  claim_shugo_office: "Претендувати на посаду сюґо"
  claim_shugo_office_desc: "Посада сюґо є однією з владних та престижних. Будь-який клан з достатнім впливом у провінції може вирішити, що він заслуговує на цю посаду, навіть якщо це суперечить волі $JAPANESE_SHOGUNATE_LEADER_MALE$."
  claim_shugo_office_effect_tt: "Ми претендуватимемо на губернаторство провінції, заснувавши там [ShowBuildingTypeName('kokufu')]"
  seek_alliance_with_overlord_rival: "Шукати підтримки суперника сюзерена"
  seek_alliance_with_overlord_rival_desc: "Щоб боротися з нашими тиранічними сюзеренами, нам знадобиться вся необхідна підтримка. На щастя, є ті, хто щохвилини плете змову проти нашого огидного суверена. Ми повинні шукати добрих стосунків з ними, щоб встановити спільну дипломатію."
  overlord_rival_is_available.tt: "Суперники нашого сюзерена ще не підтримують колоніального [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]"
  declare_independence_war: "Оголосити війну за незалежність"
  declare_independence_war_desc: "Настав час скинути ланцюги гноблення та оголосити нашу незалежність від нашого сюзерена!"
  create_colonial_federation: "Створити Колоніальну Федерацію"
  create_colonial_federation_desc: "Створення місцевої адміністрації для нагляду та управління землями колоній допоможе нам у забезпеченні більшої автономії."
  cf_create_colonial_federation_tt: "Ми створимо нову Колоніальну Федерацію та станемо її країною-лідером."
