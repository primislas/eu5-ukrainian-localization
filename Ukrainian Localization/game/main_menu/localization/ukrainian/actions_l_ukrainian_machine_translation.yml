  cmd_negotiate_with_rebels: "Вести переговори з повстанцями"
  cmd_negotiate_with_rebels_desc: "Настав час нам почути благання народу та докласти всіх зусиль для відновлення стабільності в нашій країні, аби не ризикувати руйнуванням того, що колись робило нас великими."
  cmd_negotiate_with_rebels_tt: "Пожертвувавши #R 3#! [Concept('celestial_authority_gc', 'CONCEPT_PLACEHOLDER')|e] та покладаючись на #italic силу#! і підтримку [Concept('rebellion', 'CONCEPT_PLACEHOLDER')|e], може статися наступне:"
  cmd_negotiate_nationalist: "#Y $REBELS_CATEGORY_nationalist$#! вимагатимуть зменшення [Concept('control', 'CONCEPT_PLACEHOLDER')|e] на своїх землях і підштовхуватимуть нас до [ShowSocietyDirectionName('free_subjects')]"
  cmd_negotiate_estate: "#Y $REBELS_CATEGORY_estate$#!: Вони вимагатимуть зменшення [Concept('tax', 'CONCEPT_PLACEHOLDER')|e] та [Concept('privileges', 'CONCEPT_PLACEHOLDER')|e]"
  cmd_negotiate_religious: "#Y $REBELS_CATEGORY_religious$#!: Вони вимагатимуть [ShowModifier('religious_concessions_modifier')] і підштовхуватимуть нас до [ShowSocietyDirectionName('humanist')]"
  cmd_reform_the_cabinet: "Реформувати Кабінет"
  cmd_reform_the_cabinet_desc: "У давні часи радники, що служили в нашому [ROOT.GetCountry.GetGovernment.GetCabinetTitle], ставили інтереси нашого народу понад усе. Нещодавно їхня розбещеність і занепад досягли безпрецедентних рівнів. Укорінені у своїх привілеях, вони вимагають офіційних посад і не виконують своїх обов'язків згідно із законом. Це має змінитися, навіть якщо ми втратимо їхню прихильність."
  cmd_revise_the_tax_code: "Переглянути Податковий Кодекс"
  cmd_revise_the_tax_code_desc: "Неефективне оподаткування наших численних провінцій призвело до багатьох втрат, що ефективно зменшують багатство нашої скарбниці. Щоб підняти наш дух і уникнути розпаду нашої династії, ми повинні подбати про наші джерела доходу!"
  has_revised_tax_code_action_tt: "Ми завершили [ShowCabinetActionName('reform_taxation_system')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e] та [ShowGenericActionName('cmd_revise_the_tax_code')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e] [Concept('action', 'CONCEPT_PLACEHOLDER')|e]"
  cmd_restore_stability: "Відновити стабільність у [GetCountry('CHI').GetFlavorRank]"
  cmd_restore_stability_desc: "Недавнє лихо, що охопило наш великий народ, значно вплинуло на нашу стабільність. Якщо ми хочемо подолати його і вийти неушкодженими з цього бурхливого періоду, ми повинні зазирнути всередину і подбати про наші справи."
  cmd_strengthen_crown: "Зміцнити Трон"
  cmd_strengthen_crown_desc: "Наша легітимність як носіїв Небесного Мандату піддається сумніву. Ми мусимо змусити замовкнути наших критиків і відновити нашу велич як обраних."
  has_completed_revised_tax_code_tt: "Виконано [ShowCabinetActionName('reform_taxation_system')] [Concept('cabinet_action', 'CONCEPT_PLACEHOLDER')|e]"
  has_not_already_enacted_this_action_during_the_disaster_tt: "Ще не було впроваджено цю [Concept('action', 'CONCEPT_PLACEHOLDER')|e] під час цього [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]"
  peranakan_trading_rights: "Перанаканські Торгові Права"
  restrict_peranakan_trading_rights: "Обмежити $peranakan_trading_rights$"
  restrict_peranakan_trading_rights_desc: "[ShowReligionGroupName('muslim')] дістався до нас через діяльність [ShowReligionGroupAdjectiveWithNoTooltip('muslim')] купців, багато з яких оселилися в наших північних портах і відомі як Перанакан. Щоб уповільнити навернення наших провінцій, ми могли б обмежити їхні торгові права."
  unrestrict_peranakan_trading_rights: "Відновити $peranakan_trading_rights$"
  unrestrict_peranakan_trading_rights_desc: "Обмеження, накладені на перанаканських купців, занадто великі, щоб їх витримувати в довгостроковій перспективі, і мусять бути скасовані."
  ban_conversion_of_adipatis: "Заборонити Навернення Адіпаті"
  ban_conversion_of_adipatis_desc: "Навернення наших провінційних губернаторів, адіпаті, дедалі більше загрожує згуртованості нашої держави. Якщо ми заборонимо цю практику, ми могли б довше підтримувати стабільність, але ціною великого гніву з боку наших підлеглих."
  unban_conversion_of_adipatis: "Скасувати Заборону на Навернення Адіпаті"
  unban_conversion_of_adipatis_desc: "Заборона на [ShowReligionGroupAdjective('muslim')] навернення спричинила занадто багато проблем і заворушень. Скасувавши її, ми могли б забезпечити собі прихильність наших підданих"
  control_the_bhres: "Контролювати Бхре"
  control_the_bhres_desc: "Багато князів та їхніх дворів поступово навертаються до [ShowReligionGroupName('muslim')]. Зазвичай ми не звертали б уваги на таку дію, але це ставить під сумнів їхню лояльність при розгляді довгострокових наслідків."
  maj_convert_to_islam: "Навернутися до [ShowReligionGroupNameWithNoTooltip('muslim')]"
  maj_convert_to_islam_desc: "[ShowReligionAdjective('sunni')] [ShowReligionGroupName('muslim')] швидко поширюється в межах наших кордонів, і багато наших губернаторів вже навернулися до цієї релігії. Можливо, настав час переступити через свою гордість і навернутися також, хоч би як катастрофічно це було для нашого престижу."
  maj_consequences_of_conversion: "Навернення до [ShowReligionName('sunni')] призведе до від'єднання кожного [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] з менш ніж #y 10.0%#! [Concept('liberty_desire', 'CONCEPT_PLACEHOLDER')|e], а також до наступного:"
  MAJ_reduce_sunni_dominance: "$demak_progress$ зменшується на #g -10.0%#!"
  MAJ_for_as_long_as_this_modifier_is_active: "Доки [ShowModifier('adipati_conversion_ban')] активний, ми більше не втрачатимемо [Concept('cores', 'CONCEPT_PLACEHOLDER')|e], коли [Concept('location', 'CONCEPT_PLACEHOLDER')|e] стає переважно [ShowReligionAdjective('sunni')]."
  peranakan_trading_rights_restriction_event_impact: "Доки [ShowModifier('peranakan_trading_rights_restriction')] активний, '$death_of_hayan_wuruk.6.title$' [Concept('event', 'CONCEPT_PLACEHOLDER')|e] спрацьовуватиме вдвічі рідше."
  hide_from_black_death: "Перемістити Двір у Схованку"
  hide_from_black_death_desc: "Це зменшить ризик, що хтось із двору помре від чуми. Однак це змусить [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] думати, що ми покинули їх напризволяще."
  stop_hide_from_black_death: "Вийти зі Схованки"
  stop_hide_from_black_death_desc: "Ми мусимо показати, що ми не боїмося Чорної Смерті."
  isolate_cities_black_death: "Ізолювати Міста"
  isolate_cities_black_death_desc: "Наказавши нашим містам зачинити свої мури та обмежити пересування до них і з них, ми сподіваємося обмежити вплив хвороби та встановити такий необхідний контроль."
  stop_isolate_cities_black_death: "Відкрити Міста"
  stop_isolate_cities_black_death_desc: "Коли найгірше з хвороби вже минуло, ми знову відкриваємо наші міста для купців та чужинців."
  isolate_cities_effect_tt: "Усі [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e] отримують [ShowModifier('isolating_cities')], масштабований відповідно до того, скільки [Concept('control', 'CONCEPT_PLACEHOLDER')|e] ми маємо в [Concept('location', 'CONCEPT_PLACEHOLDER')|e]."
  control_the_food_market: "Контролювати Ринок Продовольства"
  control_the_food_market_desc: "У ці скрутні часи нашим найбільшим пріоритетом є забезпечення постачання зерна та інших харчових продуктів, забороняючи їхній експорт. Навіть ціною гніву купців нашої нації."
  stop_control_the_food_market: "Скасувати '$control_the_food_market$'"
  stop_control_the_food_market_desc: "Ми більше не потребуємо цих захистів, купці знову вільні торгувати."
  close_the_borders: "Ізолювати Країну"
  close_the_borders_desc: "Купці та інші мандрівники приносять лихо з інших територій. Щоб захистити наш народ, ми змушені повністю закрити наші кордони для будь-якої торгівлі, незалежно від витрат для нашої економіки."
  stop_close_the_borders: "Скасувати '$close_the_borders$'"
  stop_close_the_borders_desc: "Настав час відкрити нашу країну для іноземних товарів та купців."
  no_contact_with_outsiders: "Жодного Контакту з Чужинцями"
  no_contact_with_outsiders_desc: "Усім відомо, що чужинці та купці з сусідніх племен принесли чуму на нашу територію. Щоб уникнути подальшого поширення лиха, ми розірвемо всі зв'язки з нашими сусідами та закриємо наші кордони для будь-якої торгівлі, незалежно від витрат для нашої економіки."
  stop_no_contact_with_outsiders: "Скасувати '$no_contact_with_outsiders$'"
  stop_no_contact_with_outsiders_desc: "$no_contact_with_outsiders_desc$"
  segregate_the_infected: "Відокремити Заражених"
  segregate_the_infected_desc: "Чума вільно поширюється в нашій країні, ми заборонимо хворим залишати свої будинки, щоб зупинити поширення хвороби."
  stop_segregate_the_infected: "Скасувати '$segregate_the_infected$'"
  stop_segregate_the_infected_desc: "Зняти обмеження на пересування для тих, хто хворий на чуму."
  great_pestilence_segregate_the_infected: "$segregate_the_infected$"
  great_pestilence_segregate_the_infected_desc: "Ця руйнівна чума вільно поширюється в наших колоніях, спустошуючи тубільців під нашою опікою, як траву під косою. Ми заборонимо хворим залишати свої будинки, щоб зупинити поширення хвороби."
  great_pestilence_stop_segregate_the_infected: "$stop_segregate_the_infected$"
  great_pestilence_stop_segregate_the_infected_desc: "$stop_segregate_the_infected_desc$"
  strict_quarantines: "Вигнати хворих"
  strict_quarantines_desc: "Уражені мором небезпечні, і сама їхня присутність може поширити моровицю на здорових. Ми повинні вигнати їх з кожної громади, щоб дати шанс тим, кого ще можна врятувати."
  stop_strict_quarantines: "Скасувати '$strict_quarantines$'"
  stop_strict_quarantines_desc: "Нам більше не потрібно виганяти хворих до кордонів громад, кожен [ShowBuildingTypeName('pest_house')], що використовувався для їх розміщення, може бути спалений."
  procure_remedies: "Закупити ліки"
  procure_remedies_no_liquor: "$procure_remedies$"
  procure_remedies_desc: "Цю хворобу можна побороти та відтіснити. Багато лікарів та священиків стверджують, що численні рецепти та ліки можуть покращити здоров'я хворих, наш обов'язок – забезпечити їх достатній запас."
  stop_procure_remedies: "Скасувати '$procure_remedies$'"
  stop_procure_remedies_desc: "Численні ліки та зілля, які цілителі та інші шахраї проповідували як чудодійні та безпомилкові, виявилися неефективними та навіть небезпечними."
  great_pestilence_procure_remedies: "$procure_remedies$"
  great_pestilence_procure_remedies_desc: "Цю хворобу, що вражає наших нових громадян, можна побороти та відтіснити. Багато лікарів та шаманів стверджують, що численні рецепти та ліки можуть покращити здоров'я хворих, наш обов'язок – забезпечити їх достатній запас."
  great_pestilence_stop_procure_remedies: "$stop_procure_remedies$"
  great_pestilence_stop_procure_remedies_desc: "$stop_procure_remedies_desc$"
  sponsor_sin_forgiveness: "Спонсорувати масове прощення"
  sponsor_sin_forgiveness_desc: "Чума – це покарання від Бога за гріхи людей. Ми можемо боротися з нею, організовуючи масові церковні служби по всій країні та заохочуючи населення очиститися від плями гріха."
  stop_sponsor_sin_forgiveness: "Скасувати '$sponsor_sin_forgiveness$'"
  stop_sponsor_sin_forgiveness_desc: "Численні служби виявилися неефективними у зупинці зарази, можна навіть сказати, що ті, хто зібрався на молитву, були ще більш схильні піддатися хворобі."
  sponsor_spiritual_protection: "Спонсорувати духовний захист"
  sponsor_spiritual_protection_desc: "Як каже [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')], хвороби спричинені духовним дисбалансом у тілі хворого або порушенням табу, що дозволило злим духам заволодіти тілом винного. Ми можемо боротися з хворобою, закликаючи наймогутніших духів та приносячи жертви, які змусять їх надати свій захист нашому народу."
  stop_sponsor_spiritual_protection: "Скасувати '$sponsor_spiritual_protection$'"
  stop_sponsor_spiritual_protection_desc: "Численні жертви та ритуали виявилися неефективними у зупинці зарази, духи покинули нас на нашу долю."
  blame_the_minorities: "Представити цапів-відбувайлів"
  blame_the_minorities_desc: "Не всі однаково страждають від хвороби, ті, кого пощадили, мають бути тими, хто наслав цю хворобу на наш народ. Релігійні меншини в нашій країні винні в нашій боротьбі."
  stop_blame_the_minorities: "Скасувати '$blame_the_minorities$'"
  stop_blame_the_minorities_desc: "Релігійні меншини в нашій країні не мають жодного стосунку до чуми, що вражає нас, ми не можемо дозволити їхнє постійне переслідування."
  great_pestilence_blame_the_minorities: "$blame_the_minorities$"
  great_pestilence_blame_the_minorities_desc: "Не всі однаково страждають від хвороби, лише ті, хто є корінними жителями нових земель, ті, хто прожив своє життя далеко від світла Божого, хворіють. Це явно Божа воля, щоб вони страждали за свої гріхи."
  great_pestilence_stop_blame_the_minorities: "$stop_blame_the_minorities$"
  great_pestilence_stop_blame_the_minorities_desc: "Корінні жителі наших колоній невинні та безгрішні, як діти, що виросли самі в пустелі; їхні дії не можуть бути причиною цієї божественної чуми, і, безперечно, вони не заслуговують нашого постійного переслідування."
  legitimize_parliament_abolition: "Легітимізувати законодавчу скасування"
  legitimize_parliament_abolition_desc: "Наш нещодавній рух із захоплення керма нашого [SCOPE.sCountry('actor').GetGovernment.GetParliament.GetName] спрямував зали влади по всьому нашому [SCOPE.sCountry('actor').GetFlavorRank]. Крізь цю бурхливу епоху піднімається дух можливостей! Ми повинні швидко легітимізувати скасування асамблеї.\n"
  reinstate_the_legislative_assembly: "Відновити Законодавчу Асамблею"
  reinstate_the_legislative_assembly_desc: "Наші автократичні тенденції завдали шкоди нашому народу та нашим відносинам з різними станами. Щоб заспокоїти їх і відновити старе верховенство закону, ми повинні вжити заходів для відновлення [SCOPE.sCountry('actor').GetGovernment.GetParliament.GetName].\n"
  rein_estate_loc_key: "Вплив станів у нашій нації незабаром зів'яне і ослабне, дозволяючи нам накладати обмеження на тих, хто володіє місцевою владою. Це, безперечно, покращить становище нашої влади в [SCOPE.sCountry('actor').GetGovernment.GetCourtTitle]!\n"
  rein_in_nobles: "Приборкати еліти"
  rein_in_nobles_desc: "$rein_estate_loc_key$"
  restrictions_loc_key: "Ми зможемо накласти обмеження на наших"
  impose_restrictions_on_nobles_through_event_tt: "$restrictions_loc_key$ [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  rein_in_burghers: "Приборкати багатих"
  rein_in_burghers_desc: "$rein_estate_loc_key$"
  impose_restrictions_on_burghers_through_event_tt: "$restrictions_loc_key$ [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  rein_in_clergy: "Приборкати релігійних"
  rein_in_clergy_desc: "$rein_estate_loc_key$"
  impose_restrictions_on_clergy_through_event_tt: "$restrictions_loc_key$ [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  rein_in_peasants: "Приборкати простолюдинів"
  rein_in_peasants_desc: "$rein_estate_loc_key$"
  impose_restrictions_on_peasants_through_event_tt: "$restrictions_loc_key$ [SCOPE.sCountry('actor').GetGovernment.GetEstateName('peasants_estate')] через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  this_will_end_the_disaster_tt: "Це покладе край [ShowDisasterName('aspiration_for_liberty')] [Concept('disaster', 'CONCEPT_PLACEHOLDER')|e]\n"
  move_nw_good_to_new_location: "Поширити товар Нового Світу"
  move_nw_good_to_new_location_desc: "Ми можемо поширити один із товарів, знайдених у [ShowContinentName('america')], на будь-яке з наших [Concept('locations', 'CONCEPT_PLACEHOLDER')|e], але місцевим жителям це не сподобається, і нам доведеться перезапустити розвиток [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] цієї локації"
  move_nw_good_to_new_location_no_available_good: "@trigger_no! У вас немає [Concept('location', 'CONCEPT_PLACEHOLDER')|e], що належить до ринку, який торгує або виробляє цей [good]"
  move_nw_good_to_new_location_no_available_location: "@trigger_no! У вас немає дійсної [Concept('location', 'CONCEPT_PLACEHOLDER')|e], яка може замінити свій поточний [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] на [good] Нового Світу"
  move_ow_good_to_new_location_no_available_location: "@trigger_no! У вас немає дійсної [Concept('location', 'CONCEPT_PLACEHOLDER')|e], яка може замінити свій поточний [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] на [good] Старого Світу"
  move_ow_good_to_new_location: "Поширити товар Старого Світу"
  move_ow_good_to_new_location_desc: "Ми можемо поширити один із наших традиційних товарів на наші [Concept('locations', 'CONCEPT_PLACEHOLDER')|e] в [ShowContinentName('america')], але місцевим це не сподобається, і нам доведеться перезапустити розвиток [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e] цієї локації"
  learn_from_foreigners: "Вчитися у іноземців"
  learn_from_foreigners_desc: "Є багато речей, яких ми можемо навчитися у цих дивних іноземців, деякі торговельні та добрі стосунки, безсумнівно, допоможуть нашому народу."
  absorb_institutions: "Поглинути інституції"
  absorb_institutions_desc: "Дивні звичаї цих іноземців збентежили та налякали наш народ, але, безсумнівно, є багато речей, яких ми могли б навчитися у них і застосувати до нашого суспільства."
  choose_institution: "Виберіть [Concept('institution', 'CONCEPT_PLACEHOLDER')|e]"
  no_valid_institution: "@trigger_no! Немає дійсної [Concept('institution', 'CONCEPT_PLACEHOLDER')|e]"
  lordship_of_ireland_casus_belli: "Отримати привід до війни"
  lordship_of_ireland_casus_belli_desc: "Отримайте [ShowCasusBelliName('cb_subjugation')] [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] для використання проти країн за межами [GetUniqueInternationalOrganization('lordship_of_ireland').GetName]."
  lordship_of_ireland_casus_belli_none_tt: "Виберіть [Concept('country', 'CONCEPT_PLACEHOLDER')|e] для цілі!"
  lordship_of_ireland_invite_planters: "Запросити плантаторів"
  lordship_of_ireland_invite_planters_desc: "Надішліть поселенців з батьківщини, щоб зміцнити вірне населення."
  lordship_of_ireland_invite_planters_effect_none_tt: "Близько 2400 [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] нашої [Concept('religion', 'CONCEPT_PLACEHOLDER')|e] повільно переміщатимуться з [Concept('area', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('great_britain_region')] до [Concept('province_definition', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('ireland_region')] протягом наступних 10 років."
  lordship_of_ireland_invite_planters_effect_tt: "Близько 2400 [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] повільно переміщатимуться з [origin_area.GetName] до [target_province.GetName] протягом наступних 10 років."
  lordship_of_ireland_form_kingdom: "Заявити права на Королівство"
  lordship_of_ireland_form_kingdom_desc: "Титул Короля Ірландії нарешті наш, що зміцнить нашу легітимність над землею та її народом."
  lordship_of_ireland_form_kingdom_region_tt: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [Concept('region', 'CONCEPT_PLACEHOLDER')|e] [ShowRegionName('ireland_region')] повинна бути [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [Concept('member', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('lordship_of_ireland').GetName]."
  IRE_f_lordship_tt: "Ми не можемо цього зробити, будучи [Concept('member', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('lordship_of_ireland').GetName]. Тільки [Concept('international_organization_leader_short', 'CONCEPT_PLACEHOLDER')|e] може це зробити за допомогою дії [ShowGenericActionName('lordship_of_ireland_form_kingdom')]."
  violate_treaty_of_tordesillas: "Порушити $treaty_of_tordesillas$"
  violate_treaty_of_tordesillas_desc: "$treaty_of_tordesillas$ – це не більше ніж безглуздий папірець для людей, які ризикують своїм життям, намагаючись створити краще майбутнє для себе на невдячній та небезпечній новій землі.\n\nМи ігноруватимемо ці постанови та дозволимо нашим людям взяти те, що є їхнім правом."
  stop_violate_treaty_of_tordesillas: "Припинити порушувати Договір [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]"
  stop_violate_treaty_of_tordesillas_desc: "Заради дипломатичних відносин нашої країни, ми повернемося до дотримання і припинимо ігнорувати правила, встановлені $treaty_of_tordesillas$."
  tordesillas_claim_conflicting_area_price: "Заявити претензію на спірну територію"
  tordesillas_claim_area_price: "Заявити претензію на територію"
  tordesillas_claim_area: "Заявити претензію на територію"
  tordesillas_claim_area_desc: "Розширити наші колоніальні претензії на сусідню [Concept('area', 'CONCEPT_PLACEHOLDER')|e]."
  tordesillas_free_claim_area: "Заявити претензію на вільну територію"
  tordesillas_free_claim_area_desc: "Створити колоніальну претензію на будь-якій [Concept('area', 'CONCEPT_PLACEHOLDER')|e] в межах нашого колоніального радіусу."
  tordesillas_claim_conflicting_area: "Заявити претензію на спірну територію"
  tordesillas_claim_conflicting_area_desc: "Ми використаємо наш вплив на [GetCountry('PAP').GetLongName], щоб створити колоніальну претензію на [Concept('area', 'CONCEPT_PLACEHOLDER')|e], де і ми, і наш колоніальний суперник контролюємо землі."
  tordesillas_push_to_settle_treaty: "Просувати ратифікацію Договору"
  tordesillas_push_to_settle_treaty_desc: "Використовуючи наш вплив на [GetCountry('PAP').GetLongName] для прискорення ратифікації та набуття чинності $treaty_of_tordesillas$ у його поточному вигляді."
  tordesillas_push_to_settle_treaty.tt: "Прогрес ратифікації буде збільшено на #G 10#!"
  tordesillas_upheld_treaty_relevance: "Відстоювати актуальність Договору"
  tordesillas_upheld_treaty_relevance_desc: "Захистити важливість $treaty_of_tordesillas$ та його божественно встановлену праведність."
  tordesillas_upheld_treaty_relevance.tt: "Актуальність Договору буде збільшено на #G 10#!"
  tordesillas_demand_transfer_colony: "Вимагати передачі заявленої провінції"
  tordesillas_demand_transfer_colony_desc: "[GetCountry('PAP').GetGovernment.GetRulerTitle] надав нам і лише нам право колонізувати та керувати цими землями в ім'я [GetCountry('PAP').GetReligion.GetGodName]. Ті, хто порушує цей небесний мандат, повинні передати свої землі нам без нарікань або зіткнутися з наслідками."
  tordesillas_demand_transfer_colony.tt: "Якщо вони відхилять наше милостиве прохання, ми отримаємо [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e], щоб забрати її самі."
  tordesillas_revoke_claim: "Відкликати претензію"
  tordesillas_revoke_claim_desc: "Переговори — це завжди процес взаємних успіхів і поступок; ми змушені час від часу дозволяти нашим суперникам отримувати бажане, це частина мистецтва дипломатії — повернути цю перевагу згодом.\n\nВикористовуючи наш вплив, ми переконаємо [GetCountry('PAP').GetLongName] відкликати одну з активних претензій нашого співпідписанта, повернувши переговори до точки, де ми відіграємо провідну роль."
  tordesillas_move_the_line: "Зміщення Лінії"
  tordesillas_move_the_line_desc: "Поточний поділ, визначений $treaty_of_tordesillas$, не настільки вигідний для нас, як мав би бути. Ми повинні змістити лінію, що розділяє світ, трохи далі на нашу користь і дати зрозуміти світові, що з нами не варто жартувати."
  tordesillas_move_the_line.tt: "Уявна лінія, що розділяє світ між підписантами, буде переміщена до нової [Concept('location', 'CONCEPT_PLACEHOLDER')|e]"
  tordesillas_move_the_line.tt2: "Прогрес ратифікації буде затримано на #R 5#!"
  tordesillas_swap_sides: "Змінити сторони"
  tordesillas_swap_sides_desc: "Під час перемовин нам стало зрозуміло, що частка світу нашого суперника значно краща за нашу. Ми використаємо нашу репутацію та престиж, щоб спробувати переконати їх, що в їхніх інтересах обміняти наші претензії на їхні."
  tordesillas_swap_claim: "Обміняти претензії"
  tordesillas_swap_claim_desc: "З ратифікацією $treaty_of_tordesillas$ світ було розділено між основними колоніальними державами, але це все ще не до вподоби нам, і деякі поправки могли б покращити наше становище. Ми могли б спокусити одну з цих держав обміняти одну з наших претензій на територію на їхні претензії на сусідню."
  POLICY_BIAS_REFORM_DESIRE: "Бажання реформ"
  conduct_investigation: "Провести розслідування"
  conduct_investigation_desc: "Ретельне вивчення адміністрації та двору проллє світло і викриє змій, які бажають отруїти трон!"
  any_conspirators_are_active_tt: "Принаймні 1 [Concept('character', 'CONCEPT_PLACEHOLDER')|e] є змовником"
  is_a_conspirator: "@trigger_no! Більше немає змовників у поточній спробі перевороту"
  execute_court_member: "Стратити члена двору"
  execute_court_member_desc: "Час діяти настав, і голови потенційних змовників незабаром полетять! Ми повинні стратити тих, хто прагне нашої загибелі, щоб не стати жертвами їхньої жаги до влади."
  call_private_council: "Скликати Таємну Раду"
  call_private_council_desc: "Впливові особи, що блукають залами нашого двору, завжди готові викрити своїх змовницьких однолітків, якщо це означає, що вони можуть отримати золото або привілеї."
  schism_show_support_for_one_pope: "Оголосити Oboedientia"
  schism_show_support_for_one_pope_desc: "Проголосити нашу підтримку єдиному та істинному [GetInternationalOrganization('catholic_church').GetLeaderTitle]."
