l_english:
  insult_default: "Твоя мати була хом'яком, а твій батько смердить бузиною!"
  insult_default2: "Судний день настав! Посіпаки Люцифера ходять по землі — О, ні, це всього лише [TARGET_COUNTRY.GetAdjective]."
  insult_default3: "Крім того, я вважаю, що [TARGET_COUNTRY.GetCapital.GetName] має бути знищено!"
  insult_default4: "Коли майбутні покоління писатимуть про наш час, вони дивитимуться на вас із тією сумішшю жалю та огиди, що зветься співчуттям."
  insult_default5: "Мій останній візит до вбиральні був значно приємнішим, ніж вечеря з [TARGET_COUNTRY.GetAdjective] послом."
  insult_default6: "О, дивіться. Тут є чудовий бруд."
  insult_default7: "Твоя кров зробить ґрунт, який я заберу в тебе, ще багатшим."
  insult_default8: "[TARGET_COUNTRY.GetAdjective] нічого не знають про управління державою!"
  insult_default9: "Існує проблема, яка найбільше поширена в [TARGET_COUNTRY.GetName], і я підозрюю, що причина цього — [TARGET_COUNTRY.GetCulture.GetName]."
  insult_default10: "У цій великій грі, яку ми граємо, ти лише пішак."
  insult_default11: "У [COUNTRY.GetName] слово '[TARGET_COUNTRY.GetName]' є синонімом гною."
  insult_default12: "Розповіді про твої злочини лунають від Ірландії до Китаю."
  insult_default13: "[TARGET_COUNTRY.GetAdjective] культура — це щось на кшталт оксюморона, чи не так?"
  insult_default14: "Нехай твоє небо буде сповнене комет."
  insult_default15: "Жодна мапа не може бути витвором мистецтва, доки на ній є твоя нація."
  insult_no_army: "Що ти збираєшся робити, кровоточити на мене?"
  insult_bookkeeping: "Одного дня навіть [TARGET_COUNTRY.GetAdjective] купці зрозуміють бухгалтерію."
  insult_rome: "Можливо, мої армії повинні з'ясувати, чи всі дороги справді ведуть до Риму."
  insult_heir_hunter: "Я чув, що ваш спадкоємець любить полювати. Будьте обережні, було б так прикро, якби стався непередбачений випадок."
  insult_monarchy: "Вся ваша лінія страждає від марення адекватності."
  insult_european_indian: "То це тут росте перець? Здається, ми прибули якраз вчасно для багатого врожаю..."
  insult_diamonds: "Кажуть, діаманти вічні, і у вас їх, здається, багато. Дайте нам кілька, і ми дізнаємося, чи зможуть вони пережити вашу династію."
  insult_christian_muslim: "Це небезпечне диво, як такий язичник, як ви, здобув таку багату і процвітаючу землю. На щастя, це скоро буде виправлено."
  insult_against_bahmanis: "Скоро всі ваші скарби будуть нашими, включаючи те безглузде бірюзове крісло, яке ви так цінуєте."
  insult_against_timurid: "Ви могли б бути чудовою нацією, якби не були так заклопотані вбивством одне одного через те, хто був більш споріднений з найбільшим вбивцею нашого часу."
  insult_against_deccani: "Поки ми будували цивілізацію, ви ховалися серед волоцюг Декану. Схиліть голови зараз або зустріньте свій кінець від рук спадкоємців Тимура та Чингіза."
  insult_portugal_vs_africa_or_india: "Ми подолали великий шлях і витримали багато небезпек, щоб дістатися ваших берегів. Однак ніщо не могло підготувати нас до огидних гріхів вашого язичницького двору."
  insult_against_habsburg: "[COUNTRY.GetAdjective] трон не буде заплямований вашим проклятим і спотвореним родом."
  insult_byz_to_ven: "Ви — бич цієї землі, і вас повісять на ваших стінах за те, що ви зробили!"
  insult_guybrush: "Ти б'єшся, як корова!"
  insult_against_guybrush: "Ти б'єшся, як дояр!"
  insult_low_dipadm: "Голова [TARGET_COUNTRY.GetGovernment.GetRuler.GetName] порожня, як труси євнуха."
  insult_cossack_to_turk: "О Султане, турецький дияволе і проклятий диявольський родичу, секретарю самого Люцифера."
  insult_muslim_truce: "Коли наші сини озирнуться на сьогоднішній день, буде відомо, що хоча ви, можливо, зголили нашу бороду, ми відрубаємо вашу руку."
  insult_against_denmark: "Щось прогнило в Данському королівстві."
  insult_against_england: "Якби [TARGET_COUNTRY.GetGovernment.GetRuler.GetName] впав у Темзу, це було б нещастям. Але якби хтось витягнув [TARGET_COUNTRY.GetGovernment.GetRuler.GetHerHim] знову, це було б лихом."
  insult_marprelate: "[TARGET_COUNTRY.GetGovernment.GetRuler.GetName] — гордий, папістський, самовпевнений, блюзнірський, згубний, зловмисний прелат і узурпатор."
  insult_marprelate2: "Ваш [TARGET_COUNTRY.GetGovernment.GetRulerTitle] є незаконним, неприродним, фальшивим, байстрюковим правителем Церкви, Постановою Диявола, дрібним Папою, антихристом, втіленим дияволом, шахраєм і плідним брехуном."
  insult_against_saxony: "Було б прикро, якби щось сталося з вашою мейсенською порцеляною..."
  insult_fort: "Ваші стіни розсипляться перед нашими гарматами, як пісок перед морем."
  insult_revolutionary: "Ваш труп прокладе шлях прогресу, [TARGET_COUNTRY.GetGovernment.GetRuler.GetName]!"
  insult_monarchy_rank: "Це жалюгідне щось на вашій голові — те, що вважається короною в [TARGET_COUNTRY.GetName]?"
  insult_low_adm: "Я мав для вас іншу образу, але сумніваюся, що ви змогли б її прочитати."
  insult_against_gbr: "Настав час заходу сонця для Британської імперії."
  insult_from_arabs: "Нехай вас зашиють живцем у черево мертвого верблюда."
  insult_against_craven: "Раджу вам змінити свої формені штани на коричневі."
  insult_against_sinner: "Чи знає [TARGET_COUNTRY.GetConsort.GetName], скільки служниць ви тримаєте у своїх покоях?"
  insult_against_hre: "Ви не є ні святим, ні римським, ні імперією."
  insult_against_serbia: "Ваш орел має дві голови, але навіть не одну корону."
  insult_against_european_in_india: "Настав час вам піти."
  insult_japanese: "Навіть сеппуку не зможе відновити вашу честь."
  insult_loans: "Жахливий стан вашої економіки є попередженням для всіх потенційних правителів."
  insult_rebels: "Я чую, ваші люди бунтують. Це у вас спільне."
  insult_low_mil_tech: "Ваші солдати вже можуть влучити в сарай, чи вони досі думають, що мушкети — це кийки?"
  insult_golden_horde_vs_muscovy: "Ви, вискочки-збирачі податків, повинні знати своє місце: бути розтоптаними під нашими кіньми!"
  insult_wallachia_to_ottomans: "Ми посадимо [TARGET_COUNTRY.GetGovernment.GetRuler.GetName] на палю, як ми зробили з вашими жалюгідними арміями."
  insult_barbary_pirates: "Ви надто довго переслідували води Середземномор'я, проклятий пірате!"
  insult_turkish_drunkard: "Ви справді Султан Руму, п'яна свиня!"
  insult_against_england2: "Ваше королівство справді варте лише коня."
  insult_against_scotland: "Ми заберемо ваші життя і вашу свободу!"
  insult_for_buddhists: "Нехай ви піддастеся Сансарі і проживете тисячу життів без радості чи просвітлення."
  insult_for_persians: "Наші стріли затьмарять сонце!"
  chinese_insult_1: "Я чую, що [TARGET_COUNTRY.GetGovernment.GetRuler.GetName] є побожним послідовником [TARGET_COUNTRY.GetReligion.GetName], що вирішить [TARGET_COUNTRY.GetGovernment.GetRuler.GetHerHis] долю в наступному житті. Але саме Імператор вирішить вашу долю в цьому житті."
  chinese_insult_2: "Проявіть свою покору Імператору і насолоджуйтесь щасливим життям, інакше ви зустрінете Небесну Армію!"
  chinese_insult_3: "Ваші провини досі — лише дрібна болячка. Виправте їх, перш ніж вони інфікуються до стану, коли вже нічого не допоможе."
  insult_explorer_vs_africa_or_india: "У вас є прапор?"
  insult_republic_to_monarchy: "Слухайте, дивні жінки, що лежать у ставках і роздають мечі, не є основою для системи правління. Верховна виконавча влада походить від мандату мас, а не від якоїсь фарсової водної церемонії."
  insult_from_pirates_1: "Що ти мені щойно сказав, негіднику? Я переплив сім морів і маю понад сотню підтверджених абордажів."
  insult_from_pirates_2: "Я засиплю вас картеччю, і ви нею вдавитеся. Ви потонули, негіднику."
  insult_from_pirates_3: "Якщо ви продовжите пити ром, світ незабаром позбудеться дуже брудного негідника!"
  insult_from_pirates_4: "Колись у мене був собака, розумніший за вас."
  insult_from_pirates_5: "Я даю вам вибір. Вас можуть випотрошити або обезголовити!"
  insult_to_pirates_1: "Ви, без сумніву, найгірший пірат, про якого я коли-небудь чув."
  insult_jungle: "Це правда, я визнаю, що [TARGET_COUNTRY.GetName] має більшу територію, ніж [COUNTRY.GetName]. Але ви повинні погодитися, що [COUNTRY.GetGovernment.GetRuler.GetName] править людьми, тоді як [TARGET_COUNTRY.GetName] править лише лісами та комарами."
  insult_german_humor: "Кажуть, що німецький гумор — це не смішна справа."