l_english:
  autocracy: "Автократія"
  autocracy_desc: "Автократичні монархії зосереджують владу в руках правителя. Держава часто розглядається як його особиста власність. Нерідко правителі мають міністрів і прихильників, але їх тоді називають членами королівського двору."
  feudal_nobility: "Феодальне дворянство"
  feudal_nobility_desc: "У феодальному королівстві влада монарха посилюється землеволодіючою аристократією, яка присягнула йому на вірність. Аристократи, або [ShowEstateTypeName('nobles_estate')] , часто є самостійними землевласниками, що мають значний вплив і власних васалів."
  margraviate: "Маркграфство"
  margraviate_desc: "[ShowGovernmentReformName('margraviate')] — це історична територіальна юрисдикція, названа на честь #italic Маркграфа#!, або «графа на кордоні», який служить для захисту та управління прикордонними регіонами держави, здебільшого зосереджуючись на відбитті зовнішніх загроз. Маркграфства поєднують військову оборону з управлінням; обов'язки маркграфа включають охорону кордону та управління місцевими справами, долаючи розрив між центральною владою та цими прикордонними територіями."
  landgraviate: "Ландграфство"
  landgraviate_desc: "[ShowGovernmentReformName('landgraviate')], назване на честь #italic Ландграфа#!, діє як безпосередня юрисдикція [GetInternationalOrganization('hre').GetName] в інших роздроблених графствах. Ландграф є прямим представником закону [GetInternationalOrganization('hre').GetLeaderTitle] на землях [ShowGovernmentReformNameWithNoTooltip('landgraviate')], і цей титул порівнянний з герцогом за владою та обов'язками."
  french_feudal_nobility: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] Феодальне дворянство"
  french_feudal_nobility_desc: "Феодалізм міцно тримає [GetCountry('FRA').GetAdjective] придворні справи. Могутні дворяни та автономні, децентралізовані піддані мають безпрецедентну свободу та право голосу в нашій внутрішній адміністрації."
  fra_removed_when_no_appanages_tt: "Ця [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] буде скасована, щойно жоден [ShowSubjectTypeName('appanage')] не існуватиме як наш [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]"
  french_appanage_reform: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] Апанаж"
  french_appanage_reform_desc: "Як Принци Крові, власники апанажів користуються вищим становищем серед підданих [GetCountry('FRA').GetName], а також більшими привілеями. Крім того, від [GetCountry('FRA').GetAdjective монарха очікується, що він виявлятиме їм належну повагу в обмін на їхню допомогу в дипломатичних справах."
  french_ducal_vassal_reform: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] Герцогський"
  french_ducal_vassal_reform_desc: "Хоча герцогські піддані [GetCountry('FRA').GetName] не мають автономії апанажних володінь, вони натомість користуються більш співпрацюючими відносинами з Короною."
  member_of_league_of_public_weal: "Член Ліги суспільного блага"
  member_of_league_of_public_weal_desc: "Ставши частиною Ліги суспільного блага, ми зобов'язуємося приєднатися до будь-яких майбутніх війн, що ведуться проти правителя [GetCountry('FRA').GetName]. Але, якщо такий конфлікт зазнає невдачі, [GetCountry('FRA').GetAdjective] корона наважиться конфіскувати землі у нелояльних підданих..."
  french_centralized_monarchy: "[GetCountry('FRA').GetAdjectiveWithNoTooltip] Монархія"
  french_centralized_monarchy_desc: "Після століть значної децентралізації, [GetCountry('FRA').GetName] консолідувала багато своїх роздроблених апанажних та герцогських земель, прокладаючи шлях до більш сучасної держави."
  of_noble_bearing: "Шляхетної постави"
  of_noble_bearing_desc: "Гордий родовід наших дворян, що стоять на двох ногах набагато вище, ніж правителі будь-якої іншої нації на Землі, має бути очевидним для всіх!"
  national_assemblies: "Національні збори"
  national_assemblies_desc: "Збори, що складаються з представників усієї нації. Залежно від типу уряду, вони можуть мати всі повноваження уряду або лише законодавчі."
  prussian_monarchy: "[GetCountry('PRU').GetAdjectiveWithNoTooltip] Монархія"
  prussian_monarchy_desc: "Форма правління під монархом, яка приділяє велику увагу адміністративній ефективності — особливо у військових справах, якщо цього вимагає ситуація."
  the_court_of_wards_and_liveries: "Палата опіки та лівреїв"
  the_court_of_wards_and_liveries_desc: "З палатою опіки та лівреїв, адміністрування збору податків та феодальних зборів є набагато ефективнішим завдяки підвищеній експертизі серед збирачів та систематизованій системі доходів. Однак, шляхта схильна вважати такі палати глибоко експлуататорськими щодо їхніх власних статків."
  royal_decree: "Королівський Указ"
  royal_decree_desc: "Монарх править верховно в цій країні, і вірність цінується понад усе. Ми повинні забезпечити, щоб укази королівського двору виконувалися достеменно і в усіх частинах нашої країни."
  privy_council: "Таємна Рада"
  privy_council_desc: "Бути поінформованим про події у своєму домені є життєво важливим для будь-якого правителя. Заснувавши таємну раду, ми зможемо набагато пильніше стежити за нашим народом."
  warsaw_confederation: "Варшавська Конфедерація"
  warsaw_confederation_desc: "Кожен шляхтич, незалежно від його релігійної приналежності, матиме право голосувати та жити своїм життям, як він забажає. Більше того, вони матимуть право навертати своїх підданих до своєї віри, як вони вважатимуть за потрібне. Ця резолюція перетворить нас на безпечний притулок і сприятиме релігійній толерантності."
  mlo_council_of_justice: "Рада Юстиції"
  mlo_council_of_justice_desc: "Спочатку інструмент для вирішення місцевих суперечок між селянами, Рада Юстиції перетворилася на найвидатніший суд країни, що розглядає справи та діє як щит для нашого народу."
  mlo_secret_council: "Таємна Рада"
  mlo_secret_council_desc: "Таємна Рада – це орган, що складається зі шляхетно народжених осіб. Її юрисдикція охоплює весь наш домен і часто суперечить порядку денному правителя. Більшість критичних рішень, прийнятих правителем або від його імені, часто підпадають під перегляд Таємної Ради."
  scottish_shires_reform: "Шири [GetCountry('SCO').GetNameWithNoTooltip]"
  scottish_shires_reform_desc: "Запроваджена [GetCharacter('sco_malcolm_iii').GetName], система ширів ділить [GetCountry('SCO').GetName] на адміністративні графства, причому кожен шир має власну структуру."
  merchant_republic: "Купецька Республіка"
  merchant_republic_desc: "Республіка, заснована на принципах торгівлі. Потік комерції є найважливішим фактором для родин, які правлять цими республіками."
  noble_elite: "Шляхетна Еліта"
  noble_elite_desc: "У цій республіці право на правління є спадковим у певних шляхетних династіях. Ці родини обирають правителя зі своєї династії, і цей глава уряду, у свою чергу, залежатиме від їхньої підтримки."
  dynastic_signoria_reform: "Династична Синьйорія"
  dynastic_signoria_reform_desc: "Окремі міста-держави, керовані могутніми родинами, $dynastic_signoria_reform$ передбачає концентрацію влади в невеликій групі впливових осіб, відомих як #italic синьйори#!. Ці особи, деякі з яких походили з купецьких або банківських кіл, а не з традиційної шляхти, володіють як виконавчою, так і законодавчою владою, ефективно монополізуючи контроль над своїми відповідними містами. Вони прагнуть зберегти свою владу за будь-яку ціну, що часто призводить до кривавих чвар і конфліктів між і всередині домів, коли вони борються за верховенство."
  signoria_reform: "Синьйорія"
  signoria_reform_desc: "Особлива [ShowCultureGroupName('italian_group')] форма міського республіканського правління. Члени обираються на певний період часу, зазвичай з числа найвпливовіших громадян цього міста. Однак у багатьох випадках це також іноземні правителі, яких запрошують керувати $signoria_reform$."
  sortition: "Жеребкування"
  sortition_desc: "На жаль, голоси можна купити, а стара вірність може затьмарити судження деяких виборців. Давайте впровадимо напіввипадкову систему, де імена можуть бути обрані з пулу хороших кандидатів на важливі посади."
  peasant_republic_reform: "Селянська Республіка"
  peasant_republic_reform_desc: "Форма правління, за якої [ShowEstateTypeName('crown_estate')], [ShowEstateTypeName('nobles_estate')] та [ShowEstateTypeName('clergy_estate')] дуже слабкі або неіснуючі, надаючи високий ступінь автономії [ShowEstateTypeName('peasants_estate')]."
  pirate_brethren_reform: "Піратське братство"
  pirate_brethren_reform_desc: "Наскільки цю вільну сукупність піратських екіпажів можна назвати державою, реформа $pirate_brethren_reform$ є притулком для всіляких злодіїв, убивць і контрабандистів."
  formalized_measures: "Формалізовані ваги, міри та виміри"
  formalized_measures_desc: "Наша нація формалізувала свою систему ваг, мір та вимірів. Хоча вона не є універсальною, нова система забезпечує використання нашими людьми однакових базових одиниць вимірювання по всій країні. Тепер чотири бовати дорівнюють одному гайду. Або, можливо, вісім. А потім п'ять гайдів дорівнюють платі... е-е, чи ні?"
  banking_country: "Банківська родина"
  banking_country_desc: "Ми не країна; ми більше схожі на родину! Або, точніше, розширена родина, вся орієнтована на надання банківських послуг тим, хто їх потребує."
  hanseatic_merchant_federation: "Ганзейська купецька федерація"
  hanseatic_merchant_federation_desc: "Це децентралізована федерація купців, об'єднаних в один альянс. Її члени займають спеціальні будівлі по всій [ShowContinentName('europe')] і відомі своєю купецькою майстерністю."
  diplomatic_traditions: "Дипломатичні традиції"
  diplomatic_traditions_desc: "З давніх-давен наш народ віддавав перевагу слову над мечем, даючи нам змогу налагоджувати міцні стосунки з нашими союзниками та будувати репутацію чесних і вірних."
  colonial_subject: "Колоніальний суб'єкт"
  colonial_subject_desc: "Ми стоїмо на передовій цивілізації, і це створило можливості для наших найхоробріших та найвідважніших громадян перетнути світ і оселитися тут, прагнучи вибудувати нове та процвітаюче життя для себе."
  legacy_of_genghis: "Спадщина $genghis_khan_name_no_tooltip$"
  legacy_of_genghis_desc: "Ми є нащадками великого завойовника світу, $genghis_khan_name_no_tooltip$. Його кров тече в наших жилах, роблячи нас гордим і могутнім народом, і обіцяючи нам, що скрізь, куди можуть завести нас наші коні, буде нашим для завоювання!"
  military_order_reform: "Військовий орден"
  military_order_reform_desc: "Військові ордени були створені в Середньовіччі як войовниче тіло [ShowReligionAdjective('catholic')] Церкви. Вони складаються з воїнів, названих #italic miles#!, а також ченців, названих #italic fratres#!, які прийняли урочисті релігійні обітниці захищати та поширювати [ShowReligionGroupAdjective('christian')] віру."
  abbey_reform: "Абатство"
  abbey_reform_desc: "Абатства були центрами чернечого життя з найдавніших [ShowReligionGroupAdjective('christian')] часів. Протягом століть вони стали основними осередками релігійного життя, знань та освіти, а також центрами економічного та соціального розвитку."
  prince_bishopric_reform: "Князь-єпископство"
  prince_bishopric_reform_desc: "Князь-єпископ — це висвячений член віри, який також є цивільним правителем території. Релігійна територія, якою править князь-єпископ, не обов'язково повинна збігатися зі світською територією, якою він володіє."
  guru_leadership_reform: "Керівництво $guru$"
  guru_leadership_reform_desc: "Країну очолює мудрий $guru$, піклуючись про духовні потреби населення, а також про більш буденні справи і ведучи вірних до просвітлення."
  primas_germaniae: "Primas Germaniae"
  primas_germaniae_plural: "Primas Germaniae"
  primas_germaniae_desc: "Ми маємо престижний титул Primas Germaniae, що відрізняє нас як найважливішого архієпископа в [GetUniqueInternationalOrganization('hre').GetName]."
  the_combination_act: "Обмежені робітничі спілки"
  the_combination_act_desc: "Вжито всіх заходів для запобігання майбутнім страйкам. Усі незаконні формування торгових або робітничих спілок відтепер заборонені!"
  the_recruiting_act: "Обов'язкова військово-морська служба"
  the_recruiting_act_desc: "Примусове залучення будь-якої працездатної особи без засобів до існування до військово-морської служби, безсумнівно, викличе суперечки..."
  conquistador_country: "Експедиція конкістадорів"
  conquistador_country_desc: "Ми не країна; ми більше схожі на невелику армію конкістадорів, що прибули сюди, щоб розширити нашу славетну батьківщину! І, звісно, набити кишені."
  admiralty_regime_reform: "Адміралтейський режим"
  admiralty_regime_reform_desc: "Урядова реформа, за якої правитель також є верховним командувачем флоту. Де інші держави мають флот, цей флот володіє державою."
  military_regime_reform: "Військовий режим"
  military_regime_reform_desc: "Форма правління, де правитель обирається зі штабу генералів армії. Уряд служить армії!"
  thalassocracy_reform: "Таласократія"
  thalassocracy_reform_desc: "Таласократія: правління морем. Наш народ живе з океаном, ним і для нього. Наша імперія простягається далеко за межі батьківщини, до віддалених колоній у нашому розширеному Замор'ї, наших Землях За Морем. Від узбережжя до узбережжя, наші прапори майорять з кораблів на солоній піні. Море холодне, але ми зробили його своїм домом. Нехай ніхто не кидає нам виклик у нашій стихії!"
  agricultural_cultivation: "Сільськогосподарське вирощування"
  agricultural_cultivation_desc: "Виробництво врожаю було максимізовано шляхом переходу від дрібномасштабного землеробства до створення великих плантацій."
  the_espionage_act: "Чорні кабінети"
  the_espionage_act_desc: "Використовуючи хитрість і підступність для перехоплення всіх видів письмових повідомлень, ми можемо випереджати наших ворогів і робити нашу розвідку ефективнішою."
  public_welfare_act: "Суспільний добробут"
  public_welfare_act_desc: "Бідні найбільше страждають у часи лиха. Невеликі пожертви допоможуть полегшити їхні страждання — і, сподіваємося, забезпечать, що натовп не візьме свої смолоскипи та вила..."
  religious_laws_enforced: "Застосування релігійних законів"
  religious_laws_enforced_desc: "Давайте набагато уважніше вивчати наші святі писання, щоб визначити відповідні злочини та покарання для нашого суспільства. Зрештою, коли суспільство керується справді побожним чином, це значно полегшує побожним громадянам виявлення зрадників і відступників серед них."
  land_inheritance_act: "Селянська спадщина землі"
  land_inheritance_act_desc: "Надавши навіть найнижчим [ShowEstateTypeName('peasants_estate')] право успадковувати та продовжувати використовувати землі своїх предків, ми підвищимо продуктивність як держава."
  the_education_act: "Обов'язкова освіта для бюрократів"
  the_education_act_desc: "Відтепер освіта є обов'язковою для тих, хто має керувати або іншим чином працювати в нашій правовій системі."
  manuelan_architecture: "Мануелінська архітектура"
  manuelan_architecture_desc: "Цей інноваційний стиль поєднує аспекти пізньоготичної архітектури з впливами $SPA_ADJ$, $ITA_ADJ$ та $FLA_ADJ$ традицій. Будівництво в мануелінському стилі значною мірою фінансувалося за рахунок прибутків від прибуткової торгівлі прянощами з [ShowContinentName('africa')] та $india$."
  royal_commission_act: "Королівські комісії"
  royal_commission_act_desc: "Розслідування підозрілої поведінки в адміністрації час від часу може бути гарною ідеєю. Створення більшої кількості королівських комісій, безперечно, допоможе зменшити корупцію."
  the_loyalty_act: "Контррозвідувальні офіси"
  the_loyalty_act_desc: "Вірні громадяни, які повідомляють про небезпечні елементи на нашій території, будуть щедро винагороджені державою. Ми створимо численні офіси, щоб ефективніше повідомляти про таку діяльність нашому уряду."
  vassal_obligation_act: "Фіксовані васальні зобов'язання"
  vassal_obligation_act_desc: "Законодавчо закріпити точні військові та економічні зобов'язання, які наші клієнтські держави мають перед нами."
  enlightened_aristocracy: "Просвічена аристократія"
  enlightened_aristocracy_desc: "Заохочувати освіту та високі літературні стандарти серед аристократії, щоб забезпечити тісне дотримання лідерами нашої нації наших гуманістичних ідеалів."
  the_transportation_act: "Транспортний кодекс"
  the_transportation_act_desc: "Встановити фіксовану систему транспортних зборів за товари, щоб заохотити експорт цінних предметів."
  cultural_recognition_act: "Культурне визнання"
  cultural_recognition_act_desc: "Визнаючи відмінний характер та цінний внесок наших меншинних культур, ми можемо краще залучати їх до державних справ."
  licensing_of_the_press_act: "Ліцензування преси"
  licensing_of_the_press_act_desc: "Ми прийняли суворі правила та положення щодо того, що може бути надруковано. Сподіваємося, це змусить замовкнути будь-кого, хто прагне робити зрадницькі або образливі заяви про наше суспільство."
  patrimonialism: "Патримоніалізм"
  patrimonialism_desc: "Уряд керується безпосередньо правителем як продовженням його/її домогосподарства. Армії, бюрократи та піддані присягають на вірність безпосередньо чинному правителю, а не державі."
  enforce_religious_adherence: "Забезпечення релігійної прихильності"
  enforce_religious_adherence_desc: "Релігійна ортодоксія повинна суворо підтримуватися для забезпечення суспільної єдності. Інакомислячі будуть виявлені, контрольовані та придушені для запобігання заворушенням."
  harbor_administration: "Портова адміністрація"
  harbor_administration_desc: "Портові споруди повинні ефективно управлятися для підтримки морської торгівлі та військово-морських операцій. Корупція буде зменшена, а торгівля процвітатиме під структурованим наглядом."
  trade_office_network: "Мережа торгових представництв"
  trade_office_network_desc: "Необхідно створити мережу торгових представництв для сприяння торгівлі та оподаткуванню. Централізоване управління покращить взаємодію з купцями та державні доходи."
  local_army_organization: "Організація місцевої армії"
  local_army_organization_desc: "Військовий набір та навчання мають бути локалізовані для кращої відповіді на регіональні загрози. Постачання та логістика будуть покращені для зміцнення провінційних сил."
  bank_ledgers_system: "Система банківських книг"
  bank_ledgers_system_desc: "Фінансові операції та державні витрати мають бути ретельно зафіксовані. Надійна система облікових книг забезпечить підзвітність та зменшить шахрайство в скарбниці."
  plutocratic_ethos: "Плутократичний етос"
  plutocratic_ethos_desc: "Вплив заможних еліт в управлінні має бути заохочений. [ShowEstateTypeName('burghers_estate')] та фінансисти формуватимуть політику для сприяння економічному розширенню та приватному підприємництву."
  garrison_system: "Система гарнізонів"
  garrison_system_desc: "Постійні військові гарнізони мають бути розміщені в ключових місцях для стримування загроз. Добре забезпечені та дисципліновані війська забезпечать регіональну безпеку та швидку мобілізацію."
  statute_of_monopolies: "Статут про монополії"
  statute_of_monopolies_desc: "Вибраним [ShowEstateTypeName('burghers_estate')] мають бути надані ексклюзивні торгові привілеї для регулювання ринкової конкуренції. Це стимулюватиме контрольоване економічне зростання та обмежить іноземне втручання."
  colonial_expansion: "Колоніальна експансія"
  colonial_expansion_desc: "Заморські території мають бути придбані та заселені за підтримки уряду. Стратегічні інвестиції в колонізацію забезпечать довгострокове економічне та політичне домінування."
  mercenary_registration_act: "Реєстрація найманців"
  mercenary_registration_act_desc: "Приватні військові сили мають бути зареєстровані та регульовані для забезпечення дисципліни. Найманські компанії будуть притягнуті до відповідальності, запобігаючи нестабільності та зраді."
  state_backed_merchant_fleet: "Державний торговий флот"
  state_backed_merchant_fleet_desc: "Морські торгові операції мають бути підтримані державним фінансуванням. Добре утримуваний торговий флот збільшить торгівлю та надасть допоміжну підтримку військовим зусиллям."
  multilingual_diplomats: "Багатомовні дипломати"
  multilingual_diplomats_desc: "Зовнішні переговори мають проводитися лінгвістично вправними дипломатами. Багатомовні представники зміцнять дипломатичні зв'язки та покращать торгові угоди."
  asymmetrical_warfare_tactics: "Тактика асиметричної війни"
  asymmetrical_warfare_tactics_desc: "Нетрадиційні бойові стратегії мають застосовуватися проти переважаючих сил. Партизанська тактика, саботаж та обман будуть використані для ослаблення ворожих наступів."
  naval_infrastructure_act: "Управління верфями"
  naval_infrastructure_act_desc: "Верфі, доки та берегова оборона мають бути розширені. Більші інвестиції в морську інфраструктуру забезпечать морську перевагу та сприятимуть великомасштабним операціям."
  policy_of_calculated_delay: "Політика розрахованої затримки"
  policy_of_calculated_delay_desc: "Стратегічні затримки під час переговорів є чудовим способом вплинути на дипломатичні ваги. Встановлюючи себе як найсильнішу сторону в обміні, завдяки цій тактиці, ми неминуче отримаємо більше вигоди від кожної зовнішньої угоди."
  anti_heresy_act: "Покарання за єресь"
  anti_heresy_act_desc: "Єресь та релігійне інакомислення мають бути викорінені шляхом систематичного придушення. Доктринальна чистота буде підтримуватися для запобігання внутрішньому розколу та заворушенням."
  administration_of_clerical_lands: "Управління церковними землями"
  administration_of_clerical_lands_desc: "Церковне майно та доходи мають бути передані під державний нагляд. Релігійні установи контролюватимуться для узгодження їхніх інтересів з національною політикою."
  humanitarian_administration: "Гуманітарна адміністрація"
  humanitarian_administration_desc: "Ініціативи соціального добробуту мають бути впроваджені для покращення суспільного добробуту. Вирішення проблем бідності та нестабільності зміцнить державний контроль та запобігне повстанням."
  universal_serfdom: "Загальне кріпацтво"
  universal_serfdom_desc: "[ShowEstateTypeName('peasants_estate')] мають бути прив'язані до землі для забезпечення постійної наявності сільськогосподарської робочої сили. [ShowEstateTypeName('nobles_estate')] отримають повноваження наглядати за своїми маєтками з більшою ефективністю."
  weapons_quality_standards: "Стандарти якості зброї"
  weapons_quality_standards_desc: "Суворі стандарти мають бути запроваджені для військового озброєння. Ретельні перевірки та регулювання забезпечать вищу довговічність та ефективність зброї."
  diplomatic_consolidation_act: "Консолідація дипломатичних справ"
  diplomatic_consolidation_act_desc: "Дипломатичні політики мають бути централізовані для ефективніших міжнародних переговорів. Довгострокові союзи та угоди підтримуватимуться для стабільності."
  provincial_taxation_system: "Провінційна система оподаткування"
  provincial_taxation_system_desc: "Збір податків має бути стандартизований по всіх провінціях для забезпечення стабільних надходжень. Корумповані чиновники будуть усунені, а фінансовий нагляд буде посилено."
  conscript_logistics_act: "Міністерство логістики призову"
  conscript_logistics_act_desc: "Військові ланцюги постачання мають бути реорганізовані для покращення мобільності військ. Ефективніша логістика забезпечить швидше розгортання та тривалі кампанії."
  smooth_integration_act: "Визнання місцевих політик"
  smooth_integration_act_desc: "Новозавойовані території мають бути поступово асимільовані, щоб уникнути опору. Культурні та адміністративні політики забезпечать безперешкодне поглинання державою."
  centralization_of_power_act: "Централізація влади"
  centralization_of_power_act_desc: "Влада має бути консолідована для обмеження регіональної автономії. Сильний центральний уряд підвищить ефективність прийняття рішень та національну стабільність."
  horse_artillery: "Корпус кінної артилерії"
  horse_artillery_desc: "Мобільні артилерійські підрозділи мають бути розгорнуті для підвищення гнучкості на полі бою. Швидкий рух та потужна вогнева міць будуть поєднані для тактичної переваги."
  autonomous_estates: "Автономні маєтки"
  autonomous_estates_desc: "Місцевим [ShowEstateTypeName('nobles_estate')] має бути надано певну ступінь автономії. Децентралізоване управління запобігатиме повстанням, зберігаючи при цьому феодальні зобов'язання перед центральною владою."
  military_allotment: "Військове наділення"
  military_allotment_desc: "Земельні наділи мають бути виділені військовим офіцерам для забезпечення їхньої лояльності. Натомість вони підтримуватимуть постійні війська, готові до негайного розгортання."
  naval_armament_act: "Пріоритетність військового кораблебудування"
  naval_armament_act_desc: "Зусилля з кораблебудування мають бути розширені для зміцнення військово-морських сил. Більші інвестиції у військові кораблі забезпечать морське панування та захист торговельних шляхів."
  recordkeeping_act: "Розширені архіви"
  recordkeeping_act_desc: "Державні записи мають ретельно підтримуватися для адміністративної ефективності. Точна документація запобігатиме корупції та оптимізує бюрократію."
  visionary_thinkers: "Провидці"
  visionary_thinkers_desc: "Інтелектуали та реформатори мають бути підтримані для просування державної політики. Інноваційні ідеї сприятимуть економічному зростанню, військовим досягненням та урядовим покращенням."
  organized_marines: "Організована морська піхота"
  organized_marines_desc: "Морські сили мають бути формально структуровані для амфібійних бойових дій. Спеціалізована підготовка та дисципліновані формування покращать прибережні та морські бої."
  mandatory_service: "Обов'язкова служба"
  mandatory_service_desc: "Військовий призов має бути запроваджений для підтримки сильної постійної армії. Усі правоздатні громадяни будуть зобов'язані служити на захист держави."
  flexible_diplomatic_stance: "Гнучка дипломатична позиція"
  flexible_diplomatic_stance_desc: "Зовнішня політика має залишатися адаптивною до мінливих альянсів. Стратегічні рішення прийматимуться на основі геополітичного ландшафту, що розвивається."
  modern_assault_tactics: "Сучасна штурмова тактика"
  modern_assault_tactics_desc: "Доктрини наступальної війни мають бути вдосконалені для більшої ефективності на полі бою. Нова тактика наголошуватиме на швидкості, координації та переважній силі."
  nautical_education_act: "Морська освіта"
  nautical_education_act_desc: "Програми військово-морської підготовки мають бути розширені для покращення лідерства на морі. Більш кваліфікований офіцерський корпус покращить командування флотом."
  mining_communities: "Гірничі громади"
  mining_communities_desc: "Багаті на ресурси регіони мають бути розвинені в організовані гірничі громади. Державний нагляд забезпечить ефективний видобуток та стабільні умови праці."
  production_quota_bureaus: "Бюро виробничих квот"
  production_quota_bureaus_desc: "Виробництво має регулюватися через державні квоти. Централізований нагляд запобігатиме дефіциту та підтримуватиме економічну стабільність."
  state_sponsored_markets: "Державні ринки"
  state_sponsored_markets_desc: "Торговельні центри мають бути створені за державної підтримки для заохочення торгівлі. Державна підтримка забезпечить справедливі ціни та економічне зростання."
  coastal_city_or_town_gets_tt: "Кожне володіння [Concept('coastal', 'CONCEPT_PLACEHOLDER')|e] [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e] отримає:"
  every_coastal_location_gains_tt: "Кожне володіння [Concept('coastal', 'CONCEPT_PLACEHOLDER')|e] [Concept('location', 'CONCEPT_PLACEHOLDER')|e] отримає:"
  papacy_reform: "Святий Престол"
  papacy_reform_desc: "Святий Престол — це юрисдикція єпископа [ShowLocationName('rome')], #italic Pontifex Maximus#!, глави [ShowReligionAdjective('catholic')] Церкви, відомого як [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  kingdom_of_god_reform: "Царство Боже"
  kingdom_of_god_reform_desc: "Ми встановили Царство Боже на Землі. Влада Церкви, очолюваної [GetCountry('PAP').GetGovernment.GetRulerTitle], буде абсолютною як у духовній, так і в світській сферах."
  celtic_traditions_reform: "Кельтські Традиції"
  celtic_traditions_reform_desc: "Стародавні звичаї острівного суспільства були включені до нашої нинішньої системи правління. Наш лідер править народом, а не землею, а навчені поети займають місце [ShowEstateTypeName('clergy_estate')] у деяких офіційних церемоніях."
  family_sagas_reform: "Родинні Саги"
  family_sagas_reform_desc: "Наші стародавні саги, що передавалися усно з покоління в покоління, розповідають про пригодницькі експедиції до далекої та дикої землі за західним морем. Можливо, одного дня ми підемо стопами наших предків..."
  galley_lords_reform: "Галерні Лорди"
  galley_lords_reform_desc: "Хоч ми й прив'язані до землі, море — наша володіння."
  wayfinders_reform: "Шляхознавці"
  wayfinders_reform_desc: "Тисячі років подорожей навчили наших навігаторів долати моря. Позбавлені передових технологій, шляхознавці запам'ятовують візерунки зірок і спостерігають за найдрібнішими змінами в хмарах і воді, щоб визначити своє положення у величезному Тихому океані."
  magna_carta_reform: "Велика Хартія Вольностей"
  magna_carta_reform_desc: "«Велика Хартія» — це правовий документ, який має на меті захистити феодальні права наших баронів від несправедливого оподаткування та юридичних маневрів з боку [ShowEstateTypeName('crown_estate')]. Це також один із найдавніших документів, що закріплює ідею громадянських свобод, таких як право на справедливий суд та захист від незаконного ув'язнення."
  sbl_restorer_of_the_disinherited: "Відновлювач Позбавлених Спадщини"
  sbl_restorer_of_the_disinherited_desc: "Лорди, позбавлені спадщини зрадницьким [GetCharacter('sco_robert_de_brus_1st_lord_of_annandale').GetName], тепер стікаються під наш прапор за нашою обіцянкою відновити їхні законні володіння!"
  irish_earldom_reform: "$IRE_ADJ$ Ерлство"
  irish_earldom_reform_desc: "Наша влада ґрунтується на титулах, наданих нам Лордом $IRE$."
  iron_ring_reform: "Залізне Кільце"
  iron_ring_reform_desc: "Вся наша адміністрація організована навколо підтримки величезної кількості замків, що контролюють наші пагорби та долини, роблячи нас однією з найбільш укріплених країн у світі."
  religious_tolerance: "Релігійна Толерантність"
  religious_tolerance_desc: "Наша країна населена людьми, які сповідують різні вірування. Тому було б розсудливо керувати ними толерантно, забезпечуючи підтримку нашого уряду незалежно від їхньої релігії."
  serene_republic_of_naples: "Світла Республіка [GetCountry('NAP').GetName]"
  serene_republic_of_naples_desc: "Форма правління, натхненна [GetCountry('VEN').GetAdjective] урядом, яка поєднує аспекти монархії та республіки."
  turkish_pashas: "Паші"
  turkish_pashas_desc: "У [GetCountry('TUR').GetLongName] титул паші надається султаном високопоставленим цивільним чиновникам або військовим лідерам. Зазвичай він присуджується губернаторам і стоїть вище беїв та агів, але нижче хедивів та візирів."
  compagna_communis: "Compagna Communis"
  compagna_communis_desc: "Це зібрання всіх торгових асоціацій [GetCountry('GEN').GetName], та шляхетних панів навколишніх долин і узбережжя, які об'єднуються, щоб сформувати уряд міста."
  alberghi_28: "Двадцять вісім альбергі"
  alberghi_28_desc: "Після політичних змін минулого століття, впливовий дім [ShowDynastyName('doria_dynasty')] просуває реформу конституції, усуваючи фракції, що мучили нашу республіку в минулому. Ці фракції замінюються новим олігархічним урядом, який включає двадцять вісім найважливіших родин, званих #Двадцять вісім альбергі#!."
  legatus_natus: "Легат Натус"
  legatus_natus_plural: "Легат Натус"
  legatus_natus_desc: "Ми є представником Папи на північ від Альп!"
  por_casa_de_india: "Каса да Індія"
  por_casa_de_india_desc: "Каса да Індія наглядає за всіма [GetCountry('POR').GetAdjective] володіннями в [ShowContinentName('africa')] та $india$, і контролює всі права на торгівлю там."
  tsardom: "Царство"
  tsardom_desc: "Наша держава підтримує спадщину Римської імперії, і є опорою нашої державної релігії. Як Цар всієї [ShowRegionName('russia_region')], наш правитель є справжнім володарем [ShowCultureGroupName('russian_group')] народів."
  veche_republic: "Вічова Республіка"
  veche_republic_desc: "Ця держава управляється Віче, радою з найвищою законодавчою та судовою владою, що складається з [ShowEstateTypeName('nobles_estate')], [ShowEstateTypeName('burghers_estate')] і навіть [ShowEstateTypeName('peasants_estate')]."
  sudebnik: "Судебник"
  sudebnik_desc: "Було прийнято рішення стандартизувати наш правовий кодекс, який спочатку розвивався як звичаєве право зі значними регіональними відмінностями. Оптимізувавши цей кодекс та розширивши кількість правопорушень, що підлягають штрафам, ми покращуємо як адміністративну ефективність, так і державні доходи."
  oprichnina: "Опричнина"
  oprichnina_desc: "Спадкове [ShowEstateTypeName('nobles_estate')] становить найбільшу загрозу нашому пануванню над державою. Ми повинні зламати їхню владу, захопивши частини їхніх маєтків і перерозподіливши цю землю тим, хто демонструє нам вірність."
  east_india_trading_company: "Ост-Індська торгова компанія"
  east_india_trading_company_desc: "Глобальна торгова компанія, її початковою метою була торгівля в регіоні [ShowRegionName('indian_ocean_region')]. Ці підприємства виявилися плідними, і компанія пізніше розширила свою діяльність на Східну [ShowContinentName('asia')].\nЗараз це найбільша компанія у всьому світі, контролюючи та управляючи великими частинами наших заморських володінь та нашими незліченними глобальними торговими мережами."
  ven_monte_nuovo: "Монте Нуово"
  ven_monte_nuovo_desc: "Оригінальна система кредитування в [ShowRegionName('italy_region')] була акціонерним фондом під назвою #italic Монте Веккіо#!, в якому кожен громадянин був зобов'язаний позичити певну суму грошей в обмін на відсотки. Але з цією оновленою ітерацією наші банкіри запровадили гарантовану мінімальну виплату відсотків кредиторам, що збільшило суму грошей, яку люди готові інвестувати. Цей 'Монте Нуово' виявився надзвичайно успішним і з часом має виявитися надзвичайно прибутковим."
  hun_power_to_magnates: "Могутні магнати"
  hun_power_to_magnates_desc: "Могутні магнати [GetCountry('HUN').GetName] зменшували владу [ShowEstateTypeName('crown_estate')] за кожної нагоди."
  casa_de_contratacion: "Каса де Контратасьйон"
  casa_de_contratacion_desc: "Каса де Контратасьйон — це агентство, яке управляє $SPA_ADJ$ колоніальними операціями. Усі подорожі для розвідки та торгівлі повинні отримати її схвалення, і вона збирає всі колоніальні податки. Каса також відповідає за збереження секретної інформації про нові торгові шляхи та цінні відкриття."
  intendancy_system: "Система інтендантства"
  intendancy_system_desc: "$intendancy_system$ — це нова система управління, спрямована на централізацію влади [ShowEstateTypeName('crown_estate')] над владою бюрократів з метою нагляду за збором податків та впровадження антикорупційних заходів."
  royal_factories_reform: "Королівські мануфактури"
  royal_factories_reform_desc: "Королівські мануфактури — це державні мануфактури, що фінансуються та перебувають під безпосереднім наглядом [ShowEstateTypeName('crown_estate')] для виробництва стратегічних та розкішних товарів на підтримку меркантилістської та централізованої економічної політики."
  royal_council_of_castile: "Королівська рада Кастилії"
  royal_council_of_castile_desc: "$royal_council_of_castile$ — це централізована королівська рада для оптимізації оподаткування, правосуддя та управління під безпосереднім наглядом [ShowEstateTypeName('crown_estate')]."
  nueva_planta: "Nueva Planta"
  nueva_planta_desc: "$nueva_planta$ — це серія указів та реформ, оформлених з метою скасування регіональних правових привілеїв та створення єдиної, унітарної держави під центральною владою."
  crown_aragon_reform: "Корона Арагону"
  crown_aragon_reform_desc: "$crown_aragon_reform$ — це складова держава, утворена кількома королівствами та князівством, кожна зі своїми інституціями та законами. Як торговельна та мореплавна конфедерація, вона представляє надзвичайну морську міць, готову домінувати в Середземномор'ї своїми флотами."
  crown_castile_reform: "Корона Кастилії"
  crown_castile_reform_desc: "Коли королівства Кастилія та Леон утворили остаточний союз у 1230 році, народилася $crown_castile_reform$. Відтоді країна прагнула стати гегемоністською державою в [ShowRegionName('iberia_region')] та однією з найвеличніших і найпрестижніших націй у [ShowContinentName('europe')]."
  portuguese_monarchy_reform: "[GetCountry('POR').GetAdjectiveWithNoTooltip] Монархія"
  portuguese_monarchy_reform_desc: "Хоча її монархія спочатку була схожою на монархії інших іберійських націй, [GetCountry('POR').GetName] розвинула дещо інший уряд: більш централізований навколо своїх монархів, з кращим впливом на свої стани та з пильним поглядом на здобуття багатств заморської торгівлі."
  spanish_tolerance: "Іберійська толерантність"
  spanish_tolerance_desc: "[ShowRegionName('iberia_region')] населена безліччю людей з різними вірами та переконаннями. Примушувати їх до однієї віри або виганяти тих, чиї переконання відрізняються від правлячого класу, було б серйозною помилкою і зашкодило б нашій країні більше, ніж принесло б користі. Щоб досягти величі, ми повинні прийняти це різноманіття."
  pyrenean_fueros_reform: "Піренейські фуерос"
  pyrenean_fueros_reform_desc: "#italic Фуеро#! реалізується в писаному праві, обмежуючи королівську владу та забезпечуючи здійснення громадянських свобод. Лише коли нові правителі присягають захищати #italic Фуерос#!, їх визнають такими. #italic Фуерос#! є конституціями королівства, підпорядковуючи владу верховенству права та виражаючи баланс влади між нашою державою та нашими правителями."
  school_of_first_letters_reform: "Школа перших літер"
  school_of_first_letters_reform_desc: "Заохочувані релігійними орденами та муніципалітетами, Школи перших літер беруть на себе місію навчання людей не лише основам катехізису, а й числам та літерам. Підтримуючи ці починання, наш народ вчиться правильно читати та писати, стаючи більш освіченим у процесі."
  sons_of_the_oak_reform: "Сини Дуба"
  sons_of_the_oak_reform_desc: "Наше королівство є гордим творінням свого засновника: Іньїго Іньїгеса, на прізвисько Аріста, або #italic Дуб#!. Як і величне дерево, на честь якого він названий, наша нація покликана вистояти та протистояти будь-яким силам, що можуть загрожувати її існуванню."
  system_of_councils_reform: "Система рад"
  system_of_councils_reform_desc: "Оскільки наша нація стає могутнішою, нам потрібен спосіб об'єднати численні ради, на які покладаються наші правителі. Створивши полісинодіальну систему, ми забезпечуємо ефективність нашого королівства, організувавши всі ці ради для спільної роботи."
  the_jewel_of_alandalus_reform: "Перлина Аль-Андалусу"
  the_jewel_of_alandalus_reform_desc: "Ми єдиний вцілілий член колишніх мусульманських королівств, що населяли Аль-Андалус у минулому. Величезні мусульманські імперії піднімалися та падали по всій [ShowRegionName('iberia_region')], фрагментуючись у процесі. Як одна з цих фрагментованих частин, наша доля — об'єднати народ [ShowRegionNameWithNoTooltip('iberia_region')] під нашим прапором."
  timurid_empire: "Імперія Тимуридів"
  timurid_empire_desc: "Великі амбіції нашого засновника викарбували імперію неймовірного розмаху на самій поверхні [ShowSubContinentName('central_asia')]. Тому наша бюрократія зосереджена на розширенні наших кордонів."
  por_ordinances: "[GetCountry('POR').GetAdjectiveWithNoTooltip] Укази"
  por_ordinances_desc: "Ця формалізація канонічного, римського та державного права вирішить багато судових конфліктів та підвищить ефективність уряду."
  anatolian_beylik: "Анатолійський бейлик"
  anatolian_beylik_desc: "Розташовані в бурхливому регіоні [ShowRegionName('anatolia_region')], ми постали після занепаду Румського султанату, чиї кордони ми колись населяли. Загартовані воїни та здібні бюрократи формують міцну основу нашого надійного уряду."
  mamluk_government: "$mamluk$ Уряд"
  mamluk_government_desc: "Правління Султанату над просторами [ShowRegionName('egypt_region')] значною мірою залежить від підтримки потужної постійної армії. Його вищий клас складається з фракцій цих могутніх рабів-воїнів, які часто самі сходять на трон і можуть бути вирішальним фактором між довгим і коротким правлінням."
  persian_feudal_theocracy: "$IRA_ADJ$ Феодальна Теократія"
  persian_feudal_theocracy_desc: "$rank_kingdom_persian_ruler_male$ є абсолютним правителем [ShowRegionName('persia_region')], і під $rank_kingdom_persian_ruler_male$ існує складна бюрократична система, яка підтримує структуру та баланс нації. Завдяки призначенню на державні посади за заслугами, а не за спадковістю, система гарантовано функціонує на благо нації."
  divided_persian_aristocracy: "Розділена $IRA_ADJ$ Аристократія"
  divided_persian_aristocracy_desc: "Правлячі військові класи нашої держави перебувають у розбраті. Якщо раніше вони безпосередньо кидали виклик $rank_kingdom_persian_ruler_male$, то тепер постійно змагаються за прихильність правителя."
  ambrosian_republic_reform: "Амброзіанська Республіка"
  ambrosian_republic_reform_desc: "Вчена система правління, де академіки та міські інтелектуали володіють політичною владою, а не традиційна знать. Ця система є урядом, заснованим на інтелектуальних заслугах та громадянській участі, а не на спадковому правлінні. Республіка підтримує контроль завдяки народній підтримці освіченої еліти, хоча стикається із засудженням з боку тих, хто вважає її загрозою статус-кво."
  petition_of_rights: "Петиція про права"
  petition_of_rights_desc: "Громадяни в межах наших кордонів, особливо ті, що мають шляхетні зв'язки, давно вимагали прийняття певних невід'ємних прав. Це вплинуло б на співпрацю наших станів та нашу здатність до урядових реформ ціною слабшої центральної влади."
  judicate_reform: "Суддівство"
  judicate_reform_desc: "Суддівство — це унікальний тип уряду, який визначається його республіканськими інститутами та обранням правителя з-поміж членів Верховного Суду."
  diarchy_republic: "Діархічна Республіка"
  diarchy_republic_desc: "Жодна людина не повинна правити країною сама, інакше ми нічим не кращі за тиранічних деспотів, які намагаються підкорити наш народ.\nПосада #italic Capitano del Popolo#! буде подвійною, де члени родин [ShowDynastyName('spinola_dynasty')] та [ShowDynastyName('doria_dynasty')] по черзі обійматимуть її. Таке розташування забезпечить баланс виконавчої влади."
  great_and_minor_councils_of_genoa: "Велика та Мала Ради [GetCountry('GEN').GetNameWithNoTooltip]"
  great_and_minor_councils_of_genoa_desc: "Створені адміралом Андреа Доріа після реформування [GetCountry('GEN').GetAdjective] уряду, $great_and_minor_councils_of_genoa$ є двома законодавчими органами держави. Велика Рада представляє членів [ShowEstateTypeName('burghers_estate')], тоді як Мала Рада складається з [ShowEstateTypeName('nobles_estate')]."
  joint_ruling_monarchy: "Спільне Правління"
  joint_ruling_monarchy.tt: "Правитель НЕ має дорослого брата чи сестри"
  joint_ruling_monarchy.tt2: "Наш Правитель та його брат/сестра будуть по черзі правити кожні 5 років"
  joint_ruling_monarchy_desc: "Багато [GetCountry('GER').GetAdjective] князів досі дотримуються традиції ділити владу зі своїми братами та сестрами — розподіляючи обов'язки управління, спільно керуючи своїми володіннями або навіть по черзі займаючи трон протягом заздалегідь визначеного періоду."
  russian_absolutism: "Абсолютизм"
  russian_absolutism_desc: "Обов'язок дослухатися до порад будь-якої ради скасовано."
  the_mestnichestvo: "Місництво"
  the_mestnichestvo_desc: "Місництво — це стародавня система, яка призначає людей на державні посади на основі давнини їхнього роду та старшинства, яке вони займають у своїх сім'ях. Найбільш відчутним проявом цієї системи був порядок розсаджування бояр за столом царя, що відображав їхній індивідуальний ранг і старшинство."
  state_controlled_church: "Державна Церква"
  state_controlled_church_desc: "Церква повністю підкорена державі."
  swe_age_of_freedom: "Епоха Свободи"
  swe_age_of_freedom_desc: "Ми вступили в Епоху Свободи, в якій [ShowEstateTypeName('crown_estate')] більше не матиме абсолютної влади! Уряд [GetCountry('SWE').GetName] тепер перебуває в руках станів, і монарх не може нічого робити, не отримавши спочатку нашого схвалення."
  ned_shipbuilding_industry: "Голландська Суднобудівна Промисловість"
  ned_shipbuilding_industry_desc: "З винаходом #fluyte#! голландська суднобудівна промисловість пережила вибухове зростання. Вітчизняні та іноземні замовлення надходять потоком, і бізнес процвітає! Ніколи раніше стільки голландських кораблів не плавало морями, і ніколи раніше стільки наших людей не було зайнято їх будівництвом."
  geheime_kabinettskanzlei: "Таємна Кабінетна Канцелярія"
  geheime_kabinettskanzlei_desc: "Заснована державою для таємного перехоплення та вивчення всієї кореспонденції, ця Чорна Палата надасть нам розвідувальні дані про поштову діяльність у нашій країні. Досвід наших агентів у прихованому відкритті, копіюванні та повторному запечатуванні офіційних документів стане відомим у всьому світі."
  libertas_affectandi: "Libertas Affectandi"
  libertas_affectandi_desc: "Спочатку наданий династії фон Бабенберг, яка правила до нас, цей привілей дозволяє нам обирати бажаного спадкоємця у випадку відсутності прямих спадкоємців чоловічої лінії. Це забезпечить збереження володінь нашої династії навіть у скрутні часи."
  joyous_entry_reform: "Радісний В'їзд"
  joyous_entry_reform_desc: "Радісний В'їзд надає свободи нашим [ShowEstateTypeName('burghers_estate')], подібні до #italic Magna Carta#! для Нижніх Країн. Цей документ підтримує свободи для церкви, міст та [ShowEstateTypeName('nobles_estate')], наголошуючи на згоді на податки та зобов'язаннях щодо неподільності нашої нації."
  frisian_freedom_reform: "[ShowCultureNameWithNoTooltip('frisian')] Свобода"
  frisian_freedom_reform_desc: "[ShowCultureName('frisian')] Свобода представляє незламність нашого народу та його відмову від феодалізму та кріпацтва. Вони обирають своїх представників серед землевласників і автономно керують землею. Якщо серед них постане лідер, він повинен поважати свободи свого народу або зіткнутися з тією ж долею, що й будь-який інший ворог, чи то зсередини, чи ззовні."
  dutch_republic_reform: "Голландська Республіка"
  dutch_republic_reform_desc: "Це тип республіки, де лідер, якого називають #Стадхолдер#!, править довічно. Традиційно фракції, що підтримують цей уряд, сперечалися про те, як має бути структурована влада Стадхолдера. Ті, кого називають статистами, хочуть зробити Стадхолдера більш схожим на #italic Primus inter Pares#!, тоді як оранжисти бажають ставитися до обраного лідера як до якогось короля."
  ancient_french_taxation: "Стародавнє [GetCountry('FRA').GetAdjectiveWithNoTooltip] Оподаткування"
  ancient_french_taxation_desc: "Історично податки накладалися та збиралися лише в часи потреби, а не за постійною системою."
  basic_timariot_system: "Система Тімар"
  basic_timariot_system_desc: "Система феодальних землеволодінь, зосереджена на створенні грізної кавалерійської сили. Нашим кавалеристам-сипахам будуть надані земельні наділи, і вони будуть зобов'язані надавати кавалерійські сили пропорційно розміру їхніх володінь."
  expanded_timariot_system: "Розширена система тимарів"
  expanded_timariot_system_desc: "Система з наділеними землею сипахами, які постачають основну частину нашої кінноти, була розширена, надавши їм величезні ділянки завойованих земель, на яких вони продовжуватимуть накопичувати кінноту."
  legacy_of_osman: "Спадщина Османа"
  legacy_of_osman_desc: "Спадщина Османа — це традиція божественного права на розширення під центральною релігійною та політичною владою нашого верховного лідера. Ми посилаємося на Спадщину, щоб виправдати наші постійні завоювання, підтримувати династичну легітимність у різноманітних володіннях і створити імперію, де наші завойовані народи не просто підкорені, а повністю поглинені. Нездатність підтримувати Спадщину може розглядатися як зрада традицій нашого народу."
  enderun_interior_service: "Ендерун"
  enderun_interior_service_desc: "Внутрішня служба — це складна гілка [GetCountry('TUR').GetAdjective] двору. Розділена на Приватну палату, Скарбницю, Приватну комору та Велику й Малу палати, її ряди складаються з різношерстої команди євнухів, рабів та інших малопомітних членів королівського двору, які іноді можуть мати значний вплив на внутрішню роботу держави."
  ottoman_imperial_harem: "Імперський гарем"
  ottoman_imperial_harem_desc: "Імперський гарем — це набагато більше, ніж колекція поневолених красунь, які чекають на поклик правителя — це інституція, паралельна Внутрішній службі, зі своєю власною організацією, освітою та протоколами. Хоча ті, хто в гаремі, повинні працювати за лаштунками, вони іноді можуть мати великий вплив, змінюючи хід державних справ лише шепотом у потрібне вухо."
  ottoman_eunuch_viziers: "Євнухи-візири"
  ottoman_eunuch_viziers_desc: "Досвідченим євнухам-слугам можуть бути надані впливові посади, такі як Чорний головний євнух, #italic Кислар-ага#!, та Білий головний євнух, #italic Капи-ага#!. На цих посадах вони відповідають за зв'язок між правителем та [GetCountry('TUR').Custom('GetHeadOfCabinetName')], а також за адміністрування гарему та пажів, нагляд за фондами #italic вакф#! та освіту [GetCountry('TUR').GetAdjective] принців, серед багатьох інших речей. Вважаючись більш надійними, ніж їхні неушкоджені однолітки, на них можна покластися, що вони завжди працюватимуть на благо держави."
  sekban_system: "Система секбанів"
  sekban_system_desc: "Солдати-секбани набираються у великій кількості з [ShowEstateTypeName('burghers_estate')] і фінансуються спеціальним податком під назвою #italic Секбан Акчесі#!. Зазвичай вони воюють як піхота, озброєна мушкетами, і формують нове ядро армії, але постійно конфліктують з $janissaries_advance$."
  ottoman_malikane_tax_reform: "Малікане"
  ottoman_malikane_tax_reform_desc: "Реформа системи $ottoman_tax_farming$, Малікане дозволяє відкупникам купувати довічні контракти на права збору податків у районах, де вони займаються відкупом. Це забезпечує їм більшу безпеку та стимулює довгострокові інвестиції в загальний економічний розвиток їхнього регіону. Недоліком цієї системи є те, що підтримувати верховенство права над цими довічними грантами стане складніше."
  ottoman_coffee_house_espionage: "Шпигунство в кав'ярнях"
  ottoman_coffee_house_espionage_desc: "Кав'ярні та інші міські місця зустрічей є основними осередками підривної діяльності. Розмістивши в цих місцях наших вірних шпигунів та інформаторів, ми можемо краще забезпечити державну безпеку."
  ottoman_new_order_army: "Нізам-і Джедід"
  ottoman_new_order_army_desc: "Радикальна військова реформа, Армія Нового Порядку значною мірою покладається на іноземних інструкторів та західну тактику й зброю, а також реорганізує артилерійський корпус. Нехай вона приведе нас до нових перемог і ще більше зменшить клопітний вплив занепадаючих $janissaries_advance$."
  expanded_posadnichestvo_office: "Розширене посадництво"
  expanded_posadnichestvo_office_desc: "Посада посадника є надзвичайно впливовою. Щоб уникнути монополії влади однієї особи, посаду необхідно розширити, щоб кілька членів [ShowEstateTypeName('nobles_estate')] могли обіймати цю посаду одночасно і контролювати один одного."
  sovet_gospod: "Совєт Господ"
  sovet_gospod_desc: "Совєт Господ — або Рада Панів — є інституцією прийняття рішень Республіки. На відміну від вічової системи, Совєт Господ надає більше влади посадникам, тисяцьким та іншим членам [ShowEstateTypeName('nobles_estate')]. За цієї системи вплив [ShowEstateTypeName('burghers_estate')] та [ShowEstateTypeName('peasants_estate')] є незначним."
  ruling_commission_of_england: "Керівна комісія"
  ruling_commission_of_england_desc: "Комісія [ShowEstateTypeName('nobles_estate')] фактично взяла на себе управління королівством, діючи як регенти. Здатність монарха здійснювати владу обмежена, а його право на правління з часом зменшується. Комісія може правити лише доти, доки вона зберігає підтримку парламенту, або до того часу, поки правитель не набере достатньо підтримки, щоб її повалити."
  bank_of_england_reform: "Банк $ENG$"
  bank_of_england_reform_desc: "Централізована та впливова установа, цей банк складається з могутніх фінансистів і значно підвищує нашу довіру та спроможність керувати нашими боргами. Його мета — керувати державними фінансами, допомагаючи стабілізувати державні запозичення."
  banu_hummay_amendments: "Поправки Бану Хуммай"
  banu_hummay_amendments_desc: "Ця складна система законів про престолонаслідування та адміністративних процедур встановлює релігійні зобов'язання та вимагає демонстрації благочестя від правлячої династії."
  kbo_clan_heads_reform: "Рада голів кланів"
  kbo_clan_heads_reform_desc: "Шукаючи поради у лідерів наших найважливіших кланів, ми можемо досягти більш стабільного уряду і, сподіваємося, принести більше процвітання нашому суспільству."
  manden_kurufa_reform: "Манден Куруфа"
  manden_kurufa_reform_desc: "$manden_kurufa_reform$, також відома як Федерація Манден, є урядом [GetCountry('MAL').GetLongName]. Спочатку розпочата як '#italic Дванадцять Дверей#!', що були особистими володіннями Манси, ця мережа альянсів та завойованих земель стала основним урядом держави."
  benevolence_tax_reform: "Податок на доброзичливість"
  benevolence_tax_reform_desc: "$benevolence_tax_reform$ — це спеціальний податок, який стягується з [ShowEstateTypeName('nobles_estate')], що мають значні заощадження або живуть розкішно, оскільки вони легше можуть дозволити собі більші внески. Він відповідно зменшує податковий тягар на найбідніших членів суспільства."
  navy_board_reform: "Морська рада"
  navy_board_reform_desc: "$navy_board_reform$ — це адміністративний орган, відповідальний за нагляд за морськими справами. Ця централізована установа оптимізує управління флотом, що призводить до більш ефективних операцій та розподілу ресурсів."
  haudenosaunee_clan_mothers: "Матері кланів Гауденосауні"
  haudenosaunee_clan_mothers_desc: "Матері кланів Гауденосауні, звані #italic Іакоянес#!, мають головну владу в кланах. Вони відповідають за внутрішню роботу племені та за обрання своїх чоловічих колег, званих Роянер, для представлення інтересів клану на раді всіх племен Гауденосауні."
  andean_monarchy: "Андська монархія"
  andean_monarchy_desc: "Урядова реформа, поширена серед народів [ShowAreaName('andes_area')]. Духовні вірування вплетені в закони про престолонаслідування, змушуючи нових правителів починати своє правління, не володіючи жодними мирськими речами."
  tawantinsuyu_monarchy: "Монархія Тавантінсую"
  tawantinsuyu_monarchy_desc: "Урядова реформа $INC_ADJ$ Імперії, адаптована та еволюціонувала зі своїх монархічних витоків. Релігійні вірування нерозривно переплетені із законами про престолонаслідування, що призводить до того, що нові правителі починають своє правління, не володіючи нічим."
  reformed_tawantinsuyu_government: "Реформований уряд Тавантінсую"
  reformed_tawantinsuyu_government_desc: "Цей реформований уряд фундаментально реструктурує управління $INC_ADJ$, усуваючи традиційну систему #italic панака#!, яка захищала володіння та майно померлого правителя і тому змушувала нового Сапа Інку прагнути до експансії. Натомість, він концентрує всю владу в руках нового лідера."
  court_of_the_star_chamber_reform: "Суд Зоряної палати"
  court_of_the_star_chamber_reform_desc: "$court_of_the_star_chamber_reform$ розглядає справи, які вважаються занадто чутливими або складними для звичайних судів, від лжесвідчення до змови. Хоча суд відомий своєю ефективністю, він стикається з критикою за потенційні зловживання владою, відсутність належної правової процедури та використання як політичного інструменту."
  gabelle: "Габель"
  gabelle_desc: "Урядова реформа, що дозволяє стягувати податок на [ShowGoodsName('salt')], який створює велике навантаження на населення — і приносить багато золота до державної скарбниці."
  fra_code_louis: "Правовий кодекс Людовика"
  fra_code_louis_desc: "Після століть розрізнених правових кодексів у Північній та Південній [GetCountry('FRA').GetNameWithNoTooltip], було встановлено #italic Кодекс Людовика#!, який об'єднує [GetCountry('FRA').GetNameWithNoTooltip] під однією універсальною законодавчою системою."
  crusade_sea_reform: "Хрестовий похід у морі"
  crusade_sea_reform_desc: "Коли наша увага перемістилася від захисту замків на Святій Землі до боротьби з піратами та язичниками на морях, ми мусили змінити спосіб функціонування нашого Ордену. Галери тепер стануть нашими полями битв і першими бастіонами проти ворогів Христа."
  representative_parliament_reform: "Представницький парламент"
  representative_parliament_reform_desc: "Запровадження $representative_parliament_reform$ знаменує значний зсув у політичній динаміці, надаючи можливість особам зі скромних верств населення, таким як [ShowPopTypeName('peasants')], отримати місце в Парламенті. Цей привілей традиційно був винятковою прерогативою еліти та привілейованих класів."
  japanese_imperial_family: "[GetCountry('JAP').GetAdjectiveWithNoTooltip] Імператорська родина"
  japanese_imperial_family_desc: "Заявляючи про своє походження від богині сонця Аматерасу, династія [ShowDynastyName('yamato_dynasty')] століттями сиділа на Хризантемному Троні."
  japanese_clan: "Японський клан"
  japanese_clan_desc: "Внаслідок нездатності Імператорської родини ефективно контролювати сільську місцевість, численні самурайські клани створили власні центри влади. Військова структура уряду під керівництвом Сьоґуна є благодатним ґрунтом для постійної боротьби за владу між ними."
  daimyo: "Даймьо"
  daimyo_desc: "Маючи найвищу владу над територією свого клану, японські $daimyo$ є могутніми феодальними лордами, здатними набирати власні армії та збирати власні податки. Найвпливовіші з них можуть навіть виявляти непокору центральній владі $JAPANESE_SHOGUNATE_LEADER_MALE$."
  shogunate: "Сьоґунат"
  shogunate_desc: "Як військовий уряд [GetCountry('JAP').GetName], влада $JAPANESE_SHOGUNATE_LEADER_MALE$ поширюється на кожен клан. Принаймні, на ті, що не настільки сміливі, щоб кинути їй виклик..."
  jap_rangaku: "Ранґаку"
  jap_rangaku_desc: "Ми заохочували вивчення західних справ. Хоча дехто боїться, що це шкодить нашій суспільній згуртованості, інші стверджують, що уроки, які можна винести із Заходу, настільки цінні, що ми не можемо дозволити собі інакше."
  shogunate_kanrei_council: "Рада Канрей"
  shogunate_kanrei_council_desc: "Прагнучи сформувати більш згуртовані стосунки між $JAPANESE_SHOGUNATE_LEADER_MALE$ та [ShowSpecialStatusName('shugo_daimyo')] [ShowRegionName('japan_region')], рада багатьох Канрей дозволяє членам ради [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')] радити $JAPANESE_SHOGUNATE_LEADER_MALE$, а також взаємодіяти з іншими членами ради [ShowSpecialStatusNameWithNoTooltip('shugo_daimyo')]. Старші члени ради також відповідають за справи інших, слабших кланів у раді."
  jap_kanrei_reform_when_no_longer_leader_of_shogunate: "Ця [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e] буде скасована, якщо [GetUniqueInternationalOrganization('japanese_shogunate').GetName] більше не існує або якщо ми більше не є лідером [GetUniqueInternationalOrganization('japanese_shogunate').GetNameWithNoTooltip]."
  warring_state: "Воююча держава"
  warring_state_desc: "Держава роздробленої Небесної Імперії, яка повстає проти нинішнього Сина Неба. Адміністративні питання відкладаються на користь більш агресивного фокусу на військовій експансії."
  altepetl: "Альтепетль"
  altepetl_desc: "Приблизно місто-держава, $altepetl$ поділяється на менші адміністративні райони, що називаються #italic calpōlli#!. Очолюваний династичним правителем, він поширює вплив на навколишні володіння та веде дипломатію з сусідніми $altepetl$ як суверенна одиниця."
  reformed_nahuatl_society: "Реформоване [ShowReligionAdjectiveWithNoTooltip('nahuatl')] суспільство"
  reformed_nahuatl_society_desc: "Інноваційна серія реформ централізації та законодавчих рамок формують основу нашого нового уряду. З увагою до деталей та сильною централізованою владою, ця правова основа закріпить піднесення могутньої нації, що дотримується [ShowReligionAdjective('nahuatl')] вчень."
  grand_remonstrance_reform: "Велика Ремонстрація"
  grand_remonstrance_reform_desc: "$grand_remonstrance_reform$ — це серія переглядів розподілу влади. Вона додатково обмежує владу монархії та забороняє призначення духовенства до кабінету в обмін на посилену парламентську підтримку та спрощену бюрократію."
  overhauled_admiralty_reform: "Перероблена Адміралтейство"
  overhauled_admiralty_reform_desc: "Реформа $overhauled_admiralty_reform$ є спробою модернізувати керівний орган Королівського флоту. Реформа допомагає зміцнити нашу військово-морську міць, а також закладає основу для майбутніх успіхів флоту як грізної морської сили."
  european_militia_reform: "Міліція Ширлі"
  european_militia_reform_desc: "Реформа $european_militia_reform$ — це переоснащення та перепідготовка наших збройних сил, з акцентом на модернізацію та узгодження використання артилерії та кавалерії відповідно до європейських практик. Ця реформа зміцнює військову міць [GetCountry('IRA').GetName], зрівнюючи її з міццю наших ворогів."
  legacy_of_kublai_khan: "Спадщина [GetCharacter('kublai_khan').GetNameWithNoTooltip]"
  legacy_of_kublai_khan_desc: "[GetCharacter('kublai_khan').GetName] був тим, хто зміцнив наше правління над $china$. Він прийняв стиль [ShowCultureGroupName('chinese_group')] і проголосив себе $EMPEROR_CHINA_MALE$ [GetUniqueInternationalOrganization('middle_kingdom').GetName]. Доки ми йдемо його слідами, наша влада над Драконовим Троном буде визнана."
  three_departments_system: "Три Департаменти"
  three_departments_system_desc: "Система $three_departments_system$ та Система Шести Міністерств походять з давніх китайських імперій і є основними адміністративними структурами нашої держави. Кожен департамент відповідає за кілька аспектів розробки, встановлення та перегляду державної політики. Шість Міністерств є шістьма основними виконавчими органами держави, розділеними за відповідними справами: зайнятість, оподаткування, обряди, військові справи, правоохоронні органи та громадські роботи."
  unlocked_mandarin_language_reforms_tt: "Розблоковано через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  empower_the_eunuchs: "Надати владу євнухам"
  empower_the_eunuchs_desc: "Корисність євнухів не можна недооцінювати. Вони широко визнані найціннішими слугами, оскільки їм можна довіряти, що вони не братимуть участі в династичній політиці. Ми забезпечимо їх кращою освітою, щоб вони могли займати важливі державні посади."
  single_whip_law: "Закон Єдиного Батога"
  single_whip_law_desc: "Щоб підвищити ефективність оподаткування, спростимо всі наші різні податкові режими в один: Усі платежі уряду здійснюватимуться [ShowGoodsName('silver')], і лише [ShowGoodsNameWithNoTooltip('silver')]."
  chi_peasant_empire_reform: "Мандат Спільноти"
  chi_peasant_empire_reform_desc: "Багато [ShowCultureGroupName('chinese_group')] династій були засновані за підтримки [ShowEstateTypeName('peasants_estate')]. Однак лише наша повністю визнала важливість простого народу. Жодна інша епоха в історії [GetInternationalOrganizationType('middle_kingdom').GetName] ніколи не бачила такої народної підтримки!"
  samsa_system: "Система Самса"
  samsa_system_desc: "Також відома як #italic Три Офіси#!, Самса — це збірний термін для трьох головних урядових установ нашої держави. Складаючись з членів, обраних за меритократичні та академічні досягнення, $samsa_system$ забезпечує систему стримувань і противаг як для правителя, так і для чиновників."
  kor_daedongbeob: "Дедонбеоп"
  kor_daedongbeob_desc: "Також відомий як #italic Закон про єдиний земельний податок#!, $kor_daedongbeob$ змінює податковий режим, щоб він базувався на єдиних внесках [ShowGoodsName('wheat')]. Цей набір реформ має покращити життя [ShowEstateTypeName('peasants_estate')] та збільшити комерційний потенціал наших [ShowEstateTypeName('burghers_estate')]."
  son_in_law_rule: "Правило \"Зятя\""
  son_in_law_rule_desc: "Наша держава глибоко пов'язана з династичними справами [ShowCultureGroupName('mongolian_group')]-керованих земель $china$. Сама суть нашого нинішнього уряду служить продовженням волі Юань, нашого \"Тестя\", і наші монархи зобов'язані одружуватися з [ShowCultureGroupNameWithNoTooltip('mongolian_group')] принцесами."
  kor_sadae_reform: "Політика Саде"
  kor_sadae_reform_desc: "Реформа $kor_sadae_reform$ підтримує тісні стосунки між [ShowRegionName('korea_region')] та $china$, де перша розглядається як молодший партнер останньої. Завдяки цьому ми залишаємося підлеглими [GetInternationalOrganization('middle_kingdom').GetName] і повинні прагнути підтримувати добрі стосунки з [ShowCultureGroupName('chinese_group')]."
  holy_imperial_monarchy_reform: "Священна Імперська Монархія"
  holy_imperial_monarchy_reform_desc: "Імперія досягла свого максимального розквіту. Як єдиний законний наступник Римської імперії, ніхто не може заперечити наше божественно-сприятливе право на правління!"
  pru_unified_legal_system: "Уніфікована правова система"
  pru_unified_legal_system_desc: "Ми доклали значних зусиль, аби уніфікувати наші внутрішні правові системи, викорінюючи зловживання та недбалість, водночас створюючи професійну судову систему."
  peuplierung_system: "Система Peuplierung"
  peuplierung_system_desc: "$peuplierung_system$ — це ініціатива, що має на меті залучити іммігрантів для заселення малонаселених регіонів нації."
  livonian_confederation: "Лівонська конфедерація"
  livonian_confederation_desc: "Землі [ShowAreaName('baltic_area')] здавна були роз'єднані, роздроблені на безліч різних підлеглих єпископств та васалів. Замість того, щоб намагатися об'єднати Terra Mariana в централізовану державу, ми приймемо цю децентралізацію."
  haixi_jurchen_reform: "Хайсі [ShowCultureNameWithNoTooltip('jurchen_culture')]"
  haixi_jurchen_reform_desc: "$haixi_jurchen_reform$ — це група [ShowCultureName('jurchen_culture')] людей, які переважно зосереджені на скотарстві, а не на землеробстві, що відрізняє їх від $jianzhou_jurchen_reform$. Вони також відомі прийняттям багатьох [ShowCultureName('mongolian_culture')] традицій."
  jianzhou_jurchen_reform: "Цзяньчжоуські чжурчжені"
  jianzhou_jurchen_reform_desc: "Бути $jianzhou_jurchen_reform$ означає бути високосинізованою групою [ShowCultureName('jurchen_culture')], що займається інтенсивним землеробством та веде осілий спосіб життя. Ці [ShowCultureNameWithNoTooltip('jurchen_culture')] народи мають інтенсивні торговельні мережі з сусідніми [ShowCultureGroupName('chinese_group')] містами."
  yeren_jurchen_reform: "Єрень [ShowCultureNameWithNoTooltip('jurchen_culture')]"
  yeren_jurchen_reform_desc: "$yeren_jurchen_reform$ позначає групи [ShowCultureName('jurchen_culture')], які займають менш заселені регіони та підтримують більш традиційний спосіб життя. Вони покладаються переважно на полювання та збиральництво, з менш інтенсивною сільськогосподарською практикою."
  lifan_yuan: "Ліфань Юань"
  lifan_yuan_desc: "$lifan_yuan$ — це департамент, який управляє територіями та політикою держави у Внутрішній [ShowContinentName('asia')], такими як провінції в [ShowRegionName('mongolia_region')], [ShowRegionName('tibet_region')] та [ShowRegionName('xinjiang_region')]. Якщо виникне потреба, він також наглядатиме за будь-якими володіннями далі вглиб континенту."
  prikazi_reform: "Прикази"
  prikazi_reform_desc: "$prikazi_reform$ — це повна реорганізація адміністративної структури, що використовується для урядової бюрократії. Вона створює кілька бюро, відповідальних за різні аспекти управління, такі як оподаткування, правосуддя, військові справи та торгівля, що сприяє швидшій реалізації політик та рішень, прийнятих Царем."
  razriadnyi_reform: "Розрядний приказ"
  razriadnyi_reform_desc: "$razriadnyi_reform$ запроваджує перепис, який використовується для ведення обліку населення країни, майна та оподаткування. Він оновлюється через регулярні проміжки часу, оцінює військові зобов'язання станів та веде облік землеволодіння та власності, забезпечуючи сплату належного."
  byzantine_court_ceremonies_reform: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip] придворні церемонії"
  byzantine_court_ceremonies_reform_desc: "Запровадження $byzantine_court_ceremonies_reform$ забезпечує проведення урочистих церемоній відповідно до [GetCountry('BYZ').GetAdjective] традицій. Ретельно дотримується придворний етикет, що підносить престиж та пишність правлячої еліти."
  voivode_reform: "Воєвода"
  voivode_reform_desc: "Впровадження $voivode_reform$ полегшує управління великими територіями завдяки запровадженню військового губернатора, який наглядає за місцевою адміністрацією та обороною. Присяга на вірність приноситься безпосередньо правителю."
  chosen_rada_reform: "Вибрана Рада"
  chosen_rada_reform_desc: "$chosen_rada_reform$ створює могутню раду, вірну правителю, з широкими повноваженнями для придушення влади еліт. Вплив ради поширюється на питання управління, політики та прийняття рішень."
  council_of_forty: "Рада Сорока"
  council_of_forty_desc: "Також відома як #italic Quarantia#!, Рада Сорока є найвищим конституційним органом [GetCountry('VEN').GetAdjective] республіки. Хоча державу представляє дож, реальна влада належить раді."
  council_of_ten: "Рада Десяти"
  council_of_ten_desc: "Рада Десяти є головним керівним органом [GetCountry('VEN').GetAdjective] республіки, зосередженим на обранні дожа, а також на перевірці влади патриціїв. Її широкий юрисдикційний мандат охоплює багато аспектів безпеки Венеційської держави, що робить її #italic де-факто#! керівною установою нації."
  full_college: "Повна Колегія"
  full_college_desc: "Виконавча установа, яка наглядає за щоденним управлінням та обов'язками Сенату. Усі питання та порядки денні, що підлягають обговоренню, заздалегідь готуються в цьому виконавчому органі."
  signoria_of_venice: "Синьйорія [GetCountry('VEN').GetNameWithNoTooltip]"
  signoria_of_venice_desc: "Верховний урядовий орган [GetCountry('VEN').GetName], Синьйорія приділяє велику увагу співпраці між дожем та іншими ключовими посадами держави. Боротьба за владу між радою та дожем таким чином стає справою минулого."
  promissione_ducale_reform: "Promissione Ducale"
  promissione_ducale_reform_desc: "Promissione Ducale слугує офіційною присягою та договірною угодою, яку кожен новообраний дож [GetCountry('VEN').GetName] повинен присягнути дотримуватися."
  standardized_relazioni_reform: "Стандартизовані Relazioni"
  standardized_relazioni_reform_desc: "«Relazioni» — це звіти, які наші посли надсилають уряду, деталізуючи політичний, фінансовий та соціальний стан країн, у яких вони служать."
  indian_sultanate_reform: "Індійський Султанат"
  indian_sultanate_reform_desc: "Керовані [ShowReligionGroupName('muslim')] меншиною, султанати $india$ мусили розвивати та розширювати традиційні [ShowReligionGroupNameWithNoTooltip('muslim')] ідеї монархії. Хоча вони залишаються ісламськими державами, роль Дхіммі, яка традиційно охоплює євреїв та християн, була поширена на дхармічні релігії."
  vij_astadiggajas: "Аштадіггаджас"
  vij_astadiggajas_desc: "Аштадіггаджас — #italic Слони у Восьми Напрямках#! — це колективний титул, наданий [ShowCultureName('telugu')] вченим та поетам нашого двору. Їхні інновації впливають на художній напрямок нашої культури і приведуть нас у нову золоту еру творчих та інтелектуальних досягнень."
  nayankara_system: "Система Наянкара"
  nayankara_system_desc: "Щоб краще контролювати наші володіння та просувати наші військові амбіції, ми розділили багато наших територіальних володінь між Наяками. Очікується, що ці Наяки будуть управляти цими землями та підтримувати будь-які міста, храми та поселення в них, а також надавати армії, необхідні нам для захисту та розширення нашого королівства."
  mug_mughal_diwan: "Могольський Диван"
  mug_mughal_diwan_desc: "Якщо є щось, чого наша династія навчилася протягом століть, так це те, що ми повинні переймати місцеві звичаї завойованих народів і поглинати їх у нашу культуру. Давайте переконаємося, що ми вчимося у тих, кого завойовуємо, щоб наша імперія могла продовжувати розширюватися."
  taluqdar_nobility: "Шляхта Талукдарів"
  taluqdar_nobility_desc: "Талукдари, або династичні аристократи, володіють великими землями, збирають податки та відіграють значну роль у нашій архітектурі та економіці. Як землевласники зі значною владою та впливом при дворі, Талукдари є нашим еквівалентом вищої знаті інших регіонів."
  mhr_ashta_pradhan: "Ашта Прадхан"
  mhr_ashta_pradhan_desc: "$mhr_ashta_pradhan$ — #italic Сучасна Рада Міністрів#! — це система міністерської делегації, що використовується [ShowLanguageName('marathi_language')] народом. Рада відповідає за керівництво адміністрацією держави, нагляд за військовими, фінансовими, дипломатичними та релігійними справами."
  theme_system: "Система Фем"
  theme_system_desc: "Система провінційних штабів та армій, очолювана стратегом з подвійними обов'язками захищати місцевих жителів та встановлювати владу за дорученням [GetCountry('BYZ').GetFlavorRank]. Ця система замінила провінційну адміністрацію Діоклетіана і служить нашому народу з тих пір."
  byz_theme_system_not_obselete_tt: "$theme_system$ не було скасовано через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  kritai_katholikoi: "Крітаї Католікої"
  kritai_katholikoi_desc: "Крітаї Католікої, розмовно відомі як #italic Вселенські Судді Римлян#!, стали вершиною [GetCountry('BYZ').GetAdjective] правової влади, народженої з реформ [GetCharacter('byz_andronikos_ii_palaiologos').GetName] і спочатку складалися з дванадцяти суддів як світського, так і церковного походження. Пізніше скорочений до колегії з чотирьох, цей видатний суд має неперевершену владу без права на апеляцію."
  speransky_liberalization_reform: "Лібералізаційна реформа Сперанського"
  speransky_liberalization_reform_desc: "$speransky_liberalization_reform$ створює нові законодавчі та виконавчі органи шляхом запровадження серії регіональних Дум. Для посередництва влади між самодержцем і Думами, [ShowPolicyName('dop_law_state_council')] стає можливим з додатковою метою розгляду будь-яких запропонованих законів."
  collegium_reform: "Колегія"
  collegium_reform_desc: "$collegium_reform$ — це повна перебудова адміністративної структури, що використовується для урядової бюрократії. Вона створює кілька колегій як урядових департаментів, із систематичним розділенням обов'язків, щоб уникнути можливого дублювання функцій. Колегії також відповідають за вирішення справ за допомогою консультативних рекомендацій."
  rule_of_the_sejm: "Правління Сейму"
  rule_of_the_sejm_desc: "Беззаперечною владою на наших землях є [ShowEstateTypeName('nobles_estate')], оскільки вони спрямовують свій вплив через [GetCountry('POL').GetGovernment.GetParliament.GetName]. Їхні голоси формують нашу політику і можуть визначити долю всієї нашої країни, на краще чи на гірше..."
  nakaz_reform: "Наказ"
  nakaz_reform_desc: "$nakaz_reform$ — це повна перебудова правового кодексу щодо рівності, справедливості та гуманізму. Під сильним впливом Просвітництва, вона має на меті наслідувати прогресивні реформи, що відбуваються по всій [ShowContinentName('europe')], одночасно спрощуючи кодекс законів."
  austrian_archduchy_reform: "Ерцгерцогство [GetCountry('HAB').GetNameWithNoTooltip]"
  austrian_archduchy_reform_desc: "Нам було надано #italic Privilegium Maius#!, що надає нам підвищене становище серед князів [GetUniqueInternationalOrganization('hre').GetName]. Це демонструє наш статус і престиж навіть за межами Імперських земель, і підносить нас до вищого становища, ніж простого герцога."
  reichshofrat_reform: "Райхсгофрат"
  reichshofrat_reform_desc: "Райхсгофрат служить найвищою правовою інституцією як для [GetCountry('HAB').GetName], так і для [GetUniqueInternationalOrganization('hre').GetName], надаючи нам сильніший контроль над правовими процесами як наших прямих, так і імперських підданих."
  hab_geheimer_rat: "Таємна Рада"
  hab_geheimer_rat_desc: "Таємна Рада служить центральним дорадчим органом монарха. Складаючись з високопоставлених дворян, міністрів та довірених осіб, рада відігравала вирішальну роль у формуванні імперської політики."
  bohemian_commonwealth_reform: "[GetCountry('BOH').GetAdjectiveWithNoTooltip] Співдружність"
  bohemian_commonwealth_reform_desc: "Співдружність представляє реформовану конституцію [GetCountry('BOH').GetFlavorRank], що надає більше привілеїв та свободи різним націям, що проживають у наших кордонах."
  kritai_katholikoi_reformed: "Реформовані Крітаї Католікої"
  kritai_katholikoi_reformed_desc: "Хоча судова система, створена [GetCharacter('byz_andronikos_ii_palaiologos').GetName], мала початковий успіх, все ще існували внутрішні проблеми, які судді використовували для переслідування своїх інтересів. З реформами цього Верховного Суду існуючі правові процеси були оптимізовані, забезпечуючи відсутність корупції серед суддів."
  modern_imperial_army: "Сучасна Імперська Армія"
  modern_imperial_army_desc: "Стара $theme_system$ [GetCountry('BYZ').GetName] виявилася хибною, посилюючи владу губернаторів та генералів, а не правителя. В результаті сформувалася нова Імперська Армія, де бути солдатом — це професія, а не обов'язок."
  byz_reformed_imperial_army_tt: "Створено $modern_imperial_army$ через [Concept('event', 'CONCEPT_PLACEHOLDER')|e]"
  omani_overseas_ambitions_reform: "Заморські Амбіції"
  omani_overseas_ambitions_reform_desc: "Хоча концепції заморської експансії та колоніалізму існували з античності, ми спостерігали сучасні методи колоніалізму та застосували їх самі. Це дозволить нам перейняти їхні методи заморського управління та створити власну колоніальну імперію."
  seven_provinces: "Сім провінцій"
  seven_provinces_desc: "Замість об'єднання всіх наших земель під нашим правителем, ми вирішили розділити нашу націю на $seven_provinces$, усі з власними амбіціями, але все ще служать нам."
  unified_admiralty_reform: "Об'єднане адміралтейство"
  unified_admiralty_reform_desc: "Адміралтейство ніколи не повинно бути розділеним. Воно повинно служити лише країні. З цієї причини ми об'єднали численні менші адміралтейства в межах нашої нації."
  powerful_vizierships_reform: "Могутні візирства"
  powerful_vizierships_reform_desc: "Набір міністрів, які перевершують владу правителя, ці радники міцно тримають владу, тоді як Султан є лише маріонеткою."
  songhai_professional_army_reform: "[GetCountry('SON').GetNameWithNoTooltip] Войовниче суспільство"
  songhai_professional_army_reform_desc: "Замість того, щоб ставитися до кожної правоздатної особи в країні як до солдата, краще формально встановити розрізнення між селянином і професійним воїном. Розділивши наше володіння на військові регіони, ми дозволимо губернаторам формувати власні професійні армії та служити правителю."
  autonomous_swiss_cantons_reform: "Автономні швейцарські кантони"
  autonomous_swiss_cantons_reform_desc: "Швейцарські кантони зберігають значну частину своєї незалежної влади навіть у нашій об'єднаній країні, заснованій на тих самих ідеалах, що й вільний союз, що існував раніше."
  zur_guild_constitution: "Гільдійська конституція"
  zur_guild_constitution_desc: "Розділені на Велику та Малу ради, двадцять шість радників правитимуть нашим володінням. Вони набиратимуться в рівних кількостях із заможних купців, наших гільдійських ремісників та шляхти. Це забезпечить, що жодна фракція не зможе отримати більшість і правити без згоди інших."
  dan_the_kings_law: "Королівський закон"
  dan_the_kings_law_desc: "Королівський закон — це абсолютистська конституція [GetCountry('DAN').GetName], що формалізує абсолютну владу короля. Вона робить монарха верховним правителем з усіма законодавчими, виконавчими та судовими повноваженнями, зосередженими в його руках."
  dan_college_of_missions: "Колегія місій"
  dan_college_of_missions_desc: "Колегія місій — це [GetCountry('DAN').GetAdjective] державна асоціація, створена для допомоги в місіонерських зусиллях та навернення населення до істинної віри."
  kilwan_trade_communities: "$ZAN_ADJ$ Торговельні громади"
  kilwan_trade_communities_desc: "Серія вільних конфедерацій, часто очолюваних губернатором, що посилює владу місцевих купців, ці громади прагнуть місцевої автономії та урбанізації. Їхні торговельні навички забезпечують стабільний потік доходів для наших скарбниць."
  control_of_the_mahdali_coinage_reform: "Контроль над монетами $mahdali_dynasty$"
  control_of_the_mahdali_coinage_reform_desc: "Могутність нашої династії викарбувана на монетах, що циркулюють на ринках від узбережжя [ShowRegionName('italy_region')] до $india$ і далі. Ця триметалева монета переважно виготовлена з [ShowGoodsName('copper')], [ShowGoodsName('silver')] та [ShowGoodsName('goods_gold')], і є першою у своєму роді, що чинить такий вплив у мультирегіональному масштабі. Контроль над її обігом є синонімом тривалого процвітання!"
  zimbabwe_royal_cattle_control: "Королівська власність на худобу"
  zimbabwe_royal_cattle_control_desc: "Власність на [ShowGoodsName('livestock')] дає нам багато влади, а контроль над худобою нашої країни допоможе зміцнити наше правління."
  zmw_council_of_senior_wives: "Рада старших дружин"
  zmw_council_of_senior_wives_desc: "Ця Рада запропонує нам чудові поради та залучить найдосвідченіших дружин нашого правлячого класу до управління нашою країною."
  ayu_chatusadom: "Chatusadom"
  ayu_chatusadom_desc: "Що означає 'Чотири Стовпи', міністерська організація $ayu_chatusadom$ ділить уряд на дві гілки: військову та цивільну, остання з яких далі поділяється на чотири міністерства. Розподіл на відділи та чітке призначення завдань кожному забезпечує ефективнішу адміністрацію та слугує продовженням влади правителя."
  mandala_system: "Система Мандали"
  mandala_system_desc: "Мандала — це система влади, в якій незалежні міста-держави присягають на вірність тому, хто очолює наймогутнішу державу серед них. Виходячи з [ShowReligionGroupAdjective('dharmic')] та [ShowReligionGroupAdjective('buddhist')] світогляду, фундаментальна ідея полягає в тому, що влада випромінюється радіально від центрального джерела. Таким чином, кожна з держав є джерелом місцевої влади, але їхня влада, своєю чергою, випромінюється від центрального, наймогутнішого, джерела."
  legacy_of_the_ottomans: "Спадщина Османів"
  legacy_of_the_ottomans_desc: "Після століть воєн та тріумфальних перемог ми нарешті об'єднали величезні території під нашим прапором. Уся [ShowContinentName('europe')] тремтітиме від звуку нашого наближення!"
  leader_of_the_turks: "Лідер турків"
  leader_of_the_turks_desc: "Посеред хаосу криється можливість. Наше лідерство у справах [ShowRegionName('anatolia_region')], а також наша військова та фінансова міць дали нам перше слово у визначенні майбутнього всього регіону."
  legacy_of_the_turks: "Спадщина турків"
  legacy_of_the_turks_desc: "Перевершивши наших могутніх сусідів по [ShowRegionName('anatolia_region')], ми дали шлях новій зростаючій силі! $legacy_of_the_ottomans_desc$"
  son_trans_saharan_trade: "Транссахарська торгівля"
  son_trans_saharan_trade_desc: "Торгові шляхи Транссахарської [ShowContinentName('africa')] завжди приносили багатство Західній Африці та її імперіям. Замість того, щоб дозволити цим шляхам занепадати, давайте запропонуємо підтримку караванам, що проходять через наші землі."
  revolutionary_republic: "Революційна республіка"
  revolutionary_republic_desc: "$revolutionary_republic$ керує нацією через невелику виконавчу владу, підтримувану виборною палатою депутатів. Революційна пропаганда зміцнить рішучість наших армій, а принцип загальної рівності має надихати на сильне та впевнене лідерство."
  revolutionary_autocracy: "Революційна автократія"
  revolutionary_autocracy_desc: "Хоча на поверхні це $republic$, $revolutionary_autocracy$ схожа на абсолютну $military_dictatorship$, очолювану компетентним генералом або адміралом, який користується великою популярністю серед мас."
  revolutionary_empire: "Революційна імперія"
  revolutionary_empire_desc: "$revolutionary_empire$ — це $monarchy$, яка йде на деякі поступки ідеям [ShowInstitutionName('enlightenment')], водночас керуючи народом з абсолютною владою під приводом служіння революційним ідеалам."
  constitutional_state: "Конституційна держава"
  constitutional_state_desc: "$constitutional_state$ зосереджується на делікатному балансі між повноваженнями центральної влади та представницьких інститутів. Хоча глава держави все ще керує, закони та політичні рішення формуються законодавчим органом, у відважній спробі приборкати абсолютистські тенденції."
  malian_tribute_system: "[GetCountry('MAL').GetAdjectiveWithNoTooltip] Система данини"
  malian_tribute_system_desc: "Наше основне джерело [ShowGoodsName('goods_gold')], $malian_tribute_system$ — це система, яка вимагає, щоб усе [ShowGoodsNameWithNoTooltip('goods_gold')] оподатковувалося та зрештою контролювалося правителем."
  eth_wandering_court: "Місцеві аудиторії"
  eth_wandering_court_desc: "Замість стаціонарного двору ми віддаємо перевагу свободі пересуватися за бажанням в інші частини нації. Завдяки нашій опорі на [ShowPolicyName('itinerant_court_policy')] ми можемо легше переналаштовувати місце правління наших правителів і краще вирішувати проблеми місцевого населення."
  bng_industralized_provinces: "Швидка індустріалізація"
  bng_industralized_provinces_desc: "На відміну від інших націй, ми подвоїли наші зусилля щодо урбанізації та економіки, заснованої на виробництві. Хоча це мало бажаний сприятливий ефект на економічні питання, значна частина селянства залишається стурбованою таким масовим культурним зрушенням."
  tughlaq_slave_army_reform: "$tughlaq_dynasty$ Армія рабів"
  tughlaq_slave_army_reform_desc: "Через національний надлишок рабів ми можемо використовувати їх як імперську гвардію. Таким чином, ми матимемо дисципліновану силу на полі бою, а також забезпечимо безпеку двору."
  diwan_i_bandagan: "Диван-і Бандаган"
  diwan_i_bandagan_desc: "Кількість рабів, придбаних державою, зросла настільки масово, що було створено спеціальний департамент — $diwan_i_bandagan$, Департамент рабів — для управління ними та їхніми операціями."
  shahana_i_mandi: "Сахана-і-Манді"
  shahana_i_mandi_desc: "Встановивши ринкові правила для релігійних меншин, ми можемо виправдати нижчі зарплати для наших армій, а також забезпечити, щоб будь-який єретик або язичник залишався в підпорядкуванні."
  feudal_theocracy: "Феодальна теократія"
  feudal_theocracy_desc: "$feudal_theocracy$ — це держава, керована релігійним лідером. На відміну від інших теократій, вона керується більш спадковим чином, дозволяючи її правителям передавати лідерство членам своїх сімей."
  the_protectorate: "Протекторат"
  the_protectorate_desc: "Наголошуючи на цінностях військової могутності та сильної централізованої влади під керівництвом Лорда-Протектора, $the_protectorate$ — це новий стиль уряду, запроваджений після перемоги парламентаріїв під час $english_civil_war$."
  timurid_diwan_reform: "$TIM_ADJ$ Діван"
  timurid_diwan_reform_desc: "Ми повинні відмовитися від інших форм правління та легалізувати $sharia$ як офіційний закон. Ця $timurid_diwan_reform$ дозволить нам встановити належне ісламське правління над будь-якими невіруючими, а також полегшить надання губернаторства нашим родичам."
  soyurghal_governor_reform_desc_common: "Губернатори [GetCountry('TIM').GetLongName], які були призначені на посаду, тому що їм або потрібен був більший досвід, перш ніж стати наступним правителем, тому що відповідна територія відчайдушно потребувала здібного губернатора, або просто для того, щоб виключити їх з активної політики держави."
  soyurghal_governor_reform: "Губернатор-наставник Союрґал"
  soyurghal_governor_reform_desc: "$soyurghal_governor_reform_desc_common$"
  soyurghal_governor_banished_reform: "Вигнаний губернатор Союрґал"
  soyurghal_governor_banished_reform_desc: "$soyurghal_governor_reform_desc_common$"
  soyurghal_governor_effective_governor_reform: "Губернатор Союрґал"
  soyurghal_governor_effective_governor_reform_desc: "$soyurghal_governor_reform_desc_common$"
  subah_organization_reform: "Організація Суба"
  subah_organization_reform_desc: "Стратегічно розмістивши численних губернаторів у наших володіннях, ми можемо легко контролювати кожен куточок нашої нації, не турбуючись про втрату контролю над ними. Це також дозволяє нам легше урбанізувати території."
  uc_bey_reform: "Уряд $uc_bey$"
  uc_bey_reform_desc: "Мілітаристський уряд, відповідальний за утримання армії, за допомогою якої забезпечується безпека домену та кордонів його сюзерена."
  volok_reform: "Валахівська Реформа"
  volok_reform_desc: "З $volok_reform$, наші [ShowEstateTypeName('nobles_estate')] більш врегульовані у своїй поведінці щодо наших підданих. Це підтримує [ShowEstateTypeName('peasants_estate')] у нашому володінні, водночас зміцнюючи їхній статус як незалежного стану."
  lit_grand_duchy_of_lithuania_reform: "Верховне Герцогство"
  lit_grand_duchy_of_lithuania_reform_desc: "Замість того, щоб вважати себе рівними іншим герцогам, ми натомість обираємо піднесення до статусу, що краще виражає нашу силу."
  cossacks_reform: "Січ Рада"
  cossacks_reform_desc: "Бажаючи надалі організувати [ShowEstateTypeName('cossacks_estate')] під одним правителем, $cossacks_reform$ ставить Гетьмана на чолі, щоб вести їх усіх, слугуючи або їхнім власним інтересам, або інтересам їхнього сюзерена."
  iro_reforged_law_of_peace: "Великий Закон Миру"
  iro_reforged_law_of_peace_desc: "Закріплений через пояси вампум, основа Великого Закону Миру керувала нашою Конфедерацією з моменту її заснування. Наголошуючи на мирі та справедливості, а також підтримуючи стійкий розум, принципи Великого Закону Миру об'єднали всіх у межах [ShowCultureGroupName('haudenosaunee_group')] нації."
  iro_council_of_the_fifty: "Велика Рада"
  iro_council_of_the_fifty_desc: "Складаючись з п'ятдесяти вождів від кожної з П'яти Націй, [ShowCultureGroupName('haudenosaunee_group')] Велика Рада втілює принципи Великого Закону Миру. Управління ради вимагає, щоб усі п'ятдесят вождів досягли єдиного консенсусу, перш ніж справи зможуть продовжуватися."
  guru_granth_sahib_reform: "$guru_granth_sahib$"
  guru_granth_sahib_reform_desc: "$guru_granth_sahib_desc$"