l_english:
  country_history_ARA: "[GetCountry('ARA').GetLongName] гордо стоїть як значна сила в західному Середземномор'ї завдяки своїй морській могутності, дипломатичній вазі та процвітаючим торговельним мережам.\n\nСтабілізація Королівства [ShowLocationName('valencia')] та триваюче завоювання новоствореного Королівства Сардинії та Корсики можуть забезпечити його панування на морях. Однак, незважаючи на відносну стабільність, на горизонті маячать виклики. На Сході [GetCountry('MLL').GetLongName] стикається з економічними труднощами, а ворожість його правителя до [GetCountry('ARA').GetGovernment.GetRuler.GetName] може призвести до конфлікту. На півострові загроза [GetCountry('CAS').GetLongName] стає все більш реальною, оскільки #italic Реконкіста#! добігає кінця. На півночі [GetCountry('FRA').GetLongName] консолідували своє панування над [ShowAreaName('languedoc_area')] за останнє століття.\n\nЯк молодий [GetCountry('ARA').GetGovernment.GetRuler.GetShortName] має зустріти майбутні виклики? Чи зосередиться [GetCountry('ARA').GetGovernment.GetRuler.GetHeShe] на Середземному морі та пануватиме на хвилях від [ShowLocationName('barcelona')] до Святої Землі? Чи [GetCountry('ARA').GetGovernment.GetRuler.GetHeShe] повернеться і заявить про панування над Іберією? Або [GetCountry('ARA').GetGovernment.GetRuler.GetHeShe] спробує помститися за битву при Мюреті 1213 року та повернути давно втрачені стародавні володіння на північ від Піренеїв?"
  country_history_AZT: "Протягом останніх двох століть групи [ShowCultureName('nahua_culture')] людей, нащадків чичимеків, мігрували до центральної Мексики зі своєї легендарної прабатьківщини, відомої як Ацтлан. Наш народ був однією з цих мандрівних груп.\n\nЯк і багато інших [ShowCultureNameWithNoTooltip('nahua_culture')] націй, ми заснували свій власний [ShowGovernmentReformName('altepetl')] під назвою [ShowLocationName('tenochtitlan')], який був побудований на штучному острові в серці [ShowLocationName('texcoco_lake')].\n\nНаші найвидатніші діячі також були під впливом [ShowCultureName('toltec_culture')] культури, і в результаті ми розвинули витончену та складну цивілізацію, що зародилася в лагуні. Наші сусіди також визнавали нас вправними бійцями, оскільки наші однаково витончені бойові навички робили армії [GetCountry('AZT').GetLongName] силою, якої слід було боятися...\n\nОднак, наразі ми є васалами [ShowGovernmentReformNameWithNoTooltip('altepetl')] [GetCountry('TEP').GetName], і тому наші можливості розширення обмежені територіями навколо лагуни, яку вони населяють. Лише блискучий і здібний правитель міг би очолити [GetCountry('AZT').GetNameWithNoTooltip] у нашій подорожі, щоб підкорити Долину Мехіко та завоювати землі за її межами — чи може це бути [GetCountry('AZT').GetGovernment.GetRuler.GetShortName]?"
  country_history_BOH: "Землі [GetCountry('BOH').GetName] лежать у серці германської [GetUniqueInternationalOrganization('hre').GetName] і населені [ShowCultureName('slavic')] народом. Після тривалого періоду під [ShowDynastyName('premyslid_dynasty')] династією, нинішні правителі [ShowDynastyName('luxembourg_dynasty')] можуть кардинально змінити ситуацію, посиливши існуючі зв'язки країни з Імперією, хоча [GetCountry('BOH').GetGovernment.GetRuler.GetName] є більш [ShowCultureName('french')], ніж [ShowCultureGroupName('german_group')], оскільки він здобув освіту при королівському дворі [ShowLocationName('paris')]. Задоволення як [GetCountry('BOH').GetGovernment.GetEstateName('nobles_estate')], так і [GetCountry('BOH').GetGovernment.GetEstateName('peasants_estate')] під іноземним [GetCountry('BOH').GetGovernment.GetRulerTitle], а також навігація політичними хитросплетіннями [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip] виявилися б перешкодою для будь-кого. На щастя, [GetCountry('BOH').GetNameWithNoTooltip] є сильною [GetCountry('BOH').GetFlavorRank], але чи досягне вона своїх амбіцій?"
  country_history_BYZ: "Колись гордий [GetCountry('BYZ').GetFlavorRank], що простягався від [ShowRegionName('egypt_region')] та [ShowAreaName('levant_area')] до [ShowRegionName('iberia_region')] та [ShowRegionName('italy_region')], [GetCountry('BYZ').GetName] тепер переживає період майже неминучого занепаду, спричиненого шоком Четвертого хрестового походу, навіть після повернення [ShowLocationName('constantinople')] [GetCountry('BYZ').GetGovernment.GetRuler.GetDynasty.GetName]. Під час правління [GetCharacter('byz_andronikos_ii_palaiologos').GetHerHis] [GetCharacter('byz_andronikos_ii_palaiologos').GetName] вважав за потрібне розпустити кілька ключових інститутів, таких як флот, намагаючись врятувати вмираючу економіку країни, тоді як [ShowGovernmentReformName('theme_system')] продовжувала бути тінню того, чим вона була, оскільки [GetCountry('BYZ').GetFlavorRank] втрачала території на всіх фронтах.\n\n[GetCharacter('byz_andronikos_ii_palaiologos').GetHerHis|U] наступник, [GetCharacter('byz_andronikos_iii_palaiologos').GetName], тепер стоїть перед важким завданням захисту того, що залишилося від нашого колись славетного [GetCountry('BYZ').GetFlavorRank]. На сході [GetCountry('TUR').GetName] почали збирати велику армію, щоб знищити наші залишки володінь у [ShowRegionName('anatolia_region')], погрожуючи перетнути протоки. Водночас [GetCharacter('ser_stefan_dusan').GetName] дивиться на [ShowLocationName('thessaloniki')] та [ShowProvinceDefinitionName('north_epirus_province')] як стерв'ятник. Тим часом наша скарбниця висихає від дорогоцінних монет, і країна може бути вкинута в небезпечну громадянську війну, оскільки родина нашого [GetCountry('BYZ').GetGovernment.GetRulerTitle] таємно змовляється з [GetCountry('BYZ').GetGovernment.GetEstateName('nobles_estate')]. Чи зможе [GetCountry('BYZ').GetGovernment.GetRulerTitle] підняти цю колись велику націю з попелу?"
  country_history_CAS: "[GetCountry('CAS').GetLongName] було утворено шляхом об'єднання двох його складових частин, Королівства [GetCountry('CAS').GetNameWithNoTooltip] та [GetCountry('LON').GetLongName], коли вони були возз'єднані після того, як обидва титули успадкував [GetCharacter('cas_fernando_iii_burgundy').GetName] у 1230 році. Століттям пізніше [GetCharacter('cas_alfonso_xi_burgundy').GetName] править без особливого опору, подолавши складний початок свого правління після закінчення довгого регентства під керівництвом його бабусі, [GetCharacter('cas_maria_molina').GetName].\n\nПриборкавши знать королівства, очолювану його родичем [GetCharacter('cas_juan_manuel').GetName], та стабілізувавши управління країною, [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip] тепер звертає свою увагу на південний кордон. [GetCountry('GRA').GetLongName] загрожував нашій країні з того часу, як емірат став незалежним століття тому, підтримуваний могутнім [GetCountry('MOR').GetLongName], який має плацдарм в Іберії через дрібне королівство, зосереджене на [ShowLocationName('algeciras')] та [ShowLocationName('ronda')], і утримуване [GetCharacter('mor_abu_malik_abd_al_wahid').GetName], сином та спадкоємцем [GetCharacter('mor_abu_al_hasan_ali').GetName].\n\nОднак, це не єдині проблеми для [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip], оскільки його стосунки з його коханою коханкою, [GetCharacter('cas_leonor_guzman').GetName], та [GetCharacter('cas_alfonso_xi_burgundy').GetHerHis] дітьми від [GetCharacter('cas_leonor_guzman').GetHerHis] зруйнували стосунки з фактичною дружиною короля, [GetCharacter('cas_maria_portugal').GetName], дочкою [GetCharacter('por_afonso_iv_portugal').GetName]. Оскільки остання живе окремо від [GetCountry('CAS').GetGovernment.GetRulerTitle], цей розкол у королівській родині тепер залишає нависле питання про те, хто саме успадкує його, коли він помре.\n\nЧи зможуть [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip] та його наступники впоратися з цими загрозами для [GetCountry('CAS').GetLongNameWithNoTooltip], як вдома, так і за кордоном?"
  country_history_CHA: "[GetCountry('CHA').GetName] — це сукупність багатьох різних, дещо автономних чамських держав, які об'єдналися, щоб утворити єдиний [GetCountry('CHA').GetFlavorRank]. Будучи єдиною [ShowReligionAdjective('hindu')] державою на материковій частині [ShowRegionName('indochina_region')], народ [GetCountry('CHA').GetLongNameWithNoTooltip] постійно стикається з загрозою з боку занепадаючого [GetCountry('KHM').GetLongName] на заході та агресивного [GetCountry('DAI').GetLongName] на півночі. Незважаючи на ці зовнішні загрози, морська майстерність [GetCountry('CHA').GetAdjectiveWithNoTooltip] народу дозволила їм накопичити багатство та владу над морями [ShowRegionName('indonesia_region')].\n\nКолись конгломерат розрізнених груп, [GetCountry('CHA').GetName] розквітнув у витончену силу, з якою слід рахуватися, але чи займе він своє законне місце як правитель усіх націй?"
  country_history_CHI: "Заснована [GetCharacter('kublai_khan').GetName], [GetCountry('CHI').GetLongName] тепер контролює величезні простори великої $rank_empire$. Приборкавши $china$ і процвітаючи під легендарним керівництвом [GetCharacter('kublai_khan').GetShortNameWithNoTooltip], вони досягли стратосферних висот престижу та пишноти.\n\nОднак їхній вплив на субконтинент слабшає. Внутрішні чвари, нестабільність та культурні тертя роз'їли те, що колись було процвітаючим та чудовим, і ті, хто бажає скинути [GetCountry('CHI').GetNameWithNoTooltip] та узурпувати їхній мандат, збирають свої сили. Змовники та інтригани в межах кордонів [GetCountry('CHI').GetNameWithNoTooltip] шукають будь-яку можливу слабкість у правлінні $rank_empire$, змагаючись за крихти влади та мимохідну згадку в сувоях історії. Але хоча багато хто може боротися і померти за честь, лише один лідер може сидіти на Драконовому Троні та виконувати волю Небес."
  country_history_CHK: "Місто [ShowLocationName('cahokia')], поселення, побудоване на злитті священних річок і благословенне родючими землями, виросло і перетворилося на складне суспільство. Життя в [ShowLocationNameWithNoTooltip('cahokia')] обертається навколо вирощування навколишньої родючої долини, де височіють Три Сестри — кукурудза, квасоля та гарбуз, а також навколо підкорення правлінню [GetCountry('CHK').GetGovernment.GetEstateName('clergy_estate')], які є плідними будівниками храмів. Культура [ShowCultureName('cahokia_culture')] поширилася по всій навколишній території, створивши величезну сферу впливу та залучаючи нових мешканців з усього регіону.\n\nВраховуючи наше суворо організоване суспільство та високо впливову культуру, ми піднялися до позиції, про яку більшість інших народів можуть лише мріяти. Однак, ми ще можемо зіткнутися з непереборними, непередбачуваними загрозами. Чи зможемо ми далі будувати та розвивати наше суспільство, чи наші слави будуть втрачені та забуті назавжди?"
  country_history_CSU: "Керовані богом сонця Інті, перші з наших лідерів заснували [ShowLocationName('qusqu')] саме на тому місці, де його золотий посох занурився в землю. Після століть співіснування з іншими групами, [ShowCultureName('inca_culture')] нарешті досягли панування, і ми утвердилися як нащадки цього прекрасного місця. Високі вулкани та бурхливі річки Андських гір захищають і живлять Священну Долину інків, де ми, сини Сонця, живемо в нашому чудовому місті і готуємося до славетного майбутнього, що чекає на нас. Від нашого високого гірського бастіону до наших багатих терасових сільськогосподарських угідь, інші нації можуть лише заздрісно дивитися на наші багатства.\n\nПісля років консолідації влади та політики настав час для нашого народу розширити свій вплив за межі нашої дорогоцінної долини; перемогти наших ворогів і йти гірськими стежками, доки ми не станемо в кожному куточку цього світу. Чи готові ми зустріти цю долю? Чи переможуть нас наші вороги, перш ніж ми досягнемо свого розквіту?"
  country_history_DAI: "Виникнувши після громадянської війни з династією Нго в 968 році, [GetCountry('DAI').GetLongName] з тих пір постійно бореться проти сфери впливу $chinese_group$ Імперії, що швидко розширюється на півночі. Хоча вони є частиною [GetUniqueInternationalOrganization('middle_kingdom').GetName], [GetCountry('DAI').GetCulture.GetName] народу доводилося захищати свої землі від [GetCountry('CHI').GetCulture.GetName] загарбників неодноразово, що породило сильні, довготривалі образи.\n\nКрім зовнішніх загроз, [GetCountry('DAI').GetFlavorRank] також стикається з проблемами, спричиненими сильно децентралізованою державою, з додатковими викликами, викликаними як [ShowEstatePrivilegeName('peasants_autonomous_villages')], так і нестабільним придворним життям, де ворожі актори постійно прагнуть захопити [GetCountry('DAI').GetAdjectiveWithNoTooltip] трон.\n\nНезважаючи на всі ці перешкоди, [GetCountry('DAI').GetNameWithNoTooltip] опиняється в сприятливій ситуації, оскільки [GetCountry('CHA').GetLongName] оточений ворогами і готовий до захоплення, а [GetCountry('KHM').GetName] стикається з внутрішнім занепадом на всіх фронтах. Це має бути знаком того, що сходження [GetCountry('DAI').GetFlavorRank] до наймогутнішої імперії в [ShowRegionName('indochina_region')] нарешті наближається!"
  country_history_DAN: "Довгий час будучи потужним гравцем на світовій арені, [GetCountry('DAN').GetLongName] тепер опинилася в досить скрутному становищі. Під час попереднього правління [GetCharacter('dan_chistopher_ii').GetName] значні частини країни були закладені видатним членам [ShowCultureName('danish')] та [ShowCultureGroupName('german_group')] [ShowEstateTypeName('nobles_estate')], [GetCountry('SLV').GetLongName] було насильно відокремлено від коронних земель, і навіть територію [GetCountry('SKE').GetName] довелося продати [GetCountry('SWE').GetLongName]. Цей ганебний стан справ погіршився, коли [GetCharacter('dan_chistopher_ii').GetNameWithNoTooltip] був скинутий [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetName] після встановлення його власного племінника [GetCharacter('dan_valdemar_iii').GetName] на трон, лише для того, щоб зрештою бути повернутим знову як маріонетковий король. Зі смерті [GetCharacter('dan_chistopher_ii').GetShortNameWithNoTooltip] [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetShortNameWithNoTooltip] був де-факто правителем [GetCountry('DAN').GetNameWithNoTooltip].\n\nПодолати цю ситуацію буде нелегко, але [GetCountry('DAN').GetAdjective] стійкі та рішучі, і [GetCharacter('dan_valdemar_atterdag').GetName], син [GetCharacter('dan_chistopher_ii').GetShortNameWithNoTooltip], вже розробляє план відновлення авторитету [GetCountry('DAN').GetFlavorRank]. Чи буде він успішним, ще належить побачити."
  country_history_DHM: "[GetCountry('DHM').GetLongName] — це не звичайне володіння, а [GetCountry('DHM').GetFlavorRank] під владою [GetCountry('ENG').GetLongName], де [GetCountry('DHM').GetGovernment.GetRulerTitle] править з майже королівською владою. Наділений повноваженнями збирати армії, карбувати монети та здійснювати правосуддя, єпископ [ShowLocationName('durham')] діє як світський князь над своїм володінням у [ShowAreaName('northumbria_area')].\n\nПротягом поколінь ця виняткова автономія дозволяла єпископам охороняти північний кордон від [GetCountry('SCO').GetAdjective] набігів, їхня укріплена резиденція в [ShowLocationNameWithNoTooltip('durham')] була бастіоном вірності серед прикордонних земель.\n\nПроте часи невизначені. Кордон стає неспокійним, [GetCountry('SCO').GetName] залишається ворожим, і навіть серед [GetCountry('DHM').GetGovernment.GetEstateName('clergy_estate')] ширяться чутки про реформи та амбіції. Хоча [GetCountry('DHM').GetFlavorRank] [ShowLocationNameWithNoTooltip('durham')] одягнений у священні шати, він є політичною істотою — і такою, яка ще може зіграти більшу роль у справах королівства.\n\nЧи залишиться [GetCountry('DHM').GetFlavorRank] тихим куточком королівської служби, чи може він стати самостійною силою, великим північним королівством у всьому, крім назви?"
  country_history_DLH: "Серія швидких і рішучих завоювань у минулому столітті породила наш великий [GetCountry('DLH').GetLongName]. З територіями під нашою юрисдикцією, що простягаються від [ShowRegionName('deccan_region')] до родючих полів [ShowLocationName('lahore')], жодна інша цивілізація не може зрівнятися з нашими престижними досягненнями.\n\nОднак стало очевидним, що ми надмірно розширили свою владу над таким величезним [GetCountry('DLH').GetFlavorRank]; зараз її стає все важче контролювати. Наших ворогів багато, і вони прагнуть звести нанівець нашу вищу спадщину та витончену культуру. На сході наші піддані в [ShowAreaName('bengal_area')] почали ставити під сумнів своїх господарів, тоді як наші південні території давно оскаржували наше панування над ними. А [ShowReligionAdjective('hindu')] країни Південної $india$ можуть ще більше посилити свій опір нашому правлінню, очолювані зростаючою силою [GetCountry('VIJ').GetName].\n\nХоча ця ситуація здається небезпечною, ми довіряємо керівництву [GetCharacter('dlh_muhammad_bin_tughluq').GetName], чиє пильне око може захистити наші землі від загроз і таким чином запобігти нашому падінню..."
  country_history_DMS: "[GetCountry('DMS').GetLongName] лежить у суворих південно-західних районах Ірландії. Хоча далеко від [ShowLocationName('dublin')], це не віддалена глушина — ним править [GetCharacter('dms_maurice_fitzgerald').GetName], 1-й граф Десмонд, голова південної гілки могутньої [ShowDynastyName('fitzgerald_dynasty')], і один з наймогутніших лордів у всій [ShowRegionName('ireland_region')].\n\nОтримавши своє графство в 1329 році, він викроїв напівнезалежний домен з гаельських вождів [GetCountry('THO').GetName] та англійської королівської влади [GetCountry('PLE').GetName].\n\nГрафство відзначається мінливими союзами, суперницькими баронами-маршалами та постійною напругою як з Дубліном, так і з Лондоном. Оскільки англійська королівська влада на заході слабшає, ми можемо скористатися можливістю, щоб утвердити автономію, налаштувати гаельські клани один проти одного або навіть претендувати на королівство у всьому, крім назви.\n\nЧи стане Десмонд опорою нового іберно-нормандського відродження? Або його поглине хвиля гаельської реконкісти та ворожнечі суперницьких династій?"
  country_history_ENG: "[GetCountry('ENG').GetAdjective] корона все ще оговтується від підступного повстання, що сталося десять років тому і призвело до підступного вбивства [GetCharacter('eng_edward_ii').GetShortName]. Хоча ватажків було страчено, кільком співучасникам було даровано милосердя в ім'я миру — миру, який легко може бути зруйнований у будь-який момент.\n\nТим часом, спадкоємець [GetCharacter('eng_edward_ii').GetShortName], що вижив, [GetCharacter('eng_edward_iii').GetShortName], вже довів, що є здібним молодим правителем, і робить сміливі плани щодо [GetCountry('FRA').GetAdjective] трону — трону, який є його правом народження як онука правителя [ShowDynastyName('capet_dynasty')].\n\nНа півночі, оманливий [GetCountry('SBL').GetName] слабко бореться за [GetCountry('SCO').GetAdjective] корону, тоді як наші вірні васали міцно тримають уряд [GetCountry('WLS').GetName], [GetCountry('PLE').GetName] та [GetCountry('AQN').GetName].\n\nЯк ми переживемо бурхливі роки, що настануть? Чи перетнемо ми канал і станемо континентальною державою, чи нам слід шукати світового панування на морях?"
  country_history_ERE: "Заснована [GetCharacter('ere_eretna').GetName], ільханідським офіцером [ShowCultureName('uyghur_culture')] походження, ця бейлікська держава виникла після його перемоги в битві при Каранбюку проти [ShowCultureName('mongolian_culture')] воєначальників. Оголосивши незалежність від своїх колишніх сюзеренів, [GetCharacter('ere_eretna').GetNameWithNoTooltip] став султаном і за своє процвітаюче правління отримав прізвисько #italic Кьосе Пейгамбер#!, «Безбородий Пророк». $anatolia_desc$"
  country_history_ETH: "[GetCountry('ETH').GetLongName] — це стародавня земля, багата історією та традиціями. Розташована на Африканському Розі, вона може похвалитися пишними високогір'ями, вітряними плато та незрівнянною Великою рифтовою долиною. Новачки зачаровані її красою, захоплені золотими заходами сонця на тлі Симієнських гір.\n\nЧарівний гобелен [GetCountry('ETH').GetNameWithNoTooltip] сплітає різноманітні етнічні групи, такі як [ShowCultureName('amhara')], [ShowCultureName('afar_culture')] та [ShowCultureName('tigre')]. Об'єднані випробуваннями, [GetCountry('ETH').GetNameWithNoTooltip] залишається стійкою, як стародавнє баобабове дерево, витримуючи випробування часом.\n\nНатхненна цими стародавніми витоками, [GetCountry('ETH').GetNameWithNoTooltip] плекає легендарні союзи, такі як союз цариці Савської та царя Соломона. Спадщина їхнього сина Менеліка, першого члена [ShowDynastyName('solomonid_dynasty')] династії, відлунює крізь століття, пов'язуючи людей цієї землі зі стародавніми ізраїльтянами.\n\nПротягом років епічна історія [GetCountry('ETH').GetNameWithNoTooltip] розгортається, формуючись долею та непохитним духом її народу. Тріумфи та випробування сплітають багатий гобелен життєвих припливів та відпливів.\n\nОднак ця нація є царством, оточеним супротивниками, які з нетерпінням чекають будь-якої можливості завдати удару. Впоратися не тільки з виживанням, а й з процвітанням, буде викликом."
  country_history_EWY: "Розташоване на прикордонних землях між [ShowAreaName('wales_area')] та серцем [GetCountry('ENG').GetLongName], [GetCountry('EWY').GetLongName] займає життєво важливе стратегічне положення як одне з маршових володінь, якому доручено охороняти західний кордон королівства.\n\nНинішній правитель, [GetCharacter('eng_bartholomew_burghersh_the_elder').GetName], є вірним слугою Корони та ветераном як війни, так і придворного життя. Довірений слуга [GetCharacter('eng_edward_iii').GetShortName], він проявив себе не лише на полі бою, а й як королівський посланник та адміністратор, час від часу виконуючи обов'язки констебля [ShowLocationName('dover')] та охоронця П'яти Портів. Його земельна влада в Маршах дає йому як багатство, так і вплив, хоча він завжди пильний щодо мінливих лояльностей та амбіцій, які визначають регіон.\n\nЧи збереже лінія [ShowDynastyName('burghersh_dynasty')] свою прихильність до [ShowDynastyNameWithNoTooltip('burghersh_dynasty')] та охоронятиме Марші з честю? Або мінливі хвилі політики, війни та спадщини зметуть цю маршову фортецю?"
  country_history_FLO: "[GetCountry('FLO').GetAdjective] домен міцно стоїть на порозі нової епохи! Наша республіка витримала випробування часом і розташована в ідеальному місці, щоб скористатися процвітанням і багатством нашого регіону. Навколо нас конкуруючі держави та потенційні союзники роблять свої кроки, намагаючись впливати та розширювати свої території в [ShowRegionName('italy_region')].\n\nОднак мало хто так відомий своєю схильністю до мистецтв та культурного впливу, як ті, хто перебуває на наших форумах думки в [GetCountry('FLO').GetName]. Під керівництвом здібної адміністрації та освіченого населення наступне століття піднесе наш народ і змусить нас яскраво сяяти як піонерів-інноваторів у часи великого просвітництва. За умови, що ми, звичайно, утвердимося як такі..."
  country_history_FRA: "Смерть [GetCharacter('fra_charles_iv_capet').GetShortName] без спадкоємця чоловічої статі в 1328 році ознаменувала кінець правління [ShowDynastyName('capet_dynasty')] над [GetCountry('FRA').GetLongName], що призвело до коронації [GetCharacter('fra_philip_vi_valois').GetName], родича з колишньої молодшої гілки династії. Однак ця претензія була оскаржена [GetCharacter('eng_edward_iii').GetName] з [GetCountry('ENG').GetName] під приводом того, що хоча [ShowHeirSelectionName('salic_law')] [GetCountry('FRA').GetNameWithNoTooltip] забороняє передачу трону жіночій наступниці, вона не забороняє успадкування через жіночу лінію. Як син [GetCharacter('eng_isabella_of_france').GetName], останньої живої сестри [GetCharacter('fra_charles_iv_capet').GetShortNameWithNoTooltip], [GetCharacter('eng_edward_iii').GetShortNameWithNoTooltip] може претендувати на трон [GetCountry('FRA').GetNameWithNoTooltip] як своє право народження.\n\nНапруга між обома країнами погіршилася за останні роки, оскільки наша гостинність вигнаного молодого правителя [GetCountry('SCO').GetName], [GetCharacter('sco_david_ii').GetName], розлютила [GetCountry('ENG').GetAdjectiveWithNoTooltip] двір, який підтримує суперника [GetCountry('SBL').GetName], претендента на [GetCountry('SCO').GetAdjectiveWithNoTooltip] трон. У відповідь [GetCharacter('eng_edward_iii').GetShortNameWithNoTooltip] також нещодавно надав притулок [GetCharacter('eng_robert_iii_artois').GetName], який уникнув викликів до суду в [ShowLocationName('paris')] за його спроби захопити [GetCountry('ARS').GetLongName]. Ходять чутки, що [GetCharacter('eng_robert_iii_artois').GetShortNameWithNoTooltip] навіть заохочує незадоволеного [GetCharacter('eng_edward_iii').GetShortNameWithNoTooltip] військовим шляхом висунути свої претензії на трон [GetCountry('FRA').GetNameWithNoTooltip].\n\nЯкщо відносини досягнуть критичної точки, [GetCharacter('fra_philip_vi_valois').GetShortNameWithNoTooltip] може знадобитися підтримка його підданих, хоча більше ніж один амбітний [ShowSubjectTypeName('appanage')] зі старої королівської лінії може скористатися можливістю вимагати більших привілеїв, що стане більшою загрозою для стабільності корони, ніж будь-який претендент-загарбник. Наступні роки будуть вирішальними для майбутнього [GetCountry('FRA').GetNameWithNoTooltip], якому доведеться одночасно протистояти зовнішній [GetCountry('ENG').GetAdjectiveWithNoTooltip] загрозі та гордим [GetCountry('FRA').GetAdjectiveWithNoTooltip] лордам. Чи впаде країна перед фальшивими претендентами, чи стане головною силою в [ShowContinentName('europe')]?"
  country_history_GEN: "Місто [ShowLocationName('genoa')] виділяється як найважливіший комерційний порт у [ShowAreaName('western_mediterranean_sea_area')], його [GetCountry('GEN').GetGovernment.GetGovernmentType.GetName] значно розширив свій вплив за кордоном через торгівлю та війну.\n\nПісля перемоги над [GetCountry('PIS').GetLongName] воно отримало острів Корсика та заснувало плацдарм у [ShowAreaName('sardinia_area')]. Однак це могло бути отруйним подарунком, оскільки [ShowLocationNameWithNoTooltip('genoa')] тепер може зіткнутися не лише з опором своїх мешканців, а й з [GetCharacter('ara_peter_iv_arago').GetName], самопроголошеним сувереном обох островів.\n\nЩе одна проблема може виникнути зі сходу, оскільки наша широка мережа створила умови для комерційного панування над [ShowAreaName('black_sea_area')], зосередженого навколо порту [ShowLocationName('kaffa')], хоча небезпечні сусіди, такі як [GetCountry('VEN').GetName], [GetCountry('BYZ').GetName] або [GetCountry('GLH').GetLongName], можуть становити загрозу.\n\nПокладаючись на наші численні [ShowBuildingTypeName('fondaco')] та заможних банкірів, чи зможе [GetCountry('GEN').GetNameWithNoTooltip] подолати ці виклики?"
  country_history_GRM: "Виникнувши з залишків Сельджуцької імперії, [GetCountry('GRM').GetName] міцно закріпився в регіоні під керівництвом [GetCharacter('grm_yakub_i').GetName]. Після повстання проти Сельджуцької влади в 1283 році наш великий народ нарешті досяг миру в 1314 році, отримавши вражаючий набір територій, включаючи життєво важливе місто [ShowLocationName('ankara')]. $anatolia_desc$"
  country_history_HUN: "Протягом століть велика [GetCountry('HUN').GetLongName] захищала цей бастіон [ShowReligionName('catholic')] від язичників та невірних, що загрожували ззовні. Недавні повстання серед [GetCountry('HUN').GetGovernment.GetEstateName('nobles_estate')] поставили цей обов'язок під загрозу, але завдяки залізній руці [GetCountry('HUN').GetGovernment.GetRuler.GetName] незадоволені [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] були приборкані, а [GetCountry('HUN').GetAdjective] віра була оновлена та зміцнена.\n\nОднак майбутнє [GetCountry('HUN').GetNameWithNoTooltip] не полягає в мирі, оскільки на південному сході вже назрівають нові проблеми, які кинуть виклик силі #italic Regnum Marianum#!.\n\nЯка доля чекає на [GetCountry('HUN').GetLongNameWithNoTooltip]? Чи впаде вона перед ворогами праведних? Чи стоятиме гордо перед натиском тих, хто прагне її загибелі?"
  country_history_JAP_common: "Після тривалого періоду миру під Камакурським сьогунатом, острови Японії знову були втягнуті у війну під час [GetCountry('MGE').GetAdjective] вторгнень. Це послабило владу $JAPANESE_SHOGUNATE_LEADER_MALE$ до такої міри, що [GetCountry('STC').GetGovernment.GetRuler.GetName] зміг відібрати у нього контроль над країною. Однак наміри [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] відновити імперське правління не здійснилися, оскільки [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] колишній союзник [GetCountry('JAP').GetGovernment.GetRuler.GetName] натомість заснував новий [GetUniqueInternationalOrganization('japanese_shogunate').GetName]."
  country_history_JAP: "$country_history_JAP_common$\n\nТепер [GetCountry('JAP').GetGovernment.GetRuler.GetNameWithNoTooltip] править країною після того, як [GetCountry('STC').GetGovernment.GetRuler.GetShortNameWithNoTooltip] втік зі столиці та оселився в [GetCountry('STC').GetCapital.GetName]. Однак боротьба між центральним урядом та втікаючим імператором далека від завершення..."
  country_history_NTC: "$country_history_JAP_common$\n\nТепер [GetCountry('JAP').GetGovernment.GetRuler.GetNameWithNoTooltip] призначив [GetCountry('NTC').GetGovernment.GetRulerOrHeirIfRegent.GetName] своїм [GetCountry('NTC').GetGovernment.GetRulerTitle] у [GetCountry('NTC').GetCapital.GetName], але знову ж таки як просту маріонетку, підпорядковану верховній владі [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]."
  country_history_STC: "$country_history_JAP_common$\n\nПо суті, живучи у вимушеному вигнанні зі столиці, [GetCountry('STC').GetGovernment.GetRuler.GetShortNameWithNoTooltip] опиняється в становищі, коли [GetCountry('STC').GetGovernment.GetRuler.GetHerselfHimself] доводиться збирати підтримку для [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] справи, якщо [GetCountry('STC').GetGovernment.GetRuler.GetHeSheFormal] хоче вижити та знову кинути виклик владі [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]. Настав час піднятися — або впасти."
  country_history_japanese_clan_common: "$country_history_JAP_common$\n\nРозрізнені клани тепер бачать себе розділеними у своїй вірності."
  country_history_japanese_clan_north: "$country_history_japanese_clan_common$ Як вірний прихильник [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] та [GetCountry('NTC').GetLongName], цей клан виступає проти втікача [GetCountry('STC').GetGovernment.GetRuler.GetNameWithNoTooltip] та [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] претензії на Хризантемний Трон."
  country_history_japanese_clan_south: "$country_history_japanese_clan_common$ Як вірні прихильники вигнаного [GetCountry('STC').GetGovernment.GetRuler.GetNameWithNoTooltip] та [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] законної претензії на Хризантемний Трон, вони опиняються проти влади [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]."
  country_history_KAR: "Як найбільший залишок колись великої імперії, ми стоїмо на порозі боротьби за владу в нашому регіоні. Нові амбітні бейлики піднімаються і роблять свої ставки на владу, мріючи об'єднати роздроблений народ після розпаду Руму. Відкриті канали зв'язку та дипломатії з володарями [ShowLocationName('cairo')] благословили нашу скарбницю та легітимізували наше правління, тоді як багато процвітаючих місць, таких як [ShowLocationName('konya')] та [ShowLocationName('ermenek')], залишаються під нашим контролем. $anatolia_desc$"
  country_history_KBO: "На світанку XIV століття останні залишки [ShowDynastyName('sayfawa_dynasty')] борються між собою за крихти влади, тримаючись за ту невелику легітимність, що залишилася, чіпкими, відчайдушними руками.\n\n[GetCharacter('kbo_salmama').GetShortName] наполегливо намагається зберегти наш народ об'єднаним, навіть коли внутрішні та зовнішні загрози діють з тіні. Це, безумовно, бурхливий час, який озброїть наш народ рішучістю рухатися вперед і розвиватися... або, можливо, розірве нас на частини, залишивши нас лише приміткою в анналах історії."
  country_history_KHM: "Велика [GetCountry('KHM').GetLongName] століттями існувала як безперечний центр [ShowRegionName('indochina_region')]. Відтоді, як вони навернулися до [ShowReligionName('theravada')], [GetCountry('KHM').GetNameWithNoTooltip] повільно втрачала свою владу над безроздільним правлінням регіону. Зростаючі сили як на схід, так і на захід від старої столиці [ShowLocationName('angkor')] загрожують порушити динаміку влади всієї [ShowRegionNameWithNoTooltip('indochina_region')].\n\nОбтяжена складним утриманням своїх іригаційних систем та великих храмових комплексів, [GetCountry('KHM').GetNameWithNoTooltip] повинна буде захищатися від іноземного вторгнення, щоб вижити та відновити свою позицію гегемона [ShowRegionNameWithNoTooltip('indochina_region')]."
  country_history_KNI: "[GetCountry('KNI').GetName] завоював острів [ShowLocationName('rodos')] на початку XIV століття, спонуканий падінням Акри в 1291 році, і заснував фортецю, яка допомогла б нам у нашій місії захисту [ShowReligionGroupAdjective('christian')] паломників. [ShowLocationNameWithNoTooltip('rodos')], мальовничий острів в [ShowAreaName('aegean_sea_area')], став процвітаючим центром для нашого [ShowGovernmentReformName('military_order_reform')], що відрізняється високими укріпленнями та жвавою економікою. Однак це процвітання дещо нівелюється безперервними атаками сусідніх [ShowReligionGroupAdjective('muslim')] флотів. Але ми продемонстрували надзвичайну стійкість, захищаючи [ShowLocationNameWithNoTooltip('rodos')] у запеклих битвах, які продемонстрували нашу військову доблесть та непохитну відданість.\n\nПроте майбутнє нашого Ордену виглядає похмурим, оскільки наші вороги стають все могутнішими, а роз'єднаність серед [ShowReligionAdjective('catholic')] країн поширюється. Відновлення Святої Землі здається згасаючою надією з кожним днем, але наша рішучість незламна, і ми будемо переслідувати цю мету, доки не впаде наш останній воїн."
  country_history_KOR: "Після досягнення національного об'єднання славне утворення [GetCountry('KOR').GetLongName] принесло золотий період процвітання та безпрецедентної єдності своєму народу. Мистецтво, грамотність, дипломатія та непохитна віра процвітали в цей легендарний час, назавжди змінивши культурний ландшафт [ShowRegionName('korea_region')].\n\nНавіть після підкорення [GetCharacter('kublai_khan').GetName], [GetCountry('KOR').GetNameWithNoTooltip] продовжує бути значною силою, як завдяки своєму високоосвіченому населенню, так і завдяки своїй могутній військово-морській силі.\n\nТепер вітри змін дмуть, оскільки корупція [ShowReligionGroupAdjective('buddhist')] ідеалів та мобілізуючі, революційні ідеї неоконфуціанства змінюють уми по всій країні. Чи перетвориться [GetCountry('KOR').GetNameWithNoTooltip] на найсильнішого солдата в армії [GetCountry('CHI').GetName], чи звільниться від цих кайданів і диктуватиме своє майбутнє?"
  country_history_LIT: "Розташована між землями [GetCountry('POL').GetName] та могутньою [GetCountry('GLH').GetLongName], [GetCountry('LIT').GetLongName] має горду історію як один з останніх бастіонів язичництва. Під династією [ShowDynastyName('gediminid_dynasty')] [GetCountry('LIT').GetAdjectiveWithNoTooltip] народ скуштував успіху, розширивши свої володіння, щоб охопити частини Київської Русі. Однак зростаючий тиск та тривалий хрестовий похід, очолюваний [GetCountry('TEU').GetLongName], [GetCountry('LIV').GetLongName] та [GetCountry('BOH').GetGovernment.GetRulerTitle] [GetCountry('BOH').GetName], слугують серйозними нагадуваннями про те, що релігійні тертя ще можуть сприяти їхній загибелі. Різні спроби прийняти [ShowReligionAdjective('catholic')] віру виявилися невдалими, а зростаюча напруга на наших кордонах загрожує нашій стабільності. Саме в цьому напруженому та небезпечному середовищі ми повинні визначити наші наступні кроки..."
  country_history_MAC: "[GetCountry('MAC').GetLongName], кероване амбітною династією [ShowDynastyName('mortimer_dynasty')], є одним з наймогутніших прикордонних лордств, що розкинулося на кордоні між [ShowAreaName('wales_area')] та [GetCountry('ENG').GetLongName].\n\nКолись піднесений до майже королівської влади, покійний [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetName] тримав [GetCountry('ENG').GetNameWithNoTooltip] у своїх руках як її [GetCountry('ENG').GetGovernment.GetActiveRegentTitle], посаду, яку він досяг, підступно вбивши [GetCharacter('eng_edward_ii').GetShortName]. Але амбіції виявилися фатальними — його було повалено в 1330 році та страчено, ім'я [ShowDynastyNameWithNoTooltip('mortimer_dynasty')] назавжди заплямоване як сім'ї узурпаторів та зрадників.\n\nТепер молодий [GetCharacter('eng_roger_mortimer_2nd_earl_of_march').GetName], спадкоємець цієї зганьбленої лінії, має успадкувати не лише величезні маєтки та прикордонний престиж, але й важкий тягар заплямованої спадщини. Хоча молодість поки що захищає [GetCharacter('eng_roger_mortimer_2nd_earl_of_march').GetHimHer], корона [GetCountry('ENG').GetNameWithNoTooltip] пильно стежить за молодим спадкоємцем.\n\nЧи зникне династія [ShowDynastyNameWithNoTooltip('mortimer_dynasty')] у шляхетній невідомості як прості землевласники, чи вони повернуть собі високий вплив, який колись мали по обидва боки кордону?"
  country_history_MAJ: "[GetCharacter('maj_raden_wijaya').GetName] заснував могутню [GetCountry('MAJ').GetLongName] на узбережжях [ShowRegionName('indonesia_region')]. Після смерті [GetCharacter('maj_raden_wijaya').GetHerHis] [GetCharacter('maj_jayanagara').GetName] взяв на себе королівські обов'язки, але виявився неефективним лідером, чиє правління було обтяжене численними внутрішніми та зовнішніми конфліктами, а також відкритими повстаннями, що оскаржували королівську владу.\n\nНа щастя, вбивство [GetCharacter('maj_jayanagara').GetShortNameWithNoTooltip] у 1328 році залишило кермо влади в країні в умілих руках [GetCharacter('maj_tribhuwana').GetName], як [GetCountry('MAJ').GetGovernment.GetActiveRegentTitle] для [GetCharacter('maj_tribhuwana').GetHerHis] сина, [GetCharacter('maj_hayam_wuruk').GetName]. Початок регентства [GetCharacter('maj_tribhuwana').GetHerHis] ознаменував початок нової ери для народу [GetCountry('MAJ').GetNameWithNoTooltip], під пильним і вмілим оком [GetCharacter('maj_gajah_mada').GetName], який нині служить #italic Махапаті#! — віце-[GetCountry('ENG').GetGovernment.GetActiveRegentTitle].\n\nСтало очевидним, що під правлінням таких здібних лідерів майбутнє цього [GetCountry('MAJ').GetFlavorRank] та його підданих виглядає світлим. Це справді може бути початком золотої доби для [GetCountry('MAJ').GetNameWithNoTooltip]!"
  country_history_MAL: "Могутній [GetCharacter('mal_musa_keita').GetName] з [GetCountry('MAL').GetName] вразив світ десять років тому, коли здійснив свій #italic Хадж#! («паломництво») до [ShowLocationName('mecca')]. Під час подорожі [GetCharacter('mal_musa_keita').GetNameWithNoTooltip] щедро витрачав золото на служіння вірі, будуючи молитовні будинки та здобуваючи блискучих нових підданих, коли [GetCharacter('mal_musa_keita').GetHeShe] подорожував. Така надзвичайна подія була записана літописцями та проголошена менестрелями, і вона допомогла встановити його славу як найбагатшої людини у світі, коли він здійснював свій #italic $zakah$#! («милостиню») скрізь, де проходив його довгий і розкішний придворний караван.\n\nЦей показ пишноти відображав незрівнянні багатства [GetCountry('MAL').GetNameWithNoTooltip] після того, як його [GetCountry('MAL').GetFlavorRank] розширився та консолідувався під династією [GetCountry('MAL').GetGovernment.GetRuler.GetDynasty.GetName], і допоміг створити величезні торговельні шляхи. Однак одного дня [GetCharacter('mal_musa_keita').GetShortNameWithNoTooltip] помре, і його наступникам може бути не так легко керувати його міфічним багатством та дуже різноманітними володіннями..."
  country_history_MAM: "Викувані у вогні революції та підтримувані мечами воїнів-рабів, привезених з [ShowRegionName('caucasus_region')], мамелюки постали з краху [GetCountry('HSN').GetName]. Під керівництвом таких відомих лідерів, як [GetCharacter('mam_baybars_ii').GetName], вони зупинили [ShowCultureGroupName('mongolian_group')] наступ біля [ShowLocationName('nablus')] у битві при Айн-Джалуті та завоювали останні фортеці хрестоносців [GetCountry('KOJ').GetLongName]. Тепер [GetCountry('MAM').GetLongName] є видатною [ShowReligionGroupAdjective('muslim')] силою у Східному Середземномор'ї, керуючи [ShowRegionName('egypt_region')] та [ShowAreaName('levant_area')] зі славетної столиці [ShowLocationName('cairo')].\n\nЛегітимізоване цими перемогами, їхнім захистом Святих Місць [ShowLocationName('mecca')] та [ShowLocationName('medina')], тіньовим халіфом, встановленим у [ShowLocationNameWithNoTooltip('cairo')], та ще більше збагачене торгівлею, правління [GetCharacter('mam_an_nasir_bahri').GetName] принесло рідкісну стабільність. Однак виживання [GetCountry('MAM').GetFlavorRank] залежить від лояльності його роздробленої військової еліти та навислої кризи престолонаслідування, яка регулярно загрожує зруйнувати цю сильну державу."
  country_history_MLO: "Політика Італійського півострова — це двосічний меч. Вороги та друзі, союзники та суперники... все це лише ідентичності, які надягаються та знімаються так само легко, як позолочена маска, і [GetCountry('MLO').GetName] не є винятком. Зосереджені навколо сильного міського центру [ShowLocationName('milano')], ми прагнемо проектувати свою силу на наші новозавойовані території навколо нас, одночасно захищаючись від зрадників на сході та заході. Внутрішньо, зростання автономних міст-держав, ймовірно, спричинить проблеми для нашої адміністрації та збереження нашого суверенітету. Коротше кажучи, загрози оточують нас, як кинджали вночі.\n\nОднак, незважаючи на небезпеки, [GetCountry('MLO').GetAdjective] позиція в цьому ворожому середовищі досить вигідна. Ми можемо здобути неймовірну кількість слави та престижу, якщо нам вдасться придушити як внутрішні, так і зовнішні небезпеки, за умови, що у нас буде сильне та єдине керівництво, яке нас поведе."
  country_history_MOR: "[ShowRegionName('maghreb_region')] бачив піднесення та падіння багатьох династій та однієї могутньої [GetCountry('MOR').GetFlavorRank] за іншою, від Ідрісидів до Альморавідів та Альмохадів. Але ця епоха нестабільності та невизначеності нарешті закінчилася під династією [ShowDynastyName('marinid_dynasty')] та правлінням [GetCharacter('mor_abu_al_hasan_ali').GetName]. Завдяки ретельному балансу військової могутності та дипломатичної майстерності ми нарешті забезпечили міцний контроль у межах наших кордонів.\n\nТепер наші амбіції звертаються на схід, де ми прагнемо кинути виклик домінуванню [ShowDynastyName('zayyanid_dynasty')] з [GetCountry('TLE').GetName]. А на півночі ми утримуємо стратегічний плацдарм через [ShowLocationName('strait_of_gibraltar')], від [ShowLocationName('algeciras')] до [ShowLocationName('ronda')], де ми стоїмо в солідарності з нашими братами по вірі з [GetCountry('GRA').GetName] у спільній боротьбі проти [ShowReligionGroupAdjective('christian')] правителів [ShowRegionName('iberia_region')]. Наш шлях вперед не буде легким, але ми маємо силу та рішучість, щоб подолати будь-які перешкоди."
  country_history_MOS: "[GetCountry('MOS').GetLongName] стоїть на роздоріжжі політичних маневрів, економічних проблем під [GetUniqueInternationalOrganization('tatar_yoke').GetName] та тривалої боротьби за владу серед [ShowCultureGroupName('russian_group')] князівств, кожне з яких прагне до верховенства на роздроблених руських територіях. [ShowCultureGroupName('tatar_group')] вторгнення продовжує кидати довгу тінь на регіон, і [GetCountry('MOS').GetNameWithNoTooltip], як і багато інших руських князівств, залишається данником грізної [GetCountry('GLH').GetName].\n\nКерує [GetCountry('MOS').GetNameWithNoTooltip] через ці складнощі [GetCountry('MOS').GetGovernment.GetRuler.GetName], лідер, який добре усвідомлює делікатний баланс, необхідний для виживання під [ShowCultureGroupNameWithNoTooltip('tatar_group')] пануванням. [GetCountry('MOS').GetGovernment.GetRuler.GetSheHe|U] вміло керував справами князівства за допомогою дипломатичних ініціатив та стратегічних союзів і тепер прагне консолідувати владу та підвищити становище [GetCountry('MOS').GetNameWithNoTooltip] у Ярмі, з прагненням об'єднати руські землі під одним прапором."
  country_history_NAP: "[GetCountry('NAP').GetLongName] стоїть на роздоріжжі власної неспокійної історії. Народжене з амбіцій могутніх династій, що прагнули панування над землями південної Італії, [GetCountry('NAP').GetNameWithNoTooltip] постає як бастіон стійкості та культурного злиття, що простягається від стародавніх цивілізацій, таких як греки та римляни, до новітніх династій Отвілів, [ShowDynastyName('hohenstaufen_dynasty')] та [ShowDynastyName('anjou_dynasty')], кожна з яких залишила незгладний слід в [GetCountry('NAP').GetAdjectiveWithNoTooltip] ідентичності.\n\nУ 1337 році Королівство опиняється під владою далекоглядного лідера, [GetCountry('NAP').GetGovernment.GetRuler.GetName]. Мудрий і справедливий правитель, відомий своєю мудрістю та гострим розумом, [GetCountry('NAP').GetGovernment.GetRuler.GetHeShe] майстерно орієнтувався в складній мережі політичних союзів. Його правління принесло період відносного миру та бажаний перепочинок від минулих потрясінь.\n\nЩо станеться з [GetCountry('NAP').GetNameWithNoTooltip], коли його тверда рука ослабне? Що зробить його наступник, щоб відбити всіх тих, хто прагне [GetCountry('NAP').GetAdjectiveWithNoTooltip] земель? Історія майбутнього [GetCountry('NAP').GetNameWithNoTooltip] ще не написана..."
  country_history_NAV: "Спочатку засноване [GetCharacter('nav_inigo_arista').GetName] навколо міста [ShowLocationName('pamplona')] як #italic Королівство Памплона#!, [GetCountry('NAV').GetLongName] залишило свої славні дні позаду, тепер територіально обмежене між великими сусідами, які дивляться на його землі з ненажерливою жадібністю. Народжене як [ShowCultureName('basque')] марка Каролінзької імперії, королівство бачило піднесення та падіння місцевих династій та їхню заміну [ShowCultureName('french')] династіями, що неминуче схилило долю королівства до [GetCountry('FRA').GetLongName].\n\nБез відкритих шляхів розширення та під таким сильним культурним тиском, чи зможе [GetCountry('NAV').GetLongNameWithNoTooltip] протистояти могутнішим навколишнім націям та відновити свою минулу славу?"
  country_history_NOV: "Спочатку засноване [ShowCultureGroupName('slavic_group')] та норвезьким народом як #italic Холмгард#!, «нове місто» [ShowLocationName('novgorod')] стало головним політичним та економічним центром у північних землях, населених [ShowCultureGroupName('russian_group')] народом. Завзято незалежний, [GetCountry('NOV').GetAdjective] [GetCountry('NOV').GetGovernment.GetParliament.GetName] обирає свого [GetCountry('NOV').GetGovernment.GetRulerTitle] серед сусідніх правителів, хоча справжня влада належить його народу, який процвітає завдяки прибутковим торговельним шляхам, що з'єднують багаті внутрішні пункти збору ресурсів з Балтійським та Білим морями.\n\nОднак в останні десятиліття війна зі [GetCountry('SWE').GetName] була майже постійною, хоча її було зупинено створенням буферної держави [GetCountry('ORE').GetName]. Тим часом на півдні [GetCountry('MOS').GetName] стала домінуючою силою за підтримки [GetCountry('GLH').GetLongName]. Горді жителі [ShowLocationNameWithNoTooltip('novgorod')] незабаром можуть опинитися на роздоріжжі, змушені приймати складні — але вирішальні — рішення, щоб захистити свій дім."
  country_history_PAL: "$country_history_german_group$\n\nПісля того, як Павійський договір забезпечив незалежність та електорат для [GetCountry('PAL').GetLongName], [GetCharacter('pal_rudolf_ii_wittelsbach').GetName] тепер потрібно буде зосередити [GetCharacter('pal_rudolf_ii_wittelsbach').GetHisHer] зусилля на зміцненні [GetCharacter('pal_rudolf_ii_wittelsbach').GetHisHer] розділеної території. На берегах Рейну розташований політичний центр [GetCountry('PAL').GetName] з його родючими ґрунтами та заможними торговцями, що проходять через нього, тоді як так званий #italic Верхній Пфальц#! представляє тісний зв'язок з нашим [GetCountry('PAL').GetGovernment.GetRuler.GetDynasty.GetName] корінням у $BAV$.\n\nКуди б не спрямував свою увагу [GetCountry('PAL').GetNameWithNoTooltip], країна повинна подолати виклики своїх регіональних суперників, якщо вони прагнуть не бути на милості ще сильніших ворогів."
  country_history_PAP: "З моменту свого створення рукою самого святого Петра, [ShowReligionAdjective('catholic')] Церква протягом століть вела людство до спасіння під керівництвом єпископа [ShowLocationName('rome')], [GetCountry('PAP').GetGovernment.GetRulerTitle]. Починаючи з #italic Дару Піпіна#!, благословенна [GetCountry('PAP').GetName] виникла з наміром як керувати, так і допомагати вірним.\n\nОднак останні кілька десятиліть були постійною боротьбою. Смерть [GetCharacter('pap_boniface_viii').GetName] змусила двір переїхати до ексклаву [ShowLocationName('avignon')], де ми потрапили під вплив [GetCharacter('fra_philippe_iv_capet').GetName]. Крім того, наші володіння в [ShowRegionName('italy_region')] стали домінувати ворогуючі шляхетні родини.\n\nЩо повинен зробити намісник Христа, щоб вирішити цю виняткову ситуацію? Чи стане [GetCountry('PAP').GetGovernment.GetRuler.GetHeShe] повністю маріонеткою [GetCountry('FRA').GetLongName] і дозволить світському керувати духовним? Або [GetCountry('PAP').GetGovernment.GetRuler.GetHeShe] звільниться і підніметься до позиції на вершині Творіння, яку [GetCountry('PAP').GetReligion.GetGodName] призначив для Церкви?"
  country_history_POL: "Протягом століть [GetCountry('POL').GetLongName] опинялася в епіцентрі династичних спадкоємств, війн та мінливих кордонів. Нинішній правитель, [GetCharacter('pol_casimir_iii_piast').GetName], розпочав своє енергійне правління у 1333 році, але, незважаючи на його спроби об'єднання, багато [GetCountry('POL').GetAdjectiveWithNoTooltip] підданих залишаються непокірними, намагаючись захистити свою заповітну автономію від дипломатичних маневрів нового [GetCountry('POL').GetGovernment.GetRulerTitle]. Проте, прагнучи запровадити відповідні законодавчі та соціальні зміни, [GetCharacter('pol_casimir_iii_piast').GetShortNameWithNoTooltip] вже встановив права [ShowReligionAdjective('judaism')] меншини, а також [GetCountry('POL').GetAdjectiveWithNoTooltip] [GetCountry('POL').GetGovernment.GetEstateName('peasants_estate')], за що [GetCountry('POL').GetGovernment.GetRuler.GetHimHer] отримав титул «Селянський [GetCountry('POL').GetGovernment.GetRulerTitle]».\n\nОднак війна проти [GetCountry('TEU').GetLongName] триває, і [GetCharacter('pol_casimir_iii_piast').GetShortNameWithNoTooltip] бореться разом з [GetCharacter('lit_gediminas_gediminids').GetName] проти їхнього спільного ворога, намагаючись повернути свої окуповані землі.\n\nЧи зможе [GetCountry('POL').GetGovernment.GetRuler.GetSheHe] встановити довготривалий мир на кордоні з [GetCountry('TEU').GetLongNameWithNoTooltip]? Чи зможе [GetCountry('POL').GetGovernment.GetRuler.GetHeShe] продовжити [GetCountry('POL').GetGovernment.GetRuler.GetHerHis] внутрішні реформи? Або війна продовжуватиме спустошувати [GetCountry('POL').GetAdjectiveWithNoTooltip]?"
  country_history_PLE: "[GetCountry('PLE').GetName|U] є останнім міцним форпостом влади [GetCountry('ENG').GetName] в [ShowRegionName('ireland_region')]. Керуючись із замку [ShowLocationName('dublin')], він чіпляється за східне узбережжя, відрізаний від решти острова мережею палісадних укріплень, від яких і походить його назва.\n\nАле саме розрізнені [ShowCultureName('anglo_irish')] графи, загнані в кут нашим [GetUniqueInternationalOrganization('lordship_of_ireland').GetName], справді володіють владою за межами Пейлу. За роки життя в гельських диких землях графи заплуталися з місцевими [ShowCultureName('irish')] лордами, і з кожним роком вони віддаляються все далі.\n\nПроте Дублін залишається гідним центром [ShowCultureName('english')] управління, права та торгівлі. Його призначені лейтенанти намагаються підтримувати королівський мир, тоді як безсилий Парламент Ірландії збирається, щоб ухвалювати статути, які насилу виходять за кам'яні стіни замку.\n\nЧи поверне Лордство Ірландії свій колишній вплив, утвердивши контроль над усім островом? Або воно залишиться прибережним залишком — обложеним, зменшуваним і все більш неактуальним — поки гельські лорди та прикордонні графи ділять смарагдовий острів між собою?"
  country_history_POR: "[GetCountry('POR').GetLongName] здобула незалежність після довгої та запеклої боротьби як проти [ShowReligionGroupAdjective('muslim')], так і проти [ShowReligionGroupAdjective('christian')] правителів [ShowRegionName('iberia_region')]. Після впровадження важливих соціальних, економічних та культурних реформ, які просував [GetCharacter('por_dinis_i_portugal').GetShortName], його син і наступник, [GetCharacter('por_afonso_iv_portugal').GetName], тепер може зіткнутися з іншими викликами та можливостями, правлячи [ShowCultureName('portuguese')] народом.\n\nНа захід і південь лежить широкий [ShowRegionName('north_atlantic_ocean_region')] та обіцянка нових торговельних шляхів із чужими землями, тоді як на схід могутня [GetCountry('CAS').GetLongName], з міцними династичними зв'язками з [GetCountry('POR').GetNameWithNoTooltip], одного дня може призвести до об'єднаної [ShowRegionNameWithNoTooltip('iberia_region')] під [ShowCultureNameWithNoTooltip('portuguese')] керівництвом.\n\nЩо б не приховувало майбутнє, [GetCountry('POR').GetNameWithNoTooltip] потрібно буде так чи інакше забезпечити своє становище, щоб гарантувати своє майбутнє як незалежної країни."
  country_history_SCO: "[GetCountry('SCO').GetName] знову в небезпеці.\n\nЛише покоління тому наш національний герой, [GetCharacter('sco_robert_the_bruce').GetName], звільнив нас від [GetCountry('ENG').GetAdjective] панування, разом зі знаменитим мучеником, Вільямом Воллесом.\n\nТепер його наступник — дитя [GetCharacter('sco_david_ii').GetName] — перебуває у вигнанні у [GetCountry('FRA').GetName], тоді як наша вірна знать продовжує боротьбу проти [GetCountry('SBL').GetName], [GetCountry('ENG').GetAdjectiveWithNoTooltip] держави-лакея короля, яка фальшиво претендує на [GetCountry('SCO').GetAdjectiveWithNoTooltip] корону.\n\nХоча народ нашого [GetCountry('SCO').GetFlavorRank] наразі об'єднаний у нашій справі, це не гарантовано надовго. У нашому королівстві існують глибокі культурні та суспільні розбіжності, особливо між заможними [ShowLanguageName('english_language')]-мовними [ShowCultureName('scottish')] містами низин та [ShowCultureName('highland')] народом, що мешкає у внутрішніх пагорбах.\n\nДавним-давно римські загарбники збудували стіну проти нас, такою грізною була [GetCountry('SCO').GetAdjectiveWithNoTooltip] репутація. Можливо, настав час відродити ту давню лютість..."
  country_history_SBL: "Доля [GetCountry('SCO').GetName] під загрозою.\n\nЛише покоління тому незаконний [GetCharacter('sco_robert_the_bruce').GetName] вигнав [GetCountry('ENG').GetAdjective] з країни та коронував себе королем.\n\nЯк законний спадкоємець попереднього [GetCharacter('sco_john_balliol_of_scotland').GetName], його спадкоємець [GetCharacter('sco_edward_balliol').GetName] заявив свої права на [GetCountry('SCO').GetAdjectiveWithNoTooltip] трон. Разом зі [GetCharacter('sco_edward_balliol').GetHisHer] [GetCountry('ENG').GetAdjectiveWithNoTooltip]-підтримуваними прихильниками, [GetCharacter('sco_edward_balliol').GetHeShe] планує боротися проти узурпатора та повернути [GetCountry('SCO').GetNameWithNoTooltip] його законному правителю. Але це буде нелегко..."
  country_history_SER: "[GetCountry('SER').GetName] охоплює родючі низовини та рівнини на півночі, пересічені могутніми річками Дунай та Сава. На півдні ландшафт перетворюється на скелясту, лісисту місцевість і, зрештою, на високі Динарські Альпи.\n\n[GetCountry('SER').GetNameWithNoTooltip] постала як значна регіональна держава під владою династії [ShowDynastyName('nemanjic_dynasty')]. Заснована Стефаном Неманею у 12 столітті, ця королівська лінія заклала основи для об'єднаної [GetCountry('SER').GetAdjectiveWithNoTooltip] держави, почала зміцнювати свою [ShowReligionGroupAdjective('christian')] [ShowReligionAdjective('orthodox')] ідентичність та прагнула встановити церковну автономію. Ці зусилля завершилися у 1219 році, коли [GetCountry('SER').GetAdjectiveWithNoTooltip] [ShowReligionAdjectiveWithNoTooltip('orthodox')] Церква здобула незалежність.\n\nПід правлінням Стефана «Першовінчаного» територіальна експансія [GetCountry('SER').GetNameWithNoTooltip] прискорилася, а придбання прибережних регіонів на [ShowProvinceDefinitionName('adriatic_sea_province')] забезпечило доступ до морської торгівлі та принесло західні впливи. Син Стефана, король Радослав, сприяв культурному розвитку країни, заохочуючи освіту та мистецтво, а монастирі, такі як Студениця та Жича, процвітали, зберігаючи цінні релігійні рукописи та фрески.\n\nНезважаючи на численні нещодавні досягнення, [GetCountry('SER').GetNameWithNoTooltip] тепер стикається із зовнішнім тиском та внутрішніми розбіжностями. [GetCountry('MGE').GetAdjective] вторгнення у 13 столітті завдало значної шкоди та конфлікту всередині правлячої родини [ShowDynastyNameWithNoTooltip('nemanjic_dynasty')], особливо між [GetCharacter('ser_stefan_milutin').GetName] та його братом [GetCharacter('ser_stefan_dragutin').GetName], що ще більше послабило єдність держави. Але, можливо, ситуація змінюється, оскільки почалося сильне правління [GetCharacter('ser_stefan_dusan').GetName], що дає [GetCharacter('ser_stefan_dusan').GetHimHer] можливість змінити хід історії."
  country_history_SWE: "[GetCountry('SWE').GetLongName] — це феодальний [GetCountry('SWE').GetFlavorRank] під владою [GetCharacter('swe_magnus_eriksson').GetName], який також тримає корону [GetCountry('NOR').GetName]. [GetCountry('SKE').GetLongName] було куплено у збіднілих [GetCountry('DAN').GetAdjectiveWithNoTooltip] лише кілька років тому. Наша територія величезна, але малонаселена, і здебільшого вкрита густими лісами. Глибоко в цих лісах приховані багатства [ShowGoodsName('iron')] та [ShowGoodsName('copper')], що чекають на використання для збагачення нашої країни.\n\nНаш [GetCountry('SWE').GetFlavorRank] наразі стикається з серйозними викликами, наслідками нашого нещодавнього зіткнення з торговою державою [GetCountry('NOV').GetLongName] за Інгрію. Тим часом [GetCountry('DAN').GetLongName] та [GetCountry('TEU').GetLongName] контролюють більшість земель на півдні — земель, якими ми могли б керувати та експлуатувати з набагато більшою витонченістю.\n\n[GetCountry('SWE').GetNameWithNoTooltip] має потенціал стати однією з провідних націй у світі. Чи зможемо ми подолати наші виклики, зайняти своє законне місце влади та встановити #italic Dominium Maris Baltici#! — панування над Балтійським морем?"
  country_history_TEU: "Славний #italic Орден братів Німецького дому Святої Марії в Єрусалимі#!, також відомий як [GetCountry('TEU').GetLongName], зустрічає свою долю на бурхливих берегах Балтійського моря. Створений для захисту [ShowReligionGroupAdjective('christian')] паломників на їхньому шляху до Святого міста Єрусалима, його мета змінилася на християнізацію язичницьких племен [ShowAreaName('prussia_area')] та [ShowAreaName('baltic_area')] шляхом створення держави на цих землях.\n\nПід керівництвом нашого попередника, [GetCharacter('teu_werner_von_orseln').GetName], [GetCountry('TEU').GetLongNameWithNoTooltip] розширив свої територіальні володіння, але це розширення не обійшлося без наслідків. Агресивна політика Ордену створила могутніх ворогів, оскільки язичницькі племена на Сході об'єдналися проти нас і утворили [GetCountry('LIT').GetLongName]. Гірше того, вони потім об'єдналися з нашим [ShowReligionAdjective('catholic')] південним сусідом і суперником, [GetCountry('POL').GetLongName], який відмовився від свого [ShowReligionGroupAdjectiveWithNoTooltip('christian')] обов'язку і приєднався до язичників проти нас.\n\nНастав час нашому Ордену довести, що ми готові до хрестоносного завдання, яке ми поставили перед собою, і показати світові, що навіть оточені ворогами, наша віра торжествує."
  country_history_THO: "Нащадки великого Верховного короля Ірландії, [GetCharacter('mcm_brian_boruma').GetName], наш гордий клан [ShowDynastyName('o_brien_dynasty')] колись правив усім [GetCountry('MCM').GetName], південною п'ятою частиною острова. Наше стародавнє королівство було розколоте підлим кланом [ShowDynastyName('mac_carthaigh_dynasty')], який захопив наші території та змусив нас рухатися на північ.\n\nНаше нове володіння [GetCountry('THO').GetName], що охороняє гирло великої річки Шеннон, знаходиться в уразливому становищі. Ми оточені могутніми лордами та напруженими відносинами, як стародавніх [ShowCultureName('irish')] королівств, так і нових [ShowCultureName('anglo_irish')] графств.\n\nЧи повернемо ми собі законний титул королів [GetCountry('MCM').GetNameWithNoTooltip], чи підемо далі і знову об'єднаємо [GetInternationalOrganizationType('high_kingship').GetName] під прапором [ShowDynastyNameWithNoTooltip('o_brien_dynasty')]?"
  country_history_TRE: "Останній залишок колись могутньої династії, [GetCountry('TRE').GetGovernment.GetRuler.GetDynasty.GetName] тепер править [GetCountry('TRE').GetLongName], дивлячись на [ShowAreaName('black_sea_area')]. Бувши свідками піднесення та падіння Нікейської імперії, коли [ShowCultureGroupName('turkic_group')] набіжники панують по всій [ShowRegionName('anatolia_region')], [GetCharacter('tre_basil_komnenos').GetName] тепер залежить від хисткого союзу з [GetCountry('BYZ').GetName], щоб пережити бурю. Водночас купці з [GetCountry('GEN').GetName] майже монополізували торговельний потік, що проходить через [ShowAreaName('crimea_area')] та [ShowAreaNameWithNoTooltip('black_sea_area')], викачуючи багато монет зі скарбниці [GetCountry('TRE').GetAdjectiveWithNoTooltip]. Шлюб з позашлюбною дочкою [GetCharacter('byz_andronikos_iii_palaiologos').GetName] охолов, і ситуація в столиці стає ще більш жахливою під тиском південних набігів та внутрішніх конфліктів зі схоларіями...\n\nЧи то хитрістю, чи золотом, чи силою, ми повинні зміцнити нашу тремтячу владу, якщо хочемо зберегти все, за що боролися."
  country_history_TUR: "[GetCountry('TUR').GetLongName] було засновано [GetCharacter('tur_osman').GetName], вождем племені Кайи огузьких турків, близько 1299 року. Займаючи північно-західний прибережний регіон [ShowRegionName('anatolia_region')], вони спочатку були одним з багатьох бейликів, що займали прикордонну територію Руму, колись могутнього султанату. Під керівництвом [GetCharacter('tur_orhan').GetNameWithNoTooltip] вони консолідували та значно розширили свої володіння, забезпечивши життєво важливі землі вздовж узбережжя [ShowLocationName('bosphorus')]. Багаті набіги, військові перемоги та хитра дипломатія виділили їх як один з наймогутніших бейликів, що зростають у регіоні. Адаптивна та інноваційна, наша культура є унікальним поєднанням регіональних звичаїв та моралі, де релігійна толерантність та стратегічне включення завойованих народів роблять наше суспільство блискучою мозаїкою людства.\n\n[GetCountry('TUR').GetLongNameWithNoTooltip] є найвищим прикладом витонченої цивілізації, але це не означає, що ми захищені від усієї шкоди. Внутрішні чвари, спричинені тертям між автономними племенами та низкою криз престолонаслідування, турбують нас, як і постійна загроза, яку представляють наші [GetCountry('BYZ').GetAdjective] та Ільханатські сусіди, не кажучи вже про конкуруючі бейлики.\n\nПроте, незважаючи на цих собак, що кусають нас за п'яти, ми гордо крокуємо в майбутнє. Чи буде це майбутнє завоювань, дипломатії, торгівлі чи мистецтва, ще належить визначити..."
  country_history_ULS: "Колись гордий [GetCountry('ULS').GetLongName] розбитий на друзки. У 1333 році [GetCharacter('uls_william_donn_de_burgh_3rd_earl_ulster').GetName] був убитий, залишивши немовля [GetCharacter('uls_elizabeth_de_burgh_4th_countess_ulster').GetShortName] єдиною спадкоємицею. Молодші клани [ShowDynastyName('de_burgh_dynasty')] з [GetCountry('CLR').GetName], [GetCountry('MYO').GetName] та [GetCountry('CWM').GetName] скористалися нашою слабкістю і тепер змагаються між собою за контроль над усіма родовими землями.\n\nТим часом ворогуючі вожді [ShowDynastyName('o_neill_dynasty')] з [GetCountry('TYR').GetName] та [GetCountry('CLA').GetName] спустошують нашу законну територію, експлуатуючи наше нещастя.\n\nОслаблена коронна адміністрація [GetCountry('PLE').GetName] обтяжена проблемами і занадто слабка, щоб втручатися; наразі ми можемо лише вичікувати з безпеки неприступної фортеці [ShowLocationName('carrickfergus')]. Чи зникнемо ми в невідомості, чи відновимо своє становище як провідна [ShowCultureName('anglo_irish')] держава?"
  country_history_VEN: "[GetCountry('VEN').GetLongName] є найважливішою та наймогутнішою купецькою республікою в Середземному морі. Вона контролює важливі торгові порти та острови, що утворюють #italic Stado do Mar#!, а також багато внутрішніх територій на півночі [ShowRegionName('italy_region')], що утворюють #italic Domini di Terraferma#!. Процвітаючи завдяки своїй розгалуженій торговельній мережі, [GetCountry('VEN').GetNameWithNoTooltip] є маяком багатства та культури, перлиною, що лежить у лагуні, сяючи в [ShowAreaName('adriatic_sea_area')].\n\nПроте це елегантне місто не може опускати свою охорону, оскільки навколо нього виникають нові загрози. На Сході колись велика [GetCountry('BYZ').GetLongName] нелегко забуде Четвертий хрестовий похід, а також [GetCountry('VEN').GetAdjectiveWithNoTooltip] участь у ньому. На Заході [GetCountry('GEN').GetLongName] та [GetCountry('ARA').GetLongName] продовжують розширювати свій вплив, завойовуючи все більше територій та домінуючи на торговельних шляхах. Нарешті, [GetCountry('VER').GetLongName] стали відчутною загрозою для #italic Domini di Terraferma#!.\n\nЩо чекає на [GetCountry('VEN').GetFlavorRank] у майбутньому? Чи впаде вона під тиском своїх ворогів, чи підніметься на вершину і стане беззаперечним правителем #italic Mare Nostrum#!?"
  country_history_VIJ: "Новостворений [GetCountry('VIJ').GetLongName] міцно стоїть після знаменної поразки [GetCountry('DLH').GetAdjective] військ у [ShowRegionName('deccan_region')], коли [GetCharacter('vij_harihara_sangama').GetName] та його брат [GetCharacter('vij_bukka_raya_sangama').GetName] очолили боротьбу проти [ShowReligionGroupAdjective('muslim')] правителів $india$.\n\nХоча [GetCountry('VIJ').GetAdjectiveWithNoTooltip] правління було встановлено лише нещодавно, поточна ситуація в [ShowRegionNameWithNoTooltip('deccan_region')] обіцяє нам швидке зростання до влади, якщо ми зможемо правильно використати наш імпульс, оскільки ми можемо забезпечити контроль над важливими торговельними шляхами між $china$ та [ShowContinentName('europe')], і отримати прибуток від експорту цінних товарів з наших багатих на ресурси земель.\n\n[GetCountry('VIJ').GetNameWithNoTooltip] стоїть на порозі монументального кроку вперед. Чи спіткнемося ми, чи гордо стоятимемо над іншими?"
  country_history_WLS: "[GetCountry('WLS').GetAdjective] народ походить від стародавніх кельтських мешканців Британії; їхні володіння простягалися від туманних північних нагір'їв до скелястих крейдяних скель південного узбережжя. Земля фей та поетів, дощу та моря, [GetCountry('WLS').GetName] була надзвичайною у багатьох відношеннях. Але [GetCountry('WLS').GetAdjectiveWithNoTooltip] панування над їхніми рідними землями не могло бути стійким.\n\nСпочатку прийшли англосаксонські воєначальники, заповнивши вакуум влади, залишений занепалою Римською імперією, і відтіснивши тубільців до скелястих околиць Британії. Потім прийшли нормандські авантюристи, які остаточно підкорили їх і скинули їхніх законних правителів.\n\nСьогодні наша укріплена адміністрація править за наказом [GetCountry('ENG').GetAdjective] [GetCountry('ENG').GetGovernment.GetRulerTitle], маючи владу над англо-нормандськими марками південних долин та [GetCountry('WLS').GetAdjectiveWithNoTooltip] поселеннями північних гір.\n\nАле під піснями наших музикантів та постійним барабанним дробом дощу чути шепіт повстання. Чи буде [GetCountry('WLS').GetNameWithNoTooltip] приведена до процвітання в ім'я королів [ShowDynastyName('plantagenet_dynasty')], чи Земля Наших Батьків знову повстане? Ми все ще тут!"
  country_history_ZAN: "[GetCountry('ZAN').GetLongName] міцно утвердилася як могутня морська держава вздовж [ShowRegionName('swahili_coast_region')], розширивши свій вплив на величезну ділянку торговельної мережі [ShowRegionName('indian_ocean_region')]. Понад століття правителі [GetCountry('ZAN').GetNameWithNoTooltip] використовували своє стратегічне положення, контролюючи прибуткові торговельні шляхи, що з'єднували [ShowContinentName('africa')], [ShowRegionName('arabia_region')], $india$ і навіть $china$.\n\nЇхнє багатство ґрунтується на обміні золота з внутрішніх районів [ShowContinentNameWithNoTooltip('africa')], а також [ShowGoodsName('ivory')], [ShowPopTypeName('slaves')] та інших місцевих товарів на предмети розкоші, такі як [ShowCultureName('farsi_culture')] шовки, [ShowCultureGroupName('indian_group')] текстиль та [ShowCultureGroupName('chinese_group')] порцеляна. Процвітання [GetCountry('ZAN').GetNameWithNoTooltip] відображається у величі її архітектури, що символізує [GetCountry('ZAN').GetAdjectiveWithNoTooltip] владу та витонченість.\n\nАле наше процвітання не може захистити нас від усього. Навіть зараз володарі [GetCountry('ZMW').GetName] консолідують свою владу на південному заході, оскільки конкуренція на зовнішніх ринках стає все жорстокішою.\n\nЯкі таємниці приховує майбутнє для [GetCountry('ZAN').GetFlavorRank]? Лише час покаже."
  country_history_ZMW: "Контролюючи великі багатства Південно-Східної Африки, [GetCountry('ZMW').GetLongName] насолоджується періодом стабільності та миру. Торгівля з купцями з [ShowRegionName('swahili_coast_region')] процвітає та забезпечує стабільне постачання іноземних товарів аж з $india$ та $china$, тоді як шахти африканського внутрішнього регіону, здається, пропонують нескінченний запас багатств. Наша столиця, найбільше місто в регіоні, відома далеко за його межами своїми славетними кам'яними спорудами, які назавжди залишаться свідченнями [GetCountry('ZMW').GetAdjective] досягнень.\n\nНезважаючи на все це, однак, біда переслідує нашу велику націю. Ми не можемо вічно покладатися на наші ресурси, а наш посушливий клімат часто призводить до неврожаїв. Наше населення відносно невелике. І, хоча ми є великою торговою державою, баланс може в будь-який момент зміститися на користь іншого, якщо ми не будемо обережними. Ми також боремося із зовнішніми загрозами від наших заздрісних сусідів.\n\nЩо станеться з цією перспективною нацією? Чи зможе [GetCountry('ZMW').GetNameWithNoTooltip] подолати численні перешкоди та реалізувати свій потенціал як лідер усього [ShowRegionNameWithNoTooltip('swahili_coast_region')]? Або її розірвуть подвійні шакали зовнішнього та внутрішнього конфлікту?"
  country_history_haudenosaunee: "Наші предки посміхаються нам. Батьки нашої славетної нації — Великий Миротворець, Гаявата та Джигонсасе — показали нам, що співпраця між нашими племенами набагато краща за постійні чвари минулого. Великий Закон Миру, який тепер об'єднує нас, допоміг нашим розрізненим племенам об'єднатися під передовою системою вирішення конфліктів та взаємного прийняття рішень, що породжує гармонію, а не внутрішні чвари. Наші організовані поселення дозволили нам створити вражаючу армію, а наш дипломатичний вплив поширюється далі, ніж будь-коли раніше, завдяки нашому інноваційному використанню вампумних поясів для ведення ретельних записів. \n\nНаші сусіди, однак, не поділяють нашого погляду на світ і не вагатимуться знищити нас, якщо їм випаде така нагода. Ми повинні знайти спосіб переконати їх жити в злагоді з нами — силою, якщо це необхідно..."
  country_history_puebloan: "Колись ми були архітекторами, які будували свої домівки на вітряних скелях і поливали свої сади за допомогою передової іригаційної системи. Колись ми практикували складні акти віри, слідуючи циклу життя через священні ритуали. Колись ми також були відомими торговцями, наша мережа впливу простягалася далеко по цих посушливих землях.\n\nАле дні [ShowCultureGroupName('puebloan_group')] величі минули; наші міста, колись процвітаючі та повні життя, тепер є лише тінню своїх колишніх себе. Ніби сама земля покинула нас; там, де вона була родючою та легкою для обробітку, тепер вона суха та тверда, що унеможливлює для наших фермерів вирощувати достатньо їжі для всіх голодних ротів.\n\nЧи це початок кінця для нашої культури? Чи розвіємося ми за вітром, як пилинки, чи постане новий лідер, здатний об'єднати наш народ і повернути нас до нашої колишньої слави?"
  country_history_nahua: "Протягом останніх двох століть групи [ShowCultureName('nahua_culture')] людей, нащадків чичимеків, мігрували до центральної Мексики зі своєї легендарної прабатьківщини Ацтлан. Наші предки були частиною цієї міграції.\n\nЯк і багато інших [ShowCultureNameWithNoTooltip('nahua_culture')] народів, ми заснували свій власний [ShowGovernmentReformName('altepetl')]. І таким чином ми побудували свою унікальну цивілізацію, незалежну від інших міст і королівств, що оточують нас, оскільки кожен [ShowGovernmentReformNameWithNoTooltip('altepetl')] поклоняється і керується по-своєму.\n\nНаше прекрасне місто наповнене плавучими садами, витонченими терасовими садами та дорогоцінними каменями, привезеними з далеких земель, і ми мало чого бажаємо; проте ми не невразливі. Тут існує велика конкуренція за наші дорогоцінні ресурси, і сама природа може бути жорстокою в цьому випаленому сонцем місці.\n\nЧи готові ми прокласти свій власний шлях у майбутнє як лідери своєї долі, чи станемо жертвою інтриг та амбіцій наших суперників і зникнемо назавжди з історії?"
  country_history_mayan: "З того часу, як наші перші предки були створені з тіста [ShowGoodsName('maize')], [ShowCultureGroupName('maya_group')] люди жили в джунглях [ShowAreaName('mayaab_area')] і слідували вченням та мудрості наших богів. Наші предки створили багато процвітаючих міст у мережі, що простягалася від океану до найглибших частин джунглів. Наші вчені розуміли незліченні системи зірок, сонця та неба і створили передові, надійні календарі для відстеження їхніх містичних рухів.\n\nНа жаль, ці центри торгівлі та культури, колись повні життя, тепер лежать покинуті, їхні колодязі сухі, а їхні вулиці поглинені джунглями. Ті, де ще горять вогнища, є лише тінями своїх колишніх себе.\n\nЧи це також доля нашого народу — перетворитися на холодний попіл і лежати забутими на дні джунглів? Чи судилося нам змінити хід долі та відновити нашу колишню славу?"
  country_history_tonal: "Народ наш, народжений під керівництвом і мудрістю Пернатого Змія, [ShowGodName('quetzalcoatl_god')], побудував цивілізацію на родючих землях [ShowRegionName('mesoamerica_region')]. Наші вірування тісно пов'язують нас з тваринами в нашому світі, причому день і час народження людини корелюють з певною істотою, чиї аспекти згодом формують аспекти людини. Наша віра була впливовою в цьому регіоні, і ми передбачаємо її виживання на століття вперед.\n\nАле, незважаючи на наше світле майбутнє, збираються темні хмари. Нескінченні амбіції наших сусідів загрожують занурити регіон у хаос і потягнути нас за собою, якщо ми не будемо готові захищати свій спосіб життя..."
  country_history_andean: "Священні гори [ShowRegionName('andes_region')] спостерігали за нашими предками з початку часів. Їхній суворий клімат і круті долини виховали сильний і винахідливий народ, здатний не тільки виживати, але й процвітати на ворожій місцевості, що характеризує гірські вершини, коротку берегову лінію та глибокі джунглі. Проти суворого середовища наших рідних земель ми побудували міцні кам'яні будівлі, які легко витримують сейсмічні лиха, з якими ми часто стикаємося. Незважаючи на важке існування, з яким ми стикалися в найдавніші часи нашої цивілізації, тепер ми є народом, відомим своїм ремеслом, вірою та якісним ткацтвом.\n\nАле ми не завжди збираємо достатній урожай; і наші сусіди не завжди співпрацюють. Чи буде доля прихильною до нашого народу, чи ми підкоримося примхам долі?"
  country_history_low_countries_common: "Нації в Нижніх Країнах були обмежені та підкорялися як [GetCountry('FRA').GetLongName], так і [GetUniqueInternationalOrganization('hre').GetName] з моменту їх створення, часто стаючи феодом однієї чи іншої і нерідко змінюючи сторони. Як великий приз, що чекає на претендента, будучи одним з найбагатших регіонів [ShowContinentName('europe')], країни регіону знаходяться в положенні, коли вони повинні вирішити, чи стануть вони невід'ємною частиною інших націй, чи захищатимуть свою незалежність з люттю."
  country_history_low_countries_minors: "$country_history_low_countries_common$\n\nДля найменших націй у цьому районі виживання виявиться викликом, оскільки вони щодня борються за збереження своєї незалежності від своїх більших, більш ненажерливих сусідів."
  country_history_BRB: "$country_history_low_countries_common$\n\nБудучи однією з найбільших і найбільш населених націй у Нижніх Країнах, ми, очевидно, найкраще підходимо для керівництва нашими сусідами, особливо враховуючи слабке становище, в якому перебуває [GetCountry('FLA').GetLongName]. Якщо ми вдаримо в потрібний момент, ми зможемо піднятися до найвищих ешелонів, як ми того заслуговуємо..."
  country_history_FLA: "$country_history_low_countries_common$\n\nФранко-фламандська війна, що тривала з 1297 по 1305 рік, глибоко вплинула на [GetCountry('FLA').GetLongName]. Хоча нам вдалося зберегти незалежність, наша боротьба завершилася втратою [ShowProvinceDefinitionName('roman_flanders_province')] на користь [GetCountry('FRA').GetLongName].\n\nБудучи однією з найбагатших націй у регіоні, [GetCountry('FLA').GetNameWithNoTooltip] відновилася за останні кілька років, і тепер ми можемо мати можливість повернути те, що по праву належить нам."
  country_history_FRI: "Оточене феодальними володарями, наше суспільство нині розділене між тими, хто бажає зберегти нашу незалежність, і тими, хто повільно набирає силу, переймаючи чужі звичаї сусідніх народів. [GetCountry('FRI').GetLongName] опинилося на роздоріжжі, все ще мріючи про нашу минулу славу. Чи готові ми нарешті зробити крок вперед і заявити про себе на тій чи іншій стороні?"
  country_history_GEL: "Найбільш войовнича нація в регіоні, [GetCountry('GEL').GetLongName], також дуже компетентна в дипломатії. Їхня експансія була здійснена не тільки мечем, але й мішками золота. Прекрасний синтез цих двох інструментів надав нам можливість піднятися над нашими меншими суперниками."
  country_history_HAI: "Завдяки розумній політиці королівських шлюбів, графства [GetCountry('HAI').GetName], [GetCountry('HOL').GetName] та [GetCountry('ZEE').GetName] перейшли під владу династії [ShowDynastyName('avesnes_dynasty')]. [GetCountry('HAI').GetLongNameWithNoTooltip] тепер має можливість продовжувати об'єднувати регіон під своїм керівництвом. Але це буде нелегке завдання..."
  country_history_HOL: "Незважаючи на те, що [GetCountry('HOL').GetLongName] починалося як похмуре болото, воно повільно перетворилося на серйозного претендента на регіональне панування. Прихід династії [ShowDynastyName('avesnes_dynasty')] вигідно наблизив нас до [GetCountry('HAI').GetLongName], а наші плани експансії ставлять спокусливе [GetCountry('FRI').GetLongName] прямо на нашому шляху. Однак, конфлікт між нашими [GetCountry('HOL').GetGovernment.GetEstateName('nobles_estate')] та нашими [GetCountry('HOL').GetGovernment.GetEstateName('burghers_estate')] знову розгорається, що завжди погано для бізнесу..."
  country_history_LIE: "Батьківщина багатьох релігійних лідерів, [GetCountry('LIE').GetLongName] є безперечним духовним провідником Нижніх Земель. Наша нація є центром освіти найвищого рівня, і тому має потужний вплив на сусідні держави. Цей вплив, безумовно, забезпечить наше піднесення як нації, якщо ми використаємо його мудро."
  country_history_LUX: "Оригінальна батьківщина династії [ShowDynastyName('luxembourg_dynasty')], [GetCountry('LUX').GetLongName] є лише тінню порівняно з володіннями, контрольованими наймогутнішими гілками нашої родини. Однак, враховуючи престиж, який здобули наші родичі, ми ще можемо знайти можливість захопити контроль над регіоном і об'єднати його під нашим правлінням."
  country_history_UTR: "Занадто довго переслідуване [GetCountry('GEL').GetLongName] та [GetCountry('HOL').GetLongName], [GetCountry('UTR').GetLongName] намагається скинути їхній вплив та об'єднати всі Нижні Землі під нашим божественно благословенним керівництвом. Гамірне місто [ShowLocationName('utrecht')], центр культури та мистецтва, стало б чудовою столицею для об'єднаного регіону. Сподіваємося, що інші погодяться... бажано без надмірного опору."
  country_history_swiss_group: "[ShowCultureGroupName('swiss_group')] народ, що населяє західні Альпи, запекло чинить опір владі [GetCountry('HAB').GetName], яка посягає на їхню територію. З перемогою в битві при Морґартені було сформовано нову єдність між незалежними країнами [ShowAreaName('eastern_switzerland_area')], і [GetUniqueInternationalOrganization('swiss_confederation').GetName] міцно стоїть, до нього приєднується все більше членів. Але їхній старий ворог, династія [GetDynasty('habsburg_dynasty').GetName], збирає сили за підтримки [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName], готовий повністю підкорити народ [GetCountry('SWI').GetName]. Ми повинні міцно стояти проти цього вторгнення; доля нашої батьківщини залежить від нас!"
  country_history_baltic_german: "Разом з нашими побратимами, [GetCountry('TEU').GetLongName], ми готові виконати нашу святу місію: християнізацію Північної [ShowContinentName('europe')]. За підтримки [ShowCultureGroupName('german_group')] лицарів та дворян, наша країна повинна не тільки навернути язичників, але й захистити тих, хто приймає світло [ShowReligionName('catholic')]. На жаль, народ [GetCountry('LIT').GetName] демонструє запеклий опір нашим божественним зусиллям. Інші, як-от [GetCountry('DAN').GetLongName], могли б легко використати наші труднощі для своїх власних егоїстичних амбіцій.\n\nХоча наше майбутнє пов'язане з місією навернення, ми також повинні думати про нашу мету за межами язичників. Чи будемо ми продовжувати наші зусилля проти заблудлих прихильників [ShowReligionName('orthodox')] віри, чи натомість реформуємо нашу державу?"
  country_history_german_group: "Серцевина [GetUniqueInternationalOrganization('hre').GetName] пережила довгий період Великого міжцарів'я і з глибоким занепокоєнням дивиться в майбутнє. З огляду на похилий вік [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName], родини [GetCountry('UBV').GetGovernment.GetRuler.GetDynasty.GetName], [GetCountry('BOH').GetGovernment.GetRuler.GetDynasty.GetName] та [GetCountry('HAB').GetGovernment.GetRuler.GetDynasty.GetName] знову готуються до боротьби за корону. У той час як імперська влада на південь від Альп занепадає, [ShowCultureGroupName('german_group')] купці поспішають забезпечити свої торгові шляхи до [ShowRegionName('italy_region')], а [GetCountry('HSA').GetLongName] насолоджується своїм пануванням над регіоном [ShowRegionName('north_german_region')]."
  country_history_BAV: "Під проводом [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName], $BAV$ зараз перебуває на вершині своєї могутності. Оскільки [GetCharacter('ubv_ludwig_iv_wittelsbach').GetNameWithNoTooltip] є імператором [GetUniqueInternationalOrganization('hre').GetName], [GetCountry('UBV').GetLongName] користується особливою повагою та авторитетом серед імперських лідерів. Хоча [GetCountry('LBV').GetLongName] зараз керується [GetCharacter('lbv_heinrich_xiv_wittelsbach').GetName], його здоров'я неухильно погіршується через проказу, і передбачувана рання смерть [GetCharacter('lbv_heinrich_xiv_wittelsbach').GetHisHer] може спровокувати возз'єднання $BAV$.\n\nВраховуючи міцні стосунки між правителями [GetCountry('UBV').GetGovernment.GetRuler.GetDynasty.GetName] у [ShowContinentName('europe')], $BAV$ готовий заявити про своє право керувати [GetUniqueInternationalOrganization('hre').GetName] та здійснювати свою владу над центральною [ShowContinentNameWithNoTooltip('europe')], кидаючи виклик своїм суперникам у [GetCountry('BOH').GetName] та [GetCountry('HAB').GetName]."
  country_history_BRA: "[GetCountry('BRA').GetLongName] було засновано як #italic Північна Марка#! на території слов'янських вендів. Регіон характеризується суглинковими височинами та низинами з великою кількістю води та сосен, спекою та сухим, піщаним ґрунтом, за що отримав прізвисько «пісочниця [GetUniqueInternationalOrganization('hre').GetName]».\n\nУ 1157 році, після захоплення цих земель у Якси з Кьопеніка, [GetCharacter('bra_albrecht_i_askanier').GetName] офіційно став [GetCountry('BRA').GetGovernment.GetRulerTitle]. Спочатку обмежений Гафельландом та Цаухе, він заохочував процес #italic Ostsiedlung#! на схід до [ShowProvinceDefinitionName('neumark_province')] за Одером, поступово включаючи його до своїх володінь. Колоністи з Фландрії та Рейнланду були запрошені для поселення, укріплюючи свої міста в процесі.\n\nПісля його смерті в 1170 році династія [ShowDynastyName('askanier_dynasty')] продовжувала цю експансію понад 150 років, набуваючи сусідні регіони, такі як [ShowProvinceDefinitionName('stettin_province')] та [ShowProvinceDefinitionName('uckermark_province')], що розширило їхній вплив до Балтійського моря. На жаль, це призвело до конфлікту з [GetCountry('DAN').GetName]. Однак останній [ShowDynastyNameWithNoTooltip('askanier_dynasty')], [GetCharacter('bra_heinrich_ii_askanier').GetShortName], помер без прямого спадкоємця в 1320 році.\n\nТепер прибула династія [ShowDynastyName('wittelsbach_dynasty')], але їхня відсутність інтересу до управління цими землями кидає тінь на майбутнє [GetCountry('BRA').GetLongNameWithNoTooltip]."
  country_history_MEI: "[GetCountry('MEI').GetLongName], володіння могутньої династії [GetCountry('MEI').GetGovernment.GetRuler.GetDynasty.GetName], виникло у східній марці [GetUniqueInternationalOrganization('hre').GetName], на землях, де сорби та інші слов'янські народи з часом повільно германізувалися. Земля, спочатку густо вкрита лісами, виявилася дуже родючою, а м'який клімат, особливо поблизу річки Ельби, дозволив саксонцям, що там жили, розвинути культуру [ShowGoodsName('wine')].\n\nРудні гори, що відокремлюють країну від [GetCountry('BOH').GetAdjective], багаті на мінерали, особливо на [ShowGoodsName('silver')], що живить економіку [GetCountry('MEI').GetFlavorRank]. Однак її достаток є двосічним мечем, на нас жадібно дивляться сусідні суспільства, які цілком можуть спробувати нас завоювати. Незважаючи на ці потенційні загрози та зростаючу нестабільність, спричинену Великим міжцарів'ям, [GetCountry('MEI').GetNameWithNoTooltip] процвітає як значна імперська територія в [ShowAreaName('upper_saxony_area')]. З огляду на занепад влади в сільських [GetCountry('THU').GetName] та [GetCountry('BRA').GetName], [ShowDynastyName('wettin_dynasty')] може стати новою силою у східній імперії, розширюючи свій вплив та захищаючи свої володіння від зовнішнього тиску.\n\nЗавдяки нашим родючим землям, багатим ресурсам та стратегічному розташуванню, ми є видатною одиницею в [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip], приваблюючи захоплення та заздрість наших сусідів."
  country_history_HAB: "[GetCountry('MEI').GetLongName], володіння могутньої династії [GetCountry('MEI').GetGovernment.GetRuler.GetDynasty.GetName], виникло у східній марці [GetUniqueInternationalOrganization('hre').GetName], на землях, де сорби та інші слов'янські народи з часом повільно германізувалися. Земля, спочатку густо вкрита лісами, виявилася дуже родючою, а м'який клімат, особливо поблизу річки Ельби, дозволив саксонцям, що там жили, розвинути культуру [ShowGoodsName('wine')].\n\nРудні гори, що відокремлюють країну від [GetCountry('BOH').GetAdjective], багаті на мінерали, особливо на [ShowGoodsName('silver')], що живить економіку [GetCountry('MEI').GetFlavorRank]. Однак наш достаток є двосічним мечем; на нас жадібно дивляться сусідні суспільства, які цілком можуть спробувати нас завоювати. Незважаючи на ці потенційні загрози та зростаючу нестабільність, спричинену Великим міжцарів'ям, [GetCountry('MEI').GetNameWithNoTooltip] процвітає як значна імперська територія в [ShowAreaName('upper_saxony_area')]. З огляду на занепад влади в сільських [GetCountry('THU').GetName] та [GetCountry('BRA').GetName], [ShowDynastyName('wettin_dynasty')] може стати новою силою у східній імперії, розширюючи свій вплив та захищаючи свої володіння від зовнішнього тиску.\n\nЗавдяки нашим родючим землям, багатим ресурсам та стратегічному розташуванню, ми є видатною одиницею в [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip], приваблюючи захоплення та заздрість наших сусідів."
  country_history_irish_minors: "Гельські лорди [ShowRegionName('ireland_region')] правлять землею, просякнутою давніми традиціями, де королівська влада – це не просто титул, а зв'язок між правителем та його народом. Хоча Високе Королівство [ShowRegionNameWithNoTooltip('ireland_region')] зникло, залишившись лише символічною пам'яттю, мрія про єдиного правителя, що об'єднає їх, все ще живе в серцях наших амбітних вождів. Клани залишаються запекло незалежними, їхня сила походить від їхніх воїнів та глибоко вкорінених звичаїв; проте розділені вони вразливі як до зовнішніх ворогів, так і до внутрішніх суперництв.\n\nНа сході, зростаюча присутність гіберно-нормандських графів загрожує їхньому суверенітету, тоді як за морем, правителі [GetCountry('ENG').GetName] та [GetCountry('SCO').GetName] кидають погляди на береги [ShowRegionNameWithNoTooltip('ireland_region')]. Проте, [ShowRegionNameWithNoTooltip('ireland_region')] не чужа іноземним амбіціям. Знову і знову її народ чинив опір і витримував. Якщо б єдиний гельський лідер зміг згуртувати клани та відродити старі звичаї королівської влади, тоді, можливо, ми могли б знову піднятися — не як земля розділених вождів, а як могутня нація, об'єднана під одним правителем."
  country_history_anglo_irish_minors: "Великі графства за [GetCountry('PLE').GetLongName] можуть бути спадкоємцями нормандського завоювання, проте вони вже вплетені в гобелен [ShowRegionName('ireland_region')]. Через півтора століття після прибуття Стронгбоу, гіберно-нормандські лорди правлять величезними територіями, будуючи кам'яні замки там, де колись стояли лише рингфорти, і командуючи військовими загонами, такими ж лютими, як і будь-який гельський вождь. Проте, хоча ми все ще носимо імена шляхетних домів з [GetCountry('ENG').GetName], [GetCountry('FRA').GetName] та [GetCountry('WLS').GetName], ми стали чимось відмінним: ні повністю [ShowCultureName('irish')], ні повністю іноземним.\n\nХоча наші стіни міцні, наше становище є нестійким. Влада [GetCountry('ENG').GetAdjectiveWithNoTooltip] суверена в [ShowRegionNameWithNoTooltip('ireland_region')] слабка, і місцеві влади звикли керувати своїми землями на власний розсуд, пов'язані більше місцевими союзами та ворожнечами, ніж лояльністю до далекого [GetCountry('ENG').GetGovernment.GetRulerTitle]. Тим часом, гельські вожді на заході стають сміливішими, повертаючи втрачені землі та кидаючи виклик нормандському правлінню.\n\nБез твердого керівництва ми ризикуємо впасти в ті ж розбіжності, що розкололи острів до нас. Проте, якщо ми скористаємося моментом — щоб відновити сильне управління або навіть заявити про панування над самою Ірландією — тоді майбутнє може належати нам, а не [GetCountry('ENG').GetGovernment.GetRulerTitle] Англії чи гельським повстанцям."
  country_history_finnic: "У бореальних лісах Північної Європи живуть [ShowCultureGroupName('finnic_group')] народи. Ми – еклектична група різних народів, які використовують свій розум і знання, щоб вижити в цьому суворому кліматі – ми фермери, але також і збирачі; ми будуємо будинки та сауни з нашої багатої деревини, але також можемо переміщувати наші поселення, щоб скористатися кращими ресурсами зі зміною сезонів. Життя нелегке, але воно багате, і ми успішні у своїй ніші.\n\nАле наша боротьба за виживання ускладнюється тим, що ми оточені ворогами. [CultureGroupName('german_group')] нації з півдня, [ShowCultureName('swedish')] нації із заходу та [ShowCultureGroupName('russian_group')] народи зі сходу – усі вони загрожують нам, сподіваючись повернути те, що вони вважають землями своїх предків. Гірше того, наші давні вірування замінюються [ShowReligionGroupAdjective('christian')] звичаями, і наші рідні боги зникають.\n\nЧи з'явиться могутній лідер і утвердить [ShowCultureGroupNameWithNoTooltip('finnic_group')] панування над регіоном, чи узурпатори з усіх боків зрештою підірвуть наше яскраве існування?"
  country_history_italian: "Землі [ShowRegionName('italy_region')] були роздроблені з падіння [ShowFormableCountryName('ROM_f')], чекаючи на сильного лідера, який знову об'єднає їх усіх. Однак ця відсутність союзу створила сильну конкуренцію між різними націями, що населяють півострів, не кажучи вже про потік суперництва за культурний розвиток. Жодна [ShowCultureGroupName('italian_group')] нація не позбавлена ​​відомого художника або власноруч розробленої та світової технологічної інновації, що виділяє [ShowRegionNameWithNoTooltip('italy_region')] як перлину в серці [ShowContinentName('europe')]. Ми є предметом заздрості всіх... як вигідне, так і дуже небезпечне становище."
  country_history_polish: "На берегах Вісли [ShowCultureGroupName('polish_group')] народ відчайдушно бореться за збереження своєї нації. Знову і знову нестабільна конфедерація розпадалася на безліч дрібніших держав, які запекло змагаються за шанс правити всіма [ShowCultureGroupName('polish_group')] душами.\n\nЯкою б божевільною не була ця суперечлива боротьба за владу, вона не відбувалася у вакуумі, і сусідні групи помітили наше відволікання. Приховані в тіні, ці потенційні завойовники планують захопити наші землі для себе, поки [ShowCultureGroupNameWithNoTooltip('polish_group')] нації марнують час, воюючи одна з одною.\n\nТільки сильний лідер може об'єднати ці землі та створити міцну націю, яка зможе протистояти всім своїм ворогам і нарешті розгромити їх. В іншому випадку [ShowCultureGroupNameWithNoTooltip('polish_group')] народ може бути розвіяний вітром."
  country_history_bohemian: "Наші землі століттями перебували в орбіті [GetCountry('BOH').GetName], часто керовані дрібними князями правлячої родини цієї країни. Хоча династія [GetCountry('BOH').GetGovernment.GetRuler.GetName] зберегла цю традицію в [GetCountry('MVA').GetName] після свого сходження, вона втратила землі [ShowProvinceDefinitionName('niederlausitz_province')] на користь [GetCountry('BRA').GetLongName], які борються за збереження свого правління в [GetCountry('SOR').GetName].\n\nХоча подальший приплив [ShowCultureGroupName('german_group')] поселенців приносить нових людей на наші землі, це також може загрожувати нашій владі в найближчому майбутньому, якщо наші правителі не зможуть зберегти суверенітет."
  country_history_east_slavic: "Підкорені під час [ShowCultureGroupName('mongolian_group')] навали, князівства сходу залишаються в неспокійних стосунках зі своїм номінальним сюзереном, [GetCountry('GLH').GetLongName]. Хоча багато князів все ще платять данину, зібрану [ShowSpecialStatusName('tatar_tax_collector')] [GetCountry('MOS').GetName], інші вже скинули кайдани [GetUniqueInternationalOrganization('tatar_yoke').GetName].\n\nМіж постійною [ShowCultureGroupName('mongolian_group')] загрозою та зростаючою могутністю [GetCountry('MOS').GetLongName], наша нація повинна пройти складну мережу дипломатії, якщо ми хочемо процвітати. Але якщо ми досягнемо успіху в цьому прагненні, ми могли б навіть претендувати на заповітну спадщину стародавньої Київської Русі..."
  country_history_iberian: "Стародавня Іспанія знову і знову була свідком наступів і відступів як [ShowReligionGroupName('christian')], так і [ShowReligionGroupName('muslim')] народів, і ці конкуруючі претензії на владу тривають донині. Наразі хвилі долі сприяють першим, тоді як остання група ледве утримує свої зменшені володіння. Однак остаточний результат нелегко передбачити, оскільки, хоча [ShowReligionGroupNameWithNoTooltip('muslim')] нації об'єднані, [ShowReligionGroupNameWithNoTooltip('christian')] царства страждають від розколу та міжусобиць.\n\nЧи закінчаться ці хаотичні часи остаточним вигнанням [ShowReligionGroupNameWithNoTooltip('muslim')] сил з [ShowRegionName('iberia_region')], чи [ShowReligionGroupNameWithNoTooltip('muslim')] народ поверне втрачені землі $ADU_f$?"
  country_history_georgian: "[ShowCultureName('georgian_culture')] народ пишається своєю довгою історією, адже їхні предки вже жили біля підніжжя [ShowRegionName('caucasus_region')] ще до заснування стародавніх імперій. Вони були одними з перших, хто прийняв [ShowReligionGroupName('christian')], і прийняли віру як частину своєї ідентичності. Навіть після розширення [ShowReligionGroupName('muslim')] і оточення язичницькими народами, вони трималися своєї віри і стали оплотом [ShowReligionGroupNameWithNoTooltip('christian')] на кордоні між Сходом і Заходом.\n\nНавіть [ShowCultureGroupName('mongolian_group')] орди $genghis_khan_name$ не змогли повністю підкорити [ShowCultureNameWithNoTooltip('georgian_culture')] народ, бо вони знову повстали на знак непокори, коли [ShowCultureGroupNameWithNoTooltip('mongolian_group')] загроза ослабла.\n\nБувши об'єднаними колись під великим королівством, [ShowCultureNameWithNoTooltip('georgian_culture')] народ тепер має потенціал знову досягти легендарних висот."
  country_history_GEO: "Ми досягли наших найславетніших звершень за правління [GetCharacter('geo_david_iv').GetName] та [GetCharacter('geo_tamar_the_great').GetName]. Тепер, після занадто довгого розділення, [GetCountry('GEO').GetLongName] знову об'єднана під владою [GetCharacter('geo_george_v').GetName], після того, як [GetCharacter('geo_george_v').GetHeSheFormal] завоював західну [GetCountry('GEO').GetNameWithNoTooltip] та відновив [GetCharacter('geo_george_v').GetHerHis] правління над усією [ShowCultureNameWithNoTooltip('georgian_culture')] територією. Навіть [GetCountry('ARM').GetName] тепер схиляється перед могутністю [GetCountry('GEO').GetNameWithNoTooltip].\n\nХоча все ще технічно підпорядковані [GetUniqueInternationalOrganization('ilkhanate').GetName], вони сильно роздроблені, і [GetCountry('GEO').GetNameWithNoTooltip] опиняється в порожній оболонці, чекаючи на сильного лідера, який повстане зсередини та візьме контроль. За таких обставин, як [GetCountry('GEO').GetNameWithNoTooltip] не може відродитися більшою, ніж будь-коли раніше?"
  country_history_armenian: "[ShowCultureName('armenian_culture')] народ живе на цих землях з давніх часів, їхня нація виникла біля підніжжя гори Арарат. Завзято пишаючись тим, що вони були першою нацією, яка прийняла [ShowReligionGroupName('christian')], вони пережили вторгнення [ShowReligionGroupName('muslim')], [ShowRegionName('persia_region')] та [ShowCultureGroupName('turkic_group')] народів, хоча вони бачили себе розділеними на кілька менших королівств, і слава великого [ShowCultureNameWithNoTooltip('armenian_culture')] королівства минулого давно зникла.\n\nОднак [ShowCultureNameWithNoTooltip('armenian_culture')] народ стійкий, і навіть після недавніх [ShowCultureGroupName('mongolian_group')] вторгнень вони виживають, чекаючи моменту, щоб знову повстати."
  country_history_ARM: "$country_history_armenian$ Хоча [GetCountry('ARM').GetLongName] нині перебуває під владою [GetCountry('GEO').GetLongName], а також [GetUniqueInternationalOrganization('ilkhanate').GetName], вона все ще має достатньо автономії, щоб діяти незалежно. Попри те, що вона є тінню колишньої [ShowCultureNameWithNoTooltip('armenian_culture')] слави, правляча династія [GetDynasty('zakarid_dynasty').GetName] зуміла відновити консолідацію свого правління та продовжує гордо стояти серед націй світу."
  country_history_persian: "Землі [ShowRegionName('persia_region')] завжди займали привілейоване становище, слугуючи точкою контакту між Заходом і Сходом та лежачи на шляху багатьох торговельних маршрутів. [ShowRegionNameWithNoTooltip('persia_region')] також була колискою багатьох великих імперій у минулому, від Ахеменідів до Сасанідів. Наші землі завжди були центром обміну ідеями, культурами та вірами, де проживали [ShowReligionName('zoroastrian')], [ShowReligionGroupName('muslim')], [ShowReligionGroupName('christian')] і навіть [ShowReligionGroupName('buddhist')] народи. Тому [ShowReligionGroupName('iranian_group')] народи належать світу, а не лише своїм культурам.\n\nНедавнє [ShowCultureGroupName('mongolian_group')] вторгнення та встановлення [GetUniqueInternationalOrganization('ilkhanate').GetName] нав'язали небажане іноземне правління, але попри це гноблення, [ShowReligionGroupNameWithNoTooltip('iranian_group')] готові знову повстати."
  country_history_indian: "Приголомшливі, різноманітні землі $india$ мають дуже довгу історію. Згідно з давніми [ShowReligionAdjective('hindu')] епосами, [ShowAdvanceName('mahabarata')] та [ShowAdvanceName('ramayana')], [ShowCultureGroupName('indian_group')] культура налічує тисячоліття. Її величезні землі та багатства завжди приваблювали увагу багатьох завойовників, як місцевих, так і іноземних, які бажали заволодіти всім цим для себе. Однак $india$ завжди залишалася сильною проти цих загарбницьких зазіхань.\n\nНещодавно наші володіння привернули увагу ще одного потенційного завойовника, цього разу [ShowReligionGroupAdjective('muslim')] віри. Віра [GetCountry('DLH').GetLongName] поширилася на значну частину території $india$, хоча багато [ShowReligionAdjectiveWithNoTooltip('hindu')] опорних пунктів по всьому субконтиненту залишаються непохитними. Інші [ShowCultureGroupNameWithNoTooltip('indian_group')] віри [ShowReligionGroupName('buddhist')] та [ShowReligionName('jain')] також зберігаються в деяких районах, хоча й значно зменшилися.\n\nМайбутнє $india$ тепер висить на волосині, як у її ідентичності, так і у вірі, і лише час покаже, як вона вийде з цього."
  country_history_thai: "[ShowCultureName('thai_culture')] народ мігрував з [ShowRegionName('south_china_region')] до [ShowRegionName('indochina_region')] століття тому, де вони відкрили землю, перетнуту торгівлею та впливами як з $india$, так і з $china$. Черпаючи з обох джерел, а також з присутності [ShowReligionName('hindu')] та [ShowReligionGroupName('buddhist')], [ShowCultureNameWithNoTooltip('thai_culture')] розвинула свою унікальну ідентичність, створивши державні утворення, здатні стояти на рівних з колишніми правителями, [ShowCultureName('mon_culture')] народом, чия територія зменшилася, а багато їхніх старих королівств були витіснені [ShowCultureNameWithNoTooltip('thai_culture')] королівствами. Це також призвело до занепаду [GetCountry('KHM').GetLongName], і вони згодом втратили значну частину свого попереднього впливу. Лише час покаже, яких подальших висот зможе досягти [ShowCultureNameWithNoTooltip('thai_culture')]."
  country_history_LAV: "$country_history_thai$\n\nОдним із [ShowCultureNameWithNoTooltip('mon_culture')] королівств, що зазнало занепаду, було [GetCountry('LAV').GetName], яке було не лише завойоване [ShowCultureNameWithNoTooltip('thai_culture')], але й розділене на [ShowCultureNameWithNoTooltip('thai_culture')] королівства [GetCountry('SPN').GetName] та [GetCountry('LAV').GetNameWithNoTooltip]. Останнє, хоча й зберегло свою назву з [ShowCultureNameWithNoTooltip('mon_culture')] періоду, перебувало під [ShowCultureNameWithNoTooltip('thai_culture')] правлінням, яке саме було під сюзеренітетом [GetCountry('KHM').GetLongNameWithNoTooltip].\n\nОднак [GetCountry('KHM').GetLongNameWithNoTooltip] за останні роки втратило владу, що не лише дозволило створити незалежне [GetCountry('SUK').GetLongName], але й дозволило [GetCountry('LAV').GetNameWithNoTooltip] скинути свої кайдани. Серед цих новонароджених незалежних королівств, поселення [ShowLocationName('ayodhya')], що розвивається, також обіцяє розширення. Можливість великих змін нарешті з'явилася перед нами."
  country_history_SUK: "$country_history_thai$\n\nОдним з таких відгалужень є [GetCountry('SUK').GetLongName], яке стало незалежним від [GetCountry('LAV').GetName] після того, як останнє потрапило під остаточний сюзеренітет [GetCountry('KHM').GetLongNameWithNoTooltip]. Після значного розширення під керівництвом [GetCharacter('suk_ram_khamhaeng').GetName], тепер [GetCountry('SUK').GetNameWithNoTooltip] стало явно домінуючою силою в регіоні, поширивши свій вплив далі, ніж будь-яке інше [ShowCultureNameWithNoTooltip('thai_culture')] королівство, що існувало раніше. Ми повинні зробити все можливе, щоб зберегти цю перевагу і розширити наш вплив ще далі, консолідуючи нашу владу..."
  country_history_tibet: "На вершині світу [ShowCultureGroupName('tibetan_group')] люди завжди жили дещо ізольовано від тих, хто за оточуючими горами. Хоча [ShowReligionGroupName('buddhist')] проникла в регіон з $india$, вона, тим не менш, еволюціонувала у власну окрему, місцеву традицію. Корінна релігія [ShowRegionName('tibet_region')], [ShowReligionName('bon')], також поглинула багато [ShowReligionGroupAdjectiveWithNoTooltip('buddhist')] елементів, до такої міри, що іноземні очі не могли розрізнити різниці. В результаті нашого ізольованого розвитку та місцевого переосмислення іноземних ідеалів, [ShowCultureGroupNameWithNoTooltip('tibetan_group')] ідентичність є дуже відмінною, і мало хто з іноземців зміг нас підкорити. Минуло вже століття з часів старої [ShowCultureGroupNameWithNoTooltip('tibetan_group')] імперії, але хто скаже, що вони не створять нову?"
  country_history_jurchen: "[ShowCultureName('jurchen_culture')] народ населяє [ShowRegionName('manchuria_region')] і поділяється на різноманітні групи, включаючи Цзяньчжоу, Хайсі та Диких чжурчженів, усі вони мають різні способи життя — деякі є мисливцями-збирачами, інші скотарями, але здебільшого ми є осілими землеробами.\n\n[ShowCultureGroupName('chinese_group')] чиновники офіційно розділили [ShowCultureNameWithNoTooltip('jurchen_culture')] за близькістю та характеристиками. Цзяньчжоуські чжурчжені, поблизу річки Мудань, перейняли [ShowCultureGroupNameWithNoTooltip('chinese_group')] звички; Хайсіські чжурчжені мають кочові та осілі племена вздовж річки Хайсі; а Єжень або Дикі чжурчжені, в малонаселеній північній Маньчжурії, покладаються на полювання та землеробство.\n\nПід впливом сусідніх династій, [ShowCultureNameWithNoTooltip('jurchen_culture')] групи очолюються вождями, які самі платять данину, щоб обіймати номінальні посади командирів прикордонної охорони. Але більші амбіції горять у серцях нашого народу..."
  country_history_mongolian_group: "Великий $genghis_khan_name$ створив імперію неперевершеної сили та амбіцій для всіх [ShowCultureGroupName('mongolian_group')] народів, приєднавши до своїх володінь величезні території від [ShowContinentName('europe')] до $china$. Люди всюди навчилися боятися звуку [ShowCultureGroupNameWithNoTooltip('mongolian_group')] армій, що скачуть, та могутності й сили Великого $rank_kingdom_horde_ruler_suffix_male$.\n\nЯк спадкоємці цієї спадщини, наша мрія про відновлення слави найвеличнішої [ShowCultureGroupNameWithNoTooltip('mongolian_group')] Орди палко горить у всіх нас."
  country_history_CHG: "$country_history_mongolian_group$\n\n[GetCharacter('chagatai_khan').GetName] був сином $genghis_khan_name_no_tooltip$, а отже, спадкоємцем його спадщини та імперії.\n\nСитуація [GetCountry('CHG').GetName] у центрі різних [ShowCultureGroupNameWithNoTooltip('mongolian_group')] держав має велике значення, оскільки Шовковий шлях проходить через наші землі, і багато його найважливіших міст перебувають під нашим контролем. Це ставить [GetCountry('CHG').GetNameWithNoTooltip] у найкраще становище для контролю над торгівлею та зв'язком між іншими спадкоємцями Великого $rank_kingdom_horde_ruler_suffix_male$. І якщо хтось з цих інших спадкоємців заперечить, ми розберемося з ними... рішуче."
  country_history_GLH: "$country_history_mongolian_group$ Саме [GetCharacter('jochi_borjigin').GetName], син $genghis_khan_name_no_tooltip$, та його син [GetCharacter('batu_borjigin').GetName] продовжили спадщину Великого $rank_kingdom_horde_ruler_suffix_male$ і заснували [GetCountry('GLH').GetLongName].\n\nКонтролюючи найзахідніше розширення великої імперії, ми є правителями величезних степів. Багато націй у [ShowContinentName('europe')] підкоряються нам, боячись нашої легендарної могутності. Як і повинно бути..."
  country_history_scandinavia: "Землі [ShowRegionName('scandinavian_region')] та [ShowRegionName('north_atlantic_islands_region')], що перебувають під їхнім правлінням, протягом останніх десятиліть насолоджувалися часом процвітання. [ShowGoodsName('fish')] ринки та морська торгівля [GetCountry('SKE').GetName] та [GetCountry('NOR').GetCulture.GetName] процвітають, а [ShowRegionName('north_atlantic_islands_region')] користуються автономним самоврядуванням, звільненими від будь-якого прямого впливу монарха.\n\nОднак ця епоха достатку перебуває під загрозою зовнішніх впливів. Зростаючий вплив [GetCountry('HSA').GetName] конкурує з місцевими купцями, тоді як частіші спостереження пакового льоду загрожують безпеці наших цінних зв'язків з [GetCountry('GRL').GetName]. З такими проблемами, що роз'їдають нас зсередини та ззовні, лише керівництво справжнього лідера забезпечить наше виживання."
  country_history_ruthenia: "З часів [GetCharacter('kie_rurik').GetName] землі Русі управлялися з [ShowLocationName('kyiv')], доки не впали під навалою [ShowCultureGroupName('mongolian_group')] орд. Хоча велика Київська Русь давно зникла, її спадщина живе в нас, як і войовнича кров наших предків. Тепер, роздроблені на безліч менших держав, землі Русі знову об'єднаються під [ShowCultureName('ruthenian')] прапором.\n\nОднак небезпека чатує на нашому шляху, оскільки інші [ShowCultureGroupName('russian_group')] обов'язково висунуть ті ж претензії та спробують об'єднатися, тоді як нависла присутність [ShowCultureGroupName('tatar_group')] [GetCountry('GLH').GetName] є постійною загрозою на наших кордонах. На заході решта [ShowReligionAdjective('catholic')] [ShowContinentName('europe')] також не сидітиме склавши руки, а нові [ShowCultureName('turkish_culture')] країни в [ShowRegionName('anatolia_region')] навряд чи довго залишатимуться поза континентом. Щоб знову об'єднати Русь, ми повинні подолати кожен з цих бар'єрів."
  country_history_france: "Землі [ShowRegionName('france_region')] оскаржуються між двома великими королівствами. Десятиліттями [GetCountry('FRA').GetAdjective] правителі боролися за консолідацію влади над своїми могутніми васалами, тоді як через Ла-Манш [GetCountry('ENG').GetAdjective] лідери загрожують територіальній цілісності своїх [GetCountry('FRA').GetAdjectiveWithNoTooltip] колег. Тліючі вуглинки минулих воєн ще можуть розгорітися у відкрите полум'я; тінь нової боротьби, яка визначить епоху, вже з'явилася на горизонті.\n\nНаступні десятиліття випробують нашу рішучість, оскільки [GetCountry('ENG').GetAdjectiveWithNoTooltip] армії [GetCharacter('eng_edward_iii').GetShortName] загрожують вторгнутися на [GetCountry('FRA').GetAdjectiveWithNoTooltip] землю. Альянси змінюються, і великі доми [ShowDynastyName('valois_dynasty')] зважують вірність проти амбіцій."
  country_history_britain: "Регіон [ShowRegionName('great_britain_region')] розділений між коронами та кланами, його єдність — скоріше мрія, ніж реальність. [GetCountry('ENG').GetAdjective] королі правлять з півдня, їхня влада стримується неспокійними баронами та затяжними амбіціями стародавніх династій. На півночі [GetCountry('SCO').GetAdjective] [GetCountry('SCO').GetFlavorRank] стоїть гордо та зухвало, залучений у криваву громадянську війну проти [GetCountry('SBL').GetAdjective].\n\nПравління [GetCharacter('eng_edward_iii').GetShortName] обіцяє як можливості, так і небезпеки. Прикордонні війни та невпинне суперництво між [GetCountry('ENG').GetAdjectiveWithNoTooltip] та [GetCountry('SCO').GetAdjectiveWithNoTooltip] вирішать, чи об'єднається цей острів під одним прапором, чи залишиться землею двох царств, замкнених у вічній боротьбі."
  country_history_balkan: "[ShowRegionName('balkan_region')] — це прикордонна зона між імперіями, вірами та культурами. Згасаюча влада [GetCountry('BYZ').GetAdjective] імператорів залишила землю вразливою, і нові сили піднімаються, щоб претендувати на її роздроблені території. Місцеві лорди, амбітні князі та іноземні газі з [ShowRegionName('anatolia_region')] бачать можливості в хаосі.\n\nНаступ [ShowCultureGroupName('turkic_group')] народів наближається, і наступні десятиліття вирішать, чи витримає [GetCountry('BYZ').GetAdjectiveWithNoTooltip] спадщина, чи буде зметена її конкуруючими сусідами."
  country_history_maghreb: "Основними культурними гравцями в регіоні [ShowRegionName('maghreb_region')] є [ShowCultureGroupName('amazigh_group')] та [ShowCultureGroupName('arabic_group')], які співіснували та воювали один з одним з часів вторгнень 7-го століття. Династії, що походять з обох сторін, деякі зі змішаною спадщиною, піднімалися та падали в цьому регіоні [ShowSubContinentName('north_africa')].\n\nЗнову ж таки, розкол між різними націями зробив їх потенційно вразливими для сильніших держав. Чи об'єднається ця земля знову?"
  country_history_sahel: "Регіони [ShowRegionName('sahel_region')] та Західної Африки поступово змінюються від посушливих просторів пустелі Сахара до узбережжя [ShowAreaName('gulf_of_guinea_area')], через золоті савани [ShowRegionNameWithNoTooltip('sahel_region')] та густі джунглі нижньої течії річки Нігер. На цих обширних територіях імперії [GetCountry('MAL').GetName] та [GetCountry('KBO').GetName] контролюють величезні володіння, а також транссахарські торговельні шляхи, тоді як інші народи, такі як [ShowCultureName('mossi')], [ShowCultureName('hausa')] та [ShowCultureName('yoruba')], чекають на можливості консолідувати свої відповідні землі та розширитися за межі своїх сусідів."
  country_history_kongo: "[ShowRegionName('kongo_region')] — це земля річкових королівств і лісистих глибин, де клани та вожді укладають союзи через кров, торгівлю та війну. В останні десятиліття амбітні правителі почали об'єднувати ці землі у більші царства, кожен прагнучи домінувати над родючими долинами та контролювати потік товарів уздовж великої річки.\n\nБаланс сил залишається крихким, і в наступні десятиліття один сильний лідер міг би об'єднати [GetCountry('KON').GetAdjectiveWithNoTooltip] народ... або занурити його в цикл нескінченного суперництва, ослабленого та вразливого для сторонніх."
  country_history_east_africa: "Від родючих берегів Нілу до приголомшливих узбереж [ShowRegionName('madagascar_region')]; від стародавніх портів [ShowRegionName('somalia_region')] до жвавих громад [ShowRegionName('swahili_coast_region')], безліч націй протистояли як силам природи, так і вторгненням потенційних завойовників, і залишалися непохитними. Це земля можливостей, з рясними багатствами, що чекають на збір та використання для створення могутньої імперії, чий вплив поширюється через моря."
  country_history_anatolia: "Займаючи регіон, який занадто добре знайомий з війною та постійно мінливим балансом сил, ми викували свою спадщину під тиском сусідніх ворожнеч. Занепад старих імперій та султанатів залишив лише вакуум влади, який чекає на заповнення численними бейликами навколо нас. $anatolia_desc$"
  anatolia_desc: "Серія бурхливих правлінь та постійні війни спустошують і без того нестабільний регіон, оскільки [ShowRegionName('anatolia_region')] наближається до межі повномасштабної війни..."
  country_history_caucasus: "[ShowRegionName('caucasus_region')] завжди був світом сам по собі. Багато імперій намагалися його завоювати, і багато хто зазнав невдачі. Навіть коли їм це вдавалося, вони не могли повністю стерти традиції та вірування його народів, бо життя біля підніжжя цих гір суворе, а його мешканці такі ж вперті та непохитні, як скелі, що їх оточують.\n\nОстанніми, хто намагався захопити контроль над цим регіоном, були [ShowCultureGroupName('mongolian_group')] $genghis_khan_name$ та його наступні держави [GetUniqueInternationalOrganization('ilkhanate').GetName] та [GetCountry('GLH').GetLongName]. Хоча їм вдалося нас завоювати, їхня влада над найслабшими регіонами хитається. Багато з нас вже скинули свої кайдани та діють незалежно, якщо взагалі були підкорені. Можливо, настав час рішучіше проявити нашу владу..."
  country_history_middle_east: "На територіях [ShowRegionName('egypt_region')], [ShowRegionName('crescent_region')] та [ShowRegionName('arabia_region')] міцно встановлено панування [GetCountry('MAM').GetLongName], що сприяє торгівлі між Середземним та Червоним морями та захищає паломників, які відвідують $game_concept_holy_sites$ [ShowLocationName('jerusalem')], [ShowLocationName('mecca')] та [ShowLocationName('medina')]. Однак культурні та релігійні відмінності між цими регіонами, разом із зовнішніми загрозами, можуть зруйнувати це панування та надати можливість для піднесення конкуруючих груп."
  country_history_china: "Земля $china$ здавна вважалася культурним центром світу. Її називають [GetUniqueInternationalOrganization('middle_kingdom').GetName], імперією, що існувала століттями, слугуючи зразком для наслідування меншим націям. Її вплив на культуру та віру сусідніх країн, а також багатство її двору є легендарними. Мандрівники та купці приїжджають здалеку, щоб на власні очі побачити велич Драконового Трону, і багато заздрісних націй намагалися наслідувати його у своїх дворах.\n\nОднак є стільки ж цих нижчих суперників, які хотіли б забрати цей скарб собі. Зараз [GetCountry('CHI').GetLongName] займає Драконовий Трон після завоювань великого $genghis_khan_name$. Але лише Небеса знають, що чекає цього Дракона в майбутньому..."
  country_history_indonesia: "[ShowRegionName('indonesia_region')] завжди була роздробленою через свою природу архіпелагу. Однак це не завадило її народу розвиватися та процвітати. Її моря постійно перетинають купці та торговці, і всі торговельні шляхи, що прямують між $china$ та $india$, повинні проходити через її води. Таким чином, [ShowRegionNameWithNoTooltip('indonesia_region')] завжди була землею економічного та культурного обміну. Іноземні віри також мали сильний вплив на її народ, особливо [ShowReligionName('hindu')] та [ShowReligionGroupName('buddhist')], і вони змішалися у спосіб, абсолютно унікальний для [ShowRegionNameWithNoTooltip('indonesia_region')], породивши могутні [ShowReligionAdjectiveWithNoTooltip('hindu')]-[ShowReligionGroupAdjectiveWithNoTooltip('buddhist')] королівства, такі як Шривіджая та Сінгасарі.\n\nЄ багато націй, які потенційно могли б одного дня домінувати в наших водах, як-от [GetCountry('MAJ').GetLongName] та [GetCountry('JMB').GetLongName], але лише час покаже, яка з них стане найвищою силою."
  country_history_indochina: "Між $india$ та $china$, [ShowRegionName('indochina_region')] завжди перебувала під впливом обох. З давніх часів вона була домом для могутніх королівств та імперій, таких як [GetCountry('PEG').GetLongName], [GetCountry('KHM').GetLongName] та [GetCountry('DAI').GetLongName]. Зовсім недавно [ShowCultureGroupName('thai_group')] народи, що прийшли з півночі, також почали створювати власні громади. [ShowRegionNameWithNoTooltip('indochina_region')] справді є різноманітним та роздробленим регіоном, де багато хто постійно бореться за місцеву гегемонію."
  country_history_america: "Перш ніж були розказані перші історії, наш народ жив добре і процвітав, дотримуючись духовних вчень і традицій наших предків. Багато криз і труднощів випробовували нашу рішучість і не змогли зламати нас. Чи понесемо ми спадщину і мудрість наших предків у майбутнє, чи повинні ми змінити наші шляхи і прокласти власний шлях у невідоме?"
  country_history_europe: "З настанням Відродження наша країна стоїть на роздоріжжі. Відродження інтересу до мистецтв та інновацій кидає виклик старим нормам і обіцяє культурне відродження. Однак досягнення у військовій технології також пропонують шлях вперед — шлях агресії та домінування.\n\nНаша нація повинна вирішити, чи сприяти цій культурній та інтелектуальній революції, чи інвестувати у свою військову міць. Вибір, який ми зробимо зараз, визначить наш курс на століття, вирішуючи, чи станемо ми маяком культури, чи символом військової могутності на віки."
  country_history_africa: "Землі [ShowContinentName('africa')] такі ж різноманітні та самобутні, як і громади та нації, що населяють їх. Пустелі та джунглі, гори та болота, савани та дельти річок; наша надзвичайно різноманітна географія також сформувала відмінності між нашими суспільствами, створивши як землеробів, так і скотарів, і мисливців-збирачів. Широкий спектр культурних, мовних та релігійних традицій серед її народів робить африканські суспільства одними з найрізноманітніших у відомому світі."
  country_history_asia: "Землі [ShowContinentName('asia')] завжди були багаті як на ресурси, так і на культуру. Від тисячолітньої імперії $china$ до стародавніх вірувань, які ми перейняли від $india$, наші численні торговельні шляхи — як-от Шовковий шлях — сприяли легкому обміну багатствами, а також ідеями та віруваннями. Кожна нація в [ShowContinentNameWithNoTooltip('asia')] черпає поживу з цих столітніх обмінів, і здається, що ще багато розвитку та розширення належить досягти."
  country_history_fallback: "У цей вирішальний момент наша нація стикається з новими можливостями та викликами. З розширенням глобальних торговельних шляхів ми можемо отримати вигоду від нових ідей, товарів та культурних обмінів. Однак збереження наших традицій та суверенітету серед цих змін залишається критично важливим завданням.\n\nНаша країна повинна вибрати, чи зосередитися на збагаченні культурного багатства, чи на зміцненні військової могутності. Наші рішення визначать майбутню траєкторію нашої нації в цьому дедалі більш взаємопов'язаному світі."