l_english:
  country_history_ARA: "[GetCountry('ARA').GetLongName] гордо стоїть як значна сила в західному Середземномор'ї завдяки своїй морській могутності, дипломатичній вазі та процвітаючим торговим мережам."
  country_history_AZT: ""
  country_history_BOH: "Стабілізація Королівства [ShowLocationName('valencia')] та триваюче завоювання новоствореного Королівства Сардинія та Корсика можуть забезпечити його панування на морях. Однак, попри відносну стабільність, на горизонті маячать виклики. На Сході [GetCountry('MLL').GetLongName] стикається з економічними труднощами, а ворожість його правителя до [GetCountry('ARA').GetGovernment.GetRuler.GetName] може призвести до конфлікту. На півострові загроза з боку [GetCountry('CAS').GetLongName] стає все більш реальною, оскільки #italic Реконкіста#! добігає кінця. На півночі [GetCountry('FRA').GetLongName] за останнє століття консолідували своє панування над [ShowAreaName('languedoc_area')]."
  country_history_BYZ: ""
  country_history_CAS: "Як має молодий [GetCountry('ARA').GetGovernment.GetRuler.GetShortName] зустріти майбутні виклики? Чи зосередиться [GetCountry('ARA').GetGovernment.GetRuler.GetHeShe] на Середземному морі і правитиме хвилями від [ShowLocationName('barcelona')] до Святої Землі? Чи повернеться [GetCountry('ARA').GetGovernment.GetRuler.GetHeShe] і заявить про панування над Іберією? Або [GetCountry('ARA').GetGovernment.GetRuler.GetHeShe] спробує помститися за битву при Мюре у 1213 році і повернути давно втрачені стародавні володіння на північ від Піренеїв?"
  country_history_CHA: "Протягом останніх двох століть групи людей [ShowCultureName('nahua_culture')], нащадки чичимеків, мігрували до центральної Мексики зі своєї легендарної прабатьківщини, відомої як Ацтлан. Наш народ був однією з цих мандрівних груп."
  country_history_CHI: ""
  country_history_CHK: "Як і багато інших [ShowCultureNameWithNoTooltip('nahua_culture')] народів, ми заснували наш власний [ShowGovernmentReformName('altepetl')] під назвою [ShowLocationName('tenochtitlan')], який був побудований на штучному острові в серці [ShowLocationName('texcoco_lake')]."
  country_history_CSU: ""
  country_history_DAI: "Наші найвидатніші постаті також були під впливом [ShowCultureName('toltec_culture')] культури, і в результаті ми розвинули витончену та складну цивілізацію, колискою якої була лагуна. Ми також були визнані вмілими бійцями нашими сусідами, оскільки наші однаково витончені бойові навички зробили армії [GetCountry('AZT').GetLongName] силою, яку слід боятися..."
  country_history_DAN: ""
  country_history_DHM: "Однак, зараз ми перебуваємо як васали [ShowGovernmentReformNameWithNoTooltip('altepetl')] [GetCountry('TEP').GetName], і тому наші можливості розширення обмежені територіями навколо лагуни, яку вони населяють. Тільки блискучий і здібний правитель міг би очолити [GetCountry('AZT').GetNameWithNoTooltip] у нашому поході, щоб підкорити Долину Мехіко і завоювати землі за її межами — чи може це бути [GetCountry('AZT').GetGovernment.GetRuler.GetShortName]]?"
  country_history_DLH: "Землі [GetCountry('BOH').GetName] лежать у серці германського [GetUniqueInternationalOrganization('hre').GetName] і населені [ShowCultureName('slavic')] народом. Після довгого періоду під владою династії [ShowDynastyName('premyslid_dynasty')], нинішні правителі [ShowDynastyName('luxembourg_dynasty')] можуть різко змінити ситуацію, посиливши існуючі зв'язки країни з Імперією, хоча [GetCountry('BOH').GetGovernment.GetRuler.GetName] є скоріше [ShowCultureName('french')], ніж [ShowCultureGroupName('german_group')], оскільки виховувався при королівському дворі [ShowLocationName('paris')]. Тримати задоволеними як [GetCountry('BOH').GetGovernment.GetEstateName('nobles_estate')], так і [GetCountry('BOH').GetGovernment.GetEstateName('peasants_estate')] під іноземним [GetCountry('BOH').GetGovernment.GetRulerTitle], navigating the political intricacies of the [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip], would prove a hurdle for anybody. На щастя, [GetCountry('BOH').GetNameWithNoTooltip] є сильним [GetCountry('BOH').GetFlavorRank], але чи досягне він своїх амбіцій?"
  country_history_DMS: "Колись гордовита [GetCountry('BYZ').GetFlavorRank], що простягалася від [ShowRegionName('egypt_region')] та [ShowAreaName('levant_area')] до [ShowRegionName('iberia_region')] та [ShowRegionName('italy_region')], [GetCountry('BYZ').GetName] тепер переживає період майже нестримного занепаду, спричиненого шоком Четвертого хрестового походу, навіть після повернення [ShowLocationName('constantinople')] династією [GetCountry('BYZ').GetGovernment.GetRuler.GetDynasty.GetName]. Під час правління [GetCharacter('byz_andronikos_ii_palaiologos').GetHerHis], [GetCharacter('byz_andronikos_ii_palaiologos').GetName] вважав за потрібне розпустити кілька ключових інститутів, таких як флот, у спробі врятувати вмираючу економіку країни, тоді як [ShowGovernmentReformName('theme_system')] продовжувала бути тінню того, чим вона була, оскільки [GetCountry('BYZ').GetFlavorRank] втрачала територію на всіх фронтах."
  country_history_ENG: ""
  country_history_ERE: "Наступник [GetCharacter('byz_andronikos_ii_palaiologos').GetHerHis|U], [GetCharacter('byz_andronikos_iii_palaiologos').GetName], тепер стоїть перед складним завданням збереження того, що залишилося від нашої колись славетної [GetCountry('BYZ').GetFlavorRank]. На сході, [GetCountry('TUR').GetName] почали збирати велику армію, щоб знищити наші залишки володінь в [ShowRegionName('anatolia_region')], погрожуючи перетнути протоки. У той же час, [GetCharacter('ser_stefan_dusan').GetName] дивиться на [ShowLocationName('thessaloniki')] та [ShowProvinceDefinitionName('north_epirus_province')] як хижий птах. Тим часом наша скарбниця вичерпується дорогоцінними монетами, і країна ще може бути кинута в небезпечну громадянську війну, оскільки родина нашого [GetCountry('BYZ').GetGovernment.GetRulerTitle] змовляється з [GetCountry('BYZ').GetGovernment.GetEstateName('nobles_estate')] за зачиненими дверима. Чи зможе [GetCountry('BYZ').GetGovernment.GetRulerTitle] підняти цю колись велику націю з попелу?"
  country_history_ETH: "[GetCountry('CAS').GetLongName] було сформовано шляхом об'єднання двох його складових частин, Королівства [GetCountry('CAS').GetNameWithNoTooltip] та [GetCountry('LON').GetLongName], коли вони були возз'єднані після успадкування обох титулів [GetCharacter('cas_fernando_iii_burgundy').GetName] у 1230 році. Століттям пізніше [GetCharacter('cas_alfonso_xi_burgundy').GetName] править без особливої опозиції, подолавши складний початок свого правління після закінчення довгого регентства під опікою своєї бабусі, [GetCharacter('cas_maria_molina').GetName]."
  country_history_EWY: ""
  country_history_FLO: "Приборкавши шляхту країни, очолювану його родичем [GetCharacter('cas_juan_manuel').GetName], та стабілізувавши управління країною, [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip] тепер звертає свою увагу на південний кордон. [GetCountry('GRA').GetLongName] загрожував нашій країні з моменту здобуття еміратом незалежності століття тому, підтримуваний могутнім [GetCountry('MOR').GetLongName], який має плацдарм в Іберії через дрібне королівство, зосереджене в [ShowLocationName('algeciras')] та [ShowLocationName('ronda')], і очолюване [GetCharacter('mor_abu_malik_abd_al_wahid').GetName], сином та спадкоємцем [GetCharacter('mor_abu_al_hasan_ali').GetName]."
  country_history_FRA: ""
  country_history_GEN: "Однак це не єдині проблеми для [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip], оскільки його стосунки з коханою коханкою, [GetCharacter('cas_leonor_guzman').GetName], та діти [GetCharacter('cas_alfonso_xi_burgundy').GetHerHis] від [GetCharacter('cas_leonor_guzman').GetHerHis] зруйнували стосунки з законною дружиною короля, [GetCharacter('cas_maria_portugal').GetName], дочкою [GetCharacter('por_afonso_iv_portugal').GetName]. Оскільки остання живе окремо від [GetCountry('CAS').GetGovernment.GetRulerTitle], цей розкол у королівській родині тепер ставить нагальне питання, хто ж успадкує його після його смерті."
  country_history_GRM: ""
  country_history_HUN: "Чи зможуть [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip] та його наступники впоратися з цими загрозами для [GetCountry('CAS').GetLongNameWithNoTooltip], як вдома, так і за кордоном?"
  country_history_JAP_common: "[GetCountry('CHA').GetName] – це сукупність багатьох різних, дещо автономних Чамських держав, які об’єдналися, щоб сформувати єдиний [GetCountry('CHA').GetFlavorRank]. Як єдина [ShowReligionAdjective('hindu')] держава на материковій [ShowRegionName('indochina_region')], народ [GetCountry('CHA').GetLongNameWithNoTooltip] постійно стикається із загрозою від занепадаючого [GetCountry('KHM').GetLongName] на заході та агресивного [GetCountry('DAI').GetLongName] на півночі. Попри ці зовнішні загрози, мореплавський хист народу [GetCountry('CHA').GetAdjectiveWithNoTooltip] дозволив їм накопичити багатство та владу над морями [ShowRegionName('indonesia_region')]."
  country_history_JAP: ""
  country_history_NTC: "Колись конгломерат розрізнених груп, [GetCountry('CHA').GetName] розквітнув у витончену силу, з якою треба рахуватися, але чи посяде він своє законне місце як правитель усіх націй?"
  country_history_STC: "Заснована [GetCharacter('kublai_khan').GetName], [GetCountry('CHI').GetLongName] тепер контролює величезні простори великої $rank_empire$. Приборкавши $china$ і процвітаючи під легендарним керівництвом [GetCharacter('kublai_khan').GetShortNameWithNoTooltip], вони досягли стратосферних висот престижу та пишності."
  country_history_japanese_clan_common: ""
  country_history_japanese_clan_north: "Однак, їхній вплив на субконтиненті слабшає. Внутрішні чвари, нестабільність та культурні тертя роз'їли те, що колись було процвітаючим та чудовим, і ті, хто бажає скинути [GetCountry('CHI').GetNameWithNoTooltip] та узурпувати їхній мандат, збирають свої сили. Змовники та інтригани в межах [GetCountry('CHI').GetNameWithNoTooltip] прагнуть знайти будь-яку можливу слабкість у правлінні $rank_empire$, змагаючись за крихти влади та мимохідну згадку у сувоїх історії. Але хоча багато хто може боротися та померти за честь, лише один лідер може сісти на Драконовий Трон та виконати волю Небес."
  country_history_japanese_clan_south: "$town$ [ShowLocationName('cahokia')], поселення, побудоване на злитті священних річок і благословенне родючими землями, виросло й перетворилося на складне суспільство. Життя в [ShowLocationNameWithNoTooltip('cahokia')] обертається навколо вирощування навколишньої родючої долини, де височіють Три Сестри — кукурудза, квасоля та гарбуз, а також навколо підкорення правлінню [GetCountry('CHK').GetGovernment.GetEstateName('clergy_estate')], які є плідними будівниками храмів. Культура [ShowCultureName('cahokia_culture')] поширилася по всій навколишній території, створивши величезну сферу впливу та приваблюючи нових мешканців з усього регіону."
  country_history_KAR: ""
  country_history_KBO: "Враховуючи наше суворо організоване суспільство та надзвичайно впливову культуру, ми піднялися до позиції, про яку більшість інших народів можуть лише мріяти. Однак ми все ще можемо зіткнутися з непереборними, непередбачуваними загрозами. Чи зможемо ми й далі будувати та розвивати наше суспільство, чи наша слава буде втрачена та забута назавжди?"
  country_history_KHM: "Керовані богом сонця, Інті, перші з наших лідерів заснували [ShowLocationName('qusqu')] на тому самому місці, де його золотий жезл занурився в землю. Після століть співіснування з іншими групами, [ShowCultureName('inca_culture')] нарешті досягли панування, і ми утвердилися як нащадки цього прекрасного місця. Високі вулкани та бурхливі річки Андських гір захищають і живлять Священну Долину Інків, де ми, сини Сонця, живемо в нашому чудовому місті і готуємося до славетного майбутнього, що нас чекає. Від нашого високого гірського бастіону до наших щедрих терасованих сільськогосподарських угідь, інші нації можуть лише заздрісно дивитися на наші багатства."
  country_history_KNI: ""
  country_history_KOR: "Після років консолідації влади та політики настав час для нашого народу розширити свій вплив за межі нашої дорогоцінної долини; щоб перемогти наших ворогів і йти гірськими стежками, доки ми не станемо в кожному куточку цього світу. Чи готові ми зустріти цю долю? Або наші вороги переможуть нас, перш ніж ми досягнемо свого розквіту?"
  country_history_LIT: "Вийшовши з наслідків громадянської війни з династією Нго в 968 році, [GetCountry('DAI').GetLongName] з тих пір бореться проти впливу $chinese_group$ Імперії, що стрімко розширюється на півночі. Хоча і є частиною [GetUniqueInternationalOrganization('middle_kingdom').GetName], народ [GetCountry('DAI').GetCulture.GetName] мусив неодноразово захищати свої землі від [GetCountry('CHI').GetCulture.GetName] загарбників, що породжувало сильні, довготривалі образи."
  country_history_MAC: ""
  country_history_MAJ: "Окрім зовнішніх загроз, [GetCountry('DAI').GetFlavorRank] також стикається з проблемами, спричиненими високою децентралізацією держави, а також додатковими викликами, пов'язаними з [ShowEstatePrivilegeName('peasants_autonomous_villages')] та нестабільним придворним життям, де ворожі актори постійно намагаються захопити [GetCountry('DAI').GetAdjectiveWithNoTooltip] трон."
  country_history_MAL: ""
  country_history_MAM: "Попри всі ці перешкоди, [GetCountry('DAI').GetNameWithNoTooltip] опиняється в сприятливій ситуації, оскільки [GetCountry('CHA').GetLongName] оточений ворогами і готовий до завоювання, а [GetCountry('KHM').GetName] стикається з внутрішнім занепадом на всіх фронтах. Це має бути знаком того, що сходження [GetCountry('DAI').GetFlavorRank] до наймогутнішої імперії в [ShowRegionName('indochina_region')] нарешті настало!"
  country_history_MLO: "Довгий час потужний гравець на світовій арені, [GetCountry('DAN').GetLongName] тепер опиняється в досить небезпечному становищі. Під час попереднього правління [GetCharacter('dan_chistopher_ii').GetName], значні частини країни були закладені видатним членам [ShowCultureName('danish')] та [ShowCultureGroupName('german_group')] [ShowEstateTypeName('nobles_estate')], [GetCountry('SLV').GetLongName] був насильно відокремлений від коронних земель, і навіть територію [GetCountry('SKE').GetName] довелося продати [GetCountry('SWE').GetLongName]. Цей ганебний стан справ погіршився, коли [GetCharacter('dan_chistopher_ii').GetNameWithNoTooltip] був повалений [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetName] після встановлення його власного племінника [GetCharacter('dan_valdemar_iii').GetName] на трон, лише для того, щоб зрештою бути повернутим знову як маріонетковий король. Після смерті [GetCharacter('dan_chistopher_ii').GetShortNameWithNoTooltip], [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetShortNameWithNoTooltip] був фактичним правителем [GetCountry('DAN').GetNameWithNoTooltip]."
  country_history_MOR: ""
  country_history_MOS: "Перебороти цю ситуацію буде нелегко, але [GetCountry('DAN').GetAdjective] є стійкими та рішучими, а [GetCharacter('dan_valdemar_atterdag').GetName], син [GetCharacter('dan_chistopher_ii').GetShortNameWithNoTooltip], вже розробляє план відновлення авторитету [GetCountry('DAN').GetFlavorRank]. Чи буде він успішним, чи ні – ще належить побачити."
  country_history_NAP: "[GetCountry('DHM').GetLongName] — це не звичайне володіння, а [GetCountry('DHM').GetFlavorRank] під владою [GetCountry('ENG').GetLongName], де [GetCountry('DHM').GetGovernment.GetRulerTitle] править з майже королівською владою. Наділений повноваженнями збирати армії, карбувати монету та здійснювати правосуддя, єпископ [ShowLocationName('durham')] діє як світський князь над своїм доменом у [ShowAreaName('northumbria_area')]."
  country_history_NAV: ""
  country_history_NOV: "Протягом поколінь ця виняткова автономія дозволяла єпископам охороняти північний кордон від [GetCountry('SCO').GetAdjective] набігів, їхнє укріплене місце в [ShowLocationNameWithNoTooltip('durham')] було бастіоном лояльності серед маршів."
  country_history_PAL: ""
  country_history_PAP: "Проте часи невизначені. Кордон стає неспокійним, [GetCountry('SCO').GetName] залишається ворожим, і навіть серед [GetCountry('DHM').GetGovernment.GetEstateName('clergy_estate')] ширяться чутки про реформи та амбіції. Хоча [GetCountry('DHM').GetFlavorRank] [ShowLocationNameWithNoTooltip('durham')] одягнений у священні шати, він є політичною істотою — і такою, що ще може відігравати більшу роль у справах держави."
  country_history_POL: ""
  country_history_PLE: "Чи залишиться [GetCountry('DHM').GetFlavorRank] тихим куточком королівської служби, чи може стати самостійною силою, великим північним королівством у всьому, крім назви?"
  country_history_POR: "Ряд швидких і рішучих завоювань у минулому столітті дав народження нашому великому [GetCountry('DLH').GetLongName]. З територіями під нашою юрисдикцією, що простягаються від [ShowRegionName('deccan_region')] до родючих полів [ShowLocationName('lahore')], жодна інша цивілізація не може зрівнятися з нашими престижними досягненнями."
  country_history_SCO: ""
  country_history_SBL: "Однак стало очевидним, що ми розширили свою владу настільки велику [GetCountry('DLH').GetFlavorRank]; нині стає все важче її контролювати. Наших ворогів багато, і вони прагнуть нівелювати нашу вищу спадщину та витончену культуру. На сході наші піддані в [ShowAreaName('bengal_area')] почали ставити під сумнів своїх господарів, тоді як наші південні території давно оскаржують нашу владу над ними. А [ShowReligionAdjective('hindu')] країни Південної $india$ можуть ще більше посилити свій опір нашому правлінню, очолювані зростаючою силою [GetCountry('VIJ').GetName]."
  country_history_SER: ""
  country_history_SWE: "Хоча ця ситуація здається небезпечною, ми довіряємо керівництву [GetCharacter('dlh_muhammad_bin_tughluq').GetName], чиє пильне око може захистити наші землі від загроз і тим самим запобігти нашому падінню..."
  country_history_TEU: "[GetCountry('DMS').GetLongName] знаходиться в суворих південно-західних регіонах Ірландії. Хоча далеко від [ShowLocationName('dublin')], це не віддалена глушина — ним править [GetCharacter('dms_maurice_fitzgerald').GetName], 1-й граф Десмонд, голова південної гілки могутньої династії [ShowDynastyName('fitzgerald_dynasty')], і один з наймогутніших лордів у всій [ShowRegionName('ireland_region')]."
  country_history_THO: ""
  country_history_TRE: "Отримавши своє графство у 1329 році, він викроїв напівнезалежний домен з кельтських вождів [GetCountry('THO').GetName] та англійської королівської влади [GetCountry('PLE').GetName]."
  country_history_TUR: ""
  country_history_ULS: "Графство відзначається змінними альянсами, ворогуючими маркерними баронами та постійною напруженістю як з Дубліном, так і з Лондоном. Оскільки англійська королівська влада на заході слабшає, ми можемо скористатися можливістю заявити про автономію, зіграти на протиріччях кельтських кланів або навіть претендувати на королівську владу в усьому, крім назви."
  country_history_VEN: ""
  country_history_VIJ: "Чи стане Десмонд основою нового іберно-нормандського відродження? Або його поглине хвиля кельтського відвоювання та ворожнечі суперницьких династій?"
  country_history_WLS: "[GetCountry('ENG').GetAdjective] корона досі не оговталася від підступного повстання, що сталося десять років тому і призвело до підступного вбивства [GetCharacter('eng_edward_ii').GetShortName]. Хоча ватажки були страчені, кільком співзмовникам було надано милість в ім'я миру — миру, який міг легко розвалитися в будь-який момент."
  country_history_ZAN: ""
  country_history_ZMW: "Тим часом, спадкоємець [GetCharacter('eng_edward_ii').GetShortName], що вижив, [GetCharacter('eng_edward_iii').GetShortName], вже довів, що є здібним молодим правителем, і робить сміливі плани щодо [GetCountry('FRA').GetAdjective] трону — трону, який є його родовим правом як онука правителя [ShowDynastyName('capet_dynasty')]."
  country_history_haudenosaunee: ""
  country_history_puebloan: "На півночі, оманливий [GetCountry('SBL').GetName] слабо змагається за [GetCountry('SCO').GetAdjective] корону, тоді як наші вірні васали міцно тримають владу в [GetCountry('WLS').GetName], [GetCountry('PLE').GetName], і [GetCountry('AQN').GetName]."
  country_history_nahua: ""
  country_history_mayan: "Як ми переживемо бурхливі роки? Чи перетнемо ми канал і станемо континентальною державою, чи нам варто звернути погляд до морів для світового панування?"
  country_history_tonal: "Заснована [GetCharacter('ere_eretna').GetName], ільханідським офіцером [ShowCultureName('uyghur_culture')] походження, ця Бейлікська держава виникла після його перемоги в битві при Каранбюку проти [ShowCultureName('mongolian_culture')] воєначальників. Оголосивши незалежність від своїх колишніх сюзеренів, [GetCharacter('ere_eretna').GetNameWithNoTooltip] став султаном і отримав прізвисько #italic Köse Peyghamber#!, \"Безбородий Пророк\", за своє процвітаюче правління. $anatolia_desc$"
  country_history_andean: "[GetCountry('ETH').GetLongName] — це стародавня земля, багата історією та традиціями. Розташована на Африканському Розі, вона може похвалитися пишними нагір'ями, вітряними плато та незрівнянною Великою Рифтовою Долиною. Новоприбулі зачаровані її красою, захоплені золотими заходами сонця на тлі гір Симіен."
  country_history_low_countries_common: ""
  country_history_low_countries_minors: "Чарівний гобелен [GetCountry('ETH').GetNameWithNoTooltip] сплітає різноманітні етнічні групи, такі як [ShowCultureName('amhara')], [ShowCultureName('afar_culture')] та [ShowCultureName('tigre')]. Об'єднана випробуваннями, [GetCountry('ETH').GetNameWithNoTooltip] залишається стійкою, як стародавнє баобабове дерево, що витримує випробування часом."
  country_history_BRB: ""
  country_history_FLA: "Натхненна цими стародавніми початками, [GetCountry('ETH').GetNameWithNoTooltip] цінує легендарні союзи, такі як союз цариці Савської та царя Соломона. Спадщина їхнього сина Менеліка, першого члена династії [ShowDynastyName('solomonid_dynasty')], лунає крізь віки, поєднуючи народ цієї землі з давніми ізраїльтянами."
  country_history_FRI: ""
  country_history_GEL: "Протягом років епічна історія [GetCountry('ETH').GetNameWithNoTooltip] розгортається, формуючись долею та непохитним духом її народу. Тріумфи та випробування сплітають багатий гобелен припливів і відпливів життя."
  country_history_HAI: ""
  country_history_HOL: "Однак ця нація є царством, оточеним супротивниками, які з нетерпінням чекають будь-якої нагоди для удару. Вижити і процвітати буде викликом."
  country_history_LIE: "Розташоване на прикордонних землях між [ShowAreaName('wales_area')] та серцевиною [GetCountry('ENG').GetLongName], [GetCountry('EWY').GetLongName] займає життєво важливе стратегічне положення як одне з маркграфств, якому доручено охороняти західний кордон держави."
  country_history_LUX: ""
  country_history_UTR: "Нинішній правитель, [GetCharacter('eng_bartholomew_burghersh_the_elder').GetName], є вірним слугою Корони та ветераном як війни, так і придворного життя. Довірений наближений [GetCharacter('eng_edward_iii').GetShortName], він проявив себе не лише на полі бою, а й як королівський посланник та адміністратор, часом обіймаючи посади констебля [ShowLocationName('dover')] та доглядача П'яти Портів. Його земельна влада в Марках дає йому багатство та вплив, хоча він залишається завжди пильним до змінних лояльностей та амбіцій, які визначають регіон."
  country_history_swiss_group: ""
  country_history_baltic_german: "Чи збереже лінія [ShowDynastyName('burghersh_dynasty')] свою прихильність у [ShowDynastyNameWithNoTooltip('burghersh_dynasty')] та охоронятиме Марки з честю? Або змінні течії політики, війни та спадщини зметуть цей маркграфський опорний пункт?"
  country_history_german_group: "[GetCountry('FLO').GetAdjective] домен міцно стоїть на порозі нової епохи! Наша республіка витримала випробування часом і розташована у вигідному положенні, щоб скористатися процвітанням та багатством нашого регіону. Навколо нас суперницькі держави та потенційні союзники роблять свої кроки, намагаючись впливати та розширювати свої території в [ShowRegionName('italy_region')]."
  country_history_BAV: ""
  country_history_BRA: "Однак мало хто так добре відомий своєю схильністю до мистецтв та культурного впливу, як ті, хто перебуває на наших форумах думки в [GetCountry('FLO').GetName]. Під керівництвом здібної адміністрації та освіченого населення наступне століття піднесе наш народ і змусить нас яскраво сяяти як новаторів-першовідкривачів у часи великого просвітництва. За умови, звичайно, що ми утвердимося як такі..."
  country_history_MEI: "Смерть [GetCharacter('fra_charles_iv_capet').GetShortName] без спадкоємця чоловічої статі в 1328 році ознаменувала кінець правління [ShowDynastyName('capet_dynasty')] над [GetCountry('FRA').GetLongName], що призвело до коронації [GetCharacter('fra_philip_vi_valois').GetName], родича з колишньої молодшої гілки династії. Однак це право було оскаржене [GetCharacter('eng_edward_iii').GetName] з [GetCountry('ENG').GetName] під приводом того, що, хоча [ShowHeirSelectionName('salic_law')] [GetCountry('FRA').GetNameWithNoTooltip] забороняє передачу трону жіночій наступниці, вона не забороняє успадкування через жіночу лінію. Як син [GetCharacter('eng_isabella_of_france').GetName], останньої живої сестри [GetCharacter('fra_charles_iv_capet').GetShortNameWithNoTooltip], [GetCharacter('eng_edward_iii').GetShortNameWithNoTooltip] міг би претендувати на трон [GetCountry('FRA').GetNameWithNoTooltip] як своє право за народженням."
  country_history_HAB: ""
  country_history_irish_minors: "Напруженість між обома країнами посилилася за останні роки, оскільки наша гостинність вигнанця молодого правителя [GetCountry('SCO').GetName], [GetCharacter('sco_david_ii').GetName], розлютила [GetCountry('ENG').GetAdjectiveWithNoTooltip] двір, який підтримує суперницького претендента [GetCountry('SBL').GetName] на [GetCountry('SCO').GetAdjectiveWithNoTooltip] трон. У відповідь [GetCharacter('eng_edward_iii').GetShortNameWithNoTooltip] також нещодавно надав притулок [GetCharacter('eng_robert_iii_artois').GetName], який уникнув виклику до суду в [ShowLocationName('paris')] за спроби захопити [GetCountry('ARS').GetLongName]. Ходять чутки, що [GetCharacter('eng_robert_iii_artois').GetShortNameWithNoTooltip] навіть заохочує незадоволеного [GetCharacter('eng_edward_iii').GetShortNameWithNoTooltip] військовим шляхом відстоювати свої претензії на трон [GetCountry('FRA').GetNameWithNoTooltip]."
  country_history_anglo_irish_minors: ""
  country_history_finnic: "Якщо відносини досягнуть точки кипіння, [GetCharacter('fra_philip_vi_valois').GetShortNameWithNoTooltip] може потребувати підтримки своїх підданих, хоча більше одного амбітного [ShowSubjectTypeName('appanage')] зі старої королівської лінії може скористатися можливістю вимагати більших привілеїв, що стане більшою загрозою для стабільності корони, ніж будь-який завойовник. Наступні роки будуть визначальними для майбутнього [GetCountry('FRA').GetNameWithNoTooltip], якому доведеться одночасно зіткнутися із зовнішньою [GetCountry('ENG').GetAdjectiveWithNoTooltip] загрозою та гордими [GetCountry('FRA').GetAdjectiveWithNoTooltip] лордами. Чи впаде країна під натиском фальшивих претендентів, чи виступить як головна сила в [ShowContinentName('europe')]?"
  country_history_italian: "Місто [ShowLocationName('genoa')] виступає як найважливіший торговельний порт у [ShowAreaName('western_mediterranean_sea_area')], його [GetCountry('GEN').GetGovernment.GetGovernmentType.GetName] значно розширив свій вплив за кордоном через торгівлю та війни."
  country_history_polish: ""
  country_history_bohemian: "Після перемоги над [GetCountry('PIS').GetLongName] він отримав острів Корсика та заснував плацдарм в [ShowAreaName('sardinia_area')]. Однак це, можливо, був отруйний подарунок, оскільки [ShowLocationNameWithNoTooltip('genoa')] тепер може зіткнутися не лише з опозицією своїх мешканців, а й з [GetCharacter('ara_peter_iv_arago').GetName], самопроголошеним сувереном обох островів."
  country_history_east_slavic: ""
  country_history_iberian: "Ще одна проблема може виникнути зі сходу, оскільки наша широка мережа створила умови для комерційного панування над [ShowAreaName('black_sea_area')], зосередженого навколо порту [ShowLocationName('kaffa')], хоча небезпечні сусіди, такі як [GetCountry('VEN').GetName], [GetCountry('BYZ').GetName] або [GetCountry('GLH').GetLongName], можуть бути загрозою."
  country_history_georgian: ""
  country_history_GEO: "Чи зможе [GetCountry('GEN').GetNameWithNoTooltip], покладаючись на численні [ShowBuildingTypeName('fondaco')] та заможних банкірів, подолати ці виклики?"
  country_history_armenian: "Постаючи з руїн Сельджуцької імперії, [GetCountry('GRM').GetName] міцно закріпився в регіоні під керівництвом [GetCharacter('grm_yakub_i').GetName]. Після повстання проти Сельджуцької влади в 1283 році, наш великий народ нарешті досяг миру в 1314 році, здобувши вражаючий спектр територій, включаючи життєво важливе місто [ShowLocationName('ankara')]. $anatolia_desc$"
  country_history_ARM: "Століттями великий [GetCountry('HUN').GetLongName] захищав цей бастіон [ShowReligionName('catholic')] від язичників та іновірців, які загрожували ззовні. Недавні повстання серед [GetCountry('HUN').GetGovernment.GetEstateName('nobles_estate')] поставили цей обов'язок під загрозу, але завдяки залізній руці [GetCountry('HUN').GetGovernment.GetRuler.GetName], незадоволені [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] були приборкані, а [GetCountry('HUN').GetAdjective] віра була оновлена та зміцнена."
  country_history_persian: ""
  country_history_indian: "Однак майбутнє [GetCountry('HUN').GetNameWithNoTooltip] не полягає в мирному житті, оскільки на південному сході вже назрівають нові проблеми, які кинуть виклик силі #italic Regnum Marianum#!."
  country_history_thai: ""
  country_history_LAV: "Яка доля чекає [GetCountry('HUN').GetLongNameWithNoTooltip]? Чи впаде він під натиском ворогів праведних? Або гордо вистоїть перед натиском тих, хто прагне його загибелі?"
  country_history_SUK: "Після довгого періоду миру під владою Камакурського Сьогунату, острови Японії знову були занурені у війну під час [GetCountry('MGE').GetAdjective] вторгнень. Це послабило владу $JAPANESE_SHOGUNATE_LEADER_MALE$ до такої міри, що [GetCountry('STC').GetGovernment.GetRuler.GetName] зміг відібрати у нього контроль над країною. Однак наміри [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] відновити імперське правління не здійснилися, оскільки [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] колишній союзник [GetCountry('JAP').GetGovernment.GetRuler.GetName] замість цього заснував новий [GetUniqueInternationalOrganization('japanese_shogunate').GetName]."
  country_history_tibet: "$country_history_JAP_common$"
  country_history_jurchen: ""
  country_history_mongolian_group: "Тепер [GetCountry('JAP').GetGovernment.GetRuler.GetNameWithNoTooltip] править країною після того, як [GetCountry('STC').GetGovernment.GetRuler.GetShortNameWithNoTooltip] втік зі столиці і заснував [GetCountry('STC').GetGovernment.GetRuler.GetHerselfHimself] у [GetCountry('STC').GetCapital.GetName]. Однак боротьба між центральним урядом і імператором-втікачем далеко не закінчена..."
  country_history_CHG: "$country_history_JAP_common$"
  country_history_GLH: ""
  country_history_scandinavia: "Тепер [GetCountry('JAP').GetGovernment.GetRuler.GetNameWithNoTooltip] призначив [GetCountry('NTC').GetGovernment.GetRulerOrHeirIfRegent.GetName] своїм [GetCountry('NTC').GetGovernment.GetRulerTitle] у [GetCountry('NTC').GetCapital.GetName], але знову ж таки як маріонетку, підпорядковану найвищій владі [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]."
  country_history_ruthenia: "$country_history_JAP_common$"
  country_history_france: ""
  country_history_britain: "Фактично перебуваючи у вигнанні зі столиці, [GetCountry('STC').GetGovernment.GetRuler.GetShortNameWithNoTooltip] опиняється в становищі, коли [GetCountry('STC').GetGovernment.GetRuler.GetHerselfHimself] має збирати підтримку для [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] справи, якщо [GetCountry('STC').GetGovernment.GetRuler.GetHeSheFormal] має вижити і знову кинути виклик владі [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]. Настав час піднятися — або впасти."
  country_history_balkan: "$country_history_JAP_common$"
  country_history_maghreb: ""
  country_history_sahel: "Розрізнені клани тепер бачать себе розділеними у своїх вірностях."
  country_history_kongo: "$country_history_japanese_clan_common$ Як вірний прихильник [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] та [GetCountry('NTC').GetLongName], цей клан виступає проти втікаючого [GetCountry('STC').GetGovernment.GetRuler.GetNameWithNoTooltip] та [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] претензії на Хризантемний трон."
  country_history_east_africa: "$country_history_japanese_clan_common$ Як вірні прихильники вигнаного [GetCountry('STC').GetGovernment.GetRuler.GetNameWithNoTooltip] та [GetCountry('STC').GetGovernment.GetRuler.GetHerHis] законної претензії на Хризантемний трон, вони опиняються в протистоянні з владою [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle]."
  country_history_anatolia: "Як найбільший залишок колись великої імперії, ми стоїмо на порозі боротьби за владу в нашому регіоні. Нові амбітні бейліки піднімаються і роблять свої ставки на владу, мріючи про об'єднання роздробленого народу після розпаду Руму. Відкриті канали зв'язку та дипломатія з правителями [ShowLocationName('cairo')] благословили нашу скарбницю та легітимізували наше правління, тоді як багато процвітаючих місць, таких як [ShowLocationName('konya')] та [ShowLocationName('ermenek')], залишаються під нашим контролем. $anatolia_desc$"
  anatolia_desc: "Світанок 14 століття бачить останні залишки династії [ShowDynastyName('sayfawa_dynasty')], які борються між собою за крихти влади, тримаючись за ту невелику легітимність, що в них залишилася, стиснутими, відчайдушними руками."
  country_history_caucasus: ""
  country_history_middle_east: "[GetCharacter('kbo_salmama').GetShortName] наполегливо намагається зберегти єдність нашого народу, навіть коли внутрішні та зовнішні нитки плетуть свої ігри з тіні. Це, безумовно, бурхливий час, який озброїть наш народ рішучістю рухатися вперед і розвиватися... або, можливо, розірве нас на частини, залишивши нас лише зноскою в анналах історії."
  country_history_china: "Великий [GetCountry('KHM').GetLongName] існував століттями як безперечний центр [ShowRegionName('indochina_region')]. З тих пір, як вони перейшли до [ShowReligionName('theravada')], [GetCountry('KHM').GetNameWithNoTooltip] поступово втратив свою владу над безперечним правлінням регіону. Зростаючі сили на сході та заході від старої столиці [ShowLocationName('angkor')] загрожують порушити динаміку влади у всій [ShowRegionNameWithNoTooltip('indochina_region')]."
  country_history_indonesia: ""
  country_history_indochina: "Обтяжений складним утриманням своїх іригаційних систем та великих храмових комплексів, [GetCountry('KHM').GetNameWithNoTooltip] повинен буде захистити себе від іноземного вторгнення, щоб вижити та відновити своє становище гегемона [ShowRegionNameWithNoTooltip('indochina_region')]."
  country_history_america: "[GetCountry('KNI').GetName] завоював острів [ShowLocationName('rodos')] на початку 14 століття, підштовхнутий падінням Акри в 1291 році, і заснував фортецю, яка допомогла б нам у нашій місії захисту [ShowReligionGroupAdjective('christian')] прочан. [ShowLocationNameWithNoTooltip('rodos')], мальовничий острів в [ShowAreaName('aegean_sea_area')], став процвітаючим центром для нашого [ShowGovernmentReformName('military_order_reform')], що вирізнявся високими укріпленнями та жвавою економікою. Однак це процвітання дещо нівелюється безперервними нападами сусідніх [ShowReligionGroupAdjective('muslim')] флотів. Але ми продемонстрували надзвичайну стійкість, захищаючи [ShowLocationNameWithNoTooltip('rodos')] у жорстоких битвах, які продемонстрували нашу військову доблесть і непохитну відданість."
  country_history_europe: ""
  country_history_africa: "Тим не менш, майбутнє нашого Ордену виглядає похмурим, оскільки наші вороги стають все могутнішими, а роз'єднаність між [ShowReligionAdjective('catholic')] країнами поширюється. Повернення Святої Землі здається згасаючою надією з кожним днем, але наша рішучість незламна, і ми будемо переслідувати цю мету, поки не впаде наш останній чоловік."
  country_history_asia: "Після досягнення національного об'єднання славетне формування [GetCountry('KOR').GetLongName] принесло його народу золотий період процвітання та безпрецедентної єдності. Мистецтво, грамотність, дипломатія та непохитна віра процвітали в цей легендарний час, назавжди змінивши культурний ландшафт [ShowRegionName('korea_region')]."
  country_history_fallback: ""