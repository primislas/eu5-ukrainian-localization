  independence_movement: "Рух за незалежність"
  independence_movement_desc: "Настав час скинути кайдани наших [Concept('overlords', 'CONCEPT_PLACEHOLDER')|e] і боротися за свободу! Рухи за незалежність можуть розпочатися в будь-який час, але більш імовірно виникнуть, якщо [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] незадоволений життям під керівництвом свого поточного лідера. Рух за незалежність може швидко набрати прихильників, якщо ми непопулярні."
