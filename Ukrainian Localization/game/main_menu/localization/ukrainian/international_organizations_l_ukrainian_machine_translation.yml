  union_royal_assembly: "Королівська Асамблея"
  union_royal_assembly_desc: "$union_royal_assembly$ — це досить рудиментарна рада для всієї [GetInternationalOrganizationType('union').GetName]. [Concept('estates', 'CONCEPT_PLACEHOLDER')|e] членів скликаються в асамблеї для обговорення та узгодження впровадження централізуючих [Concept('laws', 'CONCEPT_PLACEHOLDER')|e]."
  hre_court_assembly: "Придворна Асамблея"
  hre_court_assembly_desc: "З давніх часів [GetCharacter('ogk_otto_liudolfinger').GetName], $hre_court_assembly$ є давнім і примітивним стилем асамблеї в межах [GetUniqueInternationalOrganization('hre').GetName]. Через відсутність кодифікованих процесів, обговорення впровадження законів з [GetUniqueInternationalOrganization('hre').GetLeaderTitle] зазвичай не такі ефективні, як могли б бути.\n\n$BULLET_WITH_TAB$ Значно збільшує силу голосу для [ShowSpecialStatusName('emperor')], [ShowSpecialStatusNamePlural('elector')] та [ShowSpecialStatusNamePlural('archbishop_elector')]\n$BULLET_WITH_TAB$ Значно зменшує вплив [ShowSpecialStatusNamePlural('free_city')], [ShowSpecialStatusNamePlural('imperial_prelate')], [ShowSpecialStatusNamePlural('primas_germaniae')] та [ShowSpecialStatusNamePlural('legatus_natus')]\n$BULLET_WITH_TAB$ [ShowSpecialStatusNamePlural('imperial_peasant_republic')] мають стандартну силу"
  hre_early_imperial_diet: "Ранній Імперський Рейхстаг"
  hre_early_imperial_diet_desc: "Найраніша форма [ShowLawName('imperial_diet_law')] представляє традиційний порядок [GetInternationalOrganizationType('hre').GetName]. Лише [ShowSpecialStatusNamePlural('elector')], [ShowSpecialStatusNamePlural('archbishop_elector')] та [ShowSpecialStatusNamePlural('imperial_prince')] можуть брати участь, виключаючи [ShowSpecialStatusNamePlural('free_city')] та нижчі церковні утворення з законодавчого процесу.\n\n$BULLET_WITH_TAB$ Сильна сила голосу для [ShowSpecialStatusNamePlural('emperor')], [ShowSpecialStatusNamePlural('elector')], [ShowSpecialStatusNamePlural('archbishop_elector')] та [ShowSpecialStatusNamePlural('imperial_prince')]\n$BULLET_WITH_TAB$ [ShowSpecialStatusNamePlural('free_city')] та [ShowSpecialStatusNamePlural('imperial_peasant_republic')] не мають права голосу\n$BULLET_WITH_TAB$ Незначні церковні ролі, такі як [ShowSpecialStatusNamePlural('imperial_prelate')], [ShowSpecialStatusNamePlural('primas_germaniae')] та [ShowSpecialStatusNamePlural('legatus_natus')], мають обмежену владу"
  hre_bi_camerial_imperial_diet: "Двопалатний Імперський Рейхстаг"
  hre_bi_camerial_imperial_diet_desc: "[ShowParliamentTypeName('hre_bi_camerial_imperial_diet')] розширює представництво, надаючи право голосу як церковним сановникам, так і князівським правителям, утворюючи дві палати в Рейхстазі.\n\n$BULLET_WITH_TAB$ Стандартна влада для [ShowSpecialStatusNamePlural('emperor')], [ShowSpecialStatusNamePlural('elector')], [ShowSpecialStatusNamePlural('archbishop_elector')] та [ShowSpecialStatusNamePlural('imperial_prince')]\n$BULLET_WITH_TAB$ [ShowSpecialStatusNamePlural('imperial_prelate')] отримують значний вплив\n$BULLET_WITH_TAB$ [ShowSpecialStatusNamePlural('free_city')] та [ShowSpecialStatusNamePlural('imperial_peasant_republic')] все ще не мають представництва"
  hre_tri_camerial_imperial_diet: "Трипалатний Імперський Рейхстаг"
  hre_tri_camerial_imperial_diet_desc: "З [ShowParliamentTypeName('hre_tri_camerial_imperial_diet')] [ShowSpecialStatusNamePlural('free_city')] нарешті отримують вирішальний голос. Імперський сейм тепер складається з трьох палат — церковної, князівської та міської — що відображає більш інклюзивний баланс сил.\n\n$BULLET_WITH_TAB$ Збалансована влада між [ShowSpecialStatusName('emperor')], [ShowSpecialStatusNamePlural('elector')], [ShowSpecialStatusNamePlural('archbishop_elector')], [ShowSpecialStatusNamePlural('imperial_prince')], [ShowSpecialStatusNamePlural('free_city')] та меншими теократичними ролями\n$BULLET_WITH_TAB$ [ShowSpecialStatusNamePlural('imperial_peasant_republic')] отримують тут найвищий вплив\n$BULLET_WITH_TAB$ Найбільш інклюзивна форма сейму"
  call_organization_parliament: "Скликати парламент"
  call_organization_parliament_desc: "Це скличе засідання парламенту [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] у спробі отримати підтримку для вирішення [Concept('parliament_issue', 'CONCEPT_PLACEHOLDER')|e], зміни [Concept('policies', 'CONCEPT_PLACEHOLDER')|e] у [Concept('laws', 'CONCEPT_PLACEHOLDER')|e], створення [Concept('casus_belli', 'CONCEPT_PLACEHOLDER')|e] та підвищення [Concept('taxes', 'CONCEPT_PLACEHOLDER')|e] або збільшення [Concept('army_levies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('navy_levies', 'CONCEPT_PLACEHOLDER')|e]."
