  union: "$game_concept_union$"
  union_desc: "$game_concept_union_desc$"
  UNION_IO_PARLIAMENT_TOOLTIP: "[Concept('parliament', 'CONCEPT_PLACEHOLDER')|e] [Concept('InternationalOrganizationsView.GetInternationalOrganization.GetName] служить іншій меті, ніж ті, що належать до інших [international_organizations', 'CONCEPT_PLACEHOLDER')|e]. У той час як більшість парламентів займаються [Concept('parliament_issues', 'CONCEPT_PLACEHOLDER')|e], парламент [InternationalOrganizationsView.GetInternationalOrganization.GetType.GetName] зарезервований для [ShowSpecialStatusName('senior_partner')] для впровадження [Concept('laws', 'CONCEPT_PLACEHOLDER')|e] Союзу для нових членів."
  marriage_union: "Шлюбний союз"
  marriage_union_desc: "Особливий [Concept('union', 'CONCEPT_PLACEHOLDER')|e], який створюється через [Concept('royal_marriage', 'CONCEPT_PLACEHOLDER')|e]. На відміну від [GetInternationalOrganizationType('union').GetName], $marriage_union$ не може бути централізованим і більше схожий на [GetInternationalOrganizationType('defensive_league').GetName]."
  union_recent_policy_change_cd: "Нещодавно змінена політика союзу"
  union_annexation_rule_tt: "Було встановлено не-[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] [ShowSpecialStatusName('senior_partner')] та прийнято відповідну [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] у [ShowLawName('union_unification_of_crowns_law')]"
  marriage_union_tooltip_title: "[GetInternationalOrganizationType('marriage_union').GetNameWithNoTooltip]"
  union_integration_level_tooltip: "[Concept('union_integration_level', 'CONCEPT_PLACEHOLDER')|e]: [InternationalOrganizationsView.GetInternationalOrganization.GetModifierValueString('union_integration_level')]"
  marriage_union_mechanic_tooltip: "[GetInternationalOrganizationType('marriage_union').GetName] — це децентралізований [GetInternationalOrganizationType('union').GetName], дуже схожий на [GetInternationalOrganizationType('defensive_league').GetName], оскільки кожен [Concept('member', 'CONCEPT_PLACEHOLDER')|e] захищатиме один одного від іноземних нападників. Щоб створити союз, принаймні дві країни повинні мати одного [Concept('heir', 'CONCEPT_PLACEHOLDER')|e], який сходить на престол."
  union_mechanic_tooltip: "Члени залишають [Concept('union', 'CONCEPT_PLACEHOLDER')|e], коли вони більше не мають того ж [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] або [Concept('heir', 'CONCEPT_PLACEHOLDER')|e] у випадку [Concept('regency', 'CONCEPT_PLACEHOLDER')|e]. Щоб консолідувати союз, кожен [Concept('member', 'CONCEPT_PLACEHOLDER')|e] повинен мати той самий [Concept('union_integration_level_short', 'CONCEPT_PLACEHOLDER')|e], що й [ShowSpecialStatusName('senior_partner')]. Члени з нижчим рівнем повинні мати свою інтеграцію, забезпечену через [Concept('parliament', 'CONCEPT_PLACEHOLDER')|e].\n\n[ShowSpecialStatusNamePlural('junior_partner')] можуть використовувати [ShowCountryInteractionName('take_over_seniority')] [Concept('country_interaction', 'CONCEPT_PLACEHOLDER')|e], коли вони мають #Y 125%#! або більше [Concept('great_power_score', 'CONCEPT_PLACEHOLDER')|e] порівняно з поточним $senior_partner$.\n\nПоточне місце перебування союзу знаходиться в [InternationalOrganizationsView.GetInternationalOrganization.GetLeaderScopeObjectAtIndex('(int32)0').GetCharacter.GetCourtCountry.GetCapital.GetName] у [InternationalOrganizationsView.GetInternationalOrganization.GetLeaderScopeObjectAtIndex('(int32)0').GetCharacter.GetCourtCountry.GetName]."
