  lordship_of_ireland: "Лордство Ірландії"
  lordship_of_ireland_desc: "Англійське панування над Ірландією перебуває в неспокійному стані. З часу початкового завоювання близько 1170 року прямий контроль Корони був зведений до залишкової адміністрації навколо Дубліна. Вона покладається на вірного лейтенанта і наразі здійснює лише номінальний контроль над своїми дедалі віддаленішими васалами. Нащадки завойовників-авантюристів — попри щедрі винагороди графствами та баронствами — стають все більше схожими на своїх гельських вождів-попередників як мовою, так і культурою, тоді як інші повністю вислизнули з-під англійського контролю."
  lordship_of_ireland_lord_title: "Привілеї та обов'язки $lord$"
  lordship_of_ireland_lord_desc: "Обов'язок [ShowSpecialStatusName('lord_of_ireland')] — утверджувати панування Корони над [ShowRegionName('ireland_region')].\n\nМоже бути лише один [ShowSpecialStatusNameWithNoTooltip('lord_of_ireland')], і їхнє правління тримається на крихкому ґрунті. Таким чином, обіймання такої посади приносить як королівський престиж, так і постійні виклики."
  lordship_of_ireland_hint_1: "Лордство Ірландії зосереджується навколо присяги на вірність [GetCountry('PLE').GetName]. Лише як [ShowSpecialStatusName('absentee')] ця присяга може бути порушена."
