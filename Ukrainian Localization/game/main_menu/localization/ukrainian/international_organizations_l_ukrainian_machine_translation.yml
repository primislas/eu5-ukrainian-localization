  TATAR_YOKE_TAX_COLLECTOR_TITLE: "Привілеї та обов'язки $tatar_tax_collector$"
  TATAR_YOKE_TAX_COLLECTOR_DESC: "Обов'язком [ShowSpecialStatusName('tatar_tax_collector')] є збір податків від імені [ShowSpecialStatusName('tatar_overlord')].\n\nНатомість, територія [ShowSpecialStatusNameWithNoTooltip('tatar_tax_collector')] відчуває значну #Y $migration$#! від інших членів Ярма, які шукають захисту від [ShowCultureGroupName('mongolian_group')|l] набігів."
  TATAR_YOKE_HINT_1: "Татарське ярмо є пережитком середньовіччя, що цементує монгольське панування над східноєвропейськими князівствами.\n\nДо нього не можна приєднатися.\n\n#T Рекомендовані дії для різних ролей Ярма#!\n@arrow_bonus_tier_3! [ShowSpecialStatusName('tatar_overlord')] повинен тримати інших під контролем, не дозволяючи їм стати занадто могутніми.\n@arrow_bonus_tier_3! [ShowSpecialStatusName('tatar_tax_collector')] може використовувати своє становище для накопичення багатства та влади, займаючи вигідну позицію для повалення [ShowSpecialStatusNameWithNoTooltip('tatar_overlord')].\n@arrow_bonus_tier_3!Звичайний член прагне отримати роль [ShowSpecialStatusName('tatar_tax_collector')] або самостійно скинути ярмо."
  red_turban_rebels: "Повстанці Червоних пов'язок"
  red_turban_rebels_desc: "#T Повстанці Червоних пов'язок#!\n$red_turban_rebels$ — це група неорганізованих і прагнучих повстанців, які прагнуть повалити [GetCountry('CHI').GetCulture.GetName] верховних правителів і захопити [GetInternationalOrganizationType('middle_kingdom').GetName] для себе. Хоча вони протистоять [GetCountry('CHI').GetName], лояльність $red_turban_rebels$ лише до їхніх власних амбіцій."
  guelphs_io: "Гвельфи"
  guelphs_io_desc: "$guelphs_io$ — це група [ShowCultureGroupName('italian_group')] держав, які узгоджують свої інтереси з інтересами [GetCountry('PAP').GetLongName] у [ShowRegionName('italy_region')]."
  ghibellines_io: "Гібеліни"
  ghibellines_io_desc: "$ghibellines_io$ — це група [ShowCultureGroupName('italian_group')] держав, які узгоджують свої інтереси з інтересами [GetInternationalOrganizationType('hre').GetName] у [ShowRegionName('italy_region')]."
  senior_partner: "$game_concept_senior_partner$"
  senior_partner_plural: "Старші партнери"
  senior_partner_desc: "[game_concept_senior_partner] є фактичним лідером [GetInternationalOrganizationType('union').GetName] і зазвичай місцем перебування правлячого монарха. Усі зусилля з централізації обертаються навколо [game_concept_senior_partner] та його відносин з іншими членами $union$."
  junior_partner: "[game_concept_junior_partner]"
  junior_partner_plural: "[game_concept_junior_partners]"
  junior_partner_desc: "[game_concept_junior_partner] є статусом за замовчуванням для будь-якого члена [GetInternationalOrganizationType('union').GetName], який не є місцем перебування правлячого монарха."
