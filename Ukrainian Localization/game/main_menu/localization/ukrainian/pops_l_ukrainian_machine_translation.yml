l_english:
  nobles: "Шляхта"
  clergy: "Духовенство"
  burghers: "Міщани"
  laborers: "Робітники"
  soldiers: "Солдати"
  peasants: "Селяни"
  slaves: "Раби"
  tribesmen: "Племена"
  nobles_desc: "Це уособлює багатих і могутніх, чий родовід не викликає сумнівів. Це [Concept('pops', 'CONCEPT_PLACEHOLDER')|e], що надає головних [Concept('characters', 'CONCEPT_PLACEHOLDER')|e] для керівництва [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  clergy_desc: "Духовні лідери нашої [Concept('country', 'CONCEPT_PLACEHOLDER')|e], [Concept('pops', 'CONCEPT_PLACEHOLDER')|e] духовенства становлять групу, що підтримує наші релігійні традиції та навчає наш народ таємницям нашої віри."
  burghers_desc: "Це представляє торговельні верстви [Concept('country', 'CONCEPT_PLACEHOLDER')|e], економіка та фінанси є їхньою сферою впливу. Вони переважно базуються в [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e], де сприяють багатству за допомогою продуктивних [Concept('buildings', 'CONCEPT_PLACEHOLDER')|e]."
  peasants_desc: "Це представляє простий народ, над яким ми пануємо. Більшість з них живуть натуральним господарством або в наших селах."
  slaves_desc: "Це представляє знедолених людей, що працюють, збираючи [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e] або на [Concept('plantations', 'CONCEPT_PLACEHOLDER')|e] для своїх панів, до яких ставляться як до товару або за народженням, або шляхом придбання на торгових [Concept('markets', 'CONCEPT_PLACEHOLDER')|e]."
  tribesmen_desc: "Це представляє спільноти, що населяють [Concept('rural_locations', 'CONCEPT_PLACEHOLDER')|e], існуючи самостійно як фермери, пастухи або мисливці-збирачі, і якими ми ледве можемо керувати, оскільки вони підтримують власні диференційовані соціальні структури та організацію."
  laborers_desc: "Це представляє людей, що виконують ручну працю в наших [Concept('towns_and_cities', 'CONCEPT_PLACEHOLDER')|e] та [Concept('rural_locations', 'CONCEPT_PLACEHOLDER')|e]. Вони обробляють землю, щоб створювати, збирати врожай та добувати [Concept('raw_materials', 'CONCEPT_PLACEHOLDER')|e], що є основою країни, або працюють некваліфікованою робочою силою на млинах."
  soldiers_desc: "Це представляє простий народ, що забезпечує [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] для наших [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] та [Concept('garrisons', 'CONCEPT_PLACEHOLDER')|e], а також [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e] для наших [Concept('navies', 'CONCEPT_PLACEHOLDER')|e]."
