l_english:
  ALERT_CTA: "\n\nЛівий клік, щоб відкрити; Правий клік, щоб відхилити"
  ALERT_CTA_CYCLE: "\n\nЛівий клік, щоб перемкнути; Правий клік, щоб відхилити"
  ALERT_CTA_LEFT_CLICK: "Відкрити"
  ALERT_CTA_RIGHT_CLICK: "Відхилити сповіщення"
  ALERT_CTA_CYCLE_LEFT_CLICK: "Перемкнути"
  CANNOT_ALERT_CTA_CYCLE_LEFT_CLICK: "@trigger_no!Для цього сповіщення не може бути кількох екземплярів."
  ALERT_CTA_CYCLE_MARKETS_LEFT_CLICK: "Перемикатись між Ринками"
  ALERT_TRIGGER_YES: "@trigger_yes!"
  ALERT_TRIGGER_NO: "@trigger_no!"
  ALERT_WAR_EXHAUSTION: "#T Високе Виснаження Війною#!\nМи маємо [Concept('war_exhaustion', 'CONCEPT_PLACEHOLDER')|e] на рівні $VAL|2R$. Це серйозно вплине на нашу спроможність вести [Concept('wars', 'CONCEPT_PLACEHOLDER')|e], і якщо воно сягне [COUNTRY.GetModifierValue('max_war_exhaustion')], ми втратимо всі [Concept('war_score', 'CONCEPT_PLACEHOLDER')|e] і будемо змушені капітулювати."
  ALERT_DOOM: "#T Висока Приреченість#!\nМи маємо [Concept('doom', 'CONCEPT_PLACEHOLDER')|e] на рівні $VAL|2R$. Досягнення [Concept('doom', 'CONCEPT_PLACEHOLDER')|e] 100 принесе катастрофічні наслідки для країни та її правлячої родини."
  ALERT_HAS_DOOM: "#T Маємо Приреченість#!\nМи маємо [Concept('doom', 'CONCEPT_PLACEHOLDER')|e] на рівні $VAL|2R$. Досягнення [Concept('doom', 'CONCEPT_PLACEHOLDER')|e] 100 принесе катастрофічні наслідки для країни та її правлячої родини."
  ALERT_AT_WAR_WITH: "#T Війна#!\nНаразі ми перебуваємо у [Concept('war', 'CONCEPT_PLACEHOLDER')|e] із $DATA$."
  ALERT_CIVIL_WAR: "#T Громадянська Війна#!\nНаразі ми ведемо [Concept('civil_war', 'CONCEPT_PLACEHOLDER')|e]. Кожна захоплена територія автоматично перейде на бік противника!"
  ALERT_CALL_ALLY: "#T Закликати Союзників#!\nМи можемо закликати $DATA$ до наших [Concept('wars', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_BREAKING_IO: "#T Розпад Міжнародної Організації #!\nНаступні [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e] перебувають під загрозою розпаду, оскільки відносини всередині них погіршуються:"
  ALERT_NO_LEADER: "#T Брак Командира#!\nНаступним [Concept('units', 'CONCEPT_PLACEHOLDER')|e] бракує [Concept('commander', 'CONCEPT_PLACEHOLDER')|e]:"
  ALERT_VERY_LOW_FOOD: "#T Серйозний Брак Продовольства#!\nНаступним [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] бракує [Concept('food', 'CONCEPT_PLACEHOLDER')|e] і їхні запаси продовольства є критичними, вони почнуть зазнавати [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e]:"
  ALERT_LOW_FOOD: "#T Брак Продовольства#!\nНаступним [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] бракує [Concept('food', 'CONCEPT_PLACEHOLDER')|e] і їхні запаси продовольства вичерпуються, вони можуть невдовзі почати зазнавати [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e]:"
  ALERT_CBS: "#T Невикористаний Привід до Війни#!\nНаступні [Concept('casus_bellis', 'CONCEPT_PLACEHOLDER')|e] не були використані:"
  ALERT_CB_ENTRY: "[CASUS_BELLI.GetName] проти [COUNTRY.GetName] (термін дії спливає $EXPIRATION_DATE|Y$)"
  ALERT_CB_ENTRY_NO_EXPIRE: "[CASUS_BELLI.GetName] проти [COUNTRY.GetName]"
  ALERT_OUTSIDE_OF_NAVAL_RANGE: "#T За Межами Морської Досяжності#!\nНаступні Одиниці перебувають за межами морської досяжності:"
  ALERT_DEFICIT: "#T Ризик Банкрутства#!"
  DEFICIT_WHEN: "За поточних витрат ми станемо [Concept('bankrupt', 'CONCEPT_PLACEHOLDER')|e] приблизно $WHEN|V$"
  ALERT_STARVING_POPS: "#T Вмираюче Населення#!\nНаселення помирає на наступних територіях:\n"
  ALERT_OVER_RELATIONS: "#T Забагато Відносин#!\n[COUNTRY.GetDiplomacy.GetActiveRelationsInfo]"
  HAS_OVER_ACCEPTED_CULTURE_LIMIT_TITLE: "#T Перевищено Ліміт Культурної Місткості#!"
  ALERT_BLOCKADED_PORTS: "#T Блоковані Порти#!\nНаступні порти [Concept('blockaded', 'CONCEPT_PLACEHOLDER')|e]:\n"
  ALERT_LOW_ARMY_MAINTENANCE: "#T Низьке Утримання Армії#!\nВи маєте дуже низьке [Concept('army_maintenance', 'CONCEPT_PLACEHOLDER')|e] під час [Concept('war', 'CONCEPT_PLACEHOLDER')|e]! Це не рекомендується, якщо ви бажаєте перемагати у війнах."
  ALERT_LOW_NAVY_MAINTENANCE: "#T Низьке Утримання Флоту#!\nВи маєте дуже низьке [Concept('navy_maintenance', 'CONCEPT_PLACEHOLDER')|e] під час [Concept('war', 'CONCEPT_PLACEHOLDER')|e]! Це не рекомендується, якщо ви бажаєте перемагати у війнах."
  ALERT_EXILED_UNITS: "#T Вигнані Армії#!\nНаступні [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] є [Concept('exiled', 'CONCEPT_PLACEHOLDER')|e] на чужій території, і їм потрібно повернутися додому, перш ніж вони зможуть знову воювати:"
  ALERT_ARMIES_ON_ICE: "#T Армії на Кризі#!\nНаступні [Concept('armies', 'CONCEPT_PLACEHOLDER')|e] перебувають на [Concept('frozen', 'CONCEPT_PLACEHOLDER')|e] воді і їм слід повернутися на сушу, перш ніж крига розтане:"
  ALERT_NAVIES_STUCK_IN_ICE: "#T Флоти Застрягли в Кризі#!\nНаступні [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] застрягли в [Concept('frozen', 'CONCEPT_PLACEHOLDER')|e] воді, зазнаючи поступового виснаження і не можуть рухатися, поки крига не розтане:"
  ALERT_NAVY_ATTRITION: "#T Флоти з Виснаженням#!\nНаступні [Concept('navies', 'CONCEPT_PLACEHOLDER')|e] мають певне [Concept('attrition', 'CONCEPT_PLACEHOLDER')|e]:"
  ALERT_WE_CAN_ENFORCE_PEACE: "#T Мир Неминучий#!\nМи можемо отримати нашу [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] автоматично реалізованою у наступних [Concept('wars', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_THEY_CAN_ENFORCE_PEACE: "#T Мир Неминучий#!\nНам може бути автоматично нав'язана [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] у наступних [Concept('wars', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_WE_CAN_WHITE_PEACE: "#T Білий Мир Неминучий#!\n[Concept('white_peace', 'CONCEPT_PLACEHOLDER')|e] може бути нав'язаний, оскільки ми досить довго захищали [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] у наступних війнах:"
  ALERT_THEY_CAN_WHITE_PEACE: "#T Білий Мир Неминучий#!\n[Concept('white_peace', 'CONCEPT_PLACEHOLDER')|e] може бути нав'язаний, оскільки ми не змогли оскаржити окупацію [Concept('war_goal', 'CONCEPT_PLACEHOLDER')|e] у наступних війнах:"
  ALERT_CALL_FOR_PEACE: "#T Заклик до Миру#!\nЯкщо [Concept('war', 'CONCEPT_PLACEHOLDER')|e] триває довше ніж $VAL|Y$ місяців, і ми перемагаємо в ній, народ захоче, щоб [Concept('war', 'CONCEPT_PLACEHOLDER')|e] була виграна. Наступні війни йдуть для нас настільки добре:\n$WHY$\nЕфекти лише посилюватимуться, доки не буде підписано мир, а наш заклик до миру наразі має наступний ефект.\n$HOW$"
  LIST_OF_POTENTIAL_COALITION_COUNTRIES_TT: "Наступні країни можуть приєднатися до [GetInternationalOrganizationType('coalition').GetName] проти нас:"
  POTENTIAL_COALITION_COUNTRIES_EXTRA_NUM: " та ще $VAL|V$ [Concept('members', 'CONCEPT_PLACEHOLDER')|e]..."
  WAR_ENTRY_ALERT: "\n$BULLET_WITH_TAB$$NAME|Y$ $ICON$\n$WHY$"
  ALERT_WAR_CALL_PEACE_ENTRY: "[WAR.GetName]: $WARSCORE|Y$\n"
  UNIT_NO_FOOD_ALERT_ENTRY: "[UNIT.GetName]: [UNIT.GetFoodPercentage|Y%/2]"
  ALERT_WEATHER_SYSTEM: "#T Примхлива Погода#!\n[Concept('weather_systems', 'CONCEPT_PLACEHOLDER')|e] наразі впливають на нашу [Concept('country', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_WEATHER_SYSTEM_ENTRY: "$VAL$:"
  ALERT_RAISED_REBELS: "#T Повсталі Бунтівники#!\nДеякі [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] повстали в нашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e]:"
  ALERT_RAISED_REBELS_ENTRY: "$VAL$ [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e] у [LOCATION.GetName]"
  ALERT_POSSIBLE_REVOLTS: "#T Рухи Бунтівників#!\nУ нашій [Concept('country', 'CONCEPT_PLACEHOLDER')|e] є [Concept('rebels', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_REVOLT_ENTRY: "[REBEL.GetTextIcon] [REBEL.GetName]: [REBEL.GetProgress|2Y%] ([REBEL.GetMonthlyChange|<-=2%])"
  ALERT_RESOLUTION_TITLE: "#T Постанови для голосування#!"
  ALERT_RESOLUTION_VOTE: "[RESOLUTION.GetName] обговорюється:"
  ALERT_RESOLUTION_VOTE_ENTRY: "$EFFECT_LIST_BULLET$ $NUM$ голосів за $VOTE$"
  ALERT_RULER_INCOMPETENT: "#T Нездарний правитель#!\nНаш поточний [Concept('правитель', 'CONCEPT_PLACEHOLDER')|e] [Concept('CHARACTER.GetName] має надзвичайно низьку [здатність', 'CONCEPT_PLACEHOLDER')|e]:\n[Character.GetTotalAbility]."
  ALERT_HEIR_INCOMPETENT: "#T Нездарний спадкоємець#!\nНаш поточний [Concept('спадкоємець', 'CONCEPT_PLACEHOLDER')|e] [Concept('CHARACTER.GetName] має надзвичайно низьку [здатність', 'CONCEPT_PLACEHOLDER')|e]:\n[Character.GetTotalAbility]."
  ALERT_HEIR_UNDERAGE: "#T Неповнолітній спадкоємець#!\nНаш поточний [Concept('спадкоємець', 'CONCEPT_PLACEHOLDER')|e] [Concept('CHARACTER.GetName] є лише [дитям', 'CONCEPT_PLACEHOLDER')|e] віком [Concept('CHARACTER.GetAgeInYears], але [CHARACTER.GetHeSheFormal] не може стати [правителем', 'CONCEPT_PLACEHOLDER')|e], доки [Concept('CHARACTER.GetSheHe] не стане [дорослим', 'CONCEPT_PLACEHOLDER')|e]. Нами може правити [Concept('регентство', 'CONCEPT_PLACEHOLDER')|e] до того часу."
  ALERT_CHILD_UNEDUCATED: "Діти можуть отримати кращу освіту"
  ALERT_CHILD_UNEDUCATED_PLURAL: "Діти, яких це стосується"
  ALERT_CHILD_UNEDUCATED_TEXT: "Один або більше дітей нашої династії здобувають збалансовану [Concept('освіту', 'CONCEPT_PLACEHOLDER')|e]. Ми можемо змінити її, щоб більше зосередитися на одній з їхніх [Concept('адм', 'CONCEPT_PLACEHOLDER')|e], [Concept('дип', 'CONCEPT_PLACEHOLDER')|e] або [Concept('військ', 'CONCEPT_PLACEHOLDER')|e] навичок."
  ALERT_HEIR_UNMARRIED: "#T Неодружений дорослий спадкоємець#!\nПоточний [Concept('спадкоємець', 'CONCEPT_PLACEHOLDER')|e] [Concept('CHARACTER.GetName] наразі є [дорослим', 'CONCEPT_PLACEHOLDER')|e] і не [Concept('одружений', 'CONCEPT_PLACEHOLDER')|e]. Настав час [Concept('CHARACTER.GetHimHerFormal] одружитися. Ми можемо або організувати [королівський_шлюб', 'CONCEPT_PLACEHOLDER')|e] з іншою [Concept('країною', 'CONCEPT_PLACEHOLDER')|e], або влаштувати шлюб зі шляхтичем чи [Concept('простолюдином', 'CONCEPT_PLACEHOLDER')|e] з нашої власної країни."
  ALERT_RULER_UNMARRIED: "#T Неодружений [Concept('COUNTRY.GetGovernment.GetRulerTitle]#!#NL![COUNTRY.GetGovernment.GetFullRulerName] наразі є [дорослим', 'CONCEPT_PLACEHOLDER')|e] і не [Concept('одружений', 'CONCEPT_PLACEHOLDER')|e]. Настав час [Concept('CHARACTER.GetHimHerFormal] одружитися. Ми можемо або організувати [королівський_шлюб', 'CONCEPT_PLACEHOLDER')|e] з іншою [Concept('країною', 'CONCEPT_PLACEHOLDER')|e], або влаштувати шлюб зі шляхтичем чи [Concept('простолюдином', 'CONCEPT_PLACEHOLDER')|e] з нашої власної країни."
  ALERT_MERCENARY_ENTRY: "Термін дії контракту [MERCENARY.GetName] закінчується через $MONTHS|Y$ місяців."
  ALERT_CONTRACTS: "#T Термін дії контрактів найманців закінчується#!"
  ALERT_CAN_POTENTIALLY_BE_TARGET_OF_IO: "#T Ми скоро можемо стати ціллю міжнародної організації#!"
  ALERT_CAN_BE_TARGET_OF_IO_ENTRY: "Ми можемо стати мішенню в [INTERNATIONAL_ORGANIZATION_TYPE.GetName]."
  ALERT_CAN_POTENTIALLY_BE_TARGET_OF_IO_ENTRY: "Ми наближаємося до можливості стати мішенню в [INTERNATIONAL_ORGANIZATION_TYPE.GetName]."
  ALERT_CAN_JOIN_TARGETTED_IO: "#T Ми можемо приєднатися до міжнародної організації#!"
  ALERT_CAN_JOIN_TARGETTED_IO_ENTRY: "[INTERNATIONAL_ORGANIZATION.GetName]"
  ALERT_UNPROFITABLE_TRADE: "#T Невигідні торговельні операції#!"
  ALERT_TRADE_ENTRY: "[TRADE.GetName]: [TRADE.GetProfit|+=2][gold_i]"
  ALERT_TRADE_EXTRA_NUM: "... і $VAL|V$ більше [Concept('торгових_операцій', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_NO_SUPPLIES_TRADE: "#T У торгівлі вичерпалися запаси#!"
  ALERT_NO_SUPPLIES_ENTRY_SELF: "[Concept('TRADE.GetName] вичерпала запаси, оскільки ми вже використовуємо все доступне для інших [експортних_операцій', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_NO_SUPPLIES_ENTRY_DEFAULT: "[Concept('TRADE.GetName] вичерпала запаси, оскільки для [експорту', 'CONCEPT_PLACEHOLDER')|e] нічого немає."
  ALERT_NO_SUPPLIES_ENTRY: "[TRADE.GetName] її витісняє $WHO$, який(а) має вищу [Concept('торгову_потужність', 'CONCEPT_PLACEHOLDER')|e] на [TRADE.GetFromMarket.GetName]."
  ALERT_CAN_HAVE_MORE_REFORMS: "#T Можливі реформи#!\nВи можете додати ще $VAL|Y$ [Concept('державних_реформ', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_CAN_UPGRADE_COUNTRY_RANK: "#T Ми можемо підвищити ранг країни#!\nДоступні наступні підвищення [Concept('рангу_країни', 'CONCEPT_PLACEHOLDER')|e]:\n\n$RANKS$."
  ALERT_CAN_UPGRADE_COUNTRY_RANK_ENTRY: "[COUNTRY_RANK.GetLevel] - [COUNTRY_RANK.GetNameWithNoTooltip]"
  ALERT_POSSIBLE_LAWS: "#T Закони не кодифіковані#!\nНаступні [Concept('закони', 'CONCEPT_PLACEHOLDER')|e] не були записані:"
  ALERT_LAW_ENTRY: "$BULLET_WITH_TAB$[LAW.GetName]"
  ALERT_POSSIBLE_GOV_ACTION: "#T Можливі дії Кабінету#!\nНаразі ми маємо можливість доручити нашому [Concept('кабінету', 'CONCEPT_PLACEHOLDER')|e] здійснити більше [Concept('дій_кабінету', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_MAX_DIPLOMATS_AVAILABLE: "#T Можливі дипломатичні дії#!\nНаразі ми досягли максимальної кількості [Concept('дипломатів', 'CONCEPT_PLACEHOLDER')|e], яких ми можемо використовувати для [Concept('дипломатичних_дій', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_RELIGIOUS_ASPECT_AVAILABLE: "#T Можливий релігійний аспект#!\nНаразі ми маємо можливість додати новий [Concept('релігійний_аспект', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_RELIGIOUS_FOCUS_AVAILABLE: "#T Можливий релігійний фокус#!\nМи можемо додати новий [Concept('релігійний_фокус', 'CONCEPT_PLACEHOLDER')|e] до черги досліджень."
  ALERT_CAN_SPEND_RELIGIOUS_INFLUENCE: "#T Можливі [Localize('game_concept_religious_influence')] [Localize('game_concept_actions')]#!\nМи можемо витратити наш [Concept('релігійний_вплив', 'CONCEPT_PLACEHOLDER')|e] на наступні [Concept('дії', 'CONCEPT_PLACEHOLDER')|e]:"
  ALERT_CAN_SPEND_RELIGIOUS_INFLUENCE_ENTRY: "$BULLET_WITH_TAB$$ACTION_NAME$"
  ALERT_INTERVENE_RIVAL_WAR_AVAILABLE: "#T Втрутитися у війну суперника#!\nМи можемо втрутитися у війну проти одного з наших [Concept('суперників', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_INTERVENE_RIVAL_WAR_ENTRY: "[WAR.GetName]: Втрутитися проти [COUNTRY.GetName]."
  ALERT_ACTION_LACK_CHAR: "#T Кабінету бракує члена#!\nДля наступних [Concept('дій_кабінету', 'CONCEPT_PLACEHOLDER')|e] бракує [Concept('персонажа', 'CONCEPT_PLACEHOLDER')|e], який(а) би їх очолив(ла):"
  ALERT_CABINET_ENTRY: "$BULLET_WITH_TAB$[CABINET.GetName]"
  ALERT_NO_CURRENT_RESEARCH: "#T Немає поточних досліджень#!\nНаразі ми не досліджуємо жодних [Concept('прогресів', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_NEARLY_MAXED_OUT_STORED_RESEARCH_PROGRESS: "#T Наближення до максимального обсягу досліджень#!\nНаразі ми маємо $AMOUNT|2Y$ [Concept('накопичених_досліджень', 'CONCEPT_PLACEHOLDER')|e] з можливого максимуму в $MAX|2Y$. Будь-який надлишковий прогрес у дослідженні понад максимум відкидається, розгляньте можливість витратити накопичені дослідження на вивчення [Concept('прогресу', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_MAXED_OUT_STORED_RESEARCH_PROGRESS: "#T Максимальний обсяг досліджень досягнуто#!\nНаразі ми маємо $AMOUNT|2Y$ [Concept('накопичених_досліджень', 'CONCEPT_PLACEHOLDER')|e] і не можемо зберігати більше. Будь-який прогрес у дослідженні відкидається, розгляньте можливість витратити накопичені дослідження на вивчення [Concept('прогресу', 'CONCEPT_PLACEHOLDER')|e]."
  ALERT_EMBRACE_INST: "#T Можливі інституції#!\nМи можемо [Concept('опанувати', 'CONCEPT_PLACEHOLDER')|e] наступні [Concept('інституції', 'CONCEPT_PLACEHOLDER')|e]:"
  ALERT_INSTITUTION_ENTRY: "$BULLET_WITH_TAB$[INSTITUTION.GetName]: $PRICE$ (від $VAL|2%$ поширення)"
