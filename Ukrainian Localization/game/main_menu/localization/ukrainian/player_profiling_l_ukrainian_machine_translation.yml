  PLAYER_SKIP_PLAYTHROUGH: "Не починати навчальний посібник на початку гри."
  PLAYER_RUN_PLAYTHROUGHT: "Почати навчальний посібник"
  PLAYER_RUN_PLAYTHROUGHT_MP: "Навчальний посібник недоступний у багатокористувацькій грі."
  PLAYER_RUN_PLAYTHROUGHT_DESC: "Посібник займе кілька хвилин і представить основні механіки #italic Europa Universalis V#!.\n\nПосібник можна пропустити в будь-який час, і ви можете почати його тут у будь-який час."
  PLAYER_STOP_PLAYTHROUGHT: "Вихід"
  PLAYER_STOP_PLAYTHROUGHT_TITLE: "Вийти з посібника"
  PLAYER_STOP_PLAYTHROUGHT_DESC: "Вихід з посібника призведе до втрати поточного прогресу.\n\nПримітка: Цей посібник можна перезапустити в будь-який час з @agenda! #high Agenda#!."
  PLAYER_STOP_PLAYTHROUGHT_TT: "#T $PLAYER_STOP_PLAYTHROUGHT_TITLE$#!\n$PLAYER_STOP_PLAYTHROUGHT_DESC$"
  HUN_scenario_desc: "Після того, як король Карл Анжуйський залізною рукою придушив невдоволених дворян, #W Угорщина#! знову стала королівством, де її різноманітне населення може обробляти свої землі та експлуатувати багаті мінерали. Ця значна податкова база дозволяє швидко розширювати промисловість і ремесла, тоді як природний бар'єр Карпатських гір і дружній дипломатичний статус з більшістю її сусідів сприяють миру та процвітанню."
  HOL_scenario_desc: "Графством #W Голландія#! править граф Вільгельм Авенський, який також керує графствами Зеландія та Ено. Незважаючи на ці різноманітні володіння, розташування Голландії на узбережжі Північного моря, на півдорозі між Ла-Маншем і Балтійським морем, робить її першочерговою територією для економічного обміну та розвитку сильної промисловості. Якщо ці можливості будуть використані, Голландія може стати великою економічною державою в найближчі роки."
  NOR_scenario_desc: "Перебуваючи в особистій унії зі Швецією, Королівство #W Норвегія#! стикається з новим і складним періодом. Уздовж її фіордів і долин величезні національні ресурси, особливо деревина та рибальство, могли б дозволити її народу збагатитися. А з процвітаючими та задоволеними державами можна було б розвивати більш інтенсивну дипломатію з її сусідами в Скандинавії та Північному морі, дозволяючи Норвегії знову процвітати."
  NAP_scenario_desc: "Народжене з амбіцій могутніх династій, що прагнули домінувати над землями південної Італії, #W Неаполь#! тепер править король Роберт Анжуйський, мудрий і справедливий монарх, відомий своєю розсудливістю та гострим розумом. Його велике та зростаюче населення забезпечує міцну основу для швидкого внутрішнього розширення, заснованого на сільськогосподарському багатстві, що могло б підтримати зусилля короля Роберта зробити Неаполь гегемоном Італії."
  TUR_scenario_desc: "#W Османи#! зміцнюють свої позиції як один з наймогутніших #italic бейликів#!, турецьких воєначальників, що піднімаються, прагнучи забезпечити життєво важливі території вздовж узбережжя Босфору та Анатолійського нагір'я. Нещодавно були деякі завоювання вздовж кордону з Візантією, яка є головним ворогом для Заходу, якого потрібно перемогти. Отримання панування над сусідніми #italic бейликами#! значно збільшило б ресурси, необхідні для майбутніх перемог."
  CAS_scenario_desc: "Король Альфонсо XI, «Месник», править #W Кастилією#! без значної внутрішньої опозиції після встановлення свого панування над дворянством королівства. Тепер він може звернути свою увагу на південь, де Емірат Гранада виживає як останній ісламський бастіон в Іберії. Його могутній союзник, Султанат Марокко, зберігає стратегічне положення на півострові, зосереджене на Альхесірасі та Ронді, що дозволяє йому втручатися з-за Гібралтарської протоки."
  ARA_scenario_desc: "Корона Арагону гордо стоїть як значна сила в регіоні Західного Середземномор'я завдяки своїй морській майстерності, дипломатичній вазі та процвітаючим торговельним мережам, готовим до подальшого розширення."
  FLA_scenario_desc: "Будучи однією з найбагатших країн Нижніх Земель, завдяки заможному ринковому центру Брюгге, Фландрія має гарні позиції для навігації в складнощах дипломатії, користуючись своїм становищем посередника."
  VEN_scenario_desc: "Найсвітліша Республіка Венеція є найважливішою та наймогутнішою з торгових республік Середземного моря та контролює важливі комерційні порти та острови по всьому його периметру."
  FRA_scenario_desc: "Коронація короля Філіпа VI була оскаржена королем Едуардом III Англійським, і тепер йому доводиться одночасно мати справу із зовнішньою загрозою з боку Англії та гордими французькими лордами, що становить екзистенційну загрозу для Франції."