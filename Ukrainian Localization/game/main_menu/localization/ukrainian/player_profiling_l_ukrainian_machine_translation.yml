  PLAYER_PLAYSTYLE_ADMINISTRATIVE_SHORT: "Еко"
  PLAYER_PLAYSTYLE_ADMINISTRATIVE_DESC: "Зосередьтеся на економічному розвитку вашої країни. Прагніть національного процвітання шляхом експлуатації земель, будівництва споруд та доріг, а також експорту й імпорту товарів на різних ринках."
  PLAYER_PLAYSTYLE_ADMINISTRATIVE_TL: "#T $PLAYER_PLAYSTYLE_ADMINISTRATIVE$ #!\n$PLAYER_PLAYSTYLE_ADMINISTRATIVE_DESC$"
