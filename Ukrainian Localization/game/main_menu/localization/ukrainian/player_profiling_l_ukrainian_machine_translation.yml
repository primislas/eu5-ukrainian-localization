  PLAYER_PROFILING_STAGE1_TITLE: "Який ваш РІВЕНЬ щодо стратегічних ігор?"
  PLAYER_PROFILING_STAGE3_TITLE: "Рекомендовані країни у 1337 році"
  PLAYER_PROFILING_STAGE1_NEXT_STAGE: "Перейти до вибору вашого бажаного СТИЛЮ ГРИ"
  PLAYER_PROFILING_START_NEW_GAME: "Перейти на світову мапу та обрати будь-яку країну, з власними налаштуваннями складності та правилами гри"
