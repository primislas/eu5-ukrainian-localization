  PLAYER_PLAYSTYLE_DIPLOMATIC_DESC: "Зосередьтеся на внутрішній політиці, маючи справу з адміністрацією та станами вашої країни, а також укладайте угоди та альянси з іншими країнами, щоб зміцнити свою міжнародну позицію."
  PLAYER_PLAYSTYLE_DIPLOMATIC_TL: "#T $PLAYER_PLAYSTYLE_DIPLOMATIC$ #!\n$PLAYER_PLAYSTYLE_DIPLOMATIC_DESC$"
