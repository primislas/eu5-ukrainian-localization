  DIFFICULTY_LEVEL_LABEL: "Складність"
  difficulty_level_name_1: "#G Дуже легко #!"
  difficulty_level_desc_1: "#T Дуже легко #! Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має #G Дуже легку#! стартову позицію і рекомендована для #G Новачка#!.\n\n#G Дуже легкі#! [Concept('countries] зазвичай мають керований розмір, належать до єдиного [market', 'CONCEPT_PLACEHOLDER')|e], мають слабших або дуже дружніх сусідів і не обмежені особливими механіками."
  difficulty_level_name_2: "#G Легко #!"
  difficulty_level_desc_2: "#T Легко #! Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має #G Легку#! стартову позицію і рекомендована для #G Новачка#!.\n\n#G Легкі#! [Concept('countries] зазвичай мають керований розмір, належать до єдиного [market', 'CONCEPT_PLACEHOLDER')|e] та мають слабших або дружніх сусідів."
  difficulty_level_name_3: "#l Середньо #!"
  difficulty_level_desc_3: "#T Середньо #! Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] має середню складність і рекомендована, якщо ви вже ознайомлені з основами гри.\n\n#W Середні#! [Concept('countries] зазвичай мають більший розмір, охоплюючи кілька [markets', 'CONCEPT_PLACEHOLDER')|e], а їхні сусіди також можуть становити значнішу загрозу, ставлячи під загрозу їхнє виживання.\n\n#W Середні#! [Concept('countries] також можуть бути залучені на ранніх етапах до особливого контенту, такого як [situations', 'CONCEPT_PLACEHOLDER')|e], [Concept('disasters', 'CONCEPT_PLACEHOLDER')|e] або [Concept('international_organizations', 'CONCEPT_PLACEHOLDER')|e], що потенційно може відрізняти їхній стиль гри від норми."
  difficulty_level_name_4: "#R Важко #!"
  difficulty_level_desc_4: "#T Важко #! Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] #R Важка#! для гри, і її краще уникати, доки ви не опануєте основи #italic Europa Universalis V#!.\n\n#R Важкі#! [countries] або важкі для внутрішнього управління, будучи надмірно великими та складними в адмініструванні; або дуже вразливі до сильніших сусідів із самого початку."
  difficulty_level_name_5: "#R Дуже важко #!"
  difficulty_level_desc_5: "#T Дуже важко #! Ця [Concept('country', 'CONCEPT_PLACEHOLDER')|e] #R Дуже важка#! для гри, і її краще уникати, доки ви не станете майстром #italic Europa Universalis V#!.\n\n#R Дуже важкі#! [countries] або дуже важкі для внутрішнього управління, будучи надмірно великими та складними в адмініструванні; або надзвичайно вразливі до сильніших сусідів із самого початку."