l_english:
  SCA_f: "Скандинавія"
  SCA_f_desc: "Протягом незліченних століть Королівства Півночі були розділені та занурені у міжусобну боротьбу за владу. Якщо ми хочемо височіти серед великих держав світу, ми повинні прагнути створити міцний союз між нашими народами, хоч би яким складним це не здавалося."
  sweden_f: "Швеція"
  sweden_f_desc: "Величезні землі Швеції були об'єднані протягом століть, і цей союз має бути підтверджений. Маючи значні частини шведських земель під нашим контролем, ми нарешті можемо відродити цю давню спадщину та знову заявити про об'єднану шведську націю."
  denmark_f: "Данія"
  denmark_f_desc: "Данія, розташована між Північним і Балтійським морями, є країною великого значення для [ShowRegionName('scandinavian_region')]. Якщо ми зможемо контролювати достатньо її території, ми зможемо реформувати її та відновити спадщину, народжену нашими предками."
  DRD_f: "$DRD$"
  DRD_f_desc: "[ShowLanguageName('gaelic_language')] народи на узбережжях навколо [ShowAreaName('hebrides_area')] вперше об'єдналися давно, утворивши королівство, відоме своєю мореплавною культурою та силою свого флоту. Ми повинні заявити про цю спадщину предків і відродити королівство."
  GBR_f: "Велика Британія"
  GBR_f_desc: "Об'єднавши наш політичний розвиток всередині країни та поширивши наш вплив за межі наших кордонів, ми зможемо зміцнити нашу позицію у світових справах і перетворитися на одну з провідних європейських держав, Британську імперію."
  GBR_f_trigger_eng: "Ми повинні або знищити [GetCountry('ENG').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  GBR_f_trigger_sco: "Ми повинні або знищити [GetCountry('SCO').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  GBR_f_trigger_wls: "Ми повинні або знищити [GetCountry('WLS').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  GBR_f_trigger_sbl: "Ми повинні або знищити [GetCountry('SBL').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  SPA_f_not_christian: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('iberia_region')] повинна бути [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionGroupAdjective('christian')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] або одним з наших [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]!"
  ADU_f_not_muslim: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] в [ShowRegionName('iberia_region')] повинна бути [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionGroupAdjective('muslim')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] або одним з наших [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]!"
  ENG_f: "$ENG$"
  ENG_f_desc: "Торгівля здавна була основою англійської національної політики. Поширюючи наш вплив за кордони та контролюючи її політичний розвиток всередині країни, ми зуміли стати великою європейською державою. Наша колоніальна експансія стає головним фактором у сприянні економічному зростанню нашої нації, зміцнюючи нашу позицію у світових справах."
  WLS_f: "$WLS$"
  WLS_f_desc: "Вільний від впливу далеких правителів, валлійський народ заснує власну державу, керуючи собою без втручання чи згоди інших. Як великий червоний дракон з легенд, валлійці вийдуть переможцями з мук конфлікту!"
  SCO_f: "$SCO$"
  SCO_f_desc: "Колись горда нація Шотландії занепала. Проте, незважаючи на наш розбитий стан, серед Кланів залишаються ті, хто має волю відновити наше королівство. Ми зберемо нашу мужність і боротимемося за вільну та незалежну Шотландію!"
  NOL_f: "Нортумбрія"
  NOL_f_desc: "Занадто довго землями нортумбрійців керували південці або люди з-за моря. Настав час нам взяти кермо нашої нації та повернути славу, яку колись знали наші предки. Лорди Півночі повстануть знову!"
  IRE_f: "Ірландія"
  IRE_f_desc: "Протягом десятиліть Англія намагалася підкорити ірландське населення та контролювати острів і його мешканців здалеку. Об'єднання ірландських земель під єдиним прапором і метою може бути нашим єдиним шансом відбити цих нещадних завойовників!"
  SPA_f: "Іспанія"
  SPA_f_desc: "З часів поразки вестготів [ShowReligionGroupAdjective('muslim')] вторгненням у VIII столітті Іберія була осідком кількох незалежних королівств. Численні претенденти на завоювання відтоді намагалися об'єднати регіон, проголошуючи себе правителями 'Гіспанії', 'Спанії' або — як її тепер знають — 'Іспанії'. Але саме ми нарешті об'єднаємо Півострів раз і назавжди!"
  ADU_f: "Аль-Андалус"
  ADU_f_desc: "Колись уся Іберія перебувала під владою славетних мусульманських правителів Аль-Андалусу, які принесли неперевершену красу та інновації своїм правлінням. Відкиньмо ж тепер ганебну [ShowReligionGroupAdjective('christian')] Реконкісту, і повернімо законні землі наших предків."
  EGY_f: "Єгипет"
  EGY_f_desc: "Хоча історія Єгипту є надзвичайно давньою, протягом значних періодів часу ним правили іноземні загарбники, а не його корінні душі. Створення нової єгипетської держави, вільної від зовнішнього втручання, могло б відновити нашу легендарну Імперію, подібно до того, як Ніл розливається і поповнює землі вздовж своїх берегів."
  KOA_f: "Африка"
  KOA_f_desc: "У минулі часи нормани створили християнське королівство в Африці, з'єднуючи обидва береги Середземномор'я. Але та молода нація була знищена, поглинена ворогами Христа. Тепер, коли це в наших силах, наш обов'язок — повернути цю територію і знову принести їм славу нашого Господа."
  BEJ_f: "Беджа"
  BEJ_f_desc: "Наш народ традиційно був розділений між кількома кланами та родинами, деякі з яких були достатньо могутніми, щоб називати себе королівствами. Однак їхня уявна сила насправді надзвичайно крихка. Лише царство, що об'єднає всі клани під єдиним прапором, може принести справжню владу та процвітання нашому народу!"
  ETH_f: "Ефіопія"
  ETH_f_desc: "Стародавня імперія Ефіопія була духовним наступником Аксумської імперії, легендарної батьківщини сина царя Соломона, і непохитним оплотом коптської віри. Падіння тієї Імперії було трагедією для коптських вірян, але дух об'єднаної Ефіопії все ще живе, чекаючи на відродження гідним наступником — таким як ми!"
  BAV_f: "Баварія"
  BAV_f_desc: "Колись величне Баварське герцогство було бастіоном економічної та дипломатичної могутності, завдяки своєму завидному розташуванню та обдарованому населенню. Але попри своє яскраве минуле, воно тепер лежить у шматках, розділене та слабке. Ми повинні возз'єднати його колишні території та відновити славу минулого, якщо ми хочемо бути чимось більшим, ніж просто приміткою в історії!"
  HAB_f: "Австрія"
  HAB_f_desc: "З Відня дім Габсбургів колись тримав абсолютну владу в [GetInternationalOrganizationType('hre').GetName], і самим ядром цієї влади було Ерцгерцогство Австрія. Тепер та імперія давно перетворилася на попіл, і настав час нам повернути Ерцгерцогство та осідок Імперської влади!"
  BOH_f: "$BOH$"
  BOH_f_desc: "З тих пір, як Золота булла Сицилії була надана Оттокару I у 1212 році, землі [ShowAreaName('bohemia_area')] користувалися підвищеним статусом у Центральній [ShowContinentName('europe')]. З нашим контролем над цією територією ми зможемо відновити старий титул і узгодити себе зі спадщиною старих династій [ShowAreaNameWithNoTooltip('bohemia_area')]."
  SAX_f: "Саксонія"
  SAX_f_desc: "Саксонське герцогство колись було впливовим племінним герцогством у старій імперії. Хоча його основні території з часом змінювалися, титул зберіг свій престиж і славу. Якщо ми бажаємо бути визнаними законним спадкоємцем Саксонського титулу, ми повинні переконати Імператора [GetInternationalOrganizationType('hre').GetName] стати курфюрстом, роль, яка буде надана Герцогу Саксонії."
  NSA_f: "Нассау"
  NSA_f_desc: "Хоча Герцогство Нассау не було ні найстабільнішим, ні найвідомішим серед своїх рівних, наша династія-засновниця пов'язує нас з багатьма коронованими головами [ShowContinentName('europe')], даючи нам міцну позицію для претендування на владу. Щоб наш голос був почутий у Німеччині, ми повинні об'єднати землі Нассау раз і назавжди та відновити силу цієї династичної спадщини, запобігаючи подальшому роздробленню нашої законної території."
  MKL_f: "Мекленбург"
  MKL_f_desc: "З об'єднанням Мекленбурзьких територій ми можемо створити нове, незалежне Герцогство в північній Німеччині. Ця нова держава зможе виправити помилки минулого, уникнувши роздроблення наших територій на кілька суверенних країн і створивши противагу суперникам, які зазіхають на наші землі."
  POM_f: "Померанія"
  POM_f_desc: "Померанська територія займає життєво важливе положення вздовж узбережжя Балтійського моря. Якщо ми хочемо отримати прибуток від нашого стратегічного положення та скористатися перевагами перебування на жвавому торговому шляху, ми повинні покінчити зі старими поділами та суперечками про спадщину, і реформувати єдине Померанське герцогство."
  PRU_f: "Пруссія"
  PRU_f_desc: "Земля, колись завойована та германізована Тевтонським орденом, завжди потребуватиме захисту від хижих зовнішніх сил. Але якщо Орден не впорається з цим обов'язком, ми можемо зайняти його місце та започаткувати нову еру процвітання та прусської дисципліни."
  LVA_f: "Лівонія"
  LVA_f_desc: "Землі Курляндії, Лівонії та Естонії колись були частиною Лівонського ордену, який присягнув навернути свої завойовані території до [ShowReligionGroupName('christian')]. Хоча Орден побудував функціонуючу державу, він зробив це на спинах тих самих людей, яких він завоював, які садили насіння образи поряд зі своїми врожаями. Якщо Орден не зможе підтримувати порядок у суспільстві, його буде досить легко замінити за допомогою невеликої сили та лівонської мужності."
  GER_f: "Німеччина"
  GER_f_desc: "Попри відсутність сильної центральної влади, наша нація процвітає. Багата Ганзейська ліга, утворена сотнями міст у північній Німеччині, зробила нашу націю неймовірно заможною. Інтелектуальний ріст, у поєднанні з морською та сухопутною торгівлею, також допоміг стимулювати розвиток і перетворити нашу країну на багатий центр виробництва та інтелектуальних інновацій."
  HRE_f: "Священна Римська імперія"
  HRE_f_desc: "$hre_desc$"
  HRE_f_tt: "$HRE_f$ може бути сформована лише за допомогою [ShowPolicyName('renovatio_policy')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetName]"
  LAT_f: "Латинська імперія"
  LAT_f_desc: "Стара $ROM_f$ вижила в $BYZ$ з центром навколо [ShowLocationName('constantinople')], хоча вони сповідували [ShowReligionName('orthodox')] замість належної [ShowReligionAdjective('catholic')] віри [ShowLocationName('rome')]. Таким чином, нашим священним обов'язком є замінити їх як $BYZ_eastern_rome$, встановивши [ShowRegionAdjectiveWithNoTooltip('catholic')] імператора в [ShowLocationNameWithNoTooltip('constantinople')]."
  SAR_f: "Сардинія"
  SAR_f_desc: "Наш острів довго був гірко розділений між нашими юдикатами та іноземними правителями. Ці темні часи повинні закінчитися, і правитель, який об'єднає Сардинію, керуватиме нами всіма, приносячи мир і процвітання нашому народу... і війну та спустошення нашим ворогам. Як вони того справедливо заслуговують."
  MSI_f: "Моссі"
  MSI_f_desc: "Ми — народ, глибоко відданий нашим унікальним віруванням і традиціям, гордий своєю політичною кмітливістю та військовою міццю. Проте, попри нашу глибоко вкорінену культуру, наш народ не зміг об'єднатися в єдину групу, і наслідки цього поділу були жахливими. Лише через єдність наш народ може знайти мир і насолоджуватися процвітанням — ми повинні цього досягти!"
  MAZ_f: "Мазовія"
  MAZ_f_desc: "Попри те, що мазовці є однією з основних [ShowCultureGroupName('polish_group')] культур, вони культурно та лінгвістично відрізняються від інших [ShowCultureGroupNameWithNoTooltip('polish_group')] груп. З огляду на це, здається доречним, щоб наш народ вимагав об'єднання всіх мазовецьких земель під єдиним правителем, оскільки лише так ми зможемо повністю продемонструвати світові нашу унікальну силу та славу."
  KRY_f: "Гілян"
  KRY_f_desc: "Розташований на берегах [ShowAreaName('caspian_sea_area')] та в серці [ShowCultureName('gilak_culture')], Гілян століттями існував у тіні [ShowRegionName('persia_region')]. Настав час нам утвердити свою присутність на світовій арені та виступити як незалежна держава."
  RYU_f: "Рюкю"
  RYU_f_desc: "Заселені народом [ShowCultureName('ryukyu_culture')] і маючи унікальну культуру та ідентичність, острови [ShowAreaName('ryuukyuu_area')] завжди були роздроблені через свою власну природу. Однак об'єднання королівств трьох гір створило б націю великого процвітання та культури — таку, що могла б змінити весь хід історії."
  CHI_f: "Китай"
  CHI_f_desc: "$middle_kingdom_desc$"
  MOL_f: "Молдова"
  MOL_f_desc: "Занадто довго молдовани жили під владою різних воєначальників, які, своєю чергою, були підданими могутніших правителів. Але тепер настав час витіснити цих огидних посередників і розтрощити владу наших гнобителів! Настав час возз'єднати наш народ під прапором Бика та забезпечити світле й незалежне майбутнє нашої нації."
  SIL_f: "Сілезія"
  SIL_f_desc: "Сілезія століттями була розділена на герцогства та керувалася з іноземних столиць. Як коштовності на розірваному намисті, кожна частина прагне бути відновленою до свого цілісного та досконалого стану. Тому настав час Сілезії відкинути іноземне панування та загасити вогні внутрішнього розбрату, створивши нову, об'єднану сілезьку націю."
  POL_f: "Польща"
  POL_f_desc: "Королівство, яке П'ясти колись так старанно возз'єднували, тепер розділене та без керівництва. У нашій історії занадто багато слави, а в нашому майбутньому занадто багато обіцянок, щоб дозволити Польщі залишатися розрізаною на шматки — ми повинні прагнути об'єднати польський народ і створити націю, яка сяятиме ще яскравіше, ніж наші королівства минулого!"
  PLC_f: "Річ Посполита"
  PLC_f_desc: "Об'єднавши корони Литви та Польщі під одним прапором, ми станемо маяком надії та віри у Східній Європі, несучи наше світло в серце навіть найтемніших лісів, що процвітають на наших землях."
  PLC_f_trigger_pol: "Ми повинні або знищити [GetCountry('POL').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  PLC_f_trigger_lit: "Ми повинні або знищити [GetCountry('LIT').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  UKR_f: "Рутенія"
  UKR_f_desc: "Століття тому земля Русі була об'єднана під єдиним прапором і керувалася з легендарного міста [ShowLocationName('kyiv')]. Але монгольські орди просувалися з великого степу, грабуючи та спалюючи все на своєму шляху. Навіть великий [ShowLocationNameWithNoTooltip('kyiv')] не зміг уникнути цієї долі. У жаху наш народ втік на північ, у глибинку, яку ми сьогодні називаємо Росією.\nТепер нове, зарозуміле північне місто піднімається. Його правитель бачить нову Русь — Русь, зосереджену в [ShowLocationName('moscow')], а не в [ShowLocationNameWithNoTooltip('kyiv')]. Але ми, рутени, не дозволимо самозванцям претендувати на спадщину наших предків! [ShowLocationNameWithNoTooltip('kyiv')] знову повстане, і так само повстане Русь!"
  ROM_f: "Римська імперія"
  ROM_f_desc: "З другого століття жодна імперія не панувала над усім Середземномор'ям і за його межами, і тією імперією був могутній Рим. Якщо ми завоюємо цю землю, ми зможемо глузувати з будь-яких претендентів, які можуть заявляти про себе в Константинополі чи Священній Римській імперії, і проголосити себе #italic справжніми#! наступниками Римської імперії. #italic Cives Romani sumus#!!"
  CTH_f: "Карфаген"
  CTH_f_desc: "Мерзенні пси Римської імперії спалили карфагенську батьківщину дотла, намагаючись стерти кожну згадку про цю стародавню цивілізацію. Можливо, їхня ідентичність, культура та релігія зникли, але доки існує хоч один римський самозванець, існує й потреба в противазі цим шарлатанам. Ми станемо бичем для всіх тих дурнів, які прославляють римлян; ми станемо Спадкоємцями Карфагена!"
  NSE_f: "Імперія Північного моря"
  NSE_f_desc: "Землі, що колись належали [GetCharacter('eng_cnut_the_great').GetName], простягалися по обидва боки [ShowAreaName('north_sea_area')], від [ShowRegionName('scandinavian_region')] до [ShowRegionName('great_britain_region')]. Хоча ця територія з часом фрагментувалася та переформувалася в різні володіння, вона завжди чекала, з нетерпінням очікуючи нашого піднесення та повернення. Настав час знову заснувати цю неймовірну імперію, об'єднавши всі ці землі під нашим прапором."
  MAY_f: "Майя"
  MAY_f_desc: "Століттями наш народ був розділений на незалежні міста, які самі були залучені в жорстоку конкуренцію одне з одним. Це створило середовище енергії та інновацій, але нам бракує єдності, необхідної для збереження сили перед зовнішнім тиском. Об'єднавши всі поселення майя в єдине царство, наша нація процвітатиме і досягне висот могутності, яких вона по праву заслуговує."
  AIA_f: "Аравія"
  AIA_f_desc: "Піски [ShowRegionName('arabia_region')] є домом і походженням [ShowCultureGroupName('arabian_group')] народу. Хоча вони були розділені на численні племена з самого початку, їхня спільна ідентичність і традиції незаперечні, перетинаючи величезні піски разом зі своїми народами. [ShowRegionNameWithNoTooltip('arabia_region')] була об'єднана одного разу раніше, і вона завоювала майже весь світ. Тепер вона повинна зробити це знову."
  ULS_f: "Ольстер"
  ULS_f_desc: "У серці [ShowLanguageName('gaelic_language')] світу та однієї з традиційних #italic Cúige#!, П'яти провінцій [ShowRegionName('ireland_region')], $ULS_f$ має унікальну присутність у світі. Але наш народ прагне робити та бути більшим, ніж ми вже є, і тому настав час для $ULS_f$ заявити про себе як про головного гравця на світовій арені."
  CEL_f: "Кельтська"
  CEL_f_desc: "Народи [ShowCultureGroupName('celtic_group')] мають історію, що охоплює тисячоліття. Хоча протягом століть вони зазнали вторгнень інших народів і бачили, як їхня територія скоротилася до тіні їхніх прабатьківських володінь, вони ніколи повністю не втрачали своїх традиційних вірувань, культури чи способу життя. Якби з'явився сильний лідер і вказав їм шлях, [ShowCultureGroupNameWithNoTooltip('celtic_group')] могли б знову об'єднатися і нарешті зайняти своє законне місце влади в цьому світі."
  MLC_f: "Малакка"
  MLC_f_desc: "Розташовані на вирішальному морському торговому шляху, протоки [ShowLocationName('malacca')] завжди зберігали контроль над торгівлею, що протікає через них, а отже, і над її багатством. Ідеально розташовані, щоб отримувати вигоду від цієї торгівлі, і володіючи землею, багатою на ресурси та традиції, народ [ShowCultureName('malay_culture')] завжди процвітав на цих землях. З єдиною ідентичністю вони процвітатимуть ще більше."
  NED_f: "Нідерланди"
  NED_f_desc: "Голландці постають як одна з найспроможніших морських і колоніальних держав Європи. Прибуткові торговельні можливості, як на місцевому рівні, так і за кордоном, призвели до швидкої еволюції, яка перетворила країну на одну з перших капіталістичних націй в історії. Доповнюють цю виняткову економічну кмітливість голландські таланти до інновацій та творчості, які перетворюють нашу культуру на світло, що сяє по всьому світу. Об'єднана голландська держава, отже, має стати однією з найбагатших і найвпливовіших за всі часи."
  EUR_f: "$EUR$"
  EUR_f_desc: "Земля [ShowContinentName('europe')] є домом для величезної різноманітності народів. З такою кількістю культур, релігій, мов і способів життя, що існують пліч-о-пліч, [ShowContinentNameWithNoTooltip('europe')] бачила свою частку сусідських конфліктів, а також культурного синтезу та співпраці. Ідея такої різноманітної популяції, що працює над єдиною метою, здається вкрай малоймовірною. Однак, якби всі різні групи в [ShowContinentNameWithNoTooltip('europe')] об'єдналися під єдиним прапором та ідентичністю, ми б досягли майже безпрецедентної глобальної могутності."
  RUS_f: "Росія"
  RUS_f_desc: "Шляхом завоювань та дипломатії Росія зуміла перетворитися з крихітного поселення на домінуючу державу. Після кількох експедицій на сході монгольські орди нарешті були підкорені, і виникає централізована російська держава під сюзеренітетом Царя. Впливи Західної Європи допомагають нам модернізувати та реформувати нашу націю, і ми переймаємо більш сучасний стиль освіти. Враховуючи нашу історію швидкого зростання та наші сучасні політичні та культурні дари, здається цілком природним, що Російська імперія повинна піднятися і панувати над меншими націями."
  ITA_f: "Італія"
  ITA_f_desc: "Як серце Відродження, культура нашої нації розквітає. Ми, здається, щойно вступили в період тривалих художніх інновацій, особливо в галузях архітектури та літератури, і відповідно пожинаємо плоди. Однак ця культурна еволюція не допомагає нам підтримувати мир у наших кордонах, і наша країна постійно страждає від іноземних держав, що прагнуть влади та територіальних здобутків. Можливо, настав час об'єднатися в рішучій демонстрації нашої сили — хоча б для того, щоб залякати потенційних узурпаторів, демонструючи єдиний фронт."
  TWS_f: "Дві Сицилії"
  TWS_f_desc: "Дві Сицилії... не країна, а мрія. Мрія об'єднати землі, омиті водами Мессінської протоки — Сицилії, що стоять по обидва боки від 'Пунта дель Фаро'. Наш обов'язок — втілити цю мрію в життя."
  FRA_f: "$FRA$"
  FRA_f_desc: "Цей рік ознаменує початок еволюційного періоду для нашої нації. Старі феодальні порядки повинні поступитися місцем більш сучасній, централізованій державі."
  LOT_f: "$LOT$"
  LOT_f_desc: "Як нові претенденти на $LOT_ADJ$ корону, ми підтвердили свою легітимність, посилаючись на спадщину [GetCharacter('fra_charlemagne').GetName] та [GetCharacter('fra_lothair').GetName]. Під нашим заступництвом подвиги наших предків знову стали загальновідомими, як серед нашого народу, так і при дворах Європи."
  BGP_f: "$BGP$"
  BGP_f_desc: "Колись давно бургунди спустилися з Борнхольма, оселилися на цих землях і дали їм своє ім'я. Як їхні нащадки, наша честь вимагає від нас відтворити цю націю та правити цими землями до кінця часів."
  GRE_f: "Греція"
  GRE_f_desc: "З найдавніших часів нашої цивілізації Еллада була розділена, чи то внутрішньо її численними конкуруючими королівствами, чи то окупована іноземцями руками наших спільних ворогів. Протягом століть наша влада зменшувалася, оскільки нас завойовували, розділяли, а наші скарби забирали завойовники. Існувати в такому роздробленому стані — це образа для нашої великої спадщини мистецтва, спорту та винаходів! Об'єднати грецькі землі під одним прапором та одним правителем — наш єдиний шлях до величі нашого минулого."
  BYZ_f: "Візантійська імперія"
  BYZ_f_desc: "Славетна Візантійська імперія давно минула, але доки греки живуть у [ShowLocationName('constantinople')], є надія на її воскресіння. Як фенікс, що повертається до життя з купи попелу, так і залишки Східного Риму. Але перш ніж ми зможемо возз'єднатися в життєздатну імперію, ми повинні придушити внутрішні розбіжності та переконатися, що всі ми працюємо над однією метою. Зрештою, ми можемо зайняти місце Візантійської імперії духом, але ми не можемо взяти її ім'я, доки не доведемо, що гідні його..."
  CNN_f: "Коннахт"
  CNN_f_desc: "Одне з традиційних королівств [ShowRegionName('ireland_region')], $CNN_f$ пишається довгою та славетною історією. Отримавши достатній вплив, щоб здобути Високе Королівство над усім островом, $CNN_f$ має певну претензію на традиції та лідерство — але чи зможемо ми вистояти перед обличчям потенційних гнобителів, чи ні, залежить від нашого об'єднання."
  HEN_f: "POSTEDIT_Ген Огледд"
  HEN_f_desc: "[ShowLanguageName('brythonic_language')] народи колись населяли весь регіон [ShowRegionName('great_britain_region')]. Хоча їх спочатку витіснили з південних земель як римляни, так і англосакси, вони зуміли зберегти сильну присутність у північних частинах острова до прибуття [ShowLanguageName('gaelic_language')] народів. З часом ми почали втрачати нашу рідну мову та культуру... але більше ні! Настав час повернути старе королівство півночі та побачити [ShowLanguageNameWithNoTooltip('brythonic_language')] народ, об'єднаний як законом, так і мовою."
  USA_f: "Сполучені Штати"
  USA_f_desc: "Ми, народ, виснажені: іноземними правителями, які бачать нас як власність, гнітючою та жорстокою податковою політикою, коли ми самі не маємо права голосу в нашому уряді, та жорстокістю наших лоялістських сусідів. Довго ці колонії були піддані жадібності європейських держав, але більше ні! Хвиля свободи в колоніях дала нам можливість сформувати горду федерацію незалежних держав, вільних від тиранії. Дайте нам свободу, або дайте нам смерть!"
  CAN_f: "Канада"
  CAN_f_desc: "Земля [ShowRegionName('canada_region')] величезна і грізна, але неймовірно щедра та багата на ресурси. Хоча місцевість може бути надзвичайно суворою, у цих землях є великі обіцянки — і багатство. Якби ми оголосили себе єдиною $CAN_ADJ$ нацією і заявили на неї свої права, не було б меж потенційним винагородам, які ми могли б отримати!"
  MEX_f: "Мексика"
  MEX_f_desc: "Землі [ShowRegionName('mesoamerica_region')] багаті та щедрі, з різноманітним населенням та довгою історією цивілізації. Проте ми роздроблені між різними групами та ослаблені внутрішніми чварами за владу та ресурси між цими групами. Настав час встановити нову ідентичність для всіх нас, таку, що демонструє нашу силу, міць та завидну історію, а також представляє єдиний та непроникний фронт для решти світу."
  DEC_f: "Декан"
  DEC_f_desc: "Ця земля колись була чужою для наших предків, але ми зробили її своєю. Тут ми побудували нове суспільство, де перські впливи зустрілися з місцевими стародавніми індійськими традиціями. У нас є своя мова, свої адміністративні традиції та свої міфи й легенди. Настав час показати світові, що Південь подолав свої розбіжності та об'єднаний як одне ціле."
  MHR_f: "Маратха"
  MHR_f_desc: "[ShowCultureName('marathi_culture')] народи були роздроблені протягом багатьох років, але залишаються гордими своїми літературними досягненнями та унікальною мовою. Хоча об'єднання може бути не головним у думках наших народів, [ShowCultureName('marathi_culture')] воїни по всьому Декану зберуться під наші прапори, якщо ми покажемо чітке лідерство та здобудемо всі великі форти Дешу. Об'єднаймо клани і вирушимо правити Індією раз і назавжди!"
  HIN_f: "$HIN$"
  HIN_f_desc: "Люди з $india$, хоча й дуже різноманітні за культурою, традиціями та віруваннями, всі належать до цієї ж землі та поділяють її історію. Тому ми повинні відкинути ці відмінності та працювати над спільною метою створення сильної $HIN$ держави, представляючи себе як єдиний народ проти будь-кого, хто може нам протистояти."
  PUN_f: "$PUN$"
  PUN_f_desc: "[ShowCultureName('punjabi')] народ надто добре знайомий з іноземними вторгненнями, переживши хвилю за хвилею завоювань протягом століть. Але ці вторгнення призвели до величезних досягнень у наших економічних та релігійних практиках, а також до розквіту літературних мистецтв. Але ми повинні об'єднати [ShowCultureName('punjabi')] народ, якщо ми хочемо коли-небудь самостійно протистояти іноземним загарбникам. Разом ми побудуємо сучасну державу з арміями, здатними протистояти будь-кому, хто бажає захопити наші території та розтрощити нашу віру!"
  RJP_f: "$RJP$"
  RJP_f_desc: "Землі [ShowAreaName('rajputana_area')] були розбиті та слабкі з часів мусульманського вторгнення. Але це було століття тому, і наш народ почав піднімати голови з-під ярма наших гнобителів, шукаючи місце ближче до зірок, де ми належимо. Ми повинні повернути легендарні міста, що належали великим династіям, які були до нас, і об'єднати князів [ShowAreaNameWithNoTooltip('rajputana_area')]!"
  GUJ_f: "$GUJ$"
  GUJ_f_desc: "[ShowAreaName('gujarat_area')] завжди мав ідентичність, відмінну від решти $india$, і [ShowLanguageName('gujarati_language')] люди пишаються своєю давньою історією та унікальною ідентичністю. Ми прагнемо власної нації, де ми могли б керуватися цими своєрідними принципами. На щастя для нас, здається, момент для здобуття нашої незалежності швидко наближається…"
  SHA_f: "Шан"
  SHA_f_desc: "[ShowLanguageFamilyName(tai_language_family)] народи [ShowAreaName('shan_highland_area')] довго були господарями своєї землі. Ми перетворили навколишні пагорби на терасові ферми; ми побудували храми, які стоятимуть вічно як свідчення наших богів. Проте ми також прокляті тим, що опинилися в пастці між більшими, могутнішими націями, часто втягнуті в їхні битви. Але більше ні — хоча ми колись були розділені, ми, шани, тепер стоїмо як одне ціле проти всіх них!"
  MSA_f: "Малайя"
  MSA_f_desc: "$MLC_f_desc$"
  SIA_f: "Сіам"
  SIA_f_desc: "[ShowCultureName('thai_culture')] люди живуть розділені горами та річковими долинами, між сферами впливу, що перетинаються, і тому завжди тяжіли до місцевих центрів влади, а не до центральної влади. Але об'єднана [ShowCultureNameWithNoTooltip('thai_culture')] батьківщина була б вигіднішою, ніж наш нинішній розпорошений стан — така консолідація нашої влади значно полегшила б ведення нашого народу до величі."
  BAN_f: "Бантен"
  BAN_f_desc: "[ShowCultureName('sundanese_culture')] з [ShowLocationName('banten')] можуть похвалитися великим процвітанням завдяки безперешкодному доступу як до сухопутних, так і до морських торговельних шляхів. Будучи дуже добре розташованим портом, [ShowLocationNameWithNoTooltip('banten')] служить ідеальним місцем для розширення [ShowCultureNameWithNoTooltip('sundanese_culture')] влади та поширення нашого впливу."
  IRA_f: "Персія"
  IRA_f_desc: "[ShowRegionName('persia_region')] була осідком могутніх імперій з давніх часів Кіра Великого. Без цих [ShowCultureGroupName('iranian_group')] королівств минулого наш сучасний світ був би на десятиліття позаду того, де ми є зараз у плані винаходів, науки та мистецтв.\n\nТепер ми живемо в пилу тієї величі, мріючи про об'єднану [ShowCultureGroupNameWithNoTooltip('iranian_group')] державу, але, можливо, недовго — можливість відродження [ShowCultureGroupNameWithNoTooltip('iranian_group')] нації вже не здається такою невловимою. Настав час нам повернути нашу славетну спадщину та піднести одного з наших власних до титулу $rank_kingdom_persian_ruler_male$."
  SKO_f: "Сокото"
  SKO_f_desc: "Присутність [ShowReligionGroupName('muslim')] у регіоні Західної [ShowContinentName('africa')] завжди є непевною. З такою кількістю різних народів, представлених у нашому населенні, ми ризикуємо, що релігійний конфлікт може спалахнути будь-якої миті, як всередині, так і ззовні наших кордонів. Під керівництвом наших [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] ми повинні створити ортодоксальну ісламську державу, щоб забезпечити виживання [ShowReligionName('sunni')] народу в цьому регіоні."
  HAU_f: "Хауса"
  HAU_f_desc: "Після десятиліть чвар і воєн, що руйнували нашу землю, старі суперництва нарешті були придушені, і настав мир. Вперше за живу пам'ять сини Баво знову об'єднані під одним прапором. Настав час Хауса знову повстати як єдине ціле!"
  KON_f: "Конго"
  KON_f_desc: "[ShowLanguageName('kongo_language')] народ є гілкою [ShowLanguageFamilyName('bantu_language_family')]. Хоча серед нашого народу існує велике розмаїття, ми також маємо багато спільного у наших щоденних духовних та культурних практиках. Якщо ми об'єднаємося за цими спільними рисами та погодимося бути єдиною нацією, а не асортиментом окремих поселень, [ShowLanguageNameWithNoTooltip('kongo_language')]-мовні народи зможуть досягти більшого, ніж будь-коли раніше."
  NTR_f: "Об'єднані племена"
  NTR_f_desc: "[ShowCultureName('maori_culture')] народ [ShowRegionName('new_zealand_region')] завжди ділився на окремі племена, глибоко пов'язані родинними зв'язками та шлюбом. З одного боку, наше розділення та індивідуалізм створили культурну стійкість, яка дає простір для процвітання наших традиційних способів. З іншого боку, ми могли б легше відбивати спроби загарбників, якби об'єдналися під єдиним прапором і представили наш народ як цілісну силу. Можливо, це шлях нашого майбутнього?"
  TIM_f: "Тимуриди"
  TIM_f_desc: "Численні битви, що їх вели наші предки, можливо, просочили землю кров'ю, але це кровопролиття, своєю чергою, живило ґрунт, і з цієї скрути народилася раса воїнів, архітекторів, художників та вчених. Настав час поділитися нашими численними дарами зі світом, виступивши як велика нація. Ми підемо за спадщиною [GetCharacter('chg_timur_lame_borjigin').GetName] і поведемо наш народ до величі!"
  INC_f: "Тавантінсую"
  INC_f_desc: "Альтіплано розділене між багатьма націями, кожна з яких населяє долини та поклоняється різним богам. Ми — народ, який говорить багатьма мовами та має різноманітні погляди, проте разом ми представляємо культурну та духовну силу, якій мало які інші нації могли б протистояти. Ми зберемо всі наші розрізнені території, щоб слідувати за одним сильним лідером. Сонце проллє своє світло на об'єднане царство!"
  BNG_f: "$BNG$"
  BNG_f_desc: "Люди з [ShowAreaName('bengal_area')] мають дуже виразну ідентичність, викувану на берегах могутньої річки Ганг. Тисячоліття переплетення культур і традицій призвели до розвитку особливо багатої та унікальної [ShowCultureName('bengali')] культури, яка мала б бути предметом заздрості всього світу. [ShowCultureNameWithNoTooltip('bengali')] люди пишаються своєю історією та спільними традиціями — об'єднані, ми були б як маяк для решти $india$."
  DLH_f: "$DLH$"
  DLH_f_desc: "Делі колись був столицею всього Індійського субконтиненту, і наша власна сучасна держава багато в чому є продовженням їхніх традицій.\nЧас нашого відродження нарешті настав. Повернімо спадщину султанів Делі та керуймо субконтинентом з їхньої стародавньої столиці в Доабі!"
  MCH_f: "$MCH$"
  MCH_f_desc: "Народи [ShowRegionName('manchuria_region')] мають довгу історію як кочового племінного життя, так і частих взаємодій з [GetInternationalOrganizationType('middle_kingdom').GetName]. Таким чином, ми поєднали аспекти багатьох культур і місць, щоб створити свій власний унікальний спосіб життя. Хоча ми зазвичай розділені на численні племена, об'єднана [ShowRegionNameWithNoTooltip('manchuria_region')] може претендувати на гегемонію над усім $china$. Чи варто нам рухатися вперед до об'єднання?"
  SER_f: "$SER$"
  SER_f_desc: "Земля сербів була розділена та керувалася іноземними державами надто довго, це образа для нашої національної гордості. Наш народ прагне, щоб ним керував той, хто народився серед них. Шлях до об'єднання важкий, але ми не повинні відпочивати, доки кожне місто та поселення від Дунаю до південних гір знову не належатиме Сербії."
  AIR_f: "$AIR$"
  AIR_f_desc: "Гори [ShowAreaName('air_area')] століттями слугували притулком для [ShowCultureName('tuareg')] народів, островом зелені серед піщаних дюн пустелі. Ця територія багата на ресурси та добре укріплена, що робить її ідеальною фортецею, з якої можна керувати нашою новою нацією. З нашим народом, нарешті об'єднаним в одне ціле, ці гори стануть першим кроком у нашому прагненні до експансії."
  NAV_f: "$NAV$"
  NAV_f_desc: "Спочатку марка Каролінзької імперії, легендарне [ShowReligionGroupAdjective('christian')] королівство, засноване воєначальником Іньїго Арістою, було втрачено надто довго. Ці землі мають бути возз'єднані, а [ShowCultureName('basque')] народи об'єднані під ланцюговим прапором Наварри!"
  KOJ_f: "$KOJ$"
  KOJ_f_desc: "Єрусалим — земля обітована, священне місто, на яке люди багатьох вір дивляться як на місце народження своїх вірувань. Отже, над цією святою землею буде проголошено Царство Небесне. Нехай усі, хто поклоняється, будуть вражені нашою пишністю!"
  YMT_f: "$YMT$"
  YMT_f_desc: "[ShowDynastyName('yamato_dynasty')] є давньою і стверджує про своє походження від самих богів. Саме їхнє існування дає їм право на божественне лідерство над усім [ShowRegionName('japan_region')]. І хто був би настільки зарозумілим, щоб виступити проти нащадків богів та їхнього законного правління?"
  MUG_f: "$MUG$"
  MUG_f_desc: "Наш правитель почав закладати основи нової імперії. Хоча й поступаючись у чисельності, наші добре дисципліновані війська здобули кілька вирішальних перемог над султанами $india$. Ці битви за $india$ — лише перші великі перемоги в тому, що, безсумнівно, стане серією успішних територіальних розширень. З часом імперія Моголів простягнеться не лише на цей регіон, а й на весь світ."
  NPL_f: "$NPL$"
  NPL_f_desc: "Попри свою горду та давню історію, гімалайські королівства залишаються роздробленими та слабкими. Об'єднавши весь регіон під одним правителем, ми могли б стати нестримною силою, здатною кинути виклик м'яким, розкішним правителям $HIN$. Задоволені життям за рахунок свого багатства, вони розтрачували свої статки протягом поколінь і не зможуть протистояти нашим загартованим арміям."
  TIB_f: "$TIB$"
  TIB_f_desc: "Тибетське плато колись було об'єднане під розлогою імперією, яка суперничала з іншими великими державами свого часу за витонченість і багатство. Однак, протягом століть ця імперія розпалася, безповоротно пошкоджена релігійними та політичними чварами. Але, знову об'єднавши [ShowCultureGroupName('tibetan_group')] народи, ми можемо відродити нашу марнотратну спадщину та відновити наше втрачене королівство."
  SHL_f: "$SHL$"
  SHL_f_desc: "Після багатьох років перебування під контролем тієї чи іншої шляхетної родини, ми нарешті утвердилися як верховні правителі [ShowAreaName('holstein_area')]. Це наше право — перетворити наші територіальні володіння на одну країну, і тому ми це зробимо."
  RUM_f: "$RUM$"
  RUM_f_desc: "На піку своєї могутності Султанат Рум був головною силою в [ShowRegionName('anatolia_region')]. На жаль, він був роздроблений постійними жорстокими вторгненнями та запеклими суперечками за спадщину, занурившись у забуття. Але ми маємо волю та силу, щоб перекувати розбиті шматки [ShowRegionNameWithNoTooltip('anatolia_region')] під єдиним правлінням і відновити наш давно забутий Султанат!"
  MGE_f: "$MGE$"
  MGE_f_desc: "Імперія $genghis_khan_name$, колись наймогутніша у світі, майже зникла. Тепер ми роздроблений народ, розсіяний і роз'єднаний. Але ми все ще монголи, і ми ніколи не втрачали надії повернути те, що втратили. Ми повинні відновити нашу спадщину, повторивши завоювання Великого $rank_kingdom_horde_ruler_suffix_male$. Монгольська імперія знову повстане, щоб завойовувати!"
  ILK_f: "$ILK$"
  ILK_f_desc: "Наша імперія колись простягалася по всьому світу, безмежна та яскрава. Тепер це лише історія, історична примітка. Це неприпустимо — ми є спадкоємцями спадщини [GetCharacter('hulegu_khan_borjigin').GetName], і ми заслуговуємо на більше! Ми відновимо нашу колись славетну імперію, об'єднавши наш народ і повернувши те, що колись було нашим. А потім і більше..."
  GEO_f: "$GEO$"
  GEO_f_desc: "Сам ландшафт [ShowAreaName('georgia')] та руйнівні наслідки іноземних вторгнень неодноразово випробовували стійкість нашого народу, але ми тріумфували, довівши, що ми такі ж міцні, як гори та високогір'я, що нас захищають. З мужністю та рішучістю ми побачимо, як $GEO$ знову підніметься та процвітатиме під нашим керівництвом."
  ARM_f: "$ARM$"
  ARM_f_desc: "[ShowCultureName('armenian_culture')] є давньою цивілізацією, чия історія починається ще до часів римлян. Ми пережили піднесення та падіння імперій-завойовників, не втративши ані рідної мови, ані віри. Тепер ми об’єднаємо розсіяних спадкоємців Гайка під одним прапором та однією $ARM_ADJ$ ідентичністю!"
  SWI_f: "$SWI$"
  SWI_f_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetName] починалася як простий союз між різними кантонами. Кожна частина розвивалася окремо, розмовляючи різними мовами і навіть маючи різні закони. Щоб по-ссправжньому об’єднати [ShowCultureGroupName('swiss_group')], суверенна влада повинна встановити домінування на Швейцарському плато. Хоча об’єднання такої кількості різних людей буде нелегким, ми багато чого виграємо, якщо досягнемо успіху."
  SWI_f_tt: "[GetUniqueInternationalOrganization('swiss_confederation').GetName] існує\nЦя [Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] може замість цього ухвалити [ShowLawName('sc_unification')], щоб сформувати цю країну"
  AYU_f: "$AYU$"
  AYU_f_desc: "Великий торговий центр із розгалуженими закордонними зв’язками та великим населенням, місто $ayutthaya$ стане новим джерелом сили для [ShowCultureName('thai_culture')], звідки ми зможемо прокласти шлях до більшої слави. Як єдиний народ, ми гордо протистоятимемо будь-кому, хто спробує порушити наші кордони."
  ALB_f: "$ALB$"
  ALB_f_desc: "Традиційно земля різноманітних вірувань та розрізнених кланів, ми нарешті об’єднали $ALB_ADJ$ народ під єдиним прапором та метою. Тепер, коли ми вигнали небажаних чужинців та створили нову державу, $ALB$ постане як героїчна батьківщина всіх $ALB_ADJ$ людей."
  BAH_f: "$BAH$"
  BAH_f_desc: "Понад століття ми були домінуючою [ShowReligionGroupName('muslim')] силою на півдні та контролювали величезні території по всьому [ShowRegionName('deccan_region')], але ті чудові стародавні міста давно були зруйновані. Хоча внутрішні чвари та нестримні амбіції провінційних губернаторів зрештою розділили наше царство на п’ять султанатів-наступників, настав час відновити славу $BAH_ADJ$ народу та об’єднати [ShowRegionNameWithNoTooltip('deccan_region')] під єдиним, могутнім правлінням."
  GLD_f: "$GLD$"
  GLD_f_desc: "Ми отримали у володіння величезні території в Польщі. Замість того, щоб встановлювати пряме правління над цим різноманітним регіоном, ми створимо $GLD$ як коронну землю, що дозволить нам керувати через традиційні титули, зберігаючи імперський контроль."
  DAH_f: "$DAH$"
  DAH_desc: "Ми консолідували наші території і тепер зможемо створити нову країну, щоб протистояти іноземним впливам."
  IRO_f: "$IRO$"
  IRO_f_desc: "Племена [ShowCultureGroupName('haudenosaunee_group')] довго співіснували у формальній конфедерації, хоча кожна нація в племені зберігала свою автономію. Але часи змінилися, і ми прийняли стратегічне рішення ще більше зміцнити наші нинішні зв’язки. З п’ятьма націями, які тепер очолює центральне плем’я, ми можемо рухатися вперед як новостворена зміцнена конфедерація."
  PUE_f: "$PUE$"
  PUE_f_desc: "Нащадки стародавніх пуеблоанців, племена [ShowAreaName('shiewhibak_area')] зберегли аспекти своїх предків, незважаючи на те, що розійшлися на різні культури. Хоча ми прагнемо об’єднання цих роздроблених племен, це означає, що ми повинні боротися з новими культурними розробками, які виникли в окремих пуебло. Але ці особливості зроблять наш союз сильнішим і унікальнішим, якщо ми зможемо знайти гармонію."
  RMN_f: "$RMN$"
  RMN_f_desc: "Останні залишки $ROM_f$ зникли, і хоча багато претендентів заявляють про імператорську корону, лише ми є її справжніми нащадками. Коли землі наших предків нарешті будуть возз’єднані під єдиним прапором, лише тоді ми будемо винагороджені процвітанням, яке є нашим правом від народження. Ми — діти Риму — народ $RMN$!"
  SWA_f: "$SWA$"
  SWA_f_desc: "Після занепаду центральної влади в [ShowAreaName('swabia_area')] жоден правитель не зміг відновити колишню силу $SWA$, і землі повільно потрапили в руки іноземних країн. Тепер, коли значні частини [ShowAreaName('swabia_area')] знову під нашим контролем, ми нарешті можемо врятувати нашу спадщину з попелу історії та створити нову державу."
  WES_f: "$WES$"
  WES_f_desc: "Наш народ колись був у рабстві жорстокого релігійного гноблення, але ми побачили новий шлях — кращий шлях — шлях, який дозволить нам нарешті стати повноцінною нацією. Оскільки ці релігійні впливи повільно відходять у минуле, ми створимо нову державу для [ShowAreaName('westphalia_area')] і проголосимо настання нової ери для нашого народу."
  BEL_f: "$BEL$"
  BEL_f_desc: "Південні землі Нижніх Країн є домом для народу, розділеного за мовними та релігійними ознаками. Але якби ми змогли об'єднати ці ворогуючі групи та змусити їх працювати над досягненням самоврядування, можливо, це згладило б розбіжності між нами. З цією метою ми бажаємо проголосити себе новою та незалежною державою."
  FKN_f: "$FKN$"
  FKN_f_desc: "Колись осередок могутнього племінного герцогства, [ShowAreaName('franconia_area')] занепала протягом століть, а пов'язаний з нею титул герцога [ShowAreaNameWithNoTooltip('franconia_area')] став номінальним і неактуальним. Але якби ми відновили нашу владу і змогли зміцнити контроль над старим герцогством, ми могли б нарешті відродити $FKN$ і відновити її затьмарену колишню велич."
  HAN_f: "$HAN$"
  HAN_f_desc: "Маючи більшість [ShowAreaName('lower_saxony')] під нашим контролем та забезпечивши [ShowLocationName('hanover')], ми зможемо проголосити себе новою країною, маяком сили, що поведе наш народ у майбутнє! З рішучістю та хитрістю ми утвердимося як вирішальна сила в [ShowRegionName('north_german_region')]."
  TUS_f: "$TUS$"
  TUS_f_desc: "Стародавня Марка Тоскана існувала століттями, але після смерті її правительки Матильди Каноської у 1115 році вона зрештою зникла. Її колишня територія була розрізана та захоплена різними зростаючими міськими комунами, і пам'ять про об'єднану [ShowAreaName('tuscany_region')] згасла в темряві. Але обставини змінилися, і, можливо, настав час знову об'єднати наші розрізнені землі та людей під одним правлінням."
  BUL_f: "$BUL$"
  BUL_f_desc: "Королівство Болгарія століттями боролося за своє виживання, постійно переслідуване нападами своїх заздрісних сусідів. Воно падало одного разу, було відроджене, а потім знову розвалилося. Але з нашою твердою рукою, щоб вести їх, народ $BUL$ нарешті знову повстане як єдина нація, і цього разу досягне статусу великої світової імперії!"
  DAL_f: "$DAL$"
  DAL_f_desc: "Далмація традиційно була регіоном, де домінували іноземці, оскільки її узбережжя, острови та затоки є надзвичайно важливими для домінування на надзвичайно прибуткових торгових шляхах [ShowProvinceDefinitionName('adriatic_sea_province')]. Але чому іноземці повинні отримувати вигоду від Далмації, коли її власний народ заслуговує на її багатства набагато більше? Настав час нарешті скинути іноземний контроль над регіоном і заснувати незалежну $DAL$!"
  HUN_f: "$HUN$"
  HUN_f_desc: "Старе Королівство Угорщина колись було найвищою силою в [ShowRegionName('carpathia_region')], контролюючи регіон протягом століть. Але навіть найміцніші стіни не можуть стояти вічно, і стара держава зрештою розвалилася завдяки вторгненням та експансіям наших суперників. Проте ми досягли вершини величі, і час відродити занепалу $HUN$ нарешті настав. Досягнімо великих імперських висот, яких ми заслуговуємо!"
  KRS_f: "$KRS$"
  KRS_f_desc: "[ShowCultureName('kurdish_culture')] народ завжди жив автономними племенами, без центральної об'єднуючої фігури, яка б їх очолювала. Але якби ми заснували [ShowCultureNameWithNoTooltip('kurdish_culture')] націю і об'єднали наші розрізнені групи в єдине ціле, ми могли б легко стати авторитетною силою в регіоні."
  SOI_f: "$SOI$"
  SOI_f_desc: "Від трав'янистих степів [ShowContinentName('africa')] до пісків [ShowRegionName('arabia_region')] і навіть до узбережжя $india$, [ShowCultureName('somali_culture')] народ пройшов через багато різних світів і засвоїв багато уроків, які ці місця могли нам дати. Але якби ми об'єднали наш народ в єдине ціле, використовуючи знання, отримані з такої космополітичної історії, об'єднана країна для всієї [ShowRegionName('somalia_region')] була б могутньою."
  CRO_f: "$CRO$"
  CRO_f_desc: "Земля [ShowAreaName('croatia_area')] століттями була точкою зустрічі між європейським Заходом і Сходом, між водами Середземномор'я та багатьма країнами внутрішніх районів. Перетнута багатьма народами та культурами, саме під [ShowCultureName('croatian')] ідентичністю вона зможе процвітати."
  TRA_f: "$TRA$"
  TRA_f_desc: "«Землі за лісом» багаті на мінеральні ресурси та родючі сільськогосподарські угіддя, і населені народами різного походження — влахами, мадярами та німцями — усі вони пишаються цими землями, які вони населяють. З нашої столиці ми будемо правити цією різноманітною групою новостворених $TRA_ADJ$ людей і принесемо процвітання всім їм."
  MAL_f: "$MAL$"
  MAL_f_desc: "Землі [ShowCultureName('mandinka')] мають горду історію багатства, культурного впливу та благочестя, прикладом чого є наш прабатько [GetCharacter('mal_musa_keita').GetName]. Хоча ця пишність була втрачена з часом, якби ми знову об'єдналися, ми могли б відновити комерційні мережі та політичну єдність, які колись зробили [ShowCultureNameWithNoTooltip('mandinka')] майстрами торгівлі, і піднести наш народ до небачених раніше ешелонів влади."
  NUB_f: "$NUB$"
  NUB_f_desc: "Наша нація стародавня, але вона не вистояла. Розділені між конкуруючими правителями, ми один за одним ставали здобиччю сильніших ворогів. Землі перед Нілськими порогами повинні бути об'єднані під єдиним правлінням, здатним протистояти цим ворогам і перемагати їх у битві, якщо ми коли-небудь знову повстанемо як реалізована сила в цьому світі."
  FIN_f: "$FIN$"
  FIN_f_desc: "Протягом століть [ShowCultureName('finnish')] народ перебував під владою іноземних держав, а його землі контролювалися чужинцями. Але ми ніколи не втрачали наших самобутніх фінських звичаїв, ані нашого бажання підкорити тих, хто гнобив би нас за них, і наш час відірватися нарешті настав. Настав час для народження держави $FIN$ і зайняття нею свого місця серед пантеону націй!"
  ICE_f: "$ICE$"
  ICE_f_desc: "Обставини призвели до того, що наші володіння в [ShowAreaName('iceland_area')] перетворилися на найважливішу частину нашої країни. Приймімо цю нову ідентичність і заснуймо націю $ICE$. Ми зміцнимо наші місцеві інституції, міцно закріпивши наше право на панування над островом і нарешті об'єднавши наш народ."
  KAZ_f: "$KAZ$"
  KAZ_f_desc: "По всій вітряній просторі степів [ShowCultureName('kazakh')] народ вільно кочує без об'єднуючого правителя, що робить нас вразливими до зовнішніх нападів. Але якби ми нарешті об'єдналися під командуванням єдиного лідера і розділили ідентичність як нація, ми могли б змінити хід подій. Таким чином, ми об'єднаємося під одним прапором, щоб панувати над морями трави як могутній $KAZ$."
  MIR_f: "$MIR$"
  MIR_f_desc: "Наш острів має багато впливів, це злиття культур, що створило унікальні синкретичні вірування та способи життя. Хоча ця суміш відмінностей є частиною того, що робить нас великими, ми повинні просувати ідею нашого єдиного народу, незважаючи на ці відмінності. Об'єднана малагасійська держава під нашим керівництвом дозволить нашому острову процвітати та забезпечить стабільність — і збільшену владу — для нашого народу."
  MOR_f: "$MOR$"
  MOR_f_desc: "Історія нашої нації — це історія піднесення та падіння, великі династії руйнувалися лише для того, щоб відродитися. Проте серед припливів і відпливів цього династичного хаосу наша культура сяє, як дорогоцінний камінь. Ми — народ мистецтва, навчання, науки та прогресу, світло в цьому регіоні. Наша нація повинна досягти тривалої стабільності та стати могутньою через єдність, забезпечуючи процвітання нашого народу та вселяючи страх у серця наших ворогів."
  NUS_f: "$NUS$"
  NUS_f_desc: "[ShowRegionName('indonesia_region')] — багата земля, переповнена дорогоцінними ресурсами та розкошами. Хоча її народи різноманітні, багато їхніх традиційних культурних аспектів однакові, головним чином через дифузійний вплив морської торгівлі. Якби ми об'єднали ці численні острови та народи під одним прапором, ми були б сильним претендентом на остаточне регіональне домінування."
  SLO_f: "$SLO$"
  SLO_f_desc: "З моменту розпаду Великої Моравської Держави [ShowCultureName('slovak')] народ перебував під владою іноземних держав, які керували нами, мало зважаючи на наші інтереси. Але протягом цього темного періоду ми повільно, але впевнено нарощували свою силу, наш народ зближувався в солідарності. Нарешті настав час утвердити наш суверенітет і заснувати державу, вільну від іноземного панування."
  BNO_f: "$BNO$"
  BNO_f_desc: "Острів Борнео щедрий і багатий як на природні ресурси, так і на різноманітність народів і культур, які називають його домом. Об'єднання всіх нас під єдиною ідентичністю забезпечить, що наші дорогоцінні ресурси залишаться нашими, і що тільки ми отримаємо вигоду від їх експлуатації."
  CIR_f: "$CIR$"
  CIR_f_desc: "Поділ черкеського народу на окремі конкуруючі племена має припинитися. Якщо ми хочемо стати сильними і не піддатися зовнішньому тиску, ми повинні бути об'єднані під єдиним могутнім лідером, який зможе вміло вести наш народ до процвітання — і вселяти глибокий жах у серця наших ворогів."
  AZT_f: "Aztec"
  AZT_f_desc: "Імперія $AZT_f$ стоїть як символ божественності та імперської долі. Зі священного міста [ShowLocationName('tenochtitlan')] наші славетні лідери успішно об'єднали значні частини [ShowRegionName('mesoamerica_region')] під одним сяючим Сонцем. Через віру, війну та жертвоприношення наша новостворена імперія відновить своє священне призначення — забезпечити яскраве горіння небес та вшанування богів."