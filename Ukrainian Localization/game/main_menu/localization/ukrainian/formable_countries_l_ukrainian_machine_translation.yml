l_english:
  SCA_f: "Скандинавія"
  SCA_f_desc: "Протягом незліченних століть Королівства Півночі були розділені та залучені у міжусобну боротьбу за владу. Якщо ми хочемо займати чільне місце серед великих держав світу, ми повинні прагнути створити міцний союз між нашими народами, хоч би як це було важко."
  sweden_f: "Швеція"
  sweden_f_desc: "Величезні землі Швеції були об'єднані протягом століть, і цей союз має бути поновлений. Із значними частинами шведських земель, що нині під нашим контролем, ми нарешті зможемо відродити цю давню спадщину та знову проголосити єдину шведську націю."
  denmark_f: "Данія"
  denmark_f_desc: "Данія, розташована між Північним морем та Балтійським морем, є країною великого значення для [ShowRegionName('scandinavian_region')]. Якщо ми зможемо контролювати достатньо її території, ми могли б реформувати її та відновити спадщину, народжену нашими пращурами."
  DRD_f: "$DRD$"
  DRD_f_desc: "[ShowLanguageName('gaelic_language')] народи на узбережжях навколо [ShowAreaName('hebrides_area')] вперше об'єдналися давно, сформувавши королівство, відоме своєю мореплавною культурою та силою свого флоту. Ми повинні заявити свої права на цю спадщину предків і відродити королівство."
  GBR_f: "Велика Британія"
  GBR_f_desc: "Об'єднавши наш внутрішній політичний розвиток та поширюючи наш вплив за межі наших кордонів, ми зможемо зміцнити нашу позицію у світових справах та перетворитися на одну з провідних європейських держав, Британську імперію."
  GBR_f_trigger_eng: "Ми повинні або знищити [GetCountry('ENG').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  GBR_f_trigger_sco: "Ми повинні або знищити [GetCountry('SCO').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  GBR_f_trigger_wls: "Ми повинні або знищити [GetCountry('WLS').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  GBR_f_trigger_sbl: "Ми повинні або знищити [GetCountry('SBL').GetNameWithFlag], або зробити їх нашими [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  SPA_f_not_christian: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('iberia_region')] має бути [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionGroupAdjective('christian')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] або одним із наших [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]!"
  ADU_f_not_muslim: "Кожна [Concept('location', 'CONCEPT_PLACEHOLDER')|e] у [ShowRegionName('iberia_region')] має бути [Concept('owned', 'CONCEPT_PLACEHOLDER')|e] [ShowReligionGroupAdjective('muslim')] [Concept('country', 'CONCEPT_PLACEHOLDER')|e] або одним із наших [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]!"
  ENG_f: "$ENG$"
  ENG_f_desc: "Торгівля здавна була основою англійської національної політики. Розширюючи наш вплив за межі кордонів та контролюючи її політичний розвиток всередині країни, ми зуміли стати великою європейською державою. Наша колоніальна експансія стає головним чинником у сприянні економічному зростанню нашої нації, зміцнюючи нашу позицію у світових справах."
  WLS_f: "$WLS$"
  WLS_f_desc: "Вільний від впливу далеких правителів, валлійський народ створить власну державу, керуючи собою без втручання чи згоди інших. Наче великий червоний дракон з легенд, валлійці вийдуть переможцями з виру конфлікту!"
  SCO_f: "$SCO$"
  SCO_f_desc: "Колись горда нація Шотландії занепала. Проте, попри наш розбитий стан, залишаються серед Кланів ті, хто має волю відновити наше королівство. Ми зберемо нашу мужність і боротимемося за вільну та незалежну Шотландію!"
  NOL_f: "Нортумберленд"
  NOL_f_desc: "Надто довго землями нортумбрійців правили південці або люди з-за моря. Настав час нам взяти кермо нашої нації і відновити славу, яку колись знали наші предки. Володарі Півночі повстануть знову!"
  IRE_f: "Ірландія"
  IRE_f_desc: "Протягом десятиліть Англія намагалася підкорити ірландське населення та контролювати острів і його мешканців здалеку. Об'єднання ірландських земель під одним прапором і єдиною метою може бути нашим єдиним шансом відбити цих нещадних завойовників!"
  SPA_f: "Іспанія"
  SPA_f_desc: "З часу поразки вестготів [ShowReligionGroupAdjective('muslim')] вторгненням у 8-му столітті Іберія була осідком кількох незалежних королівств. Численні потенційні завойовники з того часу намагалися об'єднати регіон, проголошуючи себе правителями 'Гіспанії', 'Спанії' або — як її тепер називають — 'Іспанії'. Але саме ми нарешті об'єднаємо Півострів раз і назавжди!"
  ADU_f: "Аль-Андалус"
  ADU_f_desc: "Колись вся Іберія перебувала під владою славетних мусульманських правителів Аль-Андалусу, які принесли неперевершену красу та інновації своїм правлінням. Давайте тепер відкинемо ганебну [ShowReligionGroupAdjective('christian')] Реконкісту і повернемо законні землі наших предків."
  EGY_f: "Єгипет"
  EGY_f_desc: "Хоча історія Єгипту є надзвичайно давньою, протягом значних проміжків часу ним правили іноземні загарбники, а не його корінні мешканці. Створення нової єгипетської держави, вільної від зовнішнього втручання, могло б відновити нашу легендарну Імперію, так само, як Ніл розливається та поповнює землю вздовж своїх берегів."
  KOA_f: "Африка"
  KOA_f_desc: "У давні часи нормани створили християнське королівство в Африці, що сполучало обидва береги Середземномор'я. Але та молода нація була знищена, поглинута ворогами Христа. Тепер, коли це в наших силах, нашим обов'язком є повернути цю територію і знову принести їм славу нашого Господа."
  BEJ_f: "Беджа"
  BEJ_f_desc: "Наш народ традиційно був розділений між кількома кланами та родинами, деякі з них були досить могутніми, щоб називати себе королівствами. Проте їхня уявна сила насправді надзвичайно крихка. Лише королівство, яке об'єднає всі клани під одним прапором, може принести справжню силу та процвітання нашому народу!"
  ETH_f: "Ефіопія"
  ETH_f_desc: "Стародавня імперія Ефіопії була духовним наступником Аксумської імперії, легендарної домівки сина царя Соломона та стійким оплотом коптської віри. Падіння тієї Імперії було трагедією для коптських вірян, але дух об'єднаної Ефіопії все ще живе, чекаючи на відродження гідним наступником — як ми!"
  BAV_f: "Баварія"
  BAV_f_desc: "Колись величне Баварське герцогство було оплотом економічної та дипломатичної могутності, з його завидним розташуванням та обдарованим населенням. Але попри своє яскраве минуле, воно нині розрізнене, поділене та слабке. Ми повинні возз'єднати його колишні території та повернути славу минулого, якщо ми бажаємо бути чимось більшим, ніж просто приміткою в історії!"
  HAB_f: "Австрія"
  HAB_f_desc: "З Відня дім Габсбургів колись володів абсолютною владою в [GetInternationalOrganizationType('hre').GetName], і самою суттю тієї влади було Ерцгерцогство Австрійське. Тепер та імперія давно перетворилася на попіл, і настав час нам повернути Ерцгерцогство та осідок Імперської влади!"
  BOH_f: "$BOH$"
  BOH_f_desc: "З того часу, як Золота булла Сицилійська була надана Отокару I у 1212 році, землі [ShowAreaName('bohemia_area')] користувалися високим статусом у Центральній [ShowContinentName('europe')]. З нашим контролем над цією областю ми зможемо відновити давній титул та приєднатися до спадщини старих династій [ShowAreaNameWithNoTooltip('bohemia_area')]."
  SAX_f: "Саксонія"
  SAX_f_desc: "Герцогство Саксонія колись було впливовим племінним герцогством у межах старої імперії. Хоча його основні території з часом змінювалися, титул зберіг свій престиж та славу. Якщо ми бажаємо бути визнаними законними спадкоємцями саксонського титулу, ми повинні переконати Імператора [GetInternationalOrganizationType('hre').GetName] стати курфюрстом, роль, яка буде надана Герцогу Саксонському."
  NSA_f: "Нассау"
  NSA_f_desc: "Хоча Герцогство Нассау не було ні найстабільнішим, ні найвідомішим серед своїх побратимів, наша засновуюча династія пов'язує нас з багатьма коронованими головами [ShowContinentName('europe')], що дає нам міцну позицію для претензій на владу. Щоб наш голос був почутий у Німеччині, ми повинні раз і назавжди об'єднати землі Нассау і підтвердити силу цієї династичної спадщини, запобігаючи подальшому роздробленню нашої законної території."
  MKL_f: "Мекленбург"
  MKL_f_desc: "З об'єднанням мекленбурзьких територій ми можемо створити нове, незалежне Герцогство на півночі Німеччини. Ця нова держава зможе виправити помилки минулого, уникнувши роздроблення наших територій на кілька суверенних країн і створивши противагу суперникам, які прагнуть наших земель."
  POM_f: "Померанія"
  POM_f_desc: "Померанська територія займає життєво важливе положення уздовж балтійського узбережжя. Якщо ми хочемо отримати вигоду з нашого стратегічного положення та скористатися перевагами перебування на жвавому торговому шляху, ми повинні покінчити зі старими поділами та суперечками щодо успадкування, і відновити об'єднане Померанське герцогство."
  PRU_f: "Пруссія"
  PRU_f_desc: "Земля, колись завойована та германізована Тевтонським орденом, завжди потребуватиме захисту від хижих зовнішніх сил. Але якщо Орден не впорається з цим обов'язком, ми можемо зайняти їхнє місце та розпочати нову еру процвітання та прусської дисципліни."
  LVA_f: "Лівонія"
  LVA_f_desc: "Землі Курляндії, Лівонії та Естонії колись були частиною Лівонського ордену, який присягнув навернути свої завойовані території до [ShowReligionGroupName('christian')]. Хоча Орден створив функціонуючу державу, він зробив це на спинах тих самих людей, яких він завоював, які посадили насіння невдоволення поряд зі своїми врожаями. Якщо Орден не зможе підтримувати порядок у суспільстві, його буде досить легко замінити трохи силою та лівонською відвагою."
  GER_f: "Німеччина"
  GER_f_desc: "Попри відсутність сильної центральної влади, наша нація процвітає. Багата Ганзейська ліга, утворена сотнями міст у північній Німеччині, зробила нашу націю неймовірно заможною. Інтелектуальний ріст, у поєднанні з морською та сухопутною торгівлею, також сприяв розвитку та перетворенню нашої країни на багатий центр виробництва та інтелектуальних інновацій."
  HRE_f: "Священна Римська імперія"
  HRE_f_desc: "$hre_desc$"
  HRE_f_tt: "$HRE_f$ може бути утворена лише за допомогою [ShowPolicyName('renovatio_policy')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e] [GetUniqueInternationalOrganization('hre').GetName]"
  LAT_f: "Латинська імперія"
  LAT_f_desc: "Стара $ROM_f$ вижила у $BYZ$ з центром навколо [ShowLocationName('constantinople')], хоча вони дотримувалися [ShowReligionName('orthodox')] замість належної [ShowReligionAdjective('catholic')] віри [ShowLocationName('rome')]. Таким чином, наш священний обов'язок — замінити їх як $BYZ_eastern_rome$, встановивши [ShowRegionAdjectiveWithNoTooltip('catholic')] імператора в [ShowLocationNameWithNoTooltip('constantinople')]."
  SAR_f: "Сардинія"
  SAR_f_desc: "Наш острів давно гірко розділений між нашими юдикатами та іноземними правителями. Ці темні часи повинні закінчитися, і правитель, який об'єднає Сардинію, керуватиме нами всіма, приносячи мир та процвітання нашому народу... і війну та спустошення нашим ворогам. Як вони справедливо заслуговують."
  MSI_f: "Моссі"
  MSI_f_desc: "Ми — народ, глибоко відданий нашим унікальним віруванням і традиціям, гордий нашою політичною проникливістю та військовою силою. Проте, попри нашу глибоко вкорінену культуру, наш народ не зміг об'єднатися в єдину групу, і наслідки цього поділу були жахливими. Лише через єдність наш народ зможе знайти мир і насолоджуватися процвітанням — ми повинні досягти цього!"
  MAZ_f: "Мазовія"
  MAZ_f_desc: "Попри те, що мазов'яни є однією з головних [ShowCultureGroupName('polish_group')] культур, вони культурно та лінгвістично відрізняються від інших [ShowCultureGroupNameWithNoTooltip('polish_group')] груп. З огляду на це, здається доречним для нашого народу вимагати об'єднання всіх мазовецьких земель під єдиним правителем, оскільки лише таким чином ми зможемо повністю продемонструвати світові нашу унікальну силу та славу."
  KRY_f: "Гілян"
  KRY_f_desc: "Розташований на берегах [ShowAreaName('caspian_sea_area')] та в серці [ShowCultureName('gilak_culture')], Гілян століттями існував у тіні [ShowRegionName('persia_region')]. Настав час для нас утвердити свою присутність на світовій арені та вийти як незалежна сила."
  RYU_f: "Рюкю"
  RYU_f_desc: "Населені народом [ShowCultureName('ryukyu_culture')] та володіючи унікальною культурою та ідентичністю, острови [ShowAreaName('ryuukyuu_area')] завжди були роз'єднані через свою власну природу. Однак об'єднання королівств трьох гір створило б націю великого процвітання та культури — таку, яка могла б змінити весь хід історії."
  CHI_f: "Китай"
  CHI_f_desc: "$middle_kingdom_desc$"
  MOL_f: "Молдавія"
  MOL_f_desc: "Занадто довго молдавани жили під владою різних воєначальників, які, своєю чергою, були підданими могутніших правителів. Але тепер настав момент замінити цих огидних посередників і розгромити владу наших гнобителів! Настав час возз'єднати наш народ під прапором Бука та забезпечити світле й незалежне майбутнє нашої нації."
  SIL_f: "Сілезія"
  SIL_f_desc: "Сілезія століттями була розділена на герцогства та керувалася з іноземних столиць. Як коштовності на розірваному намисті, кожна частина прагне бути відновленою до свого цілісного та досконалого стану. Тому настав час для Сілезії відкинути іноземне панування та загасити пожежі внутрішнього розбрату, створивши нову, об'єднану Сілезьку націю."
  POL_f: "Польща"
  POL_f_desc: "Королівство, яке П'ясти так наполегливо працювали, щоб об'єднати, тепер розділене і без лідерства. У нашій історії занадто багато слави, а в нашому майбутньому занадто багато обіцянок, щоб дозволити Польщі залишатися розрізаною на шматки — ми повинні прагнути об'єднати польський народ і створити націю, яка сяятиме ще яскравіше, ніж наші королівства минулого!"
  PLC_f: "Річ Посполита"
  PLC_f_desc: "Об'єднавши корони Литви та Польщі під одним прапором, ми станемо маяком надії та віри у Східній Європі, несучи наше світло в серце навіть найтемніших лісів, що процвітають на наших землях."
  PLC_f_trigger_pol: "Ми повинні або знищити [GetCountry('POL').GetNameWithFlag], або зробити їх нашим [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  PLC_f_trigger_lit: "Ми повинні або знищити [GetCountry('LIT').GetNameWithFlag], або зробити їх нашим [Concept('subject', 'CONCEPT_PLACEHOLDER')|e]!"
  UKR_f: "Русь"
  UKR_f_desc: "Століття тому земля Русі була об'єднана під єдиним прапором і керувалася з легендарного міста [ShowLocationName('kyiv')]. Але монгольські орди насувалися з великого степу, грабуючи та спалюючи все на своєму шляху. Навіть великий [ShowLocationNameWithNoTooltip('kyiv')] не зміг уникнути цієї долі. У жаху наш народ втік на північ, у глибинку, яку ми сьогодні називаємо Росією."
  ROM_f: "Зараз на підйомі нове, зарозуміле північне місто. Його правитель передбачає нову Русь — Русь, зосереджену в [ShowLocationName('moscow')], а не в [ShowLocationNameWithNoTooltip('kyiv')]. Але ми, русини, не дозволимо претендентам вимагати спадщини наших предків! [ShowLocationNameWithNoTooltip('kyiv')] знову повстане, і Русь також!"
  ROM_f_desc: "Римська імперія"
  CTH_f: "З другого століття жодна імперія не володіла всім Середземномор'ям і далі, і тією імперією був могутній Рим. Якщо ми захопимо цю землю, ми зможемо насміхатися над будь-якими претендентами в Константинополі чи Священній Римській імперії, і проголосити себе #italic справжніми#! наступниками Римської імперії. #italic Cives Romani sumus#!!"
  CTH_f_desc: "Карфаген"
  NSE_f: "Мерзенні пси Римської імперії спалили карфагенську батьківщину дотла, намагаючись стерти будь-який спогад про цю давню цивілізацію. Можливо, їхня ідентичність, культура та релігія зникли, але доки існує хоча б один римський претендент, існує і потреба в протистоянні цим шарлатанам. Ми станемо бичем для всіх тих дурнів, які звеличують римлян; ми станемо спадкоємцями Карфагена!"
  NSE_f_desc: "Імперія Північного моря"
  MAY_f: "Землі, що колись належали [GetCharacter('eng_cnut_the_great').GetName], простягалися по обидва боки [ShowAreaName('north_sea_area')], від [ShowRegionName('scandinavian_region')] до [ShowRegionName('great_britain_region')]. Хоча ця територія з часом фрагментувалася та реформувалася в різні володіння, вона завжди чекала, з нетерпінням очікуючи нашого піднесення та повернення. Настав час знову створити цю неймовірну імперію, об'єднавши всі ці землі під нашим прапором."
  MAY_f_desc: "Майя"
  AIA_f: "Протягом століть наш народ був розділений на незалежні міста, які самі були залучені в запекле суперництво одне з одним. Це створило середовище енергії та інновацій, але нам бракує єдності, необхідної для збереження сили перед зовнішнім тиском. Об'єднавши всі поселення майя в єдине царство, наша нація процвітатиме і досягне висот могутності, яких вона цілком заслуговує."
  AIA_f_desc: "Аравія"
  ULS_f: "Піски [ShowRegionName('arabia_region')] є домом і походженням [ShowCultureGroupName('arabian_group')] народу. Хоча вони були розділені на численні племена з самого початку, їхня спільна ідентичність і традиції є незаперечними, перетинаючи величезні піски разом зі своїми народами. [ShowRegionNameWithNoTooltip('arabia_region')] вже була об'єднана одного разу, і вона завоювала майже весь світ. Тепер вона повинна зробити це знову."
  ULS_f_desc: "Ольстер"
  CEL_f: "У серці [ShowLanguageName('gaelic_language')] світу та однієї з традиційних #italic Cúige#!, П'яти Провінцій [ShowRegionName('ireland_region')], $ULS_f$ має унікальну присутність у світі. Але наш народ прагне робити та бути чимось більшим, ніж ми вже є, і таким чином, настав час для $ULS_f$ утвердитися як головний гравець на світовій арені."
  CEL_f_desc: "Кельтика"
  MLC_f: "Народи [ShowCultureGroupName('celtic_group')] мають історію, що охоплює тисячоліття. Хоча протягом століть вони зазнавали вторгнень інших народів і бачили, як їхня територія зменшилася до тіні їхніх предків, вони ніколи повністю не втрачали своїх традиційних вірувань, культури чи способу життя. Якби з'явився сильний лідер і вказав їм шлях, [ShowCultureGroupNameWithNoTooltip('celtic_group')] могли б знову об'єднатися і нарешті зайняти своє законне місце влади у цьому світі."
  MLC_f_desc: "Малакка"
  NED_f: "Розташовані на вирішальному морському торговому шляху, протоки [ShowLocationName('malacca')] завжди контролювали торговельні потоки, а отже, й їхнє багатство. Маючи ідеальне розташування для отримання вигоди від цієї торгівлі та володіючи землями, багатими на ресурси й традиції, народ [ShowCultureName('malay_culture')] завжди процвітав на цих землях. З єдиною ідентичністю вони процвітатимуть ще більше."
  NED_f_desc: "Нідерланди"
  EUR_f: "Голландці стають однією з найздібніших військово-морських і колоніальних держав Європи. Вигідні торговельні можливості, як місцеві, так і заморські, призвели до швидкої еволюції, яка перетворила країну на одну з перших капіталістичних націй в історії. Цю чудову економічну проникливість доповнюють голландські таланти до інновацій та творчості, які перетворюють нашу культуру на світло, що сяє по всьому світу. Тому єдина голландська держава має всі шанси стати однією з найбагатших та найвпливовіших за всі часи."
  EUR_f_desc: "$EUR$"
  RUS_f: "Земля [ShowContinentName('europe')] є домівкою для величезної різноманітності народів. З таким розмаїттям культур, релігій, мов і способів життя, що існують пліч-о-пліч, [ShowContinentNameWithNoTooltip('europe')] бачила свою частку сусідських конфліктів, а також культурного синтезу та співпраці. Ідея такої різноманітної популяції, що працює задля однієї мети, здається вкрай малоймовірною. Проте, якби всі різні групи в [ShowContinentNameWithNoTooltip('europe')] об'єдналися під єдиним прапором та ідентичністю, ми б досягли майже безпрецедентної світової могутності."
  RUS_f_desc: "Росія"
  ITA_f: "Шляхом завоювань і дипломатії Росія зуміла перетворитися з крихітного поселення на домінуючу державу. Після кількох походів на схід монгольські орди нарешті були підкорені, і виникає централізована російська держава під сюзеренітетом Царя. Впливи із Західної Європи допомагають нам модернізувати та реформувати нашу націю, і ми переходимо на більш сучасний стиль освіти. Зважаючи на нашу історію швидкого зростання та наші сучасні політичні й культурні дари, здається цілком природним, що Російська імперія має піднестися і панувати над меншими націями."
  ITA_f_desc: "Італія"
  TWS_f: "Будучи серцем Ренесансу, культура нашої нації розквітає. Ми, здається, щойно увійшли в період тривалих мистецьких інновацій, особливо у сферах архітектури та літератури, і відповідно пожинаємо плоди. Проте ця культурна еволюція не допомагає нам підтримувати мир у наших кордонах, і нашу країну постійно вражають іноземні держави, що прагнуть влади та територіальних здобутків. Можливо, настав час об'єднатися в рішучій демонстрації нашої могутності — хоча б для того, щоб залякати потенційних узурпаторів, показавши єдиний фронт."
  TWS_f_desc: "Обидві Сицилії"
  FRA_f: "Обидві Сицилії... не країна, а мрія. Мрія об'єднати землі, омиті водами Мессінської протоки — Сицилії, що стоять по обидва боки 'Пунта дель Фаро'. Це наш обов'язок — втілити цю мрію в життя."
  FRA_f_desc: "$FRA$"
  LOT_f: "Цей рік ознаменує початок еволюційного періоду для нашої нації. Старі феодальні порядки повинні поступитися місцем більш сучасній, централізованій державі."
  LOT_f_desc: "$LOT$"
  BGP_f: "Як нові претенденти на $LOT_ADJ$ корону, ми підтвердили свою легітимність, звернувшись до спадщини [GetCharacter('fra_charlemagne').GetName] та [GetCharacter('fra_lothair').GetName]. Під нашим покровительством подвиги наших предків знову стали загальновідомими як серед нашого народу, так і при дворах Європи."
  BGP_f_desc: "$BGP$"
  GRE_f: "Колись бургунди прийшли з Борнхольма, оселилися на цих землях і дали їм своє ім'я. Як їхні нащадки, наша честь вимагає від нас відновити цю націю та правити цими землями до кінця часів."
  GRE_f_desc: "Греція"
  BYZ_f: "З найдавніших днів нашої цивілізації, Еллада була розділена, чи то внутрішньо багатьма конкуруючими царствами, чи окупована іноземцями руками наших спільних ворогів. Протягом століть наша могутність зменшувалася, оскільки нас завойовували, роз'єднували, а наші скарби забирали завойовники. Існувати в такому роздробленому стані — це образа нашої великої спадщини мистецтва, спорту та винаходів! Об'єднати грецькі землі під одним прапором та одним правителем — це наш єдиний шлях до величі нашого минулого."
  BYZ_f_desc: "Візантійська імперія"
  CNN_f: "Славетна Візантійська імперія давно зникла, але поки греки живуть у [ShowLocationName('constantinople')], є надія на її воскресіння. Як фенікс, що повертається до життя з купи попелу, так само повинні й залишки Східного Риму. Але перш ніж ми зможемо знову об'єднатися в життєздатну імперію, ми повинні придушити внутрішні розбіжності та забезпечити, щоб ми всі працювали над однією метою. Зрештою, ми можемо зайняти місце Візантійської імперії духом, але ми не можемо взяти її ім'я, поки не доведемо, що гідні його..."
  CNN_f_desc: "Коннахт"
  HEN_f: "Одне з традиційних королівств [ShowRegionName('ireland_region')], $CNN_f$ може похвалитися довгою та славною історією. Отримавши достатній вплив, щоб здобути Верховне Королівство над усім островом, $CNN_f$ має певне право на традиції та лідерство — але чи зможемо ми встояти перед потенційними гнобителями, залежить від нашого об'єднання."
  HEN_f_desc: "Хен Огледд"
  USA_f: "Народи [ShowLanguageName('brythonic_language')] колись були поширені по всьому регіону [ShowRegionName('great_britain_region')]. Хоча спочатку їх витіснили з південних земель як римляни, так і англосакси, вони зуміли зберегти сильну присутність у північних частинах острова до прибуття народів [ShowLanguageName('gaelic_language')]. З часом ми почали втрачати свою рідну мову та культуру... але більше ні! Настав час повернути старе королівство півночі і побачити, як народ [ShowLanguageNameWithNoTooltip('brythonic_language')] об'єднається як законом, так і мовою."
  USA_f_desc: "Сполучені Штати"
  CAN_f: "Ми, народ, виснажені: іноземними правителями, які бачать нас як власність, гнітючою та зловживною податковою політикою, коли ми самі не маємо права голосу в нашому уряді, і жорстокістю наших лоялістських сусідів. Довго ці колонії були піддані жадібності європейських держав, але більше ні! Хвиля свободи в колоніях дала нам можливість утворити горду федерацію незалежних держав, вільних від тиранії. Дайте нам свободу, або дайте нам смерть!"
  CAN_f_desc: "Канада"
  MEX_f: "Земля [ShowRegionName('canada_region')] величезна і грізна, але неймовірно щедра та багата на ресурси. Хоча місцевість може бути надзвичайно суворою, ці землі приховують великі обіцянки — і багатство. Якби ми оголосили себе єдиною $CAN_ADJ$ нацією і заявили про неї як про свою, не було б меж потенційним винагородам, які ми могли б пожинати!"
  MEX_f_desc: "Мексика"
  DEC_f: "Землі [ShowRegionName('mesoamerica_region')] багаті та щедрі, з різноманітним населенням і довгою історією цивілізації. Проте ми роз'єднані між різними групами та ослаблені внутрішніми чварами за владу та ресурси між цими групами. Настав час створити нову ідентичність для всіх нас, таку, що демонструватиме нашу силу, могутність та завидну історію, а також представлятиме єдиний і неприступний фронт решті світу."
  DEC_f_desc: "Декан"
  MHR_f: "Ця земля колись була чужою для наших предків, але ми зробили її своєю. Тут ми побудували нове суспільство, де перські впливи зустрілися з місцевими стародавніми індійськими традиціями. Ми маємо власну мову, власні адміністративні традиції та власні міфи й легенди. Настав час показати світові, що Південь подолав свої розбіжності та об'єднався як єдине ціле."
  MHR_f_desc: "Маратха"
  HIN_f: "Народи [ShowCultureName('marathi_culture')] були роздроблені протягом багатьох років, але залишаються гордими своїми літературними досягненнями та унікальною мовою. Хоча об'єднання, можливо, не є головною метою наших народів, воїни [ShowCultureName('marathi_culture')] по всьому Декану зберуться під нашими прапорами, якщо ми покажемо чітке лідерство та заволодіємо всіма великими фортами Дешу. Об'єднаймо клани і вирушимо, щоб правити Індією раз і назавжди!"
  HIN_f_desc: "$HIN$"
  PUN_f: "Люди з $india$, хоча й дуже різноманітні за культурою, традиціями та віруваннями, всі належать до цієї однієї землі та поділяють її історію. Отже, ми повинні відкинути ці розбіжності та працювати над спільною метою створення сильної $HIN$ держави, представляючи себе як єдиний народ проти будь-кого, хто може нам протистояти."
  PUN_f_desc: "$PUN$"
  RJP_f: "Народ [ShowCultureName('punjabi')] надто добре знайомий з іноземними вторгненнями, витримавши хвилю за хвилею завоювань протягом століть. Але ці вторгнення призвели до величезних проривів у нашій економічній та релігійній практиці, а також до розквіту літературного мистецтва. Але ми повинні об'єднати народ [ShowCultureName('punjabi')], якщо хочемо коли-небудь самостійно протистояти іноземним загарбникам. Разом ми побудуємо сучасну державу з арміями, здатними протистояти будь-кому, хто захоче захопити наші території та знищити нашу віру!"
  RJP_f_desc: "$RJP$"
  GUJ_f: "Землі [ShowAreaName('rajputana_area')] були розбиті та слабкі з часів мусульманського вторгнення. Але це було століття тому, і наш народ почав піднімати голови з-під ярма наших гнобителів, шукаючи місце ближче до зірок, де ми належимо. Ми повинні відвоювати легендарні міста, що їх утримували великі династії, які були до нас, і об'єднати князів [ShowAreaNameWithNoTooltip('rajputana_area')]!"
  GUJ_f_desc: "$GUJ$"
  SHA_f: "[ShowAreaName('gujarat_area')] завжди мала ідентичність, відмінну від решти $india$, а народ [ShowLanguageName('gujarati_language')] пишається своєю стародавньою історією та унікальною ідентичністю. Ми прагнемо власної нації, де ми могли б керуватися цими своєрідними принципами. На щастя для нас, здається, момент для здобуття нашої незалежності швидко наближається…"
  SHA_f_desc: "Шан"
  MSA_f: "Народи [ShowLanguageFamilyName(tai_language_family)] з [ShowAreaName('shan_highland_area')] довгий час були господарями своєї області. Ми вирізали навколишні пагорби у терасові ферми; ми побудували храми, які стоятимуть вічно на свідчення нашим богам. Однак ми також прокляті тим, що опинилися в пастці між більшими, могутнішими націями, часто втягнуті в їхні битви. Але більше ні — хоча колись ми були розділені, ми, шан, тепер стоїмо як єдине ціле проти всіх них!"
  MSA_f_desc: "Малайя"
  SIA_f: "$MLC_f_desc$"
  SIA_f_desc: "Сіам"
  BAN_f: "Народ [ShowCultureName('thai_culture')] живе, розділений горами та річковими долинами, між взаємопов'язаними сферами впливу, і тому завжди тяжів до місцевих центрів влади, а не до централізованої адміністрації."
  BAN_f_desc: "Але об'єднана батьківщина [ShowCultureNameWithNoTooltip('thai_culture')] була б вигіднішою за нашу нинішню розрізненість — така консолідація нашої влади значно полегшила б шлях нашого народу до величі."
  IRA_f: "Бантен"
  IRA_f_desc: "[ShowCultureName('sundanese_culture')] з [ShowLocationName('banten')] можуть похвалитися великим процвітанням завдяки безперешкодному доступу як до сухопутних, так і до морських торговельних шляхів."
  SKO_f: "Будучи дуже вдало розташованим портом, [ShowLocationNameWithNoTooltip('banten')] є ідеальним місцем для розширення влади [ShowCultureNameWithNoTooltip('sundanese_culture')] та поширення нашого впливу."
  SKO_f_desc: "Персія"
  HAU_f: "[ShowRegionName('persia_region')] була осідком могутніх імперій ще з давніх часів Кіра Великого."
  HAU_f_desc: "Без цих [ShowCultureGroupName('iranian_group')] королівств минулого наш сучасний світ був би на десятиліття позаду в плані винаходів, науки та мистецтв."
  KON_f: ""
  KON_f_desc: "Тепер ми живемо в пилу тієї величі, мріючи про об'єднану [ShowCultureGroupNameWithNoTooltip('iranian_group')] державу, але, можливо, недовго — можливість відродженої [ShowCultureGroupNameWithNoTooltip('iranian_group')] нації вже не здається такою нездійсненною. Настав час нам відновити нашу славетну спадщину та возвеличити одного з нас титулом $rank_kingdom_persian_ruler_male$."
  NTR_f: "Сокото"
  NTR_f_desc: "Присутність [ShowReligionGroupName('muslim')] у регіоні Західної [ShowContinentName('africa')] завжди є нестабільною."
  TIM_f: "З такою кількістю різних народів, представлених у нашому населенні, ми ризикуємо спалахом релігійного конфлікту в будь-який момент, як всередині, так і ззовні наших кордонів. Під керівництвом нашого [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] ми повинні створити ортодоксальну ісламську державу, щоб забезпечити виживання [ShowReligionName('sunni')] народу в цьому регіоні."
  TIM_f_desc: "Хауса"
  INC_f: "Після десятиліть чвар і воєн, що роздирали нашу землю, старі суперництва нарешті були придушені, і настав мир. Вперше за живу пам'ять сини Баво знову об'єднані під одним стягом. Настав час для Хауса знову повстати як єдине ціле!"
  INC_f_desc: "Конго"
  BNG_f: "Народ [ShowLanguageName('kongo_language')] є гілкою [ShowLanguageFamilyName('bantu_language_family')]. Хоча серед нашого народу існує велика різноманітність, ми також маємо багато спільного у наших повсякденних духовних та культурних практиках. Якщо ми об'єднаємося на основі цих спільних рис і погодимося бути єдиною нацією, а не сукупністю окремих поселень, то [ShowLanguageNameWithNoTooltip('kongo_language')]-мовні народи зможуть досягти більшого, ніж будь-коли раніше."
  BNG_f_desc: "Об'єднані Племена"
  DLH_f: "Народ [ShowCultureName('maori_culture')] з [ShowRegionName('new_zealand_region')] завжди ділився на окремі племена, глибоко пов'язані родинними зв'язками та шлюбами. З одного боку, наша роз'єднаність та індивідуалізм створили культурну стійкість, яка дає простір для процвітання наших традиційних звичаїв. З іншого боку, ми могли б легше відбивати спроби загарбників, якби об'єдналися під одним прапором і представили наш народ як цілісну силу. Можливо, це шлях нашого майбутнього?"
  DLH_f_desc: "Тимуриди"
  MCH_f: "Численні битви, які вели наші предки, можливо, напоїли землю кров'ю, але ця кровопролиття, своєю чергою, живило ґрунт, і з цієї скрути народилася раса воїнів, архітекторів, художників і вчених. Настав час поділитися нашими численними дарами зі світом, виступивши як велика нація. Ми наслідуватимемо спадщину [GetCharacter('chg_timur_lame_borjigin').GetName] і поведемо наш народ до величі!"
  MCH_f_desc: "Тавантінсую"
  SER_f: "Альтіплано розділене між багатьма націями, кожна з яких населяє долини та поклоняється різним богам. Ми — народ, який говорить багатьма мовами та має різноманітні погляди, але разом ми представляємо культурну та духовну силу, якій мало яка інша нація могла б протистояти. Ми об'єднаємо всі наші розрізнені території, щоб слідувати за одним сильним лідером. Сонце проллє своє світло на об'єднане царство!"
  SER_f_desc: "$BNG$"
  AIR_f: "Народ з [ShowAreaName('bengal_area')] має дуже виразну ідентичність, викувану на берегах могутньої річки Ганг. Тисячоліття переплетення культур і традицій призвели до розвитку особливо багатої та унікальної [ShowCultureName('bengali')] культури, якій має заздрити світ. Народ [ShowCultureNameWithNoTooltip('bengali')] пишається своєю історією та спільними традиціями — об'єднавшись, ми стали б маяком для решти $india$."
  AIR_f_desc: "$DLH$"
  NAV_f: "Делі колись був столицею всього Індійського субконтиненту, і наша власна сучасна держава багато в чому є продовженням їхніх традицій."
  NAV_f_desc: "Час нашого відродження нарешті настав. Відновімо спадщину делійських султанів і правімо субконтинентом з їхньої стародавньої столиці в Доабі!"
  KOJ_f: "$MCH$"
  KOJ_f_desc: "Народ [ShowRegionName('manchuria_region')] має довгу історію як кочового племінного життя, так і частих взаємодій з [GetInternationalOrganizationType('middle_kingdom').GetName]. Таким чином, ми поєднали аспекти багатьох культур і місць, щоб створити свій власний, відмінний спосіб життя. Хоча ми зазвичай розділені на численні племена, об'єднана [ShowRegionNameWithNoTooltip('manchuria_region')] може претендувати на гегемонію над усім $china$. Чи слід нам просуватися вперед з об'єднанням?"
  YMT_f: "$SER$"
  YMT_f_desc: "Земля Сербів була розділена та під владою іноземних держав надто довго, це образа нашій національній гордості. Наш народ прагне, щоб ним правив той, хто народився серед них. Шлях до об'єднання важкий, але ми не повинні зупинятися, доки кожне місто та поселення від Дунаю до південних гір знову не належатиме Сербії."
  MUG_f: "$AIR$"
  MUG_f_desc: "Гори [ShowAreaName('air_area')] століттями служили притулком для [ShowCultureName('tuareg')] народів, зеленим островом серед піщаних дюн пустелі. Ця територія багата на ресурси та добре укріплена, що робить її ідеальною фортецею для командування нашою новою нацією. Коли наш народ нарешті об'єднається, ці гори стануть першим кроком у нашому прагненні до експансії."
  NPL_f: "$NAV$"
  NPL_f_desc: "Спочатку марка Каролінзької імперії, легендарне [ShowReligionGroupAdjective('christian')] королівство, засноване полководцем Іньїго Арістою, було втрачено надто давно. Ці землі мають бути возз'єднані, а [ShowCultureName('basque')] народи — об'єднані під ланцюговим прапором Наварри!"
  TIB_f: "$KOJ$"
  TIB_f_desc: "Єрусалим — це земля обітована, священне місто, яке люди багатьох віросповідань вважають місцем народження своїх вірувань. Отже, над цією святою землею буде проголошено Царство Небесне. Нехай усі, хто поклоняється, будуть вражені нашою пишнотою!"
  SHL_f: "$YMT$"
  SHL_f_desc: "[ShowDynastyName('yamato_dynasty')] є стародавньою і стверджує, що походить від самих богів. Саме їхнє існування надає їм право на божественне керівництво всією [ShowRegionName('japan_region')]. І хто був би настільки зарозумілим, щоб протистояти потомству богів та їхньому законному правлінню?"
  RUM_f: "$MUG$"
  RUM_f_desc: "Наш правитель почав закладати основи нової імперії. Хоча наші війська поступаються чисельністю, наші добре дисципліновані загони здобули кілька вирішальних перемог над султанами $india$. Ці битви за $india$ є лише першими великими перемогами в тому, що, безсумнівно, буде серією успішних територіальних розширень. З часом імперія Моголів розтягнеться не лише на цей регіон, але й на весь світ."
  MGE_f: "$NPL$"
  MGE_f_desc: "Попри свою горду й давню історію, гімалайські королівства залишаються роздробленими та слабкими. Об'єднавши весь регіон під одним правителем, ми могли б стати нестримною силою, здатною кинути виклик м'яким, розкішним правителям $HIN$. Задоволені життям на своєму багатстві, вони розтринькували свої статки поколіннями і не зможуть зрівнятися з нашими загартованими арміями."
  ILK_f: "$TIB$"
  ILK_f_desc: "Тибетське плато колись було об'єднане під розлогою імперією, яка суперничала з іншими великими державами свого часу за витонченістю та багатством. Проте протягом століть ця імперія розпалася, безповоротно пошкоджена релігійними та політичними чварами. Але, знову об'єднавши [ShowCultureGroupName('tibetan_group')] народи, ми можемо відродити нашу марнотратну спадщину та відновити наше втрачене королівство."
  GEO_f: "$SHL$"
  GEO_f_desc: "Після багатьох років перебування під контролем тієї чи іншої шляхетної родини, ми нарешті утвердилися як верховні правителі [ShowAreaName('holstein_area')]. Це наше право — перетворити наші територіальні володіння на одну країну, і тому ми це зробимо."
  ARM_f: "$RUM$"
  ARM_f_desc: "На піку своєї могутності Султанат Руму був головною силою в [ShowRegionName('anatolia_region')]. На жаль, він був роздроблений постійними жорстокими вторгненнями та запеклими суперечками про спадщину, і занурився в невідомість. Але ми маємо волю та силу, щоб перекувати розбиті частини [ShowRegionNameWithNoTooltip('anatolia_region')] під одним правлінням і відновити наш давно забутий Султанат!"
  SWI_f: "$MGE$"
  SWI_f_desc: "Імперія $genghis_khan_name$, колись наймогутніша у світі, майже повністю зникла. Тепер ми — роздроблений народ, розсіяний і роз'єднаний. Але ми все ще монголи, і ми ніколи не втрачали надії повернути те, що втратили. Ми повинні відновити нашу спадщину, повторивши завоювання Великого $rank_kingdom_horde_ruler_suffix_male$. Монгольська імперія знову повстане, щоб завойовувати!"
  SWI_f_tt: "$ILK$"
  AYU_f: "Нашій імперії колись належав увесь світ, безмежний і жвавий. Тепер вона — лише розповідь, історична примітка. Це неприпустимо — ми спадкоємці [GetCharacter('hulegu_khan_borjigin').GetName], і ми заслуговуємо більшого! Ми відродимо нашу колись славетну імперію, об'єднаємо наш народ і повернемо те, що колись було нашим. А потім і більше..."
  AYU_f_desc: "$GEO$"
  ALB_f: "Сам ландшафт [ShowAreaName('georgia')] та руйнівні іноземні вторгнення неодноразово випробовували стійкість нашого народу, але ми тріумфували, довівши, що ми такі ж міцні, як гори та височини, що нас захищають. З мужністю та рішучістю ми побачимо, як $GEO$ знову підніметься та процвітатиме під нашим керівництвом."
  ALB_f_desc: "$ARM$"
  BAH_f: "Народ [ShowCultureName('armenian_culture')] — стародавня цивілізація, історія якої починається ще до часів римлян. Ми пережили злети та падіння імперій-завойовників, не втративши ані рідної мови, ані віри. Тепер ми об'єднаємо розрізнених спадкоємців Гайка під одним прапором та однією $ARM_ADJ$ ідентичністю!"
  BAH_f_desc: "$SWI$"
  GLD_f: "[GetUniqueInternationalOrganization('swiss_confederation').GetName] починалася як звичайний союз між різними кантонами. Кожна частина розвивалася окремо, розмовляючи різними мовами і навіть маючи різні закони. Щоб справді об'єднати [ShowCultureGroupName('swiss_group')], суверенна влада повинна встановити домінування на Швейцарському плато. Хоча об'єднати так багато різних людей буде нелегко, ми багато виграємо, якщо досягнемо успіху."
  GLD_f_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetName] існує"
  DAH_f: "[Concept('international_organization', 'CONCEPT_PLACEHOLDER')|e] може прийняти [ShowLawName('sc_unification')] замість цього, щоб сформувати цю країну"
  DAH_desc: "$AYU$"
  IRO_f: "Великий торговий центр з широкими закордонними зв'язками та великим населенням, місто $ayutthaya$ слугуватиме новим джерелом сили для [ShowCultureName('thai_culture')], з якого ми зможемо прокласти шлях до більшої слави. Як єдиний народ, ми гордо протистоятимемо кожному, хто прагне порушити наші кордони."
  IRO_f_desc: "$ALB$"
  PUE_f: "Традиційно земля різноманітних вірувань та розрізнених кланів, ми нарешті об'єднали $ALB_ADJ$ народ під єдиним прапором та метою. Тепер, коли ми вигнали небажаних чужинців і створили зароджувану державу, $ALB$ постане як героїчна рідна країна всіх $ALB_ADJ$ людей."
  PUE_f_desc: "$BAH$"
  RMN_f: "Понад століття ми були домінуючою [ShowReligionGroupName('muslim')] силою на півдні та контролювали величезні території по всьому [ShowRegionName('deccan_region')], але ті чудові стародавні міста давно лежали в руїнах. Хоча внутрішні чвари та нестримні амбіції провінційних губернаторів врешті-решт розділили наше царство на п'ять султанатів-спадкоємців, настав час відновити славу $BAH_ADJ$ народу та об'єднати [ShowRegionNameWithNoTooltip('deccan_region')] під єдиним, могутнім правлінням."
  RMN_f_desc: "$GLD$"
  SWA_f: "Ми здобули величезні території в Польщі. Замість того, щоб встановлювати пряме правління над цим різноманітним регіоном, ми заснуємо $GLD$ як коронну землю, що дозволить нам керувати через традиційні титули, зберігаючи імперський контроль."
  SWA_f_desc: "$DAH$"
  WES_f: "Ми консолідували наші території і тепер зможемо створити нову країну, щоб протистояти іноземним впливам."
  WES_f_desc: "$IRO$"
  BEL_f: "Племена [ShowCultureGroupName('haudenosaunee_group')] давно співіснували у формальній конфедерації, хоча кожна нація в межах племені зберігала свою автономію. Але часи змінилися, і ми прийняли стратегічне рішення зробити наші поточні зв'язки ще міцнішими. З п'ятьма націями, які тепер очолює центральне плем'я, ми можемо просуватися вперед як новостворена та зміцнена конфедерація."
  BEL_f_desc: "$PUE$"
  FKN_f: "Нащадки стародавніх пуеблоанців, племена [ShowAreaName('shiewhibak_area')] зберегли аспекти своїх предків, незважаючи на розбіжності у культурах. Хоча ми бажаємо об'єднати ці роздроблені племена, це означає, що ми повинні враховувати нові культурні розробки, що виникли в окремих пуебло. Але ці особливості зроблять наш союз сильнішим та унікальнішим, якщо ми зможемо знайти гармонію."
  FKN_f_desc: "$RMN$"
  HAN_f: "Останні залишки $ROM_f$ зникли, і хоча багато претендентів заявляють про імператорську корону, лише ми є її справжніми нащадками. Коли землі наших предків нарешті будуть об'єднані під одним прапором, лише тоді ми будемо винагороджені процвітанням, яке є нашим правом від народження. Ми діти Риму — народ $RMN$!"
  HAN_f_desc: "$SWA$"
  TUS_f: "Після занепаду центральної влади в [ShowAreaName('swabia_area')] жоден правитель не зміг відновити колишню силу $SWA$, і землі повільно потрапили до рук іноземних держав. Тепер, коли значні частини [ShowAreaName('swabia_area')] знову під нашим контролем, ми нарешті можемо врятувати нашу спадщину з попелу історії та створити нову державу."
  TUS_f_desc: "$WES$"
  BUL_f: "Наш народ колись був у неволі жорстокого релігійного гноблення, але ми побачили новий шлях — кращий шлях — шлях, який дозволить нам нарешті стати повноцінною нацією. Коли ці релігійні впливи повільно зникнуть у минулому, ми створимо нову державу для [ShowAreaName('westphalia_area')] і проголосимо настання нової ери для нашого народу."
  BUL_f_desc: "$BEL$"
  DAL_f: "Південні землі Низьких Країн є домом для народу, розділеного за мовними та релігійними ознаками. Але якби ми зібрали ці ворогуючі групи разом і змусили їх працювати над метою самоврядування, можливо, це б згладило відмінності між нами. З цією метою ми бажаємо проголосити себе новою та незалежною державою."
  DAL_f_desc: "$FKN$"
  HUN_f: "Колись осередок могутнього племінного герцогства, [ShowAreaName('franconia_area')] занепала протягом століть, і пов'язаний з нею титул Герцога [ShowAreaNameWithNoTooltip('franconia_area')] став номінальним і неактуальним. Але якби ми відновили нашу владу та змогли закріпити контроль над старим герцогством, ми б нарешті змогли відродити $FKN$ та відновити його затьмарену колишню пишність."
  HUN_f_desc: "$HAN$"
  KRS_f: "З більшістю [ShowAreaName('lower_saxony')] під нашим контролем, і [ShowLocationName('hanover')] убезпеченим, ми зможемо проголосити себе новою країною, маяком сили, щоб вести наш народ у майбутнє! З рішучістю та хитрістю ми утвердимо себе як вирішальну силу в [ShowRegionName('north_german_region')]."
  KRS_f_desc: "$TUS$"
  SOI_f: "Стародавня Марка Тоскани існувала століттями, але після смерті їхньої правительки Матильди Каноської у 1115 році вона врешті-решт зникла. Її колишня територія була роздроблена та захоплена різними зростаючими міськими комунами, і пам'ять про об'єднану [ShowAreaName('tuscany_region')] зникла в темряві. Але обставини змінилися, і, можливо, настав час знову об'єднати наші розрізнені землі та людей під одним правлінням."
  SOI_f_desc: "$BUL$"
  CRO_f: "Королівство Болгарія століттями боролося за своє виживання, постійно переслідуване нападами своїх заздрісних сусідів. Воно падало один раз, було відроджене, а потім знову розпалося. Але з нашою твердою рукою, яка керуватиме ними, народ $BUL$ нарешті знову підніметься як одна нація, і цього разу досягне статусу великої світової імперії!"
  CRO_f_desc: "$DAL$"
  TRA_f: "Далмація традиційно була регіоном, де домінували іноземці, оскільки її узбережжя, острови та бухти є надзвичайно важливими для домінування на надзвичайно прибуткових торговельних шляхах [ShowProvinceDefinitionName('adriatic_sea_province')]. Але чому іноземці повинні отримувати вигоду з Далмації, коли її власний народ заслуговує на її багатства набагато більше? Настав час скинути іноземний контроль над регіоном і створити незалежну $DAL$!"
  TRA_f_desc: "$HUN$"
  MAL_f: "Старе Угорське королівство колись було найвищою силою в [ShowRegionName('carpathia_region')], контролюючи регіон століттями. Але навіть найміцніші стіни не можуть стояти вічно, і стара держава врешті-решт розпалася завдяки вторгненням і розширенням наших суперників. Проте ми наблизилися до вершини величі, і час відродити полеглу $HUN$ нарешті настав. Піднімімося до великих імперських висот, яких ми заслуговуємо досягти!"
  MAL_f_desc: "$KRS$"
  NUB_f: "[ShowCultureName('kurdish_culture')] народ завжди жив автономними племенами, без центральної об'єднуючої фігури, яка б їх очолювала. Але якби ми створили [ShowCultureNameWithNoTooltip('kurdish_culture')] націю і об'єднали наші розрізнені групи в одну, ми могли б легко стати авторитетною силою в регіоні."
  NUB_f_desc: "$SOI$"
  FIN_f: "Від трав'янистих степів [ShowContinentName('africa')] до пісків [ShowRegionName('arabia_region')] і навіть до узбережжя $india$, [ShowCultureName('somali_culture')] народ мандрував між багатьма різними світами і засвоював багато уроків, які ці місця могли нам дати. Але якби ми об'єднали наш народ в єдине ціле, використовуючи знання, отримані з такої космополітичної історії, об'єднана країна для всього [ShowRegionName('somalia_region')] була б могутньою."
  FIN_f_desc: "$CRO$"
  ICE_f: "Земля [ShowAreaName('croatia_area')] століттями була точкою зустрічі європейського Заходу та Сходу, між водами Середземного моря та багатьма країнами внутрішніх районів. Перетинана багатьма народами та культурами, вона зможе процвітати під [ShowCultureName('croatian')] ідентичністю."
  ICE_f_desc: "$TRA$"
  KAZ_f: "«Землі за Лісом» багаті на мінеральні ресурси та родючі сільськогосподарські угіддя, і населені народами різного походження — влахами, мадярами та німцями — усі вони пишаються цими землями, які вони населяють. З нашої столиці ми будемо правити цією різноманітною групою новоспечених $TRA_ADJ$ людей і принесемо їм усім процвітання."
  KAZ_f_desc: "$MAL$"
  MIR_f: "Землі [ShowCultureName('mandinka')] мають горду історію багатства, культурного впливу та побожності, прикладом чого є наш прабатько [GetCharacter('mal_musa_keita').GetName]. Хоча цей розкішний блиск був загублений у часі, якби ми знову об'єдналися, ми могли б відновити комерційні мережі та політичну єдність, які колись зробили [ShowCultureNameWithNoTooltip('mandinka')] майстрами торгівлі, і піднести наш народ до небачених раніше щаблів влади."
  MIR_f_desc: "$NUB$"
  MOR_f: "Наша нація стародавня, але вона не вистояла. Розділені між конкуруючими правителями, ми один за одним ставали здобиччю сильніших ворогів. Землі перед Нілськими порогами повинні бути об'єднані під єдиною владою, здатною протистояти цим ворогам і перемагати їх у битві, якщо ми коли-небудь знову повстанемо як повноцінна сила у цьому світі."
  MOR_f_desc: "$FIN$"
  NUS_f: "Протягом століть [ShowCultureName('finnish')] народом правили іноземні держави, а їхні землі контролювалися іноземними руками. Але ми ніколи не втрачали наших відмінних фінських звичаїв, ані нашого бажання підкорити тих, хто нас за них гнобитиме, і наш момент відірватися нарешті настав. Настав час для народження держави $FIN$ і зайняти своє місце серед пантеону націй!"
  NUS_f_desc: "$ICE$"
  SLO_f: "Обставини призвели до того, що наші володіння в [ShowAreaName('iceland_area')] перетворилися на найважливішу частину нашої країни. Давайте приймемо цю нову ідентичність і заснуємо націю $ICE$. Ми зміцнимо наші місцеві інституції, міцно закріпивши наше право панувати над островом і нарешті об'єднавши наш народ."
  SLO_f_desc: "$KAZ$"
  BNO_f: "На всій вітряній просторі степів, [ShowCultureName('kazakh')] народ вільно мандрує без об'єднуючого правителя, що робить нас вразливими до зовнішніх нападів. Але якби ми нарешті зібралися разом під командуванням єдиного лідера і розділили ідентичність як нація, ми могли б змінити хід подій. Таким чином, ми об'єднаємося під одним прапором, щоб правити морями трави як могутній $KAZ$."
  BNO_f_desc: "$MIR$"
  CIR_f: "Наш острів має багато впливів, це злиття культур, яке створило унікальні синкретичні вірування та способи життя. Хоча це поєднання відмінностей є частиною того, що робить нас великими, ми повинні пропагувати ідею нашої єдності, незважаючи на ці відмінності. Об'єднана малагасійська держава під нашим керівництвом дозволить нашому острову процвітати та забезпечить стабільність — і збільшену владу — для нашого народу."
  CIR_f_desc: "$MOR$"
  AZT_f: "Історія нашої нації — це історія піднесення та занепаду, великих династій, що руйнувалися лише для того, щоб відродитися. Проте серед приливів і відливів цього династичного хаосу наша культура сяє як дорогоцінний камінь. Ми — народ мистецтва, навчання, науки та прогресу, світло у цьому регіоні. Наша нація повинна досягти тривалої стабільності та стати могутньою через єдність, забезпечуючи процвітання нашого народу та вселяючи страх у серця наших ворогів."
  AZT_f_desc: "$NUS$"