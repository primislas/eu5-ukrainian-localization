l_english:
  colonial_nation: "Колоніальна нація"
  colonial_nation_desc: "$colonial_nation$ — це [Concept('subject', 'CONCEPT_PLACEHOLDER')|e], створений для адміністрування [Concept('overseas', 'CONCEPT_PLACEHOLDER')|e] [Concept('colonies', 'CONCEPT_PLACEHOLDER')|e] від імені свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]. Вона отримує вигоду від збільшеного [ShowModifierTypeName('global_population_capacity_modifier')] та можливості використовувати [ShowPopTypeName('slaves')] для роботи в [Concept('rgo', 'CONCEPT_PLACEHOLDER')|e], надаючи своєму [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] сплеск [Concept('merchant_power', 'CONCEPT_PLACEHOLDER')|e], а також виплати у [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] та [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e] на додаток до [Concept('gold', 'CONCEPT_PLACEHOLDER')|e]."
  dominion: "Домініон"
  dominion_desc: "$dominion$ — це самоврядний [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] з відносною автономією, виключно для [ShowGovernmentTypeName('monarchy')] тієї ж [Concept('religion_group', 'CONCEPT_PLACEHOLDER')|e], що й [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]. Крім того, щоб мати можливість створити $dominion$, обидві країни повинні бути в [Concept('union', 'CONCEPT_PLACEHOLDER')|e] або володар повинен бути або $ENG$, або $GBR$. $dominion$ отримує збільшену [ShowModifierTypeName('country_cabinet_efficiency')], що є більшим збільшенням порівняно зі звичайним [ShowSubjectTypeName('vassal')]."
  fiefdom: "Феод"
  fiefdom_desc: "$fiefdom$ — це молодший титул, який є власністю [Concept('ruler', 'CONCEPT_PLACEHOLDER')|e] свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]. Ексклюзивний для [ShowGovernmentTypeName('monarchy')] тієї ж [Concept('religion_group', 'CONCEPT_PLACEHOLDER')|e], що й сюзерен, він отримує збільшену [ShowModifierTypeName('country_cabinet_efficiency')], але безпосередньо управляється [Concept('monarch', 'CONCEPT_PLACEHOLDER')|e] сюзерена."
  march: "Марка"
  march_desc: "$march$ — це [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] країна, зосереджена на захисті володінь свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], діючи як бар'єр між ними та зовнішніми загрозами. Марки користуються більшою [ShowModifierTypeName('discipline')] та [ShowModifierTypeName('global_defensive')], а також зменшеними [ShowModifierTypeName('fort_maintenance_cost')], а також зменшеними платіжними зобов'язаннями перед своїм сюзереном порівняно зі звичайним [ShowSubjectTypeName('vassal')]."
  hanseatic_member: "Член Ганзи"
  hanseatic_member_desc: "Ганзейська ліга — це конфедерація торгових міст з оборонною та комерційною спрямованістю, очолювана $HSA$. Як член Ганзейської ліги, ця [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] країна отримує збільшену [ShowModifierTypeName('trade_efficiency')] та [ShowModifierTypeName('loyalty_to_overlord')], а також зменшену [ShowModifierTypeName('merchant_maintenance_cost')]. [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], яким може бути лише $HSA$, отримує збільшену [ShowModifierTypeName('global_merchant_capacity_modifier')], а також виплати у формі [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] та [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e], але менше [Concept('gold', 'CONCEPT_PLACEHOLDER')|e] порівняно зі звичайним [ShowSubjectTypeName('vassal')]."
  state_bank: "Державний Банк"
  state_bank_desc: "Цей [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] представляє міцний зв'язок між підданим як компанією та її [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], яким може бути лише країна з [ShowGovernmentReformName('banking_country')] [Concept('government_reform', 'CONCEPT_PLACEHOLDER')|e]. Вони отримують збільшену [ShowModifierTypeName('diplomatic_reputation')], тоді як сюзерен отримує зменшені [ShowModifierTypeName('bank_interest')] та можливість викачати половину скарбниці $state_bank$ за допомогою [ShowCountryInteractionName('siphon_income')] [Concept('country_interaction', 'CONCEPT_PLACEHOLDER')|e] замість звичайної суми."
  secessionists: "Сепаратисти"
  secessionists_desc: "Цей [Concept('subject', 'CONCEPT_PLACEHOLDER')|e] має багато схожостей зі своїм [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] у більшості аспектів свого адміністрування та прагне політично об'єднатися з ним. Таким чином, їх можна [Concept('annexed', 'CONCEPT_PLACEHOLDER')|e] з відносною легкістю. Вони отримують збільшену [ShowModifierTypeName('loyalty_to_overlord')] та збільшену [ShowModifierTypeName('annexation_speed')]."
  trade_company: "Торгова компанія"
  trade_company_desc: "$trade_company$ — це інвестиційний конгломерат, спрямований на отримання грошових вигод для себе та свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]. Вони завжди є [ShowGovernmentTypeName('republic')] і отримують збільшену [ShowModifierTypeName('trade_efficiency')], а також збільшені платіжні зобов'язання перед своїм сюзереном порівняно зі звичайним [ShowSubjectTypeName('vassal')]."
  vassal: "Васал"
  vassal_desc: "Найбільш типовий вид [Concept('subject', 'CONCEPT_PLACEHOLDER')|e], $vassal$ наглядає за своєю територією від імені свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], сплачує васальні збори та приєднується до військових кампаній свого сюзерена. Він отримує більшу [ShowModifierTypeName('country_cabinet_efficiency')], тоді як сюзерен отримує збільшену [ShowModifierTypeName('monthly_prestige')], і обидві країни отримують швидше поширення [Concept('institutions', 'CONCEPT_PLACEHOLDER')|e]."
  conquistador: "Конкістадор"
  conquistador_desc: "Конкістадори — це очільники приватної армії, які підписали контракти зі своїми [Concept('rulers', 'CONCEPT_PLACEHOLDER')|e] про дослідження та завоювання певних територій в обмін на титул губернатора та частку нових земель і здобичі. Це унікальні [Concept('subject_types', 'CONCEPT_PLACEHOLDER')|e], які можна створити лише за допомогою [ShowGenericActionName('create_conquistador')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e]. Вони завжди [Concept('army_based', 'CONCEPT_PLACEHOLDER')|e] і отримують збільшену [ShowModifierTypeName('military_tactics')], [ShowModifierTypeName('global_max_control')] та [ShowModifierTypeName('wrong_culture_levy_size')]."
  appanage: "Апанаж"
  appanage_desc: "Апанажі — це тип [Concept('subject', 'CONCEPT_PLACEHOLDER')|e], що представляє землі, якими керує молодша гілка правлячої династії. $appanage$ отримуватиме збільшену [ShowModifierTypeName('monthly_prestige')], [ShowModifierTypeName('country_cabinet_efficiency')], [ShowModifierTypeName('global_max_control')] та [ShowModifierTypeName('global_manpower_modifier')], тоді як [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] отримуватиме збільшену [ShowModifierTypeName('monthly_legitimacy')] ціною більшої [ShowModifierTypeName('stability_decay')] та меншої [ShowModifierTypeName('global_crown_estate_power')]."
  samanta: "Саманта"
  samanta_desc: "$samanta$ — це [Concept('subject', 'CONCEPT_PLACEHOLDER')|e], характерний для країн з [ShowAdvanceName('samanta_advance')] [Concept('advance', 'CONCEPT_PLACEHOLDER')|e], унікальний для країн [ShowCultureGroupName('indian_group')]. Вони багато в чому відображають звичайного [ShowSubjectTypeName('vassal')], але мають менше платіжних зобов'язань і не можуть бути [Concept('annexed', 'CONCEPT_PLACEHOLDER')|e], доки їхній зв'язок зі своїм [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] не стане більш інтимним, перетворюючи їх на [ShowSubjectTypeName('maha_samanta')] за допомогою [ShowCountryInteractionName('upgrade_to_maha_samanta')] [Concept('country_interaction', 'CONCEPT_PLACEHOLDER')|e]."
  maha_samanta: "Маха-Саманта"
  maha_samanta_desc: "Наступний крок [ShowSubjectTypeName('samanta')], $maha_samanta$ сплачує більшу данину своєму [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] і може бути [Concept('annexed', 'CONCEPT_PLACEHOLDER')|e] своїм [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] з більшою швидкістю, ніж звичайний [ShowSubjectTypeName('vassal')]. [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] також може вирішити надати $maha_samanta$ більш довірчу та автономну роль, перетворивши її на [ShowSubjectTypeName('pradhana_maha_samanta')] за допомогою [ShowCountryInteractionName('upgrade_to_pradhana_maha_samanta')] [Concept('country_interaction', 'CONCEPT_PLACEHOLDER')|e]."
  pradhana_maha_samanta: "Прадана-Маха-Саманта"
  pradhana_maha_samanta_desc: "Возвеличення [ShowSubjectTypeName('maha_samanta')] та найвірнішого з [Concept('subjects', 'CONCEPT_PLACEHOLDER')|e]. $pradhana_maha_samanta$ не може бути [Concept('annexed', 'CONCEPT_PLACEHOLDER')|e], але отримує більшу [ShowModifierTypeName('country_cabinet_efficiency')], [ShowModifierTypeName('discipline')], [ShowModifierTypeName('global_defensive')] та зменшену [ShowModifierTypeName('fort_maintenance_cost')]. Вони також сплачують більші платежі у [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] та [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e] своєму [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]."
  tusi: "Тусі"
  tusi_desc: "Особливий тип адміністрації [GetInternationalOrganizationType('middle_kingdom').GetName], це спадкові губернатори племінних земель від імені імперського престолу. Їх не можна анексувати, але вони отримують збільшену [ShowModifierTypeName('monthly_towards_sinicized')] і змушені використовувати [Concept('court_language', 'CONCEPT_PLACEHOLDER')|e] свого [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], коштуючи при цьому менше [Concept('diplomatic_capacity', 'CONCEPT_PLACEHOLDER')|e]."
  uc_bey: "Уч-бей"
  uc_bey_desc: "$uc_bey$ — це [Concept('army_based', 'CONCEPT_PLACEHOLDER')|e], що служить прикордонним лордом під сильним лідерством $turkic_group$. Завданням цих напівавтономних лідерів є захист кордонів, проведення рейдів та розширення територій, вони командують вірними воїнами Ґузат, що рухаються релігійною ревністю, грабунками та земельними наділами, що робить їх ключовими для стабільності та розширення кордонів. Їх можна створити лише за допомогою [ShowGenericActionName('create_uc_bey')] [Concept('action', 'CONCEPT_PLACEHOLDER')|e], і вони отримують [ShowGovernmentReformName('uc_bey_reform')] [Concept('reform', 'CONCEPT_PLACEHOLDER')|e] та [ShowModifierTypeName('always_allow_levies')], при цьому маючи значно зменшені платіжні зобов'язання порівняно зі звичайним [ShowSubjectTypeName('vassal')], але коштуючи збільшену [Concept('diplomatic_capacity', 'CONCEPT_PLACEHOLDER')|e] та даючи своєму сюзерену більше [ShowModifierTypeName('monthly_towards_decentralization')]."
  imperial_free_city: "Імперське Вільне Місто"
  imperial_free_city_desc: "$imperial_free_city$ — це особливий суб'єкт, пов'язаний з [Concept('hre_emperor', 'CONCEPT_PLACEHOLDER')|e]. Цей статус активний доти, доки суб'єкт має статус [ShowSpecialStatusName('free_city')] [GetUniqueInternationalOrganization('hre').GetName]. Їх ніколи не можна анексувати, вони не дають жодних переваг своєму [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] і не приєднуються до нього у війнах, але вони не коштують [Concept('diplomatic_capacity', 'CONCEPT_PLACEHOLDER')|e] і можуть бути перетворені на [ShowSubjectTypeName('direct_imperial_free_city')] за допомогою [ShowPolicyName('direct_imperial_cities_policy')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]."
  direct_imperial_free_city: "Пряме Імперське Вільне Місто"
  direct_imperial_free_city_desc: "$direct_imperial_free_city$ — це особливий суб'єкт, пов'язаний з [Concept('hre_emperor', 'CONCEPT_PLACEHOLDER')|e], дозволений [ShowPolicyName('direct_imperial_cities_policy')] [Concept('policy', 'CONCEPT_PLACEHOLDER')|e]. Цей статус активний доти, доки суб'єкт має статус [ShowSpecialStatusName('free_city')] [GetUniqueInternationalOrganization('hre').GetName]. Вони такі ж, як і звичайне [ShowSubjectTypeName('imperial_free_city')], але їхня автономія тепер значно зменшена, і тому їх можна анексувати з більшою швидкістю, ніж звичайного [ShowSubjectTypeName('vassal')]."
  tributary: "Данник"
  tributary_desc: "Данник — це країна, яка змушена періодично сплачувати данину своєму [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e] у вигляді [Concept('gold', 'CONCEPT_PLACEHOLDER')|e], [Concept('manpower', 'CONCEPT_PLACEHOLDER')|e] та [Concept('sailors', 'CONCEPT_PLACEHOLDER')|e], і це виключно для певних форм правління. Порівняно зі звичайним [ShowSubjectTypeName('vassal')], данники можуть оголошувати власні війни, навіть між собою, але вони не будуть автоматично приєднуватися до війн свого сюзерена."
  tributary_join_defensive_wars_always_tt: "На суб'єкта напала інша країна, яка не є іншим данником сюзерена."
  BUILDING_COUNTRY_NAME: "$ADJ$ $REGION$"
  PLAY_AS_RELEASED_SUBJECT: "Грати за звільненого суб'єкта"
  SELECT_SUBJECT_TYPE_CLICK: "Оберіть цей [Concept('subject_type', 'CONCEPT_PLACEHOLDER')|e]"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_ALWAYS_IF: "[COUNTRY.GetName] приєднається до наступальних війн [TARGET_COUNTRY.GetName], якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_AUTOCALL_IF: "[COUNTRY.GetName] буде автоматично покликаний приєднатися до наступальних війн [TARGET_COUNTRY.GetName], якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_CANCALL_IF: "[COUNTRY.GetName] може бути покликаний приєднатися до наступальних війн [TARGET_COUNTRY.GetName], якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_NEVER_IF: "[COUNTRY.GetName] НЕ приєднається до наступальних війн [TARGET_COUNTRY.GetName]."
  SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_ALWAYS_IF: "[COUNTRY.GetName] приєднається до оборонних війн [TARGET_COUNTRY.GetName], якщо:"
  SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_AUTOCALL_IF: "[COUNTRY.GetName] буде автоматично покликаний приєднатися до оборонних війн [TARGET_COUNTRY.GetName], якщо:"
  SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_CANCALL_IF: "[COUNTRY.GetName] може бути покликаний приєднатися до оборонних війн [TARGET_COUNTRY.GetName], якщо:"
  SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_NEVER_IF: "[COUNTRY.GetName] НЕ приєднається до оборонних війн [TARGET_COUNTRY.GetName]."
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_NO_COUNTRY_ALWAYS_IF: "[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] приєднається до наступальних війн [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_NO_COUNTRY_AUTOCALL_IF: "[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] буде автоматично покликаний приєднатися до наступальних війн [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_NO_COUNTRY_CANCALL_IF: "[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] може бути покликаний приєднатися до наступальних війн [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_NO_COUNTRY_NEVER_IF: "[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] НЕ приєднається до наступальних війн [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]."
  SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_NO_COUNTRY_ALWAYS_IF: "[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] приєднається до оборонних війн [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], якщо:"
  SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_NO_COUNTRY_AUTOCALL_IF: "[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] буде автоматично покликаний приєднатися до оборонних війн [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], якщо:"
  SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_NO_COUNTRY_CANCALL_IF: "[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] може бути покликаний приєднатися до оборонних війн [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e], якщо:"
  SUBJECT_TYPE_JOIN_DEFENSIVE_WARS_NO_COUNTRY_NEVER_IF: "[Concept('subject', 'CONCEPT_PLACEHOLDER')|e] НЕ приєднається до оборонних війн [Concept('overlord', 'CONCEPT_PLACEHOLDER')|e]."
  SUBJECT_TYPE_CANNOT_ATTACK: "[ATTACKER.GetName] не може атакувати [DEFENDER.GetName] через їхній [SUBJECT_TYPE.GetName] зв'язок з [COUNTRY.GetName]:"
  SUBJECT_TYPE_CANNOT_RIVAL: "[ATTACKER.GetName] не може конкурувати з [DEFENDER.GetName] через їхній [SUBJECT_TYPE.GetName] зв'язок з [COUNTRY.GetName]:"
  SUBJECT_TYPE_CANNOT_MARRY: "[ATTACKER.GetName] не може одружитися з [DEFENDER.GetName] через їхній [SUBJECT_TYPE.GetName] зв'язок з [COUNTRY.GetName]:"