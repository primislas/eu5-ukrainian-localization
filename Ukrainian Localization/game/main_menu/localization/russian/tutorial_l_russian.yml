 lesson_basics_wrap_up_3: "@caesar! Планировщик"
 lesson_basics_wrap_up_3b: "@caesar! Планировщик"
 lesson_basics_wrap_up_3_desc: "Прежде чем закончить обучение, рассмотрим ещё несколько важных элементов интерфейса. Первый из них — это #high планировщик#!.\n\nОн позволяет отслеживать различные показатели вашей [Concept('country', 'державы')]. К примеру, в разделе [Concept('construction_with_icon', 'строительства')|e] вы можете увидеть процесс строительства той самой [Concept('road_with_icon', 'дороги')|e], которую недавно приказали проложить.\n\nПланировщик можно настраивать по своему усмотрению. Как и в случае с #high контрольными группами#!, здесь можно закрепить множество разных элементов, включая [Concept('countries_with_icon', 'державы')|e], [Concept('markets_with_icon', 'рынки')|e], [Concept('armies_with_icon', 'армии')|e] и прочее.\n\nДля этого пригодится #high контекстное меню#!, которое можно вызвать, @rightclick!#high щёлкнув правой кнопкой мыши#! по [Concept('location_with_icon', 'району')|e] или державе на карте.\n\nПопробуйте щёлкнуть @rightclick!правой кнопкой мыши по карте и найти в появившемся окне значок @pin_icon!."
 lesson_basics_add_outliner: "Закрепите державу или район в #high планировщике#!"
 lesson_basics_open_contextmenu: "Откройте контекстное меню"
 lesson_basics_wrap_up_4: "@automation! Автоматизация"
 lesson_basics_wrap_up_4_desc: "Отлично! Теперь у вас есть быстрый доступ к закреплённым элементам в правой части экрана.\n\nМы уже подходим к концу этого обучения. Мы автоматизировали некоторые элементы, чтобы помочь вам сосредоточиться на изучении основ. Однако в любой момент вы можете это изменить на @automation! [Link('automation', '', 'панели автоматизации')]."
 lesson_basics_open_automation_view: "Откройте панель автоматизации"
 lesson_basics_wrap_up_4b: "@automation! Автоматизация"
 lesson_basics_wrap_up_4b_desc: "Здесь можно выбрать, какие элементы вашей [Concept('country_with_icon', 'державы')|e] будут управляться автоматически. Мы рекомендуем сначала ознакомиться со всеми возможностями и вернуться к этой панели позже, когда у вас сформируется более четкое представление о том, что вы хотите контролировать самостоятельно.\n\nНапример, вы можете автоматизировать [Concept('advances_with_icon', 'улучшения')|e] и работу [Concept('cabinet_with_icon', 'совета')|e] либо управлять ими самостоятельно.\n\nЕсли решите контролировать эти элементы вручную, то можете узнать больше о них здесь:\n\n$TAB$[Link('hints', 'selected_hint = hint_can_do_more_research_with_icon', 'Улучшения')]\n$TAB$[Link('hints', 'selected_hint = hint_has_possible_cabinet_action_with_icon', 'Совет')]"
 lesson_basics_wrap_up_5: "@caesar! Уведомления"
 lesson_basics_wrap_up_3b_desc: "Ещё один важный элемент, с которым вы столкнётесь в игре, это #high уведомления#!. Они будут появляться под #high верхней панелью#! и оповещать вас о различных делах, требующих внимания. Уведомления располагаются в порядке срочности от неотложных (#R красных#!) до наименее срочных (#G зелёных#!).\n\nИмейте в виду, что вы не будете получать уведомления об @automation!#high автоматизированных#! элементах игры.\n\n@hint! Для большинства уведомлений есть советы, которые помогают разобраться с той или иной ситуацией. Их можно изучить, #high зажав Shift и щёлкнув левой кнопкой мыши#! по уведомлению."
 lesson_basics_wrap_up_6: "@caesar! Обзор"
 lesson_basics_wrap_up_6_desc: "И последнее. Перед началом кампании лучше всего изучить @agenda!#high обзор#!, где приведена небольшая историческая справка о вашей [Concept('country_with_icon', 'державе')|e] и набор @hint!#high подсказок#!, наиболее актуальных для текущей ситуации."
 lesson_basics_open_agenda: "Откройте обзор"
 lesson_basics_final: "[mission_icon] Вперёд к заданиям!"
 lesson_basics_final_desc: "На этом мы завершаем #W демонстрацию базовых функций#!. Теперь можете продолжить прохождение по своему выбору.\n\nВ зависимости от вашего выбора, вам будут предоставлены короткие объяснения, которые помогут вам лучше понять игру. А после этого вам будут представлены [Concept('missions_with_icon', 'задания')|e] с различными целями и наградами, которые помогут вам сделать первые шаги в @caesar!#W Europa Universalis V.#!\n\nУдачи, и пусть вашей стране сопутствует процветание!"
 lesson_basics_mission_focus: "Выберите направленность задания"
 ############ POLITICS ############
 lesson_diplomacy_0: "@diplomacy! Демонстрация «Политика»"
 lesson_diplomacy_0b: "@diplomacy! Демонстрация «Политика»"
 lesson_diplomacy_0_desc: "В этом обучении мы более подробно разберём всё, что касается общества, правительства и внешней политики вашей державы.\n\nНачнём с [Concept('population_with_icon', 'населения')|e] — основополагающего элемента любой державы.\n\nВ ходе вступительного обучения мы уже бегло упоминали о [Concept('pops', 'группах населения')], проживающих в [Concept('capital_with_icon', 'столице')|e]. Пришло время детально изучить [Link('country_culture', '', '@society_panel!панель общества')]."
 lesson_diplomacy_open_society: "Откройте панель общества"
 lesson_diplomacy_open_pops: "Откройте вкладку населения"
 lesson_diplomacy_1: "@society_panel! Общество"
 lesson_diplomacy_1_desc: "Здесь приведены элементы вашей [Concept('country_with_icon', 'державы')|e], связанные с населением. В разделе [Concept('population_with_icon', '«Население»')|e] на #high верхней панели#! показано, сколько человек сейчас живёт в вашей [Concept('country', 'державе')], а также отмечены изменения этого числа за разные месяцы.\n\nВсе жители делятся на [Concept('pops_with_icon', 'группы населения')|e], куда входят представители одной [Concept('culture_with_icon', 'культуры')|e], одной [Concept('religion_with_icon', 'религии')|e] и одного [Concept('pop_type_with_icon', 'класса')|e], живущие в одном [Concept('location_with_icon', 'районе')|e].\n\nКак мы уже видели, каждый [Concept('pop_type', 'класс')] оказывает поддержку одному конкретному [Concept('estate_with_icon', 'сословию')|e]. Кроме того, у [Concept('pops', 'групп населения')] есть показатели [Concept('literacy_with_icon', 'грамотности')|e] и [Concept('pop_satisfaction_with_icon', 'довольства')|e], а также [Concept('pop_needs_with_icon', 'потребности')|e], включая [Concept('food_with_icon', 'пищу')|e], которые население удовлетворяет с помощью [Concept('market_with_icon', 'рынка')|e].\n\nДовольство ваших групп населения зависит от ряда факторов, например отношения к их [Concept('culture', 'культуре')] и [Concept('religion', 'религии')] в вашей державе, а также от [Concept('estate_satisfaction_with_icon', 'довольства')|e] их [Concept('estates', 'сословия')]. Если довольство [Concept('pop', 'группы населения')] опустится слишком низко, она постарается поддержать [Concept('rebellion_with_icon', 'мятеж')|e].\n\n@hint! Узнать больше о [Concept('rebels', 'мятежниках')] можно [Link('hints', 'selected_hint = hint_rebels_growing', 'здесь')]."
 lesson_diplomacy_2: "@culture! $game_concept_culture$"
 lesson_diplomacy_2_desc: "Мы уже упоминали, что каждая [Concept('pop_with_icon', 'группа населения')|e] относится к определённой [Concept('culture_with_icon', 'культуре')|e]. Давайте откроем [Link('country_culture', '', '@society_panel! вкладку культуры')]."
 lesson_diplomacy_open_culture: "Откройте вкладку культуры"
 lesson_diplomacy_3: "@culture! $game_concept_culture$"
 lesson_diplomacy_3_desc: "Обычно в вашей [Concept('country_with_icon', 'державе')|e] будут жить представители нескольких [Concept('cultures_with_icon', 'культур')|e]. У каждой [Concept('country', 'державы')] есть [Concept('primary_culture_with_icon', 'основная культура')|e], а все прочие культуры обладают различными [Concept('cultural_status', 'статусами')|e].\n\n[Concept('pops_with_icon', 'Группы населения')|e], принадлежащие к [Concept('culture', 'культуре')] с низким [Concept('cultural_status', 'статусом')], обычно обладают меньшим [Concept('pop_satisfaction_with_icon', 'довольством')|e] и предоставляют меньшее число [Concept('levies_with_icon', 'ополченцев')|e]. [Concept('cultural_status', 'Статус')] [Concept('cultures', 'культур')] в своей державе можно повышать, расходуя на это [Concept('cultural_capacity_with_icon', 'культурный потенциал')|e].\n\nИ последнее. [Concept('pops', 'Группы населения')|e], живущие в вашей [Concept('country', 'державе')], будут [Concept('assimilate_with_icon', 'ассимилироваться')|e] в [Concept('primary_culture', 'основную культуру')] с учётом разных факторов, среди которых важнейшую роль играет разница в [Concept('cultural_influence_with_icon', 'культурном влиянии')|e] между вашей [Concept('primary_culture', 'основной культурой')] и их [Concept('cultural_tradition_with_icon', 'культурными традициями')|e]."
 lesson_diplomacy_open_works_of_art: "Откройте раздел творений"
 lesson_diplomacy_4: "@art_work! Творения"
 lesson_diplomacy_4_desc: "У вас в арсенале есть важнейший инструмент для повышения [Concept('cultural_influence_with_icon', 'влияния')|e] вашей [Concept('primary_culture_with_icon', 'основной культуры')|e] — [Concept('works_of_art_with_icon', 'творения')|e].\n\nДавайте откроем #high вкладку творений#!. Перейдите в выделенный раздел."
 lesson_diplomacy_open_culture_breakdown: "Откройте раздел подробностей о культуре"
 lesson_diplomacy_5: "@art_work! Творения"
 lesson_diplomacy_5_desc: "[Concept('works_of_art_with_icon', 'Творения')|e] — это артефакты, создаваемые различными [Concept('artists_with_icon', 'творцами')|e] вашей [Concept('country_with_icon', 'державы')|e]. К примеру, #TOOLTIP:ARTIST,painter,X #L художник#!#! может создать #TOOLTIP:WORK_OF_ART_TYPE,painting,X #L картину#!#!, а #TOOLTIP:ARTIST,writer,X #L писатель#!#! — #TOOLTIP:WORK_OF_ART_TYPE,novel,X #L повесть#!#!.\n\nКогда творение будет создано, ваша [Concept('primary_culture_with_icon', 'основная культура')|e] получит определённое количество [Concept('cultural_influence_with_icon', 'культурного влияния')|e].\n\nСозданное творение будет и впредь давать вам бонусы к [Concept('cultural_tradition_with_icon', 'традициям')|e] вашей основной культуры, а также ежемесячный бонус к [Concept('prestige_with_icon', 'престижу')|e] в зависимости от [Concept('art_quality', 'качества творения')|e].\n\n[Concept('prestige', 'Престиж')] — это ещё один показатель, который можно отслеживать на #high верхней панели#!. Он отражает культурную значимость вашей [Concept('country', 'державы')] на мировой арене. В числе прочего, высокий [Concept('prestige', 'престиж')] помогает в вопросах [Concept('diplomacy', 'дипломатии')|e] и [Concept('integration', 'интеграции')|e]."
 lesson_diplomacy_open_religion: "Откройте вкладку религии"
 lesson_diplomacy_6: "[religion_icon] Религия"
 lesson_diplomacy_6_desc: "Помимо [Concept('culture_with_icon', 'культуры')|e] другим важным свойством [Concept('pops_with_icon', 'групп населения')|e] является их [Concept('religion_with_icon', 'религия')|e]. Давайте изучим [Link('country_religion', '', '@society_panel! вкладку религии')]!"
 lesson_diplomacy_7: "[religion_icon] Религия"
 lesson_diplomacy_7_desc: "В этой вкладке можно увидеть [Concept('primary_religion_with_icon', 'основную религию')|e], а также прочие [Concept('religions_with_icon', 'религии')|e], присутствующие в вашей [Concept('country_with_icon', 'державе')|e].\n\nВ зависимости от конкретной веры вашей державы можно тратить [Concept('religious_influence_with_icon', 'религиозное влияние')|e] на различные взаимодействия со своей религией.\n\nПо аналогии с [Concept('culture_with_icon', 'культурой')|e], у всех религий в державе тоже есть свой [Concept('religious_status', 'статус')|e]."
 lesson_diplomacy_8: "@population! Население"
 lesson_diplomacy_8_desc: "Теперь давайте изучим #high вкладку населения.#!"
 lesson_diplomacy_open_people: "Откройте вкладку групп населения"
 lesson_diplomacy_8b: "@population! Население"
 lesson_diplomacy_8b_desc: "Здесь можно найти сведения о [Concept('pops_with_icon', 'группах населения')|e] в вашей [Concept('country_with_icon', 'державе')|e]. Каждая группа живёт в определённом [Concept('location_with_icon', 'районе')|e], а также выделяется своей [Concept('culture_with_icon', 'культурой')|e], [Concept('religion_with_icon', 'религией')|e] и [Concept('pop_type', 'общественным классом')|e].\n\nНа этой же панели есть сведения о [Concept('rebels_with_icon', 'мятежниках')|e]. Обычно с мятежниками можно разобраться, повысив [Concept('pop_satisfaction', 'довольство их группы населения')|e]."
 lesson_diplomacy_8c: "@characters! Персонажи"
 lesson_diplomacy_8c_desc: "Теперь познакомимся с [Concept('characters_with_icon', 'персонажами')|e]. Перейдите на #high вкладку персонажей.#!"
 lesson_diplomacy_open_character: "Откройте раздел персонажей"
 lesson_diplomacy_8d: "@characters! Персонажи"
 lesson_diplomacy_8d_desc: "По ходу игры вам придётся взаимодействовать с различными [Concept('characters_with_icon', 'персонажами')|e] — это люди, которым вы можете назначать [Concept('roles', 'роли')|e].\n\nНа этой вкладке перечислены все [Concept('characters', 'персонажи')] при вашем дворе и их текущие [Concept('role', 'роли')]. У персонажей есть [Concept('abilities_with_icon', 'навыки')|e], которые определяют их эффективность на отведённых им [Concept('roles', 'ролях')]:\n\n[Concept('adm_with_icon', 'административный навык')|e]\n[Concept('dip_with_icon', 'дипломатический навык')|e]\n[Concept('mil_with_icon', 'военный навык')|e]\n\nПомимо трёх основных [Concept('abilities', 'навыков')], [Concept('characters', 'персонажи')] могут развивать в себе определённые [Concept('traits', 'свойства')|e], помогающие им в различных задачах. Кроме того, все [Concept('characters', 'персонажи')] принадлежат к [Concept('estate_with_icon', 'сословиям')|e], а некоторые — ещё и к прославленным [Concept('dynasty_with_icon', 'династиям')|e].\n\n#weak Также можно щёлкнуть @rightclick!#high правой кнопкой мыши#! по имени или портрету [Concept('character', 'персонажа')], чтобы открыть #high контекстное меню#!#!."
 lesson_diplomacy_8e: "[character_icon] Персонажи"
 lesson_diplomacy_8e_desc: "Мы уже увидели [Concept('artists', 'творцов')] при вашем [Concept('court', 'дворе')], однако важнейшими среди [Concept('character_with_icon', 'персонажей')|e] являются [Concept('ruler_with_icon', 'правители')|e].\n\nДавайте ещё раз откроем панель правительства, чтобы познакомиться с благородным искусством управления."
 lesson_admin_1: "[ruler_icon] Правитель"
 lesson_admin_1_desc: "Это [Concept('ruler_with_icon', 'правитель')|e], самый важный для вас [Concept('character_with_icon', 'персонаж')|e]. [Concept('abilities_with_icon', 'Навыки')|e] вашего [Concept('ruler', 'правителя')] оказывают значительное влияние на [Concept('country_with_icon', 'державу')|e]. Чтобы узнать их эффекты, наведите на них курсор.\n\nВ этом же окне можно увидеть [Concept('consort_with_icon', 'консорта')|e], [Concept('heir_with_icon', 'наследника')|e] и [Concept('regent_with_icon', 'регента')|e], если у вас есть одна из этих [Concept('roles', 'ролей')|e]."
 lesson_admin_open_government: "Откройте панель правительства"
 lesson_admin_9: "[cabinet_icon] $game_concept_cabinet$"
 lesson_admin_9_desc: "К слову о важных [Concept('characters_with_icon', 'персонажах')|e]! Давайте обсудим один из важнейших инструментов для управления [Concept('country_with_icon', 'державой')|e]: [Concept('cabinet_with_icon', 'совет')|e].\n\nПерейдите в раздел совета."
 lesson_admin_open_cabinet: "Откройте раздел совета"
 lesson_admin_10: "[cabinet_icon] $game_concept_cabinet$"
 lesson_admin_10_desc: "Это ваш [Concept('cabinet_with_icon', 'совет')|e]. [Concept('cabinet_seats_with_icon', 'Места в нём')|e] могут занимать [Concept('characters_with_icon', 'персонажи')|e], которые станут [Concept('cabinet_members_with_icon', 'членами совета')|e]. Им можно поручать различные [Concept('cabinet_actions_with_icon', 'действия')|e], например #TOOLTIP:CABINET_ACTION,increase_control_province,X #L усиление контроля над провинцией#!#! или #TOOLTIP:CABINET_ACTION,develop_province,X #L развитие провинции#!#!.\n\nДействия совета опираются на один из трёх [Concept('abilities_with_icon', 'навыков')|e]. На результативность действия влияют навыки вашего [Concept('ruler_with_icon', 'правителя')|e] и члена совета, которому поручено действие.\n\nНапример, #TOOLTIP:CABINET_ACTION,change_societal_values,X #L изменение общественных ценностей#!#! будет продвигаться быстрее, если оно поручено члену совета с развитым [Concept('dip_with_icon', 'дипломатическим навыком')|e]. Общая [Concept('cabinet_efficiency_with_icon', 'эффективность совета')|e] вашей [Concept('country_with_icon', 'державы')|e] также влияет на скорость и эффективность выполнения действий.\n\n@hint! Узнать больше о совете можно [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', 'здесь')]."
 lesson_admin_5: "[estates_icon] $game_concept_estates$"
 lesson_admin_5_desc: "Давайте перейдём в #high раздел сословий#!. Изучать различные сословия вашей [Concept('country_with_icon', 'державы')|e] и взаимодействовать с ними в #high разделе сословий#! позволяет вкладка державы на панели [Concept('government', 'правительства')|e]."
 lesson_admin_6: "[government_type_icon] Правительство"
 lesson_admin_6_desc: "Каждая [Concept('country_with_icon', 'держава')|e] в #high Europa Universalis V#! уникальна. Политика вашей [Concept('country', 'державы')] в первую очередь определяется [Concept('government_type_with_icon', 'формой правления')|e].\n\nВаша [Concept('country', 'держава')] — это [Player.GetGovernment.GetGovernmentType.GetName|l], и её принципы функционирования уже значительно отличаются от соседей. Кроме того, суть и политическое устройство [Concept('country', 'державы')] во многом зависят от её [Concept('government_reforms_with_icon', 'государственных принципов')|e], [Concept('privileges_with_icon', 'привилегий')|e] и [Concept('laws_with_icon', 'правил')|e].\n\nИзменение любого из этих трёх элементов обычно сопровождается значительным падением [Concept('stability_with_icon', 'стабильности')|e].\n\nДавайте изучим положение дел, начав с уже знакомого [Link('government', 'tabcontent = estates', '@government_panel!раздела сословий')]."
 lesson_admin_6b: "[government_reform_icon] Государственные принципы"
 lesson_admin_6b_desc: "[Concept('government_reforms_with_icon', 'Государственные принципы')|e] — одна из ключевых особенностей вашей [Concept('country_with_icon', 'державы')|e]. Их эффекты зачастую весьма значительны, поэтому выбор принципов должен быть одной из ваших первостепенных задач в начале новой игры.\n\n@hint! Узнать больше о [Concept('government_reforms', 'государственных принципах')] можно [Link('hints', 'selected_hint = hint_has_possible_reform', 'здесь')]."
 lesson_admin_open_country: "Откройте вкладку державы"
 lesson_admin_open_estates: "Откройте раздел сословий"
 lesson_admin_6c: "[privileges_icon] Привилегии"
 lesson_admin_6c_desc: "Мы уже обсуждали [Concept('privileges_with_icon', 'привилегии')|e], когда говорили о [Concept('estates_with_icon', 'сословиях')|e]. Помимо влияния на [Concept('estate_satisfaction_with_icon', 'довольство')|e] и [Concept('estate_power_with_icon', 'власть сословия')|e] [Concept('privileges', 'привилегии')] могут существенно изменить игру за вашу [Concept('country_with_icon', 'державу')|e]. Часто они открывают новые возможности или ограничивают вашу свободу действия."
 lesson_admin_open_laws: "Откройте раздел правил"
 lesson_admin_11: "[laws_icon] $game_concept_laws$"
 lesson_admin_11_desc: "И наконец, каждая держава начинает игру с собственным [Concept('laws_with_icon', 'сводом правил')|e]. Перейдите в #high раздел правил#! во #high вкладке державы#!."
 lesson_admin_12: "[law_icon] $game_concept_laws$"
 lesson_admin_12_desc: "[Concept('laws_with_icon', 'Свод правил')|e] разделён на несколько категорий и позволяет вам менять свою [Concept('country_with_icon', 'державу')|e]. Каждое [Concept('law', 'правило')] содержит несколько возможных [Concept('policies_with_icon', 'политик')|e].\n\nНапример, для правила #TOOLTIP:LAW,censorship,X #L «Цензура»#!#! можно выбрать политику #TOOLTIP:POLICY,no_censorship,X #L «Отсутствие цензуры»#!#!. Выбор политики влечёт за собой ряд положительных и отрицательных последствий. Скорость изменения политики зависит от вашей [Concept('legislative_efficiency_with_icon', 'законодательной эффективности')|e].\n\n#weak Правила можно менять в любое время, расплачиваясь [Concept('gold_with_icon', 'дукатами')|e] и [Concept('stability_with_icon', 'стабильностью')|e], но обычно более рациональным решением будет дождаться заседания [Concept('parliament_with_icon', 'парламента')|e]#!"
 lesson_admin_open_values: "Откройте вкладку ценностей"
 lesson_admin_13: "[societal_value_icon] $game_concept_societal_values$"
 lesson_admin_13_desc: "Итак, вы можете менять [Concept('government_reforms_with_icon', 'государственные принципы')|e], [Concept('laws_with_icon', 'правила')|e] и [Concept('privileges_with_icon', 'привилегии')|e] в своей [Concept('country_with_icon', 'державе')|e] как захотите, если готовы к снижению [Concept('stability_with_icon', 'стабильности')|e]. Однако не всё в этом мире так просто изменить, и общество очень медленно подстраивается под новые порядки.\n\nЧтобы лучше отобразить структурные особенности вашей державы и народа, есть [Concept('societal_values_with_icon', 'общественные ценности')|e]. Давайте посмотрим на них."
 lesson_admin_14: "[societal_value_icon] $game_concept_societal_values$"
 lesson_admin_14_desc: "[societal_values_with_icon|e] [Concept('country_with_icon', 'державы')|e] отражают укоренившиеся обычаи населения, инерцию светских институтов и их влияние на характер её обитателей. Они меняются медленно, с течением времени, приспосабливаясь к правилам.\n\n[reforms_with_icon|e], [privileges_with_icon|el], [laws_with_icon|el] и определённые действия во время вашего правления приведут к постепенному изменению [Concept('societal_values', 'общественных ценностей')].\n\n#weak Например, если [GetEstateName('nobles_estate')|l] вашей державы получат определённые [Concept('privileges', 'привилегии')], это подтолкнёт вашу державу в сторону #TOOLTIP:SOCIETAL_VALUE,aristocracy_vs_plutocracy,X #L аристократии#!#!."
 lesson_admin_15: "[crown_power_icon] $game_concept_crown_power$"
 lesson_admin_15_desc: "То, как [GetEstateName('crown_estate')] используют свою силу против других [Concept('estates_with_icon', 'сословий')|e] — один из краеугольных камней управления в @caesar!#high Europa Universalis V#!.\n\nВаша [Concept('crown_power_with_icon', 'власть правителя')|e] в основном зависит от средней степени [Concept('control_with_icon', 'контроля')|e] во всех ваших [Concept('locations', 'районах')], а её эффективность снижается под влиянием [Concept('privileges_with_icon', 'привилегий')|e] ваших [Concept('estates', 'сословий')]. Также на неё влияют многие [Concept('government_reforms_with_icon', 'государственные принципы')|e], [Concept('laws_with_icon', 'своды правил')|e] и [Concept('societal_values_with_icon', 'общественные ценности')|e].\n\nПоддерживать власть правителя на высоком уровне очень важно: она не только повышает [Concept('cabinet_efficiency_with_icon', 'эффективность совета')|e] и вашу поддержку в [Concept('parliament_with_icon', 'парламенте')|e], но также определяет процент [Concept('trade_income_with_icon', 'доходов от торговли')|e], который поступает напрямую в вашу [Concept('treasury_with_icon', 'казну')|e]."
 lesson_economy_1: "@adm! Демонстрация «Экономика»"
 lesson_economy_1_desc: "Теперь мы @adm!#high познакомимся с экономикой#!. Чтобы глубже вникнуть в экономические принципы #high Europa Universalis V#!, начнём с основы — [Concept('markets_with_icon', 'рынков')|e]."
 lesson_economy_2: "[market_icon] $game_concept_markets$"
 lesson_economy_2_desc: "Здесь представлен перечень [Concept('markets_with_icon', 'рынков')|e], на которых присутствует ваша [Concept('country_with_icon', 'держава')|e], тогда как на карте вы можете увидеть все [Concept('markets', 'рынки')] известного мира. Каждый [Concept('location_with_icon', 'район')|e] является частью [Concept('market', 'рынка')], на котором он продаёт производимые [Concept('goods_with_icon', 'товары')|e] и закупает нужные.\n\nМногое в игре завязано на товарах: [Concept('pops_with_icon', 'группы населения')|e] потребляют [Concept('goods', 'товары')] для жизни, [Concept('goods', 'товары')] нужны для [Concept('constructions_with_icon', 'строительства')|e], без [Concept('goods', 'товаров')] не будут работать [Concept('buildings_with_icon', 'сооружения')|e], [Concept('armies_with_icon', 'армиям')|e] нужны [Concept('goods', 'товары')], чтобы воевать.\n\nНапример, на карте можно увидеть, что ваша [Concept('capital_with_icon', 'столица')|e], [Player.GetCapital.GetName], является частью рынка [market_icon]«[Player.GetCapital.GetMarket.GetName]», поэтому всё, что вы сооружаете в ней, будет использовать [Concept('goods', 'товары')] с этого [Concept('market', 'рынка')].\n\n#weak Кроме того, можно щёлкнуть @rightclick!#high правой кнопкой мыши#! по названию или карточке [Concept('market', 'рынка')], чтобы открыть #high контекстное меню#!#!."
 lesson_economy_3: "[market_icon] $game_concept_markets$"
 lesson_economy_3_desc: "Продукция всех [Concept('locations_with_icon', 'районов')|e] каждый месяц продаётся и поступает в [Concept('stockpile_with_icon', 'запасы')|e] [Concept('market_with_icon', 'рынка')|e], что создаёт основу для [Concept('wealth_with_icon', 'богатства')|e]. И наоборот, все [Concept('locations', 'районы')] пытаются закупать необходимые им [Concept('goods', 'товары')] на своём [Concept('market', 'рынке')] в порядке очереди, которая определяется [Concept('market_access_with_icon', 'доступом к рынку')|e]. Разница между [Concept('supply_with_icon', 'предложением')|e] и [Concept('demand_with_icon', 'спросом')|e] в отношении [Concept('good', 'товара')] на [Concept('market', 'рынке')] влияет на его [Concept('market_price_with_icon', 'рыночную цену')|e].\n\nОбратите внимание, что влияние [Concept('markets', 'рынков')] распространяется и за пределы [Concept('country_with_icon', 'державы')|e]. Продукция ваших [Concept('locations', 'районов')] всегда поступает напрямую на тот [Concept('market', 'рынок')], к которому они относятся, из-за чего чужие [Concept('locations', 'районы')] с лучшим [Concept('market_access', 'доступом')] к тому же рынку могут скупить [Concept('goods', 'товары')] раньше ваших.\n\n[Concept('market_access_with_icon', 'Доступ')|e] [Concept('location', 'района')] к рынку зависит от расстояния до [Concept('market_center_with_icon', 'рыночного центра')|e] и, как и в случае с [Concept('proximity_with_icon', 'досягаемостью')|e], этот доступ можно улучшить с помощью [Concept('roads_with_icon', 'дорог')|e]. Как правило, районы относятся к ближайшему [Concept('market', 'рынку')], то есть рынку с наилучшим [Concept('market_access', 'доступом')].\n\n@hint!Узнать больше о [Concept('markets', 'рынках')] можно [Link('hints', 'selected_hint = hint_markets', 'здесь')]."
 lesson_economy_4: "[trade_icon] $game_concept_trade$"
 lesson_economy_4_desc: "[markets_with_icon|e] никогда не бывают полностью изолированными друг от друга. Движение [Concept('goods_with_icon', 'товаров')|e] между двумя [Concept('markets', 'рынками')] называется [Concept('trade_with_icon', 'торговлей')|e].\n\n[countries_with_icon|e] могут перемещать [Concept('goods', 'товары')] между [Concept('markets', 'рынками')], расходуя на это [Concept('merchant_capacity_with_icon', '#TOOLTIP:POPTYPE,burghers,X #L горожане#!#! будут самостоятельно вести [Concept('trade', 'торговлю')].\n\nПо умолчанию торговля @automation! #high автоматизирована#! на всех [Concept('markets', 'рынках')], то есть, весь ваш [Concept('merchant_capacity', 'торговый потенциал')] на [Concept('market', 'рынке')] будет автоматически задействоваться для наиболее выгодных сделок. Мы советуем доверить [Concept('trade', 'торговлю')] автоматизации, пока вы не освоитесь в игре.\n\nКогда придёт время, вы сможете подробнее познакомиться с [Concept('trade', 'торговлей')] здесь:\n$TAB$[Link('hints', 'selected_hint = hint_trade_with_icon', 'Совет о торговле')]."
 lesson_economy_5: "[food_icon] $game_concept_food$"
 lesson_economy_5_desc: "Наконец, [Concept('pops_with_icon', 'группы населения')|e] также производят и потребляют [Concept('food_with_icon', 'пищу')|e].\n\n[Concept('food', 'Пища')] в основном производится @laborers! #TOOLTIP:POPTYPE,laborers,X #L рабочими#!#!, которые [Concept('rgo_with_icon', 'добывают')|e] [Concept('food_raw_materials', 'ресурсы для производства пищи')|e], например #TOOLTIP:GOODS,wheat,X #L пшеницу#!#!, хотя @peasants! #TOOLTIP:POPTYPE,peasants,X #L крестьяне#!#!, занятые [Concept('subsistence_agriculture_with_icon', 'натуральным хозяйством')|e], также вносят небольшой вклад.\n\nНа каждом [Concept('market_with_icon', 'рынке')|e] есть [Concept('food_stockpile_with_icon', 'запас пищи')|e], который каждый месяц увеличивается или уменьшается. Если на [Concept('market', 'рынке')] закончится [Concept('food', 'пища')], [Concept('population', 'население')] начнёт [Concept('starvation_with_icon', 'голодать')|e]. Вы увидите [Concept('market', 'рыночный')] [Concept('food', 'продуктовый')] баланс на карточке [Concept('market', 'рынка')].\n\nУзнать больше о способах получения [Concept('food', 'пищи')] можно [Link('hints', 'selected_hint = hint_food_with_icon', 'здесь')]."
 lesson_admin_21: "[good_icon] $game_concept_goods$"
 lesson_admin_21_desc: "Давайте продолжим знакомство с [Concept('goods', 'товарами')|e] на ваших [Concept('markets_with_icon', 'рынках')|e].\n\nДля этого можно нажать кнопку [good_icon|e] [Concept('goods', 'товаров')] на #high карточке рынка#!, и вы откроете вкладку товаров на панели производства с фильтром по данному рынку."
 lesson_admin_22: "[good_icon] $game_concept_goods$"
 lesson_admin_22_desc: "Здесь перечислены все [Concept('goods_with_icon', 'товары')|e] на определённом [Concept('market_with_icon', 'рынке')|e].\n\n#weak [market_icon] #high Карточку рынка#! можно убрать, чтобы посмотреть товары во всей вашей [Concept('country', 'державе')], включая все рынки, на которых у вас есть [Concept('locations', 'районы')]#!.\n\nЕсть три способа увеличить [Concept('supply_with_icon', 'предложение')|e] любого товара на [Concept('market', 'рынке')]:\n\n$BULLET$ [rgo_icon] Расширение [Concept('rgo', 'добычи ресурсов')|e]\n[Concept('rgo', 'Добычу')] [Concept('raw_materials_with_icon', 'ресурсов')|e] можно нарастить, если вы [Concept('own', 'владеете')|e] подходящими [Concept('locations_with_icon', 'районами')|e].\n\n$BULLET$ [building_icon] Строительство [Concept('buildings', 'сооружений')|e]\nНекоторые [Concept('buildings', 'сооружения')] могут добывать [Concept('raw_materials', 'ресурсы')], но их основное предназначение — переработка [Concept('raw_materials', 'ресурсов')] в [Concept('produced_goods_with_icon', 'производимые товары')|e].\n\n$BULLET$ [import_icon] Импорт с помощью [Concept('trade_with_icon', 'торговли')|E]\nНеобходимые [Concept('goods', 'товары')] можно импортировать с других [Concept('markets', 'рынков')] при наличии доступного [Concept('merchant_capacity_with_icon', 'торгового потенциала')|e].\n\n#weak Например, вы можете начать добычу ресурсов для получения @wool! #TOOLTIP:GOODS,wool,X шерсти#!, затем построить @cloth_guild!#TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гильдию прядильщиков#!#! для переработки шерсти в @cloth! #TOOLTIP:GOODS,cloth,X текстиль#!, который нужен многим другим [Concept('buildings', 'сооружениям')], а также [Concept('pops', 'населению')] и [Concept('armies', 'армиям')].#!"
 lesson_admin_25: "[building_icon] $game_concept_buildings$"
 lesson_admin_25_desc: "Наконец, давайте поговорим о [Concept('buildings_with_icon', 'сооружениях')|e].\n\nДля начала посмотрим на полный список [Concept('buildings', 'сооружений')], которые уже построены или доступны вашей [Concept('country_with_icon', 'державе')|e]. Для этого можно открыть #high вкладку сооружений#! на панели производства.\n\nЕщё можно нажать кнопку [building_icon] сооружения на [market_icon]#high карточке рынка#!, чтобы просмотреть список сооружений в пределах конкретного рынка."
 lesson_admin_26: "[building_icon] $game_concept_buildings$"
 lesson_admin_26_desc: "В отличие от мест [Concept('rgo_with_icon', 'добычи ресурсов')|e] всем [Concept('buildings_with_icon', 'сооружениям')|e] требуются [Concept('goods_with_icon', 'товары')|e] для работы, однако не все сооружения участвуют в производстве [Concept('goods', 'товаров')], а следовательно, в увеличении [Concept('tax_base_with_icon', 'налоговой базы')|e].\n\nУ некоторых [Concept('buildings', 'сооружений')] другие цели: например, они предоставляют [Concept('manpower_with_icon', 'рекрутов')|e], позволяют набирать [Concept('regulars_with_icon', 'регулярные войска')|e], укрепляют вашу [Concept('crown_power_with_icon', 'власть правителя')|e] или улучшают [Concept('control_with_icon', 'контроль')|e] над [Concept('location_with_icon', 'районом')|e].\n\nСооружения, как и места [Concept('rgo_with_icon', 'добычи ресурсов')|e], требуют затрат на [Concept('construction_with_icon', 'строительство')|e], которое занимает определённое время в игре. Чтобы построенное сооружение могло работать, ему нужны определённые ресурсы на том [Concept('market_with_icon', 'рынке')|e], к которому оно относится.\n\n#weak Помните, что у вашей [Concept('country', 'державы')] может быть несколько [Concept('market', 'рынков')]. [market_icon] #high Карточка рынка#! в верхней части #high панели производства#! позволяет отсортировать её содержимое по рынкам.#!\n\nУзнать больше о [Concept('buildings', 'сооружениях')] можно здесь:\n[Link('hints', 'selected_hint = hint_lack_pop_promotion_to_fill_buildings', '@hint! Сооружения без работников')]\n[Link('hints', 'selected_hint = hint_unprofitable_buildings', '@hint! Невыгодные сооружения')]\n[Link('hints', 'selected_hint = hint_has_buildings_missing_input', '@hint! Нехватка ресурсов')]"
 lesson_admin_27: "[mission_icon] $game_concept_missions$"
 lesson_admin_27b: "[mission_icon] $game_concept_missions$"
 lesson_admin_27_desc: "Напоследок рассмотрим [Concept('missions_with_icon', 'задания')|e]."
 lesson_admin_28: "[mission_icon] $game_concept_missions$"
 lesson_admin_28_desc: "[Concept('missions_with_icon', 'Задания')|e] представляют собой набор этапов, которые призваны показать вам, что можно делать в #high Europa Universalis V#!. Это большая игра, в ней многое нужно освоить, и в этом часть веселья!\n\nВы только что завершили введение в @adm!#high экономический стиль игры#!, и теперь вам доступны задания, которые позволят лучше узнать, как пользоваться механиками и панелями, которые мы обсуждали.\n\nЧтобы упростить для вас знакомство с ними, мы подготовили несколько заданий."
 lesson_admin_29: "@caesar! Завершение"
 lesson_admin_29_desc: "Отлично! Теперь на #high вкладке [Concept('missions_with_icon', 'заданий')|E]#! вам доступно несколько из них.\n\nРекомендуем выполнять эти задания по порядку: так вы закрепите уже пройденные уроки, а заодно узнаете что-то новое. Также помните: во #high вкладке заданий#! можно в любой момент перейти к другой демонстрации и сопутствующим [Concept('mission', 'заданиям')].\n\nУдачи!"
 lesson_admin_open_economy: "Откройте панель экономики"
 lesson_admin_open_balance: "Откройте вкладку баланса"
 lesson_admin_open_markets: "Откройте вкладку рынков"
 lesson_admin_open_trading: "Откройте вкладку торговли"
 lesson_admin_open_production: "Откройте панель производства"
 lesson_admin_open_goods: "Откройте вкладку товаров"
 lesson_admin_open_food: "Откройте вкладку пищи"
 lesson_admin_open_buildings: "Откройте вкладку сооружений"
 lesson_admin_open_missions: "Откройте вкладку заданий"
 lesson_admin_has_mission_active: "Начните экономическое задание"
 ############ DIPLOMACY ############
 lesson_diplomacy_9: "@diplomacy! Дипломатия"
 lesson_diplomacy_9_desc: "Но политические процессы происходят не только внутри нашего государства. Давайте познакомимся с [Concept('diplomacy_with_icon', 'дипломатией')|e] и изучим @diplomacy_panel![Link('diplomacy', '', ' панель дипломатии')], начиная с #high вкладки отношений#!."
 lesson_diplomacy_open_diplomacy: "Откройте панель дипломатии"
 lesson_diplomacy_open_relations: "Откройте вкладку отношений"
 lesson_diplomacy_open_current_relations: "Откройте раздел текущих отношений"
 lesson_diplomacy_10: "@diplomacy! Дипломатия"
 lesson_diplomacy_10_desc: "Независимо от того, насколько могущественной станет ваша держава, [Concept('diplomacy_with_icon', 'дипломатия')|e] необходима, чтобы выживать на протяжении эпох. Вам придётся заключать [Concept('alliances_with_icon', 'союзы')|e] для защиты от врагов или договариваться о [Concept('peace_with_icon', 'мире')|e] после затяжной [Concept('war_with_icon', 'войны')|e].\n\nТут важно учитывать два момента:\n\n$BULLET$Вам придётся тратить ресурс [Concept('diplomats_with_icon', 'дипломатов')|e] на [Concept('diplomatic_action_with_icon', 'дипломатические действия')|e] в отношении других [Concept('countries_with_icon', 'держав')|e], к примеру, на [Concept('improve_relations_with_icon', 'улучшение отношений')|e], создание [Concept('spy_networks_with_icon', 'шпионских сетей')|e] или объявление [Concept('wars_with_icon', 'войн')|e]. Количество ваших [Concept('diplomats', 'дипоматов')] указано на #high верхней панели#!.\n\n$BULLET$Дипломатические [Concept('treaties_with_icon', 'договоры')|e] с другими [Concept('countries', 'державами')], будь то [Concept('alliance', 'союзники')] или [Concept('subject_with_icon', 'ленники')|e], расходуют [Concept('diplomatic_capacity_with_icon', 'дипломатический потенциал')|e]. На панели баланса можно увеличить доступный [Concept('diplomatic_capacity', 'дипломатический потенциал')] за [Concept('gold_with_icon', 'дукаты')|e]."
 lesson_diplomacy_11: "@diplomacy! Текущие отношения"
 lesson_diplomacy_11_desc: "Перейдём в #high раздел текущих отношений#!, чтобы получше узнать связи вашей [Concept('country_with_icon', 'державы')|e]."
 lesson_diplomacy_12: "@diplomacy! Текущие отношения"
 lesson_diplomacy_12_desc: "#high Раздел текущих отношений#! содержит информацию обо всех ваших [Concept('treaties_with_icon', 'договорах')|e], подписанных с другими [Concept('countries_with_icon', 'державами')|e], а также о [Concept('international_organizations_with_icon', 'международных объединениях')|e], в которых вы участвуете.\n\nЕсли у вас есть [Concept('subjects_with_icon', 'ленники')|e], на этой панели ими можно управлять."
 lesson_diplomacy_13: "[country_icon] Известные державы"
 lesson_diplomacy_13_desc: "Далее давайте посмотрим, о каких [Concept('countries_with_icon', 'державах')|e] вам известно."
 lesson_diplomacy_open_known_countries: "Откройте раздел известных держав"
 lesson_diplomacy_14: "[country_icon] Известные державы"
 lesson_diplomacy_14_desc: "В этом #high разделе#! вы найдёте все [Concept('countries_with_icon', 'державы')|e], которые [Concept('discovered_with_icon', 'открыли')|e]. По умолчанию в нём установлен фильтр, чтобы вы видели только державы в пределах своей [Concept('diplomatic_range_with_icon', 'дипломатической дистанции')|e].\n\nЗдесь также удобно отслеживать ваш [Concept('great_power_score_with_icon', 'счёт великой державы')|e]. Если по этому счёту вы занимаете одно из лидирующих мест в мире, то считаетесь [Concept('great_power_with_icon', 'великой державой')|e], что позволит оказывать больше влияния на соседей."
 lesson_diplomacy_15: "[international_organizations_icon] Объединения"
 lesson_diplomacy_15_desc: "Давайте рассмотрим [Concept('international_organizations_with_icon', 'международные объединения')|e]!"
 lesson_diplomacy_open_known_orgs: "Откройте раздел объединений"
 lesson_diplomacy_16: "[international_organization_icon] Объединения"
 lesson_diplomacy_16_desc: "Здесь можно познакомиться с присутствующими в мире [international_organization_icon] [Concept('international_organization', 'международными объединениями')|e]. К их числу относятся #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священная Римская Империя#!#!, #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католическая церковь#!#! и [Concept('personal_unions_with_icon', 'личные унии')|e].\n\nДействия, доступные вам как участнику международного объединения, зависят от самого объединения и от наличия у вас [Concept('special_status', 'особого статуса')|e]."
 lesson_diplomacy_17: "[country_icon] Другие державы"
 lesson_diplomacy_17_desc: "Давайте немного поговорим о других [Concept('countries_with_icon', 'державах')|e]. @leftclick!#high Щёлкните#! по державе на карте, чтобы открыть панель.\n\n#weak Возможно вам понадобится отдалить камеру, чтобы выбрать [Concept('country', 'державу')|e] целиком, поскольку вы выбираете [Concept('locations_with_icon', 'районы')|e] при приближении#!"
 lesson_diplomacy_open_foreign_country: "Откройте панель другой державы, @leftclick!#high щёлкнув#! по державе на карте"
 lesson_diplomacy_18: "[countries_icon] Другие державы"
 lesson_diplomacy_18_desc: "Здесь можно узнать общие сведения о другой [Concept('country_with_icon', 'державе')|e], в том числе о [Concept('ruler_with_icon', 'правителе')|e]. Вкладка [Concept('diplomacy_with_icon', 'дипломатии')|e] напоминает уже знакомый нам раздел текущих отношений. Здесь перечислены [Concept('allies_with_icon', 'союзники')|e], [Concept('rivals_with_icon', 'соперники')|e] и [Concept('subjects_with_icon', 'ленники')|e].\n\nДавайте рассмотрим выделенную карточку дипломатии с кнопками быстрого доступа к распространённым [Concept('diplomatic_actions_with_icon', 'дипломатическим действиям')|e], такие как улучшение [Concept('opinion_with_icon', 'мнения')|e] или поиск [Concept('favors_with_icon', 'благосклонности')|e].\n\n#weak Также можно щёлкнуть #high правой кнопкой мыши#! по названию или флагу державы, чтобы открыть #high контекстное меню#!#!."
 lesson_diplomacy_19: "[diplomatic_action_icon] Дипломатические действия"
 lesson_diplomacy_19b: "[diplomatic_action_icon] Дипломатические действия"
 lesson_diplomacy_19_desc: "В дополнение к общим [Concept('diplomatic_actions_with_icon', 'панели дипломатии')] в отношении конкретной, уже выбранной вами державы."
 lesson_diplomacy_open_actions: "Откройте дипломатические действия, @leftclick!#high щёлкнув#! по названию на карточке державы"
 lesson_diplomacy_20: "[diplomatic_action_icon] Дипломатические действия"
 lesson_diplomacy_20b: "[diplomatic_action_icon] Дипломатические действия"
 lesson_diplomacy_20_desc: "Через #high вкладку дипломатических действий#! мы можем совершать разнообразные [Concept('diplomatic_actions_with_icon', 'дипломатические действия')|e]. Поскольку мы перешли сюда, выбрав [Concept('country_with_icon', 'державу')|e] на карте, эта держава заранее выбрана целью каждого такого действия.\n\nК вашим услугам целый ряд дипломатических действий, хотя некоторые из них доступны только при определённых обстоятельствах. Если вы хотите поддерживать мирные отношения с другими державами, вас должны интересовать три вещи: [Concept('opinion_with_icon', 'мнение')|e], [Concept('trust_with_icon', 'доверие')|e] и [Concept('favors_with_icon', 'благосклонность')|e].\n\nДля начала давайте попробуем [Concept('improve_relations_with_icon', 'улучшить отношения')|e]."
 lesson_diplomacy_confirm_diplo_action: "@leftclick!Нажмите кнопку «Улучшение мнения» в отношении выбранной державы"
 lesson_diplomacy_21: "[diplomatic_action_icon] Дипломатические действия"
 lesson_diplomacy_21_desc: "Отлично! Как только вы подтвердите выбранное [Concept('diplomatic_action_with_icon', 'действие')|e], ваши [Concept('diplomats_with_icon', 'дипломаты')|e] отправятся в указанную [Concept('country_with_icon', 'державу')|e] и начнут выполнять порученное вами действие.\n\n[Concept('improve_relation_with_icon', 'Улучшение отношений')|e] не оказывает моментального эффекта. Оно медленно, месяцами и годами повышает [Concept('opinion_with_icon', 'мнение')|e] о вас. Это же касается и многих других дипломатических действий."
 lesson_admin_28b_desc: "[Concept('missions_with_icon', 'Задания')|e] представляют собой набор этапов, которые призваны показать вам, что можно делать в #high Europa Universalis V#!. Это большая игра, в ней многое нужно освоить, и в этом часть веселья!\n\nВы только что завершили введение в @dip!#high политический стиль игры#!, и теперь вам доступны задания, которые позволят лучше узнать, как пользоваться механиками и панелями, которые мы только обсуждали.\n\nЧтобы упростить для вас знакомство с ними, мы подготовили несколько заданий."
 lesson_diplomacy_has_mission_active: "Начните политическое задание"
 ############ MILITARY ############
 lesson_military_open_military: "Откройте панель военного дела"
 lesson_military_0: "[war_icon] Демонстрация «$PLAYER_PLAYSTYLE_MILITARY$»"
 lesson_military_0b: "[war_icon] Демонстрация «$PLAYER_PLAYSTYLE_MILITARY$»"
 lesson_military_0_desc: "Теперь рассмотрим демонстрацию экспансии! Для начала познакомимся с панелью военного дела."
 lesson_military_1: "@military_panel! Военное дело"
 lesson_military_1_desc: "Здесь представлены ваши [Concept('armies_with_icon', 'армии')|e]. В случае [Concept('war_with_icon', 'войны')|e] можно перемещать [Concept('armies', 'армии')] по карте, чтобы сражаться с [Concept('armies', 'армиями')] неприятеля и [Concept('occupy_with_icon', 'оккупировать')|e] вражеские [Concept('locations_with_icon', 'районы')|e].\n\n[Concept('armies', 'Армии')] состоят из [Concept('regiments_with_icon', 'полков')|e] трёх разных типов.\n\n$BULLET$[levies_with_icon|e] набирается из [Concept('population_with_icon', 'представителей')|e] ваших [Concept('estates_with_icon', 'сословий')|e] — это слабые, но дешёвые в содержании воины.\n\n$BULLET$[regulars_with_icon|e] — это профессиональные солдаты, которым нужно жалование и обучение. Для их подготовки требуются [Concept('manpower_with_icon', 'рекруты')|e].\n\n$BULLET$[Concept('mercenaries_with_icon', 'Наёмников')|e] можно завербовать за [Concept('gold_with_icon', 'дукаты')|e] и отправить на смерть за вашу [Concept('country', 'державу')]… пока вам есть, чем платить.\n\nВ начале игры большинство [Concept('countries_with_icon', 'держав')|e] при ведении [Concept('wars', 'войн')] главным образом полагается на [Concept('levies', 'ополчения')], поставляемые [Concept('estates', 'сословиями')], но с течением времени и по мере открытия [Concept('advances_with_icon', 'улучшений')|e] будет происходить сдвиг в сторону профессиональных [Concept('regiments', 'полков')], которым необходимы [Concept('manpower', 'рекруты')].\n\n[navies_with_icon|e] — это морской эквивалент [Concept('armies', 'армий')], и устроены они похожим образом, с [Concept('navy_levies_with_icon', 'флотским ополчением')|e] и профессиональными [Concept('ships_with_icon', 'кораблями')|e], которым требуются [Concept('sailors_with_icon', 'моряки')|e]."
 lesson_military_2: "[manpower_icon] Рекруты"
 lesson_military_2_desc: "Теперь нужно поговорить о [Concept('manpower_with_icon', 'рекрутах')|e]. Как мы уже говорили, [Concept('manpower', 'рекруты')] необходимы для набора [Concept('regular_regiments_with_icon', 'регулярных полков')|e], и для пополнения, если полки понесут потери.\n\n[Concept('manpower', 'Рекруты')] появляются в военных [Concept('buildings_with_icon', 'сооружениях')|e], где работают #TOOLTIP:POPTYPE,soldiers,X #L солдаты#!#!.\n\n#weak На раннем этапе можно получать рекрутов, возводя #TOOLTIP:BUILDING_TYPE,sergeantry,X #L сержантерии#!#! через панель производства, но по мере изучения новых [Concept('advances_with_icon', 'улучшений')|e] вам станут доступны новые источники.#!\n\n@hint! Узнать больше о [Concept('manpower', 'рекрутах')] можно [Link('hints', 'selected_hint = hint_manpower', 'здесь')]."
 lesson_military_war_0: "[casus_belli_icon] Повод для войны"
 lesson_military_war_0_desc: "Теперь, когда мы обсудили [Concept('armies_with_icon', 'армии')|e] и [Concept('navies_with_icon', 'флот')|e], стоит в целом поговорить о [Concept('war_with_icon', 'войне')|e] и [Concept('casus_belli_with_icon', 'поводах для неё')|e].\n\nВначале одна [Concept('country_with_icon', 'держава')|e] объявляет [Concept('war', 'войну')] другой. Её можно объявить по законной причине, известной как [Concept('casus_belli_with_icon', 'повод для войны')|e], что упростит будущие мирные переговоры. Объявить [Concept('war', 'войну')] без [Concept('casus_belli', 'повода')] тоже можно, но это куда сильнее скажется на вашей [Concept('stability_with_icon', 'стабильности')|e] и [Concept('opinion_with_icon', 'мнении')|e] соседей.\n\nЛучший способ получить повод для войны — запросить его у своего [Concept('parliament_with_icon', 'парламента')|e] через панель правительства. Создание [Concept('spy_networks_with_icon', 'шпионской сети')|e] в другой [Concept('country', 'державе')] также позволит вам сфабриковать повод для войны с ней, если вы считаете [Concept('cores_with_icon', 'национальными')|e] её земли или являетесь друг для друга [Concept('rivals_with_icon', 'соперниками')|e].\n\n#weak При объявлении [Concept('war', 'войны')] стоит помнить, что [Concept('allies_with_icon', 'союзники')|e] и [Concept('subjects_with_icon', 'ленники')|e] ваших врагов, скорее всего, поддержат их! #!\n\n@hint! Узнать больше о [Concept('casus_belli', 'поводах для войны')] можно [Link('hints', 'selected_hint = hint_casus_belli', 'здесь')]."
 lesson_military_war_1: "[war_icon] Война"
 lesson_military_war_1_desc: "Любой [Concept('war_with_icon', 'конфликт')|e] выигрывается за счёт накопления [Concept('war_score_with_icon', 'военного счёта')|e], который можно получить за победы в [Concept('battles_with_icon', 'битвах')|e], успешную [Concept('occupy_with_icon', 'оккупацию')|e] вражеских [Concept('locations_with_icon', 'районов')|e] и, самое главное, за достижение [Concept('war_goal', 'цели войны')|e]. Каждая [Concept('war_with_icon', 'война')|e] ведётся с определённой [Concept('war_goal', 'целью')|e], которая зависит от [Concept('casus_belli_with_icon', 'повода')|e] атакующей стороны.\n\nВ конфликте участвуют два [Concept('war_leaders_with_icon', 'лидера')|e], у каждого из которых может быть несколько [Concept('war_allies_with_icon', 'военных союзников')|e]. Война завершается, когда обе стороны [Concept('peace_treaty_with_icon', 'договариваются о мире')|e].\n\nВо время войны можно [Concept('occupy', 'оккупировать')] вражеские территории, но они не станут полностью вашими, пока война не завершится подписанием [Concept('peace_treaty', 'мирного договора')], который узаконит передачу [Concept('ownership', 'владения')|e].\n\nУзнать больше о [Concept('war', 'войне')], [Concept('battles', 'битвах')] и [Concept('occupy', 'оккупации')] можно здесь:\n[Link('hints', 'selected_hint = hint_war_with_icon', 'Совет о войне')]\n[Link('hints', 'selected_hint = hint_battle_with_icon', 'Совет о битвах')]\n[Link('hints', 'selected_hint = hint_siege_and_occupation_with_icon', 'Совет об оккупации и осаде')]"
 lesson_military_war_2: "[war_exhaustion_icon] Усталость от войны"
 lesson_military_war_2_desc: "Во время [Concept('war_with_icon', 'конфликта')|e] у вашей державы накапливается [Concept('war_exhaustion_with_icon', 'усталость от войны')|e]. Если её станет слишком много, ваши [Concept('armies_with_icon', 'армии')|e] и [Concept('levies_with_icon', 'ополчения')|e] будут хуже [Concept('battle_with_icon', 'сражаться')|e], а ваше [Concept('population_with_icon', 'население')|e] начнёт убывать.\n\nЛучший способ уменьшить усталость от войны — это [Concept('peace_with_icon', 'мирная жизнь')|e]. Впрочем, некоторые [Concept('laws_with_icon', 'правила')|e] и [Concept('estate_privileges_with_icon', 'сословные привилегии')|e] постепенно уменьшают эту усталость.\n\n@hint! Узнать больше об [Concept('war_exhaustion', 'усталости от войны')] можно [Link('hints', 'selected_hint = hint_war_exhaustion', 'здесь')]."
 lesson_military_war_3: "[war_icon] Контроль над новыми территориями"
 lesson_military_war_3_desc: "Новые завоёванные земли не принесут вам пользу сразу. Помните, что для этого вам нужно [Concept('control_with_icon', 'контролировать')|e] [Concept('locations_with_icon', 'районы')|e]. Возможно, чтобы улучшить их [Concept('proximity_with_icon', 'досягаемость')|e], придётся вложить значительные средства в развитие инфраструктуры.\n\nКроме того, [Concept('conquered_with_icon', 'завоёванная')|e] земля облагается серьёзными штрафами, пока вы не [Concept('integrate_with_icon', 'интегрируете')|e] её с помощью [Concept('cabinet_action_with_icon', 'действий совета')|e]. По этой причине желательно ставить во главе новой завоёванной земли [Concept('subject_with_icon', 'ленника')|e], который будет управлять ею от вашего имени.\n\n#italic Узнать больше об интеграции можно здесь: [Link('hints', 'selected_hint = hint_has_conquered_provinces_with_icon', '$hint_has_conquered_provinces$')]."
 lesson_military_open_geopolitics: "Откройте панель геополитики"
 lesson_military_8: "@geopolitics_panel! Геополитика"
 lesson_military_8_desc: "Напоследок стоит обратить внимание на @geopolitics_panel! #high панель геополитики#!, чтобы узнать о механиках, которые могут пригодиться в будущих [Concept('ages', 'эпохах')|e]: [exploration_with_icon|el] и [colonization_with_icon|el]!"
 lesson_military_9: "@geopolitics_panel! Геополитика"
 lesson_military_9_desc: "Со временем, особенно в эпоху #TOOLTIP:AGE,age_3_discovery,X #L Открытий#!#!, многие [Concept('countries_with_icon', 'державы')|e] начнут снаряжать [Concept('exploration_with_icon', 'экспедиции')|e]. На этой панели представлены возможные экспедиции, а также подходящие земли для [Concept('colonization_with_icon', 'колонизации')|e], если у вас есть возможность до них добраться. Вы будете увеличивать свою [Concept('colonial_range_with_icon', 'колонизационную дистанцию')|e] по мере изучения соответствующих [Concept('advances_with_icon', 'улучшений')|e].\n\nНа других вкладках этой панели также приведена полезная информация о ваших землях: вы можете изучить различные [Concept('provinces_with_icon', 'провинции')|e] вашей [Concept('country_with_icon', 'державы')|e], а также свирепствующие в мире [Concept('diseases_with_icon', 'эпидемии')|e]. Если вы [Concept('own', 'владеете')|e] [Concept('coastal', 'прибрежными')] [Concept('location_with_icon', 'районами')|e], то увидите список значимых для вас [Concept('seazones_with_icon', 'акваторий')|e] и ваше [Concept('maritime_presence_with_icon', 'морское присутствие')|e] в них, а также риск появления [Concept('pirates_with_icon', 'пиратов')|e] и [Concept('privateers_with_icon', 'каперов')|e]."
 lesson_admin_28c_desc: "[Concept('missions_with_icon', 'Задания')|e] представляют собой набор этапов, которые призваны показать вам, что можно делать в #high Europa Universalis V#!. Это большая игра, в ней многое нужно освоить, и в этом часть веселья!\n\nВы только что завершили введение в @mil!#high экспансионистский стиль игры#!, и теперь вам доступны задания, которые позволят лучше узнать, как пользоваться механиками и панелями, которые мы обсуждали.\n\nЧтобы упростить для вас знакомство с ними, мы подготовили несколько заданий."
 lesson_military_has_mission_active: "Начните военное задание"
