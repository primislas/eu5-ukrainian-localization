 ############ CORE ############
 lesson_basics_welcome: "@caesar! Добро пожаловать в #italic Europa Universalis V#!"
 lesson_welcome_desc: "Вы олицетворяете дух своего народа, и вам решать, как эти люди будут жить около пяти следующих веков своей истории.\n\nВы можете завоевать весь мир, построить идеальное общество или стать могучей экономической державой. Какой бы путь вы ни выбрали, история в ваших руках."
 lesson_basics_camera: "@caesar! Камера и управление"
 lesson_basics_camera_desc: "Для начала пробежимся по основам. В первую очередь научимся ориентироваться на карте, ведь она — главный элемент игры.\n\nПросматривать карту можно с помощью клавиш @key_w!, @key_a!, @key_s! и @key_d!.\n\n@centerscroll!#high Колесо мыши#! приближает и отдаляет карту.\n\nЧтобы увидеть сразу весь мир, зажмите @key_tab!."
 lesson_basics_nested_tooltips: "@caesar! Подсказки"
 lesson_basics_nested_tooltips_complete: "@caesar! Подсказки"
 lesson_basics_nested_tooltips_desc: "Игровые понятия выделяются синим цветом — по ним можно щёлкнуть, чтобы увидеть подробное описание определённого элемента игровой механики. Для примера возьмём понятие [Concept('country_with_icon', 'держава')|e].\n\nПо умолчанию после появления вложенной подсказки нужно задержать на ней курсор, пока она не зафиксируется, а затем можно наводить курсор на другие ссылки в тексте и вызывать дополнительные подсказки. Также зафиксировать подсказку можно с помощью @centerclick!#high средней кнопки мыши#!.\n\nИзменить эти настройки можно в меню #high Настройки (@key_escape!) > Интерфейс > Настройки подсказок#!."
 lesson_basics_tooltips_in_tooltips_hover_word: "Наведите курсор на синий текст"
 lesson_basics_nested_tooltips_continue: "Наведите курсор на вложенную подсказку"
 lesson_basics_your_nation: "[country_icon] Ваша держава"
 lesson_basics_your_nation_desc: "В #high Europa Universalis V#! вы — #high дух нации#!, незримая сущность вашей [Concept('country_with_icon', 'державы')|e].\n\n[country_icon] [GetPlayer.GetLongName] — это ваша [Concept('country', 'держава')] в данный момент. [GetPlayer.GetGovernment.GetRuler.GetShortName] — её [Concept('ruler_with_icon', 'правитель')|e]."
 lesson_basics_top_bar: "@caesar! Верхняя панель"
 lesson_basics_top_bar_desc: "На #high верхнюю панель#! вынесено несколько элементов. Она всегда остаётся на этом месте, чтобы вы могли быстро узнать, как живёт [Concept('country_with_icon', 'держава')|e].\n\nОбратите внимание на дату в верхнем правом углу — всё происходит в #high реальном времени#!. Но не волнуйтесь, сейчас игра стоит на паузе."
 lesson_basics_estates: "@caesar! Верхняя панель"
 lesson_basics_estates_desc: "В крайнем левом разделе верхней панели отображаются [Concept('estates_with_icon', 'сословия')|e] — влиятельные группы в [Concept('country_with_icon', 'державе')|e]. Игрок относится к сословию «[GetEstateName('crown_estate')]».\n\nО сословиях поговорим позднее, а пока просто запомните, что каждое из них претендует на долю состояния и власти державы, а также обладает уровнем [Concept('estate_satisfaction_with_icon', 'довольства')|e], за которым можно следить на верхней панели.\n\nРаспределение власти между сословиями происходит неравномерно, а некоторым державам доступны уникальные сословия."
 lesson_basics_resources: "@caesar! Верхняя панель"
 lesson_basics_resources_desc: "Теперь рассмотрим разделы верхней панели, посвящённые ресурсам и статистике. Они располагаются в середине панели и позволяют отслеживать важнейшие ресурсы для управления [Concept('country_with_icon', 'державой')|e].\n\nНа большинство действий в игре расходуются [Concept('gold_with_icon', 'дукаты')|e] — от выплаты солдатских жалований до строительства городов. Но разумеется, самый важный ресурс — это [Concept('population_with_icon', 'население')|e], фундамент вашей политики, экономики и армии.\n\nКроме того, крайне важен показатель [Concept('stability_with_icon', 'стабильности')|e] — это мера внутренней устойчивости державы, которая влияет на верность [Concept('estates', 'сословий')] и [Concept('population', 'населения')]. Стабильность позволяет влиять на политику [Concept('country', 'державы')].\n\nВ своё время мы обсудим остальные показатели, а пока продолжим."
 lesson_basics_time_and_research: "@caesar! Время"
 lesson_basics_time_and_research_desc: "#high Europa Universalis V#! охватывает несколько веков мировой истории. Текущая дата отображается в правом верхнем углу экрана, там же можно управлять скоростью игры.\n\nВсё игровое время разделено на шесть [Concept('ages', 'эпох')|e]. Сейчас длится эпоха #TOOLTIP:AGE,age_1_traditions,X #L Традиций#!#!, которая в #high 1342#! году сменится эпохой #TOOLTIP:AGE,age_2_renaissance,X #L Возрождения#!#!. В каждую эпоху можно исследовать новые [Concept('advances_with_icon', 'улучшения')|e].\n\nКак мы уже говорили, сейчас игра на паузе, поэтому вы ничего не упустите."
 lesson_basics_wrap_up_0: "@caesar! Основные панели"
 lesson_basics_wrap_up_0_desc: "Давайте рассмотрим базовые элементы интерфейса. В верхнем левом углу расположены восемь панелей — им вы будете уделять самое пристальное внимание во время игры.\n\nЭто @government_panel![Link('government', '', 'правительство')], @economy_panel![Link('economy', '', 'экономика')], @production_panel![Link('production', '', 'производство')], @society_panel![Link('country_culture', '', 'общество')], @diplomacy_panel![Link('diplomacy', '', 'дипломатия')], @military_panel![Link('unit_overview', '', 'армия')], @geopolitics_panel![Link('expansion', '', 'геополитика')] и @advances_panel![Link('advances', '', 'улучшения')]."
 lesson_basics_wrap_up_2: "@hint! Советы"
 lesson_basics_wrap_up_2b: "Hints 2b"
 lesson_basics_wrap_up_2_desc: "Помимо окон с игровыми понятиями, которые встречаются в игре повсеместно, некоторые элементы игровой механики сопровождаются советами — это более подробные описания с примерами.\n\nПолучить совет можно в любой момент через @hint![Link('hints', '', 'панель советов')].\n\n@hint! Если вы видите этот значок в подсказке, щёлкните по нему, чтобы открыть соответствующий совет."
 lesson_basics_open_hints: "Откройте панель советов"
 lesson_basics_close_hints: "Закройте панель советов"
 lesson_core_loop_0: "@caesar! Введение в игровой процесс"
 lesson_core_loop_0_desc: "#high Europa Universalis V#! — масштабная игра, открывающая перед игроком бесчисленное множество стратегий и возможностей.\n\nВы — безжалостный завоеватель? А может, хитроумный политик? Или правитель, владеющий секретами царя Мидаса? В любом случае начать вам предстоит с основ. Давайте же с ними познакомимся!"
 lesson_core_loop_1: "[gold_icon] Баланс"
 lesson_core_loop_1_desc: "Мы уже упоминали, что [Concept('gold_with_icon', 'дукаты')|e] — один из важнейших игровых ресурсов. Ими оплачивается большинство действий, и зачастую успех ваших попыток диктовать свою волю внутри и вне границ [Concept('country_with_icon', 'державы')|e] будет зависеть от доступного вам богатства. Путь к власти над миром вымощен золотом и кровью.\n\nБольшей частью финансов можно управлять на [Link('economy', '', '@economy_panel! панели баланса')]. Рассмотрим её повнимательнее."
 lesson_core_loop_open_balance: "Откройте панель баланса"
 lesson_core_loop_2: "[gold_icon] Баланс"
 lesson_core_loop_2_desc: "Это сводка о вашем [Concept('budget_with_icon', 'балансе')|e]. Разница между [Concept('income_with_icon', 'доходами')|e] и [Concept('expenses_with_icon', 'расходами')|e] в конце каждого месяца отправляется в вашу [Concept('treasury_with_icon', 'казну')|e]. Двигайте ползунки на этой панели, чтобы управлять ежемесячным [Concept('balance', 'балансом')].\n\nКак мы только что увидели, разница между ежемесячными доходами и расходами также отображается на #high верхней панели#!."
 lesson_core_loop_3: "[taxes_icon] Налоги"
 lesson_core_loop_3_desc: "Богатство державы в #high Europa Universalis V#! ежемесячно обеспечивают принадлежащие вам территории — [Concept('locations_with_icon', 'районы')|e].\n\nО районах мы поговорим позднее, а пока наведите курсор на значение [Concept('tax_base_with_icon', 'налоговой базы')|e] в верхнем левом углу, чтобы увидеть сводку по самым богатым районам. [country_icon] [Player.GetLongName] получа[Player.Custom('endlong_etyut')] [Concept('gold_with_icon', 'дукаты')|e] именно отсюда."
 lesson_core_loop_4: "[taxes_icon] Налоги"
 lesson_core_loop_4_desc: "Однако эти [Concept('gold_with_icon', 'дукаты')|e] не отправляются в вашу [Concept('treasury_with_icon', 'казну')|e] напрямую. Правительство собирает [Concept('taxes_with_icon', 'налоги')|e] с ваших [Concept('estates_with_icon', 'сословий')|e] и получает только долю их [Concept('tax_base_with_icon', 'налоговой базы')|e].\n\nС помощью ползунков на панели баланса можно настраивать уровень налогообложения. Обратите внимание: чем больше взимается налогов, тем ниже [Concept('estate_satisfaction_with_icon', 'довольство сословия')|e]. Сословиям не нравится платить налоги.\n\n[Concept('maximum_tax_with_icon', 'Максимальный налог')|e], который можно собирать с каждого сословия, зависит от множества факторов, например его влиятельности. Бывает, что взыскать налог с сословия вовсе невозможно.\n\nПока что лучше всего автоматизировать налогообложение — для этого щёлкните по значку @automation! #W шестерёнки#!. В результате налоги будут достаточно большими, но при этом [estate_satisfaction_icon] не опустится ниже #G 50%#!, как только вы снимете игру с паузы."
 lesson_core_loop_automate_taxes: "Автоматизируйте налоги для всех сословий"
 lesson_core_loop_5: "[income_icon] Ежемесячный доход"
 lesson_core_loop_5_desc: "Ещё один вид [Concept('income_with_icon', 'дохода')|e] помимо [Concept('taxes_with_icon', 'налогообложения')|e] — это [Concept('minting_with_icon', 'чеканка монет')|e]. Их можно чеканить свободно, но слишком большое количество вызовет [Concept('inflation_with_icon', 'инфляцию')|e].\n\nУзнать больше об [Concept('inflation', 'инфляции')] можно [Link('hints', 'selected_hint = hint_inflation_with_icon', 'здесь')]."
 lesson_core_loop_minting: "Переместите ползунки чеканки, чтобы отчеканить несколько звонких дукатов"
 lesson_core_loop_inflation: "Постарайтесь не вызвать инфляцию"
 lesson_core_loop_6: "[income_icon] Ежемесячный доход"
 lesson_core_loop_6_desc: "Ещё два распространённых источника [Concept('income_with_icon', 'доходов')|e] — [Concept('trade_with_icon', 'торговля')|e] и [Concept('food_with_icon', 'пища')|e]. Эти понятия довольно обширны, поэтому пока мы не будем их подробно рассматривать. Когда будете готовы их изучить, откройте эти советы:\n\n$TAB$[Link('hints', 'selected_hint = hint_trade_with_icon', 'Совет по торговле')]\n$TAB$[Link('hints', 'selected_hint = hint_food_with_icon', 'Совет по пище')]"
 lesson_core_loop_7: "@caesar! Возобновление игры"
 lesson_core_loop_7_desc: "Давайте ненадолго возобновим ход игрового времени, а затем посмотрим на [Concept('expenses_with_icon', 'расходы')|e].\n\n#high Скорость#! игрового времени можно настроить на #high верхней панели#!. Неплохой темп в начале игры — #high 3#! или #high 4#!, но у каждого игрока тут свои предпочтения.\n\nТакже можно нажать @key_space!, чтобы поставить игру на #high паузу#! и #high возобновить#! её в любой момент."
 lesson_core_loop_unpause_month: "Возобновите игру и дождитесь конца месяца, когда показатели обновятся"
 lesson_core_loop_7b: "@caesar! Возобновление игры"
 lesson_core_loop_7b_desc: "Хорошо! Прошёл месяц, и мы вновь ставим игру на #high паузу#!.\n\nОбратите внимание, что показатели изменились, а ваши [Concept('estates_with_icon', 'сословия')|e] выплачивают [Concept('taxes_with_icon', 'налоги')|e] в заданном размере. Множество игровых расчётов происходит в конце месяца.\n\nТеперь изучим [Concept('expenses_with_icon', 'расходы')|e]."
 lesson_core_loop_8: "[expenses_icon] Ежемесячные расходы"
 lesson_core_loop_8_desc: "Обычно [Concept('gold_with_icon', 'дукаты')|e] тратятся сразу, как совершается то или иное действие. Но даже если вы не расходуете [Concept('gold', 'дукаты')] активно, на ваш [Concept('budget_with_icon', 'баланс')|e] всё равно ложится нагрузка в виде регулярных ежемесячных [Concept('expenses_with_icon', 'расходов')|e].\n\n[Concept('gold', 'Дукаты')] можно тратить на повышение [Concept('stability_with_icon', 'стабильности')|e] и [Concept('legitimacy_with_icon', 'легитимности')|e] — два этих важнейших показателя мы уже видели на #high верхней панели#!. Лучше всего добиться положения, при котором они не будут хотя бы снижаться.\n\nЗатраты на [Concept('maintenance_with_icon', 'содержание')|e] регулярных [Concept('armies_with_icon', 'армий')|e], [Concept('navies_with_icon', 'флотов')|e] и действующих [Concept('fortifications_with_icon', 'укреплений')|e] могут заметно ударить по [Concept('budget', 'балансу')]. В мирное время будет разумным ходом уменьшить расходы на их [Concept('maintenance', 'содержание')]."
 lesson_core_loop_positive_income: "С помощью ползунков баланса добейтесь его положительного ежемесячного значения"
 lesson_core_loop_9: "[budget_icon] Баланс: итоги"
 lesson_core_loop_9_desc: "Прекрасно! Вы разобрались в основах управления [Concept('budget_with_icon', 'балансом')|e]. Подведём краткий итог:\n\n$BULLET$[Concept('income_with_icon', 'Доходы')|e] и [Concept('expenses_with_icon', 'расходы')|e] подсчитываются в конце месяца.\n\n$BULLET$Получаемые в [Concept('locations_with_icon', 'районах')|e] [Concept('gold_with_icon', 'дукаты')|e] собирают [Concept('estates', 'сословия')], вы взимаете [Concept('tax_with_icon', 'налоги')|e] с сословий и пополняете [Concept('treasury_with_icon', 'казну')|e].\n\n$BULLET$Обычно [Concept('estates_with_icon', 'сословия')|e] платят налоги без особого энтузиазма.\n\n\nНо вы уже наверняка задаётесь вопросом: «Да кто такие эти [Concept('estates', 'сословия')], и почему они не выполняют каждый наш каприз?»"
 lesson_estates_1: "[estates_icon] Правители и сословия"
 lesson_estates_1_desc: "[Concept('estates_with_icon', 'Сословия')|e] в #high Europa Universalis V#! — это один из ключевых элементов игры. Они не только платят [Concept('taxes_with_icon', 'налоги')|e], но и во всём помогают, если верны вам, или же гнусно вредят, если не лояльны.\n\nРассмотрим их поближе на @government_panel![Link('government', 'tabcontent = estates', 'панели правительства')]."
 lesson_estates_2: "[crown_power_icon] Правители"
 lesson_estates_2_desc: "Перед вами [Concept('estates_with_icon', 'сословия')|e] — это социальные группы, обладающие [Concept('political_power', 'политическим весом')] в вашей [Concept('country_with_icon', 'державе')|e]. У каждого из них своя доля [Concept('estate_power_with_icon', 'сословной власти')|e]. Лично вы воплощаете собой нацию, поэтому относитесь к сословию «[GetEstateName('crown_estate')]».\n\nС помощью [Concept('crown_power_with_icon', 'власти правителя')|e] можно непосредственно влиять на определённые интересы [Concept('estate', 'сословий')]: она позволяет повышать [Concept('taxes_with_icon', 'налоги')|e], влияет на рост вашей поддержки в [Concept('parliament_with_icon', 'парламенте')|e] и [Concept('estate_satisfaction_with_icon', 'довольства сословий')|e], упрощает изменение [Concept('laws_with_icon', 'правил')|e] и позволяет забирать часть доходов от [Concept('trade_with_icon', 'торговли')|e].\n\n@hint! Узнать больше о власти правителя можно [Link('hints', 'selected_hint = hint_crown_power', 'здесь')]."
 lesson_estates_3: "[estates_icon] Сословия"
 lesson_estates_3_desc: "При правильном обращении [Concept('estates_with_icon', 'сословия')|e] вам сильно помогут, но если их разозлить, они быстро превратятся в досадную занозу.\n\nПомимо уплаты [Concept('taxes_with_icon', 'налогов')|e] в вашу казну, [Concept('estates', 'сословия')] играют важную роль во время [Concept('war_with_icon', 'войны')|e], так как предоставляют [Concept('levies_with_icon', 'ополчение')|e] — до тех пор, пока вы не заведёте [Concept('regular_regiments_with_icon', 'регулярные войска')|e].\n\nНо если сословия перестанут быть вам верны, то у них появится возможность поддержать [Concept('rebellions_with_icon', 'мятежи')|e], устроить [Concept('civil_war_with_icon', 'гражданскую войну')|e] и свергнуть вас.\n\nИ, наконец, при довольстве выше #G 50%#! [estate_satisfaction_icon] сословия дают вашей [Concept('country_with_icon', 'державе')|e] различные преимущества, а недовольство сословий влечёт за собой штрафы."
 lesson_estates_4: "[privileges_icon] Привилегии"
 lesson_estates_4_desc: "[Concept('estates', 'Сословиям')] можно даровать [Concept('privileges_with_icon', 'привилегии')|e], которые обычно повышают [Concept('estate_satisfaction_with_icon', 'довольство')|e] и увеличивают [Concept('estate_power_with_icon', 'сословную власть')|e], а также тем или иным образом влияют на державу и ваш народ.\n\nОтмена привилегий разозлит и ослабит сословие. Это рискованное действие с высокой вероятностью обрушит [Concept('stability_with_icon', 'стабильность')|e].\n\nТаким образом, привилегии усиливают власть сословий (и, соответственно, ослабляют вашу [Concept('crown_power_with_icon', 'власть правителя')|e]), но иногда это может быть для вас выгодно. Своевременная раздача привилегий нужным сословиям может быть мудрым решением, благодаря которому можно, например, задавить [Concept('rebellion_with_icon', 'мятежные настроения')|e] в зародыше. Ни один монарх не может править в одиночку."
 lesson_estates_5: "[pop_type_icon|e] Общественные классы"
 lesson_estates_5_desc: "[Concept('estates_with_icon', 'Сословная')|e] [Concept('estate_power_with_icon', 'власть')|e] зависит не только от [Concept('privileges', 'привилегий')], но по большей части от социального состава вашего [Concept('population_with_icon', 'населения')|e].\n\n[Concept('population', 'Оно')] состоит из нескольких [Concept('pop_types_with_icon', 'общественных классов')|e], каждый из которых оказывает поддержку определённому [Concept('estate', 'сословию')]:\n\n$BULLET_WITH_TAB$[GetEstateName('nobles_estate')] получают поддержку от класса @nobles! #TOOLTIP:POPTYPE,nobles,X #L аристократии#!#!\n$BULLET_WITH_TAB$[GetEstateName('clergy_estate')] получают поддержку от класса @clergy! #TOOLTIP:POPTYPE,clergy,X #L духовенства#!#!\n$BULLET_WITH_TAB$[GetEstateName('burghers_estate')] получают поддержку от класса @burghers! #TOOLTIP:POPTYPE,burghers,X #L городских жителей#!#!\n$BULLET_WITH_TAB$[GetEstateName('peasants_estate')] получают поддержку от следующих классов:\n$TAB$$BULLET_WITH_TAB$@peasants! #TOOLTIP:POPTYPE,peasants,X #L крестьяне#!#!, @laborers! #TOOLTIP:POPTYPE,laborers,X #L рабочие#!#! и @soldiers! #TOOLTIP:POPTYPE,soldiers,X #L солдаты#!#!.\n\n[Concept('population', 'Население')] живёт и умирает в разных [Concept('locations_with_icon', 'районах')|e] вашей карты. Рассмотрим эти территории повнимательнее."
 lesson_map_1: "[known_world_icon] Карта"
 lesson_map_1_desc: "В мире #high Europa Universalis V#! есть множество [Concept('countries_with_icon', 'держав')|e], каждая из которых владеет различными [Concept('locations_with_icon', 'районами')|e] карты. На этих территориях добываются ресурсы и набираются рекруты для противостояния с другими странами.\n\nОтдалив камеру, можно увидеть на карте названия [Concept('country', 'держав')]. Если навести на название курсор, появится небольшая подсказка о [Concept('country', 'державе')], а при щелчке по нему откроется #high панель державы#!, где можно узнать больше подробностей и выбрать, как с ней взаимодействовать."
 lesson_trigger_zoom_out: "@centerscroll! Отдалите камеру, чтобы увидеть державы"
 lesson_trigger_foreign_country: "Откройте панель чужой державы, @leftclick!#high щёлкнув по её названию левой кнопкой#!"
 lesson_map_2: "[known_world_icon] Карта"
 lesson_map_2_desc: "В #high Europa Universalis V#! основу экономической и политической жизни [Concept('countries_with_icon', 'державы')|e] составляют [Concept('locations_with_icon', 'районы')|e]. Именно здесь живут [Concept('population_with_icon', 'люди')|e] разных [Concept('pop_types_with_icon', 'классов')|e], [Concept('religions_with_icon', 'религий')|e] и [Concept('cultures_with_icon', 'культур')|e], которые производят [Concept('goods_with_icon', 'товары')|e] и генерируют [Concept('tax_base_with_icon', 'налоговую базу')|e].\n\n[Concept('locations', 'Районы')] бывают трёх [Concept('location_rank_with_icon', 'рангов')|e]:\n$BULLET_WITH_TAB$@city! #TOOLTIP:LOCATIONRANK,city,X #L город#!#!\n$BULLET_WITH_TAB$@town! #TOOLTIP:LOCATIONRANK,town,X #L городок#!#!\n$BULLET_WITH_TAB$@rural_settlement! #TOOLTIP:LOCATIONRANK,rural_settlement,X #L сельская территория#!#!\n\nКаждый ранг отличается набором [Concept('pop_types', 'общественных классов')], [Concept('buildings_with_icon', 'сооружений')|e] и модификаторов."
 lesson_map_3: "[known_world_icon] Карта"
 lesson_map_3_desc: "Важнейшим [Concept('location_with_icon', 'районом')|e] любой [Concept('country_with_icon', 'державы')|e] является её [Concept('capital_with_icon', 'столица')|e]. Ваша [Concept('capital', 'столица')] — [Player.GetCapital.GetName]. На карте она отмечена золотой звездой внутри значка [Concept('location_rank', 'ранга')|e] (@city_capital!/@town_capital!/@rural_settlement_capital!).\n\n$BULLET$Если @leftclick!#high дважды щёлкнуть#! по флагу своей державы на #high верхней панели#!, можно переместить камеру к столице.\n\n$BULLET$А чтобы найти любой [Concept('location', 'район')], можно нажать @key_f! и набрать в окне [Link('find_location', '', '@finder_panel!поиска')] его название."
 lesson_trigger_zoom_in: " @centerscroll! Приблизьте камеру, чтобы увидеть районы"
 lesson_trigger_capital: "@leftclick!#high Щёлкните#! по своей столице, городу [Player.GetCapital.GetNameWithNoTooltip]"
 lesson_control_groups_1: "@caesar! Контрольные группы"
 lesson_control_groups_1_desc: "Прежде чем ознакомиться со столицей, давайте для начала рассмотрим #high контрольные группы#!. Они располагаются в нижней части экрана и служат для быстрого доступа к различным элементам игры.\n\nТак, вы можете назначить [Concept('locations_with_icon', 'районы')|e], [Concept('countries_with_icon', 'державы')|e], [Concept('markets_with_icon', 'рынки')|e], [Concept('armies_with_icon', 'армии')|e] и прочие элементы на удобные вам цифровые клавиши. Попробуйте назначить в контрольную группу свою [Concept('capital_with_icon', 'столицу')|e], город [location_icon] [Player.GetCapital.GetNameWithNoTooltip].\n\nДля этого откройте панель города и нажмите клавиши #high Ctrl + 1#!."
 lesson_basics_click_map: "@leftclick!#high Щёлкните#! по городу [Player.GetCapital.GetNameWithNoTooltip]"
 lesson_basics_assign_control_group: "Нажмите #high Ctrl+1#!, чтобы добавить город в контрольную группу"
 lesson_control_groups_2: "@caesar! Контрольные группы"
 lesson_control_groups_2_desc: "Отлично! Теперь, нажав выбранную клавишу, вы переместитесь к городу [location_icon] [Player.GetCapital.GetName] и откроете его панель.\n\nЧтобы очистить контрольную группу, можно щёлкнуть по ней @rightclick!#high правой кнопкой мыши#! или вновь нажать #high Ctrl#! и соответствующую клавишу."
 lesson_location_1: "[location_icon] Район"
 lesson_location_1_desc: "Теперь давайте изучим #high панель района#!.\n\nВ каждом [Concept('location_with_icon', 'районе')|e] живут представители разных [Concept('pop_types_with_icon', 'общественных классов')|e]. Как вы уже видели, [Concept('pops_with_icon', 'группы населения')|e] увеличивают [Concept('estate_power_with_icon', 'власть')|e] своих [Concept('estate_with_icon', 'сословий')|e].\n\nКоличество [Concept('pops', 'групп населения')] в каждом [Concept('pop_type', 'классе')] зависит прежде всего от [Concept('buildings_with_icon', 'сооружений')|e] [Concept('location', 'района')]. Их можете строить вы или сами сословия, а для работы там требуются представители конкретных [Concept('pop_type', 'классов')]. Когда сооружение будет возведено, @peasants! #TOOLTIP:POPTYPE,peasants,X #L Крестьяне#!#! автоматически [Concept('promote_with_icon', 'повысятся')|e] до нужного [Concept('pop_type', 'класса')], чтобы занять там рабочие места.\n\nНекоторые [Concept('buildings', 'сооружения')] производят [Concept('goods_with_icon', 'товары')|e], которые затем продаются на [Concept('market_with_icon', 'рынке')|e] и тем самым формируют [Concept('wealth_with_icon', 'богатство')|e] [Concept('location', 'района')]."
 lesson_location_2: "[rgo_icon] Добыча ресурсов"
 lesson_location_2_desc: "Когда игра начинается, ещё не во всех [Concept('locations_with_icon', 'районах')|e] есть [Concept('buildings_with_icon', 'сооружения')|e], но при этом каждый из них специализируется на производстве конкретного [Concept('good_with_icon', 'товара')|e] в местах #high [Concept('rgo_with_icon', 'добычи')|e]#! — это особый вид сооружений, где @laborers! #TOOLTIP:POPTYPE,laborers,X #L рабочие#!#! добывают [Concept('raw_materials_with_icon', 'ресурсы')|e].\n\nКак и в случае с [Concept('buildings', 'сооружениями')], [Concept('goods', 'товары')] из мест [Concept('rgo', 'добычи ресурсов')] продаются на местном [Concept('market_with_icon', 'рынке')|e], формируя [Concept('tax_base_with_icon', 'налоговую базу')|e] [Concept('location', 'района')]. Поначалу большую часть этой [Concept('tax_base', 'базы')] будет формировать [Concept('rgo', 'добыча ресурсов')].\n\n@hint! Узнать больше о [Concept('markets', 'рынках')] можно [Link('hints', 'selected_hint = hint_markets', 'здесь')]."
 lesson_location_3: "[wealth_icon] Богатство районов"
 lesson_location_3b: "[wealth_icon] Богатство районов"
 lesson_location_3_desc: "Как мы уже увидели, доходы от [Concept('buildings_with_icon', 'сооружений')|e] и [Concept('rgo_with_icon', 'добычи ресурсов')|e] формируют [Concept('wealth_with_icon', 'богатство')|e] [Concept('location_with_icon', 'района')|e]. Затем [Concept('wealth', 'богатство')] распределяется между [Concept('estates_with_icon', 'сословиями')|e] согласно их численности в данном [Concept('location', 'районе')].\n\nУчтите, что лишь часть этих [Concept('gold_with_icon', 'дукатов')|e] доходит до вашей казны в виде [Concept('taxes_with_icon', 'налогов')|e].\n\n#weak К примеру, [Concept('wealth', 'богатство')] [Player.GetCapital.Custom('LR_GEN')|l] [location_icon] [Player.GetCapital.GetName] составляет [Player.GetCapital.GetTotalPossibleTaxBase|2W] [tax_base_icon], с которых [Concept('estates', 'сословия')] выплачивают [Player.GetCapital.GetTotalIncome|2g][gold_icon] налогов.#!"
 lesson_basics_hover_tax_base: "Наведите курсор на богатство, чтобы посмотреть, как именно оно распределяется между сословиями"
 lesson_location_3_recap: "@caesar! Подведём итоги!"
 lesson_location_3_recap_desc: "[Concept('buildings_with_icon', 'Сооружения')|e] и [Concept('rgo_with_icon', 'места добычи ресурсов')|e] в ваших [Concept('locations_with_icon', 'районах')|e] используют наёмный труд [Concept('pops_with_icon', 'групп населения')|e], чтобы создавать [Concept('wealth_with_icon', 'богатство')|e]. [Concept('wealth', 'Богатство')] затем распределяется между вашими [Concept('estates_with_icon', 'сословиями')|e], которые в свою очередь обеспечивают вас [Concept('taxes_with_icon', 'налогами')|e] и [Concept('levies_with_icon', 'ополчением')|e]."
 lesson_location_4: "[control_icon] Контроль"
 lesson_location_4_desc: "Однако условия во всех [Concept('locations_with_icon', 'районах')|e] разные. Давайте поговорим о [Concept('control_with_icon', 'контроле')|e] — одной из важнейших характеристик района.\n\n[Concept('control', 'Контроль')] отражает степень влияния центрального правительства на конкретный район. Помимо прочего, этот показатель определяет [Concept('tax_base_with_icon', 'налоговую базу')|e] района, то есть долю его [Concept('wealth_with_icon', 'богатства')|e], с которой вы можете получать [Concept('taxes_with_icon', 'налоги')|e]. Богатство, которое не находится под вашим контролем, [Concept('taxes', 'налогами')] не облагается и полностью достаётся вашим [Concept('estates_with_icon', 'сословиям')|e].\n\n#weak Вы [Concept('control', 'контролируете')] свою [Concept('capital', 'столицу')] на #W 100%#!, поэтому налоговая база составляет #W 100%#! её богатства и вам поступают налоги со всех доходов столицы.#!"
 lesson_location_5: "[proximity_icon] Досягаемость"
 lesson_location_5_desc: "[Concept('control_with_icon', 'Контроль')|e] над [Concept('location_with_icon', 'районом')|e] напрямую зависит от его [Concept('proximity_with_icon', 'досягаемости')|e] по отношению к вашей [Concept('capital_with_icon', 'столице')|e].\n\nВот почему [Concept(capital', 'столица')] является одним из важнейших [Concept('locations', 'районов')]: здесь у вас всегда много [Concept('control', 'контроля')], а значит, местные [Concept('buildings_with_icon', 'сооружения')|e] и места [Concept('rgo_with_icon', 'добычи ресурсов')|e] приносят вам наибольший [Concept('income_with_icon', 'доход')|e].\n\n@hint! Узнать больше о [Concept('proximity', 'досягаемости')] и [Concept('proximity', 'контроле')] можно [Link('hints', 'selected_hint = hint_control', 'здесь')]."
 lesson_mapmodes_1: "@mapmode! Режимы карты"
 lesson_mapmodes_1_desc: "Давайте рассмотрим #high режимы карты#!. Это фильтры, которые позволяют отдельно анализировать различные мировые показатели на карте.\n\nПопробуйте навести курсор на подсказку о [Concept('control_with_icon', 'контроле')|e], открыв панель района. В правом верхнем углу окна подсказки вы увидите кнопку для переключения режима карты. @leftclick!#high Щёлкнув#! по этой кнопке, вы увидите [Concept('control', 'контроль')] во всех ваших [Concept('locations_with_icon', 'районах')]."
 lesson_basics_control_mapmode: "Наведите курсор на подсказку о контроле"
 lesson_basics_control_mapmode_2: "@leftclick!#high Щёлкните#! по кнопке режима карты в заголовке подсказки, чтобы увидеть контроль"
 lesson_mapmodes_1b: "@mapmode! Режимы карты"
 lesson_mapmodes_1c: "@mapmode! Режимы карты"
 lesson_mapmodes_1b_desc: "Сейчас на карте отображается [Concept('control_with_icon', 'контроль')|e] над вашими владениями. Обратите внимание: чем дальше [Concept('locations_with_icon', 'районы')|e] от [Concept('capital_with_icon', 'столицы')|e], тем меньше у вас над ними [Concept('control', 'контроля')]. В связи с этим наиболее удалённые [Concept('locations', 'районы')] будут приносить гораздо меньше пользы, чем остальные, пока там не появится более развитая инфраструктура.\n\n@leftclick!#high Щёлкнув#! по любой другой [Concept('countries_with_icon', 'державе')|e] в этом режиме карты, можно увидеть её уровень [Concept('control', 'контроля')] над землями."
 lesson_mapmodes_2: "@mapmode! Режимы карты"
 lesson_mapmodes_2a: "@mapmode! Режимы карты"
 lesson_mapmodes_2_desc: "Теперь давайте переключимся на режим обзора [Concept('proximity_with_icon', 'досягаемости')|e]. Его также можно включить через окно соответствующей подсказки, как вы уже делали ранее для обзора [Concept('control_with_icon', 'контроля')|e]."
 lesson_basics_proximity_mapmode: "Наведите курсор на подсказку о досягаемости"
 lesson_basics_proximity_mapmode_2: "@leftclick!#high Щёлкните#! по кнопке режима карты в заголовке подсказки, чтобы увидеть досягаемость"
 lesson_mapmodes_2b: "@mapmode! Режимы карты"
 lesson_mapmodes_2b_desc: "В режиме обзора [Concept('proximity_with_icon', 'досягаемости')|e] можно увидеть, как далеко [Concept('locations_with_icon', 'районы')|e] находятся от вашей [Concept('capital_with_icon', 'столицы')|e].\n\nВы уже могли заметить, что вдоль рек и равнин [Concept('proximity', 'досягаемость')] выше, а горы и леса, наоборот, значительно снижают её. [Concept('topography_with_icon', 'Рельеф')] и [Concept('vegetation_with_icon', 'растительность')] играют важную роль при расчёте [Concept('proximity', 'досягаемости')]. Впрочем, негативные эффекты от них можно нивелировать, строя объекты инфраструктуры, например [Concept('roads_with_icon', 'дороги')|e] и [Concept('ports_with_icon', 'порты')|e].\n\n@leftclick!#high Щёлкнув#! по [Concept('locations_with_icon', 'району')] в этом режиме карты, можно посмотреть, как именно проложен путь между районом и столицей."
 lesson_basics_map_modes: "@mapmode! Режимы карты"
 lesson_basics_map_modes_complete: "@mapmode! Режимы карты"
 lesson_basics_map_modes_desc: "В игре есть десятки #high режимов карты#!, отображающих самые разные показатели.\n\nВы можете изучать расположение [Concept('markets_with_icon', 'рынков')|e] в мире, распределение [Concept('population_with_icon', 'населения')|e] в вашей [Concept('country_with_icon', 'державе')|e] и многое другое.\n\nВсе #high режимы карты#! можно просмотреть, наведя курсор на соответствующий значок внизу экрана. С ними можно ознакомиться прямо сейчас, но в рамках этого обучения большая их часть нам не пригодится.\n\nЧтобы вернуться к стандартному режиму карты, можно нажать #high Ctrl+Q#! или выбрать его на панели режимов карт."
 lesson_basics_open_map_mode_widget: "Откройте панель режимов карты (выделено)"
 lesson_basics_return_map_mode_widget: "Вернитесь к стандартному режиму карты (ландшафт) с помощью клавиш #high Ctrl+Q#!"
 lesson_road: "[road_icon] Дороги"
 lesson_road_desc: "Как мы уже выяснили, для [Concept('control_with_icon', 'контроля')|e] над территориями нужна высокая [Concept('proximity_with_icon', 'досягаемость')|e]. Но как её повысить?\n\nЕсть разные способы, но один из основных — это строительство [Concept('roads_with_icon', 'дорог')|e]. [Concept('roads', 'Дорога')] улучшает связь между двумя [Concept('locations_with_icon', 'районами')|e] и повышает [Concept('proximity', 'досягаемость')|e] для всех [Concept('locations', 'районов')], чей путь к [Concept('capital_with_icon', 'столице')|e] лежит через эту дорогу.\n\nДавайте построим [Concept('road', 'дорогу')] от города [location_icon] [Player.GetCapital.GetName] к одному из районов. Это обойдётся нам в некоторое количество [Concept('gold_with_icon', 'дукатов')|e]."
 lesson_basics_road1: "Откройте панель города [Player.GetCapital.GetNameWithNoTooltip]"
 lesson_basics_road2: "@leftclick!#high Щёлкните#! по значку конструктора дорог, чтобы построить [Concept('road', 'дорогу')] от своей [Concept('capital', 'столицы')]"
 lesson_basics_road3: "@leftclick!#high Щёлкните#! по любому соседнему [Concept('location', 'району')] на карте, чтобы начать строительство"
 lesson_road_2: "[road_icon] Дороги"
 lesson_road_2_desc: "Отлично! [Concept('construction_with_icon', 'Строительство')|e] [Concept('road_with_icon', 'дороги')|e] началось. На это уйдёт несколько месяцев. Прогресс строительства можно отслеживать по круглому значку над вашей [Concept('capital_with_icon', 'столицей')|e].\n\nКогда дорога будет готова, [Concept('proximity_with_icon', 'досягаемость')|e] выбранного [Concept('location', 'района')] повысится, а с ней и [Concept('control_with_icon', 'контроль')|e] над ним.\n\n[Concept('construction', 'Строительство')] [Concept('buildings_with_icon', 'сооружений')|e] и мест [Concept('rgo_with_icon', 'добычи ресурсов')|e], а также создание [Concept('regiments_with_icon', 'полков')|e] работает схожим образом. Всё это требует времени и ресурсов в виде [Concept('gold_with_icon', 'дукатов')|e] и [Concept('goods_with_icon', 'товаров')|e] с [Concept('market_with_icon', 'рынка')|e]."
 lesson_road_3: "[road_icon] Все дороги ведут в город [Player.GetCapital.GetNameWithNoTooltip]"
 lesson_road_3_desc: "[Concept('proximity_with_icon', 'Досягаемость')|e] и [Concept('control_with_icon', 'контроль')|e] — одни из важнейших механик в @caesar!#W Europa Universalis V#!. [Concept('crown_power_with_icon', 'Власть правителя')|e], [Concept('tax_base_with_icon', 'налоговая база')|e] и размер [Concept('levies_with_icon', 'ополчения')|e] напрямую определяются контролем над районами, который в свою очередь зависит от их близости к [Concept('capital_with_icon', 'столице')|e]. Это значит, что прокладка [Concept('roads_with_icon', 'дорог')|e] от столицы имеет первостепенное значение для всех стран, независимо от их размера.\n\nПомимо дорог, близость можно улучшить за счёт морских путей, хотя для этого понадобится гавань подходящего [Concept('harbor_capacity_with_icon', 'размера')] и достаточное [Concept('maritime_presence_with_icon', 'морское присутствие')|e]."
