  mamluk_rank_system_laws: "Мамлюцька система рангів"
  mamluk_rank_system_laws_desc: "Ієрархія в наших збройних силах — це основа найважливішого інституту країни."
  mam_rigid_system: "Жорстка система"
  mam_rigid_system_desc: "Взявши за основу жорстку ієрархію, ми доб'ємося того, що всі мамлюки, від новобранців до ветеранів, будуть зайняті вдосконаленням своїх навичок, а не гонитвою за підвищенням по службі."
  mam_fluid_system: "Гнучка система"
  mam_fluid_system_desc: "Гнучка система рангів призведе до того, що воїни почуватимуться частиною наших збройних сил. Привабливість зростання та просування по армійській ієрархії — чудовий стимул для тих, хто вирвався з злиднів або кабали."
  mam_refined_furusiyya: "Переглянута фурусія"
  mam_refined_furusiyya_desc: "Століттями ми вдосконалювали фурусію, #L #L [ShowReligionGroupAdjective('muslim')|l]#!ий#! звід правил лицарської доблесті та військової майстерності, в якому мистецтво верхової їзди, стрільби з лука та тактики бою поєднується з інтелектуальним розвитком та моральним вихованням."
  mamluk_army_law: "Закон про мамлюцьку армію"
  mamluk_army_law_desc: "Армія — це серце нашої стратократичної влади. Тільки розробивши закони та положення, що ретельно регулюють порядок її формування, ми зможемо захистити наш народ від зовнішніх загроз."
  al_mamalik_al_sultaniyya: "Аль-Мамалік аль-Султанійя"
  al_mamalik_al_sultaniyya_desc: "Якщо підносити лише мамлюків, що перебувають на службі султана, ми зможемо забезпечити дисципліну та ефективність наших елітних військ."
  mamalik_al_umara: "Мамалік аль-Умара"
  mamalik_al_umara_desc: "$mamluks$, які служать під проводом еміра, — це чудове джерело міцних бійців для поповнення наших військ."
  ajnad_al_halqa: "Ажнад аль-Халька"
  ajnad_al_halqa_desc: "Армія не може належним чином існувати без сильних допоміжних військ та надійної інтендантської служби."
  awlad_al_nas_policy: "Аулад аль-Нас"
  awlad_al_nas_policy_desc: "Незважаючи на обов'язкове навернення в іслам та процедуру звільнення з рабства, через які пройшли старі мамлюки, вони, схоже, постійно намагаються підірвати центральну владу. Необхідно сформувати новий корпус, воїнів якого тренуватимуть та навчатимуть по-іншому."
  mamluk_promotion_law: "Закон про просування мамлюків"
  mamluk_promotion_law_desc: "Закони, що регулюють просування по службі в лавах нашої армії, є наріжним каменем нашої держави."
  merit_basis: "На основі заслуг"
  merit_basis_desc: "Просування по службі на основі заслуг — це чудовий спосіб відібрати талановитих та сильних воїнів, незважаючи на їхнє становище та походження."
  origin_basis: "На основі походження"
  origin_basis_desc: "Віддаючи перевагу воїнам одного етнічного походження, ми зможемо отримати згуртовану армію, яка володіє спільним почуттям гордості."
  dynastic_basis: "На основі спорідненості"
  dynastic_basis_desc: "Військові посади в нашій армії можуть передаватися від батька до сина, утверджуючи спадкоємність та легітимність престолонаслідування."
